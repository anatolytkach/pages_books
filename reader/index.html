            "use strict";

            function getQueryParam(name) {
              try {
                var params = new URLSearchParams(window.location.search || "");
                var v = params.get(name);
                return v ? decodeURIComponent(v) : "";
              } catch (e) {
                // Fallback for older browsers
                var search = window.location.search || "";
                if (!search || search.length < 2) return "";
                var pairs = search.substring(1).split("&");
                for (var i = 0; i < pairs.length; i++) {
                  var parts = pairs[i].split("=");
                  if (parts[0] === name) return decodeURIComponent(parts[1] || "");
                }
                return "";
              }
            }

            function inferOpenAs(path) {
              var p = (path || "").toLowerCase();
              if (p.endsWith(".epub")) return "epub";
              if (p.endsWith(".opf")) return "opf";
              // For a directory-based EPUB (unpacked), we expect META-INF/container.xml under the base path
              if (p.endsWith("/")) return "directory";
              // If user passes something like "book" without trailing slash, still treat as directory
              if (p && !p.includes(".")) return "directory";
              return undefined;
            }

            document.onreadystatechange = function () {
              if (document.readyState == "complete") {
                // Book source: ONLY from catalog (exploded EPUB directories on R2).
// Expect book id in either ?id=75586 or #75586 (hash).
(function(){
  const params = new URLSearchParams(location.search);
  const qid = params.get("id");
  const hid = (location.hash || "").replace(/^#/, "");
  const id = (qid && qid.trim()) || (hid && hid.trim()) || "";

  if(!/^\d+$/.test(id)){
    const el = document.getElementById("viewer");
    if(el){
      el.innerHTML = `<div style="padding:18px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif">
        <h2 style="margin:0 0 10px 0;font-size:18px">No book selected</h2>
        <div style="color:#666;font-size:14px;line-height:1.4">
          Open a book from the catalog, or pass an id like
          <code style="background:#f3f3f3;padding:2px 6px;border-radius:6px">?id=75586</code>
          or
          <code style="background:#f3f3f3;padding:2px 6px;border-radius:6px">#75586</code>.
        </div>
      </div>`;
    }
    return;
  }

  // Our catalog stores each book as an unpacked EPUB directory:
  // /books/content/<id>/META-INF/container.xml, /OEBPS/content.opf, ...
  const bookPath = `/books/content/${id}/`;

  const opts = {
    openAs: "directory",
    restore: false
  };

  // Run Reader
  window.reader = ePubReader(bookPath, opts);

  // If hash changes to a different numeric id, reload the reader.
  window.addEventListener("hashchange", () => {
    const newId = (location.hash || "").replace(/^#/, "");
    if(/^\d+$/.test(newId) && newId !== id){
      location.search = `?id=${encodeURIComponent(newId)}`;
    }
  });
})();
              }
            };

        </script>
