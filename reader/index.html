            "use strict";

            function getQueryParam(name) {
              try {
                var params = new URLSearchParams(window.location.search || "");
                var v = params.get(name);
                return v ? decodeURIComponent(v) : "";
              } catch (e) {
                // Fallback for older browsers
                var search = window.location.search || "";
                if (!search || search.length < 2) return "";
                var pairs = search.substring(1).split("&");
                for (var i = 0; i < pairs.length; i++) {
                  var parts = pairs[i].split("=");
                  if (parts[0] === name) return decodeURIComponent(parts[1] || "");
                }
                return "";
              }
            }

            function inferOpenAs(path) {
              var p = (path || "").toLowerCase();
              if (p.endsWith(".epub")) return "epub";
              if (p.endsWith(".opf")) return "opf";
              // For a directory-based EPUB (unpacked), we expect META-INF/container.xml under the base path
              if (p.endsWith("/")) return "directory";
              // If user passes something like "book" without trailing slash, still treat as directory
              if (p && !p.includes(".")) return "directory";
              return undefined;
            }

            document.onreadystatechange = function () {
              if (document.readyState == "complete") {
                // Book source: ONLY from catalog (exploded EPUB directories on R2).
// Expect book id in either ?id=75586 or #75586 (hash).
(function(){
  const params = new URLSearchParams(location.search);
  const qid = params.get("id");
  const rawHash = (location.hash || "");
  const hid = rawHash.replace(/^#/, "");
  const hashIsId = /^\d+$/.test(hid);
  const hashIsCfi = /^epubcfi\(/i.test(hid);
  let id = (qid && qid.trim()) || (hashIsId ? hid.trim() : "") || "";

  // Fallback: remember last opened book id
  try {
    if (!/^\d+$/.test(id)) {
      const lastId = localStorage && localStorage.getItem("readerpub:lastid");
      if (lastId && /^\d+$/.test(lastId)) id = lastId;
    }
  } catch (e0) {}

  if(!/^\d+$/.test(id)){
    const el = document.getElementById("viewer");
    if(el){
      el.innerHTML = `<div style="padding:18px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif">
        <h2 style="margin:0 0 10px 0;font-size:18px">No book selected</h2>
        <div style="color:#666;font-size:14px;line-height:1.4">
          Open a book from the catalog, or pass an id like
          <code style="background:#f3f3f3;padding:2px 6px;border-radius:6px">?id=75586</code>
          or
          <code style="background:#f3f3f3;padding:2px 6px;border-radius:6px">#75586</code>.
        </div>
      </div>`;
    }
    return;
  }

  // Always keep ?id in URL (for reload/share). Preserve CFI hash if present.
  try {
    if (!qid || qid !== id) {
      const newSearch = `?id=${encodeURIComponent(id)}`;
      const keepHash = hashIsCfi ? rawHash : "";
      history.replaceState(null, "", `${location.pathname}${newSearch}${keepHash}`);
    }
  } catch (e1) {}

  try { localStorage && localStorage.setItem("readerpub:lastid", id); } catch (e2) {}

  // Our catalog stores each book as an unpacked EPUB directory:
  // /books/content/<id>/META-INF/container.xml, /OEBPS/content.opf, ...
  const bookPath = `/books/content/${id}/`;

  const opts = {
    openAs: "directory",
    restore: true
  };

  // Run Reader
  window.reader = ePubReader(bookPath, opts);

  // Restore last position for this book (independent of EPUB.js internal restore)
  (function(){
    try {
      if (!window.reader || !window.reader.rendition) return;
      const key = `readerpub:lastcfi:${id}`;
      try {
        const last = localStorage && localStorage.getItem(key);
        if (last) {
          window.reader.rendition.display(last);
        }
      } catch (e1) {}
      try {
        window.reader.rendition.on("relocated", function(location){
          try {
            const cfi = location && location.start && location.start.cfi;
            if (cfi && localStorage) localStorage.setItem(key, cfi);
          } catch (e2) {}
        });
      } catch (e3) {}
    } catch (e0) {}
  })();

  // If hash changes to a different numeric id, reload the reader.
  window.addEventListener("hashchange", () => {
    const newHash = (location.hash || "");
    const newId = newHash.replace(/^#/, "");
    if(/^\d+$/.test(newId) && newId !== id){
      location.search = `?id=${encodeURIComponent(newId)}`;
      return;
    }
    // If hash is a CFI but ?id is missing, restore it.
    try {
      const p = new URLSearchParams(location.search);
      if (!p.get("id") && /^\d+$/.test(id)) {
        history.replaceState(null, "", `${location.pathname}?id=${encodeURIComponent(id)}${newHash}`);
      }
    } catch (e) {}
  });
})();
              }
            };

    <span class="sel-label">Copy</span>
  </button>
</div>
<div id="divider"></div>
<div class="arrow" id="prev">‹</div>

<!--
  Swipe preview stack (mobile):
  We keep 3 rendered views in DOM (prev / current / next) so that
  during a swipe we can reveal a real neighboring page underneath.
  NOTE: #viewer remains the CURRENT view for backwards compatibility.
-->
<div id="viewerStack" aria-label="Book Viewer">
  <div id="viewer-prev" class="viewer-layer" aria-hidden="true"></div>
  <div id="viewer" class="viewer-layer viewer-current"></div>
  <div id="viewer-next" class="viewer-layer" aria-hidden="true"></div>
  <div id="swipe-shadow" aria-hidden="true"></div>
</div>

<div class="arrow" id="next">›</div>
<div id="bottombar">
<div id="bottom-controls">
<span class="page-count" id="page-count"></span>
</div>
</div>
<div id="loader"><img src="img/loader.gif"/></div>
</div>
<div class="modal md-effect-1" id="settings-modal">
<div class="md-content">
<h3>Settings</h3>
<div>
<p>
<input id="sidebarReflow" name="sidebarReflow" type="checkbox"/>Reflow text when sidebars are open.
                  </p>
</div>
<div class="closer icon-cancel-circled"></div>
</div>
</div>
<div class="overlay"></div>
</div>

</body>
</html>
