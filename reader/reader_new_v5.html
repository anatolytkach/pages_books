<style>
  .reader-onboarding-hint {
    position: fixed;
    bottom: calc(var(--bottombar-h, 32px) + env(safe-area-inset-bottom, 0px) + 18px);
    left: 50%;
    z-index: 2500;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 260px;
    max-width: min(92vw, 460px);
    padding: 14px 18px;
    border-radius: 18px;
    background: rgba(18, 28, 45, 0.88);
    color: #fff;
    box-shadow: 0 14px 34px rgba(8, 14, 24, 0.24);
    backdrop-filter: blur(10px);
    pointer-events: none;
    text-align: center;
    opacity: 0;
    transform: translate(-50%, 12px);
    transition: transform 180ms ease, opacity 180ms ease;
  }

  .reader-onboarding-hint.is-visible {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  .reader-onboarding-hint.is-hiding {
    opacity: 0;
    transform: translate(-50%, 12px);
  }

  .reader-onboarding-hint-line1 {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0.01em;
  }

  @media (max-width: 768px) {
    .reader-onboarding-hint {
      max-width: min(92vw, 360px);
      bottom: calc(var(--bottombar-h, 32px) + env(safe-area-inset-bottom, 0px) + 14px);
      padding: 12px 16px;
    }

    .reader-onboarding-hint-line1 {
      font-size: 15px;
    }
  }
</style>
<script>
  (function () {
    "use strict";

    function isLocalPreviewHost() {
      var host = String((window.location && window.location.hostname) || "").trim().toLowerCase();
      return host === "127.0.0.1" || host === "localhost" || host === "::1";
    }

    function isReaderNewRoute() {
      var pathname = String((window.location && window.location.pathname) || "").trim();
      return (
        pathname === "/books/reader_new/" ||
        pathname === "/books/reader_new_v5/" ||
        pathname === "/books/protected/" ||
        pathname === "/reader_new/" ||
        pathname === "/reader_new_v5/" ||
        pathname === "/reader/reader_new" ||
        pathname === "/reader/reader_new/" ||
        pathname === "/reader/reader_new_v5" ||
        pathname === "/reader/reader_new_v5/" ||
        pathname === "/books/reader_new/index.html" ||
        pathname === "/books/reader_new_v5/index.html" ||
        pathname === "/books/protected/index.html" ||
        pathname === "/reader_new/index.html" ||
        pathname === "/reader_new_v5/index.html" ||
        pathname === "/reader/reader_new.html" ||
        pathname === "/reader/reader_new_v5.html"
      );
    }

    function isProtectedPublicRoute() {
      var pathname = String((window.location && window.location.pathname) || "").trim();
      return pathname === "/books/protected/" || pathname === "/books/protected/index.html";
    }

    function renderEntryMessage(title, body) {
      var render = function () {
        var el = document.getElementById("viewer");
        if (!el) return;
        el.innerHTML =
          '<div style="padding:18px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif">' +
          '<h2 style="margin:0 0 10px 0;font-size:18px">' + String(title || "") + "</h2>" +
          '<div style="color:#666;font-size:14px;line-height:1.4">' + String(body || "") + "</div>" +
          "</div>";
      };
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", render, { once: true });
      } else {
        render();
      }
    }

    function dispatchProtectedConfig(config) {
      try {
        window.__readerpubProtectedShellMode = true;
        window.__readerpubOldShellMode = "protected";
        window.__READERPUB_PROTECTED_HOST_CONFIG__ = config;
        window.dispatchEvent(
          new CustomEvent("readerpub:protected-host-config", { detail: config })
        );
        window.dispatchEvent(
          new CustomEvent("readerpub:protected-shell-config", { detail: config })
        );
      } catch (eProtectedConfig) {}
    }

    if (!isReaderNewRoute()) return;

    var params = new URLSearchParams(window.location.search || "");
    var readerMode = String(params.get("reader") || "").trim().toLowerCase();
    var rawHash = String(window.location.hash || "");
    var hashValue = rawHash.replace(/^#/, "");
    var hashIsId = /^\d+$/.test(hashValue);
    var hashIsCfi = /^epubcfi\(/i.test(hashValue);
    var artifactBookId = String(params.get("artifactBookId") || "").trim();
    var id = String(
      params.get("id") ||
      params.get("protectedArtifactBookId") ||
      artifactBookId ||
      params.get("i") ||
      (hashIsId ? hashValue : "")
    ).trim();
    var source = String(params.get("source") || "").trim();
    var protectedArtifactSource = String(
      params.get("protectedArtifactSource") || params.get("artifactSource") || ""
    ).trim().toLowerCase();
    var readerContentSource = String(
      params.get("readerContentSource") || params.get("bookContentSource") || ""
    ).trim().toLowerCase();
    var readerRemoteMode = String(
      params.get("readerRemoteMode") || params.get("protectedRemoteMode") || ""
    ).trim().toLowerCase();
    var protectedPublicRoute = isProtectedPublicRoute();
    var resolvedArtifactSource =
      protectedArtifactSource ||
      (readerContentSource === "r2" ? "r2" : "") ||
      (protectedPublicRoute && !isLocalPreviewHost() ? "r2" : "");

    if ((artifactBookId || protectedPublicRoute) && readerMode !== "protected") {
      readerMode = "protected";
    }

    if (readerMode !== "protected") {
      try {
        window.__readerpubReaderNewProtectedOnly = true;
        window.__readerpubReaderNewInvalidEntry = {
          reason: "protected-only-route",
          route: String(window.location.pathname || ""),
          readerMode: String(readerMode || "")
        };
      } catch (eProtectedOnlyFlag) {}
      renderEntryMessage(
        "Protected reader only",
        "This reader accepts only protected book entries. Open the book from the catalog or use a protected reader URL."
      );
      return;
    }

    if (!/^\d+$/.test(id)) {
      renderEntryMessage(
        "No protected book selected",
        'Open a protected book from the catalog or pass a protected reader URL with <code style="background:#f3f3f3;padding:2px 6px;border-radius:6px">reader=protected</code> and a valid book id.'
      );
      return;
    }

    try {
      var normalizedParams = new URLSearchParams(window.location.search || "");
      var changed = false;
      if (protectedPublicRoute) {
        window.__readerpubReaderNewNormalizedHref = window.location.pathname + window.location.search + (hashIsCfi ? rawHash : "");
      } else {
        if (normalizedParams.get("reader") !== "protected") {
          normalizedParams.set("reader", "protected");
          changed = true;
        }
        if (normalizedParams.get("protectedArtifactBookId") !== id) {
          normalizedParams.set("protectedArtifactBookId", id);
          changed = true;
        }
        if (artifactBookId && normalizedParams.get("artifactBookId") !== artifactBookId) {
          normalizedParams.set("artifactBookId", artifactBookId);
          changed = true;
        }
        if (!normalizedParams.get("id")) {
          normalizedParams.set("id", id);
          changed = true;
        }
        if (resolvedArtifactSource && normalizedParams.get("protectedArtifactSource") !== resolvedArtifactSource) {
          normalizedParams.set("protectedArtifactSource", resolvedArtifactSource);
          changed = true;
        }
        if (!resolvedArtifactSource && normalizedParams.get("protectedArtifactSource") !== "local") {
          normalizedParams.set("protectedArtifactSource", "local");
          changed = true;
        }
        if (normalizedParams.get("protectedUx") !== "protected-shell") {
          normalizedParams.set("protectedUx", "protected-shell");
          changed = true;
        }
        if (!normalizedParams.get("renderMode")) {
          normalizedParams.set("renderMode", "shape");
          changed = true;
        }
        if (!normalizedParams.get("metricsMode")) {
          normalizedParams.set("metricsMode", "shape");
          changed = true;
        }

        var normalizedHref = window.location.pathname + "?" + normalizedParams.toString() + (hashIsCfi ? rawHash : "");
        if (changed) history.replaceState(null, "", normalizedHref);
        window.__readerpubReaderNewNormalizedHref = normalizedHref;
      }
    } catch (eReaderNewNormalize) {}

    try {
      if (isLocalPreviewHost()) {
        document.cookie = "readerpub_artifact_source=" + encodeURIComponent(resolvedArtifactSource || "local") + "; path=/; SameSite=Lax";
        document.cookie = "readerpub_content_source=" + encodeURIComponent(readerContentSource || "local") + "; path=/; SameSite=Lax";
        document.cookie = "readerpub_remote_mode=" + encodeURIComponent(readerRemoteMode || "default") + "; path=/; SameSite=Lax";
      }
    } catch (eArtifactModeCookie) {}

    var autoStartReturnKey = "readerpub_catalog_return_v1";
    var catalogReturnTarget = "";
    try {
      catalogReturnTarget =
        String(params.get("catalog_return") || "").trim() ||
        String(sessionStorage.getItem(autoStartReturnKey) || "").trim();
    } catch (eStorage) {
      catalogReturnTarget = String(params.get("catalog_return") || "").trim();
    }

    dispatchProtectedConfig({
      bookId: id,
      protectedArtifactBookId: id,
      protectedArtifactSource: String(resolvedArtifactSource || "").trim(),
      source: source === "gutenberg" ? "" : source,
      entry: String(params.get("entry") || "").trim(),
      shellMode: "protected-shell",
      url: String(window.__readerpubReaderNewNormalizedHref || window.location.href || ""),
      catalogReturnTarget: catalogReturnTarget,
      isAutostartReader: String(params.get("autostart") || "").trim() === "1" && !!catalogReturnTarget
    });
  })();

        </script>

<!--
  Swipe preview stack (mobile):
  We keep 3 rendered views in DOM (prev / current / next) so that
  during a swipe we can reveal a real neighboring page underneath.
  NOTE: #viewer remains the CURRENT live reading layer.
-->
<div id="viewerStack" aria-label="Book Viewer">
  <div id="viewer-prev" class="viewer-layer" aria-hidden="true"></div>
  <div id="viewer" class="viewer-layer viewer-current"></div>
  <div id="viewer-next" class="viewer-layer" aria-hidden="true"></div>
  <div id="swipe-shadow" aria-hidden="true"></div>
</div>

<div class="arrow" id="next">›</div>
<div id="bottombar">
<div id="bottom-controls">
<span class="page-count" id="page-count"></span>
</div>
</div>
<div id="loader"><img src="img/loader.gif"/></div>
</div>
<div class="modal md-effect-1" id="settings-modal">
<div class="md-content">
<h3>Settings</h3>
<div>
<p>
<input id="sidebarReflow" name="sidebarReflow" type="checkbox"/>Reflow text when sidebars are open.
                  </p>
</div>
<div class="closer icon-cancel-circled"></div>
</div>
</div>
<div class="overlay"></div>
</div>

</body>
</html>
