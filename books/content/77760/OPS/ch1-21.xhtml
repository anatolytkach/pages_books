<span><span id="id63"><div class="title2">
<p class="p">13 сентября</p>
</div><p class="p1">Сегодня у нас занятие непростое, но и день, прямо скажем, непростой. Этот день для меня когда-то много значил. Это был день знакомства с исключительно глупой и пошлой девочкой, с которой, однако, были кое-как связаны …дцать лет моей жизни. Я даже не скажу вам сколько, потому что самому стыдно.</p><p class="p1">Мы учились на одном курсе. Курс был, как я теперь понимаю, тоже глупый, я себя никак из этой категории не выделяю. В моде был дешевый демонизм — дорогому откуда было взяться? — и почти ни с кем из тех, с кем я тогда дружил, сегодня мне и слова бы сказать не захотелось. Я до сих пор не понимаю, чем эта девочка меня тогда купила, и думаю, что решительно ничем, кроме некоторой сексуальной притягательности, но штука в том, что и притягательности этой я теперь не понимаю. То ли это было так давно, что с тех пор в организме поменялись все атомы, то ли в самом деле в 17 лет неважно, с кем. Но мне было важно, и я мог выбирать, и она значила для меня так много, что и после армии — из которой она не дождалась меня, естественно, — и после всех ее приходов-уходов, и после трех окончательных разрывов (между которыми мы два раза успели подать заявление) я что-то в ней находил, какая-то капля лилитской крови в ней была. И главное — она всё про себя понимала. Нет, это было невыносимо. До сих пор стыдно. Я предпочитаю про этот бред вообще не вспоминать. У меня с тех пор несколько раз начиналась совершенно другая жизнь. Сегодня действительно уже ни в чем не разберешься, но от этого, товарищи, мне особенно страшно. Незаметно меня поменяли на совершенно другого человека. Она, кстати, мало поменялась внешне, как и положено этому племени — они с годами делаются только свежее. Наслаждение в жизни у них одно — стравливать. С чувством жгучего стыда я вспоминаю, как она меня знакомила с мужем и потом со мной уединялась на балконе, якобы курить, — и муж всё понимал, и я в этом свинстве участвовал! Все-таки молодость непростительна. Потом она со мной точно так же знакомила преемников, и я чаще всего не догадывался, что все уже произошло; поначалу что-то мешало ей нас совмещать, и я на короткое время отставлялся — потом все с новой силой возобновлялось, потом мне это надоело, и ей, кажется, стало здорово скучнее жить. Зато какие воспоминания! Я даже думал, что эти воспоминания и есть главный прок от всего происходящего, но теперь понимаю, сколь они были тривиальны. Все эти стояния под балконом (второго этажа, каков и был ее истинный уровень), метания, прибегания обратно по первому свистку и клятвы больше никогда ничего подобного — такая пошлятина, что и вспоминать не могу, потому что стыдно. Все это мне казалось тогда жизнью, а жизнь заключалась совершенно в другом. Но ведь было что-то? Разумеется, было. Вместе проснуться ночью, выйти вдруг на балкон (второго, подчеркиваю, этажа), услышать дождь. Я увлекался тогда одним совершенно забытым киевским поэтом, который в 1929-м умер от туберкулеза, не прожив и 27 лет, — выкапывал из тогдашней периодики его стихи (архив нашел много лет спустя у другого такого же его фаната), и вот стоим мы, значит, на балконе, и я вспоминаю наизусть: когда, клубясь, от нас уходят сны, и зыбкий дождь то шепчет, то бормочет, мы просыпаемся, изнурены китайскими тенями ночи. Они солгали нам. Весна, опять весна. От мокрых фонарей, от зыбких пятен света коснеет страшная такая вышина, что вскрикнешь, хватишься — и вспомнишь это, это. Какое «это», что? Вероятно, обреченность свою — он был уже тяжело болен и знал, что мало ему оставалось. Но вспоминать это, это, стоя рядом с ней на балконе, было неплохо; я отчетливо помню все запахи в этой квартире, в давно снесенном доме, мимо которого я стараюсь не ездить, и запах ее волос, почему-то одуванчиковый, и запах этой мокрой земли под балконом. А бронхолитин! До сих пор, когда случается пить бронхолитин, я вспоминаю, как добывал его и поил, когда был бронхит, и еще липовым чаем, конечно. Это могло быть с какой угодно другой, но было почему-то с ней; самое отвратительное — понимать, что через такие же примерно воспоминания и приключения проходили решительно все, что уникальность стремится к нулю и ценность ничтожна. То есть это все совсем не интересно. Однако почему-то это занимало меня …дцать лет, и, может быть, — подумать об этом всего страшнее, — есть и во мне та же мерзость, какая была в ней. Увидев ее впервые, близкий мой друг сказал: уверен, что, если захочу, завтра она будет моя. Это было сказано жестко, но точно. Но чем я, собственно, лучше? Разве не случалось мне с тех пор изменять совершенно по-свински, да более того — я и грехом это не считал? Да она агнец на моем фоне. И я знаю, сколь жестоко она обламывалась потом, как часто ее бросали — бросали, надо признаться, люди, которые ногтя ее не стоили, — и не то чтобы жалость, а какую-то, простите, профессиональную солидарность я чувствую иногда.</p><p class="p1">Разумеется, о том, чтобы ее увидеть или с ней заговорить, у меня и мысли нет. Я вспоминаю, какой законченно мерзкой она бывала при всяком новом увлечении и как отчаянно любовалась собственной мерзостью, сучье счастье в чистом виде; но зато она меня многому научила, сколь это ни ужасно. Во-первых, я никогда больше не велся на этот тип. Во-вторых, я никогда не позволял себе любоваться своей греховностью, хотя соблазн есть, есть, кто же его не знает! На вечеринке, ужасное слово, или просто на какой угодно встрече неуклюжий мальчик появляется с очень еще молодой, но очень уже распущенной девочкой, и эта девочка явно на тебя косится, и мальчик явно мучается — сколько раз были такие соблазны, и сколько раз мне казалось, что вот оно, счастье, цветение, полнота жизни — урвать такую девочку, сбежать с ней, и ты король, и пошла к черту вся нравственная рефлексия. Потому что именно в минуты торжествующей наглости ты сколько-то равен жизни, а если в это время еще и природа цветет и, как было сказано, весна, опять весна — кто посягнет на эту правоту? Живое всегда право, кто счастлив, тот и прав, сказал один тут моралист, и какие стихи пошли бы сразу! — но я никогда, никогда так не делал. Разве что потом, когда мальчик уже посылался без всякого моего участия. Такое пару раз было, да. Но никогда не было у меня этой гнусной, гнусной интонации — люблю другую, формально каюсь, но как же втайне собой любуюсь! А она это обожала. Это были, так сказать, высшие взлеты.</p><p class="p1">Но вот я думаю теперь, что ничего мы не поймем и никаких денег не получим, если не разберемся в главном или по крайней мере в очень существенном. Сегодня мы вычисляем еще одну дельту, которую я не знаю даже, как назвать, и назову ее дельта Я.</p><p class="p1">У вас была такая история. Наверняка была. У вас была сильная стыдная любовь, которую вы не можете вспоминать без раскаяния и презрения. У вас была любовница/любовник, относительно которого вам непонятно, как можно было все это терпеть. Прежде чем вычислять дельту, выписываем на отдельный лист бумаги — здраво, трезво, рассудительно, — что мы там любили. То есть что нас действительно удерживало вблизи.</p><p class="p1">По пунктам.</p><p class="p1">Переворачиваем лист и выписываем еще более важное: а за что разлюбили? Что такого наконец разглядели, что все-таки смогли оторваться?</p><p class="p1">Или не вы послали, а вас послали? Но вы же были готовы. Вы всё понимали. Вот это и выписываем.</p><p class="p1">Считаем пункты. Если их число одинаково, этот параметр не учитываем. Вы молодец.</p><p class="p1">Если на второй стороне пунктов больше, значит, вы этого своего несчастного (несчастную) любите до сих пор. Потому что это полюбить можно по многим причинам, а разлюбить — всегда только по одной, максимум по двум. А если вы так его/ее до сих пор ненавидите, что находите 20 причин для разрыва, то есть 20 тайных или явных пороков, — значит, объект вам до сих пор чрезвычайно дорог и никакой дельты в вашем случае нет. Не считаем сегодня больше ничего, идем гуляем по местам былой любви в надежде ее встретить и броситься в ноги. Фу, противно.</p><p class="p1">Но если пунктов больше на первой стороне, то всё в порядке, казус преодолен. Разницу в их количестве возводим в квадрат. 1 принимаем за 2, а то все умножение лишится смысла.</p><p class="p1">Потом берем точную дату вашей встречи — я, к сожалению, ее помню очень хорошо.</p><p class="p1">Потом берем дату окончательного разрыва — тоже полную. День, месяц, число. Тоже помню. Очень горжусь, что получилось.</p><p class="p1">Вычитаем первое из второго. Получаем точное количество лет, месяцев и дней.</p><p class="p1">Переводим всё в дни.</p><p class="p1">Делим это время на квадрат первой разницы, см. выше.</p><p class="p1">Делим ваш нынешний — строго нынешний! — возраст в годах на получившийся результат. Выясняем, как общее время вашей жизни соотносится с периодом прозрения.</p><p class="p1">Это и есть дельта Я, один из главных показателей каждой личности.</p><p class="p1">Округляем до третьего знака.</p><p class="p1">У меня получается округленно 0,163.</p><p class="p1">Это ужасно. Это ничтожно мало. Это значит, что я действительно очень долго прозревал, период этого прозрения составляет от моей жизни огромную, непростительную долю.</p><p class="p1">Только на 0,163 я поумнел, возмужал, вообще переменился.</p><p class="p1">Ну, значит, всё впереди.</p><p class="p1">Умножьте теперь свой нынешний возраст на дельту Я.</p><p class="p1">Это и есть ваш психологический возраст.</p><p class="p1">У меня получилось — не скажу сколько, но, в общем, пешком под стол.</p><p class="p1">Не знаю уж, огорчаться или радоваться. Меню ужина у нас сегодня — в соответствии с возрастом. Вы, если хотите, можете напиться, а я пойду сварю себе какао. Это было первое слово, которое я сказал: «Какао». Как чувствовал прямо.</p></span><span id="id64"><div class="title2">
<p class="p">14 сентября</p>
</div><p class="p1">Сегодня мы расчехляемся, как это теперь называется, или развиртуализовываемся, как неудобовыговариваемо называлось раньше. Иными словами, мы заявляем о себе; мы убеждаемся, что нас много. Сегодня люди, проходящие «Квартал», встречаются в нескольких конкретных точках.</p><p class="p1">В Москве все просто: это Парк культуры. О, как я любил когда-то Парк культуры. Я перестал его любить ровно тогда, когда из него сделали нечто хипстерское, лишенное аттракционов, заточенное на здоровый образ жизни. О, как я не люблю здоровый образ жизни, как я заболеваю от него! Теперь это парк самодовольства и зависти. Самодовольство — чужое, зависть — моя. И все-таки там. Почему? Потому что все остальное еще хуже. От моего детства остались хотя бы фонтаны. Но я предлагаю вам встречаться не у фонтанов, а там, где было когда-то Большое, оно же Чертово, колесо.</p><p class="p1">О, это было прекрасное место. Там можно было целоваться, потому что из кабины девушке было некуда деваться. Если девушка не хотела целоваться, можно было начать раскачивать кабину, грозно пугая упрямую девушку. Но они хотели, вот в чем штука. Иначе бы они не лезли с нами в эту кабинку.</p><p class="p1">О сад, сад. Еще там был тир. Написать бы, в самом деле, такую вариацию на Хлебникова — «О парк, парк». Но зачем? Вдобавок ничего этого теперь нет, есть здоровые соки из сельдерея. Тем не менее от Большого колеса осталась хоть память. И вот в районе этого главного аттракциона Москвы, который было видно еще с Крымского моста — да что там, еще с Фрунзенской набережной его было видно, — на месте когдатошнего нашего счастья я и предлагаю вам встретиться, держа в руке книгу «Квартал».</p><p class="p1">Ничего друг другу не говорить, ни единого слова, потому что если встретиться и заговорить — не будет ничего.</p><p class="p1">Ровно в 15:00 приходите туда, прогуливайтесь, смотрите.</p><p class="p1">Даже если вас будет двое, все уже получилось.</p><p class="p1">Переглядываться, кивать, махать рукой — можно. Нельзя одного: разговаривать. Потому что разговаривать нам не о чем, мы учимся входить в состояние, когда слова так же излишни, как и деньги. Мы просто ходим мимо друг друга. С книгой «Квартал».</p><p class="p1">Все мы входим в несколько тайных обществ. В тайное общество смертных. В тайное общество бессмертных, которое тоже есть, потому что, как известно, умирают не все люди. Каждую секунду в мире рождаются в среднем 2,4 чело века, а умирают двое. 0,4 человека куда-то деваются. Иначе, согласитесь, не было бы никакого прироста населения. Эта элементарная мысль почему-то никому не приходит в голову, а если приходит, ее немедля обзывают ложным парадоксом вроде апории об Ахилле и черепахе. Объясняют этот парадокс ростом продолжительности жизни или еще какой-то чепухой, но это ведь всё казуистика. Мы знаем, в чем дело: применяя определенную технику, известную с глубокой древности, можно не умирать, но наша сегодняшняя тема не это. Когда-нибудь потом, когда у вас хорошо пойдет «Квартал», будет много денег и вы уже всерьез поверите в эти техники, мы предложим вам довольно простую технику бессмертия, если вы только захотите. Впрочем, у кого много денег, тот уже и сейчас почти бессмертен. Есть тайное общество предающихся — не в смысле предаваемых, а именно увлекающихся всякого рода экзотическими пороками, они все связаны, у этого порока круговая порука. Есть еще всякие тайные общества, существование которых вообще ничем не объясняется, кроме скрытого удовольствия в них состоять. «Квартал» объединяет разных, но весьма специальных людей, умеющих слышать не сообщение, а голос, которым оно произносится. Эти люди понимают, что мир управляется тонкими закономерностями, постигнуть которые нельзя — по крайней мере из нашего человеческого состояния, — но, если их соблюдать, с вами будут происходить правильные вещи. Жить, как и писать, надо грамотно, эту грамоту мы изучаем в «Квартале», и одно из существенных правил — не обнаруживать себя при встрече, но узнать и ДАТЬ ПОНЯТЬ. Вы можете также прибегнуть к телепатии, но для этого нужен особенный уровень печали. Если отсутствие Чертова колеса поможет вам его достигнуть, вы сможете поделиться ощущениями от «Квартала». Но ни в коем случае не пытайтесь выразить их вслух — удержитесь от этой пошлости.</p><p class="p1">Что касается жителей остальных городов — в России либо за границей, — проще всего встречаться в книжном магазине, где вы приобрели «Квартал». Таких книжных магазинов по определению немного. Вот там и встречайтесь.</p><p class="p1">Ровно в 15:30 осуществите то, что на современном языке пошло называется флешмобом, но в действительности всегда называлось синхронизацией.</p><p class="p1">Вырываем из книги предыдующую страницу.</p><p class="p1">Вырвали?</p><p class="p1">Поджигаем.</p><p class="p1">Если дождь, все равно поджигаем. Пусть сгорит, хоть и не с первой попытки.</p><p class="p1">После этого быстро уходим из парка.</p><p class="p1">Жителям других городов поджигать возле магазина, ни в коем случае не в нем.</p><p class="empty-line"/><p class="p1">Дома ровно в 21:00 прочесть вслух стихотворение, напечатанное на обороте.</p><p class="p1">Ничего особенного вам про это стихотворение знать не надо, написал его давно умерший поэт в память о юноше, который погиб, спасая других. Юношу мало кто помнит, поэта почти никто не помнит, а стихотворение я помню, в нем есть нечто заклинательное, и вот мы пытаемся не обессмертить, конечно, но вспомнить двух хороших людей, никогда друг друга не видевших, но тоже входивших в тайное общество.</p><p class="p1">Вообще, если что и стоит делать на свете, то исключительно входить в тайное общество.</p><div class="poem">
<div class="stanza">
<p class="v">ПО-НАД ПРИПЯТЬЮ-РЕКОЙ</p>
<p class="v">ЛЕТИТ ПТИЧКА-НЕВЕЛИЧКА</p>
<p class="v">В КЛЮВЕ ЯГОДУ НЕСЕТ</p>
</div>
<div class="stanza">
<p class="v">ТЫ ЛЕТИ СЕБЕ ЛЕТИ</p>
<p class="v">ДЕНЬ ОБГОНИШЬ НОЧЬ ДОГОНИШЬ</p>
<p class="v">СОЛНЦЕ ВСТРЕТИШЬ НА ПУТИ</p>
<p class="v">НЕ ПЕЧАЛЬСЯ НЕ ГРУСТИ</p>
<p class="v">ЕСЛИ ЯГОДУ УРОНИШЬ</p>
<p class="v">СТАНЕТ ДЕРЕВО РАСТИ</p>
</div>
</div></span><span id="id65"><div class="title2">
<p class="p">15 сентября</p>
</div><p class="p1">Сегодня мы демиург, в незначительном масштабе, но все же.</p><p class="p1">У вас есть одинокий приятель примерно ваших лет — плюс-минус год, человек неприспособленный, возможно, что и аутичный, до сих пор не женатый, компьютерный или технический гений, регулярно жалующийся вам на неустроенность, но тут же, в порядке самоутешения, принимающийся убеждать вас и себя, что все у него отлично. И есть у вас подруга, младше вас десятью или более годами, девочка — свой парень, такая в брезентовых штанах, туристка или самодеятельный автор, или бывает еще спортивный инструктор. Надежная — страсть, доброжелательная до крайности, но толстая, или веснушчатая, или неловкая, но, в общем, тоже неустроенная. Не девственница, конечно, но что-то там не очень хорошо, тоже одиноко. Или быстро согреваются у нее и бросают, или вообще проходят мимо. Есть женщины, говорящие при расставании что-то вроде: «Хороший ты мужик, но не орел». Таких женщин надо наказывать, не убивать, а наказывать долгой иссушающей старостью, и Бог это всегда делает, можете проследить. Я знаю, что говорю. Откуда знаю? Подумайте. Так вот, есть и мужчины, говорящие что-то вроде: «Хороший ты парень, Галка», или типа: «Если б я не был женат!», или: «Знаешь, Галка, вот ты жалеешь, а мужчине, может быть, иногда не надо, чтобы его жалели». Говорящие так — хуже всех, они вообще будут ползать в своей блевотине. Если вы когда-нибудь в жизни говорили подобное, вам не поможет никакой «Квартал», серьезно говорю. Продолжайте, конечно, милосердие Божье бесконечно, но шансы скромны.</p><p class="p1">И вот вам надо их познакомить, этих двоих, и завтра вы будете их знакомить. Назначьте встречу на завтра, потому что сегодня они могут не успеть, у них планы. У одиноких людей редко бывают планы, но именно поэтому на любое предложение они сначала говорят: «Я занят». Надо осторожно. Лучше, если вы дадите им повод вас пожалеть. Например: я болен, некому сходить за продуктами. Но это цинично. Можно иначе: у меня праздник, не с кем отметить. Это такой праздник, что его можно отмечать только с самыми близкими людьми. Это вы говорите каждому из них поврозь, не предупреждая о наличии другого.</p><p class="p1">Позвали? Завтра они могут? Прекрасно. Подчеркните, что надо именно завтра, переносить нельзя. Предупредить за день — вполне по-джентльменски. Дальше начинайте готовиться. Изобретайте историю, выдумывайте повод. Радостный повод лучше — тогда, на обоюдном отталкивании от него, в общем раздражении от вашей радости они быстрее сблизятся. Но что, если они действительно хорошие люди? Что, если ваша радость их обрадует? Тогда празднуйте что-нибудь нейтральное, например, двадцатилетие профессиональной деятельности. Словом, выдумайте такую историю, чтобы завтра, в первый момент встречи, было о чем говорить. Нужно занять первые полчаса, а там пойдет. Не бойтесь подставиться, стать мишенью для острот. Помните: завтра мы собираем людей не для вас, а для них.</p><p class="p1">Зачем мы это делаем? Чтобы проверить степень своей демиургичности. Это важнейший критерий для свободного человека: можем мы устраивать чужие судьбы или нет?</p><p class="p1">Сегодня вы больше ничего не делаете, только готовитесь. Закупаете угощение. Есть вариант встретиться в кафе, но тогда надо выбрать хорошо знакомое кафе с интимной обстановкой. Кино не канает. Помните, они должны поговорить. Они должны уйти с сильным взаимным интересом — лучше бы вместе. Подумайте как следует, что предпринять. Какие их черты выявить завтра наиболее выпукло, чтобы они почувствовали взаимный интерес? Постарайтесь сделать вид, что встреча получилась сама собой — типа девушку вы приглашали, а друг зашел просто так и по другому поводу. Короче, выкручивайтесь, чтобы они только не заподозрили никакой нарочитости.</p><p class="p1">Хорошо организовать блюдо, требующее совместных усилий, коллективного открывания или группового приготовления. Старайтесь их сблизить, все эти жалкие усилия непременно сработают, ибо самый грубый метод — всегда верный. Не перетончите. Помните: никакого третьего, в смысле четвертого, считая вас. Вы должны взаимодействовать только втроем, но так, чтобы ни секунды не скучать. Учти те, чем больше смешных неловкостей, тем лучше: спонтанность и естественность прежде всего. И знайте: если бы вам даже пришлось пукнуть, чтобы их сблизить, — можно пойти даже на это. Не худший ход, между прочим. Но помните: лучше всего срабатывает серьезность. Вам нужен их совет или их помощь. Предлог должен быть как можно более органичен. Помимо юбилея это может быть ссора с девушкой (юношей), встреча с девушкой (юношей), решение вопроса об эмиграции, давно вас соблазняющей, и т. д.</p><p class="p1">И вот они пришли к вам. И если вы хорошо выбрали предлог, то они начинают наперебой вас утешать (и на этом, может быть, отчасти даже сближаются), а если вы хорошо выбрали блюдо — то они, имеющие прекрасные познания в кулинарии благодаря одинокой своей жизни, начинают с шумом и преувеличенным хохотом его готовить либо разогревать, и с каждым взрывом смеха, с каждой новой забавной неловкостью, с каждым их даже, пожалуй, биографическим либо поведенческим совпадением вы всё острее чувствуете: да, да!</p><p class="p1">Да, ничего не получается.</p><p class="p1">И это не потому, что вы не демиург, а потому, что ничего нельзя сделать.</p><p class="p1">Это надо почувствовать. Это очень важное чувство — беспомощность Бога. Потому что если бы мы не мешали, он давно бы все сделал, как надо, но вот беда — мы не хотим, не стыкуемся. То ли потому, что мы разные, то ли потому, что отвергаем помощь и втайне храним независимость, — но никак не получается устроить нашу судьбу извне, мы все можем сделать только изнутри. Не бессилие, нет, но именно беспомощность. Гоните-ка их в шею обоих, сославшись на плохое самочувствие. Без вас, может быть, что-нибудь и получится.</p><p class="p1">Думаю, что действительное изгнание из рая происходило именно по этой схеме.</p></span><span id="id66"><div class="title2">
<p class="p">16 сентября</p>
</div><p class="p1">1.</p><p class="p1">Сегодня мы формулируем ПЯТЬ наших просьб к Богу.</p><p class="p1">Запишем их в том порядке, в как ом они приходят нам в голову.</p><p class="empty-line"/><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="empty-line"/><p class="p1">В моем случае это было бы вот что.</p><p class="empty-line"/><p class="p1">1. Сделать климат в России чуть лучше, то есть среднегодовую температуру — порядка 20°C, как на уже упомянутом острове Мадейра.</p><p class="empty-line"/><p class="p1">2. Упразднить рак как самую неприятную и трудноизлечимую болезнь.</p><p class="empty-line"/><p class="p1">3. Дать людям врожденный ай-кью не меньше 130, потому что всё от ума — и милосердие, и совесть, и вкус. Такое общество было бы на редкость дружелюбным.</p><p class="empty-line"/><p class="p1">4. Отменить возрастную деградацию, чтобы старение не сопровождалось уродством и потерей трудоспособности.</p><p class="empty-line"/><p class="p1">5. Сделать загробную жизнь (наличие или отсутствие) вопросом личного выбора.</p><p class="empty-line"/><p class="p1">Расставьте эти просьбы в порядке важности. В моем случае эта иерархия выглядела бы так: 2–4–1–3–5 (потому что загробная жизнь, по-моему, и так вопрос личного выбора, см. 1 сентября).</p><p class="p1">Отметьте совпадения. То требование, номер которого в иерархии совпал с первоначальным, является НЕИСПОЛНИМЫМ. Проверьте, это всегда так.</p><p class="p1">Запомните второй (иерархический) порядок. Исключите из него совпадающие номера.</p><p class="p1">В моем случае получается 2–4–1–3.</p><p class="p1">Это ваш КОД ВЫБОРА.</p><p class="p1">Всегда, когда перед вами стоят какие-либо задачи или просто надо составить список продуктов для покупки, после составления списка выбирайте 2–4–1–3 (подставляйте свой код) и руководствуйтесь получившейся иерархией.</p><p class="p1">Так, если вам надо сегодня купить колбасы, хлеба, молока, туалетной бумаги, сыру и новые перчатки, вам нужно в первую очередь купить хлеба, туалетной бумаги, колбасы и молока, а сыр и перчатки не нужны вообще, по крайней мере сегодня.</p><p class="p1">С любыми другими последовательностями поступайте аналогично.</p><p class="p1">При необходимости ввести четырехзначный код — например, в ячейке на вокзале — пользуйтесь ТОЛЬКО КОДОМ ВЫБОРА.</p><p class="p1">Любое сложное действие раскладывайте на алгоритм из пяти ступенек и выполняйте его в той последовательности, которая получилась.</p><p class="p1">Повторяйте эти цифры про себя, как молитву, в любых стрессовых ситуациях.</p><p class="p1">Проверьте, этот код всегда работает. Из пяти вещей всегда нужны четыре, и главная всегда не первая.</p><p class="empty-line"/><p class="p1">ЗАДАНИЕ.</p><p class="p1">Выпишите пять блюд, которых вам сейчас хочется больше всего.</p><p class="empty-line"/><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="p1">_____________________________________</p><p class="empty-line"/><p class="p1">Примените ключ.</p><p class="p1">Съешьте желаемые блюда в правильном порядке.</p><p class="p1">2.</p><p class="p1">Но это не все.</p><p class="p1">Сегодня у нас день тревоги.</p><p class="p1">Если погода ясная, мы идем в любой ближайший сквер насладиться прощальным теплом. Или не обязательно в ближайший — может быть, у вас в городе есть на примете любимое место с деревьями, скамейками, клумбой, вообще с цветами — а какие теперь цветы? Бархотки, которые еще иногда называются бархатцы — так называют их неприятные люди. Бархатцы звучат ужасно. Бархотки, впрочем, тоже — так обычно называются мягкие тряпочки для протирания блестящего; но мы ведь усваиваем то название, которое раньше услышали. Для меня они всегда были бархотки, а календула — ноготки; и только они и цветут осенью в наших краях. Они достаивают до последнего, до первых заморозков. Приносить их домой бессмысленно — дома эти цветы сразу гибнут. Да и кого может посетить сентиментальное желание спасать их дома? Они предназначены сиять среди осени, привнося в ее пространство высокую тревогу.</p><p class="p1">Тревога — сложная эмоция, если, конечно, речь не идет о примитивном страхе или о непривязанном беспокойстве неясного происхождения; это состояния мучительные, и толку от них ноль, как от любой болезни вроде кори, в которой хорошо только выздоровление. Тревожиться в принципе не о чем, ибо все поводы для низменного страха, если вдуматься, бессмысленны. Ничего по большому счету не изменится от того, поступите ли вы в институт (допустим, поступите. Я знаю, что поступите. Но толку-то?), от того, уволят ли с работы… Вечный русский страх тюрьмы и сумы тоже ничуть не облагораживает душу, и даже роковой вопрос, две полоски или одна, не так принципиален, как кажется. Гораздо хуже, если ни одной, я даже затрудняюсь сказать, что это может значить. Наверное, вы умерли и сами не почувствовали.</p><p class="p1">Совсем иное дело — тревога высокого порядка, прекрасное состояние, бывающее иногда в первые дни осени. Это уже не то бурное цветение напоследок, какое замечаем мы в августе, не то прощальное умиление, какое случается в последних числах того же августа под особенно прозрачным небом, навевающем почему-то мысль об Аркадии, Касталии, Академии, — нет, это уже чахоточный румянец, болезненная рыжина. Это бархотки, ноготки и в особенности бабочка, которая так пленяла меня в детстве; моя самая любимая бабочка, которую я ни разу не поймал, потому что она летает очень быстро, бабочка фантастическая, ни на кого не похожая, с чудесно вырезанными крыльями, носящая столь же фантастическое название С-белое. Углокрыльница, нимфалида, она носит это название из-за белого пятна на внешней стороне нижнего крыла: действительно С. Она сравнительно небольшая, внешняя сторона крыльев темно-коричневая, а когда они развернуты — виден тот ярчайший, особенный, солнечный рыжий, который бывает только осенью и только на ясном закате. Это цвет увядания, безусловно, но пышного, яркого, и это-то и есть тревога в высшем смысле: состояние несоответствия между упадком — и тем, с каким подъемом он выражается. Ну, например. С чем бы сравнить. Чахоточная дева — она и есть чахоточная дева, и я никогда, слава Богу, ее не видел, но декаданс, деграданс — это да-с. Это такой цветущий, пышный, роскошный упадок, который в тысячу раз ярче любого серого рассвета (и где ему набрать красок? Он вообще еще черно-белый, еще не видел ничего). Рассвет неопытен, он только-только после ночи; у него есть будущее, но нет богатства, двойного и тройного дна. Напротив, упадок — полноцветный, страстный, которому есть что вспомнить, — это и есть настоящий расцвет, но в последнюю минуту; это острый, насыщенный, пламенный рыжий — и тревога, высокая, чахоточная, как раз проистекает от зазора. Мы понимаем, что остались, в общем, минуты, — но почему тогда все так пиршественно? Нет, что-то нам врут, что-то здесь не в порядке; не смерть предстоит нам, а…</p><p class="p1">Ради этого состояния идем в сквер или хоть в дачный садик, если он поблизости, и долго смотрим на бархотки и ноготки. И, если нам повезет, на С-белое, свою резную душу, которая так быстро летает. Почувствуем ту тревогу, от которой не хуже; в которой нет унизительного страха и вечной зависимости; иными словами, ту тревогу, которая возникает от соседства подлинной реальности. Обычно эта реальность скрыта, но осенью занавес истончается, сквозь него дует. Почему так странно, порывисто, угловато летает С-белое? Потому что на нее дует ветер оттуда. И солнце такое рыжее, и клены уже почти того же цвета; это состояние больше всего похоже на жизнь, которая так тревожна именно потому, что явно идет к концу, а все-таки не может кончиться просто так.</p><p class="p1">Ровно час проводим на лавочке, созерцая бархотки и, если повезет, С-белое.</p><p class="p1">В случае дождя смотрим титры и первый эпизод фильма «Чужие письма» с музыкой Олега Каравайчука, выражающей примерно то же состояние.</p><p class="p1">Одновременно можем съесть большое холодное яблоко, вызывающее примерно те же чувства.</p></span><span id="id67"><div class="title2">
<p class="p">17 сентября</p>
</div><p class="p1">Сегодня мы идем в лес по грибы.</p><p class="p1">Самое время, потому что дальше будет поздно.</p><p class="p1">Если сегодня хорошая погода, отправляемся из дома в 8:00, если плохая — в 10:00. Слишком рано за грибами выходить незачем. Это наивное убеждение советских грибников, что будто бы чем раньше, тем лучше, а то другие всё соберут. Во-первых, в сентябре уже не соберут. Во-вторых, у советского — а может, и русского, еще раньше, — человека было убеждение, что ранний подъем — своего рода жертва. «Кто рано встает, тому Бог подает» и т. д. Бог подает тому, кто меньше беспокоит его стонами, ахами, охами. Встал, выспавшись, и пошел — и гриб тебе навстречу.</p><p class="p1">В записных книжках Венедикта Ерофеева, кое-что кое в чем понимавшего, находим подробнейшие таблицы — сколько грибов он набрал. Сколько белых, сколько сыроежек и т. д. Возникает естественный вопрос — зачем ему это? Поясняем: он пытается понять степень своей удачливости, а удачливость есть не что иное, как уровень нашей встроенности в мир. Если мы туда как следует встроены, первыми это почувствуют грибы. Или, точнее, уровень нашей интуиции возрастет настолько, что мы сможем легко обнаружить гриб даже в сыром и уже холодном осеннем лесу. Летом его любой дурак найдет, а ты пойди найди его сейчас.</p><p class="p1">Время нашего грибособирания следует вычислить по точной формуле: возьмите ИА (Индекс Активности) и умножьте на свой Финансовый Индекс. Первая цифра получившегося числа как раз и будет временем, которое вам отведено. В моем случае это два часа.</p><p class="p1">Грибы, найденные по истечении этого времени, недействительны.</p><p class="p1">Удачи.</p><p class="p1">Начали!</p><p class="p1">Хорош осенний лес. Все в нем готовится к зиме, подводит итоги. Паутина липнет к лицу. Страшное количество бурелома, через который приходится перешагивать, а то и тяжело перелезать. Народу почти никого, если только все не вылезли проходить «Квартал». Если вылезли — это объяснимо: кризис в мире, где еще взять деньги? Но поскольку народ ленив и мало верит в чудесное, вряд ли вам встретится больше трех грибников, и все будут ревниво прятать друг от друга найденное. Хорошо бродить по лесу с палкой, которую тут же для себя сломаешь и выстругаешь. Пришвин замечал, что грибники, дураки, смотрят под ноги — а в лесу надо смотреть вверх, это гораздо красивее. Но я так не думаю — сверху все одно и то же, небо да ветки, а внизу все разное. И так легко принять желтый лист за сыроежку, а осенний валуй — за боровик. Обманываться и разочаровываться всегда полезно.</p><p class="p1">Можно, кстати, взять с собой жену, детей, друзей. Собаку тоже можно. У вас ведь теперь есть собака. Она бегает, лает, всё веселее. А то ведь это такой ужас, такая грусть — это кроткое приготовление русского леса к увяданию. Можно подумать, что все эти листья, кустья, стволья в чем-то виноваты. Почему одна часть земного шара может оставаться вечнозеленой и тропической, а другая должна проходить через ежегодный тренинг умирания? Все равно ведь подготовиться ни к чему нельзя, и урок природы почти всегда не впрок. Она-то возродится, а мы нет. Впрочем, такие мысли обычно посещают того, кто грибов не находит. Остальным все мысли заменяет азарт, а если вы попадете на так называемые ведьмины круги (не следы НЛО, а сыроежные круги, разросшуюся грибницу), вам вообще не до мыслей. Стряхиваем с гриба разъевшегося слизня, отлепляем приставший листок, жадно наполняем корзину, оставшуюся с дедовских времен, — старую, ивовую, почти черную, — радуемся напоследок, вдыхая острую прель. Особенное удовольствие — отдирать с мокрой коры крепкие веснушчатые опенки. И что это люди говорят, что нет в жизни никакого смысла? Смысла нет, когда грибов нет.</p><p class="empty-line"/><p class="p1">Собрали? Теперь подсчитываем.</p><p class="p1">БЕЛЫЕ. Сначала записываем количество белых. Если не нашли ни одного белого, принимаем это количество за 1. Если нашли — умножаем на 3.</p><p class="p1">ПОДОСИНОВИКИ. Это по нынешним временам гриб редкий, почему-то их почти не стало. Кстати, насчет его симбиоза с осиной всё полные враки. Его так называют за шляпку, красную, как осиновый лист. Их количество умножаем на 2.</p><p class="p1">ПОДБЕРЕЗОВИКИ. Третий гриб в среднерусской иерархии. Записываем как есть.</p><p class="p1">ВОЛНУШКИ. Четвертый гриб в моей личной иерархии. Как называла его женщина, значившая для меня очень много, — помесь детского мыла с махровым полотенцем. Они очень вкусны в маринованном виде (просто отварить с солью и уксусом, получаются такие хрусткие) и встречаются крайне редко. Их количество умножаем на 2.</p><p class="p1">СЫРОЕЖКИ. Это несколько разрядов, всё не так просто.</p><p class="p1">Зеленые (они же зеленухи, так называемая aeruginea). Считаются вкуснейшими, крепчайшими и вообще элитными. Умножаем на 1,5.</p><p class="p1">Желтые — следующие за ними во вкусовой иерархии, довольно редкие. Пишем как есть.</p><p class="p1">Охристые, похожие на творожник, как говорит мать, — мои любимые, еще и потому, что они, как правило, большие. Ochroleuca, охристая, и aurata, золотистая. Говорят, они растут быстрее всех. Умножаем на 1,5.</p><p class="p1">Красные. Они встречаются чаще всего и считаются едкими (неправда), но вообще это вид примитивный, и хорош он только тем, что с них обычно начинается грибной поход. Сколько бы я ни ходил за грибами, всегда мне первыми попадаются две красные сыроежки, большая с маленькой, как бы мама с дочкой. Я их люблю, но все же делим на 2 — это грибное простонародье.</p><p class="p1">Вообще сколько есть видов сыроежек, оказывается, — я не мог себе представить! Сыроежка приятная, невзрачная, миндальная, лазурная (сроду не встречал, говорят, растут в Сибири под кедрами), девичья, пурпурная, припудренная, розовая, изящная, мягкая, тошнотворная, зловонная — как подумаешь, к чему могут относиться все эти эпитеты! Какой вопрос для «Что? Где? Когда?»! Лично я подумал бы, что все это про нее, матушку, откуда вышли все народы, — «кормилицу», как называют ее в известной среде; и в некотором смысле она действительно сыроежка.</p><p class="p1">СВИНУХИ. Лично я их не беру, но некоторые любят. Хороши в сметане. Делим на 3.</p><p class="p1">МУХОМОРЫ. Красный, блестящий, помидорный мухомор нынче редок. Собирать их не надо, но запомните, сколько раз встретили, и тоже приплюсуйте.</p><p class="p1">Теперь подсчитывайте.</p><p class="p1">Делим на использованное количество часов.</p><p class="p1">Получаем так называемый Грибной Рейтинг Удачи, или ГРУ. Это жизненно важный показатель. Запоминаем его. Хочу, ребята, честно вам сказать, что если он меньше 5, то лучше вам не продолжать «Квартал». Можно, конечно, и продолжить, ничего страшного. Но шансы исчезающе малы, потому что предыдущие два месяца ничему вас не научили. Что ж мучиться-то? Может, книжку почитать?</p><p class="p1">Впрочем, завтра все выяснится.</p></span><span id="id68"><div class="title2">
<p class="p">18 сентября</p>
</div><p class="p1">Здесь начерчены семь квадратиков.</p><p class="p1">Тщательно вырежьте их.</p><p class="p1">На каждом квадратике — одно сегодняшнее действие.</p><p class="p1">Какое выпадет, такое и выполняйте.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_010.png"/>
</div><p class="empty-line"/><p class="p1">Поясняю. 18 сентября — та стадия в прохождении «Квартала», когда его потенциально слабые участники должны покинуть прохождение и не мучиться. Пацан обещал — пацан сделал.</p><p class="p1">Посещение неприятной (или пугающей) улицы тоже косвенно связано с этим: момент сегодня переломный, и вы либо достигнете пика силы, либо свалитесь в депрессию. Учтите, что сама по себе неприятная улица может не сулить ничего неприятного: просто с вами там что-то такое было, не очень радостное. Ну и ничего страшного. Попытайтесь поставить красную метку на месте черной. Например, возьмите с собой бутылку пива и выпейте там, где у вас когда-то отняли телефон; или почитайте прекрасную книгу на той же скамейке, где вас когда-то бортанула девушка; или просто пройдитесь по этой улице, свежий, бодрый, после ванны, с чистой и пустой головой. Вы увидите, что осенью и эта улица имеет бедный, бледный вид, и ее стоит пожалеть, и вообще — на фоне стремительно облетающей (уже!) листвы, на фоне ожидающей всех катастрофы так ничтожны наши прежние воспоминания! Ведь когда улицы «Квартала» принимали свою окраску, было совсем другое время. Еще не все могло с нами случиться, еще от многого мы были защищены. Еще работала какая-то этика. А сейчас, когда все так серьезно, когда из всех щелей поддувает ветер уже не нашей личной, не только русской, а всемирно-исторической расплаты-за-всё, — какая разница, что у нас было на этой улице? Может, как раз на ней нас что-то спасет, удержит от тоски, даст передышку.</p><p class="p1">Один я, один, до какой степени я один. Я понимаю, а никто еще не понимает; я вижу, а никто еще не видит. И, как всегда, множество людей говорит: все это оттого, что вы вашу личную ситуацию — последнего представителя вырождающейся прослойки — проецируете на общую. «Эсхатологические настроения характерны для гибнущих классов», как формулировала Н. Я. Мандельштам, цитируя, в свою очередь, Сартра. А это еще вопрос, кто гибнет. Я еще, что называется, простужусь на ваших похоронах. Вы думаете, как всегда, первыми умные подохнут? Умные подыхают вообще последними, они умеют выживать, ползти, цепляться. Это — кроме самых умных, тех, которые вообще не рождаются.</p><p class="empty-line"/><p class="p1">Новая обувь нужна по-любому, потому что посмотрите, в чем вы ходите. Скоро уже холода. Вообще же покупка новой обуви — важный метафизический шаг, от этого зависят походка и настроение. Мне выпало сегодня именно это — вот пойду и куплю. Хоть какая-то защищенность. Вообще напрасно многие пренебрегают чисто женским антидепрессантом: великая вещь — покупки.</p><p class="empty-line"/><p class="p1">А если выпали — что поделаешь, до свидания, все равно через пару недель такая развилка, через которую пройдут очень немногие, да еще и выход там сложный. А здесь — просто спрыгнули, и до свидания. Обратите внимание, разрывы, приходящиеся на 18 сентября, всегда легки, необременительны, почти праздничны. В этот день, например, умер Джимми Хендрикс, хорошо покуривший марихуаны и заевший ее девятью снотворными таблетками. Небось и не заметил, как помер.</p></span></span>
