<p class="p">16 июля</p>
</div><p class="p1">Сегодня вы должны составить план Квартала.</p><p class="p1">Квартал — место, где вы живете. Если вы живете в сельской местности, это ваша деревня или село. Если в городе — все совсем просто: это ваша улица от перекрестка до перекрестка, квадрат, ограниченный двумя улицами и двумя переулками, со всеми кафе, магазинами, тайными ходами и скверами, которые там расположены. Как вы разместите эти названия на карте Квартала, ваше личное дело. Названия, которые вы им дадите, — тоже. Как пользоваться этими названиями — показано в небольшом пособии под названием «Маршрут».</p><p class="p1">В Квартале должны быть:</p><p class="p1">1.</p><p class="p1">Улица (переулок) благих начинаний, вызывающая у вас добрые чувства. Она же Квадрат счастья. Ведь вы давно здесь живете. Здесь должно быть место, которое вам нравится, которое вызывает чувство защищенности, блаженства, освобождения. Может быть, вы когда-то здесь впервые прочли интересную книжку, а может, почему-то эта улица напоминает вам Париж, Барселону, Сидней, сколько там еще на свете прекрасных мест, испорченных пошляками. Но в Париж и Барселону пошляки ездят и пачкают их своими сальными травелогами — что-нибудь типа «Необходимость путешествий» или «Невозможность путешествий», про то, как они открыли для себя Гауди или закрыли Ван Гога. А на эту вашу улицу они не приедут никогда, и это гораздо более настоящий Париж, чем тот, в который вы рано или поздно попадете. Или уже попали — и все поняли.</p><p class="p1">2.</p><p class="p1">Точка, где вы всегда чувствуете опасность. Такая точка обязана быть в любом Квартале. Откуда берется это чувство — я сам не скажу. Может, когда-то вас тут чуть не переехал мотоцикл, а может, здесь вас подстерегал в детстве отвратительный тип, вымогавший деньги. Но чаще всего это иррационально. Бороться с этой точкой мы не будем, потому что иррациональное чувство опасности чаще всего правильное.</p><p class="p1">Иногда — довольно часто — эта точка может оказаться в одно время опасной, а в другое благоприятной. Скажем, на закате она опасная, а на рассвете, напротив, благоприятная. Ночью она вообще невыносимая, а днем просто противная. Тогда у нее должны быть два названия. Кстати, если эта точка действительно амбивалентна — то есть иногда благоприятна, а иногда нет, — вы относитесь к группе «Б», и для вас будут дополнительные упражнения.</p><p class="p1">3.</p><p class="p1">Улица, которую вы торопитесь поскорее пройти, потому что на ней одолевают неприятные чувства или воспоминания. Возможно, вы еще эту улицу не определили. Тогда она должна у вас определиться в ходе упражнений. Вам все равно сегодня обходить Квартал, вот и заметите. Может быть, она просто сулит вам физические неудобства, там идет стройка, и приходится делать крюк, а может, у вас одышка, и там неприятно идти в гору, а потом под гору. Короче, это улица скуки, неприятных размышлений, стыда за прошлое. Такая улица есть всегда. Иногда это связано с неприятным, угрюмым домом, стоящим на ней, а может, там находится ваша бывшая школа. Не путайте это место с точкой опасности: скука — совсем другое дело.</p><p class="p1">4.</p><p class="p1">Точка (сквер, перекресток), где с вами обязательно произойдет что-то важное, скорее хорошее. Еще не произошло. Но произойдет обязательно. Мы всегда чувствуем эти места рядом с домом: может быть, возвращаясь из школы (с работы), мы думали, что встретим там единственную любовь, абсолютное взаимопонимание. А может быть, именно на этой улице мы хотели бы услышать телефонный звонок о присуждении нам Нобелевской премии — то есть именно там хорошо обозреть пейзаж и удовлетворенно сказать: я всегда это знал. А может быть, мы просто чувствуем, что здесь, в этом доме, родится ребенок, который спасет мир. Такое тоже бывает. У меня, например, такой перекресток есть, и именно на нем планируются особенно важные действия. Если у вас еще нет такой точки, обойдите Квартал еще раз и хорошо подумайте. Не прислушайтесь к себе, это чаще всего бесполезно, — а просто подумайте. 16 июля — отличный день, чтобы хорошо подумать.</p><p class="p1">5.</p><p class="p1">Улица, на которой всегда приходят хорошие мысли, творческие решения, просто удачные строчки. Если она находится вне вашего Квартала, в другой части города, — не страшно. Просто включите ее в Квартал. Необязательно ведь ограничиваться окрестностями дома. В конце концов, весь мир — наш Квартал. Назовите ее как хотите, но так, чтобы в ее названии была отражена эта главная особенность — стимулировать творческие способности. Подчеркиваю, это не улица Удачных Финансовых Решений или Выгодных Вложений. Это улица, на которой вы чувствуете внезапную способность перерасти себя, получить откуда-то прекрасные стихи или точный поступок. Лучше, конечно, чтобы она была поближе к дому — удобней. А то вдруг она за границей? Как вы будете туда летать, чтобы выполнить задания, относящиеся к ней?</p><p class="p1">6.</p><p class="p1">Улица, ассоциирующаяся с любовью или ее ожиданием, на которой вам чаще всего встречаются влюбленные. Или сквер. Или угол. Но именно там ближе к весне появляются парочки, на которые вы смотрите с завистью, или сами вы там назначаете встречи под часами, или просто в этой точке Квартала вас всегда томит мысль о любви, о том, что настоящая жизнь проходит мимо вас, и это ваш личный выбор. Возможно, это просто улица, где много сирени, или арка, где особенно удобно целоваться.</p><p class="p1">7.</p><p class="p1">Улица дождя, то есть именно та часть Квартала, которая всплывает в вашей памяти при слове «дождь». Первая ассоциация с дождем. Место, где хорошо от него прятаться, или точка, где вы по-настоящему промокли, или подворотня, где увидели собаку, прячущуюся от дождя, и подобрали ее или просто прошли мимо. Иногда никаких личных ассоциаций нет — а просто эта часть Квартала всегда представляется вам мокрой, с дробящимися отражениями, с фонарем, из которого хлещут струи, как из душа.</p><p class="p1">8.</p><p class="p1">Место, где дети катаются со снежной (ледяной) горки. Такое место обязательно есть в любом Квартале, потому что в любом Квартале есть дети, а дети не могут без горки. Она может быть металлической, деревянной, искусственной — а может быть холмом вполне естественного происхождения, просто с него хорошо съезжать на попе.</p><p class="p1">9.</p><p class="p1">Недоступная точка. Место, где вы никогда не бывали. Это может быть посольство, куда никого не пускают, или двор закрытого учреждения, или просто смрадная помойка, куда никто не заходит. Или, что вероятней всего, вы просто ходите всю жизнь мимо этого угла, а туда никогда не заглядывали, потому что времени не было или страшно. В любом Квартале есть точка, мимо которой вы ходите, даже если прожили тут всю жизнь. Найдите это место, спросите себя, почему вы никогда не заходили сюда, и дайте ему название Атлантического переулка, от слова «Атлантида». В остальных названиях вы свободны, но это — обязательное.</p><p class="p1">10.</p><p class="p1">Место, которое изменилось сильнее всего. Это может быть улица, а может быть один дом. В любом случае это точка, которая за последние два-три года претерпела наиболее радикальные изменения. Или построили дом, или снесли, или был елочный базар, а стало место торговли арбузами, или был прелестный магазин сувениров и смешных игрушек, а стал отвратительный, промасленный магазин запчастей. Или был сквер с песочницей, а стала стройплощадка, и скоро здесь вырастет новый банк, уже заранее отравляющий всю атмосферу на 100 метров в диаметре. Точка перемен, одним словом. Такая есть почти в каждом Квартале. Например, было дешевое студенческое кафе, закрыли, сделали китайский ресторан, снесли, построили спа-салон, закрыли, открыли отделение сбербанка, закрыли, теперь вообще ничего нет. А потому что не надо закрывать студенческое кафе, люди там радовались, а теперь им радоваться негде, и в силу их обиды и разочарования быть пусту месту сему.</p><p class="p1">Карту надо начертить на ватмане, чтобы было красиво. Как пользоваться Кварталом — лучше всего это умеют подростки, наделенные воображением, — рассказано в следующем фрагменте.</p><p class="empty-line"/><p class="p1">МАРШРУТ</p><p class="p1">Слим задержался в подъезде, оттягивая выход. Идти страшно не хотелось, но надо было кормить семью. Семье надо есть, вот в чем дело. Жаль, что этим ни перед кем не оправдаешься. Грузная соседка, забыл как зовут, вскарабкалась по ступенькам и проползла мимо. Слим сочувственно поздоровался. Сейчас он радовался даже ей — все-таки своя, сюда еще неизвестно, вернешься ли.</p><p class="p1">Связной должен был ждать его на улице Красной Собаки, в четверти часа неспешной ходьбы, но сегодня надо было идти медленно, смотреть очень внимательно. Карвер подобрался ближе, чем когда-либо. Все было пропитано его дыханием, даже лифт гудел недоброжелательно. Бывают такие дни. Спускаясь, Слим правым локтем коснулся перил, а левой рукой провел по дребезжащим серым почтовым ящикам: он понимал бессмысленность этих ритуалов, но когда однажды со страшным усилием ими пренебрег — лучше не вспоминать, что было.</p><p class="p1">Оказавшись на улице, он первым делом засек время: 17:45. И погода, как назло, стояла отличная, в такую погоду бы куда угодно, только не на маршрут, маршрут он ненавидел, а проделывать его приходилось дважды в неделю. Он прикинул: как сегодня — через Святительскую или по Змеиной? По Змеиной дольше, но безопасней: петляет, хуже просматривается. Выключил мобильник. Лучше бы вообще оставить дома (Слим не знал уже толком, где дом, но настоящий был так далеко, что приходилось называть так это скудное жилище с несчастными, близорукими, непонятливыми соседями, завязавшими свои жизни в такой невообразимый узел), однако ровно в 17:00 надо было просигналить, отфиксироваться на так называемой базе. Сунул мобильник в карман, ноги сами понесли на Змеиную, но не прошел и шести шагов, как сзади деликатно шаркнули, и Слим, оглянувшись, увидел своего агента, Рыжего: имен собственных ангелов-хранителей он не знал, так меньше было риска, что выдаст их, если дойдет до худшего. Странно, он ни о чем не предупреждал Рыжего — должно быть, тот торчал у окна от нечего делать, чистая, трогательная душа; сидел на подоконнике, как любил сам Слим, глядя на улицу, чувствуя тепло от батареи — конец сентября, только что затопили, — увидел, что человек вышел на маршрут, ну и выбежал, безмолвный спутник. Но сегодня рисковать Рыжим было нельзя, а палить Рыжего — и подавно. Слим никогда не заговаривал с ним. Была система знаков, выработанная в молчаливых диалогах по общему согласию: Слим остановился и посмотрел на часы, почесал в затылке и снова посмотрел. Рыжий должен был понять, он понимал всегда.</p><p class="p1">Но на этот раз, как назло, он ничего не понял — застыл в пяти метрах позади и тоже принялся чесаться. Что он хочет? Если бы отвернулся, Слим бы понял, это означало бы: иди себе, я по своим делам. Но он стоял, уставившись на Слима, бедный дурак — почему у меня в добровольной охране только такие простые души, неужели я сам какой-то больной, что притягиваю только их? Слим топнул правой ногой, ноль реакции. Ну же, ну, умолял он, догадайся хоть как-то, ведь у вас, дураков, говорят, телепатия развита. Иди домой, сегодня опасно. На его счастье, в этот момент вниз по горбатой Змеиной дунула серая кошка, тощая и драная, с ближайшей помойки — Рыжий отвлекся, и Слим поспешно свернул во двор. Он пересек его наискось, прошел мимо скрипучих качелей, на которых вяло раскачивалась, толкаясь одной ногой, девочка в красном беретике, и оказался на Повстанческой с ее желтыми березами и кривыми, старыми липами. Красный берет, подумал он. Нет, это вряд ли. Совсем уже сдвигаюсь.</p><p class="p1">Он поглубже засунул руки в карманы и стал подробно продумывать маршрут — это был лучший способ успокоиться: допустим, Повстанческая. Радости мало, но для такого дела семь верст не крюк. Грех сказать, он не любил эту улицу, потому что именно на ней тогда… впрочем, мы договорились об этом не. Теперь нам короче всего будет через Пьяную, если только там не пристанет хвост… оставь, осадил он себя, с какой стати хвост? Кто вообще мог предположить, что тебя понесет в противоположную сторону? Дальше мы срезаем через Французскую, берем вправо на Аптечной — и вот она, пожалуйста, Красная Собака, хоть и с другого конца. Он усмехнулся. А ведь и погода прекрасная. Конец сентября, а какая густая синева, ни в каком марте такой не увидишь. И эта старая клумба с торчащими сухими стеблями, живого только и осталось — вечно цветущие бархотки, ярко-оранжевые, уже потемневшие по краям. Тревожное было в бархотках, он что-то забыл. Никогда нельзя идти дальше, если что-то забыл. Он обошел клумбу. Хорошо бы сейчас тринкету, моду на тринкеты ввел Смайлс, прелестный человек, один из немногих понимающих, — и его, как всех понимающих, перевели, и вот уже год они не виделись. Смайлс уверял, что тринкета прибавляет ума, они всей компанией тогда ходили с этими баллончиками, посмеиваясь над собой, а все же немного шикуя. Но тринкеты не было, и Слим сосредоточился без нее. Нечетное число, вспомнил он. Французская исключена.</p><p class="p1">В другое время Французская была лучшим выходом: короткая, уютная, зеленая, не содержавшая в себе ничего французского, но что же делать, он там на скамейке читал когда-то именно о Париже, и с тех пор Париж связался с улицей безвестного героя со скучной фамилией. Он давно привык к этой личной топографии, чтобы даже во сне не проговориться об истинном маршруте. 29-е, какая уж тут Французская. Возьмут сразу, не посмотрят, что трижды кавалер. Что же делать, что же мне делать, соображал он лихорадочно, не забывая посматривать по сторонам: проехал велосипедист, прошла старуха с собакой, хвоста не было. В смысле у собаки тоже не было, мопс. Слим усмехнулся. Хорошо, если не Французская, у нас есть Забытый переулок. Как всегда, о нем вспоминаешь в последний момент. Да, но это еще пять минут задержки. Ничего, сказал он себе. Перетерпят. В конце концов, связь нужна им, а не мне. И он решительно отправился на Пьяную.</p><p class="p1">— Здоро́во, — сказала Вэл.</p><p class="p1">Вот уж кого он не ожидал встретить — и не мог сразу решить, хорошо это или плохо, что на углу стоит Вэл, независимая, спокойная, дикая, удивительным образом сочетающая надежность и опасность. Он был испуган и счастлив одновременно. Он никогда не знал, как вести себя с Вэл. Он знал только, что страшно рад ее видеть, не видел уже две недели, и хотя она понятия не имела о маршрутах, о Карвере, обо всей безумной паутине сложнейших обстоятельств, в которую превратилась его жизнь, — иногда ему казалось, что она знает всё и больше, чем все. Женщины, они умеют это. И вышла она сейчас не просто так, а потому, что почувствовала, каково ему на самом деле.</p><p class="p1">Вэл вела странную жизнь. Слим не знал толком, здесь она живет или на окраине, и возраст ее назвал бы лишь приблизительно, и даже цвет глаз не вспомнил бы, хот я она смотрела прямо на него, даже, пожалуй, не без вызова. Но, несмотря на всю эту неопределенность, в главном он не сомневался: на всем маршруте Вэл была единственным человеком, который не предаст, ах, нет, и это не так, и как не идет к ней само это слово, — просто она была единственной, кому он рад, не той убогой радостью, с какой провожал в подъезде старуху, а той, которая настигала его иногда, весенними вечерами, в Забытом переулке.</p><p class="p1">— Здоро́во, — сказал он небрежно.</p><p class="p1">— Куда идешь?</p><p class="p1">Он вздрогнул. Это был пароль, но вчерашний. Дуры бабы, вот так всегда с ними: скажет не подумавши, а серьезный человек голову ломай.</p><p class="p1">— Да есть тут у меня, — сказал он со смешком, — одно дельце.</p><p class="p1">— Слыхал, чего с Серым сделали?</p><p class="p1">Ого, понял Слим. Все она знает, нечего было от нее прятаться. Конспиратор, щенок.</p><p class="p1">— Рассказали, — кивнул он.</p><p class="p1">— Серый сам виноват, — сказала она торжествующе. — Я ему когда еще говорила, а он говорит — ничего не будет, я знаешь под кем хожу? Доходился.</p><p class="p1">— Слушай, это, — сказал Слим, не желая поддерживать опасный разговор. — Мы бы, может, сходили как-нибудь, а?</p><p class="p1">— Куда сходили? — спросила она настороженно, подойдя ближе, и это был уже совсем явный знак — опасно, говорила она, иди отсюда сейчас, говорила она.</p><p class="p1">— Ну в кино, — с последней надеждой произнес Слим. Это значило: шанс есть, я не Серый, я хожу под теми, кого ты не знаешь.</p><p class="p1">— Чего там делать, — сказала она и покусала губу. Ей не надо было этого делать, он и так понял. В этом было уже прямое унижение, хуже, чем тогда, на Повстанческой.</p><p class="p1">— Ну в театр, — сказал он уже нагло. Она не могла не ответить на этот вызов. Слим не удивился бы даже пощечине. В конце концов, мелькнуло у него в голове, перед кем притворяемся, зачем вся эта конспирация? Разве что ее слушают… — В театр, а?</p><p class="p1">— Совсем ты ваще, — сказала Вэл, но в ее голосе он явно слышал одобрение.</p><p class="p1">— Да просто так можно куда угодно, — проговорил Слим, осмелев. — Не сейчас только, меня ждут сейчас.</p><p class="p1">— Кто тебя ждет-то, — ответила она с великолепно разыгранным пренебрежением, но он мгновенно подсчитал в уме: 13 букв. Значит, засады нет, и она знает.</p><p class="p1">— Да уж есть кому. («Спасибо. Я знал. Завтра здесь же».)</p><p class="p1">— Мелочь есть? — спросила она. — Коктейль хочу.</p><p class="p1">Не может быть, чтобы у Вэл не было денег. Но тогда это значит… Черт!</p><p class="p1">— Лишних нет, — ответил он грубо.</p><p class="p1">— Ну и топай валяй.</p><p class="p1">Он улыбнулся ей нежно и благодарно. Это значило: пока я здесь, путь свободен. Он прошел еще сто метров, оборачиваясь: она так и стояла у стены, нога согнута в колене, руки скрещены на груди. Еще бы ей сигарету, и совсем бы классический вид. Но он так и думал о ней с благодарной нежностью: то, что Вэл стояла на углу, означало, что прямой опасности пока нет. Под ее взглядом ничего не могло случиться. И следующий укол тоски он почувствовал, только дойдя до остановки «Школа».</p><p class="p1">О, проклятый режим; Слим, может, потому только и вошел в Лигу, что не мог больше спокойно жить в мире, где такие места называются школами. Сотни, тысячи людей ходили мимо и понятия не имели, что в действительности делается там, за этими стенами, в подвале-лабиринте, выдаваемом за бомбоубежище, в длинной пристройке, которую снаружи принимали за спортзал. Цитадель, пыточная камера, тюрьма, казарма, инкубатор, все вместе — каждый этаж отвечал за свое, но всех обманывал идиллический фасад с профилями, спортплощадка с баскетбольными кольцами, цветы на окнах… Если бы они на миг представили, что там делается, — они обрушили бы забор, повалили охрану, выдавили решетки первого этажа; но никто не решался сказать вслух, а может, уже и не поверили бы. Растление дошло до того, что перестали верить очевидному: тогда, на Повстанческой, многие видели, но никто даже не остановился. Слим знал это место, столько раз, рискуя жизнью, проникал сюда неузнанным, наизусть, разбуди его ночью, рассказал бы, где какой кабинет, — но сейчас прошел мимо, стараясь не смотреть направо. Внезапно его прошиб холодный пот: надо было позвонить, отметиться — а он так далеко от базы; о черт. Ничего, скажем отсюда. Но не на улице же было делать контрольный звонок — он осмотрелся и быстро зашел в арку. Оттуда хорошо просматривалась улица и виден был кусок двора, заваленного каштановой листвой.</p><p class="p1">— Да, — сказал он, когда отозвались. — Я на полпути примерно.</p><p class="p1">— Почему на полпути? — с неудовольствием сказал Папа. Кто придумал эту кличку для человека, сроду никого не назвавшего «сынок»? Вечно эта потребность очеловечивать начальство.</p><p class="p1">— Там надо было обойти, — сказал он уклончиво.</p><p class="p1">— Что обойти?</p><p class="p1">— Дорожные работы.</p><p class="p1">— Где, какие дорожные работы?</p><p class="p1">Идиот, выругался про себя Слим. Кретин. Когда они выучат коды?!</p><p class="p1">— Я перезвоню, — сказал он.</p><p class="p1">— Слушай, — буркнули в трубке. — Не забывай, что сегодня суббота.</p><p class="p1">— Я такие вещи не забываю, — огрызнулся Слим и отключился. Слава богу, теперь никаких звонков до объекта. Он проверил на всякий случай бумаги, которые должен был передать связному: на месте. По двору на бесконечно печальном самокате ехала бесконечно печальная толстая девочка. Мир был полон угнетения, и если бы не Забытый — Слим бы так и не улыбнулся за весь маршрут; но Забытый искупил бы дюжину таких путешествий.</p><p class="p1">Есть места, где хорошо, и Слим догадывался, почему. Вероятно, здесь был портал, через который он мог бы вернуться домой, и вернется рано или поздно, когда поймет наконец, в какой последовательности производить уже угаданные действия (более сильные чувства вызывал третий справа клен, восьмая скамейка, почему-то очень нравился желтый кирпичный дом, по которому так скользило солнце, придавая ему цвет совершенно уже нездешний). Вообще в Забытом все указывало на другой мир, из которого сюда просачивались небывалые краски: иногда какое-нибудь зеленоватое рваное облако на горизонте, на фоне подъемного крана, говорило больше, чем всякая книга, чем любое кино. И люди здешние словно подмигивали, они были Слиму приятны, и он им был приятен, просто так, ни за что. Везде листья гнили, а здесь шуршали, и рос на повороте странный куст с красными ветками — по весне, когда начиналось движение соков, они прямо-таки пламенели, и Слим не знал, что за куст, а спросить не решался, потому что сразу выдал бы себя. Он знал, что опаздывает, но позволил себе постоять в Забытом минут пять, не больше, и впервые с дивной ясностью увидел последовательность, которую — не сейчас, конечно! — надо было применить для перехода, нельзя было пренебрегать возможностью, надо досмотреть… но тут все переменилось, это длилось долю секунды, и мир, в котором он очнулся, был уже мир Карвера. Оказалось, и Забытый ни от чего не спасал.</p><p class="p1">— Тты ббл, — сказал ему на варварском наречии адский местный с совершенно белыми глазами. Злоба, переполнявшая его, искала выхода, он словно лопался по всем швам, потому и таращился так.</p><p class="p1">Слим смотрел на него, понимая, что последнюю степень защиты в этих обстоятельствах применять нельзя — нельзя ни по какой конвенции, ни при каких вводных, этого не простят, будь ты кавалер хоть трижды, хоть десятижды. Он не мог сказать ни слова, и все-таки даже теперь на дне его души шевелился не ужас, нет, то было любопытство: он еще не встречал таких и хотел знать, как они действуют. Жаль ему было только связного.</p><p class="p1">— Ххль тты тттудт, — повторил белоглазый невнятней прежнего. — Ттты, тты хххухль.</p><p class="p1">Но Забытый есть Забытый, и в следующую секунду Слим был чудесно спасен — по крайней мере от этой опасности, явно не последней, как подсказывала медленно наполнявшаяся болью голова. Из подъезда выскочила женщина изумительной роковой красоты, несколько волчьей, с заостренными и явно нездешними чертами — портал, портал, даже не уговаривайте! — и, ни звука не произнося, несколько раз ударила белоглазого полотенцем, а потом ухватила за лапищу и властно поволокла за собой, и он пошел покорно, как за матерью, даже не обернувшись. Слим хорошо ее запомнил — на ней был только халат, белый с лиловыми цветами и кое-где смуглыми дырами; под халатом не было ничего, он не столько видел, сколько чувствовал это. Вместе с ней на секунду вырвалась на улицу волна чужих запахов, нездешних, неопределимых — если суп, то каково должно быть существо, из которого он сварен?! Слим еще немного постоял, регулируя дыхание, и двинулся дальше, к повороту на Аптечную, но все было уже не то, все более и более не то; и он был к этому готов, потому что Карвер его почуял, не мог не почуять.</p><p class="p1">Сначала впереди замаячил странный сутулый ровесник — Слим нарочно не стал его обгонять, ибо это мог быть банальный, классический хобот (слежка спереди, в противоположность хвосту). Скоро, однако, он убедился, что человек впереди как-то уж чересчур медлителен и шаток, идти в таком темпе значило уж наверняка пропустить все сроки, и Слим решился на обгон. Только природная выдержка удержала его от вскрика — это был не ровесник, а старик, с лицом, наполовину затянутым кожаной маской: что было под этой маской — Слим боялся домыслить. Может, там была ужасная рана, а может, мясной нарост, но старик явно был болен, над маской видны были только страдальческие глаза, и одет он был чересчур тепло для конца сентября — нет, таких к нему не подсылали, и Слим, стыдясь здоровья, виновато ускорил шаг. Темнело, и от встречи со стариком на душе стало еще хуже — он физически ощущал, как сгущается Карвер, как из каждой встречной машины, из любого куста глядят стальные глаза. Слим ускорил шаг — а этого делать не следовало, никак не следовало, ибо на полупустой субботней улице он выделялся теперь неуместной деловитостью, и тот, кому поручено было задержать его любой ценой, уже шел следом, Слим слышал его шаги.</p><p class="p1">Он не оглядывался. Профессионал не оглядывается. Кавалер не оглядывается тем более. Мы скажем все по звуку, по этому дробному, то нарастающему, то отдаляющемуся, кого выслали за нами на этот раз. Слим представлял его с болезненной ясностью, настигавшей его теперь все чаще. Это веселый, ненамного старше его, играющий с ним, как кошка с мышкой, глумящийся, легкий, снисходительный, безошибочный убийца; ошибкой всех прежних была, конечно, их паучья серьезность. Но у этого с юмором все было в порядке, и потому внезапные парадоксы Слима, его броски в подворотни или через стадионы, его внезапные исчезновения в подъездах или прыжки на подножку не могли в вести в заблуждение: он читал, предугадывал. Карвер рано или поздно должен был найти такого человека, сколько можно бегать от него, рано или поздно он просчитает твою манеру — и тогда надо будет резко ее менять, а меняться поздно. Слим знал это и надеялся на одно. Если в окне седьмого дома будет цветок, есть надежда. Слим помнил имя этого цветка, это был амариллис, его ни с чем не спутаешь, это тебе не кустарник с красными ветками. Он видел это окно на прошлом маршруте и приметил два бутона — тугих, длинных; в литературе утверждалось, что цветок будет огромный и яркий. Слим нарочито замедлил шаг — преследователь тотчас остановился — и резко наддал ближе к седьмому дому: ну же, ну!</p><p class="p1">Зажглись фонари, и поначалу в темной комнате было ничего не разобрать. Лишь вглядевшись, Слим с ужасом понял: они убрали цветок! Они унесли его с подоконника вообще! Более ясного знака он не получал на всем маршруте.</p><p class="p1">Собственно, можно было не спешить. Он взглянул на часы: 18:50. Все свободны.</p><p class="p1">И в эту секунду из окна второго этажа хлынула музыка — кто-то бурно и радостно, кое-как, с грубыми ляпами забарабанил божественную и торжественную, какую же еще, мелодию древнего языческого танца, песнь девушки, танцующей на тамтаме. Может, это было не фортепьяно, а просто кто-то включил телевизор — но этот звук, варварский, дикий и бодрый, дал Слиму последний толчок. Он собрался с духом и оглянулся.</p><p class="p1">В трех шагах от него стоял Бак — унылый тип из соседнего дома.</p><p class="p1">— А я иду думаю ты не ты, — как всегда, без знаков препинания сказал Бак.</p><p class="p1">— Я, — подтвердил Слим. — А что?</p><p class="p1">— Ниче думаю иду ты не ты.</p><p class="p1">— Я, я. А ты куда?</p><p class="p1">— Я никуда я так. А ты че ты куда.</p><p class="p1">— И я никуда, — сказал Слим. Если они завербовали уже и Бака, значит, дело их совсем тухлое, вообще уже не на кого опираться. Этого мы сделаем. Господи помилуй, а мы ожидали легкого, страшного, умного. А это Бак, мусорный бак. Черт с тобой, бак.</p><p class="p1">— Я пошел, — сказал Слим.</p><p class="p1">Но, как только он отвернулся, музыка «Барабанного танца» сменилась адским галопом, и сзади раздались все более решительные, сильные и твердые шаги. Как он мог обмануться! Разумеется, Бак был личиной. Еще чего. Станет Бак преследовать его на Аптечной. С какой стати?! Это был тот, новый, умеющий ко всему прочему так изменять внешность, что даже он, Слим, купился на первый раз. Но теперь в нем взыграли такие злость и обида, что прежнюю покорность как рукой сняло. Он мельком глянул на часы: 18:55. Еще повоюем. Нельзя, нельзя включать последнюю степень. Он ускорился и перешел на бег. Сзади затопали, потом вдруг отстали. Бешено визгнули тормоза. Ага, оторвался. По ворот на Красную Собаку был уже перед ним, он в два прыжка добежал до угла, повернул — и увидел, как старуха у дверей заведения переворачивает табличку.</p><p class="p1">Когда он подбежал к дверям, на нем лица не было — даже старуха отшатнулась.</p><p class="p1">— Тетенька, — выдохнул Слим, — пустите, пожалуйста, очень надо.</p><p class="p1">Булочная закрывалась по субботам в 19:00, и толстуха уже готовилась сдавать кассу, но он скорчил такую умильную рожу, что его пустили. Времени как следует выбирать батон уже не оставалось, да и наивно было ждать, что к закрытию останется что-то приличное, — но он старательно перещупал несколько булок железной вилкой на веревке и выбрал, как ему показалось, не самые каменные. Еще надо было полбуханки черного круглого деду — другого он не ел, — и булку брату, черт бы его побрал совсем. Приди он раньше, и выбор был бы побогаче, и батоны помягче — но тут уж надо было выбирать: либо поход в булочную превращается в маршрут, либо это просто поход в булочную, угрюмая вещь, особенно по субботам.</p><p class="p1">— Ну ты быстрей, а? — торопила его уборщица. Ей тоже хотелось домой. За окном совсем стемнело, выходить не хотелось, но на обратном пути ему уже ничто не угрожало: на обратном пути, через Фурманова, потом по Октябрьской и метров сто по Димитрова, Карвер уже не имел никакой силы. Вообще приобретение хлеба странным образом ослабляло Карвера. А если не ослабляло, всегда можно было доехать на 34-м, но тогда не хватило бы на тринкету.</p><p class="p1">— Земляничную, — попросил он.</p><p class="empty-line"/><p class="p1">Через тридцать лет Карвер все равно достал его на этом самом повороте, когда он не успел его проскочить под носом грузовика. С некоторыми играми надо расставаться вовремя, а может, вредно всю жизнь жить в одном районе, где никогда не отделаешься от себя прежнего. Но скорее всего любой Карвер попросту набирается силы за тридцать-то лет.</p><p class="empty-line"/><p class="p1">ОТВЕТЬТЕ НА СЛЕДУЮЩИЕ ВОПРОСЫ ПО СОДЕРЖАНИЮ ТЕК СТА.</p><p class="empty-line"/><p class="p1">1. Как зовут вашего личного Карвера? Как вы его себе представляете (представляли в детстве)?</p><p class="empty-line"/><p class="p1">2. Почему нельзя просто сходить за хлебом, а надо вот так вот выделываться?</p><p class="empty-line"/><p class="p1">3. Что Слим неправильно сделал на маршруте? (А он, конечно, сделал что-то неправильно, иначе Карвер не достал бы его через тридцать лет.)</p><p class="empty-line"/><p class="p1">4. Какова природа Рыжего? Почему вы при первом прочтении увидели его именно котом? (Если вы увидели его собакой, вы входите в группу «Б».)</p><p class="empty-line"/><p class="p1">5. Как сложится дальнейшая судьба Вэл? Если вам кажется, что она станет почтенной матерью семейства, вы относитесь к группе «Б». Если вам кажется, что она сопьется и вообще пропадет в дурном обществе, все обычно. Если у вас нет никаких догадок о судьбе Вэл, подбросьте любую монету. Если орел, пять отжиманий, если решка, то двадцать прыжков на месте.</p></span></span>
