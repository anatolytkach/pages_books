<span><span id="id53"><div class="title2">
<p class="p">3 сентября</p>
</div><p class="p1">Сегодня у нас довольно простое задание. Нам понадобятся буппи, одеяло, фонарик и иголка с нитками. Я говорю «у нас», но вы всё будете делать сами, а я только расскажу как. Главное — действовать точно по инструкции.</p><p class="p1">Итак, берите буппи — напомню, что, если вам совсем трудно иметь дело с нематериальным объектом, можно использовать наполненный водой воздушный шар. Можете даже нарисовать на нем печальное лицо с добрыми, но чужими глазами. Так, теперь одеяло. Лучше такое, которое не жалко, а впрочем, к сегодняшнему дню вы уже должны отучиться жалеть вещи. Если еще не отучились, возьмите самое лучшее. Идите в лес. Если леса рядом нет, делайте, как Том Сойер: идите в ванную, но вообразите, что это лес. В конце концов, не такая и разница — в ванной, как и в лесу, вы наедине с собой, вы наги и открыты — но только для себя, потому что мир остался снаружи, за дверью или за опушкой. Не зря выражения «Иди в баню» и «Иди лесом» означают одно и то же. Не страшно, если в квартире кто-то есть. Пусть они там гремят на кухне или шуршат в туалете, пусть включают музыку в комнате и кашляют в прихожей. Ведь и в лесу при всей уединенности есть шанс столкнуться с лесником, грибником или кабаном, и даже в одиночестве вы знаете, что не одни. Да, мы не одни, но ведь это «не одни» может быть и утешением, и угрозой, а то, что так неоднозначно, не может служить опорой. Надо научиться быть одному, когда ты не один. И вот за этим вы идете в ванную — очевидно же, что в лес никто не попрется, если можно в ванную. В другой главе мы бы вас за это укорили, но сейчас не станем. Идите в ванную с буппи и одеялом. Не забудьте включить свет, он нужен обязательно: во-первых, без него, как известно, вы не сможете погрузиться во тьму, а во-вторых, не сможете прочесть, что делать дальше.</p><p class="p1">В самом деле, что можно делать в ванной с одеялом и воображаемым воздушным шаром с воображаемой водой внутри? Да хотя бы и с настоящим шаром… Кстати, интересно, что бы вы придумали. Даю вам 15 минут — поэкспериментируйте.</p><p class="p1">………………………………………………………………………</p><p class="p1">Итак, прошло 15 минут. Половина из вас уже храпит, забравшись в ванну, укрывшись одеялом и подложив буппи под голову. У них все будет хорошо. При таких невозмутимости, неизобретательности и нелюбопытстве — обязательно все будет хорошо. А деньги? Зачем им деньги? Пусть они им приснятся. Мы же будем работать с остальными — с теми, кто сделал из одеяла домик и поселил туда буппи; с теми, кто соорудил себе рыцарский плащ и сражается с наполненным водой резиновым драконом; с теми, кто с фонариком в зубах изображал поезд в тоннеле. Короче говоря, садитесь — хотите, на пол, хотите, в ванну — и зашивайте себя в одеяло. Вместе с буппи, да, одному очень страшно. Зашили, сидим, светим фонариком, читаем — как в детстве. Когда пришли взрослые, и выключили свет, и отобрали книгу про Уленшпигеля, потому что лежа читать — глаза портить, потому что в школу завтра не подымешь тебя, и кошмары приснятся потому что. И они там снаружи смотрят, не появится ли у тебя под дверью полоска света, поэтому надо сделать себе герметичную нору из одеял и подушек, достать из-под матраса фонарик, и уже тогда можно. А книга — книга лежит возле кровати прямо на стуле, который служит тумбочкой. Почему, если читать ночью нельзя, почему ее не прятали, не уносили к себе? Сначала мне казалось, что это взрослые забыли или не догадались. Потом — что они полагаются на мою честность: раз сказано, что нельзя, значит, нельзя. Поэтому пространство под одеялом приходилось делить не только со страхом быть пойманным, но и со стыдом — не ослушания, а обмана доверия. Это было хуже наказания, потому что, когда тебя наказывают, ты вроде как потерпевший, а потерпевший в чем может быть виноват? Впрочем, стыд забывался после двух уже страниц, а утром от него оставалась неясная, слегка колеблющаяся, как занавеска в летний полдень, сиреневатая тень, достаточно прозрачная для того, чтобы немного другими глазами смотреть на привычный мир, при этом не давая себе зарока больше так не делать.</p><p class="p1">Это теперь я понимаю, зачем книга лежала там. Конечно, взрослые не дураки. И если они, выключая свет, оставляли книгу, то они вдвойне не дураки. Но это все лирика, а сейчас вы сидите в одеяле, с такой книгой, которую никто у вас не отберет, вы давно уже сами решаете, что и когда вам читать, но зато больше уже не знаете зачем. Дышать немного трудно, но это ничего, в этом мире вообще трудно дышать, и если раньше вы этого не замечали, то вот вам шанс почувствовать. Воздуха очень мало, света еще меньше, звуки глушатся дверью и одеялом (или, если вы все-таки поперлись в лес, самим лесом), буппи молчит, но трудно и ему. Здесь никого нет. Здесь. Никого. Нет. Никого. Нет. Здесь. Нет. Даже. Тебя.</p><p class="p1">Снаружи происходит жизнь — если прислушаться, можно уловить ее звуки, если принюхаться, через запах шерсти, пыли, пуха, синтепона — или чего там еще, — донесутся ее запахи, но ты уже их не распознаешь, путаешь. Где-то жарится мясо? Или это идет гроза? Не надо об этом думать. Звук, запах, вкус — любое ощущение мира можно понять целиком, только не зная и не называя. В самом деле, ну, яблоко. Какой у него вкус? Ну, вкус яблока. Ну, кислый. А что это значит — кислый? Больше того, если тебе завяжут глаза и скажут: «Вот колбаса», а сами дадут яблоко, ты в первый момент почувствуешь такую гадость, что с перепугу выплюнешь. Потому что твой прекрасный ученый мозг, услышав о колбасе, уже сам начал дергать за нужные ниточки, не дожидаясь сигнала рецепторов. И тут вдруг язык передает что-то, вообще не похожее на колбасу! Убрать, выкинуть к чертям, испорченная она, что ли? И ты даже не поймешь, что это было прекрасное, сочное, жирное бордовое яблоко. Утром, не проснувшись еще, ты слышишь звук и, не зная, откуда он, можешь расслышать все полутона. А потом пробуждаешься совсем — и звук для тебя становится всего лишь треском мотора за окном. Так что забудь, забудь все яблоки и все моторы, забудь даже (о кощунство!) колбасу, это уже тебя не касается, потому что ты — вне. Забудь и себя: пока ты знаешь, как тебя зовут, ты не поймешь, что ты есть, а значит, дальше тебя не пустят — там на входе строго спрашивают. А сейчас самое трудное: надо будет выключить фонарь, закрыть глаза и пробыть полчаса вот так. Лучше бы час, но уж ладно. Никаких часов, никакого мобильного. Как узнать, что прошло полчаса? А вот так и узнать, по внутренним часам. Мы не требуем стопроцентной точности, двадцать пять или сорок минут тоже сгодится. А вот десять минут или два часа — уже нет. Значит, ничего у нас с вами не получится, в следующем году можно будет попробовать еще раз. Теперь внимательно: сидим полчаса, в это время думаем о себе. Спать нельзя, повторять в голове слова популярной песни Стаса Михайлова нельзя, решать математические примеры нельзя, вообще нельзя думать ни о чем, кроме себя. Вспоминайте прошлое от самого начала до сего дня: как вы росли, чего хотели, над чем смеялись и чего боялись, когда были хером, когда солнышком. Вспоминайте и будущее — не представляйте, а вспоминайте, как будто вы уже когда-то читали его в книге. Думаю, получаса вам хватит за глаза. Если не хватит, прекрасно, если за полчаса вы дойдете только до отлучения от груди, то я вообще не знаю, зачем вам «Квартал». Помните о яблоке со вкусом колбасы, то есть не обманывайтесь тем, что вы про себя знаете настолько, что вроде и незачем задумываться. Будьте объективны. Можете рассказывать это все буппи — больше вас все равно никто не понимает. Думайте и о том, как жизнь в эти 30 минут проходит без вас, но не так, будто вас никогда не было, а так, будто вас взяли и вынули, оставив на вашем месте белесое пятно — страшное, страшное чувство! Похожее на то, которое поглощает, когда впервые осознаешь, что умрешь — три, четыре года или пять лет, комната, квадрат невозможно яркого, горячего света на полу у окна, и вдруг все звуки исчезают и становится жутко и сладко: все останется, но без тебя. В этот момент ты перестал быть центром мира, понял, что мир создан не для тебя и не вместе с тобой и что он вместе с тобой не закончится. После ты в каждую свободную минуту бежишь в комнату с ярко-желтым квадратом у окна и искусственно вводишь себя в это состояние — с каждым разом это все проще, но острота постепенно сходит на нет. И вскоре ты уже ничего не чувствуешь. Так заканчивается настоящее детство — не тогда, когда понимаешь, что смертен, а когда миришься с этим. Если за полчаса вам удастся вернуть хотя бы бледный призрак того ощущения, хорошо. Дальше само пойдет, как с объемными картинками — сначала пялишься на нее часами до рези в глазах, а потом достаточно легкого движения глазной мышцы, и на бумаге возникает корабль, крепость или цветок.</p><p class="p1">По истечении 30 минут резко откройте глаза и вырывайтесь наружу! Рвите нитки, одеяло, не пускает, а вы сильнее! И вот, полностью освободившись от кокона, открывайте глаза, глубоко вдохните и выдохните с голосом. И тогда уже читайте дальше. Все, пора. Выключаем, закрываем, приступаем.</p><p class="empty-line"/><p class="p1">Ну что ж, если вы снова с нами, то поздравляем. Вы только что умерли и родились. Нет, не взаправду, конечно, но разница не так велика на самом деле. Почему именно сегодня? Потому что именно этот день для меня особенно важен — он долго был моим запасным днем рождения (долгая история), а потом и стал им на самом деле, что еще раз подтверждает условность таких понятий, как прошлое и будущее, и развенчивает идею линейного времени. Почему вам сразу не сказали, что это за задание? Но тогда у вас ничего бы не вышло. Вы бы или перепугались до мокрых подмышек, как тогда, когда надо было определять наличие души, или, напротив, начали бы слишком усердно готовиться, подходя к вопросу со всевозможной ответственностью, а для этого у вас нет пока ни ресурсов, ни знаний. Чего доброго, вы бы и в самом деле переродились, и что бы нам на это сказали ваши друзья и родные? Или застряли бы на полпути, а это вообще уже никуда не годится. Так что мы при помощи нехитрого символического обряда, можно сказать, поиграл и в перерождение. Поиграли-то поиграли, но нельзя сказать, что этот опыт прошел уж вовсе бесследно. Вы действительно стали другим, не так ли? Вот и славно. В теле должна ощущаться приятная легкость, в голове — приятная ясность. Смотрите на свою ванную комнату (или лесную поляну) как впервые. Что-то навсегда осталось в прежней жизни, вместе с буппи в одеяле — ведь вы же не потащили его с собой на свет, до того ли было. Но не обольщайтесь — ваши печали никуда не делись, они не обнуляются при реинкарнации. Наоборот, как раз они и есть та единственная связь, которая роднит вас с прежними вами. И все же теперь вы можете вспоминать себя, как вспоминают прошлые жизни, все равно что смотреть кино про себя или читать книгу про себя, что вы сейчас и делаете — к вопросу о том, что можно вспоминать не только прошлое. Можно. И этот вы из воспоминаний — ваш буппи, провожавший вас туда и оттуда, песок, которому нашептали про царя Мидаса: он все равно прорастет тростником и будет сплетничать в определенные часы при определенном направлении и силе ветра, но что такое слово тростника для всех, кроме, может быть, царя Мидаса? Мы все одиноки, но вдвойне одинок тот, у кого ослиные уши, и втройне — тот, кто носит их как дар, а не как проклятие. Только так все это и можно носить — это ваше знание о себе, вашу смерть в одеяле и рождение, воздушный шарик, навек оставшийся там, откуда вы пришли и куда будете все время возвращаться, чтобы вновь услышать: «У царя Мидаса ослиные уши».</p><p class="p1">Друзья и родня будут вам говорить, что вы стали какой-то не такой. Впрочем, если они вам до сих пор этого не сказали за два с половиной месяца, то это с ними что-то не так. Возможно, они даже что-то почувствовали в это время — смещение слоев бытия, синкопу в пульсе времени, будто в поезде на полном ходу приоткрыли окно в другом конце вагона и тут же закрыли. Но это неважно. Важно то, что сегодня началась новая жизнь. С днем рождения. В честь этого отжимаемся 20 раз.</p></span></span>
