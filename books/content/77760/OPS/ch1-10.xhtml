<span><span id="id13"><div class="title2">
<p class="p">22 июля</p>
</div><p class="p1">Сегодня мы вспоминаем умершего родственника.</p><p class="p1">Не знаю, зачем это нужно. Зачем-то нужно. Обретение окончательной силы предполагает важную способность — воскрешение мертвых. Надо уметь их воскрешать хотя бы в памяти, вспоминая о них всё, до последних мелочей. Опыт Христа показывает, что этот этап никак нельзя миновать. Не бойтесь, через все этапы пути Христа я вас проводить не собираюсь. К тому же он, хотя и воскрес, не получил денег. Деньги получил Иуда.</p><p class="p1">Для начала возьмите в руки вещь, напоминающую об умершем. Не обязательно об этом умершем, которого будете сейчас вспоминать. Вообще о любом человеке, которого больше нет и никогда не будет, и всё, что осталось, — вот эта вещь. Обратите внимание, от вас тоже когда-нибудь останется только вещь, и то не факт. И вы тогда ужасно будете благодарны тому, кто про вас вспомнит. Тут есть противоречие: вас не будет — и тем не менее вы будете благодарны. Сейчас мы устраним это противоречие. От человека в мире, в ткани мира, остается пустое место вроде пустот в помпейском пепле. Это пустое место сохраняет некоторые эмоции, чаще всего печаль. Когда его заполняют воспоминаниями, ему приятно. Вообще говоря — а, вот это я, кажется, начинаю понимать, зачем мы это делаем, — мир сам по себе такая вещь, которая осталась от множества умерших людей. Люди только и делают, что умирают, это их не то чтобы основное, но самое результативное занятие. Все остальное чаще всего не получается. Не следует придавать видимому миру такое уж большое значение, потому что он и есть вещь, оставшаяся от умерших, отсюда его общая печаль, печальность; именно поэтому печаль и есть тот эфир, который все тут связывает, но это мы поймем позже, когда займемся передачей мыслей на расстояние. Но просто единственное, что можно успешно делать в мире, это вспоминать, потому что всё в нем напоминает, а больше, в сущности, ничего не делает. Греки полагали, что единственное достойное человека положение — лежать. Мир греков был молод, они еще не понимали, что самое достойное занятие — вспоминать. Поэтому ведем себя как поумневшие, погрустневшие греки: ложимся и вспоминаем.</p><p class="p1">Необязательно, кстати, вспоминать именно родственника. Можно друга дома, близкого, как член семьи, или просто иногда у вас бывавшего. В конце концов, можно вспомнить практически любого человека, лишь бы вспоминать подробно и сосредоточенно. Вы должны убедиться, что помните, оказывается, много вещей, которые ничего для вас не значат; которые вы сами считали безнадежно забытыми. Вспоминаем все, лишь бы этот человек отобразился как живой. Лучше выбрать того, кого вы хорошо помните, потому что в воспоминаниях тоже действует своеобразная гравитация: большой их мотив притягивает новые и новые. А люди, о которых вы помните мало, со временем сотрутся совсем — никакие усилия любви тут не помогут.</p><p class="p1">Показываю на своем примере, как всегда.</p><p class="p1">Я вспоминаю тетю Лелю — фамилию я тоже помню, но она ни при чем, — подругу бабки и деда по самым молодым годам, по общей компании, которая была у них в 1930-е и с тех пор постоянно собиралась, чаще всего у нас. Дед работал тогда на заводе АМО, впоследствии ЗИЛе, и было у него двое друзей, вместе с которыми он ездил туда на трамвае. Работал он, насколько я помню, сборщиком, поднялся до мастера, а после войны уже туда не вернулся и был начальником автобазы. Вообще всех раскидало: один из его друзей был немец и под это дело оказался в ссылке, кажется, в Караганде, оттуда потом переехал в Саратов, женился там и в Москве бывал редко. Другой на 10 лет оказался в Норильске за анекдот, но вернулся и жил на проспекте Вернадского. Деда пытались вербовать в осведомители, но он сказал, что сильно пьет и обязательно выболтает все тайны — частая отмазка, но ей изредка верили, и ему поверили, а там война, и как-то это забылось.</p><p class="p1">И вот их компания с завода АМО дружила с бабушкиной компанией, там все вместе учились в школе и сохранили отношения надолго. Первое, что я помню про тетю Лелю, — это стишки про нее в стенгазете, которую они к Новому году изготовили в этом своем кружке. Тетя Леля отличалась хрупким сложением, особенно страдала из-за маленькой груди, и про нее там было написано как бы утешительное: «Не пылит дорога, не дрожат листы, подожди немного, отрастишь и ты». Она обиделась. Но вообще в этом кругу обижаться было не принято: скажем, был там Володя по кличке Пончик, Пон, и про его обидчивость был отдельный стишок: «Раздается шум и звон, из бутылки лезет Пон. Всех окинул взором пылким и опять полез в бутылку». Сколько всего я помню, хотя никогда не видел этого человека!</p><p class="p1">Но вообще всю эту компанию я видел, кроме тех, кто не дожил. Умерла от туберкулеза самая умная, как уверяли все, хотя про недоживших всегда так говорят, — Женя Шток. Она, умирая, завещала себя медицине, для исследований. Об этом говорили с благоговением. А тетя Леля работала инженером, вот я вспомнил, на авиационном заводе. Она умела так двигать головой, как делают в индийских танцах: не качать, не кивать, а как-то так ее перемещать на шее из стороны в сторону. Я до сих пор так не умею. Тетя Леля была, вероятно, самой язвительной в этой компании, они с моей матерью очень на этом сходились и даже вместе однажды ездили в Сочи и там бомбардировали записками самого толстого купальщика, имевшего у них кличку Человек-лягушка — если ничего не путаю — за выпученные глаза и зеленые трусы. Они ему назначали встречи в беседке и подписывались «Жанна Кошкодавленко». Что удивительно, он приходил, и они, глядя на это, ухохатывались в кустах.</p><p class="p1">Тетя Леля была одинока, замужем не была, детей не имела, но активно воспитывала племянницу Машу, мою ровесницу — где теперь эта Маша? Она все обещала мне ее показать, нас познакомить. Судя по описаниям — большие глаза, курносая, рыжая, — эта Маша мне очень подходила, но видите, какая штука, судьба нас развела. Меня тетя Леля любила, а я ее в детстве не очень. Я даже говорил — разумеется, только в кругу семьи, — что если бы дарил всей этой компании шарики с картинками (тогда были воздушные шарики с рисунками, воробей там, допустим, или зая), — что вот всем бы я подарил цветные и с птичками, а тете Леле черный и с пауком. Лет пять мне было. Я был не прав, конечно, и полюбил ее впоследствии — за язвительность, ум, хорошее отношение ко мне и прелестную, несколько кошачью манеру острить. У нее и голос был слегка мяукающий, и глаз а кошачьи. Однажды, помню, когда она у нас обедала, уже мне было лет восемь, я полез своей ложкой в общую миску с, насколько помню, квашеной капустой.</p><p class="p1">— Тебе это разрешают? — ядовито спросила тетя Леля.</p><p class="p1">— При вас — да, — честно сказал я. Я вообще был мальчик еще небитый жизнью и достаточно прямой в высказываниях.</p><p class="p1">— Молодец, — сказала она, — нашелся.</p><p class="p1">Собираться — это тогда была целая культура: по советским праздникам, чаще на дни рождения, и всем было о чем говорить и что вспоминать. Еще вот помню из той газеты: «Ростислав Сергеич Терский вид имеет очень зверский». Он стал потом генералом, а тогда, в конце 20-х, всегда ходил на диспуты Маяковского, даже написал воспоминания об этом, сданные им в какой-то архив. С Маяковским я таким образом знаком через одно рукопожатие.</p><p class="p1">Тетя Леля любила литературу, и у нее хранилась с войны книжечка Симонова «С тобой и без тебя». На его творческом вечере в 77-м, кажется, году, в Останкине, она подошла и попросила у него автограф — кажется, она была единственной, кто пришел с той книжечкой; и он воскликнул «О! Откуда это у вас?!» — и с радостью расписался. Странно, что эта книга о давно прошедшей и, в общем, трагической любви вызывала у него радостные воспоминания, другой бы постарался забыть, но он, вероятно, понимал, что это лучшее из сделанного. Очень уж там интересно сошлись такая любовь и война, отношения с Родиной как-то спроецировались — «ты вдруг сказала мне люблю» именно во время войны, а так-то я тебе был даром не нужен. Но это к теме отношения не имеет, просто раз уж вытащилась мысль по ассоциативной цепочке, не обрывать же.</p><p class="p1">Тетя Леля умерла от рака желудка, мать ее навещала, потому что больше было почти некому, и рассказывала, что ей очень хотелось, чтобы ее кто-нибудь держал за руку или гладил. Вспоминать это, как вы понимаете, мне уже совсем не хочется, но я понимаю, что зачем-то это надо. На самом деле я понимаю, что это никому не надо ни за чем, потому что никакая отдельная жизнь не имеет никакой особой цены. Царства уходили, и ничего — что нам отдельный человек? Этих людей со всеми их застольями смыло целиком и непоправимо, ничто из их разговоров не имеет больше смысла, их имен нет даже в Интернете, потому что они не вели дневников и не дожили до социальных сетей; я вот помню их имена — помню, что Цецилия Жабина жила в Минске, тоже одна из этой компании, присылала письма, открытки, календарики со странными надписями, мне однажды прислала открытку с надписью «Отыщи всему начало, и ты многое поймешь» (до сих пор не понял, и не этим ли я сейчас бессознательно занят?), помню, что в Раздорах жил Шура Баталин с женой, он был слепой, из дома почти не выезжал, а еще были Лева и Надя Друзяк, их я однажды видел. Володя Травкин с женой Галей. Все это я помню, а толку? Мне и поговорить о них не с кем, и рассказать о них некому, и даже вас я могу заставить слушать о них, только пообещав вам за это денег. Может быть, впрочем, это понимание — ничто никому не нужно, и ни от кого ничего не останется, и никто никого не лучше — тоже входит важной составляющей в то состояние, к которому я вас веду, — в состояние денег, или, вернее, в состояние, когда их тоже не нужно. А может быть, вот эта манера впихивать еду в ребенка — рассказывая ему сказку или свою жизнь — не что иное, как попытка задобрить слушателя: я рассказываю тебе о своем никому не нужном опыте, а ты за это ешь кашку. Любопытен был бы образ сказителя, который ходит по дорогам с ведром каши — не просит еды, а, напротив, предлагает: вот, поешьте, а я вам за это расскажу о нескольких никому не нужных людях, но просто мне не с кем больше о них поговорить, а мысль о том, что от них ничего не останется, для меня совершенно невыносима.</p><p class="p1">И все они лежат сейчас на Востряковском кладбище, похожем на большую коммунальную квартиру, разве что евреи там отдельно; там со временем надеюсь лежать и я, в общей очереди на Страшный суд, и на Страшный суд меня разбудят дед с бабкой, как в школу. Дальнейшего я уже никак себе не могу представить.</p><p class="p1">Пошлость, дешевка, ужас. Но что делать со всей этой памятью, которая обступает меня, чего-то требует? Исписать общую тетрадь, сдать ее в архив? Один старик — его мемуары опубликованы в книге «До и после литературы» — в третьем лице описал всю свою жизнь для внука, рисуя на полях грабли, поясняя, что есть грабли… Идиотизм, конечно, но что еще делать в старости человеку, который в молодости был третьим секретарем обкома?</p><p class="p1">Сегодня ничего больше не делаем, только вспоминаем этого не существующего больше человека.</p><p class="empty-line"/><p class="p1">Прямо здесь, поверх текста, рисуем его портрет.</p><p class="p1">Теперь этот портрет вырываем, комкаем, выбрасываем. Чувствуем себя жизнью.</p><p class="p1">Вырываем прямо сейчас, не задумываясь.</p><p class="p1">А что там было написано на обороте? Уже не восстановишь. Я же говорил, надо было покупать три экземпляра.</p></span><span id="id14"><div class="title2">
<p class="p">23 июля</p>
</div><p class="p1">Поздравляю вас, сегодня у нас первое прохождение. В компьютерные игры играете? Прохождения читать любите? Прохождение — изумительный жанр сам по себе, никакого юмора не надо. Цитирую подлинное, игру не называю, иначе будет реклама: «Бежим к воде и пройдем по ней присев. Убьем противников на выступе с правой стороны. Дождемся ухода наемника на причале и пройдем вниз. Доберемся до здания и поднимемся вверх. Убьем врага прямо впереди нас и пройдем за Диазом к самолету. Войдем внутрь него и займем позицию. Воспользуемся биноклем для отмечания целей. Первым делом убьем врагов у лодки, затем того, что наверху хижины, и того, который расположился слева. Стрельнем в рацию с правой стороны и отвлечем одного из врагов. Убьем их в любом порядке».</p><p class="p1">Бежим по воде присев, убьем в любом порядке. Комический эффект создается внезапным вводом непонятных персонажей — игрок их видит, а читатель нет. В детстве я ненавидел учительницу географии, молодую наглую толстую шлюху, которая, в свою очередь, ненавидела детей и курила в радиорубке со старшеклассниками, а с некоторыми не только курила. Географию с тех пор тоже не люблю, не помню, что где, а ведь какая изумительная наука! И вот в шестом классе во время ее уроков (читая тогда же «Человека-невидимку») я представлял, как входит в класс человек-невидимка и начинает сзади хватать ее за волосы или щипать. Мы его не видим, а слышим только, как она на ровном месте среди объяснения визжит, откидывается назад, хватается за голову, топает ногами и держится за ущипленные места. Это был бы танец смерти вообще. И я начинал гнусно хихикать, и она меня вызывала и требовала повторить, что она только что сказала, а я совершенно этого не слушал — я представлял, как она будет визжать и топотать. Случались двойки. Закрывать их надо было докладами, то есть делать рефераты и их пересказывать. Помню свой реферат о выдающемся исследователе Черском, переписанный с детской энциклопедии, а также доклад о пингвинах, которые высиживают яйца животом. Помню, как я это подробно показывал, стоя у доски, и одновременно смеялся и плакал от комизма и унизительности своего положения. Ведь я знал, что она меня ненавидит и что я ее не задобрю никакими пингвинами, никакими яйцами, — и на словах: «Вот так они его высиживают», — я отвратительно и неудержимо ржал сквозь слезы на глазах у всего класса, который тоже меня не любил. Хорошо, что уже тогда мне было все-таки смешно. Должно быть, сейчас она глубоко несчастная, одинокая, еще более толстая женщина, если вообще жива, и отчего-то мне видится при этой мысли мстительное, торжествующее шествие пингвинов, которые, неся на лапках свои яйца, уходят от нее куда-то вдаль. К чему я это все? К тому, что комический эффект возникает по принципу человека-невидимки. Кто-то кого-то убивает, отмечает цели, идет по воде — но, поскольку мы не видим ни цели, ни воды, внезапное появление всех этих абсурдных сущностей способно привести нормального человека — не геймера — в состояние тихого счастья. «Берем конфету и бензин, исполняем на полицейского, появится существо из другого мира».</p><p class="p1">Вот эта глава, этот день у нас будет в жанре прохождения. Заметьте, я не вижу ни одной локации, однако почему-то знаю, что там расположено. Откуда я это знаю? Давно живу. А если совсем честно, я вообще все вижу. Итак, вооружитесь книгой и действуйте.</p><p class="p1">Стартуем в 17:00. Выходим из дома. С собой берем Мягкую игрушку, Вещь вдвое больше пачки сигарет и Вещь, происхождения которой вы не помните.</p><p class="p1">Если дождь, раскрываем зонт. Встречаем первого встречного. Спрашиваем: «Который час?» Поговорим с ним о погоде. Встречаем второго встречного. Показываем ему мягкую игрушку: «Вот я нашел тут. Может быть, какой-то ребенок потерял. Вы не знаете?» Он говорит: нет, не знаю. «Возьмите, пожалуйста, а то я уезжаю, мне совершенно некуда девать, а выбрасывать жалко». Если он берет мягкую игрушку, отдаем. Если не берет, сажаем ее на лавочку в сквере или на забор, где она хорошо видна.</p><p class="p1">Доезжаем (доходим) до кафе на окраине города, в спальном районе. Входим. В углу сидит старуха (выражаясь политкорректно, пожилая женщина). Если старухи нет, значит, вы плохо поговорили с первым встречным или неправильно посадили мягкую игрушку. Повторяйте эти действия до тех пор, пока не появится старуха. В крайнем случае зайдите в другое кафе. Подойдите к старухе. Поклонитесь. Спросите: «Простите, здесь не сидела сейчас девушка с длинными темными волосами?» Старуха ответит. Если девушка с длинными темными волосами сидела там, выйдите из кафе и пройдите сто метров налево. Если не сидела, пройдите к стойке, закажите третий в списке коктейль. Если нет коктейлей, то пиво. После этого отдайте бармену Вещь вдвое больше пачки сигарет. Скажите, что кто-то потерял ее в зале. Бармен возьмет вещь. Поговорите с барменом (не меньше трех реплик). Еще раз подойдите к старухе. Поблагодарите ее. Выйдите из кафе и пройдите сто метров направо. Дальше для обоих случаев сценарий одинаковый.</p><p class="p1">Осматривайтесь, пока не увидите гаражи. Гаражи где-то будут обязательно. Можете побродить вокруг в радиусе 10 метров, поспрашивать встречных, где тут гаражи. Идите вдоль них не спеша. Нет ничего прекрасней гаражей на закате — разве только промзона или граффити из окна поезда. Всегда за окнами поезда стоит какой-нибудь красный кирпичный дом, всегда очень интересно, кто живет в таком доме. А может быть, там телефонная станция. Доходите до первого открытого гаража. Спрашиваете владельца, кто тут поблизости чинит машины (такой Кулибин есть в любом спальном районе). Вам указывают. Идите к Кулибину. Если он на месте, поговорите с ним (не менее трех реплик). Если его нет, запоминаете номер бокса, где он обычно бывает. Нам не Кулибин важен, а этот номер. Умножаете его на свой Финансовый Индекс. Складываете сумму всех цифр, пока не получится однозначное число.</p><p class="p1">1 — заходите в ближайший магазин и покупаете любой продукт или предмет не дороже 100 рублей;</p><p class="p1">2 — садитесь на первый автобус на ближайшей остановке и проезжаете пять остановок;</p><p class="p1">3 — набираете на мобильном телефоне любой произвольный номер со стандартным префиксом и спрашиваете Колю. Если попадаете действительно на Колю, прохождение уже удалось, можно ехать домой. Передаете Коле привет от Сергея, отключаетесь;</p><p class="p1">4 — оставляете у входа в бокс Предмет, происхождения которого не помните;</p><p class="p1">5 — ищете взглядом трубу. Около гаражей обязательно есть труба. Идете вдоль трубы, пока не упретесь в естественное препятствие. От этого препятствия делаете пять шагов строго на запад. Это и будет точка силы;</p><p class="p1">6 — находите мальчика (около гаражей обязательно есть мальчик) и под любым предлогом отдаете ему Вещь, происхождения которого не помните. Если мальчик не берет, скажите, чтобы передал Коляну. Колян есть обязательно. Скажете, от Сережи;</p><p class="p1">7 — звоните по мобильному телефону любому вашему знакомому старше вас на три года, с физическим недостатком. У вас есть такой знакомый, я знаю. Извинитесь за беспокойство. Попросите его назвать любое число до 100. Пройдите названное число шагов вдоль гаражей. Это и будет точка силы;</p><p class="p1">8 — стойте, где стоите. Это точка силы;</p><p class="p1">9 — вернитесь туда, где вы оставили мягкую игрушку. Это и будет точка силы.</p><p class="p1">Посмотрите, там ли ваша мягкая игрушка. Если ее взяли, жертва принята и точка заработала. Если нет, возьмите ее домой. Жалко же оставлять, еще промокнет. Оставьте завтра на том же месте. Пока не возьмут, точка силы не заработает.</p><p class="p1">Запомните точку силы.</p><p class="p1">Кто не нашел точку силы — обойдется. Значит, она у него внутри.</p></span><span id="id15"><div class="title2">
<p class="p">24 июля</p>
</div><p class="p1">Внимательно прочтите следующий текст.</p><p class="p1">В чем его загадка?</p><p class="p1">Предложения в нем явно стоят не в том порядке, в каком надо.</p><p class="p1">А в каком же надо?</p><p class="p1">Все очень просто. Одно мыслительное усилие, и вы поймете.</p><p class="p1">Подсказка вот то, поймете не если.</p><p class="empty-line"/><p class="p1">Смею вас уверить, перед вами кратчайший. У человека воспитанного обязательно будут деньги, но, к сожалению, способы его воспитать очень немногочисленны. Школой такого развития ума и служат наши упражнения, в этом их глубоко рациональный смысл, хотя суть их при этом непринципиальна. Очевидно, надо научить его уважать сложные закономерности, поскольку именно культура и есть пространство сложных закономерностей, непредсказуемых подчинений (или их обходов, если уж никак не выполнить всех требований момента). Как воспитать того самого «человека воспитанного», который, по Стругацким, должен прийти на смену чело веку разумному, — или «человека культурного», которого ждал Мережковский на том же рубеже веков?</p><p class="p1">Между тем мир управляется как раз тончайшей сетью зависимостей, и уважение к этой сети, умение и готовность подчиняться ей, вписываться в ее непостижимую уму сложность — примета развитого ума. Фрейд не напрасно ставил его в прямую связь с религиозным чувством, но религиозное чувство превращает тонкий механизм зависимости от сложнейших условий в банальный кодекс повседневного поведения, в удобный для власти способ обуздывать человека или просто в систему жизнеобеспечения скучного попа. Это грубая, примитивная связь, которая бесконечно упрощает механизм обсессий и компульсий. Если вы не будете в означенные дни пить молоко или заниматься любовью, вы после смерти попадете в рай, а при жизни выпьете очень много молока или изобильно займетесь любовью. Все религии мира — над которыми так охотно, по воспоминаниям друзей, издевался суеверный Пушкин — грешат тем, что ставят тонкие механизмы миропонимания в зависимость от грубой, убого трактуемой морали. Смотрите.</p><p class="p1">Но вероятно и более радикальное объяснение. Если через пять минут вы можете попасть в катастрофу — он заставляет вас переставить книги. Весьма возможно, что, объясняя все недостатком серотонинов или неправильным механизмом их захвата, мы ставим телегу впереди лошади; мозг сам знает, как ему захватывать серотонины, и организует свою биохимию в соответствии со своим же даром предвидения. Синдром обсессий и компульсий — то есть желание (или долг) выполнять сложные ритуалы, чтобы избежать неприятностей, — может быть вовсе не психической болезнью, а особенно тонкой связью с миром, своего рода даром предчувствия.</p><p class="p1">Начав соблюдать правила, ты можешь от них отказаться на третий или пятый день, но на шестом месяце отказ от них приводит к катастрофе, а уж если всю жизнь… Юрий Арабов, чьи заслуги в постижении «механики судеб» превосходят все его сценарные подвиги, справедливо замечает, что чем дольше ты соблюдаешь условие, тем травматичнее оказывается разрыв цепи; оттянутая пружина бьет больнее. Ему была предсказана смерть от белой лошади (всю жизнь ездил на вороных или рыжих) или от белого человека (никогда не стрелялся и даже не ссорился с блондинами) — а Дантес был блондин. А Пушкин, всю жизнь соблюдавший приметы (заяц и поп 12 декабря 1825 года) — и погибший ровно тогда, когда он перестал их соблюдать? Каждый из нас знает массу подобных примеров, в том числе из личного опыта. Но тут он видит, что на железнодорожном переезде случилась крупная катастрофа — шлагбаум неправильно сработал или мало ли, — и он бы, короче, обязательно попал в эту катастрофу, если бы не переставил две книги, дай Бог им здоровья. Снова садится в «Крайслер» и, ругательски себя ругая, едет куда собирался. Пытаясь бороться с этим желанием, он проезжает два километра, но потом возвращается и, черт бы их побрал совсем, переставляет две книги. Уже усевшись в машину и даже завод я ее, он вдруг чувствует непреодолимое желание вернуться домой и переставить книги на полке в своей комнате. Дэвид Лосс, арканзасский фермер, собирается ехать на своем «Крайслере» о чем-то договариваться с другим фермером. Возьмем хрестоматийный пример.</p><p class="p1">И он знал бы, когда пригнуться или сколько раз дотронуться до края окопа, прежде чем выпрыгнуть оттуда. У него сохранился бы тот способ тончайшей связи с миром, который мы по глупости называем обсессивно-компульсивным расстройством. Но подозреваю, что если бы Фрейд не вылечил Человека-крысу, он не погиб бы на Великой войне. Строго говоря, Великая война — она же Первая мировая — как раз и была способом затормозить развитие человечества, понимающего теперь слишком много. Там сказано, что молодой офицер — которого он вылечил простейшим способом, а именно объяснил ему природу тех самых страхов и навязчивых состояний — «погиб во время Великой войны», как множество талантливых молодых людей. Но мы сейчас не об этом, а о финале фрейдовской заметки.</p><p class="p1">Он состоит в противоречии все более развитой совести (отягощенной в наше время гораздо большим числом компромиссов, чем раньше) и индустрии наслаждений, которая тоже не стоит на месте. Синдром остался, но перестал осознаваться. Это вообще нормальное состояние для Серебряного века, то есть для высшего взлета человеческой истории, после чего начался самоубийственный откат: революции, две мировые войны, бесконечное упрощение и деградация. Случай человека-крысы — на самом деле обычного офицера с болезненно развитой чувственностью и столь же развитой, как у всех интеллектуалов начала ХХ века, совестью — нагляден именно потому, что он и жаждал удовольствий с характерной для fin de siecle утонченностью и страстью, и стыдился их, как и своей жажды. Фрейд хорошо понимал, как зацепить читательское внимание, отсюда все его психоаналитические триллеры вроде «Человека-волка» или «Человека-крысы». Чаще всего цитируется «Случай человека-крысы» Фрейда. Механизм этого явления хорошо известен и многократно описан. Если вы проделаете ряд бессмысленных действий, у вас пройдет страх, появятся деньги, отсрочится смерть и т. д. Проще всего сказать, что я предлагаю вам синдром навязчивых состояний, или обсессивно-компульсивное расстройство.</p><p class="p1">После того как вы разобрались с текстом, поняли, как его читать, и расставили фразы в правильном порядке, пометьте цифрами ПЕРВЫЕ 33 СЛОВА. Подумайте, почему именно 33 и чего вообще бывает 33.</p><p class="p1">Внимательно прочитайте следующие фразы.</p><p class="empty-line"/><p class="p1">ЕСЛИ ПРОДЕЛАЕТЕ РАССТРОЙСТВО ПРОДЕЛАЕТЕ Я ПРЕДЛАГАЮ ПОЯВЯТСЯ</p><p class="empty-line"/><p class="p1">Подумайте, что сделать с этой фразой. Вспомните, зачем вы нумеровали слова. Дальше совсем легкотня. Эту задачу в двух действиях решит любой школьник. Я вам и так много подсказал. Если не получится за час, вообще никогда не получится. Оставьте эту задачу и выполните 50 отжиманий, вам это ближе.</p><p class="empty-line"/><p class="p1">Решили? Превосходно! Теперь вы знаете, кто вы.</p><p class="p1">А как называется человек, который себя уважает за решение такой простой задачки?</p><p class="p1">Такой человек называется так:</p><p class="empty-line"/><p class="p1">Я ПРОДЕЛАЕТЕ РАССТРОЙСТВО ВСЕГО ПРОДЕЛАЕТЕ ВАМ ВСЕГО</p><p class="empty-line"/><p class="p1">Спокойной ночи, дорогой товарищ.</p></span><span id="id16"><div class="title2">
<p class="p">25 июля</p>
</div><p class="p1">Сегодня мы попробуем быть счастливыми, в том плане, что вспомним состояние самого полного и безоблачного счастья, попробуем максимально имитировать его внешние условия и в это состояние вернуться, причем замерить свое пребывание в нем с максимальной точностью.</p><p class="p1">С понятием счастья надо определиться. Я буду сейчас определяться, а вы смотрите. Мне кажется, тут два ключевых понятия: промежуточность и перспектива. С перспективой проще: имеется в виду, что счастье еще только начинается, что оно уже чувствуется, но еще не в расцвете. Ведь оно очень быстро переваливает за ту грань, за которой уже пресыщение и распад, и очень часто отвращение. Следовательно, надо поймать его первую треть.</p><p class="p1">Что касается промежуточности, здесь важен именно выход за рамки, пребывание между временами года и суток. Скажем, «Семнадцать мгновений весны» потому стал фильмом номер один, что там весна, война — и победа: отчаянное и бессмысленное сопротивление с сохранением всех ритуалов, на фоне накатывающей весны и громыхающей в двух шагах от Берлина советской артиллерии. Или «Касабланка» с нейтральной территорией, где постоянно схлестываются немцы и французы. Нужна, короче, нейтральная территория с взаимоисключающими силами, которые вокруг нее вьются или над ней сталкиваются. Особенным счастьем бывает время перехода, любого перелома, особенно от зимы к весне или от весны к раннему, молочно-восковому лету. Поскольку это ситуация выпадения из времени, особенно важно, что в этой щелке суток нам некуда спешить, мы никуда не погоняемы, ни с кем не договаривались. И никаких законов обычного времени в этой щелке между мирами нет. Наше искусство — построить эту щелку, промежуточный мир, когда сейчас хорошо, а будет еще лучше. После чего станет совсем плохо, примерно как сейчас, хотя будет, конечно, и хуже.</p><p class="p1">Задумавшись и перебрав несколько самых ярких таких вспышек, я выбираю момент почти абсолютного блаженства: 11-й класс собрался у подруги, предки которой выехали на дачу, все накупили вина — в основном почему-то токайского, — пяти бутылок, естественно, не хватило, и нас с молодым человеком Петей отправляют за добавкой. (Тут нужно отступление: всякие утонченности вроде вермута, токайского, иногда кьянти имелись в СССР, их было завались, но они абсолютно не пользовались спросом и употреблялись в крайнем случае, когда не было водки или ее не продавали. Иногда их пили совершенно как бормотуху, не понимая. Думаю, что весь Советский Союз был таким употреблением утонченности как бормотухи, дефицитнейшего как повседневного, тогда как именно повседневного резко не хватало. Это ответвление мысли нужно мне как пауза при восстановлении счастья, вроде того как иногда, если не спится, нужно намерзнуться, а потом нырнуть под теплое одеяло и уснуть почти мгновенно. А может, я просто не могу перестать думать, даже когда хотел бы только ощущать, только вспоминать то солнце, косые лучи, тепло на коже.)</p><p class="p1">Петя не из нашей школы, он приятель — не кавалер — одной из наших девочек. Петя молчалив, но по скупым его репликам видно, что умен. Мы друг другу явно симпатичны и могли бы сдружиться (и сдружились бы, найдись время: мы бешено готовились в институты и даже с друзьями не столько виделись, сколько созванивались). И вот мы пошли в ближайший магазин на тот проспект, который у нас в Квартале называется теперь проспектом Счастья. Мы успели. Магазин еще открыт. В конце проспекта висит ярко-оранжевое солнце. Середина апреля, все стаяло и уже подсыхает. Рядом стройка, и на ней такой же оранжевый песок и светло-оранжевый кирпич. Такой кирпич — вообще образ счастья, и дом, в котором я сейчас живу, тоже казался мне символом счастья из дома, в котором я жил тогда. Честно говоря, я не так уж и обманывался. Иногда смотришь на этот дом, на этот солнцем вызолоченный фасад, среди невероятно холодного зимнего дня — холодного и ясного, у нас ведь ясно, только когда холодно, — смотришь и понимаешь, что будет весна, что перелом к ней, собственно, уже совершился. Такой луч, такой цвет. И вот начатый дом на ближайшей строительной площадке — это именно там теперь закрылся магазин прелестных игрушек и сделали магазин отвратительных запчастей — он того самого цвета.</p><p class="p1">Мы с Петей уже немного пьяны — много ли нам было тогда надо? — но еще вполне адекватны. Покупка вина всегда сопровождается шутками, прибаутками и радостными предвкушениями, опьяняющими сильней любого токайского. Идет милый необязательный треп. И вот мы идем назад еще с пятью бутылками, разговаривая о какой-то ерунде, из которой, впрочем, ясно, что Петя тоже умный, талантливый, он видит те же вещи, что и я, и важно еще, что общий перелом тоже ощущается: время уже все в щелях и сквозит, и явно будет шанс у таких, как я и Петя. Мы, может быть, не сгнием, мы даже как-то осуществимся. А на 11-м этаже в доме подруги нас ждет 11-й класс, они ждут от нас токайского и будут нам рады, и каждый из нас уже примерно присмотрел, с кем мы там будем танцевать. Я уже знаю, с какой девушкой буду там курить на балконе. Я понятия пока не имею, что с этой девушкой буду ужасно несчастен довольно долгое время — долгое по тогдашним меркам, около года, но несчастен по-настоящему, даже по нынешним меркам, я теперь бы не выдержал такого. И понятия не имею, что Петя уедет и ничего из него там не выйдет. Это тоже входит в понятие счастья, чем бы оно было без этого?</p><p class="p1">Я попробую сегодня себе все имитировать по этой схеме, тем более что лето начинает переламываться в сторону осени, а осень — тоже хорошо, сейчас я это уже понимаю, потому что начинаю уже рассматривать смерть не как конец всему, а как дембель. Устаешь с годами, что тут такого. Токайского я покупать не буду, его вкус мне слишком многое напомнит, и вместо легкой ностальгии получится отчаяние. Опьянюсь я чем-нибудь попроще, не пивом, конечно, но хоть вермутом. Покурить на балконе мне несложно, только сейчас надо это делать одному, потому что одиночество и есть то будущее, с которым мне пока прекрасно, а дальше я сильно намучаюсь. Что касается предощущения ужасного, без которого не может быть счастья, с этим у меня сейчас все даже в слишком большом порядке, и за вас я в этом смысле тоже не беспокоюсь.</p><p class="p1">Ощущение безграничного счастья продолжается от нескольких секунд до пары минут и начинает уходить ровно в тот момент, как вы его осознаете и вербализуете, пусть мысленно. Штука в том, что, как только вы говорите себе: «Я счастлив», вы тем признаете и понимаете, что это состояние необычное и что все остальное время вам как-то иначе. И включившийся мозг услужливо предлагает нам, естественно, антоним: когда я не счастлив, я несчастлив. Конечно, это ерунда, нельзя же все время жить в состоянии оргазма, и мы должны понимать, что отсутствие счастья еще не предполагает несчастности, как и антоним любви не ненависть, а равнодушие. Но без этого ошибочного чувства не запомнишь момента счастья: проскочит, как холодный пельмень.</p></span><span id="id17"><div class="title2">
<p class="p">26 июля</p>
</div><p class="p1">Сегодня мы учимся презирать.</p><p class="p1">Для начала — несколько слов о презрении как таковом. Вы наверняка в курсе, что это самая легкая и приятная вещь на свете, но сами так этому и не выучились, иначе вы никогда не стали бы проходить «Квартал». Презрение — закрытость для нового опыта. Ведь в презрении упражняются, как правило, ничтожества, больше смерти боящиеся любых перемен.</p><p class="p1">Ненависть — чувство легкодоступное, но все же оно свидетельствует о некотором масштабе личности. Влюбляться способны и сволочи, и святые. Тоска — вообще примета высоких душ. Презрение — свойство души мелкой и чаще всего поверхностной, но иногда лечатся и ядом. Так что в своей генеральной попытке освободиться от всего лишнего и подняться на сверхчеловеческую ступень мы обязаны оттолкнуться, взять разгон — в этом смысле презрению нет цены.</p><p class="p1">Вы наверняка замечали такое отношение к себе, в этом смысле нас удивить трудно, — скажу больше, мы часто смотрим на себя именно глазами презирающих нас людей, и это самый горький, чаще всего вредоносный, хотя иногда спасительный опыт. Ненавидеть можно равного, но презирать — только низшего; смотреть на себя с ненавистью — значит почти наверняка себя преувеличивать, ибо врагов своих мы преувеличиваем щедро и страстно. Они кажутся нам могущественными, все про нас понимающими. Презрение — совсем иное дело: это взгляд человека, обладающего истиной, на человека, обладающего оспиной. Разумеется, на самом деле человек, обладающий истиной, никого и никогда презирать не будет — просто потому, что ему уже не нужно самоутверждаться; презрение — удел тех, кто ничего толком не знает. Однако само действие презрения таково, что противиться ему в первый момент почти невозможно, — и прежде чем вы успеете сообразить, что имеете дело с ничтожеством, это ничтожество уже всадит в вас свое жало. Самый верный вариант при столкновении с презрением — быстро вспомнить, что этот человек, позирующий в качестве верховного арбитра, ничего не знает, не умеет, а злится на вас только потому, что вы, наверное, чему-то успели научиться. Но вспомнить это под ледяным взглядом ничтожества — не самая легкая задача.</p><p class="p1">Зачем же, скажете вы, учиться этому? Объясняю: бить прохожего ногой — мерзко, но отталкиваться ногой от земли — иногда необходимо; без малой толики снобизма нет умения блюсти себя, удерживаться от дурных поступков, оберегать честь, наконец. Нам надо уметь презирать, но пользоваться этим оружием мы должны ограниченно. На любой агрессивный комментарий надо уметь ответить что-нибудь вроде «Мнение насекомых должно интересовать энтомологов» и сделать соответствующее лицо. Если собеседник знает слово «энтомолог», ему будет обидно. Если не знает, он может вообще треснуть. В самое большое бешенство за всю свою жизнь я привел ротного свинаря Васю, назвав его мутантом. Он этого слова не знал и предположил худшее.</p><p class="p1">И сейчас мы будем презирать — но именно тех, кто нам непосредственно мешает. Мы будем презирать фэншуйщиков — то есть тех, кто влез на нашу собственную территорию. Они пытаются нам внушить неправильные представления о деньгах.</p><p class="p1">Ха-ха-ха.</p><p class="p1">Они пробуют нас научить приручать деньги. «Наведите в квартире порядок. Протяните левую руку в левый дальний угол. Там будет территория денег, им будет там хорошо».</p><p class="p1">Порядок в доме надо наводить вне зависимости от того, занимаетесь ли вы фэн-шуем. Просто когда в доме нет порядка — возникает отвратительное чувство вроде чесотки. У меня, например, физически чешется любая лежащая не на месте вещь, именно поэтому я постоянно ссорился с женщиной, без которой, как выяснилось, могу, но чувствую себя очень сложно, неправильно и вот компенсирую это ощущение «Кварталом», чувством власти хотя бы над читателем, шучу. Это неправда, вообще на эти мои проговорки можно не обращать внимания, они тоже нужны в книге, могу объяснить, зачем. Если гуру безупречен, его не слушаешь, а если у него проблемы — он свой, ему веришь. Обратите внимание, у всех великих проповедников были проблемы. Некоторые вообще умерли ужасной смертью. У Сократа, в частности, была сварливая жена и конфликты с согражданами, более высокие образцы затрагивать боюсь.</p><p class="p1">Так вот, наводить порядок надо все равно, но примитивные ритуалы вроде «это будет у нас место денег, потому что оно правильно сориентировано», — мы должны оставить сразу. Ритуал может быть сколь угодно бессмысленным, как любой дзен, — но тогда он должен по крайней мере что-то менять в вас. Уборка и протягивание левой руки в угол ничего в вас не меняют. Все это имеет целью только примитивный комфорт, а зачем нам комфорт, нам не нужен комфорт. Нам надо сделать из себя нового человека, потому что прежний кончился, ему никто больше не нужен, и он больше не нужен никому. Вот он за три месяца делает из себя другого, который сможет без всех обходиться, он прогоняет себя для этого через разные упражнения, а в виде главной цели привесил себе морковку, то есть деньги. Конечно, деньги у такого нового человека появляются сами собой, но не имеют для него уже никакой цены. (Именно поэтому они и появляются. Замечали ли вы, что у вас до фига только того, что вам совершенно не нужно?)</p><p class="p1">Фэн-шуй, дорогие друзья, учит вас правильно обустраивать интерьер, а я учу вас не зависеть от интерьера. Любые практики учат вас нравиться людям, а я учу вас обходиться без людей, потому что все умрут и никто ничего не стоит, кроме мимолетного проявления милосердия в экстремальной ситуации. Любые пикаперские техники учат вас желать денег, любить деньги, а я учу вас быть таким, к которому деньги побегут сами с умоляющей улыбкой: обрати на нас внимание! Деньги, как всякая физическая субстанция, ценят только зависимость. Деньги любят людей с душой, а что такое душа — я на учу вас понимать через месяц, и то не факт.</p><p class="p1">Дружно презираем фэншуйщиков!</p><p class="p1">Фэншуйщики имеют к древней китайской мудрости примерно такое же отношение, как косоглазые гастарбайтеры, чаще всего казахи, в ресторанах-сушницах — к японской кухне. Аудитория фэншуйщика — домохозяйка, искренне уверенная в том, что если все в ее домохозяйстве будет правильно, то и мир гармонизируется. И я не готов презирать эту домохозяйку, я опять сбиваюсь с презрения на жалость, это всегда было моей проблемой (но только поэтому, вероятно, я и жив до сих пор) — но я готов презирать того, кто дурит этой домохозяйке ее несчастную, с бигудями, голову, того, кто пытается паразитировать на ее вечном хохлушечьем стремлении обустроить свое гнездо. Вот я вижу, как она прибирается, готовит, как робко защищает свой мир от внешних вторжений — а мир уже плющится, уже в окне молнии, уже скоро будет третья мировая война. В такие времена мы особенно, товарищи, должны быть беспощадны к тем, кто паразитирует на страхах и привычках кротких людей уюта. Для денег в доме не должно быть угла. Для денег в доме должно быть уважительно-отстраненное отношение, как надо мне было относиться к ней, но я не сумел.</p><p class="empty-line"/><p class="p1">УПРАЖНЕНИЯ НА ПРЕЗРЕНИЕ</p><p class="p1">1. Представляем фэншуйщика. Чаще всего это обремененная семьей женщина средних лет, ведущая эту рубрику в газете «Бывшая правда». Представляем ее ясно, в деталях, особенно обувь. Презираем.</p><p class="empty-line"/><p class="p1">2. Представляем своего врага с особенной ясностью, сидящим в уборной. Презираем.</p><p class="empty-line"/><p class="p1">3. Представляем наиболее успешного человека из нашего окружения, в вонючем детстве, в школе, где из буфета и туалета несет примерно одинаково, избиваемого одноклассниками. Презираем.</p><p class="empty-line"/><p class="p1">4. Представляем большую пачку денег в кармане успешного человека, избиваемого одноклассниками. Толку ему от этой пачки. Презираем.</p><p class="empty-line"/><p class="p1">5. Представляем себя, выполняющего эти упражнения. Презираем. Не получается? Странно. У меня в последнее время только это и получается.</p></span><span id="id18"><div class="title2">
<p class="p">27 июля</p>
</div><p class="p1">Задание на сегодня будет такое.</p><p class="p1">Прочитайте рассказ. Этот рассказ иллюстрирует важную, никогда не понимаемую фэншуйщиками мысль о том, что восприятие местности в огромной степени зависит от личности и привходящих обстоятельств, а вовсе не от того, насколько в ней убрано.</p><p class="p1">Рассказ обрывается на самом интересном месте. Придумайте концовку. Правильная концовка у меня там дальше изложена, не скажу в каком именно месте. Искать бессмысленно. Если вы туда заглянете, никаких денег не будет. Имейте терпение.</p><p class="p1">Если вы эту концовку угадали, на что есть примерно шансов 30 из 100, — первые две недели занятий прошли успешно, и вы можете себя поощрить. Ваш личный рейтинг по итогам двух недель — 15.</p><p class="p1">Если вы ее угадали почти или приблизительно, ваш личный рейтинг — 10.</p><p class="p1">Если вы вообще ее не угадали, ваш личный рейтинг — 5.</p><p class="p1">Если вы сразу заглянули в конец, у вас больше нет личного рейтинга.</p><p class="p1">Короче, рассказ.</p><p class="empty-line"/><p class="p1">БУХТА РАДОСТИ</p><p class="p1">В первый раз Клоков попал в бухту Радости, когда ему было 15 лет. Они с матерью приехали туда на лодке. В пансионате была лодочная станция, и они решили впервые поплыть не в ту сторону водохранилища, которую уже хорошо знали, а в неизвестные далекие края, где мать Клокова иногда бывала со своими школьниками. Тогда они ездили туда на «ракете». «Ракеты» во множестве мчались и рычали вокруг, переезжать фарватер надо было осторожно, и в этой опасности было дополнительное счастье.</p><p class="p1">Был июль, водохранилище цвело, в глинисто-бурой воде мелькало множество крошечных зеленых точек. В бледно-голубом небе большие кучевые облака не столько висели, сколь ко, кажется, лежали на теплых толстых столбах воздуха: у них были пышные шапки и плоские синие днища. Дальняя вода была неопределимого цвета — молочно-голубого на буром, с темно-синими лунками мелких волн. Берега были в ивах, в лежачих мелколистых березах, и, как всегда, казалось, что вот на дальнем берегу самый правильный лес, в котором непременно есть грибы. Стоило им отъехать на другую сторону, где был большой серый дебаркадер, как их собственный берег стал правильным и манящим, а лес на ближнем берегу оказался почти прозрачным, сырым и явно не грибным.</p><p class="p1">Грести было сущим наслаждением, прекрасен был запах воды, цветущей, гниловатой и потому особенно свежей: в ее тепле так же ощущались свежесть и прохлада, как в бурой волне — зеленые точки. От деревни на берегу пахло сеном и яблоками, как всегда в августе, и чувствовалось, что этот запах завтра уже не будет так ярок: сегодня в нем еще много было летней силы. Слева была белая церковь с голубым куполом, там принимались вдруг звонить, и вода далеко разносила звон. Дальше, прямо по курсу, — рыжая песчаная заводь с тремя соснами, близко подошедшими к обрыву. Бухта открывалась за поворотом, почти пустая в будний день, с единственным работающим шашлычным кафе и несколькими лениво брызгающимися парами на берегу.</p><p class="p1">Она не зря так называлась: странное чувство счастливой безопасности от нее действительно исходило. Клоков и в 15 лет не так был глуп, чтобы считать лодочное путешествие на другой край водохранилища серьезным приключением, — но, вплывая в эту бухту, он почувствовал примерно то же, что открыватель новых земель, приведший свою флотилию на неведомый цветущий остров. Здесь было тихо, радостно, изумительно безопасно — та полнота покоя, какая бывает на лице у молодой матери; мужчина чувствует что-то подобное только в такой ленивый день, не сладкий, а сладостный. Мать захотела купаться, а Клокову захотелось осмотреть бухту, и он вышел на берег, уставленный палатками шашлычников. Пахло земляникой, хвоей — сильней, чем шашлыком, — и травой, которую недавно скосили. Клоков прошел метров двести по шоссе и оказался в поселке, насквозь солнечном и необыкновенно приветливом.</p><p class="p1">Хотя денег у него с собой не было, он зашел в поселковый магазин, где ему разулыбалась прелестная веснушчатая продавщица. Она спросила, не хочет ли он холодного квасу, за бесплатно, только что привезли. Он выпил квасу и, совершенно счастливый, пошел по главной улице. Это был обычный тогдашний дачный поселок, но все в нем было удивительно на месте: в гамаке качалась девочка, которая улыбнулась ему. На соседнем участке росли желто-красные, помидорного цвета георгины. Уже цвели золотые шары. Все было избыточно, щедро, манило зайти, присесть, угоститься — на одном участке шел детский концерт, дети пели на крыльце под гитару, родители хлопали. Далеко, у самого леса, виднелась белая церковь с голубым куполом, высокая, похожая на ракету. Мальчик, хохоча, катил обруч. Это была бухта счастья в самом чистом и полном виде, и Клоков боялся уйти отсюда, потому что вернуться, думал он, уже не придется.</p><p class="p1">Между тем он вернулся — пять лет спустя, отслужив в армии, где было несладко, но все кончается. Он не хотел ехать в бухту Радости с друзьями-студентами, было почему-то важно совершить это путешествие в одиночку. В самые дурные минуты он вспоминал этот остров счастья, и от мысли, что где-то он есть и сейчас, становилось легче. Даже зимой, когда занесено снегом то крыльцо, на котором пели под гитару дети, церковь с голубым куполом по-прежнему стоит у леса, и все, наверное, сверкает вокруг. Он клялся туда вернуться — и вот вернулся, но другим путем. Приехать на лодке было уже нельзя — пансионат, где они тогда отдыхали с матерью, стал окончательно ведомственным, путевок не было. Клоков приехал в бухту из города на автобусе, который три часа стоял в пробке на шоссе, но в конце концов выплюнул их всех на остановке.</p><p class="p1">Церковь была на месте, хотя купол облез и был уже не столько голубым, сколько стальным; в сверкании его появились жестокость, враждебность, замкнутость. Поселок изменился чудовищно и несправедливо: он не заслуживал этой участи. Половина заборов расползлась и накренилась, участки заросли, дома покосились, а на месте некоторых выросли кирпичные особняки, которые выглядели бы зловеще, не будь они так тупы в своем закосе под готику. Дом, где жила девочка, качавшаяся в гамаке, был давно заколочен. Шашлыками воняло еще за километр от пляжа, и эта вонь горелого жира заглушала все остальные запахи. Отвратительна была смесь наглого процветания и безнадежного запустения, но и то и другое словно в голос орало: уйди отсюда. Одни гнали чужака, давили его презрением, другие старались показаться ему на глаза: ведь он помнил их в счастье, в расцвете, когда они, никому не мешая, радовались себе и друг другу.</p><p class="p1">Клоков решил зайти хоть в магазин, но продавщица — конечно, другая — так орала на очередь, что ему все стало ясно. Он вышел, но она успела зыркнуть на него с той беспричинной ненавистью, с какой на любого встречного глядят в трущобах: своих тут презирают, а чужих ненавидят.</p><p class="p1">И Клоков решил, что никогда больше не вернется в бухту Радости, но что-то его томило, не давая распроститься со счастливым видением. Запах земляники и хвои помнился ему лучше, чем дух шашлыка. Может быть, все дело было в том, что в тот раз они приплыли на лодке, по водохранилищу, а в этот он приехал на автобусе? Эта мысль уже не казалась ему безумной: тот поселок был слишком непохож на этот, их невозможно было совместить. Надо было поставить контрольный эксперимент, но непременно вдвоем: кто-то один пусть приедет на лодке, а кто-то — на автобусе. И когда они вместе пойдут по главной улице поселка, чья-то правда победит.</p><p class="p1">У Клокова уже была к тому времени подруга-однокурсница, на которой он всерьез хотел жениться. Он побоялся объяснять ей свой замысел, потому что она со своим спокойным здравомыслием наверняка подняла бы его на смех, — но уговорил приехать в поселок разными путями. Ты прикинь, говорил он, как прекрасно будет встретиться — ты подходишь к берегу, а тут я на лодке! Давай! И она согласилась, почувствовав, что для него все это не просто воскресный выезд на берег. Всеми правдами и неправдами Клоков достал две путевки на выходные в пансионат, ставший через два года несколько доступнее, и отправился в лодке через фарватер, к песчаному берегу с опасно наклонившимися соснами. Смутное его беспокойство все росло по мере приближения — он пытался представить, что увидит в бухте теперь. Но того, что они увидели, он представить, конечно, не мог.</p><p class="empty-line"/><p class="p1">Ну вот. Окончание следует. Придумывайте, что хотите. Оставляю пустое место, чтобы записать.</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p></span><span id="id19"><div class="title2">
<p class="p">31 июля</p>
</div><p class="p1">Сегодня нам понадобятся: бутылка водки, две банки пива, бутылка красного вина, пакет черносмородинового сока от любого производителя, целлофановый пакет для артефактов. Все это складываем в обыкновенную наплечную сумку.</p><p class="p1">Выходим из дома с сумкой в семь часов вечера плюс минус четверть часа. В подъезде делаем глоток водки, не запивая и не закусывая. Отправляемся к ближайшей школе. Около школы осматриваемся и открываем первую банку пива. Делаем большой глоток. Если школьный двор не огорожен или ворота отперты, заходим на территорию. Если школа закрыта, идем по периметру вправо от главного входа. Ищем первый артефакт.</p><p class="p1">Это может быть любой предмет, кроме окурка или спички. Окурок или спичка артефактом быть не могут. Еще чего, артефакт! Кстати, закуриваем, если хотим. Предмет, который мы ищем, — скорее всего пуговица, обычная школьная пуговица, отлетевшая в результате драки, или выброшенный ластик, или сломанный карандаш, или любая другая вещественная ерунда, напоминающая о школьном аде; о царстве ежеминутного, ничем не стесненного угнетения человека человеком, а этого угнетателя — еще и учителем. Причем учитель тоже ужасно угнетенная профессия. Может быть, самая угнетенная. Денег мало, дома свои дети, которых видишь редко (ищем, ищем! Смотрим под ноги!), сапожник всегда без сапог, мужа чаще всего нет, жена ненавидит. В школе всегда пахнет страхом, отчасти уборной, но страх и уборная вещи связанные. В школьных уборных курят или изобретательно мучают друг друга. Нет, пожалуй, мы не курим. Выбрасываем сигарету. Артефакт нашли? Что ж вы так? Вас, наверное, в школе били, и правильно дела ли. Считается ужасно стыдным признаться, что вас не любили в школе. Делаем второй глоток пива. Нашел? Нашел, я тебя спрашиваю? Уроки сделал? Портфель собрал? Зубы почистил? Умер? Бери первую попавшуюся вещь, хоть втоптанную в землю крышку от бутылки, и пиздуй отсюда, говнище ни на что не годное.</p><p class="p1">Так проходим мы первую стадию и делаем глоток водки.</p><p class="p1">Идем мы отсюда в магазин, ближайший к школе, непременно промтоварный, ни в коем случае не продовольственный. До известного момента, напоминаю, мы ничего не едим. Около магазина допиваем первую банку и выбрасываем. По-моему, уже немного легче. Перед входом три раза поворачиваемся вокруг своей оси по часовой стрелке. Что подумают, неважно. Они сами сто раз на дню делают вещи гораздо более идиотские. От входа поворачиваем направо. Покупаем любой металлический предмет стоимостью от 30 до 500 рублей. Больше 500 не покупаем. Маникюрные ножницы? — отлично, наперсток с изображением Великого Новгорода? — я всегда в тебя верил. Кладем в целлофан. Выходим из магазина, ни с кем не разговаривая. Это важно. Если нас кто-то встретил и узнал, не оборачиваемся, на вопросы не отвечаем, попытки хватания за руки с негодованием отвергаем. Выходим. Три раза поворачиваемся против часовой стрелки, запирая портал.</p><p class="p1">Идем в подворотню и тихо, осторожно делаем глоток водки.</p><p class="p1">Заходим в ближайший продовольственный магазин. Покупаем кусок колбасы весом в 150 (примерно, но не более 200) граммов. Не едим! Мы вообще, повторяю, сегодня не едим. Выходим из магазина. Отдаем кусок первой встречной бродячей (ни в коем случай не хозяйской!) собаке. Саму собаку не трогаем. Все эти собаки говно. Они только изображают доброту и несчастность, а сами готовы любого затравить, закусать до смерти, особенно ночью, и нападают всегда только стаей. Вспоминаем дорогого любимого друга, которого давно не видели. А почему мы так давно его не видели? Потому что это они его загрызли. Что? Смешно? Забавен нам абсурд нашей собственной злобы? А почему же мы тогда думаем о других все только худшее? О бедной, доброй бродячей собачке, которую вышвырнули на улицу злые люди, почему мы так ужасно сразу думаем? Где та собачка Рыжик или как ее там, которая жила когда-то у вас во дворе, когда вам было семь лет? Тогда еще жалели таких рыжиков, другие были люди, другое время. И где та старушка, которая кормила этого Рыжика? Умерла, и могилка заросла, потому что некому прийти к ней на могилку. Открываем вторую банку пива. Выливаем половину в ближайшую лужу. Половину, я сказал! Остальное выпиваем по возможности залпом. Где теперь все старушки, и все собачки, и все воробьи? Там же, где и ты будешь. Вот уже и темнеет значительно раньше, чем в июне. Август завтра, ты помнишь? Ты помнишь вообще, что такое август? Последнее цветение, страстное, невыносимое напряжение. Иди быстро в ближайший сквер. Быстро, я сказал! Проходим в сквер, садимся на лавочку. Осторожно, чтобы никто не видел (хотя уже почти темно), достаем бутылку водки и делаем два резких глотка. Закуриваем, если хотим. Пустую бутылку кладем к другим артефактам. Подходим к ближайшему дереву. Лучше, если это береза, но сгодится и липа. Аккуратно (ему же больно! Всему живому больно!) отрываем кусок коры. Помещаем к артефактам. Ссать хочется? Терпим. Если очень хочется, то не терпим. Но лучше, если не хочется. Если не хочется — ты все делаешь правильно.</p><p class="p1">Идем к ближайшему фонтану. Если далеко, то едем. Фонтан обязан быть, не может быть, чтобы летом не было фонтана. Подбираем монетку. Если нет рядом с фонтаном (хотя обычно есть), то в фонтане. Кладем монетку к артефактам. Не забываем, у нас есть еще бутылка красного, целый летний месяц август и жизнь впереди. Осторожно открываем бутылку красного. Не пьем. Стоим, пережидаем. Берем монетку (не из артефактов, свою), подаем ближайшему нищему. Пережидаем благодарности, если много, и проклятия, если мало. Делаем ТРИ больших глотка красного.</p><p class="p1">Дальше внимание, дальше надо думать. От асфальта идет тихий вечерний жар. Мы вслушиваемся в шорох шагов, стук каблуков, визг дальнего мотоцикла, смех парочек, порочных, глупых, ничего святого, представляем все эти парочки голыми, брезгливо отворачиваемся. А потом еще дети пойдут, вообще ужас. Пристально осматриваем всю эту локацию. Выбираем один дом, который кажется нам наиболее приличным, симпатичным. Может быть, дело в окнах, которые горят более гостеприимно, а может, нам чем-то нравится архитектура этого странного здания. Может быть, это даже кинотеатр. Где фонтан, там и кинотеатр. Подходим к этому зданию. Что там — неважно. Важно, что у двери мы кладем кусок коры, оторванный в сквере. Нагибаясь, видим пятый артефакт. Да, да, это именно то, что нужно. Берем его и идем к ближайшему водоему.</p><p class="p1">На берегу водоема — будь это даже пруд, хотя лучше бы река — допиваем вино и аккуратно разбиваем бутылку. Допускается разбивать в пакете, чтобы не рассыпались осколки. Пакет с осколками кладем в урну. Один осколок кладем в пакет к другим артефактам. В наших действиях нет ничего странного. После всего, что мы выпили, странного нет вообще уже ничего, уже ничего вообще странного нет. Уже все не странно. Все уже так, как надо.</p><p class="p1">Идем в ближайший двор, находим песочницу. Пакет с артефактами зарываем в песке. Садимся на детскую горку, запрокидываем лицо и в зависимости от погоды смотрим на звезды или ловим губами струи дождя. Тихонько воем. Невыразимо прекрасен пустой детский городок летней ночью.</p><p class="p1">Пьем черносмородиновый сок.</p><p class="p1">Хорошо мы нахуячились, верно?</p></span></span>
