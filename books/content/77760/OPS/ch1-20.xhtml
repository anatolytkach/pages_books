<span><span id="id54"><div class="title2">
<p class="p">4 сентября</p>
</div><p class="p1">Сегодня все несложно. Рисуем график вашей жизни. На координатной сетке, полагая вашу жизнь осью икс, наносим главные события, которые будут, в свою очередь, оцениваться на вертикальной оси.</p><p class="p1">На каждый год откладываем по сантиметру. Все точки нумеруем для удобства последующего соединения.</p><p class="p1">Важное замечание. Если упоминаемое событие в вашей жизни еще не произошло — примерно представьте себе, в каком возрасте его ожидаете, и отложите этот возраст на оси абсцисс, в гипотетической, так сказать, области.</p><p class="p1">Координаты этой точки на оси ординат будут означать интенсивность переживания по 10-балльной шкале, эмоциональную, так сказать, наполненность.</p><p class="p1">Отмечаем точки в следующем порядке.</p><p class="p1">1.</p><p class="p1">Возраст, в котором вы начали читать.</p><p class="p1">2.</p><p class="p1">Возраст первой любви (то есть любви, которая действительно осознавалась как таковая, волновала вас, заставляла страдать, заложила матрицу подобных отношений на всю дальнейшую жизнь).</p><p class="p1">3.</p><p class="p1">Возраст, когда у вас впервые появилось домашнее животное (если оно было до вашего рождения, это не в счет. Берем возраст, когда вы его впервые купили сами либо ребенком выпросили у родителей).</p><p class="p1">4.</p><p class="p1">Первый сексуальный опыт (что под этим понимать — вопрос спорный, но давайте исходить из того, что вы разделись окончательно и партнер(ша) тоже. Хотя идеально, конечно, если состоялось и проникновение. Ох, товарищи, как вспомню, так вздрогну. Все получилось, хотя и было очень кратко, но волновался я сильно. Ее звали Света. Она была, товарищи, очень хороша, она была рыжая и большеротая, и никогда больше мне этот прелестный тип не встречался, а ведь как хотелось. Она была меня старше четырьмя годами. Дурак я, дурак. Я так тогда смутился, что как-то свернул отношения, а она была девочка прекрасная, благородная, она пыталась меня убедить, что все прекрасно, но я сдуру, разумеется, не верил, мне это казалось снисходительностью. До сих пор метро «Бауманская» в Москве, где был расположен ее институт — конкретизировать не буду, — вызывает у меня сильные чувства, чего там, нешуточный прилив возбуждения. А жила она в Ясенево. Разумеется, у этих отношений не могло быть никакого будущего, никогда не бывает, но как же мне, товарищи, повезло, что дебютировать пришлось с таким тактичным, гуманным, красивым существом. Не могу представить, какая она сейчас, ужас берет. То, что делает с нами жизнь, неправильно, а самое главное, я не понимаю, зачем она это делает. Если бы понял, может, было бы легче. В жизни, которая так безжалостно, бесстыдно, бессмысленно отбирает все, включая смысл и человеческое достоинство, я вижу теперь одну безусловную ценность, единственное, что не стареет, — это, как вы уже догадались, деньги, и только о них мы будем с вами заботиться).</p><p class="p1">5.</p><p class="p1">Событие, которое нанесло вам серьезную и до сих пор — подчеркиваю, это важно, — не залеченную травму. Большинство травм мы благополучно исцеляем тем, что мстим обидчику. Но обязательно есть та, которая не отмщена. Ее я и прошу нанести на координатную сетку. Со своей стороны, напоминаю этому человеку, что помню о нем, что память у меня вообще хорошая. Уверен, что и он меня помнит и все понимает. У нас был с ним редчайший случай взаимной ненависти с первого взгляда — той ненависти, которая включает и брезгливость; я вообще больше всего в жизни ненавижу этот долоховский тип, любующееся собой сентиментальное зло, сверхчеловечка, находящего наслаждение именно в том, чтобы гадить. Интересный штрих к его биографии: он прочел как-то, что в Минске — еще был Советский Союз! — существует продавщица газет, которую обожает весь квартал — квартал! — и которая за 30 лет работы в этом газетном киоске ни раз у не получила записи в жалобную книгу. Эта жалобная книга так и висела у нее в киоске, вся желтая и нетронутая. Репортер ужасно этому умилялся. И что вы думаете? Он специально поехал в Минск, чтобы найти там эту кассиршу и дефлорировать таким образом ее жалобную книгу. Ей было чуть за 50, уязвимый климактерический возраст. Она, наверное, сразу после этого умерла от сердечного приступа. Я не был тогда в Минске и не знаю, врал ли он, но он утверждал, что довел ее до слез, а жалобную книгу она не могла ему не дать — с этим жестко было при советской власти. Допускаю, что он врал. Но сюжет, сюжет!</p><p class="p1">Он сейчас за границей, я знаю где. Мы обязательно еще раз сойдемся. Предполагаю, что его ожидает несколько больший шок, нежели кассиршу.</p><p class="p1">6.</p><p class="p1">Встреча с человеком, который стал для вас духовным образцом, учителем, эталоном. Таких людей наверняка было несколько, но выберите наиболее значимого.</p><p class="p1">7.</p><p class="p1">Эпизод, когда вы наиболее удачно, талантливо, успешно отомстили врагу.</p><p class="p1">8.</p><p class="p1">Покупка вашего первого автомобиля.</p><p class="p1">9.</p><p class="p1">Поступок, в котором вы больше всего раскаиваетесь. То, чего вы не прощаете себе. Если таких несколько, то самый непрощаемый. Иногда — и даже чаще всего — это вещь не особенно масштабная, не самая серьезная. Я однажды поймал в Евпатории маленького краба, и он у меня в ведерке довольно скоро сдох. Мы его потом засушили, сделали красивую композицию с песком и камушками. И вот уже зимой, пять месяцев прошло, уже этот краб стоял в кабинете биологии как лучшая поделка (помните невыносимое слово «поделка»?!) — и я проснулся ночью от ужасной грусти, представляя, как мать этого краба о нем горевала. Лет девять мне было, вероятно. Такая грусть, такое раскаяние! Как сейчас вижу дом напротив, туда выходили окна нашей двухкомнатной квартиры на третьем этаже, мы жили там вчетвером, у нас с матерью была общая комната. Над гаражом около этого дома напротив висел прожектор, помню его невыносимо тоскливый белый свет, и так мне стало худо, что я разбудил мать и начал ей жаловаться. А мать вообще не высыпалась, будучи учителем, и ей было рано вставать, и она мне сказала, что моя сентиментальность довольно неуместна, что это вообще черта немецкого офицера — сочетание сентиментальности и жестокости, и что краба я жалею, а ее не жалею. Она, думаю, в упор не помнит этого разговора, а на меня он произвел впечатление. Она совершенно права, я думаю. Как вы понимаете, история с крабом — не самое мучительное мое воспоминание и не самое непростительное, я просто для примера. Я много чего себе не могу простить. Мне чаще других вспоминается одна безобразная сцена — хотя помечать на графике, вероятно, я буду не ее. Ох, товарищи, как мне мучительно дается «Квартал»! Будем считать, что это боль благотворная; будем считать, что для вас это тоже мучительное занятие, как же иначе-то? Иначе и браться бессмысленно за такое прохождение, ведь это мы жизнь свою проходим, чтобы разобраться с ней наконец. Но вот первая жена, которую я потом оставил не самым лучшим образом, потому что я вообще сволочь большая, однажды ждала нас с дочерью из гостей, а дочь там плохо себя вела. И вот я приехал в отвратительном настроении, стал устраивать скандал — наверное, были к тому в тот день и другие поводы, не знаю, — но я с ужасом вспоминаю, как жена нас встретила, очень радостная, очень ласковая: «Ах вы мои дорогие, как вы там веселились?» — и я ей прямо с порога начал устраивать сцену, типа, это все ты, твое воспитание, и вообще я уйду. Ужасно это было. Ужасно было даже не то, что я довел ее до слез, а то, что так у меня и стоит это перед глазами — «Ах вы мои дорогие». Это совершенно непростительно, и все, что я делаю, непростительно. Не надо мне говорить, что это все ерунда: этим никого нельзя утешить. Никого нельзя утешить мыслью о том, что бывает хуже. И даже если я, повторяю, укажу другой непростительный поступок — этот я тоже сейчас вспоминаю. Короче, найдите у себя такой же и отметьте. Особенно я буду уважать человека, который этот непростительный поступок отнесет в будущее, но таких храбрых среди вас, я думаю, нет. Да в том и штука, чтобы найти его в прошлом — с будущего-то какой спрос?</p><p class="p1">10.</p><p class="p1">А вот теперь утешимся, вспомним поступок, которым можем безоговорочно гордиться. Хорошее дело вспомним, правильное, и хотя, я знаю, у вас таких дел наберется не меньше сотни — вы же прекрасный человек, как бы я смел подумать иначе?! — но все-таки давайте найдем наиболее приятное, наиболее, так сказать, лестное воспоминание. Решительный жест, постановка мерзавца на место, помощь больному или бедному, сочинение выдающегося сочинения, да хотя бы и самостоятельное испечение торта для любимого человека, который и не подозревал, что вы сейчас загадите ему всю кухню и зачадите ее сожженным коржом. А можно глобальное что-нибудь, предотвращение войны, если вы ее предотвратили.</p><p class="p1">11.</p><p class="p1">Дата самой большой ошибки. Не дурного поступка, а именно ошибки, это огромная разница. Если считаете такой ошибкой рождение, отметьте нулевую точку на абсциссе (на ординате, вероятно, будет 10 — серьезная ошибка, действительно).</p><p class="p1">12.</p><p class="p1">Дата встречи с человеком, которого вы сильнее всего любили/любите. Имеется в виду именно идеал, любовь, а не просто восхищение — а то, может, вы взяли автограф у Пола Маккартни и отметите его. Нет, братцы, я говорю именно о возлюбленных.</p><p class="p1">13.</p><p class="p1">Ваш первый сколько-нибудь серьезный заработок.</p><p class="p1">14.</p><p class="p1">Возраст, когда у вас появился первый ребенок (именно ваш, не усыновленный; если еще не — отметьте возраст, когда планируете это).</p><p class="p1">15.</p><p class="p1">Случай, когда вы серьезно рисковали жизнью, когда вам угрожала настоящая опасность, то есть вы буквально ходили под смертью. Если такого эпизода не было — пропускаем точку, поскольку предположить такое и отнести в будущее невозможно, да и незачем это планировать. Может, вообще обойдется.</p><p class="p1">16.</p><p class="p1">Возраст самой серьезной и радикальной ссоры с бывшим другом — именно другом, а не возлюбленным(ой). То есть конец самой серьезной дружбы в вашей жизни — даже если она была потом возобновлена. Впрочем, возобновления чаще всего ничего не меняют.</p><p class="p1">17.</p><p class="p1">Покупка (приобретение) вашей первой квартиры или дома — лично вашей, на вас записанной собственности. Если еще не приобрели — когда планируете.</p><p class="p1">18.</p><p class="p1">Возраст первой действительно серьезной болезни.</p><p class="p1">19.</p><p class="p1">Возраст первой заграничной поездки.</p><p class="p1">20.</p><p class="p1">Возраст, когда вы впервые почувствовали всерьез, что молодость кончилась.</p><p class="p1">21.</p><p class="p1">Возраст, когда вы впервые почувствовали (почувствуете), что и зрелость кончилась или, по крайней мере, жизнь начала слегка густеть, забраживать, закисать, как варенье.</p><p class="p1">22.</p><p class="p1">Возраст последнего по времени развода.</p><p class="p1">23.</p><p class="p1">Возраст, когда вы впервые почувствовали (это у всех бывает), что жизнь, просто жизнь сама по себе важнее всех намеченных вами целей, что важно просто жить, нюхать там, я не знаю, сирень, что все остальное — чушь. Один из любимых поэтов, человек скрытный, хитрый, вообще непростой, рассказывал, однако, совершенно искренне: забыл я, ребята, кепку на даче. А дачу мы уже законсервировали. А кепка — очень хорошая кепка, подходит по цвету к плащу. (Он из поколения пижонов, хилявших по Броду — по Невскому, естественно.) И я за ней поехал, хотя и не ближний свет. В электричке. И вот вышел я, ребята, на платформу — листья, березы, бузина, все это желтеет уже, и воздух такой, что просто счастье! — вдохнул все это и подумал: какого вам всем еще смысла жизни?! При всем его серьезном отношении к литературному успеху и все такое, при склонности мерить жизнь именно написанным и сделанным — я ему вполне поверил, и у вас наверняка было такое ощущение, назовем это точка «К», по фамилии героя и первого описателя.</p><p class="p1">24.</p><p class="p1">Возраст, когда вы поверили в загробную жизнь.</p><p class="p1">25.</p><p class="p1">Возраст, когда вы перестали верить в загробную жизнь (если перестали).</p><p class="p1">26.</p><p class="p1">Лучший возраст вашей жизни — с точки зрения здоровья и способностей. Если это несколько лет — выберите пиковый.</p><p class="p1">27.</p><p class="p1">Возраст, когда вы радикально изменили профессию (если меняли).</p><p class="p1">28.</p><p class="p1">Возраст, когда вы эмигрировали (или собираетесь).</p><p class="p1">29.</p><p class="p1">Возраст, после которого — как вам кажется — вы едете уже не на ярмарку, а с ярмарки (или поедете). А разве плохо вернуться с ярмарки? Да и что там, на ярмарке, хорошего?</p><p class="p1">30.</p><p class="p1">Возраст вашей смерти — предположительный, разумеется; но это предположение нужно, оно обязательно, надо же знать, на сколько вы рассчитываете.</p><p class="empty-line"/><p class="p1">Теперь соедините все эти точки последовательно, даже если линия будет перечеркиваться. Как в детском журнале, когда в результате такого соединения должен получиться, допустим, крокодил. У меня именно он однажды и получился.</p><p class="p1">Вот то, что у вас получилось, и есть наиболее объективный портрет ваш ей жизни, trust me. Поймите, на какое животное либо предмет она похожа, и ведите себя соответственно.</p><p class="p1">Остальное завтра.</p></span><span id="id55"><div class="title2">
<p class="p">5 сентября</p>
</div><p class="p1">Теперь.</p><p class="p1">Выделите то десятилетие вашей жизни, на которое пришлось наибольшее количество точек. Порядковый номер этого десятилетия — ваш личный Индекс Активности, он же ИА.</p><p class="p1">Сосчитайте, сколько событий вашей жизни отнесено вами на будущее. Высчитайте их процент от общего количества, то есть от 30.</p><p class="p1">Этот процент — ваш личный Индекс Исчерпанности (ИИ).</p><p class="p1">Просчитайте разницу между общей продолжительностью вашей жизни и тем, что вы уже прожили. Высчитайте Процент Прожитого (ПП).</p><p class="p1">Если ваш ИИ больше ПП, поздравляем, у вас есть будущее или по крайней мере надежда на него. Вычтите меньшее из большего. Предлагаем вам необязательный, но любопытный эксперимент. Напишите на листке бумаги сумму всех своих сбережений. Я не смотрю. То есть просто и честно напишите там, сколько у вас есть денег.</p><p class="p1">Поделите эту сумму на свой возраст.</p><p class="p1">Умножьте на разность (ИИ — ПП).</p><p class="p1">Получившаяся сумма — это примерно те деньги, которые вы получите вскоре после прохождения «Квартала». Можете потом сравнить и убедиться, что фирма веников не вяжет.</p><p class="p1">Если ИИ меньше ПП, поздравляем, большая часть вашей жизни — и, соответственно, удач — уже позади. И это, может быть, к лучшему.</p><p class="p1">Запишите на бумажке всю сумму ваших сбережений. Я не смотрю.</p><p class="p1">Поделите ее на Индекс Активности.</p><p class="p1">Посмотрите, сколько сегодня градусов на улице.</p><p class="p1">Поделите получившуюся сумму на этот показатель.</p><p class="p1">Запишите сегодняшнюю дату — число, месяц, год (напоминаю, сегодня 05.09, год укажите сами).</p><p class="p1">Подсчитайте сумму всех цифр, пока не получится однозначное число.</p><p class="p1">Разделите получившееся частное на это число.</p><p class="p1">Примерно столько вы получите по итогам «Квартала».</p><p class="p1">Если не совпадет, значит, вы что-нибудь не так подсчитали.</p></span><span id="id56"><div class="title2">
<p class="p">6 сентября</p>
</div><p class="p1">Сегодня вы должны трижды поделиться своими деньгами.</p><p class="p1">Сделать это надо тремя различными способами. Во-первых, вы должны подать нищему, во-вторых, дать чаевые фотографу, а в-третьих, послать угощение сотрапезнику.</p><p class="p1">Фотограф появляется потому, что нам будет нужна фотография.</p><p class="p1">Все это необременительно и принесет вам скорее радость, чем приступ жадности. А сделать все это надо потому, что в жизни работает принцип «отдай в малом». Что-то мне подсказывает, что, если сейчас не сделать это маленькое деньгопускание, скоро может выйти так, что отнимется гораздо больше. Кому это надо?</p><p class="p1">Подать надо не первому попавшемуся нищему, а третьему, который вам встретится в течение дня (или мимо которого вы пройдете). Если вы живете в сельской местности, в небольшой деревне, допустим, или поселке городского типа — нищим там по умолчанию может считаться любой, по столичным, естественно, меркам. Следовательно, вам просто надо предложить денег любому третьему встречному. Как хотите, так и мотивируйте. Я не намерен облегчать прохождение хитрым сельским жителям.</p><p class="p1">Итак, если вы живете в городе — вы должны подать третьему встречному нищему.</p><p class="p1">Если это мужчина, вы дадите ему 300 рублей.</p><p class="p1">Если это женщина, вы дадите ей 500.</p><p class="p1">Если это ребенок — 1000.</p><p class="p1">Если музыкант — 200.</p><p class="p1">Если собирают на собачий приют — 300.</p><p class="p1">Если на операцию — 100 (незачем прикрываться болезнью и врать на эту тему).</p><p class="p1">Если инвалид — 300.</p><p class="p1">Если музыкант-инвалид — 400.</p><p class="p1">Если ребенок собирает на собачий приют — 1300.</p><p class="p1">Если ребенок-инвалид — 1500.</p><p class="p1">Если ребенок собирает на операцию — 300.</p><p class="p1">Если музыкант-инвалид собирает на собачий приют — 5000. Не бойтесь, такого никогда не бывает.</p><p class="p1">Зайдите в ближайшую срочную фотографию. Закажите ваш портрет строго определенного размера: по горизонтали — ваш возраст, по вертикали — ваш вес.</p><p class="p1">Если получился квадрат, вам повезло — давать фотографу ничего не надо. Но не обольщайтесь, это бывает крайне редко.</p><p class="p1">Если фотограф откажется делать столь нестандартную фотографию, предложите ему 1000 рублей сверху.</p><p class="p1">Если он не возьмет и рассердится — 2000.</p><p class="p1">Если он вообще откажется делать портрет, идите к следующему фотографу (деревенские проделывают это упражнение в ближайшем городе).</p><p class="p1">Если вы так и не сумеете получить портрет с такими параметрами, увы, мы прощаемся с вами. Вы покидаете опасный и непредсказуемый мир «Квартала». Чтобы это произошло мирно, отожмитесь 15 раз.</p><p class="p1">Если фотограф согласится сделать портрет бесплатно, предложите ему 1000 сверху просто так — потому что вам очень понравился портрет, никто еще не снимал вас так красиво.</p><p class="p1">После работы (или просто вечером, если выходной) зайдите в ближайшее к дому кафе. Не хотите в ближайшее — выберите любое, я не настаиваю. В этом кафе, если вы не единственный посетитель, выберите человека, который покажется вам симпатичным. Пошлите ему через официанта бутылку вина стоимостью от 500 до 1000 рублей, не более. Если ближайшее кафе на много верст кругом — станционный буфет, проделайте все это там, только посылать будете не бутылку вина, а котлету или коржик.</p><p class="p1">К бутылке приложите свою фотографию.</p><p class="p1">Если бутылку и фотографию не возьмут — вы пропускаете два следующих дня и не делаете никаких упражнений.</p><p class="p1">Если бутылку возьмут, а фотографию вернут — следующей ночью вам можно спать только три часа. Поставьте будильник, занимайтесь чем хотите — смотрите кино на компьютере, ужинайте, завтракайте.</p><p class="p1">Если фотографию возьмут, а бутылку нет — я вас освобождаю от зарядки до 10 октября.</p><p class="p1">Но не обольщайтесь, этого почти никогда не бывает.</p></span><span id="id57"><div class="title2">
<p class="p">7 сентября</p>
</div><p class="p1">Поздравляю, сегодня у вас опять прохождение.</p><p class="p1">Выходим из дома, добираемся до ближайшего вокзала или железнодорожной станции.</p><p class="p1">Вспомните ваш Индекс Активности. Это порядковый номер станции, на которой вы должны сойти. Направление неважно. Если вы живете на даче, двигайтесь прочь от города.</p><p class="p1">Выходите на станции. Зайдите в ее помещение (или, если это крупный город, в здание вокзала). Если это такая маленькая станция, что никакого помещения нет, ищите скамейки — уж скамейки должны быть. Если нет и скамеек, садитесь на обратную электричку и отправляйтесь домой — вы выбываете. В самом деле, если уж даже скамеек вам не положено, то каких вам еще денег? Ну вот. Если вы не выбыли — справа от себя увидите человека в очках. Подойдите к нему и попросите закурить. Если он не курит, или у него нет, или просто вы ему не понравились — предложите ему закурить. Если откажется, просто пожелайте ему удачи.</p><p class="p1">Выходим из вокзала. Идем в ближайшую аптеку. Покупаем аспирин. Одну таблетку пьем на месте, остальные кладем в карман.</p><p class="p1">Заходим в ближайший продуктовый магазин. Ждем, когда войдет третий посетитель после нас. Подходим к нему, спрашиваем, где ближайший кинотеатр. Покупаем в магазине жвачку. Идем в ближайший кинотеатр.</p><p class="p1">Если кинотеатр работает, заходим туда. Если нет, возвращаемся на вокзал и спрашиваем, где ближайшая баня.</p><p class="p1">В кинотеатре смотрим фильм на ближайшем сеансе, после чего возвращаемся в продуктовый магазин.</p><p class="p1">В бане моемся примерно столько же, сколько идет фильм. Выпиваем кружку пива, жуем жвачку.</p><p class="p1">В продуктовый магазин примерно через полчаса после нас зайдет женщина изумительной красоты (или такой же мужчина, в зависимости от нашего пола). Мы к ней не подходим и вообще ничего не делаем, но просто это значит, что мы на правильном пути. Если это так, возвращаемся на вокзал, покупаем в буфете стакан чаю, возвращаемся домой.</p><p class="p1">Если женщина не появляется, покупаем бутылку молока и спрашиваем продавщицу, где ближайшее интернет-кафе.</p><p class="p1">В интернет-кафе открываем игру «Сапер» и играем в нее, пока не раскроемся.</p><p class="p1">Наш результат (в секундах) умножаем на свой финансовый рейтинг (можно там же, с помощью калькулятора).</p><p class="p1">Получаем многозначное число. Находим сумму его цифр.</p><p class="p1">В калькуляторе извлекаем из этой суммы квадратный корень. Округляем.</p><p class="p1">Это то количество минут, которое нам еще надо провести на этой печальной осенней станции, в чужом интернет-салоне, где орут, рубясь в идиотскую игру, злобные дети.</p><p class="p1">За это время на этой станции мы успеваем больше понять о тщете, чем за всю предыдущую жизнь.</p><p class="p1">Дома никому не говорим, где были. Пьем много горячего чаю, чтобы вывести из организма накопленный там запас тщеты.</p></span><span id="id58"><div class="title2">
<p class="p">8 сентября</p>
</div><p class="p1">Сегодня мы идем на ту улицу «Квартала», которая ассоциируется у нас с любовью или ее ожиданием — как бы вы эту улицу ни назвали. В моем случае она ассоциируется с любовью именно потому, что в этом дворе были качели и на качелях качалась девочка в красной куртке. В то время я был самым взрослым человеком за всю свою жизнь — мне было 11 лет, я и теперь считаю, что это возраст главных решений, максимальной ответственности, наиболее трагичных переживаний, поскольку все уже всерьез и все впервые. Любовь моя к этой девочке была абсолютно серьезной, и взрослой была эта девочка, и серьезными были стихи, которые я о ней писал.</p><p class="p1">И к детям 11 лет я даже сейчас отношусь исключительно серьезно.</p><p class="p1">А девочка читала книгу «Лунный камень». Не на качелях, естественно, но я ведь и видел ее не только на качелях. Я ее видел на скамейке, прекрасной осенней скамейке около круглой клумбы с лиловыми от холода астрами. И очень отчетливо помню эту клумбу и мысль о том, что мне 11 лет и я взрослый человек.</p><p class="p1">При этом переживание, связанное с девочкой, было серьезнее любви, потому что к любви примешивалось главное, от чего мне потом никуда было не с бежать. То, о чем сказал Илья: «Я родился с этой занозой, я умираю с ней». Кстати, никого я не любил, как Илью, и к моему чувству всегда примешивалось то самое: сознание своего не то чтобы несовершенства, но низшего порядка. И эта девочка — светловолосая серьезная девочка с трагическим уже тогда женским ртом вниз углами, удивительно сосредоточенная во всем, что бы она ни делала, читала ли книжку, качалась ли на качелях, — тоже была существом высшего порядка, именно в силу врожденной органической серьезности и абсолютного знания обо всем, что она делала. Бывают такие люди, которые знают, что делают. Она и решения принимала всерьез и сразу. И дружбы с этой девочкой у меня не могло быть, потому что она полюбила бы меня, я допускаю, меня можно полюбить, — а дальше бы она только мучилась и в конце концов прервала все это.</p><p class="p1">Вот в чем дело: я сам ничуть не менее серьезен в главных для меня вещах, но жизнь я не считаю главной вещью. Жизнь вообще не оформлена, она поток речи, в котором еще нет смысла, она сырой материал, из которого надо что-то делать. Ценна не она, а то, что ты сделаешь из нее. Но есть люди, которые свободно плавают в этом потоке, люди, для которых жизнь — не предлог, и не повод, и не место встречи, а серьезное и ответственное дело. Я перед этими людьми готов преклоняться, потому что в моих занятиях, сколь бы серьезно я к ним ни относился, всегда есть легкомыслие. Мне нравится летать над этой рекой, а другие в ней плавают. Чтобы в ней плавать, нужны особые душевные качества. Вот в этой девочке — насколько я помню, ее звали Надя — они были. И она прекрасно понимала свою роль: она должна была мне светить. Ей не надо было со мной здороваться, когда мы встречались, и вообще никак не надо было показывать, что она меня знает. Но мы отлично понимали, что смотрим друг на друга. Вся грация в ней была от моего взгляда. В ней было знание всей своей будущей жизни, и я отчетливо, страшно отчетливо помню один лиловый вечер с золотыми березами, когда в этом сквере — возле нашей детской поликлиники, где я, увы, был частым гостем со всеми своими ангинами, — она качалась на качелях и я на нее смотрел. Я даже не знаю, сколько это продолжалось. Мне кажется, час, хотя в реальности — не больше 10 минут, уверен, даже стемнеть толком не успело. Но был именно тот час, когда темнело, когда, как написал Лев, «пирожными света проплывали трамваи». У нас это были троллейбусы. Только очень голодный ребенок мог так написать про грохочущий, лязгающий трамвай — «пирожное света». Но это именно так и есть.</p><p class="p1">И вот я стоял и смотрел, как она, в красной куртке, в белой шапке, там взлетает. И она знала, что я смотрю. И в поскрипывании этих качелей было все про нас, весь сценарий отношений. Не подумайте, я бывал и бываю влюблен в свое, родное и равное, и с этим равным только и могу жить (а бывал влюблен и в низшее, глупейшее, пустейшее — нужен и такой опыт, бывает и такое совершенство); но ничего не поделаешь, представление о любви для меня всегда связано с этим неравенством, с серьезной и трагической девочкой, для которой любовь — прежде всего удар, и потому она избегает ее, пока возможно. Потому что ведь надо будет как-то с этим жить, а жить она может только по своим предельно серьезным правилам. И лучше мне смотреть на нее издали, потому что я с моим характером не сделаю ее счастливее, нет. Это не подлый, не злой характер, в нем много дурного, но не ужасного; и все-таки с такой девочкой мне лучше пересекаться вот в таком формате — она летает на качелях, а я смотрю, она растворяется в этом вечере среди падающих листьев, а я никогда не подойду.</p><p class="p1">Хотя какие-то слова там были сказаны, типа «что читаешь?», «а из какой ты школы?», и было взаимное доброжелательство, но не большее, чем при обычном знакомстве. Я был мальчик общительный, у меня весь квартал был либо в друзьях, либо во врагах; прибавьте к этому перманентную игру в войну в окопах нашей вечно разрытой отопительной системы: всегда меняли ка кие-то трубы, всегда я приходил домой изгвазданный. Это в школе у меня почти ни с кем не складывались отношения, потому что школа была ужасная, номенклатурная, а во дворе или на даче я придумывал кучу игр, и вообще тогдашние дети были умнее, с ними было о чем говорить, я со взрослыми-то сейчас так не говорю. И все-таки при всей способности разговорить кого угодно я с ней не мог связать двух слов — не от любви, не от робости, а единственно потому, что ничего хорошего из этого бы не вышло. Такое это было существо — отдельное, высшей расы, хотя я прекрасно представлял себе, как она живет. И знал красные дома, в которых она живет. И хорошо понимал, как выглядит ее комната с тюлевыми шторами, с желтой лампой, и знал, как она смотрит из этой комнаты в окно, из которого тогда еще открывался вид на закат, пустыри и капустное поле. Это была тогда окраина, и дальше начинался колхоз. Там был сказочный мир абсолютно, тот самый закат, в котором весной всегда угадывались паруса и корабли, и ничего счастливее в жизни я не видел, чем эти розовые и алые краски. Нет, вру, над морем они все-таки лучше. Но над морем понятно, что никаких парусов нет, а на западе нашего квартала их еще можно было представить.</p><p class="p1">Мне кажется, что я напишу это и умру, потому что я никому никогда не говорил об этом, разве что пробовал писать, но в стихах это сделать очень трудно. Между тем ничего особенного — каждый был влюблен в такую девочку, но не каждый понимал, что она навсегда будет идеалом, что все будущие идеалы будут калькой с нее. Но мне хочется стоять там и представлять, какая она стала сейчас, мне хочется там встретить ее. Я отлично понимаю, что она давно уехала, они вообще переехали куда-то. Возвращаюсь осенью в шестой класс — а ее нет, я сразу это почувствовал. И не сказать, чтобы это меня слишком сильно огорчило, потому что я, видимо, знал: никуда она не денется. Да и мало ли тогда было вещей, которые меня привлекали, уже в 12 лет! Я и в 12 помню себя отлично, город постепенно расширялся, я начал ездить за пределы квартала, во Дворец пионеров, в кружки, начались мои прогулки по Москве с друзьями, иногда мне просто нравилось название улицы, и я туда ехал. Но этот час, когда я смотрел на качели, оставался для меня одним из главных — я всегда чувствую моменты, когда приоткрывается небо, и этот был такой.</p><p class="p1">Что мы делаем там, в точке любви? Мы представляем такую свою девочку, которая была у каждого, и думаем о своей жизни с ней, о том, какая это могла быть жизнь.</p><p class="p1">А! — еще белый свитер был у нее.</p><p class="p1">Разумеется, ни к какому сексу, ни к какому пробуждению мужественности все это отношения не имеет; любовь вообще трудно совмещается с сексом, это уж большая удача, если совмещается.</p><p class="p1">А девочки пусть вспоминают своих таких мальчиков.</p><p class="p1">И качели там до сих пор есть, всё они пережили.</p><p class="p1">Но вот чего я точно не сделаю — я никогда не сяду на эти качели. Это значило бы занять не свое место.</p><p class="p1">Пить не вздумайте, покурить можете, хотя я никогда не понимал, зачем это нужно.</p></span><span id="id59"><div class="title2">
<p class="p">9 сентября</p>
</div><p class="p1">Сегодня мы работаем с ТЕЛЕВИЗЕРОМ.</p><p class="p1">Я предпочитаю называть его именно так, уважительно, потому что Визер — известный австрийский экономист, доказавший — или по крайней мере думавший, — что стоимость вещи определяется ее предельной полезностью. Я не очень понимаю, что это такое, и никто не понимает, но формула мне нравится. Вообще ТЕЛЕВИЗЕР звучит гораздо красивее, а ТЕЛЕВИЗОР никто уже смотреть не в состоянии, такая это дрянь.</p><p class="p1">Но мы ведь с вами понимаем, что ТЕЛЕВИЗЕР — не прибор для просмотра сомнительных программ или впаривания народу сомнительных истин, а гадательный хрустальный шар для определения нашей судьбы. Рассматривая ТЕЛЕВИЗЕР с этой точки зрения, мы можем сделать его полезным и даже необходимым. Надо только научиться им управлять.</p><p class="p1">Итак, включаем ТЕЛЕВИЗЕР. Если его у вас, как у большинства хороших людей, сейчас нет или вы демонстративно пробили ему его стеклянную морду, и он стоит теперь как символ вашей личной удачной борьбы с оболваниванием масс, — идем в гости и там включаем волшебный прибор.</p><p class="p1">Последовательно переключая каналы с первого по десятый, записываем ПЕРВЫЕ ЗАКОНЧЕННЫЕ ФРАЗЫ, которые там услышим.</p><p class="p1">Составляем из этих фраз связный текст.</p><p class="p1">В моем случае это будет вот что:</p><p class="p1">Старайтесь следовать одной линии, как бы скользить по ней (теория моды, странный человек Васильев что-то показывает на примере туфли). Только упорный труд, каждый день с утра до вечера! («Симпсоны».) Тебе напомнить, какие молитвы читают после расчленения трупа? («Тайна Соммервила».) Сегодня треть населения планеты нуждается в помощи проктолога. («Здоровье».) Суд готов смягчить наказание экологам и заменить арест подпиской о невыезде. (Пятый канал, новости.) Нам может понадобиться помощь волшебных артефактов. («Искатели».) Катись, катись, колобок, через запад на восток! (Какая-то программа на мистическом канале, ищут клад.) Первое, что мы видим, — пробка на проспекте Вернадского. (ТВЦентр.) Не спи, ради бога, не спи, я должна тебе сказать главное. (Сериал «Счастливая Настя», что-то из XIX столетия, судя по задуваемой свече.) Говоря о ценностях, ты имеешь в виду норковую шубу или гарнитур? (Социальная драма семидесятых годов, названия не разобрал.) Окапывать этот кустарник следует аккуратно, следя за тем, чтобы его, так сказать, корни не оказались затронуты. («Наш сад» или как там это сейчас называется на канале «Россия».)</p><p class="p1">Истолковать послание ТЕЛЕВИЗЕРА в моем случае несложно. Продолжая свою линию («Квартал») и упорно трудясь, я как бы расчленяю собственный труп (чтобы начать жить заново), и это сродни помощи проктолога (расчищающего организм). За это Высший суд готов многое мне простить, но я должен использовать предмет из своего списка. Для выполнения сегодняшнего задания я должен, выйдя из дома, двигаться на восток, на пути мне встретится пробка, и это будет доказательством его правильности. Задание должно выполняться ночью (мне не следует спать). Ценности, которые я получу в результате, не будут ограничиваться материальными. Задание сводится к тому, чтобы окопать первый кустарник, который мне встретится на пути. Замечательным доказательством того, что я правильно прочел послание ТЕЛЕВИЗЕРА, является тот факт, что в моем списке необходимых артефактов как раз есть ЛОПАТА — Полезная вещь, которая мне не нужна. Она стоит на балконе, я давно ею не пользуюсь, потому что на дачу езжу крайне редко, а кроме того, там есть лопата. Эту я купил на обратном пути с дачи, она мне чем-то приглянулась, я все не соберусь завезти ее туда и держу на балконе. Значит, сегодня, дождавшись времени, когда обычно ложусь спать (это примерно час ночи или чуть раньше), я выйду из дома, отправлюсь на восток, упрусь в куст и вскопаю землю вокруг него.</p><p class="p1">Вы скажете: а смысл? Но ТЕЛЕВИЗЕР создан не для того, чтобы транслировать смыслы. ТЕЛЕВИЗЕР — умный ящик, существующий для того, чтобы зритель конструировал из случайных фраз произвольные абстракции. Именно поэтому проклинать ТЕЛЕВИЗЕР бессмысленно. Если вы не умеете им пользоваться, вы так и будете прислушиваться к белому шуму, который доносится оттуда. А ведь издают его люди, которые ничем не лучше вас, и им точно так же нечего сказать.</p><p class="p1">Пока не наступила ночь и мне не пришла пора копать, могу предложить вам еще несколько веселых и полезных забав с ТЕЛЕВИЗЕРОМ.</p><p class="p1">Переключая каналы, останавливаетесь только на сериалах. Просмотрите до конца сцену, на которую попали. Запомните последние фразы всех сцен перед монтажным переходом. Сложите из них монолог. Представьте себе лицо, которое могло бы произносить этот монолог. Вообразите его в мужском и женском варианте.</p><p class="p1">Еще. Переключая только новостные программы, запишите первую законченную фразу, которую услышите. Теперь замените каждое слово на противоположное по смыслу.</p><p class="p1">У вас получиться что-нибудь вроде «медленно падают убытки нерожденных», если считать «нерожденных» синонимом к слову «народ».</p><p class="p1">Представьте страну, применительно к которой все это верно. Хотите ли вы жить в такой стране? Кем вы хотели бы быть в такой стране? Почему вам так хорошо в такой стране?</p><p class="empty-line"/><p class="p1">Примечание. К должностям, фамилиям и званиям антоним не подбирается. Это, во-первых, невозможно, а во-вторых, получится несмешно.</p><p class="empty-line"/><p class="p1">И еще такая хорошая забава. Купите два ТЕЛЕВИЗЕРА, в одном оставьте изображение, но выключите звук, в другом оставьте только звук, но не смотрите на изображение. Если получается несмешно, попробуйте комбинировать каналы, пока не станет смешно. В жизни вообще всегда надо комбинировать до тех пор, пока не станет смешно.</p><p class="p1">Удачи в окапывании вашего личного куста.</p></span><span id="id60"><div class="title2">
<p class="p">10 сентября</p>
</div><p class="p1">Сегодня вам понадобится собака. Если она уже есть — хорошо. Если нет — воспользуйтесь собакой соседа, приведите домой бродячую, одолжите собаку на сутки у друга под любым предлогом, это тоже разовьет ваши способности.</p><p class="p1">Как мы знаем, собака — не просто ваш веселый друг, не просто аппарат для перерабатывания пищи в смешные катышки, не только способ выводить вас на прогулку дважды в сутки, но еще и довольно точный инструмент для определения некоторых приоритетных опасностей. Каждая собака, как знает любой псодержатель, в определенный час ночи подбегает к двери и начинает бешено выть, скрестись или — чаще — лаять. Стозевно и лаяй. Она обязательно будит этим весь дом, потому что опасность, о которой она предупреждает, серьезна. Наивные люди полагают, что это кто-то прошел по лестнице или вышел из соседней квартиры. Но днем, когда кто-то ходит по лестнице, собака обычно не реагирует. Кроме того, подойдя к двери и выглянув в глазок (ни в коем случае не открывая ее — уж это-то вы понимаете?!), всякий желающий легко увидит, что лестничная клетка пуста, то есть собака лает на невидимого гостя.</p><p class="p1">Легко предположить, что на лестничную клетку вернулся кто-то из бывших жителей вашей квартиры — прошлый владелец, или ваш умерший родственник, или это вообще, может быть, к соседям. Но умерших видят, как правило, кошки, на них они и лают, то есть орут по-своему. Собака же видит опасность, в этом принципиальное отличие ее функций от кошачьих. Кошка, как мы знаем, является модератором, связным между двумя мирами, что показано, например, у Гоголя в «Старосветских помещиках». Когда кошка уходит — значит, у вас плохо; когда она потом за вами приходит — стало быть, вам пора.</p><p class="p1">Иное дело собака. Собака не имеет доступа к невидимым сущностям, но чувствует, когда кто-то из них караулит, пытается пересечь ваш порог или просто ходит вокруг. Никто из невидимых сущностей, как известно, не может пересечь ваш порог, пока вы сами не откроете дверь, но после этого ее уже не выкуришь. Больше того — после этого хозяином своей квартиры являетесь уже не вы. Разглядеть эту сущность невозможно, но прежде всего она набросится на собаку, попытается лично отомстить ей. Описаны многие случаи, когда какой-нибудь идиот открывал дверь — после чего собака жалобно пятилась и забивалась в угол. Это ее не спасало, конечно. Через какую-то неделю она погибала от неизвестной болезни.</p><p class="p1">Известная народная баллада «У попа была собака» в действительности имеет продолжение, но тайные сущности, которые с особенной ненавистью набрасываются на священнослужителей, заставили народ забыть эти последующие строфы. Они сохранились только в украинской, карпатской версии этой песни, а в России все заменилось идиотским «И в землю закопал, и надпись написал». Здесь очевиден почерк того самого демона, которого почему-то проглядел Даниил Андреев, — демона, пытающегося закольцевать все в России, прежде всего ее историю. Следы этой закольцовки, увода сюжета в дурную бесконечность есть и в балладе про попа. Найти ее полный украинский вариант вы можете в «Вестнике Львовского университета» за 1975, по-моему, год, а вообще вам подскажет это любой фольклорист.</p><p class="p1">В русском переводе, тоже довольно известном, но только в среде профессионалов, эта история выглядит так:</p><div class="poem">
<div class="stanza">
<p class="v">У попа была собака,</p>
<p class="v">Он ее любил.</p>
<p class="v">Она съела кусок мяса,</p>
<p class="v">Он ее убил.</p>
</div>
<div class="stanza">
<p class="v">Увидав, что нет собаки,</p>
<p class="v">Призраков толпу</p>
<p class="v">Злые бесы-забияки</p>
<p class="v">Привели к попу.</p>
</div>
<div class="stanza">
<p class="v">Где собака та зарыта —</p>
<p class="v">Пес, что мясо крал, —</p>
<p class="v">Там, как свиньи у корыта,</p>
<p class="v">Бесы правят бал.</p>
</div>
<div class="stanza">
<p class="v">Страшно молвить, как их много —</p>
<p class="v">Злых бесовских рыл.</p>
<p class="v">Сторож дан попу от Бога —</p>
<p class="v">Он его убил.</p>
</div>
<div class="stanza">
<p class="v">Бесы душу жрут поповью,</p>
<p class="v">Ржут на голоса —</p>
<p class="v">Раз за шмат бифштекса с кровью</p>
<p class="v">Поп угробил пса!</p>
</div>
<div class="stanza">
<p class="v">Пропадет твой раб, о Боже,</p>
<p class="v">Нынешней весной,</p>
<p class="v">Раз ему дружка дороже</p>
<p class="v">Был кусок мясной!</p>
</div>
</div><p class="p1">Если не верите, украинский вариант привожу здесь же.</p><div class="poem">
<div class="stanza">
<p class="v">Був собі в попа собака,</p>
<p class="v">Він його любив,</p>
<p class="v">Кусень м`яса з`iв собака,</p>
<p class="v">Він його убив.</p>
</div>
<div class="stanza">
<p class="v">Тож немає охорони,</p>
<p class="v">І у двір попу</p>
<p class="v">Чортівня веде безсонну</p>
<p class="v">Привидів юрбу.</p>
</div>
<div class="stanza">
<p class="v">Де собака той заритий,</p>
<p class="v">Пес, що м`ясо крав,</p>
<p class="v">Там, як свині у корита,</p>
<p class="v">Біси правлять бал.</p>
</div>
<div class="stanza">
<p class="v">Мовить лячно, як багато</p>
<p class="v">Пик, рогів, хвостів…</p>
<p class="v">Сторож був від бога хаті —</p>
<p class="v">Піп його убив.</p>
</div>
<div class="stanza">
<p class="v">За сирий біфштекс воловий</p>
<p class="v">Вбитий вірний пес —</p>
<p class="v">Біси душу жруть попову,</p>
<p class="v">Ржання до небес!</p>
</div>
<div class="stanza">
<p class="v">Боже, раб твій вріже дуба</p>
<p class="v">Посеред весни,</p>
<p class="v">Бо ріднішим був за друга</p>
<p class="v">Шмат йому м`ясний!</p>
</div>
</div><p class="p1">Кстати, единственный след этой песни (и всего сюжета) в русской культуре — выражение «Где собака зарыта». Все истории о том, что генезис этого выражения восходит к Ксантиппу или некоему австрийскому рыцарю, поставившему памятник своей собаке, не выдерживают критики и служат единственно тому, чтобы окончательно уничтожить историю о попе и его работнике псе.</p><p class="p1">Итак, собака охраняет вас от самых опасных сущностей, которым известен так называемый ЧУ — Час Уязвимости. В этот час вы уязвимее всего. Проследить его можно только с помощью со баки. Итак, вы приводите пса домой (желательно сделать это днем, чтобы собака успела освоиться) и сытно кормите на ночь, но не так, чтобы собака (особенно уличная) объелась и утратила бдительность. Выгуляйте собаку вечером, но не дольше 15 минут. Для выгула вам понадобится Поводок для собаки. Приобретите его заранее.</p><p class="p1">Спокойно ложитесь спать.</p><p class="p1">Между 2:30 и 3:40 ночи (вряд ли в другое время, хотя отмечены случаи пробуждений после 4:00 и даже после 5:00) собака разбудит вас бешеным лаем. Она кинется к двери и начнет скрести пол.</p><p class="p1">Встаньте. Ни в коем случае не кричите на собаку — не говорю уж о том, чтобы поднять на нее руку или ногу. Подойдите к двери. Выгляньте в глазок.</p><p class="p1">Скорее всего вы ничего и никого не увидите, но, если резко повернуть голову, перед вами на долю секунды мелькнет силуэт того, кто вас караулит на лестничной площадке. НИ ПРИ КАКИХ ОБСТОЯТЕЛЬСТВАХ не открывайте дверь. Не зажигайте свет. Не пытайтесь успокоить собаку. Не пытайтесь успокоиться сами. Упорно и тщательно представляйте себе в деталях самое страшное существо, которое вы можете вообразить. Именно его присутствие сейчас чувствует ваша собака.</p><p class="p1">Точно заметьте время, когда она вас разбудила. Подсчитайте сумму цифр. Возведите в квадрат. Умножьте на свой Финансовый Индекс.</p><p class="p1">Это та сумма, на которую вы должны купить мяса для собаки или любого другого корма. Корм передадите хозяину или отдадите собаке сами, правильно дозируя.</p><p class="p1">Запомните Час Уязвимости.</p><p class="p1">Разделите ваш Финансовый Индекс на Час Уязвимости, записав его как обычное число, где часы — целое, а минуты — десятичная дробь.</p><p class="p1">Вы получили сумму, которую вам ежедневно, до конца «Квартала», надо тратить на охрану вашей личной безопасности и неприкосновенности вашего жилища. Можете подавать эту сумму нищим, а можете тратить на благотворительность. Деньги небольшие, вряд ли больше 200 рублей. Можно перечислять их на благотворительную программу «Сбербанка».</p><p class="p1">ВНИМАНИЕ! Если будете отдавать их собственным детям — это не считается.</p><p class="p1">Если пользовались бездомной собакой, не задерживайте ее у себя дома, отпустите. Если ей у вас понравилось — можете оставить. Вообще не советую. У вас и так мало времени на выполнение заданий «Квартала», а собака — тот еще хронофаг. Корми, гуляй… Кроме того, не исключено, что вам по делам «Квартала» придется уехать, и куда вы денете собаку? Надо думать о душе, а не о братьях меньших. Привыкайте: никаких бонусов за любовь к собаке вам не будет. Она — инструмент. Пора и к людям так относиться: они — инструмент для ваших поисков, не более. Человек не может стать другим — в смысле, перемениться, — но может стать собой, и это его единственная цель.</p><p class="p1">Так что отдайте собаку, если она чужая, и отпустите, если она ничья.</p><p class="p1">Если вы все-таки решились оставить собаку — или вам теперь страшно без собаки, — выполните упражнение.</p><p class="p1">РОВНО 30 РАЗ напечатайте на компьютере:</p><p class="p1">ЧЕЛОВЕК НЕ МОЖЕТ СТАТЬ ДРУГИМ, НО МОЖЕТ СТАТЬ СОБОЙ.</p><p class="p1">После этого берите собаку, черт с вами совсем. У меня у самого была собака, которую я очень любил. С тех пор как она погибла, мне приходится охранять себя самому, и как же, как же я лаял бы каждую ночь в 3:47, если бы только мог лаять!</p></span><span id="id61"><div class="title2">
<p class="p">11 сентября</p>
</div><p class="p1">Сегодня мы экспериментируем со своей душой, используя ее рейтинг, полученный 1 сентября. Мой, например, составляет 161. Значит, в моем распоряжении 161 секунда или чуть больше двух с половиной минут.</p><p class="p1">За это время составьте два списка.</p><p class="p1">Из вашего рейтинга души с помощью калькулятора извлеките квадратный корень.</p><p class="p1">Отнимите 3.</p><p class="p1">Получившаяся цифра, округленная до целого, вам сегодня понадобится. В моем случае это целое число — 22 — 3, следовательно, 19.</p><p class="p1">На отдельном листе бумаги выпишите 19 (или сколько у вас там получилось) ваших достоинств, то есть душевных качеств, за которые можно себя уважать; тех качеств, которые вам дороги.</p><p class="p1">На обратной стороне этого же листка выпишите столько же своих недостатков, то есть качеств, которые не нравятся лично вам (а не тех, за которые вас любят или не любят окружающие).</p><p class="p1">Вспомните ваш Индекс Активности, или ИА.</p><p class="p1">Обычно это однозначное число от 1 до 9.</p><p class="p1">Прочтите, что у вас там стоит под этим номером в списке достоинств.</p><p class="p1">У меня, например, это ОТХОДЧИВОСТЬ.</p><p class="p1">Теперь посмотрите, что у вас на обороте. Отсчитайте ИА от конца, поскольку мир пороков есть перевернутый, оборотный мир.</p><p class="p1">У меня это ЗЛОПАМЯТНОСТЬ.</p><p class="p1">Ах, как отвратительно.</p><p class="p1">Ведь именно из соотношения этих качеств и проистекает ваша главная внутренняя драма. Задумайтесь над этим. Я ведь не предлагаю вам идиотских тренингов в духе «Мои недостатки» или «Разговор с Богом». У нас все правильно, серьезно, научно, с учетом рейтинга души, в процессе трудного и ответственного прохождения. У нас без шарлатанства. Они же обычно делают как? Они лижут клиента, стараются понравиться ему, намазывают мед на кекс. Выпишите 10 своих недостатков, а теперь поймите, что они и есть ваши достоинства. Например, безответственность — это та же непосредственность, только она кричит чуть громче обычного. Мрази. Они же что, в сущности, пытаются изобразить? Особенно если еще это разговор с вами от имени как бы Бога. Какие жуткие вещи проделывает этот фальшивый Бог, каким ужасным голосом он с вами разговаривает! Полюби себя. Позволь себе это. Если у тебя депрессия, купи себе все, что видишь. Ты на самом деле хороший, твои недостатки — продолжение твоих достоинств, и задница, в которой ты сидишь, — розовейшая, наиароматнейшая из задниц! Мысленно пожелай всем людям добра, и ты увидишь на небе радугу, а на ней — всех ушедщих туда домашних животных. Люблю Запад, но как же я ненавижу сладкие пилюли, джонстаунский раствор цианида с клубничным сиропом, с помощью которого там усыпляют и отбраковывают неудачников!</p><p class="p1">А ведь все их тренинги ровно для того и предназначены.</p><p class="p1">Ненавижу.</p><p class="p1">Но у нас все серьезно. У нас вся проблема личности — именно в сопоставлении тех качеств, которые обнаружились. На своем примере я это вижу с ужасной, беспощадной ясностью. Я отходчив, потому что мне не хватает храбрости и упорства долго, последовательно ненавидеть то, что заслуживает ненависти. Но я злопамятен. Я запоминаю эту подавленную ненависть, живу с ней, она гноится во мне. Все дело в страхе, трусости, готовности примиряться. И я все запоминаю, но ничего не делаю. Я боюсь даже ненавидеть, а ненавидеть нужно, иначе эта ненависть перекипит во что-то куда более отвратительное. Отходчивые и злопамятные — главный бич этих мест. Они отходчивы, они прощают, они позволяют делать с собой что угодно. И всё помнят, и эта память растравляет их.</p><p class="p1">Вы, вероятно, уже поняли, что остаток дней в «Квартале» — а их осталось не так уж много, всего месяц, — мы должны потратить на то, чтобы упразднить этот внутренний конфликт.</p><p class="p1">Не то чтобы победить ЗЛОПАМЯТНОСТЬ или культивировать ОТХОДЧИВОСТЬ, но снять противоречие между ними, выбрать уже наконец что-нибудь одно.</p><p class="p1">Вот с послезавтрашнего дня и начнем, точнее — с послепослезавтрашнего, потому что завтра и послезавтра у нас, в силу биографических причин, есть дела поинтереснее.</p></span><span id="id62"><div class="title2">
<p class="p">12 сентября</p>
</div><p class="p1">Сегодня мы идем в Квартале на улицу дождя, как бы она там у вас ни называлась, то есть в ту часть Квартала, где вам особенно часто представляется дождь. Если сегодня на улице дождь — тем лучше: значит, наше прохождение точно совпадает с ритмом природы, и мы на верном пути. Но если сегодня ясный день золотой осени, тем интереснее по контрасту вообразить дождь.</p><p class="p1">Итак, близка середина сентября, листья падают (если, конечно, вы проходите «Квартал» в Северном полушарии), в погожие дни синева неба наводит на мысль о чахоточном румянце — все слишком ярко, пахнет обреченностью, — а дождь напоминает о том, что вообще-то мир сделан не для нас, что в нем надо не наслаждаться гармонией, а приспосабливаться и мучительно выживать. И вот мы идем на улицу или перекресток дождя — лучше вечером, если есть время, и лучше бы в асфальте дробились фонари и габаритные огни, и лучше при этом не брать с собой зонта, потому что зонт помешает вам вполне прочувствовать ситуацию.</p><p class="p1">Постойте там некоторое время, среди дождя и листьев; в случае ясной погоды минут 10 представляйте себе дождь, его затекание за воротник, его плевки в лицо.</p><p class="p1">Представьте себе, что вас выгнали из дому. Это гораздо вероятнее, чем вам кажется. Признайтесь, вы ведь уже представляли себе нечто подобное. Я, например, всегда представлял, когда выгуливал собаку. Ночь, дождь. И так легко вообразить, что тебе некуда деваться. Это гораздо легче представить, чем кажется, потому что вероятность очень велика. Вы надоели детям; любовница, которой вы купили или на которую записали квартиру, нашла другого; государству что-то в вас не понравилось, и оно решило, что ваша жалкая хатка нужна для чего-нибудь другого — например, как склад лыжного инвентаря для первого заместителя какого-нибудь второго помощника. Они все хорошо катаются на лыжах, лыж много, хранить негде. Наконец, вы можете произвести нехитрый подсчет, уловить, так сказать, тенденцию. Вы жили когда-то в трехкомнатной квартире с родителями. Потом ушли жить с женой в трехкомнатную квартиру поменьше или даже в двушку — где уж вам было купить нормальную при ваших заработках. А потом вы ушли от жены к любовнице и живете теперь в однокомнатной, где вам даже книги негде расставить, и у вас один костюм на все случаи жизни да пара джинсов, что уже довольно неприлично вашим летам. Что является следующим этапом на этом пути? Правильно, собачья конура. Хорошо еще, если вам оставят дачу, которую вы страшно запустили: так всегда ведь оказывается — тот, о ком мы меньше всего заботились, кротко ждет нас где-нибудь в конце нашего пути, чтобы спасти в последний момент. Там до сих пор хранятся ваши детские игрушки (на моей даче, например, хранятся, примерно в том же состоянии, в каком и я однажды туда приползу). Жалейте себя, жалейте! Так я жалею себя каждый раз под холодным дождем, при этом у меня кашель. Никто вас не спасет, никто вас не будет терпеть, мир вышвыривает, выдавливает нас, и точно так же в конце концов вас вышвырнут на улицу. Представляйте это с предельной ясностью. Спасет вас тот, кем вы пренебрегали. А теперь подумайте, серьезно подумайте: вот вас вы гнали — неважно, за что. Скорее всего, вы надоели детям. Или сами вы хлопнули дверью, но дождь остудил ваш пыл. А возвращаться нельзя — разве что в качестве побитой собаки. Что вы сделаете?</p><p class="p1">Это самое главное сейчас: куда вы денетесь? Потому что именно туда мы с вами сегодня и пойдем. Прямо здесь, в точке дождя в «Квартале», прикидывайте: если вы молоды и живете (жили!) отдельно от родителей — можно пойти к родителям. Шанс невелик, им самим тесно, но допустим. Однако если родителей уже нет или они в другом городе? Куда вы пойдете тогда? К другу? Подумайте, есть ли у вас такой друг. Подумайте, сколько времени вы сможете у него провести. Вспомните, сколько у вас денег с собой, хотя бы на первое время. Также прикиньте, будет ли вас терпеть жена друга.</p><p class="p1">Есть шанс, что у вас кабинет на работе. Прикиньте, согласится ли начальство пустить вас на работу. Представьте, какими глазами на вас посмотрят охрана, вахтер, коллеги. Представьте, где вы там будете мыться.</p><p class="p1">Подумайте, стоит ли вам поехать на дачу и в каком состоянии сейчас мокрая осенняя дача, а также когда вы там в последний раз протапливали печь (проверяли камин). Вспомните, заплачены ли у вас все деньги за дачу — они в последнее время неуклонно растут. Прикиньте, насколько запущены дом и участок и сколько времени вы сможете там провести.</p><p class="p1">Если все эти варианты вас не устраивают, подумайте, можно ли переночевать в гостинице или пересидеть ночь на вокзале. Представьте, каково это — провести ночь на вокзале. А некоторые так живут, их много. Попробуйте представить себе, что эта ситуация для вас невыносима, что друг не пустит и на вокзал страшно. Попробуйте вернуться домой, побитым псом, переступив через все унижения. Не сразу, а через два часа. Как мокрая, повторяю, побитая собака.</p><p class="p1">Не можете?</p><p class="p1">Теперь поняли, зачем это упражнение?</p><p class="p1">Продумывайте запасной вариант! Деньги, счастье, независимость — хотя это далеко не синонимы — есть только у тех, кому есть куда уйти. Подстраховывайтесь на каждом шагу. Правильно вести себя с женщиной способен только тот, кто может в любую секунду хлопнуть дверью. С мужчиной тоже.</p><p class="p1">Правильно жить, кстати, тоже может только тот, кто готов хлопнуть дверью.</p><p class="p1">Сегодня делайте именно то, что делали бы после такого хлопка: можете поехать к другу — поезжайте и прорабатывайте план, предупреждайте его, что можете переехать. Поедете на дачу — отправьтесь сегодня туда, приведите в порядок крыльцо и крышу. Вообще готовьте отходные пути на случай, когда выгонят отовсюду. А лучше сами уходите, важно только почувствовать когда.</p><p class="p1">Ну ничего, я вам скажу.</p></span></span>
