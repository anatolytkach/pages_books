<span><span id="id26"><div class="title2">
<p class="p">7 августа</p>
</div><p class="p1">Нам предстоят два дня занятий кинематографом — один тренировочный, другой творческий.</p><p class="p1">Назовите пять своих любимых фильмов.</p><p class="p1">Выпишите их именно в том порядке, в каком они вам вспомнились.</p><p class="p1">Я тоже сейчас это сделаю.</p><p class="p1">«Чужие письма».</p><p class="p1">«Человек-слон».</p><p class="p1">«Зеркало».</p><p class="p1">«Астенический синдром».</p><p class="p1">«Сладкая жизнь».</p><p class="empty-line"/><p class="p1">Дальше будет трудное, но необходимое. Не забывайте, что студентов тоже учат сначала монтировать чужие работы, а потом только снимать свои. Значит, вам предстоит смонтировать единый фильм из пяти ваших любимых, но так, чтобы действие его было связным. Продолжительность вашей будущей картины — полтора часа, советский стандарт. Следовательно, первые 15–20 минут вы берете из первой вспомнившейся картины, вторые — из второй, третьи — из третьей… И попытайтесь все это уложить в единый сюжет.</p><p class="p1">Напоминаю: куски берете не из начал, а в заданной последовательности. В моем случае — вот черт, задача практически невыполнима! — первые 20 минут из «Чужих писем», вторые 20 минут из «Человека-слона», третьи — уже практически из середины «Зеркала»… как же все это свести? Если действие ваших любимых картин происходит в разные эпохи, переводите все сюжетные повороты в одно время. Только так у вас получится сюжет вашей жизни, фильм лично про вас и про ваши тайные пристрастия. Попытайтесь проследить эту сквозную тему, она объяснит вам все про вас, как я сейчас намерен все понять про себя.</p><p class="p1">Вам придется все эти фильмы пересмотреть, отмеривая хронометраж, но Интернет дает такую возможность.</p><p class="p1">Итак, монтируем. Показываю, как всегда, на личном примере.</p><p class="p1">1. «Чужие письма»</p><p class="p1">У молодой учительницы в провинциальном городе проблемы с личной жизнью, она навещает своих старых учителей с молодым заезжим любовником, художником, с которым все чаще ссорится. Жениться он не хочет, в городе сплетничают. Учительница опекает девятиклассницу Зину Бегункову, «трудного подростка», железную и несгибаемую мещаночку, всегда уверенную в своей правоте, позволяющую себе все, а другим — ничего. Принципиальная Бегункова осуждает хулиганов в классе, хамит собственной матери, которая отсидела за растрату и теперь приехала только на свадьбу старшего сына, бегунковского брата. Сама Бегункова влюблена в шофера, люмпен-пролетария, который чуть ее не трахнул, увлекшись (она его к этому активно поощряла), но потом яростно ее отпихнул и еще издевался. После скандала с матерью и клеветы на шофера, который якобы к ней приставал, брат выгоняет Бегункову из дома, и молодая учительница берет ее к себе.</p><p class="p1">2. «Человек-слон»</p><p class="p1">Викторианская Англия. Доктор Тривз взял к себе Человека-слона, которого нашел на ярмарке, в балагане уродов. Человек-слон чудовищно изуродован врожденной генетической болезнью — таких деформаций лица и тела никогда не видел сам Тривз. Но тут выясняется, что его ошибочно считают слабоумным — он умеет говорить, читать, знает наизусть псалмы. Тривз, добиваясь права оставить его при себе и при больнице, показывает его главврачу. Человек-слон сначала от волнения не может сказать ни слова. Главврач в раздражении уходит, но тут слышит, как Человек-слон, Джон Мэррик, за дверью своей палаты читает псалом. Он возвращается, вступает с изуродованным юношей в уважительную беседу, соглашается оставить его при больнице и говорит, что никто не в силах представить его страданий. В это время больничный сторож впервые видит таинственного пациента, которого прячут от всей больницы, и задумывает ночью показать его знакомым пьяницам и проституткам.</p><p class="p1">3. «Зеркало»</p><p class="p1">Отец после развода забирает к себе — ненадолго — сына, Игната, и рассказывает ему о своем детстве. В эвакуации, в 43-м году, им преподает военное дело демобилизованный фронтовик — у него нет части черепа, и он прикрывает голову пластмассовой типа чашечкой. Особенно трудно складываются у него отношения с эвакуированным ленинградцем, осиротевшим во время блокады. Ленинградцу все время достается. Желая подшутить над военруком, ленинградец — в сценарии его фамилия Астафьев — бросает во время урока учебную гранату. Военрук накрывает ее своим телом. Взрыва, естественно, не происходит. С военрука слетают фуражка и чашечка, и все видят пульсирующую на черепе кожу. Рыжая девчонка, в которую военрук влюблен, смеется, и на ее обветренной губе выступает кровь. Эх ты, говорит военрук Астафьеву, а еще ленинградец (в сценарии — пионер). Астафьев уходит с урока и, плача, поднимается на холм к церкви. Отсюда открывается в ид на город. В сценарии потрясающая формулировка — очень по-тарковски: «И весь этот декабрьский предсумеречный мир казался Асафьеву сейчас долиной ожесточения, безвыходности и возмездия». Почему по-тарковски? Потому что снежный пейзаж, церковь, зверство и война, и, как подчеркнуто в том же сценарии, боль и обида не проходят, то есть они неразрешимы.</p><p class="p1">Дальше там начинается кинохроника, сценарием не предусмотренная, но она, видимо, — я в этом после множества просмотров не уверен — как раз и должна олицетворять ожесточение, безысходность и возмездие; немудрено, что для иллюстрации всего этого Тарковский берет азиатчину, красноармейцев, которые тащат оружие и сами идут через Сиваш, увязая в глине, — страшное беспортошное воинство, с нечеловеческим упорством прущее через нежилое, пустое пространство, — потом китайцев, голосующих за Мао с воплями и размахиванием мандатами, потом атомный гриб, потом с китайцами же приграничный конфликт… Как бы Астафьев провидит весь ужас, который был и будет, — среди снежной русской равнины, на холме, с которого «дальше некуда подниматься» (сценарий), и все-таки связь мне неясна. Впрочем, как говорил Тарковский, если связи будут ясны, картина рухнет.</p><p class="p1">Подумал вдруг, что и «Квартал» — тоже «Зеркало», не в смысле уровня, но вещь в жанре зеркала, когда после сорока тебя начинает давить твоя жизнь и ты начинаешь прослеживать в ней лейтмотивы, надеешься избавиться от них, а потом понимаешь, что вместе с ними избавишься от жизни. Но это апарт, у нас книга про деньги.</p><p class="p1">4. «Астенический синдром»</p><p class="p1">Сцена в классе (честное слово, я не подгадывал). Преподаватель английского, как раз и страдающий астеническим синдромом, Николай Алексеевич, дает урок в десятом классе, повторяя никому не нужные слова про успехи советского образования. Весь класс занят черт-те чем: одни смотрят в окно, где в очереди к пункту приема стеклотары идиотская смешная старуха рассказывает, как ей обещали дать щенка и не дали (а она уже купила сосочку). Две ученицы дивной красоты красивыми подростковыми руками терзают огромную, тошнотворную копченую рыбу и тут же жрут. Еще двое с помощью быстро перелистываемых блокнотов смотрят только что нарисованные порнографические мультики. Учитель произносит речь о мещанстве, которое и готово бы кому-нибудь помочь, но так, чтобы это не причинило ему самому ни малейшего беспокойства. Потом, видя, что его никто не слышит, он призывает к порядку самого тупого, наглого и жрущего, по фамилии Иуников. Вступает с ним в потасовку. Ученик, смеясь, потасовку выигрывает. Николай Алексеевич приводит себя в порядок и чувствует, что засыпает. Он уходит из класса за пять минут до звонка, попросив не шуметь. В классе тут же начинается дикий бардак.</p><p class="p1">В следующем эпизоде две халды цепляются к бедному уроду Мише, умственно отсталому и совершенно беспомощному. Они крутят его, пихают в лужу, издеваются — и тогда тот самый Иуников налетает на них, хватает за волосы, колотит. В процессе потасовки разбивают окно полуподвала, оттуда яростно орет истеричный мужик, дерущиеся яростно швыряют в остатки окна еще и урну, и в разбитом окне видны бледная жена и трое бедных детей, типа всюду жизнь. Спасенный Миша ничего не понимает, топчется у лужи. Николай Алексеевич подходит к Иуникову и говорит ему: «Оказывается, ты очень хороший человек». «Что, за посещаемостью следите?» — огрызается Иуников и убегает. «Почему меня никто не понимает?» — кричит Николай Алексеевич всем встречным, но никто его не понимает. Один из прохожих повторяет: «Ни стоять, ни лежать, ни сидеть я не могу, остается посмотреть, не могу ли я висеть».</p><p class="p1">5. «Сладкая жизнь»</p><p class="p1">Опять — и опять без специального подбора — все упирается в воспитание, в отцов и детей, в их вину друг перед другом. Сначала Марчелло гостит у друга-интеллектуала (он скоро покончит с собой), который знакомит его со своими внезапно вбежавшими в гостиную детьми. Им давно спать пора, но им многое в доме позволяется. В них — главное утешение друга-интеллектуала, переживающего кризис среднего возраста: не профессионал и не дилетант, жизнь прошла без смысла. Марчелло уезжает — и узнает, что около редакции его ждет его отец, приехавший из провинции. Марчелло ему рад, но о чем с ним говорить — непонятно. Они решают поразвлечься, идут в богемный кабак, отец поражается, насколько свободно Марчелло общается со стриптизершами. Отец кутит, требует шампанского — «Я поставляю его половине Италии!». Клоун играет бесконечно печальную музыку, разрешая все это буффонадой.</p><p class="p1">Тут сквозной мотив даже искать не надо — все удивительно наглядно, как гены у дрозофилы. Сквозная тема — тщетность любого воспитания или, так сказать, воспитание урода. Мы говорим — я говорю — перед классом, которому нет до нас дела. Дети не то чтобы ненавидят нас (меня), они скорее беззлобны. Но все, что мы повторяем, уже никому не нужно. Гранаты, которые они кидают, — поддельные, и они не нуждаются даже в том, чтобы мы их собой прикрывали, жертвуя жизнью ради них. А вокруг бушует ожесточение русской (итальянской) равнины и кризис среднего возраста. Единственные, кому мы нужны, — как раз уроды, мы можем их защитить, а точнее, продлить их агонию. Но кого мы можем прикрыть собой? Больничный сторож, мерзкий тип, на них уже нацелился, сейчас он придет со своими шлюхами. И те уроды, которые к нам тянулись, которых мы пытались защитить, нас же и проклянут.</p><p class="p1">Тему я вычленил, не сказать, что она мне нравилась, — но она так выстроилась, другой нет. Надо было еще и это про себя понять.</p><p class="p1">Завтра сами будем снимать кино, переламывать тему, задавать новую.</p><p class="subtitle">* * *</p><p class="p1">Вырвите эту страницу.</p><p class="p1">Сделайте голубка. Дождитесь порыва ветра. Запустите несчастного.</p><p class="p1">Три попытки.</p><p class="p1">Запомните лучший результат.</p><p class="p1">Это ваш рейтинг голубковой дальности.</p></span><span id="id27"><div class="title2">
<p class="p">8 августа</p>
</div><p class="p1">А теперь, собственно, то главное творческое задание, ради которого мы вчера осваивали монтаж.</p><p class="p1">Вы наверняка хотите снять собственный фильм. Обязательно хотите, потому что хоть раз такая мечта была у каждого. Космический боевик, детективный блокбастер, экзистенциальную драму, любовную историю, фильм про то, как нам обустроить Россию.</p><p class="p1">Подробно напишите сценарную заявку на этот фильм — сюжет, развитие действия, начало, конец, кульминацию, все это очень важно. Размер заявки — примерно две компьютерные страницы, 7–9 тысяч знаков.</p><p class="p1">Или, если вы привыкли писать от руки, обычное школьное сочинение — 3–4 тетрадных листа.</p><p class="p1">Как всегда, все покажу на собственном примере. Я хотел снять много фильмов, о некоторых мечтаю еще и сейчас, выбираю тот, который всего реалистичнее и при этом наиболее тщательно продуман, в, так сказать, одинокие ночи, а иногда и в неодинокие. Сценарий его я вам излагать не буду, потому что не теряю надежды снять, но что делать с синопсисом, расскажу подробно и в самом главном признаюсь.</p><p class="p1">Написали заявку? Отлично. Исходим из того, что в фильме 90 минут, и делим свою историю на девять частей по 10 минут.</p><p class="p1">Вспоминаем, сколько нам лет. Исходим из того, что оптимальная продолжительность человеческой жизни — 90 лет. Ищем свой возраст в сценарии: если нам 25 — смотрим, что происходит на 25-й минуте. Это и есть портрет вашей жизни на сегодня, истинная цель всех наших кинозанятий.</p><p class="p1">Сколько мне лет — мое дело, но на этой минуте у нас что же?</p><p class="p1">На этой минуте у нас женщина-волонтерша, вложившая все силы и деньги в судьбу больного мальчика-сироты и нашедшая ему американских усыновителей, узнает, что он от них торжественно отказался. И принял предложение зам а местного северно-российского губернатора об усыновлении. И заявил, что никогда не хотел в Америку, хотя благотворительница такая-то его склоняла (а благотворительница такая-то на своей благотворительности лишилась работы и была брошена мужем — потому что ему не нужда была женщина, живущая только чужими проблемами).</p><p class="p1">Как сердиться на такого мальчика? Он же болен. А в твиттере он ей написал: «Простите меня но вы же понимаете это был мой единственный шанс как говориться надо ковать пока горячо. У вас еще будет удача а у меня не было бы никогда».</p><p class="p1">И «Единая Россия» дарит ему новое кресло с голосовым управлением, американское.</p><p class="p1">Нет, никогда мы не переломим судьбу и не перевяжем узлы. Инвариант «воспитай монстра» преследует нас на всех путях.</p><p class="p1">Неужели и вам я тоже нужен только до тех пор, пока знаю секрет и могу привести к деньгам?</p><p class="p1">Остается надеяться, что это еще не конец сценария. Но это уже вторая его половина.</p></span><span id="id28"><div class="title2">
<p class="p">9 августа</p>
</div><p class="p1">Сегодня мы ничего не будем делать. У нас, так сказать, единственная на весь «Квартал» суббота. День абсолютно без всяких упражнений, полновесный отдых. Отдыхать можно разнообразно, как и положено в шаббат, когда можно делать много чего — нельзя только производить новые сущности. Лифт, говорят, вызывать тоже нельзя — я, правда, никогда не видел такого лифта, который сам останавливается на всех этажах, чтобы еврею не пришлось трудиться. Есть 39 видов работы, запрещенной в шаббат. Остальное можно. На одном форуме долго обсуждалась проблема, можно ли в шаббат есть торт с надписью — ведь запрещается писать и стирать написанное. Какой-то раввин, большой, видимо, тортоед, установил, что можно. У нас все проще, мы сегодня отказываемся от упражнений, только и всего.</p><p class="p1">Мы позволим себе именно такой отдых, о котором я особенно мечтал, скажем, в армии. Есть предметы, от которых исходит эманация усталости, вся многолетняя, многомесячная усталость, нежелание вставать, желание коснуться головой подушки и немедленно отрубиться. У нас в помещении дежурного по части был такой топчан. Пока помдеж нес вахту, дежурный на четыре часа мог прилечь. Помдежами ходили сержанты, я в том числе. От этого темно-коричневого клеенчатого топчана волнами шла такая усталость, такая, вы не поверите, истома, хотя это слово, казалось бы, к армии не идет совершенно, что я редко удерживался от соблазна на него прилечь, когда были хоть десять минут. И встать с него потом было совершенно невозможно, как невозможно встать в школу зимним утром. Когда мне надо заснуть и никак не спится, я пытаюсь представить это состояние. Или я включаю механизм торможения, он тоже усыпляет, — представьте себе, что вам надо выползти из-под одеяла и взять некий предмет, а брать его вам лень, очень не хочется. Сон хорошо развивается на фоне необходимости вставать, а если вставать не надо, то и спать неинтересно. Мы отдыхаем сегодня ни от чего, хотя прожили трудную долгую жизнь, полную унижений, тоски и безнадежности. Отдых вообще всегда ни от чего, он всегда зачем. Мы именно позволяем себе не сделать чего-то важного. Что-то надо было, а мы не будем. Может быть, 13 сентября как раз и есть тот ключевой день, когда надо было сделать что-то самое главное, а мы вот не стали, и это правильно. Да пошли они все вообще с этими их упражнениями. Мир был сотворен, как известно, в минуту отдыха. Но что-то самое главное не сделано, потому что было лень. Согласитесь, в мире есть прелестная незавершенность, щель. Господу лень было доводить его до совершенства, а мы не умеем. Но какая-то недоработка чувствуется, небольшая, устранимая, однако в ней-то все и дело.</p><p class="p1">Подумаем о ней, прежде чем заснуть, и еще краем сознания подумаем о жанре. Мы присутствуем сегодня при величайшем историческом переломе, когда закончилась литература про такого-то и такого-то, а началась литература про вас, не столько литература в обычном смысле, сколько manual, руководство. Это сейчас мы пишем первую такую книгу, и нам очень трудно, потому что она адресована всем — пойди разработай универсальный сюжет, который могли бы проживать и старухи, и подростки. Со временем будут книги для половозрелых мужчин, для женщин, для младшего школьного возраста. Главным жанром станут вовсе не компьютерные игры, как думали многие, а всякий интерактив, прямой, буквальный. Хватит читать, пора проживать. Мегабестселлером будет не роман о том, как молодая женщина изменила мужу и бросилась под поезд, а сборник практических руководств, расписанных по дням. За этим жанром, я думаю, будущее. День первый (тут же намечены и антураж, и время года, и предпочтительно день недели): поезжайте к вашему брату в Москву. Или, допустим, обратите внимание на такого-то и такого-то молодого человека в вашем окружении. Он наверняка там есть, характеристики у него такие-то. Подайте ему знак, договоритесь. День пятый: позвоните ему. День 15-й: отдайтесь ему. Сочиняться все это будет мастерами-сюжетчиками, профессионалами, но с помощью лучших психологов, конечно. Чтобы удерживать ритм, чтобы звонить не на третий, а именно на пятый день. И, само собой, там будут дополнительные характеристики: эта книга для блондинок, эта — для 30-летних, эта — для сельской местности. День седьмой: выходим за околицу и глубоко вдыхаем полной нашей тугой и округлой сельской грудью. Вдыхаем и думаем: ох ты рожь широкая, или рожа квадратная, немереная, или что-нибудь в этом роде. Там будут предписаны и монологи, и мысли — словом, все, чтобы вы ощутили себя полноценным персонажем. Не будет книг, а будут руководства к действию. И тогда, возможно, мы все заживем по-человечески, потому что люди наконец будут вести себя так, как положено в литературе: ярко, осмысленно, с чувством.</p><p class="p1">Я хочу, чтобы вы эту главу читали на ночь.</p><p class="p1">Представим, например, детскую книгу будущего: руководство для мальчиков по организации классического детектива. Про слежку там всякую. Сегодня мы начинаем следить за соседом. Представим себе, что наш сосед шпион, и начнем делать его жизнь невыносимой. Это несложно. Книга для девочек: сегодня мы обидим подругу, а завтра попросим у нее прощения. Уже сегодня главный бестселлер — руководство: пойдите туда-то, поглядите налево, увидите Палаццо дожей. Или: встаньте с утра, проделайте пятьдесят раз движение «крылышки» — отчего-то это легкое упражнение считается очень полезным. Но это первые шаги, примитивные руководства для похудания или выбора партнера. Сейчас мы поднялись на первую ступеньку — предлагаем вам сказочное путешествие в мир странных поступков и мыслей, ибо прекрасно только странное и только оно хорошо оплачивается. Правда — это не вдоль и не поперек, а вверх. А дальше такие книги-маршруты — но уже не по Венеции и не по диетам, а по жизни — станут популярнее любой игры, потому что проживание литературы интересней чтения, а главное — жизнь без руководства все хуже достала. Сначала это будут экранизации — нет, не знаю даже, как назвать — скажем, витализации, вот! Витализация, то есть проживание, «Анны Карениной». А потом и оригинальные сочинения, на новые сюжеты. И чтобы читатель не заглядывал в конец, выходить они будут отдельными выпусками, или вы будете находить новые руководства, продвигаясь по маршруту. Дошел до некоторой точки, скажем, гостиницы, где вас должны убить и обязательно убьют, если вы не прочтете руководство, — а там в верхнем ящике стола, рядом с Библией, часть вторая.</p><p class="p1">А впрочем, можно и в конец заглянуть. Вопрос же не в знании, а в сумме ощущений. Знаем же мы, что в конце жизни… хотя ничего мы не знаем на самом-то деле. Я знаю, а вы нет. Спокойной ночи, мамоти-поти, как говорил я в детстве.</p></span><span id="id29"><div class="title2">
<p class="p">10 августа</p>
</div><p class="p1">Сегодня вам надо заняться сексом</p><p class="p1">Вот как хотите, так и занимайтесь. Что? Не слышу? Вам 80 лет? Ну не знаю. В принципе у нас книга без возрастных ограничений. Энтони Куинн в последний раз стал отцом, когда ему было 86 лет, а между тем жизнь его была не пряник. Сын ирландца и ацтекской женщины. Представляете такой коктейль, такой внутренний конфликт? Но жил же как-то, занимался сексом. Слава пришла к нему, когда Куинну было уже 36 лет, а до того снимался в чем попало. До «Дороги» его никто всерьез не принимал. Большинство ролей — второго плана. В возрасте 77 лет был номинирован на «Золотую малину» за худшую роль этого самого второго плана, посмотрел бы я на вас. Тем не менее в 75 лет, уже будучи отцом семерых детей, женился на бывшей секретарше и родил еще двоих. Что вы кукситесь? Мы никого не заставляем, конечно. Но деньги тоже на дороге не валяются, работать надо.</p><p class="p1">Я вам объясню, зачем это надо. Во-первых, секс — наш единственный пока, к сожалению, способ биохимически понять другого человека, проникнуть в него. Без этого понимания вы никогда не разбогатеете, то есть не станете тем человеком нового типа, к которому деньги так и липнут сами. Попробуйте во время секса задуматься (не врите, большинство задумывается, так не бывает, чтобы мозг вообще отключался), что нас всех объединяет. А вот это самое и объединяет — физическая природа, плоть, сознание того, что мы смертны. Постарайтесь позаботиться об этом человеке, который тоже умрет, сделать ему как-нибудь хорошо. Это важное метафизическое упражнение.</p><p class="p1">Потом ведь вот что: человек нового типа — это человек, который умеет договариваться. Как вы хотите заработать деньги, когда не умеете договариваться даже о такой простой вещи? Все же хотят на самом деле, и очень многим не с кем. Всего-то и надо — доказать, что вы именно тот самый и есть. Если вы женаты/замужем, то я вообще проблем не вижу. Можете сказать, как мне однажды сказала любимая: если мы и дальше будем два раза в месяц, кормить тебя я тоже буду два раза в месяц. Ну это она погорячилась, конечно, но вообще такую современную Лисистрату пред ставить очень легко. Всем жутко не хватает секса, все заняты, все предпочитают виртуальный контакт или онанизм. И в этом причина, что ни у кого нет денег. Чтобы у вас завелись деньги, нужно не бояться плоти мира, реального контакта с ним. Все уже будет цифровое, а еда и размножение останутся реальными, этого никак не сделаешь по Интернету. И деньги — тоже грубое такое, физическое дело. Не надо думать, что они могут быть пластиковыми. Америка так думала — и смотрите, какой кризис. Деньги — кровь мира, к одним органам она приливает, от других отливает. Если вы не можете сделать так (к мужчине обращаюсь), чтобы у вас кровь прилила к конкретному месту и оно от этого затвердело, как вы хотите, чтобы деньги приливали к вашему кошельку? Надо упражняться, без этого ваш кошелек так и будет висеть бессильно.</p><p class="p1">Потом еще важное: секс — это одно из немногих удовольствий, которые можно сделать друг из друга, просто так, не прибегая к посторонним предметам и связям, если, конечно, у вас нет извращенных пристрастий к плетке там или вибратору с шипами. Но все равно это вещи незначительные, вам же не нужно для получения полноценного оргазма включать в сеть других исполнителей. Ах, нужно? Да, это сложно. Это я как-то не подумал. Это же вам нужно обзвонить пять человек, а у всех дела! И некоторые как раз сейчас занимаются сексом, так что им некогда. Хорошо, что нормальный секс — всего вдвоем. Проще договориться. Помните, у Алексея К. Толстого, про семь полов — как было бы трудно всех собрать, у одного отпуск, у другого триппер! И, главное, «родственников та семерка сорок девять бы имела». А вам всего-то найти одного партнера и одно простое помещение на каких-то полчаса, а некоторым хватает десяти минут! И у вас на все это целые сутки! Учтите, насчет суток мы строги, как Шарль Перро в легенде о Золушке. Если вы займетесь сексом в 00:01 следующих суток — вы уже выпали из «Квартала», уже вы про, так сказать, трахали свой золотой шанс. Пусть хороший секс вам послужит утешением, но вообще прелюдия должна быть короче, это мы вам на будущее советуем. Партнер засыпает, партнерша соскучивается.</p><p class="p1">Теперь мы сталкиваемся с проблемой этического свойства: у нас на книге, конечно, написано 18+. Это везде теперь пишут, скоро будут писать на мороженом. В некоторых иностранных переводах «Квартал» даже продавался в пластиковой упаковке. Но мы же понимаем, что дети вездесущи. Что лучший способ заставить читать возрастную категорию 18– это написать на книге 18+. И вот, маленький хитрец, ты читаешь эту книгу, а тебе 12 лет. По новейшим правилам тебе даже знать запрещено, откуда дети берутся и как это связано с сексом. И ты при всем желании не сможешь им заняться… хотя почему не сможешь? Может, ты уже занимаешься им вовсю. Кто знает этих нынешних детей. Я вот, честно тебе скажу, ждал до 17 лет, и очень хорошо, потому что раньше я многого не понимал (и вообще, если правду, не очень много об этом думал). Но если тебе 12 лет и ты еще не пробовал, а денег тебе уже хочется, и ты успешно прошел все развилки, и решил все задачки, и у тебя великие планы — почему бы тебе не пройти «Квартал»? Но только что тебе делать, пока ты еще не можешь заняться сексом?</p><p class="p1">Тебе надо как-нибудь испытать те же чувства, которые испытывают взрослые во время этого занятия. Сначала это очень-очень сильное желание сделать что-то, потом легкий страх, что ты не сможешь этого сделать или неправильно при этом выглядишь, потом твердая, горячая радость от того, что ты можешь это сделать и вот сейчас это сделаешь, потом чувство, что жизнь не напрасна, потом вообще очень большое удовольствие, потом содроганье, которое очень отдаленно можно сравнить с чиханьем, но это как бы чиханье всем телом, а потом легкое разочарование, иногда даже ненависть, желание как можно скорее куда-нибудь деться. И порой даже, страшно сказать, это сравнивают с убийством. А что такого? У нас же на «Сцене из Фауста» Пушкина не написано пока 18+? «Так безрасчетный дуралей, вотще решась на злое дело, зарезав нищего в лесу, бранит ободранное тело». Если и дальше детей так оберегать от серьезных вещей, они вообще читать перестанут, только резать нищих и бранить ободранное.</p><p class="p1">Вот, мы тебе рассказали примерный перечень эмоций. Если хочешь выполнить задание, можешь их пережить ровно в том же порядке. Значит, сначала очень-очень сильное желание. Чего ты хочешь? По-настоящему? Изо всех сил? Поездку в Америку не предлагать. Убийство учителя географии не предлагать. Айпад шестого поколения не предлагать. Айпад этот и так у тебя будет, когда ты разбогатеешь. Все планшеты всех поколений будут к твоим услугам, и ты поймешь, что счастье не в них. А вот хочется тебе, допустим, экзотический фрукт манго с его неповторимым хвойным привкусом. Хочется очень сильно. Представь его себе. Представь, как ты его ешь, как в него вгрызаешься. И где его взять? И на какие деньги? Но попробуй достать деньги. И с этими деньгами отправляйся туда, где продается фрукт манго. Сначала ты его не найдешь, но потом обязательно где-нибудь обнаружишь. Фрукт манго в наше время продается в любом Мухосранске.</p><p class="p1">Почему он нам так нужен? Потому что манго — это привет из мест, где ты еще не бывал. Где растут вечнозеленые двухметровые манговые деревья. Где все население делится на четыре касты, и одних нельзя касаться, потому что они слишком низки, а других — потому что они слишком высоки. Где за неверное слово или одежду неправильного цвета можно поплатиться жизнью. Где на экране обниматься можно, а целоваться нельзя.</p><p class="p1">Съели манго. Испытали чувство теплой уверенности в своих силах. Теперь самое интересное. Теперь не ссать до вечера. Не ссать вообще. Не ссать до тех самых пор, когда ссать захочется нестерпимо. Когда иных желаний не останется. Когда начнешь приплясывать на месте.</p><p class="p1">А кстати, очень долго терпеть нельзя. Ну это опасно просто. Будет растяжение пузыря. Он может треснуть вообще. А мочевой пузырь не желчный — без него жить невозможно. И поэтому в какой-то момент надо принимать решение. А в уборную нельзя. А ссать нужно. А некуда. Я понимаю твои чувства. Я прекрасно понимаю твои чувства. Но ссать надо. А в уборную нельзя. Не будет денег. А пузырь один. Что мы делаем тогда?</p><p class="p1">Иди в ванную или в любое другое место, где никто тебя не видит. Вставай в ванну. Не раздеваясь!</p><p class="p1">Ссы в штаны.</p><p class="p1">Неприлично? Ты скажешь, неприлично? А трахаться прилично? Трахаться еще гораздо более неприлично!</p><p class="p1">Я сказал, ссы в штаны.</p><p class="p1">ССЫ В ШТАНЫ!</p><p class="p1">Больше повторять не буду.</p><p class="p1">Содрогание есть?</p><p class="p1">Чувство блаженства и стыда есть?</p><p class="p1">Все правильно.</p><p class="p1">Можешь выстирать штаны.</p><p class="p1">Если ты не поссал в штаны, считай, что у тебя ничего не получилось.</p><p class="p1">Девочек тоже касается. Хотя у них все по-другому. Но не так уж и по-другому. Просто в их случае к удовольствию примешивается чувство опасности. Потому что от секса бывают дети. Рекомендуем девочкам перед началом эксперимента надеть особенно дорогую юбку, чтобы к удовольствию, облегчению, стыду и омерзению примешивалось чувство опасности, потому что заругают.</p><p class="p1">Заругают, впрочем, в любом случае. Но после секса, знаете, тоже бывает, что ругают.</p><p class="empty-line"/><p class="p1">Примечание 1. Для взрослых эта схема не работает. Если вы надеетесь отделаться, поссав в штаны, и если вам 18+, вы так и будете всю жизнь ссать в штаны. Это же входит в привычку, становится нормой жизни. Отвыкнуть очень трудно.</p><p class="p1">Онанизм тоже нельзя. Разве что после занятий сексом, если вам настолько не хватает.</p><p class="p1">Зоофилию тоже нельзя. Я понимаю, что с животным не надо договариваться, но надо с человеком. Гомосексуализм можно. Педофилию нельзя ни в коем случае.</p><p class="empty-line"/><p class="p1">Примечание 2. Для возраста 12+. Срать в штаны нельзя, это совсем не то. И для того ли мы ели фрукт манго?</p></span><span id="id30"><div class="title2">
<p class="p">11 августа</p>
</div><p class="p1">Сегодня у нас первая ролевая игра.</p><p class="p1">Значит, мы должны провести весь день как другой человек. Пусть ваши друзья и коллеги думают, что вы прежний/прежняя, но внутри себя вы женщина, от которой только что ушел возлюбленный. Он был женат, но любил вас. Динамил вас пять лет. Потом понял, что не сможет жить без жены, его замучила совесть. И он ушел, а вы остались одна, даже без ребенка. Вы еще вполне хороши, но вам тридцать. Что теперь делать, вы не понимаете. И что самое печальное, вы отлично понимаете, что он вас в покое не оставит. Так и будет за вами шляться, ломиться по ночам — все уже было. Это он уже второй раз понял, что любит жену. На самом деле, конечно, никакой любви там никогда не было, но вы-то любите, куда деваться. Ненавидите, положим, а любите. И при этом не хотите больше его пускать, потому что ушел — так ушел. А вместе с тем что у вас еще есть-то? Вы живете в том же Квартале, только у него дом на Улице надежд, а у вас, вот сложилось, в Опасной точке, то есть рядом. И когда он ночевал у вас — а он почти переехал, — то постоянно орал во сне: снилось ему все какое-то белое лицо… или черное… в общем, какой-то призрак за ним бегал. Это потому, что у вас в доме плохая энергетика, а у него отличная.</p><p class="p1">Пройдитесь с утра, еще до работы, по Кварталу. Посмотрите на его окна. Скоро он спустится к машине, поедет на службу, день его заполнен, страдать некогда. Добирайтесь до своей работы, не забывая смотреть, как много на улице счастливых пар, счастливых жен и просто окольцованных женщин. Это всегда так: у кого что болит. И весь день на работе думайте о нем. А к своему дому добирайтесь кружным путем, чтобы не видеть еще раз его окон.</p><p class="p1">Придумайте план действий. Времени много — вы одна пьете чай в пустой комнате. Или она не пустая, есть кошка. Родители живут отдельно и, естественно, ненавидят вашу личную жизнь и главного ее губителя. Им пожаловаться нельзя: сразу закричат «Мы говорили!», и этого утешения вы уже не перенесете.</p><p class="p1">Есть страшный соблазн позвонить, но вы этого не сделаете. И он не сделает.</p><p class="p1">Думайте, думайте. Скоро поступит дополнительная информация.</p></span><span id="id31"><div class="title2">
<p class="p">12 августа</p>
</div><p class="p1">Сегодня мы изучаем содержимое наших карманов. Ничего не выбрасываем, напротив, так и продолжаем таскать с собой.</p><p class="empty-line"/><p class="p1">ОБЯЗАТЕЛЬНАЯ ПРОГРАММА</p><p class="p1">Бумажник.</p><p class="p1">Ключи от квартиры и машины.</p><p class="p1">Удостоверение личности (пропуск на работу).</p><p class="p1">Мобильный телефон.</p><p class="p1">Носовой платок.</p><p class="empty-line"/><p class="p1">ПРОИЗВОЛЬНАЯ ПРОГРАММА</p><p class="p1">Медикаменты.</p><p class="p1">Визитница.</p><p class="p1">Сигареты с зажигалкой.</p><p class="p1">Авторучка.</p><p class="empty-line"/><p class="p1">ЛИШНЕЕ</p><p class="p1">Фантики.</p><p class="p1">Чеки.</p><p class="p1">Записки.</p><p class="p1">Списки товаров для похода в магазин.</p><p class="p1">Фотографии.</p><p class="p1">Мусор.</p><p class="p1">Презервативы.</p><p class="empty-line"/><p class="p1">Производим подсчет. За каждый предмет из первого списка вы получаете по одному баллу. За каждый предмет из «Произвольного» — пять баллов. За каждый предмет из «Лишнего» — по десять.</p><p class="p1">Суммируем.</p><p class="p1">Ровно столько раз вы должны сегодня отжаться. Забыли уже? Ничего, напоминаю. Нечего разводить в карманах черт-те что, это метафора вашей общей растерянности и небрежности. Учитесь ограничиваться необходимым и отжиматься в обмен на сентиментальность.</p></span><span id="id32"><div class="title2">
<p class="p">1 3 августа</p>
</div><p class="p1">Поздравляю вас, сегодня у нас первая развилка.</p><p class="p1">Развилка — серьезный экзамен, но экзамен ведь довольно приятная штука. По крайней мере я в университете очень любил. И отвечал всегда первым, чтобы скорей отделаться. И рубашка у меня была специальная экзаменационная, до сих пор цела, синяя в белый горошек. Счастливая. Сдавать всегда можно было только в ней, так семь лет и сдавал, то есть пять с перерывом на армию.</p><p class="p1">Развилка — что-то вроде несгораемой суммы в игре «Кто хочет стать миллионером?», но вот проблема: я не могу вас оставить ни с какой несгораемой суммой, кроме нового опыта. Вы либо получите все деньги сразу — непосредственно после «Квартала», в течение буквально месяца или раньше, — либо не получите вообще ничего. Но, во-первых, мы познакомились, даже, можно сказать, подружились, а во-вторых, кто вам сказал, что пройти «Квартал» до конца было бы для вас так уж хорошо? Очень может быть, что вовсе не было бы. У вас, может быть, появился сегодня шанс подумать, с чем вы все-таки остались.</p><p class="p1">Потому что жизнь — она ведь далеко не всегда приводит к приобретениям. Напротив, как говорила мне одна женщина исключительного ума, — всякая жизнь не удалась уже потому, что она конечна. Следовательно, приобретения должны быть двоякого рода: либо те, которые улучшают душу (потому что она бессмертна, если мы действительно так считаем), — либо, если мы так не считаем, те, которые позволяли прожить наиболее плотно, наполнить отпущенный нам отрезок. Необязательно удовольствиями, как считают одни, или особенно бурными эмоциями в максимальном диапазоне, как считают другие, — а вот теми состояниями, когда мы выходим за свой предел. Только в них есть смысл. Когда мы выпадаем из ряда, из времени, из оболочки — вот тогда счастье. И чем больше было в вашей жизни таких минут, тем дольше вы жили, потому что это время, как рыбалка, в зачет не идет.</p><p class="p1">В сущности, это была прижизненная репетиция посмертной свободы. Когда душа летит и ничто ей не указ.</p><p class="p1">Теперь мы делаем следующее.</p><p class="p1">Возьмите ваш Финансовый Индекс, помножьте на свой возраст (полные года), потом засеките время. Ровно три часа с того момента, как читаете эту инструкцию.</p><p class="empty-line"/><p class="p1">Дальше не читайте, страницу не переворачивайте.</p><p class="empty-line"/><p class="p1">Три часа прошло? Хорошо.</p><p class="p1">Вспомните, сколько раз за эти три часа вы были в уборной.</p><p class="p1">По какому делу — это мне совершенно неважно. Может, у вас там молоток лежит и вы лазали за ним, гвоздь заколачивали. Сорвалась любимая картина «Осенние грибы», не выдержав тяжести изображенных на ней сырых грибов.</p><p class="p1">Допустим, ни разу не были. Это принимаем за единицу (умножать на ноль нельзя).</p><p class="p1">Или, допустим, были два раза. Поздравляем вас, вы здоровый человек.</p><p class="p1">Или были пять — тогда вам, конечно, не до «Квартала», но может быть, это как раз признак того, что вас ждут деньги. Вы как бы очищаетесь, освобождая им место.</p><p class="p1">Умножаем предыдущее произведение на эту цифру. То есть Финансовый Индекс на полный возраст и еще на число С, как мы его обозначаем от слова «сортир». Не подумайте, это не какая-нибудь грязная шутка. Скорость вашего очищения от шлаков — важнейший параметр, и открою вам маленькую тайну: по мере прохождения «Квартала» она будет возрастать, не до неприличия, конечно, но до заметного обновления.</p><p class="p1">Мой возраст я вам до конца раскрыть не могу, а индекс С, как вы понимаете, вообще интимная вещь. Так что на этот раз всё сами.</p><p class="p1">Подсчитайте сумму цифр в получившемся произведении.</p><p class="p1">Если 5 или 7, вы выбываете.</p><p class="p1">Во всех прочих случаях — остаетесь.</p><p class="p1">Видите, как просто. У вас практически 7 шансов из 9.</p><p class="p1">На первой развилке все вообще очень гуманно.</p><p class="p1">«Мы прощаемся с вами. До новых встреч!» — как говорилось на советском радио после особенно трогательных программ.</p><p class="p1">Чувствуете, какое счастье, какая свобода, какая гора упала с плеч? Сколько лет жизни мы вам прибавили?</p><p class="p1">Кроме того, те, у кого произведение дает в сумме цифр 5 или 7, обычно люди исключительного везения. Это вам любой фатумолог скажет (фатумолог — специалист по закономерностям судьбы, отдельная научная дисциплина). Такому счастливому человеку зачем «Квартал»? Он для больных, для инвалидов, для тех, кому делать нечего.</p><p class="p1">Прощайте.</p></span><span id="id33"><div class="title2">
<p class="p">14 августа</p>
</div><p class="p1">Сегодня несложное, но важное упражнение в жанре опоздания, переходящем в жанр отмены. Это два важных жанра в любом самосовершенствовании.</p><p class="p1">Договоритесь с подругой/другом, но непременно существом противоположного пола о срочной встрече. Вам надо обязательно увидеться с ними сегодня. Звоните и договаривайтесь — при условии, разумеется, что это для них не слишком обременительно. Потому что если у них серьезные дела, от которых они вынуждены будут оторваться ради вас, это никуда не годится, вы скоро поймете, почему. Лучше всего напроситесь к ним в гости, чтобы не заставлять их вырываться из дома. Вдруг еще погода плохая или мало ли.</p><p class="p1">Мы откровенно используем их, потому что делаем все это для себя, поймите наконец. Небольшое участие в нашем эксперименте будет им компенсировано.</p><p class="p1">Значит, звоните и договаривайтесь: сегодня, по срочному вопросу.</p><p class="p1">Предположительно в четыре, но я не настаиваю.</p><p class="p1">Предлог очень серьезен, но это не телефонный разговор.</p><p class="p1">Лучше, конечно, чтобы этот человек — далее называемый партнером — был вам небезразличен. Совсем хорошо, чтобы вас связывала любовь, но не столь сильная, конечно, не то чтобы уж прямо ах-ах-ах. А просто почти у каждого — во всяком случае, среди тех, кого увлекает «Квартал», — обязательно есть такая нереализованная любовь, отложенная как бы про запас, когда вы только еще думаете когда-а-а-а-нибудь куда-нибудь вместе пойти.</p><p class="p1">Вот вы назначили встречу. Выходите из дома ровно за час до нее, предупредите, что выезжаете, — это очень важно — и медленно, лучше пешком, устремляйтесь в прямо противоположную сторону. Совсем не туда, где вас ждут. Есть еще время повернуть туда, куда надо. И сейчас еще есть. И даже сейчас, пожалуй, вы еще успеете. Но вас неумолимо тянет в прямо противоположную сторону, куда вы идете очень медленно, как бы нехотя. В совершенно другой район города. Может быть, даже к другим людям (но лучше, конечно, чтобы во время эксперимента вы были в одиночестве: другие люди тут только мешают).</p><p class="p1">Ровно в четыре — или во сколько у вас там назначено — позвоните и сообщите, что задерживаетесь.</p><p class="p1">Помните: все еще можно спасти, везде еще можно успеть. Но время иссякает, и нам очень важно почувствовать именно тот предел, за которым ничего спасти нельзя, за которым мы опоздали бесповоротно. И эта нарастающая сладость погибели должна приносить нам то особое удовольствие, которое обычно возникает в присутствии бездны; но поскольку реальную бездну мы себе в этот день обеспечить не в состоянии, мы обеспечиваем вот такую. Поверьте, лучшего способа испытать гибельный восторг не существует: предлог жалкий, а чувства те же самые.</p><p class="p1">Хорошо бы мы гуляли в лесу, в яблоневом саду, где уже есть яблоки, или по пустынной окраинной улице. И чтобы чем дальше мы по ней уходили, тем она была бы пустыннее. Тем больше был бы шанс, что мы сейчас попадем в другое пространство, откуда уже не будет выхода. Посмотрите, какие странные люди попадаются нам навстречу. Эти люди явно не из нашего мира. Все хорошие фантастические рассказы о дырках между мирами начинаются с пустынной улицы, со странных прохожих и НЕЗНАКОМЫХ НАДПИСЕЙ НА МАГАЗИНАХ. И вы еще можете вернуться, хотя вам все труднее это сделать. Вас ждут, вас может вытянуть притяжение этого ожидания. Но другая сила уже как минимум не слабее, и она увлекает вас туда, где стоят розоватые вечерние дома — лучше бы сталинские, а можно и спальные, поздние, — где зеленеют кусты и цветут по клумбам тревожные, уже совсем осенние настурции.</p><p class="p1">Посмотрите направо. Да, сейчас. Видите собаку? Это не совсем такая собака, а если всмотреться, то и совсем не такая. Если не видите собаку, это совсем плохо. Видите, уже и собаки нет. Ах, вы в лесу? Что ж такого? Бывают так называемые среднерусские лесные собачки — бывают луговые, а бывают лесные. Присмотритесь. Если собачки нет, опасность действительно велика, собачки чуют, в особенности если они лесные. Но вряд ли вы в лесу, если честно. Скорее всего вы на окраине, как я и рекомендовал.</p><p class="p1">Если даже вы случайно поймаете в этом районе такси, оно вас никуда не повезет. А если сядете в автобус, автобус может, конечно, довезти вас до метро, но что-то я сомневаюсь. И самое печальное, что в метро-то вы, может, попадете, но заплатите за спасение из этого района чем-то очень важным, чем-то таким, что начисто исковеркает вашу жизнь. Отсюда можно выйти только самому, и не тем путем, которым вы вошли.</p><p class="p1">А вот вы опоздали уже на час. Звоните, умоляйте подождать еще, объясняйте, что у вас возникли новые пугающие обстоятельства. Но голос в телефоне вам намекает, что свое время вы уже пропустили, что это опоздание непростительно, что вам больше не верят.</p><p class="p1">Теперь смотрите внимательно. Наберите номер, отличающийся от телефона вашего партнера, на одну единицу в любой цифре. Вообще в любой, хоть в первой, хоть в последней.</p><p class="p1">Если ответит мужской голос — немедленно обрывайте разговор, отключайте телефон и выбирайтесь из района любой ценой. Немедленно. Потому что все очень плохо, мы заигрались, хватит. Я не буду вам объяснять, как все это связано, но просто поверьте мне, что связано, что ситуация запущена и что вам действительно пора, если, конечно, вы не хотите, чтобы вас в этом районе в ближайшие 20 минут укокошили. Именно 20 минут у вас есть, а больше ни секунды. Если вы на машине, то рвите когти сами, если нет — ловите такси за любые деньги или прыгайте в первый попавшийся транспорт, хоть в трамвай. Если же вы в лесу, я вообще ни за что не поручусь.</p><p class="p1">Если отвечает женский, то все в порядке, вы дешево отделались. Заходим в подъезд ближайшего дома (если вы в лесу — тогда что с вас взять, просто садитесь на пень, на землю, на поваленный ствол). Если подъезд с домофоном, ждем, пока кто-то оттуда выйдет. Входим. Поднимаемся в лифте на самый последний этаж. Выходим на балкон — там с лестничной клетки должен быть выход на балкон. Если нет — идем на лестницу. Оттуда звоним партнеру, объясняем, так и так, ситуация экстремальная, если еще можешь ждать — жди, если нет, то извини.</p><p class="p1">Испытываем колоссальное облегчение. Потому что нам не надо никуда ехать! Не надо выдумывать предлог для встречи. Не надо час с лишним о чем-то говорить с другим человеком.</p><p class="p1">И мы, совершенно свободные, веселые, непринужденные, спускаемся вниз, выходим из подъезда и еще час гуляем, лучше под дождиком. Если начался дождик, то все у вас в порядке, вы правильно следуете нашим курсом. Но и без дождика хорошо иногда не пойти туда, куда надо было пойти и не хотелось. Огромное облегчение — никуда не торопиться, никуда не опаздывать. Просто идти. Совершенно свободно. И район, заметьте, уже ни секунды не зловещ. Почему? Потому что, поднявшись на последний этаж, мы сняли проклятие. Мы оставили его в этом подъезде.</p><p class="p1">И в этом облегченном состоянии, когда нам не надо ехать туда, куда не хотелось, приходят удивительные мысли и даже сочиняются, быть может, стихи. Мы сами на ровном месте создали себе волшебный пузырь времени и в нем болтаемся.</p><p class="p1">А как же партнер? А партнера жалко, конечно. Готов был помочь и так обломился. Но, во-первых, ему, возможно, и самому не очень-то хотелось нас видеть. А в-главных, надо учиться — когда это не слишком травматично — использовать, да, другого человека для решения своих проблем. Используют же страховщика при прыжке, помогает же спарринг-партнер в боксе. Вам, чтобы испытать некоторые несложные, но важные состояния, понадобился другой человек. Без другого человека эта проблема не решается.</p><p class="p1">Не убили же вы его, в конце концов, и даже тащиться никуда не заставили.</p><p class="p1">Завтра отвезете ей/ему торт или розу.</p></span></span>
