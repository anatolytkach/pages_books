<p class="p">21 июля</p>
</div><p class="p1">Сегодня мы ссоримся с возлюбленной/возлюбленным.</p><p class="p1">Есть вариант, что у вас нет на данный момент никакой возлюбленной, а есть, допустим, жена. В таком случае мы ссоримся с женой. Есть вариант, что нет жены. В таком случае мы ссоримся с буппи.</p><p class="p1">Буппи вам понадобится на протяжении «Квартала» неоднократно, поэтому лучше сделать его сейчас. Покупаем воздушный шар, не слишком большой, не слишком дорогой. Наполняем его холодной водой. Завязываем. У нас получился буппи.</p><p class="p1">Мы можем нарисовать на нем мордочку, если есть фломастер и желание. Но вообще-то буппи будет исполнять разные роли, так что одна мордочка стеснит нашу фантазию. Давайте лучше ее развивать.</p><p class="p1">Слово «буппи» и сам этот шар придумал мой сын Андрюша, когда мы с ним упражнялись в стрельбе из пистолета с пластмассовыми пульками на балконе одной южной гостиницы. Нам стало неинтересно сбивать ветки, и мы решили изготовить мишени. Нам показалось, что этот шар великолепно взорвется, когда в него попадет пуля, но не тут-то было. То ли у него было недостаточное поверхностное натяжение, то ли пулька оказалась мала, но она пробила в буппи небольшую круглую дырку, и он стал оттуда писить, не писать, а именно писить, ровной тонкой струйкой. Это было настолько трогательное зрелище, что следующего буппи мы уже не пробивали, а стали выдумывать его приключения. Андрюша отнес его к морю и придумал сказку о том, как буппи в него стремится. Как он надеется, что его внутреннее содержание наконец сольется с миром, то есть с морем, и он обретет бессмертие. Короче, он развязал буппи и вылил его в море, и случилась гармония.</p><p class="p1">Буппи — идеальный партнер. С ним можно разговаривать, ссориться, мириться, в крайнем случае его можно швырнуть в стену. Но вообще-то он, конечно, суррогат. Лучше поссориться с настоящей возлюбленной. Это важный психологический опыт, приближающий вас к свободе и соответственно деньгам.</p><p class="p1">Время начала ссоры можете выбрать произвольно. Мы не посягаем на ваше рабочее время — начинайте либо утром, либо вечером. Днем можете работать, не отвлекаясь на личную жизнь. А вот продолжительность ссоры сильно зависит от вашего Финансового Индекса. Допустим, ваш рейтинг — 295. Вычтите из этой цифры ваш рост в сантиметрах. Поделите на два. Это и будет количество минут, которые вы должны потратить на ссору. Допустим, ваш рост — 180 сантиметров. В таком случае вы должны ссориться ровно 57 с половиной минут. Можете округлить.</p><p class="p1">Вы, разумеется, спросите: а что, если не уложимся? Ведь начать ссору легко, а закончить очень трудно. Отвечаем: если вам не удастся помириться через 57 минут — ладно, через час, — значит, у вас не получилось. Важен же выход из конфликта, а не только вход в него. Вы не выбываете из игры, но попадаете на штрафное упражнение. Оно будет описано ниже. Ничего страшного, но довольно противно.</p><p class="p1">МУЖСКОЙ ВАРИАНТ: ССОРА С ВОЗЛЮБЛЕННОЙ (ЖЕНОЙ)</p><p class="p1">Как именно вы будете ссориться — не моя забота. Есть несколько способов предварительной подготовки. Ну, не знаю. Посмотрите вокруг, тщательно осмотрите квартиру (дачу). В раковине посуда, так? Утреннего кофе не было, так? Все вещи не на своих местах, по коридору не пройдешь, там велосипед. И главное: где внимание к вашим проблемам? Когда кто-то проявлял внимание к вашим, повторяю, проблемам? Когда кто-то вас жалел? Вспомните, как все хорошо у Петровых. Петровы живут душа в душу, тютелька в тютельку, не разлей вода. Петрову всегда и внимание, и забота, и горячее трехразовое питание. По выходным Петровы все вместе ездят на дачу, жарят там мясо, бросают летающую тарелку. Играют в детское лото. Дети у Петровых послушные, ухоженные. Много читают.</p><p class="p1">На самом деле вы знаете, что жизнь Петровых — форменный ад. Муж изменяет жене. Жена ищет утешения на женских форумах в Интернете, где обсуждаются вопросы типа «Как удержать мущину-рака». Мущину-рака не надо удерживать, пусть пятится со скоростью 70 километров в час и никогда больше не напоминает о себе, но как пуста, как бессмысленна станет жизнь без него, без его клешней, усов, носков! Жена Петрова любит давать там полезные советы и утешаться мыслью, что ее жизнь еще ничего. Но вот Петровы как-то делают вид, что они счастливая пара, и для демонстрации этого счастья зовут всех к себе на дачу, где невыносимо скучно и мучительно жалко детей. Дети все понимают, бедные. Но у Петровых есть по крайней мере видимость, а у вас вообще ничего. В вашей жизни нет уюта, подумайте, что вы с ней сделали. Когда-то она начиналась ничего себе, а теперь ни один шкаф не закрывается. Вам (…) лет, а что сделано? Ясно же, что дальше будет только хуже. И все потому, что рядом с вами живет энергетический вампир.</p><p class="p1">Когда вам грустно по ночам, она не просыпается. Она храпит. Если она не храпит, тем хуже. Когда-нибудь она захрапит так, что вам придется купить себе оранжевые резиновые беруши. Человек, который спит с берушами, может уже не сомневаться в том, что его жизнь ушла в никуда. Она всегда недовольна. Она похожа на вас, да, но надо быть лучше вас, чтобы вам было куда тянуться. Ей нужно от вас только (…), а совсем не то, что вы можете дать. А что вы можете дать? Да ничего вы не можете дать. Теперь, когда она вас высосала и выбросила. Впрочем, и раньше не могли. Правду сказать, вы порядочное ничтожество, если ничтожество может быть порядочным. Запомните главное правило ссоры: разозлиться как следует нужно именно на себя. Злиться на другого человека бессмысленно, он другой, и этим все сказано. Всякая настоящая ссора начинается с ненависти к себе. Ясно же, что виноват тот, кто вас таким сделал. А сделала вас таким именно она, все остальные побрезговали. Еще, конечно, родители очень сильно виноваты. Но родители старые, какой с них спрос, и они вас по крайней мере любили. А она не любила вас никогда, вы всегда это подозревали, у нее всегда все хорошие, кроме вас.</p><p class="p1">Начали!</p><p class="p1">Лучше всего действует вопрос «Где?». Прежде чем начинать, вспомните, какая это часть речи. Так к вам вернется хладнокровие, и вы будете ссориться расчетливее, точнее. Если не можете вспомнить, примените звонок другу. Если у вас нет друзей, так вам и надо. Это все она.</p><p class="p1">— Где моя футболка с пивом? Эта, с надписью, что «Пиво всегда мокрое»? Где мой обед? Где моя жизнь, лучшие ее годы? Где опять шатается эта неблагодарная тварь, к которой уже в комнату страшно зайти? Где деньги? Где ты была (если вы ссоритесь не с женой, а с возлюбленной)? Где я нахожусь?</p><p class="p1">Если вам ее все еще жалко, или у вас прекрасное настроение, или она ни в чем не успела провиниться — задайте все эти вопросы самому себе. Они испортят вам настроение ровно настолько, чтобы немедленно переадресовать их любому случившемуся рядом человеку.</p><p class="p1">ЖЕНСКИЙ ВАРИАНТ: ССОРА С ВОЗЛЮБЛЕННЫМ (МУЖЕМ)</p><p class="p1">Вообще-то этому учить не надо. Обычно женщина сама знает, как начать ссору и чем ее закончить, при этом не схлопотать в глаз и добиться желаемого. Но если вы вдруг не умеете, действуйте по инструкции. Прежде всего надо привести себя в нужное настроение, как и в мужском варианте. Начинать лучше прямо с утра, еще лежа в кровати. В это время муж/возлюбленный не должен вас отвлекать — не позволяйте ему. Иначе получится так, что он утренним кофе в постель или поцелуем собьет вам все настроение. Поэтому игнорируйте, держитесь холодно и отстраненно: вы заняты, вам не до него. Это и на руку вам сыграет, когда начнете. Только не вздумайте ему объяснять, в чем дело. «Милый, нам надо поссориться, потому что я тут читаю одну книгу», — хотел бы я на это посмотреть. Если же вы вместе читаете «Квартал», то это как раз не помеха. Уверяю вас, даже обоюдно спланированная искусственная ссора легко перерастет в настоящую, если следовать советам.</p><p class="p1">Итак, лежа утром в кровати, начинайте думать. Лучше всего вспоминать мелкие старые обиды. Вы договорились пойти, а он опоздал. И вы ждали на холоде. Пустяк, вроде вы тогда и не обиделись — с кем не бывает. Но теперь вспоминайте. Вы мерзли, а он пришел еще так не спеша, вразвалочку. Когда ваша мама жаловалась ему, что вы совсем ее бросили, он не стал вас защищать, а поддакнул: она, дескать, вообще к людям невнимательна, но что поделаешь, мы ее и такую любим. Спасибо, конечно, но мог бы и возразить, а не подлизываться. И эти вечные эсэмэс, которые ему кто-то пишет. И из-за компьютера его не вытащить. А когда у вас болел живот, он все равно поехал на встречу с друзьями, а вы сидели дома одна. А если бы вы умирали? А он бы все равно уехал? Тут мы начинаем сценарий старой сказки про девушку, которая рыдала от того, что родится у нее сын, вырастет, пойдет за водой и упадет в колодец. Напрягите воображение. Вот вы лежите, и вам все хуже. А он едет к друзьям. А у вас не хватает сил даже вызвать «скорую». Вы ползете к телефону, но обессилевшая рука роняет трубку, а дышать все труднее. Дрожащей рукой, не помня себя, вы набираете все же номер и успеваете еще отомкнуть замок на двери, прежде чем окончательно потерять сознание. И когда он возвращается, сам веселый и хмельной, — видит только, как санитары запихивают в машину носилки. Тогда-то он раскаивается… Нет, ни фига — и тогда он не раскаивается, а идет домой и садится за компьютер играть в танки. А если вам в больницу надо будет привезти страховой полис и зубную щетку, то он все равно не знает, где у вас все это лежит. А раз не знает, то чего ехать, отправит маму вашу или подругу. А сам — в танки. Он вообще ни о чем, кроме своего удобства, не думает. Только все говорит, что любовь, мол, а сам — чаю налей, это подай, то убери, я такой несчастный, пожалей меня. А сам-то он много вас жалеет? Нет, ему же надо, чтобы вы были всегда в духе, всегда бодры и готовы поддержать. И вообще ему пока не скажешь, что что-то не так, сам не заметит. Вот и сейчас лезет со своим кофе, хотя видит, что вам не до него. А то, что вы по утрам чай любите — откуда ему знать? Он же судьбы мира решает, как будто без него мир остановится. Шовинист он! Вон на форуме девки пишут, какие у них мужья! Современные, незашоренные, готовые видеть в женщине личность, а не обслугу! Тут можно опять включить фантазию и представить, как вы идете по улице, а там он с бабой. Целуются. Представили? Баба уродливая, гораздо хуже вас, зубы кривые. Представьте зубы.</p><p class="p1">А это его постоянная привычка сделать вас во всем виноватой! Он всегда в белом, а вы истеричка. Хотя истеричка-то на самом деле он: из-за любой чепухи срывается на все подряд. И к тому же вам всегда казалось, что он не любит ваших кошек. Можно приступать. Если для мужского варианта главный вопрос «Где?», то для вас — «Когда?». Когда ты начнешь убирать за собой? Когда ты повесишь полку? Когда мы поедем в отпуск? Когда со мной будут считаться в этом доме? Когда ты на мне женишься? Когда мы навестим маму? «Когда внезапно возникает…» Когда началась столетняя война? Ах, даже этого не знаешь? Ну и ладно, спрошу у Васи, он умеет пользоваться гуглом.</p><p class="p1">Упоминания о Васе не выдержит даже буппи, так что дело сделано. Дальше все пойдет по накатанной. Не забудьте, что через час вы должны броситься друг другу в объятия, рыдая. Впрочем, вы можете начинать рыдать уже сейчас, это действует безотказно. В этом случае можно даже ничего не говорить. Собственно, если вы умеете рыдать, вам вообще больше ничего не нужно, только ничего не объясняйте. Тогда он организует ссору своими руками, ровно так, как описано в мужском варианте.</p><p class="p1">ПРИМИРЕНИЕ</p><p class="p1">Тут надо сделать вид, что ничего не было, что это было умопомрачение, что вы не виноваты. Для молодых пар, конечно, оптимальный вариант — внезапно наброситься друг на друга и резвым сексом снять напряжение. Тогда ссора будет рассматриваться как прелюдия, многие так и делают. Но много ли молодых пар среди наших читателей? Они все время ссорятся или трахаются, какое уж тут самосовершенствование. Остальным после краткого выяснения отношений лучше всего сказать:</p><p class="p1">1. Прости, что-то на меня нашло.</p><p class="p1">2. Ну ладно. Я что? Я ничего.</p><p class="p1">3. Слушай, со мной в последнее время творится что-то непонятное. Прости, ради бога. Сам не знаю, что говорю.</p><p class="empty-line"/><p class="p1">И это будет правда, потому что действительно в последнее время творится что-то непонятное. Вы совершаете странные поступки, и, если вдуматься, это началось задолго до «Квартала». «Квартал» просто вытащил это наружу. А на самом деле отыскать какую-то логику в происходящем нельзя уже давно. Как сказал перед смертью Некрасов — «Ничего не понимаю, что со мной делается». Я тоже ничего не понимаю. Но я по крайней мере честно предлагаю в этих условиях выпадать из этой уродской логики, потому что в любой алогичности сейчас больше смысла.</p><p class="empty-line"/><p class="p1">Штрафное упражнение для тех, кто не уложился в норматив и ссорился дольше, чем надо.</p><p class="p1">Покупаем оранжевые резиновые беруши. Суем их в свои дурацкие уши.</p><p class="p1">Подходим к партнеру и спрашиваем: «А все-таки ты хоть раз в жизни можешь подумать не только о себе?» Пережидаем ответный монолог. Не слыша ни слова, находим точный ответ на него.</p><p class="p1">Если ответ неточный, расхлебываем до утра.</p></span></span>
