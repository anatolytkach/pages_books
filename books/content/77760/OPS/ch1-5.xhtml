<span id="id5"><div class="title1">
<p class="p">Квартал. Прохождение</p>
</div><div class="epigraph">
<p class="p1">Андрею и Алисе</p>
</div><span id="id6"><div class="title2">
<p class="p">15 июля</p>
</div><p class="p1">Перепечатайте на компьютере следующий текст.</p><p class="empty-line"/><p class="p1">Июльские вечера полны невыносимой грусти. Три-четыре дня в середине июля — пауза, все застыло на вершине, как черно-белые ночные облака все еще светлой ночью. Это те самые облака, которые медленно-медленно переходят границу над ружьем часового, пока, набегавшись на даче, спит девочка Светлана, выставив из-под одеяла ноги, искусанные комарами, исхлестанные травой.</p><p class="p1">Тихи июльские ночи, даже собаки не брешут. Пик лета, с которого начинается спуск вниз. Этот спуск едва обозначается, как первая звезда около девяти вечера: играешь в бадминтон, задираешь голову, чтобы отбить волан, и видишь, как в серо-фиолетовом небе мерцает голубая точка. И с соседнего участка пахнет цветущим табаком. Вот тогда и понимаешь, что ничего этого не будет больше никогда.</p><p class="p1">На тихом июльском закате обязательно видишь в небе паруса. Мне всегда казалось, что за домами нашего квартала, на котором тогда обрывалась Москва, — порт, гавань, краны, прибытие и убытие небесного флота, и даже сейчас, когда за нашими домами бесконечные новые улицы и никаких колхозных полей, я там вижу эти корабли. Часов в пять-шесть там закипают все цвета тревоги в спектре от алого до лимонного, полощутся, плещутся, прощаются. Когда-нибудь я улечу в этом направлении, и это будет гораздо раньше, чем вы все думаете.</p><p class="p1">В этой паузе всегда ходят по горизонту низкие тучи, в них поблескивает, иногда они проливаются дождем, а иногда уходят, погромыхав. Наши горизонты обложены тучами, мы вышли из безоблачной, молочно-зеленой, туманной и нежной поры. Теперь все будет всерьез. Кончилась акварель: июльское небо написано маслом. Совсем немного до августовской резкости, когда вода и небо из густо-синих станут свинцовыми. Жара и ливни — вот наше время. Все нервничают, мужчины предполагают худшее, женщины истеричны и податливы, а потом еще более истеричны.</p><p class="p1">Мы начинаем, когда уже случилось все самое летнее — отцвела сирень, черемуха, жасмин, я уж не говорю про вишни и яблони, которые цветут всего неделю; вот уже и липой не пахнет, все определилось, завязалось и плодоносит; мы начинаем на переломе от глупой юности к скучной зрелости или, если хотите, от юной свежести к зрелой мудрости, но это неправда. Мы начинаем, когда закончилось все самое лучшее, и нам предстоит все самое интересное: старость, смерть, бессмертие.</p></span></span>
