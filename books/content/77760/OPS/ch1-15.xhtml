<span><span id="id45"><div class="title2">
<p class="p">26 августа</p>
</div><p class="p1">Окончание рассказа</p><p class="empty-line"/><p class="p1">«БУХТА РАДОСТИ».</p><p class="p1">Клоков взял подругу за руку и отправился с ней туда, где, как ему казалось, должен быть тот самый магазин. Но не было не только магазина — исчезли и шоссе, и шашлычная на берегу, и муравейники под соснами. Вдоль берега тянулась теперь зеленая маскировочная сетка — там выгородили площадку для пейнтбола, и желтые шарики повсюду виднелись в кустах. Вместо магазина был клуб, весьма потрепанный, с облезлым Лениным: положим, они могли снести магазин и выстроить клуб, но не в таком же сразу старом виде! Дорога шла меж дач, но ни одной дачи Клоков не узнавал: в них кипела жизнь, но не артистическая, как прежде, а хозяйственная, все что-то пилили и бурили, прокладывали новый водопровод, добродушного вида мужик неистово что-то приколачивал, и это неистовство было скорей трогательно, чем ужасно. Никто не обращал никакого внимания ни на Клокова, ни на его подругу; они не чувствовали ни злых, ни доброжелательных взглядов — все вокруг были слишком заняты своим делом, и даже птицы, когда их ненадолго становилось слышно в паузах между бурением и пилением, пересвистывались деловито, словно позволяли себе отвлечься от главных дел, а потом тоже принимались долбить или высиживать. Это был другой мир — не тот, что в первый и второй клоковский приезд; все было третье — то третье, какого он не мог представить в одиночку. И страшно было ему подумать, что за первым и вторым есть третий мир — мир, который видят двое; он был уютен, деловит, по-женски разумен, но страшней всего было подумать, что своего, прежнего, одинокого, он не увидит уже никогда.</p><p class="p1">Впрочем, скоро эта мысль стала его успокаивать — как успокаиваешься в детстве, поняв, что уткнуться в другого легче, чем проваливаться в себя.</p><p class="empty-line"/><p class="p1">Просмотрите, какое окончание придумали вы.</p><p class="p1">Если вы угадали ход сюжета — при выборе между первым и вторым возникает третье, потому что двое видят мир не так, как один, — вы можете больше не отжиматься, по крайней мере до конца «Квартала».</p><p class="p1">Если с девушкой Бухта Радости показалась Клокову еще хуже — вы женоненавистник и должны исправиться. Перепечатайте на компьютере — не копипастить! — стихотворение Пушкина «На холмах Грузии лежит ночная мгла».</p><p class="p1">Если с девушкой Бухта стала райским уголком — вы принадлежите к группе «Б». Это пока ничего не меняет, но вообще мне не очень нравится ваша группа. В ней есть желание понравиться, а я этого не люблю.</p><p class="p1">Если они с девушкой не встретились в Бухте, не смогли найти друг друга и нашлись только в городе — эта концовка лучше моей. Выпейте рюмку чего хотите за свой литературный талант.</p></span></span>
