<span><span id="id47"><div class="title2">
<p class="p">28 августа</p>
</div><p class="p1">Сегодня вы должны ударить человека по лицу.</p><p class="p1">Обратите внимание — не «мы», как мы говорим обычно, а «вы». Это только ваше дело. Но сделать это необходимо, и мы готовы объяснить, почему. Это последняя стадия освобождения перед тем, как мы окажемся на середине нашего пути. Вспомните все случаи, когда вы стерпели, промолчали, не вмешались. Все эпизоды, когда вы позорно струсили. Все навеки врезавшиеся в вашу память упущенные возможности. Поймите: этот барьер достаточно преодолеть раз в жизни. После этого вы поймете, что можете, и будете себя вести совершенно иначе. В жизни побеждает тот, кто готов больше поставить на кон, тот, кто пойдет до конца, а не тот, кто сильней. Пьер ранил Долохова, а русские победили Наполеона не потому, что лучше воевали. Пьер вообще держал пистолет второй раз в жизни — если бы первый, все-таки не так смешно, — и убрал левую руку за спину не ради принятия классической дуэльной позы, а только для того, чтобы в нее не попасть. Сражение выигрывают те, кто идут на него в белых рубахах. Если вы не готовы перейти в споре к решительным действиям, вы так и будете всю жизнь отступать, и у вас не будет денег. Да, что поделаешь, этот аргумент имеет к ситуации прямое отношение. Деньги приходят к тому, кто освободился. И не думайте, пожалуйста, что этого можно добиться духовными преобразованиями. Это все равно что сажать огурцы посредством геометрических вычислений. В жизни всегда наступает момент, когда надо сделать последнюю ставку. Потом он неоднократно повторяется, но преодолеть себя с каждым разом становится все трудней.</p><p class="p1">Человек должен быть незнакомый или по крайней мере увиденный вами в этот день впервые. Дальше вы можете с ним слегка познакомиться, то есть, например, вступить в спор. Этот спор надо быстро довести до кипения, до точки, когда отступать становится невозможно. Однако будьте осторожны: ударить надо первым. То есть нельзя доводить до ситуации, когда первым ударит он. Иначе все было бы слишком просто: подошли, обозвали пидором, получили в нос и дали сдачи. Первый удар должен быть обязательно за вами. Дальше может произойти что угодно, это неважно. Вас могут побить, вы можете потерпеть поражение в драке — никто не требует, чтобы вы дрались как ниндзя. Ударив, вы уже победили. Это очень легко. Никто не требует, чтобы он от вашего удара покатился колбасой и уже не встал. Сбивать там с ног, разбивать лицо в кровь… Заметьте, мы вообще не ставим перед вами супертрудных задач. Все в пределах возможностей самого обычного человека. Подойдите и врежьте. Не обязательно кулаком. Можно просто ладонью, пощечина — и хватит. Но это должен быть удар, а не поглаживание, нападение, а не шутка. И после этого вы всегда всё сможете. Это как первый раз прыгнуть с вышки.</p><p class="p1">Возможны варианты. Самое простое и лучшее — просто подойти и без предупреждения врезать. Дальше как хотите — можете падать в обморок, имитируя мгновенный приступ безумия, а можете объяснять ситуацию. И я даже не возражаю, если вы изначально сумеете договориться. То есть подойдете, поздороваетесь и во всем признаетесь. Так и так, я занимаюсь духовным самосовершенствованием, мне необходимо ударить вас по лицу. Почему именно вас? Потому что именно ваше лицо показалось мне понимающим. Добрым, симпатичным. Мне необходимо ударить вас по вашему доброму, симпатичному лицу. Если после этого вас не сдадут немедленно в милицию — пардон, в полицию, — или в дурдом, значит, у вас все получилось. Если сразу дадут в морду, вы нарушили правила, и тогда вам надо искать другого человека, которого придется бить уже без предупреждения.</p><p class="p1">Вы, естественно, спросите: а если меня все равно в полицию? Вот я подошел, ударил — и либо жертва, либо свидетели вызывают мента. Ничего не поделаешь, этот риск есть. Но, во-первых, можете бить не слишком сильно — я даже настаиваю на этом, и тогда вам ничего серьезного не припаяют. Скажете, что он вас оскорбил, не так посмотрел, нелестно высказался про вашу мать, с которой якобы близок. Во-вторых, этот шанс все-таки невелик. Гораздо выше шанс, что вам дадут в морду, и признайтесь, что на самом деле вы боитесь именно этого. Но вы не бойтесь, потому что он тоже боится. Ведь вы первый начали, а значит, у вас башню склинило. Безбашенных боятся все. Имейте в виду: после этого вас будут бояться все. Вы будете всех побеждать, включая деньги. Противоположный пол будет от вас в восторге.</p><p class="p1">Оправдываться — не люблю это слово и понятие, — объясняться можно по трем сценариям. Какой вы лично выберете — неважно.</p><p class="p1">Первый. Простите, обознался. Точно так же одетый человек год назад изнасиловал мою сестру. Еще раз извините. Ах, это были вы? Ну, тогда все правильно.</p><p class="p1">Второй. Серега, ты что? Ты что, Серега?! Ты забыл, как засунул мне котлету за шиворот в школе двадцать лет назад? Я тогда тебя не догнал, но теперь ты не уйдешь, Серега. Ах, это был не ты? А кто же ты тогда, сволочь такая? Чего ты, старых друзей не узнаешь, Серый? Ах, не Серый? Ты имя уже сменил? Ты, может, в школе восемнадцать-пятнадцать не учился? А где учился? В спецшколе для малолетних преступников? Простите, пожалуйста, Вова, я не знал. Я даже как-то не мог предположить, такое интеллигентное лицо. Извините. Еще раз извините. Всего вам доброго.</p><p class="p1">Третий (он же оптимальный для полиции). Да. Вот так вот. А вы что же думали — что будете гадить на Родину, и некому защитить? Товарищи, я же видел его на митинге. Я же слышал его, товарищи. Я все помню, что он говорил. Он совершенно точно американский наймит. Он агент, прошерстите его. Я требую расследования его деятельности. Я к нему тогда не пробился просто. Я молоком матери, яйцами отца поклялся, что достану его. Он будет сейчас отрицать, конечно. Да я готов, товарищи! Я не то что в полицию, я в ФСБ сейчас с вами пойду! Вы свидетель, и вы свидетель. Что? Ты разговаривать еще? Я сейчас язык твой в жопу тебе засуну, гнида. Сказать такое про Родину мою! Кровью отцов, потом дедов политую! Метили территорию, везде поливали. Убью сейчас, бля, тебя вообще на этом месте, держите, все держите меня! А что я там делал? Как что я там делал? Я мимо шел, остановился послушать, как он там с трибуны изгалялся. Ах, не вы? Вы из Ростова? А что же ты тут делаешь, если из Ростова? Регистрация где? В Ростове надо сидеть, мразь белоленточная. И пойду! И пойду! И нечего меня тащить, я сам пойду, но только чтобы и этого отвели! (В отделении повторить то же самое со слезами.)</p><p class="p1">Ну ладно. Хохмочки кончились, смехуечки надоели. Я действительно не знаю, чем и как вы будете оправдываться. Да меня это, честно говоря, и не волнует. Точно так же, как и ваш способ потратить полученные деньги. Это ваши деньги, ваш приз, ваша ответственность. И как вы будете бить человека по лицу — мне тоже неважно. Ваша проблема. Не хотите — не надо.</p><p class="p1">Трус. Ничтожество. Всегда был трусом и ничтожеством, независимо от половой принадлежности, и таким же умрешь. Вот из-за таких, как ты, так и живем. Никогда ничего не доводим до конца, со всем миримся, все позволяем с собой творить. И ты позволяешь и всю жизнь позволял. Тряпка. Дрянь. В зеркало на себя погляди. Ведь там все давно разлезлось, под этой оболочкой, сгнило все и смердит. Тебя не хватит даже зеркало разбить, чтобы рожа твоя трусливая разлетелась на куски. Иди пожалуйся, пожуй сопли. Твой потолок — сканворды, всю жизнь их будешь решать, купи газету «Тещинька» и решай. Слово на букву мэ, последняя буква ка, пять букв по горизонтали.</p><p class="p1">Вспомни, как тебя в армии заставляли после отбоя сто раз отжиматься, и ты отжимался. Как тебя в школьном дворе возили рожей по асфальту, и ты молчал. Как на тебя ОМОНовец только замахнулся, а ты уже обосрался и побежал. Вспомнил? Плохо вспомнил. Вспомни, как ты от страха весь вспотел и как от тебя пахло. А как она тебе сказала, что есть другой? Мялась, мялась, уходила от разговора, потом обозлилась и выложила все. С полным сознанием своей правоты, потому что так тебе и надо. И что ты сделал? Ударил ее, может быть? Дудки: ты внушил себе, что она только того и хотела. И улыбнулся дрожащей улыбочкой, и сказал: ну что ж. И всю жизнь говорил: ну что ж. И думал, что твоя сдержанность на кого-то произведет впечатление. Слизняк. Медуза.</p><p class="empty-line"/><p class="p1">Примечание. Если вы мужчина и собираетесь ударить по лицу женщину, это не засчитывается. Это не освобождение, а мерзость. Если вы женщина и собираетесь ударить по лицу мужчину, это засчитывается наполовину. То есть ударить надо два раза. Вам все-таки проще, вам сдачи не дадут.</p><p class="empty-line"/><p class="p1">Ну хорошо, хорошо, я все понимаю. Я понимаю, что мне, как всякому приличному гипнотизеру, придется вложиться в этот твой поступок, первый, может быть, в жизни. Чем вложиться? Мне придется, видимо, рассказать что-то о себе. Чтобы ты понял, как тебе действовать. Чтобы до тебя, дурака, дошло наконец, что в ЭТОМ мире, с ЭТИМИ людьми ты никак, ничем не добьешься ничего вообще. Хватит прикрывать собственную трусость разговорами о гуманизме. Ты скажешь, что этот конкретный мужчина в троллейбусе ни в чем перед тобой не виноват. Но не могу же я, черт возьми, ждать, пока появится тот, кто действительно перед тобой виноват? У нас квартал, всего квартал, на принятие всех решений. Если делать это постепенно, школа может растянуться на всю жизнь, и тогда ты получишь деньги аккурат на похороны. Так называемый смертный сундук: платок, тапочки. Хватит еще нажраться пяти старикам, которые о тебе вспомнят, и двум старухам, если дойдут. Допер теперь, почему большинство людей перед смертью понимают всё? Ничего нет обидней — все понять, когда уже ничего не можешь. А я тебе предлагаю все понять за девяносто дней, но тогда понимай, понимай! Делай, что тебе говорят! Если ты не можешь без меня, черт с тобой, я расскажу тебе о вещах, которые я вспоминаю, когда мне, мне надо кого-то ударить по лицу, хотя бы фигурально. Несколько таких вещей есть. Я сейчас их тебе расскажу, если тебе нечего вспомнить из твоего собственного опыта, если он так ничтожен, что из него нельзя извлечь даже приличного стимула для мордобоя. Хорошо. Я наберусь сейчас духу и расскажу. Но учти, если я это расскажу, я обязан буду пойти и набить кому-нибудь морду, я не смогу с этим жить, если снова вытащу это из памяти. Я обязан буду пойти и на кого-то вывалить этот избыток ненависти. И мы побьем двух человек, один из которых уж точно будет ни в чем не виноват. Подожди. Я еще несколько раз глубоко вдохну и расскажу. Я только выберу сюжет поневиннее, потому что если рассказать что-то серьезное — я прямо сейчас, не дописывая главы, выйду на улицу и ударю по лицу первого встречного. Просто выйду и ударю. Я не смогу с этим дальше сидеть за компьютером. Поэтому что-нибудь легкое. Жри, сволочь. Когда я был маленький, мама мне рассказывала сказки про ежика, этот ежик был наш домашний тотем, любимый зверь. Тряпочный ежик, как мы его называли. И когда я попал в армию и большой ложкой хлебал там все, что полагается солдату во имя поливающих предков хлебать для защиты нашей прекрасной Родины, я вспоминал иногда этого тряпочного ежика. Я понимал, что это мою мать бьют в наряде, что это мою мать заставляют двадцать раз перестирывать свое и чужое обмундирование, что это моего тряпочного ежика потрошат перед всеми, когда сержант обшаривал мою тумбочку и рвал письма моей матери, потому что хранить их не положено. А моя мать в это время рассказывала про тряпочного ежика соседнему неприсмотренному, несчастному мальчику, потому что я был в армии, а она была одна, и ей не на кого было тратить избыток своей нежности и ума, и свое умение рассказывать утешительные сказки. Что? Тебе подробности? Тебя интересуют первые полгода моей службы? Мразь, я же рассказал тебе про тряпочного ежика! Я рассказал тебе самое святое, что есть у меня вообще, то, что я ни одному другу, ни одной женщине никогда не рассказывал, — и ты, ничтожество, все еще не принял решения? Ты еще не сел в троллейбус, не выбрал там самого мордатого? Что значит «не виноват»? Да как он может быть не виноват, если он такой мордатый?! Разве можно наесть такую морду, когда ты ни в чем не виноват?</p><p class="p1">Хорошо. Ты такая дрянь, что сентиментальные истории на тебя не действуют в принципе, и ты, как большинство добрых сограждан, уверен, что если меня били в армии, то так мне и надо. Отлично. Отлично! Я расскажу тебе другое. Однажды я ждал свою дуру около ее подъезда, потому что говорить со мной по телефону она больше не хотела, и вообще ей надоело повторять, что все кончено. Мне было двадцать лет, армия была уже позади. Моя дура меня не дождалась, естественно, потому что она была демоническая женщина из советской коммуналки, безвкусная, полуграмотная, но с запросами. Ей казалось, что если ее левая нога так захотела, то это закон жизни. И вот я стою, жду, как дурак. Ее мать мне сказала, что она в театре. Я думаю, что она сейчас вернется с мужчиной, он ее провожает, и я наконец узнаю с кем. А она возвращается с женщиной. Ты удивлен? Я тоже был удивлен. Тогда такое тоже было. И я знал эту женщину, видел эту самовлюбленную скотину, малорослую, плотную, типичный буч, но я же тогда не знал, что такое буч! Я себе вообще не представлял такого развития, как Бунин. И они идут, нежно хохоча. И когда эта Марина, этот буч, увидела меня — а ты знаешь, как убежденные, истовые лесбиянки ненавидят мужчин, — она принялась орать и обзываться. Она орала и обзывала меня истеричкой. Небритой девочкой. Она принялась меня бить, а что я мог с ней сделать? Не мог же я ее ударить, и мне оставалось заслоняться, а моя дура стояла рядом и хохотала, и с ней, как ты понимаешь, я тоже не мог сделать ничего. Она сказала: ну, ему хватит. И они мимо меня прошли в подъезд. А полгода спустя она приползла, как побитая сука, и что, ты думаешь, я сделал? Ты думаешь, я ее ударил? Нет. Ты думаешь, я ее простил? Нет, конечно, я же не такой слизняк, как ты. Я ее скромно послал в жопу, где она до сих пор и находится, судя по долетающим известиям. Прекрасно там себя чувствует. И большинство спорных эпизодов в моей жизни закончились так же, не убивать же.</p><p class="p1">Короче, я все тебе сказал, а большего ты не стоишь. Иди в жопу, говорю я тебе, ты встретишься там с ней и много еще с кем. У тебя никогда не будет денег, славы, женщин, мужчин, друзей, моего хорошего отношения. Я от тебя отрекаюсь, отворачиваюсь, я знать тебя больше не хочу. Ты еще не понял, кто с тобой разговаривает, кто вообще пишет для тебя эту книжку? Ты не понял, кто тебя выбрал, чтобы твоими руками разбираться здесь с наглым, самодовольным злом? Очень хорошо. Я на тебя больше не смотрю.</p><p class="p1">В последний раз оборачиваюсь. Вставай, выходи на улицу и ударь человека по лицу.</p><p class="p1">Дальше все зависит только от тебя.</p><p class="empty-line"/><p class="p1">Ударил(а)? Очень хорошо. Отлично. Поздравляю. Вы всё сделали как надо. Я знал, что я в вас не ошибусь. Теперь все в вашей жизни будет прекрасно. Вы преодолели главный барьер. Я знаю, что делаю. Трудно было, да? Ничего страшного. Мордатые никогда не дают сдачи и боятся вызвать полицию. Они же сами всегда всего боятся. Зато теперь вы вышли наконец на прямую дорогу. Понимаете теперь, почему раньше ничего не получалось? Это как первая кровь. Согласитесь, я вас провел через это еще в щадящем варианте.</p><p class="p1">Ну и все, мы с вами прощаемся, потому что дальше у вас и так все будет хорошо.</p><p class="p1">А если вы не ударили, то мы продолжаем. Продолжаем, как будто ничего не было. Потому что люди, поддающиеся простым манипуляциям, нам не нужны. Это примитивные, низкие люди. Пусть даже хорошие, решительные, пусть на них мир стоит и в кризисной ситуации только на них вся наша надежда, — но с ними мы не работаем. Мы работаем с теми, кто никогда, ни при каких обстоятельствах не станет за здорово живешь бить человека по лицу, особенно ради денег.</p><p class="p1">Но пятьдесят отжиманий все-таки сделайте. Нам нужны крепкие ребята. А то вдруг какой-нибудь закомплексованный неудачник даст в морду ни с того ни с сего.</p></span><span id="id48"><div class="title2">
<p class="p">29 августа</p>
</div><p class="p1">Сегодня мы попытаемся определить наше последнее слово.</p><p class="p1">Для формирования настоящей личности, у которой всегда есть деньги, это очень важно.</p><p class="p1">Последнее слово, которое мы когда-нибудь попытаемся сказать, если успеем, вовсе не должно быть заветом всему человечеству — что-нибудь вроде «любите», «терпите», «ненавижу», — но, напротив, это что-то вроде последнего стихотворения, которое пишет самурай перед сэппуку. Он не планирует никого учить или наставлять. Иногда он фиксирует свое внимание на том, что ему тут больше понравилось, на том, на что ему больше всего нравится смотреть — скажем, ива. Умирая достаточно кровавым способом, он хотел бы смотреть на иву, на то, как она полощет в реке серебристые листы. Это зрелище довольно символическое. И он, взрезав себе живот, каллиграфически пишет:</p><div class="poem">
<div class="stanza">
<p class="v">Ива над рекой</p>
<p class="v">В воде полощет листья.</p>
<p class="v">Так же вот и я.</p>
</div>
</div><p class="p1">Это можно понимать широко: например, так же я прополоскался в реке жизни, а теперь уплываю по ней. Или: ива вся мокрая, и я весь мокрый. Вообще строка «Так же вот и я» могла бы стать канонической, обязательной во всех прощальных хокку:</p><div class="poem">
<div class="stanza">
<p class="v">Персик под дождем</p>
<p class="v">Выглядит как чмошник.</p>
<p class="v">Так же вот и я.</p>
</div>
<div class="stanza">
<p class="v">Белый мотылек</p>
<p class="v">Попорхал и хватит.</p>
<p class="v">Хватит вот и мне.</p>
</div>
</div><p class="p1">А мне больше всего нравится, естественно, из Басё:</p><div class="poem">
<div class="stanza">
<p class="v">В пути я занемог,</p>
<p class="v">И все бежит, кружит мой сон</p>
<p class="v">По выжженным полям.</p>
</div>
</div><p class="p1">Это мне понятно, это состояние я знаю. Поскольку хокку в русской традиции отсутствует, можно бы, конечно, писать на прощание частушку, но это гораздо более сложный жанр. Ахматова не без оснований полагала, что все ее творчество укладывается в четыре строки: «Дура, дура, дура ты, дура ты проклятая, у него четыре дуры, а ты дура пятая». Что до меня, практически все, что я написал, укладывается в стишок из детского анекдота. Там герой — кажется, ежик — не должен был есть пирожки, потому что после первого пирожка он все время будет икать, после второго пукать, после третьего петь, а после четвертого молиться. Знамо, он нарушает все эти табу, вследствие чего возвращается домой, припевая: «Ик, пук, тра-ля-ля, Господи, прости меня». Думаю, не только моя, но вся религиозно-философская лирика вплоть до сонетов Шекспира здесь упакована в семь слов, как не сумел бы никакой Басе. Более того, здесь дана вся хроника человеческой жизни: сначала всяческий безмозглый, чисто физиологический ик-пук, потом, в попытке его отрефлексировать, тра-ля-ля, а потом, как припрет, естественно, Господи, прости меня.</p><p class="p1">Если хватит сил, я надеюсь произнести нечто подобное.</p><p class="p1">Значит, это финальное слово должно быть как бы иероглифом нашей жизни, выражать ее с максимальной полнотой. Здесь был Вася. Возможно, что и бессознательно, но это удалось, например, Константину Устиновичу Черненко, который перед смертью ненадолго пришел в себя и внятно сказал: «Отперделся». В самом деле, подобрать для его жизни другой иероглиф затруднительно. При этом, как явствует из гениально подобранного слова, он сам же всё понимал.</p><p class="p1">Свое слово мы определяем в три этапа.</p><p class="p1">Во-первых, путем нехитрого самонаблюдения определяем слово, которое чаще всего в жизни произносим. Мат допускается, это ведь тоже слова. Получается, в общем, что каждый из нас чаще всего произносит слово «Мать», «Мама», причем не только в детстве, но и в старости. Я знаю, что старики часто зовут маму, когда впадают в маразм. Про Родину-мать нам тоже часто приходится говорить, как официально, так и наедине с собою. Однажды к нам по ночам принялась звонить старуха, которая все плакала и звала маму. Это было ужасно. И ей, вероятно, вообще некуда было позвонить.</p><p class="p1">Есть люди, которые чаще всего произносят «как бы» или «да?» с вопросительной интонацией в конце каждого утверждения. Есть люди, которые часто произносят «Вот так вот», и это, кстати, достойные последние слова, потому что действительно — вот так вот. Одна злая и наблюдательная девушка заметила, что я чаще всего произношу слово «Я», и в «Квартале» оно уж точно встречается чаще всего. Ей, вероятно, хотелось бы, чтобы я чаще произносил слово «ты», но она не учла, что я ведь очень часто говорю «я дрянь», «я сволочь», а хотелось бы ей слышать о себе что-нибудь подобное? Большой вопрос. Довольно часто я говорю «на хер» и еще чаще хочу это сказать, но все-таки это не чемпион. Очень часто я говорю слово «Бог» в разных вариантах — слава богу, не дай бог, прости, Господи… Но, кажется, в предсмертном контексте это было бы все-таки упоминание всуе: Бог — уже вот он, зачем же его просто называть? Я как бы называю его самим фактом своего перехода отсюда туда. Вероятно, чаще всего я все-таки употребляю слово «прости» — и в смысле «прости, Господи», и в общении с женщинами, перед которыми я всегда виноват, и когда говорю то, что думаю, — «прости, но ты тварь», что-то в этом роде.</p><p class="p1">Ну хорошо, пусть это будет «прости». Хотя не менее часто я употребляю слово «нет». Особенно когда мне приходит очередная ужасная мысль, я представляю себе что-то ужасное — я слепну, меня выгнали из дому, я сделал или сказал что-то чудовищное, — и тогда я, останавливаясь посреди дороги, кричу: «Нет! Нет!» Это случается по нескольку раз на дню. Но скажу ли я всему миру, как Эренбург у Эренбурга, «нет», вечное еврейское «нет»? Разумеется, нет. Хлебников, умирая — и трудно умирая, — сказал «да», но, правда, его спросили, трудно ли ему, то есть плохо ли. Это, кстати, отличный иероглиф русского мира. Еврей говорит «нет». Русский говорит «да» в значении «плохо».</p><p class="p1">Второй этап — это мы просто определяем слово, которое любим, которое нам нравится. Необязательно мы его часто употребляем, потому что много ли мы видим вокруг действительно любимых вещей, — возможно, нам просто нравится, как оно звучит. Мне, скажем, нравится слово «ЁЖ». Во-первых, мне нравится это животное, даже жЫвотное — так уютней; во-вторых, мне нравится буква Ё, я часто ее произношу, это мое любимое ругательство. «Ёж твою…» — по нескольку раз на дню. Наконец, ёж всегда был любимым персонажем нашей домашней мифологии, на даче живет много ежей, сам я себя идентифицирую с ежом, который к другу развернут жЫвотом, но к агрессивному миру — иголками, и вообще ёж смешон, забавен. Ежи всегда живут семьями, хотя и без отца — мать выращивает ежат, а отец убегает. Мне это тоже понятно, я сам так рос. Большинство так росло. Кстати, это не столько травмирующий фактор — без отца вырастают нормальные дети, не хуже вас, — сколько еще один предлог ощущать себя тут неправым: маменькиным сынком. Считается, что отец должен научить подтягиваться на турнике и ремонтировать карбюратор. Во-первых, мой отец вряд ли научил бы меня подтягиваться на турнике — он не умел в спорте и того немногого, что умею я; во-вторых, мы, маменькины сынки, добиваемся в жизни серьезных успехов, и карбюратор нам чинят другие люди, у которых были отцы. Итак, ёж: как говорил Лев Толстой, «я люблю это слово и понятие». У Толстого речь идет о fin de siecle, так что, если хотите, можно и так выпендриться.</p><p class="p1">И наконец, мы должны представить предмет, на который нам хотелось бы смотреть, то есть ту самую иву. «Я камыши любила и крапиву, но больше всех — серебряную иву, и — странно — я ее пережила». Лично мне наиболее оскорбительным кажется ставить людей у стенки и заставлять их глядеть в стенку, к тому же обшарпанную, с потеками, плохо сложенную, как почти все стенки, рассчитанные здесь не на то, чтобы держать здание, а на то, чтобы к ним ставить; вероятно, тут до сих пор считается, что надо регулярно приносить у стенки кровавую жертву, тогда она не рухнет. И, вероятно, это правильно, потому что иначе все эти стенки — так они сложены — давно, давно бы уже попадали. Значит, меньше всего мне хотелось бы видеть стенку. Есть, конечно, вариант с любимым лицом, но хочу ли я перед смертью глядеть в любимое лицо? Не факт. Во-первых, не знаю, что с ним к тому моменту сделается — оно останется, конечно, любимым, но не хочется в последний момент думать: «Эх, милая, что же я с тобой сделал». Сделало, конечно, время, но ведь и я постарался. Тогда что же? Я больше всего люблю и ценю то, что сделано человеком, вообще только человек всегда меня интересовал, но смотреть на здание либо картину было бы мне скучно, хочется чего-то надчеловеческого, чего-то кроме. Какой же пейзаж? Что-нибудь вроде гор? Горы хороши, они у меня даже на морде рабочего стола, но как-то это пафосно. Больше всего меня устроил бы сад, в меру обработанный, в меру запущенный: еще непонятно, что требует большего таланта от человека — обработать сад или запустить его. Полагаю, Бог запустил мир в том и другом смысле — он придал ему движение, а потом самоустранился, как всадник на 18-м верблюде после того, как верблюдов поделили. Ведь 18-й после этого не нужен. Более точной метафоры присутствия Бога в мире я не представляю: он нужен, чтобы жить, но отсутствует. Итак, запущенный сад. Но еще лучше море, которое и есть лучший запущенный сад, только под водой: в меру дикий, украшенный всякими ракушками, страшными изгрызенными камнями, в которых есть совершенная дикость, и виртуозно обработанными чудищами. Ничто на земле не имеет такого сложного, виртуозного, избыточного вида, таких прихотливых форм. Бога не видно, как Шекспира, но почерк чувствуется.</p><p class="p1">Так что это был бы сад на берегу моря, вроде дачных садов в Одессе, вроде «Артека», может быть. Кстати, и сад, и море включают ежа.</p><p class="p1">Прости, ёж, море, сад!</p><p class="p1">Устраивает ли меня эта финальная реплика?</p><p class="p1">Нет, конечно. Но как-то другую мне вывести из своей жизни затруднительно. Возможно, я все-таки оставил бы один совет, и он заключается в слове «превышай!». Бери выше, задирай планку. Если тебя обидели, опять-таки превышай, доводи до абсурда, кричи: «Еще! Еще!» В результате получаем:</p><p class="p1">Прости, ёж, море, сад, превышай!</p><p class="p1">Можно ли свести все это в одно слово? Едва ли, по крайней мере по смыслу. Превышением сада является лес, превышением моря — океан, превышением ежа — дикобраз, превышением «прости» — «прощай!». Получается что-то вроде «Прощай, океанический дикобраз». Вот это мне нравится, это да. Прощай, океанический дикобраз! Это было бы прекрасным названием для любого фильма, в частности, фильма про мою жизнь, и вашу жизнь, и всякую жизнь.</p></span><span id="id49"><div class="title2">
<p class="p">30 августа</p>
</div><p class="p1">Сегодня у нас генеральная уборка.</p><p class="p1">Тратить на это последний день лета — глупо. Мы его лучше потратим на медитацию или хоть на ее имитацию. Но даже имитация медитации немыслима в захламленном помещении. Быстро приводим его в порядок. Ах, вы без нас уже сделали это вчера? Значит, будете теперь это проделывать ежедневно. Не может быть, чтобы ничего со вчерашнего дня не засорилось.</p><p class="p1">Но убираться мы будем по-научному, чтобы этот рутинный, в общем, процесс доставил нам радость, в том числе радость познания.</p><p class="p1">Прежде всего определим место, где проводим больше всего времени. У кого-то это постель, у кого-то стол, у кого-то, страшно сказать, уборная — лицо квартиры, по сути, ибо именно по ней гости судят обо всем. Они любят судить обо всем именно по уборной, потому что гостиную-то любой в порядок приведет, а ты из сортира сделай еврокласс! В общем, определяем в квартире главную для нас территорию. У меня это письменный стол. Я за ним провожу больше времени, чем даже во сне.</p><p class="p1">Значит, прежде всего убираем все лишнее. Лишними являются все предметы, не имеющие отношения ко сну, к еде и работе. Кровать следует пропылесосить, убрав из нее шерсть кота (пса), выстирав покрывало, сменив (обязательно!) белье. Если вы больше всего времени проводите у плиты — до сих пор бывают и такие люди, — надо отмыть плиту. Взяли «KANEYO» или «ШУМАНИТ» — и вперед.</p><p class="p1">Что касается стола, все непросто. Что является лишним? Книги мне нужны для работы. Впрочем, сейчас они мне не нужны. Я их возьму, когда займусь работой, а этого в ближайшие полчаса не будет. Убираем книги. Бумажки с записями выбрасываем сразу — если на них записано то, что нельзя запомнить, значит, это неважно. Ручки, карандаши складываем в одно место: лучше, если это специальный стаканчик. В этом стаканчике тоже скапливается много лишнего: ручки, в которых закончилась паста, огрызки карандашей, палочки от леденцов, всякие мелочи — мы их туда засунули полгода назад, чтобы лежали на видном месте, и с тех пор никогда не могли найти: вот у меня здесь отвертка — зачем? За это время она понадобилась мне один раз, не спрашивайте зачем, но я ее тогда так и не нашел и управился монеткой. Не место здесь отвертке. Вот ключ от старого замка. Я давно сменил и замки, и двери, но выбросить ключ мне не позволяет та унизительная сентиментальность — я ведь помню каждый его оборот в замке, когда я еще приходил домой с радостью, с замиранием сердца, я считал щелчки, идиот, и ключ никогда не подводил меня, ни разу не застрял, ни разу не потерялся, не провалился в подкладку. И вот теперь я держу его в руках и уже пять минут потратил на воспоминания, как будто это не я писал «Квартал». Пора отправить ключ на помойку. Я так и сделаю. Потом, а пока пусть лежит еще, места не занимает.</p><p class="p1">Рядом с монитором стоит хрустальный шар. На самом деле это простое стекло — сувенирная безделушка для суеверных: крутишь шар, и красная точка указывает тебе на один из полезных советов, начерченных вокруг: да, нет, купи, продай, уходи, позвони маме, не торопись, все бесполезно. Что-то внутри железной подставки заржавело, и красная точка навек замерла на отметке «Нет». Я пытался передвинуть на «Маму» или хотя бы на «Не торопись», но тут точно все бесполезно. Это я, пожалуй, оставлю — надо иногда напоминать себе о том, что все-таки «нет».</p><p class="p1">Конфета попала сюда неизвестно как вообще. Я не ем конфет. Сейчас съем последний раз — какая-то шоколадная, фантик читать не стал. А вот визитка одного неприятного человека, но он может мне пригодиться. Впрочем, если он мне пригодится, я найду способ его отыскать, так что визитку — на фиг. А вот это глазастое существо я выброшу прямо сейчас. Слишком уж оно милое, доброе, смотреть на него приятно — а приятно быть не должно. Приятность должна исходить только от работы, а не от плюшевых мультяшек. Если плюшевой мультяшки здесь не будет, мне поневоле придется наслаждаться работой. Это очень важно. Я надеюсь, у вас на рабочем столе нет чего-нибудь подобного? Семейного фото? Можете вслух не признаваться, а просто сейчас тихо взять его и убрать с глаз долой. Своей рукой убрал я со стола.</p><p class="p1">Вот эти таблетки я оставлю, а эти мне уже не нужны. Когда-то были нужны, и я всегда держал их под рукой, но теперь я уже знаю, что они мне не помогут. Я отнесу их в то место квартиры, где провожу меньше всего времени. Это не уборная, нет. Это гардероб.</p><p class="p1">Коварство уборки заключается в том, что вещи активно сопротивляются. Они хватают нас маленькими когтиками и не отпускают: вот вы уже сидите и перечитываете старые записки. Зачем? А то вы их раньше не читали? А время-то идет, и не просто маленькое время уборки, а большое время жизни. Одежда тоже вероломна: если вы разбираете кучу шмоток на диване, из этого можно вообще никогда не вылезти. Хуже всего книги — их лучше всего убирать не глядя. Не надо расставлять в шкафу по алфавиту, жанру, цвету, размеру — не дай бог открыть хотя бы одну. У вас сейчас одна книга, остальные не глядя берем и распихиваем. Да, берем и распихиваем. В любом порядке, хоть корешками внутрь.</p><p class="p1">Главное — вовремя остановиться. Иначе можно дойти до мытья окон и лестничной площадки. А это лишнее, иначе не хватит времени ни на что. В наведении порядка главное — оставить изъян: одну висящую на спинке стула футболку, одну невымытую ложку, сдвинутую на край стола, один маленький незамоленный грешок, которого вы и замечать не будете, а будете только ощущать слабое дуновение, невидимую помеху, один битый пиксел на мониторе. Нельзя сделать все идеально, потому что идеально все равно не получится; так зачем эти разочарования, пусть лучше в этом будет виновата ложка. На самом деле есть еще одна причина, но вы ее сами потом поймете. А сам еще не понял, просто знаю, а я привык себе верить.</p><p class="p1">Итак, когда все прибрано, пыль вытерта, жирные пятна зачищены — садимся и имитируем. Заодно отдохнете, потому что вечером еще отжиматься десять раз.</p></span><span id="id50"><div class="title2">
<p class="p">31 августа</p>
</div><p class="p1">Сегодня мы разрабатываем комплекс физических упражнений, который будем теперь проделывать каждое утро независимо от прочих вводных. Дело в том, что мы вступаем в самый сложный период «Квартала», когда от нас требуется все больше упорства, потому что сопротивление возрастает. Мы все ближе к верхней точке, к нравственному совершенству, а также к деньгам. Нам надо держать себя в форме, потому что мир начнет нас преследовать по полной. Вообще проследить, на верном вы пути или нет, всегда просто: если сопротивление возрастает — значит, на верном. Если среди дня вас клонит в сон, ни одно дело не хочется доводить до конца, вообще ничего не хочется — значит, все демоны мира объединились и обступили вас, чтобы вы так и зависли в апатии. Вдобавок «Квартал» специально так задуман, чтобы сама природа, делаясь все более унылой, тормозила вас на пути вверх. Сила вашего сопротивления будет возрастать, и вы быстрей достигнете совершенства. Начнутся дожди, полетит листва, станет попросту трудно спустить ноги с кровати. Будет крепнуть чувство, что вы ничего не можете и ни за чем не нужны. Понадобится другой образ жизни, новый тонус, особая диета. Ничего, конец близко, экватор пройден.</p><p class="p1">Я не стану вас мучить всякими гурджиевскими заморочками, от которых все равно ноль проку: запомнить десяток сложных движений в нелогичной последовательности, одну руку туда, другую сюда, — его интересовало духовное рабство, а нас, наоборот, раскрепощение; ему надо было, чтобы ученик почувствовал себя полным неумехой, а нас, напротив, интересует гордое чувство особой одаренности. Так что упражнения несложные, но сильно бодрящие. Значит. Первым делом водные процедуры, горячий мобилизующий душ. Горячий! Дурак, кто вылезает из-под теплого одеяла под холодный. Расчистили ванную, выбросили все пустые флаконы, все бывшие шампуни, убрали белье, если оно там свалено, и лишние вещи, если они там есть. Купили хороший коврик. В ванной, куда мы вбегаем из сна, нас все должно радовать. Вылезли из душа. Начали. Зарядка отражает то, что мы собираемся делать в течение дня.</p><p class="empty-line"/><p class="p1">1. Три серии прыжков. Прыгаем на месте 12 раз, потом некоторое время переступаем на месте, потом еще 12 прыжков, переступаем, еще 12 прыжков.</p><p class="empty-line"/><p class="p1">2. Залезаем обратно под одеяло. Там уютно.</p><p class="empty-line"/><p class="p1">3. Преодолеваем уют, вылезаем из-под одеяла — это главное упражнение на преодоление инерционности. Все время обманываем организм, обучаем его быстро переключаться. Он думал, что будет зарядка, а мы опять под одеяло.</p><p class="empty-line"/><p class="p1">4. Выпрыгиваем из-под одеяла, бежим в душ. На этот раз не такой горячий. Растираемся мочалкой, не жалеем себя, взбадриваемся.</p><p class="empty-line"/><p class="p1">5. Ложимся на спину. Поднимаем ноги (так называемая «березка») под прямым углом. Поднимаем! Держим! Опускаем. 12 раз. Очень хорошо для пресса.</p><p class="empty-line"/><p class="p1">6. Переворачиваемся на живот. Отжимаемся 12 раз, не более. Нас интересует не физическая зарядка сама по себе, а гордое сознание того, что мы ее делаем.</p><p class="empty-line"/><p class="p1">7. Гусиным шагом передвигаемся по комнате из конца в конец туда и обратно три раза.</p><p class="empty-line"/><p class="p1">8. Залезаем под одеяло. Там уютно. Теперь-то мы подзарядились и можем отдохнуть.</p><p class="empty-line"/><p class="p1">9. Выпрыгиваем из-под одеяла. Отдыхать рано, все только начинается. Бежим в душ. Теперь он уже еле теплый, комнатной температуры. Моем голову, ее надо освежать как можно чаще.</p><p class="empty-line"/><p class="p1">10. С мокрой головой бежим в комнату. Встаем на колени (на протяжении дня нам придется фигурально проделывать это не один раз). Откидываемся назад с вытянутыми руками. Растягиваемся. Возвращаемся в исходное положение. Повторяем 12 раз.</p><p class="empty-line"/><p class="p1">11. Ныряем обратно под одеяло. Лежим, представляем что-нибудь приятное. Есть хороший способ заснуть: представляем, что нам надо встать и что-то сделать, например, переложить книги на столе. Но не встаем и не перекладываем. Вот еще чуть-чуть полежим и встанем. В таких мыслях приводим себя на грань сна.</p><p class="empty-line"/><p class="p1">12. Выпрыгиваем из кровати, бежим под душ. Уже прохладный, но очень интенсивный. Просто пускаем его на полную мощность, стоим, как под иглами.</p><p class="empty-line"/><p class="p1">13. Из душа бежим на кухню, ставим чайник. Это очень важное упражнение. Если чайник электрический, включаем. Делаем бутерброд. С силой намазываем. Не едим.</p><p class="empty-line"/><p class="p1">14. Бежим в комнату, рассыпаем по полу коробку спичек, подбираем.</p><p class="empty-line"/><p class="p1">15. Ложимся под одеяло. Помним, что надо выключить чайник, но хотим еще полежать. Под одеялом хорошо. Не надо вылезать в жестокий мир. Если мы молоды (а впрочем, это необязательно), представляем партнера, как мы его гладим, тискаем и все остальное. Возможно, даже начинаем его реально гладить, если он все еще лежит под одеялом и с ужасом смотрит на нашу утреннюю зарядку.</p><p class="empty-line"/><p class="p1">16. Прекращаем гладить партнера или себя, вскакиваем, бежим под душ. Теперь уже совершенно холодный. Интенсивно растираемся.</p><p class="empty-line"/><p class="p1">17. Бежим на кухню, выключаем чайник, наливаем чаю. Не пьем!</p><p class="empty-line"/><p class="p1">18. Бежим в комнате на месте не очень быстро, потому что все равно никуда не прибежим, ровно пять минут по часам.</p><p class="empty-line"/><p class="p1">19. Если есть партнер, ложимся под одеяло и удовлетворяем партнера. На худой конец удовлетворяем себя. Если партнер совсем надоел, гладим.</p><p class="empty-line"/><p class="p1">20. Выпрыгиваем из-под одеяла, пьем чай.</p><p class="empty-line"/><p class="p1">21. В любую погоду выходим из дома, идем на работу. Если нет работы, обходим последовательно весь Квартал, возвращаемся домой и залезаем под одеяло.</p><p class="empty-line"/><p class="p1">Не беспокойтесь, этот комплекс — не на каждый день. Его выполняем через день начиная с 31 августа. В остальные дни (то есть 1, 3, 5 и далее сентября) заменяем зарядку поеданием трех твердых яблок с их тщательным разжевыванием и ежеутренней медитацией на тему тщеты всего.</p></span></span>
