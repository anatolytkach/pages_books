<span><span id="id8"><div class="title2">
<p class="p">17 июля</p>
</div><p class="p1">Сегодня мы вычисляем ваш Финансовый Индекс.</p><p class="p1">Это важная постоянная для каждой отдельной жизни. Люди придают ей непозволительно мало значения, а часто вообще не знают, что это такое. В результате у них нет денег. Приготовьтесь к тому, что речь о деньгах в этой книге будет идти часто, и вообще мы взялись за нее главным образом ради них. Подчеркиваю: мы, а не я и не вы. У меня деньги уже есть, потому что я уже прошел «Квартал», и столько, что прибыли от продажи книги мне их не сильно прибавят. Я этой прибыли вообще могу не заметить, потому что знаю свой Финансовый Индекс и действую, исходя из него. Даже если вы, как я советую, купите три экземпляра — прибыль будет почти незаметна на фоне того, что уже есть. Так что, напоминаю, все ради вас, а не ради меня.</p><p class="p1">Но если даже абстрагироваться от разговора о наших личных деньгах — мы именно потому их упоминаем так часто, что деньги не последняя в жизни вещь. Я мало помогал людям, и многие, наверное, даже скажут, что я игнорировал их, занимаясь только своими делами. Это так, потому что никто, кроме меня, моими делами не занимался и намерения такого не выражал. И я вряд ли бы позволил, кстати. Но я действительно считаю, что, когда можешь, надо дать денег, и это единственная форма помощи, которую не стыдно предложить и принять. Никогда не стыдно взять деньги, потому что это не унижение, а наоборот. Если вам дают — значит, в вас вкладывают. Значит, вы стоите того. Чем еще помогать? Сидеть рядом и говорить уси-пуси? Держать за ручку? Я понимаю, что некоторые нуждаются именно в этом, что некоторым необходимы именно уси-пуси и ручка, что женщина, например (особенно если это настоящая женщина, а не автомат для вложения денег), измеряет вашу любовь только количеством вашего времени, которое вы готовы на нее тратить. Отрывая от любых дел, в том числе объективно важных. Это нормально, они не понимают по-другому, они хотят только, чтобы вы вокруг них вились. Парадокс в том, что стоит вам начать виться — к вам мгновенно теряется интерес, и дальше можно гордо, с полным сознанием правоты уйти к тому, кто будет вытирать об нее ноги. А вам доверительно объяснить: понимаешь, он особенный человек. Не такой, как мы с тобой. (Лолита так сказала Гумберту про Куильти: он особенный человек. Гумберту! Который за три месяца написал все это! Про Куильти! Ведь мы Куильти почему-то прощаем, что он педофил, а ведь он растлевал нимфеток сотнями. То есть мы на позиции Лолиты. Гумберт виноват, а этот нет. За грех всегда отвечает тот, кто его сознает, — а с того, кто его не чувствует, он как бы списывается, не замечали? То есть если ты знаешь, что нельзя, и делаешь — это грех, а если тебе вообще все по барабану, то пожалуйста. Кратчайший путь к состоянию святости — отсутствие морального компаса вообще.) Так вот, особенный. Он не может мной заниматься и вообще ничем заниматься, он занят действительно великими делами. И я не могу, слышишь, не могу уже быть ни с кем другим, после того как подышала этим горным воздухом. Некоторые еще говорят — горним, это если они, что называется, прикоснулись к вере.</p><p class="p1">На самом деле, конечно, он не занимается ничем важным — потому что человек, занимающийся чем-либо важным, понимает иерархию вещей и не станет вытирать ноги об окружающих ради самоутверждения. Он просто вытирает ноги или дает ей в морду, но она из этого по дефолту делает вывод, что он ну правда занят чем-то великим. Большинство людей, якобы занятых чем-то великим, большую часть времени блядствуют и пьянствуют, но поскольку они вытирают ноги и вообще ведут себя как свиньи, то и возникает ощущение величия. Люди, которым в качестве помощи нужны уси-пуси, охотно покупаются на это, потому что строят представления о мире, опираясь на внешние вещи.</p><p class="p1">Нет. Я считаю, что помощь — это дать денег, чтобы вы помогли себе сами. Деньги — это символ свободы. И ваш Финансовый Индекс — это именно степень вашей свободы и удачливости, а не хищничества и не каких-то «способностей к бизнесу», которых никто никогда не видел. Ваши способности к бизнесу — это количество ваших денег, и только. И ничего тут списывать все на внешние обстоятельства. Если у вас есть способности, но нет результатов — это значит всего лишь, что у вас нет способностей. Займитесь чем-нибудь другим.</p><p class="p1">Это все, как вы понимаете, был не праздный треп, а тонкая настройка вашей психики на то, что мы сейчас будем делать. А делать мы будем вот что: мы выходим на улицу и идем в сбербанк или любое другое место неподалеку, где продаются лотерейные билеты. Да, именно лотерейные билеты любого тиража, мгновенного действия. Такие как «Святая Русь» или что-то там про животных, с изображением симпатичных утконосов, которые как бы смотрят на вас и говорят: ну что, лох? Я тоже лох. Я не утка и не бобер, я переходный вид, идиотское яйценосное млекопитающее. Но вот тут есть еще один билет, с изображением настоящего бобра, упорного истребителя деревьев, вечного труженика. Купи его, и он выиграет. Ладно, вы покупаете бобра, и спустя пять секунд ожесточенного трения монеткой о серебристую надпись «Стирать здесь» вы уже как бы слышите его бодрый, бобрый голос: ну что, лох? Я тоже лох. Всю жизнь грызу, а толку. Никто не любит. Если у кого-нибудь сосед — вечный труженик, долбящий стену с утра по воскресеньям, про него непременно говорят, что он похож на бобра. Юрий Михайлович Лужков был похож на бобра, но это ему не помогло. Но вот перед нами рысь, хищная рысь. Эта не будет рассусоливать, она нам точно выиграет. И продающая билеты девушка смотрит на нас так заискивающе. От нашей доверчивости зависит ее прибыль. И вот мы покупаем рысь, и спустя пять секунд она уже смотрит на нас, как бы говоря: ну что, лох? Я тоже лох. Со мной случилась однажды такая история. В одном зоопарке сотрудник, который нам вольеры чистил, такой же лох, плохо запер дверцу между мной и тигром. Ну и все — кровь, кишки, клочья меха. Наш лох-уборщик со своей шваброй возвращается, смотрит на это дело, кладет в штаны огромную кучу и бежит к директору. Кранты, скандал, увольнение — так это, значит, он думает, пока бежит, и мучительно на бегу пытается сочинить отмазку. Ну и влетает к директору — а время раннее, серое. «Т-т-там, т-т-там… Там у н-нас… Там ТИГР СЪЕЛ РЫСЬ!» Директор сидит за столом сонный, замученный, пожарные на него наехали, денег нет, все достали, кругом не люди, а звери. Смотрит он на уборщика красными глазами, достает из ящика толстенную книгу учета и помечает, бормоча: «Минус рысь». Вот так вот — минус рысь, и вся моя короткая несчастливая жизнь и ужасная смерть умещаются в два слова.</p><p class="p1">Но на ком-то нам непременно повезет, мы в это верим, как и Святая Русь на что-то надеется в 121-й раз. Слава богу, эти билеты дешевые. Мы играем ровно до тех пор, пока нам не выпадает первый выигрыш, хотя бы самый мизерный: пусть даже еще один лотерейный билет. Словом, пока вместо рокового «билет без выигрыша» не откроется роковое «30 рублей».</p><p class="p1">Берем деньгами, ни в коем случае не билетом! Эти деньги храним, что с ними делаем — объясню потом. Запоминаем порядковый номер выигрышного билета — 5-й, 10-й, 30-й, неважно. Если повезло на первом, то поздравляем, единица — хорошее начало.</p><p class="p1">Дальше нам надо найти монету. Любую, неважно какую, любого достоинства и страны. Ищите вдоль всего Квартала. Обычно они валяются у газетных киосков, у того же сбербанка, просто на асфальте. Обойдите весь Квартал. У табачных еще бывают. Не отчаиваемся. Я же говорю, деньги валяются под ногами, и это лучший символ денег, валяющихся под ногами. Нашли? Подняли? Отлично. Рубль берем за единицу. Номер вашего счастливого билета умножаем на достоинство монеты. Если нашли полтинник — на 0,5, если 10 копеек — на 0,1.</p><p class="p1">Дальше самое трудное. Если не можете этого сделать, не делайте. Но тогда вы честно приплюсуете себе ноль, а это не очень хорошо для Финансового Индекса. Не страшно, но нехорошо. Короче, стоя около магазина, или табачного киоска, или метро, если оно есть у вас в Квартале, вы должны попросить у любого понравившегося вам человека — не милостыни, нет, но немного добавить. Исходя из вашего внешнего вида, возраста, костюма, можете выбрать:</p><p class="p1">• на пиво;</p><p class="p1">• на мороженое;</p><p class="p1">• забыл дома кошелек, умоляю, больной ребенок, на бутылку молока;</p><p class="p1">• ограбили, помогите на билет в метро, вечно буду за вас молиться;</p><p class="p1">• ограбили, помогите на билет в Таджикистан, вся Москва будет вечно за вас молиться;</p><p class="p1">• расскажите стишок, спойте песенку;</p><p class="p1">• сыграйте на скрипке.</p><p class="p1">Цифра первого подаяния — обычно это бывает 10 рублей, но если вы хорошенькая девушка, то может повезти и на 50, а может, вся жизнь наконец устроится — прибавляется к получившемуся результату. Это важный показатель. Если первая цифра говорит о вашей удачливости, а вторая — о находчивости, то третья характеризует способность и желание других людей помочь вам: это не последняя вещь в финансах.</p><p class="p1">Теперь нетрудное, но сложное: заодно поймете, в чем разница между трудным и сложным. Берете свой кошелек. Если кошелька у вас нет, покупаете. Если не на что — выбываете: с безнадежными случаями я не вожусь. Итак, кошелек. Это можно уже дома. Подсчитываете ВСЕ деньги, которые там есть, включая те, что на пластиковых картах. (Льготные карточки, всякие скидки и прочая в счет не идут: только то, что можете снять.) Не забудьте подойти к банкомату и проверить. Если вдруг у вас нет пластиковых карточек, считаете только наличность, всю, до последней копейки. Вот ровно то, что у вас при себе. Заначки не считаются: то, что припрятано в книгах, на балконе, в платяном шкафу, — это не есть актуальный резерв, вы никогда не решитесь их потратить, как не соберетесь и похудеть. То, что на счету и на книжке, — тоже не считаем. Только если счет привязан к карточке. Короче, только то, что есть при вас. Допустим, в кошельке 3 тысячи, на одной карточке 20, на другой 10. Если в валюте — переводите в рубли. Просуммировали? Делите на число прожитых вами месяцев. Не лет, не дней — месяцев. Это очень важно. Полных: неполные не в счет. Сложили? Поделили? Если справились без калькулятора, съешьте шоколадку. Полученную цифру округляем до единиц, дроби нас не интересуют.</p><p class="p1">Теперь последнее: это вы узнаете только завтра, но финансовый коэффициент вообще никогда не рассчитывается за один день, это вам скажет любой экономист. Считаем так называемую дельту, или приращение. Проведите день как хотите, тратьте любые деньги, покупайте необходимую вещь — хоть дворники на машину, если сломались, хоть букет жене, если есть, хоть жвачку, если есть чем жевать. Назавтра рассчитаемся окончательно, сегодня можете сходить в кино, почитать книгу, вообще ни в чем себе не отказывайте. Я же предупредил, что наши упражнения необременительны и занимают очень мало времени. Спокойной ночи.</p></span><span id="id9"><div class="title2">
<p class="p">18 июля</p>
</div><p class="p1">1.</p><p class="p1">Сегодня мы заканчиваем рассчитывать ваш Финансовый Индекс. Для начала нам понадобится дельта. Вечером, в 20:00 (строго в это время! Не раньше, не позже!), подсчитайте во второй раз все деньги, которые есть у вас в кошельке, плюс все, что есть на карточках, которые с собой. То есть прибавление — или убавление — за одни сутки. Может, вы много потратили, купив полезную вещь, или, напротив, вам перечислили зарплату, или вы где-то получили наличные, типа вернули долг, да мало ли откуда могут взяться деньги! В общем, считаем. Возникает вопрос: а если вы сняли с карты и перевели в наличность? Ну тогда сами посудите: прибавилось у вас или убавилось. Видите, как полезно иногда немного подумать: все вопросы отпадают. Допустим, вы потратили на дворники и букет 3 тысячи, но старый друг вернул вам 5, а к тому же перевели зарплату, но вы при этом обедали. Не знаю, сколько у вас зарплата и на сколько вы обедаете, посчитайте сами. Заодно научитесь наконец считать деньги. Короче, полная сумма имеющегося у вас в кошельке минус аналогичный показатель за вчерашний день и есть дельта — последний параметр, которого вам не хватало.</p><p class="p1">Посчитайте, сколько составляет эта дельта от ВЧЕРАШНЕГО количества денег: скажем, у вас было 30 тысяч, вы потратили 3, получаем 0,1. Обратите внимание, рейтингу совершенно неважно, прибыло у вас или убыло. Иногда много потратить — еще больший знак финансовой состоятельности, чем много приобрести.</p><p class="p1">Прибавляем к дельте сумму вашего вчерашнего выигрыша в лотерею.</p><p class="p1">Все. Это и будет ваш Финансовый Индекс. Можете провести эксперимент в любые другие два дня и убедитесь, что это более или менее константа. И так бывает в каждом конкретном случае — кроме исключительных ситуаций, когда вам вдруг выдали литературную премию или взяли штраф за непристегнутость, но это эксцессы, а нас интересует норма.</p><p class="p1">Окончательная формула Финансового Индекса выглядит так:</p><p class="p1">ФР = № бил. × S + S1 + S2/L × D + S3;</p><p class="p1">где S — найденное;</p><p class="p1">S1 — поданное (добавленное, если вам так легче);</p><p class="p1">S2 — все, что есть при вас;</p><p class="p1">L — количество прожитых полных месяцев;</p><p class="p1">D — соотношение вашей вчерашней наличности и потраченного за сутки;</p><p class="p1">а S3 — выигрыш во вчерашнюю лотерею.</p><p class="p1">Например, у меня выиграл пятый билет, я нашел 5 рублей, мне помогли еще двадцатью, в кошельке у меня при этом 5 тысяч наличных и 25 тысяч на карточке, мне 32 года и 3 полных месяца, я потратил 2 тысячи 500 рублей на букет для женщины, которая меня не любит, но вас это не касается, важно, что я ее люблю и что в эту ночь я сплю по крайней мере не один — ничего, не отвлекайтесь, учитесь держать информацию в голове, — и вчера я выиграл 50 рублей, и в сумме это дает нам 133, прошу любить и жаловать.</p><p class="p1">Очень прилично. Не знаю, как вы, а я доволен.</p><p class="p1">Впишите ваш Финансовый Индекс в Паспорт «Квартала». Пригодится.</p><p class="p1">Отныне эта цифра значит для вас очень много. С учетом этого коэффициента вы будете выполнять многие из наших заданий, а иногда просто отжиматься столько раз.</p><p class="p1">Как, например, сегодня.</p><p class="p1">При условии, конечно, что у вас меньше 500. Если у вас больше 500, я вообще не понимаю, зачем вы читаете эту книгу. Впрочем, перестать ее читать вы уже не можете, потому что помните, что за это бывает. Хорошо, отжимайтесь 500.</p><p class="p1">2.</p><p class="p1">Вторая часть задания на сегодня совсем несложная.</p><p class="p1">Вам понадобится вещь из списка. Сегодня это будет Вещь, которую приятно взять в руки. Помните, что все вещи к 15 июля уже должны быть приготовлены; если нет — думайте быстро.</p><p class="p1">С этой вещью вы идете в точку Опасности — неважно, как вы называете ее про себя, — и оставляете там. Вот просто оставляете, на асфальте, или на видном месте, или на ступеньках подъезда. Не жалейте, вы же не навсегда прощаетесь с ней.</p><p class="p1">Завтра утром, когда сможете, заберете. Или обнаружите, что там ее нет.</p></span></span>
