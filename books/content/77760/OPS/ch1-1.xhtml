<p class="p">От издателей</p>
</div><p class="p1">Как многие изобретения и тексты, «Квартал» приходит в Россию кружным путем. Пять лет назад эту книгу на родине автора отвергли все издательства, не говоря уж о журналах. На фрагментарную публикацию, предложенную эзотерическими и малотиражными «Направлениями», он не пошел по очевидным причинам. Выкладывать текст ежедневными порциями в Сеть было тем более бессмысленно — это лучший способ похоронить идею на всемирной помойке. Понадобились два десятка изданий на десяти языках, «Квартальный» бум в США и Латинской Америке, конференция в Оксфорде, инициированная «Кварталом» кампания за возвращение в обиход бумажной литературы, чтобы книга, изданная под псевдонимом Иван Солюшин (Ivan Solution), привлекла внимание отечественного издателя и вышла на родном языке.</p><p class="p1">Это помогло нам получить единственное интервью, появившееся в «Снобе» и сопровождавшее первое издание «Квартала» на португальском языке. Подчеркиваем: это единственное известное интервью Автора, категорически отказывающегося встречаться с прессой всё то время, пока он скрывался под псевдонимом. (Пресловутая беседа беседа по скайпу с мексиканским «NAVEGADOR» — очевидный и бездарный фейк.) С разрешения Автора мы приводим этот наш разговор в качестве предисловия к первому изданию на родине, чтобы избавить читателя от хождений по многочисленным FAQ’ам и дать ему полную информацию из первых уст.</p></span>
