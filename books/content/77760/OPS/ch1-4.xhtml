<p class="p">Предметы, которые понадобятся вам для прохождения игры</p>
</div><p class="p1">1. Бесполезная вещь, которая вам дорога.</p><p class="p1">2. Полезная вещь, которая вам не нужна.</p><p class="p1">3. Вещь, которую вы давно собирались выбросить.</p><p class="p1">4. Вещь, которую вы купили не позднее, чем три месяца назад.</p><p class="p1">5. Вещь, которая напоминает вам о детстве.</p><p class="p1">6. Вещь, которая вдвое больше пачки сигарет.</p><p class="p1">7. Вещь, которая вдвое меньше пачки сигарет.</p><p class="p1">8. Вещь размером с пачку сигарет.</p><p class="p1">9. Вещь, которая не принадлежит вам по праву.</p><p class="p1">10. Вещь, о приобретении которой вы жалеете.</p><p class="p1">11. Мягкая игрушка.</p><p class="p1">12. Вещь, которая появилась у вас неизвестно откуда (вы не помните ее происхождения).</p><p class="p1">13. Вещь, которую приятно взять в руки.</p><p class="p1">14. Вещь, которую держал в руках близкий человек.</p><p class="p1">15. Вещь, связанная с вашей ошибкой (напоминающая о ней).</p><p class="p1">16. Головоломка.</p><p class="p1">17. Смешная вещь.</p><p class="p1">18. Книга на иностранном языке.</p><p class="p1">19. Фотография незнакомой местности.</p><p class="p1">20. Прядь волос.</p><p class="p1">21. Вещь, напоминающая часть человеческого тела.</p><p class="p1">22. Компактная вещь белого цвета.</p><p class="p1">23. Купюра.</p><p class="p1">24. Зеркало.</p><p class="p1">25. Драгоценность (Украшение).</p><p class="p1">26. Вещь, принадлежавшая умершему.</p><p class="p1">27. Вещь, которую вам подарил неприятный человек.</p><p class="p1">28. Вещь, похожая на вас.</p><p class="p1">29. Поводок для собаки.</p><p class="p1">30. Политическая карта мира.</p><p class="p1">31. Карта звездного неба.</p><p class="empty-line"/><p class="p1">Если у вас нет вещи, подходящей под какое-нибудь из описаний, ее можно попросить у кого-то, можно украсть, но не советую покупать. Нарушая эти условия, вы не обманете никого, кроме себя. Некоторые предметы могут совмещать в себе несколько нужных качеств, например, вам может быть дорога мягкая игрушка меньше сигаретной пачки, которая напоминает вам о детстве. В таком случае выберите то качество предмета, которое в нем выражено сильнее всего.</p><p class="p1">ВНИМАНИЕ! Все предметы должны быть подготовлены до 15 июля. Храните их в надежном месте и не перепутайте.</p><p class="empty-line"/><div class="image">
