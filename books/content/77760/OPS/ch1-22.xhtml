<span><span id="id69"><div class="title2">
<p class="p">19 сентября</p>
</div><p class="p1">Сегодня мы спим. Только спим.</p><p class="p1">На работу не идем, и к тому же, очень может быть, сегодня выходной.</p><p class="p1">Постарайтесь просто так, без снотворных проспать весь этот день, избывая весь накопившийся недосып, всю эту тоску ранних пробуждений, особенно невыносимых зимой, все подъемы по тревоге или в наряд, которые вы претерпели в армии, все бодрствования рядом с бессонным ребенком. Спите, просто чтобы спать: не прибегая к снотворным, не убаюкивая себя никакой специальной музыкой. Поймите, как хорошо проспать весь день, не вставая. Ну так, в сортир или перехватить что-то в холодильнике, но вообще-то кто спит, тот обедает. Объясните домашним, что это ваше сегодняшнее задание, попросите, чтобы не беспокоили. Поймите: это — лучшее, вообще лучшее, что можно сделать. И нам многое предстоит, много еще всякого трудного, решающего, потому что «Квартал» входит в последнюю стадию. Кто знает, сколько еще спать придется.</p><p class="p1">Если так уж неудержимо хочется встать — а я предупреждаю, что нельзя, — вспомните все случаи, когда, наоборот, лежать было нельзя, а приходилось вскакивать, бежать в школу, да еще по ледяной улице, а еще раньше вас, должно быть, тащили в детский сад, это еще невыносимей, а потом армия с ее адскими воплями «Ррротападъем!», и работа, куда тоже надо к строго отведенному часу, — у нас ведь как? У нас высшая добродетель в том, чтобы вовремя прийти, а там хоть трава не расти, делай что угодно или вовсе ничего не делай, но явился вовремя — и ты зубец-молодец. Проводить на работе как можно больше времени, с минимальным результатом, но чтобы тебя всегда видели. В компьютере не шаришься, в игры не играешь, тупо смотришь, застыв. Как я всегда ненавидел присутственные дни, присутственные места! Как я всегда ненавидел опаздывать, а не опаздывать невозможно — есть ли что унизительнее этих появлений в строго определенный час, перед лицом людей, которые никогда ничего не умели! И вот мы спим, за один день ничего не случится, мы вообще, может быть, больны. А еще хорошо бывает вспомнить всех, кому спать нельзя: моряков на вахте — это чтобы не думать о худшем, о зонах, в том числе строгого режима, о часовых, в том числе в зоне военных действий, о страдающих сонной болезнью, которые спят, когда не надо, и не спят, когда надо. Если можете спать только в состоянии сытости, черт с вами, нажритесь. Если вас усыпляет спиртное, плевать, напейтесь. Но не вставайте, выпадите на день из жизни, попробуйте, ведь иначе у вас никогда ничего не будет. Не только денег — вообще никогда ничего. Неужели вы еще не заметили, что любая попытка работать, суетиться, нравиться начальству — это кратчайший путь к унынию, к отчаянию, вас никто в грош ставить не будет! Птицы небесные не хуже ли вас? А и они спят, когда им хочется, и очень хорошо, и прекрасно! Представим себе райскую птицу, спящую в райском саду, в синем вечернем свете; вокруг нее текут и переливаются музыкальные струи. Лучшее и самое сонное, что я когда-либо видел, — а лучшее и есть сонное, потому что покой и гармония немедленно заставляют меня уснуть, — так вот, лучшее, что я видел, был инкский храм воды, и если доживу, я непременно увижу его еще раз. Это божественно. Он называется Тамбомачай. Это что-то столь отдельное от современного человека, что-то столь давнее и непонятное — как Южное полушарие для северного человека, с разочаровывающе маленьким Южным Крестом, со странными созвездиями Скульптора и Эридана. Этот храм еще называют инкским Версалем. О, как сложно, как музыкально распределяется там вода, как он волшебно, сонно асимметричен! Симметрия ужасна, в ней есть нечто от насилия, юриспруденции, парадного подъезда, — но легчайший сдвиг превращает мир в тайну. Вот она течет там по трубкам, вся эта вода, и вокруг нее — ярко-зеленая, почти ядовитая трава, а сзади, над горой, — ярко-серое, ядовито-серое небо; такое бывает перед долго не проливающимся, грозным дождем. Там еще высоко, и довольно мало кислорода, и потому сон одолевает сам собой. Я всегда вспоминаю этот храм, когда мне надо заснуть, и небо над ним, и траву под ним. Или можете вспомнить море — тоже очень сонно. Смотрите, вон дерево за окном, оно тоже спит. Если вам есть с кем спать, спите с кем-то, это самое лучшее.</p><p class="p1">Проснуться разрешается в 21:00. Отправляйтесь гулять по Кварталу, и лучше всего в то самое место, которое так часто менялось. Видите, как сильно оно изменилось? И что хорошего? Если бы на зиму все в наших широтах впадали в спячку, как муми-тролли, как прекрасна была бы весна и как мало всего мы бы испортили! И, кстати, как мало мы бы съели!</p><p class="p1">Вот у нас был кинотеатр «Литва». Я всё там смотрел: и детское кино на детских сеансах, и литовские фильмы, которые привозили (я не любил их, но все-таки запоминал, потому что это было искусство, в конце концов), и даже то я там смотрел, куда детей до 16 не допускали. И когда Богушевская поет «Назавтра мы идем в кино — кажется, на Фосса. И перед сеансом в фойе пустынно и темно» — «Шарманку-осень», — я понимаю, о чем речь, потому что у нас всегда в «Литве» тоже было пустынно и темно, и вообще там было особенно прекрасно осенью: фиолетовое небо, вечерний сеанс, народу почти никого, и всё как бы в заговоре. И ужасно мне нравился плавно спускающийся, ступенчатый зал этого кинотеатра, и шестой ряд — я всегда почему-то выбирал его, — и журналы, которые там крутили: во-первых, это было предвкушение, а во-вторых, среди них попадались крайне интересные! Не «Фитиль» и не какие-нибудь «Новости дня», а что-нибудь документальное, познавательное, чего теперь никогда уже не увидишь. И я помню, как с тогдашней возлюбленной — 10-й класс! — пошел смотреть что-то новое, а перед этим был триумфальный сюжет про советскую Молдавию, как там прекрасно. И сзади две девки ржут, ржут неудержимо! Я спрашиваю Егорову: чего они ржут? А Егорова отвечает: наверное, они оттуда. Умная девочка, замечательная. Очень мы интенсивно целовались везде, где находились, — нам на речном трамвайчике один дядя вполне доброжелательно сказал: ребята, не частите, надоест. Он оказался неправ, мы разбежались по другой причине, но в кинотеатре «Литва» успели провести много прекрасных часов.</p><p class="p1">И вот, значит, его закрыли — совершенно непонятно почему, — и сделал и вместо него сначала ярмарку меда, но не было в стране столько меда и медолюбов, — а потом паломнический центр. У нас на доме теперь висит плакат: «Приглашаем на распродажу конфиската в ПОЛОВНИЧЕСКИЙ центр». Паломничества там никакого не вышло, а вышел как бы рынок, где распродают то загадочный конфискат, то ивановский ситчик, то тамбовский лен. Тамбовский лен тебе товарищ. Дело в том, что Советский Союз мог содержать — и содержал — малопосещаемые места. Он мог себе это позволить, даже если места были сомнительные, никому особенно не нужные. Но именно в таких местах осенними вечерами было совершенно волшебное ощущение: на никому не нужном советском фильме, который смотрят в зале пять человек, или в театре-студии, куда ходят три с половиной школьника и учатся там у бородатого режиссера-авангардиста, который в 1989 году при первой возможности уедет навсегда (и нигде не будет так счастлив, как в театре-студии при Доме пионеров Октябрьского района на углу улиц Двадцатилетия и Тридцатилетия Октября, в октябре месяце). Потом стали строить, открывать и всячески насаждать места, где должно быть много народу, а все малопосещаемое закрывать, но все великое как раз и формируется в малопосещаемых местах, в книжных магазинах, в которые никто не ходит, в кинотеатрах, где что-то смотрят пять человек… Одна надежда, что скоро вообще нигде никого не будет и все опять будет так же, как в доме, который тихо разрушается, или у постели, где кто-то тихо умирает. Иное дело, что это все, которое вокруг, будет умирать без всякой магии, без сентиментальности, без тайного общества: просто будет обрушиваться, и всё. Не было даже никакой великой идеи, которая в основание этого всего была бы положена. А в помещении половнического центра, верьте слову, — о, как ясно я вижу это шествие с половниками! Шествие правильных, с хорошим аппетитом потребителей! — там будет универмаг «Шестерочка», с ужасными яблоками и вялым луком и такими же стариками, которые тщательно это всё перебирают: не потому, что выбирают, а потому, что делать им нечего.</p><p class="p1">Когда я буду таким стариком, если я буду таким стариком, — я буду много спать, чтобы не позориться. В моей любимой книге об этом сказано: «Воистину жизнь человека длится одно мгновение, поэтому живи и делай что хочешь. Глупо жить в этом мире, подобном сновидению, каждый день встречаться с неприятностями и делать только то, что тебе не нравится. Но важно никогда не говорить об этом молодым, потому что неправильно понятое слово может принести много вреда.</p><p class="p1">Я лично люблю спать. Со временем я собираюсь все чаще уединяться у себя в доме и проводить остаток жизни во сне».</p><p class="p1">Что-что, а это правило мне легко выполнить. Остальное трудно, но не потому, что я такой плохой самурай, а потому, что не родился еще тот сегун, служа которому и т. д. Поэтому я сплю уже сейчас — всё лучше, чем превращаться в половнический центр.</p></span><span id="id70"><div class="title2">
<p class="p">20 сентября</p>
</div><p class="p1">Перепечатайте на компьютере следующий текст.</p><p class="empty-line"/><p class="p1">Рано или поздно каждый обречен задуматься о смысле нашей игры, которая становится все менее увлекательной, зато все более опасной. На нас с подозрением оглядываются соседи, за нами ходят таинственные люди, наши сны полны вещей, которые никогда прежде нам не снились, сны вообще, кажется, перестали быть нашими — потому что такие ужасные вещи никогда не пришли бы нам в голову. Продвигаясь к совершенству и деньгам, мы всё отчетливей расстаемся с собой, перевязываем узлы своей жизни и совершаем вдобавок массу странных действий. Зачем мы это делаем и что имеем в виду?</p><p class="p1">Пожалуй, нам пора признаться себе, что мы создаем новую этику. Старая этика пришла в негодность и нуждается в замене. Один друг рассказал нам недавно, что у него не выходит из головы судьба евреев Артемовска, которых в 1941 году не расстреляли, а замуровали в штольне под алебастровым заводом. Быть замурованным в одиночку, говорил друг, ужасно, но умереть в штольне, где вместе с тобой задыхаются три тысячи человек, — это за гранью человеческого разумения. Они все мумифицировались там, и разгребать эту гору трупов заставили потом бывших немецких полицаев. А гореть с сотней односельчан в запертом сарае? Тут не выберешь. Вообще после Второй мировой войны нельзя ни просто писать стихи, ни просто читать стихи — нельзя вообще относиться к человеку всерьез. Этот проект закончился. Во всяком случае, закончилась его этическая система, которая, как выяснилось, ни от чего его не удерживает.</p><p class="p1">И то, что мы наблюдаем сейчас, есть именно проект, от которого отвернулся его основатель (основатели), и теперь мы существуем в пространстве без верха и низа; отсюда и катастрофическое падение того самого общества, в котором в ответ на любую жалобу раздается: «Так и надо». Но то, что мы делаем сейчас, — не что иное, как попытка выстроить новую этику, которая будет держаться не на ценностных, а на числовых последовательностях. Если нельзя заставить человека хорошо себя вести исходя из того, что вот зло, а вот добро, — видимо, его поведение можно регламентировать с помощью чисел. Если патриотизм, национальная гордость или любовь приводят его сплошь и рядом к таким результатам, следует искать регламентацию не в этической, а в любой другой рациональной плоскости. Нужно вести себя так-то, потому что книга открылась на такой-то странице, нужно звонить или не звонить любимой в зависимости от того, какая сегодня погода и в какой день вы родились. Только это позволит нам вести себя последовательно, а последовательность и есть этика.</p><p class="p1">Я не сразу это понял. Я это понял только тогда, когда начал всерьез экспериментировать с «Кварталом». Ведь каждое упражнение — результат огромного личного опыта. Сколько я бился над одним только расположением глав! Но теперь все работает. Теперь в мотивировках моих поступков, как и в переменах погоды, нет ровно ничего человеческого. И я наконец соответствую миру, который так люблю, — миру, в котором цветут цветы и растут грибы.</p><p class="p1">Будущее, впрочем, берет уроки у прошлого. Тогда ведь тоже принимали решения, исходя из сочетания и положения внутренностей, из бросания камешков, из монеток, как в Книге перемен. И мы всё нагляднее возвращаемся в эти времена, раз боги, запретившие нам магию, отвернулись от нас. Магия была надежнее хлипкой человеческой воли, надежнее человеческой морали, срывающейся в зверство раз в 100 лет. И, может быть, сейчас, когда мы возвращаемся к высшим иррациональным смыслам сложным путем «Квартала» — раз путь любви, творчества и веры привел нас вот к этому вот (обводит комнату рукой), — то и старые боги, возможно, сжалятся над нами, вернутся к нам. Те боги, которые и сейчас ждут нас в далеких дебрях, в руинах старых храмов, в горах, пещерах и реках, где им пришлось прятаться. Но ни одна река не может вечно прятаться в трубе — рано или поздно труба треснет, а река вырвется на свободу.</p></span><span id="id71"><div class="title2">
<p class="p">21 сентября</p>
</div><p class="p1">Выучите наизусть балладу.</p><div class="poem">
<div class="stanza">
<p class="v">Были мы малые боги,</p>
<p class="v">Пришли на нас белые люди,</p>
<p class="v">Поставили крест на нашем месте,</p>
<p class="v">Отнесли нас в глубину леса.</p>
</div>
<div class="stanza">
<p class="v">К нам приходят в глубину леса</p>
<p class="v">Захваченные темные люди,</p>
<p class="v">Приносят нам свои приношения,</p>
<p class="v">Хотя у них самих не хватает.</p>
</div>
<div class="stanza">
<p class="v">Захваченные темные люди</p>
<p class="v">Горько плачут с нами в обнимку —</p>
<p class="v">Кто бы в дни нашего величия</p>
<p class="v">Разрешил им такую фамильярность?</p>
</div>
<div class="stanza">
<p class="v">— Бедные малые боги,</p>
<p class="v">Боги леса, огня и маниоки,</p>
<p class="v">Ручья, очага и охоты,</p>
<p class="v">Что же вы нас не защитили?</p>
</div>
<div class="stanza">
<p class="v">Боги леса, костра и маниоки</p>
<p class="v">Плачут, плачут с ними в обнимку:</p>
<p class="v">Кто бы во дни их величья</p>
<p class="v">Разрешил им такое снисхожденье?</p>
</div>
<div class="stanza">
<p class="v">— Простите нас, темные люди,</p>
<p class="v">А мы-то еще на вас сердились,</p>
<p class="v">Карали вас за всякую мелочь</p>
<p class="v">Неумелою отеческой карой!</p>
</div>
<div class="stanza">
<p class="v">А теперь запрягли вас в машины,</p>
<p class="v">Погнали в подземные шахты,</p>
<p class="v">Кровь земли выпускают наружу,</p>
<p class="v">Кости дробят и вынимают.</p>
</div>
<div class="stanza">
<p class="v">А богов очага и охоты</p>
<p class="v">Отнесли и бросили в чаще,</p>
<p class="v">Вы приносите им приношения,</p>
<p class="v">А они ничего не могут.</p>
</div>
<div class="stanza">
<p class="v">Знаем мы, малые боги,</p>
<p class="v">Боги леса, ручья и маниоки:</p>
<p class="v">Вас погубят белые люди,</p>
<p class="v">А потом перебьют друг друга,</p>
</div>
<div class="stanza">
<p class="v">Крест упадет, подломившись,</p>
<p class="v">Шахты зарастут, обезлюдев,</p>
<p class="v">На машинах вырастет плесень,</p>
<p class="v">В жилищах поселятся гиены,</p>
</div>
<div class="stanza">
<p class="v">И останутся малые боги</p>
<p class="v">На земле, где всегда они были:</p>
<p class="v">Никто их не выбросит в чащу,</p>
<p class="v">Никто не принесет приношений.</p>
</div>
</div></span><span id="id72"><div class="title2">
<p class="p">22 сентября</p>
</div><p class="p1">Сегодняшние наши действия целиком определяются все той же игрой случая, но случай больше понимает про людей, чем сами они про себя.</p><p class="p1">Возьмите семь первых попавшихся на глаза книг из вашей библиотеки. Если у вас нет библиотеки — семь первых попавшихся книг из любой другой бумажной библиотеки. С сетевыми текстами, к сожалению, это упражнение не выполняется.</p><p class="p1">Сосредоточьтесь.</p><p class="p1">Откройте каждую из книг на той странице, которая совпадает с вашим годом рождения (две последние цифры).</p><p class="p1">Если вы родились в 00–05 годах (это обычно титульный лист или эпиграф), открывайте страницу 99.</p><p class="p1">Найдите строчку, совпадающую с месяцем вашего рождения.</p><p class="p1">Если вы родились в декабре, это 12-я строчка сверху и т. д.</p><p class="p1">Показываю, как всегда, на своем примере.</p><p class="empty-line"/><p class="p1">таким образом: двое людей обнимают друг друга и сли-</p><p class="p1">только по пьянке не происходит. Дали для милиции отли-</p><p class="p1">У самого Алеши — головные, современные, не с нашей</p><p class="p1">я псих</p><p class="p1">Дворец и долина чаровали Джона своими чудеса-</p><p class="p1">а в Нью-Йорк вернусь четвертого.</p><p class="empty-line"/><p class="p1">in trying to plumb the secrets of her origins; that she had woken a</p><p class="empty-line"/><p class="p1">И говорите мне после этого, что случайности ничего не говорят. Да всё они говорят. Все тут совершенно точно ко мне подходит. Кстати, я собираюсь в Нью-Йорк, да. Не очень скоро, но собираюсь. Есть такие планы. И там меня будут чаровать дворец и долина. У других все головное, а я псих, но это от любви и пьянства. Задача моя сейчас — запломбировать — или, по контексту, скорее распломбировать — секреты моего происхождения; она разбудила — кого? Она разбудила демона, но это уже следующая строка (J.K. Rowling, Cuckoo’s calling, если кому интересно). Следовательно, мой порядок действий на сегодня: секс, пьянка, раздумья, психоз, посещение дворца (думаю, это будет прогулка вокруг Дворца пионеров), переписка с Нью-Йорком и — нет, совершенно не то, что вы подумали. Plumber — это вообще-то водопроводчик. Вот давно назревшей починкой крана я и займусь.</p><p class="p1">Учтите, это еще не всё. Вы должны составить связное предложение или рассказ из названий процитированных текстов.</p><p class="p1">В нашем случае это «Лошади с крыльями», «Маленькая Вера», «Поденные записи», «Цветы для Элджернона», «Алмазная гора», «Дорогой Пончик, дорогой Володя» и «Зов кукушки».</p><p class="p1">С Алмазной горы доносился зов кукушки, и лошади с крыльями, размахивая цветами для Элджернона, вторили ей.</p><p class="p1">Но дорогой Пончик и дорогой Володя не отзывались, занятые поденными записями.</p><p class="p1">Они слишком мало верили.</p></span><span id="id73"><div class="title2">
<p class="p">23 сентября</p>
</div><p class="p1">Сегодня мы злы, очень злы.</p><p class="p1">Мы раздражены до предела.</p><p class="p1">У нас бывает такое состояние — оголтелого, мрачного раздражения. С самого утра. И оно очень полезно. Оно своего рода художественный метод. Оно позволяет выбросить из души все ненавистное. Конечно, душа не очистится окончательно, но некий катарсис, как после бани, нам гарантирован.</p><p class="p1">Разозлиться очень легко. Ведь эта злость сидит внутри нас всегда, просто не всегда просыпается, и все мы прекрасно знаем, что нам нужно для ее пробуждения. Легче всего — когда есть раздражающий внешний фактор. Ботинок жмет, голова болит, вы не выспались, вы голодны, жарко, душно. Холод — не так хорошо, холод затормаживает, а вот духота поднимает такую волну негодования от самой диафрагмы, что иногда больше ничего и не требуется. Поэтому вчера мы поставили будильник на 5:00. С 5:00 вы должны заниматься очень трудным делом — можно решать сложную математическую задачу или, если вы математик, учить наизусть «Полтаву», а если вы знаете «Полтаву», значит, разберите компьютер и собирайте его обратно. Все это нужно делать при закрытых окнах и в свитере. Когда почувствуете первое легкое раздражение, можно приступать. Засеките время.</p><p class="p1">Есть безотказные вещи. Зависть. Несправедливость. Идиоты. Мудаки. Идиоты, которые имеют всё то, чего заслуживаете вы. Бляди, которые поступают с вами несправедливо. Или не с вами — но посмотрите, как они себя ведут! Посмотрите на эти самодовольные рожи, на эти ухмылочки, ужимочки! Как они злорадствуют, как оставляют всех в дураках! Если вам удалось собрать компьютер, просто читайте новости. Если нет, включите телевизор — вы видите вообще, что происходит? Что за срань-то кругом, господи! Вот выступает жирный, лоснящийся, аккуратно причесанный, в пиджаке — рожа на жопу похожа. Телеведущий. Врет же, сука, через слово. А попробуй объясни кому. Попробуй, давай, объясни это бабке в магазине. Она ж его слушает и всему верит. И ни с ним ты не можешь ничего сделать, ни с ней. А эта гнида в ящике все лоснится. Вранье на вранье, и не краснеет, и ужас в том, что никого нельзя переубедить, ничего нельзя доказать.</p><p class="p1">Переключаем канал. Там идет русский сериал. Актриса в прыщах кривит морду, изображает чувства. Кто им пишет это всё — эти сценарии, эти диалоги, — ведь люди так не разговаривают! И не ведут себя так.</p><p class="p1">Или Интернет. Мужик пишет: ехал по дороге, никого не трогал, подрезали, стукнули в крыло, вытащили из машины, отлупили, забрали деньги, напугали ребенка до смерти. Уехали. А теперь на него же шьют дело, потому что те оказались какие-то непростые, и ментам ничего не докажешь, никому не объяснишь ничего, а у него свидетели и запись с регистратора, но запись в суде никого не колышет, а свидетелей не вызывают. И вот он пишет, а внизу комментарии: а ты сам виноват, а не хер ездить где не надо, и ребенок у тебя без кресла в машине сидит, и права, поди, купил, на дороге тупил, хули теперь? И никому ничего…</p><p class="p1">Инвалид приехал в кафе на коляске, а его не пустили, потому что хера он там будет на своей бандуре разъезжать в маленьком ресторане, пугать посетителей?</p><p class="p1">Одна тоже — напали во дворе ночью, хотели изнасиловать, ну, она девка не промах, одному руку сломала, другому отбила яйца, теперь под следствием за побои — а насиловать? А никто и не собирался насиловать, попробуй докажи, следов-то нет. Не докажешь. И комментарии: сама виновата, а не ходи где не надо, а не одевайся как не надо, да для бабы счастье, если ее трахнут, они все только того и хотят, а потом выделываются, а пусть сиськи покажет, сиськи, сиськи! Надо ж посмотреть, что там было так защищать? Тьфу ты, и защищать нечего, я б спьяну не полез на такую.</p><p class="p1">Или еще одна ходит по Сети, везде выискивает, на ком можно поплясать, находит какую-нибудь несчастную, которую муж приложил головой о подоконник, и давай выкручивать: лохи, лохи, лохи, вот я, вот у меня, а она жирная и лох, а я красивая, и хор в комментариях: а мы, а у нас, а мы своим так и сказали, что если хоть что, так все, а эти все лохи, лохи, лохи! Интеллигенция вшивая, за себя постоять не могут, вечные жертвы, пока такие по земле ходят, счастья человечеству не будет, так им и надо, сами, сами виноваты, жирные неудачницы.</p><p class="p1">Кто жалуется, тот всегда виноват, а им всем только и надо, чтобы ты был виноват. Всем надо, вот и на работе — что, всё хорошо на работе? А когда ты один раз за 10 лет проспал на работу, потому что температура была и накануне не спал почти, доделывал срочный проект? И проспал, а утром было совещание, на хер никому не нужное, одна профанация, но ты опоздал, и с тех пор, блядь, прошло еще 10 лет безукоризненной работы, но стоит тебе не так посмотреть, как тебе с такой ухмылочкой, с таким самодовольством: а вот Иван Иванович у нас считает, что может не ходить на совещания, что у него особое положение тут, но мы его прощаем пока, ведь прощаем, так и быть? Да ебал я в рот ваше прощение, какие, в жопу, особые условия? Вон это мурло из соседнего кабинета ни хера вообще не может, но ему и премии, и отпуск, и что угодно, и в попу подуют — потому что лизать умеет, а ты не обучен.</p><p class="p1">А эта дрянь, которая морочила тебе голову три года, кормила обещаниями, крутила как хотела, принимала подарки, со всеми друзьями тебя рассорила, потому что ты только о ней и мог говорить, а кто это выдержит? А ты был лох, лох, лох, другой бы взял и трахнул давно без всяких церемоний, и так и вышло в конце концов, другой взял и трахнул, и она еще на голубом глазу тебе позвонила в час ночи и попросила отвезти ее к нему, а ты что? А ты повез! Да они же все тебя имеют, и так всегда будет, потому что они ничтожества, они не задумываются, они пользуются, и все, и никого никогда нельзя убедить ни в чем.</p><p class="p1">И опять телевизор, а там поп, призывает Родину любить — а за что? Что она такого сделала нам, эта Родина? И этот поп? Всю душу черту продал за расписную шапку, источает самодовольство и уверен, бля, что войдет в Царствие Небесное — и не переубедишь его никогда! Они все только тогда задумаются, когда лицом к стенке будут стоять, да толку-то уже будет? И душно как, сидишь в сраном свитере, какого хрена, с этой блядской книгой, что ты тут высиживаешь, понятно же, что автор тебя имеет, не будет у тебя никаких денег, зато у автора будет много денег, если все по три экземпляра купят и будут послушно заниматься херней, а он еще и будет решать, кому можно, кому нельзя, кто выбывает, кто не выбывает — он что вообще возомнил о себе? Очередной лохотрон, а неудачники ведутся — и так гадко, будто в душу насрали, так ведь и насрали! Что, не насрали? А когда ты очередь отстоял и перед тобой тетка три часа перебирала всё и щупала, а когда до тебя дошел черед, эта крашеная хабалка выставила табличку «Перерыв» и свалила в подсобку курить? А когда ты разворачивался в узком месте, и тебя по тротуару объехал джип, и оттуда бритоголовый крикнул: «Ну шевелись, бля, уебок»? А когда тебе в кафе не несли заказ, а потом показалось, что они вообще забыли про салат, но в счет включили, а ты ничего не сказал, потому что… Да хрен знает почему, потому что интеллигенция вшивая, неудачник и лох, не можешь за себя постоять. И никому нельзя НИЧЕГО ДОКАЗАТЬ! Про тебя вообще можно наврать что угодно, и ты сожрешь, и сделать можно с тобой всё, и тоже сожрешь, потому что ты им не должен ничего доказывать, какого хера, кто они такие все? А они никто, только они могут с тобой всё, а ты с ними — ничего…</p><p class="p1">Когда накал достигнет нужной степени: тут можно кулаком ударить в стену, сломать что-нибудь, швырнуть, в глазах мутнеет, в ушах звенит, голова как колокол — вы готовы. Смотрим, сколько прошло времени. Быстро снимаем свитер, открываем окно, дышим свежим прохладным воздухом и включаем фильм «Девчата». Первые несколько минут нахальная безмозглая Надежда Румянцева будет бесить так, что хоть плюй в монитор. Перетерпеть, не плевать. Это пройдет. Запомните, на какой минуте фильма пройдет. Это число — ваш Индекс Спокойствия (ИС). Посчитайте, сколько времени прошло от начала обозления до пика. Это Индекс Бешенства (ИБ). Вычтите ИС из ИБ — это будет ваш Индекс Торможения (ИТ). Если получилось положительное число, сегодня можете не отжиматься. Если отрицательное, отжимайтесь 20 раз, с закрытым окном и в свитере. Возможно, потом опять понадобятся «Девчата».</p><p class="p1">Если ваш ИТ равен нулю, значит, вы относитесь к группе «В». Но я таких пока не встречал.</p></span><span id="id74"><div class="title2">
<p class="p">24 сентября</p>
</div><p class="p1">А сегодня мы добры, очень добры.</p><p class="p1">Бесполезно смотреть для этой цели ролики на YouTube, даже с самыми забавными животными: вы будете так их жалеть, что только взбеситесь. Покупать что-нибудь тоже бессмысленно, хотя это хорошая аутотерапия. И свидания назначать необязательно: во-первых, это не всегда помогает, а во-вторых, после них ведь наступает не доброта, а нечто иное. Самодовольство. Пресыщение. Пусть даже гармония. Но мы должны стать добры, то есть буквально излучать доброту, испускать ее, по-толстовски говоря, как паутину.</p><p class="p1">Что нужно для этого? Попробовать в течение дня делать все, что захочется.</p><p class="p1">Это кажется несложным. Правда, нужно для начала понять, чего вам хочется. Так сказать, расчистить это в себе. Как вернетесь с работы — так сразу и начинайте. На работе трудно делать только то, что хочется. А вот после — самое оно.</p><p class="p1">Ешьте что хотите, идите куда хотите. Не хочется выгуливать собаку — не выгуливайте. Перестаньте смотреть на себя недоброжелательным взглядом. Ничего от себя не требуйте. Хочется лежать — ложитесь. В конце концов, мы уже в том возрасте, когда надо себе что-то позволять. Хочется болтать по телефону? Вперед. Включить ТЕЛЕВИЗЕР? Не страшно. Избавиться от всех членов семьи на один вечер? Отправьте их в кино и сядьте в ванну.</p><p class="p1">Добреете?</p><p class="p1">Нет. Ужасный парадокс, но нет. Комфорт не делает нас добрее, надо ощутить счастье. Как же это сделать?</p><p class="p1">Очень просто. Открываем окно, впускаем осенний воздух. Включаем любимую музыку. Смотрим в небо.</p><p class="p1">Но и осенний воздух, и неб о, и любимая музыка говорят нам о бренности. Где взять доброту при таких мыслях?</p><p class="p1">Что может заставить нас любить если не всех, то хоть некоторых, что прогонит раздражение и впустит жалость?</p><p class="p1">Срочно, срочно бежим в Квартал! На улицу, где приходят лучшие мысли. Чувствуем прилив сил. Генерируем идею. Не генерируется. Ходим, ходим по этой улице вечером. Постепенно успокаиваемся. Ритм шагов подсказывает первые ходы мысли. Кажется, мы еще что-то можем. Сейчас нащупаем. Нет, все уже было.</p><p class="p1">Мы ничего не можем. Мы абсолютное и законченное ничтожество, такое же, как все.</p><p class="p1">Ничтожества бредут по улицам, раздавленные своей ничтожностью. Одинокие некрасивые люди целуются, не подозревая, как это выглядит. Уродливая молодежь натужно изображает крутых.</p><p class="p1">Все раздавлены, никто ничего не может, все умрут.</p><p class="p1">Как я люблю нас.</p><p class="p1">Помните, заход через ничтожество — самый верный. Это срабатывает даже в постели, когда ну никак не хочется — но есть тяга общей бренности.</p><p class="p1">Возвращаемся домой, упиваясь собственным ничегонемогуществом и всеобщей бренностью, родством по участи, взаимопониманием как единственной радостью бессильных.</p><p class="p1">Видите, с какой любовью все на вас смотрят? Это оттого, что вы присоединились, растворились, признали свое бессилие. Только из этой позиции можно любить всех, только после отказа от любого сопротивления возможно то, что здесь называется добротой.</p><p class="p1">Милосердие — совсем другое дело. Оно удел злых и раздраженных. Где-то даже разочарованных.</p><p class="p1">Если у вас получилось быть добрыми — поздравляю, вы принадлежите к группе «Б».</p><p class="p1">А если нет — утешьтесь моей любовью, которая выразится сегодня в том, что зарядку завтра делать необязательно.</p></span><span id="id75"><div class="title2">
<p class="p">25 сентября</p>
</div><p class="p1">Сегодня решается довольно многое в вашей судьбе до конца сентября. Дело в том, что помимо прохождения «Квартала» у вас продолжалась кое-какая жизнь, вы что-то там делали, позволяли себе встречи с противоположным или — вдруг — своим полом, выпивали, работали, читали, вообще ни в чем себе не отказывали.</p><p class="p1">И, конечно, несколько затуманили ту кристальную ясность ума, которая наступает в процессе работы с «Кварталом». Ничего не поделаешь, вас надо наказать. Или не надо. Это зависит от того, как вы себя вели.</p><p class="p1">Но я не знаю, как вы себя вели. Это может нам подсказать, как всегда, не совесть, а сложная система кажущихся случайностей. Для определения вашей виновности или невиновности нам понадобятся: колода карт, коробка чипсов (любых, хотя «Принглс», не сочтите за рекламу, удобнее) и одна тарелка, которую не жалко.</p><p class="p1">Приобретите все это в ближайшем хозяйственном, универсальном, продуктовом или каком хотите магазине, а к вечеру принесите домой.</p><p class="p1">1. ГАДАНИЕ ПО КАРТАМ.</p><p class="p1">Распечатайте колоду. Тщательно перемешайте. Выньте наугад, не глядя, три карты.</p><p class="p1">Если среди них преобладает черная масть, это первый аргумент в пользу того, что вас надо наказать. Записывайте или запоминайте: НАКАЗАТЬ.</p><p class="p1">Если преобладает красная масть, вам ПОВЕЗЛО.</p><p class="p1">Это первый итог.</p><p class="p1">2. ГАДАНИЕ ПО ЧИПСАМ.</p><p class="p1">Это совсем просто. Распечатайте чипсы. Подсчитайте их количество.</p><p class="p1">Я же говорил, лучше «Принглс». Они не крошатся, их легко считать.</p><p class="p1">Итак. Если количество чипсов кратно 3, вам ПОВЕЗЛО.</p><p class="p1">Если нет, вас надо НАКАЗАТЬ.</p><p class="p1">Запоминайте второй итог.</p><p class="p1">3. ГАДАНИЕ ПО ТАРЕЛКЕ.</p><p class="p1">Берите тарелку и высоко, с размаху, швыряйте об пол, пока не разобьется. Вложите в этот жест всю свою злобу. Всю силу. Это тарелка виновата, что вам приходится проделывать столько глупостей, а сейчас вас, может быть, еще и накажут.</p><p class="p1">Если тарелка разбилась, вас надо НАКАЗАТЬ, потому что не фига тут бить посуду.</p><p class="p1">Если тарелка уцелела, то вам ПОВЕЗЛО, вы купили хорошую, правильную тарелку.</p><p class="empty-line"/><p class="p1">По итогам трех гаданий мы узнаем вашу участь по 30 сентября включительно.</p><p class="p1">Если вас надо НАКАЗАТЬ, вы входите в группу «Б» и не покидаете квартиру до 30 сентября вообще, никак, даже чтобы выбросить мусор. Это особое духовное упражнение. Попросите любого приятеля купить вам все необходимое или заставьте семью поработать на вас: соврите, что больны, простужены, температурите. Очень может быть, что температура у вас действительно есть — еще бы, ведь вы НАКАЗАНЫ. 1 октября можете выйти из дому, а пока вы то ли под домашним арестом, то ли, что вероятнее, в убежище. С группой «Б» вечно что-нибудь случается, поди уследи. Может, этим наказанием мы вас уберегаем от чего-нибудь куда более реального.</p><p class="p1">Если же вам ПОВЕЗЛО, вы проделываете все, что рекомендовано вплоть до 30 сентября. Но проделываете в совершенно особенном, ликующем настроении, помня, что вам ПОВЕЗЛО!</p></span><span id="id76"><div class="title2">
<p class="p">26 сентября</p>
</div><p class="p1">Задание для обеих групп.</p><p class="p1">«Квартал» подходит к концу, и нам пора понять о себе очень важную вещь. Вы уже заметили, что я предлагаю вам варианты упражнений в зависимости от множества факторов: многие из них могли бы показаться случайными, но вы уже должны были понять, что никаких случайностей не бывает. Как одни и те же духи по-разному пахнут на разных людях, так и «Квартал» будет действовать по-разному.</p><p class="p1">Жанр этой книги определить трудно, и этим будут заниматься другие люди — не я и не вы. Скажу только, что это не жанр, а наджанр — как поджелудочная железа или надпочечник или — вот! — как глутамат натрия, усилитель вкуса, с которым сейчас идет такая борьба. Так вот: жанр «Квартала» — не наша забота, а вот потенциальный жанр вашей жизни определить можно, и этим мы сейчас займемся. Сегодня вы побудете зрителями собственной биографии.</p><p class="p1">Скорее всего, ваша жизнь до «Квартала» была вполне заурядна. Скорее всего, такой же она останется и после, только у вас будут деньги. Скорее всего, вы никогда в жизни не видели инопланетного монстра и, вероятно, еще долго не увидите. Но мы рассматриваем потенциал. То есть, если бы про вас снимали кино, оно было бы таким. У каждого жанра есть определяющая совокупность примет: если попытаться снять фильм в несоответствующем жанре, то ничего не выйдет либо выйдет гениально, если произойдет божественное вмешательство. Но вы на это не замахивайтесь: вряд ли среди вас есть гении, и слава богу.</p><p class="p1">Предлагаем вашему вниманию краткий жанровый определитель.</p><p class="p1">Начнем с вашего окружения.</p><p class="p1">Выбираем из списка (пол не имеет значения): толстяк, очкарик, спортсмен, умник, жадина, красавчик, весельчак, мизантроп, добряк, трус, халявщик, неудачник, крутой чувак, подлец.</p><p class="p1">Выбрать нужно троих и заодно определить, кем являетесь вы, это тоже важно. Итак:</p><p class="empty-line"/><p class="p1">Если ваши друзья — толстяк, весельчак и умник, а сами вы — мизантроп, ваша жизнь — фантастический боевик. Толстяк обычно умирает первым, но у нас жизнь, а не кино, так что толстяку ничто не угрожает.</p><p class="p1">Если тот же набор, но сами вы — неудачник, вы в романтической комедии.</p><p class="p1">Если вы крутой чувак, то это просто боевик.</p><p class="p1">Если вы жадина, перед нами фильм-воспитание. Воспитывать будут вас.</p><p class="p1">Если вы красавчик — мелодрама.</p><p class="p1">Если добряк — приключения.</p><p class="empty-line"/><p class="p1">Другой расклад: ваши друзья — трус, толстяк и спортсмен.</p><p class="p1">Если вы неудачник — криминальная комедия.</p><p class="p1">Если вы умник — криминальная драма.</p><p class="p1">Если вы добряк — фильм ужасов. Толстяку опять же ничто не угрожает.</p><p class="p1">Третий: друзья — мизантроп, подлец, халявщик.</p><p class="p1">Если вы толстяк — социальная драма.</p><p class="p1">Если вы очкарик — фильм-катастрофа.</p><p class="empty-line"/><p class="p1">Четвертый вариант, редкий: друзья — толстяк, очкарик и неудачник, а вы — крутой чувак. Это просто очень плохое кино.</p><p class="empty-line"/><p class="p1">Пятый: друзья — подлец, умник, добряк.</p><p class="p1">Вы крутой чувак — историческое кино. Остерегайтесь подлеца, от них вся история вечно наперекосяк.</p><p class="p1">Вы мизантроп — социальная фантастика.</p><p class="p1">Вы подлец — историческая биография.</p><p class="empty-line"/><p class="p1">Когда вы пройдете «Квартал» и получите деньги, вы должны будете снять это кино, хотя бы на айфон. Иначе потеряете все, что получили.</p></span><span id="id77"><div class="title2">
<p class="p">27 сентября</p>
</div><p class="p1">А знаете что, сегодня, пожалуй, можно сказать правду.</p><p class="p1">Для этой цели идемте-ка в сквер. В лесную, парковую, лиственную часть Квартала.</p><p class="p1">Там будут сегодня жечь осенние листья. И мысленно — а может, в плеере, но лучше мысленно — можно послушать про себя, как Ив Монтан поет «Опавшие листья».</p><p class="p1">И нас жизни вихрь разлучает, и я стою аааааадин в тоске, и волна безжалостно стирает влюбленных следы на песке.</p><p class="p1">Монтан, между прочим, приезжал в СССР еще раз, году, кажется, в 89-м. Привозил какую-то картину. И был один вечер, когда он пел — насколько помню, в ВТО. 32 года прошли с его последних здесь гастролей. И когда он пел «Опавшие листья», вы себе, братцы, не представляете, что творилось в зале. Я там не был, где мне было туда попасть, но мне рассказывали. Там все, все рыдали, и сам он, вероятно, рыдал. Он был уже старик, сильно переменившийся. Конечно, и в молодости в его большом рте и несколько фальшивой жизнерадостности ощущалась способность не то чтобы к лицемерию, но к отступлению; и я думаю, что СССР его сильно раздражал, и, когда сейчас смотришь съемки тогдашних концертов, видно, как его коробят все эти пионерские выступления и рабочие, читающие самодеятельные стихи в честь Симоны Синьоре. Но рабочие трогательны, и лица в зале трогательны, хотя ужасны. Еще страшнее то, что за 32 года все примирились, они старые, он старый, жизнь непонятно куда делась, остались сплошные опавшие листья: одни опавшие листья слушают другой опавший лист. И волна безжалостно стирает влюбленных следы на песке. Парадокс заключается в том, что сами по себе опавшие листья не плачут, вообще не понимают, что происходит, и не совсем понятно, зачем это понимаем мы. Тут есть какая-то, мне кажется, немилосердность. И вот приходится выдумывать себе игры.</p><p class="p1">Ясно же в принципе, что «Квартал» — никакое не прохождение, что это мозаичная автобиография вымышленного лица, которое может о себе рассказать только таким путем, в виде «Восьми с половиной» — каждый рано или поздно делает такую картину или пытается написать книгу, но специфика эпохи в том, что сегодня можно заставить слушать себя, только посулив деньги. Кого иначе будет волновать чужая жизнь? Гиперсерьезное отношение к себе тоже кончилось, и вот упаковываешь свои мысли — не слишком ценные — и свои страхи в такую оболочку. Кто-то смеется, кто-то ведется, кто-то ведется и смеется — последнее, кстати, стало наиболее распространенной моделью здешнего поведения, ибо тут есть подстраховка на оба случая. Если деньги будут — ведь я же старался! Если нет — ведь я же смеялся!</p><p class="p1">Не знаю, будут деньги или нет, но смешно, конечно, верить в эти пугалки и манилки. Это такая форма рассказа о себе для человека, которого давно никто не слушает. А поскольку никто ни кого не слушает, она годится не только для маргинала, но для любого. Все, в сущности, только и делают, что пытаются купить себе слушателя. По-моему, прием не хуже прочих. А поскольку рассказывать о себе подряд невозможно — жизнь еще не кончилась, и единой точки зрения на нее у меня нет, — получается фасеточный, словно отражающийся в стрекозином глазе, дробный рассказ, обрамленный нехитрыми упражнениями, без которых никто это читать не будет.</p><p class="p1">И, стало быть, под Монтана можно подойти к костру, в котором жгут листья, и сжечь этот экземпляр «Квартала», элегически прощаясь с очередной иллюзией.</p><p class="p1">Подходим.</p><p class="p1">Жжем.</p><p class="p1">Жжем всё, что я вам про себя рассказал, всё, что было со мной и вами, и волна безжалостно стирает влюбленных следы на песке.</p><p class="p1">Прекрасный, прекрасный день, спасибо, до свиданья.</p></span><span id="id78"><div class="title2">
<p class="p">28 сентября</p>
</div><p class="p1">Ну вот, продолжаем.</p><p class="p1">Сожгли?</p><p class="p1">А я говорил, что надо покупать три экземпляра.</p><p class="p1">Никаких перерывов, никаких пауз, никаких выходных без особого предупреждения. Не всему надо верить, что я говорю. Сказано же — «Квартал» рассчитан на три месяца. Соскочить не удастся. Кто включился — проходит до конца, если не выпадает на развилке.</p><p class="p1">Сжечь надо было, потому что я так сказал. Это было упражнение на недоверие, на разочарование, на «все равно ничего не получится». Такие настроения надо периодически испытывать, чтобы тем прочнее была вера. Но ясно же, что «Квартал» продолжается и никаких послаблений не предвидится — напротив, начинается самое интересное.</p><p class="p1">Задание для группы «Б» — которые НАКАЗАНЫ.</p><p class="p1">Выходили вчера жечь книгу?</p><p class="p1">Песню слушали? Листьями любовались?</p><p class="p1">Ну и что же, что я сказал? Вам было сказано: до 30 сентября включительно сидите дома. С работой договаривайтесь как хотите. Деньги нужны не мне, а вам.</p><p class="p1">Теперь штраф. Час стоим носом в угол.</p><p class="p1">В угол, я сказал! Стоим и думаем о том, как мы наивны, как доверчивы. Как не умеем отличать правду от лжи. Как мы непослушны.</p><p class="p1">Подумайте, подумайте. Полезно.</p><p class="p1">Задание для остальных: покупаем семена любого растения — можно садового, можно огородного, можно вообще съесть мушмулу и ткнуть в горшок косточку — и высаживаем в горшок. Поливаем.</p><p class="p1">Запоминаем день, когда взойдет. Высчитываем, сколько дней прошло. Это ваш КВ — Коэффициент Всхожести.</p><p class="p1">Если поделить на эту цифру ваш Финансовый Индекс, можно точно узнать цикл вашей жизни, то есть через сколько дней повторяются принципиально важные события.</p><p class="p1">Если ничего не взойдет, значит, и цикла нет, и вообще у вас рука тяжелая. На деньгах это никак не скажется, а вот на ощущениях — да. Может так случиться, что и деньги не принесут вам счастья, так что лучше бы все взошло.</p><p class="p1">Хорошо всходят огурцы, редис, морковь. Неплохо — помидоры. Прекрасно — ипомея. К сожалению, она однолетняя. Но она цветет прекрасными крупными колокольчиками. Мы с матерью однажды купили в Евпатории — семь лет мне было — и высадили на даче; она весь дом заплела.</p><p class="p1">Отлично всходит так называемый бешеный огурец, из которого потом получается мочалка.</p><p class="p1">Можно попробовать зарыть желудь, их много сейчас валяется. Скоро зима, а у нас растет живое дерево. И смысл жизни, если угодно, именно в этом и заключается — чтобы вопреки внешним условиям в последовательно холодном мире выращивать вокруг себя что-то живое, протаивать собой пузырь жизни среди всего этого.</p><p class="p1">Смысл жизни в том, чтобы быть на стороне Бога и чтобы ему было интересно смотреть.</p><p class="p1">Марш за желудями.</p></span><span id="id79"><div class="title2">
<p class="p">29 сентября</p>
</div><p class="p1">Задание для обеих групп.</p><p class="p1">Сегодня вы должны поцеловать ребенка в живот.</p><p class="p1">Это не должен быть ваш ребенок. Своего-то в живот всякий поцелует.</p><p class="p1">Мы не звери и не требуем поцеловать в живот первого встречного мальчика. Мы все понимаем, что время такое — еще сочтут педофилом или мало ли что. Но обойтись без поцелуя никак невозможно, и мы сейчас объясним почему. Это одна из важнейших ступеней в прохождении «Квартала». Дело в том, что детский живот — важнейший энергетический центр, от него можно зарядиться колоссальной энергией. Ребенку от этого не будет ничего плохого, а вам — огромная подпитка. И вообще это очень приятно, без всяких греховных коннотаций, — просто взять и поцеловать ребенка в живот. Это, кроме того, смелый поступок, преодоление важного психологического барьера. Вы уже знаете, что одному человеку, проходившему в тот момент «Квартал», это очень помогло. Дело в том, что он как раз тогда проходил «Квартал» одним из первых. Это была едва ли не первая редакция «Квартала», тогда еще экспериментальная. И рассчитана она была на прохождение с 15 апреля по 15 июля. Тогда многое получилось, и этому человеку, как вы знаете, потом сильно повезло. Там и крупная сумма денег, и много еще чего было хорошего. Правда, с поцелуем получилось не очень ловко, но все-таки он осуществил задуманное. Многие гадали, почему именно тогда он это сделал, и даже задали ему про это вопрос на сетевой пресс-конференции. Он ответил, что просто ему понравился мальчик. На самом деле, как вы понимаете, это все вышло не совсем спонтанно — он долго искал возможность, несмотря на плотный график, в этот день поцеловать мальчика в живот, но получилось сделать это только при прогулке через Кремль. Никто не ждал, никого не предупреждали. Больше негде было взять мальчика. Если бы он входил в группу «Б», ему бы мальчика принесли на дом, там все это предусмотрено, он бы работал с документами, не выезжал никуда, — для группы «Б» возможен надомный вариант. Привезли бы кого-нибудь из «Наших», и он бы поцеловал, делов-то. Потом бы рот прополоскал. Но поскольку он входил в группу «А», надо было самому, на улице. И он выбрал такой вариант. Так что зря все тогда недоумевали: это было строго в рамках прохождения, и у вас так же будет.</p><p class="p1">Если вы входите в группу «Б», у вас вообще нет проблем. Звоните любому другу, подруге, приглашаете в гости ученика, если вы учитель, — найдете вариант. Чем меньше ребенок, тем лучше: и у него никаких травм, и вам проще. И энергетика у него выше. Кроме того, в квартире ребенку некуда деваться, он не может убежать, и вообще можно затеять подвижную игру вроде пряток. Обнаруживаете ребенка за шкафом — кто это у нас такой прячется тут усипусечный?! — и цап его за живот! Гораздо труднее сделать это на улице. Взрослый дядя, играющий с детьми в прятки, — это тревожно. Это можно сразу звонить, и говорят, за такой звонок еще бывает вознаграждение. Так что я даже не знаю, как вы будете выкручиваться. Но, судя по тому, как обстоят дела у того самого, игра стоит свеч.</p><p class="p1">Напоминаю: сквозь одежду нельзя. Сквозь одежду ребенок энергетикой не делится. Надо именно слегка, так сказать, обнажить пуп и поцеловать. При этом можно про себя повторять ОМ МАНИ ПАДМЕ ХУМ — что в переводе с санскрита означает, как известно, ВОТ ЦЕЛУЮ РЕБЕНКА ПУП.</p><p class="p1">Вообще, если знать про «Квартал» и внимательно изучить его, очень многое в поведении звезд, первых лиц и крупных теневых деятелей станет не так таинственно. Джонни Депп, внезапно ударивший по лицу ни в чем не повинного папарацци. Роман Абрамович, покупающий аспирин в провинциальной аптеке. Городской сумасшедший, пьяница, задумчиво стоящий на углу около старых качелей; вам кажется, что это тихий местный алкоголик, а это подпольный глава всех олигархов Москвы, держатель общака, личный консультант Минфина; они именно так и выглядят, а вы как же думали? И именно «Квартал» сделал их тем, что они есть.</p><p class="p1">И вы войдете в их число, осталось совсем немного — и вас, и вам, и им.</p><p class="p1">А Лужков не поцеловал, забоялся, и видите, как получилось.</p><p class="p1">А Берлускони поцеловал, но не выбросил старую вещь, и деньги есть, но осадок остался.</p><p class="p1">А Майкл Джексон поцеловал, но не смог заняться сексом (в другой раз). Очень берег себя и вообще не любил это дело. И видите, как вышло нехорошо.</p><p class="p1">А Безруков поцеловал, но не ребенка. А Василий Якеменко — ребенка, но не поцеловал. И две блестящие карьеры пошли под откос.</p><p class="p1">Алла Пугачева поцеловала, и все прекрасно. Вышла замуж потом за этого ребенка.</p></span></span>
