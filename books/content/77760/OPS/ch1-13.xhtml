<span><span id="id34"><div class="title2">
<p class="p">15 августа</p>
</div><p class="p1">1.</p><p class="p1">Вы помните, что первым делом отвозите ему/ей торт/розу?</p><p class="p1">Очень возможно, что с этого визита начнутся серьезные отношения.</p><p class="p1">Вот мы и создали еще одно событие на ровном месте, что может быть дороже для нас с вами, так мало уверенных в собственном существовании.</p><p class="p1">Про вчерашнее наврите что хотите, умение врать присуще артистическим натурам, а только у них и бывают деньги.</p><p class="p1">2.</p><p class="p1">Сегодня ночью мы должны увидеть во сне город.</p><p class="p1">Необязательно именно сегодня — возможен люфт плюс-минус три дня. Не больше. Если вы не видите во сне города, значит, вы что-то делаете не так. В этом случае необходим будет контрольный эксперимент. Он будет проведен 19 августа, если город вам до этого так и не приснится.</p><p class="p1">Кому снится — тот все делает правильно.</p><p class="p1">Это может быть любой, абсолютно любой город, который — поясняю вам сразу, потому что шарлатанством не занимаюсь, — и есть ваше внутреннее пространство, то Я, в котором все происходит. Это может быть, например, древнеегипетский город, хотя вы и в новом Египте никогда не бывали. А может — современный французский город, портовый, с небывалым его сочетанием гнили и свежести, всякой приморской дряни, растительной, мидиевой и человеческой, — и хрустальных утр, из чего и получается, скажем, весь Мопассан. А в моем случае это был среднерусский купеческий город с множеством приземистых церквей, тот, где я конкретно никогда не бывал, но откуда, в сущности, никуда не уезжал. В моей жизни сроду этого не было — чтобы ходить в такую церковь, проходить мимо заросшего кладбища с могилами неизвестного мне купечества, старообрядческого, может быть, и все равно такого же приземистого, непонятного, страшно от меня далекого. О чем с таким человеком можно говорить — я и на том свете не пойму, когда, казалось бы, с нас слетит все лишнее. И никогда я не назначал свиданий в этом городе, не ходил по местному парку, где играет духовой оркестр. Но почему-то именно он мне снится тогда, когда положено сниться городу. Вижу я его в сплошных сине-зеленых тонах, с ощущением страшной духоты и тесноты, хотя сплю сейчас, как вы понимаете, один, и может быть, духоту-тесноту создает именно это одиночество, а вместе нам никогда не было тесно, но сейчас получается вот так. Теснота эта происходит — так я догадываюсь во сне — оттого, что все страшно заросло, и в самом деле заросло, в моем мозгу такое нагромождение лишнего, лишь бы не замечать главного. Страшно разрослись всякие деревья на кладбищах и в парках, сплошные мокрые кусты и долговолосые ивы, и это прекрасно — я так люблю мокрую зелень, особенно на берегу большой реки, я забыл сказать, что по городу протекает широкая темная река; но вот какая вещь — вся эта зелень, живая, конечно, и мокрая, но все-таки прикрывает главное. И я никуда не могу пройти, ничего толком не вижу. Не вижу, что под всей этой прекрасно разросшейся крапивой, под всем орешником, ольховником, еще черт-те чем — городское кладбище с купцами, с людьми, которые тут жили и бессмысленно исчезли, и я не могу примириться ни с таким их существованием, ни с таким исчезновением. Мне так тесно от этой прекрасной зелени, что я не могу никуда пойти, ни о чем толком подумать. И все люди, которые смотрят на меня, подозрительны и словно приплюснуты. Что говорить, среди таких людей я и прожил всю жизнь, и вы тоже. Все мы друг другу приплюснутые люди, а кто это с нами сделал, пока непонятно.</p><p class="p1">Само собой, вы не просто видите город. Вы как-то действуете в нем, куда-то ходите. Забудьте про все толкования сновидений, которые читали, — их пишут люди, которые давно никаких снов не видят, забыли уже вообще, как это делается. К тому же вы находитесь в пространстве Квартала, здесь действуют совсем другие правила. Вы ходите по городу и видите, естественно, определенные места. Так вот, учтите — они значат совсем не то, что в стандартных толкованиях. Мы вам сейчас объясним, что это за локации.</p><p class="empty-line"/><p class="p1">• Если вы попадаете на кладбище, в церковь, в культовые сооружения вообще (в Египте это могут быть пирамиды) — вы ищете связи, пытаетесь вписать свое существование в контекст, неважно, вертикальный или горизонтальный — исторический, условно говоря, или повседневный. То есть вам непонятно, зачем вы здесь и надо ли вам дальше терпеть такое положение вещей. Это хорошо, это значит, что вы все же думаете о чем-то.</p><p class="p1">• Если вы попадаете в больницу, заброшенную, как часто бывает в квестах, — это вы чувствуете, что перед кем-то сильно виноваты. Больница сама по себе страшна, а заброшенная — вдвойне. Больница переполнена призраками страданий, страхов, загробных видений, а чаще всего — и тех, кто здесь умер, потому что умирать в больнице — хуже нет. Я, например, сделаю все, чтобы умирать не в больнице. Замечали ли вы, как ужасно читать чужие истории болезни, особенно давние, герои которых давно умерли? Мне досталось однажды читать историю болезни давно умершего сумасшедшего старика, этой историей размахивали сумасшедшие, полагавшие, что их облучает КГБ. Они являлись в редакцию — большинство в шапочках из фольги — и рассказывали историю какого-то Акиндеева Николая Семеновича, который всю жизнь тихо проработал на московском заводе, а на пенсии сошел с ума. Ему делать было нечего, он все время смотрел «Очевидное-невероятное» и решил, что его облучает КГБ, приводил множество доказательств, как-то там вода у него плясала по-особому в стакане, но никто его не слушал. И он тогда, не в силах выносить это, ушел из дома вместе с женой, ночевал на вокзалах, попал в больницу, и вот его историю болезни — у него обнаружили рак желудка — принесли мне эти безумные люди. Там были подробные данные всех его анализов, и, разумеется, болезнь у него развилась именно потому, что его облучали, а он догадался; невыносимо было читать эти данные. Потому что про то, что от человека здесь остается — слова, мысли, хотя бы и паранойидальный бред, — мы хоть что-то знаем, это в сфере человеческой компетенции. А вот куда делись теперь все эти клетки, вся кровь, вся физиология — мы понятия не имеем, у них свои темные приключения, чисто химического свойства, недоступные человеческому пониманию. Вот почему больница сама по себе куда более ужасное место, чем камера пыток, потому что в камере пыток по крайней мере понятно, зачем пытают; а когда она еще и заброшена — тем самым все эти безмерно здесь страдавшие люди, глупые сами по себе, но еще оглупевшие от болезни, от полной на ней сосредоточенности, вторично обречены на забвение, то есть их страдания были совсем-совсем напрасны. Мало того что они здесь мучились или их здесь мучили, но теперь это все еще и заброшено, и на их крови, грубо говоря, растет репей. Вот так и вы что-то ужасное с кем-то сделали, но забыли. Вам надо там что-то найти.</p><p class="p1">• Если вы попадаете на футбол — почему-то особенно часто футбол — или на любое другое спортивное состязание, это значит, что вы пытаетесь выяснить важный для себя вопрос, но никаких рациональных аргументов нет, и теперь все решается просто — кто победит. Вы же знаете, за кого болеете, знаете это с того самого момента, как попали на стадион, — но ничего не можете сделать для того, чтобы победили ваши. Это не вами определяется.</p><p class="empty-line"/><p class="p1">Вообще хочу вам сказать, что этот город — все-таки не совсем Я. Это слишком было бы просто. Этот город — ваша модель страны, то место проживания, которое существует в вашем сознании. Образ внешнего мира, если хотите. Вот только сейчас, месяц спустя после начала наших упражнений, мы до него добрались. И нам очень важно понять, что именно нам здесь покажут. Как выглядит то главное, ради которого мы сюда пришли. Сразу хочу предупредить — никаких наведенных сновидений, галлюцинаций, никакой тульпы. Не следует внушать себе, что вы увидите город. Следует просто его увидеть и некоторое время по нему ходить, а потом к вам подойдет человек и предложит пройти куда-то, где вас ждут. Обязательно надо туда пойти. Если вам когда-либо снился город, вы должны знать, что это нормальное развитие сюжета о нем. Никогда так не бывает, что вы просто ходите. Всегда куда-то ведут или предлагают отправиться. Надо соглашаться. Тот человек, что предложит вам пойти с ним, почти наверняка будет выглядеть как сумасшедший или по крайней мере не совсем нормальный. Тут тоже нет ничего необычного. Путешествие по городу с безумным гидом — одно из самых архетипических сновидений, частый сюжет, никем пока не исследованный, хотя путешествие с сумасшедшим/странным спутником — любимый сюжет при описании снов в литературе. У Тургенева, у Трифонова, много где еще. Затрудняюсь сказать, с чем это связано. Могу предположить, что это навязчивый страх попасть в зависимость от непредсказуемого спутника, особенно в ситуации, где вы сами ничего не понимаете. И в городе к вам явится скорее всего человек, не внушающий особенного доверия. Но вы доверьтесь ему, потому что больше вы в этом городе никому не нужны. Нормальный гражданин просто не обратил бы на вас внимания. А этот хочет вам что-то сказать.</p><p class="p1">Отправляйтесь с ним туда, куда он вас поведет. Смотрите по сторонам очень внимательно. Он откроет вам в этом месте — оно строго индивидуально — первопричину такой вашей жизни, главный символ всей биографии, но не бойтесь это увидеть. Это крайне важно. Вам никто другой этого не расскажет. Он приведет вас куда-то и вручит предмет. Этот предмет вы немедленно должны приобрести или изготовить в реальности, потому что он и есть главный талисман вашей личности, ее, так сказать, вещественный пароль. Вполне вероятно, что это будет страшный сон. Что вам вручат нечто пугающее или вызывающее у вас крайне неприятные ассоциации. Неважно. Просто эта вещь — разгадка вашей личности, или, верней, объяснение того, почему она занимает в мире именно такое место. Если никто не приходит и ничего не дает — значит, вы слишком хорошо замаскировались. Попробуйте выйти на площадь и обратить на себя чье-то внимание. Это необязательно произойдет в первую ночь — город вам теперь приснится неоднократно.</p><p class="empty-line"/><p class="p1">• Если вам вручен предмет обихода — расческа, зеркальце, ключ, — постарайтесь обзавестись в реальности точно таким же. Ключ обозначает сложности с контактами, зеркальце — страх перед собой, расческа — страсть к разделениям, классификациям, расчесываниям мира на пробор. Часто почему-то бывают молоток, гвозди, другие инструменты. Это означает неупорядоченность вашего мира, неприколоченность многих вещей, неприложенность рук.</p><p class="p1">• Если вам вручено произведение искусства — книга, картина, статуэтка, — все гораздо интереснее. Это намек на ваше истинное признание, а какой намек — расшифруйте сами.</p><p class="p1">• Если вам предложена болезнь — поцелуй больной девушки, секс с проституткой, перспектива простудиться в снегах, — это значит, что больше всего вы избегаете заразиться чужим состоянием, не слышите другого, отсюда все ваши проблемы; можете согласиться, можете бежать, правильного ответа нет. Все в вашей воле и зависит от того, хотите ли вы измениться.</p><p class="p1">• Если вам предложат денег, не берите. Это они откупаются. Настоящие деньги впереди.</p><p class="empty-line"/><p class="p1">Что до меня, все опять предсказуемо, но понимаешь это, как всегда, задним числом. Я попал в русский приземистый купеческий город с полуразрушенной церковью, с кладбищем, заросшим бузиной и крапивой, с огромным и запущенным городским садом. В этот сад, полный пятен рассеянного зеленого солнца, привел меня невысокий бородатый человек — то ли поп-расстрига, то ли кто-то из местной интеллигенции, они неотличимы. Он хотел мне что-то передать в саду, где никто нас не увидит, но я так испугался той правды о себе, которую мне скажет этот человек и переданный им предмет, что вырвался от него, держащего меня за рукав со смесью настырности и подобострастия, и побежал по узким купеческим улицам, а когда обернулся, никакого сада уже не было, была пыльная городская площадь, по которой ходил трамвай.</p><p class="p1">Что он должен был мне сказать? Просыпаясь, я еще понимал, что, получив этот предмет, я был бы обречен навсегда остаться в городе, а этого мне ужасно не хотелось. Но именно после моего бегства город утратил сад — самое ценное и прекрасное, что в нем было.</p><p class="p1">Ну и пусть. Не хочу.</p><p class="p1">ПРЕДУПРЕЖДЕНИЕ. Если вы решите остаться в городе после того, как вам это предложат, — вернуться в прежнюю жизнь будет уже нельзя, вы проснетесь другим, с другими предпочтениями, влюбленностями, даже воспоминаниями. Держите эту мысль в голове. Подумайте, хотите ли вы этого. Помните, что сны во второй половине августа, да еще и во время прохождения «Квартала», имеют власть над будущим, а нужно ли вам будущее — вы еще не решили.</p><p class="p1">Пора решать.</p></span></span>
