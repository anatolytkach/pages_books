<span><span id="id20"><div class="title2">
<p class="p">1 августа</p>
</div><p class="p1">Сегодня мы должны выучить наизусть стихотворение. Это несложно, но совершенно необходимо. Деньги бывают только у человека с хорошей памятью.</p><p class="p1">Стихотворение берем короткое, прямо относящееся к наступившему месяцу.</p><div class="poem">
<div class="stanza">
<p class="v">Сиятельный август, тончайший наркоз.</p>
<p class="v">В саду изваянье</p>
<p class="v">Грустит, но сверкает. Ни жалоб, ни слез —</p>
<p class="v">Сплошное сиянье.</p>
</div>
<div class="stanza">
<p class="v">Во всем уже гибель, распад языка,</p>
<p class="v">Рванина, лавина —</p>
<p class="v">Но белые в синем плывут облака</p>
<p class="v">И смотрят невинно.</p>
</div>
<div class="stanza">
<p class="v">Сквозь них августовское солнце палит,</p>
<p class="v">Хотя догорает.</p>
<p class="v">Вот так и душа у меня не болит —</p>
<p class="v">Она умирает.</p>
</div>
</div><p class="p1">Есть много способов выучить стихотворение. Самый известный — спеть его. Берем гитару, поем на мотив «Последнего троллейбуса». Окуджава подобрал прекрасную музыку почти ко всем русским метрическим схемам. Сиятельный а-а-август, тончайший наркоз… Поем три раза. Потом читаем в слух.</p><p class="p1">Второй способ, открытый Станиславским, заключается в том, чтобы положить текст на каркас физических действий. Читаем первую строчку — берем яблоко, читаем вторую — чешем в затылке, на третьей подходим к окну и так далее. Можно брать не только яблоко, а грушу, сливу — и все это разложить перед собой. В результате, беря яблоко, вы всегда будете вспоминать: «Сиятельный август, тончайший наркоз…»</p><p class="p1">Еще можно с ребенком его выучить. Если у вас есть ребенок, заставьте его выучить стихотворение, и в процессе вы его выучите, а ребенок нет. И правильно. Зачем ребенку деньги?</p><p class="p1">Можно не учить стихотворение, если не нравится. Пожалуйста, никто не неволит. Но тогда надо постараться самим. Это главный закон жизни: не нравится — сделай по-своему. Попробуйте сами написать стихотворение, лучше, чем это. Прямо здесь.</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">Тема — наступление августа. Август — с одной стороны, время зрелости, а с другой — увядания, грусти, подведение итогов, пока вы еще в состоянии их подвести. В сентябре уже не до того, уже надо выживать. Мы вступаем в решающий период «Квартала», наиболее веселый, полный, щедрый. Стихотворение пусть тоже будет короткое, зачем длинное? Размер произвольный.</p><p class="empty-line"/><p class="p1">КРАТКИЙ СЛОВАРЬ РИФМ</p><p class="p1">Август, нравлюсь, явность, плавность, плавлюсь, Амхерст, агнец.</p><p class="p1">Лето, смета, спета, Лета, поэта, фета (сыр), бета (буква), тета (и йота), гетто (куда мы все попадем после августа, например).</p><p class="p1">Прощай, не скучай, рай, край (в смысле конец), край (в смысле Красноярский), край (в смысле филейный).</p><p class="p1">Никогда, вода (стала холоднее), еда (стала дороже), труда (скоро опять будет много, а мы еще толком не отдохнули), года (не убавляются), звезда (падает), еще есть несколько интересных рифм, связанных одновременно с темой любви и увядания.</p><p class="p1">Конец, юнец, отец, овец (убивают и жарят), плавунец (плавает у поверхности все более холодной воды), молодец (не обращает внимания на приметы увядания и смотрит в будущее с восторгом), еще есть несколько интересных рифм (например, то, что все равно случится с молодцом).</p><p class="p1">Сад, оград, рад, стад (тучных шествие по сочной траве), виноград (поспевает), зад (накрывает).</p><p class="p1">Сентябрь, хотя б (еще бы чуть-чуть), нехотябрь, макабрь (повелительная форма, макабрь меня еще), Октябрь (великий, красный), ноябрь, декабрь.</p></span><span id="id21"><div class="title2">
<p class="p">2 августа</p>
</div><p class="p1">Сегодняшнее занятие — не столько географическое, сколько развивающее воображение. Без воображения в наше время никуда. Рассчитывать на деньги без него вообще не стоит. Для начала нам потребуется большая Географическая карта мира — лучше политическая. Можно сетевую, можно реальную. Лучше всего на сегодняшний день повесить ее на стену. На этой карте нам нужно найти вашу точку. Делается это так.</p><p class="p1">1. Широта. С помощью калькулятора умножьте ваш год рождения на личный Финансовый Индекс. Возведите результат в квадрат. Разделите на текущий год. Например, 1967 умножим на 133, возводим в квадрат, делим на 2013 и получаем многозначное число с длинной дробью. От него нам нужны только первые четыре цифры. Это 3399, то есть 33 градуса 99 минут. Но 99 минут не бывает, скажете вы и будете правы. Значит, это 34 градуса 39 минут. Осталось понять, северная это широта или южная. Смотрим, какой сегодня ветер. Если он северный (или северо-какой-то), широта, значит, северная. Но иногда никакого ветра не бывает, штиль, а иногда он чисто западный или восточный. Тогда бросаем монету. Орел — южная, решка — северная.</p><p class="p1">2. Долгота. С помощью калькулятора умножаем сегодняшнее число (2 августа, то есть 2) на свой возраст. Умножаем на личный Финансовый Индекс, делим на 8 (порядковый номер месяца). Если 2 умножить на мой возраст (желающие могут вычислить его), потом на 133, а потом поделить на 8, то получим 1496,25. Четвертинка нас не интересует, а интересуют получившиеся 15 градусов 36 минут. Но мы еще не знаем, западная это долгота или восточная. Смотрим на ветер. Если он отчасти восточный или западный, все просто. Если штиль, бросаем монету. Орел — западная, решка — восточная.</p><p class="p1">Вот у нас и получилась наша точка. Это 34 градуса 39 минут северной широты и 15 градусов 36 минут западной долготы. Если помните, западная долгота и южная широта записываются со знаком минус, это вам на всякий случай, многие забыли.</p><p class="p1">Велик шанс, что вы попадете в воду, потому что воды на земле больше. Примерно 70 % на 30. Тогда отыскивайте ближайшую сушу. Впрочем, не исключаю, что вы человек с сильным воображением и можете представить себя на корабле, пересекающем ровно этот кусок океана. Тогда придумайте, какой это корабль: яхта одинокого бородатого путешественника Федора Конюхова, этого байкера морей, или пиратское судно, или роскошный лайнер типа Queen Mary, устремляющийся из Штатов в Англию или обратно. Тут вы совершенно свободны, но я предпочитаю сушу. И с моим результатом ближайшая суша — это остров Мадейра, ближе ничего нет. Будем считать, что я туда доплыл. Остров Мадейра известен самым большим в мире фейерверком, мадерой и оптимальной температурой, которая колеблется от 16 до 25 градусов Цельсия и никогда не бывает ниже или выше. То есть температурный режим вечного августа, что и требовалось доказать.</p><p class="p1">А дальше мы проживаем день так, как провели бы его в найденной географической точке. Весь день представляем себе, что мы там. И если у нас хватает воображения, то пишем (сочиняем) рассказ об этом дне своего там пребывания, и весь Квартал на этот день у нас расположен на острове Мадейра, или на лайнере типа Queen Mary, или в Нью-Йорке, если вам так повезло с Финансовым Индексом и датой рождения.</p><p class="p1">Вот я, значит, на Мадейре. Предпочтительно выбирать наши дни, потому что вряд ли вы настолько знаете историю, чтобы по-настоящему убедительно в нее погрузиться. Остров Мадейра расположен в 1000 километров от Европы и в 520 от Африки. Его длина — 57 километров, а ширина — 22. На нем имеются дикие тропические леса, хотя и в незначительном количестве. Удивительно, как точен этот Финансовый Индекс. Мне всегда хотелось жить именно на таком острове, именно с таким количеством гор, с ущельями, лесами и ровно такой температурой. Открыли его между 1418 и 1420 годами. В принципе этот остров — вершина гигантского вулкана шестикилометровой высоты. На острове живут мадейрский тайфунчик, мадейрский голубь и мадейрский королек. Все трое находятся в прекрасных отношениях. Это виды птиц, которые вообще бывают только здесь, больше их нельзя увидеть нигде и никогда. Еще тут очень много новооткрытых эпифитов. Эпифиты, если кто не знает (я до сегодняшнего дня тоже не знал), это такие растения, которые живут на других, но не паразитируют на них. Они используют их только в качестве физической опоры, пишут источники. Симбиоза между ними нет, а только соседство. Эпифиты чаще всего очень красиво цветут, потому что размещаются близко к свету, высоко на чужом стволе. Иногда они пускают длинные корни и достигают почвы, тогда они называются полуэпифитами. Я по образу действий точно такой полуэпифит, укоренившийся постепенно и неохотно. И думаю даже, что я еще не вполне укоренился. И пока я не врос корнями в эту малоприятную, негостеприимную почву, не податься ли мне, я думаю, на Мадейру, где меня ждет ровно то же самое?</p><p class="p1">Я почему-то в этом уверен. Что бы я ни делал в тамошнем раю, я превращу его в персональный ад. Если сочинять рассказ о моем дне на Мадейре, это будет, вероятно, рассказ о том, как среди островного рая на уснувшем вулкане меня настигает все то же самое или вулкан начинает извергаться. И как только я там высажусь, я там увижу тебя, это уж как пить дать, и обязательно не со мной, даже и сомневаться не приходится. И я догадываюсь, с кем. Всюду вы успеваете до меня, чтобы все испортить. Сначала, разумеется, я не пожалел бы красок на остров Мадейра, где летает полупрозрачная лимонная мадейрская капустница, страшно редкая, нигде больше не летающая. Ну и всякие там краски, и несколько особо крупных эпифитов. А потом я начал бы нагнетать, нагнетать. Обнаруживать все больше примет своей прежней жизни. В чаще леса меня окликнул бы школьной кличкой мой любимый враг, обернувшийся райской птичкой. Возможно, я даже сделал бы это в стихах. Потом бы я обнаружил, что небо становится подозрительно похожим на то, под которым ты мне это все наговорила, и перешагнуть через это я уже не смог. Потом бы в толпе знакомый профиль — о, я знаю этого человека, как же без него, он тоже здесь. (А бабочки продолжают порхать, зеркальные цветы разворачиваются с ломким треском, гигантский дружелюбный паук ткет салфетки для местного ресторатора.) Что я этим хочу сказать? Что каждый носит свой ад с собой? Нет, я хочу сказать не это. Я, видимо, имею в виду — никак не сформулировать, но сейчас, — что этот остров и есть высшая точка моей жизни, а раз так, там и должны собираться все предыдущие значимые точки. И почему-то оказывается, что все они состояли в разрывах, противостояниях, даже в драках. В остальное время я интереса не представлял. Нет, это мне тоже не нравится. Скажем иначе: я всю жизнь чувствовал, что за мной наблюдают, и наблюдают недоброжелательно. И вот пиком этого наблюдения оказалось то, что все они там собрались. Знали, что я приеду, выследили и собрались, чтобы дать мне последний бой.</p><p class="p1">Да, вот так мне нравится больше всего. И финал был бы открытый — я приближаюсь к смотровой площадке на вершине вулкана, где они все меня ждут. Похоже на ужасный, но в то же время прекрасный сон. Что еще может ждать меня на острове Мадейра, если не то, что я всю жизнь откладывал, — окончательное выяснение отношений? А на это уже можно нанизывать эпифитов, капустниц, мадейрского королька, редчайшие почтовые марки, книгу о способах летания без крыльев, завалявшуюся в лавке букиниста в городе Фуншал, но поскольку никто давно не читает на забытом языке, способы летания без крыльев остаются неведомыми, известно только, что их четыре.</p><p class="p1">Для антуража: фирменные блюда мадейрской кухни. Самый популярный местный суп — асорда, из лука, чеснока, яиц и черного хлеба. Должно быть, это прекрасно. Еще такая есть трава — чорба, она тоже туда добавляется. Местные жители также очень ценят сардины, жаренные на углях с картошкой. Еще там есть анона — фрукт, нигде больше не растущий: зеленая шишка со вкусом заварного крема. Все это будет, так сказать, мое прощальное угощение.</p><p class="p1">Господи, с чего бы мне в голову лезла именно такая мысль? Но она лезет, и ничего другого я не могу представить: герой едет на остров Мадейра только для того, чтобы все, от чего он всю жизнь бегал, именно там его и настигло. Есть горькая насмешка в том, что это именно Мадейра, полная зеленых шишек с заварным кремом, — а не, допустим, Якутск.</p><p class="p1">В жизни я сделал нечто подобное — черт-те что устроил из сказочного острова, ну и сюжет соответствующий.</p><p class="p1">Название, вероятно, «Эпифит».</p></span><span id="id22"><div class="title2">
<p class="p">3 августа</p>
</div><p class="p1">А сегодня нам понадобится Карта звездного неба. Того полушария, в котором вы находитесь.</p><p class="p1">Наложите на нее карту того полушария, в котором находится ваша точка, обнаруженная вчера. Карта неба над вашим полушарием круглая. Вот и накладываем на нее карту земного полушария с вашей точкой. Это можно сделать, вырезав два бумажных круга и проколов их в нужном месте циркулем, а еще проще совместить на компьютере. Не мне вас учить, даже если вы дитя.</p><p class="p1">Нашли?</p><p class="p1">Это ваша точка в звездном небе.</p><p class="p1">Узнайте, к какому созвездию она принадлежит. Если ни к какому, берите ближайшее.</p><p class="p1">У меня все просто. Ровно на том месте, где на карте Восточного полушария расположен остров Мадейра, сияет звезда под номером HR 991.</p><p class="p1">Забиваем номер нашей звезды в любой астрономический атлас и узнаем все о себе. Только делаем это в хорошей поисковой системе. Плохая — не будем называть имен — ничего не знает.</p><p class="p1">Что же мы узнаем?</p><p class="p1">А узнаем мы о себе, что мы оранжевый гигант из созвездия Персея, удаленный от Солнца на расстояние 1167 световых лет. Другие наши обозначения — HIP 15416 и HD 24168. Что это значит, я не понимаю, но нам и знать не надо.</p><p class="p1">В общем, все очень точно. Персей — любимый мой герой в древнегреческой мифологии, я счастлив входить в его созвездие, особенно мне нравится сюжет со спасением Андромеды, хотя с Медузой горгоной тоже красиво. А главное, я получил теперь столь необходимые мне цифры, обозначающие меня и нужные мне для эксперимента. Это 991, 15416 и 24168.</p><p class="p1">Все мы помним, зачем нужен звездный каталог: в каталоге 10 миллионов номеров небесных телефонов, А 17 40 25, я не знаю, где тебя искать. Дальше идет очень хорошо, божественно, что, в общем, не такая уж редкость у этого автора, явно не перворазрядного поэта, но вот поди ж ты:</p><div class="poem">
<div class="stanza">
<p class="v">Запоет мембрана телефона:</p>
<p class="v">Отвечает альфа Ариона,</p>
<p class="v">Я в дороге, я теперь звезда,</p>
<p class="v">Я тебя забыла навсегда,</p>
<p class="v">Я звезда — денницына сестрица,</p>
<p class="v">Я тебе не захочу присниться,</p>
<p class="v">До тебя мне дела больше нет,</p>
<p class="v">Позвони мне через триста лет.</p>
</div>
</div><p class="p1">Но вместо телефона, в котором теперь множество цифр и совсем другие коды, у нас есть теперь Интернет. Поэтому суммируем все три цифры, получаем 40575 и набираем это число в любом поисковике.</p><p class="p1">Что же нам выдают?</p><p class="p1">Это номер подвесной раковины Duravit в интернет-магазине.</p><p class="p1">Спортивного глушителя для выхлопной трубы.</p><p class="p1">В другом интернет-магазине под тем же номером предлагают ножовку с пятью лезвиями.</p><p class="p1">Что-то неинтересно.</p><p class="p1">Видеоролик под таким номером демонстрирует смешную азиатку с круглыми сиськами и такой же попой, твердой с виду. Она все это полуобнажает, потом намыливает, потом опять в полуобнаженном виде едет на велотренажере. Все это интересно, но как это понять? И что с ней делать?</p><p class="p1">Под тем же номером предлагают тунику с шипами, явно не мой вариант.</p><p class="p1">Развивающая игрушка под этим номером — говорящая таблица умножения.</p><p class="p1">Ищу, ищу, не прерываю труда.</p><p class="p1">По объявлению за номером 40575 можно купить за всего-то 494 тысяч долларов прелестный домик в американском городе Темекула, ударение на втором слоге, — Калифорния, равноудаленность от Лос-Анджелеса и Сан-Диего, виноградники, местность входит в воспетую Линчем Inland Empire, дом построен в 1979 году и находится в отличном состоянии.</p><p class="p1">ZIP, то есть почтовый индекс по-американски, города Лексингтон в Штате Кентукки.</p><p class="p1">И, наконец, то, что, кажется, мне сегодня подходит.</p><p class="p1">Я испытываю лютое нежелание выполнять одну и ту же вещь в рамках моей повседневной ненавистной работы. Я, собственно, и поисками этими занимаюсь главным образом потому, что не могу себя заставить делать эту вещь.</p><p class="p1">И тут я узнаю, что 40575 — это лак для ногтей под названием конкретно coffee break, а на одном из сайтов, не будем называть имен, статья под таким номером учит меня, how to delete job. Дословно так: You can right-click a job and select the Delete job option from the menu to delete the job.</p><p class="p1">Именно эту опцию я и выбираю. Я не буду сегодня делать эту работу. Я уничтожаю ее.</p><p class="p1">Моя звезда меня не подвела.</p><p class="p1">Разумеется, вам ваша звезда даст другой совет. И если она вам посоветует купить домик в Темекуле, торопитесь. За год он подорожал на 50 тысяч долларов.</p></span><span id="id23"><div class="title2">
<p class="p">4 августа</p>
</div><p class="p1">Сегодня у нас очень важное и сложное задание. Для его выполнения вам понадобится книга «Квартал». Что же надо делать? Надо молчать. Желательно весь день. Если вы работаете каким-нибудь телефонным диспетчером, диджеем или продавцом-консультантом, возьмите выходной, отгул, больничный — все что угодно. Помните, что на кону огромные деньги. Кстати, если вы продавец-консультант, выходной можете не брать. Почему-то мне кажется, что многие клиенты будут счастливы получить совет от того, кто не трещит без умолку, ничего толком при этом не сообщая.</p><p class="p1">Мы вообще все очень много говорим, а полезной информации от нас исходит ноль или около того. Есть вообще такие, которые не могут в двух словах объяснить суть — лопочут, лопочут, лопочут… Анекдот такой был — и щебечет, и щебечет, и щебечет, и ЩЕБЕЧЕТ! Позвонишь такому человеку по мобильному в другой город, а он тебе начинает рассказывать, что его сейчас плохо слышно, потому что он идет по улице из магазина, в одной руке сумка, а там он себе купил курочку, потому что курочки захотелось чего-то, и пива взял, но раз уж ты по межгороду, то говори, потому что межгород — это же ужасно дорого, и у тебя деньги капают, и у него тоже, у него вообще почему-то деньги с телефона утекают рекой в последнее время, вот вчера положил 300 рублей, а уже осталось 120, вот только что проверил, а звонил-то всего ничего, надо в офис к ним заехать, может, там услуга какая платная подключена, так надо отключить, потому что у него так уже было — деньги кончались, а оказалось, что там прогноз погоды ему за деньги шлют, а он его даже не читает, ну так что ты хотел-то, а то сумку нести тяжело в одной руке и дождь идет, вообще погода говно, а у вас как, ничего вроде, ему же прогноз погоды шлют, он так-то не читает, но у вас вообще всегда теплее немножко, ну давай, рассказывай, чего хотел.</p><p class="p1">А ты уже ничего не хотел, кроме того, чтобы курочка оказалась у него в известном месте за компанию с прогнозом погоды и пивом. Сколько времени проходит в бессмысленных разговорах! А кому интересно-то, родной? Некоторые вообще не могут, чтобы не говорить. Они, если ничем не заняты, непременно кому-то звонят, а если звонить некому, идут в магазин и там выносят мозг продавцам и очереди. «А дайте вот той колбаски. Она как, ничего? Ну я немножко возьму, много-то денег нет. В тот раз брала другую, так она жирная очень. А эта жирная? Я с яйцом ее пожарю, и хорошо. У меня тетка еще покойная так жарила, так я приду из школы, сразу — тетя, мне колбаски пожарь! До сих пор люблю. Эта хорошая колбаска, хотя раньше лучше была, конечно. Эх, какая раньше была! Не то что сейчас, одна бумага, по ТУ делают. А эта по ГОСТу или по ТУ? Это кто делает? Это хороший завод, я всегда их беру. А сыр брать не буду, уберите». И так далее. И это мы еще магазин взяли, а не аптеку, к примеру.</p><p class="p1">Вот смотрите — два абзаца совершенно ненужной вам и неинтересной информации. Современный человек не может же совершенно находить приятное в собственной компании. С собой ему говорить не о чем, а с другими вроде тоже, поэтому и происходят колбаски и курочки, и улетают в трубу деньги с телефонного счета, и карма портится от лучей ненависти, насылаемых очередью.</p><p class="p1">Но если мы хотим получить много денег, мы должны избавиться от вредных привычек. Курить бросать необязательно, надо бросить делиться информацией. Поэтому сегодня мы молчим. Но это не значит, что надо засесть дома и ни с кем не общаться. Сегодня мы должны: сходить в магазин, съездить в незнакомое мест о и спросить там дорогу, познакомиться и попросить у соседа соль. Это минимум, а если захотите сделать что-то еще, не нарушая главного условия, то еще лучше. Денег будет больше. Итак, бери «Квартал» и ножницы. Ведь вы же купили не один экземпляр? Ведь вас предупреждали, что одного мало. Кто пожадничал, тот попал — нельзя экономить на пути к богатству.</p><p class="p1">Ну, вы уже, наверное, все поняли. Сегодня вы будете обходиться словами из «Квартала». В нем вообще есть все, что нужно, любые слова и буквы на любой случай. В конце концов, вы все привыкли обходиться чужими словами. В споре вы прибегаете к пословицам и афоризмам, в дружеском общении обмениваетесь цитатами из любимых книг, в любви сыплете тем, что подслушали в стихах и фильмах. В общем, начинаем. Можно наклеить вырезанные слова на бумажку. Заготовок понадобится много — это с магазином легко, а вот как вы знакомиться будете? Можно прямо на месте, конечно, вырезать. Думаю, вы будете неотразимы, матерые пикаперы нервно курят в стороне. Что и как вы будете вырезать и составлять — ваше дело, тут я советовать не буду.</p><p class="p1">Здесь слова и выражения для начала разговора.</p><p class="p1">МАГАЗИН</p><p class="empty-line"/><p class="p1">— ИЗВИНИТЕ, Я ПОТЕРЯЛ ГОЛОС. ДАЙТЕ, ПОЖАЛУЙСТА, МАСЛА.</p><p class="empty-line"/><p class="p1">И ХЛЕБА.</p><p class="empty-line"/><p class="p1">И ЯИЦ.</p><p class="empty-line"/><p class="p1">А дайте вот той колбаски. Она как, ничего? Ну я немножко возьму, много-то денег нет. В тот раз брала другую, так она жирная очень. А эта жирная? Я с яйцом ее пожарю, и хорошо. У меня тетка еще покойная так жарила, так я приду из школы, сразу — тетя, мне колбаски пожарь! До сих пор люблю.</p><p class="empty-line"/><p class="p1">НЕ КРИЧИТЕ НА МЕНЯ!</p><p class="empty-line"/><p class="p1">САМА ДУРА. У ТЕБЯ БУДЕТ СЕГОДНЯ НЕУДАЧНЫЙ ДЕНЬ. ТЫ ТОЖЕ ГОЛОС ПОТЕРЯЕШЬ И БУДЕШЬ КАК Я, А БУМАЖКИ У ТЕБЯ НЕТ. ОБЪЯСНЯТЬСЯ БУДЕШЬ ЖЕСТАМИ, РУКАМИ МАХАТЬ. МЕЛЬНИЦА ГРЕБАНАЯ. ПРОЩАЙТЕ, Я НЕ ХОЧУ БОЛЬШЕ ВАС ВИДЕТЬ.</p><p class="empty-line"/><p class="p1">СОСЕД</p><p class="empty-line"/><p class="p1">— ИЗВИНИТЕ, Я ПОТЕРЯЛ ГОЛОС. ДАЙТЕ, ПОЖАЛУЙСТА, СОЛИ.</p><p class="empty-line"/><p class="p1">И ПЕРЦУ.</p><p class="empty-line"/><p class="p1">А ПЕРЕНОЧЕВАТЬ У ВАС НЕЛЬЗЯ? КО МНЕ ТЕТКА ПРИЕХАЛА ИЗ СЫЗРАНИ, НЕГДЕ ПЕРЕНОЧЕВАТЬ, ИЗВИНИТЕ.</p><p class="empty-line"/><p class="p1">НУ СПАСИБО.</p><p class="empty-line"/><p class="p1">ТОГДА ЕЩЕ СОЛИ, ПОЖАЛУЙСТА.</p><p class="empty-line"/><p class="p1">ЗНАКОМСТВО</p><p class="empty-line"/><p class="p1">— ИЗВИНИТЕ, ПОЖАЛУЙСТА, Я ПОТЕРЯЛ ГОЛОС. МОЖНО С ВАМИ ПОЗНАКОМИТЬСЯ?</p><p class="empty-line"/><p class="p1">ДЕНЕГ НЕ НАДО, НЕТ.</p><p class="empty-line"/><p class="p1">Я НЕ ГЛУХОЙ. Я НЕ ИЗ ТЕХ, КТО ПРОДАЕТ БЕЗДЕЛУШКИ. Я ПРОСТО ХОЧУ С ВАМИ ПОЗНАКОМИТЬСЯ, ВЫ ОЧЕНЬ КРАСИВАЯ. ОЧЕНЬ.</p><p class="empty-line"/><p class="p1">ПОЙМИТЕ, Я СОВЕРШЕННО ОДИНОК. СОВЕРШЕННО. ВЫ ВООБЩЕ НЕ ПРЕДСТАВЛЯЕТЕ КАК. КУПИЛ ИДИОТСКУЮ КНИГУ, ДУМАЛ, ТАМ БУДЕТ НАПИСАНО, КАК ПРИОБРЕСТИ СЧАСТЬЕ. А ТАМ АВТОРУ ЕЩЕ ХУЖЕ, ЧЕМ МНЕ.</p><p class="empty-line"/><p class="p1">НУ ИЗВИНИТЕ.</p><p class="empty-line"/><p class="p1">ДАЙТЕ, ПОЖАЛУЙСТА, СОЛИ.</p><p class="empty-line"/><p class="p1">А ДАЙТЕ ВОН ТОЙ КОЛБАСКИ.</p><p class="empty-line"/><p class="p1">ПРОЩАЙТЕ. МОЖЕТ БЫТЬ, ВЫ НАВЕКИ УПУСТИЛИ СВОЕ СЧАСТЬЕ, А ЗРЯ. Я ОЧЕНЬ ИНТЕРЕСНЫЙ ЧЕЛОВЕК.</p><p class="empty-line"/><p class="p1">А ВЫ НЕ ЛЕЗЬТЕ, ВАС НЕ СПРАШИВАЮТ.</p><p class="empty-line"/><p class="p1">Обратите внимание, одна часть этих фраз напечатана на одной странице, а вторая — на другой. А вы уже вырезали первые фразы. Как же теперь быть-то?</p><p class="p1">А говорили мы вам, что надо покупать три книжки.</p><p class="p1">Впрочем, может быть, вы такой хитрый, что переписали всю эту страницу? Или уже настолько невозможно хитрый, что написали наши фразы для предполагаемых диалогов от руки?</p><p class="p1">Так ведь не подействует. Знаете китайскую пословицу? Хитрость лисы не подходит льву. А знаете, что говорит основательный немец? Кхитрость приводит к гкхлупости. А что нам сообщает на этот счет изворотливый житель Сомали? В лукавом [жителе Сомали] правды не сыщет [другой житель Сомали]. Что говорит нам о хитрости сметливый француз? Не поддавайся на пчелкин медок — у ней жало в попке, aiguillon dans le derriere. А что нам вдруг хочет сказать алогичный, крепкий задним умом русский мужичок? «Передом кланяется, боком глядит, задом щупает». Могут быть деньги у такого хитрого человека, спрашиваем мы вас?</p><p class="p1">Наверное, могут. На первый раз прощается.</p><p class="p1">Но учтите — вам все равно понадобится второй «Квартал». А если быть совсем честным, то и третий.</p><p class="p1">Так что можете даже уже сегодня зайти в книжный магазин и попросить:</p><p class="empty-line"/><p class="p1">ИЗВИНИТЕ, Я ПОТЕРЯЛ ГОЛОС. ДАЙТЕ МНЕ, ПОЖАЛУЙСТА, КНИГУ «КВАРТАЛ». ЧТО ЗНАЧИТ РАСПРОДАНА? ВЫ НЕ ИМЕЕТЕ ПРАВА. Я БУДУ ЖАЛОВАТЬСЯ. ХОРОШО. Я ЗАЙДУ К ВАМ ЗАВТРА. ЕСЛИ КНИГИ НЕ БУДЕТ, У ВАС НЕ БУДЕТ ДЕНЕГ.</p><p class="empty-line"/><p class="p1">ДАЙТЕ, ПОЖАЛУЙСТА, СОЛИ.</p></span><span id="id24"><div class="title2">
<p class="p">5 августа</p>
</div><p class="p1">Сегодня мы будем рисовать. Такая вот невинная детская забава. Рисовать будем прямо здесь, в книге. Для этого нам понадобится ручка или карандаш. Цвета нам не понадобятся, мы работаем с формой, только с голой сутью, с вашим представлением — мы же узнаем мир по форме, а не по цвету. Увидев зеленого медведя, мы задумаемся только о том, как это его (или нас?) так угораздило; но кто из нас с ходу определит, что такое бурый куб, надо ли от него бежать или, наоборот, из него можно что-нибудь приготовить? Впрочем, это все очевидные вещи. Так что берем просто карандаш или ручку. Лучше ручку, да. Чтобы навсегда. Ну, условно навсегда — в споре пера с топором перо никогда не побеждает. Если вы слишком молоды, вы вряд ли помните, как первоклассником зачищали ошибки в домашней работе бритвенным лезвием «Спутник». А спустя годы, десятиклассником, этим самым лезвием «Спутник» по телефону грозили однокласснице — что если она сейчас же, тут же не полюбит вас, вы пойдете с этим «Спутником» в ванную и совершите ряд простых движений, то есть как бы зачистите ошибки судьбы. Очень, кстати, символично, что «Спутником» назывался инструмент, с помощью которого можно легко и самостоятельно умереть. С той же незамутненной чистотой он мог бы называться, скажем, «Вергилий». Только таким лезвием уже нельзя было бы ни бриться, ни соскабливать буквы из тетради.</p><p class="p1">Но сегодня нам не понадобится лезвие «Спутник». Не понадобится и умение рисовать. Оно даже может помешать — боюсь, что вы слишком увлечетесь красотой и достоверностью, а надо быстро. Расслабьтесь, вы не на экзамене, экзамен у вас впереди, и принимать его буду не я. Да, и выкиньте из головы все, что знаете о психологических тестах — все эти «нарисуйте домик, нарисуйте рядом дерево, нарисуйте под деревом заю, если у домика короткая труба, а зая смотрит влево, вы очень одиноки». Этого не будет, я и без того знаю, что вы одиноки, иначе для чего вам я со всеми моими малоинтересными закидонами и унылой биографией? Поэтому, пожалуйста, не старайтесь нарисовать так, чтобы угодить мне или выдать себя за другого — я не стану ставить вам диагнозов, мне, ей-богу, плевать, какого размера ваша труба и ваш зая, мы вообще не будем рисовать дом. К тому же все эти тесты — полная ерунда, мне приходилось видеть очень, очень одиноких людей с огромными трубами. Вот наоборот — не приходилось. Наверное, это потому, что при виде неодинокого человека мне всегда хотелось отвернуться, а его рисунки сжечь.</p><p class="p1">Рисуем для начала что-нибудь совсем простое. Допустим, кису — уж это сейчас все умеют. Только не вид сзади. Кису сзади может нарисовать только очень скучный, нехороший человек, потому что у кисы все самое интересное спереди: носик, ушки, усики, зубики, глазики. Все это мы рисуем на кисе.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_002.png"/>
</div><p class="empty-line"/><p class="p1">Нарисовали? Хорошо. Теперь рисуйте поезд. Любой поезд — электричка, товарный, скорый, может быть, скоростной. Хотя, скоростном поезде нет никакой романтики: там все очень серьезные, с ноутбуками и книгами на иностранных языках, в скоростном поезде не происходит путешествия, в нем нет промежуточности, неприкаянности, нет расстояния между А и Б, есть только сами А и Б, но это же не цель. Когда едешь из А в Б, вся суть в этом пробеле между ними, снабженном каким-нибудь предлогом или союзом, в общем, город Б — это и есть только предлог, чтобы убежать из города А. Кроме того, скоростные поезда ходят днем, а это такая скука. В общем, поезд.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_003.png"/>
</div><p class="empty-line"/><p class="p1">Здесь нарисуйте что-нибудь омерзительное. Можно паука или миксину. Миксина, кто не знает, это такая морская штука, которая всю воду вокруг себя превращает в желеобразную слизь. Наверное, ей не нравится жить в чистой прозрачной воде, слишком уж она сама хорошо видна во всей своей омерзительности. А может, ей не нравятся другие морские существа, и она делает вокруг слизь, чтобы никто не приблизился к ней, но тогда ее жалко, и она перестает быть омерзительной тварью. Можно нарисовать кучу опарышей. Некоторые рисуют Гитлера, но почему-то у людей, которые в качестве самой гнусной вещи выбирают Гитлера, его портрет получается очень милым и трогательным. Я бы нарисовал самого себя, но не умею. Так что меня можете нарисовать вы, если я вам так неприятен. Ваша воля.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_004.png"/>
</div><p class="empty-line"/><p class="p1">Теперь — куб Эшера. Тот, у которого грани пересекаются в неправильных плоскостях, то есть вообще без плоскостей. Такая обманка, иллюзия объема, когда его нет. Как вся моя жизнь, да и ваша, честно говоря, — никакой перспективы, одна двухмерность. Вообще-то это просто омерзительно, так что можно было куб Эшера нарисовать на предыдущей странице, но там у нас уже я и миксина, поэтому рисуйте куб здесь.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_005.png"/>
</div><p class="empty-line"/><p class="p1">Костер. Пионерский, которым взвивается темная ночь, туристский, у которого посидим с товарищами, если ты подождешь, постоишь еще немножко, цыганский, который светит в тумане, или тот, который развели у дороги два одиночества. Инквизиторский костер еще бывает, в нем корчится еретик. Нарисовать его как следует вы все равно не сможете, поэтому обойдитесь без еретика, пожалуйста: мне и так очень, очень тревожно.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_006.png"/>
</div><p class="empty-line"/><p class="p1">Птицу. Пусть она как будто летит туда, где вы никогда не были и вряд ли будете. Там ее ожидают вечное блаженство, дивный климат, много жирной и ленивой еды, и вот она туда летит, летит, все никак не может долететь, но когда-нибудь непременно там окажется, чтобы понять, что и на старом месте было неплохо, даже очень хорошо, даже вообще лучше, чем где-либо, и нет здесь никакого блаженства, но туда, назад, тоже уже нельзя, потому что там в кустах у берега сидит охотник с духовым ружьем и ждет. У охотника на щеках полосы белой глины, а в губе акулий клык, а его духовое ружье — самое меткое и дальнобойное в мире, оно всегда точно знает, куда стрелять, чтобы было не насмерть, но больно так, что лучше бы насмерть, только смерти нет. Охотника рисовать не надо, пусть он сидит там, где сидит, не трогайте его, умоляю, иначе он встанет и — раз-два-три-четыре-пять — пойдет меня искать. Рисуйте птицу, и все. Воробья какого-нибудь нарисуйте просто, я не знаю. Да, рисуйте воробья, ну вас к черту.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_007.png"/>
</div><p class="empty-line"/><p class="p1">Уличный фонарь. Под фонарем всегда что-то вьется: мошки, снежинки, капли дождя. Все самое ужасное происходит всегда под фонарем, в его тусклом неживом свете. Ограбить или избить могут и в темноте, а вот разрушить жизнь и убить душу — только под фонарем. Наверное, они, кто убивает душу, хотят видеть, как она умирает, как осколки летят, как ты ползаешь и собираешь их, но для этого-то как раз света недостаточно. Меня тысячу раз убивали под фонарями, пока мне не надоело, и в тысячу первый раз я не стал ждать, я сам убил. Неловко, без изящества — просто опыта у меня тогда было мало, и я вообще думал только о том, чтобы успеть первым. Теперь я действовал бы иначе, но мне уже не до того.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_008.png"/>
</div><p class="empty-line"/><p class="p1">Корабль. Прекрасный белоснежный круизный лайнер, похожий на дом: на таком лайнере непонятно вообще, плывешь ты в море или живешь себе на суше. Или пиратскую бригантину под черными парусами, где и палуба черна от въевшейся крови, как ее ни надраивай. Или дракар викингов, похожий на водяное чудовище, со страшной мордой на носу и сотней страшных морд на палубе. А можно спортивную яхту, на которой сверкают зубами молодые, красивые и здоровые люди, они щурятся от солнца и бликов на воде, на бронзовой коже дрожат соленые капли — и правильно дрожат, потому что вот линия, где солнечный свет кончается и начинается туман, а из тумана им навстречу бесшумно выступит тень, и они успеют увидеть только 101 страшную морду и чью-то рыжую бороду.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_009.png"/>
</div><p class="empty-line"/><p class="p1">Шута. Просто рисуйте шута, ничего объяснять не буду.</p><p class="empty-line"/><p class="p1">Итак, вы нарисовали всё, что нужно. Теперь вырезайте картинки — не по контуру, а большим квадратом, чтобы в этом квадрате обязательно осталась строчка с просьбой позвонить. Укажите номер телефона — можно для этого завести отдельный. Теперь идите и разложите картинки по почтовым ящикам — только не в своем доме, лучше даже в разных. Большинство подъездов сейчас на кодовых замках, так что придется потрудиться.</p><p class="p1">Идите домой и ждите. Если кто-нибудь все-таки позвонит, поговорите с этим человеком о том, что изображено на доставшемся ему листочке. Ну да, прямо так: я хочу поговорить с вами о фонарях, не вешайте трубку, у меня такое задание. О «Квартале» не рассказывайте, скажите, что нельзя. Объяснитесь как-нибудь. Спросите собеседника, есть ли ему что рассказать о фонарях, если нет, рассказывайте сами. Если собеседнику жалко тратить деньги на разговор, перезвоните ему сами. Если ваш разговор продлится больше 15 минут, хорошо. Если вас сразу обзовут обкуренным психом — плохо. Если вам позвонят несколько человек — хорошо. Если никто не позвонит, значит, ваши рисунки были недостаточно убедительны, мы с вами прощаемся, ступайте и учитесь рисовать так, чтобы корабль по крайней мере не напоминал дерьмо, иначе вам никто никогда не позвонит — сами бы вы стали звонить человеку, который нарисовал вам дерьмо? Остальных сразу хочу предупредить, что шансы на интересный разговор ничтожны — они вообще ничтожны, даже в том случае, если тема близка обоим, такова жизнь. Постарайтесь хоть как-то скрасить этот никому не нужный обмен ничего не значащей информацией. В конце разговора попросите человека повесить рисунок на стену и не снимать до 15 октября. Еще попросите его нарисовать то же самое своей рукой и положить в условленное место, откуда вам надо будет его забрать — чтобы повесить на стену у себя. Скажите собеседнику, что до 15 октября вы больше не должны с ним разговаривать, — там, глядишь, он сам забудет и не станет вам докучать. В конце концов, если вдруг вы захотите, после 15 октября вы сможете сами позвонить ему. Впрочем, если вам этого захочется, значит, вы что-то делали не так. Некоторые связи нужно рвать без сожаления — особенно те, которых действительно жалко, и если вы к концу «Квартала» этому не научитесь, вы не сможете рвать и те, каких не жалко ни капельки.</p></span><span id="id25"><div class="title2">
<p class="p">6 августа</p>
</div><p class="p1">1.</p><p class="p1">Сегодня мы попробуем получить свой Килофинансовый Индекс.</p><p class="p1">Для начала разделите ваш вес в килограммах на Финансовый Индекс (ФИ). Что-то многовато, многовато. Пора или худеть, или богатеть. Чтобы не огорчаться, давайте сделаем наоборот. Разделим ФИ на вес в килограммах. Что-то маловато, маловато. Пора или беднеть, или толстеть. Впрочем, это почти всегда происходит одновременно. Бедняки питаются хлебом, картошкой и макаронами и не ходят в фитнес-клубы.</p><p class="p1">Знаете что? Давайте умножим вес на ФИ, вычтем рост, умножим на возраст, поделим на число браков, прибавим зарплату и забудем все это, как страшный сон.</p><p class="p1">2.</p><p class="p1">Перепечатай те следующий текст.</p><p class="p1">Многие полагают — и в этом их жестокая ошибка, — что пересочинить себя и добиться успеха можно при помощи так называемого пикапа, то есть, например, пройти по вагону метро, пожелать всем доброго утра (вечера), пронзительно спеть неприятным голосом идиотскую песню или поздравить всех с праздником Преображения Господня по старому стилю. 6 августа по-старому, Преображение Господне. Вероятно, пикаперы искренне полагают, что человек, поздравляющий всех либо поющий в вагоне, побеждает свою робость, а также производит доброе, жизнеутверждающее впечатление, и все бросаются к нему отдавать свои деньги. Это неверно. Побеждает он только свой страх выглядеть идиотом, а в этом для него нет ровно ничего нового, потому что он и так идиот, иначе он не обратился бы к пикаперам. Кроме того, как учит нас долгий опыт жизни, люди не спешат отдавать свои деньги жизнерадостным, доброжелательным существам. Если уж помогать, то, разумеется, тому, кто горько плачет, веч но жалуется, как бы угрожает нам таким же состоянием, если мы не подадим. Веселый, жизнерадостный нищий, идущий по вагону с гармошкой, вызывает желание не столько подать, сколько поддать ему под румяную задницу. А ведь этот нищий только что прошел курсы пикапа, потратил на него последние деньги, а за золотой, элитный пикап с него непременно слупили бы еще, но у него больше нет, и вот гармошка — вагон — пинок.</p><p class="p1">«Квартал» учит вас совершенно иному, но объяснить состояние «Квартала» не так-то просто. Выполняя упражнения «Квартала», мы постепенно учимся постигать самоценность процесса в сравнении с результатом, иллюзорность результата, увлекательность процесса — и в конце концов нас перестают интересовать результаты, вследствие чего появляются деньги. Мы учимся любить запах цветка, сорванного по дороге к иллюзорной и, в общем, комичной цели. Более того — сама иррациональность этой цели помогает нам выпасть из рутины и войти в то состояние, когда только и приходит настоящая удача — то есть когда мы выпадаем из всех цепочек, включая пищевую, и подчиняемся не всегда уловимым закономерностям более высокого плана. ыфдларлдыаолывфаолджывоывджа</p><p class="empty-line"/><p class="p1">Я сказал, перепечатывать дословно!</p><p class="p1">Добуквенно!</p><p class="p1">И это тоже.</p><p class="empty-line"/><p class="p1">шуцшщзуцегезщцкгщзкезщьбмячбьбьтьдбвыдаод</p><p class="p1">ллллллллллллллллллллл</p></span></span>
