<span><span id="id89"><div class="title2">
<p class="p">9 октября</p>
</div><p class="p1">Сегодня мы разбираемся со своим внутренним миром, точнее, с теми его аспектами, которые мы еще не успели настроить на счастье и гармонию. Как при дефрагментации диска обязательно остаются красные квадратики, то есть куски неубираемых программ и прочие неисправимые ошибки, — так и при настройке нашего организма на деньги и блаженство обязательно остаются неудаленные воспоминания, опасные комплексы и мучительные опасения. С ними мы сегодня разберемся, а проще говоря, мы их ломаем.</p><p class="p1">Но ведь концентрация прожитой жизни — она здесь, в нашем доме. Воплощения всех комплексов и обид — тоже здесь. Все досталось нам ценой унижения, обмана, отказа от собственного «Я». Ломаем все это. Не всё подряд, а по сложной схеме, приводящей нас к окончательному раскрепощению и высшему совершенству.</p><p class="p1">Только без злости. Все это следует проделывать с холодной головой и полным осознанием происходящего. Это труднее, но так надо. Крушить в ярости легко, бесстрастно уничтожать — совсем другое дело. Мы не должны вымещать на вещах свою злобу, наша задача — сделать так, чтобы ничего этого просто больше не было.</p><p class="p1">Осмотрите комнату. Первое, на чем задержится ваш взгляд — что это? О чем вы подумали? Я, например, вижу диванную подушку. Я тогда страшно поругался с одной подругой, неважно, из-за чего, важно, что она была неправа. А когда она бывала неправа, то могла наговорить ужасных вещей — чтобы градус гнева как-то скрыл эту неправоту. Я хлопнул дверью, и ушел, и занимался весь день своими делами, а на обратном пути купил себе эту подушку, довольно милую, но не подходящую ни к чему в доме. Зачем я это сделал? Наверное, потому что мне было стыдно, что я это все терплю. Мне не хватало решимости, но я убеждал себя, что мне хватает рассудительности — это был, конечно, самообман, и в глубине души я все прекрасно понимал. И вот я совершил решительный поступок: купил себе эту ненужную вещь, непонятно зачем, я же никогда не любил лежать на диване, зато она любила, и я почему-то подумал, что, если у меня будет подушка… Короче, я принес ее домой, а подруга после этого довольно скоро исчезла из моей жизни, и слава Богу, наверное, но я-то для этого не сделал решительно ничего, нельзя же, в самом деле, считать подушку. Итак, подушка — это моя трусость, моя привычка заменять решение проблемы чем угодно. Я беру ножницы и терзаю ее — набивка уже вся скомкалась и выглядит отвратительно: так выглядит трусость, если долго лежит внутри.</p><p class="p1">Следующий на очереди — книжный шкаф. Я его заказал через Интернет, и он приехал разобранным — десяток картонных коробок, коробочек, пакетиков со странными деталями внутри. И я не смог его собрать. Там были какие-то дощечки, болтики, гайки, какие-то гвоздики, странные железные штуки и плохо пропечатанная инструкция с такими рекомендациями, что «Квартал» отдыхает: приложите горизонталь Д между вертикалями А и К и удерживайте на весу, затем установите направляющие Ж под обозначенным углом и закрепите креплениями В. Стоит ли говорить, что невозможно было понять, где А, где В и где обозначенный угол? Я провозился с ним всю ночь и на следующий день, злой и невыспавшийся, обидел хорошего человека. Мне было стыдно, но я позвонил знакомому и попросил помощи. Вы, наверное, подумали, что шкаф — это стыд? Нет, до стыда мы дойдем позже. Знакомый приехал с ящиком инструментов и таким спесивым выражением лица, что я чуть не захлопнул перед ним дверь, только вот шкаф-то все равно был нужен. Но и у него ничего не получилось: он смог найти угол и даже приложить направляющие Ж, но горизонталь Д никак не совпадала с вертикалью А, а вертикаль К вообще ни к чему не подходила. Он уехал, а я испытал такое низенькое злорадство, такое удовлетворение! Приятное чувство, но разъедающее изнутри — неужели я такое ничтожество, неужели мне всегда необходимо посадить кого-то в лужу, чтобы почувствовать себя человеком? Я вызвал сборщика из магазина. Пока он ловко собирал шкаф, я все смотрел на него и понимал, насколько он хуже меня, что он не знает того, что знаю я, что его никогда не полюбят женщины, которые любят меня, а тех, кто любит его, я бы к себе не подпустил на выстрел, и все, на что он способен — собрать сраный шкаф, который уже сделали до него настоящие умельцы. Итак, шкаф — мое высокомерие, которое не раз отравляло жизнь мне и окружающим. Я выкидываю из него все книги. Прямо на пол, чтобы они рвались в падении, роняли страницы — книги тоже моя боль: те, которые написаны хорошо, вызывают во мне зависть, а которые плохо — гнев. Сейчас я буду пинать их ногами, топтать, отбрасывать, чтобы не мешали. Я никогда не понимал этого «Книга твой друг, береги книгу»: книга — это просто бумага, и что там беречь? Когда проход расчищен, я беру молоток и монтировку и крушу шкаф. Надеюсь, что вы делаете то же самое.</p><p class="p1">На обоях возле выключателя у меня записано несколько телефонов. Если у вас тоже так — рвите обои. Это лишние связи — нужные телефоны должны быть записаны в нормальном месте, а ненужных быть не должно. Это страх одиночества, желание любой ценой окружить себя людьми, какими угодно, только чтобы были.</p><p class="p1">Давайте дальше сами. За этим столом вы сидели, когда лепетали в трубку мольбы и извинения? В эту трубку лепетали? Швыряем телефон в стену, уничтожаем стол. Можно лупить по нему стулом — ведь и стул тоже свидетель ваших бесконечных унижений. Пока не останутся щепки. Этими шторами вы стыдливо загораживаетесь от мира? В клочья шторы.</p><p class="p1">Вы думаете, что я шучу? А я ведь уже сижу среди обломков и неплохо себя чувствую, а впереди еще столько всего. Вот эта кровать — я уж рассказывать не буду, если хотите, можете пофантазировать, а лучше припомните-ка, что у вас самих связано с кроватью, — и вперед.</p><p class="p1">А вот вешалка в коридоре — это как раз мой стыд: я же обещал, что мы до него дойдем. Она увешана одеждой так, что не видно стены: как будто одеждой я хочу прикрыть собственную незначительность, как будто в новом красивом пальто я стану лучше, и меня, может быть, примут за своего, за хорошо одетого удачливого спокойного человека, как будто енотовая шапка дополнит мою голову, такую умную, — прости меня, енот, бедный мой, пушистый зверь! — и тогда наконец внутреннее содержание моей головы привлечет кого-то. Как будто я стану красивее; то есть без одежды я, значит, недостаточно красив, и мне все время надо чем-то маскировать свое уродство, чем-то действительно красивым, добротным, из тонкой английской шерсти — и тогда будет не стыдно. Я и вешалку эту купил, когда старая перестала вмещать свидетельства моего стыда. Но теперь — прощай! Я срываю одежду, ломаю вешалку, одежду — под ножницы. Режьте и вы, не жалейте — если жалеть, то зачем вообще всё?</p><p class="p1">Я думаю, вы уже поняли принцип, и в комнате скоро ничего не останется. Идите на кухню — там одна посуда чего стоит! Рюмки, тарелки, ложечки-хуежечки, вилочки-хуилочки — всё, чтобы жрать красиво. Самим не противно? Как будто еда от этого станет вкуснее. Впрочем, я вам не навязываю своих ассоциаций, я уверен, что у вас в душе адок почище моего, так что вы справитесь. К концу задания ваша квартира будет готова к съемкам постапокалиптического малобюджетного кино — кстати, почему бы и нет? Но главное — внутри вас не останется ничего лишнего, надо будет только прибраться, как в квартире, так и в душе: вытащить обломки и обрывки на помойку, подмести пол (вы же не сломали швабру? Или она тоже была свидетелем ваших унижений? Тогда купите веник) и протереть его влажной тряпкой. Ничего лишнего нет. Ни-че-го. Вот теперь старый мир разрушен до основанья, и наступает благословенное «а затем».</p><p class="p1">Если вы живете не один, делайте все это, когда дома никого нет. Если дома всегда кто-то есть, делайте это тихо — иначе вам просто не позволят, и будет обидно выбыть из-за непонимающих родственников. Если вы на съемной квартире, не страшно — когда у вас будут деньги, вы купите хозяину все новое, а лучше подарите ему «Квартал», и он тогда слова вам не скажет.</p><p class="p1">Сегодня можно не отжиматься.</p></span><span id="id90"><div class="title2">
<p class="p">10 октября</p>
</div><p class="p1">Дорогие друзья, товарищи, братья и сестры! Что-то пошло не так, совсем-совсем не так. Собственно, я это чувствовал, и вы чувствовали. Не так и не туда. Мы не виноваты, но просто мир оказался в какой-то момент сильнее. Мы всё делали правильно, но перестали быть совместимы с обстановкой. Я же предупреждал. Нам надо бежать.</p><p class="p1">Не совсем, не окончательно — мы, может, потом вернемся. Но, оказывается, в каждом прохождении «Квартала» рано или поздно наступает момент, когда надо бежать. Если такого момента не наступает, мы проходим неправильно, половинчато.</p><p class="p1">Короче, надо бежать.</p><p class="p1">Сегодня бежать еще нельзя, а то они почувствуют, что мы всё поняли. У них все главное запланировано на послезавтра. А послезавтра нас здесь уже нет.</p><p class="p1">Билет на поезд купим в последний момент. Намечаем маршрут. Ехать надо к морю. Почему? А помните слово, которое мы составляли из двух англоязычных имен? Это была подсказка. Я знал, что к морю. Только в море можно сейчас спастись, только оно примет в себя весь заряд счастья и общей ненависти, который мы в себе несем. Даже если в городе есть море, нам надо уехать к другому морю. Я поеду к Черному, а вы как знаете. Но мы уезжаем к морю. Вырабатываем маршрут. Ровно в полночь едем на вокзал, в круглосуточную кассу. В полночь они нас не видят.</p><p class="p1">Покупаем билет.</p></span><span id="id91"><div class="title2">
<p class="p">11 октября</p>
</div><p class="p1">Отпрашиваемся с работы. А они не отпускают. Они говорят, вы и так в последнее время…</p><p class="p1">Что я в последнее время?</p><p class="p1">Отводят глаза.</p><p class="p1">Часто пропускаете, и вообще на вас жалуются.</p><p class="p1">Кто жалуется?</p><p class="p1">Ученики. Коллеги. Мастер цеха. Нужное подчеркнуть. Они говорят, что вы не тем заняты, не прислушиваетесь к доброжелательной критике, недостаточно сосредоточены. Вообще вас не узнать.</p><p class="p1">Показываете диплом о прохождении «Квартала».</p><p class="p1">А что это у вас за результат?</p><p class="p1">Нормальный результат. Хороший, высокий результат.</p><p class="p1">Нет, мы не можем вас отпустить. Или увольняйтесь.</p><p class="p1">Я могу уволиться, но вам будет хуже. У меня скоро будет такой прилив сил и вообще такая удача, что более ценного работника у вас здесь не будет.</p><p class="p1">Все это очень хорошо, но вам надо решать: или вы уезжаете, и тогда мы расстаемся, или вы продолжаете работать, и тогда ваша удача, или что у вас там, приходит к вам сюда.</p><p class="p1">Но я должен уехать, поймите. Всего на несколько дней.</p><p class="p1">Я все вам сказала, мы не можем позволить себе долгих дискуссий, здесь люди работают, а не дискутируют.</p><p class="p1">Хорошо, пускай они работают без меня.</p><p class="p1">Это худший вариант. Но есть другой.</p><p class="p1">Есть вариант, при котором отпускают. И это как-то даже обидно.</p><p class="p1">Совсем мы им не нужны.</p><p class="p1">Собираемся. То есть как собираемся? Вещей с собой не берем. Семье ничего не объясняем. Командировка. Врем что хотим.</p><p class="p1">Кое-что надо объяснить только в одном случае: если мы не женаты, но есть девушка (или не замужем, но есть юноша), который(ая) нам важен(на), которого(ую) жаль бросить просто так.</p><p class="p1">Звоним.</p><p class="p1">Скажи, если бы я вдруг исчез(ла) совсем, ты бы заметил(а)?</p><p class="p1">Он(а) думает, что мы шутим.</p><p class="p1">Ну хорошо, а если на три дня?</p><p class="p1">(Что случилось?)</p><p class="p1">Понимаешь, мне надо срочно исчезнуть. Лечь на дно. Не задавай вопросов.</p><p class="p1">(Мы можем поехать вместе?)</p><p class="p1">Мы никуда не можем поехать вместе, и вообще я никуда не еду. Просто пойми и три дня не рыпайся. Это как с лягушачьей кожей. Не жги лягушачью кожу, и всё будет как надо.</p><p class="p1">(Устал(а) я от всех этих загадок.)</p><p class="p1">Ну и отлично.</p><p class="p1">(Да погоди!)</p><p class="p1">Не надо годить. Устал(а), я все понимаю. Я тоже устал(а).</p><p class="p1">(Нет, но ты можешь хотя бы объяснить…)</p><p class="p1">Потом-потом. Всё. Пока.</p><p class="p1">Отрубаемся.</p><p class="p1">Если честно, так даже лучше. Теперь вам понятно, чего нам не хватало?</p><p class="p1">Рвать, рвать.</p></span><span id="id92"><div class="title2">
<p class="p">12 октября</p>
</div><p class="p1">Ну вот, едем.</p><p class="p1">Едем-едем-едем, никто нас не догонит. Никто в принципе не должен нас догнать. Ведь мы, см. выше, никому ничего не говорили.</p><p class="p1">Плацкарта — прекрасно. Конечно, носки. Даже, можно сказать, НОСКИ. Но зато полная безопасность, никто за нами сюда не последует, дураков нет. На всякий случай мы пристально осматриваемся. Проходим вагон из конца в конец. Полиция. Это не за нами? Нет, не смотрят. А вон тот, с бородой? Он смотрит. Но он не за нами. Сейчас начнет жрать. Точно не за нами. Берем стакан чаю. Должны дать. Возвращаемся на свою полку и слушаем разговор.</p><p class="empty-line"/><p class="p1">РАЗГОВОР ПЕРВЫЙ</p><p class="p1">— Поезд пять минут всего стоял. Он был еще теплый. То есть он, значит, умер ровно в эти пять минут. Но я ничего не подавала никуда, никаких исков. Проводник скорую вызвал, скорая приехала, а они уже уехали. Его оставили прямо там. Прямо на станции оставили. Багаж оставили, всё. Я к машинисту потом подошла. Я говорю: если вы знали, то как вы смели?! А он говорит: если я знал, то что? Я должен был дальше его везти? Я говорю: но вы же видели. Ночь, пустая станция. Он говорит: что, я должен был ждать? Я говорю: не знаю, что вы были должны. Но так же нельзя, что один на перроне лежит и скорую ждет. Вы, может, если бы не выложили, то он бы жил. Но я не стала подавать, ничего. Уже чего подавать? И мать моя потом тоже говорит: если бы ты подала, его бы пинком под зад и к чертовой матери. (Смеется.) Но не вернешь же, верно? Что подавать? И вся моя жизнь была такая. Потом этот приехал, говорит: я освободился. Я говорю: и что, если ты освободился? Я должна теперь с тобой халабуду танцевать? Карамболина-карамболета? Ты всё знал, ты знал, куда ехал. Тут после тебя такое осталось, что трое разгребали. Будем здоровы. Он говорит: но ведь трактор же был отдельно! Я говорю: что трактор? Что мне твой трактор? Ты не за трактор попал, а ты за то попал, что человеческое отношение надо иметь! Но я не подавала, ни тогда не подавала, ни потом. Он уехал тогда в Туру, там женщина была у него в Туре. Нижняя Тура, жопа мира. Но если ты мне скажешь — вот я тебя не знаю, но я вижу, что ты человек, я всегда вижу, когда человек, и если ты мне скажешь — пойди за мной на край света! — то я скажу тебе: нет. Я ни туда не пойду и ни сюда. Я и машинисту так сказала: я никуда не пойду. Гора Магомету делает что? Она говорит ему: я никуда не пойду. И вся жизнь моя такая была. Нижняя жопа мира.</p><p class="empty-line"/><p class="p1">Восстановите смысл сказанного.</p><p class="empty-line"/><p class="p1">ОТВЕТЬТЕ НА СЛЕДУЮЩИЕ ВОПРОСЫ:</p><p class="empty-line"/><p class="p1">1. Если машинист выложил еще теплого, то почему она не подала?</p><p class="empty-line"/><p class="p1">2. Если трактор был отдельно, чем он сделал такое, что трое разгребали?</p><p class="empty-line"/><p class="p1">3. Почему халабуду надо танцевать, если халабуда (жарг.) — полуразрушенное строение, трущоба, детский домик-шалаш (диал.)?</p><p class="empty-line"/><p class="p1">4. Почему во всех плацкартных вагонах рассказывают более или менее одно и то же — причем кто-то обязательно освобождается?</p><p class="empty-line"/><p class="p1">5. Сколько было выпито между первой и последней фразами?</p><p class="empty-line"/><p class="p1">РАЗГОВОР ВТОРОЙ</p><p class="p1">— Я такая: опа! Но они встречались. Встречались, но еще не общались. Я с ним общалась тогда. Потом он такой: опа! Они уже общаются. Я тогда стала встречаться тоже. Мы встречались, потом он такой: опа! Он мне говорит: если ты не хочешь общаться, мы не будем встречаться. Я тогда: ты почему со мной вообще встречаешься? Он такой молчит. Я говорю: ты если хочешь общаться, то надо сначала встречаться. Он говорит: я уже встречаюсь. Встречаться все хотят, а общаться никто. Я говорю: но ты же кушаешь! Ты прежде чем кушать, руки моешь же? Вот так и тут. Если ты хочешь общаться, то сначала встречаешься, а потом смотришь. Я смотрю, ты смотришь. И, может быть, тогда общаемся, а может, тогда нет отношений, не может быть отношений. Он говорит: но я хочу отношения! Я такая: тогда встречаемся. И я тогда узнаю, что он со мной встречается, а еще с одной, еще со школы, общается. Опа! Я говорю: тогда не может быть отношений! Если ты с одной встречаешься, с другой общаешься, тогда почему я должна верить, что у тебя вообще нет уже чего-нибудь, сам понимаешь? Дом два вообще, улица Столетова. Тогда он говорит: я хочу общаться без отношений, я не могу общаться, когда отношения. Я говорю: опа! Тогда ты просто больной. Ты просто вообще больной! Вообще! Он так спокойно, вообще: да, я больной. И я тогда: да я с твоей мамой общалась! И всё. И никаких больше отношений.</p><p class="empty-line"/><p class="p1">Восстановите смысл сказанного.</p><p class="empty-line"/><p class="p1">ОТВЕТЬТЕ НА СЛЕДУЮЩИЕ ВОПРОСЫ:</p><p class="empty-line"/><p class="p1">1. Чего она больше хочет — общаться или встречаться?</p><p class="empty-line"/><p class="p1">2. Почему нельзя общаться, не встречаясь?</p><p class="empty-line"/><p class="p1">3. Какое отношение имеет дом два к улице Столетова?</p><p class="empty-line"/><p class="p1">4. Что важнее для героини:</p><p class="p1">• чтобы были отношения</p><p class="p1">• чтобы общаться</p><p class="p1">• что бы рассказать</p><p class="p1">• чтобы кушать</p><p class="p1">• опа!</p><p class="empty-line"/><p class="p1">5. Найдите три контекстных синонима к слову «опа».</p><p class="empty-line"/><p class="p1">РАЗГОВОР ТРЕТИЙ</p><p class="p1">— Икытыгын ушкуль дуранда!</p><p class="p1">— Штыр?</p><p class="p1">— Дуранда барбатур! Криштык самбурама Арбат, дулундык Пресня.</p><p class="p1">— Тхурба баштанбар, ды? Кушкун ды?</p><p class="p1">— Самуль курлы. Трушбантак баурджан самаглы.</p><p class="p1">— Аштарак кырды?</p><p class="p1">— Былмурды аджапан закарта Самара, крушты Новгород, аштыр Йола.</p><p class="p1">— Шантурак Америка крыш?</p><p class="p1">— Бастурджан карапут, талында, сабакурал кран. Аркулы жандау мында. Тыры, тыры, аштумбак кузыл стымп!</p><p class="p1">— Аэ?</p><p class="p1">— Бурт аэ!</p><p class="empty-line"/><p class="p1">Восстановите смысл сказанного.</p><p class="empty-line"/><p class="p1">ОТВЕТЬТЕ НА СЛЕДУЮЩИЕ ВОПРОСЫ:</p><p class="empty-line"/><p class="p1">1. Почему эти люди преследуют именно вас?</p><p class="empty-line"/><p class="p1">2. Откуда они знают, что вы должны срочно уехать?</p><p class="empty-line"/><p class="p1">3. Почему они думают, что у вас с собой много денег?</p><p class="empty-line"/><p class="p1">4. Какое отношение они имеют к Кальдеру?</p><p class="empty-line"/><p class="p1">5. Жарап сальмандар аы?</p><p class="empty-line"/><p class="p1">Сходим на ближайшей остановке и пересаживаемся на следующий поезд. Может быть, туда еще не успели добраться.</p></span><span id="id93"><div class="title2">
<p class="p">13 октября</p>
</div><p class="p1">Едем к морю.</p><p class="p1">Не доезжаем.</p><p class="p1">Выходим за две станции от точки назначения.</p><p class="p1">Моря там еще нет. Поезд стоит две минуты. Станция маленькая, провинциальная, страшная.</p><p class="p1">Сейчас ночь. Уж поверьте мне, я это знаю. И вот сидим мы этой ночью на этой станции — хорошо еще, если на ней топится одинокая печурка, — среди чужих, совершенно чужих, невозможно чужих людей. И думаем: что это мы здесь делаем, что мы сделали со своей жизнью?</p><p class="p1">Положим, это лучше, чем тюрьма, лучше, чем смерть, хотя насчет смерти еще неизвестно, смерть бывает разная. Но это в любом случае уже не жизнь.</p><p class="p1">И что мы на этой чужой станции будем делать? И почему нам нельзя было просто уехать к морю? И кого мы таким образом сбиваем со следа?</p><p class="p1">Господи, Господи. Как одиноко, как страшно. Как вдвинуты мы в ничто. Эту вдвинутость в ничто я с таким ужасом чувствовал единственный раз в жизни, когда ехал в армию. Сначала все было ничего. Ехали в электричке, бесконечно долго, останавливались среди полей, и я думал: сойти бы среди этих полей… А потом, к вечеру, приехали на конечную станцию, где нас ждали армейские грузовики. Ехали среди болезненно красного заката, и на этом закате в полях был огромный одинокий стог. Коричневый среди красного поля, красного неба. И глядя на него, я с ужасной отчетливостью понял: все, я в армии, я вырван из всего, я совершенно один. И сейчас я сделал с собой то же самое, а зачем сделал?</p><p class="p1">Господи, Господи, какая глухая ночь, какая страшная ночь. Никакого выхода нет из этого чужого пространства, никто здесь не поймет, никто не пожалеет меня. Зачем я сюда поехал? Если вдуматься, зачем я вообще все это делал? На что я надеюсь? Какими деньгами можно искупить эту станцию, эту печь, эти лица вокруг? Куда я загнал себя, и как я вернусь? Куда мне возвращаться — к безнадежно разрушенной жизни, которая никогда не была вполне моей, да, но все-таки можно было терпеть?</p><p class="p1">Пить хочется, спать хочется, уснуть не могу. Господи, Господи, слышишь ли ты меня?</p><p class="p1">Самая темная ночь бывает перед рассветом, но на этой станции никогда не бывает рассвета.</p><p class="p1">Да, ничего не поделаешь, иногда надо почувствовать и что-то такое. И если вы думаете, что это дно, — ошибаетесь, дна нет.</p><p class="p1">Все-таки я не понимаю, зачем я здесь вышел.</p><p class="p1">Но с другой стороны, разве еще в поезде ты не понимал, зачем ты вышел?</p><p class="p1">Мир и есть именно то, что ты видишь сейчас, та его изнанка, которую ты предпочитал не видеть, но надо понимать и это — то, что кругом всегда была и будет одна эта станция.</p><p class="p1">Честное слово, было бы легче, если бы это была огромная пустая степь, черная ночная степь, с первыми заморозками, с мохнатыми звездами.</p><p class="p1">Но это не степь, а станция, чужая станция в маленьком городе, с изрезанными скамьями, с усталыми, бесконечно чужими, злыми, темнолицыми, несчастными людьми.</p><p class="p1">И неужели вся правда была в том, чтобы стать одним из них?</p><p class="p1">И неужели все они проходят «Квартал»?</p><p class="p1">Между прочим, очень возможно. Представь себе эту станцию как место встречи на пути, в конце которого Here Comes Everybody.</p><p class="p1">А в общем, все они проходят «Квартал», только не всегда знают это.</p><p class="p1">Стало ли тебе легче?</p><p class="p1">С этой мыслью усни на изрезанной лавке, на чужой станции, в три часа ночи, в Час Уязвимости. Видишь, ты выпал отовсюду, теперь и уязвимость не властна над тобой.</p></span><span id="id94"><div class="title2">
<p class="p">14 октября</p>
</div><p class="p1">На попутках или на ближайшем поезде добираемся до приморского города, а оттуда — до моря.</p><p class="p1">Снимаем комнату у моря, это сейчас дешево, не сезон.</p><p class="p1">Осматриваемся.</p><p class="p1">Проходим по главной улице, по опустевшему осеннему базару, по берегу. Вроде бы никого нет. Не следят? Не следят.</p><p class="p1">Никому не звоним. О нашем местопребывании никто не должен знать. Телефон выключаем. В сеть не заходим. Вечером долго пьем кофе в ближайшем кафе на берегу, смотрим, как густеет лиловая полоса на горизонте. Море спокойное, молочное, около такого моря хорошо делать предложение девушке, которая здесь живет. Она не ждет, но, в общем, не против. И тут вы ей говорите: если можно, я бы хотел остаток жизни… что-то в этом роде.</p><p class="p1">Еще у такого моря хорошо быть студентом на практике, приехать в июле, писать, допустим, в газету. А вечером сидеть в этом кафе, взять макароны с жареной колбасой, слушать, как переговариваются моряки, или рыбаки, или какие-нибудь местные дураки. Очень ценное ощущение — побыть таким же моряком, или рыбаком, или дураком. Побыть частью мира, принадлежащей при этом другому миру. Одно из самых ценных ощущений во всем прохождении: я здесь и уже не здесь. И пока я здесь, я под защитой того «там», где мое настоящее место. В случае моряка это море, в случае рыбака это рыба, в случае дурака это весь мир. А приморский город — это граница, где все эти пространства сходятся. Моряк уйдет в море, рыбак уйдет за рыбой, дурак уедет в другой город, потому что он дурак.</p><p class="p1">Сидя в кафе, производим последний подсчет.</p><p class="p1">Вы небось уже и забыли, как это делается.</p><p class="p1">Берем свой рейтинг активности, умножаем на 3.</p><p class="p1">Получаем некоторый час суток.</p><p class="p1">Завтра в это время надо будет выйти к морю, и это последнее, что прописывает вам «Квартал».</p><p class="p1">Дальше делайте что хотите. На вершине все тропы сходятся, и по какой тропе вы будете спускаться — совершенно неважно.</p><p class="p1">Вам все еще нужны деньги?</p><p class="p1">Вот видите. Я же говорил.</p><p class="p1">Вам нужно теперь только совершенство, до которого остался один шаг.</p></span><span id="id95"><div class="title2">
<p class="p">15 октября</p>
</div><p class="p1">В назначенный час выходим к морю.</p><p class="p1">Ровно двадцать пять минут и ни минутой меньше сидим на берегу.</p><p class="p1">Раздеваться или не раздеваться — ваше дело.</p><p class="p1">Заходим по пояс.</p><p class="p1">Некоторое время стоим, смотрим. Мелкие волны, густая зелень осенней воды, одинокая чайка с любопытством смотрит на всю эту чушь, включая нас.</p><p class="p1">Закуриваем. Смотрим по сторонам. Желтый берег, сухие глинистые склоны, чуть слышный шорох.</p><p class="p1">Что это шуршит? Это мир шуршит. Может быть, преследуя нас, он докатился до моря, а дальше ему хода нет. Я всегда воспринимал море как живое существо. Оно не впускает кого не надо. И вот мир следом шуршит, скатываясь по склонам. Может быть, он досадует, что мы оторвались. Может, он умоляет вернуться.</p><p class="p1">Отворачиваемся от берега: чего мы там не видели?</p><p class="p1">Дальше все зависит только от нас. Дальше — пространство личного выбора, ничем не омраченное, вольное, прелестное. Можно поплыть и куда-нибудь приплыть, можно утонуть, хотя это ужасный моветон, а можно выйти на берег обновленным, словно из купели, и начать новую жизнь. Нам совершенно все равно, мы всё попробовали, всё сделали, а ведь у человека, который все это сделал и которому действительно все равно, жить или умереть, обязательно будут деньги.</p><p class="p1">Хотя, в общем, какая теперь разница.</p><p class="p1">Что это зажато у нас в кулаке? А, это Последний артефакт. С ним связано последнее действие.</p><p class="p1">Выбрасываем Последний артефакт.</p><p class="p1">Глубоко вздыхаем. Он нам трудно достался. Ничего, теперь он занял свое место.</p><p class="p1">Долго смотрим в ровную, зеленую даль моря, туда, где оно почти сливается с таким же зеленоватым вечерним небом.</p><p class="p1">Вы пришли.</p><p class="empty-line"/><p class="p1"><em><strong>Москва — Артек</strong></em></p><p class="p1"><em><strong>1973–2013</strong></em></p></span></span>
