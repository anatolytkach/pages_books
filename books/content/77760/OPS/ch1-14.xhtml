<span><span id="id35"><div class="title2">
<p class="p">16 августа</p>
</div><p class="p1">Сегодня будем разбираться с наблюдателями.</p><p class="p1">Вероятно, мне следовало вас предупредить заранее. Но когда предупреждаешь, человек впадает в тоску и ждет ужасного. А я считаю правильным преодолевать трудности по мере их возникновения. На определенном этапе, примерно после месяца занятий «Кварталом», у вас с высокой долей вероятности появится квартальный надзиратель.</p><p class="p1">Подумайте сами: технология, описанная в «Квартале», возникла не на голом месте. Она включает в себя годы наработок, в том числе кремлевских, и десятки деталей чужого опыта, в том числе олигархического. Естественно, когда столько сложных техник сведено воедино, как в борьбе самбо, возникает интерес к пользователям, не вполне бескорыстный. Их начинают либо опекать, либо аккуратно останавливать. Любой, кто занимается «Кварталом», вовлечен в тонкую сеть, она серьезней любых спецслужб, большинство людей бродят по ней, как в лесу, не видя и не понимая закономерностей, но есть и те, кто следит за происходящим. Кто умеет думать.</p><p class="p1">Вы же не сомневаетесь в том, что настоящая политика не публична, а закулисна? Точно так же и деньги делаются не в бизнесе, являющемся только ширмой, и не путем их зарабатывания: сколько можно заработать, вы, слава богу, знаете по собственному опыту. От трудов праведных не наживешь палат каменных и т. д. Действия, которые совершаем мы с вами в рамках «Квартала», абсурдны только на первый взгляд — да и то не более абсурдны, чем какой-нибудь Петербургский экономический форум. Вы становитесь объектом интереса настоящих наблюдателей с того момента, как покупаете «Квартал». Или, точней, три «Квартала», как я вам и рекомендую. Ибо это означает, что намерения у вас серьезные.</p><p class="p1">Наблюдают не за всеми. На всех читателей «Квартала» просто не хватило бы наблюдателей, поэтому нужно было выбрать самых перспективных. Возможно, вы не попали в их число, но кто знает. Это началось еще в книжном магазине, не без помощи продавцов. Для большинства «Квартал» — забавная игра, новый способ отвлечь себя от вечной скуки. Они мне неинтересны. Если вы принадлежите к их числу и держите сейчас свой единственный экземпляр, можете сегодня ничего не делать и вообще не беспокоиться. Вы неинтересны не только мне. Впрочем, можете читать — интересно же, что я там еще придумаю, правда? Да и вообще интересно смотреть, как другой получит деньги. Есть люди, которые сами не любят играть в компьютерные игры, а любят смотреть, как другие играют. И нервы щекочет, и ответственности никакой; когда монстр выпрыгивает из-за угла, они честно вздрагивают. Искренне переживают, когда чудовище вонзает зубы в героя. При этом они, в отличие от игрока, избавлены от сознания собственного бессилия, когда герой тридесятый раз гибнет на тридевятом уровне. А осознание бессилия ближнего, которое они испытывают, вполне ласкает. Зато, когда герой, победив всех, получает голую принцессу или вожделенный космолет, это игроку, а не зрителю играют гимн. Это игрок, а не зритель улетает с проклятой планеты в предвкушении возвращения домой или новых свершений.</p><p class="p1">Итак, вы купили три «Квартала» и в этот самый момент на три месяца попали в мое распоряжение и под чье-то наблюдение. Может быть, вражеское. Может, нейтральное. А может быть, мое. Но помните, что даже из тех, кто послушно начал прохождение, многие уже сошли с дистанции. А как начинали! Увлеченно занимались нехитрыми вычислениями, чертили карты, отгадывали литературные загадки. Но в одно прекрасное утро книга открылась на задании, которое оказалось не по силам. Кто-то так и не смог разругаться с любимыми. Кто-то пожалел старую вещь. Кто-то просто не способен к систематическому выполнению упражнений. И вас оставалось все меньше, как злополучных негритят. Так что наша задача упрощалась. Не ошибусь, если скажу, что на данный момент наблюдают примерно за каждым десятым читателем.</p><p class="p1">Вы мне не верите, я чувствую. Вы не верите, что человека можно найти вот так просто и так же просто за ним следить. Вы искренне уверены, что никому не нужны. Это важная составляющая часть той депрессии, в которой вы и решили взяться за «Квартал». Но вы нужны, нужны — если только это вас не вгонит в еще горшую депрессию. Если у вас хватило глупости трепаться о «Квартале» в Сети, будьте уверены: те, кому надо, уже знают, какую вещь вы отнесли на свалку 19 июля.</p><p class="p1">Ничего страшного, никто не лезет к вам в дом. За закрытыми дверями вы все еще в безопасности — можете спокойно жрать по ночам, мастурбировать, смотреть телевизор. Но вот остальное…</p><p class="p1">Сегодня вы должны вычислить хвост.</p><p class="p1">Если он есть.</p><p class="p1">Прежде чем начнете, запомните одну вещь: наблюдатели не станут вам помогать. Они не знают ничего о вашем сегодняшнем задании. Они не читают «Квартал». У них своя книга и своя игра. Не надейтесь с ними договориться. Учтите, что за вами могут наблюдать как мои люди — те, кто уже прошел «Квартал» раньше, или просто те, кто мне симпатичен, — так и совсем другие люди. Они не любят людей «Квартала» и не считают, что я должен делиться с кем-либо квартальными технологиями.</p><p class="p1">Как же вам узнать, кто за вами следит — свои или чужие?</p><p class="p1">Это очень просто, но всему свое время.</p><p class="p1">Выходите из дома. С собой возьмите для отвода глаз артефакт № 7 (Вещь, которая вдвое меньше пачки сигарет) и кусок колбасы. Если нет колбасы, можно сыра, если нет и его, берите хлеб. Если в доме и хлеба нет, просто делайте вид, что у вас в руке еда. Ведите себя естественно. Наблюдатель не должен догадаться, что вы ищете его. Внимательно осмотритесь возле подъезда. Видите кого-то? Возможно, это наблюдатель. Или нет. Надо проверить. Помните, что наблюдателем может быть и тот, кого вы знаете: дворничиха, собачник, соседский мальчик — эти противнее всего. Как узнать, наблюдатель ли это? Очень просто: если он за вами наблюдает, скорее всего это наблюдатель. Если у подъезда никого нет, идите дальше, пока не встретите вероятного шпиона.</p><p class="p1">Заметив что-то подозрительное, не подавайте виду. Не надо кидаться на дворника, крича: «Кто тебя послал?» — есть вероятность, что в ответ пошлют вас. Первым делом нужно убедиться, что это то, о чем вы подумали. Здесь вам пригодится колбаса. Притворитесь, будто ищете животное, — это даст вам возможность беспрепятственно смотреть по сторонам, и чем активнее, тем лучше. Оглядываясь, не переставайте звать кота. Лучше каким-нибудь убедительным именем: Барсик — неестественно, сгодится Кузя или Федя. Или что-нибудь совсем изысканное: Герцог, Окрошка, Суперфосфат. «Герцог-Герцог-Герцог…» Внимательно, но осторожно поглядывайте на возможного наблюдателя. Если он смотрит на вас слишком пристально или же слишком демонстративно отвернулся, скорее всего это действительно слежка. Дождитесь любого кота, отдайте ему колбасу и идите дальше. Для остальных: если за вами идет кто-то, кроме кота, возможно, это хвост. Если перед вами — хобот. Такое в слежке тоже используется, см. 16 июля. Дойдите до магазина и пройдите мимо несколько шагов, затем, будто что-то вспомнив, развернитесь и войдите в магазин.</p><p class="p1">В магазине расслабьтесь. Наблюдатель за вами не пойдет, не дурак же он, так что у вас есть несколько минут наедине с собой. Если только вы не ошиблись в предположениях — возможно, наблюдатель ждал вас в магазине. Говорю же, я не могу вам ничего подсказывать, потому что сам не знаю. Вообще в умеренной паранойе нет ничего страшного. Я бы даже сказал, что параноик — самый умный из психов, потому что не так уж он и неправ. Если вы живете с чувством, что на вас все время устремлен чей-то пристальный взгляд, вам, во-первых, не придет в голову делать некоторых вещей, а во-вторых, вам легче будет и самому смотреть на себя со стороны, как бы глазом наблюдателя. Вы уже ощущаете себя не игроком, а героем, вам не хочется разочаровывать зрителя, вы будете жить так, чтобы на вас по крайней мере было интересно смотреть.</p><p class="p1">Если вы умны, вы уже подумали, что ваша задача сегодня не просто вычислить наблюдение, но и доказать, что вы стоите его. Только не надо снимать штаны посреди магазина или запевать гимн (и одновременно тоже не надо) — это скучно, а главное, всегда понятно, когда человек снял штаны искренне, потому что в самом деле именно в этот момент попросту не мыслит себя в штанах, а когда он банально хочет привлечь внимание. Вы и так все время включены во что-то: неожиданные события, странные встречи, внезапные совпадения. Вы можете быть совершенно заурядны, но вдруг посреди шумного города вечером встречаете ежа. И наоборот: выкрасьте волосы в зеленый и перемещайтесь исключительно на руках, но ежа вы никогда не встретите даже в лесу. Еж умный зверь, он знает про вас всё. Тут вообще особые правила. Один бегает с утра до вечера, выдумывает штуки, занимается благотворительностью, не пропускает ни одной премьеры. Но ТАМ на него не смотрят. Другой приезжает с работы и садится за компьютер, но его ни на секунду не отпускает внимательный, нетерпеливый взгляд, потому что вот он сидит себе, играя в виселицу, и вдруг звонит телефон, кто-то ошибается номером, но оказывается, что эти двое прямо сейчас зачем-то кому-то нужны, и вот он уже едет, и все это тянет за собой цепь неких событий. Из каких вы? Мы это узнаем.</p><p class="p1">Купите что-нибудь нелепое вроде десятка яиц. Это если вы в продуктовом магазине. Если вы все это время стояли в магазине электротоваров, можете выдохнуть — с вами все в порядке. 95 % оказываются в продуктовом, с ними еще работать и работать. А вас я обрадую: с большой долей вероятности вы в числе наблюдаемых. В самом деле, кто при словах: «Зайдите в магазин» — попрется в электротовары? Именно это я и имел в виду, рассказывая вам сказки про ежей. Так что купите гвоздей — лучше десяток: в доме пригодится.</p><p class="p1">Итак, с гвоздями или яйцами выходите из магазина. Проверьте, вышел ли кто за вами. Проверьте, там ли еще тот, кто шел за вами от места кормления кота. Проще всего это сделать, укладывая покупки, — можно даже задержаться в дверях, блокируя выход. Если вы все еще не видите никого подозрительного, ваши шансы падают. У магазина за вами бы обязательно наблюдали. Но не расслабляйтесь, я уверен, что вы не слишком внимательны. Двигайтесь дальше туда, куда вам надо, если никуда не надо, идите на север. Книга в одной руке, артефакт в другой, гвозди в кармане, яйца в сумке. Внимание: если вы заметили хвост или хобот, вы должны с ним заговорить.</p><p class="p1">Поравняйтесь с ним. Протяните артефакт — он вряд ли что-то заподозрит, привык к тому, что вы периодически совершаете странные действия с неожиданными предметами. Если он слишком удивится, либо он хороший актер, либо не наблюдатель. Теперь произнесите следующий текст:</p><p class="p1">— Возьмите, пожалуйста, у меня эту вещь. Мне положить некуда, а выбросить жалко. Я вот яйца (гвозди) купил, и книга у меня. Возьмите, не бойтесь. Положить некуда, а так хорошему человеку достанется. Я же вижу, что вы хороший человек. Я бы плохому не предложил. Возьмите вещь.</p><p class="p1">Продолжайте убеждать, пока он (она) не согласится или не убежит.</p><p class="p1">Если взял — то это наш.</p><p class="p1">Если убежал — то это не наш, не мой, и, значит, за вами следят с той стороны. Это плохо, но и почетно.</p><p class="p1">Во время разговора наблюдайте за реакцией, но не забывайте поглядывать по сторонам — не исключено, что вы ошиблись и кто-то другой спокойно следит за вами с безопасного расстояния. Я не могу вам давать подробных подсказок, потому что не знаю, как себя поведет ваш наблюдатель. Здесь в кои-то веки действительно многое зависит от вас, вам отвечать на вопросы и вам делать выводы. Я могу только направлять и советовать, хотя и это мне уже надоело, я-то уже не только вычислил своих сторожей, но и скрылся от них там, где они меня какое-то время не достанут, по крайней мере не сегодня.</p><p class="p1">Если вам это удастся, то есть у вас возьмут вещь, — вечером с вами произойдет что-нибудь необычное. Если нет, не огорчайтесь. Впереди еще много дней, наблюдатель непременно где-нибудь проколется. Чтобы дать вам дополнительный стимул, скажу: если вы вычислили наблюдателя, он выбывает, а у них там, между прочим, ставки повыше.</p></span><span id="id36"><div class="title2">
<p class="p">17 августа</p>
</div><p class="p1">Снился ли вам город?</p><p class="p1">Если еще не снился, ни чего страшного. Впереди еще два дня.</p><p class="p1">Сегодня все просто.</p><p class="p1">Перепишите от руки или перепечатайте на компьютере три текста.</p><p class="empty-line"/><p class="p1">1.</p><p class="p1">Сразу после этого жизнь в городе изменилась. Это почувствовали все, хотя не все говорили вслух. Нет, все было на первый взгляд как обычно, магазины работали, машины и автобусы толкались на перекрестках, люди спешили на работу или шли не спеша по тротуарам. Но жизнь изменилась, и это было несомненно. Как будто из общего хора пропал какой-то один звук, такой, которого не замечали, пока он звучал, — как не замечают иногда услужливого друга, но стоит ему исчезнуть, как все ощущают: чего-то больше нет. Все чаще по ночам стали видеть странных людей — всегда одиночки, они шли ровно, глядя прямо перед собой, а потом вдруг останавливались на месте, поднимали глаза к небу и издавали долгий отчаянный, горестный крик, от которого кровь стыла в жилах. Потом они шли дальше, все той же неестественно ровной походкой, скрывались в переулках, растворялись в темноте. И никогда не было среди них чьих-то знакомых, родичей или даже просто виденных однажды по соседству, словно они выходили из ниоткуда, чтобы прокричать свое горе в бурое ночное небо, и возвращались в никуда, унося с собой то, что недокричали. Они были — во всяком случае, до поры — безобидны, не приставали ни к кому, и все же самый вид их пугал, и горожане скоро перестали без крайней нужды выходить из дома ночами. Но никто не уехал из города, потому что ехать было некуда — другие города не существовали.</p><p class="p1">2.</p><p class="p1">Сначала на улицах появились мертвые птицы. Был конец лета, цвело что-то, чему положено цвести в августе, увядало, чему положено увядать. Август не баловал дождями, дороги, тротуары, трава газонов — все было покрыто тяжелой пылью, и повсюду в этой пыли лежали маленькие тельца. Голуби… Больше всего было их — грязных, обленившихся городских голу бей. Иногда попадались растерзанные вороны. Тревожными пятнами вспыхивали грязно-белые тушки чаек. Воробьями была усеяна вся земля. Умирали дрозды, зяблики, галки и еще такие серые птички с желтой полосой… Уже мертвые, они доставались бродячим животным или расплющивались колесами машин, превращаясь под солнцем в бесформенные высохшие лепешки из трухи и перьев. Они висели на ветвях деревьев, как дьявольские елочные шары, плавали в городских реках и прудах, чуть подрагивая — оттого, что снизу их уже объедали рыбы. Умирающие птицы падали прямо на прохожих. Еще живые, судорожно открывали клювы, задыхаясь, но скоро их глаза мутнели, и они переставали двигаться.</p><p class="p1">Комиссии не находили ответа, в лабораториях разводили руками. Птицы не были отравлены, а если это была болезнь, то не заразная, потому что не умирали поедавшие их рыбы и собаки. И люди тоже. Их очередь пришла потом.</p><p class="p1">3.</p><p class="p1">Среди них был один по прозвищу Толстомясый. Бока у него так заплыли жиром, что он не мог сунуть руку в карман. И быстро ходить он тоже не мог, и не ходил он быстро. Трудно было определить его походку: он и не плыл, и не перекатывался, и не волочил свою тушу — так про него говорили, конечно, но только потому, что не знали, как сказать вернее. Он весь был большой, круглый, чуть сплюснутый сверху, как планета, и на коже у него жили маленькие человечки. Они строили города, в городах — дома, а в домах — квартиры, там селились, заводили цветы и домашних животных. Они там любили и плакали, и когда они печалились, печалился и Толстомясый, а когда радовались, то он и сам ощущал себя легким, как воздушный шар, и мог бы вот-вот взлететь, но тут же кому-то из них становилось грустно, и грусть их снова придавливала его к земле. Какая дикость, скажете вы. Он и сам так считал, он чувствовал себя неправильным, потому что у всех вокруг человечки жили внутри, а у него снаружи. Он думал, это потому, что внутри у него слишком мало места, слишком все заполнено им самим, и даже для него самого места едва хватало, потому он и стал таким огромным. Зато я могу их видеть, утешал себя Толстомясый. Он потому-то и ходил так осторожно, так медленно, чтобы не скинуть их ненароком. Как же он не боялся мыться, спросите вы. Он и не мылся, это было не нужно ему, потому что он жил только один день.</p><p class="empty-line"/><p class="p1">Придумайте к этим трем абзацам четвертый, который свяжет их в единое повествование. Наберите на компьютере.</p></span><span id="id37"><div class="title2">
<p class="p">18 августа</p>
</div><p class="p1">Сегодня мы сочиняем песню. Человек, который может сочинить песню, всегда богат вне зависимости от того, поэт ли он песенник, композитор или просто самодеятельный бард, поющий для собственного удовольствия. Тот, кто поет от удовольствия, всегда богат и успешен.</p><p class="p1">Эта песня должна быть гимном вымышленного идеального государства — или той России, какую вы бы хотели видеть. Чужие песни использовать нельзя. В гимне должны присутствовать национальные святыни, указания на великие события истории, упоминание о главных чертах национального характера, несколько слов о местных пейзажах и картина светлого будущего.</p><p class="p1">Я тоже что-нибудь напишу — про государство, которого еще не бывало, уж будьте уверены. Скорее всего это будет гимн Квартала, моего Квартала. И вам я советую не замахиваться на гигантскую задачу — песня с трудом натягивается на гигантские задачи, — а именно написать гимн Квартала, вашего собственного, где вы живете и действуете.</p><p class="p1">Конкурс на лучший гимн мы проведем, когда встретимся, а когда встретимся — вам будет сообщено особо. Но напишем сегодня. Кто не знает нот и аккордов, пусть напоет знакомым, которые знают. Они запишут.</p><p class="p1">Чем больше непонятных слов, тем лучше. Все понятное уже есть.</p></span><span id="id38"><div class="title2">
<p class="p">19 августа</p>
</div><p class="p1">Приснился ли вам город?</p><p class="p1">Если да, то все в порядке. Сегодня у вас несложная программа: пройдитесь по Кварталу, дойдите до улицы, где вам чаще встречаются влюбленные (не знаю, как она называется на вашей личной карте), и стойте там с букетом цветов.</p><p class="p1">Подарите этот букет первой проходящей мимо старухе, сказав, что его просил передать человек, которого она знает.</p><p class="p1">На все вопросы отвечайте таинственно и уклончиво.</p><p class="p1">Если старуха не возьмет букет, что маловероятно, на ее глазах отправьте его в урну.</p><p class="p1">Если возьмет, считайте, что все ваши действия одобрены.</p><p class="p1">Если на улице нет старухи, ждите до тех пор, пока не появится. Разрешаю уйти в 19:00. Букет возьмите себе. Такой вариант означает, что вы входите в группу «Б».</p><p class="p1">Дома перепечатайте на компьютере текст:</p><p class="empty-line"/><p class="p1">Моя проблема не в том, что мне не с кем говорить, а в том, что я вообще не хочу говорить в общепринятом смысле: с какого-то момента меня не интересует обмен информацией, потому что информации хватает своей. Я хочу, чтобы собеседник развил мою мысль с того момента, на котором я остановился, — но для этого я должен сначала ему эту мысль пояснить, а он, не дослушав, предъявит мне 200 идиотских возражений на каждое слово. Я не хочу спорить, потому что любой спор означает лишь, что у нас разный опыт и что мы, возможно, не нравимся друг другу. Я не хочу выслушивать чужие истории, потому что любопытство — примета молодости. Я даже не знаю, о чем можно вообще говорить с другим человеком. Пушкин, довольно рано, с опережением войдя в подобное состояние, начал составлять table-talk — записывать сюжеты, которые можно пересказывать, когда не о чем говорить. Но тогда кого-то волновали исторические сюжеты, а сегодня на объяснение реалий придется тратить столько времени, что пуанта потонет в комментариях. С какого-то возраста — и нашего, и общечеловеческого, потому что человечество проходит все те же этапы, — разговор теряет смысл. Возможно, одна из причин в том, что коммуникация становится тотальной, к Интернету подключены все, новая информация является ко всем одновременно, делиться ею бессмысленно, потому что она всюду. Скоро эта связь — пока по желанию, а потом, думаю, и принудительно — будет вживляться в мозг, как чип. Беседа исчезнет как жанр, да и сейчас уже каждый второй ловит себя на том, что гости приходят, а говорить не о чем.</p><p class="p1">Правда, останется любимый жанр каждого — говорить о себе. Но это невыносимо, и тогда возникнет новое искусство — говорить о себе, прибегая к сложным приемам, хитрым и наивным уловкам, маскируя исповедь под пособие «Как похудеть» или «Где взять деньги». В этом жанре я сейчас и упражняюсь, но признаюсь в этом только себе.</p><p class="empty-line"/><p class="p1">Если город вам еще не снился, извините, придется пройти развилку.</p><p class="p1">Если сегодня с утра ясная погода, открывайте любой том «Войны и мира» на любой странице. Если там фигурирует Наташа Ростова, можете продолжать, а если отсутствует — увы, вам придется выбыть. Если сегодня пасмурная погода или дождь, открывайте любой том «Анны Карениной» на любой странице. Если там отсутствует Левин, можете продолжать. Если присутствует, увы, мы с вами прощаемся.</p><p class="p1">Лучшее, что могут сегодня сделать выбывшие (на будущий год, как положено, welcome), это послушать Третий концерт Рахманинова. Как показывает практика, это лучший парашют. А то кто его знает — при слишком резком торможении случаются эксцессы.</p></span><span id="id39"><div class="title2">
<p class="p">20 августа</p>
</div><p class="p1">Сегодня мы варим суп.</p><p class="p1">На вопрос, зачем это надо, я мог бы ответить эзотерическим образом. Эзотерический ответ заключается в том, что все знают, как звучит хлопок двух ладоней по мягкому месту, но никто не видел, куда дует ветер, а потому делай, идиот, что тебе говорят. Я мог бы ответить вам демагогическим образом, поясняя, что обработка и соединение разных ингредиентов — основа жизни, а потому приготовление супа — лучшая школа успеха. И это объяснение, я вот сейчас подумал, не лишено логики. Проблема в том, что большинство действительно успешных людей — скажем, Уинстон Черчилль или Квентин, мать его, Тарантино — в жизни своей не варили супа, однако нельзя сказать, чтобы их жизнь из-за этого сложилась вовсе уж бездарно. С другой стороны, множество мужчин и женщин варили суп, не получив в результате ничего, кроме супа, и то сомнительного качества. Поэтому мы варим суп потому, что нам нужен сегодня суп, без всякой задней мысли.</p><p class="p1">Этот суп называется «МЕЧТА».</p><p class="p1">Для него нам понадобятся непростые, редкие ингредиенты, но он того стоит. Я ел его единственный раз в жизни и до сих пор не могу забыть. К счастью, мне удалось списать рецепт, которым я и делюсь с вами. Щедрость — в этом я весь.</p><p class="p1">Для приготовления супа нам понадобится: 0,5 килограмма говядины, два сушеных трепанга (если есть натуральные, только из моря, это еще лучше), десяток ягод ежевики, стакан чечевицы красной марокканской, пряности (прежде всего мускатный орех), три спелых артишока, немного изобретательности и терпения.</p><p class="p1">Для начала варим крепкий говяжий бульон из расчета 0,5 кило мяса на полтора литра воды. Подготавливаем трепанга. Сушеный трепанг отмывается от угольной пыли (при помощи которой сушится), разрезается, чистится от внутренностей и укладывается на сутки разбухать в холодную воду. Каждые 8 часов воду надо менять. Хлопотно, но не огорчайтесь — результат того стоит. Впрочем, если у вас нет под рукой сушеного трепанга… Вот так всегда! Нужен трепанг, а его нет. Не огорчайтесь, можно взять вместо него превосходную, не слишком жирную атлантическую рыбу нототению. По вкусу и свойствам она почти тот же трепанг. Вообще этот трепанг, я вам скажу, один пиар. Ничего особенного. Только сказать в застолье: а я ел трепанга! И что? Для здоровья, говорят, хорошо, но для здоровья пусть едят больные. Мы едим нототению по 120 рублей за килограмм с доставкой практически в любой район без головы, то есть она без головы, свежезамороженная. Нототению размораживаем, разделываем, отвариваем в уже заблаговременно имеющемся у нас мясном бульоне. Так отваривали бы трепанга, а так нототению. Спроси у бульона, какая ему разница, и он ответит: пфф.</p><p class="p1">Давим с лимонным соком 10 ягод ежевики. Она должна быть свежая, мороженую нельзя. Нет ежевики? Что ты будешь делать! Всегда, когда вот так вот нужна ежевика, ее нет. Что угодно есть, а ее нет. Ну хорошо, мы не гордые! Берем облепиху, необязательно ягоды, можно уже в виде пюре. Облепиховое пюре имеется везде, делается из расчета 800 граммов ягод на кило сахару, кладем в бульон три чайные ложки. Облепиха — здоровая, витаминная ягода, наш северный ананас, универсальная замена его в наших серых широтах. Дождливым утром в августе, когда уже скоро в школу, на работу, на пенсию, в могилу и опять по второму кругу в школу, выходишь на свой садовый участок, необратимо зарастающий, и спрашиваешь себя с бесконечной тоской: где ананас? Где, мать его тарантино, ананас, который нам обещали в школе, на работе, на пенсии и после смерти, перед новой реинкарнацией в школу? Нет ананаса! И тут, среди бесконечной серой хмари, оранжевым пятном ударяет нам в глаза куст созревающей облепихи, вся в шипах, собирать неудобно, лопается в руках. Но кто же обещал, что будет легко? И мы собираем ее дедовским способом в зонт, или на брезент, или вручную, и затираем с сахаром, и в невыносимый, почти отсутствующий зимний день едим с чаем, доказывая себе, что лето прожито не напрасно.</p><p class="p1">Хорошо. Теперь нам надо отварить чечевицу, настоящую, крупную, красную марокканскую чечевицу, ту самую, за которую было продано первородство. «Дай мне этого, этого красного!» — сказал Исав, видя, как Иаков собирается ужинать. А Исав пришел с охоты, мокрый, грязный, охота неудачна. К тому же он, как мы помним, был мохнат. Хорошо же, сказал Иаков, я дам тебе этого красного, но поклянись, что ты уступишь мне первородство! (Они были близнецы, но Исав вылез первый, весь мохнатый; представляю, как они там опупели.) Да бог с ним совсем, сказал Исав, или что-то в этом роде; он был простодушный, мохнатый. И дали ему чечевицы, и продал он первородство, и от него не убыло. Иаков же впоследствии увидел во сне лестницу, известную как лестница Иакова.</p><p class="p1">Что? Нет чечевицы? И негде взять? Как мы знаем с вами, чечевица — тот же горох. Правда, за горох не продавали первородство. Но это ничего. Подумаешь. Сказал бы: «Дай мне этого, этого зеленого». Горох есть везде. Гороховую кашу называют еще музыкальной. От гороха еще никто не умирал. В конце концов, запах супу придает не горох, а мускатный орех. Мускатный орех произрастает в небольшом архипелаге вулканического происхождения Банда. О, Банда! О, Дезирада! Как мало обрадовались мы на этот раз, увидев твои склоны, покрытые манцениловыми лесами! Откуда это? Не знаете? Неважно. Архипелаг Банда окружен морем Сулавеси, оно же Целебесское. Раньше его называли Острова пряностей. Если съесть целиком мускатный орех, в котором страшное количество амфетаминов, можно почувствовать благодатное опьянение и даже увидеть на миг что-то вроде зеленого утеса на пестрой, отражающей его глади; он весь в лесах, манцениловых лесах, и вот уже лодки туземцев устремляются вам навстречу, прекрасные полуголые туземки готовы выменять мускатный орех и что у них там еще есть на стеклянные бусы, огненную воду, ласковый взгляд, книгу «Бегущая по волнам»… благодаря которой им на миг покажется, что их остров — кусок рая, а не третьего мира… но что ты будешь делать, у вас нет мускатного ореха. Хорошо. Берем один стручок ванили, она продается в каждом супермаркете. Кладем этот стручок в суп. Варим. Не страшно. Главное впереди. Впереди артишок.</p><p class="p1">Артишок, в сущности, бутон: если бы он раскрылся, то цвел бы густо-лиловым цветом, как чертополох. Его маринуют с добавлением морской воды, близ которой он и растет: в Калифорнии, в Мексике, Испании, даже и у нас в Крыму. Он прекрасен не только вкусом, но плотностью, мягкой хрусткостью, какая бывает еще у молодого патиссона; существенная его особенность — тот концентрат радости жизни, бодрости, веры в какое-то завтра, которая в детстве дается нам без всякого артишока, но сейчас уже шалишь, брат, шалишь. Уже нужен артишок с его колючими шипами, с его морской водой. И мы режем артишоки напополам, и варим их в получившемся супе… но у нас нет, говоришь ты, нет артишока! Нет внезапного дуновения счастья, с каким разгрызаешь его крепкое донышко! Что делать? Что делать, спрашиваю я вас? Разумеется, не опускать руки. Тот дурак, кто все время требует невозможного. Всегда можно договориться. Нет артишока — есть огурец. В огурце нет счастья, пускай, хотя если долго не есть вообще ничего — то и огурец счастье. Но по консистенции, по цвету, даже по пупырышкам он вполне артишок. Нельзя вечно настаивать на небывалом. Надо ценить то, что есть, иначе всю жизнь можно вот так прождать прекрасного принца. А мы не будем ждать прекрасного принца, мы доставим себе сейчас полное удовлетворение огурцом. Мы разрежем его напополам в количестве трех штук, и все это в суп. Варить до полного отвращения.</p><p class="p1">Ну вот, пожалуйста, суп «МЕЧТА». Самые умные уже догадались, что МЕЧТА — это аббревиатура: Мускат, Ежевика, Чечевица, Трепанг, Артишок. А теперь смотри, что у тебя получилось. У тебя получился обед конформиста, потому что ты всю жизнь соглашался на замены. И вот вместо набора «МЕЧТА» перед тобой Горох, Облепиха, Ваниль, Нототения, Огурец. Аббревиатуру сложишь сам.</p><p class="p1">Жри то, что у тебя получилось. Предъявлять претензии не к кому, сам виноват.</p><p class="p1">Если у тебя по лучилась «МЕЧТА», не жди от меня поощрения, этот суп сам себе награда.</p><p class="p1">Завтра продолжим. Для тех, у кого получилась «МЕЧТА», подъем по желанию. Для тех, у кого получилось то, что получилось, подъем в семь утра независимо от погоды.</p></span><span id="id40"><div class="title2">
<p class="p">21 августа</p>
</div><p class="p1">Как вы знаете, «Квартал» не отрывает вас от основной работы. Но мне чрезвычайно интересно знать, чем вы занимаетесь, дорогой — нет, не читатель, куда почетней, — дорогой исполнитель. Ведь это ваша книга не в меньшей степени, чем моя. Так чем вы там занимаетесь, помимо нашего общего дела? Офисный вы клерк или гордый металлург? Или, может, вообще нефтедобытчик? Если вам нужны деньги, вы скорее всего работаете. Может, вы учитель? Или вообще школьник? Как бы то ни было, в наших святцах сегодня Ваш Профессиональный Праздник. Если вы учитель — то День учителя, если моряк, то День моряка.</p><p class="p1">В этот день необязательно надираться, как моряк или даже как учитель. Знаете ли вы, как пьют учителя? Дома, одни, глядя в зеркало? Есть даже виски Teachers — страшный напиток, предназначенный для людей, которым уже нечего терять. Они всё отдали детям, то есть выкинули в бездну, и теперь пьют. Но вам это необязательно. В сущности, ваша профессия ничем не лучше.</p><p class="p1">Дальше чистая страница. Напишите на ней по пунктам: «За что я ненавижу свою профессию».</p><p class="p1">За что вы ее любите — писать необязательно. Если б не любили, уже бы бросили, наверное. Но бывают же минуты, что ненавидите? Вот и выпишите, за что. Лучше всего, если этих пунктов будет не меньше десяти. Больше — тоже не надо.</p><p class="empty-line"/><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="empty-line"/><p class="p1">На обороте ничего нет.</p><p class="p1">Я сегодня добрый.</p><p class="empty-line"/><p class="p1">У меня одно время была профессия учителя (и в некотором смысле осталась до сих пор). Я ее люблю, потому что имеешь дело с молодостью и т. д., и шанс сделать подлость не так велик, и украсть нечего. Но и ненавидел очень часто.</p><p class="p1">Выписываю.</p><p class="p1">• Вставать рано.</p><p class="p1">• Много контактов с дураками, как среди учащихся, так и среди администрации.</p><p class="p1">• Платят мало.</p><p class="p1">• Приходится проповедовать вещи, в которые сам не веришь до конца, и от многих повторений они стираются.</p><p class="p1">• Престиж незначителен.</p><p class="p1">• Много приходится разговаривать, портятся связки.</p><p class="p1">• Трудно все время находиться на виду у людей, вообще все время работать с людьми, особенно с детьми.</p><p class="p1">• Много ненужной бюрократии, обременяющих документов.</p><p class="p1">• Всегда есть страх, что талантливых и любящих тебя детей ты увлекаешь на опасный путь, наш мир не для них и т. д.</p><p class="p1">• Отсутствуют перспективы роста.</p><p class="p1">• Русской литературы очень мало, она быстро исчерпывается.</p><p class="p1">• Чтение сочинений и прочих домашних работ отнимает много времени, и это скучно.</p><p class="p1">• Дети могут при первом же конфликте обвинить тебя в педофилии, и не отмоешься.</p><p class="p1">• Среди коллег преобладают рутинеры, пожилые и не очень счастливые люди.</p><p class="p1">Достаточно.</p><p class="p1">Теперь пишем — точней, придумываем — своего рода антонимы ко всем перечисленным вещам. То есть ищем ту профессию, в которой бы все обстояло ровно противоположным образом.</p><p class="empty-line"/><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="p1">______________________________________</p><p class="empty-line"/><p class="p1">Это и будет профессия вашей души — то, чем вам надлежит заниматься.</p><p class="p1">Итак, на моей идеальной работе:</p><p class="p1">• Вставать можно в любое время, лучше поздно.</p><p class="p1">• Контактов с дураками нет, вообще контактов мало.</p><p class="p1">• Платят много. (Заметьте, тут вообще обратная пропорция: чем меньше общаешься с дураками, тем больше платят.)</p><p class="p1">• Делать приходится только то, во что действительно веришь.</p><p class="p1">• Престижно.</p><p class="p1">• Можно много молчать.</p><p class="p1">• Можно много времени проводить одному, в крайнем случае среди взрослых.</p><p class="p1">• Документов никаких.</p><p class="p1">• Вредных последствий (для детей) — никаких.</p><p class="p1">• Есть карьерная перспектива.</p><p class="p1">• Круг занятий огромен, край работы непочат.</p><p class="p1">• Помимо рабочего времени, нет никаких домашних заданий.</p><p class="p1">• Педофилия исключена.</p><p class="p1">• Коллеги молоды и счастливы.</p><p class="empty-line"/><p class="p1">Подозреваю, что под все эти определения подходят только три профессии, которые бы мне в наибольшей степени подошли. Первая — оператор ракетной установки, но там возможен подъем по тревоге. Вторая — смотритель маяка, но там трудно с карьерной перспективой. Идеально совпадает только танцор танго — нанятый для ресторанов либо тренирующий богатых бездельников; вместо карьерной перспективы есть перспектива удачного брака, работа в основном по вечерам, одна моя знакомая как раз туда ходила, пока не доходилась до того, что перестала быть моей знакомой.</p><p class="p1">Вот же как крепко, черт, всё сидит в подсознании!</p><p class="p1">То есть я хочу быть тренером танго, тем, к кому он а ушла.</p><p class="p1">Надеюсь, вам повезет больше и вы не саморазоблачитесь так позорно.</p><p class="p1">21 августа объявляется днем вашей истинной профессии, которую еще не поздно освоить.</p><p class="p1">Листок из книги — тот, на который выписали десять или сколько там пунктов ненависти к своей профессии, — вырываем и жжем.</p><p class="p1">Иначе эти мерзости так и будут нас мучить.</p><p class="p1">Не смотрите, на обороте там ничего нет. Я сегодня добрый.</p><p class="p1">До конца дня позанимайтесь этой идеальной профессией. Что до меня, включаю «Roxanne» и танцую один.</p></span><span id="id41"><div class="title2">
<p class="p">22 августа</p>
</div><p class="p1">Сегодня мы будем учиться передавать мысли на расстоянии.</p><p class="p1">Это полезный навык, даже если у вас ничего не получится с деньгами, если вы вылетите на одной из развилок или — бывает — сами решите прервать упражнения, помня, чем за это заплатите. Иногда решительный поступок важней тупого послушания, и, как знать, не больше ли повезет тому, кто соскочит. Во всяком случае я его не порицаю.</p><p class="p1">Итак, телепатия. Это вещь совершенно естественная, многажды доказанная и несложная, но вокруг нее наворочено много ерунды. На самом деле эфир соединяет всех, волны в этом эфире может порождать любой, и задача лишь в том, чтобы настроиться на правильную волну. Надо войти в состояние эфира, как входим мы в состояние Квартала. Нет ничего глупее, наивней, пошлей, чем пялиться в пространство, изо всех сил повторяя заветную мысль, даже губами шевеля, — а девушка-реципиент вместо «Дай мне эту шоколадку» все равно слышит «Дай мне» и тупо ухмыляется, и, естественно, не дает.</p><p class="p1">Сколько раз я видел эту наивную мыслепередачу вроде фокусов Мессинга, сколько раз сам ею занимался — мысли были идиотские, типа «Обернись» или «Вернись», — и не понимал простейшей техники: ты можешь хоть стену пробить лбом, но работать без настройки еще глупей, чем умолять выключенный телеф он, чтобы тебе привезли пиццу. Был такой анекдот про чукчу.</p><p class="p1">Напоминаю, что при телепатии не надо повторять про себя мысль, вообще не надо вербализовать ее. Передается ощущение, желание, и уж на этой волне можно прочитать про себя какие-нибудь стихи или представить животное, если транслируется животное.</p><p class="p1">Эфир, соприкосновение с ним, выход в него — все это осуществляется на одной, довольно тонкой эмоциональной волне, называемой «печаль», но это название неточное. Это чувство, которое на острове Ифалук называется фаго, то есть сочетание любви, сострадания, невыносимой жалости, умиления, любования. На Ифалуке для большинства сложных эмоций есть простые и краткие названия. Поскольку соприкосновение с эфиром всегда вызывает в душе именно фаго, — вам надо прежде всего как-то вызвать эту эмоцию у себя, для чего хорошо подходит прослушивание песни «Белые кораблики».</p><div class="poem">
<div class="stanza">
<p class="v">Белые кора-а-аблики, белые кора-а-а-аблики</p>
<p class="v">По небу плывут,</p>
<p class="v">Белые кораблики, белые кораблики</p>
<p class="v">Дождики везут…</p>
</div>
</div><p class="p1">Это ужас что такое. Я вообще не понимаю, для какой жизни готовила людей советская власть, если накачивала их такими порциями сентиментальности. Тут был, вероятно, дальний умысел. Человек, воспитанный на «Белых корааааабликах», в результате шмякался о жизнь с такого размаху, из него так летели брызги, что потом он уже не смел рыпаться. Чем иначе объяснить все эти мультики с добрыми зайцами, мышами, ежами, все эти картинки Сутеева, все эти старческие слюни кровавой некогда страны, которая под занавес научилась действовать гораздо более тонкими методами? Ведь мальчик, воспитанный на «Белых корабликах», попадал потом в армию, в кузницу, где его мяли и плющили, и выходил оттуда со стойкой ненавистью к любой доброте. А если он был человек сильный, то отковывался, конечно, во что-то прекрасное — но только для того, чтобы потом тридцать лет ржаветь и гнить: вот так поступала с нами Родина. Вы почти достигли кондиции, ваше фаго сменилось злостью, вы почти плачете злыми слезами. Это и есть состояние местного эфира, эмоция, до которой не додумался никакой Ифалук: слезная злоба, смесь сентиментальности и ненависти, и чувство даром потраченной жизни, которая так вас обманула, что вы не верите уже вообще ничему. Вы поймали волну страны, вышли в ее кодировку. Вы ведь собираетесь телепатировать мысль соотечественнику? Вот теперь он вас услышит. Представьте его.</p><p class="p1">Представьте конкретно и точно, со всеми привычками, запахами и словечками того человека, с которым стремитесь связаться. Представьте, что он делает в это время суток. Представьте, что способно ввергнуть его — ведь вы его знаете хоть сколько-нибудь — в то самое состояние умиления и злобы. Спойте ему «Белые кораблики», а потом что-нибудь из свежего русского шансона. Есть контакт? Думайте мысль. Думайте ее не слишком упорно, а как бы между прочим, постоянно вписывая в тот же контекст умиления и злости, представляя известные вам факты его биографии, которые он вспоминает по ассоциации в минуты особо сладострастного унижения. Вспоминайте его обманутые ожидания, его попранные надежды, его отвергнутую доброту. Это наш эфир, мы все им дышим. Говорите с ним мысленно, через две-три фразы повторяя задуманную мысль. Без особенной навязчивости. Лучше всего экспериментировать со стихами. Стихи вообще хорошо ложатся на ситуации обманутой доброты, неосуществленного подвига, невостребованных дарований. Стихи в такие минуты могут вышибить слезу. Не в страхе, не в отчаянии, а в легкой похмельной раздавленности они действуют сильнее всего: «И наутро заместо примочки водянистые Блока стишки». Что Блок! — я однажды с похмелья расплакался над стихами Николая Грибачева «Осенний лист навел на размышленья», но, правда, это было очень сильное похмелье.</p><p class="p1">Как узнать, подействовало ли? Очень просто. Позвоните ему вечером или напишите, и спросите, какие стихи вспоминались ему сегодня в то самое время, когда вы с ним связывались. Или еще проще. Он ведь может не признаться. Он впал в ту эмоцию, которой принято стыдиться. Тогда ладно. Тогда вы просто почувствуете в ответ от него волну необычайно сильной, химически чистой, обжигающей ненависти — той ненависти, которая уже похожа на любовь; мы и принимаем ее чаще всего за любовь к Отечеству. Потому что как же не любить Отечество, способное вызвать у нас чувство такой силы? Вот эта волна жгучей ненависти непременно должна дохлестнуть до вас, и это значит, что вы попали в точку. Вы попали в точку, блядь. Все у вас получилось, даже если он потом не признается.</p><p class="p1">Ну, а если ничего не получилось — подумаешь. Это тот случай, когда нам важен процесс, а не результат. Вашу способность к телепатии мы еще потренируем. Например, прямо завтра. Спокойной ночи.</p></span><span id="id42"><div class="title2">
<p class="p">23 августа</p>
</div><p class="p1">Сегодня, как и обещали, мы еще раз проверим вашу способность к телепатии. Как известно, мысль можно передать не только, так сказать, живьем, но и с помощью НЛП. В следующем тексте при помощи новейших приемов НЛП закодировано то, что вы должны сегодня сделать. Прочитайте этот текст внимательно три раза. Моя мысль станет вам абсолютно ясна. После этого идите выполнять задание, а вечером вы узнаете, получилось у вас или нет.</p><p class="empty-line"/><p class="p1">Письма счастья — это не так просто: сама идея писем счастья восходит к Средним векам, это первая в истории человечества попытка построить сеть связи и взаимопомощи. В письме счастья заложен фильтр: те, кто не будут его переписывать, не нуждаются в контактах с окружающими, а значит, в сети они не нужны. Письмо счастья пишется не ради выгоды или потехи, но с гораздо более высокой и значимой целью: вовлечь всех людей в выполнение некоей бессмысленной задачи. Задача в самом деле бессмысленна — с человеческой точки зрения, — но о конечных ее целях нам ничего неизвестно. Возможно, когда письмо обходит мир, выделяется неизвестный нам вид энергии. Сама идея «сделать что-то и ждать счастья» более глубока, чем все наши попытки добыть счастье личными силами. Скажу больше: иногда в том, чтобы купить себе электронные напольные весы, больше смысла, чем в том, чтобы купить продукты на неделю.</p><p class="p1">Представьте себе, что вы получили письмо счастья (или его рекламный вариант) с предложением, а то и требованием немедленно приобрести электронные напольные весы. Они вам совершенно не нужны, и весь ваш день уходит на попытку расправиться с этой абсурдной идеей, избавиться от связанных с ней обсессий и страхов. Зато насколько проще было бы сразу купить себе электронные напольные весы! Ведь эта реклама пришла к вам не просто так, и, возможно, кому-то действительно виднее, нужны вам электронные напольные весы или нет. Нет ничего плохого, опасного, рискованного в том, чтобы приобрести электронные напольные весы. Я тоже думаю, что вы должны купить себе ЭЛЕКТРОННЫЕ НАПОЛЬНЫЕ ВЕСЫ. Лично я уже купил себе ЭЛЕКТРОННЫЕ НАПОЛЬНЫЕ ВЕСЫ. Один человек решил, что ему не нужны ЭЛЕКТРОННЫЕ НАПОЛЬНЫЕ ВЕСЫ, и где теперь этот человек? Другой купил себе ЭЛЕКТРОННЫЕ НАПОЛЬНЫЕ ВЕСЫ, и все мы знаем этого человека. Чем наивней рекламная технология, тем она действенней.</p><p class="p1">По сути, не только вся реклама, но и вся литература — письма счастья. Веди себя так-то и так-то, и счастье будет. Иногда это, кстати, работает — не потому, что вы себя так-то и так-то ведете, но потому, что само это предписание какого-то дурня, смеющего вам советовать, приводит вас в состояние такого гневного упоения, что вы начинаете совершать интуитивно верные поступки, — и происходит счастье.</p><p class="empty-line"/><p class="p1">Теперь можете посмотреть на следующую страницу.</p><p class="empty-line"/><p class="p1">С помощью новейших методов НЛП я внушал вам мысль о необходимости приобретения электронных напольных весов. Конечно, старая наивная НЛП исходила из того, что послание надо тщательно зашифровать. НАПример, говорить о том, что си-бемОЛЬНЫЙ вальс Шопена ИЛИ, К примеру, ТРОННЫЕ вариации Сальери (которых он сроду не писал) производят в голоВЕ СЫновние чувства в Отечеству, — и такими комбинациями пудрить мозги читателя пять раз подряд. Но это глупо, неэкономно и как-то нечестно. Современная НЛП считает, что читатель ненавидит рекламу, и самый верный способ что-нибудь ему втюхать, от идеи до продукта, — это всячески эту идею/продукт развенчивать. Но дудки. Самый современный читатель уже ловится на этот прием. Он думает: ах, так? Вы мне льстите? Вы пытаетесь мне доказать, что я нонконформист? Нонконформисты больше не в моде. Я прагматик. Плевал я на ваши ухищрения. Пойду сейчас и в знак протеста против протеста куплю НАПОЛЬНЫЕ ЭЛЕКТРОННЫЕ ВЕСЫ.</p><p class="p1">Что и требовалось доказать. Они нам завтра понадобятся.</p><p class="p1">Если вы их купили, значит, телепатия у вас есть.</p><p class="p1">Если нет, значит, нет у вас никакой телепатии.</p><p class="p1">С дистанции не снимаю, но пойдите-ка вы отожмитесь двадцать пять раз.</p></span><span id="id43"><div class="title2">
<p class="p">24 августа</p>
</div><p class="p1">За сегодняшний день вы должны сбросить 2 килограмма.</p><p class="p1">Прописью: два.</p><p class="p1">Как? А я почем знаю. Я уже сбросил, «Квартал» прошел, мне совершенно неинтересно, как лично вы будете решать эту проблему. Минус два кило, плюс деньги. А что, вы так и ждали, что все три месяца будете передавать на расстояние сомнительные мысли и смотреть любимые фильмы? Мы вступаем в центральный период «Квартала», оказываемся на его, так сказать, острие. Тут будут задания вполне выполнимые, но трудные. В том числе физически. Деньги не любят прагматики, а внешне бессмысленные, но эффектные действия они очень даже любят. С таким весом, как сейчас, наш верблюд не пройдет в игольное ушко. Даже если вы девушка и весите сорок килограммов, кожа да кости, помните, что нет предела совершенству. Хотите денег? Легко. Минус два кило.</p><p class="p1">Есть много способов, я охотно ими поделюсь, если угодно. Но помните, что прежде всего весы. Вы встаете на них, как только просыпаетесь. Вечером — хорошо, в полночь, — вам (весам) должно полегчать на два килограмма или более. Но не менее, это условие непременное. Весы лучше берите электронные, дешево и точно. И в любом случае пригодятся. Я не могу и не хочу вас контролировать, просто поймите, что если сброшенный вес будет меньше двух, выбываете вы однозначно и окончательно. До следующего раза.</p><p class="p1">Первый вариант, самый элементарный, — принять хорошее слабительное или попросить клизму. Клизму попросите в ближайшей поликлинике, или еще центры специальные есть клистирные. Говорят, там за один день могут так очистить организм от калового камня, что вы лишитесь не двух, а трех-пяти килограмм. Правда, это уж я не знаю, сколько надо иметь этого калового камня в организме. Но там очень все культурно, во время промывания, говорят, можно даже газету читать. Другой путь — гречневая каша, пресная, без крупицы соли, но если как-то правильно ею питаться, то за день два кило уходят, она то ли влагу абсорбирует, то ли как-то особенно очищает. Третий вариант — огурцы: стандартная огуречная диета, опять же без соли, и воды сколько хошь. Четвертый путь — вообще ничего не есть, но постоянно пить напиток: чашку черного чая завариваем литром кипящего молока, и от этого почему-то два кило пропадают за сутки. Но самый надежный вариант — это, конечно, бег или велосипед. Сейчас еще лето, давайте-давайте. Можно пробежать хипстерский марафон, присоединиться к любому беговому клубу — их сейчас миллион, все бегают, по-доброму друг над другом подтрунивают, счастливый средний класс. Я почитал как-то про них репортаж: мама дорогая, сколько самодовольства! Это самодовольство, видимо, как-то их особым образом наполняет, словно гелий, и они приподнимаются над землей. Но вам же с ними не детей крестить. Один день побегаете, ничего страшного. Не хотите бегать — можно просто стоять, тоже вес теряется. Попробуйте вечером сказать публичную речь, прочесть лекцию, дать концерт — тоже уходит килограмм-полтора, остальное сбросите за счет клизмы. После клизмы публичная речь особенно хорошо идет, а можно наоборот — сказать речь и в награду попросить клизму. Еще надежней, конечно, футбол: тут при хорошей игре можно сбросить до четырех кило. Можете сходить в баню — говорят, опять же с потом выходит кило-полтора, а если при этом не есть! Можно еще трахнуть кого-нибудь в бане (мужской вариант), но рискованно — давление, перегрузка… Любые спортивные игры на свежем воздухе. Можете просто весь день ходить по Кварталу и ничего при этом не есть, пить сколько угодно, а если станет совсем невтерпеж — лимонный сок с ложкой меда. Хорошо также отжиматься, но мы и так это часто делаем.</p><p class="p1">Все, хватит читать, пошли худеть. В полночь встретимся.</p><p class="empty-line"/><p class="p1">Сбросили? Поздравляю. Чувствуете колоссальное облегчение? Ура. Не вздумайте бежать к холодильнику и быстро нажирать все это обратно. Тогда ничего не засчитывается. Спокойно ложитесь спать, выпив пустого крепкого чаю или выкурив сигарету, чтобы голод не мучил. Впрочем, он вас уже и не мучит — вы сыты сознанием победы.</p><p class="p1">Не сбросили? Ничего страшного. Зато остались верны себе.</p><p class="p1">А нам, в отличие от дона Рэбы, верные не надобны.</p></span><span id="id44"><div class="title2">
<p class="p">25 августа</p>
</div><p class="p1">Итак, 25 августа. До конца лета осталось всего ничего, но это ничего многого стоит. Скажи, друг мой, ты уже чувствуешь синдром последних минут? Это когда до конца остается несколько дней, и ты уже как будто бы там, за? А помнишь 25 августа и твои одиннадцать лет? Не сегодня-завтра возвращаться домой из деревни или с дачи, потому что перед школой еще надо всего столько — закупить учебники, тетради, разноцветные канцтовары, форму померить, там еще медосмотр, ежегодная утомительная суета. И вот ты идешь по даче, по любимым местам, как в последний раз, а может, и в последний, и все уже как будто чужое. И уже такой холодок вокруг — не от близкой осени, а от этого именно отчуждения. Звуки не те: когда лето, то даже тишина звучит, а теперь все глухо. Хотя есть отдельные островки человеческого шума — там голоса, тут стукнет, то ли сосед что-то приколачивает, то ли дятел долбит, — но они больше не сливаются в оркестр дачного лета. Все по отдельности, вот в чем штука. Каждый умирает в одиночку. Умирание — дело сосредоточенное.</p><p class="p1">Вы все уже друг другу чужие, а некоторые уже переоделись в городское, а которые не переоделись, так все равно по ним видно, что оно уже у них разложено и приготовлено. Они тоже уже все одной ногой в городе и приветливы вроде, а опять холодок. Хотя уезжать еще только завтра. Но все уже как будто не с тобой. Ничего без тебя никуда не денется, птицы без тебя не замолкнут, и розы не засохнут, и так далее — чья песня? Не знаешь, и черт с тобой, в одиннадцать лет можно не знать.</p><p class="p1">Камень у поворота, колодец — не ближний, а дальний, где, говорят, алкаш дядя Сережа утонул, выдумки, конечно, и кто его вообще когда видел, дядьсережу, но за водой туда не ходят, он вообще забит гвоздями, зато там тусуются все, а сейчас никого, все уже в город уехали. На пруд можно сходить. Вода черная, кто-то плавает в глубине, жучки водяные, пиявки есть. И все уже тебе совершенно чужие. И от этого как-то ужасно щемит, хотя, казалось бы, уж о пиявках-то жалеть! Это ты потом поймешь, как оно бывает: когда тебя все кинули, и последний остается — вроде и пиявка человек, и ничтожество, а обидно отпустить. Браться ни за что неохота, потому что… Ты еще сам не знаешь почему, ты еще маленький. А потом поймешь: потому что это трепетное состояние, когда канат еще держит, но уже рвется волосок за волоском, — оно не терпит суеты, и его жалко нарушать приключениями. Поэтому ты не полезешь в заброшенный сарай, вокруг которого все лето ходил кругами, и не свернешь с дальней тропинки направо вместо привычного налево-к-пруду, да Бог знает, что ты еще собирался сделать и не сделал. В общем, завтра уезжать, а еще столько мест неоткрытых.</p><p class="p1">Или так: если тебя не возили никуда в детстве, ты, допустим, в городе сидишь и ниоткуда не уезжаешь, ничего не покидаешь, но наступление этого дня чувствуешь — когда вдруг останавливаешься и говоришь себе: а лето-то ёк! И ты уже — раз, и вроде как уже вышел из лета, потому что оно все равно уйдет, а ты останешься. Когда маленький, каникул еще не так жалко. Но асфальт уже пахнет иначе, и кусты во дворе тоже другие. Тут, в городе, наоборот: народу становится много, все приезжают, и тоже обидно — вот всё было твое, а теперь вон по твоим дорожкам Машка бегает, загорелая, противная такая. А сколько еще не сделано и в такой толпе уже не получится! Теперь жди, пока все разъедутся опять на следующий год.</p><p class="p1">И главное, сам момент перехода опять никто не зафиксировал.</p><p class="p1">Конкретику не прописываю. Главное — вот: что-то кончается, но не навсегда, а все-таки в следующий раз уже будет по-другому.</p><p class="p1">Если ты не помнишь ничего подобного, то… простите, дорогой товарищ киборг. Закрывай книгу и иди завтракать алкалиновыми батарейками.</p><p class="p1">Как вы уже поняли, сегодня у нас день исполнения неисполненного. Но имейте в виду, это должно быть что-то бесполезное, бессмысленное, мелкое. Если вы хотели стать космонавтом, да так и не стали, это не считается. И вряд ли уже за сегодняшний день вы успеете стать космонавтом. Считается заброшенный сарай, в который вы не залезли.</p><p class="p1">Итак, выбираем место и едем туда. Вернуться надо к вечеру, так что надо что-то рядом. Если ваш самый заветный сарай стоит на другом конце страны или вообще в другой стране, ищите то, что ближе, из недавнего. Если вы переехали только вчера и ничего еще здесь не упустили, по езжайте куда угодно и ищите сарай там. Нет, не шутка. Вот прямо сейчас выезжай, садись на электричку или в машину, поезжай в любом направлении, ищи таинственное место и исследуй его. Конечно, баллов ты получишь меньше, и не надо возмущаться, что, дескать, это не твоя вина, а жизнь так устроила. Так вообще часто случается, что жизнь отбирает баллы без спросу, и никто не виноват. Не все от тебя зависит, а кто говорит иначе, тот дурак или разводит. Беда тому, кто считает, что сам строит свою жизнь. Жизнь живется как в игре «Марио»: идешь по дороге в костюме сантехника, доходишь до трубы — прыгай, дошел до огнедышащего дракона — пригибайся. А уж кто из них в какой момент перед тобой появится — не в твоей компетенции. И если ты запланировал прыгнуть, а нарвался на дракона, пригнешься, как миленький, и не трещи тут про свободу выбора и кузню собственного счастья. Что тебе выкуют, на том и поедешь.</p><p class="p1">Ну так вот. С собой берем Бесполезную вещь, которая нам дорога и бутерброды. Прибыв на место, осматриваемся. Что, сильно тут все изменилось? Может, уже и сарая-то нет никакого? Может же быть так, что вы приехали, а там теперь стоит дом, пруд осушен, поворот направо, который так манил, уходя в чащу леса, заасфальтирован и ведет к торгово-развлекательному центру или, того паче, к храму. Вот это жестокий облом, ха-ха. А ты чего хотел-то? Все меняется. И чаще всего к худшему. Ну что же, походи вокруг, развлекись в ТРЦ, зайди в РПЦ. Надо было раньше думать, когда было одиннадцать. Но ты же тогда думал, что вся жизнь впереди, да? А вот уже ее впереди гораздо меньше осталось, и ты никогда не узнаешь, что там было. Так-то ты бы и не вспомнил, но теперь уж точно себе не простишь. Но самое обидное, вот просто до слез обидное, что из-за этой ерунды тебе теперь придется бросить «Квартал». Понимаешь, ведь так всегда: один дурак построил дом на месте сарая, и он вообще с тобой не знаком, посторонний какой-то совсем человек, про «Квартал» знать не знает, и знать не хочет, и не хочет знать, хочет ли знать. А у тебя из-за этого всё насмарку. И никто опять-таки не виноват. Не повезло просто. Но тут же надо понимать: настоящее невезение — это не тогда, когда ты в самую медленную очередь встал, не когда ты вещь присмотрел, долго колебался, решился, пришел, а ее уже купили. Короче, это не то что у Пьера Ришара: Пьер Ришар — вообще, с позволения сказать, детский сад. Настоящее невезение — это когда из-за чьей-то левой ноги вся жизнь теперь пойдет не так, как хотелось. Можно расценивать это всё как Божий промысел, чертов умысел, замысел, заговор, приговор, пример пионерам, художественный прием. А ты уж было загордился, читая предыдущий абзац: я, мол, не лох, меня жизнь уберегла для «Квартала», вот он, мой сарай, щас я тута всё быстро сделаю и стану богат. Теперь жалеешь, поди, что не переехал куда-нибудь в Находку: сейчас бы изучал какую-нибудь наугад выбранную поляну, нашел бы таинственную пещеру, выполнил бы задание и с чистой совестью отправился домой. А вот тебе: не радуйся раньше времени, новые условия могут разрушить всё.</p><p class="p1">До свидания.</p><p class="p1">Что бывает с тем, кого «Квартал» вытеснил, а он все равно остался, вы уже знаете. Но если не знаете, то скоро узнаете.</p><p class="p1">Я сказал, до свидания.</p><p class="p1">Если очень захочется, начните все опять год спустя, уже зная, к чему готовиться.</p><p class="p1">Всё, я занят.</p><p class="p1">…Но вот, допустим, вам повезло, и сарай цел. Непонятно, как уцелел, вот же люди на века строили, будто вечно жить собирались. Ну, или не сарай, а что там у вас было. Перекусите бутербродом и действуйте. Тут вам полная свобода, разумеется, в рамках Уголовного кодекса или совсем чуть-чуть за рамками. Главное — войти в Состояние. Те два неудачника — кто переехал и у кого построили ТРЦ или РПЦ — им с тобой не по пути. Ты, конечно, осторожен: помнишь, что было со вторым. И пока особо не радуешься. И правильно делаешь. Потому что твое Состояние — разочарование. Таинственный сарай пахнет пылью и плесенью, из артефактов только осиное гнездо или крысиное говно, никакой романтики. Загадочная тропинка через триста метров кончается таким местом, куда все бегают облегчаться. За гаражами, куда всегда было страшно, — а говорили, что там штаб шпионов, — тупо свалка. И ты об этом знал, так? Конечно, знал, тебе ж давно не одиннадцать, какие, к черту, шпионы? Но надо убедиться. Теперь ты понимаешь, насколько лучше первым двум? У них мечта осталась мечтой, а у тебя? Больной, измученный человек без иллюзий. Чтобы тебя как-то утешить, скажу, впрочем, что тот, первый, сейчас проклинает все на свете по колено в незнакомом болоте и страшно тебе завидует.</p><p class="p1">И не без оснований. Все-таки ты это сделал. Закрыл гештальт, поставил точку. Перевернул страницу. Хорошая была страница, но нельзя же вечно держать там закладку. Поезжай домой. Артефакт выкинь. После развенчания сарая он тебе уже не так и дорог — ты же видишь теперь, что все крючки прошлого гроша ломаного не стоят. Остаток дня ни с кем не разговаривай и не наступай на стыки плит, а в остальном можешь делать, что хочешь.</p></span></span>
