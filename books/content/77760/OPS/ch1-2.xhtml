<span id="id2"><div class="title1">
<p class="p">Из интервью с автором</p>
</div><p class="p1">— Вы обещаете читателю, выполнившему все ваши рекомендации, не только счастье — его все трактуют по-разному, — но и вполне конкретное богатство.</p><p class="p1">— Это так. И согласитесь, шале, на втором этаже которого мы беседуем, отчасти подтверждает мои слова.</p><p class="p1">— Но количество денег и благ в мире ограничено. Что, если все последуют вашим рекомендациям?</p><p class="p1">— Это опасение так же наивно, как страх толстовских современников: что, если все примут «Крейцерову сонату» как руководство к действию?! Ведь прервется род человеческий! Не бойтесь: если Евангелие, подкрепленное воскресением Христа и многочисленными свидетельствами его чудес, за две тысячи лет не обратило человечество к добру и правде — чего ждать от скромного описания духовной практики, своего рода интеллектуальной физкультуры? Разбогатеть и так очень просто, уверяю вас. Деньги валяются под ногами. Нужно только нагнуться — но как раз нагибаться люди и не хотят. А что, если у меня не получится? Что, если друзья увидят меня полусогнутым? Что, наконец, если я потом не разогнусь? Не преувеличивайте готовности людей открыться новому знанию. Чтобы с должным терпением и аккуратностью выполнить все рекомендации, изложенные в «Квартале», нужно куда больше решимости и ума, чем для полного прохождения серьезного компьютерного квеста. Тем более что здесь все происходит непосредственно с вами — вы и есть герой этого квеста, и ни цель, ни смысл игры вам неизвестны. Известен в лучшем случае один из побочных результатов — обогащение. Большинство проходимцев — так я иронически называю тех, кто предпочитает именоваться «дошедшими», — сообщают также о достижении внутренней гармонии, некоторые обрели счастливую любовь, почти у всех улучшилось здоровье… Но это, так сказать, факультативные результаты — их может и не быть. Я гарантирую вам только богатство. И обещаю, что за него не придется платить слишком дорогую цену.</p><p class="p1">— То есть?</p><p class="p1">— То есть это не тот случай из «Сталкера».</p><p class="p1">— При каких обстоятельствах вы получили откровение, первый импульс, саму идею «Квартала» — назовите как хотите?</p><p class="p1">— Это единственный вопрос, на который я не могу вам ответить.</p><p class="p1">— Единственный?</p><p class="p1">— Да. В остальных ответах можно отделаться казуистикой, эзотерической демагогией, юмором — но не здесь.</p><p class="p1">— Значит ли это, что способ передачи откровения был не вполне обычным?</p><p class="p1">— Не знаю, что вы подразумеваете под «обычным способом передачи откровения».</p><p class="p1">— Понятно. Это и есть обещанная эзотерическая казуистика. Спросим иначе: стоит ли за «Кварталом» некая рациональная теория — или это результат интуиции, стихийного озарения?</p><p class="p1">— Вполне рациональная теория, появившаяся, скажем так, при не совсем рациональных обстоятельствах. Вы же не станете отрицать молитвенную практику? Вследствие выполнения некоторых обрядов — иногда простейших, иногда сложных, как жертвоприношение или долгая аскеза — в вашей жизни наступают перемены, чаще всего непредсказуемые. Далеко не все, как вы знаете, худеют в результате поста. Пост — не диета. Отсечение крайней плоти не делает вас ни умней, ни чище, ни даже неуязвимей перед специфическими заболеваниями. Отбивание определенного числа земных поклонов никаким рациональным образом не ведет к исцелению от пневмонии, похоти или перхоти. Безмолвный диалог с тем идеальным родителем, которого вы принимаете за Бога и называете на письме с большой буквы, не приближает вас к исполнению заветных желаний. Тем не менее путем долгих наблюдений человечество пришло к выводу, что именно эти действия и размышления в строгой последовательности делают вас лучше, а вашу жизнь — безопаснее. Мне посчастливилось расширить алгоритм, только и всего.</p><p class="p1">— Но между молитвой и духовностью есть хоть какая-то связь, за Великим постом стоит конкретная пасхальная мифология и т. д. Действия, которые предлагает «Квартал», нарочито абсурдны.</p><p class="p1">— Вовсе нет. Не стану вдаваться в подробности, но эксперименты с Буппи и другими его товарищами помогают избавиться от второй личности — точнее, вынести ее вовне и объективировать; цельность, как вы знаете, способствует успеху. Если брать совсем широко — заметьте, я не напускаю тумана и не понтуюсь, по-русски говоря, — комплекс упражнений «Квартала» в пределе ведет к избавлению от лишних зависимостей, а если еще откровеннее — помогает выпасть из разнообразных граф и рубрик. Человек, выпавший из ниши, уже не подлежит действию тягостных закономерностей. «Квартал» учит своеобразному «шагу в сторону», выходу из обыденности. Именно с этого начинается путь к тому, что я называю метафизической удачей. К этой метафизической удаче готовы не все, и оттого главный прыжок делают лишь немногие читатели «Квартала» — не более десятой части. Однако для этого прыжка и сопутствующих ему мероприятий нужны, как правило, деньги. Очень жаль, что большинство читателей ограничиваются их получением и считают это конечной целью всего мероприятия.</p><p class="p1">— Здесь угадывается перспективная франшиза — «Квартал-2», «Квартал-2.1», «Квартал Красных Фонарей»…</p><p class="p1">— Увы. Никакая франшиза невозможна. На первом уровне «Квартала» вам уже дано все необходимое — внутренняя свобода и деньги. Дальше каждый решает только сам. То и другое несложно истратить.</p><p class="p1">— Согласитесь, вы оставляете своего героя в довольно странной точке.</p><p class="p1">— На свете — по крайней мере в литературе — хорошо только странное, все остальное давно написано. Но эта точка как раз не странна — она довольно естественна. Я оставляю читателя на вершине, на полюсе, откуда ведет бесконечное количество дорог: в любовь и свободу, в жизнь и смерть, в продолжение путешествия и в дом, который можно теперь выстроить где угодно, кроме, конечно, этой точки. Можно, впрочем, рассматривать ее и как дно. Тем неизбежнее подъем.</p><p class="p1">— На Западе некоторые истолковали этот финал как призыв к самоубийству…</p><p class="p1">— Не на Западе, а на Востоке, в Японии, где вообще всё толкуют как призыв к самоубийству. Им только предлог дай… Нет, соблазн смерти — испытание, воспитание смертью там совсем в другой главе, но зашифровано это так, что читатель проходит через опасную точку, почти не чувствуя ее. Мысль о смерти нужна, но как фон, а не как вершина. Сосредоточенность на ней вообще дурна — как на любой промежуточной ступени: кто-то на смерти, кто-то на сексе, кто-то на еде… А надо сосредоточиться на другом, на том, к чему я отфутболиваю читателя, заставив его побиться о 90 преград и рамочек: 15 октября он влетает прямо в лунку. Да, это пинбол — вполне уважительное сравнение.</p><p class="p1">— Будете ли вы что-то писать и публиковать под собственным именем?</p><p class="p1">— Конечно. Вряд ли это будет напоминать «Квартал».</p><p class="p1">— Некоторые утверждают, что все это затеяли издатели с единственной целью — спасти бумажную книгу от вытеснения электронной.</p><p class="p1">— Изящный ход, но тоже побочный. Я не скрываю, что бумажная книга кажется мне более антропной, более, что ли, человекоудобной, чем электронная. Однако «Квартал» не может быть электронным по определению: как вы из электронной книги вырвете страницу, чтобы сложить голубка, как в рекомендации от 7 августа, или оставить записку, как в рекомендации от 5 августа? После правильного прохождения «Квартала» ваш экземпляр лишится доброй трети страниц, а остальные будут в таком виде, что для перечитывания лучше сразу покупать второй экземпляр. Тем более что при выполнении рекомендаций первый часто теряется.</p><p class="p1">— Гениальный маркетинговый ход.</p><p class="p1">— Банальный здравый смысл.</p><p class="p1">— У вас, наверное, навязли в зубах вопросы о пикаперстве…</p><p class="p1">— Навязло в зубах пикаперство, поскольку клерк противен и сам по себе, а клерк, записавшийся в секту, противен настолько, что минус на минус почти обращается в плюс. «Тренинг личностного успеха», предлагающий своим адептам публично спеть, подарить зажигалку соседу по сабвею или возненавидеть родителей, которые так неправильно его воспитали, — зрелище скорее трогательное, чем отталкивающее. Сквозь парфюм разномастной — чаще всего американской — шарлатанской терминологии пробивается такое амбре менеджера низшего звена с брянским прошлым… Зайдите в любое азиатское кафе типа «Япоши», в любую чашку-кружку-рюмку-манию-фобию, и за соседним столиком молодой человек в мятом костюме будет клеить девушку с плохой кожей и неестественным смехом, говоря при этом дословно следующее: «Пойми, мне нужен как бы позитив, с охуенно высокой мотивацией», — и размахивать, размахивать руками. «Квартал» предлагает вам билет на самолет и небольшой чемодан с самым необходимым впридачу — жаль, если вам понадобится только чемодан. Пикап учит вас за огромные деньги, путем бессмысленных усилий и жестокой ломки украсть ручку от этого чемодана или носовой платок, лежащий на его дне.</p><p class="p1">— Напоследок позвольте спросить серьезно.</p><p class="p1">— А это все было как?</p><p class="p1">— Это было для «Сноба», а последний вопрос — наш личный. Как вы сами определяете жанр «Квартала»: это роман в непривычной форме, лирическая поэма, пародия на учебники жизни, эзотерический трактат, религиозная литература?</p><p class="p1">— Перечисленные вещи не кажутся мне взаимоисключающими. Толстой о «Войне и мире» — простите за аналогию — говорил: «Это не роман, еще менее поэма, еще менее историческая хроника». Так вот: это роман, еще более поэма, еще более учебник жизни и пародия на него, а нерелигиозной литературы не бывает так же, как и безадресной молитвы. Впрочем, там есть жанровое определение, которое меня вполне устраивает. «Квартал» — это прохождение. Солюшин, проще говоря.</p></span>
