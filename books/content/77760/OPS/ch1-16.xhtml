<p class="p">27 августа</p>
</div><p class="p1">Сегодня мы вспоминаем две песни нашего детства. Одна — под которую нам было страшно, другая — под которую грустно.</p><p class="p1">Почему сейчас? Потому что август кончается, и что еще нам делать августовскими вечерами? Августовские вечера располагают к слушанию пионерских песен, потому что разъезжаются лагеря, и дети поют у костра и смотрят на звезды, забывая в эти минуты, как было отвратительно все предшествующее. Впрочем, так было когда-то. Сегодня пионерских лагерей нет, а в тех, которые есть, не поют у костра. Августовская ночь вообще есть ночь прощания, потому что дальше пойдет доживание. Попробуем вспомнить лучшие минуты нашей жизни: это вовсе не были минуты безоблачного счастья. Свой максимум мы показывали тогда, когда боялись или печалились; умнее всего мы были в те минуты детства, когда просыпались среди ночи. Тогда мы понимали всё, но не могли выразить. Потом наши чувства заветрились, как колбаса на срезе, и острота ушла, а одно временно появились слова, которыми можно кое-что выразить. Сегодня, пожалуй, у меня есть слова даже для того, чтобы выразить тогдашнюю остроту, но я уже почти не могу ее воспроизвести. При желании я почти всегда могу вытащить, словно из картотеки, того мальчика, который радуется весне, и он испытает почти те же чувства, что и в марте тридцать лет назад, возвращаясь из школы. Но вытащить того мальчика, который просыпался ночью, смотрел на белую стену дома напротив, на маленькую бойлерную внизу, на совершенно пустую улицу в ртутном свете летних фонарей и вспоминал песню «Почему же я одна», — я не могу даже во сне.</p><p class="p1">Песня эта на меня сильно действовала, да. Вообще Аркадий Островский, проживший всего-то пятьдесят с небольшим, был на удивление хороший композитор, зараженный хорошими тогдашними чувствами, и в мелодиях его — а скорей, в оркестровке, — звучит что-то сверх, что-то почти иррациональное. И вот «Почему же я одна» была песней именно с таким призвуком. Цвет ее для меня белый — отчасти потому, что услышал я ее впервые с белой гибкой пластинки в «Кругозоре». Там на одной пластинке были два новейших хита — «Моряк сошел на берег» и, соответственно, эта, в пении Кристалинской. Но мне вообще представлялось, что эта песня белая, и певица шла как бы под ртутным белым светом по ночной мостовой. Ночной город мне представлялся — и до сих пор представляется, хотя сейчас он мало отличается от дневного, — совершенно иным. Это было пространство, где всем владеют непонятные силы, где вообще все другое. Идет она, как мне представлялось, вдоль красных кирпичных домов недалеко от нашего, эти дома вообще мне виделись мрачным местом, поскольку сразу за ними тогда начинался пустырь с битым кирпичом и высоко торчащими стеблями полыни, там вечно валялась какая-то ржавчина и покрышки, город там кончался тогда. Но если идти вдоль них, ты попадал в еще вполне цивилизованную часть квартала, просто остро чувствовалось пограничье. Она попала в заколдованное пространство и не может из него выйти — вот почему «так тревожно, томительно мне», но она этого не понимает. Еще можно повернуть и попасть в нормальный мир, а то и вообще вернуться домой, но то ли ей некуда возвращаться, то ли она вышла из своего дома, стоящего в совсем другом месте, и вдруг попала к нашим красным домам, которые вообще видит впервые. Я всегда боялся, выходя из дома, попасть в чужой мир: никогда же не знаешь, куда выводят двери. И звук этого голоса был совершенно потусторонний, и регулярно повторявшиеся аккорды были как полоски ртутного света от фонарей, через которые она переступает. Потом я такой же отстраненный, ужасный женский голос услышал у Локшина в «Песнях Гретхен» — самом, вероятно, жутком музыкальном сочинении, написанном по «Фаусту»: там была какофоническая адская музыка, и над ней витал ледяной, уже не отсюда, голос: «Что сталось со мною, я словно в чаду, минуты покоя себе не найду». Как бы уже отлетевшая душа зависла над пустырем с кирпичами и ржавчиной. Я в принципе могу понять, откуда взялась версия о предательстве Локшина, о том, что он стучал: это хоть и полная клевета, судя по всему, — тогда много было таких клевет, когда стали возвращаться реабилитированные, — но с таким адом в душе он и вправду мог им представляться исчадием зла, и музыка вся настолько не отсюда, что представление об этой чуждости легко трансформируется в обычное «не наш», следовательно — в миф о стукаче. И этот голос у такой вроде бы домашней Кристалинской — которая тоже рано умерла, как будто ее все-таки отозвали, — тоже звучал совершенно не отсюда, и дурацкие, прямо скажем, ошанинские слова о том, что она ждет любви, ничего не спасали. Не любви она ждет, а попала в чуждое пространство и собственного голоса там не узнаёт. А самое главное, она уходит по этой ртутной дороге все дальше и дальше и скоро начнет встречать других, таких же, как она. Только такие люди бродят по ночам вдоль красных домов, но друг друга не узнают, конечно.</p><p class="p1">Я обычно свою школу не любил и, более того, ненавидел, но в такие ночи, когда я просыпался и смотрел в окно на белую бойлерную напротив, мысль о ней меня утешала, словно исхищала из этих ужасных пространств. Любая будничность спасительна, когда мы слышим «Город весь окунулся во тьму». Еще у меня бывало тогда состояние, для которого я и теперь не подберу слов — правильнее всего было бы как раз навесить на него ярлык вроде «экзистенциальный ужас» или «первое переживание своего «я»», но это как раз уводит от темы, как школа уводила от белой бойлерной. Пытаясь объяснить его матери, когда я ее, не выдержав, будил, — это было мне лет восемь, вероятно, — я употреблял что-нибудь совсем невнятное, вроде «ощущать себя собой», и мать, понятное дело, злилась, поскольку ей было рано вставать, как и мне, впрочем. Суть была в том, что на других людей я смотрю со стороны, про героя книжки говорю «он», а тут все происходит со мной, я — это я, не может быть никакого бегства. И сейчас это я, и вот сейчас это я, и когда я думаю о себе «я», это тоже я. То есть все происходит именно со мной. Причины этих приступов я не знаю — и тем более не знаю, почему они прекратились: то ли привычка, то ли упомянутая утрата остроты. Наверное, это был мой вариант арзамасского ужаса, но Толстой во время арзамасского ужаса боялся именно того, что исчезнет, а я — именно того, что живу. Теперь мне уже трудно это почувствовать, но «Почему же я одна» еще возвращает то ртутное чувство.</p><p class="p1">Что касается грусти, то на этот случай существовала совсем уже попса, что лишний раз доказывает нехитрую мысль: утонуть можно и в луже. Существовала — и теперь еще транслируется в ностальгических передачах — песня «Город детства», являвшая собой, как многие тогдашние хиты, американскую песню, внелицензионно спизженную социалистическим государством, для которого все эти буржуазные копирайты — звук пустой. На самом деле называется она Greenfields, то есть зеленые поля, отличающиеся от земляничных примерно тем, что никаких творческих озарений в них не происходит, а просто лирический герой там бродил с возлюбленной в золотом детстве. Потом, естественно, greenfields were gone, но наш герой продолжает на что-то надеяться. Написал все это такой американский фолк-певец и поэт, Терри Гилкинсон, которого все вы знаете по песне «Базовые потребности», она же «Простые радости», из «Книги Джунглей». Знаете вы и то, что никакой «Синей песни» про синий-синий иней не существовало в природе, а был One Way Ticket to the Moon, но для меня, ничего не поделаешь, эта песня уже про синий-синий иней и пять часов вечера непосредственно в нашем районе. Как-то провода в инее удивительно вписываются в русский зимний пейзаж, странно, что Пушкин видел его еще без проводов и вынужден был их домысливать, прошивая равнину своими маршрутами и бесчисленными связями.</p><p class="p1">И вот эти Гринфилдс, зеленые поля, перепело несколько советских лирических авторов на стихи Роберта Рождественского, где говорилось про город детства, про то, как ночью — опять ночью! — герой поспешает на вокзал, дабы взять билет в родной город, пылью тягучей навеки покрытый. «Нооочью из дома я поспешу, в кааассе вокзала билет попрошу…» Конечно, советский вокзал — не самая, скажу вам, пронзительная лирическая тема, но что-то в этом мотиве проскальзывало от тех зеленых полей под вечерними небесами, и никакая касса не могла этого испортить. Что-то, вероятно, было в этой песне такое, что даже Егор Летов ее перепел на «Звездопаде». Но когда мне случалось проснуться летом, а мы жили тогда еще на третьем этаже, и я видел тени лип, мечущиеся по стене, — я очень ясно представлял, как ночью идет этот человек за билетом, а вокзалы тоже ночные, и кассы другие, и кассирши в них. Мне представлялось почему-то, что он проходит мимо того самого сквера, который у нас так и называется Квадрат Счастья, но ночью там было невыносимо грустно, грустно в квадрате. Ведь там пустой детский городок, горка, песочница. Там листья в свете фонаря. И на меня нападала такая грусть — не тоска, а именно грусть, — которую нельзя выплакать никакими слезами.</p><p class="p1">Вот тут некоторые интересуются, почему мы воспитываем читателя такими простыми и где-то даже сентиментальными заданиями. Вспомнить песенку, отгадать загадку… Дорогие друзья! Неужели вы полагаете, что человек воспитывается, например, в тюрьме, что надо жизнь понюхать? Если вы под жизнью всегда подразумеваете портянку, потому что не знаете никакого другого запаха, у вас никогда не будет денег, потому что какие деньги с таким опытом и представлениями? Все серьезное делается тонко, а если нужен мордобой, это должен быть очень тонкий мордобой.</p><p class="p1">Слушаем грустную песню два раза и страшную — один, на ночь. Ровно в полночь посещаем Квадрат Счастья, долго там сидим, если не побьет пьющая молодежь.</p><p class="p1">Вот мы сидим в полночь в Квадрате Счастья, немолодой уже мужчина — как ужасно называть себя «мужчина», даже ужасней, чем «немолодой»! — и чувствуем, как земля отдает дневное тепло. Может, мы и есть тот самый мужчина, который виделся нам в детстве — который ночью, когда так опасно выходить на улицу, устремился на вокзал за билетом в детство, но по дороге вспомнил, что это всё — одна метафора. Вот он сидит в сквере, тот, о котором нам так грустно было думать, и ничего страшного, только очень, очень грустно. «Нооочью из дома я поспешу». О чем мы грустим? Неужели о невозможности возвратить детство? Да я все бы отдал, чтобы не возвращаться в детство. В тотальную беспомощность, сплошное бесправие, садическую школу, тухлый воздух последних лет советской власти. Сейчас не лучше, но тогда я еще ничего не мог и не умел, ничему не способен был противостоять. Сейчас другое дело, сейчас мы вооружены. Нет, мы о другом грустим, наша грусть высшей пробы — она беспредметна. Грусть из-за любви, детства или денег не заслуживает упоминания и не воспитывает души. Мы же грустим только потому, что песня «Гринфилдс» прелестна и поэтична, и даже в стихах Роберта Рождественского благодаря этой музыке появляется что-то, а может, он и вправду был одаренный человек. Грустно не то, что мы умрем, и это еще, кстати, неизвестно, и даже не то грустно, что все невозвратимо, — а просто грусть разлита в воздухе, как запах, и это единственное средство межчеловеческой связи. Кто не чувствует этой грусти, струящейся повсюду, как дневное тепло, отдаваемое землей, — тот вообще ничего не чувствует и зря выполняет наши упражнения. Земля ночью отдает тепло, мы отдаем грусть, ибо это единственное, чем мыслящий человек может за ночь пропитаться. Идите домой, напевая. На ночь чашка мятного чаю и, если хотите, сигарета.</p></span></span>
