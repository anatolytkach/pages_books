<span id="id3"><div class="title1">
<p class="p">От автора</p>
</div><p class="p1">Главный герой этой книги — вы, читатель.</p><p class="p1">Это первая такая книга в истории человечества.</p><p class="p1">Только от вас зависит, насколько убедительно выстроится сюжет, как будет обстоять дело с эмоциями и смыслом.</p><p class="p1">Это не рассказ о действиях и взглядах каких-то никому не нужных и, может, давно умерших, а то и никогда не существовавших людей. Это рассказ о том, что будете делать вы, здесь и сейчас, в эти три месяца.</p><p class="p1">И если вы все сделаете хорошо, это будут хорошие три месяца и хорошая книга.</p><p class="p1">Стартовые условия неважны, а финишные я уже предусмотрел.</p><p class="p1">Скажу сразу: это нужно не мне, а вам.</p><p class="p1">Все, что было нужно мне, я уже сделал.</p><p class="p1">Я посягаю всего на три месяца вашей жизни — один квартал с 15 июля по 15 октября.</p><p class="p1">Вы можете начать практику в любой другой день, но результат не гарантирован. Проще говоря, его не будет.</p><p class="p1">Отклонения от рекомендаций допустимы только в том случае, если вы хотите обессмыслить всю затею. Прохождение не требует никаких специальных жертв, физической подготовки и особенных талантов. Все, что нужно для строгого выполнения рекомендаций, вы приобретете по ходу. Ни один совет не опережает ваших возможностей. Ничего невыполнимого в книге нет.</p><p class="p1">Главный бич детективщиков — стремление читателя непременно заглянуть в конец и узнать, кто убил герцогиню. За двести лет бурного развития детектив справился с этой опасностью: техничные писатели научились громоздить в финальном монологе сыщика (до прибытия полиции 40 минут, и есть время объяснить собравшимся, почему скрутили именно садовника) такое количество имен и обстоятельств, что без внимательного чтения 347 пропущенных страниц читатель ногу сломит. Все обошлось бы, Руперт, но вы не учли того, что в кармане у Пэйлин были не только ключи. Там был еще и триграм. Как?! Ведь я отдала его Шарлотте! Ха-ха. Поймите, Лайза, никакой Шарлотты не было в природе. Это переодетый Эверетт. Не может быть, я спал с ней! Мало ли с кем вы спали, Уилкс. Вы спали и с Холли, а между тем это был я. Какая Холли, черт побери? И самое главное: откуда в финале вдруг является садовник — когда действие перенеслось на верхнюю палубу «Королевы-бабушки»?! Уметь надо, дорогие друзья, и я умею. Не стану грозить вам смешными карами — вы можете хоть сейчас заглянуть на последнюю страницу и узнать конечный пункт нашего прохождения, и, если завтра вы сломаете ногу, это не будет иметь ровно никакой связи с вашим нынешним нетерпением. Просто нетерпеливые люди часто ломают ноги, хотя иногда им везет. Заглядывайте куда хотите, листайте книгу в любом порядке — она построена так, что понять ее логику, и то не наверняка, может только тот, кто проделает все прохождение от начала до конца. Ведь чтение прохождения к любому квесту ничего не скажет вам о квесте, хотя часть удовольствия вы себе испортите.</p><p class="p1">Я не заставляю, не соблазняю и не уговариваю. Следовать или не следовать рекомендациям «Квартала» — ваше личное дело. Прохождение не потребует от вас ни денежных трат, ни подвигов. Оно совместимо с работой — если только вы не дежурите круглосуточно — и с любыми семейными обязанностями. В паре особо оговоренных случаев вам потребуется на день-другой сменить местожительство, но учтите, что при тщательном соблюдении всех предыдущих инструкций это необходимо для вашей же безопасности. Можете проверить, но не советую.</p><p class="p1">После 17 августа, 9 сентября и 3 октября в вашей жизни могут произойти значительные изменения, которые приготовят вас к финальной перемене. Если после 9 сентября ничего не изменится, вы нарушили какую-то из инструкций. 15 июля следующего года можно начать сначала. Продолжать бессмысленно: вреда не будет, но и толку тоже.</p><p class="p1">Действия, рекомендуемые «Кварталом», могут показаться вам абсурдными. Но они ничуть не абсурднее, чем кликанье мышью сначала на плохо нарисованного полицейского, а потом на масленку, чтобы полицейский поскользнулся на масле и не сумел схватить кривоногую Арабеллу, которая ускользает в щель между мирами, чтобы пронести в зловещую Монструозию спасительный артефакт в виде черных сатиновых трусов. А ведь подобным занятиям вы посвятили не один час и притом без всякой надежды на обогащение.</p><p class="p1">Я обещаю вам только одно: полное прохождение «Квартала» гарантирует вам богатство, независимость и счастливые личностные перемены. Смешно гоняться за ребенком с ведром черной икры, умоляя попробовать ложечку. Глядишь, втянется, и что тогда делать?</p><p class="p1">Желаю удачи.</p></span>
