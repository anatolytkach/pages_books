<span><span id="id10"><div class="title2">
<p class="p">19 июля</p>
</div><p class="p1">1.</p><p class="p1">С утра, ровно в 8:00, идем в точку Опасности и смотрим, где наша вещь.</p><p class="p1">Если она на месте, забираем.</p><p class="p1">Если ее нет на месте, покупаем точно такую же и оставляем там же сегодня вечером.</p><p class="p1">Если вещь на месте, но как-то изменилась (сброшена со ступеньки, закинута в кусты, рядом оставлена записка — мало ли), забираем вещь и вечером на ее место кладем Вещь, напоминающую вам о вашей ошибке.</p><p class="p1">Если вместо вашей вещи там лежит другая вещь, можете смело зачислять себя в группу «Б».</p><p class="p1">Эту вещь берем и дарим на улице первому встречному ребенку. Он возьмет. Если не берет, исключаем себя из группы «Б» навсегда. Устами младенца глаголет истина.</p><p class="p1">2.</p><p class="p1">Сегодня мы выбрасываем Старую вещь. Ту, про которую мы давно думали, что ее пора выбросить, но как-то все было жалко. Мы обманывали себя, говоря, что у нас нет времени, что еще, может быть, зачем-нибудь склеим и починим, что вообще она лежит, места не занимает — но занимает, ничего не поделаешь. Просто если мы этого не сделаем, то все наше долгое путешествие бессмысленно. Мы никуда не уедем. У нас никогда не будет денег.</p><p class="p1">Вот находим такую вещь. Лучше большую, чтобы занимала место в комнате или хоть на антресолях. Лучше принадлежавшую какому-нибудь родственнику, чтобы занимала место еще и в душе. Лучше, чтобы она им пахла. Не призываю выкидывать старый дедушкин пиджак или бабушкины медикаменты, но что-нибудь такое. Потому что если речь идет о старых запчастях для вашей собственной давно проданной машины, ржавеющих на балконе, — вы не представляете, сколько подобного хлама загромождает жизнь русских людей, — то это неинтересно. Не происходит того движения души, между раскрепощением и кощунством, без которого наши упражнения бессмысленны.</p><p class="p1">Я вообще не очень понимаю — это я даю вам время сосредоточиться, забалтываю, как анестезиолог перед операцией, — почему у нас столько всего хранят. Отчасти это лень, отчасти жалость, отчасти важная особенность местного нрава — и, стало быть, истории: терпеть до последнего, а потом вышвырнуть все, в том числе нужное. Например, ребенка с водой. Ребенок летит, пищит — а-вя-вя! — на хрен, на хрен, надоел, еще не родился, а уже тогда надоел! Просто способность что-либо делать возникает только в крайних ситуациях, а до них надо доводить. А все, что делается в последний момент, делается плохо, чрезмерно, быстро, с привкусом последнего момента. Мы больше не будем, не хотим так жить, поэтому сегодня мы выбрасываем ненужную вещь.</p><p class="p1">Это могут быть, например, давно не ходящие часы. У меня такое было. Сломались часы армянского производства, очень жалобно игравшие «Что стоишь, качаясь, тонкая рябина?». Первое мое представление о музыкальной шкатулке: валик с иголками, тонкие металлические полоски, которые он задевает, — я в первый раз поразился хитрости человеческого ума! — а в результате «тонкая рябина». Часть полосок отломалась, часы уже не ходили — вижу их с невероятной отчетливостью, белый пластмассовый кирпичик, квадратный циферблат, а рядом, собственно, музыкальная часть. Их пожалели выбрасывать, завернули в газету и положили на балкон, в ящик старого буфета, стоявшего там с незапамятных времен. Я в детстве часто просыпался среди ночи от невыносимой тоски, которую описать сейчас не смогу, потому что давно притерпелся, и на месте этого вечно болевшего участка души у меня теперь твердая мозоль, — но, в общем, это была смертельная жалость ко всему. Себя я в такие минуты не жалел, потому что был отдельно от прочего мира. Но эти часы, так жалобно игравшие, мне было особенно жалко: когда-то они стояли на теплой кухне, а теперь лежат на ледяном балконе, в ящике буфета, с которым им, вероятно, и поговорить не о чем, — буфет старый, еще довоенный, а они армянские, с совершенно другой биографией (я понятия не имел, какая такая бывает Армения, — только потом долгая жизнь меня научила, что армянским жалобам, неизменно очень слезным, надо верить с большой осторожностью). И я клялся, что завтра же их оттуда извлеку и отнесу в часовую мастерскую (в моем Квартале она расположена на улице Новогодней). Но утром всегда находились другие дела, да и лезть на заснеженный балкон мне было почему-то больно, я вообще, как все люди, отдергиваюсь от чужого страдания, мне нужно дополнительное усилие. И потом их выкинули вместе со всем буфетом, когда делали ремонт, — я был в это время на даче, летние каникулы. Иногда я и теперь еще просыпаюсь по ночам в тоске, принимающей теперь форму общей душевной тошноты — в которую всегда переходит слишком сильная и притом бессильная жалость, — и смотрю на заснеженный стадион за окном, который был виден и в нашей прежней квартире, только с другой стороны; и вид этого снежного поля вызывает у меня тонкую, комариную боль, напоминание о несделанном деле, о том, что надо достать с холодного балкона эти рябиновые часы, которые можно ведь еще починить, — хотя и часовая мастерская давно не существует, и армянский часовой завод двадцать раз с тех пор закрылся, и снесены, вероятно, здания, где он размещался. Хватит болтать. Берем вещь и выбрасываем. Не в мусоропровод — я же сказал, она должна быть большая. Несите ее в ближайший мусорный ящик. Никаких долгих прощаний. Швыряйте и мимо этого ящика сегодня больше не проходите.</p><p class="p1">Вам трудно, очень вас понимаю. Хорошо. Рассказываю тоже про себя, чтобы облегчить вам эту ситуацию. В квартире, где я живу, от старых хозяев осталась книжная полка. Мы на нее взгромоздили слишком много книг плюс сувениры из разных поездок, совершенно, в общем, ненужные, равно как и сами поездки, — и она в один прекрасный день рухнула на кота, успевшего, впрочем, отскочить. Рухнула она непоправимо, поскольку от нее оторвалась целая планка, долго еще торчавшая в стене. Книги мы переставили в новый шкаф (как мы его собирали по инструкции — отдельная песня, но сейчас не о том), а полка так и осталась лежать у стены, и все не доходили руки ее вышвырнуть, а может, мы перед ней испытывали суеверный страх. Все-таки она осталась от старых хозяев.</p><p class="p1">Старые хозяева периодически о себе напоминали, при этом мы ничего о них не знали, потому что квартиру купили у их дочери, тоже уже престарелой и довольно, надо сказать, противной. Но они, видимо, были неплохие люди, потому что она их любила и забрала почти все оставшиеся от них вещи — оставила нам за полной ненадобностью пару полок и, по особенной милости, гардероб. Иногда обнаруживались какие-то их вещи, про которые не вспомнили, — старая радиола, еще умевшая крутиться на 78 оборотов, и набор пластинок, среди них, в частности, уральский хор, исполнявший песню «Что стоишь, качаясь, тонкая рябина?», ужасны вообще эти лейтмотивы в биографии, — а также песня «Заело» в исполнении Шурова и Рыкунина, которую я отлично помню еще по собственному детству, поскольку у нас тоже имелся набор патефонных пластинок, пока я их все не переколотил. Ну вот, они слушали лирические и сатирические песни и были, значит, неплохие, еще там были «Брызги шампанского». И только потом мы с полной достоверностью узнали, что дом гэбэшный. Это выяснилось, когда при попытке вызвать сантехника районный ЖЭК отказался его присылать, потому что дом ведомственнный, сказали нам с неистребимым злорадством. Вот он у вас ведомственный, и вызывайте теперь другого сантехника где хотите. Ненависть осталась еще с тех пор, когда это был привилегированный гэбэшный дом. И хотя этот старик, обитатель квартиры, мог быть вполне невинным секретчиком где-нибудь на заводе или вообще канцелярской сошкой, но отношение к нему, пластинкам и даже тонкой рябине несколько переменилось. Я же говорю — никогда нельзя верить жалобным песням, хотя, возможно, это у меня просто самозащита от той самой жалости. А когда меняли обои, высунулась всякая газета «Правда», в нее же был завернут антресольный хлам, и она теперь тоже читалась под другим углом. Мне представился этот охранник, внимательно почитывающий ее по утрам, шевелящий губами, потом перечитывающий между строк, — солидный, основательный дядечка, строгий к продавцам окрестных магазинов, кормящий голубей, не чуждый прекрасному — у них даже на потолке, где люстра, укреплен был пластмассовый, но с понтом гипсовый акант. Античная гармония прежде всего. И жена его была, верно, добрая старушка, укоризненно качавшая головой при просмотре программы «Время» образца 1987 мерзкого года, насквозь гнилого, но якобы ренессансного. Короче, эта полка со всей своей амбивалентностью там стояла, пока у меня не образовалось свободное время и я не понес ее на свалку.</p><p class="p1">Она не покидала квартиру лет, вероятно, двадцать, но должна же была себе представлять день, когда ее отсюда потащат. Думаю, она со скорбным удовлетворением смотрела на лестницу и почтовые ящики — которых не узнавала, потому что в подъезде только что сделали ремонт. С таким же скорбно-удовлетворенным выражением однажды на моих глазах обосралась девушка, с которой мы в одной группе — практиковались такие поездки — ездили в Париж. Она там, экономя на еде, заработала страшное расстройство желудка и вечно спешила в уборную, но всегда успевала; а тут подъезжаем уже к Москве, все сортиры за сорок минут до нее заперли, и она-таки обосралась непосредственно у МКАД. И на кроличьем ее лице, вечно испуганном, поя вилось наконец выражение того самого мрачного удовлетворения — последней утехи людей и вещей, которые попали в плачевное положение, но всегда его предчувствовали. Думаю, что умирать мы все будем примерно с такими же мыслями. Но самое ужасное, что на дне этих мыслей всегда будет теплиться надежда, и полка, я полагаю, продолжала надеяться до тех самых пор, пока я не отнес ее на свалку и не поставил там вертикально в надежде, что ее подберет какой-нибудь бомж. Их в районе очень много, несмотря на растущее благосостояние, и они постоянно вытаскивают из ящиков бывшие джинсы. Если бы полку подобрал бомж, хотя бы на растопку, мне, честное слово, было бы легче — все-таки вещь продолжает существовать в своем исконном качестве, все-таки с людьми; но я два раза в тот день прошел мимо свалки — с работы и на работу (видите, я кому-то нужен, востребованный человек, хотя именно в тот день я никому особенно не был нужен, просто в квартире одному было тошно), и никто ее не подобрал. Когда я мимо нее проходил, она так и стояла, но я отчетливо ощущал толчок надежды, от нее исходящей: может, я передумаю и она все-таки сгодится. Ведь можно же починить. Она не могла, конечно, попросить об этом прямо — в ней было много гэбэшного достоинства, ненависти к молодым, вообще я был по всем параметрам представитель чуждого мира, — но, несмотря на все это, она явно просила ее забрать. Ужасная помойка, ужасный запах, она этого не заслужила, и, в конце концов, я сам ее перегрузил. Во второй раз она уже помирала, ее заморозило, она уже не могла подать никакого внятного сигнала, но из последних сил обозначила себя. Но я был тверд. Если мы не выбросим старую вещь, мы никогда не начнем новую жизнь. Все обросли таким количеством хлама, как вещественного, так и мысленного, что никак не можем прорваться к чему-то новому, и вообще — вот мы всех жалеем, а кто нас пожалеет? Жалела нас квартирная хозяйка, когда вывезла все вплоть до полочки в ванной? И полку увезли, и утром я это отметил с большим облегчением, потому что она утратила качество вещи и перешла в качество мусора, а мусор имеет другую душу, о которой нам лучше не задумываться.</p><p class="p1">Нечего тут. Отложили книгу. Встали, взяли, понесли.</p></span><span id="id11"><div class="title2">
<p class="p">20 июля</p>
</div><p class="p1">1.</p><p class="p1">Сегодня мы переводим текст с неизвестного вам языка. Каждому слову этого языка должно соответствовать одно русское. Одинаковые слова могут быть заменены только одинаковыми, это как бы само собой, но приходится напоминать, потому что все либо забывчивые, либо хитрые. Существительные в разных падежах обозначаются одним словом.</p><p class="empty-line"/><p class="p1">Бргг эритр дургам: биттр, эратрум, кисикл. Биттр — артрудн стебрик кусам, интивит, пужн. Хрунд, пукишем. Колеама бисетр стеврюк, зуамо стронд абранта, немаго струизанд сборт, друнд, браскл.</p><p class="p1">— Ао, эратрум! — фонид кисикл, стаблашем гунда трумпф. — Ис андаго круа?</p><p class="p1">— Бандуит, — аргунд биттр, к ванкнум бисетр немаго. Илле сумбаква струфик — пукишем абсант.</p><p class="p1">— Трува?! — бластрум кузанж.</p><p class="p1">— Хачипупер, хачипупер, — триангл вруншильд пурба. — Авос бандуит — немос бандуит.</p><p class="p1">— Немос? Ду колеама, стантра, душанга!</p><p class="p1">— Ан си стеврюк друхта стомп.</p><p class="p1">— Амба, амба! Грандутха эритр криалан!</p><p class="p1">— Криалан тусса, криалан месса.</p><p class="p1">— Дургам биттр!</p><p class="p1">— «Криалан месса, криалан месса!» — анрдрант феррун, фонид зуамо васкес.</p><p class="p1">— Амос форт?</p><p class="p1">— Бргг!</p><p class="p1">— Финид, — квамкус эратрум, кванкнум зуамо хрюкл.</p><p class="empty-line"/><p class="p1">Переведите получившийся текст на любой известный вам язык.</p><p class="p1">Аккуратно впишите его на эту страницу.</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">__________________________________</p><p class="p1">2.</p><p class="p1">Дальнейшее касается только группы «Б».</p><p class="p1">Ровно в полночь в ночь на 21 июля выходим из дома.</p><p class="p1">Хороша летняя ночь, особенно во второй половине лета! Счастье для зрелых людей, уже сознающих конечность жизни и понимающих, что в этой-то конечности и заключена вся прелесть. Жить и бояться умереть — все равно что трахаться и бояться кончить.</p><p class="p1">Берем с собой Фотографию незнакомой местности и Вещь, которая напоминает вам о детстве.</p><p class="p1">Ищем в Квартале местность, больше всего похожую на Незнакомую местность. Даже если это арабская пустыня, в Квартале почти наверняка есть похожий пустырь. Подчеркиваю: мы не выходим за пределы Квартала. Если нет ничего похожего, определяем похожее по настроению место, какой-нибудь сквер, вызывающий сходные эмоции, или даже собственный подъезд.</p><p class="p1">Приходим в эту точку. Оставляем там вещь, напоминающую вам о детстве. Даже если эта вещь вам очень дорога — все равно. Под нее подкладываем бумажку с надписью «СПАСИТЕ!» большими буквами. Ниже указываем свой контактный телефон.</p><p class="p1">Если завтра вам позвонят, встречаетесь с человеком, который позвонил, благодарите его, выдумываете что хотите насчет причины вашего поступка и вручаете ему Драгоценность (Украшение) из того же списка.</p><p class="p1">Если не позвонят, читаете вслух одну страницу из Книги на иностранном языке. Не умеете вызывать помощь, так хоть в языках попрактикуетесь.</p></span></span>
