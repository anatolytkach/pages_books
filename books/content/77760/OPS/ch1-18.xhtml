<span><span id="id51"><div class="title2">
<p class="p">1 сентября</p>
</div><p class="p1">Сегодня День знаний, но это не значит, что мы должны вспоминать школу или институт. Если вы еще там учитесь, вы просто пойдете туда с обычной смесью радости и отвращения, и «Квартал» здесь совершенно ни при чем. Весьма возможно, что многие ваши одноклассники, однокурсники или даже преподаватели проходят его вместе с вами, но признаваться в этом нельзя, по крайней мере пока. Нас интересуют сегодня другие знания. Речь пойдет о душе и вычислении соответствующего индекса. Так что будем считать, что у нас сегодня день эзотерических знаний.</p><p class="p1">Вопрос о бессмертии души до сих пор не решен в силу своей элементарности. Между тем все давно понятно — достаточно прислушиваться именно к языку, инструменту, самому честному делу. Подойдем к вопросу чисто грамматически и увидим, что он распадается на два: 1) существует ли душа и 2) бессмертна ли она?</p><p class="p1">Второй вопрос снимается элементарно, поскольку душа есть то, что бессмертно. Все остальные ответы некорректны, ибо душа тем и отличается от тела, что остается от него. Остается первый, и ответ на него мы тоже знаем, хоть и не отдаем себе в этом отчета. Есть ли душа? У кого-то есть, у кого-то нет.</p><p class="p1">Сегодня мы ответим на вопрос, есть ли она у вас.</p><p class="p1">Некоторым она дается сразу, остальные могут при желании отрастить, потому что все необходимое для этой цели у вас уже имеется. Стартовые условия равны. Кому-то покажется странным и несправедливым, что у одних душа есть, а другим предстоит ее растить долгими упражнениями. Глупо связывать наличие души с интеллектом, сентиментальностью, чувством юмора или другими приметами личности. Скажем больше: прямого контакта с вашей личностью у души нет и быть не может. Часть решений принимает душа, а часть — интеллект, и решения души — далеко не лучшие, а часто просто жестокие. Когда их принимает душа, вы чувствуете, что «равны себе» — более адекватной формулы не существует, хотя даже она очень приблизительна. Добираясь до собственной души, вы почти наверняка обнаружите то, что вам совсем не понравится. Если она будет трудиться и день и ночь, и день и ночь — не факт, что в мире вообще что-то останется. Душа дается не для того, чтобы обеспечить нормальную жизнь здесь. Для жизни здесь существуют уже упомянутый интеллект, чувство юмора и сентиментальность. Душа нужна для жизни во втором круге, где совершенно другие условия. Здесь она часто вообще мешает. Обладает ли душа знаниями и памятью? Разумеется, и это легко пояснить с помощью сугубо бытового сравнения. Часть номеров в вашем мобильнике записана на симку, а часть — на телефон. Если телефон поврежден, а симка цела, какие-то вещи забудутся, а какие-то останутся — и нет никакой гарантии, что на симке записано самое главное. Что до необходимости тренировать или отращивать душу — здесь вообще нет ничего оскорбительного: одни люди рождаются с абсолютным слухом и врожденными способностями к игре на рояле, а другие обучаются и достигают иногда гораздо более высоких результатов. А некоторые так и умирают, не умея играть на рояле. Вот почему на втором уровне такой высокий отсев.</p><p class="p1">Все, что мы вам здесь предлагаем, — не что иное, как набор упражнений для тренировки души. По нашим подсчетам, через пол тора месяца работы она должна достигнуть такого уровня, что ее уже видно. Вы спросите — если после этого объяснения у вас остался дар речи: как все это связано с деньгами? Отвечаем: деньги — всего лишь кровь этого мира, вещество, связывающее всех, грубый земной аналог эфира, омывающего всю сушу. Это не значит, конечно, что у кого больше души — у того больше и денег. Это всего лишь отражение более высокой способности притягивать к себе кровь, связь и т. д. Обратите внимание, что уворованный капитал недолговечен. Иногда богатые люди зовут вас к себе в гости, но не просто для того, чтобы похвастаться капиталом, а чтобы показать его вам, пока он еще есть. Ходишь по такому дому, а в нем все как бы спрашивает: видел? Так вот, это все обречено. В таких домах тревожно, и гостей зовут только для того, чтобы заглушить тревогу. Большие и долговечные деньги есть только у тех, кто умеет притягивать к себе эфир, обрастать большим количеством связи: во втором круге по этим каналам притекают энергия и разные другие вещи, для которых нет земного названия, а в нашем мире по этим каналам притекают деньги. Достаточно научиться притягивать деньги, чтобы как следует натренировать душу. Верно и обратное.</p><p class="p1">Для того чтобы определить Индекс своей души, мы должны сегодня выполнить три упражнения. Индекс определяется по формуле S = N1 × N2 / N3, то есть произведение двух первых показателей надо поделить на третий.</p><p class="p1">Во-первых, сразу после школы (института) или работы — впрочем, если выходной, то в любое время — вы должны наметить в городе район, где больше никогда не побываете. Это будет такая репетиция смерти. Прощай навек. Допускаю, что вы можете мимо этого района случайно проехать в машине, но ведь и после смерти вас могут случайно провезти на кладбище мимо вашего дома. Лучше тем не менее наметить точку, мимо которой никогда не ездят машины, не ходит транспорт, — это будет маленький сквер где-нибудь на окраине или магазин, который, как вам известно, на днях закроют. Можно даже поискать по Интернету магазин, который на днях закрывается, а помещение продается или сдается. Наконец, возможен вариант встречи и разговора с человеком, которого вы никогда больше не увидите. Если у вас есть на примете человек, с которым вам хочется расстаться навсегда или этого хочется ему, и вы это почувствовали, — непременно встретьтесь с ним именно сегодня, как собираюсь поступить я, потому что сколько можно. Как вариант, можете выбрать кафе, в которое больше никогда, ни при каких обстоятельствах не войдете. Пусть у вас будет на карте города такое табу. Жить с табу гораздо интереснее. В идеальном случае можете совместить, как собираюсь сделать я: назначить встречу в кафе, где больше никогда не будете, с человеком, которого больше никогда не увидите. Тем самым я убиваю двух зайцев, потому что ничто больше не напомнит мне этого человека.</p><p class="p1">Душа как раз и есть инструмент для расставания навсегда, если вы еще не поняли, и это не дешевый афоризм, так и просящийся в «Фейсбук», но прямое и точное определение. Душа — для того, чтобы прощаться и забывать. Душа остается от вас, когда вы целиком исчезаете из мира, и это прощание для нее не трагедия, а праздник. Приходите в сквер, где уже чувствуется осень. Осмотритесь в кафе, где уже чувствуется вечер. Посмотрите на женщину, в которой уже чувствуется — много чего уже чувствуется, а она и сама не знает. Посмотрите на все это, по вашему выбору. Глубоко вдохните. Запомните запах. Вы никогда больше этого не увидите. Тысячи детей увидят этот сквер, будут там скакать на одной ножке: «слепая», «золотая», — как там дальше, всегда забывал. Тысячи людей будут сидеть в этом кафе. Несколько человек будут сидеть в кафе и лежать в кровати с этой женщиной, которая мне когда-то клялась, что без меня ее мир рухнет, а теперь она с трудом выдерживает еле выпрошенные у нее напоследок десять минут. Пять минут прошло, и начинается отсчет.</p><p class="p1">Засеките время по часам.</p><p class="p1">Молчите. Попросите помолчать.</p><p class="p1">Точно запомните момент, в который вам станет все равно. Момент, в который вы почувствуете облегчение, просто встав и направившись к выходу.</p><p class="p1">Заплатить лучше заранее, а можно вообще ничего не заказывать.</p><p class="p1">Но этот момент еще не означает, что надо встать и уйти. Просто заметьте, запомните его. Если хотите — запишите.</p><p class="p1">Точно зафиксируйте момент, когда вам станет невыносимо дольше здесь находиться. Когда вы перестанете понимать, что делаете в этом сквере, в этом магазине, с этой женщиной. С этим, как вариант, мужчиной, который тоже явно тяготится вашим присутствием и чувствует неловкость — ему непонятно, что за цирк вы решили устроить напоследок.</p><p class="p1">Вот после этого момента отвращения надо еще высчитать 20 секунд, после чего медленно встать и уйти.</p><p class="p1">Из этого кафе, от этой женщины, из этого сквера с вдавленными в землю крышечками бутылок.</p><p class="p1">В какой-то момент вам покажется, что вас зовут назад. Что, даже не говоря ни слова, вас притягивают. И, может быть, какая-то девушка в сквере смотрит вам вслед.</p><p class="p1">Этого не надо, это ничего не изменит, и, если вы сейчас останетесь, я с вами больше дела иметь не буду. Сидите в этом сквере, в этом кафе, с этим мужчиной, всю жизнь сидите, я знать вас больше не хочу. У вас нет и не было никакой души и никогда не отрастет.</p><p class="p1">Как только вышли, засекайте время и производите расчет. Безразличие наступило через 2 минуты 20 секунд — итого 140 секунд; отвращение наступило еще через 3 минуты 35 секунд, итого 215 секунд. N 1, таким образом, составляет 355.</p><p class="p1">Запоминаем этот параграф и переходим к следующему упражнению.</p><p class="p1">Вернитесь домой. Возьмите лист бумаги. Поделите его на две части.</p><p class="p1">Составьте два списка.</p><p class="empty-line"/><p class="p1">1. Чего мне жалко.</p><p class="empty-line"/><p class="p1">2. Чего мне не жалко.</p><p class="empty-line"/><p class="p1">Представьте, что прощаетесь с миром навсегда, и попытайтесь перечислить с максимальной точностью, что вам было бы жалко оставить. Можете делать это на улице, если погода хорошая. Просто в задумчивости ходите по улицам и перебирайте, что вам жалко. Не принципиально, где вы живете, где ходите и что видите. Допускаю, что вы живете в таких местах, где человека преследует единственное стремление — сбежать. И все равно при мысли, что он сбегает навсегда, ему будет нерадостно или, по крайней мере, к его радости будет примешиваться некое чувство, которое и контролирует душа.</p><p class="p1">Не думайте, пожалуйста, что если душа предназначена для расставаний, то у вас должны преобладать предметы, которых вам не жалко. Это неправда. Научитесь понимать, что душа ни за, ни против; душа — та непрозрачность, сдвиг, который мешает вам ощущать радость или тоску в чистом виде. Душа — то, что примешивается, неуловимым образом прибавляется, искажает оптику. И вообще не старайтесь подогнать списки к конкретному результату. Составляйте всерьез, а не так, как будто за вами наблюдают на том же «Фейсбуке». Не пишите напыщенной ерунды вроде «жаворонки на рассвете» или «мужская дружба». Упоминайте конкретные вещи и ситуации, в которых вам особенно жалко было бы не поучаствовать потому, что вы лежите глубоко под землей или развеяны над ней (второе, по-моему, во всех отношениях лучше). Помните, что вы пишете с точки зрения смерти, от лица уже не существующего здесь покойного трупа. Но если бы вы могли о чем-то пожалеть, то пожалели бы об этом. Вряд ли вас сильно заботили бы тогда жаворонки на рассвете. А вот что вам было бы искренне жаль сисек Лены N — это я допускаю. Сиськи Лены N были хороши в любое время суток. Если бы они летали на рассвете вместо жаворонков, это было бы куда более приятное зрелище.</p><p class="p1">ВНИМАНИЕ! Во втором списке должны преобладать не просто предметы, которых вам не жалко, а именно то, отчего вы рады, счастливы будете избавиться. То, что вызывает у вас активное отторжение — не живую ненависть, а спокойное, счастливое сознание, что больше вы этого не увидите.</p><p class="p1">Я тоже сейчас буду честно составлять этот список.</p><p class="empty-line"/><p class="p1">МНЕ ЖАЛКО (оставить)</p><p class="p1">Талантливых книжных детей</p><p class="p1">Стихи (как процесс)</p><p class="p1">Мартовский вечер, первый с настоящей оттепелью</p><p class="p1">Холодную воду (пить)</p><p class="p1">Сирень</p><p class="p1">Дачу (некому будет приводить ее в порядок, все придет в запустение)</p><p class="p1">Ялтинскую набережную от кафе «Ялос» до Ореанды</p><p class="p1">Антикварный магазин там же</p><p class="p1">Один пляж в Гурзуфе рядом с гротом</p><p class="p1">Смотровую площадку на Ленинских горах</p><p class="p1">Сегвей</p><p class="p1">Двух человек, которых я не назову</p><p class="empty-line"/><p class="p1">МНЕ НЕ ЖАЛКО</p><p class="p1">Россию целиком, вместе с пейзажами</p><p class="p1">Женщин в целом, кроме двух</p><p class="p1">Работу</p><p class="p1">Церковь в любой форме</p><p class="p1">Спорт</p><p class="p1">Необходимость рано вставать</p><p class="p1">Смену времен года</p><p class="empty-line"/><p class="p1">Ко всему остальному я нейтрален. Есть — хорошо, нет — обойдусь.</p><p class="p1">Так было не всегда, но устройство жизни таково — ближе к смерти перестаешь так уж цепляться за все это. Очень милосердно, если вдуматься. Обратите внимание, как старик зашорен, как мало он понимает, как плохо слышит. В такое время душа, если она есть, целиком сосредоточена на себе и уже почти перешла в миры, где приметы первого уровня ее мало заботят. А если души нет, начинаются постоянные обиды и слежка за соседями, у некоторых еще скопидомство или вера в национальную исключительность.</p><p class="p1">Составили свой список?</p><p class="p1">Высчитайте разницу между количеством позиций в двух столбцах. В моем случае, как видите, это 12–7=5. Это и есть показатель N 2.</p><p class="p1">А теперь самое сложное. Главное свойство, по которому верифицируется наличие души, — ее способность находиться вне тела, которое способно некоторое время функционировать без нее. Некоторые вообще живут без души — и ничего. Но, чтобы это проверить, вам понадобится помощник — в одиночку такие вещи не делаются.</p><p class="p1">Налейте ванну, тем более что уже вечер. Погрузитесь туда целиком, с головой, высунув что-нибудь наружу — допустим, ноги, — если это не помещается. Использование акваланга запрещается, трубку тоже нельзя. Пока вы там находитесь, пусть в ванну войдет помощник (помощница), неся предмет. Ваша душа должна будет покинуть тело и увидеть ванну как бы сверху, а потом посмотреть на предмет и сказать вам, что это такое. Держать голову в воде — с закрытыми глазами — надо довольно долго, потому что душа должна успеть вылететь и осмотреться. Но так, чтобы вы не задохнулись, потому что тогда вы не сможете пройти «Квартал» и у вас уже никогда не будет денег.</p><p class="p1">Есть паллиативные варианты — скажем, повязка на глазах, — но тогда вы не сможете как следует задержать дыхание, и душа не сможет вылететь на несколько секунд. Если вы не сможете выпустить душу и увидеть предмет, значит, она у вас еще недостаточно развита, и эксперимент придется повторить через три недели, 22 сентября. Если вы не угадали предмет, но вам показалось, что вы его увидели, — повторите эксперимент немедленно, как только отдышитесь.</p><p class="p1">Помните: надо не угадывать, а сосредоточенно представить себе ванну. Чем точнее вы ее себе представили, тем, значит, лучше ее видит ваша душа. И тогда она обернется и увидит предмет, и все у вас получится. Выдумывать не надо. Включать мозг вообще не надо. Просто, если вы правильно делали все предыдущие упражнения, это уже не вызовет у вас ни малейших трудностей. Душа вам все скажет и осторожно вернется обратно.</p><p class="p1">Попросите помощника засечь, сколько секунд вы провели в погруженном состоянии.</p><p class="p1">ВНИМАНИЕ! Правильный выбор помощника очень важен. Бывает такой помощник, что прижмет вас там в ванне, и у вас уже точно не будет денег. Лучше выбрать такого помощника, при котором вам не стыдно лежать в ванне, а то вы будете думать про всякую ерунду.</p><p class="p1">Показатель N3 — это количество секунд, понадобившееся вам на выполнение третьего упражнения. В моем случае это 11. Следовательно, умножаем 355 на 5 и делим на 11. Округляем. Получаем 161.</p><p class="p1">Это и есть мой коэффициент души. Неплохо. Для сравнения: аналогичный показатель Шарлотты Ремплинг — 382, Шэрон Стоун — 215, а у Джонни Деппа ничего не получилось, то есть он смог увидеть предмет, но не смог испытать должное отвращение к одному человеку.</p><p class="p1">Как узнать коэффициент души известных людей? Это несложно, он зашифрован в их биографии, это обычный способ для «Википедии». Возьмите статью о них в «Википедии», которая затем и придумана, чтобы зашифровывать подобные сведения, сложите все цифры (не числа! А то там есть и миллионы), которые там упомянуты, и разделите на 12 — это код, применяемый конкретно в этом случае. Так режиссеры выбирают актеров, а богатеи — возлюбленных: при душевном коэффициенте меньше 100 лучше не связываться.</p><p class="p1">Отжиматься сегодня необязательно.</p></span><span id="id52"><div class="title2">
<p class="p">2 сентября</p>
</div><p class="p1">Eh bien, некоторые резонно упрекнут нас в отрыве от внешнего мира. Пока мы тут совершенствуем свою душу, обоснованно надеясь, что за это к нам придут деньги, — в мире происходит чудовищное количество несправедливостей, против которых уже, наверное, надо бы как-то возразить. Как-то протестовать. Мы совершенно аполитичны, а ведь деньги приходят только к смелому. Вообще-то, если говорить совсем честно, деньги приходят к тому, кто выключил себя из всех ложных связей, а стало быть, из политических тоже; но может ли считаться совершенным человек, который плюет на явную несправедливость?</p><p class="p1">Вопрос не так однозначен. Очевидно, что никогда не станет совершенен человек, полагающий, что так им всем и надо; что если мы сегодня относительно здоровы, не в тюрьме и не в ссылке, то это нам такое поощрение за прекрасную душу. И нищему подали, и девочку погладили без дурного намерения, и по службе продвинулись, и никогда не ездим на красный свет. Во-первых, глуп человек, полагающий, что все с ним происходит почему-то: в действительности все происходит зачем-то, потому что вообразить мелочного и сутяжного Бога, непрерывно воздающего по грехам в условиях чрезвычайно, чрезвыча-а-айно размытой морали, отказывается и самое извращенное воображение. Кому нужен — вдумайтесь — этот строй счетных машинок (представить на их месте ангелов тем более невозможно, ибо когда же ангелы успели так нагрешить, что их усадили за эту бухгалтерию?!), этот непрерывный подсчет дурных мыслей, сквозьзубных ругательств, плевков мимо урны… допустим, энергетически это еще представимо — для Бога невозможного нет, — но смысл? Связывать земные страдания с этикой, а воздаяния — с грехами может только РПЦ, и то не вся, а кто-то из самых отвратительных ее спикеров; ясно, что, говоря о справедливости или несправедливости, мы никак не имеем в виду болезни и случайности. Мы имеем в виду тех, кто страдает по вине конкретного общества; мы занимаемся нравственным усовершенствованием, а в это время в российских тюрьмах томятся невинные, в российских зонах заставляют работать по 17 часов и за малейшую жалобу прячут в карцер либо припаивают клевету; в российской провинции нет работы, а в деревнях — света. Замените слово «российский» на любое другое — в Гуантанамо пытают, в Латинской Америке живут впроголодь, в Китае публично расстреливают, и, поскольку «Квартал» — как чтение и как технология — уже триумфально шествует по миру, а Родина, как всегда, заприметила его последней, все его исполнители отлично знают о чисто человеческих, рациональных и поправимых несправедливостях, среди которых живут. Опыт показывает, что при прохождении «Квартала» в начале сентября непременно возникает вопрос: ну хорошо, мы спасаемся. Но как же ужасный внешний мир, среди которого личное спасение проблематично?</p><p class="p1">Поэтому сегодня мы боремся с несправедливостями. Боремся именно тем способом, который позволяет привлечь к ним наибольшее внимание. Прежде всего надо отказаться от глупой мысли, будто максимум людей, вышедших на улицы, способен произвести на кого-то впечатление. Власть прекрасно обо всем знает и не чешется. Политическая система вашей страны не рассчитана на справедливость. Демонстрации бессмысленны, потому что никого не могут напугать. Несправедливости устраняются не тогда, когда случаются уличные протесты, а тогда, когда власть берут чуть более приличные люди. Единственный возможный прогресс — увеличение количества совершенных людей, то есть тех, кто не встраивается в ложные цепочки. Если у годно, ваше участие в прогрессе — это и есть прохождение вами «Квартала». Когда все люди пройдут «Квартал», несправедливость не то чтобы исчезнет, но сведется к минимуму. Забота о собственной душе — единственный способ приближения к справедливому обществу, в котором не будет ложных зависимостей. Но, чтобы нормально пройти «Квартал», нужно избавиться от ненужных угрызений совести. Именно эту цель преследуют все люди, участвующие в социальных и иных протестах. Невозможно изменить тот факт, что все продукты дорожают, в обществе всё увереннее преобладают дебилы, а люди, работающие в пенитенциарной системе, не знают других развлечений, кроме пыток. Чем скорее мы осознаем неизменность этого факта на протяжении всей истории, тем быстрее поймем, что направление и смысл нашего протеста должны быть другими. Человек протестует не ради перемен, которых все равно не будет, а ради того, чтобы на короткое мгновение успокоилась его совесть — и появилась тем самым возможность для духовного совершенствования. При больной совести вообще ничего не получается, все валится из рук, суп пересаливается, роман не пишется, секс не доставляет удовольствия и не осуществляется вовсе. Чистая совесть — вот истинная цель всякого протеста, потому что других целей вообще нет ни у чего. Вы не успокоитесь, пока не пострадаете. Итак, наша задача — сделать так, чтобы ваше страдание не помешало вам проходить «Квартал». Именно поэтому вам не надо выходить на площади — все равно про вас скажут, что вы пытаетесь привлечь к себе внимание и т. д. Истинный протест — тот, которого никто не видит, потому что иначе вы привлекаете слишком много внимания, все уже думают про вас, а не про несчастных людей, которых вы защищаете. Это нечестно. Понимаете ли вы теперь, что протестовать надо дома, лучше всего при закрытых дверях?</p><p class="p1">Не следует думать, что неприятности, которые вы себе причиняете этим протестом, могут уменьшить или хотя бы перераспределить количество зла в мире. Все это глупости. Количество зла в мире — не константа. Если к страдальцам прибавятся 50, 500 или 5000 человек — страдальцам легче не станет. Точно так же неисполнима, скажем, мечта Чехова из хорошего, в сущности, рассказа «Дом с мезонином»: «Возьмите на себя долю их труда. Если бы все мы, городские и деревенские жители, все без исключения, согласились поделить между собою труд, который затрачивается вообще человечеством на удовлетворение физических потребностей, то на каждого из нас, быть может, пришлось бы не более двух-трех часов в день». На каждого из нас приходилось бы ровно столько же, потому что человечество трудится не ради удовлетворения физических потребностей, а чтобы угнетать других или занимать себя. Физические потребности вообще никого не волнуют. В СССР стали трудиться все, включая сестер Волчаниновых, а труд только все прибывал и прибывал. Своим дискомфортом вы не облегчите чужой, и даже если всех протестующих посадят, сидящим не станет от этого легче. Напротив, на их долю будет приходиться меньше хлеба и сахара. А когда я читаю данные одной такой организаторши протестов в «ЖЖ», я хватаюсь за пистолет: «Активистка оппозиции. Феминистка, вегетарианка, анархистка, защитница животных, асексуалка, чайлдфри». Плевать на то, что она чайлдфри, это безумие и вдобавок фашизм, об этом мы не дискутируем, потому что эдак можно додискутироваться до оправдания людоедства. Если кто-то любит животных больше, чем детей, то и на здоровье. Ниже она еще пишет, что не очень любит вип-персон, так что разбираться с этим сознанием, искалеченным завистью, вообще не следовало бы. Нас интересует другое — «гражданская активистка». Что она делает? Собирает подписи. Асексуалка собирает подписи. Честное слово, если бы она трахалась, толку было бы больше, потому что, пока люди заняты сексом, у них по крайней мере нет времени на взаимное мучительство, а каждый асексуал, в особенности гражданский активист, добавляет во Вселенную луч ненависти и тем портит атмосферу. Какая она, в жопу, гражданская активистка? В чем ее гражданская активность? И ведь она считает себя вправе задевать приличных людей и уважает себя выше крыши — за что? За подписи? Вы хотите быть, как она? А по-другому все равно не получится.</p><p class="p1">Поэтому при закрытых дверях! Закрытых, сволочь! Наедине с собой! Раздеваемся до белья. Заворачиваемся в холодную мокрую простыню. Выходим на середину комнаты. Встаем на одну ногу. Стоим на одной ноге! Пять минут, ни минутой меньше, стоим на одной ноге! Ласточкой, журавлем, подняв колено — как хотите, только чтобы на одной и на середине комнаты, чтобы ни за стену, ни за мебель не держаться. Подпрыгивать разрешается. Опустил вторую ногу — начинаешь сначала: гражданский протест, non penis caninus!</p><p class="p1">Постоял? Теперь на другой.</p><p class="p1">Пять минут! Ни секундой меньше! По часам!</p><p class="p1">Вот смотрите: голый взрослый (хочется надеяться, что взрослый), завернутый в мокрую простыню человек среди комнаты стоит на одной ноге.</p><p class="p1">Но в этом все-таки больше смысла, чем в асексуальном собирании подписей, в одиночных пикетах на Житной и в публичных заявлениях типа «Не забудем, не простим».</p><p class="p1">Результат один, а позора гораздо меньше.</p><p class="p1">И вдобавок, очистив свою совесть, вы по крайней мере можете не спрашивать себя всю следующую неделю, придут ли за вами. За вами не придут. Кому, на хер, нужен идиот в мокрой простыне на одной ноге?</p><p class="p1">Только Богу. Смысл нашей жизни в том, чтобы ему не было скучно, другого нет и неизвестно.</p></span></span>
