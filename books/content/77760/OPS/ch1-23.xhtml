<span><span id="id80"><div class="title2">
<p class="p">30 сентября</p>
</div><p class="p1">РАЗВИЛКА!</p><p class="p1">Я к вам привык, вы ко мне тоже, но ничего не поделаешь, сегодня у нас последняя развилка.</p><p class="p1">Сегодня нам понадобится таиландская монета в 10 бат, тяжелая, красивая, в биметаллическом варианте. Если не были в Таиланде, купите подарочный набор местных монет, он стоит копейки. На реверсе — Ват Арун, храм Утренней Зари. На аверсе — молодой король Рама IX, Пумипон Адульядет, царствующий с 1946 года. Он пережил 16 конституций, 18 государственных переворотов и премьер-министров без числа. Его состояние — примерно 35 миллиардов долларов, но это разве важно? «Неважно, насколько мы богатая страна, важно, счастливы ли мы», — говорит король. Он хорошо рисует, выпускает комиксы. Он так же хорошо играет на саксофоне. Страна его обожает. «Если мы не будем жадными, мы будем жить хорошо», — говорит король. Прекрасный трогательный старик. Жену зовут королева Сирикет.</p><p class="p1">Ну, то есть это не просто так монета, хотим мы сказать.</p><p class="p1">Перед бросанием проделываем комплекс 1. Если день дождливый, принимаем 100 граммов коньяку внутрь с любой закуской. Если ясный — выпиваем кружку черного чаю. Если просто пасмурный — съедаем небольшую шоколадку, не запивая ничем.</p><p class="p1">Выходим примерно на середину комнаты. Лицом встаем на восток. Бросаем монету трижды.</p><p class="p1">Если по результатам трех бросков преобладает король Пумипон Адульядет, Рама IX, мы продолжаем работать.</p><p class="p1">Если храмовый комплекс Ват Арун (храм Утренней Зари) — извините, мы прощаемся: либо навсегда, либо до следующего года. Это уж как хотите.</p><p class="p1">Но мы прощаемся не сразу, конечно. Мы посвящаем этот день друг другу. Из «Квартала» так просто не выйти, и вы уже знаете, что, если начать упражнения и бросить их сразу — последствия могут быть непредсказуемы. Мы должны проститься по всем правилам, с облегчением, без взаимной злобы. Так, чтобы летом будущего года была возможность начать всё сначала — или уж с удовольствием вспоминать, как мы веселились в этом году.</p><p class="p1">Если вам выпал король, вам повезло, мы вас поздравляем, но сегодня мы интересуемся не вами. Сегодня делайте что хотите. Только не пейте много, завтра вам понадобится здоровье. Мы всё понимаем, но сегодня нам интереснее тот, другой. Быть нелюбимым, боже мой, какое счастье быть несчастным, идти под дождиком домой с лицом потерянным и красным, и все такое. Вечное утешение лузеров, которого лузеры, однако, никогда не поймут, потому что не умеют извлечь счастья из этого состояния, а кто умеет — тот, как правило, счастлив в любви. Тут парадокс.</p><p class="p1">Но мы сейчас научимся быть совершенно счастливыми лузерами, поскольку совершаем по нашему Кварталу поездку к храму Утренней Зари, полностью Ват Арун Ватчарарарам Ратчаварарамхавиан. Проблема в том, что попасть к храму можно в строго определенное время, станций метро около него нет, подбираются к нему либо лодкой от станции наземного метро «Сафан Таксин» (там рядом пристань), либо автобусами № 19, 57 и 83, см. путеводитель «Весь Бангкок глазами дурацкого идиотского дурака из журнала «Афиша»». Можно еще, конечно, на такси, но это объездом почти через весь город.</p><p class="p1">Ваши действия.</p><p class="p1">1.</p><p class="p1">Выходим из дому. Это уж обязательно. Без этого никак. С собой можно взять термос, потому что дорога долгая. Термос может быть с кофе, а может, если лень возиться, пустой.</p><p class="p1">2.</p><p class="p1">Вспоминаем, ходит ли где-нибудь по вашему району транспорт с № 19, 57 или 83. Если ходит, все очень просто. Добираемся до остановки, садимся в автобус/троллейбус, проезжаем пять остановок в ту сторону, которая севернее, и перед нами храм Ват Арун, можно приступать к медитации (см. п. 7).</p><p class="p1">3.</p><p class="p1">Если в вашем районе есть метро, все еще проще. Добираемся до ближайшего метро, едем до станции «Сафан Таксин» (или любой другой, начинающейся на С, а если такой нет — три остановки в сторону центра), выходим на остановку и спрашиваем, где тут пристань. Если нам объяснили — идем на пристань. Если выразились в том смысле, что никакой пристани тут нет, — садимся в ближайшее маршрутное такси или автобус. Спрашиваем водителя, где храм. Напротив храма вылезаем. Если храма нет, спрашиваем, где универмаг «Заря». Если нет универмага, выходим на конечной и приступаем к медитации (см. п. 7).</p><p class="p1">4.</p><p class="p1">Если нет ни автобуса, ни метро, берем такси. Ну, или заказываем. Но это, предупреждали же, дорого, потому что добираться надо через весь город. Едем через весь город по любому выбранному вами маршруту (не менее 45 минут), но так, чтобы оказаться у берега реки Чаопрайа. На ее берегу стоит храм Ват Арун, но на другом, противоположном. На том, куда вы приехали, находится храм Лежащего Будды, иначе Ват По. Ложимся и начинаем медитировать (см. п. 7).</p><p class="p1">5.</p><p class="p1">Если нет денег на такси, идем пешком. Пешком, как ни странно, совсем близко. Ну их всех к черту, с этими такси. Но только если денег действительно нет. Если есть, а вы пошли пешком, ничего ужасного, конечно, не случится, но удачи не видать, потому что удача любит щедрых. Хотя если денег правда очень жалко, тогда ладно.</p><p class="p1">Вот мы вышли. Строго сверяясь с книгой, идем по улице Благих начинаний, это сегодня у нас будет проспект Тханон Арун Аммарин, до первого поворота налево. Проговариваем вслух «Тханон Арун Аммарин». Что это значит, не знаю, но звучит прекрасно. Поворачиваем, проходим 50 метров. Ба-ба-ба, сюда нельзя. Что значит почему? Дорожные работы. Там у них всегда ремонт, это улица Ванг Доен, 8. Что делать, поворачиваем назад, возвращаемся на Тханон Арун Аммарин, идем до второго поворота налево. Поворачиваем. Проходим Парк королевы-матери. Сразу за Парком королевы-матери (вы его узнаете по наличию деревьев) поворачиваем направо. Проходим 200 метров, это у нас будет поворот на улицу Ванг Доем, 6. Поворачиваем налево. Проходим 50 метров, дальше нельзя. А почему? А там облава на наркоторговцев, в Бангкоке это обычное дело. Мы же не хотим попасть в облаву? Разворачиваемся, возвращаемся к Парку королевы-матери, идем до второго поворота направо. Поворачиваем. Проходим 100 метров. Открываем термос, пьем (или, если там пусто, закрываем термос). Устали мы, притомились. Чертовски жарко в этом самом Бангкоке, как здесь только люди живут. И запахи, сложная их система: нежная гнилость, развратное цветение, душные, самую душу пропитывающие запахи. И еда так же нежно воняет: здесь едят джекфрут, анону, манго очень много едят, фрукты вообще такие, каких нигде больше нет, вон мальчик прошел, так то, что он ест, — как раз анона. И все это в сочетании с рыбой и морскими гадами, которыми тут все провоняло. Едят то есть в основном вещи, которые портятся почти сразу, поэтому есть надо очень быстро (а вовсе не потому, что население голодное: оно свято чтит завет короля — не будем жадными, и все у нас появится). И все пахнет нежной гниющей едой, испорченным деликатесом. Девушки такие же — нежные и скоропортящиеся. Вот две прошли. С виду ничего, а уже испорченные. Пошли дальше. Первый поворот направо, потом первый налево, дальше нельзя, там овощной базар. Берем дуриан, такой фрукт. В гостиницу с ним нельзя, ужасно пахнет. Надо разделать и съесть прямо здесь. Он пахнет вообще-то луком, немного сыром, внутри сметанообразный и сладкий, похож на взбитые сливки, так что берем лук, сыр, сливки. Лук и сыр прячем, сливки частично съедаем. Обходим базар (если это обычный продовольственный магазин, то просто заходим с другой стороны). Поворачиваемся на север. Перед нами Ват Арун. Приступаем к медитации (п. 7).</p><p class="p1">6.</p><p class="p1">Если мы больны, или на нас наложена епитимья не покидать дом (см. 25 сентября), или если выход на улицу сопряжен для нас с определенной психической травмой, то есть нам туда очень сильно не хочется, или если на улице стихийное бедствие, то повторяем весь маршрут в комнате: проговаривая названия улиц, делаем по кругу 500 шагов направо, 100 налево, 50 направо, 100 налево, съедаем дуриан (лук — сыр — сливки), становимся спиной к холодильнику, видим Ват Арун.</p><p class="p1">7.</p><p class="p1">Медитируем.</p><p class="p1">Садимся напротив храма в удобную позу (необязательно по-турецки, в любую). Долго смотрим на четыре прекрасные башни по бокам и одну, самую высокую, в центре. Сверяемся с монетой. Да, вот он точно такой и есть — главный храм древнего Бангкока, столь старый, что даты его строительства никто не помнит. Даже небо над ним кажется светлее, нежнее, жиже. Электричеством деликатно подсвечено ажурное плетение центральной башни. Высота ее — 88 метров, это же подумать только. Долго, внимательно всматриваемся в центральную башню. Смотрим и думаем: дурак я, дурак, мало того, что неудачник, так вместо того, чтобы с облегчением бросить всю эту хрень, еще и в последний день играю в идиотские игры! Неужели мне настолько нечем больше заняться?! И вот они все строили эти 88 метров — неужели только для того, чтобы другие идиоты искали здесь счастья, трогали будд на фасаде, загадывали желания, фотографировались на фоне? Лузеры, лузеры, из лузеров состоит мир. И сами мы, Господи, какое же ничтожество! Топаем тут, хлопаем, играем в храм Утренней Зари, тогда как перед нами в лучшем случае дом 8, а в худшем — кухонное окно, за которым листопад! Когда эта мысль завладеет нами достаточно прочно, мы встаем, отряхиваемся и начинаем жить дальше, как будто ничего не было, как будто не мы упражнялись в детской вере, как будто вообще не участвовали во всем этом позоре.</p><p class="p1">Обратно можно ехать на такси. Если не выходили из дома, можно выйти, покурить.</p><p class="empty-line"/><p class="p1">Ну, а вас, которому выпал король Рама IX Пумипон Адульядет, мы поздравляем, обнимаем, целуем. Нам предстоит самое интересное — две недели напряженного приближения к счастью. Ну их, этих несчастных, им все равно нельзя помочь. Расстройство одно. А у нас, избранных, всё впереди.</p></span><span id="id81"><div class="title2">
<p class="p">1 октября</p>
</div><p class="p1">Перепечатайте от руки на компьютере следующий текст.</p><p class="empty-line"/><p class="p1">Когда в два часа ночи Клоков выходил из Настиного дома, чтобы к трем вернуться домой (предлог у него был заготовлен — ночной монтаж), с ним случилась очень странная вещь, с которой все и началось. Шел дождь, он заметил его еще у Насти — стучало в окно. Уходить страшно не хотелось. Хотелось спать. Настя не плакала, и это было плохим знаком: значит, привыкла и ни на что уже не надеется. А раз Настя не надеется, значит, шансов действительно нет: он ни на что не решится, какое-то время все еще протянется, а потом кончится так же, как кончалось всегда. Его мучила двойная вина, и головная боль, и желание спать, и надо было еще добираться домой под дождем. С Настей, как всегда, все было очень хорошо, но и с ней он отчетливо понимал, что жить вместе они никогда не смогут, на пятый день станет не о чем говорить. Теперь, кажется, и она все понимала.</p><p class="p1">Клоков спустился на лифте, мельком глянул в зеркало, очень не понравился себе и спустился по короткой темной лестнице к двери парадного. Свет в подъезде всегда был тусклый, словно пыльный. Он собрался нажать на кнопку и открыть входную дверь, но тут она отворилась сама, словно кто-то собрался входить. Клоков подобрался — кто еще шляется по ночам, — но за дверью никого не было, она сама перед ним распахнулась. Он вышел и заглянул за дверь — кто это за ней прячется такой услужливый? Сначала он никого не заметил, потом опустил глаза и тогда увидел.</p><p class="p1">Дверь перед ним открыло и теперь за ней пряталось очень странное существо, которое он принял сначала за карлика в шляпе. Мало ли, ночью домой возвращается лилипут. Клоков страшно испугался сразу, в первый же момент, но существо стояло неподвижно, и надо было сделать усилие над собой, наклониться, заглянуть ему в лицо. Это не было лицом, вообще сразу под шляпой начиналось непонятное и неописуемое. Перед ним стояло законченное воплощение несчастья, болезни и несуразицы: осклизлая, комковатая масса вместо физиономии, и ниже, под детским пальтишком, явно пряталась такая же масса, темно-розовая, местами бурая, с впадинами и наплывами. И хотя глаз существа Клоков не видел, оно явно на него смотрело и чего-то ждало: стоило сделать неверный шаг или сказать не то слово, как ночной урод набросился бы на него, впился, проник, слился с ним навеки. Застыв, они молча смотрели друг на друга. Это не было зло, скорее именно сплошное несчастье, ком плоти, в котором всё не так. Однажды Клоков купил на рынке банку рыбных консервов, которую продавец подал ему с нехорошей усмешкой: видимо, эта банка очень давно лежала на складе. Когда дома Клоков открыл ее, там оказалась даже не гниль, а страшные остатки безумной и напрасной переработки, осколки костей — явно не рыбьих — и зловонные хлопья, от которых даже собака, караулившая у стола, метнулась с ужасом. Он выбросил банку даже не в ведро, а сразу в мусоропровод, чтобы отделаться от этой мерзости скорее и окончательнее. Сейчас целый сгусток этой мерзости, кое-как задрапированный детским карликовым пальто, стоял перед ним и никуда не девался, и невозможно было внушить себе, что все это сон, что Клоков просто заснул у Насти, как всегда бывает, когда надо выйти и не решаешься, — это самый липкий, самый одурманивающий сон, сквозь который всегда просвечивают комната и часы, показывающие уже пять минут третьего; надо стряхнуть оцепенение — и не можешь. Однако дождь был настоящий, дверь была настоящая, и карлик был то самое окончательное и бесповоротное настоящее, в которое превратилась теперь его жизнь, давно рвущаяся между двумя одинаково невыносимыми вариантами.</p><p class="p1">Это было существо не просто больное, а неудачное во всем, с самого своего рождения, если оно вообще когда-то рождалось; не роковой монстр, а отброс, гниль бытия, болезнь во всем и сразу. И ужаснее всего была именно неудачность этого зла, его мелкость и кривизна, потому что если обычному злу можно противостоять, то с больным ничего не сделаешь. Можно спорить с врагом, но невозможно — с гниением. Как назло, почти ни одно окно не горело, и никто не выходил из подъезда, и вся тьма осенней ночи — самого неуютного, тревожного времени, когда еще цела листва и, значит, есть кому отчаянно и тревожно шуметь напоследок, — словно одобряла карлика, говоря: так и надо, ты заслужил именно это, ничего другого теперь не будет.</p><p class="p1">У подъезда, заметил Клоков боковым зрением, стояла машина, синяя, блестящая, и запирала выезд его «Мазде», и из этой машины, понял он, тоже наблюдали.</p><p class="empty-line"/><p class="p1">ОТВЕТЬТЕ НА СЛЕДУЮЩИЕ ВОПРОСЫ ПО ТЕКСТУ.</p><p class="empty-line"/><p class="p1">1. Почему Клокова мучает совесть?</p><p class="empty-line"/><p class="p1">2. Во что был обут карлик?</p><p class="empty-line"/><p class="p1">3. Сможет ли Клоков благополучно вернуться к жене?</p><p class="empty-line"/><p class="p1">4. Не стоит ли Клокову вернуться к Насте и там переждать?</p><p class="empty-line"/><p class="p1">5. Зачем вы перепечатали этот тек ст?</p><p class="empty-line"/><p class="p1">Клоков — это я, карлик — это мое безумие, которое подступило уже вплотную и скоро порвет меня в клоки.</p></span><span id="id82"><div class="title2">
<p class="p">2 октября</p>
</div><p class="p1">Сегодня к вам обратится с просьбой человек, которого вы знаете, но не близко.</p><p class="p1">Не беспокойтесь, это произойдет обязательно, и не надо мне говорить, что вас каждый день о чем-нибудь просят. Я могу и конкретизировать, если хотите. Человек обратится к вам с просьбой между 12 и 16 часами дня, это с вероятностью 2 к 1 будет мужчина, просьба будет вам не слишком приятна, хотя проситель скорее приятен. Или нейтрален по крайней мере.</p><p class="p1">Так вот.</p><p class="p1">Ни в коем случае.</p><p class="p1">Ни при каких обстоятельствах.</p><p class="p1">Дело даже не в том, что вы должны постепенно отучать себя от подобных контактов, от собственной и чужой снисходительности, от ненужных обязательств перед ненужными людьми. Не в этом дело. А просто он вас отвлекает от главного, которое уже вот-вот.</p><p class="p1">Их много таких, желающих отвлечь от главного, и на этой неделе будет особенно много. А мы сейчас несем в себе такой запас денег и совершенства, что постороннего человека он может просто ранить. Не убить, но ранить. И посмотрите, сколько лишних писем, звонков, даже просто на улице подходят со всякой ерундой. Зачем вам это? Привыкайте переходить в другое состояние, другой круг.</p><p class="p1">Теперь вопрос.</p><p class="p1">А если это тоже человек из «Квартала», человек проходящий, Homo Procedens, что гораздо важней, чем человек прямоходящий, потому что прямоходящий еще неизвестно, куда идет, а проходящий проходит «Квартал»?</p><p class="p1">Ни в коем случае.</p><p class="p1">Ни при каких обстоятельствах.</p><p class="p1">Потому что теперь, когда вы оба почти прошли «Квартал», вы дальше друг от друга, чем в начале этого прохождения. Потому что человек, проходящий «Квартал», глубоко ушел в себя, и другие ему не нужны. Потому что путь «Квартала» — путь сугубо личный, и сколько проходящих, столько «Кварталов». Эта книга не существует в каноническом варианте. Ее пишете вы.</p><p class="p1">И результаты, к которым вы придете, другие. И глубины, которых достигнете, разные. И я за то, чтобы вы вообще не встречались, кроме одного дня развиртуализации. Мы знаем друг о друге, и достаточно.</p><p class="p1">Так сделано все лучшее в мире.</p><p class="p1">Вы все равно будете встречаться и даже, возможно, узнавать друг друга, потому что Everything that rises must converge (это вообще один из самых фундаментальных, просто-таки физических законов бытия), и Here Comes Everybody, что еще короче.</p><p class="p1">И чем выполнять дурацкие просьбы идиотских людей, вспомните-ка лучше автора первой фразы (точней, сборника с таким названием, очень хорошего, страшного сборника), а также автора второй (правда, HCE значит там еще и House Castle and Environs, и Harold Chimpden Earwicker).</p><p class="p1">Постарайтесь сделать это, не заглядывая в Интернет. По-моему, вы уже достаточно умны для этого.</p><p class="p1">Запишите имя первого автора:</p><p class="p1">____________________________________</p><p class="p1">Ниже запишите имя второго автора:</p><p class="p1">____________________________________</p><p class="p1">По-английски, естественно.</p><p class="p1">Составьте глагол из имени первого автора — первая, вторая и восьмая буквы:</p><p class="p1">____________________________________</p><p class="p1">Это то, что вам надо делать.</p><p class="p1">Теперь первые три буквы фамилии второго автора:</p><p class="p1">____________________________________</p><p class="p1">Это то, что вас ждет.</p><p class="p1">Теперь пятая, четвертая и вторая буквы имени второго автора:</p><p class="p1">____________________________________</p><p class="p1">Это так, просто имейте в виду.</p></span><span id="id83"><div class="title2">
<p class="p">3 октября</p>
</div><p class="p1">Сегодня мы наконец разберемся с группой «Б».</p><p class="p1">Правду сказать, я не очень люблю эту группу. Это те, у кого «Квартал» получается лучше меня, хотя они не похожи на меня. Они всегда всё делают правильно. Они немного святоши. Они не умеют жить с людьми — иначе бы им тут вообще нечего было делать, — но не считают это своим недостатком. Грубо говоря, это я без чувства вины, то, чем должен был бы стать я, не оглядывайся я постоянно на других людей, и не сравнивай себя с ними, и не пытайся стать, как они.</p><p class="p1">Все равно ничего не вышло, но многое испортилось, заветрилось, как колбаса.</p><p class="p1">И я завидую этим людям, но поскольку даже самый чистый образец для меня ничего не значит без чувства вины, без рокового сознания своей неуместности, — я недолюбливаю их, в чем неправ, вероятно.</p><p class="p1">И все-таки это я придумал «Квартал», поэтому сегодня у них очень простой выбор. Либо они становятся как все, то есть переходят из группы «Б» в группу «Все», либо до свидания. Они и так уже достаточно усовершенствовались. Те из них, кто сегодня соскочит, получат половину той суммы, которую получат несоскочившие, дошедшие со мной до конца.</p><p class="p1">Тест очень простой. И решаю не я, а объективные законы.</p><p class="p1">Возьмите свой Финансовый Индекс.</p><p class="p1">Умножьте на ГРУ, то есть Грибной Рейтинг Удачи.</p><p class="p1">Умножьте на Индекс Активности.</p><p class="p1">Разделите на Индекс Исчерпанности.</p><p class="p1">Умножьте на Процент Прожитого.</p><p class="p1">Все это у вас должно быть записано на отдельном листочке, это ваш паспорт «Квартала». Группы «А» тоже касается. Вообще надо всегда иметь эти цифры под рукой. Будете знакомиться с другими проходящими — сможете посмотреть, сличить. Если хотя бы две цифры совпадают, можете жениться, несмотря на тождество полов или различие возрастов.</p><p class="p1">Умножьте на Час Уязвимости.</p><p class="p1">Разделите на 2.</p><p class="p1">Подсчитайте сумму цифр.</p><p class="p1">Если эта сумма делится на 3, поздравляю, вы идете дальше, благополучно влившись в общий, небольшой, но сплоченный отряд.</p><p class="p1">Если не делится — до свидания, через месяц ждите денег.</p><p class="p1">Остальным проделать все то же самое, то есть множить, делить, подсчитывать и т. д.</p><p class="p1">Это ваш Окончательный результат.</p><p class="p1">Запишите его в Паспорт «Квартала».</p><p class="p1">Больше считать ничего не будем.</p><p class="p1">Это та цифра — точней, сумма цифр, — которая будет стоять у вас в дипломе о прохождении «Квартала».</p><p class="p1">Впишите ее туда самостоятельно, диплом помещен на соседней странице.</p><p class="p1">Дальше начинается собственно путь, последняя ступень.</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/i_011.png"/>
</div></span><span id="id84"><div class="title2">
<p class="p">4 октября</p>
</div><p class="p1">Сегодня мы идем в ту точку «Квартала», где прежде не были. Или по крайней мере предпочитали не бывать.</p><p class="p1">В моем случае это местность между бывшим детским садом, в котором потом — видимо, по недостатку детей, — ютился народный суд, а сейчас — какой-то банк; с одной стороны эта огороженная территория с довольно-таки запущенной растительностью примыкала к китайскому посольству, с другой — к гаражам ближайшего жилого дома, и там же была голубятня — я еще застал голубятни. Сейчас, кажется, их в Москве вообще нет. Что сейчас в этом здании — понятия не имею: какое-то учреждение, никому абсолютно не нужное. Детских садов у нас в квартале было три, и ни одного теперь нет: в одном — банк, в другом — подразделение городского хозяйства, а там, где был детский дом, за большим белым забором, — теперь то ли пустырь с остатками сгоревшего дома, то ли строительство какого-то опять же банка. Странно, что во времена точечной застройки туда не воткнули ничего элитного, но, видимо, банк перехватил участок, только это какой-то очень особенный банк, контролирующий все остальные, связанный с самыми страшными сущностями. Возможно, они там и заседают, в руинах сгоревшего детдома. И почему-то мне кажется — на уровне чисто интуитивном, — что эти люди еще как-то связаны со спортом. Однажды при мне на эту территорию зашел мужик при полном костюме с галстуком — и в кроссовках; кроссовки у них — вероятно, опознавательный знак, униформа слуг ада. Мне кажется, все их отношения с покровительствующим им верховным дьяволом — нечто вроде отношений юниоров с тренером: этот Петрович им отец, он суров, немногословен, он первым приобщает их к ужасному. Стайки таких юниоров и их немногословных тренеров я видел в детстве у нас на Ленинских горах, они там учились кататься с трамплина, сначала с малого, уже не действующего (сколько раз я на него лазил!), потом с большого. И во всех этих структурах мне видится что-то спортивное, и еще с ними дружат эстрадные артисты. Весь их бизнес, главные их занятия представляются мне как спортивно-оздоровительная баня при участии мафии и приглашенных эстрадных звезд, они там парятся и трут. Вы замечали, как едят спортсмены? Они едят необыкновенно сосредоточенно, целиком отдаваясь процессу усвоения пищи: эта калория пойдет на косую мышцу, которую он как раз сейчас будет раскачивать, а эта — на ягодичную, она тоже нужна. Тренер жует зло, перемалывая еду челюстями: его время прошло, он это чувствует. Попса ест грязно, жирно. Мафия не ест, она бережет здоровье, так — яблочки, сухофрукты, вода без газа.</p><p class="p1">И вот там, где был детсад, потом нарсуд, а теперь какой-то мосдеп, — есть неогороженный угол, куда можно проникнуть и постоять.</p><p class="p1">Дом, который рядом, всегда очень нравился мне. Это кирпичный хрущевский дом года, наверное, шестьдесят третьего. В одном окне — я часто проходил мимо из магазина, как Слим, — мальчик клеил сборные модели, всякий раз разные, все более сложные. А из другого окна все время доносилась музыка — там девочка ее разучивала. И это был для меня образ рая.</p><p class="p1">Но в этот сад я никогда не заходил, да и какой там сад? Выломанная бетонная ограда, а внутри — клок жалкой природы, безымянные деревья, несколько ясеней, свалена какая-то ржавчина и битый кирпич. И ни у кого не дойдут руки сделать там детский городок или мало ли что. Но мне всегда казалось, что эта местность уже имеет смысл, что она портал, пограничье и через нее я могу попасть туда, откуда никогда не вернусь — на бесконечно далекую звезду или в государственное учреждение, откуда нет выхода. И сейчас я пойду туда в первый раз.</p><p class="p1">С собой надо захватить Вещь размером с пачку сигарет и оставить ее там навсегда.</p><p class="p1">Интересно, что этот кусок сада совершенно не изменился: те же ясени, вывороченный бетонный кусок забора, кирпич и ржавчина; а вот дом напротив очень изменился — там не играют гамм, а в комнате когдатошнего мальчика с моделями царит запустение. Скорее всего, он тоже уехал. На подоконнике — свернутые, пожелтевшие трубки ватмана и стопки книг. Наверное, с помощью всего этого он надеялся спасти мир.</p><p class="p1">Но странный покой исходит из этого места. А я еще и вечером туда пошел, синим московским вечером, осенним до невозможности. И меня как будто засасывает туда, что-то мне обещает, что там покой, и счастье, и Версаль, то есть зеленые сады, подсвеченные фонарями, на черном ночном фоне. И соловей, как на рубашке старых карт, пахнущих бабушкиным комодом — старыми духами и бельем, и там еще хранилась лиловая пудреница. Но ничего подобного — ни моего любимого черно-зеленого сочетания, как в моей любимой древней компьютерной игре H<sub class="sub">2</sub>O, попавшейся мне в каком-то сборнике и ни разу с тех пор не встречавшейся, ни сада, ни соловья — там нет, конечно. Там заглатывающий мосдеп или канцелярские призраки бывшего суда, и дождевой шелест никого не должен обманывать.</p><p class="p1">Вот куда меня пытались затащить, и это уже в полушаге от окончательного прохождения. Правильно я делал, что туда не ходил. Не ходил я туда — и не надо.</p><p class="p1">И от дома, который я любил, осталось непонятно что.</p><p class="p1">Нет, нечего мне здесь делать. Совсем я уже не здесь.</p><p class="p1">Кладем на землю Вещь размером с пачку сигарет и забираем взамен еще один артефакт, а именно осколок битого кирпича.</p><p class="p1">Это должна быть любая вещь, которая символизирует это место, обозначает его наилучшим образом. Вот и берите. Домой не вносите ни в коем случае. Выбросьте около дома и обменяйте на лист с ближайшего дерева. Лист засушите на память о том, как вас не засосало.</p></span><span id="id85"><div class="title2">
<p class="p">5 октября</p>
</div><p class="p1">Но вообще, может, все еще и обойдется, несмотря на усиливающееся давление со всех сторон, ухудшающееся самочувствие и естественное сопротивление среды. Сегодня нам надо избавиться от Вещи, которая не принадлежит вам по праву, — взятая из библиотеки, да так и не возвращенная книга, например, — и сразу же купить Предпоследний артефакт, который мы, в свою очередь, обменяем потом на последний, концентрирующий в себе итог нашего пути. То есть символический обмен.</p><p class="p1">Выходим на ту улицу Квартала, где с вами обязательно произойдет что-то важное, скорее хорошее. Некоторое время дежурим там. Время может быть любое, но лучше вечером.</p><p class="p1">Проникаемся, проникаемся чувством, что именно здесь и случится что-то самое главное. Подходим к пяти прохожим по очереди: «Вот тут лежало. Это не вы потеряли?»</p><p class="p1">Скорее всего вам будут отвечать: нет, не мы.</p><p class="p1">«А вам не нужно?»</p><p class="p1">Дайте посмотреть. Нет, не нужно.</p><p class="p1">Если после пятого прохожего избавиться от артефакта не удается, предлагаем продать.</p><p class="p1">— Вот, у меня тут вещь. Вы не купите? Очень нужно.</p><p class="p1">Пять попыток. Ничего, ничего, терпите. Вам ведь ничто не угрожает на самом деле, никто вас даже в дурдом не сдаст. А избавиться от этой вещи нужно, очень нужно, причем только путем ее передачи. Так вы избавитесь от всего в жизни, что вам не принадлежит, от всего, что ее отягощает. Не берут? Не покупают? Странно. На последних ступенях «Квартала» сила вашего убеждения должна дорасти до того, что купят. По крайней мере спросят о цене.</p><p class="p1">Ну, и вещь должна быть не совсем бросовая. Что-нибудь из хозяйских безделушек в съемной квартире, граммофонная пластинка, купленная в антикварном магазине (все купленное в антикварном магазине принадлежит вам не по праву, запомните это), монетка, которую вы нашли (а кто-то потерял).</p><p class="p1">Спокойнее, без суеты. Это ваше место, ваша точка, с вами непременно что-то важное тут случится, вы всегда это чувствовали.</p><p class="p1">О! Четвертым прохожим скорее всего окажется девушка. И ей будет интересно, и она купит.</p><p class="p1">Не берут? Ну, тогда уж я не знаю. Тогда последнее средство.</p><p class="p1">Ловим гуляющего ребенка, предварительно услышав, как называют его товарищи по играм.</p><p class="p1">— Леша! (допустим) Передай, пожалуйста, папе, когда домой пойдешь. Он знает.</p><p class="p1">(— У меня нет папы.)</p><p class="p1">— Ну, тогда дедушке.</p><p class="p1">(— И дедушки нет.)</p><p class="p1">Что ты будешь делать! Их много таких сейчас, одни женщины воспитывают, потому что им деваться некуда. Зачем плодить детей, когда себя-то не знаешь, куда девать?</p><p class="p1">— Ну, тогда любому из старших. Они в курсе.</p><p class="p1">(— А вы кто, дядя?)</p><p class="p1">— Я мамин друг. Она знает.</p><p class="p1">Быстро исчезайте.</p><p class="p1">Затем на все деньги, которые есть в кармане — не в кошельке! Имею в виду только высыпавшуюся мелочь! — покупаем в ближайшем киоске предмет, на который этих денег хватит.</p><p class="p1">Это и есть Предпоследний артефакт.</p><p class="p1">Дома берем первую попавшуюся книжку, открываем в любом месте и читаем последнюю строчку на правой странице.</p><p class="p1">В моем случае это «Всем — всё» (из биографической хроники Маяковского).</p><p class="p1">Я на совершенно верном пути, товарищи. Вот именно, всем — всё. Себе — только то, что приобретено в результате символического обмена, в бодрийяровском смысле, а не хотите в бодрийяровском — в каком угодно смысле. Бодрийяровский смысл — скорей всего, оксюморон. Он был славный малый, конечно, похожий на старого плотника Джузеппе Сизый Нос, но всякий раз, как я его читаю, у меня такое чувство, что хитрый хохол из села Бодрый Яр пытается мне втюхать старую кобылу, следка поддутую изнутри, как я только что пытался втюхать кому попало символическую, но бесполезную вещь.</p><p class="p1">Символический обмен и есть обмен такими вещами, это скрытый сюжет нашей книги, а что там имел в виду Бодрийяр — его личное дело. Он «Квартала» не проходил, нам с ним неинтересно.</p></span><span id="id86"><div class="title2">
<p class="p">6 октября</p>
</div><p class="p1">В 18 часов вечера, ни часом позже, берем Предпоследний артефакт. Выходим на ту улицу Квартала, где дети катаются с ледяной горки. Поднимаемся на горку. На ее вершине оставляем Предпоследний артефакт (скорей всего, это пачка сигарет либо бутылка фруктовой воды, в крайнем случае коробка спичек).</p><p class="p1">Съезжаем с ледяной (деревянной, насыпной) горки на заднице. Сбегать не разрешается. Съезжаем.</p><p class="p1">Внизу читаем любое стихотворение, которое помним наизусть. Читаем вполголоса, но вслух. Первое, которое приходит в голову, пусть даже это песня Стаса Михайлова.</p><p class="p1">Ищем Последний артефакт. Это будет вещь, которая останется с нами до конца прохождения. И она где-то здесь, рядом с горкой. Я знаю. Это может быть потерянная варежка, забытая лопатка, монета. Ищем вещь, непременно рукотворную. Ветка, лист, травинка — не подходят. Пусть хоть обрывок провода, но антропный.</p><p class="p1">Берем, уносим домой, подробно характеризуем эту вещь.</p><p class="p1">Если это забытая игрушка (варежка, иной предмет одежды) — наше истинное признание заключается в том, чтобы активно помогать ближнему, и именно этому надо посвятить большую часть времени после «Квартала». Это же принесет и деньги.</p><p class="p1">Если это провод, проволока, металлический прут неясного назначения — вам следует работать в области связи или религии.</p><p class="p1">Если это старый журнал или забытая книга, вам не следует работать в сфере искусства, потому что хорошую вещь не забудут. Любая сфера, только не искусство. Да в нем вообще лучше не работать, если только вы не чувствуете себя гением.</p><p class="p1">Если это обломок кирпича, кафеля, другого рукотворного камня — ваша будущая деятельность связана с разрушением, деструкцией, разбором завалов.</p><p class="p1">Если это осколок стекла, вам стоит заняться медициной. Не спрашивайте почему, это мое дело, а не ваше.</p><p class="p1">Если это монета, вам следует путешествовать. Чего работать — деньги и так липнут.</p><p class="p1">А если это рукотворный предмет неясного назначения, вроде крепежной детали или ключа от непонятно какой двери, — поздравляю вас, вы из тех, кто может делать что угодно: он уже совпадает с миром, попал в его ноту, угадал его мелодию.</p><p class="empty-line"/><p class="p1">Перепечатайте на компьютере следующий текст.</p><p class="empty-line"/><p class="p1">Каждый вечер — за исключением тех, когда бывал пьян или возвращался с работы слишком поздно, — Клоков приходил выгуливать собак.</p><p class="p1">Он давно жил в другом доме, с другой семьей, — специально устроившись неподалеку, чтобы чаще видеться с прежней; но бывшей жене, кажется, в тягость были эти визиты, у нее кто-то был, о чем она не говорила прямо, но Клоков замечал всё новые и новые вещи в доме — они явно принадлежали новому посетителю, постепенно превращавшемуся в обитателя. Сын здоровался и опять уходил к себе в комнату, где ему давно уже было интересней, чем с Клоковым; пару раз Клоков заставал у него в гостях девушку. В новой клоковской жизни тоже не всё ладилось — как он понимал, именно потому, что продолжались эти визиты в прежнюю семью; но странное чувство долга, вроде собачьего, заставляло его выгуливать собак, которых он ненавидел. Большую часть года в той стране было холодно, и, если бы к общему чувству вины перед семьей примешивалось еще чувство, что жена или сын вдобавок ко всему холодным вечером гуляют с собаками, Клоков не смог бы наслаждаться и тем хрупким душевным миром, который установился у него в душе после начала новой жизни.</p><p class="p1">Он ненавидел собак, правду сказать, и не мог понять, как жил когда-то в этом доме, в этой квартире, где все было теперь не по нему; собак он ненавидел еще и потому, что у них был отвратительный характер — обе они были дворняги с незначительной аристократической примесью, в одном случае лабрадор, в другом — золотистый ретривер, и это было куда более плебейским вариантом, чем простое и честное дворняжничество. Одна собака была агрессивна, сильна и хамовата, но перед Клоковым заискивала и всячески подлизывалась; другая имела вид совершенно шакалий, но при этом такую жалобную морду с аристократически удлиненными глазами, с выражением, как у девушки из обедневшего рода — одновременно жадным и жалким, — что Клоков на нее злился особенно сильно. Беспримесная ненависть была бы чище, а тут она постоянно сопровождалась жалостью, и вместе они давали такое безысходное, тоскливое раздражение, что Клоков еле удерживался, чтобы не пнуть собаку, и непременно пнул бы себя, встреться он себе по дороге.</p><p class="p1">Собак никто никогда не воспитывал, и потому они кидались на всех встречных, в особенности гастарбайтеров, — хорошо, если лаяли, а иногда попросту бросались на них так, что Клоков с трудом удерживался на ногах; в их генах было нечто помоечное, они никогда не наедались, хотя их прилично кормили, — и потому они вечно норовили порыться в помойке, выкопать из мусора упаковку от нарезки, а под окнами дома им почему-то непременно попадались грязные кости (кто их выбрасывал?), и собаки принимались отвратительно хрустеть. Отучить их от этого было невозможно. По двору все время ездили машины — ближе к полуночи хозяева жизни возвращались из злачных мест, — и собаки лезли под колеса, а водители орали на Клокова. Выгуливать собак приходилось по очереди, потому что мирно гулять вместе они не могли. Этот ежевечерний ритуал, двадцатиминутка ненависти в любую погоду, совершенно изводил Клокова, и он искал любой предлог, чтобы не выгуливать собак. Раньше, когда он жил в прежней семье и даже любил ее, понятия не имея о том, что ему нужно в действительности, — прогулка с собаками, в особенности вечерняя, была почти праздником, отдохновением, но теперь в ней было отвратительно всё, как отвратительна старая кость, как мерзок бульонный запах на этаже, как гнусны взгляды соседки, изучавшей Клокова со странным злорадством. В ее глазах он был погибший человек, и ей страшно нравилось, что он так зол. Говорить дома было не о чем. Клоков смотрел на мебель, книги, письменный стол — и поверить не мог, что все это принадлежало ему; он торопливо убегал — и знал, что на следующий день явится опять, не в силах оборвать последнюю нитку, связывавшую его с чужой жизнью и прежней своей оболочкой.</p><p class="p1">И никак он не мог ответить на главный вопрос человеческого существования: что в большей степени сделало бы его человеком — соблюдение этого гнусного ритуала или освободительный, победоносный отказ от него?</p><p class="empty-line"/><p class="p1">УПРАЖНЕНИЕ ПО ТЕКСТУ:</p><p class="p1">Ответьте на главный вопрос человеческого существования.</p></span><span id="id87"><div class="title2">
<p class="p">7 октября</p>
</div><p class="p1">Сегодня день рождения моего любимого поэта, и мы просто поем его песню, просто поем, любую, но мне хотелось бы вот эту.</p><div class="poem">
<div class="stanza">
<p class="v">Ходят-бродят волны за ночным далеким мысом,</p>
<p class="v">Ходят серебри сто-бурым лисом.</p>
<p class="v">И летят и все же спят в открытом море шлюпки,</p>
<p class="v">И недостоверны они и хрупки.</p>
</div>
<div class="stanza">
<p class="v">Разве достоверна эта ночь? Наверно:</p>
<p class="v">Что прекрасно, то и достоверно.</p>
<p class="v">Достоверно то, чего на свете мало,</p>
<p class="v">А не все, что под руку попало.</p>
</div>
<div class="stanza">
<p class="v">И гремит волна в ущелье отдаленном горном —</p>
<p class="v">Звездным горном, грозным и задорным,</p>
<p class="v">И поют, и гремят в щербатых камнях раскаты вала</p>
<p class="v">Песню без конца и без начала.</p>
</div>
<div class="stanza">
<p class="v">Если нам познанья золотые крохи</p>
<p class="v">Голову не вскружат,</p>
<p class="v">Дивный звездный лис примчит на наши вздохи,</p>
<p class="v">Службу нам чудесную сослужит.</p>
</div>
<div class="stanza">
<p class="v">Он в меху своем разгадку жизни хитро прячет,</p>
<p class="v">Он не даст ее нам украсть до срока,</p>
<p class="v">Но, когда пропляшет, прыгнет, прянет и ускачет —</p>
<p class="v">Больше нам не будет одиноко.</p>
</div>
<div class="stanza">
<p class="v">Ночь.</p>
<p class="v">Огни пароходов.</p>
<p class="v">Ближе к восходу стало темней.</p>
<p class="v">Но в море заря встает, и за ней —</p>
<p class="v">Мелодия дней.</p>
<p class="v">И, как прежде, поют в зеленых камнях раскаты вала</p>
<p class="v">Песню без конца и без начала.</p>
</div>
</div><p class="p1">Выходим на балкон, поем громко, чтобы хоть кто-нибудь слышал. Мелодия сложна, даже, я бы сказал, прихотлива, легко раздобывается в Интернете, воспроизводится не так легко, но все же. В этой песне именно то соотношение здравомыслия и безумия, которое является ключом ко всему на свете. В мироздании примерно такое же соотношение.</p><p class="p1">Не хотите эту — можете спеть другую. От любой в жилы наши и мускулы вливается сила — та сила, что всегда наступает от совпадения нашего ритма с ритмом мира.</p><p class="p1">Людей, говорящих тут о наивности, романтике и отрыве от реальности, просят заткнуться, чтобы не позориться. Вот то, что можем мы противопоставить всему, что ненавидим в жизни: не добро, но яркость. Ночь, огни пароходов, гром волны в ущелье. Это не имеет отношения к добру, но совершенно убийственно для зла.</p><p class="p1">Если нам нравится звучание нашего голоса с балкона в сыром осеннем воздухе, можем спеть еще раз — плевать на соседей, нам ничего хорошего не сделали эти соседи.</p></span><span id="id88"><div class="title2">
<p class="p">8 октября</p>
</div><p class="p1">Сегодня мы обходим по периметру весь Квартал и замечаем странную вещь.</p><p class="p1">В нем все поменялось, все точки переехали.</p><p class="p1">Место, где приходили лучшие мысли, стало местом любви. Точка неприятностей стала точкой, где случится важное. Горка стала местом добрых чувств, а опасность теперь вообще чувствуется все время.</p><p class="p1">Заметили?</p><p class="p1">Это потому, что мы изжили, преодолели «Квартал», он стал теперь местом других чувств и ассоциаций, и все в нем как бы говорит там: ты слишком тут задержался, делать здесь тебе больше нечего, ты получил стартовый толчок, и теперь тебя ждут совершенно другие пространства. И отжимаешься ты тоже гораздо лучше.</p><p class="p1">Это не значит, что тебе здесь больше не рады. Но теперь тебе надо искать другой «Квартал».</p><p class="p1">Прощаемся с прежними местами и чувствуем, что ничего не чувствуем. Как это правильно, как хорошо мы собой распорядились. Зато небо — о, с небом все прекрасно. В нем мы угадываем теперь удивительно ясные сигналы, и заметьте, как сегодня светло и ясно, какие большие белые облака плывут над нами.</p><p class="p1">Но что-то нас томит, что-то нехорошо. Тревожно.</p><p class="p1">Невозможно понять, в чем дело. Вероятно, так всегда бывает при переходе на новый этап.</p><p class="p1">Но что-то нам подсказывает: нет, мы не перешли на новый этап. Старый мы утратили, а к новому еще не пришли.</p><p class="p1">Слишком все легко, вот что. Слишком просто нам это казалось. А надо решительней, надо уничтожить все, что нас еще здесь держит. А пока мы зависли в межеумочном пространстве и не знаем, что такого с нами произошло. Да, мы выпали из множества ложных зависимостей и отягощающих связей, и в нашем родном квартале, где мы живем, нам уже не место. Но сами-то мы прежние, и что-то очень важное с нами еще не случилось — надо бы понять что.</p><p class="p1">Но я еще не могу. Я просто чувствую, что на этом берегу делать уже нечего, а на другом меня еще не примут. И я не знаю, что надо сделать.</p><p class="p1">У меня был такой сон: я сижу в сквере на скамейке, здесь, в «Квартале». Мне вообще часто снится «Квартал». Я умер, и вот решается моя судьба. У меня есть последний час, на который меня отпустили, чтобы я здесь что-то исправил. Снег идет, но медленный, он поблескивает в луче фонаря. Куда мне пойти? Я бегу в дом, где жила возлюбленная. Я виноват перед ней, это надо как-то исправить. Подъезжает троллейбус, я вспрыгиваю туда, меня все видят, и все на меня смотрят без особенной надежды, как бы говоря: попробуй, конечно, но ничего не получится. И действительно, я бегу к ее подъезду, а дверь заперта. (При этом я помню, что сейчас этот дом снесен, его нет, но ведь и я в некотором смысле снесен.)</p><p class="p1">Хорошо, я бегу к друзьям, но они заняты собой, у них свой, посторонний разговор, в котором я ничего изменить не могу. Дома еще какой-то посторонний мужчина, друг с женой спорят о нем, а он молчит. Жена подчеркивает, что это друг дома, и настаивает, чтобы он жил с ними. Муж пытается ей объяснить, что это нельзя, но рациональных аргументов нет. Их действительно нет, если вдуматься, во сне я это хорошо понимаю. Я ухожу. Куда теперь?</p><p class="p1">Теперь мне надо к женщине, которую я не любил, но она любила и всегда выручала меня. Я должен, вероятно, как-то исправить это, искупить вину перед ней, но я прибегаю, а там другой человек, она теперь лечит и спасает его. Если хочу, я могу остаться тут, на кушетке. Вдруг мне с ужасной ясностью приходит в голову мысль: мир всегда смотрел мимо меня. И на меня поэтому всегда так сильно действовали женщины не то чтобы роковые, но странные, с блуждающими, плавающими глазами. Глядящие как бы мимо меня на что-то главное.</p><p class="p1">Меня не устраивает это главное, вот в чем дело.</p><p class="p1">И я остаюсь в сквере, и снег начинает идти все гуще. Не буду я исправлять свою участь, меня устраивает моя участь. Я все равно не понравлюсь тому, что тут главное, — даже добрым женщинам, которые жалели меня.</p><p class="p1">И вдруг, по тихой улыбке сквера и снега, я понимаю, что сделал именно то самое, что и не надо ничего исправлять, а надо…</p><p class="p1">С этим чувством возвращаемся домой, пьем крепкий чай, лучше с травами.</p></span></span>
