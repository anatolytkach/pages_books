<span id="id97"><div class="title2">
<p class="p">Отзывы</p>
</div><div class="cite">
<p class="p1">«Это работает! Черт побери, не знаю как, но это работает! Второй месяц не верю сам себе! Кто бы ни написал эту книгу, он сам дьявол!!! Или гений!!!!!»</p>
<p class="text-author">Крис Леттэм, Нью-Йорк, веб-дизайнер</p>
</div><div class="cite">
<p class="p1">««Квартал» сделал меня другим человеком. Но таким ли, какого ожидал его Автор — или Авторы, — не знаю. Впрочем, важно ли это? Не знаю также, стал ли я счастливее. Но и это не главное. Пересоздать человека — задача, сопоставимая с Божественной».</p>
<p class="text-author">Преподобный Саймон Харрис, Таллахасси, Флорида</p>
</div><div class="cite">
<p class="p1">«Мой сын взял джек-пот в благотворительной лотерее, у моего отца прошла трофическая язва, моя мать избавилась от депрессии, сама я теперь старший бренд-менеджер, у меня новый любовник, у него новая «Ауди», и пусть тот, кто не верит в «Квартал», поцелует меня в задницу».</p>
<p class="text-author">Ханна Лайден, Франкфурт-на-Майне</p>
</div><div class="cite">
<p class="p1">«Разбогател ли я? Но какой смысл вкладываем мы в слово «богатство»? Поумнел ли я? Но что такое ум? Знаю ли я теперь ответ на главные вопросы? Но что такое «вопросы»? Ветер уносит звук от хлопка одной ладони. Я знаю только, что в эти три месяца я не скучал, если вы понимаете, что такое скука».</p>
<p class="text-author">Пит Буллер, певец, бард, Санта-Глория, Ямайка</p>
</div><div class="cite">
<p class="p1">«Конечно, лишь самовлюбленный и напыщенный идиот способен увидеть в «Квартале» руководство к действию, а тем более пособие по обогащению. Но умный читатель с литературным вкусом тонко улыбнется изысканной литературной шутке, на дне которой, как оливка в бокале мартини, мерцает легкая грусть».</p>
<p class="text-author">Жорж Трампийон, литературный критик, «Revue des Deux Mondes»</p>
</div><div class="cite">
<p class="p1">«Это самая пронзительная и глубокая лирическая поэма из всего, что появлялось в литературе Северного полушария со времен Халиля Джебрана, мир его памяти. Что до причудливой формы, мудрый в каждое время выбирает ту форму, которая поможет Истине далее разбросать свои семена и упасть на добрую почву».</p>
<p class="text-author">Тарас-Джахид Лапутенко, историк суфизма, Москва</p>
</div><div class="cite">
<p class="p1">«Несмешная и вялая пародия на всевозможные «Тайны», «Секреты» и «Загадки», всегда заключающиеся почему-то в том, что для обогащения и выздоровления полезнее любить людей и чистить зубы (не перепутайте!). Автор, укрывшийся под маской, но, впрочем, легко узнаваемый — поди спрячь такое изобилие! — в очередной раз звучно приземлился в лужу».</p>
<p class="text-author">Анна Барбарицкая, «Коммерсантъ»</p>
</div><div class="cite">
<p class="p1">«В моем детстве про многозначительно серьезного бутуза говорили: наморщил попу; так вот это оно самое и есть, впрочем, если кому нечего делать…».</p>
<p class="text-author">Лев Гаврилкин, «Афиша»</p>
</div></span>
