<span><span id="id6"><div class="title2">
<p class="p">V</p>
</div><p class="p1">Электричка задерживалась на час, и не было никаких гарантий, что она появится в половине двенадцатого. В половине двенадцатого обещали только дополнительное объявление.</p><p class="p1">– Ну, – сказал Игорь, приплясывая на перроне. Первого ноября с утра резко похолодало, задул ветер, низко летели темные облака, похожие на дым. – Что будем делать?</p><p class="p1">– Не знаю. Тебе видней.</p><p class="p1">– Мое рассуждение такое, что надо брать машину.</p><p class="p1">– Слушай. Может, вообще ничего не надо? Считай, что я поверила тебе на слово.</p><p class="p1">– Нет. Во-первых, ты не поверила, а во-вторых, я должен проверить, как она там. Может, сперли, может, дачи уже громят…</p><p class="p1">– С какой стати?</p><p class="p1">– А с какой стати у вас тут всё? Ради чеченской независимости? В общем, я за то, чтобы ловить.</p><p class="p1">– И сколько он возьмет, за семьдесят километров?</p><p class="p1">– Ну, допустим, штуку.</p><p class="p1">– Думаю, больше. Не мы одни такие умные.</p><p class="p1">– Хорошо, две – максимум. Если никого не найдем за две, не поедем. Пойдем жрать куда-нибудь, а завтра я с кем-нибудь договорюсь.</p><p class="p1">– А ты никакой транспорт не можешь устроить? Через ваш центр?</p><p class="p1">– А что они могут? Ракету прислать?</p><p class="p1">– Ну, ты же не один здесь эвакуатор, наверное…</p><p class="p1">– А ты думаешь, я всех знаю? Ну, дадут они мне чьи-то координаты, пойдут на риск, расконспирируемся к чертям… Ведь если ваши кого-то из нас возьмут, они будут допытываться про других, а наши пыток не выдерживают. У нас давно не пытают. Он сразу всех и сдаст. Надо, чтобы никто не знал. Но даже если они мне и дадут координаты – чем он мне поможет? Деньгами? Деньги я достану… Ладно, пошли, будем искать.</p><p class="p1">Ехать до Тарасовки не хотел никто. Водилы были наглые, сплошь толстые и краснорожие. «По Курской? Эээ! Сейчас знаешь что на окружной делается? Внешняя сторона вообще вся стоит, «Авторадио» только что сказало».</p><p class="p1">Игорь предлагал штуку – смеялись; повышал до полутора – захлопывали дверцы; один снисходительно сказал, что разговаривать будет начиная от трех – «А назад мне порожняком! Кого я там в Тарасовке подцеплю? Вас? Не, я ждать не буду. Туда – назад».</p><p class="p1">– А чего так дорого? – спросила Катька.</p><p class="p1">– Ты че, не в курсе? Из Москвы все бегут, дороги начисто забиты.</p><p class="p1">– Почему бегут-то? Что, под Москвой безопаснее?</p><p class="p1">– А то! Сейчас где угодно безопаснее. Обращение Шамиля читала? Предупреждает, что в ближайшее время всю Москву повзрывают, у меня дочка в Интернете видела. Они правильно считают: столицу взорвать – и все.</p><p class="p1">– Все эти обращения, – авторитетно сказал Игорь, – пишутся прибалтийскими графоманами.</p><p class="p1">– Не знаю, кем пишутся, а пока получается по-ихнему.</p><p class="p1">– Ну, не хочешь – как хочешь, – надменно сказал Игорь и повел Катьку к следующему водиле. С этим повезло не больше – о Тарасовке никто и слышать не хотел.</p><p class="p1">– Этак мы вообще не улетим.</p><p class="p1">– Вот видишь, как плохо не уметь водить машину, – Катька чмокнула его в холодную щеку.</p><p class="p1">– А толку? Застряли бы сейчас, только не в чужой машине, а в своей. Из чужой хоть вылезти можно, пешком пойти… Ладно. Короче, сейчас в забегаловку, до полдвенадцатого жрать, потом на перрон, а если нет поезда – значит, правда не судьба. Буду один добираться.</p><p class="p1">В забегаловке были только котлеты – почему-то очень кислые, с сильным сухарным привкусом, с минимумом мяса и максимумом хлеба. В половине двенадцатого, против всех ожиданий, объявили, что поезд будет подан через несколько минут, и к полудню он действительно подошел – толпа буквально внесла их в тамбур, разлучила, снова притиснула друг к другу уже в вагоне.</p><p class="p1">– И куда все едут? – спросила Катька.</p><p class="p1">– Не знаю. Может, на дачи, может, в Тулу к родне… Может, просто на перекладных будут добираться на юг – на дальние-то поезда всё распродано, я смотрел.</p><p class="p1">– А как назад поедем?</p><p class="p1">– Не знаю. Едем, и ладно.</p><p class="p1">Катька никогда прежде не ездила по этой дороге. Она вообще редко пользовалась электричками. Своей дачи у них с Сереженькой не было, хотя в лучшие времена он периодически заводил разговор о том, что Подуше нужен воздух, живая ягода… Он вечно выискивал себе какие-то новые занятия, надеясь, что хоть в них реализуется вполне: в самом деле, должно же быть на свете занятие, для которого он рожден? Может быть, дача. Построить домик, разбить грядки. В чужом пространстве Сереженька реализовываться не умел, ему необходимо было выгородить для себя личное, где не будет конкуренции. Но ведь на даче соседи. Наверняка начались бы разговоры о том, что вот эти-то, сволочи, наворовали, у них-то хоромы… Вечно ставить себе недостижимый образец и с ним воевать, мучительно завидуя. Как она раньше терпела все это? Дача ведь тоже превратилась бы в бесконечные унижения, как же иначе, с Сереженькой по-другому быть не могло, – опять мы самые лучшие, и опять нам хуже всех…</p><p class="p1">Электричка ползла медленно, то и дело останавливаясь, спотыкаясь, скрипя, и движение это было похоже на заикающееся бормотание, бред больного, которому в жару все мерещатся столбы, станции, полустанки… Что такое, собственно, полустанок? Катька с детства представляла при этом слове половину станка, хотя станок видела не очень четко – что-то железное, квадратное. Но слово «полустанок» по самому своему звуку прижилось в описаниях российского пейзажа – в нем есть стык, перестук, спотычка, и неискоренимая половинчатость, и четырехсложность с анапестным ударением, то есть идеальное соответствие железной дороге. Интересно, Львовская – это станция или полустанок? Еще я в нем слышу усталость. Удивительно быстро устаешь на холоде. Наверное, потому, что организм все силы тратит на обогрев себя. Хорошо, сейчас я все-таки еду в электричке, пусть и битком набитой, и у меня нет вещей, кроме рюкзака с термосом, и со мной мужчина, на которого можно полагаться. А ведь скоро зима, все уже серьезно, и если завтра-послезавтра придется бежать из Москвы, с ребенком, с вещами… Почему я так отчетливо вижу себя бредущей по колючей стерне, без дороги, с отваливающимися от тяжести руками? Или, того пуще, вязнущей в черной грязи, в толпе беженцев, причитающих на разные голоса, – и один тащит на веревке облезлую грязную козу, и она тоже блеет, блеет? Почему я с самого начала жила с тайной мыслью о том, что рано или поздно отсюда придется бежать? Виновато ли проклятое военное кино, воспитывавшее нас на сценах бегства и распада, или фильмы-катастрофы, до которых я в брянском детстве была великая охотница, все подряд пересмотрела в видеосалоне в самом впечатлительном возрасте от восьми до двенадцати? Но ведь другие запоминали другое – каких-нибудь «Муравьев в штанах». Видеосалон в Брянске открылся в восемьдесят седьмом, когда Катьке только что исполнилось восемь, – это было грязное тесное помещение, бывший станционный буфет. До сих пор она помнила цены – пятьдесят копеек утром, рубль вечером; показывали «Греческую смоковницу», «Рокки» и что-то с Брюсом Ли. Но она всего этого не любила, это было скучно, – ей нравились только фильмы, в первой половине которых нарастали приметы катастрофы, а во второй прорывался подпочвенный ужас, вылупливался динозавр, трескалась кора. Ужас всегда разочаровывал – копившиеся приметы были страшней; в «Легенде о динозавре» ясно было видно, что динозавр резиновый. В «Парке юрского периода» было не страшно, а, скорее, смешно. Она и потом, в Москве, не избавилась от этого пристрастия – бегала смотреть «Звонок», «Знаки», но особенно любила «Пик Данте», идиотскую пугалку, в которой было что-то бесконечно родное. Наверное, она любила «Пик» за то, что Америка там была провинциальной, беззащитной, похожей на Брянск, и оказалась совершенно не готова к извержению. Пирс Броснан вел себя как типичный русский, для которого катастрофа – нормальный фон жизни, и когда она наконец прорывается, словно магма сквозь трещину, сразу становится можно в полную силу жить, любить и разговаривать. Почему мне всегда таким невыносимым лицемерием казался обычный порядок вещей? Ведь я знаю, что в основе всего – пепел и магма; что именно сейчас самое лучшее время – когда все еще копится и ледяное дыхание чувствуется, но не началось еще страшное лавинное осыпание, только листья сыплются, сыплются…</p><p class="p1">Как всегда, инопланетянин все чувствовал.</p><p class="p1">– В войну, наверное, были такие поезда. Назывался «пятьсот веселый». Когда придет, где остановится – никто не знает.</p><p class="p1">– А ваши тут работали в войну?</p><p class="p1">– Да наверное. Только советские к нам не очень ехали. Не верил никто.</p><p class="p1">– Боялись?</p><p class="p1">– НКВД боялись. Вдруг это проверка такая, ты захочешь эмигрировать – а тебя в цугундер. За бегство. А то бы многие сбежали, конечно. У нас там знаешь сколько народу добавилось за войну? Тысяч десять, не меньше. Ваших, немцев, итальянцев… Евреи тоже. Всякие были.</p><p class="p1">– И как же там евреи… с немцами…</p><p class="p1">– А нормально, знаешь. Они же после войны тоже нормально встречались. Вообще, стоит местных забрать отсюда – и в хорошем месте сразу начинается обычная жизнь. Тут какие-то условия не те, поэтому все друг друга и ненавидят постоянно. Наши сколько лет изучают, все не изучат. То ли бури магнитные, то ли полюса неправильные… Очень поляризовано все. Да ты увидишь. Человек к нам попадает – и сразу все другое, вообще. Даже не понимает, как он мог на Земле такие глупости вытворять…</p><p class="p1">Электричка скрипела, ползла, спотыкалась. В пути я занемог, и все бежит, кружит мой сон по выжженным полям. Самое русское стихотворение, даром что японское. Откуда там были выжженные поля? Нет, это наше. Черный прах сожженной травы, белые иглы той же травы, сожженной заморозком. В тамбуре кого-то били, любая ссора теперь сразу превращалась в драку, но заканчивалась драка – и вновь наваливалось сонное оцепенение, да и дрались одурело, бессмысленно: два-три беспричинных удара – и будто не было ничего. Боком продирался через вагон несчастный продавец китайских ручек с мигалкой. Ручек никто не брал, а он все переползал из вагона в вагон. Освободился уголок скамьи, Игорь с силой протолкнул туда Катьку.</p><p class="p1">– Да не надо, я стою…</p><p class="p1">– Сиди! – прикрикнул он. – Неизвестно еще сколько…</p><p class="p1">И точно, на Столбовой встали капитально. Говорили, что впереди перекрыт путь, то ли упало дерево, то ли сидят протестующие непонятно против чего. Машинист открыл двери, задуло холодом, мужчины потянулись курить, отвратительный запах «Примы» пополз в вагон. Стало попросторней. Динамик просипел, что стоять будут минут сорок, не меньше. Простояли уже час, ничто не менялось; Катька глянула на часы – было три.</p><p class="p1">– Ну их к черту, – сказал Игорь. – Отсюда уже доберемся, на трассе поймаем.</p><p class="p1">– Да забита же трасса, они говорили…</p><p class="p1">– Мало ли что они говорили. Пошли.</p><p class="p1">На пристанционной площади в Столбовой стояла небольшая толпа, рядом неизвестно чего ждали пять желтых автобусов, водители курили рядом. Время от времени от толпы кто-то отделялся, подходил к водителям, безнадежно задавал вопрос, получал предсказуемый ответ и возвращался обратно в неопределенное ожидание. Игорь с Катькой тоже подошли спросить.</p><p class="p1">– Поедет кто-нибудь?</p><p class="p1">Водители важно помолчали.</p><p class="p1">– Ждем, – сказал мужичок в кепочке.</p><p class="p1">– Чего ждем?</p><p class="p1">– Распоряжения.</p><p class="p1">– А что, сейчас нельзя?</p><p class="p1">– Сейчас нельзя, – подтвердил мордатый водитель, сидевший на ступеньках, в открытых дверях своего автобуса. Это был один из вечно обиженных, задиристых, тяжелых людей, которых так много в любой подмосковной электричке или очереди. На вопросы он отвечал злорадно, передразнивая, словно желая сказать: «А, вы думали, будет хорошо? Всем – плохо, а вам – хорошо? Нет, голубчики, будете как все!» Катька с детства знала эту особенность русской толпы – там всегда злорадствовали при виде новичков, которым еще только предстояло хлебать полной ложкой все, чем их до сих пор мазали по губам. Каждого, кто присоединялся к очереди, радостно информировали, что перед ним еще пять человек, которые отошли. Собственно, и рождение ребенка полагалось бы здесь встречать так же – вот, милый, теперь и тебе достанется! И не сказать, чтобы общая тяжесть убывала, поделившись на большее число страдальцев, – она непонятным образом прибывала с появлением каждого нового пассажира, покупателя, гражданина; просто остальным нравилось, когда новички повторяли их скорбный путь.</p><p class="p1">Катька с Игорем отошли в сторону.</p><p class="p1">– Ну и чего они ждут?</p><p class="p1">– А ничего, – сказал Игорь. – Ехать не хотят, и все. Чрезвычайное же положение. Какой водитель захочет ехать, когда можно не ехать? К вечеру, глядишь, смилуется один, и то вряд ли.</p><p class="p1">– Но ведь война же. Почему нет этой… как ее… всенародной солидарности?</p><p class="p1">– А где ты ее видела, всенародную солидарность?</p><p class="p1">– Все говорят.</p><p class="p1">– Кать, ты же умная девочка, честное слово! Задним числом всегда говорят… А как евреев немцам сдавали – это еврейские выдумки всё, да? А как друг на друга стучали? Ты знаешь, какое объявление на парижском гестапо висело?</p><p class="p1">– Не знаю, – сказала Катька. – Меня там не было.</p><p class="p1">– «Доносы русских друг на друга не принимаются», – было там написано. Ну чего, будем ждать?</p><p class="p1">– Не знаю.</p><p class="p1">– А я знаю, – зло сказал Игорь. – Пошли к трассе, будем ловить.</p><p class="p1">По дороге к трассе им попался мент, пинками гнавший куда-то пьяного мужика абсолютно русского вида; то ли он намеревался загнать его в участок и там засадить в обезьянник по всей форме, то ли просто запинать в кусты и там обобрать без свидетелей или уж отмутузить до потери пульса; в рамках борьбы с терроризмом сходило все. Другой мент долго проверял у них документы на унылом перекрестке; Катьку он заставил вытряхнуть сумочку, подробно осмотрел жалкую косметику, вывернул бумажник Игоря и вернул его с крайней неохотой – Катька больше всего боялась, что он найдет карточку с голограммой, с таким документом нельзя было теперь передвигаться по Подмосковью, но карточки не было ни в карманах, ни в бумажнике. Видимо, эвакуатор предусмотрительно оставил дома опасный документ. Прикопаться было не к чему, но мент еще долго, придирчиво выяснял, что они делают в Столбовой. Чувствовалось, что он любил свой маленький уютный город и с удовольствием уничтожил бы всякого, кто приехал нарушать его гомеостазис. Особенно приятно было бы разобраться с двумя москвичами, которые жировали в своей Москве, пока было можно, а теперь вот бегут спасаться в ограбленное ими Подмосковье, в котором милиции платят три тысячи рублей в месяц. Катька отлично знала, что задерживать их не за что, но уже с первых секунд досмотра чувствовала себя непоправимо виноватой и знала, что в случае чего оправдаться нечем; что за «случай чего», она понятия не имела. Одна манера обращаться к собеседнику в первом лице, множественном числе – «Почему нарушаем?» – отдавала детсадом: «Что это мы делаем? Почему это мы не какаем?!» Для самой Катьки, сданной в детсад в четырехлетнем возрасте, когда мать устроилась на работу, – какать публично, на горшке, по расписанию, перед прогулкой, было с самого начала мучительно, она так и не научилась этому.</p><p class="p1">– А мы не нарушаем, – дружелюбно сказал Игорь.</p><p class="p1">– Как не нарушаем? – спросил мент и всмотрелся в Игоря снизу вверх. – Что значит не нарушаем?</p><p class="p1">Он чего-то хотел – денег или другого их унижения, расплаты за ослушание, но, поскольку Катька не понимала, что они сделали, неясно было, какие компенсации предлагать.</p><p class="p1">– А что мы нарушаем? – спросил Игорь.</p><p class="p1">– А что это мы вопросы задаем? – спросил мент.</p><p class="p1">– Не знаю, – сказал Игорь. – Не знаю, чего это вы вопросы задаете.</p><p class="p1">– А вот мы сейчас в отделение пойдем и там по-другому поговорим, – весело сказал мент. Чувствовалось, что ему необыкновенно приятно даже упоминать об этой перспективе.</p><p class="p1">– А почему это мы туда пойдем?</p><p class="p1">– А потому, что комендантское положение! – объявил он. – Комендантское положение – что такое? Знаем, что такое?</p><p class="p1">– Знаем, – миролюбиво кивнул Игорь.</p><p class="p1">– И что там сказано? Там сказано, пункт девятый, подпункт «а». Что мы имеем право. Задерживать до трех суток для выяснения.</p><p class="p1">Трое суток, подумала Катька. Сережа с Подушей с ума сойдут. Им же ничего не сообщат. Я ничего не успею. Господи, если он действительно инопланетянин, неужели у них нет чего-нибудь на этот случай? Бластера или как это называется. Почему он взглядом не испепелит эту круглорожую тварь?!</p><p class="p1">– Ну, – сказал Игорь. – Так ведь это если нарушаем.</p><p class="p1">– А мы не нарушаем? – спросил мент. – Прописка московская, а что мы здесь делаем?</p><p class="p1">– На дачу едем.</p><p class="p1">– И где у нас дача?</p><p class="p1">– В Тарасовке.</p><p class="p1">– А что это мы при комендантском положении на дачу едем?</p><p class="p1">– Так ведь там ничего не сказано про дачу!</p><p class="p1">Откуда он знает, подумала Катька, он что, читал это чертово комендантское положение, о котором я вообще впервые слышу?</p><p class="p1">– Там сказано, – радостно сообщил мент. – Там все сказано. Там сказано в пункте семь, подпункт «б»: не нарушать границ населенного пункта проживания, при отъезде получать открепительный талон для немедленной регистрации в новом пункте проживания, при отъезде более чем на трое суток получать справку с места работы.</p><p class="p1">– У нас меньше трех суток, – примирительно сказал Игорь.</p><p class="p1">– А это подпункт «в», при отъезде менее трех суток иметь при себе документ, удостоверяющий личность, и открепительное разрешение из районного отделения милиции…</p><p class="p1">– Там же подпункт «г», – мягко сказал Игорь. – При отсутствии разрешения штраф на месте в размере ста рублей.</p><p class="p1">Он быстро достал сторублевку.</p><p class="p1">Мент удовлетворенно кивнул.</p><p class="p1">– Когда возвращаемся в Москву?</p><p class="p1">– Вы – не знаю, – не сдержалась Катька, – а мы сегодня вечером.</p><p class="p1">Мент откозырял и отошел.</p><p class="p1">– Он что, всю эту комедию затеял ради ста рублей? – спросила Катька, когда они отошли. Ее все еще колотило.</p><p class="p1">– Почему, – Игорь пожал плечами. – Он свою работу делает.</p><p class="p1">– Какую, в задницу, работу?! Дачников ловить – его работа?</p><p class="p1">– Да нет. Передал мне все, что нужно.</p><p class="p1">– По-моему, это ты ему передал.</p><p class="p1">– Ну, думай как знаешь.</p><p class="p1">– Стоп. – Катька остановилась и дернула его за руку. – Ты хочешь сказать, что в этом… был какой-то смысл?</p><p class="p1">– Какой-то был. Кать, пошли, а?</p><p class="p1">– Нет, ты мне объясни, пожалуйста. Что он тебе передал?</p><p class="p1">– Девять «а», семь «б», семь «в», – терпеливо сказал Игорь.</p><p class="p1">– Эти подпункты идиотские? Из комендантского положения?</p><p class="p1">– Кать, нет никакого комендантского положения.</p><p class="p1">– Он что… – Катька задохнулась. – Ваш связной?</p><p class="p1">– Господи, ну какой связной? Он обычный мент, за сто рублей выполнил простое поручение.</p><p class="p1">– А кто ему поручил?</p><p class="p1">– Наши поручили, которые меня ведут.</p><p class="p1">– Он что, не мог по-человечески сказать?</p><p class="p1">– А что он мог сказать? Ему поручили передать мне такие-то и такие-то пункты, он передал, спасибо. Что мы, должны каждому менту объяснять их смысл? Звонят из центра, говорят: вот комендантское положение. Задержите такого-то и ознакомьте с пунктами. Получив отзыв, оставьте его в покое.</p><p class="p1">– И какой отзыв?</p><p class="p1">– Сто рублей. Ты думала, это взятка? За такую взятку он жопу не поднимет.</p><p class="p1">– Постой, постой, – Катька никак не могла проассоциировать мента с инопланетными наблюдателями. – То есть он вообще не знает, кто ты такой?</p><p class="p1">– Понятия не имеет. Сидит наш человек в областном УВД и ему звонит, и все.</p><p class="p1">– Позвонить тебе на мобильный они не могут?</p><p class="p1">– Сейчас? Когда все разговоры пишутся? Ты вообще, что ли?!</p><p class="p1">– Ну, шифром…</p><p class="p1">– Кать, ты заметила, что я сегодня без мобильника?</p><p class="p1">– Нет. А почему?</p><p class="p1">– На хрена мне светить Тарасовку? По мобильнику же они пеленгуют в момент. Это база, про которую ни один человек не должен знать. Я бог знает на какое нарушение иду, что тебя туда беру. Спаси Кракатук, чтобы пронесло.</p><p class="p1">– А по Сети они не могли с тобой связаться?</p><p class="p1">– Где у меня сейчас Сеть, скажи, пожалуйста?</p><p class="p1">– А откуда они знают, что ты в Столбовой?</p><p class="p1">– Господи! Тебе вообще все рассказать, да? Тебе русским вашим языком сказано: меня ведут! Чип во мне, понимаешь?</p><p class="p1">– Где?</p><p class="p1">– На бороде! Откуда я знаю где. Может, я захочу выковырять и сбежать.</p><p class="p1">– А ты не хочешь?</p><p class="p1">– Нет, не хочу. Что я здесь делать буду без чипа?</p><p class="p1">– Да. Логично. И что значат эти пункты?</p><p class="p1">– Ничего не значат. Идем.</p><p class="p1">– Нет, ты ответь, пожалуйста.</p><p class="p1">– Они значат! – взорвался Игорь. – Что если мы через пять дней не стартуем, то всем капец! А пункт «в» – это вообще куругач, полный, немедленный, третьей степени.</p><p class="p1">– Куругач?</p><p class="p1">– Куругач. Уругус куругач, если угодно.</p><p class="p1">– И могу я узнать, что это значит?</p><p class="p1">– Узнаешь, если дальше будешь так же тормозить. Обязательно. Всё, пошли.</p><p class="p1">Катька безвольно поплелась за ним. За сквером с маленьким серебряным Лениным уже видна была симферопольская трасса. Почему-то теперь было не так страшно. Ниоткуда взявшийся мент с комендантским положением был страшней, чем куругач, хотя бы даже и уругус. Все-таки их ведут, следят. Ничему не верю, ни единому слову. Но все равно так лучше.</p><p class="p1">Трасса, против ожиданий, была пустынна – никаких многокилометровых пробок, ехали все больше грузовики, и массовым бегством из Москвы не пахло. Скоро на обочине тормознул грязный уазик – за рулем сидел необыкновенно хилый и бледный солдат.</p><p class="p1">– Подбрось до Тарасовки, командир, – попросил Игорь.</p><p class="p1">– Садитесь. Я как раз туда.</p><p class="p1">Они влезли в холодную дребезжащую машину, похожую на консервную банку: солдатская аскеза, никакой обивки на дверях, сплошное зеленое железо.</p><p class="p1">– Вэ чэ тридцать пять шестьсот сорок, – утвердительно сказал Игорь.</p><p class="p1">– Так точно, – кивнул солдат.</p><p class="p1">– Я просто сам из Тарасовки. Вы у меня там рядом стоите.</p><p class="p1">– А. Понятно.</p><p class="p1">– И какие перспективы?</p><p class="p1">– Стоим пока, – пожал плечами солдат.</p><p class="p1">– Не перебрасывают?</p><p class="p1">– Откуда я знаю. Я с прокуратуры. Дознавателя отвозил.</p><p class="p1">– Чего он у вас дознавался-то? – Игорь достал пачку сигарет, предложил солдату, тот благодарно кивнул и вытянул «Мальборо»; Катька удивилась – она никогда не видела Игоря курящим. Видимо, держал для подобных случаев.</p><p class="p1">– Да шестеро наших в Комитет матерей ушло. Пермские. Тупые, блин. Говорят, били их. Кто их трогал, тормозов? Ротного снимать хотели. А он нормальный мужик, один из всех. Теперь дознавателя вожу.</p><p class="p1">– Ну, хоть в Москву ездишь.</p><p class="p1">– А радости? Раньше хоть в кино сходить, а теперь кино по восемьсот. И со вчера закрыли. Чтоб не было массового скопления людей. Во дают, да?</p><p class="p1">– Не говори, – сказал Игорь. – И эти ваши дела, с ротным… Тут война вообще, а они дознавателя гоняют.</p><p class="p1">– А им делать не х…, – словоохотливо пояснил солдат. – Бардак, мля… Война… Какая война, сами всё рвут.</p><p class="p1">– То есть как?</p><p class="p1">– А что, чечены, что ли? Всех чеченов столько нет… В августе на сороковом километре склад рванул – что, чечены?</p><p class="p1">– А кто?</p><p class="p1">– Хер его знает кто. Сам и рванул. Откуда там чечены? Там что, гексоген был? Там же лакокраска была, обычная. Курнул кто-то, спичку бросил. И рванул. Самого там, конечно, даже клочьев не нашли… Война. Тоже война, мля. С кем воевать-то? Война – когда хоть врага видно. А тут лупят в белый свет. Ну, закрыли они кино. Что, чечены в Москву ездили кино смотреть? Увалы отменили. А чего делать? Держат в части, а делать нечего. С утра приборка, днем приборка, вечером чистка оружия. Информация. Химзащита. Ну, я все понимаю, но химзащита-то к чему?</p><p class="p1">– А вдруг газы?</p><p class="p1">– Газы, мля, – улыбнулся солдат и тряхнул головой.</p><p class="p1">Защитник, мля. Кого они такие защитят? И что, собственно, я здесь делаю? Катька посмотрела на часы: было уже без четверти четыре, до Тарасовки они доберутся дай бог к пяти, а обратно… хорошо, если к ночи будут в городе. И зачем я еду, и куда? Неужели верю, что он инопланетянин? Хорошо, а во что мне еще верить? И потом, здесь я все-таки с ним. С ним мне не так страшно, бог весть почему.</p><p class="p1">В Тарасовке они оказались только к пяти, потому что по дороге уазик сломался, солдат долго его чинил, матерясь; Игорь чего-то помогал, но внятного совета дать не мог, ибо в земной технике не разбирался. Быстро темнело. Рядом остановился грузовик, водила добровольно помог солдату, чего-то подкрутил, подвинтил, обозвал салабоном и уехал, солдат всю оставшуюся дорогу оправдывался, что с самого начала хотел сделать именно так, но у него не было нужного ключа, с ключами вообще напряженка; Игорь сочувственно кивал. На развилке под шлагбаум уходила узкая бетонка, солдат высадил их и уехал по ней, а им пришлось тащиться еще полчаса во вполне сталкеровском пейзаже, вдоль брошенной узкоколейки, потом через облетевший перелесок – «Между прочим, я здесь нашел первый в своей жизни гриб. Подосиновик. У нас грибов нет».</p><p class="p1">– Как же вы без грибов?</p><p class="p1">– Зачем нам гриб? Паразитарная структура… У нас есть цветы ровно того же вкуса…</p><p class="p1">– А что, поближе тебе не могли дачу купить?</p><p class="p1">– Тут от станции ближе гораздо. Мы бы уже дома были. Поближе… зачем поближе? Чего светиться лишний раз? Чем дальше от Москвы, тем, знаешь, меньше головной боли. А тут участки сравнительно дешевые, две воинские части рядом, танкисты и ракетчики. Полигон, грохот. Хоть и далеко, а слышно. В общем, не самая элитная местность.</p><p class="p1">– А ракетчики по нам не жахнут, когда стартуем?</p><p class="p1">– Вряд ли. – Он усмехнулся. – Навестись не успеют. У нас старт быстрый. Меня другое волнует. Почему куругач?</p><p class="p1">– Да что такое куругач, объясни на милость! – озлилась Катька.</p><p class="p1">– То-то и оно, что я не знаю.</p><p class="p1">– Ты просто придумать не успел. Это был самый обычный мент.</p><p class="p1">– Да, да. Так и думай, пожалуйста.</p><p class="p1">– Но это опасно?</p><p class="p1">– Обычный мент? О да, он очень опасен.</p><p class="p1">– Ну не заводись, я серьезно. Куругач – это что-то страшное у нас?</p><p class="p1">– Это что-то серьезное у нас, – резко ответил он. – Прокололся, наверное, кто-то… Будут они просто так отзывать…</p><p class="p1">– А что, отзывают? То есть ты можешь улететь без меня?</p><p class="p1">– Нет пока. Но пункт «в»… черт. Надо бы мне по-хорошему домой быстро, может, прислали разъяснение… Вообще, черт его знает. И связаться мне не с кем, понимаешь ты или нет?</p><p class="p1">– А этот ваш в УВД?</p><p class="p1">– Да он-то что знает? Передаточная инстанция в чистом виде… У нас сто лет не было никакой экстремалки. Это они, наверное, страхуются. Когда Японию бомбили, тоже был куругач. Думали, двумя бомбами не ограничится, готовили к срочному отзыву всех. Обошлось. Но только, видишь ли… – Он быстро шел вперед, не оборачиваясь, и говорил словно сам с собой, Катька не все разбирала. – Все-таки уругус…</p><p class="p1">– Игорь! Ты можешь объяснить по-человечески, что такое уругус?</p><p class="p1">– Не могу, извини. Прилетим – объясню.</p><p class="p1">– Понятно, – сказала Катька. – Дело закодировано голубой розой, а что такое голубая роза, агент Купер сам не в курсе.</p><p class="p1">– Знает, – обернулся Игорь. Голос у него был очень серьезный, и впервые за все время этой безумной поездки она поверила ему по-настоящему. – Очень знает. Я тебе все объяснять не буду, Кать. Но для сравнения… Одно дело, если тебе, не дай бог, звонит сейчас наш муж и говорит: срочно домой, я за тебя беспокоюсь. Это простой куругач, куругач «б». А если, опять-таки не дай бог, он говорит: немедленно домой, дочка плохо себя чувствует… это уругус куругач. Поняла?</p><p class="p1">– Примерно поняла, – медленно сказала Катька. – Что-то у вас неладно, да?</p><p class="p1">– Ну, не так чтобы неладно… Если бы неладно, они бы нашли способ. Но вообще, по-хорошему надо бы мне в Свиблово. Посмотреть в Сети, что и как.</p><p class="p1">– Да не психуй, – сказала Катька. – В крайнем случае я быстро соберусь.</p><p class="p1">– Ты полетишь, правда? – спросил он так, что Катьке стало невыносимо его жалко.</p><p class="p1">– Ну, если там у вас уругус – как же ты без меня?</p><p class="p1">– Солнышко мое, солнышко, – сказал он. – Удивительная ты девочка, Катя. Тебя только на жалость можно взять.</p><p class="p1">– А ты пользуешься…</p><p class="p1">В дачный поселок они вступили в густо-синих сумерках, когда уже едва виднелась асфальтовая дорога с ямами и выбоинами. Дачники давно разъехались, только в двух домах светились окна. «Эти тут постоянно. Вон там – сторож местный, он по вечерам обходит все. Толку от него чуть».</p><p class="p1">– Далеко еще?</p><p class="p1">– Седьмая улица. Сейчас, метров двести. У меня там все нормально – отдохнуть можно, поесть, вполне себе перевалочная база.</p><p class="p1">– Игорь! Какое там отдохнуть! Я домой должна успеть к ночи хотя бы!</p><p class="p1">– Успеешь. В крайнем случае заночуем, позвонишь…</p><p class="p1">На заборе сто двадцатого участка висела табличка – «Н.И. Медников».</p><p class="p1">– Кто такой Медников?</p><p class="p1">– Откуда я знаю? Дед какой-то. Мне ключи выдали, адрес сказали, и все.</p><p class="p1">– Подожди… А зачем было покупать участок, если можно снять? Дешевле же!</p><p class="p1">– Снять? – Игорь усмехнулся. – Тут после старта знаешь что будет? Ни сарая, ни дома, ни вот этого забора. Хорошо еще, если соседское устоит…</p><p class="p1">– Да тебе-то какая разница? Улетел, пусть разбираются…</p><p class="p1">Он посмотрел на нее с недоверием:</p><p class="p1">– Мать, это на тебя не похоже. Как это – снять, все пожечь и смыться? Это у вас так делается, а у нас это анкурлык.</p><p class="p1">– Ну прости, пожалуйста. Я просто подумала, что раз уж все рушится… кому какое дело еще и до дачи?</p><p class="p1">– Вот это серьезная ошибка. – Он полез в карман, достал тяжелую связку почти одинаковых ключей и долго выбирал нужный. – Это ваше большое заблуждение, кстати говоря. У вас думают – если всему конец, можно вести себя как угодно. Как раз наоборот. Когда всему конец, куругач, хотя бы и уругус, – надо вести себя очень прилично. Может, вся предшествующая история была только ради него. Это главное событие. Надо лицо сохранять. Надо как на «Титанике» – чтобы оркестр играл до последней минуты, чтобы джентльмены прощались вежливо: «Простите, ввиду непредвиденных обстоятельств я вряд ли смогу завтра составить вам партию в триктрак на верхней палубе»… У нас и пословица есть: «Бурлун тырыгык, бырлын туругук».</p><p class="p1">– Красиво. А что это значит?</p><p class="p1">– Это значит «Живи как хочешь, а умирай как человек».</p><p class="p1">– Да, логично. Я уже почти понимаю ваш язык. Чтобы сделать антоним, надо «ы» поменять на «у», и все. Да?</p><p class="p1">– Ымница…</p><p class="p1">На соседнем участке стоял большой кирпичный дом, самый основательный на всей улице: два этажа, пристроенный стеклянный парник, большой гараж. В доме горел свет.</p><p class="p1">– Сосед… зимует, куркуль.</p><p class="p1">– А добрый, щедрый человек будет кыркыль, – догадалась Катька.</p><p class="p1">Игорь тщетно возился с ржавым замком, висящим на калитке. Из соседней калитки вышел толстый усатый мужик, действительно очень куркулистого вида. На нем были серые брезентовые штаны, короткие резиновые сапоги и старый, болотного цвета плащ – дачная униформа, все древнее, но теплое и прочное.</p><p class="p1">– А я гляжу – кто возится? – сказал он, усмехаясь. – А это вон кто приехал. Что-то ты поздно.</p><p class="p1">– Пока доберешься, дядь Коль, – буркнул Игорь.</p><p class="p1">– Чего, заело? Дай я.</p><p class="p1">– Нет, нет, все в порядке. Не надо. – Игорю, видимо, очень не хотелось, чтобы дядь Коль лазил в его замок. Он суетливо подергал ключом, что-то щелкнуло, и ржавая дужка наконец отскочила.</p><p class="p1">– А я гляжу, – повторил сосед. – Что, думаю, не едет никто? Все лето не ездит и сейчас не ездит…</p><p class="p1">– Работаю, дядь Коль.</p><p class="p1">– Работать надо, надо… – Он стоял у калитки, мялся, и из-за этого внезапного препятствия они не могли войти на участок. Сосед хотел о чем-то заговорить, но не решался.</p><p class="p1">– Жена, что ль?</p><p class="p1">– Вроде того.</p><p class="p1">– А. У Юльки тоже вроде того. У всех вас вроде. Я что хотел, Игорь. Ты же все равно… ну это. Не занимаешься домом-то. Участок, вон смотри, как зарос. Трава по плечо.</p><p class="p1">В самом деле, участок был по-настоящему запущен – бурьян, дурман, даже пара борщевиков у забора; теперь торчали одни сухие бодылья, но летом, видно, тут бушевал густой травяной лес. Сейчас, когда трава вымерзла и пожухла, можно было различить и дорожку из потрескавшихся бетонных плит, и маленький дом в глубине участка, и сарай возле самого забора, – в июле, видимо, все тонуло в разросшейся сирени, в зонтиках дудника, в облепиховых кустах и зарослях черноплодки. Если Игорь хотел замаскироваться, лучшего места было не найти.</p><p class="p1">– Я займусь, дядь Коль.</p><p class="p1">– Да я не к тому. Я что, не понимаю? Работа, что ж. Но ты, может, продать хочешь?</p><p class="p1">– А что, – Игорь насторожился, – есть покупатель?</p><p class="p1">– Ну… есть.</p><p class="p1">– А кто?</p><p class="p1">– Да хоть бы я. Юльке свой дом надо…</p><p class="p1">– Я подумаю, дядь Коль. Через недельку приеду и скажу.</p><p class="p1">– Ага. Ты подумай, да. Я много не дам, это… но ты сам понимаешь: дом у вас еле стоит, его разобрать проще, чем ремонтировать. Потом, кухня тоже никакая. Тут все надо с нуля, буквально. Тут одной земли сколько надо завезти. Ты все равно не занимаешься, я разве что? У кого какой талант. У тебя такой талант, у меня такой.</p><p class="p1">– Я решу, дядь Коль.</p><p class="p1">– Ты реши, – не уходил сосед. – Потому что сам понимаешь, мне тоже надо. Я сейчас в Москву и не езжу почти. У меня все здесь. Чего там в Москве-то, слушай? Я по телевизору не пойму ничего.</p><p class="p1">Да плевать тебе, что в Москве, подумала Катька. Было б не плевать – ты бы сразу спросил. Тебе участок надо ухапать по дешевке. Куркуль ей активно не нравился.</p><p class="p1">– Ничего. Чрезвычайное положение.</p><p class="p1">– А. Ну ладно. Давно пора. У нас-то тихо. Только ночью грохотало у них чего-то, может, стрельбы…</p><p class="p1">– Может. Вроде все в готовности.</p><p class="p1">– А чего готовность? Выжечь там все, и не надо никакой готовности.</p><p class="p1">– Да выжгли уже, дядь Коль. Не помогло.</p><p class="p1">– Я знаю, как там выжгли. Там выжгли, где не надо. А кто бабки платит, тех не выжгли. Ну ладно. Вы небось отдохнуть хотите. Отдыхайте, отдыхайте. Я только чего говорю, Игорь, – прибавил он, все не решаясь уйти. – Я и Николай Игоричу говорил, когда он еще ездил… Чего ты, говорю, маешься тут, отдай участок! Отдай, Николай Игорич, нет же у тебя к этому делу таланта. Не отдавал. Теперь ты вот. Сам же видишь. Тут, если руки приложить, такое можно сделать! Ты посмотри, какие яблоки у меня в том году были. И в этом сколько. Слива какая. Картошку я вообще забыл, когда покупал. Давай, думай. Ты это, – он понизил голос, – ты не думай, я тысяч десять дам. Тебе больше никто не даст. Ты когда решишь-то?</p><p class="p1">– Через неделю, – терпеливо повторил Игорь.</p><p class="p1">– Ну давай. – Дядь Коль явно хотел сказать еще что-то, но не знал как; когда такие люди хотят привести последний и безоговорочный аргумент в свою пользу, они приписывают к заявлению «Прошу в моей просьбе не отказать». Природная деликатность не позволяет им внятно предложить: «Отдай мне твое, у меня на него больше прав, я лучше тебя умею обращаться с землей и стройматериалами, и все это мое, а твое только случайно. В принципе ты бы мне должен отдать это бесплатно, я сам могу взять, если захочу. Но я предлагаю тебе десять тысяч, хотя таких цен за участок с домом давно не бывает. Отдай, хуже будет».</p><p class="p1">Игорь кивнул соседу и шагнул на бетонную дорожку.</p><p class="p1">– Заходи, Кать. Приехали.</p><p class="p1">Сосед пошел к себе, только когда Игорь закрыл калитку и защелкнул шпингалет.</p><p class="p1">– Ну что, – спросила Катька, – ты продашь?</p><p class="p1">– Через неделю-то? Даром отдам. Через неделю я отсюда – фью!</p><p class="p1">– И где она у тебя?</p><p class="p1">– Вон, в сарайчике. По домам лазят все-таки, а в сарай кто полезет. Там же один инвентарь. Погоди, сейчас я дом открою.</p><p class="p1">Он долго возился еще и с этим замком, тоже ржавым. Наконец дверь открылась, в доме пахло старым сырым деревом и затхлостью.</p><p class="p1">– Входи. Я сейчас пробки вкручу.</p><p class="p1">– Слушай. Может, мы сразу посмотрим… и домой?</p><p class="p1">– Нет, мать. Вы, земные женщины, выносливы, а я не потяну. Мне надо чаю попить и в себя прийти. Часа через два поедем.</p><p class="p1">– Через два часа тут будет полный мрак.</p><p class="p1">– Ну, дорогу-то я знаю! На станцию пойдем, может, ходит что…</p><p class="p1">Катька опустилась на плетеный диван и только тут почувствовала, как у нее гудят ноги. Вообразить, что в сарае, в пяти метрах от нее, стоит и ждет своего часа летающая тарелка, она не могла, но Игорь вел себя с подозрительной уверенностью. Достигнув наконец цели путешествия, он резко повеселел. Зажегся свет, в доме стало уютней, Катька рассмотрела обстановку – сплошь убогую, годов шестидесятых: занавесочки в веселых треугольничках, такой дизайн был в моде как раз тогда. Тахта, шкаф, битком набитый старыми журналами, открытый ящик со сломанными игрушками, электроплитка, радиола «Серенада» рижского производства.</p><p class="p1">– Тут старикан жил, – сказал Игорь. – У него с годами прогрессировала тяга к одиночеству, и родня продала дачу. Он сейчас все больше в Москве по больницам. Сюда, говорят, просится, но его уже не пускают. Он тут жил, ничего не делал на участке, заросло все, как я не знаю. А занимался только тем, что чинил радиолу и читал «Технику – молодежи». Вон, весь шкаф забит. Я знаешь что думаю? Что у него тут живет домовой, тоже старикан. Что он в его отсутствие вылезает и чинит радиолу, а когда починит, тоже уедет в Москву. Докладывать хозяину. Я думаю, это будет очень усовершенствованная радиола. Она, возможно, даже взлетит.</p><p class="p1">– А игрушки чьи?</p><p class="p1">– Откуда я знаю. Может, его собственные. Играл тут. Погоди, я за водой схожу. Водопровода нет, прошлой зимой трубы разорвало.</p><p class="p1">Он вышел куда-то и вернулся с полным цинковым ведром, потом включил электроплитку, поставил на нее мятый алюминиевый чайник – все это спокойно и буднично. Катька сидела в странном оцепенении, понимая, что от нее теперь ничего не зависит. В доме было холодно, изо рта шел пар.</p><p class="p1">– Погоди, я натоплю сейчас. У него тут электрокамин, а в комнате печка. Полчаса не пройдет – разогреется до тридцати.</p><p class="p1">– Вы что, не могли каких-нибудь специальных устройств понаставить? Чтобы постоянную температуру поддерживать?</p><p class="p1">– А зачем?</p><p class="p1">– Ну… не знаю… Чтобы тарелка не замерзла.</p><p class="p1">– Она и так не замерзнет. У меня же тосол залит.</p><p class="p1">– А… Она что, тоже на тосоле?</p><p class="p1">– Она на фотонных двигателях, но тосол все равно нужен. Именно чтобы не замерзала.</p><p class="p1">– Да. Интересно. Ну а в доме? Какое-нибудь простое фотонное устройство, чтобы за три минуты разогреть все?</p><p class="p1">– Мать, да какая же древесина выдержит такой разогрев? В деревянном доме оптимальный вариант – печка. Ты хочешь, чтобы у меня рассохлось все?</p><p class="p1">– Да, точно. Ну ладно. А почему я не вижу никаких атрибутов роскошной инопланетной жизни? Сувенир там или портрет дорогой мамы?</p><p class="p1">– Портрет дорогой мамы у меня в компьютере.</p><p class="p1">– Просто, понимаешь… должна же я подготовиться. Ты ведь нас познакомишь?</p><p class="p1">– А как же.</p><p class="p1">– А что-нибудь на память об Альфе Козерога?</p><p class="p1">– Ну Кать. Что ты как ребенок. Это все равно что Штирлица спрашивать: скажите, Отто, почему у вас портрета Сталина нет на стеночке? Или фото Шурочки?</p><p class="p1">– Я думаю, фото Шурочки у него где-нибудь висело, в старом немецком костюме, чтобы в случае чего выдать за прабабушку. А его правда звали Отто? Мне всегда казалось, что Макс.</p><p class="p1">– Макс его звали в России. – Он заварил мятный чай в фарфоровом, очень старом чайничке, достал две кружки и банку сгущенки.</p><p class="p1">– Это я еще летом запас. Сейчас открою.</p><p class="p1">– А когда мы пойдем смотреть?</p><p class="p1">– Попьем чаю и пойдем. Мне еще с ней, между прочим, возиться не меньше получаса. Смазать все узлы и вообще. Так что сперва чай.</p><p class="p1">– Мне прямо, знаешь, не терпится.</p><p class="p1">– Да мне самому не терпится, Кать. Она же мне и надежда, и единственная связь, и главный сувенир с Альфы Козерога. Да, кстати, – он порылся в ящике с игрушками и вытащил небольшого плюшевого зверька, совершенно круглого, с рожками, короткими лапками, бобровым хвостом и выкаченными испуганными глазами. – Если тебя интересует, какие у нас деньги, то вот. Я его всегда с собой вожу.</p><p class="p1">Катька бережно взяла зверька.</p><p class="p1">– Как он называется?</p><p class="p1">– Тыгын. Есть более крупный, дылын. По-вашему тысяча.</p><p class="p1">– А на этого много можно купить?</p><p class="p1">– Когда живой, то много. Таких домиков штуки три – запросто. Он если разрастется, раскормится как следует, то может стать дылын, а это уже десять домиков. Но надо ухаживать очень. Он просто так есть не хочет, аппетита нет. Видишь, и так уже какой круглый. И надо при этом соблюсти диету, чтобы зверек не страдать, не болеть живот, не получить ожирение. Это ж не гусь, чтобы фуагру делать. Он должен просто разрастись. Когда разрастается, он проявлять новые способности, мочь немного прыгать высоко, издавать другой звук. Когда он пищать «пи-пи», он тыгын, но когда делать «ой-ой», то уже практически дылын. Хороший хозяин знать, как кормить зверек. Плохой раскармливать искусственно, и зверек быть нитратный. В любом магазине его проверять, объявлять фальшивый, изымать и отправлять похудание. Правильно раскормленный зверек иметь большие печальные глазки, а неправильно – узенькие щелочки. А с этот тыгын я играть еще глубокое детство, золотая пора. Он мой сувенир, талисман, лежать самое дно. Обратить внимание, Москва, Россия такой зверек нет.</p><p class="p1">– Он немного похож бобер, такой быть губитель здешние леса, грызец деревьев, строитель маленьких хаток. Но бобер не иметь рожки и такой пузо.</p><p class="p1">После чаю стало теплей. Катьку разморило. Кроме мяты, в заварке был странный привкус – что-то вроде душицы, пахучей и горькой.</p><p class="p1">– Чем завариваешь?</p><p class="p1">– Это наша травка, крын-тыкыс. Очень помогает, снимает усталость и вообще вкусная. Только мало осталось. В принципе, транспортник мог прийти в конце декабря. Но если все так срочно, никакого транспорта уже не будет, конечно.</p><p class="p1">– Игорь! А вот представь себе, что я на секунду поверила. И как мне тогда объяснить самой себе, что вы, могущественная цивилизация, которая может и чипы вшивать, и мента вербовать, и траву доставлять разведчику, не отправите сюда гигантский десант, чтобы спасти по крайней мере всех детей?!</p><p class="p1">– Кать, у нас нет разницы между взрослым человеком и это… так сказать, детским. У вас если старик или ребенок – всё, любые грехи списываются. А у нас не так, у нас ребенок наравне с родителями отвечает за все. И почему ребенок – если он, допустим, дурак и хулиган – более достоин спасения, чем, я не знаю, писатель? Профессор?</p><p class="p1">– Потому что дети лучше, – упрямо сказала Катька. – У тебя нет своих, а объяснить это нельзя.</p><p class="p1">– Чего объяснить нельзя, того не существует. У вас имманентные признаки в основе всего: чеченец, еврей, старый, больной… Надо же не по этим признакам оценивать.</p><p class="p1">– А по каким? Типа полезность для общества?</p><p class="p1">– И про полезность у вас неправильно. Кто полезный для общества? Стивен Хокинг? У нас таких полно, я тебе говорил. В любой матшколе. Бугай какой-нибудь, чтобы работать? У нас роботы работают. У нас кто хороший, тот и полезный, это же такая элементарщина.</p><p class="p1">– Ну ладно. Но ты же понимаешь, что если кто хороший… он не может просто так улететь и отобрать шестерых? Он же никогда себе не простит, всю жизнь будет думать, что взял не тех…</p><p class="p1">– Будет, конечно, – согласился Игорь. – Любой эвакуатор это знает. Ходит в храм, молится Аделаиде и Тылынгуну, грехи замаливает. А как иначе? Один Кракатук без греха, и то Аделаида его пилит все время. Когда она его пилит, гремит гром и сверкает молния. Потом Тылынгун плачет, наплачет миллиметров тридцать осадков, и родители мирятся.</p><p class="p1">После волшебной травы к Катьке в самом деле вернулись силы, она поднялась и заходила по веранде – маленькая, решительная, руки в карманах старой красной куртки.</p><p class="p1">– Знаешь, у нас апокриф есть. Изведение из ада. Богородица выводит каждого пятого. Еще стих такой был, не помню у кого.</p><p class="p1">– Я тоже не помню, – сказал он. – И смотря, как кричит, как колотится оголтелое это зверье, – ты права, я кричу, Богородица, да прославится имя твое! Сошествие во ад, сюжет очень распространенный. И как видишь, не совсем выдуманный.</p><p class="p1">– Ты прилично знаешь наш фольклор, – хмуро сказала Катька.</p><p class="p1">– Ну, я же готовился все-таки…</p><p class="p1">– Плохо ты подготовился. Надо было знать, что приличный грешник никогда не согласится на такой выбор.</p><p class="p1">– Наоборот. – Он поднял на нее глаза и улыбнулся; такой улыбки она у него еще не видела. Дело в том, что он улыбался презрительно. В этом человеке, если он человек, в самом деле было намешано столько, что она постоянно путешествовала по всей амплитуде – от восторга к ужасу и обратно. – Человек есть человек, и такова его природа. Даже самый приличный грешник в решительный момент хватает пять-шесть ближайших к нему людей и говорит: забери меня отсюда.</p><p class="p1">– А если человек просто не желает играть в эту дурацкую игру! В это спасение избранных!</p><p class="p1">– Это его выбор, – спокойно сказал Игорь. – Если ему своя белоснежность дороже пяти спасенных жизней, он поистине великий грешник и достоин бедствовать вместе с этой планетой.</p><p class="p1">Катька замолчала.</p><p class="p1">– Кать, – он встал, подошел к ней и прижал ее к себе. Она вырвалась и отвернулась. – Пойдем смотреть тарелку, – сказал он мягко. – Сейчас, только фонарик возьму.</p><p class="p1">Сарай стоял в дальнем углу восьмисоточного участка. Из окон веранды лился теплый желтый свет, горело окно у соседа, и видно было, до чего кругом неприютно. Если мобильник тут берет, она немедленно позвонит мужу и скажет, что остается. Нечего и думать возвращаться в такую пору. На этих дорогах они никого не поймают. Тарасовка выглядела сущим краем земли – неясные силуэты убогих домиков, сухие прутья с лохмотьями последней листвы, чавкающая грязь под ногами, да еще и накрапывать принялось.</p><p class="p1">На двери старого, еле держащегося сарая блестели пять новеньких, блестящих цифровых замков.</p><p class="p1">– Зачем столько? – спросила Катька.</p><p class="p1">– Серьезная вещь, запирать надо.</p><p class="p1">– Да его проще разломать, ты не находишь?</p><p class="p1">– Разломать его не так просто, – гордо сказал Игорь. – Тут защита все-таки. Попробуй ударить в дверь, можно несильно.</p><p class="p1">– И что будет?</p><p class="p1">– Психическая программа дубль пятнадцать будет, вот что, – пробурчал он, набирая коды. – Она у меня стоит за себя – знаешь как? Ты попробуй, правда. Не топориком, не ломиком – просто рукой тресни. Сразу ужас, тоска, желание убежать подальше…</p><p class="p1">Катька и так чувствовала ужас, тоску и желание убежать подальше. Она робко подошла к стене сарая и хотела ударить по ней, но не смогла. Вместо этого, удивившись себе, она погладила сырые некрашеные доски.</p><p class="p1">– Убедилась? – спросил Игорь. – Мощная штука. Я даже когда сам дверь открываю, чувствую некоторое сопротивление… Все, можно. Смотри.</p><p class="p1">Он распахнул дверь. Катька осторожно подошла и заглянула. Пахло мышами и каким-то рассыпанным удобрением, смутно белевшим на полу.</p><p class="p1">– Погоди, я фонарик включу.</p><p class="p1">Он достал «вечный» фонарик с синеватым мертвенным светом и направил его в глубь сарая. Катька на всякий случай ущипнула себя за руку. Она не знала, что ожидала увидеть, да и вообще ничего уже не понимала.</p><p class="p1">Среди рулонов рубероида, белых пустоватых мешков неясного назначения и грязных лопат с потрескавшимися черенками стояла большая садовая лейка.</p><p class="p1">– Ну? – гордо спросил Игорь. – Форма, по-моему, идеальная. А ваши всё – тарелка, тарелка… Я ж тебе говорил – аппарат должен быть обтекаемой формы. Вертикально ориентированный.</p><p class="p1">Тут она поняла, на что был похож летательный аппарат на его карточке с голограммой: длинный цилиндр с косо отведенной от него трубкой и чем-то вроде ручки сбоку. Да, конечно. Конечно, это она.</p><p class="p1">Некоторое время они молчали: Игорь – гордо, любуясь главным сувениром с Альфы Козерога, а Катька – устало. Все было понятно. Все-таки надо как-нибудь уехать домой. Господи, как глупо. Когда я уже стану взрослым человеком.</p><p class="p1">– Нравится? – спросил он.</p><p class="p1">– Очень удобно, – сказала она. – Отличная штука. Поливать, а особенно заливать – просто незаменима.</p><p class="p1">– Ну правильно, а ты чего ждала? Что тут стоит инопланетное чудо, лампочками мигает? Нет, Кать. Все предусмотрено. Система консервации, последнее слово. Форму сохраняет, а все остальное… У нас же серьезно, Кать. Не по-детски.</p></span></span>
