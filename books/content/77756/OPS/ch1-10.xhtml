<span><span><p class="p1">Катька еще некоторое время посмотрела на лейку, потом повернулась к нему и крепко его поцеловала.</p><p class="p1">– Я очень тебя люблю все-таки, – сказала она. – Ты себе не представляешь, что я сейчас чувствую.</p><p class="p1">– Мне бы хотелось, чтобы некую гордость за Альфу, – сказал он самодовольно.</p><p class="p1">– Нет. Нет, Игорь. Ужасное облегчение, просто колоссальное. Понимаешь… если бы тут действительно стояла тарелка, если бы я хоть вот на столечко допускала… это значило бы, что в мою жизнь вторглось нечто невероятное. Ведь это ты перевалил на меня такой груз, а в случае отказа шантажировал собственной гибелью. А теперь ничего этого опять нет, и нет никакой тарелки. Я даже не сержусь, что ты так заигрался. Я давно хотела выехать из Москвы на воздух. Ну вот, выехала. Теперь можно жить. Отличная вещь, правда. Можно, я ее подержу?</p><p class="p1">– Ты что! – заорал он. – Ни в коем случае!</p><p class="p1">Но Катька его уже не слушала. Она подскочила к лейке и, не ощущая ни малейшего психологического барьера по системе дубль пятнадцать, схватилась за ручку. Поднять тарелку, однако, было нельзя. Катька старалась и так и сяк, – лейка была необычайно тяжелой, она не могла сдвинуть ее даже волоком.</p><p class="p1">Это было ни на что не похоже. Она в последний раз дернула ее за ручку и отступила.</p><p class="p1">– Тяжелая, – сказала Катька жалобным голосом.</p><p class="p1">– Нет, ты еще попробуй, – сухо предложил Игорь. – Давай, давай. Мультизатор оторви к чертям… не жалко! Стабилизатор отломай… трансвольтаж… А может, еще пнем ее как следует? А? Вещь крепкая, выдержит!</p><p class="p1">Он с маху пнул лейку. Раздался гулкий пустой звук, в ту же секунду на соседнем участке вспыхнули красные искры над крышей дома, и в дядь Колиных окнах погас свет. Погас он и у них – электричество отрубилось по всей улице. Горел только голубоватый Игорев фонарик.</p><p class="p1">Катька втянула голову в плечи и зажмурилась. Из оцепенения ее вывел тихий, захлебывающийся смех Игоря.</p><p class="p1">– Это она наделала, да? – робко спросила Катька.</p><p class="p1">– Нет, – с трудом отвечал он, – это Коля наделал… куркуль херов… Очень любит технику, идиот…</p><p class="p1">– Что такое?</p><p class="p1">– Успокойся, это он срать пошел. – Игорь зашелся в новом приступе хохота.</p><p class="p1">– А это… у него всегда сопровождается такими эффектами?</p><p class="p1">– В общем, да. Он установил у себя немецкий аппарат… ну, знаешь, у вас же тут все соревнуются, кто лучше обставит процесс калоотделения. Я как в гости зайду – сразу вижу: люди с особенной любовью обустраивают сортир. Серьезное такое отношение к процессу. А на дачах это обычно решается, как ты понимаешь, с помощью ямы или ведра. Ну, биотуалет, если кто побогаче… Но Коля не прост! Он очень не прост!</p><p class="p1">С соседнего участка донеслись глухие ругательства.</p><p class="p1">– Коля, – полушепотом продолжал Игорь, – установил у себя немецкое устройство. Приглашал меня монтировать, я как раз тут был. Он же в электрике не петрит ни хрена, ему удается только копание и кладка кирпича. В общем, принцип там грандиозный: когда все сделаешь, надо передернуть два рычага – слева и справа. Вот так, как лыжные палки. Тогда через продукт проходит сильнейший электрический разряд, и фекалия практически уничтожается. То есть она обращается в ничто. Я назвал бы это…</p><p class="p1">– Электрический стул! – триумфально перебила его Катька.</p><p class="p1">– Точно. Но парадокс заключается в том, что на сырой почве прибор периодически замыкается, и току ему требуется больше, чем может выдержать местная система. Так что, когда Коля идет срать, из его трубы вылетают искры и весь поселок знает, что желудок у него… о господи, не могу… сработал!</p><p class="p1">Катька согнулась от смеха.</p><p class="p1">– Ну, и свет вырубается по всей линии. Его тут все умоляют, чтобы он хоть во время сериалов не гадил… А он как раз во время рекламной паузы норовит облегчиться – и весь поселок до завтра не узнает, выйдет донья Селестина из комы или так в ней и зачнет близнецов! Погоди, он сейчас к нам сунется.</p><p class="p1">– Игорь! – робко донеслось с соседнего участка. – Я вижу, вы тут… в сарае…</p><p class="p1">– Мы тут, дядь Коль! – радостно отозвался эвакуатор.</p><p class="p1">– Ты не посмотришь? Так уже зае… это… не могу чинить каждый раз! Погляди, может, там пробки или что…</p><p class="p1">– Я же говорил вам, дядь Коль. Напряжение большое.</p><p class="p1">– А отрегулировать нельзя?</p><p class="p1">– Нельзя отрегулировать. Эта вещь так рассчитана, если меньше – не сработает.</p><p class="p1">– Ёкарный бабай, – печально сказал дядь Коль. – Это ж мне опять со светом ковыряться.</p><p class="p1">– Да с утра сделаете. Нам света много не надо. Лампа есть керосиновая.</p><p class="p1">– Давай, давай при керосиновой лампе! – прошептала Катька. – Ужасно люблю!</p><p class="p1">– Ну а я как буду? – жалобно спросил куркуль. – Мне телевизор посмотреть, у меня отопление опять же…</p><p class="p1">– Ладно, я сейчас зайду.</p><p class="p1">– Я с тобой, – проскулила Катька. – Я боюсь.</p><p class="p1">– Хорошо. Дядь Коль! Я с девушкой к вам иду!</p><p class="p1">– Конечно, конечно! Я чайку поставлю! – засуетился сосед.</p><p class="p1">– Да мы только что пили.</p><p class="p1">У соседа все было богато, прочно и надежно. Чувствовался, так сказать, предприниматель средней руки. У Катьки не было к этой породе людей ни малейшей зависти, напротив – в них была даже трогательная готовность помочь ради лишней демонстрации своего могущества. Прочие-то просто готовы глотку перегрызть за то, что мы не такие; надо уметь ценить даже и снисходительность. Сосед охотно показывал свои нехитрые достижения: тут парник, тут лестница на второй этаж, тут вот, прошу любить и жаловать, роковое приспособление, из-за которого все… Он с фонариком провел Катьку по всему первому этажу, порезал колбасы, сыру, налил по стаканчику за знакомство, – Игорь как раз закончил возиться с проводкой, или с чем электрическим он там возился; зажегся свет, и сосед расцвел.</p><p class="p1">– Слушай, я бы там еще полчаса как минимум трахался бы с этой…</p><p class="p1">– Ладно, ладно. Кать, пошли.</p><p class="p1">– Да посиди ты, что ты, как я не знаю… Николай Игорич всегда заходил, когда попросить чего…</p><p class="p1">– Ну, то Николай Игорич. Спасибо, дядь Коль. Вы бы заземление поставили. Чес-слово, гораздо лучше будет.</p><p class="p1">– Да посидите, ладно! Я тут по неделям людей не вижу. Расскажите хоть, что и как.</p><p class="p1">– Да никак, дядь Коль. Бардак и есть бардак. Сматываться надо, если по-хорошему.</p><p class="p1">– А куда сматываться?</p><p class="p1">– Да куда хотите.</p><p class="p1">– Нет, я тут пересижу. С утра в Чехов затовариваться поеду, тебе не надо ничего?</p><p class="p1">– Да мы в Москву завтра.</p><p class="p1">– А. Ну, помни – если правда надумаешь продавать участок, то я всегда. И оформим быстро. – Он подмигнул. – Торг уместен.</p><p class="p1">– Да, если поедем – тогда без вариантов. Ну, спокойной ночи.</p><p class="empty-line"/><p class="p1">В доме он затопил печь, открыл ненадолго окно – сухая бабочка упала на пол, сырая ночь вползла в комнату, – дым быстро вытянуло, и ровное тепло медленно пошло заполнять дом. Дров было порядочно, хотя и сырые; у входа стоял целый бумажный мешок.</p><p class="p1">Катька набрала домашний – мобильник почти не брал, пришлось долго искать на участке место, ничем не лучше и не открытее прочих, на котором ловился хоть самый прерывистый сигнал.</p><p class="p1">– Сережа! – кричала она. – Я заночую, электричек нет! Да, у наших! Из «Офиса»! Уложи Подушу, почитай ей!</p><p class="p1">Реплик мужа почти не было слышно. Кажется, он соглашался.</p><p class="p1">– Сереж, я еле слышу тут! Я буду завтра с утра! Первой электричкой поеду!</p><p class="p1">Сквозь шум донеслось что-то про ГУМ.</p><p class="p1">– Что там? – орала Катька.</p><p class="p1">– Раз-ми-ни-ровали, – проскандировал Сережа.</p><p class="p1">– О господи… Нашли кого-нибудь?</p><p class="p1">– Никого. Кавказцев высылают, – это было слышно отчетливо.</p><p class="p1">– Ну и черт с ними, они давно нарывались. Ладно, я с утра буду!</p><p class="p1">– Хорошо, – вяло сказал муж.</p><p class="p1">Катька вернулась в теплый дом. Улей и сад, повторяла она про себя, улей и сад. Вот он, сад, запущенный, но милый, усадебный. Вот я в освещенном деревянном доме среди черного нежилого пространства. Вот мужчина, которого я люблю, половина моей души. Все для счастья, даже катастрофа, без которой я счастья не мыслю. И если бы не выбирать пятерых счастливцев, которых мне надлежит спасти, я не ждала бы для себя ничего лучшего.</p><p class="p1">– Ну ладно, – сказал Игорь. – Ты почитай, я пойду там смажу кое-что. «Техники» полный шкаф, там фантастику печатали. Я через полчасика приду.</p><p class="p1">– Игорь, что там можно смазывать?</p><p class="p1">– То, что ты чуть не оторвала. Она же только с виду монолитная.</p><p class="p1">– А как ты в темноте?</p><p class="p1">– Милая, – сказал Игорь, высокомерно оборачиваясь в дверях, – я ее с завязанными глазами собрать-разобрать могу, как у вас в армии – автомат Калашникова. Ты имеешь дело со спецом третьей категории.</p><p class="p1">– А почему третьей?</p><p class="p1">– Потому что четвертая только у спасателей, – бросил он небрежно, взял фонарик и удалился в сарай, оставив Катьку в комнате.</p><p class="p1">Обстановки было мало – платяной шкаф, кровать, старая тумба с деревянной шкатулкой. Шкатулка вся потемнела, но на ней еще была различима инкрустация – виньетки, гибкие лилии, ранний модерн. Катька очень любила вещи этого времени, да и само время любила, хотя несколько стыдилась собственного дурновкусия: Тулуз-Лотрек, Бёрдслей… Для художника пристрастие к этому стилю было чем-то вроде дилетантской любви полуинтеллигентных девушек к Серебряному веку, о котором они понятия не имели. Серебряный век был прежде всего эпохой махровой пошлятины, и Бёрдслей был пошлятина, но тут уж Катька ничего не могла с собой поделать. В конце концов, куда большим моветоном было превозносить Филонова или утверждать, что нет никого выше Ван Гога, вот там живопись, а все остальное литература. На их курсе в Полиграфе были такие гении, пускатели пыли в глаза, – рисовали они, как правило, очень посредственно, но трудоустроились исправно, ибо умели себя подать. Катька понимала, что лазить в шкатулку нехорошо, – но ведь это, в конце концов, не Игоревы вещи и не его дача; будь тут что-то секретное, он бы вряд ли оставил ее наедине с ними. Она бережно сняла тяжелую шкатулку с тумбы, поставила ее на пол около печки, уселась рядом и открыла.</p><p class="p1">Там могло быть что угодно – пожелтевшие лайковые перчатки, засушенный цветок, рукописная, в красном кожаном переплете книга, дающая полную власть над миром, – но шкатулка вековой давности была битком набита письмами позднесоветских времен. Это были хорошо сохранившиеся, не слишком затрепанные – их явно перечитывали нечасто – письма семидесятых и восьмидесятых годов, с советскими марками, не наклеенными, а так прямо и напечатанными на конвертах: спутники, рабочий и колхозница, День космонавтики, почта СССР. Некоторые конверты были без марок, со штампиками, – письма из армии. Много писали из республик – у Николая Медникова и его родни было страшное количество друзей, и было даже одно письмо из Венгрии – его получил старший сын Медникова, учась в шестом классе, от девочки из Будапешта, из школы номер семь, девятнадцатой по списку в своем классном журнале: она писала в Москву, в седьмую школу, в шестой класс, девятнадцатому по списку, которым и оказался Медников. Ничего о своей жизни она сообщить не могла, кроме того, что хочет иметь друга по переписке. Удивительное дело, все социалистические люди хотели иметь друга по переписке. Они писали очень много писем, подробных и совершенно бессодержательных. Нынешние люди тоже все время обменивались информацией – посылали ничуть не более осмысленные эсэмэски, главным месседжем которых была сама способность послать эсэмэску, некая причастность к племени современных, мобильных людей, всегда досягаемых друг для друга, – но тут было нечто иное, и Катька не могла пока разобраться, в чем разница. Преобладали поздравления – люди семидесятых годов беспрерывно поздравляли друг друга, у них была для этого масса поводов – и Первое мая, и первое сентября; один родственник был инвалид – кажется, полиомиелитный, в письмах он не сообщал о своем уродстве, но писать ему было трудно, и он чертил линеечки. Эти поздравления, с линеечками, ничем по тексту не отличались: он всегда сообщал, что у него всё в норме (слово «нормально», чересчур длинное, было для него, наверное, трудным). Дружный хор Медниковых поздравлял друг друга, и в этом хоре пищал одинокий инвалид: поздравляю, желаю вам здоровье, счастье и чтобы все было, как вы себе сами желаете. Всё в норме! Еще один родственник, из Курска, все новогодние поздравления заканчивал фразой «А годы проходят – все лучшие годы!!», всегда с двумя восклицательными знаками; это был у него, должно быть, ритуал – написать эту фразу и пережить следующий год, – колдовство действовало до восемьдесят второго, и горько было видеть, как в каждой следующей открытке все больше дрожат буквы и все пышнее становятся росчерки, словно крича: худо, худо, все хуже! Катьке представился улыбающийся старик, его дрожащее лицо и дрожащий голос. Друзья из Киева Чурилины, у которых Медниковы ежегодно гостили на Седьмое ноября, излагали новости из жизни вовсе уже неведомых Люды, Оли, Гриши, Николая и Оксаны, – понять, в каких отношениях они находятся, было невозможно; правда, потом Оля с Николаем развелась и выпала из поля зрения киевских друзей, а Николай, погоревав, привел Клаву, хорошую женщину, хотя уже и с ребенком. Этот ребенок Саша пошел потом в армию и почему-то тоже прислал одну открытку из Томска, куда теплолюбивого украинца заслали во времена пресловутой экстратерриториальности – нельзя ведь было служить ближе чем за шестьсот километров от дома, не то сбежишь, да и вообще мысли будут не о службе. Странно, что Саша, едва знакомый с Медниковыми, решил им вдруг в восемьдесят шестом году написать. Вероятно, ему совсем не с кем было переписываться, а может, очень одиноко было в Томске, так что он цеплялся за любую связь с прошлой жизнью; письмо было датировано пятнадцатым апреля, почти за неделю до того, как катастрофа опять и надолго стала постоянным фоном жизни. Чернобыль Катька уже немного помнила, – мать объяснила ей, что в Киеве и вокруг него воздух отравлен и что это как бомба; помнится, Катька даже обустроила подкроватное убежище – на случай, если и в Брянске случится подобное. Брянск потом считался частью чернобыльской зоны, но трехголовые одуванчики не выросли, только отец с матерью накупили красного вина – говорят, необходимо, – но передумали и пить не стали, отложили до Нового года.</p><p class="p1">После Чернобыля Чурилины некоторое время не писали, опасаясь, видимо, доверять бумаге подробности бедствия; один раз только упомянули мельком про те самые мутанты-одуванчики, выросшие на киевских газонах. Переписка слабела, три года спустя затухала, и этому не было рационального объяснения: Медниковы еще не состарились, киевские Чурилины тоже, все были полны сил, дружило уже следующее поколение, но из страны словно выкачали воздух, и связи упразднились. Странным образом пропала среда, разносившая звук, – как будто существовать она могла, только настаиваясь до желейной вязкости в наглухо замкнутом пространстве. Медниковы, Чурилины, Шалтаи, Горяниновы, Сомоновы, Бухтины больше не были нужны друг другу, у них не было необходимости посылать друг другу сигналы – жив, здоров, поздравляю с Первым мая! И дело было не в том, что жизнь стала чудесной и безопасной, а стало быть, отпала и необходимость сигнализировать о своей живости-здоровости; она как раз стала непредсказуемой, холодной, опасной, и в ней Бухтиным уже не было дела до того, благополучны ли Шалтаи. Судя по переписке, тогда все время ездили друг к другу и ходили в гости; была тьма общих воспоминаний и ритуалов – именно тьма, Катька ясно видела эту уютную тьму с посверкивающими в ней маячками: вот Киев подмигнул, вот Красноярск откликнулся… Переписка была одним из бесчисленных сложных обычаев этой затхлой, устоявшейся и насквозь ритуализованной жизни: гостей полагалось принимать так-то и так-то, иметь то-то и то-то, на дачу выезжать в определенное время и в определенное же возвращаться в город, – ритуалами была пронизана жизнь в любой угасающей стране, соблюдение их становилось важнее смысла, и вместо связи, долженствовавшей соединять в монолит всех граждан небывалого общества, остались письма. Революция, как всегда, первым делом отменяла ритуалы, – новые до сих пор не наросли, и потому-то Катька всегда чувствовала свою жизнь немного безвоздушной, а себя саму – ходящей по очень тонкой пленке, под которой воет бездна.</p><p class="p1">Медниковы писали друг другу отовсюду – кроме, слава богу, тюрьмы, куда никто из них не попадал. С курорта от жены Медникова, выехавшей в Мисхор с сыном, следовали подробнейшие отчеты о погоде, температуре воды, ценах на фрукты (все было лучше, чем в прошлом году в Туапсе). Потом прибавились письма из Мисхора от квартирной хозяйки, с которой Медниковы подружились за время съема квартиры: тут ворвалась свежая струя, призрак духовного аристократизма, у мисхорской учительницы и почерк был прелестный, с наклоном, сдержанный, она была потомственной крымской преподавательницей, никуда с Южного берега не выезжала и пережила тут многое, многое – от заложников и расстрелов (которые смутно помнила, родившись в пятнадцатом году) до бессмысленного и пьяного хрущевского дарения. В ее письмах попадались сообщения о новой повести в «Октябре» или новом спектакле, показанном гастролерами в концертном исполнении. Теоретически, кстати, учительница может быть жива. Я взяла бы ее с собой, вероятно. О, как я хотела бы поговорить с такой учительницей, рассказать ей все, спросить у нее совета, – у меня не было таких учителей, наши учителя отбывали скучную повинность, ненавидели нас и все с нами связанное, и ни о ком из них я не храню благодарной памяти. Разве что англичанка, с нездешним запахом кисленьких свежих духов, широким английским румянцем на бледной английской коже, москвичка, приехавшая по распределению в нашу спецшколу за год до того, как отменили распределение, – но она была с нами недолго, и доброта ее была от равнодушия, а истинная ее жизнь заключалась в сложных и насыщенных отношениях с загадочным молодым человеком, встречавшим ее после уроков; она уехала, а он остался. Вот кто была действительно инопланетянка.</p><p class="p1">Как у поселянина есть бог весть откуда взявшийся неизбежный зачин «Во первых строках своего письма», так и у советского среднего класса были строго определенные формулы для курортной, праздничной, армейской и семейной переписки. «Доехали благополучно, устроились отлично». «Погоды стоят хорошие». «Надеемся, что то же и у вас». «Очень много работы». «Сам знаешь, годы здоровья не прибавляют, но потихонечку ползаем». Повторение их, видимо, в самом деле как-то гарантировало неизменность этой жизни, которая, в сущности, тоже происходила на довольно тонкой пленке; все уже столько раз отбиралось, перетасовывалось, менялось, перевозилось на север и на восток, что надо было держаться хоть за какое-то постоянство. К началу восьмидесятых оно наросло: у всех были дачи и дачные заботы, институтские хлопоты за детей, почти у всех – машины, Медниковы до восемьдесят пятого ездили на старой «победе». Поразительна была их привязанность к старым вещам, вот и письма они хранили – не для того же, чтобы перечитывать, но для того, вероятно, чтобы скопить как можно больше свидетельств быстро проходящей жизни. В сущности, и дача с каторжными и не особенно прибыльными трудами по прополке, вскапыванию и отводу вешних вод на участки соседей была нужна для того же. В жизни Чурилиных, Сомоновых и Шалтаев совсем не было метафизического измерения – точнее, оно подразумевалось; все их религиозные способности уходили на поддержание хрупкого уюта, заплетание бездны, и письма были частью культа. Вскоре бездну прорвало. Последние выкрики из хаоса касались дефицитов и подорожаний: Сомоновы лихорадочно выплывали в своем Ленинграде, и черные волны накрывали их; ветер доносил что-то о выборах.</p><p class="p1">У всех были хобби. Сомоновы путешествовали по стране, ходили в дальние походы – в нынешние времена они, конечно, весь год копили бы на экстремальный заграничный тур, облазили бы Тибет, проехали на джипе Сахару, но в семидесятые им приходилось ограничиваться собственной страной. Страна была, по счастью, большая, в ней было намешано всего, и у Катьки мелькнула кощунственная мысль, что железный занавес, в сущности, не так уж многого лишал аборигенов: не случайно они, выбравшись наконец в Италию, замечали, что Крым лучше. Тут была своя Западная Европа в виде Прибалтики (и русских там не любили точно так же, а то и больше, чем на подлинном Западе); было свое черноморское Средиземноморье, своя иркутская Скандинавия с вечными льдами, непроходящей депрессией и людоедскими героическими эпосами, герои которых, не имея под рукой полноценной природы и полновластно распоряжаясь только собственными телами, глухо зацикливались на физиологии и устраивали над собою разнообразные глумления; были пустыни, горы, субтропики, бешено плодящаяся Средняя Азия, неукротимые усатые племена Кавказа, похожие беспрестанной показухой и фальшиво-двойственным отношением к женственности на столь же неукротимые и фальшивые племена латиносов с их ежегодными военными переворотами, острой кухней и монотонной посредственной прозой. Советский Союз потому и выдерживал столь долгую изоляцию, немыслимую для маленькой страны, что вполне мог заменить собою весь мир и для большинства заменял; выехав единственный раз в Болгарию, Сомоновы были, правду сказать, разочарованы. Советский человек за границей потому и бегал в основном по шопам и базарам, что практически любой пейзаж и так был к его услугам. Николай Игорич Медников-старший охотился – от отца, военного летчика, он унаследовал страсть к оружию и мужественным, брутальным развлечениям, хотя бы и в выродившемся их варианте; военному летчику конца тридцатых в этом смысле дозволялось большее – инженер конца семидесятых довольствовался октябрьскими выездами на Оку, в специально отведенные места, в небольшой и небогатой компании. Специализировался он в основном на утках, и его любимая собака Гейда – сибирская лайка – замечательно «работала по ним», о чем он сообщал со скромной гордостью, всегда сопровождающей употребление профессионального жаргона (который, в сущности, только для того и придумывается). Наконец, Шалтаи увлекались комнатным цветоводством и со всей страной обменивались семенами – присылали и Медниковым то какую-то морозоустойчивую, специально выведенную ипомею, то бесконечный кабачок, от которого сколько ни отрезай, а он себе растет (при правильной, разумеется, подкормке – три части навоза, две торфа, одна суперфосфата).</p><p class="p1">Все высокие сообщающиеся стороны очень много болели. Здоровье было дополнительным метафизическим измерением, а забота о нем – еще одним способом подоткнуть одеяло, спасти хрупкий уют: жизнь врывалась-таки в существование, навязывала другие точки отсчета, кроме поездки в Болгарию, дачи и ремонта. Болезнь напоминала о чем-то, чего не должно быть. Лечились кто чем мог: Шалтаи от маточного кровотечения рекомендовали отвар растения, сухие листья которого вкладывали в письмо (отпечаток остался поверх строчек, манускрипт Войнича, широкие зубчатые листья и розовый оттиск цветка). Сомоновы пользовали мумиё. Бухтиных увлекала уринотерапия. Все письма были грамотные, со странными и тоже общими особенностями пунктуации: обязательные и ненужные обособления «однако», «тем не менее» и «тем временем» – вообще запятых было больше, чем надо, частая советская ошибка, свидетельство избыточности; лучше перекланяться, чем недокланяться.</p><p class="p1">Периодически у всех рождались дети и внуки. Иногда это сопровождалось нешуточными трагедиями – в семидесятые годы беременность незамужней дочери воспринималась как позор, об этом сообщали неохотно, хотя в письме Медниковых Шалтаям (сохранился черновик) сквозила гордость и чуть ли не вызов: Марина родила, так называемый отец тут же исчез, ничего, вырастим, тем более что аборт делать было нельзя по медицинским показаниям и сама она уперлась очень твердо, хотя всегда была девочка послушная. С другой стороны, ей все-таки двадцать семь. Мы не стали ей ничего объяснять, хватает ей теперь и собственной головной боли, мальчик крепкий, здоровенький, опасались врожденного порока сердца, но оказалось, просто небольшой шум. Как назвать – еще не решили, она почему-то хочет Сашей, но мы склоняемся к тому, чтобы в честь дедушки, Колиного папы. Этот дедушка как раз и был военный летчик и погиб еще до войны во время парада. Сам Коля Медников, владелец участка, повел себя благородно и на дочь Марину не серчал – в конце концов, не такой у нее возраст, чтобы быть очень уж разборчивой. Как назвали крепенького мальчика, Катька узнала из следующего письма: победил, понятное дело, дед Коля.</p><p class="p1">Всего ужасней было то, что иногда прорывалось в этой переписке и нечто живое – «Очень скучаю, особенно ближе к вечеру» в армейском письме Медникова-сына (только в казарме, в больнице да, может быть, в тюрьме может быть такая невыносимая, стонущая, одинокая тоска); или «Часто думаем про вас, дорогие мои, как вы там» в письме Медникова и его матери к его жене и сыну, уехавшим на курорт (в этом трогательном семействе сохраняли все письма – и те, что уходили в Мисхор, потом торжественно привозили домой, дабы объединить в общей хронике; наверняка ведь и фотоальбом вели!). Преобладало же ощущение невыносимой тщеты всего: жили Медниковы, болтались Шалтаи, ходили в Эрмитаж и на Дворцовую площадь Сомоновы, и от всей их жизни осталось только – вот. Предъявить было, в сущности, нечего. Как камешки, с трудом добытые с глубины, письма, вынутые из времени, ни о чем больше не сообщали, кроме того случайного, никому не интересного, что было в них написано. Стоило ли? Ничто ничего не стоило. Нынешний человек не писал и таких писем, разве что отправлял е-мелю по сугубо конкретному поводу, сопровождая ею попутно посылаемый финансовый документ или договариваясь о флешмобе. В семейственной переписке, которую просматривала Катька, лежа на быстро нагревшемся линолеуме перед печкой, информация играла десятую роль, все главное было за строчками, а теперь не было никакой возможности его оттуда извлечь.</p><p class="p1">У современного человека не возникало потребности поддержать хрупкий уют – уют треснул навеки, ничем надежным не сменившись; последние обитатели бывшей страны доживали, закутавшись на ледяном ветру в обрывки тогдашних лохмотьев, цепляясь за слова и воспоминания. Истина – то, о чем договорились, а теперь никто и ни о чем не мог договориться. Не было ни правды, ни основы, ни будущего, для которого тоже нужна какая-никакая общность; Катька сама не знала, хочет ли она в то время, но в нынешнем ей не оставалось ничего, кроме ожидания последней гибели. Впрочем, если все равно вставать по будильнику, что толку греться последние минуты под одеялом? Это она ненавидела сильнее всего.</p><p class="p1">Интересно, читал ли эвакуатор доставшийся ему эпистолярий? Странно, кстати, что хозяева не забрали шкатулку… а впрочем, это как раз естественно. Старик еле жив, а потомков этот хлам не интересует. Письма Сомоновых, Шалтаев и Бухтиных с неопровержимой ясностью свидетельствовали о том, что никто никого не спасет, что спасать, в сущности, незачем – а потому эвакуатору и не нужно особенно напрягаться; ужасно, наверное, знать, что все вокруг тебя обречены, – и единственным утешением остается ничтожество всякой жизни. При таких раскладах нечего особенно заморачиваться с выбором – спаси методом тыка того, кого сможешь.</p><p class="p1">Что-то его долго не было. Неохотно расставаясь с теплом, Катька вышла на веранду, но за окном была сплошная темнота. Сбежал, оставил ее тут… что за шутки?! Тут же она с облегчением услышала шаги на крыльце. Игорь вошел улыбаясь, неся какую-то длинную палку в брезентовом чехле; поставил ее рядом с дровяным мешком, долго запирал за собой дверь, стараясь ничего не запачкать: руки у него были в крови.</p><p class="p1">– Что с тобой?!</p><p class="p1">– Только без кудахтанья. Кудахтанье неуместно.</p><p class="p1">– Ты поранился?</p><p class="p1">– Кать, нормальные дела. Там одна штука залипла, еле отодрал.</p><p class="p1">– Какая штука?</p><p class="p1">– Слушай, полей на руки, а? Ковшик вон… Если я скажу «копулятор», это тебе что-нибудь объяснит?</p><p class="p1">Катька постепенно успокаивалась. Кажется, он был веселый и все у него получилось.</p><p class="p1">Он смыл кровь, и стали видны глубокие порезы на пальцах.</p><p class="p1">– Смотри ты, – уважительно сказала Катька. – Опасная штука?</p><p class="p1">– Да господи, его ребенок починит. Там только с ионизатором проблема, он неудобно стоит в этой модели. Заварил, и ладно.</p><p class="p1">– А что это ты принес?</p><p class="p1">– Наблюдательной Варваре нос оторвали.</p><p class="p1">– А серьезно?</p><p class="p1">Они вошли в теплую комнату. Игорь шагнул к печке и сразу увидел открытую шкатулку.</p><p class="p1">– О. Я гляжу, мы тут знакомимся с обстановкой…</p><p class="p1">– А нельзя? Ну извини, пожалуйста…</p><p class="p1">– Почему нельзя, у меня от тебя тайн нету. К тому же это все не мое.</p><p class="p1">– Ну объясни все-таки, что ты такое принес в дом?</p><p class="p1">– Ничего особенного. Стартер принес.</p><p class="p1">– А зачем?</p><p class="p1">– Я его хочу с утра немножко посмотреть, при свете. Деталь простая, но от него в конечном итоге все зависит. Надо почистить, топливо залить…</p><p class="p1">– А куда он вставляется?</p><p class="p1">– Спрашивающий подставляется. Лучше расскажи, как тебе все эти документы.</p><p class="p1">– Очень грустно, – честно сказала Катька.</p><p class="p1">– Да почему грустно? Счастливые были люди, студень варили, в гости ездили. Я прямо завидую.</p><p class="p1">– И кого бы из них ты взял?</p><p class="p1">– Никого. Чего их брать, у них все шоколадно.</p><p class="p1">– А Чернобыль?</p><p class="p1">– Оттуда и так всех сразу эвакуировали. Кстати, зря. По моим расчетам, все улетело в атмосферу в первые же часы и пролилось над Тихим океаном. Вокруг АЭС был фон, конечно, но не фатальный.</p><p class="p1">Он подбросил еще дров, выгреб золу и долго смотрел в огонь. Потом неожиданно сгреб в кучу все письма, скомкал их и зашвырнул в печку через верхнюю дверцу.</p><p class="p1">– Игорь! – ахнула Катька. – Ты что! Зачем?</p><p class="p1">– Да ну, дрянь всякую… Я считаю, ничего не должно оставаться.</p><p class="p1">– Это же не твое!</p><p class="p1">– Были бы нужны – забрали бы.</p><p class="p1">Две дюжины чужих жизней скорчились и вылетели в трубу.</p><p class="p1">– Нет, я все-таки не понимаю…</p><p class="p1">– Ну и зря. Все надо жечь. У нас никогда никаких документов не хранят.</p><p class="p1">– Почему?!</p><p class="p1">– А зачем? Что они тут создают иллюзию жизни? Жизнь в другом. Берегут друг друга, сохраняют письма, перевязывают ленточкой… Надо уметь прощаться, уметь все рвать. А жизнь всех этих Медниковых-Болтаев мне вообще отвратительна. Какое-то ползанье. Ничего не жалко. Здравствуйте, дорогие мои, пишу вам из Мисхора, погоды стоят хорошие. Вчера записался на процедуры, просил контрастный душ, но большая очередь, в результате согласился на стрельбы и подъем переворотом, но не сумел выполнить норматив и теперь буду с сержантом тренироваться по утрам. В последнее время спина болит меньше, но плохо двигается левая рука и трудно дышать по ночам, советовали растираться желтком яйца с сахаром, потом добавить три капли коньяка, стакан муки и щепоть корицы и запекать до появления хрустящей корочки. У меня все хорошо, помидоры стоят рубль кило, в прошлом году были восемьдесят коп., но говорят, что теперь просто нет урожая, потому что Люда вышла замуж за своего институтского товарища Петю, приводила к нам, очень милый мальчик, хотя немного заносчивый и, кажется, увлекается очень музыкой. Больше мне не пишите, потому что в живых все равно не застанете, а те бусы, которые ты, Маша, взяла у меня, когда в прошлый раз гостила, а сказала на домработницу, пожалуйста, носи, если они тебе нравятся. Ваш муж и отец. Ненавижу родственные связи. Вечно быть обязанным чужому, в сущности, человеку, с которым тебя связывает только кровь… Если это жизнь, то я землянин.</p><p class="p1">– Значит, ты землянин, – сказала Катька. – Я всегда догадывалась.</p><p class="p1">– С кем поведешься, мать, с кем поведешься… Я до сих пор боюсь, что это заразно.</p><p class="p1">Помолчали.</p><p class="p1">– Игорь! А не может так быть, что вы отбираете… ну, типичных представителей? Для научных нужд?</p><p class="p1">– Типичных представителей не бывает, – назидательно сказал он, глядя в огонь. – Никаких нет средних значений, и все, что в вас есть типичного, – наносное. Там сразу слетает, так что изучать надо здесь. В среде. Вот эти письма – среды нет, и кто поймет, про что там написано? А ведь они друг друга любили или не любили. Одни другим старались показать, как надо правильно жить. Другие осторожно спорили насчет советской власти. Это все как-то там рассыпано, но сейчас не читается.</p><p class="p1">– Да, я заметила.</p><p class="p1">– Ну и с вами так же. Это же все адаптивные вещи – все, что здесь определяет среднего человека. То, как он устроен, то, что он ест… Там все слетает, и вылезает настоящее. Все ваши разделения очень условны, почему у вас и нет нормального развития. У вас нет никакого критерия для хорошего или плохого человека. От убеждений это не зависит. От положения тоже. Скажу тебе страшную вещь, но ведь злых и добрых тоже не бывает. Совершенно дутое разделение.</p><p class="p1">– Как – не бывает?</p><p class="p1">– Обыкновенно как… В одних условиях делаешь добро, в других зло. Одному человеку сделаешь все, а другому ничего. Добро – вообще выдуманное слово, у нас его нет в языке.</p><p class="p1">– А какое есть?</p><p class="p1">– Ну, много. У нас богатый словарь. Некоторые даже пишут, слишком богатый. Говорят, что избыточность – признак упадка. Но я не думаю. Мне кажется, чем сложней, тем богаче.</p><p class="p1">– И как у вас называется добро?</p><p class="p1">– Мы не говорим «добро», мы говорим «благо». Ыгын. Очень четкий язык, математически простроенный. Некоторые даже говорят, что его мог дать только Бог – сам он не мог в такой четкости сложиться.</p><p class="p1">– А зло?</p><p class="p1">– И зла нет. Что такое зло, скажи на милость? Есть грех последовательного и сознательного мучительства ближних, вызов Богу – урджун, свойство очень редких персонажей, которых я вижу за торгон, то есть за версту по-вашему. Есть трусость, которая, в сущности, ограниченность ума.</p><p class="p1">– Почему? Бывает физическая трусость. Страх, допустим, грозы.</p><p class="p1">– А-а, – он махнул рукой. – Это все физиология. Слушай, ты есть не хочешь? У меня бутерброды.</p><p class="p1">– Нет, почему-то нет. Это все твоя трава. Как ее?</p><p class="p1">– Крын-тыкыс, по-вашему покой-трава. Давай спать, наверное. Завтра рано вставать.</p><p class="p1">– Нет, давай целоваться. Мы никогда не целовались в усадьбе, вот так, совсем без никого. Давай ты будешь граф, а я буду простушка.</p><p class="p1">– Нет уж, – сказал он устало. – Игры кончились. Давай ты будешь Катька, я буду Игорь, и у нас есть неделя. Плюс вся остальная жизнь.</p><p class="p1">– Ну давай, ну пожалуйста! Все остальное потом, а сейчас целоваться. Я так тобой горжусь, ты такой у меня умница. Ионизатор починил. Копулятор. Сделал ему ыгын.</p><p class="p1">О, как она любила его, как увивалась, оплеталась вокруг него, как умоляла всю троицу – Кракатука, Аделаиду и Тылынгуна, чтобы он сказал ей: да ладно, на этот раз обойдется, давай останемся здесь все вместе. Но он был уже не с ней, не только с ней. Он уже чинил свою лейку, прикидывал вес, соображал, как и кого забрать. Только среди ночи она кое-как его растопила, он стал отзываться на все, как обычно, и был уже только с ней; скоро она заснула – и проснулась, как от толчка, в самое поганое ночное время, к пяти утра.</p><p class="p1">Игорь спал, повернувшись к Катьке спиной; он любил спиной чувствовать ее тепло. Печь прогорела, он успел ее закрыть перед тем, как лечь. Уже ползал вдоль стен, где-то снаружи, первый призрак утреннего заморозка. За хрупкими стенами медниковского дома шла почти ощутимая, страшная работа по превращению реальности в нежилую. Здесь это чувствовалось острее, чем в Москве.</p><p class="p1">Было ясно, что на дом опустился морок, чтобы никто не почувствовал перемены. Катька случайно подглядела происходящее, и теперь ей не было спасения – ее заметили. Игорь дышал чуть слышно, непонятно было, спит он или без сознания. Могли с ним сделать что угодно.</p><p class="p1">– Игорь, – она толкнула его локтем. – Проснись, пожалуйста. Мне страшно.</p><p class="p1">– Пришли и сказали – дитя, мне страшно! – пришли и сказали, что он уходит, – отозвался Игорь неожиданно бодрым голосом, словно и не спал. – Взяла я лампу – дитя, мне страшно! – взяла я лампу и пошла к нему. У первой двери – дитя, мне страшно! – у первой двери пламя замигало. У второй двери – дитя, мне страшно! – у второй двери пламя заговорило. У третьей двери – дитя, мне страшно! – у третьей двери пламя умерло. А если он возвратится, что мне ему сказать? Скажи, что я и до смерти его продолжала ждать.</p><p class="p1">– Ой. Ну вот, теперь мне совсем страшно. Что это такое?</p><p class="p1">– Это наша песня, в моем вольном переводе. Старая, народная.</p><p class="p1">– Господи! А о чем пламя заговорило?</p><p class="p1">– Никто не знает. Ну, там рыцарская такая сказка, страшная. Из нашего фольклора. Про мертвого жениха. Он к ней приезжал, а потом всегда уходил, и она никогда не могла его уговорить, чтобы он остался на день. Всегда исчезал на рассвете. А она засыпала и пропускала момент, когда он уходит. Тогда она подговорила служанку разбудить ее, когда он будет седлать коня. Ее разбудили, пришли и сказали, что он уходит. Дитя, мне страшно. Однако взяла она лампу и пошла к нему. Дальше пламя проделало все эти штуки, а он все равно вскочил на огромного черного коня и ускакал. И она поняла, что он мертвый.</p><p class="p1">– И он больше не вернулся?</p><p class="p1">– He-а, никогда.</p><p class="p1">– А ты живой?</p><p class="p1">– Дитя, мне стра-ашно! – сказал Игорь загробным голосом.</p><p class="p1">– Тьфу! Не шути так. – Катька прижалась к нему.</p><p class="p1">– Ты чего не спишь? Завтра вставать рано.</p><p class="p1">– Уже сегодня. Не могу спать. Я вообще в чужих местах плохо сплю.</p><p class="p1">– Оно не чужое. Оно мое.</p><p class="p1">– Знаешь, вот это тоже твое, – она погладила и слегка сжала кое-что, – но относительно меня все-таки чужое. Понял разницу?</p><p class="p1">– Понял. И что, Альфа никогда не станет тебе домом?</p><p class="p1">– Посмотрим. Я никогда не была на Альфе. Москва же мне стала домом в конце концов, хотя я и любила Брянск, а здесь мне было ужас как противно первое время… Если ты будешь очень крепко меня любить, все мне объяснять и показывать, я приживусь и на Альфе. Почитай мне еще какие-нибудь местные стихи.</p><p class="p1">– Сейчас, – сказал Игорь. – Это можно. У нас, знаешь, даже курс был специальный – стихи для запоминания, чтобы меньше тосковать по родине. Ну вот, например. Среди пыли, в рассохшемся доме, одинокий хозяин живет. Раздраженно скрипят половицы, а одна половица поет. Гром ударит ли с темного неба, или юркая мышь прошмыгнет – раздраженно скрипят половицы, а одна половица поет. Но когда молодую подругу нес в руках через самую тьму – он прошел по одной половице, и весь путь она пела ему.</p><p class="p1">– Слушай, как волшебно. У вас очень странные стихи. Это ты сам?</p><p class="p1">– Нет, я только перевел.</p><p class="p1">– Ой, а прочти в оригинале!</p><p class="p1">– Вот еще. У нас стихи без музыки не исполняют. Там столько тонов, интонаций… Очень трудно переводить.</p><p class="p1">– Ну, давай хоть по-русски.</p><p class="p1">– Спи, Мария, спи. Воздух над тобой до высот небесных полон тишиной. Дерево в ночи – изваянье дыма. Спи, Мария, спи. Пробужденья нет. А когда потом мы с тобой проснемся – разбегутся листья по тугой воде.</p><p class="p1">– Господи, как странно. И какая тоска. Она умерла, да?</p><p class="p1">– Почему, не обязательно. Я думаю, она впала в какой-то особенный сон, а потом очнется. Только это будет не там, а где-то в другом мире.</p><p class="p1">– А как по-вашему Мария?</p><p class="p1">– Так и будет. Это наше имя. Очень древнее. Большинство ваших имен, собственно, наши, только потом на разных континентах появились разные произношения.</p><p class="p1">– Погоди. А ссыльные из вашего рая – это только русские или все вообще?</p><p class="p1">– Да конечно все. Просто их заселили в одно место, а потом они расплодились постепенно.</p><p class="p1">– И где это место? В Африке?</p><p class="p1">– Типа того. У нас разные источники по-разному говорят.</p><p class="p1">– Ну, еще почитай.</p><p class="p1">Он перевернулся на другой бок, лицом к ней.</p><p class="p1">– Над родиной качаются весенние звезды, реки взрываются, любимая моя. Грачи ремонтируют черные гнезда, и мы еще живы, любимая моя. И мы еще живы, и мы еще молоды, берут меня в солдаты, любимая моя, и если ты не сдохнешь от голода и холода, мы еще увидимся, любимая моя. К далекой границе меня посылают, но мы еще посмотрим, любимая моя, и если полковник меня не расстреляет – мы еще увидимся, любимая моя.</p><p class="p1">– Ну нет, это явно земное.</p><p class="p1">– Вот и нет, – сказал он. – У нас тоже воевали, только давно. Эта песня – очень древняя, одна из самых. Записана в Черных Горах, это у нас воинственное место. Там такое племя жило – вроде ваших чеченцев. Замирилось последним, до сих пор воинственные традиции целы. Я тебя свожу.</p><p class="p1">– А на чем у вас передвигаются?</p><p class="p1">– Да на чем хочешь. На выртылетах по большей части. У них очень красивые песни, в горах. Удивительно даже – воюют все время, находят в этом радость, а песни ужасно тоскливые. Я иногда думаю – надо будет работу об этом написать, когда вернусь, – что они специально и воюют, ради песен. Потому что иначе не о чем будет писать такое грустное. Воевать не хочется, а без этого невозможно так тягуче грустить. Ну это как мафия – она ужасно любит вдов и сирот и поэтому все время увеличивает их количество, чтобы было кого облагодетельствовать.</p><p class="p1">– Точно. И что они поют?</p><p class="p1">– «Мать уронит свой кувшин, свой кувшин, свой кувшин. И промолвит – ах, мой сын, ах, мой сын, ах, мой сын». Это когда ей скажут, что его убили.</p><p class="p1">– Да, да, я поняла. Но скажи: давно вы сюда летаете?</p><p class="p1">– Почти с самого начала. Как стало ясно, что от каторжников могут рождаться приличные люди, так сразу и начали.</p><p class="p1">– Почему же вы их всех не забираете?</p><p class="p1">– Потому, – терпеливо объяснил он, – что эвакуаторы забирают людей только во время больших катаклизмов. Если просто из повседневной жизни забирать всех хороших, тут жить станет невозможно, правда же? Мы даже не всех хороших забираем. Только тех, для кого катаклизм стопроцентно смертелен.</p><p class="p1">– То есть для меня он… да?</p><p class="p1">– Ну нет, – смутился он, – с тобой иначе. С тобой личный выбор.</p><p class="p1">– Чей? Твой?</p><p class="p1">– Ага. Но вообще-то… – Он почесал нос. – Вообще, если честно, ты действительно не выдержишь, по всей вероятности.</p><p class="p1">– Чего не выдержу?</p><p class="p1">– Всего. Если и выживешь, это уже будешь не совсем ты. Так что эвакуатор зря не влюбится. С такой чуткостью здесь обычно не родятся, а в самые дурные времена просто не выживают. Человек настолько все понимает, что просто дохнет сам, и все.</p><p class="p1">– И откуда я такая? Может, вы кого-то по ошибке сослали?</p><p class="p1">– Может быть, – вздохнул он. – Всякое правосудие несовершенно. Хотя, вообще-то, это редко, почти никогда. Преступники знаешь какие чуткие бывают? Карманники в особенности…</p><p class="p1">– Да, упустила я свое счастье. Не та карьера.</p><p class="p1">– Из меня бы тоже получился бандит, – заверил он. – Если меня так тянуло на Землю, это неспроста же, верно?</p><p class="p1">– А когда мы поселимся у вас, ты будешь часто улетать?</p><p class="p1">– Никогда в жизни. Я же тебе сказал, женатый эвакуатор – потеря квалификации.</p><p class="p1">– Мне кажется, ты все равно будешь куда-то деваться. Не тот ты человек, чтобы оседло жить. А я буду скучать одна, без профессии.</p><p class="p1">– Почему без профессии? Рисовать будешь. Ты очень прилично рисуешь, кстати. У нас графические редакторы немножко другие, но освоишься.</p><p class="p1">– А что, журнал «Офис» у вас тоже есть?</p><p class="p1">– Нет, Кракатук миловал. А ты не мыслишь жизни без журнала «Офис»?</p><p class="p1">– Что ты, что ты. Нам, татарам, совершенно без разницы. Лишь бы не даром барласкун есть.</p><p class="p1">– Это можешь быть уверена. У нас лишних нет. Может, мы еще немножко поспим, а?</p><p class="p1">– Ну погоди, Игорь, – заныла она. – Мне уже почти спокойно. Поговори еще, что ли. Я уже почти поверила, что мне там будет хорошо.</p><p class="p1">– Обязательно, – сказал он. – Тебя и учить нечему, ты со мной два месяца, привыкла, наверное.</p><p class="p1">– Что да, то да. Я только боюсь, что ты там будешь другой.</p><p class="p1">– Самую малость. Для тебя всегда буду, какой захочешь. Какой скажешь, такой и буду. У нас же там это запросто. Люди любую форму принимают, нас учат специально. Почти все умеют, и ты научишься.</p><p class="p1">– Ой! Прими, пожалуйста, какую-нибудь форму!</p><p class="p1">– Шиш. Я и так сейчас в форме землянина. Знаешь, сколько мне потом обратно превращаться? – Он взглянул на свои светящиеся часы, которые с вечера положил на мраморную полку желтого торшера. – Месяц, не меньше, пока совсем трансформируюсь. В земных условиях очень трудно. Ничего, я тебе там покажу. Я столько трансформаций умею – ты удивишься! Вплоть до страуса. Только у нас называется иначе.</p><p class="p1">– Стрыус?</p><p class="p1">– Ырфлан, – надменно пояснил Игорь. – Все, все тебе там покажу. А теперь давай спать, пожалуйста, а?</p><p class="p1">– Давай, давай. Я пока сказку придумаю, а утром тебе расскажу.</p><p class="p1">– Да, – сказал он сквозь зевок, – это чудесно, ужасно чудесно. Только помни, что это уже не сказка.</p><p class="p1">– Я помню, – сказала Катька.</p></span></span>
