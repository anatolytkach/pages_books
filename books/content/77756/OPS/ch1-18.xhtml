<span><span><p class="p1">– Выживут они нас с тобой отсюда очень скоро, сама увидишь. Меня – за то, что я их увез, а тебя – за то, что ты все это устроила. Сергеевна, между прочим, убеждена, что и Москва из-за нас взорвалась. Ей небось кажется, что это я все устроил, чтобы вас сюда эвакуировать как бесплатную рабсилу.</p><p class="p1">– Слушай, что ты обращаешь внимание на Сергеевну? Она больная на всю голову!</p><p class="p1">– А полковник, между прочим, все сделает для своей кисы. Киса скажет – давай выгоним Игоря! И полковник не посмотрит, что мы с одной планеты. Он на Земле знаешь сколько торчал? Заземлился по самое не могу. У нас и термин был такой, заземление, – эвакуатора старались пораньше отзывать, чтобы не очень проникся вашими гадостями. Но этот во вкус вошел, ни в какую. Не могу, говорит, покинуть горячую точку! Двадцать с лишним лет землился, два раза только в отпуск слетал. Вообще ракету водить разучился, копулятор сломал при посадке, чуть не угробил всех…</p><p class="p1">Катька молчала. В том, что он говорил, был резон. Ей совершенно не хотелось видеть остальных, и даже америкосы Пол и Стефани были невыносимы со своими ежевечерними проповедями, чтением вслух и какой-то особенной, почти вызывающей некрасотой: непонятно было, что делают вместе такие некрасивые люди. Они словно предъявляли друг друга Господу – видишь, Господи, с кем приходится иметь дело ради совместной работы во имя твое! И отношения у них были демонстративные – подчеркнутая взаимная внимательность: идеал семьи, живой пример, каков и должен быть истинный евангелист, – чтобы случайные свидетели позавидовали и обратились! Дети у них были милые, но пустые, в глубине души ничуть не привязанные к родителям (сама-то ты хороша, одернула себя Катька). С Тылыком они ладили, а Игоря почему-то недолюбливали: вероятно, уже знали историю разрушения семьи.</p><p class="p1">Что касается Любови Сергеевны, то она уже никого не стеснялась и за общими трапезами кидала на Катьку такие взгляды, что девушка с менее крепкими нервами давно обратилась бы в горстку праха. В этой антипатии теперь уже не было никакой логики – нашему сыну предпочли другого человека, обидно, но мы ведь с самого начала не желали, чтобы наш сын связывал судьбу с пробивной провинциалкой; теперь провинциалка избавила нашего сына от своего общества… но зато втравила в такое сомнительное предприятие! Любовь Сергеевна совершенно не брала в расчет того печального факта, что без Игоря наш муж вообще бы, скорее всего, погиб; ее не останавливало и то, что сама она влюбилась в эвакуатора! Нам можно, а вы не смейте; нормальный дворовый закон. И что самое удивительное – точно так же посматривали на Игоря и чеченка, и ветеринар, и дантист: было в нем что-то слишком инопланетное. Ни Тылык, ни Велехов не вызывали у землян таких чувств. Видимо, это были заземленные эвакуаторы первого типа. А этот был второго, эвакуатор из любви к родине, – здесь, на руинах родины, ему именно этого и не прощали.</p><p class="p1">Все закончилось неожиданно и гораздо быстрей, чем сама Катька могла предположить. Прошла неделя, полная безотчетной и необъяснимо копившейся ненависти к ним, после чего плотину внезапно прорвало. Это случилось на дне рождения Стефани, праздновавшемся семнадцатого ноября – даром что на Альфе весна была в разгаре, все жили по земному календарю.</p><p class="p1">Предыдущую неделю Игорь по обыкновению работал с утра до вечера – то есть путался под ногами у остальных и навязывал им свою помощь. Он всем брался рассказывать про планету, про то, что тут было раньше и как надо устроить теперь, – но никто этих советов не слушал, потому что альфовские технологии были исключительно сложны и прихотливы, а земные способы оказывались проще и надежней. Вместо того чтобы соединять две новонайденные детали изощренным и почти ритуальным способом – долго нагревать, потом проглаживать специальным утюжком, потом охлаждать, сгибать и полчаса держать в воде, отчего образовывался тончайший, еле различимый волосяной шов, наш муж грубо сколачивал их гвоздем, причем по одной детали от гвоздя немедленно начинала змеиться молниевидная трещина, точь-в-точь плеть плюща. Игорь вообще умел договариваться с альфовскими вещами – почти как бабушка со своим домом и огородом, где ей довольно было пошептать – и картошка с редиской урождались лучше, чем у Катьки после всех ее усилий. Игорь подбирал две, казалось бы, непреодолимо разные штуки – зеленый переливающийся кристалл с обломанным краем и гнутое, витое застывшее волокно, похожее на деревянное лекало, что-то долго над ними колдовал, приговаривал, нежил и разогревал их пальцами, прибавлял вдруг красноватую острую железку – и из трех разнородных предметов образовывалась пленительно изящная конструкция, которая – сразу ясно – могла быть только такой, никакой иной, но она в свою очередь была деталью системы куда более сложной, которая не существовала больше, а потому полчаса с ней мучиться было совершенно бессмысленно. Наш муж взял бы два деревянных лекала, вогнал их длинными концами в стену, высверлив предварительно дырки, сверху положил бы длинную сухую ветку, и получился бы типа карниз для штор. Игорь порывался объяснить, что вот это была машина для показа оптических иллюзий, в десятки раз отчетливей и наглядней голографических, – но дядя Боря дунул, плюнул, что-то подвернул, и получилась удобная тележка для перевозки тяжестей, которую с прежней установкой объединял только дистанционный способ управления: нажал кнопку – пошла, нажал другую – встала. Единственное, она медленно ехала, но по крайней мере был толк.</p><p class="p1">Дядя Боря вообще вел себя как аэлитский Гусев на Марсе – с той разницей, что Гусева инопланетные сложности умиляли и развлекали, а дядю Борю скоро стали раздражать, да вдобавок его начала всерьез мучить ностальгия. Шестым чувством – начисто отсутствовавшим, скажем, у Пола и Стефани – он понимал, что здесь все-таки совершенно другой мир, даром что приемлемый воздух и неотличимо земные пейзажи; вероятно, он хоть сколько-то понимал язык техники, а техника эта своим языком говорила ему, что нечего сюда соваться со своим земным рылом. Пейзажи об этом умалчивали, а потому америкосы с приемным выводком прогуливались по окрестностям и неутомимо ботанизировали, в то время как дядя Боря все более угрюмо преобразовывал хитрые и явно злокозненные альфовские предметы в земные: распрямлял согнутое, заколачивал неподатливое, соединял несоединимое. Игорю было больно на это смотреть. В отличие от других дядя Боря к концу второй недели совершенно отчетливо понимал, что его заманили в принципиально иную вселенную, нарочно устроенную так, чтобы именно русскому человеку довелось острее всего ощутить в ней свою неполноценность. Собственно, и на Земле все складывалось так, что русский человек был самый бедный, но чтобы этот закон действовал и на Альфе! – здесь было уже свинство поистине космического масштаба. Поделиться этой тоской можно было только с Сереженькой, которого тоже обули мерзкие иноплеменники. Странным образом тоска от столкновения с чужим выражалась у дяди Бори в ненависти к своему – в точности как ужас от взрывов превращался у московской власти в страстное преследование подвернувшихся россиян, – и дядя Боря все чаще покрикивал на окружающих, а метаморфов пинать побаивался. Да и что толку было пинать метаморфов? Они были как кисель и ничего не чувствовали.</p><p class="p1">Иногда, впрочем, на дядю Борю нападал оптимизм. Обычно это случалось, когда какая-нибудь особенно упрямая вещь начинала-таки служить его целям, то есть обнаруживала чисто земное предназначение. Например, Стефани он подарил вполне приличное ружье, хотя и бьющее на малые расстояния. Оно годилось пугать метаморфов, если обнаглеют и полезут ласкаться, или сшибать с веток вкусные лиловые плоды, похожие на наши яблоки, но со вкусом клубники. Игорь шутки ради сказал, что от них можно забеременеть. Правда, сбивать их было бессмысленно – если пулька попадала в них, они разлетались, а когда падали на землю, расшлепывались в кляксы. Фрукт был нежный. Подуша для эксперимента накормила им зверьков, но никто из них не забеременел. Тогда она сама съела фрукт и полюбила его на всю жизнь. Если его как следует попросить, он падал сам – прямо в руки, не разбиваясь; этому Подушу научил Лынгун, но по-земному он так и не заговорил. Она его понимала без слов, а дядя Боря не понимал и поэтому придумал свой прибор. Впрочем, прибор годился на многое, и если его усовершенствовать – в перспективе могло получиться вполне приличное оружие. Обороняться, мало ли.</p><p class="p1">Этого Игорь и не стерпел. Когда дядя Боря, выпив правильно заброженного и чуть хмельного барласкуна, достал подарок и торжественно вручил его Стефани, Игорь вскочил, чуть не опрокинув импровизированный длинный стол (сколоченный дядей Борей и Сереженькой из остатков фотонного мелиоратора), и потребовал отдать ружье ему.</p><p class="p1">– Ты чего, Игорек? – невинно удивился дядя Боря.</p><p class="p1">– Отдайте, пожалуйста, – повторил Игорь.</p><p class="p1">– То ж подарок! – воскликнул дядя Боря. – Подарков не передаривают, Игорь!</p><p class="p1">– Не волнуйтесь, – вступила Любовь Сергеевна. – Это же совершенно безопасно!</p><p class="p1">– Дело не в том, опасно или безопасно. Дело в принципе. На этой планете оружие запрещено.</p><p class="p1">Тылык переводил Полу и Стефани, они сдержанно кивали.</p><p class="p1">– Но позвольте, – сказал Пол, дослушав перевод. – У нас, например, разрешение на оружие вполне можно было получить, при условии психической адекватности… Мне кажется, что вы сейчас пытаетесь ограничить права Стефани. Ведь она не предполагает наносить вред живым существам… В конце концов, это <em>podarok</em>! Не исключено, кроме того, нападение агрессора, и мы должны встретить его во всеоружии.</p><p class="p1">– Нам все равно придется думать об армии, капитан, – веско заметил Велехов. – Я давно об этом говорил, писал докладные… Никто не хотел слушать, вы же помните. В результате мы оказались совершенно беззащитны перед нападением. Бежали как зайцы неизвестно куда. Я предпринимаю усилия, чтобы запеленговать наше новое местожительство, но пока тщетно. Они прячутся даже от своих. Есть шанс, что мы никогда больше их не увидим.</p><p class="p1">Игорь сел, потом встал снова. Катька еще никогда не видела его в таком смятении – даже в первые минуты на Альфе.</p><p class="p1">– Я хочу только сказать, что мы не имеем права… нарушать закон планеты, на которой живем.</p><p class="p1">– Да чего не имеем-то! – воскликнула тетка-портниха Колпашева, которая в силу особенностей русской жизни начала XXI века одинаково уместно выглядела бы и на великосветском рауте, и в торговом ряду. – Чего не имеем, когда ничего уже не имеем! Нас тут ждали, можно подумать! Нас, можно подумать, прилично приняли! Сами позвали на свою планету и сами ничего не обеспечили, вообще! И будут еще учить!</p><p class="p1">– А ты помалкивай, – строго сказала ей бабушка. – Наела мясов – и трясешь.</p><p class="p1">– Что я наела, то никого не касается, – ответила портниха. – Вы мне рот не можете затыкать. Вам надо о душе думать, а вы рот затыкаете еще.</p><p class="p1">Катька сжала кулаки.</p><p class="p1">– Мы, к сожалению, действительно не сумели обеспечить вам встречу, – медленно сказал Игорь. – Но обеспечить соблюдение законов мы пока еще можем. Я очень прошу вас… нас всех… не портить друг другу наш первый праздник.</p><p class="p1">Тылык переводил, Стефани кивала.</p><p class="p1">– Да чего праздник! – воскликнула портниха. – Какой праздник, когда тут все привести в порядок – надо лет десять впахивать, как после войны! Я все понимаю, конечно, на Земле, может, мы вообще бы уже не были живы, но просто не надо устанавливать свои законы! Не мочь быть так! – От волнения она заговорила по-инопланетному.</p><p class="p1">– Игорь, – мягко сказал ветеринар. – Я хорошо понимаю ваши чувства. Мне кажется, вы просто должны осознать, что это уже не ваша планета.</p><p class="p1">– Я догадался, – сказал Игорь.</p><p class="p1">– Догадаться мало, – мягко сказал ветеринар. – Надо осознать.</p><p class="p1">– Вы напрасно тратите слова, – вступила Любовь Сергеевна. – Есть люди, для которых совесть – вообще пустой звук, абсолютно! Вы тоже, Андрей Петрович, давно уже могли бы понять, что эти колонизаторы ворвались к нам, сами все устроили, а потом отправили нас сюда как бесплатную рабсилу! Это воюющая цивилизация, они постоянно воюют, и теперь нас прислали сюда разгребать, а сами улетели домой! Совершенно же понятно, что их настоящая планета там, а здесь они что-то захватили и нашими руками таскают каштаны из огня! Причем обратите внимание, что они лишают нас возможности защищаться. Мы порабощены полностью!</p><p class="p1">Любовь Сергеевна обладала фантастической способностью выстраивать и убедительно обосновывать худшую версию чужого поведения.</p><p class="p1">– Простите меня, – тихо сказал Игорь. – Мне не следовало эвакуировать вас. Правда, я вас и не эвакуировал…</p><p class="p1">– Кис, это ты хватила, – неуверенно сказал полковник. – Мы все-таки…</p><p class="p1">– Я не о тебе говорю, Володя, ты пешка! Прости, но ты пешка! Я давно поняла, кто тут главный. Кто тут ходит и пытается устанавливать свои законы. И кто пособник, я тоже давно поняла. Не думайте, пожалуйста, что если вы спелись, то мы в свое время не будем вас судить за предательство. Будет время, и вы ответите за свое предательство. Вы по земным законам ответите и по небесным.</p><p class="p1">Она смотрела на Катьку в упор. Глаза ее метали молнии.</p><p class="p1">– А вот мы сейчас спросим, – сказал дядя Боря и встал со своего места. – Мы молчали, но мы спросим. Мы спросим сейчас, как оно все было и как сговорились.</p><p class="p1">Он решительно направился к Игорю, но замер на месте как вкопанный.</p><p class="p1">– Система дубль пятнадцать, – одними губами сказал Игорь. – Не бойся, Катя, это я умею.</p><p class="p1">– А я не понимаю, Сережа, почему ты молчишь! – воскликнула Любовь Сергеевна. – Я понимаю, что, может быть, твое мужское самолюбие…</p><p class="p1">– Да что мужское самолюбие, – тихо сказал наш Сереженька, как он это умел. Таким образом он обычно разгонялся перед тем, как заорать. – Что же, я давно понимаю. Я простой человек, а она художник. Мне каждый день давали это понять. Что вот у нас творческие запросы, а ты давай как знаешь. Нам не привыкать, мы свое место понимаем. Нам надо плевать на свои, может быть, творческие запросы, которые мы тоже имеем, и обеспечивать творческий труд высшего существа. – Голос его уже набухал слезами; с барласкуна, оказывается, тоже можно было как следует запьянеть. – Да, я понимаю, ты выше меня… ты лучше меня… но зачем было все пять лет самоутверждаться на мне?! Ты думаешь, я не видел… не понимаю ничего?! Ты знаешь, сколько у меня было всего за эти пять лет?! Я мог, я должен был… она была чистая, удивительная… я должен был уйти! Но как же я мог! Художница, высшее существо… дочь… семья… И вот теперь я здесь, и на моих глазах!</p><p class="p1">– А вот мы сейчас спросим кое с кого, – грозно повторил дядя Боря.</p><p class="p1">Повисла гнетущая пауза. Дядя Боря мучительно боролся с системой дубль пятнадцать. Неожиданно раздался резкий, отрывистый смех Майнат.</p><p class="p1">– Русские свиньи! – закричала она. – И здесь передрались! Сейчас совсем друг друга поубивают! Давайте, давайте! Русские свиньи!</p><p class="p1">– Хенде хох! – неожиданно вскрикнула Стефани на чистейшем немецком, подняла свое ружье и стала переводить его с Игоря на Майнат и обратно. – Вы все тут быть заговор, но мы сейчас будем выводить чистая вода! Мы будем сейчас здесь тут шнель шнель стройть айне кляйне арбайтен новый мировой порядок!</p><p class="p1">– Мы будем сейчас немножко спрашивать, – повторял дядя Боря.</p><p class="p1">Так осуществилась наконец антитеррористическая коалиция, для успешного функционирования которой оказалось достаточно всего лишь перелететь на Альфу Козерога.</p><p class="empty-line"/><p class="p1">– <em>Следует, однако, отметить, что и на Альфе Козерога усилия коалиции обратились прежде всего не на то, чтобы нейтрализовать чеченку Майнат, а на то, чтобы подверг-нуть остракизму одну малозначительную художницу и одного ощипанного ангела.</em></p><p class="p1"><em>Браво!</em></p><p class="empty-line"/><p class="p1">И тогда Катька вскочила, сжала кулаки, затрясла головой и завела свою любовную песнь, которую мы тут воспроизводим практически без купюр.</p><p class="subtitle">Любовная песнь Катьки</p><div class="poem">
<div class="stanza">
<p class="v">Игорь, заводи лейку! Заводи лейку!</p>
<p class="v">Игорь, солнце мое, возлюбленный мой, душа души моей, полетели отсюда!</p>
<p class="v">Игорь, нам больше нечего тут делать!</p>
<p class="v">Это больше не наша планета.</p>
<p class="v">Мы не спасемся ни на одной из ее сторон,</p>
<p class="v">Ни на северной, ни на западной, ни на южной, ни на восточной,</p>
<p class="v">Ни на одной из тех десяти, которые не входят в земную розу ветров!</p>
<p class="v">Ведь она была такая многогранная, такая многоугольная,</p>
<p class="v">И всякой твари находилось на ней место,</p>
<p class="v">И каждому был приют, и каждому убежище,</p>
<p class="v">Но теперь на ней нигде, никогда, никому нельзя будет укрыться</p>
<p class="v">От добродетельных слесарей, осторожных ветеринаров,</p>
<p class="v">Прозорливых шоферов, патриотично настроенных безработных,</p>
<p class="v">Девочек с пластинками на зубах, военных летчиков с повадками джентльменов,</p>
<p class="v">Всех, кто заслужил свою участь и так понапрасну спасся!</p>
<p class="v">Игорь, заводи лейку, заводи лейку,</p>
<p class="v">Игорь, заводи свою шарманку, полетели отсюда,</p>
<p class="v">Включай мультизатор, нагревай культиватор,</p>
<p class="v">Трансглюкируй свой трансглюкатор – и ключ на старт!</p>
<p class="v">И всюду, куда мы с тобой прилетим на лейке,</p>
<p class="v">Нас встретят руины, огни, воды, покореженные медные трубы,</p>
<p class="v">И везде, на какой бы перрон мы с тобою ни приземлились,</p>
<p class="v">Круша ветки, вертясь волчком, поднимая пыль, опрокидывая табуретки,</p>
<p class="v">В лепешку расплющивая копулятор, столько уже претерпевший, –</p>
<p class="v">Толпы будут ползти, задыхаться, спешить к последней ракете,</p>
<p class="v">Вот-вот готовящейся стартовать туда, куда нас не пустят.</p>
<p class="v">Везде, где бы мы с тобою ни очутились,</p>
<p class="v">Будет глад, и мор, и чума, и огненный ветер,</p>
<p class="v">И расплата за все и сразу,</p>
<p class="v">Потому что любовь – это ровно такая эвакуация,</p>
<p class="v">Которая только в такие места и эвакуирует.</p>
<p class="v">Потому что – и я знала, знала, знала с самого начала – Любовь – это огни, воды, покореженные трубы,</p>
<p class="v">Перевязанные во избежание последствий,</p>
<p class="v">Это идти вдвоем по стерне, хрустящей первым морозом,</p>
<p class="v">Тащить чемодан ненужных вещей, раскрывающийся ежеминутно,</p>
<p class="v">Это прятаться по ночам в стогах, в погребах пережидать облавы,</p>
<p class="v">Умолять, чтоб пустили из милости, дали воды, швырнули горбушку.</p>
<p class="v">Потому что любовь – это выход из всех договоров, из всех раскладов,</p>
<p class="v">Выпаденье из всяких рамок, отказ от любых конвенций,</p>
<p class="v">Это взрывы, воронки, шлагбаумы, холодные ночи,</p>
<p class="v">Танцы на битом стекле, пиры нищеты и роскошь ночлежек,</p>
<p class="v">Нескончаемая тоска полустанков и перегонов,</p>
<p class="v">Неописуемый ужас мира, понимаемый по контрасту.</p>
<p class="v">И уж если мне попался эвакуатор –</p>
<p class="v">Отрывай меня от ребенка, эвакуируй меня отсюда,</p>
<p class="v">Забери меня в путь, у которого нет конца и начала,</p>
<p class="v">Только станции и полустанки – Тарасовка,</p>
<p class="v">Столбовая,</p>
<p class="v">Альфа Центавра, Свиблово, далее непонятно,</p>
<p class="v">Вывеска обгорела, буквы не прочитаешь,</p>
<p class="v">Только и видно, что кромешная тьма да искры.</p>
<p class="v">Игорь, заводи лейку, заводи лейку,</p>
<p class="v">Сердце души моей, полетели отсюда,</p>
<p class="v">Это эвакуация, это эвакуация,</p>
<p class="v">Вы слушали группу «Эвакуатор», покажите мне</p>
<p class="v">ваши ручки,</p>
<p class="v">Мы полетели туда, где глад, и мор, и скрежет зубовный,</p>
<p class="v">Прощайте все, поминайте лихом, приятного аппетита,</p>
<p class="v">Ад, марш за нами, и даже с опереженьем,</p>
<p class="v">Ты должен нас встретить там, куда мы прибудем.</p>
</div>
</div><p class="p1">Катька остановилась и перевела дух. Все молчали. Она стояла, прижимаясь к Игорю и спрятав лицо у него на груди.</p><p class="p1">– Да, – сказала бабушка, – поезжайте. Так оно правда будет лучше.</p><p class="p1">– Подушу не отдам, – быстро сказал Сережа.</p><p class="p1">– Мама! – завизжала Подуша.</p><p class="p1">– Ничего, ничего, – сказала бабушка. – Уляжется все – прилетите.</p><p class="p1">– Пошли, Катька, – прошептал Игорь. – Правда, пошли.</p></span></span>
