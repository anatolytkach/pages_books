<p class="p">VI</p>
</div><p class="p1">Катька сидела напротив мужа и с чувством горькой вины жевала сосиски. Он их добыл с боем, продежурив у магазина с пяти утра. Всякий бодрствует по-своему. Любовь несправедлива. Никто и не обещал, что будет справедливо. Если бы Игорь порезал палец, Катька рванулась бы к нему через всю Москву, а если бы наш муж, не дай бог, чем-нибудь серьезно заболел – ну, тоже бы рванулась, вероятно, но в полной уверенности, что он симулирует и что бежать никуда не надо.</p><p class="p1">Сереженька с тоскливым умилением наблюдал, как она ест. Видно было, что на этот раз в качестве наказания за долгую отлучку приготовлена пытка кротостью.</p><p class="p1">– Сергей, – сказала Катька. – А если бы у тебя была возможность взять отсюда пять человек, ты кого бы взял?</p><p class="p1">– Куда?</p><p class="p1">– Неважно куда. Считай, в Штаты, или на Землю Санникова. В хорошее место.</p><p class="p1">– Нет, это серьезная разница. Если в Штаты – одних, на Землю Санникова – других. Тем более что ее нету.</p><p class="p1">– Но если бы была! – Наш муж был ужасен именно неумением прямо отвечать на вопрос.</p><p class="p1">– Тебя взял бы, – сказал он с нежностью.</p><p class="p1">– Спасибо. А еще?</p><p class="p1">– Еще… – Он поскреб бороду. Катька глядела на него невинными круглыми глазами и ждала. – Мать, само собой. Хотя она бы не поехала никуда. Столько раз можно было, а она не хочет. Говорит, мануальщики там не нужны.</p><p class="p1">– А еще? Может, Витю Серова? – Витя Серов был наш друг, в точности соответствующий своей фамилии; наш муж не любил окружать себя яркими людьми, предпочитая тех, кто ни в чем не состоялся. Витя много пил и увлекался астрологией, составлял гороскопы всем желающим, из гороскопов никогда ничего нельзя было понять.</p><p class="p1">– Зачем Витя? – Сереженька кисло улыбнулся. – Он и в Штатах будет говорить, что это не его место.</p><p class="p1">– Что ж ты с ним никак расстаться не можешь, если все про него понимаешь?</p><p class="p1">– Да у него и так никого нет…</p><p class="p1">Ну разумеется: Сереженьке необходимо было ощущать себя благодетелем. Это не ему нужен был Витя Серов – чтобы уважать себя от нуля и даже от минуса, а Витя Серов, значит, нуждался в единственном друге.</p><p class="p1">– А больше бы никого, пожалуй. А, вру. Щербакова взял бы.</p><p class="p1">– Типа национальное достояние?</p><p class="p1">– Ага. Больше тут брать некого.</p><p class="p1">– Щербаков в случае чего раньше тебя уедет.</p><p class="p1">Почему наш муж любил Щербакова, было вовсе уж непонятно; наверное, он не отличался в этом смысле от основной массы его противноватых поклонников, находивших в Щербакове источник умилительного самодовольства. Через него они приобщались к чему-то необыкновенно умному, хотя чего там было умного? – перекисший советский романтизм с множеством заморских слов…</p><p class="p1">– А! Веллера бы взял, пусть байки рассказывает.</p><p class="p1">Да, Веллер ему нравился, Веллером была заставлена целая полка – идеальный писатель для альпинистов, алкоголиков, компьютерщиков и прочих неудачников; ведь и их разговоры состояли либо из монотонных баек про то, как лейтенант утопил в очке документ и полдня доставал его, либо из невыносимой банальщины на тему «смысл жизни». Веллер попадал в эту таргет-категорию с меткостью самонаводящейся ракеты. Катька представила Веллера в ракете: он с первой секунды начал бы учить Игоря правильно ею управлять. К чертям Веллера, ему и тут ничего не сделается. Придут оккупанты – научит их оккупировать.</p><p class="p1">Голова ее со вчерашнего утра работала лихорадочно, упорно, маниакально, – она понимала теперь, что такое сознание сумасшедшего. В нем не остается места ни для чего, кроме сверхидеи, все зациклено на ней: в сущности, норма – это и есть разнообразие, способность переключаться с одного на другое. С ума сходит всякий, кто ждет опоздавшего ребенка, всякий, кто прислушивается к боли, оскорбленный, приговоренный, реже влюбленный – нет более противоестественного и гнусного состояния, чем сосредоточенность на единственной, раскаленной болевой точке. Она перебирала самые абсурдные варианты – спасти первых попавшихся, выкрасть младенцев, пойти в детский дом, расположенный поблизости, и забрать оттуда самых несчастных (кто отдаст?!). Отчаявшись определить критерий несчастности, она додумалась до страшного – несчастные и здесь-то были никому не нужны, стоило тащить их на Альфу Козерога! Хуже всего тут было самым ненужным, словно местный Кракатук – в которого Катька не верила по-настоящему только потому, что не могла его себе представить, – заранее все предусмотрел: для всех полезных людей были варианты спасения, а дураков и слабаков безжалостно отбраковывали. Больше всего болели и хуже всего устраивались те, кому нечем было жить; исключения оказывались единичны. Жить с этой мыслью было нельзя, Катька гнала ее – но всякий раз у нее выходило, что и вся жизнь – одна огромная эвакуация, при которой в будущее попадают только мало-мальски достойные, а больные и неуклюжие гниют на обочинах. Оставалось понять критерий отбора – не талант же, в конце концов! Выходило, что местному Кракатуку для каких-то его тайных целей нужны только те, кто сознает свою значимость, служители бессмысленных идей, жрецы жестоких культов, – спасались зацикленные на своем деле, оголтелые карьеристы, отчаявшиеся одиночки, а любой, кто оглядывался на отставших или протягивал им руку, сам безнадежно отставал, пополняя собою их ряды. Оставалось утешаться, что на земле действует обратный критерий отбора, что отставших отсеивают лишь для того, чтобы быстрее эвакуировать в рай, а выжившие так и будут тупо, упорно, неостановимо брести к выдуманной цели, прямиком в объятия дьявола, – но было слишком очевидно, что эту сказку придумали отставшие, нуждающиеся хоть в каком-то обосновании участи. Катька всегда догадывалась, что главный, Верховный Кракатук, в подчинении у которого находился и ее собственный, маленький, слабый бог – другого она не могла любить, а без любви какая же вера, – преследует одну цель: отобрать сильных, решительных и равных ему по части пренебрежения милосердием. Ее же собственное божество, подчиненный, зажатый бесчисленными проверками и идиотскими уставами эвакуатор, только и мог упрятать в безопасное место нескольких самых слабых, и тут критерий был ясен – Катька отлично знала, по какому принципу он их отбирал. Дело было не в несчастности, болезни или иной ущербности, а в том, с какой кроткой бодростью, с каким безыскусным весельем они всё переносили, даже, кажется, и не допуская самой мысли об иной участи; этот верховный эвакуатор оберегал и припрятывал только тех, кто, даже будучи выгнан отовсюду, заклепан во узы, сослан в адские области, умудрялся смеяться немудрящей шутке, подбадривать соседа и выдумывать утешительные истории для испуганного ребенка. Мир для таких людей был тем же, чем для Серой Шейки неуклонно сужающаяся полынья. Такой человек в ее биографии был один, и только его хотела она забрать: брянская бабушка, которая ее, по сути, и воспитывала.</p><p class="p1">Бабушкин дом стоял на окраине города, он был деревянный, двухэтажный и чрезвычайно загадочный. Загадочен был его чердак, хранивший множество тайн, загадочен погреб с его неисчерпаемыми запасами, не менее таинственны были ночные шорохи, поскрипывания, попискивания мебели и половиц; Катька в жизни не видела более одушевленного жилища. Все вещи были с историей, все соседи – с секретом, каждого хотелось расспросить, за каждым проследить, ибо казалось, что стоит им выйти за порог – они вернутся в свой истинный облик, превратятся в доброжелательных и смешных языческих божеств, в мелкую лесную нечисть. Бабушка ими командовала. Сосед справа был явно леший, соседка слева – несомненная кикимора или, быть может, шишига (Катька их путала). Вечерами они сходились к бабушке смотреть телевизор или играть в лото. Лото было древнее, с потемневшими круглыми бочонками, с желтыми карточками, похожими на старинные кредитные билеты, которые Катька видела на витрине краеведческого музея. Смысла игры Катька не понимала, ей казалось, что это только внешнее, маскировочное – на самом же деле в том, чтобы закрывать цифры на карточках медными монетами, был особенный смысл, чуть ли не поддержание порядка в здешних лесах и болотах, которыми владели собравшиеся. Одну карточку закрыли – и в безопасности березняк, другую – и ничего не сделается с рекой Десной.</p><p class="p1">Бабушка, в общем, ее и растила – если понимать под этим словом не повседневную заботу, принудительное кормление и нудное проверяние уроков, а то единственное, без чего все остальное теряет смысл: влияние. Несмотря на все несходства (бабушка была рослая и светловолосая, до сих пор не совсем поседевшая, а Катька маленькая и черная), характером и вкусами Катька пошла в нее. Обе предпочитали крыжовенное варенье всякому другому, любили картошку с маслом, редиску, суп из тушенки с лапшой – баранину же и копченую рыбу терпеть не могли. Была и другая бабушка, по материнской линии, но ее Катька видела только однажды и родственницей не считала. Она жила в Сибири и даже писала редко. После родительского отъезда (бабушку даже не уговаривали, зная ее упрямство и привязанность к дому) у Катьки в России почти не осталось родни. Все представление о родине свелось к дому на брянской окраине, и больше, по сути, жалеть тут было не о ком. Мысль о бабушке всегда успокаивала Катьку – успокоила и сейчас; конечно, она откажется ехать, конечно, до Брянска паника еще не докатилась, – но теперь уже от Катьки зависело найти слова, чтобы уговорить бабушку. Правда, не совсем понятно было, что случится с Брянском, но, судя по тому, что уже после их с Игорем поездки в Тарасовку вдруг ни с того ни с сего взорвались три дома на окраине Воронежа, враг не собирался ограничиваться Москвой.</p><p class="p1">А куда я ее везу, в лейке, с новым для нее и непонятным ей человеком? Где гарантия, что мы вообще долетим? Никакой гарантии, одна радость, что мы будем вместе. А как мы до этого жили врозь, обмениваясь редкими звонками и письмами? Последний раз я ездила к бабушке прошлым летом, и то ненадолго. Никаким эвакуатором еще и не пахло, да и никаким концом света тоже. Впрочем, пахло, только в Брянске этот запах, преследовавший меня в Москве, никогда не чувствовался. Его забивал запах антоновки в погребе, левкоев, маков и табака во дворе, сухих трав на кухне. Мой дом был тут с самого начала. Когда сюда приходили родители, они, казалось, были чужими, рушили то, что было между мной и бабушкой. Они вносили сюда веянье мира, в котором мне никогда не было хорошо. Меня у бабушки любили все – кот, дом, соседи, и не за то, что я внучка: прав эвакуатор, никакое родство ни к кому не располагает само по себе. Не в нем дело. Просто я была отсюда, из этого древнего полуязыческого мира, в котором все договаривались с кадкой, землей, забором, погодой – жили в непрерывном дружественном сговоре, а как этот сговор разрушился, так и появилось предчувствие беды. У бабушки мне всегда было спокойно, больше чем спокойно – с ее миром я могла договориться. Пошепчешь – и пройдет. Попросишь – и дастся. У русских была какая-то своя вера, но они ее предали, и брошенный ими маленький бог, не держащий на них зла, теперь страшно ограничен в возможностях: он может помочь только от сих до сих. Мы отдали себя во власть иных, чуждых божеств, с которыми договариваться бесполезно. Теперь они нас уничтожают, а тихие, малые боги наших лесов и болот следят за этим с беспомощным ужасом. Но по крайней мере бабушку, богиню брянской окраины, я отсюда вытащу.</p><p class="p1">Оставалось четыре дня. Мужа она решила предупредить в последний момент – свекровь, естественно, упрется, но тут уж как-нибудь. Оставалось два места, но о них Катька предпочитала не думать. Подруга Лида? – я здесь-то через два часа не знаю, о чем с ней говорить. Посмотрим. В крайнем случае схватим первых попавшихся. Она до такой степени была поглощена этим противоестественным отбором, что уже почти не думала о том, врет Игорь или нет, взлетит или не взлетит его лейка, – последний шанс есть последний шанс, и о нем лучше не задумываться. Недвижимость в Москве стремительно упала в цене, билеты за границу раскупили на полгода вперед, поезда брали штурмом, срок ультиматума истекал, а Шамиль ежедневно слал письма, нигде не публиковавшиеся, но вполне доступные в Сети: до гибели вавилонской блудницы осталось шесть… пять… четыре дня, и воинам великого джихада смешна самонадеянность беглецов: клеймо свое они уносят на себе.</p><p class="p1">Надо было ехать в Брянск. У Катьки не было надежды взять билет на поезд – с Киевского вокзала беспрерывно отходили автобусы: рейсовые отправляли междугородными маршрутами. Единственным городским транспортом остался троллейбус: метро закрылось во избежание массовой гибели пассажиров в час пик. Доехать до Брянска в автобусе киевского направления стоило порядка полутора тысяч – цена фантастическая, но и она росла с каждым днем. Мужу Катька ничего не объясняла.</p><p class="p1">– Переждите как-нибудь с Подушей. Я послезавтра вернусь совершенно точно. Бабушке надо помочь.</p><p class="p1">– Никуда ты не поедешь, – вяло сказал Сереженька.</p><p class="p1">– Сережа, я поеду. Я не знаю, как она там.</p><p class="p1">– Кать, сейчас не то время. Ты не можешь… ну что это такое, в конце концов! Мы должны думать, куда из города бежать…</p><p class="p1">– Сережа, – сказала Катька абсолютно спокойно. Она умела с ним быть спокойной, всегда чувствуя свою силу на фоне его слабости. – Я тебе говорю совершенно точно: через пять дней мы все уедем отсюда.</p><p class="p1">– Кто нас увезет?</p><p class="p1">– Работа моя увезет. «Офис» принадлежит «Дельте», она увозит всех сотрудников с семьями. Здесь у меня твердая гарантия, можешь не сомневаться.</p><p class="p1">– А мать мою кто возьмет?</p><p class="p1">– И мать я возьму.</p><p class="p1">– И куда?</p><p class="p1">– Понятия не имею. Нам ничего не говорят. Я знаю только, что мы уедем. Пойми, я не могу бросить бабушку просто так. Она меня вырастила, я ее, может, не увижу больше никогда…</p><p class="p1">– И что мне думать, если тебя не будет послезавтра?</p><p class="p1">– Я в любом случае буду все время звонить.</p><p class="p1">Надо было увидеться с Игорем – без этого она уже не могла, он один вселял в нее уверенность и надежду, да и надо же было рассказать ему насчет бабушки, чтобы хоть не сходил с ума, когда она уедет в Брянск. Мобильная связь работает все хуже, вдруг я оттуда не сумею с ним связаться… Игорь ждал ее возле ВДНХ. Выглядел он неважно, бледно, а главное – она никогда еще не видела его таким неуверенным.</p><p class="p1">– У тебя чего-нибудь не так?</p><p class="p1">– Нет, все так. Связи только давно не было, – сказал он, гладя Катьку по голове.</p><p class="p1">– Ну и что это может значить?</p><p class="p1">– Да все что угодно. Может, уже началась большая эвакуация, наши берут ваших, хлопоты, размещение… В Штатах – слыхала? Ждут, что воду отравят. В Чикаго вон отравили уже.</p><p class="p1">– Ваших там много?</p><p class="p1">– Да как везде. Я же всю сеть не знаю. Но что связи нет – это погано. Я все боюсь, что уругус…</p><p class="p1">– А с чего он вообще может быть, этот уругус? Что там у вас, в благополучном месте, могло случиться?</p><p class="p1">– Нет, у нас точно ничего не могло. Это как-то связано с нашей службой, с эвакуаторской… Ну не знаю я, Кать, честное слово. Меня просто тревожит, что почты давно нет. Я в некотором смысле вслепую работаю.</p><p class="p1">– И что ты сейчас должен делать?</p><p class="p1">– Ничего, обстановку изучать. Я донесения отправляю, а мне робот автоматически отписывает: ваше донесение принято, аккыртын.</p><p class="p1">– Что такое аккыртын?</p><p class="p1">– Форма служебной благодарности, типа спасибо за службу. Обычно хоть писали – обратите внимание на то и это. А теперь аккыртын, и будь здоров.</p><p class="p1">– Но мы летим? – тревожно спросила Катька. – Потому что иначе, сам понимаешь, мне и в Брянск незачем…</p><p class="p1">– А что ты собираешься делать в Брянске?</p><p class="p1">– Бабушку забирать.</p><p class="p1">– Ты уверена, что это нужно? Сколько ей лет?</p><p class="p1">– Семьдесят восемь, но она крепкая. Она выдержит, я тебя уверяю.</p><p class="p1">– Да нет, чего там не выдержать… Полет-то вполне комфортный. Просто – срываться с места…</p><p class="p1">– Что, лучше здесь погибнуть?</p><p class="p1">– Нет, конечно. Все ты правильно решила. Как ты ее довезешь?</p><p class="p1">– Доберемся. Триста километров, чего там. Ты меня не теряй, если я не буду звонить – значит, мобила не берет. Сейчас с этим проблемы, сам знаешь.</p><p class="p1">– Катька, Катька, – повторял он и все гладил ее по голове.</p><p class="p1">Катька испугалась: выходило, что не она в нем, а он в ней искал теперь опоры.</p><p class="p1">– Игорь, ты боишься чего-то?</p><p class="p1">– Конечно, боюсь. Боюсь, как ты поедешь. А мне с тобой нельзя – я должен быть на связи, мне за два дня до старта в Тарасовку надо. Расконсервация занимает семьдесят часов – без меня некому процесс начать. Я бы обязательно поехал с тобой, ты же знаешь. Но надо тут.</p><p class="p1">– Ой, хоть ты не будь такой кислый!</p><p class="p1">– Только, Катя, – сказал он уже обычным своим голосом, деловито и твердо. – Если вдруг, мало ли, сейчас всякое бывает… Задержалась ты там, паче чаяния, провела больше двух дней, не успеваешь… На день вполне можно опоздать, просто когда расконсервация начнется – процесс уже станет необратим. Стартовать мы должны седьмого ноября, в одиннадцать вечера ровно. Одиннадцать – оптимальное время, я проверял.</p><p class="p1">– Почему?</p><p class="p1">– Ракетчики отбиваются.</p><p class="p1">– Игорь! Я серьезно!</p><p class="p1">– А если серьезно, я все главные дела стараюсь делать в одиннадцать. Биоритм у меня такой, еще дома подсчитали. Одиннадцать у меня – пик интеллектуальной активности, стартовать очень трудно, мне вся воля понадобится. Я не летал давно, и так целыми днями тренируюсь сижу. Взлет должен сорок пять секунд занимать, а я за сорок пять едва успеваю двигатель разогреть.</p><p class="p1">– У вас что, программа тренировочная? – уважительно спросила Катька. – Типа авторалли?</p><p class="p1">– Да, только круче. Значит, самое позднее в половине двенадцатого, в красный день календаря, ты должна быть на месте – с мужем, бабушкой и кем тебе там еще хочется. Все поняла?</p><p class="p1">– Все, – кивнула Катька.</p><p class="p1">– Участок в Тарасовке найдешь?</p><p class="p1">– Игорь! Мы же вместе туда поедем!</p><p class="p1">– Вместе или не вместе, а ты учти: последние сутки я должен быть при лейке неотлучно. Там главные процессы в расконсервации пойдут. Так что из Москвы я уеду шестого. Если до шестого сюда не вернешься, сразу езжай в Тарасовку. Со всеми. Я там буду ждать. На всякий случай, если ты вдруг окажешься в Москве, а меня нет, я в своем газетном ящике, внизу, оставлю записку, как и что. Вот ключ, я тебе дубликат сделал. Мне мать всегда так оставляет, если я вернулся откуда-то, а ее дома нет.</p><p class="p1">– Где?</p><p class="p1">– Там, на Альфе.</p><p class="p1">– Хорошо. Но клянусь тебе, я послезавтра буду.</p><p class="p1">– Ладно. Только осторожней.</p><p class="p1">Он прижал ее к себе и зашептал в ухо:</p><p class="p1">– У второй двери, дитя, мне страшно, у второй двери пламя заговорило… У третьей двери, дитя, мне страшно…</p><p class="p1">– Слушай, – сказала Катька, высвобождаясь из его объятий. – Чего-то мне не нравится твое настроение.</p><p class="p1">– Оно мне самому не нравится.</p><p class="p1">– Может, ты чего-то недоговариваешь? Вдруг у тебя этот стартер не сработает, который был в чехле?</p><p class="p1">– Этот стартер всегда срабатывает, – грустно улыбнулся Игорь. – Он стопроцентный.</p><p class="p1">– Система защиты дубль пятнадцать?</p><p class="p1">– Система защиты пять и четыре. Не бери в голову, это я от любви грустный. Ведь несчастная любовь – это что? Это первый, в сущности, класс. Страдания для дураков. Настоящие страдания – это когда счастливая. Вот тогда все уже очень серьезно. Это как раз наш с тобой случай. Сразу начинаешь понимать, как все устроено…</p><p class="p1">– Купи мне мороженого, ладно?</p><p class="p1">– Сейчас. – То, что продавалось мороженое, было чудом: это, кажется, последнее, что осталось в Москве прежнего, мирного. – Фисташковых два дайте, пожалуйста…</p><p class="p1">– И чего ж будет? – испуганно спросила их добрая, широкая мороженщица. (Вот бы кого взять, но наверняка муж, дети, невестки, собаки…)</p><p class="p1">– Обойдется все, – сказал Игорь, и они, обнявшись, пошли в сторону троллейбусной остановки.</p><p class="p1">Подошел троллейбус, Игорь с трудом впихнул Катьку в средние двери – задние не открывались, машина была набита битком.</p><p class="p1">– Позвони! – крикнул он.</p><p class="p1">– Я скоро! – ответила она.</p><p class="p1">– Все мы тут скоро, – прокряхтел злобный старикан рядом.</p><p class="p1">Катька подмигнула и улыбнулась ему.</p></span></span>
