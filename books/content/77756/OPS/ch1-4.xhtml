<p class="p">I</p>
</div><p class="p1">– И потом, – сказал Игорь, – у нас живые деньги.</p><p class="p1">– В смысле большие?</p><p class="p1">– Да нет. – Он поморщился. – У кого как. Но у нас зависит реально от того, какой человек. У вас плохой человек мочь иметь много, много. У нас быть не так. У нас человек отличный, хороший, мочь иметь практически бесконечно, а дурной, злобна морда, лишаться последнее. Это быть так устроено. Такие быть зверьки. Сам мелкий, коричневый, шкурный-шкурный. Нос розовый, мягкий. Рот такой, с язык внутри. Такой весь как бы плюшевый. Ты его получать за своя работа. И если ты его холить, лелеять, учесывать шкурка, то он расти, расти, размножаться. Он размножаться сам, от хорошее отношение. Но если ты забывать про зверек, не учесывать зверек, не гладить, не кормить, не менять подстилка, то он чахнуть, сохнуть, дохнуть и умирать. И ты уже не мочь поменять его на еда, пища. Тогда просить взаймы один-другой зверек, но не все давать. Очень удобно.</p><p class="p1">– И Сбербанк называется звербанк.</p><p class="p1">– Банк есть, да. Но обычно хозяин уже привязаться к свой зверек, расставаться крайне неохотно. И зверек, если хозяин хороший, не хотеть уходить. Он приводить еще, еще. Тогда быть много, много зверек. Некоторые, конечно, все равно надо менять на продукты, одежда… Но это редко. На один зверек можно месяц кормить большая семья. И если их хорошо ухаживать, они никогда не умирать практически. Жить долго, много долго, как долгожитель с красивый, гостеприимный Кавказ.</p><p class="p1">– А бывать случаи, когда нерадивый зверьковладелец сосать лапа, умирать голод, дохнуть? – спросила Катька.</p><p class="p1">– Так не мочь быть, – покачал головой Игорь. – Быть гуманность, дорожить каждый член общества. Ему говорить: ты понимать теперь, как чувствовать себя недокормленный зверек? Он кивать: да, да, плакать, каяться. Тогда ему давать сразу много харлаш, много камбас, дурык, иногда бараласкун. Он поглощать, благодарить, начинать новая жизнь. Приговаривать: уж зверек ты мой зверек, уж я тебя так и сяк.</p><p class="p1">– Бараласкун – это местная выпивка?</p><p class="p1">– Да, будем считать, что типа того. Ну, не сильная, не водка – а вроде, допустим, бодрящего вина. Я лично очень люблю дурык.</p><p class="p1">– От него делаешься дурык?</p><p class="p1">– Дурык никогда не делаешься. Дурык либо родишься, и тогда уже ничто не поможет, – либо нет, и тогда тебе ничто не угрожает. Ты дурык, но у тебя интерфейс симпатичный. У нас там тоже как у вас: если женщина дурык, но хороша собой – ей многое прощается. У нее всегда зверьков полны клетки, бараласкун в постель каждое утро, харлаш по праздникам. Счет дайте, пожалуйста.</p><p class="p1">– У тебя хватит? – спросила Катька.</p><p class="p1">– Если не хватит, я ей дам зверька. Но, вообще, надо как-то менять дислокацию. Они тут так стали драть, что я на тебе разорюсь. У нас женщина всегда платит за мужчину. Потому что, если наоборот, он будет думать, что теперь имеет на нее право. У нас все тонко продумано. Я не хочу сказать, что у нас идеальный мир. Это было бы анкурлык, невежливо. Но все-таки у нас думают о людях, а у вас только выделываются друг перед другом. Если бы не ты, я бы уже с ума сошел.</p><p class="p1">– Спасибо, – сказала Катька. – Это вежливо, курлык. Типа пошли?</p><p class="p1">– Типа пошли, – он оставил полтинник на чай и с трудом вылез из-за крошечного столика. В китайском «Драконе» было особенно заметно, какой Игорь большой. Тут все было маленькое: порции, чашечки, кружечки, официанточки, – все, кроме цен.</p><p class="p1">– Ну, ты ползти домой? – Он никогда ее не провожал, Катька на этом настаивала – наш муж иногда выходил встречать Катьку, и нам совершенно не было нужно, чтобы наш муж знакомился с наш Игорь.</p><p class="p1">– Да, я, вероятно, ползти. А ты лететь свой идеальный мир Свиблово?</p><p class="p1">– Угу. Я улетать и жестоко тосковать. Вспоминать гордая земная женщина, небольшая, но душевная. Полетели когда-нибудь ко мне, честное слово. Я тебе покажу, как там все у нас.</p><p class="p1">– Это, знаешь, у нас тут на Земля, во времена моя далекая и прекрасная молодость, бывали иногда студенческие каникулы.</p><p class="p1">– Каникулы? Что это – каникулы?</p><p class="p1">– Ну, это типа вашего бурундук, но короче, – сымпровизировала она, и он, как всегда, мгновенно подхватил:</p><p class="p1">– Бурундук – это столовый прибор. Отпуск называется «бырындык». Во всех словах с позитивной модальностью присутствует «ы». Ты, мы, курлык.</p><p class="p1">– Ну вот, у нас тут были кыныкылы, – сказала Катька. – И я ездила в пансионат под Москву, с дывчонками. И если какой-нибудь пырень звал к себе в кымнату, то он говорил дывушке: «Пойдем посмотрим, как я живу». Это был такой ывфемизм. Некоторым девушкам так нравились эти комнаты, что они потом часто ходили их смотреть. Тогда образовывался бесхозный мальчик, напарник этого счастливца. Комнаты были на двоих только. Иногда мальчика кто-нибудь приючивал, а иногда он спал в танцзале под роялем. Ты тоже мне хочешь показать, как живешь?</p><p class="p1">– Очень хочу, – серьезно сказал Игорь. – Вот как увидел, так захотел показать. Я живу один, без напарного мальчика. Я живу не сказать чтобы очень хорошо, но стараюсь. Наверное, я все-таки живу лучше, чем эти ваши студенты.</p><p class="p1">– Да, наши тогдашние студенты совершенно не умели жить.</p><p class="p1">– И часто ты ходила смотреть комнаты?</p><p class="p1">– Моим первым мужчиной был однокурсник, мне было семнадцать лет, – сказала Катька.</p><p class="p1">– За что я тебя люблю, мать, так это за чистоту, простоту и прямоту. А кто был твоим вторым мужчиной?</p><p class="p1">– Ты будешь шестой, – честно сказал она. – И то я еще подумаю.</p><p class="p1">– То есть возможно, что я буду восьмой? Ты хочешь передо мной еще потренироваться на ком-то?</p><p class="p1">– Нет, что ты будешь шестой – это я тебе твердо обещаю. Но это будет не завтра, не послезавтра, вообще нескоро. Все очень сырьезно, очень.</p><p class="p1">– Я так тебя лыблю, Кать, – сказал Игорь. – Мне даже страшно будет тебе показывать, как я живу. Я вообще боюсь тебя как-нибудь уязвить, испортить…</p><p class="p1">– Слушай, мне категорически пора.</p><p class="p1">– А, да-да. Все уже с ума сходят. Меня-то никто не ждет.</p><p class="p1">– Игорь, бить на жалость у нас считается анкурлык.</p><p class="p1">– У вас все нормальные человеческие проявления считаются анкурлык, – сказал Игорь, поймал ей машину и уехал к себе в Свиблово, далекое, как Альфа Козерога.</p><p class="p1">Вылезая из машины и заходя в подъезд, Катька на всякий случай нашла Альфу Козерога, как он учил. Приятно было думать, что Игорь там. Вот он вошел, голосом открыл дверь, привычно поприветствовал электричество, чтобы оно зажглось, легким усилием воли переоделся в халат, уселся за стол, включил компьютер – а к его ногам радостно побежали живые деньги, стали тереться, прося вкуснятины. Игорь, вероятно, чертыхнулся, как всегда, когда его отвлекали, но в глубине души был доволен: когда живое существо нас поджидает и от нас зависит, это всегда большая радость. Ну, положим, не всегда, подумала она, открывая дверь вечно заедающим ключом.</p><p class="p1">Трудней всего оказалось научиться переключениям – буквально, с физической осязаемостью переводить какой-то внутренний рычажок в положение «выкл», и Катька даже представляла этот рычажок – черный, пластмассовый. Не сказать, чтобы таким образом она выключала внутренний свет: она переводила его в другой регистр. Первая антипатия к нашему мужу и даже, страшно сказать, к Подуше сразу проходила, как только Катька попадала в свою двухкомнатную жизнь, невыносимую, конечно, но и родную. Тут все было другое – «наша родина, сынок», – и требовались другие вещи, и она сама удивлялась, сколько у нее в голове, оказывается, живет народу – каждый активизируется, когда востребован, а в остальное время спит мертвым сном или по крайней мере исчезает из поля зрения. Возможно, он даже что-то делает, пока мы за ним не следим, и именно этим определяется настроение. Та Катька, которая была с Игорем, дома безутешно рыдала, но помалкивала. Если она подавала голос, ее тут же приходилось затыкать. Ее все бесило: манера мужа оставлять тарелки в раковине (мыть посуду – не наше дело!), свекровь Любовь Сергеевна, забредшая в гости (она жила неподалеку и навещала их раза два в неделю, выходной, не выходной), вечно включенный телевизор, до сих пор не уложенный ребенок и даже нянька ребенка, которой, между прочим, платили доллар в час – и она торчала до восьми, а то и до девяти вечера: «Полинка без вас не засыпает!» Не засыпает – ну так скинь ее на мужа и ступай, но ведь и муж наш чаще всего вдавливается в логово только после десяти, и он в своем праве, ибо в турконторе зарабатывает больше нас. Ему надо расслабляться, он страшно напрягается. Это мы не имеем права явиться после девяти и при всяком опоздании бываем подозрительно расспрашиваемы: с кем это мы, что мы… Наша жизнь определена широким кругом мелких обязанностей, тогда как единственная, но суперважная обязанность нашего мужа – зарабатывать деньги, мы копим на трехкомнатную, и больше с нас при всем желании ничего не спросишь. Ведь сами мы приносим в дом от силы шестьсот, хорошо, если семьсот баксов, с левыми заказами иногда набежит у нас штука, вот и теперь нас еще ждет оформление брошюры «Если ты заложник», просили повеселей.</p><p class="p1">Игорь был единственным на новой работе, с кем можно было разговаривать. Если не считать подруги Лиды, но ее Катька знала не первый год, вместе учились и посильно помогали друг другу с заказами. «Офис» был отвратительным местом, если честно, – но только наедине с Игорем Катька могла себе в этом признаться. Его делали для несуществующей прослойки успешных и состоявшихся людей от двадцати пяти до сорока (сначала, она помнила, было до тридцати пяти: верхняя граница оптимального читательского возраста отодвигалась по мере старения идеологов). «Офис» печатал исторические очерки о сигарах, написанные безработным историком; обзоры выставок, сочиненные безработным искусствоведом; справки о нобелевских лауреатах, накопанные в Интернете безработным физиком; но в основном там появлялись статьи непонятно о чем, в которых Катька не понимала ни единого слова и потому иллюстрировала их яркими абстрактными композициями. Там было что-то о деловой этике. Она поняла только одну статью – об организации корпоративных вечеринок: оказывается, чтобы дать сотрудникам надлежащую мотивацию, необходимо было регулярно проводить День Босса. Босса Катька нарисовала с такой мерой ненависти, что испытала колоссальное облегчение, – и это был единственный день, когда работа в «Офисе» была ей в радость.</p><p class="p1">Игорь, слава богу, не имел отношения к содержательной части журнала. Он чинил и настраивал компьютеры. «Вешайтесь, доктор, – говорил он любому, кто приходил с заявкой, – устройство вошло в плотные слои атмосферы»; после чего легко устранял неисправность. Катька особенно любила его за эту легкость. Она любила его за то, что он до такой степени не отсюда. Она любила его, потому что он читал все ее мысли, прежде чем она успевала додумать их до конца.</p><p class="p1">Во время работы активизировалась другая Катька – хладнокровная, резкая, изобретательная; если бы можно было ее, такую, как-то мобилизовать для общения с домашними, жизнь стала бы много привлекательней, но бодливой корове Бог рог не дает. В любом графическом редакторе она ориентировалась лучше, чем в собственной жизни, – и это очень справедливо, потому что даже в тараканьей черт ногу сломит, а вы хотите, чтобы я понимала человеческую. Поистине мир устроен не так. Репродуктивную способность я давала бы лет с сорока, сорока пяти, по достижении истинной зрелости. Надо это проговорить с Игорем. Трахаться можно сколько угодно, а плодить детей – только когда умеешь отвечать за себя и за них. Выходить замуж тоже с сорока. В двадцать я была фантастическая дура. В полной уверенности, что никому никогда не буду нужна, вышла за нашего мужа, дала жизнь еще одному существу и завязала свою биографию в невообразимый узел, изволь теперь жить и плодотворно трудиться в завязанном состоянии. Так думала молодая повеса, вставая под душ и мысленно – третью уже неделю – прикидывая: нет, еще вполне, не стыдно будет показаться инопланетянину.</p><p class="p1">– Я кебабы купил, – крикнул наш от телевизора.</p><p class="p1">– Я не голодная, – отозвалась она, но тут же подумала, что в смысле конспирации это прокол: третью неделю они с Игорем ходят по забегаловкам вокруг работы, она возвращается сытая и раздраженная – сытая от Игоревых щедрот, раздраженная от необходимости возвращаться, – и все это может навести на определенные размышления, даже если ты непрошибаемо убежден в заурядности собственной жены. Конечно, облагодетельствовав провинциалку, получив в ее лице безропотную кухарку и бездонный сосуд для излияния своего раздражения… ну ладно, ладно, это уже чересчур. Еще месяц назад, в августе, она была вполне довольна – или убеждала себя в этом, – но в сентябре появился Игорь, и все пошло кувырком. Сохранялась, впрочем, видимость благопристойности, и Катька диву давалась, до какой степени, значит, их с мужем ничего не связывало, если уже три недели она была ему совершенно чужая, а он ничего не замечал и все шло как обычно. Впрочем, может, замечал. С Сереженькой ни в чем нельзя быть уверенной, на этот счет у нее был солидный опыт. Вроде бы все гладко – «и вдруг разинет рот да как заорет: скорее головы канарейкам сверните!». Вероятно, он и теперь что-то в себе копил, дабы потом, под горячую руку, припомнить ей и поздние возвращения, и хозяйственную нерадивость, – и тогда она в ответ скажет ему, что уходит и забирает Подушу. Это надо было еще обдумать. Подуша обожала отца, а с Игорем они не были знакомы даже заочно: Катька отчего-то избегала говорить с ним о дочери, Игорь просто знал, что она есть, а Подуше вообще трудно было объяснить, где мать работает и какие у нее друзья. В «Офисе» Катька появилась пятого сентября, и Подуше было сказано, что мать рисует для журнала и что там имеется подруга Лида. Лида ее туда и привела, когда вполне предсказуемо и все-таки неожиданно лопнул «Созерцатель». Сереженька, конечно, уверял, что проживем, но снова садиться на шею нашего мужа, выслушивая при случае рассказы о том, как он устал горбатиться и как невыносимо приходить в неубранную квартиру… ведь, казалось бы, у тебя столько свободного времени – могла бы и подмести! Нет, пусть у меня опять не будет свободного времени. И она пошла в «Офис» и не знала теперь, радоваться или ужасаться.</p><p class="p1">– Заснула нормально?</p><p class="p1">– Тебя требовала, но я спел про невесту.</p><p class="p1">Это нам, вероятно, намек. Ну как же, ребенок ждет, мы тут шляемся и черт-те о чем думаем.</p><p class="p1">– Мы номер сдавали.</p><p class="p1">– Кать, я совершенно не в претензии.</p><p class="p1">И ведь любила же когда-то, что самое интересное. Такие были страсти, такие внезапные приезды под окна Дома аспиранта, ДАСа, выбегала к нему вся разнеженная, и не сказать, чтобы потом было ужасно. Было очень прилично, и даже в первый год после рождения Поли никто не жаловался. Демонстрировалась забота, предупреждение желаний. С самого начала, конечно, было ясно, что не то и придется притираться, но думалось, что так у всех. А по сравнению с личной жизнью подруги Лиды, чей муж вообще таскал ее в байдарочные походы и постоянно цитировал бр. Стругацких, наш был еще приличный, даже с проблесками понимания. Иное дело, что он был безнадежно нудным парнем, без малейшего полета, но это стало ясно, только когда возник Игорь со своей непрекращающейся неделей игры и игрушки.</p><p class="p1">Игра в инопланетянина была особенно занятной и длилась пятый день. Сначала, вспоминала Катька в кухне, яростно размешивая чай и более всего желая, чтобы муж так и остался у телевизора, – сначала были вещи более традиционные: допустим, ты дочь богатого чаевладельца и живешь на Мясницкой. Какого чаевладельца? Ну, не знаю, чаеторговца. Чай от… как твоя девичья фамилия? Кузнецова, какая прелесть. Значит, «Чай Кузнецовых». Шикарный дом в центре города, в первом этаже магазин, в витрине пальма. Ошеломляющий запах чая двадцати пяти сортов – и с померанцем, и с марципанцем, и с бергамотцем, и что угодно для души. Папа, понятное дело, продвинутый, не без эстетизма. Собирает у себя салон. Для дочек. У тебя сестры есть? Вообще-то, у меня брат. Ученый брат, намного старший. Он в Германии, родителей забрал к себе. Хорошо, брат. Но давай допустим, что у тебя есть младшая сестра, дура, уродина, жестокая и толстая девочка, которая бьет тебя с раннего детства. А ты вся такая золушка, кротко это переносишь, только иногда у тебя появляется неотвязная фантазия, что ты не родная дочь у родителей, что твой добрый отец – настоящий, а холодная, самодовольная мать – его вторая жена. В общем, в один прекрасный день они завезут тебя на саночках в лес и бросят. Такие тебя посещают бреды, понимаешь?</p><p class="p1">А потом, в один прекрасный день, собирается салон. Приходят голодные, но страшно претенциозные модерновые поэты. Один из них по-настоящему талантливый, его звать Игорь, а все остальные так себе, шелупонь, авторы и составители сборника «Лягушачья икра», изданного в самодельном издательстве «Мускус». Все поэты наперебой стараются очаровать толстую, наглую младшую дочь Кузнецова, а ты сидишь одна, в углу, и никто на тебя никакого внимания… Но после того, как жидковолосый, неопрятный Кубышкин читает венок сонетов «Вошь» – дело происходит в пятнадцатом году, окопная тематика уже возобладала, – ты вскакиваешь так, что чуть не опрокидывается чайный столик, и трагическим, низким голосом восклицаешь: «Боже, какая чушь! Неужели, неужели вы не понимаете, что всего этого скоро не будет! Не будет ни-ко-го!» – и с ревом выбегаешь. Все в замешательстве, а я, конечно, за тобой. И осушаю губами твои истерические слезы где-нибудь на темной лестнице… Как?</p><p class="p1">Это был второй, кажется, их разговор. Он имел место в отвратительной столовке «Офиса», где давали в тот день винегрет, картофельный суп и серую котлету, но и на том спасибо – в «Созерцателе» буфета вовсе не было.</p><p class="p1">– А потом, сама понимаешь, ужасная любовь, но меня мобилизуют, и я пропадаю без вести. А в восемнадцатом папаша быстрее прочих сообразил, что отсюда надо драпать, и ты…</p><p class="p1">– Беременная от красноармейца, – вставила она.</p><p class="p1">– Почему от красноармейца? Ты что, комиссаршей на фронт пошла?</p><p class="p1">– Нет, полюбила представителя угнетенного класса. Из чувства вины.</p><p class="p1">– Это ты мне не заливай. С красноармейцем у тебя могло быть только по принуждению, и то ты вырвалась бы. Ты не веришь, что я погиб, и хранишь мне верность. Итак, Париж, двадцать второй год, приезжает делегация российских дипломатов… и кто же переводчик?</p><p class="p1">– Конечно ты, Карлсон!</p><p class="p1">– Разумеется, я. Я там на фронтах перековался, все пересмотрел и решил, что будущее России – в большевизме. И дезертировал под это дело. Был агитатором. Мотался по фронтам. – Он опустил голову и принялся выталкивать слова резко, хрипло, взглядывая на нее исподлобья: – Окопы. Вши. Знаете вы, Катя, что такое вши? Настоящие, жирные? Это совсем не то, что писал тот щенок… как его… Букашкин… Потом тиф… Бредил водой, водопадами, айсбергами… Выходили. Женился. Жена – простая, грубая. Ненавижу. Теперь здесь. Катя, одно: да или нет? Там – жизнь. Тут – болото. Катя, вы пойдете со мной?</p><p class="p1">Они пошли тогда в «Синдбад» – Катьке там страшно понравилось, очень жаль, что две недели спустя его погромили в ответ на взрыв в Саратове. Было совершенно непонятно, почему вдобавок к саратовскому взрыву надо еще громить приличное кафе в Москве, но власть не вмешивалась: люди должны дать выход патриотическим чувствам. Потом ходили в «Ласточку», потом в «Суши весла», – восточных кафе в городе почти не осталось, в остальных из странной национальной гордости перестали готовить плов и манты, хотя, казалось бы, узбеки-то при чем? И все это время Игорь выдумывал им роли – давай ты шахидка, у тебя растет шахидыш, а я русский милиционер, задержал тебя и жалею… А давай ты скинхедка с рабочих окраин, а я гастарбайтер, я защитил тебя от изнасилования в электричке, и теперь в тебе борются долг и чувства… Все было весело, но лучше всего получился инопланетянин.</p><p class="p1">– И как будто я ничего у вас тут не знаю, а ты мне все рассказываешь. Вот это, например, для чего?</p><p class="p1">– Это предмет, освещающий улицу, ряд домов. Он должен испускать свет, но не испускает.</p><p class="p1">– Испортился?</p><p class="p1">– Нет, военная хитрость. Глупый инопланетянин думает, что у нас все ломается, не стыкуется и разваливается, и начинает постепенно захватывать все земное, начиная с девушек. А мы только притворяемся, на самом деле у нас готовность номер один.</p><p class="p1">Осень, на их счастье, была отличная. Она казалась похожей на другую, тоже совершенно счастливую, десятилетней давности. Катьке исполнилось пятнадцать, она быстро взрослела и сама поражалась своим новым возможностям – в голову приходили отличные мысли, прилично рисовать она начала именно с этого времени, сами собой появились новые знакомые, понимавшие, что она делает, была поездка с ними в Москву, сумасшедшая ночь у сумасшедшего художника на Арбате, никаких приставаний, конечно, большая компания, сплошная романтика… Даже родители всё стали разрешать и смотрели на нее с внезапным почтением. Мишка уже уехал учиться в МГУ и триумфально двигался к славе. В ее жизнь и даже в комнату никто больше не лез.</p><p class="p1">Та осень ей запомнилась потому, что Катька смотрела тогда на мир новыми глазами. Был сентябрь с большой буквы, архисентябрь – ясный, теплый, четкий, с резкими линиями веток и проводов, с вызолоченными солнцем кирпичами хрущевки напротив. Катька, проснувшись, долго смотрела на нее. В школу не хотелось, и несколько раз она ее пропустила, гуляла по любимой улице Генерала Трубникова, освобождавшего Брянск (улица Трубникова была вся в кленах, которые в тот год отчего-то сплошь стали медно-желтыми, ровного солнечного цвета), смотрела на старух во дворах, прислушивалась к случайным разговорам и чувствовала себя тайной хозяйкой всего этого. Но и хозяйка – не совсем то: она была как бы представительницей Брянска перед незримыми, тайными наблюдателями, ей предстояло за все перед ними отчитаться и все объяснить. Это мы, Господи. Вот пруд, вот старик, разговаривающий сам с собой, вот вечно бранящаяся с матерью несчастная очкастая девочка с собакой – они живут этажом выше, мать, девочка и собака, и, когда мать с девочкой особенно неистово орут друг на друга, собака вступает с пронзительным лаем, умоляя их замолчать. Все замерло на пределе, за которым, конечно, тоска и распад – но пока, в последний миг, все еще старалось блеснуть, в полную силу показать себя и только после этого кануть. Она никогда раньше не понимала, что осень для того только и придумана: весна слишком суетлива, лето блаженствует и ни о чем не думает, – осень впервые понимает конечность всего, но на осознание этой конечности у нее совсем мало времени. Потому-то прозрачная ясность так быстро сменяется мутью больного, истерзанного сознания: делайте что хотите, только скорее.</p><p class="p1">Теперешняя осень была так же ясна, тепла и золотиста, и Катьке так же приходилось отвечать перед неведомым наблюдателем, но уже за Москву. Это было тем забавней, что Игорь тут родился, а она жила последние восемь лет, – но он идеально перевоплощался в чужака и на второй день игры даже выдумал язык, на котором они теперь почти все время разговаривали: усиливающие повторы, сплошные инфинитивы, именительные падежи, прелестное дикарское наречие.</p><p class="p1">– Что быть тут?</p><p class="p1">– Тут быть проспект, ряд домов, в честь Ленин. У нас быть обычай называть в честь великий человек улица, корабль, иногда научный институт.</p><p class="p1">– Что сделать Ленин?</p><p class="p1">– Он картавить, делать рука вот так, говорить: «Това’ищи! Това’ищи!» Потом он умереть, и товарищи назвать улица, чтобы вечно помнить, как хорошо говорить милый, милый товарищ Ленин. Такой лысенький.</p><p class="p1">– Ты его любить?</p><p class="p1">– Бэзмэрно. Как только слышать про товарищ Ленин, так сразу подпрыгивать, махать ручки, хохотать. Вот так: «Товалищи, товалищи!», – она подпрыгнула и поцеловала Игоря в нос.</p><p class="p1">Она объясняла ему, что такое мороженое и почему оно в стаканчиках; почему один орех называется грецким, а другой – миндальным; зачем на растяжке крупно написано «Поздравляем с Днем города!» («А что, в городе бывают какие-то другие дни?» – «Разумеется. Страна у нас сельская, большую часть года все живут соответственно, то есть без горячей воды, с удобствами во дворе, – чтобы селянам не было обидно. Когда наступает День города, все ужасно радуются: дают воду, показывают кино, работает канализация… но все это только один раз в году»). Они забредали в Нескучный сад («Почему Нескучный? Здесь никто не скучает?» – «Ну что ты. Здесь во время Дня города раздают Нескафе, оно лежит по всему парку огромными бесплатными кучами, почему он и называется Нескучный»), видели рубку толкиенистов на деревянных мечах – один вдруг узнал Игоря и подошел.</p><p class="p1">– Арагорн, магистр! Верный ученик приветствует тебя!</p><p class="p1">– В смысле? – дружелюбно спросил Игорь.</p><p class="p1">– О, простите мою неучтивость! Любезная дама, я должен был обратиться сначала к вам! Сообщите мне ваше звездное имя, чтобы я мог повторять его в битве.</p><p class="p1">– Его уже я повторяю в битве, – объяснил Игорь. – Вы меня, рыцарь, не за того приняли.</p><p class="p1">– А, – сказал толкиенист. Вид у него стал озадаченный. – Играем. Понял. Простите, что вторглись.</p><p class="p1">– Да ничего, ничего.</p><p class="p1">– Когда магистр играет, ученик отступает, – учтиво сказал толкиенист. Он был приятный малый, хотя и сальноволосый. – Удачи магистру. Помните, что всегда можете рассчитывать на Эстрагорна. Мобильный не изменился.</p><p class="p1">– Непременно, непременно, – ответил Игорь. – Добро победит, мир, дружба, жвачка.</p><p class="p1">Толкиенист нахлобучил шлем и отбежал к своим.</p><p class="p1">– Ты его знаешь? – удивилась Катька.</p><p class="p1">– Понятия не имею.</p><p class="p1">– А чего же он…</p><p class="p1">– Ну, обознался. Или вербует нового человека. У психов своя логика.</p><p class="p1">– А я уж подумала, что ты в юности того…</p><p class="p1">– Кать, я похож на толкиенутого? Серьезно? Магистр Эстрагон, рыцарь Тархун?</p><p class="p1">– Ты ни на кого не похож, потому я по тебе и сохну, – серьезно и уважительно сказала она. – Знаешь, как приятно говорить другому человеку, что по нему сохнешь? Я уж думала, что все, отсохлась. Поразительные способности открываются в организме.</p><p class="p1">Потом пили зеленый чай на открытой веранде странного клуба «Ротонда», где собирались незлобивые, отрешенные люди, почему-то сплошь в черных очках («Это наши, – пояснял Игорь, – они слетелись посмотреть, не делаешь ли ты мне зла»). Там, в «Ротонде», в присутствии внимательно наблюдающих за ними инопланетян, которые, конечно, только для виду заказывали пирожные и минералку, он впервые рассказал ей, зачем, собственно, Земля.</p><p class="p1">– У вас многое хорошо, но неправильно, – пояснил он. – Мы наблюдаем и не допускаем.</p><p class="p1">– Ага. То есть здесь, как я понимаю, своего рода полигон.</p><p class="p1">– Ну да, можно так. Когда вас открыли, то очень обрадовались: у вас жизнь почти совсем такая, как у нас. Немножко другая биоформа, другая корова, другой скунс. Но в целом очень сходно. Тогда решили, что зародят сюда жизнь и будут смотреть и делать так, чтобы у нас не повторялось.</p><p class="p1">– Долго же вы ждали. Сначала инфузории, потом динозавры…</p><p class="p1">– Да нет. Какие динозавры? Динозавр – мифологический персонаж, вроде дракона. Обычная ящерица, только большая. Их никогда не было. Просто выселили сюда какое-то количество народу, оно стало плодиться и размножаться, а мы смотрим и учитываем.</p><p class="p1">– Поняла, отлично. Изгнание из рая. А за что их?</p><p class="p1">– Ну, было за что.</p><p class="p1">– За первородный грех?</p><p class="p1">– Это они так придумали, что за первородный. На самом деле у нас за это никого не выгоняют. Все это делают, и ничего. Просто… за мелкие пакости.</p><p class="p1">– Но это нечистый эксперимент. Преступники дадут преступное потомство, земля будет заселена моральными уродами…</p><p class="p1">– Ну а как иначе наблюдать? Если сюда ссылать прекрасных людей, они не будут допускать ошибок, быстро построят совершенное общество по нашему образцу, и прощай вся затея. Мы сюда забрасываем самых таких, забыл, как это по-нашему… анкурлык.</p><p class="p1">– Ага. А всех хороших, случайно тут образовавшихся, отзываем к себе, поэтому лучшие поэты редко живут дольше тридцати семи. Игорь, почему все компутерщики такие обчитанные посредственной фантастикой?</p><p class="p1">– Ничего не посредственной, ты это сама придумала. Никто хороших не отзывает. Легенда о загробной жизни – продолжение воспоминаний о потерянном Рае. Типа здесь не пойми что, а где-то там есть правильная земля. Она есть, конечно, но туда почти никто не попадает.</p><p class="p1">– А как вы доставляете этих ваших плохих?</p><p class="p1">– Как-нибудь покажу. Дубов, например, сам сбежал.</p><p class="p1">– А обратно его никак нельзя?</p><p class="p1">– Нет, Кать, никак. Я его лично не пущу. У вас ему самое место.</p><p class="p1">Дубовым звался – и, надо сказать, весьма точно – ответственный секретарь «Офиса», редкий дурак и трус, по двадцать раз перепроверявший любой факт и вырубавший из текста даже фразы типа «Очевидно, что…». «Мы работаем для деловых людей, – говорил он с теплой комсомольской интонацией, – и не наше дело указывать им, что очевидно, а что нет. Вам очевидно, а им, может быть, не очевидно». Он с истинно собачьим чутьем отсекал все, что приносили живого, заменял удачные обороты на неудобочитаемые и бестрепетно лишал все тексты даже еле уловимого личного начала. В редакции «Офиса» собралась разношерстная публика, но Дубова ненавидели все. Только это – да еще дружная брезгливость относительно буфета – и сплачивало их в подобие коллектива.</p><p class="p1">– И откуда же у вас, в вашем прекрасном обществе, после долгой селекции еще берутся плохие люди?</p><p class="p1">– Сами не знаем. Что-то генетическое, вроде сбоя в программе. Один рождается без слуха, другой с ослабленным иммунитетом, а третий, например, клептоман. Это только у вас придумали зависимость от среды. От среды зависит не больше, чем от погоды. Но у нас, слава богу, быстро разбираются, что к чему. Всякая неприятная личность сюда попадает еще в детстве, в крайнем случае – в молодости.</p><p class="p1">– И ничего не помнит.</p><p class="p1">– Почему, помнит что-то… Иногда во сне видит… Летает там, как у нас. У нас многие летают, очень запросто.</p><p class="p1">– Ну хорошо, а ты что здесь делаешь? Такой славный?</p><p class="p1">– Инспекция, мать, инспекция. Надо следить, что тут у вас, и предупреждать у нас. Иначе на фиг бы вы и нужны, с вашими терактами. Инспектор быть профессия гордая, рискованная. Многий не возвращаться. Некоторый влюбляться земная женщина, любить крепко, много сильно, она его жрать, жрать, как у вас быть принято. Некоторый драться с жестокие мальчишки. Другой попадаться милиция при попытке освободить несчастные животные из зоопарк. Так что цени, я человек непростой.</p><p class="p1">– Это да, – согласилась она.</p></span></span>
