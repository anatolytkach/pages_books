<body class="z">
<span><div class="epigraph">
<p class="p1"><em>Ирке</em></p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v"><em>Соленый морской ветер</em></p>
<p class="v"><em>нес золу и пепел нам в лицо</em><a href="ch2.xhtml#id2" class="a">[1]</a>.</p>
</div>
</div>
<p class="text-author">Дафна Дюморье, «Ребекка»</p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v"><em>Пришли и сказали (дитя, мне страшно),</em></p>
<p class="v"><em>пришли и сказали, что он уходит.</em></p>
<p class="v"><em>Зажгла я лампу (дитя, мне страшно),</em></p>
<p class="v"><em>зажгла я лампу и пошла к нему.</em></p>
<p class="v"><em>У первой двери (дитя, мне страшно),</em></p>
<p class="v"><em>у первой двери пламя задрожало.</em></p>
<p class="v"><em>У второй двери (дитя, мне страшно),</em></p>
<p class="v"><em>у второй двери пламя заговорило.</em></p>
<p class="v"><em>У третьей двери (дитя, мне страшно),</em></p>
<p class="v"><em>у третьей двери пламя умерло.</em></p>
<p class="v"><em>‹…›</em></p>
<p class="v"><em>А если он возвратится,</em></p>
<p class="v"><em>что мне ему сказать?</em></p>
<p class="v"><em>Скажи, что я и до смерти</em></p>
<p class="v"><em>его продолжала ждать</em><a href="ch2.xhtml#id1" class="a">[2]</a>.</p>
</div>
</div>
<p class="text-author">Морис Метерлинк, «Двенадцать песен»</p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v"><em>Кто вышел, кто пришел,</em></p>
<p class="v"><em>кто рассказывает, кто умер?</em></p>
</div>
</div>
<p class="text-author">Лев Толстой</p>
</div><p class="empty-line"/></span>
</body>
