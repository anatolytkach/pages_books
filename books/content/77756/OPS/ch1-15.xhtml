<span><span><p class="p1">Музыка изменилась – замедлилась, смягчилась, хотя мотив не изменился; он был немножко похож на заставку «В мире животных» – но заставка «В мире животных» показалась бы на его фоне невыносимо грубой и навязчивой. Звуки были легкие, высокие, эоловы – и постепенно затихли, уступая место голосам дикой природы. В небе летел большой полупрозрачный ангел, оказавшийся при ближайшем рассмотрении местным орлом. Сквозь его нежнейшую плоть просвечивали хрупкие кости. «Он альбинос?» – «Да нет, у нас все такие». Стая белых ворон радостно окружала орла, он словно дирижировал ими, плавно и страстно взмахивая крыльями, – и из вороньих клювов изливалась тихая песнь, похожая на плеск кристальной воды в хрустале, на позвякиванье льдинок в серебре, на постукиванье самого чистого дождя по самому синему стеклу. Внизу водили хоровод жуки-олени с ветвистыми хрупкими рогами; жуки-скарабеи катили перед собой шары из чистого золота («Жук-золотарь, у нас там полно этого добра»), и бабочка с размахом крыльев не намного меньше орлиного взлетала с широкого горного плато и парила над пропастью, как дельтаплан. На крыльях у бабочки была реклама «Альфа-колы» («Специально вывели, у нас умеют»).</p><p class="p1">Дальше начинались истинные чудеса: беззвучно кланялись под ветром огромные лиловые цветы, похожие на трубы невиданных граммофонов; стеблей не было – цветы росли прямо из почвы, выстреливал такой зеленый побег – и тут же разворачивался нежной воронкой. Моллюск выбрасывался на берег, вставал на две немедленно отросшие ножки и робко, шатко, валко делал первые шаги, улыбаясь во всю раковину. Потом ему становилось тесно в раковине, и он перебирался в ванну; с ним играл веселый лупоглазый ребенок, похожий на Лынгуна. Четыре медузы, слившись в хороводе, начинали бешено кружиться, как лейка перед взлетом, – и образовывали единое существо, стройную морскую звезду о четырех лучах, танцующую у поверхности воды в припадке беспричинной радости: «Нет, нет, никогда не было никакой эволюции! Все одна легкая, пляшущая фантазия: захотим – соединимся, захотим – разъединимся, а можем так, а можем этак, все на свете – одно, все плавно и радостно перетекает друг в друга, друг другом, друг с другом, и нечего больше бояться!» Звенели лесные колокольчики, музыкально, на разные голоса, шумели еловые, папоротниковые и лиственные леса, тонко пел на ветру бамбук, и одинокое печальное существо, не желающее и не умеющее жить в стае, брело среди буйной растительности, предаваясь мечтам: тонкие стройные ноги, танцующая походка, полупоклоны, покрытое перьями сухощавое туловище, длинная шея, мягкий клюв, похожий на хобот, – страус не страус, слон не слон: «Как это называется?» – «Это называется ыскытун, типа поэт. Весной заливается – фантастика. Наш соловей».</p><p class="p1">Ыскытун, подумала Катька. Знакомое слово. Вообще говоря, спать хочется. Господи, как я давно не спала.</p><p class="empty-line"/><p class="p1">– <em>Все очень мило, но я слегка разочарована. Какой-то недостаток фантазии.</em></p><p class="p1">– <em>И совершенно правильно. Избыток фантазии – это уже революция, глупость, потеря вкуса. Надо улучшить чуть-чуть, но в этом «чуть-чуть», как мы знаем, и состоит все искусство. На Земле всё почти так – чуть грубее, чуть пошлее, мимо главной точки. Но эти мелочи копятся, и в результате все съезжает по диагонали, мимо главного. Стоит выправить тут, подрисовать там – и можно жить. Я диву иногда даюсь, по каким тонким мелочам тебя сразу распознал. Да, собственно, кроме них, и нет ничего.</em></p><p class="p1">– <em>Да, да, я тебя тоже очень.</em></p><p class="empty-line"/><p class="p1">– Жалко, что у меня в этой лейке нет фильма с городами. Там архитектура – это что-то. Зеркальные стены огромные, метров по десять, и по ним телепрограммы. Народ ходит и смотрит. Или картины классические. Представляешь, картина такая на сто квадратных метров! А кино какое, господи! Но кто бы что бы ни говорил, больше всего я люблю вокзал. Катька, он такой удивительный! Такой светлый! Все эти радуги, дуги, дыги… и аускутун дыгын плюсквамперфектум…</p><p class="p1">Он заговаривался и засыпал, вися в невесомости. Катька подгребла к нему, устроилась около плеча – отлично было так спать, ни на что не опираясь, и что они всё врали, эти космонавты, про трудности адаптации в космосе? Всю жизнь мечтала… Кажется, все позади. Она уснула, и ей снился вокзал с натянутым между аускутунами транспарантом «Привет покорителям космоса!» на главных земных языках и одном небесном. Солнечные зайчики плясали по лицам встречающих, по мозаикам узорчатого пола и стеклянным стенам, на которых показывали видовое стереоскопическое кино.</p></span></span>
