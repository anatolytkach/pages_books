<span><span id="id5"><div class="title2">
<p class="p">IV</p>
</div><p class="p1">– Ну? – только и сказал он.</p><p class="p1">Катька подняла на него зареванные глаза.</p><p class="p1">– Если ты придешь сам, – сказала она, – ничего не будет. Честно. Они же сказали – если кто-то придет сам, отпустим. На Библии клялись.</p><p class="p1">Игорь скривился, как от зубной боли.</p><p class="p1">– Да, – процедил он. – Надо было мне, дураку, думать…</p><p class="p1">– Ничего! Честное слово, еще можно… ты знаешь, все еще можно…</p><p class="p1">– Ты что, совсем? Вот же блин, как же я не учел, что ты именно так и подумаешь… Все эта подлая земная логика, когда же я этому выучусь, в конце концов!</p><p class="p1">Катька на секунду понадеялась, что все не так страшно, но тут же отбросила надежду – теперь ведь понятно. Эта версия объясняла все, с самого начала.</p><p class="p1">– И ты действительно думаешь, что я один из них?</p><p class="p1">Она быстро, жалобно закивала.</p><p class="p1">– Работаю под прикрытием «Офиса»?</p><p class="p1">– Черт тебя знает, под каким ты прикрытием. Ты мне поэтому и в компьютер не разрешал лазить.</p><p class="p1">– Идиотка! – простонал Игорь. – Господи, ну если уж ты такая идиотка – чего тогда про остальных?! Что за раса подлая, Каиново семя, как вы еще живы, я вообще не понимаю! Ты спала со мной два месяца, рассказывала мне все про себя и семью, говорила, что ближе меня у тебя нет человека! А потом, когда я тебя предупредил, чтобы ты сидела дома, ты за полчаса поверила, что я шахид!</p><p class="p1">– Не шахид, – затрясла она головой.</p><p class="p1">– Ну еще хуже! Вообще профессор Мориарти, Черная Фатима, организатор, все нити заговора, мозговой центр! Ты видишь себя со стороны хоть на столько?! Ты же… блин… ты же говорила, что дышать без меня не можешь!</p><p class="p1">– Да, да, – Катька ревела, кивала и тряслась.</p><p class="p1">– И как это все у тебя смонтировалось?</p><p class="p1">– Игорь, родненький… ну как же ты не понимаешь… ну ведь это не злодеи, хотя они и убийцы и все такое. Они просто мстят… и почему я не могла бы одного из них полюбить?</p><p class="p1">– Не злодеи? Ты это говоришь после всего… после этого?!</p><p class="p1">– Ну, я в том смысле, что они другие… не такие злодеи… не ради бабок же, в конце концов! Они просто не люди, это совсем другое дело. Ну вот и ты… я ведь тоже не совсем человек, я урод, я никогда не могла полюбить просто человека! Из-за этого всегда и мучаю всех…</p><p class="p1">Она заревела в голос. На них оглядывались. Впрочем, плакали в тот день многие, – Москва уже привыкала к истерикам на улицах, и к битью головой об асфальт, и к расцарапыванию лиц, но этого было как раз немного. Все-таки не Владикавказ, не Беслан. К чему нельзя было привыкнуть – так это к понурой, молчаливой толпе на улицах, к людям, шедшим на работу и в магазин как на заклание. В них была такая обреченность, которая хуже любой истерики.</p><p class="p1">– Значит, я по вечерам трахаюсь с тобой, а по ночам взрываю других русских?</p><p class="p1">– Ага.</p><p class="p1">– И кто бы я был после этого?</p><p class="p1">– Чеченец.</p><p class="p1">– Ка-тя! Да неужели по человеческим меркам не следовало бы заживо зажарить такого борца, который вечером спит с русской женщиной, а ночью взрывает ее братьев?!</p><p class="p1">– Следовало бы.</p><p class="p1">Она соглашалась, не понимая, что говорит. Ее здорово колотило.</p><p class="p1">– Черт, и не пойдешь никуда… Ка-тя! Очнись!</p><p class="p1">– Не могу. Игорь, две тысячи человек… две тысячи… ты понимаешь? Никогда столько не было, нигде… Хотя в «близнецах», кажется, было… Игорь, ну как так можно, а? Игорь, если ты знал и не сделал ничего, то как так можно, а?!</p><p class="p1">– Говорят тебе, я не знал! Знаешь же ты, что завтра будет утро!</p><p class="p1">– Н-не знаю, – повторяла она. – Не знаю. Теперь ничего не знаю.</p><p class="p1">Он схватил ее за руку и потащил за собой.</p><p class="p1">– Куда мы?</p><p class="p1">– В сквер, не торчать же тут у людей на виду.</p><p class="p1">– Я не пойду никуда, мне надо домой.</p><p class="p1">– Сейчас, сейчас, пойдешь домой… Нам же надо поговорить, ты сама хотела.</p><p class="p1">Они сели на лавку в сквере возле ее дома – это она вызвала Игоря сюда, не опасаясь больше, что знакомые их увидят вместе; метро закрыто, центр оцеплен, доехать до Свиблова она не могла. Можно, конечно, было поймать машину, переплатить, по окружной добраться до него – но у нее ни на что не было сил. Она загадала: если он все-таки приедет, значит, есть хоть крошечный шанс, что он не из тех. И он приехал, и теперь они сидели у пруда, вокруг которого почти не было гуляющих – матери с детьми предпочитали сидеть дома. Чрезвычайное положение еще не было объявлено, но его ждали. Никто еще толком не понял, что произошло. Раньше после каждого теракта Катьке кто-нибудь звонил, советовались, обсуждали, что делать, – теперь, когда на месте Комсомольской площади зияла яма глубиной в три метра, телефон замолчал наглухо, телепрограммы прекратились по случаю траура, президентское обращение задерживалось.</p><p class="p1">– Катька, – помолчав минут десять, чтобы она успокоилась, сказал Игорь. – Теперь-то ты понимаешь?</p><p class="p1">Она кивнула.</p><p class="p1">– Ты поедешь со мной?</p><p class="p1">– На Альфу Козерога?</p><p class="p1">– Неважно. Долго рассказывать. Ты сама-то видишь, что здесь больше оставаться нельзя?</p><p class="p1">– Вижу, – тупо сказала Катька.</p><p class="p1">– Высморкайся. Ты говоришь глухим басом, как Баба-яга из ступы.</p><p class="p1">Она послушно высморкалась. У нее не осталось ни сил, ни воли. Скажи он ей сейчас: «Садись в ступу, и полетели», – села и полетела бы, не зная, зачем и куда.</p><p class="p1">– Ты мне все еще не веришь?</p><p class="p1">– Почему, верю.</p><p class="p1">– Ну так и поехали!</p><p class="p1">– Куда?</p><p class="p1">– Это неважно, я тебе говорю! Надо уезжать отсюда!</p><p class="p1">– На чем?</p><p class="p1">Он стукнул себя кулаком по колену и отвернулся. Катька смотрела на пруд, по которому плавали желтые каштановые лапы о пяти толстых пальцах, липовые сердечки, кленовые ладошки. Все взорвалось, и органы неведомых существ раскиданы повсюду. Надо было дожить до того, чтобы в каштановой и кленовой листве мерещились оторванные ручки. Листья осыпались лавиной, да и все сыпалось. Как это я раньше не замечала, что осень – взрыв, что повсюду валяется мертвое, только что бывшее живым? Как страшно листьям, но ведь нам страшней. У них есть какая-то надежда – деревья остаются, все продолжится; а где наши деревья? Ветер может сколько угодно таскать листву по асфальту, по чахнущему газону, – живей она от этого не сделается.</p><p class="p1">– Хорошо, – сказал он наконец. – Это уже против всех инструкций и вообще против совести. Но меня так и так отзывают, терять нечего. Я тебе покажу тарелку.</p><p class="p1">Некоторое время до Катьки не доходило.</p><p class="p1">– Ты же сказал, тарелок не бывает.</p><p class="p1">– Неважно. Полное название ты все равно не поймешь. Считай, что тарелка.</p><p class="p1">– Где она?</p><p class="p1">– У меня на даче. В Тарасовке, по Курской дороге.</p><p class="p1">– В смысле?</p><p class="p1">– В обычном смысле, в сарае.</p><p class="p1">– Подожди. Откуда у тебя дача?</p><p class="p1">– Почему у меня не может быть дачи?</p><p class="p1">– Но ты же заслан. Ты что здесь, с пятидесятых годов?</p><p class="p1">– Почему с пятидесятых?</p><p class="p1">– Ну… когда давали дачи…</p><p class="p1">– Господи. Купили мне дачу, чтобы было где хранить тарелку. Трудно, что ли? Где я, по-твоему, должен ее держать в городе?</p><p class="p1">– Она… она очень большая, да?</p><p class="p1">– Не очень. Но там стартовая площадка, там вообще все для взлета. Как я буду взлетать из Свиблова? С крыши, как Карлсон? Она сама по себе компактная, я мог бы ее хоть под кроватью держать. Но нужно пространство, чтобы… ну, старт и все…</p><p class="p1">Катька смотрела на него внимательно и испуганно. Он не шутил.</p><p class="p1">– И когда мы едем?</p><p class="p1">– Поедем завтра.</p><p class="p1">– А что я дома скажу?</p><p class="p1">– Не знаю. Что хочешь. Учти, у тебя остается шесть дней. И взять я могу только пятерых – плюс Полька.</p><p class="p1">– Итого мне надо набрать еще троих.</p><p class="p1">– Да.</p><p class="p1">– Нет. Я не могу решать, кому спасаться, а кому сдохнуть.</p><p class="p1">– Тогда все сдохнем.</p><p class="p1">– Может, еще и не все.</p><p class="p1">– Ну, не знаю. Если хочешь, давай поэкспериментируем. Кто-то, конечно, уцелеет. Кто-то даже будет мародерствовать. Жилплощадью торговать. Освободится много жилплощади, и она капитально подешевеет. Самое жуткое, что уезжать все равно придется. Сама запросишься. Человеку гораздо трудней умереть, чем он себе представляет. Только тогда уже все будет очень сложно. И добираться, и стартовать.</p><p class="p1">– Послушай! А ты не мог бы нас эвакуировать… ну, скажем, в другую страну?</p><p class="p1">– Куда? В Африку?</p><p class="p1">– Почему в Африку. В Штаты, например.</p><p class="p1">– A-а. Наш муж нас все-таки уговорил.</p><p class="p1">– Ну правда, почему не туда?</p><p class="p1">– Потому что туда у меня нет возможности, извини. У меня нормальный межпланетный корабль, а не «Дельта эйрлайнс». Хочешь туда лететь – лети, оформляйся, но не советую. Там тоже уже началось, а за неделю так продвинется, что как бы они сами сюда не побежали. Остается, конечно, Австралия – но это, сама понимаешь, не вариант.</p><p class="p1">– Ну да. Альфа Козерога, конечно, надежнее.</p><p class="p1">– Гораздо надежнее, – серьезно сказал Игорь. – Ты вообще это… не трогай Альфу Козерога. Ты там не была, в конце концов. Мне тоже не ахти как приятно выслушивать все эти гнусности про родину.</p><p class="p1">– Ты любишь родину? – спросила Катька.</p><p class="p1">– Да, – ответил Игорь, – я очень люблю родину. У меня приличная родина, и на ней живут приличные люди. Тебе понравится. Там не может не понравиться.</p><p class="p1">– Да, да, – кивнула Катька. – Живые деньги.</p><p class="p1">– При чем тут живые деньги! – взорвался он. – У нас вообще можно… можно жить без этого всего! У вас же каждый живет, будто делает нелюбимую работу – и главное, стопроцентно бессмысленную! Все друг друга еле терпят… У нас же – ты понимаешь? – действительно все по-человечески! Все сделано для радости. Ты сама все поймешь, правда. Я как только наш вокзал представлю…</p><p class="p1">– Какой вокзал? – дернулась Катька.</p><p class="p1">– Центральный вокзал! Там встречают приезжих. Ты сразу попадешь в такое… такое поле любви… Ты почувствуешь, что тебя ждут, что тебе рады! У вас ведь как – куда ни приедешь, в какой город ни выйдешь с вокзала, сразу первое чувство, что ты не нужен, что тебя не должно быть! Автобусы какие-то заляпанные грязью, таксисты дерут втридорога, горожане ползут, не глядя друг на друга… И так везде, в любой Америке! Никто никому даром не нужен! Если бы ты знала, как я тут вообще… задыхался до тебя. Ты же совсем наша, ты умеешь радоваться другому человеку, умеешь просто делать другому хорошо! Тебе самой это в радость, это же страшно естественная вещь. А у нас так все, тебе там будет в сто раз проще адаптироваться, чем в Штатах. Чем хочешь клянусь. Господи, я так его и вижу…</p><p class="p1">– Кого?</p><p class="p1">– Вокзал. – Игорь мечтательно уставился в холодные небеса. – Огромный хрустальный купол, и такое, знаешь, преломление – всё в радужных пятнах, весь пол.</p><p class="p1">– И оркестр, да? Дрожит вокзал от пенья аонид?</p><p class="p1">– Откуда ты знаешь?</p><p class="p1">– Это не я, это стих такой.</p><p class="p1">– Пенье, да. Оно наплывает отовсюду, и ты идешь как в звуковом шаре. И все запахи, и все цвета – все лучшее, что вообще может дать планета. Она тебе как бы сразу открывается всеми сторонами, и пейзажи по стенам движущиеся. Такой просторный, просторный мир! Все вдвое больше – улицы, здания. Мне так дико тесно у вас все время… Только в Тарасовке могу дышать, но я редко там бываю. Мне нельзя, чтобы соседи часто видели. Только на профилактику езжу, смазать там, проверить… ну, и по выходным иногда… когда здесь совсем достанет.</p><p class="p1">– Это сколько от Москвы?</p><p class="p1">– Километров семьдесят.</p><p class="p1">– А что, люди тоже больше наших? Там, на Альфе?</p><p class="p1">– Не то чтобы больше. Другие. Я тебе здесь не могу рассказать. Пока будем лететь, подготовлю. В тарелке есть проектор, там все покажу. Целая программа для прилетающих. Просто чтобы в дороге посмотреть, подготовиться.</p><p class="p1">– А здесь нигде нельзя? В Москве?</p><p class="p1">– Здесь я энергии столько не наберу, – виновато сказал он. – Там изображение объемное, я это могу запустить только от двигателя. Подожди, через неделю полетим – все увидишь.</p><p class="p1">– А если она компактная – как мы полетим, вшестером-то? И с тобой?</p><p class="p1">– Ну… она сейчас не в рабочем состоянии. Она как бы такой эмбрион. Надо расконсервировать, только по зиме уже трудно. Надо пока снега нет. При минусовой температуре она очень долго будет греться. Народу набежит – из пушки не разгонишь. А у меня, к слову сказать, и пушка так себе.</p><p class="p1">Эти милые детали долженствовали, надо полагать, окончательно убедить ее в реальности происходящего, но до нее до сих пор не доходило – что за эвакуация, какая тарелка? Все пришло из фантастики, из сна, из их собственных прелестных игр, теперь невыразимо далеких, – но зачем ему продолжать игру теперь, когда серой запахло по-настоящему, она понять не могла.</p><p class="p1">Он это почувствовал – он всегда все чувствовал.</p><p class="p1">– Кать. Ты действительно полагаешь, что если мы из космоса, то должны во все тут вмешиваться? Ты решила, что сверхъестественная сила прилетит и всех спасет? Не будет этого, Кать. Вы со своей этикой вечного вмешательства в чужие дела уже так вляпались – вас теперь никакая сила не выволочет. Ты поживешь у нас и поймешь, у нас все рано или поздно понимают. Нельзя вмешаться в другой вид, нельзя вас сделать нами. Можно только забрать тех, кого стоит спасти.</p><p class="p1">– И почему ты решил, что стоит именно меня?</p><p class="p1">– А разные есть подходы. – Он улыбнулся и взял ее за руки. – У нас иногда думали: брать надо гениев. Или там детей. Или инвалидов. «Места для пассажиров с детьми и инвалидов». Некоторые до сих пор так делают, мучаются с выбором ужасно. Но я эвакуатор столичной школы, там особый подход. Нас учили просто: чтобы понять землян, надо жить нормальной земной жизнью. И с кем тебя сведет эта жизнь – того и забирай. Нечего выдумывать. Нету никаких критериев. Брать надо тех, с кем самому хочется жить. А гениев набирать… большинство ваших гениев, честно тебе скажу, по нашим критериям ходят в класс пятый, шестой. С прогрессом мы как-нибудь сами разберемся. Приличных людей надо спасать, и все.</p><p class="p1">– А как себя будут чувствовать эти приличные люди, которые отсюда сбегут? У каждого ведь целая паутина, ты знаешь? Отцы, матери, сестры, друзья, дети, одноклассники детей… Это счастье еще, что у меня родители в Германии… кстати, там тоже что-то будет или как?</p><p class="p1">– Ну, не так, как здесь, – сказал он и отвел глаза.</p><p class="p1">– Так, может, мне к ним?</p><p class="p1">– Может, к ним! – взорвался он. – Давай, не держу! А я мужа заберу, зачем он тебе там! Мы с Сереженькой на Альфу полетим, а ты с дочерью – к родителям. Будешь мне е-мейлы слать, я адрес оставлю. Игор собака Альфа косм. Косм – это космическая связь, у нас своя Сеть.</p><p class="p1">– Что, честно?</p><p class="p1">– Нет, нечестно. Еще бы не хватало в земной Интернет лазить. Кать, ты что… ты правда со мной не полетишь?</p><p class="p1">– Прости, но представь такую ситуацию: у меня здесь родители, брат, любимая подруга, которая во всех отношениях лучше меня, и двое детей. Мне, допустим, тридцать. Да, и еще собака, которую я не могу тут бросить. А ты можешь взять триста двадцать кило, как лифт. И что мне делать?</p><p class="p1">– Выбирать, – хмуро сказал Игорь. – Или оставаться.</p><p class="p1">– Да? А кто мне дал право решать, кому жить, кому умереть?</p><p class="p1">– Я дал тебе право, – зло сказал он.</p><p class="p1">– А тебе кто его делегировал?</p><p class="p1">– Наблюдательный совет, – он достал из бумажника пластиковую карточку со странной голограммой: высокий узкий цилиндр с отводной трубкой наискось летел среди золотистых облаков. Больше всего это было похоже на водительские права. Никаких букв на карточке не было – была фотография Игоря с сильно вытянутым лицом и слегка выкаченными глазами. Вид на фото у него был идиотский.</p><p class="p1">– Ты там… такой? – после паузы спросила Катька.</p><p class="p1">– Я и здесь скоро буду такой, с тобой пообщавшись.</p><p class="p1">– Нет, а что… ведь ты же уже кого-то эвакуировал, верно?</p><p class="p1">– Было дело.</p><p class="p1">– Кого?</p><p class="p1">– Кать, не время ревновать совершенно.</p><p class="p1">– Да я не ревную, при чем тут вообще! Я хочу понять: они как, легко на это шли?</p><p class="p1">– Нелегко.</p><p class="p1">– Но шли?</p><p class="p1">– А там, знаешь, выхода не было. В Абхазии, например, в девяносто пятом году. Я все старался на юга, там немножко похоже… на наш климат. В Баку в восемьдесят девятом тоже было особо не до того… Самое смешное, конечно, когда вещи с собой берут. Жуткое количество. Там больше всего мучились даже не из-за людей, – мне все какие-то попадались довольно одинокие, не больше десяти ближайших родственников, – он кисло усмехнулся. – Очень мучились из-за нажитого. Вашим людям так трудно все достается! Я одну семью забирал, они говорят: а можно диван? А это у меня первая поездка была. Я их так обложил, до сих пор стыдно…</p><p class="p1">– Это сколько же тебе было? Четырнадцать? – быстро посчитала она в уме.</p><p class="p1">– Не совсем, мать, не совсем. У нас время немножко другое, я из-за всех этих перелетов подконсервировался. Ваш земной год примерно вдвое меньше нашего, мы там пока полный оборот сделаем – с ума сойдешь… Короче, это мне моих тридцать. А ваших шестьдесят.</p><p class="p1">– Ты такой старый? – не поверила она.</p><p class="p1">– Да молодой я, господи. Я твой ровесник примерно. На сколько выгляжу, столько мне и есть. Я просто живу немножко дольше. Понимаешь? Опыт другой.</p><p class="p1">– Ну и как я буду жить… там? Сколько мне по-тамошнему?</p><p class="p1">– Двенадцать примерно, – он хихикнул. – Причем и по-здешнему, как мне иногда кажется, ты в этих пределах.</p><p class="p1">– Это почему? Потому что не бегу, задрав штаны, в эту твою тарелку?</p><p class="p1">– Да нет. Недоверие такое, знаешь… Детское. Ребенок почему ничему не верит? Он массу вопросов задает: а как это устроено? А как то? А почему у вас здесь не сходится? А борода у вас приклеенная или как? А взрослый человек уже понимает, что жизнь довольно иррациональна. И чем иррациональней, тем достоверней. Ему не надо спрашивать: а какая у тебя тарелка? А на чем она летает? А какое мое моральное право? Он просто понимает: вот у меня ситуация, мне надо решать, о причинах и моральных правах подумаем после. И делает взрослый выбор.</p><p class="p1">– Интересно, – сказала Катька. Она почему-то успокоилась – наверное, потому, что рядом был действительно взрослый человек, готовый за нее решать. Это еще вопрос, поступим ли мы так, как нам советуют; но мы не безразличны, нами занимаются – уже неплохо. Ей-то всегда казалось, что Игорь безнадежный инфантил, за то и любила, потому, если честно, и не торопилась сбегать к нему; вот оно как все оборачивается. – А если у тебя там семья?</p><p class="p1">– У эвакуаторов, Катя, семьи не бывает. Мы, если женимся, становимся профнепригодны. Начинаем жизнью дорожить, все такое. Я теперь буду, видимо, простым наблюдателем. Турдын-коол. Хрен меня, женатого, выпустят с Альфы.</p><p class="p1">– Сколько лететь-то? – буднично спросила Катька.</p><p class="p1">– Ваши сутки где-то.</p><p class="p1">Помолчали.</p><p class="p1">– Могу я рассказать мужу?</p><p class="p1">– Не знаю, извини. Я эвакуатор, а не турдын-коол. Турдын-коол делает прогнозы, дает рекомендации, у него четыре высших образования и зарплата в десять зверьков. А я эвакуатор, низшая ступень в иерархии, ниже только президент, потому что от него вообще никакой пользы.</p><p class="p1">– А зачем он вам тогда?</p><p class="p1">– Ну как… положено. Не с нас началось, не нами и кончится.</p><p class="p1">– Игорь, – сказала Катька, заглядывая ему в глаза. – Ну а вот… если бы ты? Если бы тебя так? Ты поехал бы или нет? Если у тебя десять близких, а взять можно пять?</p><p class="p1">– Я тебе, Катя, скажу жестокую вещь, – ответил он спокойно. – У хорошего человека не бывает много близких. Он понимает, что ваш мир вещь ненадежная, и старается не заводить лишней родни, которая была бы слишком от него зависима. Зависимые нужны людям дурным, слабым, боящимся остаться с собой наедине. Приличные люди одиноки, им нужны, как правило, три-четыре человека. Надо уметь обходиться, не порабощать, не нагружать собой. Тоже этика.</p><p class="p1">– Послушай! Давай отправим их всех, а сами останемся?! – Эта мысль только что пришла Катьке в голову. – Давай, ей-богу! Это же шикарный вариант! Представляешь, все любимые в безопасности. Все души милых на высоких звездах. Как хорошо, что нечего терять! Зато как нам будет отлично вдвоем! – Она даже вскочила. – Представляешь, все накроется. Нас двое, у нас последняя ночь. Ну чудесно же! Или ты не хочешь умирать вместе со мной?</p><p class="p1">– А тарелку муж поведет? – спросил Игорь.</p><p class="p1">Катька сникла.</p><p class="p1">– А это… а на автопилоте как-нибудь нельзя?</p><p class="p1">– Как-нибудь нельзя. Кать, я тебе все условия обрисовал уже несколько раз. Если остаемся, то остаемся все. Если летим, то летим всемером: я, ты плюс пятеро по твоему выбору. Дочка не считается, она как бы часть тебя. Дальше думай, ты человек взрослый. У вас очень много врут. Очень много сволочей, и они придумали всякие тормоза. Сами они, заметь, никогда их не придерживаются. Я вообще от вашей морали скоро всякие ориентиры потеряю. Все ваши моралисты живут по одному принципу: нам можно все, а вам ничего. Если человек говорит про мораль – все, он мне ясен. Особенно такие, которые за нашу и вашу свободу. Свобода у них на экспорт, это я сразу понял. Тьфу, мразь! Гурулум, кундур! Тускупук…</p><p class="p1">– А ты, значит, гырылым, кындыр? Тыскыпык?</p><p class="p1">Он расхохотался.</p><p class="p1">– Повтори!</p><p class="p1">– Не смогу. А что?</p><p class="p1">– Ты знаешь, что ты сейчас сказала? Свежая пища, здоровый стул, чистое дыхание!</p><p class="p1">Катька, обессилев, прижалась к нему.</p><p class="p1">– Нет, конечно, я тебя не оставлю… Нет, нет, моя свежая пища…</p><p class="p1">– Мужу скажешь?</p><p class="p1">– Нет, какое… Ты понимаешь, я все-таки должна увидеть. Мне кажется, если я увижу, что-то решится само собой!</p><p class="p1">– Не думай, не решится.</p><p class="p1">– Почему? Почему ты так думаешь?!</p><p class="p1">– Потому что знаю. Я же ее видел, Кать. Я в ней каждый винт знаю. Она может, конечно, произвести впечатление. Но решать должна ты, серьезно.</p><p class="p1">– Хорошо. Когда мы едем?</p><p class="p1">– Электричка в десять тридцать, раньше они все мимо Тарасовки идут. Давай, что ли, на Курском вокзале – метро-то вряд ли откроют.</p><p class="p1">– Ну ладно. – Она встала со скамейки, оправила коричневое пальтишко. – Пойду.</p><p class="p1">– К себе?</p><p class="p1">– А куда? Естественно, к себе.</p><p class="p1">– И что будешь делать?</p><p class="p1">– Буду думать.</p><p class="p1">– Ну, думай. Оденься там попроще, по-дачному.</p><p class="p1">Он легко поднялся, и некоторое время они стояли друг напротив друга.</p><p class="p1">– Игорь… – Катька опять заглянула ему в глаза, снизу вверх. – Ну, а то, что тут потом будет… это как примерно произойдет?</p><p class="p1">– Не знаю. Думаю, что будет все сразу. Погромы, эпидемии, и хорошо, если без саранчи. Долго копилось.</p><p class="p1">– Да. Ну, чего – значит, завтра на Курском?</p><p class="p1">– Давай. Третий путь, подходи в десять пятнадцать, около киоска «Соки – воды».</p><p class="empty-line"/><p class="p1">Очутившись у себя, она тут же освободилась от его обаяния: это происходило сразу, наверное, и впрямь есть магнетизм любви. В физическом отсутствии любимого – залог нашей свободы. На этот раз он действительно заигрался, чего уж, – но при этом Катька ни секунды не сомневалась, что завтра поедет на Курский вокзал, на его дачу, смотреть несуществующую тарелку или что у него там спрятано на участке. Вообще, если у него была задача вывести ее из оцепенения и отвлечь от ужасов, он справился блестяще. Страх у нее теперь остался только один: выбрать не тех.</p><p class="p1">Допустим, мы никого не выбираем. Мы просто прикидываем, такая проверка, да и что мне еще делать сейчас, в рассеянном свете, в три часа пополудни? Раньше это было наше любимое время – перелом от дня к вечеру, еще целых два часа будет светло. Дочь в детсаду, Сереженька ушел в магазин, оставив записку, в которой каждая буква, мнится, глядит на нее с укоризной. Вот, он-то не паникует, он-то пошел в магазин, пока она тут бегает на сомнительные встречи (не нашла предлога умней, чем встреча с мифическим работодателем, предлагающим приличные условия). Сереженьку нельзя не взять, это не обсуждается. Свекровь? Он не полетит без свекрови. Свекровь не полетит без соседки, соседка не может жить без собаки колли, собака колли умрет без своего лучшего друга эрделя, эрдель не полетит без хозяйки, хозяйка – без мужа, муж – без любовницы… Катьке представился космический корабль, за которым в безвоздушном пространстве тянулась жалкая вереница до самой Земли: дедка за репку, бабка за дедку, Жучка за бабку… и где-то еще в самом низу всех тормозил один, буквально не способный жить без кремлевской башни: ну куда же, куда же я без нее полечу! И цеплялся, болезный, за звезду, и все они живой цепочкой тормозили фотонный двигатель, удерживая эвакуатора на привязи, и зрелище это было так трогательно, что Катька рассмеялась, одна, сама с собой. А вокруг мигают потрясенные светила. Что мы за люди, в самом деле, как надежно умудряемся повязать себя и друг друга тысячами живых паутинных связей: нельзя никуда уйти, уехать, ни с кем порвать – все липнет, держит, и если эвакуатор – о, был бы только на самом деле какой-нибудь эвакуатор! – потянет нас когда-нибудь за луковку, выстроится сущая пирамида, геометрическая прогрессия, каждый не может еще без двадцати… и при такой повязанности почему же у нас жизнь-то такая непереносимая, господи, ведь так все друг без друга не могут! Честное слово, было бы уже как-то желательно, чтобы нас любили меньше. Инопланетянин отказывается спасаться без меня, я – без мужа, муж – без матери… зачем нам столько? Каким адом должна быть жизнь, если от любого столкновения с ней надо заслоняться таким количеством других! Родня: как хорошо, что у меня мало родни. Закатки, огурки-помидорки. Ненавижу! Ненавидела еще в общаге, и особенно – когда приезжали в ДАС эти родственнички, останавливались, подселялись, привозили с собой всякое, бегали осматривать Москву… ну, не ужас ли? Ведь говорить все равно было не о чем. Сидели, ласкали друг друга глазами. А как иначе? – нельзя: родня. Самое архаичное, досознательное: свои. Но ведь давно чужие, как мы с Сереженькой, как все со всеми, – для чего врать? Кого бы я взяла? Стоп, хватит. Я запрещаю себе об этом думать. Никогда больше ни слова. Наверное, есть какой-то порок в наших отношениях, если мы не можем не играть в идиотские игры; наверное, мы сами виноваты, что не можем по-взрослому. А как по-взрослому? Съехаться, забрать дочь, по утрам в сад, потом на работу… то есть семейная жизнь, вошедшая в колею. Нормально? Как люди? К чертовой матери таких людей…</p><p class="p1">Щелкнул замок, и тоже как-то укоризненно – человек с тяжелой сумкой возвращается домой, надо немедленно открыть дверь…</p><p class="p1">Человек, однако, никаких тяжестей не нес.</p><p class="p1">– Там знаешь какие очереди? И хлеб, между прочим, подвезут только к вечеру. Я только соли взял.</p><p class="p1">– Ну и ладно, – сказала она, – съедим пуд соли.</p></span></span>
