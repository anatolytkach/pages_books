<span><span id="id10"><div class="title2">
<p class="p">IX</p>
</div><p class="p1">«Люблю люблю буду ждать сколько надо если не дождусь не полечу буду Тарасовке приезжай туда с кем хочешь тоскую умираю вскл единственная самая лучшая приезжай скорее тут нечего больше делать готовлю лейку летим вскл жду люблю не могу могу хочу крышу сносит добирайся скорей верю сумеешь зпт эвакуатор 5.11. P. S. Если поедешь машиной поворот Тарасовку после Шараповой Охоты двести метров будет указатель потом по бетонке направо дальше найдешь».</p><p class="p1">За что она его любила – так это за способность шутить в любых обстоятельствах. Даже почерк был спокойный, наклонный, острый. Что ж это, ведь я впервые вижу его почерк. Катька поцеловала записку и аккуратно сложила ее. Значит, он уехал пятого, как и собирался, и теперь активизирует лейку. Вовремя успел, но ждал до последнего. Вокруг уже горело, причем как-то странно – очагами, точками; одни дома еще стояли невредимо, другие тлели, из подвалов валил зловонный дым, и огонь, кажется, распространялся под землей – то ли по коммуникациям, то ли просто сама земля уже понемногу воспламенялась, как торф в жару.</p><p class="p1">Дом Игоря был пуст, жителей не оставалось – мимо Катьки быстро прошел лысый мужчина, которого она часто видела выгуливающим собаку; на руках он нес постанывающую хрупкую старуху, завернутую в одеяло. Он вынес ее из подъезда, пихнул на заднее сиденье последних стоявших около дома «жигулей», прыгнул в машину, резко стартовал и умчался.</p><p class="p1">Катька чувствовала ступнями стремительно нагревающийся пол – скорей всего, это была иллюзия, а может, земля действительно горела под ногами, чем черт не шутит. Было семь вечера, время, когда безвредный мальчик, ыскытун, обычно начинал свой безумный танец. Она выскочила из подъезда, махнула дяде Боре, чтобы ждал, и бегом понеслась в длинный дом по Снежной. По дороге она миновала их кафе – то, где работали утопленники из Свибловских прудов. Господи, неужели когда-то они сюда заходили с Игорем? Можно было зайти в кафе, была какая-то почти пристойная жизнь… Как быстро все происходит, боже мой, как быстро: сегодня ты верная супруга и добродетельная мать, а завтра от твоего дома ничего не осталось, и разрушила ты его своими руками. Сегодня ты столица какой-никакой страны, а завтра трещишь по швам, и на улицы твои прорывается подземное пламя. Когда надо, все делается сразу. По этому признаку и узнается то, что надо. На двери кафе висело рукописное объявление: «Закрыто до 8.11».</p><p class="p1">Непонятно, подумала Катька. Это что же, они рассчитывают открыться после конца света? Когда каждый уже уравняется с ними, пройдя через главное испытание и обретя свое предназначение? Хорошая публика соберется у них восьмого ноября… Надо будет зайти, если не взлетим по техническим причинам.</p><p class="p1">Какой же подъезд? Третий, третий… второй этаж… Какая квартира? На лестничной клетке их было восемь, по четыре справа и слева; в пяти были открыты двери и все являло вид внезапного бегства. По полу змеился одинокий шарф – забыли! Катька метнулась к трем закрытым дверям справа от лифта, бешено нажала кнопки звонков – один дилидонил, другой чирикал, а третий зазвонил резко, как будильник, и эта третья дверь открылась. На пороге стоял лысый сутулый мужчина лет пятидесяти, до того придавленный всей своей жизнью, что никакая московская катастрофа не смогла бы испугать его больше.</p><p class="p1">– Скажите, – задыхаясь, выпалила Катька (удушливый дым полз снизу, пахло паленой резиной), – скажите, у вас не живет мальчик?</p><p class="p1">Сутулый мужчина молча отступил в сторону и кивком указал ей на обшарпанную дверь меньшей комнаты. Мельком она увидела убогую обстановку большей. У окна стояла испуганная маленькая женщина и смотрела на Катьку в немой невыносимой тревоге.</p><p class="p1">– Я быстро, – сказала Катька зачем-то и толкнула дверь.</p><p class="p1">В маленькой комнате, в которой действительно стоял шкаф из ДСП, а кроме него письменный стол с облезлым стулом и аккуратно, по-солдатски застеленная кровать, – кружился высокий стройный мальчик с высокой черной шапкой волос. При виде Катьки он учтиво поклонился, словно давно ее ждал, и продолжил свое кружение от окна к стене, чуть покачивая руками при поворотах. Двигаясь к окну, он кружился по часовой стрелке, а возвращаясь к стене – против: наверное, чтобы не закружилась голова.</p><p class="p1">– Заходите, пожалуйста, – сказал он очень вежливо. – Простите, что я должен с вами разговаривать вот так, но прерваться мне нельзя.</p><p class="p1">– Благодарю вас, – в тон ему ответила Катька. Мальчику было на вид лет семнадцать, на нем были узкие джинсы и клетчатая ковбойка.</p><p class="p1">– Вы, наверное, хотите узнать, зачем я это делаю? – спросил мальчик ломким голосом.</p><p class="p1">– Нет, я уже поняла. Я только не уверена, что по нынешним временам этого достаточно.</p><p class="p1">– Иногда мне тоже кажется, что уже ничего не спасешь, – спокойно отвечал мальчик, – но задумываться о таких вещах вредно. Если задумываться об очевидном, можно забыть свои обязанности.</p><p class="p1">– Как вас зовут? – спросила Катька.</p><p class="p1">– Меня зовут Валентин, – ответил он с поклоном. – А вас?</p><p class="p1">– Меня зовут Екатерина. Можно Катька, – сказала она и сделала реверанс. – Валя, я бы хотела, чтобы вы поехали со мной. Если настаиваете, я могу забрать и ваших родителей.</p><p class="p1">– Благодарю вас, – твердо сказал Валя, подтанцовывая к окну, – но это совершенно невозможно. Меня ведь никто не освобождал от моих обязанностей.</p><p class="p1">– А кто вас мог бы освободить? – спросила Катька, кружась рядом с ним. Получался почти вальс, но поврозь. – Знаете, один мальчик тоже был обязан хранить свое честное слово и стоял на посту три часа, хотя игра в войну давно закончилась. Его мог освободить только военный. Скажите, какого человека привести вам.</p><p class="p1">– Это не человек, – сказал мальчик, беря ее за талию и осторожно кружа, – и вам вряд ли удастся его привести, Екатерина. Я думаю, что он скоро придет сам.</p><p class="p1">– Валя, но если все действительно серьезно? Если вы никого этим не спасете?</p><p class="p1">– Я не должен об этом думать, – виновато сказал Валя. – Может быть, и не спасу. Мне кажется, вся беда именно оттого, что мы все время думаем: а что, если? А надо делать, и все. Каждому ведь сказали, но делают очень немногие.</p><p class="p1">– Валя, а родителей вам не жалко?</p><p class="p1">– Очень жалко, – сказал Валя, отвешивая полупоклон окну. – Но если солдата призывают, родителей тоже жалко. А он все равно идет, верно?</p><p class="p1">– Хотите, я заберу их?</p><p class="p1">– Не надо. Они все равно не поедут.</p><p class="p1">– Ну ладно, Валя. Мне пора. Я уезжаю насовсем.</p><p class="p1">– Екатерина, я желаю, чтобы все у вас было благополучно, – сказал он вежливо. – Благодарю за то, что вы пришли. Вы чудесно танцуете. С тех пор, как я получил приказ, у меня почти никто не бывает.</p><p class="p1">– Если у вас получится все спасти, я обязательно вернусь, – сказала Катька.</p><p class="p1">– Буду ждать, – ответил мальчик, продолжая кружиться.</p><p class="p1">Катька вышла из комнаты.</p><p class="p1">– Может быть, покушаете? – робко спросила мать мальчика, по-прежнему не отходя от окна. Видимо, здесь действительно редко бывали гости.</p><p class="p1">– Спасибо, – сказала Катька, густо краснея и чувствуя себя предательницей. – Я еще зайду.</p><p class="p1">Можно было, конечно, позвать дядю Борю, схватить мальчика в охапку, уговорить родителей… Но что-то ей подсказывало, что это будет неправильно и даже грешно – все равно что снимать часового с поста. Она сбежала по лестнице и увидела, что по стене дома зазмеилась извилистая трещина. Страшный гул нарастал вокруг. Катька подбежала к «газели».</p><p class="p1">– Поехали, дядь Боря, – выдохнула она.</p><p class="p1">Дядя Боря невозмутимо завел мотор, и они поехали в красный туман, в сторону кольцевой дороги. Он вел машину спокойно, но очень быстро. В уазике все молчали. Когда выехали из Свиблова, Катька услышала позади грохот и рев – пространство стремительно смыкалось за ними, и вместо Свиблова стояла сплошная стена огня. Мир схлопывался, и прямо за ними неслась волна невыносимого жара, накрывая город, плавя асфальт, валя на своем пути дома, тополя, фонари.</p><p class="p1">– Не спас, значит, – сказала Катька.</p><p class="p1">Дядя Боря кивнул, словно понимал, о чем речь.</p><p class="p1">– Вот и всё, – сказал Сереженька.</p><p class="p1">– От и сё! – радостно крикнула Подуша.</p><p class="empty-line"/><p class="p1">Катька с трудом нашла нужный поворот. Тьма была кромешная, лил дождь, а на севере, на месте Москвы, тлело зарево. Почему все случилось еще до седьмого, Катька не понимала. Видимо, город успел рассыпаться и сгореть до того, как его взорвали, – как в одном рассказе Грина голова приговоренного оторвалась сама, несмотря на помилование, просто потому, что все время думала о казни. А вообще это было в московских традициях – Наполеон тоже хотел захватить варварскую столицу и насладиться ее разграблением, но она успела устроить самосожжение и обломить ему весь триумф. Получилось остроумно. Вот тебе, Шамиль, чмо одноногое, бритое, исламское. Пришел взрывать, а там уже ни фига.</p><p class="p1">Последние слова она произнесла вслух, и сзади послышался всхлип.</p><p class="p1">– Ой, Майнат, – сказала Катька. – Прости, пожалуйста.</p><p class="p1">– Никто нам не верит, даже ты не веришь, – завела чеченка. – Все говорили – Шамиль, Шамиль, а у вас все само сгорело. Давно нет никакого Шамиля, и письма сам Путин писал. Аллахом клянусь, хлебом клянусь.</p><p class="p1">– Да ладно тебе, – сказала бабушка.</p><p class="p1">– А дома, вы скажете, тоже Путин взрывал? – не выдержал Сереженька.</p><p class="p1">– Аллахом клянусь! – крикнула чеченка. – Зачем нашим было дома взрывать? Что, хотели, чтобы совсем нас всех зачистили? Никогда наши не взрывали ваши дома, всё ваши взорвали, чтобы нас зачернить! Бедный народ, гордый народ… Ты знаешь, что они делают с нами в фильтрах? Ты был в фильтрах? У меня кости целой не осталось, почки отбиты, зубы отбиты!</p><p class="p1">– А головы нашим кто резал?! – заорал Сереженька.</p><p class="p1">– Да ладно вам, – сказал дядя Боря. – Теперь-то чего. Кать, тут налево?</p><p class="p1">Начался дачный поселок. Свет фар полз по скользкой темной дороге и подпрыгивал на колдобинах. Катька отсчитывала: пятая, шестая, седьмая линия… Еще издали она узнала каменный дом соседа Коли. В доме горели все окна: очевидно, сосед успел вывезти семью из Москвы. А у Игоря было темно, и Катька в первый момент испугалась, что он не доехал до Тарасовки – допустить, что он улетел без нее, она не могла, – но тут же с облегчением заметила пляшущее пятно голубого света возле сарая: эвакуатор колдовал над лейкой.</p><p class="p1">– Вылезаем! – бодро крикнула она. – Мы почти на месте.</p><p class="p1">Сереженька выскочил первым, помог вылезти бабушке – он никогда не упускал случая демонстративно уважить старость; тяжело вылезла Майнат, словно боялась расплескать драгоценный сосуд. Странно, она так быстро бегала, а из машины вылезала тяжело, да и сидела как-то согнувшись, словно пыталась успокоить сильную боль в животе.</p><p class="p1">Игорь – весь в какой-то темной смазке, в ватнике и сапогах – шел к калитке по бетонной дорожке.</p><p class="p1">– Ну, слава богу, – сказал он и обнял Катьку. Все было родное, даже запах ватника.</p><p class="p1">– Солнце мое, – повторяла Катька. – Господи, как я соскучилась. Я чуть там не сдохла, по дороге. Как мы ехали – я тебе когда-нибудь расскажу. Это за год не расскажешь, честно.</p><p class="p1">Хотя сейчас, когда цель была достигнута, она уже толком не понимала, о чем там рассказывать. Что особенного-то? Ехали сравнительно благополучно, довезла всех, тут и бабушка, и спасенный ребенок, хотя и не особенно полноценный, и сама она во главе своего маленького отряда. На истерзанную Катькину душу опустился тот ни с чем не сравнимый покой, который она всегда ощущала в присутствии своего эвакуатора. Ей даже не было жалко улетать.</p><p class="p1">– Ну, пошли. Она через полчаса дозреет. Еще час-два я смог бы ее удерживать, а потом надо стартовать.</p><p class="p1">– И ты бы улетел?</p><p class="p1">– Нет, конечно. Она бы взорвалась, а я остался. Тебя ждать.</p><p class="p1">– Я знала, я знала!</p><p class="p1">Она совершенно не стеснялась ни мужа, ни бабушки.</p><p class="p1">– Да, Игорь, – сказала она, поняв, что надо бы все-таки пояснить ситуацию. – Я тебя должна познакомить. Вот это бабушка, Кира Борисовна.</p><p class="p1">– Добрый вечер, – церемонно сказала бабушка.</p><p class="p1">– Здрасьте, – смущенно поздоровался эвакуатор. – Я Игорь.</p><p class="p1">– Да уж вижу, что не Ваня, – непонятно ответила бабушка.</p><p class="p1">– А это мой муж, – сказала Катька. – Его зовут Сережа. Это вот дочка, ее зовут Поля, Подуша.</p><p class="p1">Подуша спала на руках у Сережи, но при звуке своего имени проснулась и с любопытством уставилась на Игоря. Все-таки она была вылитый наш муж – те же круглые глазки, тот же нос кнопкой; не зря друзья нашего мужа, приходя на нее посмотреть (и начисто игнорируя при этом Катьку – словно она вообще не имела отношения к дочери), спрашивали с преувеличенной радостью: «А где борода?»</p><p class="p1">– Здравствуй, Сережа, – сказал Игорь и хотел было протянуть руку нашему мужу, но передумал, потому что руки у нашего мужа были заняты, а у нашего любовника сплошь покрыты инопланетным машинным маслом, которое пахло почти как земное, но с легкой примесью апельсина и немного марципана. Видимо, у них действительно была очень хорошая планета.</p><p class="p1">Наш муж надменно кивнул. Он ни о чем не догадывался и, кажется, до сих пор искренне полагал, что сейчас его тайными тропами, через толщу Земли, поведут в Соединенные Штаты Америки.</p><p class="p1">– Я тебя сейчас со всеми перезнакомлю, – бодро сказала Катька.</p><p class="p1">Она оглядела свой отряд доблестных представителей земной цивилизации, которым предстояло от имени всех землян сутки спустя приветствовать высокоразвитую цивилизацию в системе Альфы Козерога. Вот все, что я смогла отобрать на моей нынешней родине в ее нынешнем состоянии. Это мы, Господи. Перед сараем в ряд стояли: восьмидесятилетняя бабушка, в прошлом инженер текстильной фабрики, имеющая также навыки врача, учителя, садовода и огородника; тридцатилетний безработный, по образованию биолог, по роду утраченных занятий менеджер турфирмы; пятидесятилетний одинокий водитель дядя Боря, по совместительству мастер на все руки; примерно двадцатипятилетняя, хотя по ним никогда не скажешь, чеченка Майнат, чудесно спасенная жертва многократных зачисток; и наконец – представитель альтернативной формы жизни, мальчик-даун, которого было неизвестно как звать, потому что выговорить он мог только два слога: что-то похожее на -ын и что-то напоминающее -ун. На этого-то мальчика Игорь смотрел особенно пристально, а потом посветил фонариком прямо ему в лицо.</p><p class="p1">– Тыкылын улун аум? – быстро спросил он.</p><p class="p1">– Лыкут сылын, – ответил мальчик-даун неожиданно отчетливо.</p><p class="p1">– Гырс пат?</p><p class="p1">– Ытук.</p><p class="p1">– Дырдык бултых аусганг?</p><p class="p1">– Быпс, трипс, припипипс.</p><p class="p1">– Эне бене?</p><p class="p1">– Квинтер контер.</p><p class="p1">– Эники?</p><p class="p1">На это даун ничего не ответил, а только молча кивнул.</p><p class="p1">– Катька, – потрясенно сказал Игорь, и Катька заметила слезы у него на глазах. – Катька, где ты его взяла?</p><p class="p1">– В Брянске, он отбился от детдома…</p><p class="p1">– О господи, – прошептал эвакуатор. – Поистине, вы заслужили всё, что с вами произошло. Прости меня тысячу раз, но это так.</p><p class="p1">– Он ваш? – не поняла Катька.</p><p class="p1">– Это Лынгун, чудо-дитя, наш главный вундеркинд. Единственный ребенок-эвакуатор в истории цивилизации. В четыре года он сам собрал свою первую лейку.</p><p class="p1">– А почему он здесь… в таком странном виде?</p><p class="p1">– Это его принцип. У него собственная концепция. Он отбирает только тех, кто способен пожалеть его таким. Видишь, ты отобрана дважды.</p><p class="p1">– Спасибо, – сказала Катька, все еще не веря. – Но почему он не говорит по-русски? Давно бы мне все объяснил…</p><p class="p1">– Ыкытыгын, – смеясь, перевел Игорь. – Канталуп барам дырдык, трын?</p><p class="p1">– Сыбылын, – виновато сказал даун.</p><p class="p1">– Он просит его извинить, – пояснил Игорь. – Видишь ли, он технический гений, и у него в самом деле очень плохо с языками. Он на родном-то заговорил только в пять лет, когда уже свободно читал. Читает запросто, а говорит с трудом. Ему это не нужно.</p><p class="p1">– Но как же вы отпустили сюда ребенка?</p><p class="p1">– Его долго не отпускали. В первую командировку он улетел сам, на собственной лейке, в восемь лет. Сейчас ему уже четырнадцать, просто он маленький. Ну, а потом его уже посылали вполне сознательно. У нас, я тебе говорил, нет жестких возрастных ограничений: ребенок, не ребенок – все равно человек. Он работает с детьми, и в этом есть резон: наши не всегда могут разобраться в психике ваших мелких. А он как-то разбирается. Его и раньше иногда травили, иногда мучили… но чтобы бросить вот так, отбраковать (по-нашему эники) – это впервые. Видно, у вас действительно абсолютный кризис. Его выгнали не только дети, но и воспитатели. Он не очень понял, о чем говорила воспитательница… но знаешь, ему с его психикой необязательно понимать слова. Он почувствовал. Я же тебе говорю, он наше чудо. Его портрет почти у всех эвакуаторов в лейке висит. Вот активируется моя – я тебе покажу.</p><p class="p1">Лынгун скромно закивал.</p><p class="p1">– Ты понимаешь? – спросил Игорь. – Они его просто отбраковали. Гения, который перевернул все наши критерии. Он мог спасти всех этих детей, один. Но они бросили его.</p><p class="p1">– А как бы он их спас?</p><p class="p1">– Господи, увез бы на своей лейке.</p><p class="p1">– А где она?</p><p class="p1">– Я не знаю, где он ее держал. Ыускун лейка? – обратился Игорь к Лынгуну.</p><p class="p1">– Лейка сырдык. Аус кырт.</p><p class="p1">– Она была у них в подсобке, в детдоме, – перевел Игорь.</p><p class="p1">– Игорь! – простонала Катька. – Что же мы ее не взяли! Мы могли бы спасти еще двадцать человек!</p><p class="p1">– Вряд ли, – сказал Игорь. – Ее же надо активизировать.</p><p class="p1">– Так он и активизировал бы!</p><p class="p1">– Ну, теперь поздно. И знаешь, Катя, – сказал он непривычно резко, – я все чаще думаю, что не стоило. Кого спасли, того спасли, а остальным, значит, не надо. Кракатук не фраер.</p><p class="p1">– Но дети-то чем виноваты?!</p><p class="p1">– Это они его не пускали в автобус, – сказал Игорь. – И воспитатели, и они. Они очень мучили его, Кать.</p><p class="p1">– Что же он нам не сказал! Как он мог… нарисовал бы хоть…</p><p class="p1">– Ладно, – сказал Игорь и посмотрел на часы. – Вообще пора. Отойди, я ее вынесу. Хотя хорошо бы кто-то из мужчин помог. Она уже очень тяжелая и с каждой секундой тяжелеет.</p><p class="p1">– Ну давай, – просто сказал дядя Боря.</p><p class="p1">– Это дядя Боря, мастер на все руки, – сказала Катька.</p><p class="p1">Она все еще не могла прийти в себя. Если бы она не схватила в охапку Лынгуна, он бы нашел способ догнать детдомовских и всех их вывезти на Альфу… Конечно, они сами оттолкнули его, но какой спрос с детей, да еще детдомовских! Кто имеет право их судить! Теперь они ехали неведомо куда по Брянской области на своем автобусе, а лейка так и сгниет в подсобке под Брянском! Конечно, это тонкий ход – посылать дауна для отбора милосердных… Но что этот даун даже не говорит по-русски… Могли бы дать ему хоть переводчика!</p><p class="p1">– Да не угрызайся, Кать, – сказал Игорь, как всегда обо всем догадавшись.</p><p class="p1">– Это очень жестоко, Игорь! Очень жестоко!</p><p class="p1">– У вас тут все жестоко, Катя. Посмотришь – и того жалко, и этого. Всех надо брать. А они убийцы, понимаешь? Они беспомощного больного ребенка не пустили в автобус.</p><p class="p1">– Среди них тоже есть больные, Игорь.</p><p class="p1">– Ну, может, и спасутся, – сказал Игорь. – Повезли же их куда-то…</p><p class="p1">– Турук, – подал голос Лынгун. – Куругач.</p><p class="p1">– Что он сказал? – вскинулась Катька.</p><p class="p1">– Он сказал, что вряд ли спасутся, – объяснил Игорь, потупившись.</p><p class="p1">– Да, кстати, – вспомнила Катька. – Он-то знает, что у вас там объявлена тревога?</p><p class="p1">– Ды, – кивнул Лынгун. Он, кажется, действительно немного понимал язык.</p><p class="p1">– А почему – не знает?</p><p class="p1">– Ны, – покачал головой вундеркинд.</p><p class="p1">– Черт возьми, – неожиданно заорал наш муж Сереженька с такой злобой, что Подуша немедленно разревелась. – Что тут вообще происходит?</p><p class="p1">– Спокойно, Сережа, – тихо ответил Игорь. – Происходит эвакуация.</p><p class="p1">– Куда?</p><p class="p1">– На другую планету.</p><p class="p1">– А меня кто-нибудь спросил?! – взвыл Сереженька. – Меня предупредил кто-нибудь?</p><p class="p1">– Ты что, не сказала ему? – не понял Игорь.</p><p class="p1">– Я сказала, что мы просто уезжаем и что все объясню потом.</p><p class="p1">– Слышь, Сереж, – вступил дядя Боря. – Тут дело такое. Мы на планету летим, хорошую. Здесь просто опасно, мы там пересидим и потом вернемся. Если захотим.</p><p class="p1">– Да я, может, против! – кричал Сережа. – Что за шарлатанство! Какая еще другая планета, я совершенно не хочу, чтобы мой ребенок рос где ни попадя!</p><p class="p1">– Ну, захочешь – вернешься, – пообещал дядя Боря. – Я тебе точно говорю. Но пока – не надо, пока надо пересидеть, понял? Мы там перезимуем, а когда здесь все уляжется – сюда.</p><p class="p1">– Да не хочу я никуда! Катерина, как ты смела мне врать!</p><p class="p1">– Слушай, – зло и решительно сказала Катька. – Не хочешь – оставайся. Ребенка я тебе не отдам, так и знай. А истерики в другом месте будешь устраивать. Понял?</p><p class="p1">Он отошел, что-то мрачно бормоча.</p><p class="p1">– Давай, дядя Боря, – сказала Катька. – Помоги Игорю с ракетой, пора уже.</p><p class="p1">– Какая система-то? – спросил дядя Боря.</p><p class="p1">– Да лейка, – пояснил Игорь.</p><p class="p1">– Как фотоаппарат, что ль?</p><p class="p1">– Близко к тому.</p><p class="empty-line"/><p class="p1">Они с трудом выволокли лейку вдвоем – два здоровых мужика, профессиональные механики, привычные к любым тяжестям. От лейки шло тусклое красноватое свечение. Она нагревалась – медленно и уверенно, как рефлектор.</p><p class="p1">– Ну что, если все в сборе, я активизирую, – сказал Игорь, обращаясь главным образом к дяде Боре.</p><p class="p1">– Если готово, то давай, – кивнул тот, как равный партнер.</p><p class="p1">– Отойдите все на три метра, – скомандовал Игорь.</p><p class="p1">– Игорь! – вспомнила Катька. – А что сосед? Ты дядю Колю не возьмешь?</p><p class="p1">– Я ему предлагал, – сказал Игорь. – В принципе места нет, но вдруг ты не набрала бы… Говорит, не могу. Тут дом, десять лет строил. Парник, помидорки…</p><p class="p1">Игорь усмехнулся.</p><p class="p1">– Ладно, отошли все.</p><p class="p1">Катька подхватила на руки Подушу и оттащила ее на три метра. Бабушка и Майнат нехотя последовали ее примеру.</p><p class="p1">– Мама, – сказала Подуша. – Еечка взойветца?</p><p class="p1">– Нет, что ты, – успокоила ее Катька. – Она немножко вырастет, мы в нее залезем и полетим.</p><p class="p1">– В еечке?</p><p class="p1">– Да. Помнишь, я тебе сказку читала? Гномики отправились в плавание в башмаке. А мы полетим в леечке.</p><p class="p1">– Гляди ты, все правда, – тихо сказала бабушка. – Вот не думала, что на старости на Марс полечу.</p><p class="p1">– Не на Марс, бабушка. Гораздо дальше.</p><p class="p1">Игорь подошел к лейке, нагнулся, подергал за ручку, словно проверяя, крепка ли, отошел на три шага и щелкнул пальцами, высоко подняв руки.</p><p class="p1">В ту же секунду лейка начала расти. Она росла очень быстро, вширь и ввысь, раскаляясь и приобретая особенный металлический блеск. Катька уже ничему не удивлялась. Она давно поняла, что эвакуатор не врет, но одно дело – видеть летающую лейку воочию, и совсем другое – слушать рассказ эвакуатора в кафе «Дракон» (бедное кафе «Дракон»! Кто-то уцелел из его постоянных посетителей?). Не сказать, чтобы Катьке было страшно. Скорее, ей было странно. Бывает такое чувство, когда вдруг убеждаешься в правоте самых смелых своих догадок, в которые ты и верить не смел: скажем, ты всегда догадывалась, что есть Бог, но одно дело догадываться, а другое дело лично объяснять ему, что и почему ты здесь натворила. Вот такое же чувство, поняла Катька, будет у меня и после смерти. Я же все понимала, а жила и действовала применительно к земной подлости. Надо было жить так, как будто загробная жизнь будет обязательно, да ведь она и не может не быть, – а я столько раз трусила, пасовала, боялась черт-те кого, вроде Дубова… Что за жестокая вещь – это вечное колебание. Надо раз навсегда решить и делать, как кружащийся мальчик. Все, с этого дня живу как надо. Особенно если уж мне дан такой знак.</p><p class="p1">Знак в самом деле становился все весомей: лейка росла, росла и вот уже доросла до крыши каменного дома дяди Коли. Ее было бы не обхватить уже всемером, и она начала остывать, приобретая свой обычный серо-стальной цвет, но блестела по-прежнему, отражая сырую ночь вокруг и их страшно вытянувшиеся лица. Наш муж в ужасе что-то бормотал, бабушка крестилась, спокойна была только чеченка Майнат. Вероятно, в фильтрационных лагерях она видела и не такое.</p><p class="p1">– Ну вот, – со скромной гордостью сказал Игорь. – Модель «Ытылым – шесть дробь пятнадцать».</p><p class="p1">– Ытылым угус, ыун аус кырык, – поправил Лынгун, стоявший рядом с Катькой и смотревший на ракету с той жаркой любовью, с какой только автомеханик может смотреть на новенький «роллс-ройс».</p><p class="p1">– Ну, дробь пятнадцать-бэ-два, если быть совсем точным, – кивнул Игорь. – Милости прошу.</p><p class="p1">В блестящей поверхности появилась узенькая щель, словно раздвигался железный занавес. Обозначился проход. Катька шагнула первой. В лейке было жарко, на панелях мигали разноцветные приборы, а пол был устлан коврами. Положительно, на этой планете все было во имя человека и для блага человека.</p><p class="p1">– Быстрей, быстрей, – поторапливал Игорь. – Через три минуты люк закроется.</p><p class="p1">Все быстро вбежали в лейку, не задавая лишних вопросов. Игорь еще раз щелкнул пальцами. Люк закрылся.</p><p class="p1">«Какая была моя последняя земная мысль? – подумала Катька. – Не помню. Кажется, что-то о Подуше».</p><p class="p1">Она прижала дочь к себе. Подуша была в восторге.</p><p class="p1">– Мы поетим, да?</p><p class="p1">– Уже почти летим.</p><p class="p1">– Значит, господа, – сказал Игорь торжественно и радостно. – На взлете возможны некоторые перегрузки, но вы не обращайте внимания. Потом я всех приглашу в кают-компанию – немного выпить за встречу и благополучный отлет. После этого желающие смогут лечь спать в верхнем отсеке, у нас анабиоз мгновенного действия и без последствий. А кто хочет, может посмотреть в иллюминатор или послушать музыку. Предусмотрен, кроме того, просмотр видеопрограммы о жизни планеты, на которую вы попадете. Там вам будут очень рады, и вообще, давайте забудем обо всем плохом. Я вас сейчас покину, потому что должен буду находиться в кабине пилота. Один человек может пройти со мной, и я думаю, что это будет Катя.</p><p class="p1">– Нет, – сказала Катька. – Иди рули, я останусь. Потом всех позовешь.</p><p class="p1">Игорь понимающе кивнул.</p><p class="p1">– Ну ладно, – сказал он, – ничего не бойтесь. Тут, в нижнем отсеке, иллюминаторы не предусмотрены, но, когда мы немножко поднимемся, там, из кают-компании, все уже будет видно. Невесомости не бойтесь, это даже приятно. Я сам сколько раз летаю, а все волнуюсь. Ну, до скорого.</p><p class="p1">Он щелкнул пальцами. В потолке открылся люк.</p><p class="empty-line"/><p class="p1"><em>Не пугайтесь, это глюк.</em></p><p class="empty-line"/><p class="p1">Неведомая сила втянула Игоря наверх, и он исчез. Из стенок ракеты с легким жужжанием выдвинулись кресла. Их было ровно шесть, и маленькое седьмое креслице для Подуши. Около каждого кресла болтались привязные ремни. Катька крепко пристегнула Подушу, потом уселась, пристегнулась сама и с вызовом обвела глазами окружающих.</p><p class="p1">– Ну, смелей, – сказала она. – Обратной дороги нет.</p><p class="p1">Неожиданно за стенками ракеты раздался треск.</p><p class="p1">– И досюда добрались, – выговорила бабушка.</p><p class="p1">Майнат напряженно прислушивалась.</p><p class="p1">– Да не пугайтесь вы, – устало сказала Катька. – Сосед срать пошел. Мы летим, а жизнь продолжается.</p><p class="empty-line"/><p class="p1">А дальше произошло то, чего никто не ожидал. Вместо того, чтобы медленно отделиться от Земли или стремительно рвануть ввысь, лейка бешено закрутилась на одном месте. Больше всего это было похоже на аттракцион «Музыкальный экспресс» в Парке культуры. Вращение ускорялось, Подуша завизжала, дядя Боря радостно захохотал, как хохочут иногда в полный голос здоровые толстые мужики на аттракционах, а Лынгун что-то крикнул по-лынгунски – и в ту же секунду все звуки прекратились, а вибрация исчезла. Они стартовали мгновенно. Вот откуда ведьмины круги, поняла Катька.</p><p class="p1">Она хотела уже поделиться с остальными этим открытием, но тут на нее навалилась страшная тяжесть, ее буквально вдавило в кресло, и сил на разговоры уже не осталось. Она едва не потеряла сознание, но, когда, казалось, вовсе уже не стало сил терпеть, наступила блаженная легкость и ее даже слегка приподняло над креслом.</p><p class="p1">– Стратосфера, – со знанием дела определил дядя Боря. – Быстро мы, а?</p><p class="p1">И он захохотал, радуясь очередной победе техники.</p><p class="p1">– Дамы и господа! – раздался голос Игоря из динамиков в потолке. – Мы успешно взлетели и через сутки прибудем на Альфу Козерога. Фотонные двигатели нашего звездолета работают нормально. Прослушайте краткую информацию о нашем полете. Курить нельзя. Температура безвоздушного пространства за бортом не имеет значения, потому что безвоздушное пространство не имеет температуры. Через несколько минут вам будут предложены прохладительные напитки, довольно вкусные. Можете отстегнуть ремни и размять затекшие члены. – Игорь усмехнулся. – Когда откроется люк, подходите по одному.</p><p class="p1">Он говорил теперь гораздо увереннее, явно чувствуя себя хозяином положения. Впрочем, если все время всех подозревать, лучше вообще не жить.</p><p class="p1">– Сильно прижало-то меня, – сказала бабушка, с трудом поднимаясь с кресла.</p><p class="p1">– Да ладно, бабушка, – сказала Катька. – Так ли всех прижало в сорок первом!</p><p class="p1">Люк, как и было обещано, открылся. Катька взяла на руки Подушу и встала под него первой.</p><p class="p1">– Катерина! Сначала я! – вспомнив, что он глава семьи, потребовал наш муж.</p><p class="p1">Катька не ответила, но и не послушалась. В ту же секунду ее словно за волосы втащили наверх.</p><p class="p1">Это было просторное помещение – в центре круглый стол, по бокам кресла, а на столе – развернутая карта, очень похожая на земную, но с незнакомыми очертаниями материков. Прямо на карте стоял поднос с высокими бокалами, зелеными, красными и голубыми, а между бокалами были еще две тарелочки с сырными шариками, теми самыми, которыми Игорь угощал Катьку в Свиблове после самого первого раза, такого далекого, странного и такого все-таки счастливого. На стене висел портрет Лынгуна – смеющегося, с хитрым выражением лица.</p><p class="p1">– Ух как! – радостно сказала Подуша и засмеялась. – Мам, мы больше в садик не пойдем?</p><p class="p1">– Никогда в жизни, – не менее радостно ответила Катька.</p><p class="p1">Когда человека втягивало в кают-компанию, вид его был довольно забавен. Катька, наверное, и сама очень смешно выглядела со стороны, но на нее-то смотреть было некому. Зато она увидела, как в помещение стремительно втянулся наш муж. Больше всего это было похоже на быстрое прорастание гриба из загадочной стальной почвы; гриб был с глазами и бородой, как елочная игрушка боровик.</p><p class="p1">– Интересно, – неодобрительно сказал Сереженька. Ему здесь не нравилось, а особенно он раздражался потому, что все было слишком комфортно. Это совершенство только подчеркивало его собственную неустроенность, неприкаянность и общую недоделанность.</p><p class="p1">Следом втянулась бабушка, приговаривая «Господи, Господи», за ней счастливый Лынгун, потом равнодушная Майнат (до чего из нее все-таки выбили все эмоции в этих фильтрационных лагерях!), а последним – дядя Боря, не перестававший радостно улыбаться чудесам заграничной техники.</p><p class="p1">– Хорошо у них все сделано, – приговаривал он. – По уму все.</p><p class="p1">Люк задраился. Сверху, из кабины пилота, расположенной под самой крышкой лейки, спустился Игорь.</p><p class="p1">– Командир корабля, он же экипаж, приветствует вас на борту!</p><p class="p1">– Трансглюкатор тыуртын? – деловито спросил Лынгун.</p><p class="p1">– Курутук багарлык! – назидательно ответил Игорь и потрепал его по волосам.</p><p class="p1">– Что-нибудь с трансглюкатором? – спросила Катька, все еще боявшаяся, что она тогда, в первый приезд в Тарасовку, повредила лейку.</p><p class="p1">– Да все отлично, просто он спрашивает, включил я его или нет.</p><p class="p1">– А ты чего?</p><p class="p1">– А я говорю, не учи отца трансглюкировать! Значит, посидим немножко, выпьем, а потом желающие просмотрят видеопрограмму, а нежелающие пойдут баиньки до самого прилета. Прошу к столу.</p><p class="p1">Шарики на этот раз были разного вкуса – и мясного, и копченого, и сырного.</p><p class="p1">– Это у вас вся еда такая? – неодобрительно спросил Сереженька.</p><p class="p1">– Почему вся? – удивился Игорь. – Это сухой паек, только для эвакуаторов…</p><p class="p1">– Крепкое? – спросил дядя Боря, принюхиваясь. – А то мало ли… Невесомость начнется, еще затошнит…</p><p class="p1">– Невесомость еще только минут через десять, – пояснил Игорь. – Я специально перегрузки уменьшил, чтобы нам до невесомости успеть посидеть на дорожку и выпить понемножку. Примета такая. Это вообще не спиртное, просто расслабляет…</p><p class="p1">– Куда уж расслабляться-то, – прокряхтела бабушка, однако напиток пригубила.</p><p class="p1">– Места общего пользования внизу, – предупредительно сказал Игорь. – Если захочется, не стесняйтесь, я объясню. Мальчики налево, девочки направо.</p><p class="p1">– Ишь как, – сказала бабушка.</p><p class="p1">– Ну, за благополучную эвакуацию! – воскликнул Игорь.</p><p class="p1">Все робко чокнулись. Напиток напоминал вишневый сок, только прозрачный и вязкий.</p><p class="p1">– Это у нас есть фрукт такой, – объяснил эвакуатор. – Он растет на полом черенке, черенок вставляешь в специальное отверстие на фрукте, как соломинку, и можно пить. А можно сок выкачать и взять с собой. Он и без консервантов не скиснет. Оказывает очень благотворное действие, любимый напиток всех космолетчиков. У нас там такие фрукты, вообще! Больше трехсот видов, гораздо шире флора, чем на Земле. Есть соленые, сладкие, кислые, есть со вкусом мяса, есть такие, что прямо как соленые огурцы.</p><p class="p1">Все с удовольствием потягивали вязкий вишневый сироп.</p><p class="p1">– Вы пейте, – заботливо приговаривал Игорь, – у меня еще много.</p><p class="p1">Он, кажется, чувствовал некоторую неловкость перед этими землянами, из которых доброжелателен по-настоящему был только дядя Боря. Ну и Катька, естественно, – но она чего-то боялась. С каждым глотком сока в нее все глубже вползала непонятная тревога.</p><p class="p1">– Тыун кыун, – строго заметил Лынгун.</p><p class="p1">– Да, лучше пристегнуться, – кивнул Игорь. – Сейчас начнется невесомость. – Он посмотрел на часы. – Через минуту где-то. Если потом захотите поплавать по кают-компании – пожалуйста. Но с непривычки не очень удобно, надо научиться скорость рассчитывать, и вообще…</p><p class="p1">Все поспешно пристегнулись.</p><p class="p1">Внезапно бокал выплыл у Катьки из руки и повис в воздухе. Она потянула его за ножку, но остаток напитка, скатавшись в небольшие шары, выплыл из бокала и блестящей вереницей поплыл по кают-компании. Катька по земной привычке – это она одна такая или все-таки подобные неловкости случаются иногда у всех? – быстро огляделась: почти все упустили свои напитки и теперь в легком недоумении парили над креслами, удерживаемые ремнями. Лица у всех покраснели – то ли от сока, то ли от энергетических сухих шариков, тоже плававших теперь по всей лейке, то ли от невесомости, от которой, говорят, в первый момент сильно поднимается давление.</p><p class="p1">– Ничего страшного, – сказал Игорь. – Чувствуйте себя как дома. Как чуть-чуть привыкнете, можно будет отстегиваться.</p><p class="p1">В эту секунду чеченка Майнат нехорошо засмеялась и сверкающими глазами обвела присутствующих.</p><p class="p1">– Аллах акбар! – воскликнула она.</p><p class="p1">Все обернулись к ней и от неожиданности, кажется, даже плюхнулись на кресла, невзирая на невесомость. Только Подуша продолжала смеяться хрустальным смехом и все ловила блестящие шарики.</p><p class="p1">– Ну что, русские свиньи?! – торжествующе говорила Майнат, бешено стиснув подлокотники кресла. – Вы думали, что сбежали? Как бы не так! Вам осталось пять минут ровно!</p><p class="p1">Катька с мольбой взглянула на Игоря. Он был совершенно спокоен – эвакуаторы вообще отлично владеют собой – и только кусал губы. Господи, подумала Катька, бедный, бедный! Добрый, несчастный! Как же страшно я ему все испортила. Кого я ему привезла. Он тут сок наливал, про вишню рассказывал… Почему-то мучительней всего было думать про то, как он наливал сок. Специально налил, а потом вернулся в кабину, чтобы поэффектней появиться. Эта забота о тысяче милых мелочей была особенно невыносима на фоне нынешнего сюрприза. И ведь я знала, подумала Катька. С самого начала все знала. Неужели он ничего не сможет сделать?!</p><p class="p1">– Свиньи! – продолжала между тем Майнат. – Знаете, кто я такая? Я сама Черная Фатима! Я ехала в вашу Москву, чтобы привести в действие всю систему! Триста наших лучших девушек, сестры и возлюбленные полевых командиров, готовились уничтожить себя по моему сигналу! Но русские свиньи сами сожгли свой город, потому что у них и без нас все летело к черту! И тогда я решила, что не дам уйти вам. Слышите? Я не дам уйти вам! Сейчас вы заплатите мне и моему народу за все, что сделали с моей гордой землей! Вы недостойны жить, и вы не будете жить! Аллах покарает неверных! Аллах акбар! Видите вы эти проводки? – Она пошарила у себя на животе; так вот почему она так осторожно двигалась! Вот тебе и отбитые внутренности; когда уже я перестану верить в этот правозащитный бред?! Теперь, видимо, никогда. – Это пояс Черной Фатимы! Сейчас осколки вашей вонючей еврейской лейки разлетятся в безвоздушном пространстве!</p><p class="p1">– Почему еврейской-то? – спросил Игорь.</p><p class="p1">Видимо, он решил заговаривать ей зубы; она, конечно, не пойдет на переговоры. В конце концов, что с них сейчас можно взять? Главное – не пустить ее на планету, потому что если она взорвется там – погибнут все встречающие… Все эти мысли проносились в Катькиной голове с небывалой скоростью: она совсем не боялась за себя, ей все казалось, что можно будет как-то прикрыть Подушу, она уже делала ей знаки, – но Игорь перехватил ее взгляд и покачал головой. Это значило, что рыпаться бесполезно.</p><p class="p1">– Аллах акбар! – крикнула Фатима в третий раз, изобразила на лице неземное блаженство, закатила глаза и соединила проводки.</p><p class="p1">Ничего не произошло.</p><p class="p1">Она лихорадочно тыкала одним проводком в другой, проверяла пояс, рычала сквозь зубы, но взрыва не было, а Игорь все продолжал смотреть на нее с живейшим интересом.</p><p class="p1">– Что ты сделал?! – оскалившись, крикнула она ему наконец, и Катька поняла, почему он кусал губы. Он изо всех сил старался не расхохотаться.</p><p class="p1">– Ты, еврейский специалист! Что ты такого натворил?</p><p class="p1">– Да почему еврейский? – снова спросил он, уже сквозь смех. – Ты чего думаешь, мы в Израиль летим? Ой, не могу… Кто вас там готовит-то, на базах ваших? Ведь дура дурой…</p><p class="p1">– Не ругайся, собака! – крикнула она, отстегнулась и попыталась шагнуть к Игорю, но вместо этого стремительно взмыла вверх и мощно зыбнулась головой о потолок.</p><p class="p1">– Ты мне смотри лейку не пробей, – еле выговорил Игорь сквозь хохот. – Готовили ее… Тебя ж для земных условий готовили! Кто ж тебе там мог объяснить, что в невесомости пояс шахида не срабатывает!</p><p class="p1">– Как не срабатывает? – заорала Майнат сверху. – Почему не срабатывает?!</p><p class="p1">– Цепь не замыкается, – объяснил Игорь. – Там же так устроено, что сила тяжести обязательно должна быть. А без силы тяжести капсюль не разбивается, и заряд не взрывается.</p><p class="empty-line"/><p class="p1">– <em>Что, правда не взрывается?</em></p><p class="p1">– <em>Откуда я знаю.</em></p><p class="p1">– <em>Да, красиво.</em></p><p class="empty-line"/><p class="p1">– Ооо, – завыла Майнат под потолком. – Мой бедный народ… мой гордый народ…</p><p class="p1">– Да ладно, – утешил ее Игорь. – Спускайся. Только осторожно, а то еще об пол ударишься. Ты думаешь, я про твой пояс не знал? Мне Лынгун сразу сказал: «Пипс, пипс, припипипс». Грамотный эвакуатор всю вашу технику террористическую насквозь видит. Да и датчик у меня срабатывает, я ж двадцать раз взорвался бы в вашей Москве, если бы не знал, в какие поезда можно садиться, а в какие нельзя!</p><p class="p1">«Со мной тебе ничего не грозит», – вспомнилось Катьке.</p><p class="p1">– Я разве в претензии? – говорил Игорь. – Нормально все, господи! Борьба за независимость, идейные люди… Я что, не понимаю? Это ваши разборки, нас не касаются… Если тебя Катька привела – значит, ты человек приличный, просто у тебя жизнь была такая. Ты не переживай сильно, приедешь туда – мы тебя взрывником сделаем, у нас для горного дела такой есть дынымыт. Взрывай сколько хочешь, никто тебе слова не скажет, еще зверька дадут! Прилетим – я тебе кофточку куплю.</p><p class="p1">– Какую кофточку? – заинтересованно спросила Майнат, медленно снижаясь.</p><p class="p1">– Розовую кофточку, поясок золотой, здесь пуговки в ряд, здесь другой ряд. Сапоги куплю, каблук высокий, тонкий, будешь как Алла Пугачева ходить, красавчик будешь. Штаны куплю, большой штаны, никогда у тебя не было такой штаны, шарфик куплю газовый, слушай, браслет золото натуральный, серьги изумруд, пять карат, героин много, много, сколько скажешь героин!</p><p class="p1">Майнат зависла между полом и потолком, медленно обмякая.</p><p class="p1">– Вот так, хорошо, – продолжал Игорь. – Ты думал, я гипноз не знаю, я гипноз знаю, все знаю. Если б у тебя настоящий капсюль был, который невесомость взрывается, система плюс тридцать пять по-нашему, я бы тебя так заговорил, ты бы у меня плавал как рыбка, слюшай! А я человек гуманный, я тебе дал подвиг сделать. Усните блаженно, заморские гости, усните. Спи, дитя мое, усни. Шашлык куплю, машлык, башлык, урус мартан, урулус керугач, батыр керогаз, дум-дум цеппелин! Все тебе куплю, красавчик будешь, Аня Политковская будешь…</p><p class="p1">– Аня Политковская красавчик, – сонно проговорила Майнат и заснула окончательно.</p><p class="p1">– Так оно лучше, – сказал Игорь и потянулся. – Ладно, господа. Пора и вам баиньки. Лететь долго, а у нас еще дел много.</p><p class="p1">Но все и так спали в своих креслах, невесомо паря над ними, еле удерживаемые ремнями. Не спала только Катька, и ей было страшно. Как все смелые люди, она по-настоящему боялась только после опасности.</p><p class="empty-line"/><p class="p1">– <em>Насчет смелых людей спасибо, конечно, но это сильное преувеличение. Я так и не поняла, что ты задумал.</em></p><p class="p1">– <em>Да ну? А я бы на твоем месте давно догадался.</em></p><p class="empty-line"/><p class="p1">– Что ты хочешь с нами делать? – робко спросила она.</p><p class="p1">– Сожру сейчас, – выпучив глаза, сказал Игорь. – Слушай, ты до сих пор думаешь, что я шахид?</p><p class="p1">– Не знаю, – сказала Катька. – Вдруг ты хуже? Сожрешь всех на моих глазах, чтобы я помучилась совестью, а когда вследствие огорчения печень моя увеличится, сожрешь и меня…</p><p class="p1">– Дура ты, Кать, – сказал Игорь. – Хуже Черной Фатимы. На какой только базе тебя готовили? Пошли наверх, в кабину. Есть некое намерение.</p><p class="p1">– Какое именно?</p><p class="p1">– Я соскучился очень, – сказал Игорь. – Ну правда, соскучился. Не чаял даже, что свидимся. Ты когда-нибудь трахалась в невесомости?</p><p class="p1">– Знаешь, да. Но очень давно. Курсе на первом, когда на картошку летали.</p><p class="p1">Оба расхохотались.</p><p class="p1">– Мы их не разбудим?</p><p class="p1">– Что ты. Они теперь будут спать до самого приальфения.</p><p class="p1">– Подожди. А если в невесомости не срабатывает пояс, то, может… это самое… ну… тоже что-нибудь не сработает?</p><p class="p1">– Не знаю, – беспечно сказал Игорь. – В отличие от тебя я никогда не трахался в невесомости. Все как-то не с кем было. Пошли, там очень уютно. Только осторожней, башкой не ударься. Она у тебя не такая крепкая, как у этой…</p><p class="p1">Игорь отстегнулся первым, слегка отодвинул висящую в пространстве Майнат и плавно подплыл к люку на потолке. Катька отстегнулась и поплыла следом. Голова немного кружилась – то ли от сока, то ли от гипноза.</p><p class="p1">– А почему я не заснула?</p><p class="p1">– А это гипноз такой, избирательный. – Игорь ковырялся с люком. – Черт, почему у меня в последнее время все так туго открывается? Все, давай.</p><p class="p1">Он проскользнул в узкое отверстие и втянул ее за собой.</p><p class="empty-line"/><p class="p1">– <em>И ты, я гляжу, проскользнул в узкое отверстие.</em></p><p class="p1">– <em>Смотри ты, заметила!</em></p><p class="empty-line"/><p class="p1">Все получилось, невзирая на невесомость, – как же у них могло не получиться, ведь они родились для этого, для того, чтобы быть друг с другом, друг другом, чтобы медленно, нежно вплывать в объятия друг друга, переворачиваться в воздухе, замирать, настигать друг друга снова. В кабине было огромное лобовое стекло, и сквозь него, как на экране компьютера, подмигивали таинственные звезды. Звезды тоже были каким-то образом во все это вовлечены. Что-то подобное было давным-давно, у моря, когда родители вывезли туда пятнадцатилетнюю Катьку и она первый раз в жизни купалась голая ночью. Вода была теплая и почти не чувствовалась – воздух казался холодней. Она лежала на спине среди звезд, вода заливалась в уши, казалось, что это шорох космического пространства. Или тайный сигнал в наушниках.</p><p class="p1">Иногда, в свободном плавании по кабине, они натыкались на собственные штаны и свитера и небрежно их отбрасывали, отлетая при этом сами.</p><p class="p1">– Катька, ты очень хороша. Я никогда еще тебе не говорил этого.</p><p class="p1">– Да ладно тебе. Я и не мылась со вчерашнего дня.</p><p class="p1">– Тьфу, ерунда какая.</p><p class="p1">– Послушай… Мне, вообще, понравилось в невесомости.</p><p class="p1">– У нас там можно, есть специальный павильон, снимаешь его на сколько хочешь, хоть на сутки, – хочешь пей, хочешь трахайся. Некоторые просто так летают.</p><p class="p1">– А как вы это делаете?</p><p class="p1">– Ну, это несложная вещь. Антигравитация. У нас давно умеют.</p><p class="p1">– Ты обещал видовую программу вообще-то.</p><p class="p1">– А. Это запросто. – Он брассом подплыл к стене, нажал кнопку, и гигантское лобовое стекло стало медленно заволакиваться опаловым туманом; по нему побежала рябь, и вдруг возник земной пейзаж, только с более сочными красками. На его фоне – горы, море, бледно-лазурные небеса с жемчужными тучками – замерцала странная эмблема: двуликий Янус верхом на Тянитолкае, глядя одновременно влево и вправо, держал на плече двуглавого орла. Зазвучали фанфары.</p><p class="p1">– Это что у вас?</p><p class="p1">– Эмблема студии. «Альфа-фильм».</p><p class="p1">– А что означает?</p><p class="p1">– Герб наш. Символ всетерпимости.</p><p class="p1">Пошли титры на непонятном иероглифическом языке – картинки были смешные, похожие на сутеевские: мышка, зайчик, ежик, улыбающийся шар, дерево с раскидистыми толстыми ветками, бабочка с огромными усами… Попадались и непонятные знаки – черточки, стрелки.</p><p class="p1">– По родным просторам, – перевел Игорь. – Сейчас вы увидите гостеприимные края, в которых… как бы это поточней… не будет ни грусти, ни вздохов, ни евреев, ни греков…</p><p class="p1">– Ни печали, ни воздыхания, ни эллина, ни иудея, – подсказала Катька.</p><p class="p1">– Да, точно. Мы рады приветствовать вас на нашей планете и сейчас покажем вам чудеса нашего животного мира.</p><p class="p1">– Что, синий вол, исполненный очей? – не удержалась Катька.</p><p class="p1">– Да ну, – сказал Игорь. – Все это скучные песни Земли.</p><p class="p1">Зазвучала тревожная музыка, она лилась отовсюду, пульсировала, мягко ударяла в барабанные перепонки, – гудела сама почва, и по гулкой, звонкой, сухой степи мчалось стадо небывалых существ, которых Катька узнала сразу, хотя и не видела, конечно, никогда в жизни. Это были лошади – но и не совсем лошади: тоньше, грациозней, стройней тяжелого земного коня, они неслись по жесткой колкой траве и отличались от привычных очень мало. Все дело было именно в тонкости, незаметности отличий: чуть острее уши, чуть меньше голова, чуть длиннее шея. Лошади были молодые, горячие, шоколадного цвета. Они бежали очень быстро и необыкновенно легко, словно сила тяжести, пригнетавшая их к земле, вдруг уменьшилась раза в полтора. Следом так же грациозно, помахивая длинными хвостами и победно трубя, пробежали слоны – легкие, поджарые неземные слоны, беловато-серые, как небо над степью; чувствовалось, что бегать им нравится. Они радостно подпрыгивали и громко трубили – хотя звук был совсем не похож на земной рев слона: скорей это была серебряная труба. На одном слоне сидела девушка совершенно земной внешности, разве что лицо чуть подлинней да глаза немного навыкате; она мягко пришпоривала гордое животное, и гордое животное, мягко пришпоренное, издавало гулкое «гули-гули», похожее на голубиное.</p></span></span>
