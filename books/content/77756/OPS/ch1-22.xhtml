<span id="id19"><div class="title3">
<p class="p">Стихи вокруг романа</p>
</div><span id="id20"><div class="title4">
<p class="p">Басня</p>
</div><div class="poem">
<div class="stanza">
<p class="v">Да, подлый муравей, пойду и попляшу,</p>
<p class="v">И больше ни о чем тебя не попрошу.</p>
<p class="v">На стеклах ледяных играет мерзлый глянец.</p>
<p class="v">Зима сковала пруд, а вот и снег пошел.</p>
<p class="v">Смотри, как я пляшу, последний стрекозел,</p>
<p class="v">Смотри, уродина, на мой прощальный танец.</p>
</div>
<div class="stanza">
<p class="v">Ах, были времена! Под каждым мне листком</p>
<p class="v">Был столик, вазочки, и чайник со свистком,</p>
<p class="v">И радужный огонь росистого напитка…</p>
<p class="v">Мне только то и впрок в обители мирской,</p>
<p class="v">Что добывается не потом и тоской,</p>
<p class="v">А так, из милости, задаром, от избытка.</p>
</div>
<div class="stanza">
<p class="v">Замерзли все цветы, ветра сошли с ума,</p>
<p class="v">Все, у кого был дом, попрятались в дома,</p>
<p class="v">Повсюду муравьи соломинки таскают…</p>
</div>
<div class="stanza">
<p class="v">А мы, не годные к работе и борьбе,</p>
<p class="v">Умеем лишь просить «Пусти меня к себе!» –</p>
<p class="v">И гордо подыхать, когда нас не пускают.</p>
</div>
<div class="stanza">
<p class="v">Когда-нибудь в раю, где пляшет в вышине</p>
<p class="v">Веселый рой теней, – ты подползешь ко мне,</p>
<p class="v">Худой, мозолистый, угрюмый, большеротый, –</p>
<p class="v">И, с завистью следя воздушный мой прыжок,</p>
<p class="v">Попросишь: «Стрекоза, пусти меня в кружок!» –</p>
<p class="v">А я скажу: «Дружок! Пойди-ка поработай!»</p>
</div>
</div></span><span id="id21"><div class="title4">
<p class="p">Пэон четвертый</p>
</div><p class="p1">О боже мой, какой простор! Лиловый, синий, грозовой, – но чувство странного уюта: все свои. А воздух, воздух ледяной! Я пробиваю головой его разреженные, колкие слои. И – вниз, стремительней лавины, камнепада, высоту теряя, – в степь, в ее пахучую траву! Но, долетев до половины, развернувшись на лету, рванусь в подоблачье и снова поплыву.</p><p class="p1">Не может быть: какой простор! Какой-то скифский, а верней – дочеловеческий. Восторженная дрожь: черносеребряная степь и море темное за ней, седыми гребнями мерцающее сплошь. Над ними – тучи, тучи, тучи, с чернотой, с голубизной в разрывах, солнцем обведенные края – и гроздья гроз, и в них – текучий, обтекаемый, сквозной, неузнаваемый, но несомненный я.</p><p class="p1">Так вот я, стало быть, какой! Два перепончатых крыла, с отливом бронзовым, – смотри: они мои! Драконий хвост, четыре лапы, гибкость змея, глаз орла, непробиваемая гладкость чешуи! Я здесь один – и так под стать всей этой бурности, всему кипенью воздуха и туч лиловизне, и степи в черном серебре, и пене, высветлившей тьму, и пустоте, где в первый раз не тесно мне.</p><p class="p1">Смотри, смотри! Какой зловещий, зыбкий, манкий, серый свет возник над гребнями! Летучая гряда, смотри, разверзлась и раздвинулась. Приказ или привет – еще не ведаю; мне, стало быть, туда. Я так и знал: все только начато. Я чувствовал, что взят не ради отдыха. Ведь нас наперечет. Туда, туда! Клубится тьма, дымится свет, и дивный хлад, кристальный душ по чешуе моей течет.</p><p class="p1">Туда, на зов, на дымный луч! Лети, не спрашивай причин, без сожаления о первом из миров, – туда, в пространство зыбких форм, непостижимых величин, чудесных чудищ, грозных игрищ и пиров! Туда, где облачных жаровен тлеют угли, где в чаду сраженья горнего грохочет вечный гром, туда, где в битве, час неровен, я, глядишь, опять паду и вновь очнусь, уже на ярусе втором.</p><p class="p1">Лечу, крича: «Я говорил, я говорил, я говорил! Не может быть, чтоб все и впрямь кончалось тут!». Как звать меня? Плезиозавр? Егудиил? Нафанаил? Левиафан? Гиперборей? Каталабют? Где я теперь? Изволь, скажу, таранить облако учась одним движением, как камень из пращи: пэон четвертый, третий ярус, пятый день, десятый час. Вот там ищи меня, но лучше не ищи.</p><p class="subtitle">* * *</p><p class="p1">Я не могу укрыться ни под какою крышей. Моя объективность куплена мучительнейшей ценой – я не принадлежу ни к нации явно пришлой, ни к самопровозглашенной нации коренной. Как известный граф, создатель известных стансов о том, что ни слева, ни справа он не в чести, – так и я, в меру скромных сил, не боец двух станов, точней, четырех, а теперь уже и шести. Не сливочный элитарий, не отпрыск быдла, я вижу все правды и чувствую все вранье – все мне видно, и так это мне обидно, что злые слезы промыли зренье мое.</p><p class="p1">Кроме плетенья словес, ничего не умея толком (поскольку другие занятья, в общем, херня), – по отчим просторам я рыскаю серым волком до сей поры, и ноги кормят меня. То там отмечусь, то тут чернилами брызну. Сумма устала от перемены мест. Я видел больше, чем надо, чтобы любить Отчизну, но все не дождусь, когда она мне совсем надоест. Вдобавок я слишком выдержан, чтобы спиться, и слишком упрям, чтоб прибиться к вере отцов. Все это делает из меня идеального летописца, которого Родина выгонит к черту в конце концов.</p><p class="p1">Что до любви, то и тут имеется стимул писать сильнее других поэтов Москвы. От тех, кого я хочу, я слышу – прости, мол, слушать тебя – всегда, но спать с тобою – увы. Есть и другие, но я не могу терпеть их. Мне никогда не давался чистый разврат. Слава богу, имеются третьи, и этих третьих я мучаю так, что смотрите первый разряд. Портрет Дориана Грея, сломавший раму, могильщик чужой и мучитель своей семьи, я каждое утро встречаю, как соль на рану. И это все, чего я достиг к тридцати семи.</p><p class="p1">Отсюда знание жизни, палитра жанровая, выделка класса люкс, плодовитость-плюс.</p><p class="p1">– Собственно говоря, на что ты жалуешься?</p><p class="p1">– Собственно, я не жалуюсь, я хвалюсь.</p></span><span id="id22"><div class="title4">
<p class="p">Начало зимы</p>
</div><span id="id23"><div class="title5">
<p class="p">1</p>
</div><div class="poem">
<div class="stanza">
<p class="v">Зима приходит вздохом струнных:</p>
<p class="v">«Всему конец».</p>
<p class="v">Она приводит белорунных</p>
<p class="v">Своих овец,</p>
<p class="v">Своих коней, что ждут ударов,</p>
<p class="v">Как наивысшей похвалы,</p>
<p class="v">Своих волков, своих удавов,</p>
<p class="v">И все они белы, белы.</p>
</div>
<div class="stanza">
<p class="v">Есть в осени позднеконечной,</p>
<p class="v">В ее кострах,</p>
<p class="v">Какой-то гибельный, предвечный,</p>
<p class="v">Сосущий страх:</p>
<p class="v">Когда душа от неуюта,</p>
<p class="v">От воя бездны за стеной</p>
<p class="v">Дрожит, как утлая каюта</p>
<p class="v">Иль теремок берестяной.</p>
<p class="v">Все мнется, сыплется, и мнится,</p>
<p class="v">Что нам пора,</p>
<p class="v">Что опадут не только листья,</p>
<p class="v">Но и кора,</p>
<p class="v">Дома подломятся в коленях</p>
<p class="v">И лягут грудой кирпичей –</p>
<p class="v">Земля в осколках и поленьях</p>
<p class="v">Предстанет грубой и ничьей.</p>
</div>
<div class="stanza">
<p class="v">Но есть и та еще услада</p>
<p class="v">На рубеже,</p>
<p class="v">Что ждать зимы теперь не надо:</p>
<p class="v">Она уже.</p>
<p class="v">Как сладко мне и ей – обоим –</p>
<p class="v">Вливаться в эту колею:</p>
<p class="v">Есть изныванье перед боем</p>
<p class="v">И облегчение в бою.</p>
</div>
<div class="stanza">
<p class="v">Свершилось. Все, что обещало</p>
<p class="v">Прийти, – пришло.</p>
<p class="v">В конце скрывается начало.</p>
<p class="v">Теперь смешно</p>
<p class="v">Дрожать, как мокрая рубаха,</p>
<p class="v">Глядеть с надеждою во тьму</p>
<p class="v">И нищим подавать из страха –</p>
<p class="v">Не стать бы нищим самому.</p>
</div>
<div class="stanza">
<p class="v">Зиме смятенье не пристало.</p>
<p class="v">Ее стезя</p>
<p class="v">Структуры требует, кристалла.</p>
<p class="v">Скулить нельзя,</p>
</div>
<div class="stanza">
<p class="v">Но подберемся. Без истерик,</p>
<p class="v">Тверды, как мерзлая земля,</p>
<p class="v">Надвинем шапку, выйдем в скверик:</p>
<p class="v">Какая прелесть! Всё с нуля.</p>
</div>
<div class="stanza">
<p class="v">Как все бело, как незнакомо!</p>
<p class="v">И снегири!</p>
<p class="v">Ты говоришь, что это кома?</p>
<p class="v">Не говори.</p>
<p class="v">Здесь тоже жизнь, хоть нам и странен</p>
<p class="v">Застывший, колкий мир зимы,</p>
<p class="v">Как торжествующий крестьянин.</p>
<p class="v">Пусть торжествует. Он – не мы.</p>
</div>
<div class="stanza">
<p class="v">Мы никогда не торжествуем,</p>
<p class="v">Но нам мила</p>
<p class="v">Зима. Коснемся поцелуем</p>
<p class="v">Ее чела,</p>
<p class="v">Припрячем нож за голенищем,</p>
<p class="v">Тетрадь забросим под кровать,</p>
<p class="v">Накупим дров и будем нищим</p>
<p class="v">Из милосердья подавать.</p>
</div>
</div></span><span id="id24"><div class="title5">
<p class="p">2</p>
</div><p class="p1">– Чтобы было, как я люблю, – я тебе говорю, – надо еще пройти декабрю, а после январю. Я люблю, чтобы был закат цвета ранней хурмы, и снег оскольчат и ноздреват – то есть распад зимы: время, когда ее псы смирны, волки почти кротки, и растлевающий дух весны душит ее полки. Где былая их правота, грозная белизна? Марширующая пята растаптывала, грузна, золотую гниль октября и черную – ноября, недвусмысленно говоря, что все уже не игра. Даже мнилось, что поделом белая ярость зим: глотки, может быть, подерем, но сердцем не возразим. Ну и где триумфальный треск, льдистый хрустальный лоск? Солнце над ним водружает крест, плавит его, как воск. Зло, пытавшее на излом, само себя перезлив, побеждается только злом, пытающим на разрыв, и уходящая правота вытеснится иной – одну провожает дрожь живота, другую чую спиной.</p><p class="p1">Я начал помнить себя как раз в паузе меж времен – время от нас отводило глаз, и этим я был пленен. Я люблю этот дряхлый смех, мокрого блеска резь. Умирающим не до тех, кто остается здесь. Время, шедшее на убой, вязкое, как цемент, было занято лишь собой, и я улучил момент. Жизнь, которую я застал, была кругом неправа – то ли улыбка, то ли оскал полуживого льва. Эти старческие черты, ручьистую болтовню, это отсутствие правоты я ни с чем не сравню… Я наглотался отравы той из мутного хрусталя, я отравлен неправотой позднего февраля.</p><p class="p1">Но до этого – целый век темноты, мерзлоты. Если б мне любить этот снег, как его любишь ты – ты, ценящая стиль макабр, вскормленная зимой, возвращающаяся в декабрь, словно к себе домой, девочка со звездой во лбу, узница правоты! Даже странно, как я люблю все, что не любишь ты. Но покуда твой звездный час у меня на часах, выколачивает матрас метелица в небесах, и в четыре почти черно, и вовсе черно к пяти, и много, много еще чего должно произойти.</p></span></span><span id="id25"><div class="title5">
<p class="p">Новая графология-2</p>
</div><div class="poem">
<div class="stanza">
<p class="v">Если бы кто-то меня спросил,</p>
<p class="v">Как я чую присутствие высших сил –</p>
<p class="v">Дрожь в хребте, мурашки по шее,</p>
<p class="v">Слабость рук, подгибанье ног, –</p>
<p class="v">Я бы ответил: если страшнее,</p>
<p class="v">Чем можно придумать, то это Бог.</p>
</div>
<div class="stanza">
<p class="v">Сюжетом не предусмотренный поворот,</p>
<p class="v">Небесный тунгусский камень в твой огород,</p>
<p class="v">Лед и пламень, война и смута,</p>
<p class="v">Тамерлан и Наполеон,</p>
<p class="v">Приказ немедленно прыгать без парашюта</p>
<p class="v">С горящего самолета, – все это он.</p>
</div>
<div class="stanza">
<p class="v">А если среди зимы запахло весной,</p>
<p class="v">Если есть парашют, а к нему еще запасной,</p>
<p class="v">В огне просматривается дорога,</p>
<p class="v">Во тьме прорезывается просвет, –</p>
<p class="v">Это почерк дьявола, а не Бога,</p>
<p class="v">Это дьявол под маской Бога</p>
<p class="v">Внушает надежду там, где надежды нет.</p>
</div>
<div class="stanza">
<p class="v">Но если ты входишь во тьму, а она бела,</p>
<p class="v">Прыгнул, а у тебя отросли крыла, –</p>
<p class="v">То это Бог, или ангел, его посредник,</p>
<p class="v">С хурмой «Тамерлан» и тортом «Наполеон»:</p>
<p class="v">Последний шанс последнего из последних,</p>
<p class="v">Поскольку после последнего – сразу он.</p>
</div>
<div class="stanza">
<p class="v">Это то, чего не учел Иуда.</p>
<p class="v">Это то, чему не учил Дада.</p>
<p class="v">Чудо вступает там, где, помимо чуда,</p>
<p class="v">Не спасет никто, ничто, никогда.</p>
</div>
<div class="stanza">
<p class="v">А если ты в бездну шагнул и не воспарил,</p>
<p class="v">Вошел в огонь, и огонь тебя опалил,</p>
<p class="v">Ринулся в чащу, а там берлога,</p>
<p class="v">Шел на медведя, а их там шесть, –</p>
<p class="v">Это почерк дьявола, а не Бога,</p>
<p class="v">Это дьявол под маской Бога</p>
<p class="v">Отнимает надежду там, где надежда есть.</p>
</div>
</div></span><span id="id26"><div class="title5">
<p class="p">Песенка</p>
</div><div class="poem">
<div class="stanza">
<p class="v">Да, завидую – ты можешь на него облокотиться,</p>
<p class="v">Опереться, положиться, встать под сень.</p>
<p class="v">Ибо он твое спасенье, как окоп для пехотинца,</p>
<p class="v">Как кинжал для кахетинца, как постель</p>
<p class="v">Для усталого скитальца, как непалка для непальца,</p>
<p class="v">Как для путника в чащобе тайный знак.</p>
<p class="v">Да, завидую, мой ангел. Извини мое нахальство.</p>
<p class="v">Я и сам бы так хотел, но все никак.</p>
</div>
<div class="stanza">
<p class="v">Для меня же ты окопа не увидишь, как ни щурься.</p>
<p class="v">Редкий лес, пустое поле, голый лед.</p>
<p class="v">Ибо мне он не опора, извини мое кощунство,</p>
<p class="v">А скорее, я боюсь, наоборот.</p>
<p class="v">Мне никто не даст гарантий, даже если бы воскресли</p>
<p class="v">Все святые, коим имя легион.</p>
<p class="v">Это я его последняя надежда, ибо если</p>
<p class="v">Я обрушусь, то обрушится и он.</p>
<p class="v">Ты умеешь видеть стену, я умею – только бездну,</p>
<p class="v">Обступившую меня по рубежу.</p>
<p class="v">Это он навек исчезнет, если я навек исчезну</p>
<p class="v">Или даже если что не так скажу.</p>
</div>
<div class="stanza">
<p class="v">Кто из нас сидит в окопе, кто танцует на прицеле –</p>
<p class="v">Не подскажет никакое колдовство.</p>
<p class="v">Хорошо тебе, и плохо мне, держащемуся еле,</p>
<p class="v">А ему – боюсь и думать каково.</p>
</div>
</div><p class="subtitle">* * *</p><p class="p1">Озирая котел, в котором ты сам не варишься, презирая клятвы, которые мы даем, – не тверди мне, агностик, что ты во всем сомневаешься. Или нет, тверди – добавляя: «во всем твоем». Ибо есть твое – вопреки утвержденью строгому, что любая вера тобою остранена. Есть твое, и мне даже страшно глядеть в ту сторону – до того скупа и безводна та сторона. Где уж мне до упорства черствого, каменистого, хоть надень я мундир и ремнями перетянись. Есть твое, и в него ты веришь настолько истово, что любой аскет пред тобою релятивист. Ход туда мне закрыт. Дрожа, наблюдаю издали: кабала словес, ползучая каббала, лабиринты, пески, а меж ними такие идолы, что игрушками кажутся все мои купола.</p><p class="p1">Не тверди, обнимаясь с тартусцами и с ве́нцами, рассыпая мелкие искры, как метеор, – что с таких, как я, начинаются все Освенцимы, ибо всякая твердая вера – уже террор. Как я знаю всю твою зыбкость, перетекание, разрушенье границ – соблазн его так влекущ! Есть твоя вертикаль, и она еще вертикальнее, но скрывает ее туман, оплетает плющ. Я боюсь плюща – хоть растенье, в общем, красивейшее. Так узорчат лист, так слаба курчавая плеть – но за слабостью этой темнеет такая силища, что и дубу, и грабу опасно туда смотреть.</p><p class="p1">Но хоть все пески, всю пустыню словами вымости, завали цветами, чей многоцветен пир, – не тверди, не пой мне о щедрой твоей терпимости и о том, как в сравнении с нею я нетерпим! О, ты терпишь всех, как терпит белая бестия ундерменша в коросте, прикованного к ярму. Я терплю этот мир иначе – как терпят бедствие. Извини, что я иногда нетерпим к нему.</p><p class="p1">Я не все говорю, не всему раздаю названия, вообще не стремлюсь заглядывать за края – ибо есть зазор спасительного незнания, что тебе и мне оставляет вера моя. В небесах случаются краски, которых в мире нет, – немучительная любовь и нестыдный стыд. Твой пустынный Бог никогда меня не помилует, – мой цветущий тебя простит и меня простит.</p></span><span id="id27"><div class="title5">
<p class="p">Теодицея</p>
</div><div class="epigraph">
<p class="p1">– <em>На,</em> – <em>сказал генерал, снимая «Командирские».</em> –</p>
<p class="p1"><em>Хочешь – носи, хочешь – пропей.</em></p>
<p class="text-author">Михаил Веллер</p>
</div><div class="poem">
<div class="stanza">
<p class="v">Не всемощный, в силе и славе, творец миров,</p>
<p class="v">Что избрал евреев и сам еврей,</p>
<p class="v">Не глухой к раскаяньям пастырь своих коров,</p>
<p class="v">Кучевых и перистых, – а скорей</p>
<p class="v">Полевой командир, небрит или бородат,</p>
<p class="v">Перевязан наспех и полусед.</p>
<p class="v">Мне приятно думать, что я не раб его, а солдат.</p>
<p class="v">Может быть, сержант, почему бы нет.</p>
</div>
<div class="stanza">
<p class="v">О, не тот, что нашими трупами путь мостит</p>
<p class="v">И в окоп, естественно, ни ногой,</p>
<p class="v">Держиморда, фанат муштры, позабывший стыд</p>
<p class="v">И врага не видевший, – а другой,</p>
<p class="v">Командир, давно понимающий всю тщету</p>
<p class="v">Гекатомб, но сражающийся вотще,</p>
<p class="v">У которого и больные все на счету,</p>
<p class="v">Потому что много ли нас вообще?</p>
</div>
<div class="stanza">
<p class="v">Я не вижу его верховным, как ни крути.</p>
<p class="v">Генеральный штаб не настолько прост.</p>
<p class="v">Полагаю, над ним не менее десяти</p>
<p class="v">Командиров, от чьих генеральских звезд</p>
<p class="v">Тяжелеет небо, глядящее на Москву</p>
<p class="v">Как на свой испытательный полигон.</p>
<p class="v">До победы нашей я точно не доживу –</p>
<p class="v">И боюсь сказать, доживет ли он.</p>
</div>
<div class="stanza">
<p class="v">Вот тебе и ответ, как он терпит язвы земли,</p>
<p class="v">Не спасает детей, не мстит палачу.</p>
<p class="v">Авиации нет, снаряды не подвезли,</p>
<p class="v">А про связь и снабжение я молчу.</p>
<p class="v">Наши танки быстры, поём, и крепка броня,</p>
<p class="v">Отче наш, который на небесех!</p>
<p class="v">В общем, чудо и то, что с бойцами вроде меня</p>
<p class="v">Потеряли еще не всё и не всех.</p>
</div>
<div class="stanza">
<p class="v">Всемогущий? – о нет. Орудья – на смех врагу.</p>
<p class="v">Спим в окопах – в окрестностях нет жилья.</p>
<p class="v">Всемогущий может не больше, чем я могу.</p>
<p class="v">«Где он был?» – Да, собственно, где и я.</p>
<p class="v">Позабыл сказать: поощрений опять же нет.</p>
<p class="v">Ни чинов, ни медалей он не дает.</p>
<p class="v">Иногда подарит – кому огниво, кому кисет.</p>
<p class="v">Скажем, мне достались часы «Полет».</p>
</div>
<div class="stanza">
<p class="v">А чего, хорошая вещь, обижаться грех.</p>
<p class="v">Двадцать пять камней, музыкальный звон.</p>
<p class="v">Потому я и чувствую время острее всех –</p>
<p class="v">Иногда, похоже, острей, чем он.</p>
<p class="v">Незаметные в шуме, слышные в тишине,</p>
<p class="v">Отбивают полдень и будят в шесть,</p>
<p class="v">Днем и ночью напоминая мне:</p>
<p class="v">Времени мало, но время есть.</p>
</div>
</div></span><span id="id28"><div class="title5">
<p class="p">Колыбельная для дневного сна</p>
</div><div class="poem">
<div class="stanza">
<p class="v">В удушливом полдне, когда ни гу-гу</p>
<p class="v">В цветущем лугу и заросшем логу,</p>
<p class="v">И, еле качая тяжелые воды,</p>
<p class="v">Река изогнулась в тугую дугу</p>
<p class="v">И вяло колышет лиловые своды</p>
<p class="v">Клубящейся тучи на том берегу, –</p>
<p class="v">СГУЩАЮТСЯ СИЛЫ НЕЯСНОЙ ПРИРОДЫ.</p>
<p class="v">Я слышу их рост и уснуть не могу.</p>
</div>
<div class="stanza">
<p class="v">Как темные мысли клубятся в мозгу,</p>
<p class="v">Как в пыльные орды, в живую пургу</p>
<p class="v">Сбивают гонимые страхом народы, –</p>
<p class="v">В безмолвии августа, в душном стогу,</p>
<p class="v">В теплице безветренной влажной погоды</p>
<p class="v">СГУЩАЮТСЯ СИЛЫ НЕЯСНОЙ ПРИРОДЫ.</p>
<p class="v">Я вижу их мощь и дышать не могу.</p>
</div>
<div class="stanza">
<p class="v">Один изгаляется в узком кругу,</p>
<p class="v">Взахлеб допивая остатки свободы,</p>
<p class="v">Другой проклинает недавние годы,</p>
<p class="v">А третий бежит, норовя на бегу</p>
<p class="v">Еще и поставить подножку врагу, –</p>
<p class="v">Хотя их обоих накроют отходы,</p>
<p class="v">Осколки руды и обломки породы.</p>
<p class="v">На всем горизонте, на каждом шагу</p>
<p class="v">СГУЩАЮТСЯ СИЛЫ НЕЯСНОЙ ПРИРОДЫ.</p>
<p class="v">Я знаю какой, но сказать не могу.</p>
</div>
<div class="stanza">
<p class="v">Но в это же время, над той же рекой,</p>
<p class="v">В лиловом дыму вымывая проходы,</p>
<p class="v">В ответ собираются силы такой,</p>
<p class="v">Такой недвусмысленно ясной природы,</p>
<p class="v">Что я ощущаю мгновенный покой.</p>
</div>
<div class="stanza">
<p class="v">Уже различая друг друга в тумане,</p>
<p class="v">Они проплывают над лесом травы.</p>
<p class="v">Имело бы смысл собираться заране,</p>
<p class="v">Но первыми мы не умеем, увы.</p>
</div>
<div class="stanza">
<p class="v">И я засыпаю, почти замурлыкав,</p>
<p class="v">В потоке родных переливов и бликов</p>
<p class="v">Плывя в грозовую, уютную тьму.</p>
<p class="v">У тех, кто клубится в лиловом дыму,</p>
<p class="v">Всегда бесконечное множество ликов,</p>
<p class="v">А мы остаемся верны одному.</p>
</div>
<div class="stanza">
<p class="v">Неясно, каков у них вождь и отец,</p>
<p class="v">Неясно, чего они будут хотеть,</p>
<p class="v">Неясно, насколько все это опасно</p>
<p class="v">И сколько осталось до судного дня,</p>
<p class="v">И как это будет, мне тоже неясно.</p>
<p class="v">Чем кончится – ясно, и хватит с меня.</p>
<p class="v">Одиннадцатая баллада</p>
</div>
</div></span><span id="id29"><div class="title5">
<p class="p">Серым мартом, промозглым апрелем,</p>
</div><div class="poem">
<div class="stanza">
<p class="v">Миновав турникеты у врат,</p>
<p class="v">Я сошел бы московским Орфеем</p>
<p class="v">В кольцевой концентрический ад,</p>
</div>
<div class="stanza">
<p class="v">Где влачатся, с рожденья усталы,</p>
<p class="v">Позабывшие, в чем их вина,</p>
<p class="v">Персефоны, Сизифы, Танталы</p>
<p class="v">Из Медведкова и Люблина, –</p>
</div>
<div class="stanza">
<p class="v">И в последнем вагоне состава,</p>
<p class="v">Что с гуденьем вползает в дыру,</p>
<p class="v">Поглядевши налево-направо,</p>
<p class="v">Я увижу тебя – и замру.</p>
</div>
<div class="stanza">
<p class="v">Прошептав машинально «Неужто?»</p>
<p class="v">И заранее зная ответ,</p>
<p class="v">Я протиснусь к тебе, потому что</p>
<p class="v">У теней самолюбия нет.</p>
<p class="v">Принимать горделивую позу</p>
<p class="v">Не пристало спустившимся в ад.</p>
<p class="v">Если честно, я даже не помню,</p>
<p class="v">Кто из нас перед кем виноват.</p>
</div>
<div class="stanza">
<p class="v">И когда твои хмурые брови</p>
<p class="v">От обиды сомкнутся в черту, –</p>
<p class="v">Как Тиресий от жертвенной крови,</p>
<p class="v">Речь и память я вновь обрету.</p>
</div>
<div class="stanza">
<p class="v">Даже страшно мне будет, какая</p>
<p class="v">Золотая, как блик на волне,</p>
<p class="v">Перекатываясь и сверкая,</p>
<p class="v">Жизнь лавиной вернется ко мне.</p>
</div>
<div class="stanza">
<p class="v">Я оглохну под этим напором</p>
<p class="v">И не сразу в сознанье приду,</p>
<p class="v">Устыдившись обличья, в котором</p>
<p class="v">Без тебя пресмыкался в аду,</p>
</div>
<div class="stanza">
<p class="v">И забьется душа моя птичья,</p>
<p class="v">И, выпрастываясь из тенёт,</p>
<p class="v">Дорастет до былого величья –</p>
<p class="v">Вот тогда-то как раз и рванет.</p>
</div>
<div class="stanza">
<p class="v">Ведь когда мы при жизни встречались,</p>
<p class="v">То, бывало, на целый квартал</p>
<p class="v">Буря выла, деревья качались,</p>
<p class="v">Бельевой такелаж трепетал.</p>
</div>
<div class="stanza">
<p class="v">Шум дворов, разошедшийся Шуман,</p>
<p class="v">Дранг-унд-штурмом врывался в дома –</p>
<p class="v">То есть видя, каким он задуман,</p>
<p class="v">Мир сходил на секунду с ума.</p>
</div>
<div class="stanza">
<p class="v">Что там люди? Какой-нибудь атом,</p>
<p class="v">Увидавши себя в чертеже</p>
<p class="v">И сравнивши его с результатом,</p>
<p class="v">Двадцать раз бы взорвался уже.</p>
</div>
<div class="stanza">
<p class="v">Мир тебе, неразумный чеченец,</p>
<p class="v">С заготовленной парою фраз</p>
<p class="v">Улетающий в рай, подбоченясь:</p>
<p class="v">Не присваивай. Всё из-за нас.</p>
</div>
<div class="stanza">
<p class="v">…Так я брежу в дрожащем вагоне,</p>
<p class="v">Припадая к бутылке вина,</p>
<p class="v">Поздним вечером, на перегоне</p>
<p class="v">От Кузнецкого до Ногина.</p>
</div>
<div class="stanza">
<p class="v">Эмиссар за спиною маячит,</p>
<p class="v">В чемоданчике прячет чуму…</p>
<p class="v">Только равный убьет меня, значит?</p>
<p class="v">Вот теперь я равняюсь чему.</p>
</div>
<div class="stanza">
<p class="v">Остается просить у Вселенной,</p>
<p class="v">Замирая оглохшей душой,</p>
<p class="v">Если смерти – то лучше мгновенной,</p>
<p class="v">Если раны – то пусть небольшой.</p>
</div>
</div></span><span id="id30"><div class="title5">
<p class="p">Двенадцатая баллада</p>
</div><p class="p1">Хорошо, говорю. Хорошо, говорю тогда. Беспощадность вашу могу понять я. Но допустим, что я отрекся от моего труда и нашел себе другое занятье. Воздержусь от врак, позабуду, что я вам враг, буду низко кланяться всем прохожим. Нет, они говорят, никак. Нет, они отвечают, никак-никак. Сохранить тебе жизнь мы никак не можем.</p><p class="p1">Хорошо, говорю. Хорошо, говорю я им. Поднимаю лапки, нет разговору. Но допустим, я буду неслышен, буду незрим, уползу куда-нибудь в щелку, в нору, стану тише воды и ниже травы, как рак. Превращусь в тритона, в пейзаж, в топоним. Нет, они говорят, никак. Нет, они отвечают, никак-никак. Только полная сдача и смерть, ты понял?</p><p class="p1">Хорошо, говорю. Хорошо же, я им шепчу. Все уже повисло на паутинке. Но допустим, я сдамся, допустим, я сам себя растопчу, но допустим, я вычищу вам ботинки! Ради собственных ваших женщин, детей, стариков, калек: что вам проку во мне, уроде, юроде?</p><p class="p1">Нет, они говорят. Без отсрочек, враз и навек. Чтоб таких, как ты, вообще не стало в природе.</p><p class="p1">Ну так что же, я говорю. Ну так что же-с, я в ответ говорю. О, как много попыток, как мало проку-с. Это значит, придется мне вам и вашему королю в сотый раз показывать этот фокус. Запускать во вселенную мелкую крошку из ваших тел, низводить вас до статуса звездной пыли. То есть можно подумать, что мне приятно. Я не хотел, но не я виноват, что вы всё забыли! Раз-два-три. Посчитать расстояние по прямой. Небольшая вспышка в точке прицела. До чего надоело, Господи Боже мой. Не поверишь, Боже, как надоело.</p></span><span id="id31"><div class="title5">
<p class="p">Четырнадцатая баллада</p>
</div><div class="poem">
<div class="stanza">
<p class="v">Я знал, что меня приведут</p>
<p class="v">На тот окончательный суд,</p>
<p class="v">Где все зарыдают, и всё оправдают,</p>
<p class="v">И всё с полувзгляда поймут.</p>
<p class="v">И как же, позвольте спросить,</p>
<p class="v">Он сможет меня не простить,</p>
<p class="v">Чего ему боле в холодной юдоли,</p>
<p class="v">Где лук-то непросто растить?</p>
<p class="v">Ведь должен же кто-то, хоть Бог,</p>
<p class="v">Отбросив возвышенный слог,</p>
<p class="v">Тепло и отрадно сказать мне: «Да ладно,</p>
<p class="v">Ты просто иначе не мог!» –</p>
<p class="v">И, к уху склонясь моему,</p>
<p class="v">Промолвить: «Уж я-то пойму!».</p>
<p class="v">Вот так мне казалось; и как оказалось –</p>
<p class="v">Казалось не мне одному.</p>
</div>
<div class="stanza">
<p class="v">…Теперь на процессе своем</p>
<p class="v">Стоим почему-то втроем:</p>
<p class="v">Направо ворота, налево гаррота,</p>
<p class="v">А сзади лежит водоем.</p>
</div>
<div class="stanza">
<p class="v">И праведник молвил: «Господь,</p>
<p class="v">Я долго смирял свою плоть,</p>
<p class="v">Мой ум упирался, но ты постарался –</p>
<p class="v">И смог я его побороть.</p>
<p class="v">Я роздал именье и дом,</p>
<p class="v">Построенный тяжким трудом, –</p>
<p class="v">Не чувствуя срама, я гордо и прямо</p>
<p class="v">Стою перед Вышним судом».</p>
</div>
<div class="stanza">
<p class="v">Он смотрит куда-то туда,</p>
<p class="v">Где движется туч череда,</p>
<p class="v">И с полупоклоном рассеянным тоном</p>
<p class="v">Ему отвечает: «Да-да».</p>
</div>
<div class="stanza">
<p class="v">И рядом стоящий чувак</p>
<p class="v">Сказал приблизительно так:</p>
<p class="v">«Ты глуп, примитивен, ты был мне противен,</p>
<p class="v">Я был твой сознательный враг.</p>
<p class="v">Не просто озлобленный гном,</p>
<p class="v">Которому в радость погром, –</p>
<p class="v">О, я был поэтом, о, я был эстетом,</p>
<p class="v">О, я был ужасным говном!</p>
<p class="v">Я ждал, что для всех моих дел</p>
<p class="v">Положишь ты некий предел, –</p>
<p class="v">Но, словно радея о благе злодея,</p>
<p class="v">Ты, кажется, недоглядел.</p>
<p class="v">Я гордо стою у черты</p>
<p class="v">На фоне людской мелкоты:</p>
<p class="v">Доволен и славен, я был тебе равен –</p>
<p class="v">А может, и выше, чем ты!»</p>
</div>
<div class="stanza">
<p class="v">Он смотрит туда, в вышину,</p>
<p class="v">Слегка поправляет луну</p>
<p class="v">Левее Сатурна – и как-то дежурно</p>
<p class="v">«Ну-ну, – отвечает, – ну-ну».</p>
</div>
<div class="stanza">
<p class="v">Меж тем все темней синева</p>
<p class="v">Все легче моя голова.</p>
<p class="v">Пришла моя очередь себя опорочивать,</p>
<p class="v">А я забываю слова.</p>
<p class="v">Среди мирового вранья</p>
<p class="v">Лишь им и доверился я,</p>
<p class="v">Но вижу теперь я, что все это перья,</p>
<p class="v">Клочки, лоскутки, чешуя.</p>
<p class="v">Теперь из моей головы</p>
<p class="v">Они вылетают, мертвы,</p>
<p class="v">Мой спич и не начат, а что-либо значит</p>
<p class="v">Одно только слово «увы».</p>
</div>
<div class="stanza">
<p class="v">Всю жизнь не умея решить,</p>
<p class="v">Подвижничать или грешить, –</p>
<p class="v">Я выбрал в итоге томиться о Боге,</p>
<p class="v">А также немножечко шить;</p>
<p class="v">И вот я кроил, вышивал,</p>
<p class="v">Не праздновал, а выживал,</p>
<p class="v">Смотрел свысока на фанатов стакана,</p>
<p class="v">На выскочек и вышибал –</p>
<p class="v">И что у меня позади?</p>
<p class="v">Да Господи не приведи:</p>
<p class="v">Из двух миллионов моральных законов</p>
<p class="v">Я выполнил лишь «Не кради».</p>
<p class="v">За мной, о верховный ГУИН,</p>
<p class="v">Так много осталось руин,</p>
<p class="v">Как будто я киллер по прозвищу Триллер,</p>
<p class="v">Чьей пищею был кокаин.</p>
<p class="v">И все это ради того,</p>
<p class="v">Что так безнадежно мертво –</p>
<p class="v">Всё выползни, слизни, осколки от жизни,</p>
<p class="v">Которой живет большинство;</p>
<p class="v">И хроникой этих потерь</p>
<p class="v">Я мнил оправдаться теперь?</p>
<p class="v">Прости меня, Боже, и дай мне по роже –</p>
<p class="v">Я этого стою, поверь.</p>
</div>
<div class="stanza">
<p class="v">Он смотрит рассеянно вдаль,</p>
<p class="v">Я, кажется, вижу печаль</p>
<p class="v">В глазах его цвета усталого лета –</p>
<p class="v">Хорошая строчка, и жаль,</p>
<p class="v">Что некому мне, старику,</p>
<p class="v">Поведать такую строку;</p>
<p class="v">Он смотрит – и скоро взамен приговора</p>
<p class="v">«Ку-ку, – произносит, – ку-ку».</p>
</div>
<div class="stanza">
<p class="v">И мы остаемся втроем</p>
<p class="v">В неведенье полном своем;</p>
<p class="v">Нам стыдно, слюнтяям, что мы отвлекаем,</p>
<p class="v">Подумать ему не даем,</p>
<p class="v">Но праведник дышит тяжко́</p>
<p class="v">И шепчет ему на ушко́:</p>
<p class="v">«Ну ладно, понятно, хотя неприятно,</p>
<p class="v">Но, Господи, дальше-то что?!»</p>
<p class="v">И он, подавляя смешок,</p>
<p class="v">Как если б морской гребешок</p>
<p class="v">Спросил его: «Боже, а дальше-то что же?» –</p>
<p class="v">«Да что? – говорит. – На горшок».</p>
</div>
<div class="stanza">
<p class="v">И вот мы сидим на горшках,</p>
<p class="v">Навек друг у друга в дружках;</p>
<p class="v">Зима наступает, детсад утопает</p>
<p class="v">В гирляндах, игрушках, флажках.</p>
<p class="v">Мой ум заполняет не то,</p>
<p class="v">Что прожито и отжито,</p>
<p class="v">А девочка Маша, и манная каша,</p>
<p class="v">И что-то еще из Барто,</p>
<p class="v">Но я успеваю вместить,</p>
<p class="v">Что он и не мог не простить –</p>
<p class="v">И этого, справа, по имени Слава,</p>
<p class="v">Что всех собирался крестить,</p>
<p class="v">И этого тоже козла,</p>
<p class="v">Эстета грошового зла,</p>
<p class="v">Сидящего слева, по имени Сева,</p>
<p class="v">И третьего – кто он? Не зна…</p>
<p class="v">Он всех нас простит без затей,</p>
<p class="v">Но так, как прощают детей,</p>
<p class="v">Чьи ссоры (при взгляде серьезного дяди)</p>
<p class="v">Пустого ореха пустей.</p>
</div>
<div class="stanza">
<p class="v">Но краем сознанья держась</p>
<p class="v">За некую тайную связь,</p>
<p class="v">Без коей я точно подох бы досрочно</p>
<p class="v">И был совершенная мразь, –</p>
<p class="v">Уставясь в окно, в полумрак,</p>
<p class="v">Где бегает радостно так</p>
<p class="v">Толпа молодежи, – я думаю: «Боже!</p>
<p class="v">А надо-то было-то как?»</p>
</div>
<div class="stanza">
<p class="v">Он смотрит рассеянно вбок,</p>
<p class="v">И взор его так же глубок,</p>
<p class="v">Как тьма океана; но грустно и странно,</p>
<p class="v">Как будто он вовсе не Бог,</p>
<p class="v">Он мне отвечает: «Вот так,</p>
<p class="v">Вот так вот»! – и делает знак,</p>
<p class="v">Но этого знака среди полумрака</p>
<p class="v">Уже мне не видно никак.</p>
<p class="v">Он что-то еще говорит,</p>
<p class="v">И каждое слово горит,</p>
<p class="v">Как уголь заката; шумит, как регата,</p>
<p class="v">Когда над волною парит,</p>
<p class="v">И плещет, как ветка в грозу,</p>
<p class="v">И пахнет, как стог на возу –</p>
<p class="v">Вот так: бобэоби… но нет, вивиэре…</p>
<p class="v">Потом моонзу, моонзу!</p>
</div>
