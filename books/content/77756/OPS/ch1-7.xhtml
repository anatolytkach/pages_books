<span><span><p class="p1">– Ну а что я могу! – Он рывком поднялся и сел рядом. – Мы же не знаем, где… когда… Это не моя специальность. Внедряемся, пытаемся что-то… а разве тут сладишь? Ты думаешь, это единая организация? Это даже не сетка, а так – тыды-кырлы. Здесь рвануло, там рвануло… Я даже не представляю, где это завтра будет. У меня просто подсчет… примерный… Но то, что завтра-послезавтра все войдет в последнюю стадию, – это и без расчетов, в принципе, понятно, просто я не все тебе говорю. Побудь, пожалуйста, дома. И своих никуда не выпускай.</p><p class="p1">– Ты серьезно?</p><p class="p1">– Абсолютно серьезно. Я бы и так тебе сказал. А потом быстро отбирай пять человек и готовься. На отборы, сборы, прощальные приготовления – неделя. После чего старт. Или сдохнем все.</p><p class="p1">– Ты хочешь сказать, что без меня не полетишь?</p><p class="p1">– Именно это я и хочу сказать.</p><p class="p1">– Так нечестно.</p><p class="p1">– А у меня нет вариантов. Иначе тебя не сковырнешь.</p><p class="p1">– Погоди. А нет у тебя предположений… ну, хотя бы относительно… Может, что-то можно остановить?</p><p class="p1">– Остановить нельзя ничего, – хмуро сказал он. – Иначе давно бы само остановилось. Шарик уже покатился, хочешь не хочешь. Не сердись, Кать. Я правда не все могу. Мы вообще избегаем вмешиваться, ты знаешь. Всякое зло – оно копируется очень легко, легче, чем думаешь. Шаг – и ты вовлечен. А нам это нельзя, кудук.</p><p class="p1">– А увозить можно?</p><p class="p1">– А увозить можно, кыдык. Я же не всех беру. Всех бессмысленно.</p><p class="p1">– Но подумай, как я могу на это пойти? Чем я лучше других?!</p><p class="p1">– Ничем не лучше. Я тебя люблю, и все. У нас в таких случаях доверяют эвакуатору.</p><p class="empty-line"/><p class="p1">Дороги домой она не запомнила. Болело все тело, и настроение было хуже некуда – то ли она заболевала, то ли устала, то ли будущее давило на нее всей тяжестью. Она знала за собой эту способность физически предчувствовать худшее. Предположим, что все игра, хотя и совершенно бесчеловечная. Но на секунду, на полсекунды допустим, что нет! И тогда – как жить, если знаешь, что завтра… Но живем же мы, зная, что завтра кто-то не проснется, кто-то разобьется в машине, как поется у Цоя, кто-то сойдет с ума… Черт бы его драл с его выдумками, предупреждала меня мать, что в конце концов обязательно доигрываешься.</p></span></span>
