<span><span><span id="id15"><div class="title3">
<p class="p">1</p>
</div><p class="p1">Оставался час, его надо было где-то пересидеть, и они зашли в «Тбилисский двор». Изможденный непонятно чем – вероятно, долгой жизнью, долгой грузинской жизнью в чужом городе – метрдотель, или как это называется, провел их на веранду второго этажа. Игорь заказал сациви и хаш, Катька попросила двойной эспрессо, а есть она не хотела: не то чтобы в тридцать пять уже приходилось беречь фигуру – фигуре, слава богу, ничего не угрожало, есть такие счастливцы, что и в сорок могут без последствий лопать что угодно, – но просто у нее совершенно не было аппетита, и с утра ее била дрожь, которая, против ожиданий, не утихла даже в постели. В постели, кстати, толком ничего не получилось, и она теперь чувствовала страшную неловкость, как всегда виня себя. Все было совершенно другое, и он суетился, как не суетился никогда прежде, и тоже, вероятно, чувствовал вину – нечего вместе делать двум людям, которые считают себя виноватыми. В гармоничном союзе всегда должен быть один виноват, а другой прав. Интересно, если бы они тогда вдруг, невозможным образом, как угодно, остались вместе – у них бы тоже теперь ничего не получалось? Ничего уже и не было бы, скорее всего. Покажите мне пару, которая восемь лет спустя бросается в кровать с прежней страстью. Но и проживши эти восемь лет врозь, они уже ничего не могли, не хотели, зря старались. У Эдгара По был рассказ, Катька его любила, про мистера Вальдемара: там умирающего загипнотизировали, и он не умер, год пролежал в так называемом месмерическом состоянии, весь холодный и твердый. Потом его разбудили, и он разложился под руками у врача, в несколько секунд достигнув того состояния, в какое перешел бы к этому времени, если бы не случилось месмеризации. Так оно всегда бывает, когда гипнотизируют, чтобы отсрочить неизбежное. Так, собственно, и со страной выйдет, да уже и выходит. Тогда все остановилось, потому что они разошлись, а если бы остались вместе, точно бы уже разложилось на атомы, была бы выжженная пустыня, дикое поле с очагами дотлевающих стычек. Так и будет. И сами они, встретившиеся через восемь лет, были теперь как это дикое поле. Но надо было где-то пересидеть час, не расходиться же сразу. Он позвонил ей в последний день, в день отлета, всю неделю крепился, а под конец не выдержал. Через час ему надо было ехать в Шереметьево и улетать, он прилетал на юбилей матери, которая отказалась за ним последовать. И в последний день позвонил, чего, конечно, не надо было делать. Потому что вдруг теперь все начнет разлагаться.</p><p class="p1">На стене, прямо перед столом, висела овальная акварель в золоченой рамке – девочка-грузинка, красавица-нимфетка, лет пятнадцати, но, по обычаям прелестной горной страны, уже на выданье, играла на фортепьянах, а рядом, глядя на нее с нежным укором, стоял седой учитель музыки. Судя по выражению его бледных глазок, играла она плохо, ей было не до того, все мысли ее были поглощены предстоящим замужеством, а старик музыкант слишком любил ее, чтобы омрачать этот прекрасный день замечаниями. Ясно же, что великой пианистки не выйдет, а сыграть для гостей в замке мужа, грузинского князя, она сможет и так: никого там ее игра волновать не будет.</p><p class="p1">Игорь тоже смотрел на овальную акварель, потому что не на Катьку же ему было смотреть. Катька осталась по-прежнему хороша, и оттого смотреть на нее было особенно грустно: есть женщины, которые сдаются времени, меняются под его напором, в них есть все признаки увядания, и это хорошо, это так и надо; это так же хорошо, как пожилая пара, прожившая вместе много лет, взаимно-заботливая, с трогательными кличками и словечками, но давно уже, конечно, не помнящая, что такое любовь. Так, сожитие – среднее между сожительством и дожитием. Но есть те, которые сопротивляются времени, и на них смотреть грустно: Катька явно сопротивлялась, героически оставалась прежней, и потому видно было, в какой она осаде, какие атаки ей приходится ежеутренне отбивать. Всегда грустно смотреть на человека, не соглашающегося с участью, на идиота-либерала, продолжающего твердить свое, когда страна вокруг безнадежно переродилась и думать не думает ни о каком законе, на красавицу, которая все еще красавица вопреки возрасту – хотя, смирись она и начни стареть, у нее был бы уютный, домашний вид, какой всегда бывает у палача и жертвы после взаимной договоренности. Такой вид, например, бывает у военкома, когда призывник, долго таскавший справки, изнемог в борьбе и согласился призваться. Воробей и кошка дружно говорят «вот и ладненько».</p><p class="p1">– А про этих ты можешь что-нибудь рассказать? – спросила она. Он всегда рассказывал, с этого все у них и началось, и закончиться должно было этим, опять в кафе, на чужой территории. Своей так и не было никогда.</p><p class="p1">– Запросто. Это будет целая новелла.</p><p class="p1">– Какая прелесть! Ведь тыщу лет не слышала.</p><p class="p1">– Ну смотри. Действие происходит в Тифлисе, в семидесятых годах того века. Первая фраза: «Карл Иванович с тоскливой усталостью слушал, как пятнадцатилетняя София Касаткина в пятый раз, рассеянно сбиваясь, начинает “Метель” Листа».</p><p class="p1">– Касаткина?</p><p class="p1">– Ну да. Дочь русского генерала и тифлисской красавицы. Была такая Мэри Галаташвили, любимица всего Тифлиса. Теперь она уже двадцать лет как жена генерала Касаткина. Сын Александр, дочка Софико.</p><p class="p1">– Она виртуоз?</p><p class="p1">– Почему сразу? Ей пятнадцать лет.</p><p class="p1">– «Метель» – сложный этюд. Его Кисин играл в этом возрасте.</p><p class="p1">– Да? Просто я других не знаю.</p><p class="p1">– Ну, пусть виртуоз. Так даже интересней.</p><p class="p1">– Карл Иваныч хотел в очередной раз прервать Софико после особенно грубой ошибки, но пожалел девушку. Он окончательно понял, что ей не до того, нахмурил седые брови, поджал седые губы…</p><p class="p1">– Сильно сказано, сильно.</p><p class="p1">– Катька, ты дура. Ты вечно думаешь о неприличном.</p><p class="p1">– Почему? Я просто представила.</p><p class="p1">– Поджал лиловые старческие губы и собрал ноты. «Фам теперь не то того, София Георгиевна, – сказал старик с затаенной горькой обидой. – Та и уроки наши скоро окончатся навсегда, не будем омрачать прощание. Старый Карл Иванович больше не нужен вам, вы станете замужней женщиной»…</p><p class="p1">– Карл Иваныч! – воскликнула Катька, состроив самую умильную рожу. – Старый, добрый Карл Иваныч! Поймите, у каждой девушки только раз бывает помолвка…</p><p class="p1">– Та, та, – сказал Игорь, мрачно кивая. – <em>Mädchen</em>… <em>Verlobung</em>… Уже какой тут может быть старый Лист, старый Карл Иваныч… Ну, прощайте, дитя мое. В четверг у нас последнее занятие, и я готовлю вам сюрприз… да, <em>eine Überraschung</em>! Теперь же мне пора. – И Карл Иваныч, морщась от подагрических болей, поспешил на первый этаж, где княгиня Мэри отдавала поварам очередные распоряжения.</p><p class="p1">– То есть помолвка уже назначена?</p><p class="p1">– К настоящей тифлисской помолвке готовятся за неделю. Там одних цыплят знаешь сколько замариновать? И сколько они еще маринуются до кондиции? Касаткины не могут ударить в грязь лицом. На свадьбе будет весь Тифлис. Девочку выдают за князя Дадиани.</p><p class="p1">Принесли сациви, Игорь начал есть, и Катька вспомнила, как он ел тогда – рассеянно и без всякой охоты. Теперь появилась какая-то жадность. Плохо будет, если он испортится к старости. Все вокруг портилось очень быстро, и ей приятно было думать, что он там у себя, непонятно где (весть о его отъезде дошла до нее с полугодовым опозданием), остался хорошим. Она никогда не думала о нем со злостью, никогда, кроме разве что самых первых месяцев, когда иначе было попросту не выжить: прижечь, залить спиртом, засыпать пеплом. Теперь, собственно, уже и шрама не было видно – или, правду сказать, был один шрам во всю душу, не только от Игоря, вообще от всего.</p><p class="p1">– Князь Дадиани, – сказала она рассеянно, как ожидающая свадьбы Софико, – то есть Тимур Дадиани – главный художник «Семьи», такой был издательский дом.</p><p class="p1">– Да, – сказал Игорь, – я знаю.</p><p class="p1">– А возьми вина все-таки.</p><p class="p1">Словно прочитав ее мысли, к ним подскочил молоденький официант, принял заказ и так же экзальтированно умчался: в «Тбилисском дворе» старательно стилизовались под правильный тифлисский ресторан времен Софико Касаткиной.</p><p class="p1">– Ладно, – легко согласился Игорь, – пускай он будет князь Тавиани.</p><p class="p1">– Да-да. Третий брат Тавиани. Двое кино снимают, а третий дурак.</p><p class="p1">– Но согласись, звучит. Князь Тавиани.</p><p class="p1">– Да по мне хоть Иванишвили. Хоть Киндзмараули.</p><p class="p1">– Ну вот. Карл Иваныч, робко кланяясь, вошел к Мэри Касаткиной, урожденной Галаташвили, женщине под сорок, но все еще прелестной, хотя и несколько бледной. У нее, знаешь, частые истерики, мигрени, и тогда весь дом ходит на цыпочках.</p><p class="p1">– Прекрасно. Я этот тип знаю. Еще не забудь, она нюхает соли.</p><p class="p1">– Ты сама такая будешь. Сорок лет, прелестная, с мигренями.</p><p class="p1">– Вот уж нет. Я не могу себе позволить мигрени, у меня нет прислуги и поваров. И никто не будет ходить на цыпочках.</p><p class="p1">– Госпожа Касаткина, – говорит Карл Иваныч робко, непрерывно кланяясь и словно с трудом решаясь высказать главное. – Я должен вас просить об огромном одолжении.</p><p class="p1">– Карл Иваныч, вам заплатят столько, сколько вы скажете, – пообещала Катька.</p><p class="p1">– Нет, нет. Я прошу не об этом. Мне таже и фофсе не нато никаких тенех. Но я, – Карл Иваныч глубоко вздыхает и наконец ныряет в свое ужасное предложение, – я умоляю фас отменить эту помолвку или по крайней мере отлошить ее.</p><p class="p1">– Ах, Карл Иваныч, – сказала Катька томно и принялась тереть правый висок. – Я так ужасно занята со всеми этими приготовлениями, что ничего не понимаю, что вы такое говорите. И вы еще так тихо говорите, а в саду так ужасно кричат эти ужасные птицы…</p><p class="p1">Все-таки ей приятно было играть с ним, это было приятней всего, что ей приходилось делать, и она так давно не делала этого. А больше этого не умел делать никто. И опять она не знала, чем все кончится.</p><p class="p1">– Госпоша Касаткина, – повторил Карл Иваныч с усилившимся от волнения акцентом. – Я прошу, я умоляю фас. Я никокта нитшево не скашу просто так. Но вы толшны понять. Речь о судьбе вашей точери. Огромная опасность. Отлошите свадьбу. Я представлю все доказательства, все, что восмошно.</p><p class="p1">– Карл Иваныч, все это к мужу, к мужу, – отмахнулась Катька. – У меня с утра ужасно голова болит, невыносимо, и все эти цыплята… Да, Автандил, миленький, – сказала она апарт, – так, значит, пятерых замаринуйте с эстрагоном, а шестерых с ткемали, и, знаете, пожалуй, еще двух в сливках с чесноком, как любит наш губернатор…</p><p class="p1">– И Карл Иваныч, – сказал Игорь, глядя на нее прежними, любующимися, близорукими глазами, – кряхтя побрел в кабинет отца, генерала Касаткина.</p><p class="p1">– Пуф, пуф, пуф, – сказала Катька, подбоченилась и разгладила воображаемые усы.</p><p class="p1">– Нет, нет, за генерала тоже буду я. Ты не знаешь, в чем там дело, а я знаю.</p><p class="p1">– Но я догадаюсь!</p><p class="p1">– Нет-нет. Повороты непредсказуемы. Я уже вижу всю эту историю с такой ясностью, словно заглянул за рамку картинки. Генерал Касаткин обсуждает с каким-нибудь своим подгенералом, или как там это у них называется, праздничный фейерверк, который должен потрясти весь Тифлис. Что ему там еще делать в Тифлисе? Он был когда-то боевой красавец, подавлял воинственных горцев, но теперь, как все военные на долгом постое, больше всего озабочен праздниками, фейерверками, парадами по случаю тезоименитства… или тезоименинства? Он несколько уже обрюзг, хотя все еще прекрасен. Знаменит внезапными вспышками гнева, во время которых весь апоплексически краснеет. Когда-нибудь так и помрет. Уделяет фейерверку огромное внимание, чтобы обязательно были петарды фамильных цветов князя Тавиани – зеленый и красный.</p><p class="p1">– Они все дальтоники, да.</p><p class="p1">– Да, это у них фамильное. И несчастный старик пришел совсем, совсем не вовремя. Господин генерал, говорит он решительно, я умоляю, я отшень прошу фас – отошлите на одну буквально минуту вашего помотшника, я имею вам скажать страшно фашное! Генерал любит старика, видит, что тот добросовестно старается выучить его немузыкальную дочь хоть каким-то до-ре-ми, и нехотя говорит: Николай Федорович, голубчик, уж подождите там в гостиной, вы же видите… И указывает бровями на старого сумасшедшего немца, который, конечно, чуть-чуть влюблен в молодое прелестное создание, а теперь учителя погонят со двора, очень грустно, можно понять…</p><p class="p1">– Да-да, – сказала Катька, – конечно, Георгий Васильевич, конечно. Я покурю пока в саду.</p><p class="p1">– Георгий Фасильевитш, – сказал Игорь, чуть приподнявшись и нависая над столом. – Я прошу фас. Фы должны отменить свадьбу.</p><p class="p1">Катька откинулась на стуле, изображая апоплексический удар.</p><p class="p1">– То есть как! – восклицает генерал Касаткин. – Что вы такое говорите, Карл Иванович! Вы давно у нас, вы друг дома, и как родной, и все такое, но вы позволяете…</p><p class="p1">– Какой-то он партийный функционер, – сказала Катька. – Какой-то он секретарь обкома.</p><p class="p1">– Так он и есть секретарь обкома! Он большая шишка в гарнизоне, он представитель государства в Тифлисе, армейский крикун, давно не воевавший. Как он еще должен разговаривать? Он может даже по имени-отчеству и на «ты»: Карл Иваныч, ты сам все понимаешь… Но он на «вы», потому что все-таки аристократ.</p><p class="p1">– Я начинаю догадываться, – прошептала Катька и сделала большие глаза.</p><p class="p1">– Ни о чем ты не догадываешься. Итак. Фы не знаете, говорит Карл Иванович, но я, я знаю. Фаш этот фосточный красавец никакой не князь Тавиани. Он авантюрист, выдающий себя за другого. Он не аристократ. Его если поскрести, то вы увидите такое… Он воспользуется приданым вашей дочери, обестшестит ее и бросит, и вы никогда не отшиститесь от этого позора. Отложите свадьбу. Отмените ее фовсе.</p><p class="p1">– Да вы… да вы… да вы знаете ли, что вы себе позволяете, Карл вы этакой Иваныч! – завизжала Катька так, что на них оглянулись с дальнего столика – больше на веранде никого не было. – Что вы себе позволяете, в конце концов! Знаете ли вы, на кого клевещете! Я знаю князя Тавиани, я был с ним… это самое… где же я с ним был? Я был с ним на охоте! Мы стреляли с ним фазанов, да! Он вел себя как настоящий мужчина!</p><p class="p1">– Барсов мы стреляли, – подсказал Игорь.</p><p class="p1">– И барсов, да! Там были двое, барс и барсетка, так он сумел воткнуть и там два раза повернуть! Барс в шоке, барсетка в обмороке. Он героический воин, настоящий аристократ, я проверил всю его родословную, и вы не смеете… вы никакого права… вы забываетесь, милости-сдарь! – Катька стукнула кулачком по столу. – Моя дочь Полина, то есть моя дочь Софико никогда не полюбила бы авантюриста! Мы, генералы Касаткины, триста лет служим престолу и насквозь видим всех, и всякий старый немец не будет нам тут, русским генералам… Простите, Карл Иваныч, – сказала она, отдышавшись. – Но вы действительно уж что-то это самое, переходите за грань.</p><p class="p1">– Кхарашо, – сказал Игорь и понурился. – Отшень кхарашо. Пусть же будет все, что будет. Прошу вас простить меня, генерал Касаткин.</p><p class="p1">– Да что же… да ничего… – забормотала Катька. – Вы тоже простите, погорячился, но вы сами понимаете, со всей этой помолвкой сейчас весь дом как с ума посходил…</p><p class="p1">– И Карл Иваныч, – продолжил Игорь, – является в четверг на последнее занятие. Ейн сюрприз! – восклицает он. Мы едем сегодня на наш последний урок к моему другу Альберту Федоровичу, он живет тут недалеко под Мтацминдой, он есть феликий музыкант. Не то што я, я обытшный музыкант. А он есть великий, и я хочу, тштобы он вас послушал и дал советы, как вам дальше укреплять ваш недюшинный талант.</p><p class="p1">– И ее вот так с ним отпускают? – ахнула Катька.</p><p class="p1">– Почему нет? Естественная вещь, старый немец, чудаковатый, всегда парик носит. Видишь парик? – он ткнул пальцем в картинку. – Ему лет семьдесят уже. И он раньше тоже возил ее на концерты, в оперу. Когда в Тифлис приезжали Патио, Бозио, Блерио – ну помнишь, летчик, он еще немного пел, – так он ее возил, конечно, и смотрел за ней, как бонна…</p><p class="p1">– Переменял панталоны ей…</p><p class="p1">– Все ей переменял, трогал всяко.</p><p class="p1">Они уставились друг на друга с прежней радостью, словно и не было никаких восьми лет, – но они были и очень чувствовались, и это была уже не игра, а игра в игру.</p><p class="p1">– Они едут в сторону Мтацминды. Но тут Софико начинает замечать, что вот уж пошли окраинные улочки, и вот уже они миновали телебашню, которой не было, конечно, но она уже угадывалась, и понятно было, что едут они вовсе не в центр города и не к великому музыканту. Она ощущает смутное беспокойство. Карл Иваныч сидит напротив, глядит в окно, он неподвижен, голова оперта на скрещенные руки, а те, в свою очередь, на серебряный набалдашник трости.</p><p class="p1">– Боже мой! Что же он будет делать этой тростью!</p><p class="p1">– Ничего, это отвлекающая деталь.</p><p class="p1">– Куда же мы едем, Карл Иванович? – прошептала Катька с грузинским акцентом. – Куда вы везете меня? Помните, если вы решили меня похитить или учинить мне какое-то иное зло, мой жених, князь Тавиани… сделает с вами такое…</p><p class="p1">– Молчи, девочка, – спокойно ответил Игорь с тем же грузинским акцентом. – Пожалуйста, молчи.</p><p class="p1">– Ах, почему это я должна молчать, интересно! – пискнула Катька.</p><p class="p1">– Молчи, женщина, – сказал Игорь веско. – Потому что это я – князь Тавиани.</p></span><span id="id16"><div class="title3">
<p class="p">2</p>
</div><p class="p1">Признаться, этого она не ждала. Он не разучился ее удивлять.</p><p class="p1">– Какого же это хрена вы князь Тавиани? – спросила она и подбоченилась.</p><p class="p1">– Слушай мою команду, в смысле мою историю, – сказал Игорь, не поднимая глаз и размешивая соль в хаше. – Когда-то давным-давно молодой и глупый князь Тавиани познакомился в Петербурге не с теми людьми и вошел в опасный кружок. Они были молодые фурьеристы, ничего серьезного. Князь Тавиани перед ними форсил, поил грузинским вином и клялся, что его поддержит вся Мингрелия, что у него там в любом кабаке, то есть духане, все свои, и Кавказ поднимется и отделится, и все вместе мы опрокинем ненавистное самодержавие! И вообще – бахахи цхалши хихинебс! – он вскинул кулак. – Конечно, он врал. Он совсем не знал родную Грузию. И все эти люди не верили ему. Но среди них был осведомитель! – он многозначительно поднял брови. – Очень возможно, это был тот самый русский писатель, который всю жизнь писал про подпольных типов. Между прочим, большая сволочь.</p><p class="p1">– Он не был осведомитель! – вступилась Катька. – Он был прекрасный человек! Ты знаешь, что за ним был надзор до конца дней? Он знал, что его письма вскрываются, и нарочно писал жене подробно про то, как любит ее всю и в особенности один предмет, и как он хотел бы вдумчиво целовать именно этот предмет.</p><p class="p1">– Он был злобная скотина, но неважно, – отмахнулся Игорь – Надо было раскрыть заговор, хотя его не было, и заговор раскрыли, и князь Тавиани должен был вместе со всеми получить приговор – расстрел, замененный ссылкой, – но его предупредили. Он успел скрыться из Петербурга. Это у русских нет никакой национальной солидарности, а ему намекнул кто-то из своих, и он успел уехать в Берлин. Там он много лет скитался под чужим именем, напуганный на всю жизнь, выучился музыке – ведь все грузины очень музыкальны! Но проклятая ностальгия томила и мучила его, как будто он знал, что в Тифлисе ему еще суждено найти настоящую страсть, и он, смертельно боясь разоблачения, проник в родную Грузию под чужим именем. Его никто не узнавал, вдобавок он носил парик; никто не помнил князя Тавиани и не заподозрил бы, что этот седой, робкий старик и есть когдатошний пылкий юноша, мечтавший об отделении Кавказа и умеренном раскрепощении отдельных угнетенных. Карл Иваныч с наслаждением выпивал боржоми и киндзмараули, обучал прелестную девочку игре на рояли, тихо радовался ее успехам – но тут в дом повадился ужасный ястреб, подлый авантюрист, выдающий себя за князя Тавиани! Ведь тот Тавиани давно пропал без вести, а этот был наглый пятидесятилетний самозванец, присвоивший чужое имя и биографию! Где было генералу Касаткину проверить его родословную? Он ничего не понимал в грузинских князьях, а Мэри была рада-радешенька, что блестящий аристократ заинтересовался ее дочкой. Кстати, этот фальшивый Тавиани был карточный шулер и сорил деньгами. Карл Иваныч панически боялся открыться, он уверен, что над ним по-прежнему висит чахотка и Сибирь, что дело его не закрыто и петрашевцы по-прежнему вне закона, а Достоевский пишет проправительственные романы по заданию Третьего отделения, иначе его тут же сошлют обратно в Омск! Представь, какой это ужас: знать, что назвавшийся твоим именем самозванец будет сейчас соблазнять прелестное существо, получит все приданое, бежит – и ты, ты будешь опозорен! Нет, с этим князь Тавиани мириться не мог. Он отчаялся отложить свадьбу и задумал похитить невесту, поскольку другого способа отменить помолвку у него нет. Теперь он везет ее в старую усадьбу, которую ему когда-то подарил отец; разумеется, там теперь запустение, но, может быть, его помнит хоть кто-то…</p><p class="p1">– И Софико смотрит на него вот такими вот глазами, – подхватила Катька. – Она понимает, что такое настоящий старый аристократ. В ее душе просыпается любовь к настоящему Тавиани, она целует его морщины, стаскивает парик, под которым круглая, потная мингрельская лысина…</p><p class="p1">– Да какое там стаскивает! – сказал Игорь устало. – В обморок она падает. Они все, то есть вы, падаете в обморок при первой возможности. Потный парик, еще чего.</p><p class="p1">Киндзмараули было удивительно невкусным, но это был шанс несколько оглушить себя и притупить внезапно прорезавшуюся, дикую, с каждым словом усиливавшуюся тоску. Словно тормоз отпустили наконец. С утра, на остановке, потом в постели – все время был тормоз и дрожь, а сейчас одна тоска, пресная, сухая и белая, как лаваш.</p><p class="p1">– Ну а как это все разрешается?</p><p class="p1">– Это все еще далеко не разрешается. Он привозит ее в имение. Дома крик, шум, все ее разыскивают. И только три дня спустя во двор въезжает роскошная карета. Из нее выходит Карл Иваныч, без парика, в черкеске, или как там это называется, весь в белом, все шелковое, роскошное, национальное. Великолепный старик. С ним Софико, тоже во всем белом, только глаза красные от слез. Я – князь Тавиани! Я похитил вашу дочь по нашим обычаям и женюсь на ней, я наследник огромного состояния, вот все подтверждения, вот мой двоюродный брат, он подтверждает, что я Автандил Тавиани, все родинки на месте. Я бежал и скитался, и все дела. И если теперь справедливая русская власть сочтет нужным меня арестовать за политические преступления, которых я не совершал, говорит он на хорошем грузинском языке, то ваша дочь останется наследницей миллионного состояния, ей будет принадлежать половина Мингрелии. Это подлинно большая честь – быть вдовой князя Тавиани. Она сможет снова выйти замуж и будет еще счастлива. А этот презренный авантюрист – держите его, потому что я вижу, как он собирается бежать! – он будет сейчас разоблачен, и в случае чего сядем вместе. Так я сказал! Бахахи цхалши хихинебс, таков девиз нашего княжеского дома!</p><p class="p1">– Вах! – воскликнула Катька.</p><p class="p1">– Но тут прибывает тифлисский генерал-губернатор, который все уже знал, конечно. Мы счастливы приветствовать в нашем городе князя Тавиани! – восклицает он. – Настоящего князя Тавиани, да! И мы с презрением сейчас погоним этого самозванца, и я лично заклепаю его во узы! А вам, князь, я спешу сообщить, что вы полностью амнистированы еще в 1858 году, и дело ваше совершенно прекращено, и вы могли вернуться уже пятнадцать лет назад, потому что у всех бывают заблуждения молодости! И я благословляю ваш союз, дети мои, а вы, дорогая Софико, должны гордиться тем, как ваш старый учитель рисковал жизнью, чтобы спасти вас от позорного брака с негодяем.</p><p class="p1">– А Софико стоит ни жива ни мертва. А Мэри в обмороке.</p><p class="p1">– И генерал Касаткин в обмороке, и Николай Федорович оттирает его притираниями. Короче, пожар в борделе во время наводнения, три свадьбы и одни похороны. Авантюриста ловят, он кусается. Но это, разумеется, не конец.</p><p class="p1">– Еще бы! – сказала Катька. – У нас еще двадцать минут.</p></span><span id="id17"><div class="title3">
<p class="p">3</p>
</div><p class="p1">– Ну и вот, – сказал Игорь и закурил. Курил он теперь что-то немецкое, она и марки этой не знала. – Они сыграли, конечно, свадьбу. А через две недели Софико сбежала от мужа, и уже никто, конечно, не мог ее найти. В Грузии вообще фиг кого найдешь.</p><p class="p1">– А что князь Тавиани? – спросила Катька, чуть не плача. Ей жаль было старого князя.</p><p class="p1">– А князь Тавиани стареет в одиночестве, стреляет фазанов, завел в Мингрелии оперу – даром, что ли, он учился музыке? – и поставил «Тристана и Изольду» ставшего вдруг очень модным Вагнера. Периодически он наезжает к родителям Софико. Касаткины безутешны. Правда, они выгодно женили своего Александра, и вообще он в Петербурге дошел до степеней известных. Так проходит пять лет, и однажды старый князь Тавиани, который ездил тут по оперным делам в Кутаиси, останавливается в небольшой деревушке испить, допустим, парного молока… или парного вина, что более приличествует обстановке… И возле глинобитного, или какие они там бывают, домика ковыряется в сухой земле сожженная солнцем женщина, иссохшая, почерневшая, а рядом с ней копошатся в соломе, или в чем там принято копошиться, двое детей, два и три года. А муж ее, босой и тоже иссохший, колет, допустим, дрова или тоже что-нибудь мотыжит, и граф Тавиани хочет дать им милостыню, потому что больно уж у них жалкие дети. И, вглядевшись в иссохшую мать, он с ужасом узнаёт…</p><p class="p1">– Князя Тавиани, – кивнула Катька. – Я знала, я знала.</p><p class="p1">– Дура ты, всегда все портишь.</p><p class="p1">– Действительно, – сказала она. – Всегда все порчу.</p><p class="p1">В этот момент она была совершенно такой, как раньше, без всяких следов долгой и бессмысленной борьбы со всем светом. Словно не было развода – которого, конечно, все равно не удалось бы избежать, даже если б не было никакого Игоря и никаких эвакуаций, – и второго брака, в котором тоже все было не ахти, и второго ребенка, который родился таким болезненным и выматывал ее так, словно и сам этот второй брак был напрасен и теперь приходилось расплачиваться за это. Теперь она, уже три года уговаривавшая себя, что все отлично, видела, насколько все плохо, – а если и могло быть хорошо, так она сама от этого отвернулась восемь лет назад, думая, что таким образом спасает мир. И, может быть, действительно спасла – но на черта была такая жизнь и такое спасение? Что должно погибнуть – пусть погибнет, и не о чем жалеть; по крайней мере, двое хорошо время проведут.</p><p class="p1">– Узнает Софико, – сказал Игорь. – Свою Софико. И говорит ей: Софико, если вы сделаете меня таким счастливым… таким ужасно счастливым, что вернетесь… я не то что все прощу, я поползу за вами следом и буду целовать следы ваших ног. Вот этих ваших ног, довольно грязных. Я усыновлю ваших детей. Я возьму вашего этого авантюриста, с которым вы тут живете и мучаетесь (авантюрист все это время стоит рядом навытяжку), дворецким к нам во двор, замкомвзвода в наш замок, кем хотите. Он будет дворник, швейцар, он будет даже, если хотите, ваш любовник. Я никуда его не сдам, будем вместе жить, лобио кушать. Но только вернитесь ко мне, – и старик рыдает, и по лиловым губам катятся крупные слезы.</p><p class="p1">– Это невозможно никогда, Карл Иваныч, – сказала Катька. – Это невозможно, простите меня, дорогой. Я помню вас, я даже учу детей музыке, вот, видите? – она показывает ему доску с нарисованными клавишами. – Я даже иногда играю на ней «Метель» Листа. Но я никогда не буду вашей, потому что вы не князь Тавиани. Князь Тавиани – это тот, кого я люблю, понимаете? И никто, никто другой. Конец.</p><p class="p1">Катька помолчала.</p><p class="p1">– Очень милый рассказ, мог иметь успех в девяностых годах того века, – сказала она.</p><p class="p1">– Или этого.</p><p class="p1">– Или этого, да. Я, правда, не очень понимаю, в чем смысл.</p><p class="p1">– Смысл не обязателен. Тебе бы все смысла. Мораль ей, понимаете. Впрочем, если ты хочешь мораль… Она в том, Катька, – и он уставился ей прямо в глаза, как тогда, в самом начале их истории, когда изображал красного комиссара, – в том, чтобы никогда не слушаться ностальгии. Понимаешь? Это самое мерзкое чувство. Хуже, чем патриотизм. Мы все думаем, что это благородно – тосковать по Родине. А нет давно никакой Родины, переродилась до основания. Что мы – звери, привязанные к норе? К родной берлоге? Чем меньше в тебе звериного, тем лучше, и не надо возвращаться ни на какую Родину. Каждый князь Тавиани стал человеком ровно в той степени, в какой превратился в Карла Иваныча. Если б ты знала, Катька, до чего я ненавижу всех этих ностальгирующих, мастурбирующих! И эту тягу к прошлому, из которой никогда ничего хорошего не выходит! И эти разговоры «а помнишь», без которых мы, слава богу, обошлись! Я, кстати, так и не знаю, замужем ты или нет, и не вздумай говорить.</p><p class="p1">– Замужем, – сказала Катька.</p><p class="p1">– Ну и я женат, – сказал он и успел увидеть, как она поморщилась – то ли от обиды, то ли оттого, что почувствовала фальшь. – И надо как-то уже научиться внушать себе, что ничего нет, что позади ничего не остается, что каждое место тут только врет, что оно прежнее. Я и на дачу не поехал, страшно подумать, как там все заросло. Мать не занимается ничем, а больше никому не надо.</p><p class="p1">– Заросло, да. Все заросло.</p><p class="p1">– И сюда я напрасно приехал. Одно мучительство напрасное. Князь Тавиани – тот, кого я люблю, Родина – место, где я живу. И никто больше ни на что не имеет никакого права и никакой надо мной власти соответственно.</p><p class="p1">Его по-прежнему больше всего заботила чья-то власть над ним. Независимый человек.</p><p class="p1">– Никогда больше не приеду, – сказал он.</p><p class="p1">– Слушай, я, наверное, ужасная дрянь, – с трудом выговорила Катька. – Ведь это из-за меня всё так… и у нас, и вообще…</p><p class="p1">– Ладно, ладно. Не надо придавать себе слишком большого значения.</p><p class="p1">– Конечно. Забылась.</p><p class="p1">Он расплатился, и они вышли на майскую улицу, на которой почти не оставалось обычной майской свежести – внезапная жара выжгла все, как землю вокруг глинобитной хижины князя Тавиани.</p><p class="p1">– Да, – вспомнил он. – А бывший авантюрист, который отсидел или сбежал – думаю, отсидел, потому что много ему дать не могли, он же не успел жениться и сбежать с приданым, – он стоит рядом, смиренный, перевоспитанный ее любовью… весь в белом… и говорит: поймите, князь, нельзя… но если вы хотите, я готов, конечно, дать вам всякое возможное удовлетворение… Крестьянин – князю, да? И тут они хохочут, все трое, дико начинают хохотать, и дети, глядя на них, тоже хихикают, таким смехом, каким ангелы смеются…</p><p class="p1">– Нет! – воскликнула Катька. – Нет! Они испугались и плачут. Вот. Точно. Как плачут ангелы. Эта деталь спасет все остальное.</p><p class="p1">– Хорошо, – сказал Игорь. – Пусть плачут.</p><p class="p1">Он поймал такси в аэропорт. Всех вещей у него было – легкая наплечная сумка. Все-таки здорово изменился, подумала Катька, ссутулился весь, одних морщин сколько. Взрослый человек, о господи, взрослый человек, с никому не нужными рудиментами, оставшимися от человека без возраста.</p><p class="p1">– Ну? – сказала она и поцеловала его в подбородок. – Навсегда-навсегда?</p><div class="cite">
<p class="text-author"><em>Июль 2014</em></p>
</div></span></span><span id="id18"><div class="title3">
<p class="p">Послесловие автора</p>
</div><p class="p1"><em>Спасибо, что вы дочитали до этого места.</em></p><p class="p1"><em>Автор считает долгом заявить, что город Брянск выбран им для некоторых событий по сугубо биографическим, а не географическим соображениям. Близ города Сухиничи, слава богу, нет никакой атомной электростанции. Интердом, описанный в восьмой главе, существует на самом деле, и история его подлинная, за вычетом нескольких подробностей,</em> – <em>но находится он в Иванове.</em></p><p class="p1"><em>Поскольку автор большую часть жизни пишет стихи, он сочинил несколько стихотворений по ходу написания «Эвакуатора». Прилагать стихи к прозе – удобный прием: они по-иному подсвечивают то, о чем написано в книжке, излагают все то же самое, но более красиво, а если книжка почему-либо не получилась – служат ей посильным оправданием.</em></p><p class="p1"><em>То, что предлагается вашему вниманию ниже, не «Стихи из романа», а скорее…</em></p></span></span>
