<span><span id="id12"><div class="title2">
<p class="p">XI</p>
</div><p class="p1">Прозрачные орлы больше не пели, белые вороны не издавали своих нежнейших звуков, длинношеие слоны не забредали на окраины городов. Все здесь было для человека, а человека больше не было. Земляне не в счет.</p><p class="p1">Здесь птицы не поют, деревья не растут. Перестали звенеть лиловые колокольчики, не плясали у поверхности вод четырехконечные морские звезды. Только фрукты зрели и наливались, потому что не могли свернуть этого процесса. Но и для фруктов, наверное, это был последний сезон.</p><p class="p1">На второй день Игорь сводил Катьку в церковь. Церковь была высокая, пирамидальной формы, похожая на искусственную елку «Интэко» в районе Курского вокзала. Она была построена из очень дорогого и жаропрочного материала, а потому не пострадала в огне. Было что-то особенно жалкое в том, как бородатый Кракатук, длинноволосая Аделаида и маленький Тылынгун, все очень похожие друг на друга, с глазами навыкате и припухшей нижней губой, смотрели на входящих. Кажется, они смотрели на них с надеждой. Катька постояла у колыбели Тылынгуна, хотела положить ему записку, но вспомнила, что не знает языка. Тылынгун вряд ли понимал по-русски. Впрочем, как выяснилось, по-альфовски он тоже не понимал.</p><p class="p1">Но что удивительно – все как-то устроилось, и в самом скором времени. Катьке иногда даже казалось, что эвакуаторы все-таки знали друг о друге и находились в тайном сговоре. С помощью Любови Сергеевны они обеспечили себя риэлтором, стоматологом, ветеринаром, бабушка вообще была мастером на все руки, дядя Боря с поразительной легкостью осваивал любую технику, Майнат великолепно взрывала все, что двигалось и не двигалось, и даже у Сереженьки был уникальный талант – представьте себе, пригодился его строительный навык, чудесная способность созидать неожиданные вещи из запчастей, совершенно к тому не предназначенных. Он прекрасно строил жилища из обломков – большая часть домов в столице оказалась категорически непригодна для жилья, альфовцы умудрились как-то уж очень безжалостно расхреначить свою планету, и все это в считаные дни; поистине, они во всем были впереди – в том числе и в разрушительных технологиях. Некоторые дома выглядели вполне целыми, но все перекрытия внутри обратились в труху, так что селиться можно было только в малоэтажных коттеджах с железобетонными перекрытиями, которые риэлтор наметанным взглядом мастерски выцеплял среди остальных строений. В обычные здания лучше было даже не заходить – все могло сложиться карточным домиком от малейшего сотрясения, или все двадцать пять этажей обрушивались на неосторожного посетителя; риэлтор четко определял, где жить, а наш Сереженька подлатывал потолки, заделывал дырки в стенах и при помощи дяди Бори чинил водопровод. Странное дело: он ничего не умел строить просто так, с нуля, но мастерски латал, чинил, ставил заплатки – то есть приводил в порядок то, что уже было сделано до него. На Земле проблема была в том, что всякое дело приходилось делать самому, – а Сереженька умел восстанавливать только то, что было уже разрушено. В его руках сломанные вещи обретали вторую жизнь – пусть они были уже невосстановимы в прежнем виде, зато в новом выглядели презентабельно и даже как-то задорно: вот, мол, на нас поставили крест, а мы еще очень даже ничего! На новой планете задача его облегчалась тем, что предназначения почти всех здешних вещей он не знал, и Игорь только головой качал, глядя, как Сереженька скрепляет провода с помощью щипцов для колки орехов, подпирает стены специальными звукозаписывающими панелями или конопатит щели гигиеническими прокладками.</p><p class="p1">Полковник Велехов занялся военной подготовкой. На планете в самом деле было это как-то запущенно. Альфа далеко не соответствовала своему гордому названию. Как угодно, а кое-что из земного опыта следовало сюда привнести – может, теперь планета сможет противостоять внешнему натиску или внутреннему кризису, а то и обоим вместе, как было в этот раз. Не зря же он сделал блистательную карьеру в российских войсках. Полковник Велехов устроил для всех обязательную физзарядку – не показушную, как в российской армии, а тщательно продуманную; вместо бега с полной выкладкой и тупой маршировки ввел комплекс упражнений по биомеханике, которую разучил при помощи Любови Сергеевны, а по вечерам писал устав гарнизонной и караульной службы. Он придумал даже элитное подразделение «Альфа», в честь родного солнышка, но пока не мог его укомплектовать, потому что Игорь, пользуясь непременным правом любого эвакуатора, от тренировок наотрез отказался, а дядя Боря не подходил по возрасту, да и других занятий у него хватало. Покамест он отводил душу, по-суворовски воспитывая Лынгуна. Правда, у него имелся резерв – десяток американских тинейджеров, которых привез полковник Тылык на третьей лейке.</p><p class="p1">Полковник Тылык, не подумайте плохого, очень любил детей. Он честно пытался действовать по науке, отбирая среди американцев образцовых представителей всех земных рас – ведь именно в Штатах, в плавильном котле, можно было встретить их всех на сравнительно обозримом расстоянии; он долго мучился, собирая свою коллекцию, но потом всех оставил на Земле, а спас в полном составе семью Стоунов, воспитывавшую семерых приемных детей и трех своих. Стоуны были евангелистами и много занимались благотворительностью. По основной специальности Пол Стоун был геологом, а его жена – поварихой, так что колония выживших пополнилась знатоком полезных ископаемых и отличной кухаркой. Что до многонационального и пестрого детского коллектива, эти дети могли со временем дать жизнь новому населению планеты – потому что бросать ее просто так было жалко, да и починить копулятор в лейке Велехова оказалось практически невозможно; надо было сваривать новый, а это требовало времени.</p><p class="p1">Бабушка разбила огородик, договаривалась с цветами и плодами – и пара лиловых колокольчиков нехотя зацвела у нее, сначала выпустив из потрескавшейся почвы зеленый побег, а потом плавно развернув его в лиловую ароматную воронку. Из воронки пахло гарью, но с каждым днем слабей, и даже начинал пробиваться какой-то новый аромат, немного похожий на «Ландыш серебристый». Чтобы окончательно чувствовать себя дома, бабушка выгородила на окраине столицы четырехугольный участок земли, сама сбила крест из двух обломков чего-то непонятного (Игорь утверждал, что это лопасти разбившегося выртылета) и написала на нем: «Кузнецов Кирилл Алексеевич. 1912–1993». Теперь у нее была могила деда, и можно было ухаживать за ней, совершенно как в Брянске.</p><p class="p1">Даже Подуша нашла себя, сделавшись фактической хозяйкой зверофермы, которую разбили на окраине столицы, на бывшем открытом стадионе для игры в тургынгун. Из былысок для тургынгуна соорудили загончики, туртышки превратили в кормушки, а прушки – в поилки.</p><p class="empty-line"/><p class="p1">– <em>Прушка – такая штука, в общем, тебе не понять.</em></p><p class="p1">– <em>Мне не понять? Почему это мне не понять? Может, ты скажешь, что я и в тургынгун не умею играть?</em></p><p class="p1">– <em>Конечно, не умеешь. Из-за этого в школе все над тобой издевались.</em></p><p class="p1">– <em>Послушай, что ты вечно распространяешь свою биографию на других? Никто никогда надо мной не издевался в школе, ты поняла?</em></p><p class="p1">– <em>Конечно, конечно, милый. Но, может, тогда ты все-таки объяснишь мне, как играют в тургынгун?</em></p><p class="p1">– <em>Пожалуйста, хотя в седьмом часу утра у меня плохо варит голова. Значит, так. Играют две команды по восемнадцать человек. Площадка разгорожена на две части. Цель игры – загнать тургын в гун, подвешенный к гун-крынке. В левой руке у каждого – туртышка, в правой – прушка. Ни в коем случае нельзя менять их местами. Туртышка обладает гундышными свойствами, а прушка – дордушными. Если правильно гундышить и изобретательно дордушить тургын, он попадает в гун. Важно также защитить свой гун от атаки противника, и этим занимается так называемый гункипер, в качестве которого я обычно и гунил в школе. У меня был номер один, я страшно гордился собой.</em></p><p class="p1">– <em>Тебе не кажется, что получился какой-то квиддич?</em></p><p class="p1">– <em>Сама ты квиддич, в квиддич играют на метле, а у нас туртышки.</em></p><p class="p1">– <em>Хорошо, хорошо, милый, я вся внимание.</em></p><p class="empty-line"/><p class="p1">Так вот, Подуша отлично вписалась в новый социум, где не надо было ходить в садик. Младший ребенок Стоунов – пятилетний мулат Джимми – стал ей добрым товарищем. С Лынгуном она тоже постепенно находила общий язык, в самом буквальном смысле, ибо стремительно осваивала альфовское наречие.</p><p class="p1">Но главным ее увлечением стали зверьки – удивительно милые и домашние, чрезвычайно тянувшиеся к людям. Они, казалось, все понимали и даже простили альфовцам их предательство – кто же будет брать с собой деньги на новую, неосвоенную планету, где предстоит долгий период натурального обмена? Только земляне, даже улетая на Марс, непременно взяли бы с собой несколько пачек долларов или рублей, хотя бы на карманные расходы, – просто потому, что в силу своей физиологии они не в силах расстаться с деньгами и, даже отдавая их в магазине, испытывают сильнейший стресс. Зверьки прекрасно прижились на стадионе, Полька ежедневно кормила их харлашем, который в изобилии разросся на улицах покинутого города, и учесывала с ласковым мурлыканьем. Тыгыны и дылыны оказались необычайно смышлеными, приносили ей цветочки, плели веночки и даже убирали за собой, тем более что их навоз, как выяснилось, обладал целебными для землян свойствами и издавал слабый, приятный запах скипидара. Его, оказалось, можно прикладывать к ранам и вообще больным местам, и дядя Боря скоро полностью исцелился от радикулита, а у Любови Сергеевны прошли мигрени. Зато пенициллин оказался очень пользителен для метаморфа, да, а ты как думала, и метаморф скоро полностью выздоровел.</p><p class="empty-line"/><p class="p1">– <em>Нет, нет! Наоборот, от первого же укола земного пенициллина он тут же исчез в страшных судорогах, потому что по природе своей был кишечная палочка.</em></p><p class="p1">– <em>Это у вас бывает разумная палочка, а у нас ничего подобного, ему вкатили пять кубиков под металопатку, и он совершенно исцелился и даже размножился, и скоро метаморфов стало можно использовать для строительства новых жилищ.</em></p><p class="p1">– <em>В каком смысле? Наш муж затыкал ими щели?</em></p><p class="p1">– <em>Нет, они носили кирпичи.</em></p><p class="p1">– <em>Нет ли тут физиологической дискриминации?</em></p><p class="p1">– <em>Опомнись, какая дискриминация, просто они могут больше на себе таскать. Если хочешь, дядя Боря будет им помогать.</em></p><p class="empty-line"/><p class="p1">Дядя Боря нашел себя в совершенно другой области. Как известно, он отлично управлялся с любыми механизмами, хотя бы и внеземного происхождения. Он никогда не унывал, не особенно скучал по Земле и даже, кажется, считал, что они никуда не улетали – ведь механизмы были тут устроены совершенно по-земному, да и развалины были такие же. Бардак, одним словом. Иногда, когда он все-таки пытался осмыслить происходящее (а это случалось нечасто, потому что хорошему шоферу и механику абстрактные размышления совершенно ни к чему), он допускал, что это все было какое-то спецзадание и забросили их на самом деле в какую-то дальнюю страну, вроде, может быть, Японии. А мы ее, вероятно, разбомбили из-за островов и вот теперь восстанавливаем в порядке братской помощи. У них есть, конечно, всякая японская техника, очень трудная для российского понимания, а все-таки доступная; есть биороботы, которые исцеляются пенициллином, и даже зеркальные стены для показа удивительных телепрограмм – правда, после того, как дядя Боря починил их, они стали крутить один сплошной «Аншлаг», потому что, я ведь говорил тебе об этом, зеркальная стена транслирует и оформляет именно твои тайные желания. А у дяди Бори были вот такие, ему неоткуда было взять других. Он собрал несколько экскаваторов, отремонтировал выртылет, и в перспективе из трех наших леек вполне мог бы собрать одну очень большую, чтобы улететь туда, к нашим, – но с нашими до сих пор не было связи, и экспедиция откладывалась. Не полетишь же наобум лазаря. Может, там трудности. А может, просто еще не долетели, все-таки это ужасно далеко.</p><p class="p1">Да и вообще – зачем еще куда-то улетать? Все, что не ладилось у землян на родной планете, здесь стало получаться само собой: может, потому, что начальства не было, а скорее всего, потому, что действительно воздух был другой. Там тоже была чужая планета, но они об этом не знали и старательно делали вид, что своя. А здесь явно чужая, и ни перед кем не надо было притворяться. Чужую не надо было оправдывать, когда на ней обваливался очередной дом; ее не надо было присваивать, потому что она и так принадлежала им, а национальных и территориальных споров между ними быть не могло, как не бывает их на необитаемом острове. И даже чеченка Майнат нашла себе дело – оружия было много, дынымыта тоже, это была такая местная промышленная взрывчатка для горного дела, взрывай не хочу, и дядя Боря приспособил ее для взрывных работ в городе. Надо же было обрушивать старые дома, иначе они сами рухнут и могут придавить деток. Майнат с хищной, мстительной радостью закладывала в подвалы дынымытные шашки, отбегала и любовалась торжественным, медленным осыпанием. Ненависть ее к русским немедленно улетучилась, потому что никаких русских здесь больше не было – вся русскость Катьки, дяди Бори и Любови Сергеевны испарилась, заменившись статусом Робинзонов. У Робинзона национальности нет.</p><p class="empty-line"/><p class="p1">– <em>Да, чтобы не забыть: метаморфа прозвали Пятницей.</em></p><p class="empty-line"/><p class="p1">Так открылся универсальный рецепт спасения человечества: его оказалось достаточно всего лишь переселить. Дело даже не в том, что Земля – маленькая и тесная планета. Она большая, места всем хватит. Проблема в том, что она слишком давно заселена: переезд – необходимый и приятный стресс, даже квартиру надо менять раз в десять лет, а можно и чаще. Шутка ли – вечно жить в одном доме! Переезд сплачивает, забываются мелкие раздоры, начинается как бы новая жизнь. Главное же – на Земле все подспудно чувствовали, что их сюда сослали. Слишком много было паханов, надсмотрщиков, шутов – всё как в лагере, и здравые социологи давно бы уже заметили это сходство, если бы обладали хоть малой толикой фантазии. Ясно же, что такие отношения могли сложиться только в насильственно созданном коллективе. А земляне всё спорили, откуда на Земле возникла жизнь. Неоткуда ей было возникнуть, кроме как из другого, прекрасного мира, где она зародилась естественным путем, – а потому и отношения на Земле были как во всяком насильственном и замкнутом сообществе. Попытки к бегству периодически предпринимались, но какие-то все малоудачные – в околоземное пространство, максимум на Луну… И правильно: кого надо, и так отправят.</p><p class="empty-line"/><p class="p1">– <em>Постой, постой. Но, выходит, дивный далекий мир тоже ни от чего не застрахован?</em></p><p class="p1">– <em>Конечно. Смертны все, просто можно умереть от инфаркта, а можно от сифилиса. Не чувствуешь разницы? Представь на секунду, что было бы, объяви кто-нибудь тотальную эвакуацию у вас. Люди ломились бы в лейку, продавали бы место в очереди, затаптывали слабых… А как у нас? Ты видела, как организованно все прошло у нас?</em></p><p class="p1">– <em>Видела, спасибо, Пятницу вон бедного чуть не затоптали.</em></p><p class="p1">– <em>Во-первых, это единичный Пятница, а у вас их были бы тысячи. Тысячи! А во-вторых, почем ты знаешь, может быть, он был ранен. Мы могли погибнуть от вторжения чуждой цивилизации, могли пострадать от войны или экономического кризиса, и даже, скорей всего, нас погубила какая-то чуждая сила; позволь, я это объясню. Мы все-таки были слишком хорошими. Мы не были готовы к отражению агрессии. У нас даже не было оружия, кроме дынымыта. Нас погубил проклятый принцип невмешательства, и когда кто-то решил нас истребить – нам нечего оказалось этому противопоставить.</em></p><p class="p1">– <em>Кто же решил вас истребить? Где захватчики? Ведь просто так никто никого не истребляет, это же так естественно. Ну так где она, эта чуждая сила?</em></p><p class="p1">– <em>Она… она нигде. Они вовсе не ставили себе целью нас захватить. Это только у вас, на тесной Земле, возможны такие глупые, мелко-наивные объяснения. Что, может, вашим террористам нужно ваше метро, ваша земля, ваши женщины? Глупости, ваши женщины даже самим себе не нужны. Есть иррациональное зло, которое само себе причина, и оно вышло наконец из-под земли, вырвалось, потому что созрело. Это вовсе не то зло, которое просто анти-добро. Это нечто третье, нечто из иной парадигмы, зло помимо всех объяснений и мотиваций,</em> – <em>зло, до такой степени брезгующее всем человеческим укладом, что ему не нужно от вас даже дани. Помнишь, как в стишке про черных птиц? Черные птицы кричат всю ночь, черные птицы хотят мою дочь. Он им предлагает все по очереди – свою душу, свой дом, свое лицо… А им ничего не надо.</em></p><p class="p1">– <em>Господи, какой ужас.</em></p><p class="p1">– <em>Да, именно такой ужас. Это зло может появиться и у нас, и у вас, и согласись – ты же предчувствовала его с самого начала.</em></p><p class="p1">– <em>Да, конечно, я даже с ним соприкасалась. У нас в классе была такая девочка.</em></p><p class="p1">– <em>Если я правильно понял, ее звали Таня Колпашева?</em></p><p class="p1">– <em>Да, ты понял правильно, слишком правильно.</em></p><p class="p1">– <em>Ну вот. Так и тут. Только вы сами сделали все возможное, чтобы это зло победило,</em> – <em>помнишь, как Шамиль писал еще в первом письме? «Вы, русские, сами сделаете все, чтобы победили воины Аллаха». А мы просто сбежали, потому что за долгие годы райской жизни утратили навык сопротивления – и тогда они обратили против нас наше оружие, взорвали наши дома и выгнали нас с планеты. И мы, вечные странники, улетели туда, где нас не смогут достать. Это, кстати, причина того, что никто не отвечает на сигналы. Наши улетели далеко, очень далеко, и никто не знает куда. Вокруг полно обитаемых планет, пойди выбери. Но они никогда теперь не ответят на зов, чтобы их не запеленговали. Зло найдет их, конечно, и там, но к тому времени у нас уже будет разработан план эвакуации. Знаешь, ведь в каждой гостинице, в каждой школе прежде всего вешают план эвакуации. Это мы придумали. Вспомни фильм «Звонок».</em></p><p class="p1">– <em>Отлично помню, я всегда любила ужастики.</em></p><p class="p1">– <em>Но согласись, что это необычный ужастик. Обрати внимание, что у японского были объяснения, сиквелы, приквелы – а в американской версии Гора Вербински нет ни развязки, ни внятного разъяснения. Потому что девочка эта…</em></p><p class="p1">– <em>Самара, Самара-городок, успокой ты меня…</em></p><p class="p1">– <em>…в американской версии взялась из ниоткуда и творит зло нипочему. Так что Вербински все правильно понял, он все-таки мастер, а не просто ремесленник. Это примета времени – зло без причины, наделенное чудовищной, бесцельной силой. Радикальный ислам тут вообще ни при чем, он тоже станет жертвой, только чуть позже. Я же говорю – первые и вторые уравнялись и взаимно уничтожились, пришли третьи, не желающие ничего присваивать. Ты же не отбираешь соломинку, если давишь двух муравьев? Они и не враги тебе, в сущности. Тебе просто нравится давить. Вот это и вырвалось, и поэтому ты не спишь.</em></p><p class="p1">– <em>Еще мне холодно.</em></p><p class="p1">– <em>Неправда, у нас тепло. У нас гораздо теплее, чем у вас.</em></p><p class="p1">– <em>И что это зло будет делать дальше?</em></p><p class="p1">– <em>Пока не знаю. Наверное, появится какая-то четвертая сила, которая его уравновесит, низведет или поднимет до себя, взаимно уничтожит… а победит, как всегда, пятая. И так до бесконечности. Только зло все злее, и культурка, которую оно успевает выстроить в старости, все беспомощнее. Посмотри, каким умирал Серебряный век – и какой гибнет ваша красная империя. Эмигранты грустили по России Блока, а ваши будут вспоминать «Кавказскую пленницу». И уверяю тебя, наша новая цивилизация тоже будет хуже. Там, на этой планетке, куда они улетели. Всякий раз, когда начинаешь с нуля, что-то уходит. По-настоящему прекрасное можно создать, только когда детски веришь, что оно не будет разрушено. А если не верить – зачем и трудиться? Все равно какую-то часть души будешь экономить. Вот и наши, наверное, были настоящими титанами только до первой эвакуации, а потом все искусство было уже так себе.</em></p><p class="p1">– <em>А что, была первая эвакуация?</em></p><p class="p1">– <em>Ну конечно. Мы же теперь это обосновали. Всю жизнь бегаем от абсолютного зла, каждый раз начинаем с нуля. Если бы не эти бегства, кто бы придумал профессию эвакуатора? Согласись, ее могла создать только цивилизация, которая много эвакуировалась.</em></p><p class="p1">– <em>Да, логично. Но скажи, не опасна ли для нас, землян, эта ваша цивилизация абсолютного зла, преследующая вас повсюду?</em></p><p class="p1">– <em>О, ничуть не опасна. Не опасней, чем слон для муравья: если и наступит, то по чистой случайности. Наше абсолютное зло – это не ваш уровень. Ваш уровень – чеченцы, извини, пожалуйста, за высокомерие. Ваш уровень – это Майнат. А у нас такие Майнат… что лучше тебе не думать об этом, если честно.</em></p><p class="p1">– <em>Подожди, подожди. Но, значит, ваши улетели безвозвратно и навсегда? И догнать их мы никогда не сможем, даже если дядя Боря починит копулятор?</em></p><p class="p1">– <em>Да, конечно. Кто не успел, тот опоздал. Но вообще-то, знаешь… На Альфе вполне можно жить. Починим водопровод, расчистим руины, восстановим зеркальные стены. Выучимся играть в тургынгун. Дети вырастут. Подростки размножатся. Любовь Сергеевна посматривает на американца, у летчика нежные чувства к американке, дядя Боря любит чеченку: пока – как дочь, там посмотрим. Да и у нашего мужа что-то такое с рыженькой Стоун, усыновленной из России и почти забывшей русский язык, но ничего, вспомнит. Всем хорошо.</em></p><p class="empty-line"/><p class="p1">Все уладилось, осела пыль, иссяк дым, горький запах руин и пожарищ сменился весенним духом пробуждающейся земли, – стала видна невинная синева вод и кроткая зелень лесов, мягкие контуры холмов и гибкие петли рек, вся тихая прелесть планеты, выбранной для жизни теми, кто презирал драку и умел только убегать. Мягкость эта волшебно подействовала на ожесточенные земные сердца, и всем нашлось наконец место в общем деле – всем, кроме Игоря и Катьки, которые только и были среди всей этой идиллии по-настоящему несчастны.</p><p class="p1">Причина была, конечно, не в той вполне объяснимой неловкости, с которой им помог справиться наш бывший теперь уже муж: Сереженька, найдя себя и пользуясь в коммуне заслуженным авторитетом, имел теперь в жизни другую опору, кроме Катьки, и сам сказал на исходе второго дня: ребята, я же все вижу, не стесняйтесь. Я и в лейке все слышал, ты же знаешь, Кать, у меня бессонница. Чего там, я давно тебе в тягость, ты лучше меня и умней, живи как знаешь, а я попробую тебе не мешать. И с Подушей видься сколько хочешь, это на Земле все было проблемой, а здесь – занимайте любую квартиру и живите сколько влезет. Кстати, у Игоря наверняка квартира цела («Не цела», – буркнул Игорь). Ну, найдете, в общем. И вы не думайте, пожалуйста, что я в обиде. Я, Кать, давно тебе хотел сказать, на Земле еще… что, в общем, наверное, мы ошиблись оба. Ничего, поправить не поздно. А Подуше когда-нибудь потом вместе объясним.</p><p class="p1">Теперь они, не скрываясь особенно, жили в одном из коттеджей на окраине столицы, и наш бывший муж даже зашел к нам починить стену, причем вел себя вполне прилично, великодушно, а Игорь как раз нервничал и не мог, против обыкновения, сладить с проводкой. Беда была в том, что все на них косились, за общими трапезами они никак не могли попасть в тон коллективного разговора, на совместных работах вечно оказывались в паре (таскали носилки, пилили дрова), а с другими никак не могли поладить. Ни полковник, ни Лынгун не заходили к ним в гости – иногда только забредала Майнат, отрывисто рассказывала, как заложила отличную бомбу в подвал тридцатиэтажки, только пыль столбом; особенно ей было интересно, возьмет ли ее Аллах в рай или не зачтет всех нынешних взрывов, поскольку бегство с поля боя способно перевесить множество заслуг и добродетелей. Игорь говорил, что она уже в раю, какого ей еще рая – взрывчатки море, взрывай не хочу…</p><p class="p1">Тетка-портниха Колпашева, кстати, тоже оказалась не так страшна, как ее малевала брянская племянница. Конечно, брать ее в рай стоило исключительно по протекции, потому что она была прежде всего непроходимой дурой, начисто лишенной той убийственной интуиции, которая делала Таню исчадием ада; при этом она была в самом деле визглива и базарна, так что выносить ее близость даже и Тане было, должно быть, нелегко, – но и самая базарная визгливость, и самая отчаянная пошлость, бытующая в кругах, где ходят к своим портнихам, влюбляются в своих гинекологов и читают Иоанну Хмелевскую, все-таки далеко не так ужасна, как изощренное самоцельное мучительство. Колпашева, к счастью, нашла себе другую жертву – она упорно и тайно ненавидела Пола и Стефани, которые, как ей казалось, привезли на Альфу чуждые ценности и теперь всюду утесняли русских. Катька думала об этой ее маниакальной сосредоточенности со стыдным облегчением, и еще непонятно, что было бы хуже: самозабвенная тяга портнихи Колпашевой к ценностям свободного западного мира – или патриотическая ненависть к нему. Главное, что до Катьки ей не было никакого дела.</p><p class="p1">Проблема была не в конкретных людях, и не в отсутствии комфорта, и не в мучительной тоске по разрушенному раю, который они обрели так не вовремя. Проблема была в том, что оба чувствовали себя бесконечно чужими на этом празднике жизни, почти все участники которого сдружились и ласково друг друга оберегали от нежелательных случайностей. Только Игорь и Катька никому, кроме друг друга, не были нужны.</p><p class="p1">Начать с того, что у обоих не было никакой приличной профессии. Катька, конечно, могла кашеварить – но все уже готовили себе сами, да и что было, в сущности, готовить, когда харлаш повсюду рос сам, а барласкун, который в изобилии давали уцелевшие барласкухи, достаточно намазать на дурык? Игоря можно было использовать как тягловую силу, но физической мощью он не отличался, а машину не водил – только ракету. Ракета же им в обозримом будущем понадобиться не могла. Ни у художницы Катьки, ни у эвакуатора и космического пилота Игоря не было никакой сколько-нибудь земной профессии, особенно из числа востребованных в реконструктивный период. Катька, конечно, умела рассказывать сказки – но не по-английски; Игорь мог с закрытыми глазами собрать и разобрать лейку – но ничего не понимал в экскаваторах. У эвакуаторов была слишком узкая специализация. Конечно, он мог чинить проводку – но тока давно не было, а наладить автономную электростанцию –</p><p class="empty-line"/><p class="p1">– <em>…они, наверное, хранились в подвалах на всякий случай?</em></p><p class="p1">– <em>Да, конечно.</em></p><p class="empty-line"/><p class="p1">наладить такую электростанцию мог и ребенок, а провода там саморегенерирующиеся.</p><p class="p1">С этим, однако, можно было бы мириться. Ужасно было другое – им решительно не о чем было говорить с остальными. Все эти люди – латающий дыры муж, гуляющая с собакой и понемногу обучающая американцев русскому языку Любовь Сергеевна, золоторукий дядя Боря, пиротехническая Майнат и грезящий спецподразделением полковник – были на своем месте, не говоря уж о геологе с кухаркой; все смотрели на Игоря и Катьку с тайной укоризной, потому что после крушения мира людям не до преступной любви – а эти двое полюбили друг друга так не вовремя, да вдобавок так демонстративно. Игорь не очень нравился бабушке – молчалив, нервозен, вечно всем недоволен; Катька вызывала стойкую идиосинкразию у Стоунов. Эти двое не могли участвовать в общих мероприятиях вроде викторины «Вспомним Землю родную»; их не привлекали танцы и коллективные трапезы. Они были отдельно от всех и не могли с этой отдельностью ничего сделать; особенно тоскливо было то, что на них смотрели с тяжелым подозрением, как на виновников всего происшедшего.</p><p class="empty-line"/><p class="p1">– <em>Это ты загнула.</em></p><p class="p1">– <em>Ничего подобного, именно так и обстояло дело.</em></p><p class="empty-line"/><p class="p1">Их считали частью того самого иррационального зла, от которого рухнуло все. И хотя Катька каждый день навещала Подушу, играла с ней, укладывала ее спать, она никогда не оставалась ночевать у Сереженьки в его латаном-перелатаном домишке, сплошь состоявшем из взаимоисключающих вещей и стилей, а Сереженька никогда не отдавал Подушу ночевать к ним с Игорем. Нечего ребенку смотреть на разврат.</p><p class="p1">Эта неприязнь ни в чем особенном не проявлялась. Наружу она вырывалась крайне редко, да и то почти всегда по Катькиной вине. Со стороны жизнь на планете была почти так же идиллична, как и до катастрофы, – если бы, разумеется, было кому смотреть на нее со стороны. Ветеринар лечил барласкух, геолог разведал много полезных ископаемых, которые и ископал, на радость присутствующим; только Игоря и Катьку кормили из милости, хотя добыча еды –</p><p class="empty-line"/><p class="p1"><em>…повторяю</em> –</p><p class="empty-line"/><p class="p1">и не представляла особенных трудностей. Просто они и здесь были всем чужие, как на Земле, и чем больше своими делались друг для друга – тем больше их ненавидели все остальные.</p><p class="p1">Теперь им пришло время поменяться ролями: уже не она водила его на экскурсии – «Улица, ряд домов, ее освещает фонарь», – а он объяснял, время от времени переходя на их парольный инфинитивный русский:</p><p class="p1">– Тут быть коркынбаас, большой количество домов, но не ряд, не улица, как у вас, а такая круговая, спиральная фигура, гораздо интересней. Тут кафе, но каждый быть сам готовить еда из продукт, который покупать здесь же. А вот магазин «Одежда», смотри, почти ничего не забрали. Только теплое, наверное. Выбирай что хочешь: это лырын, надевается через голову, это быдыс, повязывается вокруг шеи, а это сыурчук – в него заворачиваются. Бери, у нас давно бесплатно. По-моему, тебе очень ыдет.</p><p class="p1">Только на пятый день он решился пойти туда, где стоял когда-то его дом.</p><p class="p1">– Мне, наверное, лучше одному, – сказал он Катьке.</p><p class="p1">– Игорь, если можно, я все-таки с тобой. Мало ли.</p><p class="p1">– Что – мало ли?</p><p class="p1">– Ну, не сердись. Мы же вместе теперь. Возьми меня, правда.</p><p class="p1">Он пожал плечами:</p><p class="p1">– Хочешь – пошли.</p><p class="p1">Его дом стоял в зеленом когда-то, а теперь начисто выгоревшем районе, около разбомбленного парка с изуродованными и расщепленными старыми деревьями, похожими на тополя. Была весна, из красноватой почвы изо всех сил перла новая трава, от старых стволов стремительно отрастали побеги – гибкие, вьющиеся, ползучие.</p><p class="p1">– Это такое дерево, – пояснил Игорь. – В первом поколении прямо растет, а во втором, если срубить, – только ползает. Ствол уже никогда не отвердеет, вырождение в чистом виде. Их у нас запрещено было рубить. Кстати, у нас почти все деревья так. Вырубишь – очень быстро дает ползучий побег, весь лес заплетает.</p><p class="p1">– А если побег выдрать? Третья стадия есть какая-нибудь?</p><p class="p1">– Не знаю, никто не пробовал. Наверное, это будет вроде ваших грибов. Что-нибудь совсем простое и уже не зеленое.</p><p class="p1">Парк стремительно заплетало вьюном, курчавыми горизонтальными плетьми – вторым поколением местных деревьев. Пруд тоже зарос, и уткам, вернувшимся на него после зимовки, трудно было плавать среди сплошной речной травы. Дом Игоря стоял в глубине большого коркынбааса – кругом все попадало, но он уцелел. Это была высокая башня из черного камня, с мертвыми выбитыми окнами и оплавившейся пожарной лестницей.</p><p class="p1">– Ты представляешь, он весь был белый, – сказал Игорь. – Абсолютно. Назывался тыргын-доон, белая башня.</p><p class="p1">Во дворе, заваленном рухлядью и обломками, на асфальте еще видны были «классики» – точная копия земных. Игорь вошел в подъезд.</p><p class="p1">– Осторожно, рухнет же все!</p><p class="p1">– Здесь не рухнет. В этом квартале все было сверхпрочное.</p><p class="p1">Катька избегала смотреть на него. Она боялась увидеть его лицо.</p><p class="p1">– Ты на каком жил? – спросила она, глядя под ноги.</p><p class="p1">– На седьмом.</p><p class="p1">– Поднимемся? Или не надо?</p><p class="p1">– Не надо, – сказал он. – Подожди, я только одну штуку проверю.</p><p class="p1">Он подошел к обгоревшим почтовым ящикам.</p><p class="p1">– У нас газеты давно не выходили, все электронное. А ящики висели, типа на память. Ты гляди, у меня и ключ цел.</p><p class="p1">Он открыл ящик. Оттуда выпала плоская прямоугольная пластина. Игорь быстро достал из кармана небольшой прибор, похожий на диктофон, вставил пластину в щель на боку и нажал кнопку. Прибор заговорил срывающимся женским голосом. Катька не могла разобрать ни слова.</p><p class="p1">Игорь слушал молча, и по лицу его ничего нельзя было сказать.</p><p class="p1">– Мать, – шепнул он.</p><p class="p1">Запись закончилась. Он убрал диктофон в карман.</p><p class="p1">– Ну что? – тоже шепотом спросила Катька.</p><p class="p1">– Говорит, что все улетают неизвестно куда. Обещает дать знать сразу, как только устроится. Говорит, обязательно увидимся.</p><p class="p1">– Как же эта дискета не сгорела?</p><p class="p1">– Не знаю, – сказал Игорь. – Сейчас сгорит.</p><p class="p1">Он достал из кармана земную зажигалку и поджег белый прямоугольник. Он мгновенно вспыхнул и сгорел, как дачные письма.</p><p class="p1">– Игорь! Зачем! Это же от матери!</p><p class="p1">– И что? – сурово посмотрел он на Катьку. – Мать – она во мне, а не в записке. Что ты заставляешь меня банальности говорить, честное слово! Вещь выполнила свою миссию, передала информацию. Хранить, душу травить… фетишизм землянский… По-хорошему, и домой не стоило заходить. Знаешь, почему у вас всё хранят? Потому что не верят ни черта. Письма, записочки берегут как доказательство… Я одного знал – он хранил списки продуктов, которые ему жена писала в магазин.</p><p class="p1">– Зачем?</p><p class="p1">– Не знаю. На случай голода перечитывать. У нас никто ничего не собирал. «Коллекционер» вообще было ругательство. Мать у меня коллекцию землянских марок нашла и выбросила. Правильно сделала.</p><p class="p1">Катька не знала, что делать. Надо было его обнять, утешить, найти единственные слова, но тут, в каменном остове, который был его домом, она не чувствовала никаких прав на него. Зря он взял ее с собой – хотя одному ему наверняка было бы хуже.</p><p class="p1">– Она точно успела улететь? Все нормально?</p><p class="p1">– Да, конечно. Она мне всегда оставляла записки в ящике. Никогда не встречала на вокзале, всегда ждала дома с обедом. А внизу записка, чтобы я знал. Иногда ведь ее дома не было, она в школе работает. Ее со школой эвакуировали в первой ракете, это она здесь говорит… Я прилетаю, а тут всегда записка. Это наш ящик, пятьдесят третий.</p><p class="p1">Он поморщился и отвернулся.</p><p class="p1">– Вообще, ясно было, что все так кончится, – сказал он, помолчав. – Слишком хорошо все было. Так не бывает. Если здесь так хорошо, где-то обязательно плохо. Сами накликали.</p><p class="p1">Они вышли из выгоревшего дома. Жалобно скрипела дверь, болтаясь на одной петле.</p><p class="p1">– Быстро ржавеет все, – сказал он. – А на будущий год все заплетет вьюном, вот увидишь. Он знаешь как быстро ползет?</p><p class="p1">– Я что говорю-то, Игорь, – осторожно начала Катька. – Я все пытаюсь понять: эвакуаторами ведь от хорошей жизни не становятся, а? Это же не для всех профессия. Человек же не просто так улетает черт-те куда, связывается с землянами, иногда женится на земной дуре вроде меня? Может, у вас тоже было не совсем того… и ты от этого улетел?</p><p class="p1">– Эвакуаторами, Кать, бывают по двум причинам, – сказал он терпеливо, словно ей было не двадцать пять, а максимум десять. – Либо потому, что человеку на Альфе слишком плохо, либо потому, что слишком хорошо. Из первых получаются эвакуаторы так себе. Они берут в первую очередь ветеринаров и дантистов. Из вторых выходят ребята вроде меня, не сказать чтобы суперпрофессионалы, но все-таки классом повыше. Они берут тех, кто может понять Альфу. Полковник Велехов это знает и никогда мне не простит. Да, конечно, я знал, что рано или поздно… и скорее рано, чем поздно… Очень уж все было хорошо. Мы такие были беззащитные, такие беспечные! Собственно, ведь и ожидание катастрофы, которое нас с тобой так роднит, – оно тоже может быть по двум причинам. Либо все слишком отвратительно, либо чересчур замечательно. Я потому, наверное, и старался проводить тут меньше времени: так и звенело в воздухе. Но не от ненависти, Кать, нет, – осенью у вас так иногда бывает: день такой синий, яркий, тревожный… И непонятно еще, когда сильней предчувствуешь гибель: в такие вот синие и ясные дни – или когда все сыплется и ветер шумит. Мне все казалось, что живем в каких-то сумерках, при конце прекрасной эпохи, – но кончается она не потому, что испортилась, а потому, что была слишком прекрасной. Я нигде не чувствовал себя в такой безопасности…</p><p class="p1">– Понятно, дом же.</p><p class="p1">– Но эта безопасность была – знаешь, как под теплым одеялом в холодной комнате. Очень хрупкая и потому особенно острая. Понимаешь?</p><p class="p1">– Как не понять. Я как раз примерно в таком положении.</p><p class="empty-line"/><p class="p1">– <em>Что, холодно?</em></p><p class="p1">– <em>Ладно, неважно.</em></p><p class="p1">– <em>Я могу еще протопить…</em></p><p class="p1">– <em>Лежи, лежи.</em></p><p class="empty-line"/><p class="p1">– На Земле, – продолжал он, – там все ясно: все как бы, извини, по заслугам. Так нарывались, что напоролись. А у нас здесь…</p><p class="p1">– У вас тоже напоролись. Только на внешнюю силу.</p><p class="p1">– Да, наверное. Хотя черт его знает. Я допускаю, что и внутренняя могла.</p><p class="p1">– Откуда?! – поразилась Катька. – У вас ведь была идиллия!</p><p class="p1">– Идиллия в последней стадии, когда она уже переходит в распад. Могли и сами себя… Знаешь, как я это понял? Меня лет в семь мать впервые повела в зоопарк. Я тебя потом свожу, хотя его, конечно, тоже эвакуировали. Такая была коллекция… и никто не сидел в клетках, все – в дикой природе. И вот мы пришли, а там старушка сидит, рядом с кассой. И говорит: «Купите кепочку». Продает кепки всякие со зверями.</p><p class="p1">– Слушай, я же у тебя ее видела в сентябре! Ты в ней на работу один раз пришел! Я еще подумала – откуда такие фантастические звери?</p><p class="p1">– Да, мне мать тогда купила сильно на вырост. Она нам и не была нужна, собственно, кепка-то. Но старушка с такой интонацией просила, что нельзя было не взять.</p><p class="p1">– Что, очень жалобно?</p><p class="p1">– Да нет, вот землянство неистребимое! Можно просить без жалобности, можно давать от щедрости. У нас все было очень щедро, вот. Очень избыточно. Никто ничего не прятал, все делились. И если хочешь знать – эвакуацией ведь занимались мы одни. На других планетах тоже могли вас отслеживать и брать ваших к себе, но вот им было не до вас. Вообще ни до кого. А мы везде рассылали эвакуаторов, самая модная была профессия. Мы так всех и просили: купите кепочку! поешьте нашего пирожка! айда на нашу планету! Всё – от избытка, всё – бери не хочу. А такая щедрость – она до добра не доводит. Она сама по себе признак какой-то высшей, конечной стадии развития. За которой только большой взрыв – и привет. Так что очень может быть, что это все, – он обвел рукой черные башни своего коркынбааса, – сделалось ходом вещей… У вас – кара за недостаточность, у нас – крах под тяжестью избытка.</p><p class="p1">Он замолчал. Минуты три они молча, медленно шли назад – в парк с прудом и вьюнами. Пахло почти как на Земле весной – горечью, пылью, гнилью.</p><p class="p1">– И потом, – выговорил он зло, – ваши же все равно меня никогда не признают до конца. Я для всех инопланетянин, для всех! Мне вашу земную логику никогда не понять. Я даже твою не совсем понимаю. Я знаю только, что ты рано или поздно оставишь меня – это тоже ваше, земное, необъяснимое…</p><p class="p1">– Ну Игорь! – Она тормошила его, распушала волосы, целовала в подбородок, до которого едва могла допрыгнуть. – И чего ты выдумал, что тебя все наши не любят? Бабушка моя, например, очень любит!</p><p class="p1">– Бабушка замечательная… – вздохнул Игорь.</p><p class="p1">– И дядя Боря тоже!</p><p class="p1">– А тут школа моя была, – он вдруг остановился возле металлической ограды, серебристой, в человеческий рост, густо заплетенной вьюном.</p><p class="p1">– Ты ее любил?</p><p class="p1">– Не то слово. Каждое утро бежал как на праздник. У нас ее все любили. Учителя были такие… сейчас таких не бывает. А у вас таких вообще забыли, когда видели. Театральный кружок у нас тут был, для эвакуатора это первейший навык. Я серьезно в артисты готовился. Но потом решил, что эвакуатор благородней.</p><p class="p1">– И кого же вы ставили?</p><p class="p1">– Да много кого. Шыкспира, например.</p><p class="p1">– О-о! А своих что, нету?</p><p class="p1">– Своих не так интересно. У нас-то, чувствуешь, всё гораздо легковесней? И дышать легче? Я уже привык, что надвое живу. У вас – тяжело, и поэтому скоро все провалится. У нас – слишком легко, и поэтому скоро все взлетит.</p><p class="p1">– В принципе да, – важно согласилась Катька.</p><p class="p1">– Знаешь, что я больше всего любил? – спросил он полушепотом. – Вот когда с репетиции идешь… осень, часов шесть… Светло еще. Допустим, сентябрь. И так таинственно… Таинственно, уже когда выходишь из пустой школы. Я очень любил оставаться после уроков. Такое все необязательное. У нас вообще был культ необязательного, не скажу, что у всех, но это входило в саму идеологию планеты. Делать без принуждения, помимо необходимости. Избытки, излишества, внеурочности… Мне нравилась пустая школа, в которой кончились занятия, нравилось репетировать в актовом зале, идти пустыми коридорами, потом медленно, никуда не спеша, с портфелем – домой. Мне казалось, что все люди со мной в заговоре. Я шел мимо поликлиники, мимо рыбного магазина… навстречу всё попадались тихие, таинственные и доброжелательные прохожие, которые на меня смотрели со скрытым одобрением: как это я, так явно принадлежащий к тайному обществу, не боюсь тут ходить в открытую? А кроме театрального, у нас еще был литературный кружок. Мы даже делали свою радиопередачу. Клуб умных детей. И по нему тоже было видно, что и такой клуб, и такие дети могут быть только в гибнущей стране. Столько приличных людей она просто не выдержит. Я это знаешь когда почувствовал? Когда клуб стал распадаться. Кто-то не мог приходить из-за учебы, потом из-за романов, из-за собственных детей… Я тогда понял, что обречено всякое сообщество, которому хорошо вместе. Его мир раздавит. Так и с планетой. А между прочим, здесь я впервые поцеловался.</p><p class="p1">– Можно повторить, – сказала Катька и тут же испугалась: ведь это было все равно что целоваться на кладбище. Обугленные деревья лежали кругом, и школа, все перекрытия которой провалились вниз и лежали на первом этаже бесформенной кучей, просматривалась насквозь.</p><p class="p1">Игорь, как всегда, все понял.</p><p class="p1">– Господи, сколько у вас всего напридумано лишнего… Почему нельзя целоваться на кладбище? Место как место. Тоже были люди, тоже целовались. – Он прижал ее к себе и потерся щекой о ее короткие мягкие волосы, сам стриг позавчера, больше некому.</p><p class="p1">– Игорь, – Катька высвободилась и слегка отстранилась. – Я тебя давно хочу спросить: ведь, наверное, много народу погибло. Эвакуация ведь у вас началась только после того, как кого-то уже… убили, так?</p><p class="p1">– Да, наверное.</p><p class="p1">– А почему трупов нигде нет? – решилась она наконец. – Что, всех успели похоронить и только потом улетели? Маловероятно, не находишь?</p><p class="p1">– Смешная ты, Катька, – сказал он. – Ты все думаешь – все у всех одинаково. У нас человек сразу исчезает, весь.</p><p class="p1">– И куда девается?</p><p class="p1">– А куда он на Земле девается? Туда же, в химические элементы. Только у вас элементов меньше. У нас знаешь какая периодическая таблица? Три разворота в энциклопедии. Даже мать не все помнит, а она у меня химию преподает.</p><p class="p1">– Подожди. Что, умираешь – и тебя нет?</p><p class="p1">– Ну да, это везде так. На всех планетах. Просто у вас ошибка эволюции – процесс очень замедляется. Пока всякие там процессы… негигиеничные… лет восемь, а то и десять. А у нас сразу. Как улетел.</p><p class="empty-line"/><p class="p1">– <em>Это ты хорошо придумал.</em></p><p class="p1">– <em>Я не придумал, это так и есть.</em></p><p class="p1">– <em>Но в сортир ты ходишь, я знаю, знаю, знаю!</em></p><p class="p1">– <em>Ну, милая моя, до такого совершенства, чтобы в сортир не ходить, эволюция никогда не доскачет.</em></p><p class="p1">– <em>Тогда подожди, я сейчас.</em></p><p class="p1">– <em>Давай, ведро на террасе.</em></p><p class="p1">– <em>Ну вот. Брр… холодно… Двинься! Продолжаем разговор.</em></p><p class="empty-line"/><p class="p1">– И что… вокруг нас… все эти невидимые люди? – спросила Катька.</p><p class="p1">– Ну и на Земле так же. Тех, кто давно умер, все равно ведь не видно.</p><p class="p1">– Значит, вокруг школы тоже… и вокруг домов…</p><p class="p1">– Конечно.</p><p class="p1">– А бессмертие души у вас есть?</p><p class="p1">– Откуда я знаю. У нас, скажем так, об этом спорят. Согласно религиозной концепции, все делятся потом на три категории. Люди действия попадают в распоряжение Кракатука, люди милосердия – к Аделаиде, а неразвитые и несформировавшиеся – к Тылынгуну.</p><p class="p1">– А злодеи?</p><p class="p1">– Злодеев давно нет, они все на Земле. Откуда взяться злодеям? Ну, если родится случайно – тоже к вам поедет.</p><p class="p1">Он снова прижался к ней.</p><p class="p1">– Другое дело – мы не учли, что у вас там будут такие Катьки. У нас здесь таких не было.</p><p class="p1">– А ты точно не был здесь женат?</p><p class="p1">– Не помню, – сказал Игорь. – Был, не был, какая разница?</p><p class="p1">– Большая.</p><p class="p1">– У вас, землян, вообще много лишнего в памяти. Историю вашу невозможно учить. От нее так же много лишнего остается, как от вашего человека, когда он умер. Ничего не надо хранить. И хоронить не надо. Это же одно слово, а вы сделали два. У нас в языке и одного-то нет на такие глупости.</p><p class="p1">Кажется, он разозлился.</p><p class="p1">– А между прочим, ваши искренне считают, что я и есть крайний. Сорвал с места, увез куда-то… На Земле бы еще, может, обошлось, а здесь, куда я вас привез, уже точно не обошлось.</p><p class="p1">– Да никто тебя не винит, успокойся, пожалуйста.</p><p class="p1">– Винят, я знаю. Мне вполне хватает того, как эта Сергеевна на меня смотрит.</p><p class="p1">– Успокойся, она на всех так смотрит, кроме полковника.</p><p class="p1">– Нет, это вообще интересно! – Он начал заводиться, и Катька была рада, что он хоть отвлекся от воспоминаний. Они шли по узкой улице, перешагивая через поваленные деревья; наверное, когда-то здесь было очень зелено – рябая тень, запах первой листвы… – Ты сама говорила, что она тебя терпеть не может, что не одобряла этого брака, ты не достойна ее сокровища… чинила хренов… так? Он, наверное, и дома все чинил, все хранил, ничего не выбрасывал. Такой был ужасно домовитый. Коврички из проволочки, полочки из дерьма…</p><p class="p1">– Игорь! Ну что ты, действительно… Что ты заводишься-то? Все же еще будет отлично! Ты в самом деле думаешь, что ничего нельзя восстановить?</p><p class="p1">– Восстановить можно. Но это будет уже не наша планета.</p><p class="p1">– Господи, да какая разница! На Земле-то вообще уже жить нельзя!</p><p class="p1">– Здесь тоже скоро станет нельзя.</p><p class="p1">– Да? Из-за двадцати землян?</p><p class="p1">– Это сейчас двадцать. У вас это быстро.</p><p class="p1">– Да что они такого сделают? – Катька обиделась и даже топнула ногой, и тут же из трещины в асфальте хлестанула длинная нежно-зеленая плеть. – Тьфу, черт… как растет, да?</p><p class="p1">– Вот и у вас так же. Вы очень быстро распространяете себя… Когда тут была нормальная среда, и люди делались нормальные. А сами по себе они тут такого наземлят… с полочками из дерьма…</p><p class="p1">– Слушай, в конце концов! Я обижусь! Мы – ваши ссыльные, у нас там черт-те какие условия… мы создали грандиозную культуру… у вас близко не было ничего подобного!</p><p class="p1">– У нас отношения были человеческие, это да. А Шыкспира не было, конечно.</p><p class="p1">– Теперь будет! Игорь, нечего тут, серьезно. Хватит. Я сама землянка, между прочим.</p><p class="p1">– Землянка быть маленькая хатка, норка, – сказал он грустно. – Вот ты уже и язык забываешь. Там бьется в тесной печурке огонь, и до смерти четыре шага, как нам. А ты есть не землянка, а землячка.</p><p class="p1">– Землячка быть старая большевичка, страшная тетка, бах-бах пистолет Крым. Я вижу, у нас нет адекватное слово для обозначение уроженка Земля. Наверное, ваши каторжники считали нас слишком второсортными существами, чтобы еще как-то обозначать.</p><p class="p1">Катька пыталась его отвлечь, но он все мрачнел.</p></span></span>
