<p class="p">X</p>
</div><p class="p1">Первое, что увидела Катька, был именно этот вокзал – он потому и сложился из хаоса линий, из приближающейся пестрой мозаики многоугольников, кругов, каналов и башен, что чего-то подобного она ждала, больше того – давно уже все знала. Есть версия, что мы с самого начала всё знаем, но не во всем себе признаемся. Познание мира – это, в сущности, признание самим себе, что все так и есть; некоторые всю жизнь не могут согласиться. Но Катька знала, ей не привыкать было вглядываться в себя – и потому она легко различила осколки хрустального купола, кое-где еще висящие на покореженных конструкциях, оплавленные диким жаром опоры, разметанные и опрокинутые составы, вздыбленные рельсы и беспомощно задранный в небо, слепой прожектор.</p><p class="p1">– Это… это… – забормотал Игорь. – Это что-то с наведением… Не туда я сажусь, что ли… Ылын, ылын! – закричал он в микрофон.</p><p class="p1">Ответа не было.</p><p class="p1">– Черт, рано я включил, – испуганно говорил Игорь. – На таком расстоянии не берется…</p><p class="p1">– Берется, Игорь, – устало сказала Катька. – Все берется.</p><p class="p1">– Ты-то откуда знаешь?! – огрызнулся он.</p><p class="p1">– Не злись. Ты сам все знаешь.</p><p class="p1">– Ни черта я не знаю… Сейчас воткнемся не туда… Я местность не узнаю, ты понимаешь, нет?!</p><p class="p1">– Я зато узнаю, – сказала Катька. – Вон вокзал. Ты тоже все узнаешь, не ври. Урулус куругач, пункт «в». Видишь, не только с нами бывает.</p><p class="p1">Лейка снижалась медленно, плыла над планетой почти горизонтально, как самолет, и в разрывах облаков – совершенно земных, спокойных, ватных – проступала райская земля, где ждут нас гостеприимные счастливцы, давно преодолевшие злобу, рознь и непонимание: черные сожженные поля, домики без крыш, раскрывшие небу беззащитные внутренности (всякий дом есть только бутон, вот снесет крышу, разнесет стены – тут он и раскроется), навеки остановившиеся диковинные машины, иная на крыше, колесиками кверху, иная на боку… В дурное, неурочное время попали мы на экскурсию в рай. Ямы разрывов зияли вдоль проезжих дорог, груды щебня и кирпича перегораживали чуть не каждую улицу. Десяток кварталов завалила сверкающими осколками зеркальная стена.</p><p class="p1">– Кракатук, – прошептал Игорь. – Кракатук, Аделаида, Тылынгун, что ж это такое?</p><p class="p1">– С Колымы не убежишь, – ответила Катька.</p><p class="p1">Все произошло совсем недавно – дым еще стлался кое-где, и догорали пожары в городе и окрестностях; не было видно только людей. Первая Катькина мысль была – никто не спасся, но этого она представить не могла – как-никак высший разум, может, все пережидают под землей? А может, вся местность теперь навеки заражена и всем им конец, как только они выйдут? Тогда Игоря предупредили бы по связи – видят же они, что он приближается! Неужели всем до такой степени не до них?</p><p class="p1">Но тут ожил приемник, и металлический голос незнакомого тембра – необычайно мягкий и радушный, но слишком явно искусственный – произнес несколько слов на уже знакомом, но все еще абсолютно непонятном языке; Игорь подскочил к пульту и усилил звук. Голос беспрерывно повторял одно и то же – длинную фразу с несколькими отрывистыми слогами в конце.</p><p class="p1">– Что она говорит? – спросила Катька.</p><p class="p1">– Это автомат. Говорит, чтобы мы вручную садились на пятый причал и ожидали дальнейших инструкций. Дальше задает параметры.</p><p class="p1">– О причинах ничего не говорит?</p><p class="p1">– Нет, ничего. Я вообще ни черта не понимаю.</p><p class="p1">Он взглянул на нее жалко и беспомощно – она никогда еще не видела у него такого взгляда; всегда, как бы трудно ни было, за ним стояла его планета, гордая и совершенная цивилизация, – теперь он, отвечающий вдобавок за восемь беспомощных землян, был абсолютно один.</p><p class="p1">– Ничего, – сказала Катька. – Главное – все вместе.</p><p class="p1">Он отключил автопилот и медленно, плавно стал переводить какие-то рычажки и нажимать кнопки; спуск сначала замедлился, потом вдруг ускорился, и у Катьки закружилась голова.</p><p class="p1">– Терпи, терпи, – повторял Игорь. – Сейчас немножко уши заложит… перегрузка, но это слегка. Не волнуйся, я ее плавно воткну…</p><p class="p1">Откинулся люк, и в кабину всосался дядя Боря.</p><p class="p1">– Вы тут сидите? – спросил он и сладко зевнул. – А я гляжу в иллюминатор – красиво у вас! Прямо как у нас. Такие, эт-самое, пейзажи… Ухожено все…</p><p class="p1">Игорь поднял на него глаза, но промолчал.</p><p class="p1">– Я чего, отвлекаю? – испуганно спросил дядя Боря. – Ты это… ты внимания не обращай. Давай приземляйся, я подстрахую, если что.</p><p class="p1">– Да я сам, – сказал Игорь.</p><p class="p1">– О, какой вид-то от вас! – Дядя Боря подошел прямо к иллюминатору. – Красотишша! Ты смотри осторожно, Игорь, ты тормози! Чего-то мы ускорились, нет?</p><p class="p1">– Штатно все, – буркнул Игорь.</p><p class="p1">Катьке тоже показалось, что они падают. Мимо пронеслись последние облака, какое-то время за окном не было ничего, кроме бледной синевы, а секунд через пять они вошли в слой густого, красно-бурого дыма и последние метров триста косо неслись сквозь него. Наконец раздался хруст, лейка вздрогнула и закрутилась вокруг оси. Дядя Боря рухнул на пол, Катьку вжало в кресло, Игорь изо всех сил давил обеими ногами на тормоза.</p><p class="p1">Прошло около минуты, прежде чем лейка, как «Музыкальный экспресс» в Парке культуры, медленно остановилась. В ту же секунду снова ожила рация, и радушный женский голос принялся повторять новую фразу, длинней предыдущей.</p><p class="p1">– Приветствуют, – сказал дядя Боря, силясь улыбнуться посеревшими губами. Его хорошо помотало по полу. – Ну, с мягкой посадочкой, с приятным прибытием.</p><p class="p1">– Что там? – спросила Катька.</p><p class="p1">– Всем выйти и двигаться на восьмой путь, соблюдая полное спокойствие, – перевел Игорь. – Руководство планеты приносит вам свои извинения за временные неудобства.</p><p class="p1">– А в чем они заключаются?</p><p class="p1">– Я знаю не больше твоего. Ладно, выпускай всех.</p><p class="p1">Катька пролезла в спальный отсек. Бабушка уже проснулась и терла руками глаза, Сереженька, как всегда, закрывал лицо рукой и не хотел вставать, Подуша хныкала, Майнат сидела неподвижно, обхватив себя за плечи и мрачно уставившись в угол. Беспокойней всех вел себя Лынгун. Он явно понимал в происходящем больше Игоря и Катьки, делал странные жесты – то обозначал как бы высокий купол над головой, то изображал крест, то надувал щеки и хлопал себя по ним.</p><p class="p1">– Ты все понимаешь? – спросила Катька.</p><p class="p1">Он яростно закивал.</p><p class="p1">– Тут – всё? – тихо проговорила она.</p><p class="p1">Закивал снова.</p><p class="p1">– Всё как у нас?</p><p class="p1">Он завыл и замахал руками: хуже, хуже!</p><p class="p1">– Ну чего? – хрипло спросила бабушка. – Прилетели к Богу в рай?</p><p class="p1">– Всё нормально, – сказала Катька. – Можно выходить. Нас уже ждут.</p><p class="p1">Створки раздвинулись, и они вышли в горячий, дрожащий красный воздух, в едкий дым и кирпичную пыль своего нового пристанища.</p><p class="p1">– Жарко у вас тут, – сказал дядя Боря.</p><p class="p1">– У нас вообще всегда тепло, – невпопад отвечал Игорь.</p><p class="p1">Земля была усыпана осколками, обломками, прутьями, похожими на использованные стержни от электросварки; в воздухе висела густая пыль, и земля ощутимо вздрагивала.</p><p class="p1">– Неудачно сели, да? – понимающе спросил Сереженька. – Сломали чего-то?</p><p class="p1">– Нормально все, – тихо ответил Игорь.</p><p class="p1">– А чего… разрушений вокруг столько?</p><p class="p1">– Пока неизвестно, – ответила Катька. – Ты, Сереж, подожди. Ему надо все узнать, он потом обязательно расскажет.</p><p class="p1">Игорь бросил на нее быстрый благодарный взгляд.</p><p class="p1">– Ну и где восьмой путь? – бодро спросила Катька.</p><p class="p1">– Налево, – сказал Игорь. – Только идите осторожно, видимость плохая.</p><p class="p1">– Оно и видно, – кивнул дядя Боря. – Там чего, таможня, на восьмом-то?</p><p class="p1">– Раньше пересадка была, – чуть слышно ответил Игорь. – На Альфу Центавра.</p><p class="p1">Не успели они сделать пяти шагов, как со всех сторон к ним устремились странные коричневые шары – Катька сначала приняла их за местную растительность вроде перекати-поля, но всмотрелась и узнала зверьков. Крупные, маленькие и самые мелкие, дылыны, тыгыны и еще какие-то, названия которых она не знала, – они ползли к ним, жалобно переваливаясь на коротких ножках, испуганно вытаращив круглые глазки, виляя толстыми хвостами. Зверьков было очень много, они копошились вокруг, насколько хватало глаз; некоторые жалобно пищали. В красноватом тумане виднелись раскиданные повсюду кофры и опрокинутые чемоданы, очень похожие на земные.</p><p class="p1">Катька нагнулась и взяла на руки одного зверька. Он блаженно зажмурился, прижал короткие ушки-рожки и облизал ей руки.</p><p class="p1">– Брось, Кать, – тихо сказал Игорь. – Зачем это теперь? Это же деньги.</p><p class="p1">– Это не деньги, – ласково ответила Катька. – Это не деньги, Игорек. Это ценности.</p><p class="p1">Она нагибалась, брала новых и новых зверьков – они лизали ей туфли, карабкались вверх по ногам и умильно смотрели снизу вверх.</p><p class="p1">– Ишь, животные, – радостно сказал дядя Боря. – Это какие, Игорь?</p><p class="p1">– Так, – сказал Игорь, – грызуны.</p><p class="p1">– Голодные, что ль?</p><p class="p1">– Ничего, они могут долго не есть.</p><p class="p1">До Сереженьки, кажется, начало наконец доходить.</p><p class="p1">– Тут чего? – спросил он Катьку вполголоса. – Тут тоже, что ли?</p><p class="p1">– Похоже на то, – сказала Катька.</p><p class="p1">– Ну да, – согласился он. – Штык впереди – назад осади, но, бога ради, что ж это сзади?!</p><p class="p1">Такими частушками и прибаутками он был набит под завязку, и прежде Катьку разозлила бы эта невинная хохма, но теперь она испытывала к мужу странную нежность, приступ солидарности. Ничего, он правильно реагировал. С чего она взяла, что Сереженька обязательно будет ныть? Сереженька был невыносим, когда вокруг все было нормально, но, когда у всех все было плохо, он был стопроцентно в своей тарелке.</p><p class="p1">– Всё в порядке, бабушка, – сказала Катька. – Ты как сама-то?</p><p class="p1">Бабушка молча кивнула, и по лицу ее Катька догадалась, что она тоже все поняла. Почему-то никого особенно не удивил именно такой оборот событий – все словно были к нему готовы заранее; только дядя Боря до сих пор ничего не понимал, да ему, кажется, было в самом деле без разницы – он был одинаково готов функционировать в любых обстоятельствах. Игорь почти без слов, жестами и невразумительным мычанием о чем-то договаривался с Лынгуном; тот успокоился и вполне разумно кивал.</p><p class="p1">Далеко впереди, метрах в двухстах, сквозь дымку вырисовывался мощный колонноподобный силуэт: огромная лейка, уходящая в невидимую высоту, стояла в конце платформы, и к ней, толкаясь, теряя вещи, распихивая нерасторопных, бежала монолитная толпа. Катька не могла разглядеть отдельных существ – кажется, они были в самом деле похожи на землян, но попадались среди них и совсем необычные, похожие то на сгустки дыма, то на стоящую вертикально змею, то на чернильную кляксу; все это шло, бежало, катилось, толкалось, прилипало к земле, отдиралось, снова волоклось в общем потоке, и от жалкого шествия шли физически осязаемые волны ужаса. Земля вибрировала от топота, и неслышный, ультразвуковой вой плыл над руинами вокзала – Игорь и Лынгун болезненно морщились, им-то он был внятен.</p><p class="p1">Неожиданно все тот же мягкий металлический голос донесся из динамика на покореженном столбе – столб погнулся, но динамик уцелел, только в голосе звучали теперь новые, повелительные обертоны.</p><p class="p1">– Надо спешить, – перевел Игорь. – Эта ракета – последняя, больше рейсов не будет.</p><p class="p1">– А куда они летят? – спросила Катька. – На Землю?</p><p class="p1">– Нет, в эвакуацию.</p><p class="p1">– Куда?! Ты же говорил, что вокруг на двести парсеков нет жилых планет, кроме нас и вас…</p><p class="p1">– Есть резервная планета, – сказал Игорь. – Да их до черта вообще. Ты что, правда подумала, что их две? Вот центропупизм… Полно их.</p><p class="p1">– Вы что, просто всех нас взять не можете?</p><p class="p1">– Не можем, – сказал Игорь, опустив глаза.</p><p class="p1">– А вас всех, значит, отправить отсюда можете?</p><p class="p1">– А нас всех можем, – сказал он с вызовом.</p><p class="p1">– А мы, значит, низший сорт?</p><p class="p1">Он молчал, но тут к Катьке подскочил Лынгун. Выражение лица у него было неожиданно осмысленное, какого никогда не бывало на Земле, – жалкое, умоляющее, но разумное. Он тоненько выл и указывал на ракету, подпрыгивал, бежал на месте – по всему было видно, что умолял поторопиться.</p><p class="p1">– Он говорит, что мы не успеем, – перевел Игорь. – Говорит, потом все объяснит. Она правда сейчас стартует, Кать. Эта большая, не то что наша. Сейчас сказали, что она точно последняя. Не успеем ни черта, все тут сдохнем.</p><p class="p1">– Ну ладно, – сказала вдруг бабушка. – Сяду я, что ли, отдохну.</p><p class="p1">Она с великолепным спокойствием уселась на свой древний чемодан на колесиках и отерла пот со лба.</p><p class="p1">– Жарко, – сочувственно сказал дядя Боря.</p><p class="p1">– Кира Борисовна, – умоляюще произнес Игорь. – Ну еще чуть-чуть, милая моя, тут же двести метров…</p><p class="p1">– И никуда я не поеду, – бабушка вытащила из кармана сложенную вчетверо газету и теперь невозмутимо обмахивалась ею. – И в сорок первом году никуда не поехала, и сейчас никуда не поеду…</p><p class="p1">– Да ты ведь уже поехала сюда, – чуть не плача, обняла ее Катька. – Ну чего ты, дойдем…</p><p class="p1">– И сюда не надо было ехать, это мне Господь знак дает. Я сверху видала, ничего, жить можно. Нечего нам тут. Еще куда поедем, потом еще куда… Где родился, там пригодился. И тебе, Игорь, нечего. И так уж сколько лет родину не видел. Отца хошь повидать, мать…</p><p class="p1">– Отца у меня нет, – сказал Игорь, – а мать, скорее всего, уже в ракете. Да, действительно, устал я чего-то…</p><p class="p1">Он сел у ног бабушки и погладил платформу руками, как Штирлиц перед возвращением в Берлин.</p><p class="p1">– Очень я любил это место, – сказал он и задохнулся. – Много раз возвращался сюда.</p><p class="p1">Мимо них с трудом, еле отрывая черное, дымное тело от усыпанного крошкой бетона, полз какой-то абориген – видимо, раненый, судя по липкому следу, тянувшемуся за ним. Он никак не поспевал за всеми, но страшно торопился. Может, его затоптали свои же, а может, он был куда-то ранен – по нему никак нельзя было понять куда. Тело его было бесформенным и зыбким, и по нему все время бежала дрожь, словно перекатывались волны; весь он был устремлен к спасительной ракете, но силы покидали его, и наконец он безвольно растекся по перрону, продолжая вздрагивать и мелко зыбиться.</p><p class="p1">– Кто это? – спросила Катька.</p><p class="p1">– Метаморф. У нас много таких. Это вторая форма жизни, мы всегда уживались нормально. Они разные могут быть. Любую форму принимают.</p><p class="p1">– А сейчас что с ним?</p><p class="p1">– Ранен, наверное. Откуда я знаю.</p><p class="p1">Бабушка встала, раскрыла чемодан, достала оттуда ночную рубашку, быстро порвала ее на бинты, без тени брезгливости нагнулась к метаморфу и принялась его перевязывать. Она ловко пропустила полосу ткани под его скользкое тело, и еще, и еще раз, – тонкая льняная полоска сразу набухла черной слизью.</p><p class="p1">– Как вы его бинтуете? – спросил Игорь. – Это же метаморф, я говорю. Вы не знаете, где у него что…</p><p class="p1">– И-и, милый, – прокряхтела бабушка. – Я в сорок первом году не таких бинтовала.</p><p class="p1">Метаморф благодарно приподнял что-то и издал нежное урчание.</p><p class="p1">В эту секунду перрон содрогнулся, из-под огромной лейки вырвались языки пламени, и она медленно, чуть кренясь вправо, словно из нее собирались напоследок полить родную почву, пошла вверх, вверх, вверх – туда, где сквозь красный туман клопом ползло солнце. Солнце ползало по небу двумя клопами, вспомнила Катька. Откуда, собственно, я знаю эти стихи, кто написал их – и откуда знал? Почему оно двоится – не потому ли, что наблюдатель треснулся головой?</p><p class="p1">Но не успела утихнуть послестартовая вибрация, как на пятый перрон, куда полчаса назад приземлились они, тяжело рухнула бешено вертящаяся лейка поменьше. Взметая пыль, она еще некоторое время крутилась в дыму, потом замерла, и из разверзшегося люка вышел пожилой мужик вполне земного вида, в военной форме, знаков различия на которой в тумане не было видно. Следом за ним на перрон легко выпрыгнула Любовь Сергеевна.</p><p class="p1">– Мать? – не поверил глазам Сереженька. – Ма-ать! – заорал он и бросился назад, к пятой платформе.</p><p class="p1">– Маленький мой! – всплеснула руками Любовь Сергеевна и устремилась ему навстречу.</p><p class="p1">– Вот он, военный летчик-то, – радостно сказал дядя Боря. – Вот оно все и встретились. И хорошо.</p><p class="p1">Любовь Сергеевна тискала и тормошила сонную Подушу, обнимала нашего мужа и радостно делилась подробностями путешествия.</p><p class="p1">– Я так боялась! Я взяла только тех, кем могла рискнуть. Но мы долетели без всяких происшествий! И совершенно не укачало! – торжествующе добавила она. – Ты представляешь, в машине всегда укачивало, а тут – совсем ничего! Владимир Иванович замечательно вел. Я не думала даже, что он так умеет.</p><p class="p1">Тот, кого она называла Владимиром Ивановичем, четким военным шагом приближался к их маленькой компании.</p><p class="p1">– Честь имею, – сказал он сухо. – Эвакуатор Велехов. Так вам будет проще меня называть.</p><p class="p1">Он обернулся к Игорю и быстро хлопнул себя левой рукой по сгибу правой. Странное приветствие, подумала Катька. На Земле этот жест имел совершенно другой смысл – какой-то у нас действительно мир наоборот… Игорь так серьезно отдал честь в ответ – то есть опять-таки согнул левую руку и так далее, – что Катька, не удержавшись, прыснула. Эвакуаторы не обратили на нее никакого внимания. Самое удивительное, что Лынгун неумело повторил приветствие, и военный летчик Велехов потрепал его по волосам.</p><p class="p1">– Ыулун тыгырык, – сказал он снисходительно. – Ыукур тырыдык, ылын ыс?</p><p class="p1">– Как же, как же, – сквозь зубы ответил Игорь по-русски. – Напишешь ты теперь на него представление. Кому вы хотите писать представление, полковник? Вы тут, кажется, старший по званию, если только не прилетит Кракатук с инспекцией…</p><p class="p1">– Держите себя в руках, капитан, – с искусственной белогвардейской брезгливостью, всегда столь отвратительной в советских фильмах о гибели белой армии, процедил Велехов. – Чемодан вокзал, ювенес дум сумус!</p><p class="p1">– Говорите, пожалуйста, по-русски, – бросил Игорь. – Люди кругом.</p><p class="p1">– Вам угодно по-русски? – язвительно осведомился Велехов. – Не будьте бабой, капитан! Я объявляю вам взыскание!</p><p class="p1">– Эк вы в России набрались, – усмехнулся Игорь. – Давайте меня, может, сразу того – в расход? Свой в своего всегда попадет? Даешь перенос русских традиций на родную почву! Сделаем самоистребление лозунгом момента – самое время, десять человек осталось!</p><p class="p1">Велехов помолчал, потом хлопнул Игоря по плечу.</p><p class="p1">– И то сказать, капитан. Как-то я оскотинился. Простите, ребята, – обратился он персонально к дяде Боре.</p><p class="p1">– Да чего там, все свои, – пожал плечами дядя Боря.</p><p class="p1">– Что делать будем, капитан? Я на посадке копулятор помял, на Центавра не долечу.</p><p class="p1">– Ничего, полковник, починим, – сказал Игорь кисло.</p><p class="p1">– Ты сам-то как, нормалёк?</p><p class="p1">– Штатно.</p><p class="p1">– Ну, ты ас. Про тебя легенды ходили.</p><p class="p1">– Я вот что хотела уточнить, – сказала Катька, обретя наконец дар речи. – Может, хоть вы объясните, полковник, а то в последнее время Игорь как-то не того… трудности перевода… Вы не объясните, как это вышло, что в России работали три эвакуатора – и все трое прибились, в сущности, к одной семье?</p><p class="p1">– Ну, почему к одной, – нахмурился полковник. – Во-первых, большинство эвакуированных уже отбыли вместе с нашим коренным населением. От вас все-таки взяли довольно много народу. Это мы все с вами задержались по не зависящим от нас обстоятельствам… Во-вторых, у меня там в анабиозе еще шесть человек, я даже немножко перегрузился…</p><p class="p1">– Очень милые люди! – воскликнула Любовь Сергеевна. – Моя портниха, мой протезист, мой пациент с мамой… Мой ветеринар с женой… Кстати, эта портниха – милейший человек, я тебе говорила, – Колпашева!</p><p class="p1">Катька пошатнулась.</p><p class="p1">– Ты чего? – спросил Игорь.</p><p class="p1">– Ничего. Тошнит.</p><p class="p1">Любовь Сергеевна в упор посмотрела на нее и – Катька поклялась бы в этом на Библии – злорадно подмигнула с полным пониманием ситуации, какое всегда отличало тупых и хитрых людей. Ты думала убежать, дорогая моя? Добро пожаловать в рай. Тебя там встретит Колпашева. И кто, собственно, нам внушил, будто нам известны критерии отбора? Допустим, нам нечеловечески повезло и мы угодны Господу. Мы расставляем чемоданы земных впечатлений, раскладываем пачки любимых воспоминаний (отчего-то мне кажется, что этот призрачный багаж сразу же начинает просвечивать, истаивать, разлагаться под пальцами, стоит нам попасть туда, где и без того Есть Всё) – и тут навстречу нам выходит некто смутно знакомый, некто, кого мы сразу узнаем даже после мучительных пертурбаций светлого часа: наш главный мучитель, который у каждого свой, исчадие ада, наш страшный антидвойник, антипод, знающий про нас все-все-все, потому что мы из вещества, а он из антивещества; так что же, его тоже взяли? Ну конечно! Откуда мы знаем, вдруг он святой? Можно было бы перенести, если б мы оказались в аду, а он в раю: это по крайней мере подтверждало бы наличие некоей системы ценностей, в которой мы на одном полюсе, а абсолютное зло на другом. Но перенести факт, что наши столь принципиальные различия до такой степени безразличны Господу, допустить, что внятного нам критерия вообще нет, а потому все наши нравственные принципы и догадки о природе вещей не стоят ломаного гроша, человеку в самом деле нелегко, и оттого происходящее поразило Катьку много сильней, чем разрушенный вокзал и красный туман на месте рая. Если вдуматься, никакого другого рая она и не заслужила, да и вряд ли ей было бы хорошо там, где все слишком хорошо. Наш рай – там, где уже случилось все, что может случиться, где нечего ждать и бояться, не с чем резонировать нашей скрытой внутренней трещиной; Господи, сделай так, чтобы Все Уже Случилось – и я могла не тратить души на засасывающий, воронкообразный страх; душа может мне пригодиться и для иных целей! Да, в таком раю, пожалуй, мне будет уютней, чем под хрустальным куполом; но как же я не учла, что у семейства Колпашевых точно такие же представления о рае, потому что для этих людей нет иного счастья, кроме известия о том, что у соседа сдохла корова, а на Альфе Козерога рухнул мир! О, в этом раю они разгуляются, в разрухе их некому будет остановить; в классе у меня всегда мог найтись нежданный заступник, или учитель вошел бы в критический момент, и все-таки рядом, через улицу, были родители, – кто спасет меня здесь, неужели Игорь, беспомощный ангел-хранитель, чей мир только что разлетелся в клочья? До меня ли ему здесь, господи помилуй! Здесь-то Колпашева натешится надо мной. Катька в ужасе обвела глазами жалкую толпу на перроне, но тут кто-то словно взял ее душу за руку, если такое было возможно. На нее внимательно и доброжелательно смотрели, и источник этого взгляда был ей покамест неясен. Бабушка? Но бабушка сидела рядом, безразличная и уставшая; смотрел кто-то другой, от кого она меньше всего могла ожидать поддержки. Это был Лынгун, чей взгляд был теперь осмыслен и почти осязаем. Этим взглядом он словно гладил ее, и Катька благодарно кивнула.</p><p class="p1">– А к вашему вопросу об одной семье… – Велехов почесал в затылке. – Что ж, приходится признать, что в нынешнем состоянии страны… приличных людей в самом деле было немного. И все они так или иначе группировались… ммм… в одном кругу…</p><p class="p1">– Ну! – радостно воскликнул дядя Боря. – Гора с горой не сходится, а человек с человеком запросто!</p><p class="p1">Лынгун радостно захохотал. Катька никогда еще не видела его смеющимся.</p><p class="p1">Земля вздрогнула – на пятый перрон, рядом с первыми двумя, плюхнулась еще одна лейка.</p><p class="p1">– Это последняя, – сказал полковник. – Майор Тылык, из Штатов. Остальные успели. Как же это мы с вами так тормознули, ребята? Я еще понимаю, что россияне задержались – с ними всегда проблем не оберешься. Но этот-то что? Приличная страна же, на самом деле.</p><p class="p1">– Человека искал, вероятно, – хмуро сказал Сереженька.</p><p class="p1">Полковник взглянул на него с неудовольствием. Что поделать, надо было привыкать к новому сыну.</p><p class="p1">И тут Игорь завыл, опустившись на перрон и закрыв лицо руками. Он выл яростно, с надрывом, на одной ноте.</p><p class="p1">– Господи боже мой! – кричал он. – Господи, какая была планета! Загубили, всё загубили, а чего ради?! Ради мерзкой какой-нибудь ерунды, гнусной глупости, вонючего тщеславия! Сволочи, сволочи, лучших людей разослали спасать других, а сами погубили всё, всё! Господи, как же было не понять – где нам учить других, нам бы с собой справиться! Что же тут такое было, полковник?</p><p class="p1">Велехов молчал, мрачно покашливая. Игорь раскачивался из стороны в сторону.</p><p class="p1">– Какие сады, господи! Какие леса! Горы какие! И если бы только горы – сколько всего руками сделано! Какие дома, кинозалы, вокзал какой! Библиотеки, галереи! Кырылык крытый, кырылык открытый, залы для тургынгун, рыскылкун, ойок-кырыл! Бырст, бырст! Оголопуп, колотур, корлокут! Как все любили друг друга, господи, как берегли, как перед всем оказались беззащитны! Все невмешательство, невмешательство… Стырп, утутурс, полный, полный урулус! Кракатук, Аделаида, Тылынгун, аты-баты-эники-клец?!</p><p class="p1">В этот момент Катька понимала язык. Это значило: «Для чего вы оставили нас?»</p><p class="p1">Из врезавшейся в перрон третьей лейки смотрели оцепенелые америкосы.</p></span></span>
