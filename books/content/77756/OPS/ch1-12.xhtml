<span><span id="id8"><div class="title2">
<p class="p">VII</p>
</div><p class="p1">– И-и, милая моя, – сказала бабушка, прихлебывая с блюдца липовый чай, пахнущий ровно так же, как и двадцать лет назад. – И в сорок первом никуда не поехала, и сейчас никуда не поеду.</p><p class="p1">Она ни на секунду не усомнилась в том, что все серьезно, и в том, что Катька действительно может ее забрать (версия была – к Катькиным родителям, в Германию); не последовало ни единого вопроса о том, чего, собственно, бояться и что вообще надвигается. Это было у них с внучкой общее – абсолютное доверие к своим: если бы Игорь сказал, что Земля сядет на Луну, Катька поверила бы безоговорочно и стала выстраивать свою стратегию, исходя из этого. Бабушка тоже отреагировала сразу, очень спокойно, и это была именно та реакция, которой следовало ожидать и бояться. Катька успела себе внушить: не упорствуй, отступи, потом начнешь сначала.</p><p class="p1">– Ладно, – легко согласилась она. – А почему?</p><p class="p1">– А потому что некуда. У меня знаешь как двоюродный брат говорил? С Колымы не убежишь.</p><p class="p1">– Ты тоже думаешь, что везде Колыма?</p><p class="p1">– А что такого особенного на Колыме? Холод только, а так – везде люди.</p><p class="p1">Катька осмотрелась, словно в поисках аргумента, – они сидели в кухне, у запотевших осенних окон, возле которых валялись сухие осы; с бельевой веревки, натянутой под самым потолком, свисали пучки трав. Бежать отсюда в самом деле было некуда и незачем. Тут царил полный, нерушимый уютный покой. Невозможно было подумать, что бабушка когда-нибудь умрет. Она не менялась, морщин не прибавлялось, речь не портилась, зубы не выпадали, она все так же легко управлялась с домом, находясь с ним в тайном союзе, и дом поддерживал ее, давал силы. Увези ее из дома – и он рухнет, и она зачахнет. Моросил дождичек, сад поник, дорожки в нем развезло. Народу на улице почти не было. Сразу за домом начинался лес – бурый, голый.</p><p class="p1">– А ты езжай, – сказала бабушка. – Хотя, если б ты меня послушала, я бы тут и мужа твоего приняла, и Польке было бы неплохо, – дом стоит, люди кругом свои, школа есть… Прижилась бы, ничего. Жила ты в Брянске, не жаловалась.</p><p class="p1">– Ты сама подумай, что будет. Если Москва погибнет, все остальное недолго протянет.</p><p class="p1">– А как это она погибнет? В сорок первом не погибла, а теперь погибнет?</p><p class="p1">– Господи, – вздохнула Катька. – Что ж такое было в сорок первом году, что вы до сих пор все им меряете? Неужели с тех пор не было ничего пострашней?</p><p class="p1">– Не было, моя сладкая, и не будет.</p><p class="p1">– Будет.</p><p class="p1">– Ну, а будет – так и нечего мне, без году восемьдесят, бегать куда-то.</p><p class="p1">– Без двух.</p><p class="p1">– Ох разница, ох разница! А чего мне сделается? Дом есть, картошка есть, яблок в этом году стока было, что и жарили, и парили, и до сих пор не съели. Новая власть будет – а какая власть? Что они с меня возьмут? Тут какая власть ни начнись – они через три года все то же самое делать будут. Мне мать рассказывала: отец все говорил – новый мир, новый мир! Трех лет не прошло, как все опять завернуло. Посади американца – он через год запьет, через два проворуется, а через три все сделает как было.</p><p class="p1">– Эти не американцы, бабушка. Эти просто всех под корень вырежут.</p><p class="p1">– Да что им старуху-то резать?</p><p class="p1">– А что им детей взрывать?</p><p class="p1">– Так ведь то еще, может, не они. То еще, может, само взрывается. Я слыхала, «Маяк» говорил: у нас к две тыщи третьему году все износится и само рушиться начнет. Ну, а оно покрепче оказалось, еще два годика поскрипело.</p><p class="p1">– И что ты будешь делать, когда все взорвется?</p><p class="p1">– А ничего не буду. Чай буду пить. Что ты приехала – это очень хорошо, спасибо тебе большое, я последнее время все скучаю, не знаю, как ты там. А ехать куда – это нет. Лучше ты давай сюда, вместе перезимуем, и не заметишь. И Сережу своего вези, он мне как раз забор подправит, а то из Михалыча теперь какой плотник? – Михалыч был сосед, завсегдатай вечерних посиделок.</p><p class="p1">– Сережа тебе так его поправит, что три Михалыча потом не разберутся.</p><p class="p1">– Мужика не ругай, – строго сказала бабушка. – Ты сама не ахти какая хозяйка, тоже мне нашлась мастерица. Я помню, как ты у меня яблоки на плите сушила.</p><p class="p1">– Бабушка! Мне было восемь лет!</p><p class="p1">– И что? Если руки не оттуда растут, то они на всю жизнь так. Твой отец в пять лет первую скамейку сколотил, она до сих пор у меня целая. И брат твой в отца, а ты не в отца. Я б тебе не то что дитя пеленать, я б тебе щи варить не дала.</p><p class="p1">– А я пеленала, и очень успешно, – обиделась Катька. – Мне и в поликлинике все говорили: какая умелая мамаша, идеально ухоженный ребенок.</p><p class="p1">– Ну, не знаю. Когда ты ее прошлый год привозила, она бледненькая была и кушала плохо.</p><p class="p1">– Мы все кушали плохо, я тоже в детстве не ела ничего. Вспомни, какой спирохетой Мишка был.</p><p class="p1">– Мишка был вылитый дед, а никакая не спирохета.</p><p class="p1">– Ну и у меня вполне сытый ребенок…</p><p class="p1">– Сытый, не сытый, а руки у тебя крюки, это я тебе точно говорю. Как ты ими рисуешь, не могу понять. Шить, вязать – все из рук валилось.</p><p class="p1">– Ну что ты хочешь, я не люблю шить.</p><p class="p1">– Люби не люби, а уметь надо.</p><p class="p1">Так они трепались за липовым чаем с пряниками, купленными в ближайшем магазине, и Катьку все сильней и глубже засасывала родная брянская жизнь, из которой, в общем, совсем необязательно было уезжать. А что, приехать сюда, захватить Игоря. Бабушка поймет. Нет Москвы – и хорошо, Москва, в конце концов, не всегда была столицей. Перенесут. Стране-то все равно ничего не сделается, Россию же нельзя захватить. Она слишком большая, ею всякий поперхнется. Но под всем этим билась мысль, что тут не захват, что тут сама Россия перестала себя выдерживать и принялась разваливаться, – поезд бегал-бегал по кругу и стал наконец терять вагоны, болты, гайки, а вот уже и топка отвалилась, и скоро на рельсах будет лежать бесформенная куча покореженного металла; нас никто не захватывает, мы сами исчерпали свой лимит, да и брянский дом скрипит, шуршит, колышется от любого ветра… Наши старики больше не спасут нас, никто и ничто не спасет; вся надежда на лейку.</p><p class="p1">– Бабушка, – сказала Катька. – Пожалуйста, поедем со мной.</p><p class="p1">– Сказала тебе, не поеду. Тебя приму, всех твоих приму, а сама никуда не поеду. У нас знаешь как: где родился, там пригодился. Деду скока раз предлагали после войны: в Выборг езжай, в Таллин езжай… Никуда не поехал, из армии уволился – майор! – и обратно в Брянск учительствовать. Что ж я теперь? Я уеду – ему и оградку никто не покрасит.</p><p class="p1">Катька отчаивалась: бабушку было не уговорить. Тут спокойно и тяжело стояла твердыня, с которой ничего не сделаешь – именно потому, что рациональных аргументов у бабушки не было. Дом, да возраст, да кот, да соседи… и наравне с домом дедова могила, которую тоже нельзя бросать, потому что и она такая же естественная часть этого дома, как кухня, чердак, погреб; чердак и погреб вместе… А если конец – то конец всему, старому человеку грех бояться конца; и Катька понимала, что здесь предел ее сил.</p><p class="p1">– Мы тут все погибнем.</p><p class="p1">– Ничего, не погибнем. В Ленинграде вон в блокаду жили, кошек ели, не погибли.</p><p class="p1">– Да пойми ты, что сейчас не то! Сейчас никто тебя не будет голодом морить, взорвут к чертовой матери – и поминай как звали!</p><p class="p1">– Ты не ругайся, не ругайся.</p><p class="p1">– Бабушка, я тебе серьезно говорю.</p><p class="p1">– Ну и я тебе серьезно говорю. Хватит, отъездилась. Мне на базар дойти трудно, а ты говоришь – за границу.</p><p class="p1">– Да от тебя ничего не потребуется! Сядем сейчас в автобус, и всех дел…</p><p class="p1">– Нет, и не говори. Что ты, Катька, как банный лист к одному месту? Ты и всегда такая была: тебе скажешь раз, скажешь два – нельзя! Нет, она канючит… Помнишь, как ты кролика просила? Каждые пять минут пищит: «Кролик! Кролик!» Мать не выдержала, купила кролика – ты через пять минут смотреть на него забыла.</p><p class="p1">– Ничего не забыла, я его кормила.</p><p class="p1">– Ты сыром его кормила, дура пустоголовая! – Бабушка засмеялась басом; голос у нее вообще был низкий, внушительный, сейчас еще и хрипловатый от недавней простуды. – Ой, прости, Господи! Сыром кролика кормила! И это еще… морковь из земли вырыла и тычет ему! На, кролик, морковь! Грязную, только с гряды, в нос прямо! Ой, Катька, не девка была, а тридцать три несчастья. А чайник на себя как вывернула?</p><p class="p1">– Я отпрыгнула, – хмуро сказала Катька.</p><p class="p1">– Отпрыгнула, а руку всю обварила! Дед скок в машину – не заводится, он пешком побежал с тобой на руках в больницу! Сколько повязок меняли, сколько потом к хирургу водили! Всё боялись, шрам будет у девочки во всю ручку, никто замуж не возьмет! Выскочила как милая. Ты зайди хоть потом к Милице Сергеевне, спасибо, скажи, Милица Сергеевна, и замужем, и удачно все! – Милицей Сергеевной звали врачиху, которая тогда в самом деле спасла Катьке руку – а впрочем, Катька ничего этого не помнила, ей было три года.</p><p class="p1">– Ну ладно, – сказала Катька. – Я пойду пройдусь.</p><p class="p1">– Чего пройдусь, гляди, дождь какой сыплет! Ложись поспи, ты же всю ночь в этом автобусе тряслась!</p><p class="p1">– Нет, нет. Погуляю, потом, может, лягу. Я в парк схожу.</p><p class="p1">– Ну иди, – бабушка встала из-за стола и принялась наводить порядок в кухне. – Дождевик надень.</p><p class="empty-line"/><p class="p1">Как все русские провинциальные города, Брянск отчетливо делился на две части. В центре, где жила Катька с родителями до переезда в Москву, все было похоже на московский спальный район конца шестидесятых: хрущобы, скверы, одинаковые пятиэтажные школы. Ближе к окраинам начинались старинные, деревянные купеческие улицы с двухэтажными домами, оставшимися еще от позапрошлого века, и длинными строениями времен индустриализации в стиле баракко. Катька дошла до улицы Генерала Трубникова, до пятиэтажки, в которой прожила первые семнадцать лет жизни, и не почувствовала почти ничего. Ей казалось, что она тут непременно разревется, но слез не было, и никаких чувств к этому дому тоже не было. В их квартире на втором этаже давно жили другие люди. На балконе висело и мокло под дождем чужое белье, и никто его не убирал – в Брянске царил дух кроткого упадка: трескались дороги, осыпались дома, и сопротивляться было бессмысленно. Около дома толстая некрасивая женщина в очках кричала на маленькую старуху, тоже очкастую; старуха яростно и мелко стучала палкой об асфальт, а рядом исходила визгом старая, облысевшая собака: это были соседи сверху, здравствуйте, соседи сверху. Так и выгуливаете своего пса, несмотря на дождик. Взять вас отсюда? Может быть, в дивном новом мире, на другой планете, вы полюбите друг друга наконец, мои несчастные, мои жалкие, мои прежде всего противные? Как я брезгую миром, Господи! Не моя ли брезгливость, дойдя до критической массы, погубила его наконец?!</p><p class="p1">Здесь я ходила одна, много читала, много рисовала, мучилась в школе и мечтала о большой любви, которая настигла меня наконец и теперь увозит на Альфу Козерога, как и положено большой любви. Прощайте все, мне никогда тут толком не нравилось. Я определенно родилась для того, чтобы улететь на Альфу Козерога. Прощайте, потомки каторжников, племена, приговоренные к бессрочной ссылке, – я выхожу по амнистии, мне встретился добрый эвакуатор. Я забрала бы вас всех, если бы не была столь безнадежно уверена, что вы и там себе устроите ад.</p><p class="p1">Школы Катька не любила и ничего ей не простила – потому, вероятно, что ни одна из ее школьных проблем до сих пор не исчезла, и поди теперь пойми: это в школьные годы чудесные ее научили ненавидеть себя, ждать от людей только худшего, прятать свое лучшее – или сама она с детсада, а то и с рождения была такой. Во всяком случае, школа испортила положение до полной неисправимости. Катьке сильно не повезло с классом – не во всякой роте так изобретательно и неотступно мучают человека, как мучили у них; и если взрослому коллективу довольно быстро надоедает изводить кого-то – мало ли других дел, всевозможных отвлечений, ребенок еще не в силах противиться главному соблазну: затравливанию живого существа. Если существо реагирует разнообразно – пытается хорохориться, или гордо не замечает, или отчаянно бросается на обидчика, или, наконец, жалобно рыдает, осознав свое полное бессилие, – игра приобретает дополнительную привлекательность. Приобретенный опыт оказывается бесценен для обеих сторон: мучитель безмерно изощряет чутье на потенциальную жертву и в любом коллективе немедленно выделяет ее, повышая тем самым собственный рейтинг, а страдалец понимает что-то главное про жизнь. Катьке невыносимо было слушать советские песни про школьные годы чудесные, про журавлика, кружащего над нашей школой, или про девчонку со второго этажа, или про то, из чего же сделаны наши мальчишки: песни эти напоминали ей цветы, растущие в концлагере.</p><p class="p1">Погода была самая осенняя, моросящая, в школьных окнах желтели лампы дневного света, и чахла на подоконниках та же самая герань, что и десять лет назад. Пахло мокрыми листьями, ранними невыносимыми подъемами, нервной дрожью по дороге. Катька пошла обратно. Около стадиона, на который их водили бегать во время физры, и Катька никогда не укладывалась в норматив, ей встретился человек, которого она менее всего хотела увидеть и вместе с тем именно ради этой встречи, может быть, проделала весь путь до центра. Что-то без нее было бы неполным в Катькиной решимости покинуть Землю. Под дождем выгуливала своего ребенка в коляске Катькина бывшая одноклассница Таня Колпашева.</p><p class="p1">Таня Колпашева была существом уникальным, опрокидывающим все представления о детстве и зрелости, добре и зле, уме и глупости. Непроходимая тупица по части математических и иных абстракций, перетаскиваемая из класса в класс только благодаря пробивной силе, истерикам и взяткам ее матери, красной и совершенно квадратной анестезиологини пятой горбольницы, Таня отличалась поразительной прозорливостью во всем, что касалось человеческой природы, а точней – самых омерзительных ее сторон. Катька никогда, даже и среди взрослых, в институтские и послеинститутские годы, не встречала такого цинизма. Таня была самым взрослым человеком в школе – ее ничто не могло удивить, обо всех она знала худшее, только худшего и ждала, и Катьку это странным образом с ней роднило. Чувствуя это подспудное родство, Колпашева мучила Катьку особенно изобретательно – «сделай как себе», говорит официанту опытный клиент, и Колпашева «делала как себе», то есть с полным учетом всех страхов, слабостей и надежд. Колпашева обожала говорить гадости о чужих родителях. Она издевалась над болезнями. Высшим наслаждением для нее было наблюдать чужое поражение и добавлять проигравшему. Кажется, меру своей мерзости Колпашева понимала отлично – проверяя, как долго ее, такую, будут терпеть одноклассники, учителя и небеса. Все три категории наблюдателей, видимо, ее побаивались.</p><p class="p1">Теперь Колпашева переменилась – постройнела, стала прилично одеваться и умело краситься; злоба, жрущая ее изнутри, не дала ей разбабеть и стать похожей на миллионы провинциальных теток. Теточного в ней была только вязаная шапка, из-под которой выбивались жесткие рыжие пряди. Колпашева была бы даже красива, если бы не выражение усталой брезгливости, с которым она взирала на мир, понимая, что столкновения с ней он может и не выдержать: в нем давно уже нет никакой твердыни, ткни – и развалится.</p><p class="p1">– А, – сказала Колпашева, сразу узнав Катьку. – Здорово.</p><p class="p1">Голос у нее был ленивый, сытый, почти благодушный – если бы слова «благо» и «душа» не звучали применительно к ней таким диссонансом. Так кошка говорила бы с мышкой, с которой когда-то не без удовольствия играла и которую никогда не поздно доесть. Неприятнее всего выглядела уверенность кошки, что удовольствие было обоюдным.</p><p class="p1">– Здорово, – сказала Катька по возможности ровно.</p><p class="p1">– Чего приехала-то? – лениво спросила Колпашева. – Мало мы тебя воспитывали, что ль?</p><p class="p1">Естественно было бы ждать от бывшей одноклассницы – нет, не раскаяния, конечно, слово «раскаяние» подавно не сочеталось с Колпашевой, но хоть запоздалого дружелюбия, типа как ты там, что за жизнь, ведь мы так славно веселились в давние годы… Катьку тут до сих пор не простили за что-то. Она не знала, что отвечать.</p><p class="p1">– Ну, чего молчим-то? – спросила Колпашева с неожиданной яростью. – Москвачка. Приперлась тут. То все туда бежали, а как там прижало, так они обратно. Ну ничего, ничего. Приедете вы все, паразиты, мы вам тут покажем провинцию. Будете, бляди, говно жрать.</p><p class="p1">– Ты-то, я вижу, нажралась, – сказала Катька.</p><p class="p1">– Поговори, поговори, – сказала Колпашева. – Всех наших соберу, всё тебе вспомним. Мы недавно собирались тут с нашими, тебя вспоминали. Ни одной, говорят, больше не видели такой чаморы. Ни одной буквально. А где она? А в Москве она. Вот ты объясни мне, Денисова: почему как чамора, так обязательно в Москве? Город, что ли, такой чаморский? Вот у меня тетка есть, тетка Майя. Портниха она. Тоже в Москве, прикинь, Денисова. Это не тетка, а не знаю что. Вот я баба злая, это я тебе и так скажу. А нечего тут доброй быть, сама видишь, жизнь какая. – Катька слушала и не уходила, сама не зная почему; вероятно, потому, что инстинкт художника сильнее страха и отвращения. Когда встречаешь такой клинический, стопроцентно законченный тип – а прекрасное и есть цельность, – уйти нельзя, надо рассмотреть до конца, как рассматриваешь насекомое, хотя бы оно тебя в этот момент и кусало. – Я баба злая, но я своим не насру. Я за своих кому хошь глотку перерву, а на тебя, Денисова, и не плюну, как тебе глотку перервать. Я на тебя, Денисова, нассу и насру вместе с твоей Москвой, но своему не насру. А она всем срет, и матери моей всю жизнь срала, и мужу своему срала, пока в гроб не вогнала, и вот она теперь москвачка. Она теперь портниха, а моя мать в Турцию за дубленками ездиит. А она открытки присылает, с новым годом, с новым счастьем. Москвачка ёбаная. Хорош, пожировали. У меня муж ты знаешь кто? У меня муж всему тридцать пятому отделению начальник. Он тебя возьмет на семьдесят два часа, теперь без обвинения можно. Он для паспортной проверки тебя возьмет, по черезвычайному положению. Он тебя возьмет на семьдесят два часа, – она говорила: «семест», – и я над тобой натешусь. Ох, Денисова, я над тобой натешусь. Я изведусь вся, а над тобой я, Денисова, натешусь. Ногти себе обломаю, а над тобой натешусь. И всех позову, и все над тобой натешимся. А потом под все отделение тебя пустим, и над тобой натешатся.</p><p class="p1">Она заводилась, как все истерики, от самоповторов, и все сильнее качала коляску, и ребенок в недрах коляски проснулся и заорал.</p><p class="p1">– Что ж ты мне ребенка разбудила, Денисова? – спросила Колпашева тихим, сладким, угрозным голосом. – Это ребенка ты мне разбудила? Ты разбудила ребенка моего? Ты сглазить мне ребенка хочешь, Денисова, гадские твои глаза? Я тебе, Денисова, выцарапаю глаза твои гадские! Граждане! Милиция! На помощь! Ребенка моего хотела украсть! Хотела непрописанная украсть моего ребенка! Помогите, граждане! Ох ты моя цыпонька, ластонька, рыбонька! Граждане! Украсть хотели ребенка! Ох ты моя лапонька, моя кисонька, моя детонька родная! Родная моя, украсть хотели ребенка! Сука рваная, цыпонька, хотели украсть! Ребенка рваная цыпонька родная сука хотела украсть ласонька семест два по черезвычайному! Граждане!</p><p class="p1">Катька не стала дослушивать этот концерт. Она позорно бежала, слыша за собой топот погони, которой, разумеется, не было – весь район знал Колпашеву, и никто не стал бы сбегаться на ее крики. Колпашева хохотала Катьке вслед, а Катька бежала и бежала, пока не вскочила в первый попавшийся троллейбус. Ей было все равно, куда ехать. Ад был везде – в Москве, в Брянске, в Тарасовке. Всюду ждал куркуль Коля с ментом за плечами, с ребенком наперевес, с Колпашевой в обнимку. Игорь, увози меня куда хочешь. Черт меня дернул ехать сюда. Куда меня везут? Троллейбус заворачивал к вокзалу. Катька выскочила на остановке, поймала таксиста, сунула ему сотню при красной цене полтинник и через пять минут ввалилась в бабушкин дом.</p><p class="p1">– Что с тобой, сумасшедшая? Лица на тебе нету!</p><p class="p1">– Отстань, – сказала Катька, пошла в комнату, рухнула на тахту и до ночи пролежала, не шевелясь и не отвечая на расспросы. Ей все казалось, что за ней сейчас придут и возьмут на семест два часа, а там и на всю оставшуюся жизнь – за попытку украсть ребенка, за недостаточную почтительность к Колпашевой, за то, что в девятом классе Катька не могла выполнить норматив по бегу на 500 метров. Самое страшное, что Колпашева называла ее Денисовой. Это была ее фамилия по мужу, а значит, Колпашева за всем следила, читала «Офис», готовилась. Все было не просто так.</p><p class="empty-line"/><p class="p1">– <em>Ой, извини, пожалуйста. Я правда не знал.</em></p><p class="p1"><em>А какая у тебя девичья? Ты ведь говорила, я забыл.</em></p><p class="p1">– <em>Неважно. Так даже лучше, страшней.</em></p><p class="empty-line"/><p class="p1">Между тем никакого дела до нее Колпашевой, конечно, не было. Она получила лишнее подтверждение своей власти над москвачкой и еще восемь лет могла жить в родном Брянске в полное свое удовольствие.</p><p class="p1">Но ужасней всего была догадка о том, что полная власть Колпашевой над Катькой и беспомощное Катькино изгойство были как-то связаны с эвакуатором, с изменой и беззаконной любовью – с той непобедимой внутренней неправотой, которая и делала Катьку такой уязвимой. Если б не Игорь, она, мужняя жена, конечно, нашлась бы что ответить. Теперь у нее не было никакой опоры и никаких прав, и всякий мог с ней сделать что угодно.</p></span></span>
