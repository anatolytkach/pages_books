<p class="p">VIII</p>
</div><p class="p1">В шесть утра их с бабушкой разбудил стук в дверь.</p><p class="p1">– Кто? – сипло со сна крикнула бабушка.</p><p class="p1">– Милиция!</p><p class="p1">– Участкового черт принес, – пробормотала бабушка, шаркая к двери. – Ну чего тебе еще? – крикнула она, не спеша отпирать.</p><p class="p1">– Это за мной, – прошептала Катька. Ее колотила неудержимая дрожь, и остро болел живот.</p><p class="p1">– Да ладно.</p><p class="p1">– Открой, Кира Борисовна, – твердо сказал участковый.</p><p class="p1">Господи, господи, думала Катька, и чего меня сюда понесло?! Бабушка все равно не уедет…</p><p class="p1">– Измена, Борисовна, – сказал участковый, входя. На улице шел дождь, на менте был серый форменный плащ, и на пол с него натекала лужа. – Спасаться надо.</p><p class="p1">Боже мой, подумала Катька, какая еще измена? Когда я успела изменить не только мужу, но и Отечеству?</p><p class="p1">– Спасай, Борисовна, – повторил участковый. Он был совсем молодой, наглый, но в душе явно испуганный. – Пробило на такую измену, что жить не могу. А спиртное, сама знаешь, теперь с трех. И ночные все закрыли.</p><p class="p1">– Что ты все пьешь, Бакулин, ты мне скажи? Твой отец у моего мужа учился, приличный был человек.</p><p class="p1">– Борисовна! – повысил голос участковый. – Я власть, Борисовна! Я такого могу наделать… Мне если сейчас померещится, я ведь стрелять начну!</p><p class="p1">– Ну так ведь сам же видишь, что нельзя тебе. Что ж ты хлещешь?</p><p class="p1">– А от измены и хлещу, – словно удивляясь самому себе, ответил участковый. – Везде измена, и у меня измена. Я стрезва подумаю – как служить? И за голову хватаюсь. А потом примешь – и до утра ничего. А утром измена.</p><p class="p1">– И нету у меня ничего, и шел бы ты, Бакулин, улицы обходить…</p><p class="p1">– Я и обхожу. Злочеченцев не обнаружено.</p><p class="p1">– Кого не обнаружено? – спросила Катька, до самого подбородка натянув одеяло.</p><p class="p1">– Злочеченцев, – повторил участковый и пошатнулся. – Борисовна, я за себя не отвечаю. Я кого пристрелю – ты виновата будешь.</p><p class="p1">Кряхтя и шепотом ругая Бакулина скотиной, бабушка достала из-под стола белый бидон, осторожно налила полстакана золотистой жидкости и протянула участковому.</p><p class="p1">– Яблочный? – спросил Бакулин. – Люблю. Конфетка есть?</p><p class="p1">– Занюхаешь, – огрызнулась бабушка, но достала из буфета пряник.</p><p class="p1">– Благодарю за службу, Борисовна! – рявкнул Бакулин. – Ты Отечество спасла!</p><p class="p1">– Дуй давай отседова, девку мне разбудил, – проворчала бабушка.</p><p class="p1">– Что за девка? Почему не знаю? – заинтересовался участковый. – Почему не регистрировалась?!</p><p class="p1">– Слушай, Бакулин! – рассвирепела бабушка. – Если ты еще и куражиться тут будешь надо мной, я сегодня же к начальству твоему пойду! Это внучка моя, дубина ты стоеросовая!</p><p class="p1">– Борисовна! – вовсе уже наглым голосом воскликнул участковый. – Ты на представителя власти… Как ты можешь, когда я жизнью рискую!</p><p class="p1">Спиртное действовало на него мгновенно.</p><p class="p1">– Между прочим, – решила Катька срочно выручить бабушку любой ценой, – моя подруга – Таня Колпашева. У нее муж в тридцать пятом отделении работает, в центре. И он может вам такое устроить за ночное нарушение неприкосновенности жилища…</p><p class="p1">– Чево? – в крайнем удивлении переспросил мент. – Колпашева? Не смеши людей. Колпашеву весь город знает. Эта подстилка никому с двенадцати лет не отказывает. Муж! Откуда у нее муж? У нее мужа сроду не было, она из вытрезвиловки не вылезает! Ее уж зашивали два раза! Чего-то вы врете, девушка. Вы, наверное, Черная Фатима… А вот мы сейчас посмотрим…</p><p class="p1">– Ты! – низким голосом крикнула бабушка. – Я тебя смотреть живо отучу! Ну-ка, кругом! Во внуки мне годишься, пьянь подзаборная! Думаешь, управы на тебя нет? Ни к кому не пойду, сама кочергой башку проломлю!</p><p class="p1">Надо сказать, когда бабушка злилась, она выглядела внушительно.</p><p class="p1">– Пошутить нельзя, что ль, – буркнул Бакулин, оказавшийся при ближайшем рассмотрении рыжим и веснушчатым. – Иду, иду. Спасибо, Борисовна, прости, что разбудил.</p><p class="p1">– Бог простит.</p><p class="p1">– А внучку ты все-таки пришли зарегистрироваться. Сама знаешь, чрезвычайное положение.</p><p class="p1">– Пришлю, пришлю. Иди.</p><p class="p1">Он тяжело спрыгнул с крыльца и зашлепал по мокрой садовой дорожке.</p><p class="p1">– Говорила я тебе, поехали со мной, – сказала Катька. Она снова легла и теперь пыталась согреться, но дрожь не проходила. Грех признаться, Катька чувствовала огромное облегчение. Она в самом деле была убеждена, что теперь ее возьмут. Ей нетрудно было себя в этом убедить, особенно когда она чувствовала себя затравленной, бездомной и кругом неправой. Игоря рядом не было, а без Игоря она теперь ничего не могла – из прежней жизни выпала, в новую еще не улетела.</p><p class="p1">– Как я поеду, Катерина? Без своего дома на старости лет как жить? Что я буду делать, кому там буду нужна? Я в Москве больше дня не выдерживаю, а тут Германия!</p><p class="p1">– Не Германия, – сказала Катька. – Бабушка, я тебе могу теперь сказать. Там другая планета.</p><p class="p1">Кажется, вывести бабушку из прострации уже не смогло бы ничто, но при этих словах она встрепенулась и уставилась на Катьку в крайнем изумлении.</p><p class="p1">– Инопланетяне, что ль? – спросила она.</p><p class="p1">– Ну.</p><p class="p1">– Ты спи, спи, – засуетилась бабушка. – Это пройдет у тебя. Разбудил, черт драный. Совсем девка рехнулась, спи давай. Может, и не будет еще ничего.</p><p class="p1">– Бабушка! – Катька села на кровати. – Если бы все не было так серьезно, я бы за тобой не поехала, понимаешь? Но деваться некуда. Он меня предупредил.</p><p class="p1">– Кто?</p><p class="p1">– Инопланетянин мой. Я люблю его. Ты тоже полюбишь. Он нас и спасет.</p><p class="p1">– Катька, девонька, – сказала бабушка тревожно и ласково, как всегда говорила, когда всерьез боялась за Катьку. – Ты подумай, чего ты говоришь-то. Ладно бы я, старуха, в такую ерунду ударилась, а ведь ты с высшим образованием.</p><p class="p1">– Я поэтому и знаю, бабушка. Клянусь тебе чем хочешь. Богом тебе клянусь, – Катька перекрестилась на бумажную икону Николая Угодника.</p><p class="p1">– Не клянись! – строго сказала бабушка.</p><p class="p1">– Да если ты иначе не веришь?!</p><p class="p1">– Да чему верить-то, дура ты пустоголовая! Как еще ты с такими мыслями завиральными одна ездишь! Ведь тебе скоро черти мерещиться начнут!</p><p class="p1">– Господи! – заревела Катька. – Ну как мне еще тебе объяснить?! Почему ты не можешь мне поверить ни в чем? Я ведь за тобой приехала, у меня в Москве дочь, между прочим.</p><p class="p1">– Вот видишь, сама говоришь: дочь! Нарожают, а потом с ума сходят. Ты держи себя в руках-то! Мало у нас чего взрывалось, ничего, жили…</p><p class="p1">– Ага, – сказала Катька. – В сорок первом вон…</p><p class="p1">– И в сорок первом! – обозлилась бабушка. – И потом всякое было, ты не знаешь, а люди рассказывали! Что ты распускаешься так, жизнь – это тебе не игрушки! В руках надо себя держать, вот что!</p><p class="p1">– Я лучше тебя держу! – огрызнулась Катька. – Я правду тебе говорю! Он же предупредил меня, он все знает. Они давно наблюдают. Он меня любит и хочет забрать отсюда.</p><p class="p1">– А мужа ты куда денешь? – Это был хороший знак, бабушка уже допускала возможность инопланетянина.</p><p class="p1">– И мужа с собой возьму.</p><p class="p1">– Да как вас выпустят? Он же небось давно рассекреченный, за ним небось в двадцать глаз наблюдают! Инопланетянин!</p><p class="p1">– Как раз нет, он очень засекреченный. И мы улетим благополучно.</p><p class="p1">Некоторое время бабушка молчала.</p><p class="p1">– Ну ладно, – сказала она наконец. – В Москву я тебя отвезу, потому что одна ты теперь ездить не будешь. Это я тебе ручаюсь. А там посмотрим, что у тебя за инопланетянин.</p><p class="p1">Кире Борисовне теперь все было ясно. Она понимала, что внучка стала жертвой зомбирующей секты, отсюда и все ее странности: внезапный приезд, одержимость бегством, странное возвращение после прогулки, резкость, непредсказуемые истерики, озноб, слезы по любому поводу и страх перед представителем власти. Все это был чистый результат зомбирования, и в принципе от этого лечили. Вариант был еще не худший – некоторые своих детей обливали водой на морозе в видах закаливания. Но отпускать ее одну, да еще в такое время, было, конечно, немыслимо. Оно и понятно, что ребенок сошел с ума: родители далеко, одна в чужом городе, с мужем там тоже, видимо, не все ладно… Наверняка гуляет, теперь все гуляют. А они, сектанты, пятидесятники, и еще баптисты, и теперь еще, говорят, какие-то иеговисты, всегда забивают клин именно в такие трещины. Они таких и отбирают – одиноких и никому не нужных, вроде как потерявших себя. Потом они из нее выманят квартиру, а может, и ребенка. Ребенка пустят на органы. Эти всё могут, особенно сейчас, в такое время. Катька всегда была шаткая в этом смысле, хотя умом очень крепкая. Разные бывали закидоны, то из дома сбежит, говорит, что будет здесь жить и нипочем не вернется, то мечтает вслух, что хорошо бы школу сжечь. Надо поехать, посмотреть. А то еще хуже – сманят ее этой тарелкой, она возьмет мужа, возьмет ребенка, их повезут в лес и там зарежут, а квартиру отберут. Это так всегда и делается, вон и в «Аргументах» писали. Ничего не поделаешь, придется на пару дней оставить дом, если больше некому присмотреть за дитем. Нельзя было Нине с Валерой уезжать, говорила я – Катька одна в Москве пропадет. В Брянске бы я присмотрела, а так – что же я могу? И Кира Борисовна с тоской смотрела на Катьку, которая, конечно, отлично поняла ход ее мыслей и спокойно заснула. Пусть думает что хочет. Ясно, что бабушка поедет только спасать меня – спасать себя эта категория людей вообще не привыкла. Пусть думает, что я сумасшедшая, – лишь бы добраться до Москвы, а там, в Тарасовке, Игорь все ей объяснит. Да и объяснять уже не понадобится – они улетят, и все.</p><p class="empty-line"/><p class="p1">Ни одна машина не останавливалась. Они стояли и голосовали на шоссе, ведущем в Москву, и машин было все больше, словно из Брянска тоже побежали, но никто не хотел подобрать девушку с бабушкой. Дождь усиливался. Катька проклинала себя, Игоря и всех.</p><p class="p1">Наконец возле них, вильнув, тормознула пустая маршрутка, ездившая по маршруту «Вокзал – Лесная школа». Лесная школа, расположенная километрах в десяти от Брянска, была тут всегда, сколько Катька себя помнила: сначала это был интернат для иностранных детей, отпрысков секретарей африканских и латиноамериканских компартий, потом братская помощь компартиям прекратилась, и там стали селить беженцев из бывших республик, а когда и беженцев прекратили пускать, там сделали обычную школу для трудных и запущенных детей, по большей части умственно отсталых. Лечить их уже не было денег, и в лесную школу набивали всех подряд – гиперактивных, имбецильных, испорченных наследственностью, не умеющих читать, считать, говорить, думать… Из элитного интернат стремительно превратился в отстойный – на самом деле именно такое превращение и происходит чаще всего, поскольку обычному до отстойного еще падать и падать, а элитное с ним почти смыкается. Но педколлектив оставался тот же самый, ему некуда было деваться, и преподаватели со знанием португальского, полинезийского и суахили медленно спивались и оскотинивались на руинах своего интерната, который медленно обрушивался и дополнительно разрушался усилиями имбецилов. Одно время Никита Михалков заинтересовался роскошным некогда зданием и попытался устроить там кадетский корпус, но городские власти уперлись: девать имбецилов и педзапущенных было некуда. Маршрутка ходила туда теперь редко: те из родителей, кого еще не лишили прав, должны же были хоть иногда навещать своих отпрысков. Сейчас эта маршрутка шла пустая, и за рулем «газели» сидел румяный толстый мужик лет сорока пяти. Он широко улыбался, потому что мокрые Катька с бабушкой в самом деле представляли собой забавное зрелище, если смотреть на них глазами доброго, милого такого человека. Такого честного, с чистой совестью.</p><p class="p1">– Садитесь. Куда вам?</p><p class="p1">– Шеф, – быстро сказала Катька. – Плачу две, до Москвы. На месте еще две. Это все, что есть, серьезно. Но мне надо сегодня в Москву.</p><p class="p1">– Всем надо, – весело сказал шофер. – Поездов-то нету. А мне в Интердом надо. У меня маршрут.</p><p class="p1">– Ты же видишь, никто не едет. Зачем тебе в Интердом?</p><p class="p1">– Маршрут, – повторил водитель. – Вы садитесь пока, там поговорим.</p><p class="p1">Они забрались в «газель».</p><p class="p1">– Шеф, поехали, пожалуйста, в Москву, – умоляюще повторила Катька.</p><p class="p1">– Вот чумовая, – покачал головой шеф. – Все с ума посходили, все вообще! Сейчас в городе говорят, АЭС взорвалась.</p><p class="p1">– Сухиничская?</p><p class="p1">– Ну. А другие говорят, не взорвалась, просто захватили. Радио ж молчит, не говорят ничего. Все музыка и музыка. А если АЭС взорвалась, так до нас облако за два часа донесет, правильно? Вот все и бегут, потому что одна баба сказала, – шофер усмехнулся.</p><p class="p1">– А ты, значит, по маршруту?</p><p class="p1">– Ну.</p><p class="p1">– Давай, шеф, доедем до Интердома, а потом ты нас в Москву отвезешь. Я тебе серьезно говорю, у меня там такое дело, что я никак не могу здесь оставаться. Видишь, у меня старуха на руках беспомощная.</p><p class="p1">– Какая я тебе старуха? – прикрикнула бабушка, отличавшаяся не по годам острым слухом.</p><p class="p1">– Видишь?! – подмигнул шеф. – Ничего не беспомощная!</p><p class="p1">– Шеф, – чуть не плакала Катька.</p><p class="p1">– Да ладно, – сказал шеф. – На месте разберемся.</p><p class="empty-line"/><p class="p1">Они приехали как раз вовремя – Интердом срочно собирался. Видимо, информация о взрыве АЭС подтвердилась. Педагоги, ругаясь и беззастенчиво отвешивая подзатыльники (попробовали бы они так с детьми братских компартий!), запихивали свой неразумный контингент в единственный автобус, который смогли выделить для детской эвакуации городские власти. Мест в автобусе было шестьдесят, запущенных детей в области – девяносто, впихнуть их в один автобус не было никакой возможности, водитель матерился, двери не закрывались. Наконец вроде влезли все, только один мальчик – даун, насколько могла определить Катька, – все выл на одной ноте, размахивая руками, не хотел ехать, боялся, и старшие дети выпихнули его из автобуса: видимо, он успел сильно их достать. Мальчик вылетел из задних дверей, они наконец захлопнулись, и автобус с тремя воспитателями и девятью десятками педзапущенных имбецилов валко тронулся неизвестно куда.</p><p class="p1">– Они что же, не подберут его? – ужаснулась Катька.</p><p class="p1">– Да очень он нужен кому, – сказал шофер. Он вышел из «газели» и направился к маленькому дауну, который сидел под дождем без движения, не понимая, что произошло и куда все делись.</p><p class="p1">– Ы, – сказал он шоферу. – У, – и ткнул пальцем куда-то в сторону опустевшего Интердома.</p><p class="p1">– Да вижу я, что ты оттуда, – сказал шофер. – Теперь-то делать что?</p><p class="p1">– Ы! У! Ы! У! Ы! У!</p><p class="p1">– Ну ладно, ладно, поехали. В город тебя сдам.</p><p class="p1">– Ыыы! – заорал даун, уворачиваясь. Он все показывал головой на Интердом.</p><p class="p1">– Да цацкаться тут еще с тобой, – ругнулся шофер, схватил дауна поперек живота и поволок в машину.</p><p class="p1">– Чего он говорит? – спросила Катька.</p><p class="p1">– Ы, говорит. У, – добродушно сказал шофер.</p><p class="p1">– Чего ты с ним хочешь делать?</p><p class="p1">– В город повезу, сдам. Мне же все равно в город обратно.</p><p class="p1">– Не надо в город. Если его здесь воспитатели выпихнут, там его точно никто не возьмет. Ну сам подумай, все из города, а ты обратно! Поехали в Москву. Тебя как зовут, шеф?</p><p class="p1">– Боря, – благодушно представился шеф.</p><p class="p1">– Дядя Боря, поехали. Я его в Москву возьму.</p><p class="p1">– И куда денешь?</p><p class="p1">– Найду куда. Есть у меня возможность его увезти. Может, его вылечат там. Только мне обязательно надо там завтра быть, дядя Боря! Я завтра вылетаю, ты понимаешь?!</p><p class="p1">– Да куда ты его возьмешь? – недоверчиво сказал дядя Боря. – На него же документов нету, ничего!</p><p class="p1">– Я чартером лечу. В Германию. Поехали, дядя Боря, ей-богу! Две сейчас, две на месте.</p><p class="p1">Дядя Боря задумался.</p><p class="p1">– Ну, поехали, – сказал он не очень уверенно. – Может, ты его правда увезешь… Здесь-то он точно не жилец.</p><p class="p1">– Ы! У! – завыл маленький даун.</p><p class="p1">Дядя Боря завелся и резко взял с места.</p><p class="empty-line"/><p class="p1">– Нам все равно Сухиничи проезжать, – после долгого молчания сказала бабушка. – Вот и узнаем заодно, чего там взорвалось, чего не взорвалось…</p><p class="p1">До Сухиничей оставалось километров тридцать, не более. Даун перестал выть и смирился со своей судьбой. Он был маленький, курносый, с пуговичными глазами, сопливым носом и поперечными линиями на ладонях, словно намекавшими хироманту, что у этого клиента нет ни любви, ни ума, ни фортуны, а одна только ровная и благостная линия жизни – прямой бессобытийной жизни высшего существа. Катька всегда боялась детей-уродов, а теперь почему-то перестала. В конце концов, этот даун был теперь единственным оправданием ее бегства. Даже если бы она желала выбрать самого несчастного землянина, ей не удалось бы найти ничего более жалкого, чем идиот, отвергнутый идиотами. Это был не совсем обычный даун. Обычно, как известно, они очень доброжелательны, а этот был страшно раздражительный и все еще оглядывался назад, словно оставил в Интердоме что-то чрезвычайно важное. Правда, больше не выл.</p><p class="p1">Кроме АЭС, выстроенной на почтительном расстоянии от города, в Сухиничах осталось одно работающее предприятие. Это была игрушечная фабрика, знаменитая когда-то на весь Союз производством плюшевых зверей. Теперь этими зверями выдавали зарплату, и работники фабрики толпились на перроне, протягивая к окнам меховых медведей, зайцев и лис. Они надеялись по дешевке продать их проезжающим и тем прокормиться. Катька ненавидела проезжать через Сухиничи – зрелище было невыносимое.</p><p class="p1">Дядя Боря въехал в город. Там было пусто, пусто в самом буквальном смысле, как бывает в страшном сне. В игрушечном городе не осталось ни одного человека – видимо, про АЭС все было правдой, кто бы ее ни взорвал: чеченцы, вредители или закономерности общего распада.</p><p class="p1">На вокзальной площади под дождем лежали брошенные игрушки – плюшевые лисы, медведи, зайцы. Катьке хотелось выскочить из машины и подбирать этих несчастных, вымокших аляповатых существ, уродливых, плохо сшитых и никому не способных принести радость. Она с детства верила, что у самой плохой игрушки есть какая-никакая душа, и, когда ей не разрешили взять домой плюшевого щенка, обнаруженного на месте снесенного дома, она сделала этому щенку домик из картонной коробки и ходила с ним играть, чтобы ему не было одиноко без хозяев. Катька хотела даже остановить дядю Борю, чтобы он подождал минут пять – она успела бы собрать хоть кого-то, нельзя же, чтобы они тут просто так лежали и мокли, – но перспектива нахватать радиации была ей совершенно не по нутру, да и бабушку было жалко.</p><p class="p1">– Да-а, – протянул дядя Боря.</p><p class="p1">– Ну? – спросила Катька. – Ты понял теперь?</p><p class="p1">– Да-а, – повторил он. – Ну, поехали. Я только заправлюсь.</p><p class="p1">Он бесплатно заправился на брошенной бесхозной стоянке, и «газель» бешено рванула в сторону Москвы. Они не отъехали и двухсот метров, как автостоянка взорвалась.</p><p class="p1">– Ты чего, спичку бросил? – спросила Катька, почти не удивившись.</p><p class="p1">– Не курю я, – виновато сказал дядя Боря. – Само как-то.</p><p class="p1">– Прямо по пятам за нами, – непонятно сказала Катька.</p><p class="p1">Бабушка молчала, но, кажется, поняла.</p><p class="p1">Катька беспрерывно тыкала пальцами в кнопки мобильного. Связи с Москвой не было.</p><p class="p1">– Я один живу, – рассказывал дядя Боря. – По четным вожу, по нечетным подрабатываю. Бюро ремонта у нас. Мастерские там, машины, швейные, стиральные, обычные, все по мелочи. Я что хошь починить могу, руки, слава богу, из правильного места растут.</p><p class="p1">– А у меня из неправильного, – сказала Катька. – Я только если чего нарисовать.</p><p class="p1">– А жена ушла, – сказал дядя Боря. – И вторая ушла. Чего кому дано, с того и спросится. Я чинить могу, а в женской психологии не понимаю чего-то. Я спокойный, а они любят ударенных.</p><p class="p1">– Это точно, – убежденно сказала Катька.</p><p class="p1">Даун заснул. Выражение лица у него во сне было взрослое и скорбное, словно, когда отключалось сознание, он шестым чувством понимал свое истинное положение, но, стоило ему проснуться, опять становился озлобленным идиотом.</p><p class="p1">И всю дорогу, пока они проносились мимо серых лесов, мокрых деревень, наспех сооруженных блокпостов, около которых бессмысленно прохаживались ничего не понимающие, оголодавшие солдатики, Катька слышала вой пространства, тот самый, который впервые стал ей внятен еще по дороге в Тарасовку, в электричке. Пространство выло, смыкаясь за ними, и все, мимо чего они проехали, исчезало: деревни, блокпосты, собаки. Очень много было собак, Катька даже думала взять какую-нибудь. Все они бродили так же бездомно и потерянно, как солдатики вокруг блокпостов. Все ждали подачки, и всем подавали гибель.</p><p class="p1">Связь появилась только километрах в двухстах от Москвы.</p><p class="p1">– Сережа! – орала Катька в трубку. – Сережа, иди к Любовь Сергеевне! Скажи ей, что мы уезжаем! Я нашла возможность, есть чартерный рейс, «Офис» возьмет тебя, меня, ее и Подушу! Да, я сейчас в Шереметьеве! Я заеду домой и все объясню, вы без меня не выберетесь!</p><p class="p1">– Почему ты решила лететь? – орал в ответ Сережа. – Ты что, тоже веришь в это все?</p><p class="p1">– Я не верю, Сережа, я знаю! Немедленно иди к матери! Ты слышишь? Готовь ее, она же не сможет собраться быстро! Сережа, раз в жизни сделай, как я говорю!</p><p class="p1">– Я схожу, – соглашался Сережа. – Но не уверен, что она полетит!</p><p class="p1">– Сережа, и положи мне, пожалуйста, денег на мобильный! Если еще можно! Как Подуша?</p><p class="p1">– Все хорошо.</p><p class="p1">– Ест?</p><p class="p1">– Да! Когда ты будешь?</p><p class="p1">– Через три-четыре часа!</p><p class="p1">– Три-четыре – это чего-то ты, девушка, хватила, – сказал дядя Боря. – Мы если через шесть будем, хорошо. И то всяких кружных путей надо будет поискать.</p><p class="p1">Он вел машину очень спокойно, без малейшего напряжения, как будто заранее был готов к худшему варианту и успел прикинуть все обходные пути. Катька не могла нарадоваться на этого шофера. Пару раз он умудрился поймать по радио «Эхо Москвы», но на нем сменились все голоса и заставки, и оно передавало почему-то главным образом репортажи о панике на дорогах Германии и Франции да о падении курса евро. Насчет Москвы молчали, сообщая только, что по всей стране включилась система «Вихрь-антитеррор» и введен режим террористической опасности, категорически запрещающий выгул собак после двадцати ноль-ноль. Очевидно, со всеми физиками-шпионами уже справились, а может, они свалили, и в распоряжении репрессивных органов остались только псовладельцы.</p><p class="p1">– Дядя Боря, – осторожно начала Катька, – а вы как насчет свалить отсюда?</p><p class="p1">– А я что ж, – сказал дядя Боря, – я птица вольная. С женой развелся, дети взрослые. Живу холостяком. Если припрет, что б не улететь? Только куда?</p><p class="p1">– Это моя забота. Я договориться могу.</p><p class="p1">Он оглянулся на нее с любопытством.</p><p class="p1">– Ты-то? Да ты ж пигалица. В тебе мяса никакого нет и внушительности.</p><p class="p1">– Внушительность в этом деле не главное, дядя Боря. Только учтите, полетим далеко.</p><p class="p1">– Да у меня денег таких нет.</p><p class="p1">– Я вас бесплатно устрою. Вы же нас почти бесплатно везете.</p><p class="p1">– Ничего себе бесплатно. Избаловалась девка в Москве.</p><p class="p1">– Да какое там. Ясно же, что все эти деньги теперь ни к черту не нужны.</p><p class="p1">Дядя Боря хмыкнул.</p><p class="p1">– Это как поглядеть. Ты не спеши, не спеши.</p><p class="p1">– Но если серьезно – полетим? А, дядь Борь?</p><p class="p1">– А что, полетим, – сказал дядь Борь. – Только у меня вещей с собой никаких нету.</p><p class="p1">– И не надо.</p><p class="p1">Катька уже поняла, что дядя Боря – из тех русских людей, которых так любят интеллигентные евреи, ничего не умеющие делать руками. Дядя Боря был очень для них удобен – он все делал быстро, аккуратно, дешево и с удовольствием. Ему доставляла наслаждение собственная власть над материей, будь то пространство, которое аппетитно пожирала его «газель», или любой механизм, который работал от бензина или соляры. При этом дядя Боря не презирал тех, кому помогал. Он был идеальным соседом и надежным приятелем, очень мало пил, давно не курил и вообще являл собою тот идеал русского человека, о котором всегда мечтали народолюбцы всех разновидностей. Можно было сказать, что так называемые русские интеллигенты с еврейскими спорили именно за дядю Борю – за то, чтобы он только им чинил машины, водопровод и иногда электричество, а вражескому клану, напротив, не чинил ничего. При этом одни предлагали лишить дядю Борю всяких свобод и обязать его строем ходить в церковь, отдавая честь встречным городовым, а другие желали обобрать его до нитки и внушить ему, что его на этой территории терпят из милости, но и те и другие, в сущности, очень его любили. Оставалось понять, какой смысл во всем этом находит сам Боря и почему такое положение вещей представляется ему оптимальным. Вероятно, оно нравилось ему потому, что избавляло его от сложностей исторического выбора, ибо вся история заключалась в борьбе одних Бориных поработителей с другими, в то время как сам Боря не обращал на нее никакого внимания, примерно раз в столетие от души колотя обоих. Для дяди Бори, умеющего все, починка машины или наладка проводки не представляла никаких трудностей, а для русских и инородных интеллигентов, одинаково безрукой публики, была ножом вострым – так что оба клана очень боялись потерять Борю.</p><p class="p1">Между тем уже темнело, дядя Боря включил свет и поехал медленней. По мере приближения к Москве попадалось все больше встречных машин со слепящими яркими фарами – в основном иномарки. Столица медленно разъезжалась. Провинция ждала гостей с радостным нетерпением.</p><p class="empty-line"/><p class="p1">В Москву они въехали в седьмом часу вечера.</p><p class="p1">В городе было тихо и как-то грозно. Все затаились. Кто мог уехать – уже уехал, кто не мог – грабил опустевшие квартиры. Когда проезжали площадь Ильича, Катька заметила небольшую толпу, быстро бежавшую по переулку прямо навстречу их машине. Впереди толпы бежала, что-то крича и размахивая руками, невысокая женщина в черном платке.</p><p class="p1">– Спасите! – орала она.</p><p class="p1">– Стой, дядя Боря, – сказала Катька.</p><p class="p1">– Убьют, – сказал дядя Боря, быстро поняв все.</p><p class="p1">– Ничего. Тормози.</p><p class="p1">Катька открыла дверь, и смуглая женщина в платке стремглав запрыгнула в машину. Дядя Боря рванул с места. В заднее стекло глухо стукнулась брошенная кем-то палка.</p><p class="p1">– Спасибо, – пересохшими губами еле выговорила чеченка. В том, что это чеченка, сомневаться не приходилось.</p><p class="p1">– Уйти не успели? – сочувственно спросила Катька.</p><p class="p1">Женщина покачала головой.</p><p class="p1">– Некуда мне уходить. Я беженка, приехала к брату. В фильтрационном лагере была.</p><p class="p1">Катька не стала расспрашивать. Слова «фильтрационный лагерь» говорили сами за себя.</p><p class="p1">– Пряталась, – говорила чеченка. – А тут вышла хлеба купить – и сразу.</p><p class="p1">– А из города уехать? – спросила Катька. – Или вы думаете, свои не тронут?</p><p class="p1">– Какие свои? – с горечью сказала чеченка. – Ты не поняла еще, что это ваши взрывают? Ваши делают, а на наших валят.</p><p class="p1">– Как тебя звать?</p><p class="p1">– Майнат. Я из Ачхой-Мартана. У нас семья большая, была. Один брат сюда уехал, еще после первой войны. Другого на зачистке увели, и пропал. Сестра у меня была, убили. Обстрел был. Я одна осталась, родители старые, помрут скоро. Я в Москву добралась, у брата работала. Овощами торговала. В Грозном училась, школу кончила, образования другого нет, только торговать. Там жить совсем нельзя. Там ваши такое сделали, что и сто лет еще жить будет нельзя. А теперь здесь на нас говорят. А никакого Шамиля нет давно. Аллахом клянусь! – возвысила она голос.</p><p class="p1">– Да ладно, – сказала Катька. – Кто теперь разберет. Неважно.</p><p class="p1">– Убьют меня здесь, – тоскливо сказала чеченка.</p><p class="p1">– Не убьют, – утешила Катька.</p><p class="p1">– Что ты знаешь? Ваши люди как звери, хуже зверей!</p><p class="p1">– Ваши-то больно добрые, – неодобрительно произнесла бабушка.</p><p class="p1">– Ты меня до центра довези, там высади, – по-хозяйски сказала чеченка, адресуясь непосредственно к Боре.</p><p class="p1">– Я тебя повезу, куда мне вот она скажет, – неодобрительно ответил дядя Боря. – Я их везу, вот им и решать. А ты не командуй давай.</p><p class="p1">– Мы поедем потом через центр, – примирительно сказала Катька. – Я только домой заеду, и сразу. Скажи, а ты не хочешь вообще уехать отсюда?</p><p class="p1">– Нечего ее брать, – сказал дядя Боря. – Тоже небось без документов.</p><p class="p1">– У меня есть документ, на, смотри! – Чеченка достала паспорт и помахала перед Катькой. – Регистрация есть, все есть!</p><p class="p1">– Да это вам делают, – неопределенно заметил дядя Боря. – А ты, Катерина, ее все-таки не бери. Чую, тут не то что-то.</p><p class="p1">– Куда брать? – Майнат даже подпрыгнула на сиденье. – Меня нельзя брать! Я никуда из Москвы не поеду!</p><p class="p1">– Вот и не езди, – сказала бабушка.</p><p class="p1">– Ой, ну что вы все, честное слово… – сказала Катька и осеклась. Москва горела.</p><p class="p1">Дождь к вечеру перестал, и в ранней ноябрьской темноте ближе к центру то тут, то там озарялись красными отблесками угрюмые дома. Желтых, уютных окон почти не было, но темные стекла тут и там вспыхивали алым: покидаемый город тлел, как перед нашествием Наполеона. Пронеслась, ревя сиреной, одинокая пожарная машина – и все опять затихло. Вдруг пламя вырвалось из ближайшего дома, словно до поры огонь еще чего-то стеснялся, но вдруг получил тайный знак, что бояться больше нечего и можно резвиться безнаказанно. Дом мгновенно утонул в пламени, со звоном лопнули стекла, послышался грозный гул.</p><p class="p1">– Быстрее надо, – сказал дядя Боря и поехал быстрее. – А то действительно, прямо как догоняет кто.</p><p class="empty-line"/><p class="p1">На их улице все было пока спокойно и даже светилось несколько окон в роскошном доме напротив. Дом состоял из шести башен, соединенных надземными коридорами, и принадлежал Государственной думе, даже теперь о чем-то себе думавшей, наверное.</p><p class="p1">– Подождите в машине, – сказала Катька. – Майнат, ты же никуда не спешишь?</p><p class="p1">– А? – спросила Майнат. Она пребывала в угрюмой задумчивости.</p><p class="p1">– Не спешишь, говорю, никуда?</p><p class="p1">– А? Нет.</p><p class="p1">– Ну, я быстро. Сейчас, дядь Борь, только мужа моего захватим. Я тебе и денег вынесу.</p><p class="p1">– Да на что мне теперь деньги, – спокойно сказал дядя Боря. – Летим так летим. Только у меня загранпаспорта нету.</p><p class="p1">– Не надо нам загранпаспорта, – в сотый раз повторила Катька. – Подождите, сейчас спущусь.</p><p class="p1">Лифт не работал. Правильно. Она стремительно взбежала на свой пятый этаж. Слава богу, они были дома, никуда не сбежали и ждали. Подуша смотрела телевизор. Показывали мультфильмы Сутеева, и позднеимперские зайчики и белочки выглядели такими же несчастными и беззащитными, как те, под дождем, в Сухиничах.</p><p class="p1">– Мать не поедет, – сказал Сереженька тихо и грустно, как человек, переживший сильное нервное потрясение.</p><p class="p1">– Почему?</p><p class="p1">– Она уже уехала. С другим человеком.</p><p class="p1">– Куда?!</p><p class="p1">– В Штаты. Ее увозит какой-то секретный мужик, с которым у нее, оказывается, роман.</p><p class="p1">– И ты не знал?!</p><p class="p1">– Ага. Представляешь, не хотела травмировать.</p><p class="p1">– Черт-те что. Какой хоть мужик?</p><p class="p1">– Я не знаю. Она нас не знакомила. Говорит, что военный летчик. Предлагала лететь с ней, но я сказал, что без тебя никуда не поеду.</p><p class="p1">– Спасибо, – сказала Катька. – Это благородно.</p><p class="p1">Черт бы драл его благородство. Пусть бы оставил Подушу и летел на все четыре стороны.</p><p class="p1">– Ты представляешь? – задумчиво произнес Сереженька. – Сказала, что имеет наконец право на свою жизнь, а до этого заедала мою, но теперь избавляет меня от себя. Не могу больше висеть у тебя на шее. Так и сказала. Представляешь? Значит, она все время думала, что она мне в тягость.</p><p class="p1">– Может, ты сам себя так вел?</p><p class="p1">– Ну Кать, ну правда! Когда я себя так вел?</p><p class="p1">– Не знаю. Орал ты на нее все-таки порядочно.</p><p class="p1">– Господи, ну мало ли на кого я орал! На тебя, на нее… У нее уже год была, оказывается, отдельная личная жизнь, а я ничего не знал. Ну с ума сойти, да?</p><p class="p1">– Да ничего не сойти. Она нестарая женщина, у нее может быть своя жизнь.</p><p class="p1">– А меня, значит, она бросает?</p><p class="p1">– Сереж, ты взрослый мужик. Опомнись, у тебя свой ребенок. Может она наконец отпустить тебя в свободное плавание?</p><p class="p1">– Ты ее с самого начала ненавидела, – тихо сказал Сереженька.</p><p class="p1">– Ладно, думай так, если тебе больше нравится. Собирайся, у нас мало времени.</p><p class="p1">– Подожди. А как мы полетим? Нужны документы на Подушу, полис медицинский, вещи все для нее…</p><p class="p1">– Ты еще не собрал вещи?!</p><p class="p1">– Я собрал, но я думал, тебе видней… ты мать все-таки…</p><p class="p1">– Сережа! – заорала Катька. – Понимаешь ты или нет, через два часа мы должны выехать из Москвы! Ты вообще сделал что-нибудь или нет, черт, дьявол, или сидел тут в прострации, переживая приступ второго рождения?! Где чемодан?!</p><p class="p1">– Вот, – он показал раскрытый чемодан, из пасти которого в полном беспорядке торчали Подушины колготки и свитерки.</p><p class="p1">– Ладно, собирай все, что нужно тебе. Много не бери, у нас там мало места.</p><p class="p1">– Ты можешь мне наконец сказать, куда мы летим?</p><p class="p1">– Мы летим в Штаты, «Офис» купил чартерный рейс. Сережа, все надо делать очень быстро! – От отчаяния она затопала на него ногами.</p><p class="p1">Он принялся вяло вытаскивать из шкафа свои вещи и складывать их в гигантский рюкзак, с которым хаживал в свои любимые походы.</p><p class="p1">– Пиджак тебе там не понадобится! – заорала Катька. – И костюм не понадобится! Бери теплые вещи, сапоги, носки, только для дороги, остальное купим!</p><p class="p1">Он так же вяло стал вешать пиджак обратно в шкаф, потом туда же костюм, костюм свалился, он подобрал и тщательно стал его цеплять обратно на вешалку… Катька перестала обращать на него внимание, пошвыряла в чемодан все Подушины вещи (Подуша цеплялась за ноги, прижималась, пищала: «Мама! Куда мы едем?» – «К бабушке». – «В Блянск?» – «Да, да. Брянская бабушка внизу, в машине». – «Мама! А мы далеко?» – «Близко, очень близко»).</p><p class="p1">– Документы взял?</p><p class="p1">– А какие нужны?</p><p class="p1">– Все! – рявкнула она. – Загранпаспорта, просто паспорта, медкарта на Польку! Там проверки на каждом шагу!</p><p class="p1">– В Штатах?</p><p class="p1">– У нас на МКАДе! Мой паспорт не ищи, он у меня. Все, только бутылку воды Польке возьми. И пошли быстрей. Да не из-под крана, Сережа! У нас что, кипяченой нет?</p><p class="p1">– Нет.</p><p class="p1">– Ну, набирай из-под крана, черт с тобой. Ты сам не мог об этом подумать?</p><p class="p1">– Я думал, купим…</p><p class="p1">– Где, что ты сейчас купишь?! Ты в магазины заходил сегодня?!</p><p class="p1">– Нет… У нее со вчерашнего дня еще остались йогурты, пудинг я вчера достал тоже…</p><p class="p1">– Клади к себе пудинг… а, черт, раздавится. Ладно. Все, выходи.</p><p class="p1">– Подожди. Надо же запереть.</p><p class="p1">– Ну, запирай.</p><p class="p1">На улице почему-то стало жарко. Это мне жарко, наверное, подумала Катька. Она тащила за собой кое-как одетую Подушу, вцепившуюся в ее правую руку, а левой волокла тяжелый чемодан на колесиках. Чемодан был старый и ехал с трудом – колесики заедали.</p><p class="p1">– Сюда, в машину.</p><p class="p1">– Народу-то почти нет никого, – сказал дядя Боря.</p><p class="p1">– Правильно, уезжают, – сказала Катька. – Давай, Сережа, садись. Бабушку ты знаешь, это дядя Боря, шофер, это Майнат, моя подруга, чеченка, а это мальчик из Брянска, он не говорит, мы его берем с собой по гуманитарному обмену. – Как, с чего она придумала этот гуманитарный обмен и какая гуманитарная организация могла бы в обреченную Москву прислать американского мальчика в обмен на русского дауна, Катька и сама бы не взялась объяснить, но муж проглотил эту информацию не поперхнувшись.</p><p class="p1">– Здравствуйте, Кира Борисовна, – сказал наш муж.</p><p class="p1">– Здрасьте пожалуйста, – буркнула бабушка. – И чего я, дура, поехала, сидела бы дома…</p><p class="p1">– Досиделась уже до немцев, в сорок первом году-то.</p><p class="p1">– А и что? И под немцами жили, а дом не бросали…</p><p class="p1">– Ну чего, на Тарасовку? – спросил дядя Боря.</p><p class="p1">– Погоди, дядя Боря, – сказала Катька. – Сначала на Свиблово.</p><p class="p1">– Это куда?</p><p class="p1">– Выезжайте на Ленинский, дальше я покажу.</p><p class="p1">Были у нее еще кое-какие дела – и кое-какие кандидатуры на освободившееся место, от которого Любовь Сергеевна так внезапно отказалась благодаря неведомому военному летчику. Вообще, военных летчиков развелось как грязи.</p></span></span>
