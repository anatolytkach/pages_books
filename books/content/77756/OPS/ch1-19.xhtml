<span><span id="id13"><div class="title2">
<p class="p">XII</p>
</div><p class="p1">На пятой или шестой по счету планете они проснулись поздним осенним утром в маленьком дачном доме, в котором остановились на ночлег. Это была обычная землеподобная планета, каких в окрестностях Альфы в самом деле оказалось много – больше, чем надо. Непонятно было, чем руководствовался Кракатук, создавая такое количество совершенно одинаковых планет, на которых их встречали совершенно одинаковые вещи. Всюду, не успевали они подлететь, проступали контуры разрушенных городов, красный туман и толпы беженцев. Везде было одно и то же – голод, холод, эвакуация, как будто толпы беженцев удирали именно от них.</p><p class="p1">Планеты все были одинаковые, но жители на них разные – иные бритые наголо, иные с остроугольными ушами, иные с золотыми зубами, а некоторые с песьими головами. Была планета туманная, как бы кисельная, в атмосфере которой плавали остатки каких-то давно погибших сущностей – зверей, людей, растений, добра и красоты. Была планета сухая, песчаная, на которой веял бесконечный ветер, разнося песок, и стояли среди пустыни одинокие качели. Была планета морская, лазурная, с одним маленьким островом посреди океана, на коре одной пальмы было вырезано «Здесь аномалия!», а все жители делись неизвестно куда.</p><p class="p1">На одних планетах было много чудес техники, на других последним достижением считался телефон, на третьих техника не развивалась вовсе, а ценилось только искусство. Одни аборигены верили в Бога, другие – в прогресс, а третьи – в огненного змея, обитавшего в земных недрах. Роднило все эти миры только то, что все они погибали. Безопасные миры, наверное, тоже существовали, но туда Игорю с Катькой хода не было.</p><p class="p1">Эта пятая или шестая планета еще не погибла, но уже собиралась. Они были приятно удивлены тем, что попали в относительно спокойный дачный поселок. Здесь можно было переночевать в пустом доме, который Игорь привычно открыл. Все дома на разных планетах открывались одним ключом, и из всех домов их рано или поздно выгоняли – либо оставшиеся аборигены, либо вновь прибывшие захватчики. Катька успела привыкнуть к этому. Она знала, что, пока они вместе, их будут выгонять отовсюду, а как жить теперь без Игоря, она не представляла. Он умел чинить лейку, открывать дома, договариваться с вещами, рассказывать сказки, читать стихи. Стихов он знал великое множество.</p><p class="p1">В бумажном мешке на террасе нашлись дрова, Игорь заварил чаю и нашел в буфете банку засахарившегося варенья. Они протопили печку, и дом ожил. Катька так устала от бесконечных странствий, что почти сразу заснула, но почти сразу же и проснулась. Было холодно, и что-то странное незримо ползло вдоль стен, словно менялся мир за пределами их утлого прибежища.</p><p class="p1">– Игорь, ты хорошо запер лейку?</p><p class="p1">– Да, она в сарае.</p><p class="p1">– Ну ладно. Только не спи. Поговори со мной, а то я чего-то боюсь.</p><p class="p1">– Еще бы не бояться. Ты же не спишь совсем, вот тебя и пробивает.</p><p class="p1">– Да, не могу. Тебе самому разве не страшно?</p><p class="p1">– Пришли и сказали – дитя, мне страшно, – прошептал он. – Взяла я лампу, дитя, мне страшно, взяла я лампу и пошла к нему. У первой двери, дитя, мне страшно, у первой двери пламя задрожало. У второй двери, дитя, мне страшно, у второй двери пламя заговорило. У третьей двери, дитя, мне страшно, у третьей двери пламя умерло. А если он возвратится – что мне ему сказать? Скажи, что я и до смерти его продолжала ждать.</p><p class="p1">– Ну вот, – сказала Катька. – Теперь не страшно. Я когда-то боялась этих стихов, а теперь они наш пароль. Удивительно, сколько всего может произойти за одну ночь. Это сколько же мы протрепались?</p><p class="p1">– Часа три. Видишь, уже светает. Это называется теория относительности.</p><p class="p1">– А… да. Ну, давай хоть часика три поспим. А утром поедем, ладно?</p><p class="p1">– Куда?</p><p class="p1">– Куда-нибудь.</p><p class="p1">Они заснули и спали долго, почти до полудня, и спали бы дольше, если бы Игорь, научившийся реагировать на малейшее постороннее присутствие, не вскочил с кровати и не бросился к окну.</p><p class="p1">По участку ходил чужой человек.</p><p class="p1">Он был невысок ростом, смугл, сутул и готов к дальней дороге. За плечами у него был рюкзак, а на ногах болотные сапоги. Он осматривался, принюхивался и наконец пошел к дому. Заглянул в окно. Игорь встретил его взгляд – глаза воспаленные, но спокойные, хозяйские. Он смотрел на Игоря как владелец этого дома и не отводил глаз.</p><p class="p1">Игорь быстро натянул джинсы, прыгнул в сапоги, взял на террасе полезную вещь в брезентовом чехле, снял чехол и проверил готовность вещи к использованию. Вещь была готова. Игорь вышел на крыльцо.</p><p class="p1">– Кого ищем? – спросил он, переходя для уверенности на милицейское первое лицо, множественное число.</p><p class="p1">– Да так, смотрим, – неопределенно, без тени смущения ответил гость. У него был легкий, почти незаметный восточный акцент. – Я гляжу, занято, ну, значит, занято. Мне что, живите пока, я не против.</p><p class="p1">– Вот я тоже думаю, – сказал Игорь. – Спасибо типа, что разрешил. Это мой дом, вообще-то.</p><p class="p1">– А… Ну, раз твой, так и правильно. Извини.</p><p class="p1">– А чего случилось-то? – спросил Игорь.</p><p class="p1">– Беженцы, – просто ответил восточный. – Из Москвы уходим. На соседнем участке есть кто, не знаешь, нет?</p><p class="p1">– Справа есть, – сказал Игорь. – К нему лучше не попадай, честно тебя предупреждаю.</p><p class="p1">– Да ты тоже, вижу, подготовился, – улыбнулся гость.</p><p class="p1">Что-то в нем было не так; Игорь не мог еще внятно этого обозначить. Хорошо, что Катька спит. В общем, видно было, что до поры гость будет вежлив и осторожен, но почувствует в хозяине малейшую слабину – и вцепится так, что не оторвешь. С этим гостем что-то сделали. До поры до времени его терпели, он жил в столице, приноровился, работал на самых черных и дешевых работах, но за это исподволь прибирал город к рукам, обживал, делал его своим; его караулили в подворотнях, мутузили в электричках, но он выживал, отказываясь воевать в открытую, хотя гостей в городе уже хватало и можно было перейти в наступление. Теперь его начали громить по-настоящему, и он, сохраняя внешнюю покорность, уходил из города на ближние подступы, чтобы здесь, на пустых осенних дачах, собраться с силами и сосредоточиться; больше ему пока некуда было деваться. Он мог, конечно, уехать к себе на родину, но родина была далеко, и делать там больше нечего – она и так уже его. А здесь еще можно было поспорить, потому что в открытой войне у гостя было больше шансов. Он был хуже вооружен, но больше умел. Он умел выжидать, караулить, обходиться немногим. У него все было хорошо с реакцией и памятью. Город его выгонял, но городу не так-то много и оставалось. Он и так уже полупарализован – из него даже на электричке не выберешься, а внутри даже маршрутки ходить перестали. Если немного переждать, можно будет войти туда уже не гостями.</p><p class="p1">Игорь быстро обернулся. Он подумал вдруг, что, пока его отвлекает первый гость, сзади может подкрасться второй. Но сзади никого не было.</p><p class="p1">– Ты один, что ли? – спросил Игорь.</p><p class="p1">– Зачем один, много, – улыбнулся гость. Самое неприятное, что он улыбался ему как союзнику. Они словно были в заговоре, хотя Игорь не собирался с ним ни о чем договариваться. Впрочем, палачу всегда кажется, что он с жертвой в заговоре. Так ему проще действовать. – Ты опусти штуку-то эту. Я же сказал, раз твое, то твое. У нас так, честно: мы чужое не берем…</p><p class="p1">– Ты иди давай, честный. Ты как на участок-то залез?</p><p class="p1">– А не заперто было, – сделал гость удивленное лицо. – Вон открыто…</p><p class="p1">– Ладно, не свисти. Кругом марш давай отсюда, – скомандовал Игорь.</p><p class="p1">– Зачем так говоришь, – улыбнулся гость. Он явно тянул время.</p><p class="p1">– Ты смотри, – сказал Игорь пересохшими губами, – эта вещь стреляет.</p><p class="p1">– Ай, ай! – сказал восточный и поднял руки, не переставая улыбаться. – Ай, смотри, страшный какой! – но отступил к забору.</p><p class="p1">– Иди, иди давай.</p><p class="p1">– Да опусти пукалку, я же по-доброму…</p><p class="p1">– Давай, давай. В Москве с вами уже поговорили по-доброму, теперь и мы можем.</p><p class="p1">– Да тут не Москва, – спокойно сказал гость. Он вышел за калитку и, все еще оглядываясь на Игоря, пошел к следующему участку.</p><p class="p1">– И чтобы на этой улице ваших не было! – крикнул Игорь вслед.</p><p class="p1">– Тыргун балаклар! – крикнул гость.</p><p class="p1">Игорь не понял, что это значило, но по интонации догадался, что его послали подальше.</p><p class="p1">Игорь сел на скамейку под облетевшей березой и перевел дух. День был тревожный – серое небо, мутное солнце, холод. И дяди Коли, как назло, не было, черт его понес в Чехов за продуктами. Даже обсудить не с кем. Не надо было москвичам их выгонять. Ясно же, что далеко они не уйдут. В городе им сейчас, конечно, делать нечего – уйдут в подполье, но тогда ведь настоящая война. Неужели они не понимают, как мы на самом деле слабы? Да понимают, конечно, именно это и пугало его в госте. Он знает, и я знаю, что он знает.</p><p class="p1">На крыльцо вышла заспанная Катька.</p><p class="p1">– Ты тут? Я думала, ты сбежал.</p><p class="p1">– Ну что ты. Никогда в жизни.</p><p class="p1">– Ой. А это у тебя зачем?</p><p class="p1">– Ну… так. Сижу, тебя охраняю.</p><p class="p1">– Меня что, кто-нибудь может украсть?</p><p class="p1">– Ну а как же. Очередь стоит на мое сокровище.</p><p class="p1">Она, как всегда, все поняла и присела рядом.</p><p class="p1">– Слушай, ты чего-то психуешь. Случилось что-нибудь?</p><p class="p1">– Нет, ничего. Что мы намерены делать?</p><p class="p1">– Мы, я так полагаю, намерены ехать в Москву.</p><p class="p1">– Ты своим звонила?</p><p class="p1">– Из дома еле слышно. Он тоже только что проснулся, новостей пока не было, говорит – всё без перемен. Подуша только плачет.</p><p class="p1">Она зевнула.</p><p class="p1">– Ой, какая я разбитая вся…</p><p class="p1">– Немудрено. Бурная ночь. Шутка ли, пять планет.</p><p class="p1">– Но согласись, что со зверями…</p><p class="p1">– Да, отлично. Я прямо за тебя порадовался. И вообще вдвоем сочинять гораздо легче. Что-то в этом есть – в этой идее, что нашим миром управляет не один Бог, а двое и у них есть третий, маленький. Этот третий подбрасывает иногда прелестные ляпы.</p><p class="p1">– Ну да. Это, знаешь, как мыльную оперу пишут два человека, один любит героя, а другой не любит. В одной серии у него выигрыш в лотерею, а в другой, не знаю, с работы выгнали и жена ушла. После чего в следующей новая работа и новая жена. А он, бедный, понятия не имеет, почему у него жизнь такая полосатая. А это просто авторов двое.</p><p class="p1">– Знаешь, что мне безумно понравилось? Вот эта твоя идея насчет Лынгуна. Ты отлично его изобрела.</p><p class="p1">– А мне понравилось – ты помнишь, по мне даже мурашки пошли, – когда тетка Колпашева прилетела. Это был шикарный ход, я и ждала чего-то подобного.</p><p class="p1">– Ну, это ты и сама бы могла. Ясно, что, если Танька про нее рассказала, персонаж не может повиснуть просто так. А саму Таньку я хотел сначала туда отправить, но не смог бы ее замотивировать. У тебя чудесно было про военного летчика, весь этот диалог с ювенес дум сумус…</p><p class="p1">– Спасибо, магистр.</p><p class="p1">Он посмотрел на нее уважительно и недоверчиво – все-таки она понимала даже слишком много. Катька знала этот взгляд, иногда на нее так смотрели – когда она, от которой никак не ожидали хватания звезд с неба, придумывала особенно удобное художественное решение или когда вставляла вдруг в чужой разговор свои пять копеек. Что поделаешь, не дал Бог особенно эффектной внешности и врожденного изящества манер, но это и срабатывало – возникал контраст.</p><p class="p1">– Не называй меня, пожалуйста, магистром.</p><p class="p1">– Почему? Типа тот страждет высшей мукой, кто радостные помнит времена?</p><p class="p1">– Да ну, глупости. Это вообще очень глупая строчка. Как раз тот, кому есть что вспомнить, гораздо счастливее. У него жизнь хоть как-то оправдана.</p><p class="p1">– А почему тогда?</p><p class="p1">– Потому что это все была ерунда, и я не люблю, когда мне про нее напоминают.</p><p class="p1">– Не такая уж и ерунда. Гораздо лучше, чем водку пьянствовать.</p><p class="p1">– Не вижу разницы.</p><p class="p1">– А я вижу. И потом, если я правильно понимаю, ты же продолжаешь играть?</p><p class="p1">– Как посмотреть. По крайней мере, деревянным мечом уже не машу.</p><p class="p1">– О да. – Катька кивнула на ружье. – У нас тут реквизит гораздо более серьезный.</p><p class="p1">– Это как раз не игрушки, к сожалению. Портит всю картину. Честно говоря, я надеялся, что ты так и не увидишь эту прелесть. Пришел дурак и поломал сценарий.</p><p class="p1">– Ничего-ничего. Я тоже не совсем дитя. Мне только было интересно, оно настоящее или ты и тут подготовился.</p><p class="p1">– Нет, оно как раз настоящее. Кать, я боюсь, ты сама несколько заигралась. Ты не очень понимаешь, что будет в Москве. Сейчас лучше иметь такую штуку.</p><p class="p1">– Что будет в Москве, – сказала Катька, нервно зевнув, – я очень хорошо понимала с того момента, как туда переехала. Удивительно наглядный город, город крепкий.</p><p class="p1">– Ну а чего тогда?</p><p class="p1">– А того, что любой проткнет тебя прежде, чем ты успеешь достать свой стартер. А уж если увидит его у тебя, то вообще очень разозлится.</p><p class="p1">– Не факт, не факт. Дед меня кое-чему научил. У меня приличная реакция, кстати.</p><p class="p1">– Это да, это я заметила. Гиперприличная. Мне знаешь когда особенно понравилось? – Она улыбнулась, и он снова ужасно ее захотел. Правда, теперь к этому желанию примешивалась странная горечь, почти сознание ее недоступности. Что-то изменилось за те три часа, которые они все-таки проспали, что-то кончилось. Он тряхнул головой, отгоняя наваждение: вечно его после недосыпа пробивало на мнительность. – Самое лучшее было с ментом. Вот тогда я тобой просто восхитилась.</p><p class="p1">– А, – он махнул рукой. – Первый класс.</p><p class="p1">– Нет, нет. Ты, Моцарт, бог, и сам того не знаешь. Если действительно кто-нибудь там есть – какой-нибудь Кракатук, – первое, что я ему скажу, будет именно эта вот фраза. Ты, Моцарт, бог. Такая легкость, столько наизобретал. Я ужасно люблю вообще легкость. Ты заметил? Столько тяжести кругом, натужные, угрюмые люди. Все с таким видом ходят, как будто хотят пукнуть головой. А в тебе с самого начала, знаешь, меня так это купило! Такое, действительно, отсутствие гравитации! Будто не у нас вырос человек.</p><p class="p1">– Наоборот, очень у нас. Просто привыкаешь обтанцовывать какие-то вещи. Я и играть начал из-за этого. А что еще делать, скажи на милость? Кто-то непременно скажет, что в такое время не до игрушек. А я тебе скажу, что только до игрушек. Что лучше-то – сидеть и с серьезной мордой ждать, пока на тебя небо упадет? Тут хоть как-то можно реванш взять… Вот с ментом, например. Зло взяло, понимаешь? У них тут черт-те что делается, завтра, может, вообще война начнется, самая настоящая, как в сорок первом, от которого они до сих пор во всем танцуют… Но ощущение такое, что им эта война нужна только как легальный повод к самоистреблению. Вот что меня больше всего достает. Они же ничего другого не делают. Враг – это так, дело десятое. Врага побеждают пространством. Главное – можно наконец под грамотным предлогом побольше помучить своих. Меня там, тебя. Ну что мы были этому менту? Он же отлично видит, что мы не террористы! Нет, он подходит, проверяет, перепроверяет… Что ты думаешь, ради сотни? Он действительно ради сотни жопу от стула не оторвет. Ему приятен процесс. Надо было как-то срочно это заесть. Ну, я и начал молотить что ни попадя…</p><p class="p1">– Нет, почему? Ты вполне логично все закруглил. Я нарочно подкапывалась – типа, а почему нельзя по телефону? А как он тебя нашел? Ты великолепно вылезал. И с удостоверением своим ты очень хорошо придумал.</p><p class="p1">– А, это… с лейкой…</p><p class="p1">– Ага. С голограммой. На компе, да?</p><p class="p1">– Да, это несложно. В седьмом мейкере.</p><p class="p1">– Молодец. Вообще славно оттянулись. Навели друг другу хвостоморок, как волк и лиса.</p><p class="p1">– Туфтовая книга, – сказал Игорь. – Грязная и скучная.</p><p class="p1">– Туфтовая не туфтовая, а что-то такое он чувствует. Если ты такой умный, почему сам не пишешь?</p><p class="p1">– Да вот еще, была охота.</p><p class="p1">– А вообще правильно. В жизни все это проделывать гораздо интереснее.</p><p class="p1">– Стоп. – Он встал и глянул на нее с улыбкой. – Ты хочешь сказать, что ни секунды ничему не верила?</p><p class="p1">Она тоже встала и поцеловала его в колючий подбородок.</p><p class="p1">– Нет. Так сказать нельзя. Не будем, конечно, списывать это только на твои исключительные способности… сам видишь, момент такой, что всему поверишь… Когда у тебя на глазах творится столько недостоверных вещей – тут и в инопланетянина поверишь, и в черта, и в дьявола. Заметим кстати, что всплеск народных суеверий всегда приходился на переломные времена. В семнадцатом году, читала я где-то, почти все население России было уверено, что объявился антихрист. По сравнению с этим инопланетянин еще вполне невинный вариант. Так что некоторым краем сознания…</p><p class="p1">– И тебе нравилось?</p><p class="p1">– Как сказать. Наверное. Прикидывала же я какие-то варианты – на случай, если тут уж совсем припрет! Наверное, мне не очень хотелось отбирать… но иначе-то никак. А если хочешь, я и сейчас не очень уверена. Один шанс я тебе оставляю.</p><p class="p1">– Спасибо.</p><p class="p1">– Но это же вроде загробной жизни! Умом я прекрасно понимаю, что ее нет. Совершенно не надо быть атеистом, каким-нибудь упертым, с принципами, чтобы понимать насчет загробной жизни. Я по утрам особенно четко вижу. Ничего нет, совсем. Очень может быть, что и Бога никакого нет, прости господи, – Катька перекрестилась. – Это знаешь на что похоже? Вот как будто есть дверь, а за ней стена. И ты это видишь совершенно четко. Буратино проткнул холст, он легко протыкается, – не принимать же это все за действительность, – она обвела рукой заросший сад с сухими бодылками дурмана и дудника. – А за холстом настоящая действительность, которую лучше не принимать в расчет вообще. Глад, мор и скрежет зубовный. Буратино об нее нос сломает. Стена в чистом виде. Но самое продвинутое Буратино, – она опять хихикнула, и Игорь опять подумал, что лучше ее никого нет и никогда не будет, – самое умное, самое крепконосое Буратино каким-то самым-самым краем сознания догадывается, что эта стена так себе. Что ее по крайней мере кто-то построил. И по крайней мере сама я откуда-то попала внутрь. Вот тут начинается самое интересное, поверх обычных споров «есть Бог – нет Бога». Вслед за этим детским неверием – все ясно, ничего нет, – что-то такое есть, я понятно излагаю?</p><p class="p1">– Да ты вообще хорошо излагаешь. Очень грамотный рассказ о первичном религиозном опыте.</p><p class="p1">– Магистр, не будьте высокомерны.</p><p class="p1">– Я не высокомерен, Кать, просто чушь это все. Женская слабость. Видеть все это и предполагать, что оно срежиссировано свыше, – это все равно что видеть мента на станции Столбовая и предполагать, что он выполняет задание с Альфы Козерога. Мы можем сами для себя придумывать иногда такие штуки. Чем я, собственно, и занимаюсь. Но все это не избавляет меня от необходимости иметь стартер такого типа. Если бы Бог был, я бы не играл.</p><p class="p1">– А. Это мы, значит, таким образом заполняем вакансию.</p><p class="p1">– Ну а что еще тут делать?</p><p class="p1">– И тем не менее на полпроцента я и сейчас еще допускаю, что существует Альфа Козерога.</p><p class="p1">– Альфа Козерога существует безусловно, – сказал Игорь.</p><p class="p1">– Ладно, я прогуляюсь до сортира.</p><p class="p1">На обратном пути она заметила разбитое окно кухни.</p><p class="p1">– Это чего ты вчера расхулиганился? Просто для убедительности?</p><p class="p1">– Да нет, – сказал он. – У меня замок не открылся. Калитка еще кое-как, и дом кое-как, а там совсем приржавело.</p><p class="p1">– Глупый. Ты что, не мог руку обмотать?</p><p class="p1">– Я и обмотал, когда бил. А когда стекла вынимал, слегка разрезался.</p><p class="p1">– Оно там и лежало?</p><p class="p1">– Ага. Под диваном.</p><p class="p1">– А раньше перевезти его в Москву ты не мог?</p><p class="p1">– На фиг оно мне было нужно. Дед охотился только здесь. Тут до заказника двадцать километров.</p><p class="p1">– Да ведь зимой любой бомж украдет!</p><p class="p1">– Ну и пусть бы украл. Я как-то не предполагал, что мне будет от него толк в жизни. Терпеть не могу всех этих дел с оружием, с милицией, с регистрацией… Где бы я его в Москве держал?</p><p class="p1">– Ты действительно думаешь, что эта штука сейчас тебе поможет?</p><p class="p1">– А как же, – сказал Игорь, и Катька заметила, что выражение его лица медленно меняется. Он сосредоточенно всматривался во что-то позади нее. – Прямо сейчас и поможет.</p><p class="p1">Она обернулась. С тыла участок был отделен от соседнего только неглубоким кюветом, и через этот кювет перепрыгнул невысокого роста крепкий мужичок в кепарике.</p><p class="p1">– Здорово, хозяева, – сказал он.</p><p class="p1">– А вот и второй, – сквозь зубы сказал Игорь. – Только не восточный. Катька, спокойно.</p><p class="p1">– Ты бы ружьишко опустил, – сказал мужичок. Он казался очень спокойным и хозяйственным.</p><p class="p1">– Да я так, уточек постреливаю, – сказал Игорь.</p><p class="p1">– А, уточки, – сказал мужик одобрительно. – Дело хорошее.</p><p class="p1">– Лети отсюда, уточка, – сказала Катька.</p><p class="p1">– А вы что, живете?</p><p class="p1">– Живем, живем.</p><p class="p1">– У соседей есть кто?</p><p class="p1">– Уже есть, – сказал Игорь.</p><p class="p1">– Ага. Ну, дело хорошее, – неопределенно повторил мужичок. – Вы это. Участок не продаете?</p><p class="p1">– Вчера уже один торговал, – сказал Игорь. – Не продаем, самим надо.</p><p class="p1">– Ага, ага. А то в Москве, знаете… Вы с Москвы сами-то?</p><p class="p1">– Да нет, местные.</p><p class="p1">– Ага, – обрадовался мужичок. – Шутим, да? Шутка – дело хорошее… Я думаю, пошумят и перестанут. А?</p><p class="p1">– А что, уже шумят? – спросила Катька.</p><p class="p1">– Да не то чтобы, – неопределенно ответил крепыш. – Но сейчас, наверное, лучше того… а? Ну, недалеко чтоб… но на время. А то черт его знает, вдруг правда.</p><p class="p1">– Что – правда?</p><p class="p1">– Ну, что он пишет-то. Что седьмого Москву взорвет.</p><p class="p1">– А сегодня какое? – рассеянно спросила Катька.</p><p class="p1">– Второе с утра было, – дружелюбно сказал мужичок.</p><p class="p1">– А, ну точно, мы же поехали первого… И что, все бегут?</p><p class="p1">– Да еще со вчера вроде бегут. У меня сосед в Сибирь хотел лететь, так уже и на самолет не попадешь. А у меня нигде никого, я сам в Митине живу. Мне не к кому. Думаю, где-нибудь пересижу, а там домой. К зиме-то. Мне главное, чтоб седьмое пересидеть. Потому что они ничего не сделают, конечно. Он если пишет, то, наверно, так и будет. А?</p><p class="p1">– Очень может быть, – сказал Игорь. – А чего тебя в Тарасовку понесло? Ближе ничего не было?</p><p class="p1">– Да занято все, ближе-то, – признался мужичок. – Я так подумал: подальше – поспокойней, – он сделал ударение на последнем слоге. – Я на машине, пока выпускают. А то говорят, скоро вон и машины перестанут выпускать с Москвы. Говорят, без паники, без паники. А чего без паники, все пешком пойдут. Кому ждать охота, правильно?</p><p class="p1">– А кавказцев что, не выселили? – спросила Катька.</p><p class="p1">– Выселили, а что толку. Всех не выселишь, правильно? Они же домой не поедут, чего им дома делать? Их там побили хорошо, ну и они наших побили. В Царицыне драка была, слыхали? Они собрались и скинам навешали.</p><p class="p1">– Ага, – сказал Игорь. – Ну ладно. Ты иди, поищи чего. А мы тут побудем.</p><p class="p1">– Ну да, – сказал он. – Не знаете, где тут хозяев нету?</p><p class="p1">– Походи, поищи. Может, найдешь. Только не свинячь сильно.</p><p class="p1">– Ладно, – сказал мужичок и ушел через соседний участок.</p><p class="p1">– Черт-те что, – выдохнул Игорь, снова усаживаясь на скамейку. – Упарился я с ним. И кавказцы бегут, и русские бегут. Чего делается-то?</p><p class="p1">– Да нормально, – сказала Катька. – Когда человек не может ничего изменить, он естественным образом бежит. Поскольку сделать ничего нельзя, скоро все забегают. Представляешь – кочевая страна. В городах страшно, в селах некомфортно. Так и ходят. Единственный оседлый народ, я думаю, будут цыгане, нет?</p><p class="p1">– И что будет?</p><p class="p1">– А не знаю. Война, наверное. Когда люди забывают простые вещи – всегда война. Видишь, как они все про сорок первый год вспоминают. Разболтался народ, ты не находишь? Начинают мужьям изменять, журнал «Офис» выпускать. Надо как-то напомнить, ху из ху.</p><p class="p1">– Что, другого способа нет?</p><p class="p1">– Нет, солнышко. Такой народ, земляне. Извини, пожалуйста.</p><p class="p1">– И что ты думаешь делать дальше?</p><p class="p1">– А ты?</p><p class="p1">– Если честно, – он помолчал и поковырял бересту, – если честно, то единственный правильный вариант был бы забрать сюда твоего мужа и дочь. И вместе пересиживать седьмое.</p><p class="p1">– Отметается. Ты у меня идеалист, а дела пошли серьезные.</p><p class="p1">– Почему нет?</p><p class="p1">– Потому. Вариант не принимается.</p><p class="p1">– Тогда… – Ему на миг показалось, что он понял ее намек. – Тогда мы пересиживаем тут вдвоем, потому что это лучшее, что мы можем сейчас сделать. И если ты хочешь уйти, то лучше тебе, по-моему, не возвращаться.</p><p class="p1">Катька смотрела на него с нежной насмешкой, и он не узнавал Катьку. Она была старше, чем вчера, – и не на какую-то ночь, а на долгое путешествие, на несколько месяцев и пять сожженных планет.</p><p class="p1">– Вариант не принимается, – сказала она ласково и снисходительно.</p><p class="p1">– И какой вариант принимается? Мы берем стартер и возвращаемся в Москву, откуда все бегут?</p><p class="p1">– Не совсем, – сказала она загадочно.</p><p class="p1">– А как?</p><p class="p1">– А пожрать у нас нет ничего?</p><p class="p1">– Бутерброды, – сказал он. – Но все-таки?</p><p class="p1">Он всегда лидировал в этой игре, и ему непривычна была роль ведомого. Она что-то решила, он понятия не имел – что именно, и угадать впервые не мог.</p><p class="p1">– Чудесно, – сказала Катька, когда он принес три бутерброда, двухслойные, с сыром и докторской колбасой. – Очень ты заботлив, и очень меня это умиляет.</p><p class="p1">– Ты, мать, будто прощаешься.</p><p class="p1">– Не без того.</p><p class="p1">Он насторожился.</p><p class="p1">– В чем дело?</p><p class="p1">– Дело в том, – сказала Катька, с удовольствием жуя, – что у второй двери пламя заговорило, а у третьей умерло. За третьей дверью было знаешь что? Ничего особенного. Серенький такой рассвет, второе ноября, обычное утро. Солнышко за тучами ползает… двумя клопами…</p><p class="p1">– Что еще за глупости?</p><p class="p1">– Ничего не глупости, это очень хорошие альфовские стихи. Я их буду помнить вечно.</p><p class="p1">– Я тебя чем-то обидел?</p><p class="p1">– Дурак, – нежно сказала Катька. – Круглый дурак. Бывает круглый, а еще бывает длинный. Ты длинный, этот тип отличается от круглого приятной разомкнутостью. Круглый сосредоточен на себе, замкнут, а длинный устремлен в будущее.</p><p class="p1">– Не понял, – сказал Игорь.</p><p class="p1">– Я вижу, что не понял.</p><p class="p1">– Ну ладно, хватит этих загадок, Кать. Я ничем не заслужил, по-моему.</p><p class="p1">– Да ничем, конечно, – сказала она горестно, беспомощно и без тени прежней снисходительности. – Оба мы с тобой заслужили. Мне, думаешь, легко?</p><p class="p1">– А что случилось-то?</p><p class="p1">– Случилось то, что я возвращаюсь в Москву и начинаю жить нормальной жизнью с нашим мужем и моей дочерью. Спасибо, по сожженным планетам я с тобой уже полетала, уверяю тебя, что дальше их будет только больше. Я устала эмигрировать из огня да в полымя, Игорь. Можешь сформулировать, что я отказываюсь быть собой, если тебе так больше нравится. Но я так устроена, Игорь: ты эвакуатор, а я детонатор. Если я и дальше буду собой, то есть с тобой, я так и буду кружить по выжженным полям.</p><p class="p1">Некоторое время эвакуатор молчал.</p><p class="p1">– Ну да, – сказал он. – Я так и предполагал.</p><p class="p1">– Я же говорю, ты очень догадлив. Мой самый любимый, самый догадливый длинный дурак.</p><p class="p1">– Это не догадливость, это опыт. Я многих уже пытался эвакуировать, и никогда не получалось. Правда, никто не залетал со мной так далеко.</p><p class="p1">– Спасибо, мне правда очень приятно. К вопросу о залететь: я совершенно не убеждена, что этой ночью мы были достаточно осторожны.</p><p class="p1">– Были, были.</p><p class="p1">– Если не были, тоже хорошо. Честно. Я буду очень рада. Наверное, не надо было тебе говорить, но меня тут недавно трахнул наш муж, в кои-то веки, так что алиби у меня стопроцентное.</p><p class="p1">Он по-прежнему ее не узнавал. Это говорила не она. Та была ребенком, хотя и умным, книжным, и у нее даже в самые тоскливые минуты не было таких интонаций.</p><p class="p1">– А что, – продолжала она, – никто не хотел эвакуироваться?</p><p class="p1">– Почему, хотели. Но долетали, как правило, только до тарелки. Дальше они начинали чувствовать себя не в своей тарелке.</p><p class="p1">– И что, со всеми была та же самая легенда?</p><p class="p1">– Ну что ты так плохо обо мне думаешь, в самом деле. Эвакуатор был только в этот раз. Обстановка располагала. До этого были всякие другие игрушки. Но с ними играть было неинтересно – они плохие партнеры. А ты сразу все ловишь, с тобой было замечательно.</p><p class="p1">– Я даже думаю, слишком замечательно. Этой ночью получилось так убедительно, что никакого опыта не надо.</p><p class="p1">– Нет, почему. Ты замечательно вчера реагировала, с лейкой.</p><p class="p1">– Кстати, объясни мне на милость: почему она не отрывается от земли?</p><p class="p1">Он засмеялся.</p><p class="p1">– Потому что она прибита.</p><p class="p1">– То есть как? Лейку же… лейку нельзя прибить. Как ты гвоздь туда засунешь?</p><p class="p1">– А несложно, – сказал он. – Я с однокурсником на ящик водки поспорил, что прибью лейку к полу. Я же сюда на дачу всех друзей возил, огород копать. Сама понимаешь, никакого удовольствия. В любом месте веселее вместе. Ну, напились как-то, устраивали всякие милые розыгрыши. Тапки одного друга прибили к полу, пока он дрых. Он очень славно бухнулся, когда встал. Это же классический способ. Ну, а потом как-то подумали – что еще можно прибить… Лейку же не прибьешь, наверное. Отверстие узкое, гвоздь не засунешь. А эффект очень смешной. В общем, я придумал. Там несложно. У нее верхняя крышка приварена. Снимаешь крышку, прибиваешь лейку, надеваешь крышку, чтобы незаметно. У меня руки неплохие, – добавил он хвастливо.</p><p class="p1">– Это я заметила.</p><p class="p1">– Спасибо на добром слове.</p><p class="p1">– Она что, так и стоит прибитая с тех пор?</p><p class="p1">– Конечно. Чего поливать-то, участок и так весь заболотился. Дед, правда, меня чуть не убил. Это была его любимая лейка.</p><p class="p1">– Где он сейчас, дед-то?</p><p class="p1">– В маразме. С матерью живет. По ночам все какие-то яйца в лукошко складывает.</p><p class="p1">– Куда?</p><p class="p1">– В лукошко. Ходит по дому и собирает невидимые яйца. Зачем – не знаю. Еще своему отцу письма пишет, военному летчику. Милый папа, возьми меня полетать.</p><p class="p1">– А, – сказала Катька. – Это в честь которого тебя назвали?</p><p class="p1">– Ну. Я не возражал, кстати, когда ты письма посмотрела. Из них можно почерпнуть много забавного, но легенде в целом они не противоречат.</p><p class="p1">– Конечно. Там зафиксировано только твое рождение от неизвестного отца.</p><p class="p1">– Да почему от неизвестного. Прекрасно известного. Он появляется периодически, только мать его видеть не хочет. У нее давно другой муж, с которым у меня никаких отношений. Он меня терпеть не может, ну и я его взаимно.</p><p class="p1">– А, – повторила Катька. – Действительно, прямо ты как инопланетянин. Один, без всех и с лейкой.</p><p class="p1">– Еще вот с тобой… был.</p><p class="p1">– Точно, – сказала она. – Был. Игорь, я могу тебе наговорить массу всяких слов, но делать это, по-моему, совершенно необязательно. Ты сам говорил, что не надо обрастать людьми.</p><p class="p1">– Мало ли что я говорил.</p><p class="p1">– Много, но это ты говорил по делу.</p><p class="p1">– А мне кажется, бросать меня в такое время вообще не по-человечески.</p><p class="p1">– Да почему? Ты свое дело сделал, меня эвакуировал. Я жила в какой-то кисельной жизни, туманной. Как на кисельной планете. А теперь я все поняла, спасибо тебе.</p><p class="p1">– И что ты поняла?</p><p class="p1">– Ничего особенного. Простые вещи. Я тем и отличаюсь, что мне для этого необязательно проходить через войну.</p><p class="p1">– Знал бы – не эвакуировал бы, – сказал он.</p><p class="p1">– Эвакуировал бы, – твердо ответила Катька. – У нас вариантов не было. В том-то вся и грусть, ты не находишь? Когда на тебя падает любовь, ты ничего не можешь сделать, раз – и все. А потом она что-то такое с тобой делает, после чего ты уже не можешь с ней жить. Как в ракете. Выводит тебя первая ступень на орбиту, а потом отваливается.</p><p class="p1">– Очень печально.</p><p class="p1">– Конечно, печально. Бывают такие дурацкие ракеты – так и продолжают летать с первой ступенью. Но они плохо летают, и вообще это все никуда не годится. Ты из меня сделал то, чем я должна быть с самого начала, но до сих пор у меня не было сил этим стать. А теперь получилось, и мне никто больше не нужен. Один чистый долг.</p><p class="p1">– Вообще говоря, я догадывался. Когда ты про мальчика…</p><p class="p1">– А, – усмехнулась Катька. – Это да, это ничего. Я специально тебя перебила. Ты же хотел, чтобы мы сразу приехали в Тарасовку. А я решила заехать в Свиблово. Типа записку почитать. С мальчиком хорошо, правда? Я его навещу обязательно.</p><p class="p1">– Вместе навестим.</p><p class="p1">– Вместе не навестим, – сказала Катька. – Игорь, будь милосерден. Нельзя отрываться по частям.</p><p class="p1">– Очень ты сейчас милосердна, – сказал он, отвернувшись.</p><p class="p1">– Очень. Вырастешь – поймешь. У меня есть ребенок, ты помнишь?</p><p class="p1">– Идиот я, что сюда тебя потащил, вот что я помню. Если бы мы не поехали сюда, ты бы и дальше была со мной.</p><p class="p1">– Не знаю. Скорей всего, не была бы. Я вообще ничего не знаю. Я, может, завтра тебе позвоню, в ноги брошусь и скажу, чтобы ты все простил. Я понятия не имею, выдержу ли все это. Я просто знаю, что рано или поздно этим кончится. Ну, так лучше раньше.</p><p class="p1">– Слушай, – он помолчал и вдруг улыбнулся. – А хочешь, через год в том кафе? Где утопленники?</p><p class="p1">– Интересно, – сказала она.</p><p class="p1">– Это ведь и будет как бы после смерти!</p><p class="p1">– Ну, – вздохнула она, – разве что после смерти. Живая я туда больше никогда не пойду. Я иногда всерьез думаю, что все из-за нас.</p><p class="p1">– Ага. Конечно. А как только мы разойдемся и вместе со всеми начнем довольствоваться полужизнью, так все сразу и вернется в колею.</p><p class="p1">Он продолжал все понимать; о свинство, свинство, милостивые государи! Если бы хоть сейчас он облегчил расставание неверной нотой, не дочитал ее мысль, сказал оскорбительное не то! Но он все понимал и чувствовал ее жалкую, капитулянтскую стратегию – трусливый, бабский отказ от настоящего ради всеобщей негласной конвенции суррогатов.</p><p class="p1">– По-моему, ты поехала крышей.</p><p class="p1">– Очень может быть.</p><p class="p1">– Точно поехала, – убежденно повторил он. – У нас, знаешь, на играх бывало иногда. У новичков. То истерика с человеком, то задвиг начинается. Девушка совершенно серьезно верит, что она фея Бирилюна. У нас даже инструктаж бывает для магистров – что делать, если кто заигрался. Видишь, как тебя повело. Погоди, у тебя завтра пройдет.</p><p class="p1">– Очень может быть. Я же говорю, никто не застрахован. Но если ты хочешь, чтобы все было наименее травматично, ты либо смени мобильник, либо пошли меня завтра подальше, если я по женской слабости тебе позвоню. Спасибо тебе, сердце души моей. Все было очень вкусно.</p><p class="p1">– Тьфу, какой пафос попер, – сказал он брезгливо.</p><p class="p1">– Ну, извини. Я никогда никого больше не буду так любить. Скажи, что я и до смерти его продолжала ждать. Но в моем случае это, видимо, нельзя. Начинаются проблемы.</p><p class="p1">Ровно при этих словах начались проблемы.</p><p class="p1">– Ага, – сказала Катька. – Бог троицу любит.</p><p class="p1">За дачным забором стоял солдатик и целился в них из автомата Калашникова модернизированного, калибр 7,62. Игорь положил винтовку, поднял руки и встал.</p><p class="p1">– Чего тебе, солдатик? – выговорил он хрипло.</p><p class="p1">– Автомат не нужен? – спросил солдатик.</p><p class="p1">– Зачем? – спросила Катька.</p><p class="p1">– Да это, – смущенно сказал солдатик и шмыгнул носом. – Ну, мы расходимся типа… Знаете, у вас же тут часть стоит… По домам типа… Так мне с оружием как бы не резон…</p><p class="p1">– Пригодится, – сказал Игорь. – Время такое…</p><p class="p1">– А как я его понесу? – сказал солдатик. – Первый мент тормознет. Хватит, он мне вообще надоел, автомат этот. Я щас в граждань переоденусь – и к себе, в Тамбов. Маманя там, батяня. Ну, берете? Хороший, чищеный. Я оружие содержал в образцовом порядке, – он хихикнул и опять шмыгнул носом.</p><p class="p1">– А чего расходитесь-то? – спросила Катька.</p><p class="p1">– Да ну, бардак. Офицерье разбежалось все, а нам чего подыхать? Слышали, говорят, Москву взорвут. У нас один водила вчера в город ездил, говорит, правительство эвакуировалось уже.</p><p class="p1">– Звездеж, – сказала Катька. – Мы вчера из Москвы.</p><p class="p1">– Взяли бы, – просительно сказал солдатик. – Хорошая вещь, кирпичную стену за двести мэ пробивает. За пять штук отдам, серьезно.</p><p class="p1">– Нет, солдатик, – сказал Игорь. – Ты походи, поспрашивай, тут сейчас желающих полно.</p><p class="p1">– Ага, – сказал солдатик и побрел дальше.</p><p class="p1">– Так, – произнес Игорь, помолчав. – Ты уверена, что доберешься до города?</p><p class="p1">– Куда я денусь.</p><p class="p1">– Тут люди кругом всякие ходят…</p><p class="p1">– Им же не я нужна, им дачи нужны. Мой тебе совет, спрячь стрелялку.</p><p class="p1">– Я подумаю. Давай я все-таки довезу тебя до Москвы, а там сразу уеду к себе.</p><p class="p1">– Нет! – закричала она, и он отшатнулся. Она никогда на него не кричала. – Так я пойду сейчас лесом к электричке – и успокоюсь. А с тобой еще три часа буду мучиться. Пусти, я пошла.</p><p class="p1">– Да иди, – сказал он, – кто тебя держит.</p><p class="p1">Она подхватила рюкзак и быстро пошла к калитке.</p><p class="subtitle">* * *</p><p class="p1">Игорь Медников, 1975 г.р., программист, сидел на лавочке под березой и обсуждал сам с собою свои дальнейшие действия. Это был довольно высокий, худой мужчина типа «вечный юноша», лет тридцати с небольшим, с короткими светло-русыми волосами, высоким лбом и серыми, немного навыкате глазами. Нос у него был с горбинкой, рот мягкий, с пухлой нижней губой в мелких трещинках, плечи сутулые, особых примет никаких, кроме нескольких порезов на руках. Рядом с ним на скамейке лежало ружье, но Медников, разумеется, не имел в виду обратить его против себя. У него со вкусом все было в порядке.</p><p class="p1">Медников примерно понимал, как устроен этот мир, и не питал насчет него особенных иллюзий. Переделывать его было бессмысленно по определению – только эвакуироваться, и эта последняя эвакуация была достаточно успешной. К сожалению, сорвалось, но не последний раз. Правда, возрастали шансы, что скоро все эвакуируют естественным путем, и совсем не в чудесное пространство вымысла – или по крайней мере в чужой вымысел, который Медникова совершенно не вдохновлял. А может, и по заслугам всему этому человечеству – ничего другого оно точно не стоит, особенно в последнее время. Этот мир, честно говоря, давно ловил Медникова, не давал ему осуществиться, потравливал, гнобил на корню лучшие идеи. Медников, однако, выжил, потому что умел эвакуироваться. Теперь мир смотрел на него даже с каким-то изумлением, с каким иногда глядит на нас бывшая наша девушка, сделавшая все, чтобы мы покончили с собой или сошли с ума, а мы, гляди ж ты, уцелели. Ну да, у тебя получилось, говорила ему окружающая реальность, включая убогую дачку, которую он от души ненавидел. У тебя вышло, говорило ему все. Ты жив, мы промазали, что же ты будешь делать дальше?</p><p class="p1">Да ничего я не буду делать дальше, была охота. Ты все боялся, что я начну тебя переделывать; и силы есть, и негодования сколько угодно, да честь уж больно сомнительна. Догнивай спокойно в своем ничтожестве. Тебе и в голову не могло прийти, если только у мира есть голова, – что я не собираюсь сводить с тобой счеты. Ты, затеявший ради меня столько гнусностей, как царь Ирод, перебивший всех младенцев ради единственного, и представить себе не мог, что мне нет до тебя никакого дела: я не великий комбинатор, не царь и не герой. Я эвакуатор, это другое дело, и в этом ты ничего не понимаешь; и хотя ты мучаешь меня, как истинного сотрясателя миров, даже это не сделает из меня борца, потому что ты этого не стоишь. Я эвакуатор, только и всего, и вся твоя бешеная злоба от того, что ты до сих пор не знаешь, как вести себя с эвакуаторами.</p><p class="p1">За лесом слышался какой-то гул. Писатель-символист Андрей Светлый, проводивший в Тарасовке лето 1914 года, отчетливо слышал такой гул по ночам. Казалось, на Запад едут тысячи орудийных повозок, скрипят колеса, стонут раненые. Об этом он написал в журнале «Сивилла», за что его жестоко высмеял поэт-сатирик Саша Темный в стихотворении «Уховидец». Сейчас этот гул был еще отчетливей. Медников прислушался, различил скрип телег и стоны раненых, тряхнул головой и обозвал себя уховидцем.</p><p class="p1">Вариантов было много, их всегда много. Можно было пойти с убогим скарбом по окрестным селам и рассказывать детям сказки, как мечтал перед войной один сумасшедший. На даче вон целый ящик старых игрушек, среди них бибабо, в детстве у нас тут был свой кукольный театр. Взять Петрушку, косолапого мишку, ежика, лису, круглого зверька неизвестного происхождения – и показывать сельским жителям веселые представления. Можно было какое-то время перекантоваться на даче, дядя Коля не даст пропасть. Можно было, наконец, взять лейку и улететь на Альфу Козерога. Чем черт не шутит, вдруг действительно летает.</p><p class="p1">На самом деле он, конечно, отлично представлял свои дальнейшие действия, только тянул время. Выждав ровно две минуты, он зачехлил ружье, быстро запер дом (надо будет заехать, забить окно в кухне – снегу нанесет), вышел за калитку, повесил на нее замок и пошел за Катькой в почтительном отдалении, чтобы она его не заметила. Отпускать ее одну совершенно не входило в его планы, приближаться – тем более. Это был не первый в его жизни случай неудавшейся эвакуации, он уже знал, как себя вести, как выходить из отчаяния, как отвыкать, как снова входить в колею. Рано или поздно должна была найтись та, которая сгодится для долгой и счастливой жизни на Альфе Козерога. Пока даже лучшая из земных женщин сгодилась только для того, чтобы все там испортить. Но это был не повод отпускать эту лучшую на станцию в одиночестве, без защиты, в трудный и опасный день. Он шел следом и видел, как метрах в пятистах впереди маячит ее красная куртка. Больше, слава богу, на дороге никого не было. Только один кавказец встретился и взглянул со значением.</p><p class="p1">Интересно, ходят ли поезда. Скорее всего, не ходят, хотя далеко за лесом что-то пару раз простучало и прогудело. Может, товарняк, а может, симферопольский скорый. По вечерам они ходили с матерью махать поездам. Вечно он кому-то машет, а кто-то едет. Или наблюдает, как кто-то уходит навсегда.</p><p class="p1">Катька шла не оглядываясь. Это хорошо. Если вдуматься, он ее уже почти не любил. У него это быстро проходило – как лампочку выключили. Если оказалась не та, нечего и мучиться. Та – не уйдет, а из-за не тех переживать – никакой жизни не хватит.</p><p class="p1">Он шел сзади, не сокращая расстояния, по временам пристально оглядываясь вокруг. Так они вышли на бетонку, ведущую к станции. Выползло солнце, и от него стало еще неуютнее. В канавах по сторонам бетонки стыла темная вода.</p><p class="subtitle">* * *</p><p class="p1">Двадцатишестилетняя женщина Катька Денисова, в девичестве Кузнецова, 1979 г. р., художник-оформитель и газетный дизайнер, шла по узкой бетонной дороге к указателю с перечеркнутой красным надписью «Тарасовка». Росту в художнице было метр шестьдесят три, у нее были короткие черные волосы, густые брови, чуть раскосые черные глаза и высокие скулы. Назвать ее красавицей было трудно, но на любителя нервных, остроумных и непредсказуемых женщин она действовала неотразимо. Денисова была худощава и хрупка на вид, но чрезвычайно подвижна и вынослива. Ну вот, мы описали героев, – в сущности, у нас и не было другой задачи. Стало уютней и даже как-то теплей. Можно заканчивать нашу историю.</p><p class="p1">Тарасовка оставалась позади, а станция, судя по стуку проходящего поезда, была впереди. Бетонка вливалась в широкое шоссе, по которому непрерывным потоком тянулись машины, и все в одну сторону. От них и шел непрерывный гул – Москва разъезжалась. Ехали медленно, нервно сигналя. По обочинам шоссе из Москвы и окрестных поселков уходили люди.</p><p class="p1">Катька дошла до шоссе и остановилась. Машины шли сплошной массой – не перебежишь. Она и не знала, что в Москве столько машин.</p><p class="p1">– Не знаете, поезда не ходят? – спросила она у пожилого кавказца, который со всей семьей шел по обочине, таща за собой чемодан на колесиках.</p><p class="p1">– Мы до Луча доехали, – сказал кавказец. – Дальше не пошло. Видишь, сколько пешком идут? Это всё с поезда.</p><p class="p1">– А на Москву ничего нет, не знаете?</p><p class="p1">– На Москву? – нехорошо улыбнулся кавказец. – На Москву теперь долго ничего не будет.</p><p class="p1">Он что-то знал, все они что-то знали.</p><p class="p1">– А, – сказала Катька. – Ну ладно.</p><p class="p1">Она пошла по обочине в сторону Москвы. Навстречу ей то и дело попадались кавказцы, узбеки и русские, покидающие город. В этом людском потоке все будущие враги шли пока вместе – еще не переходя к открытым боевым действиям, просто покидая обреченную столицу. Вокруг было много пустых деревень, дачных поселков и голых полей – будет где сойтись в случае чего.</p><p class="p1">Для бодрости Катька напевала про себя марш: Тадра-та-там, пам, пам. Тадра-ра-па-па-пам. Тадра-ра, тадра-ра, тадра-ра-па-па-пам. Я всегда прикидывала, что буду делать, когда начнется. Ну вот, началось. И что? Никакого особенного страха. Гораздо лучше, чем ожидание. Когда идешь куда-нибудь, всегда легче. Есть чувство, что можешь что-нибудь изменить. Та-дра-па-пам, пам, пам. В трехстах метрах от нее Игорь пытался отвязаться от той же мелодии – что поделать, некоторое время им еще предстояло жить в одном ритме. Игорь извинялся, когда его толкали, и старался не выпустить из поля зрения красную куртку.</p><p class="p1">Катька, маленький печальный солдат, шла в Москву против движения, как против ветра, ссутулившись и глубоко засунув руки в карманы.</p><p class="p1">Кое-что еще можно было спасти.</p><div class="cite">
<p class="text-author"><em>Октябрь – декабрь 2004, Чепелево – Москва</em></p>
