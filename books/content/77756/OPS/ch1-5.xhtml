<span><span id="id3"><div class="title2">
<p class="p">II</p>
</div><p class="p1">В начале октября, в один из последних теплых дней они сидели на парапете смотровой площадки на Воробьевых горах, пили «Балтику» номер седьмой и рассматривали женихов и невест, в изобилии съезжавшихся сюда по случаю субботы.</p><p class="p1">– А я ведь так и не знаю, как у вас размножаются, – грустно сказал Игорь.</p><p class="p1">– Ты сам говорить, у нас одна биоформа.</p><p class="p1">– Биоформа одна, а размножаться по-разному.</p><p class="p1">– Откуда ты знать?</p><p class="p1">– Быть специалист. Но только в теории. Ты знаешь, по-настоящему размножиться на Земле удавалось очень немногим нашим. Почему-то ваши женщины к этому допускают очень неохотно. У нас гораздо проще: полюбил, поговорил, размножился.</p><p class="p1">– Ну и неинтересно.</p><p class="p1">– Очень интересно. И вообще, у нас секс отдельно, а размножение отдельно.</p><p class="p1">– Почему?</p><p class="p1">– Потому что только у вас надо обязательно обставлять размножение максимальной приятностью. Очень сильный нужен стимул человеку, чтобы продолжать род. Жизнь плохая. А у нас не так, у нас размножение в радость, и женщина это делает сама. Она съедает специальный фрукт, похожий на земное ыблоко, – и, как это у вас называется, за… за…</p><p class="p1">– Залетает.</p><p class="p1">– Ну да, да. По-нашему тыбыдым.</p><p class="p1">– Игорь, – сказала Катька страшным шепотом. – Ты тронул сердце земной женщины, и я тебе откроюсь. У нас тоже так.</p><p class="p1">– Что – тоже?</p><p class="p1">– Секс отдельно, а размножение отдельно. Это все женский пиар, что люди трахаются и от этого залетают. Придумано, чтобы мужики женились. На самом деле от такого приятного дела не могут получаться дети. Дети – это серьезно, а секс – развлечение, праздник. Сам посуди, если бы дети получались от секса – сколько бы тут было детей? Все бы только и делали, что плодились. А откуда, по-твоему, столько матерей-одиночек? Женщине стало скучно, она съела яблоко и размножилась. Посмотри, у каких бывают дети. Неужели кто-то с ними занялся бы сексом?</p><p class="p1">– А где вы берете эти яблоки?</p><p class="p1">– А вы?</p><p class="p1">– У нас выдают централизованно. Ты пишешь заявление, специальная комиссия изучает твои жилищные условия, образование, нравственные качества… И тогда тебя либо отправляют на курсы повышения квалификации матерей, либо выдают ыблоко. Я его никогда не пробовал, но говорят, что исключительно вкусно.</p><p class="p1">– А у нас не так, – сказала Катька. – У нас естественный отбор. Если женщина может достать такое яблоко, то она, значит, уже готова к деторождению. Его очень трудно найти, целая процедура. Через знакомых там… А милиция специально отслеживает, кто их распространяет, и отлавливает. Масса риска. Ты думаешь, почему Дума запретила рынки?</p><p class="p1">– Из-за террористов.</p><p class="p1">– Господи, ну при чем тут террористы! Что, террорист на рынок пойдет? Персиками торговать? Это все из-за размножения. Очень много стало людей, прокормить невозможно. Убивать пока смелости не хватает, так они решили рождаемость свернуть.</p><p class="p1">– Подожди, подожди, я не понял, – он нахмурился. – Что, это только в России залетают от фрукта? Или во всем мире?</p><p class="p1">– Да везде, конечно. У русских есть анатомические особенности, но я тебе потом расскажу. А размножаются все одинаково, только в России это обставлено трудностями. В Штатах эти яблоки на каждом углу лежат, размножайся не хочу. А у нас все делается специально для того, чтобы как можно меньше было народу. Ты что, не замечал?</p><p class="p1">– Нет, почему. Замечал, но как-то это… не отдавать отчета…</p><p class="p1">– Вот смотри. В «Офисе» гендиректора почему сменили? Потому что он еще хоть какое-то представление имел, как журнал делать. Новый пришел, и первым делом что? Первым делом – чтобы все ходить на работу к десяти, на перекур отпрашиваться, в Сеть лазить только по делу. То есть уконтрапупить максимально все, чтобы никто не хотеть работать, думать работа с отвращение, с тоска. Ну и во всем так. Хочешь размножиться – крадешься в ночи на конспиративное место, ищешь эппл-дилера, обманываешь слежку… И яблоко это жутко невкусное, жесткое, с мыльным запахом. Горечь такая, что скулы сводит. А не фиг размножаться потому что.</p><p class="p1">– Оно как выглядит-то?</p><p class="p1">– Ну что ты за наблюдатель, ничего не знаешь! Сорт такой, кандилька.</p><p class="p1">– Оно же, наверное, растет где-то в природе? Можно же без дилера, просто к дереву сходить?</p><p class="p1">– Ну можно, да… Только это еще опаснее. Они растут только на очень сухой почве и в небольшом количестве. Милиция где увидит – сразу рубит. И яблоню, и владельца. Их в строгой тайне выращивают, на плантациях в лесу. В Средней Азии они еще хорошо растут. Ну так там и размножаются по-страшному…</p><p class="p1">– Слушай! – Игорь воодушевился, игра ему нравилась. – А если мужчина съест такое яблоко?</p><p class="p1">– Это тайна, – сказала Катька. – Дай ухо.</p><p class="p1">– На.</p><p class="p1">– Он познает суть добра и зла, – прошептала она, встав на цыпочки.</p><p class="p1">– Господи, какой ужас, – благоговейно сказал Игорь. – Поехали купим, а?</p><p class="p1">– Нет, – решительно ответила Катька. – Я не знаю, как это подействует на инопланетянина. Вдруг ты размножишься. А я с тобой и одним не знаю, что делать. Мы лучше поедем к тебе, и я тебе покажу, как у нас занимаются сексом.</p><p class="p1">Он несколько опешил. Шла четвертая неделя бурного романа, но до сих пор она пресекала все его осторожные заходы. Катька и сама не знала, почему вдруг сделала ему непристойное предложение. Минуту назад она не предполагала ничего подобного. Может, на нее так подействовал разговор о размножении, а может, просто она ужасно любила Игоря в эту минуту, и ей нравилась погода, и она была ему страшно благодарна за последний месяц, когда вспомнила наконец, какая бывает жизнь.</p><p class="p1">Он схватил ее за руку и потащил к стоянке такси.</p><p class="p1">– Ну ладно, ладно! Куда ты! Стой, мы пешком пойдем до Киевского.</p><p class="p1">– Катька, это садизм.</p><p class="p1">– Почему садизм?! Наоборот, это счастье. Я хочу гулять. Я хочу, чтобы все было медленно-медленно, долго-долго, в счастливом предвкушении. Ты же точно знаешь, что я еду к тебе. Зуб даю, что не передумаю. Идем, а впереди кайф. Человек всегда на него кидается, а самое-то лучшее – именно растягивать ожидание. И вот мы идем, идем… и только потом выясняется, что ты забыл ключи…</p><p class="p1">– Начитанная, – сказал он, глядя на нее с восхищением. – Прямо, ты знаешь, у меня такое чувство, что тебя делали на заказ. По моей выкройке.</p><p class="p1">Они много раз потом вспоминали малейшие детали этой прогулки – из всего, что Катька придумала в жизни, это затянувшееся ожидание счастья было самым удачным замыслом. Она отлично знала, что все будет так, как надо, и лучше; что не будет ни малейшей неловкости, никакого непонимания – полная гармония, веселое бесстыдство и та особенная ясность ума, которая всегда наступает в постели, если оказываешься там по любви. «Как в страсти прояснялась мысль!» – именно про это, такого не выдумаешь. Мысль прояснялась уже сейчас, они оба запоминали все с небывалой четкостью – полуголого старика на роликах, который промчался мимо, сосредоточенно глядя перед собой, словно видя впереди здоровье и долголетие, к которым устремлялся; мальчика, настойчиво требовавшего купить ему стеклянное яйцо с объемным лазерным изображением Кремля внутри, и разразившегося внезапным, диким басовитым воем, когда стало ясно, что никто ему ничего не купит, еще бы, полторы тысячи! – и странную толпу ментов из «Антитеррора» в красных бронежилетах, человек пятьдесят, вдруг высыпавших из экскурсионного автобуса, и двух девочек на лошадях, предложивших прокатиться; девочек этой породы а-ля Оксана Акиньшина Катька отлично знала – они с раннего отрочества пропадают на ипподромах, ненавидят людей и любят только лошадей, кормят их, разговаривают с ними, но любовь к животным тут ни при чем – скорей эротический подростковый подтекст, тоска по кентавру. С людьми эти девочки всегда высокомерны – запрезираешь человечество, ежедневно видя толстых дядек и визгливых теток, неуклюже влезающих на благородное, грациозное, жестоко эксплуатируемое животное… А поскольку Катька больше всего на свете ненавидела именно высокомерие, из которого и произошли все другие пороки, она никогда не давала этим девочкам денег на прокорм лошадей и не каталась по Воробьевке на грациозных животных.</p><p class="p1">– А это у нас знаешь что? – указала она ему на невысокий, примерно в полтора человеческих роста, желтый забор напротив. Вдоль забора росли кусты с красными ветками – Катька не знала, как они называются, но почему-то считала, что это бузина.</p><p class="p1">– Не знаю. Сколько тут хожу, всегда хотел перелезть и поглядеть.</p><p class="p1">– Тут была одна дача товарища Сталина. У него их было много вообще, никто не знал, на какой он находится. Он любил так развлекаться – говорит кому-нибудь: приглашаю вас, значит, к себе на дачу. Посмотрим там кино, Хрущев споет, сыграем в бутылочку… Человек едет – и никогда не знает, на какую дачу. Такая рулетка. А опозданий товарищ Сталин не прощал. Говорит: «А, ви, значит, опаздываете. Ви нас нэ уважаете. Ну канэшно, канэшно – у вас есть развлечения получше… Ви, наверное, к троцкистско-бухаринской оппозиции в гости ездите и там играете в бутылочку… Где уж вам заезжать к бэдному товарищу Сталину…» – и все, и нет человека. Некоторые прямо тут же и умирали, описавшись.</p><p class="p1">– Ужас. Зачем же они к нему вообще ездили? Хрущев так хорошо пел?</p><p class="p1">– Ты не понимаешь. Сам товарищ Сталин не представлял из себя ничего особенного, но у него был садик. На одной из дач. Между прочим, как раз на этой. Особо полюбившихся ему людей товарищ Сталин выводил в этот садик и предлагал его осмотреть. И не было во всей стране более высокой награды. Чего только не росло в садике товарища Сталина! Он сам заботливо ухаживал за розами, и розы были голубые, зеленые, радужные. Удивительные сливы, величиной с детскую голову и такого же цвета…</p><p class="p1">– Детородные яблоки…</p><p class="p1">– Конечно, ведь товарищ Сталин должен был знать суть добра и зла! Каждое утро он съедал такое яблоко, и смысл добра и зла каждый раз был новый. Осмотреть садик он предлагал только самым достойным, знатным людям. Знатными назывались летчики, хлеборобы… Он приглашал самого достойного – только раз в год! – и показывал ему садик и дарил розочку. По выходе из садика розочка тут же превращалась из радужной в обычную, розовую. Один человек попытался черенок от этой розы посадить у себя на даче – не вышло, конечно. А я в одном доме видела засушенный лепесток, ничего особенного. Но считалось, что если в самый трудный момент его съесть, то можно как-то спастись.</p><p class="p1">– От чего?</p><p class="p1">– От всего. А самое потрясающее знаешь что? Что только один раз в году товарищ Сталин и сейчас выходит из своего садика, вон из той калитки, и приглашает к себе людей. Идет мимо какой-нибудь прохожий, а тут – бац! – товарищ Сталин. Зайдите, говорит, ко мне, я хочу показать вам свой сад. И на счастливца обрушивается нечеловеческая удача.</p><p class="p1">– Никто не возвращался?</p><p class="p1">– Да все возвращаются, но жизнь им уже не в радость. Они видели садик товарища Сталина, и современность им теперь ничего не может предложить…</p><p class="p1">Они дошли до Киевского вокзала, мимо сине-свинцовой, тихой Москвы-реки, мимо патентной библиотеки, мимо ТЭЦ, на которой Катька еще помнила надпись «Коммунизм – это есть советская власть плюс электрификация всей страны» («Знаешь, почему у них не получился коммунизм? Они не нашли плюса! Власть была, электричество было, а плюс утрачен еще Парацельсом!»), и от «Киевской» доехали на метро до «Проспекта Мира», нагло целуясь на всех эскалаторах; там пересели и поехали в Свиблово, обнимаясь все тесней, все крепче, – дом был прямо у метро, рядом с деревянной часовней. Выходя из метро, Катька отключила мобильник. Если наш муж позвонит, весь кайф обломается. Она и представить себе не могла, как с ним говорить – это даже теперь, когда ничего еще не было; а потом…</p><p class="p1">Игорь жил на двенадцатом этаже.</p><p class="p1">– Слушай, – шепнул он в лифте, – а ведь ты нарочно решила так долго добираться. Теперь мы войдем, ты скажешь, что попьешь чаю – и сразу надо бежать, потому что уже поздно. Это будет совершенно в твоем духе.</p><p class="p1">– Ты дурак, – сказала она. – Если я хочу с тобой спать, значит, я буду с тобой спать.</p><p class="p1">– А дома что скажут?</p><p class="p1">– Это мои проблемы, не лезь туда, пожалуйста.</p><p class="p1">– Может, ты все-таки уйдешь ко мне?</p><p class="p1">– Может, и уйду. Подожди, ты же еще не знаешь ничего. Вдруг вообще ничего не получится.</p><p class="p1">– С какой стати? – Он чуть не выронил ключи.</p><p class="p1">– Ну мало ли. Есть понятие «антитело». Все хорошо, а в постели полная несовместимость.</p><p class="p1">– Типун тебе на язык. Милости прошу. Скромно, но просто.</p><p class="p1">– А что, – сказала Катька, – очень милая берлога. Я так себе и представляла. Давай, ставь барласкун, кыгырык, дырмыр, и тогда, возможно, мы будем немного тыбыдым.</p><p class="p1">– Кыгырык не завезли, – сказал Игорь виновато. – Они очень плохо снабжают в последнее время. Говорят, сами там ищите, раз у вас такая стабилизация.</p><p class="p1">– Ну и написал бы, какая тут стабилизация.</p><p class="p1">– Они не верят ничему. Зорге же тоже не верили.</p><p class="p1">– А зачем тогда держат?</p><p class="p1">– Хороших людей забирать.</p><p class="p1">– Ой, погоди… – Она отпихивалась, но слабо. – Отцепись, у меня и так ноги подгибаются. Я, что ли, в дыш сначала… Есть дыш?</p><p class="p1">– Есть, есть. Есть даже хылыт.</p><p class="p1">– Слушай, – обернулась она уже на пороге ванной, – а я ведь совершенно не в курсе твоей жизни.</p><p class="p1">– Очень своевременный, оправданный интерес. – Он выпрямился рядом с полузастеленной кроватью и скрестил руки на груди. – Я родился от бедных, но благородных родителей, получил порядочное образование, на Землю попросился добровольно, будучи наслышан о трудной, но благородной работе разведчика…</p><p class="p1">– «Мертвый сезон» не смотрел?</p><p class="p1">– Обязательно. Все приличные люди начинали в разведке. Это мой третий рейд к вам. Если хочешь узнать мое настоящее имя, наберись терпения. В нем тридцать три слога, и еще сорок пять в титуле.</p><p class="p1">– Ты аристократ?</p><p class="p1">– Прямо скажем, не под забором найден. Катя, иди уже в душ, пожалуйста, а? Хочешь, я тебе потру спинку?</p><p class="p1">– Не надо, я сама потру себе спинку. Но меня мало интересует твое происхождение. Меня волнует, например, был ли ты женат. Вот в этом халате до меня многие гостили?</p><p class="p1">– Честное слово, ты первая. Я купил его неделю назад в предвидении именно такого случая.</p><p class="p1">– Правда? Выглядит подержанным.</p><p class="p1">– Что ты хочешь, Свибловский рынок. Теперь его закроют, хоть память будет.</p><p class="p1">– Ты раздевайся, не стесняйся, – сказала Катька.</p><p class="p1">– Да? А ты будешь стоять и смотреть?</p><p class="p1">– Ага. Очень интересно.</p><p class="p1">– Знаешь что, Катя!</p><p class="p1">– Ну, у вас же все совсем иначе устроено…</p><p class="p1">– Я не могу тебе вот так показать. Я должен тебя подготовить.</p><p class="p1">– Что, настолько страшно?</p><p class="p1">– Нет, просто очень красиво. Иди, пожалуйста, куда шла.</p><p class="p1">Под душем Катька пела. Она нарочно мылась долго и шумно – надо было оттягивать счастье еще и еще, а между тем в самом деле было поздно, седьмой час, и у нее впервые мелькнула мысль – плюнуть на все, остаться на ночь у него, – но это было вовсе уж безответственно; и вообще, надо посмотреть… Как странно, сейчас мы будем изменять мужу. Но какая же это измена? Счастье накатило и не отпускало: счастье – это когда все можно.</p><p class="p1">Когда она вышла наконец из ванны, завернутая в явно великоватый халат, горячая, влажная, с полотенцем на голове, – он уже лежал под одеялом и читал какую-то фэнтезийную ерунду с когтистой красавицей на обложке. В зубах красавица держала меч, а в когтях – рыцаря в полном прикиде. Рыцарь тоже кого-то держал, но Катька была близорука.</p><p class="p1">– Читаем, да?</p><p class="p1">– Да, знаешь, что-то взгрустнулось. Захотел почитать про родину.</p><p class="p1">– Взгрустнулось? – Катька села на кровать. – Всякая тварь грустна перед соитием. У нас после, а у вас перед.</p><p class="p1">– Слушай, – он оторвался от книги. – Может, не надо соития, а? Я тут подумал… ну, все это так серьезно… Мы еще не готовы, ты недостаточно про меня знаешь, мы не проверили свои чувства… По нашим законам, юноша должен совершить три-четыре подвига и только потом взять девушку за, я не знаю, подбородок…</p><p class="p1">Она смотрела в его хитрые глаза и сияла: это было то, что надо, и с самого начала не надо было ничего другого, и какая несправедливость, что все вышло только сейчас. Катька всю жизнь стеснялась своего тела, да и вообще себя – словно каждый день вынужденно доказывала кому-то собственное право на существование; она привыкла к этому грузу и несла его без усилий, как улитка домик, но только теперь, когда ноша свалилась, стало ясно, какая тяжесть пригнетала ее к земле с первого класса, с первого контакта со средой. Нам так редко и неохотно подбрасывают своих, чтобы мы не понимали, какой ужас – чужие. После одного дня со своим невозможно сидеть с чужими в классе или на работе, входить в метро, полное чужих тел, ложиться в одну постель с непонятным полузнакомым человеком. В своем все устроено как надо. Такая полнота совпадения невыносима, как чистый кислород: после этого все оскорбительно и грязно, и лучше вообще не разлипаться. Кощунственна была сама мысль о том, чтобы перед этим пить – тогда как с прежними своими мужчинами Катька до такой степени стыдилась самой ситуации, что обязательно опрокидывала банку-другую джин-тоника, а то и прибегала к чему покрепче.</p><p class="p1">– Нет, погоди. Я должна тебе все объяснить. Ты можешь сделать не так, мы хрупкие существа. Значит, есть три дырки.</p><p class="p1">– Больше, больше…</p><p class="p1">– Уши не в счет. Пусти, дурак, ты приехал информацию собирать или зачем? Тебе неинтересно, что ли?</p><p class="p1">– Нет, почему, очень увлекательно. Продолжайте, профессор.</p><p class="p1">– Ну вот. Есть три отверстия. Одно, основное, расположено здесь и скрыто от глаз. Некоторые бреют, но мы считаем это неэстетичным.</p><p class="p1">– Действительно. Такой милый хвост.</p><p class="p1">– Это у тебя милый хвост. У нас это как бы ежик. Ежик – насекомоядное животное, живет в средней полосе практически повсеместно… Погоди, не трогай зверька. Он испугался и свернулся. Мы имеем также другое отверстие, противоположное, в него тоже можно, но в основном оно не для этого. Бывает типа банальный секс и анальный секс…</p><p class="p1">– Но это ужасно больно, наверное.</p><p class="p1">– Ты знаешь, у наших мужчин считается очень оскорбительным, если их кто-нибудь в это отверстие. Но для наших женщин это почему-то знак особенного расположения. Мы посмотрим, может быть, у нас до этого дойдет, но вряд ли. И наконец, есть третий способ, но при нем не поговоришь.</p><p class="p1">– Ага. Я, кажется, догадываюсь.</p><p class="p1">– Я в это время не то чтобы очень болтлива, но понимаешь… если иногда приходит важная мысль… просто поделиться…</p><p class="p1">– Да, да. Я понимаю. Скажите, профессор, а там, внутри… там нет ничего опасного? Ну, в смысле зубы… или бездна… Я слышал, что в вашем фольклоре это место имеет очень негативные коннотации…</p><p class="p1">– Знаете, Игорь, в нашем фольклоре практически все места… ох… имеют негативные коннотации. Игорь! Игорь, дурак! Какое счастье, что можно вот так трепаться, а? У меня ни с кем не было ничего подобного.</p><p class="p1">Некоторое время они просто лежали рядом, он гладил ее и терся носом о щеку, было ясно, что будет замечательно и еще более замечательно, но главное – она была необыкновенно хороша и сама это чувствовала, хотя и не видела в комнате ни одного зеркала; даже в ванной оно было маленькое, ровно для того, чтобы побриться.</p><p class="p1">– Подожди, но мы не обговорили всего разнообразия способов…</p><p class="p1">– Ка-а-атька… Ты абсолютное чудо, ты в курсе вообще?</p><p class="p1">– Знаешь, да. Сейчас почему-то в курсе.</p><p class="p1">– Ну, а когда у вас считается, что уже можно? Что можно как бы приступать?</p><p class="p1">– Это по готовности. Но вы, кажется, были готовы еще в лифте?</p><p class="p1">– Мы готовы, всегда готовы… Я ведь член нашей этой организации, как ее… пыынер… знаешь, да? Мы всегда готовы, это годы тренировок…</p><p class="p1">– Ну что ты делаешь! Дай я сама.</p><p class="p1">– Ну, сама так сама… Что ты ржешь?</p><p class="p1">– Ой, погоди… Ты знаешь это выражение – «и он весь превратился в слух»?</p><p class="p1">– Да. У нас тоже такое есть.</p><p class="p1">– Ну вот, а в таких ситуациях надо бы – «и он весь превратился в…».</p><p class="p1">– Да, – сказал он, – это похоже. Поразительно, как ты умеешь чувствовать другого человека.</p><p class="p1">Некоторое время им было не до острот. Наглой натяжкой было бы утверждать, что с первого же раза она испытала неземное блаженство; точней, ее неземное блаженство было совершенно иной природы, и всякая там физиология никакой роли уже не играла. Было полное совпадение, и блаженная вседозволенность, и милая раскрасневшаяся морда с виноватым и восхищенным выражением, и деликатность, столь умиляющая в мужчине, существе низшем, эгоистическом… Это же существо, наверняка инопланетное, думало не о себе, а о ней, продолжая помнить краем сознания, что она у него ненадолго, что всё вообще ненадолго, – ее-то часто посещали такие мысли, и именно в постели: некоторым счастливцам почему-то в это время кажется, что они бессмертны, а она никогда не ощущала себя такой смертной, как во время близости. И сейчас тоже. Но сейчас к этой тоске примешивалось другое чувство, истинное счастье – рядом с ней тоже был необыкновенно смертный человек, и то, что они умрут оба, особенно сближало, позволяя принять и этот закон.</p><p class="p1">– Ну ладно, – сказал он. – Я чаю принесу.</p><p class="p1">– Чудесно. А потом?</p><p class="p1">– А потом я тебе покажу, как это у нас.</p><p class="p1">– Что, иначе?</p><p class="p1">– Совсем иначе.</p><p class="p1">– Ну прости, милый. Я тебя грубо изнасиловала, да?</p><p class="p1">– Что ты, Кать. Очень познавательно, правда. Но у нас совсем не так. Мы сейчас попробуем, только у нас так устроено, что нужно время восстановиться. У вас, наверное, не так, да?</p><p class="p1">– Так, так. Но вы же, пыынеры, всегда готовы…</p><p class="p1">– Всегда готовы только почетные пыынеры. А я обычный.</p><p class="p1">Он пошел в кухню – она успела заметить, что все-таки ей достался замечательный инопланетянин, высокий, тонкий, при этом без всякой болезненной хилости. Теперь было время рассмотреть комнату: она не видела толком названий его книг, но по обложкам угадывала стандартный набор плюс страшное количество фотоальбомов (главным образом природа; мы, значит, изучаем земную флору и фауну?). Компьютер был титанически навороченный, с серебристым корпусом, идеально плоским монитором не меньше двадцати трех в диагонали, четырьмя колонками по углам жилища – вообще чувствовалось, что все деньги уходят сюда. Прочая обстановка была явно хозяйская: Игорь проговорился однажды, что квартиру снимает, потому что с родителями жить не хочет.</p><p class="p1">Он вернулся с двумя кружками жасминового чая, потом принес миску мелких желтых шариков.</p><p class="p1">– Это наша инопланетная еда.</p><p class="p1">– Ну ты подумай! Альфа Козерога, а жрут кукурузу с сыром.</p><p class="p1">– Это только кажется, что кукуруза. На самом деле это наша секретная вещь, ужасно сытная. Каждый шар возвращает силу и приносит день жизни.</p><p class="p1">– Ну, дней на пять я себе уже наела.</p><p class="p1">– Учти, я нарушаю все инструкции, давая тебе такую еду.</p><p class="p1">– Тебя теперь вызывать ковер, отнимать зверьки, лишать шары?</p><p class="p1">– Очень быть дорого каждый раз вызывать ковер из Москва на Альфа Козерога. Мне присылать секретная шифровка: Юстас, Юстас, где шары? Почему кормить самка? Я выкрутиться, отвечать, что иначе она пожрать я. Быть вынужден утолять страшный посткоитальный аппетит. Не ешь много, станешь слишком толстая, я разлюбить, улететь.</p><p class="p1">– А работа?</p><p class="p1">– Какая работа, когда тебя толстая самка преследует сексуальными домогательствами…</p><p class="p1">– Да, да. Кстати о домогательствах. Ты съел шар? Восстановился? Ты, помнится, хотел мне показать, как это делают у вас…</p><p class="p1">– Да, сейчас. Обязательно. Я только отнесу чашки.</p><p class="p1">Аккуратист, подумала она, какая прелесть.</p><p class="p1">– Ну вот, – сказал он, ложась рядом. – Единственная просьба: не закрывать глаза, у нас это не принято. Почему у вас закрывают глаза, ты не знаешь?</p><p class="p1">– Вообще догадываюсь. Чтобы не увидеть родное лицо, искаженное гримасой похоти.</p><p class="p1">– А. Ну ладно. Я постараюсь не искажаться. Тем более, что какая же это похоть?</p><p class="p1">Дальнейшее было странно, почти статично и все же трудноописуемо.</p><p class="p1">Надо заметить, что в физической стороне любви вообще много такого, о чем лучше не думать. Всякий человек, которому случалось испытывать сильное физическое притяжение, отлично понимает, что, например, Отелло убил Дездемону не потому, что ее оклеветал Яго, рядом случился соблазнительный Кассио и т. д., а потому, что чувственному мавру с самого начала хотелось задушить хрупкую белую женщину с чертами виктимности, и сама она отлично знала, что этим кончится, и сознательно на это шла, еще отчасти его и провоцируя. Настоящая трагедия получилась бы, обойдись Шекспир вовсе без темы клеветы и оставь на уединенном острове только мавра, венецианку и их странные игры, обреченные прийти именно к такому исходу. Ну, может, Бьянка какая-нибудь будет еще бегать по сцене как невольный свидетель. Отелло задушил Дездемону не потому, что ревновал, а потому, что хотел задушить, вся полнота его страсти могла реализоваться только так, сильное физическое притяжение непременно вытаскивает из нас нечто такое, от чего в конце концов вся любовь сводится либо к диким, с рычанием, ссорам и дракам, либо к столь же диким соитиям и укусам. Вокруг этого наверчено много пошлости, начиная с фрейдистских домыслов насчет Эроса и Танатоса, но у Катьки подобная история была на третьем курсе, она еле вырвалась из нее. Товарищ устроил ей такую «Горькую луну», что до сих пор вспомнить стыдно. Ко всему он был совершенный идиот, претенциозный, дурновкусный, любитель Егора Летова, всякой смертельной мистики и готики: клочок козлиной бороды, серьга, черная косуха, байкерская юность, внезапные приступы ярости с блатным визгом; таскал ее, помнится, по заброшенным кинотеатрам и заводам, был у них целый клуб, ширялись… отчасти, наверное, это объясняет, почему возникший на горизонте наш муж был сочтен спасательным кругом, чуть ли не ангелом-хранителем. Мы побежали тогда в эти уютные, простые отношения – в надежде избавиться от зависимости; и в самом деле, путем отсечения какой-то больной части нашей психики и некоторого, чего скрывать, интеллектуального оскудения приобрели стабильную семью и душевное здоровье, а надлом, вечно отзывавшийся на мировые катаклизмы, как старый перелом на дурную погоду, почти перестал напоминать о себе. Но есть еще один вариант совпадения, редчайший, почти не встречающийся – мы назвали бы его братством в позоре, товариществом в смертности; «как друг, обнявший молча друга пред заточением его» – точней, пред заточением обоих. Это и есть настоящая любовь, с которой ничего невозможно сделать. Оба этих крайних варианта, адская похоть и райское союзничество, симметрично располагаются по разные стороны от того чистилища, в котором мы с нашим мужем прожили последние три года, забыв, как оно было, и заставляя себя не думать, как могло бы. Все это Катька передумала секунд за десять, в состоянии, которое, как принято считать, исключает всякую способность к соображению. Конечно, она ничего этого не формулировала, но представляла себя и Игоря на острове среди то ли огненного, то ли морского буйства, при полной иллюзорности спасения, когда единственным, что могли они предъявить Богу в последний момент, была абсолютная близость, достижение жалкое и сомнительное, в сравнении с которым, однако, меркнут любые свершения. Так можно было любить в гибнущей Помпее, за секунду перед тем, как разделить общую участь. Отсюда же и дурацкое, ничего не объясняющее «кончил», «кончила»: сначала до тебя доходит, что все конечно, потом – что все кончено. Катька поняла это со страшной силой: на мгновение ей представился дымный горизонт, выжженные поля с напрасным урожаем, закат на западе и пламя на востоке, сумеречный лес, в котором по случаю конца света пробуждаются самые страшные сущности, дремавшие доселе в дуплах, ветвях, пнях, брошенные огороды, разоренные дома и жалкая кучка беженцев с убогим скарбом, плетущаяся через поселок и усугубляющая кошмар визгливыми, бессмысленными взаимными обвинениями. Это была война, землетрясение, голод и мор, за лесом выло, на железной дороге грохотало, и хрустела под ногами колючая стерня, схваченная первыми заморозками.</p><p class="p1">Очень может быть, что у других людей все не так, и эта утешительная мысль первой пришла Катьке после того, как к ней вернулась способность различать окружающий мир. В окружающем мире быстро темнело. Наступали сумерки – самая тревожная и неуютная пора.</p><p class="p1">– И что… у вас всегда так? – спросила она.</p><p class="p1">– Где?</p><p class="p1">– Ну там… на планете… Я, кстати, так и не знаю, как она называется.</p><p class="p1">– Ой, это долго по-вашему. Слогов двадцать. Для краткости будем говорить «на Альфе» или «у тебя дома».</p><p class="p1">– И что, у тебя дома всегда так… это происходит?</p><p class="p1">– Нет, не всегда. Иногда перебираешь тьму вариантов, ничего подходящего нет, – тогда говоришь: «Ладно, пошлите меня, товарищи, на Землю, может, я там поищу». Наверное, извращение какое-то, если среди нормальных людей найти не можешь, а среди потомков всяких флибустьеров сразу бац – любовь. Но я это себе так объясняю, что наоборот, среди потомков флибустьеров иногда вдруг нарождается мутант с удивительными свойствами, на грани святости, и тогда тебя к нему тянет больше, чем к нашим образцовым домохозяйкам.</p><p class="p1">– Не замечала в себе сроду никакой святости.</p><p class="p1">– Ну а в чем она должна заключаться? В помощи бедным? Это самое тупое… Я думаю, нужна чуткость такая, на грани фантастики. А больше святость ни в чем не выражается. Все нормальные святые просто очень много понимали и действовали соответственно. Не наступали на больные мозоли, не говорили гадостей… Святой – это же не тот, кто повсюду ищет обездоленных в надежде их спасти и тем повысить самоуважение. Ау, ау, кто обездоленный?! Святой столько понимает про человечество, что ему всех только жалко. Ничего другого ведь нельзя испытывать, если смотреть с известной высоты…</p><p class="p1">– Да. Очень интересно. Подожди, но это самое… – Катька всегда ощущала неловкость не только говоря, но и думая на эти темы. – Ты же почти ничего не делал.</p><p class="p1">– Я очень много всего делал, но это не сводилось к примитивному шевелению туда-сюда.</p><p class="p1">– И что это было?</p><p class="p1">– Ну… все тебе расскажи… Это был наш специальный способ.</p><p class="p1">– А… Ну да. Короче, мне пора.</p><p class="p1">– Ты что? – вскинулся он. – Лежи!</p><p class="p1">– Нет, Игорь, мне серьезно пора.</p><p class="p1">– Ты что, не можешь остаться?</p><p class="p1">– Пока не могу.</p><p class="p1">– А соврать что-нибудь? Завтра воскресенье, в конце концов. Ты могла заночевать у подруги.</p><p class="p1">– У меня нет подруг. То есть таких, у которых я могу заночевать.</p><p class="p1">– А Лида?</p><p class="p1">– Не говори ерунды. Он отлично знает, что Лида с Борей каждые выходные уезжают на дикую природу.</p><p class="p1">– Господи, ну к родне поехала…</p><p class="p1">– Ты что, как моя дочь? Не можешь без меня заснуть?</p><p class="p1">– Теперь не смогу. Ты знаешь, как у нас это серьезно? У нас кто раз это делал с женщиной, тот уже один быть не может. Все равно что руку оторвать.</p><p class="p1">– Ладно, пусти. Честное слово. Я тебе клянусь, что завтра чего-нибудь придумаю и мы куда-то пойдем.</p><p class="p1">Она уже злилась, потому что ей было невыносимо тревожно. Прошло часа три, наверное, как она приехала сюда… было ведь уже шесть с копейками… значит, сейчас девять, надо позвонить домой и что-то наврать – но как раз звонить от него домой она почему-то не могла, да и не была уверена, что сможет врать достаточно беспечно. Ладно, по дороге чего-нибудь изобретем. Ему-то хорошо, он останется здесь, а ей переться через всю Москву с пересадкой на кольце, – требовалось страшное усилие, чтобы встать, отклеиться от него, одеться (всегда терпеть не могла одеваться, со школы, с треклятых зимних пробуждений, при воспоминании о которых и теперь неудержимо накатывал озноб и нервная зевота), и она уже сердилась на него за то, что он останется здесь, в своем раю, а она из него уйдет и весь вечер вынуждена будет притворяться.</p><p class="p1">– Я тебя отвезу.</p><p class="p1">– Лежи.</p><p class="p1">– Нет, что ты… – Он уже встал и натягивал джинсы.</p><p class="p1">– Я тебя серьезно прошу, останься тут! Не хватало мне еще в дороге мучиться, а потом в подъезде переключаться… Я пока буду ехать, как раз от тебя отойду.</p><p class="p1">– Слушай, мне так не нравится. Ты будешь ехать, я буду тут представлять, как ты едешь, и сходить с ума.</p><p class="p1">– Ну представлял же ты раньше, как я еду…</p><p class="p1">– Дура, то ведь раньше! А теперь совсем другое. Теперь я чувствую все, как ты. У вас что, не так?</p><p class="p1">– Нет, у нас не так. У нас если бы было так, то половина населения чувствовала бы одинаково, потому что все со всеми.</p><p class="p1">– Почему, это же потом проходит. Это только пока любовь, а потом ж-жах – и все. И не чувствуешь. Как лампочку выкрутили. Это значит – прошло.</p><p class="p1">– Нет, Игорь. Нет. Ну пожалуйста, сделай ты раз в жизни, как я говорю, – она сама не заметила, как употребила любимое выражение нашего мужа: он всегда это говорил, настаивая на чем-то.</p><p class="p1">– Ты завтра позвонишь? – спросил он, когда она, не стесняясь его, быстро мазалась перед единственным зеркалом, в ванной.</p><p class="p1">– Позвоню, естественно, куда же я денусь. Мы, земные женщины, страшно привязчивы.</p><p class="p1">– А я боюсь, что ты теперь пропадешь и больше не появишься. Вы, земные женщины, ужасно роковые.</p><p class="p1">– Игорь! – Она закрыла косметичку и влезла в пальто, которое он и не подумал ей подать, так и стоял столбом, загораживая вход в комнату. – Я тебе клянусь всем святым, что никогда тебя не покину по доброй воле. Вот честно. Вы все, инопланетяне, ужасные дураки. Вы думаете, что женщина может злиться только на вас. Пойми ты, я с ума схожу, будь моя воля – я бы вообще никогда не ушла отсюда. Здесь все совершенно как мне надо. Я не на тебя сержусь, ты понял?</p><p class="p1">– Понял, понял. Но ты правда позвонишь?</p><p class="p1">– Ты сам можешь позвонить совершенно спокойно…</p><p class="p1">– Я сам теперь боюсь.</p><p class="p1">– Ну и правильно. А то наши земные мужчины после этого думают, что уже все можно, – она быстро поцеловала его в щеку.</p><p class="p1">– А кровать будет тобой пахнуть.</p><p class="p1">– Ну вот видишь, моя радость. Считай, что я частично тут.</p><p class="p1">– У тебя есть на такси?</p><p class="p1">– Не хватало еще деньги с тебя брать за сеанс.</p><p class="p1">– Ну давай, – он повозился с замками и открыл дверь.</p><p class="p1">Изгнание из рая совершилось, причем вполне добровольно. Внизу собачник уже выгуливал эрделя, господи, ведь в самом деле четверть десятого! В метро попался вагон, в котором ехали одни монстры: так бывает, причем именно тогда, когда мы особенно уязвимы. Особенно ужасна была пара уродов, с узкими, вытянутыми черепами, с фанатичными черными глазами, оба в рубище, в пропыленных тряпках цвета советских тренировочных штанов, она еще застала такие. Оба мрачно смотрели вперед, крепко держась за руки, – вероятно, брат и сестра, жертвы пьяного зачатия; ну правильно, что ж – уроды должны держаться вместе, крепче хвататься друг за друга, откуда нам взять другую опору? На «ВДНХ» вошли отец с дочерью, ей лет двадцать, ему под пятьдесят, он толстый, и она толстая, бородавчатая, в мужских ботинках, вся в него, несчастная, деться некуда, всем некуда деться. Достали книжки, у него первый том Марининой, у нее второй. На «Проспекте Мира» почему-то была закрыта пересадка – она не сумела перейти на кольцо, пришлось ехать до «Октябрьской», в вагоне никто даже не зароптал – несчастные, приплюснутые люди, кол им на голове теши – слова не скажут, все так и надо. Доехала до «Профсоюзной», схватила такси, грузин попался молчаливый, печальный и с виду даже рыцарственный – знала она эту рыцарственность, сплошной винно-шашлычный перегар под ветшающей оболочкой национального колорита, – и все время, пока они ехали мимо темных тополей улицы Вавилова, мимо спешно разбираемого Черемушкинского рынка, оголенный остов которого жалобно торчал слева, она спрашивала себя: и что теперь будет, и как теперь будем жить?</p><p class="p1">– И как теперь будэм жить? – обреченно спросил грузин.</p><p class="p1">Она уставилась на него с внезапной благодарностью: нет, все-таки в них есть какая-то восточная чуткость.</p><p class="p1">– Попробуем как-нибудь. – Катька попыталась улыбнуться и даже подмигнула. – Не такое бывало, в конце концов…</p><p class="p1">– Нэт, такого еще нэ бывало.</p><p class="p1">Прямо мысли читает, ужаснулась она.</p><p class="p1">Только тут Катька осмелилась включить мобильник: Сереженька, вероятно, уже обзвонился. Сообщений от него не было. Она позвонила домой – как-то самортизировать неизбежный скандал, невинным голосом объяснить, что задержалась, но обнаружила, что кончились деньги; вот так всегда, в самый неподходящий момент.</p><p class="p1">– Связь у многих нэ работаэт, – сказал грузин.</p><p class="p1">– Да, черт-те что творится… У вас тоже что-то случилось?</p><p class="p1">– Нэт, – грустно улыбнулся он, – ничего сверх абычного. Всё, что у всэх.</p><p class="p1">– Ну, если у всех, то как-нибудь.</p><p class="p1">– Как-нибудь, как-нибудь… Вы не с Востока сама?</p><p class="p1">Из-за черных волос и некоторой смуглости, особенно заметной в сумерках, ее, случалось, принимали за гречанку или турчанку, – курносый российский нос, конечно, путал карты.</p><p class="p1">– Нет, нет. Я из Брянска вообще.</p><p class="p1">– А… Ну, сейчас время такое, что не смотрят. Могут и из Брянска…</p><p class="p1">– Что могут?</p><p class="p1">– Всё могут, – мрачно сказал он. Видимо, у него был тяжелый опыт отношений с милицией.</p><p class="p1">Лифт не работал, Катька взлетела на свой пятый, некоторое время переводила дыхание перед дверью, искала внутренний выключатель – действительно, вот бы кнопка, Ури, Ури, где у него кнопка! – наконец решилась и открыла дверь. Кто бы думал, что на нас так подействует первая измена; что значит пять лет добропорядочности. Наш муж, наш Котенька, как называли мы его в хорошую минуту, наш Сереженька сидел перед телевизором и мрачно смотрел российский боевик: менты с овчарками, руины торгового центра в Сокольниках, штук двадцать машин скорой помощи.</p><p class="p1">– Котя! – крикнула Катька с преувеличенной бодростью. – Кот, ты не представляешь, какая красота! Я так нагулялась… прямо как в детстве…</p><p class="p1">– Я тут с ума схожу, – произнес наш муж мрачно, не поворачивая головы. – Ты хоть позвонить могла?</p><p class="p1">– Кот, честно, деньги кончились, а карты там нигде не купишь… Ну что такое, в конце концов, всего десять…</p><p class="p1">Тут только она взглянула на любимые настенные часы и поняла, что идет не боевик – показывали десятичасовые новости; с тех пор как сцены насилия с семи утра до десяти вечера были запрещены, имело смысл смотреть только десятичасовые, потому что во всех остальных выпусках ни о терактах, ни о захватах не говорили, шла сплошная молотьба и дружественные визиты. С десяти прорывало – на Первом поменьше, на России посервильнее, на НТВ поэксклюзивнее, а тарелки у них не было: за тарелку теперь полагалось платить пять тысяч в месяц, и хорошо, что рублей.</p><p class="p1">Торгового центра «Сокольники» больше не существовало. Дом был отчетливо виден в разрезе, со второго этажа свисали синие тряпки – Катька, ужаснувшись, узнала форменную одежду продавцов. Внизу, перед входом в спортивный отдел, обычно торговали белорусскими велосипедами, и теперь справа от входа громоздилась груда изуродованных, восьмерками выгнутых колес.</p><p class="p1">– Суббота, – сказал муж. – Все с детьми пошли… Рассчитали, сволочи.</p><p class="p1">– Слушай, когда это?!</p><p class="p1">– Перед закрытием, в семь. Я звоню тебе, звоню, связь не работает… Во всем городе, говорят, проблемы с мобилами.</p><p class="p1">– Ну и кто сделал? Что хоть говорят-то?</p><p class="p1">– Что они говорят… Говорят, что тридцать человек погибли и пятьдесят ранены. Ты можешь себе представить, сколько там на самом деле?</p><p class="p1">Разборок не будет, с облегчением подумала Катька, он слишком занят другим, – но тут же мысленно закатила себе оплеуху: сволочь, о чем ты думаешь?!</p><p class="p1">На самом деле до нее просто никак не могло дойти, что произошло. Теракты случались в последнее лето чаще обычного, в августе все спецслужбы встали на уши, чтобы не оправдалась примета насчет рокового месяца, – и до двадцать пятого все было тихо, но потом случился захват Маклаковской АЭС, чудом не приведший к всеобщему бенцу только потому, что не сработало взрывное устройство (сказали, естественно, что были учения, – а город подумал, шахиды идут). Убрали Патрушева, разогнали «Огонек», попавший под раздачу без всяких причин. Сентябрь прошел относительно тихо, она уже думала – очередная волна не скоро, но оказывается, это они набирались сил.</p><p class="p1">– Ответственность взял кто-нибудь?</p><p class="p1">– Говорят, какой-то псих из Турции разместил на сайте… Его проверили – вроде ничего нет. Я боюсь, теперь Сеть вообще закроют к фигам…</p><p class="p1">– Ну, всю-то не закроешь.</p><p class="p1">– Ты говорила, что и рынки не закроешь.</p><p class="p1">– Господи, господи! – Катька вгляделась в экран. – Сколько же там рвануло?</p><p class="p1">– Говорят, было четыре бомбы на двух этажах. По пятьсот грамм.</p><p class="p1">– Слушай, кто у нас живет в Сокольниках? Конышев, кажется?</p><p class="p1">– Конышев на даче, у него автоответчик.</p><p class="p1">– Черт… Что же будет…</p><p class="p1">– Не знаю, что будет. Валить отсюда надо, вот что. – Он встал, и Катька не могла не заметить, какой он маленький. – Валить к чертовой матери. Еще раз рванет – вообще разговаривать запретят. Я не могу, чтобы у меня ребенок рос в этом аду.</p><p class="p1">– Ну и куда ты свалишь?</p><p class="p1">– Хоть в Африку, хоть в Антарктику. К черту лысому. Не можете ни хрена, кроме как свой же народ пугать, – все, не обижайтесь, если одни останетесь.</p><p class="p1">Он тер затылок – затекла шея – и отчего-то не смотрел на нее, а все в пол. Может, чувствует что-то? Впрочем, что теперь…</p><p class="p1">– Катя! – сказал он с внезапным пафосом. – Я тебя очень прошу! Никуда не ходи одна! Сама видишь, время такое, черт-те что может случиться…</p><p class="p1">– Да куда я хожу, кроме работы? Гулять иногда…</p><p class="p1">– Я не знаю, куда ты ходишь. Я вообще не претендую знать, куда ты ходишь.</p><p class="p1">– Кот! Ну Кот! Ну что ты заводишься, честное слово…</p><p class="p1">– Я завожусь? Это я завожусь? Я, кажется, вообще ни слова… Я только хочу сказать, что сейчас не время. Понимаешь? Не нужно сейчас надолго уходить из дома. Я свинья, конечно, тебе со мной скучно, я занят только собой и все понимаю. Честное слово, я постараюсь…</p><p class="p1">«Еще бы не хватало, чтобы ты сейчас занялся мной», – подумала она обреченно, уходя в кухню. Но он занялся. Весь вечер ныл, а ночью – видимо, странным образом возбудившись на фоне общего испуга – полез на нее, и не было никаких отмазок. Вероятно, счастливая в любви женщина испускает флюиды, приманивающие самцов. Невыносимо было не только то, что досталась я в один и тот же день лукавому, архангелу и Богу (только Бог медлил, но, судя по динамике, скоро приберет): невыносимей всего было то, что полунасильственным соитием с мужем начисто уничтожалось впечатление от инопланетного волшебства, невоспроизводимого, конечно, ни с кем другим. Становилось вообще непонятно, зачем люди живут вместе, – как после тонны графомании, прочитанной где-нибудь в Сети или в современном журнале, перестаешь понимать, так ли уж хорошо «Я помню чудное мгновенье…». Чудное мгновенье растянулось минут на двадцать, муж старался. Катька лежала как бревно, но он и не нуждался в реакции. Вскоре после решительного момента вошла, пошатываясь, испуганная Подуша: ей приснился кошмар.</p><p class="p1">Пришлось заново укладывать, успокаивать, петь. Сереженька храпел. Катька спела дочери «Было время, процветала в мире наша сторона…». Дочь во сне была похожа на Сереженьку. И было еще что-то, важное и неприятное, о чем надо было подумать.</p><p class="p1">«Семь часов, – вспомнила она. – Что мы делали в семь часов?»</p></span></span>
