<p class="p">III</p>
</div><p class="p1">Так началась для Катьки жизнь, которую она не могла бы назвать ни райской, ни адской – и которая напоминала скорей улей и сад из финала любимой повести; а того верней – садик товарища Сталина, под почвой которого клубился адский жар, а на грядках благоухали радужные розы. Рай и ад спелись, сплелись и создали идеальную среду для беззаконной любви. После взрыва в Сокольниках понеслось: то ли последний и решительный штурм, к которому готовились все эти годы, то ли первая атака объединенного ислама, то ли – и эту догадку было уже не отогнать – хаотическое осыпание самой системы, и тут уже радикальный ислам был не виноват ни сном ни духом.</p><p class="p1">Бабахало по два-три раза в неделю, то в Москве, то в области, то на южных окраинах, то в Сибири, то на Дальнем Востоке, в непредсказуемых местах и без всякой логики. Всего ужасней были традиционные внутренние репрессии в ответ на внешние атаки – словно паралитик не в силах был отогнать ос и лупил самого себя по тем местам, до которых мог дотянуться. Зрелище было не столько пугающее, сколько жалкое. Никто уже не сомневался, что государство недееспособно, обречено и рухнет в самом скором времени – тем более что взрывать оказалось на диво легким делом. Взрывчатки хватало, шахиды уже не требовались – радиоуправляемый заряд в сумке срабатывал в час пик, на концерте, в музее, среди ночи падал жилой дом, в Ульяновске причиной взрыва называли утечку газа, а в Братске – тектонический сдвиг из-за внезапного таяния мерзлоты; случалась двух-трехдневная пауза, и бабахало опять, на этот раз в троллейбусе, и вот что мучило вдвойне – люди научились с этим жить, приспосабливаться; человек опять доказал свою исключительную адаптивность – из обреченных домов вдруг среди ночи, за час до взрыва, высыпали жильцы, иногда даже успевали вызвать милицию, найти и обезвредить взрывчатку; в заминированный троллейбус садилось меньше народу (интервью со счастливцами, избежавшими судьбы, почти ежедневно печатала «Вечерка» – «И тут-то я и почувствовал: нехорошо! Ну его, думаю, пойду пешком. Надо бы мне, конечно, в милицию – но кто бы поверил?!»). Народным бунтом не пахло, хотя в иное время двух таких терактов с лихвой хватило бы для низвержения власти, – но Россия вновь доказывала свою неодолимую природность: в иное время довольно было крошечного толчка, чтобы обрушить всю конструкцию, – теперь же все словно спали, и конструкция медленно гнила, обваливаясь по частям. Если бы вся она сгорела в одночасье, что-то стальное в ней могло уцелеть, – но в болоте перегнивает любое железо. Не было не только революции, но и сколько-нибудь заметного ропота; для ропота был не сезон, и никакие взрывы не могли ускорить время, как не может взрыв или пожар на волжском льду ускорить приход весны.</p><p class="p1">Островки нормальной жизни среди всего этого сохранялись – магазины торговали, хотя ассортимент стремительно скудел и еда все чаще попадалась гнилая, порченая; кое-где платили зарплату, кто-то качал нефть (и ни один нефтепровод еще не взорвался, подтверждая конспирологическую теорию о том, что все это «из-за нефтянки», хотя при чем нефтянка – никто объяснить не мог). Самое же странное, что продолжал выходить «Офис», из-за чего Катьке все чаще приходило в голову, что журнал как-то связан с террористами, может, служит им крышей, мало ли, потому что прочие издания лопались с той же скоростью, с какой плодились в девяностые. Дольше других продержался глянец, и это было по-своему логично – в гибнущей стране все наоборот, законы переворачиваются, и наиболее жизнеспособным оказывается никому не нужное. Катька прислушивалась к гулу гибели, и не сказать, чтобы этот звук ей вовсе не нравился.</p><p class="p1">В конце концов, только так она и могла быть счастлива. Нелюбимый ребенок с коллекцией незаживших душевных язв, она резонировала только с катастрофой – и надо было случиться, чтобы разгар катастрофы совпал с первой и последней любовью, с месяцем бурного счастья, на фоне пышного увядания и вулканического жара! Наш муж, в одночасье лишившийся работы и совершенно потерявшийся (часами лежал на диване, вцепившись в Подушу, – няньку рассчитали, на нее уже не хватало), каждое утро начинал с разговора об отъезде, не признаваясь даже себе, что отъезд давно немыслим – вот уж две недели, как введено чрезвычайное положение, выезд только по специальной визе, куча разрешений от МИДа, Совбеза, ФСБ, уважительная причина, профессиональная необходимость… Разом свернулись все обменные программы, в два дня обанкротились турфирмы («Офис» порядочно потерял на этом – реклама туроператоров шла в каждом номере), а главное – никто не мог объяснить, за каким чертом понадобилось возводить этот занавес на руинах. Все было тем абсурдней, что действовал так называемый принцип обыска – всех впускать, никого не выпускать; въезд в страну оставался совершенно свободным, и любой шахид мог попасть в нее без проблем, – власть словно заботилась о том, чтобы было кого взрывать: обидно же восточному гостю приезжать на пустое место.</p><p class="p1">Поначалу родители звонили из Германии через день, потом реже – они долго не могли взять в толк, как такое может продолжаться неделями и никто ничего не в силах остановить; им все еще казалось, что к ситуации приложимы нормальные критерии. В конце концов, в Германии тоже бывало, и не один раз, но чтобы вот так, лавиной… Мать умоляла Катьку не спускаться в метро – она и в Нюрнберге жила брянскими мерками, будучи уверена, что в Москве можно всюду добраться автобусом, а то и пешком, к подземке же прибегают исключительно для быстроты. Отец недоумевал, чем занято правительство и почему молчат демократы, в особенную влиятельность и западные связи которых он свято верил с самой перестройки; Катька лишний раз убеждалась, что перестроечные представления оказались феноменально живучи – это была последняя и самая сладостная волна государственной пропаганды, ибо государство, проповедующее распад, обладает удвоенной силой, освящая своим авторитетом давно желаемое. Распад, как выяснилось, был тайной мечтой почти всего населения, потому что созидать давно было незачем, нечем и, в сущности, себе дороже. Может, все потому и сносили нарастающий террор так покорно, что в глубине души с самого начала были уверены в заслуженности происходящего, в естественности именно такого развития событий; каждый знал за собой тайную вину. С той же покорностью сносили ведь и посадки, и разорения, и обманы – начиная робко возмущаться, лишь когда гнет слабел. Слабый гнет как бы сомневался в своем праве – и робкой власти ставилось в строку всякое лыко, тогда как сильной прощалось и вдесятеро большее. Теракты терпели потому, что за ними чувствовали мощь, с которой не пошутишь. С каждым новым взрывом всё уверенней обвиняли власть и всё охотнее сочувствовали противнику – ибо противник казался опасней; Катька давно знала, что истинное свободолюбие заключается в выборе сильнейшего врага и переходе на его сторону. Власть порывалась, конечно, доказать и свою силу – посадили пару химиков, передавших Китаю подшивку институтской газеты двадцатилетней давности, – но даже если бы начали сажать за курение на улицах, ввели налог на русский язык и выслали из Москвы всех гагаузов, иррациональность уже не обернулась бы величием.</p><p class="p1">Страннее же всего было то, что происходило с самой Катькой. На нее навалилась необъяснимая глухота: ни страха за собственную жизнь, ни скорби по отнятой чужой уже не было. Проще всего было сказать, что превышен болевой порог, а на войне как на войне: каждого оплакивать – никаких слез не хватит. На войне, однако, есть хоть то утешение, что наносишь ответный удар, посильно бьешь противника – здесь же и противника не было видно, только Шамиль слал по Интернету ехидные письма; отвечать было некому и некуда, и это придавало смертям в метро и в спящих домах анонимность и неотвратимость Божьей кары. Не Богу же было мстить – но то, что он это допускал, обесценивало любую молитву. Взрывы были ответом на силу и слабость, ультиматумы и переговоры, угрозы и признания вины; взрывы не имели прикладной, низменной цели вроде шантажа, устройства переговоров или чьей бы то ни было независимости. Шла война на уничтожение, без условностей и условий, – и оказалось, что обреченных жалеть нельзя. По законам военного времени к скорби должно было примешиваться новое чувство – жажда мести. Без этого скорбь обесценивалась, перерождаясь в безвыходное раздражение, в тоскливую мольбу: «Скорей бы». У тех, кого приговорил Бог или столь же незримая сила, есть лишь обреченность да глухое чувство давней вины, за которую пришла наконец очередь расплатиться. В чем вина – не взялся бы сказать и самый пристрастный историк, но без ее бремени нельзя было бы влачить такую жизнь и принимать такую смерть.</p><p class="p1">Каждое утро Катька просыпалась в невыносимой тоске, в центре которой, как сладкий комок мороженого среди черной кофейной горечи, все-таки была мысль об Игоре, и она хваталась за эту мысль, но тоска по контрасту делалась только горше. Особенно невыносимо было с утра, еще в тумане, тащить Подушу в детсад, куда ее пришлось в конце концов устроить, несмотря на все протесты нашего мужа. Катька вообще ненавидела просыпаться раньше девяти, куда проще ей, как всякой сове, было бодрствовать до четырех утра за срочной работой, – а тут в семь надо было срочно отрывать голову от подушки, прыгать под горячий душ (по средам горячей воды не было – начали по случаю террора внезапную профилактику, черт бы их драл, при чем тут профилактика, где террор, а где трубы?!), расталкивать сонную Подушу, одевать ее, несмотря на рыдания, тащить за собой в гору, к детсаду, – хорошо еще, в нем нашлись места после того, как комитет детсадских матерей потребовал выгнать всех «черных», включая одного действительно негра, отпрыска чьей-то любви со студентом института Лумумбы. Куда дели этих восточных детей, никто не знал, родители забрали их безропотно, опасаясь худшего.</p><p class="p1">С утра, с раннего пробуждения, с бессмысленного насилия над собой (кто придумал эти детские сады с восьми утра?!) начиналось отвращение ко всему. Сереженька порывался встать, помочь, сварить кофе – но ронял голову и засыпал опять. Из него в последнее время будто вынули позвоночник – воли нашего мужа не хватало даже на то, чтобы принять душ перед сном. Катька, однако, не завидовала его праву оставаться дома – до вечера он был теперь предоставлен себе, накручивал круги по квартире, выходил попить пива с мужиками, сидел перед телевизором, бессмысленно глядя непрекращающиеся «Фабрики звезд», которые, в порядке борьбы с ксенофобией, вели Дадашева с Кушанашвили, и чем смотреть все это в тупом ожидании худшего – а ждать лучшего перед таким телевизором не приходилось, – предпочтительней было оттаскивать дочь в сад, верстать никому не нужный «Офис» и по вечерам три часа в сутки окончательно сходить с ума, потому что ясность рассудка возвращалась только на эти три часа, когда она была с Игорем, и тогда она понимала, куда все катится.</p><p class="p1">Катька оставляла злобной воспитательнице ноющую Подушу, шла к остановке, и взгляд ее падал на новые и новые приметы распада. Около дома напротив появилась полупарализованная собака, шпиц, кем-то выброшенный из-за болезни и старости, – этому шпицу дети построили в кустах картонный домик, выносили ему туда объедки… На всех прохожих, кроме этих детей, он отчаянно, визгливо лаял, откуда силы брались, – лаял на собственную смерть и бессилие, и звучало это так жалко, что Катька всякий раз думала: вот так и страна, в картонном убежище, в полупараличе, среди объедков, рррав-тяв-тяв! Около другого дома уже года три ржавел старый «запорожец» – хозяин, вероятно, умер, а наследникам машина была не нужна, и Катька, проходя мимо него еще до встречи с Игорем, всякий раз думала, что вот и она как тот «запорожец» – хозяин умер, это чувство смерти хозяина тайно сопровождало ее каждое утро после отъезда родителей, а кроме хозяина, она никому особо не нужна; теперь этот «запорожец» взломали и доламывали по частям, продавливая крышу, отрывая руль, внутрь нанесло листвы… Однажды утром Катька чуть не разревелась, увидев на кусте забытую детскую варежку. Страшно было подумать, что начнется зимой, когда все это беззащитное убожество будет стыть на ледяном ветру.</p><p class="p1">Но среди всего этого был Игорь, к которому она ездила теперь уже ежедневно, не заботясь о том, чтобы выдумывать объяснения для мужа; она все равно возвращалась домой каждый вечер, потому что остаться у Игоря ночевать значило внести новый вклад в общую энтропию. Объяснить она ничего не могла бы – просто знала, и все. По этой же причине нельзя было сейчас уходить от мужа, не выпадавшего из прострации, – это было бы уже полное предательство, за которое ее и всю страну должны были окончательно покарать.</p><p class="p1">Иногда, когда уж вовсе невмоготу было терпеть (да и в метро заходить было все страшнее), они брали машину до Свиблова – не так уж далеко от «Алексеевской», близ которой размещался «Офис».</p><p class="p1">– А чего ты не выучишься водить?</p><p class="p1">Они целовались на заднем сиденье, не стесняясь частника.</p><p class="p1">– Мне нельзя. У меня слишком силен инстинкт межпланетчика, космолетчика.</p><p class="p1">– Что, можешь слишком разогнаться?</p><p class="p1">– Да не в том дело. Это огромная, сложнейшая система – космолет. Обязательно нужно каждый день тренироваться, иначе навык уходит. У меня в компе тренажер.</p><p class="p1">– Покажешь?</p><p class="p1">– Никогда в жизни. Секретность.</p><p class="p1">– А машина что, сбивает навык?</p><p class="p1">– Ну конечно. Я, как только сяду за руль, буду сразу искать рядом с ним демпфекс, трансмутатор, кузельвуар… Без пумпинга вообще не могу за рулем находиться.</p><p class="p1">– Пумпинг – это такой… с пумпочкой, да?</p><p class="p1">– Почему, в последних моделях без пумпочки. Она же нужна была только для экстренного зависания над территорией, если что-то интересное внизу. А в последних моделях само тормозится, когда что-то интересное.</p><p class="p1">Мимо пронесся серебристый «мерс» – почему-то с вешалкой внутри; на вешалке красовалось минималистское вечернее платье. За рулем сидела азиатка с длинными черными волосами и яростно что-то орала в крошечный мобильник – выражение лица было самое чингисханское. Некоторое время они глядели вслед «мерсу», потом переглянулись.</p><p class="p1">– Таргет-групп проехала, – сказала Катька. – Мечта Дубова.</p><p class="p1">– Знаешь, – задумчиво произнес Игорь, – если бы у меня был АКМ… я бы сейчас доказал, что выражение «таргет-групп» имеет, помимо переносного, вполне буквальный смысл.</p><p class="p1">– Что, и не жалко?</p><p class="p1">– Да чего там жалеть. Я уверен, она внутри пустая. И свиномарку бы ей разнес к чертям собачьим…</p><p class="p1">– Как ты сказал? – Катька захихикала. – Свиномарка?</p><p class="p1">– Ну да. У вас же тут дикая путаница в языке. Есть два нормальных слова: иноматка и свиномарка. Иноматка – это источник энергии для инопланетян, мы подлетаем к ней кормиться, когда слабеем. Кстати, расположена в «Ротонде». Помнишь, там много было наших? Вот толстая тетка за стойкой – это и есть иноматка, я к ней подошел якобы расплачиваться и быстро подзарядился. А свиномарка – это тяжелый бронированный автомобиль с пятачком, в нем ездят свинтусы. Количество свиномарок в городе – критерий его готовности к уничтожению.</p><p class="p1">– И что, решение принимают у вас?</p><p class="p1">– Да зачем, господи! Просто, если количество свиномарок близко к критическому, нам надо активизироваться и искать тех, с кем должны работать эвакуаторы.</p><p class="p1">– Слушай… А весь этот кошмар как-то связан с количеством свиномарок в городе?</p><p class="p1">– Конечно. Только не напрямую. Там все сложно. Какая-то формула есть, но это прогностики занимаются. Что-то вроде, не помню… квадрат числа свиномарок поделить на три и прибавить 666, и будет точная дата окончательного конца. Где-то за неделю до нее надо собирать людей, пока паника не началась, – и туда.</p><p class="p1">– Куда?</p><p class="p1">– Ко мне домой. Куда мы, собственно, и приехали.</p><p class="p1">Иногда она психовала и у него дома, где, вообще-то, чувствовала себя в блаженной изоляции от всего окружающего ужаса, да и от себя самой – тут не надо было ничего решать и никого бояться; но бывали дни, когда она не могла сразу успокоиться. В такие дни она шестым, седьмым, двадцать пятым чувством понимала, что все дело было в них, что из-за них трещит и разламывается мир, в котором чеченцы или арабы играют лишь скромную роль исполнителей, а вот от Игоря с Катькой в самом деле что-то зависит. Все более очевидная, гнетущая второсортность окружающего – будь то продукты, журналы, телепрограммы, лица людей в транспорте и их убогие страхи – диктовалась только тем, что первого сорта мир уже не выдерживал. Ему казалось комфортнее, спокойнее так вот и соскользнуть в небытие – медленно, как бы в полузабытьи; тогда как все настоящее – хотя бы один настоящий телеканал – немедленно вспарывало гнилую, по швам ползущую ткань и ускоряло неизбежное. Все словно сговорились жить вполсилы, терпеть из милости, читать дрянь, жрать тухлятину, и стоило среди этого появиться настоящей любви, как мир немедленно пошел вразнос. Если бы они не любили друг друга, все так и сошло бы на тормозах, негромко, вполголоса, в медленном и шуршащем полураспаде, в тихом гниении, в уютной грязце… это зрелище наполняло Катьку таким омерзением, что она немедленно просилась за компьютер: не рисовать, просто поиграть, чтобы расслабиться. Он никогда не разрешал – это была одна из самых странных странностей.</p><p class="p1">– Ты же в самолете не просишь, чтобы пустили порулить.</p><p class="p1">– А что, у тебя тут… жизнеобеспечение?</p><p class="p1">– Ну конечно. Он меня поддерживает во всем. Ты одну кнопку не так нажмешь – а у меня анализатор воздуха запорется, другую нажмешь – пищеварение отрубится…</p><p class="p1">– Он же выключен.</p><p class="p1">– Это монитор выключен. А сам, видишь, мигает. Это он в спящем режиме, а в бодрствующем тебе его видеть нельзя.</p><p class="p1">– А почему клавиатура русская?</p><p class="p1">– А где я нашу возьму?</p><p class="p1">– Ну… с собой привез бы…</p><p class="p1">– Я и так до хрена с собой привез. У нас каждый килограмм на счету. Он отлично управляется и с русской.</p><p class="p1">– Ну дай я хоть в «саперчика» сыграю!</p><p class="p1">– Ты что, с ума сошла?! У нас «сапер» – одна из главных программ! Ее можно открывать, только если наверняка выиграешь.</p><p class="p1">– А если нет?</p><p class="p1">– А если нет – это самоликвидация ракеты! На чем я домой полечу?!</p><p class="p1">– И где она у тебя сейчас? – Катька заглядывала под диван.</p><p class="p1">– В надежном месте. Все тебе покажи…</p><p class="p1">…И если бы потом спросить Катьку – ну, а главным-то что было, еще тогда, в октябре? – она задумалась бы ненадолго, в своей манере, кусая нижнюю губу, а потом тем решительнее, тряхнув головой, ответила бы: счастье, счастье. Особенность любви в том, что ее не вообразишь, как нельзя вообразить, скажем, горячую ванну. Есть вещи, которые словами не описываются, и они-то наиболее драгоценны. Как описать, что в комнате включили свет? Вошли, включили, все стало уютным и жилым, появилась возможность жить, надежда, гармония… Вот так и тут – включили свет, и началась жизнь, а когда ее не было, о ней и помыслить было нельзя. Все стало подсвечено, на все страхи и обиды нашлось универсальное «а зато», включился дополнительный двигатель – демпфекс, трансмутатор, кузельвуар. Никакое воображение, даже самое сильное, никакая память, даже крепчайшая, не заменит присутствия живого человека, любящего нас. Человек, любящий нас, поил нас чаем, раздевал нас, долго и с умилением смотрел на нас. Любовь и есть, в сущности, восторг и умиление при виде другого человека, но этого-то наиболее человеческого чувства мы почему-то давно не встречали не только на собственных путях, но и вокруг. Как левые и правые у нас на родине всегда умудрялись промахиваться мимо огромного главного, с издевательской точностью попадая в десятистепенное, так и люди вокруг интересовались всем, кроме людей, хотя ничего интересного, кроме них, на самом деле просто нет. Впрочем, может быть, он так человечен потому, что сам – нечеловек, и чтобы любить меня, надо быть не таким, как я? Говорила же одна злая женщина: я не Господь Бог и не кошка, чтобы любить людей. Но нет, и это неправда – разве можно любить только высшее или низшее существо? Любить можно только равное, а где тут найдешь равных… таких же бедных…</p><p class="p1">– Учти, – сказал он однажды, – со мной тебе ничего не угрожает.</p><p class="p1">– Почему? По-моему, наоборот. Я все время боюсь теперь. Вдруг как-нибудь проговорюсь, что-нибудь выплывет, кто-то догадается… Ты меня сделал гораздо уязвимей, если хочешь знать. Я была как цыпленок в яйце, а теперь вылупилась. И теперь мне со всех сторон угрожает черт-те что.</p><p class="p1">– Пока я с тобой, – серьезно повторил он, – с тобой ничего не будет.</p><p class="p1">– Ага. Если это шантаж, то я ведь и так не собираюсь уходить.</p><p class="p1">– Считай, что шантаж. У вас всегда называется шантажом то, что у нас называется гарантиями.</p><p class="p1">Он ничего не рассказывал о себе. Это и хорошо, она много рассказывала сама, – чего там, она всегда лучше умела говорить, чем слушать. Брянск, бабушка, которую она любила больше матери, брат Мишка, с которым никогда нельзя было разговаривать – он принадлежал к трудной породе постоянно защищающихся людей, уязвленных с самого начала и непоправимо, и в математику свою ушел только потому, что она идеально защищала от всего, позволяла быть высокомерным, отрицать все, чего нельзя просчитать…</p><p class="p1">– Ты знаешь этот тип?</p><p class="p1">– Их полно на самом деле. Я их очень часто наблюдаю в ЖЖ.</p><p class="p1">– Извини, программеров среди них тоже страшное количество. Специфический фольклор, многословные шуточки, насквозь рациональное мышление, чистая механика, талмудизм, каббала… Кстати, они часто евреи. Тебе никогда не приходило в голову, что Бог, которого они вечно обвиняют в нетерпимости, тоталитарности и всем прочем, гораздо терпимее, чем они все? Потому что в их мире просто нет места тому, чего они не понимают. Говоря, что они не верят, они ведь на самом деле отрицают нашего Бога, а своего не дают тронуть никому. Страшно подумать, какой у них Бог. Что-то совершенно безвидное, безводное… Мишка вечно издевался, что я хожу в церковь. Он сам не мог там и минуты вынести. Вечно приставал с вопросами, как Бог терпит.</p><p class="p1">– Что?</p><p class="p1">– Ну, все это… У него была к нему масса претензий. Вот к реальности без Бога – никаких претензий, а к Богу – масса. Улавливаешь? У меня почему-то никогда не было вопроса, почему он терпит. Я же понимала, что он не терпит. В конце концов, есть я, мне вложено какое-то нравственное чувство, которое было бы совершенно неоткуда взять, если бы мир только этим, вот только этим, – она показала на окно, – и ограничивался. Сидит человек в окопе и спрашивает: как это маршал Жуков все это терпит?!</p><p class="p1">– Ты что, видишь его похожим на маршала Жукова?</p><p class="p1">– Нет, конечно, боже упаси. Я думаю, он такой… капитан Тушин.</p><p class="p1">– Но тогда над ним должен быть еще кто-то?</p><p class="p1">– Обязательно. Вот такой, который этим рисуется… математикам… Суперкомпьютер, черный метеорит, башня в пустыне.</p><p class="p1">– А брат давно уехал?</p><p class="p1">– Пять лет. Сразу, как закончил. Три года назад родителей забрал. Очень успешный, я не удивлюсь, если он Нобелевку получит. Мишка в принципе приличный человек. Я просто никогда не могла с ним разговаривать. Слушай, а у вас верят во что-нибудь?</p><p class="p1">– Да у нас почти всё как у вас. В этом смысле точно.</p><p class="p1">– И как по-вашему Бог? Тоже тридцать три слога?</p><p class="p1">– Нет. У нас несколько слов на самом деле.</p><p class="p1">– В смысле? Отец, Сын и Дух Святой?</p><p class="p1">– Нет, немножко не так.</p><p class="p1">– А как? Язычество?</p><p class="p1">– Тоже нет. Ну, это трудно объяснить… В принципе почти как у вас – троеипостасность. Только у вас отец, сын и дух, а у нас отец, мать и дитя.</p><p class="p1">– Слушай, как интересно.</p><p class="p1">– Ну да… это точней, кажется… Есть Бог, который делает. Так называемый Кракатук – в честь его наши вулкан у вас назвали.</p><p class="p1">– И еще орех.</p><p class="p1">– Ну да, потом орех… Богу действий поклоняются люди действий. Есть Бог, который думает, но не вмешивается. То есть у него как бы отдельно разум и чувства. Иногда берет верх одно, иногда другое. Это женская сущность, она успокаивает, проливает жир на волны, удерживает от резких движений.</p><p class="p1">– А называется как? Каракатица?</p><p class="p1">– Не кощунствуй, она называется Аделаида. Как известный мыс и соответствующая звезда.</p><p class="p1">– И внезапно в трубке завыло: «Аделаида, Аделаида»…</p><p class="p1">– Да, да. Именно так. Очень хороший стих.</p><p class="p1">– Он что, ваш?</p><p class="p1">– Бродский-то? Нет, ваш. Просто ему однажды по ошибке позвонили. Ошиблись номером. «Аделаида, Аделаида»… С тех пор он все думал, что Бог с ним разговаривает, а Бог понял, что его плохо слышно, и стал звонить по другим телефонам.</p><p class="p1">– А дитя? Дитя какого пола?</p><p class="p1">– Дитя еще не имеет пола, оно ребенок. Его зовут… сложный звук, такой лепечущий. Его очень трудно повторить в земных условиях, у нас тяготение меньше. Я тут знаешь, в первые дни как мучился? По-вашему это будет примерно… – Он приподнялся в кровати, вытянул шею и напрягся. – Ты-лын-гун, вот так примерно. Даже Ты-гын-гун. Но это и у нас не очень легко произносится. Ему редко молятся поэтому. Да он, собственно, и не делает ничего. Это третья ипостась, она, как ребенок, все понимает, но ничего не может объяснить. Только плачет.</p><p class="p1">– Почему плачет?</p><p class="p1">– Ну, людей жалко… вообще всех жалко… Почему ребенок все время плачет?</p><p class="p1">– Есть хочет.</p><p class="p1">– Неправда, он иногда поест и все равно плачет. Ты же знаешь.</p><p class="p1">– Подуша в первый год вообще не плакала. Все умилялись, какой спокойный ребенок.</p><p class="p1">– Нет, просто очень деликатный. Наверняка она все понимала, но считала неприличным привлекать к себе внимание.</p><p class="p1">– Игорь, ты лынгун.</p><p class="p1">– В смысле?</p><p class="p1">– В смысле врешь все. Ты это сейчас импровизируешь или давно сочинил?</p><p class="p1">– Дура ты, Катя, и всегда будешь дура. Я тебя, как слетаем туда в отпуск, в храм свожу.</p><p class="p1">– А что, на всех троих один храм? На Кракатука, Аделаиду и Тыгынгуна?</p><p class="p1">– Да, они же в одном доме живут. В храме очень красиво, есть кухня, ванная, все как у людей… Большая комната… В центре колыбелька висит, в колыбельку можно записочку положить.</p><p class="p1">– И что, исполняется?</p><p class="p1">– Когда как. Он же читать не умеет. Лучше Аделаиду просить.</p><p class="p1">– Исполняется?</p><p class="p1">– Чаще нет… но просто становится ясно, что и не надо было.</p><p class="p1">– Интересно, ты обо мне просил?</p><p class="p1">– Зачем? Я же знал, что ты будешь. У меня все с детства так складывалось, чтобы тебя встретить. Много было всяких знаков, предвестий…</p><p class="p1">– Типа?</p><p class="p1">– Ну, мелкие какие-то предвестия. Боги же тонко работают, не грубо… Например, идешь по улице, размышляешь о будущем – и вдруг вопль: «Ка-а-атька!»</p><p class="p1">– Почему?</p><p class="p1">– А это у нас так называется блюдо такое, вроде фруктового коктейля. «Ка-а-атька!» Ну, подойдешь, купишь, а потом подумаешь: не случайно все это, не случайно…</p><p class="p1">– Но ведь это и все остальные слышат! Если у вас так называется коктейль!</p><p class="p1">– Все слышат, да. Но о будущем в этот момент размышляю я один.</p><p class="p1">«Бля-а-ади! – заорали внизу. – Ка-азлы!»</p><p class="p1">Катька расхохоталась.</p><p class="p1">– Ты представляешь, – выговорила она сквозь смех, – ты представляешь, если кто-то в этот момент размышлял о будущем?</p><p class="p1">– А что, – сказал он, почесывая нос, как обычно делал в задумчивости. – Очень похоже на правду.</p><p class="p1">…Теперь она не убегала от него вот так, сразу: надо было как следует попрощаться, чтобы не рвать по живому. Они никогда не пили перед близостью, но после нее, перед расставанием, почти всегда. Рядом с его домом была забегаловка без названия, вечно пустое кафе с поразительной дешевизной: меню всегда было одинаковое – рассольник, котлеты, омлет с горошком, две водки на выбор – «Флагман» и «Гжелка», еще какая-то бормотуха и непременный «напиток», розовый, блеклый и на цвет, и на вкус. Они стояли там по полчаса, – денег на китайские рестораны уже не хватало, да и ни к чему было их тратить на китайские рестораны.</p><p class="p1">– Знаешь, почему тут такой тусклый свет? – спросил он однажды.</p><p class="p1">– Маскировка?</p><p class="p1">– Нет. Просто все эти люди – кассирша, бомж с бомжихой вон в углу, повариха тоже – выловлены из Свибловских прудов, что на улице Нансена.</p><p class="p1">– В смысле покойники?</p><p class="p1">– Ну конечно. Ты заметила, что здесь цены как пять лет назад? Теперь таких нет.</p><p class="p1">– Что, рассольник тоже… из покойников?</p><p class="p1">– Да нет, почему. Они нормально, честно работают. Просто человек, которого не устраивает текущая реальность, идет и топится в Свибловском пруду. Это место магическое, вроде Китеж-озера. После этого можно вернуться сюда, но уже в своем настоящем качестве.</p><p class="p1">– А иначе никак?</p><p class="p1">– Ну а как иначе? У вас нельзя просто своим делом заниматься… Если хочешь быть самим собой и получать за это деньги – пожалуйста, Свибловский пруд.</p><p class="p1">– Ты хочешь сказать… что я тоже не своим делом занята?</p><p class="p1">– А ты хочешь сказать, что рисовать для таргет-групп и есть твое предназначение? Иллюстрировать статьи про <em>MBA</em>?</p><p class="p1">– Наверное…</p><p class="p1">– Нет, мать. Я о тебе лучшего мнения.</p><p class="p1">– И что мне теперь, в Свибловский пруд?</p><p class="p1">– Почему, не обязательно. Можно ходить сюда. После тридцатого посещения произойдут значительные подвижки.</p><p class="p1">– И «Офис» закроется?</p><p class="p1">– Может, и так, а может, еще что-нибудь откроется… Хотя, по совести говоря, вряд ли. Не такое сейчас время, чтобы открывалось что-нибудь…</p><p class="p1">– И что, после смерти попадаешь в забегаловку?</p><p class="p1">– Если всю жизнь хотел в ней работать, правильно кормить правильных людей – да. А чего тут плохого? Может, кассирша всю жизнь была надзирательницей или вообще воспитательницей в детском саду, а ей хотелось приносить радость людям.</p><p class="p1">– А эти двое тоже хотели быть бомжами?</p><p class="p1">– Господи, да везде жизнь, – неожиданно громким и сильным голосом сказала бомжиха, обнимая бомжа.</p><p class="p1">Больше всего ее поражали теперь эти совпадения реальности с их мыслями и разговорами. После они еще немного погуляли по Свиблову – он показывал ей район; удивительно уютны были желтые и красные окна, она всегда больше всего любила смотреть на вечерние окна и еще на листву, зеленеющую в свете фонаря. И кое-где она еще зеленела – только горящие фонари попадались все реже.</p><p class="p1">– А это дом кружащегося мальчика, – сказал Игорь возле длинной серой семиэтажки, тянувшейся от метро до поворота на улицу Нансена.</p><p class="p1">– Какого мальчика?</p><p class="p1">– Такой особенный мальчик, я тебе его сейчас покажу. Но это ужасная тайна.</p><p class="p1">– Где он кружится?</p><p class="p1">– На втором этаже. Сейчас как раз… – Он взглянул на часы. – Обычно с семи до десяти. Так что все увидишь.</p><p class="p1">Они дошли до середины дома.</p><p class="p1">– Отойдем, а то не видно… Лучше всего с другой стороны…</p><p class="p1">Они перешли Снежную. На втором этаже, прямо над козырьком третьего подъезда, светилось окно, слева и справа темнели два тусклых квадрата.</p><p class="p1">– Он, по-моему, один живет. Там должна быть двухкомнатная квартира, но ни в другой комнате, ни в кухне света нет. Сейчас, погоди.</p><p class="p1">Пока смутно виден был только желтый шкаф, дешевый, из ДСП. Мальчик появился неожиданно. Он плавно протанцевал из глубины комнаты к окну, покружился с высоко поднятыми над головой руками и отвальсировал обратно, к невидимой противоположной стене.</p><p class="p1">– Что он делает? – испуганно спросила Катька.</p><p class="p1">– Не бойся, пожалуйста. Он хороший, безвредный мальчик, ыскытун. Просто танцует.</p><p class="p1">– Что, учится?</p><p class="p1">– Не знаю. Я уже довольно давно тут жить, иногда прогуливаться от страшное одиночество. Смотреть окна, изучать реальность. Пять месяцев уже.</p><p class="p1">– А до того где был?</p><p class="p1">– Неважно. – Мальчик опять появился в окне, и Катька заметила, что волосы у него на голове темные, кудрявые и какие-то высокие, как – читала она – бывает у запущенных душевнобольных, не дающих прикоснуться к своей больной голове. Они стояли вертикально, будто поднялись от внезапного испуга. Лица мальчика не было видно, и вообще Катька не понимала, с чего Игорь решил, что это мальчик. Может, взрослый мужчина. Но худоба, стройность, грация движений заставляла предположить, что он действительно юноша, почти подросток. Вот он опять удалился и опять подтанцевал к окну, и показалось даже…</p><p class="p1">– Слушай, он не кивнул нам сейчас?</p><p class="p1">– Нет, он всегда в этом месте отвешивает полупоклон.</p><p class="p1">– Господи, что же это с ним?! Давай, может быть, поднимемся к нему! Я боюсь. Никогда такого не видела.</p><p class="p1">– А ты не бойся. Развлекается человек, у каждого свои причуды.</p><p class="p1">– Может, он кому-то тайные знаки подает?</p><p class="p1">– Да. Шахидам. Помешались все на тайных знаках…</p><p class="p1">Они еще несколько раз ходили смотреть на мальчика, и Катька один раз чуть не решилась подняться к нему, но в последний момент оробела.</p><p class="p1">– Мне кажется, это все-таки болезнь, – неуверенно сказала она.</p><p class="p1">– Ну, если и болезнь, то не худшая. У нас с тобой, может быть, тоже болезнь.</p><p class="p1">– Конечно, – кивнула она. – Со стороны, наверное, без слез не взглянешь: гуляет какой-то дылда с козявкой, иногда они слипаются ртами…</p><p class="p1">…Двадцать седьмого случился тот разговор.</p><p class="p1">Начиналось все невинно – они ехали к Игорю из «Офиса», отпустили в четыре, у менеджмента случилась корпоративная вечеринка по случаю дня рождения бухгалтерши, и творческие сотрудники, которых на праздники менеджмента никогда не звали, слава тебе господи, получили вольную двумя часами раньше. Добирались на метро. Игорь листал свежий номер.</p><p class="p1">– Слушай! Какая прелесть!</p><p class="p1">– Что ты там нашел?</p><p class="p1">– Радикальное средство очистки организма. В течение шести часов – полное промывание желудка с одновременным его массажем. Представляешь, как они там сидят все… на креслах… все крутые, потому что стоимость процедуры – две наших зарплаты… Обсуждают, вероятно, перспективы российской экономики. Что-нибудь между собой трут. Ты замечала, кстати, что у них речь без существительных? Проплатить, отгрузить, потереть? Это у вас для конспирации так делается – или просто все происходит в пустоте?</p><p class="p1">– В пустоте, конечно. – Катька была усталая и грустная, и говорить ей не хотелось. Она даже злилась на Игоря, пытавшегося ее худо-бедно развеселить: шутить и век шутить – как вас на это станет! В конце концов, у него не было ни Подуши, ни Сереженьки, он никого на себе не тащил – чистый инопланетянин, человек ниоткуда…</p><p class="p1">– Вот. Они сидят, и тут тревога… Представляешь? В здании бомба. А они все – на этих клистирах, а? Как они с них пососкакивают и побегут!</p><p class="p1">Катька против воли улыбнулась.</p><p class="p1">– Ну ладно, – сказал он с неожиданной злостью. – Надо серьезно поговорить. Сама видишь, шутки кончились.</p><p class="p1">– Шутки давно кончились, – кивнула Катька, испугавшись на миг, что он затеет сейчас мучительный разговор об уходе к нему – а бросать Сережу в таком состоянии нельзя ни в коем случае – или предложит ехать к мужу вместе, говорить, разбираться… этого ей сейчас хотелось меньше всего. Она вообще ничего не могла теперь выдержать, из-за любой ерунды ревела и по-настоящему хотела одного – улечься с ним в родную свибловскую кровать, уткнуться, лежать молча, ничего не видеть и ничего не делать; может быть, даже спать. А вечером ехать назад. Слава богу, завтра суббота, и можно, стало быть, выспаться… навести порядок дома, погулять и почитать с Подушей, а потом, может быть, часа на два… просто на Воробьевых или где еще… под предлогом Лиды, неважно, придумаем.</p><p class="p1">– Наверху, а то шумно, – сказал он.</p><p class="p1">– Может, не надо? У нас так все было складно без выяснений…</p><p class="p1">– Я ничего не собираюсь с тобой выяснять, Кать.</p><p class="p1">Он ее обнял, и так они достояли до Свиблова. Против обыкновения он не тащил ее к себе, а повел в ту самую забегаловку, где и вечером пятницы не было почти никого. Взяли все тот же рассольник, котлеты с макаронами, две порции «Гжелки» по сто и розовый неизвестный напиток.</p><p class="p1">Выпили без тоста, некоторое время молча ели.</p><p class="p1">– За нас, не чокаясь, – сказала Катька.</p><p class="p1">– Не глупи.</p><p class="p1">Он доел рассольник и вытер рот салфеткой.</p><p class="p1">– Значит, Кать, – сказал он буднично и тускло, совсем не так, как начинал обычно свои истории. – Что делается, сама понимаешь. Надо сваливать.</p><p class="p1">– Игорь, у меня каждое утро с этого начинается. Если только он просыпается до моего ухода. Просыпается и вместо «доброго утра» говорит: «Надо валить». Тупо глядя в пространство, куда, видимо, предлагается валить.</p><p class="p1">– Да? И куда конкретно?</p><p class="p1">– Он не знает. Вообще, у него есть какая-то еврейская родня, почти мифическая, по-моему… Свекровь намекала, что его папа был еврей. Они же не регистрировались, документов нет, но он уверен, что можно найти. И тогда его возьмут хоть в Израиле, хоть в Германии, а меня и Польку с ним.</p><p class="p1">– Нет. Я тебе предлагаю не туда.</p><p class="p1">– А куда? В Полинезию?</p><p class="p1">– Не-а.</p><p class="p1">– Ну, не томи.</p><p class="p1">– Ты девочка догадливая, сама поймешь.</p><p class="p1">– Не пойму, Игорь. У меня от ранних пробуждений ум набекрень, ты же видишь.</p><p class="p1">– Там двадцать слогов, Кать. Утомишься говорить.</p><p class="p1">– То есть к тебе домой? – проговорила она в некотором отупении.</p><p class="p1">– Да, да.</p><p class="p1">– Ну так мы туда и идем…</p><p class="p1">– Катя, ты прикидываешься, что ли?</p><p class="p1">Конечно, ее сбила с толку эта непривычная серьезность.</p><p class="p1">– Извини, милый. Я думала, мы действительно не шутим.</p><p class="p1">– Мы действительно не шутим, – сказал он и посмотрел на нее так, как не смотрел еще ни разу: так, по ее представлениям, должен инструктор по парашютному спорту подталкивать взглядом новичка.</p><p class="p1">Для издевательства это было слишком.</p><p class="p1">– Так, – сказала она.</p><p class="p1">– Именно так.</p><p class="p1">– Игорь. Честное слово, я очень устала.</p><p class="p1">– А уж я-то как устал, – выговорил он тем же тяжелым голосом, каким, бывало, пародировал комиссара-поэта. – Чрезмерное тяготение. Грязь. Террор. Невежество. Менеджеры среднего звена. Рос среди приличных людей. Аристократ. Дурык в постель. И что у меня здесь? Ничего, кроме дурык в постель, и этой дурык я не приношу ничего, кроме отчаяния. Летим, Кать. Я совершенно серьезно.</p><p class="p1">– Это такое предложение руки и сердца?</p><p class="p1">– Я могу взять пять человек, – сказал он другим голосом, деловито. – Кроме нас с тобой. Больше пяти никак. Она не взлетит.</p><p class="p1">– Кто? Тарелка?</p><p class="p1">– Ну, назови тарелка. Хотя они мало похожи. Просто галлюцинации чаще всего бывают у домохозяек, вот им и мерещатся тарелки. Хорошо еще, что не веники. Тарелка на самом деле неудобна по форме, она плоская. Летательный снаряд должен быть узкий и высокий. Да увидишь.</p><p class="p1">– Возьми еще водочки, – попросила Катька.</p><p class="p1">– Зачем?</p><p class="p1">– Ну, может, поверю… Ты так рассказываешь…</p><p class="p1">– Я ничего не рассказываю, – сказал он. – Ты вообще ни хрена не понимаешь. Если бы ты знала то, что я знаю…</p><p class="p1">– И что ты такого знаешь?</p><p class="p1">Он отошел за водкой и принес еще два раза по сто.</p><p class="p1">– Что я знаю, это мое дело. Я и так тебе больше, чем надо, говорю.</p><p class="p1">– Слушай! – От водки Катька повеселела, ей стало тепло. – Ты меня так уговариваешь… прямо Сохнут. Я читала. И люди другие, и небо другое…</p><p class="p1">– Да, типа. Только в нашем смысле «восхождение» несколько буквальней, ты не находишь?</p><p class="p1">– Ага, а потом вы нами питаетесь. Там, наверху. Точно, я все придумала! Выжидаем кризисный момент, создаем на Земле панику, а потом говорим: пожалуйста, уезжайте. Эвакуация. Черт, разве плохой сюжет? Мы там, наверное, дефицитное лакомство. Вроде икры. За нас дают два, три зверька, за толстый человек – четыре зверька! Понимаешь, почему во время войн многие пропадают без вести? Это ведь ваши работают, так? Любимый! Дай слово, что ты съешь меня лично! А интересно, у вас это живьем? Там, у вас, ты, наверное, выглядишь совсем иначе?</p><p class="p1">– Да, – кивнул он серьезно, – немного иначе.</p><p class="p1">– Такой типа комар, да? Вонзаешь… и все высасываешь!</p><p class="p1">– Вонзаю, – согласился он.</p><p class="p1">– Но я хотя бы съезжу для начала на краткую экскурсию по вашей райской местности?</p><p class="p1">– Пять человек, – повторил он, не желая поддерживать игру. – И ни человеком больше.</p><p class="p1">– Вот всегда так, – сказала она грустно. – Когда ты придумываешь, я всегда подхватываю. А когда я придумываю, мы все равно продолжаем играть в твою дурацкую игру. Доминирование любой ценой. Пожалуй, я не дам тебе меня съесть. Пусть меня лучше съест кто-нибудь умненький, хорошенький…</p><p class="p1">– И у нас только неделя, – продолжал Игорь.</p><p class="p1">– Господи, ну почему неделя!</p><p class="p1">– Потому! – крикнул он, и кассирша обернулась в испуге, оторвавшись от газеты чайнвордов «Тещенька». – Ты же всегда все понимала, почему ты сейчас не понимаешь!</p><p class="p1">– Нет, я все понимаю. Жестокое время – жестокие игры. Просто мне не хотелось бы играть в «Спасение пяти», понимаешь? У меня уже и так две кандидатуры, которые вряд ли тебя устроят, и это совершенно не игрушки.</p><p class="p1">– Дочь не в счет. Три года… сколько она весит? Килограммов пятнадцать?</p><p class="p1">– Двенадцать. Муж тоже сравнительно легкий.</p><p class="p1">– А мужа мы обязательно берем?</p><p class="p1">– Мужа, – зло сказала она, досадуя на упрямство и бестактность любовника, – мы берем обязательно, и это не обсуждается. Я не понимаю, почему мы должны продолжать этот дурацкий разговор, я лучше поеду домой.</p><p class="p1">– Катя! – сказал он таким измученным голосом, что у нее сразу прошла вся злость. – Кать, хочешь, я на колени встану? Ну пойми ты наконец, что началась жизнь!</p><p class="p1">Это было так забавно – до сих пор была не жизнь, а тут возникла летающая тарелка и реальность подошла вплотную, – что Катька улыбнулась и поцеловала его в небритый подбородок.</p><p class="p1">– Игорь, ты сделал все как надо. Я на какой-то момент действительно отвлеклась. За что я тебя люблю, знаешь? Нет, мы никогда не говорили об этом всерьез, но сейчас все можно. Игорь, я тебя люблю! Я так люблю тебя! Главным образом за то… это ведь все вранье, что любят просто так. Любят всегда за что-то. Я сейчас пьяная, пользуйся случаем, земная женщина рассказывает тебе всю правду о своем внутреннем устройстве. Любят тех, с кем нравятся себе. Любят тех, с кем можно быть хорошей, и умной, и повелительной, и жертвенной, и главное – что всё вместе. У нас такой быть направлений в искусстве – пуантилизм. Точечка тут, точечка там. Я быть молодая, глупая, очень увлекаться.</p><p class="p1">– У нас тоже это быть, – сказал он. – Тыды-кырлы.</p><p class="p1">– Да, да, правильно! Туда-сюда! И вот тебя я люблю за то, что с тобой можно столько всего пережить в единицу времени! Усталость, злость, страсть, восторг, испуг, раздражение, нежность, да, друг мой, такую нежность – я, кажется, сейчас всю эту забегаловку приняла бы в себя и поместила куда-то в вечное тепло! Я художник, я человек ис-кус-ства! Обрати внимание, я никогда тебя не рисую. Я столько раз пыталась это делать, но ты же как ртуть.</p><p class="p1">– Нас учат, – сказал Игорь.</p><p class="p1">– Чему?</p><p class="p1">– А вот этому. Незаметность в толпе, смена масок. Я разведчик-эвакуатор, хочешь ты этого или нет.</p><p class="p1">– Да, да, конечно! Ты разведал меня и эвакуировал, и я два месяца прожила в твоем дивном новом мире со зверскими деньгами! Ты столько всего придумываешь, я так тебе благодарна. Не сердись, милый, что какие-то твои игры я поддерживать не в состоянии, потому что у меня есть муж и дочь, и это очень взрослая жизнь. Как все художники, я была и буду ребенком и готова с тобой играть в любые игрушки относительно меня, но не пытайся сочинять мне сюжеты про Сереженьку и Подушеньку, съемка окончена, всем спасибо! – Она снова чмокнула его, на этот раз в глаз. – Мой миленький глазик, такой красненький.</p><p class="p1">– Я тебя тоже очень люблю, – сказал Игорь. – Я так тебя люблю, что даже тебе верю. Хотя у наших есть правило никогда не верить вашим.</p><p class="p1">– Это еще почему?</p><p class="p1">– Просто ваши рано или поздно обязательно предают наших, и я слишком хорошо знаю, как это бывает.</p><p class="p1">– Может, ваши сами сбегают? Когда все становится серьезно?</p><p class="p1">– Это точно, – кивнул он. – Когда у вас все становится серьезно, нам тут делать больше нечего. Вам, впрочем, тоже.</p><p class="p1">– Пошли к тебе. Пожалуйста, пошли к тебе. Еще немножко, и я перейду на следующий уровень. Мне станет очень-очень грустно, я буду реветь. Потом мне станет очень-очень зло. А сейчас я очень-очень хороша для тыбыдым, я гожусь для этого в высшей степени.</p><p class="p1">– Катя, – он взял ее за плечи и встряхнул. – Катя, детка. Сегодня не будет никакого тыбыдым. У меня теперь очень, очень много работы. Ты же видишь, я в «Офисе» почти не появляюсь. Только тебя забираю.</p><p class="p1">– Почему не будет тыбыдым? – захныкала Катька. – Ты не смеешь у меня отбирать единственную радость… дурык…</p><p class="p1">Она слегка поколотила его маленькими твердыми кулачками.</p><p class="p1">– Ты что, только в процессе тыбыдым теперь можешь нормально разговаривать? – спросил он.</p><p class="p1">– Не знаю. Пойдем к тебе, а? На нас уже смотрят. Ну пойдем, пожалуйста, я так люблю, когда у тебя… Не хочешь тыбыдым – не надо тыбыдым, просто посидым…</p><p class="p1">В этот раз все было удивительно грустно. Катька гладила его затылок, тощую спину с выступающими лопатками, костлявые плечи, почти безволосую грудь, целовала в глаза и брови и вообще чувствовала себя так, будто прощалась навеки. Все было очень нежно, медленно и бессловесно.</p><p class="p1">– Правда, будто навек, – сказала она наконец. – Ужасная вещь расставаться навек, никому не пожелаю. Ведь ты не улетишь без меня?</p><p class="p1">– Нет, – сказал он глухо, – я не улечу без тебя.</p><p class="p1">– Нет, лучше лети. Я эгоистка. Я не имею права тебя задерживать, ты здесь погибнешь. Наши пертурбации не для вашей конституции. Скажи, а никак нельзя там пересидеть страшное – и вернуться?</p><p class="p1">– Никто еще не возвращался, – сказал он.</p><p class="p1">– Это я знаю. А почему?</p><p class="p1">– Не знаю. Я вот курсирую туда-сюда, и мне тоже трудно, но я еще кое-как могу. Потому что я там вырос, и мне слетать в ваш ужасный мир – не такое уж испытание. А ваш человек вырос здесь, и когда он попадает туда, для него мысль о возвращении уже совершенно невыносима. Ну как… с чем бы сравнить? Надзиратель, допустим, может жить дома и каждый день ходить в тюрьму и обратно. А заключенный, если освободится, никогда уже не вернется в тюрьму, по крайней мере добровольно.</p><p class="p1">– Но если он там у вас чего-нибудь начудит, его же вернут насильственно?</p><p class="p1">– Было несколько раз. Они потом называли себя духовидцы. Рассказывали ужасные глупости про какие-то дома в тысячу локтей, про золотые комнаты… Жуткие шарлатаны, эвакуированные по ошибке. У нас каждый такой случай в учебниках разбирается. А тут на этих духовидцев чуть не молились, каждому слову внимали… Как можно верить людям, которых сослали обратно на Землю?</p><p class="p1">За окном бухнуло.</p><p class="p1">– Выхлоп, – успокаивающе сказал он.</p><p class="p1">– Нет, – медленно проговорила Катька, – не выхлоп.</p><p class="p1">– Если я говорю, значит, знаю! – крикнул он неожиданно. – Почему ты не хочешь понять! Черт с тобой, я пойду против всех инструкций. Завтра посмотри телевизор, тогда, может, и до тебя дойдет.</p><p class="p1">– Телевизор? – Катька села на кровати. – Ты же знаешь, они почти ничего не говорят…</p><p class="p1">– На этот раз скажут. И пусть потом со мной делают, что хотят, – я вообще не могу в таких условиях работать, если никто не верит ничему… Растлили всех к чертовой бабушке, ни одно слово ничего не весит! Пока носом не ткнешь…</p><p class="p1">Катька похолодела. До нее наконец дошло.</p><p class="p1">– Игорь! – сказала она и закашлялась: в горле сразу пересохло. – Если ты что-то знаешь и ничего не делаешь…</p><p class="p1">– Да делаю я, делаю!</p><p class="p1">– Что же ты мне сразу не сказал… Мы тут с тобой… а там действительно…</p></span></span>
