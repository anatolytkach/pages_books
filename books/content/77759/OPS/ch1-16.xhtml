<p class="p">7</p>
</div><p class="p1">С такой высоты, правду сказать, она еще не прыгала и потому решила полететь затяжным; рванула кольцо, только когда вовсе нечем стало дышать, и повисла над тайгой. Это время следовало использовать по максимуму, чтобы запомнить с высоты главные ориентиры. Наверху, громко ревя, удалялся на самый Дальний Восток самолет «Родина»; Поля прислушалась, ожидая далекого треска, но треска не было.</p><p class="p1">Про дальнейшее она рассказывала только Толе, и всегда по-разному. С нее стрясли, конечно, брошюру «Дневник штурмана», живенько сочиненную Бровманом как главным специалистом по авиационной теме, но, в общем, то, что Поля делала в тайге с 23 сентября по 6 октября, достоверно известно не было. При себе она имела опий, нафтобензол, две плитки шоколада «Гвардейский» и десять неучтенных мятных конфет «Монпасье», которые сунула ей дочь липкой ручонкой. Поистине дети что-то такое чувствуют. Приземлилась Поля в лес, западнее крупного болота, меж двумя шестиметровыми соснами, сумела зацепиться ногами за один из стволов и по нему съехала. Погода была на удивление теплая, Поля никогда прежде не бывала на Дальнем Востоке и не предполагала, что осенью тут как в Крыму. Солнышко светило сквозь туман. Ощущение было инопланетное, и Поля решила думать, что она осваивает другую планету. Когда-нибудь, в свои пятьдесят, она там и окажется, судя по темпам развития авиации, но пока ей предстояло пробиваться к самолету. Минут через десять после ее приземления раздался отдаленный выстрел – так они должны были, согласно инструкции, известить друг друга и окружающих о посадке в лесу; хорошо грохнуло, значит, до места приземления «Родины» оставалось километров пять. Поля быстро сориентировалась на звук и установила, что идти надо на юго-юго-восток, но нельзя же было идти вот так, сразу. Надо было подготовить экипировку, в меховой броне было жарко, а между тем сейчас только полдень по местному времени (Поля уже перевела часы), ночью же придется кутаться. Тогда она разделась до белья, а все обмундирование компактно, как учили, увязала, распределив в два узла. Для начала она позволила себе одну полоску «Гвардейского» и пошла, разговаривая с Толей. Вот то жалобное, что слышал Толя перед вылетом, это самое оно и было.</p><p class="p1">Жалобность же происходила оттого, что на земле все выглядело иначе, не так, как с воздуха. Летчик отличается от просто человека тем, что видит землю сверху, во всякой затее прежде всего вычленяет генплан, а ходить среди деревьев, не видя цели, ему унизительно. Поля почувствовала, что земля влажна, болотиста, что унты скоро начнут вязнуть, вспомнила, что в кармане у нее моток проволоки, и обвязала их по щиколоткам проволокой, на всякий случай. Моток проволоки, сказала она вслух, чтобы деревья тоже знали, есть в кармане у каждого порядочного связиста. Ее спрашивали потом: думала она о Жанне? Поля даже переспросила: о ком? Ну Жанна, Жанна, дочь твоя! Нет, о Жанне она совершенно не думала. О Сталине думала, да, но не то, что написал Бровман, а то, что Сталин взял за них ответственность, разрешил и оказался прав, потому что погода им не помешала, а просто они неточно сориентировались по Амуру. Все беды из-за Амура. Теперь они должны соответствовать. Девчонки живы, ну и она жива. Бабы, как говорит Волчак. Ей идти до них максимум два дня. Кроме того, впереди просвет. Впереди действительно была прогалина, но дальше все такой же лес. Строго на юго-юго-восток. Кстати, сильно захотелось пить, у нее была фляга и во фляге еще примерно стакан воды, Поля отпила половину, но о воде уже пора было подумать. Деревья вон тянут из земли, и советский человек может тянуть из земли. Советский человек может то, чего больше не может никто. Когда Поля выйдет, у нее будет огромная слава. О славе, правду сказать, она много не думала, и о том, что квартира будет другая, лучше, подумала только один раз и мельком. А вот Толя, подумала она, будет уважать гораздо больше, хотя Толя уважал и так, он никогда не говорил «баба». Грубят обычно фальшивые люди, ну или те, которые хотят, чтобы о них думали хуже.</p><p class="p1">Если бы было кому ее слушать в это время, кроме нас, – а кто такие мы, мы, если вдуматься, и понятия не имеем, – то эти слушатели могли бы изумиться тому, о чем говорит сам с собою человек за сто километров от жилья, затерянный в дальневосточной тайге обманчивой осенью, когда днем почти жарко, а ночью уй как неуютно. Дальневосточная тайга в эти дни так красива, что хоть пиши на эту тему диктант. Бесконечным золотым ковром расстилается пихтовый лес, если посмотреть на него с высоты полета черношейной поганки, как без всякого основания зовут эту хохлатую красавицу. Но и с точки зрения тигрового ужа, как с полным основанием зовут этого полосатого красавца, есть на что посмотреть в болотистых лесах по правому берегу Амура. Низкорослые колючие кустарники, оплетенные ползучим плющом, причудливо разрослись у подножия краснеющих на закате сосен. И над всем – небо такой пронзительной синевы, что мучительно жалко сознавать: на сто километров вокруг никого, никто его и не увидит. И как будешь помирать – тоже никто не увидит. Но о смерти тогдашний человек не думал. Проворные белки стелются по редким, уже облетающим березам. На одну такую березку Поля оперлась – березка так и рухнула, потому что насквозь сгнила; так, пожалуй, и костра приличного не разведешь! Спички передали им от Папанина, превосходные охотничьи спички в непромокаемом коробке, обтянутом красной резиной. Но жечь костер было еще не время. Поля твердо решила идти, пока сможет различать землю под ногами. Сказывалась близость болота, и Поля срезала толстую палку, чтобы прощупывать сомнительные участки. Провалишься, и с концами. Вот, сказала она вслух, теперь со мной палка, я не одна. Она стала разговаривать с палкой, рассказала ей все, что думала о конструкторах, запихавших умформеры под сиденье и не защитивших их от холода. Что-нибудь надо было придумать, теплопровод какой-нибудь от мотора. Тут раздался отдаленный рев, но это совершенно необязательно мог быть медведь, кто угодно мог это быть. Жаль, что их не заставили перед полетом досконально изучить фауну дальневосточной тайги, а также ее разнообразную флору. Поля знала, положим, что бывает тут китайский лимонник, весьма тонизирующий, любимый спортсменами, но черта ли отличишь его от какой-нибудь волчьей ягоды? К счастью, когда начало темнеть, она набрела на небольшую поляну: здесь, казалось ей, медведь не нападет, он опасается открытых мест. Поля соорудила себе нечто вроде меховой берлоги и, не разжигая костра, напившись вкусной, отдающей торфяником воды из ледяного ручья, заснула.</p><p class="p1">Это был день диктанта, так она его для себя обозначила в идеальной штурманской памяти; и наступил день пения.</p><p class="p1">Проснувшись рано, не было еще и семи, она зашагала с песнями, всеми, какие знала, а знала Поля не очень много, то есть часто забывала слова, но ля-ля-ля ее тоже бодрило. Она спела марш летчиков, марш стахановцев, марш Первой конной, песню о встречном плане и песню о веселом ветре. Странным образом голод ее не мучил, мучила мысль, что вот прошла она уж, верно, километров десять, кабы не двенадцать, и все еще не слышит никаких звуков жилья, и ни один самолет не пролетел над ней, а могли бы уже искать. Но искать еще рано было, девушки и сами, наверное, ждут, а может, идут к жилью, но им в любом случае легче – у них припасы, в том числе ее мешок; Поля впервые подумала о Вале и Соне с неприязнью. Ужасный рев не повторялся, зато стали появляться странные отметки на деревьях – то ли медведи их обгладывали, то ли охотники обтесывали; потом случилось нежданное подспорье – Поля нашла две обсыпные густо-красные рябинки, много съела, несколько веток с алыми кистями сорвала. Рябина бодрила, тонизирующий же китайский лимонник так и не встречался. Попадались растения, каких она совершенно не знала, – плющ с темно-лиловыми листьями незнакомой формы, разлапыми, как у крымского платана, и темно-лиловые ягоды, есть которые Поля опасалась. Однажды она палкой нащупала бочажину, чуть не провалилась, но на всякий случай обошла ее за три метра. Часам к пяти вечера, когда она перепела все марши, стала видна невысокая, но широкая сопка, преграждавшая ей путь; переваливать ее поверху Поля не решилась, экономя силы, рассудила обойти слева, но тут с ума сошел компас. По всей вероятности, здесь была крупная аномалия, следовало нанести это место на карту и впоследствии организовать добычу; всплыло в памяти, как в восьмидесятые годы прошлого века была обнаружена Курская магнитная аномалия, запасы которой, Поля помнила, превосходили все совокупные рудные месторождения Америки – или не превосходили, но в любом случае заставили Америку поежиться. Но пока аномалия не была нанесена на карты, она могла здорово сбить Полю с пути; по счастью, всякий штурман умеет ориентироваться по звездам. Когда эти последние явились указать ей направление, Поля легко обнаружила Большую Медведицу, но звездищ было столько и такие крупные, мохнатые, каких она сроду не видела под Москвой. Там вечно мешают дымы и человеческие испарения, а здесь не было в эту ночь ни дыма, ни тумана, и небо на Полю смотрело очень внимательно. Она впервые поняла ужас древнего человека, который на все это смотрел, и вместе с тем ей стало ужасно грустно, потому что долететь до звезд ее поколению не суждено, да и Жанне вряд ли. Думать о Жанне она себе запретила еще вчера, однако ночью эта мысль толкалась в сознание так же упорно, как в свое время толкала ее изнутри Жанна, ребенок неспокойный, зато после рождения удивительно мирный. Жанна всегда играла сама, выдумывала себе тихие игры, рано выучилась читать и пересказывала ей книжки. Я отвратительная мать, сказала себе Поля, я вечно занималась освоением штурманского ремесла, которое, конечно, помогает мне сейчас сориентироваться, но выйти, вероятно, не поможет, и я никогда уже не объясню Жанне, какая она прекрасная дочь, с какой нежностью я смотрела на ее раскраски, всегда такие аккуратные, и на то, как она тихо играет со счетами или палочками, чтобы не отвлекать меня от штурманских учебников. Потом Толя: Толю я очень любила, он знал, но разве я ему что-нибудь сказала? Разве что в последний, нет, не последний, конечно, раз, когда он пообещал все решить, а потом его вдруг услали, потому что так было надо. Он тоже сейчас может смотреть на звезды, но ведь не смотрит, там сейчас еще светлый день; от этой мысли Поля заплакала почему-то, от остальных не плакала, а эта ее прошибла. Но она съела еще полоску шоколада и стала представлять инопланетную жизнь, и от страшного количества тихих крупных звезд ей захотелось еще что-то спеть, только не марш. Таких песен она не знала, кроме одной, которой ее учила мать, немного знавшая по-французски, – что же, тогда все немного знали, а французский-то и не пригодился: «Мон ша, мон пти ша, а маль а ла тет, маман люи а фет ун шапо пур са фет, э де сулье лиля, э де сулье лиля. – Моя кошка, маленькая кошка, у нее болит голова, мама сшила ей шапочку ко дню рождения и лиловые туфельки». И с матерью я тоже вела себя отвратительно… Нет-нет, хватит… Поля съела таблетку нафтобензола, думая, что вдруг его побочное действие окажется успокоительным. И то ли она обессилела от слез, то ли действительно таблетка оказалась универсальной, но она заснула у подножия сопки, и настал третий день – день радости.</p><p class="p1">Ей показалось вдруг, что сегодня она дойдет, вон и компас, как ни странно, перестал беситься и четко указывал на север, совпадая со свидетельствами солнца и мха. Тут, наверное, была такая аномалия, что вечером есть, а утром железо куда-то перемещается. Она обязательно выйдет сегодня к самолету, тем более что и разбудило ее нечто похожее на выстрел. Очень может быть, что это слуховая галлюцинация, а может быть, девчонки стреляют, а еще лучше, если бы охотники. Охотники вывели бы ее к жилью, она рассказала бы про аномалию, они бы вместе поохотились… Ни разу в жизни, казалось Поле, она не чувствовала себя такой сильной, одинокой и странно бодрой. А причина этой бодрости была в том, что ей приснился не совсем приличный сон. Американцу или европейцу снилась бы еда, в крайнем случае дом. А ей приснилось, что ее раздевал Толя Петров и, сняв очередной предмет одежды, целовал обнажившееся место. Никогда у них такого не было, да и времени никогда не было. Сколько всего они попробуют теперь! А если не попробуют никогда… Эту мысль Поля прогнала – мир смотрел выжидательно, но одобрительно. Так смотри, мир! Она шла так быстро и бодро, на последнем остатке сил, и так пекло солнце, тоже на последнем остатке, что ей вдруг захотелось раздеться. Она сперва разулась, потом скинула все и принялась бегать по холодной траве, по желтым листьям, абсолютно свободная от всего, что ее раньше сковывало. Ну правда, нет же никого! И она полежала под солнцем, представляя разное, а кое-что и вспоминая, но больше представляя. Вообще, у нее, как ни странно, с мужем было все не так плохо, она быстро начала находить в этом вкус, а с Толей было совершенно другое – просто он был летчик, они оба летчики, у них, постоянно летающих в почти загробные области, к близости отношение особое. Когда на солнце набежало облако, а она достигла нужного результата, Поля стала медленно одеваться, усмехаясь с чувством легкого стыда. Все-таки кто-нибудь видел, не бывает так, чтобы нас не видел совсем никто… В этот день она прошла километров семь и впервые сильно устала, и вечером ей уже по-настоящему захотелось есть, и она добила первую плитку «Гвардейского», а утром следующего дня ей повезло найти грибы.</p><p class="p1">Она поначалу думала, что грибов будет полно, но почему-то в этой теплой тайге не было ни обещанного лимонника, ни грибов, кроме поганок. И вдруг нашла зеленые сыроежки, самые, как Поля читала, вкусные и питательные, Причем росли они, как и положено, кругами. Это был как бы привет из средней полосы, из детских выездов с пионерами, из сказок про Бабу-ягу, которая эти круги и насаждает. Поля собрала много, собирала в майку и решила развести костер, сложила сухие ветки и подожгла – и тут случилось страшное: участок оказался сравнительно сухой (на болоте и гриб бы не вырос), пламя побежало во все стороны, как от тополиного пуха, и выжгло вокруг нее такой же ведьмин круг. Она побежала затаптывать, но куда там – загорелся мох, а может, и торф лежал близко, и пошел от папанинской спички настоящий лесной пожар, про такие Поля только читала да видала иногда сверху дым вокруг Щелкова. Что ж теперь будет, подумала Поля, загорится тайга, и я в ней сгорю! Но огонь разбегался прочь от нее, а она так и стояла в черном круге, и это показалось ей сначала ужасным знаком, а потом она подумала, что и правильно: от большевика должна в ужасе шарахаться природа, потому что он сильнее природы, природнее природы. Полю воспитывали последние пять лет в убеждении, что она не просто большевик, а сверхбольшевик, – летчик, ставящий рекорды, еще дальше шагает на пути к сверхчеловеку. Она не могла умереть в тайге, как обычный человек, она прошла бы любое расстояние и вышла к людям и этих людей разагитировала; и то, что от нее убежал огонь, наполнило ее новым восторгом. Но сыроежки пришлось съесть сырьем, а это было совсем не то. Хотелось все-таки горячей пищи. И тогда вечером, когда стало темнеть, а выстрелов не слышалось и самолеты над ней так и не полетели, Поля приняла облатку опия, лишний раз поблагодарив доктора. Она знала, что опий – это на самый крайний случай. Но сейчас такой случай и был: это должно было заглушить голод и убить страх. Так что с этого момента она не совсем ясно отличала то, что было, от того, что казалось, хотя по некоторым приметам можно судить о том, что все это было правдой. Человек, хотя бы и самый советский, не может существовать в дальневосточной тайге в совершенном одиночестве на двух плитках шоколада, кто-то должен с ним поделиться пищей, и потому через некоторое время Поля увидела избушку, не особенно даже удивившись. Тут должна была стоять избушка, а как же.</p></span><span id="id28"><div class="title4">
<p class="p">8</p>
</div><p class="p1">На самом деле это был целый хутор, отвоеванный у тайги. Они ей все рассказали, хотя сначала сильно испугались. Шутка ли, два года никто к ним не приходил, а тут целая комсомолка-летчица упала прямо с неба. Усмотрели в этом знамение.</p><p class="p1">Их было пятеро – отец, мать, два брата и сестра, они были старообрядцы, уходившие все дальше с Волги. С самого антихристова пришествия – то есть, как поняла Поля, с раскола – они забирались в глубь русского Востока, после Петра дошли до Урала, с Урала забрались в Сибирь, а после революции дошли до Дальнего Востока. Их все время кто-нибудь находил, и теперь главным страхом для них было то, что Поля, видимо, про них расскажет и им опять придется сниматься с насиженного места. В последний раз они сбежали от коллективизации, про которую поняли только, что обобществлять будут скотину и баб. Их звали Дормидонт, Аграфена, Савватий, Даниил и Феклуша. Феклуша была самая молодая и казалась разумной, шустрой. Ее выучили грамоте по древним писаниям. В семье были книги, сберегаемые с шестнадцатого века и представлявшие, должно быть, большую историческую ценность. Звали их Зыковы, славная, древняя семья настоящего часовенного согласия. Незначительные расхождения со старой верой состояли в том, что они ели картофель, насажденный Антихристом Петром, это было не так страшно, потому что без картофеля они бы перемерли и некому стало бы хранить истинную веру. Иногда, пояснил отец семейства Дормидонт, случается и Антихристу делать вещь полезную. У них были куры, Зыковым дозволено было пить яйца, но они страдали без соли, небольшой запас которой кончился в прошлом году. Сначала приход Поли казался им дурным знаком, потом шустрая Феклуша, веснушчатая девочка, – из нее получилась бы прекрасная пионерка – посмотрела в древних книгах и сказала, что, согласно Поморским ответам, иногда с неба возможно явление ангела, который будет приносить важные, хорошие вести, и Поля дала ей полоску шоколада, какая очень Феклушу удивила, а отец сказал: нечего, нечего. Различия между верой Зыковых и каноническим старообрядчеством, как поняла Поля, заключались не только в картофеле, но в том, что Антихрист придет не один, что после него придет сразу много Антихристов, что будут сплошь Антихристы до тех самых пор, пока не случится второго пришествия, причем каждый следующий Антихрист будет хуже предыдущего; сначала староверы думали, что не бывает ничего хуже Петра, потом – что ничего хуже отмены крепостного права, о которой они узнали сорок лет спустя, а потом настало такое, что дальше, казалось бы, некуда, но есть, есть куда! Сейчас шел год 7446-й, а в 7435-м добралась до них экспедиция, искавшая ужасное небесное тело, которое повалило весь лес в Тунгуске и устроило свечение неба на неделю; небесного тела не нашли, потому что его не было и быть не могло, то было знамение, но экспедиция нашла Зыковых, и им пришлось бежать еще восточнее. Больше всего они пугались, что упрутся в океан, который где-то тут должен был раскинуться, окружая собою землю, а дальше океана ничего нет, тут уж их слово было твердо. Поля стала рассказывать им об освоении стратосферы, старик Дормидонт кивал уважительно: так, так, все это совпадало с их представлениями об ангельской иерархии; когда Поля тонко намекнула, что Бога нет, Дормидонт не удивился, а лишь лукаво погрозил узловатым пальцем и заметил: много вас таких говорило, но погляди, кто привел тебя среди бесконечного леса к нашему подворью и се дает тебе яйцо? Не Божье ли это чудо, что русский человек находит русского человека и в тайге? У Зыковых была небольшая пасека, они делали восковые свечи, разводили кур, скотины же не имели. Жилье их было срублено из сосны, иконы вырезал талантливый Савватий. В общем, они неплохо жили, только не было у них радио, а потому знание новостей было недостаточное и отставала политическая подготовка.</p><p class="p1">Поля мало знала о русском расколе, не больше, чем Зыковы о строении реактивного двигателя, но понимала, что в России все и всегда раскалывается, примерно так же, как авиастроение на школу Антонова и Веневитинова, хотя разница между ними была трудноопределима, как, в сущности, между раскольниками и никонианцами. Дело было даже не в том, смутно подумала Поля, что кто-то прогрессивнее, а кто-то традиционнее; просто одни, как Веневитинов, решали государственную задачу, тонко чувствуя, как надо служить Отечеству и что для него лучше, а другие, как Антонов, решали какую-то свою. Не то чтобы он меньше любил Отечество, но просто для него Отечество служило средством самолетостроения, тогда как Веневитинов больше любил Родину, чем самолеты. Интересно было бы представить, что Веневитинов чертит, взяв карандаш в троеперстие, тогда как Антонов – исключительно в двоеперстие, иначе и винт не крутится, и шасси не выходит. Парадоксально, но самолеты Антонова были Родине нужней, и по этой схеме выходило, что старообрядцы скорей сочувствуют новой власти, которая уничтожила старую церковь; Дормидонт, слушая эти рассуждения вслух (Поля сама себе удивлялась, поскольку никогда ни о чем таком не думала), уважительно кивал, но подытожил: иногда бывает и Антихрист против Антихриста, это уж такое их дело. Но вообще, добавил он, ежели бы новая власть обратилась к старой вере, при соответствующем покаянии это можно было бы рассмотреть и одобрить. Ну вот, вскрикнула от радости Поля, это и получается диалектика! И она заснула от сытости, хотя старалась есть мало и осторожно.</p><p class="p1">Проснулась под вечер, когда стемнело, и долго объясняла Феклуше, какие бывают созвездия. Это Млечный Путь, говорила она, здесь Плеяды, тут Персей, Кассиопея, а это – видишь? – Орион! Что ты, снисходительно возражала Феклуша, это путь Ерусалимский, это конь с телегой горбатый, это младенец царственный, а вот колесо, правее же гусь и над гусем куст горящий. Ты моим так и говори, продолжала Феклуша, они люди простые, а мне можешь прямо сказать, что ты ангел, посланный нас предостеречь; но скажи только мне, им не говори, они старые и могут не вынести. Места у нас глухие, тебе неоткуда больше взяться, я сразу поняла; река тут рядом, но и по реке до людей долго. Поле жалко было Феклушу разочаровывать, и она сказала: скоро тебе с неба упадут яблоки, я уж постараюсь. Ей дали матрац, набитый сеном, и всю ночь Поля проспала без снов, а ранним утром ушла, съев для бодрости еще одну облатку опия, и с собою ей дали репы, которой Зыковы растили много. В этот день ощутимо похолодало.</p><p class="p1">Ну что, сказал семье старик Дормидонт, зажжемся? Этот вопрос он задавал всякий раз, когда их снова обнаруживали, и всякий раз был ему ответ: нет, отче, пойдем дальше. Но Феклуша передала пророчество от ангела и сказала: если в трехдневный срок в самом деле упадут яблоки, то надо уходить, ибо поведал ангел, что нас найдут и меня сделают пионером. Что это, я не знаю, но такой участи не желаю. Хорошо, ответствовал отец, спешить некуда, подождем три дня. К исходу третьего дня с неба упал мешок яблок. Феклуша плохо себе представляла их, но Дормидонт и Аграфена опознали грушовку и решили: надо уходить. Ангел, разумеется, мог хулить Бога для вида, мало ли к кому он попал, но пророчество есть пророчество и, значит, их скоро обнаружат. Они взяли кур, набрали несколько туесков меда и пять мешков картофеля и понесли все это дальше, дальше к океану, а хутор сожгли: если каждый раз сжигаться вместе с хутором, старообрядцев не напасешься.</p></span></span>
