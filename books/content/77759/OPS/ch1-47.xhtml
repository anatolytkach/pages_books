<p class="p">Эпилог</p>
<p class="p">Башня</p>
</div><p class="p1">В мае 1961 года журналист Евгений Корнилов – сын того Корнилова, пять лет как посмертно реабилитированного, – получил задание найти репортера Бровмана, одно время даже возглавлявшего в их газете отдел новостей, и сделать с ним интервью о предтечах советской космонавтики.</p><p class="p1">Корнилов, разумеется, читал репортажи Бровмана, поскольку как журналист космической темы интересовался советской авиацией, а также странной, почти одновременной гибелью всех ее флагманов в конце тридцатых. Видя дату смерти «1937» или «1938» у писателя, начальника, да хоть бы и бухгалтера, он не удивлялся, «время было такое», как приговаривал ненавидимый матерью дачный сосед, старик, в те времена якобы охранник. Но что истребило этих, он не понимал вовсе, а уж о судьбе Бровмана не мог навести никаких справок, потому что с газетных полос его имя исчезло в сорок восьмом, в разгар проклинаемого космополитизма и борьбы с ним, а вскоре Бровман был уволен, как пояснили Корнилову в отделе кадров; адрес, разумеется, устарел, в Мосгорсправке человек с такой фамилией вообще не значился, а из бровмановских героев никто не уцелел. Сравнительно недавно умер Ладыгин, в последнее время скорее писатель, чем капитан, – о нем Бровман тоже писал, но вдова Ладыгина ничего не знала и как-то сурово разговаривала с журналистом; видимо, вспоминать о муже было ей больно.</p><p class="p1">Корнилов был юноша честолюбивый, а редактор, он же зять Самого, мог, как Суворов, простить все, кроме немогузнайки. Он щедро награждал, но и стремительно низвергал. Корнилов был на хорошем счету, на перспективной теме, да кроме того, сын знаменитого отца, создателя целой репортерской школы, – отступать он был не приучен. Наконец ему явилась светлая мысль связаться с единственным героем Бровмана, который был на виду: Бровман о нем написал целую брошюру. Владимир Канделаки был жив-здоров, чуть не единственный уцелевший летчик из той плеяды; он был теперь вице-президент Международной авиационной федерации, но не оставлял обычной испытательской работы. Корнилов зашел к первому заму, своему, в общем, парню, тоже сыну журналиста, тоже взятого, но вернувшегося полуразвалиной; зам куда-то позвонил по вертушке и вручил Корнилову телефон. Канделаки оказался любезен и пригласил к себе на Курскую: он жил в том же доме, где и Волчак, чьим именем был ныне назван переулок. Кабинет был весь завешан дипломами, вымпелами и фотографиями с живыми и мертвыми героями. Сам Канделаки, недавно получивший заслуженного мастера спорта по вольной борьбе, с трогательной гордостью этим хвастался. Он был еще очень крепок, широк, было ему шестьдесят семь, пару корниловских бесед он читал и одобрил.</p><p class="p1">– Бровман, да, – сказал он густым басом. – Левушка Бровман. Он, знаете, с сорок восьмого под этим именем не писал. Он Огнев стал, ну, понятно… Его взял к себе Кожемякин в «Знамя», не журналистом, а правщиком, что ли. Переписывать военные мемуары. Под Огневым он еще немножко в «Науке и жизни» печатался, про то, что у нас во всем приоритет, знаете, было такое поветрие. Что и самолет у нас первый изобрели еще при Иване Грозном, и вертолет – мы (что, кстати, правда), и на полюсах первые мы… Но потом его из партии исключили за дружбу с театральными критиками, ну и он тяжело это пережил. Тем более что коллеги отвернулись сразу, а потом, знаете…</p><p class="p1">Жена Канделаки, моложавая и молчаливая, принесла им кофе – настоящий бразильский, привезенный мужем из Южной Америки, где его недавно чем-то награждали.</p><p class="p1">– И с ним инсульт случился, – хмуро сказал Канделаки, – а у меня у самого тогда, знаете, были неприятности… по самолетной части… Жена его выходила как-то. Я про него поздно вспомнил, уже это был пятьдесят второй, наверное. Он очень бедствовал. Я его силой заставил взять сколько-то денег, а он хоть и еле говорил, но просил не звонить. Не хотел, чтобы я его видел таким, ну и знаете… как это говорится: тот страждет высшей мукой…</p><p class="p1">Корнилов сильно удивился и не сумел этого скрыть.</p><p class="p1">– Почитываем, – сказал Канделаки. – Ну и вот. Я позвонил еще в пятьдесят третьем, когда начало все это отпотевать… Но мне сказали, что они переехали на другую квартиру. Там, на Стромынке, телефона не было. Это тогда был край Москвы, теперь застроено, наверное… Вот, может быть, эти данные вам помогут как-то. Если разыщете, дайте знать. И от меня, конечно, приветы.</p><p class="p1">Он подарил Корнилову брошюру о себе, широко на ней расписался и велел обращаться с вопросами, если что.</p><p class="p1">Отсюда уже можно было плясать: в «Знамени» нашли учетную карточку Огнева, в ней был новый адрес, но оттуда он переехал в отдельную квартиру близ Рогожской Заставы; в горсправке по адресу дали телефон, и через пару дней Корнилов уже просил к телефону Льва Матвеича, и дрожащий шамкающий голос, принадлежащий, судя по всему, дряхлому старику, хотя и ровеснику Канделаки, сказал ему «Слушаю».</p><p class="p1">– Я сын Петра Корнилова, вы, наверное, помните, журналист, «Известия». Я хочу с вами побеседовать по истокам космонавтики, для газеты…</p><p class="p1">Старик долго молчал.</p><p class="p1">– Приходите, – сказал он и назвал адрес, который Корнилов уже знал. И на следующее утро Корнилов туда отправился.</p><p class="p1">Встрече с Бровманом предшествовал странный, даже загадочный эпизод. Когда Корнилов подходил к дому на Рогожке – это была одноподъездная блочная башня в девять этажей, – в небольшом скверике, полном свежей зелени, внезапно, словно соткавшись из воздуха, перед ним нарисовался человек, которого, Корнилов мог в том поклясться, секунду назад там не было. Он проступил, как фотография в проявителе: только что на его месте были деревья, скамейка, куст какой-то, возможно, бузина – Корнилов хорошо разбирался в технике и плохо в природе, – но теперь это явно и отчетливо был человек, который как-то так слился с пейзажем, что обнаружить его не смог бы и самый придирчивый сыщик. Может, причиной тому была одежда странной расцветки, Корнилов никогда такой не видел: ветки, листья, наверняка охотничий камуфляж, но где же такой шьют, – а может, странная поза: он не шел, а словно пластался, двигался на полусогнутых ногах, стараясь так вписаться в пейзаж, чтобы ничем себя не выдать; да и лицо было зеленоватое, или показалось? Человек обратил на Корнилова живые светлые глаза, и очеркист увидел, что перед ним старик, хотя и чрезвычайно гибкий; он рассеянно скользнул взглядом по молодому, но уже известному автору и снова пропал, как не был, – сколько Корнилов ни вглядывался, он не мог его различить в десяти шагах.</p><p class="p1">– Однако, – сказал очеркист и поднялся на третий этаж.</p><p class="p1">Дверь открыла высокая женщина лет шестидесяти, вероятно, жена; провела его в единственную комнату, а сама ушла на кухню. Бровман в самом деле был очень дряхл; видно было, что к приезду гостя он тщательно побрился, но был в пижаме, зеленой в черную полоску, левая рука была полусогнута и дрожала, тряслась и голова. Он опирался на стул. На столе лежала толстая машинопись.</p><p class="p1">– Вот тут… все, – сказал Бровман, сильно волнуясь.</p><p class="p1">– Да зачем же вы беспокоились, я несколько вопросов… – засмущался Корнилов.</p><p class="p1">– Тут все, – продолжал старик, – я расшифровал записи, перепечатал из блокнотов. У меня дневники с тридцать третьего года. Я вас ждал. Я знал, что понадобится. Сейчас.</p><p class="p1">Ему нужна была пауза, он отпил холодного чаю.</p><p class="p1">– Я знал, что это все пропасть не должно, – заговорил Бровман, опустившись на кровать и правой рукой указав Корнилову на стул. – Я вас раньше ждал. Но после Гагарина мне уже ясно стало, что вы придете. Я настолько это знал, что не хотел звонить сам никому. Хотя помнят, наверное. Но мне хотелось, чтобы пришли. Я никогда не любил… навязываться. – И голова у него затряслась сильнее.</p><p class="p1">– Я думаю, вы сами еще напишете, – сказал Корнилов, желая утешить его.</p><p class="p1">– Я-то? – усмехнулся старик. – Я-то… да. Я это печатал, когда еще немного… мог. Машинку продали потом. Сейчас уж какое… Я сейчас, чтобы как-то тренировать ум, решаю только кроссворды. Но много слов, которые не знаю. Не уследишь.</p><p class="p1">– Я хотел спросить, – приступил Корнилов к заданию, – прежде всего, как вы думаете: почему погиб Волчак, нет ли каких-то обстоятельств, о которых не говорили?</p><p class="p1">– Искали тогда, – блекло ответил старик, – искали… Но это ведь не то что конструктивное… это не то, что в смазке что-то или опилки в двигателе, как они искали… Волчак погиб почему? Ну, потому, что он был Волчак… потому что герой… должен был погибнуть… Вы Гагарина сейчас берегите, а то Гагарин тоже погибнет. И еще бы, конечно, хотелось, чтобы Гагарин не захотел стать… Председателем Совета Министров…</p><p class="p1">Корнилов понял, что старик заговаривается.</p><p class="p1">– Это же, это же… – говорил Бровман, не глядя на него, смотря куда-то на книжные полки, где стояли в основном издания тридцатых годов, – это было такое время отличников. Они все были отличники, я их знал. А потом пришли троечники, ну и развалили все. На водородную бомбу их еще хватило, но это же еще бериевский задел. А сейчас… они же троечники. Вы посмотрите на него, – он явно имел в виду редакторского тестя, – он же говорить не может. Разве Сталин так говорил? А этот говорит, как баба базарная. И все у него такие, он себя окружает теми, кто еще глупей. Это всегда так.</p><p class="p1">– Вам, кстати, привет от Канделаки Владимира Константиновича, – сказал Корнилов, чтобы увести старика от ненужной темы. Он, видно, давно ни с кем не говорил, а ворчание его все равно не годилось в печать.</p><p class="p1">– Кандель, да, – сказал старик, не удивившись. – Хороший мужик Кандель. Он как-то соскочил. Иначе бы тоже… Он понял. Вообще начитанный был, все читал. Как-то сбежал на войну… На войне, как ни странно, можно было спастись. Ну и сначала Халхин-Гол, потом финны… В Испанию его не пустили, в Испании Петров был. Но Петров не смог соскочить, там другая была история. Я тут пишу.</p><p class="p1">– А жена его, вы не знаете? Она же потом…</p><p class="p1">– Она потом с поэтом была, после спилась, да. Она играла потом в Свердловске, уже в Москву не брали. Я не знаю. Я у них на свадьбе был. Она тогда очень была хороша, но уже немножко пила, и видно было, что будет пить больше. Сам Петров не пил, он такой был здоровый… как теленок. Довольно был глуповат, но храбрости редкой. Он интересный был летчик, только была у него глупость одна, он, я думаю, через эту глупость и стал лихачить. Ну, это не по делу. Я там подобрал по нему все.</p><p class="p1">Старик как будто тяготился этим разговором, потому что ему больно было ворошить славное прошлое, а вместе с тем был счастлив, что к нему пришли, вспомнили; поэтому он начинал разные темы и бросал. Корнилов спросил о том, что его действительно интересовало:</p><p class="p1">– Как вы думаете, почему И-180 так и не пошел в серию?</p><p class="p1">– Потому что Волчак, – охотно ответил старик, – а как же. Куда ж он пошел бы. После Волчака на нем еще трое упали, никто, кроме него, не мог его выучить летать. Истребитель же, понимаете, мало сделать. Надо <em>учить летать</em>, это надо быть испытателем от бога. На войне же как оказалось? Лучшие машины были Яковлева. Простые, мощные. Все, что делали Антонов, Карпов… это были классные машины, но они были, знаете… как фигурные коньки. Для рекордов, для дальности, для залезания выше некуда. А чтобы бой… так это были нужны другие качества. Это нужны гаги, простые, дешевые. Вот Васильева, она же как погибла? Она красивая была женщина. Они были три первые героини Советского Союза. Она была в дальневосточном перелете. А на Пе-2 у нее было всего тридцать часов налета, и когда надо было просто работать, вот просто тягловая работа войны, это они не умели. И в облачность полетела, все думала, это как на рекорд. И не дотянув до Сталинграда… Кандель тоже сначала, как Берлин полетел бомбить в августе сорок первого года, чуть не гробанулся, все думал взять больше бомб… А там не это надо было. Сталин это понял, он к летному делу охладел уже в сороковом. Я вернулся с «Седова», заметил. Уже нужны были Сталину серые лошадки. А тогда – они же все были герои! Ими все бредили, вы должны же по школе помнить… или нет?</p><p class="p1">– Мне было четыре года, когда Волчака хоронили, – признался Корнилов. – Я отца не помню совсем.</p><p class="p1">– Отец был на вас не похож, рыхлый, – сказал старик. – Ну, вы с годами тоже… можете. Он был суровый, требовательный. Не очень приятный. – Он усмехнулся. – Но дело знал.</p><p class="p1">– А Кондратьева вы не знали? – поинтересовался Корнилов. – У него сейчас книга вышла… Он на фронте погиб, в сорок втором. Был конструктор, придумал лунный модуль.</p><p class="p1">– Кондратьев? – с сомнением переспросил старик. – Нет, не слышал. Может быть, он был особо секретный…</p><p class="p1">– Нет, он работал под Москвой на МТС. А для себя писал. Если хотите, я принесу. «Для тех, кто будет летать и строить».</p><p class="p1">– Да мне зачем, – сказал Бровман равнодушно, – я не конструктор. Лунный модуль… я думаю, не будет лунного модуля. Может, в Штатах, а у нас нет.</p><p class="p1">– Почему? – почти оскорбился Корнилов. По некоторым проговоркам посвященных людей он знал, что лунный проект уже в запуске.</p><p class="p1">– Да зачем… мы все что надо уже сделали.</p><p class="p1">– А другие планеты? А другие галактики?</p><p class="p1">– Да что планеты, – отмахнулся Бровман. – До Марса лететь – это несколько поколений должно там вырасти, это очень долгое дело… И что там делать? Аэлиты никакой там нет, да и нигде, скорей всего, ничего нет… Мы уже на полюс сходили, там лед один. Но на полюс хоть ракеты можно поставить, бомбу сбросить, а тут что? Мы все уже сделали, понимаете? Цель Советского Союза была никакое не равенство. Цель Советского Союза была выход в стратосферу, а все остальное этой цели служило. Это просто такое общество, которое смогло построить ракету, понимаете? Никакое другое бы не построило. А больше оно ни для чего не годилось.</p><p class="p1">Это не было безумием, понял Корнилов; это было обычной болезнью профессионала, склонного полагать свою область знания главным сокровищем человечества. Старик оправдывал свою жизнь; все старики оправдывают ее. И странно сказать, Советский Союз полетом, ровно ничего не менявшим в жизни двухсот миллионов его граждан, делал примерно то же самое.</p><p class="p1">– А что же теперь, – сказал Бровман. – Цель достигнута, можно отбрасывать ступень.</p><p class="p1">– Но ведь и американцы полетели, только позже, – возразил Корнилов.</p><p class="p1">– Ну полетели, и что? – Тут старик разозлился. Видимо, у него бывали на эту тему споры с женой, больше-то было не с кем. – Все говорят: они тоже полетели… Полетели, да. Но у них это побочное, это ответвилось от войны, от жизни, от еще чего-то… У них была жизнь. А у нас же ничего не было, мы все вложили в это. У нас вся страна жила, как в четырнадцатом веке, вся страна на двор бегала по нужде, масла не видели годами. И полетели. Это как развратник, у которого тысяча женщин, и отшельник, у которого была одна. Это разные чувства, разная любовь. Один жил не для этого и не этим, а другой только этим. Ведь мы работали как! Без выходных, без отпуска, я с ними летал, я писал в день две полосы, и так годами! Как конвейер, но все равно ведь это было любимое дело, я был счастливый человек, понимаете? Это все, что у нас было: нас спросят, а мы – вот! – У Бровмана словно прорезался прежний голос, и стало ясно, что когда-то он бывал и внятен, и убедителен. – Теперь нас можно, в общем, отбрасывать, и скорее всего, так и будет.</p><p class="p1">– У нас космос тоже был побочный продукт, – решился заметить Корнилов. – Понятно же, что все было ради оборонки…</p><p class="p1">– Вот нет! – прикрикнул старик. – Вот нет! Это оборонка была – чтоб начальство дало заниматься космосом. А хотели-то они долететь туда, где никто не был. И на полюс хотели за тем же, и дошли. Это они себе построили страну, в которой ничего не было, чтобы все вложить в это. В другой стране такого не могло быть, нет. Эта страна больше ни для чего не была нужна. И она это сделала. Теперь ее троечники быстро развалят, потому что просто жить она не умеет. Ну, будет… прозябать. Да и сил уже нет, если так-то…</p><p class="p1">Корнилов понял: старик был сталинистом, как все они. У них у всех висели где-то в шкафах портреты генералиссимуса, он создавал им вечные авралы, во время которых производились никуда не годные вещи, во всем мире эти вещи делались спокойно, без пупочной грыжи, и никто не считал себя героем, потому что любой французский шахтер шутя выполнял стахановскую норму; Корнилов читал по-французски и об этом знал. Они считали свою жизнь исключительной именно потому, что прожили ее в исключительных обстоятельствах, они и космос считали продолжением шарашек, а между тем в космос полетели свободные люди, никакого космоса не было бы без ХХ съезда! Корнилов это знал своим высокомерным молодым знанием и вдруг почувствовал, что ненавидит старика, – в том числе за то, что тот не сидел, отделался разносом и инсультом, подумаешь, исключили его из партии, а мать растила Корнилова одного, из отца на допросах выбили признание в работе на японцев, – почему на японцев?! – и все это для того, чтоб они ставили свои рекорды! Корнилов думал найти в старике мученика тех времен и летописца подвигов, а нашел раба, гордящегося рабством, тьфу! Он и Гагарина считал детищем своей эпохи, пропахшей невыносимой смесью параши и «Герцеговины Флор»; и Корнилов возненавидел всю его растрепанную машинопись, перепечатки из пухлых блокнотов. Старик не знал, что значило быть сыном расстрелянного, прятаться с матерью по родственникам, замирать ночами от ужаса, что вот стукнувшая внизу дверь, проехавшая машина – это за ней, что возьмут и ее, и тогда детдом… Корнилову захотелось сказать Бровману что-то такое, что зачеркнуло бы его и так растоптанную жизнь.</p><p class="p1">– А вот скажите, – начал он вкрадчиво, – вам самому не обидно? Все-таки вся ваша вина – в космополитической фамилии. Вот у вас однушка меньше, чем бывали комнаты в коммуналках, на краю города. Вот вас не помнит никто, хотя вы работали на износ. И война вам не помогла, и войну не зачли. Для чего все это – чтобы сейчас тут со мной разговаривать? И если весь Советский Союз был для того, чтобы запустить одну ракету… потому что навыка нормальной жизни нет ни у кого… Как хотите, я этого не понимаю. Как вы… я не пойму… как вы оправдываете свою жизнь?</p><p class="p1">В глазах старика загорелся довольно неприятный огонь. Он в упор посмотрел на Корнилова.</p><p class="p1">– Все так, все правда, – сказал он и замолчал надолго. Потом улыбнулся впервые за весь разговор, и стали видны редкие желтые зубы.</p><p class="p1">– Все-таки, – прошептал Бровман, – я был очень высоко.</p></span>
