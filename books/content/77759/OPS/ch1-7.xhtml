<p class="p">5</p>
</div><p class="p1">– Ну и что ж мы будем делать? – сказала высокая черноволосая женщина лет двадцати пяти, отхохотавшись.</p><p class="p1">Ялтинская набережная была вся в огнях, а далеко, в туманном синем море, виднелись три далеких парохода, и такая манящая печаль была в этих огнях, словно кто-то к кому-то больше не вернется, больше не встретится. А про это ведь никогда не можешь знать.</p><p class="p1">– А этого никогда не можешь знать, – прямо этими словами и ответил ей залихватский командировочный Семенов. Прибыл он на Магарач перенимать тут опыт, потому что перестраивал в Ленинграде завод шампанских и десертных вин, – он говорил с некоторым официантским шиком «шемпанских», – и ему надо было понять особенности купажа, вообще изучить секреты старика Голицына, Льва Сергеича, который создал тут лучшее в России виноделие. Отчего же не поехать летом в Массандру? И Семенов днем беседовал с виноделом Егоровым, учеником Голицына и большим любителем мадерцы, а вечерами рыскал по набережной, подыскивая достойную себя подругу. Командировка стала бы подлинной удачей, если бы такая подруга нашлась. Семенов присмотрел эту женщину на пирсе, где она стояла одна, прямо изваяние, и словно ждала из моря неизвестно кого. Глаза у ней были зеленые, с косинкой, и звали ее Маринкой. То есть Мариной, разумеется, такую женщину не станешь звать уменьшительно-ласкательно.</p><p class="p1">Семенову было под сорок, уже с залысинами, с острым, несколько лисьим носом, быстрыми глазами и прекрасной памятью на забавные истории, он был хороший спец, и не только по вину, в особенности десертному, но и по женской части. Считалось, что пролетарий начал обрастать жирком, и это так надо: повоевали, будет. Пора было пролетарию готовить себе вкусную и здоровую пищу, отдыхать в хороших санаториях с гипсовым рогом изобилия над парадной лестницей, пить правильное, не вредное, не слишком сладкое вино в нужной пропорции. Семенов понял, что пришло его время, потому что умел и любил пожить, аскезы не понимал, бессмертия не допускал. Какое там после смерти продолжение, когда и тут-то, как говаривал его дед, ничего нет? Марина была женщина удивительная, с той перчинкой, которую Семенов ой как чувствовал. Он умел вести учтивый разговор, лишнего не говорил, глупых шуточек не отпускал. Знал и карточные фокусы, и тысячу других милых способов ненавязчиво сблизиться. Марина пила, не пьянела, в «Ореанде» кормили удивительно, а Семенов был сюда как сотрудник пищепрома прикреплен и имел полномочия от Москвы оценивать ялтинский сервис. Ничего, сервильно. Подливал он ей и той самой мадерцы, не упуская рассказывать, как любил ее лично Распутин, бывавший тут в Ливадии, – про вино Семенов знал в самом деле много, не станем принижать профессионала. Тогда все были профессионалы, больше уж никого не осталось, дилетанты все умерли.</p><p class="p1">– Особенно же ценится в мадере, – говорил он сладко, – привкус каленого ореха, возникающий лишь при высокой температуре. Вообразите, вино было в Индии не распродано и в таком виде отвозилось в порт отбытия, и пока его по жаре везли, в нем запустился процесс засахаривания и возник вот этот вот привкус, наиболее нам всем дорогой. Как бы сироп, но как бы из ада, что, Мариночка, совершенно подходит и к вашей внешности…</p><p class="p1">Она на это ничего не отвечала, и пора уже было переходить к разговорам о ней, о самой Марине. Семенов знал, что с женщиной надо говорить о женщине, она других разговоров не понимает.</p><p class="p1">– Я нисколько не любопытствую, Мариночка, – сказал он, – но мне хотелось бы немножко о вас знать. (Он был ласков: Мариночка, немножко. Он был такой немножко котик, пиджак на нем был летний, мягкий и голубой.) Что вы здесь, как, почему вдруг Крым.</p><p class="p1">– Почему женщина летом ездит в Крым? – переспросила Марина. – А вы с трех раз угадайте.</p><p class="p1">– Отдыхать, наверное, она ездит, – предположил Семенов.</p><p class="p1">– Это если она устала. А если не устала, она едет жизнь свою спасать.</p><p class="p1">– Что же может угрожать вашей жизни? – спросил он, переходя с игривого тона на заботливый.</p><p class="p1">– Истребитель, – сказала она так, что непонятно было – серьезно или нет.</p><p class="p1">– Истребитель какого рода, одно- или двухмоторный? – Семенов мог поддержать и такой разговор.</p><p class="p1">– А черт его знает, – нахмурившись, отвечала Марина, – где у него мотор и сколько. Я только знаю, что он хотел меня убить и непременно убил бы. Но я оказалась хитрая.</p><p class="p1">Семенов положительно не знал, что на это ответить.</p><p class="p1">– Я про него узнала кое-что, – продолжила Марина, помолчав. – Узнала я про него кое-какие вещи, и кроме того, у него есть брат за рубежами. Ну и всякое прошлое. Я узнала случайно и не имела такого намерения. Но человек это непростой. Я вам могла бы назвать его фамилию, но шанс вашей с ним встречи довольно мал. А то, конечно, вам надо было бы насторожиться. Но, думаю, в вашем Ленинграде нет у вас шанса с ним свидеться, разве что после смерти.</p><p class="p1">Это вовсе уж насторожило Семенова, потому что в жизнь после смерти он не верил, как мы знаем, и прямо об этом сказал. Марина только окинула его скептическим взглядом.</p><p class="p1">– Но неужели вы думаете, что сейчас, в наше время… – начал Семенов. – Что прямо среди нашей действительности…</p><p class="p1">– Среди нашей действительности только и убивать, – проговорила Марина медленно и демонически, близко к нему наклонившись. – Где, скажите, Алексей, где обычно прячут лист? Лист, Алексей, прячут в лесу.</p><p class="p1">Этого Семенов не понял. Он вообще был не особенно понятлив, хотя смекалист. Но смекалка – совсем другое дело. Смекалистых было тогда много, а понятливых уже мало: самые понятливые были далеко, а просто понятливые постепенно отправлялись еще дальше. Тогда все говорили загадками. Вообще было много загадочного, загадочных женщин в особенности.</p><p class="p1">– И вот прямо угрожал? – спросил Семенов в растерянности. Похоже, надо от этой женщины бежать, будут неприятности.</p><p class="p1">Но очень уж она была привлекательна той особой привлекательностью, которой обладают героини эпохи. Прошла та эпоха, героиней которой была спортсменка, ныряльщица, «Трудовые резервы» и «Крылья Советов» или работница, ткачиха, пришла героиня – ночная женщина, женщина, устанавливавшая вокруг себя ночь даже днем, роковая, вспоенная хотя и советским, но шампанским, – наша советская ведьма, королева приема.</p><p class="p1">– Если б он угрожал, я могла бы заявить. Но такие не угрожают, такие действуют. Я достаточно с ним пожила, все поняла. Это новая порода. До революции был такой тип, но редко. Я читала. Сейчас уже побольше, подросли. Понимаете ли, Лёша, какая вещь… Это не так легко объяснить мужчине. Но женщина всегда понимает. Из человека, Лёша, есть два выхода…</p><p class="p1">И она замолчала, и Семенов, конечно, не смог не пошутить, что выходов значительно больше.</p><p class="p1">– И нечего с тобой говорить, Лёша, ты дурак, – сказала Марина. – Пойдем с тобой туда, куда ты собираешься.</p><p class="p1">У Семенова рот наполнился слюной. Это была его обычная реакция, возбуждение. Он специально снял комнату, а не номер, дабы не рекламировать свои приключения, посулив ялтинской хозяйке чуть больше обычных трех рублей в сутки за то, чтобы та не ограничивала его ни в чем. С кем хочет, с тем придет. Хозяйка была навеки запуганная, как все в Крыму, с такой же запуганной зобатой дочерью, которая за ней шпионила и считала скрытым врагом. И вот туда он и повел Марину.</p><p class="p1">По дороге Семенов предпринимал попытки целоваться, но она уклонялась. Пахло упоительно, цикады орали оглушительно, тоже, видимо, о любви – о чем еще орать-то?</p><p class="p1">– Он, кстати, в тюрьме сейчас, – сказала Марина.</p><p class="p1">Семенов не понял и переспросил.</p><p class="p1">– Муж. Я вот на звезды смотрю, а он звезд не видит. Разве что из глаз, но, думаю, берегут. Он человек у меня непростой.</p><p class="p1">– А какой же? – в полном недоумении спросил Семенов.</p><p class="p1">– Государственный. Такие нужны. Но если б я с ним осталась, Лёша, ты не представляешь, что бы со мной было. Он бы мог мою целостность нарушить.</p><p class="p1">– Чего?!</p><p class="p1">– Целостность мою. Ты, конечно, понимаешь все в одном смысле, потому что ты человек простой, негосударственный. Но если ты об этом, мою целостность нарушили в пятнадцать лет с полного моего согласия. А он мог бы ее так нарушить, что мою личность собирали бы по частям. Он это умеет. Он свою первую жену так замучил. Я дура была, не понимала ничего. Но теперь поняла.</p><p class="p1">– А вам, Мариночка, здесь есть где остановиться? – спросил Семенов заботливо. – Я бы мог вам посодействовать, вообще мог бы на себя взять…</p><p class="p1">– Мне, Лёша, всегда есть где остановиться, – сказала Марина с интонациями советской ведьмы. – Важно знать, когда остановиться, а где – это, голубь мой, не вопрос.</p><p class="p1">Они поднялись на второй этаж скрипучего деревянного дома, который всё обещали снести, но не сносили. Дом перестоял землетрясение 1928 года, и старуха уверилась, что он теперь перестоит всё.</p><p class="p1">Семенов испытывал неловкость. Обычно еще на подходе к дому – своему ли, чужому – начинал целоваться, а там как-то все происходило само собой, но теперь ему целоваться не давали, отворачивались. Это его разозлило. Он сам разделся до трусов и лег. Марина смотрела на него, как взрослая на пионера.</p><p class="p1">– Ну так что же? – спросил Семенов.</p><p class="p1">– Ничего, ложись баиньки.</p><p class="p1">– А вы?</p><p class="p1">– А мне рано баиньки. Но я посмотрела, где ты живешь, мне любопытно было. Теперь буду знать, и никуда ты теперь не денешься.</p><p class="p1">И Марина оглядела комнату, словно запоминая детали обстановки.</p><p class="p1">– Ты что же, Лёша, думал? Ты думал, может быть, что я после моего истребителя с тобой ночевать стану? Я, Лёша, после истребителя не могу с человеком. Я, если хочешь знать, его бросила, но, если хочешь знать, любила. И ты, мальчик, думал, что я с тобой буду после него? Ой, уморил.</p><p class="p1">И она расхохоталась не ведьминским, а девчоночьим смехом, каким над Семеновым смеялись во дворе.</p><p class="p1">– Дурак ты дурак, – сказала она снисходительно. – Тебе пустышку сосать. Но ты смотри, не болтай много. Я теперь знаю, где ты живешь, да и еще кое-что про тебя знаю.</p><p class="p1">Семенов не удивился бы, если бы Марина выпорхнула в окно, но случилось гораздо более странное. Она вышла, хлопнула внизу дверь, и Семенов, понятное дело, прильнул к окну. Он увидел в ртутном свете единственного фонаря, горевшего, как нарочно, прямо напротив их дома, как вышла Марина, и тут же из кустов вышагнул молодой атлет, повыше Марины ростом, а роста она была немалого. Он будто бы караулил, но Семенов мог поклясться, что никакой слежки за ними не было. Возможно, атлет материализовался из воздуха, а возможно, он Семенову померещился – у страха глаза велики.</p><p class="p1">Но Марина взяла атлета под руку и склонилась головой к его плечу, и так они и растворились в ночи, полной цикад.</p></span></span>
