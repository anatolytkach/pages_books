<p class="p">3</p>
</div><p class="p1">Официально их там не было, в действительности было порядка двух тысяч человек. Отправкой и созданием легенды занималась десятка – разведуправление Наркомата обороны. Почему Петров знал? Потому что в НИИ это знали все, и знали даже, что Испания может стать той спичкой, от которой полыхнет. А что полыхнет, в этом не сомневались даже дети, в этом сознании, в полной готовности, росли они все, грозовой воздух особой свежестью наполнял легкие, ни на какой альпийский бриз они бы его не променяли. Бригады формировал Огольцов; сначала он начисто отклонил Петрова, как уже отклонил Волчака, не особенно, впрочем, настаивавшего: у Волчака были дома дела. Петров же настаивал, и тут подвернулся превосходный случай: судьбу новой войны решала уже даже не авиация, а изделие, которое называлось просто «флейта», их делал НИИ-3 под водительством Царева. Царева с двадцать третьего волновал исключительно космос, но он не возражал против побочного эффекта вроде уничтожения авиации и танков противника. Бровман знал об этих штуках очень мало, но о них говорили как о главном оружии, которого ни у кого еще не было. Видимо, это имел в виду Клим, когда, визируя беседу в мае тридцать шестого, сказал: конечно, готовиться надо и все такое, но вообще-то современная война будет нами выиграна в первую неделю; не следует расслабляться и увлекаться шапкозакидательством, но просто нужно знать – есть вещь, которая решит исход войны без затяжного кровопролития, а в обозримом будущем сделает войну в прежнем понимании ненужной. На осторожные расспросы Бровмана он только подвел палец к губам и глазами показал резко вверх-вниз, то есть что-то вроде вертикального взлета. Кое-что знал Квят, съездивший в Запорожье и темно намекавший на производство принципиально небывалого топлива. Но ни Бровман, ни Квят не знали, что в марте тридцать седьмого неожиданно для всех, на таких этажах, куда и не все вожди имели допуск, принято было решение проверить в Испании те самые вещи, которыми группа изучения реактивного движения, в просторечии ГИДРа, занималась открытым порядком до тридцать третьего, а потом в закрытом режиме, оказываясь под разными предлогами в цоколе Вавилонской башни. Эти самые вещи назывались для краткости РС-82, каждая с зарядом из двадцати восьми прессованных шашек. Изумительна была почти невесомая легкость этих вещей – одна «флейта» весила триста шестьдесят граммов, в полном же снаряжении шесть кило; она летала со скоростью до трехсот пятидесяти метров в секунду на расстояние до семи километров, и поскольку Петров несколько раз уже взлетал с пусковой установкой, Огольцов принял решение направить его в сопровождении пяти И-15; тем более Петров сам этого хочет.</p><p class="p1">Но подобные решения отменялись с той же внезапностью, с какой принимались: вмешался третий отдел и сказал – ты что! ты что! Если это попадет в руки к вероятному противнику, каковую возможность нельзя не учитывать в принципе, а особенно при всеобщем и поголовном испанском разгвоздяйстве, рассекречена будет наиболее серьезная разработка, над которой в общей сложности пять лет гробятся лучшие силы. И хотя Огольцову страстно хотелось увидеть «флейту» в действии, а решающий перелом в Испании давно назрел, – потому что итальянская бригада, например, невзирая на все усилия товарища Альфредо, он же Пальмиро, проголосовала за отъезд, иначе всех так и перебьют, – складывалось впечатление, что в победе испанцев над испанцами на отдельных этажах не очень уж и заинтересованы. В конце концов, сказал вернувшийся оттуда Ломов, еще неизвестно, кого там больше – анархистов или троцкистов; те и другие воевать не умеют, а нашими руками жар загребать – извините. О том, что воевать действительно не умеют и пополнение никуда не годится, говорили решительно все, включая Теруэля, он же Мигель, он же тс-с… Но хотя И-15 отправились туда без пусковых установок, Петров был уже включен в списки и поехал на войну.</p><p class="p1">Поле он сказал, конечно, что летит в командировку, и ждал, что она не поверит, подумает – решил соскочить. Меня три месяца не будет, сказал он, за эти три месяца она, ты понимаешь, дозреет, – имел в виду Таню, – я вернусь и тогда сразу… Толя, сказала Степанова, делай все, как тебе нужно. Я знаю, ты плохо не сделаешь. Если ты сейчас едешь, то это так и правильно. Ты помни, что я тебя буду ждать, – я и Жанна. Жанной звали дочь, и как-то она никогда прежде так ее не называла в разговоре: дочь и дочь. Жанна была уже большая, пять лет. Петров ужасно стыдился. Но в двадцать пять лет иногда кажется, что все как-то рассосется, решится, – и оно действительно решилось, но кто же мог предвидеть?</p><p class="p1">Он отправился туда под именем Теодора Маттео, моряка с торгового судна <em>Gordo,</em> что в переводе означает «толстяк», но звучит гордо. Петрова в его тоске развлекала вся эта игра. Тоска была тем сильней, что Таня его даже не проводила, – она не могла поехать в Севастополь, была занята в спектаклях, а он никак не мог ей сказать, что едет совсем не на испытания гидроплана и, может, не вернется.</p><p class="p1">Документы Петрову были сделаны превосходные, не подкопаешься. Из Севастополя они за две недели пришли в Картахену и вскоре отправились на аэродром под Мадридом. Для Петрова, как и для остальных десяти пилотов, это была первая заграница, они с наслаждением принюхивались ко всему и обменивались сигаретами с двумя австрийцами и тремя американцами. Земля тут была сухая и почему-то оранжевая, листва у деревьев серая, женщины маленькие и вспыльчивые. Разрешались выходы в город, боевая работа сводилась к тренировкам, собственно боями не пахло. Петрова берегли, заставляли обучать испанцев управлению истребителями, до боя не допускали, а всего грустней, что не было никакой возможности писать письма. Секретная миссия, ты что. Секретность эта раздражала Петрова, того гляди не успеешь попрощаться не то что с Полиной, а даже с матерью, да и Таню ему было теперь скорее жалко. Она ничего не понимала ни в себе, ни вокруг. Все это вместе, плюс растущее напряжение, плюс разговоры о том, что фашисты совсем обнаглели и летают над аэродромом как у себя дома, – что, подумал он, соответствует действительности, это они тут непонятно кто, – привело к тому, что Петров вляпался в свою первую победу, которая чуть не стоила ему жизни, могла обернуться отправкой на родину, но иногда Бог любит сумасшедших. <em>Loca</em> и стало его кличкой, которой он, не особенно таясь, гордился.</p><p class="p1">Когда Петров потом не столько рассказывал, сколько показывал тот бой на руках, Бровман все время думал, можно ли написать об этом фантастическом самоуправстве, но лично от Клима пришла резолюция, что война и есть самоуправство, что если бы они под Царицыном ждали согласования, то Царицын, возможно, и посейчас бы не был взят. Короче, над аэродромом нагло летал франкист-разведчик, и Петрову приспичило его проучить. Он смотрел в небо, курил и ждал и однажды, завидев этого разведчика, бросился в свой самолет и без всякого приказа взлетел. О дальнейшем информация расходилась – Игнатьев говорил, что самолетов было девять, Петров скромно подчеркивал, что семь, но, во всяком случае, их было больше пяти; когда Бровман запросил уточнений, ему напомнили ответ Суворова: «Мы пришли их бить, а не считать». Петров ввязался в бой с превосходящим противником и начал им, конечно, показывать все то, за что его раньше забивали по шляпку, а именно тот рискованный, наглый, неуместный пилотаж, который он выдавал на испытаниях. Что такое, Толя, говорил сам Вахмистров, ты в бою намерен все это крутить? Петров долдонил, что машину надо проверять в экстремальных позициях и все такое, и если б не эти экстремальные позиции, его бы прошили в первые две минуты, а так не могли прицелиться. Нет, это были не разведчики. Это были «хейнкели», надежные, но не слишком быстрые машины, и это был его шанс. Куда уж они там летели – перебазироваться, сопровождать ли войска, они Петрову, конечно, не докладывали. Каковы были их чувства при виде одинокого истребителя, рванувшего им навстречу, – тем более.</p><p class="p1">Когда он понял, что оказался один против… сколько их там было? – то в первый момент похолодел, и посетило его чувство, знакомое действительно храбрым людям: игрушки кончились. Это значит, что до этого всё были игрушки. Сейчас, понял Петров, его будут убивать. Он мог представить, что его будут учить, так сказать, проучивать, даже просто бить, – мало ли его били, те же дубравинские или воронцовские, но не до смерти же, для забавы! Поняв, насколько все всерьез, Петров тут же сообразил, что убивать будут тем самым и Полю, и Жанну, – как-то до него дошло, что отдельно от себя он их уже не воспринимал. Про ребенка, которого ждала Таня, он почему-то не подумал, а вот про этих девочек – сразу. И когда Бровман с легким профессиональным цинизмом спросил его, ну а про что ты подумал-то, нам надо же писать, что ты представил все самое дорогое, – Петров сильно щелкнул его по носу и сказал: тебя. Тебя, Лёва, я представил, как ты будешь меня расспрашивать, и понял, что для этого я родился; ну а потом уж, конечно, руки матери. Бровман написал: «И я подумал, что, если удеру, то это будет вечным позором, тем более что хвост у истребителя – самое уязвимое место».</p><p class="p1">Так вот, поняв, что его сейчас будут убивать вместе с будущей семьей, Петров дал три очереди, причем, вовсе уж необъяснимо, попал. Он чувствовал, что и по нему два раза попали, но главное было спасти голову, ноги и мотор. Петров сейчас не отличал себя от самолета, попали и попали, черт с ними, главное не задето. Дальше мысли прекратились, как всегда при серьезном пилотаже. Петров развернулся и пошел прямо на них, в упор, «хейнкели» прыснули в стороны, но ему прилетело. Машина и так была латаная, а тут ее хорошо тряхануло. Воздушный бой, как мы знаем, бывает двух видов – оборонительный и наступательный; этот был… бог его знает, пляска идиота перед волками, идиота, не имевшего целью никого обратить в бегство, а только спастись из собственной западни; но Петров успел отметить, что прыгал и крутился он как никогда. Сопоставимо с воздушной акробатикой под куполом. Время здорово растянулось. Он понимал, что рано или поздно – скорей рано – свои поднимутся и его отобьют, да черт знает, где свои? На аэродроме стояли две готовые машины, остальные пока выведут, пока взлетят – сто раз рухнешь; выбрасываться – так ведь велик был шанс, что прилетит не к своим, а одному без языка добираться… Тут он понял, что пробили серьезно, в брюхо, что еще одно такое попадание – и будет кряк, бряк; рули высоты плохо слушались, видно, задели. И Петров ощутил такую злобу и легкость, какая бывала только в самые лучшие минуты. Он перестал допускать собственную смерть. В конце концов, был случай, когда он в первом же парашютном прыжке приземлился на рельсы прямо перед поездом и сломал ногу, а все-таки сумел откатиться и тем спастись. И он попер прямо на «хейнкелей», выжимая из мотора силу всех своих шестисот тридцати пяти лошадей, – попер от имени и по поручению всех покровских, воронцовских и дубравинских, Поли и Жанны, и «хейнкели» брызнули от него, как капли от лужи, в которую наступил сапог; никто не мог противостоять такому тарану – и тут он увидел прямо перед собой стремительно приближающийся истребитель, которого не видел прежде, которого не учел. Истребитель не уклонялся от тарана и летел прямо навстречу Петрову, почему-то не стреляя; он надвигался стремительно, огромный, черный, неведомой ему модели, Петров представить не мог ничего подобного. Вероятно, это была американская машина. Петров видел ее совершенно ясно, хотя не мог разобрать, кто за штурвалом, запомнились только красные полосы на крыльях, вероятно, личная боевая раскраска аса, были такие пижоны. Они сходились лоб в лоб, в лучших традициях поручика Казакова, и веселая злоба Петрова сменилась изумлением. Он не представлял, не допускал, что у франкистов есть такое чудовище. Чем ближе Петров к нему подлетал, тем яснее понимал, что размер этой машины превосходил всякое человеческое разумение – больше пятнадцати, нет, двадцати метров в размахе, с винтом невероятной, непропорциональной величины. Петров понял, что этот мотор сейчас его изрубит, измелет в фарш, и диким последним усилием рванул вверх, но что толку было прыгать вверх от такой махины? Гигант надвинулся на него и поглотил, а когда галлюцинация отступила, Петров увидел догоняющих его своих и подбитый им, уходящий с черным дымным хвостом «хейнкель». Петров глупо повертел головой – никакого сверхмощного монстра не было, сам он уходил вверх, а внизу три республиканских истребителя окончательно рассеивали франкистов, одного тяжело повредили, другие улепетывали. Петров понял, что на этот раз у него серьезно сдали нервы и, следовательно, надо будет провериться. Это было хуже, чем увидеть «Летучего голландца». Это было не просто так.</p><p class="p1">Когда он сел и вылез из самолета, пробитого в пятидесяти эдак местах, сознание его стало проясняться. Он сделал, конечно, вещь непростительную. Один за другим садились его спасители, бежали к нему, испанский механик Адольфо показывал большой палец, Грошев выкрикивал ругательства. Ладно, ладно, сказал Петров. Ругаться потом. Спасибо, братцы. Да уж спасибом не отделаешься, орал Грошев. Второй пилот с оливковым лицом, медленно наливавшимся кровью, – храбрый краснеет до опасности, трус после – одобрительно хлопнул его по плечу. «Какой черт тебя туда понес?» – спросил подошедший Добрынин. «Не знаю, – пожал плечами Петров. – Я думал, там один только».</p><p class="p1">То, что произошло дальше, не поддается никакому объяснению.</p><p class="p1">– Работать нельзя, – сказал механик, показав на самолет Петрова. То есть реставрации самолет не подлежал.</p><p class="p1">– Да, не починишь, – рассеянно сказал Петров. – Покурить бы, братцы.</p><p class="p1">Подошедший техник-испанец услужливо подал ему зажигалку. Техник пояснял впоследствии, что никак не предполагал ее немедленного использования, не будет ни один летчик прикуривать возле пробитого бака, отступит хоть на двадцать метров, но вот воистину поторопился услужить. Петров никуда не отошел и прикурил, и в следующую секунду резко отпрыгнул в сторону. Его самолет сгорел у всех на глазах, выгорел насквозь, так что нечего было и предъявить в доказательство героического боя. Вероятно, его забрал с собой гигантский истребитель, который таким своеобычным образом предупреждал Петрова о катастрофе.</p><p class="p1">Повторяю: самолет, уцелевший в бою с девятью, хорошо, пусть семью франкистами, пробитый пятьдесят раз и благополучно приземлившийся, сгорел от испанской зажигалки, потому что опытнейший советский ас закурил, не отходя от бака. Или, чем черт не шутит, уронил зажженную папиросу, поджег струйку из подбитого бака, огонь подобрался к самолету и – ж-ж-ж-ж-жах! Это могло быть, эта версия обсуждалась. Огольцову, когда он прилетел разбираться, так и сказали.</p><p class="p1">– Хер с ним, с самолетом, – сказал Огольцов Петрову. – Я вам объявляю, я вас это… – Он не понимал, что можно сделать с человеком, которого должны были убить только что, и плюс у него сгорел самолет. – Ты что же делаешь? Это война, малый, ты понимаешь, нет?</p><p class="p1">– Приму любое взыскание, – смиренно отвечал Петров. Он допускал, что остался жив, но осознавал это не вполне.</p><p class="p1">– Но куда ты попер без приказа?</p><p class="p1">– Приму любое взыскание, – повторил Петров.</p><p class="p1">– Примет он… Кто тебя спросит. Ты можешь мне объяснить, что произошло?</p><p class="p1">– В Москву только не отправляйте, – попросил Петров. – Стыдно.</p><p class="p1">– Почему стыдно? – как бы сам себя спросил Огольцов. – Чего ж стыдно. В первом бою двоих повредил, сам выжил. Удача исключительная. То ли поощрить тебя, то ли разжаловать к свиньям собачьим. Вообще, конечно, великолепно. Я буду с тобой в Москве разбираться, ты будешь иметь бледный вид, и я с тебя вычту. Пока летай.</p><p class="p1">Петров даже не особенно обрадовался. Чувства его были несколько приглушены. С этого дня его перестали мариновать и сделали командиром звена.</p></span></span>
