<span><span id="id6"><div class="title2">
<p class="p">3</p>
</div><p class="p1">Со стратостатом «СССР-3» тоже не обошлось без предвестий, на этот раз куда более явных. Это было уже после установки у Бровмана личного телефона, в начале сентября. Ночью звонком разбудил Порфирьев, голос у него был веселый и нервный: разрешили, говорю тебе первому. Когда? В семь утра. Что же, будем; Бровман высвистел из редакции Спасского, рванули на Поклонную гору, прибыли к пяти утра. Ночи были уже холодные, и пахло гарью, как часто бывает осенними ночами. Спасский привез сегодняшние «Известия», Порфирьев небрежно их сунул за приборы – обещал посмотреть в воздухе. И тут началось. Это был первый подъем с двойными стропами, системой как бы постепенного старта, которой Бровман толком не понимал: почему-то важно было на взлете иметь короткие стропы. На первой сотне метров они удлинялись, и стратостат набирал полную свою высоту («А то ветерок», – объяснял Порфирьев, но Бровман все равно плохо понимал: наверху же тоже ветерок). Еще одно нововведение – сетка, наброшенная на корпус: пока его надували, корпус должен был висеть неподвижно, вот эту неподвижность давала сетка. Потом ее можно было сбросить, попросту дернув за веревку. Бровман стоял задрав голову и смотрел, как серо-желтая прорезиненная поверхность расправляется и блестит в прожекторных лучах: машина была крупная, 157 тысяч кубов, рассчитанная минимум на двадцать пять километров высоты. Практической пользы в стратостатах не видели, в верхах на Порфирьева как на больно резвого энтузиаста смотрели косо. Девять стратостатов у него за время тренировки погибли от самых идиотических случайностей вплоть до молнии, к счастью, без людей. Но Порфирьев лично пошел к Ворошилову и ради обещанного, подкрепленного всеми клятвами нового рекорда разрешили взлет.</p><p class="p1">Со странным чувством смотрел Бровман на конструкцию, которой предстояло через час оторваться от земли и уйти к полудню на двадцать пять километров вверх – высота, представимая только абстрактно, потому что это почти космос, по крайней мере уже чернота. Страшно разреженный воздух, фиолетовое небо – Порфирьев, несколько рисуясь (и сам над собой улыбаясь), говорил, что таких красок на Земле нет и, раз увидев, будешь всегда к ним тянуться, как альпинист всегда тянется в горы, где дефицит кислорода порождает в нем особенный вид эйфории.</p><p class="p1">Сейчас еще можно было канаты потрогать, с таким же ощущением, с каким восьмилетний Бровман отпускал по Днепру самодельный кораблик, сооруженный и оснащенный по всем правилам, – к технике душа лежала с детства, такелаж с предназначением каждого паруса был нарисован в «Роднике», где также был и недурной шахматный отдел. Бровман был тогда Лёва, Лёвушка, но уже знал, что будет писать и путешествовать. И он представлял, что корабль его дойдет до Черного моря, а потом по проливам до Средиземного, а оттуда, пусть уже и потрепанный, в океан, самый интересный из океанов, хоть и всего лишь третий по размеру, зато омывающий любопытнейшие государства, куда не достиг еще прогресс. Леве виделась туземная девочка фантастической красоты, тонконогая, белозубая, заливисто хохочущая, – вот она выловит его корабль из воды, а десять лет спустя приплывет и он сам, чтобы, разумеется, опознать ее по этому кораблю, так и стоящему с тех пор в ее лачуге. И странно было думать, что вот сейчас он кораблик держит – а потом упустит навсегда и увидит только через десять лет; поэтому Бровман, повинуясь непонятному порыву, зашел в воду по колено и вернул корабль, а потом все-таки отпустил, ибо предназначение корабля – плавать. Мальчик создан, чтобы плавать, мама – чтобы ждать, как писала в молодости одна очеркистка.</p><p class="p1">И тут началось: знаменитая сетка не снималась, заело. Порфирьев отчаянно дергал – результата ноль. Что делать? Для предстартового осмотра надули перкалевого «прыгуна» – малый шар вроде тех, на каких развлекались в парке Горького, Бровман попробовал однажды – едва не лишился сознания; однако тут быстро снарядили красноармейца, он стремительно улетел на пятьдесят метров, но на высоте что-то сделал не так, соскользнул с крошечного сиденья и чудо еще, что зацепился за одну из строп; кое-как, в дымящихся рукавицах, спустился. Шар улетел, видно было, что понесло его прочь из города, на Можайск. На Порфирьева страшно было смотреть. «Ну, хлопцы, – закричал он, – кто сможет?!» Малорослый бурят взял в зубы нож и полетел; у этого все получилось, он причалил к оболочке и разрезал сетку, но после приземления вспомнил, что забыл там нож. Крепко же икнулось его матери, когда Порфирьев сказал все что думал! Послали третьего, и он вернулся с ножом. Все кинулись расспрашивать: разрезов, повреждений нет ли? Он ничего не видел, клялся – все цело. У, сучье племя, выл Порфирьев. Старт задержался на час, а между тем поднимался ветер, и ветродуи, как называли синоптиков, переглядывались нехорошо. «В гондолу!» – заорал Порфирьев; Бровман хотел попросить групповой снимок перед стартом, но не решился. Успел только сказать Прилуцкому: «Помаши мне оттуда газетой, там, за приборами», и снова все пошло пожарным темпом: взвесили, отрегулировали балласт, Порфирьев спустился в последний раз, попрощался без обычной улыбки и полез назад. Раздалось непременное, странное, почти бурлацкое «Дай свободу!». Отцепили канат. С крышки гондолы герой дня крикнул: «Есть в полете!» Кругом зааплодировали, но вяло. Махина быстро шла вверх, небо развиднелось, день предстоял ясный и сияющий, и в этом сиянии – шло уже к девяти утра – стало вдруг ясно видно, что поначалу ровно поднимающийся стратостат вдруг пошел вниз; что-то они там подрегулировали с балластом и стали подниматься снова, но на тысяче метров, когда изменившимся ветром сносило их к центру, опять что-то случилось. Бровман почувствовал знакомую, тошную тревогу – и первым побежал к своей машине.</p><p class="p1">– Дуй, Витя, – сказал он Спасскому, – дуй на шоссе.</p><p class="p1">Тот понял все и рванулся с места. Бровман только успел сказать: «Похоже, не приносим мы больше удачи», – но Спасский зыркнул на него злобно – не до глупостей – и втопил прямо через полянку к шоссе, чтобы не толкаться с другими машинами. Полянка оказалась болотом, они увязли. Положительно все было одно к одному: Бровман вылез, налег, не боясь запачкать новый реглан, колеса завизжали, но увязали только глубже. Вот тебе поспешил. Бровман махнул Спасскому и побежал на шоссе, там летчик Брехунов подобрал его. «Пожара бы не было», – деловито сказал Бровман: он хорошо помнил, как в прошлом году сгорел дирижабль, врезавшийся в гору под Петрозаводском и тоже называвшийся «СССР». Похоже, и это название не приносило счастья: кто-то не хотел, чтобы «СССР» летал слишком высоко и долго. «Не сгорит», – уверенно сказал Брехунов: стратостат казался ему, асу, слишком несерьезным аппаратом, чтобы сгореть. Ехали к вагонному заводу. Стратостат упал на его спортивную площадку, рядом с баскетбольным щитом, раскрашенным в веселенький зеленый цвет. Бровман издалека увидел, что около сдувшегося желтого шара лежит, облокотясь на локоть, Порфирьев – лежит, слава богу, совсем не так, как недавно Лондон. Он пытался закурить, но правая рука плохо работала. Чуть поодаль пытался встать и снова опускался на четвереньки Белорусец, подкатывала скорая, подбегали люди, но Бровман успел первым.</p><p class="p1">– Разбились сильно? – спросил он.</p><p class="p1">– Не очень сильно. Прыгать хотели, но спасли гондолу. Приборы целы все. – Порфирьев и теперь думал о приборах и боялся разноса. – Ты бы, Лев, позвонил… в кремлевку бы… Надо ребят туда…</p><p class="p1">Бровман поднес ему огня и с ужасом увидел, что Порфирьев не может затянуться: вдох причинял ему невыносимую боль, треснули, видимо, ребра, и бледен он был очень. Но нельзя было медлить, где ж тут у них телефон, день-то выходной, и рано, – Бровман побежал к ближайшему зданию, перемахнул какую-то канаву, рядом мчался молоденький репортер из «Пионерской правды», что ли; здание оказалось заводским клубом, что был по причине воскресенья заперт. Бровман увидел в окне телефон и локтем разбил окно. Вытащил осколки из рамы: еще не хватало живот пропороть. Набрал кремлевскую больницу, сказал, что упал стратостат, живы все, но, кажется, переломы. Тут же дал звонок дежурному по НКВД, чтобы на всякий случай были в курсе и обеспечили проезд, – краем зрения заметил, что мальчик из «Пионерки» при этом звонке непроизвольно вытянулся. Но Бровману было не до собственной значимости: он хоть и гордился, что первым дозвонился, но радоваться не приходилось. Бегом, задыхаясь, вернулся назад – Порфирьева грузили на носилки. Врач сказал: да, повезем прямо в кремлевку, у него шок, другие двое как будто легче, смещены позвонки и у одного, кажется, сломано ребро. Брехунов предложил подбросить до центра – нет, сказал Бровман, я разыщу Спасского. Он подошел к гондоле, пока можно, – до гондолы словно и дела никому не было, – и увидел за прибором невредимый, даже не выпавший номер «Известий». Хотел забрать, словно улику, но побоялся лезть внутрь.</p><p class="p1">На следующий день, уже дав короткую заметку об аварии (вероятнее всего, нарушилась все-таки цельность оболочки, но не хотелось подставлять бурята, написал: возможно, была не замеченная ранее трещина или происшествие на высоте, столкновение хоть бы и с птицей), Бровман поехал навещать Порфирьева и команду. Порфирьев держался бодро, но очень ему не понравился. Порфирьев всегда был доброжелателен и тщеславен, даже после неудач, но на этот раз, похоже, подломился, это ощущалось прежде всего в быстрой речи. Он словно суетился. Постоянно напоминал, что «вот в следующий раз», – хотя ясно было, что никакого следующего раза ему не разрешат, он и этого-то добился с величайшим напряжением. Словно клеймо на нем стояло, и в больничной коричневой пижаме он гляделся робко, стала заметна худоба, а щетина и вовсе придавала ему выражение не то бандитское, не то тюремное – пойманно-бандитское, сказал тогда Бровман, но Порфирьев не смеялся. Повреждения оказались серьезные: временная атрофия желудка от удара, трещина в позвонке. Белорусец и Прилуцкий отделались ребрами, соответственно, двумя и тремя, но даже пытались робко шутить. Понятно было, что Порфирьеву ничего не грозит, – рекордсменам позволялось оступаться, без несчастных случаев не бывает стартов, но он будто ждал каких-то подтверждений, дергался от каждого стука в дверь, с медсестрами же был груб, словно они его отвлекали от дела. Два раза за сорок минут он выходил курить, но папиросу бросал почти сразу, мучительно морщась. Все хотел прокашляться, но болела грудь. Врач в разговоре дал понять, что лежать всем троим не меньше месяца, внутренние кровоизлияния, гематомы, ушиб мозга у двоих. Бровман принес газету, как всегда, но впервые не смог отдать – понял, что газета была не нужна, даже и оскорбительна. Порфирьев пролежал два месяца, от курорта отказался и в ноябре застрелился.</p></span><span id="id7"><div class="title2">
<p class="p">4</p>
</div><p class="p1">Этого нельзя было понять, этого никто не ждал, и Бровману все вспоминалось его молящее, совершенно неузнаваемое лицо, когда на прощанье Порфирьев спросил: но ты придешь на следующий старт? Ясно было, что не дадут старта, что не видать ему больше темно-лилового неба, но что вот так… В некрологе, подписанном Кагановичем и десятком людей мельче, говорилось: перенапряжение, травма, нервный срыв. Белорусец отмалчивался, Семенов был совершенно смят. Помянуть собрались в Центросовете Осоавиахима на Суворовском. Поначалу пили молча, но постепенно разговорились и даже стали чокаться, хотя каждый второй тост пили за ушедших; но хватит похоронных настроений, сказал Ляпидевский, будем пить как за живых.</p><p class="p1">Не так часто собирались они теперь, летчики, полярники, капитаны, конструкторы, все, кого газеты давно объединяли словом «герои»: герои вышли на трибуну, героев встречали вожди… Они и составляли два верхних этажа могучей конструкции, похожей на пирамиду физкультурников, – как в легендах Древней Греции, раздел первый: боги и герои. Они были еще молоды, Порфирьев из старших, но в гробу выглядел юношей; оказывается, ему не было и тридцати семи, пушкинский возраст, действительно роковой. Давно миновали года их молодого энтузиазма – хотя какое давно? Пяти лет не прошло с эпопеи «Челюскина», семи – с открытия Люберецкого аэродрома, десяти – с полета Нобиле. Год шел за три. Теперь они больше руководили, чем летали, больше спорили на заседаниях, чем над картой; почти все к тридцати пяти поседели, соль с перцем, и если глаза еще, как принято было писать, блестели молодо, то чувствовалось за этим некое усилие, словно внутри приходилось включить лампочку. Нет, они не состарились, но время первой романтики миновало, и связывало их теперь только прошлое, хотя время для мемуаров, сказал Макаров, далеко еще, товарищи, не пришло. И все-таки они были словно присыпаны пеплом, потому что даже если ранняя смерть входит в привычный набор твоих рисков («Смерть – профессиональная травма летчика», – говорил Волчак с обычной своей рисовкой), часто хоронить товарищей – последнее дело; и это случалось с годами не реже, как можно было ожидать, а чаще. Об этом молчали, этого не понимали.</p><p class="p1">Встретились тут многие старые экипажи, с годами разлетевшиеся далеко и вместо былой дружбы иной раз выказывавшие почти неприязнь: у одних карьера сложилась триумфально, другие оказались оттерты. Им смешно было считаться наградами и званиями, а между тем считались, хотя каких-то пять лет назад счастьем для них было просто выжить и вернуться. Собрались, по молчаливому уговору, без жен, хотя Бровман знал – кому и знать, как не самому преданному хроникеру их побед, – что одни обзавелись молодыми подругами, других бросили прежние, устав ждать, а самыми счастливыми были третьи, кто так и остался с первыми женами, но таких было мало, хватило бы пальцев одной руки. Однако языки развязались, затеялся ликер «Полярный» из сгущенки и спирта, Кригер стал рассказывать о собственном воздухоплавательском опыте. Опьянение у него выражалось в том, что он начинал говорить особенно витиевато и гладко, в том же тоне, в каком писал свои «Записки о дрейфе».</p><p class="p1">– Было это, друзья, в то время, когда мощный воздушный флот Осоавиахима ютился весь в единственном ангаре в овраге близ деревни Мазилово, от которой осталось сегодня одно название района Мазилово-Фили. Дирижабль В-3, как вы, несомненно, помните, далеко не гигант: около трех в нем тысяч кубов, и только. В тридцать четвертом меня взяли в агитационный полет, разбрасывать брошюры о советском дирижаблестроении. Никаких рекордов не предполагалось, нам даже особым предписанием запретили какой-либо риск. Март месяц, сугробы совершенно исключительные…</p><p class="p1">– Снежно было, – подтвердил Гузеев.</p><p class="p1">– Вот, и товарищ капитан не даст соврать. И вот мы всё разбросали, долетели до Волги – Волга, надо вам заметить, зимой и не Волга никакая, одна равнина, – и пришло время поворачивать назад, но встречный ветер был такой силы, что болтались мы в двухстах километрах от Москвы, а до базы добраться не могли и за два часа. Между тем смеркается. Видим вдруг россыпь огней, сверху необыкновенно уютных. Прикидываем, где можем быть, – батюшки, Переславль-Залесский! Снижаемся, но посадить дирижабль, как вы понимаете, задача не из простых. Надо инструктировать встречающих, а откуда им знать? Я радировал бы, да некому. А люди выбегают из домов, смотрят вверх – картина! Мы обеспечили им вечернее развлечение. Я постарался окоченевшими руками написать как можно более четкую записку с детальной инструкцией, мы сбросили ее с грузом и видим: подобрали. Нас несет на окраину города, туда помчался какой-то автомобиль, запалили костры, но мы на радостях рано сбросили гайдропы, они едва до земли достают. Двое как-то подпрыгнули, поймали один, тянут к земле, но тут – что бы вы думали? – попадаем в восходящий поток. А с земли, можете представить, один уцепился за гайдроп и не отрывается! Нас несет вверх, мы орем ему: прыгай! А он боится. Наконец разжал руки, полетел, смотрим – вроде живой. Но как только он оторвался, нас тотчас же понесло вверх с такой быстротой, что я и заметить не успел, как мы с пятисот ушли на тысячу семьсот, – ведь разорвет оболочку, представьте! Что делать? Рекорды в наши планы не входят! Моторы не заводятся, горючка, собственно, вся. Все уже поняли, что нужно нажимать на аварийный спуск, но командир медлит. Чего ждет? Высота два километра! Он дернул, наконец – в дирижабле открывается, вы знаете, такой треугольник, и начинает выходить газ. Мы снижаемся, я убираю антенну и прекращаю радиосвязь, но, сами понимаете, провисли тяги, и рули не действуют! Штурвал вообще делается лишней деталью. Сгрудились все на носу, потому что гондола за счет моторов встала на сорок пять градусов, но и мы всей тяжестью не могли выровнять машину, держались кто за что. Однако идем вниз, почти пикируем. И когда уже мысленно прикидываем, куда приземлимся, – вырастает перед нами огромный дом с башней, и прямо на эту башню нас несет. Не могу постигнуть, как я смекнул, – в такие минуты, вы знаете, сознание работает быстро, – но ухватился за трос руля направления меховыми рукавицами, всей тяжестью повис – и отклонил дирижабль от башни на два метра. Никогда больше смерть от меня в двух метрах не проходила! Но на этом злоключения не кончились: бывают уж такие полеты, что одно к одному. Впереди лес! Что такое падение дирижабля на зимний лес – это вы можете себе представить. Как бы мы нанизались на эти голые прутья – шашлык!</p><p class="p1">Все засмеялись. Ясно уже было, что если Кригер жив, значит все хорошо; конечно, где-то он привирал, но кто не привирал?</p><p class="p1">– Лес, по счастью, оказался еловый. Мы спустились, верхушки спружинили, но все равно, товарищи, потрясло нас знатно. Пока первые попрыгали из гондолы – дирижабль словно воспрянул и пошел было опять вверх, мы не успели закрепить гайдроп, и последним пришлось выпрыгивать уже метров с десяти. Переломы, скажем иначе, возможны весьма. Дирижабль упал потом на порядочном расстоянии, мы опасались взрыва, но обошлось. Места темные, два часа еще потом с фонарями добирались до жилья, и с тех пор, товарищи, никаких дирижаблей…</p><p class="p1">– Порфирьев сам понимал, что швах дело с дирижаблями, – сказал Ляпидевский.</p><p class="p1">– От Порфирьева девушка ушла, – сказал вдруг Храмцов. – За неделю до того полета. Сбежала.</p><p class="p1">– Что ж он молчал?!</p><p class="p1">– А что б ты сделал?</p><p class="p1">Жена Порфирьева не пошла на поминки, компания была мужская, и говорить можно было свободно.</p><p class="p1">– Он дома в последнее время и не жил почти. Все с ней. А она сбежала к кому поудачливей.</p><p class="p1">– То-то оно, – сказал Белорусец. – К нему только дочка приходила… Он говорил, что не хочет жене показываться в таком виде…</p><p class="p1">– Да куда ушла? К кому?</p><p class="p1">– Уехала с кем-то. Она сама с юга была, ну и уехала.</p><p class="p1">– Тебе он рассказал?</p><p class="p1">– Нет, он молчал. Он к жене тогда вернулся, но битое не склеишь.</p><p class="p1">– Ах, вот он, значит, почему…</p><p class="p1">Замолчали.</p><p class="p1">– А мне кажется, – робко вставил свое Бровман, – что причина, знаете… Ну, просто он слишком быстро жил. И это как шагреневая кожа. При такой саморастрате… он себя израсходовал, как топливо, просто у него сил не стало.</p><p class="p1">– От таких причин люди не стреляются, – тихо сказал Васильев. – Чрезвычайно хороший ты репортер, товарищ Бровман, но дурак.</p></span></span>
