</div><p class="p1">Так образовалась уникальная команда – пятнадцать человек, которым нечего было терять. Их отбирали капитан Ладыгин, старпом Ефремов и парторг «Седова» гидрограф Латышев. Ладыгин расспросил всю команду без малейшего пристрастия – или, по крайней мере, скрывал его от себя самого: его интересовали уважительные причины для возвращения на землю. Только уважительные. К таковым относились: личная болезнь или крайний упадок сил (подтверждаемый доктором); обучение в вузе; тяжелая болезнь ближайших родственников. Но был нюанс.</p><p class="p1">Допустим, он слышал в голосе глухую безнадегу, даже если человек убедительно говорил, что уважительных причин у него нет. Возникали сомнения. Куковать во льдах с такими людьми предстояло ему, Ладыгину, и скучать со скучными не хотелось. Напротив, комсомолец Бугров, студент и художник, так подробно расписывал ему свое отставание в учебе, так страстно клялся, что мать больна и отец стареет, даже руки к груди прижимал, – видно было, что сил нет как ему хочется на землю, где иногда все-таки и травка зеленеет, и ласточка с весною. Видно было, что о любви он умалчивает, но есть и любовь. И Ладыгин не захотел его отпускать. Он даже намекнул Бугрову, что поможет вступить в партию: это будет первый прием кандидатом в непосредственной близости от полюса. Бугров подумал и сказал: но родители… После этих слов Ладыгину особенно захотелось его оставить, потому что если б Бугров сразу рявкнул: да! – тогда, конечно, неинтересно. Но Бугров настаивал, и Ладыгин дрогнул. Насчет остальных он более или менее угадал правильно, смутило его только, что к восьми седовцам Зеленцов добавил семерых совсем, кажется, зеленых: радиста с минимальным опытом, трех механиков, кока-одессита («Приезжайте в Одессу, и я покажу вам борщ!»), гидролога и электрика. «Ермак» ушел, и тут же посыпался крупный снег – под таким снегом однажды Ладыгин прощался навсегда с хорошей девушкой: ей не хотелось его отпускать, но она его не любила, и он это понимал. Он и тогда уже был такой, упертый: либо все, либо ничего.</p><p class="p1">И странное дело – когда впереди оказались как минимум полгода зимовки, все успокоились, будто именно такая жизнь – норма, а все остальное – приз, награда. Пожалуй, они были теперь на дне: севернее нансеновского «Фрама», легендарный дрейф которого служил им примером, в тех водах, где расстояние между меридианами хороший лыжник покроет за пару часов, в центре полярной зимы, при стойких минус двадцати, на корабле с намертво заклиненным рулем. Есть ли дно глубже этого? Только смерть. И это внушало гордость – именно это, а не телеграммы от правительства, исправно передаваемые ко всем праздникам.</p><p class="p1">Они и пребывали бы дальше в состоянии ровной и даже бодрой безнадежности, если б их не тревожили; но в Москве не оставляли надежды их вытащить, не совсем понятно почему. Возможно, жалели; возможно, люди с «Ермака», вернувшись на Большую землю, преувеличили трудности, с которыми сталкиваются седовцы, а может, казалось очень уж эффектно – в условиях полярной зимы отправить новый ледокол в такую небывалую даль. Так или иначе, «Сталин» к ним вышел и какое-то время они его ждали, но нашлись все же люди, реально представлявшие толщину льда у полюса, – и в трех днях пути от них ледокол повернул вспять. Тут расчет был ясен: «Сталин», который не смог вытащить своих, пришлось бы переименовывать; Ладыгин все понял и не роптал.</p><p class="p1">С конца ноября наступила спячка, хоть и весьма деятельная: никто не позволял себе думать о доме, патефон заводили редко, разговоров не вели, потому что обо всем переговорили. Несколько раз их чуть не раздавило. Свежему человеку представляется, что дрейф – медленное движение неподвижных ровных льдов; как бы не так! Торошение превращает эти льды в терки, в складчатые холмы, они идут волнами, встают дыбом, возникают ледовые цунами. Так в стране, где нет обычных примет земной жизни – разговоров, политики, газетных сенсаций, нет вообще всего, что считается приметой жизни: дождей, зелени, плодов земных, – происходят свои ледовые штормы; и внутри смерти случаются шквалы: в них даже можно найти своеобычную красоту. Когда спешно разгружали «Ермака», многое оставили на льду; переносить это на «Седова» пришлось аврально, ибо появились разводья, льдину с припасами отнесло чуть не на километр, а почти сразу после этого резко похолодало, пошли сжатия, в тридцати метрах от корабля остановился очередной ледовый вал, и впервые за полгода из-за авралов пропустили баню.</p><p class="p1">Шестого декабря Ладыгин снял координаты и поразился: за полгода «Седов» описал гигантскую петлю, круг площадью в одиннадцать тысяч квадратных километров. Он стоял теперь ровно в той точке, которую Ладыгин зафиксировал в июне. То есть они двигались все время, и довольно быстро – со средней скоростью пять миль в час, ломаным путем, тринадцать раз пересекли траекторию «Фрама» и сейчас стояли ровно там же, где были летом. В этой неуклонности было что-то триумфальное. Они пережили столько смертельных рисков, провели пятнадцать партсобраний, выпустили десяток стенгазет, чуть не ушли вместе с «Ермаком», проводили «Ермак» – и все это было движением по кругу; это наводило на странные размышления и не отливалось в словах. Казалось, они прожили жизнь. В этих широтах жизнь выглядела совершенно бессмысленной и все-таки победоносной: она происходила вопреки всему, вопреки, казалось бы, законам природы. Победой было уже то, что они живы, но разве это могло быть победой само по себе? Вспомнились Ладыгину вычитанные в газете слова летчика Канделаки: «Если есть высота, я ее должен взять». Сперва Ладыгина это утешило, а потом опечалило, и весь день он ходил хмурый, но тут прилетела радиограмма о самолете, который вез к ним медикаменты, жиры, шоколад и корреспондента Бровмана. Интересно, сколько жиров в корреспонденте Бровмане? Эту ужасную мысль Ладыгин прогнал, но ему стало повеселее.</p><p class="p1">В этот раз аэродром построили сравнительно быстро и по всем правилам, расчистили и запасной, и после трех попыток ТБ-3 стартовал с Тикси. Прилетел Водопьянов. Он вел себя подчеркнуто бывалым и сказал Бровману: да ну, что им тут – топливо есть, еда есть… то ли дело на льдине… Считай, курорт. Бровман рассчитывал пробыть на «Седове» никак не больше трех месяцев и весной вернуться на берег – если повезет, со всем экипажем; задержался он, надо признать, подольше, но не жалел. В трудных условиях, когда не происходит ничего нового, но постоянно приходится справляться с сотней мелких дел, разрастающихся в Заполярье до подвига, время спрессовывается: разбирая свои записи, Бровман поражался, как много всего происходило и как мало запомнилось.</p><p class="p1">Больше всего он, как Печорин, беседовал с доктором; это было интересно.</p><p class="p1">Доктор Батагов времени не терял. Хотя больных в клиническом смысле не было – и при этом слегка нездоровы были все, – два года пребывания во льдах давали парадоксальный эффект: человек как бы примораживался, ибо не делал ничего, что старит: не переживал любовных и карьерных разочарований, почти не ссорился с соседями из-за мелочей, не следил за международными известиями. Однако при этом, безусловно, страдал, ибо никаких положительных эмоций, кроме как от сладкого, а сладкого было мало. Иногда, допустим, приходили приятные радиограммы – так, на Новый год всем пятнадцати было присвоено звание почетного полярника, реже случались сеансы радиосвязи, можно было услышать родню, ее по этому случаю привозили в Москву, но это, как говорил Батагов, была палка о двух концах. С одной стороны, нельзя было не радоваться, слыша лепет деток, с другой – детка была только у Ефремова, прочие подобрались бездетные; Ладыгин впрямь стремился брать тех, кому нечего терять. У Ефремова после общения с деткой мужеска пола – весьма, впрочем, великовозрастной, двенадцатилетней, ломко басящей, – случился сердечный приступ, но, замечал Батагов, не от разлуки, а от необходимости скрывать чувства. На той стороне его слушали журналисты «Комсомольской правды», которые и проводили этот сеанс фальшиво-бодрыми голосами, оскорбительно звучащими тут, во льдах; и седовцам надо было бодриться и все время повторять: мы горды, мы бодры, мы выполним с честью… Именно эти эмоции – прямо скажем, на разрыв – вызвали у Ефремова слезы: не так от тоски по детке, как от жалости к себе. Я, говорил Батагов, непременно займусь по возвращении – если, конечно, вернусь – систематизацией своих наблюдений над человеком в экстремальных обстоятельствах: отсутствие ярких эмоций – а их тут так же мало, как и красок – действительно продлевает жизнь, но чёрта ли в такой жизни? Возникает интересное состояние – как бы вечный ад, не зря его последний круг – лед, а не пламя; во льду можно сохраняться бесконечно. Я не шутя думаю, добавлял доктор, что жители полярных областей, если их прилично кормить и не давать окончательно запаршиветь, могут превзойти долголетием горцев; ведь мы, хоть и много таскаем тяжестей и разбиваем льды для аэродрома, действительно не живем. Тут можно хорошо порассуждать о том, что такое жизнь, но это уже не моя сфера.</p><p class="p1">«А физиология?» – спрашивал Бровман доктора. Физиология что же – переходит в режим экономии. Мать мне всегда в случае влюбленности говаривала: с жиру бесишься; да оно так и есть. Еще Павлов… Любовь требует жиру, в наших условиях даже онанизм, простите, не особенно привлекателен. Говорят, на британских судах свирепствует гомосексуализм; так это надо смотреть, в каких широтах. У наших силы есть только на каннибализм, но до него, хвала полярным богам, не дошло. Земля Санникова, сокрытая в вечных льдах, оказалась утопией – нет в этих льдах ничего; сколько экспедиций затевалось – летят же куда-то все эти дикие утки! Оказалось, летят туда, где ничуть не лучше. Оно бы очень красиво, чтобы среди мирового льда блаженный край; но это, как бы сказать, не реалистичней легенды о Гиперборее. Была якобы страна на полюсе, земля вроде Антарктиды, обитель мудрых, но увы. Откуда тут взять мудрости? Тут две краски. Иногда, правда, полярное сияние, но и его роскошь несколько преувеличена; да вы посмотрите.</p><p class="p1">Бровман впрягся в седовскую жизнь, не прося послаблений: это был его метод. Он должен был присмотреться, ибо имелась у него миссия. Мазур провел с ним перед отправкой серьезный разговор, да без миссии Бровмана и не отправили бы. Водопьянов, кажется, тоже был в курсе – стали бы гонять полярного летчика номер один на рутинное, в общем, задание. Так что следовало не менее двух недель врастать в коллектив и наблюдать атмосферу. Все казались слегка пришибленными, работа в самом деле была зверская: Бровман был не хилого десятка, но перевоз на санях беспрерывно скатывавшихся топливных бочек в полярную ночь запомнился надолго. Холод Бровман ненавидел, хотя экипирован был достойно. Зимовка показалась ему тяжелей любых воздушных перегрузок, ибо перегрузки кончались. Летчики геройствовали, а зимовщики долготерпели, это был совсем иной подвиг, остававшийся до сих пор без летописца. Ладыгин отсылал корреспонденции, главным образом в «Комсомолку», и все больше о том, как они тут принимают резолюции да пьют по праздникам за здоровье ЦК, и вкус вина напоминает им, что где-то есть виноградники Крыма. Он же хотел быть писателем, Ладыгин, старался.</p><p class="p1">Все ждали смену, смена была обещана. Пятнадцать свежих полярников тренировались перед вылетом; летели на «Седова» утешительные радио; назывались уже примерные даты, но сказать, что седовцы жили этой надеждой, было бы чересчур: нельзя сказать, что они вообще жили. У каторжников, говорят, надежда отмирает, ее запрещают себе, чтобы избавиться от источника дополнительных мучений, Бровман читал об этом у Морозова, у других царских сидельцев – все-таки бесчеловечна, чудовищна была царская каторга, нечего обижаться на кровь Гражданской войны. Так вот, надежда умирала, а на зимовке, условия которой были физически потяжелей, это умирание началось, должно быть, после первой обманки, когда их не смог утянуть «Ермак». Это не привычка, а спасительный механизм, нежелание травить душу. Никакой почет не спасет в таких условиях, и потом, у каторжников тоже был своего рода почет, но все это доходило издалека, из-за границы, как приветы из Кремля долетали в рубку «Седова».</p><p class="p1">И Бровман решился.</p><p class="p1">Через две недели, когда уже нельзя было тянуть, он постучался в капитанскую каюту и приступил к изложению. Прежде всего надо было сослаться на Мазура, на перестановки в верхах Севморпути – вы сами понимаете, что зимовка всего ледокольного флота не могла приветствоваться наверху (Бровман дал понять, что имеет доступ и в Кремль). Лично, не только в постановлении, многие не одобрили. Понятно, что на вас никакой вины нет, руководство… и т. д. Ладыгин слушал молча, но был бледен, видимо, понимал, что разговор не сулит никаких приятных известий. Вы понимаете, сказал Бровман, что в нынешних условиях, когда… и ты ды, что́ я буду вам как коммунист коммунисту… В общем, говоря прямо, отправка смены на трех самолетах, обучение новых людей, ваше возвращение до конца дрейфа… оцените, каким оно может быть, если вы лично приведете «Седова» в родную гавань… Замена сейчас будет затратна, политически не очень уместна, а от себя скажу: вы этим просто подставитесь. Как раз сейчас идет смена всего руководства в Севморпути, и если вы прилетите после смены – одно, а если возвратитесь героем – совершенно другое. Никто вас не принуждает, мы не в Америке, не в Германии. Но все-таки, если есть резерв и силы, личная просьба товарища Мазура… со своей стороны сделает все возможное, чтобы забрать вас при самом начале навигации, когда уже свободная вода… я слышу разговоры, вижу, что дрейф ускоряется, может быть, к этому моменту вы уже и сами окажетесь в чистой воде… (Бровман выучил уже некоторые их словечки, вставлял в речь по возможности безыскусно).</p><p class="p1">Ладыгин ничего не сказал. Слушайте, воскликнул Бровман, я прямо свиньей себя чувствую, прямо дрянью, но поймите простую вещь. Ведь не важно там – он показал глазами, – кто лично виноват. Там важно, героем ты вернешься или не героем. Когда по всей тайге две недели ищут женский экипаж, это одно. Они доказали, пролетели, рекорд установлен. Но когда вывозят с зимовки за полгода, а то и меньше до конца дрейфа… понимаете? Вам в Москве квартира выделена на улице Горького, жену перевозят туда. Всем Героя, это само собой. Про денежные выплаты не говорю, неважно это, речь идет о вашей жизни, но вот я здесь, с вами, я останусь до конца, улетать не собираюсь, мы книгу с вами напишем… Я вам гарантирую издание любой вашей книги… Но чисто даже по деньгам государству сейчас обременительно готовить экспедицию! Дайте одну радиограмму – остановится затратная, огромная работа и не будет риска с полетами этими, вы сами видите, лед гуляет, как они еще приземлятся сюда? Бровман начинал заводиться, его бесило ладыгинское молчание. В конце концов, сказал Бровман, большевиком называется человек, который делает невозможное. Да, сказал Ладыгин, конечно. А меньшевиком – который делает возможное, да? И улыбнулся. Бровман не знал, считать ли эту улыбку согласием и успехом миссии или признаком безумия. Мазуру в самом деле нужен был их подвиг, а не дезертирство; ему надо было отчитываться. Прикрыть зазнайство и дурость можно было только подвигом, на месте черного пятна сделать красное, Бровман послан был освещать подвиг, а не эвакуацию. Он никогда еще не ошибался в таких случаях, он был летописцем победы. Где Бровман, там Звезда, говорил Кандель, про которого он все еще вспоминал с болью, большей даже болью, чем при мысли о Волчаке. Но все это – и Кандель, и Волчак – было сейчас бесконечно далеко: область героического переместилась с небес на полюса, дальше, вероятно, будут глубины… Да, конечно, сказал Ладыгин. Да никто и не ждет особо. Хотя… вот… картонок написали двести пятьдесят штук… Он имел в виду надписи «Отработанный пар», «Пародинамо», которые разместили на всех котлах и трубах для скорейшего обучения смены. Все-таки, знаете, сказал Ладыгин, печально улыбаясь, название судна играет значительную роль. «Фрам» значит «Вперед», а «Георгий Седов»… Георгий Седов умер, не дойдя до «Святого Фоки», и флаг, который он собирался водрузить на полюсе, водрузили на его могиле. И когда выжившие вернулись, денежного довольствия им не полагалось, потому что война. Не до них было, знаете? Так что вы правы, товарищ Бровман, сердечно вас благодарю. Если возвращаться, то победителями. Но, сами понимаете, с помполитом Трофимовым я должен переговорить лично.</p><p class="p1">Помполит был очень плох: отказался эвакуироваться, сославшись на должность и на то, что коммунисты не сдаются, но еле ходил, подтягивал одну ногу к другой, доктор затруднялся с диагнозом – то ли суставы, то ли, не дай бог, позвоночник; Трофимов решился, кажется, если и получать своего Героя, то посмертно. С Бровманом передали ему какие-то порошки, капли, действия не замечалось. Трофимов подумал, опустив голову: м-м-м, что же, в этом есть резон. Бог его знает, что мы тут пересиживаем: судя по газетам хоть бы и месячной давности, головы летят, тому есть объективные причины. Тебе я лично дам совет (и тут Ладыгин в очередной раз убедился, что помполит его мудр как змий, партия других не выбирает): иди-ка ты, товарищ Ладыгин, после общего собрания в недельный санный поход. Сходишь за восемьдесят седьмую параллель, понаблюдаешь, доложишь… Командование передашь стармеху Курляндцеву, возьмешь палатку, а то она залежалась, – тебе надо сменить обстановку, иначе сойдешь с ума. Я подумаю, осторожно сказал Ладыгин. Да и думать нечего, партия за тебя думает.</p><p class="p1">Общее собрание состояло как бы из двух частей. Бровману настрого запретили доводить мнение верхов до коллектива, Ладыгин взял все на себя. Так и так, товарищи, я долго думал, смена обойдется государству в огромные деньги, обучать замучаемся, до победного возвращения остается уже гораздо меньше, чем мы торчим здесь, – я предлагаю остаться, это будет совсем другой коленкор. Сначала все смотрели в крайнем недоумении, но Ладыгин успел доказать, что зря ничего делать не будет. Высказались: один пропускал уже третий год в вузе и все забыл, другой чувствовал себя все хуже, третий скучал по подруге, но в конце все добавляли: а в общем, как решит коллектив. Кок даже сказал: в таком прекрасном коллективе я не бывал еще и вряд ли буду. Тогда Трофимов отдал капитану голевой пас: ну а сами вы про себя как думаете, капитан Ладыгин? Товарищи, сказал капитан, я коммунист, коммунисты корабля не бросают. Признаюсь, были и у меня минуты слабости, но чувство, что с нами весь народ… короче, вы понимаете. Товарищи, сказал Курляндцев, от которого совсем нельзя было ожидать такой сентенции, многим настоящим коммунистам сейчас гораздо хуже. Бровману эта реплика очень запомнилась, как и следующая: Шелин, помор, механик, по совместительству водолаз, сказал: братцы, все лучше, чем смерть. Он так это сказал, как будто имел уже опыт смерти, – и никто не усмехнулся, некоторые кивнули. Вероятно, в подводных своих погружениях Шелин видел что-то такое…</p></span></span>
