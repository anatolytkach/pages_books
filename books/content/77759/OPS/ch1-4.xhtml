<span id="id3"><div class="title1">
<p class="p">Глава первая</p>
<p class="p">Прыжок</p>
</div><span id="id4"><div class="title2">
<p class="p">1</p>
</div><p class="p1">Все началось – или кончилось – 20 июня 1937 года, когда упала Люба Лондон. Так показалось Бровману два года спустя, и он достал дневник, чтобы перечитать все про этот день.</p><p class="p1">В семь утра за ним приехал редакционный шофер Спасский, и они рванули на Люберецкий аэродром. Небо было промытое, улицы пустые, настроение прекрасное. Испортили им это настроение, когда не пропустили на Рязанское шоссе. Шоссе перегораживал грузовик, и постовой всех разворачивал. Бровман понял, что придется махать удостоверением. Он этого не любил.</p><p class="p1">– Товарищ, – сказал Бровман уважительно, однако без просительности. – Мы едем на затяжной прыжок, «Известия».</p><p class="p1">– Все понимаю, товарищ. Розыскное мероприятие.</p><p class="p1">– Но нам в номер писать про это. Мы не можем опоздать.</p><p class="p1">– Никто не опоздает. В объезд попадете.</p><p class="p1">– Пока будем объезжать, они уж прыгнут, – сказал Бровман уныло. Он понял, что ничего не добьется.</p><p class="p1">– Никто не прыгнет, проезд всем закрыт. Дольше разговаривать будем.</p><p class="p1">Бровман никогда не спорил с милицией и только со злости хлопнул автомобильной дверцей.</p><p class="p1">– Обломись, – сказал он Спасскому. – Ищи объезд.</p><p class="p1">– А тут чего?</p><p class="p1">– Не знаю. Серьезное что-то. Не говорят.</p><p class="p1">– Шпиона ловят, – предположил Спасский и развернулся.</p><p class="p1">Долго они ныряли по каким-то ему одному ведомым закоулкам, вырвались в дачную местность, проехали мимо большого пруда, петляли, поднимая клубы пыли, и проезжали дачные улицы. На дачах, несмотря на ранний час, старухи уже копались в грядках, мелькнул гамак с солидным мужчиной, девушка в купальнике ловила раннее солнце. Никому из них Бровман не завидовал: они и не знали, что люди едут на историческое событие. Наконец выехали на относительно ровную грунтовку и подкатили к аэродрому с неожиданной стороны.</p><p class="p1">– Ты откуда этот маршрут знаешь? – спросил Бровман.</p><p class="p1">– Жили мы тут недалеко в деревне в прошлом году. Летом тоже.</p><p class="p1">Они успели, никого из газет еще не было, только «Союзкинохроника» расставляла аппаратуру. Бровман, как всегда, боялся, что правдисты приедут раньше, хотя писать всем предстояло об одном и том же, – но мало ли. Машбица не было. Минут через двадцать подъехали начальник летного отдела Осоавиахима Буров, неприятный, заносчивый и грубый, испытатель Сергеев и с ними в машине Машбиц. На Бровмана он смотрел пренебрежительно, прокатился с начальством, примазался. Он и теперь шел за Буровым, прислушиваясь искательно. «Черт его знает что такое», – сказал Буров. Их тоже развернули, почему – никто не сказал. Вероятно, что-нибудь исключительное.</p><p class="p1">Еще через десять минут приехали Лондон с Ивашовой, и Бровман был вознагражден: Люба ему помахала. Он с ней за неделю до прыжка, когда не было еще разрешения от наркома, сговаривался вместе писать письмо Сталину. Год назад, когда вожди посещали аэроклуб, Люба дала обещание прыгнуть с затяжкой в шестьдесят секунд, перекрыв мировой рекорд, и сегодня должна была выполнить обещание. Писать, уверяла она, ей гораздо трудней, чем прыгать. «Лёва, вы напишете мне, да?» Книгу свою «Записки парашютистки» она через пень-колоду, после долгих отнекиваний, наговорила Исаеву, постоянно приговаривая: «Да кому интересно?» И действительно вышло неинтересно, потому что главное она переживала в полете, а про это никто рассказать не мог. «Я больше всего люблю, когда запахи появляются. Летишь – там запахов нет. А когда уже дернешь кольцо, уже ясно, что хорошо все, – тогда метров за двести начинают наплывать: цветы, трава. И уже вокруг воздух теплый». Про ощущения в затяжном прыжке, говорила она, рассказать нельзя, но при этом в полете она действовала четко, как машина. Вообще, в Любе мало было романтики. У них с Булыгиной были свои поклонники, сырихи, как у Лемешева с Козловским: удивительна эта парность во всем. Булыгина – та была вся огонь и непосредственность. Когда Ворошилов награждал парашютистов – расспрашивал, показав глубокое знание предмета: как крепить секундомер? как не дернуть кольцо инстинктивно сразу после прыжка? как избежать штопора? Булыгина, чернявая, стремительная, щебетала про чувство полета и рассказывала, мило смеясь и рассчитывая на такой же милый смех, что сама себя сразу после прыжка левой рукой за правую хватает, вот правда, товарищи! Сразу влюбленные улыбки. Лондон, прямая, основательная, рассказывала о личной методике: как же не войти в штопор? В затяжке – обязательно войдешь. Я когда прыгну, первые десять секунд лечу прямо, ноги сжаты. Потом начинает крутить – ну, я кручу в обратную, но это не всегда возможно. Тогда разводишь ноги и резко выбрасываешь левую руку, а правая – на вытяжном кольце. Несложно, в общем. Главное, чтобы спокойно. Вожди слушали, кивали, и видно было, что Булыгина им нравится больше. А летчики любили Лондон: академик девка, сказал Машевский, который летал с ней на планере.</p><p class="p1">Дружила она только с Тамарой Ивашовой, самой тихой и долговязой, выше иных мужчин, во всем парашютном отряде; о чем уж они там меж собой говорили, Бровман не мог представить. Было у них взаимопонимание без слов, и потому им так удавались синхронные прыжки, от которых столько восторгов выслушали при поездке наших в Румынию. Король Кароль вручал им тогда знак доблести.</p><p class="p1">Ивашова и сейчас молчала, а Лондон строго ответила кинохронике: у нее это пятидесятая затяжка, круглое число, долго непонятно было, дадут ли разрешение, но в шесть утра синоптики сказали – да. Волнения перед прыжком давно нет, одно волнение – не перетянуть. «Я на первом еще прыжке затянула, ждала двадцать одну вместо пятнадцати. Тут надо на семистах раскрыться, ниже опасно». «На тысяче!» – веско сказал Буров. Ему лично Ворошилов сказал: за каждую из этих девочек отвечаешь головой, и погрозил пальцем.</p><p class="p1">Бровман подошел поздороваться и напомнить, что им вместе писать. «Мы сегодня хорошо прыгнем, увидите, – сказала Люба. – Небо видите какое? Я прямо счастливая с утра. Только вы как будете писать, не пишите „Лондон“. Миша обижается, он хороший у меня. Напишите Лондон-Ефимова». «Даже могу его фото вместо вашего», – пошутил Бровман. Миша ее был ничем не примечательный, тихий мальчик, она подобрала его в музыкальном техникуме, где занималась серьезно и безнадежно: любовь к музыке была большая, способностей ноль. Люба запрещала ему приезжать на аэродром.</p><p class="p1">И дальше страшно быстро все задвигалось: Буров дал команду, все побежали к самолету. Тот резко ушел на высоту, набрать предстояло семь шестьсот, и потянулось ожидание, пять, десять, двадцать минут, и Бровман, отличавшийся чутьем на такие вещи, почувствовал, что у него в начинающейся жаре холодеют ноги, а на мужа Ивашовой, такого же долговязого Олега, он смотреть боялся. Понятно уже было, что пошло куда-то не туда, но не было еще чувства, что окончательно. Была надежда, что снесло к Ухтомской, туда дважды приземлялись на тренировках, – но стремительно спустился и заскакал по полосе, с трудом тормозя, Шабашов, к нему побежал Буров, и Бровмана поразило потерянное, детское шабашовское лицо: на двух тысячах он потерял парашютисток из виду, спустился – никого. Подъехала карета скорой, Буров прыгнул в нее, уехали, кинохроника тупо стояла, не зная, что делать. Подбежали мальчишки, видимо деревенские, и, тоже прыгая, заорали: они там упали! Бровман побежал, Машбиц неловко за ним, но на пути была колючая проволока – откуда, с чего? За проволокой был виден метрах в трехстах осевший, полураскрытый парашют, белый, самый прочный. К нему бежали с носилками, что-то делали, потом отошли.</p><p class="p1">С мужем Ивашовой случилось страшное, он катался по траве, рвал ее и выл. Подошел Буров и махнул рукой. Бровман узнал потом, что секундомеры разбились, но с вышки ему рассказали, что парашюты стали разворачиваться на двухстах метрах, раскрыться толком не успели, да и не могли. Врач буркнул, что у Лондон ни одной кости целой, у Ивашовой сломаны все ребра, и что заставило их в прыжке так перетянуть – непонятно. Бровман хотел заглянуть в лица, понять хотя бы, мгновенно или нет, и, может, по выражениям угадать причину, но Буров всех прогнал.</p><p class="p1">Ведь как-то они одевались с утра, застегивали комбинезон… Бровман всегда думал о том, как человек одевается в свой последний день, не зная, что он последний. Старик, понятно, умирает в своей постели, но герой, убитый на баррикадах, за секунду до этого говоривший с друзьями… В Музее революции в новой экспозиции к тридцатилетию пятого года Бровман видел кофточку Люсик Люсиновой, пробитую пулей юнкера, – ведь надевала она с утра эту кофточку? Что было на Любе, он не видел под меховым комбинезоном. А ведь спала с мужем в эту последнюю ночь, еще и прощалась буднично, как всегда, но наверняка что-то чувствовала, – Бровман и сейчас, припоминая, пытался в последнем разговоре с ней поймать это предчувствие. Укладка парашюта? Люба с пятого прыжка укладывала сама, говорила об этом всегда: полагаться на укладчика – барство. У нее были уже, как она называла, внуки – ученики учеников, и тоже всегда все сами. Особенно же Бровман не мог теперь понять, как это – человек прыгнул с семи тысяч метров, зачем? Он обычно таких вопросов не задавал, но теперь все увиделось ему совсем абсурдным. Люди будущего, с которыми он часто вступал в мысленный диалог, – поймут ли они вообще, что́ все эти мужчины, собравшиеся на Люберецком, здесь делали и почему две женщины упали с семитысячной высоты?</p><p class="p1">Надо было ехать в редакцию и как-то отписываться, но Бровман не понимал, как он будет сейчас это делать. Не сказать чтобы его знакомые не бились – Бровман видел катастрофу «Горького», знал не меньше пяти человек оттуда, – но там по крайней мере ясны были причины и он ни с кем не говорил перед полетом. Здесь же он был последним, кто перемолвился с Лондон перед стартом. Может быть, если бы он сказал ей что-то другое… Вдруг именно он и высказал нечто роковое? Этого не могло быть, все бред, и почему-то ему казалось, что все из-за объезда, что во всем виновата милиция, ловившая на Рязанском шоссе неизвестно кого.</p></span></span>
