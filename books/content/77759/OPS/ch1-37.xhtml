</div><p class="p1">С того самого момента, как Волчак и остальные (теперь это были именно Волчак и остальные) 15 августа вышли из поезда на перрон Белорусского вокзала, Бровман понял, что приземлился совсем не тот командир, что взлетел. Этим ощущением он осторожно поделился с Дубаковым, с которым был поближе, чем с остальными, – и Дубаков мягко ему сказал: ну что ты хочешь, человек два месяца не спал, не ел, опять же, говорят, полет над полюсом что-то сильно меняет, я вот тоже не в своей тарелке, погоди, устаканится. Это слово буквально взорвало Бровмана, ассоциации были у него недвусмысленные. Волчак был, конечно, не рабочий Стаканов, который вовсе потерял себя и быстро спивался, но Стаканов и никогда ничего собою не представлял, а Волчак представлял и спиться не мог, и потому все было серьезней. Сходные случаи были описаны в «Крокодиле» – там рекордсмен-многостаночник пошел по карьерной лестнице, объездил страну, блистал на съездах, но потом вернулся в коллектив, и, «оглянувшись виновато, рекордсмен сказать лишь мог: покажите мне, ребята, как включается станок».</p><p class="p1">Волчак, разумеется, летал, бывал на заводах, заезжал в институт, но теперь именно заезжал – он вернулся государственным человеком, и что самое странное, он уже в это верил. Произошло ли это на полюсе, где ощущаешь себя на вершине земли, или в Штатах, где ему поклонялись, как звезде, – не так важно. Сталину, похоже, понравилось часто его видеть.</p><p class="p1">Утром 17 августа Волчак появился на пороге квартиры Дубакова – в том же доме, но двумя этажами ниже – в махровом халате и тапках: он принес известинскую статью Трояновского. Там говорилось, что советские пилоты – послы СССР, заставившие весь мир полюбить страну рабочих и крестьян, растопившие лед недоверия, достойнейшие, лучшие сыны народа, представляющие те качества, которые! которые! – Трояновский прекрасно это умел, и потому его маленькие заблуждения и т. д. были теперь нерелевантны. «Ты понимаешь? – перечитывал Волчак по три раза полюбившиеся формулировки. – Мы имеем пер-во-сте-пен-но-е международное значение! Эти все там, в Париже, со своим конгрессом не заставили полюбить, а мы заставили!» Дубаков представил писателей, лично перелетевших океан на какой-то американский конгресс, – тогда и они заставили бы полюбить. «А писательница Вера Круц?» – процитировал он из любимой книжки, но Волчак не опознал и ответил: «Херуц».</p><p class="p1">Он получил полковника (Дубаков – майора, а Чернышев – введенного всего два года назад бригадного инженера); Волчак был в поездке по Волге, куда его зазвали земляки якобы с отчетом, как скромно называл это в газетах он сам, на деле же с чествованием. В родном селе по случаю его приезда вывесили флаги. То есть это был уже государственный праздник, вы поняли? От «Известий» был туда командирован Пилюгин, он выдал то, что, вероятно, и требовалось, но стал объектом дружных насмешек на летучке: был непременный древний Пахомыч, который, густо окая, вспоминал Васятку вот этаким-то («Алло, Пиль, как это он? ВОсятку, вОт этОким?»), и все односельчане, конечно, приводили единственный достоверный эпизод волчаковского детства, когда, поспорив, что первым домчит на лыжах от церкви до берега, обогнав тройку богатого старообрядца, Васятка срезал угол и страмплинил с крутого обрыва, причем сломал лыжи и кубарем скатился на реку, но на льду оказался первым, чем заслужил кличку Долбанутый, а все-ж-ки самовар с медалями достался ему; вот, собственно, и самовар.</p><p class="p1">Волчак отчитывался перед земляками на берегу, потом в клубе, потом в собственной избе; он отчитывался бы и еще, добавляя, что в Америке, конечно, не умеют так слушать, но пора было ехать в Астрахань и отчитываться там. Его выдвинули от родного избирательного округа в Совет национальностей. Он проводил в день по четыре встречи с избирателями, после встреч делился с корреспондентами местной прессы: здесь, только здесь он, подобно герою мифа, подпитывается от родной земли. В его речах часто замелькали слова о русской, истинно русской, именно и только русской силище – с прошлого года, когда за издевательство над корнями погорел несгораемый Демьян, это было непременным элементом риторики, и Волчак это схватил первым. Летчику нужно чутье – Волчак обладал им в превосходной степени. Он выходил на площади при тридцатиградусном морозе в одной летной куртке. Его избрали единогласно, восторженно, он входил в интересы избирателей, которых быстро возненавидел, потому что интересы их были тараканьи, просили о мелочах, не в силах справиться с элементарным, но это была проверка, Волчак знал: он должен был показать, что умеет не только парить в безразмерных небесах, но и вникать в грошовые нужды народа, копаться, так сказать, в почве. Он от всего этого, что черви ползучие называют жизнью, сбежал в небо, но теперь его это догнало и властно требовало внимания. Впрочем Волчак понимал и то, что это трамплин, что, оттолкнувшись, он взлетит выше любого рекорда.</p><p class="p1">Кстати, рекорды стали плодиться с неумолимой скоростью и неутомимой глупостью, и не раз и не два Волчак подумал, что вовремя выскочил из гонки. Летчик Махов на «уточке» за один летный день с десяти утра до восьми вечера совершил пятьсот полетов, если считать полетом отрыв на одну минуту и посадку на том же аэродроме. В этом не было никакого смысла, Махов загнал себя и едва не загнал самолет. На эти прыжки невозможно было смотреть, официальному наблюдателю Полевому, призванному зафиксировать рекорд, стало плохо, а Махов все взлетал и садился, взлетал и садился. Волчак поздравил его официальной телеграммой, но сам этого уже не понимал; лучше вникать в проблемы избирателей.</p><p class="p1">Правду сказать, он и это умел оформить эффектно: один избиратель в отдаленном районе родной области страдал радикулитом. Волчак вылетел к нему на той же «уточке» из Горьковского аэроклуба, созданного при его же личном содействии, сел в трудных метеоусловиях – надо признаться, виртуозно, причем всей деревней расчищали ему площадку, – подхватил несчастного согнутого буквой зю механизатора и доставил в аэроклуб, где его уже поджидал врач; авиация в действии, в прямом соприкосновении с нуждами народа! Он лично выправил репортаж Бровмана об этом, и Бровман уловил отеческие нотки в волчаковском голосе; никакое начальство с ним так не разговаривало, Бровман все-таки был пионер воздушной темы и некоронованный король репортеров, но как же ты не понимаешь, товарищ ты этакий Бровман, сказал ему Дубаков, ах, как же ты не понимаешь…</p><p class="p1">Другой громкой историей стала жалоба мужика из отстающего колхоза. Мужик прямо прописал в письме к герою, что очень голодно, не может быть, чтобы свой, всенародно избранный герой не внял мольбе. Всенародно избранный герой посетил колхоз, пропесочил, понятное дело, председателя, но выносить сора из избы не стал, а колхозника, имевшего большой опыт голодания и выживания в непростой ситуации, отправил на Дальний Восток, мотивировав это тем, что у нас огромная нужда в людях. А то, сказал герой, могу и на зимовку в Арктику поспособствовать – нет? не хочешь? Там быстро бы понял, как оно бывает голодно и скучно, тебе раем покажется твое Жадруново! Репортажа об этом не было, но в интервью «Правде» Волчак отчитался и об этом красноречивом случае: помог товарищу Афонтьеву в осуществлении давней мечты – оказаться на одной льдине с героями.</p><p class="p1">Разумеется, в чем-то это был прежний Волчак, отзывчивый на чужую жалобу, если только это была жалоба равного: когда пропал Гриневицкий, он первым вызвался летать, но их АНТ пребывал в разобранном виде, перевозился по частям на родину, лететь было не на чем. Волчак предложил обратиться к американцам, и эта мысль очень не понравилась Имантсу, тот даже позволил себе повысить голос: черта ли вы лезете, товарищ Волчак, не возомнили ли вы себя международным дипломатом? Волчак посмотрел на Имантса очень нехорошо, и это обстоятельство могло оказаться роковым: конечно, герой не стал бы снисходить до жалоб на замнаркома обороны. Но замнаркомов обороны может быть много, а такой герой один; и у Имантса много было неприятностей, в том числе бесследная и двусмысленная пропажа Гриневицкого – лучше гибель, чем такая пропажа, причем лучше для всех – и для начальства, и для погибшего. Без вести пропасть – худшая участь, всегда есть шанс, что перебежал или перелетел, тут и родственники, и дети под подозрением, о непосредственном начальстве и не говори; и в августе Имантс повысил голос на Волчака, а в октябре сам пропал без вести, но не над полюсом, а непосредственно на рабочем месте. Кстати, товарищ Баженов, позволивший себе так не вовремя зацепить крыло волчаковского АНТа, пропал примерно в это же время.</p><p class="p1">Тут в риторике Волчака появилась интересная черта: он стал все время говорить о смерти, словно возмещая таким образом недостаток новых подвигов. В клятве депутата он сказал, что готов служить Родине вообще и своим избирателям в частности, пока глаза видят линию горизонта, а рука держит штурвал. Несколько раз он повторил на митингах, что готов скорее умереть, чем отступить. Наконец, на кремлевском банкете в честь возвращения папанинцев случилось неописуемое. Сталин был благодушен, немного поигрывал в старика, хотя выглядел превосходно, лучше всех вождей, – атмосфера застолья, видимо, бодрила его. Он говорил нарочито тихо, иногда посмеиваясь дребезжащим смешком. Товарищ Волчак, сказал он, исключительный человек, таких летчиков мало в мире, может быть, нет больше. В Америке спрашивали – сколько он стоит? Нет таких денег, товарищи. Мы героев в деньгах не оцениваем. Другим непонятно, когда мы спасаем героев. Один ледокол послали, другой, третий послали, послали бы четвертый, если бы надо было. Европейско-американский критерий прибыли мы, товарищи, похороним в гроб. За это выпьем, товарищи! (Выпили.) Возвращаясь к товарищу Волчаку. Советские люди не должны заискивать ни перед кем. Он правильно, товарищи, дал понять американцам и французам: нет таких миллиардов, в которых можно было бы исчислить нашего героя! Нет таких ценностей, в которых можно было бы его оценить! И мы не должны пресмыкаться, не должны заискивать, мы должны дать понять, что русскую силу не с чем сейчас сравнивать, товарищи!</p><p class="p1">Волчак встал и сказал: прошу слова. Не дожидаясь разрешения, он заговорил: товарищи! За Сталина умрем! Все умрем за Сталина! (Он был уже, говоря по-народному, хорош, но и в самом деле хорошел в этом состоянии: русый чуб свешивался на потный лоб, лицо краснело и как бы озарялось.) Сталин со смешком заметил: не думаю, что следует перебивать оратора. Волчак покраснел еще гуще и сказал: чисто в порядке добавить… Не думаю, ласково сказал Сталин, что вам надо добавить, товарищ Волчак. Зарядько норму знает! – напомнил Волчак, и все грохнули. Мы все умрем за Сталина, повторил Волчак со страшной жертвенной энергией, мы все умрем! Много ума не надо, чтобы умереть, мягко сказал Сталин, и зачем молодым атлетичным людям умирать за старика? Нет, клянемся, закричал Волчак, клянемся! Я уверен, что никто из нас не хотел бы пережить Сталина. Мы клянемся, что будем драться за Сталина так, как даже он сам не знает как! Я призываю, прошу, пусть сейчас выйдут ко мне – вот те, кого я здесь вижу: Водопьянов, Громов, Ломаков, Дубаков, Юмашев, Данилин! Идите все сюда! Я призываю прийти, и сказать, и поклясться: если надо будет руку отдать – отдадим руку! Если ноги отдать – отдадим ноги! (Все стали поеживаться, происходило нечто не совсем привычное; от таких экстазов шаг до внезапного членовредительства, никто не знал, на что способен Волчак от избытка чувств и в какой степени он сейчас наигрывает, а в какой искренне ярится.) Если надо будет головы отдать – головы отдадим! (Летчик без головы, подумал Бровман. Майн Рид. Все-таки немного чересчур.) Отдадим все за Сталина! Сталин встал и еще ласковей спросил: сколько вам лет, товарищ Волчак? Тридцать три, ответил тот смущенно. А мне пятьдесят восемь, скоро будет пятьдесят девять. Сто́ит ли в тридцать три года так хотеть умереть? Надо жить, надо работать во всех областях нашей жизни, надо радоваться и петь, товарищи, а умирать не надо. Я предлагаю выпить за то, чтобы мы работали, как товарищ Волчак, чтобы мы жили, как товарищ Волчак, а умирают пусть империалисты, о них никто не пожалеет, а наследники даже обрадуются. Дружный хохот покрыл эти слова, все выпили, и многим казалось, что Волчак испортил себе всю перспективу; но эти многие ни черта не понимали. Это был самый высокий, самый умный взлет Волчака.</p><p class="p1">Едва договорив тост и осушив бокал минералки, Сталин поманил Волчака и отошел с ним в одну из тех потаенных, тихих комнат, каких было много в залах Кремлевского дворца; там они проговорили минут десять, содержание этого разговора никому не было известно. Сталин снова взял бокал: товарищи! Только что наш герой товарищ Волчак лично пригласил меня к себе в секретари. Что же, я готов, товарищи! Дорогу молодым! (Эти слова запомнились многим, Бровмана они насторожили; это постоянное подчеркивание молодости, которой старики должны уступить дорогу, было ой неслучайно.) После этого Сталин вдруг предложил выпить за Ломакова – тихого героя, незаметного героя, подающего нам всем, товарищи, пример, каким должен быть не буржуазный, звездный, а советский герой. И опять многие радостно подумали: Волчак переиграл и доигрался; но это они подумали зря. Сталин встал и пошел на другой конец зала к женам, долго со всеми знакомился, потом отдельно поцеловал ручку волчаковской Ольге и сказал так, чтобы все слышали, – он отлично это умел: вы думаете, это я ваших сорванцов гоняю на край света и дальше? Да если вы хотите знать, я один только их и удерживаю. Я не так много могу, в международных делах все Литвинов решает, во внутренних Политбюро решает (он не назвал Ежова, и многие это запомнили – как оказалось, правильно). Но этих удержать я пока отчасти могу и вот при вас говорю: до конца этого года – никаких рекордных полетов! Побалуйтесь с женами! (Бровман сразу это записал, не для печати, конечно, – для памяти.)</p><p class="p1">Но дальше случилось совершенно уже невероятное. Сталин подошел к Волчаку, отставил в сторону графин с коньяком и поставил перед ним нарзан – надо признать, превосходный. Он слегка пристукнул по столу ладонью и сказал: пей, товарищ Волчак! Волчак встал, багровый и благодарный, налил себе полный бокал нарзана, а Сталину – полный бокал коньяку, протянул ему и сказал: пей… пейте, товарищ Сталин! И Сталин, истинный кавказец, глядя прямо ему в глаза, не пригубил, а выпил бокал до дна, и Волчак стоял, глядя на него влюбленными глазами, и почему-то встали все, а после короткого молчания зааплодировали – не то смелости героя, не то лихости вождя, не то собственному присутствию при несомненно исторической минуте.</p><p class="p1">Положение Волчака, и до того особое, с этой минуты укрепилось. Бровман понял, что если прежде при выражении чувств требовался известный такт, то теперь востребовано было его отсутствие, вплоть до полного самозабвения, до вкусового провала: этот провал означал отключение всякой критичности. Нельзя было, конечно, унижаться; надо было возвышаться, и Волчак возвысился. Всем запомнилось, как Сталин глядел на него: это был взгляд отца, друга, старшего брата.</p></span></span>
