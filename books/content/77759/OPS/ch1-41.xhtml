<p class="p">3</p>
</div><p class="p1">Бровман летал со многими, у него был принцип: то, о чем пишешь, должен пробовать на шкуре. Он начинал с автомобильной темы и неделю простоял на сборке в АМО, и хотя проклял все на свете, мог потом с закрытыми глазами разобрать мотор; во время каракумского автопробега изумлял всех доскональным знанием всей этой промасленной, горячей механики. Если пишешь о пищевиках – должен до процента знать состав колбасы. А если сидишь на авиатеме – хотя какое «сидишь», он бывал в редакции только во время дежурств, остальное время мотался по репортажам, – ты должен летать, и никого не волнует, есть ли у тебя страх высоты. У Бровмана не было, повезло, вот морская болезнь – была. Оформлять полет всякий раз была мука мученическая, приходилось расписываться в десятке бумаг, добывать редакционное задание, пять разрешений, проходить инструктаж… И были летчики, которые брали журналистов на борт крайне неохотно, в том числе Волчак, особенно после истории с Квятом. Но были и такие, которым, наоборот, было в радость форсить в воздухе, доводить корреспондента до визга, скорбно говорить «Пропали мы», – для профессионала милое дело ухнуть вниз метров на триста, потом завести мотор как ни в чем не бывало и сказать: «Ну, слава тебе господи, в этот раз пронесло»; неопытного пассажира, случалось, и проносило. Кандель обожал катать гостей, он говорил, что в обязанности летчика входит агитировать за авиацию, – к нему сажали иностранцев (разумеется, на что-нибудь дряхлое вроде «уточки», в крайнем случае на Р-5), писателей; знатную ткачиху Грушину возил однажды над Москвой в порядке поощрения. Ткачиха на всех встречах потом рассказывала, как они откинули колпак и на высоте (метров триста, не шутка!) исполняли «Марш энтузиастов», она даже локтями махала, в ухо ему въехала! Ужасть. Ему доверили даже Маргариту Степанян, заслуженную писательницу, задумавшую роман о летчиках, – они же авангард, пролетариат будущего, в пятидесятых начнут летать пятилетние дети!</p><p class="p1">Писательница была маленькая, круглая, совершенно глухая и полуслепая, в очках с толстенными линзами, но неутомимо верещащая: она сначала рассказывала собеседнику все, что хотела от него услышать, и если тот был понятлив, то пересказывал ей потом все это, а если попадался упрямый и стоял на своем, Маргарита выключала аппарат. Канделю она в первый же день рассказала, что собирается сделать производственному роману метафизическую прививку. Сам по себе процесс труда, пояснила писательница, рутинен, но можно сделать его игровым – этот вариант уже опробован на многих романах о соцсоревновании, там все догоняют и перегоняют, есть в этом что-то детское, – а можно добавить метафизики, философии, может быть, немного сказочного и чудесного, тогда производственная тема оживет. Степанян пришла к этому выводу еще в Германии, где училась до революции. О, она успела страшно много: работала на строительстве Гётеанума в Дорнахе, вытесывала деревянные украшения («Все удивлялись, какая у меня мужская рука», – говорила она, протягивая детскую ручонку), при первых признаках революции кружным путем оказалась в Петрограде, ее фантастический роман о том, как капиталисты истощили всю нефть, похвалил Ленин; пыталась прорваться на фронт комиссаром, но туда брали только особенно красивых вроде ее подруги Лариссы («Запомните, она писала себя только с двумя „с“!»), и тогда Маргарита устроилась в школу к беспризорникам, написала роман о них, потом поехала на строительство ГЭС в родную Армению и написала огромный роман об этом, потом издала биографию Гёте, где обосновала Фауста как героя нашего времени, а теперь только что вернулась из Свердловска, где писала о камнерезах. Летчики интересовали ее именно как обитатели пограничья между небом и землей. Старуха была вовсе не старуха, ей недавно стукнуло полста, но стариковской была ее манера слушать только себя и перечислять великих современников, даривших ее вниманием. Когда-то Маргарита писала стихи, успевшие понравиться Блоку, и в одном ее детском стихотворении про какие-нибудь весенние льдинки было больше смысла и толка, чем во всех производственных романах; и теперь она много ездила, чтобы заглушить эту мысль, но обвинять себя ей было не в чем: писать сейчас стихи про весенние льдинки было невозможно, и не потому, что не было льдинок, а потому, что не было смысла. И если заслуженная писательница хотела обнаружить смысл в воздухе – почему нет? «Небо, – сказала она, – вот то, о чем надо писать сейчас. В нашем времени есть сказочное, небывалое (говорила учительно, назидательно, не Кандель делился с ней секретами мастерства, а она с ним). Вот увидите, сейчас кто-нибудь пишет роман о Боге». Или о чёрте, сказал Кандель. Что же, сказала заслуженная, Мефистофель в «Фаусте» – явление прогрессивное, воплощение третьего закона диалектики, отрицание отрицания, без него сюжет не развивается.</p><p class="p1">Кандель покатал ее щадяще, без фокусов, косясь на реакцию: Маргарита оставила на земле слуховой аппарат и сидела смирно, не вертелась, сосредоточенно во что-то вглядываясь. Ослеплял сплошным сиянием мартовский день. Кандель показал ей Москву, подробно указал, где что, – Маргарита кивала, хотя наверняка ничего не слышала; еще на земле просила мертвую петлю, клялась, что у нее образцовое здоровье, – Кандель объяснил: пассажирам не положено. Скоростной спуск сделал, это пожалуйста. На земле Маргарита была неожиданно молчалива, никакого верещанья. Мне надо осмыслить, сказала она. Пока я вижу только, что больше всего это похоже на увертюру к «Тристану». И еще мне кажется, что здесь можно увидеть… то, что мы видели осенью и зимой девятнадцатого в Петрограде. Тогда это было на земле, а теперь улетело сюда.</p><p class="p1">Ну, всякий видит свое. Кандель больше всего прислушивался к мотору, потому и летать с ним было безопасно. Его чувство единения с машиной было иррационально: был случай – Бровман хорошо это запомнил, – когда он вернулся минут через семь после взлета и сказал механикам: разбирайте правый мотор, у верхнего цилиндра горит клапан. Да что, да как, да мы только что смотрели – Кандель был неумолим: смотрите сейчас, он при следующем взлете вообще рассыпется. Разобрали, и что бы вы думали? Кандель, читавший много и бессистемно, из самых неожиданных областей, пояснил: Паганини слышал, если в оркестре у третьей скрипки третья струна была на четверть тона ниже; тогда он останавливал репетицию, кричал «Подкрути!» Он Паганини, я Канделаки. Была в нем ляпидевская эта черта – любил хвалиться, но и это выходило обаятельно.</p><p class="p1">Так что Бровман любил летать с ним, и Кандель взял его на рекорд с весом: высота 12 100, груз тонна; это для него уже была ерунда, он без груза залезал на 14 575, рекорд, никем пока не побитый, и то говорил, что почувствовал лишь небольшую нехватку воздуха, – маска-то была, но человек дышит и кожей, а коже там дышать было нечем. Теперь они летели с большим запасом кислорода, Кандель уверял, что бояться нечего, Бровман не особенно нервничал – на семи он бывал, а какая разница между семью и двенадцатью? В океане, где берегов не видно, не все ли равно, семьсот миль до берега или тысяча? Кандель клялся, что в знаменитом своем рекордном взлете он отлично видел Москву, различил даже колокольню Ивана Великого: положим, для этого нужно было его ястребиное зрение, но с семи Бровман кое-как различил Центральный аэродром. Они пошли мягким, влажным майским днем, Бровман ничего не сказал домашним, Кандель был триумфально спокоен – вообще, кажется, не нервничал перед рекордами, ничего, кроме азарта. До пятисот воздух был зеленый, словно отражал листву; дальше пошла чистая размытая майская синева, они поднимались по спирали, раскручивая ее над Ходынкой, но далеко в область не отклоняясь. На третьей тысяче у Бровмана привычно заломило в ушах, он знал за собой эту малоприятную особенность и был готов. Кандель почувствовал, что Бровман морщится, – в воздухе все чувствовал, – и подмигнул. В кабине было почти уютно, мотор пел, вообще было непонятно, чего все так героизируют эту профессию. Бровман поглядел вниз – мама! Область терялась в лиловой дымке, земля уже вроде бы немного закруглялась. Казалось, поет мужской хор – иногда звук мотора навевал такие мысли, и даже какие-то слова Бровман мог различить, четырехсложные, с ударением на последнем: «Ку-да-по-лез, ку-да-по-лез!» Но Бровману нравилось, правильно он полез, когда и кому еще доведется этак! Кандель что-то мурлыкал про себя, расслышать, понятно, нельзя было. Вдруг он круто лег на крыло и сказал: ну, теперь держись, Бро, начинается настоящее. Бровман напрягся, но поначалу ничего не изменилось. Это было сколько уже – тысяч восемь? Снова заломило в ушах, стеснило грудь, Бровман попросил маску. Кандель дал, сам пока не брал. Восемь – это был рубеж, Бровман знал, что дальше начинается серьезный и мучительный подъем, мотор еле справляется, высота набирается, можно сказать, ползком. Но по Канделю ничего не было заметно, только перестал улыбаться и чаще взглядывал на приборы. Небо приобрело сказочно красивый оттенок. Таких красок на земле не бывает – потому что к восприятию цвета добавляется ужас, сознание, что ты влез, куда не просили, в сферы, где все тебя вытесняет. Это был густо-лиловый, бледнеющий по краям интенсивный цвет, и то ли Бровман сам себя накрутил, то ли после восьми тысяч начиналось непостижимое, но желудок подкатился к горлу, слюна сделалась кислой, не хватало еще рвоты, и Бровман стал дышать глубоко и медленно, а потом у него страшно заломило глаза, и он их прикрыл. Застучало в ушах. Бровману стало действительно плохо, плохо так, что впору жаловаться, но жаловаться было некому. Он пил, говорил, летал с летчиками на небольших высотах, был с ними запанибрата и не мог проявить позорной слабости в том единственном, в чем они были сильны; это все равно как дружить с Моцартом и заснуть на «Волшебной флейте» – нет, не заснуть, хуже. Бровман попробовал посмотреть вниз – в сплошной дымке ничего не различить. Как всегда в таких случаях, он решился прибегнуть к испытанному средству: думал ли я в детстве, мог ли я представить тогда… Врут, что страх изгоняется злостью, но гордостью – бывает. Бровман заодно успел подумать, что все-таки недостаточно любит жену. Если б любил – страх изгонялся бы мыслью о ней, чувственностью, может быть. Однако не спасала и гордость – он представил вдруг, что под ним действительно девять, сейчас скоро и десять километров пустоты, от которых его отделяют несколько сантиметров обшивки. Все-таки все они больные, эти люди, помешанные на своих рекордах, – и что они ищут там, где нет ничего? Он хотел бы потерять сознание, черт с ним, с уникальными ощущениями. Но Кандель мощной рукой хлопнул его по плечу, сказал – нормально лезем, вот как вниз пойдем, там возможны ощущения; но постараемся смягчить… Бровмана захлестнуло сознание полной собственной ничтожности, какое часто посещает пишущих людей и совершенно незнакомо летчикам, – они, к счастью, успевают догадаться о своей неудаче в последнюю долю секунды. Мысль о смерти, как ни странно, успокоила. Героическая точка, а он-то все думал, какая смерть достойней. Для журналиста лучше не придумаешь, и Квят, вечный соперник, никогда не сможет упасть с такой высоты! Бровман бледно улыбнулся.</p><p class="p1">Не станем описывать этот адский, спиральный, с выключенным мотором свищущий спуск, опишем последние триста метров, на которых Кандель опять запустил мотор. Бро, сказал Кандель, что делать, мне каждый раз страшно, а с тобой как-то веселей. Давай всегда тебя буду брать? Слуга покорный, сказал Бровман, но ему полегчало. Кандель умел найти спасительные слова. Одно надо было запомнить: не так важно, как мы жили, важно, с какой высоты падали.</p></span></span>
