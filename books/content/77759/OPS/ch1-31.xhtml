<p class="p">10</p>
</div><p class="p1">Вскоре после возвращения Волчака из Парижа у Бровмана случился заход в соседнюю область – тоже техническую, но из другой сферы. Он посетил профессора Брюхоненко, изобретателя первого в мире искусственного сердца, называвшегося скромно и почти авиационно – автожектор, среднее между инжектором и автожиром. Отправил Бровмана к нему Корнилов, редактор научного отдела. У тебя имя, сказал Корнилов, с тобой поговорит.</p><p class="p1">Орешек оказался действительно тверд, долго молчал в трубку, наконец произнес: имя ваше мне известно, конечно… но все-таки разрешите – я посоветуюсь. С какой инстанцией он советовался, не с самим ли Богом, которого, кажется, видел вблизи, Бровман так и не узнал, но когда через три дня перезвонил – Брюхоненко сказал: приезжайте, в вашей порядочности я убедился. Как он там убеждался в порядочности, с кем говорил или просто перечитывал статьи, осталось покрыто мраком.</p><p class="p1">Бровмана профессор принимал в Боткинской, предупредив, что здесь у него пока лаборатория, а скоро дадут клинику при институте Склифосовского. Профессор был длинен, сух, сильно нервничал, тер переносицу, почти каждую фразу повторял, уточняя, но постепенно разговорился. В принципе, сказал он, картина смерти мне ясна полностью, ясна и картина оживления, то есть того, поправился, что надо делать. Бровман изобразил восторженное недоверие. Что же, сказал профессор, оживить человека ненамного сложнее, чем собаку… хотя есть нюанс. Чтобы оживить одну собаку, мы почти всегда убиваем другую. У нее берем кровь и легкие. Второго человека, сами понимаете, взять невозможно… Это смотря по какому поводу, подумал Бровман, и смотря для какого человека; вспомнились ему слухи об экспериментах над приговоренными, но он эту мысль прогнал. Автожектор, продолжал Брюхоненко, вещь несложная, не понимаю, почему эта мысль не приходила в голову другим; в принципе, уже Мечников мог бы… Мы с покойным Чечулиным подошли к этой проблеме вплотную уже в двадцать шестом, тогда же и сконструировали прототип в лаборатории Ивана Петровича – ну, Павлов, ну вы знаете, конечно, Чечулин у него стажировался, и Павлов очень заинтересовался; мы тогда же проверили на собаках, но на людях, как видите, до сих пор… Есть, правда, подозрение… но я вам этого не говорил… Хотя вам лично скажу… есть подозрение, что отдельные люди… вы понимаете?.. уже экспериментировали. И вы даже, скорей всего, слышали об этом человеке, но с другой, понимаете ли, стороны. Но оставим это, я говорю только о своем эксперименте. И вот в последнее время есть шанс, что мы поставим это дело на регулярную основу. Послушайте, прямо сказал Бровман, который тоже времени даром не терял. Я говорил с Сергеем Ивановичем. Он мне сказал, что вы шагнули дальше всех в мире.</p><p class="p1">Сергей Иванович в этой сфере был один, и его комическую фамилию можно было не называть. Эта фамилия теперь была частью названия повязки, симптома, метода аускультации. Не было сомнения, что в будущем она даст название клинике, улице, а то и поселку, – во всяком случае именно этот человек по прозвищу Спас, вполне заслуживший это прозвище, был теперь верховным авторитетом в медицине. Однажды Бровману случилось с ним говорить, и тот рассказал: самое поразительное, что я видел… кроме, конечно, винницкой мумии Николая Ивановича Пирогова, который, впрочем, еще и при жизни избавился почти от всего жира, так что это хотя бы имеет объяснение… Так вот, вторая поразительная вещь – воскрешение в исполнении Брюхоненко. Покойник – собственно, повешенный, самоубийство на какой-то идиотской почве… знали бы все эти неудачливые влюбленные, какую тончайшую машину они разрушают! Глупость, право, что организм подобной сложности достается идиоту, способному полезть в петлю из-за самки. И сколько было усилий для воскрешения идиота! Труп порозовел, пена изо рта пошла, из глаз слезы… Нет, я читывал подобное только у Эдгара По.</p><p class="p1">– Помню, – сказал Брюхоненко, – я оживлял при нем. Но ведь неудачно. Мы тогда три часа возились – все зря. Максимум, чего добились, – именно цвет кожи. Но это ведь не сложней, чем гальванический удар. Тоже может дергаться, но сознание – увы… Я могу ручаться за то, что мозг живет после остановки сердца по крайней мере тридцать минут. Что он в эти минуты переживает – затруднительно представить, но, видимо, когда-то воскрешенные расскажут… Один мой ученик – вот бы вам с кем побеседовать – предлагает различать смерть клиническую и биологическую, а между ними так называемая серая зона, в которой воскрешение еще возможно.</p><p class="p1">– Ну а практика? – спросил Бровман, которому надо было писать статью.</p><p class="p1">– Практика… Несомненно, что для людей исключительного значения, чья жизнь дорога миллионам, эта практика возможна уже в ближайшие годы. Мы можем поддерживать автоинжектором кровообращение сколь угодно долго при условии, что прочие органы целы. Прежде всего – мозг и легкие. Трансплантация… ну, вы знаете, вероятно, у нас и в двадцатые были перспективные работы… сейчас мальчик один с биофака, третьекурсник, вундеркинд, пересадил собаке сердце, но теоретически мы давно работали над пересадкой головы…</p><p class="p1">– Я роман читал, – вспомнил Бровман.</p><p class="p1">– Ну, там все глупости… теоретически же, если преодолеть барьер совместимости… Видите ли, все упирается в этику. Что так резко толкнуло науку в двадцатые? Война. Появилось… ну, вы понимаете, что это профессиональный цинизм… появилось очень много, так сказать, подручного материала. Операции челюстные, совершенно уникальные, когда челюсть научились выкраивать из бедренной кости… Там чего только не было! Я понимаю, как это звучит для человека стороннего. Но для врача война прежде всего полигон. И возможно, у нас появились бы возможности исследований… но я этого не говорил.</p><p class="p1">– Вы, может быть, продемонстрируете что-то? – Бровману надо было оживлять теоретическую часть, у него были крепкие нервы, и он был очень не прочь посмотреть на то, что потрясло самого Спаса.</p><p class="p1">– Нет-с, это никак-с, – бодро сказал Брюхоненко, и Бровман окончательно уверился, что показать ему есть что, но пока это дело секретное. – Вы можете некоторые получить подробности у одного моего аспиранта, это человек перспективный… да… Но вообще, хочу вас предостеречь. Шарлатанства будет много. И не только шарлатанства, а полного пренебрежения этическим моментом. Я бы не хотел, чтобы неосторожная публикация… вы мне все покажете, конечно?.. чтобы неосторожная публикация повлекла… вы понимаете… иногда довольно слова, чтобы целое научное направление…</p><p class="p1">Аспирант, которого он порекомендовал, оказался словоохотливей. Его фамилию – Неговский – Бровман запомнил навеки, так же как и смешное отчество Арович. Эту встречу он записал в дневник особенно подробно, хотя не забыл бы и так. Неговский создавал собственную лабораторию «преодоления явлений, схожих со смертью». «Почему так витиевато?» – спросил Бровман. Потому что иначе получается идеализм, загадочно ответил Неговский. Хорошо, сказал Бровман, а все-таки… есть там что-нибудь? Он задал этот вопрос не то для оживления беседы, не то ради возможного заголовка (о заголовке, учил он молодых, надо думать не после, а с самого начала), а может, и вправду интересовался. Неговский поднял глаза и посмотрел на него со странным ироническим выражением.</p><p class="p1">– Это не моя профессиональная сфера, – сказал он.</p><p class="p1">– Чья же, если не ваша?</p><p class="p1">– Обратитесь к попам. Они там ведут какие-то исследования. Правда, когда надо реально оживлять, вы обращаетесь к науке, а не к попам. И при головной боли тоже, верно?</p><p class="p1">– Верно, – признал Бровман. – Но интересно.</p><p class="p1">– Совершенно неинтересно, – с неожиданным раздражением сказал Неговский. – Какая разница? Ну представьте себе, что вы знаете о загробном блаженстве. Или о загробном наказании. Неужели вы будете вести себя иначе?</p><p class="p1">– Наверное, – пожал плечами Бровман.</p><p class="p1">– Никогда, – твердо сказал Неговский. – Ни при каких обстоятельствах. Но этика – тоже не моя сфера, я против того, чтобы смешивать компетенции. Это к Артемьеву, знаете такого?</p><p class="p1">Никакого Артемьева Бровман в тот момент не вспомнил, но уточнять не стал и дальше спрашивал только о технических проблемах воскрешения: иногда подразнить собеседника неплохо, но раздражать его – увольте.</p><p class="p1">Неговский рассказывал о том, что собаки ему надоели, оживление собаки – анахронизм, и вдобавок их охотно демонстрируют посетителям, а выхаживать охотников нет: у нас оперируют отлично и даже превосходно, но лечить потом… Как подвиг, это всегда пожалуйста, но как рутина… Пора заниматься человеком, и именно сейчас, когда в мире аналогов нет… Тут мы реально впереди всех. Почему? Да потому что всех останавливают барьеры, у нас сметенные. Между человеком и собакой, видите ли, нет принципиальных различий, еще меньше между человеком и свиньей… Я полагаю, чтобы в Европе, в Штатах пали эти барьеры, нужна как минимум мировая война, чего, с одной стороны, не хотелось бы, а с другой – нас бы сразу признали. Мы бы на огромном материале показали, что человека можно оживить и вернуть в строй. Так что же, осторожно спросил Бровман, война для вас была бы прорывом? Неговский отмахнулся: конечно, лучше бы вообще никого не убивали, но, боюсь, пока человечество не столкнется с вопросом чрезмерной убыли, оно не сможет всерьез заинтересоваться тем, что делаем мы. Врачей начинают ценить после эпидемий, согласитесь. Бровман согласился.</p><p class="p1">– Мы с вами встретимся уже серьезно, когда у меня будет клиника, – пообещал Неговский. – Тогда вы увидите. Или, не дай бог, вам самому понадобится моя помощь.</p><p class="p1">– Знаете, – неожиданно для себя обозлился Бровман, которому не понравились все эти снятия барьеров между человеком и свиньей, – меня оживляют другие вещи. Вот я в детстве болел, мне мама стихи читала, очень помогало.</p><p class="p1">– Да-да, – рассеянно сказал Неговский, – почитайте стихи при сердечном приступе, может, и поможет… Но это тоже все не ко мне.</p><p class="p1">– Я вам покажу очерк, когда напишу, – пообещал Бровман.</p><p class="p1">Но показывать очерк ему не пришлось, потому что Корнилов, прочитав, вдруг охладел к теме.</p><p class="p1">– Вот когда ему клинику дадут… – сказал он неопределенно. – Какая-то мистика все это. Или ты так написал, с идеалистических позиций…</p><p class="p1">На самом деле Корнилов боялся слишком близко подходить к этой области, и Бровман его понимал. Смерть ходила рядом, но не упоминалась – предполагалась по умолчанию. Надо было жить в постоянной готовности к ней, а воскресать – это уж было вроде дезертирства. И потом, если научатся оживлять, – черт их знает, как будет вести себя этот воскресший, что он такого знает? Будет ли он работать с прежним энтузиазмом? И что за смысл героически умирать, если потом можно будет всех отвезти к Неговскому вшить клапан от Брюхоненко? Главное же – действительно трудно нащупать верный тон: скажешь про душу – будет идеализм, но сказать, что нет никакой души, почему-то тоже было нельзя. Напишешь, что все люди те же свиньи, – будет вульгарный физиологизм. Насколько все-таки проще авиация! И Бровман с облегчением вернулся к авиации, а Неговскому ничего не показывал – публикации не будет, виза не требуется.</p></span><span id="id55"><div class="title6">
<p class="p">11</p>
</div><p class="p1">Артемьева почему-то про жену больше не спрашивали. Следователь Фомин увлекся разговорами про артемьевское хобби, хотя трудно было понять, где увлечение, а где профессия. Артемьева интересовала смерть, и потому он был патологоанатомом; но смерть интересовала его не сама по себе, а как переходное состояние.</p><p class="p1">– И тогда, – с воодушевлением говорил Артемьев, – я понял, что нет процессов необратимых. Вернее, можно до них не доводить. Но практически с любой стадии, когда нет еще разложения, можно отмотать ситуацию назад; у меня немного другие методы, чем у Брюхоненко, – вы знаете его наверняка, он сейчас на эту тему верхом сел и едет, – зато у меня гораздо больше фактического материала. Он все жаловался, что ему не дают материал. А у меня он был – неограниченно, понимаете…</p><p class="p1">– Минуту, – сказал Фомин. В нем все-таки не умирал профессионал. – Вы что же, экспериментировали над трупами?</p><p class="p1">– Я не экспериментировал, – отмахнулся Артемьев. – Я все делал в рамках профессии. Ровно то, что предписано. Но то, что мне предписано, Брюхоненко же наблюдать не может, правильно? Он, собственно говоря, инженер. Сделал свой инжектор, инжектор работает, и пожалуйста… Но я-то наблюдаю все ткани, в которых очень по-разному идут процессы окоченения; я наблюдаю эволюцию мозга, эволюцию, допустим, печени… Патологоанатом – это не тот, кто пишет протокол вскрытия. Это, если хотите, последний врач, который сопровождает больного. Я не всегда мог оживить. То есть, – поправился Артемьев, – я по большей части и не могу оживить. Но у меня был случай, он описан, когда я оживил ошибочно привезенного ко мне человека… И были похожие случаи, когда врачи просто не распознали… но там я опоздал или способов не было… По моим наблюдениям, – я все это собираюсь изложить систематически, – если нет фатальных повреждений органов, то есть таких разрушений, которые уже с жизнью вообще несовместимы, – при поражениях током, при повешении, при утоплении, то есть при сохранении большей части органов… оживление возможно в течение суток. Это зависит, конечно, от температуры хранения, но при отрицательных температурах…</p><p class="p1">– Вы и с женой ставили эксперимент? – прямо спросил Фомин.</p><p class="p1">– С женой я проявил позорную близорукость, – досадливо сказал Артемьев, – и пока я интересовался больше всего главным делом своей жизни, она занималась развратом. Прямым развратом. И она ушла, и вы обнаружите ее, если подойдете к делу с достаточной серьезностью. Что же касается меня, то меня, конечно, можно расстрелять из-за развратной бабы, которая сбежала и теперь развлекается, но этим остановят процесс спасения людей, процесс освоения той техники, которой, кроме меня, никто не владеет. Потому что – спросите коллег – патанатомов моего уровня мало в мире, не только в России. И надо же было с женой случиться именно тогда, когда я приступаю к систематизации моего опыта, когда я готов этим открытием делиться. Меня никогда не подпускали к серьезной науке, потому что всегда конкуренция и всегда нечистая. Но я не Брюхоненко, меня не интересуют собаки, меня не занимает карьера. Меня интересует победа над смертью и перспективы, которые это открывает. Я могу вам несколько суток, с таблицами, рассказывать свою методику. Но чтобы довести ее до ума, мне нужно несколько месяцев, а если вы решите – я знаю, вы в полном праве – расправиться со мной, то пожалуйста, пусть вас потом оживляет Брюхоненко. Человечество все равно додумается, но додумается через сто лет. Может ли оно позволить себе такое замедление?</p><p class="p1">Фомин знал, что характеристика на Артьемьева получена блистательная, и довел эту характеристику до сведения начальства, и начальство насторожилось; но оно еще не знало того, что знал теперь Фомин.</p><p class="p1">– Вообще же, – сказал ему Артемьев с несколько безумной улыбкой, – меня следовало бы, очень возможно, наказывать не за то, что я чью-то жизнь забрал, а за то, что я чью-то жизнь вернул.</p><p class="p1">– Вот как? – спросил Фомин. – Очень интересно.</p><p class="p1">– Совершенно ничего интересного, – ответил Артемьев и внезапно обмяк на стуле. – Все давно известно. Была такая Элен Воган, тот же самый случай. Грубо говоря, иногда в результате оживления получается не совсем то, что было раньше. Как бы вам это объяснить? Ну вот была Россия, ее оживили, стало гораздо лучше – и все-таки не совсем то. Вот и тут, была одна такая Таня, а получилась одна такая Марина. Но это я несколько заговариваюсь, потому что, простите, очень мало сплю. – И он понес ахинею, в которой Фомин ничего уже не мог разобрать.</p><p class="p1">Фомин дал Артемьеву выспаться, а потом написал докладную, что так, мол, и так, и можем опоздать на двести лет; он знал, что темой бессмертия наверху точно заинтересуются больше, чем судьбой неизвестно куда пропавшей артемьевской жены Марины Анигуловой.</p></span></span>
