<p class="p">1</p>
</div><p class="p1">Полет в Америку был их самым светлым воспоминанием и, кажется, – последним. Бровман накануне старта повел их фотографироваться – он знал о полете и готовил разворот, но прочим об этом пока не разглашалось, чтобы не вышло нового конфуза в случае непредвиденного возвращения. Тогда они снимались втроем с радостью, азартом и шуточками, а полгода спустя Бровман еле уговорил их сняться на память о тех днях, когда они случайно собрались в редакции, и Бровман опять не понимал – в чем дело? Неужели напоминание о прошлом подвиге, даже полгода спустя, так раздражало этих стремительных людей? О причине он не догадывался, но скоро понял.</p><p class="p1">Так вот, следующей картинкой была бы эта фотография, на которой они еще чуть смущены. Вскоре им предстояло позировать бесконечно, и на лицах у них появилось усталое, чуть ли не брезгливое выражение. Но ничего не поделаешь – герои, надо соответствовать; к счастью для Дубакова и легкой досаде Чернышева, герой немного погодя остался один, прочие вернулись к своим обязанностям.</p><p class="p1">Полет разрешили в конце мая. Они уже понимали, что означает вызов к Сталину. Сталин с первого слова дал понять, что встреча будет деловая, что о прежнем легком панибратстве и речи быть не может, но они знали, как себя держать, и он постепенно смягчился, начал подшучивать. Только что на Северном полюсе был установлен советский флаг, там заработала полярная станция Папанина, надо было доказывать возможность беспосадочного трансарктического перелета, Сталин дал на подготовку месяц. Чернышев уточнил: по сводкам, через две недели по утрам будет восемнадцать-двадцать градусов, мы не стартуем на АНТ с одиннадцатью тоннами. То есть эти две недели у нас есть, а дальше… Сталин предупредил Имантса, чтобы ни в чем не было отказа, но это и так было ясно.</p><p class="p1">Начался блаженный аврал. Именно блаженнейший, ибо напряженное состояние, в котором все и так пребывали круглосуточно, имело отныне причину и цель. Худшее состояние – тревога – сменилось азартом, все на пределе, при деле. Все трое жили теперь в Щелкове, занята была каждая минута, плюс они нагружали себя дополнительно, отрывая время от сна: Чернышев изучал американскую литературу, главным образом Драйзера, Волчак – американскую историю, главным образом Гражданскую войну, а Дубаков – экономику, пребывавшую в плачевном состоянии, и политическую систему, тоже истерзанную. По всему выходило, что они несут американцам благую весть. Медкомиссия нашла состояние всех троих близким к идеальному, папанинская радиостанция заметно облегчала ориентацию, Кригер оттуда неустанно отвечал сотням радиолюбителей, подтверждая наше проникновение на полюс; Водопьянов предупредил, что за восемьдесят седьмым градусом компас дает сильные отклонения, так что придется выпрыгивать из облаков и ориентироваться по светилам. Прекрасна была сама мысль ориентироваться по светилам, в этом было что-то магеллановское. Летали они ежедневно. Стоман все время негодовал, все ему было не так, Дубаков уже догадался, что это у него примета. Военврач Кайсацкий определял рацион: бутерброды с ветчиной, говядиной, телятиной, зернистой икрой и швейцарским сыром, по одному пирожку с капустой, кексу и стограммовой шоколадке. Весь рацион впихнули в три кило, столько же отвели на аварийный запас. Сочетание малого веса и высокой калорийности, повторял Кайсацкий, и я предложил бы взять еще сухого кавказского сыра… Отставить, сказал Волчак, не понадобится. Отчего-то всеми владело предчувствие удачи, похожее на притяжение из будущего. Волчак требовал сократить продовольствие и освободить резерв для бензина: лишние сто километров пути иногда решают все, на вынужденную садиться некуда! Он вообще как будто решил: победа или смерть, никаких отступных путей, и когда дошло до парашютов – уперся насмерть. Первые десять часов, говорил Волчак, прыгнуть невозможно – идем на таких высотах, что сразу в лепешку; дальше Баренцево – в нем не протянуть и четверти часа; дальше полярные льдины, где высоты нам уже, положим, хватит, но пока найдут, медведь съест или сам подохнешь; а дальше земля, и тут я как-нибудь сяду, на облегченной-то машине без горючего. Один парашют, так и быть, я возьму – исключительно показать американцам, что наши парашюты лучше; а больше извини.</p><p class="p1">Все шло штатно, пока не случился идиотизм, – Волчак говорил потом, что этот идиотизм был помощью божьей, ибо все неприятные неожиданности лучше пережить до полета. Помощь божья явилась в лице комбрига Баженова, главы испытательного института, который вздумал повышать личную квалификацию, летая на «ишаке», и при посадке цепанул колесами правое крыло АНТа. В результате пробил обшивку, «ишак» рухнул кверху брюхом, Баженова с трудом извлекли и увезли на скорой, а Волчак буквально почернел лицом от прилива крови и сказал, что, если этого кретина, эту сволочь, этого вредителя не расстреляют, он голыми руками оскальпирует его лично. При условии, что тот, конечно, выживет, за что поручиться нельзя, потому что Максимов рухнул точно так же и погиб на месте, но сволочи живучи. Примчались члены комиссии, поклялись, что все починят за неделю, – Волчак был непреклонен, таким его не видел еще никто. Если во время споров с врачом о парашютах и рационе он ярился скорей для показу, как бы давая присутствующим материал для мемуаров, теперь он взъярился по-настоящему, ибо все пропало. Он поставил на этот перелет всю жизнь и славу, все предыдущие успехи, а случайный идиот порушил все – и надо еще смотреть, случайный ли; тут Волчаку шепнули, что именно Баженов был в свое время причастен к его переводу из Ленинграда в Брянск, – и Волчак загорелся идеей доложить лично Сталину. Напрасно ему намекали, что Сталину докладывают все новости, относящиеся к их полету, Волчак хотел лично, персонально, наедине! Да понимаешь ли ты, втолковывал он Дубакову, что это государственное дело, что я… что мы все трое сейчас, – спешно поправился, – государственные люди! И когда неделю спустя исправленное крыло, не подкопаешься, установили на АНТе, Волчак все еще клокотал. Дубакову тоже было бы обидно, чего там, но не так обидно, не так, чтобы жизнь под откос; вот тут он впервые задумался о том, что для Волчака этот полет был не совсем то, что для них.</p><p class="p1">Но все устоялось и до 16 июня шло без сучка без задоринки, а там и вовсе понеслось. Накануне вылета Волчак побывал в штабе полета и сказал корреспондентам: ну какой вылет, слушайте?! Всего три недели как разрешен полет, ну это был бы авантюризм! Летим не мы трое, летит СССР, весь народ! (Это тоже было чересчур, но посмущать корреспондентов стоило, почему нет.) Мы несем на крыльях что? Честь Родины! Оттуда поехали к метеорологам, те их совсем было расхолодили, но Чернышев сказал прямо: товарищи, лучше ведь до конца лета не будет? Те покряхтели и сказали: видимо, так. Земля Франца-Иосифа всегда в циклонах, я сам читал – усиленная циклоническая деятельность, влияющая на всю Северную Европу. Вылетать надо завтра, максимум послезавтра; и в чем Волчаку не было равных – так это в искусстве сказать: хватит, решено. Там сказал он свою коронную фразу, которую потом кто только ни повторял: погода зависит от состояния летчика. Бровман был в штабе и думал: конечно, лукавят, врут, по лицам и всей повадке видно – летят скоро, до конца недели. И почему они так этого хотят? Они рискуют страшно, они будут делать то, чего никто не делал, с небывалыми нагрузками, с непредсказуемым результатом, но возможных исхода три: победа, позор или гибель – и шансов на победу, при всем героизме, не так мало. Что за удивительные люди народились в СССР! Или это в самом деле особенность русского характера – решать все авралом, доводить до экстремума? И только теперь особенность эту поставили на государственную службу, когда нашлось самое русское дело – покорение вершин, дальние перелеты? Собственно говоря, наконец установилось мировое разделение труда, – писал же один француз еще в прошлом веке: на трудное дело лучше позвать китайца, но на невозможное только русского. Теперь это невозможное стало доступно, и в России утвердился строй, поставивший невозможное на поток. В этом была величайшая мудрость Сталина. Хотя и Ленина – Ленин ведь первым сделал невозможное. Но только Сталин сумел все способности страны бросить на недостижимое, а кому оно не нужно, тех не видно, не слышно, те обыватели, и скоро их не станет совсем.</p><p class="p1">Волчак убедил главного метеоролога Альтовского, тот доложил начштаба, тот предложил рапортовать Сталину по прямому проводу. Сталин первым делом спросил, как относится к перспективе вылета экипаж и командир в особенности, «потому что командир – лицо экипажа, голова экипажа». Трубку дали Волчаку. Лицо его преобразилось. Товарищ Сталин, сказал он с удивительной смесью нежности и бесконечного уважения, хотя и сила рокотала в его голосе. Товарищ Сталин, мы сделаем все. Другого шанса не будет. Сейчас удивительная щель, когда и здесь погода не слишком хорошая, и там не слишком плохая. Просим старт.</p><p class="p1">Это было сказано с большим достоинством. Сталин никогда не отвечал сразу и тоже ответил с большим достоинством: мы посоветуемся, подумаем, сегодня вы ответ будете иметь. «А?!» – спросил Волчак у присутствующих и осмотрел всех орлиным глазом. Эти двое умели так понимать друг друга, что Волчак уже расценил ответ как положительный, и в шесть вечера передано было разрешение.</p><p class="p1">В ту ночь они спали четыре часа. Дубаков вскочил первым, глянул на часы – час, – оглушительно заорал и поднял остальных. Предстояла одна процедура, о которой не пишут в победных репортажах, лишь спустя годы упоминают в мемуарах, – клизма. Но героизм – он и в том, чтобы пройти через все, бодро сказал Чернышев. А чего вы хотите? Ссать там еще есть где, а срать, да еще с комфортом… Только требуем медбратьев, предупредил Дубаков накануне: перед сестрами унизительно. «Потерпите лично меня?» – спросил Кайсацкий. Бог с тобой, золотая рыбка. Летим чистыми, прозрачными, хохотал Волчак. Одевание было отдельным волнующим ритуалом: белье шелковое, белье тонкое шерстяное, два слоя носков, свитер, кожаные брюки (гагачий пух, дорогое стратегическое сырье!), унты, куртки. Терпеть ненавижу шерсть, сказал Волчак. Так чего ж, откажись лететь, посоветовал Чернышев, еще не поздно. Снова хохотнули.</p><p class="p1">Странно, волнения не было, приятный озноб слегка сводил челюсти. В столовой (чай с лимоном, по одному бутерброду с икрой) Альтовский шепнул Волчаку: погода ухудшается. Где? Там. Ну что же, сказал Волчак громко, не желая никаких секретов, погода испортилась, но незначительно. Никогда еще сражения не проходили по плану. Как учит нас Теодор Драйзер, – видите, мы готовились, – счастье, товарищи, приходит к тому, кто умеет ждать, но дураком назову я того, кто всю жизнь просидит в зале ожидания. Погода же, товарищи, как женщина: бывает или очень плохой, или очень хорошей. Выпьем, товарищи, за Драйзера, писателя-коммуниста! Этим Волчак разрядил обстановку.</p><p class="p1">Жены, кстати, ничего не знали. Дубаков вдруг подумал: улучить момент, позвонить… Ночь, но она наверняка не спит, чувствует. Валя была очень хорошая, как погода. Почему-то в его сознании она никогда не связывалась с весной, а только с осенью, с тем днем в Сокольниках три года назад, когда они только познакомились и он поразился, что она носит цвета этого дня: рыжая куртка, синяя косынка. И глаза были яркой синевы, и волосы яркой рыжины, неправильная, веснушчатая красота, но Дубаков сразу понял: лучше не будет, не встретить лучше. И как танцевали на следующий день, когда привел ее в гости, и как она не отвернулась, когда он так страшно захотел поцеловать ее большой девчоночий рот с вечной щербатой улыбкой. Надо было позвонить, а то ведь не попрощаются. Но звонить нельзя, все окружено тайной, да и волновать не хотелось. Решил написать записку и доверить ее одному Альтовскому: тому, кажется, тоже было невесело. Дубакову всегда было весело, но сейчас эта легкость ему изменила. Он написал: «Валя, скоро увидимся, не может быть иначе. Я про тебя думаю сейчас, я всегда про тебя думаю, я ничего не видел лучше тебя, я съел сейчас бутерброд с икрой, но и он не лучше тебя. Если же серьезно, ты похожа на все лучшее, что я видел, на день в Севастополе, когда ветер и брызги. (Этого он не стал писать.) Ну, до скорого, Валя, я так хочу с тобой прожить очень много лет. Я буду лететь над полюсом и видеть тебя, и полюс растает к чертовой матери, и вода в океане поднимется, и климат изменится, и ты скажешь: снова Дубаков начудил. Маме привет. Я теоретически должен вернуться через неделю, максимум полторы, но практически постараюсь быстрее. Это письмо тебе передаст занудливый длинноносый человек, пригрей его, но не слишком». Передайте, когда приземлимся, попросил он Альтовского; тот со значительным видом кивнул, и что-то беспомощное мелькнуло в его лице.</p><p class="p1">Альтовский был сын священника, всегда перед ответственными стартами молился – разумеется, про себя.</p></span></span>
