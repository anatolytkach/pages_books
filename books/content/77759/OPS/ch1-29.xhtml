<p class="p">8</p>
</div><p class="p1">Следующие картинки. Круг над Москвой, обязательство прибыть в Щелково ровно в 17:00. Они ждали кого угодно – скорее всего, Орджоникидзе с Калининым, – но Сталина не ждали. Может быть, в этот день Волчак впервые уверовал в свое государственное значение. Сталин жал ему руку особенно долго, Волчак смотрел на него не то чтобы с преданностью, а со страстным любопытством – то ли пытаясь понять, как может один человек дарить миру столько счастья, то ли, страшно сказать, примериваясь к такой же роли. Он начал думать, что их беспосадочный перелет обозначил небывалую веху! Хотя что они такого сделали, спрашивал себя потом Дубаков. Допустим, 9374 километра, пятьдесят шесть с половиной часов лету – все это прекрасно, но ведь через два дня чинить колесо срочным порядком прилетел из Москвы Женя Стоман с бригадой мастеров, про которых вовсе уж никто не говорит. Положим, ремонтники летели на ТБ-3, машине, облетанной в тридцатом еще Громовым, летели без особенного риска и с двумя промежуточными посадками, но Стоман, начальник отдела экспериментальных летных исследований и доводок (аббревиатура ОЭЛИД, не иначе под влиянием «Аэлиты»), посадил машину в тот же песок того же гилецкого острова, и никто в Хабаровске его не встречал, никто не чествовал. Блюхер в его честь не пил, Сталин Героя не присваивал, американские полярные исследователи не заходились в восторгах. Выходит, весь их с Волчаком полет – героический, нет слов, тут Дубаков не мог себя ничем попрекнуть – обеспечивался безвестным и не менее героическим трудом малозаметных людей, которых просто не назначили героями. Может быть, потому, что Стоман был немец с отчеством Карлович, а может, из-за тех самых удивительных свойств Волчака, который умудрялся выглядеть первым в любом обществе – хоть среди испытателей, хоть среди рекордсменов дальности. Дубаков подумал об этом, вот ей-богу же, без всякой ревности, когда Волчак произносил ответную речь, постоянно прижимая руки к груди и кивая на них с Чернышевым, – «Вот и товарищи мои то же скажут», – но слова, естественно, не предоставляя. И товарищам оставалось лишь прочувствованно кивать. Они были теперь герои, героев должно быть трое, подумал Дубаков в рифму, но из трех богатырей Илья Муромец первей. Когда он предложил Волчака в командиры экипажа, им владело, значит, то же чувство – интуитивное понимание, кто сгодится; сам Дубаков от этой роли воздержался не в последнюю очередь потому, что на герое лежит груз непредставимый.</p><p class="p1">А очень может быть, подумал он позже, уже засыпая дома, чувствуя, как рядом пытается и не может уснуть разволновавшаяся Валя, очень может быть, что со Сталиным примерно та же история: оказался первым – ну и тянет, а ведь рисков еще больше, и в случае чего гораздо лучше быть Кагановичем. Может, они потому так и раздувают Волчака, чтобы потом все на него спихнуть.</p><p class="p1">Да, быть Волчаком теперь никому не пожелаешь. Ему надо будет шагать вперед семимильными шагами, а при первой возможности рвануть в космос, потому что земные расстояния быстро исчерпаются. Французы, говорят, на будущий год хотят лететь вокруг шарика.</p><p class="p1">Убедиться в этом им пришлось очень скоро: вместо полета через полюс их отправили на том же АНТе на парижский авиасалон, где их самолет, разобранный и собранный заново уже в центре Парижа, был самым посещаемым экспонатом, а там было на что посмотреть. Перед французским салоном инструктировал их лично Сталин, о чем Бровману рассказывал сам Волчак. Этот рассказ он повторил трижды, так что Бровман запомнил его в мельчайших деталях.</p><p class="p1">Они отдыхали с женами третий день, их как бы вывезли в Сочи на отдых, хотя все знали, зачем они туда отправлены, да и Волчак все бурчал: «Мы еще не устали, чтобы столько отдыхать»; наконец на третий день пребывания в санатории им позвонили, пришел ЗИС, отвезли. За женами, сказали, заедут позже. Дача небольшая, в окрестностях, везли не напрямую – Чернышев, как опытный штурман, вычислил, что несколько поворотов были лишними, как бы взаимоисключающими; в любом случае проехали пять шлагбаумов, так что враг не пройдет. Сам дом зеленый, небольшой, трехэтажный, первый этаж каменный, выше все деревянное; сад большой, ухоженный, много фруктовых деревьев. Сталин был в легком парусиновом кителе, коричневых брюках, невысоких мягких сапогах, стоял на дорожке с Власом Чубарем, Ждановым и, конечно, Поскребышевым.</p><p class="p1">– Вот тут я отдыхаю. Ну, прогуляемся?</p><p class="p1">Волчака особенно поражало, что он предложил сначала погулять – не сразу перейти к разговору, а пройтись, чтобы снять неловкость. Трижды Волчак повторил: такой простоты… ты знаешь, я и с конструкторами, и с генералами… и с каждым – чувство, что вот он упрощается нарочно. А здесь… ну перед кем ему позировать? Это действительно простота человека, который знает все. Пошли к беседке, видим – лимонные деревья. Я никогда не видел, как лимон растет! Мы подошли, смотрим, – аромат же! И вдруг он говорит: сорвите по лимону. И мы сорвали. Такого лимона… я не то что не ел, я не видел такого лимона!</p><p class="p1">Волчак так был переполнен сладостью момента, что возвращался к нему неустанно – и скулы у него не сводило.</p><p class="p1">– Ну потом-то?</p><p class="p1">– Потом я говорю: а что это за чудесная сосна, которая прямо насыщает воздух кислородом? Он говорит: это сосна поникающая, мексиканский вид. Тут раньше на участке росли дубы, но решили насадить сосну. Сказали: сосна не примется. Но ведь Ленин нас учил, что если большевики возьмутся, то всегда получится. Просто если не выходит, надо зайти с другой стороны. И что ты думаешь? Как сказал, так и вышло! Растут эти сосны! И в Мексике они достигают двадцати пяти метров, а у нас пока максимум двенадцать, но он сказал – будут и у нас двадцать пять! Откуда он все знает про эти сосны, понять не могу. Вот скажи на милость, что ему до сосен? Где Россия – и где эти сосны?!</p><p class="p1">– А потом?</p><p class="p1">– Потом я говорю: да, товарищ Сталин, если руки приложить, то все можно сделать! И он: да, вы это правильно понимаете, товарищ Волчак.</p><p class="p1">Разговор этот, вероятно, казался ему содержательным, Волчак передавал его слово в слово.</p><p class="p1">Потом вошли в беседку, и Сталин сказал:</p><p class="p1">– Поговорим теперь о деле.</p><p class="p1">Волчак начал торопливо приводить выкладки. Сталин сказал: погодите. Я понимаю, что вам не терпится лететь. Вы молодые люди, мы старики, нам свойственно перестраховываться. Волчак стал горячо убеждать Сталина, что до старости ему еще бесконечно долго, и Сталин ответил: нам, старикам, ваши слова приятны, но мы свою меру знаем, как говорил товарищ Зарядько. Знаете такого? Мы его рассматривали на должность министра угольной промышленности. Доложили, что он хороший работник, но немного злоупотребляет спиртным. Мы знаем, к чему ведут такие злоупотребления. Я попросил его зайти, когда будет время. (Это особенно было прелестно – попросил… когда будет время…) Он зашел. Я ему стакан водки. Он говорит: ваше здоровье, товарищ Сталин! – и выпил. Даже не поморщившись! (Волчак восхищенно покачал головой.) Разговаривает о проблемах отрасли как ни в чем не бывало. Я ему еще стакан. Ваше здоровье, тыщ Сталин! Выпил, корочкой зажевал, снова разговаривает. Ни в одном глазу. Я ему третий. И тут он руку так выставил и говорит: «Зарядько меру знает!» Я тогда его утвердил. Так что Зарядько меру знает! Я, продолжал Волчак, даже спросил: товарищ Сталин, можно я техникам перескажу эту историю? Он говорит: почему же нет, конечно. Техник имеет дело со спиртом и тоже должен знать меру. Ну, тут мы покатились! (Бровман представил, как они покатились.) И он говорит: мы, старики, вас хорошо понимаем. Мы тоже любили рисковать в молодости. Но на нас не смотрела вся страна, весь мир. За нами смотрела только охранка. Если хотите знать, мы меньше рисковали. Если бы что-то случилось с кем-то из молодых революционеров, революция совершилась бы все равно, таковы законы диалектики. Но если вы не полетите через Северный полюс, этого в ближайшее время не сделает никто. Поэтому сейчас вы должны поехать во Францию на авиасалон, там внимательно изучить новейшие образцы, в особенности моторы, доложить о своих впечатлениях и начать серьезную подготовку. Принципиальное разрешение на перелет я вам даю, считайте, что вы получили это разрешение. Но конкретная дата перелета не может быть названа сейчас, и давайте не заглядывать слишком далеко. Пусть это будет полгода. Но, товарищ Сталин, – возмутился Волчак, – как же пятилетка в четыре года?! Это был пас, и он был блестяще пойман: хорошо, товарищ Волчак, пусть это будут пять месяцев! И Волчак хохотал, в третий раз пересказывая этот диалог. Бровман спросил: так мы можем рассчитывать на май? Мы ни на что не можем рассчитывать, отрезал Волчак тоном человека, причастного к государственным решениям.</p><p class="p1">Дальше пошла речь о санаториях. Санаторное строительство надо в корне менять, пояснил Сталин, потому что раньше строили без учета законов природы. Но ведь ребенку ясно, что ночью холодный воздух стекается к подножию гор, и если строить корпуса у самого берега моря, то человек может простудиться и заболеть! Следовательно, спальные корпуса надо строить на холме, вот как здесь, потому что сейчас осень, вечер, а тепло! И Волчак еще раз поразился тому, как этот человек одновременно держит в голове законы природы и потребности трудящихся.</p><p class="p1">После этого разговор перешел уже на авиацию. Вы странные люди, сказал Сталин. Один летчик тут оправдывался у нас за то, что выпрыгнул с парашютом. Но ведь этим следовало гордиться! Возможно, самолет разбился, но уцелел человек! Мы сделаем еще один самолет, но чтобы воспитать еще одного пилота, талантливого пилота, нужны огромные усилия природы, не говоря про его подготовку. Как вы можете объяснить эту странность вашей психологии? Чернышев, начитанный в психологии, сказал, что летчику надо прежде всего победить страх за свою жизнь. Но тогда тем более, сказал Сталин, тем выше он должен ценить парашютный спорт! Парашют помогает человеку победить свою земноводную природу. Земноводный не значит земной и водный, но значит водящийся на земле. Парашют помогает человеку почувствовать себя свободно в воздушной стихии, мы находимся, может быть, на пути к земно-воздушной человеческой породе, и потому воспользоваться парашютом – даже не героизм, а самая естественная вещь! Нам не жалко денег, нам жалко того великолепного человеческого материала, сказал Сталин уже серьезно, которым являются наши пилоты, пионеры той воздушной стихии, в которой будут жить и творить люди будущего. Тут Волчак зааплодировал, и все подхватили. Вот вы, товарищ Волчак, сказал Сталин, почему неоправданно рискуете, отказываясь воспользоваться парашютом? Волчак безошибочно нашел интонацию для ответа. Мы волжане, товарищ Сталин, люди медлительные. Про нас даже в песне поется – диким мохом порос. Так вот, я пока решу выбрасываться, уже порог пройден, приходится спасать самолет. Все покатились. Ну, сказал Сталин, я побеседую с вашим руководством, чтобы вас потренировали принимать решение на скорости, а пока, чтобы вы могли этим заняться незамедлительно, мы выделим вам персональный автомобиль. Волчак говорил об этом с благоговением, дорожа, разумеется, не автомобилем, но съездил за ним на завод и теперь осваивал, доводя до истерики инструктора. Он думает, это самолет, говорил инструктор, а тут надо смотреть по сторонам!</p><p class="p1">Дальше приехали жены. Они стали восхищаться лимонными деревьями – они же никогда не видели лимонных деревьев. Сталин сказал: ну, раз вам так понравились лимоны, сорвите себе сколько захотите! Это был жест человека, которому принадлежат все лимонные деревья мира, и женщины сорвали еще по одному лимону, чтобы не оскорбить его щедрость и не задеть бережливость. Потом Сталин повел их смотреть только что построенный кегельбан. Искусство в том, говорил он, чтобы покатить шар ровно по доске, не допуская ни левого, ни правого уклона. Жданов попробовал и допустил левый уклон. Чубарь попробовал и допустил правый уклон. Волчак попробовал и допустил волюнтаризм, послав шар с такой силой, что он подпрыгнул и вообще укатился за пределы кегельбана. Сталину пришлось еще раз показать правильный посыл шара, и шар сбил восемь кеглей. Чернышев сбил две, Дубаков – три. Товарищ Дубаков умеет учиться на чужих ошибках, заметил Сталин.</p><p class="p1">После кегельбана был ужин, и все уже чувствовали себя необычайно близкими, даже сроднившимися, словно кегельбан действительно был разновидностью совместной борьбы. В Сочи рано темнеет, зажгли свет на даче; в одной из комнат, скромно обшитой дубовыми панелями, был накрыт стол – Волчак восторженно перечислил все, что было на столе: молодой сыр, орехи, пхали… Сам хозяин ел гречневую кашу, сказав, что привык к ней. Он угощал, наливал, говорил короткие, но красноречивые тосты. Начались воспоминания. Волчак рассказал, как они чуть не приземлились в воду. Сталин в ответ вспомнил, как бежал из ссылки, на лыжах шел по Енисею и провалился под лед, а на нем была тяжелая, как это называется, кухлянка, и чтобы не замерзнуть, он, когда выбрался, несся изо всех сил. Когда он пришел в деревню, мужики шарахнулись – от него валил пар. Жены заахали, а Волчак сказал: это же какое здоровье надо иметь! Так выпьем за здоровье товарища Сталина, которое нужно всем на земном шаре, за то, чтобы ему вечно служило это здоровье! Я предлагаю, уточнил Сталин, выпить вообще за здоровье, но с поправкой – за то, чтобы мы его не замечали, потому что мы его не замечаем, когда оно есть. Все ахнули, как это точно. Счастье тоже не замечаешь, когда оно есть, сказал Волчак, но я хочу выпить за то, чтобы мы его замечали, чтобы помнили, кому мы обязаны. Всегда помнили, кому мы обязаны. Сталин коротко кивнул, но в этом коротком кивке была благодарность, как бы понимание волчаковского понимания.</p><p class="p1">Потом пошли играть на бильярде, Сталин бил почти не целясь, но очень точно. Чернышев попробовал мазать, но Сталин сказал: товарищ штурман (он помнил и это!), мы играть будем или как? И Чернышев, восторженно сказал Волчак, стал проигрывать уже честно. Товарищ Сталин, сказал Волчак, уловив момент, когда можно еще поговорить о деле. Разрешите один вопрос по существу? Что с вами делать, вздохнул Сталин, наверное, опять просите разрешить вам какое-то безрассудство? Вы все знаете, развел руками Волчак, но разрешите мне… Тут я не могу, сказал Волчак Бровману, этот вопрос я не могу пока тебе передать. Но Сталин ответил мне, что подумает, что вопрос будет решен. И после этого уже никаких серьезных разговоров не было, и я просто чувствовал, повторял Волчак, как будто я с ним всю жизнь вот так… как будто он отец, но ближе, больше отца… Как будто он Бог, подумал Бровман, но вслух, разумеется, не сказал.</p><p class="p1">После достали патефон, Сталин ставил любимое. Любимыми, как выяснилось, были народные, и все подпевали – у Сталина оказался абсолютный слух (Бровман в этом и не сомневался), но приятный голос и врожденная музыкальность были и у Жданова, и даже для Чубаря поставили трио бандуристов. Сталин сказал, что всегда особенно уважал волжан, что волжане люди, да, неторопливые, но надежные, надежнее даже питерских, непробиваемые; надежнее только сибирские: один крестьянин подвозил его при побеге на станцию Зима и выпивал через каждые полчаса полуштоф – и все-таки не сбился с дороги! И поставил в честь волжан бурлацкую: «Истоптав зеленый бархат вдоль по берегу реки, бечевою тащат барку, тащат юноши и старики, эх, старики… Нет, не барку берегами, – с кандалами на ногах жизнь свою же тащат сами и не вытащат никак… И покуда бороздами режет плечи бечева, Волга, Волга-мать не перестанет пенной злобой бушевать, эх, пенной злобой бушевать!» Я не слышал этой песни, медленно сказал Волчак. Вы и не могли ее слышать, сказал Сталин. Вот если бы вы сказали, что да, это ваша старая бурлацкая песня, – я бы понял, товарищ Волчак, что вы лукавите. Эту песню написал наш советский поэт, он не волжанин, из Одессы, уточнил Жданов. Но, добавил Сталин, он точно воспроизвел бурлацкую песню с ее угрозой и ужасом. Ну сейчас-то откуда же угроза и ужас, спросил Чубарь, сейчас про такое только вспоминать. И тут Волчак сказал то, что надо было сказать. Понимаешь, говорил он Бровману, я вдруг представил, понял, какую барку он, Сталин, тащит сам… и я сказал: нет, сейчас тоже у каждого своя бечева и своя барка, и мы тянем, тянем… и может быть, это еще тяжелее, потому что мы ее тащим за всех, за тех, кто на барке… И он опять кивнул. И я понял, что все эти… которые смотрят со стороны… они на барке. А он тянет. И я, конечно, себя рядом с ним не ставлю, что ты, но мы тянем с ним эту общую барку. Пусть он впереди, пусть я там где-то, но мы тянем. Это вот… это было главное. И засобирались. Уже три часа было. Я попросил, чтобы Сталин мне на память что-то написал, ведь такой исключительный день! Но он сказал, что поздно, завтра. Я еще попросил прощения: мы вам не дали отдохнуть… Он сказал: я раньше четырех не ложусь, и мне приятно, что меня не отвлекали глупыми делами, а что мы о важном поговорили. И мне показалось, подмигнул, но тут я не уверен. Ты представляешь – утром мне привезли от него фотографию! И там было написано: «Товарищу Волчаку на память о юношах и стариках». Ты понимаешь? Нет, Бровман, не понимаешь ты!</p><p class="p1">Но Бровман понимал – и то, что Волчаку надо об этом рассказать, и то, что некому рассказать, и то, что нет на свете третьего человека, которому он и Сталин могли бы рассказать о тяжести своей жизни. И потому не сетовал на подробности и повторы.</p></span></span>
