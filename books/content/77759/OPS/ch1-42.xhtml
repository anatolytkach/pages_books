</div><p class="p1">После полета в Америку Кандель изменился больше, чем Волчак.</p><p class="p1">Волчак прилетел государственным человеком, скорее интересующимся собой и своим значением, нежели полетами. Кандель – как будто заскучал. Похоже, он увидел в Америке нечто совершенно обессмыслившее всю его аристократическую летную легкость; и хотя слетал он в некотором смысле успешнее Волчака, потому что именно его маршрут мог теперь стать основой регулярного воздушного сообщения, ему словно не в радость было открытие этого маршрута, и говорил он о нем неохотно. Впрочем, Бровман думал, что Кандель перенапрягся, а это пройдет.</p><p class="p1">Особенно неприятно было то, что Кандель начал злиться на расспросы, – раньше, казалось, они доставляли ему удовольствие. Небось когда Бровман писал брошюру, трепались часами. Теперь он отмахивался: «Просто я в какой-то момент сильно вымотался – и принял правильное решение. Когда на руках от штурвала уже мозоли, не до лишних действий – просто делаешь что надо».</p><p class="p1">Этот полет был совершенно в духе Канделя – не первый, словно деловой, для общей пользы и личного удовольствия, а между тем опять рекордный: восемь тысяч км, кратчайшее расстояние, сравнить с волчаковскими девятью сто, двадцать три часа вместо шестидесяти четырех! Правда и то, что ЦКБ-30 был двухмоторный, набирал до четырехсот пятидесяти километров в час, но Кандель шел почти всю дорогу на высоте шесть тысяч, не пряник! Штурман Гордиенко, который был далеко не такой лось, крайне тяжело перенес эти сутки. Кандель надиктовал из Нью-Йорка статью – в своей веселой, будничной, приятельской манере, без всякого героизма: масло потекло из автопилота – «пусть течет, машине легче будет», автопилот отказал – «я не особенно огорчился», главная проблема – захотелось покушать, а яблочко промерзло. Тут, конечно, его фирменное «становится скучно». Вопрос с пищей в больших полетах проработан у нас недостаточно. Когда школьник читал интервью или заметки Волчака (Бровман, конечно, их переписывал, но всегда в духе автора, и автор поощрительно кивал), у него возникало правильное чувство, что полеты сопряжены с величайшим риском и трудом; когда же читал статьи Канделаки – ложное впечатление, что это совершенно плевое, чрезвычайно веселое дело. При посадке получил удар надувной лодкой по затылку и штурвалом в грудь – ну смешно же! В действительности при жесткой посадке правый двигатель сорвало с моторамы, а Кандель сломал два ребра; но он в юности ломал эти ребра ежегодно, не всегда замечая. Сели на болотистой местности в Канаде (горючего хватало, однако Нью-Йорк был в грозе), так что Кандель спустил на темно-бурую, заварного цвета воду надувную лодку – зачем-то везли же! – и в ней заснул, за это время покрылся инеем; пришли местные жители, принесли еды, он показал жестами, что есть не хочет, хочет спать, и, покрытый инеем, перевернулся на другой бок, в каком положении и проспал еще три часа. Веселье! Но Бровман не пытался Канделя исправлять – у читателя сложился такой образ Канделя и его друга Гордиенко, они как бы друг друга дополняли: Кандель был веселый и безбашенный грек, Гордиенко – основательный и задумчивый хохол, вполне кинематографическая пара, хоть сценарий пиши. Бровман и полез к Канделю с этой идеей. Но идея была ложная: Канделю не понравилось, что в статье о перелете Гордиенко был назван его другом, идеальным напарником. Другом был Брединский, погибший при поисках «Родины». Это особая была история, и после нее-то Кандель и начал впервые меняться, но Бровман тогда не заметил, а задним числом догадался.</p><p class="p1">С Брединским Кандель слетал без посадки в Спасск-Дальний, проложив тем самым путь для женского рекордного перелета экипажа Грибовой. Кандель при расследовании настаивал: машина была не доведена, если б не обледенение, да не ошибки Грибовой, да не прыжок Степановой, не было бы и поисков, и всей последующей ерунды. Но Грибова хотела лететь, ей рекорд был нужен, она хотела, видите ли, перекрыть французский рекорд! И Кандель не мог ей простить Брединского, который погиб за «Родину», за эту самую «Родину», и так по-дурацки! С этим штурманом они сошлись удивительно, хотя это была совсем не кинематографическая пара. Брединский был волжский моряк, санитар, книжник, тихий человек, ничего не выказывавший, все внутри, но бессловесное их взаимопонимание было изумительно. После посадки в тайге женский экипаж искали изо всех сил, и как было не искать – первый женский перелет, мы всем показали! Мало того что они чуть не угробили самолет, говорил Кандель, но еще и без всякой необходимости, на чистой истерике выкинули Степанову – и сами потом гордились, что штурманская кабина у них не помялась; не героинь им было давать, а выпороть публично. Это было не по-канделевски, но за Брединского он обиделся всерьез.</p><p class="p1">О Брединском вне профессионального круга говорить было не положено, его гибель попросту скрыли; были некрологи в «Дальневосточном комсомольце» и еще какой-то местной печати – и все, будто не было такого героя. А герой был, за ними с Канделем числились три рекорда, его портреты в пионерских дворцах висели! Ни единого слова не было сказано о нем в записках Грибовой, а Степанова, складывалось впечатление, вообще ничего не знала; положим, от нее скрыли, но какой бестактностью, тупостью какой душевной надо обладать, чтобы ни словом не обмолвиться о Брединском в рассказе о тамошнем веселье, как они картошку пекли под самолетом! Степановой Кандель как-то простил, она погибла, в конце концов, тоже глупо, но хоть по любви. Остальные не имели права замалчивать Шуру. Шурина жена прилетела в Комсомольск за урной и захоронила на семейном участке, а лежать ему следовало в Кремлевской стене! И что вовсе было непростительно, – Ворошилов в приказе написал, что Брединский вылетел самовольно, «с целью присвоить себе подвиг обнаружения самолета». Куда, как он вылетел бы самовольно, когда Москва день и ночь изводила телеграммами – предъявите нам наших героинь! Ведь это было государственное дело, международный престиж, вопрос чести! Петров из Испании сорвался Степанову искать – и конечно, именно он и нашел, так и надо было дать искать ему! Брединский якобы виноват в катастрофе – вы одурели? Брединский не пилот! Брединский был штурман, и золотой штурман; я давал ему штурвал строго на десять, максимум двенадцать минут, но в принципе это было совершенно не его дело! Штурману в иных обстоятельствах положено рулить; но называть это нормой вы не можете, навязывать в качестве повседневной практики не смеете! Кандель долго все это носил в себе, разбушевался – впервые при Бровмане – только тогда, когда Бровман стал нахваливать Гордиенко. Гордиенко – честный, славный парень, нормальный парень, но сравнивать с ним Шурку… это надо вообще ничего не понимать, это как шарманку с Гилельсом, твою-то мать! Шурка не вел этот самолет, вел его Лесников, человек малоопытный; Брединскому вообще не следовало туда лететь, и я бы не пустил, но я был в Свердловске с этим выездом к чертовым пионерам. Знал бы я, что так обернется, сам бы их искал, но что ж всех было бросать на розыски? И поскольку вел этот «Дуглас» неопытный летчик и он снизился ниже всякого предела, сбрасывая им вымпел, а тут же прилетел ТБ-3 с десантниками, пятнадцать человек, и «Дуглас» стал им показывать, куда прыгать, – Лесников не сманеврировал, или прозевал, или что он там напортачил, но они столкнулись. Ты же понимаешь, Бровман? Если «Дуглас» пристраивается к тяжелому бомберу на малой высоте – это гарантированное столкновение. Он зашел ему в хвост и врезался в правую консоль, «Дуглас» в штопор, бомбер перевернулся, и как еще они не спалили лес? Из бомбера успели прыгнуть четыре человека, а из «Дугласа» – никто, они никак не успели бы прыгнуть. И про Шурку пишут, что он искал подвигов! Шурка запрещал про родителей своих писать, он вообще вашего брата не жаловал, а тут он жаждал подвигов! И этот несчастный комдив Сорокин, который, уж конечно, не от жажды славы туда полетел! Если комдив лично летит с десантом, то это не от лучшей жизни, тем более ты должен знать, что там творится на Дальнем Востоке после товарища Блюхера, большого, говорят, затейника… И Шурку после этого как языком слизало, только выходит приказ по летному и техсоставу: Брединский не проявил внимания, не заставил пилота соблюдать технику безопасности… Черта ли штурман должен командовать пилотом! Сделай мне милость, Бровман, не пиши про Гордиенко, и уж подавно не пиши сценариев, в последний раз прошу.</p><p class="p1">С этого дня Бровман начал понимать, что началом конца был, пожалуй, не прыжок Лондон; что на самом деле цепочка фатальных неудач отсчитывается с замолчанной катастрофы над тайгой; если Грибовой не дали рассказать об этом в книжке, если похороны прошли тайно, а Сорокину не поставили даже памятника, что-то здесь было не так, и возможно, не обо всех известно даже ему. У него не было чувства, будто Брединского замалчивают сознательно, втаптывают в забвение. В конце концов, на банкете в честь экипажа Грибовой Кандель встал и сказал: прошу выпить не чокаясь за Героя Советского Союза Брединского, погибшего в поисках – он дернул головой – женского экипажа наших рекордсменок. Все выпили, Сталин подошел потом к Володе: что скучный? Штурмана потерял, товарищ Сталин. Тот только сказал: да, нехорошо получилось, – и отошел. Но никаких неприятностей у семьи Брединского не было, жена получала на обоих детей выплаты, Кандель следил; он подробно рассказывал, что у Брединского младший мальчик был слабый, перед их дальневосточным перелетом лежал чуть не при смерти, но Александр полетел, а когда во Владивостоке узнал, что кризис позади и мальчик пошел на поправку, – встал на руки при всех военных чинах! Нет, что-то здесь было не то; это был первый случай, когда комбрига, героя похоронили тайно, и не то что без почестей, а еще и посмертно выругав. Не тогда ли Кандель впервые задумался, что все они делают что-то не то? Однако альтернатива, альтернатива была какова? Что еще было делать человеку с его данными, пусть даже штурман его погиб из-за чужого рекорда? И Бровман скоро перестал об этом думать; но с Канделем они некоторое время не выпивали.</p><p class="p1">Кандель вообще начал проявлять вдруг странности. По возвращении из Америки ему ночью позвонил лично Сталин – странно было не то, что ночью, Сталин иначе не звонил, а то странно, что вдруг стал извиняться.</p><p class="p1">– Товарищ Канделаки, мы перед вами виноваты.</p><p class="p1">Он всегда говорил теперь «мы». Вожди по отдельности уже не мыслились, это было новое.</p><p class="p1">– Вы ни в чем передо мной не можете быть виноваты, товарищ Сталин.</p><p class="p1">– Нет, мы виноваты. Мы не сделали вам встречи, какую вы заслуживаете.</p><p class="p1">– Товарищ Сталин, – сказал тогда Кандель. – Мне бы хотелось не про встречу. Что встреча… А вот товарищи конструкторы – тут есть проблема. Писатель за книгу получает с каждого экземпляра, композитор за каждое исполнение песни – так? А конструктор должен вещи продавать. Карпов рояль продал, наследственный.</p><p class="p1">– Вы это наверное знаете?</p><p class="p1">– Про Карпова, правду сказать, не лично – мне передавали. Он не жалуется. А Ильюшин, я знаю, у меня занимал. Машину продал – вернул. Это не годится.</p><p class="p1">– Да, вы правы. Я этого не знал.</p><p class="p1">– И насчет завода я хочу, – окончательно осмелел Кандель. – Все заводы награждены, а мой, наш, – нет. Я летаю, рекорды ставлю, мне все: и слава, и деньги. Я не против денег, конечно. Но мне неловко.</p><p class="p1">– Ну, насчет заводов – это по отрасли решают, – сказал Сталин, как показалось Канделю, с прохладцей. – Они видят показатели в целом. Вы показателей в целом не видите.</p><p class="p1">– Товарищ Сталин, – упорствовал Кандель, – я же вижу, как работают люди. Или, если мы в целом недостойны, не надо тогда уж и меня… Но я же понимаю, вы позвонили, потому что видите – на душе у меня неладно. И вы, как говорится, первым чувствуете, вы человека понимаете. И я поэтому не мог не сказать…</p><p class="p1">Тут он нашел верный тон.</p><p class="p1">– Да, это вещи поправимые, – сказал Сталин. – А банкет в вашу честь мы еще закатим, будет повод. Вы же нам дадите повод?</p><p class="p1">Кандель уверил в своей готовности к новым рекордам, и попрощались.</p><p class="p1">Он нашел, конечно, верные слова и выкрутился. Но Бровман, когда Кандель на следующий день ему это, нервничая, рассказывал, усомнился в том, что вообще следовало переводить разговор на конструкторские выплаты; не то чтобы Бровман подозревал, будто наверху воцарилось самодурство, и в мыслях не было, но замечал вещи, которых там не любили. С одной стороны, там всячески поощрялось, когда вступались или просили за других. Я уважаю дружбу, говорил в таких случаях Сталин, я сам всегда защищал друзей, Ленин меня, случалось, порицал за кавказские привычки… Это Сталин говорил Волчаку, а Волчак щедро пересказывал. Но эти кавказские привычки упоминались, как бы сказать, для витрины – в душе же, кажется, вождь недолюбливал такие проявления солидарности: во-первых, необъективность, во-вторых, этим как бы намекалось на то, что он не обо всем информирован. Больше же всего Сталин не любил – Бровман хорошо это знал от источника совершенно надежного, – когда просили за низвергнутых. Один писательский начальник пошел просить за Теруэля, он же Мигель Мартинес, тот опекал его в Испании, и, помня храбрость испанца под пулями, начальник не верил в оговор. Что ж, мы ценим желание защитить друга. Сталин просителя пригласил и дал прочесть показания Теруэля, в которых тот лично сдавал писательского начальника. Вы видите теперь, что товарищ Мигель имел-таки некоторую склонность к очернению действительности? Или же вы хотите сказать, что данные показания правдивы? В том, что они даны совершенно добровольно, вы же не можете сомневаться? – и посмотрел в упор. Нет, конечно, никак. Что ж, мы разрешаем вам поделиться этой информацией со всеми, кто сомневается в виновности товарища Мигеля. Нам тоже не очень хотелось верить, но что же поделаешь, враг коварен. В самой глубине души Бровман догадывался – не догадывался, подозревал – не подозревал даже, а не хотел… ну, словом, в самой глубине души он попросту знал, что на деле солидарность, земляческая или профессиональная, не одобряется: наличие горизонтальных связей мешает вертикальным, это не мораль даже, а физика. И когда Бровман попытался там же, в редакции, это Канделю со всей осторожностью сказать, натолкнулся вдруг на совершенно недружескую отповедь: ты что же, полагаешь, что мне надо было молчать? Это не был тон, к которому Бровман привык; в конце концов, напротив сидел Кандель, который знакомил с ним жену, еще невесту, который таскал его на высоту, о котором он написал книгу. И этот Кандель теперь смотрел на него чужими глазами, а ведь он всего только намекнул, что в разговоре с Самим не следовало бы… для своего же блага… Знаешь, сказал тогда Кандель, журналистам, может быть, действительно не следует в разговоре с вождями защищать своих. Но летчики – другое дело. Что ж, сказал Бровман с таким же холодом, я приму это к сведению. Некоторое время Кандель молчал, потом ударил его со всей медвежьей силы по плечу и сказал: к черту, забудь. И Бровман забыл тогда, ибо связывало их большее, чем давнее приятельство.</p><p class="p1">Дальше было так: наконец вышла книжка, Кандель тщательно ее выверил, хвалил, говорил даже, что словно все пережил заново. Тогда Бровман стал приставать к нему – возможно, и зря – насчет следующего рекорда; разговоры об этом случались у них и раньше. Сидели у Канделя, ему нездоровилось, Варя была в театре, а Кандель и в здоровом состоянии театра не любил: отжившее искусство, то ли дело кино! В кино он готов был смотреть любую чепухенцию. Теперь они сидели с Канделем, слегка простуженным, пили пиво, играли в преферанс с болваном, обстановка была самая домашняя, и Бровман, расслабившись, завел разговор на тему, которая в последнее время не приветствовалась. И можно понять: когда Бровману напоминали про роман, он тоже злился. Однако не хотелось бы, чтобы Кандель застаивался, именно его хотелось видеть неудержимо берущим новые высоты – да, по́шло звучит, но как сказать иначе? После этих слов Кандель вдруг сгреб Бровмана, повалил на пол и стал душить. Душил некрасиво и почему-то жестоко, не как в шуточной потасовке; потом вывернул Бровману руку и стал горячо повторять: ты не смеешь мне так говорить… ты не смеешь так говорить со мной… «Пусти ты, черт!» – взвыл Бровман, но тот не отпускал, давил, заламывал. Ты забываешь… ты забываешь, с кем говоришь… ты не смеешь… «Пусти!» – прохрипел Бровман, и Володя пришел в себя. Видно было, что он нервничает давно, что этот нежеланный ему разговор случился на тревожном фоне, что-то его грызло, а Бровман по журналистской привычке – так сам он себе объяснял – бессознательно коснулся больного нерва. Бровман стал приводить себя в порядок, рука висела, не перелом, конечно, но вывернул сильно. «Ты понимаешь, что делаешь? – спросил он. – Ты вообще – в своем уме?» Кандель смотрел на него исподлобья, все еще злой, красный. Ты кто такой, спросил он вдруг очень тихо. Ты кто такой, чтобы меня спрашивать про мой ум? Я Герой Советского Союза, а ты кто такой, чтобы меня торопить? Кто ты такой, чтобы лезть ко мне и меня запанибрата спрашивать, куда я полечу? Знаешь что, сказал ему Бровман, сохраняя – потом гордился этим – полное самообладание, вот про таких, как ты, и говорится: голова закружилась. Кто я такой? Я журналист «Известий», и я не холоп тебе, и это ты так со мной не смеешь говорить. Журналист, вот именно, сказал Кандель, вот именно что ты журналист, и помни, что твое дело мои ответы записывать, ты понял? Еще жидом меня обзови, хладнокровно предложил Бровман. «Знаешь что?!» – бешено заорал Кандель. Теперь знаю, сказал Бровман, надел шляпу и ушел. Он много чего в эту ночь, конечно, передумал, и были минуты, что у него дрожали губы, обида его была велика, и он думал даже, что Кандель им, только им сделан и возвеличен, он его любил, а тот, оказывается… И он хотел уже рассказать все Симе, но Симе нельзя было этого рассказывать, никто не должен был знать, это был позор. Бровман был человек отходчивый, но этот случай ранил его глубоко.</p><p class="p1">Наутро надо ему было встречаться с Мазуром, отмечать большой беседой его только что объявленное назначение начальником управления полярной авиации Главсевморпути, – для тридцати двух лет это был взлет блестящий, объяснявшийся разреженностью кадров в последнее время. Разреженность объяснялась тем, что… Смотри постановление Совнаркома от 28 марта 1938 года: «…причинами столь серьезных ошибок Главсевморпути в навигацию 1937 года являются: плохая организация работы, наличие самоуспокоенности и зазнайства, что создало благоприятную обстановку для преступной антисоветской деятельности вредителей в ряде органов ГУСМП». Мазуру и полковника еще не дали, а он уже был командиром над двумя сотнями профессионалов как минимум не хуже; Мазура в «Известиях» заметили давно, еще когда он доставлял на льдину Папанина с командой и доставил, надо признать, виртуозно; первое интервью в новой должности Мазур обещал Бровману и слово сдержал. Бровман постарался прийти в рабочую форму и все вчерашнее забыть, и Мазур вдруг предложил: тут, кстати, надо менять экипаж «Седова», корабль пройдет мимо полюса, самый интересный период; я заброшу, полетишь зимовать? Это было хорошее предложение, Бровман слышал разговоры о том, что все полярные работы, раньше столь широко освещавшиеся, будут засекречены, это наша стратегическая сфера и тому подобное, так что тем более надо было ловить момент. Я спрошу, пообещал Бровман и поехал в контору отписыватьтся.</p><p class="p1">Корнилов, теперь первый зам, не одобрил: кто в лавке останется? Но это, возможно, последний такой шанс, они не будут из-за нас задерживать смену на «Седове», а я давно не ездил, застоялся… Хорошо, подумаем, сухо сказал Корнилов, и Бровман постыдно забоялся: если Кандель Корнилову наябедничал, его звонок может все повернуть; и вообще… ссориться с человеком, которому ночами звонит Сталин, опасно. Волчак, были случаи, просто сжирал не глядя людей, имевших неосторожность ему не понравиться… Но тут посреди всех этих раздумий к нему в кабинет явился Кандель, присел к столу и резко сказал: Бровман, прости меня, я свинья.</p><p class="p1">Бровман этого ждал, предполагал его звонок еще с утра и знал, как реагировать. Простите, Владимир Константинович, сказал он, я работаю, мне надо сдавать срочный материал. Мы журналисты, вы герои, мы знаем свое место.</p><p class="p1">Бровман, сказал Кандель с силой и яростью. Прости меня, я уже сказал тебе, что я свинья. Ты не знаешь, как мне херово. Хочешь – ударь меня. Ну что вы, сказал Бровман, гнусно улыбаясь. Журналист чтобы ударил героя? Это же покушение на нашу славу. Бровман, очень тихо сказал Кандель, и Бровман понял, что говорит он серьезно. Бровман, ты один мне друг, прости меня. Серьезно. Я никогда больше не сорвусь, но я правда хочу завязывать со всем этим делом. Я не хочу больше. Понимаешь? Я делаю не то. Я не хочу больше на рекорды. Я просто вижу, что я следующий, можешь ты понять, умная ты голова? И поднял на Бровмана такие собачьи, такие страдальческие глаза, что вся броня с Бровмана слетела.</p><p class="p1">– Это я могу понять, – сказал он. – Я не могу понять, когда ты на людей кидаешься, а когда так – могу.</p><p class="p1">– Хорошо, что можешь, – выговорил Кандель. – Я, видишь ли, привык… что я машину контролирую, ну и в целом контролирую. Но сейчас, Бровман, такое у меня чувство… черт его знает, я никогда в такие вещи… но читал ты, скажем, Флойда про интуицию? Я считаю, летчикам это надо читать. В Штатах говорил – они не знают. Своего не знают, прикинь! А я знаю. И вот как я чувствую машину – это ты не можешь отрицать, – так я чувствую судьбу, это я еще на море тренировал. Иногда погоду предскажешь, иногда на человека глядишь и видишь – не жилец. Вот я сейчас не жилец.</p><p class="p1">– Брось, Кандель, это переутомление, – сказал Бровман. – Ты десять лет живешь на пределе, ну и, естественно…</p><p class="p1">– Я десять лет летал – ничего не боялся, – тихо сказал Кандель. – А теперь как пробило меня.</p><p class="p1">– Ну всему предел бывает, износ, сам знаешь…</p><p class="p1">– Какой износ? – с досадой спросил Кандель. – Где, какой износ? Мне тридцать четыре только года, я моложе тебя. Человек крепче машины, у меня не может быть износа. Просто втягивает меня, и все. Чем-то мы не тем занимаемся, потому что или с ума сходим, или сами себя гробим. Такое у меня чувство, Бровман, что разрабатываю я истребитель, а он истребляет лично меня. И без этого моя судьба не имеет смысла, а с героической гибелью имеет. Она как бы предполагается, ты понял? Это всем надо, на этом все как бы стоит. А я не хочу, но не знаю, куда мне от этого отвернуть. Поэтому я бросаюсь на людей и некоторое время да, буду бросаться, пока не придумаю. Но я придумаю. Варька беременна, мне нельзя ее одну тут с ребенком… Ее одну сожрут, тут такие, как она, тоже долго не проживут, понимаешь? Поэтому я буду сейчас думать, как сваливать, и ты со мной, наверное, некоторое время действительно не разговаривай… Я просто не хочу, чтобы ты держал на меня зло. Я, может, кроме отца, на свете трех человек серьезно уважал, вот ты из них один.</p><p class="p1">– А еще кто? – с профессиональным любопытством спросил Бровман.</p><p class="p1">– Да в порту, ты их не знаешь, – ответил Кандель и вдруг подмигнул, и Бровману отчего-то было приятно, что Кандель оценивал его как одного из этих портовых богатырей.</p><p class="p1">– Ну и ладно, одно к одному, – сказал Бровман. – Я на зимовку полечу на «Седова», они команду меняют, так что три месяца меня не будет. А за это время ты либо перебесишься, либо придешь в себя, либо придумаешь.</p><p class="p1">– Да я как раз в себе, – сказал Кандель. – Теперь-то как раз в себе. Ну, я знал, что ты поймешь. Бывай здоров, Бровман, не кашляй. Вернешься с «Седова» – зайди.</p><p class="p1">А когда Бровман и вправду вернулся с «Седова» – значительно позже, чем предполагал, – все было уже другое, и сам Бровман был другой. Была уже зима, и было чувство, как всегда в конце зимы: вроде и испытывали, а вроде и помиловали; облегчение, благодарность, разочарование – и немножко пусто. Жадно, сладко, свежо, но немножко скучно. После полюса ему все было немножко скучно.</p></span></span>
