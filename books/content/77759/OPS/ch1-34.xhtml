<p class="p">2</p>
</div><p class="p1">Пролетая над зимовкой Папанина, Волчак должен был сбросить им посылку – письма родных, свежую прессу и четыре литра спирта.</p><p class="p1">К этому моменту они летели уже тридцать часов и натерпелись всякого. Сначала сильно обледенели, ушли наверх, солнце выручило, но дальше попали в циклон; вскарабкались на шесть тысяч, но пока лезли – каждый килограмм машины успели почувствовать на себе, последнюю стометровку ползли двадцать минут. У Чернышева, старшего в команде, посинели губы, Дубаков заснул за штурвалом над Нортбруком, Волчак бодрился, но у него раскалывалась голова, а таблетке он не доверял, боялся сонливости. Красота была неописуемая, но и страшная: человеку здесь категорически не место. Компасы плясали. Это же мать-мать-мать, сказал Чернышев, сколько же они тут будут сидеть вчетвером, с Папаниным-то? Ведь это сойдешь с ума, и главное – зачем? Я понимаю, мы прокладываем маршрут будущих регулярных рейсов, – но кому и что прокладывают они? Ни черта ты не понимаешь, сказал Волчак, они делают то, чего никто не делал. Похоже, не понимаю, задумчиво кивнул Чернышев.</p><p class="p1">Встречный ветер был адский, ползли, время от времени прикладываясь к волшебному кислороду. Связь была почти до самого полюса, Кригер исправно подавал голос, периодически напоминая: «Спирт! Спирт! Спирт!» Формально спирт на льдине нужен был исключительно Ширшову для консервации морских блох, сиречь гаммарусов, а морские блохи – для неведомых нужд науки. Неформально он нужен был всем, Москва сквозь пальцы смотрела на эти вольности. Во время высадки на льдину непостижимым образом забыли спиртовые бидоны, и летчики увезли их в Москву, не возвращаться же. Теперь Кригер прислушивался к мотору, но первым его все равно услышал Папанин, чуткий, как сторожевой пес.</p><p class="p1">– Ребята, мотор! – крикнул он, и все выбежали пялиться в небо, но никакого неба не было – туман начинался сразу от земли, и видимость в нем была три метра. Кригер ждал не столько спирта, сколько письма от жены, с которой успел прожить всего год, и то прерываясь на зимовки: за год до нынешнего перелета он давал метео Волчаку, летевшему в Петропавловск. Жена была молода и хороша, и Кригер успел постичь на личной шкуре, что такое полярная паранойя, описанная Войскунским в ходившей по рукам «Экстремальной этике». Человеку на полюсе кажется, что на Большой земле не только все про него забыли, но жизнь ушла далеко вперед, ушла в тот момент, когда ты стартовал из Щелкова, и теперь никто не узнает тебя и никого не узнаешь ты. Кригер томился не просто ревностью – он сходил с ума от ненависти, представляя себе пижонов на улице Горького, посетителей кафе «Север», которые не ездили на Север дальше Дмитрова, и публику любимого им подвала ВТО. Это было ощущение, отчасти напоминавшее – точнее, предвещавшее – посмертный опыт, но покойнику, говорят, все равно, он ни к кому не ревнует и ничем не владеет, а живой переживал все то же плюс муку собственника. Любопытно, что мук плоти, о которых столько говорят, Кригер не испытывал вовсе; не то чтобы ему хотелось провести с женой ночь, не то чтобы он представлял ее голой в мельчайших деталях – эти чувства куда-то пропадали до перемещения в более теплые края, и даже переезд из снежного радиодома в теплую палатку, когда радиодом истаял под немеркнущим солнцем, не оживили страсти. Но ревность – это да. Вообще, на полюсе от всего хорошего осталось только плохое: от похоти (нет слов, вещь приятная) – мнительность, от гордости – презрение ко всем, кто не торчал хоть месяц на льдине, – словно полюс был той шишкой с правдинской карикатуры, одинокой скалой, на которой удерживались только худшие мысли, а все хорошее стекало вниз.</p><p class="p1">И конечно, спирт улетел в Америку вместе с письмами. Группа Папанина так и стояла на снегу, в тумане, сначала задрав головы, потом тупо глядя перед собой в золотистый туман. Все золотистое отвратительно, как стафилококк, как этот полярный день, высвечивающий все мерзости. И письмо от жены, в котором она наивно, полуграмотно клялась и божилась, намекала на его мужскую неотразимость, улетело в Америку, и Кригер получил его только полгода спустя, причем Волчак еще заставил его плясать; а через месяц с небольшим над ними тем же маршрутом пролетел Громов, и они уже готовились принять посылку всерьез: нарисовали ядовито-желтой краской (другой не было) два концентрических круга, и погода была пристойная, но льдину отнесло западнее маршрута, а Громов не стал делать крюк. Не судьба была Кригеру вовремя получить хоть одно письмо от жены, а Ширшову – от Самойловича, чье место он займет вскоре после возвращения; если б это письмо, осторожно предупреждавшее Ширшова о подступающей тяжелой болезни Самойловича, до него дошло и Ширшов бы правильно его понял, то, возможно, и не занял бы должность директора арктического института. Но скорей всего, либо не понял бы, либо не послушался. Людям на полюсе всегда кажется, что дальше уже не зашлют, но в мире, как говорится, есть иные области.</p><p class="p1">Однако и Дубаков со своей высоты видел ничуть не больше и понимал не лучше. Он был в таком полусонном состоянии, когда мысли необычайно остры, но спутанны, – как комок проволоки или гитарных струн, подумалось ему. В этих бесконечных белых пространствах полярной ночи было одно фундаментальное противоречие: хорошо, но при этом совершенно невыносимо. Это как-то надлежало обдумать, не выходя из полусна, то есть не включая тормоза. При торможении мысль начинала козлить, и получалось опять все то же самое – только снежная бесконечность, тогда как в полусне что-то мерцало. Иногда Дубаков начинал понимать, что летит над полюсом, что еще немного – и они пролетят точку, из которой торчит земная ось, и у него началась вдруг недолгая, но необыкновенно сильная эйфория, описанная тем же Войскунским в той же «ЭЭ». Должно быть, это и был полюс – все под нами, некоторые вверх ногами. За последние сто лет человечество достигло феерического прогресса, никто в 1837-м, когда в результате шпионского заговора убили Пушкина, и представить не мог, что век спустя над Северным полюсом полетит железная машина с тремя русскими. У прогресса были, конечно, издержки, ужасное в четырнадцатом, серьезные риски сейчас. Но в целом человек по итогам последнего столетия звучал гордо. В том, что вокруг, вниз и вверх, не было ни одной живой души, – и быть не могло, потому что это место для живых душ не предназначалось, – был особенный повод для восторга. Они, именно его страна, совершили вылазку на те территории, где смертные прежде не бывали, они сделали то, для чего рождены, – вышли туда, куда не ходил никто. Россия была для этого придумана, это было место во всемирном разделении труда. Другие совершали штуки попроще – совершенствовали все, чем обставляют скучную, тщетную и потную жизнь. Дома́ там, подушки… А они выпрыгнули за грань, и их страна, никогда не умевшая просто жить, теперь нагоняла собственное предназначение.</p><p class="p1">Но полюс кончился, и на Дубакова волной наплыло новое состояние.</p><p class="p1">Это была грусть, примерно такая же, как под Хабаровском, после возвращения с Квятом, но как бы возведенная в куб. Тогда они были в городе, среди жилых помещений, и даже пара техников встречала их. Теперь же кругом было только вечное полярное солнце и просвеченный им туман, бессмысленная вечность, в которой нечего было делать, и бесконечное одиночество самолета. Сюда, наверное, не могла залететь даже самая сумасшедшая птица, вниз не заносило самого отчаянного рыбака; здесь мир, где никто никого не мог пожалеть, и Дубакову стало так жалко себя, как не бывало и в детстве. Беспредельная, безмерная печаль была во всем, что делали люди, и во всем, что они о себе думали. Должно быть, последняя человеческая мысль, возникающая перед смертью, – ужасная жалость и к тем, кто ушел, и к тем, кто остается, не говоря уж о себе. Еще, наверное, сожаление о небывших и уже невозвратимых возможностях. Сейчас они как бы репетировали смерть, все предшествующие ей состояния; и совсем уж последнее, что успевает уловить сознание, – безнадежная грусть, без злобы, без силы, грусть, которую изображают обычно лиловой, а она вон какая, золотистая…</p><p class="p1">Бедный АНТ проходил сейчас какой-то последний слой эфира. В мировом эфире есть слой печали, который соединяет всех; колебания этого слоя заставляют детей плакать во сне, а собак выть на луну, предполагаемый источник этих чувств. Когда колеблется печальный слой эфира, у меланхоликов текут беспричинные слезы, а лунатики выходят на крыши даже средь бела дня. Особенно это чувствуется в местах, где нельзя жалеть себя, – в казармах, тюрьмах, в брачных постелях. Вероятно, это был полюс.</p><p class="p1">Но это не был полюс – Чернышев поднялся чуть выше. А там они пролетели и точку, из которой торчит земная ось.</p><p class="p1">На короткий миг они почувствовали, что смысла нет ни в чем вообще, что где нет человека – нет и смысла, что, даже если добраться до самой высокой каменной вершины, которая выше Эвереста, – ну и что? – там ничего не будет, кроме камня. Даже если ты достроишь Вавилонскую башню, то сможешь утешиться только тем, что свысока посмотришь оттуда на землю; но парадокс в том, что земли оттуда не видно. Вот так и полюс: он занимает столь мало места, что фьють – и нету, и опять пошла окружающая его грусть.</p><p class="p1">Дубаков почувствовал такую бессмыслицу всего, что ему надо было срочно увидеть или услышать другого человека. Он повернулся к Чернышеву.</p><p class="p1">– Полюс прошли, – сказал Чернышев.</p><p class="p1">– Да уж чувствую.</p><p class="p1">– Что чувствуешь?</p><p class="p1">– Законную гордость, – сказал Дубаков.</p><p class="p1">– Ага, – равнодушно сказал Чернышев. – А я чайку попил бы.</p><p class="p1">– Сказано – сделано, – радостно сказал Дубаков и налил ему колпак лимонного чая из термоса.</p><p class="p1">– Пора шефа будить, – заметил Чернышев.</p><p class="p1">Дубаков растолкал Волчака, который спал удивительно глубоко и спокойно, хотя на лице у него было выражение полного непонимания, даже, пожалуй, обиды.</p><p class="p1">– Алло, Долли! – сказал Дубаков. Все-таки они готовились. – Мы пролетели полюс.</p><p class="p1">– А? – переспросил Волчак. – Дура! Что ж ты меня не разбудил!</p><p class="p1">– Да ничего особенного, – пожал Дубаков толстыми неудобными кожаными плечами. – Полюс как полюс. Народу никого.</p><p class="p1">– Ну и ладно, – неожиданно легко согласился Волчак. – Но что разбудил – это хорошо. Все время дрянь какая-то снилась. Причем детство. Тысячу лет не снилось, а тут – на.</p><p class="p1">– И что же? – полюбопытствовал Дубаков.</p><p class="p1">– Дрянь в целом, – повторил Волчак. – Детство мое в целом было дрянное. Доложи мне, Дубаков, показатели.</p></span><span id="id59"><div class="title6">
<p class="p">3</p>
</div><p class="p1">Летчики знают, что всякий полет – концентрированное отражение предполетных ситуаций: они его как бы предсказывают, но в форме аллегорической, и только умный высчитает тот сдвиг, с помощью которого можно эти намеки разглядеть. Когда на последних неделях подготовки в АНТ вписался Баженов и задел крыло, Волчак сразу понял, что ближе к концу полета случится какая-нибудь непредвиденная херня, так оно и вышло. На тридцать девятом часу полета, когда рулил Дубаков, они вошли в густую облачность и быстро обледенели. Самолет перегрузился, на нем была сантиметровая ледяная шуба, Волчак скомандовал резкое снижение, и тут Дубаков в ужасе увидел, что прямо в лобовое стекло резко выбросило просто-таки массу воды. Это могло быть только одно – лопнул расширительный бак водяного охлаждения. Почему так вышло? Допустим, замерзла трубка, отводящая пар, пар перестал отходить и разорвал бак, и теперь головки цилиндров не будут омываться водой, а это значит – через пять минут мотор взорвется, разлетится к такой-то матери. Дубаков стремительно убрал обороты и принялся отчаянно качать воду вручную, но насос воду не брал, поршень двигался с ужасной легкостью, и тело у Дубакова стало таким же легким, ватным. Садиться было некуда. Волчак все понял – вообще был быстрый, когда надо, – и ринулся вспарывать резиновый мешок с запасом питьевой воды. Мешок, однако, застыл, незамерзшей воды там было от силы три литра. Тут осенило Чернышева. Ссать в полете надлежало в резиновые зонды, потом всю мочу сдать на анализ, медики не шутя называли ее бесценной. Шары, заорал Чернышев, шары! Они висели в относительном тепле. Чернышев с Волчаком слили содержимое в запасной бак, и ручной насос, мать его, заработал; это было невероятно, но они выгадали минимум полчаса. За это время Дубаков сообразил, что бак цел, но трубка действительно замерзла, давление в системе возросло и сработал редукционный клапан, от чего еще никто не умирал. Он выбросил многовато воды, это было худо, но не катастрофично. Вдобавок не осталось шаров для малой нужды, и ссать теперь, предположил Волчак, придется прямо в бак: как прекрасно устроен человек, сказал он, как хорошо он пополняет все запасы, как он прямо вот сам является деталью самолета, – что я и отмечал в городе Парижске! Давайте, однако, пожрем. Извлечены были задубеневшие яблоки, твердые ледяные апельсины и вполне кондиционная курятина. Апельсин мой ледяной, запел Чернышев, поговори-ка ты со мной! Дубаков вгрызся в курицу. Ты подгорна, ты подгорна, широкая улица, – закричал он, – по тебе никто не ходит, ни петух, ни курица, а если курица пойдет, то петух с ума сойдет! В этот момент они поняли, что долетят. Великое дело жратва!</p></span><span id="id60"><div class="title6">
<p class="p">4</p>
</div><p class="p1">С появлением под крылом живой нормальной суши, хотя и льдистой, и болотистой, и безлюдной, пошла чистая радость, испытанная, вероятно, Колумбом, когда он после тошнотной океанской зыби поплыл вдоль зеленых берегов. Было в принципе понятно, что не Индия, но все равно радостно. Дубаков отбил радиограмму: задание в основном выполнено жмем руки приветствуем! Высота была три тысячи, прекрасный антициклон, словно стоило влететь в Западное полушарие – и все пошло блестяще. Погоду, правда, предсказывали неровную, но где, когда мы видели ровную погоду? Чернышев пошел записывать сводки, Волчак взял штурвал, Дубаков улегся на расстегнутый спальник. Не спалось, потому что недавнее напряжение еще гудело во всем теле, и Дубаков сказал мечтательно: почти как тренировочный полет… Волчак расслышал и ответил: так к нему и относись. «А какой следующий?» – спросил Чернышев, готовый к новым подвигам. Через Южный, проревел Волчак. Господи, там-то что делать, одни пингвины… Вот именно, сказал Волчак, там никого нет и никому не надо, и значит, это самое наше место. Точно, сказал Дубаков, мы сделаем там курорт.</p><p class="p1">А это была мысль не праздная – не про курорт, а про Южный полюс; не может быть, чтобы планета не хранила сюрпризов, чтобы просто так сделаны были эти две кладовые льда на вершинах нашего геоида. Не зря древние помнили про Гиперборею, не зря на карте Меркатора изображался северный материк, а тайным обитателям юга приписывалось знание всех наук. Там, за далью непогоды, есть блаженная страна – в нее верили больше, чем в то, что на земле рано или поздно восторжествует счастливый строй; этот строй уже торжествует, но не для всех же? Должен быть фильтр, фильтр для тех, кто добрался, там они встретят нас, там волшебная страна пилотов, долетевших до полюса, мореходов, нашедших тайный южный путь, Земля Санникова и Толля. Туда улетел Амундсен, туда ушла экспедиция Франклина, там на входе выдают бессмертие. А Скотта туда не пустили, и он от обиды повернул назад, хотя почему не пустили? А потому, что на входе потребовали отречься от жены, которую он страстно любил, – и он поплелся назад, чтобы замерзнуть в двенадцати милях от спасительной базы; что, кэптейн, помогла тебе твоя жена? Надо будет рассказать Бровману, пусть напишет рассказ, думал Дубаков сквозь нервный сон.</p><p class="p1">Не сказать чтобы до конца шло гладко: плохо работал передатчик (пробираясь в хвост, надорвали антенну), пришлось подниматься над циклоном, идти на шести тысячах, кончился кислород, у Волчака один раз шла кровь носом, но в целом третьи сутки над мирной сушей были почти отдыхом, если не считать нараставшего чувства отдельности и закрытости. Они не получали ни одной радиограммы, понятия не имели о погоде, и пока Чернышев не поймал радиомаяк, было ужасное ощущение, что они одни на свете. Вдобавок Дубакову стало казаться, что горючее не убывает. Это была иллюзия, конечно, и это было лучше, чем если бы оно вдруг катастрофически убыло, как было у него однажды над Новгородом, когда сломался датчик; но в американской ночи, да еще при луне, он, Дубаков, стал вдруг фантазировать на тему, что, пока они летали, Земля опустела. Почему? Да мало ли, война, эпидемия, все вдруг попали под таинственный луч сумасшедшего профессора. И вот прилетают они в пустую Америку, все в их полном распоряжении, но ничего человеческого, и с них должна теперь начаться новая цивилизация, и что же это будет, интересно, за цивилизация? Женщины… Где взять женщин? Дубаков представил, что одна какая-нибудь американка, скорей всего негритянка, осталась, ее не взяли; негры же вечно утеснены, он читал недавно книжку про восстание Джона Брауна. Негритянка достанется, конечно, Волчаку, командиру; но Волчак свой, советский командир, он поделится. И будущее поколение их будет метисами – метисы, говорят, умные; надо будет слетать на полюс за Кригером, он умный, и человек прекрасный, и потомство от него будет с прекрасным характером… Хорошие вырастут люди, без сантиментов. Но представить Землю, заселенную героями?.. Что они будут делать, ведь пахать и сеять так невыносимо нудно… И потом, кому докладывать? Зачем совершать подвиги, если о них некому будет доложить? Дубакова взял ужас, но тут Чернышев поймал Сиэтл.</p><p class="p1">Дубаков вел АНТ среди невыносимой красоты: медленно, алыми полосами розовеющее небо на востоке, густо-синий звездный запад, чем-то это напомнило ему американский флаг со звездами и полосами, и Дубаков посмеялся. Пошел шестидесятый час полета, горючки было еще на пять часов, но сильно мешал встречный ветер. Волчак решил тянуть до Сан-Франциско, ему нравилось это название, да и по планам они предполагали сесть там, хотя ждали их вдоль всего Западного побережья; в принципе, можно было хоть в Сиэтле, но Сиэтл миновал и канул. Связь теперь была, но все трое ни черта не понимали по-английски, а единственная французская радиограмма, которую поймал Чернышев, оказалась шалостью радиолюбителя, тот передавал своей девочке, своей киске, что любит ее и ее киску, гладит ее киску, желает доброй ночи ее киске! Мон ша, мон пти ша… Невозможно было передать проклятия, которые Волчак обрушил на идиота и его кисок, а между тем надо было решаться. На побережье плотно лежали дождевые тучи, в этом был некий уют, но ничегошеньки не видно. Вместе с Дубаковым прикинули: погода в Портленде была более-менее известна, что в Сан-Франциско – непонятно, в грозу садиться никакой охоты, все трое устали и не до конца были уверены в себе. Конечно, в критический момент включается и третье, и четвертое дыхание, но у машины есть ресурс, она и так натерпелась. Портленд, сказал Волчак, черт с ним, Портленд. Гор вроде нет, погода тихая. Дубаков увидел аэропорт, Волчак сказал: на гражданский не садись, тут, я знаю, должен быть военный, что-что, а это я подчитал перед вылетом.</p><p class="p1">Полоса была мокрая – никто из них не знал, что Портленд – самый дождливый регион, дождь стал его символом, Портленд был тут вроде нашего Ленинграда, но выбирать уже не приходилось: горючка начала падать, черт знает почему. Сажай ты, сказал Волчак. Дубаков чувствовал, что после полной растраты горючего самолет чересчур легок. «Не садится!» – заорал он. «Выключай!» – крикнул в ответ Волчак. «Рухнем!» – «Я сказал, выключай!» Только после этого они резко просели и сквозь дождь зашли на полосу; перед самой землей Дубаков сработал рулями, обошлось. Самолет побежал по полосе и остановился у самого ее конца, чуть не въехав в раскисшее поле. К ним мчался часовой.</p><p class="p1">– Фу, – сказал Волчак. – Уф, фу, уф, что же это такое, нет, так не бывает, да мать же… – И он произнес одну из тех тирад, что так располагали к нему людей.</p><p class="p1">– Но, собсно, что же теперь делать? – поинтересовался Чернышев. – Иди договаривайся, ты старший…</p><p class="p1">Дубаков открыл верх кабины и вдохнул смешанный запах дождя, бензина, близкой большой воды – всю сложную смесь Портленда. Этого не могло, по всем расчетам не могло быть, и все же это было. А что, подумал он, еще, чего доброго, увижу когда-нибудь Валентину.</p></span></span>
