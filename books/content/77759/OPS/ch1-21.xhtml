<p class="p">4</p>
</div><p class="p1">У них были еще две короткие посадки на Аляске. В Фэрбанксе скорее протокольная, Грина здесь должны были принять в почетные члены клуба полярных летчиков (а Голубева по молодости – в кандидаты), – и опять был мэр, пение и говорение. Грин отчего-то сильно нервничал после сеанса связи с Москвой, что-то не то ему показалось в интонациях, морзянка-то интонаций не передавала. Может, ему померещилась ирония, а может, он вообще почувствовал скрытое неодобрение всей затеи, никогда ведь нельзя было знать. Пригонишь американский самолет, а за это время в Америке скажут или сделают что-нибудь не то, и придется – что придется? Оправдываться? Гнать самолет обратно? В общем, Грин отчего-то помрачнел и заторопился, но все равно пришлось высиживать банкет, на этот раз настоящий, угощаться плодами местных теплиц и уникальным паштетом из местных птиц, аляскинских гусей, произносить непременные слова о двух великих молодых странах, перед которыми широчайшее поле сотрудничества; тут Грина вдруг повело, он заговорил о том, что выдерживать работу в Арктике по нынешним временам способны всего два народа, остальные изнежились, – обиделся техник шведского происхождения, ответивший, что некоторые народы еще только учатся работать в Арктике, а другие в таких условиях живут, вот, например, вся Скандинавия; кое-как перевели все в шутку, мэр заговорил о прелестях полярной жизни с отсутствием скучного чередования дня и ночи, а местный поэт – в Фэрбанксе был свой поэт, с эскимосскими корнями, – прочел, раскачиваясь и приплясывая, стихи про вечное стремление человечества к полюсу, откуда все страны мира можно видеть сверху. Показали ребенка-вундеркинда, обещавшего стать великим математиком. Скажите, спросил вундеркинд, очкастый, хилый и не похожий на советских пионеров-математиков, всегда гармонично развитых физически, не кажется ли вам на больших высотах, что время ускоряется? Гриневицкий с неожиданной серьезностью стал объяснять, что на больших скоростях, которые развивают современные машины, – в ближайшей перспективе мы можем говорить уже о шестистах километрах в час – ускоряется работа сознания, а также учащается сердечный ритм; да, безусловно, можно говорить о том, что современный летчик в целом живет быстрее. Скажите, продолжал настырный парень, а можно ли говорить о таком способе передвижения, – я это читал в фантастическом рассказе, – при котором воздушное судно выходит в стратосферу, зависает над землей, она в это время прокручивается, и путешественник возвращается в другую ее точку? В этом, сказал Гриневицкий снисходительно, нет ничего фантастического: путешествия через стратосферу из Аляски в Москву через десять лет станут обычным делом и будут занимать два-три часа. Подросток, казалось, совершенно не удивился и кивнул, прибавив: «Я это так и понимал».</p><p class="p1">В Номе, на самом берегу, им перестало везти, словно они впрямь пересидели в Америке: испортилась погода, лег тяжелый многослойный туман, в нем потерялись даже крыши пятиэтажных местных зданий. Грин нервничал, он рассчитывал быть на Чукотке уже 12 августа. Голубев этой задержке скорее радовался, ему почему-то интересно было на Аляске, он бы еще поговорил с местными. Но Грин уперся, и утром двенадцатого они взлетели.</p><p class="p1">Это был не туман, не просто плохая видимость, не низкая облачность – это было однозначное и безусловное повеление судьбы, но Грин сказал: «Судьба – это я». Куда он гнал? Не иначе от всех этих чествований и торжеств напало на него помрачение, он в самом деле решил, что все может и черт ему не брат, – и тут с Голубевым случилась, конечно, вещь непростительная. Годы спустя, возвращаясь мысленно в тот день, он понимал, что вселилась в него, видимо, непреодолимая сила. Голубев всегда прекрасно знал свое место и штурманские обязанности, он никогда не позволял себе нарушать субординацию, он помнил, кто тут герой и командир, даже когда Гриневицкий на секунду об этом забывал, а тут… Ни до, ни после Голубев не чувствовал ничего подобного. В конце концов, любому специалисту знаком миг, когда он словно снимает барьер и позволяет себе вдруг представить, что вот летит скорлупка среди бесконечности и от бездны ее отделяют миллиметры не самого надежного железа, но берешь себя в руки и делаешь, что положено. И тогда, все равно как в детстве, выбравшись из-под одеяла, ныряешь в тепло – в тепло профессионального взгляда на вещи. Но тут на Голубева нашел ужас: туман был не туман, а неведомое вещество, покрывавшее мир и вот уже заволакивавшее его окончательно, без просвета; это была стихия, среди которой все они вспыхнули лишь на миг, но их погасила непобедимая серость.</p><p class="p1">Больше всего это было похоже на станцию Зоблино, куда Голубев в недавние свои рязанские времена был командирован от вуза в школу-коммуну к Щукину рассказывать детям об авиации. Его встретили на станции, и тут поднялась метель, они сбились, и он бесконечно долго сквозь серую муть ехал в санях, пропахших всем, что он больше всего в жизни ненавидел, – долгой, дикой и притом терпеливой жизнью, сельским идиотством, старыми вещами, – и то задремывал, то заставлял себя проснуться, а потом они вовсе остановились. В конце концов лошадь вышла к жилью, но не туда – на пять километров западнее, и в колонию Голубев попал только утром, когда уже никто его не ждал и он был никому не нужен.</p><p class="p1">Ехать без дороги по этому серому полю с клочками кустов, с внезапными рощами, которые, должно быть, летом были прекрасны, а сейчас безнадежны, как сама безнадежность, было так скучно и страшно, что он проклял тогда все на свете, и себя, и свое комсомольское поручение, и детей, к которым его везли. Ужасен был цвет неба, сначала серо-голубой, потом темно-серый, сумеречный, и наконец вообще никаких цветов не осталось – одна только муть, и эта муть была суть. И самое ужасное чувство, когда пробиваешься сквозь такую облачность, которая вдруг наступает в жизни, что она не имеет конца, и главное, что нет ничего другого, что все остальное снилось, а правда была вот это.</p><p class="p1">Если бы болтанка, было бы легче, но они пробивались через сплошную муть, никуда не двигаясь, да и все равно, куда бы ни двинулись, везде этот слой серой ваты был одинаков. Не было больше верха и низа, добра и зла, – и это все сделал Грин, разогнавшись быстрее обыкновенного, это все была его идиотская гонка, лишь бы рекорд. По приборам они были на середине пролива, а между тем внизу нельзя было вообразить никакой пролив. По ногам Голубева вверх ужом пополз ужас. Если бы Грин снизился метров на двести, была бы надежда, но он и не думал снижаться. Он летел как во сне, в трансе, и на Голубева накатило самое страшное опасение – что этот туман каким-то образом пронизал Гриневицкого и теперь он, Голубев, остался тут единственная живая душа. Грин был идеально спокоен и, дико сказать, меланхоличен. С таким видом смотрят на туман с морского берега из окна собственной дачи, а не находясь в самой гуще неведомой материи, в перспективе так и лететь, пока не кончится горючее. Голубев начал догадываться, что такое ад. Это он и был, он самый. И в этом аду Голубев начал вдруг яростно ругать Гриневицкого: кричал, что они погибли, пропали, что никогда никуда не прилетят, что это все его, Грина, штучки, его истерика, гонка за рекордами, безмерно раздутое «я», что всем им, зарвавшимся героям, ни до кого дела нет и что, если бы хоть кто-нибудь догадывался, что из них вышло, никто бы им копейки народной не дал на все эти закупки и перелеты. Он кричал, что Грин во всем виноват и спросить с него будет некому, потому что он сейчас пропадет и никогда не ответит за свою и чужую жизнь. В другое время он не мог бы и помыслить такое, и страшно было ему уже потом, спустя много дней, вообразить, что в этом тумане из него полезла подлинная его душа. Тем более что подлинная сущность Гриневицкого, которую Голубев наблюдал в непосредственном соседстве, была, оказывается, вот такая – меланхолический рыцарь с гравюры Дюрера «Рыцарь, смерть и дьявол», который едет на своем печальном коне через безмерно печальный пейзаж со скалистым лесом, весь закованный в сталь, и на лице его ничего, кроме решимости и бескрайней, как этот туман, печали. Грустный рыцарь, держащий путь в никуда из ниоткуда. Голубев увидел эту гравюру в детстве и двадцать лет не вспоминал, а тут она прямо так и всплыла. И обычный Грин должен был жестоко осадить его, двумя надменными словами поставить на место или даже пригрозить, что доведет эти настроения до сведения командования, как, все знали, донес он на Антонова, но этот, настоящий, проявившийся среди тумана, только слушал и молчал с бесконечной печалью, а потом вдруг сказал: «Что же, все это жизнь», – и неясно было, что он имел в виду, этот ли туман или саму ситуацию, когда кто-то ради своих безумных намерений жертвует всеми. Если бы он предложил Голубеву подышать кислородом или, чем черт не шутит, в нарушение всех инструкций протянул бы флягу, которая всегда есть на борту, – честное слово, было бы легче. И тут Голубеву стало совсем страшно, то есть почти до паралича, потому что он ощутил, что все это действительно и есть жизнь, что она открылась им в самом беспримесном и окончательном своем виде, а все, что они себе придумывали, – перелеты, рекорды, морская рыбалка в отпуске, – все это не более чем маска, нашлепка, которая держится ни на чем.</p><p class="p1">Но как только он в это поверил окончательно и начал уже мысленно прощаться с матерью, в существование которой где-то сейчас совершенно не верилось, увидел внизу месяцеобразный, дуговидный просвет, он мог бы побожиться, хоть сроду ни в кого не верил, что просвет был ровно той же формы, что и подаренный в Джуно самородок. Просвет был единственным среди сплошной пелены, и Грин, который увидел его первым, плавно отправил машину туда, в зияющий свет полярного дня. Голубев успел подумать, что такой жемчужный свет, верно, бывает в раю. Они нырнули в эту дырку – и внизу их сильно тряхнуло, пошли облака, между которыми Голубев четко увидел мыс Уэлен, домики и несколько яранг.</p><p class="p1">Они приводнились в двухстах метрах от берега. С мыса махали и орали. Только тут Голубева словно отпустило, и он почувствовал жгучий, детский стыд.</p><p class="p1">– Юзеф, – сказал он, – прости, нашло на меня что-то.</p><p class="p1">Гриневицкий посмотрел на Голубева в упор и обратился к нему на «вы».</p><p class="p1">– Вы позволили себе черт-те что, – сказал он, – и я позабочусь о том, чтобы вы не только со мной, но и вообще больше не летали. Вы в Осоавиахиме будете летать, парашютистов будете возить.</p><p class="p1">Дальше шла сплошная полоса триумфов, Гриневицкий смягчился, но Голубев понимал, что с Грином у него кончилось бесповоротно. Что-то случилось в этом тумане, чего он не понимал. В Красноярске сняли поплавки и самолет вернулся в сухопутное состояние, в Москве встретили митингом, но Сталин не приехал – передал суховатое письмо. Были Ворошилов, Каганович и Ягода, недобрый гость. Гриневицкий говорил коротко и хмуро.</p><p class="p1">– Машину посадил, но и голос посадил, – сказал он.</p><p class="p1">Голубеву было в этот момент невыносимо жалко его.</p><p class="p1">– Но судя по тому, как вы встречаете, мы вроде сделали что-то хорошее, – закончил Грин и хлопнул Голубева по плечу. Голубев на короткий миг поверил, что теперь все будет нормально.</p><p class="p1">Сразу после этого митинга жена Гриневицкого сказала, что устала от такой жизни. Он кое-как уговорил ее остаться, но трещина пролегла серьезная.</p><p class="p1">Самолет отогнали исследовать и тут же разобрали на узлы, многое нашли конструктивно интересным, а кое-что даже и превосходным: отсутствие ручной выколотки, сварных узлов, первоклассная конструкция шасси. Ничего революционного не обнаружилось – просто машина была идеально удобна для обслуживания и комфортна для пилота. Гриневицкому дали «Красное Знамя» и премию в двадцать пять тысяч, Голубеву – орден Ленина и пятнадцать тысяч. Никаких последствий для карьеры Голубев не заметил, но летать с Гриневицким ему больше не пришлось; очень скоро он понял, что за всю жизнь это было самым большим его везением.</p><p class="p1">В жизни Гриневицкого что-то сместилось, и он не мог понять, где случилось это смещение – в пустынной ли бухте одинокого острова, над черными домами Свенсон-Бея или в том тумане. У него пропало желание ставить рекорды, он даже сказал, что одномоторный самолет вряд ли годится для беспосадочных трансарктических перелетов, а привезенный им «Вульти» так и остался в разобранном виде на заводе 156. Из всей его конструкции в советском самолетостроении были использованы разве что электроприводы шасси и щитков, до чего в конце концов додумались бы сами, и пластмассовые ролики тросовых передач, более для форсу. А пилотское кресло главный инженер поставил себе в кабинет, распорядившись приварить к нему крестовину с колесиками. Летом следующего года Волчак с Дубаковым и Чернышевым поставил беспосадочный рекорд через полюс на одномоторном самолете Антонова.</p></span></span>
