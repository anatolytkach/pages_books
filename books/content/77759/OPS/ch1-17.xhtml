<span><span id="id29"><div class="title4">
<p class="p">9</p>
</div><p class="p1">Долго ли, коротко ли шла Поля по холодеющему лесу, среди периодически встречавшихся болот, а только провалилась в бочажину по самую шею, вымокла и перепугалась. Это конец, подумала она. Палка сразу сломалась – она видела в кино, как девушка положила палку на две кочки и, подтянувшись, выбралась из трясины, но тут и кочек не было. Некоторое время Поля барахталась, потом почувствовала, что ее засасывает, и закричала долгим отчаянным криком в безумной надежде, что прибегут раскольники, спасут, – но раскольники уже были далеко, километрах в пяти, не докричишься, а и услышат, не побегут, только перекрестятся двоеперстием. Так кричала она трижды, и самое удивительное, что, по всей вероятности, действительно начала творить чудеса, как и предсказывали ей Зыковы, потому что на третьем крике из чащи вышел человек в ватнике, с ружьем за плечами, и буднично спросил, чего она орет.</p><p class="p1">– Вот, провалилась, – так же буднично и даже ворчливо ответила Поля.</p><p class="p1">– Вижу, что провалилась. Много вас тут?</p><p class="p1">– Одна.</p><p class="p1">– Хорошо.</p><p class="p1">– Чего ж хорошего?</p><p class="p1">– Ничего, – сказал человек задумчиво, – ну давай, хватайся. – И протянул Поле длинную ветку, которую легко отломил от ближайшей осины. Она вцепилась, он осторожно потянул, минут пять она карабкалась, но выползла. Даже унты остались при ней, потому что прекрасная вещь проволока.</p><p class="p1">– Это откуда ж ты? – спросил спаситель, которого Поля наконец рассмотрела. Под пятьдесят, лицо обветрено, скуласто, глаза лукавы. Это лицо, густо заросшее курчавой бородой, знало лучшие времена и как бы громко об этом говорило, было в нем благородство черт и след явного европейского происхождения.</p><p class="p1">– Я летчица, с самолета.</p><p class="p1">– Красная летчица?</p><p class="p1">– Сталинская, – уточнила она, не чуя опасности.</p><p class="p1">– Пристрелил бы тебя, – равнодушно произнес он, – но не для того же спасал? Как тебя занесло в тайгу, сталинская ты эдакая летчица?</p><p class="p1">– С самолета прыгнула, – простодушно объяснила Поля. – Там конструкция такая, что при посадке кабину штурмана могло заклинить, так я прыгнула, а девочки пошли на вынужденную, сели где-то здесь, иду к ним.</p><p class="p1">– Чего ж вы сюда полетели? – недоверчиво спросил скуластый.</p><p class="p1">– Рекорд ставили. От Москвы до Комсомольска.</p><p class="p1">– Какого такого Комсомольска?</p><p class="p1">Скуластый, видимо, понятия не имел об этом молодом городе, будущей столице Приморья.</p><p class="p1">– Город такой, неужели не слыхал?</p><p class="p1">– Велика Россия, всего не упомнишь, – загадочно сказал он.</p><p class="p1">– А ты что тут делаешь?</p><p class="p1">– Так, – ответил скуластый, помолчав. – Постреливаем.</p><p class="p1">– Охотник, значит?</p><p class="p1">– Можно и так сказать. Ну, пошли, обсохнешь.</p><p class="p1">Избушка, в которую он ее привел, была не такая крепкая, как старообрядческая, но с печкой, сложенной из камней, и мешками всяких припасов по стенам. Хорошая охотничья изба, в какой и перезимовать не страшно. Поля подумала, что охотник, должно быть, сейчас ее изнасилует, когда она станет переодеваться, но он не проявлял к ней никакого мужского интереса и деликатно вышел, когда она переодевалась в меховую куртку. Белье разложила на полу и воинственно села рядом, но охотник развел огонь, принес воды из ручья и буднично поставил помятый закоптелый чайник.</p><p class="p1">– Значит, рекорды ставите? – спросил без особого интереса.</p><p class="p1">Поля сильно замерзла и только кивнула.</p><p class="p1">– Дал бы спирту, да нету, – посетовал охотник. – Давно у людей не был. Ничего, отогреешься.</p><p class="p1">– Не видал ты самолета здесь? – спросила Поля, робея.</p><p class="p1">– Не видал. Да я хожу много, всех не увидишь. Ты кто? Звать как?</p><p class="p1">– Степанова Поля.</p><p class="p1">– Ну а я Николай Яремчук второй, полковник Сибирского казачьего корпуса, честь имею. Часть силы той, что без числа творит добро, желая зла. Спас вот красную летчицу, не думал не гадал.</p><p class="p1">– А не скажете, – вежливо перешла на «вы» Поля, – далеко до жилья какого?</p><p class="p1">– До жилья далеко, – неопределенно ответил полковник. – Ты с какой целью интересуешься: к людям выйти или наоборот?</p><p class="p1">– Желательно бы к людям, – виновато сказала Поля.</p><p class="p1">– Это трудней. Но выйти можно, отчего ж. Или сами за тобой придут. Сейчас ведь знаешь как – чаще они за тобой приходят. Может, и за тобой кто удосужится.</p><p class="p1">Поле показалось, что он насмехается.</p><p class="p1">– Я и сама выйду в случае чего, – сказала она обидчиво. – Но что спасли – это спасибо, конечно.</p><p class="p1">– В общем, не за что. Но ты в другой раз осторожней. Тут не знаешь, на кого попадешь.</p><p class="p1">– А на кого можно? – наивно спросила Поля. – Много, что ли?</p><p class="p1">– Хватает, – неопределенно ответил Яремчук второй. – И ваши бегают, и наши бегают. Фоменковцы, – начал он загибать пальцы, – оскольцы, второй чешский, третий фрунзенский, пятый казачий, амурская милиция… Прошлым летом белочеха видел… Полно осталось. Тайга большая, всех не переловишь.</p><p class="p1">По крыше избушки зашуршал небольшой уютный дождь. Полковник дал Поле сушеного мяса из одного мешка и вяленой рыбы из другого, а потом развернул перед ней феерическую картину густонаселенной тайги от Саянских хребтов до сопок Маньчжурии, так что она даже испугалась: вдруг кто видел ее тогда… ну, тогда? Нет, конечно, это не мог действовать опий, половины этих имен она не знала, хотя, объяснил ей потом доктор, когда она кое-что рассказала ему, в мозгу ее могли отложиться случайно прочитанные фамилии, и теперь они соединились в изумительное ожерелье бойцов, беглецов и старообрядцев.</p><p class="p1">По тайге до сих пор рыскали посланники Ивана IV, отправившего их воевать Сибирь, и остатки экспедиции землепроходца Ерофея Хабарова, в отряде которого в 1652 году случился раскол. Раскол случался всегда – примерно по тому принципу, который Поля обнаружила, толкуя с беспоповниками. Стенька Поляков откололся от Хабарова и пошел воевать гиляков, но часть поляковцев вернулась к хабаровцам, а другая часть разругалась из-за гиляцких баб. Отряд Ермака раскололся из-за отношения к местным жителям: одни предлагали их завоевывать, а другие – истреблять; третьих же, предлагавших обучать их мирно, перебили сами местные жители. Раскол случался из-за Волынского, из-за отношения к Бирону и стихотворной реформе Тредиаковского, а после 1861 года отряд крепостных бежал из Центральной России в Сибирь, чтобы установить там крепостное право – оптимальный способ руководства народами. Сибирский казачий корпус раскололся из-за отношения к Унгерну, который хотел идти на Монголию, а Лаврецкий не хотел – что нам Монголия, у нас Россия не завоевана и до сих пор толком не катехизирована! Где-то в глубокой тайге, сказывали, прятался город нэпманов, который и обеспечивал провизией всю эту разномастную беглую Россию, а на Алтае скрывался монастырь настоящего белого православия, куда вожаки отрядов после особенно кровавых стычек ходили на покаяние.</p><p class="p1">Поля слушала зачарованно и раз только спросила:</p><p class="p1">– А не скучно тебе без баб, Яремчук второй? Я не в смысле предложиться, но в смысле женского любопытства.</p><p class="p1">– Да тут баб… – безнадежно махнул рукой Яремчук. – Всех не перекроешь. Кстати, от женского батальона тоже много осталось, но и они раскололись – часть пошла за Бочкаревой, которую не расстреляли, а тайно выпустили, и она сбежала на Харбин, а другая отделилась и выбрала командиркой Осипову, утверждавшую, что Бочкарева мужик.</p><p class="p1">Поля отроду не слышала про всех этих людей. Ей казалось, что все это осталось где-то в дореволюционной эпохе, а между тем за Уралом, ни на секунду не прекращаясь, продолжало зыбиться и дробиться. Она хотела подробнее узнать про Бочкареву – потому что, оказалось, женщины и до них спешили осваивать мужские профессии, – но тут над избушкой заревело, и, выбежав, они увидели низко летящий над лесом «дуглас». Он улетел, потом вернулся и сделал круг. Было чувство, что он прочесывает небо.</p><p class="p1">– Пойду я, – сказал Яремчук. – Это за тобой летят, ну а мне с вами не резон. У меня тут еще дела есть.</p><p class="p1">– Вышел бы ты к людям, Яремчук второй, – попросила Поля. – Мы бы тебя в отряд приняли, ты бы, может, с парашютом прыгал. Ты мужчина отважный. А грехи все эти мы забыли давно, у нас теперь дела поважней выяснения отношений.</p><p class="p1">– Ну нет, – ответствовал Яремчук, – есть еще у меня свои дела, надо кой с кем поквитаться. Найти надо человечка одного, мы с ним под Ракитной стыкнулись… Знаешь бой под Ракитной? Изумительное было сражение, три дня резались, остановиться не могли. Ты мне лучше вот что скажи: будет война-то?</p><p class="p1">– Думаю, будет, – сказала Поля. – В Испании уже идет, мой муж там сейчас воюет.</p><p class="p1">– Что ж ему в Испании делать? – не поверил Яремчук. – Впрочем, у России везде интересы. Опять же выход в Гибралтар… – Он сощурился, видимо, представляя себе карту. – Что же, Испания неплохая земля, тетушка моя туда ездила в свадебное путешествие. Если будет большая война, наверное, сюда много новых людей набежит. Не всем же охота воевать. Чем же, как не изменой, воздать за тиранство… – процитировал он непонятно откуда. – Набегут и сюда. Ну, бывай, Степанова, живи, как говорится, и помни. Оставил бы я тебя с собой, ты баба справная, но, во-первых, тебе домой надо, а во-вторых, ну, останешься ты со мной, и что? Обязательно пристрелишь. Это уж всегда так бывает. Где два солдата на острове и за одним пришел баркас, так другой его непременно пристрелит, и чаще баба. Был у нас такой случай на Арале, ничем хорошим не кончился. Здравия желаю.</p><p class="p1">И он затерялся в желтой тайге, прекрасно отточив за эти двадцать лет навыки маскировки, а Поля помахала самолету, попрыгала на месте, снова запалила мох, который на этот раз почти не горел, потому что вымок, и дождалась еще одного самолета, который, кажется, по самым вершинам сосен и кедров проехался темно-зеленым брюхом. Она всегда знала, что ее искали, но только теперь поняла, что нашли. Через некоторое время ей послышался далекий взрыв. Где-то за сопкой, вспышки она не увидела. Может быть, стреляли из ракетницы, но уж слишком громко. А может, упал метеорит: в тайге они часто падали, она читала. Но вероятнее всего, это Яремчук второй сражался со своими незримыми врагами, подорвал кого-то из них гранатой. Почему-то ей стало уютно от этой мысли: для советского человека же ничего нет хуже одиночества. А так кругом была жизнь, неспокойная, но боевитая.</p><p class="p1">Заночевала Поля в избушке, и ей приснился чудной сон. По тайге бродили она и товарищ Сталин. Ей надо было вывести товарища Сталина к его машине.</p><p class="p1">Откуда в тайге товарищ Сталин и, главное, – откуда у него здесь машина? Они стали восходить на сопку, и Поля все время помнила, что на сопках часто бывают тайфуны, особенно на этой, которая недалеко от большого озера Эйпунэм. Название озера она помнила совершенно четко.</p><p class="p1">Они ходили, часто перебирались через поваленные деревья – деревья тут падали с корнями, вырвав из земли четырехугольник, приросший к корням навеки. Почва была каменистая, земли было всего-то сантиметров двадцать, а под ней камень. Поэтому деревья валились легко, и постоянно приходилось через них перешагивать. Поля не знала, где искать машину, и все время извинялась, что приходится лазать по горе. «По горе мне нетрудно, я в горах вырос, – сказал товарищ Сталин, – а вот что вы машину найти не можете, это плохо. Плохой вы штурман. И мужа вы найти не можете, плохой вы штурман». – «Товарищ Сталин, – сказала Поля, – я люблю одного человека». – «Я это знаю, – с легким раздражением и усиливающимся акцентом ответил Сталин. – И вот какой диалектический парадокс, – добавил он, – если вы его найдете, то вы его потеряете. Если не найдете, то еще может быть по-всякому. Но если найдете, то потеряете. Это диалектика!» – сказал он и поднял палец, и Поля проснулась в полном недоумении, некоторое время еще пытаясь вспомнить, был ли Яремчук или почудился.</p><p class="p1">С тяжелой головой и кислятиной во рту она пошла на юго-восток и шла уже с полчаса, когда на фоне теплого серого неба, скучного, как любое одиночество, пролетел, покачав крыльями, вчерашний «дуглас», а вскоре расцвел белый парашют.</p><p class="p1">– Я тут! – закричала Поля. – Здесь я!</p><p class="p1">Она уже знала, кто это, но поверить не могла. Парашютист грамотно менял направление, приземляясь точно на полянку. Поля уже видела просветы меж пихт. Когда она выбежала на открытое место, Петров только-только отстегивал парашют. Поля бросилась к нему и с такой отчаянной силой обняла, что Петров покачнулся.</p><p class="p1">– Я тебя в тот раз еще заметил, – заговорил он быстро и бестолково, – но надо же было, понимаешь, парашют и все…</p><p class="p1">– А наши где?</p><p class="p1">– Наши близко, ты почти дошла. Только ты не туда шла. Они южнее.</p><p class="p1">– Нормально у них?</p><p class="p1">– Нормально.</p><p class="p1">– А ты как?</p><p class="p1">– И я хорошо. Зря ты прыгала, можно было в кабине сесть.</p><p class="p1">– Я им говорила.</p><p class="p1">То, что оба они увидели за эти семь месяцев, не вмещалось ни в какие слова, и они смотрели друг на друга, пытаясь хоть по лицам прочесть, что произошло, изменилось ли главное и как у них все теперь будет. Ясно было, что связаны они по-прежнему и даже крепче, а вот что будет – непонятно. Он очень почернел, посмуглел, и по трудноопределимым признакам она догадалась, что ему пришлось убивать: в глазах было что-то тоскливое. Но зато он нашел ее, с этим уж никто ничего не мог сделать.</p><p class="p1">– Медведи были? – спросил Петров.</p><p class="p1">– Один был, убежал.</p><p class="p1">– Ну, он первый редко нападет. Это шатун должен быть.</p><p class="p1">– Да тут народу много, – сказала Поля и прикусила язык, сомневаясь, что можно было рассказывать про все увиденное. – И кормили.</p><p class="p1">Петров решил, что она бредит, выстрелил сигнальной ракетой, обозначив место приземления, и они развели небольшой костерок. Толя умел это делать замечательно, он все умел. Поля решила про старообрядцев пока не рассказывать, а только про Яремчука второго.</p><p class="p1">– Как ты говоришь? – прервал ее Петров и посмотрел подозрительно.</p><p class="p1">– Толь, ничего не было.</p><p class="p1">– Да не про то я! Просто, понимаешь…</p><p class="p1">– Чего?</p><p class="p1">– Его там ждут, – сказал Петров и захохотал. – Ну ё-моё! Он тут ходит, а его там ждут!</p><p class="p1">И даже когда доктор месяц спустя ей твердо объяснил, что все привиделось и ничего не было, они-то с Толей так же точно знали: все было, и то ли еще будет.</p></span></span>
