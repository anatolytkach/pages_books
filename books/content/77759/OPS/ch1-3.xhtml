<span id="id2"><div class="title1">
<p class="p">Пролог</p>
<p class="p">Красный стакан</p>
</div><p class="p1">– Убьет он тебя, – сказала Маруся, нервно смеясь. Она нервничала весь день, еще в электричке, которая так медленно ползла по жаре, и теперь, в кафе «Север» на улице Горького, ей тоже было неспокойно. А с чего, казалось бы? Она ничего такого не делала. Ужас как надоело быть виноватой. Аркадий умел так молчать, исподлобья на нее взглядывая, так перетаскивать Светлану на свою сторону, так переходить с ней на «мы», – «Что ж, Светлана, не нужны мы ей больше, пойдем мяч гонять», – что как-то она и в самом деле привыкла, будто всегда ему должна. А ведь что такого? Что она делает сейчас неправильно? И ужасно было это чувство, что он наблюдает, хотя до такого он никогда бы не дошел. Сказал же он ей когда-то: я, Маруся, конник, а не шпион, я и разведку-то не любил никогда.</p><p class="p1">– Ну, – ответил Василий, – это еще кто кого убьет.</p><p class="p1">При этом он засопел совершенно по-мальчишечьи. Маруся еще раз подумала, что, конечно, Аркадий бы его сшиб с ног, если бы захотел, а может, просто так посмотрел бы, что и драки никакой не надо. Аркадий казался иногда старше своих тридцати двух, а Василию было двадцать семь. Несмотря на всю его суровость. Маруся все время чувствовала себя старшей, и ей это не нравилось.</p><p class="p1">С Аркадием в последнее время было совсем плохо. Участились припадки, которые почти проходили, когда он писал, но писать-то больше не мог. Все чаще часами сидел за столом, глядя в стену, грыз вставочку, потом решительно бросал ее и шел запускать со Светланой змея на пустырь или принимался вдруг учить ее боксировать. Занятия совсем не для девочки, он и хотел мальчика, но потом смирился – подумаешь, девочка, даже хорошо, мальчиков хороших много, а девочек таких, как моя Маруся, почти нет. И стал растить из Светы мальчишку: восхищался, когда она дралась, пел военные песни – большей частью, кажется, своего сочинения, – таскал в дальние пешие походы по окраинам. Все это не нравилось Марусе.</p><p class="p1">– Но ты себе много чего не думай, – сказала Маруся. – Мы погулять пошли. А так ничего.</p><p class="p1">– У нас знаешь как учат? – сказал летчик, наклоняясь к ней очень доверительно. – Меня товарищ Водопьянов готовит. Личный инструктор мой. Так вот, он когда на Байкале разбился, то понял: неприятности надо преодолевать по мере поступления. Помню, говорит, полз в снегу – и думал: чего там будет, еще поглядим. А пока – по мере поступления. Вот и я так думаю, да?</p><p class="p1">– Умный какой, – сказала Маруся и опять нервно засмеялась. Не надо было падать на Байкале и вообще называться героем Водопьяновым, чтобы понять такую простую вещь.</p><p class="p1">А вот сейчас, подумала Маруся, поступит мне такая неприятность, что сразу после мороженого товарищ герой Потанин скажет мне: поедем со мной, Маруся. У товарища героя наверняка есть квартира или другой товарищ герой, у которого уж точно квартира. И надо будет решать, ехать с ним или нет. Товарищи летчики приучены принимать быстрые решения. Когда товарищ герой еще в больнице лежал с простым сотрясением, он уже на Марусю смотрел глазами победителя. Не позволял себе ничего лишнего, но видно было, что может, если захочет, что так про себя и думает. Теперь было его время, а не Аркадия. Время Аркадия, чего он так и не понял, кончилось, когда было ему шестнадцать лет и он скакал на лихом коне. В двадцать был признан ограниченно годным и начал привыкать к другой профессии. Поначалу все у Аркадия получалось и был он молодое дарование, писал про войну и свои приключения, а дальше уже не получалось. Стал пить, возобновились припадки, мучившие его после контузии, и в этих припадках он себя резал. В одно из таких обострений загремел в Первую градскую, где служила Маруся, и как-то она его пожалела, да и была у нее тогда непростая любовь с женатым доктором, который теперь проживал в городе Ташкенте, потому что скрывал некоторые факты своей дореволюционной биографии. Но тогда доктор был еще на месте, продолжал приставать, и надо было его как-то забыть. Вот Маруся и забыла, а Аркадий был такой добрый, часто веселый, вырезал деревянные игрушки, завлекательно рассказывал, – она и подумала: двадцать два года, чего ждать? Опомнилась, а тут уже и Светлана. И все вошло в колею. «Колея» было слово, которое теперь чаще всего приходило ей в голову, когда она думала про свою жизнь и про то, что двадцать девять – это последний возраст, когда можно из колеи выпрыгнуть.</p><p class="p1">Пожалуй, подумала Маруся, если летчик Потанин сейчас это скажет, ехать ни в коем случае не надо. Подумаешь, победитель… Но он улетит в Хабаровск ставить свой рекорд и, может быть, не вернется. Это ужасное расстояние. Семь тысяч или сколько там, через всякие горы. И ему надо лететь в хорошем настроении. Он никогда не забудет, если я в эти последние дни перед полетом сделаю, как он хочет. И тогда вернется героем и сразу меня заберет. Такие вещи надо решать быстро. Хочу я с ним поехать? А может быть, и хочу.</p><p class="p1">Но летчик Потанин, видимо, думал о другом. Он ничего ей не предложил. Аккуратно доел мороженое, допил лимонад, положил немного сверх счета, тоже аккуратно. И оба они словно не совсем понимали, что теперь делать. В больнице все было просто. Там он много рассказывал про отряд героев, тренировки, перегрузки, про новый самолет РД, про тяжелый гидроплан АНТ, который садится на воду, обладая весом тридцать три тонны, – летающая лодка с огромным бомбовым запасом, рекордсмен, лучший в мире. Там Потанин лечился, ему некуда было деваться, и Маруся слушала его рассказы, понимающе кивая, когда он в секретных местах понижал голос или умолкал вовсе. А теперь они могли пойти куда угодно. Там он просто болтал с медсестрой, а теперь он позвал на свидание замужнюю женщину. И Маруся не знала, что ей говорить, и только улыбалась смятенно.</p><p class="p1">Они пошли вверх по улице Горького, навстречу огромному плакату «Привет участникам съезда советских писателей!». Аркадия на этот съезд не выбрали, хотя все время называли молодым и талантливым. «Кой черт молодой, за тридцать мужику», – говорил он с остервенением. Все он что-то делал не то, шел не туда, а куда – объяснить никто не мог. «Ты все хочешь как лучше, – сказал ему однажды дряхлый ребе Рувим, как называл его Аркадий, хотя Рувим был старше лет на десять, – а ты попробуй как хуже. Немножко постарайся, и пойдет. И всем сразу понравится». Они часто выпивали с Рувимом, и Аркадий после этого слегка веселел, а потом снова замолкал.</p><p class="p1">Москва была красива, широка, пустынна – летним днем кто же без дела гуляет? Кто мог, в отпуск уехал на море, кто сумел, снял дачу под Москвой, как они, и все равно Марусе было непривычно, что она тут гуляет летом. Что-то в этом было не совсем правильное. Потанин молчал, и надо было вроде самой трещать про что-нибудь, но трещать не хотелось. Они шли рядом, он даже не брал ее за руку, хотя в больнице иногда сжимал ее ладонь, якобы увлекаясь, но почти сразу выпускал, потому что руками показывал передвижение самолета.</p><p class="p1">Вдруг он произнес:</p><p class="p1">– А вы правда на фронте познакомились?</p><p class="p1">– Почему на фронте? – спросила Маруся. – А, это он в книжке написал. Ну и так иногда рассказывает. Он это выдумал. Какой фронт, ты что. Мы всего семь лет женаты. А он придумал, что будто вошел их отряд в город, отбивал нас у белых. Что моего отца будто белые увели. А у меня отец умер, когда мне пятнадцать лет было. Никогда его не забирал никто, он был путевой мастер. Мы в Рязани жили. А с Аркадием мы в больнице познакомились. Он у нас недолго лежал, ничего серьезного.</p><p class="p1">Она сама не понимала, почему поспешила это сказать.</p><p class="p1">– Он хорошо пишет, жизненно, – похвалил летчик. – Я даже поверил.</p><p class="p1">– Ну вот видишь. – Маруся обрадовалась за Аркадия, хотя как будто отвыкала уже связывать с ним будущее. – А ему говорят: у вас дети неправильные. Говорят, где вы детей таких берете. Ему читатели письма шлют, вопросы, где живут эти ваши дети, хотим таких друзей, и все вот это. А в «Литературной» написали, что выдуманные дети и выдуманные разговоры. Представляешь, какая обида ему? Тебе небось не напишут, что ты нежизненно летаешь.</p><p class="p1">И снова засмеялась неестественным смехом.</p><p class="p1">– Про нас тоже пишут всякое, – успокоил Потанин. – Иногда такое пишут, что вообще никакого понятия.</p><p class="p1">И после некоторого молчания сказал:</p><p class="p1">– Поехали, наверное, Маруся, в Парк культуры.</p><p class="p1">– А там чего?</p><p class="p1">– Там Зеленый театр.</p><p class="p1">Марусе смешно стало: чего она, взрослая замужняя женщина, мать большой дочери, не видела в Парке культуры? Но не затем же она ехала с летчиком, чтобы съесть мороженое в кафе «Север». И не затем же приезжал летчик к ним на дачу, чтобы позвать ее в Зеленый театр. Что-то надо было придумать. Может, он мог бы свозить ее к себе на аэродром, покатать на самолете? Но, наверное, это был пока секретный самолет, и каждую новую знакомую не привезешь на нем кататься. И она поехала с ним на трамвае «Букашка» на другую сторону Садового кольца, и становилось все жарче, и Маруся вся вспотела, ужасно стыдясь этого.</p><p class="p1">В Зеленом театре, открывшемся весной, был перерыв между представлениями, и они сели на дальнюю скамейку.</p><p class="p1">– Маруся, – сказал вдруг Потанин очень решительно, словно только тут, среди зелени, набрался сил для разговора. – Такое дело. Когда летаешь много, привыкаешь человека сразу видеть. Ну, как такая метка на нем. И он сам про себя знает. Когда Серегин разбился тогда на Байкале, я видел уже, что недолго. И сам он лететь не хотел, но стыдился. Что стариковские глупости и все это. Ну и вот, Маруся. Я про твоего мужа вижу, что недолго ему. Поэтому ты, Маруся, наверное, уходи жить ко мне.</p><p class="p1">Он это выговорил очень просто, как давно решенную вещь, и только морщил лоб, выдавая этим напряжение. Маруся не знала, что сказать. Она ждала, конечно, от него каких-то действий, но таких прямых? Никогда не знаешь, что будут делать полярные летчики. И она молчала, а Потанин принял это за согласие и стал развивать, как умел, свою мысль.</p><p class="p1">– Вот сейчас, – сказал он, – красная конница. Мы все уважаем и все такое. Но ясно же, что в современной войне красная конница будет играть роль вспомогательную. Она будет играть, конечно, но вспомогательную. – Это слово он выделил особо. – Будет решать все, вероятно, артиллерия дальнего боя… преимущественно гаубичная… и у нас, в небе, тоже многое будет решаться. Современная война есть война по преимуществу техническая, говорит товарищ Тухачевский, и в значительной степени танковая. В ходе такой войны кавалерия является чем? Она является пережитком. Это просто уже бойня, и для человека, и для коня. Смешались в кучу конелюди. И вот Аркадий твой такой – как среди современного боя кавалерист, и все понимает, но пересаживаться не может и не хочет. Я поэтому думаю, Маруся, что лучше тебе будет жить со мной.</p><p class="p1">Маруся, в красном платье, в сандалиях на босу ногу, была женщина очень красивая. То есть не то чтобы ее красота бросалась в глаза. Поначалу человек замечал быструю улыбку, словно Маруся что-то про всех понимала, и особую ловкость всех движений – черту, бесценную у медицинского работника. Врач, говорят, должен войти – и больному легче, а медсестра должна так поправить подушку, подоткнуть одеяло, чтобы пациенту особенно удобно стало лежать, а сам он и не догадывался, как сделать. Маруся удивительно была легка на руку, уколы ставила – залюбуешься, просто-таки хотелось уколоться, и видно было, что этот-то укол и спасителен. И красота ее была не яркая, но стоило хотя бы полминуты вглядываться в нее безотрывно, и все становилось ясно. В гармоничных чертах ее лица странно выделялся трагический излом бровей, словно хороший человек ни за что страдает. И нижняя губа была припухлая, такая, как будто бы выдает особое пристрастие к этим делам; в Марусином случае это отчасти была правда, что да, то да. Летчик Потанин именно так сейчас на нее и посмотрел, всю ее словно заново оглядывая, и ему опять подумалось, что такая женщина должна летать на самолете, а не ездить на коне.</p><p class="p1">– Ты за меня не думай, – сказала Маруся довольно холодно. – Ишь чего, такой молодой, а уже как большой за всех решает.</p><p class="p1">– Я не решаю, – сказал Потанин с интонацией неожиданно мягкой, почти просительной. – Я вижу просто. Еще в больнице увидел, но вчера совсем ясно. Не надо тебе там, Маруся. Там скоро плохо будет.</p><p class="p1">– А с тобой, значит, хорошо?</p><p class="p1">Маруся понимала, что летчик Потанин желает ей добра. И человек он был хороший, но, как бы сказать… Ведь вот беда, все эти люди тридцать четвертого года чувствовали гораздо сложней и ярче, нежели, скажем, тридцать лет спустя, но у них совсем не было слов для выражения всех этих ощущений. Как летчик, передвигаясь на колоссальных для тех времен скоростях, немыслимых пятистах километрах в час, видит дальше, так и они очень много всего видели, еще больше чувствовали, но толком не могли выразить. Причины тому были разные: и страх, который их всех давил, и нежелание признаваться себе, что их занесло не туда, и попросту необразованность. Ну какие были университеты у Маруси, что она видела, кроме своей больницы и нескольких мужчин, с которыми сходилась? Но звериным своим умом она понимала, что летчик Потанин – он вроде вот этой пустынной летней Москвы периода реконструкции: все перестраивается, и это должно быть весело, но почему-то совсем не весело и жить в ней неприятно. Все как бы обязаны были радоваться просторным заасфальтированным площадям и тому, как все похорошело, и никто ничего не говорил прямо. Вот и старый Крымский мост будут перевозить вниз по реке, а тут построят новый. И самолет летчика Потанина очень хорош, необыкновенно, но ведь жить в этом самолете нельзя и летать неудобно, дышать трудно. Он ей много про это рассказывал.</p><p class="p1">Летчик Потанин молчал, не решаясь прямо сказать Марусе: с ним-то будет ей хорошо. Летчики, в особенности полярные, были честные ребята.</p><p class="p1">– Вообще, – желая его утешить, сказала Маруся, – Аркадий действительно как с ума сошел. Вчера любимую чашку мою разбил. И не признается.</p><p class="p1">– Чашку? – переспросил Потанин. – Это плохо, что чашку. Это даже примета у нас такая есть, что если кружку разбил или стакан – в рейс не ходят. У нас поэтому на базе стаканы небьющиеся. Я как раз тебе подарить хотел.</p><p class="p1">Он вынул из своей плоской летной сумки красный пластмассовый кругляш, слегка тряхнул его – и из кругляша образовался стакан, прозрачный, с довольно толстыми стенками, имевший столь же надежный вид, что и вся летная экипировка: летные куртки, шлемы, планшеты, все, что Маруся видела.</p><p class="p1">– Мне еще дадут, – сказал Потанин. – Вещь хорошая.</p><p class="p1">– Его дочь очень любит, – сказала Маруся. Как раз на эстраде пионеры читали монтаж про то, как прекрасно им живется. – Я сама не понимаю, как она так? Вся в меня, а любит его. И он как начнет обижаться на что, так хватает ее в обнимку и сидит, глазищи выкатив. И он больше с ней сидит, чем я. Я работаю, а он дома пишет. Когда она не в саду, то все время с ним. Что он из нее сделает – понятия не имею.</p><p class="p1">– Ну а со мной проще, – сказал летчик. – Меня нет все время.</p><p class="p1">– Тоже хорошо, – засмеялась Маруся, но невесело.</p><p class="p1">На треугольной, карточным домиком, эстраде появился немолодой жирный человек и стал рассказывать стихами про фашизм.</p><p class="p1">– Вообще, – сказала Маруся, – я, очень может быть, и подумаю. А вот скажи, товарищ летчик, почему ты меня к себе не пригласил на свой аэродром?</p><p class="p1">– Чего хорошего для тебя на аэродроме, скучно. Работают все.</p><p class="p1">– А тут чего интересного?</p><p class="p1">– Ну как… – сказал Потанин. – Зелень.</p><p class="p1">Зелень в самом деле раскинулась вокруг в прекрасном изобилии, словно ее сюда вытеснили со всей Москвы и ни в чем не ограничивали. Но было видно, что Потанин, человек быстрый, где-то уже не здесь, а по пути в свой Хабаровск, по ледяным безвоздушным пространствам, откуда звезды выглядят совсем страшно. Маруся попыталась вообразить, как ей было бы с ним спать. Аркадий кричал во сне, но все остальное было хорошо и даже замечательно. Правда, в последний год он проявлял мало желания и даже спать стал в майке, словно начал стесняться своего тела. Он действительно немного пополнел. А вот с летчиком Маруся себя не представляла. Она думала, вдруг он начнет вести себя как железная машина, с которой он на своих высотах имел дело. Что-то было в нем такое… Явно хороший, но хороший в том смысле, в каком летающая лодка РД лучше предыдущей, что поднимала меньше тонн. И у него какие-то рычаги, нажимать на них надо еще специально учиться.</p><p class="p1">– Алё-алё, – сказала Маруся, – прекрасная маркиза! Я говорю, что подумаю.</p><p class="p1">– Подумай, конечно, – согласился летчик. – И переезжай. Меня правда часто нет, ты со мной не соскучишься.</p><p class="p1">Он проводил ее до Брянского вокзала, откуда шла электричка до их дачной местности, и на прощание взял за локти, прижал к себе и крепко поцеловал, причем Маруся не возражала. Но то, как старательно он ее поцеловал, словно перевыполнял какой-то норматив, внушило ей странную мысль: она тоже, словно летчик, привыкший к большим скоростям, поняла вдруг, что из Хабаровска-то он еще, может, и вернется, а вот потом непонятно. И как-то это от нее зависело, хотя она не понимала как.</p><p class="p1">От станции Марусю подвез до поселка старик Федосеев, человек угрюмый, но представлявшийся ей в этот мягкий розовый вечер необыкновенно сердечным. Он кого-то отвозил и собирался ехать обратно, ну и чего ж было не взять. Ее все тут любили. Уютно, мягко ступала старая лошадь Сивка, уютно было приближаться к даче, и только одно ее тревожило: красный стакан. Этот плоский кругляш, при встряхивании мгновенно превращавшийся в толстостенный, надежный, прозрачно-алый сосуд, жег ей карман платья. Платье тоже было красным, но иначе красным. Стакан не надо было брать. Маруся словно взяла душу летчика Потанина и за нее отвечала. Но пока она ехала с Федосеевым, ей стало казаться совершенно невозможным, что она уйдет от Аркадия, куда-то увезет Светлану, будет ждать летчика из его Заполярья. Она окончательно вернулась в колею, и дорога, по которой везла их Сивка, была знакомая и родная, хотя жили они тут всего две недели. Маруся скучала по Аркадию, будто рассталась с ним не утром, а неделю назад. Ей хотелось кормить ужином Светлану. А чтобы все это получилось и дальше не надо было ничего выбирать или менять, требовалось немедленно принести жертву, отдать что-то, и Маруся достала из кармана красный кругляш.</p><p class="p1">– Федосеев, – сказала она, – смотри, какая техника! Как ты это говоришь? Наука все превзошла!</p><p class="p1">Она тряхнула плоскую красную вещь, и получился стакан.</p><p class="p1">– Ничего, – сказал Федосеев без выражения. Он бормотал себе под нос про то, что строят новую дорогу к поселку, а где строят? Не там строят! Дорогу надо прокладывать там, где раньше лежала колея, где люди протоптали, иначе по ней езды не будет.</p><p class="p1">– Ты погляди, – продолжала Маруся, – вот так ее в карман положить можно, а так раз – и водку пить!</p><p class="p1">– Смотри ты, – равнодушно заметил Федосеев.</p><p class="p1">– Ты бери, бери, мне еще дадут, – настойчиво сказала Маруся. – Бери, попьешь водки когда-нибудь, друзьям своим покажешь.</p><p class="p1">И старик Федосеев, кивнув, равнодушно опустил редкую дорогую вещь в необъятный карман, где кроме махорочной трухи наверняка лежало много еще таких же чудесных вещей, содержащих чужие души, и каждая душа была в этом кармане в совершенной безопасности. Может быть, в этом и заключается тайна долгой жизни летчика Потанина, который не погиб даже тогда, когда все его товарищи и большая часть инструкторов погибли еще до войны, все из-за разных случайностей, в разных полетах, а он прошел войну и умер в безвестности, когда у страны уже были совсем другие герои. Аркадий сам ушел от Маруси спустя два года к редакторше своей новой книжки, а Маруся вышла замуж за врача и умерла в эвакуации от туберкулеза. Светланка же выросла большая и никогда ничего про красный стакан не узнала.</p><p class="p1">Когда Маруся пришла домой, Аркадия со Светланой еще не было. Ключ висел на гвозде у двери. Маруся встревожилась. Черт его знает, куда он, больной, потащил ребенка. Ей невыносимо было сидеть в пустом доме, который медленно мерк и остывал после жаркого дня, и не хотелось палить керосин. Она влезла по приставной лестнице на крышу, где лежала давеча сколоченная Аркадием вертушка. Сколотить сколотил, а прибить не успел, она их со Светланой согнала с крыши. Молоток и два гвоздя по-прежнему лежали тут же. Надо было что-то сделать, чтобы они скорей вернулись, и Маруся, сама себя ругая, стала приколачивать вертушку. И ровно в момент, когда вертушка затрещала под ветром, на повороте дороги показались уже едва различимые в сумерках Аркадий со Светланой.</p><p class="p1">Светлана первой увидела мать на крыше и побежала к ней с писком. Маруся толком не разглядела, что у нее было в руках, и только потом обнаружила, что Светлана тащит явно блохастого котенка, подобранного бог знает где.</p><p class="p1">– Мы тебя простили! – пищала она. У них всегда все было продумано. Маруся не успела начать ругать их за котенка, а они уже простили ее, и теперь она опять выходила одна против них двоих, и притом виноватая.</p><p class="p1">– Признавайтесь, где вы были, пыльные люди, – сказала Маруся устало.</p><p class="p1">– Мы тебе принесли средство, – сказал Аркадий. – Важное средство. Оно сделает так, что мыши не будут больше бить посуду. Ведь это мыши, да?</p><p class="p1">– И склеить можно! – заорала Светлана, действительно убежденная, что склеить можно все.</p><p class="p1">Аркадий подошел к Марусе ближе и стал долго смотреть таким особенным писательским взглядом, какого она терпеть не могла. Взгляд этот как бы говорил ей, что за этот день, проведенный врозь, они что-то важное поняли, и все у них теперь пойдет замечательно. Для рассказа, который он собирался написать, все, может быть, так и было, но не в жизни. Но она не стала ему ничего объяснять, улыбнулась в ответ и стала стелить постель.</p><p class="p1">– Ну вот, – сказал Аркадий, беря на руки Светланку. – И жизнь, товарищи, была совсем хорошая.</p><p class="p1">Но понимал: не совсем, далеко не совсем.</p><p class="p1">Впрочем, рассказ он уже придумал.</p></span>
