<p class="p">5</p>
</div><p class="p1">«Дорогой Толя, – писала Поля, – я знаю, что ты жив, и не потому, что так сказали, а потому, что просто знаю. Докладываю тебе, что завершила подготовку к беспосадочному перелету на Комсомольск. Докладываю тебе, что у нас весна, довольно дружная, небо синее, Жанна выучила стих, жизнь моя, как невыносимо». Петров читал это письмо так: почитает три строчки, побегает по комнате, выделенной ему в старых, еще королевских казармах времен Альфонсо несчастливого Тринадцатого, потом опять почитает. Вручил ему эту страничку, исписанную с обеих сторон аккуратным штурманским почерком, журналист из «Красной звезды». Передал Вахмистров вместе с фляжкой коньяка и коробкой шоколада. Дойдя до слов «Стала я сухая и желтая, глаза бы мои на меня не глядели, стыдно показаться трудящимся перед стартом», Петров по своему обыкновению запрыгал на месте, не от радости, а от силы чувств, чтобы хоть куда-нибудь деть эту силу. Если бы ему этого штурмана сейчас, он расколотил бы всю авиацию, свою и чужую, чисто для удовольствия. Вахмистров, значит, теперь тоже знал. Да наверняка уже все там догадывались.</p><p class="p1">Он хотел написать ответ, но журналист уже уехал в войска, куда-то под Эскориал, да и надежен ли он, и кто еще будет там это читать? У Петрова не было уверенности, что вся их переписка попадает только к адресатам. Он и Тане писал сдержанно, а от нее вообще было за это время всего одно письмо с вырезкой из ленинградской газеты о том, как хороша она в роли Нины в «Маскараде». Ну чего, у них свой маскарад, у нас свой. Попутно Таня сообщала, что беременность ее не портит, но она теряет в пластике. Теряет в пластике, подумал Петров. Да, примерно как бомбер по сравнению с нами, но ничего – отбомбится и приобретет в пластике. Ребенка этого он не хотел, но понимал, что ребенок не виноват. Хорошо бы мальчик, тогда мы воспитаем летчика, научим его либо никогда не влюбляться, либо жениться только по любви, лучше бы на летчице. Хорошо бы женить его на Жанне, пять лет – не разница.</p><p class="p1">Поле он хотел написать, чтобы она посмеялась, про мальчика Карлоса. В первые дни этот мальчик к ним прибился, они еще не выехали на аэродром, куковали в Мурсии, машины должны были прибыть через неделю. Через переводчика расспросили пацана, что у него за семья: отец воюет, у матери, кроме него, еще двое ртов, совсем клопы. Попросили его сбегать купить зажигалки, он пропал на час – думали, сбежал с деньгами; нет, принес со словами, что купил самые лучшие. Тогда Минеев сказал: «Бойцы, пойдем ему купим хоть рубашечку пристойную, а то дыра на дыре». У Минеева своих двое, уже в школу ходят, погодки. Пошли в магазин, присмотрели пацану рубашку, курточку, беретик, он все это прижал к груди и смотрел вот такими глазами: что я скажу дома, откуда все это? Скажи, что тебе подарили авиадоро руссо. Карлос этот убежал, а через полчаса в казармы явилась, сверкая глазами, его мать, совершенно некрасивая, но очень сердитая испанка: зачем вы дарите сыну, у нас все есть, у нас не принято! И протягивала покупки, завернутые в газету. Но Петров сказал: «Синьора (переводи, переводи ей!), у русских летчиков есть такой обычай – перед началом боевых вылетов купить что-нибудь ребенку, непременно мальчику, это наше приношение местному воздуху, чтобы лучше держал». Все горячо подхватили: да, русский летчик, приехав в новый город, немедленно покупает ребенку рубашку там, штаны, чтобы небо держало. Испанка хмурилась, но вещи взяла. Когда вернусь, писал Петров Поле мысленно, мы пойдем поймаем ребенка, что-нибудь купим, чтобы уже не разлучаться больше, поклянемся на этих штанах, что будем вместе. И когда ты меня бросишь ради скучного гражданского человека, на ребенке прямо при всех треснут штаны.</p><p class="p1">Он ничего не написал ей, конечно, но был уверен, что она все поняла.</p><p class="p1">Петров увлекся было войной, ему понравилось, на его счету было уже девятнадцать самолетов, уже один пленный летчик давал интервью «Правде» про то, как во время ночной бомбежки его внезапно снизу подстрелил республиканский пилот, никогда такого не было, он просто свидетельствует свое уважение этому асу. «Правда» не писала про то, что летчик этот, немец, действительно выразил желание побеседовать с Петровым. И уж конечно, там не было подробностей беседы: немец, как выяснилось, очень прилично говорил по-русски. Ему было под сорок. «Я учился в Липецке, да. Прекрасный город. Снимал квартиру с семьей на улице Розы Люксембург, да. Красивая улица, спуск прямо к реке». Решительно все в этой стране говорили по-русски, обучались в России или участвовали в Гражданской войне, и Петров не удивился бы, если б председатель республиканского правительства Негрин, вручая ему золотые часы после пятого сбитого франкиста, заговорил с ним по-русски, с волжским оканьем; но тот всего лишь признался, что в науке считает себя более учеником Павлова, нежели Фрейда. Негрин был ученый по всем этим делам, нервные клетки и все такое. «Но у меня русская жена», – добавил он, словно оправдываясь, и сказал по-русски: «Тюфяк»; «Тюфяк – это я».</p><p class="p1">– Вы классный летчик, – сказал немец, пожимая руку Петрову; Петров только потом сообразил, что подавать руку фашисту не надо бы, но ведь наш, липецкий! – Мы сейчас воюем, но это короткая война. Нам предстоит еще сражаться рядом против Англии, против Америки, русские нам видятся как союзники. Вы скоро увидите. Летчик вообще воюет с одной только вещью, он воюет с тягостью, с тяготением. Когда нам прикажут, мы можем стрелять друг в друга, но <em>grundsätzlich, im Prinzip</em> все летчики братья, элита войны, и мы летаем почти уже в раю. Мы прилетаем потом прямо в Вальхаллу. Вы меня запомните, я Вальтер Шельхорн. Меня выдадут назад, я буду еще летать много. Вы отличный летчик, и мы вместе будем летать довольно скоро, а на испанцев не обращайте внимания: это нация пьяниц, ленивая нация, воевать они не умели никогда. (Петров поразился тому, что почти то же самое слышал от товарища Эрнесто; он хотел было спросить, не знает ли немец Яремчука второго, а то, как выдадут, пусть передаст привет.)</p><p class="p1">Немец показался неприятно высокомерным, непонятно было, кто у кого в плену. Он как будто знал что-то, чего не могли понять испанцы, но мог бы понять Петров; он ему словно подмигивал, а Петров не хотел с ним перемигиваться и тем более запоминать его фамилию. Было ощущение, что он обещал замолвить слово о Петрове перед каким-то общим начальством, о котором Петров вдобавок не знал. И немца в самом деле выдали, когда дождались повода: Жека Грошев неудачно спарашютировал на территории франкистов, сломал ногу, его в бессознательном состоянии фотографировали с белым платком, якобы сдавался, потом лечили, потом держали в тюрьме, имитировали расстрел и в конце концов выменяли, после чего выслали домой; немцев, конечно, держали тут комфортней, а зря.</p><p class="p1">Вообще, кажется, до испанцев никому не было дела, и сами они будто бы собирались уже замириться, а нужны были всем, только чтобы потренироваться перед чем-то главным, контуры чего Петрову рисовались смутно. Но отрабатывать так отрабатывать: Петрову представился шанс опробовать нечто небывалое. Сбили «фиат», летчик уцелел и со странной словоохотливостью рассказал о таинственном аэродроме. «Гаррапинильос!» – сказал он шепотом и со значением. «Гаррапинильос?» – переспросил Кушкин. Что такое, мы его знаем, в прошлом году его бомбили. О, сказал итальянец, так вы ничего не знаете. Мое дело сторона, мне вообще не очень интересны все эти испанские дела. Но там немецкая база, на которой будет новый самолет, по сравнению с ним все нынешние – пфф. Туда немцы дали никак не меньше сотни машин. Война окончена.</p><p class="p1">Это мы будем смотреть, сказал Петров и связался с Птухиным. Птухин командовал всей советской авиацией в Испании, но парень был свой и охотно вылетал в бой, имел к этому делу аппетит особого рода. Он был с виду совершенный добряк, флегматичный, белобрысый, но в бою с ним что-то такое делалось; он все мечтал посмотреть корриду и вообще оказался кровожаден. С ним лучше было не заедаться. Петров доложил, Птухин немедленно прибыл и поговорил с итальянцем, причем сначала всячески его к себе располагал и угощал шоколадом, а потом подобрался и заговорил так, что итальянец совершенно деморализовался и стал перепуганно лопотать. Тактика допроса, предупредил Птухин: расслабляем, потом берем железной рукой за яйца, – и улыбнулся плоским ртом. Херовые дела, сказал он Петрову, надо бомбить, а бомбить нечем и мало толку: сделаем им пять воронок, прицельно не разобьем, и вдобавок бомберов раз-два и обчелся. Они всегда напарываются на зенитный огонь под Сарагосой, потерь мы больше позволить не можем. В этот момент Петрова осенило. Он почувствовал в хребте дрожь счастья. Вася, сказал он Птухину, товарищ командир, это же подарунок! Мы сделаем их без бомберов, зажигательными пулями. Надо будет прикрыть сверху, а мы пойдем бреющим. Они не ждут, зуб даю. На этой высоте мы нагрянем как прямо ниоткуда. Прикинули – выходило и так и сяк, вполне вероятно, только лететь надо было не выше ста, потом горкой уйти на двести – и оттуда палить. Объективно говоря, задача не для ястреба, как называли они свои И-15, которых испанцы прозвали курносыми; но с другой стороны, почему нет? Зенитные пулеметы там, по всей видимости, есть, но при наших скоростях, плюс фактор внезапности… Фактор внезапности, повторил Петров. Это звучало утешительно. А бомберов мы пустим под Сарагосу, там есть малый аэродром, будем считать, что отвлекающий маневр.</p><p class="p1">Нормально, сказал Петров, а когда? Времени нет, давай вечером, неожиданно предложил Птухин. Петров не был готов к такому темпу, но, с другой стороны, – что неясного? Он быстро все рассказал своим, сориентировал – Гаррапинильос был в трехстах километрах от базы, сразу за изгибом Эбро. Только расселись по машинам, хлынул ливень; отложили до пяти утра. В пять тучи разогнало, серпик месяца смотрел направо – Петров не помнил, хорошая ли это примета, но то ли от недосыпа, то ли от переноса операции, получившей идиотское кодовое имя «Ход конем», на душе у него было нехорошо. Он понимал, что так всегда бывает перед вылетом, а на вылете все пропадает, но не пропало – пригасло только на время разгрома. Точно звал его кто-то, и очень жалким голосом.</p><p class="p1">Они отстрелялись превосходно. Немцы обнаглели до того, что машины стояли без всякой маскировки. Так могут вести себя победители, которые вообще уже ничего не ждут, никакого сопротивления, они прилетели сюда, сверхчеловеки, показать класс испанцам, умеющим только пить и приплясывать, мы как бы не в счет. Очень хорошо. Два зенитных пулемета ударили, Еремин заткнул один, второй не причинил им вреда; Петров с первого залпа зажег «фиат», потом отстрелялся по мессеру – «фиаты» стояли по периметру, мессеры в центре. Загорелось так, что любо-дорого смотреть. Тут же стояли пять снаряженных бомберов – Петров и по ним ударил, сдетонировало, он почувствовал волну, сделал еще заход, еще – получилось увлекательно; было свое удовольствие в том, чтобы расстреливать неподвижные цели. В воздушном бою Петров был уязвимее, а тут по земле пластались замечательные, судя по всему, машины, которые он на своем латаном курносом ястребе зажигал только так, и никто ничего не мог сделать. Он даже начал понимать Птухина, любившего охоту. Надо было, однако, спешить, но Петров не мог отказать себе в удовольствии прогрохотать еще и еще раз, всего семь. Креозотный, как в полдень над шпалами, запах большого пожара прекрасно чувствовался в воздухе, Петров триумфально увел своих и полетел, как и было договорено, разными маршрутами – уцелевшие кинутся преследовать, так чтоб глаза разбежались. Он вернулся, но как только затихла злоба и ушел азарт, навалилась та же утренняя тоска. Причин ее он не понимал. Дело было не в атаке – атака прошла на большой палец, и никакой солидарности с летчиками, о которой говорил немец, Петров не испытывал. А вот дома что-то было не так; он даже подумал – не с Татьяной ли что? Но Татьяне еще не пора было рожать, оставалось два месяца.</p><p class="p1">Огольцов, между прочим, был недоволен. Миронов, секретарь парторганизации, который шел наверху в охранении, слишком захлебывался, рассказывая про семь петровских заходов; это многовато, заметил Огольцов, он рисковал не только собой, но и людьми. Увлекаешься в бою, товарищ комбриг, виновато пояснил Миронов. Это все не очень хорошо, сказал Огольцов, это сказываются перегрузки, пора отдохнуть товарищу Петрову. Напротив, Птухин его обнял и сказал, что пошлет представление на Героя. Пять дней спустя он прилетел в расположение, привез наши газеты, где уже сообщали о триумфальном налете республиканских истребителей (по дипломатическим соображениям на этот раз умалчивалось, что налетали именно советские, вероятно, немец Шельхорн с подло запомнившейся фамилией действительно что-то знал или чувствовал). С особенным смаком корреспондент добавлял, что за негодную охрану аэропорта и неготовность к республиканской атаке двадцать человек из аэродромного обслуживания были расстреляны перед строем. Их-то за что, подумал Петров, хуже наших, обязательно надо наградить виновных и расстрелять невиноватых… Попутно сообщалось, что экипаж Васильевой, Грибовой и штурмана Степановой вылетел в Комсомольск-на-Амуре и совершил аварийную посадку, причем Васильева и Грибова живы и в порядке, а Степанова выбросилась с парашютом над тайгой, идут поиски.</p><p class="p1">– Товарищ генерал, – внезапно севшим голосом сказал Петров. – Вася. Я никогда ничего не просил, слышь…</p><p class="p1">Птухин был человек сообразительный и догадался, что речь не об Испании.</p><p class="p1">– Рожает? – спросил он с пониманием.</p><p class="p1">– Нет, не то, – сказал Петров. – Вася, я ее найду. Отпусти меня.</p><p class="p1">И тут неожиданным образом пригодилось то, что Петрову пора, пора было отдохнуть. Он уже не совсем владел собой, а что вы хотите, полгода фактически на фронте. Война затягивалась, и видно было, что, даже заменив все республиканское командование, мы не заменим шатких и пылких испанских бойцов, которые давно настроились на перемирие. Гражданская война, когда свои стреляют в своих, – удовольствие не для всякой нации, а только для политически зрелой. Но лететь на своем самолете наш товарищ Теодор, естественно, не может: Франция нас не поймет. Придется опять доставить его пароходом. Тут уж Птухин взъярился и сказал, что товарищ Теодор заслужил у испанской республики право вылететь на гражданском самолете и попасть в Москву так срочно, как это ему нужно. Он нажал на свои педали, подключился известинский корпункт, и только тут Петрову представился шанс понять, какая большая и тайная механика стояла за этой войной. Утром он ел мороженое в Мадриде, обедал в Париже, куда его доставили военным бортом, а из Парижа наутро перекинули в Москву в компании некоего военного корреспондента, печального желтого еврея. Петров почему-то всю дорогу пытался объяснить ему, что он не дезертирует, что он найдет штурмана Степанову и вернется, но корреспондент слушал молча и смотрел грустно.</p><p class="p1">– Я думаю, вы не вернетесь, – сказал он. – Там все заканчивается.</p><p class="p1">– Да как это! – не понял Петров. – Только начинается все по-настоящему.</p><p class="p1">– Начинается, да не там, – непонятно сказал еврей. – Там делать больше нечего.</p><p class="p1">Не заезжая домой, Петров отправился в институт. Он успел прикинуть: до Комсомольска лучше всего просить «антоновку», а там брать в аэроклубе что дадут и на самой малой высоте осматривать тайгу. Начиналась осень, не больно-то спрячешься. Не спрячешься, повторял он.</p></span></span>
