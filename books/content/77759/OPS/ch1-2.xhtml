<span id="id1"><div class="title1">
<p class="p">От автора</p>
</div><p class="p1">«Истребитель» – третья книга «И-трилогии», начатой романами «Икс» (2012) и «Июнь» (2017). Как и в «О-трилогии» («Оправдание», «Орфография», «Остромов»), все три части автономны, но лучше читать их в том порядке, в каком они написаны.</p><p class="p1">Желание написать «Истребитель» впервые появилось у меня при чтении дневников журналиста-правдиста Лазаря Бронтмана (1905–1953), заботливо собранных, оцифрованных и прокомментированных его сыном Ростиславом (1930–2014). Бронтман систематически вел дневники с 1932 года. Он был одним из лучших московских репортеров и побывал решительно везде – на Северном полюсе (высадился там с Трояновским и Виленским – ни один журналист до них там не появлялся), на льдине с папанинцами, на поисках земли Санникова (в экспедиции Ушакова), в пустыне Каракумы (в автопробеге), поднимался на самолетах, устанавливавших рекорды, и дружил с лучшими летчиками, которых многократно интервьюировал. Бронтман жил в напряженнейшем темпе, а поскольку я проработал в газете сорок лет и вряд ли добровольно расстанусь с этим занятием, мне ужасно понравились его азарт и счастливое чувство причастности к самому главному. Один неудавшийся журналист писал о «лихорадочном бесплодии» редакционной жизни. По-моему, лихорадочное бесплодие – это как раз все остальное. Впрочем, многое зависит от эпохи – но, смею думать, и от наблюдателя. Бронтман был наблюдателем и хроникером Божьей милостью.</p><p class="p1">Он часто бывал на кремлевских приемах, на торжественных встречах героев, на пленумах и съездах; он беседовал со Сталиным, который высоко ценил его статьи, с Микояном, Ворошиловым, Калининым, Кагановичем, Вышинским. О встречах с вождями ему рассказывал Чкалов (особенно меня восхитила история с лимонами на отдыхе в Сочи – я кое-что присочинил, но рассказ изложен в дневниках, такого не выдумаешь!). Вообще чтение этих записей, которые любой желающий найдет, например, по адресу http://militera.lib.ru/db/brontman_lk/index.html, – увлекательнейшее занятие, и я от души рекомендую их всем, кто, подобно мне, пытается разобраться в причинах триумфа и краха советского проекта. Их военная часть в 2007 году издана книгой в «Центрполиграфе» под редакцией доктора исторических наук В. А. Невежина. Эта книга давно стала источником бесценных деталей для историков.</p><p class="p1">Бронтман – одна из трагических и символичных фигур эпохи: в 1948 году он, член партии с 1941 года, редактор отдела информации «Правды», а впоследствии ее военного отдела, все пять лет войны выезжавший на фронт, четырежды орденоносец, попал под кампанию «борьбы с космополитами». Вся вина Бронтмана состояла в фамилии – и дружбе с несколькими учеными и врачами, оказавшимися под катком «партийной критики». Сначала он вынужден был взять псевдоним Лев Огнев, потом был изгнан из газеты и перешел редактором в «Знамя», но печататься ему уже не давали. Можно себе представить, как переносил вынужденное бездействие этот человек, прежде писавший в номер едва ли не ежедневно, живший стремительно и рисковавший собой в пустыне, во льдах и на фронте. Бронтмана свалил инсульт, от которого он уже не оправился. К чести его друзей, летчиков, полярников, авиаконструкторов, – никто не отвернулся от него, все помогали семье, но даже начавшаяся эпоха «реабилитанса» не смогла вернуть ему силы. Он пережил Сталина на 9 месяцев.</p><p class="p1">Дневники и книги Бронтмана (в особенности брошюра о Владимире Коккинаки и о рекордном перелете «Родины») внушили мне странное чувство: именно при знакомстве с ними я впервые в жизни ощутил постыдную, может быть, зависть к героям этого времени, про которое нам вроде бы столь многое известно – уж как-нибудь достаточно для того, чтобы не плакать ночью о времени большевиков, а если и плакать, то не от зависти. Попыткой разобраться с этим нелогичным чувством стала книга, которую вы держите в руках.</p><p class="p1">Как и одна из героинь этой книги, автор пытается сделать производственному роману метафизическую прививку, то есть напомнить сестрам Лазаря Марфе и Марии, что они, в конце концов, дети одной матери. Поэтому, при всем авторском старании с максимальной достоверностью описать авиационную технику, это не справочник по истории советской авиации. В хронологии тоже встречаются сдвиги (не настолько, однако, существенные, чтобы нарушить логику истории). Так, дрейф «Седова» закончился в феврале 1940 года, а не в августе 1939-го; прыжок с парашютом и гибель Любы Лондон (Берлин) описывается в дневнике Бронтмана в 1936 году; Гриневицкий далеко не тождественен Леваневскому, Донников – Бронникову, да и Волчак сильно отличается от прототипа. Тем не менее приключения, кажущиеся самыми невероятными, имеют строго документированный источник. Предполагаемый маньяк, патологоанатом Афанасьев-Дунаев (в романе Артемьев), действительно упоминался в разговоре Бронтмана с Вышинским, был выпущен и работал в качестве военврача. Карл Сциллард в Омске действительно был забыт в бане в сорок втором и увидел в окне жену и дочь. Большая часть реплик Сталина документальна. Я опирался и на стенограммы, и, конечно, на дневник. Что касается Льва Бровмана, он, в отличие от Лазаря Бронтмана, работает в «Известиях», многие его приключения – чистый вымысел, и автор из искренней любви к протагонисту позволил ему дожить до полета Гагарина. Мне кажется, он заслужил и это, и право произнести последнюю фразу всей трилогии: «ВСЕ-ТАКИ Я БЫЛ ОЧЕНЬ ВЫСОКО».</p><p class="empty-line"/><p class="p1">Этот роман – мое последнее обращение к советской истории. По крайней мере я так думаю, потому что в нем, кажется, объяснил себе ее феномен. Правильных, то есть универсальных, объяснений не бывает, но для меня эта тема закрыта. Из руин вавилонского зиккурата Александр Македонский велел построить цирк. А на свете есть много еще удивительных пространств, государств и даже людей.</p><p class="p1"><em>Дмитрий Быков</em></p><p class="p1"><em>Москва, ноябрь 2020</em></p><div class="poem">
<div class="stanza">
<p class="v"><em>Расскажи мне, дружок, отчего вокруг засада?</em></p>
<p class="v"><em>Отчего столько лет нашей жизни нет как нет?</em></p>
<p class="v"><em>От ромашек-цветов пахнет ладаном из ада,</em></p>
<p class="v"><em>И апостол Андрей носит «Люгер» пистолет?</em></p>
</div>
<div class="stanza">
<p class="v"><em>От того, что пока снизу ходит мирный житель,</em></p>
<p class="v"><em>В голове все вверх дном, а на сердце маета,</em></p>
<p class="v"><em>Наверху в облаках реет черный истребитель</em></p>
<p class="v"><em>Весь в парче-жемчугах с головы и до хвоста.</em></p>
</div>
<div class="stanza">
<p class="v"><em>Кто в нем летчик-пилот, кто в нем давит на педали?</em></p>
<p class="v"><em>Кто вертит ему руль, кто дымит его трубой?</em></p>
<p class="v"><em>На пилотах чадра, ты узнаешь их едва ли,</em></p>
<p class="v"><em>Но если честно сказать – те пилоты мы с тобой.</em></p>
</div>
<p class="text-author">Борис Гребенщиков, 1996</p>
</div><div class="cite">
<p class="p1"><em>Однажды мне пришлось рецензировать работу одного исследователя насчет маленького писателя XIX века, которого вряд ли кто-нибудь здесь знает, – я имею в виду Воскресенского. У него есть роман «Женщина».</em></p>
<p class="p1"><em>Он начинается вот с чего. Однажды на балу он встречает прекрасную женщину, усеянную бриллиантами.</em></p>
<p class="p1"><em>Эта женщина представляется ему каким-то чудом (как декорации Гонзаго). Он не может приблизиться к ней, потому что ее окружает невероятный круг обаяния, отвержения, люди, стоящие около нее, как бы отгораживают ее, а она вся радирует.</em></p>
<p class="p1"><em>Проходит некоторое время. Однажды он возвращается ночью с попойки. Устал, недоволен, мрачен. По улице идут прачки. Они везут бочку воды и белье. А впереди он видит женщину, несколько похожую на ту, которую видел раньше на балу, в том окружении. Его поражает сходство. Он идет за ней и вдруг по родинке узнает, что это та же самая женщина, но в лохмотьях, с тазом.</em></p>
<p class="p1"><em>Это чудо превращения просто невозможно, но оно существует.</em></p>
<p class="p1"><em>Проходит некоторое время, однако он не может разрешить для себя эту загадку. И вот однажды он приходит к испанскому посланнику и видит, что она сидит в ложе с каким-то аргентинским послом.</em></p>
<p class="p1"><em>Тут она уже другая: она не русская красавица, она – испанка, но это одна и та же женщина.</em></p>
<p class="p1"><em>И вот дальше проходит несколько превращений.</em></p>
<p class="p1"><em>В чем дело? Оказывается, эта женщина – крепостная, ее то любят, то бросают, то опять ее поднимают. Она – человек играющей судьбы. Она появляется то в одном, то в другом качестве.</em></p>
<p class="p1"><em>Вот эта фантасмагория николаевской эпохи, это окружение женщины, которая становится виной каких-то фантасмагорических, но вполне исторических судеб… Она изображена в этой глубокой историчности, в фантасмагории той эпохи.</em></p>
<p class="text-author">Юрий Домбровский, 1975</p>
</div><div class="cite">
<p class="p1">– <em>…Вы хотите сказать – вещи не из внутреннего опыта.</em></p>
<p class="p1">– <em>Есть разные внутренние опыты.</em></p>
<p class="text-author">Лидия Гинзбург, 1933</p>
