<p class="p">4</p>
</div><p class="p1">Вскоре после буквальным образом погоревшего в Кречевицах Гриневицкого Имантс на одном любопытном приеме встретил Дубакова и сказал: так и так, всякое бывает, но вся советская авиация поставлена в неудобную позицию. Маслобак-то мы перенесем, но вот кто полетит трансарктическим маршрутом? Гриневицкий выбирал самолет в Штатах, но надо было как-то реабилитировать АНТ, приличную, уже известную в мире машину, а что у Гриневицкого выйдет – еще бог ведает; Дубаков, имевший на такие вещи специальное чутье, понял, что на Грина стали смотреть без любви. Победителю можно все, а побежденный, хоть и самый эффектный, ходит по тонкому льду. И на невысказанный вопрос Имантса Дубаков ляпнул: я считаю, что фактор удачливости, так называемый <em>L</em>-фактор, как называет его наш заочный учитель Джорданов, никто не сбрасывал со счетов, и по этому признаку номером один является Волчак. Я тоже так думаю, солидно кивнул Имантс. Поговорите с товарищем, ведь вы товарищи?</p><p class="p1">Конечно, тут Дубаков хватил, поскольку Волчак пилотировал в основном истребители и к дальним полетам только примеривался; но ясно было, что в испытательном деле он превзошел всех и пора ему, как говорится, расти вширь. Экспансия есть что? Сущность человеческой природы, как учил автор книги «Пушечные короли», известной Дубаку в пересказе Канделаки. И Дубаков июньским вечером, месяца через полтора после парада, заглянул к Волчаку, только что проводившему гостей; наступала мягкая, очень светлая ночь, полная, однако, тихой внутренней тревоги. Волчак любил это состояние и настроен был благодушно.</p><p class="p1">– Пора лететь через полюс, – сказал Дубаков коротко.</p><p class="p1">– А! – Волчак поднял толстый палец, этим пальцем он любил внезапно ткнуть собеседника под дых или под ложечку, называя это почему-то китайским боксом. – Полетал с красавцем своим? Со шляпником?</p><p class="p1">– Мы люди подневольные, – пожал плечами Дубаков. – Нам сказали, мы полетели.</p><p class="p1">– Ну и долетались. Он пристойную машину оклеветал.</p><p class="p1">– Он оклеветал, а мы того… Смоем.</p><p class="p1">– Ну, это без меня, – стал ломаться Волчак. Ему надо было, чтоб поуговаривали. – Я истребитель, на дальних бомберах летал мало. Мы же эта, фокусники. Мы только умеем пыль в глаза пускать, на параде фигурять.</p><p class="p1">– Ну вот чего ты заводишься, Вася? Вот чего ты передо мной-то фигуряешь? Я, между прочим, с Имантсом говорил. – Упоминание о начальстве действовало на Волчака магически.</p><p class="p1">– Где?</p><p class="p1">– На приеме в Спасо-хаусе.</p><p class="p1">– Чегой-та ты там забыл? – буркнул Волчак неодобрительно.</p><p class="p1">– Ну, если мы хотим к американцам лететь, надо с ними разговаривать, – неопределенно ответил Дубаков. На самом деле в американском посольстве было интересно, играл настоящий джаз – между прочим, из московских любителей, – и атмосфера была, как в салуне из рассказов Брета Гарта. Туда раз в месяц созывали самых разных людей, и это был теперь стиль. Обрастали немножко жирком, в застольях решались многие вопросы, появились люди, сводившие у себя профессионалов из разных сфер; эпоха профессионалов нуждалась в таких людях. Посол Буллит называл себя миксером (имелся в кухне бывшего особняка Второва такой громоздкий прибор для коктейлей и теста). Были американцы шейкерами, каламбурил посол, теперь время миксеров. Сам Буллит тоже был профессионалом, но разведку считал за хобби. Ему принадлежали слова об океанической ране, края которой он сшивает.</p><p class="p1">– Имантс к ним ходит? – недоверчиво переспросил Волчак.</p><p class="p1">– Имантс как раз там и говорит, что надо делать перелеты регулярными. Американцы, кстати, тоже не возражают. И если они первые к нам прилетят, будет неправильно.</p><p class="p1">– Не прилетят, – сказал Волчак уверенно. – Еще чего.</p><p class="p1">Но заметно посерьезнел и благодушие сбросил.</p><p class="p1">– У них в принципе, – сказал Волчак после паузы, – такой машины нет. Насколько я понимаю. Я, конечно, в этой именно области не спец, но Грин твой ничего не привезет оттуда. А на АНТе что ж. Я слетал бы, но не командиром.</p><p class="p1">Тут Дубаков спорить не стал – понимал уже, что Волчак усвоил себе главную манеру истинно руководящего кадра. Его даже не должны были умолять. Ему должны были создать ситуацию, в которой бы он неохотно, от некуда деться – ну что вы это, ну зачем, ну всегда у вас вот так – взял бразды.</p><p class="p1">Постепенно он зажегся. Сначала выяснилось, что другой летчик попросту не поднимет груженый АНТ, – тут надо было исходить из трехсуточного запаса топлива, вот и считайте. Потом – что в свободное время, не слишком изобильное, Волчак изучал радионавигацию и при случае заменил бы штурмана. Наконец, Дубаков увидел у Волчака английский разговорник и понял, что его идея теперь в чужих руках, но это и к лучшему: идею надо передоверить тарану, а самому обеспечить идеальное функционирование машины плюс безупречный маршрут.</p><p class="p1">Через три месяца они втроем, позвав штурманом Чернышева, накатали письмо в Политбюро. Без такого письма ничего не делалось: чтобы полет разрешили, его мало было обосновать. Обоснование в этом случае, считай, не требовалось: в случае успеха это был международный рекорд и полное наше первенство – надо было посвятить, то есть выбрать событие, навстречу которому они летели. Годилось двадцатилетие Октября, но до него оставался год, а у Волчака с терпением было плохо. Десятый съезд комсомола уже прошел, а до восемнадцатого съезда партии было еще дольше, чем до октябрьского юбилея. Чернышев предложил было 160-летие американской независимости, но в Штатах не было Политбюро, которое могло бы утвердить такое обязательство. Под конец Волчак махнул рукой и предложил: мы посвящаем наш полет героическому советскому юношеству! Кто имеет что-то против героического советского юношества? Они направили письмо Имантсу с просьбой одобрить и передать по инстанциям.</p><p class="p1">Но тут разбился крупнейший самолет всего авиапарка, погибли семьдесят человек. Виноват был Благов, летчик истребителя, ученик Громова, выполнявший фигуру высшего пилотажа вокруг крыла гиганта и застрявший в крыле. Громов каялся, признавал, что тот являл собой тип неорганизованного человека, «подтянулся, но прорывалось», – между тем шепотом говорили, что наверху не согласовали, одна рука запрещала, другая разрешала высший пилотаж… И надо же было такому случиться сразу после волчаковского триумфа! Черта с два теперь что-нибудь дадут, произнес Дубаков сквозь зубы. Собрали совещание по безопасности полетов, ожидался разнос, но говорили бережно, почти виновато: мы понимаем, что вы первопроходцы, и все же старайтесь не рисковать, если не жалко молодых жизней, пожалейте хотя бы государственных денег! Это и наводило на мысль, что не Благов, неорганизованный человек, виноват был в катастрофе с гигантом.</p><p class="p1">В перерыве Волчак с Дубаковым подошли к Орджоникидзе, который хоть и соблюдал положенную мрачность, но при виде всеобщих любимцев улыбался.</p><p class="p1">– Мы передали… – начал Дубаков.</p><p class="p1">– Товарищ Серго! – прервал его Волчак. – Вот сейчас бы самое время показать, что весь мир боится, а мы… а?</p><p class="p1">– Все не терпится, – сказал нарком, – все не сидится.</p><p class="p1">– Так ведь машина-то какая!</p><p class="p1">– Прелестная машина. – Это было любимое словечко Орджоникидзе: прелестный завод, прелестная стройка. – Но проверять надо. Вы что же, хотите на всю Америку опозориться?</p><p class="p1">– Опозоримся, если не полетим.</p><p class="p1">– Ну насели, ну насели! – сказал Серго, поднимая руки. – Мое дело маленькое, я малый грузин. Я вам сделаю встречу со Сталиным, его уговаривайте.</p><p class="p1">– И уговорим!</p><p class="p1">Но никакой веры наркому, конечно, не было, и когда три дня спустя Волчака разбудили среди ночи и назначили встречу на завтра в полдень в Наркомтяжпроме (для него строилось новое здание на Красной площади, огромное, как сама тяжелая промышленность, но пока наркомат ютился на Старой), Волчак изумился безмерно. Если б он знал, с кем ему встречаться, – он не заснул бы больше ни в эту ночь, ни в следующую.</p><p class="p1">В кабинете Серго ждал Сталин, и вид у него был загадочный.</p><p class="p1">Волчак в первый момент слегка задохнулся от избыточных чувств. Это был не наигрыш, он в самом деле чуть не поперхнулся. Он даже покраснел, что не укрылось от глаз кого надо.</p><p class="p1">– Мы прочитали, – сказал Сталин, прибегая к обычному «мы», но намекая исключительно на коллегиальность. – Как писал классик, хорошо поет, собака, убедительно поет. Но мы не можем сейчас всех бросать в топку. Авралом брать нельзя. Нам хочется, конечно, после первого неудачного старта, после… вот сейчас трагического происшествия… всем сразу показать. Но почему сразу полюс? Страна очень большая, есть много направлений.</p><p class="p1">– Товарищ Сталин, – начал Волчак со всей проникновенностью, на какую был способен. – Никто не собирается умирать, у меня вот дочка родилась…</p><p class="p1">– Знаем, – сказал Сталин, – поздравляем.</p><p class="p1">– Мы должны, товарищ Сталин! Ведь если американцы раньше нас пройдут над полюсом, для советской авиации это будет… непоправимо! У нас готов маршрут, все готово, топливо рассчитано. Мы не для личной славы. Если б я мог вам доказать, насколько это гарантия… насколько твердо…</p><p class="p1">– Мы верим, товарищ Волчак, – сказал Сталин с теплотой, которая показалась неожиданной даже Дубакову. Сталин явно успел оценить Волчака и относился к этому разговору всерьез. – Но мы предлагаем сначала слетать в Петропавловск-Камчатский, окончательно проверить самолет и устранить любые возможные трудности. А тогда – кто же будет вас задерживать? Мы сами любим гордиться перед буржуазией. Мы это умеем.</p><p class="p1">Всякий раз, когда Дубаков видел Сталина, он не верил собственным глазам, потому что перед ним стоял человек, от которого реально зависело всё. Сталин мог принять любое решение, судьба мира была у него в кулаке. Он не был, конечно, живым богом – просто создал машину, которая сама была вроде идеального самолета, что слушался малейшего движения педали, штурвала, отзывался на мысль. Вокруг него были люди не хуже, но он создал систему, определявшую будущее для мира, и потому был полным хозяином над судьбами людей, окружавших его. Он мог моргнуть, и никого бы не стало, да больше того – многие сами бы отважно ринулись гибнуть, такое количество власти было сосредоточено в этом человеке и, казалось, ничуть его не тяготило. Самолет мог нести любые бомбы и, однако, взмывал выше птиц; Сталин был тяжел и легок, как совершенный самолет, и никакого бремени на нем не чувствовалось. То, что раздавило бы любого, сидело на нем удобно, как френч. Странно было думать, что он все может. Но Дубаков прикидывал – и никак не находил, чего бы Сталин не мог.</p><p class="p1">– Товарищ Сталин, – сказал Волчак. – Мы готовы вылететь завтра и клянемся, что через два дня…</p><p class="p1">– Завтра не надо, – сказал Сталин. Он был в хорошем расположении духа. Ему был приятен Волчак с его застенчивостью, может быть, даже искренней. Дубаков никогда прежде не мог представить застенчивого Волчака. – Поезжайте поиграйте с дочкой, подготовьтесь как следует, месяц хватит? Вернетесь – доложите. О случае, что не вернетесь, вы вообще не имеете права думать. Я буду это рассматривать как личное неуважение. Представите карту маршрута, все расчеты, доложите по готовности. Я Имантсу скажу.</p><p class="p1">И он кивнул и пожал им руки очень горячей рукой. Аудиенция была окончена.</p><p class="p1">– …Но слушай! – не унимался Волчак, заходя уже на третий круг восхищения. – Это немыслимо, это быть не может! Сколько он держит всего в голове?! Про дочь мою помнит! Про маршрут помнит! Еще немного – и про топливо бы спросил! Нет, я не понимаю, как это возможно! Я не понимаю, как мы должны лететь, чтобы это оправдать?</p><p class="p1">Волчак и сейчас был совершенно искренен, но нельзя было не видеть, как нравился он в эту минуту сам себе, как нравилось, что о нем и о его дочери знает Сталин, безусловно, самый могущественный человек мира, человек, которого некому остановить (и, может быть, всегда будет некому); сам он этого не хотел, ничего для этого не делал, но им увенчалась история, как храм увенчивается куполом; и Волчак любовался тем, как он приблизился к этой вершине и как стал ее частью, потому что они, летчики, были любимым проектом и от них зависело сделать так, чтобы эта вершина еще ярче сияла на весь мир. Волчак начал находить вкус именно в близости к вершине, ему было там так же уютно, как верующему в руке Господа. Верующий не всегда пребывает в руке. Большую часть жизни он бродит сам по себе, надеясь привлечь взгляд Бога; но, попадая в прицельное тепло этого взгляда, он ни с чем не спутает любимого, лучшего в мире ощущения. Краем мозга умный Дубаков понимал, что это не лучшее чувство, что боролись совсем не за это. Но сколько бы ни боролись за отмену золота, оно остается благородным солнечным металлом, концентратом солнца, и только это золото было универсальной валютой – счастье привлечь взгляд Бога. И Дубаков одновременно радовался, что сам не испытывает этого чувства с такой силой, и слегка досадовал, что взгляд Бога обратился все-таки не на него; он стоял рядом, то есть был в идеальной позиции.</p></span><span id="id49"><div class="title6">
<p class="p">5</p>
</div><p class="p1">Идея отложить главный перелет была поистине гениальной, ибо все возможные неудачи пришлись на пробы. Летчик знает, что надо выработать ресурс невезения, и тогда есть шанс попасть на золотую жилу счастья. Подготовиться к полету нельзя, даже если готовиться без сна круглый год, но можно дать свершиться всему непредвиденному, и тогда, при совпадении тысячи прочих условий, в решительный день все сойдет как по маслу.</p><p class="p1">Первая гадость случилась в контрольном полете. Уже на взлете не ушло шасси – оборвались тросы подъема. Волчак систематически попадал на такие ситуации. У Громова была теория, что характер поломок как-то связан с тайной судьбой летчика: у Волчака не было проблем ни со взлетом, ни с пилотажем, но контакт с землей нарушился.</p><p class="p1">Дубаков увидел, что лебедка, поднимающая шасси, заглохла и обе стойки подогнуты. Горючего было с собой на двое суток, часов семь они промучились, но в итоге Волчаку пришлось сажать АНТ на одну ногу. Дата перелета на Петропавловск была уже назначена, повредить самолет они не имели права, – конечно, повторял Чернышев, не надо было брать такие обязательства, но отзывать их оказалось поздно, да и не такой человек был Волчак, чтобы морочить Политбюро. Был изумительный лиловый вечер, и Дубаков успел подумать, что в такой вечер помирать лучше всего, но у Волчака были другие планы. Он предупредил Щелково, что может перевернуть машину: если АНТ чиркнет крылом по земле, привет всем. Кое-как, загасив скорость и до предела вывернув штурвал влево, он приземлил машину и до полуночи разносил всю аэродромную обслугу.</p><p class="p1">Следующие десять дней экипаж спал по три часа. Они грузились, рассчитывали и пересчитывали вес и составляли график полета. Первые двенадцать часов рулил Волчак, Дубаков был шесть часов за штурмана, Чернышеву приказано было спать; после этого Чернышев брал штурманские обязанности, Волчак спал, а Дубаков рулил. Они стартовали благополучно, час в час, не допустив на аэродром ни одного журналиста: еще один широко анонсированный полет, который вдруг да закончится ничем, – это уж было непростительно. Первые сутки полета прошли штатно, однако в густой облачности на трехкилометровой высоте самолет капитально обледенел и его стало противно трясти. В первый раз им удалось рвануть к солнцу, но скоро на пути оказалась новая облачность, обходить которую уже не хватало горючего. Волчак потребовал уходить выше, и еще шесть часов они шли на четырех тысячах: трогать кислород Волчак запретил, поскольку под конец, вероятно, предстояло идти к Хабаровску на шести, и тут без кислорода было уже никак. Все эти двое суток они не ели, довольствуясь водой и чаем, и над Охотским морем начались у них галлюцинации: какие-то высоченные черные скалы, разрывавшие тучу, острые хребты, которых тут не было и быть не могло… Самое хреновое началось на последних двух часах, когда закончился световой день и пошла буря: снижаться было нельзя – и так едва не чиркали по воде, – а уходить наверх не решались, потому что немедленно начиналось обледенение. Так они на пятьдесят шестом часу полета прыгали с двухсот на сто, теряли ориентиры, не слышали ни одного маяка и не могли поймать Николаевск. Эта болтанка всех измучила, но конца ей не предвиделось. Чернышев растерял все свое хваленое хладнокровие и матерился сквозь зубы, Волчак вцепился в штурвал и то уходил на высоту, где начинало люто трясти, то снижался чуть не до двадцати метров над пестрым пенным морем. Вдруг Дубаков поймал по рации приказ Орджоникидзе: «Прекратить полет! Сесть где возможно. Орджоникидзе. Прекратить полет. Где возможно» – и так без конца. Но деваться им было некуда, никто не предупреждал, что циклон окажется так долог и силен. Неожиданно Волчак понял, что они ушли севернее, что профессор Чернышев – он действительно был профессором академии Жуковского, начальником штурманской кафедры – непостижимым образом сбился с пятьдесят третьей параллели, и теперь им крышка, равно как и всему сталинскому маршруту. Мелькнул под ними скалистый клок суши, на который не смог бы приземлиться даже он, Волчак. Дубаков отчаянно пытался связаться с Николаевском и ничего не мог сделать. Волчак пожалел, что не умеет молиться, и среди всей этой туманной пестряди на него навалилась такая железная тоска, какой он сроду не испытывал в воздухе. Горючего оставалось хорошо если на час.</p><p class="p1">И тут случилось то чудо, какое всякий раз его выручало, то везение, каким всегда был Волчак знаменит: впереди возник остров! Остров, которого Волчак не видел на карте, о котором понятия не имел, который не должен был тут появиться, – но появился, материализовался из его отчаяния. Это мог быть плавучий, странствующий остров, какая-нибудь Земля Санникова, а мог быть оторвавшийся кусок суши, черт его знает, но он был, хоть и весь изрытый оврагами, и на него можно было сесть. Они снизились, Волчак не мог толком разглядеть рельеф, и над ухом у него безумно заорал Дубаков: «Газу!» Волчак подбросил машину вверх и увидел, что чуть было не навернулся в длинный овраг. Надо было садиться у берега, там по крайней мере мерещилась длинная ровная коса. «В хвост!» – заорал Волчак, и Дубаков с Чернышевым кинулись к радиостанции. И уже когда коснулись земли, послышался сильный удар – огромный валун оторвал левое колесо.</p><p class="p1">Когда же машина остановилась и наступила внезапная тишина, они некоторое время еще не верили, что живы. Через пять минут молчания открыли люки и вывалились на берег. Остров, который им предстал, в принципе был непригоден для посадки и тем более для обратного старта. На нем буквально не было ровного места. Самолет пропахал дорогу по береговой гальке и ткнулся в дикое нагромождение бурых камней. Орали чайки. Было восемь часов вечера по местному времени. Это был край земли, конец света, здесь никто их не ждал, и непонятно было, живет ли тут кто-то еще, кроме чаек. Чайки точно были им не рады. Волчак помог Дубакову развернуть наземную радиостанцию и приказал радировать: «Экипаж АНТ-25 благополучно приземлился близ Николаевска. Все нормально, пострадавших нет».</p><p class="p1">Они не успели закончить первую передачу, как в берег ткнулся катер с темными фигурами. Волчак побежал к ним и вскоре вернулся под конвоем. Это были дальневосточные пограничники, к которым сразу после приземления непонятного самолета поплыли за помощью нивхи, населявшие остров. Они не очень хорошо говорили по-русски, но уже знали, что появления японских шпионов надо ожидать со дня на день.</p></span><span id="id50"><div class="title6">
<p class="p">6</p>
</div><p class="p1">– Что же вы, черти! – говорил им Волчак, сидя в неприветливом, но очень чистом доме местной старухи по имени Фетинья. Недоразумение отчасти выяснилось, предъявлены были документы с обеих сторон, но недоверие сохранялось, потому что мало ли какие документы кто нарисует. Экипаж выставил на стол бутылку коньяка, которую умудрился дать им с собой щелковский доктор Ляхов.</p><p class="p1">– У нас служба, – лаконично отвечал начальник заставы Буркин.</p><p class="p1">– А у нас что? – спрашивал Волчак. – Мы тебе кто?</p><p class="p1">– Кто вас знает, – буркал Буркин.</p><p class="p1">– Мы сталинский маршрут, сталинские соколы! – уверял Чернышев.</p><p class="p1">– На вас не написано.</p><p class="p1">– Будет написано! – загудел Волчак. – Вот краску завтра привезешь – лично привезешь! – и напишем.</p><p class="p1">– Это мы будем решать, чего вы напишете, – сказал Буркин. – Я по начальству доложил, пускай они решают.</p><p class="p1">– Слушай! – гудел Волчак. – Чего ты такой недоверчивый? Что ты прямо как несоветский? Ты Волчака не знаешь?</p><p class="p1">– Кого мне положено знать, того знаю, – уклонился от прямого ответа начальник заставы. – На тебя мне ориентировку не присылали.</p><p class="p1">– А ты только тех знаешь, на кого ориентировка?</p><p class="p1">– Почему, – ответил Буркин, нехорошо усмехнувшись. – Сталина знаю, маму знаю, папу знаю. Тебя среди них не числится.</p><p class="p1">– Слушай, пограничник, – решил всерьез поддеть его Волчак. – Ты газеты читаешь?</p><p class="p1">– Нам положено, – отрубил пограничник.</p><p class="p1">– Героев знаешь? Я героический летчик Волчак, тебе мало про меня в газетах писали? Конструктор Антонов в «Правде» писал, что я думающий летчик, лучший друг изобретателя. Я самые новейшие разработки облетываю, перечислять, извини, не имею права, но можешь мне поверить. Ты мою личность видел?</p><p class="p1">– Я разные личности видел, – кивнул Буркин. – А потом они знаешь кто оказались? Ты сам-то читаешь? Вот.</p><p class="p1">И на это Волчаку нечего было возразить, потому что с тридцать пятого года многие личности оказались совсем не теми, и была серьезная вероятность, что этот процесс срывания масок далеко не кончился.</p><p class="p1">– У нас тут было, – развивал успех Буркин, – что отличники, вообще не подкопаешься, к японцам бежали. Сейчас момент ты знаешь какой? Враждебное окружение, слыхал?</p><p class="p1">Волчак не был готов к тому, что ему, герою, который вот так же сидел со Сталиным, будут на местах, на каком-то глухом острове, среди циклона рассказывать про враждебное окружение. Пока они там сидят на своих вершинах, вот, значит, что делается в глубинах. И самое обидное, Волчак заметил, что старой женщине Фетинье – он и на родной Волге не слыхал таких имен – пограничник Буркин был ближе, понятнее, а на Волчака и его экипаж она смотрела без особенной приветливости. Они были чужие, а с Буркиным ей было еще жить и жить. И в случае какой нужды она в лодке плавала к Буркину, а не к Сталину в Кремль.</p><p class="p1">– Вот это, – сказал Волчак, отчаявшись Буркина растопить и надеясь потрясти, – профессор академии Жуковского товарищ Чернышев, воевал, между прочим, у Чапаева. А это товарищ Дубаков, член экипажа Гриневицкого.</p><p class="p1">– Чапаева вашего еще тоже надо поскрести, – сказал Буркин без особой доброжелательности. – Пропал без вести при обстоятельствах… Еще надо уточнить обстоятельства. В картине мы видим вольную фантазию, доказательств не представлено.</p><p class="p1">– Всех тебе надо поскрести! – воскликнул Волчак и решил Буркину больше не наливать – не то что опасался нового пароксизма подозрительности, но ему вдруг жалко стало коньяка. – И Гриневицкого поскрести?</p><p class="p1">– И Гриневицкого, – сумрачно кивнул Буркин. – Сказал полетит, не полетел. Почему? Я японского шпиона брал, – добавил он без всякой связи.</p><p class="p1">– И чего?</p><p class="p1">– И взял.</p><p class="p1">С этим человеком бессмысленно было спорить.</p><p class="p1">– Ну вот я, – сказал Волчак и ткнул себя пальцем в грудь. – Я зачем сюда прилетел? Про что тут у тебя шпионить?</p><p class="p1">– Этого я знать не могу, – обиделся Буркин. – Это не моя забота знать. Моя забота тебя выловить, потому что территория режимная, объект специальный. Граница. Может, ты в Японию собрался бежать, а может, встречаешь тут своего брата диверсанта, засланного к нам. Ты сам подозрительный, и люди с тобой подозрительные. Ты был вооруженный, я тебя разоружил. Я передам тебя по инстанции, тогда буду смотреть, кто ты есть.</p><p class="p1">Волчак сильно устал, коньяк ударил ему в голову, и на короткий миг он утратил внутреннее сопротивление. Он стал примерять на себя логику Буркина и не нашел в ней противоречий. Он с товарищами действительно запорол сталинское задание, сел на непонятном острове вблизи Японии вместо понятного советского города, всех взбаламутил, чудом спасся и сломал колесо. Все выглядело очень подозрительно. Позавчера и в Москве он был герой и надежда, а сегодня на острове уже неизвестно кто. Спасло его то, что в этот момент распахнулась дверь и из дождя возник новый погранец, только что прибывший на катере. Он извлек из нагрудного кармана штабную телеграмму и зачитал: «Братский привет и горячие поздравления успешным завершением замечательного полета гордимся мужеством отвагой выдержкой хладнокровием настойчивостью мастерством вышли ходатайством присвоения вам звания Героев Советского Союза выдаче денежной премии размере тридцати тысяч рублей командиру двадцати тысяч летчику и штурману крепко жмем руки Сталин Молотов Орджоникидзе Ворошилов Жданов».</p><p class="p1">От избытка чувств Волчак не мог говорить. Он встал, сел, снова встал…</p><p class="p1">– Тридцать тысяч рублей! – сказала Фетинья и в отсутствии иконы перекрестилась как бы на сумму. – Тридцать тысяч, господи помилуй.</p><p class="p1">Все остальное, видимо, не дошло до ее сознания или не произвело впечатления. Летчики молчали, приходя в себя.</p><p class="p1">– А что ж, – раздался в молчании, под стук дождя в черные стекла, скрипучий голос Буркина. – И Орджоникидзе надо поскрести. Я думаю.</p><p class="p1">– Знаешь что! – очень тихим голосом, никогда не предвещавшим добра, выговорил Волчак. – Тебя самого поскрести надо, Буркин. Ты самый и есть враг. И я, Герой Советского Союза Волчак, сделаю так, что тебя очень будут скрести, пока насквозь не проскребут.</p><p class="p1">– А меня что скрести, – так же спокойно и скрипуче сказал Буркин. – Меня дальше, чем есть, отсюда не пошлют. Куда ты меня заскребешь, летчик Волчак? Это тебе есть куда приземляться, а мне уже некуда.</p><p class="p1">И он был совершенно прав, и в этом заключалась универсальная причина того, что с героем Волчаком можно было сделать что угодно, а с пограничником Буркиным ничего и никогда. Немногие знают, что по итогам спасательной операции он тоже был награжден медалью «За отвагу на пожаре». Пожара не было, но другой медали ему по статусу не полагалось. Утопающих ведь тоже не было, хотя еще бы чуть-чуть – и было.</p></span></span>
