</div><p class="p1">Все, что нашли, – банку крема от веснушек, последний символ всей ее гордой, исключительной и застенчивой личности, и Волчак, всегда умилявшийся рыжим, чуть не заплакал. Какое лицо, подумал он, глядя на ее фото в вечернем платье; видно, что ей не нужно это платье, что ей нужна летная куртка, но что если надо, – совершенно как он – она может и чаровать, и пленять, и в ее широко расставленных глазах Волчак видел ту же чертовщину, но глубоко за ней видел и то, чего все не понимали: беззащитность, абсолютную чистоту и уязвимость девочки из сельского штата, девочки, которая свободна и защищена была только в небе и однажды не захотела из него возвращаться. Волчак поклялся бы, что Амелия ему подмигивала. Она много читала, много мечтала, до двенадцати воспитывалась у деда с бабкой и пошла в школу сразу в седьмой класс и, само собой, не вписалась. Так складывался этот невыносимый характер: сочетание ума и дерзости, хрупкости и вызова, уязвимости и бесстрашия. Разумеется, во время империалистической войны она пошла в санитарки. Разумеется, во время эпидемии испанки ходила за больными и сама заразилась, два месяца тяжелейшей пневмонии, а сразу же потом гайморит, приведший к изнуряющим головным болям, от которых она избавлялась только в воздухе.</p><p class="p1">Однажды отец, вечно томившийся от чувства вины, потому что воспитывала ее бабушка, пока они с матерью в отчаянии искали работу, подарил Амелии на день рождения десятиминутный полет за десять долларов на высоте девяносто метров. Этих десяти минут хватило, чтобы она сказала: я буду летать.</p><p class="p1">Волчак вспомнил свой первый полет учлетом в Борисоглебске 11 августа двадцать третьего года, когда Глазов вышел из фанерной У-1, скопированной с <em>Avro-504</em> после вынужденной посадки подбитого британца близ Петрозаводска (так и собирали с тех пор эти У-1 на «Красном летчике», все на них начинали), и сказал ему: вперед, сына!.. Постой, почему бы им не быть тогда в воздухе одновременно? Когда-когда, уточнил Волчак, когда она взлетела? 28 декабря 1920 года, на Лонг-Бич. Ах ты, я был еще техником в авиапарке… На чем она хотя бы взлетела? Тогда летали на «Дженни», пояснил Дэвис, четвертый «Кёртисс» пятнадцатого года, детство, весил шестьсот пустым, переводил Трояновский на наши килограммы, а на шестьсот метров взбирался за восемь минут. Господи, простонал Волчак, и ведь все это на нашей памяти! И что же она решила?</p><p class="p1">Она решила скопить тысячу долларов на курсы, это была тогдашняя тысяча, уважительно пояснил Дэвис, не та, что сейчас. Амелия потратила год, берясь за все: стенографировала, фотографировала для газеты, летом три месяца водила грузовик! Потом пришла к Аните, она же Нита, любимица штата Айова и первая летчица там, – у нее на Лонг-Бич были к тому времени свои летные курсы. Нита жива, все у нее в порядке, помнят ее только как учительницу Амелии. Да, вздохнул Волчак, всех их помнят сейчас как моих учителей – Павлов, Телешин, Глазов… Как я когда-то на них смотрел! И у всех настоящих летчиков читал в глазах опасение: да, этот придет, всех потеснит – всякий серьезный ас хочет быть первым, – но опаска тут же сменялась тайным одобрением: давай, мальчик! Всех нас вытеснят наши дети, всех нас будут помнить как своих учителей… тоже и меня – разве что я буду первым в космосе.</p><p class="p1">В начале депрессии родители Амелии развелись, и, чтобы утешить мать, она отправилась с ней в кругоштатное путешествие на двухместном авто, которое купила на бабушкино наследство, выкрасила в канареечный цвет и прозвала «Желтым призраком». В Бостоне она вступила в аэроклуб и в двадцать седьмом начала летать самостоятельно, сразу же ставя рекорд за рекордом: стала первой женщиной-штурманом, пересекшей Атлантику (пилотировал Вильмер Штульц, глупо погибший в двадцать девятом), хотя и сказала после приземления: «Вильмер все делал сам, я была не более чем багаж, мешок картошки». И добавила: «Когда-нибудь я попробую одна…» Она уже поняла, рыжая: она будет одна всегда; хочешь быть первым – будь один. Ее прозвали «Королевой воздуха», а двух королев не бывает. Ей пришлось участвовать в рекламе, саморекламе, и во всем этом… – Дэвис и Трояновский одинаково помахали рукой в воздухе, – потому что нужны были деньги на перелет, иначе никто бы не дал. Ее пригласил на инаугурацию президент Гувер. На фотографии с Гувером у Амелии было такое же выражение лица, как у одной бабы, которую Волчак однажды зазвал к себе. Умная была шибко, но казалось, вроде бы должна любить это дело. Так вот, у бабы этой на лице было подобное выражение: если тебе уж очень надо, давай это сделаем, просто чтобы общаться потом, но лучше бы я пошла отсюда; и Волчак, сам себе удивляясь, дал ей уйти, а выражение запомнил. Такой же на всех фотографиях для звездных журналов, для обложек была и Амелия, и только на одной было у нее грустное, беспомощное, почти плачущее выражение: куда я полезла, отпустили бы меня, дяденьки… Это было последнее фото перед сольным полетом через Атлантику. Улыбаться на съемках она не любила: рот щербатый, прикус неправильный, а от услуг дантиста Амелия упрямо отказывалась. Снимайте давайте какую есть, да быстро. В порядке тренировки она слетала через континент и обратно, но над сушей, всякий скажет, не страшно; а вот над зыбью… Деньги – за рекламу, естественно, – дала жвачка «Бич Нат», и потому самолетик Локхид «Вега» был покрашен в нежно-алый цвет. Вот черт, воскликнул Волчак, точно как мы! Журналисты ей дали с собой свежайший номер «Телеграфа» для подтверждения даты полета. Да, важно кивнул Волчак, это так делается. Амелия стартовала с Ньюфаундленда и через пятнадцать часов приземлилась близ Дерри, Северная Ирландия. «Откуда ты, девочка?» – спросил старик фермер. Из Америки, отвечала она небрежно.</p><p class="p1">Как провела она эти пятнадцать часов, что ела-пила, курила ли? Нет, пояснил Дэвис, не курила; диеты не соблюдала, и так была стройна, даже сухопара, а курение считала ненужным риском. Вообще, кажется, удовольствие ей доставляла только высота. И Волчак грустно кивнул, понимая, что она изведала оба вида высоты: и когда ты выше всех в небе, и когда ты первый на земле. Неизвестно еще, что больней, приземляться или падать, – а профессия так подло устроена, что на высоте остаться невозможно. В этом Амелия поняла бы его, только она, других равных не было, но теперь им, конечно, не увидеться, в загробную жизнь он не верил.</p><p class="p1">Потом она расторгла помолвку – и это естественная вещь, кивнул про себя Волчак, ведь ты уже не прежний и себе не принадлежишь, и самая умная жена не поймет этой перемены. Ты шагнул за собственные границы, с тобой уже нельзя по-прежнему… Разорвала, значит, помолвку и вышла за издателя, с которым проводила много времени, готовя автобиографию. Издатель был только что разведенный, с двумя детьми. Амелия перед свадьбой вручила ему письмо – вот копия: я обещаю тебе привязанность, но не обещаю верности, это не брак, а партнерство, свободу я не поменяю хотя бы и на золотую клетку. Что они тут все себе позволяют, подумал Волчак, сказали бы ей у нас – и никаких взбрыков. Но и за самолеты не пришлось бы платить и краситься в цвета жвачки… Издатель Патнем принял ее предложение – да, предложение сделала она, и виделись они в год не дольше месяца.</p><p class="p1">Волчак сперва с радостью, а потом с ужасом узнавал в Амелии себя: он знал это, чувствовал, когда в узоре чужой судьбы ясно провидишь собственное будущее. Она стала государственным человеком, дружила с Рузвельтом, катала над Нью-Йорком его жену; она написала книжку, к нему тоже все приставали – пиши да пиши, а что там напишешь? Про высоту поймет только тот, кто там был, а требуется, чтобы ты поблагодарил наставников и партию… ну, в ее случае благотворителей, жвачников… Летает не партия, Волчак уже это знал, летает главный в воздухе – и главный на земле. Остальные ползают. И потому Амелии всего уже было мало, и она ставила себе все более рискованные задачи, берясь за то, с чем не могли справиться даже мужчины, участвуя в аэрогонках (ну уж это зря, добродушно пробурчал Волчак, это уже шоу. Но потом вспомнил свою «Красную пятерку» над Красной площадью и опять вдумчиво кивнул). Ей хотелось невозможного, и вдруг в тридцать шестом она сказала: хватит. Авиацию отныне будут двигать вперед не рекордсмены, а инженеры; соревнуются не пилоты, а конструкторы. Романтический период в освоении воздуха позади, мы сделали все возможное, я хочу совершить последний рекордный полет вдоль экватора, а потом часть своего времени посвятить чтению, мемуарам и яхте, часть – работе над новыми видами самолетов, а для себя лично – родить ребенка. Я никогда еще этого не делала, а все остальное, кажется, уже.</p><p class="p1">Вот этого Волчак не понимал. Как может быть позади романтический период, если при создании новых самолетов кто-то должен будет их облетать? Как можно отказаться от полетов, когда не вышли еще в космос? Как это не будут нужны первопроходцы, когда на земле, на полюсах и в глубинах не все еще исследовано? И главное – как можно, всерьез ли это вообще, говорить, что надо родить ребенка, что этого еще не было? Это происходит каждый день в любых трущобах, в Гонолулу где-нибудь и в Бомбее, про который рассказывал ему Канделаки, Кандель про все читал, словно везде собирался побывать. Рожают по всему миру, и нет в этом ничего особенного – первые полгода ребенок вообще только ест и спит да по ночам орет, потом все только требует, разговаривать с ним можно с двух лет, но что он такого скажет? Волчак в ужас приходил при одной мысли о том, что будет когда-нибудь нянчить внуков. Он готов был нянчить самолеты, учить их летать, ему бы, пожалуй, даже доставило удовольствие менять им пеленки (мгновенно представил, наделен был живым воображением), но променять воздух на дом, на подгузники! У человека бывают дети, так положено, это такой же побочный эффект жизни, как старость и смерть; но видеть в этом смысл, небывалую радость!.. Нет, на это мещанство Волчак не покупался.</p><p class="p1">Она слетала еще из Калифорнии в Гонолулу, сквозь сумасшедшие ветра, но все это уже было не то. Она бредила кругосветным перелетом строго по линии экватора, двадцать восемь остановок, с залетом в Африку, Аравию и на несколько тихоокеанских островов. В первый раз ее словно предупредили – подломилась стойка шасси; Волчак увидел в этом точную копию своего инцидента с Баженовым. Но тут же ему вспомнилось: мы, большевики, с первой попытки можем не угадать, но тогда зайдем с другой стороны… Надо было упорствовать, и они перелетели! Она тоже упорствовала, хотя и понятия не имела о большевиках: маршрут изменился, она летела теперь не на запад, а на восток (муссоны, вспомнил Волчак) и вместо двух штурманов взяла одного, но стартовала. С тоской смотрел Волчак на ее последнее перед вылетом, последнее, видимо, в жизни фото: ничего от беспомощной девочки мама-роди-меня-обратно, ничего от рыжей дьяволицы – спокойная сорокалетняя, умная, идущая в свой главный полет. Теперь она не зарабатывала на самолеты в кабине грузовика – теперь ей их дарили, и она царственно принимала. Они всегда становятся королевами – неуклюжие, неуверенные, достигшие высшего пилотажа в своем одиноком, редком, никому не нужном деле. Все она понимала, только он, Волчак, не понимал: неужели же это неизбежно? Неужели тот, кто хочет остаться первым, должен не вернуться из последнего полета? А космос? А что, если нет никакого космоса? Волчак попросил задержаться и помолчать у этого последнего стенда. Он смотрел на нее и видел себя. Но тут его осенило: нет!</p><p class="p1">Он полюбил ее в эти сорок минут, как тысячи его братьев-волжан любили Розу Люксембург. Им дела не было до того, что она была старая и некрасивая, а на иных снимках даже уродливая: для них она была восемнадцатилетняя истерзанная палачами-извращенцами девушка пролетарской мечты. Не было города, где ее именем не захотели бы назвать лучшую улицу. Если бы она сбежала к нам, мы бы ее сберегли! И точно так же смотрел Волчак теперь на рыжую, которая не понимала, куда ей надо лететь; Мермоз, положим, тоже не понимал, но Мермоз был рекордсмен, его интересовали слава и касса, а Амелия… В ней Волчак видел свой порыв, свое желание быть тем, чем никто не был! Черта ли ему было в славе, а счета деньгам он никогда не знал, деньги – пустое, заработаем! На что их тратить, в кафе, что ли, «Север» просиживать? Нет, в Амелии было безумие, ее тянуло туда же, куда и его, Волчака, – и она по глупости, по девичьей слепоте не поняла того, что единственной для нее стартовой площадкой могла стать Советская страна, такая же большая, как Америка, вдвое больше, но не зараженная всей этой жвачкой! Уж если летать на Большом Красном Самолете, то пусть он будет окрашен в цвет национального флага, а не жвачки! Только от нашей земли можно оттолкнуться, только она выведет человека в космос, больше нигде это не станет главным проектом, потому что все хотят жрать! – и только мы хотим летать там, где никто еще не летал! Да и откуда в Америке взяться летчику? Волчак вспомнил, как Линдберг в России говорил: будущее за вами, потому что… и замолчал. Но теперь Волчак знает почему. Потому что он летал в этих пространствах, начинающихся в Заполярье, и знал, на что они похожи: зимой на рассвете бывает это чувство – что миру тебя совершенно не надо! Но пора вставать, влезать в задубевшую от пота, коробом стоящую на морозе одежду, и ворочать мешки, и захлебываться морозом. Потому что весь Советский Союз и есть генеральная репетиция космического полета, и ни в каком космосе, ни на каком полюсе не будет страшней, чем ранним зимним утром в пекарне, – Волчак это знал, и Максим Горький это знал. Потому что построили единственную в мире страну, главное предназначение которой – летать; и все счастливые выродки, рожденные летать, должны теперь прибиваться к нам. Когда это будет зависеть от него, – а когда-нибудь будет, Волчак чувствовал это, – он лично их всех соберет, и тогда его страна станет наконец магнитом для настоящих, тем полюсом, каким она и задумана. И показалось ему, что Амелия кивнула, но это, Волчак знал, оптическая иллюзия.</p><p class="p1">Как он любил бы ее! Как он знал этих застенчивых, зеленоглазых, для которых грубая сторона любви была только необходимым, даже досадным условием, чтобы потом поговорить! Как он понимал этих неловких, не умеющих танцевать на потном кружке, зато танцующих наедине с собой или на поляне для кого-нибудь одного, на дикой лесной поляне, где никто не смотрит! Так и Амелия танцевала в воздухе над Атлантикой, наверняка сделала пару фигур – одна, небо, океан, никто не смотрит, разве что киты какие-нибудь, добродушные глупые киты! И как она в конце концов полюбила бы делать это с ним, Волчаком, потому что только после этого можно говорить по-настоящему – о чем? Да о чем угодно, сколько всего придумали бы они! Но она улетела и теперь ждала его там… тьфу, черт, что за идеализм. Пора, пора было на родину, надышишься здесь и полезет в голову черт-те что.</p><p class="p1">…Позади осталось уже четыре пятых пути, когда в низкой облачности Амелия пролетела мимо острова Хауленд – два километра в длину и пятьсот метров в ширину, неинкорпорированной американской собственности в самом центре океана, в четырех тысячах километров от Гонолулу, где ее ждали. Почему она решила остановиться на этой ненаходимой, невидимой суше, где главная возвышенность – три метра, и на этой возвышенности воздвигают теперь маяк ее имени? Почему никто ее не остановил, не предложил другого, более населенного острова, неужели она хотела, чтобы именно он стал ее могилой, не у всякого же есть целый остров, который помнят только из-за тебя? Есть надежда, робко сказал Дэвис, что их захватили японцы. Нет, сказал Волчак и покачал тяжелой головой, такой надежды нет. Ее искали шестьдесят шесть самолетов и двести кораблей. И если все, что нашли, – это баночка от крема против веснушек… какого еще памятника надо? Что лучшего могла она оставить по себе?</p><p class="p1">– Последняя радиограмма здесь? – Волчак указал на стенд.</p><p class="p1">– Да. «Не видим вас, падает горючее, ищем остров, нет времени».</p><p class="p1">Трояновский никогда не видел, чтобы человек волчаковского сложения так стремительно белел.</p><p class="p1">– Это она мне, – сказал Волчак чуть слышно, и Трояновский не решился расспрашивать.</p></span><span id="id63"><div class="title6">
<p class="p">7</p>
</div><p class="p1">Дальнейшее их пребывание в Америке не представляло особенного интереса. Они слетали в Вашингтон и виделись с Рузвельтом. Рузвельт оказался приятным парнем, но ничего похожего на Сталина, от которого так и веяло необыкновенностью: этот был гораздо понятнее, даже несмотря на парализованные ноги. Видимо, необыкновенность определяется количеством тех, кто может тебя остановить; этого могли остановить все, он зависел даже от тех, кто приподнимал его при пересаживании из кресла в коляску. И интересы у него были обычные, человеческие. Он любил морские пейзажи, называл себя моряком, окружен был кучей кнопок, приборов, удобств и условностей, но не был хозяином. Его было немного жалко. По стенам висели всякие штормы, Чернышев блеснул: сюда бы нашего Айвазовского, но его картины все собраны для народа в феодосийском музее. Рузвельт оживился и сказал, что любит Айвазовского (Трояновский мысленно черкнул в книжечке, что надо попросить для него пейзаж попроще, – у Айвазовского их тысячи, нам ништо, а Рузвельт оценит). У президента был воздушный просторный кабинет, белая рубашка, и пахло со внутреннего дворе сиренью, и сирень тоже была не наша, а как бы побрызганная одеколоном «Белая сирэнь». На прощание он долго всматривался именно в Волчака и пожимал ему руку со значением – почувствовал, видимо, великую судьбу, а может, как знать, угадал, что эту руку ему придется пожимать еще не раз, например, подписывая капитуляцию, но Волчак усмехнулся и сказал сам себе: спокойно, Вася.</p><p class="p1">После визита, в консульстве, полном буржуазного шелковистого уюта, Трояновский спросил: какие впечатления? Волчак неожиданно для себя сказал: лучшее, что у них тут есть, – право носить оружие; я думаю, это и у нас разрешат. И так ведь у многих есть, по деревням-то, в Сибири, без охоты не проживешь, чего людям прятаться? Трояновский посерьезнел: это называется вторая поправка, до сих пор интенсивно обсуждается, всё пытаются отменить. Вы не представляете, сколько происходит глупостей, случайных смертей и какова реальная преступность. Если людям раздать оружие, вы не представляете, что будет. Дубаков искренне наслаждался дискуссией, он вообще любил поговорить и теперь понял, что может говорить чуть больше обычного, – он был теперь не просто летчик. Да что же будет, сказал он лениво, в августе семнадцатого у людей было много оружия, это и товарищ Сталин напоминает в известной статье «Октябрьская революция и тактика русских коммунистов» (Дубаков много конспектировал, как положено советскому герою, и не для галочки, а по внутреннему интересу). Трояновский посмотрел на него долгим взглядом: у него были свои воспоминания об августе семнадцатого года, когда он проявил известную политическую близорукость в вопросе о германском золоте и отношении к Учредительному собранию, но товарищи, доказавшие высокую профессиональную компетентность, как он или Андрей Януарьевич Вышинский, могли вопреки давним маленьким заблуждениям приносить пользу на своих постах. Приятно видеть подготовленного, политически развитого летчика, сказал Трояновский с тем выражением лица, которое так нравилось его американским друзьям, ценителям истинного дипломатического лоска. Советую вам лично с товарищем Сталиным, когда он будет принимать вас после перелета, обсудить этот аспект подготовки к Октябрьскому восстанию, а также перспективы второй поправки у нас. Очень может быть, время действительно настало, ведь никаких предпосылок для переворота больше нет, не так ли? Волчак задумчиво кивнул и решил, что эту поправку надо запомнить, у нас будет больше смелых, уверенных людей, главное – только не забыть о ней потом, когда заинтересованность Сталина в большом количестве смелых, уверенных людей несколько уменьшится в силу, может быть, возраста.</p><p class="p1">Волчак сказал много речей, и во всех речах он по завету Трояновского напоминал о том, что летел от имени Советской России, которая не только догонит, но и перегонит; о том, что летел с товарищами по заданию ста семидесяти миллионов представителей рабочего класса; о том, что Советская Россия сегодня представляет во всех отношениях более перспективный строй, в том числе и для покорения полюса, а в перспективе – космоса, и всякий раз все убедительней предрекал Америке сначала отставание, а потом и крах, – и Трояновский кивал одобрительно. Но что всего удивительнее, что и Америка слушала Волчака все одобрительнее. Чем больше Волчак грозил ей кризисом и отставанием, тем больше она ликовала и аплодировала. Он начал думать уже, что над ним смеются, что это в представлении американцев такая русская экзотика – попользоваться полным гостеприимством и в ответ обещать хозяевам вскоре их закопать; но потом, вслушиваясь в переводы ответных речей, заметил, что американцев это ничуть не оскорбляет – они думают, что он летел от имени всего человечества, и приветствуют его в этом качестве. Никакого человечества, конечно, нет, а есть его страна и отсталый дряхлеющий мир, но американцы пока этого не понимали и простодушно рукоплескали своему могильщику, и это под конец начало Волчака смущать – может, они что-то знали, чего не знал он?</p><p class="p1">В посольстве ему передали правительственную телеграмму: им предстояло пробыть в Нью-Йорке до середины июля, встретить Громова, передать ему эстафету и следовать домой. Громов должен был прилететь через месяц после них. Это было прекрасно придумано. Это означало, что в СССР не три героя, а все герои, скоро они все по одному прилетят в Штаты (Волчак усмехнулся, вообразив это зрелище). Громов побил рекорд дальности, пролетев не 10 100, как они, а 10 300, но на этот счет Волчак был спокоен: надо быть первым, рекорд – дело третье. И потом, перелет над Южным все равно за ним. Они уже отплыли из Нью-Йорка в Европу, когда их позвали в будку «Нормандии» разговаривать с Марчфилдом, где приземлился Громов. Ничего не было слышно, кроме «Алло, Нормандия!», но Волчак уверял, что голос МихМиха узнает всегда и что в голосе этом торжество.</p><p class="p1">В Париже, где они гостили меньше года назад, им устроили встречу с писателями, прибывшими на конгресс защитников мира. Больше всех хорохорился Вишневский, маленький, шумный, все время повторявший, как Рузвельт, что он матрос и морская душа. Кольцов был бледен и чем-то пришиблен. Алексей Толстой беспричинно смеялся и лез целоваться. Все угодливо хвалили вчерашнюю шутку Волчака с корреспондентом («Я очень богат, у меня сто семьдесят миллионов – человек, человек! И все они работают на меня, а я на них») и смотрели на экипаж АНТа с тайной робостью, которую военные, привычные к субординации, отлично знают. Это было поведение людей, столкнувшихся с новым начальством и старающихся ему понравиться при помощи старых шуток. Волчак был снисходителен и называл Толстого графом. Дружелюбен он был только с Кольцовым, которого знал давно. Вишневский говорил, что чувствует себя как старый конь при звуке боевой трубы. Они позвали нас говорить о мире, повторял он, но я вижу, что в глазах у них винтовочный прицел. Чернышев отмалчивался, а Дубаков сказал, что любит роман про марсианку. Толстой закрякал и сквозь кряканье уверял, что написал это только для прокорма. Вот видите, назидательно сказал Дубаков, иногда для прокорма выходит лучше. Они чувствовали свое преимущество, поскольку про марсианку мог бы в принципе написать и Вишневский, а вот перелететь через полюс смогли только они. Если на самом верху значение человека определялось тем, кто может его остановить, то этажом ниже важно было, могут ли тебя заменить, и если ты умеешь что-то, чего не умеют другие, – ты можешь смотреть на них начальственно и говорить почти что угодно. Вот так все выглядело, на письме сложно, но в реальности совсем несложно.</p><p class="p1">Волчак спросил про Мермоза, и ему сказали, что Мермоз погиб. Тогда он спросил про переводчицу, он плохо помнил ее имя, кажется, Аня или Аля, но ему сказали, что Аля уже в СССР, и если захочет, он может с ней увидеться в «Советском Союзе», такой журнал; Волчак, впрочем, уже понимал, что в Советском Союзе ему будет не до того.</p></span></span>
