<p class="p">8</p>
</div><p class="p1">– Ну здорово, – сказал Антонов.</p><p class="p1">– Здорово. – Кондратьев снял рукавицу и подал огромную ладонь. – Ты откуда к нам?</p><p class="p1">– Я по твою душу. Это сколько ж мы лет не виделись, Юра?</p><p class="p1">– Одиннадцать, – сказал Кондратьев уверенно. – Я тебя сразу узнал.</p><p class="p1">– Да и тебя не спутаешь. Ты заканчивай тут, потом поговорим.</p><p class="p1">– Обедать пойдем, я сейчас. – Кондратьев махнул рукой остальным. – Шабаш.</p><p class="p1">Люди в ватниках настороженно поглядели на Антонова, помялись и разошлись, словно растворились в полутьме по углам.</p><p class="p1">– Ко мне пойдем, – сказал Кондратьев на улице. – Это я тут, видишь, показываю, почему эм семнадцатый греется.</p><p class="p1">Антонов в дизелях ничего не понимал.</p><p class="p1">– А что, греется?</p><p class="p1">– Там смесь грязнится. Ну и вообще… перехимичили. Двигатель дельный, Брилинг его придумывал. Но есть пара вещей, которые можно… – Кондратьевская манера делать паузы перед окончанием фразы, словно заменяя мат или термин, никуда не делась. – Поправить, – закончил он.</p><p class="p1">Антонов привез в наплечной сумке палку твердой колбасы и две бутылки водки, Кондратьев привел его в холодную чистую избу с минимумом обстановки, сразу стал растапливать печь, ни о чем не расспрашивая. Потом кинул несколько картофелин в чугун, нарезал бурый хлеб, молча взял водку и так же молча разлил ее по стаканам.</p><p class="p1">– Ну, к нам? – спросил он, помолчав после первой.</p><p class="p1">– Да нет, Юр. Я хотел, наоборот, тебя к нам.</p><p class="p1">Кондратьев все-таки сильно переменился, но, как всегда, трудно было сказать, в чем именно. Вся повадка его была прежняя, волосы по-прежнему густые, в бороде блестела седина, даже свитер, кажется, был тот же самый, но на лицо словно набросили мелкую сетку, потяжелели веки, и слушал он, глядя в стол. Антонов быстро ему рассказал суть задачи.</p><p class="p1">– А кто курирует это все?</p><p class="p1">Кондратьев по-прежнему задавал главные вопросы, минуя частности. Антонов назвал.</p><p class="p1">– А что он в этом понимает?</p><p class="p1">– Так он не должен понимать, Юра. Я понимаю, и хватит.</p><p class="p1">Антонов хотел поделиться именно с Кондратьевым своими соображениями об этом новом типе партийца, но решил, что пока не время, – надо определиться. Он не допускал даже после одиннадцати лет, что Кондратьев стал ортодоксом, а вот что возненавидел ортодоксов, мог представить легко и не хотел его отпугивать.</p><p class="p1">Кондратьев поднял на него глаза, помолчал и хмыкнул:</p><p class="p1">– А я думал, ты сюда. У нас сейчас… интересно.</p><p class="p1">– Юра, мне интересно строить самолеты. Ты пока не строишь… или у тебя тут строится дизельная межпланетная станция?</p><p class="p1">А кстати, свободно могло быть. Это было очень в духе Кондратьева – подпольно, на МТС, затерянной под Серпуховом, конструировать межпланетную ракету, и притом под контролем тех же людей. Иначе откуда бы Мефистофель так быстро его извлек? Вот они, МТС-то, а мы все думаем – «челябинцы»…</p><p class="p1">– Станция – нет, – сказал Кондратьев, не обидевшись. – А ребята есть дельные. Так что в перспективе… могут.</p><p class="p1">– Юра. – Тут Антонов попер в решительную атаку, потому что рассусоливать не любил. – Сейчас можно работать. Мы им сейчас нужны по военным делам. Это всегда так было, ну и надо пользоваться, пока можно. – Он мельком подумал, что другие люди, не видевшиеся десяток лет, первым делом стали бы друг друга расспрашивать, кто на ком женат да какие детки, но они оба были ненормальные и своей ненормальностью гордились. «Какие последние политические известия?» – нормальный предсмертный вопрос.</p><p class="p1">– И где это все?</p><p class="p1">– Пока в Болшеве, там посмотрим.</p><p class="p1">– Командуют вояки, я так понимаю.</p><p class="p1">Антонов решился-таки поделиться соображениями.</p><p class="p1">– Они какие-то новые пошли. Не дубы, во всяком случае. Обучаются быстро, память конская, в теорию не лезут. Я понимаю – им нужен истребитель. Ну что, будет истребитель, в конце концов, не самая бесполезная вещь. Особенно сейчас, сам понимаешь. Но в перспективе – там можно думать про ракету. Там можно делать твою станцию. Там сейчас все можно делать, короче, лишь бы мы были первые везде. И условия там – ну, не знаю насчет быта, про быт мы много не говорили… Это для тебя, я понимаю, вещь десятая. Но все, что касается работы, там будет на чистом сливочном масле. Все по высшему разряду и лучше, чем в Европе. Если бы нам все это дали десять лет назад – наша машина бы сейчас уже ходила по Луне.</p><p class="p1">– Ну а что быт, – сказал Кондратьев. – Колбаса вот… ничего.</p><p class="p1">Антонов понимал, что он формулирует ответ, и не торопил. И Кондратьев его формулировал, и, как всегда, это был ответ с опережением, но в его манере, чуть вбок.</p><p class="p1">– Да я, в общем, чего-то такого и ждал. Ну, примерно. Это знаешь как будет? Как Вавилонская башня.</p><p class="p1">Антонов поразился: именно это сравнение уже приходило ему в голову.</p><p class="p1">– Ну а что? – спросил он. – Про это, видно, не только мы с тобой думаем. Я тут книжку читал, любопытную. Про то самое. Так вот, когда через руины Вавилонской башни шло войско Александра Македонского, они эти руины обходили три дня!</p><p class="p1">– Да кто ж говорит-то, – сказал Кондратьев, глядя прямо на Антонова без всякой улыбки. – Кто же спорит-то. Я это просто к тому… что хорошая вещь – башня, но не тебе бы, город Вавилон, ее строить.</p><p class="p1">– Но больше-то некому, – мгновенно среагировал Антонов. – Кроме города Вавилона, она же не нужна никому.</p><p class="p1">– Да я не спорю, дело хорошее. Особенно в процессе.</p><p class="p1">– А до результата, знаешь, только внуки доживут. Они там сами разберутся, что с этой башней делать – в кино снимать, магазины размещать, мало ли…</p><p class="p1">Тут у него мелькнула догадка. Он ничего не знал о прошлом Кондратьева. Люди со сложным прошлым, с не совсем кристальным происхождением или с участием в войне не на той стороне, мало ли, опасались приближаться к любым затеям Мефистофеля. Они не понимали, что самое безопасное место сейчас именно рядом с ним, под самым его прямым руководством, потому что они там сами для себя решали, кто у них свой, а кто чужой. Это на местах могли переусердствовать и вместо стрижки ногтей рубили пальцы. А когда надо было делать дело, в это дело пускали тех, кого надо, без оглядки на классовые различия.</p><p class="p1">Антонов так и сказал Кондратьеву, сначала подыскивая слова, а потом, как всегда в разговорах с ним, рубя прямо: если у тебя что-то с анкетой, или с фамилией, или ты опасаешься за прошлое – так как раз КБ и есть то самое место, где про это можно не думать.</p><p class="p1">Кондратьев покачал головой, и некоторое время они пили молча.</p></span><span id="id18"><div class="title3">
<p class="p">9</p>
</div><p class="p1">– Ну, в общем, я не поеду, – сказал Кондратьев так, что Антонов сразу понял: уговаривать бесполезно. Кондратьев был из тех, с кем ссорятся один раз, а уговаривать значило именно поссориться. Но для Антонова это было дело принципа, он, может, затем и хотел заручиться согласием самого талантливого из них, что сам себя убеждал бы именно этим согласием. А если Кондратьев не хотел, то, стало быть, все зря. Вот весь он был в этом. Он хотел, видимо, не замараться и вечно так сидеть в углу, занимаясь своим дизелем, а по ночам, должно быть, рисуя межпланетные ракеты. И когда-нибудь ему будет памятник, хотя ни одна его ракета никуда не полетит, а про Антонова скажут, что он продал душу.</p><p class="p1">– Ты, Юра, обращал внимание на одну вещь? – вкрадчиво начал Антонов. – Человечество всегда про себя рассказывает разные истории. И почему-то оно до шестнадцатого века рассказывало одну, а потом стало рассказывать другую. До пятнадцатого кто-то еще верил, что Богу интересно. А потом поняли, что ему интересны не все. Всех спасти не получается. И тогда Бог прислал Мефистофеля, чтобы спасать одного, двух, ну, тех, у кого получается. Чтобы они ему строили ракету, или башню, или мало ли. Так что брезговать Мефистофелем – это, конечно, красиво. Но это, Юра, бессмысленно. Я тебе даже знаешь что скажу? Там, в Болшеве, совершенно не рай. – Антонов начал хмелеть, поскольку всегда пил мало, и сейчас после третьей выкладывал Кондратьеву все, о чем думал в последнее время, когда слишком уставал, чтобы сразу заснуть. Тогдашние люди вообще много думали – именно потому, что мало спали. – Там в лучшем случае чистилище, и в это чистилище я тебя, Юра, могу взять. Но остальное – это ад полноценный, нормальный. Тот, про который написано. И весь выбор – он очень простой. Надо же исходить не из того, что нам хочется. Надо из того, что есть. Здесь иначе никогда не бывало. Ты можешь, конечно, считать, что в этом говне ты остаешься самым чистым. Но оно, Юра, не перестанет быть говном. А с Мефистофелем, может быть, ты построишь ракету, и дети наши улетят куда-нибудь, где этого выбора нет. Вот примерно так.</p><p class="p1">– Ну да, да. Я тоже примерно так и понимал. Я тебя разве сужу? Я никогда тебя судить не буду. Но мне не хочется… в такое чистилище. У меня тут, может быть, другое… чистилище.</p><p class="p1">– А другого нет, Юра! – тихо закричал на него Антонов. – Если ты хочешь строить ракету, тебе придется быть Фаустом и подписывать с ними договор, именно! Если они дадут тебе все, ты тоже должен им что-то дать, это же ясно! Но ты сделаешь им ракету, которая полетит.</p><p class="p1">– Да почему, – сказал Кондратьев. – Я им что-нибудь другое сделаю.</p><p class="p1">В это время очень кстати, словно нарочно для иллюстрации, хлопнула дверь в сенях, и с мороза зашел человек, которого Антонов поначалу не разглядел.</p><p class="p1">– Вот, пожалуйста, – сказал Кондратьев радостно. – Прошу любить и жаловать. Товарищ Донников.</p><p class="p1">Антонов хоть и хмелел, но на фамилии реагировал мгновенно: дело Донникова, точно, были какие-то о нем статьи лет восемь назад. Какая-то молодежь переводила фашиствующих литераторов. Потом заглохло. Кого-то выслали, но потом настали такие времена, что высылали уже пачками, и хоть Антонов запрещал себе про это думать, кое-что просачивалось. Вот, стало быть, Донников. Странно, он должен быть старше. Консервировали их, что ли, там, куда высылали?</p><p class="p1">Донников был само очарование, таких сейчас уже не водилось. Он лучился доброжелательством, хотя видел Антонова впервые. Может, так доверял Юре – с плохим человеком пить не будет? Ему по всем данным было под тридцать, но выглядел он свежим, радостным юношей. Чтобы увидеть такого человека, теперь надо было ехать на МТС под Серпухов, а то и значительно дальше. Счастливых людей не осталось, всех выслали.</p><p class="p1">– Юрий Васильевич, – сказал Донников, – я чего отрываю-то вас. Там наши вроде додумались…</p><p class="p1">– Погоди, Миш, – сказал Кондратьев. – Ко мне друг приехал.</p><p class="p1">Почему-то этот «друг» обрадовал Антонова куда больше, чем давеча сообщение Мефистофеля о том, что ему дают КБ.</p><p class="p1">– Большой человек стал, – продолжал Кондратьев. – А меня не забыл. Колбасы вот привез.</p><p class="p1">Антонов встал и подошел к Донникову поздороваться.</p><p class="p1">– Владимир, – сказал он веско.</p><p class="p1">– А я Миша, очень приятно. Я про вас читал. Вы конструктор Антонов, так?</p><p class="p1">– Ну так, – сказал Антонов. – Конструирую немного.</p><p class="p1">– А я тут в школе работаю рядом, – признался Миша. – Мне в Москву сейчас не очень, а здесь ничего. Но вы не думайте, товарищ Антонов, с меня судимость сняли. Мне и в школу можно, и в Москве я бываю, все нормально.</p><p class="p1">Он это говорил спокойно и радостно, без той пришибленности, с которой обычно признавались в подобных извивах биографии.</p><p class="p1">– Я, понимаешь, Миша, не всегда дизелями занимался, – объяснил Кондратьев.</p><p class="p1">– Да я помню.</p><p class="p1">– Ты, кстати, Володя, присмотрись. – Антонов заметил, что это был первый раз, когда Кондратьев обратился к нему по имени, словно в Мишином присутствии добрели все, даже погода. – У нас тут тоже, как ты выражаешься, немного чистилище. Миша вот школу делает по новому образцу, очень приличную. Я же кое с кем познакомился… в разное время. Ну и как-то они ко мне… приезжают. Необязательно же истребитель, так? Можно и… вот так. Садись, Миш. Пойдем сейчас посмотрим, что они там…</p><p class="p1">Миша с радостью присел к столу – он все делал радостно – и стал чистить картошку; Антонов только теперь заметил, что левая рука у него покалечена – нет двух пальцев.</p><p class="p1">– Это на производстве меня, – проследил он за взглядом Антонова и сказал об этом тоже гордо и радостно. – Но я приспособился. Все-таки левая же.</p><p class="p1">– Да уж понимаю, что не в песочнице, – сказал Антонов.</p><p class="p1">До него начало доходить. Он уже понял, что КБ будет не одно, но создавать их можно не только сверху и не только по решению ЦК. В таких чистилищах, как у него, всегда будет делаться в России все, но затевать эти КБ умеет не только Мефистофель. Вот и Донников, должно быть, затеял в свое время такое, где они переводили фашистских авторов – фашиста Эредиа, фашиста Камоэнса, – но его взяли за ухо и отправили на производство, где он лишился двух пальцев: в них-то, должно быть, и гнездился фашизм. И теперь он вместе с Кондратьевым создавал новое КБ, где найти их было не так-то просто: Мефистофель все про них, конечно, знал, потому что он знал все про всех, но ему лично, его очочкам, его тонким губам, холодным его рукам, они не подчинялись. И на короткий миг Антонову невыносимо захотелось поработать в этом КБ, но в этой выстуженной чистой избе он жить не хотел. Ему вполне достаточно было того, что придется здесь заночевать.</p><p class="p1">Но смотреть дизель пошел. И даже давал советы, после которых Кондратьев одобрительно хмыкал.</p><p class="p1">Ночевать Антонова определили на лавку у окна. Ложиться на печь он категорически отказался, и туда полез Миша. Антонов так и не спросил Кондратьева, женат ли он, как называется в МТС его должность и бывает ли он в Москве. Антонов понял, что уговорить Кондратьева не удастся и что, скорее всего, ракета его полетит нескоро. Но была у Антонова последняя зацепка – смутная надежда на то, что Кондратьев за эти одиннадцать лет стал именно специалистом по дизелям, хорошим специалистом, но совершенно не по тем вещам, которые ему удавались прежде. Он хотел проверить это свое подозрение и даже знал как. Была простая задачка, на которой Кердыш проверял аспирантов: «Отчего Луна не из чугуна?» Все пускались в дебри, а правильный ответ был известен детям: «Потому что на Луну не хватило чугуну». Но здесь слишком велика была вероятность именно этого детского, несерьезного ответа, и своих будущих подмастерьев Антонов отсеивал с помощью задачки похитрей, взятой из французской книжки про жизнь Пуанкаре. Тот выдумал ее, малек, в десятилетнем возрасте.</p><p class="p1">– Слушай, Юр, – сказал Антонов, поворочавшись на лавке. – Ты не дрыхнешь еще?</p><p class="p1">– Нет, – отозвался Кондратьев со своей кровати с эмалированными шарами.</p><p class="p1">– Задача, – сказал Антонов. – Внутри квадрата взята произвольная точка. Произвольная. От нее к серединам сторон проведены отрезки, имеем четыре неравных прямоугольника. Так?</p><p class="p1">– Ну, так.</p><p class="p1">– Имеем площади трех, найти четвертую.</p><p class="p1">Антонов ждал по крайней мере, что Кондратьев зашевелится, извлечет карандашный огрызок, засветит керосиновую лампу, будет что-то чертить, – но тот одобрительно щелкнул языком и сказал только:</p><p class="p1">– Изящно.</p><p class="p1">– Ну?</p><p class="p1">– Сложить два противолежащих и вычесть третий.</p><p class="p1">Антонов обиделся. Он все-таки задумался минут на пять, когда сам решал этот пример.</p><p class="p1">– Там достроить немного, – словно в утешение ему сказал Кондратьев, – соединить эти середины, и тогда видно.</p><p class="p1">А Антонову в тот раз пришлось это чертить, и действительно стало видно. Впрочем, геометрия никогда не была любимым его предметом. Зато сильной стороной было умение уговаривать себя, и когда на следующее утро среди ясной и очень холодной погоды организованный Мишей грузовик подбрасывал его на станцию, он уже твердо верил, что все получится и без Кондратьева.</p><p class="p1">А если нет – на карте по крайней мере прибавилась точка, о которой можно было думать как об убежище.</p></span><span id="id19"><div class="title3">
<p class="p">10</p>
</div><p class="p1">Бровману дали задание не совсем по профилю, но он этим даже гордился. Универсал. Молотов принял участников совещания прокуроров, и решили напечатать комментарий Вышинского о повышении культуры судов. Бровман взял стенографистку и отправился в Парк культуры, где назначен был у Вышинского доклад о выборах в Верховный Совет. Бровман гордился и тем, что запросто, без страха говорит с человеком, наводящим ужас на миллионы людей в СССР и за границей, но он перед этим человеком был чист, и тот его приветствовал радостно, не забыл, память абсолютная. Как-никак они были заняты одним делом.</p><p class="p1">Вышинский вел себя просто, немного капризно, словно трунил над собой, немного подставляясь, но за всем этим пряталась абсолютная воля и безжалостная готовность разоблачить врага, отнять у него все пути к отступлению, превратить в трясущийся студень. Он проделывал это виртуозно. Его речь была полна стального блеска. Мало нашлось бы по обе стороны океана ораторов, способных сравниться с ним. Иные брали голосом, но Вышинский – логикой, чередованием насмешки и пафоса; он умел быть старорежимным профессором, а умел – простоватым балагуром, почти селянином, менял маски стремительно и артистично. Сейчас он был эдаким снисходительным государственным человеком, оторвавшимся от дел по просьбе трудящихся, но чего стоит вся работа, если мы не умеем в простых словах ее разъяснить?</p><p class="p1">– Сколько времени вы мне даете? – деловито спросил он директора летнего театра.</p><p class="p1">– Сколько скажете, – с робостью и обожанием ответил директор, совсем молодой кадр.</p><p class="p1">– Час двадцать, – определил Вышинский безошибочно: меньше – легковесно, больше – утомительно.</p><p class="p1">Заговорил он бодро, четко, сразу по делу, и Бровман залюбовался тем, как строит он речь, как насыщает ее поговорками, удобными формулировками, хлесткими, мгновенно прилипающими кличками, сообщая ровно столько конфиденциальной информации, не попадающей в газеты, чтобы слушатель мог дома за обедом небрежно сказать: «Слушал Вышинского, говорит – Бухарин запродался еще в двадцать пятом, а Каменев вообще в шестнадцатом». Кое-что Бровман занес в блокнот: «У капитализма при взгляде на наши успехи такое же выражение лица, как у человека, принявшего слишком большую дозу касторового масла». Товарищеский смех был ему ответом. «Или даже пургена!» – добавил Вышинский, развивая успех, и хохот грянул еще откровеннее. Он мгновенно наводил мостик между собой и аудиторией – мы-то с вами, товарищи, можем пошутить, мы свои, я страшен только врагам, но вы-то! Он как бы делал их всех – какое тут слово найти? – Бровман подумал было «соучастниками», но сам испугался: соратниками, конечно.</p><p class="p1">После доклада Вышинский, награжденный аплодисментами и ничуть не утомленный, бодро подошел к нему.</p><p class="p1">– Ну, теперь я ваш. Поехали ко мне. Голодны? Ничего, организуем бутерброды.</p><p class="p1">Сели в просторный служебный ЗИС-101, Бровману случалось уже путешествовать в нем, хоть и нечасто.</p><p class="p1">Доехали быстро. В здании шел ремонт, Вышинский с гордостью показал новые двери, но дверь его собственного кабинета на четвертом этаже не открывалась. Ключ подходил, но не поворачивался.</p><p class="p1">– Вот любой ваш подшефный, – сказал Бровман, намекая на взломщиков, – давно бы справился.</p><p class="p1">Вышинский рассмеялся, панибратская шутка удалась. Наконец он как-то хитро дернул ключ, и тот повернулся. Кабинет оказался просторен и прост, но Бровман заметил книги на трех языках.</p><p class="p1">– Свободно владеете? – спросил он, кивнув на полку немецкой юридической литературы.</p><p class="p1">– А, немного, – рассеянно сказал Вышинский. – В сравнении с русским – бедно все это. Кто знает латынь, тому любой европейский язык дастся. А кто знает русский, тому и латынь – детский лепет.</p><p class="p1">Он поговорил о роли фольклора в речи Сталина, потом перешел к повышению прокурорской квалификации. С особенным воодушевлением заговорил об индустриализации следствия. У нас, говорил он, разработана такая система учета, что на каждого уголовника, на любого, кто хоть раз попадал в поле зрения органов, составлена папка, и чтобы извлечь досье – требуется нажатие одной клавиши. Автоматизация хранения данных уже сейчас доведена до того, что для получения полной информации об арестованном требуется не более трех часов с учетом телеграфной доставки; в будущем, пообещал Вышинский, это время сократится до четверти часа. Бровман хотел было спросить: а что, на всех что-нибудь есть? и на меня? любопытно бы проверить в действии, – но понял, что вовсе не жаждет этой проверки. Вышинский словно прочел его мысль, посмотрел в упор и веско повторил: «Любой, кто хоть раз попадал… вы понимаете?» Но тут же добродушно засмеялся, снова сменив маску, и добавил тоном, каким следователь дома беседует с дочкой: «Да что вы, голубчик, в самом деле? Не надо нас бояться. Легкий трепет – это да, это приветствуется. Но наводить страх… Знаете, один наш не в меру ретивый коллега давеча допрашивал после полуночи. Это было в Краснодаре. С инспекцией приехал товарищ из центра. Ты что делаешь? Выполняю прокурорские обязанности. Добро. Так инспектор там же отвел его в камеру, запер и сказал: теперь здесь будете выполнять прокурорские обязанности». Вышинский засмеялся, и Бровман радостно присоединился к нему: ну как же, у нас же не застенки! А Вышинский примерял уже новую маску – с воодушевлением перековавшегося старого профессора заговорил о возросшем уровне выпускников прокурорского втуза. Он не на шутку увлекся, говоря о следовательских кадрах.</p><p class="p1">– Только представьте себе. В Киеве. Муж покончил с собой, но следователь не верит. Говорит, не тот был человек, чтобы кончать с собой. Инженер. Большевик. Даже пусть стар, нездоров, не тот, чтобы стреляться. Видели, как жена бросила в урну записку. Обшарил все урны в районе. Нашел записку, склеил. Из нее стало ясно – сговор с любовником, он убил, она подстроила. Еще немного – и ускользнули бы. Об этом пишет Шейнин, но, знаете, грешит немного бульварщиной. Вот я рассказал бы… Найду время – непременно подготовлю вам серию очерков! Только уж не подведите, напечатайте. Писательское самолюбие.</p><p class="p1">Пользуясь случаем, Бровман решил расспросить об Артемьеве. Дело было громкое, сенсация не повредит.</p><p class="p1">В следующую секунду он пожалел о своем любопытстве. Вышинский, только что неутомимо говоривший третий час подряд, вдруг словно обмяк.</p><p class="p1">– Вы для себя интересуетесь или для газеты? – спросил он подозрительно.</p><p class="p1">– Если нельзя для газеты, – пояснил Бровман, – самому хотелось бы…</p><p class="p1">И он рассказал, как натолкнулся на поисковую операцию и как его завернули на Рязанском шоссе в день гибели Лондон.</p><p class="p1">– Видите ли, какая вещь, – сказал Вышинский и поджал губы. Он словно искал и не находил единственно верную формулу в своем духе, а может, прикидывал, насколько откровенным может быть с корреспондентом, хоть бы и известинцем. – Это дело сложное. Оно гораздо сложнее, чем мы могли предполагать, гораздо. И это к разговору о том, как далеко шагнула криминалистика. Раньше его приговорили бы и послали на тот свет, как говорится, без пересадки. Но сейчас, когда мы знаем и умеем столько… Тут можно потянуть за нить – и оборвать, и спугнуть гораздо более крупную дичь. Артемьев очень, очень непростой парень. Если вас интересует мое мнение…</p><p class="p1">И замолчал снова.</p><p class="p1">– Конечно, конечно! – горячо закивал Бровман.</p><p class="p1">– По моему мнению, он и убил. Но мы не можем позволить себе слушаться только подозрений. Есть, к сожалению, слишком много свидетельств в пользу его версии. В случае врага все просто: он продался, это изобличается. А здесь такое количество улик и самых неожиданных обстоятельств… Мы не знаем даже, убита жена или нет.</p><p class="p1">– Да ладно! – опешил Бровман.</p><p class="p1">– В том-то и дело, – признался Вышинский. – Понимаете ли, ее видели. Одно свидетельство есть совершенно точное, а одно – так себе, но сбрасывать со счета тоже нельзя. Это дело, если его раскрыть, может войти в учебники. Я даже больше вам скажу. Это дело – с доследованием, с учетом всех обстоятельств, с работой нескольких следственных бригад, – может, когда-нибудь будет восприниматься как символ нашего времени. Понимаете? Символ борьбы за каждого человека, законности подлинно социалистической. Гуманизма, если хотите. А вы говорите, бояться… – Хотя Бровман ничего подобного не говорил. – Вы не представляете, какая радость для нас оправдать человека. Не изобличить, а именно оправдать.</p><p class="p1">– Конечно, – снова согласился Бровман.</p><p class="p1">– Вот. Поэтому наша задача – представить все факты. А дальше пусть решает суд. Справедливый советский суд, – подчеркнул Вышинский. – Если мы что-то узнаем – вам скажу первому.</p><p class="p1">Но не сказал, и Бровман долго еще ничего не знал. А если б и узнал, не понял бы.</p></span></span>
