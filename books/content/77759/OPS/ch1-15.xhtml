<p class="p">6</p>
</div><p class="p1">Что касается Поли Степановой, то незадолго до вылета с нею случился аппендицит. Ну надо же, глупость какая! В карете скорой помощи она стала расспрашивать врачей, кого к ней пустят и когда. Оказалось, что только двоих два раза в пятидневку. Это что еще такое, сказала Поля, какая пятидневка, я выйду оттуда через три дня! И что удивительно, почти не обманула.</p><p class="p1">В палате они с инструктором Алешкиным развернули целую лабораторию, она получала квалификацию радистки без отрыва от страданий по поводу аппендицита. Шрам заживал трудно, температура не спадала, но она наловчилась обманывать медицину: Грибова передала ей второй градусник, она держала его до 36,8, потом ставила другой, как раз за десять минут он догонялся до 36,6, его она и сдавала сестре. Врач качал головой, но Поля сказала: вы срываете задание Сталина.</p><p class="p1">На следующий день Валя Грибова сажала самолет в присутствии Волчака. Окончательное решение, говорили, зависело от него. Волчак был хмур и, кажется, с небольшого похмелья, но посадку оценил: «Ничего». Машина была антоновская, длиннокрылая – тридцать один метр размаха, – с моторами М-86 по девятьсот пятьдесят лошадей, и экипаж предложил присвоить ей название «Родина». Поля поначалу сомневалась.</p><p class="p1">– Вот представь, – сказала она Вале, – всякое ведь может… и что напишут? «Родина» потерпела аварию? Три экипажа вылетели на поиски «Родины»?</p><p class="p1">Васильева прыснула, а Валя сказала:</p><p class="p1">– Если так подходить, вообще никак нельзя называть. Мы не можем подвести.</p><p class="p1">– Хорошо, – сказала Поля, – ты командир, тебе рулить.</p><p class="p1">Волчак повез их в ресторан около стадиона «Динамо». Скоро, сказал он, тут будет метро. Вез в своей синей машине, доставленной, говорили, из Штатов. Смеялся: полна машина баб! Соня Васильева смутилась: мы не бабы. «Ну, девки», – легко согласился Волчак. Поля помнила, что о нем говорили, но вел он себя совершенно по-домашнему, хоть и не упускал случая сослаться на то, как Сталин говорил ему лично то и сё. Ничего особенного Сталин ему не говорил, а может, особенное было секретно, но они, все трое, понимали, что от Волчака зависит многое, смотрели в рот и кивали с восторгом. Он распустил хвост, выпил и заставил пить их – летчик угощает летчика, как это отказываться! – чудом отвертелась только Поля, оправдавшись, что только из больницы. Вы не робейте, бабы, или девки (он кивнул Соне), тут как себя поставите – так все и будет. Настаивайте. (Сталин любил, чтоб настаивали.) Вам не дают погоды – а вы: полетим! Если все ждать погоды, мы бы и сейчас полюса не прошли. Потом: враги не дремлют. (Он махнул еще одну, уже им не предлагая, зажевал картофелиной.) Система охлаждения у тридцать седьмого… так себе система охлаждения. Имелись отдельные ошибки, их своевременно исправили, сейчас стало лучше, но я экипажу сразу сказал: собирайте мочу. В случае чего бесценная вещь. Мы из термосов чай, кофе вылили, два последних часа летели всухомятку. Ну а что делать, когда греешься? И вам скажу: собирайте. Вам это проще, приятно надерзила Валя. Ну проще, да, засмеялся Волчак. И все-таки ухитряйтесь. А так – ну, что Комсомольск, шесть тысяч по прямой, полтыщи добавьте на зигзаги, много, конечно, но не смертельно. Зато мировой рекорд среди баб, пардон, девок – и будете в полном ажуре.</p><p class="p1">За неделю до старта им дали комнату на троих в Щелкове – привыкайте втроем, другого общества наверху не будет; повариха Прасковья Васильевна гордилась тем, что кормила перед рекордами всех героев, и все говорили, что котлеты у нее бесподобные (и правда, бесподобные); рецепт этих котлет она переняла от матери, а мать служила у Тестова. Полина понятия не имела, кто это, но звучало вкусно. Они летали каждый день – при любой облачности, днем, ночью, по звездам; инструктор Алешкин помогал ей с расчетом девиации – выставлял вокруг компаса мелкие магнитики, чтобы самолет не давал наводки. На время облачности запустили радиостанцию ВЦСПС, она всю ночь передавала им «Пиковую даму» – считалось, что это любимая опера на самом верху. Поля прекрасно по ней сориентировалась и долго еще не могла отвязаться от баллады Томского.</p><p class="p1">Все это время она думала о Толе, как иначе, и почему-то не боялась за него. Он повоюет в Испании, она, штурман Степанова, доведет экипаж до Комсомольска; и тогда им будет все можно, все им разрешит какая-то инстанция, не столько верховная, сколько небесная. Это было как в русской сказке – надо износить столько-то железных сапог, загнать столько-то коней, и тогда все у них будет ладно. В настоящий момент Поля как раз изнашивала первую пару железных сапог. До нее доходили разговоры – как иначе, – что Петров принял ночной бой над Мадридом, положил чуть ли не пять фашистских самолетов, командует звеном. Один раз за время подготовки к полету она провела выходной с матерью и Жанной, и мать спрашивала: ну чего там делают они в Испании-то? Пусть бы они в Испании с собой разбирались, а туда полезли все – и мы, и немцы; ну чего полезли? Полина сказала ей не вести такие разговоры ни с кем, даже с родней, потому что это не нам решать. Может, там сейчас испытываются в боевых условиях наши лучшие самолеты, а больше негде. Поля же твердила себе, что, если Толя не повоюет в Испании, а она не полетит в Комсомольск, у них не получится быть вместе; ведь и в сказках так никогда не бывает, чтобы сразу. А у героя должна быть жена-героиня, и она все делает правильно, он похвалит.</p><p class="p1">Плохие новости, сказала Валя однажды утром, обещают облачность на неделю и выпускать не хотят. «Как так?!» – возмутилась Поля. Окончательно решает Каганович, сказала Валя, завтра к нему. Кагановича Полина никогда до этого не видела; он похож был на директора завода, усталый крупный человек с толстыми усами. Каганович объяснял им, как детям: видимость на всем протяжении плохая, гробанетесь к чертовой матери! Но Поля вспомнила совет Волчака и развернула перед вождем штурманскую карту, детализированную настолько, что все горы, радиомаяки и города с населением свыше пяти тысяч были на ней обозначены в цвете. Соня так даже пустила слезу. Хорошо, покорно сказал Каганович, я спрошу в Кремле. И через два часа им позвонили: Сталин лично дает разрешение, послезавтра вылет.</p><p class="p1">О них заботились необычайно трогательно: каждой в термос залили именно любимый чай – Полине с лимоном, Вале сладкий до невозможности, Соне с молоком – по-английски, объясняла она, хотя откуда ей знать про английский чай? Доктор дал Поле после аппендицита опий на случай болей и бензонафтол на случай воспаления. Штурманская кабина была оборудована не просто надежно, но до странности уютно: передатчик за спиной, по левому борту, там же всеволновой приемник с гордым именем «супергетеродин», такой же резервный супер справа и под сиденьем три умформера. Справа – раскладной столик с радиоключом, над ним висели три «Наяды», как назывались счетчики горючего. Было бы еще уютней, если б экипаж в полете сидел рядком, но их разделяли стены, в отверстия которых можно было просунуть максимум кисть. Общаться приходилось пневмопочтой – писать записочку, вкладывать в цилиндр и накачивать мех; по счастью, если очень сильно орать, получалось и голосом.</p><p class="p1">Вылетели они в 8:16, фиксировала в штурманском журнале пунктуальная Поля; летели над сплошной облачностью, ни разу до Свердловска не увидав земли, на четырех с половиной тысячах высоты, без масок. Стемнело уже в четыре по Москве, они летели на восток, навстречу ночи; наконец в разрыве облаков мелькнул Иртыш, и Поля успокоилась – идут точно. Соня взяла штурвал в пять и вернула в восемь. Поля заметила, что началось оледенение: лед, она знала, утяжелит машину и в конце концов утянет ее на землю. Она отправила Вале записку, и Валя повела самолет выше – на шесть тысяч, потом на семь; их жестоко болтало, но Поля терпела – ей надо было выйти из облачности и сориентироваться по звездам. Наконец они стали видны сквозь облачные клочья: сейчас, поняла Поля, мы над Красноярском. За бортом было минус тридцать семь, на борту минус тридцать, спасала многослойная тяжелая меховая броня плюс кожаные штаны и унты. Через полчаса замолчал приемник. Поля поняла: замерзли умформеры. Теперь Москва не получит от них ни звука до самой посадки, и новый радиомаяк, специально для их полета поставленный в Душкачане, бесполезен. Четыре часа они летели в полной темноте и тишине, без малейших ориентиров; на записки извели все блокноты, и Поля начала понемногу отрывать клочки от карты, стараясь выбирать только те участки, которые уже позади. Дело было дрянь, прямо говоря. Влезешь за китайскую границу – инцидент, впишешься в гору – пиши пропало, а координаты не проверить, поскольку радио глухо молчало. Вдруг на две минуты включился резервный умформер. Приемник заработал, и Поля успела услышать непрерывный вопль Москвы: «УГР! УГР! Немедленно!» Она передала: «Запеленгуйте, предположительно Хабаровск!» Москва заорала: «Репете!» Поля повторила, но тут все опять замерло. Она боялась представить, что они там думают про нее.</p><p class="p1">С семи тысяч высоты к восьми утра Поля опознала под ними Тугурский залив. Это было оно, Охотское море, они прилетели на Дальний Восток – а куда, собственно, еще могли прилететь? Ночные страхи казались теперь смешными. Надо было срочно решить, где садиться: топлива вроде хватало до Николаевска, но Валя уперлась – там плохой аэродром, потянем в Комсомольск. Ладушки, ты командир – тебе рулить; но в сплошной облачности они потеряли время, пошли не по тому рукаву Амура, и когда до Комсомольска оставалось еще двести километров, Валя поняла, что садиться придется в тайгу. Она переключала все баки – все-таки могло остаться на донышке, но запас был выработан, у них оставалось максимум двадцать минут экономного планирования. Это было очень нехорошо, очень досадно, особенно в такой обидной близости от Комсомольска, но делать нечего, Поле надо было прыгать. Конструкция дальнего бомбера-2 была такова, что при посадке в лес штурманская кабина с большой вероятностью повреждалась, если не плющилась вовсе. Напрасно Поля орала, что прижмется в кислородный баллон, что ничего ей не сделается, Валя понимала, что машина может встать на нос: «Мы тебя даже не достанем!» Командир сказал, ему видней: у Вали было больше ста прыжков, и Поля стала проверять, все ли при ней. Оружие было в порядке, нож и компас на местах, но прыгать предстояло на боевом парашюте малой площади; три секунды подумав, она отказалась от мешка с продуктами. Часто потом ей вспоминались эти три секунды. На прощанье она погрозила Вале кулаком, глянула на высотомер, на котором было 2300, и открыла люк.</p></span></span>
