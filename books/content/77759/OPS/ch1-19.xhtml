<span><span id="id31"><div class="title4">
<p class="p">11</p>
</div><p class="p1">Наверное, следующий месяц был самым томительным, счастливым и непонятным в жизни Толи и Поли. Все усугублялось солоноватым чувством неправильности. Толя приехал в роддом и нашел Таню в отдельной палате, очень недовольную. Ей, конечно, уже доложили, что вместо нее Петров поехал спасать летчиц – как будто от него мог быть толк в роддоме; беременность ей не понравилась, из-за нее сорвались съемки в картине «Девушка с мандолиной», важной для ее профессионального роста. В театре она до последней возможности репетировала роль в новой пьесе, как раз про нашего летчика в Испании, который попадает в плен и меняется потом на немца. Удивительно быстро стали пьесы писать. Чего ж они все там ходили с испанскими именами, если все давно ни для кого не тайна. Впрочем, в этом был особенный издевательский шик – ничего не скрывать.</p><p class="p1">А мальчик Петрову очень понравился, мальчик был вылитый он и даже скорей его отец, круглые серые отцовские глаза глядели на Петрова с крайним изумлением. Вот зачем все, подумал он, может, от меня и толку никакого нет, а надо, чтоб родился новый великий летчик. Ясно, что летчик, кем еще ему быть двадцать лет спустя? Таня для порядка поспрашивала Петрова про Испанию, но видно было, что пока он там осваивал ночную охоту, она здесь осваивала другую охоту, и был он тот идеальный муж, слепоглухонемой капитан дальнего плавания, о котором мечтает любая актриса. Так он думал. Но злости никакой в нем не было, потому что крепло в нем чувство, что все они теперь особенные люди. После Испании, после тайги, после Полиного полета и недели скитаний, после возвращения через Хабаровск и бесчисленных митингов, на которых их чествовали, Толя Петров уже не совсем понимал, на каком он свете, и для себя решил: раз я не совсем обычный человек, у меня могут быть две жены, одна с ребенком, другая летчица, у меня могут быть две страны, за которые я собираюсь воевать, и вообще, я как бы та новая порода людей, которую обещали с самой революции, да и раньше, и вот вывели. С этим чувством он окончательно забыл всякую осторожность, щедро делился боевым опытом, а с Полей побывал у нее дома, подбрасывал в воздух ее дочь и понравился маме. В свою очередь и Таня со своим драматургом забыла всякую осторожность. В свою очередь и погода забыла всякую осторожность и устроила Толе с Полей потрясающий ноябрь, с очень ранними холодами, с хрустящими лужами, с ослепительно ясным небом, в котором тоже произошли какие-то сдвиги. Ноябрь, а так ясно. И поскольку часовые пояса у них обоих окончательно спутались, а выпито бывало довольно много, две недели Толя пребывал в странном состоянии блаженства, причем не совсем телесного. Телесные потребности, всякая постель – будто отступили на другой план. Теперь им особенно нравилось лежать и разговаривать.</p><p class="p1">И продолжалась такая смутная жизнь до тех самых пор, пока Петрова не вызвали в Кремль и не провели в тот кабинет, где он никогда еще не бывал.</p><p class="p1">С ним были очень ласковы. Он впервые так близко рассмотрел Сталина и поразился тому, что его, не совсем человека, принимает тоже не совсем человек, который как бы немного двоился. Его лицо жило очень быстрой, но внешне неподвижной жизнью. Он говорил медленно, чтобы в паузах успеть многое продумать. Он был бы, вероятно, талантливым летчиком. Петров не вполне понимал, как с ним говорить, но мостик к нему перебросил именно через это понятие: летчик. Сталин тоже летал на больших высотах и вынужден был думать на хороших, может быть, околозвуковых скоростях. Таких скоростей пока нет, но это дело близкого будущего. И довольно скоро Петров перестал стесняться.</p><p class="p1">– Товарищ Петров, – сказал Сталин, – вы показали хорошие результаты. Нам хотелось бы знать, – понятно было, что под «нам» он разумеет всех вождей, а не себя лично, – насколько успешными кажутся вам наши действия в Испании.</p><p class="p1">– Товарищ Сталин, – ответил Толя очень просто, – мы показали все что могли и, думаю, после полугода такой тренировки могли бы еще лучше. Я готов вернуться в любое время и закончить начатое.</p><p class="p1">– Заканчивать начатое не нужно, – сказал Сталин мягко, – там есть кому заканчивать… Нам хотелось бы понять, насколько эффективно мы воевали, и если мы воевали недостаточно эффективно, кто за это отвечает.</p><p class="p1">Толя понимал, что любое его слово может стоить кому-нибудь головы (о своей голове он не думал, потому что все делал правильно). Он рассказал про испанцев, которые очень, конечно, дружелюбны и вообще прекрасные ребята, но не очень пока умеют воевать, а часто недостаточно четко самоорганизуются. Он заметил, что наши инструкторы показывают чудеса храбрости, и упомянул Птухина.</p><p class="p1">– Товарищ Птухин, – заметил Сталин, – несколько увлекается азартом, как нам известно, и иногда общается слишком тесно с нашими друзьями из ПОУМа.</p><p class="p1">Про ПОУМ Петров знал очень приблизительно, поскольку имел дело в основном с воздушными целями, и сказал, что недостаточное понимание у рядовых испанцев имеет место быть. Но лично он не общался на политические темы ни с кем и не встречал ни одного испанца, который бы с ним, Петровым, такие разговоры по собственной инициативе вел.</p><p class="p1">– Это хорошо, – одобрил его Сталин. – А насчет товарища… – он назвал фамилию корреспондента-еврея, – какие у вас впечатления?</p><p class="p1">– В Испании, – сказал Петров, – он вел себя с храбростью, а когда переправлял меня назад, то оценил испанских товарищей высоко.</p><p class="p1">– Нам показалось, что он очень расстроен, – сочувственно сказал Сталин.</p><p class="p1">– Ну, в общем, мы все были немного расстроены, – признался Петров, – потому что надеялись на более быстрый успех. Но мы готовы его закреплять и, не щадя жизни…</p><p class="p1">– Это напрасно, – прервал его Сталин. – Жизнь надо щадить, она у нас одна. Вот товарищ Мигуэль, – и он назвал фамилию правдиста, который считался главным испанским корреспондентом, – тоже слишком увлекается и общается иногда с людьми, которым не следует доверять. А нам его жизнь дорога, как всякая наша жизнь. Вы с ним встречались?</p><p class="p1">Петров ответил, что встречался всего единожды, но от товарища Огольцова слышал самые прекрасные отзывы.</p><p class="p1">– Удивительно все у вас хорошо, – сказал Сталин, – и вокруг вас исключительно хорошие люди. Вы сами, наверное, хороший человек. Просто хочется вам позавидовать. А также хочется вам посоветовать, – вот тут у Петрова упало сердце, потому что о совете он догадался, – хочется вам посоветовать, чтобы вы с большим вниманием относились к вашей жене. Вы понимаете, что наши герои должны во всем являться образцом. В небе вы являетесь образцом, испанские товарищи это заметили. Надо быть таким же образцом во всем остальном, надо понимать, что у хорошего человека всегда много поклонниц. Надо помнить, что жизнь только одна и жена только одна, иначе, сами понимаете, начинают завидовать. Ну что же, вы и дальше собираетесь испытывать?</p><p class="p1">– Нет, товарищ Сталин, – понуро ответил Петров.</p><p class="p1">– Я имею в виду испытывать самолеты, – улыбнулся Сталин.</p><p class="p1">Петров тоже улыбнулся, потом засмеялся. Его позабавила собственная ошибка.</p><p class="p1">– Нам кажется, – сказал Сталин, – что вас прямо-таки ждет работа по руководству Главной летной инспекцией. Вы достигли значительного мастерства, теперь должны передавать свое мастерство молодым пилотам. Это большое поле деятельности, нам много нужно летчиков с боевым опытом. Учеба поставлена совершенно неудовлетворительно, мы принимаем меры, но этих мер совершенно недостаточно. Мы думаем, что у вас получится. Поздравляю вас с присвоением внеочередного звания полковника, отдохните как следует от всех приключений, – он улыбнулся, и в этой улыбке Петров прочел все, – а с нового года приступите. Желаю успехов.</p><p class="p1">Рука его была сухой и очень горячей, и по лицу его Петров понял, что товарищ Сталин мысленно готовится уже к приему следующего посетителя. Петров ушел очень быстро и сразу все для себя понял. Он понял, что у него теперь осталось одно дело – воспитание молодых летчиков, в том числе сына; и в ту же секунду как отрезало все другие мысли. Он не задумывался о том, кто именно и в какой форме сообщил на самом верху о его слишком близкой дружбе с штурманом Степановой, не знал, какую роль играет его моральный облик, и не обсуждал приказаний даже сам с собой. Поля почему-то все поняла, она всегда понимала, а может быть, с ней тоже поговорили. Но уж кто действительно все понял, так это драматург. Он оказался еще и поэтом. Он сразу напечатал стишок о том, что есть такое слово «надо» и перед ним все остальные слова немеют. Стихотворение было включено в цикл «Испанский блокнот», хотя в Испании драматург не был. Зато он был на Халхин-Голе и привез оттуда новую пьесу.</p><p class="p1">В январе Толе и Кушкину дали Героя, тогда же он возглавил инспекцию, и началось для него время такой быстрой и бурной работы, какой не бывало и в Испании. Он постарался загрузить себя больше, чем предписывала должность; взял повышенное обязательство подготовить собственную летную бригаду и показать ее Первого мая на Красной площади; летал по всем пяти училищам, готовившим летные кадры, и с особенной страстью вкладывался в испытания сверхскоростного моноплана, от которых его тоже никто не отстранял.</p><p class="p1">С этим монопланом получалось довольно интересно.</p><p class="p1">Представим себе истребитель, достигающий высоты пять тысяч метров за 4,6 минуты, развивающий скорость до шестисот семидесяти километров в час при моторе в тысячу четыреста лошадей, с уменьшенным перепроектированным крылом. А теперь представим конструктора, подготовившего чертеж такой машины и в разгар работы над ней узнавшего, что он едет в Германию изучать опыт немецких коллег. Что же, сказал Карпов перед отъездом, у нас незаменимых нет, и наверняка проект будет дорабатывать человек достойный. Петров на секунду задумался – может, лучше было бы оставить Карпова? У него были в прошлом неприятности, но ведь давно, и он многократно искупил те ошибки, и будущий истребитель обещал стать лучшим в мире. Правда, нельзя исключать и того, подумал Петров, что в разлуке со своим истребителем его создатель будет работать значительно лучше, как он сам сейчас значительно лучше летает в разлуке с Полей. И она, Петров знал, тоже хорошо летает, ей дали «Красное Знамя», она тоже щедро делится опытом, в том числе опытом выживания в тайге. А поскольку он дал зарок ее не видеть и она не пыталась нарушить этот их негласный договор, ему только и оставалось летать все лучше. Петров даже подумал, что вот в Испании, например, он делал все правильно, и правильно туда поехал, и так хорошо расправлялся с врагом именно потому, что по разным глупым причинам не мог быть с девушкой, которую любил, – только от этого ему и леталось так прекрасно, и не жаль было тех, кого из-за него расстреляли. Лишь на минуту, на одну минуту сказал Петров себе, что, может быть, останься он с Полей, летал бы сейчас гораздо лучше. Но мысль эту отогнал. И опять задумался только тогда, когда на доработку истребителя поставили брата наркома, человека без особенных заслуг, и назвали истребитель МИ в его честь, а не ПО, как следовало бы. Петров знал, что Карпов страшно обиделся. Он вернулся через полгода и сказал: конечно, самолет доводится плохо, но кому жаловаться, если это решение приняли там? – и показал глазами. В Германии можно хоть Герингу пожаловаться, а у нас кому? Петров несколько поежился от этих слов, но с Германией наметилось сближение, прав оказался проклятый Шельхорн, чья фамилия и слова не желали забываться. К тому же не очень хорошо складывалось у тех, которые побывали в Испании, тех, о которых его спрашивали во время единственного разговора. Прямо скажем, складывалось у них плохо. Возможно, это произошло оттого, что они воевали там недостаточно хорошо, но не могли же они выиграть войну за испанцев. Петров некоторых вещей не понимал, он понимал одно – что в сложившихся условиях надо летать как можно лучше и подготовить пилотов как можно больше. Он стал тренировать собственное звено и на первомайском параде показал его прекрасно. Раньше осторожничал, а теперь перестал.</p><p class="p1">Великим утешением был для него мальчик Саня, прекрасный мальчик, неожиданно добрый, и жалко было, что он все время с нянькой. У Тани съемки, театр, шефские поездки опять же. Таня тоже была хорошая, зря он про нее плохо думал в разное время, она была не виновата в том, что она не Поля, вообще не летчица, и несколько раз у них все было замечательно, просто это не то и не так. С Полей, как в ту последнюю ночь в тайге, могло вообще ничего не быть – и все-таки это было полней и лучше всего, что было с Таней. Но получилось так, как получилось, и надо было летать, в полете Петров забывался, только иногда в ясную погоду на хорошей скорости на больших высотах начинал выть. Там все равно никто не слышал. Он выл: как же так, как так. Общий воздух, а летаем все время мимо, никогда не можем совпасть, как эти, честное слово, в сказке, когда он совсем уж было превратился в сокола в надежде закогтить ласточку, но тут она стала ягодой. Несовпадение. Получался от этого воя какой-то нервный подъем, и Кушкин ему сказал однажды: что-то ты, брат, вылетаешь за пределы разумного. Новый истребитель хорошо работал, он помогал истреблять то, что лежало в Петрове тяжелым грузом. Ужасным грузом, надо называть вещи своими именами.</p><p class="p1">И тем не менее было у него чувство, что все изменится, что он как-то Полю выслужит. Он читал сыну – еще ничего не понимающему, но говорят, что надо ребенку читать, он все равно запомнит, – сказку про Ивана, который выслужил себе Василису, и сын вдруг заорал, заплакал, вероятно, давая тем понять, что Иван все правильно сделал. Устами младенца, а в данном случае луженой его глоткой, глаголет истина. А потому, когда Петрова назначили начальником сборов по слепым полетам истребителей, он странно возрадовался, не иначе предчувствие. Стартовать предстояло из Дягилева на И-15, славной простой машине, незаменимой для учебы, – Петров ее отлично знал, составил план полетов, все шло рутинно. И тут ему стало известно. Та-дам! Запело все. Он много раз клялся, что, если их встреча состоится, он будет совершенно равнодушен, но когда узнал, что прибыла штурман Степанова, не просто штурман, а майор, орденоносец, почетная пионерка многих школ и автор книги «Записки штурмана», то было у него чувство, что он может теперь летать без всякого самолета. И первая мысль его была – что это нарочно так сделано, что он выслужил-таки себе это право. На самом верху. Что ему нашли возможность в такой вот завуалированной форме сообщить: да, теперь разрешается. Ну что с вами делать. Если вы не можете друг друга не любить, если все вокруг видят, насколько ты не в себе, – год спустя-то можно, правда ведь? Прошел ведь год без недели, вот они как все подгадали. Не могло же так получиться само. И при первом взгляде на Полю Петров понял: она только этого ждала, только этого. Никак иначе они не могли встретиться. И дальше вернулось то же нарастающее счастье, которое было по пути из Хабаровска: все лучше, все лучше будет! И когда он узнал, что летчик Хващеватов, в паре с которым должна была летать Поля, не явился по причине болезни живота, – Петров сразу понял: подстроено. И как прекрасно, деликатно подстроено! Кому надо – поймет, а кому не надо – не догадается. Однако знающие люди знают и то, что Хващеватов не мог страдать животом, это было немыслимо, он на спор камни глотал, уверял, что может переварить железный болт. И Петров пообещал самому себе, что назавтра закажет Хващеватову торт, огромный торт, – Хващеватов был сладкоежка. А в торт вложит болт, это будет шутка.</p><p class="p1">– Ну что же, – сказал Петров, – раз товарищ Степанова осталась без пары, придется мне стариной тряхнуть. Полетите со мной, товарищ Степанова?</p><p class="p1">– Что с вами делать, – ответила Степанова, счастливыми глазами глядя на него. – Вы только не лихачьте очень сильно.</p><p class="p1">– Что вы, какое лихачить, – сказал Петров с исключительной серьезностью. – Боевая задача, отставить фокусы.</p><p class="p1">Они взлетели третьими, в восемь двадцать. Было запланировано два полета – в первом она под колпаком, он корректирует в открытой кабине, во втором корректирует она; ну, с таким штурманом он бы слетал в Комсомольск и обратно, а не то что в деревню Высокое. Уселись, завелись.</p><p class="p1">– Поля, – очень громко сказал Петров еще на земле, – у тебя есть кто-нибудь?</p><p class="p1">– Будто не знаешь, – ответила она звонким голосом.</p><p class="p1">– Не знаю.</p><p class="p1">– Ну и дурак.</p><p class="p1">– Что дурак, – ответил Петров, – так это точно. Знаете вы, майор Степанова, что я с момента этого полета уже с вами не расстанусь, в чем клянусь вам сыном?</p><p class="p1">– Глупости вы говорите, комбриг, – сказала Поля.</p><p class="p1">– У тебя точно никого? – спросил Петров уже голосом собственника.</p><p class="p1">– Дурак и есть, – ответила она, то ли смеясь, то ли плача.</p><p class="p1">– Ну, – грозно сказал он, – поехали.</p><p class="p1">Они вернулись через полчаса, поменялись, Петров перекурил, и в девять часов десять минут опять улетели.</p></span><span id="id32"><div class="title4">
<p class="p">12</p>
</div><p class="p1">Официальная версия была – вираж на малой высоте, порядка трехсот, и внезапный штопор; фонарь был откинут, то есть Петров контролировал ситуацию, но не успел вывести машину. Подробнейшим образом допросили моториста-сверхсрочника, воентехника первого и спецтехника второго рангов – да, собственно, ни о каком вредительстве не могло быть и речи, хотя у спецтехника второго ранга имелась жена, брат которой замечен был в неоднократном пьянстве и прогулах, из чего можно заключить, как глубока и фундаментальна была проверка; но самолет был в полной исправности. Он вошел в землю под углом 55 градусов на малых оборотах, на скорости порядка двухсот семидесяти или даже двухсот пятидесяти – то ли Петров увлекся лихачеством и задрал нос, то ли Степанова не стала его корректировать, понадеявшись на абсолютную квалификацию комбрига и главного инспектора. Погоны, как мрачно шутят иные асы, подъемной силы не имеют. Наверху были в негодовании. Бровман лично слышал от Дубакова, что на заседании правительства Сталин был в страшном гневе: «Кто виноват в беспрерывных авариях?» Ему сказали: летчики. «Нет! – кричал он. – Летчики нэ виноваты!» Но разбор всех деталей подтвердил: человеческий фактор.</p><p class="p1">– Может быть, – предположил Квят, – они повздорили там?</p><p class="p1">– Толя никогда ни с кем не ссорился, ни в воздухе, ни перед полетом, – твердо сказал Кушкин, он его по Испании знал, сомневаться в его словах было невозможно.</p><p class="p1">Потом, как всегда, возникла версия именно насчет Испании. Высказал ее человек не очень надежный, но журналист авторитетный, причем лично знавший Петрова и встречавшийся с ним там; высказал шепотом, и Бровман, разумеется, внимательно ее обдумал, но согласиться не мог. Выходило, что после испанской неудачи постепенно убирали всех, особенно же тех, кто контактировал с сомнительными людьми в испанском руководстве, где высок оказался процент троцкистов, не говоря уже о том, что Мальро, активно помогавший в закупке и отправке самолетов, близкий друг Теруэля, сам оказался троцкистом и тайным врагом. Петров был герой, на многочисленных марках появлялся не реже Волчака, первым применил ночной бой и пользовался любовью – так вот, чтоб не провоцировать недовольств… Но в такое неуместное коварство не верилось, и потом, если Петров там применил ночной бой, не говоря уж о широко разрекламированной операции «Ход конем», и все это при строгом соблюдении с нашей стороны Парижского соглашения, – за что его-то было? И почему при этом должна была пострадать штурман Степанова, которая ни сном ни духом? Нет, этот испанец из Москвы, европеец из Бердичева, не обладал никакой монополией на информацию, не говоря уж о том, что сам он был слишком близко к Теруэлю, он же Мигель Мартинес, он же тс-с! – теперь уже тс-с по другим соображениям. Правда, у Птухина тоже все обстояло не настолько хорошо, как могло, и даже передавали сказанное им: если меня, как (и называл известную и значительную фамилию), то я больше всего буду жалеть, что не отбомбился по… – но это уж, наверное, вовсе не соответствовало действительности. Птухин жесткий был человек, но не совсем же без головы.</p><p class="p1">Потом странно было, что, когда вечером того же дня Бровман звонил Грибовой, та сказала сначала: ах, я не могу, я вся разбита, я буквально вот сейчас в слезах. Но он настоял: наговорите хоть на тридцать строк, – и к ней отправили стажера Ермакова, которому она полтора часа взахлеб рассказывала, как весело было в тайге. Ну не безумие? Разбита, в слезах, и в день смерти своего штурмана полтора часа, хохоча, рассказывать, как там мимо них сбросили какие-то яблоки! Но взяла себя в руки, наговорила, что потеряла превосходную летчицу, лучшего штурмана, подругу, что берет на себя обязательство участвовать в воспитании ее малолетней дочери, первоклассницы, которую Поля любила больше всего на свете. И повторила со значением: больше всего на свете.</p><p class="p1">С этим тоже, признаться, были связаны разные слухи. О том, что между Петровым и Степановой существовали известные отношения, говорили в открытую, но, во-первых, известные отношения связывали всех со всеми, люди молодые, рискованные, позволено много, все главные герои славной эпохи – режиссеры, актрисы, летчики, полярники, балерины – были связаны тесными, зачастую внебрачными, далеко не товарищескими отношениями. Кто же не знал про (подставьте любые две фамилии), кто не следил, например, за любовью драматурга к актрисе, которая, между прочим, была законная жена героя, и почему бы герою не любить героиню? Главное же – как это могло объяснить происшествие? Как, в самом деле, могло такое случиться, что он уцелел в Испании в бою, рассказывали, с девятью фашистскими истребителями, она выжила в тайге, где десять дней не ела, а потом они разбились на элементарном вираже под Рязанью? Что они, целовались там, что ли? Но даже если вообразить такой романтически-идиотский вариант, конструкция «ишака» исключает любой контакт пилота со штурманом, в особенности когда один под фонарем; даже погладить по голове в этих обстоятельствах было совершенно исключено, хотя чем черт не шутит! Однако, если Петров управлял самолетом, мог ли он рисковать женщиной, которую любил, особенно если учесть, что они перед тем, говорят, давно не виделись и у него, по слухам, что-то было с балериной Телятниковой, а у нее вроде как отношения с учителем, они будто бы познакомились в школе, в дружине ее имени?! Нет, Бровман такую вероятность решительно отметал. Он вообще не очень любил объяснять все эти странные, косяком пошедшие инциденты – с тех самых пор, как Васильев ему сказал: чрезвычайно хороший ты репортер, но… это слово он даже не стал вписывать в дневник.</p><p class="p1">А уж совершенная глупость была, когда Ананьев, хороший, понимающий известинец, побывавший в том числе и в Мадриде во время знаменитого девятнадцатидневного обстрела, сказал: им же намекнули, что хватит. И с тех пор они не виделись. Вот, значит, им показалось, что лучше погибнуть вместе, чем жить поврозь. В Мадриде, рассказывал он, была такая история: ей восемнадцать, ему девятнадцать, у него уже был ребенок, там это рано, и погибли вместе, причем прямо и сознательно искали смерти. Испанские страсти, сказал Бровман. От советских комсомольцев нельзя ожидать ничего подобного. Вы насмотрелись там, в Испании, чего не надо, от таких упадочнических настроений они и проиграли войну, чем нанесли, между прочим, серьезный ущерб нашему престижу.</p><p class="p1">Но своя версия у Бровмана была. Если правда то, что все у них было серьезно, идиотская случайность, которая их свела, заставила Петрова лишний раз хорохориться, и это он перед Полей форсил. А вообще, бывает же, что любовь как бы дает крылья. Вот Петров и подумал, что умеет чуть больше, чуть лучше, – и решил показать ей небывалый форс, вираж на малой высоте, и на этом вираже, на высшей точке мастерства, погиб. Бывает же? Бровман, что греха таить, тоже был когда-то влюблен, это сейчас все его время жрала работа. А тогда он даже писал стихи, и Лапин даже находил у него талант. Бывает, что человек сильно влюблен, долго не видится и при случайной встрече забывается. И хотя все эти версии, чувствовал Бровман, не имели отношения к действительности, а в действительности там было что-то столь же непостижимое, грандиозное и страшное, как летное мастерство Петрова, – все-таки свое объяснение Бровман считал самым близким, и записал его в дневник, и никто его покамест не разубедил.</p><p class="p1">А драматург посвятил молодой вдове Тане стихи про человека, которого она любила и через которого им обоим теперь не дано перешагнуть, – что-то «Ты изменить могла ему живому, но мертвому не сможешь никогда», и еще там была странная строчка: «И так всю жизнь мы пролетали мимо, не в силах в общем воздухе совпасть». Драматурги иногда что-то такое чувствуют.</p></span></span>
