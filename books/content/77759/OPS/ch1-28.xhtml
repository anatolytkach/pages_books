<p class="p">7</p>
</div><p class="p1">Если бы о дальнейшем Дубаков читал в книжке, история их отлета показалась бы ему слишком наглядной, словно выдуманной для доказательства авторского тезиса. Однако так оно и было: можно было прилететь на этот остров, но улететь с него – никак. Дубаков обошел остров с ружьем Фетиньи, подстрелил с десяток куликов, подивился удаче Волчака, который исхитрился приткнуть здесь большую, даже после выработки почти всего топлива тяжеленную машину, но, убей бог, не находил ровной площадки. Был серенький, теплый, мокрый день, и все вокруг говорило: а и не надо вам никуда. Сидите тута. Для довершения чуда подошел к нему гиляк, с косой и в ожерелье из мелочи. Гиляки выходили на тему сразу, без светских вступлений насчет погоды и охоты. Гиляк прямо сказал, что, по преданиям их народа, сюда уже прилетала железная птица, выходили люди, плюнули и улетели, но потом разбились. Вероятно, это были японцы. Ерунда, сказал Дубаков, мы не разобьемся. Японцы никогда летать не умели, а мы большевики. Ни, не японцы, уверенно сказал гиляк, японца мы знаем. Те тоже были большие большевики. Да? – удивился Дубаков. Кто же это сюда залетел? Может, планер из местного аэроклуба? Так вроде непохоже… Ни, не местные, сказал гиляк. Это очень давно было. Это рассказывал моему деду его дед, а тому его дед. Местный миф, понял Дубаков, на железной птице перемещались боги… Ты понимаешь, сказал гиляк, они улетели и от этого погибли. Наш народ говорит: если вы останетесь, то не погибнете. Кто к нам прилетит и останется, тот сам себя спасет, нас спасет. Мы тому зенсину дадим, есть зенсина. Молодая, красивая. Постарше тоже есть. Надо у нас оставаться, тогда все спасутся. И мы, и вы, и они. Кто «они» – гиляк не мог объяснить, вероятно, боги. Слушать про все это было не страшно, а бесконечно грустно. Сидит на острове несчастное племя, стреляет куликов, ловит лосося, или кого оно тут ловит, – Дубаков плохо разбирался в миграциях рыбы – и мечтает отдать свою лучшую зенсину стальной птице, которая наконец обратит на них внимание, но все только улетают и разбиваются. Нормальный такой миф о гиляках, которые в центре мира, у каждого народа такой наверняка есть… но, примерив его на большевиков, Дубаков воздержался от дальнейшего обдумывания.</p><p class="p1">Волчак тем временем выступал с Чернышевым на заставе, куда их доставили катером. Вернулся он воодушевленный, ему там сказали, что Буркин идиот и всех утомил, и большинство оказалось на него не похоже. Волчак убедил пограничников, что в каждой воинской части нужна парашютная вышка, как еще натренировать личный состав на действия в условиях внезапной опасности?! Он также утешил личный состав, сообщив, что пограничники нужны только в мирное время, в военное они без надобности, да и воевать, вероятнее всего, придется на чужой территории.</p><p class="p1">Дубаков доложил, что по результатам осмотра острова для взлета более или менее пригодна полоса вдоль берега на другом конце острова, но туда придется перегонять самолет вручную либо гужевым образом. Задействовать придется все население. Для Волчака это не было препятствием, он был теперь Герой Советского Союза и уже наутро организовал доставку. И вот очередная картинка: население будущего острова Волчака – переименование официально совершилось уже в следующем году, – впрягшись в самолет, волоком тащит его к месту старта. Это тоже было похоже на иллюстрацию к притче: будущее прилетело в нашу глухомань и рухнуло на нас, и теперь мы тащим его через болото, чтобы оно улетело и оставило нас в покое. Но будущее никуда лететь не хотело, колеса попадали в ямы с водой, и Волчак быстро смекнул: э, так мы доломаем последнее. Взлетку надо строить, вариантов нет.</p><p class="p1">Это было не то что верное, а единственное решение. Чернышев сразу его оценил и принялся рассчитывать длину и ширину, а Волчак быстро объяснил на заставе все значение стройки. Через два дня прилетели ремонтники из Москвы и тут же занялись шасси. К этому времени приехали газеты, в «Правде» был огромный портрет Волчака и статья Громова, в «Известиях» – интервью Бровмана со Шмидтом и приветственная телеграмма полярного исследователя из Штатов. Волчак для порядку побурчал, что мы во всем сами с усами, а как надо оценивать своих, так у нас на первых полосах мнение американцев, словно мы все это только для них, но доволен был необыкновенно. Взлетную полосу для АНТа построили за четыре дня – приехали плотники из Николаевска и сколотили такую дорожку, что любо-дорого. Волчак, только что готовившийся к опале, теперь распоряжался на строительстве что твой прораб и поторапливал во время перекуров. Топлива хватало до Хабаровска и больше – решили после Хабаровска сесть еще в Чите и Красноярске. Москва регулярно выходила на связь, передавала приветы от жен и детей, сообщала о торжественных встречах по ходу – Волчак притворно хмурился и бубнил, что не хватало гробануться на обратном пути, – видно было, что находиться на острове ему уже невыносимо. Вдобавок к Дубакову еще раз подошел гиляк в ожерелье из мелочи и снова попросил остаться, потому что дальше края света они все равно не улетят.</p><p class="p1">– Слушай, – сказал обозлившийся Дубаков, суеверный, как все герои. – Если хочешь, мы тебя отсюда увезем, а меня ты больше не агитируй.</p><p class="p1">– Нет, зачем увезем, – сказал гиляк равнодушно. – Мы дома, куда нам.</p><p class="p1">Наутро они улетели в Хабаровск. Фетинья выстрелила им вслед из ружья.</p><p class="p1">В Хабаровске их поджидал Квят. Он называл себя королем московских репортеров, все к этому привыкли и тоже называли его так, но кавычки буквально висели в воздухе. Квят был мал, юрок, похож на Цугцвангера, которого сопровождал по стране, и опостылел тот ему до нервной дрожи. Теперь он напросился с АНТом лететь в Москву – специально добирался из Петропавловска, где поджидал их, и уж в Хабаровске-то упустить не мог. Квят был летописец полярных зимовок, дежурил в приемной Ширшова, делал серию разговоров с челюскинцами, но всерьез не воспринимался – очень был суетлив; вот Бровман был у летчиков за своего, или, по крайней мере, так считал, а Квят плохо знал технику и не по делу болтал. Однако Волчак по мере приближения к Москве становился добродушней, словно чувствовал близость славы, и согласился ради репортажа взять Квята в Читу, а оттуда пусть добирается как хочет.</p><p class="p1">В Хабаровске их принял на собственной даче Блюхер, первый маршал, орденоносец и большой фантазер. Волчак пробовал отказаться от застолья, уверяя, что пить перед вылетом не может, – у него был теперь другой хмель, он хотел поговорить с молодежью, его приветствовали полярники; Дубакову казалось потом, что именно после встречи в Хабаровске Волчак начал чувствовать себя вождем советских авиаторов, как бы их полпредом во всех других сферах, перед детьми, перед американцами, – одновременно вождем и послом небольшого, но популярного племени. Но Блюхер был человек широкий, хотел похвастаться дачей в тайге, олениной во всех видах, с клюквенным вареньем, с какими-то особыми квашеными грибами, двадцатидвухлетней красавицей женой, прислугой в кружевных чепцах; жил размашисто: «Вы, товарищ Волчак, в каком звании? А я маршал, в машину марш». Он много рассказывал о том, что маршалом Блюхером прозвал его прадеда, крепостного крестьянина Феклиста, помещик Кожин за героизм в двенадцатом году; что сам он, Блюхер, в госпитале видел и чуть не употребил императорскую дочь, потрясенную его мужеством; что, если бы не он, Перекоп брали бы еще месяц, а там и зима, и Крым держался бы до лета; ругал начальство за непонимание местной специфики, но, разумеется, трижды пил за Сталина. Сталин мне про вас лично звонил, сказал маршал, и приравнял ваш полет к учениям двух дивизий. Двух! За это выпили отдельно. Будет большая война, – сказал Блюхер, как большой секрет, то, что все и так знали, но он, вероятно, полагал, что титул придает его словам особенную увесистость. Для большой войны нужен большой человек. Все сдержанно покивали и опять выпили. Дубаков спросил про Фрунзе, Блюхер не поддержал разговора. Постепенно маршал грустнел, заговорил о смерти – цыганка ему нагадала, что смерть будет не от сабли и не от пули, и потому он в бою ничего не боялся, «и пока, оказывается, не врет», – а потом все упоминал каких-то врагов, которые окружили его со всех сторон. «Японцы?» – предположил Чернышев. «Японцы? А, что они умеют…» Это был уже второй человек после гиляка, оценивший японцев скептически. Блюхер рассказал, что японцы достигли совершенства в одной области – в самоубийствах; вот тут у них есть чему поучиться, я бы некоторым посоветовал, – и после этого немного взбодрился. Человек прошлый, сказал Волчак, когда они с утра готовились к взлету. Я этот тип знаю, достойный человек, но весь остался там; на современной войне нужно другое. Волчак уже брался решать, кто нам нужен, а кто не нужен, – и нельзя было не залюбоваться этим человеком, пришедшимся настолько ко времени.</p><p class="p1">Квят ночевал на аэродроме, вид имел помятый, его знобило. Кстати, заметил Чернышев, вот мы его берем – Квят был так устроен, что о нем почему-то хотелось отзываться пренебрежительно, в третьем лице, – а кислородных аппаратов у нас три. Да ладно, сказал Волчак, авось не понадобится. Да и потом, репортером меньше… Сбросим над тайгой, пускай летает, будет ему материал на книгу «Как я жрал сапоги». И поначалу в самом деле ничто не предвещало, шли на тысяче, но тут пришла облачность, о которой не предупредила метеослужба, до Читы оставалось десять часов, Волчак решительно полез вверх, и Дубаков ему доложил, что журналист дышит как рыба. Волчак оглянулся: действительно, корреспондент сидел весь белый с лиловым оттенком, лбом припав к иллюминатору, и всем лицом изображал, что осталось ему немного, но умирает на посту и просит учесть в некрологе. Дай ты ему маску, сказал Волчак. Маску я ему дам, но что мы будем делать на шести? На этот вопрос у Волчака не было ответа, шесть вполне маячили, и на этой высоте управлять машиной без кислорода не мог бы даже автопилот, и то если его, как обещал Антонов, сконструируют к концу сороковых. Квят посмотрел на Волчака и дурацки улыбнулся. Тьфу, черт, сказал Волчак. Я подумаю. Пока он думал, Квят потерял сознание.</p><p class="p1">Через два часа, уже в темноте, под проливным дождем, накрывшим Хабаровск, они приземлились. В аэропорту пребывали только два дежурных механика, все давно разошлись, и от торжественного митинга, которым их провожали, остались лишь мятые бумажные цветы. Прямо хоть лети обратно на остров, подумал Дубаков. Крепко нас держит та деревня. Неожиданно пришел в себя Квят. «Это Чита? – спросил он бодро. – Быстро!»</p><p class="p1">– Это Хабаровск, – милосердно пояснил Чернышев.</p><p class="p1">– Не может быть, вы что, почему вернулись?! – забеспокоился Квят.</p><p class="p1">– Да затесался с нами один, – сказал Волчак. – Говорили ему, дураку, маски не хватит, нет, поперся…</p><p class="p1">– Ребята! – не поверил Квят. – Вы из-за меня?!</p><p class="p1">– Ты, товарищ Квят, находишься не в буржуазной Америке, – назидательно сказал Волчак. – Жизнь каждого человека у нас ценна, а там бы тебя выкинули на фиг над какой-нибудь прерией, и сейчас бы ты еще летел. А у нас ты как у Христа за пазухой.</p><p class="p1">Но шутил он больше для порядку, ему было грустно. Слава кончилась, герои сидели на хабаровском маленьком аэродроме в большом чужеродном самолете, лил тропический дальневосточный дождь, ни огня кругом не горело, да и в городе, над которым они кружили перед посадкой, их было удивительно мало. Какая-то была непостижимая печаль во всех этих бесконечных пространствах – не ужас, а прежде всего грусть, серо-синего, рассветно-школьного чернильного цвета. Оттого ли она происходила, что самый большой самолет все равно бесконечно мал на фоне воздушного океана, оттого ли, что всем этим пространствам нет никакого дела до того, кто их покоряет, а может, оттого, что сама страна похожа на это пространство, и сегодня ты герой, а завтра она тебя забыла… Всякое большое пустое место наводит на сходные размышления, и дождь добавляет им убедительности. Грустная тайга, грустный в ней город, невыносимо грустный серый за ней океан окружает острова с печальными гиляками, которые все ждут, кому бы сбагрить своих грустных-грустных женщин в ожерельях из мелочи, сплошная слезная печаль разлита в воздухе, и только эфир связывает всех: станет грустно какому-нибудь индейцу в прерии – ему отзовется одинокий мальчик-радиолюбитель у себя на чердаке в Калуге. Волчак представил мальчика-радиолюбителя, который непременно погибнет на большой войне, предсказанной маршалом Блюхером, представил гигантский океан, лежащий между мальчиком и индейцем, ржавыми крышами Калуги и желтыми шакалами пустыни, – и понял, что человек, покоритель пространств и победитель стихий, со всем этим ничего не сделает. Такое чувство иногда накатывало на него с очень сильного похмелья, Волчак тогда готов был заплакать хоть над цыганским романсом. Сейчас эта печаль была невыносима, но почему-то очень сладка. Он как бы в ней растворялся.</p><p class="p1">– Ладно, – сказал он после пятиминутного печального молчания. – Поедем в город, выпьем по-человечески.</p></span></span>
