<p class="p">9</p>
</div><p class="p1">А вопрос, о котором не мог рассказать Волчак, решился все же в отрицательном смысле, и потому в Париже Волчак без особенной охоты рассматривал экспонаты, а в Марсель, куда им специально устроили экскурсию с морскими купаниями, и вовсе не поехал. Он всерьез полагал, что из Парижа его хоть на неделю, раз уж так близко, отправят в Испанию и позволят в деле показать все, что умеет И-16. Он просился в Испанию трижды, теперь вот лично у Сталина, и ему пообещали, что все рассмотрят, но, видимо, рассмотрев, передумали. Волчак попробовал закинуть удочку еще во время посадки в Кенигсберге, где их встречал генконсул, но тот сказал загадочно: что там Испания, в Испании уже ничего не решается. А вот здесь – здесь будет решаться многое, и скоро; но вдаваться не стал. Волчак понимал, конечно, где он нужнее, понимал и то, что перелет через полюс решен и рисковать теперь он не имеет права, – и, может, даже рад был, что его так оберегают. Но он считал нужным изобразить недовольство и даже тоску, а потому в Марсель не поехал, а остался в Париже.</p><p class="p1">Экспонаты были осмотрены и переписаны в блокнот, Волчак заметил ряд вещей интересных, но они были бы интересней конструкторам, а послали их, летчиков, потому что конструкторам по рангу не полагалось выезжать за рубежи, их могли украсть, да мало ли. Единственным исключением оказался Антонов, которому и это потом поставили в вину. Из любопытных вещей в Гран-Пале, то есть в Большом дворце на правом берегу Сены, где разместилась выставка, были представлены: одноместный цельнометаллический истребитель «Луар-250», развивающий до пятисот, весом всего две тонны, забирающийся на пять км вверх за пять минут, красивая, уж подлинно шикарная, с низким крылом машина с шасси, целиком убирающимся в крыло; голландский «Кольховен ФК-55», с носа похожий на снаряд, а в закабинной части на лодку, с четырьмя пулеметами на крыльях, на километровую высоту взмывающий за минуту; трехместный француз «Потэз-63», с двумя моторами от «Испано-Сюизы», каждый по шестьсот семьдесят лошадей, изумительная машина, наверняка легкая в управлении, но с уязвимой и сложной системой рулей (зато с дальностью до полутора тысяч). Некоторое впечатление производил единственный на всей выставке автожир «Леоре-Оливье», разведывательный, по испанской лицензии; пожалуй, лет через пятнадцать в таких будут летать на службу. Все это были хорошие машины, элегантные и прочные, но служили скорей для демонстрации своих возможностей: в реальной драке Волчак представить их не мог. Это были мушкетеры, а нам требовались кулачные бойцы вроде «ишачка», который можно изрешетить, но не лишить управляемости, простые, дешевые, зависящие не от погоды и даже не от прочности, а исключительно от качеств пилота, который и был главной их деталью. Таких пилотов не было больше нигде, и потому на выставке главным экспонатом был даже не огромный краснокрылый АНТ с его тридцатичетырехметровыми крыльями, а они, летчики, пролетевшие на нем из Москвы на Охотское море. Здесь тоже имелись прекрасные летчики, кто спорит, но они не были впряжены в одну барку с человеком, которого некому остановить. Они все умели – и только; наши пилоты все могли, потому что у них не было другого выхода.</p><p class="p1">У Волчака оставались в Париже два свободных дня. Один он решил потратить на неспешное знакомство с <em>Caudron-Renault</em> 640, подготовленным для кругосветки. Это была машина сугубо мирная, а потому уязвимая. Кабина пилота была сдвинута назад. Волчак осматривал его подробно и придирчиво. Втайне он опасался, что у французов все получится, но с первого взгляда понял, что ни в какую кругосветку этот «Тифон», как его называли, не полетит. Скоростные рекорды на них ставить можно, а для дальних перелетов слаб казался хвост, но это уж надо смотреть в полете. Это была красивая машина, сооруженная по инициативе Жана Мермоза, человека тремя годами постарше Волчака. Он ничего не читал о Мермозе: хорошо знал биографию Линдберга, слышал о Раймоне Дельмоте и даже был ему представлен, а имя Мермоза – нет, ничего не говорило. Он попросил переводчицу, очень милую, совсем советскую девочку, хотя с настоящим французским шиком, подвести его к Мермозу или, лучше, Мермоза к нему, как получится. Девочка была хотя эмигрантская, но, намекнули ему, из семьи, работавшей на нас; она помогала на писательском конгрессе, отец ее хорошо себя зарекомендовал, раскаялся еще в двадцатые, в общем, она и сама думала вернуться, но были трудности. Волчаку переводчица нравилась исполнительностью, делала она все весело, и совсем не было в ней этой шершавости, ершистости, которыми так гордились комсомолочки; какая-то она была добрая, а он такие вещи ценил, потому что самому ему этого не хватало. Звали Аля. Ни про какие вольности с ней он не думал, ни-ни, не для этого она, но если бы приехала в Союз, это было бы хорошо. Нечего ей тут делать, не все ж на выставках переводить.</p><p class="p1">Мермоз ему понравился – повыше ростом, пожиже в кости, но мужик крепкий, и Волчак с первого взгляда благодаря чутью, которое в воздушных делах ему не изменяло, опознал в нем пилота, малого с риском и удачей, хотя, судя по шрамам, несколько раз бившегося сильно. Он собирался лететь в кругосветку будущей весной, если добудет средств. У нас с этим было проще. Мермоз пригласил Волчака пройтись до ближайшего кафе, знал он тут одно, где подавали прекрасные коктейли, – Волчак сказал, что пить не будет, должен беречь форму, но с удовольствием посмотрит, как это получается у других. Аля щебетала, изо всех сил налаживая между ними связи, задавая общие вопросы, и очень искренне, – ей, видно, действительно было интересно, что пьют в полете, и хочется ли есть, и почему собачья шерсть теплее медвежьей.</p><p class="p1">– А что вас заставляет, – спросила она в кафе, и опять у обоих, – ставить рекорды? Понятно, когда спортсмен. Он обычно ничем не рискует, максимум травма. Но почему на самолете?</p><p class="p1">Мермоз, который был даже слишком галантен и обращался к ней, словно к дитю неразумному, пояснил, что им движет жажда первенства, вполне естественное тщеславие, что мужчины всегда стремились таким образом заявить о себе, что раньше это были рыцари, а потом тореадоры, – он даже напел из арии Эскамильо: <em>«Et songe bien, oui, songe en combattant qu’un œil noir te regarde, et que l’amour t’attend, Torе́ador, l’amour, l’amour t’attend!»</em> Говорил он, как если бы давал интервью газетчикам.</p><p class="p1">– А меня, – сказал Волчак несколько агрессивней, чем хотел бы, – личная слава меньше занимает, меня занимает моя страна и ее первенство, ее слава. Нельзя сказать, чтобы меня вовсе уж не радовало, когда на улицах здесь узнают, и вообще, дурак только не любит славу. Но все, что надо мне лично, у меня уже есть.</p><p class="p1">Мермоз покивал, давая понять, что условности соблюдены.</p><p class="p1">– Меня, – сказала Аля, искренне волнуясь, – занимает не совсем это. Я имела в виду, испытываете ли вы особенные ощущения, когда достигаете такой, знаете, небывалой скорости или когда поднимаетесь на особую высоту. Я читала Экзюпери, «Южный почтовый» и «Ночной полет», он пишет, что совсем другие чувства…</p><p class="p1">– Экзюпери? – переспросил Мермоз. – Я летал с ним, сперва в почтовых рейсах, потом в Бразилии… Он неплохо пишет. Но писатель он лучше, чем летчик… У Экзюпери, когда он летает, черт-те что в голове.</p><p class="p1">– Он у нас был, – сказал Волчак, – на самолете-гиганте летал, на «Горьком». Не управлял, в гостях был. Но так, по отзывам, он понимает… Просто, Аля, там, когда летишь, – там про особое чувство не думаешь. Ну, думаешь иногда, что очень большая страна. Как океан и даже больше. Но вообще, все больше за приборами следишь…</p><p class="p1">– Все это, – сказал Мермоз, – для посредственных летчиков. Вся эта лирика.</p><p class="p1">Волчак одобрительно кивнул.</p><p class="p1">– Раньше, – продолжил Мермоз, – думали, что для человека скорость в семьдесят километров смертельна. Что кровь закипит. Ну не дураки? Потом – что двести километров человек уже не выдержит. А сейчас есть самолеты, делающие шестьсот, и это не предел. Я знаю, мне говорил конструктор еще в двадцатые, что и тысяча километров в час не предел, хотя это близко к скорости звука, а быстрее собственного звука самолет вряд ли может лететь… Или по крайней мере, мы не знаем, что там будет с мозгами, возможно, они и вскипят. Но человек, подсказывает мне мой опыт, чрезвычайно выносливая машина.</p><p class="p1">– Просто, видите ли, у нас был друг дома, – простодушно поясняла Аля. – Он часто приходил к моей матери, учился у нее писать стихи. Он погиб в метро, под поездом, глупо. А ходил всегда в горы, в Альпы, и говорил, что на большой высоте все другое. Там эйфория.</p><p class="p1">– Это может быть просто от недостатка кислорода, – прозаически заметил Волчак, – или от белизны. Но в самолете же маска. Задохнуться не дают. Нет, альпинисту не надо столько всего контролировать. Мы себя там держим – знаешь как? Там не до этого всего.</p><p class="p1">– Человек на большой высоте, – сказал Мермоз философически, выпив стопку зеленой какой-то дряни, – может возгордиться. Это да, это возможно. Тут самое главное – не начать мечтать, что ты уже все, что ты уже выше всех…</p><p class="p1">– Но чтоб нам не возгордиться, о себе не возмечтать, поспешим оговориться, – добавила Аля, не удержавшись.</p><p class="p1">– Ну, у нас не очень-то позволят нос задрать. Мы все-таки в коллективе, – сказал Волчак. – Я не сам по себе взлетел, я всегда помню, кто меня поднял.</p><p class="p1">– Если вы имеете в виду конструкторов, – сказал Мермоз, который ничего толком не понял, – то здесь у меня как раз претензии. Наши самолеты пока хуже наших летчиков. Мне не нужны от самолета ни сверхвысокие скорости, ни благородство форм, ни даже полная автоматизация управления. Мне нужно одно: надежность. Это единственное требование к самолету, а наши конструкторы не желают этого понимать. Ваши машины производят впечатление много большей надежности. Вы привезли интересные образцы, вообще, выставка показала, что главным направлением всего поиска в мире стала авиация. Мы заняты делом первоочередным. И если я знаю, допустим, что у вас многого еще не хватает, в смысле вещей или еды, то вы правильно делаете, что вкладываетесь в самолеты. Тот, у кого сейчас хорошие самолеты, тот будет получать впоследствии и еду, и все.</p><p class="p1">Волчак кивнул.</p><p class="p1">– Я не про конструкторов, – произнес он. – Я понимаю, что летаю от имени народа. Это вот действительно интересное чувство – когда тебя словно держит в воздухе весь народ.</p><p class="p1">Аля перевела «дыхание всего народа», так было поэтичнее.</p><p class="p1">– Что касается народа, – заметил Мермоз, опорожнив еще один стаканчик (тут это называлось пти-вер), – то ему, по-моему, совершенно это все не нужно. На народ оглядываться – безнадежное дело, никто из великих не думал о народе. Ленин, например, не думал, хотя про него говорил. Народу ничего не нужно, кроме как <em>bouffer.</em> Народу не интересно, как я летаю. Народу интересно смотреть, как я буду падать, но надеюсь, что народ этого не увидит.</p><p class="p1">– Вашему народу не интересно, нашему интересно, – возразил Волчак. – Наш народ не увлекает зрелище, когда кто падает. Этот самолет не мой частный, он народная собственность, народ не заинтересован, чтоб он падал…</p><p class="p1">– Вы же не на конгрессе партии, я такой же пилот, как и вы, – сказал Мермоз, но Аля не стала этого переводить.</p><p class="p1">– Скажите, – спросила она поспешно, – люди, которые много рискуют, которые бывают на высоте, опознают друг друга? Есть чувство, что вы принадлежите к тайному братству? Я знала нескольких игроков, их отличало то, что они все легко относились к деньгам. Сегодня ушло, завтра пришло. <em>L’argent est fait pour rouler</em>, – добавила она для Мермоза. – А вы? Может быть, вы как-то особенно ходите, иначе говорите?</p><p class="p1">– Мы никогда не говорим «последний полет», – сказал Волчак, – говорим «крайний». Это суеверие.</p><p class="p1">– Мы не говорим «до свиданья», – признался Мермоз. – Просто желаем удачи.</p><p class="p1">– Слова есть всякие профессиональные, – подтвердил Волчак.</p><p class="p1">– Ну, и потом немного видно будущее, – сказал Мермоз. – На высоких скоростях видно не только предмет, но и обратную его сторону.</p><p class="p1">Он привирал, но читал такое в одной статье про Эйнштейна.</p><p class="p1">– Будущее видно, – согласился Волчак. – Только не свое, свое никогда не видно.</p><p class="p1">– И что же вы можете предсказать мне? – спросила Аля, вся напрягшись. Она собиралась принять одно важное решение.</p><p class="p1">– Вы будете счастливы со своим избранником, – галантно сказал Мермоз.</p><p class="p1">– Ты только делай, что хочешь, все и будет как надо, – вдруг решительно посоветовал Волчак. – Хочешь ехать – ну и езжай, никого не слушай. А ты… – Он обратился к Мермозу. – Я смотрю вот на тебя и вспоминаю Максимова. Был такой Максимов. Дружок мой. Выдающейся храбрости был человек. Он мне сказал незадолго… ну, там несчастный случай фактически… Большая глупость, но, как у всякой глупости, есть имя и фамилия. Он мне сказал тогда напоследок: времени очень мало. И так и оказалось, что у него мало времени. Это теперь примета, я так понял. Нельзя это говорить. Если не будешь этого повторять, нормально все будет.</p><p class="p1">Волчак вроде и не пил, но чувствовал к этому рослому парню большое расположение, и ему хотелось чем-то с ним поделиться.</p><p class="p1">– Мне служит талисманом эта вещь, – сказал Мермоз и показал оранжевую коробку гостиничных спичек из чилийского Сантьяго. – Я себе отсыплю половину, а ты возьми. Пригодится. В следующий приезд привезешь советских.</p><p class="p1">Несмотря на базовую разницу в отношении к классовой природе авиации, они расстались весьма довольные друг другом.</p><p class="p1">На следующий день Аля решила показать Волчаку Париж, но разговоры шли не о Париже. Между тем город был прекрасен в осеннем свете; он был весь сиреневый под ясным небом, потом налетел короткий дождь, и все снова расчистилось. Але хотелось поговорить о многом, и Волчак для этого был как раз тот человек. Он не получил образования, кроме профессионального, но с его высот ему было видно существенное, и это существенное не затемнялось всякими вычитанными откуда-то абстракциями. И Аля стала рассказывать ему про Рене Домаля.</p><p class="p1">Домаль был сынок богатенького отца, наркоман и искатель истины. Всего этого было бы совершенно достаточно, чтобы его презирать, но он с такой насмешливостью относился к себе, что Аля его уважала и даже немного сострадала. Он учился у Гурджиева и, что самое удивительное, верил ему. И хотя у Гурджиева на лице было написано неприкрытое, радостное шарлатанство, но он был такой витальной фигурой, что хотелось у него чему-нибудь научиться. К сожалению, учил он совсем не тому, потрошил бедных европейских туберкулезников, заставлял их питаться кислым молоком, а сам с наслаждением, с живейшим аппетитом, с озорным подмигиванием пожирал самый лучший, слюший, шашлык и объяснял это тем, что о своем здоровье не печется, жертвует им в пользу страдальцев; правда, если б кто-нибудь внимательно к нему присмотрелся, мог бы набраться настоящего ума. Домаль пытался делать по советам Гурджиева бессмысленные изматывающие упражнения, записывал Гурджиевы безумные откровения, которые сам Гурджиев забывал через минуту, и втолковывал Але, что не важно, понимает учитель что-нибудь или нет, важно, что через него идет поток. Домаль писал роман «Гора Аналог» – огромный, такой же колоссальный, как описываемая им гора, роман о восхождении к истине; писал в год по главе и сейчас был на третьей, но все здание в целом рисовалось ему ясно. Алины французские друзья все были альпинисты или горнолыжники, потому что аэроклубов было два на весь Париж, и ее друзьям они были не по карману. Зато в Советской России, где не было чулок, вина, конфет, сыров, а в провинции, писали, вообще ничего не было, аэроклубов было много…</p><p class="p1">Аля никак не могла перейти на «ты» с Волчаком, хотя он уже и забыл, что церемонно выкал ей сперва. Она была теперь для него свой парень. Она пыталась объяснить ему главное и не могла. В отличие от других русских, в том числе писателей, приезжавших на конгресс в прошлом году, он почти ничего не покупал, не просил Алю помочь ему с выбором подарков жене, купил только смешной теплый комбинезончик дочери и коробку с железной дорогой для сына, все это приказал доставить в отель, расплачивался без сомнений, словно вообще не был стеснен в средствах – ни дома, ни здесь. Да у нас все есть, объяснял он, что мне здесь покупать, жена у меня не тряпичница.</p><p class="p1">Аля пробовала ему рассказать, почему вчерашний разговор Волчака с Мермозом был ей так важен и в некотором смысле необходим. Понимаете, повторяла она, вы как бы летаете на разном топливе. Подождите, я объясню. Он поднимается на своем «я», оно у него замечательное и выдающееся, но его толкает вверх эта тяга везде утверждать себя, быть лучшим, быть единственным. Вас толкает другое, вам хочется принадлежать к лучшей стране, в перспективе, страшно сказать, тоже единственной. И я думаю – хотя кто я такая, но имею же я право, в конце концов? – что ваше топливо лучше, что ваше топливо безопаснее. Потому что – вот сейчас главное – потому что вам ведь все это нужно только для разгона. Как взлетная полоса. И оторваться от страны еще можно, но оторваться от себя нельзя… Поэтому Мермоз ограничится рекордами. А вы можете взлететь гораздо выше, но для этого надо в конце концов…</p><p class="p1">Она не решилась договорить, да и не могла сформулировать. Волчак рассеянно кивал, не очень понимая, о чем она. Девушка она была явно своя, но выражалась путано. Ей надо было мужа хорошего, и лучше в Москве, а еще лучше на Волге. Он так прямо ей и сказал. Они посмотрели Пантеон, Дом инвалидов, Триумфальную арку. Аля устала, побледнела, потому что Волчак ходил очень быстро. На прощание он сказал ей, чтобы она в Москве, когда приедет, ему позвонила – вот телефон.</p><p class="p1">А буквально месяц спустя она прочла в газетах о гибели Мермоза, который на гидроплане «Южный крест» вылетел в море. У него барахлил мотор, техники посоветовали менять, а он сказал: нет времени ждать и улетел после быстрого и поверхностного ремонта. Четыре часа спустя от него пришла радиограмма, что мотор отказал, – и тут же прервалась, и больше его никто никогда не видел. Аля сразу вспомнила слова о том, что совершенно нет времени, и о том, что у Мермоза плохое топливо. Мермоз теперь улетел несравненно дальше, он был теперь в тех сферах, про которые она читала Волчаку:</p><div class="poem">
<div class="stanza">
<p class="v">Но – сплошное легкое —</p>
<p class="v">Сам – зачем петля</p>
<p class="v">Мертвая? Полощется…</p>
<p class="v">Плещется… И вот —</p>
<p class="v">Не жалейте летчика!</p>
<p class="v">Тут-то и полет!</p>
</div>
</div><p class="p1">Волчак ничего не понял, конечно. Она сама не очень понимала. Но эти строчки были хороши, похожи на смерть, о которой говорили. Мать давно перестала быть понятной и давно перестала этого хотеть, и то, что ей казалось теперь поисками совершенства, было уже бессмыслицей. Но пока она эту бессмыслицу сочиняла, безумие ей не грозило.</p><p class="p1">Ну, подумала Аля, Волчак-то не такой. Волчак будет летать еще долго. Вопрос – где приземлится?</p></span></span>
