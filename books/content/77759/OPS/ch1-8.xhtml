<span id="id9"><div class="title2">
<p class="p">Глава вторая</p>
<p class="p">Сеть</p>
</div><span id="id10"><div class="title3">
<p class="p">1</p>
</div><p class="p1">Все люди делятся на две категории, говаривал Царев, но критерий деления утрачен. Дореволюционный поэт писал, что все люди делятся на тех, кто уже покупал гроб, подушечку и прочие принадлежности, – и тех, у кого это впереди. Люди двадцатого века делятся на тех, кто уже переодевался в казенное, сдавая все свои вещи и вместе с ними прежнюю жизнь, и тех, кому это предстоит. Некоторые ошибочно полагают, что существует третья категория, которой не предстоит, но строгая наука не тратит время на полемику с дилетантами.</p><p class="p1">Пока Антонов находился в активной фазе следствия, мыслей у него не было, кроме одной: черта с два я буду вам когда-нибудь делать самолеты. Он не мог даже сделать следующий логический ход: самолеты он делал не им, а себе. Их он использовал в качестве стартовой ступени – прекрасная идея Царева, которому тоже, он знал, не поздоровилось. Стартовая ступень отваливается, а ракета уже высоко.</p><p class="p1">В активной фазе некоторые мысли додумывать нельзя. Само собой, начисто отсекаются воспоминания детства, мать, отец, первые книжки, первые планеры; отсекается прошлое и по возможности будущее. Прошлое растравляет, будущее расслабляет. Нужна сильная концентрация ненависти, и в ней у Антонова недостатка не было. Но теперь, когда у него появилось время для размышлений, как раз для них ему и предоставленное, – он выстроил себе теорию, в которой возможно было жить.</p><p class="p1">Ни в одно историческое время не появлялось столько всеобщих теорий всего на свете, как в те годы. Нельзя было жить, не объяснив, и холодным умом конструктора Антонов разделил все эти теории на три разряда: исторические, религиозные и верные. Исторические нащупывали целесообразность: так надо, чтобы в один прыжок преодолеть вековую отсталость, чтобы всех мобилизовать, чтобы слюнтяи и трусы не смели шипеть по углам, чтобы подготовиться к неизбежной войне, а возможно, выявить тех железно-каменных бойцов, которые все вынесут и ничего не подпишут. Такие теории ему нашептывали в камере, они исходили не из причины, а из цели и потому были неопровержимы: целей не знает никто.</p><p class="p1">Религиозные были витиеваты. Один профессор, сугубый атеист, уверовал, что явился с инспекцией дьявол. В уме профессор занимался периодизацией этих инспекций и нашел, что они случаются раз в два в энной степени плюс три в степени эн плюс один лет. Предыдущая была во время Наполеона. Все это было не так глупо, как выглядело. В другой теории что-то говорилось про чередование эпох пламени и льда. Все эти теории преследовали одну цель – дать своим создателям чувство правоты или хоть величия, тогда они выходили свидетелями небывалого или искупительными жертвами. Антонов понимал таких людей, им нечем было утешаться, а что их не интересовала истина – так она вообще мало кому нужна.</p><p class="p1">Верную теорию отличало то, что она не исходила из земных нужд, как будто человек был не главным обитателем Земли, а скорее побочным эффектом более важного процесса. Верную теорию рассказал Антонову историк немецкой литературы, беспечно переведший одного драматурга, пять лет спустя оказавшегося фашистом. Драматург сначала был антифашистом, но передумал, а историк этого не предвидел. Историк давно уже догадался, что Бог потерял интерес к проекту примерно сразу после того, как человечество отказалось принять его сына, а некоторые даже заявили: «Кровь его на нас и на детях наших». После этого было решено, что отныне проект курирует специально назначенная сущность, про которую сказано: <em>«Ich habe deinesgleichen nie gehaßt. Von allen Geistern, die verneinen, ist mir der Schalk am wenigsten zur Last»</em>. Что означает: «К таким, как ты, вражды не ведал я… Хитрец, среди всех духов отрицанья ты меньше всех был в тягость для меня». Этот дух есть безусловно чернорабочий, но человек другого и не заслуживает, коль скоро отверг Сына Божия. Поэтому теперь человечеством занимается так называемый Хитрец, задача которого – поддерживать большую часть людей в состоянии приятного, желательного для них рабства. Тех, кто что-нибудь хорошо умеет, надлежит извлекать из рабства и помещать в более комфортные условия, где они смогут делать эти вещи для Бога. Альтернативой такому разумному и, в сущности, гуманному устройству является либо непрерывная взаимная резня, которая все-таки приносит удовольствие небольшому проценту двуногих, либо всеобщая работа на расчистке почв или добыче ископаемых, то есть дело грязное и квалификации не требующее.</p><p class="p1">Антонову эта теория понравилась, потому что о роде человеческом он примерно так и думал, интересуясь не всякими там психоложествами, а летательными аппаратами с наилучшими характеристиками. И потому, соглашаясь после всего возглавить бюро-29, он поступал единственно правильным образом. Правда, для того, чтобы Антонов работал, необязательно было его сажать. Но цель заключалась вовсе не в том, чтобы посадить лично его, а в том, чтобы единственно логичным образом организовать вообще всех. И потому девяносто процентов населения занялись наконец тем, для чего годились и чего сами желали, а десять были отобраны и могли, ни на что не отвлекаясь, приносить Господу плоды своих трудов.</p><p class="p1">Это был нормальный муравейник, не заслуживавший ничего другого, где десять процентов – разведчики, еще десять – крылатые самцы и самки, а восемьдесят – бескрылые рабочие особи. Мораль от муравья не требуется, у него нет моральных обязательств, мораль вообще была придумана только для того, чтобы самцы и самки отличались от рабочих, а рабочие знали свое место. Стоило дать людям организовать себя самим, они немедленно и даже более откровенно строили себе такой муравейник, называя его для красоты царством справедливости или как вам будет угодно. Вот так же и у пчел. Он хорошо помнил, как отец на его, антоновское, совершеннолетие рассказал ему этот анекдот: «– Пьер, не кажется ли тебе, что пора объяснить Жану, откуда берутся дети? – Да, Мари, но как же это сделать? – Ну, хотя бы на примере пчел! – Эй, Жанно, ты помнишь, где мы с тобой вчера были? – Помню, папа! – Ну, вот так же и у пчел».</p><p class="p1">И Антонов ничуть не грешил против собственного достоинства, соглашаясь после всего сделать им бомбардировщик любой дальности. Он делал это не им, а себе. И когда его привезли из Болшева в кабинет непосредственного куратора, он сразу прозвал его Меф, ибо это был самый что ни на есть хитрец, наименее душный среди духов отрицания, нескучный малый, умевший даже пошутить. Когда же Антонов начал более-менее осматриваться, ему открылась поистине ослепительная картина всеобщей мирмекизации, сиречь омуравьинивания, и работала она не в последние два года, а в первые же двадцать после известного выстрела известного корабля. То был выстрел стартовый.</p></span><span id="id11"><div class="title3">
<p class="p">2</p>
</div><p class="p1">За протекшие с выстрела двадцать лет они много чего тут напридумывали и во всех отношениях обогнали вольняшек, иначе Антонов уже и не называл всех, кто покамест (он точно знал: это до поры) не пошел в обработку.</p><p class="p1">Пример: Карпов. Неудача с первым советским истребителем 1923 года (испытывал Айвазовский, внук живописца, который не мог знать, кстати, о сомнительной центровке и неизбежном сваливании в первые секунды) его не обескуражила: он построил И-2, потом разведчик Р-5, начал И-6, но в октябре двадцать девятого был взят как саботажник и приговорен к смерти как социально чуждый; тут выплыло поповское происхождение и первая авария. Тогда же взяли до десятка авиаконструкторов, но пошли темные слухи, что со смертными приговорами погорячились, и предложили искупать; теперь Антонов выяснил, что начальник воздушного управления ВВС РККА Имантс встретился с приговоренными, прочел краткую лекцию о международной обстановке и предложил отдать все силы созданию нового истребителя. Ранее взятый Григорович вовлек Карпова в свою группу, и к Первомаю 1931 года они показали исключительную машину, которую на первом правительственном показе пилотировал Волчак. Тогда Карпова, опять-таки по слухам, простили, но не выпустили: он работал на закрытом объекте. Антонов знал теперь, что этот объект назывался ЦКБ-39, где они все и жили, непосредственно на авиазаводе № 39 имени Менжинского; хорошо, что Карпов не был женат, ему не пришлось разводиться. Некоторым разрешали находиться на объектах с женами, при этом число объектов множилось и порядки на всех были разные, но тридцать девятое ЦКБ отличалось такой закрытостью, что и Антонов не мог туда подступиться. Какие тут жены. Что любопытно: на воле дорабатывать И-16 остался Кочергин, выпускник питерской техноложки, малый грамотный, но без искры. Машине Кочеригина специально сделали испытания вместе с самолетом Карпова, разработанным в Бутырках, – и самолет Карпова побил его по всем статьям. К вопросу о том, как мотивирует среда. «Только условия работы в военизированной обстановке способны обеспечить секретность и эффективную деятельность специалистов в противовес разлагающей обстановке гражданских учреждений», – писал Молотову Ягода, о чем Григоровичу стало известно довольно скоро, а дальше уж чеканные эти слова передавались из уст в уста. Те, кто шептал Антонову в камерах насчет выявления железного отряда будущих победителей в новой войне, были не так уж неправы.</p><p class="p1">Делалось как? С двадцать восьмого регулярно шли процессы против так называемых очков и шляп, Донецкий центр, Промпартия, железнодорожники, золотопромышленность, дальневосточный сельхозкредит, военное дело – практически ежеквартально; специалистов с дореволюционным образованием боялись брать на работу. Потом стало известно, что Рамзин вместо расстрела доделывает в секретном месте свой прямоточный котел, а Осадчий, взятый, помнится, прямо в суде, монтирует всесоюзную телефонную сеть; и в мае тридцатого года Куйбышев с Ягодой подписали циркуляр «Об использовании на производстве специалистов, осужденных за вредительство». Так началась великая шарага, о которой Антонов понятия не имел, а мог бы иметь, поскольку непосредственно работал с большинством взятых. Но, видно, так это было придумано, что брали только дозревших, в том числе профессионально; и пока лично Антонова не коснулось, он и вообразить не мог, какая это сеть.</p><p class="p1">Руководил ею четвертый спецотдел, курируемый лично обладателем известных рукавиц, а после его краха – нынешним хитрецом. Пока Антонов трудился на воле, а Царев мечтал о космосе, в Казани был достигнут прорыв – там работали над перспективнейшим ракетным двигателем. Что интересно, сначала это направление – Антонов прекрасно помнил – было объявлено тупиковым и вредоносным, но пора было привыкнуть, что это и есть первый приз, потому что взятые за вредоносность перемещались в сверхсекретный институт, где занимались непосредственно передовыми технологиями. Если вдуматься, это был гениальный ход, потому что весь Запад, и прежде всего Германия, тупо в это верили. Возьмем микробиологию, Никанорова, который якобы наломал дров с чумой в тридцать первом; он был взят и доставлен в Суздаль, где его уже поджидали Гайский, Вольферц, Голов и прочие насельники суздальского женского, оцените иронию, Покровского монастыря. Возьмите Тушино, где стремительно доводился М-34, – там Антонову приходилось бывать часто, и многие люди, исчезнувшие с горизонта в последние два года, худощавые, подтянутые от здорового образа жизни, сдержанно приветствовали его. Вредитель Шпитальский вместо расстрела получил пост руководителя Ольгинского завода, строительством которого и командовал, пока его не свалил милосердный инфаркт. Полковник царской армии Шнегас, преступно разгласивший военную тайну немецким шпионам, возглавлял Тамбовский пороховой завод, откуда переехал в Рошаль и был премирован легковым автомобилем, но понадобился на ракетном топливе, был взят снова (что стало с автомобилем – история умалчивает) и возглавил в той же Казани пороховой завод, где в обществе анекдотических Штукатера, Бельдера и Фридлендера сотворил истинное чудо под названием флегматизатор, и уж подлинно они были ребята флегматичные, готовые ко всему. Про лабораторию «Б» даже Антонов ничего не знал, кроме самого факта ее существования, – туда ошибкой попал Еремеев, быстро переведенный в ЦКБ-39, поскольку пришелся не по профилю; он успел понять только, что там имеют дело с… И здесь Еремеев принимался так двигать бровями, что Антонов остался в недоумении: тамошнее изделие то ли очень высоко летало, то ли очень глубоко ползало. Конструкторское бюро в Крестах занималось, по косвенным сведениям, противотанковой артиллерией, Военно-химическое бюро на Охте – понятно чем плюс новейшими средствами защиты, и периодически туда командировывались люди со всех прочих предприятий для изучения новейших средств гражданской обороны. Бюро на ЦКБ имени Менжинского по личному заданию того же Имантса строило истребитель, стреляющий через винт, а с тридцать первого – целое семейство боевых самолетов, включая бомбер и штурмовик, и если у Антонова работа над новым самолетом занимала от чертежа до запуска в серию три года, в ЦКБ-39 все делалось за месяц. Они хотели жить, а как же, и на их глазах совершались чудеса. Григоровича должны были расстрелять, а вместо этого 10 июля тридцать первого года дали грамоту и 10 тысяч рублей. Хуже работать он не стал, потому что испугался на всю жизнь. Два года спустя амнистировали дизелистов, сидевших на Никольской, – в том числе монстров этого дела Бессонова, Брилинга и самого Стечкина, которого Промпартия якобы собиралась сделать министром авиации (несчастный ни сном ни духом был к этому непричастен, выдумал это котлодел Рамзин, не по специальному ли поручению людей, которым Стечкин был действительно нужен?). Они там сделали много интересного – в частности, десятилитровый дизельный двигатель КОДЖУ (Коба Джугашвили, на минуточку!) на восемьдесят семь лошадей, двухтактный нефтяной ФЭД (Феликс – дальше понятно), ЯГГ (Ягода Генрих Григорьич, ягодка наша), и все эти названия были, ежели вдуматься, логичны, ибо истинными конструкторами всех этих машин были тостуемые.</p><p class="p1">Ну а что при взятии психика всех сотрудников будущей сети несколько пострадала и все они были, простите за каламбур, ошарашены, так это способствовало им много к украшенью. Сказано: налима надо употреблять, когда вследствие огорчения печень его увеличится. Разумеется, о, разумеется, рабский труд неэффективен, применительно к царской России это многажды обсуждалось. Хорошо работают не осужденные, а помилованные, но чтобы помиловать, сначала нужно посадить. Берем молодого литератора, приговариваем к расстрелу – и будь он расстрелян, он не принес бы уже никакой пользы; но будучи помилован и приговорен сначала к десяти, а потом к четырем плюс ссылка и, по-нынешнему говоря, минус десять, он стал вернейшим бардом власти и всех уверял в пользительности каторги; а когда попробовал этот договор расторгнуть и описал собственного благодетеля в образе великого инквизитора, тут же и помер. Договор расторгается так, и никак иначе. Антонов это знал, но столь далеко не заглядывал.</p></span><span id="id12"><div class="title3">
<p class="p">3</p>
</div><p class="p1">Главное же, что понял Антонов, – что эта власть была, в общем, за него; и больше – это была его власть, ибо у них был общий враг. Эту власть Антонову надлежало поддерживать и снабжать в меру способностей лучшими в мире летательными аппаратами.</p><p class="p1">Огромное большинство людей ничего сроду не умело и ненавидело умеющих. Мастеров забрасывали мусором и травили на всех путях. Всех этих, кто улюлюкал, теперь брали поголовно и направляли на то единственное, для чего они годились, – на черный труд или в переплавку. Они по наивности думали, что это их власть, что это они ее взяли, чтобы раз навсегда забить по шляпку всех высовывающихся. Между тем это была как раз власть мастеров, власть, тайно их оберегающая, первая такая власть в истории.</p><p class="p1">Это было придумано гениально, а если не придумано и получилось само – согласитесь, еще лучше. Всем, кто улюлюкал, дали забрать вожжи в руки и обгадиться. Естественно, у них ничего не вышло. Потом профессионалов собрали туда, где ничто их не отвлекало и никто не смел улюлюкать, а улюлюкавшие отправились на удобрение.</p><p class="p1">Это было правильно уже потому, что сама эта власть находилась в сходном положении. Она сама в детстве натерпелась, потому что дети не понимают. Они видят только – особенный, и ну травить. Рассказывать о детской травле считалось унизительным, а между тем только тот чего-то и стоил, кого травили. Нынешняя власть устраивала травли исключительно для того, чтобы засветились самые громкие гонители, самые азартные камнекидатели. И стоило им засветиться, как их брали на карандаш и аккуратно списывали. Так уже случилось с РАППом, а те, в кого бросал камни РАПП, были теперь орденоносцами и депутатами Верховного Совета.</p><p class="p1">Антонов поражался, как он раньше этого не понимал. Власть в самом деле была в положении главного конструктора, и если бы чернь взбунтовалась, одинаково досталось бы именно им – Архимеду, который знай чертит свои чертежи, ничего другого не желая, и власти, которая так же одинока перед лицом бунтующего плебса. Они оба заложники и обязаны поддерживать друг друга. Им обоим нужно было что-то, кроме жрачки. Только их интересовало бессмертие – все остальные довольствовались корытом. Это была власть великих бессмысленных проектов. Случайно получилось так, что Антонов умел строить летательные аппараты, и потому его извлекли из муравейника и отправили под личный присмотр Мефа. И по большому счету не важно, что Мефу нужен был истребитель или бомбардировщик, способный дотянуть до Англии. Это могло быть подлинной целью, и Меф в своем праве: ему нужно защищать свою империю профессионалов от бушующего вокруг моря простофиль. А могло быть прикрытием, потому что Антонов давно уже втайне догадывался: Мефа не интересовали все эти оборонные мелочи. Если бы Меф захотел, он одним бы усилием воли превратил своих подданных в пушечное мясо и завалил им все орудия врага. Жизненное пространство, все эти пошлости – это было для немцев, у которых и философия вся служила исключительно для бюргерского пищеварения. Нет, не оборона Мефа волновала. Оборона была так, для мелких исполнителей. Для самого же главного нужны были ледяные высоты и широты, космический холод, арктический лед, нужна была иная, подлинно великая задача. Просто печь хлеб и доить коров неинтересно. Построить социализм – вот безусловная задача. Но социализм – это была гигантская ракета, и только; самая большая ракета, предназначенная для достижения самых дальних пределов. Антонов должен был построить эту ракету. Здесь интересы его и Мефа интересы совпадали.</p><p class="p1">Все они – конструкторы, художники и хозяин возводимой ими пирамиды – стремились к одному: к достижению своих пределов и превышению их. Девяносто процентов окружающего их населения в этом не нуждались и потому должны были обслуживать великий проект по покорению всех возможных полюсов: полюсов Земли, полюса недоступности, апогея и, если повезет, перигея. Они были первым в истории шансом достичь рубежей, а повезет – и раздвинуть. У них одних было идеальное население, ни на что не годившееся и ни на что не претендовавшее. У них была идеальная страна, из которой получилась абсолютная лаборатория, и потому у них не было вариантов, кроме как стать лучшими в своем деле. Весь их проект нужен был только для достижения высших точек – а там хоть бы и рассыплется. Но до этого было еще весьма далеко.</p><p class="p1">Антонов никому об этом не говорил. Но с той минуты, как вся эта конструкция с ледяной простотой выстроилась в его голове, он воспринимал свое пребывание в Болшеве как месть своим дворовым врагам; и он даже не особенно удивился, когда об одном из них – Борисе Валовом – услышал от своего конструктора Касимова. Касимов сидел с Валовым в камере и рассказывал о том, как несчастный толстяк помешался. Он вообразил, что его готовят для заброски на Луну и бьют только для тренировки, чтобы он выдержал тряское путешествие по лунной поверхности.</p><p class="p1">– Я подумал тогда, – закончил Касимов, – что бред этот не лишен резона. Впрочем, насчет твердой поверхности Луны…</p><p class="p1">– Луна твердая, – резко сказал Антонов. – Спросите хоть кого. А насчет Валового… В идее про Луну, конечно, нет никакого резона. А вот что его взяли – это резон. Я его знал немного, так что уж поверьте. Это так же верно, как то, что Луна твердая.</p><p class="p1">Касимов ничего не ответил, осмысливая, видимо, этот научный факт.</p><p class="p1">– Если же говорить прямо, – добавил Антонов, помолчав, – вам может казаться, что нас посадили, но на самом деле нас спрятали.</p><p class="p1">Этот факт Касимов осмысливал также молча.</p><p class="p1">– Выбор же, если вдуматься, очень простой, – выдал Антонов главную свою формулу, которой место было в будущих учебниках людоведения, если человечество до них когда-нибудь дорастет. – Либо девяносто процентов будут ковыряться в навозе, а десять шарашить, либо сто процентов будут ковыряться в навозе.</p><p class="p1">На это уж вовсе нечего было возразить.</p><p class="p1">– В эпоху, когда нет больше совести, остается профессия. Только профессия, – добавил Антонов сквозь зубы.</p><p class="p1">– А совести нет? Точно нет? – спросил Касимов без всякой насмешки, скорее как прокаженный, интересующийся у другого прокаженного, отгнивают ли уже пальцы.</p><p class="p1">– Точно, – сказал Антонов тоже без всяких эмоций, даже без злобы.</p><p class="p1">– Ну, при прочих равных… – начал Касимов и не договорил.</p></span><span id="id13"><div class="title3">
<p class="p">4</p>
</div><p class="p1">Была у них и летопись – с рисунками и стихами. Рисовал Черемушкин, вертолетчик от бога, проектировщик и испытатель первого одномоторного геликоптера, показанного, кстати, за семь лет до Сикорского; чертежник он был первоклассный и с одного раза вел чистую, строгую линию без подтирок, а самолет изображал лучше любого художника. Стихи сочиняли так называемые братья Сергеевы – один конструктор, второй испытатель. Испытатель Виктор Сергеев был человек в своем роде замечательный, в недавнем прошлом полярный летчик, остроумие его было флегматичное, без блесток, но ядовитое.</p><p class="p1">– Эх, и Карл же ты Сциллард, Карл ты этакий Сциллард, – говорил он венгру, беглецу, славному малому, в отличие от брата Лео, ядерщика, звезд не хватавшему. – Ты Достоевского читал?</p><p class="p1">– Штитал, – не чувствуя подвоха, отвечал Сциллард.</p><p class="p1">– И что же ты в таком случае сюда побежал? – спрашивал Петров, и Сциллард полагал свое знание языка недостаточным для понимания этой шутки.</p><p class="p1">Альбом открывался изображением Антонова, жонглировавшего прочими персонажами. «Смертельный номер! Впервые на арене В.А. Антонов конструирует инженерное бюро в подвешенном состоянии!» Сам Антонов, широконосый, очень похожий, был подвешен на нити весьма тонкой. Он ухмыльнулся и не обиделся. «Звери в клетках на высоте седьмого этажа!» – ясное дело, кто имелся в виду. «Путилов, факир-престидижитатор! Выступление с тремя герметическими кабинами!» – Путилов изображен был голым, ибо своими ледяными обтираниями и прочей закалкой потешал всех. Чего закаляетесь, спрашивал Стромынский, в Инту готовитесь? А что ж, отвечал Путилов, вот не полетит наша рыбка – рыбкой звали ПБ-100 за обтекаемость, – и вместо дома как раз туда. Чудак-человек, недоумевал Стромынский, неужели вы хотите ТАМ дольше жить? «Как можно, как можно дольше!» – уверенно отвечал Путилов. Идея с двумя кабинами была вскоре похерена как раз по его настоянию. Некрасов был представлен как вождь Ням-Ням с хвостовым оперением (и ел в самом деле неостановимо, куда все девалось, – бывают такие ненасытные тощие люди). «Файнштейн гнет стекло!» – и гнул, его детищем был плексиглас, у Файнштейна была изумительная судьба. Рассказывал он охотно и с легким как бы недоумением, словно сам удивлялся всем этим поворотам и уже не верил, что в четырнадцатом году окончил университет в Нанси, потом служил рядовым, получил солдатского Георгия, попал в Наркомат внешней торговли, оттуда переведен был в Италию, потом делал стекло для авиационных кабин и оказался фашистским шпионом. «А каким шпионом, спрашивается, я еще мог оказаться?» – удивлялся он простодушно. Он с такой легкостью менял службы и на каждой так хорошо продвигался, словно умел вообще все, – и никогда не роптал. «В Германии, – замечал Файнштейн назидательно, – уже вообще бы убили». Он догадывался, что Россия предназначена спасти евреев, а больше им спастись будет негде, поэтому пребыванию в шарашке он радовался. Файнштейн был почти идеальным работником, но у него была семья. У Антонова семьи не было.</p><p class="p1">Вышло это так: первый брак случайный, студенческий, с абсолютной мещанкой – вспоминать его Антонов не любил. Был ребенок, была вдовая теща-генеральша, над ребенком непрестанно сюсюкавшая, было некуда приткнуть чертежную доску, ибо все было занято беспрерывно сушившимся бельем, – Антонов думал к ним пристроиться, а вышло, что они пристраивались к нему, и обе презирали его за медленную карьеру. Как-то они нашли щель и смылись, в двадцать шестом это еще не было большой проблемой. Дальше случались связи, из которых серьезной была одна, что-то было в ней, чего он сам не понимал, но она оказалась умней и внезапно сбежала, не оставила следов, хотя Антонов искал, когда остыл. Стерла себя подчистую, как принято было у тогдашних стремительных девушек, работниц нефтехима и Метростроя. Тогда-то Антонов решил: никаких отвлечений, только работа, которая не предаст, – да и стыдно, товарищи, в тридцать семь лет отвлекаться на вопросы пола. Вот такая жизнь, как в шарашке, его устраивала, и сатирическая хроника была подтверждением того, что они на верном пути. Это было для него, как для Ленина субботники. Если люди высмеивают друг друга – значит, есть коллектив.</p><p class="p1">Он часто в Болшеве почему-то вспоминал ту, Марину, которая и сделала его человеком. Инициация мужчины проходит в два этапа, как вакцинирование от чумы по методу Коробковой и Туманского. Сначала он должен найти женщину, идеально подходящую ему, но это этап начальный; потом он должен ее потерять. Марина все сделала, как нужно, – и нашлась, и потерялась, – но теперь и именно здесь часто снилась. Поскольку она все равно была уже потеряна, а заменить ее было некем, хотя бы он и нашел еще одну зеленоглазую с косинкой, с таким именно золотым пушком на руках, – Антонову не на ком было ломаться и не о ком плакать. Сциллард – тот с ума сходил по семье, по жене и дочери, и Бартини, еще один беглый итальянец из капиталистического ада, все выкрикивал свое <em>«Inconceptibile!»,</em> а Антонов только иногда просыпался по ночам с особенно живым и ярким присутствием Марины.</p></span><span id="id14"><div class="title3">
<p class="p">5</p>
</div><p class="p1">Вот тоже был случай. Просчитывать крыло Антонов поставил двух наиболее перспективных людей, лично ему не знакомых, – 465-го и 113-го, один лет сорока, прибывший из Канска, другой лет пятидесяти, из Норильска.</p><p class="p1">– Ну что же, будем знакомиться, – неприветливо сказал старший. – Откуда?</p><p class="p1">Младший назвал лагпункт.</p><p class="p1">– Не в том смысле. Откуда сам?</p><p class="p1">– Из Ленинграда.</p><p class="p1">– Это хорошо, я из Москвы, но бывал у вас регулярно. – Старший сильно картавил. – Где работали?</p><p class="p1">– В Академии наук.</p><p class="p1">– Не свисти, – грубо сказал старший. – Уж в Академии я знал всех.</p><p class="p1">– Я тебя тоже там не видел, – огрызнулся младший.</p><p class="p1">– И не мог видеть. Ты там не работал. Колись.</p><p class="p1">– Я заведовал теоретической механикой в воен-мехе, – озлился младший.</p><p class="p1">– Теоретической механикой, – с торжеством воскликнул старший, – в военмехе заведовал Крутков!</p><p class="p1">– Ну, – недоуменно подтвердил самозванец. – Я и заведовал.</p><p class="p1">Старший пристально вгляделся и сел на табурет.</p><p class="p1">– Юрий Александрович, – пролепетал он.</p><p class="p1">– Сорок лет Юрий Александрович, – все еще обиженно буркнул бывший завкафедрой.</p><p class="p1">– А я умер! – закричал старший так, что все обернулись. – Я умер, помните?</p><p class="p1">– Не помню.</p><p class="p1">– Ну как же не помните! Румер, Юрий Румер!</p><p class="p1">Крутков внимательно вгляделся и тоже рухнул на табурет.</p><p class="p1">– Действительно умер, – сказал он тихо.</p><p class="p1">Этот эпизод получил разнообразные трактовки. Френкель, человек странный и несколько надломленный, глубоко интересовавшийся религией и оккультизмом, вспомнил о случае в Эммаусе, известном только в трактовке Луки – словно он был там лично. Двое апостолов шли в Эммаус и с ними некто. Тут странно было все: и то, что этот некто пошел с ними, и то, что они не удивились ему, и то, что не стали расспрашивать, откуда он взялся. То было сумеречное время, когда апостолы еще не вполне пришли в себя, а многие искренне полагали, что воскресший им привиделся.</p><p class="p1">Они шли в Эммаус, разговаривая о том о сем, «но глаза их были удержаны» – как сие понять? и кем, если не им, они были удержаны? Или они были удержаны тайной скорбью, невысказанной мыслью – на этот счет нет никакой ясности. Один из них, именем Клеопа, стал рассказывать спутнику, что было в Иерусалиме. Этот Клеопа, по одним сведениям, был брат Иосифа Обручника, то есть дядя Христа, по другим же – мужем родной сестры Богородицы, но в любом случае ближайшим родственником Иисуса и не узнать его не мог. На известной картине Мелоне он изображен длиннобородым старцем. И Клеопа рассказал, что явился пророк, предсказанный писаниями, но был распят, и теперь вообще неизвестно, верить ли писаниям, а главное – зачем теперь жить? Но Иисус – а это был именно он – отвечал: «О, несмысленные и медлительные сердцем, чтобы веровать всему, что предсказывали пророки!» – и подробно изъяснил все, что было сказано о славе Иисуса и о предательстве. И когда они за разговором дошли до Эммауса, Иисус хотел идти далее. Вот это, заметил Френкель, мне нравится больше всего – что он хотел идти далее! Но я вижу этот легкий туман, как в вечерней Ялте, и зажигающиеся в домах огни, и весь этот вечерний Эммаус, селение в шестидесяти стадиях от Иерусалима, – оно почитаемо и ныне, ибо его под именем Амуас опознала св. Мария Вифлеемская, которой Христос явился в видении и указал место первого явления. Странно было все это слушать от физика, специалиста в области навигационного приборостроения, – хотя что же странного? Всякий физик, глубоко чувствующий предмет, знает, что в основе науки лежит непостижимое, а наука – всего лишь сеть конвенций, выстроенных поверх непостижимого, <em>inconcentible!</em> – как кричал несчастный Бартини.</p><p class="p1">Итак, апостолы упросили Иисуса не идти дальше и остаться с ними. И только тогда по движению, которым он преломлял хлеб, они узнали его! Чувствуете вещь, которую не выдумаешь? Это ниоткуда не могло взяться, это было. «Тогда открылись у них глаза, и они узнали Его. Но Он стал невидим для них». Чувствуете? Как только узнали, стал невидим! Разумеется, с ним случилось преображение. И разумеется, он не прежний, и все прежние его только раздражают. Увидите, мы вернемся к нашим, даже к самым любимым, и будем раздражать друг друга – потому что мы без них и они без нас слишком много перенесли! Сказано же: и в мире новом друг друга они не узнали, чего нет в оригинале, это уж он вписал, гениальный русский мальчик, – и на эту строчку Френкель ссылался даже с большим трепетом, чем на Луку. Я уверен, добавил он, что, если мне суждено увидеть Ксению только там – жену звали Ксения, Френкель по ней жестоко томился, – я, может быть, тоже не узнаю ее в первую минуту, но будут какие-то вещи, по которым узнаю.</p><p class="p1">Эта идея заинтересовала Надашкевича, который в юности изучал английский и читал в оригинале Диккенса. Его особенно увлекал незаконченный роман «Тайна Эдвина Друда». После исчезновения Эдвина Друда, которого, скорей всего, убил родной дядюшка, влюбленный в его невесту, дело начинает расследовать некий Дик Дэчери. Одни считают, что Друд мертв, другие – что уцелел и переоделся в Дэчери, а то, что его никто не узнаёт, как раз и было сюжетным фортелем, который обещал Диккенс. «Не все мы умрем, но все изменимся!» – важно предупреждал Надашкевич. На этих волшебных преображениях можно было построить несколько недурных сюжетов вроде того, который только что перед ними разыгрался; и впрямь, продолжал Надашкевич, мы все, прошедшие арест и чудесное воскресение, люди с другим составом крови. Быть может, добавлял еще с одесской язвительностью, с учетом этого разработано наше местное меню. Чтобы мозг ни на что не отвлекался, еда должна быть питательной и невкусной (он, верно, забыл, как за три месяца перед тем жрал рыбьи кости).</p><p class="p1">То, что все они, безусловно, были теперь не прежними людьми и перешли, возможно, на иной уровень, не подвергалось сомнению; у всех резко выросла производительность труда и концентрация, ибо они больше не отвлекались на жизнь. Но была у этого изнанка, компенсация: все они легко впадали в депрессию, да в общем, и не выходили из нее. В свободное время часто можно было застать их плашмя лежащими на кроватях, лица в ладонях. Мировоззренческие и научные споры, расцветшие было в первые дни, совершенно угасли. Теперь они избегали тратить силы на дискуссии. Они не были друг другу интересны, им было стыдно. Стыдились абсолютного собственного бесправия. Их жизни висели на волоске, и это стимулировало их работу, но лишало ее всякого смысла. Один Антонов не был склонен к депрессии и вел себя так, словно не происходило ничего для него нового.</p><p class="p1">– Если нет иного способа вывести людей на новую эволюционную ступень, – говорил он, – сгодится и этот.</p></span><span id="id15"><div class="title3">
<p class="p">6</p>
</div><p class="p1">Незадолго до перевода в превосходное здание на улице Радио Антонова вызвали без вещей и повезли в Бутырку. Он прикидывал: разочаровал, накрылась вся идея? – не похоже, вероятно, очная ставка или отбор новичков; но чего-то такого он ожидал теперь всегда. Его спустили по темной железной лестнице, были вежливы, никаких наручников и команды «руки назад» – шел как свободный, хотя один спускался впереди, а второй топал сзади. Антонов вошел в кабинет и впервые в жизни увидел перед собой Мефа. Он прекрасно знал это лицо, но в жизни Меф оказался толще, старше, серьезнее.</p><p class="p1">– Здравствуйте, товарищ Антонов, – сказал он, «товарищем» подчеркивая новый статус.</p><p class="p1">Антонов не стал обращаться по имени-отчеству, ответил строго официально.</p><p class="p1">– Нас интересует высотный четырехмоторный пикирующий бомбардировщик, – без предисловий сказал Меф.</p><p class="p1">– Эту идею можно обдумать, – осторожно сказал Антонов. – Я предложил бы самолет атаки, двухмоторный, пикирующий, скоростной, несущий полторы тонны боевой нагрузки. Работа над ним успешно продвигается в Болшеве.</p><p class="p1">– Нас интересует, – повторил Меф, – четырехмоторный бомбардировщик. Нам известно, что работа над такой машиной ведется в Германии, в Англии. Его дальность должна быть около пяти тысяч километров.</p><p class="p1">– Такая машина, – сказал Антонов, – может оказаться тяжелой, она будет хорошей мишенью. Мы можем обсудить параметры, но я еще в прошлом году отправил письмо, где говорил об исключительной роли атакующего самолета. Говоря попросту, машина с заданными вами параметрами может не взлететь.</p><p class="p1">– Это ваше дело, чтобы она взлетела, – сказал Меф очень спокойно, однако закипая. – Я вам хочу напомнить, что вы дали показания о сознательном срыве трансарктического перелета Гриневицкого и о сотрудничестве с французской разведкой, эти показания вас никто не заставлял давать. – И тонкие его губы изобразили ухмылку.</p><p class="p1">– Я уже считаю себя в некотором роде покойным, – сказал Антонов с неожиданно теплой интонацией. – И это, могу сказать, облегчает работу. Преступно было бы в этих обстоятельствах тратить время на самолет, который не полетит. Высотная машина – это герметичная кабина, снижается обзор. Четыре мотора – это неповоротливость, тяжесть. Разве что вам известно о европейских разработках четырехмоторного, и вы хотите сделать Царь-бомбер наподобие Царь-пушки, но позвольте напомнить, что Царь-пушка не стреляет. Я просил бы рассмотреть наш проект самолета-агрессора, способного нести тяжелые бомбы. Вся документация готова, может быть предоставлена. Проект маркирован номером 58.</p><p class="p1">Тут Меф опять улыбнулся, потому что не мог не знать, что Антонов писал первое письмо из камеры той самой Бутырки за номером 58.</p><p class="p1">– Мы рассмотрим ваше предложение, – сказал он. – Какие вы планируете технические данные?</p><p class="p1">– Скорость шестьсот, – зашел Антонов с главного козыря.</p><p class="p1">– Семьсот, – ровно поправил Меф.</p><p class="p1">Антонов понимал, что для самолета такой размерности эта скорость недостижима, но почел за лучшее не нарушать занудством стилистику кавказского торга.</p><p class="p1">– Высота шесть тысяч.</p><p class="p1">– Шесть пятьсот, – торговался Меф. На кутаисском базаре ему, вероятно, не было цены.</p><p class="p1">– Грузоподъемность до двух тонн, – сказал Антонов, уже поняв принцип. На самом деле они заложили две с половиной.</p><p class="p1">– Три, – предсказуемо настаивал Меф.</p><p class="p1">– Дальность порядка четырех тысяч.</p><p class="p1">– Пяти.</p><p class="p1">– Это осуществимо, – после необходимой паузы согласился Антонов.</p><p class="p1">– Вам потребуются люди, – не сбавлял темпа Меф. – Подготовьте список лучших специалистов и, возможно, молодого резерва.</p><p class="p1">На лице Антонова, вероятно, изобразилось недоумение, ибо он не мог понять, все ли уже сидят; попадание же вольных в их ведомство казалось ему исключенным.</p><p class="p1">– Называйте любых, – сказал Меф, явно читавший мысли.</p><p class="p1">Антонов кивнул.</p><p class="p1">– Вообще, учтите, – проговорил Меф, переводя разговор в более гуманный режим, – мы готовы людей, хорошо выполняющих правительственные задания, премировать вплоть до полного освобождения. Не секрет, что в предыдущие годы было, так сказать, несколько наломано дров и были отдельные перекосы, сейчас выправляемые. Но если мы увидим саботаж или вы почувствуете, что вам больше остальных можно, пеняйте на себя. Мы умеем добиваться поставленной цели любой ценой.</p><p class="p1">Определенно, этот человек все понимает про людей и мало интересуется авиацией, но понаблюдать за тем, каких результатов могут достичь отдельные личности в крайних обстоятельствах, ему интересно. Он обладал своеобразным магнетизмом, но не тем, который притягивает людей, а скорее тем, который мобилизует. Ясно было, что в его руках закрутится любое дело. Ничего от провинциального бандита, как рассказывали недоброжелатели, в нем не было. Вообще в нем было меньше человеческого, чем в большинстве начальников, знакомых Антонову. Это был руководитель нового поколения, держащий в голове все необходимые цифры, ничего не забывающий сделать, недоступный милосердию и иной пошлятине. Это был человек очень усталый, безэмоциональный и бесконечно выносливый. С ним можно было работать.</p><p class="p1">– Разрешите три папиросы, – попросил Антонов.</p><p class="p1">– Вы же не курите.</p><p class="p1">Осведомленность Мефа была универсальна.</p><p class="p1">– Мне для товарищей.</p><p class="p1">– Снабжение товарищей мы наладим, – сказал Меф и папирос не дал. – Кроме того, если у товарищей будут возникать всякие мелкие мужские потребности, это тоже решаемо.</p><p class="p1">На лице его изобразилось пренебрежение. Он явно презирал и потребности, и тех, кто собирается их удовлетворять в передвижных борделях, организованных начальством. Такие бордели мгновенно нарисовались воображению Антонова, но Меф лишь брезгливо поморщился, прочитав и эту мысль.</p><p class="p1">– Возможны свидания, – пообещал он. – Но только при условии работы, которой мы будем довольны. Перечень подадите завтра. Тогда же я вам сообщу результаты обсуждения вашей пикирующей машины. Приступайте.</p><p class="p1">И то ли он нажал кнопку, то ли подал иной сигнал – Антонова так же молча препроводили назад.</p><p class="p1">Четкого впечатления не было. Обычно Антонов мог судить о человеке, поняв его цели, но у этого была одна видимая цель – оптимизировать работу механизма; лично для себя, казалось, Меф не хотел ничего. Вероятно, все они когда-то – по мотивам личного самолюбия или из-за детской мечты – втянулись в партийную работу, а теперь у них не было иного выхода, кроме как отлаживать свою лабораторию. Почему-то появилась задача выйти в космос, попутно обеспечив безопасность проекта; почему-то для решения этой задачи никто больше не годился, во всяком случае, не годились ни европейцы, ни американцы. Почему-то была только одна страна, способная произвести таких конструкторов в сочетании с такими летчиками. Судьбы остальных муравьев никого не заботили. Достаточно того, что они снабжали проект едой и папиросами и примерно один процент его воспевал. Впрочем, без воспевания можно было и обойтись, особенно если перестанет хватать еды и папирос.</p><p class="p1">На обратном пути Антонов решил, что этот проект его в целом устраивает, – особенно по сравнению со всем, что было до того.</p></span><span id="id16"><div class="title3">
<p class="p">7</p>
</div><p class="p1">Кондратьева знали те, кому надо. Словно невидимый фильтр отсекал от него ненужных людей. Когда Антонов в марте двадцать пятого впервые разговаривал с Царевым, они почти в один голос сказали: первый – Кондратьев. И стало понятно, что с этим – оба одновременно так друг про друга и подумали – можно иметь дело.</p><p class="p1">Кондратьев писал весело и ясно, чувствовалась энергия. Предисловие было Ветчинкина, который по крайней нелюбви к письму абы за что не взялся бы. Из его двух страниц было понятно, что пришел человек новый. Антонов насел на Ветчинкина – хоть какой он? Ну, такой… сутулый. Познакомьте! Ветчинкин по обыкновению жался и кряхтел: да как же, он закрытый, приходит когда хочет… Впрочем, иногда в аэродинамической лаборатории в физфаковском подвале, знаете, в Даевом переулке… Еще бы не знал! И уже со второй попытки Антонову показали: в углу вытачивал на станке нечто, тут же встал спиной к станку, прикрывая. В самом деле сутулый, но слегка, от застенчивости, потому что при коломенском росте везде выделялся. Антонов старался держаться деловито, без восторженности: здравствуйте-здравствуйте, я такой-то. А, сказал Кондратьев, плавали, знаем. Кольчугалюминий. Стало ужасно приятно. Регулярных и долгих общений не было, потому что с самого начала ясна была кондратьевская склонность к одиночеству и тайне, вдобавок и занимался он слишком другим – Антонов хотел летать и строить аэротехнику, Кондратьева интересовали межпланетные маршруты, и планировал он их так, как будто ракетоплан был уже вот, летал. Но если представить, что действительно – вот, то есть как бы откинуть первую ступень и вообразить себя году в 1953-м, когда не мы, так немцы уже запустят первых людей к Марсу, нельзя было не восхищаться устройством кондратьевского ума и речи. Он придумал станцию на орбите, с которой впервые шагнут на Луну; великолепно сконструировал расширенное сопло, додумался использовать магниевый бак как топливо – очевидная, казалось бы, вещь, но просчитал он один! Наконец, когда Антонов его действительно зауважал, так это после гравитационного маневра. Использовать притяжение планет, да что там – звезд, это было невообразимо и притом рассчитано так красиво, что и Царев проникся. И как-то это было очень в духе Кондратьева – посмеиваться и глядеть вкось, выслушивая их поздравления. Он сказал тогда, что готовит обобщающую работу – «тем, кто строит, чтобы летать», уже послал в Калугу, – и тут исчез.</p><p class="p1">Было темное дело с элеватором без гвоздей. Как всегда, Кондратьев шагнул дальше, чем следовало, или, правильно формулируя, раньше. Почему надо было строить элеватор без гвоздей? Нужно было построить обычный, пусть и сверхъестественных размеров. Не надо было называть его «Мастодонт», комиссия не знала этого слова. Надо было «Слон» или «Мамонт», если хотелось подчеркнуть хобот. Ясно же, что они боялись непонятного. Если без гвоздей – явное вредительство, упадет и похоронит тринадцать тысяч тонн зерна. Что им сэкономили центнер гвоздей, они не поняли. Вмешивался Вернадский, заслушали Ветчинкина – обошлось ссылкой, откуда почти сразу перевели в распоряжение шахтоуправления. Далее след терялся, мелькнула одна статья о ветряках – уже в тридцать шестом, в «Известиях», фантастический электрический ветряк в Крыму, способный по мощности сравниться с Порожской ГЭС. Это было очень далеко и от межпланетных полетов, и от шахт. Начали было строить на Ай-Петри, но вдруг заглохло, и Кондратьев опять канул. Но Антонов его не забывал, с неизменной симпатией помнил колючие глаза, вдруг способные просиять, сухое лицо с бородкой, черный свитер с высоким воротником, необыкновенно уютный, – и вот этот гравитационный маневр с притяжением Юпитера; и когда Антонова вызвали и спросили, кого он желал бы привлечь, «не агранычывая себя», он назвал Кондратьева первым.</p><p class="p1">Тут у него снова был шанс изумиться осведомленности Мефистофеля, человека, в общем, далекого от ракетостроения. «Это какой же? – спросил Меф брезгливо. – Там что-то было в Камне-на-Оби?» – «Было, – сказал Антонов, – но разобрались, и его конструкция, насколько я знаю, до сих пор стоит». – «А вам он зачэм?» – «Он голова, каких мало». – «Хорошо, вам ответят». И через три дня ему действительно позвонили – где бы еще, в какой Германии так держали всех на карандаше? – и сообщили, что Кондратьев в Серпуховском районе Московской области, на машинно-тракторной станции имени XVII съезда.</p><p class="p1">Антонову в новом статусе начальника КБ не составило бы труда за Кондратьевым послать и доставить его в Москву, но человеку с опытом неприятностей нелегко было бы соглашаться на новую должность, если б его доставили с фельдъегерем. И выставлять себя начальником Антонову не хотелось – ему нужен был не подчиненный, а светлая голова. И потому он поехал сам, и не машиной, которая ему теперь полагалась, а электричкой. Хлестал в лицо февраль, вообще словно не рассветало, снег сыпал мелкий, колкий, Антонов успел все проклясть в прокуренной темной электричке с мутными окнами и проплеванными вагонами, потом попуткой добирался до МТС, потом битых полчаса отыскивал Кондратьева среди сгрудившихся на бесприютной равнине мастерских, пока наконец ему не сказали, что Кондратьев в слесарке; из слесарки отправили его в ремонтный бокс, а оттуда в таинственную генераторную, которую он отыскал только к трем часам дня. В генераторной среди толпы малорослых людей непонятного возраста – издали Антонов принял бы их за подростков – он сразу заметил Кондратьева, все ту же коломенскую версту. Кондратьев что-то объяснял, стоя у развороченного тракторного двигателя. Антонов подошел и встал поодаль, не желая прерывать разговор. Он боялся, что у него появятся начальственные повадки. Но Кондратьев учуял нового человека, замолк и обернулся к нему.</p></span></span>
