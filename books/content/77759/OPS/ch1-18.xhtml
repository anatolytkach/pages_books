<p class="p">10</p>
</div><p class="p1">То была самая странная их ночь после самого странного вечера.</p><p class="p1">С самого момента встречи оба жили в тревожном ощущении нарастающего, даже опасного счастья. Они словно попали в поднимающуюся волну радости. Они были теперь предметом всеобщей заботы. Вскоре опять прилетел самолет и сбросил им палатку, а потом еще мешок всякой еды. Вот чудики, сказал Толя, мы скоро уж выйдем, куда нам мешок? Они что же, думают, ты с голоду тут все слопаешь? Потом над ними просто кружил самолет, уже другой, качал крыльями, передавал привет. Знаешь, сказал Толя, я тут с одним парнем познакомился, инструктор. Чудесный человек. Они тут из эвенков, и он сейчас первый эвенк-парашютист. Очень гордится. Так он придумал приспособление, чтобы парашютиста поднимать опять на самолет. Потому что десанту ведь понадобится как-то возвращаться? Если бы его приспособление уже работало, он бы нас с тобой сейчас – фьють! – поднял, поди плохо? Они вообще тут чудесные. К девчонкам группа вышла, отнесли еду, палатку тоже, вот ты увидишь. Разве в тайге советскому человеку дадут пропасть? Ой, сказала Поля, тут и советские, и несоветские – и стала все ему рассказывать, но тут же осеклась: Толя, а там-то как? Там ничего, сказал он, они, конечно, не умеют, но обучаемые. Мы там много нового попробовали, не дай бог пригодится. Мне машину подарили, добавил он хвастливо. Теперь проблема – как сюда ее перегнать? Волчак из Штатов привез, а я оттуда вряд ли. Ну, я тебя туда свожу, покатаю.</p><p class="p1">Приближался вечер, и понятно было, что это последний теплый вечер. Как-то они не спешили к людям, хотя оставалось чуток, – по Толиным прикидкам выходило, что они дошли бы за три часа, ну за четыре, но там было уже не побыть наедине. И что было еще странней, в этой безлюдной тайге словно отовсюду следили за ними доброжелательные глаза. Звезд не было из-за облачности, но и звезды как бы угадывались и тоже следили доброжелательно. Что-то было из детства, что-то от тихого роста ледяных кристаллов, когда кончилась ужасная осень и настала спокойная зима, и оказалось, что на этой безжизненной земле, откуда ушла вся жизнь, можно жить. Оказалось, что есть даже своя особенная прелесть в том, чтобы среди мертвого ледяного мира обустраиваться, и оба они в детстве, только в разное время, строили снежные хижины, и внутри снега было тепло. Они сейчас в этой палатке были в абсолютно теплом, неуязвимом пространстве, а вокруг медленно начиналась работа зимы, и было уютно думать об этом. И ничего между ними не было в эту ночь, ничего вовсе, кроме того, что было все, но без грубости, без раздевания, без буквального проникновения. А просто та же близость, что в кабине самолета среди ледяного пространства. И вдруг среди этого тепла, когда Поля засыпала, просыпалась, что-то снова начинала рассказывать, – вдруг раздался пронзительный детский крик, совершенно невыносимый, крик отчаяния и вместе с тем злости. Это не просто был ребенок, а ребенок, доведенный до крайности и на все готовый, ему было очень страшно, но он собирался дорого продать свою жизнь. Хотя что он мог в этой тайге? Что же это, мелькнуло у Поли в голове, тут еще и дети? Но Толя все понимал, он же вырос в лесу, откуда-то знал и это.</p><p class="p1">– Не бойся, – сказал он, – это рыси.</p><p class="p1">– Какие рыси?</p><p class="p1">– Обыкновенные, с ушами. Знаешь, кисточки у них? Рыси, они не очень большие.</p><p class="p1">– Слушай, – сказала Поля, – слава богу, что я без тебя их не слыхала. Я бы с ума сошла.</p><p class="p1">– Это они к нам хотят, но не могут перейти речку. Вот и орут.</p><p class="p1">– Я погляжу, – сказала она.</p><p class="p1">– Да лежи!</p><p class="p1">– Нет, когда я еще теперь рысь увижу…</p><p class="p1">Поля вышла и стала вглядываться в лес на той стороне поляны, и ей показалось, что она увидела как бы висящие в темном воздухе стеклянные виноградины, налитые желтым светом. Это были, наверное, глаза рыси, но Поля не поручилась бы, что видит их. В конце концов, это могли быть глаза каких-нибудь ужасных детей, зверодетей, которые выросли тут в тайге от брака полковников со старообрядцами, и поскольку не могут простить родителям своего таежного детства, то мстят им, отлавливая по одному. Это было ужасно. Еще ужасней было думать, что когда-нибудь они выйдут из тайги к простым советским людям, совершенно ведь не готовым к таким противостояниям, и разрушат их прекрасную жизнь, всех их превратят в жрецов созвездия Горящего Куста… Но это уж слишком страшно было так думать, и она вернулась к Толе.</p><p class="p1">– Толя, – сказала она вдруг, хотя разговоры на эту тему были у них не приняты. – А мы как же теперь будем?</p><p class="p1">Он сразу понял.</p><p class="p1">– Мы-то? – Он с большим удовольствием закурил. – Мы вместе будем, чего ж. Если мы в тайге вместе, так в Москве-то подавно.</p><p class="p1">Поля поверить в это, конечно, не могла, потому что не нашла в тайге машину товарища Сталина. Если б нашла, тогда конечно.</p><p class="p1">– Спи, – сказал Толя, – я тебя завтра рано подниму. И тебе вообще теперь надо сил много, ты теперь герой, ты что…</p><p class="p1">И она в самом деле заснула, с чувством радости и тревоги, будто близится очень большое и настоящее счастье, но оно может принести с собой такое, что, как говорится, своих не узнаешь.</p><p class="p1">К самолету они вышли на следующее утро. Было часов девять, когда Поля издали разглядела серебристый хвост «Родины». К «Родине» шли целые отряды, и рядом с ней был разбит настоящий походный лагерь. Толя выстрелил из пистолета, к ним побежали – прямо через болото мчался человек со значком, Поля разглядела значок зоркими штурманскими глазами, сто прыжков, ну, поняла она, свой брат. Но он оказался врачом и первым делом стал расспрашивать, как она, не чувствует ли истощения. Толя, конечно, произвел на всех впечатление, как говорится, разорвавшейся бомбы. Они же не знали, что он ее найдет. Они тут были уже дня три, а что прибыл герой Испании, лично ищет Степанову – этого встречающие не знали. И девушки с «Родины», которые неделю тут куковали, пока их искали, – тоже понятия не имели, что здесь Петров. Они слышали, конечно, что между ним и Полей что-то существовало, но никто этим слухам не придавал значения. А тут все было как по заказу, и скрывать что-либо не имело смысла, и на лицах у них после этой ночи что-то навеки отпечаталось, так что они так и были – жених и невеста, и никто не удивлялся.</p><p class="p1">Правда, позавчера тут что-то было нехорошее. Один «дуглас» низко над ними летал, прямо брил, зачем такое лихачество – Грибова не поняла. Потом прилетел с десантом ТБ, «дуглас» его задел, и оба пропали. Несколько десантников выпрыгнули, но куда – они не видели. Километрах в тридцати, говорила Соня. А «дуглас» за сопку ушел, я не знаю, кто там выжил. Но он правда лихачил, я ему показывала, чтоб он выше брал. И так показывала и сяк – не слушался. Ну, выйдем отсюда – узнаем.</p><p class="p1">– Я видала этот «дуглас», – сказала Поля, – а потом будто ухнуло – может, он и был?</p><p class="p1">Но девочки про это не рассказывали, огорчать не хотели, а Толя ничего не знал – кто там был, кто пилотировал ТБ-3… Он после Испании не совсем еще отошел и все больше молчал, особенно на людях.</p><p class="p1">– Полька, – рассказывала Соня, захлебываясь, – тут когда Манжаров прыгнул, капитан, он же целую приветственную речь заготовил! Товарищи летчицы, экипаж самолета «Родина», выполняющие по личному заданию товарища Сталина беспосадочный перелет, вас приветствует капитан спасательной экспедиции Манжаров! При этом Валька же тоже заготовила: товарищ спасатель, вас приветствует капитан экипажа «Родина», выполняющий… и все такое! И он, значит, приземлился, а она стоит на крыле. Они друг на друга шары вылупили и бормочут: «Товарищ капитан! Товарищ капитан!» Два капитана, слышь? И только потом как зарегочут, как обнимутся! Цирк!</p><p class="p1">– А яблоки? – спросила Соня. – Вы получили яблоки?</p><p class="p1">– Нет, – растерянно ответила Поля, – нам их никто не скидывал…</p><p class="p1">– Ну как же! Мы специально просили, ты ведь любишь! Неужели они промахнулись?</p><p class="p1">– Яблок бы хорошо, – сказала Поля. – Но они не пропадут, народу много, кто-нибудь да съест…</p><p class="p1">И все решили, что это шутка такая, засмеялись, устали даже смеяться – так теперь все было смешно.</p><p class="p1">И хотя Поля прекрасно могла идти сама, решили нести ее на носилках и сделали ей, как они это называли, паланкин – доктор Полежаев, действительно оказавшийся парашютистом, так прямо ее и нес вместе с остальными и уверял, что она очень истощена. Она сначала ему ничего не сказала про облатки. Есть ей разрешали по чуть-чуть, немного киселя, немного куриной грудки; была красная икра, настоящая местная малосольная, но ее съели. Когда дошли до порожистой реки Амгунь, Поля с любопытством ознакомилась с такой удивительной вещью, как оморочка: это была как бы местная байдарка, вроде тех, на которых совершали они тренировочные походы в Крыму, но та была из материи отличного качества, а эта из местной гнилой березы, той самой, которая падала, если обопрешься. Делали на ней продольный надрез, всю труху выскребали, с концов зашивали, и получалась такая непроницаемая берестяная байдара, очень маневренная и легкая; прекрасная вещь береста! Ловили лосося, варили уху, проводником по Амгуни был русский старик, географ, когда-то сюда высланный, да так и прижившийся. Он ненадолго вернулся в Петроград в семнадцатом, но что-то понял и уехал назад в кербинскую тайгу. Он искал здесь следы метеорита, но не нашел. Что-то странное было с этим метеоритом: то ли он весь сгорел в атмосфере, то ли был кометой, то ли улетел обратно.</p><p class="p1">– А что вы думаете, – повторял Толя, – и запросто!</p><p class="p1">На Амгуни они встретили двух девушек-хетагуровок – Поля видела их впервые. Ленинградка Валя Зарубина вышла замуж за красного командира-дальневосточника Хетагурова и на совещании жен комсостава призвала всех ехать на Дальний Восток, и они поехали. Ну какая удивительная страна! Поля всех готова была расцеловать, всех любила. И казалось, что по мере продвижения к Москве в каждом все более населенном пункте растет эта любовь к ней со всех сторон; хетагуровки вышили им всем платки и подарили – «Привет участницам полета „Родина“!». Так назывался теперь не только самолет, но и сам маршрут. Лейтенант Никульшин бережно тащил всю дорогу два барографа, подтверждавших беспосадочность перелета. «Семь тысяч триста шестьдесят три! – говорил он с гордостью, добавляя: – А по прямой шесть тысяч семьсот сорок пять!» Рекорд был абсолютный, мировой, непобиваемый. У какой еще страны есть такая трасса, такие расстояния? Валя продиктовала из Керби телеграмму, а Поля отбила – пустили ее к аппарату показать свое искусство: «Товарищу Сталину. Сквозь ночь, туманы, оледенение летели мы на Восток необъятной страны, но ваше задание выполнено. Благодарим за доверие и помощь. Готовы выполнить любое новое задание партии и правительства». Когда принесли ответ, Поля не так за себя была рада, как за Толю, потому что было сказано: «Отдельный мой горячий привет героическому летчику Петрову, о котором с благодарностью помнят испанские друзья». Толя почему-то помрачнел, а Поля ничего дурного не подозревала. Конечно, помнят! Кто ж его забудет!</p><p class="p1">Трое от их группы отделились, пошли искать следы того «дугласа» и тех десантников; Поля удивилась – неужели они не объявились еще? Но потом подумала: в этой тайге не пропадешь, они, наверное, прибились к какому-нибудь отряду или обряду, к староверам таежного толка, у нас такая страна, что не пропадешь.</p><p class="p1">На катере по Амуру дошли они до Комсомольска, видели хибары первых строителей, превращенные в музей, оттуда отправились в Хабаровск и впервые поговорили с родней по телефону. Поля услышала, как Жанна писклявым от напряжения голосом сообщила о своих детсадовских успехах и обязала ее прийти к ним в сад. Так прямо и сказала: ты обязана! Это было ужасно. Их там, должно быть, все время заставляли что-то делать, и сама она, умная, ласковая девочка, все время была что-то должна, обязана. Но Толя Полю успокоил: конечно, придем. Она же тебя почти не видит, так пусть ты придешь, и она гордится.</p><p class="p1">Из Хабаровска поехали поездом в Москву, на каждой станции был митинг, и Толя говорил: ну, неделю ехать, куда годится! Через пять лет, а то и три, будем летать. И они ехали вдвоем в одном купе, и никто к ним не приставал, и он отоспался за всю Испанию, а она прижимала к груди его голову и все думала: неправда, его отнимут. И чем ближе было к Москве, тем сильней уверялась, что да, отнимут. А в Казани принесли Толе телеграмму, от которой он сначала покраснел, потом побелел, и Поля долго, до самой Москвы не понимала, в чем дело, а он молчал, и только на перроне, где его встречали друзья из Щелкова, узнала: сын у него родился, вот что. Таня Пороховникова родила ему сына. Богатыря. И Толя не знал, радоваться или печалиться, то есть он, конечно, радовался, ведь это был его сын! Но он все равно ничего не мог себе объяснить, тем более что, зная Таню, допускал всякое. Он понимал, что сын от него, но понимал и то, что до него могло быть всякое, да и в отлучке могло быть много интересного. И теперь среди всеобщего ликования, даже во время митинга, где товарищ Каганович говорил исключительно прекрасные слова, он был в полном недоумении, расстройстве чувств, в непонимании, что теперь делать и куда ехать. Ехать, по всему выходило, надо в родильный дом.</p></span></span>
