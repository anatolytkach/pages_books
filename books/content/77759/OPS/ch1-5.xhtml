</div><p class="p1">Артемьев говорил, что его жена села в машину и уехала, и он не знал куда. А между тем она не взяла с собой ничего и не забрала у портнихи платье. Теперь его жена находилась в пяти мешках, собранных 19 июня на Рязанском направлении, в лесу вдоль шоссе, и найдено было не все, но соседи опознали кусок клеенки, в который завернута была изуродованная, с вырезанными глазами голова. Первый мешок обнаружил грибник, удивительно бодрый старик, навидавшийся всякого; по спокойному его виду сначала в нем и предположили убийцу, но выяснились всякие обстоятельства. Спокойствие свое при виде трупов старик приобрел в Гражданскую, а жена Артемьева как раз пропала неделю назад, и через два дня об ее исчезновении заявила сестра, а спустя еще два дня пришел в милицию сам Артемьев. Он не отрицал, что поссорился с женой в последний вечер, она убежала, он из окна видел, как села в какую-то машину и пропала. После заявления сестры еще решили подождать, после заявления Артемьева насторожились, а тут и старик с головой. Против Артемьева говорило прежде всего то, что он патологоанатом, то есть способен был разделать тело грамотно; однако неизвестно было, жена ли в мешках. Сам Артемьев утверждал, что совершенно не жена. Трудность была в том, что на теле оказались уничтожены все особые приметы, даже и возраст определялся весьма приблизительно – от тридцати до сорока; скальп снят, на ноге срезаны обширные участки кожи – медэксперт сказал, что, видимо, убирали родинки. С выдающимся хладнокровием проделано, сказал он, и видна, скорее всего, рука либо опытного убийцы, не впервые скрывающего следы, либо… тут медэксперт усмехнулся… кого-то из коллег.</p><p class="p1">За дело взялся Фомин, у которого, говорили, и камни кололись. Но он был не коновал и не дуболом, человек с образованием и логикой. Могла женщина уехать после ссоры? Почему же нет. Могли убить другую женщину сходного возраста? Безусловно. Могло быть случайным совпадением то, что Артемьев затеял ремонт в комнате жены на другой день после ее исчезновения? Даже естественно. Желал уничтожить все следы пребывания женщины, заподозренной в измене? Бывает. Это был у Фомина прием, с молодых лет, – представлять себе версию невиновности подследственного. Пусть будет все, как он говорит, тогда легче ловить на противоречиях. Вы вот так сказали? Допустим. Но про Артемьева странным образом хотелось верить, что он невиновен. Ощущение было такое, что за ним стоит настоящая правота, сила, от имени которой он рассказывает. Обычно же у Фомина было чувство, естественное для следователя: что всякий допрашиваемый уже виновен, не в этом, так в другом, и вопрос был – только найти и предъявить вину. Но Артемьев был как бильярдный шар – твердый, со всех сторон блестящий, его было не взять, и он как бы предлагал сыграть в игру. Допросы Артемьева были довольно приятным делом. Фомин ловил себя на том, что даже и хочет убедиться в его непричастности. Даже казалось, что за это что-то хорошее будет.</p><p class="p1">Артемьев, как и Фомин, был профессионалом, а профессионалов Фомин любил. Он даже как-то, черт его знает, сочувствовал, хотел, чтобы Артемьев оказался не виноват. А сам обвиняемый как раз ничего для этого не делал, никак себя не выгораживал, Фомин уж начал было думать, что надо ему подсказать, что ли. Но тот отважно пер напролом, словно не знал за собой никакого греха: да, начал ремонт в комнате жены. И смотрел прямо следователю в глаза, только что не подмигивал. Глаза у него были удивительно ясные. Это потому, говорил он, что ее напоминало многое, понимаете? Так что же, спрашивал Фомин, вас это пугало, что ли? «Почему пугало. Раздражало. Мне и сейчас не очень приятно знать, что я тут сижу, а она где-то гуляет». И Фомину легко было поверить, что да, гуляет.</p><p class="p1">Что еще располагало к Артемьеву – симпатия коллег; сразу же началось заступничество. Чаще всего в таких случаях не заступается никто – может быть, потому, что сами подозреваемые были люди незначительные и сознавались во всем сразу, даже и в том, чего делать не могли. Они так боялись, что явно были виноваты, и все их тотчас сдавали, начиная припоминать, что и прежде эти люди произносили сомнительные речи, а иногда без отдачи брали деньги. Про Артемьева же соседи говорили только хорошее, видно было, что человек сумел себя поставить. Правда, клеенку они опознали, ибо такова природа соседей. Но больше ничего компрометирующего из себя выдавить не могли, да и правда – жена Артемьева, в девичестве Анигулова, была, по-видимому, женщина свободного нрава. Младше мужа на семь лет, она не работала, могла позволить себе. Первый ее брак был недолгий, а кто изменил в двадцать, изменит и в тридцать. И эти портнихи, парикмахерши, все это… Фомин сам был в разводе уже пять лет и понимал, что в последнее время, когда жить стало лучше и веселей, с женщинами стало твориться странное, прямо как в буржуазной Европе. В воздухе запахло пудрой «Кармен».</p><p class="p1">Например, некто Волынец, уроженец Гомеля, ныне директор магазина, отправился с женой покупать ей шубу. Эту шубу продавала портниха Никанорова, проживающая в городе Люберцы. Допустим. Откуда он узнал о шубе? С ним работала племянница этой портнихи, все проверено, действительно работала. Воскресным утром они садятся в электричку до станции Черусти.</p><p class="p1">Жена была беременна, и в переполненном вагоне ей стало дурно. Она сказала, что пойдет в другой вагон, где свободнее. Муж туда ее отвел. Тут она на остановке вдруг, пользуясь относительной свободой, прыг из вагона! Муж за ней, но куда! – так сказать, черусти сомкнулись. Рвануть стоп-кран у него не хватило решимости. Следующая остановка Люберцы. Муж искать, дошел даже до портнихи (портниха подтвердила), но в этом не было вовсе уж никакой логики: ведь деньги у него. Что, жена решила самостоятельно добраться до портнихи? Абсурд. Муж доезжает до станции Коренево, на которой выпрыгнула жена, но ее, разумеется, на платформе нет. Или он ожидал, что она будет там рыдать на станции? Раскаиваюсь, прости? С надеждой вернулся домой – там ее нет. На другой день заявил. Но многое насторожило.</p><p class="p1">Во-первых: откуда деньги на шубу? Волынец честно заявил, что шуба стоила двести пятьдесят рублей. Каким образом скопил? Ответы невнятные. Где-то занял, что-то выгадал на продаже наследственных ложечек. Дальше: жена перед уходом особенно долго прощалась с матерью, плакала, говорила об ужасном предчувствии. Разумеется, все это бабьи сказки, но почему бы не поверить предчувствиям, особенно если учесть, что Волынец очень к себе не располагал? Он нервничал, мялся, жили они не слишком ладно. Соседи, как всегда, с готовностью подтвердили: кричал, несколько раз жена рыдала. В магазине, как водится, не все хорошо с отчетностью, и, несомненно, спекулировал – есть должности, на которых это входит в профессию. И неужели он не мог найти шубу ближе Люберец? Что, цена прельстила? Так цена была не самая низкая. Кой черт ехать в Люберцы киселя хлебать? Конечно, бешеной собаке семь верст не крюк, но тащить беременную, на шестом месяце жену покупать шубу, которая к зиме явно станет велика? Словом, многое не сходилось.</p><p class="p1">Тогда Боброва, замечательного следователя, уже напечатавшего два криминальных рассказа, осенило: конечно, они вышли вместе, и конечно, искать ее надо где-то в лесу между платформами Коренево и Люберцы-вторые. Организован был розыск с собаками, и что же? В лесу собака действительно нанюхала едва прикопанный труп. Что делает Бобров? Он желает немедленно, на месте преступления получить признание. К трупу ставят охрану, сам же Бобров едет за Волынцом, который к этому времени уже предусмотрительно посажен, и начинает раскапывать при нем. И что же мы видим? При первом появлении туфли из земли Волынец истошно вопит: «Осторожно, вы пораните ей НОЖКУ!» Эта НОЖКА совершенно добила Боброва: он и так-то не выносил никаких сантиментов, а в исполнении убийц – тем более. Извлекается женский труп в состоянии сильного разложения, даже слишком сильного для прошедшего месяца, но то-сё, лето, и хотя возраст трупа определяется с некоторой приблизительностью, беременность налицо. Налицо и мотив: у Волынца была любовница, что охотно подтвердили в магазине, а с женой он действительно непрерывно скандалил. Волынец клянется, что за всю жизнь не обидел и мухи, но коллеги радостно утверждают, что кричал, да, был вспыльчив, а также отпускал с черного хода темным личностям. В личности Волынца не находят ни единого светлого пятна, и удивительно, как еще на девятнадцатом году революции мимикрируют среди нас под порядочных такие выродки. Происходит ужасный публичный процесс, на котором клеймят Волынца как двойного убийцу, причем достается всем директорам магазинов. Бобров абсолютный триумфатор, пишет и почти уже печатает третий рассказ, Волынец, естественно, получает свое и пытается удавиться еще в камере, но спасают и расстреливают законным путем – и тут жена Волынца обнаруживается, и где же – в городе Армавире!</p><p class="p1">То есть произошло совершенно невероятное: жена, действительно беременная (но, как выясняется, не от Волынца), страстно желая воссоединиться с отцом ребенка, красавцем портным Апресяном, не в силах более терпеть старого нелюбимого мужа, бежала, повинуясь внезапному импульсу! Но как же вы, зная, что ваш муж приговорен… Ах, вы не знаете. Он истязал меня, он буквально насиловал, и кроме того, вы сами вскрыли недостачу и множество темных дел; уверяю вас, это вершина айсберга! И что прикажете делать с этой воплощенной невинностью, с ее красавцем портным Апресяном, а за ним тоже наверняка водятся темные дела, что опять-таки входит в профессию, с ее идиоткой матерью, которая ничего не заподозрила, и с новорожденным – уж он наверняка вырастет такой же дрянью и со временем прихлопнет родителей, как удивительный отрок Травин, в тридцать шестом году пришивший отца и мать и пойманный уже в Сочи за распитием пива с другими юными подонками?! И главное, кто же убил ту беременную меж Кореневом и Люберцами?!</p><p class="p1">В придачу выясняется, что Волынец в юности трогательно заботился о двоюродном брате, который немедленно дает показания, и Волынец полностью реабилитируется, а Бобров с понижением переводится из убойного отдела в отдел разбойных ограблений, где ему, напутствует товарищ Урусов, будет достаточно материала для его графомании. И это заставляет нас с удвоенным вниманием относиться к случаю гражданина Артемьева, который так убедительно, так понимающе улыбается. Профессионал – профессионалу. Увлекательный поединок, как написал бы товарищ Бобров, если бы сохранился в нем писательский зуд.</p><p class="p1">Артемьев смотрел на следователя Фомина со странным состраданием. То ли он хорошо его запутал и сочувствовал, то ли чувствовал в нем товарища по семейному несчастью, пострадавшего по женской линии. А может быть, иногда казалось Фомину, он смотрит на него чуть свысока. То ли потому, что он человек какой-то новой породы, очень спокойный. А то ли потому, что Фомин свою жену отпустил, а Артемьев свою – убил.</p><p class="p1">Но принимать меры Фомин не спешил, потому что слишком недавно был Волынец, а главное – слишком не хотелось трогать Артемьева. Прямо страшно было его трогать. Временами, глядя в его исключительно спокойные глаза, Фомин понимал его жену, которая от него сбежала.</p></span></span>
