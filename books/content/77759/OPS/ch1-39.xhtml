<p class="p">13</p>
</div><p class="p1">Примерно в это же время Кондратьев и Миша Донников в Подмосковье, под Серпуховом, сидели за столом и обсуждали одно Мишино решение, которое могло удивить человека неподготовленного, но Кондратьев перестал удивляться очень давно – в год, когда ему пришлось стать Кондратьевым.</p><p class="p1">В действительности его звали Александр Шергей. Он вырос в богатой культурной еврейской семье в Полтаве. Отец уехал в Петербург, женился на другой и забрал сына к себе, но вскоре умер, и Саша остался с мачехой, окончил петербургский политех, в шестнадцатом был мобилизован и год провоевал, из Белой армии дезертировал, а в Красную идти не хотел. Он вообще не хотел в красной России оставаться. Шергей был инженер не по образованию, а по призванию, поэтому понимал, как все теперь стало устроено. Но уйти он не смог, и хорошо еще, что не попался, – вполне представлял, что будет с бывшим царским офицером, тем более награжденным за храбрость. Мачеха выправила Саше документы на имя Кондратьева, младше на три года, и он начал жизнь Кондратьева, русского, Юрия Васильевича. Вот почему он всегда выглядел рассудительнее своих лет.</p><p class="p1">Имя определяет многое, и постепенно он стал Кондратьевым. Появились черты русского мастерового: задумчивость, молчаливость, покладистость. А руки всегда были золотые, врут, что еврейское племя беспомощно. Он придумал проект ветровых электростанций, поначалу горячо подхваченный, и на Ай-Петри строилась уже станция по его чертежам, но вдруг вскоре после гибели Волчака – и без всякой внешней связи с ней – дело это прикрылось, больших ветростанций решили не строить, и Кондратьев занимался малыми – у себя и еще в Подольске. Работать с Антоновым он отказался не потому, что тщательная проверка, неизбежная в оборонной сфере, выявила бы в нем Шергея, а потому, что не хотел работать на Мефистофеля. Кондратьев хорошо понимал, что контракт на работу находится в руках у веселого духа тьмы. Господь действительно относился теперь к тварному миру как начальник лагеря, в котором отдельные зэка мастерски лепят шахматы из жеваного хлеба или прекрасно набивают татуировки, и, чтобы не пропадал талант, для них делают своего рода закрытые лагеря в лагерях, чуть более комфортные, с белым хлебом для удобства изготовления шахмат; Кондратьев даже точно знал дату – 1587, с которой главный герой человечества – веселый плут, волшебник, бродячий учитель – сменился мастером, Фаустом, профессионалом. Теперь на Земле можно было выжить, только имея профессию, лучше бы медицинскую или оборонную; профессия делала тебя незаменимым, а все остальное население давно уже было взаимозаменяемым и жило по принципу «Умри ты сегодня, а я завтра». Мастерам предоставлялись льготы при жизни и слава после смерти, а в СССР они могли рассчитывать на доппаек. Проект не подлежал реабилитации. То, чем для души занимался Кондратьев, – а именно вербовка и посильное образование для чистых душ, не годившихся в шарашники, – было делом безнадежным и оттого особенно приятным. Конечно, это было своего рода крысоловство, но ведь и легенда о Фаусте началась с истории Крысолова, тоже мастера, но пока еще без черного покровителя (хотя в некоторых версиях роль идейного вдохновителя играл его черный плащ). Крысолов, в отличие от Фауста, никакого контракта не подписывал. Он просто хорошо играл на флейте, а когда ему не заплатили – увел детей. Он увел их в гору, куда часто уходят мастера, но его уход больше нравился Кондратьеву. Он тоже собрался увести детей, а гора была к его услугам: малых городов в России хватает, и всех щелей не учесть никому.</p><p class="p1">Теперь один из уловленных им детей, Миша Донников, сидел напротив него в дождливой мгле подмосковного летнего вечера, под уютный шелест дождя и треньканье окон, и молчал в ожидании учительской реакции. Донников попал в ссылку за организацию фашистского кружка, где снимали фотофильмы за неимением других возможностей и переводили с испанского. Следователи сами хохотали над их показаниями. Они отделались легко. Миша поработал учителем, многому научился сам и пришел к твердому решению бежать за границу, потому что оставаться в этой стране было нельзя. Он прекрасно понимал, что в случае неудачи погибнет, ибо времена были не прежние. Понимал он и то, что легальных способов попасть за границу у него, с его происхождением и судимостью, нет, а стать летчиком и перелететь слишком трудно, и он, даже не будучи инженером, примерно знал, что ждет летчиков. Это они с Кондратьевым успели обсудить, когда Кондратьев в немногих словах объяснял ему свое нежелание покупаться за палку хотя бы и самой твердой колбасы. Антонов был прекрасный конструктор и хороший человек, но хотел любой ценой делать свои самолеты, а Кондратьев все свои ракеты уже сделал в голове и с удовольствием продолжал теоретизировать на тему, например, снабжения спутников на орбите: без орбитальных спутников ни земная связь, ни серьезное исследование космического пространства лет двадцать спустя организованы быть не могут. Это было у него детально обосновано, он думал даже о небольшой повести про станцию на лунной орбите, но сначала следовало изложить фундаментальные вещи, а времени было не так много. Хорошо будет нашим детям описывать нас – они знают будущее, бери любимого героя и наделяй тайнознанием; а нам-то трудно, блуждаем вслепую.</p><p class="p1">Донников понимал также, что никакой ниши в предложенной ему системе не остается: он может быть либо относительно свободным рабом, забившимся в щель, либо надсмотрщиком, для этого у него хватило бы ума и приспособляемости, и некоторые его ученики на глазах выбирали этот путь; но пребывание в этой системе лишало смысла все, что здесь делалось, и отравляло каждую клетку его крови. Понимал он и то, что рискует переродиться, и не хотел этого. Внутри этой системы ни один из проклятых вопросов, о которых спорили уцелевшие в немногие свободные минуты, решения не имел – как не имеет решения в радикалах уравнение в степени выше пятой. Но так сформулировал бы Кондратьев, Донников же просто понимал, что искать прямого пути в искривленном мире не следует. Существовать в предложенных условиях ему надоело. Он готов был попытать счастья любым возможным путем – были южные, восточные, северные границы, западные не сулили спасения, но всякие бывают варианты; заниматься этим вопросом в Серпухове было бесполезно. Он решил для начала уехать на юго-восток, а там посмотреть. В крайнем случае есть Берингов пролив.</p><p class="p1">– Что ж, – сказал Кондратьев, – я против этого ничего возразить не могу. Я сам собирался уходить, не вышло. Отговаривают чаще всего неудачники, но я отговаривать не стану.</p><p class="p1">– Я, честно говоря, ждал, что вы обидитесь.</p><p class="p1">– Нет, на что же обижаться? Я сам все это понимаю. Молодому уходить надо. Не важно, получится, нет – ракета, говорили у нас, двадцать раз не полетит, а на двадцать первый может. Так что иди, риск – дело благородное, шанс есть.</p><p class="p1">– Юрий Васильевич! – У Донникова почти не было надежды, что идея сработает, но вдвоем им было бы легче, и шансы повышались серьезно. – А вы – никак?</p><p class="p1">– Никак, Миша, – сказал Кондратьев буднично и серьезно. – Некуда.</p><p class="p1">– А мне есть куда?</p><p class="p1">– Тебе есть, – кивнул Кондратьев. – А я еврей.</p><p class="p1">Этого Донников не ожидал совсем.</p><p class="p1">– Ну и что? – спросил он после паузы. – Если в Иран…</p><p class="p1">– Еврею сейчас здесь самое безопасное место. По крайней мере, пока. А потом я еще подумаю.</p><p class="p1">– Но какой же вы еврей?</p><p class="p1">– Самый обыкновенный. И даже обрезанный.</p><p class="p1">– Да кто на это будет смотреть…</p><p class="p1">– Скоро будут.</p><p class="p1">Донников улыбнулся.</p><p class="p1">– По-моему, это все отговорка. Мы же не в Германию идем.</p><p class="p1">– Скоро Германия будет везде, Миша. Только здесь ее не будет, и то…</p><p class="p1">– Их раньше остановят, – неуверенно сказал Донников. – И не может быть, чтобы там продолжали терпеть.</p><p class="p1">– Там будут терпеть сколько угодно. Им очень нравится. А как начнут воевать – так даже и восторг. Я хорошо помню, что тут было. Я в четырнадцатом году уже соображал.</p><p class="p1">Кондратьев поглядел в окно, за которым был обычный летний подмосковный вечерний пейзаж с грачами, с дождем и огромным количеством раскисшей почвы.</p><p class="p1">– И потом, – сказал он, – если повезет и я в этой войне выживу, у меня есть серьезный шанс увидеть полет на Луну.</p><p class="p1">Донников улыбнулся недоверчиво.</p><p class="p1">– Тут, понимаешь, Миша, – Кондратьев встал и прошелся по избе, – сложились… в силу разных причин… такие обстоятельства, что первая моя станция вполне может построиться именно здесь и нигде больше. Цель этой модели общества… как я ее понимаю… достичь стратосферы, потому что она больше ни на что не годна.</p><p class="p1">– Ну, как знаете, – сказал Донников, который ничего в стратосфере не понимал, – а мне эта цель неинтересна.</p><p class="p1">– Так и слава богу, – улыбнулся Кондратьев.</p><p class="p1">– Но мне же некуда деваться! Получается, что я обязан достигать стратосферы вне зависимости от моего желания!</p><p class="p1">– Ну Миш, – сказал Кондратьев примирительно, не хотел обижать Донникова. – Живешь ты тоже без своего желания. Тебя не спросили или, по крайней мере, спросили не тебя. И теперь тебе надо достигать стратосферы или еще чего-нибудь, по твоему выбору. Я согласен, что для некоторых… видов деятельности эта страна сейчас не приспособлена. И даже, очень может быть, вся ее система… не очень удобна для жизни. Но… не придумано еще хорошей системы. Всякая страна устроена черт-те как, но определяется она количеством приличных людей, которые в ней… тут и там расставлены. Вот я думаю, что эта система… ну как сказать, я же инженер, я смотрю на устройство. И устройство это сконструировано так, что система как раз плодит довольно приличных людей. Которые входят с ней в противоречие. Это тонко устроено, знаешь. Иначе это не было бы так живуче. Плодит приличных, и они тут есть везде. Но потом им становится дальше некуда деваться, и тогда они либо убегают… как ты…</p><p class="p1">– Либо улетают, – закончил за него Донников.</p><p class="p1">– Ну, примерно так, – улыбнулся Кондратьев. Произнесенная вслух, эта заветная мысль выглядела смешной, чертежи были надежнее – они от обнародования ничего не теряли.</p><p class="p1">– А не приходило вам в голову, – спросил Донников, прищурясь, – что эта система просто обеспечивает себя качественной едой? Люди-то хорошие, есть их удобно, ей вкусно…</p><p class="p1">– Это тоже может быть, – кивнул Кондратьев.</p><p class="p1">– Ну так я в эти игры больше не игрец.</p><p class="p1">– Да я не отговариваю, что ж. Очень может быть, что у тебя получится. Я, во всяком случае, помогу тебе чем возможно. А ты поезди, посмотри – может быть, еще и передумаешь.</p><p class="p1">– Поездить куда?</p><p class="p1">– Это я тебе сейчас буду рассказывать, – нарочито медленно, словно излагая преамбулу перед увлекательной сказкой, начал Кондратьев, – а ты записывай. Потом выучишь наизусть. Потом сожжешь. Понял?</p><p class="p1">Кондратьев хорошо знал, что записанное лучше запоминается.</p><p class="p1">И он стал диктовать, и перед Мишей развернулась захватывающая панорама подпольной науки, которая, оказывается, существовала в научных кружках наподобие их вольной школы, замаскированной под машинно-тракторную станцию. Это была удивительная сеть энтузиастов, работавших в школьных лабораториях, слесарных мастерских, провинциальных фотографиях – и занятых вещами, которые Донникову и во сне бы не привиделись. Эти вещи никак не могли быть поставлены на службу оборонной промышленности, ибо она объявила их несуществующими. Это был тот синтез науки и магии, который мог прийти в голову разве что безумному масону из тех, что ломились когда-то в его собственный кружок, но были отвергнуты по причине явного безумия. Подлинная Россия не была видна снаружи, о ней никто из посторонних понятия не имел, но параллельно с невидимой сетью шарашек в ней действовала другая сеть, не менее прочная, и Кондратьев, по всей вероятности, был одним из ее руководителей, Мориарти гуманизма, Фаустом, который на все предложения Мефистофеля отвечал только «Подумаем» или «Посмотрим», а сам делал свое дело в очаровательной таинственности. Все они занимались разными, но одинаково запретными вещами; все эти запретные вещи должны были сойтись в непостижимой, но несомненной точке, и в решающий момент, когда созданные в шарашках ракеты полетят друг против друга, эта невидимая сеть должна была включить свои тормоза и задержать мир, готовый рухнуть в никуда. Гете, когда сочинял «Фауста», не учел только того, что Фауст был не первым, кому делались подобные предложения. Мир науки состоял не из Фаустов и тем более не из Вагнеров, но прочие научились маскироваться так, что в поле зрения Гете не попадали.</p><p class="p1">– Они тебе помогут, – пояснял Кондратьев. – Есть всякие полезные навыки, это пригодится. Поп свое, а черт свое. – Он улыбнулся ободряющей мягкой улыбкой. Донников никогда не видел его таким довольным. – Значит, проблема невидимости: биологическим ее аспектом, то есть мимикрией, занимается Глеб Макаров в Москве, у Рогожской заставы, его тебе надо посетить непременно, потому что для перехода границы невидимость – первое дело. Результаты любопытные. Сам он человек не очень видимый, придется присмотреться, но справишься. Любит стихи, может, на них отзовется. Пиши. – Кондратьев продиктовал адрес, не заглядывая в блокнот; Донников понял, что ему тоже предстоит все это запомнить, но память у него была фотографическая, пять языков плюс латынь, три тысячи стихотворений назубок на языках оригинала. – Есть и физический аспект, им в Томске занимается Максим Неизвестный, так он себя называет; сам он ссыльный, найдешь. – Снова продиктовал адрес; название улицы, явно окраинной, звучало грозно, таежно и глухо. – Проблемой добычи пищи в полевых условиях занимается Григорий Смирницкий, это Псков, результаты крайне серьезные, уже умудряется питаться солнечным светом. Очень может быть, что все это не слишком научно, но сфера не моя, судить не стану. Тоже может пригодиться. Конечно, если б тебе могли помочь летательные аппараты, но перелететь границу шансов мало. Мало, но имеются – свяжись с Никодимом Велесовым, он из старообрядцев, Новосибирск, у него есть документы еще из восемнадцатого века, старообрядцы подробно изучали способы летания, ну и вообще, у них до сих пор хорошая сеть; через них можно связаться, если мало ли что. Оригиналы этого манускрипта хранятся в Румынии, в Сибиу, но у него есть копия. Если заинтересуют водные пути – темой хождения по воде успешно занимается Михаил Раменский, он из Саратова, улица… дом… спросить Евсеева. Я бы охотно тебя познакомил с Трумпфом, по-немецки «козырь», человек выдающийся, но он сейчас вне досягаемости. По той же причине не могу дать координаты одного историка, человека славной фамилии, он пока малодоступен. Из того, что пишет мне, вывожу, что достиг целостной картины, но о деталях умалчивает. Наконец, может тебе понадобиться левитация; я никогда к этому всерьез не относился, однако люди вплотную занимаются, стало быть, есть смысл; человек этот живет в Ленинграде и сейчас оставил занятия, но кое-что помнит, передашь привет от меня.</p><p class="p1">Кондратьев диктовал еще долго: антрополог, генетик, создатель счетных машин, наделенных волей и способностью к диалогу, – все это нужно было, кажется, не столько для пересечения границы (для чего хватило бы и мимикрии), сколько для отчета перед заграницей и передачи информации важным людям, почта старообрядцев туда не досягала, хотя внутри России ходила бесперебойно; в Германии жил популяционный генетик, который мог помочь с обустройством в первое время, в Америке – композитор, выдумавший новый способ музыкальной записи, а в Англии, если повезет пробраться туда, затаился пионер новой этики, основанной на числах, который мог взять Донникова в свою оксфордскую лабораторию. Донников все это записал, в голове его образовалась совершенная каша, но за неделю вызубрил все адреса так, что не спутал бы и ночью внезапно разбуженный; кроме того, с помощью специальной мнемотехники он научился забывать их начисто, чтобы не выдать в случае провала. Поистине подпольная наука ушла далеко.</p><p class="p1">Донников посетил физика в Томске, биолога в Новосибирске, алхимика в Саратове, йога в Пскове, антропософа и духовидца в Крыму; на Дальнем Востоке видел колонию даунов, владевших гипнозом, а в Иволгинском дацане – буддиста, имитировавшего смерть и воскресавшего при перемене ветра; нанимался грузчиком, плотником, почтальоном и зарабатывал себе пропитание в течение года; о дальнейшем пишут – «пропал без вести», и это значит – все получилось. Мимикрировав под дерево, Миша перешел границу; пешком по реке добрался до железной дороги; по клочку газеты вместо билета, отведя глаза проводнику, доехал до столицы; на ракете восемнадцатого века из старообрядческого манускрипта пересек Ла-Манш, после чего, использовав технологию отца числовой этики, скрылся окончательно, с осени 1940-го сведения о нем теряются. Но реабилитировали же генетику – стало быть, есть надежда, что и другие сферы подлинной науки легализуются где-нибудь в мире. Пока мы знаем только то, что с 1940 года законы искривленного пространства на Донникова не действовали. Правда, он не достиг стратосферы, но, с другой стороны, – что там делать живому человеку?</p></span><span id="id70"><div class="title6">
<p class="p">14</p>
</div><p class="p1">Примерно тогда же освободился и еще один человек. Артемьева вызвали с вещами, отвели к следователю Фомину и объявили, что за недоказанностью обвинения он может идти домой. Хотя Артемьев ждал чего-то подобного, но неожиданность все равно была оглушительная. Ему сообщили также, что коллеги решительно за него вступились и подтвердили исключительную ценность его опытов, что он может восстановиться на работе и что комната осталась за ним. Он выслушал все это, кивая тяжелой крупной головой, поднялся и поблагодарил Фомина. Фомин думал пожать ему руку, но что-то остановило.</p><p class="p1">Артемьев вышел на улицу и увидел, что в Москве в разгаре дождливое лето. Артемьев давно не дышал чистым воздухом и пошатнулся. Вообще, для внезапно оправданного человека он удивительно хорошо владел собой. Сначала прошелся пешком, потом спустился в метро, оттуда поехал на трамвае. В его прежней одежде, которую ему выдали и которая сидела теперь на нем мешком, был кошелек, в кошельке какие-то деньги. Артемьев не очень представлял, как вернется домой и будет смотреть в глаза соседям. Именно соседи топили его с чуть ли не первобытной яростью, как, должно быть, кроманьонцы топили неандертальцев, только здесь было наоборот. Но это было видовое, соседи не виноваты. Исторически они были обречены, и если бы взяли кого-то из них, никто не стал бы ни топить их, ни спасать.</p><p class="p1">Приехав в свою комнату на Стромынке, Артемьев снял печать, открыл дверь своим ключом. Сразу вошел в кухню, там были только Харитонова в халате и ее малоумный сынок, вероятнее всего, олигофрен. Сын-то и выказал единственную эмоцию – ужас. Харитонова сначала не узнала Артемьева, но когда поняла, что это он, на лице ее изобразилось нечто среднее между брезгливостью и крайним недоумением.</p><p class="p1">– Меня отпустили, Марья Васильевна, – сказал Артемьев, – я зла не держу. Ваши показания мне зачитывали. Вы ничего не знаете, а говорите. Это зря, но большинство людей именно так себя и ведут. Никогда я Марину не убивал, я, может быть, наоборот, дал Марине другую жизнь. А если я убивал кого-то, вы этого знать не можете.</p><p class="p1">Артемьев нарочно говорил тяжелым, внушительным голосом, так надо было говорить, чтобы соседка воли не брала. Кроме того, Артемьев всегда считал, что честность – лучшая политика.</p><p class="p1">– Вы со временем поймете, – добавил он, – а главное, Марина скоро вернется. Сколько она там может гулять, ну полгода, ну год. А потом вернется, уж я знаю, и вы все увидите. За меня не беспокойтесь, про меня все поняли, мне, наверное, даже помогут с работой. А вы мне супчику пока налейте, это будет хорошо.</p><p class="p1">Харитонова, словно загипнотизированная, налила ему тарелку картофельного супа с какой-то рыбой – сосед рыбачил, что-то притаскивал.</p><p class="p1">– Человек исчезнуть не может, – назидательно говорил Артемьев, прихлебывая суп. Олигофрен почтительно слушал. – Человек может исчезнуть где-нибудь на полюсе, как летчик Гриневицкий, но это другой случай. А когда человек так сильно меня любит, как Марина, так зависит, он вернется, конечно. Потом, Марина женщина необычная. Марина – та женщина, которая собою выражает. Да такой женщине просто не дадут исчезнуть, и со мной, как видите, разобрались.</p><p class="p1">– Сейчас многих так, – сипло сказала соседка. – Выпускают сейчас, говорят, разобрались.</p><p class="p1">– Ну вот видите, – кивнул Артемьев. – Спасибо, очень вкусно. Впредь, я думаю, мы с вами гораздо лучше заживем, я ведь теперь перед вами чист. Я пройду к себе, вы, если что непонятно, спрашивайте.</p><p class="p1">У себя он первым делом обследовал архив: многое было взято, и не только семейные фотографии, но и записи. Хорошо, если по этим записям они поняли всю ценность его направления, плохо, если поняли слишком много. Артемьев открыл окно, створки отворялись туго. Давно, давно он тут не был, нехорошо, непривычно было жить одному. Он подумал, что найти женщину, чтобы скоротать время без Марины, нетрудно, трудно будет потом избавиться; а впрочем, нетрудно, все теперь было нетрудно. Налетел сильный, свежий ветер, принес брызги дождя ему в лицо. Вот так же и она вернется, подумал Артемьев, увидев в этих брызгах прекрасный знак.</p></span></span>
