<span id="id44"><div class="title5">
<p class="p">Глава пятая</p>
<p class="p">Вождь</p>
</div><span id="id45"><div class="title6">
<p class="p">1</p>
</div><p class="p1">Волчак был летчик классный, но что-то мешало сказать «от бога». От бога был, вероятно, Кандель, летавший, чтобы летать. Волчак летал превосходно, но целился на другое. Было это похоже на соревнование двух теноров, Козловского с Лемешевым, только этот Козловский пел басом.</p><p class="p1">Момент, когда Волчак негласно вышел в первые, определялся точно, однако начать придется издалека. Ощущение собственной особости было у него с детства и передавалось окружающим, он всегда признавался за главного и имел к тому основания, но лежали они не только в летной области. Он был страшно упрямый и очень здоровый. Было чувство, что жизнь он строит по канонам биографии в недавно возрожденной серии «Жизнь замечательных людей».</p><p class="p1">Бровман как раз, часто консультируясь с героем, писал о нем брошюру и знал основные вехи этой канонической судьбы. Начиналась она с тюрьмы. Знаменитые романы прошлого века почти сплошь начинались в салоне и кончались на каторге или войне – других декораций, собственно, и не было; нынешние биографии начинались, напротив, в тюрьме, а кончались в салоне. Салоны уже опять появились. Если для школы будут выпускать серию диапозитивов – или диафильмов, как это называлось с 1934 года, – первая картинка будет такая: двадцать девятый, двенадцатая камера брянской тюрьмы, Волчак ходит взад и вперед, в тысячный раз проигрывая ту аварию при перегоне звена истребителей из Гомеля в Брянск. Вины его не было, наказать решили показательно. Он вел звено, снизился, отрабатывая бреющий полет, – как пояснял на суде, истребитель обязан отрабатывать бреющий на предельно малых высотах, – и не учел проводов, и два самолета врезались, без жертв, но поломались серьезно, не говоря уже о порванных проводах.</p><p class="p1">Тут ему припомнили и Троицкий мост, под которым он летал на глазах у всего Ленинграда, и дрязги с местным командованием, и намеки на вредительство – Волчак с первых дней в Брянске об этом заговорил, но слова «вредительство» еще не было, это еще называлось «контрреволюция». Тогда все было контрреволюция: опечатка – ка/эр, школьник математику не выучил – опять же ка/эр, если только он не успеет обвинить старого учителя, тиранящего детей, как при царском режиме. Волчак сказал, что боевое обучение поставлено из рук вон, что машины в отвратительном состоянии, – и сам за шесть лет впервые вляпался, подломил стойку шасси, – и что товарищ Брюханов является неудовлетворительным командиром. Истребитель должен быть готов к чему? Рисковать жизнью. И лично я, если потребуется, – началось его обычное биение себя в грудь, – готов ею рисковать. Но не попусту, я должен понимать, что обучен сам и обучил людей, что я сбит не по своей вине, а по объективным обстоятельствам! У вас же техника такого качества, что нормальное обучение, нормальный пилотаж… И понес, понес, как он прекрасно умел. И Брюханов, да и не только он, отыгрались по полной, потому что инструкции снижаться у Волчака не было, отрабатывать бреющий надо в отведенных для того местах, а разрыв провода тоже попахивает вредительством, – и ему впаяли год, из которого он отбыл две недели.</p><p class="p1">С первых летных дней Волчака сопровождал спор о ненужном лихачестве, о самомнении, самолюбовании, – и Бровману было неприятно, что явно талантливого и яркого человека поносят за этот самый талант, причем поносят люди, которые не умеют и половины волчаковских штучек. Но Бровман тут же сам себе возражал: Волчаку всегда позволялось больше, чем остальным, и если его иногда не останавливать, он бы забил всех. Не только талантом – было у Волчака свойство, может и нормальное для летчика, заполнять весь предоставленный объем; и даже друзьям его иногда казалось, что, если Волчака слегка не притормаживать, он станет главным в авиации, а там и не только в авиации. А потому к вполне понятным спорам о допустимости риска примешивались в его случае опасения: не посадили бы Волчака сейчас, он пересажал бы всех и не поморщился. Но если Брюханов и все остальные всерьез опасались, как бы он руки на себя не наложил, – а Волчак мог, с такими силачами это случается, – то у него все было просто: кто мешал ему, тот мешал Родине.</p><p class="p1">Ну и конечно, очень быстро все задвигалось. Бывший командир его отряда и командир его звена приехали из Питера, примчалась жена, вынесла от него прошение о помиловании – тайно, конечно, но надзиратели его не досматривали. Прошение попало к Калинину. Староста уже про Волчака знал – откуда-то про него все знали – и решение принял соломоново: из армии демобилизовать, поскольку с казарменной дисциплиной данный выдающийся пилот не справляется, но от наказания освободить, хватит с него пережитого. Устроили в Осоавиахим катать желающих на юнкерсе, но Громов, услышав про всю эту катавасию, стал ходить по инстанциям. Громов был уже в фаворе, к тому же, что всегда помогало в карьере, серьезно занимался спортом – не для здоровья, по-любительски, а так, что доборолся до чемпионства в тяжелом весе. Эти связи были крепче любых профессиональных, и Громов дошел до Имантса. Имантс сам летал довольно прилично, с двадцать девятого имел квалификацию пилота, сам вылетал на инспекции, и это как-то к нему располагало, хотя в общем он заработал репутацию зверя – зверя настолько, что во времена своего комиссарства в Орловском округе именно за зверство был выведен в резерв. Но с Громовым они ладили, вместе летали, играли в футбол, до которого Имантс был охотник, – и Громов отправился просить. Нельзя бросаться такими парнями, внушал, прикиньте (он никогда не тыкал начальству, хотя бы и играл с ним в футбол), этот Волчак мог пролететь между двумя деревьями, поставив машину на бок! Это излишне, покачал головой Имантс, но пообещал принять меры. Мужик башковитый, несмотря на крайности, резонно решил, что держать такого летчика в армии – значит подавать дурной пример и тормозить его лучшие склонности; пусть он рискует там, где риск оправдан, – и Громов сказал потрясенному Волчаку: ничего не обещаю, но пиши рапорт в научно-испытательный институт ВВС, там тебе самое место. Волчак написал рапорт в обычных выражениях – глубоко осознав и т. д., не мыслю себе жизни вне военной авиации, не щадя себя, готов, и если понадобится, то отдам все и даже больше… – короче, его зачислили, и это было лучшее решение для всех.</p><p class="p1">Там оказался, к примеру, его однокашник по теоретической школе Максимов, прелестный человек, которого Бровман не застал, но о котором не слыхивал ничего плохого – вообще ничего, ни разу. Волчак поначалу, естественно, стал Максимова ломать, – и рассказывали, что это было восхитительное зрелище. Волчак шел на И-5, Максимов – на И-4, оба выполнили положенное, и тут Волчак на Максимова попер. Для начала спикировал прямо на него, тот разозлился, вывернулся, атаковал – и это средь бела дня, во время испытаний, пока другие машины заходили на посадку, шарахались и вынуждены были идти на второй круг! Бровмана там не было, а как бы ему хотелось там быть и как представлял он этот день – в конце марта бывают такие: мягкая синева, золотистый закат, и понятно, что все уже повернуло на весну, все наблюдает за нами ласково, смотри ты, выжили, опять у нас получилось! И в этом мягком мартовском небе на московской окраине, над талым снегом, бросаются друг на друга двое: стоит рев, визг, один свечой вверх, другой бочку – комендант аэродрома выбежал, орет, да кто ж его слышит! Четверть часа продолжалось это безумие, столкновение казалось неизбежным, но в какой-то момент Волчак пристроился к Максимову, поняв его, может быть, телепатически, и они парой, строго параллельно, проделали петлю Нестерова и павами зашли на посадку. Это было началом единственной, может быть, дружбы в жизни Волчака. Они вышли из машин и пошли докладываться Пуржанскому.</p><p class="p1">Пуржанский, человек холодный, только что предполагал увидеть их уже, как он это называл, плюшками, но быстро сориентировался.</p><p class="p1">– Слабо! – сказал он с легкой брезгливостью. – Нет напора, нет нерва. Дозаправиться и повторить, не мешая другим. Высотой не ограничиваю. Проявляйте инициативу, а когда в следующий раз захотите спарринговать, ставьте меня в известность, я буду приветствовать, – добавил он, не удержавшись от трехэтажной тирады. Все трое были приятно ошеломлены.</p><p class="p1">– Такую жизнь, – сказал Волчак, – я понимаю.</p></span></span>
