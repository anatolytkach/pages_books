</div><p class="p1">«Георгий Седов» дрейфовал уже больше года; руль его был поврежден, команда эвакуирована. Двадцативосьмилетний капитан Ладыгин на предложение смениться ответил: непременно покину корабль – в родном порту. В таком решении был свой резон: Ладыгин не знал, что ждало его в Москве. В задержке и поломке «Седова» он был не виноват, но кто и в чем виноват, уже значения не имело: виноват был тот, с кем случилось, и если расхлебаешь – ты герой, а если нет – будет с тобой, как с Брединским, и повезет, если посмертно.</p><p class="p1">Теперь «Седову», затертому льдами, предстояло идти на полюс. Это был старый ледокольный пароход, искавший еще Нобиле. Построили его англичане в девятьсот девятом, купили наши в шестнадцатом, до тридцать седьмого он ходил ровно и славно, в тридцать восьмом попал в герои. Капитанствовал на нем Ладыгин, перешедший с затертого и спасенного «Садко»: «Садко» был вытащен и отбуксирован «Ермаком», а Ладыгин, верный долгу, с командой из пятнадцати вернейших дрейфовал во льдах на «Седове», ожидая свободной воды.</p><p class="p1">Трудно сказать, было ли все это результатом вредительства, или банального недомыслия, или просто Арктика такая вещь, что в ней, случается, и зазимуешь. Вообще-то, думал Бровман, за любой неурядицей стоит чье-нибудь вредительство. Скотт в Антарктике погиб от негодного провианта; в новом полярном романе в «Костре» рассказывалось о пропавшей полярной экспедиции, которой отрицательный герой из любви к жене капитана поставил плохую одежду, – полюса ошибок не прощают. Но, как это всегда бывало, из трагедии «Седова» получился многомесячный репортаж, и Бровман со своей стороны это очень одобрял. Тут был повод для гордости: оставшиеся на «Седове» пятнадцать человек, все, кроме капитана, рожденные с двенадцатого по пятнадцатый год, вели научную работу, исследовали состав льда, наблюдали и прикармливали фауну, отыскивали легендарные земли и проводили комсомольские собрания. Официальной задачей «Седова» было определение границы материкового шельфа, то есть поиск линии, за которой кончается море Лаптевых и начинается океан, неофициальной – поиск Земли Санникова, которую на протяжении последних ста тридцати лет видели около десятка человек, но достичь не мог никто. Не дошел до нее и «Седов», ибо на горизонте показался сплошной полярный туман, словно волшебная земля пряталась от человеческого взора.</p><p class="p1">…Вышло так: «Садко» должен был идти на выручку «Ленину», но не дошел; «Красин» пришел вытаскивать «Садко», но не вытащил; «Садко» успел вытащить «Кузнецкстрой», но куда было тащить его дальше? На буксировку не хватало угля, сто пятьдесят тонн в наличии, вдвоем не раскатаешься. Стали решать: теоретически «Садко» мог еще проломиться на восток, в Тихий океан, и дойти до Владивостока, но тогда ему пришлось бы бросить «Седова», а с «Седовым» на буксире они бы далеко не ушли. Стали кое-как ломать лед в направлении Тихого, в первый день прошли шестьдесят восемь миль, обнадежились, но дальше застряли. На такой путь с многократными разгонами и ломкой льда толщиной от пятнадцати сантиметров элементарно не хватило бы угля. Ладыгин предложил разделиться и отправить два ледокольных парохода на Чукотку, а ему с пятнадцатью зимовщиками остаться на «Седове», но на партсобрании его спросили: дает ли он гарантии, что два корабля дойдут до Чукотки? Нет, но примите в рассуждение: нас тут на трех кораблях двести семнадцать человек, из них сорок пять студентов-практикантов, у которых срывается учебный год, и некоторое количество больных, рисковать которыми мы не можем. Короче, идти страшно, оставаться ужас, из Главсевморпути летят телеграммы, опровергающие друг друга, – в дискуссиях упустили последние два дня, когда теоретически можно было добраться до Чукотки; три корабля зазимовали в четырехстах метрах друг от друга, среди торосных льдов и непрерывных сжатий, повредивших «Седову» две лопасти винта. Шмидт поклялся, что с минимальным увеличением светового дня, то есть в феврале, пришлет самолеты и заберет людей.</p><p class="p1">Угля и керосина оказалось в обрез: на каждую керосиновую лампу приходилось двести граммов в день – четыре часа света максимум; из света небесного наличествовали полчаса розоватого свечения на горизонте, в прочее время зеленая муть. Температура держалась на минус десяти, опускаясь подчас до пятнадцати. Из пустых керосиновых бочек наделали так называемых камельков с выводными трубами, согнутыми из обшивки котлов (все равно стоят праздно); тепла они почти не давали. По случаю Седьмого ноября провели факельную демонстрацию на льду, она растянулась на пятьсот метров. Много нас, с ужасом понял Ладыгин. Все резво веселились, провели концерт самодеятельности, студент Маханько показывал человека-оркестра, Ладыгин, повезло ему, стоял на вахте и мрачно прикидывал, сколько они продержатся со своими запасами: выходило при жестокой экономии девяносто дней. Ему казалось, что в зеленом тумане Севера он видит кузькину мать. Ему припомнилось, как собственная мать отговаривала его от переезда в Архангельск из сухопутной Перми, но что ты, мама, как можно! Мать, повторял он теперь стынущими губами, мать наша Арктика; космический холод был вокруг него.</p><p class="p1">После праздников остановили котлы, началась арктическая депрессия. Больше всех веселился капитан дальнего плавания с характерной фамилией Смурной, которого прихватили на Тикси, чтобы доставить в Архангельск, – готовились же вернуться через два месяца! Лучше бы я на Тикси сидел, повторял он все веселей, но, в общем, именно он оказался наиболее стоек: его ничто не огорчало, даже радовало. А может, и лучше тут, говорил он. Он-то ни за что не отвечал, его корабль благополучно стоял в Тикси. Тут-то мы и перезимуем, говорил он, а на Большой земле неизвестно еще, что будет. Может, война, может, конец света. До нас-то никто не доберется. Да и безопасней здесь как-то, верно, Ладыгин? Ладыгин не отвечал, хотя понимал, о чем речь. Он страшно тосковал по жене, отправил ей радиограмму «Будь тверда»; в конце концов, такое дело капитанской жены – ждать, знала, на что и за кого шла. Но она так плакала перед их выходом из Архангельска, словно что-то знала. Разбирая чемодан, Ладыгин нашел шоколадочку с записочкой; шоколадочку загадал съесть вместе, но уже прикидывал, как в последний свой час разгрызет ее, коли хватит сил. Шоколадочка, мать моя, шоколадочка! Придумает же… Особенно бесили его студенты со своими стенгазетами. Он понимал, конечно, бодрость духа и все такое, но понимал и то, что чем бодрее они держатся сейчас, тем безнадежнее скиснут через месяц; а самое жуткое, он знал, начнется в феврале. Ладыгин был втайне писатель, писал фантастику, понимал в психологии, хотя дорого дал бы, чтоб не понимать.</p><p class="p1">Прежде всего, людей потребно было занять: источник всякой психической нестабильности – безделье. Каждые два часа тщательнейшим образом записывались погодные показатели, даром что они не менялись: о высоких широтах бесценно все. Брались пробы льда, воды из-подо льда, грунта со дна. Изучались микроорганизмы, примитивные, как всякая жизнь в этом холоде. Тут оторвало караван «Ленина», притулившийся в Хатангском заливе, вынесло его в море Лаптевых, впечатало в лед западнее «Седова», и они дрейфовали там же, добывая такие же бесценные, никому даром не нужные сведения. Поразительно, записывал Ладыгин, сколько научных результатов мы привезем на Большую землю! Хотя никто не был уверен, что они еще ступят на нее. Опасные разговоры о теплых морях и в особенности о яичнице все чаще заходили в жилых помещениях; очень не помешало бы какое-нибудь приветствие от вождей, но в эту-то первую зиму вожди грозно молчали, и возвращения не боялись только студенты да капитан Смурной.</p><p class="p1">Новый год был встречен безрадостно, единственным лакомством оказалась сгущенка, в разгар празднества на «Седова» надвинулся ледяной вал – когда трескается от сжатия лед, его нагромождения достигают десяти метров в высоту; вал остановился в двух метрах от кормы «Седова», а если б пошел дальше – ледокол скомкало бы, как фольгу. Теперь по левому борту громоздилась ледяная стена, нагонявшая еще больше тоски; но вскоре у отчаявшихся экипажей нашлось новое увлечение: профессора стали читать лекции. На замечание доктора Батагова – скептика, как и положено доктору, – что смешны лекции по гидрографии, латыни и древней истории на дрейфующем караване, Ладыгин ответил, что вся Земля есть не более чем караван, дрейфующий в холодном и темном космосе неизвестно куда, а потому лекции в дрейфе ничуть не смешнее любых других занятий. Многие обросли бородами, все почернели от копоти, и гидрограф Вязов заметил, что так же, должно быть, выглядели студенты Петроградского университета зимой девятнадцатого года, а ничего, делали открытия, ему про это поведал его учитель профессор Неведомский. Для кочегаров читались лекции по истории партии, о Парижской коммуне – оказалось, капитаны и помощники помнили массу сведений, в обычной жизни погребенных под наслоениями будничных забот, а тут выплыло. Подробно обсудили ошибки коммунаров: надо было, конечно, брать почту и Версаль. Апофеозом всего этого абсурда были выборы 12 декабря, проведенные на «Седове»: нашли пишущую машинку, напечатали бюллетени, раздали, проголосовали, выслушали сталинскую речь о том, что наши выборы являются единственно свободными. Ладыгин думал с тяжелым умилением, что на американском корабле уже небось бы друг друга перелопали.</p><p class="p1">Тут подоспели новые увлечения – советский человек всегда найдет, чем себя занять; сначала увлеклись изготовлением ветряков в надежде добыть энергию из ветра. Создались три команды: «Ладыгин и сыновья», «Ветродуй» и «Красный Матвей» – по имени седовского боцмана, огромного человека, особенно тяжело, как все толстяки, переносившего голод. У «Красного Матвея» получилось из гидрологической лебедки и пары досок нечто по крайней мере высекавшее искру, но при слабом ветре лампочки еле тлели, а при сильном перегорали, средний же в Арктике не дует. Но два матроса, оба на суше промышлявшие охотой, увидели на снегу песцовые следы, как с мрачным хохотом сообщил матрос Храбров: пришел песец. На песцов поставили капканы, два попались, остальные начали осторожничать. Третьим попался кок, получивший перелом большого пальца на ноге; что смеху было! Пришлось расставлять силки в доброй миле от судна, но после того, как Ладыгин едва не провалился в трещину, разверзшуюся вдруг на обратном пути к кораблю, охоту прекратили. Как бы то ни было, добыли тринадцать песцов и две недели ни о чем другом не говорили. Но иссякло и это развлечение, и тут пришла спасительная радиограмма: вылетают самолеты, готовьте аэродром.</p><p class="p1">Мать моя Арктика, что такое аэродром? Из Москвы радировали: ровный квадрат километр на километр. Но видели ли вы торосы, представляете ли вы дрейфующий лед? Оказалось, что телеграмму отправлял как раз тот, кто не видел, и в руководстве таких было большинство. Договорились: пятьсот метров в длину, сто в ширину. Но и такую площадку искали пять часов и не нашли; разведгруппы разослали во всех направлениях – всюду были снежные горы, гигантские складки льда, вдобавок тридцатидвухградусный мороз и ни проблеска в небе. У Ладыгина начались галлюцинации, ночами ему мерещился визг и скрежет ломаемого льда. Делать нечего – стали строить аэродром из того, что было: аммоналом подрывали лед и разбирали обломки. Когда мороз дошел до минус сорока, прекратили, но при минус тридцати восьми возобновили: еда заканчивалась, откладывать рейсы не было возможности. Когда к концу февраля расчистили первый аэродром, Ладыгин глазам не верил: он не понимал, как двести человек смогли это сделать, – и правильно не верил: трудности только начинались. Первый аэродром треснул ровно по всей длине, это было похоже на издевательство, но гнев оставался без адреса; на втором началось очередное сжатие, и разгребать половину пришлось заново; Ладыгин тайно молился, чтобы хоть третий оставался нетронутым. 15 марта в Тикси вылетела воздушная экспедиция, и Ладыгин предвкушал возвращение сперва в Архангельск, а там и в Москву, но в день вылета ему пришла молния – он назначался капитаном всей экспедиции и, следовательно, оставался во льдах.</p><p class="p1">Мать моя Арктика, за что?! Жена Оля прислала ему длинную телеграмму: «Родной поздравляю назначением буду ждать сколько нужно значит ты там нужнее хотя не знаю». «Хотя не знаю»! Ладыгин уже все распланировал, он представить не мог, что выдержит еще хотя бы месяц этой зимовки! Но там знали, когда послать свою молнию: за встречей самолетов ему было не до эмоций. Ему предстояло отобрать тех, с кем он останется. Разрешалось оставить тридцать три человека – остальных отправить. Ладыгин быстро нашел критерий отбора и оставил тех, кто брился. Остальные, кто запустил себя или смирился с бородой, явно являли более хрупкую психику. Сам он брился раз в четыре дня.</p><p class="p1">Передача полномочий Ладыгину от капитана Шевцова, человека больного и нервического, не сулила Шевцову добра, и точно: по возвращении его списали, и хорошо, что ограничились этим. Ладыгин принял все имущество, с особым вниманием пересчитав патроны, и утвердился во главе всей экспедиции. Первое его решение в этом качестве было строить четвертый аэродром; да, все понимаю, но я уже понял нрав этой льдины, она непременно треснет в решающий момент. Так он сказал, и сто человек, еще способных долбить лед, пошли строить четвертую полосу в двух километрах от каравана. Еще пятьдесят приводили в порядок третий аэродром и выкладывали на нем из листов толя черное «Т», видимое с высоты. В день окончания работ на третьем аэродроме лед треснул под «Седовым». Если треснет аэродром, сказал сквозь зубы Ладыгин, я застрелюсь. Второго апреля небо очистилось, из Тикси пришла молния, что самолеты готовы к вылету. В кубрик ворвался вахтенный: началось, трещины по всему аэродрому, принимать нельзя! А ведь я знал, сказал Ладыгин. Цепочка подыхающих от усталости людей стала передавать листы толя на четвертый аэродром. «Самолеты в воздухе!» – радировал Тикси. Успеем, сказал доктор, лететь три часа. Доктор, распорядился Ладыгин, идите готовить отъезжающих, оденьте потеплей, режьте одеяла на портянки. Надо будет акт составить, мрачно сказал доктор, одеяла казенные.</p><p class="p1">Самолеты прилетели ровно в половине третьего, первый повредил лыжу из-за ледяного бугра, другие два приземлились без накладок. Привезли письма, газеты, забрали на каждый борт по десять человек и, кое-как поправив лыжу, улетели. Следующий рейс отложился – не было погоды. Седовцы за это время расчистили новый аэродром, и 26 апреля самолеты прилетели за остальными. Они торопились с отлетом – погода портилась. Остающиеся тосковали, рассмешил их только корабельный плотник, с которого перед самым отлетом свалились штаны – он слишком много всего набил в карманы. Подумай, штаны! На самом деле плотник просто сошел с ума, это и понятно: по возвращении, думал он, надо будет отчитываться за гвозди, часть гвоздей он использовал, когда строили домик для зимовщиков (Господи, когда это было?!), но часть осталась, и за них, бормотал плотник, надо отчитаться. Он набил гвоздями все карманы ватных штанов, потом ему показалось, что самолеты улетят без него, и на бегу штаны – ах! и увы! Он присел, подбирая гвозди, – и все покатились. Ну это надо, на морозе упали штаны с гвоздями! И когда те, кто остался, вернулись на корабли и с бесконечной тоской думали о том, как через два часа их товарищи ступят на твердую землю, слова «Штаны упали!» время от времени заставляли их истерически хохотать.</p><p class="p1">– Все думаю, – спросил Ладыгин доктора, – для чего столько льда?</p><p class="p1">– Чтобы вы представляли, – ответил доктор, помедлив, – как будет выглядеть Земля, когда все кончится.</p><p class="p1">– Советские выживут, – уверенно сказал Ладыгин, и доктор не возразил.</p></span></span>
