</div><p class="p1">Следующее лето – назовем его периодом между зимовками, чтобы это не выглядело издевательством, – было полновесным, подлинным безумием, с ума сошли все, и временами это даже было бы смешно. Бровман мог восстановить этот период только по рассказам участников, но они помнили мало; впрочем, то, что они писали потом в книгах, было вовсе не похоже на правду.</p><p class="p1">В первые дни после отлета счастливцев все, скрупулезно дозируя, чтоб на подольше хватило, читали письма; из журналов вырезали картинки и вешали по кубрикам; составили тщательную опись доставленной еды. Как известно, нет ничего аппетитнее перечня припасов. Обещали горы, доставили кучку: четыре кило двести пятьдесят граммов мороженой смородины, четыреста тридцать восемь лимонов, тоже мороженых, девять кило прессованного яичного порошка, пять с граммами кило шоколаду, семь с половиной кило порошкового молока, но тридцать семь килограммов сушеного луку – первого средства от цинги – и столько же витаминного желтого драже: сначала сладковатого, под оболочкой липкого, а после рассасывания – интенсивно кислого, там внутри была аскорбинка. Был еще килограмм мороженой клубники, которую общим решением вручили Ладыгину – он ходил мрачнее всех, ибо по письмам жены увидел, как ей на самом деле тоскливо. Она вела подробнейшую хронику дрейфа, флажками отмечала по карте их передвижение, – мороженая клубника навсегда обладала теперь для капитана Ладыгина вкусом обиды; он поделился, конечно, со всеми, но большую часть скормили ему, сами удовлетворились смородиной.</p><p class="p1">Через три дня, стоя на вахте, Ладыгин вдруг ощутил резкую головную боль, пол поплыл, зазнобило. Он еле достоял, выпил два стакана горячего чая, его тут же вырвало, и он позвал врача. Доктор Батагов знал, до какой степени Ладыгин не жалует медицину, и понял, что все серьезно. У Ладыгина оказалось тридцать восемь, на следующий день тридцать девять, и ему запретили вставать; ночью ему стало совсем худо, и главное, Ладыгин видел, что Батагов и сам крайне обеспокоен. Что могло сюда забраться, спрашивал он, какая хворь возможна в таких широтах? Может быть, что-то древнее… либо здесь человека караулит нечто, чего мы еще не знаем? Ладыгин испугался. На следующее утро доктор вошел к нему торжественный и сказал: я понял. У вас сорок? Ну, поздравляю, это брюшной тиф. Так называемый ступенчатый жар, симптом понятный, осталось понять – откуда. Ягоды, пролепетал Ладыгин. «Точно!» – воскликнул доктор; больше и впрямь было неоткуда. Ну, вернусь же я! Ну, разберусь же я! По крайней мере, теперь ясно, что с вами, но чем в таких обстоятельствах лечить? Что ж, полная изоляция, рисовый бульон… За неделю от Ладыгина, и так худого, осталась тень, он с трудом мог приподняться на локте. В Москву пока ничего не сообщали; наконец Батагов перестал разбирать, что Ладыгин шепчет, и потребовал передачи командования старпому Ефремову. Температура у Ладыгина дошла до сорока одного, и доктор решил уже, что следующей ночи он не переживет. У Северного полюса умирать от брюшного тифа – непредсказуемый бред! Бред, кстати, мучил Ладыгина непрестанно, и как всегда при тифе – вода: водопады, озера, целебный источник с лимонным соком… По животу пошла мерзкая розовая сыпь. Что пить хочется – хорошо, друг мой, приговаривал Батагов; вода – первое дело, чем же еще лечить, либо справится организм, либо не справится. Вот уж из снегов пресную воду качаем, в воде недостатка не будет. На свой страх и риск дал хинину – и не ошибся. Все время Ладыгин лежал один, доктор панически страшился эпидемии – что стал бы он делать с тридцатью больными в ледяной пустыне! За себя Батагов не боялся, его никакая зараза не брала, но страшней всего была мысль, что эпидемия тифа шагает уже по Большой земле, что там сейчас никого не осталось, только они, – и вот к ним она проникла через ягоды… Что с ними будет, ведь размножаться невозможно, вымрем! Рисовалась доктору картина нового племени, произошедшего от седовцев и белых медведей, и в общем выходило, что еще непонятно, кто жизнеспособней… но все эти мысли и картины доктор от себя гнал, потому что начиналось Белое Безумие, болезнь страшней снежной слепоты. Кто-кто, а Батагов навидался арктических сумасшествий, знал, что холод изнуряет сильнее голода и на борьбу с ним тратится больше резервов; знал и то, что переживший такую арктическую командировку сроду больше ничем не заболеет, штука в том, чтобы пережить! Ладыгин бредил теперь Цейлоном. Он никогда, разумеется, на Цейлоне не бывал, но знал, что там бывает чай – такой, вероятно, целительный, магический чай, от которого сразу поправится больной советский капитан, но почему-то не несут ему этого чаю… Он болтается в узкой лодке у берегов Цейлона, его сюда отправили зимовать, предупредили, что он должен завязать отношения с местными крестьянами, обработчиками чайных полей, но чтобы они его заметили, он должен привстать в лодке, а это совершенно невозможно! Ладыгин попытался встать и упал и так и лежал на полу три часа, пока не пришел доктор, – черт знает что, привязывать вас, что ли! Пришлось назначить сиделку, вызвался помор Смолин, огромный человек, уверявший, что тифом он уже болел в девятнадцатом и вторично эта хворь не привяжется. Со Смолиным стало едва ли не хуже, потому что он беспрерывно рассказывал свои сны, нет ничего скучнее чужих снов, и если для самого сновидца они имеют хоть какой-то смысл, то постороннему слушателю вовсе уж ничего не говорят. Но наступал полярный день, бегали зайчики по стенам каюты от сияющих льдин вокруг, и постепенно в Ладыгина вливалась жизнь. Когда в начале июня он смог наконец побриться, долго не узнавал себя в зеркале.</p><p class="p1">Как только он вернул себе обязанности капитана (Ефремов, кажется, с легкой обидой принял этот приказ, всюду тщеславие!), пришло сообщение, что к ним направится ледокол «Красин» и, возможно, летом вытащит; надо, значит, готовить «Седова» к эвакуации, чинить руль, выправлять стиснутый льдами винт. Под «Седовым» намерзло несколько этажей сплошного льда, отколоть их было немыслимо, стали взрывать, закладывая в аптечные пузырьки по двадцать граммов аммонала. За три дня продолбили дыру, в которую мог погрузиться водолаз, но видимость в воде была нулевая, руль приходилось исследовать ощупью – винт оказался погнут, месяц работы ничего не дал. Конечно, это было не так ужасно, как полярной ночью, когда казалось, что света не будет вообще никогда; конечно, даже пахло немного весной – только ни травинки, ни листика, – и прилетели даже какие-то идиотские птички, которым любопытно, видать, было посетить корабли, и Смолин задумал пострелять птичек, но пожалел, да и жрать их нельзя все равно. С Большой земли намекали, что первые испытания проходит ледокол «Иосиф Сталин»; Ладыгин помнил слова Водопьянова: «Сталин человека не бросит!» – и ему представлялась символическая картина: уже явно было задумано, что вытащит их «Сталин», что «Красину» одному не сладить. Но Шмидт честно признался, что «Сталину» до первого рейса нужно еще три месяца испытаний, а там зима, и потому достанут их, вероятно, только следующей весной… ну, есть шанс, что и «Красин» справится, и Ладыгин хотел уж было радировать, что если надо ждать до следующей весны, то лучше он застрелится сейчас, меньше мучиться; но передавать такое радисту он побоялся, да и вообще – малодушие! Вдруг зимой их самолеты заберут, суда останутся здесь, потом можно будет опять прислать за ними самолеты…</p><p class="p1">Ладыгин и понятия не имел, что в Севморпути выдумывали не менее фантастические варианты их освобождения, включая полную эвакуацию самолетами, но бросить корабли они не имели права. Да и вообще, сказал Калинин, когда приезжал в Севморпуть, – неглупый, кстати, человек, даром что всегда держался простачком, – а что вы думаете, товарищи, ведь это получилась уникальная дрейфующая станция, и первые выборы в Верховный Совет за шестьсот верст от полюса – это не хухры-мухры! Непонятно было, то ли старик шутит, то ли предлагает таким образом отмазаться, но сказал же папанинец Ширшов, который после зимовки перестал считаться с формальностями: что для одного недосмотр, для других подвиг, вопрос – как осветить.</p><p class="p1">Немытый, заросший, шатаемый ветром капитан Ладыгин не знал, что за их дрейфом следит СССР, да отчасти и мир, хоть миру уже и не до того было, что его фотография украшает многие девичьи спаленки, что ему посвящают оратории, что вообще всякая ледовая символика сейчас очень к месту, потому что полярность неясным, темным образом выражает самую сущность советского; достижение полюсов и проведение выборов на них сравнимо с достижением стратосферы, и тот кристальный мир, где вымерзают даже вши, олицетворяет собою нашу советскую утопию. Ладыгин так ослабел, что махнул уже рукой на свою жизнь; нападали еще припадки тоски по жене, но жену он представлял уже смутно.</p><p class="p1">Начался охотничий сезон: застрелили нерпу, пять пудов мяса. Если зажмуриться, писал в дневнике Ладыгин, похоже немного на медвежатину, но разит рыбой. Открыли соревнования по стрельбе, подстрелили пять уток. Все работы по ремонту руля кончились ничем: руль поворачивался максимум на два градуса. Вдобавок Ефремову, пошедшему на погружение впервые в жизни, стало плохо с сердцем – оказалась у него клаустрофобия, примет которой он сроду не замечал прежде; вытащили серого, полузадохшегося.</p><p class="p1">Спасение подошло, откуда не ждали: Шмидт не хотел раньше времени обнадеживать, но к ним стремительно проламывался «Ермак». Правду сказать, и лето выдалось щедрое – лед шумно таял и трескался, Ладыгин даже сходил по одной из промоин на байдарке. Страшно было подумать, как осваивал он когда-то такую же байдарку в Крыму, еще страшней представить, что бывает Крым, но вовсе уж немыслимо, что все воды мира связаны – и, стало быть, все это один океан, местами теплый и гостеприимный, а местами вот такой, зато исключительно чистый (Ладыгин загляделся в зеленую ледяную воду: прелесть какая вода). «Ермак» успел сходить к папанинской льдине и отвез папанинцев в Ленинград, освободил у Земли Франца-Иосифа «Русанова», «Рошаля» и «Пролетария», вывел на свободную воду шесть лесовозов у Диксона (раздав им угля), после чего вытащил изрядно помятого «Ленина». Ладыгин стал бомбардировать Москву радиограммами: лето, писал он, по арктическим меркам жаркое, осень обещает быть ранней и холодной, надо бы к нам поторопиться. Казалось, освобождение было уже так близко, что у него начался буквальный зуд в ладонях. Его несколько охладили, напомнив, что готовили к ним «Сталина», но «Сталину» предстоит еще три месяца доделок; «Ермак» может успеть, но люди устали. Срываясь, Ладыгин радировал, что «Седов» в бедственном положении из-за руля, самостоятельно его отремонтировать нет шансов, без мощного ледокола его не вывести (а то б сами ушли). Ему ответили прямым текстом, он выучил наизусть: «Используем все возможности. Однако вам, опытным ледовым капитанам, должно быть ясно, что гарантировать возможности достижения „Ермаком“ вашего места нельзя. Во избежание тяжелого разочарования, если „Ермак“ пройти не сможет, информируйте в этом духе ваш экипаж».</p><p class="p1">Тут Ладыгин окончательно убедился, что выводить их никто не будет, они больше устраивают Москву в качестве символа и теперь вечно будут выбирать Верховный Совет в шестистах верстах от полюса, а им иногда будут с самолета сбрасывать витамины, – и разнес несколько предметов и чуть не пробил кулаком переборку. Тогда доктор рекомендовал ему окунуться, вода была уже где-то два градуса. Ладыгин прибил бы и доктора, но был ему благодарен. Вдобавок пришла радиограмма, что воздушная разведка обнаружила чистую воду до 78 градусов 30 минут, и стало быть, к ним можно было подойти. «Ермак», чтобы не дразнить их напрасными надеждами, сообщил, что идет в глубокую ледовую разведку, не более. Экипаж, однако, плел гигантский пеньковый канат – шестьдесят миллиметров в диаметре. В последний день августа старпом заметил дым на горизонте, Ладыгин с биноклем кинулся на ют – так точно, «Ермак» с диким трудом, разбегаясь и запрыгивая на льдины, проламывался к ним.</p><p class="p1">Он был все-таки очень большой, и льды перед ним ломались торжественно. В радиорубке «Ермака» завели пластинку с «Интернационалом». Ладыгин не мог с собою совладать и почувствовал, что рыдает. Рядом Батагов повторял, перейдя на «ты», да какие уж тут церемонии: «А ты говорил… ты говорил…» За ними пришли, их спасали. «Ермак» дошел до «Седова», обошел его кругом, и льдины, которых они никак не могли ни обколоть, ни взорвать, с грохотом разломились. «Интернационал» играл уже по третьему разу. Весь седовский экипаж орал «Ура!».</p><p class="p1">С «Ермака» проорали, что на подготовку у них десять часов, иначе не будет чистой воды, вообще, надо торопиться изо всех сил; корабль подготовили за восемь. Планировалось: «Ермак» поведет «Седова», дальше своим ходом пойдут «Садко» и «Кузнецкстрой». Вдобавок к тросу, сплетенному командой, им кинули с «Ермака» еще два, и, помолясь, тронулись. Чудесное, неземное это было ощущение, когда после года во льдах «Седов» сдвинулся с места, таща на себе огромный неоткалываемый слой льда, целую чашу, которая через полмили вдруг оторвалась – и «Седов» получил двадцатипятиградусный крен на левый борт; но это бы полбеды. Даже заведя машину, разведя пары, они двигались еле-еле. «Ермак» натужно ревел, и все на «Седове» боялись дышать, не говоря уж лишний раз шевельнуться; он протащил их триста метров – и лопнул первый канат. За пятнадцать минут его рекордно поменяли, пошли дальше, лопнул второй, – «Ермак» шел трудно, не мог больше, как обычно делается, сдать назад и дать по льду второй удар. Невыносимую тяжесть чувствовали все, а что сделаешь? Порвался третий трос. С «Ермака» передали, что попробуют пойти вперед, разбить путь, а там вернутся. На Ладыгина страшно было смотреть. Через час к нему подошел Ефремов и вручил радиограмму: «Ермак» потерял левый винт, ни о какой буксировке «Седова» теперь не было и речи. Он уйдет, проламывая дорогу для «Садко» и «Кузнецкстроя», «Седову» предлагается зимовать. В утешение во второй радиограмме сообщалось, что на острове Рудольфа создана база и зимой к ним прилетят самолеты.</p><p class="p1">Все запасы злости Ладыгин потратил, еще когда ему посоветовали не обнадеживать экипажи. К тому же теперь на него смотрели люди, и надо было сохранять лицо. Дать волю отчаянию сможет у себя в каюте, да и что проку? Тут Арктика. Тут всегда был лед и в обозримые три миллиона лет будет он же. «Зимуем», – коротко бросил Ладыгин экипажу, предоставив старпому объяснить, что у «Ермака» полетел винт. Никто в первый момент ничего не понял, решили, что «зимуем» означает продолжаем ждать; но Ефремов развел руками и начал разъяснять ситуацию. Ни один даже не вскрикнул, все были вымотаны до полного безразличия к собственной участи.</p><p class="p1">Ладыгин упал на койку и, как ни странно, некоторое время проспал. Во сне ему пришла спасительная мысль: можно же, наверное, их всех как-то забрать на «Ермак» и на будущее лето обнаружить «Седова» воздушной разведкой? Никуда он не уплывет за это время, и не такая это ценность, есть другие ледокольные пароходы, этому уж тридцать лет скоро, и у него винт сломан… Но едва проснувшись, Ладыгин понял – всей тяжестью это на него упало: никто не даст ему бросить корабль, он сам не имеет права с него уходить, он капитан, он должен тут сдохнуть, это вопрос чести. Ничего, кого-то он передаст на «Ермак», кого-то дадут ему оттуда, плюс провиант, горючка… Переползут через эту зиму и весной уйдут. Опять же прилетят самолеты, привезут газеты… Что же за судьба, подумал Ладыгин, мне двадцать девять лет, у меня жена молодая, красивая, что же я так влип-то… А потом подумал: а вернулся бы сейчас – что бы ему сделали за поврежденный руль? Арктика – она действительно безопасней, и черт его знает, что мы тут пересиживаем… Он попросил Ефремова позвать всех в кают-компанию и сказал: товарищи, Москва приняла решение, вы знаете – какое. Кто может остаться – оставайтесь, все-таки родной корабль. У кого уважительная причина – переходите на «Ермак», я пойму. Должен сказать, что новая зимовка будет легче, дадут топлива, дадут еды. И мне кажется, товарищи, что если уж возвращаться, то возвращаться героями! Кто спорит, у всех обстоятельства, у некоторых даже институт… – Он кисло усмехнулся. – И все-таки, товарищи, тех, кто останется со мной… а мне, сами понимаете, деваться некуда… я особенно благодарю и, как говорится, чем могу.</p><p class="p1">«Ермак» вернулся через час, и капитан его Зеленцов честно сказал: хоть мы и без одного винта – там вал треснул, и винт ушел на дно, – но еще одну попытку сделать можем; только быстро, потому что два дня – и вода зарастет, уже и сегодня обещают пургу. Нет, сказал Ладыгин, передавайте нам всё, что сможете, и мы зазимуем. Спросите ваших, кто хочет остаться, и уводите «Садко» с «Кузнецкстроем». В конце концов, нам обещали прислать самолет.</p></span></span>
