<span><span id="id24"><div class="title4">
<p class="p">4</p>
</div><p class="p1">Оказалось, что он прямо-таки рожден для войны. Возможно, причина крылась в состоянии некоторой безнадежности, которое он ощущал при мысли о доме, а вероятней все-таки, что война его заводила. Есть люди, которых трудно вывести из себя, но в какой-то момент они начинают давать сдачи и увлекаются. В случае Петрова этот момент наступил в июле, когда Сиснерос, командир республиканских летных сил, приехал на русский аэродром – его называли именно русским, хотя компот там варился тот еще: сербы, американцы, французы. Сиснерос был желт от бессонницы, зол и подавлен. Он рассказал, что ночные бомбардировки франкистов плохо действуют на население и переутомили солдат, потому что налеты происходят теперь каждые полчаса. Надо что-то сделать, чтобы они так не летали. Петров после короткого молчания сказал, что готов к ночному бою.</p><p class="p1">Собственно, испанец этого и ждал, но предложить не мог: опыт ночных боев со времен империалистической войны был крайне мал и не пополнялся. «Как ты его найдешь в темноте?» – спрашивали Петрова разумные люди. А по разрывам, сказал Петров. Ты не представляешь, что такое испанская ночь, продолжали убеждать разумные люди, и поначалу они оказались правы: после первого же вылета, когда Петров никого не нашел, он вдобавок на плохоосвещенном аэродроме зарулил при посадке в воронку, сам чуть не поломался и поломал стойку. Это его взбесило, он разнес всех техников, на полосу теперь сгоняли машины и светили фарами. Кушкин придумал способ: франкисты при бомбежке прижимаются к земле, чтобы видеть цель; ты иди повыше, я – пониже, где-нибудь да поймаем. Сначала повезло Кушкину, он увидел цель по лунному отблеску – при полной луне вообще проще, – но это оказался юнкерс, Кушкин дал по нему три очереди, и все три точно, – ноль внимания, фунт презрения. Что-то было ужасное и невозмутимое в том, как эта тварь, иронически покачав крыльями, ушла восвояси.</p><p class="p1">На земле стали смотреть, где у юнкерса уязвимости: гляди, показал Петров, в крыле у него бензобак. Может, здесь? Еще три ночи выходили впустую, на четвертую Кушкин стал мочить юнкерс в правое крыло, увлекся, потерял скорость и почувствовал, что валится в штопор; пока выходил из штопора, потерял юнкерса. Неделю не вылетали, потом ночная бомбежка случилась уже буквально в пяти километрах от аэродрома; ну, сказал Петров, это хамство. В ту же ночь Кушкин снизу подбил своего первого, с удовольствием посмотрел, как тот горит и разваливается на лету, пилот выпрыгнул, и его, как с не меньшим удовольствием говорил Еремин, споймали. Петрова это завело, и на следующую ночь он обнаружил «фиата», пошел за ним, благополучно подбил, но далеко оторвался от своих и влетел на территорию, о которой толком ничего не знал. Горючки у него было в обрез, он понял, что вернуться не сможет, и решил садиться.</p><p class="p1">Внизу была предрассветная тьма, он снизился до трехсот и впереди разглядел даже и не площадку, а так, ровное место с гулькин хер, – как бы бухта, с трех сторон окруженная горами. Что интересно, симметрично справа была такая же, и даже чуть больше. Петров вспомнил, как Канделаки полетел к избирателям и посадил бомбер в Адыгее на площадке тридцать на пятьдесят, чуть не упершись в гору винтом, – еле развернулся потом и оторвался на самом краю пятачка. Но то был Кандель, на своей земле и днем. Надо было решать – направо, налево? Справа будто бы казалось шире, а слева длинней, Петров прислушался к интуиции, она сказала почему-то налево, хотя обычно он в таких ситуациях строго выбирал направо. Но тут ясно слышалось: давай туда. Можно было бы еще приглядеться, однако оставалось у него десять литров, и он зашел-таки на вираж и чиркнул колесами по камню; что-что, а садиться почти вертикально Петров умел. У него был пистолет, от которого в таких обстоятельствах не ожидалось никакого толку, – продать жизнь подороже, не более. Но поползли из кустов, стали отделяться от камня какие-то чуть видные малорослые люди, – светало, он вглядывался и ни черта не понимал. «Рус, – закричали ему, – рус авьядор!» – Петров понял, что попал к правильным людям, и помахал.</p><p class="p1">Они объяснили ему позицию. Там, куда он чуть было не сел, как раз были франкисты, и Петров прилетел бы к ним в объятия, и тут уж хваленое везение никак бы ему не помогло. Внутренний голос подсказывает отважному ковбою: теперь ты как знаешь, а я уматываю. Но на этот раз голос все говорил правильно, и Петров стал объяснять, что ему нужна горючка, – горючка, нафта, энтьендо? В ответ замотали головами, да и правда, откуда у них бензин. Но что у вас есть? Достать можете? Петров осмотрелся в разгорающемся свете дня: этими козьими тропами никакой грузовик не проедет. Ему бы хоть литров пятнадцать, но кто притащит? Допустим даже, что они пошлют пацана на базу, – сюда, положим, никто больше не сядет, чертовы горы, но сбросят как-нибудь; однако пока добежит пацан, пока прилетит Еремин или кто там, да пока сбросит, да пока промахнется… Петров уже знал несколько испанских слов, стал объяснять: диес и еще диес литрос… газолина! Си, си, закивал испанец. Одна канистра у них была, ее принесли, но что толку в одной канистре? Какого качества бензин? Нумеро октано? Си, буэно, объяснял ему республиканец, типичный козопас, смуглый, с жесткой шкиперской бородой. Мало, этого мало, повторял Петров, как это… поко! Тогда бойца осенило. «Алкохоль!» – предложил он. Но алкохоль, попытался объяснить Петров, не до выпивки! – но испанец уже кого-то послал, и две канистры чистейшего местного спирта отнесли к самолету. Откуда у них спирт? – да уж понятно, что в горах спирт бойцу нужнее бензина, а откуда? – так они на своей земле. Петров прикидывал: он никогда еще не летал на спирту, такого не водилось в авиации, но бензина ему хватило бы километров на двадцать, несерьезно; разве долить? Получим спирто-бензиновую смесь, что же я о ней знаю? «Еще, еще надо», – раздраженно крикнул он, и республиканец на хорошем русском ответил: «Ну что ты сердишься, еще так еще».</p><p class="p1">– Мать моя вся в саже, – выдохнул Петров, – что же я перед тобой выделывался тут?</p><p class="p1">– Не знаю, – пожал плечами боец, – я думал, ты знаешь.</p><p class="p1">– Что я знаю?</p><p class="p1">– Что тут свои.</p><p class="p1">– Ну так не везде же свои! Я понимаю – в авиации…</p><p class="p1">– Везде, – со значением сказал боец. – Тебя как зовут?</p><p class="p1">– Толя, – радостно признался Петров.</p><p class="p1">– Болван. Здесь как зовут?</p><p class="p1">– Теодор.</p><p class="p1">– Тореадор, – передразнил смуглый. – А я Эрнесто.</p><p class="p1">– А дома как?</p><p class="p1">– А дома неважно. Мы там вряд ли увидимся.</p><p class="p1">Петров тотчас успокоился: он был среди своих. Он не сомневался теперь, что и остальные все были русские, притворявшиеся испанцами чисто для конспирации.</p><p class="p1">– Ты выпей, – предложил странный Эрнесто. – Пока заливать будут… они тут, понимаешь, все делают медленно. Те еще вояки.</p><p class="p1">Петров выпил, запил водой, услужливо предложенной девушкой из отряда, – медсестра или мало ли, кто знает ихние боевые обычаи, – и засмеялся.</p><p class="p1">– Слушай, – сказал он, – а там… ну, с той стороны… там тоже мы?</p><p class="p1">– А чего ты думаешь, очень свободно, – серьезно сказал Эрнесто. – Недовоевали, ну и вот. Там у них целый отряд из марковцев. Только они не здесь воюют. А вполне может быть, что и здесь кое-кто… Слышал я, там у них Яремчук второй. Славный был офицер, может, и стыкнемся еще.</p><p class="p1">– А ты что же, – сообразил Петров, – еще в Гражданскую?</p><p class="p1">– Ну а как же, – гордо пояснил боец. – Я еще в Ракитном дрался, слыхал? За тот бой именное оружие имею. Тоже со мной тут. – И хлопнул по кобуре, однако оружия не показал, не желая, видимо, светить фамилию.</p><p class="p1">– Забавно, если встретитесь… ну, с этим-то…</p><p class="p1">– Обязательно встретимся. Есть за ним должок кое-какой. Тут ведь как, товарищ Теодор. Гражданская война – это же мы первые спецы. Эти, испанцы-то, воюют отвратительно. И не хотят они воевать, понимаешь? Пополнение никакое. Анисовую пить – это пожалуйста, а бегать, стрелять… И потом, они все норовят брататься. Один мне давеча говорит: ну что Франко, и при Франко люди будут хлеб сеять… Без понятия. Ни принципов, ничего. Если б не мы, давно бы уже все замирились.</p><p class="p1">– Но фашисты же! – не понял Петров.</p><p class="p1">– А им хоть фашисты, хоть кто. При любых живут. А где гражданская война – там обязательно мы, без нас бы давно весь мир загнил и все затухло. Только мы никогда не довоюем. Я сидел дома, розочки, вишь, растил. А сюда приехал – и опять жизнью запахло.</p><p class="p1">– Я тоже, знаешь, дома не смог, – честно сказал Петров.</p><p class="p1">– Ну а как же, – с пониманием кивнул Эрнесто. – Жизнь – это разве же переносимо? Я уже которую жизнь живу… Кончится тут – домой поеду, у нас там тоже, почитай, будет гражданская война.</p><p class="p1">– Да ладно, – не поверил Петров.</p><p class="p1">– Обязательно, – твердо сказал Эрнесто. – Но сначала я, конечно, Яремчука второго найду. Теперь уж не уйдеть. – Он словно нарочно смягчил это «не уйдеть», чтобы оно стало похоже на шутку, но оно не стало. – Лети давай, спиритус отличный, с бензинчиком в самый раз.</p><p class="p1">Принесли три канистры, стратегический запас, и Петров махал – быстрее, быстрее! Потому что напротив увидел пулемет, и этот пулемет вполне мог добить до него, а проклятый рассвет уже разгорался. Эрнесто опять поднес ему алюминиевую кружку, Петров глотнул, запил, затряс головой – республиканцы двигались лениво, казалось ему. Кто-то закурил у бака – Петров затопал ногами и вырвал самокрутку. Солдатики переглянулись уважительно. Он прикинул, как будет взлетать: самый длинный путь получался по диагонали, но упирался прямо в обрыв, довольно-таки отвесный; оно и к лучшему. Черт меня дернул лихачить в этих ночных полетах! Невозможно было представить, что где-то есть Москва, мирные испытания, Поля… Отставить. У него был такой прием с детства – представлять, что это не с ним. Хорошо, сказал себе он, если действительно очень сильно разогреть мотор, если со старта выжать сотню, если задрать нос… Потом – эта отвесность может сыграть на нас; положим даже, что мы на долю секунды провалимся, – есть, есть шанс. Прикинул: у него было сто двадцать метров максимум. Ни метра больше. Если он сел… но для взлета нужно никак, никак не меньше ста, так не было еще, чтобы меньше. Хотя стоп! Он слышал – кто же ему рассказывал? – да кто-то же из газетчиков, точно рассказывал, что американец, негр, взлетел с тридцати. Но негра не собирались расстреливать из пулемета; если бы собирались, он бы пердячим паром, может, взлетел с двадцати. Петров вспомнил Ассена Джорданова, который всегда его выручал; Ассен Джорданов утверждал, что в обозримом будущем появятся самолеты, которым на разбег нужно меньше их собственной длины. Петров представил, как часто делал, Джорданова, который сидел с ним рядом на штурманском месте и одобрительно, спокойно кивал. И как только третья канистра опустела, Петров сел в кабину и заорал: «От винта!» Ему казалось, что это должны понимать все солдаты мира и даже все гражданские; и было нечто в его интонации, от чего они так и прыгнули в стороны.</p><p class="p1">Спирт был плохой, это он понял еще на вкус, сладковатый, из какой-нибудь местной дряни. Но винт закрутился, только дрожь была не очень хорошая, несколько избыточная. Мать честная, это какой же будет выхлоп! Легче почему-то было ругаться, и Петров стал на все лады крыть партизан, которые тут стреляют и пьют, пьют и стреляют, и никакого толка; опробовав мотор на малых оборотах, он дал полный газ к обрыву. Нельзя было представлять, как он туда грохнется, надо было представлять, как он оттуда оттолкнется; ему нужно было десять минут в воздухе, только десять минут – и он у своих. Он представил себя на месте Канделя в Адыгее, но понял, что ненавидит и Адыгею. Все, кто с открытым ртом глядит на взлет, только и ждут, чтобы летчик разбился. Ну нет, подумал Петров. Он взлетал на запад, солнце било в глаза пулеметчику, очень хорошо, удача за нас. Что-то загудело у него в ушах, какая-то музычка. Петров не помнил, откуда музычка, но вдруг с ужасной ясностью представил театр, мосфильмовский оркестр, увертюру – там, там, парам-пам! – и стремительно, в такт ей, повел свой курносый самолет к обрыву. Все слушается, все как надо: пам, пам, парам-пам! Ну, мелькнуло у него, если сейчас оторвусь, то и от всего оторвусь, и буду с Полей до конца, до упора, до самой смерти буду с Полей! И когда в нем ровно запело «та-та-та-ТИ-там», он почувствовал пустоту под колесами; как и предполагал, на долю секунды провалился ниже – но выправился и, задрав нос, пошел на высоту.</p><p class="p1">Этого не могло быть, но это было. Всем теперь приказать летать на этом спирту. Там! Там! Тарамтам! Ничего не поделаешь, подумал Петров, теперь придется до смерти быть с Полей. Он развернулся, солнце ударило в лицо, он скорее почувствовал, чем увидел, что пулемет проснулся и колотит внизу, но это уж было пустое сотрясание воздуха. Петров глянул вниз: площадка была уже метрах в двухстах, и непостижимо было, что он сел на этом горном пятаке среди местных алкоголиков. Если дотяну, сказал себе Петров, я пришлю им цистерну спирта, тонну спирта. Оранжевая земля лежала под ним, мерзкая оранжевая земля, которая так ждала, чтобы он в нее впечатался, но в этот раз не дождалась.</p><p class="p1">Было шесть утра, когда он плюхнулся на аэродром. Огольцов был здесь, и Петров понял, что сейчас его будут разносить за все бывшее и небывшее.</p><p class="p1">– Сука, – коротко крикнул Огольцов, – ты знаешь, кого подбил? Их всех уже взяли, один погиб, а четверо в норме. Уже рассказывают. Они хотят тебя видеть, ты понял?!</p><p class="p1">Расцеловал Петрова и отшатнулся.</p><p class="p1">– Ты пьян, что ли?</p><p class="p1">– От самолета, – пояснил Петров. – Самолет да, пьян.</p></span></span>
