<p class="p">2</p>
</div><p class="p1">На свежего человека действовало сильно: сажая новичка в самолет, Волчак на трехстах метрах высоты убавлял газ, переходил в пике и носом в землю, в ближайшую деревню, снижался до ста. Если деревня или новичок ему не нравились, то до восьмидесяти. После чего резко задирал нос и лез вверх, а на высоте освобождал управление и требовал повторить. По-настоящему одобрил бы он только того, кто в ответ упал бы до семидесяти, но в возможностях самолета уверен не был. Когда Семаков в двадцать девятом на этом двухмоторном АНТе, пролетев 21 700 км от Москвы до Токио и назад с восемью остановками, приехал к Карпову и увидел такое, он брезгливо сказал: фу, форс. Семаков не оценил новаторства, и в этом воплотились его консервативность, отсталость. Те, кто вчера еще, как говорят цыгане, в ногах попирал Волчака, – кто же не слышал криков вокзальной гадалки, которая, будучи схвачена милиционером, кричит ему с отчаянием: тебя в ногах попираю! – сегодня ему кадили. А вот карьера Семакова стала с этого момента закатываться, сходить на нет, пока не закончилась совсем темно и двусмысленно, и тогда Карпову стало понятно, что про Волчака лучше плохо не говорить. Как-то стало понятно, что на него упал луч славы, и в этом луче он годится на роль символа всех наших побед. Что именно он, а уж никак не Гриневицкий, не Канделаки и подавно не Семаков олицетворяет собою все главные вещи, присущие эпохе. Первое – кто лучше всех, тому все можно. Второе – победителей не судят (а везуч Волчак был фантастически, вплоть до знаменитой посадки на обрыве с бомбами, когда решительно ничто не мешало отбомбиться в Черное море). И третье: если нужен результат, давать его надо не экономией средств, не форсированием наук, не многократной тренировкой, а ЛЮБОЙ ЦЕНОЙ. Поняли? Вот это все Волчак олицетворял, и не сознательно, а так получилось; он идеально совпал с такими требованиями к авиации, сама же авиация изначально совпала с таким духом: она стала кораблем, возглавляющим эскадру, и на носу этого корабля маячила плечистая, скульптурная фигура Волчака. Что он сделал (как Бровман понял тогда и даже не стал записывать)? Он бессознательно начал нажимать именно на эти свои качества – и конечно, летал. Летал изумительно, с этим невозможно спорить. И в каком-то смысле был прав, требуя от щенков на высоте «Повтори!». На тридцатилетие ему подарили тортягу с кремовой надписью «Можем повторить!», но повторить падение на восемьдесят не мог никто.</p><p class="p1">Ну в самом деле, что вы все впились в инструкции? Бюрократизм, понимаете. Во времена спурта, когда надо за пять лет преодолеть отставание в пятьдесят, какие могут быть инструкции – для небывалого, пионерского дела, для новаторской во всех отношениях области? По инструкции самолет надо было сажать на три точки, но Максимов допер, что при этом случаются чрезмерные нагрузки на костыль и рушится хвостовое оперение, а потому сажать его надо по-английски, сначала на колеса. И в результате инструкцию переписали по-максимовски, и стало так. Английский стиль! Это придумал Де Хэвилленд, сам конструктор, сам испытатель, сам производитель, к сорока годам миллионер, и страшно подумать, что зарабатывал бы Волчак, родись человек с такими данными в мире капитала. Но он родился здесь, и его участь была лучше – герой, полубог. Эту породу людей интересовали не деньги, а возможности. И возможности у них были те, что Хэвилленду не снились. Однажды Дубаков спросил Максимова: вон Волчак делает иммельман на Р-1, но разве на нем можно? Волчаку – можно, спокойно ответил Максимов. И рассказал анекдот: медведь составляет список – на завтрак заяц, на обед лиса, на ужин придет ко мне куропатка… Все плачут. Тут заяц спрашивает: а можно не приходить? Можно, вычеркиваю. Этот анекдот Дубаков пересказал потом Бровману, и Бровман рассказал другой, свежий: Сталину докладывают, что ну там какая-то поломка на производстве. Сталин: начальника цеха расстрелять, мастера расстрелять, рабочего расстрелять… Орджоникидзе говорит: да ладно, может, сначала на вид поставить? Сталин, добродушно: «Ну, или так…» Тогда передавали историю: на репетиции парада в Тушине Алексеев, был такой молодой летун, решил сесть после выхода из штопора. Нога скользнула с педали, и он вмазался в реку. Вытащили. Он доложился Сталину: товарищ Сталин, летчик Алексеев по своей вине угробил машину. Сталин: ничего, ничего, машина – железо, главное, что сам жив… Дня через три, после парада, спрашивает осоавиахимовца: ну а как Алексеев? Передайте ему привет! Осоавиахимовец решил выслужиться: тыщ Сталин, мы проверили – Алексеев, оказывается, сын кулака!!! Тот – пых-пых трубкой: «Ах, сын кулака? Ну, в таком случае прошу передать ему от меня… ГОРЯЧИЙ привет!»</p><p class="p1">Все они были близко к небу: падать смертельно, но решалось все на небе, и близость к нему воспитывала особый дух. И Волчак… да что говорить! Пока они были вдвоем с Максимовым, пока их в принципе было двое, все как-то делилось и никто ни на кого не перетягивал. Были люди, которых Волчак слушался, – скажем, Карпова. Были те, кто смел ему советовать. Волчак мог детально обсуждать с конструкторами малейшие недочеты, все выправлять, десять раз переделывать – в работе не было никакой заносчивости, хотя слава катилась, его звали уже воздушным Чапаем. Но были вещи настораживающие.</p><p class="p1">Дубаков впоследствии не особо любил рассказывать, как Волчак сказал ему: ну-ка, ты вроде хорошо пилотируешь у земли, давай попробуем лобовую атаку. Что же, знаем, быстро прикинул Дубаков, идеи товарища Яцука нам очень знакомы (Дубаков был подкованный, про Яцука читал еще в школе, мечтал у него лично поучиться, но не случилось – сожрала Яцука болезнь, и руководитель первого дубаковского курса еще в военно-теоретической школе в Питере, такой был Гамкрелидзе, сказал с глубокой грузинской печалью: кто быстро живет – мало живет).</p><p class="p1">Еще на взлете по дымку Дубаков понял, что Волчак разгоняется, и тоже поднажал; сблизились они быстро, очень скоро наступала пятисотметровая зона, а в ней ни один маневр не позволит избежать столкновения. Это называется пространство смерти; так же называлось американское кино про летного лихача, про которого Дубаков немедленно вспомнил, – вот же какая ерунда вспыхивает в голове, в институте крутили эту картину тридцатого года, потому что надо же знать! – там два брата вступили в британские военно-воздушные силы, один худой, второй пухлый, один Рой, как же второй?! Монти! Дубаков стремительно полез вверх, в иммельман. Волчака он не видел. Потом рассказали, что они одновременно рванули вверх, друг к другу колесами, едва не зацепившись, это было похоже даже не на балет, а на сеанс любви ужасных насекомых. Почему-то впечатление у всех было мрачное. Волчак на земле подошел и сказал:</p><p class="p1">– У тебя характер как у меня.</p><p class="p1">Сказал он это без одобрения, и Дубаков не обрадовался.</p><p class="p1">– Ты в следующий раз первым сворачивай, – сказал Волчак. – Гробанемся, как эти…</p><p class="p1">Можно было бы ответить: а почему не ты? Но Волчак был не так настроен, и ясно было, почему не он. Он уже был Волчак.</p><p class="p1">И как таковой он был небезупречен даже с Карповым. Никто не входил с Волчаком в долгие разъяснения, почему военные самолеты не могут делаться штатскими людьми и почему конструктора надо сначала взять, а потом помиловать, и Волчак злился, что из военного института его перебросили испытателем на завод имени Менжинского. Он, что называется, рвался в бой и полагал войну неизбежной в ближайшие два-три года; ему неясно было, что это за тайный завод, где люди одновременно живут и работают. Волчак поначалу искренне полагал, что Карпов вредитель и просто так его бы не взяли, но оказался вредитель полезный и потому до поры помилован. Разговаривал он с ним сначала через губу, как и должен человек законопослушный общаться с зэка. Только первый полет на новом истребителе несколько изменил отношение Волчака к конструктору, и после приземления он сразу хлопнул того по плечу, начал бурно хвалить машину, но скоро спохватился: «Если ты мне ее не доведешь, я первый тебя засажу!» Карпов был тертый калач, с порядочным опытом жизни и многими печальными неожиданностями позади, а потому увел разговор – вместе, мол, будем доводить; но Волчак погрозил ему пальцем, словно он был тут главный. Он, собственно, и был – от его отзыва все зависело; надо отдать ему должное, отозвался честно.</p><p class="p1">После первых недель работы с Карповым Волчак весьма к нему расположился, глубоко допоздна засиживался на заводе, входил в любые мелочи и избавился постепенно от спеси; и Карпову даже стало казаться, что это действительно великий профессионал, летчик, каких не было; и после первого успешного полета, как и обещали, Карпова помиловали, то есть за два года он прошел путь от приговоренного к смерти до руководителя бюро. Но Волчак, как выяснилось, никого не миловал, у него раз оступиться было достаточно, чтобы он тебя запомнил навеки.</p><p class="p1">Примерно за полгода до этого перелома произошла у него драматичная поломка, которую он в другое время не заметил бы. Прежний Волчак от такой ерунды, еще и благополучно окончившейся, отмахнулся бы, как от мухи. В Горьком, на родине, случилась чушь. Он проверял новую машину двадцать первого авиазавода, один промежуточный вариант. На нерве были все: только что завод пришлось переименовывать – его назвали в честь Енукидзе, а Енукидзе проявил бытовое разложение, утратил бдительность, был исключен из партии и сослан в Минеральные Воды, хотя непостижимым образом год спустя добился восстановления; но обратно переименовывать уже, конечно, не стали, оставили имени Орджоникидзе. Серго уж точно не мог быть замечен в том, что приписывали Енукидзе, хотя, справедливости ради, это как самое гнусное потом приписывали всем. Но было нервно, и директор завода Мирошников чувствовал себя кое-как, у него вдобавок недавно рухнул деревообрабатывающий цех, двух убило, десятерых ранило. И новый аэродром, бывший осоавиахимовский, сделан был отвратительно – лес вырубили, пни не выкорчевали, промажешь – не сядешь. Но машина была знакомая, понятная – и вдруг на ровном месте ее затрясло. Волчак знал про такое только теоретически, у него никогда еще не разваливался мотор, но это было оно, оно самое, кошмар любого пилота. Переднее стекло тут же залило маслом, хлеставшим из-под капота. Волчак знал, что делать, – планировать, потому что, если не выключить срочно двигатель, вибрацией разнесет корпус к чертям собачьим, но знал в теории, а как сажать на пни? Заглушив двигатель на трехстах высоты, он планировал. Стало ужасно тихо, убийственно тихо. Волчак в отчаянном положении решил уходить на лес и в принципе рассчитал правильно – ветки погасили скорость, но у самой земли Волчака сильно ударило по голове. Когда подбежали колхозники, он свисал с дерева башкой вниз. Вызвали карету скорой помощи, Волчак сказал – никакой больницы, на завод. Самолет разобрали, установили, что в двигатель попала мелкая деталь, она и разнесла цилиндр, но как попала в цилиндр? На заводе и так была истерика, все уже искали вредителей, Волчак успокоил, как мог, не сам ли он твердил всем, что на вредителей валят лентяи, что у дурака всегда вредитель виноват, что кто хочет делать – находит способы, а не хочет – ищет вредителя… Но в душу ему эта дрянь запала, и в первый раз за карьеру он задумался: не надо ли кому-то его остановить? Знали же, твари, где напасть. В Москве бы проследили. Он не то что испугался – у него с этим было сложно, что-то вроде атрофии некоторых инстинктов, – но насторожился. Сфотографировался с перевязанной головой, повесил на стенку в новой квартире – как бы напоминание, что и я не все могу. Ольга запаниковала, сказала – примета, убрала.</p><p class="p1">Перелом случился у него примерно в то же время, что и на самом верху. Ведь было как: тех тоже было двое. Как только не вбивали меж ними клина, как не старались поссорить! Пустили даже слух – совершенно ни на чем не основанный, – что на Семнадцатом съезде ленинградец собрал больше голосов, его вели в генсеки! На самом деле он был последний, с кем Сталину можно было говорить, единственный, в ком он видел брата, и когда ленинградца убили, нечто в Сталине надломилось совершенно. Тут уж мало не показалось никому.</p><p class="p1">С Волчаком то же самое случилось тремя месяцами ранее.</p><p class="p1">Максимов в тот день (и надо же было им всем в последние свои вылеты решать простейшие, рутиннейшие задачи, словно им не позволялось вернуться к обычной человеческой работе) на И-5 показывал для учебного фильма фигуры воздушного боя, которые мог бы выполнить не то что с завязанными глазами, а со связанными руками, Волчак облетал И-15, новую карповскую конструкцию, там было гораздо больше риска. И перед последними вылетами они договорились, что вторую половину дня проведут на ипподроме. Волчак был к лошадям равнодушен, но Максимов еще в Гражданскую их полюбил, и нравилась им обоим ипподромная обстановка, с потрепанными знатоками, еще с раньшего времени, с непонятными разговорами и расчетами, с буфетом, где можно было застать какую-то особенную кильку, – ипподром был теперь полузапретным местом, терлась там и богема, и бандиты; интересней было только в бильярдных, и Волчак любил покатать шары, но сегодня решил угодить Максимову.</p><p class="p1">Киноаппарат стоял в центре поля, Максимов пару раз на него спикировал, а на третий, выходя из пике, вдруг застыл. Волчак заорал: «Ты что?!» – и побежал к центру.</p><p class="p1">– Выводи! – орал он. – Резко ногу!</p><p class="p1">Да что ж, Максимов не вывел бы? Он выводил не из таких пике, но тут не было высоты, он не мог перевернуться, так и упал. У него, как оказалось, сломалась педаль ножного управления, регулировавшая рули поворотов. Максимов погиб сразу, никакой надежды. Карпова в тот день не было на аэродроме, иначе, клялся Волчак, убил бы – притом же И-5 был давно облетан, и если б Максимов ограничился двумя показательными вылетами, ничего б и не было. Но он хотел закончить картину, все они торопились всё сделать раньше срока.</p><p class="p1">Максимов многажды ходил под смертью, был с ней накоротке, служил в империалистическую, в Гражданскую воевал сперва с чехами, потом с Юденичем, облетал самолет-звено Вахмистрова – двухэтажную конструкцию, когда тяжелый бомбер выносил на крыльях два истребителя, и мало кто верил, что они сумеют синхронно сняться, отщелкнуться и уйти в автономный полет; и все получалось. И всегда Максимов был несколько в тени Волчака, а между тем он один имел на него влияние и проводил с ним все свободное время. У Волчака были жена и сынок, он недавно перевез их в Москву, а то все было некуда, а Максимов жил бобылем, жена его бросила еще в двадцатом, что-то там было, о чем он не любил разговаривать; случались у него, конечно, девки, но никто про это ничего не знал. У Волчака он отогревался, пятилетний Игорь его любил, какие-то Максимов ему делал катера с мотором из резинки на резиновом ходу; и теперь, когда Максимов погиб, стало ясно, как он со своей тихой хитростью, непрошибаемым упрямством и вечной усмешечкой придавал им всем уверенности. С ним было спокойно, а без него все вдруг поняли, что они смертны. Волчак про смерть вообще не задумывался, а то, говорил он, начнешь и затянет; но теперь все случилось рядом, и так глупо, и настолько никто не был виноват! Говорил же Громов: триппер – профессиональный риск развратника, смерть – болезнь летчика. И Волчак считал такую позицию правильной, хотя грубой. Можно было помереть при облете нового самолета, но не от такой ерунды!</p><p class="p1">Некоторое время он пытался успокоиться, отыскивая тут вредительство. Накатал письмо, в котором обращал внимание органов на подозрительный ряд катастроф, связанных с именем Карпова: сперва внук живописца погиб, потом Громов чудом прыгнул с парашютом, испытывая И-1, теперь вот эта педаль; опять-таки двухместный истребитель конструировался при карповском прямом участии. Фюзеляж делал Ольшевский, и к фюзеляжу вопросов не было. Двигатель был английский, «Нэпир-Лайон», к нему тоже вопросов не было. А вот что при проверке максимальной горизонтальной скорости погиб испытатель Филиппов с хронометристом Михайловым, это была уже прямая вина Карпова. В результате «преступной небрежности» конструктора сорвало к такой-то матери сперва нижнее крыло, потом верхнее, и на рекордной скорости триста километров машина рухнула, даже не успев набрать высоту. Карпов за контрреволюцию уже отсидел, но, как видим, не прервал деятельности, теперь уже не контрреволюционной, а вредительской… Удивительная вещь – написав этот документ, со всеми его причудливыми сочетаниями яростной ругани и прокурорских формулировок, Волчак его порвал к той самой матери. Не то чтобы утолил таким образом жажду мести, а просто, может быть, понял, что из таких и подобных катастроф состояла история авиации, и сам он в камеру номер двенадцать попал по идиотскому самодурству, и самолет Карпова, на котором он сейчас летал, был, в общем, нормальный. Так что, придя несколько в себя, Волчак пришел к Карпову в бюро, попросил разговора наедине и извинился. Он впервые обратился к нему на «ты», словно этот неслучившийся донос их сблизил, как сближает, в общем, всякая вина – больше любой услуги.</p><p class="p1">– Прости, Николай Николаевич, – сказал Волчак, – я на тебя думал, но, рассудив, твоей вины не нахожу. Просто, сам знаешь, Максимов был мне как брат и больше, потому что брат бывает вообще чужой человек.</p><p class="p1">В его случае, кстати, так и было. Он был пятый ребенок в семье и с предыдущими четырьмя, которые все выжили, никаких связей не поддерживал, даже открыток от них не получал.</p><p class="p1">– Все понимаю, товарищ Волчак, – сказал Карпов. Фамильярничать он не хотел. – Мы все пережили горе, с горем каждый справляется как умеет. Я только одно хочу вам сказать, не подумайте, я это говорю от уважения. Вы летчик, какого больше нет, а может, и не будет. Призывать вас беречься – глупость, Волчак беречься не способен. Я вас прошу от другого беречься. Мы же все тут, в общем, делаем одно дело, хотим одного. Зачем вам к вашим блистательным летным качествам еще вся эта нагрузка…</p><p class="p1">Но тут он осекся, поняв, что Волчак не был бы Волчаком, если бы любил только небо, хотел только летать или в крайнем случае изобретать. Волчак хотел неизмеримо большего, он и будущим биографам будет рассказывать, что в любой мальчишеской компании становился лидером, а на любой работе менял под себя инструкции. Карпов увидел вдруг огромный путь, который лежал перед Волчаком, великие задачи, которые тот себе ставил, и понял, что другой человек не пришел бы к нему виниться, – у него просто масштаба не хватило бы, а сам Карпов сейчас делает примерно то же, что делал бы генерал Марбёф, увещевая Наполеона ограничиться изучением артиллерийского дела и не мечтать об освобождении Корсики. Карпов читал биографию Наполеона и делал выводы. А потому он не договорил и сказал только:</p><p class="p1">– Надеюсь, товарищ Волчак, что, когда вы будете летать еще выше, вы вспомните, что не боги горшки обжигают. А про всех своих испытателей я помню, по ночам снятся.</p><p class="p1">И хотя Волчак никогда уже не был прежним Волчаком, но с Карповым никогда впредь не заедался. Это, может, было последнее в его натуре, на что уже с того света повлиял Максимов. Его портрет всегда несколько неловко улыбался у Волчака на прикроватной тумбе. А скоро появилась «Красная пятерка», во главе которой оказался, понятно, Волчак, – и начался тот период его жизни, который в брошюре Бровмана описывался в главе «На главных высотах».</p></span><span id="id47"><div class="title6">
<p class="p">3</p>
</div><p class="p1">Восхождение его началось в челюскинский год, когда его не послали спасать челюскинцев – берегли, но для чего, стало ясно позже. Тогда Героев дали семерым, в том числе полупричастному Гриневицкому, и Волчак будто бы искренне за всех радовался, как взрослый марафонец, наблюдающий детский забег на пятьсот метров. Осенью того года он на Ходынке представлял вождям И-16. Ходынка с десятого года была летной вотчиной, честь первого московского аэродрома почти забила ее дурную славу. Ясным октябрьским днем Волчак показывал все возможности своего красавца, включая выход из левого штопора, только что отработанный под Москвой под скрежет Карпова «Что он делает». Волчак зашел на посадку вверх колесами и в последний момент картинно перевернулся, почти сразу заглушив мотор, чтобы никого не порубать винтом. Вожди смотрели с любопытством. Орджоникидзе горделиво озирал всех, словно и самолет, и полет были его персональной заслугой. Каганович ничему не удивлялся и задавал бессмысленные вопросы, долженствующие показать глубокую погруженность в тему: а качество лобового стекла? а качество заглушек? Никто не понимал, какие заглушки он имеет в виду; Карпов первым нашел модус ответов, сообщив, что качество заглушек до последнего оставляло желать, но сейчас на горьковском заводе номер двадцать один сделали качественный рывок. Каганович глубокомысленно кивнул. Ворошилов сказал: это какая же должна быть физическая сила, какой атлетизм у пилота, чтобы так владеть педалями вниз головой! Ему пояснили, что товарищ Волчак является атлетом по, так сказать, физическому строению. А что, сказал Ворошилов, можно бы внедрить норматив Волчака: сколько он подтягивается? Никто не знал, но знали, что вопросы начальства нельзя оставлять без ответа, и Громов сказал – тридцать. Отлично, заметил Ворошилов, но я в лучшие годы мог и тридцать два. Нет, я столько не мог, сказал Сталин, и сразу стало понятно, что Ворошилову не надо было подтягиваться тридцать два, что лучше бы он делал что-нибудь другое, полезное.</p><p class="p1">Сталин, как обычно, был непроницаем, но когда Волчак осипшим и как бы стиснутым голосом отрапортовал, вождь удостоил его отдельного разговора. Он вглядывался в него особенно долго – тем любовно-испытующим взглядом, каким, по признанию Волчака, и родной отец, судовой котельщик, на него не смотрел. Волчак почувствовал, что проходит в этот миг главную в жизни проверку, не понимая при этом – на что проверяют, но приказал себе быть естественным, ибо во всей предыдущей жизни это его выручало. Что же вы, товарищ Волчак, сказал Сталин, летаете без парашюта, разве это ответственно? Машину такого качества, рапортовал Волчак, пилот не имеет права покинуть, в нее вложены народные средства. Э, пилот нам дороже машины, сказал Сталин. В особенности такой пилот, – и пожал ему руку совершенно просто, по-отечески, о чем Волчак три раза за вечер рассказал Дубакову. Ты понимаешь, сказал он, этого же не может быть – я, волжский парень, ему дороже этой машины! Я просто почуял вдруг, что я ему действительно нужен, а для чего нужен – это я пока знать не могу, но когда-то пойму!</p><p class="p1">Карьера редко делается посредством систематических усилий. Настоящее вознесение наступает тогда, когда на тебя упал благосклонный взгляд высшего существа, причем ты действительно не можешь знать, для чего понадобишься, – может быть, тобой станут забивать гвозди, – но противиться очарованию этого взгляда человек не может. И пусть его осуждают те завистники, на которых не падал такой взгляд. С этого момента Волчак считал себя особенным, но меньше рисковать не стал – напротив, его теперь хранила эта особость. С человеком, который нужней такой машины, ничего не могло случиться.</p><p class="p1">Тогда же решено было готовить пятерку для первомайской демонстрации. Опять же где-то, на самых верхах, решено было ограничиться именно пятеркой, по числу лучей гипотетической воздушной звезды, и покрасить все истребители в ярко-алый. Упоминание двадцать первого горьковского завода не пропало втуне: карповский истребитель запустили в серию на тридцать девятом в Москве и там. Первые пять машин передали Преману, Супруну, Шевченко, Евсееву и Канделаки. Волчак должен был лететь во главе, но про запас держал Канделаки. Пятерку он отбирал лично, все были люди непростые. Евсеев – сын ссыльного рабочего-революционера, умершего в Благовещенске на поселении за год до революции, которая бы его освободила. Он был в числе первых четырнадцати мастеров парашютного спорта, рекордсменом, прыгнул с семи двухсот, пролетев в свободном падении семь пятьдесят; как пилот, возможно, он и не представлял ничего исключительного, но обладал страшным, поистине небывалым хладнокровием; не слишком его любившие товарищи (он ни с кем не сходился) говорили, что это от тупости, но Волчак увидел в нем что-то такое – возможно, свою же исключительность, тоже не позволявшую дружить абы с кем. Людей они оба недолюбливали, это да, потому что мало кто из людей видел смерть так близко. Преман был, напротив, душа-человек, самый из них молодой, покладистый и мягкий, выведший недавно планер Стефановича на рекордную высоту, аккуратный, как положено немцу, и смотревший Волчаку в рот. Шевченко – уже легенда – однажды, садясь на брюхо, сломал обе ноги, пережил шок, но добился возвращения в авиацию; мечтал конструировать бипланы, уверял, что будущее за самолетом, который в полете меняет профиль крыла или вовсе это крыло убирает, и многие прислушивались – красиво выглядело. Супруна Волчак взял из принципа, потому что про него уже, что называется, говорили; он приехал из Канады в двадцать пятом, восемнадцати лет от роду, вступил еще там в коммунистическую лигу и оставил в Канаде возлюбленную, которую не терял надежды переманить в СССР. Чего сумская семья искала в Канаде и почему вернулась, рассказывал много и охотно; его послушать, Канаду надо было перетянуть из-под американского влияния, она была совсем как Россия, вот наладим трансарктические перелеты – Канада, хочет не хочет, будет нашим главным союзником. Он был очень приятный парень, и надо отдать должное Волчаку – он не любил, когда про хороших летчиков говорили зря. В конце концов, говорил Волчак, у нас стоят штатовские двигатели «Кертисс-Райт», и никто у них политграмоту не спрашивает. Это было красиво и тоже храбро, хотя кто-то наверняка записывал и подшивал. Волчак мог питать разные иллюзии, но четко знал, что не судят только победителей (а надо будет, так и победителей; истребители – другое дело, истребители сами всех судят, но надо было еще дорасти).</p><p class="p1">Канделаки был дублер Волчака и должен был повести всю пятерку, если вдруг мало ли что. После идиотской аварии в Горьком Волчак стал суеверен. Сорвать парад было нельзя, это было первое явление «ишака» на публике – Волчак лично так прозвал И-16, чтобы как-то одомашнить. Откровенно говоря, Кандель привлечен был еще и потому, что бывают люди, с которыми легко и участие которых в любом деле как бы гарантирует успех. Волчак был человек тяжеловатый, всегда в напряжении, Кандель же все проделывал играючи, и всех целей в жизни у него было, кажется, только летать, да повыше. У них были странные отношения: оба знали друг другу цену, но почему-то Волчак, выпивая, – а выпить он любил и в новую квартиру на Ленинградке кого только ни зазывал – никогда не брал в компанию Канделя. Дубаков однажды даже спросил: а может… Но Волчак зыркнул очень нехорошо и сквозь зубы сказал: мало ли что я с ним сделаю по пьяному-то делу. Дубаков ничего не понял, но к разговору не возвращался. У него мелькнула, понятно, мысль, что Волчак ревнует – больно легко все давалось Канделю, но какая тут могла быть ревность? Волчака все знали и в Кремле считали первым, а Кандель… что Кандель? Разве он был государственный человек? Он сам про себя говорил: ехал грека через реку. И все-таки пить Волчак его не звал, а летать позвал.</p><p class="p1">Про тот первомайский полет что говорить? Про него написали все, кто был и не был на площади, выпустили марку, в «Звездочке» дали полосу с биографиями. Вообще, это было главное событие парада, хотя недурной был парад – одних физкультурниц в красивых трусах прошло не меньше трехсот. Но по преимуществу он был военный: ехали бронемашины, танки БТ-5 и БТ-7, пехота шла минут семь, и даже планеристы с моделями на вытянутых руках имели вид мобилизованный. При этом – ах, какой это был веселый парад! Он был последний, в котором превыше всего была радость. Войной не пахло, война стала сгущаться год спустя; мощь была мирная, дружелюбная, демонстрировала себя открыто, Бровману так казалось. Парад тридцать пятого был маршем здоровых детей, у которых все получается. Бровман запомнил нескольких зрителей, невинно-прелестных девчонок без тени ведьминского очарования, которым так и сверкали девушки тридцать седьмого. Невинность была даже в майском ветре, в тополёвом запахе, долетавшем с Москвы-реки. И как-то при всей военной мощи, записал Бровман, было чувство души нараспашку: смотрите все, не жалко, мы это не для угрозы и не против угрозы, мы только исключительно потому, что умеем и это!</p><p class="p1">Волчак, однако, запомнил иное. Он летел низко, владея машиной как никогда и ощущая ее как продолжение себя, а себя как истребитель, и вел всех за собой как собственные крылья. Перед полетом, тем более перед таким, он никогда не пил, но был пьянее и счастливее любого пьяного. Он почувствовал тогда, что и площадь его, и все на ней – его, и если ему захочется, вся толпа будет делать то, что укажет и предскажет он. Мельком подумал, что Красная площадь – опасное место и летать над ней – опасное дело, но тут же себя оборвал и вслух сквозь зубы произнес: мне можно. Он летел над площадью против солнца, и горячее дыхание всей площади держало его, мог выключить мотор и все равно не упал бы, такой силы и глубины был этот пласт общего любования. Таких минут за всю жизнь набегает хорошо если три. Это была <em>его</em> площадь, и когда-нибудь он будет на ней там, где сейчас стоял Сталин с вождями. И что самое интересное – в этом не ошибся.</p></span></span>
