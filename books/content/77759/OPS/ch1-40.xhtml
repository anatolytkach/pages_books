<p class="p">Глава седьмая</p>
<p class="p">Сжатие</p>
</div><span id="id72"><div class="title6">
<p class="p">1</p>
</div><p class="p1">Бровман знал всех героев, перед некоторыми преклонялся, но одного Канделя любил. С Канделем была, можно сказать, дружба. Бровману хотелось думать – и к тому были основания, – что среди репортеров он, Бровман, был то же, что Канделаки среди летчиков: некоронованный король, которому не нужна коронация.</p><p class="p1">Кандель был персонаж легенд. Легендарна была его сила. Когда в шестнадцать лет он прирабатывал грузчиком, ему случалось таскать на спине мешки по восемнадцать пудов. Многие не верили, Кандель предлагал показать, но где взять мешок почти на триста кило? Такое в Новороссийском порту возможно, а на заводе Менжинского, где он числился испытателем, винт весил меньше, двигатель – больше.</p><p class="p1">Одной историей Кандель сначала гордился, потом несколько стыдился. Младший брат в двадцать восьмом пришел из плавания, и местные бездельники его побили. Всемером на одного, когда такое было в Новороссийске? Кандель как раз приехал на каникулы из летной школы. Пошли по окрестностям. Канделаки спрашивал брата: этот? Брат молчал. Канделаки – подозреваемому: ты бил моего брата? Тот молчал: скажешь бил – убьет. Скажешь не бил – вроде оправдываешься, стыдно. Канделаки бил один раз, валил с одного удара: шестеро лежали, седьмого просто не нашлось. Это было, конечно, не очень хорошо, за ним явное физическое преимущество, у него действительно был выдающийся удар. Но, во-первых, те вообще действовали семь на одного. А во-вторых, если тебя побили, то это ты позволил себя побить. Так говорил ему один грек, у которого Кандель в тринадцать лет работал на винограднике, но он и сам догадывался. Терпилой быть хуже всего. Слово «терпила» тогда обозначало того, кто не может постоять за себя. В Ленинграде, учась в летной школе, Кандель узнал другое его значение: тот, кому не отдают долга. В долг он никогда не брал, давал часто.</p><p class="p1">Тоже был случай. Напали, когда он ехал на велосипеде; лисапед-лисапед, чертова машина, руки едут, ноги нет, что за чертовщина. Велосипедов было мало, Кандель купил еще дореволюционный и довел до кондиции. Едет по Петроградской, ночь, трое пристали, хотели отнять велосипед. «Вижу – трое, нехорошо, становится скучно» – «скучно» было у него вместо «грустно». Он одного – тюк! Другого – тюк! Лежат. Третий заблажил и убежал. У Канделя всегда так: один лежит, другой бежит, третий блажит. А нечего. В велосипед вложены были усилия.</p><p class="p1">У Канделя была репутация человека, делающего невозможное, и притом как бы шутя, без обычной натуги, Сталин ценил его за это. Нельзя сказать, что любил: Кандель был несерьезен; вот если б он сам к себе относился посерьезнее – можно было бы делать ставку на него. Но ставка была на Волчака, мыслившего себя как человека государственного. А Кандель – таким, по крайней мере, он рисовался Бровману и таким Бровман его описывал – всегда немного играл. Приехал Сталин на Центральный аэродром, детально расспросил про все – Ильюшин изумился вхождению в детали, видна была истинная заинтересованность. Сталин тогда сказал: товарищ Канделаки, мы слышали, что вы делаете петлю Нестерова на двухмоторной машине, это довольно трудно. Но – ввернул пословицу, как всегда, – лучше один раз увидеть, не покажете ли свое искусство? Впрочем, если трудно… «Да какое же трудно, товарищ Сталин!» – и по-ка-зал! Три петли подряд! Это был день, когда он понравился; конечно, Волчак смотрел серьезнее, с особенным чувством, но Кандель производил впечатление той особенной русской надежности, которой не могут достичь иностранцы, когда всё как бы шутя, поплевав на руки… Сталин это любил. Но Канделаки – человек естественный, он был таким – и не потому, что Сталин это любил.</p><p class="p1">Он ставил рекорды не по соображениям карьеры, а потому, что сам дивился собственным возможностям – и еще везучести. Он, например, побил однажды высотный рекорд Синьерина, летел с тонной груза на 11 294, и вдруг на десяти стало трудно дышать. Оказалось, отлетела заслонка маски и упало в ней давление. Бровману он сказал так: «Спускаться было обидно, затыкать маску нечем». Кандель пошарил в кармане комбинезона – удача! Письмо! Письмо от влюбленной женщины, он их получал мешками, а это почему-то сохранил, взял письмо на высоту – зачем? Вот им и заткнул маску.</p><p class="p1">За ним так и закрепилось прозвище Высотник, для этого было у него все: феноменальное бесстрашие, склонность к риску, физическое здоровье, как ни у кого. О цели рекордов Кандель не думал, престиж его не беспокоил, в этом было что-то музыкальное: возьмет ту ноту или нет? Ему было интересно, и только. Сам он объяснял коротко:</p><p class="p1">– Если есть высота, я должен ее взять, правильно?</p><p class="p1">Изобретательность его не знала границ. Когда на И-15 Кандель пошел на двенадцать тысяч, надо было облегчать машину елико можно – он сообразил, что назад может падать без горючего, ему надо будет завестись только на последних четырехстах метрах. Так он и сделал. «Что ты чувствовал, когда планировал сверху?» – спрашивал Бровман. «Спина чесалась». Это был форс, конечно, но можно допустить, что Кандель и в самом деле ничего не чувствовал: не до чувств было. Бровман перечитывал иногда свои дневники, кое-что перепечатывал в папку «Личное» – пригодится для книжки – и не понимал: вот будет потомок читать, что найдет? Одну безумную гонку за высотой, дальностью и скоростью. Что же, мы не чувствовали ничего? Почему, чувствовали. Вот когда Канделаки поставил зимний рекорд – еще как чувствовали. Он решил взлетать без лыж, немыслимая вещь, взлететь еще можно, но на посадке колесо гарантированно увязнет, это капот, что тогда? А тогда, пояснил Кандель, будет рекорд; мало ли было капотов, главное – не забыть отстегнуться! И, отказавшись от лыжи, взлетел на тринадцать, на земле скапотировал, башкой влетел в сугроб, но только хохотал, когда поднялся. Вероятно, он находился в наркотической зависимости от адреналина, потому что весь день потом ходил с блаженной улыбкой, но надо же, говорил Кандель, чувствовать, что живешь! Черт с тобой, чувствуй; нет человека, который бы занимался спортом бескорыстно. Один хочет гордиться тем, что лучше всех бегает, другой испытывает так называемую эйфорию бегуна, третий думает стать главным по бегу в стране или мире; как пояснил однажды Бровману в интервью один писатель, большой друг полярников, лучше делать прекрасные вещи с низменным стимулом, чем низменные с прекрасным. А в вашем случае, спросил Бровман, как? А в моем, сказал писатель сердито, я уезжаю подальше от человеческой природы, все человеческое мне отвратительно. И потом, прибавил он, рисковать – это все-таки не работать.</p></span><span id="id73"><div class="title6">
<p class="p">2</p>
</div><p class="p1">Канделю человеческое не было чуждо, нет. Он любил жену, у него была, наверное, лучшая семья из всех, какие знал Бровман в летной среде. Варя была совершенная рыбачка – непостижимо, где он взял такую женщину, а между тем он вывез ее не из Геленджика, а из Москвы, приметил на подмосковной даче и женился, украл буквально из-под венца. Как было? Поехали к друзьям, друзья у Канделя были не только из летной среды; его неподдельно интересовали всякие экзотические люди, но не игроки или лошадники, к которым влекло Волчака, а люди странных профессий, заумные физики, умевшие понятно объяснять непредставимые вещи вроде пятого измерения (как выпьет – понимает, признавался Кандель, а протрезвеет – забывает). Поехали на дачу к одному тощему, густо-волосатому, совершенно невменяемому физику – Бровман потом встречался с ним на застольях. И в гамаке на соседнем участке Кандель увидел девушку, в которую влюбился. Поймите правильно, товарищи, Кандель всегда пользовался успехом у женщин. У него была рельефная мускулатура, но не мускулатура приносит нам успех. А как-то он так умел смотреть, что сразу становилось ясно: данная женщина ему интересна, он хочет с ней говорить, находит смысл в ее словах. Не на всех, конечно, он так смотрел, и даже не на многих, но Бровман всерьез полагал, что журналист из Канделя вышел бы блестящий: слушал он как никто, только забывал почти сразу. Это уж не по-журналистски.</p><p class="p1">И вот за дачным забором на соседнем участке увидел девушку в гамаке, которая, по его описанию, лежала в этом гамаке так увлеченно, так сосредоточенно, так всю себя вкладывала в это занятие, что хотелось немедленно – нет, не лечь с нею в гамак, а просто лечь, пусть отдельно. Понятно было, что вся она полна отдыхом и ленью, что ей лень даже следить за муравьем, который полз рядом по одуванчику. Делом секунды было бы для Канделя перемахнуть через забор, это было бы эффектно, но такая девушка посмотрела бы со скукой и спросила что-нибудь вроде: а на руках вы умеете? Она предавалась отдыху – не спала, ибо сон отвлекает, – именно отдыхала всем телом, и ей совершенно не нужен был прыжок незнакомца через забор. И Кандель стоял у забора и так же сосредоточенно, как она отдыхала, на нее смотрел, и это была самая правильная тактика, потому что бессознательная. Он стоял и любовался, вбирая и этот летний день с его шмелями, люпинами, запахом сохнущего сена, и девушку, такую легкую и такую тяжелую, такую крепкую. Ей было на взгляд лет восемнадцать. Она его словно совсем не замечала, но потом вдруг легко встала с гамака, потянулась, оказалась довольно рослой и подошла к забору. Некоторое время они смотрели друг на друга молча. «Ну?» – спросила девушка Канделя и опять замолчала. Он смотрел вопросительно. «А через забор можете?» – спросила она. Запросто, сказал Кандель и фактически перепрыгнул. Здорово, сказала девушка и тоже перепрыгнула. И опять они стояли по разные стороны рыжего дачного штакетника. Ну что, пойдемте на реку, сказала она…</p><p class="p1">Он не рассказывал про дальнейшее, сказал только Бровману: встретил я девушку и пропал, либо она будет моя, либо будет моя, второго не дано. Всю осень он по ней вздыхал, потому что девушка, как пояснил Кандель, была зимняя. Что это значит – объяснить не мог. «Снегурочка? – издевательски спрашивал Бровман. – Снежная баба?» «Идиот», – беззлобно говорил Кандель. Они выпивали в клубе художников, там в эту осень подавали новинку – сырное фондю, плавили сыр с вином в особой миске на спиртовке, и туда окунался сухарь. Представь, говорил Кандель, сам человек сугубо летний и приморский, – представь, какая-нибудь окраина, дома купеческие, улицы темно-синие такие, росчерками. И валит снег крупный. И среди этого снега ты ходишь, непонятно как сюда попав. Приехал на трамвае, ехал до последней остановки и сошел. Что-то тебя поманило. Проснулся с утра в воскресенье и решил: поеду на трамвае до последней остановки, так надо… Вот ты вышел и пошел, и черт его знает зачем. И снег валит. И ты идешь – а тут девушка навстречу, в шапке пушистой. Или как вариант вязаной. Но видно, что волосы желтые, скорей даже золотые. И как-то так она на тебя смотрит… А? Как будто она и есть хозяйка этих мест, всей окраины, всех домов, и вот она дождалась, что ты попал в ее места, и смотрит с таким вызовом и в то же время с удовольствием: вот, ехал, ехал и приехал, теперь заходи. Бровман тогда посмеялся, а ведь действительно, ощущение, которое вызывала Варя, никак иначе было не рассказать: именно зима, и купеческие дома, и именно росчерками, и граница города и пригорода, и трамвай, и сумерки, и непонятная девушка вдруг.</p><p class="p1">Кандель показал ее только перед самой свадьбой, и первое, что подумал Бровман: нет, мне бы такую не потянуть. Девушку Гриневицкого он легко мог представить своей, еще она и в зависимость бы от него впала. Жены героев никогда Бровмана не привлекали, не только потому, что он и в страшном сне не наставил бы рога герою, а потому, что ни одна из них ничего в нем не задевала. А в такую, как Варя, можно бы и влюбиться, только он отскочил бы почти сразу, ходило в их среде эдакое словечко – отскок. Выглядела она ленивой, был такой тип девушек в это время, – и это не то, что они вялы, малоподвижны, нет, просто делают, что хотят, и только то, что хотят, и никогда никуда не торопятся. И Варя работала инженером, потому что хотела работать именно инженером, и не бросала этой работы, хотя Кандель легко содержал бы ее со всей семьей. Она занималась только тем, чем умела и любила заниматься, но умела многое, и все ее движения были плавны, точны, экономны, как движения здорового, сильного Канделя в воздухе. По Канделю никогда не было видно, что ему трудно, – даже Волчак напрягался, а Кандель никогда; Волчак, видно было, делает все, как надо, а Кандель – все, как хочет. Хочет – летает, хочет – сядет сейчас на шоссе, точно как птица на провод, и пойдет ромашки собирать. Вот Варя была такая и такое было у нее имя, что-то похожее Бровман всегда при этом имени представлял. Он еще подумал: ведь действительно зимняя, а почему? Видимо, глаза: широко расставленные, темно-серые, с коричневыми искрами, пятнами. И смотрела она, как смотрит русская зима: если ты свой, сойдемся, а если чужой, не подходи.</p><p class="p1">Все у нее получалось красиво: ела и пила красиво, пила много, не пьянела, не тяжелела, только посмеивалась. Кандель сам был не дурак по этой части. И что удивительно – Бровман часто видел друзей с красавицами, друзья всегда выглядели рядом с ними смешновато. Сидит, расправив плечи, глазами на нее показывает – а, какова?! – сам либо пыжится, либо заискивает, и вид у него неестественный, и сразу происходит срыв в одну из двух ужасных схем – либо он ее подомнет, либо она его – под каблук. Этих поединков роковых Бровман не выносил, сам честно жил в производственном романе, какой и считал самым крепким, – он пишет о мужских ремеслах, жена – о женских, швейных, учительских, и хоть имя у него погромче, но и она в своем деле не последняя. У Канделя с Варей было сходство по единственному признаку абсолютной уместности своей на свете и такой же уместности всего, что они делали и говорили. Бровман еще подумал: а ну как они разругаются, что будет? Изменит Кандель, мало ли, или Варя сбегает налево, с кем не бывает; но тут же ясно представил, как это будет. Она ему скажет прямо, глядя с этим своим зимним вызовом: если ты меня можешь простить, то прости, а если нет, то что ж поделать. И никаких выяснений, никаких слез. Бровман не мог бы представить Варю плачущей – разве что оса укусит или, может, с голоду… А если, не дай бог, с Канделем что? Бровман всегда это представлял – герои, как сказал в своей манере Гриневицкий, танцуют со смертью – и понял, что по Варе сначала ничего не будет видно, только двигаться она станет еще медленней, как бы закаменев; а потом просто умрет, без всяких усилий со своей стороны. Все что надо у нее получается само. И еще Бровман подумал, что так же легко она с Канделем в первый раз легла, словно всегда только с ним и ложилась; действительно, подумал Бровман, такое чувство всегда бывает зимой, именно русской зимой, европейская такой не бывает. Русская зима – это чувство, что всегда так было, лето – случайность, весна – оттепель, а на самом деле зима никуда не уходит. Кто это понимает, тому здесь жить неплохо.</p><p class="p1">Называла она его не Канделем, а Лаки (знала английский, учила сама), объяснила, что это значит «везунчик». И Бровман почувствовал, что ему тоже хочется так Канделя звать, потому что Варя поймала в нем самое главное; но право на такое имя было теперь только у нее.</p><p class="p1">– Вы летали вместе? – спросила она в тот вечер.</p><p class="p1">– Приходилось, – сказал Бровман.</p></span></span>
