<p class="p">9</p>
</div><p class="p1">Он еще летал, но ему уже надоело. Теперь окружение Волчака составляли люди искусства, к которым он ходил с Кригером в подвальчик Дома работников искусств, где Кригер научил всех жарить мясо, сбрызнутое лимонным соком; мотогонщики, с которыми ему было интересней, чем с летчиками; охотники, которые понимали его заветную мысль про вторую поправку. Все это были люди-исключения, им дозволялось жить чуть-чуть не так. Их было на удивление много. Среди них были либо знатные, подсознательно работавшие на грядущее низвержение, либо уже низвергнутые, горьковские бывшие, не столько отверженные, сколько отвергшие. Эти отчаянные люди кучковались вокруг богемистых ресторанов, ипподрома и бильярдных. Их легко было переловить, но почему-то им разрешали быть – то ли чтобы знатным было с кем отдохнуть, то ли потому, что они стали высшими существами и пользовались тайным уважением. Они были своего рода артисты даже более народные, нежели обремененные званием. С ними Волчак проводил досуг, с избирателями и депутатами – присутственные дни, с конструкторами – непременные обсуждения, на которых его слово часто становилось решающим, хоть и было чаще всего бессмысленным. Случались у него припадки ярости – коллеги привыкли списывать их на перенапряжение, хотя отлично понимали, что не в перенапряжении дело: потолка своего он достиг, переходить в конструкторы не мог и не хотел по недостатку образования, обучать молодых было ему неинтересно, а государственная карьера зависла. Неясно было, что именно Волчаку предложат. Заходила речь о том, чтобы сделать его наркомом или пока замнаркома обороны, но Сталин не хотел убирать Ворошилова, ему больше нравилась идея получить своего человека на ключевом посту главного бойца с врагами, такого человека, который безусловно уж не предаст, но время еще не приспело, и Сталин чего-то ждал, хотя в том самом разговоре во время папанинского приема осторожно спросил: вот если вдруг, мало ли… И Волчак, мгновенно протрезвев, даже вытянулся в струнку, но в ответ услышал: ладно, ладно, загад богат не бывает. Эту паузу Волчак выносил с трудом, оторвавшись от своих и не пристав к верховным, выйдя как будто из разряда летчиков и не войдя в разряд жрецов, то есть оставаясь в самом травмирующем статусе героя: герой, дальше что?</p><p class="p1">Летчики на него смотрели без прежнего одобрения, между собой говорили про него уже без большой любви. Со стороны отношения всех героев были братскими, этот образ культивировался, а внутри царила ревность, как у богов на Олимпе, по замечанию все того же Канделя, первым прочитавшего в прозаическом изложении легенды и мифы Древней Греции. Перед чужими – а для них все, кроме жен, были чужими – они друг за друга стояли горой, но внутри страты про Волчака говорили разное. И самое плохое, что это была не зависть. О нет, если бы это была зависть! Но это была временами жалость, а иногда отчуждение. Волчак любил поддеть, но был надежен; Волчак-начальник был худшим типом начальника – из тех, кому мало начальствовать, надо первенствовать, а герои не выносили, когда самоутверждались за их счет. Волчак был не из тех, кто назначен сверху и знает свои берега, а из тех, кто пророс снизу и будет отыгрываться. Кандель редко о ком отзывался заглазно, но однажды сказал в клубе: высоко Волчак метит, но при Волчаке будет хорошо только тем, с кем Волчак дружит, а таких не будет. Потому что тех, с кем он дружил раньше, он уберет дальше всякого полюса, а в новом статусе друзей у него не окажется. Так что хорошо не будет никому. Если бы Волчак узнал эти слова, – а в своем кругу такое пока еще было исключено, хотя общее растление достреливало уже и сюда, – он больше всего огорчился бы не смыслу, довольно бесспорному, а интонации, скорее сострадательной. Сострадание в кругу героев считалось хуже зависти.</p><p class="p1">Баба, замечал Ломаков, многое решает баба. Но Волчак был безупречен, не потому, что так уж следил за собой с политико-моральной стороны, просто был нормальным однолюбом, а еще больше любил первенство и на другие страсти, включая охоту, тратил лишь избыток сил; романы на стороне не только портили бы репутацию, но могли отвлечь, рассредоточить, да и не всем же это надо в такой степени. Кандель – тот обожал жену, все время старался заново ее завоевать, хоть она и так была целиком его с первого взгляда; Петров, известное дело, изо всех сил старался забыть Степанову и потерять ее смог только вместе с жизнью; тихий герой Ломаков не пропускал ни одной, и как-то у него чаще были крокодилицы, такая форма благотворительности. Волчак же был совершенно не по этой части, и потому никто не мог его отвлечь от молчаливого, сосредоточенного обдумывания собственной участи.</p><p class="p1">Все решил странный случай, драма на охоте. В превосходный осенний день они отправились с приятелем Волчака, старым охотником Панкратовым, на кабана в районе Истры. Волчак любил охоту рисковую, палить по уткам ему было неинтересно, кабан – другое дело. Был изумительно свежий день в самом начале октября, все золотое, паутина, уксусный запах пней, россыпи березовых семян, всегда напоминавших Волчаку истребители, вид сверху, и тут на опушке прямо на них выбежала лиса – небывалая удача, Панкратов такого не помнил. Волчак выстрелил – случилась осечка; он переломил ружье, и тут… Но кто мог об этом достоверно рассказать? Панкратов смотрел на лису, сам стрелял ей вслед, промазал – тут уж либо ты ее уложил, либо упустил, но Волчак утверждал, – этот рассказ он потом повторял разным людям, – что едва он разломил ружье, пуля вылетела прямо в него и чуть не убила, прошла в двух миллиметрах от брови. Как такое могло произойти – никто из охотников и оружейников объяснить не мог. Не бывает пуль, стреляющих в обратном направлении, разве что патрон заложить не той стороной, но Волчак так смотрел в ответ на само подобное предположение, что развивать мысль никто не дерзнул. Вообще говоря, он был хороший охотник, стрелял с двенадцати лет, белку в глаз не бил – не врал, но кабан был <em>его</em> тема, излюбленный досуг. «Откуда патрон?» – спросил его Фомин, когда тесным кругом избранных сидели в ВТО. Подарили в Горьковском райкоме, сказал Волчак. Ты не бери где попало-то, посоветовал Фомин. Райком – где попало? Да, кивнул Фомин, а лучше всего сам снаряжай. Время знаешь какое? И коробку эту, ежели у тебя цела, передай мне в седьмой подъезд. Волчак передал, Фомин не перезвонил – закрутился, видимо, работы прибавлялось.</p><p class="p1">То ли этот непостижимый выстрел в обратную сторону померещился Волчаку (хотя Панкратов его слышал), то ли это была выдумка для оправдания страхов, им овладевших, но именно с этого случая началась волна паники, совершенно Волчаку несвойственной: спаньё с пистолетом под подушкой и разговоры о том, что его хотят убрать. Трудно сказать, в какой степени он сам в это верил. Дубакову, все-таки остававшемуся поближе прочих, Волчак несколько раз повторил: Сталин зовет в НКВД – он отказывается, Сталин предлагает партийную работу – он хочет летать… В действительности летать он давно не хотел и все чаще вспоминал слова Амелии: романтический период закончился. Самое бы время родить, усмехался Волчак. Но детей уже было двое и ждали третьего, дети ничего не меняют, про обновление врут те, кто не летал и вообще ничего серьезного не делал. Дети имели отношение просто к жизни, а Волчака интересовало все, что выше. Сталин заговаривал, звал, вглядывался, но не предлагал, и Волчак всерьез заподозрил, что помешал кому-то. Это стало его главной мыслью на целый месяц, осенний месяц, всегда сопряженный с убыванием светового дня. Летчики к этому чутки.</p><p class="p1">Чего, собственно, желал Волчак? Волчак был из тех немногих, но важных людей, кто стремится не к цели, а к ее побочным эффектам и потому почти всегда добивается своего. Он хотел летать лучше всех, чтобы стать государственным человеком, но и власть хотел получить не ради власти. Что ему была власть, какие ее атрибуты желал он иметь? Все что надо у него было, Волчак заранее уже прикидывал, что из «роскоши» отметет в первую очередь. Его представления о жизни были неотчетливы, как и все русское корневое. Власть была ему нужна для того, чтобы осуществить тайные мечты народа, а народ этот никогда у власти не был, хотя приближался к ней не раз. Это было как взлет, как испытание самолета – первые двадцать раз упал, на двадцать первый полетел, но никто еще не знал, как она будет выглядеть, эта власть народа. Может быть, он – народ – превратит каждый день в кровавую оргию, в самую увлекательную игру – судить, расстреливать, и уже без всяких ограничений, чтобы под конец осудить и судей, совершив самую сладкую месть; а может, будет свободно и радостно строить, созидать, ведь это тоже интересно; или рассорится со всеми соседями и всех победит, потому что соседям есть что терять, или, наоборот, протянет братские руки: придите в мирные объятья, потому что широк и миролюбив, как о нем думают лучшие. Волчак был синтезом этих стремлений. Народ в лице Распутина почти добился власти, но его убили; в лице Ленина получил эту власть, но Ленин умер; в лице Сталина распоряжался ею неограниченно – и все-таки ему мешали; и этих мешающих Сталин убирал по одному, вынужденно осторожничал, а Волчак осторожничать не будет. Волчак так часто повторял, что в нем бьются сто семьдесят миллионов сердец, его штурвал держат триста сорок миллионов рук, в стекло его кабины глядят триста сорок миллионов глаз, что не поверить в это было нельзя; он перестал думать, что он отдельный удачливый летчик, и начал всерьез полагать, что в нем воплотилась вековая мечта народа, его непобедимая воля, и теперь ему, не кому-то другому, суждено воплощать его чаяния. Он принадлежал к передовому отряду, это ему говорили все, это он и сам понимал: летчик, посланец земли в небесах. Первый среди первых, передовой в передовом отряде, он обязан подняться на самый верх, и тогда – о, тогда!.. Он понятия не имел, например, что будет делать в Америке, когда долетит туда. Но твердо знал, что, если есть Америка, он должен там быть. А дальше все получилось, у него всегда получалось, – и что делать на самом верху, он разберется, когда доберется. Он оттуда увидит. Так ему рисовались ступени его победы: Пугачев – Распутин – Ленин – Сталин – Волчак.</p><p class="p1">Отказываясь от любых других постов – от военных должностей и от НКВД, на которую ему намекали, он понимал, что все это заманухи, подделки. Первый среди первых должен быть первым, и Сталин должен призвать его сам, как Николай призвал Распутина. Правда, потом не помешал его убить, потому что почувствовал, что Распутин будет любимее. Сталин – другое дело, Николай в сравнении с ним клоп. Великий Сталин понимал великую миссию. Он должен был вывести Волчака к людям и сказать: вот тот, кого я привел; мое назначение было привести его; я тот, кто недостоин застегнуть ему гермошлем. И тогда настанет эпоха русского рая, потому что во главе России станет русский человек, носитель лучших ее качеств; и тот факт, что Волчаку было тридцать три, – вот сейчас, вот именно сейчас! – и то, что Сталин спросил его об этом и со значением повторил «тридцать три!», тоже занимало место в системе волчаковского мифа, и миф этот казался таким естественным, что в него поверили бы все. Не зря же Волчак получал все новые свидетельства всенародной любви, переходящей в обожание, он стал бы первым, кто правил не силой, не страхом, а любовью, потому что его нельзя было не любить. С той Россией, которую возглавил бы он, Волчак, никто не осмелился бы ни воевать, ни тягаться. Волчак читал исторические романы – а других уже не было – и получал все новые доказательства: тысячу лет Россия ждала мессию, его предсказывали все пророки, и вот пришел – он, ее воздушный властелин, примиряющий все стихии. Волчак думал так не спьяну, нет. Он мечтал об этом стрезва – и во время немногих теперь полетов, и во время встреч с обожающими избирателями, и ночью, засыпая подле, казалось бы, ничего не подозревающей жены. Между тем она понимала все и лежала рядом с ним, ловя страшные, черные накатывающие от него волны.</p><p class="p1">И Волчак стал задыхаться от этого напряжения, и Сталин чувствовал это напряжение, когда встречался с ним, и смотрел все более испытующе. Сталин знал, что пришел преемник, которого он вырастил лично; Сталину нужен был этот преемник, потому что близилась старость, а такую власть не удержать старику, хотя бы и кавказцу; Сталин знал, что кому-то должен передать империю сам, иначе пустят прахом. Волчак был бы идеальным преемником, в особенности на случай войны. И не только. Сталин имел некоторое специальное образование, даже немного бравировал им, а потому знал, что бывает с крестителями, предтечами, провозвестниками, и не хотел, чтобы его голову подали на блюде. Сталин уже выстроил вокруг себя что-то похожее на атмосферу той иудейской пирушки, ему легко было представить Уланову с этим блюдом. Такие мысли приходили ему в голову тайно, без слов, ибо всякий человек мыслит не только словами. Сталинские слова легко складывались в резолюции, он давно уже и мыслил резолюциями. Но помимо слов человеку являются образы – чаще всего против воли. А образы являлись вот такие, да: Волчаку – Сталин, застегивающий ему шлем, а Сталину – Уланова с головой на блюде. Это, может быть, происходило даже в снах, а не наяву, но это происходило, и Сталин присматривался, а Волчак спал с пистолетом под подушкой.</p><p class="p1">Улановой же являлась одна музыкальная тема. Она репетировала Джульетту, балетмейстер Лавровский ставил ей танец с подушками, и эта музыка преследовала Уланову: гроб стоит, где стол был яств, где стол был яств, стоит он! Летит туда, куда лететь тебе не надо! Ночь труба гульба иди туда куда не хочешь! Труп идет туда куда живой ходить не может! Идет туда, идет сюда! (Хряск!) И поверх всего этого бессмысленное – молю тебя! молю тебя! – фоном чего было: ха-ха-ха-ха.</p></span><span id="id66"><div class="title6">
<p class="p">10</p>
</div><p class="p1">И это кончилось так же внезапно, как началось, потому что Волчак был человек здоровый, и даже морок, распространявшийся на всех, не имел над ним полной власти. Все это прекратилось мгновенно, когда к нему пришел Канделаки, самый веселый и самый далекий из всех его друзей. Это был друг, о котором не думаешь, но который появляется в самый решительный, неизбежно наступающий момент, в этот момент ты вдруг понимаешь, до какой степени ты один, – и тут на́ тебе, здравствуйте-пожалуйста.</p><p class="p1">Волчака было трудно теперь застать дома, но Кандель почему-то угадал. Он принес бутылку самогона, и не потому, что любил выпить (пить он любил легкое виноградное вино), но потому, что нес наркоз, под которым надлежало произвести операцию. Кандель видел, что в Волчаке растет мысль, растет, как опухоль, и хотел вырезать ее. Кандель как раз прочитал историю про Данилу-мастера и знал, что мастер всегда уходит в гору, а иногда уводит за собой детей, если ему не заплатили, – и понимал, что Волчак уходит в гору и надо его по возможности остановить. В Волчаке ворочалась темная сила, и хуже от этой силы было прежде всего самому Волчаку. Дубакову он бы не поверил, потому что привык командовать им. Чернышев слишком хорошо понимал происходящее и сам бы к нему не пошел. Громов был сугубый материалист и сказал бы: да ну, глупости. А Канделаки взял бутылку самогона и пошел к Волчаку.</p><p class="p1">– Здоро́во, – сказал он. – Событие. Моя жена беременна (что было правдой). По нашему обычаю ребенку надо готовить встречу. Я понтийский грек, ты, может, в курсе. У понтийских греков принято, чтобы счастливый отец шел к старейшине и получал от него напутствие сыну. Старейшина может послать грека подалее, если занят, но обычно этого не делает, это не принято.</p><p class="p1">– Ну, заходи, понтийский грек, – сказал Волчак, у которого было отвратительное настроение. – Как у вас событие, так все вы к Волчаку, а как у Волчака, может быть, событие или печаль, так все забыли. Даже Бровман, понтийский еврей, ходит ко мне, только когда ему надо подвал к празднику. Товарищ Волчак один, как полюс.</p><p class="p1">– Так не будем же много трындеть, – сказал Кандель, – давай выпьем.</p><p class="p1">И Волчак выставил свою любимую закуску: квашеную капустку, моченые яблоки, присылаемый с Волги балык – все то, что водится дома у человека, любимого земляками; и они стали пить молча, потому что Кандель вообще был молчалив, а Волчак молчалив в последнее время.</p><p class="p1">И пока они молча пили, Волчак оттаивал и без слов рассказывал Канделю, как же его замучило промежуточное положение, подобное пролету через полюс; но полюс мелькнул – и нету, а ледяное одиночество все длилось. Новые летчики осваивали новые трюки и ставили рекорды, уже неинтересные ему; власть заманила его к себе и ничего не дала; по умолчанию он был еще первый среди равных, но уже понимал, что годы его не те и что летчиков профессия жрет молодыми. А дальше им дорога в инструкторы, в каковой роли он себя не видел, ведь нельзя научить быть Волчаком, а соглашаться на меньшее нет смысла; летчик должен уходить непобежденным и может либо исчезнуть, как Гриневицкий, либо взлететь выше всех, как собирается Волчак, либо стать почетным пенсионером, от чего боже упаси. О смерти летчики говорят легко, но не любят, когда о ней говорят другие.</p><p class="p1">Когда они допились до состояния некоторой взаимной простоты, Кандель сказал:</p><p class="p1">– Я тут Панаита Истрати читал. Полезный писатель. И там сказано: иногда надо просто себя спросить – кто я? Это снимает сразу всю, понимаешь, лишнюю стружку. Потому что из этого и начинаешь исходить. И я, короче, могу сказать, кто ты. Ты летчик. Про меня еще, допустим, можно думать, но ты – летчик.</p><p class="p1">– Так, – сказал Волчак, несколько насторожившись.</p><p class="p1">– Ну и летай. Они пусть делают что хотят, они не летчики. А ты летай.</p><p class="p1">Этот разговор был так тяжело нагружен и произошел настолько вовремя, что Волчак после него почти успокоился, хотя если бы успокоился совершенно, не был бы Волчаком. Но это слегка переломило его настроение, а окончательно он пришел в себя во время поездки к матери, каковую совместил с очередной депутатской гастролью.</p><p class="p1">Стоял теплый ноябрьский день, уютный и серый, как жизнь любого человека, кто не был летчиком, – или, скажем иначе, только и исключительно летчиком, без каких-либо побочных желаний; и в этом дне была такая прелесть, что Волчак поневоле растрогался. После обязательного уже выступления перед земляками в клубе он сидел в родном доме, отремонтированном ровно настолько, чтобы хоть отчасти давать представление о детстве героя (но вообще они жили хорошо, по сравнению с остальными прекрасно жили!), и ел из чугунка картошку с салом по домашнему рецепту – любимейшее из блюд, с которым ничто так и не смогло сравниться. А ведь Волчак всякого попробовал: в Париже ел луковый суп и улиток, в Америке – мексиканский чили из бобов с мясом, прекрасную, кстати, вещь, и намекнул Микояну, что не помешали бы и нам такие консервы, и пробовал копченый бекон, и картошку по-французски, то есть по-особенному жаренную, и лобстера ел – огромного рака, которого разламывают специальными щипчиками, – а вот вкуснее этой картошки не было ничего, и не по причине патриотизма, а просто потому, что русскому человеку надо наедаться впрок, лучше с утра, потому что еще неизвестно, доживет ли он до вечера. Говорят – завтрак съешь сам, обед подели с другом, ужин отдай врагу. Это говорят не потому, что вредно есть на ночь, а потому, что за завтраком обычно не знаешь, отберут у тебя ужин или нет; велик шанс, что отберут, особенно если ты позавтракал плотно и это кто-нибудь видел. Вот и получается – отдай врагу, отдай, не сопротивляйся, жизнь дороже.</p><p class="p1">Отец Волчака умер еще в тридцать пятом, но как-то все не было случая об этом сказать и даже внимательно подумать. Мать была не родная, родная умерла от родов, когда ему было три; через два года отец женился на молодой, и она родила еще двух младшеньких. Волчак матери своей совсем не помнил и давно внушил себе, что эта женщина и есть его мать настоящая. Она была понимающая, хотя религиозная. А вообще, для человека нашего времени родители – не самое главное, человеку нашего времени важно, что он из себя представляет, что умеет, в чем проявляется. На вопрос «кто я?» он раньше отвечал бы: я француз или я испанец, еще раньше – я сын такого-то, мне столько-то лет. А сегодня он отвечает: я летчик – профессия заменила все. Отобрать можно все: национальность, родителей, все буквально, включая уже упомянутый ужин, но вот то, что он чувствует машину, отобрать нельзя. Беда, конечно, была таким людям до изобретения авиации; страшно подумать, кем бы он, Волчак, стал, родись не в наше время. Бурлаком, вероятно, как дед, или кулачным бойцом, славящимся на всю Волгу… А если представить себе, сколько сегодня среди нас ходит людей, которые годятся быть космическими пилотами, а ракету еще только строят!.. Вот и занимаются они всякой ерундой вроде рубки леса. Раньше был другой мир, в нем профессия меньше значила, и люди могли позволить себе всякие страдания на почве любви или возраста. Сегодня же построена идеальная страна с нормальным строем, когда у каждого есть возможность проявиться, и человек исчерпывается тем, что он умеет, а всякие лишние страдания и психоложества, как называл это Карпов, следует ему отставить, равняйсь, смирно. И когда Волчак вышел в огород покурить, в тихий, смирный осенний огород, где все уже готовилось залечь под снег, он еще раз сказал себе: ты летчик, ну и летай. И такое смирение было в этом пожухшем огороде, готовом зазимовать под толстой снежной пеленой, такой покой во всей русской равнине и низком небе над ней, – небе, все облачные слои которого он знал наизусть и в котором так хорошо умел летать вслепую, – что как-то Волчаку и ненужным показалось за чем-то гнаться, место у него было, оно было бесспорно, вот и надо было знать свое место. Кто ничего не умеет, тот пусть руководит, а кто летчик – тот пусть летает. И с какой-то особого рода русской досадой Волчак рубанул рукой и сказал: «Ий-йэх!» – как будто кто-то загнал его в это положение, а то уж он бы себя показал! Но никто его не загонял, а просто это была такая система, в которой каждый должен знать именно свое место. Если ты летчик, то обязан летать лучше всех – просто потому, что никаких других возможностей тебе не предоставлено. И со временем профессия заменит тебе совесть, потому что совесть при справедливом строе уже не обязательна.</p><p class="p1">– Сынок, – сказала мать, робевшая перед ним, как положено всякой сельской матери (все односельчане тоже прекрасно знали свои места, роли и подобающие им воспоминания), – а правду говорят, что тебе Сталин должность предлагал?</p><p class="p1">Откуда ж они все знают, подумал Волчак, ведь при наших с ним разговорах никого больше не было… То ли от него слухи идут, – чего быть, наверное, не может, – то ли морда моя так сияла, то ли просто всем понятно, что должен бы я уже… нет, черт с ним.</p><p class="p1">– Предлагал, мама, да я отказался, – сказал Волчак виновато. – Я так думаю: если ты летчик, то ты и летай.</p></span><span id="id67"><div class="title6">
<p class="p">11</p>
</div><p class="p1">С этого месяца почти все его время было поглощено предстоящими испытаниями И-180, и в работу над ним он включился с такой яростью, что конструкторы, надо признать, стонали, но от его придирок по крайней мере был толк.</p><p class="p1">Волчак говорил о нем: прекрасный самолет. На нем стоял советский запорожский двигатель М-88, тысяча сто лошадей, трехлопастный винт, открытая кабина с кислородным оборудованием, корпус легкий, березового шпона, две с половиной тонны, из которых восемьсот кило весил двигатель. Самолет легко забирался на семь тысяч, давал практически шестьсот км в час, размах десять метров – красивая, устойчивая и быстрая машина, результат долгой работы, прерывавшейся разными обстоятельствами, в том числе арестами, борьбой с антоновщиной, возвращением Антонова и прочей чехардой. Карпов сам успел побывать во врагах и потом в героях труда, с Волчаком отношения у него были трудные, но конкретно эта машина Волчаку нравилась. Нравилась скоростью, удобством в управлении, изяществом профиля – была в ней грация и одновременно внушительность, и Волчак вкладывал в ее разработку все свои богатырские силы, и на 156-м авиазаводе даже заподозрили недоброе. А как было не заподозрить, если Волчак сам гнал с испытаниями, требовал закончить их к концу года? Возражать ему не осмеливались, он был теперь государственный человек, но в этом стремлении непременно летать, даже если конструкторы хором говорили о неготовности самолета, было нечто самоубийственное. Словно Волчак не знал, куда себя девать, и решил вот так ужасно собой распорядиться: если уж не задается основная карьера, не доставайся ж я никому, как говорилось в недавнем фильме. Он как будто пытался опровергнуть слухи – мол, Волчак стал беречься, заважничал, задепутатствовал, но и слухов-то особых не было. И когда, скажите, аврал ставили в вину? Новый истребитель нужен армии, в Испании мы показали себя не очень-то, хотя к летчикам вопросов не было, не очень хорошо все было у военных советников, это да, и говорили даже, что Петров многовато трепался о своем теодоровском прошлом… В общем, стало нервно, и потому на первые испытания машина отправилась явно впопыхах.</p><p class="p1">Первое же наземное испытание привело к сбою, и, если бы Волчак обладал прежней чуткостью, он бы это предзнаменование понял. Он предполагал погонять мотор на земле, и тут М-88 заглох – случай исключительный. Было воскресенье, работали все сверхурочно, и потом именно это обстоятельство – сверхурочные испытания – послужило поводом для самых опасных версий: Волчаку, мол, кто-то готовил ловушку, поторапливая с испытаниями. Но в том и была закавыка – он сам и поторапливал! У немцев мессеры, у нас что? Карпов тогда сказал: ничего серьезного, обломался трос управления заслонки карбюратора. «И только?» – переспросил Волчак. Да, и только, что ж такого. Ну, устраняйте, сказал Волчак вяло, потому что не поверил.</p><p class="p1">Классный получался истребитель, многих успел истребить еще до того, как его собрали. В Первом главном управлении Наркомата оборонной промышленности шла чистка, искали врагов, тормозящих выпуск нового истребителя; начальник Главного управления Б. подгонял и давил, начальника летно-испытательной станции П. поносили с двух сторон: Волчак орал, что П. саботажник, а Карпов – что допускает до испытаний неготовую машину. После поломки карбюратора Карпов потребовал испытания свернуть – его отстранили. Просто Б. сказал: Карпова отстранить. Но не пустить конструктора на аэродром Б. не мог, и Карпов все равно приехал; а Б. не приехал, и многие потом гадали – почему. Короче, все на всех орали, все на всех стучали, все топали ногами, и громче всех неистовствовал Волчак – в такой атмосфере готовился И-180. И зря потом врали, что новый нарком внутренних дел лично послал три машины перегородить Волчаку взлет. Если б ему перегородили взлетную, Волчак бы взлетел вертикально, сказал Ломаков. Да и с чего бы перегораживать? Ну да, торопился, да, взял в работу самолет с недоделками, вполне для Волчака обычное дело. И когда на первом наземном испытании у него заглох мотор, его это только подстегнуло: Волчаку нужен был либо новый триумф, либо героический уход, который снял бы все двусмысленности. Так он сам это понимал, хотя вслух никому не говорил, да и некому было бы сказать; герою жаловаться некуда.</p><p class="p1">На следующий день после поломки заслонки карбюратора Волчак зашел к Дубакову, говорил о перелете через Южный полюс, но без прежнего огня. Чего-то они темнят, сказал он. «Опять думаешь, что Карпов враг?» – переспросил Дубаков. Нет, не думаю, там хуже. Какой-то у меня другой враг. Никогда так не было, чтобы у меня машина глохла. И от слов про другого врага, запомнил Дубаков, у него прошел мороз вдоль хребта.</p><p class="p1">А на следующий день мороз пришел и в Москве без снега казался еще жестче. В десять утра Волчак поехал на Центральный аэродром имени Фрунзе, на любезную Ходынку, лично просмотрел акт устранения неисправности мотора, потом акт готовности самолета – и насторожился: лететь ему предлагалось с выпущенным шасси. Это никогда не препятствовало полету, но говорило об одном: самолет не готов; а впрочем, мало ли он летал на неготовых самолетах? Скажут – перестраховывается, стал не тот; и Волчак все подписал.</p><p class="p1">Переодеваясь в летное, он задумался и сунул руку в карман пальто: лимон! Оля любит лимоны, Волчак взял ей один в буфете писательского клуба, когда за два дня до вылета сидел там с будущим биографом, Ложкиным, пытался отмотаться от книжки, не хотелось расспросов: зачем писать книжку сейчас, пока он жив? Пока жизнь не закончена, смысл ее не ясен. Хотя иногда и потом не виден: вот Петров, классный был летчик, и что, какой смысл? Может, по сыну его понятно будет… Подсознательно Волчак боялся расспросов, вылезло бы что-то, чего он не хотел знать. Вообще, ничто еще не определилось. Увидел на стойке лимоны, взял для Оли. С утра не до того было, торопился. Ничего, вечером отдаст… И сам не понимал, с чего у него такой мандраж.</p><p class="p1">Поначалу разогнался и резко встал, проверяя тормоза: тормоза были исправны. Волчак взлетел и увидел, что на ДБ-3 разгоняется Кандель: он уже слетал на ДБ к Тихому океану и теперь выжимал из него все соки, в разных режимах готовясь к весеннему перелету в Америку. Когда Кандель забрался на шестьсот, Волчак подлетел к нему, помахал крыльями и поднял большой палец. Я летчик, я и летаю. И Кандель понял и поднял палец в ответ. Тут, в воздухе, Волчак был первый, тут ему не надо было никого оттеснять, тут все было по-честному. Герой героя поймет.</p><p class="p1">Первый круг был удачен, на втором Волчак заметил, что упала температура масла и мотор стал работать рывками; началась тряска, и Волчак почувствовал, что сейчас мотор заглохнет. Волчак не паниковал: ситуация была штатная, мало ли он глох в воздухе! Можно было планировать, но – тут Волчак понял, что дело нешуточное, – он удалился от аэродрома, можно было не дотянуть. Хорошо, не дотянем, сядем так, на острове Удд хуже было, но здесь был не остров Удд, практически необитаемый, а слишком обитаемая, застроенная бараками окраина Москвы, мелькали какие-то дети… Еще не хватало, чтобы герой, спасая свою жизнь, убил детей. Волчак все еще не верил, что ситуация серьезная и даже, может быть, безвыходная, но он знал, что выход есть всегда, просто его не видно. Можно было еще попытаться форсировать мотор, Волчак резко нарастил обороты, услышал хлопок, – двигатель остыл, его не запустить. Черт с ним, надо было садиться, без вариантов. Жизнь была внизу и вокруг, та самая жизнь, из которой он все пытался вырваться, а она не отпускала. Прямо впереди был жилой барак, – Волчак увел машину влево, где был необитаемый и спасительный сарай. Сарай мог самортизировать, в сараях всегда хранится всякая дрянь, выбросить жалко, вдруг сгодится: всякие тряпки, сломанные вещи, чехлы от давно утраченных предметов – их хранят, потому что всего мало, ничего нет, бедные люди, другим взяться неоткуда… И Волчак направил машину в сарай, как когда-то под Троицкий мост, но – вот его рок! – не увидел проводов, зацепился за провода, как тогда в Брянске, и крылом влетел в столб. И это было ничего, все это было ничего – его выбросило из самолета и он бы выжил, но в этом сарае стоял штабель арматуры. И в этот штабель арматуры Волчак ударился виском.</p><p class="p1">Когда прибежали люди из барака, он был еще жив; рассказывали, что, когда его привезли в Боткинскую на срочно остановленном грузовике, он пытался говорить и даже сказал: «Никто не виноват, я сам», – это было на Волчака похоже: он знал, что за него полетят многие головы, что истребитель истребит еще многих. Но ни одного врача, ни одной сестры, которая бы слышала эти слова, найти не удалось. Легенда начинается сразу: отвернул от барака, спасал людей, последними словами тоже спасал людей.</p></span><span id="id68"><div class="title6">
<p class="p">12</p>
</div><p class="p1">Карпова сажать не стали, тем более что сами же его и отстранили; да Карпов и сидел уже, было дело, и главное, был нужен. Поэтому посадили его зама, начальника главка, – того, кто на всех стучал и топал, и инженера, что осматривал И-180 перед вылетом; остальных уволили или понизили, а причину поломки определили просто: недочеты двигателя. Если поднимать всю историю, сказал Карпов сильно позже Ложкину, который взялся-таки за книгу (теперь-то смысл был виден, только не Ложкину), с самого начала была нестыковка моторного главка с авиационным: мотор создавался для бомбера, поставили на истребитель, бомбер тяжелый, ему нужны винты другого диаметра; я переделал, но это же опять время – а гонят, гонят!.. У нас образцово умеют что – гнать, рисковать, народ такой; иногда кривая вывозит, иногда нет; могла вывезти и тут, но есть полное ощущение, что сам Волчак на этот раз не хотел, чтобы она вывезла…</p><p class="p1">Как-то гибель Волчака слилась с Новым годом, а поскольку от нового года не ждали добра, да и войной крепко уже пахло, получился большой торжественный праздник, с массовыми закланиями, переименованиями десятка городов и поселков, а улиц и проспектов – без числа; улиц в честь Волчака стало больше, чем у Розы Люксембург. Летчики между собой обсуждали гибель номера один с недоумением: штатный полет, ничего особенного, – и любой из них был уверен, что в этих обстоятельствах либо выбросился бы вовремя, пропадай телега, либо спланировал бы на ровную местность, там была площадка за овражком, вполне приемлемая. Жена настаивала, что Волчака погубили завистники, но ее можно было понять: она разом стала никто, да и рожать ей через месяц, ее сразу положили в больницу и во всем соглашались, как будто можно охранить от волнений человека, перерубленного пополам. Дочь была мала, ничего не понимала, а сын понимал все и молчал, но поклялся отомстить – как раз читал про индейцев. Бровман подумал вслух: Волчаку всего было мало; с ним никто не спорил. Кандель сказал Бровману, когда выпивали вдвоем, что не всегда можно вернуться, иногда далеко отлетаешь, но расшифровывать не стал, и Бровман знал, что расспрашивать его бесполезно, да и не любил он этих канделевских греческих многозначительностей. Канделя любил, а загадок не любил.</p><p class="p1">Если кто и завидовал Волчаку, то теперь это, конечно, никак не проявлялось, а если посмотреть на его завершенную жизнь, чему было завидовать? Перегрузки всегда страшнейшие, а цель – столб, и другой цели нет. В то, что Волчак станет министром, никто в душе не верил, а и стал бы он министром – что тогда? Первому расти некуда и если кому и завидовать, то Грину: Грин улетел неизвестно куда, в пространство между жизнью и смертью, выбрал из двух третье. Волчак погиб как герой, и стало понятно, что дело героя – погибать. Опасались, что Сталин просто выйдет из себя, и полетят головы с самого верха; но Сталин реагировал странно. Сказать «с облегчением» – нет, какое; но на известной высоте начинаешь понимать, что события развиваются только по символическим сценариям, и мудрость заключается в том, чтобы, во-первых, осознать, в какой именно пьесе находишься, а во-вторых, – выбрать сценарий наиболее продуктивный (гуманизм тут ни при чем, эти соображения по достижении той самой известной высоты вообще следует оставить). На глазах Сталина продуктивный сценарий закончился логическим финалом, и вождь с мрачным удовлетворением кивнул. Знавшие его люди замечали это выражение, когда он в очередной раз оказывался топором судьбы, – ведь все, кто под этот топор попадал, вполне того заслуживали. Но Волчак прожил жизнь героя и заслужил смерть героя; другой у него быть не могло, и останавливать его было бессмысленно. С этим выражением лица нес Сталин урну с прахом героя, с этим выражением сказал Карпову: вам мы доверяем, товарищ Карпов.</p><p class="p1">Что до судьбы истребителя И-180, который стольких вокруг себя успел истребить, прежде чем взлетел, то она сложилась нерадостно. Тут можно было бы построить особую историю, но чем виноват истребитель, дитя эпохи? Прекрасный испытатель Степан Супрун скапотировал при посадке и чудом остался жив, после чего его отстранили и доверили дело Афанасию Прошакову. Прошаков был очень успешный испытатель, однако при выполнении правой бочки сорвался в штопор и вынужден был выброситься с парашютом на тысячной высоте. Хорошо, машину не спешили списывать и позвали хладнокровного ингерманландца Томаса Сузи, несколько раз успешно сажавшего самолеты после аварии; этого великана с белыми бровями и ресницами ничто не могло вывести из равновесия, и он взялся готовить И-180 к параду 18 августа в честь Дня Воздушного флота. На репетиции у него отказал двигатель, летчик спланировал; на параде истребителя не было. Сузи, однако, не внял предостережению и продолжал облетывать самолет, пока не свалился в штопор две недели спустя. Сузи выпрыгнул, но парашют не раскрылся. Такое нагромождение трагических случайностей уже не могло остаться без внимания, и прекрасную во всех отношениях убойную машину не решились запустить в серийное производство. Превосходный скоростной пикирующий бомбардировщик, он же воздушный истребитель танков, который Волчак испытывал еще до полета в Штаты, стал могилой Павла Головина, летчика Михаила Липкина и инженера Григория Булычева. Многие говорили, что Волчак – тот испытал бы. Другие, впадая в суеверие, утверждали, что Волчак ревниво забирает к себе всех, кто испытывает его самолеты; летчики не виноваты ни сном ни духом, тем более что сам Волчак проводил обычно первый полет, выше всего оплачиваемый, а черновую работу предоставлял молодым, но, видно, очень уж ему было обидно, что он так глупо и на ровном месте погиб. После гибели Головина Кандель сказал: мне кажется, этот истребитель наелся; но это, конечно, была преждевременная догадка. Пока были люди, годные в пищу, он их перемалывал и остановился только тогда, когда закончилась человечина и началась яловичина.</p><p class="p1">Волчака похоронили в Кремлевской стене. Горше всех через неделю плакал Дубаков, потому что осознал вдруг, что Волчак был его друг, – особый, конечно, но такой, каким только и мог быть Волчак: он защитил бы, вынул из любых неприятностей, мало ли, он был надежный командир и все-таки очень хороший летчик; не такой, какому нужен только воздух, и не такой, какому, как Грину, хочется улететь куда-то туда… Но для летчика, которому хочется стать главлетчиком, чиф-пайлотом, Волчак был очень хороший летчик, просто слишком хотел быть народным героем, вот только никогда не понимал то, что отлично понимал Дубаков: герой нужен народу не для того, чтобы ему поклоняться, а для того, чтобы все на него валить. Уже и Клим Ворошилов написал, что Волчак нарушил полетную дисциплину и своей гибелью нанес урон стране. Так что теперь оказалось, что без Волчака герои не то чтобы осиротели (это они говорили в речах, писали в статьях), они остались без прикрытия, потому что теперь крайними стали они. Первым быть уже некому, все теперь крайние. И потому Дубаков горько плакал, один, у себя на кухне и вспоминал, как Волчак вел себя иногда удивительно трогательно, как красиво помогал, и хоть помогал ради любования – другие и ради любования пальцем о палец не ударят.</p><p class="p1">Был, впрочем, и еще один человек, кроме Дубакова, искренне оплакавший Волчака, человек, про которого Волчак вспомнил бы в последнюю очередь: это была Аля, узнавшая о его гибели с большим опозданием. Она тоже пребывала в загробном пространстве, вести туда доходили плохо. Газет Але не давали, а люди, что знали новости, ничего не сообщали, только допрашивали. Про Волчака рассказала Але благоволившая ей воровка Гандзя – Аля помогала Гандзе составлять жалобы, иногда писала за нее письма, чтоб покрасивее. Разговор зашел случайно – говорили про войну, что теперь ее, может, не будет, да и кому воевать? Волчак-то погиб, других таких нет. Аля стала расспрашивать: как погиб, когда? Да зимой еще. Зимой Аля сама, можно сказать, погибла, сказала все, что от нее требовали, и знать ничего не могла.</p><p class="p1">– Я его видела, – сказала она.</p><p class="p1">– И я видела, – сказала воровка Гандзя по кличке Муха. – Я на Красной площади была, когда он летел. Их шестеро летело.</p><p class="p1">В бараке был вечер; небо тут по ночам было не черное, а коричневое, и когда оно начинало темнеть, на Алю наваливалось невыносимое чувство полюса. Волчак, когда пролетал над полюсом, ощутил это только во сне, а Дубаков запомнил – это было ужасно, совершенно бесчеловечно. Аля понимала, что Воркута – еще не полюс, но уже заполярье духа, куда сослали полстраны; кому-то пришла в голову идиотская мысль, что в этой мерзлоте можно закалить людей, и потому полюс был теперь везде, мерзлота распространялась неудержимо. Это было пространство, где ничто не имело смысла, только страх. Але казалось, что ужаснее лубянской камеры не будет ничего, но барак был страшнее, зловоннее. К ней относились здесь снисходительно, словно к юродивой, но Аля знала, что пощада эта временная и покровительство зыбкое: вот разглядят в ней что-то, что она пока прячет, и станет она последней из последних, чего и заслуживает. Выхода отсюда не было, и после смерти будет все то же самое.</p><p class="p1">– Видала Волчака-то, – повторила Гандзя.</p><p class="p1">Аля не стала уточнять, что видела его ближе и переводила ему. Ей было жалко Волчака. Она думала, что именно для него предназначен тот прекрасный новый мир, которого она, Аля, не выдержала. А теперь оказалось, что новый мир и для Волчака не предназначен. Ей казалось, что Волчак летает, опираясь на сто семьдесят миллионов, а оказалось, что он летает, пока Бог хочет. И Аля впервые в вечерней молитве помянула кого-то, кроме семьи, хотя не совсем понимала, зачем вообще молится. Богу было уже не интересно, Бог предоставил мир его судьбе; но в этом большом лагере найдется же хотя бы один милосердный надзиратель, самый бесправный, никак не способный заставить себя зверствовать наравне с другими… Он был и в Воркуте, и теперь Аля молилась ему. Она молилась о том, чтобы он нашел Волчаку какую-нибудь работу. Что ему делать без работы, особенно после смерти, когда отвлечься уже нечем?</p></span></span>
