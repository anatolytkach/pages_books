<p class="p">5</p>
</div><p class="p1">Только теперь наконец Гриневицкому предоставился прекрасный шанс – беспосадочный перелет из Москвы на Фэрбанкс через полюс на тяжелом дальнем бомбардировщике Веневитинова.</p><p class="p1">Это была выдающаяся машина. Она во многом походила на Гриневицкого. Он особенно любил ее за то, что она перебегала – перелетала – дорогу дальнему бомберу Антонова, тяжелому, бронированному, во всех смыслах надежному, но Гриневицкий не любил само это понятие, само слово <em>niezawodny,</em> означавшее «не заводной, не активный». Антонов исчез именно оттого, что опоздал с испытаниями, – все тормозил, все оттягивал и в ноябре не поспел к параду; Гриневицкий презирал эти перестраховки. Веневитинов вот не медлил, он обещал в мае следующего года – и успел в мае, и на майском параде его машина пролетела над Красной площадью, а теперь, в августе, готова была лететь через полюс. Впервые увидав ее, Гриневицкий взмолился, обращаясь лично к Веневитинову: дайте мне эту машину, я ждал ее всю жизнь! Веневитинов поначалу отнекивался: он делал бомбер, летать через полюс не дело бомбера. Вдобавок все повторяли шутку Волчака: один мотор – сто процентов риска, четыре мотора – четыреста. Но Гриневицкий пообещал триумфальный перелет и славу на двух континентах и как-то сумел уговорить Ворошилова, так что стали готовиться.</p><p class="p1">Модель Антонова, имевшая номер 42, брала на борт до шестидесяти человек, брала четыре тонны, то есть предназначалась бомбить и тем была удобна, но Гриневицкий о бомбах не думал. Он понимал, что это все дела военные, но лично желал летать далеко и красиво. Грин был эстет, и когда одевался в гражданское, носил высокие сапоги, плащ и шляпу. Подготовленный для его перелета ДБ-А за номером Н-209 был темно-синий, и этот цвет тоже совпадал с характером пилота. Экипаж совпадал хуже, но это уж было другое дело.</p><p class="p1">Недостатки самолета были продолжением его достоинств, как и у Гриневицкого. Эту фразу Бровман приберегал для будущего очерка. Нужно же будет в ракетное время писать о первых шагах наших икаров. Самолет хорошо летал, был устойчив в управлении; Баранников выполнил на нем восходящий вираж на параде, и получилось загляденье. Подсчитано было, что с двухтонным грузом бомбер свободно пролетит восемь и даже восемь с половиной тысяч. Он уже поднял десять тонн на семитысячную высоту – правда, повторить это достижение Дубакова никто не смог. Но у ДБ, как у всякой тяжелой машины, высока была инерция, его трудно было перевести в горизонтальный режим, он начинал вдруг на ровном месте набирать высоту и терять скорость, Дубаков настаивал на доводке винтомоторной группы, не нравился ему хвост, не все было хорошо с охлаждением – в общем, он машину знал и чувствовал, свежего человека она бы не слушалась. Двадцать пятого мая Гриневицкий добился аудиенции на самом верху: кроме Сталина были Ворошилов и Каганович.</p><p class="p1">Грин принялся убеждать, рассказывал Дубаков, что ему должны дать именно эту машину, что повторять полет на одномоторном нет смысла, что он должен показать американцам Н-209, подобного которому нет ни у кого. Его спросили, с кем он хочет лететь. Он кивнул на Дубакова: вот, он же летал на Мелитополь… Хозяин посмотрел на Дубакова без одобрения и сказал: но вы же тренируетесь с другим экипажем? Что же, на двух стульях хотите? Дубаков решительно сказал, что уже работает в команде Волчака. Грин настаивал: на четырехмоторной машине он гарантирует перелет через полюс! Дубаков понял, что сейчас уже не важно, какое впечатление он произведет, а важно не загубить экипаж: он ринулся в бой, наклонив лобастую башку, и затараторил, что это тяжелый бомбер, не предназначенный для дальних перелетов… Нам лучше знать, что для чего предназначено, сказали ему. Пилот Гриневицкий понимает, какая машина может произвести впечатление. Он там был и знает, как будет воспринят перелет. Ваше дело подготовить машину и передать ему. Дубаков понял, что это аллес, и стал доводить машину.</p><p class="p1">И уже тогда Дубакову показалось, что это не барская любовь, нет, что это пристрастие, да, но со знаком минус; что любимец сейчас Волчак, а Грина словно подталкивают к этому самодурскому выбору. Нам лучше знать, что для кого. Как будто на самом верху хотелось, чтобы Гриневицкий именно так подставился. Но эта мысль тогда мелькнула и ушла, а через три месяца вернулась.</p><p class="p1">Ну он и стал доводить, и в первую очередь лично присутствовал при демонтаже всего военного снаряжения: американцам мы ничего такого показывать не хотим. Он предложил поставить форсированные двигатели АМ-34Ф, тоже микулинские, но существенно обновленные, однако Веневитинов уперся – они не прошли испытания; так вот и обкатаем, просил Дубаков, но тут конструктор имел решающее слово, и остались простые тридцать четвертые. Это было прискорбно, поскольку форсированный АМ развивал тысяча пятьдесят лошадей на заданной высоте порядка трех тысяч, на треть выше предыдущей модификации, но что-то там было с охлаждением, и внедрение тормозилось. Вдобавок к длинноволновой «Онеге» сговорились вмонтировать коротковолновой резервный «Баян», два топливных бака и масляный плюс новые пилотские кресла шоколадной мягчайшей кожи – пусть они там удивятся. Теперь машина весом тридцать четыре тонны (из них шестнадцать горючки) могла пролететь без посадки восемь восемьсот, что при расчетной дальности до Фэрбанкса порядка шести шестисот составляло две тысячи километров на навигационные ошибки. Расчетная скорость была вокруг трехсот. Я выжму триста пятьдесят, говорил Гриневицкий. Не надо ничего выжимать, объясняли ему, но он только морщился.</p><p class="p1">Вторым пилотом ему назначили молодого Соболева, с которым Гриневицкий никогда не летал; Соболев был исключительно милый малый, из нового поколения летунов, читающих, знавших технику, длинный, несколько застенчивый, уже женатый на такой же длинной, застенчивой и книжной девочке. К Гриневицкому он, как ко всем старшим, относился поначалу почти благоговейно. Гриневицкий этим пользовался и безжалостно его гонял, а иногда хамил.</p><p class="p1">– Что это за пилот! – говорил он. – Облачности боится. Его приходится пинками загонять в облачность.</p><p class="p1">– Но, может, без крайней необходимости… – осторожно возражал Бровман.</p><p class="p1">– Что значит – без необходимости? Там никто не будет спрашивать, просто есть облачность, и надо лететь! Я впервые с таким сталкиваюсь.</p><p class="p1">– Но над полюсом редко высокая облачность, – продолжал вступаться Бровман. – Там обычно не выше двух, двух с половиной… Вы же свободно можете пройти на четырех…</p><p class="p1">– Это мне виднее, как я буду проходить. Но если будет облачность, он должен идти в нее!</p><p class="p1">Странно, но перед Соболевым Бровман защищал как раз Гриневицкого. Не то чтобы Бровман стал к нему пристрастен, просто ему хотелось, чтобы перед вылетом у экипажа все было ладно.</p><p class="p1">– Что это за командир, – бурчал Соболев. – Он только командует, сам ничего не делает.</p><p class="p1">– Но так и быть должно. Что, ему все брать на себя? Это большая машина, семь человек экипажа…</p><p class="p1">– Вот как хочешь, а взлетать я буду сам, – сказал Соболев с неожиданной для него злостью. – Он позер и больше ничего. Барин. Что он вообще такого сделал? У него за семь лет один удачный перелет.</p><p class="p1">– Ну, не скажи. А врача кто привез на льдину?</p><p class="p1">– Да сейчас такие вещи школьник сделает. Сел на льдину, скажите. Одно название, что льдина. Тоже – герой… Ляпидевский три раза на льдину садился тогда!</p><p class="p1">В последний месяц перед полетом Гриневицкий вдруг зачастил в «Известия» – поначалу изобретал повод, потом стал заходить без повода. Бровман сначала не понимал, почему поляк стал откровенничать именно с ним: душевности меж ними никогда не было. Потом догадался: Гриневицкий особым своим чутьем изгоя понимал, что у Бровмана, сколько бы он их ни прятал, те же проблемы. Бровман был явно лучше, умел явно больше, теперь же его теснил молодняк: газета, как и авиация, – жестокое дело. Старость не дает преимуществ. Что заслуги, когда молодые быстрей, ловчей, попросту больше знают, чем мы тогда? Оба они были мастодонты, оба – одиночки. Бровман послушно сидел с Гриневицким в буфете, пил желтый пресноватый компот, выслушивал ругань насчет машины: разумеется, Веневитинов был лучше Антонова, просвещенней и серьезней и не перестраховщик. Но с проклятым маслом все время выходили нелады, словно рок преследовал Гриневицкого: то образовывалась воздушная пробка и датчик показывал утечку масла, хотя было его достаточно, то вдруг начинал врать температурный датчик, – что-то не то было с этим полетом, хоть Бровман и понимал, что подгоняет задним числом, а тогда все было гладко.</p><p class="p1">– По-хорошему надо лететь до 15 августа, – сказал Гриневицкий, – дальше погоды не будет. Или уж откладывать. И все время крутится этот Квят. Я не хочу его брать.</p><p class="p1">Квят был правдист, действительно настырный и суетливый, вдобавок с репутацией человека-несчастья. Однажды Волчак обещал взять его из Хабаровска в Москву и взял, думая посмеяться, как Квят в летнем плащике будет чувствовать себя на высотах. Квят будто бы держался и даже пытался улыбаться, но началась облачность, которой никто не предсказывал; на четырех тысячах понадобилась маска, а масок было три, ровно на экипаж. Волчак, ругаясь в мать и в душу, как он умел, вынужден был вернуться, хоть Бровман и шутил потом, что корром больше, корром меньше, особенно таким болтливым. На следующий день Волчак снова взял правдиста и на этот раз довез нормально, Квят страшно загордился и клялся, что теперь добьется перелета через полюс; ему странным образом благоволил Мехлис – видимо, любил подхалимаж.</p><p class="p1">– Лучше бы меня взяли, – сказал Бровман по возможности равнодушно.</p><p class="p1">– И лучше бы взял! – соглашался Гриневицкий. – Подождите, может быть, если мне не станут его навязывать… у вас ведь на высоте нет проблем?</p><p class="p1">– Никаких противопоказаний, – чуть горячее, чем хотелось, рапортовал Бровман.</p><p class="p1">– Ну, погодите… я это узнаю…</p><p class="p1">Но ничего не узнал, и у Бровмана мелькнула тогда нехорошая мысль, что оба они не на лучшем счету; что вокруг Гриневицкого ближе к полету стало сгущаться нехорошее поле, подобное тому, что окружало перед последним полетом Порфирьева. То ли не верили в его затею, хотя что нового было в трансарктическом перелете на Фэрбанкс и далее в Нью-Йорк, пусть и на новой машине, – Грин был как-никак почетным членом клуба летчиков Фэрбанкса; то ли стал раздражать гриновский снобизм; то ли на него кто-то сосредоточенно капал наверху – наивно было бы думать, что в среде героев, даже в передовом, лучшем отряде, нет трещин. Герои друг друга недолюбливали, это надо признать, и все вместе недолюбливали Волчака; с особенной ясностью это проступило, когда в «Известия» за неделю до полета без всякого повода зашел Гриневицкий, а у Бровмана сидели Чернышев с Дубаковым. Это же какой кадр, восхитился Бровман, это надо ловить! Пойдемте к Темину, он у себя, проявляет встречу Цугцвангера. Гриневицкий поморщился, Бровман настоял – и думал потом, что не надо было настаивать: вдруг в последнюю предполетную неделю пилот огорчился перед стартом, любая мелочь играет, ищи теперь виноватого! Дубаков тоже согласился без энтузиазма. В конце концов, после того совместного полета в тридцать четвертом году много было более рискованных маршрутов, и в полете, говорили, не было у них большого взаимопонимания, а дальше их и вовсе разбросало. Чернышев стал правой рукой Волчака, пошел в гору, в Кремле за него пили, его жена взяла девочку из Испании, в общем, он часто был на первых полосах; а Грин – ну что Грин, он всегда был не по-товарищески высокомерен… Если ты товарищеский парень, говорил Чернышев с характерной своей простоватостью, душа нараспашку, даже веснушки, если товарищеский парень, то многое простительно. Лихачество простительно, удаль. И простят тебе в конце концов даже форс. Но Гриня нет, все-таки не наш. Все-таки кровь… такое дело… И Бровману иногда казалось, что именно из-за крови Гриневицкий не на хорошем счету. Обстановка теперь была такова, что значение приобретали именно такие вещи, на которые обычно социализм не обращал внимания. Но сейчас кругом были враги.</p><p class="p1">Между тем шел август, прохладный, прекрасный. В раю, наверное, всегда такая погода. Грибов по лесам тьма-тьмущая. Бровман мечтал, что на выходные с женой и племянником закатятся как-нибудь под Серпухов, в самые богатые места, предадутся любимой охоте; стрелять он никогда не хотел, не понимал, что в этом находят, и, проезжая уже золотящиеся на просвет леса на пути к Щелкову, прямо чувствовал, сколько там сейчас боровиков, но все не складывалось. В последний их обед, за неделю до вылета, Гриневицкий позвал его курить на редакционный балкон и сказал, обводя рукой площадь:</p><p class="p1">– Август, вот и у нас в душе август.</p><p class="p1">– Да почему, – стал разубеждать Бровман, – вам только из-за насыщенности кажется, что тридцать шесть – это много…</p><p class="p1">– Нет, отлетался, – сказал Гриневицкий. – Перейду в инструкторы. Просто надо, сам чувствую, еще слетать к брату, и потом все.</p><p class="p1">Брат его погиб в тридцать третьем и был теперь героем Польши, история была темная, Бровман не вникал. Будто бы ему разрешили полет, но он и не погиб вовсе, а, может быть, ушел – ходили такие версии.</p><p class="p1">Бровман возражал: именно старикам надо быть впереди. Успеется в инструкторы. Он залюбовался в этот день Гриневицким: самый высокий в отряде, явный атлет, двадцать пять отжиманий на пальцах (Кандель уставал на двадцати двух), для управления его машиной нужна была физическая сила, зря Соболев говорил, что Гриневицкий только отсиживается на пилотском месте: в нем была здоровая злость, и в экстренные моменты, должно быть, он вел себя прекрасно. Бровман сам не заметил, как в самые последние дни сблизился с этим вечно отдельным человеком, словно общая обреченность их отметила, – и, помнится, даже порадовался, что с их совместным вылетом ничего не вышло. Квята, впрочем, тоже отстранили.</p></span><span id="id39"><div class="title5">
<p class="p">6</p>
</div><p class="p1">Двенадцатого августа Бровман с вечера был на аэродроме. Гриневицкий не ложился, лично контролировал предполетную подготовку. Соболева провожала жена, молчаливая, очень прямая. За год, что Бровман ее не видел, она посерьезнела, девичья застенчивость ушла, появилась суровость. И тоже задним числом казалось, что она предчувствовала. Техник Левыкин приехал со своей разбитной бабенкой, которая и тут, перед рейсом, все хохотала и, кажется, была навеселе; Левыкин смотрел виновато. Неожиданно приехал Дубаков – вроде у него с Грином никогда не было дружбы, но почему-то решил проводить. Никто и никогда не разобрался бы в запутанных отношениях первого отряда героев – видимо, на высоте бывали у них минуты того взаимопонимания, почти телепатии, каких на земле не пережить. Говорят же, что альпинисты после особенно опасного похода – как вот группа Абалакова в 1933-м, когда штурмовали пик Сталина и дошел до вершины он один, – никогда потом не встречалась, но когда у Арутюняна ушла жена и он был близок к помешательству, приехал к нему и неделю приводил его в чувство Борис Кранц, тяжелый, угрюмый человек, с которым у них в экспедиции были, говорят, самые натянутые отношения. И потом, когда Арутюнян как-то выправился (теперь был уже в новом браке и, говорят, почти счастливом), они опять не виделись больше. Есть ситуации, когда выручить может только один, самый чужой, и потом его видеть невыносимо.</p><p class="p1">В пять пошли к самолету. Как-то очень буднично все было.</p><p class="p1">– Чего невесел? – спросил Бровман Марьина, второго техника, старшего по годам в экипаже – ему уже было под сорок.</p><p class="p1">– А чего веселиться?</p><p class="p1">– Ну как, летишь же…</p><p class="p1">– Эх, – с чувством сказал Марьин, – разве я с такими ребятами летал… На́ вот тебе яблочко.</p><p class="p1">Бровман решил яблочко сохранить и съесть с экипажем, когда они вернутся.</p><p class="p1">Гриневицкий приветствовал его сухим кивком, в котором Бровману почудилось, однако, что-то заговорщическое. Дубаков достал десяток новеньких гривенников и сказал: «Вот, специально тебе вчера наменял, раздашь там корреспондентам, передерутся». Все стали вытряхивать мелочь, набрали Грину полный карман. Он хоть и провел там побольше Дубакова, почему-то не предусмотрел интереса к гривенникам. Приехал незнакомый курьер, привез папиросы «Заказные» – Грин предпочитал их; одну пачку распечатали, все закурили, остальные коробки унесли в самолет. Тут подкатил Мехлис. Выглядел он помятым и почему-то раздраженным.</p><p class="p1">– Вы возьмете Софичкина на Фэрбанксе? – спросил он Грина.</p><p class="p1">– Если вы настаиваете, возьму, – сказал Грин, поморщившись. – Но мне бы не хотелось.</p><p class="p1">– То есть почему не хотелось? – Когда Мехлис сердился, в тоне его прорывалось что-то базарное, и вообще, когда он появлялся в форме, впечатление было, что одесского скандалиста затянули в гимнастерку и предъявили публике – доказать, что не еврейское это дело носить гимнастерку. Грин объяснил, что в экипаже каждый лишний человек создает напряжение, Мехлис заклекотал, что лишним правдист не может быть и что надо же его забирать, и Грин кивнул. Бровман порадовался, что Софичкин так раздражает Грина.</p><p class="p1">– Ну, по одной еще выкурим, и полетели, – сказал Грин.</p><p class="p1">– Не многовато? – поинтересовался Мехлис.</p><p class="p1">– На земле теперь нескоро покурим.</p><p class="p1">Это он зря, подумал Бровман, примета не очень хорошая. Не надо перед полетом такие вещи… и вообще, как-то нет чувства праздника. Ощущение такое, что все они избавляются от Гриневицкого, а не провожают его. Особенно грустно было, что с ним не прощается жена, а та, что была теперь вместо жены, никогда с ним на люди не показывалась и простились они, видимо, еще вчера. Марьин хлопнул Бровмана по плечу и пошел к синей громаде: самолет был прекрасен, ничуть не тяжеловесен на рассветном небе. Грин влез последним, конструктивная особенность была такова, что командир занимает место, когда разместился уже весь экипаж. Настала пауза минут на восемь. «Что они тянут», – пробормотал Мехлис, – и тут, точно повинуясь его укоризне, закрутились винты. Разгон показался Бровману невозможно долгим, оторвались у самого края поля.</p><p class="p1">– Тяжеловата машина, – сказал Манеев, замглавинжа с завода. Бровман шумно завозражал: машина будущего! Была половина седьмого, почти тепло.</p><p class="p1">Уже светлело, и висели над Щелковом крупные тяжелые августовские облака: почему такие всегда появляются ближе к осени? Наверное, всему есть объяснение, и этому тоже.</p></span></span>
