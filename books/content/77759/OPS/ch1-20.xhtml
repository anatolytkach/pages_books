<span id="id33"><div class="title4">
<p class="p">Глава четвертая</p>
<p class="p">Вылет</p>
</div><span id="id34"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Юзеф Гриневицкий был красавец и шляхтич. Его часто спрашивали, не родственник ли он того Гриневицкого, который бросил первомартовскую бомбу и умер от ран вечером того же дня, успев на вопрос об имени и звании ответить «не знаю». Гриневицкий вежливо, но холодно отвечал, что Гриневицких много. «И я бы, – добавлял он, – никогда так не ответил. Безвестно погибать – себя не уважать».</p><p class="p1">У Бровмана с ним не ладилось. Бровман даже думал сначала: не вечный ли польский антисемитизм тут виноват? Но Гриневицкий со всеми был прохладен, со многими даже на «вы». Неприятные, нетоварищеские черты его характера особенно проявились при подготовке к «Трансарктике-3», но и до того он держался наособицу. Возможно, причиной было происхождение и неправильное воспитание, возможно – одиночество и предрассудки, а всего вероятнее, что, рожденный быть первым, он был вечно и безнадежно вторым. Первым в Польше был его брат, погибший в тридцать третьем. А здесь уже были Кандель, Петров и Волчак. Даже медаль героя была у него со вторым номером, хотя уж тут-то, после перелета, какие могли быть счеты? Но командиром был Ляпидевский, и первая была у него.</p><p class="p1">Гриневицкий летал с двадцать пятого, с тридцать третьего был при Севморпути, в тридцать четвертом спасал челюскинцев. Тут тоже не обошлось без двусмысленности, потому что участие его в эпопее ограничилось доставкой хирурга к Боброву – угораздило Боброва слечь с острым аппендицитом. Погоды не было, встречный ветер, но хирурга Гриневицкий доставил и больного спас: писали тогда, что час промедления сгубил бы все. Что еще не добавило Гриневицкому, скажем так, очарования: именно он, как самый культурный, был придан писателю Сергееву для увековечения челюскинского подвига, из чего произошла драматическая повесть «К Большой земле» и пиэсса того же названия. Культурность Гриневицкого подразумевалась, поскольку он тщательно брился, вместо водки пил коньяк и в обращении равно с мужчинами и женщинами проявлял шляхетскую галантность, вдумчиво слушал, сдержанно кивал. Тот же Кандель читал во всякую свободную минуту, интересы его были самые широкие, подлинно полярные, можно было увидеть у него в руках и сборник японских сказок, и что-нибудь животноводческое, и все это не без системы, а потому, что он видел ему одному понятные связи, но Кандель бывал небрит и растрепан, играл в преферанс и употреблял выражения, а образ героя надевал по праздникам; поэтому придали Гриневицкого, и уж он писателю, конечно, рассказал. Там у него самолет, приземляясь близ полярного лагеря, сломал лыжу об острую льдину, а посылать второй самолет не было никакой возможности (допустим, хотя в действительности их послали шесть и не обеднели); но у писателя было сочинено, что летчик с американским штурманом, как приложением к американскому же самолету, вместе с полным составом полярников выстругал из уцелевшей фок-мачты новую стойку на лыжу; откуда взялась там сосновая фок-мачта, Гриневицкий уточнять не стал, должно быть, где-нибудь на льдине завалялась. Хорошо, сделали новую лыжу, но летчик до возвращения – как же, полярников везу! – непременно должен был машину испытать и при взлете эту злосчастную лыжу поставил вертикально, как-то она обо что-то зацепилась и встала поперек. Как быть, что делать? Летчик исполнил над полюсом несколько фигур высшего пилотажа, надеясь, что роковая деталь встанет на место, но деталь не становилась, и тогда наш герой, передав управление американцу (американец сидел за штурвалом впервые в жизни, но трусость придала ему сил), вылез на крыло, зацепился за него и ногами – ногами! упершись в лыжу! – водрузил ея на место. Там он совсем было почувствовал, что повисает без сил, тем более что полярный ветер, было сказано, «облепливал его тугим мешком» (тугим мешком, говорил Громов, облепливает топимых щенков, а полярный ветер на крыле сдул бы нашего ремонтника аки пух), но летчик так вцепился в крыло и представил при этом, что вцепился в любимую женщину, комсомолку, что как-то подтянулся и влез назад. «Я думаю, – признался только что не обделавшийся американ, – что в мире нет второго пилота, способного на такое». «Мы большевики!» – просто отвечал герой, от которого валил пар. Я думаю, сказал Громов, что в мире нет второго большевика, способного на скорости триста км в час повиснуть на крыле и ногами всадить на место лыжу, которую торос поставил вертикально! – Гриневицкий только поджимал губы и говорил, что в литературе важна идейность и увлекательность. Сергеев так ничего и не понял, пиэсса имела успех.</p><p class="p1">Гриневицкому было, однако, обидно, что он никого не вывез на Большую землю, и в тридцать пятом настал его золотой шанс: беспосадочный трансарктический в Сан-Франциско. Это была вовсе уж стыдная история: много было шуму, и выпустили марку, ставшую теперь раритетом, ибо марка есть, а перелета не было. Случилась глупость, которую менее щепетильный человек проигнорировал бы, а более знающий разгадал: после двух тысяч км в кабину потекло масло. Гриневицкий вернулся и посадил машину в Кречевицах. Тут сорвался и даже, по слухам, визжал. Наорал на техников, которые до шести утра дежурили, ожидая, пока он вернется, – требовал немедленного осмотра и сразу результатов, в результаты не поверил, замахнулся на добрейшего Сашку Силантьева, но сдержался. Уж это бы ему с рук не сошло, мы не в Америке. Оказалась ерунда – перелили масла, вот оно и потекло, Гриневицкий в этом убедился сразу же на крыле. Летели с Дубаковым, масло лилось из дренажной трубки, и Дубаков сдержанно сказал, что ладно, решение правильное, мало ли, – хотя оба понимали, что поломка не фатальная и Гриневицкий, переосторожничав, сорвал важный полет. В тот самый миг, как он это понял, случилась трагикомическая вещь, какие он словно притягивал: у них в крыле были две ракеты на случай вынужденной, они возгорелись – от перегрева, что ли? – и отсалютовали несостоявшемуся рекорду. От этого вспыхнуло крыло, Гриневицкий стал с отвагой отчаяния сбивать курткой пламя, Дубаков кинулся к нему – слава богу, подъехали красноармейцы и брезентом удушили пламя. Тут же, ночью, прибыла правительственная комиссия.</p><p class="p1">На Политбюро Гриневицкий не скрыл, что теоретически можно было бы лететь дальше, но Хозяин утешал и похвалил: сберег машину, сберег людей! Словно утратив остатки самоконтроля от этой ласки, Гриневицкий тут же, на самом верху, заявил, что виноват во всем Антонов, что он вредитель и намеренно дает поврежденные машины. Антонов, при котором это все было, очень спокойно сказал, что машина была в совершенной исправности, а пилотам следует проститься с барскими привычками и лично контролировать предполетную подготовку. Гриневицкий настаивал, пришлось Хозяину сказать: товарища Антонова наказать всегда успеем, без ошибок не бывает движения, что-то такое. Антонов потом ничего Гриневицкому не сказал, вел себя ровно, но все же всё знают. На кремлевском совещании произносить слово «вредительство» – это в тридцать пятом году было свинство. На шляхтича стали смотреть косо.</p></span><span id="id35"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Реабилитировался он, только перелетев через год из Лос-Анджелеса в Москву на поплавковом самолете, но с Америкой вообще вышла глупость. Хозяин ему сказал: что же, нам средств не жалко, если в распоряжении наших летчиков не имеется сегодня достойного аппарата – приобретите его у тех, кого считаете лучшими. Гриневицкий мог сказать: да что вы, лучшие, безусловно, у нас, нужно дать только шанс и, может быть, сменить некоторых конструкторов… но он не сказал, то есть как бы скрыто согласился с тем, что у американцев лидерство. Наверное, будь он интриган… но его, человека прямого, интересовала только личная победа. Его командировали, как, в сущности, бывало тогда сплошь и рядом: американцы приезжали к нам и строили тут, что разрешали, а мы летали к ним и выбирали технику. Была целая мода ездить к ним и писать потом очерки про то, что люди они в целом неплохие, им бы только социалистическую организацию производства! И Грин поехал и три месяца там изучал предложения, и выбор его пал на моноплан «Вульти».</p><p class="p1">Это был странный выбор. Гриневицкий за полгода до этого говорил, что на одномоторнике через полюс летать бессмысленно, а тут запросил именно одномоторник, машину тридцать второго года с прекрасной, нет слов, аэродинамикой, весь из легких сплавов, восемьсот девяносто лошадей, скорость до трехсотпятидесяти, два бака суммарной емкостью под восемьсот, трехлопастный винт. Напрасно ему говорили, что есть машины устойчивей, он никого не слушал, подавай ему «Вульти». Два месяца доводили: в салон вместо кресла впихнули дополнительный бак, на крылья поставили антиобледенители «Гудрич», два цельнометаллических поплавка, в подарок заменили радиокомпас – «Фэйрчайлд», то есть волшебное дитя, заменили на «Лира», то есть престарелого короля. Все это время Грин раздавал интервью, позировал, ходил по Сан-Франциско, посетил город Себастопол, вообще подробно ознакомился с русской Америкой и отдельно зашел на Русские холмы, где приобрел в легендарном букинистическом книгу по-польски, там и такая нашлась, <em>«Mgła», </em>он сказал, детектив. В Америке его полюбили – чувствовали сжигавшую его манию первенства, обычную для американского героя; впрочем, наших героев там вообще любили.</p><p class="p1">Гриневицкий с верным штурманом Голубевым вылетел из Лос-Анджелеса, сначала все шло прекрасно, над Сиэтлом они попали в дождь, потом в шторм. Видимость стала нулевая. Грин смутно разглядел землю и решил садиться. Оказался необитаемый остров – исключительного везения был этот человек! Остров был с гулькин хер, приводнились и чудом завели своего «Вульти» в бухточку, до утра пережидали шторм, откинув колпак. Голубев предложил распечатать НЗ – Гриневицкий отказался: первая трапеза была у них предусмотрена на следующий день, еды мало, кто знает, сколько придется тут куковать? Сидели, пели; как вспоминал впоследствии Голубев, Грин вдруг запел по-польски <em>«Hej, tam gdzieś znad czarnej wody wsiada na koń kozak młody», </em>у него оказался приятный голос и даже слух, а песня была крайне печальная: не увидит он больше ни любимой, ни Родины и хочет немедленно запить две эти большие неприятности. Однако, воскликнул Голубев, какой понятный язык, почти украинский! Да, ответил Гриневицкий, очень близкие языки, и Голубев успел подумать: чудеса, сидят два славянина в летающей посудине, ночью, на необитаемом острове близ Канады, поют свои славянские песни, обсуждают языки, а где та Польша, та Украина, есть ли они вообще где-либо?! Вдруг волна, понесло на камни – прямо в летных костюмах прыгнули в воду, смех и грех, стали закреплять канат у берега, чтобы драгоценную посудину не разбило. После этого Грин разрешил глотнуть спирту, но только глотнуть. Утром волнение улеглось, хотели взлетать, но тут отлив, бац – они на суше, не разгонишься. Пошли искать пресную воду, не нашли; хотели разжечь костерок – не из чего. Набрали мха, он кое-как тлел, но даже чайника не скипятишь. Еще пять часов, насквозь промерзнув, ждали прилива; после этого Грин вывел машину из бухты, с грехом пополам взлетели, но если бы тут кончилось Гриново везение!</p><p class="p1">Полетели на Свенсон-Бей, с лету разглядели дома и дорогу, сели на воду – на берегу никакого движения; что, у них тут каждый вечер садятся самолеты? Низкий каменистый берег, туман, плотный и серый, лежал на низких домах, на двух деревьях у воды, на самой воде, тихой и как бы загробной; Голубев должен был тогда смекнуть, что это было предупреждение, в жизни ничто не случается без репетиций, но было ему не до символики. Стали подруливать к берегу, встали там. Наконец через полчаса подошел катер, в нем сидел человек без возраста, с лицом морщинистым и красным, как бы потрескавшимся; с грехом пополам объяснились, человек сказал, что на Свенсон-Бее давно нет никакого селения, был тут поселок, разрабатывали руду, но руда иссякла, и теперь, что называется, место пусто – остался только он с больным братом, ибо у них нигде никакой родни. Раз в полгода им привозят продукты и топливо, маяк давно не горит, ибо они в стороне от торговых путей; конечно, надо бы уехать, но обжились, и работы нет (в Америке нигде не было работы).</p><p class="p1">Закрепили самолет, вылезли на берег, абориген позвал ужинать.</p><p class="p1">Странный был берег. Голубев на момент – идеалистические глупости, но какой же летчик не верит иногда в подобные вещи! – вообразил, что они разбились и попали в чистилище, потому что ни на ад, ни на рай это не было похоже. Когда-то действительно был поселок, вроде как у Чаплина в «Золотой лихорадке», – теперь это были пустые черные дома, хотя на площадке в середине все равно стоял американский флаг – национальная гордость, блюдут. Брат оказался совсем расслабленный, с обезьяньими длинными руками, нехорошей улыбкой идиота – всего можно было ждать от этой пары. «Мать его ударила об угол, когда носила», – сказал старший. Самого старшего, видно, тоже много раз ушибала жизнь, разговаривать связно он не мог, перескакивал с этого на то, вообще же, видимо, намолчался и не хотел учиться людской речи заново. Гриневицкий спросил, чем они тут занимаются. Всегда есть дело, неохотно отвечал старший. У них была копченая грудинка и кофе, Грин выложил шоколадку из НЗ – «Полярная люкс», советская, из самолучшего какао – никакого впечатления: советские, несоветские… Они тут даже не знали, что есть какие-то советские. «Я поляк», – пояснил Грин. «У нас тут был один поляк, утонул», – сказал старший; младший вообще больше помалкивал, но на словах про поляка энергично замычал. Тут бы Грину опять заметить знак, но он только поморщился. Ему стало жаль поляков, которых носит по свету, и все по каким-то странным, больным местам. «Ну что же, ночевать станете?» – спросил брат. «Да, если позволите». – «Что же, нам не жалко. Если ночью лететь, можно залететь в Валгаллу». – «Какая Валгалла?» – «Не знаю, но есть северная земля, откуда никто не возвращался. Берега ее странной формы. Их можно видеть издали. Больше никто не знает и вам не скажет». Вытянуть подробности про Валгаллу было невозможно, стали располагаться на ночлег.</p><p class="p1">Голубев долго не мог заснуть, выходил курить. К нему вдруг присоединился младший брат – вышел из дому и встал рядом, свесив обезьяньи руки, смотрел на океан, и глаза его странно светились, почти как у зверя. В ночном океане, на мертвой воде, тоже плясали странные отблески на горизонте – всплывали, может быть, фосфоресцирующие существа. Было в этом нечто совсем непонятное – что он, Голубев, пацан из Замоскворечья, тут сейчас делает и кто с ним рядом стоит. Если бы младший брат сейчас на хорошем польском запел бы <em>«Hej, tam gdzieś znad czarnej wody»,</em> Голубев бы, наверное, умер от разрыва сердца, но абориген стоял молча. Голубев предложил ему папиросу, тот с любопытством взял, понюхал и сунул в карман. Наконец Голубев заснул, а утром старший брат, собираясь отвезти их к самолету, вдруг серьезно сказал Гриневицкому на своем как бы не английском, каком-то рубленом твердом языке: тот, кто сюда попал, тот уж точно вернется. Уж это примета. Лучше уж вам не улетать, вы все равно вернетесь. Гриневицкий похлопал его по плечу, и скоро они взяли курс на Джуно. Ужасно выглядели с воздуха эти черные дома. <em>«Nie ma mowy, żebym tu wrócił»,</em> – прошептал сквозь зубы Гриневицкий.</p><p class="p1">– Что это ты? – переспросил Голубев.</p><p class="p1">– Черта с два я сюда вернусь, – прошипел Гриневицкий.</p></span><span id="id36"><div class="title5">
<p class="p">3</p>
</div><p class="p1">В 1880 году канадцы Харрис и Джуно открыли золотое месторождение на 58 градусах 21 минуте северной широты и 134 градусах 30 минутах западной долготы. Выросший вокруг него поселок поименовали сначала в честь инициатора всей экспедиции немца Пилца, но Пильцбургом он назывался лишь до того, как Харрис нашел прославленный впоследствии самородок «Голова лося» и подпоил прочих старателей так, что поселок назвали Харрисбургом. Начальник охраны Роквелл недолго терпел этот произвол и подпоил старателей, охотно проголосовавших за новое название – просто Роквелл; но год спустя Джуно вновь подпоил их так, что с этого времени поселок назывался Джуно. Портрет Джо Джуно украшал теперь мэрию – суровое квадратное лицо, усы скобкой, глаза глядят в то самое будущее, которое всегда за неудачников. Пятьдесят лет Джо Джуно был никто, а в восьмидесятом стал основателем города. Будущее – ненадежный союзник, но у неудачников других нет.</p><p class="p1">Прибыли в Джуно вечером, Голубев сбился и плохо понимал, какой идет день; было чувство, что они в вечных сумерках кружат вокруг полюса. Люто хотелось спать, но неизбежные процедуры несколько развлекли Голубева: он заполнил бумаги, дал переписать все их данные, их напоили очень хорошим кофе и отвели в музей города, где под стеклянными колпаками красовались восковые темно-золотистые копии главных самородков в натуральную величину. Тут был и «Голова лося», с которой начался город, и «Хвост дракона» – в самом деле треугольный и пупырчатый, и «Профиль Мефисто». За пятьдесят лет, с гордостью пояснил мэр, рудники Джуно принесли Америке более трех тонн золота из тех одиннадцати, которые дала Аляска в целом; Голубев уважительно свистнул, Грин уважительно кивнул. Дальше был банкет с золотоискателями, то есть какой банкет? В Джуно не признавали дипломатических тонкостей, это был город старателей и их жен, город вокруг рудника, со старательскими вкусами и навыками. На втором этаже в зале заседаний накрыли длинные грубые столы, на них стояли бутыли спирта и лежали куски жареной оленины, в центре – огромный открытый пирог с рыбой, и люди за этими столами были совсем колхозного вида, но чем-то неуловимо отличались. Представим себе обветренного колхозника, о котором пишет Джек Лондон. Такой колхозник всю жизнь работает на себя, хотя живет среди таких же в обстановке сурового братства. Неужели весь секрет в том, что колхозники возделывают скучную картошку, а золотоискатели ищут веселое золото?</p><p class="p1">Гриневицкий и Голубев расписались в книге почетных гостей, причем Грин записал «<em>Greatings!</em>» – что было неправильно, но странно соответствовало духу величия, который их объединял. Они были великие ребята – те, что искали золото, и те, что перегоняли крылатую машину из одной части света в другую. Гриневицкий сказал тост, по духу что-то вроде арии тореадора – «Тост, друзья, я ваш принимаю, тореадор солдату друг и брат!», – и хотя многократно отнекивался, его принудили выпить чашу дружбы. Спирт оказался беспримесным и даже легким, совсем не тем, какой, случалось, Голубев пил в Москве. Оленину он ел не впервые и различий не заметил. Зато ему показалось, что язык он теперь понимает гораздо лучше. Золотоискатели рассказали, что настоящие сокровища должны скрываться на шельфе, но они достанутся сыновьям или внукам; Аляска богата не только золотом, но и платиной, и цинком, и все это пригодится, в том числе авиации. Разговор перешел на авиацию. Грин сообщил, что до выхода в космос остаются годы, максимум десятилетие, золотоискатели уважительно покивали. Один из них, Стейтон, признался, что до переезда на Аляску был школьным учителем, детей ненавидел, а настоящую жизнь почувствовал только здесь. Климат, конечно, климатом, но такой красоты тоже больше нигде нету. Гриневицкий широким жестом позвал разрабатывать прииски у нас, пообещав: у нас тоже красота. Вспомнили, сколько американцы понастроили в последние годы, сколько народу спасается от депрессии на стройках Сибири, – такого масштаба, признал мэр, у нас еще нет; так у нас и уровень был ниже, снисходительно признал Гриневицкий, есть от чего отталкиваться. Потом пели: золотоискатели надрывно исполнили балладу о машинисте паровоза, который спас пассажиров своего поезда в Вогане, Техас, и негры, которых никто не угнетал, спели необыкновенно красивый псалом. Грин ответил своей «Козак млодый», Голубев впервые в жизни пожалел, что толком не учился ни на чем играть и не знает народных песен, и вспомнил только «Калинку-малинку», которую, как оказалось, знали все.</p><p class="p1">Когда их препроводили на ночлег в гостиницу – для края света она была дивно комфортабельной, как и аэродром, где свободно могли взлетать и садиться три машины, хотя такого нашествия техники в Джуно отродясь не бывало, – Голубев не удержался и завел политический разговор: все-таки зря отдали Аляску, за которую дали золотом меньше, чем – он показал осведомленность – стоил тогда средний нью-йоркский небоскреб. Грин, который начал было задремывать, вдруг вскинулся и выдал такой длинный монолог, которого Голубев от него сроду не слыхивал. Ты не видишь всей истории вопроса, сказал Грин с неожиданной пламенностью. Аляска – это крюк, который заброшен в их тело. За этот крюк мы теперь их притянем. Что Европа? Европа давно мертва. Есть два великих материка, ранее соединенных через полюс. На полюсе была земля. О да, солидно сказал Голубев, я читал, Обручев. Обручев мало знает, отмахнулся Грин. Я изучал вопрос. На карте Меркатора есть материк. Свидетельства о Гиперборее находим во всех древних источниках. Америка была соединена с Россией, и Россия всегда стремилась в Америку, нам же рассказывали в Калифорнии. Мы были общей землей, в Арктике была своя Антарктида, от нее остались рассыпанные острова. Варченко в двадцатые годы находил памятники. Ну, это долго. На самом деле наша миссия, – Голубев представить не мог, чтобы Гриневицкий заговорил о миссии, – построить трансарктический путь и навсегда связать Америку с Россией. Мы два братских народа, мы свежая кровь. Они и мы, вот кто способен спасти. В Германии фашизм, в Италии фашизм, там вырождение, потому что разучились работать, потому что неинтересно больше познавать, последний их приличный летчик погиб в Адриатике в 1931 году, разбросав листовки над Римом. Америка – вот будущее, и Сталин это понимает. Всё, кроме арктической программы, – отвлекающие маневры. Надо отвлечь от главного – от поисков арктического пути; мы прокладываем воздушный, Шмидт – водный. Признаться, сказал Грин, понизив голос до конфиденциального шепота, от чего у Голубева волосы зашевелились на голове, – в Северную Землю я не верю, и сколько ее ни ищи, все зря. Но отыскать оптимальный морской путь, задружиться с этими хлопцами, переманить изобретателей и сделать из них будущих наших агентов – это да. Аляска – залог сближения; через Аляску мы уже сейчас можем перелетать хоть в Лос-Анджелес, а постепенно ухватим и весь континент. Социализм в Америке будет построен еще прежде нашего выхода в космос: вопрос пяти лет, предпосылки назрели. Рабочее движение ширится, а депрессия – ты сам видишь, что сделала депрессия. Мы этим полетом сделали больше, чем в свое время первая Российско-Американская компания. И все, все полярные затеи только для этого, потому что черта ли в самом полюсе? Много про это не разговаривай, а впрочем, тебе и самому уже очевидно. Возьми наших лучших: Эйзенштейн, Ильф и Петров – куда все они поехали? Ты думаешь, учиться у Голливуда? Нет, все это десант… И Грин заснул так же внезапно, как разговорился. Голубев опять долго не мог заснуть, проклинал часовые пояса, из-за которых у него сбился режим сна, и, возможно, навеки, потому что трансарктические перелеты будут теперь его буднями; эта мысль его разбудоражила, он снова выходил курить, потом улегся и начал засыпать, только вообразив свою Галю, мысленно ее обнимая. Мысли о Гале почему-то успокаивали всегда.</p><p class="p1">Утром перед вылетом мэр отозвал их в сторону и со значительным видом вручил Грину маленький золотой самородок, похожий на месяц, каким его изображали в старых книгах, – изгиб с профилем. Грин замахал руками, но мэр сказал очень серьезно: это не ценность в чистом смысле, это другая ценность. Золотоискатель дарит не на память, а на удачу, – мэр повторил несколько раз <em>«luck, luck!»</em>, – а я вижу, я в таких случаях чувствую чутьем золотоискателя, поскольку все мы здесь золотоискатели, что вас на том берегу ожидает определенная опасность; мне кажется, эти несколько унций могут облегчить вам поиск пути. К тому же, – он подмигнул совсем по-ворошиловски, – мы, в сущности, не дарим, а возвращаем, кому-кому, но вам ли не знать, что это общая земля.</p><p class="p1">Этот ли аргумент убедил Грина, или он в самом деле предчувствовал некоторые трудности в дальнейшем пути, несмотря на идеально ясное небо и даже слишком теплый день для заполярного лета, но самородок он взял и спрятал в нагрудный карман куртки с выражением общего тайного знания и тряс руку мэру с особенным чувством. Голубев, в отличие от старших летчиков, суеверен не был, но после того, что случилось на советском берегу, суеверен стал.</p></span></span>
