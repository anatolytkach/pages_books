<p class="p">Глава третья</p>
<p class="p">Двое</p>
</div><span id="id21"><div class="title4">
<p class="p">1</p>
</div><p class="p1">Жена Петрова была желанна миллионам, а Петров не любил ее. Он любил Степанову, и вот как это получилось.</p><p class="p1">В тридцать четвертом году – это сколько же было Степановой? – ей было девятнадцать, она рано вышла замуж за инженера анилиновой фабрики, и у нее была годовалая дочь, и при этом она обучалась на штурмана. В летный отряд приходили разнообразными путями: Маркович, для примера, была просто ткачихой – и, говорили, могла добиться на этом поприще не меньшего, чем Дуся Виноградова, причем, не уступая ей в изяществе, превосходила в мускулатуре. А Степанова была чертежницей, да еще и передовой; чертили они приборы для аэронавигации, преподавал Чернышев – в Гражданскую артиллерист, успевший в Царицыне попасть на глаза Хозяину и персонально им уважаемый. Он был универсал – летал с двадцать пятого, закончил лесной институт, читал серьезные книги по высшей математике, но страстью его была аэронавигация. Птицы, говорил он, летают в условиях нулевой видимости, а мы не лучше ли их? Определять положение по звездам, солнцу, ветру, мху, влажности, температуре и трудноуловимым движениям воздуха было его страстью, он знал никому не нужные, безумно интересные вещи, о которых никто не слыхивал, – рассказывал про Джона Пола Джонса, первого штурмана американского флота (и любил повторять, что штурман у американцев называется <em>pilot</em>), про Циммермана, лоцмана капитана Кука, первым определившего на «Индеворе» долготу в открытом море, про Чжэна Хэ, совершившего семь путешествий в Западный океан и доставившего в Китай жирафа, который умел читать по-бенгальски и считать до девяти. Но все эти рассказы во время занятий отвлекали Чернышева ненадолго, был он строг и уважаем. Однажды, это был сентябрь тридцать четвертого года, он привел на занятия Петрова, еще не знаменитого, но подававшего самые серьезные надежды: тот прекрасно летал по приборам и должен был рассказать об особенной важности ветрочета, а также поделиться впечатлениями от перелета в условиях низкой облачности над Черным морем. После занятия, на котором из немногословного, светловолосого Петрова приходилось клещами тянуть впечатления, – и все равно он всем очень понравился, – Чернышев его спросил: как мои? А Петров в ответ спросил: а эта кто, у окна сидела справа? Да, сказал Чернышев, красивая, цыганочка такая, Лепницкая ее фамилия, но ветер в голове. Да не та, с досадой сказал Петров. Подальше которая. Эта? – изумился Чернышев. Эта – Поля Степанова, она схватывает, но внешностью обыкновенная. И замужем. Я совсем не про то, сказал Петров и покраснел. Изумительную способность краснеть он сохранил и после, когда его хвалили вожди и даже когда награждали за Испанию.</p><p class="p1">Чернышев, однако, относился к Петрову по-отечески (тогда время было плотное, и разница в пять лет, почитай, учетверялась) и что-то понял, поэтому направил Степанову штурманом к Петрову. Разумеется, в первый полет Чернышев взял ее к себе, чтобы посмотреть, способна ли она в принципе сохранять сознание в воздухе, и был даже несколько разочарован ее спокойствием: могла бы поахать, попищать. Правда, особых штурманских качеств она не проявила, потому что, как призналась потом, на трехсотметровой высоте все знания из нее словно выдуло. Ну что же, сказал Чернышев, летать вы можете, я вас передаю Толе, он сделает из вас штурмана. И они стали летать с Толей.</p></span></span>
