<p class="p">7</p>
</div><p class="p1">В полдень Бровмана отправили в штаб, там, сказал ему ответсек, что-то случилось – надо подумать, как преподать, ну что я буду учить ученого. Бровман с шофером Гришей долетел туда, как на крыльях, с твердой уверенностью, что он подобное предчувствовал, достаточно уже развил в себе интуицию, чтобы понимать такие вещи. В штабе были уже Сигурд, Плотников из бюро Веневитинова, лучший знаток полярного шельфа Долуханов. Он и разъяснил: в одиннадцать было последнее радио, «8 крайне правый маслосистема, сплошная 93, тяжело. Планируем 35». Восьмерка означала отказ двигателя, 93 – облачность, ну а 35 – это Бровман и сам знал, экстренная посадка. С тех пор глухо молчали, не отвечали, над полюсом стояли сплошные мертвые тучи, но институт погоды клялся, что должны быть разрывы, 93 – это именно облачность с разрывами, иначе было бы 45. В этой арифметике Долуханов не разбирался. По его прикидкам – он показал Бровману бумажку с чертежом – они должны были сейчас легко сесть на Аляске, полюс, по всем расчетам, уже прошли, а оттуда, если машина в самом деле вышла из строя, их нетрудно было эвакуировать. Атмосфера, однако, была похоронная. Вот же чертово масло, сказал Плотников, прямо судьба у него с этим маслом, и ведь на испытаниях никогда ничего. Правый крайний был в полной исправности. Тут поднялась беготня, шум – на теплоходе «Батум» приняли радиограмму, которая сюда не дошла (беда, если у них и передатчик слабеет, хотя рассчитан был на три месяца): «Вижу контуры острова 120 сш 140 вд необычайный цвет», – нет, тут ошибка расшифровки, заорал Сигурд, там нет никакого острова! Либо они сошли с ума, на высоте бывает, либо помехи. Но дальше началось невообразимое.</p><p class="p1">Через полчаса Синяков, начальник связи, лично принял внезапную радиограмму Смирнова «Скорость 450, высота 3200 нарастает». Какого черта, проскрежетал Плотников, это невозможные цифры, я могу допустить в разреженном воздухе триста тридцать, но выше этого разогнаться немыслимо технически. Тут подошел непонятный полковник, очень тихий, и так же тихо попросил Плотникова вести себя очень тихо. Такие люди всегда обладают особенной убедительностью. Четыреста пятьдесят, догадался Бровман, вполне могло быть и не скоростью, а, допустим, квадратом посадки. Дальше странные радиограммы посыпались градом и так же внезапно прервались, последняя пришла в 15:30 – «980, 4500, материк 2 рассвет внезапных ливней, но это вечное губительное неверие».</p><p class="p1">Да, конечно, почти с облегчением понял Бровман, экипаж сошел с ума. Но профессиональные навыки умирают последними, и они, конечно, приземлятся, топлива хватит. Остальные переглядывались, пожимали плечами и вели себя, в соответствии с указаниями полковника, очень тихо. Полковник, впрочем, собрал все радиограммы и уехал, по всей вероятности, докладывать в какое-то очень важное и страшно тихое место. Сигурд бормотал: «Разве что Арктида?!» – и сам себе усмехался. Но тут, словно странный тихий полковник только и заставлял эфир молчать, сообщения пошли потоком, Бровман отродясь не присутствовал ни при чем подобном. Как пояснил ему впоследствии начсвязи, оказавшийся на удивление открытым человеком, явление это было широко известно с шестнадцатого года и получило название торнадо, поскольку открыл его американец Рейнардс в Техасе как раз после известного урагана, словно катком раскатавшего Хантсвилл. На другой день, когда радиолюбитель переговаривался с товарищами, кто в городе уцелел и что порушено, образовалась лавина загадочных, а иногда и вовсе бессмысленных сообщений. Кто-то умолял о помощи, но перечислял приметы совершенно иных местностей; кто-то признавался в любви, другие передавали непонятные наборы цифр, среди которых встречались подлинно безумные восклицания вроде «Экие свиньи эти саксонцы!» – словом, эфир сошел с ума. Объяснение, которое предложил Рейнардс, – будто где-то в недрах эфира затерялись старые сообщения и вот торнадо их вытряхнул, словно труху из карманов, – признали неосновательным. Вообще же, признался начсвязи, в эпоху юношеского увлечения передатчиками он все время ловил непонятные сигналы, чаще жалобы и стенания, словно чьи-то одинокие души после смерти жаловались ему: «Здесь очень холодно», «Никто никогда не поймет», «Немедленно спасите предположительно квадрат 36–36», хотя нигде в округе не было такого квадрата… При сильных погодных турбулентностях эфир в самом деле выдает такое, словно приоткрывается ад, причем обитатели этого ада не знают друг о друге. Такое торнадо разразилось сейчас над северо-востоком Московской области, и если Гриневицкий в самом деле продолжал радировать что-то, его сообщения в этом хаосе терялись. Вдруг поймали: «Хотите ли вы знать нет вы не хотите знать», после чего, словно в обиде на их нелюбопытство, эфир замолчал, будто никакого эфира не существует, а только одно электромагнитное поле. «Словно приоткрылось окно», – пояснял начсвязи растерянно. Предположительно Гриневицкий передал только «Вижу лиственные леса на горизонте» – что означало, будто его занесло в тайгу, – но больше от него никто ничего не слышал, если не считать совершенно уже бредовой радиограммы «3600 1230 отказываемся верить своему счастью», принятой метеорологом и радиолюбителем на Аляске в семь часов московского времени.</p><p class="p1">С утра Бровман дал в номер краткое сообщение об экипаже, пропавшем без вести, и о начале поисков. Шли они странно: ближе всех к предполагаемому месту аварии, если Грин действительно прошел полюс, был самолет «Авиа Арктика» на острове Рудольфа, но ему-то и не разрешили искать – под предлогом боевого дежурства по обеспечению папанинского дрейфа; что могло угрожать Папанину и почему надо было терять драгоценные минуты, никто не спросил, а следовало бы. Вылетели два американца и канадец – глухо. Эскимосы будто бы слышали низкий вой в облаках, но добиться от них подробностей оказалось невозможно: вой, как от летающей лодки, пояснили они с первобытной простотой.</p><p class="p1">Через неделю безрезультатных поисков к Бровману пришла посетительница – девушка редкой прелести и очень иностранного вида, назвавшаяся невестой Гриневицкого.</p><p class="p1">– Вы меня простите, – сказала она, страшно нервничая, – но, по-моему, их никто не ищет. Я всегда чувствую, как он, и я знаю, что он жив, но ужасные условия. Я хочу просто, чтобы вы сказали: махнули на него рукой или нет.</p><p class="p1">Бровман как мог объяснил, что у нас не Америка и никто своих бросать не будет, пока есть надежда, а именно Надеждой ее и звали. Кажется, все его слова текли мимо ее слуха, но, глядя в ее жадные ждущие глаза, так и молившие об утешении или чуде, Бровман лишний раз Гриневицкого зауважал. Он ничего не знал о его невесте, на кремлевских застольях Грин после бегства жены появлялся один. Но вот была такая Надежда, студентка, с тонким лицом, серо-синими глазами. Она ничем не походила на летчицких жен, тоже, кстати, очень разных, но одинаково хорошеньких. Всех их можно было представить на картине Ампелонова «Жена летчика». Эта не была похожа ни на жену, ни вообще на модель Ампелонова. Такие откуда-то еще брались, но потом бесследно исчезали. Может быть, их увозили с собой западные дипломаты. И грех признаться – на миг Бровман порадовался, что Грин не вернется (это было уже понятно). Не то чтобы он хоть на миг допустил, что эта девушка будет с ним, но он порадовался, что она не будет чужой. Пусть будет ничья.</p><p class="p1">Он, однако, один раз позвал ее в «Известия» выпить кофе. Это был вариант компромиссный, к которому Бровман прибегал, не желая испугать девушку серьезностью намерений: вроде бы на службе и все же в буфете. Буфет «Известий» был хорош, гости в нем любили посидеть, буфет как бы делал Бровмана еще большим американцем – в каждой американской редакции, он знал, был бар. У нас, конечно, все бы запили, у нас ничего не бывает вполовину. В этом баре Бровман чувствовал себя надежней, чем в любом московском кафе, здесь он был в своей вотчине. Очень быстро ему стало не о чем говорить с этой Надей. Он мог бы, как в молодости, рассказывать о себе и слушать о ней, но сейчас было не время рассказывать о себе. Вообще вся любовь, все, что при этом делают, – включая и постель – изменилось. Все были теперь деловитые люди со сверхзадачами, все сходились быстро и так же деловито. Надя была без сверхзадачи, такой задачей, видимо, был у нее Гриневицкий, и ему только такая и была нужна – способная жить им. Бровман мимолетно подумал, что это все отошло, и сам он отошел, каким был когда-то. Он, прежний, мог бы увлечься Надей, а теперь ей предстояло, вероятно, засохнуть в одиночестве или выйти замуж за инженера. Человек теперь был либо герой или летописец при героях, либо инженер. И Надя очень быстро поняла, что Бровману скучно, и потом он увидел ее всего единожды, при совсем других обстоятельствах; почему-то так и почувствовал, что этот раз – предпоследний.</p><p class="p1">Между тем невеста Грина была права – искали действительно кое-как. Как-то молча и солидарно было решено, что ничего не выплывает и никто не спасся. Возникла вдруг версия нижегородского географа Бельского, что в силу гигантской магнитной аномалии в Якутии приборы солгали, маршрут нарушился и самолет мог упасть в озеро Боух-Нельде, что означает «Семь мертвых». Как раз и упали всемером, да еще в тех местах аномалия, и выходило, что искать надо там. Бельский снарядил следующей весной экспедицию, пошел с опытными туристами и утверждал, что один якут видел труп в летной форме, а другой – обломок приборной доски, но якут отказался выезжать из стойбища, а вызвать дополнительные силы для поисков Бельский не мог. Примечательно, что никто больше не видел самого якута, а год спустя не нашли уже и Бельского. Какая-то в самом деле магнитная аномалия пожирала людей бесследно, иногда оставались только странные девушки, а иногда и девушек забирали. Наконец летом нашли рифленый обломок крыла, но всем было ясно, что к Гриневицкому это отношения не имеет: не он ли так гордился гладким крылом своего бомбера? Могло, конечно, подумал тогда Бровман, легко могло при падении ли, при иной катастрофе так смять гладкое крыло, чтобы оно стало рифленым; вот был бы памятник всей судьбе Гриневицкого! Но мысль эту он решительно отогнал.</p><p class="p1">Поиски Н-209 имели ряд побочных эффектов. В сущности, вся история, экономика и филология СССР были побочными эффектами его стремления в стратосферу, так это представлялось Бровману, ибо он умел заниматься лишь главным делом – другого не признавал. Так доказательство теоремы Ферма, в течение четырехсот лет никем не доказанной и неохотно сдавшейся лишь за пределами большой истории, привело к появлению нескольких новых областей алгебры, любопытным физическим гипотезам и даже созданию одного прибора, с замечательной хитростью выявлявшего поддельные трамвайные билеты.</p><p class="p1">Осенью в процессе розыска в верховьях Вилюя пилот Индукаев открыл малую народность, не нанесенную до того ни на какие карты, равно и не внесенную в реестры; снижаясь вследствие поломки, он увидел непредусмотренных людей, приведен был в их стойбище и донес сведения о них до большого мира. Впервые, собственно, они были открыты ссыльным географом польского происхождения Коробчевским (как магнитом тянуло туда поляков!), но открытие его умерло вместе с ним, ибо он остался в стойбище, опутанный любовью к местной красавице. Женщины этого племени, называвшие себя «огуэн», что в переводе с их языка означает «коренные», в самом деле отличались изысканной красотой. Мир в мифологии огуэн делился на «коренных» и «предателей». Предателями назывались все, кто ушел жить в более приемлемые погодные условия. Согласно космологии огуэн, когда-то все люди, созданные верховным божеством из снега и льда, жили в верховьях Вилюя, но потом расползлись по земле в поисках лучшей жизни и забыли свои корни, а огуэн остались верны полярной родине. Через понятие «родина» определялось ими все: закат был красив, как родина, олень вкусен, как родина, умерший возвращался на родину; все же негативное определялось через понятие «предательство», «измена», «кукуюн»: изменой была плохая погода, желудочная слабость, зубная боль (других болезней, кроме желудочной и зубной измены, огуэн не знали). Миф о переходе монголоидов из теплых краев в приполярные вследствие бегства от ледника, таким образом, ни на чем не основан и благодаря открытию Индукаева подвергся ревизии: монголоиды, как и все приличные люди, изначально жили на севере, но предали свои ценности и ушли на торговый юг, тогда как истинные прародители человечества остались верны Приполярью. Адам и Ева были созданы в аду, где им и место, но бежали в рай, где частично растаяли, частично же выродились. Исправить эту несправедливость рожден был Сталин, установивший Приполярье везде. Индукаева среди огуэн тоже считали некоторое время предателем, поскольку он ушел на юг и вскоре опубликовал сборник песен народности огуэн о Сталине; но потом он затосковал, вернулся и стал коренным. Дело в том, что верховное божество пообещало народу огуэн, что те, кто никуда не уйдет и все выдержит, рано или поздно дождутся потепления на полюсе, тогда как в остальном мире похолодает навеки; миф о награде за долготерпение встречается также в сказке «Морозко», восходящей к древнейшему фольклору Приполярья. Судя по некоторым признакам, конец времен уже близок: то, что мерзлота отступает с каждым годом, еще не главный признак, а признак то, что везде уже хуже, чем на полюсе. Верховное божество не лжет своим детям, утютюн.</p></span><span id="id41"><div class="title5">
<p class="p">8</p>
</div><p class="p1">Как всегда, начали выясняться предчувствия, приметы, предпосылки. Мухин – тоже специалист, король кондитерских, называемый известинцами «собственный корреспондент пищепрома», заметил, что экипаж был неслетанный. Откуда только слово вытащил. Ты знаешь что, Лёша, сказал ему, не сдержавшись, Бровман, пиши про карамель, ты в этом понимаешь. К твоему сведению, Волчак с Дубаковым в первый раз летели вместе, до этого два раза рыбачили. Мухин сник, но Бровман был в своем праве. Он переживал, в конце концов, личную утрату. Если бы случился взрыв на Белевской макаронной фабрике, у него хватило бы такта не лезть с версиями. Дальше оказалось, что уже в мае было понятно – ничего не выйдет. А потом Дубаков признался Бровману, что еще в мае все понял: ничего не выйдет. Якобы 25 мая был разговор на Самом Верху. Гриневицкий пользовался тогда неограниченным доверием и попросился лететь на дальнем бомбере Веневитинова. Дубаков тогда со всей решимостью сказал: товарищи, на этой машине лететь нельзя. Это бомбер, он по техзаданию не предназначен для сверхдальних перелетов. «Товарищ Дубаков, – мягко сказал Хозяин, – это не вопрос техзадания. Мы тут сами решаем, что чему предназначено. Я, может быть, предназначен был стать священником, но вы же видите, как получилось? Вы являетесь, насколько мы помним, шеф-пилотом завода 22». – «Так точно», – сказал несчастный, подобравшись. «Так вот и доведите машину за два месяца, доложите о конструктивных наработках и ознакомьте товарища Гриневицкого с особенностями управления». Все знали – это уж была точная примета, – что, если приводятся примеры из личной биографии, возражать не следует, потому что налицо личная заинтересованность в решении. И говорили же Грину понимающие люди: куда ты гонишь? Полюс не убежит, в Штатах никто на подобный перелет не даст денег, сказал же Линдберг – тридцатые годы останутся за Советами. Но ему надо было срочно. Дорвался… Однако у Бровмана уже появились свои соображения – именно потому, что Гриневицкому был нужен не рекорд. Он это понимал теперь с ужасной ясностью и корил себя за близорукость.</p><p class="p1">Ты недопонимаешь, недоучитываешь, год спустя говорил Бровману Орлец с вечным своим отвратительным «недо». Все у него были недо, он один пере. Ты недооцениваешь масштаб борьбы. Если самолета не нашли, это может означать только одно. Да, именно это. Он увел его к американцам, новейшую машину, и будет до конца дней кататься в масле. Как ты можешь, возмутился Бровман, ведь он погиб, он тебе не ответит… Погиб Петров, веско сказал Орлец, и все это видели. Погибла Степанова. Но того, как погиб Гриневицкий, не видел никто, хотя катастрофа произошла предположительно в зоне наблюдения двух полярных станций. Это первый случай в истории Арктики, что не найдено вообще ничего. «Но Амундсен?!» – чуть не заорал Бровман. «От Амундсена нашли бензобак, – отбился Орлец, – и рыбаки видели, как он садился. Здесь никто не видел ничего. Уверяю тебя, он сейчас над нами подсмеивается. Я всегда говорил, что полякам доверять нельзя, что малым странам вообще доверять нельзя – они только ищут, к кому приткнуться». Орлец был на стороне больших батальонов.</p><p class="p1">Разумеется, Бровман не мог в такое поверить. Гриневицкий, конечно, гордец, пусть даже сноб, но не перебежчик, он слишком себя любил, чтобы стать предателем. И что за мания всюду видеть предателей? Но Гриневицкий – поляк, а следовательно, под подозрением: чужой, а теперь всякий чужой был вредителем, только скрывавшимся до поры. И очень возможно, что так оно и было, но Грин… Однако не успели еще затихнуть поиски, как про Грина стали говорить неуважительно, а то и с прямым осуждением. Волчак, как писали в газете, в тридцать пятом сам клещами скусывал головки с болтов, чтобы только облегчить самолет, срезал запасы пищи вполовину, чтобы взять топливо, и хотел отказаться от аварийного бота – в результате сбросил с машины сто двадцать кило! А Гриневицкий настоял, чтобы самолет был покрашен в «его» цвета, – скажите, наследный принц, личная геральдика! – и утяжелил тем самым на пятьдесят кило, потому что прежнюю краску толком не содрали. Все для показа, все ради эффекта! «Все-таки он был не наш», – сказал Волчак однажды, будто теперь только он должен был решать, кто наш и кто не наш; и кажется, к тому действительно шло.</p><p class="p1">А дальше стало всплывать многое. Припомнили разговоры Гриневицкого о том, что в Америке лучше поставлен летный быт, что со временем границы станут прозрачнее, что в Шмидте от большого ученого только борода, – и выходило, что перелет был Грину нужен единственно для того, чтобы спастись, потому что в условиях нарастающей чистки он был кандидат на отчисление из отряда, а то и похуже. Если бы он перелетел, он был бы герой и триумфатор, а если бы отложил на весну, то мог встретить ее уже и непонятно где. Особенно же печально было Бровману, что иные нескрываемо радовались. Выходило, что жить можно, только пока ты победитель. Вообще, была эпоха победителей, все остальные тут же начинали рассматриваться как скрытые злодеи, нетоварищеские парни. Выходило, что и он, Бровман, вызовет в случае чего не дружную скорбь, а тайную догадку, что и раньше у него кое-что было не так, и в целом он был чуждый; он никогда не запоминал благодеяний, которыми одаривал ребят, хоть героев, хоть фотографов, хоть братьев-репортеров, а случись любая или вовсе роковая неприятность, и вспомнят только, как ты закурить не дал, куркуль, собственник. Причем никто и не вспомнит, что не курил.</p><p class="p1">Точку поставил Софичкин, вернувшись с той самой базы, откуда не хотел его забирать Грин. Что же, сказал Софичкин, боролся и напоролся. Я на досуге читал общую психологию, занятно. (Читал он не психологию, а психиатрию, потому что у дочки обнаружилась неизлечимая душевная болезнь, вся эта внезапная задумчивость оказалась не к добру, и в классе она вдруг подожгла занавески; лечилась теперь, по совпадению, на лесной даче неподалеку от Щелкова, много буйствовала и затихала на мгновение, только когда начинали дребезжать окна от рева самолетов; и многие больные затихали, а то уж думали эту дачу переносить.) Так вот, я прочел там, что доктор Оливер, открыв адреналин, исследовал также и адреналиновую зависимость. Человек, помещая себя в экстремумы, испытывает блаженство, и некоторые к нему особо чувствительны. Особенно если вне основных занятий человек беспомощен, неуспешен. (Софичкин-то был успешен, конечно. Дочь чокнутая, и это признак гениальности.) А у Грина жена была да сплыла, о чем он говорить не любил. И потому Гриневицкому надо было летать все быстрей, подниматься все выше, забираться все дальше. И вот он забрался, и затянул с собой шесть человек. Не находя себя в обычной жизни и работе, попал в зависимость от рекордов и славы. И это всегда так кончается.</p><p class="p1">Насчет славы уточнил Харон (Бровман со многими разговаривал о Грине, подумал, не сделать ли книжку? Все-таки в последнем их разговоре Грин, можно сказать, обещал взять его с собой, а такой разговор обретает особенный смысл). Ты понимаешь, сказал Харон, что дело в брате? Брат Сигизмунд ставил рекорд сверхдальности, по меркам тридцать третьего года предприятие безумное, самолет польский, работы Дабровского, сугубо спортивный. Самолет разбился, пилот насмерть, штурман выжил. Если бы наш Юзеф превзошел брата, это был бы урок всей Польше, даже биологический: брат, летающий и возросший в наших условиях, оказался крепче и дальнолётнее польского. Идеальный эксперимент. А вообще, говорят, у братьев особенные связи, так что вполне может быть, брат попросту перетянул его туда. Но они ведь не близнецы, уточнил Бровман. Не близнецы, но все равно связь. Когда у меня сестра в прошлом году болела в Саратове воспалением легких, я очень кашлял.</p></span><span id="id42"><div class="title5">
<p class="p">9</p>
</div><p class="p1">Между тем все было иначе.</p><p class="p1">13 августа в 14 часов по Москве прошли полюс, и молодой Соболев доложил, что крайний правый двигатель звучит нехорошо. В другое время Гриневицкий обругал бы его за такое сообщение и потребовал точности, но в воздухе у него включалась интуиция, и он сам уже полчаса слышал, что четвертый двигатель нехорош. Он ответил коротким «да» и снова погрузился в раздумья.</p><p class="p1">Раздумья эти были особого рода. В небе Гриневицкому приходили совсем не те идеи, что на земле. Надо было бы сосредоточиться, но так думали дураки. Напротив, появлялась изумительная широта мысли. Он успел подумать о моторе, о роковом своем невезении, о том, что Надя ждет, а он для странной девочки Нади единственный шанс, о том, что возвращаться назад нельзя ни в коем случае, о том, что он, безусловно, сделает то, для чего был с самого начала предназначен, то, на что у него не хватило мощности над Уэленом; но теперь у него были четыре мотора, пусть три, но были, и он сделает то, что категорически запрещалось даже обдумывать. Он понимал, что рискует не двумя, как над Уэленом, а шестью жизнями, кроме своей, но именно сейчас Бог – невидимый, непризнаваемый, но всегда ощущаемый Бог всех летчиков – поставил его в ту ситуацию, к которой он готовился всю жизнь: либо погибнуть, либо выиграть, и потому придется выигрывать. Это была идеальная ситуация для каждого полярника – и, если вдуматься, для каждого изгоя. И потому он начал плавно набирать высоту, вырываясь из плотной облачности.</p><p class="p1">– Пора радировать, – сказал Смирнов, хороший, умный радист Смирнов, которого было бы особенно жалко, но Гриневицкий знал, что на этот раз все будет как надо. На высоте открывался третий глаз.</p><p class="p1">– Радируйте, – сказал он. – Четвертый двигатель барахлит, идем в плотной облачности.</p><p class="p1">– Может, поискать ближайшее… – начал было Соболев, но осекся.</p><p class="p1">– Мы дойдем до Фэрбанкса, – спокойно сказал Гриневицкий. Тут стали особенно чувствоваться перегрузки, потому что они перли вверх, до отметки в семь тысяч, на которой, он знал, облачность закончится. – Потерпите немного, друзья. Будет трудно, конечно.</p><p class="p1">Облачность не могла уже продолжаться на такой высоте, он точно знал, что облаков на семи тысячах не бывает, и то, что Волчак с Дубаковым и Чернышевым видели их, было либо ошибкой, либо желанием прибавить себе героизма: проверять было некому. Гриневицкий специально обсуждал это с Бровманом. Это были облака, но не те облака, сквозь которые они летели на Уэлен. Это была густая, физически ощутимая взвесь, та самая ночь, которая сгущается перед рассветом, – последняя попытка задержать его перед окончательной, бесспорной удачей. И несмотря на тяжесть в груди и страшную, все усиливающуюся боль в ушах, Грин пер и пер вверх, понимая, что за этим рубежом настанет божественная легкость. Смерть? Нет, смертью не пахло. Он никогда еще не чувствовал себя настолько живым. Он выжимал, как и обещал, триста и триста двадцать и чувствовал, что машина может выдать триста пятьдесят.</p><p class="p1">– Правый крайний греется, – с трудом выговорил Марьин. Он староват был для этих перегрузок.</p><p class="p1">Что правый грелся – нехорошо, но они могли свободно тянуть на трех. Это была не простая машина, Гриневицкий чувствовал ее. Он рванул выше, и тут случилось неожиданное: на них стал наваливаться сон. Такой сон Грин чувствовал однажды, когда купался в бурю на Волге и доплыл до острова на середине, штормило сильно, добрался едва – и его тут же сморило. Тогда его одного, а тут всех. На несколько минут – никто не сказал бы потом, пять, семь, двенадцать – все погрузились в дремоту, а проснулись от волны тепла, даже жара.</p><p class="p1">– Что это, горим? – спросил Смирнов.</p><p class="p1">– Нет, – хрипло сказал Марьин. – Непохоже.</p><p class="p1">Но тепло нарастало, а между тем его быть не могло.</p><p class="p1">– Солнце! – крикнул Соболев. Они прорвались. Неба не было еще толком видно, но они вырвались из проклятой облачности и шли на высоте восемь сто, невозможной для самолетов этого класса. Внизу лежал слой облачности, похожий на чайный гриб, и немыслимо было представить, что они семь тысяч метров шли сквозь эту медузу.</p><p class="p1">– Связи нет, – доложил Смирнов.</p><p class="p1">– Да черта ли, – небрежно заметил Грин. По идее, все они должны были задохнуться, но вот дышали, и к маске прибегнул только техник Левыкин. А нечего было пить, про его моральный облик Грина предупреждали, но Грин как раз уважал пьющих. Ему почему-то было весело. К тому же внизу появились разрывы. Они шли четко над полюсом, до Фэрбанкса оставалось не больше полутора тысяч километров, это была ерунда по сравнению с теми восемью тысячами, что они проделали. Скорость была порядка трехсот, но нарастала, а ведь Грин ничего не делал для этого. Он сам, должно быть, запьянел на сверхъестественной высоте. Небо имело странный фиолетовый оттенок.</p><p class="p1">Гриневицкий почувствовал потребность слегка подбодрить не в меру изумленный экипаж и запел <em>«Hej, tam gdzieś znad czarnej wody»,</em> но экипаж его почему-то не слышал. Да, странно, почему экипаж не слышал его и сам он не слышал себя? А между тем скорость росла, вот уже она дошла до той грани, за которой кончался указатель. Указатель, видимо, сломался. Указатель истинной воздушной скорости сломался также. Если следить по темпам приближения к темному просвету, они шли гораздо быстрее трехсот и даже быстрее четырехсот.</p><p class="p1">– Командир, – вдруг сказал Соболев. – Шеф. Уже нельзя вернуться.</p><p class="p1">– Но мы не собираемся возвращаться, – недоуменно ответил Грин.</p><p class="p1">– Я имею в виду, что нельзя вернуться вообще.</p><p class="p1">– Вы имеете в виду, что мы находимся там, откуда не возвращаются? – с удивительной легкостью спросил Грин.</p><p class="p1">– Нет, я не знаю, где мы находимся, – непонятно ответил Соболев.</p><p class="p1">– Ваше дело знать не то, где мы находимся, а состояние приборов, которое оставляет желать, – проговорил Грин и вдруг расхохотался – такая глупая вышла фраза.</p><p class="p1">– Мое дело знать про то, что мое дело, а что не мое дело, – сказал Соболев и тоже расхохотался.</p><p class="p1">– Мать жалко, – заметил Марьин жалобно.</p><p class="p1">– Погодите, погодите про мать. Еще не все свои дела мы сделали и не всего достигли.</p><p class="p1">Гриневицкий чувствовал себя слегка пьяным. Синева вокруг была почти лиловой, грозной, а солнце почему-то розоватым. Заката же не бывает, подумал Грин, значит, оно всегда такое, как бы размазывает закат на весь день. Он заглянул в просвет, который оказался прямо под ним. Там мелькнули контуры непонятно чего, но явно контуры и явно земли.</p><p class="p1">– Я снижусь, посмотрю, – сказал он дружелюбно, хотя в его обязанности не входило отчитываться перед экипажем.</p><p class="p1">– Хорошо, – согласился Левыкин, хотя в его обязанности не входило оценивать действия командира.</p><p class="p1">– Правый крайний двигатель вышел из строя, – предупредил Марьин.</p><p class="p1">– Но мы прекрасно летим, – возразил Грин.</p><p class="p1">– Мы летим прекрасно, но он вышел из строя.</p><p class="p1">– Почему не дымит?</p><p class="p1">– Я же не говорю, что он горит. Я просто слышу, что он стучал и замолчал.</p><p class="p1">Грин прислушался. Действительно, они шли на двух двигателях, но физическое чувство сопротивления ушло совсем. Они на двух шли лучше, чем на четырех. Так бывает, когда отключишься от выполнения двух неприятных задач и продолжишь выполнять только две приятные.</p><p class="p1">На этот раз облачность была не столь мощной, и они прошли толщу медузы за каких-то четыре минуты, три из которых Грин провел в приятном полусонном оцепенении. Он видел себя на берегу полусонной реки, в которой жили непременно голавли. Надя выходила из воды, странная девочка, подумал он, я ее не заслуживаю, <em>niegodny</em>. Откуда она такая взялась, почему со мной, почему терпит все это? Но тут он очнулся, очнулся всерьез, по-настоящему. Под ним был ярко-синий сверкающий океан и в нем контуры. Но это был не лед, это был остров, которого здесь не было и быть не могло.</p><p class="p1">– Остров, – потрясенно выдохнул Соболев. – Тут нет острова.</p><p class="p1">– И быть не может, – подтвердил Грин.</p><p class="p1">Вдали они заметили цепь небольших островов с пятнами зелени, что никак не соответствовало климату. Прекрасно, подумал Гриневицкий, я нарастил скорость и прорвался наконец туда, куда рвался всегда, я теперь дома… Он и вправду был дома, в краю тех внезапных ливней, которые всегда мерещились ему, но он никогда не верил, что туда можно попасть. Разве что в раннем детстве, когда, возвращаясь с ярмарки, они с дядькой проезжали удивительную деревню <em>Zachwyt,</em> Восторг, это было прямо написано на указателе, но дядька сказал, что они торопятся, и потому они туда не заехали, а между тем это был единственный шанс. Сколько раз потом Гриневицкий ходил туда пешком, ездил верхом – там не было деревни с таким именем, ее нигде не было. Тебе приснилось на возу, сказала мать. Но я не спал, возмутился восьмилетний Гриневицкий, я видел!.. Вот в том и беда, что всегда спешим. Надо или остановиться, или уж очень сильно спешить; и теперь он спешил достаточно сильно.</p><p class="p1">– Друзья, – сказал Грин, – я забыл вас спросить, но, может быть, вам совсем не хотелось сюда? У каждого же на этот счет свои представления…</p><p class="p1">– Хотелось, не хотелось, – проворчал Марьин. – Теперь-то чего…</p><p class="p1">– Тоже верно, – сказал Соболев.</p><p class="p1">Они снижались, и уже видны были роскошные поля, полные тех нежно-лиловых асфоделей, что называются иммортелями, и тех ослепительных бельэтажей, за которыми широко распахиваются кумкват-дестриматоры. Хотите ли вы знать? Нет, вы не хотите знать.</p></span></span>
