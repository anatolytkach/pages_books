<p class="p">10</p>
</div><p class="p1">Женщина, на которую обратил внимание инженер Березин в первый день двухнедельного крымского отпуска, выглядела лет на двадцать пять. Так оценил он наметанным глазом холостяка. Она лежала на пляже санатория имени Либкнехта под Алупкой в закрытом синем купальнике. Березин привычно оглядывал песчаный пляж и не находил, на чем отдохнуть глазу. Сам он был крепкий, спортивный, большеносый, слегка близорукий, с чутьем истинного яхтсмена, равно натренированным на приключения и опасность. В ленинградском яхт-клубе на Елагином острове он считался ветераном.</p><p class="p1">Путевка в Крым в разгар бархатного сезона, в первой половине сентября, досталась ему нелегко, но Березин был активист, водил детей сотрудников в яхтенные походы, география которых серьезно расширилась за счет Клязьминского водохранилища. Березин с коллегами его и проектировал. Двенадцать бесполезных деревень ушли под воду, и на их месте раскинулась теперь упоительная гладь. Березин проектировал также канал Москва – Волга и при посещении вождями шестого шлюза был представлен им лично, так что на отдых в Крыму в год открытия канала, согласимся, имел некоторое право. В свои тридцать восемь он обдумывал уже, не следует ли наконец заземлиться, как называл он про себя брак. Были варианты: погулять до пятидесяти (но пятидесятилетний жених не столь привлекателен), вообще никогда не заводить семью и в старости погибнуть где-нибудь на воде (об этом он мечтал в минуты легкой грусти) или жениться сейчас, по возможности на двадцатилетней, открыв ей мир и обеспечив себе здоровое потомство. К этому отпуску, первому за три года (стремительная постройка канала была изнурительна не только для копателей), Березин относился серьезно. Он предвкушал не одни удовольствия. Предстояло выбрать спутницу – причем именно из тех, кто, подобно ему, заслуживал сентябрьского Крыма.</p><p class="p1">Те, кого он успел пронаблюдать, делились на три группы, а женщина эта принадлежала к четвертой. Какие же три? Мы имели случай заметить, что Березин любил давать собственные названия предметам и явлениям и даже пописывал в стенную печать, а на досуге заполнял толстую бухгалтерскую книгу разборчивыми лиловыми строчками путевых заметок. Три группы были – для отчета в мужской компании, златоустовствовать в которой Березин привык: с веслом, переходнички и мечта кавказца. Преобладал тип с веслом, тяжеловатый, мускулистый, – от них Березин устал и в Ленинграде, поскольку это был его главный резерв: гребной клуб располагался тут же, гребчихи считали эротические сеансы здоровой гимнастикой и предавались им с той же простодушной страстностью, с какой по зиме смешно гребли на суше на пружинных снарядах. Греблись, называл это Березин. Гребчихи раздражали его обоняние, ибо пот, хотя бы и самый молодой и здоровый, есть все-таки пот. Переходнички, девушки переходного возраста, расплодились в большом количестве, ибо у поколения тридцатых еще не в моде было пуританство; долгие романы с ними были маловероятны, ибо они хотели попробовать. Это казалось им окончательным переходом во взрослую жизнь, как бы на третью ступень, а почувствовать вкуса к этому они еще не могли и к повторению, как правило, не стремились (кроме одной, по имени Лидия, которая преследовала потом Березина до совершенного неприличия). В них было свое очарование, но были и минусы – прыщи, неловкость; Березин чувствовал в себе педагогическую жилку, но лишь в яхтенном деле. Мечты кавказца были знойные брюнетки, иногда с усиками, звонкие хохотушки, большие энтузиастки этого дела, но глупость их была непрошибаема; как говорил искусствовед, товарищ Березина по яхт-клубу, есть женщины актов и есть женщины антрактов; в антрактах с мечтой кавказца возможен был только буфет – говорить с ними было немыслимо, а аппетит в них просыпался сильный.</p><p class="p1">Та же медово-золотистая, которую приметил наметанным глазом Березин, вошла в воду, почти сразу поплыла – без плеска, без визга, ровным и сильным брассом – и растаяла в солнечной ряби; когда же вышла из воды через добрых полчаса, которых ему как раз хватило на две отличные папиросы «Сальве», – Березин не мог не заметить гладкости, грации всего ее тела с прекрасной грудью, длинной шеей, смуглыми ногами, небольшими ступнями и ладонями: это был почти утраченный тип аристократки. Причем аристократка могла работать хоть на заводе «Светлана» – античные пропорции появились у нее благодаря внезапной игре природы. У Березина был в жизни и такой опыт, но чаще художник в нем оставался холоден, а здесь пробудился мгновенно.</p><p class="p1">– У вас прекрасный стиль, – сказал он, подойдя к женщине.</p><p class="p1">Это сказано было уважительным баском знатока: Березин знал, что голос его звучен.</p><p class="p1">Медово-золотистая лежала на животе, чуть спустив бретельки, подставив солнцу лопатки. Огладила Березина мило-удивленным взглядом: атлет. Отвечать было необязательно, и она не ответила.</p><p class="p1">– Я просто любовался, – продолжил он.</p><p class="p1">– Я у моря выросла, – сказала она хрипловато, но музыкально.</p><p class="p1">Не дожидаясь приглашения, Березин опустился рядом на песок и повел очень ему привычный, ненавязчивый и ленивый разговор, из которого обычно за десять минут узнавал все, что могло ему понадобиться для построения стратегии. Но здесь, странное дело, ему не нужно было стратегии. Им овладела прекрасная лень. Он просто наслаждался.</p><p class="p1">Ни по лицу, ни по ответам он не мог толком определить ее возраста. Ей могло быть и двадцать три, и тридцать три. Разумеется, Березин видел опыт: никакого встречного интереса, а лишь то ровное уважение знатока к знатоку, какое ощущалось в старом французском романе в переписке развратника с развратницей. Они могли доставить друг другу утонченнейшие наслаждения, а могли разойтись молча. Они напоминали этот сентябрьский полдень, именно бархатный, уже осенний, но еще цветущий, не нуждающийся ни в чем, в отличие от пылкого июня, – равновесие, почти равноденствие, лучший возраст. В этом возрасте пребывала и страна, уже не подросток: чистое акме, как говорил тот же товарищ по яхт-клубу.</p><p class="p1">Все же Березин узнал, что ее зовут Людмилой. Спрашивать о профессии счел излишним, хотя профессия в наше время, говорил он, характеризует человека целиком: больше о нем можно ничего не знать – происхождение стерто, национальность нивелирована. На пляж санатория она приплыла с городского, отдыхала у родственницы, приехала с подругой. Так это прекрасно, воскликнул Березин, я как раз ищу предлог не ходить на обед! Пойдемте посидим где-то в городе. Да, сказала она, это можно, у нас есть тут столовая «Сирень», недорого и прилично.</p><p class="p1">В столовой она взяла рассольник и котлету с кашей, они выпили две бутылки пива, потом Людмила отлучилась в уборную – Березин поражался, как легко и естественно у нее все выходило, без малейшего кокетства. Он понимал, что может сейчас в любой момент уйти, – и она не станет его удерживать. Но уйти Березин не согласился бы ни за что. Он чувствовал, что ей приятен, в таких вещах не ошибался; приятен, как этот осенний день с горячим солнцем, с небом такой глубокой синевы, какой не бывает летом, – летом оно словно выгорает, море выпивает из него всю синь; а теперь в небе чувствовалась глубь, и можно было понять религиозных идиотов, предполагавших там что-то такое. Сейчас, когда наши икары бороздят и так далее, смешно и обсуждать, но тянет же что-то туда и наших икаров?</p><p class="p1">Поговорили немного о пропаже Гриневицкого. Он не пропал, сказала Людмила спокойно.</p><p class="p1">– То есть вы допускаете, сбежал?</p><p class="p1">– Ну, если хотите, назовите так.</p><p class="p1">– Но мы о нем еще услышим?</p><p class="p1">– Это кто же знает? Никто не знает, как и с кем он увидится. – Помолчала. – И когда, – добавила, глядя в окно. Замызганная столовка как-то преображалась от ее присутствия.</p><p class="p1">– Поставим вопрос иначе, – сказал Березин, заинтересовавшись. – Он среди живых?</p><p class="p1">– Именно так, – ответила она. – Вы удивительно точно назвали. Вокруг него, несомненно, живые.</p><p class="p1">– Хм. А сам он?</p><p class="p1">– Я хочу погулять в горах, – сказала Людмила после паузы, и Березин охотно предложил себя в попутчики. Ее лицо было ему смутно знакомо, как все действительно прекрасные лица. При этом она была не из тех красавиц, на которых оборачиваются, напротив, лицо раскрывалось по мере вглядывания. Поначалу казалось, что рот у нее несколько резок, что глаза, может быть, староваты, – но вдруг она улыбалась, и ей становилось двадцать. Он тоже старался говорить мало, но значительно. Они поднялись в горный лес, в котором толстым шуршащим ковром лежали листья платанов и дикой груши и страшные узловатые корни выступали вдруг из жухлой листвы. Открылся неожиданно вид на город, Березин поразился тому, как высоко они забрались, но спутница его не стала любоваться и снова пошла в глубину леса.</p><p class="p1">– А муж у вас есть? – набравшись храбрости, спросил Березин.</p><p class="p1">– Был, да убил, – ответила она очень просто.</p><p class="p1">– Как? – переспросил он, надеясь на шутку.</p><p class="p1">– Так, очень просто. Меня убил.</p><p class="p1">Это можно было трактовать как угодно – изменил, допустим, и ее убила эта измена, или ударил…</p><p class="p1">– Вот вы простой, прекрасный человек, – сказала Людмила, словно услышав его мысли. – И всегда такой были.</p><p class="p1">– Откуда вы знаете, какой я был? – Березин даже обиделся, потому что не был слишком уж простым человеком и в жизни у него было всякое.</p><p class="p1">– Да уж видно.</p><p class="p1">– Все вы загадками говорите.</p><p class="p1">– Да уж говорю.</p><p class="p1">Она стояла посреди горного леса, и Березин впервые испугался: они высоко забрались, вокруг никого не было, и если она сумасшедшая, ожидать можно всего. Толкнет вниз, придушит – никакой атлетизм не спасет. Сумасшедшие, говорят, бывают необыкновенно сильны. Березин с особенной силой ощутил запах мертвой листвы и почувствовал, что это запах тревожный. Но женщина была так хороша, так ясно вся обрисовывалась под легким коротким платьем самого простого ситчика, что он подумал: не самая плохая смерть. И решился поцеловать ее, ибо сумасшедшая, не сумасшедшая, а против такого все они бессильны, все в этот миг теряют волю к сопротивлению. Он прямо чувствовал в такие минуты, как из него вылетают флюиды, подавляющие чужую волю. И она закинула голову, сдаваясь ему. Вот такая, успел он подумать, такая должна быть женщина нашего времени: она таинственна, она ничего не расскажет, она умеет наслаждаться. Если действительно свободна, я возьму ее.</p><p class="p1">Он выпустил ее. Женщина смотрела озадаченно и, как ему показалось, подначивающе.</p><p class="p1">– Не подумайте, я не позволю себе лишнего, – сказал Березин.</p><p class="p1">– Да хоть бы и позволил, – сказала она, усмехаясь лениво, и Березину опять не понравилось, что кругом так тихо.</p><p class="p1">– Пойдем вниз.</p><p class="p1">– Лучше бы вверх еще, – сказала она.</p><p class="p1">– Да темнеет уже. Пойдем. Я тут ничего не знаю.</p><p class="p1">– А и знать нечего, – сказала она.</p><p class="p1">Березин взял ее за руку, она не отняла.</p><p class="p1">– Ну пойдем, пожалуйста, – сказал он совершенно по-детски.</p><p class="p1">И она покорно – словно действительно ее убил муж и ей было теперь все равно – дала ему еще раз поцеловать себя, а потом пошла с ним вниз из этого горного леса. Вдруг навстречу им выбежала большая дворняга – скорее всего, с примесью овчарки, – но, завидев Людмилу, странно попятилась и побежала вбок. За собакой шла старуха-татарка в резко-желтом платье, остановилась и долгим внимательным взглядом их проводила.</p><p class="p1">– Хорошо, – сказал Березин самым бодрым своим голосом, – предположим даже, что и в самом деле… Но ты, – он почувствовал теперь возможность перейти на «ты», – ты-то находишься, как ты говоришь, среди живых?</p><p class="p1">– Нахожусь, даже очень, – сказала Людмила и засмеялась, и он сам устыдился того, какие глупости приходят ему в голову. Современная женщина, возможно, даже метростроевка. Он видел однажды изумительно красивую женщину-метростроевку, чужую, к сожалению.</p><p class="p1">– Но ты свободна сейчас, я только это хочу спросить?</p><p class="p1">– Это кто же тебе скажет? – ответила она, останавливаясь, и сама поцеловала его. – Этого никто тебе не скажет. Ты вот думаешь, что ты свободен. Очень хорошо. Это очень может быть. А между тем ты не совсем свободен, это еще если говорить очень слабо.</p><p class="p1">Березину увиделся в этом намек на то, что он уже не совсем свободен от нее, и этому намеку страстно обрадовался. Они быстро спустились в город и отправились на летнюю эстраду, на которой фальшиво играл оркестр, а внизу так же фальшиво танцевали отдыхающие. Среди них отчетливо различимы были смуглые представители местного населения, вышедшие на охоту за бледными, робкими курортницами. Вокруг была сладостная пошлость курортной жизни, которую Березин за последние три года успел забыть, а сверху начали зажигаться мохнатые южные звезды. Поскольку несколько глубоких поцелуев уже случились, в танце Березин не проявлял агрессии. Напротив, он старался быть ненавязчив, как бы печально удален, словно между ними что-то уже случилось и оба они, заглянув в бездну, слегка грустят.</p><p class="p1">Людмила вдруг засмеялась.</p><p class="p1">– Что ты?</p><p class="p1">– А, ничего. Анекдот вспомнила.</p><p class="p1">– Расскажи.</p><p class="p1">– Да незачем.</p><p class="p1">– Ну интересно!</p><p class="p1">– Да ничего особенного. Ну, в общем, мужчина привел женщину к себе.</p><p class="p1">Это был уже прямой намек.</p><p class="p1">– Осенью, – уточнила она. – У моря синего.</p><p class="p1">– Да-да, – сказал Березин по возможности невозмутимо. – У синего моря.</p><p class="p1">– Привел, раздел, все такое. Ну знаешь, как обычно.</p><p class="p1">– Да.</p><p class="p1">– Ну вот. Смотрит, а головы у нее нету.</p><p class="p1">– Ну?</p><p class="p1">– Всё. Что, не смешно?</p><p class="p1">– Почему. – Он попытался спасти положение. Тут кончился медленный танец «Дождь над городом», возникла опять пауза, и вокруг почему-то стало совершенно тихо. Никто не хихикал, не взвизгивал, даже не чиркал спичкой.</p><p class="p1">– Вот если бы он ее раздел, а у нее этого нету… ну, понимаешь…</p><p class="p1">– Это было бы не смешно, – сказала она. – Ты не умеешь смешное рассказывать. Давай мне лучше про черную лестницу расскажи.</p><p class="p1">Тут Березин похолодел, потому что про черную лестницу – была история из его детства, которую он тысячу лет не вспоминал, как и многое другое. Примерно до двадцати двух лет вся его жизнь была не то чтобы под запретом, но не имела отношения к настоящей, и он старался не помнить про эти обстоятельства, не всегда веселые. Теперь Березин был атлет и яхтсмен, инженер, лично представленный вождям при открытии шестого шлюза, и отдыхал у моря. Ей никаким образом не могла быть известна история про черную лестницу, с которой приходили к гимназисту Березину самые страшные кошмары его детства, но, с другой стороны, – в каком же тогдашнем доме не было черной лестницы и кто же о ней не рассказывал детских сказок? Очень может быть, что и Людмила где-то росла в то же время, и было ей теперь, допустим, тридцать лет, и она вполне могла застать те лестницы.</p><p class="p1">– Послушай, – сказал он, – чего вспоминать, ну было и было. Теперь-то все хорошо?</p><p class="p1">– Теперь хорошо, – сказала она.</p><p class="p1">– И лестниц черных теперь нету.</p><p class="p1">– Ну, где-нибудь есть. Почему же нету. Никогда не знаешь, когда попадешь на черную лестницу.</p><p class="p1">– Вот сейчас и попадем, – решительно сказал Березин. – Пойдем, знаешь, ко мне, пожалуйста. Там как раз лестница к санаторию и сейчас темно.</p><p class="p1">– Это у тебя какой же санаторий? – спросила Людмила. Березин очень боялся, что она откажется, но она не отказывалась, только, похоже, тянула время.</p><p class="p1">– Карла Либкнехта.</p><p class="p1">– Карла Либкнехта убили, – сказала Людмила, словно только что про это вспомнила. – Его убила Роза Люксембург.</p><p class="p1">– Неправда, – попытался Березин пошутить еще раз. – Его убили Сакко и Ванцетти.</p><p class="p1">– Не так, – поправила Людмила очень серьезно. – Сакко и Ванцетти без вести пропали. Они пошли погулять, Сакко и его собака Ванцетти. Сакко домой не вернулся. Ванцетти долго тосковал, потом пошел его искать и тоже пропал. А около дома потом голову нашли.</p><p class="p1">– Чью?</p><p class="p1">– То-то и оно, что неизвестно, – сказала Людмила и посмотрела на него со странным вызовом. – А в санаторий я к тебе не пойду, еще чего. Меня туда не пустят, я там не записана.</p><p class="p1">– Я проведу, – уверенно сказал Березин.</p><p class="p1">– Вот еще, буду я там стоять и ждать, как ты на входе договариваешься. Ты иди на пляж, я к тебе туда приплыву.</p><p class="p1">Динамо, с облегчением подумал Березин. Она крутит динамо. Теперь он уже не хотел, чтобы она к нему приплыла, но добросовестно довел ее до входа на городской пляж, где в темноте вспыхивали огоньки папирос и слышался визгливый смех, без которого у пролетариата не обходились любовные игры, а потом пошел к себе на санаторный пляж, где так давно ее встретил. Чувства были странные. Березин хотел эту женщину, хотел ею обладать, думал о ней этими словами, но темная ночь вокруг казалась ему татарской, азиатской, он словно попал в другое измерение, куда-то в Туретчину, и эти все Людмилины шутки были ему непонятны. Он, разумеется, вспоминал ее большой податливый, понятливый рот, ее грудь под ситчиком, ее туманные глаза с непонятным и словно подначивающим выражением. Но то, что она в свои годы была одна, тоже выдавало в ней не совсем нормальную, и он поначалу боролся даже с соблазном уйти. А если она приплывет, куда платье денет? И потом, думал он, – а в темноте эта мысль была неожиданно убедительна, – он приведет ее в номер, она зайдет, положим, в душевую на этаже, вернется потом к нему, а головы у нее нету? Березин курил длинную «Сальве» и не чувствовал уже себя тридцативосьмилетним инженером. Тут послышался плеск, и вышел из воды ночной купальщик, темный длинный силуэт. Березин хоть и был близорук, различил, что это не она.</p><p class="p1">– Хороша водичка ночью! – сказал ему мосластый мужик с руками, как у гориллы, и прошел мимо. Совершенно не того ожидал Березин, и ему стало немного смешно. Не искупаться ли самому? Но почему-то он чувствовал обязанность ждать ее. Наконец, почти без плеска подплыла она, холодная, свежая. Березин обнял ее и устыдился своего страха.</p><p class="p1">– А платье где?</p><p class="p1">– Что тебе до платья? На берегу оставила.</p><p class="p1">– А как же…</p><p class="p1">– Никак же. Пойду в чем мать родила, будет про тебя разговоров в санатории.</p><p class="p1">Лихо, подумал он. Его несколько смущало, что все получилось слишком легко. Дежурная отсутствовала, так что они поднялись к нему на третий этаж без сучка без задоринки. У себя в номере зажигать свет не стал и стремительно сбросил рубашку, майку, белые летние брюки, потом помог Людмиле освободиться от сырого купальника и завернул в полотенце. Трусы по неустранимой мужской привычке он почему-то пока не снял. Эта мертвая, если она была действительно мертвая, была, конечно, холодна от воды, но очень горяча в прочих отношениях. Березин не помнил случая, чтобы его желания угадывались столь быстро. А угадывала она их потому, что да, да, разумеется… И в эту секунду он вспомнил все с той ясностью, какая наступала только в эти минуты, и именно ими он дорожил, потому что соображал так быстро лишь на яхте, когда она кренилась, или в любви, когда кренилась, так сказать, яхта его жизни: ну конечно, и только слишком долгой защитой, которую он сам себе выставил, это можно было объяснить.</p><p class="p1">– Аня, – прошептал он.</p><p class="p1">– Ах, вот оно как, – сказала она, очень довольная. – Значит, Аня. Вот, значит, как ее звали.</p><p class="p1">Березин этого почти не услышал, во всяком случае, не придал значения: стали наплывать картины забытой молодости, ленинградская девка пятнадцати лет, неизвестно откуда взявшаяся на его голову, грязная, красоты и прелести неописуемой, вероятно, из беспризорщины, хитрая, страшно притягательная, шантажировавшая его возрастом, угрожавшая доносом, бестрепетно выгнанная, вернувшаяся, люблю-не-могу, и ограбившая его в конце концов. Ни с кем ни до, ни после такой привязанности. Болезнь, наградила-таки. Страх бесплодия, намеки врача, что, возможно, обойдется… Но пока не заставил себя силой забыть, забыть совершенно, вычеркнуть начисто, – думал, что, явись она вдруг сейчас, он бросил бы всех и всё, сказала бы – бросил работу. Непостижимо. Только изредка наплывало, во сне, но даже во сне думал: искоренить. И вот теперь здесь. Этого не могло быть, конечно. Она давно погибла. Еще в двадцать шестом, когда пробовал искать, одна отвратительная девка сказала: «Анька ПРОПАЛА». Это не значило «погибла», но Березин тогда уже знал, что реальность не одна и она в нее, в другую, провалилась. Там была другая карта города, возможно, другая география: сказала же ему одна дрянь во время розысков, что искать надо на Соборной. Но в Ленинграде, в Петербурге, как он ни называйся, не было Соборной. И это «пропала» произносилось с особым значением. Березин сам иногда чувствовал, что ступит шаг – и попадет в другое место, предусмотренное, должно быть, новейшей физикой, которой сами физики не понимают.</p><p class="p1">И вот, значит, теперь… Сколько ей должно быть лет? Березин вгляделся, свет зажигать не хотелось: ей было сейчас двадцать восемь, вероятно. Может, под тридцать. Он вспомнил что-то из ее рассказов из прежней жизни, до революции, когда она была богатый ребенок, из беспризорщины, когда она спала в каких-то подвалах и воровала, из третьей жизни, уже воровской. Она успела побывать во всех слоях, и на высотах, и на дне, – вся жизнь была так устроена, что постоянно перемешивались слои. Он ведь тоже пережил всякое. Какое счастье, что его не пихнули в общую палату: ее бы некуда было привести. Но куда ее девать, что с ней делать? Теперь уж он, конечно, ее не отпустит, но какой она стала за это время? Еще раз вгляделся: конечно, она. Как можно было не узнать сразу? Многое в ней переменилось, но не этот треугольник рта, не эти разные брови. Запах был иной, но это понятно: запах был сейчас морской, йодистый, водорослевый, словно она всплыла из таких глубин, где одна гниль и беспамятство.</p><p class="p1">– Что же ты делала, где была? – спросил он самым тихим шепотом, хотя в комнате они были вдвоем и таиться было не от кого.</p><p class="p1">– Везде была, – сказала она печально. – И все гнали. Как-то не могут со мной люди, или это я не могу с людьми.</p><p class="p1">– Почему?</p><p class="p1">– Кто ж знает. Ты бы тоже прогнал.</p><p class="p1">– Никогда бы не прогнал. Ты сама знаешь.</p><p class="p1">– Ах, конечно, прогнал бы. Это тебе сейчас кажется. Давай спать.</p><p class="p1">– Погоди, какой сон… – Березин чувствовал, что голова тяжелеет, но заснуть сейчас… – Почему так, ведь должна же быть какая-то причина. У всего есть причина.</p><p class="p1">– Ну вот такое с вами со всеми от меня бывает. Как-то вы все вспоминаете, что не надо, и жить с этим потом не можете. Это хорошо еще, если я успеваю. А то не успеваю, тогда убили бы. Точно убили бы. Вот последний, я знаю, уж замахивался.</p><p class="p1">– Но почему? Что такое ты делаешь и как ты это делаешь?!</p><p class="p1">Все это был бред, разумеется, и если бы Березин слышал этот разговор, то уж точно принял бы их обоих за сумасшедших. Но теперь, с ней, в Алупке, в ночном санатории, он говорил то единственное, что нужно было, и она понимала все как надо.</p><p class="p1">– Тут чтобы жить, надо меня убить, – сказала она после молчания. – Все, ничего не скажу тебе больше.</p><p class="p1">– Но почему это так?</p><p class="p1">– Ну вот такое место. Кто меня не убьет, тот сам, знаешь… жить не будет.</p><p class="p1">– Как странно, – медленно проговорил Березин. – Какое удивительное место.</p><p class="p1">Он совсем уже засыпал, но вдруг резко вскинулся, как бывает в полусне.</p><p class="p1">– Но я тебя не убил! Я не убил!</p><p class="p1">– От тебя сама ушла, – усмехнулась она. – Успела.</p><p class="p1">И он с облегчением уронил голову ей на плечо, а когда проснулся утром, никого уже, конечно, не было. Он так и не узнал никогда, было ли что или с непривычки голову ему напекло.</p></span></span>
