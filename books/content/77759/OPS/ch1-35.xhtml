<p class="p">5</p>
</div><p class="p1">Город Портленд известен как самый зеленый в Америке, и в нем есть потухший вулкан. Немного на свете городов, в которых есть потухшие вулканы, и эта редкость сообщает Портленду особый характер: там охотнее всего приживаются люди с бурным прошлым и растительным настоящим. В Портленде хорошо жить ветеранам войн, престарелым писателям и артистам, красавицам, имеющим намерение превратиться в добродетельных матерей, и бандитам, которые раскаялись или просто считают, что им достаточно. Мэром города был ветеран империалистической войны Сэм Паттерсон, колумнистом «Орегона викли» – престарелый писатель Эд Гроуман, главной звездой местного театра – загадочная красотка Анна Нэй, в одиночестве растившая двенадцатилетнюю дочь Оллу, а владельцем лучшего кафе <em>«Robinson’s Island»</em> – почтенного возраста бандит Альфред Слоун, у которого и в самые сухие времена находилось не только «медицинское вино», но и превосходный ямайский ром с головой пьяного ниггера на этикетке. Да и в самом городе Портленде есть нечто от потухшего вулкана с характерным для него чувством, что мы славно пошумели, а теперь имеем право разводить свои розы, каковыми штат Орегон славится в особенности.</p><p class="p1">Дубаков ничего этого не знал, но почувствовал. Их встречал генерал с забавной фамилией Маршалл, подтянутый и очень длинный. Прибежали журналисты и с ними переводчик, странным образом природный русский человек, бежавший сюда, как оказалось, из Владивостока в конце Гражданской. Официальных наших пока не было – полпред ждал их в Сан-Франциско, советник оставался в Вашингтоне, инженера Амторга отправили в Сиэтл, а консула – в Нью-Йорк, где у него были вдобавок дела. Волчаку это не очень понравилось, он не любил в таких случаях оставаться без страховки, но положился на свою удачу. Их фотографировали у самолета, и благословенный теплый дождь с запахом океана изливался на них с густо-лилового американского неба.</p><p class="p1">Отсыпаться отвезли к Маршаллу. Оказывается, в Америке было лето. Этого нельзя было понять, ибо только что они пролетали там, где лета не было никогда; и вообще, портлендское лето было не чета нашему. В Портленде, объяснили им через русского переводчика (на которого Волчак продолжал смотреть настороженно), не бывает суровых зим, снег редок, а потому лето воспринимается не как счастье внезапно помилованного, а как чистый и бескорыстный дар, как естественная вещь, за которую не придется расплачиваться полгода спустя. Черты безвозмездного дарения были во всем. Маршалл был подозрительно добродушен, любезен, как всякий невоевавший генерал, – что естественно, ведь последняя гражданская война была тут семьдесят лет назад, и ему ни о чем не говорили слова «Боевые ночи Спасска, волочаевские дни».</p><p class="p1">Все было щедро той халявной щедростью, когда делятся не добытым с бою, не вырванным зубами, а избыточным, но в этом виделась особенная милота: нервы у всех троих были натянуты, и любой надрыв мог ранить. Они мгновенно запарились в теплых кожаных куртках, им принесли генеральские летние костюмы, оказавшиеся не впору, – Маршалл был худ и долговяз, а они все трое коренасты, более-менее втиснулся один Чернышев. Они засыпали уже в машине, головы их клонились; в пригороде внезапно запахло мокрой сиренью, и Дубаков подумал, есть ли на свете что лучше сочетания зеленого и лилового? Еще и небо висело какими-то лиловыми гроздьями – Дубаков словно и не был в этом небе и решил, что снизу оно лучше. Пахло оглушительно – сквозь сон Дубаков спросил себя, можно ли так сказать? Волчак бросил, что сирень пахнет не так, как-то искусственно, – уже спешил разоблачать.</p><p class="p1">Его вызвал к телефону полпред, дежуривший в Сан-Франциско, и Волчак в генеральских пижамных штанах – все другое не лезло – принялся докладывать: разрешено было долететь до Канады, мы сели в Штатах, теоретически могли бы и до Мексики… Не надо, не надо до Мексики, сказал Трояновский. В голосе его послышалась не очень хорошая усмешка, Волчак был чуток к таким вещам, но тогда не понял, а когда понял, ругал себя страшно: ах же я, садовая голова, куда сунулся с этой Мексикой?! Оно, конечно, мы теперь герои, дважды герои, совсем герои, а все-таки… После этого ему и второй звонок показался подозрительным по тону: он кинулся докладывать – его остановили. Говорил замнаркома обороны, брат железного наркома и главного транспортника; понятно, понятно, сказал он, слегка растягивая слова в подражание сталинскому акценту. Вы доложите, здоровы ли, нам главное – человеческий фактор. «Да нас хватило б и на обратный перелет!» – снова невпопад ответил Волчак и тут же кинулся уточнять: сразу же, сразу же! Да мы понимаем, что вы там не останетесь, сухо пошутил нарком. Вас тут очень ждут. И это тоже не понравилось Волчаку. Маршалл отвел их на второй этаж, в спальни детей. Дочь генерала была замужем и жила неподалеку, генеральский сын работал в Вашингтоне, по другую сторону страны. Их детские книжки, карнавальные маски и многочисленные фото из походов настраивали на идиллический лад. Чернышев успел устыдиться – а много ли я занимаюсь своими? тем ли я занимаюсь? – но Дубаков еще не обзавелся детьми, а Волчаку такие сомнения в принципе не были свойственны. Ему были свойственны другие сомнения: все ли я сделал так, почему они нас там ждут? И потому сон его был крепок, но тревожен. Проспали они всего пять часов.</p><p class="p1">За это время Москва выпустила приветственное сообщение. Там был слегка перевран маршрут – все-таки связи долго не было, приписали пару пунктов, над которыми они не летали, но в целом интонация была торжественная и ликующая: беспримерный, бесспорное, беспосадочный, небывалая, шестьдесят четыре часа, всенародно, единодушно, грядущее… В одночасье добрался до них, несмотря на грозу, Трояновский – самолеты из Сан-Франциско летали часто, до такого регулярного сообщения между, скажем, Ульяновском и Астраханью при таком же восьмисоткилометровом расстоянии было далеко, но, как сформулировал для себя Дубаков, тут уж что-нибудь одно: либо первыми в небывалом, либо заурядными в заурядном. Кто-то пути прокладывает, кто-то по ним ходит. Да, ребятки, натворили вы дел, вздохнул Трояновский, но взгляд его был лукав. «Что?» – вскинулся Волчак. Он никак не мог понять, герой он теперь окончательно или все еще в шатком статусе главной надежды. Да вот, пояснил Трояновский, Рузвельт вас приветствует. Вы забыли, что сегодня воскресенье? Не было случая, чтобы в этот день госчиновник выходил на работу, это и во время всех войн соблюдалось. Но Рузвельт и госсекретарь направили вам приветствие, читайте, завидуйте!</p><p class="p1">На лице Волчака впервые на дубаковской памяти мелькнуло выражение, которое потом почти не сходило, – «Знай наших!», но как бы от имени всего народа, хотя я и есть его предельное выражение, меня в воскресенье приветствует Рузвельт… то есть всех нас, но все-таки преимущественно меня.</p><p class="p1">К дому Маршалла сбежалась толпа. Волчак сказал речь: я родом с великой реки Волги, сказал он. Она… с чем бы сравнить ее? Она подобна великой реке Колумбии, хотя течет на другом континенте. Но они не мешают друг другу, втекая в Мировой океан. Так же и два наших великих народа, живя на разных континентах, не мешают, а помогают друг другу, как вот сейчас, и наш великий народ в нашем лице передает вашему, тоже великому, большой привет. Трояновский все это переводил, русскоязычный с его появлением куда-то испарился. Прямо вы прирожденный оратор, товарищ Василий, сказал Трояновский потом, когда Маршаллы накрыли им стол к вечернему чаю и деликатно удалились. Вы с удивительной точностью сказали именно то, что американцы хотели услышать. Но они люди с хваткой и уважают хватку – я хочу сказать это вам, всем троим, потому что разговаривать придется много. Это наша работа, дело дипломатов, но я тоже не всегда был дипломатом: я воевал в Маньчжурии, когда было надо, и учился торговать, когда стало надо. Я смею назвать президента – ну, не другом, конечно, но у нас приятельские отношения. И это именно потому, что я сразу дал ему понять. Мы должны, конечно, повторять, что две великие страны, и Мировой океан, и все такое… Но американцы немного любят загребать жар чужими руками, сидя здесь, за океаном, и не возражают, когда им об этом говорят. У них были все возможности опережать нас технологически и политически, но после перелета Линдберга мы не видим больших прорывов, и в нашем противостоянии самым черным европейским силам, вы понимаете, о чем я, мы тоже американцев не видим. Они хотят смотреть, кто кого, и потирать руки, так мы не должны противопоставлять этому, понимаете ли, чувства добрые и абстрактный пацифизм. Они первые нас не будут уважать.</p><p class="p1">Секунду, сказал Чернышев, который готовился тщательнее других именно к разговорам по американской истории. Прорывов нет, но мы не можем упускать, что сама идея трансарктического полета… Уилл Пост, человек во всех отношениях достойный… Уайли, поправил Трояновский, он называл себя Уайли. Да, это был достойный летчик. Начать с того, что в молодости он был шахтером, потом освоил пилотаж, ну, вы знаете, как это здесь. У нас авиация – государственное дело, а здесь одаренный человек, можно сказать самородок, должен был работать воздушным акробатом в группе парашютистов, взорвалось топливо, он лишился левого глаза… Ему пришлось наниматься личным пилотом к Пауэллу Бриско, это оклахомский миллионер, нефтяник… Вот хоть вы, Василий, сравните две судьбы – очень показательно: вы работали испытателем на главном государственном заводе, к вашим услугам была любая техника («Скорей мы к ее услугам», – подумал Дубаков, но вслух, понятно, не сказал), а Уайли летал на самолете, который купил ему этот нефтяник. Пост назвал самолет «Уинни Мэй» – в честь своей дочери; кстати, надо бы узнать, как она там: после его гибели семья бедствует. Он дважды прилетал в Москву во время своих кругосветок, но это ведь был цирк, развлечение для газетчиков – одиннадцать остановок, у нас это сделал бы любой грамотный летчик. Потом он задумал доказать, что возможна постоянная линия русско-американских полетов. Но вы же знаете, грамотные: тут депрессия, какой не было больше ста лет, а может быть, и никогда не было. Пост на собственные средства собрал гидроплан, пригласил с собой актера одного, к слову, наполовину индейца. Нормальных взглядов человек, но тоже миллионов не стяжал: простой американец, хотя бы и самый талантливый, никогда не выйдет в первый эшелон. Этот парень, Роджерс, постарше, – мой ровесник, кстати, – все актерские гонорары вложил в постройку их самолета. Но это же было собрано кустарно, и они погибли. Долетели до Камчатки, заблудились, приземлились на озере, спросили местных жителей, где они, – и на взлете рухнули в озеро. Шум был, конечно, но здесь все забывается на другой день из-за новой сенсации… Трояновский помолчал, как бы почтив память прогрессивных, но неудачливых ребят.</p><p class="p1">– Поэтому великий народ и все такое и у нас радостный повод, – продолжал он, – но не надо упускать, во-первых, что это мы им показали, а не они нам. С американской революции прошло сто пятьдесят лет, а с нашей – двадцать, им все помогали, нам все мешали, и тем не менее это мы перелетели Северный полюс к ним, а не они к нам. У них, несомненно, есть такие машины, но мы сомневаемся, что у них есть такие пилоты. Во-вторых, историческая миссия России всегда была что? – спасать весь мир от захватчика, стоять стеной на пути любых варваров, в русском желудке, как говорится, еж перепреет, это можно процитировать, они любят пословицы…</p><p class="p1">– А вы можете это перевести? – живо среагировал Волчак.</p><p class="p1">– О, я теперь что хотите могу перевести, шесть лет тут безвылазно. <em>Russian stomach will digest a porcupine,</em> тут дикобраз понятней ежа, а впрочем, можно и <em>skunk</em>, скунс, зверь такой вонючий, даже смешней… Так вот, – Трояновский посерьезнел, – мы хотели бы напомнить, что, пока Америка вырезала местное население и расхищала его богатства, Россия практически в одиночестве стояла на пути Чингисхана, Россия выдерживала натиск европейского рыцарства, Россия никогда не нападала первой, но защищалась так, что агрессор драпал до ближайшего моря, где и тонул. Америка всегда была защищена двумя океанами – России было некуда бежать, она в центре континента, под ударами с востока и запада, и Советская Россия продолжает эту линию. И надо подчеркнуть, что, пока они жирели, мы погибали. Это и уместно, и логично. Американцы гордятся своей историей и любят, когда другие гордятся своей. Это не инструктаж, я ничему не могу учить людей, которые перелетели сюда из Москвы без посадки. Это подумать страшно! Я, когда бежал из Вельского, такое есть село в Енисейской губернии, мечтал: мне бы хоть верст тридцать пролететь, там-то меня уже не догонишь. Тридцать лет прошло – и что мы видим? Так что, товарищи, в таком духе. Вот увидите, Америка вас полюбит.</p><p class="p1">И Дубаков воспринял эту беседу как неизбежность, Чернышев усиленно кивал, но, кажется, понимал, что все это игры, а Волчак проникся всерьез. Теперь не было случая, чтобы он не поминал несчастного Уайли Поста и не подчеркивал государственную заботу о советских летчиках. Это было и хорошо, и честно, и благородно, а все же выходило несколько искусственно. Волчака начали раздражать американские манеры – например, освистывать героев: ему пришлось привыкать к тому, что это восхищение, а все же выглядело некультурно. Интонации у него появились новые – унижение паче гордости.</p><p class="p1">– Да что ж, мы понимаем, – отвечал он на вопросы о том, как это Россия так быстро преодолела десятилетия, отделявшие ее от передового Запада. – Мы что ж, – и Волчак несколько нарочито окал, – разве мы без понятия? Мы прощения просим, что первые к вам прилетели. Это вы должны были, но у вас, вишь, не получилось, так что пришлось уж нам, лапотным…</p><p class="p1">Трояновский, задумавшись, перевел это как <em>unpo-lished</em> и был одобрен взрывом добродушного смеха; американцы положительно не желали обижаться. Они легко, охотно признавали советский приоритет; они без всякого юродства каялись в отставании, ругали свою депрессию, из которой вроде как выползали, но советских принимали по первому разряду – странная выходила нищета. Королевы красоты вручали им розовые гирлянды – Волчак не одобрил идею конкурсов красоты. Ему казалось странным, что его везде встречают газетчики и почти нигде – американские рабочие. Он уже рисовал себе встречу с пролетариями, которых он разагитировал бы и, глядишь, поднял на восстание, как марсиан в книге про Аэлиту, он знал за собой эту способность – поднимать массы, вести их на великое дело. Но рабочие странным образом прятались, а коммунистическая партия помахала им флагом всего один раз – на встрече в Сан-Франциско, и людей под флагом было маловато. Трояновский пояснил, что Калифорния – богатый штат, золотой миллион, вот в Нью-Йорке они увидят настоящую бедноту. Волчаку не нравилась Калифорния и быстро надоела газетная слава. Симпатию вызвала у него всего одна героиня, и то пропавшая.</p><p class="p1">Когда наши герои прилетели в Сан-Франциско, им сказали, что именно отсюда год назад стартовала легендарная Амелия, звезда американского пилотажа, первая женщина, перелетевшая Атлантику. Но ах, о ней надо рассказывать отдельно… Они сидели в роскошном, совершенно пустом аэроклубе. Тут Амелии был посвящен целый зал, но посетители не толпились – кому здесь нужны герои на другой день после смерти или подвига? Быстрее, быстрее, вперед, за новизной. Президент ассоциации пилотов Калифорнии Тод Дэвис рассказывал, а Трояновский серьезно, без комментариев переводил.</p></span></span>
