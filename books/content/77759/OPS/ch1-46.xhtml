</div><p class="p1">Невыносимей всего был февраль, когда команда начала видеть призраков. Санный поход Ладыгина не состоялся, хотя подготовкой к нему он тешил себя недели две: задул резкий ветер, похолодало до минус сорока, отложили. Как ни странно, в марте все прекратилось, хотя понятия «весна» в окрестностях полюса не бывает; может, короткие прояснения, предвещающие полярный день, играют решающую роль. Призраки были двух видов: человеческие и нечеловеческие. Бровман, который призраков не видел, – возможно, потому, что слишком мало был на корабле, хотя бывает же коллективное, индуцированное безумие, – вывел свою классификацию: те, кто попроще, видят людей, причем чаще всего реальных, а те, кто склонен к абстрактному мышлению, видят абстракции, то есть сущности. Ничего нового: Нансен видел, Франклин видел, а Беллинсгаузен, по слухам, пережил нечто такое, о чем поклялся не рассказывать никому, то есть тоже видел. Кочегар Машин видел ребенка лет пяти, но больного, не умеющего говорить; ребенок был явно чукотского племени, одетый в желтую шубку, очень тревожен, но чем была вызвана его тревога, собственным ли состоянием или неким невыразимым тайным знанием, Машин сказать не мог. Боцман Сивуш видел самое странное: ему привиделся, причем с необыкновенной отчетливостью, страшно истощенный старик с двумя алюминиевыми зеркалами. Любопытно, что старик был, собственно, не старик, а просто рано поседевший, буквально умирающий от голода ученый, на все расспросы отвечавший, что он ненадолго. У меня только три дня, говорил ученый, потом я должен вернуться. Он пытался объяснить боцману, каким образом два алюминиевых зеркала помогают ему перемещаться во времени; что до странного места, то ученый несколько промахнулся. Попытка к бегству, объяснял он. Фамилия его была Трумпф, по-немецки «козырь». Ужасно, говорил он, я думал попасть в тепло, а у вас тут… неужели в будущем везде так? Сивуш его уверил, что не везде. Незнакомец ел очень мало, да с голодухи ему и нельзя было объедаться; время, пояснил он Сивушу, та же материя, при отражении в алюминиевом зеркале меняется его ход, Кондратьев бы понял, но где теперь Кондратьев? Если увидитесь, спросите, он вам объяснит. На третий день человек с зеркалами исчез, а супу съел слишком мало, чтобы его присутствие сделалось достоверным, и боцман не был уверен в его реальности. Но человек сказал: «Причинность – еще не все!» – и боцман на любые непонятные ситуации, каких много теперь было в его жизни, отныне реагировал этим афоризмом. Трофимов, даром что помполит и сугубый материалист, видел пропавшего летчика, канадца: канадец по-французски сообщил ему, что живет теперь здесь и ни в чем не нуждается; вообще, полярные области служат пристанищем многим полярным исследователям, причем те, кто жил праведно, попадают на Северный полюс, а грешники – на Южный. Радист Столбовой видел на вахте некую полярную медузу, которая висела над ним в небе и передала ему знание. Суть знания Столбовой передать не мог, но сказал, что оно бесконечно больше любых вопросов и ответов; теперь он может отвечать на любые вопросы экипажа, если, конечно, они окажутся в пределах компетенции медузы. Столбовой был такой человек, что не всегда было понятно, шутит он или нет. Ладыгин, желая шуткой же прервать идеалистический разговор, спросил: вернемся ли мы на землю в этом году? Да, кивнул радист, и раньше, чем предполагаем. Вернемся на «Седове» или иным путем? На «Седове», подтвердил медиум – впрочем, всякий радист всегда медиум и наоборот. «А руль?» – уточнил Курляндцев. Руль исправим при помощи льда, как он сломался льдом, так и исправится. Все засмеялись, и медуза была посрамлена; а напрасно, потому что все она предсказала верно, просто сбылось это предсказание в мае.</p><p class="p1">До мая много еще чего было – несколько болезненных сжатий, одно из которых, казалось, раздавит корабль, как яичную скорлупку, и Ладыгин сказал уже готовиться к высадке, но обошлось. Бровман тогда натерпелся панического страху, но держался, кажется, достойно. К Восемнадцатому съезду Ладыгин рапортовал об измерении глубины – оказалось, под ними четыре с половиной километра; это было первое измерение глубины за 87-й параллелью в истории полярных плаваний. В начале мая их выперло метра на полтора, и руль, доселе обследованный лишь водолазами, стал хорошо виден: он был погнут невообразимой силой – при толщине сорок пять миллиметров так изуродовать сталь мог лишь страшный удар, и выправить руль было нечем. Тогда Ладыгин вспомнил старый план, неосуществимый год назад, – отрезать изогнутую часть руля; половина прямого руля хуже, чем целый, но лучше, чем гнутый. Боцман Сивуш предложил высверлить ряд отверстий посередине руля, а потом отрубать гнутую часть по этой линии. Три дня и две ночи сверлили руль; ручная дрель не справлялась, электрическая от ветрового двигателя работала еле-еле, дыр нужно было порядка сотни. Бровман попробовал и убедился, как это трудно, – вдобавок началось таяние, все стояли по колено в ледяной воде. На третью ночь нижнюю часть руля откололи зубилами, и руль стал поворачиваться – сначала на пять градусов, потом на десять. Папанин, утвержденный в эти дни начальником Главсевморпути, прислал им поздравления. «Седов» теперь мог выходить без буксира, хотя путь ему все равно должен был прокалывать ледокол помощней. К августу они покрасили корабль, научившись готовить олифу из постного масла (оказалось, что варить его надо строго четырнадцать часов). Дрейф ускорился – их стремительно сносило на юг, за июнь они сделали порядка ста миль. Мысли уже приходили всем одновременно, возникали как поветрия, – и слово «август» буквально висело в воздухе. Третьей зимовки они могли не вынести: доктор удалил за два года больше тридцати зубов, в том числе один свой, и всем без исключения диагностировал неврастению.</p><p class="p1">Бровман хоть и участвовал в починке руля и покраске корпуса наравне с остальными, успел продумать множество мыслей, которые нипочем не явились бы ему в Москве. Он скучал по жене, но по работе не скучал совершенно. Это было странно. В Москве он жил в бешеном ритме, успевая за день взять до трех интервью и по двум из них отписаться, а здесь как бы увидел основу всей этой суеты, то, что было под ней, ледовый щит, на котором все покоилось; летом щит уходил в глубину, зимой проступал, и Бровману стало спокойней. Здесь у него было достаточно времени, чтобы понять: никаких романов ему писать не надо, потому что никакие романы на фоне полярного льда не имеют цены. Основа жизни была здесь, и в этой жизни имеют смысл свежая вода, которую топили из снега и старого, так называемого голубого льда, и консервы, которых, слава богу, завезли достаточно. Имеют значение тулупы и ватные штаны. Романы же казались фальшивы, непонятно было, зачем описывать труд и любовь в средней полосе. Здесь, конечно, не было ни труда, ни любви, а только периодические собрания и радиограммы, но в средней полосе и любовь, и труд были весьма средними, существующими как бы из милости, пока не прижало. На Севере писать было не о чем, а в средней полосе незачем. На Севере, разумеется, возможно было искусство – музыка или живопись, мечтал же Нансен об аккордах, которые выразили бы многоступенчатый, от синего до звездно-белого, слоистый лед. Но ни к живописи, ни к музыке Бровман способностей не имел и решил, что в Москве, если в тамошней суете будет досуг, непременно займется хотя бы графикой.</p><p class="p1">Он посетил несколько занятий по истории, которые вел доктор Батагов. После этих занятий у Бровмана выходило, что Советский Союз осуществлял две заветные мечты человечества. Он достиг всех полюсов, максимальных высот и глубин, но только для того, чтобы доказать: на полюсе жить нельзя. Точно так же для этой цели СССР построил общество, о котором вечно мечтало человечество, к которому стремились, смертельно рискуя, лучшие умы, только чтобы доказать, что это общество нежизнеспособно, и после того, как оно построено, делать в нем нечего. Советский Союз сделал больше, чем можно, а смысл жизни состоит в том, чтобы делать меньше. Но этими мыслями Бровман не делился ни с кем, а по возвращении на Большую землю забыл. Они померкли, как меркнут полярные звезды с наступлением бесконечного дня. Да и не следовало Бровману вести подобные разговоры. Перед самым отлетом, получая инструкции от Мазура, он выслушал еще одну просьбу: прислушиваться к разговорам. Мало ли, сказал Мазур, в условиях полярной зимовки люди теряют политическую бдительность. В ходе дрейфа они с большой вероятностью окажутся в территориальных водах Норвегии. Не исключены инциденты. Лучше, если об этих разговорах будешь знать только ты и впоследствии я. Хорошо, пожал плечами Бровман, то есть не «хорошо», а «есть». Но разговоров не было, они словно вымораживались; да и не о чем было говорить после таких нагрузок. Даже сны не снились, а про жену Бровман вспоминал только во время коротких сеансов голосовой связи с Москвой, и сказала она ему только одну действительно важную фразу, условную. Эту фразу он принял к сведению, в Москве она подтвердилась, и он лишний раз подумал: спасибо Мазуру. Есть еще места, где можно укрыться, – например, полюс.</p><p class="p1">А в августе к ним пообещали выслать ледокол «Иосиф Сталин», и Ладыгин встретил это известие настоящим нервным припадком: теперь, когда освобождение от ледового плена было так близко и в него опять поверили все, он живо представил разнос, которому его подвергнут в Москве и Архангельске по бесчисленным поводам. Но тут подоспело спасение: ему предложили баллотироваться в депутаты Мурманского облсовета. Ладыгин ответил обстоятельной радиограммой: готов, мол. Но через два дня рабочие машиностроительного завода Ростокинского района Москвы предложили ему баллотироваться в Моссовет! Голова у Ладыгина закружилась: как так? Такой вихрь событий после двух лет без всяких событий, в одних трудах… Что ж, разорваться? Ведь ему дали квартиру в Москве, а может, там дадут и работу… Но доверие Мурманска… Что делать? Как быть? Мурманск – доверие, ответственность; Москва – ответственность, доверие… Стоп, мать моя Арктика, сказал он себе, и мир вокруг начал проявляться, как фотография. С этой неврастенией, товарищи, следовало что-то делать. И Ладыгин надиктовал радиограмму в политуправление Севморпути, ему ответили: полагаем, что, приняв оба предложения, поступите правильно. Сам он рассудил так же: ведь был я одновременно и на Большой земле, и здесь, они нам писали про наше незримое присутствие, и «Полярная правда», и «Пионерская правда»; потом, депутат – это главный сейчас человек, главное завоевание нашей Конституции, то есть по крайней мере арестуют не сразу. Подумал так и успокоился. А через неделю события побежали совсем стремительно: новое ледовое сжатие оказалось столь сильным, что Ладыгин в пятый раз за зиму приготовился выселяться на лед; отдал уже команду готовиться к авралу, под ураганным снегопадом стоял на мостике и смотрел, как движется прямо на него ледовый вал, пытался ему как-то радировать, что он, Ладыгин, дважды депутат, трогать его нельзя, – и большевистская воля оказалась сильней природы: гигантская трещина прошла вдоль борта, «Седова» накренило на пять градусов, и все замерло. В это самое мгновение радист принял срочное из Москвы: сообщить размеры всех членов экипажа для пошива парадной формы. Ах, мать моя Арктика. Но ледокол «Иосиф Сталин» на другой день вышел из мурманского порта, и это значило, что теперь уж ничто не помешает. На «Сталине» шел Папанин: это означало высший уровень встречи и исключительную важность всего события.</p><p class="p1">Ах, будто не знал Ладыгин Арктики! Ледокол попал в десятибалльный шторм в Баренцевом море. Как назло, взошла багровая, прямо-таки вишневая луна, давно такой не было, – и что она предвещала? Предвещала она, как выяснилось, стремительный захват Польши. Экипаж с восторгом прослушал чеканную речь Молотова. Правительство Польши объявлено было более не существующим. По всему миру пошли сжатия, и на секунду Ладыгину стало страшно возвращаться в этот штормящий мир, но это была минутная слабость, и прогнал он ее чифирем. Теперь в этом можно признаться: на судне, разумеется, был и коньяк, но Ладыгин ненавидел пьянство тяжелой ненавистью пермского уроженца, навидавшегося пьяных окраин. Чифирь же успокаивал душу, и прибегал Ладыгин к нему нередко. Их дрейф ускорялся, наступала настоящая лихорадка, слишком знакомая всем полярникам, которых несет на юг или снимают с льдины; даже Бровману, не полярнику, передавалось это ужасное беспокойство.</p><p class="p1">Наконец удалось организовать голосовую связь с ледоколом – за сто тридцать миль донесся голос Папанина. Он долго поздравлял, потом буднично сказал: тут вам наготовили подарков… везем апельсины, мандарины… да… свежие огурцы… помидоры… банан! У Ладыгина полярным сжатием сдавило сердце: значит, опять зимовать, точно. Выгрузят лимоны, помидоры, банан – и до свидания, мы верим в вас, товарищи! Но Папанин дал слово Белоусову, наставнику Ладыгина еще по ледоколу «Красин»: Ладыгин, сказал он, Костя, здоро́во! Мы вас вытащим, товарищи, примем по баночке! Рядом с Ладыгиным послышался хриплый лай – это зарыдал Трофимов, совсем сдавший в последнее время. «Что у вас там?» – спросил сердито Папанин. Это помехи, сказал Ладыгин, не обращайте внимания, – и погрозил Трофимову кулаком.</p><p class="p1">Огни ледокола стали видны через две недели. Голубой прожектор ощупывал льды вокруг «Седова». Ледокол шел со скоростью две мили в час, взрывая толстенные льдины, грохоча, рыча; сладостная эта музыка была слышна миль за пять. На «Седове» запустили машину, чтобы встретить гостей во всеоружии; было это похоже на одноногого инвалида, пытающегося встать с койки и откозырять при посещении Его Величества. Руль свободно ходил на тридцать градусов влево и пятнадцать – вправо, для следования в кильватере ледокола этого было с лихвой. Сейчас, братки, орал в радиорубке Папанин, сейчас! И надо же было Ладыгину совершить тут ужасную непоправимую ошибку: ему крикнули, что по левому борту медведи. Ладыгин выскочил под ледяной ветер в одном свитере и действительно увидел медведицу с двумя медвежатами, и захотелось ему привезти медвежат в Московский зоопарк, это будет вовсе уж триумф! Следовало, конечно, пожалеть медведицу по случаю спасения «Седова», но Ладыгин совершенно не владел собой, побежал за ружьем, крикнул Курляндцеву, чтоб ловил медвежат, – знал, они обычно не отходят от матери; бах! – уложил с первого выстрела, прямо меж ушей, удачно вышло, да и как было промазать: на «Седове» включили все освещение. Медвежата подошли к медведице и стали ее нюхать. «Лови!» – заорал Ладыгин, но они вдруг брызнули двумя белыми пятнами в темноту, никогда он не видел, чтобы детеныши так быстро бегали, и тут же исчезли. Зря, выходит, мать убил. Ну ничего, будут медвежьи отбивные, угостят фирменным блюдом Папанина, писал же он где-то, что вкусней белого медведя ничего не едал. Но Папанин к ним в ту ночь не пробился, не пробился и в следующую, и чтобы свежее мясо не пропадало, медвежьи отбивные пришлось есть самим. А на третью ночь, когда ледокол, блокированный льдами, стоял неподвижно, к «Седову» подходил огромный, судя по следам, медведь – вероятно, отец тех медвежат; а впрочем, разве они живут семьями? Надо бы почитать… Но образ этого одинокого мстителя, которого никто не видел, не понравился Ладыгину, напугал Ладыгина, вызвал у Ладыгина еще один приступ бешеного сердцебиения; я так совсем тронусь умом, подумал он. Часто ему в жизни вспоминался тот медведь, и дорого бы он отдал, чтобы отмотать время и не убивать ту медведицу. Но она бы его тоже не пощадила, доведись им встретиться на льду, да если еще с безоружным человеком… Арктика, отставить сантименты.</p><p class="p1">Дальше случился парадокс, без которого полярная эпопея не получила бы достойного завершения, Бровман отразил его в брошюре: ледокол «Иосиф Сталин» стоял, словно это он дрейфовал два года, а «Седов» вольно кружился в огромном образовавшемся разводье, и непонятно было, кому кого спасать. Близок локоть! Они стояли друг напротив друга, «Седов» крутился, «Сталин» ждал. Уже прошел в Москве праздничный концерт по поводу их встречи, уже приветствовала мужа со сцены жена – слезы у Ладыгина выступили, когда он услышал ее срывающийся голос, и непразднично было у нее на душе, вся тоска этих двух лет звенела в ее словах, а дело не двигалось, не двигалось! Три дня крошился лед вокруг ледокола, пока наконец радировали оттуда: «Атакуем вас зажгите лампу грот мачте». На «Сталине» принялись пускать разноцветные ракеты. То был салют. «Да здравствует Сталин!» – орали на «Седове» и ледоколе, не разбирая, ледокол ли имеется в виду или Сам. Два прожектора уперлись друг в друга. Ефремов потерял сознание, Батагов тер ему виски спиртом, с ледокола бросили швартовы. Бровман узнал на правом борту ледокола конкурента своего, Квята, который, конечно, поспел сюда первым. Но ничего, Бровман его опередил: Квят только приехал, а Бровман уже тут.</p><p class="p1">– Надо вахтенного сменить, – сказал Сивуш Ладыгину.</p><p class="p1">– Не сменить, а снять, – сказал Ладыгин сипло и поцеловал Сивуша куда-то в усы. – Вольно, боцман. Дрейф кончился.</p><p class="p1">Но боцман взглянул на него сурово, и Ладыгин понял: порядок есть порядок, на всяком судне в рейсе положено нести вахту.</p><p class="p1">– Поставьте Курляндцева, – сказал он и мысленно записал боцмана на денежное поощрение.</p></span><span id="id80"><div class="title6">
<p class="p">9</p>
</div><p class="p1">Но долго праздновать им не дали: составили акт о готовности «Седова» к плаванию, акт оказался терпимым, много лучше, чем предполагал Ладыгин, но страху он натерпелся, и, пожалуй, не меньшего, чем при сжатии. Сжалось буквально все. Носовой кубрик был для жилья непригоден по причине употребления обшивки на растопку, переборки в помещении комсостава пошли туда же, холодильники неудовлетворительны, брашпиль менять, капитальный ремонт по прибытии, но для двух с лишним лет зимовки – более чем! В конце концов, весь экипаж тоже нуждался в капитальном ремонте, но если бы «Сталин», поделившись припасами, завтра отвалил и оставил их на третью зиму – сдюжили бы; по крайней мере, так казалось теперь. Только фруктов Ладыгин больше не ел, апельсин так и таскал в кармане ватника – пахнет, и достаточно.</p><p class="p1">На второй день похода «Седов» вышел в чистую воду, началась качка, корабль плохо слушался руля – Ладыгин передал Папанину: стопоримся. В чем дело?! Руль, товарищ Папанин… все-таки не совсем… Значит, рявкнул Папанин, у вас не судно, а баржа! Это было прекрасным холодным душем – и качка, и этот рык: пора было привыкать к норме, а морская норма – это когда рычат и качает. Разумеется, Ладыгин разобрался: руль стоял в положении «влево», а указатель показывал «прямо», это они недоглядели, когда сращивали штуртрос. Он доложил, Папанин в своей манере ответил длинной тирадой, которая для Ладыгина звучала музыкой: когда Папанин ругался – значило, что оттаивает. Хуже всего было, когда молчал. Хоть и с половиной руля, а шли они бодро и сами, никто не тащил их на буксире, сбывалось предсказание медузы. Ладыгин посмотрел в небо, ища медузу, но там висела сплошная серая муть.</p><p class="p1">Две недели шли до Мурманска. Отсюда их поездом везли в Москву. Москва встречала таким холодом, что арктический показался мягче: там, в конце концов, и бог велел, – здесь же минус тридцать с лишним воспринимался как патология, хотя Папанин и приговаривал, что это нормальная московская зима. На встрече со Сталиным в Кремле Бровман впервые заметил, что вождю как бы не до того: он принимал седовцев с прежним радушием, детально расспрашивал каждого о семье – ему, отцу-одиночке, важно было, как обстоят дела у женатых и когда женятся холостые; пригласили и эвакуированных; лица у них были виноватые, как бы вогнутые, но и им дали по «Красной Звезде», тогда как пятнадцати продержавшимся – предсказанного Героя. Сталин в первом тосте повинился: да, товарищи, не смогли обеспечить в тридцать седьмом правильные маршруты, недосмотрели на Севморпути, весь ледокольный флот зазимовал, то есть вообще весь! Какая-нибудь Норвегия уже была бы парализована (все усмехнулись), какая-нибудь Дания расстреляла бы все свое руководство (засмеялись в голос), а мы прекрасно зазимовали! Я предлагаю, товарищи, рассмотреть и зимовку на Южном полюсе, мы, южане, считаем, что это зона наших исконных интересов… Но за всем этим Бровман чувствовал неестественность: Сталину было неинтересно, он думал о главном, главным была война. Она уже шла. Печать ее лежала на всем.</p><p class="p1">Это невозможно было объяснить, но Бровман на то и был журналистом, чтобы чувствовать событие, пока оно не произошло. После зимовки чутье это еще обострилось, мозг изголодался и теперь стремительно перерабатывал всю новую информацию, которой не было в газетах и о которой по газетам можно было догадаться. Пока Бровман куковал во льдах, исчезли Корнилов, Савин, Рыбаков переехал в Сталинград, но с таким понижением – на газету тракторного завода, что дальнейшая его судьба была ясна. Многих вообще просеяли, об этом и была их с женой кодовая фраза: «Давно с друзьями не вижусь», – и Бровман почти с любовью оглядел тогда убогую рубку «Седова». Пока он в той рубке отправлял корреспонденции, здесь тоже была рубка, неясного, правда, назначения. Новых рекордов не было, да и некому было их ставить. Бровман не стал звонить Канделю, не хотел навязываться, но Кандель сам его вызвонил в гости, и Бровман пошел – как обычно, без жены, потому что хотелось серьезно расспросить о многом. Кандель как будто похудел, никаких медвежьих объятий, аккуратное рукопожатие. Улыбался хитро, словно зная тайну, подкидывал могучего ребенка. Расспрашивать не стал – представлял себе, что они там должны были переживать, сжатые смертельной ледовой скукой, но и здесь теперь тоже было сжатие.</p><p class="p1">– А я соскочил, – сказал Кандель, и после этой фразы, словно по сигналу, Варя вышла в комнату и оставила их в кухне: надымили, черти, сказала она, и Бровман понял, что она не хочет мешать разговору.</p><p class="p1">– Как соскочил?</p><p class="p1">– А вот так, ты же помнишь: говорил я тебе, что я следующий. А теперь все, теперь я по другому делу.</p><p class="p1">– Да как же?</p><p class="p1">– Да вот так же: испытывать буду, но больше тренирую вояк. Бомбардировщик – он не для рекордов, он грузы таскает. Поначалу я, знаешь, тоже их настраивал брать побольше, ну и разбились двое, слава богу, не насмерть. Кончились рекорды, Бро, пошла жизнь. И здесь я, может быть, еще уцелею.</p><p class="p1">– Стало быть, война? – в упор переспросил Бровман.</p><p class="p1">– А то ты не знал.</p><p class="p1">– Знал, почему же. Но очень не хочется.</p><p class="p1">– Никому не хочется, – кивнул Кандель. – Но она будет, и давно надо было готовиться. Вот они и готовились, а эти все наши игры – это так, крем на торте.</p><p class="p1">Бровман понял, о каких играх речь. Все, о чем он писал, тоже, значит, нужно было только для войны, и он в принципе догадывался об этом, да никто и не скрывал. Но Волчак, и Грибова, и Грин – все они летали для чего-то другого, и до поры им давали летать, и все это было прекрасно; но теперь освоение дальних рубежей никому не было нужно. В конце концов, они действительно сделали что могли и погибли почти поголовно, обозначив предел своих возможностей. После этого могла быть только война. Можно было или улететь, как Гриневицкий, или пойти инструктором к воякам, как Кандель. Теперь нужны были другие герои, рекорды от них не требовались.</p><p class="p1">– Зато жизнь, – сказал Кандель. – Был праздник, хотя и не без такого, знаешь, адского оттенка. Такой карнавал у черта на гулянках. А стала жизнь, солоноватая, сероватая, но уж какая есть. И кстати, шанс выжить несколько больше. Прости, я был ужасен. Но поставь себя на мое место. Бро, ты пересидел там во льдах самое плохое. Ты несколько подморозился, законсервировался, в тебе все еще сидит такой, знаешь, страстный репортер. А сейчас чемпионом будет не тот, кто все разузнает и расскажет раньше всех. Сейчас чемпионом, наоборот, будет тот, кто наиболее значительно промолчит. Мы все ужасно торопились, понимаешь?</p><p class="p1">– Мы все хотели больше, а надо было меньше, – вспомнил Бровман свою полярную мысль.</p><p class="p1">– Именно! – сказал Кандель и улыбнулся новой своей улыбкой, гораздо более смиренной. – Именно, Бро! Кто просидел во льдах август тридцать девятого года, тот, кажется, многого не понимает. Но ты как-то понял, я всегда знал, что ты номер первый. Ты Бровман, я Канделаки, оба мы Паганини.</p><p class="p1">После этого разговора Бровман решил воспользоваться положенным ему полярным отпуском и поехал с женой в Крым. Сима заслужила, мало счастья видела она от него. Они поселились в гурзуфском военном санатории. Каждое утро Бровман отстукивал на машинке положенную порцию «Ледового дневника», где переплетались его заметки, биография Ладыгина и разговоры с доктором. Потом они шли обедать на веранду, смотрели на седое море в мелких барашках, дышали сырым йодистым воздухом, в котором пахло настоящим морем, а не Ледовитым океаном. Бровман даже пару раз окунулся при пяти градусах, но море казалось грязным, чересчур живым, в отличие от Арктики. Правда, Арктика была тоже не ахти какая чистая: когда вокруг «Седова» начало оттаивать, такое полезло из-подо льда, что лучше бы и дальше мерзло. Крым подходит для прощаний, не зря тут все со всеми прощаются, и Бровман тоже прощался с чем-то. Глядя на дальний мыс, затянутый теплым мягким дождем, он понимал, что уходит нечто главное, нечто единственное, чем он жил, но что же, ничего страшного, все когда-нибудь уходит.</p><p class="p1">– Сима, – сказал он вдруг жене, когда они сидели на балконе и ели местный несоленый сыр, которым торговал татарин на набережной. – Сима, хоть ты не оставляй меня.</p><p class="p1">– Да куда денусь, – сказала Сима с той грустно-веселой интонацией, которую Бровман любил. Он сам не понимал, что кончилось, но книгу дописывал уже как ненужную – просто чтобы была.</p></span><span id="id81"><div class="title6">
<p class="p">10</p>
</div><p class="p1">Незадолго до отъезда он пошел прогуляться вдоль моря и увидел женщину лет тридцати, темноволосую, коротко стриженную, то ли очень красивую, то ли очень несчастную – есть тип женщин, у которых это неразличимо. На плечах у нее был темный платок, она курила. Сима лежала дома, ей было неуютно в такую погоду, и темнело еще слишком рано, а Бровману нравилось и такое море, и такое небо. Это было темно-синее, с клочьями туч небо из арабской сказки, в Арктике никогда такого не бывало. В Арктике оно было по большей части зеленое – тоже красиво, но не по-человечески. Полярное же сияние и вовсе его разочаровало. Ладыгин рассказывал, что видел огненную птицу, но Бровман склонен был считать ее призраком. Обычное полярное сияние было чередованием серых и зеленых сполохов, будто дальние зарницы или межпланетные военные учения.</p><p class="p1">Женщина стояла у парапета, у того участка набережной, где прогуливались обычно немногочисленные в это время обитатели дома творчества «Артист». Бровман остановился поодаль, закурил и тоже стал смотреть в море. Немного штормило, море у берега было мутным от песка. Обещали завезти гальку, но пока пляжи были покрыты черным крупным песком, не особенно приятным для ходьбы.</p><p class="p1">– Жалко уезжать, – сказал Бровман. Женщина не ответила.</p><p class="p1">– Я могу вам помочь чем-то? – спросил он.</p><p class="p1">– Ничем вы мне помочь не можете, а поговорить можем, – сказала она. – Я тоже уезжаю.</p><p class="p1">– Куда, если не секрет?</p><p class="p1">– К мужу, в Москву.</p><p class="p1">Этим она сразу отсекала дальнейшие ухаживания, но и ухаживаний пока никаких не было.</p><p class="p1">– Отдыхали без него?</p><p class="p1">– От него отдыхала, – сказала женщина горестно, – но это так устроено, что надо вернуться к нему. Я всегда возвращаюсь к нему, очень интересно.</p><p class="p1">– Что, трудный человек? – прямо спросил Бровман.</p><p class="p1">– Не совсем человек.</p><p class="p1">И незнакомка посмотрела прямо ему в глаза – выражение у нее было гордое, почти вызывающее. Бровману стало не по себе.</p><p class="p1">– Тут же понимаете как, – сказала она. – Собственно, из обычного человеческого состояния, вот как вы, возможны два выхода. Может быть выход вверх, может вниз. То и другое за пределы человека, ну как Северный и Южный полюс, понимаете?</p><p class="p1">Бровман вспомнил бред помполита Трофимова, который под конец экспедиции совсем, кажется, сдал, – и реальность словно прогнулась; как-то все было очень странно.</p><p class="p1">– Грешники попадают на Южный, – сказал он машинально.</p><p class="p1">– Ну, наверное. Наверное. – Незнакомка не была в этом уверена. – То, что он со мной сделал, в принципе отвратительно. Но если говорить совсем честно, он сделал со мной примерно то же, что сделали со всеми вами. Если вот так посмотреть, объективно, то я довольно типичный представитель.</p><p class="p1">Бровман понял, что она намекает на последние полгода, которые он так счастливо пересидел вдали от всего. Вероятно, муж ее бил или запугивал.</p><p class="p1">– Почему к морю – это другой вопрос, – заговорила незнакомка опять, и он понял, что она говорит не с ним. – Алхимическая свадьба, меркурий и сера. Но чтобы свершился брак, нужна соль, вот тут много, много соли. Гомункулус вытекает в море и там набирается материи. Ну, или как-то иначе, я коряво говорю. Но меня сюда тянуло очень сильно. А между тем я не могу без него существовать, мне надо раз в год, может быть, в два года получать от него… Не важно, вы вряд ли поймете, и не так это для вас важно. Я виновата перед ним, но он тоже, знаете, не ангел.</p><p class="p1">Налетел ветер, стало зябко.</p><p class="p1">Женщина засмеялась.</p><p class="p1">– Совершенно не ангел, – и посмотрела на Бровмана, сузив глаза, склонив голову на плечо. – Вы что-то понимаете, – сказала она, – но в целом ничего не понимаете. Правда?</p><p class="p1">– Правда, – сказал Бровман. – Мне даже кажется, простите, что вы не в себе немного. Так?</p><p class="p1">– Ну, это самое простое, – сказала она разочарованно. – Эти все так и будут думать: что Артемьев убил жену, а я просто местная сумасшедшая. Так тоже может быть, но ведь это не так. И кстати, я была тут без него довольно счастлива, я немного развлеклась. Но ужасно, что я все время должна возвращаться, это и мне мучительно, и ему. Если бы он знал, как это будет мучительно, он бы меня такую не делал. Но вот в чем дело, понимаете? Это важно. Подойдите сюда.</p><p class="p1">Бровман робел, но ему стыдно было бояться женщины, особенно после полугода Арктики. И он подошел.</p><p class="p1">– Дело в том, – сказала она, словно говорила присказку перед чрезвычайно увлекательной сказкой, – дело в том, что получиться может только такое существо, которое, ну как бы вам сказать… Вот тут жил Пушкин, тут был его, говорят, домик. И он выходил вечером, смотрел на море и написал: «Редеет облаков летучая гряда». Сейчас он бы так не написал. Не обязательно что-нибудь индустриальное, но что-нибудь современное. И когда вы делаете себе жену, вы ведь тоже не можете себе сделать вечную женственность, прекрасную Елену. Вы делаете что-нибудь вот с такой папиросой, в такой шали. С таким характером. Она не совсем она, она – оно, оно что-то выражает вокруг себя. Хотя бы это понятно?</p><p class="p1">– Конечно, – сказал Бровман. С сумасшедшими никогда нельзя спорить.</p><p class="p1">– Ну вот, – сказала женщина. – У него все хорошо, я ему написала, он ответил. Его выпустили, и я к нему возвращаюсь. А вы идите себе, я ничего от вас взять не могу, вы лишены того содержания, которое меня может заинтересовать. Не смотрите на меня в таком удивлении, я долго жила с научным работником, я, может быть, сама научный работник. Хотите, фокус покажу?</p><p class="p1">Бровман представил, какой это может быть фокус, и, подергивая плечами от холода, поспешил в санаторий. Он не оглядывался, но чувствовал, что женщина смотрит ему вслед – скорее всего, склонив голову набок; он дорого бы дал, чтобы никогда больше не видеть, как она смотрит. И действительно, никогда больше не видел.</p></span><span id="id82"><div class="title6">
<p class="p">11</p>
</div><p class="p1">В первый же год войны шарашку Антонова эвакуировали в Омск, в условия далеко не комфортные, но безопасные. В марте сорок второго года их повезли в баню, и Сцилларда там забыли. В этом не было ничего удивительного, присматривали за ними плохо, Карл Сциллард, в отличие от американского брата, был не особенно ценный кадр, жизнь в Омске у них была почти вольная, а прапорщик, который возил их в этот день мыться, был вообще рохля; кроме того, Сциллард научился за эти годы быть почти невидимым, его и коллеги не очень замечали. Он постоянно был поглощен мыслями о жене и дочери, мысленно вызывал их, пытался установить контакт. Он ничего не знал о них с начала войны.</p><p class="p1">Оставшись во дворе бани один, он растерялся. Он и до этого был мрачно-растерян, потому что в бане посмотрел вдруг на свое тело, которого прежде как-то не замечал, и увидел, что оно уже стариковское, что он тщедушен и сам себе противен. И Сциллард задумался о своей задаром прошедшей жизни, в которой он не совершил никаких научных подвигов и вполне мог быть счастлив с женой, которую любил действительно; ну не всем же быть научными гениями, некоторые могут быть посредственными математиками, тихими мещанами. Он потому и сбежал в СССР, что здесь, казалось ему, можно посильно участвовать в строительстве нормального общества. Но общества никакого не получилось, жизнь его была сломана, а семья безнадежно утрачена, хотя надежда, разумеется, умирает последней. Сам Сциллард был венгр, а жена у него была русская, и он надеялся, что свои как-нибудь не дадут ей пропасть. Он стоял во дворе бани среди омского марта, похожего на московский январь, и прикидывал, как ему добираться до завода, где они жили и работали. Он примерно представлял этот завод, улицу Куйбышева, но у него не было ни денег, ни документов, вообще никаких доказательств его бытия. Идти через центр он боялся, здесь его приметил бы первый же постовой. И Сциллард решил как-нибудь доползти по окраинам – он давно не передвигался без охраны, панически боялся просто идти по улицам чужого города, которого вдобавок не знал.</p><p class="p1">Окраины Омска были темны, безлюдны, барачны. Сциллард шел и оглядывался, сунув руки в карманы. Хотелось курить, но закурить он почему-то боялся. Ему представлялось, что курение на улице без команды может выглядеть вызывающе. Кроме того, его самовольная отлучка – которую, конечно, поставят в вину ему, а не прапорщику – могла выглядеть побегом, по военному времени это был конец, не спасла бы никакая шарашка, в которой от него вдобавок было мало толку. Сциллард бы, конечно, полз, если бы ползущий человек не привлекал дополнительного внимания. Чтобы чувствовать себя чуть храбрее, он стал повторять стихотворение одного забытого венгерского поэта; он вообще редко вспоминал родной язык, но теперь, в обстоятельствах совершенно невыразимых, именно этот язык стал его последней опорой.</p><div class="poem">
<div class="stanza">
<p class="v"><em>Holdfény alatt járom az erdőt.</em></p>
<p class="v"><em>Vacog a fogam s fütyörészek.</em></p>
<p class="v"><em>Hátam mögött jön tíz-öles,</em></p>
<p class="v"><em>Jó Csönd-herceg</em></p>
<p class="v"><em>És jaj nekem, ha visszanézek.</em></p>
<p class="v"><em>Óh, jaj nekem, ha elnémulnék,</em></p>
<p class="v"><em>Vagy fölbámulnék, föl a Holdra:</em></p>
<p class="v"><em>Egy jajgatás, egy roppanás.</em></p>
<p class="v"><em>Jó Csönd-herceg</em></p>
<p class="v"><em>Nagyot lépne és eltiporna</em>.</p>
</div>
</div><p class="p1">По-русски это было примерно так. Под лунным светом брожу я по лесу. Зубы стучат. Насвистываю. Позади меня идет десятисаженный добрый князь Тишины. И горе мне, если я обернусь. О, горе мне. Замолчи я или обрати я свой взор вверх, вверх на луну – вскрик, хруст. Добрый князь Тишины сделает большой шаг и растопчет меня.</p><p class="p1">Сциллард интуитивно нащупывал путь, вспоминая одну публикацию в научном журнале, им давали до войны научные журналы, в том числе недоступные в СССР: один гриб так строил свою грибницу, что она напоминала парижское метро. Как это так? Неужели гриб знал парижское метро? Но оказалось… Ему послышались шаги. Нет, показалось… Он как бы рассказывал это дочке, он часто разговаривал с ней так и был уверен, что она слышит… Но оказалось, что гриб строит свою грибницу наиболее рациональным способом, и точно так же было построено парижское метро! Тогда грибу предложили найти выход из лабиринта, поместили его в лабиринт, и что же? Он нашел кратчайший путь! Так неужели я глупее гриба?</p><p class="p1">Сциллард шел по темным промерзшим улицам, повторяя: <em>«És jaj nekem, ha visszanézek».</em> Впереди в двухэтажном деревянном доме горело полуподвальное окно. Ни в коем случае нельзя было проходить мимо него. Нет, в самом деле: горе мне, если я пройду мимо, меня увидят, ночной прохожий всегда странен, опасен. Но невероятная непредставимая воля, сильней его собственной, заставила его пройти мимо этого окна. Ему случалось испытывать иногда математические озарения, но не в работе над навязанными задачами, а тогда, когда он раздумывал над чем-нибудь совсем непрагматическим, над задачей о четырех красках, например, когда Сциллард вдруг понял, что для тора нужны будут шесть красок, а для шара почему-то достаточно четырех, но шар как раз не поддавался. И сейчас он почувствовал такое же озарение: математически надо было пройти именно мимо этого окна, маршрут вычерчивался только так, его привела сюда вся его жизнь, он и в Россию бежал только для того, чтобы пройти мимо этого окна, единственного светлого окна на темной улице. И он подошел и заглянул в это окно, а там жена его Вера мыла в тазике дочь его Иру.</p><p class="p1">Галлюцинация была слишком убедительна. Сциллард зачерпнул снег и потер лоб. Жена Вера продолжала мыть в тазике дочь Иру. Он узнал их сразу, хотя не видел три, больше – почти четыре года, Ирину фотографию жена один раз прислала, но и только. Нет, конечно, этого не могло быть, но вот Вера, что-то почувствовав, взглянула в окно, увидела его и отшатнулась. Она не видела его три, больше – почти четыре года. Но она любила его, она узнала его.</p><p class="p1">Этого не могло быть, но это было, и она метнулась к двери, и он кинулся ко входу в этот двухэтажный окраинный дом, и на крыльце она обняла его, а он спрашивал только: «Вера, как? Как, Вера?» Они вошли в полуподвальную комнату, Ира так и стояла в тазу, ничего не понимая. Сциллард боялся ее испугать, не мог подойти сразу, но Вера подвела его к ребенку, и так они стояли, вцепившись друг в друга, все трое: он с холодной улицы, сам холодный, Ирка в остывающей воде, Вера в незнакомом халате.</p><p class="p1">Они жили в Ленинграде, но невероятная сила, сила предчувствия, заставила Веру в июне поехать к сестре. Потому и не доходили его письма – город был в осаде, а она с Ирой сумела пристроиться к сестре и в октябре с ее предприятием выехать. Это можно было, все можно было сделать, если страстно хотеть дожить до встречи. Теперь Вера работала на заводе в трех улицах от него, а Сциллард не знал! Он гладил ее плечи, спину, руки, плакал неостановимо, и она смотрела на него словно ослепшими глазами, и он не понимал, как он, постаревший, отвратительный, только что ужасавшийся себе, мог быть для нее всем светом, всем счастьем. Ира – та вообще ничего не понимала, почти его не помнила. Но как, как? Как это могло случиться? Что за сила погнала его к этому окну? Ты ведь еще не знаешь, говорила Вера, наш дом разрушило бомбой, все умерли. Умер сосед Петр Алексеич, соседка Лизавета Никитична, сосед Илья Ильич, умер отец Лены, с которой играла Ира. Ира тоже заплакала. В городе умерли очень многие, почти все, кого мы знали. Еще до войны умер Фудель, ты помнишь Фуделя? Он все ворчал, а теперь умер. Умерла еще до войны Любовь Тимофеевна, у которой мы жили на даче. На фронте погиб муж сестры, Яша, бедный Яша, который ушел в московское ополчение, погибло почти все московское ополчение. Погиб Максим Федорович, ты помнишь, его взяли перед самой войной, и у жены не приняли передачу. Погибли Коленька и Сашка, помнишь, ты говорил, что они вырастут бандитами, а они не вырастут никогда. Умер уже здесь Григорий Петрович, с которым мы ехали, он был старый и совсем больной, умерла его жена через месяц после него. Умер инженер Горохов, с которым ты играл в шахматы. Умерли Смирнов и Щербатов из дома напротив, рыбаки, все ездили на Стрельну. Умер Антон Иванович, плотник, он сделал скамейку во дворе на Гатчинской. Умерли, все умерли, и никто никогда не скажет, зачем это было.</p><p class="p1">И они плакали беззвучно, ощупывая друг друга слепыми руками. Слезы текли, словно таял весь лед, намерзший в нем за это время. Ирочка была такая бледная, такая худая… Сциллард лег спать с женой впервые за три, больше – почти четыре года. А утром к ним постучала соседка и сказала: «Я все видела, чтобы духу его тут не было». Жена отвела его на завод, ведь это было в трех улицах от ее собственного завода, и сдала его удивленному прапорщику. Сциллард, сказал прапорщик, откуда это, куда ты делся? И чё ж ты пришел? И он засмеялся, а Сциллард улыбнулся. И вернулся в шарашку, и вышел только в сорок шестом, а жена его вернулась в Ленинград в сорок четвертом, но комнату получить не смогла и ютилась с Ирой в Москве у сестры. В пятьдесят шестом Сциллард реабилитировался и с семьей уехал в Будапешт, выпустил несколько учебников по топологии, а в архиве осталась рукопись воспоминаний «Записки счастливого человека».</p></span><span id="id83"><div class="title6">
<p class="p">12</p>
</div><p class="p1">В феврале сорок второго года капитан Артемьев был начальником полевого госпиталя под Орлом.</p><p class="p1">10 января вышло директивное письмо Ставки верховного главнокомандования: «Немцы хотят, следовательно, выиграть время и получить передышку. Наша задача состоит в том, чтобы не дать немцам этой передышки, гнать их на запад без остановки, заставить их израсходовать свои резервы еще до весны, когда у нас будут новые большие резервы, а у немцев не будет больше резервов, и обеспечить таким образом полный разгром гитлеровских войск в 1942 году».</p><p class="p1">В войсках понимали, что никакого разгрома в 1942 году не будет и что отбить Орел в ближайшие месяцы не удастся. Командующий 16-й армией Рокоссовский сказал командующему фронтом Жукову: противник сейчас сильнее, а тот, кто слабее, наступать не должен, еще и в снегу по пояс… Лучше накопить сил, пощадить людей. Жуков сказал: выполняйте приказ.</p><p class="p1">Помкомвзвода во взводе связи первого батальона 1291-го стрелкового полка 60-й дивизии Кондратьев много успел хлебнуть за первые полгода войны: он записался добровольцем в московское ополчение, в 21-ю дивизию Киевского района, где люди были почти сплошь хорошие, его возраста люди, – «Мосфильм», институт философии и истории Академии наук, кондитерская фабрика Бабаева. Было с кем поговорить, но недолго. В октябре попал в окружение под Вязьмой и, прорвавшись, вышел на Можайскую линию обороны. В вяземской мясорубке Красная армия потеряла около четырехсот тысяч убитыми и ранеными, шестьсот тысяч пленными. Кондратьев попал в роту связи, стал командиром отделения, потом помкомвзвода. Со связью он творил чудеса. Осень была страшная, зима – лютая: земля смерзлась, не окопаться, противник с высот западного берега Оки свободно простреливал боевые порядки 60-й дивизии. С 16 по 19 февраля она потеряла 730 человек убитыми, 2250 – ранеными.</p><p class="p1">Для своих сорока трех лет Кондратьев справлялся неплохо, лучше многих, – как любой человек, которому есть зачем жить. Он знал, что война будет и закончится русской победой, потому что русский резерв бесконечен, и лучше представлял себе этот резерв, чем любые стратеги в Ставке. Он успел познакомиться за эти полгода со многими ценными людьми и точно знал, что, если выживет, сумеет их собрать и кое-чему научить, и кое-чему и у них научиться. Он представлял, как расширится теперь его сеть и как далеко продвинутся его ученики за те три, а может быть, и четыре года, которые продлится война. Послевоенного устройства мира он пока не представлял, но думал только о нем, и эти мысли его спасали. У немцев, понимал он, таких мыслей не было.</p><p class="p1">Его тяжело ранили в правое легкое 25 февраля и после боя оттащили в полевой госпиталь, размещенный в полуразрушенной школе большого села Кривцово, где оперировал Артемьев. Он был исключительный хирург и буквально воскрешал мертвых, и ассистировала ему сестра Марина, о которой говорили, что она была когда-то его женой. В школу однажды попал снаряд, раненых завалило, но Артемьев с сестрами всех вытащил – он словно вообще не боялся смерти, чувствовал себя неуязвимым, шутил, что был патолого-анатомом и это у него профессиональное.</p><p class="p1">Он мог бы спасти Кондратьева и чувствовал, что его метод здесь вполне применим, но чувствовал и то, что именно такому спасению Кондратьев сопротивляется. Он был без сознания и действительно плох, и все его существо словно отталкивало Артемьева. Артемьев видел, что это человек непростой и в будущем может быть весьма полезен, но жизнь из этого человека уходила у него на глазах и переходила во что-то бесконечно более сильное, бесконечно презиравшее Артемьева.</p><p class="p1">Артемьев этого не понимал. К войне не был готов никто, но он был; война предоставила ему необозримое опытное поле. Он понимал, что эта война будет выиграна за счет истребителей, но не таких, какие испытывали на высоту и скорость, а таких, как он. Это такие, как он, дали новую жизнь стране и готовы были вербовать к себе новых и новых, но этот связист, имени которого он не знал, уплывал у него из рук, и Артемьев ничего не мог сделать.</p><p class="p1">Он поднял глаза и посмотрел на Марину, и она, как всегда, почувствовав его взгляд, уставилась ему в переносицу. Он знал этот взгляд, всегда дававший ему силу, и пошатнувшаяся было реальность встала на место. Они смотрели друг на друга, и в этих глазах было большее, чем сила, большее, чем любовь, – та великая созависимость, которая всегда есть между творцом и творением.</p><p class="empty-line"/><p class="p1">Кондратьев похоронен в братской могиле у деревни Кривцово, его именем назван лунный кратер. Артемьев закончил войну майором и умер в 1972 году, архив сразу после смерти конфискован, судьба его жены осталась неизвестной, но если она его и пережила, то, мы полагаем с полным основанием, ненадолго.</p></span></span>
