</div><p class="p1">Что там между ними происходило в той кабине, никто не узнает, да и что могло быть? Степанова училась определять положение самолета по секстанту, Петров ей рассказывал про Ассена Джорданова и книжку «Ваши крылья», которую ей и подарил. Что-то она ему говорила про себя, про отца, которого сбил чуть ли не первый в Москве мотоцикл, про мать, которая заставляла ее заниматься музыкой. Про дочь же, вероятно, не рассказывала, чувствуя, что Петрову это будет больно. А Петров, вероятно, говорил про истребитель Карпова, который тогда испытывал, про то, что машина эта быстрейшая в мире, может на вираже при известной сноровке догнать собственный хвост и весит менее тонны, а развивает… – но тут он обрывал себя, не выдает ли военную тайну, и решал, что нет, не выдает, про эту машину Волчак и в газете говорит, – развивает до трехсот семидесяти легко. Рассказывал он, наверное, и про Дальний Восток, на который Степанова потом попала так непредвиденно, – и, чем черт не шутит, не эти ли рассказы о клоповке и китайском лимоннике спасли ей жизнь? Но оба они были немногословны, общение их происходило, вероятно, благодаря тем токам, которые имеются только на высоте. Говорил же Канделаки, что после пятисот метров начинает улавливать мысли второго пилота, а на рекордной своей высоте 14 575 понял вообще все, то есть начал слышать то, что слышит Бог. Сначала, говорил он, ничего не понятно, какофония, затем прорезываются мысли матерей, они почему-то самые сильные, а потом опасения стариков. Кандель был большой выдумщик, но что-то в его глазах говорило, что не врал.</p><p class="p1">Петров, конечно, показывал Степановой кое-какой пилотаж – вряд ли удержался бы, потому что Петров на земле и в воздухе – были два разных Петрова. На высоте откуда что бралось – и реакция, и жесткость появлялись, и, наверное, ему хотелось, чтоб Степанова завизжала, а она была не из этаких. Что он ей мог показать на тяжелой машине? Вряд ли петлю, максимум бочку. Ну, если уж вовсе желал поразить ее воображение, – иммельман, но риск, риск! Да и не для форсу он брал ее с собой, а якобы готовить. Это Чернышев им подбросил такую возможность, и была она у них недолго, чисто для старта.</p><p class="p1">И люди, которые видели их вместе, – Бровман тогда еще не был знаком со Степановой, а Петрова интервьюировал один раз и не почувствовал в нем особенного куража, – начали замечать, что какая-то в этой паре есть идеальная слаженность, словно они родились друг для друга. Они даже были неуловимо похожи – оба не красавцы, но какая-то лучилась из них милота, тихое русское тепло, похожее на знание общей тайны. Петров начал входить в славу, в пилотаже ему не было равных среди молодых, он поступил в академию Жуковского и перешел командиром звена в институт Вахмистрова, и доучивать девушку-штурмана у него не было времени. Как-то они, наверное, встречались, люди взрослые, и по осторожным рассказам Дубовой – ближайшей степановской подруги – Бровман понимал (задним числом, конечно), что вроде как они дошли до разговора о степановском разводе. Но то ли дочка так привыкла к папе, то ли Степанова так высоко себя ставила, что и не представляла, как ее инженер будет без нее обходиться, – в общем, выйти за своего героя она никак не могла. Есть такая черта у женщин этого типа, тихих уроженок московских окраин. Если б она поймала своего инженера на неверности, никогда бы не простила, но сама его оставить не решалась, да и совесть ее мучила. И то ли Петрову это надоело, то ли состоялся меж ними решительный разговор, но все отношения закончились, и Полина осталась при своем инженере, а Петрова, видя его необъяснимую мрачность, познакомили с Татьяной Пороховниковой.</p><p class="p1">Ох, не надо было этого делать! И не Толе стало от этого плохо, а Тане, потому что с этой бочки, с этого иммельмана судьбы начался у нее тот штопор, про который только теперь и помнят; но была, в общем, вечеринка по случаю выхода фильма «Пилоты», консультировал его Кандель, они скорешились с композитором Боголюбовым, большим любителем пьянок и розыгрышей, и Кандель рассказал, что есть у них пилот, скромный, богатырского сложения, рука на руку побивает любого борца. А поскольку оператор Косматов был из волжских тяжеловесов и басом пел в хоре, решено было свести его с Петровым в поединке, благо и Петров был не лыком шит, родом с пермского медного рудника Покровского, известного тем, что покровских не могли побить ни воронцовские, ни дубравинские; то есть они били всех.</p><p class="p1">Но побит был Петров, и не Косматовым, который сразу капитулировал – да что, мол, да куда мы против молодых, да я с ним и за стол не сяду, – но Таней, которая только что из ТРАМа перешла во МХАТ, страшно робела и оттого наглела. Таня была в работе милейший человек, безо всякой звездности, и не столько экранная красавица, сколько девушка-товарищ; но стоило Тане выпить рюмку – и она становилась так же неузнаваема, как Толя в воздухе. Для начала у нее прелестно краснели уши. В этом было что-то невинное, беззащитное – не нос, а уши, и потом ей все становилось смешно (Толя – тот не пил вовсе, счастливая особенность организма – не получал от выпитого радости, только головокружение и рвоту). Потом накатывали на нее приступы взбалмошности: куда-то всей компанией ехать, ночью купаться в Москва-реке, слушать каких-то особенных соловьев на Воробьевых горах… В прежние времена такая девушка ехала бы к Яру, а потом в монастырь плакать и каяться – советский вариант был поскромней. Но Толю пленила не эта лихость, а то, что Таня вдруг стала его жалеть. Он не знал еще, что это особенность ее, как говорил Павлов, психической конституции, что при известной концентрации игристого в организме она начинает жалеть всех вообще, а себя ругать – я плохая да я плохая. Но на Толю сильно подействовало, что она после первого смехового припадка как сожмет вдруг его лицо ладонями: милый, милый! Как я вижу все, что у тебя делается, какой ты счастливый с виду, и как тебя оскорбили ужасно! Любому это скажи, и любой, кроме самого тупо-самолюбивого, отнесет это на свой счет. Таня стала гладить его по голове и вдруг заплакала. А Петров переживал самый грустный период расставания – недели через две, когда начинает доходить; и у него, к счастью, не было шанса даже случайно увидеться со Степановой – они работали теперь в совершенно разных подразделениях, не пересекались даже на банкетах, люди Вахмистрова держались отдельно и с бывшими экипажами старались не видеться, ибо торчали на самой передовой. Петров растаял абсолютно, и, когда Таня заснула, скинув туфли и прикрывшись кофточкой, он сидел рядом и охранял ее сон.</p><p class="p1">Ухаживал Петров красиво – что ж ему было не ухаживать, возможности появились – и, когда Таня жила на даче, с шиком и громом провел звено над поселком, перепугал соседей, а уж в театре стал заваливать такими букетами, что полтруппы немедленно ее возненавидело, а другая половина принялась подольщаться: так и так, не может ли ваш друг, ведь он вхож, намекнуть, что у меня третий год сыплется штукатурка, а домоуправ только отмахивается? Таню, правду сказать, то и другое только пугало. Она вообще не очень понимала, откуда вдруг такая слава, но тогда это бывало быстро – человека если начинало возносить и закручивать, совершенно как в фигуре пилотажа «спираль», он оглянуться не успевал, как уже несся в вихре и начинал делать глупости. Это нравилось, давало повод дружески поругать. А когда вскоре делал большую, настоящую глупость – неизбежную для того, кто слишком много и рано получил за небольшие, в общем, заслуги, – его низвергали, и тут начиналась любимая забава. Говорили, что для того только и поднимают; возносили, чтобы обрушить, и не всегда обе стороны сознавали это, но умные догадывались, а самые умные даже не противились (потому что после падения, если уцелел и не озлобился, ты становился окончательно своим, тут уж тебя никому в обиду не давали).</p><p class="p1">Вот такое вознесение и топталово получилось с Дорлиаком, на которого молился весь театр Вахтангова и который имел неосторожность сняться сначала в плохом фильме, а потом в другом фильме сделать ребенка Катрине Миляр, девушке с баррикад, символу свободы. Эта Катрина – с ярким, но удивительно злым лицом – сошла с баррикад, нажаловалась киноначальству, про Дорлиака напечатали статью, перестали допускать к съемкам, и как-то этот атлет сразу ослаб и умер на гастролях от брюшного тифа. Говорили, что он был добрый малый, все деньги раздаривал, дарил цветы билетершам, но говорить это стали после того, как он умер, а когда всплыла история с баррикадницей, только то и припоминали ему, как он мало успел да как высокомерно занесся. Пороховникова откуда-то знала, что и с ней непременно так и будет, но остановить этот восходящий поток не имела сил – и ей показалось, что, если сейчас впиться в Петрова, он ее как-то заземлит или защитит, и она приняла его ухаживания, а потом довольно быстро согласилась выйти замуж.</p><p class="p1">Это замужество решилось как-то очень сразу, симметрично получилось: она, восходящая звезда, еще вчера играла мальчишек-беспризорников, а сегодня уже Китти во мхатти, в кино поет и танцует в комедии «Четверо смелых». А с другой стороны он, тоже из младших, но таких, что старшим уже приходится тревожно на них оглядываться, не теснят ли. Само собой решилось, что их надо поженить: смирный и буйная, сильный и хрупкая, оба в меру земные и небесные – идеальный, открыточный союз, и все стали слаженно действовать в этом направлении: Боголюбов расписал роли, другой композитор – Дунаевский, всеобщий друг и неоднократный лауреат, – сочинил в их честь увертюру, которую играть прислали оркестр, благословлял образом Миша Зискин (Боголюбов так и сказал ему: будешь мальчик с образом), вместо образа был фотопортрет Щукина в роли главного летчика, впоследствии инструктора, и многие потом говорили, что этого кощунства было не надо, из-за него все и вышло. По крайней мере, в судьбе Зискина оно сыграло роковую роль: помер в эвакуации автором единственной песни «Три тракториста». Шафер был со стороны эскадрильи, Кандель, как без него, а подружка со стороны театра – Акулинина, ни много ни мало парторг труппы; приветствие с Кагановичем прислал лично Хозяин, намекнувший, что вот бы всех летчиков переженить, например, с балетом Большого театра, какие можно бы устраивать гастроли! – не зря передавали словцо злоязыкого комбрига Салазкина: ну, это уж крепостной театр. Но сыграли все весело, во МХАТе, с продолжением в «Праге», и только увертюра внесла во все это не то чтобы странный, но несколько диссонирующий момент. Как если бы раздернулось синее небо, оказавшееся облачностью, а за ним бушевала настоящая гроза.</p><p class="p1">Судите сами: две флейты, два гобоя, два кларнета, два фагота, четыре валторны, три трубы, три тромбона, туба; группа струнных; литавры, большой и малый барабан, тарелки. Самое начало – восемь тактов <em>maestoso</em>, после чего <em>allegro</em> и – в лучших обычаях романтической музыки – ре минор в начале и внезапный си-бемоль мажор в средней части, то, что мы в своем профессиональном общении, мастера-посвященные, называем шубертовой Шестой, ибо в первой части «Неоконченной» главная идет в си миноре, а побочная в соль мажоре, что и есть романтизм, герой и масса. Все это поначалу было еще в рамках: бороться, дерзать, найти и перепрятать – нормальное ритмичное восхождение, напоминающее не столько штурм полюса, сколько штурм другой вершины, неожиданно похожей на полюс: какое ледяное одиночество там всегда пронзало Боголюбова, какой внезапно открывшийся ужас. Вот тут, в как бы лирической средней части, начиналась мольба, словно из-под триумфальных фанфар принималась петь клезмерская скрипка: вот кто ты в конце концов, вот кто ты есть! На умоляющую эту тему накатывал железный марш, потому что если уж ты тут, в этом ужасном мире, то тебе надо по крайней мере дойти до его полюса, то есть испытать его и свой максимум. О моя жизнь, моя поруганная жизнь! Это я не тебе. «Это я не тебе» Боголюбов услышал просто физически, в репризе трубы – та-та-ти-та та-та-там, – и опять все полезло на стену моря, стали восходить на нее вздувшиеся, распухшие паруса. Вот что увидят эти двое, лезущие на свою вершину, вот зачем они туда лезут, только чтобы упасть; истребитель, истребитель гонит их туда! Ты думаешь, что ты Фауст, а ты Иов. И Боголюбов расплакался, никто, даже спьяну, отроду не видел его плачущим, – и Дунаевский подумал, что это от зависти, потому что сам завидовал многим, а себя считал так, опереточником; но когда он подошел обнять Боголюбова, то увидел на его лице настоящее умиление. Я не оттого плачу, что грустно, сказал Боголюбов, и не оттого, что ты Моцарт (они улыбнулись), а оттого, что хорошо. «Это какой же будет фильм?» – спросил Петров. «„Дети капитана Гранта“», – объяснил Дунаевский. «Не читал, – признался Петров сокрушенно, – мало я начитан, надо будет…»</p><p class="p1">Зажили они не очень хорошо, крепостные браки счастливыми не бывают, – свадьба эта была нужнее окружающим, в порядке символа, и символом она была очень хорошим, а жить вместе должны люди, которые вместе летают, а не те, кто встречается ночью на три часа, аккурат после спектакля и до вылета. И Таня словно почувствовала, каких прекрасных возможностей она лишилась, – она была жена летчика, атлета, ухаживали за ней теперь крайне осторожно, не столько из опасения, что атлет начистит таблет, словно из чувства, что посягаешь на государственное. Этот брак был освящен не просто увертюрой, поднимай выше, но таким благословением, что не разведешься; Тане же было только двадцать три года, в атмосфере мужского внимания она расцветала, а внимание это теперь сменилось почтительным ожиданием беременности. Нельзя же, чтобы союз двух Нумеров Первых – пусть даже во втором ряду – был бесплоден; Таня поначалу отговаривала Петрова, ей надо было играть, наиграться. Но при этом же начала попивать, потому что Петров был хотя и чрезвычайно милый, но совершенно чужой. Таня не рождена была для семейственных обязанностей, а приказывать домработнице не умела, предпочитала, чтобы ничего не было сделано. Волчак им пробил сначала номер в гостинице «Москва», потому что не в поселок же летчиков было привозить молодую жену, это было от театра два часа езды и три шлагбаума, а потом уместно пропал один пожилой маршал, дважды орденоносец, что-то с ним такое случилось, и они въехали в Лубянский проезд, 17. Мебель вся осталась. Квартира была большая, но неприятная. Времени они в ней проводили мало.</p><p class="p1">И тут в сентябре грянул гром – Степанова развелась!</p><p class="p1">Степанова была уже довольно известный штурман, да и отряд героев невелик, все всё знали, но Петрову никто не решался сказать – он как-то услыхал в обычных аэродромных сплетнях и кинулся разбираться. Что же оказалось? Они встретились в кафе аэроклуба, где она – теперь уже она! – раз в неделю тренировала молодых, и Петров там ее подкараулил и спросил: «Поля, что это?» Как всегда, они заговорили так, словно не расставались. Как всегда, им не надо было никаких предисловий. Как всегда, она сказала ему очень прямо: я могла терпеть, пока ты не был женат и был, значит, мой. А теперь я узнала, и так мне стало плохо, что я сказала мужу все. Ты не можешь себе представить, то есть я ожидала чего угодно, слез там, скандала, что хочешь, но он посмотрел с таким облегчением! Там давно другая жизнь, при его профессии легко. Все эти авралы… При нашей тоже, кивнул Петров, и оба засмеялись.</p><p class="p1">Вообразите же эту фарсовую, эту идиотическую ситуацию. Она не могла развестись, пока он не был женат, и развелась, как только он женился, – такое могут устроить себе только люди неба, люди нечеловеческой логики. И так они сидели вдвоем в этом кафе аэроклуба и пили компот. Он год ее не видел. На короткое время разговор перешел на профессиональные темы. Что, спросила она, действительно дает до пятисот? Пятьсот тридцать семь у меня был максимум по приборам, ответил он гордо. И тут же, без перехода, словно выдал уже главную военную тайну и теперь можно говорить что угодно, прибавил: а по ночам, ты знаешь, никакого удовольствия. «А по приборам?» – спросила она. По приборам все прекрасно, вздохнул он, но, знаешь, я думаю, от этого прибора зло одно. И опять засмеялись.</p><p class="p1">Он спросил про дочь, она оживилась и стала рассказывать о ней с той же гордостью, с какой он – об истребителе. Он заревновал, понял, что место дочери не займет никто и никогда, разве что будет у них когда-нибудь общий сын, но как это сделать? Петров сумел в двадцать девятом уговорить своего мастера цеха отпустить его в летное училище, победил недостатки своей летной манеры, поначалу слишком резкой, справился даже со склонностью к полноте – а все лыжные гонки, благо снегу завались. Но он не был хозяином своей судьбы, как про него писали, вот в чем штука; никто из героев, в том числе женщина-штурман Степанова, ничего не могли решить в собственной жизни. Они бегали лучше всех по рельсам, которые им проложили, и даже могли перескочить с одних рельсов на другие – например, с пути знатной ткачихи на путь славной летчицы. Но переменить свой маршрут они были не властны, и стало быть, судьба их была лететь параллельными курсами. Петров еще этого не понял. Он поехал один раз с Полей Степановой в гостиницу «Москва», где его знали и помнили. Он ужасно краснел, но они там сняли номер. И так им было хорошо в эти три часа, что он пошел пешком к себе на Лубянку в совершенно твердом намерении сказать Тане Пороховниковой: Таня, это была ошибка, и тебе так тоже будет лучше. Был прекрасный мартовский день, очень яркий, и Петрову казалось, что сама природа на его стороне, потому что в мартовской Москве ярких дней не бывает, а тут смотри ты. Он шел, с наслаждением курил, весь еще был полон чувством тайной силы, которое просыпалось в нем с Полей Степановой, больше ни с кем. Он так Поле и сказал на прощанье: поезжай сейчас к себе, Степка, – я все решу. Рыжая собака встретилась ему, посмотрела очень умно и отбежала, словно испугавшись, – идет человек, заряженный судьбой, – Петрову и это показалось добрым знаком. Он пришел к Тане и увидел, что она бледна, а глаза красные. И он открыл рот, чтобы ей сказать, но вместо этого спросил: в чем дело, ты плакала? Она молча кивнула. Чуткость входит в число летных добродетелей, она была даже у Волчака, просто самолеты он чувствовал лучше, чем людей. Петров был счастлив в этот день и сразу все понял. Ты что, спросил он, ты это? – и не в силах был договорить. Таня сказала: да.</p><p class="p1">На следующий день он подал заявку на перевод в Испанию.</p></span></span>
