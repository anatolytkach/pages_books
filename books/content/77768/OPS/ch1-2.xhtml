<p class="p">Игра и классики</p>
</div><p class="p1">Идея восхитительная. 24 автора, среди которых есть настоящие акулы пера — Денис Драгунский, Сергей Лукьяненко, Дмитрий Быков; есть недавно вспыхнувшие на литературном небосклоне звезды вроде Григория Служителя и Игоря Малышева; здесь есть опытные писатели и организаторы литературного процесса вроде Владимира Березина и есть писатели еще не слишком известные. Все они собрались вместе, чтобы написать коллективный подростковый роман.</p><p class="p1">Вообще-то это называется БУРИМЕ.</p><p class="p1">Буриме — это литературная игра в сочинении стихов, чаще шуточных, на заданные рифмы, иногда и на заданную тему. К буриме относят также «игру в чепуху»: записывают несколько строк или даже строф и передают листок партнеру для продолжения, оставив видимыми только последние из них. Можно также начать рисунок какого-либо существа, например, с головы, подвернув листок бумаги так, чтобы партнер видел только шею и дорисовал туловище, и так далее.</p><p class="p1">Появилась эта игра в XVII веке. Ее изобретатель — малоизвестный французский поэт Дюло. Но особое распространение приобрела в XIX–XX веках — сначала только в салонах, а затем и в самых широких кругах публики.</p><p class="p1">Умением писать буриме в России славились дядя А. С. Пушкина В. Л. Пушкин, Д. Д. Минаев, А. А. Голенищев-Кутузов.</p><p class="p1">Но буриме в прозе, да еще и в виде цельного романа, — это, конечно, особый и непростой жанр.</p><p class="p1">Что удивительно: авторам, обладающим своими неповторимыми стилями письма, в общем удалось сохранить некую стилистическое единство романа. Тут требовалось большое смирение и понимание коллективной задачи.</p><p class="p1">Пересказать роман невозможно, там слишком много происходит разных событий. Но если коротко: ученики одной школы пытаются спасти ее здание, которое готовится под снос (как и весь район), чтобы на этом месте отец одной из учениц построил что-то вроде огромного торгово-развлекательного центра. Таким образом, детей не просто переместят в другие школы, но и расселят по разным районам. И они начинают бунтовать.</p><p class="p1">Но это только присказка. В романе есть все: и тема социального протеста подростков, и мистика, и клады, и колодцы со святой водой, и языческие капища, и… бог знает чего там только нет.</p><p class="p1">А еще там много литературных аллюзий: от «Тимура и его команды» до русской классики, средневековья и античности. Так что чтение романа будет еще и познавательным.</p><p class="p1">А еще роман закольцован, и смысл его вы поймете, только прочитав эпилог, изобретательно написанный Дмитрием Быковым, который по совместительству является еще и учителем литературы в средней школе.</p><p class="p1">Словом, поздравляю! Я читал это с улыбкой, но вполне возможно, что подростки прочтут это иначе, вполне всерьез.</p><div class="cite">
<p class="text-author">Павел Басинский</p>
</div></span>
