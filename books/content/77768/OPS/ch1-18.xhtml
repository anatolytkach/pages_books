<p class="p">Глава 15</p>
<p class="p">Кураторы</p>
<p class="p">Антон Соя<a href="ch2.xhtml#id57" class="a">[31]</a></p>
</div><p class="p1">Человек с прямоугольным лицом не спешил покидать здание гимназии имени Бернарда Шоу. Он обманул Петю. Осип Алексеевич Баздеев прекрасно ориентировался в школе. В прозрачных, почти рыбьих глаза «чиновника» сквозило едва заметное беспокойство. Он бодро поднялся на третий этаж по широкой мраморной лестнице, прошел по рекреации до крайнего кабинета, оглянулся. Рекреация по-прежнему была безлюдна и тиха. Баздеев достал из кармана аккуратные отмычки и за пару секунд справился с замком. Кабинет литературы встретил его гулкой пустотой и портретами классиков на стенах. Лев Николаевич неодобрительно наблюдал, как Баздеев запирает дверь и раскладывает на первой парте свой роскошный дипломат. Свет в классе «чиновник» включать не стал. Свет появился из дипломата. Яркий, синий, он озарил заднюю стену, бросив на нее огромную скрюченную тень Баздеева, склонившегося над дипломатом.</p><p class="p1">— Проект «Вечность». Протокол сто семнадцать. Код допуска семь. Выхожу на связь. Прием. Что-то срочное, шеф? У меня не очень удобное место дислокации. — Осип Алексеевич говорил негромко, но чрезвычайно четко.</p><p class="p1">Чемоданчик ответил резко и на тон выше Баздеева.</p><p class="p1">— У нас теперь все срочное, Ося. Режим паники на корабле. Привыкай. Переводись в режим голограммы. У проекта новый куратор из ближнего круга. Так что проведешь для него срочную конференцию. Доложишь обстановку. Лишнего не болтай. Все под запись.</p><p class="p1">— Вот черт! Они вообще дадут нам работать? Сплошные доклады. — Баздеев издал тихий стон и начал что-то переключать в чемоданчике.</p><p class="p1">— Давай быстрее, Ося. Куратор нервничает. Да, и еще. Конференция расширенная. Вояка будет, Духовник и Федерал.</p><p class="p1">— А повара не будет? Или врача?</p><p class="p1">— Ося, давай серьезней. Врача ему подавай. Радуйся, что палача пока не будет.</p><p class="p1">У классной доски одна за другой заискрились желтым электричеством пять голограмм сидящих за столами собеседников Баздеева. Столы наплывали друг на друга. В классе стало тесновато.</p><p class="p1">— По скайпу как-то спокойнее было общаться, душевнее, — заметил благообразный священник, не переставая искриться.</p><p class="p1">— Для тех, кто не знает: это наш ведущий сотрудник Центра «Ы», разработчик проекта «Вечность», Баздеев Осип Алексеевич. Он эту историю, можно сказать, своими руками раскопал, — сказал добродушный на вид седой мужчина, растекшийся в профессорском кресле.</p><p class="p1">— А нас всех закопал, — бесцветным голосом констатировал блеклый тип с вертикальными морщинами на лошадином лице.</p><p class="p1">— О! У нас в безопасности юмористы! — деланно обрадовался лысый, с модной бородкой. — Только вроде не время для шуток. Дошутились… Хозяина сберечь не смогли, теперь самое время веселиться? Все эту яму копали, в которой теперь сидим. Так что уж лучше послушаем эксперта. Пусть расскажет, как выбираться будем. Пожалуйста, Осип… а-а-а… Алексеевич.</p><p class="p1">Всем сразу стало понятно, кто здесь главный. Баздееву тоже. Он стал говорить, обращаясь лично к бородатому куратору.</p><p class="p1">— Наш центр создан двадцать лет назад по личной инициативе Семьи. Мы занимаемся поисками средств продления жизни. Любых средств. Не только научных.</p><p class="p1">— Прости, Господи, — вздохнул священник.</p><p class="p1">— Мы изучали любые аномалии. Проверяли любые слухи. Разбирались в легендах. Я сразу сосредоточился на местной истории. Копал Москву. Все почему-то верили в Тибет, заглядывались на Индию, а я, знаете ли, краевед…</p><p class="p1">— Все это безумно интересно, Осип… а-а-а. Но время, время, время. Время поджимает. Давайте к сути. Сухо, по делу. — Куратор постучал жирным указательным пальцем по своему необъятному столу.</p><p class="p1">— По делу, — Баздеев поморщился, — по делу, надо было не мешать нам. Не влезать на наше поле со своими псевдостроительными проектами. Инициативами этими дикими. Аномалия совершенно не изучена. Все на уровне гипотез. Шито белыми нитками. Но после первого же моего доклада сюда наперегонки ринулись силовики. Пошло соревнование, кто первый Хозяину на блюдечке бессмертие принесет. Столько дров наломали.</p><p class="p1">— Эксперт, ты за базаром следи. Не на кафедре у себя, — возмутился суровый толстяк в генеральском мундире.</p><p class="p1">— Осип Алексеевич, и правда. Субординацию никто не отменял. Давай не увлекайся, — расстроенно прогудел седой.</p><p class="p1">— Продолжайте, Осип! — Куратор привстал из-за стола. — Вы сказали — бессмертие. Я не ослышался?</p><p class="p1">Баздеев снова поморщился, как от зубной боли.</p><p class="p1">— Именно так. Только в определенном смысле. Речь не идет о нетленности физического тела. Речь идет о реинкарнации. То есть о переселении личности или, если вам так больше нравится, души в другое тело. В данном случае — родственное. О сознательной, контролируемой реинкарнации.</p><p class="p1">— Ага. Ага. Вот это уже интересно. — Куратор инстинктивно потер коротенькие ручки. — Давайте здесь подробнее. Что именно вы нарыли?</p><p class="p1">— Для начала аномальную зону в Замоскворечье. Район Калачёвка, где за последние сто лет зафиксировано больше всего необъяснимых явлений. Меня сразу заинтересовало огромное количество долгожителей в этом районе, совершенно нехарактерное для Москвы. Стал докапываться. Смотреть все документы, связанные с историей района, этого места.</p><p class="p1">— И докопался до подземной реки… — не удержался седой шеф Баздеева.</p><p class="p1">— Сначала до капища. Здесь, а конкретно на том самом месте, где я сейчас нахожусь, полторы тысячи лет назад из-под земли бил источник, которому поклонялись местные язычники. Они считали, что его живительная вода творит чудеса. И фатьяновцы поклонялись, и дьяковские, и кривичи.</p><p class="p1">— О, этнография пошла, — заскучал щекастый генерал, не видя, как презрительно взирают на него со стен Толстой, Чехов и Гоголь.</p><p class="p1">— Потом источник ушел в землю, изредка пробиваясь на поверхность ключом, а на этом месте возникло капище с идолами, которое продержалось до крещения Руси. Следов капища практически не осталось, а легенда о его бессмертном Служителе, жившем рядом с источником, каким-то образом дожила до наших дней. Вернее, дошла легенда уже в варианте о вечном Служителе церкви, воздвигнутой на месте капища и снесенной по решению Священного синода в конце восемнадцатого века. Решение для того времени беспрецедентное. Но слишком уж широко пошла дурная слава об этой церкви и ее священниках. Некие ушлые купцы вовсю наладили продажу святой воды из церкви, хотя никакого официального источника при ней не было. Поговаривали, что по ночам в церкви отправлялись языческие обряды и даже приносились человеческие жертвы. В истории оказались замешаны крупные вельможи, и, дабы прекратить слухи о ереси, церковь снесли, а на ее месте построили здание землемерного училища. Отца-настоятеля сослали служить в приход на Кавказ, в только что построенный Моздок, где его следы затерялись. Остальные служители тоже как в воду канули. И лишь потомка одного из дьяконов мне каким-то чудом удалось найти. Найти здесь, на Калачёвке.</p><p class="p1">— Поклеп, клевета и грязные инсинуации, — не выдержал священник. — Последующее внутрицерковное расследование показало, что слухи распространялись за деньги. А целью их были как раз высокопоставленные прихожане, обвиненные в ереси. Обычные дворцовые интриги, в результате которых пострадала церковь.</p><p class="p1">— Однако святая целебная вода из снесенной церкви продавалась на самом деле. И очень даже работала. Об этом есть упоминания в независимых источниках. Правда, результаты были всегда непредсказуемы, — парировал Баздеев.</p><p class="p1">— Вы отвлеклись, Осип… а-а-а… Давайте про потомка дьякона, — вернул разговор в нужное русло куратор.</p><p class="p1">— Неординарный человек. Ученый-гидролог. Черный археолог. Уже тогда, восемнадцать лет назад, я понял, что это редкая удача. Моя большая рыба! А попав к нему домой первый раз, я удостоверился, что не ошибся. Там пахло чудесами.</p><p class="p1">Пожилой военный недовольно хмыкнул.</p><p class="p1">— Да-да, именно так. Пахло чудесами. Я убивал на него свою жизнь. Вещества, женщины — все пошло в дело. Я должен был знать о нем все. Узнать его тайну. Мы стали друзьями. Близкими людьми… — Баздеев замолчал.</p><p class="p1">— И? — куратор не оценил его театральной паузы.</p><p class="p1">— Лишь однажды он проговорился. Грипп. У него была температура за сорок. Я помог его мозгу окончательно расслабиться. И он заговорил. Сначала это было похоже на обычный бред. Столько имен, событий. Он не понимал, кто перед ним. Обращался ко мне то так, то эдак. Рассказ, как пот, градом катился. Он словно торопился излить все, что накопил. То, что я узнал тогда, стоило моих стараний. Он был хранителем тайны ключа, служителем ключа, того самого ключа, бившего из-под земли тысячу лет назад. И он перерождался раз в пятьдесят лет при помощи обряда и заклинаний. Не меньше двухсот перерождений. Тысячелетняя личность! Я поверить не мог в такую удачу. Легенда оказалась правдой. Раз в пятьдесят лет воды подземной реки поднимаются к поверхности. Для обряда ему нужны были ключ, заклинание и его дети. Трое детей.</p><p class="p1">— Есть! Как раз трое, — обрадованно прокричало лошадиное лицо.</p><p class="p1">— Я же просил не перебивать! — прокричал в ответ куратор. — Значит, все, что у вас есть, — это горячечный бред черного кладоискателя и ваша вера в него? И мы финансировали такой проект? Доказательств возможности реинкарнации нет?</p><p class="p1">— Мы ждали момента реинкарнации, следили за объектом, вели его, — вступил в разговор седой. — Хозяин был в курсе. Его все устраивало. Это тонкие метафизические материи. Мы не могли арестовать объект и допрашивать его. В аномальную зону нельзя лезть с вашими силовыми методами. То, что мы имеем сейчас, как раз результат таких ошибочных, лобовых действий. Вот и Осип Алексеевич подтвердит.</p><p class="p1">Баздеев прокашлялся и продолжил доклад.</p><p class="p1">— После той истории с гриппом и признанием объект замкнулся в себе. Стал что-то подозревать. Перестал со мной общаться. Мне пришлось исчезнуть из его поля зрения. Мы все это время пасли его, его семью, окружение сына и ждали. Но при этом не теряли времени. Провели гидрологическую экспертизу, раз в год брали анализ грунтовых вод, исследовали все старые подвалы на Калачёвке. Все были в курсе, что надо немного потерпеть. Но полгода назад появился проект Шергина по сносу Калачёвки и строительству огромного развлекательного комплекса с бассейном и водолечебницей.</p><p class="p1">Лошадиное лицо вновь вступило в бой:</p><p class="p1">— А что, нам надо было ждать до второго пришествия? Простите, святой отец. Время шло. Хозяин не молодел. А на Калачёвке все застыло. Проект «Вечность», так его растак. Как вы лодку назовете… Шергина мы использовали втемную. Нам надо было добраться до воды, до этого ключа под гимназией. Заняться его разработкой.</p><p class="p1">— Но это же не нефть! — не выдержал Баздеев.</p><p class="p1">— Так, значит, заняться его разработкой, — упрямо продолжил Федерал. — Наш эксперт, жена Шергина, подтвердила, что сейчас для этого наилучшее время. Река подошла максимально близко. Ну, мы и начали работы. Заодно хотелось подстегнуть Безносова, чтобы он задергался. Поспешил со своей этой… карнацией.</p><p class="p1">— Кто такой безносый? — поинтересовался куратор.</p><p class="p1">— Кирилл Безносов. Это и есть наш объект, Вечный Служитель Ключа, — горестно отозвался седой.</p><p class="p1">— Ну и что? Все получилось? Задергался? — лукаво поинтересовался куратор.</p><p class="p1">— Он заболел и умер, — хмуро сказал Федерал. — Но это недосмотр Центра «Ы». Их объект, им и отвечать. Так что ждать больше нечего. Калачёвку сносим. Источник выкачиваем. С водой разбираемся. Обряд проводим.</p><p class="p1">— Так ваш бессмертный служитель и смотритель умер? И что вы мне тогда тут голову морочите? Что за чертовщина у вас тут вообще творится? — Куратор уставился на седого своими совиными глазами.</p><p class="p1">Но ответил ему Баздеев.</p><p class="p1">— Объект умер, но не совсем. Его астральное тело там, в аномальной зоне, под Калачёвкой. Ждет реинкарнации. Все должно случиться в ближайшие дни. Мы уверены.</p><p class="p1">Священник громко и тяжело вздохнул.</p><p class="p1">— Ну все, друзья. С меня хватит ваших бредней. Говорил я Платону: храм надо было восстанавливать, а не с нечистью этой носиться. Доиграетесь ведь! Ну ладно, ладно. На все воля Божия. Ангелов-хранителей вам. Помолюсь за вас.</p><p class="p1">Голограмма священника исчезла со звонким издевательским хлопком. Баздеев в очередной раз вздохнул и продолжил свой затянувшийся доклад:</p><p class="p1">— У нас все под контролем. Наш агент уже несколько лет постоянно рядом с сыном Служителя. На днях мы нашли его дочь. Уверен, что вот-вот проявится и третий ребенок. Мы просим немедленно прекратить сносить здания. Еще раз повторяю: это тонкие материи, неподвластные нашему разуму. Вы спугнете источник. Сорвете обряд. Вода и так уже отступила. Дуб засох. Нам все время мешают. Подставляют. Как тогда с артистом.</p><p class="p1">Лошадиное лицо перешло на крик:</p><p class="p1">— Вот только про артиста сейчас давайте не будем! У нас коллапс в стране, Хозяин в коме, а он мне про артиста тут будет напоминать, етить твою налево. Калачёвку оцепим, всех выселим, воду эту из-под земли достанем, обряд проведем, Хозяина вернем. Да, генерал?</p><p class="p1">Военный оживился:</p><p class="p1">— Да, Сергей Иваныч, правильно ты все сказал. Давно пора. От этих шарлатанов никакой пользы. Мы в два счета тут с тобой порядок наведем.</p><p class="p1">— Вы навели уже. — Седой привстал, с грохотом отодвинув кресло. — Вы водокачку зачем взорвали? Думали, оттуда сразу чудесный источник забьет?</p><p class="p1">— Спокойно, спокойно! Я все понял. — Куратор воздел к потолку коротенькие ручки. — Врачи говорят, у нас есть три дня. Это значит, что за три дня мы должны спасти ситуацию. На три дня я замораживаю снос Калачёвки. За это время Центр «Ы» должен найти недостающие компоненты для реинкарнации. Используйте все доступные вам средства. Всем все понятно?</p><p class="p1">— Я подчиняюсь только Хозяину, — сказал генерал, и его голограмма схлопнулась.</p><p class="p1">— Глупейшее из решений, — процедило лошадиное лицо на прощание.</p><p class="p1">— Не парьтесь. Эти упрямые ослы — моя проблема, — доверительным тоном обратился к седому и Баздееву куратор, — у них уровень доступа — семь. У нас с вами девять. Я дал вам карт-бланш. За это вы устроите мне встречу с Платоном в этой вашей аномальной зоне. Сегодня вечером. Время сообщу позднее.</p><p class="p1">Седой и Баздеев переглянулись.</p><p class="p1">— Только не надо мне рассказывать про галлюциногенную плесень в подвалах Калачёвки. Я точно знаю, что Шергины с ним там общались. С ним или с его духом. Неважно. Мне тоже надо. Срочно. Да-да, я много чего знаю. Работа такая. И вот еще что. Вы торопи́тесь, но не чрезмерно. Излишняя спешка нам не нужна. Мы же не блох тут ловим. Понятно? Нельзя напортачить. Судьба Родины у вас в руках. Кстати, что там было про детей и обряд, Осип? Три ребенка — это как-то связано с жертвоприношением? Вдруг мы не найдем третьего ребенка Безносова? Может, племянница сгодится для обряда? Проработайте все варианты. Ну, это я так, на всякий случай спросил. В общем, до вечера. Успехов нам.</p><p class="p1">В классе осталась только одна неподвижная голограмма. Седой молчал. Баздеев молчал в унисон.</p><p class="p1">— Перейди-ка на десятку, — взорвал тишину седой и растворился в воздухе. Баздеев нажал клавишу, и его чемоданчик озарился зеленым светом, наполнив класс ровным жужжанием бормашины. Баздеев вставил в уши костяные наушники.</p><p class="p1">— Вот так вот, Ося. Вот с кем мы работаем. Но мы с тобой знали это. И значит, мы все сделаем правильно. И Петьку им не сдадим.</p><p class="p1">— Ну, Игорь Николаевич. Если не куратор этот, то федералы до Безноса точно доберутся. Но поборемся, конечно, — устало сказал Баздеев. — Главное, чтобы они до Лизы Дейнен не добрались. Представляете, каких дел они могут с ее помощью натворить?</p><p class="p1">— Уверен, что они о ней ничего не знают?</p><p class="p1">— Уже нет. Ни в чем не уверен. К тому же, пока я тут перед куратором выступал, Шерга свое собрание проводила. И что она там со своей раздвоенностью придумала, я пока не знаю. Шеф! Эту тему нельзя ни на минуту из-под контроля выпускать. Конец связи. Жду вашего сигнала.</p><p class="p1">Баздеев выключил передатчик. В дверь кабинета литературы постучали. Сначала три раза робко. Потом три раза настойчиво. Баздеев положил наушники в дипломат и закрыл его. Подошел к дверям, но разумно встал не напротив, а рядом.</p><p class="p1">— Осип Алексеич, это я. Откройте. Нам срочно нужно поговорить. Я знаю, вы тут, — раздался из-за дверей высокий ломающийся мальчишеский голос.</p></span>
