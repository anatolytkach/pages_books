<span id="id16"><div class="title1">
<p class="p">Глава 14</p>
<p class="p">Дедлайн</p>
<p class="p">Булат Ханов<a href="ch2.xhtml#id1" class="a">[30]</a></p>
</div><p class="p1">Петя совсем запутался.</p><p class="p1">Он начал задаваться вопросом, как много переживаний способен вынести человек, прежде чем повредится рассудком. Тем более подросток. Тем более он, Петя Безносов, весь такой неуклюжий и нелепый.</p><p class="p1">После случая с куклой, висящей на дубе, Оля замкнулась в себе. Она не выходила из дома, не брала трубку, и только со слов Кати Петя знал, что Оля, пускай и несвоевременно, хотя бы ест и спит.</p><p class="p1">— Кроссовки мне в тот же день велела выкинуть, — сказала Катя. — Те, белые, помнишь?</p><p class="p1">О том, чтобы копать землю под дубом в поисках ключа, сейчас и речи не шло. Во-первых, в одиночку бы Петя все равно не решился, а во-вторых, сестры сочли бы его предателем. Это как раны ковырять, притом незажившие.</p><p class="p1">В школе безотрывно крутилась вокруг Леля Абрикосова. Она то просила телефон, чтобы срочно позвонить двоюродной тете (у самой он якобы разрядился, ага), то искала повода уколоть Петю.</p><p class="p1">— Избегаешь ты меня, Безносов, — произнесла Леля в столовой то ли задумчиво, то ли укоризненно.</p><p class="p1">— Ничего я не избегаю.</p><p class="p1">— Пойдем в кино сегодня?</p><p class="p1">— Я занят.</p><p class="p1">— Говорю же, избегаешь.</p><p class="p1">В их диалог вмешался Андрей:</p><p class="p1">— Кино? Я люблю кино. Пойдем вместе, Леля?</p><p class="p1">— Я за! Как насчет сегодня?</p><p class="p1">— Шикарно! Купишь мне билет?</p><p class="p1">Вместо ответа Абрикосова треснула Андрея ложкой по голове.</p><p class="p1">В тот же день Леля принялась заигрывать с Федей. Наблюдая за ее ужимками, Петя с нарастающей тревогой гадал, что она выкинет дальше.</p><p class="p1">А еще пропала Аня. Она перестала появляться в школе и исчезла со всех радаров, выйдя на связь лишь единожды. Обеспокоенный Петя пересказал одноклассникам странный телефонный диалог. Шергина требовала пятьдесят тысяч, и голос ее звучал до жути раздраженно. Даже во время самых ярых споров о политике Аня не была настроена столь категорично.</p><p class="p1">— Кому ты хоть деньги переслал?</p><p class="p1">— Некоему Эдуарду Анатольевичу К. Понятия не имею, кто он такой.</p><p class="p1">Все недоуменно переглянулись.</p><p class="p1">— Опять она что-то затевает, — предположил Андрей. — Как с «курагой».</p><p class="p1">— Почему тогда из Москвы уехала? — спросил Вася.</p><p class="p1">— Что, если не уехала?</p><p class="p1">— А пятьдесят тысяч ей для чего?</p><p class="p1">— Мне и самому интересно — для чего? Одно ясно: Шергиной известно побольше нашего.</p><p class="p1">В пятницу перед самым уроком Глюкоза объявила, что на химии перед учениками выступят уполномоченные из специального комитета Департамента образования. Школьники почуяли неладное. Чтобы Глюкоза позволила кому-нибудь отнять у нее часть урока? По доброй воле, без кровавой битвы? Что это за уполномоченные такие всемогущие?</p><p class="p1">Гостей из комитета было двое. Рыжеволосая женщина в оливковых брюках и белом свитере с закатанными рукавами назвалась специалистом по геологии и геодезии Идой Максимовной. Она представила и своего спутника — Осипа Алексеевича, таинственного бюрократа с прямоугольной головой и хищными синими глазами. Молчаливый до поры Осип Алексеевич в сером костюме-двойке не выпускал из рук темный дипломат.</p><p class="p1">— Прямо <em>G-man</em> какой-то, — шепнул Дорохов.</p><p class="p1">— Кто-кто? — не понял Петя.</p><p class="p1">Глюкоза призвала их к порядку, и они замолчали.</p><p class="p1">Ида Максимовна умными словами объяснила, какая опасность грозит жителям Калачёвки, если они не переедут. Глубинная эрозия почвы, спровоцированная запрятанными под землей источниками, подтачивает фундаменты. Помещения медленно, но верно захватывает неистребимая грибковая плесень всех цветов, которая источает ядовитые миазмы и приводит к пневмонии, астме и заболеваниям опорно-двигательного аппарата. А капитальный ремонт ничего не исправит, только на короткий срок отсрочит неминуемое разрушение зданий.</p><p class="p1">Осип Алексеевич сухо добавил, что проживание в Калачёвке представляет высокий риск для жизни, поэтому муниципальные службы во избежание непредвиденных последствий ускоряют переезд.</p><p class="p1">— Надеемся, Новый год вы встретите в новых квартирах, — закончил Осип Алексеевич. — Мы все должны быть заинтересованы в этом.</p><p class="p1">Пете даже показалось, что чиновник добавит: «Не так ли?», но вместо этого уполномоченные из специального комитета сослались на неотложные дела и покинули кабинет.</p><p class="p1">— Шут знает что такое, — пробормотала Глюкоза, когда дверь за гостями закрылась.</p><p class="p1">Впрочем, озадаченность на ее лице моментально исчезла, едва лишь ученики бросились спрашивать, что Глюкоза обо всем этом думает.</p><p class="p1">— Под шумок вы решили химию сорвать, верно? — прикрикнула она.</p><p class="p1">Когда прозвенел звонок, Петя на автопилоте собрал портфель и вышел. Значит, расселят к Новому году. Потому что эрозия почвы. И грибок. И это никак не проверить, не опровергнуть.</p><p class="p1">Разве что нанять независимых экспертов.</p><p class="p1">Точно, надо поговорить об этом с Федей и Андреем. На подкуп у них средств, конечно, не хватит, зато ученых со стороны привлечь можно. Чтобы определить, насколько стоит доверять специальному комитету.</p><p class="p1">Размышления Пети прервал Осип Алексеевич. Он в одиночестве стоял в коридоре и безотрывно смотрел на Безносова.</p><p class="p1">— Вы ищете выход? — Петя смутился.</p><p class="p1">— Малость заблудился. Проводишь меня до уборной?</p><p class="p1">По дороге в уборную Осип Алексеевич сказал:</p><p class="p1">— Хорошая у вас школа. Не жаль с ней расставаться?</p><p class="p1">— Очень жаль, — признался Петя.</p><p class="p1">— Удобный район, старые друзья, любимые учителя… Понимаю.</p><p class="p1">Насчет учителей Безносов бы поспорил, но не с этим скользким типом.</p><p class="p1">— Ты ведь Петя, правильно?</p><p class="p1">Безносов аж споткнулся.</p><p class="p1">— Мы с Кириллом Владимировичем в свое время занимались различными проектами. — Осип Алексеевич будто и не заметил, как Петя изумился. — Он был прекрасным человеком. Искренним, щедрым, преданным общему делу. Думаю, ты станешь ему достойным сыном.</p><p class="p1">— А какими делами… Какими проектами вы занимались?</p><p class="p1">Осип Алексеевич переложил дипломат из правой руки в левую и достал из внутреннего кармана визитку.</p><p class="p1">— Позвони мне при случае. Нам есть о чем поговорить. О Калачёвке, о русле подземной реки, о снесенной церкви святого Трофима.</p><p class="p1">При упоминании церкви Безносов вздрогнул.</p><p class="p1">В этот момент они добрались до туалета. Чиновник с прямоугольной головой внимательно поглядел на Петю и произнес:</p><p class="p1">— Будьте осторожнее с Лизой. У нее редкий дар. Будет жаль, если она использует его понапрасну.</p><p class="p1">— Понапрасну?</p><p class="p1">— Каждое чудо, Петенька, требует колоссальных энергетических затрат и не проходит бесследно для того, кто чудеса творит. Поэтому берегите вашу одноклассницу.</p><p class="p1">Безносов, сконфуженный доверительной интонацией и особенно «Петенькой», опустил глаза от такой фамильярности.</p><p class="p1">— Тебе, наверное, пора к друзьям, — сказал Осип Алексеевич. — Скоро звонок. Выход я найду.</p><p class="p1">Чиновник скрылся за дверью. Петю не удивило бы, если бы загадочный незнакомец телепортировался в свое учреждение прямо из кабинки.</p><p class="p1">Безносов, все еще донельзя смущенный, посмотрел на визитку.</p><div class="cite">
<p class="p1"><strong>Баздеев Осип Алексеевич</strong></p>
<p class="p1"><strong>доктор философских наук</strong></p>
<p class="p1"><strong>куратор образовательных проектов</strong></p>
</div><p class="p1">Ниже адрес и два телефонных номера: служебный и мобильный.</p><p class="p1">Хотя Петя и не мог похвастаться богатым жизненным опытом, даже он осознавал, что переезды и расселения — это уж точно не забота школьного департамента. А образовательные проекты с жилищными пересекаются мало.</p><p class="p1">Когда Безносов вернулся в класс, выяснилось, что специальных уполномоченных никто не обсуждает, так как появились вести поважнее.</p><p class="p1">— Шерга позвонила! — сказал Федя Дорохов.</p><p class="p1">По сияющему лицу друга Петя догадался, что Аня сообщила кое-что значительное.</p></span>
