<p class="p">Теория большого фокуса</p>
</div><p class="p1">Однажды летом 2018 года, в час небывало жаркого заката, в Москве, на Пушкинской площади появились две гражданки… Думается, историю возникновения романа-буриме «Война и мир в отдельно взятой школе» стоит начать именно так. Почему? Во-первых, в ней множество по-булгаковски фантастических (при этом абсолютно реальных) поворотов, мистических совпадений, невероятных случайностей и чудесных стечений обстоятельств. Во-вторых, тень самого Михаила Афанасьевича, а также целого сонма других литературных знаменитостей не раз промелькнет на страницах романа. В-третьих, это большое приключение действительно началось в солнечном июле аккурат у подножия памятника Александру Сергеевичу.</p><p class="p1">Разговор двух гражданок, как водится, несся бурным полноводным потоком, перепрыгивая с пятого на десятое, и в какой-то момент добрался до любимой «книжной заводи». Речь зашла о литературных экспериментах, и как-то сами собой вспомнились «Большие пожары» — коллективный роман, придуманный Михаилом Кольцовым для журнала «Огонек» на излете 1920-х годов. Изобретательный главред предложил тогда самым ярким звездам молодой советской литературы — Александру Грину, Леониду Леонову, Исааку Бабелю, Борису Лавренёву, Алексею Толстому, Михаилу Зощенко, Вениамину Каверину и другим — написать приключенческий роман. Каждому автору было отпущено по главе, в которой он должен был подхватить сюжетную линию предшественников и завязать ее потуже да позанимательней. «Пожары» были написаны быстро, буквально за год, но по разным причинам почти 80 лет пролежали на полке и вышли отдельным изданием лишь в 2009-м.</p><p class="p1">«А что, если нам повторить этот фокус? — хором воскликнули гражданки. — Собрать команду писателей — взрослых и детских, известных и покамест не очень. И создать современную, захватывающую, авантюрную историю для подростков. Одну на всех. И чтобы там были и приключения, и любовь, и чудеса, и дружба с предательством». Не сговариваясь, гражданки дружно посмотрели вверх — прямо в бронзовое лицо классика. И, честное слово, он им едва заметно подмигнул…</p><p class="p1">Сегодня мы понимаем, что со стороны наш проект поначалу казался утопическим. По сути, он и был таковым. И все получилось только потому, что мы просто не знали, что беремся за невыполнимое. Как усадить в одну лодку и убедить плыть в одном направлении 24 писателя? У каждого свои убеждения, эстетические принципы, свой жизненный опыт и взгляды на мир. Свое творческое самолюбие, наконец! Писательское дело (если, конечно, вынести за скобки братьев Гримм, Стругацких или Вайнеров) — это путь одинокого воина, идущего лишь одному ему ведомым путем и играющего исключительно по собственным правилам. На это мы и сделали ставку, пообещав каждому «игроку», что не будем ни во что вмешиваться. В своей главе каждый — и капитан, и штурман, и лоцман. Может казнить и миловать, если будет на то его авторская воля.</p><p class="p1">Разные голоса в итоге слились в общий хор, однако не потерялись в нем, а придали мелодии неповторимое звучание. Конечно же, стоит иметь в виду, что перед нами литературный эксперимент, некая проверка авторов на «абсолютный слух». От внимательного читателя не ускользнет, что не все сюжетные узлы оказались распутаны, а некоторые нити, с виду такие яркие и крепкие, так и не вплелись в общий узор повествования. Что-то искажалось, преломлялось, а то и вовсе исчезало бесследно. Картина в итоге вышла фантасмагоричной и все же завершенной — в этом и была суть нашей игры без правил.</p><p class="p1">История, задуманная как подростковая (и публиковавшаяся по мере написания на сайте о детском и юношеском чтении), обернулась прозой на злобу дня, где переплелись и сюрреализм, и мистика, и литературные аллюзии.</p><p class="p1">Начать роман мы попросили замечательно изобретательного Дениса Драгунского. Именно ему принадлежит идея отсылки повествования к краеугольному тексту русской литературы — эпопее Льва Толстого «Война и мир». Созвучные толстовским имена героев с первой главы задали проекту высокую планку и определили характеры персонажей, что, впрочем, не помешало им начать новую жизнь, без оглядки на свои классические прототипы. И юные герои на деле оказались весьма своенравны. В отличие от хозяйки петербургского салона Анны Павловны Шерер, юная москвичка Аня Шергина не намерена довольствоваться ролью второго плана — она метит в примы. Как и крошечная Лиза Дейнен, унаследовавшая от «маленькой княгини» Лизы Болконской рост, имя и любовь к своему «князю» — роскошному Андрею Лубоцкому. На страницах романа вы встретите и «внезапного наследника» Петю Безносова — доброго смешного увальня, и задиру Федю Дорохова, и милых сестричек Наташу и Соню Батайцевых, и красотку Лелю Абрикосову с теми самыми мраморными плечами. Они будут ошибаться и падать, любить и страдать, смеяться и плакать, бороться, проигрывать и побеждать. Им предстоит столкнуться со злом и несправедливостью, научиться решать отнюдь не детские задачи и поминутно делать выбор, от которого зависит не только их будущее, но сама жизнь.</p><p class="p1">Перед тем как перенести вас в Замоскворечье, где Аня Шергина собирает одноклассников на вечеринку по случаю окончания учебного года и даже не подозревает, что неумолимая судьба уже стучится в дверь, позвольте еще пару слов о наших необыкновенных авторах — настоящих смельчаках и благородных авантюристах, вместе с нами поверивших в чудо и создавших его своими руками. Пожалуй, пора перечислить их всех: Денис Драгунский, Игорь Малышев, Григорий Служитель, Эдуард Веркин, Нина Дашевская, Алексей Сальников, Елена Нестерина, Мария Ботева, Александр Феденко, Анастасия Строкина, Сергей Лукьяненко, Дарья Бобылева, Серафима Орлова, Владимир Березин, Александр Григоренко, Булат Ханов, Антон Соя и Дмитрий Быков (все они живут в России), Валерий Бочков (США), Артем Ляхович (Украина), Ильгар Сафат (Азербайджан), Николай Караев (Эстония). Один из авторов остался и вовсе загадкой — глава Антонины Книппер пришла к нам самотеком. Изначально, помимо писателей, с нами были 24 художника — каждой «электронной» главе полагался свой иллюстратор. В бумажную версию книги попала работа Екатерины Самсоненковой — и сразу на обложку.</p><p class="p1">Вы спросите, легко ли было уговорить авторов на этот творческий подвиг? По-разному. Мальчики оказались куда смелее девочек — во всяком случае, их в нашей компании куда больше. Кто-то поначалу отказывался, но роман не отпускал, преследовал, нашептывал, звал… И вот уже писатель обнаруживал себя в самой гуще повествования с практически готовой главой в кармане.</p><p class="p1">А еще у нас была «шпаргалка», где каждый участник оставлял напутствие последователям — делился своим видением сюжета, размышлял, как могут сложиться судьбы героев, предлагал ответы на разбросанные по тексту загадки. Как написал Алексей Сальников: «Хочется, конечно, чтобы в конце была не россыпь брильянтов и золота, а что-то невероятное». Получилось ли у авторов достичь «невероятного», судить вам. Нам кажется — получилось. Наша игра в буриме обернулась цельным произведением, «собраньем пестрых глав», какого в новейшей истории русской литературы вроде бы еще не было. Для тех, кому важны точные цифры, заметим: на создание коллективного романа «Война и мир в отдельно взятой школе» ушло полтора года.</p><p class="p1">Мы благодарим команду «Редакции Елены Шубиной» за интерес и внимание к проекту.</p><p class="p1">А теперь… За нами, читатель!</p><div class="cite">
<p class="text-author">Гражданки</p>
<p class="text-author">Анастасия Скорондаева,</p>
<p class="text-author">Анна Хрусталева</p>
