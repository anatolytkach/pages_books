<p class="p">Глава 23</p>
<p class="p">За миллиард воль до конца света</p>
<p class="p">Николай Караев</p>
</div><p class="p1">— <em>Prince Andrew! Wake up! Wake up, Neo!</em><a href="ch2.xhtml#id34" class="a">[43]</a></p><p class="p1">Океанское дно сотряс подземный толчок, время ускорилось, и Андрея вынесло из бездны снов на поверхность яви. Нехотя разлепились глаза. Ночь, больница, тишина. Сопение соседей по палате. За окном привычно густела тьма.</p><p class="p1">Справа и слева от койки стояли двое. Андрей моргнул. Зеркальная пара стариков, неуловимо знакомые лица. Глядят один на другого. Минуту или две ничего не происходило, и Андрей успел убедить себя, что ему чудится; тут старики синхронно вытянули правые руки и схватили друг друга за бороду. «Это кошмар, — решил Андрей. — Перевернуться на бок. Одеяло на голову, уснуть и…» Пошевелиться было невозможно.</p><p class="p1">Старики между тем расплылись сизым дымом, тоже с завидной синхронностью, но бород из кулачищ не выпустили. Они образовали словно бы кольцо, которое кружилось: медленно, быстрее, еще быстрее — и на Андрея стала наползать вихрящаяся воронка. Адреналин сжег предохранители. Андрей — сейчас, пожалуй, и правда сверхчеловек — выпрыгнул из койки, нырнул под воронку, помчался к двери. Кольцо рвануло следом. Коридор дрожал, изгибался, будто кишка гигантского гада, трясся, лягался, искрил…</p><p class="p1">Андрей помотал головой. Выныривая из кошмара, зажмурился и резко открыл глаза. Ночь, тишина. Не больница. Он не в койке из-за вегетососудистой этой, как ее. Он стоит босиком на асфальте. Впереди готическим замком высится «двенашка» имени ирландца, имя которого их учили произносить правильно: не Шоу, а Шо. Само собой вырвалось:</p><p class="p1">— Шо за нафиг?</p><p class="p1">— Сомнамбюлизм, мсье Лубоцки, — тихо сказали рядом, коверкая фамилию на французский манер. — Но вы вовремя. <em>Give me a second, I’ll call your dear comrade</em><a href="ch2.xhtml#id32" class="a">[44]</a>.</p><p class="p1">Саднили ступни. Кто-то внутри прошептал: «Я одно понимаю: что все мерзко, мерзко и мерзко». Оборачиваться не хотелось.</p><p class="subtitle">* * *</p><p class="p1">В такие вечера, когда отец улаживал дела с мегапроектищем — небось и заночует в своем Москва-Сити, — а мама усвистывала на маникюр, фитнес или массаж, Ане делалось скучно. Напевая какую-то чушь — <em>Caper the caper, sing me the song, death will come soon to hush us along</em><a href="ch2.xhtml#id30" class="a">[45]</a>, откуда это? — она тащилась на кухню, брала пакет с чипсами, хрустела ими под тиканье напольных часов. Сериал, что ли, посмотреть? Не в телефон же тупить. Анна, ты не овца. И тебе уже семнадцать ле-ет…</p><p class="p1">— Аф-ф-фца, — протянула она. — Почитай книжку, спаси бобра! (Вспомнилась Лиза в больничке, с таким лицом, что вот-вот разревется. Извини, Бобер, Андрей — мой. Выдыхай, Бобер!)</p><p class="p1">Пробежим же глазами по корешкам. Шекспир, прости, нет, хватит с меня театрального позора. К тому же, спасибо Чхонии, шекспировские герои все заговорили в голове Ани с грузинским акцентом: «Бит ылы нэ бит?» Жут! А что это за синий и красный переплеты без названий присоседились к Набокову? Что за книжки, почему не знаю?..</p><p class="p1">Красный оказался фотоальбомом. Внутри рассованы кое-как черно-белые, желтеющие снимки советско-юрского периода. Буераки, лагерь… геологи, что ли? Полуголые улыбчивые парни с лопатами… А, нет, на камнях фигурно и любовно разложены черепки. Археологи. Этот на отца похож. А этот на Батайцевых, на обеих… Оч-чень интересно. Откуда оно у нас?</p><p class="p1">Открыв синюю книжку, Аня обнаружила и вовсе диковинное диво — альбом с марками. Родителей филателия не интересовала никогда. Что-то забрезжило в памяти. Вечеринка у Безноса, куда ее не звали, а она приперлась, такой же альбом на столе… И марки странные. Доберман, зеленая моль, настольная лампа, красный крест…</p><p class="p1">Зачирикал домофон. Аня бросила альбом, подскочила, нажала на кнопку:</p><p class="p1">— Кто?</p><p class="p1">— Письмо госпоже пишущей машинке, — прокряхтели в ответ.</p><p class="p1">— Что? Какой машинке? — В трубке заскрежетало, тут же тренькнул дверной звонок. Аню передернуло от испуга. На цыпочках подойдя к двери, она приложилась к глазку. К лестнице семенила старушка в кроссовках, а на коврике белело нечто.</p><p class="p1">Выждав полминуты, Аня щелкнула замком и схватила свернутый лист бумаги. «ЭРИКЕ». Внутри — записка: «СЕГОДНЯ В ПОЛНОЧЬ У ШКОЛЫ. <em>BE ON TIME. AND TAKE THE STAMPS WITH YOU</em><a href="ch2.xhtml#id28" class="a">[46]</a>».</p><p class="subtitle">* * *</p><p class="p1">Лизе Дейнен не спалось. Горела щека, по которой хлестнула сгоряча мама. Перед глазами рябило, как в телевизоре, настроенном на мертвый канал. Горе от ума, подумала Лиза. Во многия чтения многия печали. Реактивная психика. Достаточно было вынуть карту из основания, чтобы домик-то и посыпался. В телевизоре меж тем проступил кадр с Марьей Алексевной. «Зеркало» Тарковского, да-да. Исчезающий след от чашки чая. Призраки. Пропажи. Амнезия. Аллопсихическая деперсонализация. Если бы я пила, я бы сказала, что допилась. Андрей…</p><p class="p1">Би-бип. Лиза, не покидая полудремы, нащупала смартфон, вибрировавший на тумбе… нет, не на тумбе — на блокноте. С Пушкиным кисти Петрова-Водкина. Весь этот бред. Ну, кто еще?</p><p class="p1">Эсэмэс с неизвестного номера. «Лиза, доброго хроноса. Сим удостоверяется, что Вы избраны для контакта с Высшим Разумом (далее ВыРаз)… (<em>What the hell</em>?<a href="ch2.xhtml#id26" class="a">[47]</a>) …с целью дачи показаний на судебном процессе по делу „Проксима Центавра <em>vs</em> Человечество“ в рамках среднегалактического судопроизводства тринадцатой инстанции. Сердечно Ваш, ВыРаз».</p><p class="p1">— Вашу Машу, — ругнулась Лиза. — Шо за нафиг? (Так сказал бы Андрей. Вот точно так и сказал бы.)</p><p class="p1">Би-бип. «Повестка: гражданке Дейнен Елизавете Сергеевне надлежит явиться сегодня в 00:00 к гимназии № 0012 им. Б. Шоу для контакта с терминалом Среднегалактического Суда».</p><p class="p1">Би-бип. С другого номера. «Тентаклей нет, но вы держитесь. Обидчики будут обижены. С приветом, гуманоиды».</p><p class="p1">Би-бип. Еще один номер. «Конек Ваш, Горбунок наш. Даже не думайте. Противная сторона».</p><p class="p1">Би-бип. Снова с первого: «Бамбарбия. Давление на свидетеля обвинения прекращено. Киргуду».</p><p class="p1">Лиза посмотрела на часы, отбросила одеяло и стала лихорадочно одеваться. Что-то я должна не забыть, думала она. Ах да, блокнот. Вот он. С Пу… Щаз. С Коньком-горбунком.</p><p class="subtitle">* * *</p><p class="p1">Что до Пети Безносова, у него всего лишь зазвонил кнопочный бабушкофон. Черным на сером вспыхнуло имя: «Павел Ш.» Отец Шерги перезванивает? Ночью? Петя глядел на экран, пока не умолк пятый звонок, нажал на кнопку, неловко поднес допотопный аппарат к уху:</p><p class="p1">— Э… Павел Николаевич?</p><p class="p1">— Пал Николаич, мсье Безнософф, — незнакомый голос сделал ударение на последнее «о», — не перезвонят-с. Но ежли вы, барин, удумаете чего прознать о покойном батюшке и его <em>liaisons dangereuses</em><a href="ch2.xhtml#id24" class="a">[48]</a>, воспользуйтесь рецептом из «Дракулы»: надоть ровно в полночь перелезть через низкую ограду кладбища.</p><p class="p1">— Ничего не понял, — сказал Петя.</p><p class="p1">— Молодежь, — удручился голос, — шуток не понимаем. Отказываемся узнавать аллюзии без пальто! Короче, Петр, ждем вас в двенадцать нуль-нуль перед «двенашкой». Будут ваши друзья-однополчане и я, который, ха-ха, все вам объяснит.</p><p class="p1">Откашлявшись, голос прибавил:</p><p class="p1">— Вам привет от Кирилла Владимировича. Он и не рад, что впутал вас в эту историю. Но я за вас поручился. До связи.</p><p class="subtitle">* * *</p><p class="p1">Теперь их стало пятеро. Андрей, переступая с ноги на ногу (незнакомец вручил ему меховые тапочки без задников, в них было теплее, но не слишком), сумрачно наблюдал за одноклассниками. Сначала, явно не сговариваясь, с двух сторон подошли Лиза и Анька, растрепанные красавицы; одарили друг друга страшными взглядами, тихо буркнули: «Шерга, привет», «<em>Hello</em>, Бобер» — и застыли на непочтительном расстоянии. Потом явился Безнос со знаменитым кнопочным телефоном в руке.</p><p class="p1">Незнакомец, мужик среднего роста в длинном плаще, наблюдал за сбором отстраненно, иногда разминая затекшую шею и превращаясь в такие секунды в китайского болванчика. Из-за солнечных очков мужик походил на насекомое. На черной рэперской шапочке была вышита белым буква; сперва Андрею казалось, что это М, потом — что W, затем он понял, что М и W возникают попеременно, как картинки на стереооткрытке, меняющей угол наклона и освещения.</p><p class="p1">— Экипаж подлодки «Комсомолец Мордора» прибыл! — оповестил мужик подростков. — Нуте-с, вперед, прошу…</p><p class="p1">— Куда вперед? — заголосила Анька. — Вы кто? Чё за фокусы? Может, вы маньяк! Тед Банди какой-нибудь…</p><p class="p1">— Что за галактический суд? — спросила Лиза тихо, стараясь не глядеть на Андрея.</p><p class="p1">— Что значит «привет от отца»? — крикнул Петя. Остальные посмотрели на него очень внимательно.</p><p class="p1">Мужик развел руками.</p><p class="p1">— Боитесь? Кого? Четыре крепких тинейджера не дадут отпор стареющему мне? Да один Лубоцкий стоит десятерых. Хотя скажут, что вас было четверо. А вы, госпожа пишущая машинка, не злитесь, кудасай<a href="ch2.xhtml#id22" class="a">[49]</a>. — Аня зло скривилась. — Марки принесли? Сейчас все будет: и суд, и отец, и белка, и свисток. Прошу в кабинет литературы, там поговорим. У меня для вас презабавнейшее известие. Дверь открыта, сторож спит, заходите. Молодым везде у нас дорога. Как сказано у классика: вам — везде!..</p><p class="p1">Пока четверка, озираясь и кучкуясь, шагала по темным школьным коридорам, мужик продолжал сыпать явными цитатами, по большей части невесть откуда. В кабинете литры их ждал сюрприз: на одной из парт уже заливалась стеариновыми слезами толстая свеча. Сурово взирали со стен портреты классиков. Вокруг парты были расставлены стулья.</p><p class="p1">Расселись. Первой бухнулась на стул Анька, подле присел Петя. За Петей — Лиза. Андрей шагнул было к ней, но, поймав взгляд Шерги, опустился рядом с ней. Между ним и Лизой занял последний стул мужик, не снявши ни шапочки, ни очков; впрочем, по пути мужик расстегнул плащ, под которым бугрилась серая толстовка.</p><p class="p1">— Ну, господа юнкера? Вопросы есть?</p><p class="p1">— Вы кто? — повторила Анька.</p><p class="p1">— Агент Купер, — сказал мужик. Взялся за лацкан плаща и прошептал: — Дайана, Дайана! Я веду прямой репортаж из Красного Вигвама, вижу танцующего карлика!.. М-да. Ладно, шутки в сторону и, как грится, к барьеру. Зовите меня Билибин.</p><p class="p1">— Как художника? — спросил Петя. — Который… — косой взгляд на Андрея — …ну, лубки к былинам рисовал?</p><p class="p1">— Былибин! — прыснула Аня.</p><p class="p1">— Все-таки вы, барин, бестолочь, — изрек мужик. — Билибин есть персонаж книги, которую вы должны были уже и одолеть согласно, как тут говорят, школьной программе. Би-ли-бин. Не билирубин и не баян «Рубин». Прошу не путать.</p><p class="p1">— Да, но кто вы такой и откуда всех нас знаете? — Это к Лизе вернулся боевой настрой.</p><p class="p1">— Да кто ж вас не знает! Тоже мне, парадокс Банаха — Тарского. Просто я специалист по шагам в сторону. Потому как, чтобы понять, что происходит, надо сделать шаг в сторону. Ну, вот песня про меня есть. У-у-у!.. — вдруг немузыкально завыл он, и это было бы смешно, если б не было так сюрреалистично. — Я редкоземелен, как ли-итий! У-у-у! Я не сопротивляюсь ходу собы-ытий!.. А еще, — сообщил он, поправляя очки, — я тайный узбек. И бессмысленно делать вид, что ты кто-то друго-о-ой… Что, БГ никто не слушает? — спросил он резко, всматриваясь в недоуменные лица. — М-молодежь… Океюшки. Давайте так. Вы все пришли сюда, желая что-то узнать. Слишком много загадок. Вы зашли в тупик, каждый в свой. Лиза вон надеется только на волшебный блокнот, обнуляющий миры… и возлюбленных. Не краснейте, Лиза, это вам не голышом в пене «Адам и Ева» по чужим квартирам скакать… Петр надеется на тайные знаки покойного отца. Да, нам вечно чудится, что Там знают больше, чем Здесь. Неясно только, как вы умудрились забыть о том альбоме с марками… Андрей, у вас, дзаннэн-ни<a href="ch2.xhtml#id19" class="a">[50]</a>, драма личного свойства. И вы в ней так увязли, что и про оккаметрон небось запамятовали? Анна, вы так боитесь, что у вас раздвоение личности, что вытеснили Эрику в подсознание. Еще у вас семейные траблы, мать-отец, прыщи-свищи, Офелия, о нимфа, курага-мамалыга… Клад под дубом. Подземные эсэсовцы. Полиция — картофельное пюре. Взрыв водокачки. Месть сектантов за Трофима, прости господи, Ираклионского. Ребята, вы вот правда думаете, что я вам сейчас возьму и все это популярно объясню?</p><p class="p1">Все молчали, потому что так и думали. Первой встрепенулась Лиза:</p><p class="p1">— А бред про гуманоидов… Это вы так шутите? Якобы меня вызвали в космический суд обвинять человечество…</p><p class="p1">— Кому не хочется обвинить человечество? — поморщился Билибин. — Кто даст гарантию, что правды нет и выше?</p><p class="p1">— И насчет отца, — сказал Петя. Билибин пожал плечами. — Господин Билибин, вы… дурак. И шутки у вас дурацкие.</p><p class="p1">— Марки, — сказала Аня. — Зачем вам марки? — Она швырнула на парту несчастный альбом.</p><p class="p1">— Там зашифрованное послание, — сказал Билибин. — Ваша маман, конечно, нашла что красть… Ну, Петр, рискнете? А то я у вас уже и дурак…</p><p class="p1">Петя открыл альбом. Доберман и бабочка <em>Earias clorana</em> на месте, первые буквы слов исправно складываются в <em>DEAR FRIEND</em>. В следующем ряду: красная марка <em>Federation of South Arabia</em>, гашеная советская «Выдающийся русский писатель Г. И. УСПЕНСКИЙ», американский тринадцатицентовик <em>COLORADO</em>, голубой кораблик перед маяком под словом <em>Kuwait</em>, мексиканская марка с неприятным мужчиной по имени Окампо, советская с каким-то Фучиком…</p><p class="p1">— Эф… У, то есть ю… Си… Кей… — сказал Петя и обиженно замолчал. Будто надеясь на что-то, продолжил: — Оу… Эф… Эф…</p><p class="p1">Все вздохнули.</p><p class="p1">— <em>And</em> начинанья <em>of great pitch and moment</em>, — сказал Билибин торжественно, — <em>with this regard</em> сворачивают ход <em>and lose the name of action</em>…<a href="ch2.xhtml#id18" class="a">[51]</a> Сочувствую.</p><p class="p1">— Но зачем отцу…</p><p class="p1">— Чего сразу «отцу»? Не возводите на покойного напраслину.</p><p class="p1">— Но тогда кто?.. — Петя был в отчаянии.</p><p class="p1">Билибин развел руками:</p><p class="p1">— Звиняйте, барин. Чего не вем, того не вем. Я ведь не сам, я токмо по наущению…</p><p class="p1">— Хватит!</p><p class="p1">Это был Андрей. Невзирая на смешной больничный вид, он был не смешон: расправленные плечи, пар из ноздрей, гиперболоид взгляда сверлит неприступные крепости билибинских очков…</p><p class="p1">— Хватит так хватит, — согласился Билибин. — Слушайте, дети, и запоминайте. Вы пришли сюда в надежде на ответы. Разделяя чаяния, вынужден огорчить. Не то чтобы я не знал ответов. Некоторых, — подчеркнул он, — ответов. Но вам они ни к чему. Хуже того: <em>timeo Danaos et dona ferentes</em><a href="ch2.xhtml#id16" class="a">[52]</a>. Вам довелось набрести на дырку в декорации, вы в нее заглянули, увидели за кулисами нечто. Только по эту сторону никто не считает себя актером, все уверены, что живут взаправду, — живут, не играют. Какова цена их объяснениям? И если кто-то скажет: «Я все объясню», — защищайтесь от сирен берушами…</p><p class="p1">— И очками — от мигалок, — сказала Лиза, после «хватит» Андрея осмелевшая вконец.</p><p class="p1">— Совершенно верно. — Билибин кивнул. — Иначе рискуете заплутать в лабиринтах ложных бинарностей. Добро и Зло как абсолютные, туды их в качель, категории. Ночной — Дневной Дозор. Сектанты против черных археологов. Коньки и Горбунки. Прыщи и свищи. Противоположность единств, единство противоположностей! Да, мир — сложная штука, в нем полно всего, и это все как-то соотносится. Скажем, Осип Алексеевич Баздеев уверен, что дело в сознательных реинкарнациях. Если задуматься, это ерунда: такие реинкарнации — удел исключительно высших бодхисаттв. Но ход мысли-то верный! Еще одного персонажа убедили: во всем-де виновата Волна. И тут есть доля истины, но другой. О вашем, Андрей, оккаметроне фон Карлсона и не говорю. А уж многоглазый улей жизни, Годзилла, дракон на стенке, кажущиеся мертвецы, дурные бесконечности…</p><p class="p1">— Старушки в кроссовках, — подсказала Аня.</p><p class="p1">— Это кое-кто увлекся сериалом <em>Falling Water</em>, — странно объяснил Билибин. — Хорошо, что не «Утопией». Как в анекдоте: скажи спасибо, сынок, что ты не похож на Микки-Мауса! Кстати, о сериалах: кто смотрел «Евангелион»?</p><p class="p1">Андрей и Лиза подняли руки и обменялись робкими взглядами. «Евангелион» они смотрели, понятно, вместе. Лизе страшно понравилось, Андрею — наоборот.</p><p class="p1">— Это такое аниме, — пояснил Билибин для Пети и Ани. — В нем много чего происходит, но всякий раз один тайный уровень оказывается придатком следующего. А на верхушке пирамиды сидит человек, для которого перерождение Вселенной — лишь побочный эффект от воскрешения жены. В таком вот аксепте. Я что хочу сказать. На ваши вопросы нет одного ответа — мы не в «ЧГК» играем. Ответов много. Смотря какой пласт реальности брать, а они в динамике. И взаимодействуют… Граф был прав, хоть и Лев. Убеждаясь в совершенной недоступности причин, мы вместо них ищем законы. Понимаете? Причины непостижимы. Для их постигновения надо быть Богом. Мы — не он. Не стоит и любопытствовать…</p><p class="p1">— Что это за законы? — спросил Андрей с интонацией злого следователя.</p><p class="p1">— Они просты. Сколько бы уровней и заговоров мы перед собой ни видели, в мире есть две силы. Сила Дэ и сила Тэ. И я не про инь-янь-хрень — забудьте ложные дихотомии. Силы всего две. Одна предлагает стать сверхчеловеком. Другая, наоборот, требует остаться людьми. И любой наш выбор всегда сводится к выбору между силой Тэ и силой Дэ…</p><p class="p1">— Дэ — как Дао? — спросила Аня.</p><p class="p1">— Приятно иметь дело с умными людьми! А Тэ как Тао, — Билибин ухмыльнулся. — Не зацикливайтесь на названиях. Человеки и сверхчеловеки — вот главное! Одна сила делает тебя демиургом. Вторая твердит: ты не лучше других. Стать или остаться, <em>that is the question!</em><a href="ch2.xhtml#id14" class="a">[53]</a></p><p class="p1">— Вы сами-то выбрали? — спросила Лиза саркастически, в тон Билибину.</p><p class="p1">Тот сцепил пальцы и положил на них подбородок.</p><p class="p1">— Я сам-то выбрал. Но что именно — не скажу, хотя догадаться легко. Беда в том, что мой выбор не дает мне права разглашать… мой выбор. Даже эксперимент накладывает ограничения на наблюдателя…</p><p class="p1">— Так мы все у вас морские свинки, — едко заметила Аня.</p><p class="p1">А Андрей спросил:</p><p class="p1">— Что за эксперимент?</p><p class="p1">— В том и дело, — ответил Билибин как-то даже грустно, — что это все не эксперимент. И никто не наблюдатель. И тем не менее…</p><p class="p1">— Вы сами себе противоречите, — бросила Лиза.</p><p class="p1">— Я, как Платон Каратаев, да. Непротиворечивы стройные теории. Но они ничегошеньки не объясняют… <em>Revenons à nos moutons</em><a href="ch2.xhtml#id12" class="a">[54]</a>. Вы четверо — и другие ребята из вашего класса — действительно попали под Волну с большой буквы «вэ». Но Волна, как совы, не то, чем кажется. Волна ставит вас перед выбором. Каждый из вас сделает выбор, от которого, так получается, зависит очень многое. Почему — не спрашивайте. Что и когда — тоже лучше не. И вы не одни такие — речь, как сказал бы граф, о равнодействующей миллиардов воль, — но вы в силу обстоятельств и своей природы вольны выбрать большее.</p><p class="p1">— Это вы нам сейчас повесть Стругацких пересказываете, — сказала Лиза. — «За миллиард лет до конца света», да? А от выбора одного человека, — она метнула ненавидящий взгляд в Андрея, — ни фига не зависит. Ни-фи-га.</p><p class="p1">Билибин кивнул.</p><p class="p1">— Одному сыну плотника тоже это говорили. Он в детстве, знаете, любил зверей. Другие дети их мучили, а он — нет. Но и детей, которые мучали животных, он любил тоже. Кончилось известно чем. Точнее, не кончилось. А Стругацких я люблю, да. Очень.</p><p class="p1">Лиза притихла. Петя, будто проснувшись, спросил:</p><p class="p1">— Что такое Волна?</p><p class="p1">Билибин открыл рот, подержал его открытым, как бы в нерешительности, и изрек:</p><p class="p1">— Волна — это история.</p><p class="p1">— История чего?</p><p class="p1">— Всего. История всех историй. Она приходит, когда вы ее не ждете, и захлестывает вас с головой, как волна Хокусая — лодку во сне жены рыбака… Ладно, пора и честь знать. Что мог — сделал, дальше сами. Как сказано у классика: если я немножко и покуражился над вами, могу утешить — среди всякого вранья я нечаянно проговорился, два-три слова, но в них промелькнул краешек истины. Да вы, по счастью, не обратили внимания. К слову, Анна, вы помните, какой дворянин, вот совсем как вы, лечился несколько лет в Швейцарии? У него был еще каллиграфический почерк, похожий на ваш, Лиза. Не помните? М-молодежь… Сайонара!<a href="ch2.xhtml#id10" class="a">[55]</a></p><p class="p1">Он встал и сделал шаг к двери.</p><p class="p1">— Стойте, — сказал Андрей. В его голове происходило какое-то круговое движение, будто там поселилась воронка из сна, те два старика, державшие друг дружку за бороды. — Вы… Вы сказали… Вы же демиург? Да?</p><p class="p1">— Я-то? Я демагог, — сказал Билибин, остановившись. — Писатель, то есть. Забыл, простите… Скрезол!</p><p class="p1">И он положил на парту визитную карточку:</p><div class="cite">
<p class="p1">Билибин В. О.</p>
<p class="p1">Думспиросперолог</p>
<p class="p1">PPS</p>
</div><p class="p1">— Что такое «пэ-пэ-эс»? — спросил Петя.</p><p class="p1">— Постпостскриптум, — отозвался Билибин. — Или праджняпарамита сутра. <em>It depends</em><a href="ch2.xhtml#id8" class="a">[56]</a>.</p><p class="p1">— А Вэ О?</p><p class="p1">— Виктор Олегович, — сказал Билибин.</p><p class="p1">Дернулось пламя. Тени заплясали на стенах кабинета, а когда порядок вещей восстановился, дверь за таинственным незнакомцем закрылась.</p><p class="p1">— Сверхчеловеки, — вздохнула Аня. — Сила Дэ и сила Тэ. День и Тень. Хрень. Точно хрень.</p><p class="p1">Андрей поднял глаза на портреты на стене. Что-то было не так. Но что? Кажется, эти двое раньше висели наоборот: Толстой слева, Достоевский справа. Сила Дэ и сила Тэ…</p><p class="p1">Додумать мысль он не успел: дверь издала утробный звук и осыпалась, будто была сделана из песка. Свеча погасла. Что-то наступало из темноты. Или кто-то?</p></span>
