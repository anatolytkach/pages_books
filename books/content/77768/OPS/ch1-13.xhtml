<span id="id12"><div class="title1">
<p class="p">Глава 10</p>
<p class="p">Кукла</p>
<p class="p">Анастасия Строкина<a href="ch2.xhtml#id15" class="a">[21]</a></p>
</div><p class="p1">— Оля! Смотри! Там что-то произошло! — подпрыгнул Петя и чуть не ударился головой о лобовое стекло.</p><p class="p1">Оля Мамонова приехала к Галине Алексеевне взволнованная и немного не в себе. Он никогда ее раньше такой не видел. Ее лицо — красивое, но всегда словно каменное, как будто из северного мрамора, — покраснело, и синяя жилка на виске пульсировала так, что, казалось, вот-вот разорвет тонкую кожу и вырвется наружу маленькой птицей. Когда он зашел на кухню, Оля стояла у окна с полной чашкой чаю, но не пила, а просто держала ее дрожащей рукой и смотрела на часы.</p><p class="p1">— Наконец-то! — обрадовалась Оля. Чай выплеснулся и оставил на ее розовом платье мрачный след.</p><p class="p1">— Петенька у нас дома теперь не частый гость, — язвительно заметила Галина Алексеевна. — Тут хоть потоп, хоть пожар — его не дозовешься!</p><p class="p1">— Мама, ну перестань! Что еще за пожар тут у вас?</p><p class="p1">Галина Алексеевна посмотрела на Олю. По маминому взгляду Петя понял, что она и сама толком не знает, что случилось, но дело это важное и срочное.</p><p class="p1">— Разбирайтесь тут без меня, — обиженно произнесла она. — Я уже и не вмешиваюсь. Не хотите мне ничего рассказывать — и не надо.</p><p class="p1">Петина мама покачала головой и сникла. Ей бы, конечно, хотелось узнать, в чем дело, что так растревожило Олю, хотя она никогда не понимала, откуда в ней это — подобное материнскому — чувство по отношению к племяннице Кирилла, о котором она и слышать не могла.</p><p class="p1">— Галина Алексеевна, мы потом… потом все расскажем. Сейчас мне надо поговорить с Петей.</p><p class="p1">Петя посмотрел на маму: она сидела на табуретке, растерянная и какая-то маленькая. Он давно заметил: чем старше он становился, тем мама делалась меньше. «Так она скоро превратится в улыбку Чеширского кота», — мельком подумал Петя. Он хотел было обнять ее, но Оля ворвалась в его мысли:</p><p class="p1">— Пойдем! Чего ты замер? Пойдем скорее!</p><p class="p1">— Мам, не сердись! — только и успел сказать он и выбежал вслед за Олей.</p><p class="p1">Она приехала на машине — стареньком «рено», который водила с восемнадцати лет. Катя, ее сестра, сколько ни старалась, так и не смогла освоить вождение, а у Оли все получилось быстро и на удивление легко. Иной раз она любила прибавить скорости или посигналить зазевавшимся водителям — странная, казалось Пете, привычка для такой хрупкой девушки. «Когда я получу права, тоже буду обгонять и сигналить», — решил он — еще два года назад.</p><p class="p1">Они сели в машину. Оля тяжело и быстро дышала.</p><p class="p1">— Петя, — выдохнула она и снова сделала вдох, — Петя…</p><p class="p1">Ей было тяжело говорить, слова как будто застряли в груди и не могли вырваться. Она завела машину. «Рено» загудел, и от этого шума Оле сделалось легче. На одном дыхании под шум и подергивание мотора она выпалила:</p><p class="p1">— Петя, кажется, ты мой брат!</p><p class="p1">Петя замер. Теперь и ему стало не хватать воздуха.</p><p class="p1">— Ты пошутила? — спросил он, понимая, что это не шутка. Оля вообще не любила шуток и розыгрышей.</p><p class="p1">— Так, смотри, — она приложила ладони к лицу и надавила пальцами на глаза. — Надо прийти в себя. Я как поняла — сразу к тебе. Не знаю почему. Никому пока не хочу говорить. Петя, мне страшно от всего этого.</p><p class="p1">Петя понял, что пора брать ситуацию в свои руки. Он обнял ее, потряс за плечи и громко, по слогам проговорил:</p><p class="p1">— Ус-по-кой-ся! Слышишь меня? Что случилось, Оля? Сделай глубокий вдох и спокойно мне все объясни!</p><p class="p1">— Сейчас… сейчас… представляешь, как мне было с Галиной Алексеевной! Она спрашивает: «Что? Как?» А я ничего не могу сказать. У меня руки дрожат. Сейчас… в общем. Помнишь, я говорила, что дядя Кира оставил мне — ну, среди разного прочего — большой альбом с марками?</p><p class="p1">Петя не помнил. В тот момент, когда все выяснилось, он сам был в таком волнении, что вряд ли обратил бы внимание на какие-то там марки.</p><p class="p1">— Я отложила его. Марки и марки. Тебе ведь тоже досталась куча марок в квартире в Колпачном. А потом я от нечего делать стала их разглядывать и заметила, что они очень странно разложены. Я, конечно, не разбираюсь в этом. Но тут только слепой не заметил бы. Вот представь. Сначала марка, например, из Испании, рядом из Норвегии, следующая — откуда-нибудь еще, и тут же снова из Испании. То есть вразброс. А это очень непохоже на Кирилла Владимировича. Он был… педантичным. У него всегда все по полочкам. И в доме, и в мыслях!</p><p class="p1">Петя, может быть, второй или третий раз в жизни почувствовал досаду и даже горечь оттого, что ничего не мог сказать о своем отце. О том, каким он был, что любил, чего опасался. Может, ему тоже нравился Ники Лауда?</p><p class="p1">— И тогда я стала произносить вслух названия стран: Португалия, Румыния, Испания, Вьетнам, Египет и вдруг — Тобольск! Тобольск, Петя!</p><p class="p1">— Давай уже скорее! — не выдержал он. — Мы же не на уроке географии!</p><p class="p1">— Прости. Я просто волнуюсь. Боюсь что-то упустить… Короче, я переписала названия стран из первого листа с марками. Названия стран, понятное дело, с больших букв. И тут эти большие буквы сложились в предложения!</p><p class="p1">Петя пристально посмотрел на Олю. Они с ребятами давно догадались, что эти марки не просто так. Но, похоже, настоящее послание предназначалось именно ей.</p><p class="p1">— Ну и что там? Показывай уже! Ты ведь все переписала? Письмо с тобой?</p><p class="p1">— Конечно! Я даже точки расставила.</p><p class="p1">Оля достала из сумки смятый лист, исписанный размашистым почерком. Она явно торопилась, когда писала. Петя взял лист и принялся читать вслух:</p><p class="p1">— «Привет, дочка. Ты поняла шифр».</p><p class="p1">Он еще раз посмотрел на Олю и теперь даже уловил сходство — ее и отца. И снова ему сделалось грустно:</p><p class="p1">— Тут личное что-то. Читать?</p><p class="p1">— Личное закончилось. Читай давай.</p><p class="p1">Петя продолжил:</p><p class="p1">— «Завещаю состояние. Сделай правильно. Скоро снесут дома».</p><p class="p1">— Так он знал? — Петя отложил письмо. — Знал… и поэтому оставил мне квартиру в Колпачном! Значит…</p><p class="p1">Петя замолчал и снова взялся за письмо. Он ровным счетом ничего не понимал в том, что происходило, но ему стало ясно: отец был в курсе грядущих перемен и подумал о нем! О том, чтобы ему было хорошо. Он снова стал читать, но уже не вслух.</p><p class="p1">— «Ни в чем не участвуй. Клад у меня. Ключ под землей. Полтора метра. От дуба метр на юг. Не знает никто. Никому. Потом уезжай из страны. Навсегда. Оля, люблю тебя. Папа».</p><p class="p1">— Папа, — повторил Петя вслух. — Папа.</p><p class="p1">— Да! Учудил наш папа! — улыбнулась Оля.</p><p class="p1">— Слушай, а что это за дуб? Наш, что ли?</p><p class="p1">— Ну да, он тут один такой. Мы с дядей Ки… с папой… часто к нему приходили. Просто когда гуляли. Мы правда много времени проводили вместе. Я никак не могу… Почему?</p><p class="p1">— Потом обсудим отца. Сейчас надо ехать.</p><p class="p1">— Куда?</p><p class="p1">— Конечно, к дубу!</p><p class="p1">— Так день ведь! Люди кругом!</p><p class="p1">— Осмотрим территорию. Я же не копать тебе предлагаю! Надо сначала приглядеться.</p><p class="p1">Оля нажала на педаль, и ее белая кроссовка тихо скрипнула.</p><p class="p1">Они ехали в полной тишине. Даже радио не включили. Петя думал, что ему все-таки жаль этот тихий уголок города. Что больше здесь не будет прежних домов, по вечерам не будет зажигаться свет. Больше ему не придется спешить по знакомой дороге в школу. И эта дорога забудет его шаги. Неужели все из-за какого-то клада? Или из-за чьих-то амбиций? Неужели нет ничего, что бы могло помешать людям мучить других людей?</p><p class="p1">Машина резко затормозила.</p><p class="p1">— Смотри! Там что-то произошло!</p><p class="p1">Они подъехали к обочине, вышли и направились к дубу — именно там толпились люди. Прохожие подходили, смотрели куда-то вниз, качали головами, недовольно цокали.</p><p class="p1">— Что? Что тут случилось? — спросил Петя пожилого человека с собакой.</p><p class="p1">— Да придурок какой-то повесил на дерево манекен! Тут уже и полицию вызвали, подумали — и правда женщина там! Идиот! — прорычал человек с собакой, взглянул на Олю, хмыкнул и ушел, недовольный как будто всем на свете, кроме того, что живет в доме, из окон которого не видно ни одного дерева.</p><p class="p1">— Заметил, как он на меня посмотрел? Как призрака увидел!</p><p class="p1">— Ага! И вон бабка… Пялится страшно!</p><p class="p1">Петя и Оля подошли к дубу и — с другой стороны ствола — увидели огромную куклу в человеческий рост. В розовом платье и одной белой кроссовке — вторая валялась тут же — она была похожа на Олю как две капли воды. Кукла висела беспомощно и грустно.</p></span>
