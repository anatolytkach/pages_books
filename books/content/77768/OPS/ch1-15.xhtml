<p class="p">Глава 12</p>
<p class="p">Меня зовут Эрика</p>
<p class="p">Валерий Бочков<a href="ch2.xhtml#id11" class="a">[23]</a></p>
</div><p class="p1">Память возвращалась фрагментами. Обрывками, не связанными между собой ни временем, ни местом. Всплыла фамилия — Эрхард. Доктор Эрхард. Этот лечил ее в Швейцарии: из темноты проступили его руки, тонкие, почти женские. На мизинце стальное кольцо. И запах — странный, холодный. Но разве запах может быть холодным? Конечно, может — так зимой пахнет промерзшее железо.</p><p class="p1">А вот и голос: «Земля имеет оболочку, и эта оболочка поражена болезнями. Одна из них называется „человек“».</p><p class="p1">Нет, это не доктор, это сказал кто-то другой. А доктор сказал вот что: «Будь добра к Эрике. Это в твоих же интересах».</p><p class="p1">Аня открыла глаза. Ванная комната. Теплый мрамор под щекой. Она попыталась подняться, встала на четвереньки, дотянулась до края ванной. Пол неожиданно куда-то нырнул, комнату качнуло, сталь и хром ослепительно блеснули. Аня зажмурилась. Не отпуская край ванны, медленно выпрямилась.</p><p class="p1">— Меня сейчас вырвет… — пробормотала.</p><p class="p1">Держась за стену, она добралась до раковины, открыла холодный кран. Сунула голову под струю. Чей-то голос, женский и строгий, произнес:</p><p class="p1">— <em>Nabelküsser ist tod</em><a href="ch2.xhtml#id9" class="a">[24]</a>.</p><p class="p1">Аня оглянулась. В ванной комнате никого не было. Она закрыла воду. Где-то рядом звякнул мобильник. На полу возле унитаза лежал ее телефон. Аня осторожно опустилась на колени, дотянулась до мобильного. На экране была та же фраза: <em>Nabelküsser ist tod.</em> Чуть ниже крутился кружок, проценты загрузки добежали до ста, телефон снова звякнул и выдал надпись: «Активация прошла успешно».</p><p class="p1">На место тошноты пришла слабость. Даже не слабость — немощь: когда нет ни сил, ни воли пошевелить даже пальцем. Состояние было знакомое, так отходишь от анестезии. Так было в Швейцарии. Много раз. После операций. Сперва появляется свет — его кто-то делает все ярче и ярче. До ослепительно белого. Потом — звуки. Под конец появляются запахи.</p><p class="p1">Аня подошла к зеркалу. Она была совершенно голая. Только сейчас до нее дошло, что она находится в ванной комнате матери. Аня приблизила лицо к своему отражению, от дыхания на зеркале появился туманный кружок. Она стерла его ладонью. Потом потрогала пальцем нос, провела по губам. Оттянула вниз веко правого глаза.</p><p class="p1">На полке среди материнского хлама — целого хоровода разноцветных бутылочек, стеклянных баночек, пузырьков и флакончиков — лежала упаковка бритв. Ярко-розового цвета. Аня вынула одну, сняла с лезвия защитный пластик. Аккуратно, стараясь не пораниться, сбрила брови, сначала правую, потом левую. На месте бровей остались бледные полоски, впрочем, совсем незаметные. Оказалось, что если сбрить брови, то очень сложно изобразить на лице удивление. Да и другие эмоции тоже.</p><p class="p1">Аня отступила, разглядывая отражение. Лицо, шея, тощие ключицы. Груди были острые и неубедительные — «козьи сиськи», как обозвала их Лелька Абрикосова в раздевалке. У самой Лельки был крепкий третий номер уже в восьмом классе.</p><p class="p1">— Корова… — Аня ладонями провела по плоскому животу. — Поглядим на тебя через десять лет.</p><p class="p1">— Ну что, Анна, — обратилась к своему отражению. — Знакомиться будем? Я — Эрика.</p><p class="subtitle">* * *</p><p class="p1">Калачёвка напоминала зону военных действий. На месте водокачки высилась гора строительного мусора и колотых кирпичей. Большой Трофимовский был перегорожен забором. Тут же стояла патрульная машина. Два мрачных мента молча курили, изредка сплевывая под ноги.</p><p class="p1">Эрика оказалась покладистой девкой. И на редкость компанейской. К тому же Аня никогда не чувствовала себя так классно — такой бодрой, такой энергичной, такой радостной. Должно быть, примерно так ощущает себя счастливый человек.</p><p class="p1">— Господа полицейские! — писклявым голосом обратилась она к ментам.</p><p class="p1">— Ну и чучело, — буркнул один другому. — Коляныч, пошли-ка ее отсюда.</p><p class="p1">— Гражданка! — Коляныч, набычась, грозно двинулся к Ане. — Гражданка, проход закрыт! Строительные работы!</p><p class="p1">Гражданка — черные очки, блестящий белый плащ (материнская «Прада» из змеиной кожи, на два размера больше), красная бейсбольная кепка козырьком назад — подошла вплотную к машине.</p><p class="p1">— Куда прешь? — заорал Коляныч. — Ты чё, слепая?</p><p class="p1">— Да, — без запинки ответила гражданка. — А что — и это запрещено?</p><p class="p1">Коляныч растерялся. Гражданка подошла к нему вплотную и уперлась в тугое брюхо.</p><p class="p1">— У вас тут радиостанция есть? — спросила гражданка, ощупывая крупное тело полицейского. — Чтоб всем постам Российской Федерации…</p><p class="p1">— Какой еще федерации… Гоша! — обратился Коляныч к напарнику. — Вызови скорую, пусть эту чумичку увезут на фиг.</p><p class="p1">Гоша выбросил окурок, лениво достал рацию из кабины, щелкнул.</p><p class="p1">— Алё! Алё, сорок второй это. С Калачёвки. Алё…</p><p class="p1">Он не успел договорить. Дальнейшее произошло стремительно и почти одновременно. Коляныч взвыл и, раскинув руки крестом, перелетел через капот машины. Гоша — он как раз начал поворачиваться на крик — успел увидеть лишь метнувшийся к нему бело-красный смерч и почувствовать удар в челюсть. В голове взорвался ослепительный шар. Шар лопнул и рассыпался на тысячу золотых искр. Точно такой фейерверк Гоша видел прошлым летом, когда ездил с женой на Кипр.</p><p class="p1">Гоша сполз по крылу на асфальт. Как же то место называлось? Смешно как-то называлось… Ага, Пафос…</p><p class="p1">Его рука продолжала сжимать рацию. Оттуда доносился голос оператора. Гражданка взяла рацию.</p><p class="p1">— Внимание! Экстренное сообщение. Работают все радиостанции Советского Союза!</p><p class="p1">Она хихикнула, кашлянула в кулак и продолжила загробным голосом:</p><p class="p1">— Земля больше не принадлежит живым. Она принадлежит нам, мертвым. Мы уходим в землю, мы уходим вглубь, мы прорастаем корнями. Подводные реки несут наши останки в моря, ветер поднимает капли в небо, и мертвецы дождем проливаются на головы живых. Ваше время кончилось! <em>Nabelküsser ist tod</em>.</p><p class="p1">Она выключила рацию. Взмахнула руками и легко, будто на пружинах, запрыгнула на крышу полицейской машины. Огляделась. Распахнув полы плаща, как два белых крыла, ловким футбольным пинком долбанула по мигалке. Та, описав дугу, перелетела через забор.</p><p class="p1">Там, за ограждением, высились горы битого кирпича. Все, что осталось от углового дома. Его крушили наспех, кран с гирей даже не успели увезти. Из обломков стен торчала ржавая арматура, канализационные трубы, веревками болтались провода. На чудом уцелевшем кирпичном дымоходе дремала крупная розовая птица. Это был фламинго. Он стоял на одной лапе.</p><p class="p1">— <em>Das ist echt Spitze!</em><a href="ch2.xhtml#id7" class="a">[25]</a> — Эрика ткнула рукой в сторону печной трубы. — Все тип-топ, сестричка! Вот он — Портал! Вход в Нижний Мир. Река Стикс и все такое. Там была водокачка, помнишь? Калачёв построил под ней лабиринт, точную копию критского лабиринта. Того самого, где…</p><p class="p1">— Минотавр прятался! — закончила Аня. — На острове Крит.</p><p class="p1">— <em>Genau!</em><a href="ch2.xhtml#id5" class="a">[26]</a> Только никакой он не купец, этот Калачёв. Некромаг Дувренн. Именно он украл священный меч Кухулина. Тогда, в девятом веке. И, подкупив кузнеца, нанес на эфес свое имя. Но хозяин меча Кормак мак Арт вызывал свидетеля — мертвеца, когда-то убитого этим мечом, — и испросил его мнение о том, кто хозяин меча. Мертвец указал истинного хозяина, и суд принял это свидетельство…</p><p class="p1">— Труп давал показания в суде?</p><p class="p1">— Ага! И не просто труп — обезглавленный труп! Там куча смешного, я тебе потом расскажу, сейчас времени нет. Погнали!</p><p class="p1">— Куда?</p><p class="p1">— Туда!</p><p class="subtitle">* * *</p><p class="p1">Павел Шергин влетел в квартиру. Грохнул дверью.</p><p class="p1">— Аня! — кричал, пробегая по комнатам. — Аня! Ну где же ты, господи…</p><p class="p1">На кухне ее тоже не было. Распахнул дверь в тренажерный зал — пусто. Заглянул в сауну — никого.</p><p class="p1">Шергин вынул мобильник, снова ткнул в ее номер.</p><p class="p1">— Господи… Ну пожалуйста…</p><p class="p1">Откуда-то раздалось пиликанье Анькиного телефона. Шергин бегом бросился на звук. Через гостиную — на половину жены. Дверь в ванную была распахнута настежь. На полу лежал айфон и весело вызванивал «Турецкий марш».</p><p class="p1">Шергин нажал отбой. Поднял телефон дочери, экран был заблокирован. На картинке белели купола Сакре-Кёр, чуть розоватые от заката.</p><p class="p1">Фото сделала Аня во время их весенней поездки. Потыкав несколько раз в цифры кода, Шергин спрятал мобильник в карман.</p><p class="p1">— Ну что ты будешь… — Шергин вернулся в гостиную.</p><p class="p1">Он сел в кресло, но тут же снова вскочил. Бросился к балкону, распахнул дверь. Пара голубей с перепугу кубарем кинулись вниз.</p><p class="p1">— Вон отсюда! — заорал на птиц.</p><p class="p1">Балкон опоясывал весь этаж пентхауса по периметру. Шергин сделал круг, по пути пнул шезлонг жены, зло плюнул вниз и вернулся к двери гостиной. Он вцепился в перила, сжал пальцы до белых костяшек.</p><p class="p1">Внизу гремело Замоскворечье, сквозь дымку блестела река, черным скелетом высился неизбежный Петр. За памятником царю мерцали луковицы церкви. Шергин помнил, когда там, на месте церкви, был бассейн. Зимними сумерками он дымился густым белым паром. Мохнатые клубы, пробитые лучами желтых прожекторов, вставали ленивыми великанами; они расправляли туманные плечи, тщетно пытаясь приподнять чугунное московское небо.</p><p class="p1">Летом бассейн напоминал райский оазис: бирюзовая вода мельтешила солнечными зайчиками, на белокафельных берегах томились голые люди всех оттенков прожаренности — от розоватого до цвета копченой скумбрии. Иногда бассейн накрывало божественным ароматом — это южный ветер доносил запах горячей карамели, которую варили на «Красном Октябре». Кирпичное здание кондитерской фабрики стояло на противоположном берегу Москвы-реки. Несколько раз в году их всем классом водили в бассейн для сдачи каких-то физкультурных нормативов. Быстрей всех плавала Анька Пожарская, к десятому классу она выглядела настоящей барышней: бледная и высокая, с мягкой грудью в тесном черном купальнике. Анька запросто могла пронырнуть метров десять. Шергин был по уши влюблен в Пожарскую целых две четверти, до самых каникул. Но она была красавицей, а он — ушастым троечником. К тому же стоял третьим от конца на уроке физры. Ниже Шергина были только Дажин и Петриков.</p><p class="p1">Именно Анька рассказала ему про Церковного Топителя. Якобы та девчонка из немецкой школы, что утонула прошлым сентябрем, и тот пацан, труп которого выловили в спортивном секторе, на самом деле жертвы религиозного маньяка.</p><p class="p1">— Сектанты! Мстят за разрушенный храм. Натренировались — могут под водой по пять минут сидеть. Поднырнет такой сзади…</p><p class="p1">Потом, много лет спустя, Шергин узнал, что уже тогда, в десятом классе, Анька встречалась с их физруком, Олег Палычем. Рассказала об этом Хохлова на одном из сборищ класса. Пожарская к тому времени успела выйти замуж за богатенького немца, уехать в Бремен и там разбиться насмерть на мотоцикле.</p><p class="p1">От телефонного звонка Шергин вздрогнул. Он вернулся в гостиную, захлопнул дверь. Звонила не дочь, звонил Долматов.</p><p class="p1">— Ну, что еще? — рявкнул Шергин в трубку.</p><p class="p1">Он пнул кресло, быстрым шагом дошел до дивана, развернулся.</p><p class="p1">— Что? — остановился и взмахнул рукой. — Какой, к черту, телевизор? Ты что, Долматов, с дуба рухнул? Что? Что… Погоди… погоди…</p><p class="p1">Среди диванных подушек Шергин нашел пульт.</p><p class="p1">— Долматов… Погоди. Кто его завалил? Как? Где? В подмосковной… Но как? Там такая охрана… Суров? И не Кузьмин? Кто-кто? Гринева?! Катька Гринева? Да ты… И Каракозов объявил о поддержке… Уже? А гвардия? Вот гады… Я так и знал, что Рогожин первым продаст… Но как? Как? Гринева… Ну знаю, знаю, еще по девяностым. Катька… Ну, эта будет на столбах вешать…</p><p class="p1">Он нажал отбой, уставился в телевизор. Из черноты телевизионного экрана выплыла картинка: неинтересная декорация изображала ночной лес. Над острыми елками висела луна. На переднем плане был пруд, окруженный весьма условными камышами. Шергин переключил канал, там был тот же лес и тот же пруд. На следующем тоже.</p><p class="p1">— Гринева завалила шибздика… — Шергин прибавил звук. — Ну дела…</p><p class="p1">Из динамиков зазвучали скрипки, весело и прытко. Луч прожектора осветил передний план. Сбоку, из-за плоских кустов, появилась стайка балерин. Они резво выстроились в шеренгу, взялись за руки и, ловко семеня белыми ногами в такт музыке, вприпрыжку добрались до центра сцены.</p><p class="p1">Снова зазвонил телефон. Номер звонившего был заблокирован. Шергин включил громкую связь.</p><p class="p1">— Да, — буркнул. — Кто это?</p><p class="p1">— Папа! — Голос Ани был капризен. — Ну где ты?</p><p class="p1">— Аня! Где ты? Я тут всех на уши поставил, а ты…</p><p class="p1">— Да тут я! Мы тебя ждем-ждем, а тебя все…</p><p class="p1">— Кто мы?</p><p class="p1">— Как кто? Я и Эрика.</p><p class="p1">— Кто это? Где вы?</p><p class="p1">— На Калачёвке! Где водокачка была. Там лестница в подвал. Сначала коридор, длинный-длинный, а после до…</p><p class="p1">В трубке что-то затрещало, голос оборвался на полуслове.</p><p class="subtitle">* * *</p><p class="p1">Там действительно был коридор.</p><p class="p1">— Откуда тут свет? — Шергин тронул фонарь, висевший под низким сводчатым потолком. — Объект должен быть обесточен…</p><p class="p1">Осторожно спустился по щербатым ступеням. Ступеньки все были разной высоты, Шергин остановился на последней и зычно гаркнул:</p><p class="p1">— Аня!</p><p class="p1">Пол, бетонный и пыльный, шел под уклон, так что ноги переступали сами собой, ведя Шергина от одного тусклого фонаря до другого.</p><p class="p1">— Аня! — снова крикнул он. — Аня! Где ты?</p><p class="p1">Откуда здесь взялся этот подземный ход? Куда он ведет? Или это высохшее русло подземной реки? Но откуда тогда бетон? И фонари?</p><p class="p1">— Аня! — Крик улетел в ватную пустоту.</p><p class="p1">Шергин оглянулся, ему очень захотелось вернуться назад. Прямо сейчас. Уклон стал круче, должно быть, тут русло уходило вглубь. Шергин поскользнулся, ухватился за стену.</p><p class="p1">— Аня! — заорал он.</p><p class="p1">Бетонные плиты потрескались и лежали неровно, Шергин запнулся, упал, растянувшись во весь рост. Боль обрадовала его, он слизнул кровь с ладони. Вкуса не ощутил, кровь оказалась пресной, как вода. Он помотал головой, зло сплюнул и, держась рукой за стену, пошел дальше.</p><p class="p1">Он сначала зачем-то считал фонари, но сбился на втором десятке. Теперь, приближаясь к очередной лампе, Шергин с размаху припечатывал ладонь к стене, пытаясь оставить на бетоне кровавую метку. Стены здесь стали влажными и скользкими, словно вспотели. Шергин удивленно заметил, что кровь на них не отпечатывалась.</p><p class="p1">Он спотыкался, но продолжал шагать вперед. Сколько минут или часов прошло, Шергин даже не представлял, время текло рывками, чередуя сгустки подробнейших, бесконечно нудных фрагментов с безнадежно глухими провалами.</p><p class="p1">Коридор кончился и уперся в двойную высокую дверь, почти ворота. Шергин без особой надежды устало толкнул обе створки. Дверь качнулась, тяжело подалась и медленно раскрылась. От неожиданности Шергин даже не обрадовался. Замер в нерешительности, вглядываясь в темноту.</p><p class="p1">Перед ним расстилалась пустошь, поросшая бурьяном и низким кустарником, дальше шли огороды, которые спускались к темной реке, неподвижной и маслянистой, как деготь, с зеленоватой лунной дорожкой. На той стороне реки виднелась мельница, чернело колесо, вдоль берега росли старые ивы. В лунном свете макушки их казались припорошены инеем. За ивняком начинался луг, тоже серебристый от луны, он полого тянулся до самого горизонта. Неподвижность реки оказалась обманчивой, Шергин разглядел, как течение медленно-медленно уносит какой-то блестящий предмет цилиндрической формы.</p><p class="p1">Шергин сделал шаг, хмыкнул и развел руками, словно извиняясь перед кем-то. В дальнем углу сознания всплыла вялая мысль: «Что за бред? Я ведь в Москве, в Замоскворечье. Этого просто не может быть». Но глаза, постепенно привыкая к серой тьме, разглядывали все больше подробностей — это было не Замоскворечье.</p><p class="p1">Сквозь кусты и чертополох проглядывал красноватый свет, там что-то вспыхивало и мерцало. Шергин перелез через невысокий забор из дикого камня, обогнул старую, треснувшую пополам яблоню, всю в уродливых наростах.</p><p class="p1">В лощине горел неяркий костер. Перед огнем на земле сидел босой старик, зябко выставив вперед худые грязные руки. Он был плешив и мал ростом, не больше шестиклассника.</p><p class="p1">— Господи… — пробормотал Шергин. — Это же…</p><p class="p1">Три года назад Кузякин включил его в делегацию мэрии, их принимали в Кремле, принимали на самом высоком уровне. Шергину тогда посчастливилось удостоиться рукопожатия. Боже, как же он был счастлив! Как ребенок, боже… И никому не сказал, что рукопожатие было вялое, а ладонь стылая и потная. Как снулая рыба.</p><p class="p1">На старике был рабочий комбинезон и широкий клепаный пояс с карабином, каким обычно пользуются верхолазы. Он рассеянно глазел на огонь и тихонько насвистывал какую-то песенку. Пламя лизало его ладони, плясало между пальцев — Шергин это ясно видел, он подошел ближе и окликнул старика. Тот повернулся, правая сторона лица пылала оранжевым, левая казалась фиолетовой дырой. Старик едва заметно улыбнулся и, кивнув головой в сторону реки, сказал:</p><p class="p1">— Уже скоро…</p><p class="p1">Шергин заметил, как в черноте дальнего берега возник неясный силуэт, в тишине послышался тихий всплеск, по лунной дорожке пошли круги, и она рассыпалась, как пригоршня мелких монет, а еще через мгновение на освещенном плесе показалась фигура человека. По воде стелился туман, и Шергину почудилось, что фигура скользит прямо по воде, приближаясь к его берегу.</p><p class="p1">Над рекой и лугами плыла полная луна, неяркая и размытая, словно задернутая марлей. Проглядывали звезды. Легкая муть застилала все небо и неторопливо ползла на восток, где вдали грудились черные грозовые тучи, освещенные по краю зеленоватым светом.</p><p class="p1">Марля плавно разошлась, и в прореху выглянула луна. Черная прореха вытянулась и стала похожа на китайского дракона, сочная флуоресцентная луна оказалась сияющим драконьим глазом. По воде пробежало зеленоватое мерцание, лучистое и яркое, словно отражение неоновой вывески.</p><p class="p1">По небу чиркнула звезда. Шергин знал, что нужно загадать желание. Ничего загадывать не пришлось: в берег уже уткнулся тростниковый плот, на котором стояла его дочь Анна Шергина. Она молча кивнула отцу и поманила его рукой, приглашая на плот.</p></span>
