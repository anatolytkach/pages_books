<p class="p">Глава 20</p>
<p class="p">Под дачным абажуром</p>
<p class="p">Владимир Березин<a href="ch2.xhtml#id51" class="a">[37]</a></p>
</div><p class="p1">Они вышли на станции, которая, собственно, была и не станцией, а платформой, названной по бессмысленному количеству километров, отделявшему ее от города. Было пустынно, будто все местные жители провалились в другое измерение. Лиза никак не могла привыкнуть к появлению Андрея, как не могла привыкнуть к его исчезновению. В этом загадочном пространстве, казалось, он повзрослел на год, и Лиза с удивлением увидела затянувшийся шрам на его ладони. Он молчал непривычно, будто набрав гвоздей в рот. Какое-то важное знание Андрей получил в свое отсутствие, но ничего не объяснил, а, взяв за руку, вытащил Лизу из дома и отпустил лишь в тот момент, когда кормил монетами кассовый аппарат. Только когда электричка отъехала, произнес:</p><p class="p1">— Ты, главное, ничему не удивляйся. Мне все стало ясно. И я понял, куда нам нужно ехать, — к моему прадеду. Он сорок лет сидит, как медведь в своей берлоге, на даче в поселке генералов. Прадед должен был даже стать маршалом, но произошла какая-то загадочная история, и он очутился в отставке среди малины и черной смородины. Никуда не выезжает и, кажется, все время переигрывает проигранные сражения. Ну, не знаю, может, затевает новые.</p><p class="p1">— Он там один?</p><p class="p1">— Нет, ему помогает бывший адъютант и, кажется, еще кто-то. Но самое главное, что у него там лежит оккаметрон. Как что это? Ты что, телевизор не смотришь? Разве не помнишь про нацистов, «Аненербе» и все такое? Я сейчас думаю, что в том фильме про агентов в черном была не шутка, а правда: самые важные вещи всегда в открытом доступе. И все рассказано в передачах про пришельцев и гражданскую тайну. А оккаметрон отсекает дополненную реальность. Я видел передачу про него, вернее, прадедов забор в этой передаче. Прадед журналистов, конечно, на порог не пустил, но они бегали вдоль забора и бормотали, что за этими зелеными досками хранится тайна всего сущего.</p><p class="p1">— А не влезет ли теперь кто-нибудь к нему? Ну, за такой штукой?</p><p class="p1">— Там охраны полно, — объяснил Андрей, когда они садились в маршрутку. — В этом поселке ведь не только бывшие генералы живут, но и вполне действующие. Но это все неважно, главное, что то безумие, в котором мы живем, упростится. Не знаю, как это работает, я вообще не очень верю в эти лептонные потоки, торсионные поля… Но здесь как с гомеопатией: если отчаялся, то все равно, как она действует, лишь бы действовала.</p><p class="p1">Андрей говорил и говорил, а сам думал о другом. Он совершенно не был уверен в своем плане. Последний раз он видел прадеда лет десять назад.</p><p class="p1">Старый генерал учил потомков, что есть только два источника неудач: праздность и суеверие, и только две причины успеха: работа и ум. Думали, что он пишет мемуары, но никто не видел ни одной страницы. Отец рассказывал Андрею, что старик до последнего работал в саду, но сейчас его просто вывозили туда на коляске, подаренной каким-то побежденным им в прошлом веке генералом. Старик уже ничего не значил в высших кругах, но молодые генералы навещали его, будто принося дары древнему божеству.</p><p class="p1">Лицо предка проступало в памяти смутно, как на выцветшей фотографии. Мальчика привезли на эту дачу совсем крохотным, и он помнил только прохладу внутри дома, карты на стенах и столах, а еще — саблю на стене. Тогда он потянулся к этой сабле, чем обрадовал прадеда. Ведь он проклял свою дочь, когда та вышла замуж за спортсмена, и проклял всех остальных, когда понял, что внук не пойдет в военное училище. А когда правнук схватил саблю за рукоять, он, кажется, простил им все.</p><p class="p1">Впрочем, чаще видеться они не стали. И сейчас по телефону с правнуком говорил старик-адъютант. Так что, хоть прадед и назначил время визита, Андрей втайне опасался, что дачные ворота просто не откроются.</p><p class="p1">Да и не будь телевизионной программы с совершенно сумасшедшим ведущим, он никогда бы не решился навестить прадеда без ведома родителей. В этой программе рассказали о таинственном приборе, который изменяет окружающий мир, устраняя из него все ненужное. А Андрею уже стало казаться, что стоит только потереть хорошенько глаза, и все события последних месяцев провалятся в никуда, станут нелепыми, как тетрадки за прошлый год. Исчезнут все эти глупые порталы и нелепые злодеи — в общем, все растворится. Кроме Лизы, конечно.</p><p class="p1">Они выпрыгнули из маршрутки прямо у дорожного знака. На синем фоне виднелось название, написанное грязно-белыми, будто облупившимися буквами: «Лысогорское». Рядом с печальным государственным знаком был другой, аккуратный, где на зеленом фоне значилось: «ДНП „Лысогорье“».</p><p class="p1">— Нам туда, — сурово сказал Андрей, и они свернули с трассы на боковую дорогу, казалось, специально замаскированную от чужих глаз.</p><p class="p1">Стояло прекрасное утро, такое, каким оно может быть в дачной местности, с осенними запахами — ароматом палой листвы, хвои, разогретой последним жарким солнцем.</p><p class="p1">Дорога стала ощутимо изгибаться в сторону, и вдруг перед ними оказался мощный забор, похожий на часть танка, завязшего в кустах. Рядом была и сторожка, больше напоминающая контрольно-пропускной пункт воинской части.</p><p class="p1">Лизе забор не понравился, но Андрей объяснил, что таков настоящий армейский стиль. Это же эстетика в погонах, дачи тут давали сразу после войны и тем, кто воевал в этих местах. Участки были огромные, как футбольные поля, и, наверное, начальство думало, что генералы будут на этих полях сажать огурцы и не проявлять ненужной самостоятельности.</p><p class="p1">Но теперь из-за забора выглядывали огромные мрачные коттеджи, явно недавней постройки.</p><p class="p1">Лиза и Андрей показали паспорта (охранник нашел их в списке) и прошли через турникет на территорию. Поселок был так же мрачен и неприветлив, как и его оборонительный периметр. Внутренние заборы, хоть и были размером меньше внешнего, не давали никакой возможности подсмотреть за жизнью хозяев. Лиза обнаружила, что проезд, по которому они движутся, называется скромно Главный проспект, но чем дальше от входа, тем чаще им стали попадаться старинные покосившиеся дома с огромным количеством пристроек, деревянной резьбой под крышей и потерявшими цвет наличниками. Они стояли среди коттеджей, будто старики, незваными гостями приехавшие на праздник разбогатевших детей.</p><p class="p1">Наконец путешественники приблизились к аккуратному деревянному забору, за которым виднелся крепкий дом — явно из первых, что были поставлены в этом поселке. Однако тут не было никаких признаков дряхлости и разорения.</p><p class="p1">Андрей надавил на кнопку звонка, и где-то в глубине сада ему отозвался дребезг, похожий на голос старинного телефона. Но калитка отворилась тут же, будто открывший ее сидел прямо за кустами.</p><p class="p1">Лиза всмотрелась в выглянувшего старика: вот он какой, этот столетний предок Лубоцкого, однако Андрей опередил ее:</p><p class="p1">— Здравствуйте, Никита Васильевич.</p><p class="p1">Это явно был не генерал. Они долго шли через парад кустов и аккуратных елок, выстроившихся вдоль дорожки, и ступили на веранду, пустую и залитую светом.</p><p class="p1">Старик-адъютант провел их дальше, и вскоре все очутились в большой комнате, наполненной массой вещей. На огромном столе лежали книги и карты, стоял компьютер (не самой древней модели, отметила про себя Лиза) и еще какая-то непонятная техника в зеленых корпусах. В потолок уходили высокие стеклянные шкафы библиотеки с ключами в дверцах. В углу торчал еще один высокий стол, на котором лежала открытая тетрадь в старинном клеенчатом переплете.</p><p class="p1">И тут она наконец увидела хозяина.</p><p class="p1">Высокий высохший старик, куда старше своего помощника, сидел в коляске у стены.</p><p class="p1">— Здравствуй, Андрюша. — Голос старого генерала был негромок, но четок.</p><p class="p1">— Здравствуйте, Николай Андреевич.</p><p class="p1">Все, и хозяин, и Лиза, и даже адъютант, почувствовали, что Андрею неловко называть его прадедом.</p><p class="p1">— Это — Николай Андреевич… Это — Лиза Дейнен…</p><p class="p1">— Барышня, как вас по отчеству? — спросил старик.</p><p class="p1">— Сергеевна.</p><p class="p1">Хозяин повернулся к Андрею.</p><p class="p1">— Запомни, Андрюша: тебе кажется, что отчества ни к чему, но это вещь важная, отнесенная к памяти предков.</p><p class="p1">Адъютант без всякой суеты накрывал на стол.</p><p class="p1">— Все разговоры потом, сейчас принятие пищи.</p><p class="p1">Лиза не удержалась и фыркнула, услышав эту странную казенную фразу. Старик вдруг подмигнул ей, правда, медленно, как может подмигнуть, наверное, черепаха.</p><p class="p1">Они сели за стол. Где-то рядом в соседней комнате работал телевизор. Был включен очень странный канал: там хор мальчиков бесконечно исполнял длинную заунывную песню о том, что Родина слышит и все знает.</p><p class="p1">С удивлением Лиза увидела, что генерал перед едой выпил рюмку, и сама отпила из бокала. Тут же заломило зубы, потому что в бокале обнаружилась чистая, но удивительно холодная вода. Старик клюнул головой, будто птица, и вилкой в тонкой руке (все, что высовывалось из рукава мундира, было, как гречневой кашей, обсыпано пятнышками родинок) ткнул во что-то малосъедобное на своей тарелке. Перед молодыми людьми, впрочем, лежала еда вполне ресторанного качества.</p><p class="p1">— Я привез фотографии. — Андрей выложил альбом на стол.</p><p class="p1">— Никита Васильевич, прибери, потом посмотрю.</p><p class="p1">Адъютант неслышно подошел сзади, и альбом растворился в воздухе.</p><p class="p1">— Елизавета Сергеевна, — тихо сказал хозяин. — А позвольте спросить, фамилия ваша из каких краев происходит? Что-то мне в ней чувствуется скандинавское.</p><p class="p1">— Так и есть: предки еще в девятнадцатом веке приехали в Россию.</p><p class="p1">Она замолчала, но понимала, что пауза требует продолжения.</p><p class="p1">— Накануне войны восемьсот двенадцатого года. Моего прапрадеда выписали воздушные шары делать.</p><p class="p1">Хозяин поднял голову чуть быстрее, чем она ожидала.</p><p class="p1">— Позвольте, так это ж Готфрид фон Карлсон, его вы имеете в виду?</p><p class="p1">— Именно так. Он строил летающую лодку под Москвой, чтобы бомбить наступающего Наполеона, но ничего не вышло.</p><p class="p1">— А как вы думаете, Елизавета Сергеевна, полетела бы такая лодка? Не было ли тут какого…</p><p class="p1">— Жульничества, вы хотели сказать? — Лиза вдруг разозлилась. — Думаю, что было. Ничего бы не полетело никуда. Не тот был уровень техники, но уж какой у меня предок есть, такой есть. Другого вам предложить не могу.</p><p class="p1">Старик внезапно прикрыл глаза, а открыв их через мгновение, крикнул:</p><p class="p1">— Слышал, Андрюша! А? Каково! Ты держись ее, она своего предка не сдала, а сидит и дуется на меня, как мышь на крупу. Этого жулика фон Карлсона, на котором пробы негде ставить, — и не сдала. Вы уж не обижайтесь, Елизавета Сергеевна, я помню эту историю. Но куда важнее, что ее помните вы. И откуда-то знаете, что своих нельзя сдавать ни при каких обстоятельствах. Даже если вам сверху прикажут, даже если друзья будут говорить, что так для дела нужно. Другая б мне тут врать начала… А впрочем, бог с этим со всем. Ты, Андрюша, повернись напра-налево, давно тебя не видел. (Лубоцкий-младший заерзал на стуле.) Тебе идет эта прическа, хоть я, конечно, это не одобряю. Вы ешьте, ешьте. Я ведь что-то слышал о ваших делах краем уха. Внучка с кем-то делилась по телефону. Значит, это соответствует?</p><p class="p1">— Соответствует, — выдохнул Андрей. — Наверное.</p><p class="p1">— Вы — вместе?</p><p class="p1">— Да, вместе.</p><p class="p1">— Ну, тогда позволю спросить: а не кажется ли вам, ребята, что пора взрослеть? По-моему, процесс этот у вас несколько затянулся. Дела вокруг тревожные — я ведь не об этих переездах, а в мировом масштабе. Впереди институт, образование, а у вас в голове всякая чертовщина. Ты, Андрюша, способный человек, будет жаль… Кстати, можете остаться здесь, места хватит.</p><p class="p1">— Нет-нет. И вам ли не знать, что нашу молодежь не пугают трудности, — мрачно ответил Андрей.</p><p class="p1">— Елизавета Сергеевна, а вы так же разговариваете со своими предками?</p><p class="p1">— Нет, не так.</p><p class="p1">— Сколько вам лет?</p><p class="p1">— Почти шестнадцать.</p><p class="p1">— Кем собираетесь стать в двадцать три?</p><p class="p1">— Не знаю. Может, буду писать что-то.</p><p class="p1">— Вы, Елизавета Сергеевна, мне нравитесь. Вы слушаете и не острите. Андрюша любит острить, а я не верю в тех, кто слишком много острит в юности. Я с давнего времени потерял с дочерью общий язык и не нашел его с внуком.</p><p class="p1">— Бывает, — сказала Лиза. — Вы должны их понять…</p><p class="p1">Но старик, не слушая, сказал быстро:</p><p class="p1">— Я надеюсь, у вас это серьезно?</p><p class="p1">— Да, у нас это серьезно.</p><p class="p1">— Я хотел бы вам верить. Мои дети не могли понять одного: я ведь хотел им добра, счастья, чтобы жизнь сложилась нормально. А у них это не очень складно получалось. Очевидно, вам это известно. Вот что я вам скажу, и, наверное, я никому бы этого не говорил. Вы, как бы вам сказать, перед большой долгой дорогой. Для каждого из нас наступает день, когда нужно задуматься, что-то решить. Как в сказке, где лежит камень-указатель. Наверное, вам приходили в голову такие мысли…</p><p class="p1">— Откуда вы знаете? — Лизе отчего-то стало казаться, что ей снится старый черно-белый фильм и она, как героиня этого фильма, попала на смотрины в чужой дом.</p><p class="p1">— Почему бы мне не знать, Елизавета Сергеевна, знаю. Потому что вы только начинаете идти, а я уже отмахал порядочный кусок. Иногда мне везло больше, иногда меньше, иногда совсем не везло. Так вот, учтите, надеяться вы можете только на себя, никто вам не поможет, ни один человек, кроме того, с кем вы возьметесь за руки. Да и то — гарантий никаких. Людям, в общем, наплевать друг на друга, как ни печально в этом признаться. Взять кое-кого, с кем я служил, с некоторыми мы вместе лежали под пулями, и тогда они были храбрее меня. Но из них ничего не вышло, потому что они упустили что-то важное, растерялись. Впрочем, все они мертвы — кто погиб в бою, кто умер так, в пенсионерском халате. Ах, ребята, ребята, как вы еще наивны, как вы еще мало знаете жизнь. А в жизни есть простые и грубые вещи, такие, скажем, как учеба, институт, работа, а не магические фокусы. Я понимаю, вы, наверное, стыдитесь об этом говорить, это, так сказать, слишком прозаично. Но от этого никуда не денешься, и с этим приходится считаться, поверьте уж мне.</p><p class="p1">— Так какую же дорогу вы нам предлагаете?</p><p class="p1">— Да ничего я вам не предлагаю. Это уж вы решайте, как говорится, сами. Сами решайте.</p><p class="p1">— Эй! — нетерпеливо крикнул Андрей. — Я еще здесь!</p><p class="p1">— Вижу, Андрюша, что ты еще здесь. И догадываюсь, что ты тут появился не из-за того, что в тебе родственные чувства проснулись.</p><p class="p1">— Скажите, а оккаметрон действительно существует? — вмешалась Лиза.</p><p class="p1">— И да и нет. Я знаю, что вы за ним и приехали, только вполне ли вы понимаете, что это такое?</p><p class="p1">Андрей принялся перечислять произошедшее за последнее время, и Лиза поразилась тому, как можно, не соврав ни в одной детали, так обыденно и нестрашно рассказать о тех чудесах, что они видели. Старик вдруг переспросил что-то, и Лиза поняла, что он знает об их приключениях гораздо больше, чем они предполагали. Андрей, кажется, этого не заметил.</p><p class="p1">Адъютант Никита Васильевич, все так же мягко ступая, заменил обеденные приборы на китайские чашки с иероглифами. Над столом поплыл аромат Востока. «Жасмин? Нет, не жасмин», — но спрашивать было лень.</p><p class="p1">— Кто такой был Оккам, ты помнишь, Андрюша?</p><p class="p1">Андрей пробормотал что-то про бритву, которой нужно отрезать ненужные объяснения.</p><p class="p1">— Какая же у тебя каша в голове. Уильям Оккам был знаменитым философом, а от него осталась фраза «не умножай сущностей сверх необходимого». Он писал Людвигу Баварскому: «Я буду защищать тебя пером, а ты меня будешь защищать мечом».</p><p class="p1">Слова про меч старик произнес с видимым удовольствием.</p><p class="p1">— Оккаметрон действительно вывезли из Германии осенью сорок пятого. Но вы поймите, что сейчас модно в каждом изобретении искать оккультный смысл и тайны Третьего рейха, а никаких тайн нет и не было. Миром правят не тайные общества, а явные организации — концерны и корпорации, церкви и правительства. Чудес нет, а есть прибавочная стоимость, промышленный потенциал и людские ресурсы. Ну и идеи, овладевшие массами.</p><p class="p1">Но главная тайна в том, что оккаметрон — это воображаемый прибор. Мы разобрали его и обнаружили только две лампочки, две ручки, амперметр и генератор с ручкой, как в полевом телефоне. Ну и красивый дубовый корпус, как у шкатулки с драгоценностями. В нем нет ничего, поэтому-то он и остался у меня на даче как сувенир. Какие-то дураки пытались приехать и снять о нем фильм, притворившись моими друзьями. Так наш добрый Никита Васильевич показал им из-за забора мой наградной карабин. После чего они и бежали несолоно хлебавши.</p><p class="p1">Андрей был явно разочарован, а старик продолжал:</p><p class="p1">— Немцы использовали этот прибор для психологического воздействия на допросах. Знаешь притчу о том, как один восточный мудрец искал вора? Мне рассказали, когда я воевал в Китае. Этот мудрец повесил в темной фанзе мертвого петуха. Он сказал, что мертвый петух закричит, когда его коснется вор. Все чиновники должны были зайти и коснуться мертвого петуха. Петух, как ты можешь догадаться, Андрюша, висел молча. И не кукарекал, даже когда из фанзы вышел последний чиновник. И вот тогда мудрец велел чиновникам поднять руки. У всех они были в саже, и только у одного ладонь была чистая — потому что он не трогал измазанного сажей петуха. Так и работает этот прибор — как мертвый петух, Андрюша, как мертвый петух. Нет в нем никакого волшебства, а только динамо, эбонит и полированная деревяшка. Но в честь твоего визита мы займемся этим мракобесием.</p><p class="p1">Адъютант вынес откуда-то из глубины дома коробку в брезентовом чехле. Внутри оказался деревянный ящик, действительно очень красивый.</p><p class="p1">— Садитесь сюда. Ты, Андрюша, возьми ручку…</p><p class="p1">Старик указал на какую-то черную загогулину, и Андрей вставил ее в отверстие сбоку, будто ручку стартера в старинный автомобиль. Лиза видела такое же странное приспособление, только раз в десять больше, в немом кино. После нескольких оборотов на панели затеплились две лампочки. После десяти они засияли ярко.</p><p class="p1">— А не страшно тебе, Андрюша? — вдруг спросил старик. — А то ведь узнаешь что-то такое, что все потеряешь? Вот ее, например?</p><p class="p1">Андрей быстро взглянул на Лизу, и она увидела, что глаза его налились вдруг страхом, как стоявшие перед ними чашки — чаем. Чай дрожал от вращения ручки, и страх плескался в такт этому движению. Лизе почему-то это стало приятно, и она неожиданно для себя улыбнулась Андрею. Он шумно выдохнул, ничего не ответив прадеду.</p><p class="p1">Тогда генерал велел правнуку держаться за левую ручку, а Лизе взять правую.</p><p class="p1">Над черной эбонитовой поверхностью их пальцы коснулись, и между ними проскочила искра. Кажется, от нее зажглась даже лампочка в старом абажуре над столом, и в этот момент началось волшебство.</p><p class="p1">Они переплелись пальцами, комната поплыла, будто раздвигаясь в бесконечность, не было уже ничего, кроме них самих. Не было старого дачного дома, живущего своей скрипучей жизнью, не было ни стариков, населявших его, ни прошлых и будущих войн, где они, не ставшие еще стариками, дрались насмерть с такими же, как они, юношами, не было огромного города рядом, и исчезли миллионы людей, которые хотели власти, денег, славы, бессмертия и множества глупых вещей.</p><p class="p1">Искрами в отдалении возникли их друзья, они определенно существовали, и на эти светящиеся огоньки было приятно смотреть. Но все же Лиза и Андрей висели в этом космосе вдвоем, вокруг медленно вращались звезды-люди, но ярких было совсем немного: вот родители, вот одноклассники, да и то не все. Вот несколько черных дыр, имевших имена, которые Лиза была не в силах прочитать.</p><p class="p1">Лиза в этот момент подумала, что, может, все дело в ударе током и в этих восточных чаях, которые они пили, но скоро ей стало не до того. Реальность перед ними действительно изменилась, все пространство покрылось множеством разноцветных линий, и одна из них, голубая, связывала Лизу с Андреем. Она была то очень толстой, то истончалась и едва не рвалась. Другие линии тянулись за границу дачного участка, какие-то из них уходили вверх и вниз, и все они двигались, перемещались, но только та, что связывала ее с Андреем, не двигалась никуда, пульсировала, не меняла своего голубого цвета. Они плыли между звезд, как два космонавта, потерявшие свой корабль, и это было главным знанием, а не мерцавшие разным цветом опасности и тайны.</p><p class="p1">— Ишь, очнулись. Чайку попейте.</p><p class="p1">— Это у вас был что, чай с коньяком? — спросил, переводя дух, Андрей.</p><p class="p1">— Вот еще, — поджал губы старик. — Стану я на тебя переводить коньяк. Ты по малолетству еще всем скажешь, так сраму не оберешься. Мне самому запретили пить, правда, те врачи, что запретили, уже сами давно перемерли.</p><p class="p1">Он засмеялся, и смех был похож на маленький шерстяной клубочек, который выкатился на стол, прыгнул и снова исчез под столом.</p><p class="p1">— А сколько мы?.. Сколько нас тут не было?</p><p class="p1">— Нисколько. Прикоснулись да руки отдернули от искры. И что вы видели?</p><p class="p1">— Ничего, практически ничего, — быстро произнесла Лиза.</p><p class="p1">— Правильно отвечаете, — медленно улыбнулся старик, как, наверное, улыбнулась бы черепаха.</p><p class="p1">Адъютант отсоединил ручку, упаковал ящик обратно в брезентовый мешок и ушел с ним куда-то. Хозяин сказал устало:</p><p class="p1">— Это хорошо, что мы повидались. И хорошо, что ты приехал не один, это очень ценно. Потому что я успею сказать тебе важную вещь: ты должен не понять, а ценить то чувство, что у тебя есть. Поймешь потом. Родители тебе твердят наверняка про оценки в табеле. Не спорь с ними, но те друзья, которые есть у тебя сейчас, всегда будут главнее. Самое важное у тебя именно сейчас, хотя потом будет казаться, что пора вырастать из детской дружбы и влюбленности. Вы будете расставаться и, быть может, заживете порознь, но это все глупости. Дружба, которая сейчас, навсегда, я тебе говорю, и предательство тоже навсегда. Очень важно, чтобы с тобой были люди, которые помнят тебя с детства. Они, как часовые, не дадут тебе сделать неправильного шага. Ты, конечно, все равно его сделаешь, но они успеют крикнуть тебе «Стой!», и ты, возможно, услышишь. Впрочем, я устал. Прощаться не надо, сейчас я укачусь от вас в комнаты, а Никита Васильевич довезет вас до станции. Он все равно туда собирался.</p><p class="p1">Зажужжал мотор коляски, и Лиза с Андреем увидели, как старый генерал исчезает в проеме двери.</p><p class="p1">Кажется, навсегда.</p></span>
