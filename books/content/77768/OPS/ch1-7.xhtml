<p class="p">Глава 4</p>
<p class="p">Разговор на Калачёвке</p>
<p class="p">Эдуард Веркин</p>
</div><p class="p1">— <em>Rakhmetoff, really</em>!<a href="ch2.xhtml#id29" class="a">[14]</a></p><p class="p1">Дейнен быстро сфотографировала Лубоцкого, замершего с гирями в позе классического циркового атлета.</p><p class="p1">— Я в том смысле, что он тоже не ел апельсинов, — пояснила Дейнен и сфотографировала Лубоцкого тщательнее.</p><p class="p1">Лубоцкий уронил гири, благовоспитанно остановил их падение в сантиметре от пола и осторожно установил на самодельный деревянный помост.</p><p class="p1">— У меня просто на цитрусовые аллергия, — пояснил Лубоцкий, потирая запястья. — А ты откуда про Рахметова знаешь?</p><p class="p1">— Лагерь интеллектуального резерва, литературная смена, отряд имени Державина, — зевнула Дейнен. — «Что делать?», «Как закалялась…», «И в гроб сходя…» — ну и вообще, сплошной бетон и железобетон, весь август мимо… А мастер тухло косплеил Мастера… — Дейнен отстраненно хихикнула.</p><p class="p1">Лубоцкий опустил руки в оловянный тазик, обильно вспылил магнезию, растер между пальцами, похлопал в ладоши, принялся вращать плечами, разминая передние и средние дельты.</p><p class="p1">Дейнен вытянула ноги и поставила их на старый телевизор.</p><p class="p1">— Знаешь, такой мужичочек, лет тридцати, — брезгливо рассказывала Лиза. — Волосенки, штанишки узкие, бороденка карасем, хипстота вроде как и шапочка с буковкой…</p><p class="p1">— Неужели М?</p><p class="p1">— Не, W, вроде как Writer. Так он эту шапочку постирал, вывернул и случайно надел, как? Голова кругом от этих разночинцев…</p><p class="p1">— Да уж…</p><p class="p1">Лубоцкий подпрыгнул, легко повис на перекладине. Дейнен чихнула.</p><p class="p1">— А ты зачем туда ездила? — Лубоцкий подтянулся. — Ты же вроде передумала в писатели?</p><p class="p1">— Не передумала. Потом, там все уже были…</p><p class="p1">Дейнен достала из сумочки блокнот с Коньком-горбунком на обложке и изгрызенный оранжевый карандаш.</p><p class="p1">— У меня обострился кризис идентичности, — пояснила она. — Но теперь я излечилась березовой почкой.</p><p class="p1">— Л-карнитин тоже помогает, — заметил Лубоцкий. — Л-карнитин и кроссфит — и все кризисы… отступят.</p><p class="p1">Лубоцкий продолжил мягко, с легким хрящевым хрустом в левом локте подтягиваться. Дейнен сидела в кресле, листала блокнот.</p><p class="p1">— Моей маме помогли пиявки. Знаешь, там, на углу с Трофимовским, открыли чудесное пиявочное бюро…</p><p class="p1">— Имени Дуремара, — не удержался Лубоцкий.</p><p class="p1">Лиза поглядела на Лубоцкого порицательно, всякую пошлость она не переносила с детства.</p><p class="p1">— В пиявках — гирудин, — попытался исправиться Лубоцкий и подтянулся еще раз.</p><p class="p1">— Ну да… А ты слышал, что в восемнадцатом доме исчезли две пенсионерки?</p><p class="p1">Лубоцкий помотал головой, подтянулся.</p><p class="p1">— Да, исчезли, — подтвердила Дейнен. — Средь бела дня две пенсионерки. Словно растворились… Прямо как у Тарковского в «Зеркале», помнишь?</p><p class="p1">Лубоцкий замер в негативной фазе движения, пытаясь вспомнить пенсионерок Тарковского. Дейнен снова чихнула.</p><p class="p1">— Как в июне сопли текут, аллергии мне не хватало, что за погода… Роман, что ли, написать…</p><p class="p1">Погода держалась удивительная, бабье лето заблудилось в старых московских переулках, похоже, надолго, вода в реке зацвела и стала изумрудной, впрочем, многие грешили на ирландцев.</p><p class="p1">— Я думаю, это все Шергин-старший. — Дейнен высморкалась в платок. — Его мутантство.</p><p class="p1">— Похищает пенсионерок?</p><p class="p1">— Ну зачем похищает? Просто денег им дал и вывез в Чертаново.</p><p class="p1">— В Чертанове — пришельцы, — сказал Лубоцкий. И подтянулся.</p><p class="p1">— А все думают, что пенсионерки исчезли, потому как там портал…</p><p class="p1">На портал Лубоцкий не нашел что сказать, вспомнил про отца и «Госуслуги», где тот нашел информацию по сносу, подтянулся молча.</p><p class="p1">— А чтобы недвижимость подешевела, Шергин распространяет слухи. — Дейнен почесала лоб карандашом. — Пенсионерки пропадают — это раз. Некоторые слышат вот такой зловещий звук… — Дейнен вытянула губы свистком и протяжно погудела.</p><p class="p1">На балкон ворвался словно бы высвистанный Лизой ветер, колыхнул органзу штор, взболтал магнезию и железо, Лиза чихнула в третий раз.</p><p class="p1">— …Это два. Некоторым звонят в дверь, человек открывает, а там пустота…</p><p class="p1">— Мне так звонили, — согласился Лубоцкий. — Я открыл — а там пустота.</p><p class="p1">— А на чердаках каменная плесень.</p><p class="p1">Лубоцкий едва не сорвался с турника фирмы «Хват и Ко», поставщика инвентаря для понимающих атлетов.</p><p class="p1">— Каменная плесень? — уточнил он.</p><p class="p1">— Ну да. Камнееда. Она ест кирпичи, превращая их в прах.</p><p class="p1">Дейнен достала телефон, быстро сверилась:</p><p class="p1">— Да, есть такая. Если в домах заводится такая плесень, то все — недвижимость катастрофически дешевеет. Скупай — не хочу.</p><p class="p1">— Пожалуй… — Лубоцкий повис на левой руке, отдыхая и размышляя о несомненных преимуществах «мексиканки», немного о разночинцах, о Шергине и о плесени.</p><p class="p1">— Шергин выводит пенсионерок через портал, — сказал Лубоцкий, перекинувшись на правую. — Через портал… В Чертаново. Так?</p><p class="p1">— Он — Чичиков!</p><p class="p1">Дейнен, сидящая на подлокотнике монументального вишневого кресла, сверзилась от восторга на пол. Не поднимаясь, принялась быстро писать в блокнот, энергично пиная пяткой чугунную двухпудовую гирю.</p><p class="p1">Из мебели в комнате имелось лишь кресло, старинное, красной кожи, и телевизор, тоже старинный, все остальное пространство занимала спортивная коллекция Лубоцкого: штанги, шведские стенки, булавы, цепи, колосники, кувалды и колесные пары вагонеток, стальные цирковые шары и разновесные купеческие гири, одну из которых энергичной пяткой пинала в тот погожий сентябрьский день Лиза Дейнен.</p><p class="p1">Иногда, видимо в шаг с мыслями, Лиза отрывалась от записей и смотрела в потолок с видом настолько изумленным, что Лубоцкий, продолжавший висеть на турнике, опасался, что она может укусить себя за руку.</p><p class="p1">Лубоцкий возобновил подтягивание и сделал четыре подъема.</p><p class="p1">— Чичиков не Шергин. — Дейнен оторвалась от раздумий. — Чичиков — сама Шерга!</p><p class="p1">— Почему? — спросил Лубоцкий.</p><p class="p1">— Это же ясно: она лечилась в Швейцарии, — ответила Лиза.</p><p class="p1">Лубоцкий хотел почесать голову, но были заняты руки.</p><p class="p1">— Да ладно, это же все знают. — Дейнен принялась обмахиваться Коньком-горбунком. — Сизый давно рассказывал, его папенька пробивал, а ты все мимо. Она в Швейцарию уехала в восемь лет, во второй класс ходила. И приехала — тоже во второй класс пошла, тоже в восемь лет. Где два года?!</p><p class="p1">Лубоцкий почувствовал усталость в предплечьях.</p><p class="p1">— Вот и рассуждай. Что она два года делала?</p><p class="p1">— Лечилась? — предположил Андрей.</p><p class="p1">— Да она здоровая, как зебра! Лечилась… Известно, где она лечилась! — Дейнен пощелкала зубами.</p><p class="p1">— И что? — не понял Лубоцкий.</p><p class="p1">— Как что? Я же говорю — это все она! Она своему папочке в уши поет: давай снесем Калачёвку, давай снесем, а я всех уговорю съехать в Бибирево!</p><p class="p1">Лубоцкий замер. Подтягиваться и думать одновременно было нелегко.</p><p class="p1">— Она вроде не уговаривала, — заметил Лубоцкий после паузы.</p><p class="p1">— Это тебе так кажется. Ах, я не при делах, ах, это мой папа, а сама… а сама… — Дейнен замолчала.</p><p class="p1">— А как же пенсионерки? — спросил осторожно Лубоцкий. — Как же плесень?</p><p class="p1">Дейнен замерла, задумавшись, а потом хлопнула себя блокнотом по лбу.</p><p class="p1">— Ее подменили!</p><p class="p1">Лубоцкий замер на перекладине, попытался подтянуться, не смог. Он шумно выдохнул и спрыгнул на пол.</p><p class="p1">— Сорок восемь, — сказала Дейнен. — Ничего так, плюс пять с июня…</p><p class="p1">— Мало. — Лубоцкий вздохнул. — Отстаю от графика на сто километров.</p><p class="p1">— Ты что, в космонавты готовишься? — усмехнулась Дейнен.</p><p class="p1">Лубоцкий не ответил.</p><p class="p1">— Ты слишком длинный для космонавта, — сказала Лиза. — Иди в вертолетчики, там длинные нужны.</p><p class="p1">Лубоцкий подошел к подоконнику. Из западного окна открывался унылый вид на стену соседнего дома, в окне напротив сидела мрачная белая кошка.</p><p class="p1">— У Шерги никаких моральных устоев, — сказала Лиза. — Могу поспорить — она сама убила эту крысу из травмата!</p><p class="p1">Лубоцкий надел синюю толстовку, достал из кармана телефон и набрал номер Анны.</p><p class="p1">— Привет, Шерга, — сказал он неприятным сутяжным голосом. — Да, конечно, тридцать три! Ракетчики лошадь в овраге доедают! Не благодари…</p><p class="p1">Дейнен показала Лубоцкому язык, встала и громко прошептала:</p><p class="p1">— Ее подменили на чучело!</p><p class="p1">— Да, Аня, нам это не нравится! — сказал Андрей. — Тут слухи нехорошие ходят… Да, да, про тебя… В каком вагоне?</p><p class="p1">Лубоцкий внимательно слушал в трубку. Дейнен сняла с полки резиновый жгут, наступила на него ногами и попыталась растянуть.</p><p class="p1">— Нет, я могу, конечно, хоть в рынду, но ты пойми, это не выход!</p><p class="p1">Лубоцкий сел на подоконник, стал слушать. Мрачная кошка в окне не шевелилась.</p><p class="p1">— Воблер? — удивленно спросил Лубоцкий. — Кость? Сама, Шерга, замотайся!</p><p class="p1">Дейнен забыла про растягивание жгута и смотрела на Лубоцкого.</p><p class="p1">— Какой-какой? — пораженно спросил он. — При чем здесь жабры? Ты погоди бычить, вот и Лиза со мной согласна…</p><p class="p1">Жгут звонко шлепнул Лизу в лоб. Дейнен ойкнула и сощурилась на Лубоцкого.</p><p class="p1">— Сама крыса, — сказал Лубоцкий и отключился.</p><p class="p1">Он озадаченно потер ладони и положил телефон на подоконник.</p><p class="p1">— Сказала, что вырвет гланды. — Лубоцкий пожал плечами.</p><p class="p1">Несколько секунд Лиза сидела с обиженным лицом, потом захохотала. Лубоцкий тоже засмеялся, и они некоторое время смеялись вместе, Дейнен прекратила первой.</p><p class="p1">— Да-да, Андрюшенька, ловко ты, молодец! — сказала она. — Крыса или кость! Не, я, конечно, знала, что ты не тормоз, но ты вообще… Зачем тебе в космонавты, иди в скоморохи.</p><p class="p1">— О чем ты?</p><p class="p1">— Сделал вид, что позвонил Шерге, а сам не звонил! — Дейнен похлопала в ладоши. — Браво, буратинка, Бернард Шоу одобряет! Не зря к тебе зашла сегодня, буду веселиться. Ну-ка помоги кресло сдвинуть!</p><p class="p1">Дейнен принялась выталкивать кресло на балкон. Кресло было тяжелое, толкалось туго, хотя Лиза старалась упираться ногами не только в пол, но и в стену. Лубоцкий помогать не спешил.</p><p class="p1">— А если так? А если они не торговый центр строить собираются, — говорила Дейнен. — То есть наверняка не торговый центр, зачем в Москве еще один торговый центр, их и так девать некуда… Если они собираются строить… — Дейнен уперлась в стену крепче. — Я ей сама все гланды вырву, козе…</p><p class="p1">Кресло сдвинулось и застряло поперек выхода, Дейнен толкнула еще раз, устала, бухнулась на сиденье, вернулась в блокнот.</p><p class="p1">— У Шергиной, кажется, истерика, — сказал Лубоцкий. — Несет поразительный бред.</p><p class="p1">Он вытер руки полотенцем, снова похлопал в тазике с магнезией, поднял с пола цепь, пропустил ее за спиной и принялся сосредоточенно растягивать.</p><p class="p1">— Знаешь, почему я с тобой дружу, Лубоцкий? — не отрываясь от блокнота, спросила Лиза.</p><p class="p1">— Я подарил тебе зеленые санки.</p><p class="p1">Цепь натянулась.</p><p class="p1">— Ты, Андрюша, нескучный. Хотя и санки тоже. Жаль будет с тобой расставаться.</p><p class="p1">— Почему расставаться?</p><p class="p1">— Ты уедешь в Свиблово сегодня, завтра в Люберцы уеду я. Шерга, которую подменили в Швейцарии, скупает у жителей Калачёвки квартиры, чтобы снести квартал и на его месте построить пирамиду… Увы, мы бессильны перед поступью гремящего хаоса.</p><p class="p1">Лубоцкий распустил цепь, пожал плечами.</p><p class="p1">— Необязательно, — сказал он. — Совсем и необязательно пирамиду. Возможно, это будет небоскреб. Я слышал, собираются его построить в виде огромной ракеты.</p><p class="p1">Лубоцкий напрягся, цепь зазвенела, но не поддалась.</p><p class="p1">— В виде ракеты?</p><p class="p1">Цепь звенела, но не рвалась.</p><p class="p1">— Мой прадед мог порвать, — вздохнул Лубоцкий печально и опустил цепь. — Он преподавал в гимназии.</p><p class="p1">— Имени Бернарда Шоу?</p><p class="p1">— Имени Кржижановского.</p><p class="p1">— Говорят, они были друзьями.</p><p class="p1">Дейнен взяла маленькую бутылочку с минералкой, открыла и стала мелко пить.</p><p class="p1">— Шерга, конечно, не Чичиков, — сказала печально Дейнен, — до Чичикова ей далеко, нет, обычная дура с папой… Помнишь, она мне кликуху придумала?</p><p class="p1">— Не очень… Белка?</p><p class="p1">— Бобр.</p><p class="p1">Дейнен улыбнулась, Лубоцкий отметил, что на бобра она похожа все-таки больше, чем на белку, и снова натянул цепь.</p><p class="p1">— И что? — спросил он.</p><p class="p1">Лубоцкий достиг изометрического пика, высчитал двенадцать секунд, расслабил мышцы.</p><p class="p1">— А у меня тогда как раз черная полоса началась, из художественной школы выгнали, все вокруг как озверели… — Дейнен выпила полбутылки. — А тут Шерга подойдет так и говорит потихоньку: «Эй, Бобр! Эй, Бобр!» Потом мне полгода снились, знаешь, такие мордастые, всё ходят, ходят, ходят…</p><p class="p1">Лубоцкий несколько потерял нить разговора и не уловил, кто именно настойчиво снился Дейнен, бобры или мастера художественных искусств.</p><p class="p1">— Я же тебе жаловалась, — напомнила Дейнен.</p><p class="p1">— Я думал, про бобров ты иносказательно.</p><p class="p1">— Нет, — покачала головой Лиза. — Ты не представляешь, как я ненавижу бобров. Иногда мне кажется, что я чувствую их запах…</p><p class="p1">Дейнен понюхала воздух, поморщилась. Лубоцкий вооружился резиновой лентой. Кошка напротив оказалась не чучелом и принялась умываться лапой.</p><p class="p1">— Моего отца в детстве бобер укусил, — сказал Лубоцкий. — А сейчас их еще больше стало…</p><p class="p1">Лиза пила минералку. В широкие окна четвертого этажа задувал теплый ветер, пятница, и в школу завтра не надо, и… Лубоцкий пробовал почувствовать радость от предстоящих выходных, но почему-то не чувствовал ничего. Завтра они собрались встретиться у Дорохова и обстоятельно обсудить сложившееся положение, потом куда-нибудь сходить посидеть, отдохнуть.</p><p class="p1">Лубоцкий поглядел в северное окно на каштаны. Каштаны гораздо лучше весной.</p><p class="p1">— Я как вижу Шергину, так у меня… Да ну их… Я даже перевестись из нашей школы хотела. Просила у мамы…</p><p class="p1">Дейнен допила воду, свинтила крышечку, приладила ее на левый глаз, как монокль, встала в кресле, уставилась на Лубоцкого.</p><p class="p1">— «Это лучшая английская школа! — пропищала Дейнен, видимо, передразнивая мать. — Туда очередь как до Владивостока! Ах, Лиза, Бернард Шоу ходил по этим коридорам! Он опирался на эти стены и оставил на них свой автограф! Здесь все дышит культурой! Здесь творилась история! Здесь…»</p><p class="p1">Дейнен замолчала и вдруг пошла красными пятнами, Лубоцкий испугался и подал Лизе еще бутылочку. Дейнен вернулась в кресло с пробкой в глазу.</p><p class="p1">— То есть ты за? — не понял Лубоцкий.</p><p class="p1">— Не знаю. Если Шергина снесет квартал — в старших классах я ее не увижу. Если Шергина не снесет квартал — я порадуюсь, что ее планы расстроились.</p><p class="p1">— А я?</p><p class="p1">— Тебя, конечно, жаль. Но…</p><p class="p1">Дейнен допила вторую бутылочку, открутила пробку, зажала ее правым глазом. Лубоцкий взял пружинные кистевые эспандеры.</p><p class="p1">— Я буду грустить о тебе в Мытищах. Вспоминать, писать стихи. Это хорошо для души.</p><p class="p1">— Это хорошо для души?</p><p class="p1">— Это хорошо.</p><p class="p1">Дейнен подняла брови и уронила пробки. Лубоцкий закрыл эспандеры.</p><p class="p1">— Но до Чертанова не так уж и далеко, — с сомнением заметил Лубоцкий.</p><p class="p1">— Не надо! Нет, нет, это вселенная, я в Мытищах, ты в Чертанове, между нами Москва, как бездна. Только так, только так…</p><p class="p1">Дейнен достала телефон, набрала номер, приложила трубку к уху и приготовила лицо. Улыбнулась, верхние зубы чуть подвыступили и подняли губу.</p><p class="p1">— Анечка! Как у тебя здоровье?! Нет, не чешется. Вот Андрюша Лубоцкий тебе тоже приветки передает…</p><p class="p1">Дейнен заквирикала в трубку. Лубоцкий сосредоточился на эспандерах.</p><p class="p1">— Да-да, да-да, — говорила Дейнен, легкомысленно покачивая ногой. — Да-да, подпрыгнула. Самбисты всегда в авангарде… Нет, на идиотов не похожи…</p><p class="p1">Лубоцкий щелкал эспандерами.</p><p class="p1">— Что делаем? Да как сказать… Страдаем. Да. У Андрюшеньки бабушка… да-да, та самая — с носками! — Дейнен подмигнула Лубоцкому. — Это точно, одной ногой в Валгалле, но еще ого-го! Короче, кое-как держится. Хочет помереть в своей постели, а ее постель в доме нумер три Калачёвского проезда. Что значит — «ну и что?» Ты совсем старость не уважаешь?!</p><p class="p1">Дейнен попыталась сделать строгий голос, получилось что-то вроде болгарки, кошка в соседнем доме убралась с окна.</p><p class="p1">— Нет, крысу тебе не Петька подкинул, — продолжала беседу Дейнен. — Крыса — это вроде как…</p><p class="p1">Дейнен замолчала, слушая.</p><p class="p1">— Сама коряга, — сказала Дейнен через минуту и отключилась.</p><p class="p1">У Лубоцкого не было бабушки, тем более с носками.</p><p class="p1">— Ответный удар? — спросил Лубоцкий.</p><p class="p1">— То есть? — не поняла Дейнен.</p><p class="p1">— Сделала вид, что позвонила, а сама не звонила.</p><p class="p1">Дейнен зевнула. Лубоцкий закрыл эспандеры.</p><p class="p1">— Это Шерга! Сделала вид, что ее топят, а сама ничуть не тонула!</p><p class="p1">— Ты думаешь?</p><p class="p1">Лубоцкий открыл эспандеры и закинул их в тазик с магнезией.</p><p class="p1">— Молодежный театр имени неистового Тыбурция, — пояснила Дейнен. — Она сама себя высекла, у них это повсеместно.</p><p class="p1">— Зачем ей это? — не понял Лубоцкий.</p><p class="p1">— Какой именно ей? А может, их две? — Дейнен выразительно постучала пальцем по виску.</p><p class="p1">— Одна хочет снести Калачёвку, а другая хочет сама себе помешать. Ну вроде как у нее ментальное раздвоение. Залечили в Швейцарии. И теперь она как бы сама себя каждый день высекает на подмостках.</p><p class="p1">— Не. — Лубоцкий покачал головой. — Раздвоение — это было. У всех раздвоение…</p><p class="p1">Лубоцкий посчитал по пальцам, некоторое время смотрел на них задумчиво.</p><p class="p1">— Со счета сбился… Короче, штук двадцать с раздвоением. Джекилл и Хайд, Тайлер Дёрден…</p><p class="p1">Дейнен почесала голову карандашом.</p><p class="p1">— Ну, не знаю, — сказала она. — Если не Чичиков и не раздвоение, то что?</p><p class="p1">— Заговор тамплиеров…</p><p class="p1">Дейнен хихикнула.</p><p class="p1">— Заговор лилипутов, — передразнила она. — Знаешь, заговоров тамплиеров в сорок раз больше, чем раздвоений. В сердце каждого графомана бешено стучит маятник Фуко.</p><p class="p1">Дейнен понравилось, она немедленно внесла фразу в блокнот и отделила ее от прочих записей зубчатым заборчиком.</p><p class="p1">— А вообще, воблер и кость, — сказала она. — Так я все и назову: «Воблер и кость». Произведение литературы. Книгу! Роман!</p><p class="p1">Дейнен потрясла блокнотом и пририсовала Коньку-горбунку на обложке букву З.</p><p class="p1">Лубоцкий снял с полки жестяную банку, вытряс из нее белковые батончики, предложил Дейнен со вкусом клюквы, себе взял со вкусом черники. Стали жевать.</p><p class="p1">— А почему тебе пирамида не нравится? — спросила Дейнен, доев батончик. — Пирамида — это красиво и неслучайно.</p><p class="p1">— По-моему, скучно, — возразил Лубоцкий, тоже доев батончик. — Пирамиды вышли из моды семнадцать бестселлеров назад, придумай чего-нибудь, ты же литератор.</p><p class="p1">— Хорошо, — сказала Дейнен. — Легко. Слушай. А если не пирамида? Если башня? Знаешь, по-моему, в Москве давно хотели построить башню…</p><p class="p1">Дейнен потерла пальцами виски.</p><p class="p1">— Башню ленинского коммунизма, — сказала она. — Так, кажется?</p><p class="p1">— Вряд ли сейчас такую даже в книгах строить будут. Какую-нибудь другую построят.</p><p class="p1">— Башню имени Бернарда Шоу.</p><p class="p1">— Бернард Шоу был мужем Сары Бернар, — сказал Лубоцкий и протянул руку к миске с магнезией. — У него была широкая саксонская кость, он мог…</p><p class="p1">Договорить Лубоцкий не успел, громыхнуло, пол подпрыгнул, гантели, гири и прочий инструментарий, знаменующий полтора столетия увлечения семьи гигиенической гимнастикой, тяжело звякнули. С полки на стене осыпались медали и кубки, завоеванные предками Лубоцкого в спортивной борьбе.</p><p class="p1">Дейнен прикусила язык и зашипела, Лубоцкий же опрокинул магнезию на себя.</p><p class="p1">— Что бы это могло быть? — поинтересовался Лубоцкий.</p><p class="p1">— Взорвалось, кажется, — ответила Дейнен.</p><p class="p1">Она достала зеркальце и рассматривала окровавленный кончик языка. На улице орали автомобильные сигнализации.</p><p class="p1">— Что могло взорваться? — Лубоцкий тер нос.</p><p class="p1">— Похоже на газовый баллон, — проявила осведомленность Дейнен. — У нас на даче у соседей взорвался — весь погреб разворотило.</p><p class="p1">И Андрей, и Лиза перебрались через кресло на балкон. Снизу, со стороны переулка, поднималась кипящая пыль.</p><p class="p1">— Что это? — Лубоцкий сощурился.</p><p class="p1">— Она, — ответила Дейнен.</p><p class="p1">У Дейнен зазвонил телефон, она ответила. Молчала в трубку.</p><p class="p1">Лубоцкий наблюдал за пылью. Пылевая стена поднялась до третьих этажей и теперь приближалась и бурлила, как при взрыве Кракатау или Везувия. Но метров за сто до дома Лубоцкого туча выдохлась и осела, и стала видна улица. Все дома были на месте, припаркованные вдоль тротуаров машины посерели и мигали аварийками, на перекрестке возник затор от погасшего светофора, но люди из машин не выходили, опасаясь пыли, и Лубоцкий узнал странное сиротливое чувство, точно умер мир и остались только они с Дейнен на балконе, и даже пыль не поднялась.</p><p class="p1">Он оглянулся на Лизу и чихнул в первый раз за этот день.</p><p class="p1">Дейнен спрятала телефон.</p><p class="p1">— Безносов звонил, — сказала она.</p><p class="p1">— И что? — осторожно спросил Лубоцкий.</p><p class="p1">— Водокачку взорвали. Рядом с его домом старая водокачка, ну помнишь же, с буквами? Взорвали. Сложилась, как спичечная.</p><p class="p1">— Да. — Лубоцкий потер лоб. — Что бы это значило?</p><p class="p1">— Это Шерга, — уверенно сказала Дейнен. — Посылает нам зловещий знак.</p><p class="p1">— Какой?</p><p class="p1">— Сегодня водокачка — завтра ты.</p><p class="p1">Дейнен указала пальцем на Лубоцкого. По улице, вопя сиреной и моргая мигалками, проехала пожарная машина. Пыль снова поднялась, ненадолго.</p><p class="p1">— И еще… — Дейнен замолчала.</p><p class="p1">— Что еще?</p><p class="p1">— Там вроде как стену начали строить.</p><p class="p1">— Какую?</p><p class="p1">Дейнен пожала плечами. Лубоцкий нахмурился.</p><p class="p1">— Надо завтра все это серьезно обсудить на собрании, — сказал Лубоцкий и чихнул.</p><p class="p1">— Взрыв водокачки? — уточнила Дейнен. — Стену?</p><p class="p1">— И стену тоже. Если уж Шерга взялась за водокачки…</p><p class="p1">— Ты серьезно? — перебила Дейнен.</p><p class="p1">— Абсолютно. Бирюлево не пройдет. Надо оказать ей сопротивление.</p><p class="p1">— Ага… — усмехнулась Дейнен.</p><p class="p1">— Придешь? — спросил Лубоцкий.</p><p class="p1">Дейнен не ответила. Она смотрела на обезлюдевшую улицу, на замершие машины и на пыль. Дорогу наискось медленно переходила толстая ленивая собака, в пыли за собакой оставались круглые следы. Неожиданно Лизе стало сильно грустно. Обычно грусть приходила ближе к ноябрю, но в этом году случилась раньше. То ли Лубоцкий со своими эспандерами, то ли взрыв водокачки, то ли ситуация с Шергиной, но Лиза загрустила. Она вдруг подумала, что это надолго, на год и дальше и, может быть, навсегда.</p><p class="p1">— Приходи, — опять предложил Лубоцкий.</p><p class="p1">Лиза снова не ответила. Она поудобнее пристроила блокнот с Коньком-горбунком на перила и стала писать.</p></span>
