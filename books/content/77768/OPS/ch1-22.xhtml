<p class="p">Глава 19</p>
<p class="p">Не боги</p>
<p class="p">Серафима Орлова<a href="ch2.xhtml#id53" class="a">[35]</a></p>
</div><p class="p1">Дверь распахнулась. Люди в штатском впихнули Аню Шергину внутрь, к остальным, и снова заперли пленников. Аня была явственно зеленой, сразу осела на пол. Шергин, Вася Селезнев и девочки — все, кроме Лизы Дейнен, — бросились к ней, а Федя Дорохов и Андрей Лубоцкий — к двери, яростно барабаня кулаками и требуя выпустить их наконец. Ответа не последовало. Удары сыпались на дверь, через минуту к ним прибавилось странное эхо. Федя замер, шикнул на Андрея и Наташу Батайцеву, с причитаниями обмахивавшую Аню надушенным платочком. Все замерли и прислушались. Где-то вдали раздался гул, мерный и словно бы осязаемый. Все вокруг едва ощутимо вибрировало. Нет, это были не удары, скорее, подземные толчки.</p><p class="p1">— Сюда, что ли, Годзилла идет? — Федя почесал в затылке.</p><p class="p1">— Хуже, — мрачно ответила Аня.</p><p class="p1">— Что ты знаешь? Говори, времени в обрез, а любая информация может помочь нам выбраться! — Федя хотел вцепиться в Аню, но Вася встал на его пути:</p><p class="p1">— Ты видишь, она еле жива!</p><p class="p1">— Нет-нет, он прав, надо рассказать. — Аня устало скривила губы.</p><p class="p1">Сил, чтобы поведать безумную сагу о Волне и человеке с новогоднего экрана, не было. И времени действительно не хватало, чтобы изложить все достоверно. Но придется как есть. Она открыла рот и осеклась. Сквозь гулкие удары прорвался новый звук: шум вертолета.</p><p class="p1">— Сбегает, — прошептала Аня.</p><p class="p1">— Кто? — напирал Федя.</p><p class="p1">— Да Хозяин… Боюсь, теперь мы совсем не защищены, раньше здесь хоть его охрана была, а теперь нас могут раздавить как котят. Нужно выбираться отсюда любым способом.</p><p class="p1">И Аня, насколько смогла коротко, поведала одноклассникам и оторопевшему отцу все, что узнала о природе Волны. И заодно про новое, поистине шизофреническое порождение Волны — беснующийся на горизонте дом-чудовище из Калачёвского квартала.</p><p class="p1">— Я думаю, если кто и сможет сейчас что-то с этим сделать, так это Лиза, — подытожила Аня. — Она вроде как может влиять на Волну… У нее какой-то природный передатчик вшит, наверное. Мы это уже видели не раз.</p><p class="p1">Все разом обернулись к Лизе — она сидела в углу с блокнотом и рисовала в нем каракули, как делала это всегда от ужаса немоты перед чистым листом, да и просто от ужаса. Лиза тоже была бы рада к кому-нибудь обернуться, но переложить ответственность оказалось не на кого. Даже верный Андрей Лубоцкий только и смог, что отойти от двери и сесть рядом с Лизой. Она почувствовала его тепло, энергия напружиненного, сильного тела кольнула ее, заставив расправить плечи. Лиза наконец смогла посмотреть Ане в глаза:</p><p class="p1">— А если окажется, что все мы ненастоящие?</p><p class="p1">— Я не думаю, что мы ненастоящие, — быстро заговорил Федя, не давая Ане ответить самой. — На самом деле мы сейчас в суперпозиции, как кот Шрёдингера. Мы и настоящие, и нет. То есть с помощью Волны мы можем повлиять на подлинность своего существования. Если ты, Лиза, нас не развоплотишь с помощью письма, нас никто не отличит от настоящих. Как и Калачёвский квартал. Как и весь этот район… а может быть, и больше… шире…</p><p class="p1">— Загадочная русская душа, — пробормотала Лиза. — Душа под Волной…</p><p class="p1">— И что? Не тормози. — Федя снова входил в раж.</p><p class="p1">— Ничего… Мой папа датчанин. Не уверена, что понимаю эти штуки с русской душой.</p><p class="p1">— Не вижу, как это…</p><p class="p1">— Я вообще думал, что мой отец — это твой отец тоже, — вмешался Петя Безносов. — Ну, все к этому вело. У тебя способности, значит, ты третий ребенок, нужный для ритуала. Но, видимо, ритуала никакого не существует, я даже не понимаю теперь, есть ли у меня отец или я гомункул какой-то…</p><p class="p1">— Ритуал, — пробормотала Лиза. — Может быть, если очень верить, получится все это запечатать… только как верить, если вы мне все рассказали? Вы рассказали мне слишком много! — в сердцах воскликнула она. — Я теперь не могу отделаться…</p><p class="p1">Лиза снова скорчилась у стены и обхватила голову руками, кожей чувствуя направленные на нее взгляды. Только Андрей не смотрел. Он просто сидел рядом, не говоря ни слова. Его тепло через прикосновение локтя переливалось в Лизу, как донорская кровь. От этого прикосновения в Лизе поднималась новая сила, погребенный под спудом неведомый внутренний резерв.</p><p class="p1">— Я попробую, — нехотя сказала Лиза. — Только отвернитесь все и не галдите. Нет, ты, Андрей, не уходи.</p><p class="p1">Лист со спасительными каракулями был перевернут, и перед Лизой вновь оказалась ужасная в своей первозданности чистая страница.</p><p class="p1">— Годзилла, — прошептал Андрей. — Большой страшный Годзилла из кирпича и арматуры. Штукатурный монстр. Смешно же. Мы в гребаном аниме…</p><p class="p1">Лиза и не хотела, а хихикнула.</p><p class="p1">— Бояр-аниме, — поправила она. — Все признаки налицо: сверхспособности, клановые интриги, чудовища, магия-шмагия, распадающийся на части мультиверсум…</p><p class="p1">— Только вместо японцев датчане, — развил идею Андрей. — Еще у Миядзаки ходячий замок сперли.</p><p class="p1">Лиза засмеялась в голос. Федя Дорохов не выдержал и гневно оглянулся. Ему совсем не хотелось быть раздавленным штукатурным Годзиллой всмятку. Судя по подземным толчкам, взбесившийся дом шагал уже совсем близко.</p><p class="p1">— Нужно что-то писать, Лиз, — мягко подтолкнул Андрей. — Хочешь, начни, как Тургенев, когда у него был писательский блок… похабное что-нибудь напиши, пусть даже «Русский вестник» этим не удовлетворится<a href="ch2.xhtml#id52" class="a">[36]</a>.</p><p class="p1">— Да нет, — поморщилась Лиза.</p><p class="p1">— Зато просмеешься — и легче станет.</p><p class="p1">— Да я уже просмеялась.</p><p class="p1">Лиза зажмурилась и начала водить ручкой по бумаге, чтобы все-таки снять блок и вывести первую букву, но вместо слов снова возникал рисунок. То самое, что так ее напугало, когда она услышала рассказ Ани о природе Волны. Проклятье, это была карта мира, но искаженная, скомканная, выжранная неведомым зверем. Волна сконструировала под собой таинственные земли, великую Тартарию, которая, едва сверхъестественное влияние ослабло, исчезла, провалилась на дно сияющего озера. Евразийский континент сам себе откусил спину.</p><p class="p1">«Нас нет, — не могла отделаться от разрушительной мысли Лиза. — Нас всех нет. Все выдумано: география, история, культура. Все измыслено неведомым заезжим фантазером, подхвачено Волной и воплощено среди глухих лесов и аукающих болот… Мы все чудь…»</p><p class="p1">Лиза ударила себя кулаком в лоб, сжала пальцы до хруста, растерла костяшками кожу. Если она будет слишком истово думать об этом, все так и выйдет, а не застревать на страшной мысли не получается.</p><p class="p1">Заезжим датчанином… заезжим сказочником…</p><p class="p1">«Все должно быть совсем другим, — подумалось в отчаянии. — Причины должны быть совсем другими… какими-то очень простыми… а нам все так объяснили, чтобы мы поспособствовали собственному уничтожению. Горизонт закрутится, все схлопнется, нет, нет, не думать…»</p><p class="p1">Андрей гладил ее руку. Левую. В правой была ручка, давно прорвавшая бумагу.</p><p class="p1">«Хочу быть ребенком, — тоскливо отозвалась на прикосновения Лиза. — Пусть бы кто-то за меня отвечал. Разве фантазии человечества о богах не то же самое? Так хочется, чтобы кто-то отвечал за весь этот бедлам. Кто-то, не ты».</p><p class="p1">Мысль о богах утешала, подбадривала. Наверное, эта мысль тоже была анимешной, укладывалась в общую стилистику. Лиза думала о том, что, скажем, в синтоизме боги живут под каждым кустом и им можно в любой момент предъявить за базар. Жаль, что она не синтоистка, но этой концепцией стоило воспользоваться.</p><p class="p1">Энергия наконец скопилась в теле и заструилась через ручку на бумагу. Лиза подхватилась и стала писать, полубессознательно, перенося в блокнот строчки раньше, чем осознавала их смысл.</p><p class="p1">«Боги должны быть какими-то очень обычными и не подозревать, что они боги. Пусть у них будет много бумажной работы, как у рядового офисного планктона. Пусть они будут способны творить, но не осознают свою ответственность. Пусть у них все выходит случайно, а на реальность влияет совсем не то, что они почитают лучшим из созданного…»</p><p class="p1">Кровь прилила к щекам, Лизе становилось жарко. Она писала все быстрее, будто медиум — проводник чужой воли. Подземные толчки стихли, но Лиза не обращала на это внимания.</p><p class="p1">«Одна из богинь любит ходить в желтом пиджаке, — строчила Лиза. — У другого бога седые усы щеточкой и младшая сестра, она рыжая… Третий бог очень румяный, кровь с молоком, и у него пышная борода, он разбирается в музыке…»</p><p class="p1">Бред. Реальный бред собачий. Лиза уже видела перед собой удивленные лица этих людей, вызванных из небытия. Они были вырваны из контекста своей жизни, вытащены из самых разных ситуаций — поездка в метро, концерт, до́ма перед маленькой дочерью с ложкой каши, — и теперь они все как будто стояли перед ней со своими смешными повседневными занятиями, со своими планшетами, нотами и ложками, а она обращалась к ним, давя внутри смех:</p><p class="p1">«Вам, наверное, интересно, зачем я вас всех здесь собрала?»</p><p class="p1">Тот, с седыми усами, пожал плечами и раздраженно переступил с ноги на ногу, как бы намекая, что он человек занятой и ему нужно вернуться к работе. Лиза не могла понять, почему они с ней не говорят. Может, человеку не дано слышать голос богов? Из ушей кровь потечет? Только человек может обращаться к богу, не наоборот.</p><p class="p1">Просьба обычная, просьба банальная — все это нужно остановить. Запечатать Волну. Вы, ребята, находитесь на изнанке мира, видите все просто и ясно, знаете, откуда идут вероятностные нити. В ваших силах переплести все заново. Потому что жить в бесконечно меняющемся сновиденном мире нет уже никаких сил.</p><p class="p1">Человеку нужно что-то, что он считает настоящим, подлинным. Только это дает силы существовать. Войдите в наше положение.</p><p class="p1">Боги, кажется, поняли, во всяком случае, кто-то из них кивнул. Лиза надеялась, что они поняли правильно. Все должно вернуться в нормальное состояние. Без шизофрении. А этот вариант развития вселенной надо забраковать, отправить его скомканным исписанным листом в мусорную корзинку. А они все вернутся к началу, где нет еще ни взорванной водокачки, ни проекта Шергина. В конце концов, почему именно жителям Калачёвского квартала так не повезло?</p><p class="p1">Пусть не повезет кому-то другому. Это вполне в божественных силах.</p><p class="p1">Пусть не повезет кому-то другому. Пусть кто-то другой страдает и расселяется. Пусть древняя хтонь под домами не будет потревожена, потому что ее просто не существует. Мир скучный и безопасный, привычный, наполненный привычным злом, которое тем не менее происходит не с нами. Почему не с нами? Потому что мы попросили, чтоб не с нами. Мы очень хорошо попросили.</p><p class="p1">Заяц пусть не приходит, он не может…</p><p class="p1">— Лиза! Лиза! — Андрей тормошил ее. Оказывается, она на секунду уснула над блокнотом.</p><p class="p1">Лиза открыла глаза. В лицо бил яркий свет. Одна из стен каземата исчезла. Внутри уже было пусто — все, наверное, поторопились выйти. Андрей схватил Лизу за руку и вывел из заточения. Они оказались на территории, огороженной забором, пересыпанной кирпичом и битым щебнем. Позади оставался наполовину снесенный дом, видимо, тоже жертва реновации.</p><p class="p1">Пусть не повезет кому-то другому.</p><p class="p1">— Где все? — заозиралась Лиза.</p><p class="p1">— Петька, наверное, побежал свою квартиру проверять, интересно же, исчезла она или нет, — сказал Андрей. — Ну и остальные за ним потянулись. Кроме Шергиных. Аня что-то совсем плоха, они домой пошли.</p><p class="p1">— Откуда здесь мог взлететь вертолет… — пробормотала Лиза.</p><p class="p1">— Что?</p><p class="p1">— Ничего, о некоторых вещах лучше не думать…</p><p class="p1">— Дашь почитать, что у тебя получилось? — Андрей потянулся к блокноту.</p><p class="p1">— Не стоит, — отказалась Лиза и честно добавила: — Это худшее мое произведение. Автоматическое письмо — совсем не мой метод. Сюрреалисты бы животики надорвали.</p><p class="p1">— Не думаю, что это худшее произведение. Рисуешь ты точно намного хуже!</p><p class="p1">Они рассмеялись и стали перебираться через каменные завалы.</p><p class="p1">Пыльный осенний воздух пах сырой штукатуркой, щебенкой, легким дождем. Машины медленно ползли по переулку, перекопанному очередным ремонтом. Тут и там лежали толстые красные трубы, похожие на спагетти. Паста собяньяра, как сказал один ее друг. Андрей и Лиза пробирались по усложненному ремонтом ландшафту, обходя заграждения и ступая в мокрый песок. Все это было страшно родным и успокаивающе привычным. Родное, привычное зло, нацепившее маску бессмысленного благоустройства, зряшных трат в попытках сделать удобнее то, что и так удобно, чище то, что и так чисто, лучше то, что и так хорошо. Улучшайзер, погружающий все в грязь и хаос. Шизофрения. Нет, обсессивно-компульсивное расстройство. Вот лицо демона Москвы. Если есть боги, то есть и демоны, правда? А может, боги и демоны — это одно и то же? Просто силы, которые что-то бесконечно подкручивают в мироздании.</p><p class="p1">Лизе Дейнен не хотелось быть ни богом, ни демоном. Напротив, ей хотелось навсегда сбросить с себя этот груз ответственности, а потом всласть ругать тех, кто сохранил способность что-то решать. Честное слово, никто в целом свете не хочет что-то решать, кроме сумасшедших, которые любят власть больше всего на свете. Лиза не сумасшедшая.</p><p class="p1">— Андрей, а мы-то куда? — спросила Лиза.</p><p class="p1">— Немного осталось. Здесь недалеко.</p><p class="p1">— Это сюрприз? У нас очень давно не было сюрпризов.</p><p class="p1">— Закрой глаза.</p><p class="p1">— Да как я закрою, тут же черт ногу сломит…</p><p class="p1">— Я тебя проведу. Держись крепче.</p><p class="p1">Прежде чем перехватить крепкую родную ладонь, Лиза вновь открыла блокнот и что-то в нем записала, что-то даже более резкое, чем позволял себе Тургенев, находясь в писательском блоке. И в следующее мгновение метнула блокнот на проезжую часть — под колеса забибикавшего такси.</p><p class="p1">Лиза закрыла глаза. Осенняя сырость обнимала ее, ветер гладил щеки. Сейчас будет сквер, где шелестят деревья, разбрасывая сморщенные письмена листьев. А там недалеко и до дома… Лиза знает тут все наизусть, что нового мог отыскать для нее Андрей, что за сюрприз…</p><p class="p1">Пальцы у него холодные, не по погоде оделся и вот застыл. Не жалуется, привык терпеть. Крепкий, закаленный организм. Он, наверное, и в минус пять способен по Москве в футболке шататься. И снегом бы зимой растирался, если бы в последние годы тут был какой-то внятный снег.</p><p class="p1">Пальцы холодные, водянистые, похожие на водяные бомбочки, которые они кидали с балкона, когда Андрей пришел к ней на день рождения, тогда, давно, им было по двенадцать лет…</p><p class="p1">— Андрей?</p><p class="p1">— М-м-м?..</p><p class="p1">— Говори что-нибудь, мне почему-то страшно.</p><p class="p1">— Мне кажется, мы с этим не закончили.</p><p class="p1">— С чем именно?</p><p class="p1">— С Волной.</p><p class="p1">— Не надо о ней. Не думай о белой обезьяне, и она не появится.</p><p class="p1">— Я считаю, что твоего блокнота мало, чтобы запечатать Волну. Нужно спуститься под землю и покончить с ней там.</p><p class="p1">— Я отписалась от этого, — сердито ответила Лиза. — Я больше ничего не смогу, у меня нет способностей. Пусть другие хоть немного поработают. Я не хочу за все отвечать. Петька вон целую квартиру себе навоображал, пусть запечатывает, если у него такая психическая сила…</p><p class="p1">Лиза остановилась. Только что она держала холодную руку Андрея, а теперь? Пальцы хватали воздух.</p><p class="p1">— Андрей?</p><p class="p1">Открывать глаза следовало раньше.</p><p class="p1">Улица была пуста. Деревья склонились над Лизой, но молчали, ветер утих, не шептал, не гладил, ничего не обещал.</p><p class="p1">Лиза не помнила, когда она в последний раз оставалась одна. Очень давно. Всегда не одна. Хотя бы виртуальное «доброе утро» и «спокойной ночи», а чаще долгая переписка перед сном и не разлей вода в любое возможное время — это было про них с Андреем. Она отплевывалась от всех, кто мог вякнуть, что людям необходимо личное пространство и они с Андреем скоро устанут друг от друга.</p><p class="p1">Одиночество для слабаков.</p><p class="p1">— Отвлекал меня до последнего, — прошептала Лиза. — Глаза велел закрыть…</p><p class="p1">Она прислонилась спиной к холодной стене. Далеко впереди, в конце переулка, маячила водокачка — символ Калачёвского квартала.</p></span>
