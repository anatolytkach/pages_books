<p class="p">Глава 5</p>
<p class="p">От Калачёвки к Колпачному</p>
<p class="p">Нина Дашевская<a href="ch2.xhtml#id27" class="a">[15]</a></p>
</div><p class="p1">— Ну ты и накрутил, — сказала Наташа. — Ты что, действительно во все это веришь?</p><p class="p1">— Лубоцкий врать не будет, — отозвался Петя, — да и Дядя Федор…</p><p class="p1">— Федя вечно строит из себя самого умного. А твой Андрей вообще возомнил себя сверхчеловеком, от него уже телефон можно заряжать.</p><p class="p1">Они шагали с Петей по узкому, в неровной плитке, тротуару. Навстречу шла нестарая еще тетка, споткнулась, пробормотала привычное «гори в аду» в адрес нынешнего мэра. Соседний дом с забитыми окнами (под снос) зацепил Петю за капюшон болтающимися проводами. Наташа освободила его, оглянулась: ругательная тетка испарилась, как привидение.</p><p class="p1">— Вот видишь! — обрадовался Петя. — Зуб даю, она уже в Чертанове. Лубоцкий зря не скажет.</p><p class="p1">— Петя! Твой Андрей, как всегда, строит теории заговора, а ты ведешься!</p><p class="p1">Петя хмыкнул. У Наташи Батайцевой была нежная привычка называть одноклассников по именам, даже Шерга во время бойкота у нее оставалась Аней. Вообще Петя не собирался никуда идти с Наташей, она не казалась ему интересной. Наташа была самая младшая в классе и, откровенно говоря, интеллектом не блистала. В школе сестры Батайцевы оказались только из-за своих звездных отцов, но старшая, Соня, была упертая, честолюбие не позволяло ей учиться хуже других. Маленькая же, Наташа, хватала свои тройки, хлопала черными глазами и не расстраивалась. Вот и сейчас она замахала руками, как только Петя попытался хоть как-то проанализировать ситуацию.</p><p class="p1">— Лубоцкий, может, и строит теории заговора, а водокачку взорвали, — сказал Петя. — Верь не верь — все равно окажешься в Чертанове, как исчезающие пенсионерки. А потом и подальше.</p><p class="p1">Наташина бестолковость начинала его раздражать. Вот это ее «ничего не будет, а если и будет — ничего не изменишь, а я так и буду хлопать глазами, хоть в Чертанове, хоть в Бутове».</p><p class="p1">— Чего ты привязался к Чертанову? — спросила Наташа. — Нормальный район… У меня там бабушка живет.</p><p class="p1">— Вот и поезжай в свое Чертаново, — огрызнулся Петя.</p><p class="p1">Калачёвку, кстати, они уже прошли, чего вот Наташа за ним тащится, домой не идет? Не обиделась, ну и ладно. Нырнули во дворы, где возле кинотеатра рос старый дуб.</p><p class="p1">— Дуб ведь тоже спилят? Жалко… А мы тут с Андреем во втором классе желуди собирали, — ностальгически произнесла Наташа. — Он потом в меня с балкона кидался…</p><p class="p1">Петя на секунду представил Лубоцкого, интересующегося желудями. Хмыкнул. И вообще Наташа сумасшедшая, конечно. Дуб ей жалко, а дома что, не жалко?</p><p class="p1">Тренькнул телефон. Сообщение от Лубоцкого: «Тайная ветка метро. Заговор хамовников?»</p><p class="p1">Какие, к черту, еще Хамовники, это совсем другая сторона; что они, всю Москву накрыли, что ли? И в Хамовниках давно есть метро, красная ветка… «Фрунзенская». «Парк Культуры». Чего там еще… на МЦК какая-то станция…</p><p class="p1">«Заговор храмовников», — исправился Лубоцкий. А, тамплиеры. Лубоцкий в своем репертуаре. Вот… из-за одной потерянной буквы весь смысл… хотя какой тут вообще смысл? Никогда не поймешь, Лубоцкий это всерьез или они с Дейнен придумывают там всякую пургу. Хотя, с другой стороны, не раз уже выходило, что пурга авторства зубастой Дейнен оказывалась ближе всего к истине.</p><p class="p1">Ветер гнал навстречу пустую пивную банку, Петя наступил на нее, смял — и банка будто обняла его конверс, прицепилась и хрустела при каждом шаге. Петя запрыгал на одной ноге, отцепляя ее, Наташа засмеялась:</p><p class="p1">— Какой же ты, Петя… в самом деле!</p><p class="p1">Ей нравилась Петина неловкость, да и весь Петя. Хотя, надо признаться, Наташе нравились все. И Толя Абрикосов, похожий на актера Камбербэтча, и Федя Дорохов, и — как бы ни хотелось скрыть это от самой себя — сверхчеловек Лубоцкий. Но все они видели в ней в первую очередь дочь Батайцева. Конечно, в «двенашке» у многих были звездные родители, но не у всех же это написано прямо на лице, а лицо не спрячешь. Вот же угораздило — Наташа была ужасно похожа даже не на отца, а на дядю Женю, который смотрел на людей с каждой второй киноафиши. Наташа походила на него даже больше, чем Соня, его родная дочь. «Ах, вы дочь Батайцева?» — слышала Наташа, сколько себя помнила, и нужно было отвечать, что да, Батайцева… да не того. Наташин отец всегда жил в тени брата, а потом еще нелепая смерть Евгения, до сих пор кормящая журналистов желтых изданий… Наташа уже привыкла к заголовкам «Шок! Смерть Батайцева и банда черных археологов!» Виноваты были то археологи, то сектанты, то спецслужбы, то инопланетяне; журналисты изощрялись в догадках. Каково было Соне, лучше не думать. Но Соня умела уходить от переживаний и учиться, учиться, как псих. А Наташа отключать эмоции не умела. Да и быть в первую очередь дочерью и племянницей ей изрядно надоело. Поэтому ей так легко было именно с Петей, который однажды спросил: «Батайцев? А это кто такой?»</p><p class="p1">Они вынырнули на шумные улицы ближе к центру, быстрым шагом перешли оба моста и двинулись дальше. Для Пети это был привычный путь: он любил обходиться без метро, кеды будто сами выучили путь до Колпачного. Москва то разворачивалась перед ними — через мосты до самого университета, — то опять сворачивалась узким Хохловским переулком.</p><p class="p1">— Что это, орга́н? — спросила Наташа.</p><p class="p1">Петя кивнул:</p><p class="p1">— Да, это в «Петре и Павле» репетируют.</p><p class="p1">Лютеранский собор со своим органом, озвучивавший кривые московские улицы, вызывал у Пети легкое кружение головы.</p><p class="p1">На стене зачем-то был вырезан кусок штукатурки, обнажился квадрат красной кирпичной кладки. Наташа потрогала кирпич и серые пятна на нем:</p><p class="p1">— Смотри… Рыцарь и дракон. Ты видишь?</p><p class="p1">Детский сад… Петя вгляделся в пятна оставшейся штукатурки, но ничего не увидел.</p><p class="p1">— Какой еще рыцарь?</p><p class="p1">— Ну, не знаю. Тамплиер.</p><p class="p1">Петя вздрогнул. Наташа вдруг вытащила маркер и подписала прямо на стене: «Рыцарь верхом на драконе».</p><p class="p1">«Во дает. У себя бы на стенах писала», — с неудовольствием подумал Петя. Выходит, он уже чувствует себя здесь своим? «Снесут Калачёвку — останусь в Колпачном», — внезапно подумал он.</p><p class="p1">Он шел, будто совсем к себе домой. Там тихо… можно спокойно подумать… Только Наташа-то ему здесь зачем?</p><p class="p1">— Ничего, что я с тобой иду вдруг? — спросила она.</p><p class="p1">Петя вздрогнул и будто почувствовал себя виноватым. И тут же ляпнул:</p><p class="p1">— А у меня, кстати, тут квартира.</p><p class="p1">— Чего? — опешила Наташа. — Какая еще квартира?</p><p class="p1">— Ну… — Петя замялся. — Это… Отец оставил. Наследство.</p><p class="p1">Наташа присвистнула, как пацан:</p><p class="p1">— Ничего себе. Так это правда, что ли? Твой отец олигарх? Я думала, врут всё…</p><p class="p1">— Вот видишь. Иногда самые невероятные теории оказываются правдой, — вздохнул Петя (он, кстати, совершенно не умел свистеть). — Зайдешь?</p><p class="p1">Консьерж посмотрел на Петю неодобрительно, но промолчал. Наташа вдруг покраснела:</p><p class="p1">— Что он про нас подумал?</p><p class="p1">— Ерунда, — отмахнулся Петя: его голова была занята другим.</p><p class="p1">Он внутренне поморщился, предполагая Наташины восторги по поводу квартиры. Вот же дурак, не смог отвязаться. Но Наташа ничего такого особенно не сказала, аккуратно сняла кроссовки (Петя же ходил прямо в конверсах и не парился) и сразу бросилась к фотографии на книжной полке:</p><p class="p1">— Ой, какой котик!</p><p class="p1">На снимке Кирилл Владимирович косплеил известную фотографию Юрия Кнорозова, где тот тоже был изображен с котом. Этого кота, кстати, Кнорозов пытался как-то протащить в соавторы научной статьи. Кота же Кирилла Владимировича Петя не знал. Их не знакомили.</p><p class="p1">— Твой отец? — спросила Наташа, изучая то фотографию, то Петино лицо. — Да, вроде на тебя похож…</p><p class="p1">Петя аж поперхнулся: лицо на фотографии имело довольно инфернальное выражение… чего там похожего?</p><p class="p1">— А ведь я его знаю, — сказала вдруг Наташа.</p><p class="p1">— Как знаешь?! Откуда?</p><p class="p1">— Ну, у папы вечно народу толчется, он любит гостей… ходит кто попало, то есть… извини. Просто у нас не дом, а проходной двор. Папа говорит, это для профессии нужно. Играешь профессора физики — общаешься с физиками. Бандита — с бандитами…</p><p class="p1">— Вампира — ищешь контакты с потусторонним миром, — подколол Петя (а говорил, не знает, кто такой Батайцев!).</p><p class="p1">Наташа терпеть не могла фильм, где отец играл вампира, поэтому поспешила продолжить:</p><p class="p1">— Археолога — с археологами… Да на самом деле просто папа любит тусоваться, принимать гостей. Ходят, ходят… часто знакомые лица, а потом и не поймешь, где видела, то ли на «Дожде», то ли в рекламе «Макдоналдса».</p><p class="p1">— Так твой отец разве не умер? — ляпнул Петя.</p><p class="p1">— Это Сонин же умер. — Наташа задумалась, стоит ли ей обижаться, но решила: тут у нее одной был живой отец, так что нечего. — И… постой… кажется, на похороны дяди Жени как раз вот этот твой и приходил… точно, он был!</p><p class="p1">Петю кто-то будто дернул за язык, и он спросил:</p><p class="p1">— А шергинского отца там случайно не было?</p><p class="p1">— Аниного? Конечно. Они вообще с дядей Женей дружили.</p><p class="p1">Петин телефон снова дернулся. Эсэмэс: «На месте водокачки обнаружен тайный ход. Заложен кирпичом».</p><p class="p1">Вот же Лубоцкий, неугомонная работа мысли…</p><p class="p1">Стоп.</p><p class="p1">Это не Лубоцкий. Эсэмэс пришло от Дорохова.</p><p class="p1">Тайный ход. Тамплиеры. Наташа… нет, Петя вроде бы еще ничего не пил… Нельзя, необходима ясность мысли.</p><p class="p1">— А твой этот… дядя Женя, — спросил Петя, — он где снимался? Какую роль играл, последнюю? Ну, с кем общался?</p><p class="p1">— Да они с папой вместе… там сериал какой-то, исторический. Они тогда так загрузились историей, археологией… черт знает, документы какие-то искали про наш квартал.</p><p class="p1">— Про Калачёвку? — быстро спросил Петя. Он смутно помнил, что смерть Батайцева была какой-то непростой, связанной… с чем? И тело то ли нашли, то ли нет…</p><p class="p1">— Может, твои Батайцевы из-за этого общались с моим отцом? — стал думать он. — Он тоже вроде… историей увлекался. Тоже… про Калачёвку есть документы…</p><p class="p1">— Петя, — так же быстро спросила Наташа. — А твой отец. Он… умер от чего?</p><p class="p1">— От старости, — отмахнулся Петя.</p><p class="p1">— Чего-то мне не нравится, — сказала Наташа, — когда люди умирают. Особенно внезапно.</p><p class="p1">— Прости, — Петя снял очки, потер переносицу, — мне нужно задать тебе идиотский вопрос. А твоего дядю Женю… вообще нашли?</p><p class="p1">— Да… только как-то непонятно. То ли он… то ли… А что?</p><p class="p1">— А то. В Чертанове искать не пробовали?</p></span>
