<p class="p">Глава 8</p>
<p class="p">Засохший дуб</p>
<p class="p">Мария Ботева<a href="ch2.xhtml#id20" class="a">[19]</a></p>
</div><p class="p1">— Слушай, сколько можно? — спросил Безнос и уселся на ближайшую лавочку в торговом центре. — Ты думаешь, обязательно покупать сегодня?</p><p class="p1">Уже часа два они с Лелей Абрикосовой бродили по «Изуми Plaza», обходя салоны связи один за другим. Откуда-то Леля знала про все модели телефонов не хуже продавцов этих самых салонов. И она рассказывала о них Пете так, что ему хотелось купить буквально каждый телефон. Но чем больше она говорила, тем неувереннее он становился. Мямлил, что ему надо подумать, и они шли в другой магазин.</p><p class="p1">Леля, кажется, надулась:</p><p class="p1">— Покупай тогда сам, чего я время трачу?</p><p class="p1">«И правда, чего она время тратит?» — подумал Петя. На каждой перемене Абрикосова заваливала его названиями моделей телефона. Каждая была как-то оценена:</p><p class="p1">— Отличный телефон! — говорила она про некоторые. — Если не будет лучше, сойдет, — про другие.</p><p class="p1">Вот и вся разница.</p><p class="p1">После уроков она сказала:</p><p class="p1">— Так, я все поняла. Пойдем вместе, — и взяла его под руку.</p><p class="p1">Дядя Федор заикнулся было, что пойдет с ними, но Леля отвернулась и вышла с Петькой на улицу. Тот только успел оглянуться и увидеть, как Дядя Федор стучит пальцем по виску.</p><p class="p1">И вот теперь они с Абрикосовой торчат в этой «Плазе».</p><p class="p1">— Слушай, ну давай зайдем куда-нибудь. Есть охота, — сказал Петька.</p><p class="p1">Абрикосова оживилась:</p><p class="p1">— Может, к тебе? Закажем пиццу.</p><p class="p1">Петька поморщился. Он бы с радостью пошел в свое убежище, но один. Не зря ли он раскрыл всему классу квартиру в Колпачном? Хотя от пиццы он бы не отказался, пожалуй.</p><p class="p1">— Не хочешь? — Леля села рядом, посмотрела ему в глаза так, что Безносов смутился.</p><p class="p1">— Нет, давай пойдем, конечно.</p><p class="p1">Они встали, пошли к выходу.</p><p class="p1">«Ты скоро?» — пришло сообщение от Дяди Федора, а следом за ним от Лубоцкого.</p><p class="p1">Лубоцкий спрашивал, где его носит.</p><p class="p1">Черт! Он же договорился встретиться с Андреем и Федькой, обсудить историю с пропавшим альбомом. Больше он никому не рассказал об этом. Решил пока понаблюдать за одноклассниками, вдруг кто-то выдаст себя?</p><p class="p1">— Слушай, Лель, — начал Безнос виноватым голосом, — ты извини. Мне тут надо отлучиться. Срочно.</p><p class="p1">— В смысле?</p><p class="p1">— В смысле, я уже договорился. Давно уже, то есть сегодня. Совсем забыл. Извини еще раз.</p><p class="p1">И он буквально растаял. Был — и нет. Абрикосова даже головой потрясла и заморгала почаще: вдруг показалось и Безнос на самом деле где-то рядом. Нет.</p><p class="p1">Дядя Федор с Лубоцким уже ждали его возле дома в Колпачном. Консьерж слегка кивнул головой, когда они прошли мимо него.</p><p class="p1">— Держи, — сказал Федька в квартире и отдал Пете большой пакет, — поедим.</p><p class="p1">— Что ты думаешь? — спросил Андрей, вытаскивая из пакета хлеб, колбасу и колу.</p><p class="p1">— Абрикосова? — предположил Безнос. — Целый день рядом крутится.</p><p class="p1">Федька закашлялся и снова покрутил у виска, как в школе:</p><p class="p1">— Дурак. Это же Абрикосова. Она вчера увидела твою хату, угостилась на пиру. И готово.</p><p class="p1">— Что готово? — не понял Петя.</p><p class="p1">— Взялась за тебя, — объяснил Лубоцкий. — Больше никаких мыслей нет?</p><p class="p1">— Чаю бы.</p><p class="p1">— Хорошая идея, — одобрил Дядя Федор. — Но я одного не понимаю: кому это надо?</p><p class="p1">— Колы не хочется, — сказал Петя.</p><p class="p1">— Да я не о том! Про фотоальбом! — сказал Федька. — Вчера же решили, что все, больше в это не лезем.</p><p class="p1">— Лезем, не лезем. А что-то там было, в этом альбоме.</p><p class="p1">— Давайте рассуждать логически, — предложил Федор. — В альбоме фотографии. Так? На фотографиях твой отец и другие люди. Так? Значит…</p><p class="p1">— Ну? Дальше-то? — спросил Петя.</p><p class="p1">— Надо искать среди тех, кто есть на фотографиях.</p><p class="p1">— Браво, — оценил Лубоцкий и нажал кнопку включения на своем смартфоне, — искать будешь долго. Кажется, никто из наших со старшим Безносовым знаком не был.</p><p class="p1">— А Аня? Шерга? То есть ее отец? Мой-то его знал. Даже собирался звонить. И этот, Батай…</p><p class="p1">— А вчера пришла ее мамаша. Внезапно. — Дядя Федор не слышал его и продолжал рассуждать логически.</p><p class="p1">— Ясно. — Лубоцкий начал что-то искать в телефоне. Потом приложил его к уху. — Добрый день, — сказал в трубку, — будьте добры, мне нужен Павел Николаевич. Кирилл Безносов. Да.</p><p class="p1">Дорохов и Безносов посмотрели друг на друга. Кажется, каждый увидел тревогу в глазах друга.</p><p class="p1">— Умер не умер, — продолжал говорить Лубоцкий, — а разговор к Павлу Николаевичу есть. Хорошо. Жду, — и нажал отбой.</p><p class="p1">— Э-э-э, — протянул Петя.</p><p class="p1">— Что это было? — спросил Дядя Федор.</p><p class="p1">— Ждем, — ответил Андрей. — Можете засекать время, — и посмотрел на часы. Достал из рюкзака энергетический батончик и не спеша распечатал его.</p><p class="p1">— Погоди, — сказал Петя, — ты позвонил Шергину?</p><p class="p1">— Правильно мыслишь. Только не ему самому, а в приемную его конторы.</p><p class="p1">— И что? Ты что, представился моим отцом?</p><p class="p1">— Ты же слышал.</p><p class="p1">Петя начал ходить по комнате. Взял бутылку с колой, сделал несколько глотков, облился, но не заметил этого. В это время зазвонил его телефон. Петя посмотрел на экран, но не стал отвечать.</p><p class="p1">— Абрикосова, — объяснил он.</p><p class="p1">Все молча дождались, когда телефон перестанет звонить.</p><p class="p1">Андрей посмотрел на часы.</p><p class="p1">— Сейчас позвонит Шергин. Поговоришь с ним.</p><p class="p1">— О чем?</p><p class="p1">— Об археологии.</p><p class="p1">— Мне что, тоже сказать, что я Кирилл Безносов?</p><p class="p1">— Не поверит. — Андрей снова посмотрел на часы.</p><p class="p1">У Пети опять зазвонил телефон.</p><p class="p1">— Абрикосов, — сказал он. — Уже знает. — Он держал телефон обеими руками и смотрел на экран.</p><p class="p1">— Да, — наконец ответил Петя. — Со мной, да. Ага. А Леля? Ясно. Да, я в Колпачном. Адрес помнишь? Ага. Давай, да.</p><p class="p1">— Уже? — спросил Дорохов.</p><p class="p1">— Да не, он один. Какое-то дело. К Лубоцкому.</p><p class="p1">Андрей смотрел на часы и как будто не слышал, о чем там разговаривают приятели.</p><p class="p1">Зазвонил его телефон.</p><p class="p1">— Семь минут! — сказал он и снял трубку. — Алло!</p><p class="p1">Какое-то время он слушал, потом заговорил сам:</p><p class="p1">— Павел Николаевич, простите, что пришлось так поступить. Передаю трубку Петру Безносову. — И он в самом деле передал ему трубку.</p><p class="p1">— Алло, — сказал Петя, — да, здравствуйте. Это я, я сын Кирилла… Кирилла Владимировича. Дело в том, что… Я одноклассник Ани. Вашей. И я, да, я сын Кирилла. А у него было написано, в блокноте, позвонить Паше Шергину. И вот я, вот мы тут… Вы его знали? Ну вот. В блокноте, да. В его квартире. Он хотел что-то сказать. Нет, я не знаю.</p><p class="p1">В это время Лубоцкий написал на последней странице одной из своих тетрадей: ФОТО! Показал Пете. Безнос долго ждал, когда на том конце провода ему что-то договорят, и наконец сообщил:</p><p class="p1">— Пропал альбом. С фотографиями отца. Ну там детские, армейские. Из экспедиций, черепки, монеты. Хорошо. Хорошо. Запишите номер. Ясно. До свидания.</p><p class="p1">— Придет? — спросил Лубоцкий, как только Петя нажал отбой.</p><p class="p1">— Сказал, свяжется. И номер не стал записывать. Говорит, служба охраны пробьет.</p><p class="p1">— Отлично! А теперь послушаем, что нам скажет наш товарищ Анатоль! Я слышу его шаги, — и он открыл входную дверь. За ней стоял Абрикосов. Да, все-таки Лубоцкий — сверхчеловек.</p><p class="p1">— Приветствую, — кивнул Толя. Аккуратно повесил сумку на вешалку у двери, Дорохову даже показалось, что сначала проверил, крепко ли сидит крючок. Задержался у зеркала, прошел в комнату. Посмотрел на хлеб и колбасу, сморщился. — Среди таких вещей — и такая трапеза. Ну, господа…</p><p class="p1">— Угощайся, — предложил Петя.</p><p class="p1">Но Абрикосов даже не взглянул на него.</p><p class="p1">— Какие новости?</p><p class="p1">— Портал захлопнулся, — ответил Андрей, — а в нем как раз были старушки. Пару часов назад. Вызвали полицию, разбираются. Следственный комитет что-то копает. Пожарные приехали, скорая. Кинолог с собакой. Ищут. Вот-вот район оцепят, введут чрезвычайное положение, комендантский час. Документы у тебя с собой? Уже готовы ориентировки на старушек, скоро мы увидим их в интернете и на каждом столбе знакомых с детства улиц. Но мы можем не ждать, мы уже все знаем. А главное, нам известны особые приметы.</p><p class="p1">Во время этого монолога Петя снял очки, протер их, нацепил на нос и внимательно посмотрел на Лубоцкого. Снова отпил колу из бутылки, посмотрел на Дядю Федора. Федя вращал глазами и, кажется, хотел куда-нибудь присесть, но стул был примерно в метре от него. Только Абрикосов спокойно отреза́л колбасу, хлеб, делал бутерброд.</p><p class="p1">— Ну-ну, — сказал он, — приметы.</p><p class="p1">— Кроссовки, — продолжил Андрей, — обе они были в кроссовках. У одной зеленые шнурки, у другой — белые.</p><p class="p1">— Не, — возразил Толя с набитым ртом, — какие это особые приметы? К тому же цвет был другой.</p><p class="p1">— Это новые старушки. И новые кроссовки.</p><p class="p1">— И ориентировки новые, — вмешался Федя.</p><p class="p1">Петя хмыкнул.</p><p class="p1">— Вот Дорохов понимает, — кивнул в его сторону Андрей, — новые приметы, новые старушки, старый портал. Захлопнулся.</p><p class="p1">— И дуб засох, — сказал Толя. — А на провода́х в городе — вы видели? — иногда кроссовки висят. Так вот, я сейчас видел кроссовки с черными шнурками возле дуба. А другие, Безнос, как раз под твоим окном.</p><p class="p1">Петя вздрогнул, в два прыжка они с Федором оказались у окна. Петя открыл его, высунулся наполовину на улицу. Спрыгнул с подоконника, кивнул:</p><p class="p1">— Висят.</p><p class="p1">Дорохов, наоборот, сел на подоконник, закурил.</p><p class="p1">— Я слышал, их на провода закидывают в том месте, где убили кого-то, — сказал он.</p><p class="p1">— Или наводчики ворам показывают место, где добыча. А цвет шнурков — этаж, — объяснял Толя, — может быть, рыжий как раз третий. Хотя точно не знаю. У тебя ничего не пропало?</p><p class="p1">Федя присвистнул.</p><p class="p1">— Пропало, — сказал Петя, — у меня…</p><p class="p1">— Кстати, что там с дубом? — переменил тему Андрей. — Как это он засох? Может, листья облетели просто? Осень же.</p><p class="p1">— Поверь мне, камрад. Просто поверь. Он засох. Бесповоротно. Можешь убедиться лично.</p><p class="p1">— Это потом. А теперь давайте подумаем, почему Шерга сегодня не пришла. Сначала за ней приезжает мамочка, потом она не приходит на уроки.</p><p class="p1">— Портал? — спросил Толя.</p><p class="p1">— Так надо было спросить у… — начал Петя, но Дядя Федор перебил его:</p><p class="p1">— Стресс, — сказал он.</p><p class="p1">— У Шерги? — спросил Толя. — Не смеши мои мокасины.</p><p class="p1">— У дерева, — объяснил Федя, — я слышал, что у растений бывает стресс. Проводили исследование. Спилили деревья, посмотрели годовые кольца, некоторые были тоньше остальных. Посчитали, в какие годы, оказалось, во время войны.</p><p class="p1">Некоторое время все молчали. Потом Абрикосов очнулся:</p><p class="p1">— Ну? Что это дает? Мало ли.</p><p class="p1">— Стресс.</p><p class="p1">— Ну допустим. Была война. Стресс. А дуб-то? А взрыв водокачки? А портал? Старушки в Чертанове?</p><p class="p1">— Квартал будут сносить, — неуверенно сказал Петя.</p><p class="p1">— Вот!</p><p class="p1">— Вообще-то деревья засыхают на болотах, — сказал Толя, — мне кто-то говорил. Но у нас ведь тут не болото. — И он включил смартфон.</p><p class="p1">— А может, раньше было? — спросил Андрей. — Может, и каменная плесень от этого. И другие явления, так сказать. Анатоль, ты краеведов знаешь? Пробей это дело.</p><p class="p1">Абрикосов что-то искал в Сети:</p><p class="p1">— Ну, болото не болото, но речка тут была когда-то. Подземная. А может, и сейчас есть, куда ей деваться? Дома высокие нельзя строить, вот что. Фундамент размоет.</p><p class="p1">— А дуб-то при чем? — спросил Безнос.</p><p class="p1">— Может, разлилась речка? Весна сырая была, лето дождливое.</p><p class="p1">— Или усохла, — предположил Федя.</p><p class="p1">— Вроде там летом что-то копали. Трубы прорвало или что-то такое, — вспомнил Петя. — Или укладывали новые, может.</p><p class="p1">— Это не там копали, это ближе к школе, — сказал Толя, — не путай.</p><p class="p1">— Ну я не знаю тогда.</p><p class="p1">Петя подошел к отцовскому столу, стал автоматически выдвигать ящики. Он в сотый раз трогал и переворачивал отцовские бумаги, блокноты. Ему вдруг захотелось домой, пусть даже мама будет ворчать, что его носит не пойми где.</p><p class="p1">— Безнос, иди сюда, — позвал его Дядя Федор, — мы сваливаем. Погнали к дубу!</p><p class="p1">— К дубу? Мне как-то… К дубу.</p><p class="p1">— Лелька собиралась, — сказал Толя.</p><p class="p1">— Я домой. Мама ждет.</p><p class="p1">В это время и правда позвонила мама.</p><p class="p1">— Да, мам! — сказал Петя. — Почти подхожу. Срочно? Кто? Зачем? Когда она приедет? Я успею. — Он нажал отбой.</p><p class="p1">— Ничего не понимаю, — пробормотал Петя. — Оля Мамонова приезжает. Через полчаса.</p></span>
