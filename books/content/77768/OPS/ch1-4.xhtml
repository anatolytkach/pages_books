<span id="id3"><div class="title1">
<p class="p">Глава 1</p>
<p class="p">Внезапный наследник</p>
<p class="p">Денис Драгунский</p>
</div><p class="p1"><em>— Well, my friend, all these guys, this so called opposition — are totally dependent on the White House and the State Department. They pay them salary. As for this gentleman, whose name I don’t even want to say out loud… This guy is a real rascal! He is hiding behind the children! He calls schoolchildren to the barricades!</em><a href="ch2.xhtml#id48" class="a">[1]</a></p><p class="p1">Так говорила пятнадцатилетняя Аня Шергина своему однокласснику Васе Селезневу, сыну известного адвоката, который первым пришел на ее вечеринку. Это был традиционный, уже четвертый, июньский вечер у Ани. Потому что в июле и августе все разъезжались кто куда, чтобы встретиться только первого сентября.</p><p class="p1">Аня говорила четко и уверенно своим звонким, чуточку трескучим голосом. Говорила как по писаному, будто по телевизору, заранее подготовившись, отвечала на вопрос ведущего.</p><p class="p1">Понятно, почему она так говорила. Аня была дочерью Павла Николаевича Шергина, крупного московского — а раньше петербургского — девелопера, строителя новых домов, торговых центров и целых кварталов.</p><p class="p1">Не так давно, еще лет пять тому назад, Павел Николаевич был настроен вполне оппозиционно. Не просто настроен, но даже давал деньги какой-то крохотной либеральной партии в обмен на звание почетного сопредседателя и обещание, «когда они придут к власти», получить министерский пост. Смех, да и только! Но это сейчас ему казалось смешно, а тогда он, бывало, вышагивал во главе колонны с плакатиком и в пикетах стоял вместе со своей тогда еще совсем юной десятилетней Анечкой. Его личные охранники стояли в сторонке, а фотографы изо всех сил щелкали камерами.</p><p class="p1">Аня обожала папу. В сто раз сильнее, чем маму. Мама у нее была очень красивая, очень добрая и ласковая, все время улыбалась, смотрела сияющими глазами, но с ней было очень скучно.</p><p class="p1">Как раз тогда, лет в десять или одиннадцать, Аня вдруг услышала, как домработницы обсуждают ее маму. «Она совсем дурочка, что ли?» — спросила горничная. «Да нет, какая же она дурочка, — ответила повариха. — Высшее образование все-таки… Красный диплом, она хвалилась. Не дурочка, но такая вся… Какая-то недалекая». Аня даже не возмутилась, что прислуга в таком тоне говорит о хозяйке дома. Ей показалось, что это слово очень подходит, что оно как раз про маму. Вечером она спросила папу: «А правда, у нас мама какая-то недалекая?» Папа сдвинул брови и вроде бы строго, но на самом деле вполне спокойно сказал: «Нельзя так говорить про маму! Она тебя родила! Она тебя, извини за выражение, грудью кормила! Она тебя любит!» — и хлопнул ладонью по столу, но как-то равнодушно хлопнул, и Аня поняла — все так и есть. Мама целыми днями занималась собой, ходила то на теннис, то в бассейн, то на массаж. Конечно, она любила дочку, всегда гладила ее по головке, но дочке было с ней неинтересно, и мама это чувствовала. Наверное, обижалась немножко, но не навязывалась и все чаще уезжала то плавать в море, то кататься на горных лыжах.</p><p class="p1">А папа! Папа — совсем другое дело. Почти каждый вечер он усаживал Анечку в кресло и не меньше часа они болтали — обо всем, и особенно о политике. Павел Николаевич объяснял десятилетней дочери, что такое Россия, политика, демократия и все прочее. Не скрывал правды о таких вещах, как коррупция, например. Он говорил просто, мягко и убедительно. И даже брал с собой на демонстрации! Ей нравилось быть смелой и независимой, особенно когда рядом сильный папа и два его охранника.</p><p class="p1">И вдруг папа так же мягко и убедительно сказал ей, что всё. Поиграли, и будет. Хватит глупой болтовни и беготни. Потому что вся эта суетня с плакатиками и болтовня о коррупции могут помешать ему сделать дело огромной важности, дело всей его жизни. Ведь он строитель по призванию. Он с юности мечтал построить что-то грандиозное, небывалого размаха и мощи. Суперсооружение! И вот недавно он начал по-настоящему крупный проект. Его фирма получила наконец разрешение на строительство огромного комплекса с бизнес-центрами и офисами, апартаментами, магазинами, ресторанами, кинотеатрами, и настоящим театром тоже, и даже с выставочным залом, с галереей современного искусства, не говоря уже о разных фитнесах, бассейнах и катках. С подземными паркингами и теннисными кортами на крыше.</p><p class="p1">«Все согласовано на самом верху, — пояснил он своей не по годам умной дочери и добавил: — Так что теперь мы накрепко с ними», — и показал пальцем в окно, где по небу летели вечерние облака, а за гостиницей «Балчуг Кемпински» виднелся Кремль. Они жили в Замоскворечье.</p><p class="p1">Анечке понравилось, что он сказал «мы», а не «я». Это было очень лестно. Что она не просто девочка-дочка из важной семьи, а часть какого-то большого и сильного «мы», которое допущено «на самый верх». Но она все-таки поразмыслила и спросила, как насчет коррупции и демократии. То есть насчет того, о чем они так интересно разговаривали по вечерам.</p><p class="p1">Папа улыбнулся: «Ты ведь добрая и благородная, правда? Ты знаешь, что есть люди, которым плохо живется. И ты хочешь им помочь, да?» — «Да», — кивнула Анечка. «Так вот, — продолжил папа, — после того, как я сделаю свой Большой Проект, у меня будет много денег. Очень много. Мне не нужны золотые унитазы. Я смогу помогать людям. Не вообще, — он скорчил рожу и нарисовал пальцами в воздухе издевательскую загогулину, — не вот этак вообще, в светлом будущем, ради которого мы с тобой когда-то на демонстрацию ходили, а вполне конкретно. Реально! Бедным студентам — стипендии. Одиноким старикам — оплатить лечение. Бездомным — дать ночлег и ужин. Поняла? Если захочешь, я и тебе буду давать деньги, чтоб ты могла лично помогать людям. Реально и прицельно. Вот у вас в школе, наверное, тоже есть… ну, ребята, которые в чем-то нуждаются? Ведь не все же такие богатые, как ты… То есть как мы, как наша семья. Если надо, ты сможешь им помогать. Только придумай, чтоб это было не обидно. Тактично. Чтоб они даже не догадались…»</p><p class="p1">Аня задумалась. Конечно, хорошо бы взять и кому-то вот этак тактично и необидно помочь. Тем более что в классе были очень хорошие, но скромные ребята. Например, двоюродные сестры Наташа и Соня Батайцевы. Дочки двух известных братьев-артистов. Наташин папа был не такой знаменитый, как Сонин, но Сонин папа уже умер, так что у них теперь все поровну. Еще — злой, но классный Федя Дорохов. И его лучший друг Петя Безносов. Смешная фамилия, и сам он курносый, очкастый, неловкий и смешной. Говорили, что он дальний родственник какого-то олигарха, — не просто миллионера, а настоящего крутого олигарха в полном смысле слова, который поднялся еще в девяностые. А может быть, однофамилец… Все может быть. Но за него кто-то платил, наверное. Или кто-то звонил директору. Аня прекрасно знала, что просто так в их школу не попадают. При этом у Пети кнопочный мобильник и прошлогодние конверсы, а зимой — тимберы со сбитыми носами.</p><p class="p1">«Тебе все ясно?» — папа перебил ее мысли.</p><p class="p1">Ане все стало ясно. Не сразу, дня через три. Но — накрепко.</p><p class="p1">Поэтому она так строго реагировала на оппозиционные разговорчики Васи Селезнева. Особенно про этого типа, который мутит воду!</p><p class="p1"><em>— He puts children in terrible danger!</em><a href="ch2.xhtml#id47" class="a">[2]</a> — сказала она и негромко хлопнула ладонью по столу, как папа.</p><p class="p1">Однако Вася пожал плечами и засмеялся.</p><p class="p1"><em>— Why children?</em> — возразил он. <em>— They are grown up enough. They already have passports, they can choose and decide for themselves. Do you have a passport? Yes. You are already fifteen years old, aren’t you? Do you still consider yourself a child?</em><a href="ch2.xhtml#id46" class="a">[3]</a></p><p class="p1">Аня покраснела и смутилась.</p><p class="p1">Вася — конечно же, случайно! — попал в самое больное место.</p><p class="p1">Когда Ане было восемь лет, она заболела какой-то редкой и опасной болезнью позвоночника. Павел Николаевич был очень богат и мог ее отправить в любую самую современную клинику Европы и Америки. Или, к примеру, в Китай, где ее обещали поставить на ноги буквально за два летних месяца. Но дело в том, что сам Павел Николаевич в детстве, ровно в том самом возрасте, переболел той же самой болезнью. И лечили его тогда по старинке: почти два года он пролежал неподвижно в гипсовом панцире в детском санатории Анапы. А с тех пор и думать забыл об этом несчастье и потому решил, что дочь свою любимую будет лечить точно так же, надежным дедовским способом, только не в Анапе, а в Швейцарии, в горном санатории. Сказано — сделано. К десяти с половиной годам Анечка была совсем здорова, но в школу идти наотрез отказалась: как же это я приду во второй класс, рыдала она горько и безутешно, если буду на два года всех старше? Тут надо объяснить, что с экстернатом у них не получилось: среди русских учителей не нашлось охотников ездить к Анечке в Швейцарию даже за деньги Павла Николаевича. Да и сама Анечка не очень любила листать учебники. Ей больше нравилось смотреть в окно, слушать музыку и размышлять.</p><p class="p1">Что было делать? Павел Николаевич поступил просто и решительно, как он поступал всегда. Он переделал все документы своей дочери, сделал ее на два года моложе и переехал с семьей из Петербурга в Москву. Так что Анечка пошла во второй класс самой лучшей московской школы в том же самом восьмилетнем возрасте. Она даже научилась чувствовать себя на эти минус два года. Первое время ей это было нетрудно — она сама себе объясняла, что время, проведенное в санатории, как будто бы не считается. В четырнадцать лет она легко чувствовала себя двенадцатилетней, в пятнадцать — более или менее могла согласиться на тринадцать, но в почти взрослые семнадцать быть пятнадцатилетней девочкой оказалось уже непросто. Хотя она была маленькая, тоненькая, хрупкая, совсем не похожая на своих рослых одноклассниц.</p><p class="p1">Тем более что Вася ей очень нравился, и было страшно предположить, что он узнает всю правду. Особенно сейчас. Вот года через два, когда ему самому будет семнадцать, ему, наверное, даже понравится дружба с девушкой немного старше, а значит, умнее, опытнее и вообще взрослее. А пока — тс-с!</p><p class="p1">Поэтому Аня ответила слегка невпопад:</p><p class="p1"><em>— Hush! What do you mean? Here I am, in full view. Everyone knows me, I have no secrets. But he? He is a scoundrel. Not only a political criminal, but also an ordinary thief! Public enemy and the marionette of the West</em><a href="ch2.xhtml#id45" class="a">[4]</a>.</p><p class="p1">Сказала, как приговор огласила.</p><p class="p1">— <em>What a virulent assail</em><a href="ch2.xhtml#id44" class="a">[5]</a>, — вздохнул Вася.</p><p class="p1">Он умел говорить на том изысканном, чуточку старомодном английском языке, которому учили в гимназии имени Бернарда Шоу. Гимназия № 12, «двенашка», как звали ее ребята не только в самой школе, но и по всей Москве, была одной из первых и лучших английских школ города. Располагалась она в старом здании в Малом Трофимовском переулке, в ближнем Замоскворечье. История ее была особой гордостью учителей и ребят. Когда-то, чуть ли не полтораста лет назад, здесь было Императорское землемерное училище, потом — знаменитая частная гимназия Крейцмана, потом — советская трудовая школа № 12, которой в 1931 году после визита знаменитого ирландца в СССР присвоили имя Бернарда Шоу. Поскольку он побывал именно в этой школе и оставил свой портрет с автографом, который так и висит в кабинете директора. Вот с тех самых пор в «двенашке» учились в основном непростые ребята — сыновья и внуки главных советских начальников, а также академиков, писателей и артистов. Традиция сохранилась до сегодняшнего дня, только к большому начальству и знаменитой интеллигенции прибавился крупный бизнес.</p><p class="subtitle">* * *</p><p class="p1">Пока Аня и Вася спорили, хвастаясь друг перед дружкой своим <em>brilliant English</em>, где-то вдалеке то и дело звонил нежный дверной колокольчик, и огромная комната постепенно наполнялась гостями. Вновь пришедшие здоровались с Аней и тут же отходили в сторону, садились на диваны и кресла, начинали болтать. На столе стояли легкие закуски: фрукты и сыры. Горничная внесла поднос с шампанским в узких бокалах.</p><p class="p1">— Детское? — сморщил нос Федя Дорохов. — Безалкогольное?</p><p class="p1">— А ты хотел, чтоб моего папу посадили за спаивание несовершеннолетних? — засмеялась Аня.</p><p class="p1">Остальные тоже засмеялись. Пришли уже почти все: и двоюродные сестрички Наташа и Соня Батайцевы, обе черноволосые и глазастые, и Коля Дончаков, влюбленный в Соню, и слегка толстоватая красавица Леля Абрикосова, и ее брат-близнец Толя, и нелепая Полина, которая все время громко рассказывала длинные анекдоты из интернета, на ходу все забывая, путаясь в подробностях и обиженно крича: «Дайте же дорассказать! Там сейчас будет очень смешно!», и длинный умный Андрей Лубоцкий, и его верная крохотулька Лиза Дейнен, похожая на белочку. Ну и Петя Безносов, который один бокал с «детским» шампанским сразу вывернул на пол, а другим поперхнулся и долго кашлял и просил Дорохова стукнуть его по спине.</p><p class="p1">Всего было человек пятнадцать — классы в «двенашке» были маленькие.</p><p class="p1">— Тост, тост! — закричали все.</p><p class="p1">— Итак! — сказала Аня Шергина, поднимая бокал. — Все готовы?</p><p class="p1">Но тут у Пети Безносова громко зазвонил его дурацкий кнопочный мобильник.</p><p class="p1">Он долго вытаскивал его из правого кармана левой рукой, потому что в правой руке у него был бокал и он не мог догадаться переложить его из руки в руку или поставить на подоконник. Наконец вытащил и, конечно же, уронил на пол. Крышка отлетела, выскочила батарейка. Федька Дорохов — ну просто как нянька — тут же подбежал к нему, и они вдвоем вставили батарейку на место. Нажали на перезагрузку. Запела мелодия «нокии».</p><p class="p1">— Нормуль, — сказал Дорохов.</p><p class="p1">— Ну, теперь можно? — насмешливо спросила Аня, наблюдая эту сцену.</p><p class="p1">— Да, да, извини! — смутился Петя.</p><p class="p1">— Пожалуйста! — засмеялась Аня, и все подхватили. — Ну, итак, мои дорогие!</p><p class="p1">Все подняли бокалы.</p><p class="p1">Петькин телефон зазвонил снова.</p><p class="p1">— Извини еще раз! — пробормотал он и ответил: — Да? Алё! Да, я… Здравствуйте. Кто? Оля? А это обязательно? Как? А Катя тоже? А, да, да. Извините. Сейчас… — Он повернулся к Ане. — Какой твой точный адрес? Как сюда лучше заехать, с Ордынки или с Полянки?</p><p class="p1">— А это еще зачем? — возмутилась она. — Кому это я должна давать наш точный адрес?</p><p class="p1">— Оля Мамонова и Катя Мамонова, — машинально ответил Петя. — Ну, ты их не знаешь, ладно… — и заговорил в телефон: — Тогда я лучше выйду сам. На улицу. На угол Полянки. Ага.</p><p class="p1">Он нажал отбой.</p><p class="p1">— Извини, — обратился он к Ане. — В третий раз извини! — и неловко захихикал. — Мне надо срочно линять. Они уже тут.</p><p class="p1">— Звучит угрожающе! «Они уже тут!» Кто «они»? — усмехнулась Леля Абрикосова.</p><p class="p1">— Сестрички Мамоновы, — объяснил Петя. — Мои двоюродные.</p><p class="p1">— Красивые? — тут же встрял Толя Абрикосов.</p><p class="p1">— Очень миленькие, но совсем старенькие, — вмешался Федя Дорохов. — Я их с Петькой видел. Им уже по двадцать два точно. А то и больше. Петька, что случилось?</p><p class="p1">— Пока не говорят, — сказал Петя, двигаясь к выходу. — Но как-то волнуются.</p><p class="p1">— Ну, счастливо! — раздраженно бросила Аня ему вслед и, выждав недолго, обратилась к Феде: — Ты-то хоть расскажи, в чем дело?</p><p class="p1">— Хэ зэ, — махнул рукой Федя. — Какие-то семейные скандалы, откуда мне знать… Ну, где твой тост?</p><p class="p1">— Итак, мои дорогие, в третий раз, — слегка обиженно сказала Аня. — Друзья! Ребята! Эй! Все сюда! Давайте за нашу школу, за наш класс, за нас! Ура!</p><p class="p1">Все потянулись чокаться.</p><p class="p1">— Через два месяца мы снова все встретимся! Ура! До дна!</p><p class="p1">— Не все, — качнул головой Лубоцкий.</p><p class="p1">— Это еще что?</p><p class="p1">— Уезжаю, — объяснил он. — Переезжаю, в смысле. И не я один. Вот Федька тоже. И Лиза. И Безнос. И они тоже, — он показал на Батайцевых.</p><p class="p1">— Вы что? Так это же… Это же нашего класса больше не будет? — изумилась Леля Абрикосова. — Вы что, совсем уже? Зачем?</p><p class="p1">— Не зачем, а почему, — сказал Лубоцкий. — Потому что мы все живем в Калачёвском квартале. А Калачёвский квартал сносят. Буквально совсем скоро. Потому что на этом месте будет, — и тут он закашлялся, — будет что-то большое-пребольшое.</p><p class="p1">— Фигасе, — выдохнула Полина.</p><p class="p1">— Фигасе, — повторили Леля и ее брат Толя.</p><p class="p1">Толя добавил:</p><p class="p1">— А чего сносить? Нормальные дома, я так считаю!</p><p class="p1">Калачёвский квартал — это были три небольших четырехэтажных дома между Большим, Малым и Средним Трофимовскими переулками. Когда-то, в самом начале прошлого века, эти дома построил фабрикант Калачёв для служащих, которые управляли его московскими фабриками.</p><p class="p1">— Мы все тоже так считаем, — покивал Лубоцкий. — Но кто-то считает по-другому.</p><p class="p1">Он пристально посмотрел на Аню.</p><p class="p1">— А я тут при чем? — Она даже покраснела. — Это сейчас идет по всей Москве. Всем дадут новые прекрасные квартиры.</p><p class="p1">— За МКАДом? — спросил Толя Абрикосов. — Блин. Совсем краев не видят!</p><p class="p1">— Почему обязательно за МКАДом? — пожала плечами Аня. — Глупости.</p><p class="p1">— Нашего класса не будет, — гнул свое Лубоцкий. — Вот всей этой нашей компании. Это только так кажется, типа «все равно будем общаться». Не будем. Я узнавал, в Калачёвском квартале живут, представь себе, тридцать шесть наших ребят, если по всей школе. И пятеро учителей. Выходит, нашей «двенашки» тоже не будет.</p><p class="p1">— Как это не будет? — не поняла Полина. — Тоже снесут? Ни фига себе!</p><p class="p1">— Да, ходят такие разговоры, что и школу снесут. Она же совсем рядом. А если и не снесут, то все равно ее не будет — в переносном смысле, — объяснил ей Абрикосов. — Вроде та, да не та. Поняла? Вот как если у тебя нос оторвать, — и он потянулся к ней скрюченными пальцами. — Ты будешь ты? Вроде ты! Но не совсем!</p><p class="p1">— А-а-а… — протянула она, на всякий случай отшагнув в сторону. — Теперь понятно.</p><p class="subtitle">* * *</p><p class="p1">Тем временем Петя ехал в большой черной машине. Он сидел сзади. Рядом с ним сидела его двоюродная сестра Оля Мамонова. Это была красивая стройная девушка, но с совершенно каменным лицом. Смотрела прямо перед собой и разговаривала, едва шевеля губами.</p><p class="p1">— Куда ты меня везешь? — спросил Петя.</p><p class="p1">— Он умирает, — ответила она. — Катя сейчас с ним. Все совсем плохо.</p><p class="p1">— Кто умирает? — спросил Петя.</p><p class="p1">— Кирилл Владимирович.</p><p class="p1">— Кто-кто? — нарочно переспросил Петя.</p><p class="p1">— Твой папа.</p><p class="p1">— Нет у меня никакого папы, — мрачно сказал Петя и стукнул ее кулаком по коленке.</p><p class="p1">— Нет, есть! — зашипела Оля, больно шлепнув его по руке. — Он тебя признал своим сыном! Дал тебе фамилию и отчество!</p><p class="p1">— Спасибо большое! — Петя довольно-таки зло осклабился. — Высади меня у метро. Пожалуйста!</p><p class="p1">— Дурачок. — Оля обняла Петю. — Как говорили в старину, какой-никакой, а все-таки отец. Родная кровь. И потом. Он вдовый и бездетный. У него никого нет. Совсем никого, кроме нас с Катей. Но мы всего лишь племянницы. Он все оставил тебе.</p><p class="p1">— Что — все? — не понял Петя. — В каком смысле?</p><p class="p1">— Все в смысле все. От и до. Нет, не все, конечно. Пятьдесят процентов завещал на благотворительность. Совсем чуточку нам с Катей. А остальное, процентов, наверное, сорок восемь, — тебе. Единственному сыну. Постарайся не сойти с ума. Но ты не бойся. Есть попечительский совет, будет следить, чтоб ты все не спустил на чупа-чупсы. И я буду за тобой следить.</p><p class="p1">Она обняла его еще сильнее, громко чмокнула в щеку и отстранилась.</p><p class="p1">Машина въехала в ворота особняка. Охранник поздоровался с Олей, черной лопаткой металлоискателя погладил Петю по спине, груди и ногам.</p><p class="p1">Катя встречала их у дверей.</p><p class="p1">— Идем, — велела она Пете.</p><p class="p1">— А это… а это не страшно? — вдруг сморщился он.</p><p class="p1">— Страшно, — сказала она и взяла его за руку.</p><p class="p1">Большая комната была оборудована совсем как палата в реанимации. Капельницы, провода, трубочки. Приборы, на которых выскакивали зеленые дрожащие цифры. Мужчины и женщины в белых халатах ходили вокруг кровати. На ней лежал совершенно лысый старик. У него было исхудавшее лицо с пористым круглым носом. «Похож на меня», — подумал Петя.</p><p class="p1">— Дядя Кира, — громко окликнула Оля. — Петя пришел.</p><p class="p1">Старик чуть повернул голову, слабо кивнул и прошептал:</p><p class="p1">— Сынок. Поцелуемся.</p><p class="p1">Оля толкнула Петю в спину, он нагнулся и притронулся губами к коже, пахнувшей медицинским спиртом. Почувствовал, как сухие горячие губы коснулись его щеки.</p><p class="p1">— Вон там, — произнес старик и куда-то махнул рукой.</p><p class="p1">Оля вытащила из сумочки ключ, стала отпирать сейф, который прятался за дверцей книжного шкафа. Достала оттуда тонкий кожаный портфель.</p><p class="p1">Медсестра вскрикнула. Все обернулись. Она стала разматывать провода из коробочки, прилаживать их к груди старика. Но врач сказал:</p><p class="p1">— Хватит уже, не надо его больше мучить.</p><p class="p1">Старик дышал медленно и протяжно, все тише и тише.</p><p class="p1">— Есть варианты, — вдруг сказала Катя и попыталась забрать портфель у Оли.</p><p class="p1">— Нет вариантов! — Из угла комнаты вдруг выскочила еще одна дама и помогла Оле удержать портфель. — Нет никаких вариантов, все подписано вчера вечером. Девочки, — очень строго сказала она, — обнимитесь и поцелуйтесь. Немедленно!</p><p class="p1">Оля и Катя обнялись и поцеловались. Потом обняли и поцеловали Петю. Велели ему сесть на табурет, взять за руку старика и сидеть так, пока его дыхание не стихнет. Кто-то снимал все это на видео.</p><p class="p1">Затем они с Олей и Катей прошли в комнату на втором этаже. Сестры объяснили, что вступление в права собственности — через полгода. А пока Оля перевела Пете, как она выразилась, «некоторую сумму» на его карточку. На текущие надобности. Пискнула эсэмэска. Перед глазами заплясало семизначное число. «Главное — не сойти с ума», — подумал Петя.</p><p class="subtitle">* * *</p><p class="p1">С дороги он позвонил маме.</p><p class="p1">— Ты еще у Анечки? — спросила она.</p><p class="p1">— Нет, — сказал Петя. — Мам! Тут такое дело. Я был у отца.</p><p class="p1">— Зачем?! — возмутилась она. Она ненавидела Кирилла Владимировича, считала, что он жизнь ей изломал, и это в каком-то смысле было правдой. Он ей не помогал с ребенком. После рождения Пети они почти не виделись. Последние двенадцать лет вообще ни разу.</p><p class="p1">— Он умер только что, — объяснил Петя. — И оставил мне наследство.</p><p class="p1">— Если ты возьмешь хоть копейку, — закричала она, — я тебя прокляну!!!</p><p class="p1">Петя замолчал. Она молчала тоже. Но потом спросила:</p><p class="p1">— А сколько он тебе оставил?</p><p class="p1">— Всё, — сказал Петя.</p><p class="p1">— Не хочешь разговаривать с матерью?! Что ты всёкаешь? Что ты хамишь?</p><p class="p1">— Мама, не кричи. «Всё» в смысле всё. Всё свое имущество. Ну, то есть половину на благотворительность, а половину мне. Смешно, правда?</p><p class="p1">— Ты сейчас домой? — спросила она.</p><p class="p1">Петя подумал и сказал:</p><p class="p1">— Я сначала зайду к Аньке. Я там рюкзак забыл.</p><p class="subtitle">* * *</p><p class="p1">Когда он вошел в комнату, там происходил какой-то громкий, напряженный разговор.</p><p class="p1">Все вдруг замолчали и посмотрели на него.</p><p class="p1">— Ну и чего? — спросил Федя Дорохов.</p><p class="p1">— Ничего, — на всякий случай сказал Петя. — А вы тут чего?</p><p class="p1">— Да так, — отозвалась Аня, с трудом сдерживая злобу и желание выгнать всех ребят к черту. — Решаем разные вопросы… Вот скажи мне, Петечка… <em>Do you think children are responsible for the deeds of their fathers? Or not</em>?<a href="ch2.xhtml#id43" class="a">[6]</a></p><p class="p1">— <em>I think no</em><a href="ch2.xhtml#id42" class="a">[7]</a>, — честно ответил он.</p><p class="p1">— Спасибо, Петя. Ты умный. Ты хороший. А вы, — она повернулась к остальным, — тоже мне! Нашли главную виноватую!</p></span>
