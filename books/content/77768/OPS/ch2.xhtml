<div class="title">
<p class="p">Примечания</p>
</div>
<span id="id48"><div class="title1">
<p class="p">1</p>
</div><p class="p1">— Ну, мой друг, все эти ребята, вся эта так называемая оппозиция, — они целиком зависят от Белого дома и Госдепа. Они платят им зарплату. А что до этого господина, чье имя я даже не хочу произносить, он настоящий негодяй! Он прячется за детьми! Он зовет школьников на баррикады! (<em>англ</em>.)</p></span>
<span id="id47"><div class="title1">
<p class="p">2</p>
</div><p class="p1">Он подвергает детей страшной опасности! (<em>англ</em>.)</p></span>
<span id="id46"><div class="title1">
<p class="p">3</p>
</div><p class="p1">Почему детей?.. Они уже взрослые, у них есть паспорта, они могут сами решать за себя. У тебя есть паспорт? Да! Тебе уже пятнадцать, разве нет? Неужели ты все еще считаешь себя ребенком? (<em>англ</em>.)</p></span>
<span id="id45"><div class="title1">
<p class="p">4</p>
</div><p class="p1">Хватит! Ты о чем? Вот она я, как на ладони. Все меня знают, у меня нет секретов. А он? Настоящий подлец. Не только политический преступник, но и обыкновенный вор! Враг общества и марионетка Запада! (<em>англ</em>.)</p></span>
<span id="id44"><div class="title1">
<p class="p">5</p>
</div><p class="p1">Какая опасная атака (<em>англ.</em>).</p></span>
<span id="id43"><div class="title1">
<p class="p">6</p>
</div><p class="p1">Как ты думаешь, дети отвечают за дела своих отцов? Или нет? (<em>англ</em>.)</p></span>
<span id="id42"><div class="title1">
<p class="p">7</p>
</div><p class="p1">Я думаю, нет (<em>англ</em>.).</p></span>
<span id="id40"><div class="title1">
<p class="p">8</p>
</div><p class="p1">Игорь Малышев — прозаик, публицист. Публиковался в журналах «Москва», «Новый мир», «Дружба народов». Автор книг для детей и взрослых «Лис», «Дом», «Там, откуда облака», «Номах. Искры большого пожара».</p></span>
<span id="id37"><div class="title1">
<p class="p">9</p>
</div><p class="p1">Какой ты, Вася, оказывается, можешь быть резкий (<em>англ.</em>).</p></span>
<span id="id38"><div class="title1">
<p class="p">10</p>
</div><p class="p1">Это я от отца нахватался. Он в девяностые таких отморозков защищал! У него и сейчас нет-нет да и вырвется что-нибудь эдакое… бодрящее (<em>англ.</em>).</p></span>
<span id="id35"><div class="title1">
<p class="p">11</p>
</div><p class="p1">А ты чего с отцом не поговорила?</p><p class="p1">Я говорила. Он сказал, чтобы я этих вопросов ему больше не задавала (<em>англ</em>.).</p></span>
<span id="id33"><div class="title1">
<p class="p">12</p>
</div><p class="p1">Прекрасная страна, прекрасные люди, прекрасная музыка. Так я хотела бы закончить свой рассказ об Австрии (<em>англ</em>.).</p></span>
<span id="id31"><div class="title1">
<p class="p">13</p>
</div><p class="p1">Григорий Служитель — писатель, солист группы <em>O’Casey</em>.Актер «Студии театрального искусства», автор романа «Дни Савелия». Лауреат премии «Большая книга», специального приза премии «Ясная Поляна».</p></span>
<span id="id29"><div class="title1">
<p class="p">14</p>
</div><p class="p1">Точно, Рахметов! (<em>англ.</em>)</p></span>
<span id="id27"><div class="title1">
<p class="p">15</p>
</div><p class="p1">Нина Дашевская — детский писатель, музыкант. Автор книг «Семь невысоких гномов», «Около музыки», «Вилли», «Я не тормоз», «Вивальди. Времена года». Лауреат конкурса «Книгуру», Международной премии им. В. Крапивина, Литературной премии им. С. Маршака.</p></span>
<span id="id25"><div class="title1">
<p class="p">16</p>
</div><p class="p1">Алексей Сальников — поэт и прозаик. Автор романов «Петровы в гриппе и вокруг него», «Отдел» и «Опосредованно», сборника стихов «Кот, лошадь, трамвай, медведь». Лауреат премий «НОС» и «Национальный бестселлер».</p></span>
<span id="id23"><div class="title1">
<p class="p">17</p>
</div><p class="p1">Елена Нестерина — прозаик, драматург. Автор более тридцати книг для детей и подростков (цикл повестей «Братство Белой Руки», «Ужасные истории»), романов «Женщина-трансформер», «Разноцветные педали», пьес «Шоколад Южного полюса», «Отец ЧБ», «Мать Фелицата»; лауреат драматургического конкурса «Евразия», премии «Долг. Честь. Достоинство» журнала «Современная драматургия», дипломант международной премии им. Ф. Искандера.</p></span>
<span id="id21"><div class="title1">
<p class="p">18</p>
</div><p class="p1">На самом деле? Лень и неэффективно (<em>англ</em>.).</p></span>
<span id="id20"><div class="title1">
<p class="p">19</p>
</div><p class="p1">Мария Ботева — журналист, писатель, драматург. Публиковалась в журналах «Урал», «Новый мир», «Октябрь», «Волга», «Дружба народов». Автор книг «Световая азбука. Две сестры, два ветра», «Мороженое в вафельных стаканчиках», «Фотографирование осени», сборника стихов «Завтра к семи утра». Лауреат премии «Триумф».</p></span>
<span id="id17"><div class="title1">
<p class="p">20</p>
</div><p class="p1">Александр Феденко — прозаик. Автор книги «Частная жизнь мертвых людей», рассказов «Кирпич», «Муха». Публиковался в журналах «Октябрь», «Дружба народов», «Юность». Дважды финалист премии им. И. Бабеля.</p></span>
<span id="id15"><div class="title1">
<p class="p">21</p>
</div><p class="p1">Анастасия Строкина — поэт, переводчик, детский писатель. Публиковалась в журналах «Октябрь», «Дружба народов», «Иностранная литература», «Континент». Автор детских книг «Кит плывет на Север», «Совиный волк», «Девятая жизнь кота Нельсона», «Держиоблако», сборника стихов «Восемь минут». Лауреат Волошинского конкурса, конкурса «Книгуру», премий «Новая детская книга», «Дальний Восток», премии для переводчиков им. С. Апта.</p></span>
<span id="id13"><div class="title1">
<p class="p">22</p>
</div><p class="p1">Сергей Лукьяненко — писатель-фантаст. Автор множества фантастических циклов и отдельных произведений, среди которых романы «Рыцари Сорока Островов», «Звезды — холодные игрушки», «Лабиринт отражений», «Геном», «Спектр», «Ночной дозор». Лауреат премий «Аэлита», им. А. Грина, «Звездный мост», «Еврокон», «РосКон».</p></span>
<span id="id11"><div class="title1">
<p class="p">23</p>
</div><p class="p1">Валерий Бочков — художник, писатель. Иллюстрировал книги и периодические издания, выходившие во многих странах мира. Основатель творческой студии <em>The Val Bochkov Studio</em>. Его работы экспонируются в музеях Европы и США. С 2005 года пишет прозу. Автор романов «К югу от Вирджинии», «Медовый рай», «Коронация зверя», «Обнаженная натура», «Латгальский крест», «Горгона». Лауреат международных литературных премий <em>ADDY Award</em>, «Русской премии», премии Э. Хемингуэя, дипломант премии Н. Гоголя.</p></span>
<span id="id9"><div class="title1">
<p class="p">24</p>
</div><p class="p1">Шибздик сдох (<em>нем</em>.).</p></span>
<span id="id7"><div class="title1">
<p class="p">25</p>
</div><p class="p1">Это супер! (<em>нем</em>.)</p></span>
<span id="id5"><div class="title1">
<p class="p">26</p>
</div><p class="p1">Точно! (<em>нем.</em>)</p></span>
<span id="id4"><div class="title1">
<p class="p">27</p>
</div><p class="p1">Александр Григоренко — прозаик, журналист. Автор детской пьесы «Куросенок», книг «Мэбэт», «Ильгет. Три имени судьбы» и «Потерял слепой дуду». Публиковался в журналах «Новый мир», «Октябрь», «Урал», «Дружба народов». Лауреат премии «Ясная Поляна».</p></span>
<span id="id3"><div class="title1">
<p class="p">28</p>
</div><p class="p1">Шибздик сдох или нет? (<em>нем.</em>)</p></span>
<span id="id2"><div class="title1">
<p class="p">29</p>
</div><p class="p1">Нет времени объяснять, приятель (<em>англ</em>.).</p></span>
<span id="id1"><div class="title1">
<p class="p">30</p>
</div><p class="p1">Булат Ханов — писатель, критик. Публиковался в журналах «Дружба народов», «Октябрь», «Знамя». Автор романов «Непостоянные величины», «Гнев», «Развлечения для птиц с подрезанными крыльями». Лауреат премии «Лицей», финалист премии «Нацбест».</p></span>
<span id="id57"><div class="title1">
<p class="p">31</p>
</div><p class="p1">Антон Соя — автор стихов, песен и прозы для детей и взрослых. Среди его книг «Порок сердца», «ЭмоБой», «Джаз-Банда», «З.Л.О.», «Морской волк», «Звездочка. Лошадка, которая поет», «Ёжка идет в школу», «Маша и Аркаша-таракаша». Победитель конкурса «Книга года-2013: выбирают дети».</p></span>
<span id="id56"><div class="title1">
<p class="p">32</p>
</div><p class="p1">Артем Ляхович — пианист, музыковед, писатель, фотограф. Доцент, кандидат искусствоведения, автор монографии о Сергее Рахманинове, а также книг для подростков «Черти лысые», «Дырка». Троекратный лауреат конкурса «Книгуру».</p></span>
<span id="id55"><div class="title1">
<p class="p">33</p>
</div><p class="p1">Ильгар Сафат — театральный и кинорежиссер, сценарист, прозаик, поэт, рок-бард. Одна из режиссерских работ в кино — мистический триллер «Участок» (выдвигался на соискание премии «Оскар»). Автор романа «Моя необработанная форма».</p></span>
<span id="id54"><div class="title1">
<p class="p">34</p>
</div><p class="p1">Дарья Бобылева — прозаик, переводчик. Публиковалась в журналах «Октябрь», «Нева», «Сибирские огни», сборниках <em>Flash-story</em>, «Лед и пламень», «Литеры». Автор книг «Забытый человек», «Вьюрки», «Ночной взгляд», серии «Самая страшная книга». Лауреат премий «Новые горизонты», «Мастера ужасов».</p></span>
<span id="id53"><div class="title1">
<p class="p">35</p>
</div><p class="p1">Серафима Орлова — драматург и детский писатель. Автор пьес «Заречные материалы», «Про город», «Хочу по правде», «Аста», «Профессор музыки», повестей «Химера», «Голова-жестянка». Лауреат конкурса к столетию драматурга В. Розова, конкурса «Ремарка», премий им. В. Крапивина, им. Ф. Достоевского, участник фестиваля молодой драматургии «Любимовка» и лаборатории «Практика постдраматурга».</p></span>
<span id="id52"><div class="title1">
<p class="p">36</p>
</div><p class="p1">Аллюзия на письмо И. С. Тургенева В. П. Боткину от 17 (29) мая 1856 г.: «<em>Одним словом, никакого сочинения в голове не имеется. Я начал было одну главу следующими (столь новыми) словами: „В один прекрасный день“ — потом вымарал „прекрасный“ — потом вымарал „один“ — потом вымарал все и написал крупными буквами: &lt;…&gt; мать! Да на том и покончил. Но я думаю, „Русский вестник“ этим не удовлетворится».</em></p></span>
<span id="id51"><div class="title1">
<p class="p">37</p>
</div><p class="p1">Владимир Березин — писатель, критик, эссеист. Публикует прозу, критику и эссеистику в журналах «Знамя», «Октябрь», «Новый мир». Автор биографий в серии «ЖЗЛ» многих романов и сборников, среди которых «Последний мамонт», «Дорога на Астапово», «Он говорит». Лауреат конкурса «Книгуру», премии им. В. Одоевского, премий журналов «Новый мир» и «Знамя», финалист премии «Ясная Поляна».</p></span>
<span id="id50"><div class="title1">
<p class="p">38</p>
</div><p class="p1">Евгений Сулес — актер, телеведущий, писатель. Публиковался в журналах «Октябрь», «Знамя», «Новый берег», «Искусство кино». Лауреат премии «Антоновка». Автор книг «Сто грамм мечты» (длинный список «Большой книги»), «Мир виски и виски мира», «Письма к Софи Марсо». Сооснователь клуба ЛЖИ — Любителей Живых Историй.</p></span>
<span id="id49"><div class="title1">
<p class="p">39</p>
</div><p class="p1">В своем ли ты уме, бедняжка?! (<em>англ.</em>)</p></span>
<span id="id41"><div class="title1">
<p class="p">40</p>
</div><p class="p1">Моя милая (<em>фр</em>.).</p></span>
<span id="id39"><div class="title1">
<p class="p">41</p>
</div><p class="p1">Не смеши меня! (<em>фр.</em>)</p></span>
<span id="id36"><div class="title1">
<p class="p">42</p>
</div><p class="p1">Конечно (<em>фр.</em>).</p></span>
<span id="id34"><div class="title1">
<p class="p">43</p>
</div><p class="p1">Князь Андрей! Очнись! Очнись, Нео! (<em>англ.</em>)</p></span>
<span id="id32"><div class="title1">
<p class="p">44</p>
</div><p class="p1">Одну секунду, я позвоню твоему верному товарищу (<em>англ.</em>).</p></span>
<span id="id30"><div class="title1">
<p class="p">45</p>
</div><p class="p1">Ну-ка подпрыгни, песенку спой, смерть скоро придет за тобой и за мной (<em>англ</em>.).</p></span>
<span id="id28"><div class="title1">
<p class="p">46</p>
</div><p class="p1">Будь вовремя. И возьми те самые марки с собой (<em>англ</em>.).</p></span>
<span id="id26"><div class="title1">
<p class="p">47</p>
</div><p class="p1">Какого черта? (<em>англ</em>.)</p></span>
<span id="id24"><div class="title1">
<p class="p">48</p>
</div><p class="p1">Опасные связи (<em>фр</em>.).</p></span>
<span id="id22"><div class="title1">
<p class="p">49</p>
</div><p class="p1">От японского «пожалуйста».</p></span>
<span id="id19"><div class="title1">
<p class="p">50</p>
</div><p class="p1">От японского «к сожалению».</p></span>
<span id="id18"><div class="title1">
<p class="p">51</p>
</div><p class="p1">И начинанья, взнесшиеся мощно, сворачивая в сторону свой ход, теряют имя действия… (<em>англ</em>.)</p></span>
<span id="id16"><div class="title1">
<p class="p">52</p>
</div><p class="p1">Бойся данайцев, дары приносящих (<em>лат.</em>).</p></span>
<span id="id14"><div class="title1">
<p class="p">53</p>
</div><p class="p1">…Вот в чем вопрос! (<em>англ.</em>)</p></span>
<span id="id12"><div class="title1">
<p class="p">54</p>
</div><p class="p1">Вернемся к нашим баранам (<em>фр.</em>).</p></span>
<span id="id10"><div class="title1">
<p class="p">55</p>
</div><p class="p1">От японского «прощайте».</p></span>
<span id="id8"><div class="title1">
<p class="p">56</p>
</div><p class="p1">Зависит (<em>англ.</em>).</p></span>
<span id="id6"><div class="title1">
<p class="p">57</p>
</div><p class="p1">Дмитрий Быков — прозаик, поэт, публицист, радио-и тележурналист, учитель литературы. Автор цикла лекций «Прямая речь», литературных биографий Бориса Пастернака, Булата Окуджавы, Максима Горького, Владимира Маяковского, романов «Оправдание», «Орфография», «Остромов», «Эвакуатор», «ЖД», «Списанные», «Июнь», «Истребитель». Дважды лауреат премии «Большая книга».</p></span>
