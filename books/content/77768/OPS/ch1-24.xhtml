<p class="p">Глава 21</p>
<p class="p">Дуэль</p>
<p class="p">Евгений Сулес<a href="ch2.xhtml#id50" class="a">[38]</a></p>
</div><p class="p1">Андрей и Лиза возвращались в Москву на электричке. После пережитого на даче говорить не хотелось. Слова казались лишними и ненужными. Ехали молча, смотрели в окно на пробегающий мимо убогий пейзаж. Украдкой поглядывали друг на друга. Каждый думал о своем.</p><p class="p1">Андрей почему-то вспоминал, как обнял Аню дома у Пети, когда все просили друг у друга прощения. Аня прижалась к нему и выплакала на его плечо водопад слез. Ему хотелось держать ее и не отпускать. Он никак не мог этого забыть. Усилием воли заставил себя не вспоминать. А сейчас снова вспомнил, и на душе стало тоскливо, будто кто-то умер.</p><p class="p1">Рядом ехала Лиза, такая близкая, доступная — протяни руку, прижми к себе и не отпускай. Его Лиза, верная Лиза, которая всех спасла, вернула в реальность, стерла дурную бесконечность фантомов, исправила бытие, починила, навела резкость мира. Пожертвовав своим даром. Бедная Лиза. Андрей знал, что Лиза его друг, он любил Лизу, но влекло его к Ане.</p><p class="p1">Терзания Андрея прервало сообщение, пришедшее в общий чат. Андрей и Лиза одновременно посмотрели в черное зеркало, каждый в свое. С понедельника школу закрывали на карантин.</p><p class="p1">— О дивный новый мир! — сказала Лиза, глядя в окно на полуразрушенную железнодорожную станцию.</p><p class="subtitle">* * *</p><p class="p1">Ночью Андрею снился сон. Все старики умерли, на всей планете не осталось ни одного. Умер его прадед и верный старый адъютант Никита. Даже бессмертный Платон Платонович, и тот умер. Затем умерли люди среднего возраста. Остались одни дети. Опустевшая планета принадлежала им. Лизе, Пете, Дяде Федору, сестрам Батайцевым, ему и… Аня наклонилась к нему, стало темно и сладко.</p><p class="p1">Андрей проснулся в начале шестого. Долго смотрел на проявляющийся из темноты день. В одном из случайно попавшихся постов на «Яндекс. Дзене» Андрей прочел, что некоторые хасиды учили: ночью творение умирает, а наутро Сущий создает его вновь. Ему в последнее время часто казалось, что каждую новую главу — мир другой и люди другие. Те же, но другие. Откуда у него появилось деление жизни на главы, он не знал, но определял границы глав очень четко. Иногда прямо так себе и говорил: началась новая глава. Ему представлялась компания беззаботных богов, которые по очереди пишут книгу бытия. И все вокруг выполняют их причудливую волю, делают то, что боги напишут. А боги пишут, что на душу ляжет, играют ими, как кубиками, — переставляют, меняют местами, убирают — от нечего делать, заполняя пустоту. Этот образ и раньше приходил Андрею в голову, но с той минуты, как его начало неотвратимо тянуть к Ане, стал навязчивой метафорой мира.</p><p class="p1">В висках стучало ее короткое имя. Хотелось взять баллончик с краской и написать на всю стену: «Я хочу быть с тобой, Аня!»</p><p class="p1">Андрей оделся и вышел на улицу. В Замоскворечье было безлюдно, только одинокий дворник, сгорбленный старик с черточками глаз, неторопливо мел улицу. Увидев Андрея, он прервал работу и поклонился, произнеся нараспев:</p><p class="p1">— Я уже здесь!</p><p class="p1">Андрей поклонился в ответ. Старик добавил еще что-то и долго смотрел ему вслед. Покачал головой и опять принялся за свое.</p><p class="p1">Андрей брел с детства знакомыми переулками, он не заблудился бы в них даже с закрытыми глазами. Шел, сам не зная куда. Но ноги и сердце знали. Он шел, пока за очередным поворотом не встретил Аню.</p><p class="p1">Они не удивились, словно договорились о встрече. Из глаз Ани исходил видимый только ему зеленый свет. Так на границе дают добро, и человек въезжает в чужую страну. Андрей осторожно, но крепко прижал Аню к себе. Они стояли обнявшись посередине пустого и тихого переулка, затерянного в центре Москвы, и им казалось, что они одни на всем белом свете.</p><p class="subtitle">* * *</p><p class="p1">Днем Андрей встретился с Лизой в их любимом кафе.</p><p class="p1">— Лиза, я должен тебе что-то сказать, — начал Андрей и осекся.</p><p class="p1">Прадед в Лысых горах упоминал о предательстве. Что он сейчас делает? Предает? И если да, то кого, ее или себя?</p><p class="p1">— Скажи, — Лиза смотрела ему прямо в глаза.</p><p class="p1">Андрей, не выдержав ее взгляда, опустил глаза в черный океан, микрокосмос в белой кофейной чашке с пеной Млечного Пути в центре. И, будто хотел поведать этому непроницаемому океану свою тайну, тихо произнес:</p><p class="p1">— Между мной и Аней что-то происходит. Какое-то электричество. Когда я с ней, по мне словно пускают ток. А когда ее нет — меня выключают.</p><p class="p1">— Понятно. — Лиза улыбнулась. Попыталась улыбнуться, но вышло не очень.</p><p class="p1">И снова добавила:</p><p class="p1">— Понятно.</p><p class="p1">— Что тебе понятно?</p><p class="p1">— Все.</p><p class="p1">— Лиза, пойми…</p><p class="p1">— Не надо, Андрей. Ты сильный, но слабый. А я слабая, но сильная. Я справлюсь. Иди.</p><p class="p1">— А ты?</p><p class="p1">— А я немного посижу и тоже пойду.</p><p class="p1">— Куда?</p><p class="p1">— Жить, Андрюша, учиться жить без тебя. Ты и так слишком долго был рядом. Могла бы и догадаться, что так будет не всегда. Обидно только, что это Шерга. Опять эта проклятая старая Шерга… Она создана мучить меня, отравлять мне жизнь. Мы, бобры, веселы!.. Все хорошо, иди!</p><p class="p1">Андрей встал и пошел на ватных ногах к выходу. Потом вернулся, сел рядом. Посидел и снова ушел.</p><p class="p1">Лиза подождала, досчитала до десяти и горько, как в детстве, заплакала.</p><p class="subtitle">* * *</p><p class="p1">В это самое время в другом кафе Аня Шергина говорила с Васей Селезневым.</p><p class="p1">— Аня, это просто смешно, — убеждал Вася. — Ты его совсем не знаешь! Тебе нравится внешняя форма. Могучее лубоцкое тело! Вот и все. Это пройдет быстрее, чем ты думаешь. Оглянуться не успеешь, как чары спадут!</p><p class="p1">— Вася, ты себя слышишь?! «Чары»! Ты сказал: «Чары спадут»!</p><p class="p1">Слова Ани его отрезвили. Он увидел себя со стороны. Выглядел он и вправду жалко. Вася собрался и ощутил невыносимую злобу. «Ты труп, Лубок, ты труп!» — произнес Вася про себя не своим голосом. Вслух же сухо сказал:</p><p class="p1">— Хорошо, Аня. Я тебя услышал. Можешь идти.</p><p class="p1">Аня хотела что-то добавить, но вид Васи ее остановил. Таким она еще никогда его не видела. Даже не могла представить, что он таким может быть. В нем появилось что-то жесткое и властное, голос зазвучал ниже и тише, он стал очень похож на отца.</p><p class="p1">— Свободна! — повторил Вася с металлом в голосе.</p><p class="p1">Аня подчинилась и ушла.</p><p class="p1">Вася еще немного посидел в задумчивости. Заказал безалкогольный мохито, не спеша выпил его. Взял телефон и написал: «Дорогой Андрей, я вызываю тебя на дуэль. Условия оставляю за тобой». Хотел поставить в конце яростное эмодзи, но передумал. Ответ пришел быстро. «Дорогой Вася, всегда к твоим услугам. Право выбрать условия предоставляю тебе». Андрей написал еще: «Мне жаль, что так вышло». Но стер и не отправил.</p><p class="subtitle">* * *</p><p class="p1">Утро было прохладным. Не хватало тумана, укрывавшего холодную землю. Если бы это кто-то писал, подумал Андрей, то туман был бы обязательно. Но поскольку все происходило в реальности, тумана не было.</p><p class="p1">Секундантом Васи был Дядя Федор. Секундантом Андрея — Петя Безнос.</p><p class="p1">— Друзья, я предлагаю вам примириться, это еще возможно! — с душой воскликнул Петя. — Вспомните, сколько хорошего было между вами!</p><p class="p1">— Я готов, — сказал Андрей. — Мне жаль…</p><p class="p1">— Не надо слов, Лубок! — зло прервал его Вася. — Ты взял самое дорогое, что у меня было. И должен за это ответить!</p><p class="p1">— Как будет угодно! — учтиво поклонился Лубоцкий.</p><p class="p1">Слово взял Дядя Федор:</p><p class="p1">— Стороны не пришли к соглашению и отказались от примирения!</p><p class="p1">Федя говорил так, будто велась трансляция поединка, но изображение отключилось, и он вынужден комментировать происходящее, пока видео не появится вновь.</p><p class="p1">— Приступим! Вы скачали <em>GTA</em>?</p><p class="p1">Дуэлянты кивнули.</p><p class="p1">— Хорошо. Напоминаю условия. Ваша задача угнать самолет. Кого первым убьют, тот проиграл и должен будет прыгнуть с крыши. Всем все ясно?</p><p class="p1">— Ребята, я вас прошу… Это глупо, прекратите! — вновь попытался примирить их Петя.</p><p class="p1">— Безнос, кончай, все решено! — прервал его Вася.</p><p class="p1">— Не надо, Петя. — Андрей мягко отстранил его и достал мобильник.</p><p class="p1">Вася достал свой.</p><p class="p1">— Безнос, проверь зарядку у Васи, а я проверю у Лубоцкого!</p><p class="p1">Пальцы Пети, когда он проверял телефон, заметно подрагивали.</p><p class="p1">— Телефоны заряжены. Приготовились! — скомандовал Дядя Федор.</p><p class="p1">Петя в отчаянии закрыл лицо руками.</p><p class="p1">— Поехали! — рявкнул Дядя Федор, дав в конце петуха.</p><p class="p1">Дуэль началась. Андрей и Вася впились в смартфоны. Казалось, они вот-вот начнут перетекать по ту сторону экрана, что гаджеты их засосут, как пылесос пыль.</p><p class="p1">Но вдруг — о, это чудесное «вдруг», сколько жизней оно уже спасло и спасет впредь! — в наступившей тишине, прерываемой нервным сопением ребят, раздался чудовищной силы грохот. Земля содрогнулась и задрожала. Шум донесся со стороны школы. Послышались крики. Над домами поднялось большое облако пыли.</p><p class="p1">Ребята переглянулись и, не сговариваясь, побежали на шум. По дороге к «двенашке» они наткнулись на сестер Батайцевых. Сестры были бледны и напуганы.</p><p class="p1">— Что, что случилось?!</p><p class="p1">— Школа!.. — только и смогла выдавить Наташа.</p><p class="p1">— Что школа? Наташа, что там?</p><p class="p1">— Она рухнула, — договорила за нее Соня. — Сложилась, как карточный домик…</p><p class="p1">— Ее взорвали? Сломали?</p><p class="p1">— Она вроде как сама… Там никого не было, ни строителей, ни ограждений…</p><p class="p1">Они снова бросились бежать. К ним присоединялись все новые люди. «Узнала, что хотят снести Калачёвку, и совершила самоубийство, как ронин, потерявший хозяина!» — успел подумать Петя.</p><p class="p1">Вдалеке показались руины родной школы имени остроумного старика Бернарда Шоу, родное пепелище. И так неузнаваем, так фантастичен был открывающийся взору вид.</p><p class="p1">Андрею казалось, будто они бегут на поле боя и он держит в руках древко полкового знамени. Он видел растерянные лица ребят. Ему хотелось что-то крикнуть, подбодрить друзей. И он крикнул: «Ура!» Зачем, почему?.. Бог весть! Просто крикнул первое всплывшее откуда-то из глубин внутреннего человека. Словно кто-то вложил ему в уста этот крик.</p><p class="p1">Ребята подхватили. Так они и бежали некоторое время к милым сердцу развалинам, крича бессмысленное «ура» ломающимися нежными голосами.</p><p class="p1">И тут будто выключили звук. Друзья продолжали бежать, бесшумно, как рыбы, открывая рты. Андрей медленно, в рапиде, не понимая, что происходит, почему сильное и упругое тело больше не слушается его, чуть взлетел над землей и упал на спину. В высоком небе плыли облака. И ничего, кроме них, на свете не было. Только бесконечное небо, только облака. Он вспомнил песню «Сансары»: «Облака этим летом, пожалуй, будут особенно хороши…» Они плыли по небу с нереальной скоростью. Солнце много раз взошло и скрылось, прежде чем над ним склонилась Лиза с лицом Ани.</p><p class="p1">— Я поскользнулся, Лизка, я поскользнулся, прости!</p></span>
