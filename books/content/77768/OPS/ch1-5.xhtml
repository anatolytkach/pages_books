<span id="id4"><div class="title1">
<p class="p">Глава 2</p>
<p class="p">Kuraga</p>
<p class="p">Игорь Малышев<a href="ch2.xhtml#id40" class="a">[8]</a></p>
</div><p class="p1">В России ничего не делается быстро. Когда герои нашей истории вернулись с летних каникул, вопрос со сносом Калачёвки все еще не был решен. То ли не хватало какого-то высокого согласования, то ли важные бумаги заблудились в бюрократических лабиринтах, но дело застопорилось.</p><p class="p1">Все заинтересованные лица напряженно ждали исхода.</p><p class="p1">В 10-м «Б», как и во многих современных классах, был свой внутренний чатик в <em>WordApp</em>. Там можно было обменяться новостями, выяснить что-то, спросить, как решать задачу в домашнем задании. Пустая болтовня не приветствовалась, спамеры безжалостно банились на неделю и даже больше в случае рецидива.</p><p class="p1">На последнем уроке, когда химичка по прозвищу Глюкоза, дама за сорок, весьма жесткая и, вопреки кличке, совсем не «сладкая», муштровала класс, смартфоны почти всех ребят вздрогнули, принимая сообщение. Федькин айфон, не переведенный в беззвучный режим, громко тенькнул.</p><p class="p1">— Дорохов, к доске, — моментально отреагировала Глюкоза.</p><p class="p1">— Да ё-моё, — тихо выругался Федор. — Что ж так не везет-то…</p><p class="p1">До конца урока оставалось целых десять минут, и шансы схватить пару были самые очевидные.</p><p class="p1">Глюкоза вцепилась в жертву, а десятиклассники тем временем успели глянуть на экраны смартфонов.</p><p class="p1">Писал Андрей Лубоцкий: «Дядя Федор, Лиза, Безнос, Батайцевы, Шерга, останьтесь после урока. Есть серьезное дело».</p><p class="p1">— Лубок, ты охренел? Ты чего пишешь посреди урока? — наехал на Андрея Федька, когда за Глюкозой закрылась дверь. — Я еле-еле на трояк вытянул.</p><p class="p1">— Извини-извини, — примирительно поднял руки Андрей. — Но дело срочное, я боялся, что вы разбежитесь. Петька! Безносов! Стой, не уходи. Поговорить надо. Вечно я забываю про твою «нокию».</p><p class="p1">По техническим причинам Петя был единственным, кто не состоял в чате.</p><p class="p1">Класс опустел, остались только перечисленные в сообщении и почему-то Вася Селезнев.</p><p class="p1">— Василий, дружище, ты чего домой не идешь? — спросил Андрей.</p><p class="p1">Селезнев неловко оглянулся на Шергину и чуть покраснел.</p><p class="p1">— Да вот тоже решил послушать. Интересно.</p><p class="p1">— Ну, сиди, если хочешь.</p><p class="p1">Лубоцкий оглядел собрание:</p><p class="p1">— Как там у Гоголя было? «Я пригласил вас для того, чтобы сообщить пренеприятнейшее известие». Хотя это уже никакое не известие. Короче, отец тут на днях все как следует разузнал. За Калачёвку берутся всерьез. В течение месяца, максимум двух, окончательно решится, будут ее сносить или нет. Правда, Аня?</p><p class="p1">Между Лубоцким и Шергиной никогда не было особо теплых чувств, скорее ровные, подчеркнуто нейтральные. Андрею не очень нравилось, что Аня по делу и без дела использует свой английский (пусть и вправду безукоризненный), а девушка не без оснований полагала, что Лубоцкий считает себя самым умным. И плюс к тому Аня как ни убеждала себя, так и не смогла полностью преодолеть ощущение, что она здесь самая старшая. Опять же, «Шерга»… В пятнадцатилетнем возрасте клички воспринимаются как само собой разумеющееся, а в семнадцать смириться с ними уже сложнее. Детским садом отдает.</p><p class="p1">Впрочем, Аня была неплохой актрисой (уже три года играла в любительском молодежном театре), и скрывать от посторонних свои переживания для нее труда не составляло.</p><p class="p1">— Дюш, Дюша, — подал голос Вася, — мы ж уже все обсудили. Это не ее вина. Она тут вообще не при делах. Ты хотя бы представляешь, насколько серьезные дядьки будут решения принимать?</p><p class="p1">— Представляю, — заверил его Андрей. — Только у Ани папа тоже, знаешь, не просто так погулять вышел. От его позиции многое зависит, не?</p><p class="p1">Одноклассники внимательно смотрели на Шергину. Даже Федька оставил <em>GTA</em> и вынырнул из смартфона.</p><p class="p1">— В общем, так. Ни я, ни моя семья не хотим переезжать куда-нибудь в Бутово или Балашиху. Кого-нибудь тут манит Бутово?</p><p class="p1">— На фиг, на фиг, — заметил Федька, снова ныряя в экран.</p><p class="p1">— Я тоже не хочу никуда переезжать, — подал голос Петя, — только, по-моему, Василий прав. От Ани тут вообще ничего не зависит.</p><p class="p1">— Она дочь своего отца, пусть повлияет! Мне все равно каким образом. Я хочу остаться в своей квартире и своей школе. Меня тут все устраивает.</p><p class="p1">Сестры Батайцевы поднялись со стульев.</p><p class="p1">— Ань, правда, поговори с отцом, — заговорили наперебой. — Мы тоже не хотим ни в Бутово, ни в Саларьево! Москва большая! Пусть найдет другое место для своего комплекса!</p><p class="p1">Лиза Дейнен стояла рядом с Лубоцким, всплескивала руками и увещевала Аню и остальных глубоким красивым голосом:</p><p class="p1">— Аня, девочки, парни! Нельзя это так оставлять! Андрюша прав, надо что-то делать!</p><p class="p1">Аня вскочила и закричала, перекрикивая общий гомон:</p><p class="p1">— Да поймите же вы! Отец меня даже не послушает! Это для него дело всей жизни. Он знаете с какими людьми завязался, чтобы этот комплекс пробить? Выше только звезды. Даже и говорить с ним на эту тему не стану!</p><p class="p1">— Станешь! — наперебой выкрикивали одноклассники. — Станешь! Иначе не подходи к нам!</p><p class="p1">Аня чувствовала, как лицо ее идет пятнами. Встал Вася, взял ее за плечо и потащил к выходу.</p><p class="p1">— Алё! Кончай базар! — проорал он, внезапно растеряв всю интеллигентность, отступая и прикрывая собой подругу. — Вы чё упертые-то такие? Сказали вам, без вас дело решать будут. Как ее батя отрежет, так и станете носить.</p><p class="p1">— Вот пусть Шерга и поговорит с ним! Тридцать пять человек, блин, пострадают! Не считая учителей!.. А если и школу снесут, то гораздо больше!</p><p class="p1">— Всё! Закрыли вопрос!</p><p class="p1">Вася хлопнул дверью.</p><p class="p1">— <em>As it turned out, Vasya, you could be a harsh person</em><a href="ch2.xhtml#id37" class="a">[9]</a>, — нервно посмеиваясь, сказала Аня, шагая по опустевшему коридору школы.</p><p class="p1"><em>— I got that from my father</em>, — успокаиваясь, сообщил парень. — <em>He defended a lot of thugs in the 90s! Some really spirit-lifting words are just popping out from his lips every now and then, haha!</em><a href="ch2.xhtml#id38" class="a">[10]</a></p><p class="p1">Василий сделал паузу.</p><p class="p1"><em>— Why didn’t you talk to your father?</em></p><p class="p1">— <em>I talked to him! He told me not to ask him such questions any more</em><a href="ch2.xhtml#id35" class="a">[11]</a>.</p><p class="subtitle">* * *</p><p class="p1">Обстановка в классе меж тем медленно, но верно накалялась. Через три дня после той стычки Лубоцкий подошел к парте Ани. За спиной его тенью маячила Лиза Дейнен.</p><p class="p1">— Ты говорила с отцом? — без предисловий спросил Андрей.</p><p class="p1">— Нет. И не собираюсь, — ответила Анна, чувствуя, как начинают дрожать пальцы и сохнет горло. — Да поймите вы, в конце концов, я не виновата в этой ситуации и никак, вообще никак не могу на нее повлиять…</p><p class="p1">— В таком случае мы тоже не видим смысла с тобой разговаривать, — спокойно объявил Андрей и добавил, как припечатал: — Бойкот!</p><p class="p1">Отвернулся и пошел вдоль рядов парт.</p><p class="p1">Дейнен вдруг начала размеренно хлопать в ладоши, глядя в упор на Аню. Некоторое время Лиза молчала, а потом, следуя за ритмом, принялась бесстрастно выговаривать, словно хлестать мокрой тряпкой:</p><p class="p1">— Бойкот! Бойкот! Бойкот!</p><p class="p1">Следом за ней поднялся весь класс и тоже принялся повторять:</p><p class="p1">— Бойкот! Бойкот! Бойкот!</p><p class="p1">Эхо от хлопков звенело под потолком, больно отдаваясь в ушах.</p><p class="p1">Вася, сидевший теперь за одной партой с Аней, с размаху ударил ладонью по столу.</p><p class="p1">— А ну, завалили пищевод!</p><p class="p1">Хор рассыпался и смолк.</p><p class="p1">Три дня после этого Ане никто не сказал ни слова. За исключением Васи, конечно. Он не отходил от нее ни на шаг и сам перестал разговаривать с одноклассниками.</p><p class="p1">— Вася, ты зря отношения с классом рвешь. Ты тут ни при чем, — пробовала убедить его Аня. — Я бы знаешь как хотела все восстановить, но…</p><p class="p1">— Я так решил.</p><p class="p1">А потом в общем чате в <em>WordApp</em> появилось новое лицо — <em>Kuraga</em>.</p><p class="p1"><strong>Kuraga. 09.09_18:21.</strong> Ну что, пупсы, как будем на Шергу воздействовать? Сами видите, бойкот ее не парит. А часики тикают. Осталось меньше месяца.</p><p class="p1"><strong>Лубоцкий. 09.09_18:25.</strong> Ты кто вообще?</p><p class="p1"><strong>Kuraga. 09.09_18:25.</strong> Какая разница? Важно, что я в этой ситуации тоже лицо заинтересованное.</p><p class="p1"><strong>Лубоцкий. 09.09_18:26.</strong> Как ты сюда попала? Или попал?</p><p class="p1"><strong>Kuraga. 09.09_18:26.</strong> Тоже мне, бином Ньютона. Это не проблема, если руки откуда надо растут.</p><p class="p1"><strong>Дейнен. 09.09_18:27.</strong> Ничего, что Шергина нас тоже тут читает?</p><p class="p1"><strong>Kuraga. 09.09_18:28.</strong> А пофиг. Пусть наслаждается. Так есть идеи?</p><p class="p1"><strong>Kuraga. 10.09_15:41.</strong> Нет идей? Может, у кого-то есть знакомые хакеры, пусть на школьном портале или на сайте школы крупными буквами напишут «Шергина — …». Я заплачу́. Жду предложений на kuraga666@mail.ru.</p><p class="p1"><strong>Kuraga. 10.09_23:08</strong>. Шерга, если ты ничего не предпримешь, беги из города! Я тебе устрою сладкую жизнь.</p><p class="p1">На следующий день в 10-м «Б» все разговоры были только о таинственной «кураге». На переменах одноклассники сбивались в группы и, то и дело посматривая в сторону Шергиной и Селезнева, вели обсуждение.</p><p class="p1">— Откуда это существо вообще вылезло? — спросил Петя. — Я посмотрел, кто его пригласил в чат, там нечитаемый набор букв.</p><p class="p1">— Похоже, хакнули наш чатик, — согласился Лубоцкий.</p><p class="p1">— Мне что-то не по себе от этого фрукта, — признался Петя.</p><p class="p1">— Да, чел отмороженный, походу, — мимоходом согласился Дорохов, терзая мобильник, в котором был открыт <em>PUBG</em>.</p><p class="p1">— Нормально, — сказал Лубоцкий. — Так с Шергой и надо. Словами и мягкостью тут ничего не добьешься.</p><p class="p1">— Резковато, конечно, но мне нравится, — согласилась Дейнен.</p><p class="p1">— Аня все-таки наша подруга, — не сдавался Безносов. — Нельзя отдавать ее вот так на съедение.</p><p class="p1">— Никто ее на съедение не отдает. А насчет подруги… Была бы подругой, поговорила бы с отцом.</p><p class="p1">— Я считаю, «курагу» надо забанить, — сказал Петя с необычной для себя твердостью.</p><p class="p1">— Не лезь, Безнос. — Федор закончил миссию и спрятал телефон. — Каждый должен нести ответственность за свои дела. И за бездействие тоже. Вот так. Тем более что добавилась «курага» один раз, добавится и во второй. Если это и вправду хакер, ничего мы тут не сделаем.</p><p class="p1">— Был бы это хакер, не просил бы сайт школы подломить.</p><p class="p1">— А как же он с <em>WordApp</em> справился?</p><p class="p1">— <em>WordApp</em>, насколько я знаю, слабо защищен от взлома.</p><p class="p1">— Короче, вопросов больше, чем ответов. Ладно, понаблюдаем, как дело дальше пойдет.</p><p class="subtitle">* * *</p><p class="p1">Бабье лето накрыло столицу. Солнце лило с небес волны почти июльского жара. Асфальт прогревался и исходил сухой духотой. Липы за окнами школы шелестели пыльной листвой. Воробьи и голуби смотрели скучно, летали лениво и тоже казались присыпанными пылью.</p><p class="p1">Окна класса были плотно закрыты. На задней стене тихо шуршали кондиционеры. Урок английского в самом разгаре. После невразумительных «выступлений» Лели Абрикосовой и Полины с историями о летних каникулах «англичанка» Мясникова по прозвищу Масонка с восторгом выслушала рассказ Ани Шергиной.</p><p class="p1">— …<em>Beautiful country, beautiful people, beautiful music. That’s how I would like to finish my report about Austria</em><a href="ch2.xhtml#id33" class="a">[12]</a>.</p><p class="p1">— Спасибо, Анна, — учительница сияла. — Это лучший ответ, который мы услышали сегодня. Конечно же, пять.</p><p class="p1">Шергина вернулась на место, стала прятать тетрадь в рюкзак, письменных работ сегодня не предвиделось, и вдруг завопила, будто рука ее попала в капкан.</p><p class="p1">Все, забыв про бойкот, вскочили с мест, кинулись к ней. Она, не прекращая вопить, вытряхнула из рюкзака на пол его содержимое. С грохотом посыпались учебники, тетради, ручки, линейка, айпод, губная помада, тушь, упаковка влажных салфеток, ключи и… дохлая крыса с голым противным хвостом.</p><p class="p1">— Мамочки! — закричала Леля, которой тушка грызуна упала прямо на кроссовки.</p><p class="p1">Класс наполнился движением и шумом. Загрохотали стулья, задвигались парты. Все ринулись смотреть на причину переполоха.</p><p class="p1">Масонка с трудом восстановила дисциплину. Послала Колю Дончакова за уборщицей, та явилась, убрала труп.</p><p class="p1">Аня сидела за партой, скривившись, смотрела на руку, которой недавно трогала грызуна. По всему было видно, что она до сих пор чувствует его в своей ладони.</p><p class="p1">— Анечка, ты как, в порядке? Сходи вымой руки, умойся холодной водой, попробуй прийти в себя, — мягко посоветовала Масонка, которая, к слову, не входила в число тех, кого должна была коснуться проблема Калачёвки.</p><p class="p1">— Чья работа, дебилы? — заорал Вася, не смущаясь присутствием учительницы, когда Шергина вышла из класса. — Кто? Это «курага» ваша, да? Кто это, колитесь! Вычислю — под шконарь загоню!</p><p class="p1">— Вася! Вася! — попыталась утихомирить его Масонка, опешившая от лексики и эмоциональности интеллигентного юноши.</p><p class="p1">— Лубоцкий, ты? Конец тебе, падла! — не унимался Селезнев.</p><p class="p1">— Вася, я тут вообще ни при чем, клянусь! — побледнев, твердо ответил тот.</p><p class="p1">После уроков во дворе школы под липами состоялось собрание класса. Присутствовали все, кроме Шергиной и Селезнева. После английского прошло еще три урока, народ немного успокоился и пытался рассуждать трезво. Федя оперся спиной о мощный ствол, закурил.</p><p class="p1">— Меня угости, — попросила Соня Батайцева.</p><p class="p1">Федя взглянул на нее удивленно:</p><p class="p1">— Ты куришь?</p><p class="p1">— Летом стала баловаться.</p><p class="p1">— Вы что, с дуба рухнули? — повернулся к ним Лубоцкий. — Сейчас директор или завуч запалят, родителям настучат. А они вам.</p><p class="p1">— Мои знают, — равнодушно сказал Федя.</p><p class="p1">— А мои догадываются, — пожала плечами Соня.</p><p class="p1">Петя вышел в центр сборища, потер лоб, собираясь с мыслями. Снял очки, подышал на них:</p><p class="p1">— Ребята, что происходит? Кто это сделал?</p><p class="p1">— Точно не я… Я не в курсе… Не знаю… — раздались голоса.</p><p class="p1">— Но я, честно говоря, не вижу в этом большой проблемы, — сказала малышка Лиза. — Ну крыса, ну дохлая.</p><p class="p1">— Послушай, Лиза, нельзя же так, — укоризненно посмотрел на нее Петя. — Мы же были классом. Единым целым. Всегда все вместе. Один за всех, и все за одного. Откуда этот кошмар вдруг взялся? «Курага», крыса… Зоопарк.</p><p class="p1">Никто ему не ответил. Петя прошелся взглядом по лицам. Родные, знакомые с начальной школы, а то и с детсада, сейчас они вдруг изменились. В них поселилась настороженность, недоверие друг к другу.</p><p class="p1">— Это мог быть только кто-то из нас, — вздохнув, произнес он. — Крысу подсунули во время урока или на перемене, что более вероятно. Не думаю, что это можно было провернуть, пока Аня шла в школу.</p><p class="p1">— Логично, — согласился Лубоцкий.</p><p class="p1">— Стопудово, — выдыхая дым вверх, кивнул Федька.</p><p class="p1">— Кто-нибудь заметил что-то подозрительное? Может, кто-то брал рюкзак Шергиной? Или хотя бы расстегивал? Видели?</p><p class="p1">Одноклассники помолчали, прокручивая в голове события дня.</p><p class="p1">— Нет… Не было ничего особенного… Никто вроде не цапал…</p><p class="p1">Петька водрузил на нос очки, которые все это время вертел в руках.</p><p class="p1">— Только ведь это все равно кто-то из нас. Понимаете? Ну ладно. Не хотите признаваться, не надо. Но давайте договоримся, что на этом всё, хватит. Больше никаких гадостей. Согласны? Я спрошу каждого, чтобы все было по-честному. Андрей Лубоцкий, с тебя начнем. Неважно, ты это сделал или нет, просто поклянись, что не причинишь вреда и не обидишь Аню Шергину. Клянешься?</p><p class="p1">— Клянусь. Но право сохранять бойкот я оставляю за собой.</p><p class="p1">— Как хочешь. Теперь ты, Лиза.</p><p class="p1">— Клянусь. Но от бойкота не отказываюсь, — подняла руку Дейнен.</p><p class="p1">…Класс разошелся по домам. Под липами остались Петя, Федька и Соня.</p><p class="p1">— Безносик, ну чего ты так расстраиваешься? — спросила девушка, становясь поближе к Дорохову. — Три к носу, все пройдет. Поговорка есть такая, знаешь?</p><p class="p1">— Гадко все это, Соня, гадко. Федь, дай закурить.</p><p class="p1">— И ты, Брут? — снова удивился Дорохов.</p><p class="p1">Петя с каким-то отчаянным видом сделал подряд три глубокие затяжки. Покраснел, потом побледнел и разразился жутким, выворачивающим наизнанку кашлем. Федька и Соня согнулись пополам от смеха.</p><p class="p1">— Тоже гадость… — проскрипел Петя, держась за горло и отплевываясь. — Ох-х-х… Ладно. Я домой. Пока.</p><p class="p1">Пошатываясь, он двинулся к выходу с территории школы. Дорохов подался за ним, но Соня придержала его за рукав:</p><p class="p1">— Дойдет.</p><p class="p1">— Дойдешь, Петь? — крикнул ему вслед Федя.</p><p class="p1">Безносов, не оборачиваясь, покачал в воздухе рукой с поднятым вверх большим пальцем.</p><p class="p1">Вечером у всех одноклассников звякнул мобильник.</p><p class="p1"><strong>Kuraga. 13.09_18:41</strong>. Что, пупсы, понравилось шоу двух крыс? То ли еще будет! Готовьтесь все, и Шерга особенно.</p><p class="p1">На следующий день перед первым уроком, едва войдя в класс, Безносов демонстративно подошел к парте, за которой сидели Шергина и Селезнев. Протянул руку Василию, повернулся к девушке.</p><p class="p1">— Аня, привет.</p><p class="p1">— Привет, — немного подозрительно ответила та.</p><p class="p1">— Как ты?</p><p class="p1">— Да ничего, спасибо. Пришла в себя. Уходить не собираюсь, — пошутила она.</p><p class="p1">— Ну и отлично. Обращайся, если вдруг что-то нужно будет, — чуть повысив голос, чтобы слышали остальные, сказал Петя.</p><p class="p1">Лубоцкий, склонив голову набок, наблюдал за этой сценкой, потом пожал плечами и отвернулся. Остальные сделали вид, будто ничего не произошло.</p><p class="subtitle">* * *</p><p class="p1">Когда накануне Петя пришел домой, мама приблизилась к нему, привстала на цыпочки, поскольку была уже на полголовы ниже сына, и втянула воздух.</p><p class="p1">— Ты закурил? Совсем с ума сошел?</p><p class="p1">Петю немного мутило от трех затяжек, и выслушивать материнские упреки не было никакого желания. Мать же, напротив, была на взводе. Мысль о свалившемся, но пока недоступном богатстве нервировала ее хуже гвоздя в ботинке. Она то и дело срывалась по поводу и без повода. И чаще всего, конечно, на Петра.</p><p class="p1">— Уже куришь, да? А что потом будет? Пить начнешь, гулять?</p><p class="p1">— Ма, ну хватит. Я случайно затянулся… — пробурчал Петька и тут же понял, что сморозил глупость.</p><p class="p1">— Случайно — это как?! — взвилась мать. — Сигарета тебе сама в рот попала? У тебя головы, что ли, вообще нет? Ты кем хочешь вырасти? Как отец твой? Таким же? Детей бросать?..</p><p class="p1">Петька понял, что «концерт» может растянуться на целый вечер, и поступил так, как делал уже не раз. Собрал рюкзак и двинулся к двери.</p><p class="p1">— Ты куда, опять к Федьке? — спросила мать, оборвав монолог.</p><p class="p1">— Угу, — максимально неопределенно промычал в ответ сын.</p><p class="p1">— И ночевать опять у него останешься?</p><p class="p1">— Если его родители не прогонят.</p><p class="p1">— Когда это они тебя прогоняли?</p><p class="p1">Как ни странно, известие о том, что она проведет вечер одна, успокоило Галину Алексеевну. Больше всего она любила одиночество, общение с людьми давалось ей с трудом.</p><p class="p1">Петя поцеловал мать на прощание:</p><p class="p1">— Ма, я правда по глупости затянулся. Больше не буду, честно.</p><p class="p1">— Ладно, ладно, верю, — оттаивая, обняла его в ответ мать. — Точно не будешь?</p><p class="p1">— Точно.</p><p class="p1">Петька натянул свои пожившие конверсы («Новые, что ли, купить?») и постарался поскорее выскользнуть из квартиры. Врать он не любил, а между тем соврать ему только что пришлось. Дело в том, что он совсем не собирался к Федьке. С некоторых пор у него образовалось свое убежище, которым он мог пользоваться втайне от матери. Во время последней встречи адвокат покойного отца Евгений Адамович Чарторижский передал ему ключи от трехкомнатной квартиры в Колпачном переулке. Одной из многих, что числились за почившим олигархом. Не самой просторной и роскошной, но самой любимой и часто посещаемой.</p><p class="p1">— Обживайте, юноша. Все равно по завещанию она ваша. Только, чур, без дебошей и шумных компаний. Консьерж проследит.</p><p class="p1">Когда Петя пришел в Колпачный в первый раз, консьерж, как и было уговорено, связался с Чарторижским, адвокат по видеосвязи перекинулся несколькими фразами с парнем и, удостоверившись, что он именно тот, за кого себя выдает, приказал пропустить гостя.</p><p class="p1">Высокая, тяжеленная, покрытая резьбой деревянная дверь открылась мягко. «Словно у холодильника», — подумал Безносов.</p><p class="p1">Потолки под три метра, в лепнине. На окнах тяжелые, словно отлитые из бронзы шторы, стены сплошь покрыты картинами и фотографиями, всюду книжные шкафы и полки с собраниями сочинений, томами в кожаных переплетах. Древняя, огромная, как телевизор, ламповая радиола, рядом стеллаж с пластинками — от Вивальди до Стравинского, от Чака Берри до Ника Кейва. Массивный письменный стол, на нем лампа со стеклянным витражным абажуром. Диваны, кресла, пуфики, торшеры с бахромой. Ковры на полу. Но больше всего Петю вдохновил отделанный темными изразцами камин со стоящими на каминной полке подсвечниками в наплывах воска.</p><p class="p1">Петя вышел на лестницу, спустился к будке консьержа:</p><p class="p1">— Э-э-э… там, в квартире, камин…</p><p class="p1">— Совершенно верно, — с готовностью отозвался страж подъезда.</p><p class="p1">— Скажите, он в рабочем состоянии? Можно его затопить?</p><p class="p1">— Да, конечно. Там есть небольшие хитрости, но ничего сложного. Могу объяснить.</p><p class="p1">— Хорошо, спасибо. Я пока топить не собираюсь, но, когда похолодает, попробую.</p><p class="p1">В ящике письменного стола обнаружилось два десятка толстых кляссеров с марками, и Петька с головой ушел в их изучение. Тут были и современные экземпляры, и дореволюционные, и множество советских. В основном отчего-то космос.</p><p class="p1">Петя никогда не интересовался филателией, но, возможно, только потому, что никогда не получал в руки такое богатство. А то, что это богатство, он понял сразу. Магия, заключенная в цветных кусочках бумаги, проявила себя внезапно и окатила парня с головой. До трех часов ночи он рассматривал изображения планет, космических кораблей, животных, насекомых, рыб, спортсменов, теплоходов…</p><p class="p1">С тех пор он при первой возможности сбегал в квартиру отца и «обживался».</p><p class="p1">После марок настал черед картин, фотографий, книг. Петя научился разжигать камин, полюбил слушать пластинки на ламповой радиоле.</p><p class="p1">Он сам себе напоминал ученого, открывшего неизвестную страну и жадно ее изучающего.</p><p class="subtitle">* * *</p><p class="p1">В понедельник утром Безносов, как обычно, дождался у своего подъезда Федьку, и они пошли к школе. Петя никогда не отличался внимательностью, да сейчас он к тому же был спросонья, поэтому не сразу заметил, что Дорохов взбудоражен сверх всякой меры. Он молчал, но это было спокойствие закипающего чайника.</p><p class="p1">— Ты чего такой?</p><p class="p1">— А какой я должен быть, по-твоему, после этого?!</p><p class="p1">— В смысле? После чего?</p><p class="p1">— А, ты ж у нас технически непродвинутый… Купи уже, наконец, нормальный телефон!</p><p class="p1">Федька достал из кармана смартфон, пробежал пальцами по экрану.</p><p class="p1">— Смотри. Ночью пришло.</p><p class="p1">На экране светилось сообщение из <em>WordApp</em>: «<strong>Kuraga. 17.09_03:06</strong>. Веселье продолжается!»</p><p class="p1">Ниже висело черное окошко видеофайла. Дорохов тронул экран, несколько раз нажал на регулятор громкости.</p><p class="p1">Снимали, судя по ракурсу, камерой, укрепленной на голове по типу налобного фонарика.</p><p class="p1">На экране был поздний вечер. Снимающий прятался за деревом возле набережной реки, но не Москвы, какой-то поменьше, может быть, Яузы. Параллельно реке шла узкая дорога, машин на ней в этот час почти не было.</p><p class="p1">— Вот она идет. Наша крыса. Идет… — раздался приглушенный голос.</p><p class="p1">Говорил явно мужчина, и, скорее всего, молодой. На набережной появился девичий силуэт. Безносов вгляделся, снял очки, поднес телефон почти к самым глазам.</p><p class="p1">— Шергина? — обратился он к Дорохову.</p><p class="p1">Тот кивнул.</p><p class="p1">— Смотри дальше.</p><p class="p1">— Ну что, поехали, — сказал глухой голос.</p><p class="p1">Объектив на мгновение заслонила рука, и на камере включился фонарик. Снимающий пересек дорогу и подбежал к девушке сзади. Та, видимо почувствовав угрозу, обернулась и кинулась наутек, но слишком поздно. Преследователь схватил ее за волосы.</p><p class="p1">— Стоять!</p><p class="p1">Камера металась, слышались звуки возни, шумное дыхание, крики Ани.</p><p class="p1">— Отпусти!.. Кто ты?.. Что тебе надо?.. Полиция!..</p><p class="p1">— Заткнись!</p><p class="p1">Судя по тряске, девушка отчаянно сопротивлялась. Луч камеры на мгновение выхватывал ее лицо, и изображение тут же снова размазывалось.</p><p class="p1">Мимо проехала машина, осветила фарами дерущихся, но не притормозила, а вроде бы даже газанула.</p><p class="p1">Изображение остановилось. Голова Шергиной была прижата к покрытому трещинами асфальту. Вид у девушки был загнанный, глаза метались.</p><p class="p1">— Тебя ведь как человека просили, поговори с отцом, убеди. Неужели не пойдет навстречу любимой дочке? Не зверь же он? — сдавленно цедил напряженный голос. — Ты хоть понимаешь, что с тобой может быть, а?</p><p class="p1">— Отпусти, — прохрипела девушка. — По-хорошему отпусти.</p><p class="p1">— А то что?</p><p class="p1">Та замолчала, сообразив, что злить напавшего сейчас не стоит.</p><p class="p1">— А то что, крыса? — Камера вплотную приблизилась к лицу Ани. — По-плохому будет?</p><p class="p1">Девушка закрыла глаза от бьющего в упор света.</p><p class="p1">— Ты хоть понимаешь, что я с тобой могу сейчас сделать? Понимаешь, а?</p><p class="p1">Он рывком поставил ее на ноги. Видео снова расплылось, заметалось, опять послышались звуки борьбы.</p><p class="p1">— Пусти, я сказала!..</p><p class="p1">Когда изображение зафиксировалось, Аня лежала на перилах, наполовину свешиваясь над водой.</p><p class="p1">— Не дергайся, а то уроню, — посоветовал, тяжело дыша, мужчина.</p><p class="p1">Аня замерла, затихла и только иногда всхлипывала.</p><p class="p1">— Нравится? — спросил он, насладившись страхом жертвы. — Хочешь вниз?</p><p class="p1">— Нет! Нет! — выкрикнула истерично Шергина.</p><p class="p1">— Тогда делай, что говорят, ясно?</p><p class="p1">Он качнул ее, словно собираясь сбросить в реку, Аня снова взвизгнула. Человек уронил ее на асфальт. Девушка, рыдая, сжалась в комок, прижавшись спиной к перилам.</p><p class="p1">Камера отвернулась, похоже, человек пошел прочь от своей жертвы. Снова появилась рука, выключила фонарь. Прежде чем изображение угасло, послышался выкрик, похожий на истеричный хохот.</p><p class="p1">— Что скажешь? — спросил Дорохов, пряча смартфон. — Финиш, да?</p><p class="p1">— Финиш, — согласился Петр. — Но одно обстоятельство меня радует.</p><p class="p1">— Какое?</p><p class="p1">— Голос этого человека и близко не похож на голос кого-то из наших.</p><p class="p1">— Может, на компьютере исказили?</p><p class="p1">— Нет, Анин голос шел без искажений, значит, и его не искажен. — Безносов вздохнул с облегчением и заулыбался. — Это не из наших, понимаешь? Вот что главное!</p><p class="p1">— В принципе, да, — согласился Дядя Федор. — Но как же крыса? Как она попала в шергинский рюкзак?</p><p class="p1">Безносов потер лоб:</p><p class="p1">— Вопрос, согласен.</p><p class="p1">До начала урока было еще пятнадцать минут, однако весь класс был уже в сборе и плотной стеной стоял вокруг парты Шергиной и Селезнева.</p><p class="p1">На щеке у Ани виднелись несколько небольших запекшихся царапин, «асфальтная болезнь», как называют обычно такого рода ранения. Выглядела девушка бледновато, но в целом неплохо. Бойкот был явно позабыт и похоронен, и класс наперебой выражал Ане свое сочувствие.</p></span>
