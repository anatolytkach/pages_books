<span id="id19"><div class="title1">
<p class="p">Глава 17</p>
<p class="p">Не пей вина, Гертруда!</p>
<p class="p">Ильгар Сафат<a href="ch2.xhtml#id55" class="a">[33]</a></p>
</div><p class="p1">Молодежный театр «Беспечная улица» готовился к премьере. На суд зрителей выносилась пьеса известного драматурга Уильяма Шекспира «Гамлет». С чего же еще начинать юным артистам?</p><p class="p1">Режиссером спектакля сам себя назначил Давид Чхония, розовощекий мигрант из Грузии, проживающий в Москве около года, но уже явивший свой недюжинный талант как в новорожденном театре, так и на Москворецком рынке, где торговал сухофруктами. Кстати, о сухофруктах. Грузчиком на том же Москворецком рынке работал сибиряк Иван Курагин, для своих — Курага. Поначалу между Курагой и Давидом вспыхнула национальная рознь, впоследствии переросшая в настоящую дружбу на почве общей любви к театру. Записываться в труппу «Беспечной улицы» они пошли вместе. Вскоре Чхония выбился в режиссеры, но о своем друге не забыл, сразу же назначив Курагина на роль Гамлета.</p><p class="p1">Сам Чхония в спектакле должен был появиться в образе Призрака, весь обмотанный паутиной и почему-то на велосипеде. Это была его режиссерская находка и одна из самых ярких сцен постановки.</p><p class="p1">Ане Шергиной отвели роль Офелии. Чхония долго шлифовал ее пластику дурочки, учил правильно разбрасывать цветы и топиться в голубом полиэтилене. Нет никаких сомнений, что сцена безумия Офелии могла бы затмить даже момент появления Призрака. В этом месте зрители должны были долго и безутешно оплакивать загубленную невинность дочери Полония.</p><p class="p1">Репетировали несколько месяцев, выверяя мизансцены и добиваясь их максимальной выразительности. Постановка грозила стать событием в театральной жизни столицы. Так, по крайней мере, уверял артистов, временами терявших веру в своего лидера, Давид Чхония.</p><p class="p1">И вот неотвратимо обрушился день премьеры.</p><p class="p1">Зал театральной студии был полон — настоящий аншлаг. Публика собралась самая разношерстная. Передние ряды заняли хмурые кавказцы, покинувшие ряды торговые, чтобы поддержать режиссерский дебют друга. В середине теснились важные персоны, специально приглашенные администрацией театра. На остальных местах расположились истые столичные театралы и родственники артистов. Свободных кресел не было, зрители сидели даже в проходах, на приставных стульях. В зале отсутствовали только одноклассники и родня Офелии. Давид Чхония то и дело поглядывал на часы, хотя уже и не надеялся, что артистка, пусть и с преступным опозданием, но все-таки явится к началу спектакля.</p><p class="p1">— Ух, жэнь-щинна! — кипел Давид, гримируясь в мертвенного Призрака и одновременно с этим отдавая последние указания труппе. — На тваем мэстэ, Гамлэт, я би сам ее утапил, слуший! И нэ на сцэнэ, а в Яузэ, мамой клянусь! Всэх нас падвэла под манастыр!</p><p class="p1">— Была такая возможность, — флегматично отозвался Иван, натягивая парик с вьющимися кудрями. — Смотри!</p><p class="p1">Курагин достал из кармана широких елизаветинских штанов свой мобильный телефон и показал приятелю видео с моста, фрагмент которого так шокировал в свое время одноклассников Ани Шергиной.</p><p class="p1">— Это ви што, рэпэтировали? — с надеждой в голосе спросил последователь Станиславского. — Работа актера над ролью, да?</p><p class="p1">— Да нет, — честно признался Курагин, — Аня меня попросила подыграть! Ей для чего-то нужно было! Одноклассников, сказала, хочет развести!</p><p class="p1">— А-а-а, ну-ну! — разочарованно поморщился Чхония.</p><p class="p1">Видео его тем не менее впечатлило. Уж больно выразителен был Курагин в образе злодея. Как он накидывался на Офелию, хватал ее за волосы, жестоко заламывал девушке руки, пытаясь сбросить жертву с моста!</p><p class="p1">— Стоять! — кричал Курага не своим голосом.</p><p class="p1">— Отпусти! — беспомощно отбивалась Аня. — Что тебе надо? Полиция!</p><p class="p1">— Заткнись! Тебя ведь как человека просили, поговори с отцом! Убеди! Неужели не пойдет навстречу любимой дочке? Не зверь же он?! Ты хоть понимаешь, что с тобой может быть, а?!</p><p class="p1">Курага заваливает Аню на перила моста, угрожает сбросить ее в воду. Аня хрипит, задыхается, пытается освободиться.</p><p class="p1">— Не дергайся, а то уроню! — тяжело дыша, советует злодей и театрально смеется. Глаза у Курагина блестят, как у заправского маньяка.</p><p class="p1">— Убэдитэлно, слуший! — закивал Чхония. — Надо будэт с вами «Отелло» паставить! Натурально дущишь, красаучик!</p><p class="p1">Курагин с гордостью клеил себе усы, но, как воспитанный человек, скромно отмалчивался. Однако досмотреть ролик не получилось: раздалась волшебная мелодия, и голос из динамика объявил первый звонок. Давид внезапно вернулся в реальность, вспыхнул и начал нервно расхаживать за кулисами, повторяя по-грузински что-то гортанное и явно неприличное.</p><p class="p1">— Лучшэ би она на сцэнэ так убэдитэлно играла! — сквозь зубы шипел Чхония, не желая мириться с тем, что его театральное детище оказалось на грани провала. Отсутствие Анны не оставляло никаких надежд его избежать. Роль Офелии хоть и не заглавная, но без нее известный драматург Шекспир обойтись не смог, а значит, и он, Давид Чхония, вряд ли обойдется. Да и нет времени что-либо менять — зрителей полный зал! Самые нетерпеливые уже торопят события одиночными хлопками.</p><p class="p1">— Ничего! — самонадеянно отмахнулся Гамлет. — Выкрутимся!</p><p class="p1">Курагин был на удивление спокоен. Казалось, отсутствие партнерши его мало беспокоит. Такова уж природа артистов: их интересует только собственная роль и то, как они сами будут смотреться на сцене. О судьбе предприятия в целом, равно как и о важных частностях спектакля, вынужден тревожиться один только режиссер-постановщик.</p><p class="p1">Внезапно в складках пыльного, еще не поднятого занавеса Чхония увидел нервно хрустевшую пальцами актрису Хрюнову. Чиркнув взглядом по ее широкой груди, режиссер тут же нашел гениальное решение роли Офелии в условиях отсутствия на премьере артистки Шергиной.</p><p class="p1">— Инна Сэргээвна, дарагая! Спасайтэ!</p><p class="p1">Давид умел быть обходительным с женщинами, и роль Офелии была молниеносно отдана Инне Сергеевне Хрюновой, зрелой даме, служившей «красной шапочкой» в метро, но всю жизнь мечтавшей о театральных подмостках. Чхония пообещал Хрюновой главные роли во всех своих дальнейших постановках и вдобавок заверил, что чаша с ядом будет до краев наполнена домашним саперави, всегда хранившимся у Давида в гримерке.</p><p class="p1">Инне Сергеевне, самой возрастной актрисе молодежного театра «Беспечная улица», в постановке Чхонии была отведена роль Гертруды, ветреной мамаши Гамлета. Но теперь, благодаря смелому полету режиссерской мысли, Хрюнову ждала еще одна значимая роль. О большем счастье начинающая возрастная артистка не могла и мечтать. Долго уговаривать Инну Сергеевну не пришлось. Она была польщена и сдалась без боя. Но надеяться на то, что зритель не заметит роковой подмены, было наивно. Выдать пышнотелую Инну Сергеевну за хрупкую девушку, очарованную загадочным принцем, было крайне сложно. Кроме того, костюм Офелии, который Ане Шергиной был даже слегка великоват, на Инне Сергеевне смотрелся как диванная обшивка, подчеркивая все изъяны немолодого уже тела, утратившего форму от бесконечного сидения в подземном «стакане». Но иного выхода из сложившейся патовой ситуации у Давида Чхонии не было. Нужно было идти ва-банк. Пан или пропал.</p><p class="p1">Наконец прозвучал третий звонок, грандиозная, сталинских времен люстра медленно погасла, и начался спектакль. Гамлет задумчиво бродил по ночному Эльсинору, а тень его отца зловеще чревовещала с грузинским акцентом:</p><div class="poem">
<div class="stanza">
<p class="v">Я дух э, я твой отэс,</p>
<p class="v">Приговоренный по ночам сыкитаца,</p>
<p class="v">А днем томица посрэди огня,</p>
<p class="v">Пока грэхи моей зэмной прэроды</p>
<p class="v">Нэ вижгутса да тла!</p>
</div>
</div><p class="p1">Свой монолог Давид Чхония произносил так темпераментно, что нервные зрительницы громко ахали и хватались за спинки впереди стоящих кресел. Недовольные театралы укоризненно шикали, призывая сохранять хладнокровие. Эффект от душераздирающего монолога еще больше усиливался, когда Чхония потренькивал звонком, прикрепленным к рулю велосипеда, а закончив выкрикивать текст, притормозил у самой рампы. Кто-то из кавказцев в первом ряду даже успел выкинуть вперед руки, чтобы принять в объятия экзальтированного земляка. Но Призрак мастерски надавил на тормозную педаль и с протяжным скрежетом трущихся о сцену покрышек застыл у края бездны. Тут ошеломленной публике ничего другого не оставалось, как только облегченно выдохнуть и разразиться бурными овациями.</p><p class="p1">Была, правда, еще одна неразрешимая проблема. Несмотря на всю свою беззаветную любовь к театру, Инна Сергеевна оказалась абсолютно неспособна запоминать текст. Она плохо справлялась даже с собственной ролью, которую зубрила последние месяцы. Слов же Офелии не знала вовсе и на премьере была вынуждена трагикомично импровизировать. Реплики Офелии и Гертруды, как, впрочем, и мизансцены, она вольно перемешала. Зритель был в ступоре и уже не понимал, кто есть кто. К бокалу с ядом Гертруда-Офелия прикладывалась на протяжении всего спектакля и к моменту своей нелепой смерти во время дуэли Гамлета с Лаэртом была уже мертвецки пьяна.</p><p class="p1">Неожиданная вольная трактовка пьесы вызвала шквал оваций. Спектакль Давида Чхонии прошел на ура. Это был настоящий триумф. И даже удвоенная гибель Гертруды, которая вначале, притворяясь Офелией, утопилась в выкрашенном полиэтилене, а потом, ближе к концу, в очередной раз отравилась грузинским вином, не смогла испортить общего впечатления. Зрители рады обманываться, они ведь как дети. Публика решила, что все так и было задумано и кавказский режиссер-самородок явил смелую трактовку «Гамлета». Кто-то из высоколобых критиков даже тихонько прошептал на ухо своему не менее высоколобому, но еще более лопоухому соседу:</p><p class="p1">— Хочет усилить эдипов комплекс!</p><p class="p1">А сосед кивнул, потер бородку и экспертно резюмировал:</p><p class="p1">— Гениально!</p><p class="p1">Повторимся, это был фурор. Зрители аплодировали стоя. Инну Сергеевну завалили цветами. Хлопали и не отпускали несколько минут. Отвыкшая от человеческого тепла работница метрополитена разрыдалась, в эту минуту ей хотелось раздать всем присутствовавшим в зале безлимитные абонементы в метро.</p><p class="p1">Премьеру «Гамлета» отмечали в шумной забегаловке неподалеку от Москворецкого рынка, куда кавказские друзья Давида пригласили занятых в постановке артистов и весь технический персонал молодежного театра, включая капельдинерш и даже билетершу бабу Шуру, служительницу культа Мельпомены с полувековым стажем. Было весело и шумно, пили за всех, имевших к спектаклю хоть какое-то отношение, начиная с известного драматурга Уильяма Шекспира и заканчивая все той же бабой Шурой. По просьбе собравшихся Иван Курагин еще раз повторил знаменитый монолог датского принца «Быть или не быть?» и сцену в могиле с черепом бедного Йорика, роль которого на этот раз исполняла баранья лопатка. После этого кавказские друзья Чхонии предложили ему усилить сцену дуэли Гамлета с Лаэртом, заменив пижонское фехтование бутафорскими шпагами на приемы настоящей вольной борьбы.</p><p class="p1">— Пуст как два мужика разберуца! — подытожил дагестанец Гамзат и, чтобы мысль его стала понятней, показал игравшему Лаэрта артисту бросок через бедро с удушающим зажимом. Бедный Лаэрт не успел вовремя увернуться, и для него банкет неожиданно закончился. И тут Инна Сергеевна Хрюнова, привыкшая спасать партнеров в трудную минуту, не стала дожидаться от Лаэрта не поданной вовремя реплики «Не пей вина, Гертруда!» и, лихо запрыгнув на стол с прытью, которой от нее никто не ожидал, залпом осушила большой рог грузинского вина. Стоны Лаэрта заглушил грохот затяжных оваций и восторженные крики кавказцев.</p><p class="p1">Глубокой ночью принц датский Иван Курагин и зловещий Призрак Давид Чхония обнаружили себя на детской площадке неизвестного им двора. Они сидели в песочнице и были счастливы, перебирая наиболее яркие моменты промелькнувшего дня. Когда впечатления от спектакля и от банкета были исчерпаны, вся работа над ошибками проведена, внезапно вспомнили и про Аню Шергину.</p><p class="p1">— Она сама не знает, чего сегодня лишилась! — со злорадством произнес Курага. — Могла бы проснуться звездой!</p><p class="p1">— Слущай! А что ты там гаварил пра атца? Ну, на видео! «Папраси атца, папраси атца!» О чем «папраси атца»? — поинтересовался Давид.</p><p class="p1">— Да я сам толком не знаю, — равнодушно бросил Гамлет. — Ее папик вроде крутой чел какой-то, дома сносит вместе с людьми!</p><p class="p1">— Залатая маладещ, слущий, — сплюнул Чхония, поднимаясь на детскую горку и лихо скатываясь обратно в песочницу. — Слущий, а давай пайдем к нэй! Прямо сэйчас! — вдруг осенило режиссера. — Расскажэм, как все било! Пусть страдаэт и мучаэтся!</p><p class="p1">— Пошли, — согласился Иван Курагин, который всегда был за любую движуху, кроме голодовки. — Заодно в глаза ей посмотрим!</p><p class="p1">Давид и Иван ринулись на поиски Ани Шергиной. Поздний час их не смущал, они все еще пребывали в эйфории от грандиозного успеха премьеры. Через некоторое время артисты оказались около взорванной водокачки. Вокруг ее огороженных руин, мерцая разноцветными окнами, высились дома. Приехавший из сибирской глубинки Иван Курагин и спустившийся с кавказских гор Давид Чхония с грустью смотрели на чужие московские окна, понимая, что сами они еще очень нескоро станут частью этого благоустроенного мира. В одной из этих квартир должна жить Аня Шергина, дочь олигарха. Иван, по крайней мере, был в этом уверен.</p><p class="p1">— Что будем делать, маэстро? — деловито поинтересовался Курага.</p><p class="p1">Кажется, он был не прочь обойти в поисках Шергиной все окрестные дома от подвалов до чердаков. И неважно, сколько времени это может занять. Для потомственного сибиряка побегать по этажам — плевое дело. Но Чхония не спешил отирать незнакомые подъезды. Как обычно, он ждал наития.</p><p class="p1">— Нада падумат, — глубокомысленно изрек Давид. Его пытливый ум лихорадочно искал единственно верное решение.</p><p class="p1">Иван Курагин и Давид Чхония присели на сырую от ночной росы скамейку, чтобы хорошенько все обмозговать. Что делать дальше, было пока непонятно. Не орать же во все горло под чужими окнами, вызывая Аню во двор? Этот вариант артисты тоже не исключали, но приберегали его на самый крайний случай. Возможно, оба ждали, кто из них первым предложит оставить затею с поиском Ани до лучших времен, хотя бы до наступления утра. Но сдаваться никто не хотел.</p><p class="p1">От внезапно подступившей меланхолии спасало вино, все еще булькавшее в предусмотрительно прихваченной на банкете канистре. Зловещий Призрак с печальным Гамлетом пили по очереди, закусывая сухофруктами, которые Давид щедрыми горстями доставал из карманов брюк.</p><p class="p1">— Не пей вина, Гертруда! — послышался у них за спиной низкий, с хрипотцой голос.</p><p class="p1">В первое мгновение оба артиста вспомнили почему-то Инну Сергеевну Хрюнову, обладавшую схожим грудным баритоном. Иван и Давид обернулись, и улыбки сползли с их лиц: перед ними стояла не Офелия и даже не Гертруда, а двое в штатском.</p><p class="p1">Была еще надежда, что это сегодняшние зрители, случайно узнавшие их на улице. Но и с этой иллюзией пришлось проститься: уж больно эти рослые незнакомцы были непохожи на театралов.</p><p class="p1">— Что мы тут ищем? — спросил один из них, перекрывая артистам путь к паническому бегству. Правую руку он держал в кармане.</p><p class="p1">— Ничего, дарагой, прэмэру отмичаим, слущий! — Давид Чхония попытался включить свое обаяние, но сразу же осекся, осознав, что в данной ситуации его обезоруживающая улыбка не сработает, а может, напротив, привести к нежелательным последствиям.</p><p class="p1">— Документики! — равнодушно процедил один из штатских, и у Давида от его ледяного тона по спине побежали проворные мурашки.</p><p class="p1">Он вдруг вспомнил, что уже несколько месяцев живет в Москве без регистрации. Не давая штатским опомниться, Давид попытался прорваться через живой заслон, решив боднуть головой ближайший силуэт, но сразу же нырнул лицом в траву, больно ударившись вначале о локоть службиста, а затем и о холодную землю. Иван не успел понять, что происходит, хотел было кинуться на помощь другу, но почувствовал звонкий удар по уху, чему-то кротко улыбнулся и упал на землю рядом с Давидом.</p><p class="p1">Обоих обыскали и, скрутив, бросили в какой-то бесшумный транспорт. Куда-то медленно повезли.</p><p class="p1">— Вроде из этих, подопытных, — услышал Иван знакомый уже голос штатского.</p><p class="p1">— А черный к тому же нелегал, — подтвердил его напарник.</p><p class="p1">— Сам ты «черный»! — возмутился Давид, но получил в лоб и почти сразу же уснул.</p><p class="p1">Ивана тоже клонило в сон то ли от выпитого саперави, то ли от избытка эмоций, связанных с успешной премьерой, то ли от такого же короткого удара в лоб.</p><p class="p1">Очнулись артисты в той же комнате, где томились в неволе Аня Шергина вместе со своим отцом и ее одноклассники. Появление незнакомцев вывело подростков из гипноза. Аня Шергина внезапно увидела своих одноклассников, а те, к своему непередаваемому изумлению, обнаружили рядом с собой Аню и ее отца. Это было похоже на один из фокусов Дэвида Копперфильда.</p><p class="p1">При появлении Чхонии и Кураги воздух словно бы сгустился, и из ниоткуда на глазах у Ани материализовалась целая орава ее друзей. Лубоцкий, Полина, Дядя Федор, Наташа! Бог мой, все в сборе! Школьники кинулись друг к другу в объятия, как пассажиры «Титаника», чудом спасшиеся после столкновения с айсбергом. Все были рады незапланированной встрече, но никто не мог понять, почему раньше они не видели друг друга и что вообще произошло. Аня говорила, что находится тут уже довольно давно, но все это время была уверена, что, кроме нее с отцом, здесь никого нет. А тут, оказывается, ютится чуть ли не весь ее класс. Ребята готовы были побожиться, что и они не видели ни Аню, ни ее папашу — виновника всех навалившихся на них бед. Ребята пытались понять, когда в последний раз открывалась дверь комнаты, но коллективная память не помогала.</p><p class="p1">Наконец вспомнили и про вновь прибывших. Разбуженные лицедеи сидели на четвереньках, тоже напрягали память, таращили и терли глаза. Кто-то узнал по голосу в Иване Курагине маньяка Курагу, душившего Шергину на фейковом видео. Но дальше этого дело не пошло. А уж присутствие странного грузина повергало в шок, граничивший с галлюцинацией. Одним словом, никто ничего не понимал. Началась полная неразбериха. Все галдели и размахивали руками, наперебой предлагая и навязывая свое видение случившегося. Но у каждого в голове мелькали слишком уж разные картины реальности, и договориться было невозможно. Сошлись на том, что здесь не обошлось без черной магии.</p><p class="p1">— Или гипноза… — авторитетно вставил свое веское слово отец Ани, и, похоже, он знал, о чем говорил.</p><p class="p1">Павел Шергин сидел в сторонке, и материализация толпы подростков, казалось, не произвела на него особого впечатления.</p><p class="p1">Внезапно принц датский встретился взглядом с Офелией. Аня отошла наконец от своих одноклассников и с виноватой улыбкой приблизилась к Кураге. Неожиданно для себя самого Иван добродушно улыбнулся, хотя весь вечер прокручивал в голове сцену, как при встрече с коварной дочерью Полония испепелит ее уничтожающим взглядом. Чхония оказался злопамятнее. Оно и понятно — режиссер. Давид поднялся на ноги, характерно фыркнул и демонстративно отошел в сторону.</p><p class="p1">— Ну, как прошло? — спросила Аня, вытирая платком все еще кровоточащий нос Гамлета. — Отыграли?</p><p class="p1">— Фантастика! — ответил Курагин, почему-то икая. — Полный зал! Хлопали минут десять, не меньше! Не отпускали!</p><p class="p1">— Тритсадь мэнут! — отозвался из своего угла Давид Чхония. — Тритсадь мэнут хлопали! Как сумашэдшиэ, слущий! Ты многоэ потэрала!</p><p class="p1">— Извините, мальчики. — Аня опустила глаза. — Вы же видите, я не могла прийти! Все это время я была здесь…</p><p class="p1">— Сдэсь?! Что значит сдэсь?! — заорал вдруг Чхония, в сердце которого вспыхнул и запылал пожар кавказского свободолюбия. — Гдэ мы?! Почэму нас дэржат в нэволэ-э-э-э! Свободу-у-у-у! Тираны-ы-ы-ы!</p><p class="p1">В этот момент Давид Чхония был похож на молодого Гарибальди, под пулями всходящего на баррикаду. Громкий голос торговца сухофруктами взвился под потолок, глухо ударяясь о мягкие стены. Но никто из находившихся в заточении малолетних узников его революционного пыла не поддержал. Возможно, просто не успел. Потому что в следующее мгновение дверь бесшумно отворилась и на пороге показался бравый Генерал. В лампасах и с медалями, все как положено. За его спиной возвышались все те же две широкоплечие фигуры в штатском.</p><p class="p1">— Ну что, орлы, раскудахтались? — по-отечески пожурил Генерал, сладко улыбнулся, и на груди его, издавая рюмочный звон, тренькнули ордена. — Пора на выход! Хозяин ждет!</p></span>
