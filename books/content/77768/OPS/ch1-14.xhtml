<p class="p">Глава 11</p>
<p class="p">Плоды просвещения</p>
<p class="p">Сергей Лукьяненко<a href="ch2.xhtml#id13" class="a">[22]</a></p>
</div><p class="p1">Выбравшись из машины, Лубоцкий бросился к Лизе.</p><p class="p1">Как ему удалось выскользнуть из старого полицейского «форда», он в общих чертах понимал. Беспокоился лишь о том, что успела написать Лиза и позаботилась ли о себе.</p><p class="p1">В машине, где двое полицейских, таких же карикатурно ненастоящих, как и схватившие его, — только эти были не толстый и еще толще, — а худой и болезненно тощий, держали Лизу, происходило какое-то мельтешение. Плясали в воздухе Лизины руки, крепко сжимающие блокнот, худой полицейский, перегнувшись с переднего сиденья, рвал листы из рук девочки, а доходяга за рулем только верещал, держась за оцарапанное лицо.</p><p class="p1">Андрей рванул дверь машины — ура, не заперта! И со всего маху влепил худому полицейскому по голове. Тот сразу отпустил Лизу и втянулся обратно на переднее сиденье, словно дождевой червяк во влажную землю.</p><p class="p1">— Лиза! — Андрей рывком выдернул ее из машины вместе с блокнотом.</p><p class="p1">Девочка еще продолжала по инерции отбиваться, и Лубоцкий понял, что у нее закрыты глаза. Времени приводить подругу в чувство не было — он обнял ее, подхватил на руки (как все-таки хорошо, что он такой большой, а она такая мелкая, компактная) и побежал по переулку.</p><p class="p1">Накачанные годами тренировок и семью поколениями предков-физкультурников мышцы не подвели. Хорошие гены, усердные тренировки и протеиновые коктейли позволили Лубоцкому умчаться от дуба и поверженного манекена так легко, словно он был героем комиксов. Лишь мелькнуло обалдевшее лицо Безносова, рядом с Петром стояла Оля, спокойно отряхивающая ладони. И всё — был Лубоцкий с Дейнен и нет его, лишь аромат пены для ванны «Адам и Ева» остался в воздухе.</p><p class="p1">Несколько секунд вокруг дуба царила мертвая тишина.</p><p class="p1">Потом Петя схватил Олю за руку, все еще испачканную кирпичной крошкой. Прошептал:</p><p class="p1">— Ты что? Это же полиция!</p><p class="p1">Оля задумчиво посмотрела на разбитое стекло полицейской машины, где двумя вялыми грудами мяса и жира шевелились несоразмерно крупные люди в форме. И сказала:</p><p class="p1">— Так было надо. Но ты прав, да. Пора валить.</p><p class="p1">В свою квартиру (Петя и сам не понял, в какой момент стал легко и просто думать о ней как о своей, начисто забыв прежнее жилье, да и маму, честно говоря) они с Олей ехали неожиданно долго. Похорошевшая за последние годы Москва выкатила перед ними все пробки, какие только нашла, — и в переулке, где снимали асфальт и клали плитку, и на бульваре, где меняли старую плитку на новую, и на улице, где сдирали плитку и клали асфальт.</p><p class="p1">Но Петя, который по причине таких вот дел предпочитал перемещаться на своих двоих, сейчас был рад задержке.</p><p class="p1">— Ты уверена, Оль? — спросил он. — Что мы… ну… брат с сестрой?</p><p class="p1">— Да, — не изменившись в лице, ответила она.</p><p class="p1">— Я ведь в тебя был влюблен, — сказал Петя. — В детстве. Помнишь, когда ездили в Крым?</p><p class="p1">— Помню, — кивнула Ольга. — Ты был смешной мальчишка. Я видела, что ты с меня глаз не сводишь.</p><p class="p1">— Почему я ничего не почувствовал, если ты моя родная сестра?</p><p class="p1">— А почему ты на меня пялился, если знал, что я двоюродная? — отрезала Оля. — Лучше скажи, отчего эта кукла была на меня похожа? И зачем полиция схватила твоих приятелей?</p><p class="p1">Петя пожал плечами:</p><p class="p1">— Встречный вопрос: ты зачем в полицейских кирпичом кинула?</p><p class="p1">Некоторое время Оля обдумывала ответ. И честно призналась:</p><p class="p1">— Это был совершенно инстинктивный, ни на чем не основанный поступок. Я вдруг поняла, что должна это сделать.</p><p class="p1">— Что-то очень много стало вокруг ничем не обоснованных поступков, — вздохнул Петя.</p><p class="p1">Дальше ехали молча.</p><p class="p1">В подъезде консьерж посмотрел на них каким-то особенным взглядом. И, открывая дверь старинного лифта, произнес:</p><p class="p1">— Ваши друзья только что поднялись.</p><p class="p1">Петя и Ольга переглянулись. Почему-то даже сомнений не возникло, кто успел их опередить. Из лифта они кинулись к двери, едва не отталкивая друг друга, Петя достал ключи, но дверь была не заперта.</p><p class="p1">А в квартире царил полный разгром!</p><p class="p1">Пахло догоревшими дровами — камин недавно топили. Повсюду валялись влажные полотенца, кто-то явно второпях вытирался и не озаботился повесить их на сушилку. Сладкий аромат пены для ванны щекотал ноздри.</p><p class="p1">Еще пахло коньяком, и встроенный в дубовый буфет бар был открыт.</p><p class="p1">Лубоцкий сидел на краю потертого кожаного дивана и пытался влить в рот Дейнен коньяк из кофейной чашечки. Лиза лежала с закрытыми глазами, мертвой хваткой сжимая блокнот с Коньком-горбунком.</p><p class="p1">— Мальчик, вы давно пьете коньяк по утрам? — спросила Ольга сурово.</p><p class="p1">— У нее шок, — ничуть не удивившись и не смутившись их появлению, ответил Лубоцкий. — Я слышал, что коньяк надо дать.</p><p class="p1">— По мозгам вам надо надавать! — Ольга отобрала у него чашечку, понюхала, удивленно качнула головой и залпом выпила коньяк. — Ничего себе… нектар… Тащи мокрое полотенце! Только выжми! И лед!</p><p class="p1">— И шампанское, — мрачно сострил Петя. — Что с ней? Полицейских испугалась?</p><p class="p1">Метнувшийся было на кухню Лубоцкий остановился и продемонстрировал синяки на руках.</p><p class="p1">— Полицейских? Видал, чтобы полицейские хватали несовершеннолетних, били дубинками и кидали в машину?</p><p class="p1">— Ну… — Петя запнулся. — Если подумать… Вы что, драться с ними начали? Или убегали?</p><p class="p1">Лубоцкий покрутил пальцем у виска и ушел на кухню. Зашумела вода в кране.</p><p class="p1">— На самом деле странно, — задумчиво сказала Оля. — Без всякого повода, не на запрещенном митинге, не при сопротивлении… В центре города, на глазах у людей… Избивать двух школьников дубинками? Да их собственное начальство сожрет и выплюнет, никому такие новости не нужны! К тому же перед выборами.</p><p class="p1">— И полицейские какие-то странные, — добавил Петя. — Два амбала и два кощея. Хоть в комедии снимай.</p><p class="p1">Вернулся Лубоцкий с пакетом льда и полотенцем, с которого капала вода. Оля вздохнула, выжала полотенце прямо на пол и положила его Лизе на лоб.</p><p class="p1">— Колись, Лубок, — сказал Петя. — Ты что-то знаешь и понимаешь о происходящем. И ты мне обязан.</p><p class="p1">— За что? — удивился Лубоцкий.</p><p class="p1">— Да хотя бы за этот бардак! — возмутился Петя. — Ты взял запасные ключи из стола? Без спроса? Тебе не кажется, Лубок, что это свинство?</p><p class="p1">— Я — Андрей, — вяло сказал Лубоцкий. Он и впрямь смутился. — И я все уберу. И постираю.</p><p class="p1">— Красава! — Петя понял, что Андрей и впрямь чувствует свою вину, и продолжал давить: — А то, что мы укрываем беглых преступников? За это не обязан?</p><p class="p1">— Хорошо, хорошо. — Лубоцкий взмахнул рукой, словно рубя невидимую стенку. — Как Лизка?</p><p class="p1">— Да все с ней будет в порядке, — успокоила Ольга. Попыталась вынуть из рук девочки блокнот. — Надеюсь. Ей поспать бы надо…</p><p class="p1">Она склонила голову набок и с неожиданным умилением сказала:</p><p class="p1">— Бедная девочка. Совсем малышка. Сопит себе как… как бобренок… Ты давай, рассказывай. Я ее за руку подержу, ей так явно спокойнее.</p><p class="p1">Лубоцкий глубоко вздохнул:</p><p class="p1">— Петя… Оля… В общем, это я во всем виноват. Ну и Лиза… немного. Но она бы ничего, если бы я ее не подначивал… Я виноват.</p><p class="p1">— В чем? — Петя не выдержал и принялся собирать полотенца и вещи с пола, брезгливо поднимая их двумя пальцами.</p><p class="p1">— Во всем! Дело в том, что Лиза… она, ну… — Андрей вздохнул. — Помнишь, Петь, как мы с ней подружились?</p><p class="p1">— Твоя подруга — ты и помни. Вы с первого класса вместе.</p><p class="p1">— Нет, в первом классе я на нее и внимания не обращал, — вздохнул Андрей. — Мне Соня нравилась. И Леля немножко, она красивая. И чуточку Наташка.</p><p class="p1">— Да ты у нас Казанова… — бросила Оля.</p><p class="p1">— А во втором классе я вдруг в Лизу влюбился. Разом. Сижу, смотрю, как она что-то в блокноте калякает. И вдруг понимаю, что не могу глаз отвести. На перемене подошел и говорю: «Давай с тобой дружить!» Лиза глаза опустила и шепчет: «Давай».</p><p class="p1">— Да, вспомнил! — оживился Петя. — Мы же вас дразнили полгода!</p><p class="p1">— Ну вот… она уже потом мне сказала. В пятом классе. — Андрей вздохнул. — Мне никак не удавалось трапецию накачать. Она узнала и говорит: «Я помогу». Взяла блокнот и написала… ну вроде рассказ такой… как я легко накачался… Я и накачался. Быстро.</p><p class="p1">— Она тебя так хорошо мотивирует? — спросила Оля.</p><p class="p1">— Она так пишет, — сказал Андрей шепотом. — У нее дар, понимаете? Если Лизка чего-то хочет или во что-то верит, то ей надо только написать про это. Убедительно и лучше без ошибок. Тогда это происходит. Если бы она жила лет двести назад и писать не умела — никаких чудес бы не происходило.</p><p class="p1">Наступила тишина. Лиза все так же лежала с мокрым полотенцем на лбу, Оля сжимала ее ладонь, Петя смотрел на Андрея.</p><p class="p1">Андрей, похожий на юного греческого бога, по ошибке облаченного в современную одежду, понуро стоял возле дивана.</p><p class="p1">— Шутишь? — спросила Оля. Не дожидаясь ответа, взяла кофейную чашку и двинулась к бару. Остановилась и поставила чашку на стол. — Нет, правда? Все что угодно?</p><p class="p1">— Не всё, — сказал Андрей. — То, что совсем невозможно, не получится. Ты не станешь негром…</p><p class="p1">— Чернокожим, — поправила Оля, поморщившись.</p><p class="p1">— …потому что ты уже белый, — продолжил Андрей. — И если руками взмахнешь, не полетишь, ведь люди не птицы. И то, что уже случилось, назад не вернуть, — про то, что мы убежали от полиции, Лизка написала, и все получилось, но совсем отменить задержание не смогла… А вот если придумать, что женщина повелевает водой и лечит всякие водянки и прыщи, то это хоть и глупо, но получится.</p><p class="p1">— То есть тут дело не в законах физики или здравом смысле, — сказала Оля задумчиво. — А в ее способности поверить…</p><p class="p1">Она вернулась к Лизе и попыталась взять ее блокнот.</p><p class="p1">— Дело не в блокноте, — сказал Андрей. — Дело в ней самой.</p><p class="p1">— Обидно. — Ольга задумалась. — Да. Но мне кажется, у нас появились перспективы!</p></span>
