<p class="p">Глава 13</p>
<p class="p">Платон</p>
<p class="p">Александр Григоренко<a href="ch2.xhtml#id4" class="a">[27]</a></p>
</div><p class="p1">— Как ты попала сюда?</p><p class="p1">Шергин спрашивал, понимая бессмысленность вопроса.</p><p class="p1">Они стояли на плоту, который отдалялся от берега так плавно, будто под ним твердь, а не вода. Шергин осматривал странное одеяние дочери, большое весло в ее руке — нелепость этого подобия парковой статуи Шергина не веселила и не раздражала. Пережитое за этот краткий промежуток времени опустошило его — он даже не ждал, что дочь ответит. Но она ответила.</p><p class="p1">— Если существует дверь, то кто-то должен в нее войти. Так пусть этим «кто-то» буду я.</p><p class="p1">Лицо ее отражало безжизненный плоский свет, губы держали неподвижную полуулыбку, от которой Шергину вдруг стало страшно. Он схватил ее за плечи, встряхнул, крикнул «Аня!», но улыбка не исчезла.</p><p class="p1">— Ты ведь мой отец, — сказала Анна, — так ведь?</p><p class="p1">— Аня, ты что…</p><p class="p1">— Ну и вот. Должна же я знать, что ты задумал на самом деле. Как видишь, тебе все труднее скрывать то, ради чего ты и те, кто за тобой, собрались разворотить целую улицу, согнать с обжитых мест кучу людей, разрушить их жизнь. И мою в том числе — догадываешься об этом?</p><p class="p1">— Я расскажу тебе, — прошептал Шергин, — расскажу все! Самой первой. Обязательно. Но… потом, чуть позже. Поверь мне, деточка моя.</p><p class="p1">— Ха-ха-ха, — проговорила деточка, — так я и думала. Вы все так… И мама тоже было начала рассказывать, а потом — хлоп, и рот на замок, продолжение в следующей серии…</p><p class="p1">— Что?! Что она сказала?</p><p class="p1">— В Новой Москве строить выгоднее…</p><p class="p1">— Много она понимает, твоя мама!</p><p class="p1">— Догадываюсь, что больше тебя, — улыбка стала издевательской, — она ведь гидролог. И на самом деле это была ее идея.</p><p class="p1">— Думай, что говоришь, идиотка сопливая!</p><p class="p1">Шергин никогда не называл дочь обидными словами — ранее она не давала повода.</p><p class="p1">Гнев разбудил Шергина. В жизни ему приходилось переживать всякое, но он знал за собой одно спасительное свойство: когда обстоятельства припирали его к стене, вдруг отключался страх, тоска, мысли, в душе на мгновение водворялась абсолютная тишина, в которой начинали загораться команды, как на аварийном табло. Сейчас табло приказывало: не смотреть по сторонам, не думать, идти обратно, на поверхность. Немедленно. Любой ценой.</p><p class="p1">— Дай-ка! — Шергин схватился за весло в руках дочери — дочь не отдавала; Шергин рванул с силой — ни девушка, ни весло даже не шелохнулись, будто перед ним и впрямь была статуя. Коротким замахом Шергин влепил дочери пощечину — бейсболка упала в реку, улыбка осталась та же.</p><p class="p1">— Очнись!</p><p class="p1">Аня молчала.</p><p class="p1">— Не надо бить детей…</p><p class="p1">Голос, мягкий и усталый, возник за спиной Шергина, и появившееся табло со спасительными командами мгновенно отключилось — возвращались непонятные звуки, мысли, предчувствия.</p><p class="p1">За его спиной, на краешке плота, сидел, скрестив ноги, старик — плешивый, в рабочем комбинезоне — тот самый, которого он видел у костра и принял за призрак, галлюцинацию… Шергин не заметил, как старик попал на плот, находившийся уже на середине реки. Старик улыбался, его знакомая всему миру улыбочка отражалась на лице Анны; на него, а не на отца она смотрела все это время.</p><p class="p1">— Не надо бить детей, — повторил старик. — Накличете себе беспокойную старость. Такую, как у меня. Зачем вам это? Присаживайтесь…</p><p class="p1">Гостеприимным жестом он указал на край плота, из которого, разрывая камышовые связки, вырос изящный золотой табурет.</p><p class="p1">— И вы, Анечка, тоже… бедная вы моя. Кстати, — он оживился, обращаясь к Шергину, — своих я ни разу не шлепнул. А оно вон как вышло… Ну да ладно, не привыкать.</p><p class="p1">— В каком смысле «не привыкать»? — спросил оторопевший Шергин.</p><p class="p1">— Практически в прямом, — в голосе старика появилась та глухая нотка, которую знали как предвестие большого разноса. — Меня убивают регулярно. По меньшей мере в розовых мечтах своих. Но иногда пробуют и по-настоящему. Разве не знаете? В этом нет ничего удивительного для людей моей профессии, особенно в России. Еще менее удивительно, что делают это самые близкие: ведь им даже тянуться не надо. И все равно — обидно.</p><p class="p1">— Подождите, — пробормотал Шергин, — а в этот раз…</p><p class="p1">Но старик не дал ему закончить.</p><p class="p1">— Часто себя спрашиваю и в этот раз спрошу: Платон Платонович, соколик, ну зачем тебе все это? — Он говорил улыбаясь, нараспев. — Шел бы на покой. Но покоя не будет. Потому что пугать людей — слишком дорого. Задобрить — невозможно. Человек неисправим, потому что ненасытен. Как старики говорили, червь капусту гложе, а сам прежде того пропадае…</p><p class="p1">Он встал — будто взлетел, так, что колечки на поясе звякнули, уверенными движениями начал массировать колени. Шергин заметил, что прежней детской слабости, понурости в его фигуре уже нет, голос наливался силой.</p><p class="p1">— И кстати, Павел Николаевич, — сказал он, не отрываясь от своего занятия, — в свете последних событий ваше участие в проекте под вопросом. Сам проект останется, а вы — вряд ли. Надеюсь, не надо объяснять — почему?</p><p class="p1">— Вешать будут? — сипло промолвил Шергин.</p><p class="p1">— Я вас умоляю. — Платон рассмеялся. — Вешать было целесообразно лет сто назад или хотя бы в девяностые: тогда, чтобы напугать людей, нужны были радикальные средства. А сейчас достаточно отнять любимые игрушки или даже пригрозить, что отнимут, — и будут мучиться, как на дыбе. И все подпишут. Если не сбегут, конечно. Вы это и без меня прекрасно знаете. Так что давайте хотя бы здесь не будем об этом.</p><p class="p1">— А где это «здесь»? — внезапно подала голос Анна.</p><p class="p1">— Прекрасный вопрос, Анечка, все ждал, когда он прозвучит. Сами-то как думаете?</p><p class="p1">— Портал в нижний мир. В царство мертвых.</p><p class="p1">— Можно и так сказать. Только к мертвым — вход немного в другом месте, потом узнаете. Здесь вообще много чего интересного. А то, что вы сейчас видите, проще назвать изнанкой. Ничего настоящего — ни леса, ни реки, ни неба… И вместе с тем это самое что ни на есть настоящее, это образы вещей, о которых догадывался мой древнегреческий тезка… Изнанка не так красива, как вещь, но она правдива, она показывает, как что сделано. А самая главная особенность здешних мест — они рассказывают о людях важные вещи. Очень, я бы сказал, интимные. Главное, знать, где спросить. Вот здесь притормозите, Анечка.</p><p class="p1">Анна опустила весло, плот замер, и старик показал рукой в сторону ложбины, устланной серым туманом.</p><p class="p1">— Смотрите туда, — сказал он Шергину. — Не отвлекаться. Не оборачиваться.</p><p class="p1">Шергин подчинился и стоял неподвижно несколько минут. Он увидел: в серой кисее проступают очертания фигуры, они становятся все яснее, наконец на берег вышел человек — немецкий солдат, фашист — засученные рукава, каска, шмайссер… Немец шел по берегу, потом по воде. Шергин узнал его и едва не закричал.</p><p class="p1">Первый и единственный раз в жизни он видел этого немца лет в пять-шесть: ему снился бой, такой, как в недавнем кино, в пучеглазом телевизоре «Радуга»… Ему снился бой, враги убили всех наших, бой стих, по изрытой рыжей земле стелился дым, враги уходили, но этот немец вдруг заметил его, Шергина Пашу, и пошел к нему — вот так, как шел сейчас, — приблизился настолько, что он увидел огромную пуговицу, а на ней страшную птицу со свастикой в когтях. Немец снял автомат, приставил к его, Пашкиному, горлу… Пашка заорал и проснулся.</p><p class="p1">С тех пор немец не возвращался, но Шергин помнил его, помнил иногда яснее, чем многих живых. Не боялся немца, посмеивался, иногда рассказывал о нем друзьям, но — помнил.</p><p class="p1">— Ну как? Если здесь открываются кошмары вашего розового периода, то и все остальное не такая уж тайна. — Старик пристально глядел на Шергина, видимо, удовлетворенный его оторопью, потом обернулся в сторону солдата и крикнул:</p><p class="p1">— Свободен!</p><p class="p1">Немец тут же развернулся и исчез в туманной ложбине.</p><p class="p1">— Поехали. — Старик повернулся к Анне.</p><p class="p1">— А мне так — можно? — спросила она, опуская весло в неподвижную воду.</p><p class="p1">— Зачем? В твоем прошлом пока ничего особенного нет.</p><p class="p1">— Почему это нет?</p><p class="p1">— Потому что ты еще ребенок, и оставайся им подольше.</p><p class="p1">— Давайте я сама буду решать, кем мне оставаться…</p><p class="p1">Шергин оборвал их:</p><p class="p1">— Вы живой или нет?</p><p class="p1">Старик будто ждал этого вопроса — встрепенулся весь.</p><p class="p1">— А тебе самому как больше нравится? <em>Nabelküsser ist tod, oder nicht?</em><a href="ch2.xhtml#id3" class="a">[28]</a> Отвечай!</p><p class="p1">— Мне нужен факт, а не…</p><p class="p1">— Факт! — восторженно закричал старик. — Факт — это то, во что ты веришь! А тебе верить уже нечем: верилка сломалась. Давно, еще в комсомольской юности. Когда предлагал всем классом написать письмо Рейгану, чтобы убрал ракеты из Германии, и потом сам отнес его на помойку… Один ветер подул — ты в оппозицию записался, другой — в патриоты. Ты, Павлик, ни во что не веришь, кроме ситуации. А она — девушка кокетливая. И за кого тебе теперь быть, ты не знаешь, потому что не веришь ни в людей, ни в Бога, ни в страну… Во-он… — Платон лукаво прищурился. — Вижу, как в черепке твоем циферки забегали, будто тараканы на пожаре. Павлик ты и есть… павлик.</p><p class="p1">— Замолчи, — прошипел Шергин, — замолчи, гадина. Ты сам такой, я знаю…</p><p class="p1">— Там, — Платон показал пальцем вверх, — ты решился бы мне так сказать? В лицо?</p><p class="p1">И, не дожидаясь ответа, старик начал тихонечко смеяться — мелкими плевками смех летел в лицо Шергина.</p><p class="p1">Платон, задыхаясь, силился еще что-то сказать, но не смог: беззвучно описав дугу, на его голову обрушилось дюралевое весло. Сложившись, как брошенная марионетка, старик скатился в воду, не оставив ни волны, ни кругов.</p><p class="p1">— Не переношу, когда над тобой издеваются, — гордо сказала Аня. И прежде чем Шергин успел раскрыть рот, продолжила: — Надоело — <em>tod, oder nicht</em>… А так — у нас есть хоть какая-то уверенность.</p><p class="p1">Они глядели на гладкую пленку воды, на которой не было ничего, кроме отражений и того непонятного предмета цилиндрической формы, плывшего в десятке метров от плота. Из реки показалась маленькая рука, не спеша взяла предмет и увлекла под воду. Тут же река начала мелеть, как ванна, из которой вынули пробку, и пространство накренилось, уходя горизонтом в бездну, и река превратилась в горный поток, узкий и злой, и понесла плот с такой скоростью, что оголенное русло и заросли на берегах слились в одну серую ленту.</p><p class="subtitle">* * *</p><p class="p1">У всех загадочных явлений — снежного человека, лохнесского чудовища, летающих тарелок, левитирующих аскетов и прочего — есть одно общее свойство. Видят их регулярно, однако у очевидцев: а) как назло, нет под рукой никакой фиксирующей аппаратуры; б) аппаратура есть, но в тот самый момент она срабатывает настолько гадко, что выдает какие-то размытые силуэты и пятна. В обоих случаях очевидцы просят поверить им на слово. И так продолжается без малого лет сто.</p><p class="p1">Цепь досадных недоразумений прервалась на свадебном фотографе Эдуарде Коридорове. В тот день, ясный, не по-осеннему теплый, он снимал бракосочетание потомственного газоэлектросварщика Александра Фердинандовича Гергенрейдера и юной Анжелики, дочери владельца малого предприятия по производству мясных полуфабрикатов «Бабушкин-steak» Николая Федоровича, соответственно, Бабушкина.</p><p class="p1">Свадьба была многолюдной, уже хорошо подгулявшей, отчего Коридорову стоило трудов собрать всех для общего снимка на фоне целебного источника, слывшего достопримечательностью не только Денисьевского сельсовета, но и всего района. Источник вытекал из большой, увенчанной крышей с кудрявыми наличниками трубы, которая торчала из обрыва на высоте более полутора метров. Эдуард не надеялся, что гости будут ждать «птичку», поэтому выставил на камере высшую скорость съемки — пять кадров в секунду.</p><p class="p1">Снимая, увидел… Из трубы, будто из пушки, только без звука, вылетели два тела, большое и поменьше, и исчезли в зарослях тальника. (Позднее, отсматривая снятое, Коридоров убедился: феномен запечатлен от начала до конца и в идеальном качестве.) Свадьба, стоявшая к феномену тылом, ничего не видела, она торопилась, начала шумно рассаживаться по машинам, и только в последний момент кто-то под общий хохот крикнул вслед фотографу, рысью устремившемуся к тальниковым зарослям: «Калидор! Давай здесь, все свои».</p><p class="p1">То, что Эдуард увидел в кустах, поразило его не меньше, чем сам полет: мужчина и девушка спали. Светлая головка девушки лежала на откинутой руке мужчины. Инстинктивно фотограф сделал несколько кадров и шагнул вглубь зарослей…</p><p class="p1">Но свадьба не хотела ждать, бешено сигналила, выкрикивая его имя… Бабушкин платил щедро, у Коридорова три месяца не было заказов… Сложив дрожащие персты, он перекрестил спящих и зарысил обратно, не обращая внимания на камеру, которая больно била по пузу, а оно у Коридорова было большое, как и все прочее.</p><p class="p1">Весь остаток дня Эдуард был сосредоточенно молчалив.</p><p class="subtitle">* * *</p><p class="p1">Когда у папы появлялось несколько свободных дней, он усаживал Анечку рядом с собой на диван и, загадочно улыбаясь, спрашивал: «Ну что, поедем куда-нибудь?» Анечка догадывалась, что это «куда-нибудь» находится в Сен-Тропе, Париже, в Дублине или Чефалу, где у Шергиных была вилла, небольшая, но собственная. Впрочем, и многие другие города мира были ей хорошо знакомы; некоторые — настолько, что она могла узнать их с завязанными глазами: по воздуху, звукам и запахам. Но здесь воздух, звуки и запахи были такие, какие она не встречала никогда и нигде, и Анечке вдруг показалось, что она на другой планете, куда более далекой, чем то подземное царство, память о котором была стерта внезапным сном и восстанавливалась медленно, как очень далекое воспоминание. Они шли по пустынному шоссе, сердце ее колотилось при виде горизонта, испещренного странными строениями, а когда перед ней возник белый дорожный знак с чудовищной надписью «Денисьево», ноги обмякли, Анечка вцепилась в рукав отцовского плаща и заплакала:</p><p class="p1">— Папочка, где мы… папочка, забери меня…</p><p class="p1">Шергин гладил ее волосы и повторял осипшим голосом:</p><p class="p1">— Тихо, деточка… тихо… все решим.</p><p class="p1">Содержимое горизонта ему, в отличие от дочери, было знакомо — хотя бы по студенческой юности — вот ферма, должно быть, заброшенная, вот дом рядом с ней… Однако все остальное оставалось тягостной загадкой. Но пропавшее табло появилось вновь и засветилось одним зеленым словом «вперед», и это немного успокоило его.</p><p class="p1">На горизонте мерцало несколько огоньков, возник еще один — он приближался…</p><p class="p1">Свет излучала треснувшая фара скутера «Ямаха», все изработанное, избитое тело которого стонало под тяжестью туши фотографа Коридорова. Дождавшись, пока свадьба разделится на старую и молодую половины — молодая уйдет веселиться дальше, старая останется пить чай, обсуждать виды на урожай и ругать начальство — и снимать станет нечего, Эдуард оседлал скутер и рванул домой. Жил он совсем рядом, в райцентре, то есть в тридцати пяти километрах от Денисьева, поэтому часа через два снимки феномена должны появиться в Сети, и у сельского свадебного фотографа начнется совсем другая жизнь… Но в дороге мысли Коридорова смешались: он понимал, что феномен весь в его власти, никто не может опередить его, и мир не перевернется, если удивится чуть позже… К тому же феномен потребует объяснений… И еще… там, в тальнике, живые люди — так спокойно и глубоко дышат только живые и спящие… Может, они переломались? Может, их нашел кто-то другой? А может…</p><p class="p1">Коридоров развернулся на полпути, угодив колесом в глубокую лужу, и вот теперь он стоял перед ними. Вид человека незнакомого, но несомненно живого и совсем нестрашного, его первые слова — «вот они, красавцы» — не только успокоили Аню: она обрадовалась, как радуется заблудившийся в лесу, услышав далекий человеческий голос.</p><p class="p1">Разговор ее отца с Эдуардом — он сразу представился — походил на беседу здорового с душевнобольным. Здоровым, разумеется, был бородатый толстяк. Шергин долго объяснял ему, кто он, перечисляя все свои должности, рассказывал о зданиях, которые строил, а толстяк слушал его с сострадательным вниманием и терпением — так вежливый человек выслушивает тихого идиота. Документов у них не было, телефонов тоже, одежда успела просохнуть, но выгладиться не успела…</p><p class="p1">— Где мы? — спросил Шергин.</p><p class="p1">Толстяк с тем же скорбным выражением на лице продиктовал регион, район — местность находилась в двух тысячах километров от МКАД.</p><p class="p1">Потом он достал из кофра камеру и показал Шергину то, что снял, и долго, взыскующе глядел на него. Шергин замолк и будто оцепенел, сказал только:</p><p class="p1">— Ничего не помню. Ничего.</p><p class="p1">— М-да, — вздохнул фотограф, спрятал камеру в кофр, шумно принюхался — вроде того… тверёзые.</p><p class="p1">Внутри у Шергина загорелось табло: «Ты телефон-то у него попроси, эх…» — и Шергин даже подпрыгнул, спросил телефон, сказал — один звонок, и все прояснится, все уладится.</p><p class="p1">— Долматов! — Он крикнул так, что и Аня, и толстяк вздрогнули. — Стоп, а где Долматов? Лиза, это вы… — наступила пауза, и Аня увидела: лицо отца превращается в некое подобие японской страшной маски.</p><p class="p1">— Кто генеральный? Долматов гене… Вы там свихнулись все? Какой совет директоров? Как он мог что-то решить без меня?! Вы там свихнулись все?! Долматова мне! Пулей!</p><p class="p1">Он что-то еще кричал, но телефон отвечал короткими гудками. Силы оставили Шергина, телефон выскользнул из его ладони и разбился бы — Аня подхватила. Заплетающимися ногами Шергин переместился на обочину, он стоял, схватившись за голову, и повторял монотонно:</p><p class="p1">— Твари… твари продажные… что же за день такой, господи… такой длинный день.</p><p class="p1">— Можно мне? — спросила Аня фотографа.</p><p class="p1">— Попробуй.</p><p class="p1">Она набрала номер Пети Безносова — единственный, который знала наизусть, — не по большой дружбе, а из-за самих цифр — 999 888 77 66.</p><p class="p1">— Привет…</p><p class="p1">— Тебя ищут! Ты где? — промямлила трубка.</p><p class="p1">— <em>No time to explain, buddy</em><a href="ch2.xhtml#id2" class="a">[29]</a>. — Аня старалась говорить небрежно, даже развязно, но голос заметно подрагивал. — Скажи лучше, ты еще не все свое наследство промотал на вечеринках?</p><p class="p1">— Не все.</p><p class="p1">— Мне срочно нужны деньги.</p><p class="p1">Трубка помолчала и произнесла со вздохом:</p><p class="p1">— Нетрудно было догадаться… Зачем?</p><p class="p1">— На билеты.</p><p class="p1">— Какие?</p><p class="p1">— Чтобы добраться до Москвы…</p><p class="p1">— Какой Москвы? Ты вообще здорова? Прости, Шерга, некогда мне твои глупости выслушивать. Встретимся, все расскажешь.</p><p class="p1">— Послушай! — закричала Аня. — Ты можешь поверить человеку? Просто так! Один раз! Без объяснений! А?</p><p class="p1">Трубка посопела и спросила:</p><p class="p1">— Сколько надо?</p><p class="p1">Аня посмотрела на фотографа — он все слышал.</p><p class="p1">— Если без документов, на перекладных — много. Тысяч пятьдесят. — Пятьдесят сможешь?</p><p class="p1">— Смогу. Тебе на айфон кинуть?</p><p class="p1">— Нет айфона, Петя, нет его… — и фотографу, умоляюще: — Куда?</p><p class="p1">У Коридорова была при себе банковская карточка, он продиктовал номер, и минут через пять тренькнула эсэмэска. Она сообщала, что деньги поступили на счет и что мир не так уж безнадежен.</p><p class="p1">Правда, воспользоваться этой удачей можно было не сразу… Банкомат, кассы, автовокзал — только в райцентре. Уже стемнело, и Коридоров предложил пойти на свадьбу.</p><p class="p1">— Без приглашения? — мрачно спросил Шергин.</p><p class="p1">— У Федорыча для гостей отдельный дом. Скажу, что ты мой армейский кореш, приехал вот с дочерью. В армии-то служил?</p><p class="p1">Легенда пригодилась, считай, тут же — взвизгнув тормозами, остановилась потрепанная машина с правым рулем. Из окна показался полицейский, похожий на итальянского мафиози, — чернявый, тоненькие усики, пробор. Высунул руку и поздоровался с Коридоровым.</p><p class="p1">— Чё шатаемся? Эти — кто? — строго спросил он.</p><p class="p1">— Кореш из Москвы. С дочкой вот…</p><p class="p1">— Документы есть?</p><p class="p1">— Сурен, поимей совесть. Люди с дороги, подышать вышли.</p><p class="p1">— Дышите, разрешаю. — Полицейский оскалился. — Вы это… потише там гуляйте. А то скажут, что в Денисьево притон оппозиции. Чрезвычайное положение отмечают.</p><p class="p1">— Слушаюсь. — Коридоров отдал честь. — На свадьбу-то заглянешь?</p><p class="p1">— Был уже, — крикнул полицейский, и по запаху Коридоров понял: действительно был.</p><p class="p1">— Сурен Сысоенко, участковый наш. Мужик суровый, но… понимающий, — пояснил фотограф, когда машина скрылась.</p><p class="p1">— Чрезвычайное положение? — спросил Шергин. — Когда… Из-за чего?</p><p class="p1">— Вот те на! Как раз тебя хотел спросить, что там у вас в Москве. В новостях что говорят — толком не разберешь.</p><p class="p1">— А что говорят?</p><p class="p1">— Здрасьте. Платоныч заболел. Одни говорят, что не в состоянии исполнять обязанности, другие — что в состоянии, только надо подождать. Ну и ввели чепэ на всякий случай. Сурин, или как там его, ввел… Я с этой свадьбой третий день в интернет не залазил. — Фотограф громко шмыгнул носом и бодро провозгласил: — Но даже если чепэ — не жениться, что ли? — Он хлопнул ручищами по рулю скутера. — Двинулись?</p><p class="p1">Так они и шли втроем. Фотограф, обливаясь потом, катил «Ямаху», которая изнывала от блаженства, что не она везет Коридорова, а он ее. Коридоров тоже изнывал — от сладостного предвкушения тайны, которую он выпытает у «инопланетян», всецело находящихся в его власти. Рядом шагал Шергин, перед его внутренним взором светилась зеленая надпись: «Любой ценой забрать снимки у этого…» А впереди шествовала Анечка, она хоть и помалкивала, но от былого ужаса не осталось и следа. Ужас сменился какой-то странной веселостью, от которой под кожей покалывало.</p><p class="p1">И, как оказалось, не зря покалывало. Взрослые ведь бывают иногда хуже детей, которых постоянно тянет в лужу…</p><p class="subtitle">* * *</p><p class="p1">— Давай их сюда!</p><p class="p1">Николай Федорович Бабушкин хлопнул по столу так, что с вершины свадебного торта, к которому почему-то никто не притронулся, рухнули два розовых сердца, и Коридоров, пришедший доложить о новых гостях, побежал за ними во флигель.</p><p class="p1">Народу за столом было немного, и, как сразу отметила Аня, все старше папы. Присутствующие хором начали их угощать, папу навязчиво уговаривали выпить, и папа, надо признать… И не раз.</p><p class="p1">Три тети с круглыми лицами предлагали Ане разные блюда, поминутно и наперебой интересуясь, почему она так плохо ест, хотя Аня лопала за обе щеки, а две тети с лицами вытянутыми говорили им: «Чего пристали к ребенку, он и так с дороги еле мизюкает». Одновременно эти две тонкие тети требовали у папы рассказать, «что у вас там в Москве творится», а три тети круглые возражали им: «Дайте вы человеку поесть». Аня была уже сыта, а тети продолжали свое, и Ане захотелось процитировать им что-нибудь из Декларации прав и свобод…</p><p class="p1">Но тут она увидела вот что: тот накрытый скатертью белый столик с массивными лакированными ножками, стоявший в дальнем углу большой «залы», — вовсе не столик. Это миниатюрный рояль, не исключено, что <em>Blüthner</em> или <em>Petrof,</em> — о таком она мечтала, когда училась в музыкальной школе, но почему-то папа, который обычно ни в чем ей не отказывал, так и не сподобился его купить, хотя обещал.</p><p class="p1">— Вы позволите посмотреть? — спросила она у хозяина, указывая рукой в угол.</p><p class="p1">— А что — умеешь? — встрепенулся Николай Федорович, быстро подошел к роялю, снял с него скатерть, ею же рояль и протер.</p><p class="p1">Пока Аня вылезала из-за стола, — а это оказалось делом небыстрым, поскольку гости сидели на лавках, — одна из круглых теть отбарабанила монолог (видимо, не раз до того произнесенный), смысл которого заключался в том, что Николай Федорович купил совершенно ненужную вещь по цене «круйзера» и потому он «не при людях будет сказано, кто такой».</p><p class="p1">Владелец «Бабушкин-steak» выступил с ответным и так же хорошо отрепетированным монологом о том, что рояль — долгосрочная инвестиция в будущее молодой семьи Гергенрейдеров-Бабушкиных и фьючерсы подобного уровня непостижимы для тех, у кого «ливер вместо мозгов».</p><p class="p1">Неизвестно, чем бы все закончилось, если бы Аня не заиграла…</p><p class="p1">Сначала был регтайм, исполненный в тишине, взорвавшейся оглушительными хлопками огромных ручищ хозяина. Гости оживились. Потом был ноктюрн Шопена, и аплодировали уже все, потом одна из теть сказала: «А что-нибудь сыграй, чтобы нам попеть».</p><p class="p1">— Что именно? — поинтересовалась Аня, довольная тем, что «руки помнят».</p><p class="p1">Но хозяин пресек разговор, заявил, что «в приличном доме должна играть только приличная музыка» — и это еще не все! — достал из кармана брюк банкноту, положил на рояль и провозгласил:</p><p class="p1">— Талант обязан вознаграждаться!</p><p class="p1">Аня играла и играла — с наслаждением, до изнеможения. Когда концерт был окончен, она увидела, что среди публики, истекавшей слезами, нет ни папы, ни Коридорова.</p><p class="p1">Она нашла их во флигеле, куда отправилась спать.</p><p class="p1">Павел Шергин и Эдуард Коридоров, красные от напряжения, сидели за столиком, на котором стояли камера и бутылка водки, держали друг друга за грудки и урчали, как два кота перед поединком.</p><p class="p1">— Немедленно отпустите папу!</p><p class="p1">Аня сказала это так громко и властно, что Коридоров тут же послушался.</p><p class="p1">— Деньги на вашей карте можете оставить себе, — продолжила она тем же тоном. — Считайте их своим гонораром за молчание.</p><p class="p1">Обернулась к отцу:</p><p class="p1">— Оставь его. У нас есть теперь на что доехать.</p><p class="p1">И показала пухлую разноцветную пачку.</p><p class="p1">Дома их не было почти неделю — даже час, проведенный в изнанке мира, на лицевой стороне шел за три дня. Еще двое суток они добирались, пересаживаясь с автобусов на электрички и наоборот. Шергин всю дорогу молчал, а если и говорил, то лишь по необходимости. Вместо зеленых команд перед ним время от времени возникало печальное лицо Платона — он тоже молчал, только сказал тихо, уже на подступах к Москве: «Да, Паша, да… Тяжко есть иго на сынех Адамлих» — и исчез.</p><p class="p1">Ане хотелось о многом спросить отца, но еще сильнее было желание смотреть в окно, за которым протекала жизнь, совсем незнакомая ей…</p></span>
