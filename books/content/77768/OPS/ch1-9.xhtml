<p class="p">Глава 6</p>
<p class="p">Марки и маски</p>
<p class="p">Алексей Сальников<a href="ch2.xhtml#id25" class="a">[16]</a></p>
</div><p class="p1">Мусор на месте снесенной водокачки стремительно расчистили, само место огородили красными и белыми пластиковыми секциями, чем-то похожими на гигантские детали лего. По пути в школу и домой Лубоцкий то и дело заглядывал в яму, в которой имелось еще одно углубление, где кирпичную кладку убрали, предвкушая, возможно, подземный ход или сундук с сокровищем. Однажды вечером Андрей даже спустился, чтобы посмотреть, что там, хотя все и так знал из новостей. Остатки печки, метла, угольная пыль на полу — вот и все добро, что там обнаружилось. Андрей чувствовал неловкость, когда вспоминал, как надеялся на совсем другое — чтобы там была находка (что за находка, Андрей не мог придумать), которая бы помешала стройке.</p><p class="p1">Он вспоминал, как телеведущий, практически неотличимый от других телеведущих местного канала, наверняка неузнаваемый в толпе, когда оказывался вне экрана, с ленивым разочарованием в голосе рассказывал, как ломали кладку. Лубоцкий догадался не соваться к телекамере, но затем, когда сюжет попал на ютьюб, пересмотрел его несколько раз, пытаясь зачем-то различить свое присутствие за кадром. Камера почти повторяла взгляд тогдашнего Андрея — оглядывала шевеление немногочисленных любопытствующих и мерные взблески металлического лома, которым охаживали кладку позади телекорреспондента.</p><p class="p1">Лубоцкий не знал твердо, но догадывался, что реальность соткана все же не из топорных ходов, что на любое человеческое действие у жизни имеется какой-то непредсказуемый ответ. Иначе каждый выпускник института тут же шел бы на любимую работу, где до старости к своему удовольствию продвигался по карьерной лестнице, а любой актер, следуя рецепту предыдущих актерских поколений, становился бы звездой театра или кино. Это был странный логический вывод, который, похоже, отчасти опирался на все те случаи, когда Андрей был дошкольником, а кто-нибудь из родителей приносил домой съедобную ерунду, да те же «киндеры», и сообщал, что это Андрюше передал зайчик, встреченный по дороге. В любом случае эта неудача с найденной при сносе временно загадочной стенкой в пустой каморке некоторым образом взбодрила Андрея. Жизнь как бы сказала ему: «Вот сейчас если сдашься, больше ничего не будет, а если не сдашься — у меня есть новые сюрпризы». Чтобы объяснить эту мысль не столько другим, сколько самому себе, он решил собрать всех «переселенцев» из класса и поговорить об этом.</p><p class="p1">Решено было встретиться в кофейне неподалеку от школы, но у Лизы внезапно обнаружились дела, Батайцевы же слились другим, более доходчивым способом — просто послали Лубоцкого подальше и никак это не объяснили, только чуть позже закинули в группу свои селфи из кинотеатра.</p><p class="p1">Слегка застопорились у дверей кофейного заведения, поскольку Федя, не отрываясь от телефона, сделал несколько попыток стрельнуть сигарету у прохожих. Но те на глаз определяли его возраст и отмахивались.</p><p class="p1">— Ты бы хоть вейпил, что ли, — с досадой сказал ему Андрей, но Федор отмахнулся от него так же, как от самого Федора отмахивались прохожие.</p><p class="p1">Наконец Феде улыбнулась удача: некий желтый и худой гражданин, похожий на ходячую агитку антитабачной кампании, в желтых от никотина пальцах протянул Дорохову полупустую открытую пачку.</p><p class="p1">— Такое брать, — снова не удержался Лубоцкий, как только щедрый мужчина удалился на некоторое расстояние, — это ж тубер ходячий, капец, он туда руками лазил, а ты вон суешь.</p><p class="p1">— Ой, иди лесом, — отвечал Федя, не выпуская дымящейся сигареты изо рта. — На Анькиных тусовках неизвестно какими руками что приносят, и ничего, никаких вопросов, хотя в доме совсем чужие люди, можно сказать, и неизвестно, как они к Аньке относятся, к ее матери и к ее отцу, к ее гостям. Возможно, что вовсе без любви.</p><p class="p1">Все трое одновременно вспомнили «Бойцовский клуб» и зачем-то переглянулись.</p><p class="p1">— А вот забавно, — сказал Федя уже у стойки, — почему в кофейнях всегда тихо и колокольчик звенит у входа, а в пабах всегда ор, и вообще, в фастфудах музыка на всю катушку, а в кофейнях — нет.</p><p class="p1">— Можно подумать, ты был в пабах, — поддел Лубоцкий.</p><p class="p1">— Можно подумать — нет, — поддел его в ответ Федя.</p><p class="p1">— Давай еще расскажи, как ты со своими друзьями — гиками, поклонниками шутеров и <em>RPG</em> — завалился в пивную и драку устроил с футбольными фанатами.</p><p class="p1">Дорохов досадливо крякнул, но не на сарказм Лубоцкого, а на то, что произошло на экране смартфона. Однако перескочил на другую тему:</p><p class="p1">— А еще удивляют эти люди с ноутами, которые задумчиво сидят, как бы работают над чем-то, но ни разу не видел, чтобы кто-то напряженно что-то писал, только в экран пялятся по нескольку часов, и всё. Я как-то раз из интереса сел за спиной одного такого кадра, так он просто «Вконтакте» листал, но с видом, будто занят очень важным делом.</p><p class="p1">— Может, и важным.</p><p class="p1">— Кажется, что важным, потому что у каждого такого шарф на шее в виде петли, словно он сейчас пойдет и руки на себя наложит, — совершенно не задумываясь, сразу же отбрехался Федя.</p><p class="p1">— Я понял, где мы ошиблись, когда решили до Шергина достучаться, — начал Лубоцкий после некоторого затишья в разговоре, вызванного поиском свободного места среди множества пустых столов, что было еще сложнее, чем если бы кофейня была забита до отказа.</p><p class="p1">Федор хмыкнул, да так сильно, что почти дернулся от своего смешка:</p><p class="p1">— Где ошиблись, где ошиблись. Где родились, там и ошиблись.</p><p class="p1">— Вот именно, — вцепился в него Лубоцкий, ободренный согласием с тем, что он еще даже не произнес. — Мы исходили из того, что ему не все равно. Как исходим из того, что между взрослыми там, наверху, есть какая-то огромная разница. Что, грубо говоря, пропасть между главными оппозиционерами и теми, у кого сейчас власть, не такая широкая, как между нами и главными оппозиционерами. А на самом деле, при всем моем английском и других побрякушках, мне, как бы я ни хотел, ближе даже вот тот утырок, который тебе сигарету дал, чем любой представитель оппозиционной элиты. От меня любой представитель любой из элит далек астрономически, я не могу у него сигарету стрельнуть, ведь так?</p><p class="p1">Петя заметно покраснел, а Дорохов заметил:</p><p class="p1">— Ничего себе тебя перековало.</p><p class="p1">— Просто я не вижу никого в рубище, знаешь, — сказал Лубоцкий. — Это как моя мама говорила, когда детство вспоминала, что очень завидовала семье одноклассника, родители которого могли ему джинсы купить по мере надобности, не выкраивая ничего из бюджета, а просто шли и покупали, какие нужно, чуть ли не в тот же день, когда они становились нужны. И тут так же. У них с обеих сторон (понятно, что с провластной еще проще) все замечательно. Пока какой-нибудь рядовой школотрон у репетиторов произношение отрабатывает, у них уже языковая практика за границей, а кто-то там вообще растет с рождения. И даже если случится вот это вот, с баррикадами, флагами и очередным триумфом воли, они же друг с другом давно знакомы, эти ребята, и дети их, скорее всего, друзья — не разлей вода. Это не их из универа попрут в случае чего, так что никто потом и не вспомнит, а кого-нибудь из нас, потому что наши предки уже отпрыгались, их статус давно «экс», причем у многих. Мы сейчас в окружении этих переулков, как помещики, которых уже купцы сместили, чего-то еще трепыхаемся, а что Васин батя, крутой адвокат, что шергинский — известно, что они могут своим детям сказать.</p><p class="p1">— И что же они могут им сказать? — поинтересовался Федя.</p><p class="p1">— Один скажет, если самого Васи это касаться не будет, про закон, который суров, но это закон. Другой заметит, что, в конце концов, никто жилья не лишается, что это просто прихоть — желание жить в определенном районе, что родители каждого из нас могли также захотеть переехать, и мы не стали бы спорить, вот и все. Ну и еще какую-нибудь телегу задвинул бы про статус, про то, что если сможет заработать, то не все будет тратить на себя, а часть на благотворительность пойдет в любом случае. А от этого польза не только нам, нескольким, а десяткам других детей и взрослых. Что-то такое, в общем. А доведись нам с ним лично пересечься вот сейчас, он бы нашим эгоизмом нам бы в нос и натыкал, так что мы бы еще и краснели, что родились не в то время и не в том месте.</p><p class="p1">— И что делать тогда? — спросил Федор.</p><p class="p1">— Четыре варианта действий есть, но один от нас почти не зависит, — сказал Лубоцкий и увидел, как у Дорохова дернулась от любопытства бровь.</p><p class="p1">— Первый вариант — террор, — объяснил Лубоцкий, и оба его товарища расслабленно развалились на стульях, переживая волну скепсиса.</p><p class="p1">— Ну да, да, — заторопился Лубоцкий. — Конечно, бессмысленно это даже и обсуждать. Тем более мы больше гуманитарии, чем химики, если брать самый примитивный вид террора, и если даже начать гуглить это все, то гораздо быстрее, чем планируем, переедем на новое место, только это будет далеко не квартира в новом районе, поэтому, конечно, этот вариант отпадает.</p><p class="p1">— Второй вариант — шантаж, — продолжил Лубоцкий и увидел, как на лицах друзей буквально вспыхивает бегущая строка: «Да ты издеваешься, Лубок». — Понятно, что и это отпадает категорически, — отмел Андрей возможные возражения. — Только если у кого-нибудь из нас нет чего на Шергу-старшего, а понятно, что нет, иначе уже давно названивали бы ему с левой симки и что-нибудь там предлагали. И если уж брать две чаши весов, на одной из которых что-то, какой-то скелет в шкафу, а на другой — сумма вот этой застройки, то, думаю, это «что-то» должно быть на самом деле запредельным. Такой жесткий лютый трешак, потому что в ином случае это явно не сработало бы. Людоедом он должен оказаться, не знаю, Брюсом Уэйном.</p><p class="p1">— Было бы круто, — признался Дорохов. — Я бы тогда улыбку на лице намалевал и ходил на встречи с ним в белом гриме.</p><p class="p1">— Ой, кого ты обманываешь! Женщиной-кошкой ты бы наряжался! — не выдержал Лубоцкий.</p><p class="p1">Они радостно поржали, даже Федя.</p><p class="p1">— Третий способ самый неосуществимый, — сказал Андрей, когда они отсмеялись. — Подкуп. Потому что если первый, в принципе, при сильном желании накосячить, еще туда-сюда, с этим даже отбитые ребята справляются при минимальной подготовке (правда, и результат известен, и он почти на сто процентов — не то, чего бы хотелось), ну и второй вариант тоже вполне бюджетный. А подкуп, знаете, совсем нет смысла обсуждать. Потому что если бы у нас были деньги, чтобы сунуть на лапу тому, кто за это все взялся, то мы бы тупо могли жилье купить всем, чьего отъезда мы бы не хотели, и всё.</p><p class="p1">Петя зачем-то еще раз покраснел, что не укрылось от Дорохова, потому что он заметил:</p><p class="p1">— Вот этого вот не нужно, Безнос. Я лучше под забором сдохну. Честное слово.</p><p class="p1">И, уже к Андрею обращаясь, оторвался от смартфона:</p><p class="p1">— Что четвертое?</p><p class="p1">— Чудо, — сказал Лубоцкий.</p><p class="p1">Безносов и Дорохов промолчали, заметно сочувствуя инфантилизму Лубоцкого.</p><p class="p1">Лубоцкий попытался расшифровать собственные слова, и чем дальше объяснял, тем больше было в нем уверенности:</p><p class="p1">— Как мой дядя говорит, в наше время можно не то что взрослых закатать в кутузку по любому поводу и выпустить опять же по любому поводу, но даже группу детского сада в «Кресты» закрыть без объяснения причин. Ну, выйдет несколько тысяч человек, ну, огребут от космонавтов, затем еще выйдут люди, опять огребут, на этом все и кончится. А в нашем случае даже этого не будет, потому что квартиры дают, все вроде бы в порядке, со стороны это выглядит, будто мы с жиру бесимся, что бы мы ни предпринимали. Понимаете? Тут реально нужно что-то абсолютно иррациональное. Чего совершенно не ждешь.</p><p class="p1">— И как это сделать? — спросил Федя. — К экстрасенсам и гадалкам сходить?</p><p class="p1">— Нет, это как раз рационально: эти-то ребята вполне себе реалисты и практики, они просто деньги берут за сеансы своеобразной психотерапии. Они, может, и пообещают утешение, но самого утешения не будет, да нам и не утешение нужно, а некий результат. Нам нужно, чтобы человек, который дергает Шергу и других таких же кукол за ниточки, передумал это делать, совсем отказался от своей идеи. И кажется, взрыв водокачки и то, что за кирпичной кладкой ничего не оказалось, кроме какой-то ерунды, — это первое явление того самого чуда.</p><p class="subtitle">* * *</p><p class="p1">Петя никак не выдал себя, не показал Лубоцкому, что сам думает о том же, хотя действительно думал примерно о том же. Он давно уже три раза обшарил отцовскую квартиру в поисках какой-нибудь подсказки, даже перетряхнул конверты с пластинками, пролистал все книги, перебрал архив писем, бегло читая каждое, но в основном там были глупости, подчас остроумные, подчас грубые реплики старых друзей, которые именовали друг друга не иначе как «черти» или «сволочь»: допустим, в описании какой-то научной конференции были слова «собрали там нас, архивистов, палеонтологов и прочую сволочь». Но были и другие письма, с многочисленными предварительными и финальными расшаркиваниями, наполненные латынью, французским, английским, немецким, ссылками на тексты и схемами.</p><p class="p1">Для писем имелся отдельный каталог. Каталог имелся и для книг и пластинок. В книжном каталоге нашелся отдельный каталог марок, где Петя обнаружил малопонятное описание, как он понял, каждой марки, сопровождаемое вереницей чисел. Все было упорядочено. И только несколько кляссеров не было учтено. В этих альбомах марки были рассованы как попало, будто их складывали второпях. Сначала Петя принял эти кляссеры за своеобразный запас марок на обмен или склад дубликатов, которые не было смысла помещать в причесанные каталогизацией альбомы.</p><p class="p1">После разговора с Лубоцким Петю осенило, что если где и искать чудо или некую к нему подводку, то лишь в этих безумных альбомах.</p><p class="p1">Первым делом Безносов оглядел каждую марку с обратной стороны, но там не было ничего, кроме сладковатого клея (да, Петя зачем-то попробовал одну марку на язык), никаких подсказок не имелось и под марками — никто не выдавил никаких букв на податливом картоне кляссеров, у одного из альбомов имелась съемная обложка, но ни под ней, ни в ней не было ничего. Петя подумал было, что бабочка, маяк, панда, жаба, змея, самолет на первой странице одного из кляссеров могут составить какое-то слово, если читать только первые буквы, но тут же понял, что нет, не могут, даже если брать их английские аналоги, не поленился и достал русско-французский и русско-немецкий словари, но все было без толку, постоянно получался у Пети ряд никоим образом нечитаемых согласных.</p><p class="p1">Буквально в шаге от того, чтобы сдаться, он сел возле камина, готовый бросить в огонь бесполезные, бессмысленные альбомы, наполненные дурацкими мелкими бумажками, каждая из которых как бы щерилась своими мелкими зубчиками по краю.</p><p class="p1">А затем внезапно на первой странице одного из альбомов нашлись буквы, сложившиеся в два слова: <em>dеar</em> и <em>friend</em>. «Так-так-так, стоп-стоп-стоп, как это получилось?» — не сразу понял Петя, вглядываясь в марки с собакой, бабочкой, настольной лампой и королевой Англии, пока не сообразил, что слово <em>dear</em> образуется из первых букв надписей. То есть надо было не на картинки смотреть, а на слова: <em>dobermann, Earias clorana, Anglepoise Lamp</em> и <em>Red Cross Centenary Congress</em>.</p><p class="p1"><em>Friend</em> начинала марка со словом <em>Foroyar</em>, где первая «о» была почему-то зачеркнута.</p><p class="p1">Не успел Петя приступить к чтению, как телефон сначала раздражающе завибрировал, а затем не менее раздражающе зазвонил. Это была мама, которую отсутствие сына начало удивлять, злить и печалить. Безносов потратил какое-то время, чтобы объяснить ей, что ничего страшного не происходит, что он не в наркоманском притоне, в конце концов, да, совершенно точно не в притоне, и нет, не пьет, не курит, и даже гостей у него сегодня нет. Вслед за мамой позвонил Лубоцкий и сразу же стал смеяться в трубку.</p><p class="p1">— Блин, ну чего ты нормальный телефон не заведешь? — спросил он воинственно. — Тут часть «переселенцев» на ушах стоят.</p><p class="p1">— Я тоже кое-что нашел, — начал было Петя, но Андрей его перебил:</p><p class="p1">— По сравнению с тем, что Лиза сегодня находила по улицам, это наверняка пустяки.</p><p class="p1">— Еще не знаю, — ответил Петя.</p><p class="p1">— Тогда слушай, тут просто что-то с чем-то.</p><p class="p1">Оказалось, что Лизу зацепила новость про исчезнувших старушек, и когда она, возвращаясь домой, увидела еще одну парочку бабулек, то решила посмотреть — пропадут они или нет. И они пропали: зашли в «Бургер Кинг» да так больше и не появились, сколько Лиза их ни ждала. Чтобы не прослыть сумасшедшей, она решила, что больше старушек не упустит, и какое-то время околачивалась после школы вдоль Среднего Трофимовского переулка, где встретила тех бабок впервые. Недели две она убила на эти прогулки, сама себя уже убедила, что все это ей привиделось, как вдруг снова повстречала тех самых старушек и заметила, что на ногах у обеих кроссовки: у одной с оранжевыми шнурками, у другой — с черными. На этот раз бабушки зашли не в забегаловку, а в подъезд, куда Лиза в начальной школе ходила на уроки фортепиано, а потому знала, что там есть черный ход. Разумеется, обошла дом, стала поджидать на другой стороне дороги. И тут увидела, как подъезжает такси, а из дома выходят мама Шергиной (не такая уж она глупая) в кроссовках с оранжевыми шнурками и кто-то похожий на слегка загримированного покойного Батайцева. Оба садятся в такси — и привет.</p><p class="p1">— Нужно их поймать! — бодро заключил Лубоцкий. — А у тебя что?</p><p class="p1">Петя рассказал про начатое письмо.</p><p class="p1">— Ты прочитал?</p><p class="p1">— Только начал.</p><p class="p1">— Тогда подожди! Давай соберем всех и прочитаем вместе!</p></span>
