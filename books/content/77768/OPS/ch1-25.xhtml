<p class="p">Глава 22</p>
<p class="p">Что скажет Марья Алексевна?</p>
<p class="p">Антонина Книппер</p>
</div><p class="p1">Дверь с грохотом захлопнулась. Стало темно, как в погребе: свет в подъезде почему-то не горел. Лиза постояла минутку, чтобы глаза привыкли, хотя никакой необходимости в этом не было: по дому, где живешь с рождения, можно ходить и с закрытыми глазами. Маршрут, выверенный годами. Семь шагов до первого лестничного пролета. Пять ступенек вверх. На третьей ступеньке снизу — глубокая выбоина слева, у перил. Затем еще пять шагов вперед. Лифт. Кнопка справа. Другой вопрос, что именно сейчас идти никуда не хотелось. Или не моглось. Да и ее ли это, собственно, дом? И она ли это вообще? Сейчас Лиза не взялась бы ничего утверждать наверняка. Привалилась к стене и медленно сползла вниз, прямо в ноябрьскую слякоть, что каракатицей заползла в подъезд и утробно чавкала под ногами. Пахло сыростью и кошками. Дейнен ненавидела кошек, у нее на них с детства аллергия.</p><p class="p1">— Я Лиза Дейнен. Я ненавижу кошек, — громко сказала Лиза. — «А мы ненавидим Дейнен, мяу», — тут же передразнила сама себя и судорожно зажала рот ладонью, чтобы не завыть, раззявившись побабьи.</p><p class="subtitle">* * *</p><p class="p1">— А ты ему, собственно, кто? — старуха-регистраторша, похожая на облезлую болонку, приняла стойку сторожевой овчарки.</p><p class="p1">— Сестра. — Лиза умела врать убедительно, как-то даже отрешенно, для этого всего лишь нужно было не мигая смотреть собеседнику в переносицу.</p><p class="p1">— Много вас тут таких ходит, сестер, — пролаяла бабка, мелко тряся поредевшими кудельками. — Многодетные, что ли?</p><p class="p1">— Семеро нас у мамы, — кивнула Лиза. — Трое белых, трое негритят и один китайчонок. Только мы его обратно в Китай отправили, а то он всех летучих мышей в округе переловил, теперь самим есть нечего.</p><p class="p1">Овчарка, которая болонка, тяжело задышала. Не дав ей опомниться, Лиза обогнула стойку информации и решительно направилась к лифту — отделение кардиологии находилось на пятом этаже.</p><p class="p1">Длинный больничный коридор был пуст. Только в самом конце его маячили два силуэта. Шерга и Абрикосова. Эта-то что здесь потеряла?! Первое побуждение — развернуться на пятках и нырнуть в пасть застывшего в ожидании лифта — пришлось подавить. Лиза набрала полную грудь воздуха и стала подниматься на свой Аркольский мост.</p><p class="p1">— Здравствуй, Анна! Здравствуй, Элен! — ледяная вежливость «уровня Бог» была сейчас необходима как никогда. Лиза еле сдержалась, чтобы не опуститься в глубоком реверансе. Но вовремя вспомнила, что театральные жесты — оружие Шерги, сама же она владела им неважно.</p><p class="p1">— А, Бобер, и ты тут. — Шерга мазнула по ней взглядом и брезгливо поморщилась.</p><p class="p1">Лиза тяжело сглотнула. В висках запульсировало. И не в том дело, что ей, как грязную скомканную салфетку, метнули в лицо обидную детскую кличку. Точнее, не только в этом. Шергина уже сто лет ее так не называла. С чего бы Ане, незримо повзрослевшей за последние недели словно бы на целую жизнь, вдруг снова вспоминать это старое дурацкое прозвище? Лиза перед ней ни в чем не провинилась. В конце концов, кто тут у кого парня увел… Нет, все не то. Здесь что-то еще не сходится. Не сходится, а расходится. В носу отвратительно закололо, словно от напряжения вот-вот хлынет кровь. Брови! Ну конечно же! Брови! Шерга же совсем недавно при невыясненных обстоятельствах сбрила их начисто. И из своего загадочного вояжа, про который так никому ничего толком и не успела рассказать, вернулась эдакой готической девой с портрета Рогира ван дер Вейдена — не хватало только остроконечного колпака. Теперь же брови, светлые и пушистые, как ни в чем не бывало изгибались на прежнем месте.</p><p class="p1">— Аня, — Лиза постаралась, чтобы голос не дрожал. — А как ты смогла так стремительно… эм-м-м… реанимировать свои брови?</p><p class="p1">— Дейнен, с тобой все в порядке? Ты о чем вообще? — Шергина удивилась, и вполне искренне.</p><p class="p1">— Ты же их сбрила совсем недавно! Они не могли… так быстро…</p><p class="p1">— <em>Are you crazy, my poor girl?!</em><a href="ch2.xhtml#id49" class="a">[39]</a> — Аня с недоумением обернулась к Абрикосовой, ища у нее поддержки. — Ты что, рехнулась, бедняжка? — перевела на всякий случай. — Какое сбрила, что ты городишь?</p><p class="p1">Абрикосова закатила глаза и выразительно пожала плечами.</p><p class="p1">Перед глазами у Лизы заметалась черная мошкара. Кончики пальцев онемели. Что-то невидимое, необъяснимо огромное наступало на нее из ниоткуда, окружало, со свистом высасывая кислород из легких.</p><p class="p1">— Леля, а где Петя? — чувствуя, что слабеет, Дейнен попыталась зайти с другой стороны и все же нащупать в этой Гримпенской трясине хоть какую-то точку опоры.</p><p class="p1">— Безно-о-с? — Леля зачем-то вытянула уточкой и без того пухлые губы, точно собиралась сделать селфи с хештегом #я_в_шоке. — А откуда я знаю!</p><p class="p1">— Тебе ведь он, кажется, нравился.</p><p class="p1">— Мне-е-е? — хештег #я_в_шоке стремительно превратился в #возмущение365. — Этот нищеброд с кнопочной «нокией»? Нравился? Мне? Дейнен, в больничку сходи, головку проверь.</p><p class="p1">— Да она уже и так в больничке, — захихикала Шерга.</p><p class="p1">— Ой, то-о-чно, девчуля, так ты по адресу, — хештег #я_у_мамы_остроумная переливчато засиял на белоснежном абрикосовском лбу.</p><p class="subtitle">* * *</p><p class="p1">Лиза бежала не разбирая дороги. Вдогонку за ней припустился ледяной дождь. Стремительно намокшие волосы лезли в глаза, набивались в рот. Со всех сторон возмущенно сигналили автомобили: уйди из-под колес, идиотка, жить надоело? Внутренний навигатор неожиданно вывел к Патриаршим. Вода в пруду почернела, в аллеях под зонтами прогуливались влюбленные парочки и неутомимые собачники. Иностранные консультанты попрятались от непогоды. Вместо них вдоль несуществующих трамвайных путей катили на велосипедах желтые и зеленые коробейники.</p><p class="p1">Выйдя с Ермолаевского на Бронную, Лиза медленно побрела в сторону Триумфальной площади. Сердце замедлило ход, дыхание выровнялось. Самое время включить голову и попытаться понять, что имелось в сухом остатке. Шерга с Абрикосовой развели ее — это факт. Вопрос — зачем? Что значит — зачем? Затем! Это же очевидно, дурында, к гадалке не ходи! Чичиков надумал выставить ее сумасшедшей, одним щелчком сбросить с шахматной доски, не дать увидеться с Андреем. А Абрикосова, так та известная подпевала — всегда чует, куда ветер дует, с кем выгоднее. И просто подыграла Шерге. И все у них прошло как по нотам. Она повелась, как девочка, сбежала — несчастная слабонервная трусиха. Да, но брови… С ними-то как быть? А что брови? Современная косметология и не на такое способна.</p><p class="p1">Бронзовый Маяковский свысока наблюдал за суетой большого города, тонущего в аляповатых огнях неистребимой праздничной иллюминации. Подойдя к гранитному постаменту, Лиза разглядела с детства знакомое:</p><div class="poem">
<div class="stanza">
<p class="v">И я,</p>
<p class="v">как весну человечества,</p>
<p class="v">рожденную</p>
<p class="v">в трудах и в бою,</p>
<p class="v">пою</p>
<p class="v">мое отечество,</p>
<p class="v">республику мою!</p>
</div>
</div><p class="p1">Вспомнились слова Лубоцкого, что к настоящему Маяку эти строчки не имеют ни малейшего отношения. Совсем другое надо было гравировать. Что именно — не уточнял. Но Лиза и без того догадывалась. Она прогнала эти воспоминания. С неумолимой действительностью они были никак не связаны. В отличие от «весны человечества»…</p><p class="p1">— Лизон, ты, что ли? — Осенний воздух сгустился, и из вечернего сумрака откуда ни возьмись соткался Дорохов — собственной персоной.</p><p class="p1">Дейнен никогда не испытывала к нему особых чувств, в глубине души подозревая, что Дорохов вряд ли отличал Воланда от Волан-де-Морта. Для нее он был всего лишь не в меру эксцентричным другом Андрея, и на этом все. Но сейчас она обрадовалась ему как родному.</p><p class="p1">— Дядя Федор! — излишне порывисто обвила его шею рукой и чмокнула в щеку. Но тут же отстранилась и аккуратно, как бы между прочим, поинтересовалась: — Чем все закончилось-то?</p><p class="p1">— Так ты в больнице не была еще? — удивился Дядя Федор. — А я вот только оттуда. Оставил безутешную Джульетту рыдать над бездыханным телом новоприобретенного Ромео. — Дорохов коротко взлаял собственной шутке, но тут же осекся и смущенно зажевал губами. — Ну чем-чем… У Лубка эта, как его, вегетососудистая что-то там… Желе́за перетягал, короче.</p><p class="p1">— А вам с Безносом и Селезневым ничего? — Лиза сделала вид, что пропустила «новоприобретенного Ромео» мимо ушей.</p><p class="p1">— Не понял, — оторопел Дорохов. — А мы-то тут при чем?! Мы вообще не при делах. Лубок на физре кросс бежал. И вдруг упал. Будто этот, ну как его, стойкий оловянный. Бежал-бежал, и вот уже лежит. Говорю же — железа перетягал, ну и того — сердечко не выдержало.</p><p class="p1">— А школа от чего посыпалась, известно уже?</p><p class="p1">— Лизон? Куда посыпалась? Как стояла себе, так и стоит. Что ей сделается? — Дорохов прищурился. — А ты сама чего сегодня прогуляла-то?</p><p class="p1">— Федя, последний вопрос. — Лиза зачем-то перешла на свистящий шепот. — Ты когда переезжаешь?</p><p class="p1">— Да что с тобой, Дейнен?! Ты чё рофлишь? Куда и зачем я должен переезжать?!</p><p class="subtitle">* * *</p><p class="p1">Свет в подъезде вспыхнул внезапно, полоснув Лизу по глазам. Пора было подниматься и идти. Семь шагов до первого лестничного пролета. Вот они — пять ступенек вверх. На третьей снизу — глубокая выбоина слева, у перил. Затем еще пять шагов вперед. Лифт. Кнопка справа. Но Лиза медлила. Никто ее не разыгрывал. Это время совершило цирковой кульбит, схлопнулось, обнулилось — называйте как хотите. Волна улеглась, вернув все к начальной точке, или затаилась, чтобы окончательно накрыть их с головой? А может, это проделки древних юных богов, примчавшихся в человеческий мир на ее Коньке-горбунке? Был еще вариант, самый очевидный и вместе с тем — самый невыносимый: а вдруг все происходит только в ее, Лизиной, голове? Шизофрения как она есть. Но самое невероятное, что даже сейчас, наблюдая эти осколки рассыпающегося в пыль мироздания, Лиза волновалась не столько за будущее человечества, сколько о том, а был ли он, тот последний разговор с Андреем? А внезапная поездка к деду-генералу? Пена «Адам и Ева»? Случились они на самом деле или всего лишь приснились ей? Черт побери, они с Лубоцким по-прежнему вместе или Шерга отняла его навсегда? И да, который сейчас вообще час? О том, какой теперь год, Лиза решила не думать…</p><p class="p1">…Дверной звонок привычно пропел «Боже, царя храни». Несколько мгновений стояла тишина. Потом раздались грузные шаги и скрип поворачивающегося в замке ключа — Марья Алексевна, сколько ни пытались образумить ее бдительные соседи, никогда не интересовалась, кто стоит за дверью.</p><p class="p1">Едва увидев Лизу — в перепачканной куртке, промокшую с головы до ног, — Марья Алексевна, ни слова не говоря, отступила в сторону и махнула рукой, мол, заходи.</p><p class="p1">Закутавшись в шерстяной клетчатый плед (было бы преступлением уехать из Эдинбурга без этой дивной вещицы, правда, дорогая?), Лиза маленькими глотками пила обжигающий крепкий чай, щедро сдобренный лимоном. В изящной конфетнице, по бокам которой резвились розовощекие пастушки Ватто, томились шоколадные трюфели. Тут же призывно клубилось нежной пенкой вишневое варенье. Марья Алексевна расположилась напротив, плеснула в бокал красного вина и принялась сосредоточенно омывать им тонкие хрустальные стенки. Тишину нарушал лишь далекий гул машины, где стирались Лизины вещи, да мерный стук маятника старинных напольных часов.</p><p class="p1">В этой квартире Лиза когда-то провела даже не дни — годы. Уходя на работу, мама частенько подкидывала дочь соседке, а став постарше, Лиза уходила сюда уже сама. Марья Алексевна Хованская была лучшим, что только могло случиться в жизни маленькой любознательной девочки. Да что уж там: почти всем, что Лиза знала и умела, она была обязана этой одинокой пожилой даме. Одинокой и пожилой, впрочем, Марья Алексевна была не всегда. Когда-то давным-давно, еще совсем юной барышней, она была просватана за старого генерала. Тот оказался человеком порядочным и не стал долго обременять молодую супругу, довольно быстро отправившись к праотцам. От мужа Марье Алексевне осталась недурная пенсия, огромная квартира в Замоскворечье, обставленная вывезенной из Германии роскошной трофейной мебелью красного дерева, и бесценная библиотека. Другая бы на месте Марьи Алексевны решила, что вытащила счастливый билет, и опочила на лаврах в компании домработницы. Но Марья Алексевна решила иначе. Устроившись в музей Пушкина, она сделала стремительную научную карьеру и к моменту появления в ее жизни Лизы уже объехала полмира, выясняя, как собирают и пестуют свои коллекции коллеги из музеев сестер Бронте, Бальзака и Данте. Часто она брала Лизу с собой на Пречистенку и, велев не дышать, показывала, как спят в полутьме хранилищ старинные картины и скульптуры. Надменные господа в пудреных париках, треуголках и цилиндрах и дамы с глубокими декольте и в чепцах быстро становились добрыми Лизиными приятелями. Разбуди ее ночью, и она бы без запинки ответила, кого как зовут, кто кого любил и ненавидел и какое отношение имел к «солнцу нашей поэзии». И часто видела их во сне. Дом Марьи Алексевны мало чем отличался от музея. Столовое серебро (вилка слева, нож справа; грызть яблоки — <em>mauvais ton</em>, их надо обязательно чистить и резать на кусочки специальным фруктовым ножом). Невесомый фарфор без возраста (из мейсенских чашек я пью кофе, когда хочу сосредоточиться, а из кузнецовских — когда хочется праздника). Хрустящие крахмальные салфетки с затейливыми монограммами. Потемневшая масляная живопись и жизнерадостные акварели по стенам. И конечно, книги. Сотни, нет, тысячи книг, безмолвствующих в гигантских шкафах ровно до того момента, пока не возьмешь их в руки. По ним, с «ерами» и «ерями», Лиза училась читать. Марья Алексевна охотно объясняла значение непонятных слов, попутно и как бы между прочим рассказывая, как расшифровывать таящееся между строк. Самыми блаженными были те мгновения, когда хозяйка садилась за письменный стол и с головой уходила в очередную рукопись, а Лиза, забравшись с ногами в необъятное плюшевое кресло, читала, время от времени поднимая голову и украдкой любуясь причудливыми тенями, блуждающими по сосредоточенному, а потому кажущемуся суровым лицу Марьи Алексевны, по ее высокой белоснежной прическе, по крупным рукам с длинными пальцами в массивных кольцах. Тени дрожали, словно были рождены не светом настольной лампы, а отблеском свечей, и лицо Марьи Алексевны становилось незнакомым, чуточку колдовским. Однажды Лиза не выдержала и сказала, что та похожа на пушкинскую старую графиню.</p><p class="p1">— Когда она была молодая, конечно же, — добавила поспешно, чтобы хоть как-то исправить вопиющую бестактность.</p><p class="p1">Но Марья Алексевна не обиделась. И через пару дней позвала Лизу в Большой театр на «Пиковую даму». Лиза после этого долго напевала под нос про «<em>Venice</em> московит», проигравшуюся дотла…</p><p class="p1">В последнее время Лиза редко заглядывала к Марье Алексевне: столько дел, столько дел. И сейчас, глядя на рубиновые сполохи в ее бокале, понимала, что все могло бы пойти иначе, приди она сюда чуть раньше. Бесстрастный немец <em>Hermle</em> отбил уже третий полный час, а Лиза все говорила и говорила. Про Волну и внезапное Петино наследство, про взрыв водокачки и Шергу, про снос квартала и про… Андрея. Дойдя до эпизода своего постыдного бегства из больницы, не выдержала и шмыгнула носом. Марья Алексевна, молчавшая все это время, протянула ей белоснежный носовой платок:</p><p class="p1">— Дорогая, можно потерять голову, но манеры должны всегда оставаться при тебе!</p><p class="p1">— Марья Алексевна, миленькая, до манер ли тут? — прогнусавила Лиза.</p><p class="p1">— Запомни, <em>ma cherie</em><a href="ch2.xhtml#id41" class="a">[40]</a>, манеры — это единственный капитал, которому не грозит инфляция. — Марья Алексевна назидательно подняла палец, на котором матово переливался оправленный в белое золото изумруд. — Манеры и еще, пожалуй, талант!</p><p class="p1">— Талант свой я утратила. Может, манеры мне теперь тоже уже ни к чему?</p><p class="p1"><em>— Ne me fais pas rire!</em><a href="ch2.xhtml#id39" class="a">[41]</a> — поджала губы Марья Алексевна. — Что значит утратила?!</p><p class="p1">— Утратила или пожертвовала… Во имя… Во имя сама не знаю чего! И еще я зачем-то выбросила свой волшебный блокнот…</p><p class="p1">— И этого ребенка я воспитала! — Марья Алексевна уже не сердилась, но смеялась заливисто, молодо. — Да я тебе другой подарю. С Пушкиным, хочешь? — вскочила с порывистостью, несвойственной ее комплекции и ученому званию, и исчезла в темноте коридора. Вскоре вернулась и водрузила перед Лизой новенькую, запаянную в целлофан записную книжку. — Вот, держи. Портрет Пушкина кисти Петрова-Водкина, малоизвестный широкой публике. Сочиняй на здоровье.</p><p class="p1">— Что сочинять?</p><p class="p1">— Да что хочешь, то и сочиняй, — Марья Алексевна была сама беспечность. — Не мне тебя учить. Все, чему могла, я тебя уже и так научила.</p><p class="p1">Лиза крутила в руках блокнот с печальным изображением «нашего всего» на обложке. Марья Алексевна рассеянно вертела в пальцах ножку бокала.</p><p class="p1">— Дорогая, ты права в одном. Все действительно только в твоей голове. Хочешь страдать — страдай. Хочешь искать выход — ищи. А он есть всегда. Даже когда тебе кажется, что от тебя уже ничего не зависит. А на деле — как решишь, так и будет. Прости, что говорю банальные вещи, но что есть истина, если не банальность?</p><p class="p1">— У вас тоже есть свой блокнот?</p><p class="p1">— <em>Bien sûr</em><a href="ch2.xhtml#id36" class="a">[42]</a>, а как иначе? Всю жизнь заполняю его — строчка за строчкой. И чего хочу — все в итоге получаю.</p><p class="p1">— То есть вы таки колдунья? Всегда подозревала…</p><p class="p1">— Не моя терминология… Мое колдовство в том, что я никогда не впускала в свою жизнь то, что мне было не нужно: людей, эмоции, даже обстоятельства. Если же они все-таки врывались без приглашения, тут же указывала им на дверь. По возможности вежливо, но недвусмысленно. Надо беречь свой мир, за тебя это никто другой не сделает.</p><p class="p1">— А если они, эти ненужные, отказываются уходить?</p><p class="p1">— Тогда делай вид, что просто не замечаешь их. Продолжай возделывать свой сад и жить по тем законам, что сама над собой признаешь.</p><p class="p1">— Смерти на дверь не укажешь…</p><p class="p1">— Смерти нет, <em>ma cherie</em>, однажды ты это поймешь, возможно даже быстрее, чем думаешь…</p><p class="p1">При этих словах у Лизы по спине пробежал гнусный липкий холодок. Она стремительно расправила плечи — чего можно бояться в этих родных стенах? Надо было срочно сменить тему, но все тревожащие ее вопросы на поверку оказывались один страшнее другого. Марья Алексевна смотрела выжидательно и не спешила на помощь. Молчание затягивалось.</p><p class="p1">— Кажется, машина остановилась, — сказала Лиза, чтобы хоть что-то сказать. — Мне пора, мама, наверное, волнуется.</p><p class="p1">— Спасибо, что заглянула, Лизавета. Не забывай старуху. — Марья Алексевна снова исчезла в темном зеве коридора. — Одежда на кресле, — крикнула откуда-то издалека.</p><p class="p1">Когда Лиза уже стояла на пороге, Марья Алексевна, как и всегда, нежно клюнула ее губами в лоб:</p><p class="p1">— Береги себя, моя девочка, и не переживай по пустякам. Все вернется на круги своя, даю слово. Что до твоего Андрея, то и он никуда не денется, потому что никуда не уходил. Другое дело, нужно ли тебе это. Ну, прощай, ступай с богом.</p><p class="p1">Дверь захлопнулась. Ключ в замке повернулся. Шаги стихли. Лиза высвободила блокнот из целлофановой пленки. Неловко зажав его под мышкой, порылась в рюкзаке, нашла ручку. Села на корточки и вверху первой страницы вывела: «Пусть все вернется на круги своя». Затем подумала с минуту и добавила: «Вино ее прелести ударило ему в голову… Андрей почувствовал себя ожившим». Удовлетворенно поцокала языком, поднялась и, нащупав в кармане ключ, принялась открывать дверь своей квартиры.</p><p class="subtitle">* * *</p><p class="p1">— Лизка, я тебя сейчас убью! — Мама, что, впрочем, с ней часто бывало, метала громы и молнии. — Тебе телефон зачем нужен — чтобы им орехи колоть? Ты почему на звонки не отвечаешь? Я тут с ума схожу!</p><p class="p1">— Да все нормально, мам, не кипятись. — Лиза сбросила ботинки и повесила чистенькую сухую куртку на вешалку. Достала мобильник — по краю сознания скользнуло, что телефон, в обычное время безостановочно пиликающий на разные голоса, сегодня был нем как могила. Зажегся экран. В левом верхнем углу крутилось скорбное: «Поиск сети». — Вон, сама посмотри, нет от тебя никаких пропущенных — глючит телефон.</p><p class="p1">— Ты где это шлялась? На часы посмотри! Ночь на дворе! — Если мама заводилась, остановить ее было практически невозможно.</p><p class="p1">— Сначала у Андрея в больнице была — у него там что-то вегетососудистое, затем к Марье Алексевне на чай заглянула.</p><p class="p1">При этих ее словах проступившие на шее у матери пунцовые пятна начали стремительно заливать щеки:</p><p class="p1">— Куда заглянула?!</p><p class="p1">— Мам, ну ты чего, сказала же — к Марье Алексевне, на чай с лимоном.</p><p class="p1">— Ах ты дрянь циничная! — Мама размахнулась и с оттяжкой влепила Лизе звонкую пощечину. — Креста на тебе нет! Марья Алексевна умерла год назад!</p></span>
