<span id="id26"><div class="title1">
<p class="p">Глава 24</p>
<p class="p">Эпилог</p>
<p class="p">Дмитрий Быков<a href="ch2.xhtml#id6" class="a">[57]</a></p>
</div><p class="p1">— <em>Eh bien, mes princes</em>, — так начал заседание своего литературного кружка Алексей Львович Соболев, для учащихся просто Львович, прихлопнув сверху толстую папку с коллективным романом десятиклассников. — У меня есть для вас три известия: прекрасное, изумительное и восхитительное. С которого начинать?</p><p class="p1">— С восхитительного! — крикнула Анечка Шергина, в чьем прелестном личике опытность боролась с невинностью и, пожалуй, уже побеждала.</p><p class="p1">— Восхитительное, <em>mes amis</em>, заключается в том, что ваш роман прочитали, — сказал Соболев с тем сдержанно ехидным выражением, с каким обычно хвалил; он умел сделать так, чтобы его похвала всегда воспринималась как снисходительная или как бы о чем-то умалчивающая.</p><p class="p1">— И сказали, что он не окончен, — предсказуемо вставил Лубоцкий.</p><p class="p1">— Отчего же, он вполне окончен и даже, пожалуй, растянут. — Соболев выдержал паузу. — Ваша книга понравилась и одобрена к изданию.</p><p class="p1">Класс, почти в полном составе посещавший литературный кружок, заорал, запрыгал и тут же дисциплинированно расселся по местам. Десятиклассники отлично умели дозировать всё: экзальтацию, непосредственность и даже бунт, если бы он понадобился.</p><p class="p1">— Впрочем, — продолжал Соболев, — как раз с этим я вас не поздравляю, ибо в романе вашем есть все необходимое с точки зрения издательской конъюнктуры, а это не самый большой комплимент. В нем наличествуют и оккультные тайны Третьего рейха, равно как и Кремля, и путешествия в подсознание, и роковые олигархи, выражающие тайную волю мировой закулисы, и даже строго нормированный социальный протест, без которого сейчас немыслима никакая коммерция. Это такая пряность, добавлять которую на всякий случай непременно следует — просто чтобы лет через пять, а то и раньше говорить, будто вы и тогда уже все понимали.</p><p class="p1">— Но понимали же, — обиженно прогудел Безносов.</p><p class="p1">— Разумеется. Вы вообще очень старались, эта старательность вам скорее в минус, чем в плюс, но издатели оценили. Ясно, что сегодня ничего нового не выдумаешь, и потому вы воспользовались матрицей «Войны и мира», романа настолько же популярного, насколько и позабытого; вы щегольнули по крайней мере тем, что помните Баздеева. Это, впрочем, предсказуемо: если в классе есть Безносов, естественно, что мысль его обратится к Безухову. Из всех нынешних примочек вы обошлись только без вампиров, но это был бы полный уже треш. В вашей книге есть все приметы современного романа, успешного ровно настолько, чтобы его прочитали и на другой день забыли; обратите внимание, что у вас ни на секунду не возникают представители так называемого народа, они же посланцы грубой реальности.</p><p class="p1">— То есть как! — возмутился Лубоцкий. — А свадьба? А народный фотограф?</p><p class="p1">— В них не больше народности, чем в фильме «Кубанские казаки», — отмахнулся Соболев. — Или «Брат-2», если вам это ближе. Лубок, дорогой Лубоцкий, — хорошая вещь, но называть его высоким искусством наивно. Впрочем, вас извиняет то, что в реальности этот самый народ тоже безмолвствует, и о чем он там думает — мы понятия не имеем. Даже временно просыпаясь, как в Хабаровске, он неспособен артикулировать свои требования и отделывается невнятными, бессмысленными кричалками. Выходить на улицу и кормить голубей ему нравится, а сказать нечего. Да и о чем говорить, если жизнь его состоит из бессмысленной работы на дядю, смотрения телевизора и таких вот свадеб с идиотским советским обрядом похищения невесты, которая давно переехала с женихом на съемную квартиру?</p><p class="p1">Шергина хихикнула.</p><p class="p1">— Так что поздравляю, в вашем романе все как у людей, и именно поэтому в сентябре вы будете всей командой вычитывать гранки, производить косметические сокращения и подписывать коллективный договор, а после публикации — аккурат к книжной ярмарке «Нон-фикшн» — получите на рыло по тридцать тысяч рублей, что с точки зрения ваших бюджетов смешно, но, согласитесь, престижно.</p><p class="p1">Дружное и столь же предсказуемое «вау!» было ему ответом.</p><p class="p1">— Нельзя ли теперь превосходное известие? — подала голос Лиза.</p><p class="p1">— Превосходное, <em>mes amis</em>, — отозвался Соболев, — состоит в том, что ваше сочинение не достигло своей главной цели, и наша школа, где мы собрались сегодня в последний раз, ровно первого сентября будет закрыта навеки, а после трехнедельной подготовки торжественно демонтирована по лучшим современным технологиям…</p><p class="p1">Он переждал вопль гнева и разочарования.</p><p class="p1">— После чего на месте Калачёвки, как и предполагалось, будет выстроен элитный квартал «ХХII век» — прошу любить и жаловать.</p><p class="p1">— Что же здесь превосходного? — заорал Абрикосов.</p><p class="p1">— Очень многое, если вдуматься. Напоминаю стартовую диспозицию нашего проекта: вашим заданием на июнь было сочинение такого романа, который способен будет остановить строительство. Тогда Лубоцкий, как самый деловой, задал мне острый вопрос: известны ли случаи, когда литература влияла на жизнь? Я тогда легкомысленно ответил: сколько угодно, вся русская революция в некотором смысле произошла из-за Льва Толстого, а последующий террор — из-за Достоевского, внушившего молодежи, что пока она кого-нибудь не убьет, так и останется тварью дрожащей. И тогда Лиза высказала светлую мысль: а давайте посмотрим, чему мы научились! Ведь если литература не воздействует на читателя и он остается все такой же конформной тварью, какой был, — к чертям такую литературу, правильно?</p><p class="p1">— Правильно! — крикнула Лиза.</p><p class="p1">— И вы занялись программированием читателя, — серьезно и грустно продолжал Соболев. — Я отметил самые трогательные ваши попытки: в пятой главе зашифровано послание «Оставьте нам нашу школу!», и сделано это элегантнее, чем в альбоме с марками. Там описан слишком громоздкий способ шифровки, а вы прибегли к технологии вроде двадцать пятого кадра — хвалю. В главе девятой — как бы переломной, где реализм испаряется напрочь, — методом эриксоновского гипноза изящно скрыта фраза «Кто тронет школу — умрет в муках», я сам баловался такими штуками и не мог не оценить вашей ловкости. Наконец, восемнадцатая глава — место выбрано очень точно, по методу Крастышевского, — прячет фразу «Ваш квартал уйдет под землю», что несомненно случится, вне зависимости от того, послушаются они вас или нет.</p><p class="p1">— Плохо работали, — вздохнула Ирочка Семенова, которая не написала ни одной главы, но помогала зашифровывать послания эриксоновским методом.</p><p class="p1">— Отчего же, вполне нормально, — пожал плечами Соболев. В такие минуты, оставляя свой обычный насмешливый тон, он казался старше своих сорока, словно на плечи его наваливался вдруг весь хмурый, по большей части разочаровывающий опыт русской словесности, а заодно уж и педагогики. — Поиски таких технологий, какие воздействовали бы на читательское сознание, ведутся во всем мире в последнюю тысячу лет, и не сказать чтобы успешно. Есть теория, что читатель активней всего реагирует на еду, — к сожалению, в вашем тексте она почти не упоминается, плоть жизни от вас ускользает; эксперимент Золя, поставленный в «Чреве Парижа», скорее разочаровал автора. Ладно, попробуем с эротикой: ее вы проигнорировали по вполне разумным причинам — ваш опыт пока недостаточен, описывать его — только позориться…</p><p class="p1">Кружок зашумел.</p><p class="p1">— И мой недостаточен, — успокоил их Соболев. — Нынешний читатель требователен, ленив, его так просто не расшевелишь… Конечно, вы могли взять подростковой страстностью, но зачем врать? Все вы уже попробовали, некоторые, думаю, лет в пятнадцать, и этот плод для вас не так уж запретен. Это для советского поколения какое-нибудь упоминание темного мыска под животом было сенсацией, а для вас это, в общем, гимнастика. Большинство занимается этим только для того, чтобы миновать нежелательный неловкий этап и перейти к нормальному общению, разве нет?</p><p class="p1">— Роль секса в жизни молодежи вообще преувеличена! — пискнула Лена Тулупова, сторонница новой этики, которая по причине полного творческого бесплодия вычитывала роман перед сдачей учителю и проверяла ошибки в иноязычных текстах.</p><p class="p1">— Вот-вот. Лично я с удовольствием почитал бы ваши откровения на эту тему, но ведь кто-нибудь от избытка чувств непременно стуканет родителю — и как бы мне еще не загреметь за растление малолетних, хотя на всякий случай — считаю долгом предупредить вас об этом — у меня в запасе хорошая, надежная справка об импотенции, без которой сегодня, открою вам тайну, ни один мужчина в школу устроиться не может. Оскоплять пока не додумались, однако надежды много впереди.</p><p class="p1">— Что, правда?! — выдохнул Абрикосов.</p><p class="p1">— Чистейшая. Для чего мне вам врать? Вы мои любимцы, заветный кружок, и я говорю с вами откровенней, чем со сверстниками. Сверстников моих давно ничего не интересует, кроме лекарств и денег.</p><p class="p1">— Но это неправда? Насчет импотенции? — уточнила Анечка Шергина.</p><p class="p1">— Это вас абсолютно не касается, — холодно отвечал Соболев. — Нас занимает сейчас другая проблема — воздействие литературы на умы. И оно, насколько можно судить, ничтожно. То ли мы разучились писать, то ли все остальные разучились читать, но эпоха, когда под действием Купера сбегали в Америку… или под действием Хемингуэя — в Испанию… прошла безвозвратно. Как и обещал, я разослал ваш роман всем, от кого зависит решение по сносу школы. Двое отозвались отписками — спасибо за неравнодушие к нашему проекту, — остальные не ответили вообще.</p><p class="p1">— Ну и что хорошего в этом известии? — спросил полиглот Бараев, комплиментарно изобразивший себя под видом Билибина и отчасти Пелевина.</p><p class="p1">— А то, — улыбнулся Соболев, — что никто из вас по крайней мере не сможет навредить человечеству. Никакая литература больше не представляет для него опасности. Заметьте, современная российская действительность дает море тем, над которыми заплакал бы любой чувствительный читатель. Пример: этим летом я по старой памяти отправился в пансионат своего детства, где не был лет двадцать. Это в Подмосковье, рядом с маленьким городком поселкового типа или наоборот, неважно. Там старик, давно одинокий, торговал огурцами со своего огорода, очень дешево, по сто рублей кучка. Кто-то из отдыхающих на него настучал, что он торгует без лицензии, без разрешения и, должно быть, не отчисляет налоги. Отдыхающий был шишка, надавил, чтобы похвастаться перед приятелями своим могуществом, и старика, который со своими огурцами никому не мешал, забрали в кутузку. Его необязательно было сажать, да и знали его все в поселке, но — столичная шишка! Да и где вы видели теперь, чтобы не сажали? Его, вероятно, отпустили потом, содрав какой-нибудь штраф, но я представил, как без него зарастает его сад, как сохнут без полива те самые огурцы, как бегает по соседним участкам его собака — не для того, чтобы накормили, а чтобы как-нибудь выручили его… Я ходил, вступался, менты меня гнали — сами все понимаем, но вы же видите… Короче, я прямо-таки увидел рассказ, который обо всем этом можно написать, но писать его, как вы понимаете, не стал. Читатель в лучшем случае скажет, что старик сам виноват, а в худшем — и дочитывать не будет, потому что все бесполезно. А уж поверьте мне, я написал бы этот рассказ хорошо. Я нажал бы на сентиментальность, на детские воспоминания, какие есть у всякого… но к чему? Скажу вам с полной честностью: я теперь все чаще испытываю равнодушие, а иногда и отвращение к своему труду, который так недавно казался мне главным на свете. И в этом состоит третье, самое приятное известие: мы можем больше не напрягаться.</p><p class="p1">Соболев помолчал и уселся за стол.</p><p class="p1">— Это довольно приятное чувство вроде засыпания, — сказал он, снял очки и стал тереть переносицу. — В последнее время я очень люблю засыпать. Видимо, готовлюсь. Раньше мне нравилось сочинять, нравилось, в конце концов, заниматься сексом — вы взрослые люди и наверняка делаете это чаще меня, — но сейчас я люблю засыпать, и лучшие мысли приходят на грани сна, когда я успеваю подумать, что надо бы записать их, — но незачем. Вы не представляете себе, да и мудрено представить это в шестнадцать лет, какое счастье никуда не торопиться, потому что не надо ничего делать. Большую часть своей жизни, смешно сказать, я прожил с ощущением невыполненного долга, а теперь оказывается, что я никому ничего не должен. Раньше я думал, что могу на что-то повлиять, а теперь понимаю, что любое влияние может только ускорить или затормозить процесс, но это, как бы сказать, влияние непринципиальное. Если ускорить процесс, все сгорит, а если замедлить, все сгниет. Это обычное, хорошо известное свойство исторических тупиков, поэтому вы можете расслабиться и получать удовольствие. Это и есть главная новость, которой я хотел поделиться.</p><p class="p1">Сначала все молчали, потом Лиза сказала:</p><p class="p1">— Это ваш обычный творческий кризис, Львович. Лично ваш.</p><p class="p1">— Да-да, — с готовностью кивнул Соболев. — Несварение желудка. Все можно объяснить дурной погодой, эпохой, недостаточной свободой, перевалить на отческий бардак, списать на перетруженный рассудок, на <em>fin de siecle</em> и на больной желудок…</p><p class="p1">— Но если все на самом деле так?! — закончила Шергина, тоже любившая этого автора.</p><p class="p1">— Или <em>COVID</em>, — предположила толстая очкастая Маша Короваева, все объяснявшая медицинскими причинами.</p><p class="p1">— Тогда приходится признать, что <em>COVID</em> у какой-то верховной инстанции, но я для такого кощунства не созрел. Короче, вместо линейки в нашей школе, благополучно просуществовавшей сто пятьдесят три года и ныне сносимой с лица земли, будет возведение непроходимого забора. В ноябре вы сможете прийти сюда и поклониться руинам. Думаю, к тому времени готова будет и книга.</p><p class="empty-line"/><p class="p1">27 ноября 202* года у ровной, укатанной грузовиками площадки, с которой вывезли последние кирпичи Калачёвской гимназии, почти в полном составе стоял несостоявшийся одиннадцатый класс, ныне рассеянный по школам московских окраин.</p><p class="p1">Погода была удивительно ясной и светлой, среди мерзкого дождливого и теплого ноября выдался, как нарочно, солнечный день с легким морозцем, и все говорило о строгости и самодисциплине. Такая погода не располагала к сюсюканью. Все стояли молча, пытаясь вообразить сто пятьдесят три года существования Калачёвской гимназии, подводя итог этой долгой, пестрой, насыщенной, славной и бессмысленной истории.</p><p class="p1">Вот Императорское землемерное училище, переведенное в 1839 году в Петербург; вот пришедшая ему на смену музыкальная школа Конашевского, созданная им в 184* году в преддверии великих реформ, дабы не только дворянские отпрыски, но и простонародье могло развивать таланты; вот, после пяти лет существования в этом качестве, знамя умершего от водянки Конашевского подхватил Границкий, человек сороковых годов, дождавшийся воплощения давних чаяний и затеявший тут подобие лицея с симпосионом, позвавший преподавать товарищей по Московскому университету и в отчаянии плюнувший на все после подавления польского бунта; вот математические курсы Афанасьева, решившего, что никакая гуманитарная культура не спасет Россию, а спасет практическая польза, математика, дающая человечеству универсальный язык. И Афанасьеву как будто повезло, его долго не трогали, пока не выяснилось, что у него-то и получилось самое настоящее нигилистическое гнездо, и по доносу Победоносцева, простите невольный каламбур, курсы были закрыты, а сам Афанасьев сбежал в Лейпциг, где продолжил свое дело, но нам это уже неинтересно. На месте курсов основался Консервативный клуб, славный именами Тертыщева, Дратвина и Соргина, издателей так называемого «Калачёвского сборника», где доказывалось, что сила России не в позитивном знании, а в иррациональной народной вере (и точно, все они были люди больные: Тертыщев — садист, Соргин — содомит с удивительными наклонностями, а Дратвин принципиально воздерживался и умер от непрестанной внутренней борьбы в сравнительно юных годах, товарищи предлагали его канонизировать и клялись, что на могиле его совершаются чудеса). Кружок сам собою рассеялся в начале девяностых годов позапрошлого века, когда историк Патрикеев создал тут на пожертвования мецената Крейцмана, человека просвещенного и впоследствии помешавшегося на этой почве, исторический лицей, то есть гимназию с преимущественным изучением российской истории по иностранным и церковным источникам; изгнанный из университета за вольномыслие, Патрикеев попытался взять реванш в гимназии, считался большим прогрессистом и чуть ли не отцом новой исторической школы. Гимназия его существовала благополучно до самого 1918 года, до которого, впрочем, он не дожил; она, со всем своим прогрессизмом, дала название известному «гимназическому» делу, фигуранты которого взялись слишком рьяно отыскивать аналогии к революционной смуте. Был тот радикальный период, когда врагов еще только расстреливали, чуть позже начали гуманно высылать, после чего перешли к пыткам, завершавшимся все тем же расстрелом; в самой же школе была устроена Московская школа-коммуна № 12 во главе со знаменитым педологом Болонским и верной его соратницей Пихельштейн. Оба находились под сильным влиянием троцкизма, фрейдизма и раннего феминизма. Порядки в школе царили самые демократические, подробные воспоминания о ней оставили два репрессированных впоследствии писателя из бывших беспризорников и добрый десяток выпускников, достигших степеней известных во всех областях советской жизни. Часть этих выпускников тоже прошла через репрессии, но не перестала считать Двенадцатую коммуну лучшим своим воспоминанием; в начале перестройки шумел роман «Мы дети Калачёвки», автор которого, Юрий Фишерман, писал до этого главным образом производственные романы, а вот поди ж ты. Суд над Чацким и самодеятельный спектакль «Оправдание Робеспьера» в 1925–1927 годах собирали в актовый зал всю культурную Москву. Калачёвку закрыли в 1931 году, в ней обосновалась теперь московская школа № 12, названная в честь Бернарда Шоу, чей визит в Советскую Россию и конкретно в эту школу был освещен «Известиями». Школа с тех пор славилась элитными учащимися и образцово идейным педсоставом, в стройные ряды которого затесалась, однако, паршивая овца Алла Николаевна Ноговицына, из бывших дворян. Будучи любовницей директора школы, угрюмого старого большевика Железо под партийной кличкой Пузо, она могла не опасаться чисток, но в головы детей как-то умудрялась внедрять любовь к родной словесности; когда она в 1954 году вышла на пенсию, на ее место пришла бывшая выпускница этой же школы, Мария Казанцева, которая доросла до завучей, умудрившись при этом хранить в душе строчки Блока, Белого и, страшно сказать, Гумилева. Задорные шестидесятые привели в школу выпускника поющего МГПИ Юлия Глухаря, который внес в педагогику элемент туризма и прочей бродячей романтики; отсюда недалеко было до диссиды́, и приход историка Натана Шаровицкого окончательно перевел двенадцатую в разряд любимейших и опаснейших московских школ. Если бы не академик Колмоходов, взявший ее под крыло и застолбивший тут площадку для своего экспериментального курса геометрии, ее бы, конечно, прикрыли, но Колмоходов когда-то помогал обсчитывать бомбу и имел связи на самом верху. Глухарь все равно был изгнан и уехал, но Шаровицкий привлек учителей-новаторов, создавших тут заповедник коммунарской методики — с психологическими экспериментами, зачатками соционики и деловыми играми. При первых дуновениях перестройки все это накрылось — точней, раскрылось, ибо такие теплицы возникают только в наглухо закрытых помещениях; Шаровицкий умер от инфаркта на третьем заседании съезда народных депутатов, поняв, что ничего не получилось, а школа стала медленно хиреть, пока в 1993 году новый директор, Слюняев, по кличке Сюся, не сдал спортзал под турагентство, а актовый зал под оздоровительный центр с аэробикой. Аэробику преподавала его любовница Малахова, так что дело Железа-Пуза, как видим, жило. А других слов, оканчивавшихся на «зо», в русском языке нет, если не считать заимствованного, но многое объясняющего понятия «садомазо».</p><p class="p1">В 1997 году тут образовался православный лицей, но год спустя из правительства вылетел младореформатор Мец, у которого были в 1996 году особые заслуги, и в утешение ему был дан собственный образовательный проект. Мец быстро все понял и уехал, но на хозяйстве оставил последнего директора, Семенова: это был его метод — находить приличных людей и самоустраняться. Семенов быстро смекнул, что каких бы образовательных новаций ни выдумывали новые лубянские хозяева России, для собственных детей они желали нормального образования, пусть и без всякой идеологии. Семенов набрал замечательных людей, чье присутствие в жизни школьников было ненавязчиво, — почему в своем романе они ни разу и не упомянули этих педагогов, но они ведь и родителей почти не упомянули. Как гласит старинный британский анекдот, мальчик молчал до восьми лет только потому, что все в доме было нормально, а в восемь громко сказал: «Кофе холодный».</p><p class="p1">Теперь перед ними лежали руины Калачёвской школы, которая выжила во времена всех терроров, но не пережила эпохи Великого-Не-Нада, которая могла дышать даже сероводородом, но не умела существовать в вакууме. Благородные народники, безумные рационалисты, религиозные нигилисты, бородатые классики, бритые авангардисты, самодовольные новаторы, вечно оправдывающиеся меньшинства, обреченные гегемоны и прочие ходячие оксюмороны русской жизни рассеялись в этом холодном ветре, в ясном и солнечном дне российского предзимья, и не было ни малейшей надежды, что они кому-нибудь еще понадобятся, ибо такие тысячелетние исторические курьезы не появляются на земле дважды.</p><p class="p1">— Что же, — спросил наконец Лубоцкий. — Что вы нам скажете, Львович?</p><p class="p1">— Литература больше не работает, нужно что-нибудь другое, — ответил Соболев, давно ждавший этого вопроса.</p><p class="p1">— Типа Хабаровска? — уточнил Безносов.</p><p class="p1">— В России все вообще съезжает на Восток, — повторил Соболев любимую мысль, — может, и на Дальний. Но, по-моему, это не очень интересно.</p><p class="p1">— То есть все зависит от нас? — уточнила Лиза.</p><p class="p1">Соболев обвел взглядом своих одиннадцатиклассников, которых постепенно растаскивала в сторону другая жизнь, и не нашел в них никакой единой доминанты. Они были удивительно свободными, но и чрезвычайно конформными; ни от кого не зависели, но ни в ком и не нуждались; умели постоять за себя перед слабыми и отлично ладили с сильными. Они вобрали в себя весь опыт этой страны, семьи и школы и потому были одинаково готовы ко всему. Впервые в истории они действительно могли решить все сами — и точно так же впервые от их выбора ничего уже не зависело.</p><p class="p1">Соболев положил к забору сигнальный экземпляр романа и закурил, впервые не стесняясь детей.</p><p class="p1">— И что делать? — спросила Шергина.</p><p class="p1">— Если бы знать! — усмехнулся Соболев, и все мальчики повторили его восклицание.</p><p class="p1">И это было бы прекрасным финалом, если бы внезапно подошедший человек в камуфляже не сказал им осипшим, но бодрым голосом:</p><p class="p1">— Расходитесь, нечего тут.</p><p class="empty-line"/></span>
