<p class="p">Глава 18</p>
<p class="p">Волнушки</p>
<p class="p">Дарья Бобылева<a href="ch2.xhtml#id54" class="a">[34]</a></p>
</div><p class="p1">Что-то метнулось, глухо рыча, в самой глубине подвала, там, где рассеивался дрожащий луч фонаря и волновались длинные тени.</p><p class="p1">— Кто здесь? — крикнул долговязый парень, неуловимо похожий на Андрея Лубоцкого, но покрасивее и с умилительной ямочкой на волевом подбородке.</p><p class="p1">Кружок света прыгнул вверх, на сырые трубы, и в нем зашипела выхваченная из темноты кошка.</p><p class="p1">— Киса! — вздрогнула холеная девица, отдаленно напоминающая Лелю Абрикосову, только постройнее. — Как же ты нас напугала!</p><p class="p1">Глаза красавца, по неизвестным причинам похожего на Лубоцкого, расширились. Он увидел что-то за плечом прижавшейся к нему девицы. Что-то выглядывало из-за ящиков, оценивало обстановку и примеривалось, а несколько секунд спустя, спрыгнув — или свалившись? — на пол, быстро покатилось к ним.</p><p class="p1">— Люси, беги! — скомандовал красавец, толкая свою спутницу к выходу из подвала. — Встретимся наверху! Беги и не оглядывайся!</p><p class="p1">Красавец перехватил фонарик поудобнее и принял боевую стойку, готовый дать последний и решительный бой тому, что, вспарывая доски и вышибая пар из труб, неслось ему навстречу…</p><p class="p1">— От дебилы! — резюмировал сторож Дыбенко и нажал пробел, застопорив героического юношу в несколько неудобной позе. Похрустел шеей, щелчком раздавил ползущую по ополовиненной бутылке моль, размазал по ногтю серебристую пыльцу.</p><p class="p1">За тюлевым лоскутом занавески пронзительно светила луна, и в ее прохладном свете сторожу чудился высокий, неживой и неумолчный звук, словно кто-то медленно вел скальпелем по дну эмалированного лотка с инструментами. Раньше Дыбенко работал в морге. А еще раньше, в совсем допотопные времена, которые отзывались в памяти только хохотом на переменах и снежным скрипом мела по доске, полтора года отучился в музыкальной школе. Мать заставила и не давала бросить, пока жива была. Мать отзывалась в памяти тающим морковным пирогом. Кажется, только она догадывалась, что туповатый и смурной Дыбенко — синестетик.</p><p class="p1">После того как реновацию Калачёвского квартала — так снос домов и последующая грандиозная стройка были обозначены в официальных документах — приостановили по очередному окрику сверху, всю технику и материалы свезли сюда, в уже огороженный для работ двор дома номер три. Из-за камнееды его оперативно признали аварийным и почти полностью расселили, остались только несколько сумасшедших бабок, которым то предлагаемый этаж был не тот, то в Новые Черемушки не хотелось. Поскольку район был приличный, охранять строительное добро отрядили почти не пьющего сторожа Дыбенко славянской внешности, но бабки все равно остались недовольны. Дыбенко подозревал, что это они по ночам бросают камешки в окно его бытовки и стучат в стены, мешая спать.</p><p class="p1">Да больше и некому было.</p><p class="p1">На кривой пластмассовой двери биотуалета оказалась сломана задвижка. Даже не сломана — ее просто вырвали, оставив в синем пластике звездообразную дыру. «Старушки-разбойницы», — беззлобно подумал Дыбенко и спустил штаны, хотя пришел сюда лишь по малой нужде. «Смотрите, дуры, лишили человека права на законное уединение — любуйтесь теперь».</p><p class="p1">Звенела в черном московском небе ледяная луна, осыпались, шурша, пожираемые каменной плесенью стены, безмятежно журчал Дыбенко. И что-то действительно смотрело на него, голозадого и ни о чем не подозревающего, так удобно упакованного в синюю пластмассовую коробку. Смотрело, оценивало обстановку и примеривалось.</p><p class="subtitle">* * *</p><p class="p1">Аня Шергина привыкла не робеть перед особенными людьми. Кто только не возникал перед ней, когда она стояла рядом с папой, благоухающим парфюмерной водой <em>Clive Christian</em> и крепким по́том, и кивала под добродушное рокотание: «Анечка, дочь, дочка моя, Анюта…» Многих таких людей Аня часто видела в новостях, в гулявших по школьным чатам антикоррупционных роликах, в клипах и разоблачительных видео из телеграм-каналов. Одну красавицу-певицу даже убили, засунули в чемодан и утопили в Строгинской пойме, причем провернул все тот самый шустрый старичок из строительного департамента, с которым Аня в первый и последний раз видела певицу живой.</p><p class="p1">Но рядом с этим человеком было все-таки как-то не по себе. Странно было оттого, что он не в телевизоре, сейчас не двенадцать ночи, пьяненькая мама не держит бокал за хрустальную ножку, а за панорамным окном не сыплет пушистый нерусский снег. Вспоминалось и еще что-то — вода, зыбкие фигуры в полутьме, склизкое весло… это, наверное, был сон, образы ускользали при малейшей попытке их задержать, и все почему-то заглушала песня: «Но мой пло-о-о-от…» В том сне рядом был папа.</p><p class="p1">— …Или вот отец ваш, Павел Николаевич, — продолжал человек, которого проводивший их сюда Генерал подобострастно называл Хозяином. — О нем что скажете?</p><p class="p1">— Можно мне к нему? — быстро, глядя в пол, попросила Аня. — Пожалуйста…</p><p class="p1">Все произошло так быстро, что она даже не поняла, в какой именно момент оказалась тут, наедине с Хозяином. Они все вместе шли по коридору, бодрились, нервно пересмеивались; впереди умиротворяюще позвякивал орденами генерал, точно вожак стада — колокольчиком. И вдруг кто-то схватил Аню под локти, отскочил от стен начальственный окрик, вскрикнула Лиза Дейнен… А дальше — сияющий, хоть и тесноватый кабинет, янтарный паркет, новогодний лик напротив. И бесконечные, подробные, с какой-то следовательской ехидцей — может, показалось все-таки, а может, профдеформация у человека, успокаивала себя Аня, — и со следовательским же упорством задаваемые вопросы. Все они были про Аниных друзей — про Безносова, про Дорохова, про Дейнен, про Лубоцкого, про Васю Селезнева. И самые неожиданные детали вдруг вызывали у Хозяина неподдельный интерес, вроде той, что Петя Безносов до недавнего времени пользовался допотопным бабушкофоном.</p><p class="p1">— Хм, это такой, с кнопками? — оживился Хозяин, быстро записывая что-то в блокнот. — Школьник пятнадцати лет, центр Москвы, престижная школа, активная социальная жизнь — и телефон с кнопками? А шапки такой меховой, круглой у него нет? Шарф, может, мохеровый? Нет? Хм. Он, случайно, не любит иногда пожевать гудрон? Что? Что такое гудрон? Не знаете? Это хорошо. А он знает? Хм. А карбид? Петр никогда не предлагал бросить в школьный туалет карбид?</p><p class="p1">И так до бесконечности, про каждого. Аня то бледнела, то пламенела ушами, ужасаясь: ну что, что же вы такое натворили, что вы задумали, в чем вас обвинить хотят, подполье у вас какое-то, что ли, тайное общество, декабристы с Калачёвки, революционеры, пахнущие мамиными котлетками, глупенькие, ну почему же вы мне не сказали, не доверяли, да? А спустя минуту сама же млела от собственного отчаянного героизма: ничего ему не скажу, никого не сдам, никогда. Смотрела на Хозяина решительно и страдальчески, напрочь забыв о том, что сдавать некого и ничегошеньки она не знает.</p><p class="p1">Но когда Хозяин упомянул отца, ноги у Ани стали ватными. Она лепетала что-то, надеясь скрыть замешательство. Она очень любит папу, папа много работает, видятся они, конечно, нечасто, но папа хороший, все ей покупает, у нее все есть… Да, из-за этого строительства у нее были проблемы с одноклассниками и с самим папой тоже, это очень сложная история… Но папа хочет сделать Москву лучше, современнее, ведь город меняется, а Калачёвка старая, и один раз у них в гимназии даже кусок штукатурки упал с потолка пятикласснику на голову.</p><p class="p1">— А политические взгляды вашего отца вам известны?</p><p class="p1">Сердце сосулькой ухнуло вниз. Аня смотрела на паркет.</p><p class="p1">— Говорите. Он наверняка учил вас говорить только правду.</p><p class="p1">Аня кивнула.</p><p class="p1">— А еще наверняка он регулярно обсуждал с вами свои политические предпочтения.</p><p class="p1">«Кажется, я снова кивнула», — запаниковала Аня. Нет, нет, показалось. Нет, кивнула, по инерции.</p><p class="p1">— Давайте подытожим: у нас имеется богатейший Павел Николаевич, любящий отец с прогрессивными взглядами, которые он регулярно обсуждает с малолетней дочерью…</p><p class="p1">— Сейчас уже нет, — выпалила Аня и сама себе зажала рот.</p><p class="p1">— Тем более, конечно. Сейчас безопаснее так. Да и как вы пойдете против отца-либерала, кто же будет олицетворять затхлое прошлое для вашего подросткового бунта? Но он продолжает оплачивать все ваши прихоти. И не задает лишних вопросов: ведь он постоянно занят. Он строит нашу похорошевшую столицу. Хм. Что именно он, кстати, уже построил?</p><p class="p1">Аня попыталась вспомнить названия элитных комплексов, гостиниц, но в голове была звонкая пустота.</p><p class="p1">— Он просто строит, в метафизическом смысле. Он царь и демиург. Он все вам позволяет. Хм. Он заварил всю эту кашу со сносом Калачёвского квартала именно в тот момент, когда вас затянула школьная рутина. Появились первые признаки депрессии, вам так хотелось событий, опасностей, куража… Задумайтесь, Анечка. Анечка?</p><p class="p1">Аня подняла голову. По щекам бежали быстрые холодные слезы.</p><p class="p1">— Задумайтесь: а на самом ли деле это ваш отец? — торжественно закончил Хозяин и достал из кармана бабушкофон — в точности такой же, как у Пети Безносова. — Осип Алексеевич? Да, готовы. Подать сюда труп.</p><p class="subtitle">* * *</p><p class="p1">Сторож Дыбенко не мог пошевелиться. Что-то еще податливое, но ощутимо твердеющее обхватило все его тело. Ныли неудобно согнутые конечности — Дыбенко был подвешен в тяжелой плотной массе в позе эмбриона. Мокрая пленка облепила лицо, она пахла теплым мучным клейстером — недавно Дыбенко научил своего мелкого варить такой клейстер; бывшая потом орала, что он заклеил в доме все, а недособаке породы чихуахуа пытался влить клейстер под хвост, чтобы больше не надо было выгуливать.</p><p class="p1">Дыбенко замычал в приступе полусознательного смеха. Пленка отклеилась от лица и повисла на подбородке тяжелым лоскутом.</p><p class="p1">— Зина! — сказал дребезжащий голос. — Зина, ну кто так клеит?</p><p class="p1">Разлепив наконец залитые клейстером веки, Дыбенко увидел перед собой одну из тех чертовых бабок, которые отказывались покидать свои квартиры в доме номер три. Бабка смотрела на него так, как обычно смотрят на кровавое пятно от неудачно раздавленного комара.</p><p class="p1">— Зина, ну до чего ты неаккуратная! И тот у тебя торчит, и этот отклеился!</p><p class="p1">Взглянув туда, куда показывала ворчливая бабка, Дыбенко обмер — из стены напротив торчали слабо шевелящиеся человеческие кисти, а повыше кистей из полосатых бумажных обоев смотрело вполоборота лицо. Ввалившийся воспаленный глаз бешено косился на Дыбенко, дергался свободный край губ.</p><p class="p1">Дыбенко отчаянно забился, но движения его были скорее воображаемыми.</p><p class="p1">— Тихо, миленький, тихо, — смягчилась бабка и наклеила кусок полосатых обоев обратно сторожу на лицо. — Никто еще не уходил, и ты не уйдешь.</p><p class="p1">— Готовы, Нина Пална? — спросил другой голос, тоже старушечий, но более мягкий, грудной.</p><p class="p1">— Готовы. Этот последний.</p><p class="p1">— А точно годится? С тем-то, с дворником, помните, что вышло?</p><p class="p1">Дворник, смиренный гастарбайтер в шапочке и с непроизносимым именем, пропал неделю назад. Дыбенко искал его, чтобы подмел вокруг бытовки, а старухи сказали, что он тут больше не работает. Дыбенко опять замычал, набрать в грудь воздуха для полноценного вопля не получалось.</p><p class="p1">— Не годится, Зиночка, чтобы обои отваливались. А этот годится. Внешность славянская, по материной линии москвич в третьем колене, черных кровей нет. Хороший парень, питательный.</p><p class="p1">Хлопнула дверь, зашаркали ноги — одна пара, две. Невидимая комната вокруг Дыбенко наполнилась голосами.</p><p class="p1">— Клавдия Семеновна… Ирочка, вот так сюрприз!.. Валентина, вы принесли свечи?</p><p class="p1">Наконец стало тихо, запахло открытым огнем — еще слабым и безопасным, с привкусом праздничного торта. Дыбенко вспомнил об оставшейся там, в его далеком и уютном дворовом гнезде, ополовиненной бутылке, и бессильная ярость вспыхнула в стиснутой груди. Что-то в толще изъеденной плесенью стены поддалось, буквально на миллиметр, и Дыбенко, со свистом втянув воздух, закричал долго и матерно.</p><p class="p1">— Восстань, великий, — ответил ему хор старушечьих голосов. — Восстань, древний. Восстань, многоглазый улей, вместилище жизни. Восстань, великий…</p><p class="subtitle">* * *</p><p class="p1">Дверь отворилась, и люди с неприметными лицами ввезли в кабинет больничную каталку, накрытую розовым детсадовским одеялом. Под одеялом угадывались продолговатые контуры. Хозяин кивнул неприметным, которые тут же выскользнули обратно в коридор, и поднял одеяло.</p><p class="p1">Аня взвизгнула, увидев на скользком дерматине бледного и спокойного, раздетого до тугих боксеров Ивана Курагина, звезду молодежного театра «Беспечная улица», которому Давид Чхония в режиссерском экстазе пророчил место в Большом, хотя ни петь, ни танцевать бедный Гамлет не умел. Хозяин взял Курагина за подбородок, повернул голову в одну сторону, потом в другую — труп, как видно, был совсем свежим — и свободной рукой поманил к себе Аню:</p><p class="p1">— Подойдите ближе, не бойтесь. Что же вы так позеленели? К смерти надо приучать себя с детства, все мертвыми будем.</p><p class="p1">Вблизи Курагин казался еще более бледным, почти прозрачным. Пересиливая ужас, Аня пригляделась и поняла, что, в общем-то, и не казался: его уши действительно были полупрозрачными, словно медузы, а сквозь пальцы проступал шероховатый дерматин каталки. Аня вопросительно посмотрела на Хозяина и увидела на его новогоднем лике улыбку.</p><p class="p1">— Технически он даже не мертвый, Анечка, потому что его вообще никогда не было. Это волнушка. Специалисты наши их так прозвали. В данный момент — волнушка в стадии полураспада, они не сразу исчезают. Хм-хм… С этим персонажем все сразу понятно было. Ваш грузинский коллега мечтал об идеальном актере — и вот он, пожалуйста. Только играть и умел, для того и возник. Вы не в актерском, скажем так, амплуа его видели? Вот и пожалуйста. Голая функция. С другими посложнее, конечно.</p><p class="p1">Аня в детстве гуляла с бабушкой в лесу под Парголово и знала, что волнушки — это такие грибы, розовые, с приятно махровыми краями вогнутой шляпки. Бабушка надрезала наманикюренным ногтем грибную мякоть, показывала Ане капли млечного сока и говорила, что волнушки роскошны в холодной засолке. Аня отчетливо вспомнила бабушкин голос и с трудом поборола внезапное желание царапнуть ногтем щеку Курагина, чтобы посмотреть, не проступит ли сок. Наверное, вид у нее стал при этом совсем уж безумный, потому что Хозяин пододвинул стул:</p><p class="p1">— Садитесь, Анечка. Я вам все сейчас объясню.</p><p class="p1">И объяснил, хмыкая и покашливая, точно сам считал нужным отреагировать на свои особо удачные реплики. Хлопая заплаканными глазами, Аня слушала про то, что под Калачёвским кварталом враги — а может, и не враги — с незапамятных времен спрятали — а может, и не спрятали — источник психотропного излучения, ныне известный как Волна. И соответствующим службам давно понятно, что под воздействием Волны люди впадают в так называемое волновое помешательство, самая безобидная форма которого — уход в мир безумных фантазий. Петя вообразил себе отца-олигарха и сказочное богатство, Дейнен — сверхъестественные способности, сама Аня — путешествие с отцом по подземному Стиксу… Но не так давно специалисты выяснили, что все еще хуже. Галлюцинации тех, кто слишком долго находился под воздействием Волны, оказались способны буквально воплощаться в реальность. Опергруппа побывала в воображаемой квартире Безносова и обнаружила, что она действительно существует, хотя и находится по причине длительного отсутствия своего хозяина в стадии распада. Такие фантомы, прозванные волнушками, попадаются в районе Калачёвки повсеместно. Волнушкой может оказаться что угодно — предмет, помещение, но чаще всего это человек. Любящая супруга, заботливый отец, талантливый молодой актер, таинственный преследователь-двойник, помогающий почувствовать себя значимым, — тот, кого так отчаянно не хватает бредящему для счастья. Тайные желания — штука сложная и запутанная, часто безумец сам оказывается не рад тому, кого вызвал. Как сама Аня была совсем не рада Эрике — волнушке в стадии формирования, так и не успевшей покинуть пределы ее воображения…</p><p class="p1">— Эрика была волнушкой?..</p><p class="p1">— Мистическая шпионка, возникшая в тот момент, когда на вас совсем перестали обращать внимание? Говорящая на немецком с ошибками? <em>Nabelküsser ist tot</em>, Анечка. <em>Tot</em>, а не <em>tod</em>. В немецком произношении разница очень хорошо слышна. Вам простительно, вы же английский изучаете, а Эрика знать больше вашего не могла. На таких мелочах они и прокалываются. На несоответствиях вроде… как вы сказали? Вроде бабушкофона у ученика престижной московской школы.</p><p class="p1">— Но вы же сказали, что Петя сам создал волнушку! Квартиру! Не может же…</p><p class="p1">— В том и беда, Анечка, что может. Волнушки не знают, что они фантомы. Обретя достаточную… хм, материальность, они начинают обрастать собственными волнушками. И так до бесконечности. Возможно, весь Калачёвский квартал полностью находится в воображаемой реальности, неотличимой от нашей и вступающей с ней в неизвестно чем чреватое взаимодействие. Возможно, воображаемая реальность уже вышла за его пределы. Возможно… — Хозяин поперхнулся. — Анечка. Вы два года провели в Швейцарии. Что там было? Что вы помните?</p><p class="subtitle">* * *</p><p class="p1">Слишком много их он видел, осязал, вдыхал их гнусные солоноватые испарения. Слишком долго терпел, пока они наплачутся, наедятся, налюбятся и станут наконец спокойными продолговатыми предметами. Такими их можно было терпеть, такие слоями лежали там, внизу, откуда шло живительное подземное сияние, и питали его. Обрывки их сереньких душ сливались в единую, могучую и огромную его собственную душу. Потому он и терпел, наливаясь их жизнями, познавая их разумом. Он сам взращивал их, как муравьи терпеливо взращивают тлю.</p><p class="p1">Но теперь они захотели его убить. Поселили в нутро болезнь, разрушающую плоть, притащили свои тарахтящие пыточные инструменты. Задумали поставить на его место другого, как будто они здесь решали, как будто они были главными.</p><p class="p1">Хорошо, что у него были верные рабыни-служительницы, из поколения в поколение передававшие священное знание: главное — хранить очаг, беречь дом, тут их место и счастье. Они подлатали его изъеденную болезнью плоть теплыми телами своих собратьев, насытили его их жизнями — родными, узнаваемыми, от чуждых у него случалось несварение, — и теперь смиренным хором взывали:</p><p class="p1">— Восстань, великий! Восстань, многоглазый улей, вместилище жизни!</p><p class="p1">Дом номер три распахнул окна и издал оглушительный рев.</p><p class="subtitle">* * *</p><p class="p1">— Ну что, понимаете теперь, что вы… что мы все натворили? Под воздействием Волны этой проклятой, а? Понимаете, что если не разберемся, кто из нас человек, а кто волнушка дрожащая, то все, все погибнем, Анечка? — Лицо Хозяина кривилось в разные стороны, нос по-мышиному подрагивал. — А у меня и вовсе теорийка одна есть. Подойдите сюда, Анечка. Аннушка. Анюточка. Вы не бойтесь, хм…</p><p class="p1">Он придерживал коротенькими пальцами край золотистой казенной занавески и косился на улицу. А там, снаружи, слышался отдаленный тяжкий грохот.</p><p class="p1">— А что, если все мы тут волнушки, Анюточка? Одного поля, мнэ-мнэ, грибочки? Вы у нас девушка со странностями, но ведь и я, если начистоту говорить, какой-то странный. Я уж и помирал, и тонул, и пророчествовал, и чего только не творил. А может, ни вас нет, ни меня нет, ни России нет уже? А? Это же конец света, Аннушка. А? И из чьей головы мы все растем в таком случае, как вы думаете-с? Со словоерсами заговорил — видите, как все сбоит нынче в реальности, данной нам в ощущении? А что, если из вашей? Может, вы-то, Анечка, и есть наша мессия, вон и бледненькая вы, и личико иконописное вполне, испитое. Да не возмущайтесь вы, племя младое, необразованное, это значит, что изможденное у вас личико, а не как у бомжихи… <em>Nabelküsser ist tot</em>. А <em>Tod</em>, как волнушка ваша вещала, — это по-русски смерть, Анечка. Все умрем, все в галлюцинациях чужих потонем, если не узнаем, откуда все это растет, понимаете, Анечка? А может, вы-то все это и остановите, если мы в вашей голове сидим!</p><p class="p1">«Совсем с ума сошел, — подумала Аня, глядя на его бледное, тоже, как у мертвого Курагина, словно прозрачнеющее лицо. — Как по-немецки „сумасшедший“? Кажется, <em>verrückt</em>. Кажется, в этот раз без ошибок…»</p><p class="p1">И она наконец посмотрела туда, куда так упорно показывал Хозяин, — в окно.</p><p class="p1">На горизонте зеленел Калачёвский квартал — она всегда узнавала его по чудом сохранившимся тополям и церковной маковке. Над кварталом вздымался столб пыли, и что-то огромное ворочалось там, оглашая город многоголосым ревом. «Это Ктулху, — подумала Аня. — Они разбудили Ктулху».</p><p class="p1">— Вы на главный вопрос ответьте, Анечка, — засвистел ей на ухо Хозяин. — Сами-то вы кто? Помните Швейцарию? Два года в гипсе? Неназываемая болезнь позвоночника?</p><p class="p1">Похоже, Ктулху, ломая асфальт, шагал к ним. Аня рассеянно кивнула.</p><p class="p1">— Вы вообще из Швейцарии возвращались? — шепот стал почти беззвучным. — Или вас здесь никогда и не было?</p></span>
