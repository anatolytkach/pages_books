<p class="p">Глава 9</p>
<p class="p">Немощь</p>
<p class="p">Александр Феденко<a href="ch2.xhtml#id17" class="a">[20]</a></p>
</div><p class="p1">— Что-что она лечит? Повтори.</p><p class="p1">— Свищи и прыщи.</p><p class="p1">— Свищи и прыщи?! Граф ты мой Толстой… — Лубоцкий нырнул в пену «Адам и Ева», но тут же всплыл перед лицом Дейнен и сообщил: — В мясные лавки Мытищ уже тянутся люди за твоим бессмертным романом. Жителям самих Мытищ приходится переться в Чертаново, чтобы встать в конец очереди.</p><p class="p1">— Тебе это нравится? — Лиза, не сводя глаз с Лубоцкого, двумя пальчиками взяла один из листов рукописи, на котором зияло: «Предлагаю сдаться».</p><p class="p1">Лубоцкий разогнал пену и осмотрел открывшееся.</p><p class="p1">— Сам Федор Михалыч не написал бы лучше.</p><p class="p1">Лист полетел в ванну. Дейнен взяла другой:</p><p class="p1">— Нравится?</p><p class="p1">— Божественное явление Настасьи Филипповны Герасиму. У Мумы эпилептические припадки. — Он подмигнул. — Множественные.</p><p class="p1">Второй лист последовал за первым.</p><p class="p1">— Тебе нравится?</p><p class="p1">— Кругосветный круиз по Бирюлеву с лекциями о гигиене.</p><p class="p1">Еще один отправился на дно. Лубоцкий сиял мириадами мыльных пузыриков.</p><p class="p1">— Первый канал. Ростовые куклы свища и прыща. Прайм-тайм!</p><p class="p1">Следующий.</p><p class="p1">— Премия имени Флеминга по литературе.</p><p class="p1">Дейнен остановила процесс топления бессмертного:</p><p class="p1">— Какого Флеминга?</p><p class="p1">— Того, конечно. Не этого же.</p><p class="p1">Остатки рукописи посыпались в воду.</p><p class="p1">Лиза встала, перешагнула край ванны, обернулась к Лубоцкому:</p><p class="p1">— Это не мой текст!</p><p class="p1">— А чей, Чехова? Конечно! Это же чистый Чехов.</p><p class="p1">Она замоталась в огромное полотенце.</p><p class="p1">— Я нашла рукопись в почтовом ящике.</p><p class="p1">Лубоцкий замолчал, неспешно затонул, пена недолго поволновалась иллюзией бури, но стихла, успокоившись. Лиза вышла.</p><p class="subtitle">* * *</p><p class="p1">— Чувствуешь, какое в этом всем бессилие?</p><p class="p1">— Ты про текст? — Лубоцкий поправил плед на пригревшейся рядом Лизе. Поленья в камине взволнованно засипели, мокрая бумага, разложенная тут же, испускала пар и душноватый запах «Адама и Евы».</p><p class="p1">Лиза повернулась:</p><p class="p1">— Я про все. Про нас, про то, что дом Глюкозы и Дорохова уже расселяют, а мы ищем спасение в старых фотографиях и марках, в сто лет назад ушедшей под землю кирпичной кладке. Взрослые смирились и пишут петиции о милости тем, для кого сама наша жизнь — лишь пена для ванны и кто давно уже вынул пробку. И да, текст — та же немощь… Это не «Воблер и кость», это даже не «Война и мир». Сплошные «Свищи и прыщи».</p><p class="p1">— Ты драматизируешь и сама знаешь почему. Через неделю пройдет. А «Прыщи» — работа Чичикова, это даже покойному Пушкину понятно было, он оттого и застрелился.</p><p class="p1">— Через неделю Дорохов поедет жить в Капотню. Чичиков тут ни при чем. Это безумие совсем другой выдержки. Такое могла бы накатать ее маман, мучаясь невостребованностью глубин и широт своей бессмертной души. Мессианские фантазии про лечение прыщей околоплодными водами так просто не возникают.</p><p class="p1">— Ты права. Она прошла ад каннских притонов, потом ее долго и безуспешно лечили Швейцарией. Страшно подумать, сколько ей лет на самом деле. Если Чичиков выпал из реальности на два года, то ее маман сейчас не меньше ста пятидесяти по юлианскому календарю. Шергин и не догадывается, с какой археологической развалюхой проводит свой интимный досуг.</p><p class="p1">— Типичная ведьма. Иначе откуда ей знать подробности происходящего в классе?</p><p class="p1">— Ну, в ее беллетристике больше фантазий, чем реальности, впрочем, знакомство с деталями налицо. Наверняка почитывает наш чатик, да и Анечка делится. Гнилая семейка, как ни крути.</p><p class="p1">— Как ни крути, а ради спасения обреченного в границах Калачёвки человечества надобно маму Анечки убить и в ее лице — весь порожденный ею же бред.</p><p class="p1">— Убить? Насовсем?</p><p class="p1">— Нет, до пятницы. Что за вопрос?</p><p class="p1">— И… как ты это осуществишь?</p><p class="p1">Бархатным переливом забили каминные часы. Лубоцкий вздохнул.</p><p class="p1">— Пора собираться, сейчас Безнос вернется.</p><p class="p1">Встал и принялся искать одежду.</p><p class="subtitle">* * *</p><p class="p1">— Есть одно затруднение.</p><p class="p1">Лубоцкий молча шел по сыпавшейся желтым Москве, пиная вальсирующие листья.</p><p class="p1">Дейнен пояснила:</p><p class="p1">— В романе для подростков нельзя просто так взять и убить человека.</p><p class="p1">— А ведьму?</p><p class="p1">— Ведьма по законодательству — тоже человек.</p><p class="p1">— Тяжело быть писателем.</p><p class="p1">— Вот-вот.</p><p class="p1">Лязгнул трамвай, они, не сговариваясь, перебежали улицу, влетели в вагон, садиться не стали.</p><p class="p1">— А что, если она не переживет мук душевного разложения и бросится под поезд, как Раскольников?</p><p class="p1">Старушка в кроссовках со шнурками цвета крыжовника откровенно уставилась на них, прислушиваясь.</p><p class="p1">— Нет, пропаганда выпиливания тоже запрещена.</p><p class="p1">— Пусть ей на голову упадет кирпич, пораженный камнежоркой, — предложил Лубоцкий, разглядывая старушку сверху вниз. — Наверняка эту камнежорку навела она же.</p><p class="p1">— Лубоцкий, это немощь — перекладывать бремя действий на случай и кусок черствой глины. Это капитуляция. А я ведь знала тебя сверхчеловеком.</p><p class="p1">— Хорошо, что напомнила. Кстати, как насчет дуба?</p><p class="p1">— Под которым ты желуди Наташе на уши вешал?</p><p class="p1">— Именно.</p><p class="p1">— Прекрасный был дуб, но ушел корнями в Толстого и засох.</p><p class="p1">— Да, русская литература и граф в частности многим жизнь запоганили, но дело не в них, а в дубе. Пока его не спилили и он досасывает Толстого, повесь на этом дубе Анечкину маман.</p><p class="p1">Дейнен изумленно оглядела Лубоцкого. Старушка тоже.</p><p class="p1">— Ты гений, Андрюша.</p><p class="p1">— Не отвлекайся на обыденное. Понимаешь, к чему я? — Разговаривая с Лизой, Лубоцкий смотрел на старушку. — Место преступления закроют. Дуб не спилят, пока идет следствие. А снести дороховский дом, не обрушив его на дуб, никак не получится. Стратегически — пустяк, но тактическая отсрочка нам не помешает.</p><p class="p1">Трамвай остановился, ребята вышли.</p><p class="p1">— Но они скоро сообразят и переключатся на следующий дом. — Лубоцкий стал серьезен. — Например, на наш.</p><p class="p1">Дейнен повисла на его руке:</p><p class="p1">— В любом случае это займет время и заставит их нервничать, а значит, совершать ошибки.</p><p class="p1">Трамвай поехал дальше, старушка со шнурками цвета крыжовника внимательно осмотрела удаляющуюся в осеннем воздухе пару, суетливо достала телефон и позвонила.</p><p class="subtitle">* * *</p><p class="p1">— Вот скажи, Андрюша, если Толстой и Достоевский будут биться — кто победит?</p><p class="p1">— Пункт приема макулатуры победит.</p><p class="p1">— А папенька говорил, что Чехов.</p><p class="p1">— У тебя был папенька? — Лубоцкий покрылся изумлением.</p><p class="p1">— Не был, конечно, но я его выдумала, а то больно уж тяжело без папеньки.</p><p class="p1">— И кто он?</p><p class="p1">— Сварщик.</p><p class="p1">— Сварщик — любитель Чехова?</p><p class="p1">— Ну, Чехова он вспоминал только выпивши.</p><p class="p1">— И часто вспоминал?</p><p class="p1">— Постоянно. Как встанет с утра, так уже весь «в Москву, в Москву — на Курский вокзал». Там и зарезали. Пришел домой весь зарезанный, с жасминами в руках. А через неделю помер в Астапове не пойми от чего.</p><p class="subtitle">* * *</p><p class="p1">— Понял, мы тут рядом. — Толстощекая морда с рыхлым носом повернулась к водителю: — Езжай на Большой Трофимовский, видели их недалеко от бывшей водокачки.</p><p class="p1">Машина развернулась через две сплошные и, не обращая внимания на гудки, направилась в сторону Калачёвки.</p><p class="subtitle">* * *</p><p class="p1">— Надо позвонить Шерге и сказать, чтобы устроила вечеринку прощания с маман.</p><p class="p1">— Зачем?</p><p class="p1">— Гуманизм, толстовство, все такое. Как-никак, последние дни в семейном кругу, идиллические воспоминания, торт «Наполеон» с чаем. Наконец, долгожданные скелеты в шкафу, который придется открыть, чтобы взять теплые носочки для прогулки по Стиксу, там осенью дует. Торжество, хлопушки, проводы.</p><p class="p1">— Андрюша, не будет никакого Стикса, если мы не придумаем, как усадить ее в лодку.</p><p class="p1">— Ах да, литературные «затруднения». По-моему, это сущие пустяки, ничто не мешает тебе пропустить описание убийства и предъявить читателю уже готового повешенного.</p><p class="p1">— Убивать, с некоторыми оговорками, как раз никто не запрещает. Нельзя описывать способ убийства.</p><p class="p1">— Изъясняйся яснее.</p><p class="p1">— Смотри: можно предъявить труп, висящий на дубе, но говорить, что он был повешен, нельзя.</p><p class="p1">— То есть вешать можно, а говорить об этом нельзя?</p><p class="p1">— Именно!</p><p class="p1">— Счастье мое, это шизофрения.</p><p class="p1">— Это закон, Андрюша.</p><p class="p1">— Одно и то же, впрочем, неважно. — Лубоцкий, не останавливаясь, обнял длиннющей рукой крохотную Лизу и, согнувшись, поцеловал, попав губами в затылок. — Записывай: «На старом высохшем дубе висел труп женщины, умершей от неизвестных причин».</p><p class="p1">Лиза достала блокнотик имени Конька-горбунка и записала.</p><p class="p1">Слева медленно проехала полицейская машина, остановилась метрах в пятнадцати, из нее с трудом выбрались двое в форме. Один — толстый, второй — очень толстый, его туловище было перетянуто ремнем так, что бо́льшая часть находилась сверху. Казалось, отпусти пряжку — и весь он тут же вытечет через штаны на асфальт. Они грузно и как бы рассеянно двинулись навстречу. Лубоцкий и Лиза отклонились в сторону, но перетянутый с напарником преградили им путь. Андрей оглянулся: сзади приближалась еще одна столь же очаровательная парочка.</p><p class="p1">— Пойдете с нами, — сказал перетянутый. Когда он произносил слова, лицо его оставалось неподвижным, только губы жирными червями шевелились вокруг рта, как отрезанные пальцы брадобрея.</p><p class="p1">— Спасибо за приглашение, но у нас уроки еще не сделаны, приходите завтра, — отозвался Лубоцкий.</p><p class="p1">— А мне мама не разрешает ходить с незнакомыми уродами, — добавила Лиза. — Впрочем, я с уродами и сама как-то не очень.</p><p class="p1">Резиновая дубинка скосила Лубоцкого, пройдясь сзади по ногам. Вторая выела часть спины. Дальше удары пошли по голове, Лубоцкий закрылся руками, молча терпя и выжидая. Лиза закричала и бросилась на ближайшего, но кто-то уже держал ее сзади, бесцеремонно лапая и выкручивая руки.</p><p class="p1">Прохожие, издали завидев акт торжества правопорядка, заранее обходили, отворачивались и ускоряли шаг. Некоторые, напротив, останавливались, хотя и на расстоянии, и наблюдали, кто-то снимал на телефон.</p><p class="p1">Старушка в нестерпимо коричневых шнурках громко объясняла:</p><p class="p1">— Провокаторов поймали! Школу хотели взорвать!</p><p class="p1">Когда краснеющее небо опрокинулось и стало закатываться куда-то вбок и Лубоцкого поволокли к машине, он извернулся, ища глазами Лизу, но вместо нее увидел спрятавшегося в редеющей толпе мужичка лет тридцати, лицо которого сверху было скрыто ерепенистой бороденкой, а снизу — шапочкой с большой буквой M. Или это W, пытался сообразить Лубоцкий, смутно догадываясь, что «верх» и «низ», как и все прочие ориентиры в жизни человека, — понятия бесконечно зыбкие.</p><p class="subtitle">* * *</p><p class="p1">Лизы в машине не было, Лубоцкого впихнули на заднее сиденье, лицом вниз, с застегнутыми за спиной руками. Лежать так было невозможно, все тело сразу превратилось в одну большую боль. Он начал медленно поворачиваться. Губастый обернулся, вяло ударил Лубоцкого в печень, отчего сам окончательно выдохся и растекся. Лубоцкий помедлил и продолжил, пока не увидел перед собой сизый потолок с выжженными сигаретой литерами «Б» и «Л». Громко засмеялся.</p><p class="p1">— Эй, доходяги, закурить найдется?</p><p class="p1">Губастый покосился, оценивая силы на удар, но зазвонил телефон, и он не без облегчения в глазах потянулся за трубкой.</p><p class="p1">— Да, на Малом Трофимовском… Понял, едем. Сверни в Калачёвский и к кинотеатру.</p><p class="subtitle">* * *</p><p class="p1">Взвизгнула и смолкла сирена. Лубоцкий оттолкнулся ногами от двери, пытаясь приподняться и выглянуть наружу. Когда они затормозили, вокруг уже стояло несколько бесшумно мигающих машин. В одной из них он увидел лицо Лизы, загнанное, беспомощное. Лубоцкий забил ботинками в окно, но Лиза смотрела не на него, а куда-то наискось, не отрывая глаз от чего-то неведомого Лубоцкому. Полицейские тоже смотрели туда. Он вывернулся. Люди стояли рядом, будто придавленные.</p><p class="p1">На старом высохшем дубе висел труп женщины, умершей от неизвестных причин.</p><p class="p1">На левой ноге ее болталась кроссовка, вторая валялась на земле. Руки и ноги связаны двумя оранжевыми шнурками.</p><p class="p1">Один из зевак поднял руку, показывая куда-то выше, намного выше, попятился и вдруг бросился в сторону. Другие тоже начали разбегаться. В лобовое стекло машины с невероятной силой, взорвав тишину ожидания оглушающим ударом, влетел кирпич.</p><p class="p1">Толстый и очень толстый задергались, словно в припадке. Лиза увидела Лубоцкого и закричала.</p></span>
