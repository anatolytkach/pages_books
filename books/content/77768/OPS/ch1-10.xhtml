<p class="p">Глава 7</p>
<p class="p">У Петра</p>
<p class="p">Елена Нестерина<a href="ch2.xhtml#id23" class="a">[17]</a></p>
</div><p class="p1">Миллионер Петр Безносов перестал быть миллионером. Первая же пицца, доставленная на дом, превратила семизначную цифру на его счету в шестизначную. 999 тысяч 501 рубль… — бесстрастно вспыхивал экран телефона, 998 тысяч 139 рублей…</p><p class="p1">То и дело раздавался звонок домофона, хлопала дверь, вносилась новая заказанная еда, на телефон приходила отбивка: еще, господин хороший, снялось с карточки, еще, еще.</p><p class="p1">Он впервые устраивал прием. Да к тому же в собственном доме. Это оказалось делом приятным, тем более что ловкости его рук не потребовалось: соседка по парте Леля Абрикосова раздобыла номер телефона — и, как только Петр вошел в свою квартиру, из кейтеринговой службы приехали два официанта с набором еды и предметами сервировки. Красотой и статью они переплюнули горничную Ани, единственное, что смущало, — одеты и экипированы они были для пижамной вечеринки. Потому что рассеянная Леля ткнула пухлым пальчиком не в ту строку меню — и не заметила этого. Петр заказал коктейль-пати, а получил пати в костюмах для сна и отдыха. Со смущением справились быстро: каждый гость сообщил, что он будет есть, где это заказать, — и со всех концов Москвы в Колпачный переулок устремилась еда.</p><p class="p1">Быть богатым и ни в чем не отказывать друзьям Пете понравилось. Появился смысл обмена кнопочного телефона на усиленный паутинной связью.</p><p class="p1">Но. Пока все собирались и рассматривали интерьеры, хватались за сабли, бодались с бивнем и крутили виниловые пластинки, Безносов… гнал от себя мысль, что ему жалко тратить деньги! Что хочется скорее начать их преумножать, чтобы вернуть подкинутую на карманные расходы заветную цифру 1 000 000, сделать из нее 2 000 000 и дальше, дальше… Пока это он вступит в наследство! Сейчас, надо сейчас.</p><p class="p1">Он не узнавал себя, мысленно вглядывался в свое новое положение — и тысячи состояний проносились через его трепетную душу.</p><p class="p1">Очередной звонок домофона отвлек от смущающей мысли. Петя вздохнул с облегчением: Скруджем быть не хотелось…</p><p class="p1">Вошли одновременно курьер с коробкой суши для Батайцевых и непривычно стеснительный Селезнев, в последний момент все-таки решивший прийти…</p><p class="p1">…Все артефакты, выложенные Безносовым для осмотра, были изучены. И конверты с записками, и каталоги, и марки, и начатое таинственное письмо, и фотографии альбомами-россыпью-пачками, и блокноты Безносова-отца. Раз оставлены наследнику — значит, изучать можно.</p><p class="p1">Осмотреть осмотрели, но яснее не стало. Сначала казалось, что можно быстро схватить все улики за хвосты, приладить их друг к другу, а потом столкнуть лбами — вот смысл и появится. Но он не появился…</p><p class="p1">И тогда слово взял Федор.</p><p class="p1">— Мы собрались, чтобы связать все ниточки того, что происходит с нами, нашей школой и кварталом. Становится ясно, что и сейчас, и, наверное, в будущем всегда среди нас или рядом будет кто-то, способный кардинально менять судьбы людей. Целого города. Страны. Как-то нам надо научиться правильно реагировать и влиять на это, вы не находите?</p><p class="p1">Одноклассники сидели и молчали. Не сказать, что их официанты смущали. Те заняли пост у разожженного камина и оттуда бдительно следили за наполненностью стаканов и тарелок.</p><p class="p1">— Я сейчас выходил из дома — к родителям от застройщиков пришли, — сказал Лубоцкий. — Принесли документы на подпись. Нас ждет трешка в Ватутинках. На переезд выделят автотранспорт и спецрабочих.</p><p class="p1">— Мы едем туда же… — Коллективная жалоба на жизнь сразу сплотила, и все заговорили разом:</p><p class="p1">— Нас прописано двое, предложили однушку в Заможай-Загонове-Перспективном, но папа всем отбашлял и поменял с доплатой на Серпуховку…</p><p class="p1">— Встретимся в Ватутинках, нас туда же!</p><p class="p1">— «Бирюлево-Товарная»!</p><p class="p1">— Моим на «Госуслуги» пришло сообщение — у нас новостройка в Саларьеве.</p><p class="p1">— Батайцевых в Саларьево! — ахнул Федор. — А как же теперь устраивать тусовки — никто из ваших богемных гостей туда не поедет! Как твой отец в роль будет входить? Где черпать материал?</p><p class="p1">— Ух, Шерга… — нахмурился Абрикосов.</p><p class="p1">— Об отсутствующих всё или ничего, — пресек его стенания Вася Селезнев, — а поскольку всего о возможностях Ани влиять на отца мы знать не можем, давайте только о том, что имеем на данный момент. Поправляйте и дополняйте меня. Снос домов — реальность. То, что на месте нашей школы был храм Трофима Ираклионского, снесенный при царизме, как мы поняли сейчас, тоже реальность. Безнос, метни нам неприукрашенный фактаж.</p><p class="p1">Петя бросился к столу, на котором были собраны самые информативные артефакты, заволновался, но верный Дорохов пришел ему на помощь.</p><p class="p1">— Папа, в общем… археолог… Он знаком был с отцом Ани. В планах он имел раскопки. Помешал какой-то случай… А вдруг он собирался восстановить храм?</p><p class="p1">— Поставить его вместо наших домов и школы? Как по-христиански!</p><p class="p1">— Но дома же когда-то тоже поставили, а храм снесли?</p><p class="p1">— Так, может, он просто развалился — вот и снесли…</p><p class="p1">— Надо изучить…</p><p class="p1">— Изучай!</p><p class="p1">— А чтобы общественность не сносила заборы, храм построят в рамках реновации и явят миру уже полностью готовым. — Петя повысил голос. И опять почувствовал свою силу — ведь если его не будут слушать, он может заплатить, придут спецлюди — и уж тишину-то точно соблюдать заставят. Эта мысль придала ему уверенности. — Да-да, в составе торгово-развлекательного комплекса.</p><p class="p1">— Все правильно: там согрешил — тут кайся! — усмехнулся Вася.</p><p class="p1">Петя уверенно гнул дальше:</p><p class="p1">— Мама Ани в компании с кем-то, похожим на погибшего при странных обстоятельствах отца Сони Батайцевой, — извини, Соня, тоже реальность. Взрыв водокачки…</p><p class="p1">— Отсутствие связанной с ней тайны, — акцентировал Лубоцкий.</p><p class="p1">— Или же грамотное этой тайны сокрытие, — подала голос Лиза Дейнен.</p><p class="p1">Все посмотрели на нее.</p><p class="p1">— Фальшстена, фальшпол, потолок, унылая метла для отвода глаз… — продолжила Лиза. — Кто-то уводит внимание от объекта. Может такое быть?</p><p class="p1">Все согласились, что может. Наверное…</p><p class="p1">— Стоп, Безносов! — Андрей с гусарским шиком сбросил с плеча овечий тулуп и подошел к столу. — Я сейчас анимирую свою мысль.</p><p class="p1">Расставив разноцветные кексики на столе так, что композиция была похожа на модель их квартала, Лубоцкий протянул двухслойное пирожное Лизе.</p><p class="p1">Она отставила его подальше:</p><p class="p1">— Водокачка?</p><p class="p1">— Ага.</p><p class="p1">С другой стороны пристроил кочерыжку с листьями ананаса:</p><p class="p1">— Районный дуб. Узнаете пейзаж?</p><p class="p1">— А мы с тобой, Андрей, под ним желуди…</p><p class="p1">— А сверху на вас кот ученый…</p><p class="p1">— А знаете, да и пес с ним! — громко сказал Дорохов. — Нам переезжать. Вы не о том говорите…</p><p class="p1">Наташа Батайцева насупилась: тема сбора желудей так и просилась в эфир, но снова ей наступили на горлышко. А все этот неромантичный Дорохов. Или это так выражается крепкая брутальность?</p><p class="p1">— Какой пес, ты посмотри — по форме это натуральный орел, — нахмурилась Лиза, постучав по столу кочерыжкой. — Ну, упитанный орел, орел-руководитель… — Скепсис соратников удивлял ее — и вдохновлял одновременно.</p><p class="p1">— Что может значить орел в тайной эстетике смыслов? — сверкнула глазами обычно невозмутимая Лиза. — Если обратиться к записям царского Тайного приказа… Что, нет? Орденских шифровок храмовников? Майя и узелковый орлан чилийского Возрождения тоже не туда?</p><p class="p1">— Тут показано, где спрятан клад? — предположила Леля Абрикосова, подставляя невозмутимому официанту хайбол под поток живительной пепси-влаги.</p><p class="p1">— Это виноваты детские детективы середины прошлого века, бронзовые вы мои птицеловы, — вздохнул Лубоцкий. — Развлекательная детская литература последующих времен довела до абсурда идею зашифрованного послания. Так что не страдайте зря. Я сложил эту композицию только для того, чтобы показательно разрушить. — С этими словами он запрыгнул на стол, встал на руки — и, перенеся опору на одну, другой рукой развалял кексы по столу. Неумолимый рок. Бог дал, Бог взял. Собравшиеся притихли… Одна только Наташа Батайцева не сдержала восторженного вздоха: романтика мускулистой плоти приводила ее в экстаз и трепетное восхищение.</p><p class="p1">— Мы не в силах бороться со злом, — спрыгнув со стола, продолжил Андрей. — Добро не может сносить наши родовые гнезда, значит, нас сносит зло. Но в масштабах города это не зло, а просто бизнес, ничего личного. Отец Шергиной не злодей, а лучший человек нашего общества. Потому что смог, реализовался, заставил в себя поверить. С ним застройщики, акционеры, унтер-девелоперы, будущие арендаторы и арендодатели, целая армия экономически заинтересованных. Идея террора отпадает — заметут, шантаж и подкуп тоже нереальны, мы бессильны перед властью денег. Остается последний вариант — «ждать чуда». Давайте последние мгновения детства мы проведем, играя в детективов…</p><p class="p1">Его перебила умная Соня Батайцева:</p><p class="p1">— Предлагаю придумать себе квест. Тем более что базовые ориентиры есть — исчезающие старушки, портал в Чертаново, выход Зла через взорванную водокачку…</p><p class="p1">— Будем встречаться на руинах дуба, ностальгировать, а после ролевой игры, сняв зал в одном из рестиков будущего торгового центра шергинского папаши, весело отмечать это? — фыркнул Дорохов.</p><p class="p1">— Никакой иронии, космонавты смыслов, — невесело усмехнулся Лубоцкий. — Наши предки пакуют имущество, впереди суровый мир демократического капитализма, так что представляем случившееся с нами как прививку перед вхождением в эту реальность.</p><p class="p1">— В чем смысл твоего социалистического спича? — Нежный макарун хрустнул в кулаке Лизы и прахом ссыпался на пол. Крем девушка стерла салфеткой с мишутками.</p><p class="p1">— Предлагаю сдаться.</p><p class="p1">— Сдать Москву Наполеону еще на его подходе к границам? — ахнул Вася.</p><p class="p1">— Ага, — подтвердил Андрей. — Даже без квеста. Честно расслабиться и получать удовольствие.</p><p class="p1">— А в детективов играть? Точно нет смысла?</p><p class="p1">— Никакого…</p><p class="p1">— Шергину бойкотировать?</p><p class="p1">— <em>Really? It’s dull and ineffective</em><a href="ch2.xhtml#id21" class="a">[18]</a><em>…</em></p><p class="p1">— Тогда надо как минимум извиниться перед Аней за то, что мы на нее давили, — сказал Вася, — а бойкот ваш — это просто…</p><p class="p1">— Да поняли, завтра и сделаем, — красноречиво глядя на Лизу, проговорила Леля.</p><p class="p1">Лиза отвернулась, но у остальных совесть самоочистилась.</p><p class="p1">Стало легко.</p><p class="p1">В декорациях пижамной вечеринки сдаваться было сложно, но ученики 10-го «Б» постарались. Обладая немалым набором улик, фактов и загадочных знаний, они с упоительным и гибельным восторгом превратили тайное детективное собрание в полноценную пижама-пати. Не было ничего, а что было — то пусть разгребают взрослые, которые пакуют вещи. Раз они сдались, то что ожидать от тех, кого они породили, дали им денег и продолжают опекать?</p><p class="p1">Дверь перестала закрываться — поставщиков продовольствия по просьбе Безносова отслеживал и впускал консьерж. Заказывали и сами: не привыкнув еще к Петиному миллиону, одноклассники выщелкивали себе в телефонах любимую еду. И она прибывала.</p><p class="p1">Играла музыка, вокруг танцевали. Петя проследил взглядом, как Лубоцкий, который явно еще что-то хотел сказать, свирепо составлял башню из артефактов папенькиного прошлого. Петя видел, а Андрей нет, как альбом с фотографиями упал на пол и раскрылся как раз на папиной археологической юности. Так хотелось встать и поднять его, но Безносов не мог себя заставить: восемь упругих подушек подавляли его желание двигаться.</p><p class="p1">Музыка качала на волнах, заставляла следовать за ритмом.</p><p class="p1">Но вот по квартире поплыл запах щей — это Вася Селезнев открыл расписной судочек. Василий любил эпатировать. Его привозили в школу на «гелендвагене», который по особой договоренности с руководством парковали прямо у здания. В большую перемену погожим днем Вася частенько спал на его крыше, накрыв голову тряпичной сумкой.</p><p class="p1">Официанты разлили щи по тарелкам, будущие переселенцы собрались у стола с артефактами, взяли пластиковые хохломские ложки, неуверенно пробовали. Под кексы оказалось самое оно.</p><p class="p1">Да, тайна по-прежнему манила, но надо было себя заставить быть расслабленными.</p><p class="p1">Не собиралась расслабляться только Лиза Дейнен. Она дула пустой чай, то и дело поглядывая на дверь. Полчаса назад ее силы поддержал энергетический батончик, случайно завалявшийся в рюкзаке верного друга Андрея. После шести вечера она практиковала тульские пряники с теплым молоком, и вот они-то и застряли где-то на просторах Москвы.</p><p class="p1">Так что, когда все уже были умиротворены, она все еще к чему-то призывала.</p><p class="p1">— …Шергина преувеличивает свое значение, — говорила Лиза, — понятно, что на нас она учится вертеть общественным мнением, повелевать массами. Получается у Ани плохо. Мы видим, что девчонка не лидер. Скорее всего, ее ждет карьера жены олигарха. И когда я подложила ей в рюкзак дохлую крысу…</p><p class="p1">— Что ты врешь, я сама ее туда положила! — раздался вдруг пронзительный голос.</p><p class="p1">Все ахнули и вздрогнули.</p><p class="p1">На пороге стояла Аня. Она вошла с парнем из «Яндекс-еды» и, получается, слышала весь монолог.</p><p class="p1">— Как — «сама положила»?</p><p class="p1">— Зачем?</p><p class="p1">Глаза у Лизы вспыхнули: удалось! Не зря она гипнотизировала дверь: неожиданно увидев Аню, сумела скрыть удивление, повернула свой спич в нужную сторону и вынудила бедняжку проболтаться. Довольная Лиза вонзила свои беличьи зубы в пряник, приняла из рук патимейкера подогретое молоко. Обхватив голову руками, Лубоцкий плюхнулся на пол.</p><p class="p1">Потрясенный Вася замер в углу над щами. Потихоньку сполз на пол. Аня, конечно, видела его. Как ей объяснить, что он пришел и за себя, и за нее? Послушать, узнать, повлиять… Да и она читала чат группы, никто ее не удалял. Адрес Петечки Дорохов там для всех выложил. Никакой вины! Так думал Василий — и продолжал сползать. Подкатился к боковине дивана, принакрылся рукавом тулупа…</p><p class="p1">Аня не заметила Васю; оправдываясь, рассказывала, как вошла в группу — «курага курагой», — как снимала видеоролик с молодым артистом своего театра, как…</p><p class="p1">— Да мы и сами перестарались! — раздались голоса.</p><p class="p1">— Мы хотели извиниться!</p><p class="p1">— С бойкотом вышла глупость…</p><p class="p1">— Ты прости…</p><p class="p1">Ноги Ани подкосились. Она села на пол. Катарсис, слезы очищения так нужны страдающему человеку. Ее класс, такие разные, такие любимые люди. Все ошибаются. Не зря она пришла. Она наплакала целое море на плечо Лубоцкому, который первым ее обнял. Остальные тоже плюхнулись к ней на пол — неловкие объятия, робкие похлопывания по плечу. «Надо позвать Васю. Он страдает, ради меня не тусуется со всеми…» — промелькнуло в Аниной голове, и… она еще крепче прижалась к сильному плечу Лубоцкого. И конечно, в этот самый момент Вася поднял голову. Их глаза встретились. Так он, оказывается, пришел сюда, к тем, кто еще недавно бойкотировал ее. Он был тут с самого начала! Слезы примирения у Ани мгновенно высохли.</p><p class="p1">— Здравствуйте, господа, — раздалось вдруг.</p><p class="p1">Она вошла — и все мужчины встали.</p><p class="p1">Все, кто тут был. Все-все.</p><p class="p1">Дивной красоты женщина шагнула от двери. Стена статусных духов тут же отрезала ее от остальных, заставляя не прилипать к ней, а почтительно держаться на расстоянии. Все и держались.</p><p class="p1">— Аня, доченька, вот ты где!</p><p class="p1">Да, это была мама Ани Шергиной. Ну ладно, «курага» прочитала переписку группы и явилась, но мама-то тут как и зачем?</p><p class="p1">Анина мама постучала ноготком по экрану телефона:</p><p class="p1">— А что вы думаете, ваши родители тоже отслеживают ваши передвижения. И наверняка тоже тайно. Безопасность ребенка для мамочки — самое главненькое.</p><p class="p1">Она хотела убрать телефон в большую мягкую сумку, висевшую на плече. Сделала шаг вперед, поставила сумку на стол, но та соскользнула на пол. Покатились в разные стороны помада, тушь, винтажное зеркальце…</p><p class="p1">Дети бросились собирать вещички по гостиной.</p><p class="p1">Незваная гостья изящно нагнулась, подняла сумку, прижала к себе. С милой улыбкой получив от Толи Абрикосова последнюю потеряшку, сказала:</p><p class="p1">— Аня, очень торопимся. Попрощайся с друзьями. Всего доброго, ребята!</p><p class="p1">Повернулась и ушла. Облачко духов ударило по щам, победило и улетело.</p><p class="p1">— Проветрите свою бобровую хатку — дышать нечем, — презрительно бросила Аня, обожгла взглядом Лизу, с усмешкой глянула на Селезнева и двинулась вслед за мамой.</p><p class="p1">— А ты говоришь, не умеет повелевать массами! Шергины вертят людьми и обстоятельствами — мы только что это видели.</p><p class="p1">— Шерга была как Шерга, а теперь она рвет нам мозг! Как это понимать?</p><p class="p1">— Давайте пока никак не понимать, — на этот раз на стол запрыгнул Дорохов. — Нам требуется перезагрузка!</p><p class="p1">Да, после катарсиса она нужна была обязательно. Не сговариваясь, все схватили телефоны и бросились прокручивать свои плей-листы. Выбрали музыку самую зверскую, самую переустановочную.</p><p class="p1">С разрешения Безносова Вася снял со стены сабли, взмахнул ими, вышел в круг. Круг расширился. Никто не хотел остаться без носа или конечностей. Все надеялись, что танец с саблями изгонит его горе. Нынешние жильцы приветствуют строителей прошлого. И благодарят — за толстые стены!</p><p class="subtitle">* * *</p><p class="p1">Мелькала за окном вечерняя Москва. Аня и мама ехали в машине. Аня гнала от себя мысли о Васе. Она не имеет права ни в чем его упрекать, что это за дворовые разборки? Мама тоже удивила. Оказывается, ей до дочери есть дело, раз она отслеживает Анины передвижения. Как странно, что до сих пор, когда речь заходила о маме, Аня больше верила домработницам, чем себе…</p><p class="p1">— Аня, я бы никогда не стала вмешиваться в твою жизнь, — начала мама, — но когда ты оказалась в этом доме, я очень испугалась.</p><p class="p1">— А что это за дом?</p><p class="p1">— Ну…</p><p class="p1">— Что за дом, мама?</p><p class="p1">Аня увидела, что они едут не туда. Не к дому — не к их, в смысле, дому. И вопросительно посмотрела на маму.</p><p class="p1">— Никакой интриги — просто надо прокатиться и договорить в машине, — улыбнулась та. — Послушай. Моя жизнь не привлекала тебя — и за это я ставлю себе пятерку. А знаешь, что я делаю? Я езжу по всему свету…</p><p class="p1">— Знаю, конечно. Курорты, спа, недели моды, шопинг.</p><p class="p1">— Я езжу по всему свету, — повторила мама, — и заговариваю свищи, грыжи, рожи. У тех, кому нельзя помочь. Еще в школе я прославилась тем, что умела заговаривать прыщи. Вывела их всем знакомым, окружила себя красивыми людьми. Один раз увидела, как у соседей умирает ребенок, — отказывает поджелудочная железа. Я глянула на его прыщавое рыльце с губками в коросте, представила, как он будет плохо смотреться в гробу. Думаю: дай хоть уберу прыщи. Его коляска стояла у фонтана, журчала вода… Я накинула на мордашку платок, сама плачу, а заговариваю. Утром смотрим — коросты отвалились, личико чистое, а УЗИ показало, что поджелудочная рубцуется, даже разрастаться стала. Как печень. Ну вот… Но главное, я умею заговаривать русалочью болезнь — знаешь, такую, когда вместо ножек хвост? Я не афиширую это, у меня нет диплома врача. Не знаю как, но у меня получается. Мне нужно только сесть у воды, я говорю, говорю и…</p><p class="p1">Прыщи, свищи… Аня напряглась. А ведь у нее самой никогда не было прыщей! Она тут же вспомнила, как лет в двенадцать мучилась от маминого присутствия: та садилась вечером у ее кровати, включала пошлейший домашний фонтанчик, создавая общность матери и ребенка, махала батистовым платочком и напевала какую-то умильную чушь. Но. С прыщами были дети олигарха Палкина, прыщами обсыпало мраморное чело Абрикосовой. А у Ани никогда, ни одного! Вот это поворот!</p><p class="p1">— …Я и тебя хотела вылечить — папа не дал, он же у нас традиционалист, — продолжала мама. Кажется, она говорила что-то и до этого. Аня просто не слышала, вспоминая. — Но ради этого моего дара он и женился. Да-да, я ведь еще и клады умею видеть. Он тогда был увлечен археологией, мы в университете вместе учились. Я ведь по образованию гидролог. Вода…</p><p class="p1">Мама не договорила. Зазвонил ее мобильный. Ошарашенная Аня скосила глаза: на экране было написано БАТЯ.</p><p class="p1">Прислушиваясь к словам мамы, Аня думала: что за батя? Мамин отец умер, бабушка жила одна, родители папы были в том же составе — только бабушка. Мама могла звонить на тот свет?</p><p class="p1">И зачем мама вдруг ей про себя рассказала? Придумала себе такой светлый образ, потому что поняла, какой курицей была все это время? Или наоборот… Все эти годы она специально выстраивала имидж глупенькой беспечной красотки? Имидж. О-о…</p><p class="p1">— А теперь пришло время, когда ты должна стать моим союзником, — обрывая размышления Ани, сказала мама. Няшечным своим голосочком. — Ты думаешь, папа из своих бизнес-соображений сносит квартал? В Новой Москве сейчас гораздо выгоднее строить. Нет, Аня, квартал этот хочу снести я, и мне удалось грамотно вложить папе в голову то, что теперь он считает своей идефикс и ради чего готов на многое.</p><p class="p1">— Но зачем сносить-то? Раз в Новой Москве выгоднее строить?</p><p class="p1">— Я гидролог. Они археологи. А здесь течет подземная река. Когда еще при царе построили водокачку, чтобы она снабжала водой этот квартал, русло реке перерубили, и воды ушли куда-то в сторону. На месте вашей школы когда-то стоял храм, при храме святой источник… А дальше как в сказке — в определенное время он становился более святым, в определенное — менее. Можно было объяснять это плохим поведением паствы, а можно…</p><p class="p1">— Свойствами воды! — ахнула Аня.</p><p class="p1">Оказывается, с мамой тоже было интересно говорить! И ведь тоже о спасении людей. Ане уже и так хотелось поспорить с папой и доказать, что бездомному надо дать не ужин и ночлег, а дом и работу, но…</p><p class="p1">— Но есть проблема, — вздохнула мама, паркуясь на подземной стоянке, — и не одна. Так что давай обсудим вот что…</p><p class="subtitle">* * *</p><p class="p1">Наступила ночь. Патимейкеры всё убрали и ушли. Перед сном уставший Петр обошел свои владения. Все стояло и лежало на привычных местах. Даже артефакты на столе были выложены как по линеечке. Только альбома с фотографиями среди них не было…</p></span>
