<span id="id18"><div class="title1">
<p class="p">Глава 16</p>
<p class="p">Волна</p>
<p class="p">Артем Ляхович<a href="ch2.xhtml#id56" class="a">[32]</a></p>
</div><p class="p1">…Светло? Что за свет, откуда светит? Белым, зябким таким. И там тоже полыхало, но только не белым, нет…</p><p class="p1">И снова Он увидел, как вживую, багровые отсветы во тьме, лица с лопнувшими глазами, сожмаканные криком в комья боли… И Голос.</p><p class="p1">Что он рокотал Ему, этот Голос? Что-то важное. Нестерпимо, смертельно важное. Что-то такое, важнее чего просто нет и не могло быть, вот даже в четырнадцатом, когда…</p><p class="p1">Стоп.</p><p class="p1">Белый свет. Совсем белый, молочный, без желтизны, без огненных бликов. Бесплотный вездесущий свет.</p><p class="p1">«Я что, — мелькнула пугливая мысль, — я… в раю, что ли?</p><p class="p1">Выходит, этот Голос просто… ну, понтовал? Вроде как я тогда с этой Украиной? — холодел Он, вглядываясь в зябкую белизну. — Выходит, все-таки…</p><p class="p1">О господи! Значит, вот как. Значит… но за что-то же я попал сюда. Так просто сюда фиг попадешь, это тебе не твое расейское судилово, тут не отбояришься. Раз уж взяли в рай-то…</p><p class="p1">Ну, окей. А что я хорошего сделал? — выплыл неизбежный вопрос. — Неужели… Ха!»</p><p class="p1">Он и правда хохотнул (смешок больно царапнул горло). Из белого тумана тут же проступили силуэты — один, другой… «Ангелы, — понял Он и хохотнул снова. — Выходит, вот это вот все, что Его пиарщики напиарили про скрепы, про духовность и так далее, — оно таки правда? И Он действительно оплот и последняя надежда? А я ведь знал, — понимал Он и хохотал снова и снова. — Всегда знал и понимал, что мне уготована эта, как ее… Ну, великая роль. Что не только ради бабок… потому как — что бабки? Раз — и нету их; а это ведь вечное. Недаром на слезы прошибло, когда второй раз выбирали, — всхлипнул Он, — а то, что мухли были, — так ради добра же. Ради высшего, вселенского добра.</p><p class="p1">А ангелы, кстати, совсем не такие, как их рисуют. В белом, да, но вроде бы халаты на них какие-то, а не вот это, ниспадающее. У одного вообще очки и… и телефон у уха.</p><p class="p1">Что, и здесь?»</p><p class="p1">— Василь Григорьич! Василь Григорьич! Алё! Очнулся он! Вышел из комы! Да! Да!.. — орал ангел.</p><p class="p1">И хоть суетливый фальцет его был совсем не похож на Голос, почему-то разом вспомнились слова, слышанные там:</p><p class="p1">— Не расхлебаешь кашу, тобой заваренную, скоро будешь здесь. Будешь как они.</p><p class="p1">— Как они, — повторял Он непослушными губами, глядя сквозь очкастого ангела, и видел вместо него кипящую магму и в ней — лица, сожмаканные криком…</p><p class="subtitle">* * *</p><p class="p1">Часа через три-четыре, когда оживший Хозяин успел пройти половину медпроцедур, послать подальше вторую половину и потребовать «реальное положение дел в стране, а не вот это вот всё», двое в галстуках суетливо совещались, прикрывая рты:</p><p class="p1">— Ну что? Даем ему этого психа?</p><p class="p1">— Какого? Осю, что ли?</p><p class="p1">— Ося был у него час назад, не видел? С докладом про эликсир. Вылетел, чуть стену не проломил. Нет, вон того, который…</p><p class="p1">— Что, этого, что ли?</p><p class="p1">— Ну а как?</p><p class="p1">— Э-э-э… Ну, все-таки…</p><p class="p1">— Что «все-таки»? Не видишь, что творится? То-то и оно. Давай, чтоб максимум через час…</p><p class="p1">Через два часа напротив Хозяина, обвешанного датчиками и обставленного капельницами, сидел худощавый тип с седеющими вихрами вокруг лысины. Он явно нервничал, хоть и старался держать себя в руках.</p><p class="p1">— Ну? — ехидно спросил Хозяин. (Не потому, что ехидничал, а просто потому, что всегда говорил так — будто стебется над всеми.)</p><p class="p1">Если бы его собеседник внимательно присмотрелся к Хозяину, то заметил бы, что тот тоже нервничает. И неизвестно, кто больше.</p><p class="p1">Но ему было не до наблюдений.</p><p class="p1">— Э-э-э… вы, наверно, и так всё знаете? — наконец выдавил он. — Или… нет?</p><p class="p1">Хозяин насмешливо кивнул. Человек государственный наверняка заметил бы, что годами отработанный жест вышел менее убедительным, чем обычно. Но гость не был государственным человеком.</p><p class="p1">— Ну так… что вам рассказать? — растерялся он. — Я и сам далеко не всё… хоть это неожиданно, да — два года под замком, и потом — хопа! — прямо сюда… Вы, кстати, и сами вполне можете быть под Волной, вы в курсе? В этом случае нам бесполезно говорить.</p><p class="p1">— И все-таки давайте попробуем, — так же ехидно сказал Хозяин. — Эта Волна… Вот о ней поподробней, если можно.</p><p class="p1">— Волна… Мы о ней ничего не знаем, кроме того, что она крайне опасна и ее воздействие проявляется в самых разных формах и масштабах — от острого бреда у тех, кто попал в эпицентр, до массового психоза в масштабах всей страны. Еще установлено, что воздействие Волны передается и даже усиливается электронными каналами информации — телевидением и интернетом. Вы… ну да, вы знаете это лучше меня. Мне только безумно, э-э-э, любопытно… Я — человек, который, наверно, лучше всех изучил Волну. Нет ни малейших сомнений в том, что меня именно поэтому два года мариновали в вашей мышеловке. И вдруг… Что произошло? Что изменилось?</p><p class="p1">Хозяин дернулся — теперь это уже было заметно и его собеседнику.</p><p class="p1">— Предлагаю вернуться к эпицентру Волны. Что вы о нем знаете?</p><p class="p1">— Ну-у, — протянул худощавый, — уж об этом-то вы точно… Ну хорошо. Эпицентр Волны находится здесь. В Москве. В Калачёвском квартале. Под землей. О физической природе Волны не могу сказать ничего определенного, ясно только, что это неизвестное излучение, имеющее психотропное воздействие. Не газ, не вирус, не плесень эта ваша ядовитая. Придумали, тоже мне… Еще в нулевые я сгенерировал его частоту и потом почти довел до ума модель защитного экрана, как тут меня, ткскзть…</p><p class="p1">— Каков источник излучения?</p><p class="p1">— Окей. Источник, значит. Источник, да? — крикнул гость и тут же осекся. — Ну ладно. Мнения о том, что источник излучения — подземный поток, я не разделяю, хоть и не отвергаю полностью. О Волне было известно с древних времен, и очевидно, что люди отождествляли ее с потоком. Но я думаю, что это совпадение: наивысший горизонт воды просто совпал с эпицентром Волны. Экспериментально проверить свойства воды, увы, невозможно: всякий, кто приблизится к потоку (а значит, и к эпицентру Волны), попадает под ее воздействие. Грубо говоря, сходит с ума. Правда, счастливое отличие волнового помешательства — так мы его называем, хотя официального термина все еще нет… — отличие волнового помешательства от обычного в том, что оно обратимо. Удали человека из зоны воздействия Волны — и тот, правда не сразу и не безболезненно, но возвращается в здравый рассудок.</p><p class="p1">— Как вы можете гарантировать, — вкрадчиво поинтересовался Хозяин, — что сами не сошли с ума?</p><p class="p1">Его собеседник нервно расхохотался:</p><p class="p1">— Ха-ха! Казус Матрицы… Никак. Вот никак, — говорил он, криво улыбаясь. — Я сам думал об этом, и… И да: если всякий, кто полезет к Волне, превращается в ее, извините, зомби и начинает нести пургу о загробном мире или там о реинкарнации, об эликсирах… а ведь ученые! Со степенями!.. При таком раскладе меня, признаюсь честно, посещала мысль о том, что я один умный, а остальные психи ненормальные. Возможно, есть люди, принципиально устойчивые к воздействию Волны. Или хотя бы более устойчивые, чем другие. Я-то прямо под Калачёвку не лез, только рядом был, на поверхности. Не знаю, может, тоже психом заделаюсь, если полезу…</p><p class="p1">Открылась дверь. Вошел безликий галстучный тип из тех, что всегда толпились вокруг Хозяина, и сунул его собеседнику раскрытый ноут.</p><p class="p1">— Отчет за два года, — забормотал он в ответ на поднятую бровь Хозяина. — Был приказ о полном содействии…</p><p class="p1">— Я же два года проторчал сами знаете где, — сказал худощавый. — А вы хотите полную картину. Пока что я радовал вас полной картиной двухлетней давности. Благодарю, — кивнул он галстучному, и тот исчез. — Вы позволите?.. Я хотя бы по диагонали…</p><p class="p1">— Успеете, — сказал Хозяин, но худощавый все равно прилип взглядом к ноуту.</p><p class="p1">— Ёп-п… перный театр, — ругнулся он, как муху выплюнул. — Это что же вы тут без меня…</p><p class="p1">— Воздействие Волны в разное время было разным? — перебил его Хозяин. — Какова историческая динамика Волны?</p><p class="p1">— Ёп-п… — снова ругнулся худощавый. — Хотите, значит, то, что вы и так знаете, но моими устами? Устами младенца, хе-хе, — бормотал он, не отрываясь от экрана. — Прощупать, тксзть, что в голове у этого Эйнштейна… Ну, вот вам устами профессора. Историческая динамика? Как вам, конечно, известно, Волна существует с древних времен. Первый источник, который можно трактовать как косвенное упоминание Волны, относится к семнадцатому веку, но это вовсе не значит, что Волны не было до того. Просто о ней не принято говорить и тем более писать — как сейчас, так и тогда. Простая логика подсказывает, что Москву недаром основали рядом с эпицентром Волны. Не прямо на Калачёвке, а чуть поодаль, чтобы и оборона выгодная, и от греха подальше… но вместе с тем и поближе. Именно Волна, как вы знаете, и определила специфику русской истории — и вообще России, которую, э-э-э, аршином общим не измерить. Пресловутая русская душа — не что иное, как психика человека под Волной. Конечно, Волна имела историческую, как вы выразились, динамику: в иные периоды ее воздействие почти не проявлялось, в иные — приводило к психозам, которые, в свою очередь, рождали катастрофы национального масштаба. От чего это зависит? Возможно, у Волны есть и некая своя амплитуда интенсивности, но прежде всего это зависит от воли людей, которые пытались использовать Волну в своих целях. От властей предержащих, разумеется. Тут все элементарно: раскопаешь слой земли или даже просто поворошишь что-то там, начнешь активничать над эпицентром — и пошло-поехало. Волна как будто знает, когда она нужна кому-то, и бежит навстречу, как зверь на ловца. Вот только зверь этот ловца сам и кушает…</p><p class="p1">Худощавый замолк, вглядываясь в экран.</p><p class="p1">— Продолжайте, — велел Хозяин.</p><p class="p1">Несмотря на обычную ехидную улыбку, прозвучало это скорее просительно, почти умоляюще. Хозяин прокашлялся.</p><p class="p1">— Что продолжать?! — вдруг выкрикнул худощавый и посмотрел на него. — Про живую воду? Про эликсир бессмертия? Про портал в загробный мир? Про то, что старый мертвый бандит Кирюха — не старый мертвый бандит Кирюха, а бессмертный Хранитель Чего-то Там? Какой еще бред, внушенный Волной, вы хотите услышать от меня? Вы знаете, что почти в эпицентре Волны стоит школа? Та самая «двенашка»? В период наименьшей активности Волны ее воздействие, видимо, как-то стимулировало интеллектуальный уровень школы, но сейчас, когда ваши опричники там все перекопали… Какого черта они перекопали, не дождавшись полной эвакуации? Какого черта они вообще начали копать? А-а, ну конечно, это же они вас спасали, эликсирчик-то… Ха!</p><p class="p1">С Хозяином никто не говорил так уже лет тридцать. Но его собеседник как будто знал, что сейчас тот самый момент, когда можно говорить именно так, и Хозяин ничего не сделает ему, а будет только оправдываться. И точно. Хозяин сказал, глядя в потолок:</p><p class="p1">— Это без меня всё. Была жесткая установка ничего не трогать, не вторгаться, экосистему не…</p><p class="p1">— А проект Шергина? Будто я не знаю, из-за чего сижу. Два года, как его утвердили, а я пытался отговорить вас, избранники вы наши, не лезть в самое пекло. (Хозяин дернулся, будто его долбануло током.) А до того, в четырнадцатом, когда — ага, ничего не трогали, не вторгались, только поставили там свою железяку, да и все? Это была гениальная идея — ретранслятор, перенаправляющий частоту Волны на антенны ваших спутников и оттуда на телевидение и интернет. На основе стибренных у меня разработок, понятное дело, но все равно гениальная. Отравленное ТВ — такого не было даже у… Какой там двадцать пятый кадр! Жаль, что вредный народ и под Волной вывернул не в ту степь. Пришлось вам лезть туда по старинке, грубо прикрывая все это дело проектом Шергина, и в сто первый раз наступать на те же грабли. Когда же вы дотумкаете, командиры вы наши, что можете командовать чем угодно, кроме Волны?.. А теперь, извините, — худощавый захлопнул ноут и встал, — мне пора. Расхлебывать вашу кашу.</p><p class="p1">Хозяин снова дернулся.</p><p class="p1">— Вы пойдете тогда, когда… — начал было он, но худощавый перебил:</p><p class="p1">— Единственный, кто с Волной на «ты», — это я. Сейчас вы это и правда понимаете. А отомстите мне когда-нибудь потом, когда я сделаю свое дело. Вы знаете, что стало с вашими опричниками, которые полезли в Волну? Хрен бы с ними, а с детьми? С детьми из «двенашки», которые под Волной? Петр Безносов уверен, что получил от бандита Кирюхи миллионное наследство и квартиру, и даже устроил вечеринку в этой несуществующей квартире, и все ее участники тоже были уверены, что… А с семьей Шергиных? Павел с малолетней дочкой думают, что находятся за тысячи километров от Москвы, хоть и не покидали Калачёвки. Аня Шергина верит, что ее на самом деле двое. Сбрила брови, выкрасилась аэрозолем для граффити и думает, что она демон загробного мира. Мать ее… да что там! При таком психозе внушение просто теряет границы, понимаете? Кому угодно можно внушить что угодно. И сейчас надежда только на ваше разумное содействие… и на защитный экран. Которого пока еще нет. Ну, приказывайте там, что и кому надо, а я пошел. Эликсир… т-твою мать! — слышался его голос из коридора. — Ха!..</p><p class="p1">Хозяин некоторое время смотрел прямо перед собой. Потом дернулся, когда вбежали галстучные, выслушал их и кивнул:</p><p class="p1">— Да. Неограниченные полномочия. Неограниченное содействие во всем… а мне еще раз отчет. Да, полный. Нет, еще полнее. И священника.</p><p class="subtitle">* * *</p><p class="p1">— Итак, я резюмирую! — возгласил Лубоцкий.</p><p class="p1">— Давно? — отозвалась Полина.</p><p class="p1">— Не забудь описать, как ты это делаешь, — попросил Дядя Федор. — Руками или…</p><p class="p1">— А давайте потом поумничаем, а? — Густой голос Дейнен стал еще красивее, потому что она сердилась. — Дайте хоть сказать человеку!</p><p class="p1">— Если это самое «потом» у нас будет.</p><p class="p1">Лубоцкий картинно смотрел в пол. Все молчали, и он продолжил:</p><p class="p1">— Я резюмирую, да. Нас похватали, как котят, и заперли в этом каземате, — Андрей оглядел уютную комнату, в которой они сидели, — в этом каземате… почему?</p><p class="p1">— Сказал как отрезал, — хмыкнул Дядя Федор. — Действительно, почему? Загадка века.</p><p class="p1">— Наверно, потому, что мы что-то знаем? — робко спросила Наташа.</p><p class="p1">Все заржали.</p><p class="p1">— Уж ты-то у нас то-очно хранительница тайн, — протянула Полина сквозь смех. — Это тебя взяли как суперагента, а нас всех за компанию…</p><p class="p1">— Народ, — неожиданно пробасил Федя. Все приумолкли. — Ну к чему эти бла-бла? Всем понятно, зачем нас заперли здесь — и им, и нам. Лично мне не до смеха. Походу, мы еще никогда не были в такой жо…</p><p class="p1">— Я боюсь, — пожаловалась Соня и потрогала его за рубашку.</p><p class="p1">Федя поморщился.</p><p class="p1">— Да-а, — подал голос Петя. — Ведь всех взяли, кто был у меня тогда…</p><p class="p1">— Ага, всех, — хмыкнул Лубоцкий. — Кроме Шерги.</p><p class="p1">— Точно! — Все стали вертеться и оглядываться. — Нет Шерги… Ну вот, а вы сомневались… Да с таким папашей… Народ, ну вы чё, ну нет ее, ну и что… Продолжай, Безнос, ей остро необходим адвокат… Хоть бы взяли ее для конспирации… Ага, папахен так и согласился, щас… Стукачка, я всегда говорила… Так они же слиняли куда-то в глубинку, и она, и папулик….</p><p class="p1">На мониторе, за которым наблюдали двое в соседней комнате, народ точно так же вертелся, оглядывался и галдел.</p><p class="p1">И вообще на этом мониторе было все так, как и в комнате. Кроме одного.</p><p class="p1">Поодаль ото всех стояло всклокоченное черноголовое существо. Павел Шергин, сновавший рядом, как тигр в клетке, говорил ему:</p><p class="p1">— Ань. Ты, главное, не волнуйся. Вот не волнуйся, и всё. Сейчас я сделаю пару звонков — и…</p><p class="p1">— В одиночной камере, — ровным голосом говорила та, кого называли Аней. — Ночью. В одиночной камере…</p><p class="p1">Люди, следившие за монитором, переглянулись.</p><p class="p1">— Они реально не видят друг друга, — сказал один другому. — Ни те этих, ни эти тех.</p><p class="p1">— Да-а, — протянул второй. — Плесень?</p><p class="p1">— А хрен ее. Что там это… противоядие или как его? Когда уже?</p><p class="p1">— Пока не знаю. Сказано держать здесь, пока не будет инструкций.</p><p class="p1">— Ну, ждем тогда.</p><p class="p1">— Ага.</p><p class="p1">И двое у монитора откинулись на спинки своих кресел, наблюдая за людьми на экране, которые находились в одной комнате и смотрели сквозь друг друга, как сквозь воздух.</p></span>
