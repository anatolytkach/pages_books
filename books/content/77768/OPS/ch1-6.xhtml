<p class="p">Глава 3</p>
<p class="p">«Двенашка»</p>
<p class="p">Григорий Служитель<a href="ch2.xhtml#id31" class="a">[13]</a></p>
</div><p class="p1">Почти каждый день после уроков Петя шел пешком из Замоскворечья в Колпачный переулок. Путь занимал около часа, и все это время, предоставленный самому себе, Петя размышлял о последних событиях. Он по-своему любил «двенашку» и всю их школьную компанию. Петя не особо задумывался о предопределении, но если уж они оказались вместе, значит, это неспроста, значит, так зачем-то нужно. И все же в глубине души к предстоящему сносу школы он был почти безразличен. Петя оглядывался вокруг: на маму, на Федю, на учителей, на случайных прохожих — и видел, что вся жизнь состоит как бы из кругов. Если разобьется один круг, то сразу обязательно возникнет другой. И так будет всегда. А раз так, имеет ли смысл горевать из-за «двенашки»? В конце концов, если одноклассники захотят, они смогут видеться и вне старой школы. А если не захотят, получается, что не так уж и сильна была их привязанность (насчет Дяди Федора он не сомневался: с этим корешем они пройдут вместе через всю жизнь). А вот ситуацией с Шергиной Петя был искренне возмущен. Несколько раз даже набирал ее номер, желая как-то поддержать, но Аня сбрасывала звонок. Вот и сегодня в столовой он попробовал уступить ей место в очереди. Но вышло это как-то неловко и глупо: как будто если она поест раньше на одного человека, то обида ее ослабеет. Она вежливо отказалась. Петя сказал:</p><p class="p1">— Ань, слушай. Я на твоей стороне. Ты ни в чем не виновата. Это все какая-то жесть. Теперь вон до побоев дошло. Если тебе нужна какая-то помощь, сразу скажи!</p><p class="p1">Аня молча смотрела в пол.</p><p class="p1">— Ты только не подумай, я не подкатываю к тебе.</p><p class="p1">На этих словах Аня быстро взглянула ему в глаза, криво ухмыльнулась и отошла. Петю смутила такая реакция, высокомерная и злая. Тем более что он и правда даже в мыслях не имел к ней подкатывать. Еще полгода назад хотел, но боялся, а теперь и желание пропало.</p><p class="p1">В сентябре Пете всегда казалось, что он вернулся с каникул обновленным и обогащенным, что за лето достаточно вырос, научился быть самим собой и обрел долгожданную уверенность. В начале каждого учебного года он не сомневался, что уж на этот раз класс наконец воспримет его всерьез. Но то ли он ошибался насчет себя, то ли одноклассники за летние месяцы тоже успевали сильно измениться, но они снова оказывались на два-три вершка впереди Пети. Летом, знакомясь с новыми людьми, Безносов сам себе удивлялся, каким он может быть раскованным и легким. А в школе старые связи брали свое, и получалось, что отведенное ему однажды место слишком крепко держит его.</p><p class="p1">Петя успел по-настоящему полюбить квартиру в Колпачном. Он бывал в ней уже много раз, но как бы тщательно ни исследовал каждый угол, его не покидало ощущение, что он тут впервые. Три просторные комнаты вернее было бы назвать залами. Судя по всему, последний жилец (отец ли?) покинул квартиру несколько месяцев назад. Холодильник, если не считать мумии лимона на дверце, был пуст. Комплекты белья аккуратно сложены в шкафах. Кроме двух халатов и почему-то овчинного тулупа, никакой одежды в доме не оказалось. В ванной не водилось ни зубных щеток, ни шампуней. Тем не менее квартира представляла собой настоящий паноптикум, склад различных диковин. Пете быстро наскучило разглядывать бесчисленные альбомы с марками. Он тут и там находил предметы, до этого ускользавшие от его внимания. То склеенную заново китайскую вазу. То слоновий бивень в стеклянном саркофаге (внутри бивня был высечен целый город: рыночная сутолока, сценка суда, кто-то играл в шашки, ловил рыбу). На одной стене висела фотография отца, пожимающего руку мэру Лужкову на фоне нового торгового центра, на другой — икона в серебряной ризе. Над входной дверью, больше напоминавшей резной портал в готический собор, красовались две перекрещенные сабли времен наполеоновских войн. С эфесов свисали сине-бело-красные кисточки, на рукоятках можно было различить букву <em>N</em> в обрамлении лавровых листьев. Наконец, на глаза Пете попалась старинная гравюра, которую он раньше не замечал. На ней была изображена церковь. Внизу вилась надпись: «Церковь Святаго Трофима Ираклионского, 1776». Петя уже было отвлекся на чучело рыбы-шар, но вдруг снова уставился на гравюру. Склонил голову влево, потом вправо, приблизился к изображению, затем отошел подальше. Да, не было никаких сомнений — эта церковь стояла на месте «двенашки». Собственно, она и дала название трем прилегающим к ней переулкам.</p><p class="p1">«Фигасе! — произнес Петя вслух. — Это же наш Трофимовский!» На гравюре был изображен въезд во двор с высокими воротами. Сейчас от них уцелели только два столба. Двухэтажный домик рядом с церковью прирос еще одним этажом. Пете даже показалось, что коробейник с пышными усищами в углу картинки — точь-в-точь охранник дядя Саша из их школы. В остальном узнать современный Малый Трофимовский было почти невозможно. Петя плохо знал историю «двенашки». Он что-то слышал про церковь, которая стояла на месте будущей школы, но понятия не имел, снесли ли ее большевики или она сама сгорела еще раньше.</p><p class="p1">Разумеется, прогуглить он ничего не мог — на его «нокии» просто не было интернета. Ни компьютера, ни ноутбуков, ни планшетов в квартире не водилось. От досады он выругался: давно пора собраться и купить новую «трубу»!</p><p class="p1">Петя еще с полчаса бродил по квартире, изучая каждую мелочь, каждый закуток, но из раза в раз возвращался к гравюре. Порывшись в фонотеке, поставил пластинку <em>The Doors</em>, открыл бар и выпил подряд три рюмки коньяку. Через десять минут Петя в овечьем тулупе кружился по квартире, подпевая Моррисону: <em>I’m a backdoor man</em>. Позвонил Дяде Федору и предложил ему подъехать в Колпачный — осмотреть хату и заодно отведать коньяка («Только колу захвати. Нормальный коньяк без колы не пьют»). Пока друг был в пути, Петя решил исследовать последний в квартире загадочный остров — отцовское бюро. Одну за другой он открывал полки и извлекал их содержимое. Стопки старых фотографий. Какой-то младенец, насупившись, хмуро смотрит в объектив. Потом мальчик с выбритой макушкой и длинной челкой верхом на деревянном конике. На следующем снимке уже можно было угадать и додумать будущие черты отца. Вот маленький Кирилл Владимирович на общей школьной фотографии (причем поначалу Петя принял за него совсем другого парня и даже чокнулся с ним рюмкой). А тут отец в армии, в пилотке набекрень, расхлябанно облокотился о корпус танка. А здесь он с лопатой, в косынке, завязанной на голове узелками, стоит по пояс в яме. Что-то копает. Фотография старинного кувшина, монеты, черепа. Затем начались засвеченные поляроидные снимки из девяностых. Вот отец в казино, вот ест с кем-то шашлыки. Какие-то девицы липнут к нему в ночном клубе: лица у всех очень радостные, но глаза закрыты от вспышки.</p><p class="p1">Петя выдвинул другую полку. Там в больших конвертах были сложены какие-то записки, письма, награды за первые места в исторических олимпиадах и грамоты за участие в археологических экспедициях. «Кирюша, узна́ю, что ты целовался с Ежовой, — отрежу сам знаешь что!» «Кира, отче купил в Венгрии двойник Джизас Крайст Суперстар, заинтересован?» На другом клочке нервным почерком было нацарапано: «Ставь на пики, Кира, не тупи! 150 косарей». Петя перерыл весь стол: вымпелы, медали, аттестаты и дипломы. Наконец добрался до блокнотов отца. Выбрал записную книжку за последний год. Открыл на странице, заложенной тесемкой, и обомлел: наискосок крупными, несколько раз обведенными буквами было написано: «Позвонить Паше Шергину!!!» Запись была дважды подчеркнута.</p><p class="p1">Петя внимательно пролистал записную книжку, но Паша Шергин больше ни разу не упоминался. Он встал, скинул тулуп и заходил по комнате. Почему Аня ничего не говорила о том, что их отцы были знакомы? Или она сама этого не знала? Не может быть, чтобы не знала. Или это вообще однофамилец и к отцу Ани он никакого отношения не имеет? Ну еще чего, не имеет! Петя разозлился на себя за то, что столько выпил и голова отказывается работать. Оставалось дождаться Федю и, пока тот не выскажет своих догадок, коньяка ему не давать.</p><p class="p1">Петя еще раз рассмотрел запись в блокноте. «Позвонить Паше Шергину!!!» Представил себя детективом: что странного он смог бы заметить в этой фразе? «Да все тут странное!» — сам себе ответил Петя. Ну да, не «Павел», а именно что «Паша». Значит, знакомство длительное и, судя по всему, в прошлом отношения были приятельские. Что еще? Несколько раз обведенные буквы. Кажется, отец обвел их не для того, чтобы отметить их важность, а как будто делал это на автомате, думая уже о другом. О чем? Мысль Пети дальше не шла.</p><p class="p1">Все, все было странно! Наконец домофон залился трелью. Пришел Федя.</p><p class="p1">— Поднимайся, скажи, к сыну Кирилла Владимировича.</p><p class="p1">В первый раз Петя открывал гостю дверь своей квартиры. И почему-то именно в этот момент он окончательно осознал, что это его дом, что это не шутка и не розыгрыш.</p><p class="p1">— Ну у тебя охрана жесткая тут, блин.</p><p class="p1">— Федя, тут такое дело! Не поверишь!</p><p class="p1">— Хоть впусти хоромы посмотреть.</p><p class="p1">— Да заходи, конечно.</p><p class="p1">Дядя Федор переступил порог и, оказавшись в коридоре, бесстрастно произнес по слогам:</p><p class="p1">— А-хре-неть.</p><p class="p1">— Ты понимаешь…</p><p class="p1">— Понимаю. Это ж, блин, ваще.</p><p class="p1">— Нет, я не про это!</p><p class="p1">— Ну ни хрена ж себе! — сказал Федя и даже засмеялся. Такой роскоши он никак не ожидал.</p><p class="p1">Пока Федя осматривал комнаты, Безносов путано пересказывал ему суть последних открытий.</p><p class="p1">— Это же реальные доспехи!</p><p class="p1">— Но я только не понимаю, при чем тут отец Ани!</p><p class="p1">— Гусарские сабли! Дай стул, хочу подержать в руках!</p><p class="p1">— Да подожди! Блин! Это же все взаимосвязано.</p><p class="p1">— Вау! Бивень мамонта! Тебе сюда билеты надо продавать.</p><p class="p1">— Слона! Федя. Подожди ты.</p><p class="p1">— Неси рюмки. Кто обещал дать бухну́ть? — Дядя Федор останавливался перед каждым предметом, чтобы сделать селфи.</p><p class="p1">— Посмотри на эту гравюру! Посмотри внимательно!</p><p class="p1">Федя, нахмурившись, вгляделся в изображение и вдруг расплылся в улыбке:</p><p class="p1">— А-ха-ха-ха! Точно, мужик с усами — вылитый дядя Саша!</p><p class="p1">— Да нет! Ты посмотри на церковь! И вокруг нее посмотри, что и как!</p><p class="p1">— О! Подожди-ка… Фигасе! Это же на месте нашей «двенашки». Точно, церковь Трофима. Круто. И все по-другому.</p><p class="p1">— Ты вообще меня не слышишь. Пойдем в комнату, я тебе еще раз все расскажу.</p><p class="p1">— Блин… Просто музей у тебя тут какой-то…</p><p class="p1">Друзья вошли в комнату, где стояло бюро.</p><p class="p1">— А-а-а-а, камин! А чё у тебя пластинка шумит? Переверни.</p><p class="p1">Петя и не заметил, что пластинка уже час как вхолостую шипела на проигрывателе.</p><p class="p1">— Да хрен с ней! В общем, что-то тут совсем неладно с отцом Шергиной.</p><p class="p1">— Ну это мы все и так давно без тебя поняли.</p><p class="p1">— Нет!!! Мой отец его знал!</p><p class="p1">— Ну, на родительских собраниях, разумеется, мог встречаться.</p><p class="p1">— Да какие собрания, Дорохов! Блин! Я отца первый раз увидел за пять минут до его смерти.</p><p class="p1">— А, ну да. Прости, забыл…</p><p class="p1">— В общем, тут какая-то тайна.</p><p class="p1">Федя делано привычно выдохнул, опрокинул рюмку и скривился:</p><p class="p1">— Я правильно тебя понял, что снос Калачёвки, эта картинка с церковью, твой папаша и папаша Шергиной… что все это как-то взаимосвязано?</p><p class="p1">— Именно.</p><p class="p1">Федя вытер слезы, навернувшиеся после рюмки, сделал большой глоток колы и спросил друга:</p><p class="p1">— А кстати, от чего твой отец умер?</p><p class="p1">— В смысле?</p><p class="p1">— Да так. Приятель, у тебя квартира не прослушивается?</p><p class="p1">— Да нет вроде. Не замечал.</p><p class="p1">— В общем, влипли мы с тобой, Петруша, в историю. Будем выкарабкиваться. Мне нужно связать все ниточки, — сказал Федя, многозначительно потирая переносицу, хотя очки никогда не носил. — Ясно одно: это вопрос больших денег и еще большего тщеславия.</p><p class="p1">— В смысле?</p><p class="p1">— Не ссы. Будем разбираться.</p></span>
