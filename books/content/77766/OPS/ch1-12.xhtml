<span><p class="p1">— Ну, вы человек молодой, небось пешком под стол ходили в восемьдесят седьмом. А я видел. Да и потом видел. Даже на НТВ при Гусе было больше свободы. — Свиридов вспомнил, что Волошин действительно дружил с Лосевым, тем самым, что еще так недавно злорадствовал при свиридовском задержании на границе, и даже появлялся у него на программе в качестве эксперта. — Понимаете, всякий список составляется исключительно для ограничения. Начало свободы — отмена всяких списков, я из поколения, которое это отлично помнит. В восемьдесят пятом году — я только на иновещание пришел — все было по спискам: эти темы можно, эти нельзя. Этим пайки первой категории, этим второй. Эти люди Писенко, им можно побольше, а эти люди Лукашова, они церберы. И так далее. А потом человек стал что-то значить сам по себе, вне списка, но это было недолго.</p><p class="p1">Фон: шум, смех, разговоры, девки с голыми пупками. Свиридов не стал бы прописывать фона, с некоторых пор он все видел размыто, слишком был сосредоточен на списке, нагноившейся этой занозе.</p><p class="p1">— Я недавно у Леонтьева прочел, что начинается новая инвентаризация страны, — вспомнил он. — Надо все учитывать заново, вот и список…</p><p class="p1">— У Константина Леонтьева? — изумленно спросил Волошин.</p><p class="p1">— Константин умер, — пояснил Свиридов. — У Михаила.</p><p class="p1">— А… — протянул Волошин. — Что ж вы, батенька, дрянь такую читаете?</p><p class="p1">— Но идея-то здравая, нет?</p><p class="p1">— Идея идиотская, даже если бы была Константина. Инвентаризация страны при ЧКГБ — это капитализация курятника лисой. А волки с IPO помогают, для легальности. Наверное, за процент. Так не тащили ни при каком Ельцине, потому что по крайней мере знали пределы, и был задан вектор.</p><p class="p1">— Вектор и был — тащить…</p><p class="p1">— Ну, это вы не наговаривайте. Вектор был другой, все его знали, он не исключал, конечно, и некоторого «тащить», но к этому не сводился. Все, что было тогда утащено, сегодня работает, а все, что утаскивается сейчас, лежит на иностранных счетах, и мы этого больше не увидим. А разговоры про инвентаризацию — это операция прикрытия, в данном случае идейного. За отсутствием других идей. А по-нормальному это называется — взять на карандаш. Я только не понял пока, в какую графу мы у них попали.</p><p class="p1">— Наверное, воспитуемых, — сказал Свиридов.</p><p class="p1">— Если из сегодняшнего мероприятия исходить, то да. А если нет… Вы не хотите, кстати, на «Свободу» ко мне зайти, поговорить про все это дело?</p><p class="p1">— Говорить-то пока не о чем особо, — сказал Свиридов. Меньше всего он хотел портить себе жизнь выступлениями на «Свободе». Этак можно было и «Родненьких» лишиться.</p><p class="p1">— Наши пока тоже не очень хотят про это делать, — успокоил его Волошин. — Они говорят: проверьте, что за список. Мало времени прошло. Но я это раскопаю, не беспокойтесь. Если что узнаете — сообщайте, хорошо? Вот мобильный.</p><p class="p1">Свиридов внес его прямой дорогостоящий номер в телефонную книжку своей «Моторолы», и они отправились в пятый зал, где уже рассаживались списанты.</p><p class="p1">На красной бархатной сцене, подсвеченной красными, белыми и синими прожекторами густых госцветов, за длинным столом рассаживались люди в черном. Все они были почти неотличимы. Справа на столе громоздилась стопка книг в роскошных золоченых обложках. Ведущего Свиридов узнал — это был бородатый, осанистый, тенористый Кошмин с «Московии», в прошлом малоудачливый рокер, нашедший впоследствии Бога и теперь пропагандировавший всяческое «Любо».</p><p class="p1">— Дорогие друзья! — начал Кошмин высоким деловым голосом. — Прежде всего позвольте поприветствовать всех собравшихся и призвать вас к активному участию в дискуссии, потому что этот стол, прекрасный вот этот стол, который вы видите перед собой на сцене, — он постучал по нему кулаком, подчеркивая надежность стола, — он только кажется квадратным, а на деле он круглый, и я надеюсь, что мы все вместе и, так сказать, от души. — Что именно будет делаться вместе и от души, он не пояснил. — Мы собрались на презентацию второго выпуска книги, первый том которой уже стал, не побоюсь этого слова, сенсацией и безусловным фаворитом читательского спроса, это, как вы понимаете, «Русский проект», история которого достаточно известна. Вы знаете, конечно, что это, так сказать, загадочная рукопись, или, в компьютерный век живем, загадочный файл, поступивший всем руководителям центральных СМИ и наиболее выдающимся государственным деятелям и начинавшийся словом «Опомнитесь!». Вот, собственно, это слово стало в известном смысле девизом года, и уже сегодня список опомнившихся насчитывает многие сотни имен.</p><p class="p1">— Это не про нас ли? — шепнул Волошин.</p><p class="p1">— Были проведены, конечно, разыскания, — продолжал Кошмин. — Ясно, что книга блестящего, конечно, аналитического уровня, с таким геополитическим охватом, который мог сохраниться только в очень тайных, очень хорошо законспирированных аналитических отделах на самых верхних этажах. Глубина анализа, вы понимаете, смелость обобщений, начитанность огромная авторов в русской филисофии, в трудах Ивана Ильина, Сергея Нилуса, других великих церковных мыслителей — все это выдавало, конечно, людей в погонах, и в погонах с большими звездами. Но никто так и не обнаружил авторов, которых профессия научила не слишком засвечиваться в дискуссиях, потому что надо делать дело сейчас, а не тратить время на сотрясение воздуха. Вы знаете, конечно, тоже, что некоторые цитаты из «Русского проекта» попали в Федеральное послание президента… послание президента Федеральному собранию, — подобострастно исправился он, — и в том числе фрагменты, где цитируется Иван Ильин. Но это, так сказать, анализ, а нужны же и конкретные рекомендации по преодолению накопившейся отсталости, по возвращению России статуса геополитического центра региона, по осознанию России не как провинции Запада, а как самодостаточной альтернативы ему… И вот, дорогие участники, перед нами второй том «Русского проекта»! Вы можете задавать любые вопросы: перед вами не все, конечно, авторы, но те, что есть, ответят на ваши, конечно, вопросы…</p><p class="p1">Свиридов слышал о «Русском проекте». Этот трехцветный златотисненый том стоял на всех московских книжных прилавках и никому не был нужен даром, а стоил по полторы штуки упаковка («Проект» вручался в бархатном футляре с золоченым орлом). Всех геополитических откровений там было — нудное и подробное обоснование возврата к монархии с требованием, чтобы очередной президент дал старт династии. Все тайные аналитические отделы жрали хлеб даром, поскольку не могли предвидеть даже того, о чем догадывались ветераны, играющие в домино по дворам; утешаться оставалось тем, что таковы аналитические отделы во всем мире.</p><p class="p1">Начались выступления авторов «Русского проекта». Все они были построены на возврате к имманентным ценностям и проповедовали наихудшее поведение в предложенных обстоятельствах. Правота отождествлялась с хамством, идентичность — с кондовостью, органика — с невежеством, во всем этом не было ровно ничего нового. Пока русский царь удит рыбу, Европа может подождать. Потом Европа в мутной воде удит рыбу, а сыновей русского царя при ее молчаливом попустительстве сбрасывают в шахты. Особое внимание, как всегда, уделялось козням Англии и щупальцам спецслужб, работающих под гуманитарными прикрытиями. Особенно подробно выступал ветеран внешней разведки, костяной старик с идеально лысым пигментированным черепом, подробно развивавший тезис о крюке. Крюк (на котором удержалась Россия в смутную эру) был главным лексическим новшеством года, вошел в названия и фразеологизмы. Старик по третьему кругу заходил на одну и ту же мысль. Видимо, он чувствовал крюк глубже и страстнее, чем мог выразить.</p><p class="p1">— Это крюк… — повторял он. — Это тот загнутый прибор, глубоко вбитый, на котором повисло… все! И мы не можем… не можем позволить! Вы все, собравшиеся здесь…</p><p class="p1">Тут в его глазах внезапно мелькнуло что-то осмысленное; он понял, кажется, кто собрался.</p><p class="p1">— Вы все здесь собравшиеся! — закричал он страшным фальцетом. — Вы висите здесь, но нет благодарности! Нет чувства, что вы удерживаетесь все вот тут, тут! Что вас предохраняет только тончайшая, тончайшая… линейка, пленка! Когда безупречные люди, гениальные аналитики, лучшие умы, каждому по десять раз предлагали перебежать, и никто не перебежал, когда вот эти безупречные люди… здесь перед вами… вы должны осознавать, на чем вы висите! Вы пришли просто так, как домой приходят, в вас не видно сознания, вы смеете кушать! На вашем примере здесь сейчас будет показано… и вы, может быть, тогда! Тогда! — Он застучал по столу, так что не зря Кошмин проверял его надежность. Старик закашлялся и сел, повисла пауза.</p><p class="p1">— Может быть, кто-то хочет сказать? — не очень уверенно предположил ведущий.</p><p class="p1">Списочный состав молчал, напуганный предположением о том, что на его примере здесь сейчас будет показано.</p><p class="p1">— Я скажу, с вашего позволения, — из-за стола поднялся доселе молчавший длиннолицый штатский с зализанной прической. Если у прочих выступающих была стертая внешность, у него не было вовсе никакой — то есть пока он не встал, его вообще никто не замечал; встав, однако, он оказался почти двухметровым, очень, очень большим, как и всегда бывает с тайными сущностями, скрытыми до времени. — Я буду краток вообще-то, я только хочу сказать, что видел отдельные перемигивания, такие переглядывания, слышал соответствующие смешки. Я хотел бы сказать, что мы, люди спецподразделений, не очень, может быть, умеем говорить так, как этого бы хотелось иногда любителям всяких, значит, половых извращений, поклонникам анального фистинга и других так называемых развлечений. Все эти лимоны на ветках яблони и так далее. Но вопрос не в том, насколько развесисто мы говорим, а в том, что мы делаем и как мы понимаем государеву службу. Вот это понимание государевой службы я хотел бы донести, чтобы всякая перверсия, вся эта тут собравшаяся дрисня, чтобы вы не понимали о себе очень много, когда тут перед вами говорит человек, не умеющий, может быть, какие-то особенно яркие экзистенциализмы и подобный куннилингус тут из себя для вас изобразить. Мы тут собрались не клоуны, и я хотел это подчеркнуть. Я надеюсь, что вы это поняли и будете соответственно.</p><p class="p1">Он сел и мгновенно растворился в среде. Списанты потрясение молчали.</p><p class="p1">— Спасибо за внимание, товарищи, — упавшим голосом сказал Кошмин. Кажется, он почувствовал, что упустил бразды и что ему никогда не научиться так вести оперативные мероприятия. — Вы можете пока быть свободны, а дальше будет доведено. Приобрести книгу желающие могут на выходе.</p><p class="p1">Некоторые приобретали. Волошин хихикал, прикрывая рот рукой. На выходе он и Свиридов столкнулись с Абрамовым.</p><p class="p1">— Пойдемте в сушницу посидим, — предложил Абрамов. Вид у него был встревоженный, но говорил он нарочито громко и весело.</p><p class="p1">— Да, пойдемте, — согласился Свиридов. Просто так расходиться было страшновато, а главное, он ничего не понимал.</p><p class="p1">В Москве бурно и кратковременно цвел консьюмеризм, в рестораны впервые на свиридовской памяти стало не попасть, на Новом Арбате особенно. Денег в какой-то момент стало больше, чем нужно на выживание, но меньше, чтобы заставить их работать, вложить в квартиры или дело, и очевидной сделалась невозможность перепрыгнуть в другой имущественный ряд: стало понятно, что все останутся там, где их застигло стабильностью. С тоски беспрерывно закупались и жрали. В сушницу войти не удалось — хвост очереди торчал из дверей. Волошин признался, что не помнит такого наплыва голодных с советских времен. Удовлетворились «Рахат-лукумом», набрали бессмысленно много, словно пытаясь себе доказать, что властны хотя бы над меню. Собственно, окружающий консьюмеризм диктовался теми же соображениями: утратив прочие признаки жизни, изо всех сил эксплуатировали последний — emereo ergo sum.</p><p class="p1">Здесь, в кафе, на мягких низких пуфах, расслабились, но вдруг напрягся Абрамов. Видно было, что его переполняет страх, зыбкая неуверенность, что он и вообще человек нервный, — но заговорил он бравурно, напористо:</p><p class="p1">— Ну и что, я вообще не понимаю, что такого!</p><p class="p1">— Не понимаете — и очень хорошо. Это приятель ваш? — спросил Волошин у Свиридова.</p><p class="p1">— Только что познакомились. Но, я думаю, в списке мы все уже… так сказать, приятели, — попытался примирить их Свиридов.</p><p class="p1">— Нет, нет. Даже если у одной стенки — все равно есть разногласия, и я совершенно не против обсудить. Общность участи не должна стирать грани. Так что, Григорий, вы полагаете — все в порядке вещей?</p><p class="p1">— Вот скажите вы мне, простому человеку, — проникновенно начал Абрамов. — Я в автосервисе мастер. Вот чего вам такого сейчас нельзя, что было можно при Ельцине там, при Горбачеве?</p><p class="p1">— Это жульнический вопрос, но я вам объясню, — кротко отвечал Волошин. — При Ельцине был веер возможностей, сейчас их нет.</p><p class="p1">— У кого он был? У вас? У меня никаких возможностей не было. У меня две дочери, сейчас у меня есть возможность их достойно кормить. Тогда у меня не было, я по семи работам бегал, и жена то же самое. Голосовать вы можете? Можете. И вы знаете, что люди действительно так голосуют, потому что восемьдесят процентов подтасовать нельзя — так?</p><p class="p1">Волошин кивал. Ему лень было спорить. При этом Свиридов отлично чувствовал, что Абрамов умен и нервен, что заговаривает он прежде всего себя — но заговаривает убедительно, выработав аргументы долгим опытом. У него сильно дергалось веко — то ли от страха разносных возражений, то ли от более глубокого ужаса, связанного, возможно, со списком.</p><p class="p1">— И я ничего ужасного не жду от этого списка. Я к этому отношусь как к призыву в армию, и мне вовсе необязательно думать, что меня там будут бить и изничтожать. Это все стереотипы, навязанности, мне смешно слушать это все, я служил — меня никто не бил, меня поди побей… Это же каждый сам позволяет с собой делать.</p><p class="p1">— Ну хорошо, очень хорошо! — повторял Волошин. — Нам-то вы зачем все это рассказываете, про свое исключительное счастье? Счастье не кричит о себе! — Он с удивительной легкостью умудрился записать Свиридова к себе в союзники, тогда как Абрамов, вот странность, был Свиридову скорее симпатичен: по крайней мере он пытался думать, тоже дело.</p><p class="p1">— А потому что я вижу, что вы все рассматриваете с точки зрения стереотипов! Для вас это обязательно конец и гибель, а я хочу понять, просто искренне понять: что вам не нравится? Что такого делается, что не нравится?</p><p class="p1">— Это вы для себя хотите сформулировать, — мягко сказал Свиридов. — Я вам, Гриша, помогу. Я тоже ничего особенно ужасного не чувствую, чувствую только, что все как бы стало безразлично, потому что ничье мнение уже не важно. Это раз. Второе…</p><p class="p1">— А в девяносто шестом было важно ваше мнение? — перебил Абрамов. — Еще наглей жулили, и что?</p><p class="p1">— Так ведь важность мнения выражается не в том, что его слушаются, — терпеливо объяснял Свиридов. — Ему просто позволяют быть, и не устраивают всей этой демагогии про лимоны и яблоки, про первертов и продажу, и что геополитически необходимо заткнуться… В девяностые по крайней мере было ясно, где добро и зло, при том, что власть вовсе не обязательно была добром. Она даже с ним не отождествлялась. Просто была система ценностей, и все. Сегодня ее нет, и правы те, кто ведет себя самым наглым образом.</p><p class="p1">— Не вижу я этого! — искренне уверял Гриша. — И не вижу, чтобы рулили дураки. Я вижу, что у меня впервые президент, за которого мне не стыдно. Он не пьет, не стреляет по парламенту и знает языки. А у вас принцип двоечника, вы простите, конечно: когда в школе бардак и директор запил, ему гораздо спокойнее. А сейчас директор не пьет и школу не раскрадывают, а значит, могут вызвать к доске. Вот и считайте, что вас — нас — вызвали к доске. Не двойку получать и не пороть, а реально спросить, что и как вы думаете…</p><p class="p1">— Вот эти крючники нас о чем-то хотели спросить? — спросил Волошин с непередаваемой брезгливостью.</p><p class="p1">— А почему нет! — отчаянно воскликнул Абрамов. — Просто они не очень умеют спрашивать, но нам же никто не мешал говорить?</p><p class="p1">— Никто, никто не мешал. Давайте вы, Гриша, лучше про девочек расскажете. У вас, вы говорите, две дочери. Это очень интересно.</p><p class="p1">…Свиридову с Волошиным оказалось по пути — журналист жил на Ленинском, Гриша откололся и поехал в свое Отрадное, где ему было так отрадно в трехкомнатной квартире продуваемого всеми ветрами блочного дома. На прощанье все обменялись телефонами, а Абрамов даже сообщил свой адрес — Декабристов, 25 и 25, запомнить очень просто.</p><p class="p1">— Странно, — сказал Волошин. — У меня тоже квартира двадцать пять.</p><p class="p1">— А дом?</p><p class="p1">— Дом девяносто один, по Ленинскому.</p><p class="p1">— Интересно, — сказал Абрамов. — Может, в списке все из квартир двадцать пять?</p><p class="p1">— Нет, у меня девяносто три, — признался Свиридов.</p><p class="p1">— А дом?</p><p class="p1">— Сорок пять, — соврал Свиридов. Он не хотел давать кому попало свой адрес, тем более, что Абрамов хвалился уникальной памятью.</p><p class="p1">— Очень типичный представитель, — ворчал в такси Волошин. — Такого пока жизнь рылом не ткнет — ничего не начнет понимать.</p><p class="p1">— Но, может, ему действительно стало лучше? Нельзя же всех по нам…</p><p class="p1">— Да ничего ему не стало лучше, просто атрофировались какие-то рецепторы, принюхался. Хорошо бы его ткнуть как следует. Это ведь именно такие всю жизнь говорили: зря не посадят, зря не скажут, просто так в Горький не сошлют… Бессмертный тип довольного человека.</p><p class="p1">— Вы не поняли, он себя уговаривает, а не вас!</p><p class="p1">— Так еще хуже. Что подлей — себе врать или другому?</p><p class="p1">— Тоже верно, — вздохнул Свиридов. — Ну а сегодняшнее-то мероприятие было зачем?</p><p class="p1">— Для ясности, — буркнул Волошин. — В общем, будьте на связи. Если что узнаю — сразу позвоню. Вам работать-то дают?</p><p class="p1">— Со «Спецназа» поперли, а шоу оставили.</p><p class="p1">— Вот свиньи! — возмутился Волошин. — Что же вы молчите?</p><p class="p1">— Да стыдно жаловаться, Андрей. Взрослый мужик…</p><p class="p1">— Ничего себе, интересно! Жаловаться ему стыдно! Вы это бросьте. Обязательно на неделе в эфир позову.</p><p class="p1">— Лучше работу подбросьте.</p><p class="p1">— И про это подумаем, — сказал Волошин, вылезая напротив улицы Стасовой.</p><p class="subtitle">9</p><p class="p1">В летней жизни списка, абсурдной, насыщенной, неопределенной, отчасти бардачной, вспоминавшейся потом с ностальгической нежностью, потому что следом настало угрюмое осенне-зимнее выжидание, — самым громким событием стала диспансеризация.</p><p class="p1">О ней стало известно внезапно. Никто не успел подготовиться. Вечером пятого августа позвонила Бодрова и бойко сообщила, что лично ей пришла повестка в поликлинику Двенадцатого управления. Что это за управление, она не знала, но всем списантам надлежало явиться туда шестого в девять утра.</p><p class="p1">— А что, вам на всех прислали? — неприязненно спросил Свиридов.</p><p class="p1">— Нет, но просто большинство получило, и я всех обзваниваю на случай, если почта не успела, — радостно отчиталась Бодрова. В ней кипел организационный азарт, она словно вернулась в пионерское детство. В очереди на гильотину она точно так же строила бы всех — бодрее! ровнее, товарищи! — и тем отвлеклась бы от ужаса смерти. — Я подумала, если пятьдесят человек получили, так надо всем, просто не всем успели доставить. Позвонила в эту поликлинику, там телефон указан, и они сказали, что да, всему списку желательно прибыть. На работу они дадут справку.</p><p class="p1">— Мне не нужна справка на работу, — сказал Свиридов. — Я просто не понимаю, зачем диспансеризация.</p><p class="p1">— Ну мы же никто не понимаем, — снисходительно пояснила Бодрова. — Откуда мы можем знать? Там скажут.</p><p class="p1">Бодрова во всех вопросах была на стороне составителей списка, потому что благодаря им получила статус. Это был своего рода стокгольмский синдром, всегда присущий старостам бараков.</p><p class="p1">Свиридов отчаянно не хотел на диспансеризацию. Он вообще не обращался к врачам, обходясь народной медициной, да и не болел ничем серьезней простуды или похмелья. Врачи представлялись ему силой враждебной, иррациональной и липкой: кто раз попадал в их лапы, назад уже не вырывался. В платной медицине существовал принцип домино: однажды Свиридов, гостя на даче у приятеля, рассадил ногу ржавым гвоздем. Нога опухла, он отправился к хирургу, но хирург, наложив повязку, отправил его на консультацию к трем дополнительным специалистам — ему не понравилось свиридовское плоскостопие, смутил конъюнктивит и прикус; Свиридов ни к кому не пошел, отек спал через три дня, но осадок остался. Вместе с тем оклик ветерана на встрече со спецслужбами изрядно его перепугал, а усугублять свое положение отлыниванием от общесписочных мероприятий он не хотел. Диспансеризация, что страшного? В армию не призовут, ему двадцать восемь, в лагерь не отправят — это делается без диспансеризации, — а что, если всех нас отобрали для секретной миссии?!</p><p class="p1">Отвратительней всего было вставать в семь утра. Поликлиника загадочного Двенадцатого управления располагалась за «Соколом», у черта на рогах, он добрался туда с пересадкой, опасаясь попасть в пробку на «жигуле» (Ленинградка наглухо стояла каждое утро) и обнаружил, что списанты явились обследоваться на удивление дружно. У некоторых были при себе повестки на бланке поликлиники с формулировкой «6 августа надлежит вам явиться». Это явно напоминало военкоматские формулировки; «приглашаем» звучало бы, конечно, цивильней, а с «надлежит» не поспоришь. Явиться надлежит и никуда не убежит. Поразительней всего было то, что человек десять пришли с узелками, в которых имелись, так сказать, находились, присутствовали согласно норматива примитивный сухпаек в виде чая, соли, китайской лапши, а также смена белья и котелок. Именно с таким набором обычно предписывалось явиться в военкомат.</p><p class="p1">— Господа, — спросил Свиридов у двух невысоких, пузеньких, почти одинаковых мужичков в клетчатых ковбойках. — А чего вы уже с вещами-то?</p><p class="p1">Мужички помолчали.</p><p class="p1">— А кто знает? — сказал наконец один, выбрасывая окурок «Дуката». — Может, сборы. Так, по виду-то, больше всего на сборы похоже.</p><p class="p1">— Не вызывали лет пятнадцать, вот и распустились все, — поддержал другой. — А теперь вспомнили, и марш-марш. Путин не даст на печке-то лежать, надо все же помнить, что мужики…</p><p class="p1">— А женщин почему? — не поверил Свиридов.</p><p class="p1">— Ну, мало ли — почему… Мож, они военнообязанные. Которые медики — те военнообязанные. Вот ты служил?</p><p class="p1">— Я на военной кафедре был, — объяснил Свиридов.</p><p class="p1">— Ну, эт не служба… Если мужик, то служи.</p><p class="p1">Мужички были того парад-планетского, абдрашитоминдадского типа, который Свиридов ненавидел с детства: простые, немногословные, статистическое большинство. Побыть настоящими мужчинами им было негде, и они с радостью ехали на военные сборы, где постигали мужское братство и чувствовали себя невдолбенно крутыми. Они любили порассуждать, что такое мужик, чего мужик должен и не должен, почему быть мужиком правильно, — Свиридов терпеть не мог слова «мужик», хуже был только «пацан». Как много всего я не люблю, о Господи, — но разве это не норма? Кто вообще сказал, что всех надо любить, особенно когда тебя, не спросимши, поместили в список живущих?</p><p class="p1">Троица Панкратов — Гусев — Бобров уже стояла у входа, лучась, как на плакате. Они добродушно подкалывали вновь прибывающих. То есть им казалось, что они добродушно подкалывают, — на самом деле они бычились и хамили, употребляя через слово «гыгы» и «бугага». Главной темой шуток служило предполагаемое превращение списантов в гигантский диверсионный отряд с последующим захватом Грузии. Казалось, что Гусев тут главный и затеял всю диспансеризацию по собственной инициативе.</p><p class="p1">— Эй, сценарист! — крикнул Бобров Свиридову. — Чего хмурый? Не хотим служить России?</p><p class="p1">— Чего вы хотите, я не знаю, — сказал Свиридов. — А я хочу, чтоб ты рот закрыл.</p><p class="p1">— Чего? — не понял Бобров и двинулся прямо к нему, распихивая списантов. — Ты чего сказал-то, сценарист?</p><p class="p1">— И уши промой, — сказал Свиридов. — Я тебе повторять замучаюсь.</p><p class="p1">— Ой, ребята, не ссорьтесь, — сказал высокий мужчина лет сорока, с привычно-страдальческим, как у старого язвенника, выражением лица. Свиридов потому и храбрился, что отлично понимал: здесь им с Бобровым подраться не дадут, много народу.</p><p class="p1">— Ты чего разговариваешь так? — спросил Бобров.</p><p class="p1">— А как?</p><p class="p1">— А грубо. — Бобров взял его за пуговицу. — Не надо со мной грубо разговаривать, ты не дома у себя.</p><p class="p1">— У меня дома хамов нету, — объяснил Свиридов.</p><p class="p1">— Ребята! — рослый язвенник уже вклинивался между ними, болезненно морщась. — Ну и так прессуют со всех сторон, так еще и вы тут…</p><p class="p1">— Нет, пусть он объяснит, че он так разговаривает, — гнул свое Бобров, явно радуясь при этом, что не придется обострять конфликт.</p><p class="p1">— Ты тут главный, что ли? — спрашивал Свиридов, снимая его цепкую лапу с пуговицы.</p><p class="p1">— А че, может, ты главный? — спрашивал в ответ Бобров.</p><p class="p1">— А я в главные не рвусь. Тут командиры без надобности.</p><p class="p1">Он прикидывал: его сил и нехитрых умений хватило бы засветить Боброву как следует хоть раз, а больше и не надо. Но рослый уже решительно встал между ними, подтянулись и пузанки: «Мужики, не заедайтесь, нечего, нечего».</p><p class="p1">— А то вон медицинская помощь близко, — кривовато улыбаясь, сказал Бобров. — Сразу и окажут. А, сценарист?</p><p class="p1">— Да я здоров вроде бы, — сказал Свиридов.</p><p class="p1">— Это пока, — сплюнув, сказал Бобров и отступил к своим. Гусев и Панкратов быстро начали что-то ему втолковывать, он отмахивался.</p><p class="p1">— Я Чумаков, Владимир, — представился рослый. — А вас я знаю, вы Свиридов, про вас в газете писали.</p><p class="p1">— Попал под лошадь, — усмехнулся Свиридов.</p><p class="p1">— А что, все равно польза. А то замалчивают, верно я говорю?</p><p class="p1">При всей рослости и кажущейся солидности Чумаков был робок, явно встревожен и все время переспрашивал, верно ли он говорит. Он успел рассказать Свиридову про супругу — такие люди всегда говорят «супруга» — и матушку, пенсионерку, жутко перепуганную всей этой историей. Матушка и так плохо ходит, а тут эти дела. Свиридов силился изобразить сочувствие, хотя чужие беды в последнее время его скорей злили, чем печалили, — своих некуда было девать, и жалкие истории прочих списантов давили на больную мозоль. По счастью, ровно в девять распахнулись двери поликлиники Двенадцатого управления — семиэтажного белого здания в стиле позднего совка, с мозаикой в вестибюле (могутная роженица, ее светлоглазый муж, так сказать, супруг, на пороге роддома — и с умилением машущая им вслед чета врачей, тоже явно собирающихся размножиться). Раздраженная тетка в халате неприветливо крикнула:</p><p class="p1">— Кто по вызову, на диспансеризацию, заходим!</p><p class="p1">Свиридов был потрясен: поликлиника в этот день работала исключительно на них. На дверях висело объявление — красным фломастером на бланке главврача: «6 августа поликлиника работает по спецобслуживанию. Срочная помощь на дому — тел. 151-36-85». Надо же, подумал Свиридов, как все серьезно-то.</p><p class="p1">— Шестое августа по-старому, преображение Господне, — сказала с заискивающей улыбкой худая очкастая женщина лет тридцати. Свиридов не помнил случая, чтобы кто-нибудь шестого августа не процитировал эти стихи, хотя у него этот день ассоциировался прежде всего с Хиросимой. Но очкастую ему было жалко, она явно принадлежала к вымирающему типажу полуинтеллигентов, отставших от своего берега и не приставших к чужому; в сущности, он и сам был этой же породы.</p><p class="p1">— Смягчи последней лаской женскою мне горечь рокового часа, — сказал он, не глядя на нее, дабы она не питала лишних надежд, принимая цитату за призыв. Он знал, что иногда простейший диалог типа «пароль — отзыв» значит больше любых утешений, и был вознагражден осторожным, царапающим поглаживанием по рукаву.</p><p class="p1">По коридору почти пробежал высокий бородач — такими изображают хирургов.</p><p class="p1">— Диспансеризуемых пригнали, Ксения Антоновна? — спросил он запускавшую их в вестибюль бабу в халате.</p><p class="p1">— По списку, Борис Львович! — рапортовала она.</p><p class="p1">Он кивнул и прошагал дальше. У него, наверное, все было хорошо. Бывают уверенные и веселые врачи, от которых пациенту легче, а бывают другие, не менее уверенные и веселые, при виде которых пациент немедленно смекает, что ему кранты. Чем первые отличаются от вторых — сказать невозможно, но первые умудряются транслировать больным свою энергию и силу, а вторые подчеркивают ее и тем окончательно отгораживаются от сирых и убогих. Это как-то на уровне жеста, взгляда (вставить в медицинский триллер): две категории врачей, один лечит, другой калечит, разницы в методах никакой. Ну, это все теперь из категории ЕБЖ — если буду жив. А жив я, кажется, не буду. Воображение всю жизнь спасало и кормило меня, а теперь оно — мое проклятие. Что живому хорошо, то мертвому смерть.</p><p class="p1">Диспансеризация была как диспансеризация — кровь, флюорография, пробег по специалистам с выкликанием списантов по алфавиту; как ни странно, примерно треть принесла спичечные коробки с дерьмом. Воистину, если завтра позовут на виселицу, половина припрется со своей веревкой; интересно, каких послаблений они рассчитывают добиться? Доктор, вот дерьмо; это вам, доктор! Может быть, теперь меня не на общие работы, а хоть в санчасть, хоть учетчиком, нормировщиком, придурком, — ведь я принес говно! Замечательный тест на выявление потенциально лояльных, срущих с опережением. Свиридова тоже спросили, при нем ли анализ, и после отрицательного ответа посмотрели неодобрительно. Впрочем, врачи вообще были недоброжелательны. Складывалось ощущение — как почти всегда на приемах в районных поликлиниках, — что их оторвали от чего-то бесконечно ^важного, куда более значимого, нежели обслуживание одинаковых, несчастных, дурно пахнущих людей. Всякий русский человек занят чем-то великим, а любую работу воспринимает как отвлечение, почему и ненавидит ее. Что он делает, глядя в пустоту? Мыслит мир. Этой молчаливой задумчивостью держится все. Врач не любит отвлекаться на пациентов, водопроводчик — на водопровод, учитель — на учеников; даже менты мутузят задержанного с явной брезгливостью, особенно злясь на то, что он отрывает их от главного. Но в случае со списантами вечная брезгливость врачей сопровождалась особой, дополнительной подозрительностью, словно именно им надлежало выявить общую тайну, главный критерий, сплотивший их всех в единый заговор. Окулист подозрительно долго проверял и перепроверял Свиридова, так что очередь зароптала, словно он был виноват в этой дотошности; хирург щупал и мял каждого так, словно норовил вывихнуть сустав; невропатолог с особенной яростью колотил молоточком по коленкам.</p><p class="p1">— Что-то мне не нравится ваш рефлекс, — сказал он Свиридову.</p><p class="p1">— А что такое? — испугался Свиридов.</p><p class="p1">— Сифилисом не болели? — не удостаивая его ответом, спрашивал невропатолог.</p><p class="p1">— Нет, — твердо сказал Свиридов.</p><p class="p1">— Ревматизмом?</p><p class="p1">— Нет.</p><p class="p1">— Аппендицит?</p><p class="p1">— Нет.</p><p class="p1">Невропатолог не поверил и осмотрел свиридовский живот на предмет шрама. Шрама не было.</p><p class="p1">— В общем, не нравится, — повторил он. Он был невысокий, лысеющий, пухлый, больше похожий на завскладом, и смотрел на Свиридова, как Коробочка на Чичикова: понимал, что его на чем-то нагревают, но никак не мог понять, на чем.</p><p class="p1">— И что мне делать? — спросил Свиридов.</p><p class="p1">— Это уж вам видней, — развел руками невропатолог. — Вы же в списке, не я.</p><p class="p1">— А что за список? — как можно беспечней спросил Свиридов.</p><p class="p1">Невропатолог выразительно посмотрел на него, пощипывая нижнюю губу, еще выразительнее кашлянул и сел к столу — вписывать что-то в карточку.</p><p class="p1">— Я тут вам пишу, что рекомендую лыжи, — буркнул он, не отрываясь. — У нас хорошая лыжная секция при управе, занятия три раза в месяц, москвичам скидка.</p><p class="p1">— Зачем? — не понял Свиридов.</p><p class="p1">— Вы что, не знаете? По итогам диспансеризации будут рекомендованы секции.</p><p class="p1">— Но мне некогда. Я работаю.</p><p class="p1">— Это уж не мое дело, — сказал невропатолог.</p><p class="p1">— Нет, минуточку, — возмутился Свиридов. Он теперь знал, что как в ране нельзя оставлять никакой грязи, так и ему теперь нельзя оставлять в собственной жизни никаких неясностей и недоговоренностей: все они немедленно будут истолкованы в наихудшем для него смысле. — Что именно вам не нравится в моем коленном рефлексе? Мы можем это прояснить?</p><p class="p1">Невропатолог поднял на него глаза.</p><p class="p1">— Вы специалист?</p><p class="p1">— Нет, но как-нибудь пойму.</p><p class="p1">— Это неспециалисту объяснять бесполезно.</p><p class="p1">— Понимаете, — проникновенно сказал Свиридов, — у нас вся беда в том, что никто ничего не объясняет. И поэтому люди делают ошибки. Им не объясняют, как должен выглядеть настоящий патриот, кто виноват в коррупции, куда мы движемся идеологически… И потому некоторые впадают, как Волга в Каспийское море, как поэт в неслыханную простоту, как шизофреник в кататонический ступор. Понимаете? Впадают и выпадают. А все потому, что нет адекватного объяснения, и многие остаются в недоумении, в недопонимании элементарных вещей. Которые, будучи объяснены, могли бы предотвратить довольно чудовищные последствия, разве не так?</p><p class="p1">Ему казалось, что сказанное достаточно абсурдно для попадания в стилистику, в какой прошли последние три недели его жизни. Алиса в стране чудес тоже все время думает, достаточно ли чуши она наворотила, чтобы быть принятой всерьез, но логика Алисы всегда хромает уже потому, что она логика.</p><p class="p1">— У психиатра были? — спросил невропатолог. Тактика у них у всех была простая: пока ты нормальный — они тебя морочат, а стоит тебе подделаться под их бред — записывают в психи. Свиридов должен был это предвидеть, конечно. Это нормальная тактика дворовой шпаны, у них на курсе был такой человек: если перед его матерными угрозами пасовали, он взвинчивал их до блатной концентрации, но если отвечали на его языке — тут же упрекал в бестактности.</p><p class="p1">— У психиатра, — очень спокойно сказал Свиридов, — я еще не был, как вы можете видеть из карты. Но я никогда не состоял на учете и прошу только ответить мне, в чем недостаточность моего коленного рефлекса.</p><p class="p1">— В его избыточности, — неприязненно ответил невропатолог. — Вы удовлетворены?</p><p class="p1">— Нет, конечно, — сказал Свиридов. — Да что поделаешь.</p><p class="p1">Он вышел и отправился к отоларингологу. Карту ему на руки не выдали — сестра потащила ее в соседний кабинет; секретность соблюдалась неукоснительно. Диспансеризация тянулась шестой час без перерыва — шутка ли, сто двадцать человек; многие списанты появились впервые. Со временем дотошность врачей не ослабевала, а напротив, возрастала, как учащаются навязчивые повторяющиеся действия у больного или усталого ребенка. Их подозрительность была сродни этим навязчивым ритуалам — они должны были выявить нечто важное, но, вот досада, не могли. Впрочем, Панкратову предложили госпитализацию — его провели по коридору прямо в приемный покой; он гнусно гыгыкал и бодрился. Свиридов не скрыл от себя, что чувствует глубочайшее удовлетворение.</p><p class="p1">— Осторожней там с сестричками, Макс! — крикнул ему Бобров.</p><p class="p1">— Бугага! — отозвался Панкратов, но чувствовалось, что ему крепко не по себе.</p><p class="p1">«Панкреатит», — прошелестело в очереди. Созвучие позабавило Свиридова.</p><p class="p1">Очередь разговаривала главным образом о медицине, ибо эта тема неисчерпаема. Если бы их позвали на футбол — они говорили бы о футболе, а так, понятно, о симптомах и самолечении. У каждого был сосед, умерший от ерунды — сковырнул прыщ, не долечил грипп; молодежь активно обсуждала последствия спортивных травм, средний возраст беседовал о суставах и молодеющем инсульте. Большинство, оказывается, пристально следило за малейшими переменами в состоянии организма, чутко реагировало на покалывания, держалось целебных диет. Никто не верил в кремлевскую (бренд, ничего больше); раздельная тоже успела себя скомпрометировать, в последнее время в моде была сальная, при которой в меню доминировало сало. Списанты были исключительно откровенны друг с другом: чего стыдиться-то, все свои, все равно уязвимы и, возможно, обречены. Широко обсуждались последствия употребления ксеникала, вплоть до жировых лужиц в экскрементах. В очереди к стоматологу спорили о ценах на протезы и дружно ругали «Мастердент».</p><p class="p1">Вот вы хотите, чтобы писали о современности, думал Свиридов, изо всех сил стараясь направить мысли подальше от диспансеризации, к спасительному островку профессии. Конкурсы сценариев, режиссеры алчут, продюсеры умоляют: современный сюжет! Но что об этой современности напишешь, какую глубину она предполагает? Давно уже все обесценили, свели к паркам, варкам, теркам. Страсти остались только в бандитском мире, ибо это последняя, прости Господи, зона, где существуют понятия; все остальные готовы идти куда угодно по первому сигналу и проходить диспансеризацию, стерилизацию, кастрацию, поголовную аппендэктомию, прививку, промывку мозгов, промывание желудка, санацию полости рта, далее по списку. Список стал главной формой жизни, литературы, любви, далее везде. Это уже не очередь — в очереди есть хотя бы иерархия, и все стоят за чем-то; здесь только список, подвергаемый разнообразны^ воздействиям и отобранный по неясному признаку. Что можно написать обо всех нас? Велик был бы тот, кто открыл бы причину нашего ужаса: чего мы так боимся, почему добровольно шествуем в мясорубку? В том, что это мясорубка, сомневаться уже не приходится: не для того же нас собрали, чтобы распихать по спортивным секциям. Что за страх? Откуда вечное чувство вины, с которым родишься? Такое бывает с недолюбленными детьми, уверенными, что с ними можно сделать что угодно; и если все мы недолюбленные дети, тогда понятно. Родина-таки крепко нас недолюбливает — вот парадокс, любимые редко вырастают благодарными, хрен чего от них дождешься, когда призовешь на выручку. А нелюбимые всегда готовы — они понимают всю хрупкость своего мира. У кого внутри хоть тончайшее подобие стержня — тому не так дико; но в нас же все перемолото, старым позвоночники переломали, а молодым негде их отрастить. Им там кажется, что так лучше: беспозвоночными легче править; но это же до первой встряски!</p><p class="p1">В сущности, чего я так боюсь? В печи-то не сожгут, в пещере не замуруют, что еще подскажут мне память и клаустрофобия? Тюрьма? — ив тюрьме люди живут, посвободней, чем на воле… Вот: я боюсь, что не имею права быть, что в моем появлении тут с самого начала есть роковая неправильность. Я сознаю это сам и больше всего боюсь, что скажут другие, вслух. Страна попавших не туда, общество ошибившихся местом, — придут, сгонят; это чувствуют все — умные и дураки, богатые и нищие, и даже те, кому нечего терять. Все мы боимся потому, что втайне сознаем преступность своего пребывания здесь; где же мое истинное место? И главное, где те прекрасные люди, которым все это — поля, тополя — принадлежит по праву? Что-то не вижу. Вижу только охрану, выпихивающую отсюда меня; но кому я должен уступить место? Сюжет: планета, откуда выгоняют всех пришельцев, но те, кем она населена, — не настоящее население. Это выродившаяся стража, вечно ждущая настоящего хозяина, как мессию; ведь у нас ровно та же история — стране никто не подходит, ею правят оставленные тут звероватые наместники захватчиков… где-то уже было, но не беда, аранжируем. Он пытался сочинять дальше, но мысли путались.</p><p class="p1">Диспансеризация все более превращалась в сонный кошмар, и когда она закончилась — никто уже в это не верил. Сбежавших, однако, не было. Списантов препроводили в актовый зал, до сих пор — со встречи нового, 200* года — расписанный снежинками и хвойными ветками. Вышел главврач — тот самый Борис Львович. Он садически долго откашливался, обводил всех ироническим взглядом, пил воду из мутно-желтого графина, один вид которого вызывал тошноту.</p><p class="p1">— Значит, меня просили кратко обрисовать вам перспективы районного здравоохранения, — сказал он насмешливо. — Что сказать, товарищи? Перспективы есть. За отчетный год мы детально обследовали 26 875 больных, у 87 процентов из которых выявлены заболевания разной степени тяжести. Более 70 процентов из этих больных, то есть примерно 65 процентов от общего числа, практически полностью излечены — ну, с незначительными остаточными явлениями, но я не стану грузить вас подробностями. Мы особенные сделали успехи в области, конечно, физиотерапии, в чем нам значительно, я подчеркиваю, значительно помог Минздрав, выделивший совершенно новые электроимпульсные аппараты «Радиус», чья эффективность — при лечении, скажем, ангин или катаральных явлений — на 26,5 процента выше, чем у традиционного УФО…</p><p class="p1">Никто не понимал, всерьез он все это рассказывает или утонченно издевается. Свиридов заметил, что Гусев тщательнейшим образом фиксирует цифры в особой книжечке.</p><p class="p1">— Но главное наше достижение, — сказал он с тяжелым вздохом, словно его вынуждали делиться сокровенным, — это, конечно, наши спортивные секции, о которых вы уже наслышаны. По результатам обследования вашего списка тридцати семи из вас мы можем рекомендовать — со скидкой, разумеется, потому что по медицинским показаниям, — регулярные занятия на нашей базе, плюс фитнес для всех со скидкой, если вы изъявите такое желание. Наш фитнес-центр работает на итальянском оборудовании, так что сами понимаете. Встает естественный вопрос об уклонении, и я отвечу в свою очередь уклончиво. Как говорится в школе, не обязательно, но желательно. На занятия в секции направлены: Драгоманова — биатлон, Дятликович — горные лыжи, Евтеева — теннис…</p><p class="p1">Свиридов с позорной дрожью в руках ждал, куда определят его, и был потрясен, услышав, что вместо рекомендованных невропатологом лыж он направлен в секцию фехтования, к которому сроду не чувствовал интереса. Гусев, Панкратов и Бобров упомянуты не были.</p><p class="p1">— Чумаков… ну, это неважно, извините. Все.</p><p class="p1">Рослый язвенник Чумаков с облегчением расхохотался.</p><p class="p1">— Ну, благодарю за сотрудничество, всего доброго, — попрощался Борис Львович и, не предложив задать вопросы, вечной своей побежкой покинул зал.</p><p class="p1">Свиридов еле сдерживал желание расхохотаться. Вероятно, это была реакция стыдного облегчения, миновавший шок; он уловил такую же блаженную улыбку на лице давешней училки, любительницы стихов, и обменялся понимающими взглядами. Переглянулся с ним и симпатичный коротышка с маленьким умным лицом и ежиком седеющих, соль с перцем, но не редеющих волос.</p><p class="p1">— И чего думаете? — спросил коротышка.</p><p class="p1">Свиридов пожал плечами.</p><p class="p1">— Бред и бред. В диверсионную группу не верю, как хотите.</p><p class="p1">— Версийки есть. Вам куда сейчас?</p><p class="p1">Они вышли вместе. Над «Соколом» разливался пыльный розовый закат, упоительно пахло сухой травой, бензином, поздним московским летом. В арке сталинского дома напротив тоненькая девочка в белом платье с синими цветами чеканила мяч, и это зрелище уравновешивало собою почти все, о чем не хотелось ни говорить, ни думать. Свиридов испугался, что все слишком хорошо, поискал возможную порчу, дабы она не застигла врасплох, и поймал себя на новом страхе: не караулит ли за углом Бобров? Но Боброва след простыл, и это был дополнительный повод для счастья.</p><p class="p1">— Я, честно говоря, предупредил жену, что могу не вернуться, — сказал коротышка. — Зовут меня, кстати, Глазов, Глеб Евгеньевич.</p><p class="p1">Глазов, как выяснилось, работал в «Общественном мнении», а по первому образованию был этологом, то есть до социальной психологии изучал звериную. Большой разницы, по его словам, не было.</p><p class="p1">— Я у вас «Пару» читал, — сообщил он, заговорщицки подмигивая.</p><p class="p1">«Пара» была первым сценарием, который сам Свиридов считал приличным: история молодых супругов, вдруг начавших ссориться насмерть. Тут было, конечно, не без Альки. Девушку трясло от диких приступов беспричинной ненависти к возлюбленному, мирно сопевшему рядом, и она решила обратиться к регрессивному психотерапевту, гарантировавшему отыскание роковых причин в ее прошлой жизни. Как выяснилось, в этой мы общаемся в основном с тем, кого знали в прошлой, и доигрываем старые драмы. История лихо закручивалась и элегантно разрешалась, и это была единственная вещь, которую Свиридов напечатал в «Альманахе».</p><p class="p1">— Откуда вы ее взяли?</p><p class="p1">— А мне присылают «Альманах».</p><p class="p1">— Дело хорошее.</p><p class="p1">— И альманах ничего. В общем, я знаете что думаю? Что эта история немного похожа. Доигрывание давней драмы. Когда-то мы были, допустим, батальон и эффективно действовали вместе, а теперь нас собрали — и…</p><p class="p1">— Но там же в конце совсем иначе объясняется.</p><p class="p1">— Да нет, я так. Для развлечения. Если серьезно — это просто пример большой деградации. Бессмыслица на всех уровнях. Я вам как-нибудь подробней расскажу. Пойдемте выпьем?</p><p class="p1">— Давайте. Делать один черт нечего.</p><p class="p1">Они зашли в стекляшку напротив метро и взяли по двести.</p><p class="p1">— Как думаете, «Путинку» переименуют в честь преемника?</p><p class="p1">— Замучаются переименовывать, — предположил Свиридов. — Нельзя «же марку менять каждые четыре года, или даже восемь. Представляете, что было бы с «Колой» при таком ребрендинге?</p><p class="p1">— Не скажите, — засмеялся Глазов, — самый цимес может оказаться в этой смене. Оформление все прежнее, а фамилия другая. Предыдущая становится раритетом, коллекционируется, продается за бешеные деньги…</p><p class="p1">— А есть у вас в «Общественном мнении» какие-то догадки? — со старательной небрежностью спросил Свиридов.</p><p class="p1">— У меня была идея сделать опрос — хотите ли вы попасть в список. Не дали, — сокрушенно признался Глазов. — Тема засекречена.</p><p class="p1">— То есть все серьезно?</p></span>
