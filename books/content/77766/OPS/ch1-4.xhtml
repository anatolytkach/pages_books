<div class="epigraph">
<p class="p1">Писать про то, что есть, трудней, чем про то, что было или будет и чего никто не видел. Упрек в журнализме — самое легкое последствие. Но если не работать с реальностью, она такой и останется. Большая часть романа придумана и написана в Артеке, в гостинице «Адалары», персоналу которой автор, пользуясь случаем, свидетельствует любовь и благодарность.</p>
<p class="text-author">Дмитрий Быков,</p>
<p class="text-author">Москва, январь 2008</p>
