<p class="p">ЧАСТЬ ПЕРВАЯ</p>
<p class="p">ПЕРЕЧЕНЬ ПРИЧИН</p>
</div><p class="subtitle">1</p><p class="p1">Во Внукове сценариста Сергея Свиридова, вылетавшего в Крым на детский кинофестиваль с картиной «Маленькое чудо», задержали на границе.</p><p class="p1">Свиридов поздоровался с добродушной блондинистой пограничницей, протянул ей загранпаспорт (можно было лететь с российским, но Свиридову нравилось думать, что он представляет работу за границей) и приготовился ждать. Обычно процедура занимала не более минуты. Блондинка, однако, вгляделась в документ, сверилась с увесистым талмудом, потом с двумя списками в полиэтиленовых папках, потом куда-то позвонила и зачитала свиридовские данные. Свиридова испугало не это, а взгляд, которым она уперлась в него после этих процедур. Обычно в случае непредвиденной задержки — мало ли, фамилия совпала с подозрительной, — погранцы смотрели виновато: свои люди, формальность. Теперь же на Свиридова смотрели с выражением, слишком ему знакомым по генетической памяти: «Будем признаваться или дальше обманывать органы?».</p><p class="p1">— Что-нибудь не так? — с отвратительной заискивающей интонацией спросил Свиридов.</p><p class="p1">— Вам все скажут, — ответила пограничница, чье добродушие мигом испарилось. Свиридов хорошо знал, как это бывает. На таких должностях добрых не держат, да они и не пойдут.</p><p class="p1">— Но в чем дело? — все еще мирно спросил он. — Документ неправильный?</p><p class="p1">— Отойдите в сторону и ждите, — сказала она уже с раздражением. — Через пять минут перезвонят, и пройдете.</p><p class="p1">— А кто вам должен перезвонить?</p><p class="p1">— Не мешайте проходу! — прикрикнула она.</p><p class="p1">Свиридов шагнул в сторону, пропуская потную мамашу с вялым мальчиком лет трех. Беспомощно распяленный паспорт сценариста остался лежать перед пограничницей. Ясно было, что Свиридов уже никуда не денется, так и будет стоять в сторонке. Он был привязан за паспорт. Слава богу, он один летел от группы: издевательствам не было бы конца. «А я всегда знал, что Серый неблагонадежен. У него в пузе наркотики, девушка, проверьте пузо!» Мимо прошел кинокритик Лосев, неприятный человек с энтевешным прошлым. Вел на старом НТВ информационную кинопрограмму «Куда пойти», над названием которой сам без устали каламбурил. Тип был скользкий — из тех, что всегда ругают власть, но им ничего за это не бывает. После разгона он спокойно устроился на ТВЦ, но так и ходил в ореоле гонимого.</p><p class="p1">— Что, Сережа, — сказал он сочувственно, — за границу не пускают?</p><p class="p1">— Да вот, — не желая откровенничать, неопределенно ответил Свиридов.</p><p class="p1">— Девушка, вы его что, не знаете? — спросил Лосев пограничницу. — Благонадежнейший малый, сценарист сериала «Погибель Отечества». Не смотрели?</p><p class="p1">— Проходите, — нелюбезно сказала пограничница Лосеву, с силой проштамповывая его паспорт, пухлый от вклеенных виз. Лосев не вылезал с международных фестивалей, эстет гребаный.</p><p class="p1">— Ну давай, — с тайным торжеством произнес Лосев, помахал Свиридову и прошел мимо.</p><p class="p1">Прошли еще двое, один задел Свиридова тяжелым чемоданом — конечно, теперь можно…</p><p class="p1">— Девушка, — робко напомнил о себе Свиридов, — у меня вылет через полчаса. Сейчас посадка закончится.</p><p class="p1">— Надо пораньше приходить, — предсказуемо ответила пограничница, не глядя на него.</p><p class="p1">— Но могу я узнать, в чем дело?! — возмутился Свиридов.</p><p class="p1">— Все скажут, — повторила она.</p><p class="p1">— Я что, вообще могу не вылететь?</p><p class="p1">— Можете, — спокойно ответила она. — Я здесь для того и сижу.</p><p class="p1">— Для чего?</p><p class="p1">— Для контроля. Отойдите с прохода, гражданин.</p><p class="p1">Вот как, уже и гражданин. Свиридов озлился. Страх начал вытесняться раздражением: в конце концов, он не знает за собой ничего такого. Почему он должен отвечать за идиотские сбои в их системе? Ульмана не могут поймать, а сценариста могут!</p><p class="p1">— Если у меня сорвется вылет на фестиваль, вы ответите лично, — пригрозил он. Пограничница не удостоила его ответом.</p><p class="p1">— Вы меня слышите? — спросил он.</p><p class="p1">Она сняла трубку и набрала трехзначный номер.</p><p class="p1">— Пятый? — сказала она. — У меня человек угрожает. Чего-то, говорит, отвечу. Да, бузит громко. Подойдите, объясните, кто чего ответит. А то он чего-то это. Да. Хорошо.</p><p class="p1">Она положила трубку и подняла на Свиридова торжествующий взгляд.</p><p class="p1">— Сейчас вам всё ответят, — сказала она. — Придет майор и всё ответит.</p><p class="p1">К Свиридову уже направлялся майор неизвестных войск в белой летней форме. Он выскочил, как черт из табакерки, из потайной двери под лестницей — из щели, в которую незаметно проваливаются неблагонадежные; за дверью мог быть обезьянник, камера пыток, что угодно.</p><p class="p1">— Этот? — сквозь стеклянную стену кабинки спросил он пограничницу, указывая на Свиридова и не удостаивая его обращением. Толстуха радостно кивнула.</p><p class="p1">— Пройдите, — сказал майор, показывая на дверь.</p><p class="p1">— Но почему, собственно…</p><p class="p1">— Мне наряд вызвать? — скучно спросил майор. Свиридов понял, что шутки кончились. Он пожал плечами и пошел за майором в незаметную дверь.</p><p class="p1">Там не было ничего ужасного — служебное помещение, стул, стол, диванчик. О камере пыток напоминал только стандартный мутный графин с желтой, явно железного вкуса водой. Только такой и освежаются палачи — другая не восстанавливает палаческих сил.</p><p class="p1">— Присаживайтесь, — сказал майор, сам уселся за столик и вернулся к разгадыванию кроссворда в газете «Зятек».</p><p class="p1">— Могу я узнать, в чем моя проблема? — после минутной паузы спросил Свиридов. Вот-вот должны были объявить посадку.</p><p class="p1">Майор поднял на него белесые глаза и некоторое время смотрел молча, исподлобья, ожидая, что жертва не выдержит гипноза, устыдится, опустит очи долу и погрузится в раскаяние. Но Свиридов смотрел прямо, с вызовом, и майор вынужден был нарушить молчание.</p><p class="p1">— Вам объяснят.</p><p class="p1">— Кто объяснит?</p><p class="p1">— Касающиеся люди.</p><p class="p1">— Понимаете, я должен вылететь сегодня…</p><p class="p1">— Мы понимаем, что вы должны. Мы должны, и вы должны. Происходит проверка. По результатам проверки вы или вылетите, или… — Майор сделал паузу, Свиридов замер. — Или не вылетите.</p><p class="p1">Свиридов и раньше догадывался, что эти люди имеют над его планами куда большую власть, чем он сам. Никакие перетряски и переименования не могли лишить эту службу, мгновенно опознаваемую по интонациям, даже толики прав. Майор продолжил штурм кроссворда. Минут через пять он снова поднял на Свиридова белесоватые глаза и спросил:</p><p class="p1">— Русский советский писатель, автор повести «Обмен». Восемь букв.</p><p class="p1">— Трифонов, — услужливо ответил Свиридов. Майор кивнул, словно вопрос был частью проверки. Странно, подумал Свиридов. Может, он дает мне понять, что не считает врагом? Станут они у врага спрашивать, кто автор повести «Обмен». Враг наверняка введет в заблуждение. Но, может, то, что я читал Трифонова, само по себе криминал? Может, это специальный чекистский тестовый кроссворд? Взрывчатое вещество из восьми букв, первая «г». Гексоген. Пройдемте. Голова продолжала плодить сюжеты даже в теперешних мутных обстоятельствах. Из подозрительных людей тревожно-мнительного склада получаются наилучшие сценаристы — они вечно озабочены сценариями воображаемых козней, которые против них плетутся.</p><p class="p1">Тут у майора на столе зазвонил телефон, и разгадывание тест-кроссворда прервалось надолго. Майор чертил на газете сложные зигзаги, слушал равнодушно, иногда кивал.</p><p class="p1">— Ага, — сказал он. — Добро. Ага. Нет, здесь. Спокойно. Да нет, непохоже. Хорошо. Понятно. Зеленый. Нет, вчера. С запада. Сорок семь. Четырнадцать. Ага. Добро. Ага.</p><p class="p1">Само собой, Свиридов прислушивался ко всем этим репликам с особым вниманием, надеясь уловить в них разгадку своей судьбы, но ни цвета, ни цифры, ни стороны света не имели к нему никакого отношения. «Ага, шпион с запада, на вид сорок семь, от страха зеленый, сумка весит четырнадцать, ага, везет добро, ага», — машинально реконструировал он, поражаясь собственному спокойствию. Ужас положения еще не дошел до него по-настоящему.</p><p class="p1">— Можете лететь, — лениво сказал майор, положив трубку, но все еще глядя на Свиридова, словно удерживая его взглядом. Вероятно, он ждал вопроса.</p><p class="p1">— А что это было? — спросил Свиридов.</p><p class="p1">— Плановая проверка, — сказал майор.</p><p class="p1">— По какой линии?</p><p class="p1">— По нашей, — с вызовом ответил майор. Видимо, теперь Свиридову можно было знать об этом.</p><p class="p1">— И что выяснилось?</p><p class="p1">— Что все в порядке, — отводя глаза, сказал майор. Все явно было не в порядке, и он хотел оставить в теле жертвы отравленную иглу. Загноившаяся жертва будет вкуснее.</p><p class="p1">— А конкретно? — настаивал Свиридов. Он знал, что такие ситуации надо выскребать, дочерпывать до конца, как выскребают рану: малейшая двусмысленность могла отравить все, дать корни, побеги, превратиться в целую историю с задержанием.</p><p class="p1">— А конкретнее, — с тем же вызовом ответил майор, — вы в списке. Поэтому подлежите дополнительной проверке.</p><p class="p1">— В каком списке? — не понял Свиридов.</p><p class="p1">— Это уж я вам не могу сказать. Это сверх полномочий. Идите, самолет улетит.</p><p class="p1">Свиридов встал, подхватил чемодан с ноутбуком и побежал к будочке пограничницы. Его паспорт по-прежнему лежал перед ней, и она его уже штамповала.</p><p class="p1">— Ну? — сказала она с прежним добродушием. — И чего было буянить?</p><p class="p1">— Я не буянил, — сказал Свиридов. Здесь тоже было важно отмести ложные формулы, иначе где-то глубоко в его досье, которое наверняка ведет какая-нибудь белоформенная инстанция, так и останется запись: буянил в аэропорту. А это подозрительно, особенно если буянил стрезва. — Вы, пожалуйста, слова выбирайте.</p><p class="p1">Пограничница молчала. Такие мелкие уколы ее не трогали. Она протянула ему проштампованный паспорт.</p><p class="p1">— А в каком я списке, можно узнать? — менее уверенно, чем хотелось бы, выговорил Свиридов.</p><p class="p1">— Вы опять, гражданин? — спросила пухлая уже грозно и взялась за телефонную трубку, но Свиридов не стал ждать второго появления майора и стремглав проскользнул на ничейную землю. До конца посадки оставалось четверть часа.</p><p class="p1">Как все нервные люди, он испытывал потребность немедленно поделиться своей странной бедой и выслушать утешение, но из знакомцев на фестиваль летел один Лосев, а с этим человеком Свиридов не склонен был делиться чем бы то ни было. На свое счастье, он обнаружил в хвосте ЯКа толстого оператора Горного, с которым познакомился еще во ВГИКе, но общался редко. Горный был человек медлительный, задумчивый, крепкий ремесленник, не более, но сейчас именно такой спокойный малый был нужен Свиридову, чтобы рядом с его непрошибаемым спокойствием прийти в себя.</p><p class="p1">— Ты представляешь, Горный, — сказал Свиридов, — меня чуть на границе не задержали.</p><p class="p1">Горный медленно повернулся к нему.</p><p class="p1">— А чего?</p><p class="p1">— Да говорят, я в каком-то списке. Ты не знаешь, что за список?</p><p class="p1">— На границе?</p><p class="p1">— Ну.</p><p class="p1">— А ты не попадал раньше? Вез там чего-нибудь…</p><p class="p1">— Да я на Украине не был с пятого класса, когда меня мать в Крым возила.</p><p class="p1">— Ну не в Крым… Еще куда-то…</p><p class="p1">— Нет, не попадал.</p><p class="p1">— Ну не знаю. — Тормоз Горный был из тех, в чьей медлительности и немногословии окружающие часто угадывают бездны, Свиридов сам слышал, как восторженная девочка курсом младше распиналась в общаге: «Леша — очень, очень правильный человек!»; но на деле, как и у большинства туго соображающих и молчаливых увальней, за душой у него не было ровно ничего. Искать у него сочувствия было не перспективней, чем исповедоваться шкафу.</p><p class="p1">— А ты не слыхал, чего за списки?</p><p class="p1">— Не знаю, — повторил Горный.</p><p class="p1">Свиридов отвернулся и стал перебирать в уме свои прошлые грехи. От этого занятия его отвлек взлет. Свиридов терпеть не мог летать, от любой турбулентной болтанки бледнел и хватался за подлокотники, ЯК долго пробивал облачный слой, его мотало, на время мысли о списке вытеснились более ощутимой опасностью. Но на земле, в дождливом Симферополе, особенно неожиданном после знойной распаренной Москвы, на Свиридова напал настоящий ужас: что я такого сделал? Была, впрочем, надежда, что хоть на украинской границе его пропустят сразу, — но и тут долго сверялись с пластиковым талмудом, а потом молоденький пограничник выбрался из кабинки и под ропот очереди куда-то ушел со свиридовским паспортом.</p><p class="p1">— Ишь, — сказал Лосев из-за красной черты. Он стоял за Свиридовым и, кажется, ничуть не огорчился задержке. — Серьезных дел натворил Сережа. Мало что из России не выпускают, но и в Хохланд не берут. — Про Хохланд он говорил нарочито громко, бравируя пренебрежением к оранжевой загранице, и соседняя очередь, состоявшая из граждан Украины, одобрительно заулыбалась. Лосеву все сходило с рук.</p><p class="p1">Свиридов принужденно хихикнул. Все это, однако, переставало забавлять его.</p><p class="p1">Пограничник вернулся минут через десять.</p><p class="p1">— А у вас при пересечении российской границы не было проблем? — спросил он сочувственно, как и полагается функционеру свободного государства обращаться к гражданину тоталитарного.</p><p class="p1">— Мне сказали, что я в списке, — ответил Свиридов.</p><p class="p1">— Сказали? — недоверчиво переспросил молодой.</p><p class="p1">— Да, а что?</p><p class="p1">— Просто не говорят обычно. Но вы — да, в списке.</p><p class="p1">— А что за список-то? Мне не объяснили.</p><p class="p1">— А мы не знаем, — просто ответил пограничник. — Нам выслали, а что за список — не сказали. Просто надо фиксировать всех, кто из списка прибыл.</p><p class="p1">— Где фиксировать?</p><p class="p1">— В журнале. Проходите, мы и так задержали…</p><p class="p1">Ничего уже не понимая, Свиридов вышел на площадь перед аэропортом, где переминался Горный. Следом появился Лосев. Их тут же окружили таксисты, но Горный уже отыскал встречающего — за ними прислали «газель». Большая часть гостей приехала еще вчера поездом, но несколько человек задержались в Москве по делам и прибыли самолетом; премьера «Маленького чуда» планировалась на завтра.</p><div class="cite">
<p class="p1">«Настоящим довожу, что СВИРИДОВ С. В. при дополнительной проверке на границе проявил нервность, недовольство, неделикатность, неучтивость, граничащую с грубостью, но сопротивления не оказал. Пропустил женщину с ребенком, отойдя в сторону, но не ответил на улыбку малыша. На допросе по системе «Кроссворд» показал на ТРИФОНОВА Ю. В. (справка прилагается). Задал 6 (шесть) вопросов о причинах проверки и вероятных последствиях. По окончании проверки двигался ускоренно». «По сути заданного мне вопроса могу показать, что СВИРИДОВ С. В. в самолете немедленно разгласил факт своего нахождения в списке и отнесся к нему отрицательно, без благодарности и доверия, но оскорбительных высказываний не допускал. В полете явления турбулентности не вызвали физиологических реакций СВИРИДОВА С. В.». «На украинской границе СВИРИДОВ С. В. замечаний не имел».</p>
</div><p class="subtitle">2</p><p class="p1">Первые крымские дни утихомирили тревогу и заставили забыть о проклятом списке, но чем ближе было возвращение, тем больше Свиридов нервничал. У него появилась даже крамольная мысль остаться в Хохланде, но это, конечно, была бы та еще эмиграция. Да и выдавали по первому требованию.</p><p class="p1">Поначалу он не лазил в интернет, не читал газет, спал на балконе маленькой гостиницы, прилепившейся к сухому кипарисовому склону, пил густое горько-сладкое вино, закусывал копченым сыром и старался превратиться в растение. Следовало всеми порами тела впитывать блаженный воздух, настоянный на кипарисе и сосне, купаться, есть здоровую простую еду и никуда не спешить. Вскоре оказалось, что отдохнул не только сам Свиридов, но и его тревога, на четвертый день принявшаяся глодать душу со свежими силами. Проснувшись, он тотчас вспомнил о занозе, засевшей в сознании, и замычал от тоски. Никакие кипарисы, никакой отдаленный прибой уже не спасали. Свиридов был в списке, и по возвращении это могло грозить непредсказуемыми неприятностями.</p><p class="p1">Вдобавок надо было мотаться по лагерю, где проходил фестиваль, то на одной, то на другой площадке показывая «Маленькое чудо» — отвратительную поделку о юной балерине. Честно сказать, сценарий и сам был банальной халтурой, написанной для конкурса детских лент и взявшей второе место при полном отсутствии конкуренции: мастер свиридовского курса, член жюри, поведал по секрету, что все представленные работы были либо о школах чародейства и волшебства, либо о родных Микулах Селяниновичах; первый приз достался безвестному доселе графоману за гигантский, страниц на двести, сценарий о молодежном лагере «Своих», в котором перековывался очередной интеллигентский отпрыск. Микулы Селяниновичи были выполнены совсем уж топорно. Третье место взяла история о юном партизане, писанная еще к шестидесятилетию Победы, но тогда отклоненная за профнепригодностью; теперь представления о профпригодности заметно смягчились, а идеологические рамки, напротив, ужесточились, как и положено. Свиридов написал со слов бывшей возлюбленной историю о страшноватых нравах балетного училища, о том, как стремительно взрослеет девочка, проходящая через муштру, и о разладе в ее семье, который она умудряется преодолеть, поскольку обладает большей выдержкой, чем легкомысленный отец и плаксивая мать вместе взятые. История называлась «Танец маленьких лебедей», но режиссер переименовал. Это было, кажется, его единственное решение — все остальное на площадке и после решала продюсерша, она же исполнительница роли импульсивной матери. Она подыскивала роль для своего ребенка-вундеркинда — и свиридовская история подошла ей идеально. У нее подрастала дочь одиннадцати лет, еще от первого брака; во втором продюсерша, сыгравшая в девяностых пару голых ролей в бандитских боевиках, соединилась с газовым магнатом, вылитым героем тех самых боевиков. Из него и были выкачаны деньги на промоушен ребенка. Девочка Настя к одиннадцати годам была законченным монстром, от которого стонала вся группа. Ее привозили на съемки с многочасовыми опозданиями — «драмкружок, кружок по фото»; помимо балета, девочка занималась двумя языками и проходила курс в школе душевной гармонии, где изучались астрология, агни-йога и альтернативная история. Голова ее, и от природы не особенно крепкая, трещала от разнообразной ерунды, Настя ни в чем не знала отказа и не имела даже смутного представления о реальности. Мир представлялся ей гигантским гибридом балетной школы и супермаркета, где в первой половине дня истязают ее, а во второй она отыгрывается на родне и челяди. Поправив пару реплик в сценарии, она стала называть себя сценаристом; однажды пожелала вытащить на съемки подругу, дабы продемонстрировать всю свою звездность, и великодушно попросила написать роль и для подруги — магнат-газовик сверкнул очами на Свиридова, и у маленького чуда появилась подруга со словами. Мама-продюсер выдвигала свои требования, вовсе уже ни с чем не сообразные: она вбила себе в голову, что картина поедет на международные фестивали, и потому в ней обязательно должно быть что-нибудь о мире во всем мире. Вы не представляете, в какое тревожное время мы живем! Иногда Свиридову казалось, что она его соблазняет — дама в бальзаковских годах, магнат занят газом, хочется проверить чары на молодом авторе; но скоро он понял, что в очередной раз переоценил себя. Ночные звонки, долгие беседы наедине, многословные, с абсурднейшими мотивировками требования выкинуть то и подчеркнуть это — все диктовалось серьезнейшим отношением продюсерши к «Маленькому чуду»: больше ей решительно нечем было заняться. Настя к концу съемок окончательно возомнила себя звездой, перестала считаться с мольбами режиссера, вела себя в кадре как хотела, а текст импровизировала, начисто забыв о сценарии, к вящему умилению мамаши. В ней появилась капризность пожилой премьерши, она закатывала внезапные истерики — словом, поехала крышей; даже магнат заподозрил неладное и попросил съемки сократить, так что в итоге пожертвовали последними двумя сценами, которые могли придать получившейся лаже хоть какой-то смысл. Премьеру устроили в «Художественном» — «Октября» магнат не потянул, — и Настя потребовала объявить ее как юную актрису, юного режиссера и юную сценаристку. Свиридов не видел этого позора — он на премьеру не явился. Даже сценарий сериала «Спецназ своих не бросает» казался ему менее постыдным. Ни на один заграничный фестиваль, естественно, чудо не попало — магнат сумел продавить его только на крымский, проходивший в бывшем пионерлагере, да и то, кажется, отстегнул на его проведение; режиссер наотрез отказался представлять шедевр, сославшись на занятость новым проектом — историей о гибели десантной роты (тогда каждый месяц гробили по десантной роте, в неотличимых горах, с дословно совпадавшими диалогами). Само чудо лечили на швейцарском курорте — оно теперь бузило и вне площадки, требовало новых ролей и плохо ело; мать находилась при Насте неотлучно, и представлять поделку отправили Свиридова. Он плюнул и согласился — неделя в Крыму на халяву выглядела приличной компенсацией за мучения с чудом.</p><p class="p1">Дети в бывшем лагере, а ныне международном молодежном центре, оказались безнадежно провинциальными и смотрели всё с одинаковым удовольствием. Их радость при виде движущихся больших картинок была чисто физиологической, а если с экрана раздавалось знакомое слово вроде «жести», весь бетонный амфитеатр взрывался аплодисментами. По-настоящему их не занимало ничего, кроме компьютерных игр и дискотек, ко всему остальному они были добродушно-равнодушны, покорно задавали вопросы после каждого просмотра — одинаковые из раза в раз, о смешных случаях на съемках и о том, почему Свиридов выбрал профессию сценариста. На третьем просмотре Свиридову надоело соблюдать политкорректность, и на вопрос о смешных случаях на съемках он сымпровизировал целую историю о том, как девочка Настя, доставшая всех в первую же неделю работы, случайно встретила на площадке медведя и обкакалась. Свиридов подробно обосновал появление медведя на съемках — это был ручной медведь из картины, снимавшейся в соседнем павильоне, он свободно бродил по студии, и вот пожалуйста. Дети заметно оживились.</p><p class="p1">— Что, прямо медведь?</p><p class="p1">— Ну медвежонок.</p><p class="p1">— Что, прямо обкакалась?</p><p class="p1">— Прямо в штаны.</p><p class="p1">Гоготали даже вожатые. История пошла гулять по лагерю. Дети потребовали дополнительного просмотра, его организовали на стадионе, всем было интересно посмотреть на девочку, которая танцевала-танцевала, пищала какие-то глупости, много о себе воображала и вдруг обкакалась в штаны. Свиридов почувствовал смутные угрызения совести — опорочил несчастного ребенка, желавшего служить искусству, унизил его в угоду грубым провинциальным вкусам, — но Настя была уж очень омерзительна, да и «Маленькое чудо» в результате получило приз зрительских симпатий, обойдя даже немецкий шедевр «Тайна животноводческой фермы». О решении жюри Свиридову сообщила начальница пресс-центра, женщина из советских времен, чудом сохранившаяся в Крыму, где вообще умудряется уцелеть, зацепившись за обрыв берега, все реликтовое. Лагерь успел пройти через эпоху упадка в девяностые и теперь восстанавливался, но не набирал новую славу, а собирал по крупице старую, изрядно поблекшую еще до перестройки. Вся реставрация — что в России, что в Украине — осуществлялась по одному сценарию: попробовали жить иначе, не вышло, построим старое, — но строить собирались новые люди, проще и площе прежних, полузабывшие тогдашнюю жизнь или вовсе ее не знавшие. Результат получался соответствующий — совок, лишенный всего, что делало его переносимым. Начальница пресс-центра была наилучшим выражением этой тенденции.</p><p class="p1">— Ну, мы поздравляем вас, конечно, — сказала она, улыбаясь наклеенной улыбкой. — Мы, конечно, очень рады за вас и ваш замечательный фильм, добрый фильм.</p><p class="p1">— Спасибо, — кисло ответил Свиридов.</p><p class="p1">— Очень мудрый фильм, — говорила она, словно не решаясь приступить к главному. — Дети даже особо отметили в анкетах, что очень мудрый фильм.</p><p class="p1">Свиридов кивал.</p><p class="p1">— И мы приглашаем вас на торжественную церемонию закрытия, — продолжала начальница пресс-центра. — Но мы вам не рекомендуем на нее ходить.</p><p class="p1">Некоторое время Свиридов осмысливал услышанное.</p><p class="p1">— То есть? — спросил он наконец.</p><p class="p1">— Ну, — сказала она, улыбаясь все шире; выражение ее лица можно было бы счесть кокетливым, если бы такие женщины могли кокетничать вообще, — мы получили о вас определенную информацию.</p><p class="p1">Свиридов похолодел.</p><p class="p1">— Откуда? — спросил он, не уточняя, что за информация: все было ясно.</p><p class="p1">— Нас известили с таможни, — сказала начальница пресс-центра, явно гордясь связями с таможней. — Нам дали знать. И мы бы со своей стороны вам не рекомендовали. Вот ваше приглашение, я вам обязана отдать по долгу службы, — «по долгу службы» она выговорила с особым наслаждением; такие люди любят тщательно, красуясь, выговаривать всякие литературные реплики вроде «мы не считаем возможным» или «дорогой вы наш человек». — Но я вас просила бы, а где-то даже и советовала бы.</p><p class="p1">Она улыбнулась и тряхнула волосами, что должно было обозначать задор. Наверное, когда-то она была здесь вожатой. Теперь ей было сорок пять.</p><p class="p1">— И что? — спросил Свиридов. — Вы будете объявлять, награждать картину, а я сидеть в номере? Приз кто получит?</p><p class="p1">— Мы вам передадим дополнительно ваш призочек, — быстро заговорила пресс-секретарша. Она была готова к этому вопросу. — Вы завтра зайдете в управление, и мы передадим призочек и грамотку. Вы можете быть уверены, что никто здесь не заберет вашу заслуженную награду.</p><p class="p1">— Но почему я не могу присутствовать на собственном награждении? — прямо спросил Свиридов, чувствуя, что еще немного — и он наговорит ей таких слов, каких сценаристы доброй и мудрой картины не должны употреблять в принципе.</p><p class="p1">— Мы работаем в детском учреждении, — все еще улыбаясь, отвечала она. — Мы должны ограничивать, огораживать детей от эксцессов. Нам довели информацию, что ваше присутствие может быть нежелательно. Лучше перебдеть, чем недобдеть, не так ли? — Реплика «не так ли?» тоже казалась ей очень кинематографичной. — Я не буду вас больше задерживать, я ничего не могу вам запретить, но хочу предупредить. Мне было очень приятно поздравить вас с заслуженным успехом.</p><p class="p1">И, еще раз тряхнув крашеными волосами, она быстро пошла прочь; один раз оглянулась и помахала, как машет возлюбленная, уходя навсегда, в дурном шестидесятническом фильме про девушку, не знающую, чего она хочет. Свиридов плюнул ей вслед и решил во что бы то ни стало отправиться на закрытие.</p><p class="p1">Церемония не обманула его ожиданий. Она была по преимуществу украинской, трехчасовой и очень громкой.</p><p class="p1">Кое о чем Свиридов имел понятие, поскольку гостиница стояла недалеко от стадиона, на котором фестиваль закрывался, — последние три дня репетиции шли беспрерывно, с подъема до отбоя, отголоски долетали до пляжа, и даже заплывая на полкилометра в море, Свиридов слышал натужно-звонкие голоса, хором уверявшие, что ничего на свете лучше нету. Он успел выучить и хит про море бескрайнее, и вальс о невыносимости расставания с дружной сменой; впрочем, советских песен было мало — преобладали гопаки с их фирменным сочетанием роскошной лени и необъяснимой агрессии, столь узнаваемым во всем, что бы тут ни делалось, от Майдана до Рады. Свиридов понимал, что в гопаках нет ничего дурного и дети счастливы, изображая разнузданную казачью лихость, — но он был озлоблен, уязвлен, и мир представлялся ему царством гнета и лицемерия. Добрые, чистые слова о добром, чистом детстве произносил толстомясый представитель республики Крым, ему вторил третий замминистра культуры, поджарый, европейский донельзя — все портил суржик, на котором он говорил за незнанием мовы; начальство молодежного центра ловило его речь с подобострастием, много превышавшим советское. О свете и радости было сказано и спето столько, что детство начинало представляться Свиридову царством лжи и насилия — каким оно, собственно, и было; да и что вообще было в его жизни, кроме школьного ада, семейного полураспада, студенческой нищеты и последующей безработицы? Несчастье всему придает свой ракурс, а счастье — никогда, в этом главная несправедливость. Первый приз взяла лента «Байкер и Ангел», про страшного байкера, влюбившегося в шестнадцатилетнюю инвалидку-колясочницу. Он открыл ей новую жизнь, катал на мотоцикле, хитро привязав к седлу позади себя, и учил целоваться в рассветном березняке (Свиридов гнусно хихикнул, вспомнив анекдот про Ржевского и безножку — «Некоторые так на березе и оставляют»); другие байкеры насмехались, он дрался, но потом прислушался к голосу коллектива — «Что это? уж не обабился ли я?» — и на глазах хрупкой колясочницы аппетитно, жирно поцеловался с распутной девкой из соседнего класса. Потрясенный Ангел наелся таблеток и отлетел. Это заставило байкера глубоко задуматься и где-то даже пересмотреть свои ценности. Под свежим впечатлением он долго ехал по рассветной дороге под тяжелую инструментальную музыку, после чего являлся добровольным помощником в интернат для колясочников — и Свиридов не мог не вообразить, коря себя за цинизм, как он теперь, в порядке искупления вины, оприходует всех их по очереди. Эта туфта была значительно хуже «Маленького чуда» — хотя бы потому, что делалась на полном серьезе, с надрывом; за картину проголосовал весь лагерь, от мала до велика, немедленно опознав родную стилистику девичьих рассказов о любви и смерти. Режиссера Свиридов не знал — «Байкера» сочинил и поставил бывший рекламщик из Барнаула, длинноволосый, гориллоподобный, сам, кажется, из байкеров. Получив приз — золотые часы в виде солнышка на гранитной подставке, — он поставил его на эстраду и сделал обратное сальто. Стадион взревел.</p><p class="p1">Следующим должны были награждать Свиридова, и он уже прикидывал, что скажет, — что-нибудь о том, какие они все уже взрослые, так что и говорить с ними надо без сюсюканья и вранья, пока у него не очень получается, но он обещает, — но сразу после объявления «Маленького чуда» самым мудрым фильмом фестиваля на сцену выпорхнула руководительница пресс-центра, приняла солнышко из рук третьего зама и обворожительно улыбнулась залу, сообщая, что представители группы, к сожалению, на церемонию прибыть не смогли. Свиридов вскочил с места, замахал, заорал — но его крик был тотчас заглушён очередным гопаком, и по эстраде вприсядку заметались парубки в красном. На него оглядывались, он не желал больше слушать народную музыку и в бешенстве, нарочно наступая на ноги и толкаясь, устремился к выходу. Он долго еще блуждал по запущенной, заросшей территории лагеря, отыскивая спуск от стадиона к гостинице:-сюда-то везли на автобусах, но ждать обратного автобуса он не желал. В гостиницу тоже не хотелось. Поплутав в кромешной крымской ночи, запутавшись в колючем кусте и порвав брюки, Свиридов вышел наконец на тропинку, петлявшую между пустых спальных корпусов: она должна была привести к гостинице, — но спать не хотелось. Он решил выкупаться.</p><p class="p1">На всем многокилометровом галечном пляже, разделенном бетонными бунами, не было ни души. Море слабо поплескивало. В последние три дня был шторм, но сегодня стихло. По всему берегу валялись клубки высыхающих темно-коричневых водорослей, он называл их перекати-мо-ре. От них пахло гнилью и свежестью, свежей гнилью — нигде больше Свиридов не встречал этого сочетания и не мог подобрать для него других слов. Луна то выплывала из облаков, превращая вид в итальянский пейзаж Щедрина, то исчезала, и море сливалось с небом в одно антрацитное пространство. Наконец она вышла надолго, золотистая дорожка протянулась от горизонта к ногам Свиридова, он разделся и, хлопая себя по плечам, вошел в неожиданно теплую воду. Холод начинался дальше — шторм поднял холодные донные слои, тепло оставалось у самой поверхности; но холод бодрил, и Свиридов несколько раз с наслаждением нырнул. С берега все еще доносились клятвы сохранить дружбу и память о кострах, странно сочетавшиеся с этим безлюдным берегом без единого фонаря, с золотой луной, полновластно сиявшей над горизонтом, с мелкими плоскими тучками вокруг нее, россыпью мелких звезд и бархатно-черными лесистыми скалами слева. Здесь «Маленькое чудо», байкеры, ангелы, гопаки и списки не имели никакого значения. Свиридов долго плыл, привыкнув к воде, ощущая ее не сильней, чем воздух при ходьбе, — но, оглядываясь, видел, что берег почти не удалился: все та же освещенная чаша стадиона высоко на горе, те же темные корпуса и еле белеющая пенная полоска у волнолома. Зря он вспомнил о списке — хотя бы и для того, чтобы подумать о всей незначительности этой истории; ерунда ерундой, но послезавтра в Москву, тоже мне радость. Небось опять задержат при отправке и уж точно на российской границе. Свиридов в тысячный раз принялся перебирать свои грехи. В том и дело, что сегодня уже не знаешь, в чем можешь быть виноват. Никаких правил: самое поганое время, когда все еще только сгущается. Что-то можешь определить сам, личные рамки дозволенного… но решать надо быстро, завтра все отвердеет. Это было хуже, чем прямая угроза: сейчас опасность смотрела отовсюду, никто не знал, как себя вести. Под удар с равной вероятностью могли попасть и те, кто нарывался, и те, кто потирал ручки, приговаривая «давно пора». Критерий был неясен и определялся по прецеденту. Самое досадное, что все развивалось давно уже не по логическим или даже сценарным законам, а по прихоти чистой статистики: нам надо выдавить вон столько-то народу, посадить столько-то, отнять работу у стольких-то. Дураками были все, кто спрашивал «За что?» и пытался отыскать закономерности. Закономерность была одна: количественная. Не туда шел, не там стоял. Все это Свиридов лихорадочно передумывал, чтобы сбежать от самого мерзкого ощущения, придавившего его жизнь задолго до треклятого списка: есть люди неправильные, изначально обреченные если не на заклание, то на пожизненный бег с препятствиями, лягушачье перепрыгиванье с листка на листок, как в древней компьютерной игре «Перестройка». Он был из таких, это было родовое проклятие, родимое пятно, его видели все, начиная с одноклассников, и зря он пытался себе внушить, что во всем виноват талант. Талант ничуть не реже осеняет здоровых, жизнерадостных, охочих до любой работы. Он был в списке с самого рождения, вот в чем беда; теперь это вышло наружу, только и всего. Гнусная мысль пришла одновременно с волной, Свиридову плеснуло в нос, он терпеть этого не мог — и только тут заметил, что море уже не так спокойно, как прежде.</p><p class="p1">Длинные черные волны в дробящемся блеске шли на него фронтом, он давно вышел из-под защиты левого скалистого мыса, теперь все море было в параллельных глубоких морщинах, они с каждой новой волной становились глубже, и Свиридову уже померещились вдали смутно мерцающие пузырчатые гребешки — дело серьезное. Он понимал, что пора разворачиваться к берегу, но плыл и плыл вперед, словно должен был достигнуть некоей точки; наконец ему стало по-настоящему страшно, он быстро развернулся — и только тут заметил, что отплыл на добрый километр. Музыка кончилась. По извилистым дорожкам молодежного центра ползли пятна фар — автобусы развозили детей, наверняка усталых и сонных; все это было очень далеко, он нипочем не докричался бы, да и кто ночью пойдет на берег? Правда, теперь волны подгоняли его в спину — но они же и перекатывались через голову, так что он стал задыхаться. Он знал по опыту — далеко заплывал с детства, — что ни в коем случае нельзя паниковать, что угодно, но не паника, в крайнем случае можно полежать на спине, передохнуть, переждать вспышку ужаса; но какое тут лежать — его накрыло первой же волной. Это началось, как только он подумал о списке, — надо о чем-то другом, о чем попало, и он стал представлять, как полетит в Москву, выйдет на работу, увидится с Алей, может быть, уговорит наконец съехаться… Из темного жидкого ужаса, облепившего его, как мокрая ткань, список представлялся уютным, почти спасительным, как всякое дело рук человеческих среди неразумной стихии.</p><p class="p1">Берег не приближался. Свиридов беспомощно бултыхался с волны на волну, — он все еще не позволял себе работать ногами в полную силу, боялся выдохнуться. Стоп. С чего, собственно, я взял, что шторм? Волна если и увеличилась, то самую малость. Вон автобусы, вон дети, только что пели про дружную смену. Ничего не может случиться, сроду тут никто не тонул. Ужас постепенно отпускал — вид берега успокаивает, не то что открытое море; я просто выплыл за мыс, нельзя этого делать ночью. Все о'кей; но тут волна тяжелой лапой шлепнула его по голове, на пару секунд он погрузился, а едва вынырнул — его тут же оглоушила следующая. Дело было худо. Свиридов повернул левей, лег на бок, плыть стало полегче, пару минут он не думал ни о чем, только работал руками и ногами — и когда снова позволил себе оглядеться, берег был уже близко. Метров за триста до него море утихло так же неожиданно, как разбушевалось, и Свиридов уже не поручился бы, что вообще попал в этот странный шторм, продолжавшийся от силы десять минут. Но вкус воды во рту, ощущение холодного тяжелого удара по темени… Он был теперь уязвим, вот в чем дело. Могло случиться что угодно. Выйдя на берег, он долго шатался на дрожащих ногах, искал одежду, спотыкался на гальке. Оделся, хотел закурить, с минуту добывал огонь из зажигалки, наконец добыл, затянулся, закашлялся.</p><div class="cite">
<p class="p1">«СВИРИДОВУ С. В. согласно распоряжения от 28.06.07 было доведено, что присутствие СВИРИДОВА С. В. на награждении СВИРИДОВА С. В. как сценариста самого доброго и мудрого фильма нежелательно. Вопреки рекомендациям руководства Международного молодежного центра СВИРИДОВ С. В. на награждении СВИРИДОВА С. В. присутствовал, но выход его на сцену как сценариста доброго и мудрого фильма был блокирован своевременными действиями МАНАЕНКО Е. Ф. При проведении мастер классов с веселыми гостями Международного детского центра СВИРИДОВ С. В. ничего такого не говорил. В целом характеризуется положительно, в общении ровен, алкоголем злоупотреблял умеренно, попытки заплывания за буйки были единичны и недалеко».</p>
</div><p class="p1">Значит, шторм — все-таки не они. Похвально.</p><p class="subtitle">3</p><p class="p1">На обратном пути все сошло на удивление гладко: никто не тормознул — ни в Симферополе, ни в Москве; Свиридов приехал из Внукова в пыльную душную квартиру, распахнул все окна, полил цветы и сел названивать коллегам. Алю он набрал по мобильному еще в аэропорту, но она была временно недоступна.</p><p class="p1">— Коль, — сказал он режиссеру «Спецназа» Сазонову. — Фигня случилась. Я на границе, когда в Крым летал, узнал, что я в каком-то списке.</p><p class="p1">Сазонов молчал.</p><p class="p1">— Ты слышишь? — повторил Свиридов. — В списке я каком-то!</p><p class="p1">— Слышу, не глухой, — сказал Сазонов почужевшим голосом. Прежнего снисходительного дружелюбия простыл и след. — Ты Кафельникову говорил?</p><p class="p1">Кафельников отвечал на канале за производство сериалов. У него были таинственные связи на самом верху.</p><p class="p1">— Нет.</p><p class="p1">— Ну и не говори пока. Я разберусь.</p><p class="p1">— А что за список-то? — пересохшим ртом спросил Свиридов.</p><p class="p1">— Я откуда знаю? — неискренне удивился Сазонов. — Ты ж попал, не я.</p><p class="p1">Свиридов понял, что его сторона улицы попала под обстрел и скоро он на этой стороне останется в одиночестве.</p><p class="p1">— Но, может, ты слыхал…</p><p class="p1">— Ничего я не слыхал, я знаю только, что сейчас ни в какие списки лучше не попадать. Меньше светишься — крепче спишь.</p><p class="p1">— Коль, — зло сказал Свиридов. Его бесило, что приятель — не друг, конечно, но не один пуд дерьма съели, — так легко заподозрил его в нарушении неведомых конвенций. — Я ничего не делал, ты понял? Ничего сверх обычного.</p><p class="p1">— Ну, мало ли, — неохотно выговорил Коля. — Я ничего такого не хочу сказать, но ты, в общем, аккуратнее.</p><p class="p1">— А про списки вообще ты ничего не слышал?</p><p class="p1">— Да сейчас половина в каких-нибудь списках, — уклончиво сказал Сазонов.</p><p class="p1">— Типа?</p><p class="p1">— Ну несогласные какие-нибудь… или, наоборот, согласные… Ты ни в какую партию не вступал?</p><p class="p1">— С какого перепугу?</p><p class="p1">— Не знаю. Короче, я провентилирую, пока никому не говори.</p><p class="p1">Они обменялись незначащими новостями и распрощались.</p><p class="p1">— Никому не говори, — вслух сказал Свиридов. — Дубина. Пока ты там будешь вентилировать, я, может, еще в пять списков попаду…</p><p class="p1">Он набрал Бражникова, одноклассника-программиста.</p><p class="p1">— Брага, слышь какое дело. Я попал в хрен его знает какой список.</p><p class="p1">— Что за список? — Бражников мгновенно насторожился.</p><p class="p1">— Не знаю! — крикнул Свиридов. — На границе сказали, что я в списке. И потом, у меня картина приз взяла, — так на церемонии закрытия мне его не дали.</p><p class="p1">— В смысле?</p><p class="p1">— Не вручили. Сказали, им не рекомендовано, чтобы я показывался.</p><p class="p1">— Это хреново, — после паузы сказал Брага.</p><p class="p1">— Ты что-нибудь знаешь?</p><p class="p1">— Знаю. Но это не по телефону.</p><p class="p1">— Что значит — не по телефону? Кому ты нужен тебя слушать?</p><p class="p1">— Я-то никому, — сказал Брага, и Свиридов понял, что слушают теперь его. Брага был специалист по этой части, он еще в школе уверял, что если набрать 137 и будет занято — значит, слушают. Все набирали, и всех слушали: только потом Свиридов узнал, что эту линию отключили, переделали в 737, а Бражников всех элементарно наколол, хвастаясь секретной информацией. Он мало изменился с четвертого класса.</p><p class="p1">— Хорошо, ты можешь приехать?</p><p class="p1">— Лучше ты ко мне, — после паузы сказал Бражников. — Только не домой, давай через час в «Чашке».</p><p class="p1">Проклиная себя за доверчивость и почти не сомневаясь в полной бражниковской неосведомленности, Свиридов спустился во двор, завел «жигуль» и отправился на Ломоносовский. «Жигуль» после недельного простоя чихал, Свиридов думал, что надо в сервис и что все одно к одному.</p><p class="p1">Бражников появился, когда Свиридов уже заказал фраппе «Рай на Гавайях» (сливки, кокос, «Малибу»). Воображение продолжало работать, невзирая на все страхи: представим фраппе «Ад на Гавайях». Все то же самое, но с томатным соком.</p><p class="p1">— Здоров, — буркнул Бражников. От него, как и в школе, разило потом. Он был в красной ковбойке и бесформенных штанах.</p><p class="p1">— Так что за список-то? — без предисловий спросил Свиридов.</p><p class="p1">— Ты еще погромче орал бы, — нехорошим тихим голосом ответил Бражников.</p><p class="p1">— А что такое?</p><p class="p1">— Ничего, тише надо. Давай с самого начала, по возможности ничего не пропускай.</p><p class="p1">Свиридов пересказал историю с толстухой-погранич-ницей, майором в белой форме и газетой кроссвордов.</p><p class="p1">— Какая обстановка была в комнате? — прервал Брага. — Подробнее!</p><p class="p1">— Откуда я помню? Стол, стул, диван…</p><p class="p1">— Вентилятор был?</p><p class="p1">— Не было вентилятора, кондишен был.</p><p class="p1">— Ага, — загадочно сказал Брага и потер нос. — Вот видишь. Я же просил — подробности.</p><p class="p1">— Но вентилятор-то при чем?</p><p class="p1">— При том. Как он тебе сказал — «По нашей линии»?</p><p class="p1">— Да.</p><p class="p1">— Ну и с чего ты решил, что это ФСБ?</p><p class="p1">— Со всего. А кто еще это мог быть?</p><p class="p1">— Бойся скоропалительных выводов, — назидательно произнес Бражников. — Интеллигенция рехнулась — ФСБ, ФСБ… Они давно ничего не могут. Это транспортники.</p><p class="p1">— Какие транспортники?!</p><p class="p1">— Самые обыкновенные. Транспортный надзор. У них свои списки, никакого отношения к госбезопасности это не имеет. Вспомни: ты когда-нибудь буянил на транспорте?</p><p class="p1">— С какой стати?</p><p class="p1">— Ну мало ли. Я не знаю, как у вас там в богеме. Ехал куда-нибудь, напился в «Красной стреле», блевал, скандалил…</p><p class="p1">— Сроду ничего подобного.</p><p class="p1">— Штрафовали, может быть? В троллейбусе, за безбилетный проезд?</p><p class="p1">— Когда? Давно турникеты везде…</p><p class="p1">— Ну не знаю. Короче, точно транспортники.</p><p class="p1">— Да какие транспортники! — взбесился Свиридов. — Что это вообще такое?!</p><p class="p1">— Транспортная милиция Кутырева. — Бражников понизил голос и напустил на себя строгость. — Главный преемник, между прочим. Замминистра транспорта. Патриот, в очках такой. Пять языков знает. На крестном ходе с патриархом шел, разговаривал.</p><p class="p1">— Какой он преемник, ты опух?!</p><p class="p1">— Главный, — спокойно сказал Бражников. — Пока в тени, а потом выйдет. Очень православный человек, порядок любит. У меня парень в их ведомстве работает, — так там курить нельзя и мини запрещено. Вот он пока на транспорте свои порядки отрабатывает, в поездах и на самолетах. А скоро так везде будет. Так что попал ты, Серый, я тебе точно говорю. Если ты у них в списке, то когда Кутырев придет к власти, будешь добывать золото для страны.</p><p class="p1">Некоторое время Свиридов прикидывал, насколько это все всерьез. Бражников любил пугать и подкалывать, и многие ловились. Иногда он сам верил в то, что выдумывал на ходу. Выдумки его были однообразны — тайные бункеры в лесах, альтернативное метро, секретный спецотряд транспортной милиции, — но достоверны. Здесь все охотно верили в спецназы, засекреченные отряды и вообще в другую, настоящую страну, живущую где-то в глубине лесов: нельзя же было допустить, что вот это, видимое очами, и есть Россия.</p><p class="p1">— А за что я мог туда попасть?</p><p class="p1">— Откуда я знаю. Окурок не там бросил. А может, настучал кто-то. Но они люди серьезные.</p><p class="p1">— Слушай, Брага, кончай темнить. Я же вижу, когда ты хохмишь.</p><p class="p1">— А я, может, не хохмлю, — сказал Брага, но Свиридова отпустило. — В любом случае я тебе советую до зимы вести себя очень аккуратно. Сам видишь, они в панике. Устроили выборы и теперь бегают. Выборы-то, судя по всему, последние. У меня парень в Избиркоме…</p><p class="p1">— У тебя везде парни, — перебил Свиридов. — Ладно, забудь. Чего-то я перепугался, сам не знаю…</p><p class="p1">По пути домой он почти успокоился. Асфальт медленно отдавал тепло, в серой туче на западе открылась золотая промоина, и оттуда косо били расклешенные, расширяющиеся книзу лучи. Невыносимо грустно было смотреть на рябину, уже начавшую краснеть: лето в середине, в перезрелом расцвете, скоро все покатится под горку. Он опять набрал Алю и на этот раз дозвонился, но радовался рано: она не могла приехать сегодня и даже не особенно усердствовала с поиском оправданий.</p><p class="p1">— Я тебе завтра расскажу.</p><p class="p1">— Но я соскучился, Птича! — «Птича» была домашняя кличка, от Ястребовой.</p><p class="p1">— Я тоже, но тут много накопилось всякого. И с мамой надо побыть.</p><p class="p1">— А со мной не надо?</p><p class="p1">— Не ной, не ной. Завтра, ага?</p><p class="p1">Это «ага» он не любил, и многого в ней не любил, в телефонных разговорах это всплывало, но стоило ей появиться — Свиридов прощал все.</p><p class="p1">— Ну позвони завтра.</p><p class="p1">— Сама звони, — буркнул Свиридов. О списке он ей не рассказал — Аля не из тех, у кого стоит искать сочувствия.</p><p class="p1">Чужие проблемы ее, что называется, грузили, и вообще, у нее хватало своих, в которых Свиридов не разбирался, побаиваясь маркетинговой терминологии и сложных офисных интриг. Он, впрочем, подозревал, что жаловаться женщине — вообще последнее дело: по крайней мере девушке того типа, что нравился ему. Боже упаси от наседки, хлопотуньи, женщины-матери, только и ждущей, на кого бы излить нерастраченные запасы назойливой нежности. Опекает, опекает, потом рыпнешься — а уже повязан по рукам и ногам. Алина независимость была честнее, и сама она никогда не требовала сострадания — расплакалась при нем всего единожды, и тем драгоценней было это воспоминание.</p></span>
