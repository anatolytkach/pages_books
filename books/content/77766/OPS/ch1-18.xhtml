<span><p class="p1">— Это отличная тема! — воскликнул Глазов. — Отличная! И вот пишете же вы это ваше исследование — подробный перечень с характерной чертой каждого. Я слушал с большим интересом. Гораздо увлекательней, чем традиционная эта байда с сюжетом. Может, это и есть литература нового типа. Так сказать, с гурьбой и гуртом… Некоторые списки очень интересно читаются. Вот я читал про перевал Дятлова, когда изучал массовые фобии и парафеномены всякие. Вы ведь знаете эту историю, как группа погибла на Склоне мертвецов?</p><p class="p1">— Читал что-то…</p><p class="p1">— Очень странный сюжет. Они все погибли по-разному, наделав перед этим тьму нелепостей. Среди ночи разрезали палатку изнутри, хотя был вход, ничем не заваленный; все шестеро — подготовленные туристы. Выбежали на снег, двое развели костер и почему-то сунули в него руки и ноги. У одного юноши расплющен череп. Одна девушка без языка.</p><p class="p1">— Как — без языка?</p><p class="p1">— Не было, вообще. Нашли труп под снегом через три недели, а во рту пусто. У одного татуировка на груди оказалась непонятная — то есть она была и раньше, но непонятно, что за человек. Короче, до сих пор никакого объяснения: либо коллективное безумие, либо испытания на склоне, ракета прилетела, и они все были ослеплены взрывом. Не знаю, короче. Самая таинственная история из всех советских. Еще подобная была в тайге, тоже разрезали палатку изнутри и выбежали, и лежали веером — зима, а без валенок, в носках, то есть их внезапно что-то очень испугало, до такой степени, что они забыли, где вход. Один успел на дереве нацарапать «Здесь аномалия».</p><p class="p1">— Не верю, — сказал Свиридов. — «Аномалия» — сложное слово, его не будешь царапать ножом в последний момент. Даже «здесь» сложное. Он бы другое написал, типа «Тут ой».</p><p class="p1">— Да, «Миша всё». Но не в том дело. Я читал когда материалы по перевалу Дятлова — там подробные списки вещей, которые у них с собой. Штаны фланелевые две штуки, фотокамера «Зенит» одна штука… Записные книжки с гимном Уральского политеха… И вот, знаете, эти списки сильней читались, чем любое расследование. Застывшие люди из пятьдесят девятого года: романтика, студенчество, туризм, пуризм… Девушки все девственницы оказались, представляете? А ведь с мальчиками в походах, вообще активистки и все дела… Они же ничего не знают, до первого космонавта не дожили. Если б издавать подробную опись имущества любого покойника — это лучше любой биографии: и документ времени, и даже итог судьбы. Сюжет в литературе как-то исчерпался, по-моему. Их число ограничено, что там нового придумаешь? А если бы кто-то издал наш список — просто список из двухсот человек, сколько нас тут есть, — это было бы поучительнейшее чтение. Особенно если не говорить читателю, по какому критерию отбор…</p><p class="p1">— Сроду не стал бы читать такую хрень, — признался Свиридов.</p><p class="p1">— Не зарекайтесь, не зарекайтесь. Написал же Сорокин про очередь — и сегодня читается как бестселлер. Кажется даже, что и фамилий теперь таких нет.</p><p class="p1">— Без сюжета ничего не бывает.</p><p class="p1">— Это в вас сценарист говорит. А иногда во всей жизни нет сюжета, есть зыбкая взвесь и в ней разговоры. Честно вам скажу, мне гораздо интересней было бы просто смотреть на человеческие лица.</p><p class="p1">— Разговоры слушать — с ума сойдешь. Застенографируйте то, о чем говорят вокруг, — чушь собачья.</p><p class="p1">— Не всегда, не всегда. — Глазов расплатился. — Не лезьте, я угощаю. Моя очередь. Когда есть действие — тогда да, разговоры, как правило, идиотские. А когда ничего не происходит — тогда только в разговорах весь интерес. По-моему, вы открыли жанр.</p><p class="p1">— Это не я открыл, — махнул рукой Свиридов. — В классической комедии «Сбрось маму с поезда» изображается литстудия в Штатах, там их полно. И один персонаж зачитывает роман «Список женщин, которых я хотел бы трахнуть».</p><p class="p1">— Между прочим, — уже на улице заметил Глазов, — этот список сказал бы о нем больше, чем любая биография. Так что подумайте, подумайте.</p><p class="subtitle">10</p><p class="p1">И Свиридов думал.</p><p class="p1">Мой отец пропал без вести. У Ложкина, Чумакова, Горяинова тоже в детстве ушли или погибли отцы.</p><p class="p1">Глазов, Сомов и Старухин страдают гипертонией. Проконтролировать всех, произвести замер. Версия о диспансеризации вписывается.</p><p class="p1">Чернов, Минаев и Козицкий в прошлом году бросили курить. Я почти бросил. Опросить прочих.</p><p class="p1">Лебедев и Кумач составляют двойную фамилию. Отыскать в истории Глазова-Сомова, Старухина-Ложкина.</p><p class="p1">Батурин, Морозов и Пугачев являются однофамильцами известных людей. Все остальные тоже являются чьими-нибудь однофамильцами.</p><p class="p1">Господи, по какому признаку ты всех нас вписал сюда?</p><p class="p1">Иногда он заходил в блоги — почитать, что пишут о списке. Писали мало. В Валином сообществе разнообразно жаловались на жизнь, но на улицу не рвались. Поражало одно: прежде чужое несчастье вызывало если не сочувствие, то по крайней мере род целомудренного уважения. Если кто-то умирал, стыдились радоваться; если родственника сажали—с этим не поздравляли. Теперь эти правила рухнули: можно было списать это на общую сетевую безответственность — с ника и спросу нет, — но Свиридов чуял за этим падение куда более серьезных ограничений. Внутри у всех была каша, труха, гниль. Чумакову никто не сострадал, большинство сходилось на том, что аудитору так и надо; нашлись люди, подведенные им под монастырь, не могущие ему простить именно отвергнутую взятку. Живой интерес к списку ощущался лишь среди эмигрантских блоггеров, страшно довольных любой здешней мерзостью. Выходило, что всем оставшимся так и надо. Израильские национал-патриоты — самые невменяемые из всех, как жесточайше деды получаются из наиболее зачморенных салаг, — злорадствовали насчет Лурье. Все сходились на том, что если он не уехал в начале девяностых, то безусловно заслуживает своей судьбы. Бывшая одесская инженерша собрала урожай из трехсот восторженных отзывов под постом о гнусном отступничестве всех оставшихся, о том, что еврей, отказавшийся от Восхождения, фактически становится на сторону ХАМАСа, — и Свиридов впервые пожалел суетливого Лурье, режиссера эстрадных зрелищ, отпетого пошляка, радостно затаптываемого своими. Смешней всего было то, что негодующие репатрианты расписывались в ненависти к Эрефии на полуграмотном, но несомненном русском — многословном, многоцитатном русском языке воинственной жаботинской публицистики. Особенно длинный флуд разразился после робкого возражения израильской девушки, не желавшей верить, что ее мать, оставшаяся дома, предала свой народ. За спорами о том, стал ли Израиль сверхдержавой или только идет к этому, Лурье совершенно забыли.</p><p class="p1">Этот флуд и навел Свиридова на мысль, утешавшую его почти до снега. Свиридов никогда не мог понять, как можно променять рассеяние с его страдальческой красотой и широчайшими возможностями на чечевичную похлебку имманентности, зов крови и почвы, на жалкий кусок ближневосточной земли и перспективу превращения в обычную ближневосточную нацию, разве что чуть крикливей и самодовольней. Он почти не застал соввласти, а потому склонен был идеализировать ее, как многие в поколении: выходило, что ей отомстили безжалостные, темные силы энтропии, умудрившиеся проассоциировать прогресс с массовым убийством. Между тем прогресс — который и заключался в преодолении губительных имманентностей, душных суеверий и многовековой замкнутости, — столько же мог отвечать за массовые убийства, сколько луна — за маньяка. Маньяк активизировался при луне, но это не значит, что она повинна в его зловонных грехах; Россия была одинаково готова составлять списки в тридцатые, когда в ней что-то непрерывно строилось, росло и варилось, — и в нулевые, когда все в ней падало, разлагалось, лгало и грабило. Русское привязалось к советскому, как муха затесалась в прибор нуль-транспортировщика в ужастике Кроненберга: ее гены навеки примешались к человеческим, и страшный гибрид похоронил саму идею. Меж тем массовые истребления оставались тут возможными и необходимыми под любым предлогом — или безо всякого, как теперь; но провозглашать на этой почве возврат к средневековью — значило сильно путать причины и следствия.</p><p class="p1">— А средневековье — вот оно, — говорил он ночью полусонной Вале. — Национализм — пожалуйста. Самая суеверная, самая низкопоклонная, темная, огосударствленная вера — на тебе, кушай. Триумф ползучих инстинктов — сколько угодно. Человек так устроен — если не тянуть его вверх, он опускается вниз. Поле, не засаженное культурными злаками, автоматически зарастает бурьяном, в три года, а то и раньше. Окультуривать, растить, преодолевать человека — иначе скотство, Панкратов, Гусев, Михалков, целующий ручки патриарху… И знаешь, мне кажется, что у списка есть шанс. Я много проверял — никакой имманентности в основе. Думал даже, что там вся публика без отцов. Ни одного правила без исключений, ни одного внятного критерия — как нарочно. Можно подумать, его Лем составлял. И я подумал: Валька, но ведь это и есть критерий! Люди, не объединенные никакой имманентностью, получили шанс построить отдельное сообщество, клуб свободных, ни к чему не прикованных существ! Всех повыгоняли либо с работы, либо из семьи. Все оторвались. Тут тебе и путь к новой нравственности, даже к новой церкви, если угодно, — ведь богостроительство не так глупо, к этому обязательно вернутся… Ты спишь, что ли?</p><p class="p1">Валя никогда не чувствовала тяги к абстракциям и действительно спала, уютная, как заяц в мультике. Что же, тем лучше: от бездны защищала, думать вслух не мешала. Всякий придумывает себе конструкцию, позволяющую жить: уродина полагает себя «зато умной», изгой верит, что с него начнется новое человечество. Что это было за новое человечество, Свиридов смог убедиться на дне рождения Волошина — вот уж подлинно на дне.</p><p class="subtitle">11</p><p class="p1">День рождения Волошина отмечался в пятницу, двадцать пятого октября. Журналист собрал почти всю их компанию — всех, с кем Свиридов периодически виделся; девочек было всего пять, и Волошин рассчитал верно. Версии списка — главные темы мужских разговоров — интересовали их всех гораздо больше, чем девочки. Пришла Наташа Драгоманова, жеманная и визгливая, Катя Булатова, та самая, с длинными зубами и заискивающей улыбкой; еще три не особенно заметных девицы, которых Свиридов знал только в лицо. Валя, которую намеревался привести он сам, была в тот вечер занята на волонтерстве; Свиридов, понятно, заподозрил, что у них с Волошиным особые дела по организации марша, лучше не обсуждать при всех. «Нет, нет, что ты. Может, я успею, потом забегу».</p><p class="p1">Был Глазов, был красивый и робкий Олег Сальников, позвали и Макеева — этого-то уж вовсе непонятно зачем, но Волошин пояснил наедине, что с ним уютней.</p><p class="p1">— Обязательно нужен дурак. Гораздо надежней.</p><p class="p1">— Что ж вы Абрамова не позвали?</p><p class="p1">— А я позвал. Еще в понедельник звонил. Но вряд ли он ко мне заявится, да и адреса не спросил.</p><p class="p1">— Адрес он знает, — сказал Свиридов. — Вы ему тогда давали, после творческой встречи.</p><p class="p1">— Да он забыл двадцать раз.</p><p class="p1">— Подождите, еще придет, начнет рассказывать, как все прекрасно…</p><p class="p1">— Не придет, — твердо сказал Волошин.</p><p class="p1">— Откуда вы знаете?</p><p class="p1">— Чувствую.</p><p class="p1">Свиридов это запомнил.</p><p class="p1">Никого из волошинских коллег не было, — вероятно, он старался не смешивать тусовки, а может, не хотел особо светить списантов перед журналистами; интересно, что каждый из списанных неохотно допускал товарищей по несчастью в свою профессиональную среду — то ли боялся заразить сотрудников, то ли понимал, что списочные разговоры вряд ли интересны людям другого круга. Все-таки в списке, как у гипертоников в санатории, темы были специальные — кого вызывали, что Калюжный, какие последствия по работе, что делает Жухов, не пора ли гнать Жухова… Толстую девушку Таню Ползунову, трудившуюся в сберкассе, неожиданно повысили. Драгоманова страстно влюбилась в киевлянина и беспрепятственно к нему выезжала уже дважды, значит, с ближними республиками проблем пока нет. Зато Спасова — помните Спасова? Высокий, с коровьими ресницами, — не пустили в Нигерию. Ну, это понятно: там война, сейчас никого не пускают. Но не пустили наши! Какая разница: значит, берегут своих. Мельком коснулись Гусева: он вышел из больницы, от издательства отошел, посещает храм.</p><p class="p1">— Ну, этот не пропадет, — сказал Клементьев. — Будет насаждать ОПК.</p><p class="p1">— УПК? — не дослышала Булатова.</p><p class="p1">— Основы православной культуры, — пояснил Клементьев. — Не верю я в перерождение этих типов. Подумаешь, повеситься хотел. Хотел — повесился бы.</p><p class="p1">Новые люди, победители имманентности, напились быстро и некрасиво. Без имманентности все чувствовали себя неловко, как без тени, а период сплочения на почве гонимости предсказуемо заканчивался. Гнусность ситуации усугублялась тем, что и в обычных-то закрытых сообществах все рано или поздно друг другу надоедают, а тут сообщество вдобавок утратило всякий признак признака, по которому его закрыли. У Волошина стало ясно, что все подозревают друг друга в худшем, но худшее каждый представляет по-своему. Разговоры не клеились, шутки не шутились.</p><p class="p1">— Андрей, вы как насчет марша? — спросил Свиридов.</p><p class="p1">— А что, марш — идея, — вяло сказал именинник. — Только не пойдет же никто.</p><p class="p1">— Это как надавить, — встрял Макеев. — Могут пойти, если всех с работы попрут.</p><p class="p1">— Всех-то не попрут.</p><p class="p1">— Я бы не ходил, — сказал Свиридов. — Дурновкусие.</p><p class="p1">— Ну, вам все дурновкусие… Хавать только все это полной ложкой — не дурновкусие, а рот открыть — как же, нельзя, новодворщина…</p><p class="p1">— Да открывайте сколько влезет, маршировать-то зачем? За Жухова? Это же, понимаете, низведение диалога на уровень головы и палки…</p><p class="p1">— Да? А сейчас у вас этот диалог на каком уровне — мерлезонского балета?</p><p class="p1">После горячего — Волошин накупил цыплят по-гурий-ски, переименнованных теперь в цыплят по-французски, разогрел в СВЧ, — курили на кухне. У Волошина зачирикал мобильник, в нем слышался громкий женский голос — Волошин однообразно повторял: нет, пока нет, да, сразу, как только, так немедленно.</p><p class="p1">— Жена? — извиняясь интонацией за нескромность, спросил Сальников.</p><p class="p1">— Жена моя давно в Штатах, — сказал Волошин. — И дочь с ней. И хер с ней.</p><p class="p1">— Американский? — подколол Макеев.</p><p class="p1">— Нет, наш, стоматолог на Брайтоне. А звонила жена Гриши Абрамова.</p><p class="p1">— Что такое?</p><p class="p1">— Спрашивает, не приходил ли.</p><p class="p1">— Он что, пропал?</p><p class="p1">— Говорит, четвертую ночь не ночует.</p><p class="p1">Все переглянулись, подумали об одном и том же, но были еще недостаточно пьяны, чтобы свободно обмениваться подозрениями. Только во время следующего перекура Сальников осторожно спросил:</p><p class="p1">— Что же такое с Гришей… с Абрамовым… бред какой-то. Такой положительный…</p><p class="p1">— С положительными-то и случается, — вздохнул Клементьев.</p><p class="p1">— Ну, хватит прятаться, — неожиданно сказал Волошин, перестав подпирать стену и оглядев всех с выражением горького торжества. — Абрамова сдал я.</p><p class="p1">Все были уже хороши, но протрезвели мгновенно.</p><p class="p1">— Заливать-то, — неуверенно сказал мальчик-тюльпан-чик Сальников.</p><p class="p1">— Да, да, — подтвердил Волошин. — Что такого? Не ждали Репина?</p><p class="p1">— Ну, знаете, — выдавил после паузы Макеев.</p><p class="p1">— Я его ненавижу, — резко сказал Волошин. — С первого дня, как увидел, — вы же меня, Сережа, с ним познакомили, нет? В «Октябре», на творческой встрече с ветеранами?</p><p class="p1">Свиридов кивнул.</p><p class="p1">— Ну вот. Как он начал рассказывать про прекрасную нынешнюю жизнь — так я все и понял. Вы тут говорили: Гусев, Бобров… Никого нет страшней, чем Абрамов. Которому все сейчас хорошо. Он же и после Жухова разливался, вы слышали? В первый раз-то… в походе. И что ребенку не надо менять еврейскую фамилию, и что в СМИ поливай кого хочешь, и что денег у всех полно, и непонятно, чего нам надо… На всю электричку дудел, сволочь. Все чтоб слышали! Вот тогда я и решил. Раз тебе так хорошо, получай. Посмотри, как оно хорошо, рылом упрись. Такой, пока не упрется, хрен поймет.</p><p class="p1">— Стоп, стоп, — проговорил Клементьев. — И когда вы его?</p><p class="p1">— Что — когда? Донес когда? Когда Калюжный вызывал. Он сразу спросил: кто что говорит? Я и говорю: никто ничего, один Абрамов. От него я неоднократно слышал разговоры о необходимости создания на базе списка разветвленной антиправительственной организации с британским финансированием. По-моему, очень логично, нет? На тебе твой Британский совет, кушай.</p><p class="p1">— У него двое детей, — сказал Свиридов.</p><p class="p1">— Помню, помню. Две дочки. Но если все у нас так хорошо, государство же быстро разберется, правильно? И позаботится о дочках, дочь за отца не отвечает…</p><p class="p1">Никто не знал, шутит Волошин или исповедуется. По его гладкому лицу и блестящим черным глазам ничего нельзя было сказать. Он поглядывал то на одного, то на другого и всем подмигивал.</p><p class="p1">— Мальчики! — капризно позвала Наташа. — Сколько можно!</p><p class="p1">— Погоди, мы в бутылочку играем, — отозвался Макеев. Из гостиной донесся визгливый хохот.</p><p class="p1">— Нет, Андрей, вы серьезно? — не выдержал Свиридов. — Всякий розыгрыш хорош в пределах…</p><p class="p1">— А почему, кстати? Вот вы, Сережа, верите?</p><p class="p1">— Нет. Вам это незачем, это не в вашей природе.</p><p class="p1">— А почему? — Волошин говорил зло, серьезно и смотрел теперь на одного Свиридова. — Они составляют в сети списки на уничтожение, и делают это совершенно открыто. «Враги русского народа». КМПКВ — когда мы придем к власти. Знаете такое сокращение? Там имен триста, между прочим, и мое в том числе. Уверяю вас, что и этот список не просто так, и тоже КМПКВ. А если мы еще не знаем признака — это не значит, что его нет. Ясно только, что живым никто из этого списка не выйдет, — тут-то, надеюсь, все понятно?</p><p class="p1">— Живым вообще никто не выйдет, — сказал Глазов из своего угла.</p><p class="p1">— Ну не надо, не надо, Глеб Евгеньевич! Хватит абстракции разводить, трогает жизнь, как говорится! Вот уже как трогает! — Волошин большим и средним пальцами подергал себя за кадык. — Они — совершенно не стесняются. Как вы не понимаете, это же все до первой крови! Одного растерзают — остальных задавят и не плюнут. Страшно же только в первый раз! У них все серьезно, они готовы, вам первому не поздоровится. Почему мы должны смотреть на это молча? Вот такие, как Абрамов, — они-то и решают дело. Это голос довольного большинства, им все нравится, — и пока мы не раскачаем это довольное большинство, ничего не выйдет. Не с Гусевым надо бороться, не с Панкратовым. Один взятый Абрамов значит больше, чем двадцать повесившихся Гусевых. Они же должны понять, что их, которым так хорошо, которые никуда не высовываются, — тоже могут взять за просто так, за неправильный нос, по оговору соседа! Пока они этого не поймут — мы так и будем катиться в задницу. Вы что же, надеетесь в перчаточках это все остановить? Было уже в перчаточках, сами хотите гибнуть — ради бога, но страну-то зачем толкать? Один взятый Абрамов — это двести одумавшихся! Поглядел бы я, как он теперь под нарами режим хвалит. А в том, что он под нарами, я не сомневаюсь. Такие всегда под нарами, деток очень любят. Кто любит деток, тот всегда ссыклив не по делу. А на нарах те, кто никого не любит и ничего не боится. Пока у нас таких не будет, будем в опущенниках ходить.</p><p class="p1">— Это такая ерунда, что даже спорить противно, — сказал Глазов.</p><p class="p1">— Да не спорьте, я переживу. Возразить-то нечего.</p><p class="p1">— Понимаете, Андрей, — осторожно начал Свиридов. Он боялся не Волошина, а почти неизбежной банальности сказанного: скользнет, не задев, а надо было в точку. — Я не буду вам про цель и средства, про мерзость доносительства и так далее. Но это все — для поддержания прежнего фокуса, для тех же качелей, на которых, честно говоря, уже укачивает. Мы должны быть как они и хуже, да? Но мы не должны быть как они, иначе все придет туда же. Мы должны быть лучше, чем они, другими, чем они, неужели непонятно?</p><p class="p1">— Бред, бред! — злился Волошин; он не на шутку завелся. — Праздный треп! В случае с Абрамовым, со всеми сытыми Абрамовыми, которые не желают ничего понимать, уперлись рылом в корыто и счастливы: как именно мы должны быть лучше?</p><p class="p1">— Вы должны как-нибудь иначе объяснять ему, в чем его неправда, — терпеливо продолжал Свиридов, чувствуя себя все более глупо и неловко. — На то у вас божественный дар слова и как там еще это называется. А у него нет никакого божественного дара, он мастер в автосервисе и ничего дурного вам не сделал, в конце концов…</p><p class="p1">— Да?! — возмутился Волошин. — А когда он на весь вагон орал: «Вы неправы, сейчас прекрасное время и лучший президент! Из всех возможных!» — это вам не было прямым доносом? Он же не просто орал: «Все отлично»! Он орал именно: «Вы неправы», и пальцем тыкал! Это не донос? Не изящная форма стука?</p><p class="p1">— Он орал в электричке, — сказал Макеев. — А вы сказали Калюжному. Разница есть?</p><p class="p1">— Никакой решительно. Все электрички набиты Калюжными.</p><p class="p1">— Ну, я вижу, вас не собьешь, Андрей, — решительно сказал Глазов и поднялся. — Если вы не шутите, я, пожалуй, пойду, а если так шутите — тем более пойду. Очень может быть, что у вас своя правда, и что вы по-своему очень доказательны, но как-то, понимаете…</p><p class="p1">— Да ради бога! — воскликнул Волошин, но уже без прежнего напора. — Не держу.</p><p class="p1">— Ну, еще бы вы держали…</p><p class="p1">— Господа, господа, — залепетал Сальников, пытаясь удержать зоолога, — друзья… Не хватало только еще в списке перессориться…</p><p class="p1">— Да никто не ссорится, Олег, — мягко отвел его руку Глазов. — Это же личный выбор… нет? Я просто вам хочу напомнить, Андрей, — обратился он к Волошину почти сострадательно. — Есть закон: сначала, конечно, берут тех, на кого донесли, это правило, я вот Сереже о нем рассказывал. Но потом, как правило, приходят за теми, кто донес. Это вторая ступень, про которую я обещал рассказать, но тогда не успел. В результате остаются какие-то третьи, признака я еще не сформулировал, — но именно эти третьи и есть опора нации. Они как-то умудряются жить, не участвуя во всем этом. А вы поучаствовали, и за вами обязательно придут — во вторую очередь, но никуда не денетесь…</p><p class="p1">В эту секунду, с чисто кинематографической постановочной точностью, какая в любом фильме показалась бы отвратительным дурновкусием, раздался звонок в дверь; но если в фильмах такие немые сцены превращаются в открытые финалы, то в жизни, вот проблема, открытых финалов нет, и действие продолжается даже тогда, когда всем уже все понятно. Кстати, открытый финал уместен там, где при любом варианте мораль примерно одинакова, — это он и демонстрирует; войдет ли сейчас новый грозный ревизор или прежний милый Хлестаков, который все это время притворялся, — смысл один. Представим себе данную сцену в кинематографе: кто бы ни оказался за дверью — случайный поздний гость или тайная полиция, — смысл примерно одинаков, и именно это призвана продемонстрировать долгая пауза, осторожный, робкий проход Волошина к двери, во время которого в голове Свиридова и пронеслась эта нехитрая догадка; но то, что было за дверью, совершенно смазывало финал и вновь выводило действие на унылый, бесконечный простор взаимоисключающих догадок и мнимых, никогда не случающихся событий; а это жанр теперь такой — неслучившееся. Посулили террор — и нет, либерализацию — и нет, войну — и зависло, и снова все висят в киселе, не в силах ни на что решиться; как же я не догадался с самого начала, ведь я уже, кажется, начал понимать жанр, в котором живу?</p><p class="p1">— Ничего, что поздно? — спросил Абрамов. — Звиняйте, дядьку, я не один. Со мной друган. Входи, друган.</p><p class="p1">Вместе с ним вошел очкастенький, виноватенький, помятый и мнущийся, даже не особенно вонюченький бомжик, и даже, может быть, не бомжик, а просто опустившийся тип — по его жалкому расклону со всеми, по улыбочке, по вечной виноватости было ясно, что ему довольно выпить сто грамм, чтобы начать буянить уже совершенно непотребно, с ущербом для мебели; он топтался, поворачивался на месте, поздоровался за рукав с чьим-то пальто на вешалке, и ясно было, что вся его жизнь состоит из буйств с последующей смятенной виноватостью, и буйство сквозь нее уже просвечивало. Абрамов пил с ним третьи сутки и теперь ощущал ответственность за бомжика.</p><p class="p1">— Входи, входи. Это Леша, — представил он спутника.</p><p class="p1">— И это он? — спросил Волошин голосом Иа-Иа. — Мой подарок?</p><p class="p1">— Нет, братан, почему, — сказал Абрамов. — Лучший твой подарочек — это я. Видишь, как мне стало хорошо.</p><p class="p1">От него пахло настоящим трехдневным запоем, ссадина на скуле была сплошь залита зеленкой — не мазали, лили из пузырька.</p><p class="p1">— Вот так вот мне хорошо, — повторил он. — Отлично, отлично. И не надо ребенку фамилию менять, да? Эх, хорошо в стране советской жить. Налейте, что ли, кто-нибудь.</p><p class="p1">Девушки высыпали из гостиной и в изумлении рассматривали странную пару. Леша потупился. Абрамов сел на пол, не раздеваясь, скинув только ботинки, на каждый налипло с полкило глины — по каким пустырям он таскался?</p><p class="p1">— Ну налейте кто-нибудь! Очень грустно.</p><p class="p1">— Ты жене позвонить мог? — спросил Свиридов. — Она с ума сходит.</p><p class="p1">— Да заебала она уже, — просто сказал Абрамов. — Она с ума сходит, дочери сходят, я схожу… Вон Леша ни по кому с ума не сходит, у него была жена и нету, он свободный теперь человек. Да, Леша?</p><p class="p1">— Свободный, свободный, я кларнетист, — быстро заговорил Леша. — Леша Пиняев, всегда пожалуйста. Я исполняю на кларнете фортепианное трио Шостаковича номер пять, горькие ламентации, мог бы исполнить и сейчас, но нужен малый барабан, малый барабан.</p><p class="p1">Он лепетал, левой рукой карябая щеку, как Шостакович, была у гения такая манера. Прекрасная посмертная судьба, нашел в кого вселиться, зато теперь совершенно свободен и каждый вечер исполняет у трех вокзалов горькие ламентации, фортепианное трио для кларнета. Гораздо лучше, чем попадать в статью «Сумбур вместо музыки».</p><p class="p1">— Во, — кивнул Абрамов. — Скоро и я так стану… свободный. Восемь лет не пил, братцы, представляете? Сор-ррвался… в такой штопор… даже приятно. Но вы же рады мне, да?</p><p class="p1">— Очень рады, — кивнул Волошин. — Поднимайся. Вы, Леша, тоже проходите, пожалуйста. Кларнета у меня нет, но гитара имеется.</p><p class="p1">— На гитаре у нас Миша, Миша, — залопотал бомжик. — Я могу позвонить, он придет. Он играет на Сретенке, удивительно, удивительно…</p><p class="p1">— И Мишу позовем, — сказал Волошин. — Ну, пошли. Я надеюсь, Глеб Евгеньевич, вы передумали уходить?</p><p class="p1">Глазов молча тер переносицу. Кажется, он пытался проснуться. Вся их кухонная компания смотрела на чудесно явившегося Абрамова с откровенной брезгливостью, а Олег Сальников — так и вовсе с презрением. Дорогой покойник воскрес и навонял, виновник был невиновен, жанр не изменился, постановка моральной проблемы оказалась невозможной за полной размытостью всех критериев. Или, верней, в этом киселе шла своя жизнь, не в пример более тонкая, чем в твердом трехмерном мире, и самое горькое, что в нем приходилось искать новые критерии, а старые никуда не годились. Сумбур вместо музыки. Но трудность в том, что и в сумбуре законы: в нем нет предателей и жертв, добродетелей и злодейств, бродят и сталкиваются новые, туманные сущности, в которых тем не менее черт ногу сломит. Это Свиридов и пытался втолковать Глазову, когда они через час уходили-таки от Волошина, выпив больше, чем надо, на радостях по случаю воскресения Абрамова. Пили на самом деле, чтобы не дать окончательно накваситься ему. Он заснул, Волошин позвонил его жене — до того он препятствовал, вырывал телефон, умолял не сдавать его домашним, — и жена приехала, рослая, мужеподобная женщина с красными руками, с которой мог быть счастлив только слабак, законченный подкаблучник, реализующий свой мужской потенциал разве что в автосервисе. Она схватила Абрамова под мышки — на Лешу Пиняева вообще ноль внимания — и потащила в прихожую, там плюхнула, как мешок, и, безо всякой брезгливости вымазываясь в глине, стала напяливать на него ботинки; кажется, он уже притворялся пьяным, чтобы избежать разговора. Никто ей не помогал. Она, не прощаясь, выволокла его на лестничную клетку, там он вдруг протрезвел, встал и твердо пошел к лифту рядом с ней, осознав, видимо, неизбежное; было слышно, как они тяжело топают по кафелю, счастливые люди свободного мира. Жалко было только двух девочек, окончательно перепуганных долгим отсутствием матери: сидят там, ждут, пока она дотащит свой куль, жмутся друг к дружке. Хотя наверняка две отвратительные дылды: хамки и ябеды.</p><p class="p1">— Знаете, в чем ваша проблема, Сережа? — прервал его Глазов.</p><p class="p1">— В списке, как и ваша.</p><p class="p1">— Нет, не думаю. Вам, во-первых, нельзя пить. Вот вы сейчас со мной под дождем идете, а так бы и меня подвезли, и сами бы доехали. Завязывайте пить, Сережа, и больше ездите на машине. Это дисциплинирует.</p><p class="p1">— А во-вторых?</p><p class="p1">— А во-вторых, как бы это сказать? Один фантаст, мой старый приятель, как-то пересказывал мне фильм «Город потерянных детей». Знаете такой?</p><p class="p1">— Жене и Каро, — машинально сказал Свиридов.</p><p class="p1">— Да, да. Я не смотрел, только в игру играл. И вот я его спрашиваю: Андрей, а как они вообще туда попадали-то, в этот город потерянных детей? И он ответил гениально: они начинали смотреть не в ту сторону.</p><p class="p1">— Их похищали просто, — объяснил Свиридов. — Там профессор ебанутый, в игре этого нет…</p><p class="p1">— Это неважно, — нетерпеливо перебил Глазов. — Какая разница? Важно же, почему их похищали. Они начинали смотреть не туда, и все. Я знал людей, которых засасывало. Вы смотрите не в ту сторону, вам нельзя этого. Если бы вы мне были несимпатичны, я не стал бы вам говорить. Но вам не надо всего этого, вы еще молодой, у вас есть воля, нормальный характер… Что вам весь этот список потерянных людей? Кто вам вообще сказал, что надо в нем состоять?</p><p class="p1">— Мне это уже говорили, — кисло сказал Свиридов. Он вспомнил Алю.</p><p class="p1">— Ну и правильно говорили, и ничего. И простите вы меня за вторжение, но с Валей вам тоже нечего делать. Это я выпил, потому и лезу с советами. Ничего?</p><p class="p1">— Ради бога, Глеб Евгеньевич.</p><p class="p1">— Не сердитесь. Просто поймите: все эти дела, больные дети, волонтерство, люди из списка… это вам ни к чему совершенно. Ей это нужно, потому что сама она ничего из себя не представляет, и вот наращивает себе личность за счет благотворительности. Самое последнее дело.</p><p class="p1">Они стояли под мелким дождем, в лужах плясали иглы, бурая листва блестела под фонарем. Свиридов не хотел уходить: Глазов говорил важное и приятное. В последнее время ему редко говорили приятное — может, потому, что по-настоящему приятны стали только гадости про других; но в том, что он говорил о Вале, было зерно.</p><p class="p1">— Она не такая, — для порядку защитил он подругу.</p><p class="p1">— Она именно такая, поверьте, я много их повидал. Самоутверждаться за счет больных и убогих — последнее дело, волонтерство — вообще занятие не для девушек. Они тоже начинают смотреть не в ту сторону и сходят с ума. В мире много зла, беспричинного, непонятного, много всякой гадости. Это не нужно, нельзя пускать в свою жизнь. Есть опыт вредный, а есть лишний, просто лишний. Раньше принято было внушать: ешьте дерьмо полной ложкой, это и есть опыт. А вам зачем? Вы и так нормальный парень, не нужно вам это, честное слово. И я тоже больше не буду сюда ходить.</p><p class="p1">По наросшей привычке подозревать худшее Свиридов подумал: педик, ревнует…</p><p class="p1">— Вам другая женщина нужна, — развеивая эти подозрения, продолжал Глазов. — Здоровая веселая девка, рядом с которой было бы легче. С бабой должно быть легче, иначе зачем все? А этих я знаю, у меня этого было знаете сколько? Бедненькие, убогонькие. Жалеем птичку, цветочек. Это все от пустоты, от ничтожества, поверьте мне. Стрезва я бы вам не сказал, а так говорю. Не надо вам Валю Миронову, пусть ее устраивает марш списанных, это самое для нее правильное занятие, но себя в это втаскивать, ради бога, не давайте, не ваше это, сто лет вам не нужно. Ладно?</p><p class="p1">— Да, — сказал Свиридов. — Да, конечно. Я сам что-то такое чувствовал, но думал — все трусость.</p><p class="p1">— А вы не думайте, Сережа. Не думайте про себя плохо и не смотрите в ту сторону. И меня не провожайте, я один пройдусь. Ловите вон тачку, езжайте к себе, если что — звоните.</p><p class="p1">Валя позвонила ему около полуночи и сказала, что может приехать, — но он сказал, что лыка не вяжет, созвонимся завтра. Она, кажется, все поняла, у нее это было неплохо поставлено.</p><p class="p1">И с этого дня Свиридов не ходил на мероприятия списка.</p><p class="subtitle">12</p><p class="p1">Многое решила эта ночь, которую он провел в полубреду в своей одинокой квартире. Почему-то его бил озноб. Он достал с антресолей ватное дедовское одеяло, но и оно не помогло; проверил, плотно ли закрыт балкон, — плотно, не в нем дело. Свиридов заснул наконец рваным и нервным сном, в котором не мог выбрать между двумя трамваями. Дело было на грязной заводской окраине, куда почему-то доходили сразу два трамвайных маршрута. Один увозил прочь из города, другой обратно в город, и непонятно было — то ли на фиг бросить такую жизнь, которая завела-таки его в невыносимый тупик, к этой обшарпанной проходной, за которой в длинных цехах делали никому не нужные вещи, — то ли уцепиться за нее, потому что дальше будет еще хуже, голое черное поле с грачами и среди глинистой земли — рельсы в никуда. И он стоял на трамвайной остановке среди мрачных работяг — большинство уезжало в город, и против города дополнительно свидетельствовало то обстоятельство, что в трамвай было не протолкнуться. Другой же вагон, увозящий в черные поля, которые начинались сразу за поворотом, и Свиридов почему-то видел очень далеко, на километры вперед, проницая взглядом все те же бесконечные ночные пространства, — был почти пуст, но зато уж те, кто в нем ехали, смотрели так зверино, и рожи у них были такие бурые, что страшно было поставить ногу на подножку. А выбирать было уже пора, ибо сторож, выходя из проходной, озабоченно посматривал на часы: в его обязанности входило разогнать всех, кто вышел с завода. После этого можно было вернуться в сторожку, пропахшую немытым мужиком и «Примой», — так пахнут все КПП, что армейские, что заводские; смотреть крошечный черно-белый телевизор, разговаривать с ним, пить чай из мутного стакана в подстаканнике. Сторож — единственный, кто был тут на месте. Свиридов ненавидел выбор из двух, а тут был именно такой; и в тот самый миг, как он впихнулся-таки в последний трамвай, идущий в город, ему стало ясно, что этого никак, никак нельзя было делать, в городе творится сейчас что-то такое, из чего уже не выбраться, — но бездна за городом тянула к себе с такой силой, засасывала в такую глинистую воронку, что он из одного чувства протеста отправился умирать вместе со всеми, и пространство смыкалось за трамваем, зарастая мелкими коричневыми домишками для будущих страшных жителей. Он проснулся, плотней закутался в одеяло, понял, что уже не уснет, прислушался к организму и отправился в сортир.</p><p class="p1">Выключатели светились тускловатыми оранжевыми глазками: во время ремонта, устроенного Свиридовым в дедовской квартире силами двух ленивых молдаван, в прошлом преподавателей Кишиневского пединститута, ему почему-то поставили эти выключатели — чтобы их легче было находить в темноте, что ли? Плохо работал спуск, Свиридов попытался его починить, но особенно не преуспел; отвратительно было копаться в осклизлых внутренностях бачка. Кое-как поправил, долго мыл руки, в доме было все так же холодно, вода шла чуть теплая; черт, неужели и с трубой авария? Вернувшись под теплое одеяло, Свиридов, однако, почувствовал, что надо встать, вернуться и еще раз зажечь и погасить свет в ванной. Он сделал это как-то не так.</p><p class="p1">Возвращалось омерзительное ощущение, забытое с детства: сделал не так, переделать. Ему тогда это казалось собственной, неповторимой болезнью, но, прочитав в дурном советском романе описание героя, который, ступив за порог, тут же возвращался обратно и окончательно входил со второй попытки, Свиридов утратил и эту собственность. Оказывается, это было общее достояние, синдром навязчивых ритуалов или состояний, он же обсессивно-ком-пульсивный синдром, проклятие детей требовательных родителей либо же дурная наследственность. Присмотревшись, он и за отцом стал замечать то же. Механизм был ясен: если сделать все с одного раза, могло пойти так, а если с двух, то иначе. Может быть, с трех все могло пойти совсем по-другому, но поскольку число нечетное, то это было ближе к первому варианту, а четыре — уж совсем смешно. В детстве это тянулось долго, в отрочестве прошло в одночасье — как-то вдруг самому стало смешно угождать неведомому божеству, да и жизнь в девяностые шла так, что понятно было: закон утратился, как чашку ни ставь, ничего не добьешься. Странным образом сейчас это вернулось — вероятно, закон заработал опять и невидимый бог, спрятавшийся было, снова требовал жертвоприношений в виде бесконечных повторений жеста или слова. «Сюда — цветы, тюльпан и мак, бокал с вином — сюда. Скажи, ты счастлив? Нет. А так? Почти. А так? О да». Бедный запуганный ленинградец, пытается выдать обсессию за эстетическое чувство.</p><p class="p1">Но понимание пониманием, а пришлось встать: вдруг это проявление более тонкой связи с миром, понимание, что если еще пять раз пощелкать выключателем — все придет в лад, в гармонию. Вылез из-под теплого одеяла, хотя нет лучшего способа заснуть, как знать, что надо сделать нечто, и все-таки этого не делать. Встал, пошел щелкать выключателем; чувство было похоже на сосущую боль, неловкость, причем именно в руке. Рука требовала включать и выключать. Нет, все еще было как-то не так; наконец выключил более-менее приемлемо, но чувствовал страшный зов не уходить, долго еще стоять в коридоре. Под одеяло было нельзя. Плюнул, взял себя в руки, зажег в коридоре свет: больной, желтый, при нем еще страшней. Выключил, вернулся в постель, но тут же вскочил, как ужаленный: неправильно лег. Надо было лечь иначе, как-то с правой ноги. Долго ложился, выбирая правильное положение. (Драйзер после провала «Сестры Керри» всю ночь пытался правильно установить стул посреди комнаты, кажется, «Регтайм».) Лег, укрылся, устроился, отлично понимая, что придется вставать опять: неправильно закрыл дверь в ванную. Встал, долго еще закрывал дверь; два оранжевых глаза смотрели в упор. На самом деле все не так, паллиативными мерами ничего не решишь. На самом деле надо было выйти из квартиры, шагнуть в ледяную дождливую ночь: все решалось там.</p><p class="p1">Все пустыри, все капустные полз У окраин, все ржавые гаражи звали его. В эту минуту он понял, что произошло с отцом. Отец в какой-то миг тоже не смог сопротивляться этому зову. Свиридов с ужасной ясностью увидел, как это было: он точно так же три раза попытался закрыть дверь или поставить чайник на плиту, и в третий раз дыра в его обороне была пробита и начала стремительно увеличиваться. В эту дыру хлынули все несчастья и ненастья, все мольбы о пощаде и спасении, и отец вышел из дома и пошел в это слезное серое пространство — искупительная жертва, если угодно, чтобы жили Свиридов с сестрой; ушел и отдал себя вместо них, и до них долго не могли добраться, только теперь достучались. Свиридов чувствовал, что если он еще раз выйдет в коридор, то и сам не сможет удерживаться, поспешно оденется и выйдет в сырую ночь, и отправится куда глаза глядят, и забудет имя, и там, может быть, встретится с отцом — просто потому, что дно одно и на нем не разминешься. Этот рыдающий зов бесконечного пространства, населенного больными детьми, одинокими стариками и неустроенными женщинами, был так силен, что Свиридов заткнул уши, но и сквозь вату продолжал слышать напряженный, звенящий гул.</p><p class="p1">Он включил компьютер и до утра раскладывал «Паука», а с утра, едва начало мутно светать, начал жизнь без списка, без Вали и волонтеров. Все случилось легко, отпало, словно отболело. Видимо, он перебрал все, что можно было делать в списке, — обсуждать, жаловаться, бояться, жалеть, негодовать, — и, отведав всего, встал из-за стола. Утром он наконец лег, выспался, проснулся около часу и первым делом позвонил Тессе. Чувствовалось, что она занята — может быть, интервью? — но ради него отвлеклась:</p><p class="p1">— Да, Сергей, говори.</p><p class="p1">— Тэсса, — сказал Свиридов ровно и твердо. — Простите, но я больше не буду писать вам.</p><p class="p1">— Но странно, — сказала Тэсса. Она занервничала. — Но очень странно, что ты так предупреждаешь. До очередная колонка есть неделя…</p><p class="p1">— Я не хочу неделя, — сказал Свиридов. — Я просто не буду писать очередную колонку, и все.</p><p class="p1">— Но это сейчас очень важно, — с усилившимся акцентом, с мягким напором повторила она. — Сейчас самое такое время, ты понимаешь? Ты два месяц писал почти ни о чем, и сейчас, когда начало событий, ты отказываешь. Ты нужен именно сейчас, в период марш…</p><p class="p1">— Я не буду участвовать в марше, — раздельно произнес Свиридов.</p><p class="p1">— Но как, ты же есть список…</p><p class="p1">— Я не есть список! — взорвался Свиридов. — У меня своя жизнь. Моя жизнь не определяется списком. Я не пойду ни на какой марш и не буду больше ничего вам писать, ясно?!</p><p class="p1">— Если речь про деньги, — так же мягко сказала Тэсса, — то это решаемая вещь.</p><p class="p1">Свиридов повесил трубку и отключил телефон на случай, если она вздумает перезвонить. А два дня спустя он встретил Вику — и отгородился ею от всей прежней жизни, от Тэссы, Вали, списка, марша и страха.</p><p class="p1">Вика не боялась ничего. Она была права всегда и во всем, не совершая для этого никаких усилий. Вале приходилось покупать правоту волонтерством, помощью ближнему, лихорадочной благотворительностью, — Вика была права от рождения, хотя ни на чем не настаивала. Она просто входила, усаживалась в кресло, закуривала, поглядывая на всех — и никто не сомневался в ее праве так себя вести, так говорить, так курить. Может, она и была в глубине души страшно неуверена в себе, бог ее знает. Но она так хорошо умела срезать одним словом, многозначительно вздохнуть, отвернуться, — что каждый в ее присутствии тут же ощущал собственную неполноценность, и Свиридов быстро оценил ее незаменимый дар.</p><p class="p1">Она явилась на «Родненьких» от «Космо», хотя не работала там и вообще нигде толком не работала — напишет туда, нарисует сюда, издаст книжку жежешных постов (ник был, естественно, walk<em>sby</em>himself с кисою на юзерпике), — и Свиридов бросился к ней, как собака к целебной траве. Потом, недели две спустя, — ее манера курить в постели раздражала, что ж поделаешь, но не мешала долгим ночным разговорам, в которых она, — впрочем, чаще помалкивала, — он ей сказал:</p><p class="p1">— Правильно ты все делаешь.</p><p class="p1">— В смысле?</p><p class="p1">— В смысле — тут ничего не надо уметь, кроме доминирования. При отсутствии общего смысла это единственная ценная вещь. У одних оно грубое, у тебя деликатное, даже симпатичное. Но перед тобой все выглядят дураками, я это ценю.</p><p class="p1">Она пожала плечами и стряхнула пепел мимо пепельницы.</p><p class="p1">— А я идиот, что все время доказываю свое право на существование людям, не имеющим права на существование. Мы за это и в список попали, кстати.</p><p class="p1">— Мм? — промычала она вопросительно.</p><p class="p1">— Да, это же чувствуется всегда. Если человек ищет каких-то оправданий своей жизни, ему прямая дорога в список.</p><p class="p1">— Мм?</p><p class="p1">— У меня был приятель, так он на вопрос — чем отличается верующий от атеиста в нравственном смысле, ну знаешь, бывают же добрейшие атеисты и наоборот, — так вот, он сказал: любопытством и благодарностью. Любопытством — потому что верующего не устраивает насквозь понятный мир, а благодарность — потому что хочется кому-то сказать спасибо. Но я думаю, это не все, понимаешь? Главное — это неуверенность в своем праве быть. Надо постоянно отчитываться. Потребность в конечной инстанции.</p><p class="p1">— Погрешность, — сказала она.</p><p class="p1">— Какая?</p><p class="p1">— Погрешность прибора. — Она училась когда-то на физфаке, ушла с первого курса, но вот и такие фразочки бывали у нее в багаже. — Человек такого наприписывал Богу, столько своего дерьма туда накидал — с чего ты вообще взял, что ему интересны твои отчеты?</p><p class="p1">— Но хоть кому-то они должны быть интересны?</p><p class="p1">— Никому ровно. Богу интересны хорошенькие женщины, хорошая литература. По пейзажам же видно, что эстет.</p><p class="p1">— Это да.</p><p class="p1">Она не брала у него денег, да он и не мог предложить много. Она появлялась, когда хотела, но если он просил приехать — старалась приехать. Она ничего не рассказывала о себе. Свиридову нравились такие отношения. Впервые в жизни ему нравилось ничем не обладать и ни за что не отвечать. Кто ничего не хочет — к тому все само плывет. Он научился многозначительно отмалчиваться и не лезть в споры. У него прошла всякая потребность влезать в многочасовые дискуссии о причинах и целях списка. В конце концов все, кто сюда попал и тут живет, тоже оказались в каком-то списке, и спрашивать о предназначении бессмысленно — делай, что хочешь, потому что никто не знает, что должно. И будь готов за это платить. Вика — значит Виктория, «она победа».</p><p class="p1">В постели была сдержанна, иногда он не понимал даже — нужно ей это или нет. Алька была честна во всем, но Свиридов теперь знал, как расплачиваются за полную честность. Он все-таки не выдержал, позвонил ей как-то, — абонент временно заблокирован. Совсем, видно, плохи дела. Можно было сразу, как Алька. Но он прошел путь, так честней.</p><p class="p1">О делах списка он узнавал по сайту. Ему самому теперь было непонятно, как он мог всерьез жить этими вечными поисками смысла, страхами, выездами на природу. Валя Голикова все понимала, не появлялась, не звонила, и он старался не думать о ней. Не было даже намека на вину — он одинаково легко бросил их, Валю и список, пытавшихся привязать его именно дискомфортом, вечным ощущением бесправности. И чудо — только он понял, что имеет право жить, ни перед кем не отчитываясь (а внутренне всегда ведь был к этому готов, думал об этом, даже в личный реестр вносил эту тайную добродетель), как посыпались заказы, сползла опала, и даже позвонили один раз с «Ордена», какое-то ток-шоу, но тут уж он был непреклонен. Кто угодно, но не вы.</p><p class="p1">В первых числах декабря Валя вывесила сообщение: Чумаков слепнет в тюрьме, оказался диабет, лечения нет. Позвонила Тэсса с просьбой о подробностях — Свиридов попросил больше не обращаться. Слепнет, очень жаль. Зато Бобров с клубом «Список» преуспевает, к нему стали даже захаживать «Местные» — произвели, правда, погром и не желали платить, но он это как-то замял, и через неделю они наведались снова, уже заплатив. Хоть и бывший, а свой. Стало быть, никакой списочной предопределенности тут нет, и Чумаков в тюрьме не за список, а, может быть, за диабет. Никто ничего не знает, и почему вообще шум? Все это было так пошло, особенно с Викиной точки зрения, на которую он теперь все чаще становился. Виктория, победа. А другой модели поведения просто нет. Где-то, может, и есть, но тут нет.</p></span>
