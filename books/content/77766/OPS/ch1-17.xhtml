<span><p class="p1">Так-то мы все друг перед другом нос дерем, а как эпидемия — так сразу и люди как люди, можно трахаться. Чумной барак спит с холерным, никто не воображает.</p><p class="p1">А супруги Сомовы, попавшие в список вместе, потому что и на премьеру вместе сходили, трахались друг с другом, и так-то им было хорошо. Обострились супружеские чувства, пригашенные семилетним браком. Критический, говорят, период для брака, а у нас уж так ли все хорошо. Придут с очередного списочного мероприятия — день рождения ли чей, воскресный выезд на природу, — и всем кости перемывают, какие все дураки. А мы не дураки, и так ли уж нам хорошо! И трахаются. Даже подумывать стали ребенка завести, а то все не до того, откладывали. Куда теперь откладывать? Стали заводить.</p><p class="p1">Второй куплет, трибьют Вырыпаеву. А Голышев Кирилл, 17, трахался с Матвеевой Ириной, 16, он у нее пятый, она у него вторая. Матвеева Ирина была то, что в старое время и в правильной цивилизации называлось бы гейша, девушка, рожденная для любви и ни для чего больше. В правильных цивилизациях у таких девушек есть социальная ниша, а в нашей им приходится чему-то учиться, где-то работать, разрушать чужие жизни и семьи. А ведь они ни о чем другом не думают, живут любовью, дышат любовью и всем, что вокруг любви. Это не блядство, но особого рода зацикленность. Матвеева Ирина не могла принадлежать кому-нибудь одному, ибо это была бы не любовь, а скука. Ей нравилось принадлежать одному и страдать по другому, провожать одного и звать другого, пить чай с одним и приглашать другого, сталкивать, наблюдать, страдать, напиваться, казнить себя, проклинать, каяться, ходить в храм с одним, вырывать у него руку, убегать к другому. А тут третий, разрешающий коллизию, но с ним тотчас появляется четвертый, и понеслась. Голышев, Голышек, был как раз пятый. Он был очкастенький, умненький, казался ей чистым. Голышев в ней нашел свой идеал и понятия не имел, на что попал. Матвеева Ирина была всегда влажная, пылкая, смуглая, обожающая делать это в недозволенных местах. Голышев ни о чем, кроме нее, не думал и даже забросил трактат с планом спасения России. Писал его давно, основываясь на Тойнби. Какой теперь Тойнби!</p><p class="p1">Однако штука в том, что Рогозин Вячеслав, 27, тоже трахался с Матвеевой Ириной, 16, и был у нее шестой, и разрешить все это дело мог бы только седьмой. Рогозин Вячеслав так по-особенному смотрел на Матвееву Ирину на одном списантском костре, с таким значением, и она, истинная жрица любви, тотчас наделила его всеми возможными совершенствами. У нее был дар именно к любви, настоящей, страстной — беда только в том, что прочие способности отсутствовали начисто. Такую бы только любить, но мы же все хотим обладать. Нет бы погладить, понюхать, трахнуть и отойти, — нет, подавай постоянство. А Матвеева Ирина была одноразовая, но сама не догадывалась о том. Каждый раз, заново вспыхивая, она горела так сосредоточенно и самозабвенно, словно собиралась замуж. Каких только добродетелей не находила она в Рогозине Вячеславе! Он был глупый и одинокий от своей глупости, фотограф-любитель с комплексами, но она придумала ему демонизм и гениальность, и заходилась от восторга над его тупыми натюрмортами — яблоко в тумане, сережка ольховая… Она отдавалась ему с визгом, с сознанием греховности, с мыслями о чистом Голышке, но как же хорошо ей было с Рогозиным, никогда не было так хорошо с Голышком! Рогозин ее снимал во всяких видах, в основном среди обшарпанных интерьеров, типа контраст. Матвеева Ирина безумно возбуждалась среди обшарпанных интерьеров, нравилось ей на грязных лестницах и гудящих чердаках, и она думала о себе словами своего ЖЖ, куда почитать про ее атласную кожу и страдания сбегались сотни печальных одиночек, втайне надеющихся, что она виртуал. Если виртуал, не так обидно представлять, что такие где-то есть и кому-то дают.</p><p class="p1">А Николай Саломатин, 43, трахался с Ольгой Боровлевой, 42. Оба люди семейные, он преподаватель сопромата, она преподаватель вьетнамского. На закат печальный улыбкою прощальной. Молодежь ничего не понимает — нет, только ровесники! Столько удивительных совпадений, и ведь тысячу раз могли встретиться, но все как-то не выходило, случайно пробегали мимо друг дружки, и пришлось судьбе помещать их в список — а как бы иначе! И семье врать ничего не надо: я в списке, у нас мероприятие, счастливо. Семья смотрит как на обреченного, старается кормить повкусней, все разрешает. Думается, узнали бы — не возражали бы. Много ли осталось? — все можно! Это, знаешь, у меня была тетка, болела, спрашиваем врача: что ей можно, доктор? Он, маша рукой: уже все… (потому и не хожу по врачам: напорешься на такого — и?) На всех кострах, походах и выездах сидели вместе, как голубки, но с видом вызывающим и обреченным. Помолодели и похорошели оба. Штука в том, что если бы всех включить в список, все бы давно уже друг друга нашли. В идеале нация и есть команда людей, состоящих в списке. Но что же поделать, если у нас эти списки составляет только одна инстанция. Как ты думаешь, не хотят ли они сформировать нацию? Я уже где-то читала, что в замысле предполагалось пересажать всех. Да, я тоже читал, бред, конечно.</p><p class="p1">А супругам Сомовым и так хорошо. Все у нас есть, по работе не обижают, слава тебе Господи! Им не надо было для счастья никакого списка, они с самого начала внесли себя в список на двоих, уважают друг друга за свою любовь со студенческой скамьи. Друг друга найти — тоже надо уметь, гоп-гоп, трах-трах.</p><p class="p1">А Смирнов с Ковалевой, а Богданов с Муравьевой, а Заботин с Мищенко, а Суетин с Домниковой. А Эрос с Танатосом, без этого как же. И потому, пока трахались все со всеми, иногда обмениваясь партнерами и друг другу подмигивая, весь список доносил друг на друга, потому что острота восприятия от этого становилась почти невыносимой. С тех самых пор, как майор Калюжный принялся вызывать к себе по одному и расспрашивать, что и как, — не всех сразу, конечно, давая время дозреть и обдумать, — писать к нему стало делом обычным: все-таки контакт, живой человек, искренне нами интересуется. Бывает, что и тюремщику рассказывают о себе все, как попутчику в поезде; бывает, что и террористу при стокгольмском синдроме вываливают последнюю правду. И потому Смирнов писал на Ковалеву, а Богданов на Муравьеву, а Макеева Ирина — на Голышева с его теориями и Рогозина с его пристрастием к фотографированию заброшенных военных заводов; и поскольку жизнь их с момента попадания в список шла как бы в романе, как бы понарошку, то и к этой новой страсти доносительства относились они как к дополнительному приключению: плакали, конечно, и руки ломали, и мучались даже немного совестью — но не более чем в кино, когда сопереживаешь судьбе героя. Все это были формы отвлечения от главного, дикого страха — так на последнем берегу увлекаются флиртом и автогонками, и доносят, наверное, потому что все позволено. Все равно полынья сужается, и недалек час, когда Серую Шейку схватят за серую шейку.</p><p class="p1">А Калюжный, вот ведь штука, сам был в списке. Его временно отстранили от всех главных дел и держали в резерве, проверяя, на что он теперь годен. И ведь знали же, сволочи, что это за список, сами же его составляли в ЦОСе, сами спускали, распространяли, доводили. И теперь, когда занесли его туда за несчастный сраный просмотр, на который сами же и командировали во избежание эксцессов, — он был среди своих как клейменый, и смотрели на него косо, и ходил уже слух — а поди ты пойми, что за список? Вы уверены, что именно из-за просмотра? Может, все-таки что-то серьезное, а просмотр — так, маска? И в отчаянном желании выслужить прощение, доказать незапятнанность мундира майор Калюжный шил списантам заговор, и что самое интересное — постепенно заговор сшивался. Тут ведь что главное? Главное, как учил его прославленный чекист Мыльников, наставник в суровой непостижимой азбуке, сокровенной тайной которой является отсутствие правил: не надо навязывать подозреваемому конкретную вину. Дай им время все на себя выдумать: ты сроду их так не оговоришь! И Калюжный действовал, и так ли они готовно писали друг на друга! Дедка на бабку, бабка на репку. А супруги Сомовы — друг на друга. Трах-трах, гоп-гоп.</p><p class="subtitle">7</p><p class="p1">В начале октября на свиридовском мобильнике отобразился «частный вызов». Свиридов теперь боялся скрытых номеров — это мог быть Калюжный, могли менты, но оказался Панкратов.</p><p class="p1">— Что вам нужно? — грубо спросил Свиридов. Он дополнительно злился на него за свой страх.</p><p class="p1">— Поговорить, — сказал Панкратов.</p><p class="p1">— Говорите.</p><p class="p1">— Не по телефону. Сможете через три часа подъехать на Пушку? Под памятник?</p><p class="p1">— А в чем дело?</p><p class="p1">— Да вы не бойтесь, — сказал Панкратов дружелюбно. — Ничего такого.</p><p class="p1">— Это вы бойтесь, — рявкнул Свиридов. — А я пуганый.</p><p class="p1">— Да хорошо, хорошо. — Панкратов говорил мягко, чуть ли не заискивающе. — Вы совсем не то думаете. Подъезжайте, правда.</p><p class="p1">Свиридов не хотел никуда ехать, но превратился к октябрю в такого ожидальщика, что с жадностью хватался за любые дополнительные сведения. Если Панкратов что-то знал — а знать он мог, будучи приближен к седалищу, — пренебрегать им не следовало. На всякий случай, однако, Свиридов позвонил Вале:</p><p class="p1">— Если я не отзвонюсь до восьми, поднимай шум.</p><p class="p1">— Хочешь, я с тобой? — спросила она.</p><p class="p1">— Ладно, справлюсь.</p><p class="p1">Накрапывало, погромыхивало. Панкратов приехал раньше и нервно прохаживался под памятником. Вид у него был виноватый, но нагловатый — странное сочетание: он словно подмигивал Свиридову, просил у него прощения и вместе с тем намекал, что он ни в чем не виноват, подумаешь, так надо было. Свиридова это царапнуло. Предполагалось, что он с Панкратовым в заговоре.</p><p class="p1">Он смотрел на Панкратова в недоумении: чего я их боялся? Нормальный же пацан, ничего страшного.</p><p class="p1">— Ну, в общем, — сказал Панкратов, — я трудоустраиваться пришел. Вам человек на телевидении не нужен?</p><p class="p1">— Не нужен, — сказал Свиридов. — Я этим не заведую. А что, собственно…</p><p class="p1">— Будто вы не знаете, — сказал Панкратов и хихикнул. Ему казалось, что весь мир должен быть в курсе его делишек.</p><p class="p1">— Извините, не знаю.</p><p class="p1">— Поперли нас, — сказал Панкратов, оглянулся, словно их могли услышать, и подмигнул.</p><p class="p1">— Откуда?</p><p class="p1">— Из штаба. Вы что, не слышали? Столько шума, вся сеть на ушах.</p><p class="p1">Свиридов представил рыбачью сеть, наброшенную на уши Панкратова, и кисло усмехнулся.</p><p class="p1">— Я не туда хожу в сети, наверное.</p><p class="p1">— Да везде пишут. Сначала Гуся с Бобром, теперь меня. Дождались, чтоб из больницы, и тюк по темечку. Может, сходим куда? Я угощаю.</p><p class="p1">Они зашли в «Кофеманию», Свиридов заказал чизкейк, Панкратов долго объяснял, какой именно ирландский кофе должен быть ему сварен и каких типичных ошибок следует избегать при этом.</p><p class="p1">— Ну и вот, — сказал он, дружелюбно улыбаясь. — Олег повесился, неудачно. Руки не под то заточены, Бобер говорит. Сейчас в больнице. А Бобер думает — раз не можешь переломить тенденцию, надо возглавить. Будет переделывать клуб «Свалка» в клуб «Список».</p><p class="p1">— Почти то же самое, — сказал Свиридов.</p><p class="p1">— Ну где-то да, — еще шире улыбнулся Панкратов, радуясь, что клиент шутит. Шутит — значит, поддается, сейчас выжмем из него чего-нибудь… — Ему и денег дали. Модное место будет, а пускать только по списку.</p><p class="p1">— По нашему?</p><p class="p1">— Неважно, их еще много будет, наверное. В общем, люди потянутся.</p><p class="p1">— Погодите… А из-за чего же Гусев?</p><p class="p1">— Вы что, совсем ничего не знаете?</p><p class="p1">— Я же сказал.</p><p class="p1">И Панкратов принялся рассказывать, пересыпая речь множеством имен, названий и цифр, ровно ни о чем не говоривших стороннему человеку. Он уже привык думать, что его организация в ближайшие полгода станет царицей горы, а потому каждый встречный обязан быть в курсе ее грандиозных дел. Мелькали упоминания о политпоходе, первой пятерке, большой раздаче, восточном мосте (перекинутом, как догадался Свиридов, из Владивостока в Новосибирск), о групповом браке, объединившем двести активистов с таким же количеством активисток, и об акции у прибалтийских посольств, скромно называвшейся «Шпроты». Гусев играл в организации особую роль — он редактировал электронную газету, выпускал молодежные бестселлеры и мог твердо рассчитывать на место в Думе, но после попадания в список спикировал ниже плинтуса. Поначалу его успокаивали: все свои, никто тебя не подозревает, ничего страшного, — но вскоре выяснилось, что у Гусева хватает завистников, да и в прошлом у него были сомнительные порнопроекты; его вытеснили сперва из газеты, потом из молодежного издательства, а попытка рейда по Псковской области подорвала его позиции окончательно.</p><p class="p1">— Он как бы начал оправдываться. А это нельзя, понимаете?</p><p class="p1">— А вас тоже поперли?</p><p class="p1">— Я хотел в больничке перекантоваться. Ну, думаю, не тронут же больного? Сам врача и попросил, и стоило мне это копейки. Но меня пришел Каширин навещать. Ну этот, знаете, который по внутренним врагам.</p><p class="p1">— Откуда мне знать, кто у вас по внутренним врагам?</p><p class="p1">— Ну как же, они еще вам поводок вручали. Помните поводок?</p><p class="p1">— Поводок помню. А у вас что, был свой человек по внутренним врагам?</p><p class="p1">— Так это же нормально! — развел руками Панкратов. — Везде есть. У «Местных» есть, у «Дворников»… А «Свои» — это наши, вы не знали?</p><p class="p1">— В каком смысле наши? — Свиридов окончательно запутался во всех этих своих, наших, местных и здешних.</p><p class="p1">— Одна команда. Почечкин — человек Бараша, а Бараш сами знаете чей.</p><p class="p1">Свиридов на всякий случай кивнул.</p><p class="p1">— Ну и вот. Пришел Каш. Видит, я лежу. Помидоров принес, сволочь. — Панкратов рассказывал беззлобно — Каширин выполнял свой долг, и он на его месте повел бы себя точно так же. — Принес, значит, помидорчиков, а сам к врачу. Что у больного Панкратова? Тот ему: плановое обследование. Ну, он и смекнул. Я выписываюсь, а он уже все написал. И ребят опросил, и ребята вспомнили, как я однажды над планом смеялся.</p><p class="p1">— Над каким планом?</p><p class="p1">— Известно каким. План один.</p><p class="p1">— А, — догадался Свиридов. — Зачем же вы над ним смеялись?</p><p class="p1">— Все смеялись, — пожал плечами Панкратов. — Пели про план из Чуйской долины — что такого? Идейных-то нет, все реалисты.</p><p class="p1">— Я одного не понимаю, — Свиридов чувствовал себя все неуютнее, словно за столом с ним сидело иноприродное существо с непостижимой логикой, не злобное, не агрессивное, боже упаси, миролюбивое и симпатичное по-своему, но все атомы в нем были расположены поперек. — У вас нет идеологии, вы сами сказали. А доносы есть. Как это возможно?</p><p class="p1">— Так и возможно, — Панкратов тоже, кажется, недоумевал, как можно не понимать таких простых вещей. — Что такого-то? Не так сказал, присвоил бабки, выпил и матерился. У нас материться нельзя, все матерятся, конечно, но втихую. Да мало ли. Что, обязательно идея, что ли, нужна? Вон, у скинов идеология, пожалуйста. Вам скины больше нравятся? А мы антифашисты, боремся с ними. Если бы не мы, они бы вообще давно всех в капусту…</p><p class="p1">В эту секунду Свиридов с ужасом поймал себя на том, что со скином ему было бы проще: у скина были понятия о верхе и низе, добре и зле, и с ним еще можно было договориться. А Панкратов никогда не напал бы на Свиридова по национальному или идейному мотиву, но спокойно съел бы его с соевым соусом, окажись так надо для попадания в первую пятерку, или как там у них называлась головка организации; еще долго объяснял бы повару, как именно сготовить.</p><p class="p1">— Ладно, ладно. А как же тогда внутренние враги?</p><p class="p1">— А чего внутренние враги? — Панкратов, кажется, начинал подозревать, что этот длинный над ним издевается. — Вы чего, не видите внутренних врагов?</p><p class="p1">— Но идеологии-то нет.</p><p class="p1">— И что, если нет? Есть территория, она суверенна, в ней нефть, на нее посягают. Вы сами, что ли, не видите, как посягают? Вон Олбрайтиха сказала, что у России слишком много нефти, что ресурсы несправедливо распределены. Вы думаете, внутри так никто не думает?</p><p class="p1">— Думают, думают. — Свиридов не был настроен на дискуссии. Он не знал, зачем Панкратов затеял весь этот разговор. — Получается фашизм без идеологии, так?</p><p class="p1">Он думал, что Панкратов обозлится на эту формулировку, но он все улыбался.</p><p class="p1">— А что плохого? Если б не идеология, что бы такого в фашизме? Объединил нацию, работу дал всем. Промышленный рост был вы знаете какой? Если бы они не были антисемиты, это была бы великая страна. Но поскольку во главе стоял маньяк, то все и кончилось. А если бы адекватный менеджер, то и сейчас бы все стояло…</p><p class="p1">— Вы провоцируете меня, что ли? — спросил Свиридов. — Я со всем согласен, так и напишите. Хотят отнять нефть, посягают на суверенитет.</p><p class="p1">— Да ладно, — снова улыбнулся Панкратов. Он был совсем мальчишка, двадцать два года, не больше, чего мы боялись, Господи. — Я не по врагам. Я по любви и дружбе. Помните акцию с рукопожатиями? Конкурс, кто больше рук пожмет? Это я. Студенческие семьи — тоже я, когда гондоны надували.</p><p class="p1">— А вы надували?</p><p class="p1">— Да ладно, все знают. Это громкая акция была. Дуть, пока они не лопнут, чтобы люди размножались. Кто больше всего гондонов испортит, тому девушка из «Своих». Потом кинули, конечно.</p><p class="p1">У Свиридова закружилась голова.</p><p class="p1">— Хорошо, — сказал он. — Я-то чем могу быть полезен?</p><p class="p1">— Это деловой разговор, — кивнул Панкратов. — Это вы уже правильно. Давайте так: вы пишете для «Родненьких», я справки наводил. Дело хорошее. На базе «Родненьких» я вам берусь за три месяца сделать движение. Будут «Родненькие», даже лучше, чем «Свои». Все связи у меня, телефоны, вся сеть. Я восемьсот человек за час могу на улицу вывести легко.</p><p class="p1">— Зачем?</p><p class="p1">— Ну как зачем? Делаем общественное движение. Нагибаем каких-нибудь врагов. Приглашаем в программу и нагибаем. Потом марш, против семейного насилия. Знаете, сколько семейного насилия? Я проверял, каждая вторая семья, только скрывают. Это и вам пиар, и этим креатив, — он ткнул пальцем в потолок. — У них же нет совсем креатива. Я вам нарисую движение в пять минут вообще. Если Мутнов согласится, все в пополаме. — Мутновым звали генпродюсера «Спецпроектов», где делали «Родненьких». — Можем нацболов размазать, их запросто можно, никто не заступится. Потом Гусева можно. На него наверняка что-то есть, я знаю, он много наследил.</p><p class="p1">— Гусева? — переспросил Свиридов. — Друга вашего?</p><p class="p1">— Ну да. Если никого не мочить, креатива не построишь. С пиндосами сейчас не выйдет, уже надоело. Можно по грузинам подумать, не принципиально. В общем, если вы меня туда отведете, я им сам все объясню.</p><p class="p1">Свиридов испытывал мучительное желание начистить ему рыло или хотя бы послать, но понимал, что у инопланетянина это не вызовет сколько-нибудь адекватной реакции. Он не обидится, не задумается, даже не удивится. Он пойдет к Каширину, который только что застучал его самого, и напишет, что Свиридов растлевал малолетних, а поскольку все и так знают цену Панкратову и его доносам, никто не будет даже проверять. Это примут как данность, как идеальный предлог, ибо смысл выхолостился давно, искать его не следовало, — остался чистый ритуал стука, сажания, истребления, карьерного роста, надувания гондонов, размножения, разложения… Главное было — не заговаривать о смысле, это было единственное, что не прощалось.</p><p class="p1">— Я вас могу свести с Мутновым, — кивнул он.</p><p class="p1">— Когда? — деловито спросил Панкратов. — Завтра я занят, есть у меня еще одна задумка…</p><p class="p1">Он помнил, что надо продавать себя подороже, все-таки занят, кому-то нужен…</p><p class="p1">— Я думаю, через месяц, — сказал Свиридов. — Вы пока схему продумайте.</p><p class="p1">— Боитесь? — по-своему истолковал Панкратов его уклончивость. — Думаете, я порченый теперь, да? Так и вы порченый, и они вас там держат. Вы что, написать на меня хотите?</p><p class="p1">— Я никогда ни на кого не пишу.</p><p class="p1">— А хоть и пишите! — Панкратов от дружелюбия мгновенно перешел к агрессии, и только теперь стало видно, как он уязвлен внезапным падением: ведь в шаге был от шоколада, в шаге, а теперь унижается вот перед кем. — Пишите все, у меня человек сидит и пишет весь этот разговор!</p><p class="p1">Он ткнул большим пальцем себе за спину. Угрюмый юноша с челкой, спадавшей на лоб и прикрывавшей, видимо, алые бутоны созревания, поглядывал на них и время от времени что-то нажимал на мобильнике. Может, блефуют, а может, и пишет. Есть пишущие мобильники.</p><p class="p1">— Очень предусмотрительно, — сказал Свиридов.</p><p class="p1">— А приходится, — широко улыбнулся Панкратов, снова мгновенно переключая регистр. Видимо, это стремительное переключение входило в набор обязательных умений местного, своего, родненького.</p><p class="p1">— У меня только один вопрос к вам, Максим, — сказал Свиридов. — Постарайтесь вспомнить, это очень важно. Вы «Команду» смотрели?</p><p class="p1">— А как же?! — обрадовался Панкратов; тема, видимо, была ему знакома. — Как иначе, у нас все на нее ходили. Мы целый поход делали. Наше новое кино. Кто больше всех раз посмотрит, тому диск с автографом Гаранина.</p><p class="p1">— Нет, но сами вы когда смотрели?</p><p class="p1">— В первый день, как вышла, — гордо сказал Панкратов. — Нас от штаба отправили в «Октябрь». Я Олю Щукину видел, автограф взял. В щечку меня поцеловала, — он ткнул пальцем чуть ниже глаза. — Мы все трое должны были пойти, только Бобер не смог. К нему Жека прилетела из Новосибирска, ей на следущий день надо было назад, на отчетную конференцию. Он ее не мог провести, дома валялись.</p><p class="p1">— Ишь ты, — сказал Свиридов. — Не чужд, не чужд. Не было его, значит?</p><p class="p1">— Не было.</p><p class="p1">— И тоже исключили?</p><p class="p1">— Тоже, — сказал Панкратов. Он смотрел на Свиридова с изумлением. — Вы что думаете, что нас за «Команду»? Она же нацпроект…</p><p class="p1">— Нацпроект, нацпроект, — кивнул Свиридов. — Я вам позвоню, давайте телефон.</p><p class="p1">Все опять не сходилось, вот в чем дело. Составитель списков снова оставил лазейку для неверия — можно подумать, только этим и занимался.</p><p class="subtitle">8</p><p class="p1">«Но если каждый из нас — носитель конкретной, ярчайше выраженной черты, и нас подобрали, как радугу, причем в числе 180 таится тот же сакральный смысл, что в семерке? Исследуем же.</p><p class="p1">Тимофеев Анатолий Сергеевич, 47 лет. Водитель при боссе (босса шифрует). До 35 лет в таксопарке, неоднократный победитель парковых соревнований, обладатель каких-то вымпелов за самый бестравматичный, безаварийный, бессмысленный, беспощадный и т. д. год. Главная черта: значительность, жажда доминирования, демонстрация тщеславия. Доведено до абсурда. Лучше всех водит машину, знает Москву, воспитывает детей. Дети тоже наилучшие. В их обществе я не выдержал бы и дня. В «Октябре» был. Билет на премьеру получил от босса, не пожелавшего снисходить до «Команды». Возможная причина гипертщеславия — компенасация за необходимость обслуживать, вылизывать, равняться. Прочих качеств лишен начисто или состояние их зачаточно. Странным образом уверен, что с таким совершенным человеком ничто не может случиться. Разговоров не может поддерживать никаких, кроме как о собственных достижениях. Попадание в список расценивает как случайное. Высказал, впрочем, версию, что все списанты — лучшие по профессии, но, приглядевшись, был разочарован.</p><p class="p1">Вероятность: высокая.</p><p class="p1">Грушина Мария Сергеевна, 26 лет, аспирантка-психолог. Черта: жажда замужества. Убеждена, что будет идеальной женой и матерью, перезревает, теряет драгоценное время. Огромная жопа. Мужа ищет за границей, на сайтах знакомств (все здешние либо заняты, либо спились). Ненавидит и ревнует мать, уверена, что та нарочно отваживает ее мужчин при знакомстве. Отца обожает, боится. Отец с семьей не живет, женился заново лет двадцать назад, она бывает у него раз в месяц. Кажется, Г. ненавидит мать еще и за то, что несет на себе ее карму брачной неудачливости: мать замуж больше не вышла, долгих романов не имела. Постоянно рассказывает о чужих неудачных браках с подтекстом «Уж я бы». Разговоров на другие темы не поддерживает. Подозревает, что весь список создан как огромный клуб знакомств, потому что (вполне серьезно) «у людей нашего круга нет другой возможности познакомиться». Знамо, люди нашего круга сутками работают, а в свободное время закупаются. Активно поддерживает выезды. Замуж готова хоть за Гусева. Замужних женщин за редким исключением презирает. Политических преследований не боится (важно: не имела неприятностей по списочной линии).</p><p class="p1">Вероятность: очень высокая.</p><p class="p1">Майоров Григорий Сергеевич, 34 года, промышленный альпинист, в свободное время альпинист просто, яхтсмен, главное хобби — интерес к истории ариев и праславянства. Убежден в арийском происхождении славян, отделяет их от русов («самозванцы»). Цель, по его мнению, — совместные тренинги для выработки национальной элиты. Соблюдает ритуалы, почерпнутые из «Влесовой книги». Себя считает волхвом. С пятнадцати лет борода (рассказывал, интересуясь, почему не ношу: русскому надо). Все разговоры сворачивает на пользу древних боевых искусств и вред христианства. Травный чай. Не женат, ищет истинную арийку. Евреев поминает назидательно: «Вот они же могут «. В идеале желал бы видеть русских евреями, но хуже, чтобы при случае победить и евреев. Вероятность: вполне.</p><p class="p1">Волкова Елизавета Сергеевна, 35 лет, редактор отдела в «Престиже». Доминанта: болтливость. Перманентный, неутихающий гнилой базар по любому поводу, выражение простейшей мысли с помощью дюжины длинных фраз, но не радостный треп блондинки, а заборматывание звериного страха и уязвленности: бледная, постоянно украдкой оглядывается — не сверлит ли кто недоброжелательным взором. Говорит быстро, как бы оправдываясь. Корни болтливости — вероятней всего, страх, ни на что конкретное не направленный (в частности, за взрослеющих детей, опасный возраст, их двое, погодки, вечные ссоры). Но страх есть у многих, а такой гнойный зудеж — только у Волковой. Редактор она хороший, но с избытком дотошности. Кто ее так перепугал на всю жизнь — загадка. Начальствовать не умеет и не любит, отсюда срывы; с мужем все давно никак. Список воспринимает как возможность неформально общаться, общение считает высшей ценностью, умиляется любой услышанной глупости, как лепету ребенка. Вид загнанный, голос вечно запыхавшийся, тоненький.</p><p class="p1">Вероятность: манифестация типа более чем наглядная, но кому и зачем нужна конкретно Лиза? Можно было найти менее жалкий экземпляр. Хотя, как концентрированное выражение жалкости…</p><p class="p1">Свиридов Сергей Владимирович, 28 лет, сценарист сериалов и телешоу. Доминирующая черта…»</p><p class="empty-line"/><p class="p1">Здесь Свиридов надолго задумался. Самому себя, как известно, классифицировать труднее всего — хотя бы потому, что классификация уже унизительна: допускать, что ты принадлежишь к некоему типу и есть еще такие, как ты, значит уже соглашаться на что-то негигиеничное вроде пользования чужой посудой, а в конце концов и на то, что на тебя распространяются общие закономерности вроде старения, смерти, нелюбимости. Впрочем, пребывание в списке научило его некоторой умственной дисциплине, да и вовсе не обязательно было искать какие-то гнусности: подумав, он выцепил-таки свою главную черту. Это было нежелание соглашаться на условия, во-первых, и скрывать свои комплексы, во-вторых, — нонконформизмом он это не назвал бы, поскольку нонконформист как раз делает усилие для несогласия, Свиридов же терпеть не мог себя ломать и не понимал, почему он все время должен это делать. Мир других был непрерывным насилием над собой: толстые боролись с толщиной, богатые стыдились богатства, каждый считал долгом подгонять себя под образцы. Свиридов же был уверен, что от природы не хочет и не представляет собою ничего дурного, а потому не стеснялся ни лени, если тошно было работать, ни раздражения, когда встречался с идиотизмом. Что-то ему прощалось за дар, а что-то и не прощалось, и в этом не было ничего страшного: мы не обязаны ни под кого подлаживаться, и никто не обязан нас любить. Что мы называем комплексами? — всего лишь чужие кодексы. Свиридов принципиально не понимал, почему надо делать вид, что тебе хорошо, когда плохо; почему надо скрывать, что тебя не любили в школе, что тебе плохо в любом коллективе, где больше пяти человек, что ты не любишь и боишься физической работы, что тебе противно земледелие в любых его проявлениях и малоприятны селяне с их капустным самодовольством, основанным на том, что они часто имеют дело с навозом. Он не понимал, почему надо уважать человека за перенесенное страдание или за выслугу лет. Насилие над собой он считал опасней насилия над другими, ибо насилия над другими принято стыдиться, а насилием над собой — гордиться до самого наглого самодовольства, хотя в смысле жестокости и глупости оно дает фору любой агрессии, направленной вовне. Ему казалось неправильным скрывать неудачи и вообще менять свое лицо. Он категорически не желал обкатывать себя для неотличимости. Он имел право на такую позицию не потому, что приписывал себе исключительный талант, а потому, что был человеком, всего и делов-то. Человеку не должно нравиться постоянно ломать себя об колено, а идея собственной греховности приятна только тому, кому она зачем-то нужна (для списывания на нее неудач, бездействия или откровенного свинства — многие так и делают). Все, что было неудобно, стыдно, противно, — он считал незазорным признавать, обсуждать и по мере сил корректировать, а если нет — учиться с этим жить. Или даже так: он ничего не требовал взамен, но не скрывал брезгливости, когда видел предлагаемое.</p><p class="p1">Эта черта, пожалуй, заслуживала того, чтобы попасть из-за нее в список. Все прочие были производными от этой брезгливости. Она лежала в основе его мира. Вероятность? Ничтожная: кто оценил бы эту черту? Но по выраженности она могла соперничать с болтливостью Волковой, что да, то да. И не сказать, чтобы эта черта его не устраивала.</p><p class="p1">Он, может быть, и не заметил бы ее в себе, если бы не потребность выявить принцип списка. Самоанализ никогда не казался ему перспективным занятием — отчасти потому, что слишком подробное изучение инструмента вредит работе, а Свиридов и был собственным инструментом, и если сороконожка задумается, с какой ноги начинает движение, — ей не сделать и шагу. Главное же — сколько себя ни анализируй, ни одна машина не может перепрограммировать себя до неузнаваемости, и если речь не идет о маньяке — незачем и пытаться. Но в двадцать восемь лет полезно впервые задуматься, что ты такое, — разумеется, для того, чтобы тотчас забыть.</p><p class="subtitle">9</p><p class="p1">— Любопытно, — сказал Глазов. — Но мимо, конечно. Они сидели в шашлычной в Палашевском и ели лобио из горшочков.</p><p class="p1">— Почему «конечно»? — обиделся Свиридов.</p><p class="p1">— Да нет, я понимаю, что это все игры. Но сам список, к сожалению, не игра. И ваш этот файл ничего не отменяет. Есть психологический тест, трудный, — тридцать вагончиков. Надо по некоторому признаку отобрать три. Большинство замечает, что у всех вагончиков пять окон, а у трех шесть. Другие видят что-то с количеством колес, и только ничтожный процент обращает внимание на крышу, которая у одних зубчатая, у других нет. Вот по этому тесту очень четко можно понять, к большинству вы принадлежите или к меньшинству. Причем критерий неважен. Просто если вы попали в те три процента, которые заметили крышу, то с этим никто ничего не сделает — рано или поздно окажетесь в меньшинстве, неважно в каком. Хоть в сексуальном. Психология меньшинств — если вы читали, допустим, Московиси, Донцова, хоть Бронникова…</p><p class="p1">— Ничего не читал, — сказал Свиридов. — Я в психологию не верю, буржуазная лженаука.</p><p class="p1">— Да, да, разумеется. У вас же написано — человек верит в то, что ему приятно, а вам неприятно, что ваше уникальное «я» подвержено закономерностям. Но если б вы читали, вам бы не пришлось докапываться самому. Так вот, есть школа Хаммера, который вообще полагает, что все люди делятся по единственному признаку: люди большинства и меньшинства, и это наполовину условия жизни, обстоятельства и все такое, а наполовину предрасположенность, а я так думаю, что и на две трети она. В общем, если вы по природе человек меньшинства, то пуля дырочку найдет: попадете в него либо по идеологическим, либо по физиологическим признакам, — допустим, растолстеете, — но ниша вас втянет. Люди большинства сейчас на виду, они поголовно единороссы. Заметьте, в нашем списке единороссов практически нет, если не считать Гусева со товарищи. Отметаем бред насчет того, что все они засланные казачки, и легко понимаем, что они суть тоже люди меньшинства — потому что именно меньшинствам присуща гиперактивность, самоутверждение, агрессия в отстаивании своих прав и тэ дэ.</p><p class="p1">— Черт-те что получается у вас, — сказал Свиридов. — Кто-то наверху читал вашего друга Московиси — у него правда такая фамилия?</p><p class="p1">— Да, он француз. Русского происхождения, но отдаленного.</p><p class="p1">— Ага. Кто-то там читал вашего русского француза и по его критериям отбирает людей в список. Гипотетические меньшинства.</p><p class="p1">— А зачем отбирать? — Глазов посмотрел на Свиридова хитро, словно уже знал все ответы.</p><p class="p1">— А как иначе? Вы думаете — сделать? Создать активное меньшинство?</p><p class="p1">— Нет, ну это глупость клементьевская. Зачем им активное меньшинство, они хотят общество вообще без меньшинства… Просто — никого специально отбирать не надо. Вы никогда не задумывались над так называемым парадоксом Кожева?</p><p class="p1">— И про Кожева ничего не знаю. Что вы мне все эрудицию демонстрируете, Глеб Евгеньевич? Не выделывайтесь, сэр, покажите пальцем.</p><p class="p1">— Какая эрудиция, это общеизвестная вещь. Был такой философ, тоже жил во Франции, тоже из русских. Между прочим, родной племянник Кандинского. Он в двадцатом, кажется, уехал. Так он даже написал письмо Сталину с горячим одобрением репрессий, потому что увидел в них не репрессии, а способ воспитания нации. Не исключено, что так оно и было. А пришел он к этой мысли в результате так называемого парадокса Кожева: непонятен был критерий. Во французской революции — нагляден, в английской кромвелевской — запросто, даже в камбоджийской, до которой он не дожил, существовал образовательный и имущественный ценз, после которого высылали или забивали мотыгами. Но в России все действительно непонятно — торжество принципа неопределенности. Берут врагов и правоверных, своих и чужих, евреев и татар, низы и начальство, и каждая страта уверена, что ударяют именно по ней. Строго говоря, правило Кожева как раз в этом и заключается: если не можете сформулировать причину — ищите цель. То есть действие предпринимается не почему-то, а для чего-то. На самом деле почти любую вещь можно рассматривать с этих двух точек зрения — например, секс. Кто-то скажет, что это по любви, а кто-то — что ради зачатия. Но наличие беспричинности, абсурдности — как раз и есть симптом великой цели, и это вполне убедительная формулировка. Так что Клементьев, сам того не зная, реализует феноменологию Кожева. Кожев просто не додумался до одного простого принципа — чтобы его почувствовать, надо жить здесь, а он жил в Париже. Это вещь не теоретическая, а ситуативная…</p><p class="p1">— Я читал, что это была месть непрофессионалов, — вспомнил Свиридов. — Ефимов, кажется, писал, или еще кто-то из эмигрантов. Он изучил статистику — вышло, что брали в основном квалифицированных работников по доносам неквалифицированных…</p><p class="p1">— Это только часть правды. Ключевое слово здесь — донос. Брали не таких-то и таких-то, или, верней, их таковость и нетаковость выявлялась в процессе. Брали тех, кто не успел донести, по доносам тех, кто успел. Вот и вся классификация.</p><p class="p1">— Не думаю. Это что же, большинство взято по доносам?</p><p class="p1">— Подавляющее. Восемьдесят четыре процента, если быть точным.</p><p class="p1">— Не встречал этой цифры.</p><p class="p1">— Ну, она с небольшими разночтениями широко озвучивается. Да хоть бы и шестьдесят — все равно ясно, что достаточно было дать толчок, а остальное сделали сами. И вот те, кто успел донести раньше, сдали тех, кто по тем или иным причинам воздерживался. Так и определилось — кому сажать, кому сидеть. Те, кто успели донести, как раз и составляют идеальных граждан; те, кто не успели, — в принципе допустимая жертва.</p><p class="p1">— Да ладно, — сказал Свиридов. — А то не брали тех, кто доносил!</p><p class="p1">— Случалось, брали, — легко согласился Глазов, приступая к шашлыку. — Но во вторую очередь. Пока не остались те действительно кремневые люди, которые в результате выиграли войну. Те, с которыми власти было хорошо.</p><p class="p1">— И Ахматова входит в это число? — ехидно спросил Свиридов. — И Пастернак? И мой двоюродный дед?</p><p class="p1">— Про деда вашего я ничего не знаю, — не смутился Глазов, — Пастернак вовремя спозиционировал себя юродивым, насчет Ахматовой разные есть мнения…</p><p class="p1">— Вы допускаете, что она доносила?</p><p class="p1">— Я думаю, что в ее случае эффективней было взять мужа и сына, что и было исполнено. Вообще не забывайте, Сережа, что мы-то говорим в основном о промышленности и армии — то есть о тех, от кого что-то зависело. А искусство — вещь десятая, просто оно на виду. Я четко знаю, что среди исполнителей — тех, от кого в конечном счете и зависит жизнь государства, — берут не стихийно, а рационально. Инициативный, плодовитый доносчик по определению остается на свободе. А тот, кто тормознул, — по нравственным причинам или по лености, — в государстве нового типа не востребован. Можно даже сказать, что системная, человекообразующая черта новых людей — готовность донести с опережением, нужный для этого уровень социальной зависти, присматривание за чужим богатством, успехом и прочая. Чисто ситуативная вещь. Так и выявляется меньшинство, готовое на все. А потому не нужное.</p><p class="p1">— Ну и что в нашем случае?</p><p class="p1">— То же самое, с поправкой на масштаб, — пожал плечами Глазов. — Люди делятся на тех, кто составляет списки, и тех, кто в них попадает. Вот и все актуальное членение.</p><p class="p1">— Стоп, стоп. Вы хотите сказать, что список составлял не один человек?</p><p class="p1">— А как иначе? — Глазов даже отложил вилку, до того его потрясла свиридовская наивность. — Как вы себе представляете одного составителя, побывавшего на всех предприятиях, в газетах, у вас на студии? Нет, это результат целенаправленной работы, конечно. Рассылается по первым отделам, или как они сейчас называются, конкретный запрос: укажите людей, с вашей точки зрения неблагонадежных. А неблагонадежность — понятие широкое, Набоков ввел термин «непрозрачность», более удобный, по-моему. Что значит сегодня «неблагонадежен»? Недорадовался трудовым победам коллектива? Не съездил на тимбилдинг? Недопил на корпоративе? Прогулял работу без уважительных причин? Рассказал анекдот про Путина и овощи? Не работает. В начальники попадают люди, которые интуитивно чуют, кто прозрачен, а кто нет. Больше от начальства ничего и не требуется. Вы непрозрачны, я это безо всякого доноса вижу. И я непрозрачен — у меня больше одной мысли помещается в голове. И даже упомянутый вами шофер Тимофеев — приличный человек, потому что у него есть рабочая гордость и он ее ставит выше сословной; а лишними по умолчанию являются все, у кого имеются неконъюнктурные принципы. Не соотносящиеся с конкретной ситуацией. По этому же признаку и Маляров непрозрачен со своими ариями… ария голодных из оперы «Три дня не евши»…</p><p class="p1">— Майоров, — поправил Свиридов.</p><p class="p1">— Да, я путаюсь уже во всем этом списке… И бедная Лиза, болтушка, тоже ведь болтает не просто так. Откуда в ней этот страх? Да некомфортно ей в «Престиже», только и всего. И накроется скоро этот «Престиж» по открывшимся обстоятельствам.</p><p class="p1">— По каким?</p><p class="p1">— Делиться не хотели, я думаю. Да неважно. Она не на месте, у нее не светская психология, может, она вообще себя здесь чувствует чужой, или за сыновей боится, что им в армию идти… Вот они и направляют списки: такой-то, с нашей точки зрения, неблагонадежен, такая-то сомнительна… А дальше этот список доводится на всех уровнях до сведения контрольных, таможенных и иных влиятельных органов, и каждый делает что может, поскольку на прямые репрессии решаться не хотят. Имидж портить, с Западом ссориться — зачем? Если хотите знать, я всегда предполагал, что репрессии нового поколения пойдут по этому сценарию. Он такой сетевой. Факт наличия списка не скрывается — о нем все знают, и это полезно, чтобы люди боялись туда попасть и вели себя аккуратнее. Вы ведь заметили, что он расширяется? А число людей, бывших на конкретном сеансе, никак расширяться не может.</p><p class="p1">— Ну, может, добровольно вписываются? Как Борисов?</p><p class="p1">— Господь с вами. Борисов врун, болтун и хохотун, таких много не бывает. Я думаю, это новые неблагонадежные… потому что если список закроется, идея будет мертва. «Свои» почти всем уже сделали гадости, организация не должна простаивать.</p><p class="p1">— Глеб Евгеньевич. — Свиридов перестал понимать, где тут интеллектуальная спекуляция, а где вера в собственный бред. — Вы тоже, что ли, не верите, что перед нами список людей, в первую неделю проката посмотревших «Команду»?</p><p class="p1">— Ну конечно, нет. — Он говорил искренне, без тени насмешки. — Я даже знаю, почему в это верите вы: вам льстит сознание допущенности к гостайнам, у вас друг такой знаменитый, он лично к вам приехал и рассказал версию. Вероятно, для того, чтобы вы тут же ретранслировали ее вашей Тэссе из рода д'Эрбервиллей. Вы и ретранслировали, сделали, что требовалось, и я вас нисколько не виню: я бы тоже немедленно озвучил такую новость. Но считать эту версию основной, особенно по зрелом размышлении… извините, Сережа. Они, конечно, идиоты, и многое дошло до абсурда, — но при всем неуважении к «кровавой гебухе» я не думаю, что они докатились до рассылки по жэкам списка зрителей фильма «Команда». А вот придумать такую версию действительно могли очень глупые люди, и это лишний раз доказывает, что пиар у них поставлен хуже, чем оперативная работа.</p><p class="p1">— Да в чем тогда смысл этого списка?! — в отчаянии спросил Свиридов. — Идея-то в чем, Глеб Евгеньевич?! Я могу еще понять людей, которые отслеживают биографии зрителей: все-таки интересно, как подействовала агитка! Когда обзванивают таргет-группу и собирают телерейтинги, мне это тоже кажется абсурдом, но ведь это методика, так делается во всем мире! А когда просто, по произвольному критерию, отбирают двести человек и у всех на глазах подвергают противоположным воздействиям, из огня в полымя, а оттуда в сугроб… в этом нет уже вовсе никакого смысла!</p><p class="p1">— Вы, Сережа, все ищете смысл. А у одной умной женщины, — Глазов назидательно поднял вилку, — уже было написано: в иные эпохи надо помнить не о смысле, а о цели. Сейчас вообще кризис смыслов, и я даже думаю, что вопрос «зачем» — довольно детский. Вещи происходят силою вещей. В детстве люди подбирают к этому причины, а потом просто понимают, что такова жизнь, и все. От идеологий и целей давно пора отказываться, это вещи наивные. Происходит простейшая вещь: в перенасыщенном растворе выпадают кристаллы. В силу разных, слабо связанных причин у нас в обществе сейчас перенасыщенный раствор: оно закрыто, подцензурно, социально расслоено, финансово перегрето, интеллектуально обескровлено, немобильно, нестабильно. В обществе с такими характеристиками — часто, согласитесь, взаимоисключающими, — создается в какой-то момент избыточное давление, раствор перенасыщается, и выпадают кристаллы. Кристаллы, разумеется, начинают думать — чем они виноваты? Ничем, в кристаллическую решетку свободно могли объединиться другие атомы. Но объединились эти, и надо жить. Утешайтесь тем, что мы кристалл.</p><p class="p1">— А что дальше?</p><p class="p1">— Да ничего практически. Кристалл растет, пока не кончится раствор, — ну и список будет расти, пока не кончится нефть или не сменятся условия. Но в таком обществе всегда появляются списки, и формирование их всегда происходит более-менее по одной модели. В закрытых центральзованных сообществах — то есть в перенасыщенных растворах — это, как правило, те, кто не успел донести. Хотя, правду вам сказать, — в одном ваш друг Рома прав. Это действительно неважно. Это мог быть хоть один какой-нибудь класс одной школы с одноклассников ру, но тогда ведь, согласитесь, неинтересно. Аналитический отдел Лубянки должен что-то предъявлять, чтобы не просто так зарплату платили. Ну вот, они проанализировали. И тот факт, что все мы попали в список, говорит как раз о том, что мы не совсем приспособлены для жизни в нашем обществе.</p><p class="p1">— Да почему? — спросил Свиридов с досадой. — Я одного никак не пойму: почему именно?</p><p class="p1">— Потому, — невозмутимо отвечал Глазов, — что в противном случае этот список составляли бы мы.</p><p class="p1">— И все сводится только к этому? — повторил Свиридов.</p><p class="p1">— В нашем обществе — только. Ум, талант и прочие профессиональные составляющие перестают иметь какое-либо значение.</p><p class="p1">— Так. — Глазову впервые удалось пошатнуть уверенность Свиридова в Роминой версии, и надо было срочно освоиться в новой конструкции. — Очень хорошо. Ладно. Но тогда — что нам теперь делать? Если от личных качеств больше ничего не зависит? Начать доносить?</p><p class="p1">— Поздно, — улыбнулся Глазов. — Не поверит никто.</p><p class="p1">— Ну а что? Уезжать?</p><p class="p1">— Можно попробовать, но проблематично. Усачева вон уже не выпустили, да и у меня проблемы — начальство собиралось в Японию отправить на симпозиум, но поедет, кажется, другой.</p><p class="p1">— А тогда как?</p><p class="p1">— Выпадайте в осадок, Сережа. Что еще кристаллу делать? Попробуйте как-то социализироваться, вон вы продолжаете вашу программу писать — пишите. Можете что-то для себя сочинять.</p><p class="p1">— Не могу я сочинять, Глеб Евгеньевич, — сказал Свиридов. — Не могу вообще ничего сочинять, когда я в списке. Сижу пасьянсы раскладываю.</p><p class="p1">— А вот это вы зря. — Чувствовалось, что Глазов наконец удивился. — Не ждал от вас. Я же вам объяснил: вы всегда принадлежали к меньшинству, только не знали об этом. А сейчас вас, слава богу, выявили… Что дурного?</p><p class="p1">Плодотворная, по-моему, ситуация. Можно гордыню отрастить.</p><p class="p1">— Для вас, может, плодотворная, а для меня вилы. Что может сочинить инфузория под микроскопом?</p><p class="p1">— Да только под микроскопом ей и сочинять! — Глазов улыбался все шире. — Это же отлично: такой читатель! Кто прочтет сочинения обычной инфузории? Другая инфузория! А тут кто? Целый наблюдатель, доктор наук. Сейчас-то и писать, когда к вам приковано внимание! Неужели это вам не стимул?</p><p class="p1">— Если б так — да. Но здесь поправка. Здесь под микроскопом, похоже, человек, а смотрит на него как раз инфузория. И в этом состоянии я вряд ли что-нибудь напишу. Да и описывать нечего — лежишь на приборном стекле…</p></span>
