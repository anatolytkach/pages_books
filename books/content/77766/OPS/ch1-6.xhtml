<span><p class="p1">На лавке у подъезда сидела Вечная Люба — так Свиридов называл про себя женщину из тех, кому свободно может быть и сорок, и семьдесят. Люба сидела тут каждый вечер, у нее был свой клуб — жирная блондинка жэковского типа, с крашеными волосами и слоновьими ногами; бабушка в платочке, ничего не понимавшая и всему поддакивавшая; нервная Матильда, худая, дерганая, климактерического темперамента, и всем им было нечего делать, и все они следили за порядком в доме, как его понимали. Еще когда жив был дед и Свиридов ездил к нему сюда, Люба, точно такая же, как сейчас, восседала на лавке, подложив под зад то же самое вчетверо сложенное байковое покрывалко. Она подкладывала его под себя в любую жару. Ей это казалось чистоплотным. После смерти деда Свиридов перестал снимать квартиру в Сокольниках и въехал сюда, на Профсоюзную, и успел хорошо изучить порядки этого женоклуба. Во-первых, они требовали, чтобы все с ними здоровались, а поскольку Свиридов поначалу не знал их даже по именам, они здоровались сами, со значением, давая понять, что старые люди унижаются перед ним, а он не удостаивает. Свиридов все равно не здоровался, они были ему противны. Несколько раз он спасал от них тихую молдаванку из первого подъезда, торговавшую соленьями на ближайшем рынке. Женоклуб третировал сына молдаванки, действительно противного десятилетнего оболтуса, но воспитывать оболтуса они боялись — он мог и послать, а молдаванка, у которой были вдобавок трудности с регистрацией, покорно выслушивала их нравоучения и просила прощенья.</p><p class="p1">На этот раз у подъезда торчала одна Люба. Сидя на покрывалке, она победоносно озирала свои владения.</p><p class="p1">— Сережа! — позвала она Свиридова.</p><p class="p1">— Что?</p><p class="p1">— Ты не штокай, а когда в следующий раз уезжаешь, меня предупреждай.</p><p class="p1">— Зачем? — поразился Свиридов.</p><p class="p1">— Ты не зачемкай, а слушай. Я тебя вот какого помню, тебя мама сюда к дедушке привозила. Твой дедушка был какой человек, а ты что? Ты уезжаешь, а почту носют, она не вмещается в ящик, нам неприятности.</p><p class="p1">— Какая почта, я ничего не выписываю!</p><p class="p1">— Выписываешь ты, не выписываешь, я не знаю. Они тебе носют, а ты не берешь. Уже выпадывает из ящика. Почтальон к кому идет? — к Любе. «Где из пятнадцатой квартиры?» А я знаю, где из пятнадцатой квартиры? Или ты скажи на почте, чтоб без тебя не носили, или скажи мне, я буду забирать. Оставь ключ, я буду. Я дедушку твоего знала. А ты уехал, и мы не знаем, где ты, что ты. Нам же надо знать, где что. Вот Сарычевы на даче — я знаю, что Сарычевы на даче. Вот из тридцать восьмой в Африке — я знаю, что в Африке. А тебе письма приносят, может, важное что. Это порядок, нет?</p><p class="p1">— Какие письма? — растерялся Свиридов.</p><p class="p1">— Ты не какай, а делай, как я говорю. Ты когда уезжаешь — подошел, сказал: так и так, тетя Люба, я уехал, пожалуйста, если вам не трудно, конечно, забирайте мою почту, вот ключ. Тете Любе не трудно, я по всему подъезду забираю, когда кто попросил. Попроси, не переломишься.</p><p class="p1">— Ни о чем просить я вас не буду, — зло сказал Свиридов, — и ничего мне тут не носили. Ящик пустой, я проверял.</p><p class="p1">— Пустой?! — заверещала Люба. Она заводилась с полоборота. — Он пустой, потому что все на почту отнесли!</p><p class="p1">Я сказала, ты в отъезде, он отнес! А там повестка тебе, между прочим! Ты по повестке не придешь, а кто виноват? Не получил, не расписался, ничего!</p><p class="p1">— Где повестка? — спросил Свиридов, чувствуя, как слабеют колени.</p><p class="p1">— Ты не гдекай, а в следующий раз предупреждай! Понятно? — торжествовала Люба. — Повестка на почте, завтра пойдешь распишесся. И что за вид у тебя, я не знаю? Я давно тебе сказать хочу: твой дедушка разве так ходил? Твой дедушка в любой жар бруки носил как человек… Дальнейшего Свиридов слушать не стал и вошел в подъезд. Если бы старая дура сказала о повестке с утра, он бы успел ее забрать и не мучился подозрениями до завтра. Но тогда ее, как назло, на посту не было, а теперь почта закрылась. Какая повестка, разве что на сборы, — но сборы давно не проводятся, что он выдумал… Дома он поймал себя на старой, давно побежденной привычке по нескольку раз запирать за собой дверь. Это был отголосок старого синдрома, мучившего его в детстве, — отец тоже никогда не мог с первого раза поставить чашку на стол или выйти из комнаты, всегда делал вторую попытку. В отрочестве все прошло, Свиридов научился обходиться без ритуалов, сопровождавших в детстве каждое его действие и доставлявших массу неприятностей — он везде опаздывал, злился на себя, иногда плакал. В двенадцать лет вдруг понял, что может разорвать эту паутину, — или просто начал сочинять, и возвратные токи, мешавшие мозгу думать, нашли себе иное применение. Возвратными токами он называл бесчисленные побочные сюжеты, развертывавшиеся в голове из-за невыполнения того или иного ритуала. Он с удивлением узнал, что болезнь его, оказывается, никакая не болезнь, что так мучаются почти все дети, что даже религия имеет сходное происхождение, см. «Тотем и табу» (Фрейд все-таки был дурак и такую вещь, как благодарность, не учитывал вовсе). По вспышкам этих внезапных страхов, когда дверь не желала закрываться с первого раза, а надевание ботинок требовало как минимум трех танцевальных па, — он замечал, что болен, простужен или переработал, и успевал принять меры до более явных симптомов. Иногда эти странности свидетельствовали о скрытой панике — он давно научился не признаваться себе в ее причинах, пропускать их мимо ума, но она она никуда не девалась, только стала беспричинной. Теперь, впрочем, все было слишком понятно. Он понимал даже, почему во всех его танцах наедине с собой такую роль играли двери — границы между ним и миром, который стал вдруг враждебен, как в детстве. Вся адаптация — чушь, нас очень легко перевести в детское состояние, когда каждый волен прочесть нам нотацию. Старая перечница. Свиридов включил телевизор, который всегда его успокаивал, но по телевизору шла реклама шампуня против перхоти: девушка, обнаружив за плечом у юноши бледного типа гомосексуального вида, оскорбленно хлопала дверью, и юноша смывал типа, жалобно цеплявшегося за борт ванны, неумолимой струей белопенного шампуня. Чтобы девушка ушла, обнаружив у возлюбленного перхоть, — как хотите, такого сюжета не выдумал бы и Джером, у которого герой бросил подругу, увидав ее обломанные ногти; Свиридов тут же машинально прикинул, как это покрутить. В девяти из десяти рекламных сюжетов речь шла о вещах, о которых приличные люди вслух не говорили: запах из подмышек, изо рта, из промежности. Все ревниво наблюдали друг за другом, выслеживая, не оступился ли сосед, не оговорился ли, не разит ли от него. Особо гнусные впечатления заносились в копилку на случай своевременного использования, а в том, что случай подвернется, никто не сомневался. Сегодня Сидоров взят, и сосед тут же вспоминает, что он редко мылся, а позавчера подозрительно долго гладил по голове соседскую девочку. Мир был теперь населен скрытыми педофилами, трясунами, в лучшем случае невинными онанистами, всякий прятал грязную подноготную и, возможно, скрывал шпионаж. Шакалят, шпионят, редко моются. Каждый собирал на другого досье и ждал только повода обнародовать. Впрочем, это наверняка казалось. Больно специфическое состояние. Иногда в сумерках, на болезненной границе тьмы и света, Свиридова охватывало такое же одиночество, и каждый встречный казался врагом, и довольно было ласкового слова или кивка дежурной в гостинице, чтобы мир вернулся к норме. Будь они прокляты со своими списками, почему все мы здесь виноваты и вечно доказываем свое право на существование людям, не имеющим права на существование? Он выключил телевизор и прибегнул к старинному средству: принял контрастный душ и навел идеальный порядок в берлоге. Квартира была однокомнатная, не развернешься, но за час в мусоропровод улетело пять пластиковых пакетов старых кассет, дисков и книг, стол был расчищен от хлама, пыль отправилась летать, и даже зеркальный плафон в комнате был отполирован старой газетой. Ну вот, сказал себе Свиридов, каких мне еще доказательств моей власти над миром? До полуночи он курил, сидя на подоконнике, сыграл пару раз в дурацкую «аркаду» и завалился спать на свежее белье почти умиротворенным.</p><div class="cite">
<p class="p1">«Говорила занеси ключи не занес говорила дедушка носил бруки не надел. Разговаривал без всякого уважения ой граждане дорогие уважаемые какой неприятный подозрительный тяжелый человек и вся жизнь моя была неприятная и тяжелая. Я написамши вам все по поручению о том как и что, но так же хочу довести что протекает стояк и это уже не первый год. Я вызываю слесарь а что слесарь. Он хочет придет не хочет не придет. Уж я обращалась всюду и никто ничего. Я убедительно прошу что то сделать. Прошу в моей просьбе не отказать».</p>
</div><p class="subtitle">4</p><p class="p1">С утра он предполагал бежать за таинственной повесткой, но в десять его разбудил звонок Кафельникова.</p><p class="p1">— Зайди в одиннадцать, — бросил он, и Свиридов, не заезжая на почту, помчался в «жигуле» на Трифоновскую. Там размещалась «Экстра Ф», производящая «Спецназ». Машина завелась с трудом, но с пятого раза зачихала — хоть кто-то был Свиридову верен и старался ради него. Люба была тут как тут — злорадно любовалась, как он заводился; заглохнуть у нее на глазах было бы окончательным позором.</p><p class="p1">Третье кольцо почти стояло. Прямо перед Свиридовым ехала баба на «субару», с задним стеклом, обильно оклеенным предупреждающими знаками: туфелька, «У», чайник — все, чтобы насторожиться. Свиридов никак не мог ее обойти, а когда наконец обошел — впереди замаячила «газель», которая на Беговой заглохла. Никто не пропускал, Свиридов вспотел, объезжая раскорячившийся грузовик, заметил, что машина греется, и молился, чтоб не вскипела. Машину пора было менять давно, но он копил на двухкомнатную для них с Алей. Деньги копились медленно, жизнь двигалась, как эта пробка. В пробке всегда приходили такие мысли. Разрулить ее — как и жизнь — не составило бы городу большого труда: пара очевидных и необременительных рационализации, но это, наверное, входило в план — чтобы двигаться в час по чайной ложке; более высоких темпов страна могла и не выдержать. Позвонить на эту чертову почту, спросить, что за повестка? Но он не знал телефона.</p><p class="p1">Кафельников не торопился начинать разговор, хмуро копался в ящиках стола и тянул время. Наконец он поднял на Свиридова честные голубые глаза — глаза Мэла Гибсона, борца за добро и чистоту, тайного садиста и алкоголика.</p><p class="p1">— Ну чего? — сказал он со вздохом. — Как съездил-то?</p><p class="p1">— Ничего, приз дали.</p><p class="p1">— Поздравляю. Слушай, я это, — он сделал паузу и опять порылся в ящиках, но тут же решительно поднял взгляд. Он так и не предлагал Свиридову сесть, а сам Свиридов без приглашения стеснялся. — Я рассусоливать не буду, мужик ты взрослый. Мы с тобой расстаемся.</p><p class="p1">Свиридов бессознательно готовился к подобному обороту и не особенно удивился, но решил по крайней мере досконально выяснить, в чем дело.</p><p class="p1">— Что не так? — спросил он по возможности независимо.</p><p class="p1">— Все так. К тебе профессиональных претензий нет. Утрясется, я позвоню. Но какое-то время ты на «Спецназе» не работаешь.</p><p class="p1">— А причину-то я могу знать?</p><p class="p1">Кафельников не рассчитывал на долгий разговор. Он был честен и прям, с порога оглушил сотрудника и вправе был ждать благодарности, без этих, знаешь, бабских тудым-сюдым. Ударил обухом, а мог мучить пилочкой — опыт имелся. Он начинал в тележурнале «Служу Советскому Союзу» разъездным корреспондентом, несколько лет заведовал музыкальной программой «Дембельский альбом», сейчас входил в худсовет патриотического канала «Звезда» и предпочитал выражения лапидарные.</p><p class="p1">— Причину ты знать можешь и знаешь. Если думаешь, что мне очень приятно выставлять людей, так ты ошибаешься.</p><p class="p1">— Я ничего не знаю, — твердо сказал Свиридов. Кафельников изобразил благородным лицом бесконечную усталость.</p><p class="p1">— Слушай, — сказал он, — что мы опять за рыбу деньги? «Спецназ» — сериал не просто так. Если на человека сигнал, я лучше ему передышку. Мы не можем абы кого. К тебе вопросов нет, за июль все получишь. Но пока такое дело, надо переждать. Черт знает, чего хотят. И так придираются к каждому слову, уже не знают, где крамолу искать. А тут ты со своим списком.</p><p class="p1">— Я не знаю, что это за список, — вознегодовал Свиридов. — Может, хоть вы в курсе?</p><p class="p1">— Кто надо, тот в курсе. Все, иди. Не держи зла, должен понимать.</p><p class="p1">Кажется, он с трудом удержался, чтобы не скомандовать «кругом». Свиридов повернулся и вышел, чувствуя себя оглушенным, оплеванным и ограбленным. Секретарша Кафельникова Марина смотрела на него с состраданием. Марину Кафельников таскал за собой по всем должностям, притащил и на «Экстру». Обычно она раздражала Свиридова постоянной улыбкой и маленькими короткопалыми ручками. Ей было за сорок и даже, пожалуй, под пятьдесят, но она, как и Вечная Люба, казалась женщиной без возраста — просто Любиным эликсиром юности были подъездные скандалы, а Марининым, надо полагать, подобострастие, с которым на нее смотрели посетители шефа.</p><p class="p1">Но на этот раз она смотрела на Свиридова без дежурной улыбки, и в ее прозрачных кукольных глазах — еще светлей и невинней, чем у Кафельникова, — читалось нечто вроде сочувствия. Должно быть, Свиридов выглядел хуже некуда.</p><p class="p1">— Сережа, — сказала она тихо, — все образуется.</p><p class="p1">— Что образуется, Марина Сергеевна? — бешеным шепотом спросил Свиридов. — Что должно образоваться? Я ни черта не понимаю, что происходит.</p><p class="p1">— Сережа, — еще тише сказала она, — происходит то, что здесь с утра был Сазонов. Ну Коля, вы знаете.</p><p class="p1">— Знаю, и что?</p><p class="p1">— Ничего, — совсем беззвучно продолжала Марина. — Вы только тише. Я вам что хочу сказать. Вам не надо дружить с этим человеком.</p><p class="p1">— Почему?</p><p class="p1">— Он плохой человек. Вы ему ничего не рассказывайте, хотя он и так поймет. Я про него кое-что знаю. — Марина многозначительно поджала губы. — Для него люди — пфу. Если у вас что раньше с ним было, разговоры или что, то больше не надо. Он вам сделает нехорошо.</p><p class="p1">— Слушайте, какое нехорошо? Надо ж хоть представлять, в чем вообще дело…</p><p class="p1">— Дело в том, что он сюда успел до вас, — сказала секретарша, показывая глазами на дверь кабинета. — Як вам по-хорошему, давайте и вы по-хорошему. Я не знаю, как там и что, но вы с ним будьте осторожны. Я в людях понимаю, тут через меня всякие прошли. Поняли? Ну идите, все уладится.</p><p class="p1">Он кивнул и вышел. Кое-что начало вырисовываться.</p><p class="p1">— Сазонов у себя? — спросил он референтку.</p><p class="p1">— У себя.</p><p class="p1">Разговаривать с Сазоновым здесь не имело смысла — получилось бы, что Кафельников его выдал, а он не выдал, сука, спрятал доносчика. Идиот, обругал себя Свиридов, у кого искал сочувствия! «Коля, я в списке!» На ватных ногах он спустился вниз, завел «жигуля» и поехал на почту. В сторону Ленинского было посвободнее, хотя на Сущевке перед тоннелем снова встал минут на пять. Главное — никого не задеть. Теперь, когда он в списке, любая проблема вырастала в катастрофу, царапина оборачивалась трофической язвой, — надо контролировать себя очень тщательно. На беду, Свиридов этого не умел. Он привык, что первое побуждение — верное. Теперь надо было все время оглядываться: вести машину без риска, на улице не выделяться из толпы, а разговаривая, взвешивать каждое слово.</p><p class="p1">На почте выяснилось, что корреспонденцию ему не могут выдать без паспорта; он прыгнул в машину и понесся за документом. Люба уже заняла наблюдательный пост.</p><p class="p1">— Сереж! — окликнула она его. — Ты што не здороваесся!</p><p class="p1">— Здравствуйте, — сказал Свиридов, артикулируя каждую букву. Он достиг нужного градуса бешенства, в ушах шумело. — Как поживаете, как испражнение кишечника?</p><p class="p1">— Ты на почте был? — пропустив испражнение мимо ушей, спросила Люба. — Ты смотри, там повестка, надо забрать.</p><p class="p1">— Я как раз туда еду, — широко улыбнулся Свиридов. — Вам в магазине ничего не нужно? Я бы прикупил.</p><p class="p1">— Ты себе прикупи, — Люба поджала губы. — Ты так не разговаривай со мной. Я всяких тут повидала. — Свиридов порадовался совпадению ее лексики с Марининой. — Я тебя вот такого знаю, твой дед всегда со мной здоровался…</p><p class="p1">Свиридов вбежал в подъезд, хлопнул дверью и вызвал лифт. Паспорт лежал у него в верхнем ящике старого дедова стола. Как бы это выбежать из дома, чтобы миновать Любу? Но когда он выходил — буквально три минуты спустя, — Люба уже пересказывала разговор со Свиридовым климактерической Матильде. Свиридов промчался мимо как живая иллюстрация.</p><p class="p1">— Вон он, вон он! — закричала Люба. — Побежал! Ты знаешь с кем так разговаривать будешь? Ты с бабами своими так разговаривать будешь, которых водишь сюда!</p><p class="p1">Свиридов уже прыгнул в машину. Отвечать он считал неприличным. Почему она прицепилась именно сейчас, недоумевал он, нюх у нее, что ли? Прямо чувствует, когда можно травить…</p><p class="p1">На почте долго изучали паспорт, потребовали ИНН, — все документы, включая пенсионное свидетельство, хранились у Свиридова вместе, и он захватил их, будучи внутренне готов к такому обороту. Обошлось, по крайней мере, без детектора лжи.</p><p class="p1">— Что же вы не предупредили, что уезжаете! — укоризненно сказала ему потная сливочная блондинка лет двадцати двух.</p><p class="p1">— А что, я должен отчитываться?</p><p class="p1">— Отчитываться не отчитываться, а зайти предупредить можно. Мы должны на почте знать перемещения, нет?</p><p class="p1">— Еще чего, — сказал Свиридов. — Почему почта должна контролировать мои перемещения? Вам анализы мои не нужны?</p><p class="p1">— Анализы свои себе оставьте, — брезгливо сказала блондинка, словно он уже выставил перед ней майонезную баночку с желтой жидкостью. — Почтальон видит — вам письмо, а вы не забрали. Он вынужден был самостоятельно принимать решение. Хорошо, ему в подъезде сказали, что вы отъехали. Может, там что важное, откуда мы знаем.</p><p class="p1">— Ну так дайте мне его скорей, если там что важное.</p><p class="p1">— Мы дадим, — сказала блондинка. Ей нужно было потянуть время, она еще не закончила лекцию. — Мы дадим, но мы тоже имеем право, чтобы наш труд уважался. Вы же оказываете внимание вашей матери, дочери вашей. Вы и нам можете оказать внимание. Мы тоже не просто так.</p><p class="p1">— Знаете, — сказал Свиридов, начиная понимать, как это все смешно, — сейчас все везде не просто так. Я тоже не просто так. Я не могу каждому говорить, куда поехал. Понимаете?</p><p class="p1">— Все вы можете, — сказала она уже не так уверенно. Ей было душно, тяжело со своими пятьюдесятью лишними килограммами, кондиционер еле дул, она потела, шутки до нее не доходили.</p><p class="p1">— Я специальный человек и никому не могу говорить, куда еду. Дайте, пожалуйста, письмо.</p><p class="p1">— Да берите, — сказала она, вручила ему пачку рекламных листков и толстый плотный конверт. Передав Свиридову корреспонденцию, она тут же демонстративно отвернулась — он явно был неспособен оценить каждодневный незримый подвиг сотрудников почтовой службы. У всех был каждодневный подвиг, кроме него.</p><p class="p1">Почему-то нельзя было вскрывать письмо в помещении почты, так он чувствовал. Специальные люди контролируют себя, они в одиночестве вскрывают секретные пакеты. Юстас Алексу. На самом деле он уже знал, что ничего страшного. От письма не исходило ни малейшей опасности, даром что вместо обратного адреса был синий казенный оттиск. Это было официальное, но нестрашное письмо. Он разорвал бархатистый конверт: Союз ветеранов спецслужб приглашал его, автора патриотического сериала, на круглый стол «В едином строю. Роль ветеранов спецслужб в патриотическом воспитании молодых». Свиридов представил ветеранов спецслужб, коллективно воспитывающих молодого. Стало смешно. Что бы мы делали без конкретного мышления! Вот тебе твоя повестка, вечная Люба, старая сволочь. Я в списке, а меня зовут на круглый стол «В едином строю», киноцентр «Октябрь», девятый зал, двадцать девятое июля, форма одежды произвольная. Про форму одежды особенно трогательно, ветераны любят опрятность, помытость.</p><p class="p1">Ситуацию со «Спецназом», однако, следовало обдумать. С одной стороны — не пропадет он и без «Спецназа», гадостью меньше: если не хитрить с собой, он давно и люто ненавидел этот проект. «Спецназ» сочиняли вчетвером под руководством Кафельникова, спускавшего темы. Это были истории трех неразлучных друзей, отслуживших в страшно засекреченном — как иначе? — подразделении и теперь наводивших порядок в мирной повседневности. Повседневность для них была ни фига не мирной: она кишела агентами, шпионами, в последние полгода дважды появлялись вредители, но не брезговали герои и бытовыми ситуациями вроде супружеской измены. Им было не в падлу водворить беглого мужа в семью, разоблачить взяточника, изловить насильника. Ситуации иссякали, приходилось прибегать к флэшбекам, щедро освещая боевое прошлое героев. Гурьев шутил, что скоро троица будет переводить стариков через улицу — все прочее уже переделали. Чип и Дейл от спецназа — был и свой Рокфор, полковой священник Батя, — почти каждую серию завершали в бане, где пели русские народные песни. Когда не хватало народных, переходили на армейские. «Спецназ» ненавидели все, кто его сочинял, снимал и играл, но он был единственным рейтинговым проектом на оборонном телеканале «Орден». Сегодня в России успешным могло быть только то, что вызывало у автора стойкое отвращение. Видимо, тут действовал общий закон мироздания, и у Бога те же проблемы: самые рейтинговые его создания, то есть комары и мухи, вряд ли внушали ему что-нибудь, кроме омерзения, а популяция человека, созданного по авторскому подобию, ничтожна на фоне их роящихся полчищ. Платили по две с половиной за серию, Свиридов сочинял две в месяц, писал их левой ногой и сдавал с чувством угрюмого омерзения к себе. Если удавалось вписать в серию приличный диалог или точную мысль, рейтинг немедленно падал. Аля не уставала измываться над репликами типа «Батя, я тыл прикрою!» и над растяжкой поперек Тверской «Спецназ. Бывших не бывает», однако свиридовскими заработками пользовалась охотно. «Спецназ» давно надо было бросить, он сушил мозги и сбивал руку, но помимо денег давал социализацию: его смотрели нужные люди, и «Экстра», в конце концов, обещала через год спродюсировать Свиридову «Крышу», написанную еще на четвертом курсе.</p><p class="p1">После изгнания у него оставался всего один долгоиграющий проект, настолько постыдный, что он работал там на условии полной анонимности: ток-шоу Василия Орликова «Родненькие», где Свиридов сочинял бесконечные семейные истории, разыгрываемые мосфильмовской массовкой за медные деньги. Конечно, Кафельников обещал вернуть его в проект — но службисты черта с два вернут человека, хоть раз попавшего на карандаш. Он-то думал, что статус его защищает, что сценарист «Спецназа» — это звучит; какое! Первым попал под раздачу, как Киршон. Начинают всегда со своих, чтоб чужие порадовались, — потом их можно брать голыми руками. Помилуйте, вы же сами одобряли! Он мечтал соскочить со «Спецназа» уже полгода, чтобы написать наконец давно придуманную «Провокацию», с Бурцевым и Азефом, но одно дело — с удовольствием планировать добровольный уход, намеченный на неизвестно когда, и совсем другое — увольняться пинком, по доносу собственного режиссера. Соавторам — сорокалетнему неудачнику Шептулину, тридцатилетним ремесленникам Гурьеву и Яблочкину, — он решил пока ничего не говорить: их злорадное сочувствие будет невыносимо. Главное — немедленно оборвать всякие контакты с Сазоновым. Ни словом, ни жестом не выдать осведомленности. Не унижаться до выяснений. «Мы очень рады, что больше не участвуем в твоем безобразии». Еще не хватало припирать к стене стукача. Свиридов позвонил Але и договорился подхватить ее в шесть на Тверской, около «Маков».</p><p class="p1">Они не виделись неделю, и он извелся, представляя, что и как было тут без него. Не то чтобы Аля изменяла при первой возможности — это, как ни странно, было бы еще терпимо. Значит, тоскует, раз пытается заменить его кем-то. Но она, кажется, обходилась без него легко и в заменах не нуждалась. Эта независимость и бесила, и притягивала. Ужасно было не то, что она любила таскать его по магазинам и тратить его деньги на тряпки, а то, что могла без этого: сколько бы Свиридов на нее ни потратил, он никогда не был уверен, что она вообще это заметила. Привязать ее было нереально: любые жертвы с его стороны оказывались в порядке вещей. Почему-то Свиридов был уверен, что к ней стоит очередь из таких же готовых на все идиотов, как он. Его и здесь можно было в любую секунду уволить без выходного пособия, и она напоминала ему об этом массой трудноуловимых, но хорошо продуманных способов. Отношения вписывались в стилистику победившего не пойми чего, сейчас так было везде — километровые очереди желающих, ошеломляющая легкость избавления от балласта: не хотите? — не надо, завтра сотня приползет. Раньше — он застал — можно было хлопнуть дверью и ждать, что за тобой побегут: вернитесь, мы передумали! Теперь незаменимых не осталось, как в легендарные времена, — потому, вероятно, что не осталось областей, где были нужны эти незаменимые. Он сам был свидетелем того, как в самом тонком ремесле все стало на конвейер, — что же говорить о конвейерных по определению? С Алей, как ни странно, все шло по этому сценарию: должность человека, состоящего при ней, была престижная, увлекательная и хорошо оплачиваемая в смысле некоторых ощущений. Но Свиридов ни секунды не чувствовал себя на месте. Так он думал, злясь, что она опаздывает. Но она возникла рядом — и он все забыл, включая список.</p><p class="p1">Рассказывать ей об этом не имело смысла: она не терпела жалоб. Он просто сообщил, что уходит со «Спецназа».</p><p class="p1">— Ну и правильно. Дрянь такая. А что будешь делать?</p><p class="p1">— Найду. Мастерство не пропьешь. Меня на «Смуту» звали, — соврал он.</p><p class="p1">— Что за «Смута»? — Этими его делами она интересовалась, ей нравилось ввернуть на работе что-нибудь инсайдерское.</p><p class="p1">— Да Рома запустил после «Команды». Ему теперь все дадут.</p><p class="p1">— Ты чего, знаком с ним?</p><p class="p1">— Хорошо знаком, — сказал Свиридов со значением, слегка презирая себя за это, — но тут он не лукавил, Рома Гаранин почему-то его выделял. Вероятно, потому, что однажды Свиридов вдумчиво и с пониманием выслушал его пьяную исповедь, а может, в понравившейся ему свиридовской «Попутчице», даже испорченной мучительными потугами Безбородова доказать, что он не только клип-мейкер, действительно было что-то живое, — но Гаранин при встречах с ним целовался и в интервью упоминал как перспективного. После того, как трехчасовая «Команда» — о похождениях свердловской гопоты, частично выбитой в Афгане и добитой в последующих братковских разборках, — первой из всех российских картин триумфально отбилась в прокате, Роме было можно все. Продюсеров заваливали заявками «Рота», «Контора», «Лига», «Туса», «Состав» и даже «Компания» — ее Свиридов читал лично, зайдя однажды в «Партнершип». Компания саратовских друзей синхронно призывалась в Афган, где тусовался уже неограниченный контингент позднесоветской молодежи, потом создавала с нуля собственную компанию по производству мебели и в конце концов гибла поодиночке в мэрской избирательной кампании, которую автор писал тоже через «о». Кажется, только эта грамматическая нестыковка удержала «Партнершип» от запуска. Во всех этих варках, парках и терках, по канону «Команды», выживал один — самый безбашенный, и потому ни одна не повторила Роминого успеха, потому что у него выжил самый убогий, как всегда и бывает. «Команду» показали во дворце, и теперь Рома был туда вхож. В общественной палате он курировал работу с детьми. Первым призом в программе «Смоги!» для детей-инвалидов было участие в его новом проекте — сказке с немыслимым бюджетом, на которую Рома сейчас мучительно искал соавтора. Команда «Команды» не подходила — страшно представить, в каких выражениях описанная ими добрая фея предлагала бы больному мальчику новые ножки.</p><p class="p1">— А чего за «Смута»?</p><p class="p1">— Он продюсером там, Грищенков снимает. Весь состав «Команды» в семнадцатом веке. Жизнь за царя. Белорукое — Минин, Гужев — Пожарский, а шатия из КГБ, которая их прессует, — реакционные бояре.</p><p class="p1">— А Катя кто? Жена Минина и Пожарского?</p><p class="p1">— Берите выше. Марина Мнишек.</p><p class="p1">Катей-сестренкой звали главную звезду «Команды», в миру Олю Щукину, железную женщину из Уфы, ныне ведущую «Звезд за рулем» — шоу об актерских гонках на выживание, известного в кулуарах под названием «Мы с ралли». По ходу «Команды» ее героиня, выросшая с коммандосами в одном дворе, спала со всеми, но никогда с посторонними, ненавязчиво утверждая высшую форму лояльности: у себя блядуем как хотим, но чужим не даем. Особенно эффектна была сцена, в которой Сестра сперва отказывала наркодельцу-кавказцу, а потом бестрепетно расстреливала его, непонятливого. Это дало бы повод обвинить Рому в ксенофобии, если бы он заблаговременно не ввел в команду умного еврея Яшу, считавшего для корешей все бизнес-комбинации. Яша, как водится, был хилый очкарик, но именно он в решительный момент прицелился в зловещего гебешника Ханина, крышевавшего конкурентов, и случайно попал. Команду крышевал другой гебешник, хороший. Именно он в финале ненавязчиво советовал выжившему гопнику Бурому (его жирно сыграл придворный ювелир Полянецкий) пожертвовать совокупный капитал выбитой Команды, доставшийся ему одному, на восстановление Камска после наводнения 2005 года. Рома твердо решил задействовать в новом проекте всех звезд предыдущего и назначил доброго советчика Сусаниным, хотя тот просил Жигимонта. Отрицательные роли ему теперь не полагались.</p><p class="p1">— И чего ты там будешь делать?</p><p class="p1">— Ему нужен человек, чтоб историю знал, — соврал Свиридов. — А я в теме.</p><p class="p1">— Но ведь это будет лажа?</p><p class="p1">— А «Спецназ» что — не лажа? Тут хоть материал приличный и денег больше. — Он уже сам почти верил, что его позвали на «Смуту», хотя там как раз создатели «Команды» стояли плотным строем: перепереть диалоги коммандос с братковского на псевдославянский, и вся недолга. Брате, пошто разводишь мене? Не грузи, боярин! Им не требовалось даже идеологического апгрейда: блатные всегда были большие патриоты.</p><p class="p1">Он вспомнил, как они с Алей смотрели «Команду» на премьере в «Пушкинском». Показ был полузакрытый, в продажу ушло всего двести билетов, за которые убивались быки, видевшие в саге памятник себе, и старлетки, мечтавшие потрогать коммандосов. Коммандосы — Савин, Тютяев, Решетов, Большое — затравленно лыбились под блицами. Прочие пятьсот мест заняли випы разной степени випости, во главе с вице-премьером, глядевшим в преемники. Перекупщики охамели, входной билет стоил четыре штуки, на входе воздвиглись две дополнительные рамки, у всех спрашивали паспорта и чуть ли не переписывали фамилии. На десятой минуте Свиридов с Алей начали неудержимо хихикать, обмениваясь догадками о следующей реплике и почти никогда не ошибаясь. С Алей хорошо было смотреть всякую чушь, а впрочем, что с ней было плохо?</p><p class="p1">Аля ела и рассказывала новости, и Свиридову легчало. Он забывал сазоновское предательство и дурацкий список. Надо, в самом деле, позвонить Роме. Я его еще никогда ничем не напрягал.</p><p class="p1">— Ну, ко мне? — спросил он по возможности небрежно, когда они вышли из «Маков» в гулкое сумеречное ущелье Козицкого переулка. Жара не спадала, короткий ливень ее не смягчил, от берез во дворе шел густой банный запах.</p><p class="p1">— Не, я не могу сегодня. Мать приехала с дачи, надо с ней побыть.</p><p class="p1">— Ну завтра побудешь. Поехали, Аль, меня неделю не было.</p><p class="p1">— Не занудствуй. Я сейчас поеду к себе, выйду на балкончик… — У Свиридова в дедовой квартире не было балкона, Алю это всерьез раздражало. — Выпью чаю с мятой…</p><p class="p1">— Мята и у меня есть. — Он уговаривал машинально — Аля никогда не передумывала.</p><p class="p1">— Ну и славно. Зачем тебе я, когда есть мята?</p><p class="p1">— Слушай, мы долго еще так будем… по-студенчески? У тебя, у меня, обедики в «Маках»?</p><p class="p1">— Ой, не начинай.</p><p class="p1">Выражение «ой, не начинай» он ненавидел особенно.</p><p class="p1">— Слушай! — Он взял ее за плечи. — По-моему, ты на меня зла.</p><p class="p1">— А по-моему, ты параноик.</p><p class="p1">— Ну, это моя профессия.</p><p class="p1">— Вот в профессии и выдумывай. А со мной не надо. Я поэтому и боюсь с тобой съезжаться. Ты же за мной слежку установишь, нет? За каждые полчаса будешь отчета требовать.</p><p class="p1">С ней что-то было не так — даже сейчас, с ним, она думала о каких-то своих делах: то ли о работе, где ее вечно караулили непонятные ему неприятности, то ли, чем черт не шутит, действительно кто-то появился… но он немедленно запретил себе развивать хотя бы этот сюжет. Уж если ты разлюбишь, так теперь: только разбежаться не хватало. Уговаривать Алю на поездку к нему было всегда унизительно, он сразу чувствовал себя похотливым псом, жалко скулящим у хозяйской ноги, и привык ни на чем не настаивать, всецело зависеть от ее прихотей — она могла нагрянуть среди ночи, могла не появляться неделю, ссылаясь то на занятость, то на депрессию, из которой, конечно, он ее вытащить не мог, — но Свиридов не умел на нее сердиться, а подозрительность свою ненавидел с детства, хотя и впрямь был обязан ей несколькими славными заявками. Беда в том, что раньше эти сюжеты не подтверждались — и, сочинив ужасное, он с облегчением плюхался в реальность; это был способ сделать себя счастливым от минуса — вообразить худшее и ошибиться. Теперь, как ни странно, он все чаще замечал, что подозрения сбываются — то ли стал лучше придумывать, то ли реальность развивалась по худшему сценарию. А может, просто каждый родится с желточным мешком удачи — как у малька, на первую неделю жизни, — а к двадцати восьми она иссякает, и реальность подступает вплотную. В двадцать восемь умерли Моррисон и Джоплин, и Лермонтов доигрался, и вообще это первый кризис; кажется, я до него дожил.</p><p class="p1">— Ну, звони, — сказала она.</p><p class="p1">Он постоял у ее подъезда и направился к себе, но таксист попался такой потный и разговорчивый, что в Свиридове закипела злость. Мысль о новой одинокой ночи под пластырем липкой жары, с тоскливым рваным сном, была невыносима. Свиридов не любил спать один. Он вылез на Ленинском и отправился в ближайший бар, но пить в жару нельзя. Вместо веселья пришла тупая злость, и он не выдержал — позвонил-таки Сазонову. Время было детское, одиннадцать.</p><p class="p1">— Коля, — сказал Свиридов, выйдя из бара на ночной Ленинский. Мимо оглушительно прозудела кавалькада сволочей-байкеров. — Что ж ты, Коля?</p><p class="p1">— Ты на улице, что ли? — спокойно спросил Сазонов.</p><p class="p1">— Какая разница? Ну, на улице.</p><p class="p1">— То-то я слышу.</p><p class="p1">— Ты чего делаешь, Коля? — сказал Свиридов. — Ты чего Кафельникову намутил?</p><p class="p1">— Слушай, ты другого времени не нашел?</p><p class="p1">— Не нашел! — рявкнул Свиридов.</p><p class="p1">— Еще поищи. Завтра приезжай, поговорим.</p><p class="p1">— Не завтра! Ты мне сейчас все скажешь!</p><p class="p1">— Я тебе по телефону ничего не скажу, а будешь орать, вообще обидеться могу, — сказал Сазонов ровным голосом. Он мог обидеться, да. Он был в своем праве. — Завтра позвони с утра и подъезжай. А сейчас спать ложись.</p><p class="p1">— Я к тебе с утра приеду, — пообещал Свиридов.</p><p class="p1">— Хорошо, хорошо. Пойду шею помою.</p><p class="p1">И Сазонов отключился. Свиридов хотел швырнуть телефон об асфальт, но подумал, что неприятностей на сегодня хватит. Он знал, что лучшее сейчас — пойти домой: сегодня он, видимо, отрицательно заряжен и может вносить в свою жизнь только разруху. За ночь пройдет. Он пешком, через дворы, пошел на Профсоюзную, распугивая парочки, и долго качался на скрипучих качелях в ночном дворе. Постепенно в него вползало рабское, кроткое умиротворение. Как хорош этот ночной сквер в середине лета, мелкие прыщики городских звезд, черные кроны на темно-синем, черные краны на ближней стройке, гитара в соседнем квартале. Все эти скверы скоро позастраивают к чертям, а как не хочется. Точечную застройку понатыкали уже везде, в каждый метр свободного пространства, и головы у всех так же точечно застроены — живого места не осталось, всюду повбивали свои сваи, куцые, корявые вертикали, и от этого непрерывного вбивания дрожали и шатались все окрестные постройки, кирпичные малоэтажные шестидесятые, блочные семидесятые с подувающими в щели сквозняками из холодного будущего, — тогда строили плохо, криво, но хоть оставляли свободные места вроде этих скверов, где можно было вздохнуть; теперь не оставят. Точечная застройка головы: неважно чем, лишь бы занять место. В «Вечном сиянии страсти» Керри прятал Уинслет, стираемую из памяти, в самых постыдных детских воспоминаниях — именно после «Сияния» Свиридов забросил историю о городе. Город размещался у героя в голове, и там постепенно отключали свет. Начиналось с того, что вдруг разрушили дом возлюбленной: он пришел, а там уже бульдозер роет котлован. Это они поссорились, и он уничтожает следы ее пребывания. С окраин подступает тьма, туда уже страшно соваться. В конце концов он спасается в детском саду — единственном освещенном месте; там еще сохранялось последнее убогое тепло. В конце он просто сидел на крыльце пустого детсада и ждал, кто его заберет: мать, Бог, милиция? Следовало бы ввести туда тему точечной застройки, от которой дрожат все прежние иллюзии, возведенные методом долгостроя на соплях. Если сам я нахожусь у кого-то в голове, этой голове не позавидуешь. Автору все труднее прятать меня и скоро надоест. Эти мысли вызывали уже не злобу, а элегическую грусть. Во двор вышла старуха с палочкой и медленно — поставит одну ножку, подтянет другую, — направилась к Свиридову. Сейчас скажет, чтобы я и отсюда убирался. Скриплю, жить мешаю. На ее месте я ненавидел бы всех, кому не восемьдесят. Нет, мне точно не остается места: все пространство заняли старики и дети, и ни те, ни другие не знают жалости. Но качаться и скрипеть не переставал.</p><p class="p1">— Молодой человек, — жалобно сказала старуха, — помоги бабушке.</p><p class="p1">Свиридов в первый момент не понял, в чем может ей помочь: взобраться на качели?</p><p class="p1">— Чем, бабушка?</p><p class="p1">— А чем можешь, молодой человек, — сказала она дружелюбно. — Никого у меня нету.</p><p class="p1">Свиридов поспешно соскочил с качелей и выгреб из кошелька три сотенные.</p><p class="p1">— Спасибо, — сказала старуха и побрела прочь. Свиридову неловко было запрыгивать обратно на качели. Он пошел к себе, а когда обернулся, старухи в скверике не было. То ли слилась с пейзажем, то ли померещилась. По всей вероятности, добрая фея. Проверила меня на милосердие, и все теперь будет хорошо. Завтра проснусь счастливым, с утра переедет Аля, позвонит Сазонов и скажет, что я вычеркнут из списка. Он заснул легко и проснулся поздно. Был четверг, присутственный день на «Родненьких»: в два Орликов собирал сценаристов и раскидывал темы. Свиридов постоял под холодным душем, созвонился с матерью и пообещал заехать, но тут затренькал мобильный. Свиридов поймал себя на гаденьком чувстве востребованности: он теперь все время ждал звонка, только не признавался себе в этом. Раньше мобильник его бесил, теперь доказывал, что не все его забыли. Отобразился номер Сазонова.</p><p class="p1">— Выйди, я внизу, — сказал он коротко.</p><p class="p1">Свиридов сбежал по лестнице. Фея начинала действовать: сейчас попросит прощения, вернет в проект. Прости, был неправ, перестраховался. Лично заехал, смотри какая честь.</p><p class="p1">Сазонов сидел в своем сером «фокусе», на котором несколько раз подбрасывал Свиридова до дому. Сам он жил на Юго-Западе, в квартале, где снималась «Ирония судьбы». Свиридов решил, что будет вести себя жестко, и руки не протягивал; Сазонов, впрочем, тоже.</p><p class="p1">— Значит слушай, Свиридов, чего я тебе скажу, — произнес Сазонов, глядя прямо перед собой. — Ты не колготись, мой тебе совет, и лишних движений не делай. Попал ты сильно, и надо теперь подумать, как обтекать.</p><p class="p1">Свиридов похолодел. Все поплыло.</p><p class="p1">— Как — попал? — спросил он пересохшими губами.</p><p class="p1">— Это ты должен знать, как попал. — Сазонов разговаривал враз почужевшим, раздраженным голосом, словно Свиридов еще и был перед ним виноват. — Что ты такого натворил — я не знаю, но дело твое швах. Я по своим каналам прокачал — кого-то ты на самом верху задел.</p><p class="p1">— Да чем задел? Я не делал ничего…</p><p class="p1">— Это ты не мне рассказывай. Ты сейчас к себе пойди, покури спокойненько и подумай, чего ты там не так делал. — У Сазонова была такая манера — «покури спокойненько», «покушай плотненько», «поспи крепенько». Свиридов готов был его удавить прямо тут, в «фокусе». — Может, покаешься, поговоришь с кем, скажешь — был неправ.</p><p class="p1">— Да я не знаю, в чем вообще дело!</p><p class="p1">— Ну а кто знает? — спросил Сазонов, поворачиваясь к Свиридову и глядя прямо на него. Он был крепкий, плотный, черноволосый мужик лет пятидесяти, начинавший в восьмидесятые годы с фильмов про благодетельных ментов, воспитателей малолетних преступников, и разговаривал сейчас со Свиридовым, как добрый, но оскорбленный в лучших чувствах следователь отчитывает воренка, вставшего было на путь исправления, но не удержавшегося от копеечной трамвайной кражи. — Кто за тебя будет знать? Ты попал, ты и расхлебывай. Других-то чего путать?</p><p class="p1">— Я тебя не путаю, — не выдержал Свиридов. — Хорошо, я попал, я разберусь. Но стучать-то зачем?</p><p class="p1">— Чего? — тихим грозным голосом переспросил Сазонов.</p><p class="p1">— Я говорю, стучать зачем?! — не купился Свиридов на эту тихую грозность. Он ее хорошо знал, она действовала только на пацанов. — Я тебе сам же рассказал про список, так? На хрена ты пошел докладывать по начальству?</p><p class="p1">— Ты чего, в претензии?! — изумился Сазонов. — Ты претензии мне выкатываешь, Свиридов? Ты мне картину чуть не порушил, и ты мне претензии?!</p><p class="p1">— Где я тебе порушил картину?!</p><p class="p1">— А что у меня будет с картиной, если сядет сценарист? Я не знаю, чего ты натворил, но чем ты думал?! Ты знаешь, что такое «Спецназ», в каких кабинетах его смотрят?! Ты один весь проект сгубить можешь, ты понимаешь, нет? Из-за тебя все может прикрыться, ты двести человек без работы оставляешь, понял? Ты что-то кому-то ляпнул по пьяни, а из-за тебя мои дети голодными будут сидеть? Ты всех подвел под монастырь, это понятно тебе или нет?</p><p class="p1">Свиридов окончательно перестал что-либо понимать.</p><p class="p1">— Под какой монастырь, чего ты выдумал? — попытался он утихомирить эту блатную истерику, но Сазонов заводился надолго — его разносы меньше часу не длились.</p><p class="p1">— Он будет с кем попало пить и трындеть, а мне проект будут закрывать! Ты понимаешь, чей это список? Откуда вообще этот список? Это конторы список, ты понял? И он мне вчера ночью звонит и угрожает! Ты понимаешь, кто ты теперь вообще? Тебя хорошо если полы мыть теперь возьмут! И он мне претензиии, что я пошел и довел! Да я не пошел, я побежал! Я в ту же минуту побежал! Я немедленно, я раньше должен был расчухать! А я всегда знал, Свиридов, что ты с улыбочками своими попадешь. Я всегда видел, как ты работаешь, и я, дурак старый, раньше должен был! Тебе это всегда как халтурка, через губу! Я теперь к тебе приезжаю с риском сказать, чтоб ты не рыпался, и ты мне претензии выкатываешь! Я рискую, может быть, что вообще к тебе приехал, а ты мне претензии свои! Что я пошел! А как бы я не пошел?! У тебя был бы коллектив в двести человек — ты бы не пошел?!</p><p class="p1">— Не пошел бы, — твердо сказал Свиридов. Ему уже было не страшно, а смешно.</p><p class="p1">— Вот я посмотрел бы на тебя! — орал Сазонов. Сзади гудели — он своим «фокусом» перегородил двор, но и не думал трогаться с места.</p><p class="p1">— Машину подвинь, проехать надо, — сказал Свиридов.</p><p class="p1">— А ты не учи! — огрызнулся Сазонов, завелся и перепарковался.</p><p class="p1">Мимо тяжело проехал черный джип. Хвост за Сазоновым, подумал Свиридов и усмехнулся, — явно хвост. Приехал, утешил, теперь тоже в списке.»</p><p class="p1">— В общем, так, — сказал Сазонов, внезапно успокоившись. — Свои дела как хочешь разруливай, но пока чтобы я тебя не видел, не слышал. Близко к «Спецназу» не подпущу.</p><p class="p1">— Да я сам к твоему «Спецназу» близко не подойду.</p><p class="p1">— Вот и правильно, — обиделся Сазонов. — И звонить мне по ночам нечего.</p><p class="p1">— Стучать нечего, тогда и звонить не будут.</p><p class="p1">— Ладно, ладно. Мне пора.</p><p class="p1">— Ну конечно, ты занятой у нас. Езжай, Коля.</p><p class="p1">— Давай, давай.</p><p class="p1">— Только знаешь чего? — сказал Свиридов, уже вылезая из «фокуса». — Как меня начнут на допросы тягать, я им обязательно расскажу, как ты министра обороны называл. У Кафеля на юбилее. Еще Гутин был, слышал. Так что жди.</p><p class="p1">— Сука! — прохрипел Сазонов. — Вон пошел, мразь!</p><p class="p1">— Так и скажу, — ликуя, произнес Свиридов и хлопнул дверцей. Сазонов резко взял с места и понесся со двора.</p><p class="p1">Дома Свиридов уселся на подоконник и стал приходить в себя. Он понимал, что Сазонов обозлился на себя самого, что заботой о коллективе оправдывает собственное свинство, что свиридовская зачумленность возвращает ему чувство благополучия и безопасности, — но уязвляло его не это. Что-то было не так. Дело было даже не в том, что Сазонов оказался такой дрянью, — в конце концов, Свиридов никогда его не любил, — а в том, что он оказался ею так быстро. Он будто готовился, прикидывал этот вариант, избавлялся от Свиридова при первой возможности — а стало быть, давно мечтал его выкинуть. Мир только и ждал, чтоб наброситься, мерзость искала щель, чтобы в нее хлынуть, — и список дал отмашку на все худшее. Теперь надо было изо всех сил делать вид, что ничего не произошло, — и мир мог еще вернуться в прежний вид. С утра Свиридов собирался ехать к матери, вот и надо поехать к матери.</p><p class="subtitle">5</p></span>
