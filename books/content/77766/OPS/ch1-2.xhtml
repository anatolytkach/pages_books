<div class="epigraph">
<p class="p1">Так-то въяве и выглядит все это —</p>
<p class="p1">Язвы, струпья, лохмотья и каменья,</p>
<p class="p1">Знак избранья, особая примета,</p>
<p class="p1">Страшный след твоего прикосновенья.</p>
<p class="p1">Так что лучше тебе меня не трогать,</p>
<p class="p1">Право, лучше тебе меня не трогать.</p>
<p class="text-author">Дмитрий Быков, 1995</p>
</div>
