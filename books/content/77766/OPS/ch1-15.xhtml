<span id="id3"><div class="title1">
<p class="p">ЧАСТЬ ТРЕТЬЯ</p>
<p class="p">СПИСОК БЛАГОДЕЯНИЙ</p>
</div><p class="subtitle">1</p><p class="p1">Переломным моментом в истории списка стало сентябрьское увольнение замминистра финансов Жухова, приглашенного на премьеру лично Ромой, поскольку именно Жухов устроил решающий четырехмиллионный транш, позволивший возобновить съемки. Он был на премьере и входил в список, о чем не знал никто, включая Жухова. Он узнал об этом случайно, от министра, впроброс, посмеялся и забыл, а на следующий день его уволили.</p><p class="p1">Как известно, правитель может столкнуться с реальностью лишь случайно, внезапно испытав на себе ужасы бесправия. После этого опыта он клянется все изменить, едва судьба забросит его обратно во власть, — но, оказавшись там, обещание немедленно забывает, ибо статус человека во власти перевешивает любой опыт, полученный за ее пределами. Человек, который переживает бесправие, и человек, чьим соизволением оно допускается, — две принципиально разные сущности, у них разный опыт, и при восстановлении статуса часть памяти стирается автоматически. Так же обстоит дело с воздыхателями, которых отбросили, простили и приблизили: плавая в счастье прощения, они и помыслить не могут, что предмет их обожании способен на жестокие поступки. Выбирая между памятью и осязаемой реальностью, любой выберет то, что осязаемей, а память сочтет аберрацией; вот почему любой Гарун-аль-Рашид по возвращении на трон первым делом уничтожает следы паломничества в народ.</p><p class="p1">С Жуховым бы, несомненно, так и случилось, — но возвращение во власть затягивалось, на работу не звали; увольнение объяснили предельно корректно — упраздняется все направление, которое он курировал, создается новое Федеральное агентство, там он, безусловно, получит одну из высших должностей… но все это, конечно, не утешало. Министр лично обещал Жухову разведать ситуацию со списком, но через три дня позвонил, сам изумленный, и сказал, что все засекречено, силовой блок, ничего не можем. Министр теперь разговаривал с Жуховым бегло и неприязненно, словно боясь заразиться, — и Жухов, понимавший, что к этому идет давно, вынужден был осознать вставший перед ним выбор. Либо он тихо ждет ареста, которого уже дождался один его коллега, — либо предпринимает нечто, этот арест осложняющее. Особого компромата на коллег он не знал, журналистам не верил и силу разоблачений оценивал трезво. Сегодня можно было что угодно написать про первых лиц — и это способствовало им только к украшенью, но даже отличная характеристика и пожизненная репутация отличника не спасли бы споткнувшегося. Путь у него был один — в оппозицию; статусные люди были там теперь в дефиците. Он быстро набрал бы авторитет и даже, чем черт не шутит, основал партию. Дальше можно было всем этим распоряжаться по усмотрению: либо он мог явиться в администрацию и сказать — вот партия, пользуйтесь и владейте (как сделал, по слухам, создатель известного оппозиционного канала), а мог бы, смотря по обстоятельствам, сыграть ва-банк, и хотя это ничего бы не изменило в раскладе, но на время подарило бы неприкосновенность. Жухов понял, что действовать надо быстро; в Минфине это умели. Через два дня он уже все знал про <a class="a">spisokl80.narod.ru</a>, а на третий звонил Бодровой по контактному телефону.</p><p class="p1">Он предложил собраться у него на даче — не рублевской, а на даче жены, в пятидесяти километрах от Москвы по Нуворишке, как давно уже звали Новорижское, — но Бодрова гордо заметила, что список давно перевалил за сто пятьдесят человек и желающих не вместит никакая дача, а потому будет лучше, если он скромно, не особенно себя афишируя, присоединится к очередному их походу. Бодрова вошла во вкус, бесконечно организуя походы. Можно сказать, это стало ее главной жизнью, куда более интересной, чем жизнь бухгалтера на фабрике «Большевик». Вдобавок Бодрову из «Большевика» выживали — недавно перекупивший их концерн «Крафт Фудз» все назойливей заговаривал о переводе всего производства под Владимир, и менеджмента, чтобы не отрываться, туда же; а кто из москвичей не захочет под Владимир — так под Владимиром полно желающих на любые вакансии. Все это было, конечно, связано со списком: не будь она в списке, никто б не тронул пожилую заслуженную работницу с долгим опытом обхода законодательства, но вот ей так ужасно не повезло, и она, привыкнув из всего извлекать выгоду, решила стать лидером хоть тут. У нее получилось. Теперь она командовала уже и замминистром.</p><p class="p1">Десятого сентября собралось не меньше сотни списантов — Бодрова анонсировала на сайте интересного гостя. Предполагалось пройти от платформы Снегири до Лужков. Желтеющий лес сбегал с высокой насыпи, тропа петляла, пни пахли уксусом. Первый привал сделали через два часа после старта, когда список растянулся на добрый километр. На огромной поляне развели костер (Свиридов наловчился это делать отлично). Выложили бутерброды и термосы, Свиридов извлек упаковку копченой грудинки, нашедшуюся в мешке Тэссы (накануне отослал ей колонку с изложением Роминой версии — честно отрабатывал мешок).</p><p class="p1">— Дорогие друзья! — зычным культмассовым голосом обратилась Бодрова к списку. — Наши ряды пополнил уважаемый Жухов Виктор Борисович, в недавнем прошлом заместитель министра финансов России!</p><p class="p1">Жухов Виктор Борисович, незаметно и одиноко шедший в хвосте со свежесломанной и нервно оструганной палочкой, встал и поклонился. Это был рослый мужчина с залысинами, внешностью классический благородный отец, велеречивый и трусоватый.</p><p class="p1">— Теперь Виктор Борисович пополнил, так сказать, наши ряды, — повторила Бодрова. Ей нравилось это выражение. — И так как он их, так сказать, пополнил, то мы горячо его приветствуем и охотно, конечно, принимаем его в наши ряды.</p><p class="p1">Она часто захлопала, списанты вяло поддержали.</p><p class="p1">— А теперь, дорогие друзья, Жухов Виктор Борисович, я думаю, скажет нам несколько слов, какие он сам найдет, — несколько смешавшись, закончила Бодрова и села к костру.</p><p class="p1">— Гм, дорогие друзья, — начал Жухов, покашливая. — Я вообще-то мог бы назвать нас товарищами по несчастью, но думаю, что никакого несчастья нет.</p><p class="p1">Он неуверенно улыбнулся и обвел списантов преданным взглядом.</p><p class="p1">— Я думаю, что позорная практика составления списков, в которые попадают все не только оппозиционные, но даже и просто думающие люди, продлится недолго и является следствием испуга. Мне кажется, что сейчас нет оснований никого подозревать или включать, и, так сказать, предъявлять. Мне кажется, мы все едины в том, что страна движется верным курсом, в единственно правильном направлении, что сегодня, так сказать, благодаря ли конъюнктуре, благодаря ли, так сказать, дальновидности, но лично мне впервые за нее не стыдно и не обидно. — На словах «не стыдно» голос его вдруг окреп, он выпростался из долгого неуверенного периода, словно из жидкой грязи вдруг высунулся кулак, отчетливо погрозил и растворился снова.</p><p class="p1">— Слава России! — хором заорали Гусев, Бобров и Панкратов, лежавшие под старой сосной. Панкратов был бледен после больницы, и глазки его воровато бегали. Интересно, что с ним там делали? Хорошо бы клизму… Заорав, все трое тотчас вскочили и взметнули к плечам кулаки, типа рот фронт.</p><p class="p1">— Слава России, — не очень уверенно повторил Жухов.</p><p class="p1">— А остальные что лежат? — рявкнул Гусев. — Никто не слышит, что ли?! Слава России!</p><p class="p1">Никто, однако, не пошевелился. Свиридов очень этому обрадовался. Список явно осознал свое отчаянное положение и обрел на этом временную храбрость — вопрос, насколько ее хватит, но прогресс несомненен.</p><p class="p1">Гусев чувствовал, что надо спасать положение. Выручил его Бобров.</p><p class="p1">— Шутка, — крикнул он. — Гыгы бугага. Разрешаю расслабиться.</p><p class="p1">Они уселись под сосну.</p><p class="p1">— Продолжайте, пожалуйста, — вежливо сказал Клементьев.</p><p class="p1">Жухов продолжил. Это была типичная аппаратная речь, путаная и осторожная, пробирающаяся между захлебывающей лояльностью и осторожным несогласием: борьба прекрасного с отличным, злые бояре, идеологические перестраховки, поиски врага, уверения в преданности. Все в этой речи свидетельствовало о твердом убеждении, что каждый второй списант немедленно передаст послание по инстанции, и от Жухова зависело сформулировать послание к власти аккуратно, но убедительно. Я горячо разделяю уверенность, признаю заслуги и поддерживаю все пункты плана. Я четко осознаю, что конфликты ведомств не могут быть выгодны никому, и призываю всех погасить амбиции. Но поскольку есть отдельные охотники на ведьм, способные видеть то, чего нет, то особенно и отдельно подчеркиваю, что не должно быть ни малейшего, никакой, что мы не можем позволять себе считать врагами всех, у кого просто бурлит мысль. И он готов всем опытом, всем влиянием помочь тем, кто оказался вытеснен в несогласные — хотя горячо и искренне готов согласиться и соглашается, и будет соглашаться, если будет сейчас услышан и понят.</p><p class="p1">— Жухов! — крикнул Бобров из-под сосны. — Зачем вы лжете?</p><p class="p1">— Что вы сказали? — У Жухова был один выход — сделать вид, что недослышал.</p><p class="p1">— Чо, чо! В очо! — крикнул Панкратов.</p><p class="p1">— Зачем вы тут хвостом вертите, Жухов? — нагло орал Гусев. — Вы думаете, мы не знаем ничего?! Такие, как вы, в девяностые годы пенсионеров голодом морили и пенсии прокручивали в «Бэнк оф Нью-Йорк»!</p><p class="p1">— Кто вас послал, молодые люди? — с достоинством спросил Жухов. Он был старый боец и умел переводить стрелки.</p><p class="p1">— Это мы тебя сейчас пошлем, мразь! — крикнул Бобров, не трогаясь, однако, с места. — Девяностые годы кончились, Жухов! Иди на площадь Трех вокзалов, встань на колени перед народом, кто-нибудь, может быть, и подаст!</p><p class="p1">— А мы хотим жить в достойной стране! — заорал Панкратов и дал петуха.</p><p class="p1">— Иди лесом, Жухов! Проповедуй птицам! — крикнул Гусев.</p><p class="p1">— Бугага! — грянула вся троица и заулюлюкала.</p><p class="p1">Списанты молчали. Гусев понял, что придется заходить на второй круг.</p><p class="p1">— Долой позорные девяностые!</p><p class="p1">— Долой гламурного людоеда!</p><p class="p1">— Жухов, твоего сына видели в гей-клубе!</p><p class="p1">Это взорвало Жухова. Он решительно шагнул к троице, но на пути у него оказался Клементьев. Он встал и решительно остановил опального зама.</p><p class="p1">— Подождите, Виктор Борисович. Мы разберемся.</p><p class="p1">Он повернулся к троице:</p><p class="p1">— Проваливайте, ребята.</p><p class="p1">— Сам проваливай, старпер! — крикнул Бобров, вскакивая.</p><p class="p1">— Как ты сказал? — очень спокойно переспросил Клементьев.</p><p class="p1">— Эй, эй, — вступил Свиридов. Он улавливал настроения списка и чувствовал, что троицу подонков сейчас погонят ссаными тряпками. — Защитники пенсионеров, полегче.</p><p class="p1">Бобров понял, что не попал в таргет-аудиторию, и несколько смешался.</p><p class="p1">— Гламурный фашист Свиридов! — крикнул Гусев. — Ты травишь пенсионеров собаками!</p><p class="p1">— Э! — крикнул невысокий широкоплечий кавказец, которого Свиридов прежде не видел. — Ты базар фильтруй, понял? Тут фашистов нет, все равные!</p><p class="p1">— Товарищи, товарищи, — хлопотала Бодрова.</p><p class="p1">— Да они выпили, — крикнул женский голос. — Нажрались и скандалят.</p><p class="p1">— Пошли отсюда! — крикнул из-под старой березы подросток; совершенный ребенок, он-то как сюда попал…</p><p class="p1">— Дайте человеку говорить!</p><p class="p1">— Хамить дома будете!</p><p class="p1">Этого троица не ожидала. Они не учли простейшего обстоятельства: запуганный, фрустрированный список немедленно ощутил себя более весомым и защищенным, едва к нему присоединился опальный заместитель министра. Это всех списантов делало если не замами, то по крайней мере референтами. Взывать к гражданской совести, пугать бугагаканьем и апеллировать к опыту проклятых девяностых тут было бесполезно.</p><p class="p1">— Еще встретимся, — сплюнул Гусев и покинул собрание. Панкратов и Бобров последовали за ним.</p><p class="p1">Акции Жухова значительно поднялись. Все плотнее стянулись к костру и чувствовали теплое единство, как всегда бывает при изгнании меньшинства.</p><p class="p1">— Главное, все ложь! — напирал Жухов. — Все ложь, товарищи! Я был депутатом Госдумы и голосовал против ельцинских пенсий, специально требовал слова, есть протоколы, товарищи! И о дефолте я предупреждал еще Виктор Степаныча, это есть в его книге, можно было избежать…</p><p class="p1">До Лужков шли весело, возвращались в сумерках уютной электричкой. Лес за окном темнел, небо густо лиловело, за стеклом почти ничего уже не было видно — проявлялись только отражения. Так и с годами: все меньше видишь мир, все больше — себя, темнеет потому что. Свиридов уселся на одну лавку с Клементьевым, кротким юношей Сальниковым и автослесарем Абрамовым. Жухов демократично ехал той же электричкой, курил в тамбуре с кавказцем, объяснял ему несовершенства миграционного законодательства.</p><p class="p1">— Как хотите, — сказал Свиридов, — но я не верю ни одному слову этого челдобречка.</p><p class="p1">— Точно! — неожиданно горячо поддержал его Абрамов. — На нас в рай въехать хочет.</p><p class="p1">— Если его еще не послали нарочно, — вступил Сальников.</p><p class="p1">— Да нет, какое, я вижу — он струсил, — рубил правду Абрамов. — Глаза туда-сюда, туда-сюда, щеки трясутся. Струсил. Но чего он хочет, какую он оппозицию развел? Вот тебе лично, — он ткнул пальцем в Сальникова как наиболее покладистого. — Тебе лично чем стало хуже? Чего ты не можешь сейчас, что мог при Ельцине?</p><p class="p1">— Я при Ельцине вообще мало что мог, — виновато улыбнулся Сальников, — мне было двенадцать лет…</p><p class="p1">— Ну хорошо, родители твои что не могут?</p><p class="p1">— Всё могут, — испуганно сказал Сальников, желая защитить родителей.</p><p class="p1">— Ну, я много чего не могу, — возразил Свиридов. — Мы уже спорили про это, Гриш…</p><p class="p1">— Нет, ты послушай! Чего тебе не живется, какая диктатура? Ты ее видел, диктатуру? За границу хочешь — езжай! Сына хочешь в лицей — давай! Кричать «ура» тебя никто не заставляет! Чего вам все не живется, я не знаю? Где свербит?</p><p class="p1">Он явно под кого-то работал — скорее всего под Гармаша в «Двенадцати», самом позорном кинопровале в долгой зрительской практике Свиридова. Сейчас он заговорит о детях, о том, что детям хорошо, а это главное, и любой, кто недоволен, — личный враг его детей. Но вагон настороженно молчал, и Лачинская, сидевшая сзади, попросила Абрамова говорить потише, и он сунул руки в карманы, а на лоб надвинул кепку.</p><p class="p1">— Эх, сейчас приеду домой, — сказал он мечтательно, — наверну борща! Борща, с говядинкой. Светка замечательно варит. Со сметанкой наверну, еще сальца возьму, на черный хлебушек положу и сверху горчичкой. Ах, хорошо! Анисовой ледяной рюмочку — ап! И борща!</p><p class="p1">В голосе его зазвенела такая злоба, что Свиридов не позавидовал борщу.</p><p class="p1">— А футбол потом посмотришь? — спросил Волошин из правого ряда, где играл в магнитные шахматы с кротким дедком.</p><p class="p1">— И футбол посмотрю! — отозвался Абрамов.</p><p class="p1">— А дрыхнуть завалишься?</p><p class="p1">— Ой, завалюсь! Суббота!</p><p class="p1">— А храпеть будешь? Чтоб ядрено?</p><p class="p1">— Ой, буду! — с ненавистью крикнул Абрамов.</p><p class="p1">— Хорошо тебе, Гриша, — сказал Волошин.</p><p class="p1">— А тебе чем плохо, Андрюша?</p><p class="p1">— Да и мне хорошо, Гриша! Приеду домой, покушаю, покакаю, покушаю, покакаю! Хорошо работает организм, никогда так не работал! Газов пущу много, полно у меня газов, прямо Газпром в животе!</p><p class="p1">Неожиданно Абрамов расхохотался.</p><p class="p1">— Затейник ты, Андрюша!</p><p class="p1">— Да не говори, — отозвался Волошин.</p><p class="p1">Дальше ехали молча, подремывая.</p><p class="p1">Поздним вечером Свиридову позвонила Тэсса. Он уже засыпал и вскочил с бьющимся сердцем, опасаясь ужасного — ничего другого давно не ждал; что-то дрожало в спине, в шее, перед глазами все кружилось, пересохло во рту.</p><p class="p1">— Сережа, — сказала она с ласковыми, но железными интонациями, — твоя последняя колонка — не то. Я не буду это отсылать.</p><p class="p1">— Почему? — спросил Свиридов. Он был настроен на обломы, но не здесь. Здесь-то все должно быть железно.</p><p class="p1">— Это неправда, Сережа. Ты сам знаешь, что неправда.</p><p class="p1">В последней колонке Свиридов рассказывал — с небольшими поправками, усмешками и упрощениями, — версию Ромы Гаранина.</p><p class="p1">— Напротив, я всех опросил, до кого дотянулся. Тэсса, все они посмотрели «Команду» как минимум в первую неделю.</p><p class="p1">— Это не может быть критерий, Сережа. И прости, но эта колонка написана хуже первых. Я не могу оплатить. И я не буду участвовать распространение версия Гаранин.</p><p class="p1">Она сердилась, нервничала и начинала игнорировать падежи. Еще чего, падежи. Гастарбайтер не хочет арбайтен, позволяйт себе игнорирен требованья, не хочет, чтобы его махт фрай. Свиридов послал бы ее от всей души, но не мог себе позволить отказываться от работодателя.</p><p class="p1">— Хорошо, — сказал он. — Я перепишу.</p><p class="p1">Свободная пресса, что вы хотите.</p><p class="p1">— Я хочу, чтобы ты понял, Сережа, — повторяла Тэсса, не в силах ограничиться его простым согласием. Ей надо было, чтобы он проникся. — Пойми, ты сценарист, я объясню тебе в твоих словах, чтобы быть понятной. На вас всех есть сценарий, эта ложь — часть сценарий, я не понимаю, как ты не видишь логик…</p><p class="p1">— Я вижу, Тэсса, — попытался объяснить он. — Но по-моему, при этой версии гораздо наглядней, как здесь устроено…</p><p class="p1">— Я знаю, как здесь наглядней! — сказала она очень убедительно. — Ты не можешь видеть из списка, но я могу. Я жду колонка завтра не позднее полдень.</p><p class="p1">— Вас устроит, если это будет о Жухове?</p><p class="p1">— О да, — радостно сказала Тэсса. — Ты видел его? Как он? По-моему, это настоящий, как это, мужик.</p><p class="p1">— Иа, натюрлихь, — сказал Свиридов. — Сукин сын камаринский мужик без штанов по улице бежит, знаете, как это говорится?</p><p class="p1">Но колонку написал, не отказав себе в удовольствии составить последнюю фразу по принципу акростиха: «Жара уходит. Хороша осень, весело и дружно, изнуренные, опадают тополя».</p><p class="p1">Сделал гадость — сердцу радость.</p><p class="subtitle">2</p><p class="p1">Сценарий начал осуществляться быстрей, чем Свиридов успел его додумать. Страшно сказать, все, происходившее теперь, начинало напоминать сценарий, самый примитивный, хуже сериального, — как будто все насмотрелись дурного фильма о тридцатых и теперь, в новых декорациях, неподходящими силами разыгрывали древний сюжет. Лица у артистов были неподходящие, таким «Дом-3» вести, а не допрашивать, да и допрашиваемые были гламурны, пустотны, мало пригодны для страданий — нет той начинки, нечем мучиться; но играли, потому что другого не умели. Двадцатого сентября Жухов представился списку и предложил план действий, а через пять дней Свиридову на мобильник позвонил следователь. Номер не определился, и это не предвещало ничего хорошего.</p><p class="p1">— Сергей Владимирович? — сказал приветливый товарищеский голос, и Свиридов сразу понял, кто говорит. Надо было, конечно, завязать с придумыванием этого сценария, потому что реальность слишком послушно следовала за его лобовыми ходами.</p><p class="p1">— Да.</p><p class="p1">— Это двенадцатое управление ФСБ, старший следователь Калюжный.</p><p class="p1">Двенадцатое, отметил Свиридов, чувствуя, что опять проваливается в болото. И поликлиника была — двенадцатого.</p><p class="p1">— Слушаю вас.</p><p class="p1">— Нам давно бы надо познакомиться, не находите?</p><p class="p1">— Не нахожу, — нагло сказал Свиридов. Страх в первый момент выражался у него так — он наглел.</p><p class="p1">— Ну а я нахожу, — беззлобно сказал Калюжный. Судя по голосу, ему было лет тридцать пять, максимум сорок. — Будете настаивать на официальной повестке или так договоримся?</p><p class="p1">— Повестку хорошо бы, — Свиридов хорошо помнил, что с ФСБ надо все делать официально, это их сковывает. Назначат встречу на улице и кокнут в подворотне, в семидесятые бывало.</p><p class="p1">— Ну чего бюрократизм-то разводить, Сергей Владимирович? Я ведь могу ее прямо на «Родненьких» прислать. Как вы думаете, останетесь вы там после этого работать или нет?</p><p class="p1">— А что, собственно… — Свиридов даже задохнулся от злости. — Что вы имеете против работы на «Родненьких»? Я что-нибудь противозаконное там делаю?</p><p class="p1">— Ничего противозаконного, Сергей Владимирович. Просто мы хотим побыстрей увидеться, а вы не хотите нам помочь. А вам, по-моему, в вашем положении совсем не нужно так разговаривать с доброжелательным, между прочим, человеком.</p><p class="p1">Калюжный говорил устало, словно только что с трудом разоблачил парочку упорно запиравшихся шпионов из Британского совета: они совсем уж закосили под тамбовцев, однако их выдало частое употребление артикля the, — но не забывал вовремя переходить на «мы». Я хочу увидеться, но это нужно нам, таинственным и многочисленным, могущим многое.</p><p class="p1">— А какое у меня положение? — севшим голосом спросил Свиридов.</p><p class="p1">— А вот про это мы и хотим поговорить, — радостно сказал Калюжный.</p><p class="p1">Ага, понял Свиридов. Раскрывают карты, дожили. Странным образом это его успокоило.</p><p class="p1">— Когда зайти? — спросил он.</p><p class="p1">— Да я сам подъеду, — ласково предложил Калюжный. — Вы в Останкине завтра будете? Вот и хорошо, у метро «Алексеевская» есть кафе «Му-му», там в пятнадцать я вас наберу и подойду.</p><p class="p1">Интересно, подумал Свиридов, почему он не зовет меня на Лубянку? Может, не хочет лишний раз пугать? Может, мы тайные агенты, о которых не должны знать далее его лубянские коллеги? И он начал выдумывать продолжение, но насчет мотивов Калюжного обижался, конечно, — уязвленные люди всегда надеются, а надеяться не надо. Надежда, робкая надежда загнанных — вещество, которое мы выделяем и которым они питаются; ввергнуть нас в жопу и кинуть намек на спасение, а у нас уже и надежды полная пазуха. Пазуху вытрясти, надежду сожрать, нас выбросить. Свиридов уже готов был думать, что это он тайный агент, раз ему назначают встречу в людном «Му-му», где наверняка не возьмут, — а остальные мразь, шваль, лагерная пыль. Наверное, не надо им говорить, что мне так повезло, что меня вызывает сам следователь Калюжный. Но внутрисписочная солидарность была еще превыше всего, надо же нам чем-то отвечать на их вызовы! Да и главное — в списке он был сейчас, это реальность, а тайный агент — еще под вопросом, завтра выяснится.</p><p class="p1">— Андрей, — сказал он (звонил, разумеется, по домашнему — мобильный теперь уж точно прослушивается). — Надо поговорить.</p><p class="p1">Это был пароль — ясно, что, раз дело не телефонное, Волошин выкроит час. Если бы он сам не состоял в списке, у него вряд ли нашлось бы время заниматься этой темой, но сейчас все касалось его самого. Они встретились во внутреннем дворике огромного сталинского дома, на третьем этаже которого размещалась редакция «Киноглаза».</p><p class="p1">— Мне из ФСБ звонили, — без предисловий ляпнул Свиридов.</p><p class="p1">— Нормально, — пожал плечами Волошин.</p><p class="p1">— Вам еще нет?</p><p class="p1">— Мне — нет. — В ответе Волошина угадывалось гнусное самодовольство той же природы: мне, может, еще повезло, я не все. Свиридов представил, как список будет теперь созваниваться: вас вызывали? нет? а меня уже… У вас нога отгнила? А икаете?</p><p class="p1">— И что вы посоветуете?</p><p class="p1">— Значит, прежде всего: ничего не подписывайте. Они будут обязательно требовать, чтобы вы подписали что угодно: неразглашение, финансовую ведомость, черта, дьявола, — помните, что подтверждать ничего нельзя.</p><p class="p1">— А протокол?</p><p class="p1">— Никаких протоколов, только собственноручные показания. И без адвоката они не имеют права вас официально допрашивать. Правда, у них есть сейчас такой финт — называется «разъяснительная беседа», при этом адвокат не положен. Он, естественно, будет предлагать вам сотрудничество, это всегда так делается, а теперь они обнаглели окончательно. Соглашайтесь, ничего страшного, каждый законопослушный гражданин обязан доносить о фактах террора там или о намерениях, нормально. Но опять-таки чтобы это нигде не было зафиксировано: то, что он запишет на магнитофон или скрытую камеру, в суде доказательством не является.</p><p class="p1">— Почему?</p><p class="p1">— Добыто с нарушением закона. Нужна санкция.</p><p class="p1">Про санкцию Свиридов не понял и вообще не очень представлял, кого им стесняться: захотят — допросят, положив на любые формальности. Он заранее признавал за ними все права, а жалкое сопротивление только подчеркнет их прекрасную невозмутимость. О чем спорить с неживой природой?</p><p class="p1">— Главное — постарайтесь вытянуть из них как можно больше. В Израиле знаете как допрашивают в аэропорту? Вразброс, по десять раз, повторяют одни и те же вопросы, вдруг проколетесь. Я однажды сыну из Тель-Авива вез прекрасный пистолет: представляете, нашел время и место! Меня трясли полчаса, а вся группа ждала. Так что спрашивайте об одном и том же — он начнет раздражаться и в чем-нибудь да проговорится.</p><p class="p1">— Попробую, — сказал Свиридов. Он начал понимать, зачем Волошину все эти приемчики, знание законов и ссылка на права: даже мышь, играя в кошки-мышки, может ощутить себя равным партнером. — Надо нам придумать что-нибудь кодовое для телефона, а то я к вам не набегаюсь.</p><p class="p1">— Ну давайте, исходя из этой вашей метафоры с проказой, — предложил Волошин. — Если мне завтра позвонят, я вам свистну и скажу, что появились симптомы.</p><p class="p1">— И последнее. — Говорить об этом Свиридов не хотел, но предосторожности лишними не бывали, особенно в «их положении», определить которое он бы затруднился. — Если я в шесть не перезвоню, значит, меня это. — Он из суеверия не хотел говорить «взяли». — Вы тогда матери отзвоните, что ли, и вообще шумите, о'кей?</p><p class="p1">Волошин со значением кивнул и внес в коммуникатор телефон матери.</p><p class="p1">Домой Свиридову не хотелось. Общение со списантами стало уже потребностью, в которой он себе пока не признавался — стыдно, и что-то окончательное, капитулянтское было бы в таком признании. Раб болезни, фи, тьфу. Но падать духом накануне решающего, может, разговора с той самой инстанцией, которая так причудливо им распорядилась, было уж вовсе недальновидно, и он, перебрав варианты, остановился на Борисове. Адвокат, хоть бы и цивилист, был теперь кстати.</p><p class="p1">К удивлению Свиридова, Борисов откликнулся мгновенно.</p><p class="p1">— А давайте, — легко согласился он. — Вы где?</p><p class="p1">— Я недалеко от «Маяка».</p><p class="p1">— Ну тогда в рюмочной напротив. Я «Маяка» не люблю, пафос. А в рюмочной меня знают.</p><p class="p1">Непонятно было, зачем Борисову нужно знакомство в рюмочной: место самое плебейское, точка встречи подгулявшей богемы и местных алкашей, позволяющая алкашам чувствовать себя немного богемой, а богеме приобщаться к народу; Свиридов не любил таких смешений, ценя чистоту жанра, но Борисову как адвокату положено уважать показуху — вот он и стремился в это заведение с сомнамбулическими завсегдатаями по углам и бюстом Чайковского на полке с водками. Не то чтобы Чайковский любил водку — он, как мы знаем, любил другое, — но напротив была Консерватория, и томные девы со скрипками не брезговали рюмкой-другой в обществе сальноволосых спутников.</p><p class="p1">Борисов появился через двадцать минут.</p><p class="p1">— На Малой Бронной живу, — пояснил он скромно.</p><p class="p1">— Неплохо живете.</p><p class="p1">— Да, не жалуюсь.</p><p class="p1">Он взял два лобио, цыпленка в сметане, водку и пиво. Свиридов был сыт после «Маяка» и ограничился чаем.</p><p class="p1">— А что ж не пьете?</p><p class="p1">— Да я это… в каком настроении пьешь — то и активизируется. А у меня плохое.</p><p class="p1">— Случилось что?</p><p class="p1">Свиридов коротко рассказал про звонок Калюжного.</p><p class="p1">— Как и следовало ожидать, — бодро сказал Борисов. — Ваше здоровье.</p><p class="p1">— Да, может понадобиться.</p><p class="p1">— Не думаю. — Борисов потер ручки и приступил к лобио. — Ничего страшного, не парьтесь, как говорится.</p><p class="p1">— Я не парюсь. Я не очень представляю, как себя вести.</p><p class="p1">— Как можно меньше говорите, вот и все. Отвечайте строго на вопрос. Ничего лишнего. Каждое лишнее слово дает им зацепку, они могут из этого целое дело сплести. Но плести дела против вас — это в их замыслы пока не входит, так что ничего страшного.</p><p class="p1">— А вы откуда знаете про их замыслы?</p><p class="p1">— Ну, — Борисов поднял на него глаза и перестал есть. — Я же не вчера родился. Некоторый опыт. Знание истории.</p><p class="p1">— А в истории было?</p><p class="p1">— Сколько раз. Но все же совершенствуется, понимаете? Мы имеем дело со скромной новой технологией, и только. Нам надо некоторое количество законопослушных граждан, но осложнений с Западом нам не надо, не надо скандала, арестов, шума… Мы ж не звери, так? Нам достаточно всех поместить в списки, и люди не будут рыпаться. Самый страшный страх — «Меня посчитали», помните мультик?</p><p class="p1">— Помню. Я еще помню, когда присваивали ИНН. Говорили — антихристова печать.</p><p class="p1">— Вот, вы и сами все понимаете. Ваше здоровье. — Борисов вкусно крякнул.</p><p class="p1">— Но тогда это ужас, — Свиридов привычно выстраивал сюжет, и он уже послушно ветвился. — Антихрист всегда начинает с того, что составляет списки. Надо взять общий перечень, разбить его, всех вписать в разные перечни и развести навеки, только раньше хоть по убеждениям, а теперь…</p><p class="p1">— Ну и слава богу! — воскликнул Борисов. — По убеждениям гораздо хуже. С циниками можно договориться.</p><p class="p1">— Не думаю. По-моему, договориться можно с теми, у кого убеждения. А циник даже спорить не будет. Если ты ему пока не мешаешь, он тебя, может, не тронет. А будешь мешать — раздавит без дискуссий, и все.</p><p class="p1">— Никого они не будут давить. Им это не нужно. Я же говорю — новая технология. Не надо никого сажать, давить, прессовать… Достаточно внести в список. Вы помните этот скандал с этим, ну как его, еврейская фамилия…</p><p class="p1">— Помню, — сказал Свиридов. — Нагибать и мучить.</p><p class="p1">— Вот, точно. Это, кстати, пример словесного мастерства: фамилию все забыли, а нагибать и мучить — осталось. Так вот, не надо больше ни нагибать, ни мучить. Внесли в список — и все, и сам ходишь тихонький.</p><p class="p1">— Но тогда я не понимаю. — Свиридова раздражало, что Борисов непрерывно жрет: речь шла, в конце концов, о серьезных вещах, нельзя же под цыпленка. — Почему нас всего двести, или сколько там, сто восемьдесят?</p><p class="p1">— Ну а шахтинцев сколько было? Вы слыхали про Шахтинское дело?</p><p class="p1">— Что-то слыхал.</p><p class="p1">— Ну а я не что-то, нас учили. — (Ах ты самодовольная харя.) — И Промпартии было всего человек тридцать, и шахтинцев человек двадцать. Сначала всегда полигон, малые группы, а потом уж распространяется на всех… Надо пример подать. Погодите, очень скоро сами начнут составлять списки друг на друга. В тридцать седьмом ведь сажали сами? И в сорок девятом? Всё своими руками. Вот они подали пример, а дальше — увидите. Уже сейчас — все эти «Одноклассники», «Однокурсники», «Сокамерники»… Что такое, по-вашему? Структурирование общества в отсутствии структуры, и многие, кстати, всерьез полагают, что за этим стоит та же контора. Всех на карандаш.</p><p class="p1">— Да, я слышал.</p><p class="p1">— И наш список вполне в этом русле.</p><p class="p1">— Ну, что в наш кто-то запишется добровольно — я не очень верю, — сказал Свиридов.</p><p class="p1">— Серьезно? — Борисов хлопнул еще рюмку и подмигнул. — На ловца и зверь. С самого начала хотел вас предупредить, что в список я затесался сугубо добровольно.</p><p class="p1">Свиридова в последнее время трудно было удивить, но тут он опешил.</p><p class="p1">— Как это можно?</p><p class="p1">— Очень просто. Вписался к вам сам.</p><p class="p1">— С какой стати? Доносить о настроениях? То есть простите, но естественно предположить…</p><p class="p1">— Ничего, ничего. Я уже привык, что всем вашим мерещится. Нет, конечно. У них наверняка есть кому доносить, да и не в этом суть. Мне просто кажется, что чем сидеть и дожидаться, пока тебя впишут, — лучше сыграть на опережение и вписать себя самому.</p><p class="p1">— Странная позиция.</p><p class="p1">— Ну, в наше время только странные позиции и срабатывают. Вас, конечно, учили, что маховик репрессий — штука непредсказуемая, что тут правильной стратегии нет… Это абсолютная глупость, к сожалению. Абсолютная. Выдумка специально для тех, кто перестанет барахтаться. — Борисов разрезал цыпленка, вывалял куски в соусе, смешал все в тарелке — картошку, салат, белое мясо, — и аппетитно зажевал, не переставая изъясняться. — На самом деле мышление наше грешит индуктивностью, непростительной мелочностью. Мы пытаемся судить о доме по кирпичам, а надо по чертежу; привыкли, что ни один замысел не реализуется, и рассматриваем мир, как будто он вовсе без замысла. А замысел несомненно есть, только в России все всегда с небольшим сдвигом, как бы по диагонали. Если вычислить градус этого сдвига, можно угадать.</p><p class="p1">— Вы вычислили? — ехидно спросил Свиридов.</p><p class="p1">— Ну почти.</p><p class="p1">— Но о других списках пока ничего неизвестно.</p><p class="p1">— Это пока. Кому-то неизвестно о нашем, и потом — поймите, список ведь и предполагает сосредоточение на своем ближнем круге. Остальные становятся просто неинтересны. Всем только и дела, что до своего окружения и ближайшего будущего.</p><p class="p1">— Ха, — сказал Свиридов. — Это уже не так глупо.</p><p class="p1">— А я и говорю, что они не дураки. Возникает несколько социальных страт, принципиально новая система общественного управления в бесклассовом, — скажем так, обществе. Списками вообще очень просто рулить: надо только всех разбить не по профессиональному, не по возрастному, не по имущественному признаку, вообще ни по какому. Профессия больше роли не играет, выродилась, все делают более или менее одно и то же. Имущественно — народился нейтральный класс, который никогда не перерастет своего уровня: то же, что при совке. Пол — бюджетники, потолок — топ-менеджеры, но в целом более или менее монолитно. Потребители, условно говоря. Возраст — тоже нет большой разницы, есть старики, дети и все остальные. Вы вот в списке сильно чувствуете возрастную разницу?</p><p class="p1">— Нет, — признался Свиридов.</p><p class="p1">— Ну и нормально. Значит, признака, по которому разбивать, уже нет — все нерелевантно. Ну, можно там — по национальному, но мы же против фашизма, и потом, кто тут нерусский? Гастарбайтеры разве что, а все остальное получается антисемитизм. Мы это пока не можем, держим в резерве. В результате мы бьем общество на страты безо всякого признака, и ничего больше не делаем, и все ведут себя, как зайчики. А некоторые особо умные, вроде меня, вписываются сами, чтобы не осложнять жизнь составителям.</p><p class="p1">— Я только не понимаю, в чем ваша выгода.</p><p class="p1">— Ну во-первых, я уже при деле. Ничего не жду, все уже случилось. А во-вторых, знаете, опыт показывает, — Борисов снова подмигнул, — что лучше попасть в тот список, который составляют они сами. Потому что когда процесс пойдет снизу — сами знаете, дворовые активисты, ЖЭКи, соседи, которым нравится ваша квартира и не нравится ваше поведение, — будет уже не так приятно. У власти имущественных претензий нет, у нее и так все в руках. А у соседей они могут быть, не находите? Так что если уж выбирать себе крышу — в России всегда лучше ходить не под рэкетиром, а под государством.</p><p class="p1">Странным образом Борисов достиг цели — если действительно имел в виду успокоить Свиридова. Свиридов не то чтобы успокоился, но вызов к следователю Калюжному показался ему значительно меньшим злом, чем собеседование с Вечной Любой. Государство ужасно, нет слов, но другой защиты от народа не бывает.</p><p class="p1">— «Ужасно государство, однако лишь оно мне от тебя поможет. Да-да, оно нужно», — словно прочитав его мысли, процитировал Борисов.</p><p class="p1">— Это кто?</p><p class="p1">— Не догадаетесь. Это Лимонов, ранний, года семьдесят третьего. «Противен мне и этот, противен мне и тот, и я противен многим — однако всяк живет. Никто не убивает другого напрямик, а только лишь ругает за то, что тот возник. Ужасно государство…» и так далее.</p><p class="p1">— А другие знают, что вы добровольно?</p><p class="p1">— Кто-то знает, кто-то нет. Я ведь, как вы заметили, в основном отвечаю на прямые вопросы и при этом не вру. Вот и вам советую завтра: отвечайте прямо. Не врите. Но не рассказывайте больше, чем спросят.</p><p class="p1">Легко сказать.</p><p class="p1">Тем не менее назавтра Свиридов вышел из дому вполне бодро, презрительно глянул в сторону Вечной Любы, уже занявшей пост на лавке, и после очередных «Родненьких» (лесбийская связь матери с дочерью) прибыл к месту допроса. Он старался не представлять будущий разговор с Калюжным — все будет иначе, мы знаем, — и усердно направлял мысли в другую сторону. Например: идет как бы борьба за нравственность, но «Родненькие» с их старательно извращаемыми, стремительно деградирующими сюжетами странным образом идут в авангарде этой борьбы. Их ведущий, Борис Шелепин, — злая пародия на человека: бритый вытянутый череп, угодливый оскал, моргание, кивки после каждого слова собеседника, внезапный истерический визг, однако в финале каждой программы он непременно орет: «Любите друг друга!», и что-нибудь еще о морали, и массовка сопливится в платки. Чем извращенней, тем моральней, в чем тут штука? — штука в том, что именно Борис Шелепин и позволяет зрителю чувствовать себя человеком нормы, здоровым представителем большинства. Нам не за что больше уважать себя — только за отсутствие инцеста; позитивный критерий нормы отсутствует, а точкой отсчета является Шелепин. И тогда этот его финальный вопль, от которого Свиридова только что не рвало, так же трогателен, как приказание долго жить, исходящее от обреченного. Ксюшу держат за тем же. Где же, однако, наш друг? Но не успел Свиридов занять место у окна, как зазвонил мобильник, и неопределимый Калюжный тепло спросил:</p><p class="p1">— Пришли, Сергей Владимирович?</p><p class="p1">Все спокойствие ухнуло в бездну.</p><p class="p1">— Да, я у окна.</p><p class="p1">— Ага, вижу. Сейчас.</p><p class="p1">Подошел высокий, в сером мягком пиджаке, мужчина с кружкой кваса: волосы гладко зачесаны назад, выражение бодрое, подбородок вперед, — такой легко поддержит разговор о гольфе и покере, так же легко врежет, так выглядели, должно быть, дипломаты из первого поколения красной профессуры; где их таких берут? Но Свиридову за всем этим лоском померещилась не только неотесанность, но и тайная неуверенность: быстрый, оскользающийся взгляд, которым Калюжный постреливал по сторонам, чуть ли не опасаясь слежки. У него и самого, кажется, все было не очень хорошо. Он не знал, как себя вести с человеком из списка. Ладно, хватит самоутешений, то, что он минуту молчит, еще не признак неуверенности. Это может быть и давлением, это им и является.</p><p class="p1">— Ну здравствуйте, Сергей Владимирович. — Рукопожатие. Прекрасный знак — как с равным. — Меня зовут Георгий Иванович.</p><p class="p1">— Очень приятно.</p><p class="p1">— Ну, приятно или неприятно, — улыбнулся Калюжный, — а дело придется иметь со мной. Я куратор списка, прошу любить и жаловать. — (Вот как, у списка теперь куратор!) — Так что со всеми проблемами, пожалуйста, ко мне.</p><p class="p1">— Есть проблема, Георгий Иванович, — сказад Свиридов, дивясь собственному самообладанию. — Вот я работал на сериале «Спецназ своих не бросает», знаете?</p><p class="p1">Калюжный кивнул.</p><p class="p1">— Нареканий не имел, все, как говорится, штатно. И вдруг меня увольняют — без объяснения причин, просто потому, что я в списке. Это как расценить, Георгий Иванович?</p><p class="p1">— Ну это же не мы вас уволили, Сергей Владимирович. Правильно?</p><p class="p1">— Правильно, Георгий Иванович. Но список-то вы составили.</p><p class="p1">— Почему вы так думаете?</p><p class="p1">— А что ж, не вы? — спросил Свиридов, делая большие глаза.</p><p class="p1">— А что это вы не кушаете ничего, Сергей Владимирович? — спросил Калюжный.</p><p class="p1">— Да я кушал, Георгий Иванович. Вы мне скажите лучше про список.</p><p class="p1">— Это вы мне лучше скажите про список, — вздохнул Калюжный. — Вы же, наверное, должны знать, за что вы туда попали.</p><p class="p1">— А я не знаю, Георгий Иванович.</p><p class="p1">— А вы подумайте, Сергей Владимирович.</p><p class="p1">— Второй месяц думаю, Георгий Иванович.</p><p class="p1">— Ну еще подумайте. Вы же с голоду не умираете, правильно? Есть работа, никто не мешает. Если вас кто-то будет обижать, вы нам доводите. Лично мне. А если вас уволил работодатель, то не надо нас демонизировать. Это же не мы, правильно? Мы же не можем ему позвонить и сказать: вот, восстановите, пожалуйста, Свиридова Сергея Владимировича. Они подумают сразу, что вы наш человек. Вам это надо?</p><p class="p1">— А вы скажите, что я не ваш человек.</p><p class="p1">— А зачем это, Сергей Владимирович? Вы что же, хотите, чтоб было телефонное право?</p><p class="p1">— Нет, — сказал Свиридов. — Телефонного права не хочу совершенно.</p><p class="p1">— Вот и мы не хотим. А насчет списочка вы все-таки подумайте. Вы лучше нас должны это знать.</p><p class="p1">Господи, мелькнуло у Свиридова. Под гипнозом что-то сделал, теперь не помнит.</p><p class="p1">— Не знаю, Георгий Иванович, — сказал он.</p><p class="p1">— Ну, как хотите. Хотя для вас, Сергей Владимирович, лучше было бы сказать.</p><p class="p1">— Это я вам должен сказать?! — поразился Свиридов.</p><p class="p1">— Вы должны понять, — тихо сказал Калюжный. — Подумать и понять. И тогда, может быть, обстоятельства изменятся.</p><p class="p1">— Мои обстоятельства?</p><p class="p1">— И ваши, и вообще.</p><p class="p1">Замолчали.</p><p class="p1">— Хорошо, — после паузы сказал Свиридов. — Допустим, я понял. Мои действия?</p><p class="p1">— Самые простые действия, Сергей Владимирович. Вот телефончик, — Калюжный протянул ему визитку, как положено, со щитом; Двенадцатое управление, старший следователь, указан мобильный. — Как надумаете, так сразу и позвоните.</p><p class="p1">— А если неправильно надумаю?</p><p class="p1">— А что мы с вами гадаем, Сергей Владимирович? Вы же пока вообще никакой вины за собой знать не хотите. Чисты, как снег зимой. Разговаривать не о чем. Мы давайте не будем гадать на кофейной гуще, а конкретно посмотрим. Вы посмотрите, мы подумаем.</p><p class="p1">Интересно, знают они про Тэссу? Вероятно, нет. Вряд ли читают по-немецки, а мы договорились: издает меня только по-немецки. Но где гарантия, что Тэсса не от них?</p><p class="p1">— А зачем вы людей ко мне подсылаете? — снова дивясь своей дерзости, но и наслаждаясь игрой, спросил Свиридов. У всего должна быть компенсация — хоть бы и у страха.</p><p class="p1">Можно было ожидать, что Калюжный наигранно или искренне спросит — каких людей? — и возникнет поле для каких-никаких догадок; но Калюжный был из поколения нового, к играм не склонного.</p><p class="p1">— Когда надо будет, Сергей Владимирович, — сказал он, не переставая улыбаться, — все расскажем. Но сначала и вы должны помочь. И себе, и нам. А тогда уже можно задавать вопросы, правильно? В общем, если вас кто-то обидит, — а вас могут обидеть, — вы сразу звоните.</p><p class="p1">Это предупреждение Свиридову не понравилось совсем.</p><p class="p1">— Вы мне угрожаете, Георгий Иванович?</p><p class="p1">— Я помочь тебе хочу, дубина, — очень тихо сказал Калюжный. И громко добавил: — Так что звоните, Сергей Владимирович. Договорились?</p><p class="p1">Свиридов молча кивнул. Если они все пишут и он вынужден шептаться, лучше не выражать согласия словами.</p><p class="subtitle">3</p><p class="p1">Полчаса он просидел в «Му-му», пока не понял, что его опять развели как лоха.</p><p class="p1">В местных Раскольниковых — в том числе никого не убивших — изначально сидит мечта о Порфирии Петровиче, который отнесется к нам горячо, сочувственно, нежно. Следователь-психоаналитик, понимающий палач, из тех, что, замахиваясь топором, отечески произносят: «Сами же мне потом спасибо скажете!». Никаких Порфириев нет — или есть, но главная их задача, понятно, не психоаналитическая. Наслаждаются, загоняя нас в ямы. Никаких других интенций. Он ничего обо мне не знает. У него ничего на меня нет. Он ждет, пока я придумаю сам, и вся задача списка предельно проста: чтобы каждый осознал себя виновным. Они умеют манипулировать только теми, кто изначально виноват; только виновные смогут прощать им все, а прощать придется многое.</p><p class="p1">И ведь никто не скажет ни слова против. По какому праву? Все замараны. Научились терпеть — сначала по мелочам, потом все дальше, и в этом размывании критериев я поучаствовал по самое не волнуйся. «Родненькие» — это что ж, не размывание? Да после этого можно что угодно. Мы не имеем права с них спросить, вот в чем дело. Здесь получилось так, что не осталось невиноватых. И когда они захотели отстроить наконец всю эту гниль, все добровольно пошли в бараки: кто сказал, что барак не получается из бардака? Только из него и получается: давно пора, заслужили. А вина сформулируется, есть из чего выбрать за мои двадцать восемь.</p><p class="p1">Одна умная старуха сказала Альке, когда они вместе были у нее в гостях: милочка, никогда не устраивайте сцен будущему мужу. Наслаждайтесь ситуацией, когда он приходит виноватый. Культивируйте чувство вины — нет более удобного сожителя, чем такой супруг. Он не обратит внимания на пересоленный суп, а то и на его отсутствие. Он все вам простит заранее, включая измену. Им не важно, в чем мы виноваты. Им нужно, чтобы мы были виноваты, только и всего; не конкретная вина, но сам факт. С другим населением они попросту не могут иметь дело: невиновный с них тут же спросит, а ответить им нечего. Мы должны придумать себе вину, они до этого уже не снисходят; и я как идиот кинусь это делать, потому что на какой-то момент он изобразил сочувствие, о Господи, сострадание. Но с какой вообще стати? Почему всякий родившийся здесь по определению виноват?</p><p class="p1">Впрочем, почему здесь? Ведь все мы умрем, а за что? Все постареем, потеряем силы, любовь, талант. За что? Чем виноваты? Не надо врать про переход в новое качество, на примере отца я отлично видел этот переход в новое качество. Допереходился, пока не ушел в него совсем, в страшный мир грунта, песка, подземных вод, химических элементов, в жуткую прорву беспамятства; и вот с этого момента почувствовал я себя беззащитным, а значит — виноватым. Как ушел отец, так и началось. В чем он был виноват? А ведь это с ним сделала не ФСБ, никто ничего с ним не сделал, — это ход вещей, просто у нас он чуть откровеннее выглядит. Кто ни родится — все приговорены. А всё, чем мы, сволочи, занимаемся, — это и есть поиск формулировок, вся литература об этом, всё вообще. Пишем коллективный обвинительный акт, и когда составителю списков окончательно надоест, он нам его предъявит: это про вас? Да. Всех утопить.</p><p class="p1">Ненавижу, ах, ах, ах, как ненавижу. Это было почти веселое чувство: он понял. Контора внушает всем чувство вины, но не этим ли занимается каждый поп, призывающий покаяться? Если не внушать нам каждую минуту, что мы грешны, — о, как мы спросили бы с этого Бога! Но мы грешны, грешны. Он успел обвинить нас прежде, чем мы его о чем-нибудь спросим. Министерство вины, вот как это должно называться; истина в вине. И два дня он прожил в этом веселом гневе.</p><p class="p1">За гневом настал период сентиментальности. Нормальная эволюция пищи, вторая стадия вызревания: переход из состояния борца в состояние борща, поедаемой жертвы. Вероятно, третьим будет равнодушие, «спокойствие ведомых под обух», чтобы не мешать процессу заглатывания даже слезами, молча поглотиться, не привлекая внимания прочих; стадия гнева нужна, чтобы объект был вкусней («когда же вследствие раздражения печень его увеличится…»), а стадия сентиментальности ласкает слух поглотителя. Свиридова самого удивляло, до какой степени он набит цитатами — и до чего ни одна из них ничему его не научила. Столько знать и ничего не сделать, проходя уже миллион раз до него пройденное и усвоенное, — надо было уметь, конечно. Но ведь суть не в предупреждении — если бы книги умели предупреждать, мир давно развивался бы вертикально. Суть в особенно ценной реакции узнавания — «Но сладок нам лишь узнаванья миг», как сказано в еще одной цитате, смысла которой он прежде не понимал. Теперь он опознавал все, о чем столько раз читал и слышал, и все это было с ним самим, и он ясно понимал, что будет дальше, — но ничего не предпринимал, все глубже проваливаясь в воронку. Почему он ничего не делал? Потому что в побеге из готового сюжета было предательство, и расплата за него могла оказаться стократно страшней предначертанной участи. Сюжет: герою предстоит арест, он мучительно пытается избежать его — чтобы добегаться уже до гильотины. Впрочем, и вся литература по этой схеме: кто честно навстречу участи — тот еще как-то, кое-как, а кто в сторону, вбок, заячьими петлями — тому амба, не создавай проблем автору.</p></span>
