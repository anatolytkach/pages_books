<span><p class="p1">Свиридов отчетливо помнил миг перехода из ярости в жалость: он стоял в сберкассе, снимал деньги с книжки. Начался октябрь, за окном сыпал мелкий дождь. Очередь была бесконечная — пять окон, работают в двух, в одном принимают платежи, в другом осуществляется все остальное; снимали многие — как раз начались подорожания еды, пенсий не хватало. В углу старуха развлекала чужого мальчика: каких домашних животных ты знаешь? Мальчик не знал домашних животных. А как же овечка, коровка? И почему они называются домашними? Потому что живут рядом с человеком… Ну как же, смотри: коровка, овечка… Мальчику было бесконечно скучно, старуха этого не видела и все гнула свое; наверное, из бывших учительниц, которым некого и нечему больше учить, а привычка осталась; осталась даже любовь к деткам, которые ее и тогда-то терпеть не могли, а теперь и подавно. Она предъявляла ему бесконечные инвентаризационные списки своего давно исчезнувшего мира, в котором были коровка, овечка, живущие рядом со строгим, но справедливым человеком; были яблоко, груша, слива — список фруктов, клубничка, малинка и невесть как затесавшийся в компанию арбуз — перечень ягод… Она все перечисляла и перечисляла эти пропавшие предметы, картинки из выцветших букварей, а ведь никаких коровок, овечек, арбузов, яблок давно нет, все обман, восковая подделка, все работы давным-давно сводятся к катанию бесконечных, неотличимых тачек с урановой рудой, из которой лепят малинку, клубничку… В самом деле, куда-то все делось. Нет больше ни человека, ни самозабвенно служащих ему домашних животных — а она все рассказывает, бедная старуха с испуганным лицом. Обычно в очереди соблюдался вечный закон всякого списка — ты ненавидел всех, кто стоит впереди, и презирал всех, кто стоит сзади; единственным способом уберечься от равно гибельных эмоций был выход из очереди, но тогда Свиридов не снял бы денег. Стоя в сберкассе, Свиридов перестал ненавидеть и чуть не расплакался. Это не означало, конечно, что он стал лучше — такие жалкие самоутешения он отметал с порога. Это значило лишь, что он вступил в следующий этап пищевой переработки — сменил гнев на жалость. Это тоже была болезнь.</p><p class="p1">Жалость распространялась и на себя. У него было теперь много времени, он гулял — главным образом по местам своего детства. Детство было скудное, невыездное — сначала не особенно выпускали, потом не было денег. Поэтому наша Франция была вот тут — в этом внутреннем дворе он читал французов, и в местных пятиэтажках в самом деле было что-то от зеленых и серых построек Второй империи. Наша Германия была чуть дальше, здесь читались немцы, главным образом романтики. А здесь начиналось абсолютное чудо — между домами открывался широкий золотисто-алый закат, на фоне которого дымила далекая заводская труба ЖБИ, отвратительных железобетонных изделий, смотревшаяся, однако, трубою далекого судна. Этот широко разлившийся меж домами закат напоминал о прекраснейшем, обещал все сразу — туда помещались тропики, полярные области, океаны и водопады; но и дома, и закат, и детские площадки во дворах не имели теперь смысла. Свиридов шел мимо и ничего не узнавал: местность была та самая, но чувства вызывала иные. Он был здесь уже не хозяином, волшебно преобразующим мир, но жалким, из милости терпимым посетителем, и дома, которые в детстве столько для него значили, смотрели равнодушно: тебя не будет, а нам хоть бы что. Не сказать, чтобы он в детстве об этом не догадывался, — но допускал, что им будет хотя бы жалко.</p><p class="p1">Ни одна игра, ни одно превращение из числа тех, которыми творцы-недоумки пытаются расцветить и обуютить этот мир, не имели больше смысла: реальность стояла голой, как октябрьское дерево, враз лишившись всего, ради чего ее стоило терпеть. Ушли искусственные смыслы, вчитанные и привнесенные ради адаптации. Разве любил бы он университетский сад с его грязными свинцовыми яблоками, если бы не представлял себе, что это английский сад, в котором учитель рисования гуляет с влюбленной ученицей? Но и английский сад, и ученица, и Вторая империя, и океаны, и водопады были теперь картонными, грубо вырезанными и небрежно раскрашенными. Первое дуновение настоящего страха уничтожило их сразу же — чего же они все стоили, если один несчастный список обесценил их в момент, как ребенок разламывает игрушку?</p><p class="p1">Страх тем-то и был страшен, что не просто лишал все радости смысла и права на существование — мало ли, так же действует рутина, усталость, одиночество, нужное подчеркнуть, — но до бесконечности расширял поле мерзости, заставляя предполагать неограниченное количество ужасного. Мир похож на дробь, где jb числителе — лучшее, а в знаменателе — худшее, что мы можем вообразить; страх — радикальнейшее средство свести эту дробь к исчезающе малой, трепещуще жалкой величине. Свиридов теперь и подумать не мог о том, чтобы с ним случилось что-нибудь хорошее, но ассортимент ужасного был богат и разнообразен, и старый добрый способ — представить себя мертвым — не помогал, ибо все это были вещи хуже смерти. Всего досадней была беспричинность, незаслуженность расплаты. Ведь я ничего не сделал, даже обидно. Страх сокращает жизнь — не в том смысле, что укорачивает, а — редуцирует: одержимый страхом перестает воспринимать летучую прелесть бытия, нюансы и привкусы. Как одержимый болью, он неспособен к радости, — но у боли хоть то преимущество, что она отрубает и мысли, кроме самых простых. Страх же не отнимает способности фантазировать — ты можешь представлять миллионы вариантов, но только ужасных; перебирать бесконечные воспоминания — но только постыдные. Боль отнимает способность смотреть по сторонам, фиксирует на себе — страх заставляет поминутно оглядываться и видеть сплошное страдание, которого осенью и так слишком много. Он ходил и жалел все подряд — листья, собак, траву под первым снегом, — и ни в чем не чувствовал ответной жалости.</p><p class="p1">Кроме того, у Свиридова завелась ворона.</p><p class="p1">Когда у вас заводится существо много ничтожнее вас, от которого вы сильно зависите, — это тревожный симптом, причем из предпоследних; ему наверняка предшествовало несколько других, трусливо пропущенных. Глубина вашего падения и соответственно терминальность симптома напрямую зависит от соотношения между вами и существом: если оно тоже человек, вы почти в норме, если собака-кошка-мышка — дело серьезно, но поправимо, следующая ступень — птица, а я знал человека, который любил каракатицу и всерьез уверял, что она платит ему взаимностью. Предпоследняя стадия — насекомое: у Тэффи, отлично понимавшей в этих делах, описан случай человека, от беспросветного эмигрантского одиночества привязавшегося к мухе. Но надежда сохраняется и тут — пока вы не начнете привязываться к неодушевленным предметам, как героиня той же Тэффи, сходившей с ума от потери красного куска сургуча. Даже если у такого человека все вдруг обернется к лучшему, он уже потерян. У Свиридова был шанс, потому что он пока подружился с вороной.</p><p class="p1">Он не был уверен, что это одна и та же ворона. У нее не было особых примет. Она была большая, громкая, необъяснимо внимательная к нему, — но, может, к нему прилетали три или четыре вороны, которые просто одинаково себя вели, а почему, он не догадывался. Поскольку у Свиридова не было балкона, ворона прилетала к нему на широкий жестяной карниз и скреблась по нему когтями, переступая вдоль кухонного окна. Что она там высматривала на подоконнике — Свиридов не понимал: сыра он на окне не держал, да и не был уверен, что вороны любят сыр; сала не было; сам он пока не представлял интереса для вороны, потому что на живых они, кажется, не нападают. Другой бы — да и сам Свиридов в другое время — увидел в появлении вороны дурную примету, но в наоборотном мире отчаяния все меняет знак, и все, что раньше пугало, выглядит обнадеживающим. Пока мы только боимся свалиться в бездну, нас отвращает все мрачное, зато когда уже свалились — количество мрачного в окружающем мире только радует, доказывая нашу типичность; вот почему здоровые ненавидят общаться с увечными, а больного хлебом не корми, дай поговорить именно с больным. Свиридову, которым никто всерьез не занимался, даже государство временно отвело взгляд, — в радость было регулярное внимание вороны. Ей было до него дело. Она о чем-то сигнализировала, еврейская птица. Что-то сдвинулось в его зависшей судьбе, и она пыталась об этом сказать, оглядывая Свиридова с требовательным и, казалось, одобрительным интересом.</p><p class="p1">Она появлялась обычно около полудня, некоторое время качалась на липе напротив, потом перебиралась на карниз и принималась со скрежетом и цоканьем мерить его когтистыми, кожисто-черными лапами. Она не стучала в окно клювом, не уставлялась на Свиридова круглым блестящим глазом и вообще не снисходила до готических пошлостей. Иногда только она взглядывала на него словно искоса, а по большей части расхаживала туда-сюда, опустив клюв, словно высматривая что-то на карнизе. Она была похожа на старика, бродящего туда-сюда с руками за спиной, сгорбленного, никому не нужного, изо всех сил делающего вид, что он ужасно занят, тогда как на самом деле ему нечем занять бесконечный пенсионный день. Свиридову приходили теперь в голову только такие безрадостные сравнения. Иногда он для разнообразия шугал ворону, и она с неохотой, чуть ли не с иронией снималась с места и возвращалась на липу. Часов в пять она прилетала и опять искоса наблюдала, а если пропускала свидание, Свиридов начинал нервничать. Ему казалось, что теперь он не нужен даже вороне.</p><p class="p1">Скоро, впрочем, он перестал фиксироваться на ней, потому что появилась Валя Голикова.</p><p class="subtitle">4</p><p class="p1">Ей было жалко всех — больных, убогих, старых, нищих, одиноких, семейных, живых, мертвых, потому что к состоянию одиноких, больных или уж наверняка мертвых рано или поздно придут все. Наверное, она даже радовалась этому, потому что это давало Вале Голиковой повод жалеть их, а больше она ничего не умела.</p><p class="p1">Если бы когда-нибудь Свиридову сказали, что Валя Голикова станет лидером списка и уж по крайней мере любимицей списантов, он рассмеялся бы предсказателю в лицо. Предсказателем оказался Соболев, биохимик. Ехали вместе со встречи на жуховской даче, где много и беспорядочно пили, болтали, тайком хихикали над хозяйкой, привычной, конечно, к людям совершенно другого круга, а теперь вынужденной принимать списантов. Что поделать, муж низвергся и вознестись теперь мог, только принеся в жертву сотню ничтожеств — либо сложив их к ногам покровителей, вот, я разоблачил, либо использовав в своей игре, дающей шанс по крайней мере не сесть. Приходилось терпеть списантов, как Софья Андреевна терпела темных, тоже зачем-то нужных графу — а без графа не было бы ни денег, ни славы, и вообще какая жизнь без него? Списанты приезжали на дачу, ели шашлык, слушали разговоры хозяина о том, что еще немного — и вся показуха рухнет; разговоры были тем смешней, что сам он еще полгода назад выстраивал всю эту показуху, был ее привычной частью и помыслить не мог о подобных дерзостях. Как все люди, добравшиеся до определенного этажа, Жухов умел быть любым, хотя и не всегда был равно убедителен; перед списантами он даже брал гитару, совершенно забытую со времен МГИМО, и исполнял собственные песни, сочиненные в студенчестве, — что-то о Боге и ангелах. Это было смешно, но списку нравилось: бывший замминистра перед ними приплясывал, как дворя нин, ушедший в народ. Жухов пытался заинтересованно общаться — о детях, о трудностях их воспитания и трудоустройства; с интонациями благородного вдовца ругал социалку. Жена по-простому разносила напитки, но говорить со списантами ей было решительно не о чем. Она молча улыбалась направо-налево.</p><p class="p1">Соболев не пил, он был за рулем. Заметив, что он собирается отчаливать, Свиридов напросился с ним, прочие остались допивать и дослушивать песни жуховской молодости.</p><p class="p1">— Лидер из него, конечно, никакой, — сказал Соболев.</p><p class="p1">— Знаете, на кого он похож? — вспомнил Свиридов. — Я помню, был матч — «Спартак» против «Баварии», 1:5, короче. И один мой друг — он все говорил, что есть шансы на ничью. Сейчас такой-то сносит нашего, и пенальти, наши воодушевляются и забивают еще два, потом еще пенальти… Очень убедительно выходило: пять минут до свистка, а он фантазирует. Так и Жухов: титан на глиняных ногах, одно выступление, выйдут из берегов, всенародный ответ… Я не очень понимаю, зачем ему это.</p><p class="p1">— Тоже мне бином, — сказал Соболев. — Если его посадят просто так, это взяли коррупционера. А если теперь, когда за ним список, это расправа с оппозицией и предмет торга. Я даже не уверен, честно говоря, что он был в списке.</p><p class="p1">— В смысле?</p><p class="p1">— А вот так. Его взяли, уволили, он в ауте. Под него явно копают, какая-то история с дачей, с приватизацией, с солнцевскими — неважно. Захотят — найдут, сейчас на всех есть. Тут он видит список. Слухи о нем ходят, зачем список — никто не знает, теперь уже, боюсь, даже тот, кто его действительно составил. А дальше все само собой: он гонимый, мы гонимые, он к нам подсасывается — и вперед.</p><p class="p1">— Да ну. Не думаю. Это же в его обстоятельствах очень отягчает.</p><p class="p1">— А у него выбора нет. Либо сядет за воровство — и, судя по компромату ру, есть за что, — либо прогремит как оппозиция. Отягчающее обстоятельство — это же о двух концах. Кому надо наверх — тому отягчающее, а кто хочет быстрей на дно, чтобы оттолкнуться, — тому даже в плюс.</p><p class="p1">— Да кого он может возглавить?</p><p class="p1">— Он-то? — Соболев обогнал на своем «ниссане» классическую блондинку в джипе и выругался. — Он-то никого, но тут у нас симбиоз. Отшельник и роза — помните?</p><p class="p1">— В общих чертах.</p><p class="p1">— Ну сказка такая. Актиния на раке передвигается. Мы ему нужны, чтоб получился оппозиционер. А он нам — чтоб себя уважать. Вот, мы гвардия Жухова. Мы не просто список, мы оппозиция. Статус повышается. А возглавлять ему не надо, нет. На фиг такой лидер, пробу ставить негде.</p><p class="p1">— Ну, получше Гусева с Бобровым.</p><p class="p1">— Ненамного. А что, кстати, Гусев с Бобровым? У них и так шансов не было. Кого им возглавлять? Дворовую команду? — так и там побьют через день. Не-ет, тут будет человек серьезный…</p><p class="p1">— Кто же?</p><p class="p1">— Валя Голикова.</p><p class="p1">Свиридов заметил Валю Голикову давно — она смотрела на него с тихим обожанием, и он уже было возгордился, — но Валя была, так сказать, не совсем в его вкусе. После Альки он тосковал, но не был еще готов снисходить до Вали. Маленькая, кучерявая, худая, вздернутый нос, круглые карие глаза — если б ею заняться, приодеть, была бы вполне, но ей было словно не до косметики, не до форса вообще. Она кем-то работала в американском фонде по содействию детям с врожденными патологиями, благотворительная организация, один раз прикрытая в прошлом году и восстановленная под новым названием; тогда взялись закрывать все иностранное, благотворительное и неправительственное, приняли драконовские правила регистрации, все дела, — но их не прикрыли, спасли связи наверху и заступничество самого Филимонова, титана ельцинских времен. Может, за то и в список угодила.</p><p class="p1">— Валя? — изумился Свиридов. — С каких щей?</p><p class="p1">— Очень просто. В любом сообществе лидер кто? Вот по-вашему?</p><p class="p1">— Все зависит.</p><p class="p1">— Ничего не зависит. Вы же сценарист, должны знать. Я химик, и то знаю.</p><p class="p1">— Ну делитесь.</p><p class="p1">— Побеждает тот, — назидательно сказал Соболев, — кто дает лестную идентификацию. Один говорит — вы лузеры, второй — вы святые и великомученики. У кого больше шансов возглавить?</p><p class="p1">— У второго.</p><p class="p1">— Лыжники, догадался Штирлиц! — Соболев самодовольно ухмыльнулся в усы и обогнал еще один джип; водил лихо, даже и нагло.</p><p class="p1">— Ну, это не для всех сообществ. Только для уязвленных, вроде вот нашего.</p><p class="p1">— Для любого, абсолютно. Помните это мероприятие, в «Октябре»? С ветеранами спецслужб?</p><p class="p1">— Такое не забывается.</p><p class="p1">— Вот ровно той же природы. Ведь лузеры, в чистом виде. Все просрали. Не просрали бы — ничего бы не было. Надо ж не только диссиду хватать и спекулянтов ловить, надо придумывать что-нибудь, чтобы люди не закисли. Они и сейчас лузеры, даром что своих везде наставили. Это же случайно вышло, что их человек пролез.</p><p class="p1">— Ну уж, ну уж.</p><p class="p1">— Ладно, все свои. Ну и придумали потом аттракцион невиданной верности. Тоже лестный вариант. И эти — помните про крюк? Все удержалось на нас, как на крюке. Это почему? Потому что из всех остальных что-то получилось, они куда-то развились, преобразовались, — только эти остались, как были, потому что ничего другого не могут. Только мешать всем, у кого хоть что-то получается. Отсюда крюк. Если старая гнутая кочерга ни на что больше не годна, кроме как мешать — в данном случае мешать дрова в камине, — она может воспринимать себя как крюк, на котором все держится, и ей отлично.</p><p class="p1">— А Голикова-то что дает?</p><p class="p1">— А вот это очень интересно. Смотрите сюда. Я этот тип знаю, их полно. Голикова не предлагает никакой идейной базы. Идейная база вообще больше не хиляет, можете забыть. К безыдейной власти не может быть идейной оппозиции. Но Голикова помогает бедным, и это раз. Она за милосердие, это два-с. Она всех нас представляет благородными жертвами, это три-с. Вы не знаете, а я давно заметил. Она часть народа уже склонила в доноры, других в волонтеры, и список на это очень горячо ведется. А теперь — я ведь смотрю, я присматриваюсь! Она на все жуховские тусовки ездит. И все, что он говорит, аккуратно переводит на другой язык. Вы заметили, как она Бодрову потеснила?</p><p class="p1">— Я как-то не слежу…</p><p class="p1">— А за чем еще следить-то, милый? Тут же такой полигон, социолог обзавидуется. Надо хоть что-то познавательное извлечь, раз уж в список попали.</p><p class="p1">— Кстати, как вы думаете, за что? — привычно спросил Свиридов.</p><p class="p1">— Какая в жопу разница, — сказал Соболев, которому всегда все было ясно, позитивист, сангвиник, желудок в полном порядке. — Мы никогда не узнаем, да теперь уже и все равно. Процесс пошел, и возглавит его Валя Голикова, помяните мое слово.</p><p class="p1">С Валей Голиковой у Свиридова все получилось само собой — он начал поглядывать на нее с любопытством, заговорил, отвез к себе, и она осталась у него с такой же легкостью и естественностью, с какой рассказывала о волонтерстве. В этом не виделось и тени рисовки, хотя все, о чем она говорила, было для нормального человека невыносимо. Она искренне уверяла Свиридова, что делает все это не для детей, а для себя, что доверять можно только эгоизму, что альтруисты отсеиваются первыми и что мать Тереза решала в Индии исключительно личные проблемы.</p><p class="p1">— Сейчас же письма опубликовали. Она сомневалась в Боге и надеялась эти сомнения там заглушить.</p><p class="p1">— И получилось?</p><p class="p1">— По-моему, нет.</p><p class="p1">С ней было легко. Не сказать, чтобы Свиридову очень нравилось с ней спать, но после Альки надо было заполнять пустоту. Не было, как с Алькой, — восторженного умиления, радости, что вот она такая, что независимость, воля, одиночество, ум и всепонимание видны в каждой ее черте, хотя бы и в пальцах, длинных, сильных пальцах музыкантши; да и во всем решительно, что уж душу травить. Валя Голикова по сравнению с ней была проще, мельче, жиже, и пахло от нее ребенком, а не женщиной. Голикова развелась еще в прошлом году и с тех пор, говорила она с той же детской простотой, никого не было, вообще.</p><p class="p1">— Последний раз был очень смешной. Мишка пришел, сказал, что уходит. Зашел отдать ключи. Очень такой театральный жест, в его духе. И говорит: давай, что ли, напоследок… И вот не поверишь — я вообще не представляла, что так бывает: оба ревем.</p><p class="p1">— Как в анекдоте.</p><p class="p1">— Анекдот, да. Ебу и плачу. — Мат у нее звучал по-детски, необидно и не возбуждающе, так некоторые пьют водку, как воду, без выражения. — И я спрашиваю его: ну что ты, Мишка? Я же тебя не гоню, оставайся, будем считать, ничего не было. А он говорит: нельзя, я ей слово дал. Я тебя люблю, но ей дал слово. На самом деле никого он не любит, конечно.</p><p class="p1">— А сейчас у них что?</p><p class="p1">— Откуда я знаю? Я его с тех пор не встречала, как отрезало.</p><p class="p1">Ей было двадцать пять лет, и свиридовская квартира благодаря ей стала приходить в чувство. Алька не думала об уюте, вносила неуют с собой — Валя наводила чистоту и солидность. Альку не хотелось называть Алей — Валю и представить нельзя было Валькой, не потому, что она важничала, но потому, что аккуратным домашним детям не идут клички. Она окружала Свиридова заботой, которой он не помнил с детства: сама звонила, что хочет приехать, привозила еду, готовила, восторженно читала свеженаписанное. О своих делах она рассказывала скупо:</p><p class="p1">— Слушай, дай мне хоть с тобой отдохнуть от всего этого.</p><p class="p1">Большая часть ее свободного времени, однако, была теперь занята делами списка: одному она помогала пристроить ребенка к хорошему репетитору, другой обещала врача, третьему подыскивала работу. Увольнения к этому времени стали обычной практикой, без работы сидела треть списка, но Валю выгнать никто не мог — ее работодатели не боялись новых веяний. Хорошо в России быть порядочным человеком, имея американское гражданство! Это было похоже на семейную жизнь без любви — уютно, и гораздо меньше трагедий. С Алькой все время получались стычки, а с Валей Голиковой Свиридов чувствовал себя как в теплой ванне. Иногда, напиваясь, он хотел позвонить Альке, но всякий раз сдерживался: ни к чему.</p><p class="p1">Мать Голиковой тоже развелась и была, конечно, учительницей — кем еще она могла быть? Свиридов заехал к ним один раз, все было уютно, опрятно и жалко. Заходила соседка, на что-то жаловалась, — видимо, Валина мать была жилеткой для всего подъезда, и Валя унаследовала амплуа.</p><p class="p1">— Валя, — не выдержал он однажды. — Что ты грузишься всеми этими делами? Все равно сын Бураковой — балбес, и его выгонят после первой сессии, даже если поступит. А ты ему репетитора. И Смирнова никто не восстановит на работе, никто не будет в инкассаторах держать списанта. Чего ты носишься, я не понимаю?</p><p class="p1">— Мне нетрудно, — отвечала она, глядя на него серьезными детскими глазами.</p><p class="p1">— Ну нетрудно, а зачем все-таки?</p><p class="p1">— А что я еще могу делать? Мне же надо что-то делать, правильно? Ты пишешь, я не умею.</p><p class="p1">Он был раздражен, на нерве — они только что посмотрели тяжелый и нудный отечественный фильм о любви, в котором десантник и шлюха (шлюха тоже своего рода десантник — физподготовка, тату, не зря ей так шел его тельник) постоянно бросали друг друга и обретали опять, все это на фоне резкой музыки, ручной камерой, с рваным монтажом и беспрерывными погромами в кадре: десантник то бил соперника, то громил подпольный ночной клуб, то резал себе вены и только что не вспарывал экран — все прочее в пределах досягаемости уже было разрушено. Больше всего, однако, доставала не скрипучая скрипка, не перманентный разгром и даже не однообразие звериных соитий, из-за которых незачем было крушить столько реквизита — так развлечься можно было и с куклой; бесила бессмысленность, полная беспричинность всех этих притяжений и отталкиваний. Не сказать, чтобы все это было ложью, Свиридов встречал такие пары, в которых обоим не хватало ума, и потому все доступные развлечения сводились к беспрерывным приходам-уходам: ничего сверхтонкого — просто совместная жизнь требует хоть минимального мозга, а эти умели только бегать туда-сюда; но откуда претензия на трагизм — Свиридов решительно не понимал. Это могла быть комедия, он бы взялся. Его звали на премьеру, но он не пошел, памятуя о версии Гаранина — мало ли, вдруг теперь проверка таргет-группы стала нормой, теперь их, чего доброго, перепишет Минобороны, финансировавшее боевые сцены, одних кирпичей сколько разбито. Они смотрели картину в темном зале Дворца молодежи, директор которого, хоть и не списант, был незадолго перед тем арестован в Германии и ожидал экстрадиции; вообще кого-нибудь громкого брали уже ежедневно, и всегда за дело, и тенденция обозначалась с убийственной ясностью, что добавляло нервозности. Смысла, смысла не было ни в чем, вот беда: резкая музыка, много битой посуды, каждый день аресты, и все непонятно к чему. И никакая Валя Голикова не могла придать этому смысла: Алька могла, а она не могла.</p><p class="p1">Но к Альке было нельзя. В середине октября Свиридов вдруг увидел ее на проспекте Мира, хотел броситься к ней — и остановился: она шла медленно, слепо раздвигая толпу, и вокруг нее стояла такая густая, физически ощутимая аура одиночества и несчастья, почти античного в своей завершенности, что нарушить эту замкнутость — значило оскорбить ее.</p><p class="subtitle">5</p><p class="p1">Калюжный вызывал всех, требуя только одного: признания. Списанты не знали, в чем признаваться. Строго говоря, требовал — не совсем то слово. Он умолял, настаивал, предлагал добром. Создавалось впечатление, что цель списка была религиозная, метафизическая: добиться признания виновности, какой угодно, неважно, — и тут же выпустить готовенького из когтей: дальше он все сделает сам.</p><p class="p1">Чайников признался, что он изменяет жене.</p><p class="p1">Бухтин рассказал, что сдает квартиру и не платит налоги.</p><p class="p1">Сомов мастурбировал, иногда при помощи Интернета, то есть не подумайте, не мышью, а то вы сами не понимаете. Он долго не признавался, понадобилось несколько встреч, он даже начал находить в них некоторое удовольствие и временно перестал мастурбировать.</p><p class="p1">Черемухин вожделел к однокласснице дочери.</p><p class="p1">Садов любил давить перед зеркалом прыщи, вредная привычка, осталась с детства.</p><p class="p1">Григорьев ненавидел более удачливого брата, тоже с детства.</p><p class="p1">Ложкин желал падения цен на нефть, чтобы начали уже что-нибудь делать. Однажды он поделился этим соображением в очереди к банкомату, и присутствующие, отмечает он, единогласно отвергли его злопыхательское пожелание.</p><p class="p1">Все это было не то.</p><p class="p1">Пришла Валя, осталась ночевать, рассказывала, что Гусев нанял автобус и повез часть списка в альтернативный поход под лозунгом «Слава России». Автобус был крутой, навороченный, с вайфаем, принадлежал гусевскому другу и был специально для похода расписан в цвета национального флага. Позвали не всех, Гусев лично обзвонил только тех, кто показался ему благонадежным, — а может, наоборот, самых нелояльных: ангела ведь поощряют, когда он приводит к Богу самые жирные, грешные души, а праведников там и так хоть соли. Свиридову он не позвонил, и Свиридов не знал, хорошо это или плохо. Наверное, хорошо: чем меньше в жизни трешься о Гусева, тем лучше. Большая часть приглашенных ехать отказалась, но некоторые собрались, захватив детей. Валя поехала больше из любопытства. Гусев, Бобров и Панкратов всю дорогу пили. Приехали в Михайловское, шел дождь, с еловых лап текло, а домик такой маленький, оказывается, я же не была никогда, а экскурсовод такой жалкий, Сереж, ты не представляешь! И главное, все эти люди, все местные, они так радовались, что приехали из Москвы! Каждый обещал показать дуб, который на Лукоморье. И ты знаешь, мне впервые его стало жалко, в смысле Пушкина, потому что привыкли: великий. А какой великий, маленький, совершенно несчастный, и от него так мало осталось! Жалкие какие-то местные школы, Гусев на них жертвовал, говорил там с детьми, с интонациями маньяка, заманивающего девочек, — а школы расписаны еще в советское время, Пушкин с котом под дубом, Господи, какое бедное все! Все потрескалось, все никому не нужно, и ты знаешь, я так живо представила, как он выходит к ним под дождем, к ним ко всем, кто там живет, к учителям этим несчастным, и говорит — здравствуй, мой бедный народ, сейчас я расскажу тебе сказку о царе Салтане!</p><p class="p1">Она и здесь умудрялась всех жалеть.</p><p class="p1">— А цель этого похода Гусев не объяснил?</p><p class="p1">— Ну не знаю. Наверное, замаливает грехи. Или воспитывает список, надо же бороться с Жуховым. Перетягивание списка. Но он сам какой-то напуганный, я же вижу. И весь день говорит, что список для него — случайность, скоро его вычеркнут. Даже ко мне подошел и сказал: Валя, не бойтесь, я временно. Участвуйте, говорит, в моих акциях, пожалуйста. Это зачтется. Вы увидите, что меня вычеркнут, обязательно. Еще извинятся.</p><p class="p1">— Да, все так говорили. Вас за дело, а меня случайно.</p><p class="p1">— Мне даже жалко его стало.</p><p class="p1">— Ну жалей, жалей. Тебе всех жалко.</p><p class="p1">— Нет, тебя не жалко…</p><p class="p1">И этот кухонный запах от ее волос, в другое время казалось бы уютным, но теперь… И пухленький животик при общей худобе, и манера уютно засыпать сразу после — самочка накушалась. Иногда она предлагала приехать, но он ссылался на работу. Дело было не в работе, хотя на «Родненьких» ее прибавилось — открывались провинциальные филиалы на местных телестудиях. Вечерами Свиридов пил со списантами, понимая, что впадает в зависимость от этих попоек, давая клятвы навеки от них отказаться, сидеть дома и писать свое, — но писать свое было невозможно, нервы натягивались, пугал каждый шорох, въехавшая во двор милицейская машина выбивала из колеи на час. Он часами раскладывал пасьянсы, чаще всего бесконечного «Паука», и заметил, что если результат выходит больше тысячи, хоть на единицу, происходит что-то приятное — прибавляют денег на «Родненьких» за высокий рейтинг, Тэсса заказывает вместо одной колонки две и платит соответственно, звонит полузабытый заказчик и предлагает халтуру. Халтуры было много — люди привычно требовали зрелищ, но под действием этих зрелищ даже профи постепенно разучивались писать, так что деградация встала на поток. Если же результат был хоть на единицу меньше тысячи — дела не ладились, настроение падало, и ломался «жигуль». Пасьянс «Паук» управлял теперь жизнью Свиридова, и он уже не мог выйти из дому, не добившись тысячи. Он стал опаздывать. Через две недели такой жизни он стер «Паука», но потом возобновил, потому что без него было еще хуже. Эту зависимость могла вытеснить только другая — попойки со списантами и гадания на кофейной гуще о причинах и перспективах; все они до смерти надоели друг другу, как ссыльные в одной деревне, но, как те же ссыльные, не могли не сходиться по вечерам — гадать и перемывать друг другу кости. Все эти посиделки впоследствии слились для Свиридова в одну бесконечную, с незаметно меняющимися, но почти неотличимыми персонажами. Макеев, курносый, с бачками, директор по персоналу чего-то там; фотограф Трубников, огромный, с бритым черепом, тяжело переживающий уход молодой жены, постоянной натурщицы, уехавшей за границу; добрый Клементьев, злой Волошин, застенчивый Шаповалов, еще какие-то люди, общим числом не более десятка. Список давно уже разбился на кружки, но обсуждал одно и то же. Наиболее частой темой было роковое «кто стучит».</p><p class="p1">— Нет, что Гусев — это я, как хотите, не верю, — говорил Свиридов, качая тяжелой головой. Он и не знал, что может пить так часто. — Не верю и не верю.</p><p class="p1">— Боже мой, это очень просто. Вот как раз наличие Гусева меня и убеждает в том, что я уловил принцип, — сказал Макеев, самодовольно прищуриваясь.</p><p class="p1">— Что исключение подтверждает правило? Но это, знаете, верно только для природных структур, а в искусственных…</p><p class="p1">— Вот подумайте, подумайте, — снисходительно подбодрил Макеев. — Для чего нужно исключение в структуре вроде списка?</p><p class="p1">— Чтобы подчеркивать? — предполагал Свиридов. — Оттенять?</p><p class="p1">— Во дурак, а?! — воскликнул Макеев, и из него немедленно выперло макеевское, директорское по персоналу. — Ближе надо быть к земле, ближе! Исключение нужно исключительно для того, чтобы рапортовать о правилах! Чтобы доносить куда следует, кто и о чем тут говорит.</p><p class="p1">— Но тогда почему он? Он настолько выделяется, что на него проще всего подумать…</p><p class="p1">— Именно так. И-мен-но! — Макеев гордился стройностью версии. — Они там думают не на один ход и не на три, а ровно на два, это главная примета всех их замыслов. Их хватает, чтобы обманывать самые примитивные ожидания. Следите за рукой. Гусев — тот, на кого подумают все. Следовательно, шпионом должен быть НЕ Гусев. Следовательно, Гусев — не шпион. И тут-то мы обманываем ожидания, делая шпионом именно того, на кого не подумает никто, потому что он слишком очевиден! Заметьте, они всегда нас ловят на этом. Мы думаем, что things can't go so bad. Well, they can! На этом строятся все их замыслы: до какого-то момента люди просто не верят, что все может быть вот так, вот настолько, вот уж прямо до такой степени. Но оно может и должно, и не может быть никак иначе!</p><p class="p1">Свиридов припомнил манеры Гусева и согласился: сыграть такое невозможно. Человек, который так себя ведет, попросту обязан чувствовать за собой глубоко эшелонированную поддержку и административный ресурс. Это не воспитывается и не покупается, а дается принадлежностью к системе. Другого объяснения гусевского пребывания в списке не было. И насчет главной ошибки — вечной попытки увидеть сложность там, где ее нет, — Макеев был, пожалуй, прав. Обида была в том, что говорит это Макеев, с которым всегда так отвратительно было соглашаться, — но ничего не поделаешь, иногда гнусные замыслы понятней гнусным типам, почему в разведку и контрразведку всегда и отбирали противных.</p><p class="p1">— Может быть, вы и правы, — признал Свиридов.</p><p class="p1">— «Может быть!» — передразнил Макеев. — Не может не быть!</p><p class="p1">Разумеется, с ним надо было соглашаться только безоговорочно.</p><p class="p1">— Но мне кажется, — говорил Шаповалов, взявшийся неизвестно откуда, а может, это и с самого начала был Шаповалов, тяжеловесный, сырой, одинокий программист, — что принцип строго статистический. Срез общества, ничего больше.</p><p class="p1">— Нерепрезентативно, — с трудом выговаривал Свиридов. — А-атсутствует пролетариат.</p><p class="p1">— Но он и в жизни отсутствует. Это же общество, а не население. В населении его, может, две трети, но в обществе… Много вы знаете пролетариев?</p><p class="p1">— Ну давайте считать, — начинал Свиридов. — Есть врачи?</p><p class="p1">— Есть, двое.</p><p class="p1">— Учителя? Военные? Ассенизаторы?</p><p class="p1">— Нет, я не в смысле только профессий, — исправлялся Шаповалов. — А в смысле доходов…</p><p class="p1">— Олигархи? Рублевка?</p><p class="p1">— Нет, но в пределах… высоко вы берете, вот что. В пределах как бы среднего…</p><p class="p1">— Но тогда какой смысл? Какие процессы происходят в этом среднем, чтобы их стоило моделировать?</p><p class="p1">— У меня в последнее время желудок плохо работает, — признавался Шаповалов. — Нервное.</p><p class="p1">Откуда-то брался Клементьев, или он уже был? Кажется, это он говорил о списке как зародыше гражданского общества. Вот тебе и зародыш, желудок уже не работает, а вы говорите.</p><p class="p1">— Чего бы я не дал, чтобы выйти отсюда, — жаловался Свиридов Клементьеву. — Из этого круга, из этого воздуха. Не примите на свой счет, я очень рад, что с вами познакомился. Но в целом…</p><p class="p1">— Знаете, Сережа, — говорил Клементьев. — Я бы на вашем месте не торопился с выводами… и выходами… В первое время невыносимо, это знают все, но потом люди привыкают. Адаптируются. Наступает особая солидарность, вырабатывается снизу. Все историки Блокады, скажем, об этом пишут. Я довольно много читал по истории. — Солидные, тихие люди вроде Клементьева редко читали художественное, а зря. Художественное бывает точнее истории. — В первое время — как вообще на войне — доносили все друг на друга, сильны были предвоенные рефлексы, много еще всякой гадости… Но потом обвыклись, научились переносить, заново наросло человеческое — штука в том, чтобы перетерпеть. На какой-нибудь пятый месяц наступает почти комфорт. Трудно поверить, но в окопах бывало комфортно. Или вот говорят — застой. При застое, я-то помню, у людей были механизмы. Были трудности, да, — но были и механизмы преодоления. И это было не так страшно, смею вас уверить…</p><p class="p1">— Это при условии, — вступил вдруг Трубников, — что мучения не нарастают.</p><p class="p1">— Ну, ничто слишком ужасное не может длиться слишком долго, — улыбнулся Клементьев. — Из какого-то фильма, не помню.</p><p class="p1">— Это неправда, — серьезно сказал Трубников, — и вы знаете, что неправда. Есть люди, которым доставляет наслаждение мучить других, а наслаждение требует новизны. Человек не может уморить себя сам, можно искусственно поддерживать в нем жизнь и мучить его, и он ничего не сможет сделать. Ресурс организма велик, практически бесконечен.</p><p class="p1">Заиграла громкая, яростная музыка, из-за бархатной занавеси выбежала толстая танцовщица и принялась вращать глазами и бедрами. В «Самарканде» почти не было народу, и она сосредоточила усилия на их троице. Если присмотреться, ей было за сорок. Трубников молчал, не желая перекрикивать музыку. Подкатился кругленький татарин, везя тележку. На подносе шипело и брызгалось мясо. Татарин стремительно разложил его по тарелкам и увез поднос.</p><p class="p1">— Видите, — невозмутимо продолжал Трубников, когда музыка смолкла и танцовщица, в последний раз дернув задом, убежала за бархат. — Вас можно поджаривать на медленном огне, и кажется, что ничего ужаснее этого быть не может. А можно вдруг при этом включить громкую веселую музыку, такую, чтобы била в уши, и это будет дополнительное страдание, которого вы не предполагали. Можно вас поливать в это время кислотой. А можно сделать так, что перед вами в это время будет танцевать ваша мать, или ваша дочь. Еще можно сделать так, чтобы ее на ваших глазах терзали крючьями, не переставая вас поджаривать. Такое было, вы же читали исторические сочинения. А можно у одного столба жечь вас, а у другого жену, тоже было. В России особенно. Видите, диапазон большой, возможностей — космос.</p><p class="p1">У Свиридова пропал всякий аппетит. Клементьев смотрел в скатерть.</p><p class="p1">— С интересными мыслями вы живете, — сказал он наконец.</p><p class="p1">— Все с ними живут, только не все признаются. Кто об этом не думает — просто не информирован. Бывает полный паралич, с сохранением всей ясности сознания, и годами, десятилетиями. А меня часто мучают клаустрофобные сны — особенно когда простужен и задыхаюсь. Впрочем, иногда и безо всякой простуды. Снится, что положили в какую-то колоду и сжали ее обручами на железных винтах, открыть нельзя, но и умереть сразу нельзя — я буду там лежать, пока не задохнусь, а задыхаться буду долго. Регулярно такое снится.</p><p class="p1">— Это сердечное, — сказал Клементьев.</p><p class="p1">— Если бы сердечное, то хорошо. Это значило бы, что скоро. Но я еще в себе чувствую жизни лет на тридцать. Только во сне бывает такое отчаяние, наяву его как-то глушишь, — но, вероятно, оно и есть то настоящее, что рано или поздно настигнет. Рассудок-то почти всегда отказывает, вообще структура хрупкая. И когда с людьми сижу — я тоже почти всегда представляю: что с ними будет, если их пытать? С собой-то я это все время представляю, но бывает и с другими. Поэтому я точно знаю, что все эти прекрасные вещи, о которых вы говорите, — они ненадолго. Солидарность там, механизмы… Это значит, что просто прижали не до конца, человек и притерпелся. Он быстро притерпевается, человек — зверюшка адаптивная. А если наращивать, то никакой солидарности. В конце все с ума сойдут, а перед этим еще друг друга искусают. Причем они будут делать хитро — одних пытать больше, других меньше, чтобы и не возникло никакой солидарности. Вот в Ленинграде, вы говорите: в Ленинграде голод и холод действовали одинаково почти на всех. А они нам устроят такой Ленинград, что у одних голод, у других холод, у третьих отняли крышу над головой… Все будет разнообразно, не сомневайтесь. Двести человек — на них нетрудно придумать разное мучительство. У нас это любят. И никакой солидарности.</p><p class="p1">— Да почему любят? — не выдержал Свиридов. — С чего вы взяли, что столько садистов-любителей?</p><p class="p1">— Психотип такой, — равнодушно пояснил Трубников. — Походите в сети по садо-мазо-сообществам, почитайте рассказы, посмотрите рисунки… Вы увидите, что почти все — либо русскими руками, либо на русском материале, в неумелых английских переводах. У нас это очень любят и умеют. Просто раньше как-то распространяли это на весь народ, а теперь на один список.</p><p class="p1">— Де Сад, между прочим, был француз, — вступился Свиридов за отечество.</p><p class="p1">— А Захер-Мазох — австриец, — кивнул Трубников. — У нас бы на них никто внимания не обратил, у нас такие фокусы разыгрывались в каждой второй избе. Если не в каждой первой.</p><p class="p1">Выходили на улицу и некоторое время стояли, отыскивая тему, цепляясь за остатки разговора, вместе было тошно, по домам — страшно.</p><p class="p1">— Я хотел бы писать знаете как? — мечтательно сказал Свиридов. — Мне кажется, сейчас нужен особый стиль. Как бы подводишь, подводишь к главному, ходишь вокруг него — уже внушая читателю, что все так и будет вокруг да около, — после чего наносишь удар в яйца. Это на каком-то уровне — сам не знаю почему — совпадает с главной стилистикой момента: тебе все уже намекает, что будет именно так, не иначе. Ты все надеешься, позволяешь себе варианты. После чего тебе говорят: да-да, все именно так. И все, чему учили, правда, и все, что ты предвидел, тоже. Не рыпайся.</p><p class="p1">— Ну в общих чертах да, — вяло сказал Клементьев. Он, кажется, терял интерес к разговору. Словесность его никогда не занимала, из всех искусств важнейшим он считал телевидение как вершину прогресса. — Это сейчас общий стиль.</p><p class="p1">— Я даже знаю, почему, — предположил Трубников. — Они сначала объясняют, чтобы все среагировали. Намекают так и сяк. А потом — кто не спрятался, я не виноват. Как с Ходором. И весь список, между прочим, — намек кому-то.</p><p class="p1">— Обидно быть намеком, — буркнул Свиридов.</p><p class="p1">— Персонажем, я бы сказал, — трубил Трубников.</p><p class="p1">— Кстати, — оживился Клементьев. — Я вспомнил, что мне эта манера напоминает. Вы, Сережа, если правда будете писать, имейте в виду. Есть такая фраза — «Накрылся женской половой пиздой». Произносится с паузами. Женская… половая… ну все, человек уже думает — сейчас будет синоним, как это…</p><p class="p1">— Эвфемизм, — подсказал Свиридов.</p><p class="p1">— Точно. И тут: пизда. Вот за это его так и любят, кстати, — у него ведь все речи в этом духе. Долго подводит, потом как рубанет, — и сразу: свой, родной!</p><p class="p1">— Хороший у нас народ, — вдруг сказал Трубников. — Веселый! Ко всему привык, из всего хохму сделал. Иначе бы совсем никак. Женская половая пизда! Никогда не слышал.</p><p class="p1">— Как это вы такой чистый сохранились? — изумился Клементьев.</p><p class="p1">— А вот так! Нет, это бесподобно! — Трубников ударил себя по ляжкам и расхохотался. Рослый, очкастый, с лысым бугристым черепом, — бил себя по ляжкам и хохотал. — Точно так! Женская половая пизда!</p><p class="p1">Свиридов с Клементьевым переглядывались в тоскливом недоумении.</p><p class="subtitle">6</p><p class="p1">Половая жизнь списка была между тем бурной и лихорадочной, как всегда бывает в сообществах, достаточно запуганных, чтобы почувствовать близость смерти, но недостаточно измотанных, чтобы ощутить безразличие к жизни. В «Жерминале» читаем о паре, засыпанной в шахте. В первый день совокуплялись очень интенсивно, на второй были едва живы, на третий девушка умерла, а герой рехнулся.</p><p class="p1">В списке трахались все со всеми, как в коммуне прокаженных; конечно, с известного момента прокаженным уже не до секса, поэтому они стараются взять свое, пока не развалились окончательно. Пик сексуальной активности списка совпал с концом сентября, когда в природе все замирает в последнем напряжении, цветет последней прелестью, чтобы в ближайшие две недели лавинообразно осыпаться.</p><p class="p1">Сейчас будет песнь торжествующей любви.</p><p class="p1">Григорий Лурье трахался с Мариной Калининой. Разговаривать ему нравилось больше, чем трахаться: не то чтобы в свои сорок пять он подыссяк, но слишком грубый, требующий физических и технических навыков акт представлялся ему скучней душевной коммуникации. Настоящий секс — это, согласитесь, душами. Если бы можно было душой починить крышу на даче или ввинтить лампочку, Лурье не было бы равных. Нерукастое, языкастое племя. Всю свою жизнь как есть рассказал Марине Калининой, простой доброй девушке, и много мудрых мыслей. Марина Калинина тоже ему рассказала мудрость жизни, какую знала: как однажды с ней случилась истерика от несчастной любви, три дня плакала и все, и повезли из Москвы к деревенской тетке заговаривать. Тетка дунула, плюнула, и перестала Марина плакать, и три дня смеялась, но тут уж никто заговорить не мог: как-то так прошло.</p><p class="p1">Константин Глебов, собою гот, мистик, скальд (он произносил «скайльд»), трахался с Татьяной Гуляевой, с которой соседствовал в списке и находил в том провиденциальный смысл. Валгалла, Валгалла, северные люди. В свободное от работы время писал исторические фэнтези про воинов Света, ненавидевших мирную жизнь. Волки любят свежую кровь. Пошлой жизнью живем, один лишь только желудок. По воскресеньям, сволочи, все ездят в «Ашан», по будням ходят в «Апшу». Брезжит свет свободы над Родиной, сожжем «Ашан» и сами будем ходить в «Апшу». Вел километровые полемики в виртуальном сообществе «Русский крокодил», ей-богу, не шучу, крокодил — символ вольного Волхова, нордической нашей Ингерманландии. Давно бы уже эти люди всех переубили, кабы не ссорились постоянно между собой — кто из них хуже и потому достойней Валгаллы. Таня слушала, открыв рот, и Глебов этим пользовался, хотя нравилось ему и в валгаллище. Если б не список, долго бы ему искать девушку, никто не дает скальду. А так все-таки сближает. Ты, говорил, будешь меня провожать на битвы Света. В устной речи Глебова много было больших букв. Таня тоже не могла понять этих, которые спят с хачами.</p><p class="p1">Михаил Малахов, клерк, спал с Еленой Савиной, студенткой, медичкой. У него после списка не очень хорошо стало в карьере, на корпоративах смотрели косо, и он стал ходить на другие корпоративы — со списком. Не все ли равно, на какой корпоратив ходить? У Малахова была драма, если у клерка может быть драма. Но она может, и вот какой природы: есть люди, искренне моделирующие себя по предписанному, клерковскому образцу. Преданность корпорации, то-се. Личных качеств у них не нарастает — они заблаговременно заменяют себе всю жизнь работой, потому что про жизнь ничего не понятно, а с работой более или менее ясно, работай и все. Когда у такого человека отнимают работу, мир его рушится в три дня. Весь воющий ужас своей пустоты Малахов перегрузил теперь на Савину, студентку. Он еще работал, у него были деньги, пластиковые карточки, все как надо. Он выплачивал квартирный кредит, разрабатывал и сдавал концепции, но жить ему было некуда. Природа не терпит пустоты, и Малахов стал беспокоиться о здоровье. Здоровье сдавало стремительно. На правой ноге обнаружилась шишка, на левой похрустывал сустав. Малахов делился с Савиной всей этой информацией, Савиной было интересно, она была не бог весть какой медик, а тут столько внимания. Никто никогда так не внимал ее прогнозам и диагнозам, как Малахов. Она нашла у него много интересного, они подробно все это обсудили.</p></span>
