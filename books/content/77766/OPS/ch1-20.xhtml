<p class="p">ОТ АВТОРА</p>
</div><p class="p1">«Списанные» — первая часть трилогии «Нулевые», связанной сквозными второстепенными персонажами и типологическим сходством сюжетов, разворачивающихся в закрытых сообществах. Вторая часть — «Остров Джоппа» — сейчас дописывается, а третья — «Камск» — в стадии сбора материала. Полное издание трилогии планируется в 2009 году. Все части самостоятельны и могут существовать автономно.</p><p class="empty-line"/><p class="empty-line"/><p class="p1">Библиотека "Книга — людям"</p><p class="p1">
