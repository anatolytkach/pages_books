<p class="p">ЧАСТЬ ВТОРАЯ</p>
<p class="p">ОПИСЬ ИМУЩЕСТВА</p>
</div><p class="subtitle">1</p><div class="cite">
<p class="p1">«Дорогие друзья!</p>
<p class="p1">Все мы попали в список. Его цель и происхождение нам неизвестны. Чтобы выжить в этой ситуации, нам лучше держаться вместе. Просим откликнуться всех, кому уже сообщили о занесении. Убедительная просьба к посторонним: не записываться. Нам очень важно восстановить список целиком, что позволит догадаться о его настоящей цели. Оставьте ниже свои ФИО и контакты. Можете указать возраст, это существенно. Первая встреча списка планируется в последней декаде июля. Новости смотрите в разделе "Новости".</p>
<p class="p1">С уважением,</p>
<p class="text-author">Бодрова Светлана Викторовна, контактный телефон…»</p>
</div><p class="p1">СПИСОК</p><p class="p1">Карнаухов Игорь Владимирович, 1967 г. р.</p><p class="p1">Семенова Надежда Григорьевна, 1958</p><p class="p1">Саломатин Николай Михайлович, 1941</p><p class="p1">Голышев Кирилл, 1990</p><p class="p1">Бурцева Елена Даниловна, 1972</p><p class="p1">Матвеева Ирина, 16 лет</p><p class="p1">Сергей Шевченко, 23</p><p class="p1">Святослав Владимирович Мирский, 1955</p><p class="p1">Лурье Григорий Наумович, 1959</p><p class="p1">Кротов Константин Михайлович, 1948</p><p class="p1">Носкевич Галина, 19…</p><p class="empty-line"/><p class="p1">Тенденция не просматривалась.</p><p class="p1">Свиридов глубоко вздохнул и добил в белый прямоугольник внизу: «Свиридов Сергей Владимирович, 1979».</p><p class="p1">Из пятидесяти семи записавшихся нашелся один ровесник — Парамонова Елена Максимовна. Хорошо, что девушка. Вероятно, список составлен с целью подобрать для всех идеальные пары. Скрестить сорокавосьмилетнего семита Лурье — вероятно, лысина, усы, трубка, скепсис, — с белокурой белоруской Носкевич, 19. С виду робкая, в постели неожиданно страстная, готовит, стирает, ревнует. У Лурье московская прописка, у Носкевич неутомимая детородность, потомство лысое, страстное, скептическое, стирает. А мне ровесницу Парамонову, всегда любил ровесниц. Он помедлил, подведя курсор к слову «Добавить» справа от белого прямоугольника. Заносить себя в список, даже на бронь в кинотеатре, всегда страшновато: клик — и на тебя начали распространяться чужие закономерности. Бодровский список больше всего напоминал жуткие расстрельные перечни, публиковавшиеся в «Вечерке» обществом «Мемориал» в начале девяностых, или отчеты о немецких карательных операциях, — но в любом списке есть обреченность: узнан, вычислен, учтен. Если перечень товаров в интернет-магазине так и дышит сытостью и благостью — кого хочешь выбирай, все счастливы себя предложить в реализацию, — любой человеческий перечень, даже список принятых абитуриентов, отдает хлоркой. Ужасна одушевленность. Но ничего не поделаешь, все в списках от рождения. Он кликнул и добавился пятьдесят восьмым.</p><p class="subtitle">2</p><p class="p1">Бодрова Светлана Викторовна предусмотрела на сайте три раздела: главный, новости и форум. На форуме обсуждались версии. Их разброс поразил Свиридова.</p><p class="p1">При первом веянии свободы — на форуме не обязательно было выступать под собственным именем, допускался ник, — все радостно попрятались за псевдонимы. Хлебом человека не корми, дай сбежать от себя. Он все надеется, что Карнаухов Игорь Владимирович умрет, a Pesik останется. Впрочем, под Песиком наверняка скрывался кто-нибудь помоложе. Под собственными именами выступали только те, кто придавал своим мнениям особое значение: это сказал именно Галантер, именно Стариков, никто иной. Форум был создан недавно, меньше недели назад, и высказаться успели немногие; завелись свои завсегдатаи, особо активные персонажи, неустанно извлекавшие из реальности новые подтверждения своих догадок. Было бы естественно предположить, что Лурье объявит все происками кровавой гебни, но эта концепция активней всего отстаивалась девушкой под ником Whiterat. Белая Крыса была убеждена, что каждый в списке как-нибудь досадил властям, только не признается. За собой она знала немало прегрешений — например, добровольное участие в первом марше несогласных. Она, по ее свидетельству, просто шла и вручала ОМОНу цветы. Здесь же размещалась фотография — невысокая Крыса в бежевом плаще, снятая со спины, раздает хризантемы типа «дубки». Неудивительно, что ее сразу поментили. В автобусе с другими задержанными распевала «От улыбки хмурый день светлей». Никто, правда, не подпевал. В том, что Белая Крыса выбрала такой ник, отразилась вся ее натура: ей нравилось любить то, чего все боятся, и всячески это демонстрировать. Кровавая гебня ей была необходима, как воздух. Она не мыслила жизни без кровавой гебни. Ей убедительно возражал Пахарь, он же Пахарев, 1969 года выпуска: Пахарь упрекал Крысу в трусости и поиске происков, в то время как список, думалось ему, не репрессивная мера, а попытка отобрать достойнейших, дабы в скором времени всех обеспечить деликатным заданием. Его идея была отчасти сродни заморочке шурина Юры, свято уверенного, что его не назначили в изгои, а избрали в спасители. «Мы здесь для того, чтобы действовать сообща», — уверял Пахарь. Цыганка Аза была почему-то уверена, что все участники списка виновны в сокрытии доходов, хотя лично за собой не знала такого греха; ее дискурс был наиболее показателен — она точно знала, что попала в список по ошибке, но знала и причину этой ошибки. Дело в том, что она позже, чем надо, подала налоговую декларацию, надо было до 30 апреля, а она из-за праздников подала только 10 мая; но, видимо, список неплательщиков был сформирован до праздников, и его не успели исправить, хотя теперь исправят обязательно. Ей советовали сходить в налоговую и проверить догадку, и она обещала в ближайший четверг — налоговая в их районе работала по сложному графику, да и сама она, малый предприниматель, была занята по суткам. Старый Мельник предположил, что главная цель списка — коль скоро большинство обнаружило себя в нем при пересечении границы, — заключалась в принудительном удержании дома наиболее талантливых людей, представляющих ценность для отечественной науки; объяснить пребывание в списке шестнадцатилетней балбески Матвеевой он не мог, но, может, она хорошо училась? Сама Бодрова, 1951, организатор и вдохновитель всех наших побед, предполагала, что в список внесены наиболее очевидные кандидаты на льготы, и теперь за ними наблюдают на предмет соответствия параметрам: действительно ли они так бедны или могут потерпеть? Бодровой было пятьдесят шесть, она страдала гипертонией и диабетом, работала бухгалтером, жила с дочерью и при ее помощи оборудовала сайт; непонятно было, почему она выбрала говенно-морковный фон, тревожный, как ноябрьская заря. Ей аргументированно возражали прочие списанты (кроме этого самоназвания, были еще «списанные», «списочники», «листеры» и один раз «контингент»): никто из них не нуждался в государственной помощи. Обеспеченные люди, ты что.</p><p class="p1">Свиридов листал форум и возвращался к списку на главной странице, ловя себя на стыдноватой радости: он не один, те же проблемы как минимум у пятидесяти семи сограждан, и число их росло ежедневно, ибо до ста восьмидесяти оставалось еще много. Правда, к радости примешивалась легкая брезгливость, будто высморкался в чужой платок или посидел в сортире, хранящем чужие газы. Свиридов был с детства болезненно щепетилен во всем, что касалось гигиены. Это не у листеров были его проблемы, это у него оказался их микроб, общая инфекция — и разделять с двумя сотнями сограждан их ужас и любопытство было так же противно, как соприкасаться с их шубами в метро. В его жизнь властно влезли сто восемьдесят человек, пятьдесят семь из которых уже обрели лица и имена. Свиридов был теперь уже не сам по себе, но один из них, — и это было самое противное; если ты умираешь в чумном бараке, под стоны сотни себе подобных, — ты не так прожил жизнь. Чем отдельнее от всех становишься, тем правильней вектор; лучшая смерть — та, которой вообще никто не увидел. Где-нибудь в горах, на леднике, среди снежной пустыни. Он с детства, с книг об освоении планеты представлял это так и завидовал. В некотором смысле и отцу повезло — его никто не видел мертвым, взял и избавил всех от себя, чего лучше?</p><p class="p1">— Мать, — сказал он, позвонив домой. — Оказывается, нас тут в списке сто восемьдесят человек, и уже есть свой сайт в интернете.</p><p class="p1">— Ну и что пишут? — кисло спросила мать.</p><p class="p1">— Пишут, что никто ничего не знает. Люди приличные, не зэки, не бомжи. Средний класс, типа меня.</p><p class="p1">— Очень утешительно. Ты связывался с этими из «Дня»?</p><p class="p1">— Они обещали перезвонить, очень извинялись.</p><p class="p1">— Я из их извинений шубу не сошью.</p><p class="p1">— Ладно, ладно. Я их разорю и не потерплю.</p><p class="p1">Из «Дня» никто не перезвонил, но во вторник вышло опровержение на четверть полосы: после проверки фактов наличие списка персон, не допущенных к работе на телевидении, не подтвердилось. Корреспондент Евгений Соломин наказан. Редакция приносит свои извинения Владимиру Кафельникову, традиционно начинающему свой день с просмотра газеты «День», и Сергею Свиридову, уволившемуся из компании «Экстра» по собственному желанию в связи с переходом в новый проект.</p><p class="p1">Ни о каком новом проекте Свиридов не слышал, но на сотрудничестве с «Родненькими» история с поводком никак не сказалась. Разработку по инцесту приняли благосклонно. Вечером во вторник позвонил Рома.</p><p class="p1">— Ну? — спросил он триумфально. — Читал?!</p><p class="p1">Рома был пьян, но еще вменяем.</p><p class="p1">— Читал, спасибо. Что ты с ними сделал?</p><p class="p1">— Я? Я ничего. Буду я делать со всякими. — Рома был в той стадии, когда эйфория переходит в злобу. Он их сделал, но они не стоили того, чтобы он их делал. — Они кто такие? Они говно. Роман Гаранин будет с ними разбираться? Шутишь! — Он свистнул. — Я сделал один звонок. И еще один человек сделал один звонок. И тот мент, который на тебя настучал, будет искать другую работу. А человек, который это поставил в номер, будет два месяца пахать бесплатно, на штрафы. Вот и все, и ничего не надо было делать.</p><p class="p1">— Рома, — вставил Свиридов. — Но список-то есть.</p><p class="p1">— Список? Какой список?</p><p class="p1">— Я не знаю, какой.</p><p class="p1">— Ну не знаешь — и сиди. Я сам, знаешь, в таком списке, что мало не покажется. Меня Бурмин терпеть не может. — Бурмин, генеральный продюсер Центрального, действительно в нескольких интервью указал на опасность «блок-бастеров гангстерского жанра, ориентирующих молодежь на сомнительные идеалы девяностых». Говорили, что этот выпад против Гаранина, друга детства, с которым они вместе росли на Николиной Горе и еще там чего-то не поделили, стоил Бурмину серьезного кремлевского разноса: на самом верху «Команда» понравилась. — Я должен был вести «Звезд в деревне», а ведет Базаров. Это что, тоже список? Все в списках, забудь.</p><p class="p1">— Ром, спасибо, — прочувствованно сказал Свиридов. — Если б ты еще, прости за наглость, подхарчиться помог — а то «Спецназ»…</p><p class="p1">— Позвоню, — буркнул Рома и отрубился. Свиридов допустил непростительную оплошность: не дал Роме насладиться победой, рассказать об одном решающем звонке, о чародеях, готовых отстроить прессу по первой его жалобе, — но Рома спьяну все забудет. Да и еще не хватало пресмыкаться.</p><p class="p1">В четверг с утра ему позвонила Бодрова. Голос оказался бодрый. Полезная вещь гипертония, особенно когда служит не препятствием, а главным содержанием жизни.</p><p class="p1">— Сергей Владимирович! Здравствуйте. Из списка беспокоят.</p><p class="p1">— Слушаю вас, — насторожился Свиридов. Он ничего не мог с собой поделать — любая новость относительно списка заставляла его трепетать.</p><p class="p1">— Хотим предупредить, чтоб не забывали нас. Это Бодрова Светлана Викторовна. — Свиридов ненавидел, когда так представлялись. В документах пиши фамилию первой, но в жизни изволь начинать с имени. — Вы в субботу в Москве?</p><p class="p1">— В Москве.</p><p class="p1">— Первая встреча списка намечена на перроне Ярославского вокзала в девять ноль-ноль утра, пятая платформа, девятый путь. Не опаздывайте!</p><p class="p1">В голосе Бодровой звенело организационное счастье.</p><p class="p1">— Хорошо, буду, — сказал Свиридов. Он сам не знал, обрадовало или напугало его это сообщение, но лучше внести хоть какую-то ясность. Ему казалось, что при первом взгляде на списантов он определит цель всей затеи, — но на это, как оказалось, надеялись все.</p><p class="p1">На сайте к субботе отметились уже семьдесят восемь человек.</p><p class="subtitle">3</p><p class="p1">Пришли, конечно, не все — всех вряд ли вместил бы один вагон. Народ толпами ломился на природу, благо воздух посвежел и дикая жара, сонным чудовищем лежавшая на Москве, сползла на восток. Бодрову Свиридов опознал немедленно: это была разновидность кафельниковской секретарши Марины, не испорченная близостью к начальству. Женщина с огоньком, туда-сюда, организовать помники, порубить салат, всплакнуть, спеть, скинуться на сироток, сходить в поход в тренировочных штанах, собрать выпускников, всем ужас — смотреть друг на друга через тридцать лет, а ей радость — послужила коллективу. Бодрова была в зеленых брезентовых брюках и розовой майке с коротким рукавом. В руках у нее был список, в котором она проставляла галочки. Свиридов подошел и отметился.</p><p class="p1">— Та-ак, — ласково пропела Бодрова, окидывая Свиридова оценивающим взглядом. Для каких-то тайных целей он подошел — молодой, рослый. В баскетбол поиграть на пляже, дров порубить для костерка. — Это у нас Сергей Владимирович. Спасибо за сознательность. Погодите пока, мы отъезжаем в девять сорок на Алтырино.</p><p class="p1">Вот я и не просто Сергей Владимирович, а Сергей Владимирович у нас. Все-таки надо было уговорить Альку. Накануне Свиридов — по возможности небрежно — рассказал ей все о списке, начиная с задержки в аэропорту, и о первых последствиях.</p><p class="p1">— Что из «Спецназа» ты полетел, это очень хорошо, — сказала она задумчиво, — я еще тогда обрадовалась. А что вписался — это зря.</p><p class="p1">— А что такого?</p><p class="p1">— То, что вы сами себя и записываете. А никакого списка нет.</p><p class="p1">— Да, да, — кивнул Свиридов. Он узнал ее логику. — Что мне не нравится, того не бывает.</p><p class="p1">— Если хочешь.</p><p class="p1">— А тебе самой не интересно посмотреть, что там за люди?</p><p class="p1">— Я представляю.</p><p class="p1">Это высокомерие он ненавидел — почти так же сильно, как любил в ней все остальное.</p><p class="p1">— И что ты представляешь?</p><p class="p1">— Перепуганную кучу беспомощных людей, не умеющих ничего переживать в одиночку.</p><p class="p1">Он еле сдержался, чтобы не наговорить ей всякого. Трудно было представить, как она станет переносить его неудачи или болезни, если все-таки согласится.</p><p class="p1">— Слушай, а прикинь — я попал под машину. Ты мне тоже предоставишь подыхать в одиночку, чтобы не грузил?</p><p class="p1">— Ой, не начинай!</p><p class="p1">— Что не начинать?</p><p class="p1">— Передергивать. Если ты попадешь под машину и будешь после этого общаться только с калеками — я точно уйду.</p><p class="p1">И ведь уважала себя за честность, черт бы ее драл! Красивая, здоровая, победительная — таким легко презирать ундерменшей; таких и любят — а не робких, милосердных, сострадательных, шатаемых ветром, самих бы кто спас… Помочь может только сильный, и она вытащила бы его, если бы захотела; а предлагают свою помощь только слабые, покупающие себе любовь, — кто бы их иначе заметил? Он не стал ее уговаривать и, против обыкновения, Не позвал к себе. А она бы, кажется, пошла, — по некоторым признакам замечалось расположение; нечего, нечего. Дом инвалидов закрыт, все ушли в поход.</p><p class="p1">…Списанты переглядывались с застенчивой радостью. Так в больнице, в палате обреченных, где все двадцать раз друг другу надоели храпом, жалобами, стонами, родней с баночками и судками (причем эта родня вечно не знает, о чем говорить с обреченными, а сразу уйти ей неловко) — с гадкой радостью смотрят на каждого нового человека: нашего полку прибыло, теперь и на тебе клеймо! В отношении к новичку тонко сочетаются злорадство, сочувствие и даже стыдливая благодарность: присоединился, не побрезговал. Так все и смотрели друг на друга, хоть и не поняли до конца, в позорный список попали или в почетный; но у нас ведь разница невелика — как между лепрозорием и вендиспансером. Первое, конечно, трагичней, второе неприличней, но ощущения сходные.</p><p class="p1">— Ну что, коллеги? — неловко улыбаясь, сказал Свиридов. Обращение «коллеги», введенное в моду президентом, оказалось универсальным, как все безликое: так можно было обратиться хоть к студентам, хоть к сокамерникам, ибо в смысле главной профессии — проживания здесь — коллегами были все.</p><p class="p1">Ему поулыбались.</p><p class="p1">— Мы куда едем-то? — спросил он, оглядывая собравшихся и не замечая среди них, увы, симпатичных девушек: никакой страх не отбивал основного инстинкта.</p><p class="p1">— Не боись, пока не в тундру, — откликнулся мужичок-балагур лет сорока.</p><p class="p1">— В Морозовскую, на дачу ко мне, — виновато сказал его ровесник, наглядный, хоть в учебник. По наблюдениям Свиридова, большинство сорокалетних мужчин с клинической четкостью делились на эти два типа — если, конечно, не достигали финансовых или карьерных высот, кардинально меняющих всю антропологию. Первые становились неунывающими крепышами, назойливыми остряками, из тех, что в купе немедленно организуют выпивку; вторые превращались в вечно печальных рабов семьи, кротких обреченных работяг с редкими внезапными вспышками пьяной злобы. Других выходов из кризиса среднего возраста он не наблюдал. — От Алтырина двадцать минут пешком. У меня машина вообще, но не влезем же, — добавил он поспешно. Ему обязательно надо было сказать, что есть машина. — На машине супруга поедет, приготовит там все… — Теперь надо было сказать, что есть супруга. Это не список заставил его вечно оправдываться — это сам он всегда был таким, изначально готовым попасть в список, под чужой нелюбящий взгляд, придирчиво спрашивающий: машина есть? супруга? ну, годен…</p><p class="p1">Удивительно, до чего типичные представители собрались на платформе. Свиридов не мог отделаться от поганого чувства, что всех этих людей когда-то видел, и даже недавно, и даже вместе. Вероятно, список подбирался именно по этому принципу: выраженный, законченный, без проблеска своячины тип от каждого социального слоя. Так могли подбирать инопланетяне, составляющие из человеческих особей грядущий зоопарк. Человек только тем и интересен, чем отклоняется от страты, — но здесь не отклонялся никто: классическая профсоюзница командовала, классический остряк острил, типичный дачник катил перед собой, как тачку, типичную участь дачника, которому давно не нужны ни свежий воздух, ни свежие ягоды, но деваться от участка некуда; участок, участь… Поодаль двое образцовых инженеров длили образцовое пикейное гадание на газетной гуще, архетип матери-одиночки сжимал ручку архетипической бледной девочки с крысиными хвостиками косичек, и совершенный в своем роде представитель творческой профессии, напрягая пугливое воображение, с омерзением и любопытством разглядывал товарищей по участи, ощущая себя не то первым, не то последним среди них. Кто бы ни был составитель этого списка, у него получилось неинтересно.</p><p class="p1">Среди идеальных экземпляров Свиридов разглядел мужчину лет пятидесяти, не сразу поддававшегося классификации; к нему он и подошел, заискивающе улыбаясь. Несмотря на раннюю жару, его поколачивал легкий озноб, надо было немедленно с кем-то поговорить о происходящем — носить в себе одинокую тревогу было невыносимо. Тот, кого он выделил, — высокий, рассеянный, смуглый, с залысинами, одетый в красную ковбойку и брезентовые дачные штаны, — посмотрел на него дружелюбно, и Свиридов, стремительно реагирующий на любую мелочь, тут же успокоился.</p><p class="p1">— Ну что, — спросил смуглый, — какие предположения?</p><p class="p1">— Никаких, — пожал плечами Свиридов. — Допускаются же два — на отстрел и на повышение.</p><p class="p1">— Не скажите, не скажите, — усмехнулся новый знакомец и протянул ему пачку «Кэмела». Свиридов взял сигарету. — Меня зовут Клементьев Игорь Петрович.</p><p class="p1">Свиридов представился в ответ.</p><p class="p1">— Отстрел и повышение — слишком бы просто, — неспешно продолжал Клементьев. — Вы как узнали?</p><p class="p1">— На таможне задержали, в Крым летел.</p><p class="p1">— А мне на работу спустили — я в НИИ транспорта работаю, на Алексеевской, слышали?</p><p class="p1">— Слышал, — соврал Свиридов.</p><p class="p1">— Вот. Завотделом. И начальство стало проверять — интересно же. Дошли до министра, наш директор с ним учился когда-то. Так и он не знает.</p><p class="p1">— Он же преемник, говорят, — щегольнул осведомленностью Свиридов.</p><p class="p1">— Говорят, — кивнул Клементьев. — Но и он не в курсе. Так что это совсем, совсем не на отстрел… Это гораздо интересней.</p><p class="p1">— И?</p><p class="p1">— Погодите, надо посмотреть. Это ж у нас первая встреча… Вы за собой ничего такого не знаете?</p><p class="p1">— Ничего.</p><p class="p1">— Вот и все так.</p><p class="p1">— Но с работы уже поперли. Я сценарист, с картины слетел.</p><p class="p1">— Ну? — удивился Клементьев. — Очень странно. Хотя, если вдуматься…</p><p class="p1">— Что-то вы темните.</p><p class="p1">— Ничего не темню. Приедем к Вулыху на дачу — это Вулыха дача, вы в курсе? — там за шашлычком поделюсь соображениями.</p><p class="p1">Подошла электричка, и списанты, толкаясь, набились в нее. Последним, пыхтя, примчался к перрону шурин Юра. По случаю субботы народу было полно — все валили за город спасаться от бессмысленных и затратных городских удовольствий. Как в любом замкнутом сообществе, хоть и собравшемся на полчаса, каждый старался доказать соседу хоть копеечное, а преимущество, словно всех везли в концлагерь, и от того, кто и как поставит себя в вагоне, зависела будущая барачная иерархия. Свиридов приметил тройку особо гоготливых субчиков, одетых вызывающе не по-дачному, — он худо разбирался в лейблах, но отличал фирму от китайпрома. Троица гоготала, материлась, глотала пиво, приставала к девчонкам, задирала толстяков, пропихивавшихся к выходу. Обычно такая публика выезжала на загородные увеселения не иначе как джипами — Свиридов затруднялся понять, что они делают в электричке. Он не мог допустить, что сломались сразу три джипа. На секунду он поймал на себе скользящий взгляд одного из тройки, самого злобного, — взгляд был неуверенный, обрывающийся, как вытертая изнанка шикарной шубы; он глянул на злобного в ответ — тот сразу потупился. Господи, с ужасом подумал Свиридов, хоть бы эти не из наших; принадлежать к сообществу заведомых лузеров было все же легче, чем воображать перспективу такого соседства. Но когда через сорок минут списанные вывалились на алтыринский перрон, сомнений не осталось: трое в пляжных рубашках с пальмами были из нашего лепрозория. Впрочем, с типичностью и у них все обстояло на ять.</p><p class="p1">Долго шли по выбитой глинистой тропе через деревеньку, потом через золотое поле — наши дамы заахали; между инженерами вспыхнул спор о том, как отличать пшеницу от ржи. Свиридов взмок. Перелесок повеял недолгой прохладой, уксусным запахом пней, тройка пляжных с хохотом пинала чернильные грибы-зонтики. За лесом потянулись участки, на которых, задрав линялые задницы, копошилось последнее поколение дачников: молодежь на участках в лучшем случае валялась по гамакам или жарила пресловутый шашлычок, в худшем отсутствовала вовсе.</p><p class="p1">— Далеко к тебе, дядя. Не мог поближе построиться, как люди? — сказал Вулыху злобный и надвинул ему на нос полотняную кепку.</p><p class="p1">Вулых виновато улыбнулся. Свиридов твердо решил осадить тройку, когда она залупится в следующий раз: все только отвердевало, и дать им слишком много воли означало конституировать такое положение на все время существования списка. Бог его знает, сколько нам оставаться вместе. Он переглянулся с Клементьевым, тот пожал плечами. Скоро они свернули с асфальта на гравий и обнаружили двухэтажный кирпичный дом, слишком, пожалуй, приличный для потертого Вулыха. В открытом гараже просматривалась синяя «мазда». Начиналось нетипичное.</p><p class="p1">Крупная тетеха в холщовом белорусском сарафане шла отпирать высокие решетчатые ворота.</p><p class="p1">— Принимай, мать, — приветствовал ее Вулых.</p><p class="p1">— Очень рада, добро пожаловать, — пропела тетеха. — Галина Михайловна, очень рада.</p><p class="p1">Участок был ухоженный, сплошной газон с беседкой и качелями, так что прямой необходимости тащить пятьдесят человек на садовые работы не было. Выезд явно задумывался ради знакомства. Свиридову досталась электрокоса, посредством которой он должен был превратить газон из ворсистого в щетинистый, но трава и так плохо росла из-за жары. Он вяло описывал полукружья оббитым стальным диском, от которого в стороны разлеталась травяная пыль. Прочие собирали сучья для костра, двоим выпало красить свежевозве-денный сарай, инженеры занялись проводкой (Вулых жаловался, что барахлит), женская часть списка расселась в беседке или собирала смородину вдоль забора. Шурин Юра выстрагивал лук для девочки с крысиными косичками, других детей в компании не оказалось. Бородач с гитарой мечтательно настраивал обшарпанный инструмент.</p><p class="p1">— Ты не писатель будешь? — спросил его один из тройки, весь приплюснутый — низкорослый, с плоским лицом и вдавленной переносицей. Почему-то подобная публика сразу идентифицировала Свиридова как писателя.</p><p class="p1">— А что? — спросил Свиридов. Сказать «да» или «нет» значило принять тон.</p><p class="p1">— То, что руки не под то заточены, — сказал приплюснутый. — Кто так косит? Ты косилку в руках держал вообще?</p><p class="p1">Свиридов молча выключил косу и протянул приплюснутому.</p><p class="p1">— Покажи класс, брат, — сказал он прочувствованно. — Давно хотел у профи поучиться.</p><p class="p1">Приплюснутый сплюнул и отошел.</p><p class="p1">— Нет, ну ты покажи! — крикнул Свиридов вслед. — Покажи, всю жизнь мечтал!</p><p class="p1">— Щас достану и покажу, — огрызнулся приплюснутый. Свиридов не стал его догонять, включил косилку и продолжал бессмысленно брить газон. В драке он наверняка проиграл бы, но из-за роста выглядел менее уязвимым, чем ощущал себя в действительности. Впрочем, он давно не дрался — в последнее время так злобился на себя и судьбу, что мог и заломать противника, чем черт не шутит.</p><p class="p1">Общественные работы продолжались часа два. Свиридов краем глаза заметил, что Клементьев окапывал яблоню, но проносившиеся через участок списанты — кто в сарай за суперфосфатом, кто к костру с ветками — тут же затаптывали вскопанное. Все преувеличенно толкались, смеялись и шумно восхищались шашлыком, загодя замаринованным самкой Вулыха. Свиридов чувствовал себя идиотом — он и в досписочное время ненавидел дачные выезды и загородные компании, к шашлыку не чувствовал ни малейшего влечения, а от авторского пения под гитару сатанел с детства. Тут ложью было все — романтика, дружество, пленэр, — » эрзац-шашлык на эрзац-природе под эрзац-песню, с той же примерно искренностью взаимного притяжения, с паленой водкой из пластиковых стаканчиков, и каждый в глубине души чувствовал всю второсортность такого отдыха, но старательно имитировал эйфорию, непонятно только зачем. Впрочем, тоже бином — это ведь были, как правило, выезды коллег, в последнее время называющиеся тимбилдингом. Надо было продемонстрировать компанейский нрав, кооперативность, локоть — как еще у них там называется эта теплая сплоченность ненавидящих друг друга особей, которые с визгом подхватывают босса, спиной падающего с сосны? Выезд лепрозория на природу, не хватает только персонала, заказывающего бегать слишком быстро: голеностоп отвалится, у нас, прокаженных, это запросто.</p><p class="p1">Галина певуче позвала всех к костру, поблизости Вулых колдовал над мангалом, бородач перебирал струны, а единственная симпатичная особа лет тридцати — вероятно, Елена Бурмина, — яростно кромсала зелень. По бумажным тарелкам раскладывались неровные бутерброды с сыром и ветчиной. Человек, похожий на Карнаухова, — в его клочковатой седине так и чувствовалась карнаухость, как привык представлять ее Свиридов, — извлекал из ведра с ледяной водой многочисленные бутылки «Русского стандарта». Надо было подойти к Бодровой, узнать, по сколько сбрасывались, — со Свиридова никто не взял денег, а угощаться на халяву он не привык.</p><p class="p1">В три пополудни началось скромное пиршество. Первый тост произнес предполагаемый Карнаухов, оказавшийся, впрочем, Смирненковым. Свиридов нащупал новый возможный принцип объединения: фамилии у всех были на редкость нейтральные, вообразить по ним можно было кого угодно. Набоков месяц корпел над списком Лолитиных однокашников по рамздэльской гимназии, если не врал и не перекатал его из местной телефонной книги, но за Виолой Мирандой или Кеннетом Найком мерещатся такие ассоциативные бездны, что обозначается хоть мерцающий силуэт, — а из всего своего списка Свиридов мог вообразить лишь Григория Наумовича Лурье, да и то не имел возможности сверить его с реальностью, ибо Лурье собранием манкировал. Что мы видим при слове «Смирненков»? Честно говоря, маленькую бутыль смирновской. Смирненкову было за сорок, он обладал широкими сутулыми плечами, бугристой головой и деревянным голосом, каким в старых мультах разговаривали мудрые пни, наставляя не в меру резвых зайцев.</p><p class="p1">— Дорогие товарищи! — сказал он и переждал волну неизбежных выкриков «Товарищей давно нету». — Нет, есть. Я хочу, понимаете, этому, так сказать, слову «товарищи» вернуть его, так сказать, смысл. Мы очень в последнее время увлеклись словом «товар», но происходит-то не от этого слова! Нет, мы товарищи потому, что мы одного поля и как бы одной крови, вот так я позволю себе сказать, хотя мы видим тут все друг друга впервые. Я предложил бы, товарищи, посмотреть, так сказать, с другой стороны. У нас всех, конечно, в связи с этим нашим статусом небольшие проблемы и так дальше, и так дальше. Но я хочу сказать, что даже если мы имеем список на что-то плохое, есть, так сказать, и хорошая сторона. Мы, можно выразиться, расширили круг общения, вот появились у нас новые друзья, а так мы вряд ли собрались бы в субботу, всё на диване и на диване. И лично я так предполагаю, хотя меня, так сказать, и прорабатывали всегда друзья за неуместный, как говорится, оптимизм, но есть мысль, что вовсе и ничего страшного. Что это, может быть, простите за фантазию, так? — что это, может быть, просто чтобы люди начали общаться. Вот так их разбить по спискам, по компаниям, и чтобы началось наконец нормальное общение, а то все чрезвычайно разобщены. Я сам военный, так, в отставке, так? — и должен сказать, что коллектив все-таки не самое последнее дело. А сами бы никогда не организовались, потому что мы так живем, ждем, когда нам подскажут. И я поэтому хочу поднять, так сказать, бокал, стакан — за то, чтобы мы даже из плохого сделали хорошее, а может, и не будет плохого. В общем, как говорится, за почин! — и залпом выпил.</p><p class="p1">— А он дело говорит, — тихо сказал Клементьев.</p><p class="p1">— Какое дело?</p><p class="p1">— Насчет посмотреть с другой стороны, — хитро ответил Клементьев, склонив голову набок и оценивающе глядя на Свиридова.</p><p class="p1">— Оптимистами все стали, сил нет, — буркнул Свиридов.</p><p class="p1">— А вы сами подумайте — нельзя же так сужать спектр! Я понимаю, конечно, что история давит. Но в этой истории всякое бывало, не только расстрельные списки. Почему бы вам не предположить, — Клементьев оглянулся на внимательно слушавшую кореянку лет двадцати пяти и поощрительным кивком вовлек в беседу, — что весь этот список единственной задачей имеет структурирование?</p><p class="p1">— Структурирование чего? — не понял Свиридов, в ожидании доспевающего шашлыка обманывая голод сырным бутербродом.</p><p class="p1">— Вот хотя бы общества. Его главная беда сегодня — бесструктурность. Нарушение горизонтальных связей. А без них вертикальные не действуют, я вам как конструктор скажу. Можно надавить сверху, но давление будет точечное. Что-то проваливается глубже, что-то не поддается вообще. А когда общество прошито на горизонтальном уровне, — он начертил в воздухе решетку, — тогда можно эффективно управлять. Мы знаем один список, но их наверняка больше. Может быть, десятки.</p><p class="p1">— И где они все? — спросила кореянка. Ей начинала нравиться эта гипотеза.</p><p class="p1">— Со временем объявятся. Сама идея элегантная, почему я и думаю, что это не единичный случай. Объединить людей не по изначальному признаку, а по тем, которые выявятся в процессе. Скажем, мог быть список блондинов, или кавказцев, или евреев. — К их разговору прислушивалось все больше народу, и это было отвратительно — Свиридов не умел откровенничать прилюдно, а Клементьев говорил интересно, жаль прерывать. — А можно так: выявим тех, кто готов подключаться к списку в интернете. Как себя поведут? Это же выявление нескольких вещей сразу: инициативность, готовность к сотрудничеству, выезд вроде нашего, способность к коллективному труду, я не знаю, еще какие-то признаки — это уже к социологам, если есть социологи. Есть социологи? — крикнул он погромче.</p><p class="p1">— Менеджер по персоналу есть! — отозвался один из тройки.</p><p class="p1">— Ну вот, хоть так, — продолжал Клементьев. — А дальше другие списки, другие структуры, с новыми задачами. С этого всегда начинают, когда надо создать управляемое общество: творческие союзы, профессиональные объединения, профсоюзные ячейки — это все искусственные горизонтальные связи. Но это оказалось неэффективно и в конце концов погубило советскую власть — потому что у каждой касты свои ценности и свои привилегии. А здесь не профессиональный, и не национальный, и не другой признак — а живое творчество в действии. И все зависит от нас.</p><p class="p1">— По-моему, — негромко сказал Свиридов, стараясь отсечь от разговора максимум посторонних, — вы приписываете им слишком сложные мотивации. Все гораздо проще.</p><p class="p1">— Например?</p><p class="p1">— Например, люди, чья профессия признана неэффективной. Эффективных осталось две — те, кто сидят на трубе, и те, кто чешет им пятки. А вы с вашими новыми вагонами и я с моими сценариями можем идти лесом.</p><p class="p1">— Но ведь им надо в чем-то ездить? — спросил Клементьев. — Что-то смотреть?</p><p class="p1">— Будут ездить в чешском и смотреть американское.</p><p class="p1">— Ну нет, это вы себя недооцениваете. Наоборот, им нужно только свое. И вы зря все ограничиваете нефтью. Если посмотреть данные за последний квартал, то по перерабатывающим рост уже опережает добывающие…</p><p class="p1">Свиридов не был готов спорить на этом уровне. Он ничего не понимал в статистике и доверял интуиции, а интуиция говорила, что все неконкурентно, кроме нефти. Подоспел шашлык, и Вулых принялся радостно раздавать шампуры. На другом конце лужайки, под березой, разгорелась дискуссия о преимуществах «лексуса» перед «брабу-сом». Это было еще непонятней, и Свиридов лишний раз выругал себя за некомпетентность во всех делах, составляющих истинную жизнь. Он получил порцию сырого шашлыка и выпил второй стакан — под тост такого же сырого толстяка за гостеприимных хозяев.</p><p class="p1">— И какова перспектива? — спросил он прилежно жующего Клементьева.</p><p class="p1">— Ну, это я не знаю. Но предположить, что вся отечественная социология только замеряет данные к будущим выборам, — никак невозможно. С выборами все понятно, а должны же они и еще что-то делать. Допустим, есть случайная выборка людей, занятых на коллективном производстве: обратите внимание, даже у вас коллективное. Хотя вы сценарист. Но в сериале это общее дело, без кабинетного творчества.</p><p class="p1">— Ну допустим, — согласился Свиридов.</p><p class="p1">— И они смотрят, как эти люди сорганизуются. Образуется ячейка, завязываются связи, преодолевается изоляция, из-за которой каждый за себя. Возникает социальная солидарность, которой сейчас нет — а она нужна, потому что без нее не будет работать никакое государство. Взаимопомощь, информационный обмен, — в общем, все работает. Это их кто-то надоумил, или сами они дошли, что у нас достаточно составить список — и мгновенно образуется плотная структура. А представьте себе несколько пересекающихся списков, с общими членами. Это уже модель общества, разве нет? Вы заметили, какая сейчас мода на одноклассников?</p><p class="p1">— Ой, точно! — вступила бледная девица с черными прямыми волосами. — Это эпидемия какая-то. Ввсе ищут одноклассников. Мне сколько хочешь заплати — я не пойду на эти рожи смотреть. А они добровольно рыщут.</p><p class="p1">— И земляков, — добавил кроткий очкарик лет двадцати, высокий и анемичный. — Прямо помешались все. А у тех, кто из Грозного и Припяти, два таких сообщества — мама дорогая. Тоже все встречаются. Городов нет давно, так они виртуально восстанавливают, кто с какой улицы. Недавно из Грозного двое нашлись, так друг друга ненавидели, всю школу дрались. А теперь неразлейвода.</p><p class="p1">— На том свете так и будет, — сказал Свиридов. — «Вы из Рязани? А с какой улицы?» Здесь — всю бы жизнь друг друга не видать, а там будут как братья. Кстати, с Профсоюзной есть кто?</p><p class="p1">Никто не откликнулся.</p><p class="p1">— Так у нас тот свет раз в тридцать лет и наступает, — объяснил красный толстяк, лежавший у костра. — Бац — новая страна. Все отобрали, половину посажали, они там встречаются — здорово, Коля! Здорово, Вася! Ты со Страстного, а я с Тверского!</p><p class="p1">— Встретились два друга на вокзале, видимо, не виделись давно, — процитировал усатый балагур. — Долго обнимались, целовались, хер пока не встал у одного.</p><p class="p1">Девица с прямыми волосами расхохоталась.</p><p class="p1">Бегло обсудили, кому какие неприятности принес список. Как ни странно, неприятностей почти не было — а случившиеся были слишком разнообразны, чтобы выглядеть частью генерального плана. Хмурого Корягина развернули в ОВИРе, сказав, чтоб приходил за загранпаспортом через два месяца, когда ситуация определится; что определится — не сказали. Горчакову с сыном вызвали в поликлинику на флюорографию. Ломовой задержали приватизацию жилплощади, сказали, что должны исследовать все обстоятельства. Колесникова, менеджера по продажам в крупной сотовой компании, отправили в принудительный отпуск. Коркину, крупье из казино (никогда бы не подумал, интеллигентный мальчик), ничего не было, начальство даже выписало премию, чтоб не волновался. Симонов получил разнос от директора своего FM-радио: директор сказал, что сотрудник «Столичной службы новостей» должен быть безупречен, но чем именно Симонов провинился — директор не знал. Похоже, всех хотели как-то наказать за попадание в список, но еще не знали, как именно, и выжидали, как списанты проявят себя. Время прощать тех, кто привлек внимание, уже прошло, но время сажать без причины, просто за то, что попался под руку, еще не настало; все существовали в промежутке. Кажется, меры по списку принимались на местах самодеятельно, в меру личной инициативы: на таможне пристальней досматривали, в ОВИРе задерживали паспорт, а в казино поощряли, поскольку в перевернутом мире порока уважают за преступление. Чего бы ни сделал Коркин, чтобы попасть в список, — это заслуживало поощрения, как мелкие пакости в школе для чертенят. Подложил маме гвоздик — садись, пять.</p><p class="p1">— Пять процентов отпустят, остальных — кых, — сказал Корягин, турист-экстремал с висячими усами, чиркнув себя по горлу.</p><p class="p1">— Почему пять процентов? — заинтересовался Свиридов, подивившись совпадению чужой реплики со своей мыслью. Вероятно, теперь весь список тайно резонировал.</p><p class="p1">— Закономерность такая. В любом здешнем списке пять процентов пролетают мимо цели. Для отмазки. Когда скажут, что все по списку, — вот же, пожалуйста, у нас исключение! Евреев не берут на госдолжности — но вот у нас еврей. В институт берут только блатных — вот неблатной. Расстреливают всех умных — вот, пожалуйста, умный, побили и выпустили, теперь гербарий собирает и Бога за нас молит.</p><p class="p1">— Это хорошее соображение, — похвалил Свиридов.</p><p class="p1">— Товарищи, а есть Свиридов? — робко спросила веселая толстая девушка в очках. — Я читала в «Дне».</p><p class="p1">— Я, — буркнул Свиридов.</p><p class="p1">— Ой, я вас поздравляю. Я вам жутко благодарна.</p><p class="p1">— За что? — Он ожидал подколки, ничего не поделаешь, такая профессия: знаешь сам, что гонишь лажу, и думаешь, что догадываются все.</p><p class="p1">— Благодаря вам это попало в прессу. Я Наташа Корзинкина, кстати. Ну, правда, они извинились сразу, что нет никакого списка…</p><p class="p1">— Этот репортаж даже из сети пропал, — подтвердил анемичный очкарик. — Им, видно, по шапке дали.</p><p class="p1">— Но все уже знают. Это, конечно, список не для телевидения, тут они слажали, но главное, что уже напечатано. То есть секретность порушилась, понимаете? Вы привлекли внимание, спасибо.</p><p class="p1">— Да уж, — сказал Смирненков. — За такое внимание…</p><p class="p1">— Ничего, ничего. Это же все вранье, наверное? — сочувственно спросила Корзинкина.</p><p class="p1">— Почти, — признался Свиридов. — Никого я не травил.</p><p class="p1">— Товарищи, качать Свиридова! — закричал очкарик.</p><p class="p1">— Свиридов? Свиридов здесь? — спрашивали со всех сторон.</p><p class="p1">— Не переживайте, они вас вернут на работу…</p><p class="p1">— Сволочи какие, наврали все…</p><p class="p1">— Они про всех врут. Папарачечная, их так и называют.</p><p class="p1">— Свиридов! Если вас выгонят, мы скинемся!</p><p class="p1">Сочувствие, хоть и от прокаженных, было приятно: все-таки не Шептулин, приличные люди, хоть и попавшие в список, но ни в чем не виноватые. Кажется, первый этап пройден: Свиридов разрушился настолько, что радовался всякому доброму слову от полузнакомых людей, попавших в то же идиотское положение. Остановись, сказал он себе, радоваться тут нечему, — но безотчетно расплылся в улыбке.</p><p class="p1">— Спасибо, спасибо.</p><p class="p1">— Вы Свиридов? — новым жестким голосом спросил его приплюснутый.</p><p class="p1">— Ну! — ответил он с вызовом, сразу подобравшись.</p><p class="p1">— «Спецназ»?</p><p class="p1">— «Спецназ».</p><p class="p1">— Хороший сериал, — со значением сказал приплюснутый, подошел, пожал Свиридову руку и вернулся под березу.</p><p class="p1">— Слава России! — закричал вдруг злобный, и вся его тройка подхватила:</p><p class="p1">— Слава России!</p><p class="p1">— Слава, слава, — миролюбиво сказал толстяк. — Что это вы вдруг?</p><p class="p1">— А мы не вдруг! — крикнул злобный. — Это был тост.</p><p class="p1">— За Россию, что ли? — спросил Вулых. — За Россию можно…</p><p class="p1">— А с какой стати вдруг? — не поняла маленькая толстая девушка, небось Whiterat, судя по боевитости. — Она сегодня сделала что-то хорошее?</p><p class="p1">— Она много чего сделала, — ответил третий, до сих пор молчавший, свинообразный, с белесыми ресницами и длинными волнистыми локонами. — Не спрашивай, что сделала Россия, спрашивай, что сделал ты.</p><p class="p1">Непонятно было, издевается он или серьезничает: улыбочка была самая глумливая.</p><p class="p1">— Золотые слова! — сказала Галя Вулых и опрокинула стаканчик.</p><p class="p1">— А чего сидим? — с деланным непониманием спросил приплюснутый. — Не, я не понял, список, чего сидим? Мы за Россию пьем, вашу мать!</p><p class="p1">Никто не знал, как реагировать. Очкарик стал нерешительно подниматься. Скоро стояла уже половина списантов.</p><p class="p1">— Бодрей, бодрей! — командовал свинообразный, сам с кряхтеньем поднимаясь на четвереньки. — А девушки что, я не понял, не в России живут? Девушки, это не ваша страна?</p><p class="p1">— Женщины не пьют стоя, — попытался урезонить его толстяк у костра. Он уже вскочил и теперь стряхивал травинки с пуза.</p><p class="p1">— Женщины тоже люди и тоже россияне, — назидательно сказал злобный. Он уже скользнул по Свиридову своим косым, обрывающимся взглядом, и Свиридов, решив не заедаться, тоже встал. Чувствовал он себя отвратительно.</p><p class="p1">— Ну, слава России! — крикнул свинообразный и картинно осушил стакан.</p><p class="p1">Все молча выпили. Тройка синхронно крякнула и завалилась назад под березу. Остальные неловко уселись вокруг костра и молчали.</p><p class="p1">— А что ж, дельный тост, — сказал Клементьев. — Если бы не Россия, кто бы нас тут собрал?</p><p class="p1">— Если бы не Россия, — агрессивно начал приплюснутый, — если бы не Россия… Вы знаете, где вы были бы, если бы не Россия? Вас никого бы не было, ясно? Вот вас конкретно. Уже хватит вот хихиканий этих! Уже хихикаем, хихикаем!</p><p class="p1">— А зачем вы хихикаете? — спросил Свиридов.</p><p class="p1">— А мы не хихикаем! — развернулся к нему приплюснутый. — Сейчас вообще не об этом речь, ясно?</p><p class="p1">— Да ясно, ясно, — миролюбиво сказал Клементьев. — Вы очень любите Россию, все счастливы. Кстати, вы не представитесь? А то мы все тут знакомимся постепенно, для того и встреча…</p><p class="p1">— Меня зовут Бобров Игорь, — представился приплюснутый, — я специалист по продвижению брендов.</p><p class="p1">— Вячеслав Гусев, издатель, — сказал свинообразный в пространство, ни на кого не глядя.</p><p class="p1">— Панкратов Максим, координатор, — с вызовом рявкнул злобный, не уточнив, что такого координирует.</p><p class="p1">— Ну и отлично. А какие у вас, молодые люди, есть версии насчет списка? — поинтересовался Клементьев.</p><p class="p1">— Версии — не наше дело, — вальяжно ответил Гусев. — Внесли в список — значит, надо. Я считаю, кто вносит, тот знает. А то рассуждаем очень много, а дело делать некому.</p><p class="p1">— «День опричника», — тихо сказал очкарик.</p><p class="p1">— Нет, это не «День опричника», — так же тихо отозвался Свиридов. — Это Кафка в провинциальном исполнении.</p><p class="p1">— В общем, надо каждому на своем месте просто делать дело, — подытожил Гусев.</p><p class="p1">— Ой, бля, как надоело, — тихо сказала девица с прямыми волосами. — Почему все одно и то же? Везде, куда ни придешь. Обязательно такой есть и командует.</p><p class="p1">— В общем, как здорово, что все мы здесь сегодня собрались! — примирительно воскликнул бородач и запел одноименную песню. Со второго куплета все дружно подхватывали припев. Свиридова едва не вырвало. Он решил напиться, чтобы заглушить омерзение, и почти выполнил задуманное. Скоро ему было плевать и на тройку, и на список. Прямоволосая уже стала казаться ему симпатичной. Она подсела к нему и предложила выпить за знакомство.</p><p class="p1">— Я Марина, — сказала она.</p><p class="p1">— А я Сережа, — признался Свиридов.</p><p class="p1">— У тебя отец есть? — спросила Марина.</p><p class="p1">— Был, погиб. — Вдаваться в подробности Свиридов не хотел.</p><p class="p1">— А у меня не было. То есть был, но мать не говорила ничего. Знаешь, тут все без отцов.</p><p class="p1">— С чего ты взяла?! — такая версия Свиридову в голову не приходила.</p><p class="p1">— Ну, я поспрашивала. У Игоря давно умер, это понятно. Эдик вот, — она кивнула на очкастого, сомнамбулически подпевавшего «Городу золотому», — тоже без отца, развелись. Я думаю, это как-то связано.</p><p class="p1">— Да на кой им безотцовщина?</p><p class="p1">— Исследование такое. В одном списке будут без отцов, а в другом с отцами. И будут сравнивать, кто эффективней.</p><p class="p1">— Да ну тебя. Эти трое что — тоже без отцов?</p><p class="p1">— Точно, — сказала Марина. — Отсюда вижу.</p><p class="p1">— И как ты это видишь?</p><p class="p1">— Очень Россию любят. Она им за отца.</p><p class="p1">— Блин, — удивился Свиридов. — Тебе бы сочинять. Ты не сочиняешь ничего?</p><p class="p1">— Нет, я шью. В ателье.</p><p class="p1">— А я сочиняю, — гордо сказал Свиридов. — Сценарии.</p><p class="p1">— Ой! — обрадовалась она. — Хабеныча знаешь?</p><p class="p1">— Знаю. Что вы все на Хабеныче с ума сошли?</p><p class="p1">— Ой, он клевый! — Она сама захихикала над собственной глупостью. — Чего, родили они кого-нибудь?</p><p class="p1">— Не знаю, я у них не крестил. — Свиридов сердился, когда его начинали расспрашивать о звездах. Получалось, что сам он никому не интересен.</p><p class="p1">— Он клевый, — повторила Марина. — А ты что написал?</p><p class="p1">— Я много написал, неважно, — сказал Свиридов и неожиданно для себя начал ее тискать. Она не сопротивлялась и поощрительно повизгивала. Вскоре они уже целовались за домом.</p><p class="p1">— Мне нельзя сегодня, — деловито сказала она после особо затяжного поцелуя.</p><p class="p1">— Да я не рвусь, — успокоил Свиридов. — Знакомство.</p><p class="p1">— Знакомство можно.</p><p class="p1">Несколько стихийно образовавшихся пар уже укрывались в смородине и за гаражом. Запахло росой, скошенной травой, смородинными листьями. Контингент постарше перешел на советские песни.</p><p class="p1">— Светит незнакомая звезда-а-а! — неслось от костра. — Снова мы оторваны от до-о-ома…</p></span>
