<div class="epigraph">
<p class="p1">Все экспериментально-философские фэнтези N построены по инвариантной схеме. На протяжении романа развивается владеющая героем сверхценная идея. Читатель внутренне спорит с ней, но по ходу сюжета она набирает силу, и читатель готов то ли поверить в нее, то ли объявить роман полным бредом, когда в последний момент автор вдруг отмежевывается от этой идеи и сваливает всю ответственность на одержимого ею героя.</p>
<p class="text-author">Александр Жолковский</p>
