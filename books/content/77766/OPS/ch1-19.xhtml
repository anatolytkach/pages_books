<span><p class="p1">Пятнадцатого декабря Валя разместила призыв о выходе на марш. Плюс обращение Жухова с воспоминаниями о том, как он лично еще когда-а-а резко критиковал, протестовал и огребал полной чашей, а теперь фабрикуют дела, отбирают дачу, и он лично возглавит демократическое шествие, ваш нежный, ваш единственный. Разумеется, проспект Сахарова. Долго думали над датой и вот определились, ничего удачней не могли выдумать: католическое Рождество! Да теперь любому будет ясно, кто выдумал и натравил: еще и эта ее работа в американском фонде, и явное финансирование, о котором кричали «Свои» при поддержке «Тутошних», он путался в этом своячнике… Тоже мне марш. На что надеются? Тут же запрет, да и кто бы ждал другого? Они вздумали подать официальный запрос, им издевательски ответили, что на проспекте Сахарова большое движение. Предупредили, что отреагируют адекватно. Кто б сомневался. У Свиридова возникла крамольная мысль: что, если попробовать отговорить, позвать Валю на «Родненьких», забросить тему? Надо ли ходить на марши и все такое? Начальство предсказуемо посоветовало забыть; правильно, я бы сам посоветовал. И какова, в самом деле, мерзость: поистине все друг друга стоят! Чумаков слепнет, но почему надо прикрываться Чумаковым ради осуществления чьих-то бесспорно сомнительных целей? Я не верил и никогда не поверю во всю эту чушь про отъем нефти, но заинтересованность Тэссы — это же очевидно, нет? И Валин фонд, он ведь не белорусский, так? Не арабский? И списанты пойдут на проспект, и их отлупят, а то и пересажают — разве нет? Какого вообще черта?</p><p class="p1">Он попробовал влезть с этим на списочный форум, но десяток списантов под никами — он даже не брался угадать, кто есть кто, — накинулся на него с визгом: агент, пошел вон, среди нас провокатор! А вы чего ждали, интересовалась Hous<em>emouse</em>, что они так стерпят? Нет, они, конечно, попытаются разложить изнутри! Позор, вон отсюда, забанить, вычислить IP! Список быстро и неуклонно развивался в полноценную секту, но списанты были наконец прочно и солидарно счастливы — вряд ли в их жизни было время лучше, чем этот декабрь. Широко обсуждалась подготовка к шествию: кто-то писал плакатики «Всех не перепишешь!» и «ФСБ, ты не Шиндлер!», кто-то увеличивал для транспаранта портрет Чумакова. Немыслимо было и представить себя в этом строю. Нацболы предлагали участие. Шла бурная дискуссия о приемлемости нацбольской помощи. На юзерпике нацбола Перца появился плакатик «Я тоже в списке!».</p><p class="p1">Но чем больше Свиридов смотрел на весь этот бедлам, тем отчетливее понимал, что пойти на проспект Сахарова придется — по той же отвратительной причине, по какой отец три раза ставил чашку на стол; по которой он сам в детстве не ложился спать, не коснувшись всех углов в комнате, словно храня их в предверии ночи; по которой он трижды вставал, чтобы правильно щелкнуть выключателем в сортире. Здравствуйте, тотем и табу. Все мы чувствуем смутное неустройство в этом мире, сквознячок, повевание сквозь щели, — а потому отбиваем ритуальные поклоны и выходим на ритуальные шествия. Природа этих действий объяснима, не спорим; сложнее с причиной. Если бы все было хорошо, никто бы не молился, не кланялся; но нехорошо. У одних ритуалы попроще, у других посложнее, но штука не в том, чтобы ущучить ритуал. Штука в том, чтобы разобраться с причиной, а так как это не в наших силах, полностью избавиться от долженствований, навязчивостей и обсессий может только безнадежный идиот. Не пойти ли мне в самом деле на марш? Разумеется, мне не пойти на марш. Но живу ли я, вправе ли я называться живым — здесь, в уютном вневременном небытии, отгородившись от списка? Ведь это я сам выбрал от него не зависеть, а кто-то вписал меня туда; вдруг в этом был смысл?</p><p class="p1">Он хотел поговорить об этом с Викой, но знал, что она скажет. Вика никогда не делала того, что не хочет. У нее с детства было счастливое врожденное чувство, что желание ее левой ноги есть мировой закон. Так тоже можно. И она была красива, эффектна, желанна — обладание ею было почти так же лестно, как обладание истиной. Но писала она плохо, это надо признать; очень плохо — фальшиво, вычурно, жежешно. Оттого и числилась в тысячницах, и многие подражали ей.</p><p class="p1">В таких размышлениях Свиридов раскладывал «Паука» в ночь на двадцать четвертое, ничего не зная, ни к чему не придя. Надо было писать диалоги к «Детской площадке», заказ СТС, история папы-одиночки с двумя детьми, женившегося на маме-одиночке с тремя, — но он раскладывал «Паука», и «Паук» не сходился. Это было не просто так. Он нервничал, начинал игру с начала, — две колонки сходились, больше никак. Плюнул на все, начал новую — сплошь черная масть, начал опять — стало что-то вырисовываться; он бормотал — «Вот, уже что-то на что-то похоже»… Позвонила Людмила: «Я надеюсь, ты не идешь завтра на эту чушь?» — «Что ты, дорогая». — «Помни, мать с ума сойдет!» Неожиданно разозлился, закричал: «Может у меня быть своя жизнь?! Когда я тут полгода с ума сходил, ты позвонила один раз — спросить, не могу ли я через «Родненьких» починить стояк твоей коллеге!» — «Так ты пойдешь?» — «Это мое дело. Матери ни слова». Черт бы подрал Людмилу. Никогда никем не интересовалась, кроме себя, а муж вообще дуб. Ведь сходилось, но разозлился и потерял мысль. Злость помогла, начало выстраиваться — на отменах ходов растерял драгоценные очки, но за тысячу выйдет точно, — тут и раздался звонок в дверь.</p><p class="p1">Свиридов замер. Да, разумеется, они пошли по квартирам и взяли всех заранее, как я мог не предусмотреть. Если бы успел сложить «Паука», все бы обошлось. И глазка у меня нет в двери, никогда не думал, что понадобится. Ну, перед смертью не надышишься.</p><p class="p1">Он открыл дверь.</p><p class="p1">На пороге стояла Валя Голикова.</p><p class="subtitle">13</p><p class="p1">— Ну входи, — сказал Свиридов.</p><p class="p1">Вид у нее был несчастный, нос красный, но странным образом все это к ней шло — словно она и рождена была выглядеть так; одень в бархат — покажется уродиной, но сейчас, в жалкой курточке, с умоляющим лицом, заискивающим взглядом… Безошибочная, убийственная жалкость: никто не устоит. Свиридов знал, какая железная воля прячется за этой трагической — ах, если бы трагической, за кроткой маской, за мимикрией под ничтожество, убожество, растерянность. Но в первый момент пожалел, и она почувствовала.</p><p class="p1">— Я посижу часок, ладно? — быстро сказала она.</p><p class="p1">— Да хоть два. Пошли, чаю налью.</p><p class="p1">— Ага, спасибо.</p><p class="p1">Она разулась, чего никогда не делала Вика, и прошла на кухню.</p><p class="p1">— Давно я тут не была, — сказала она виновато, и Свиридов мгновенно опознал один из механизмов ее власти — жалкость, униженность, даже и затравленность; но не было прочней сети, которыми эта несчастная оплетала всех в радиусе ее досягаемости. Об этих механизмах мало написано, да и как сунешься? Если столько помогать каждому встречному, так и останешься нераскрытой. Штирлицу определенно надо было в рейхе заниматься благотворительностью; впрочем, он, кажется, так и делал.</p><p class="p1">— Слушай, — сказал Свиридов. — Мне не надо бы, наверное, лезть, и ты наверняка скажешь, что я агент.</p><p class="p1">Валя подняла на него измученные глаза, и он устыдился.</p><p class="p1">— Но все-таки, Валь: не ходите вы завтра никуда. Обзвони людей, скажи, что нет смысла, что получила новые сведения, я не знаю. Отмутузят же почем зря, а то вообще пересажают — ну зачем?</p><p class="p1">— Сереж, — сказала она беспомощно, — я вообще уже ничего не понимаю. Я не смогу это остановить, даже если захочу.</p><p class="p1">— Почему?</p><p class="p1">— Они сами уже, Сереж. Им хочется. Мне знаешь что Петя Трубников сказал? Что только сейчас и начал жить.</p><p class="p1">— Трубников?! — Свиридов покрутил пальцем у виска. — Он же ку-ку!</p><p class="p1">— Он не ку-ку, Сережа. Он нормальный человек. Да и все говорят — смысл, смысл. Ты знаешь, кто мне вчера позвонил? Панкратов!</p><p class="p1">— Оп-па! — А впрочем, чего и ждать. — Ты его пустила?</p><p class="p1">— А как я могу его не пустить. Он же в списке.</p><p class="p1">— Ну знаешь! — сказал Свиридов, поднимаясь с дивана и начиная кружить по кухоньке, как всегда в минуты волнения, когда он понимал и чувствовал больше, чем мог сказать.</p><p class="p1">Что Панкратов попросился — это очень хорошо. Это отлично. Свиридов чувствовал радостное возбуждение: давно его догадки не подтверждались так отчетливо. Ходить куда-нибудь под одними знаменами с Панкратовым — это последнее дело. Так он и сказал:</p><p class="p1">— Ты знаешь, что он через меня пытался создать партию «Родненькие»? Ты в курсе вообще, что он никуда не смог устроиться и поэтому подался к тебе?! Это провокатор, законченный. Человек вообще без совести, без правил, без всего — как ты можешь, Валя?!</p><p class="p1">— А как я иначе могу, Сереж? Я только начала, а дальше… Ты же видел. А что делать? Вот Чумаков, ты же знаешь, что там с семьей. Там с матерью его совсем плохо, и сам он никакой, говорят, и еще Карцева взяли…</p><p class="p1">— Какого Карцева?</p><p class="p1">— Маленького, усатого. Совершенно ни за что, наркотики подбросили и взяли. Он из университета, физик-аспирант, какие у него наркотики…</p><p class="p1">— Когда взяли?</p><p class="p1">— Я вывешивала инфу, но его отец из Краснодара приехал, попросил снять. Шума не хочет. Они все не хотят шума, а потом начнется, и поздно будет…</p><p class="p1">— Что начнется, Валя?! — заорал Свиридов. — Что еще начнется?! Все уже началось, здесь никогда иначе не было! Что ты лезешь в эту воронку, зачем провоцируешь их — они ведь будут только рады вас всех повязать! И будут в своем праве — несанкционированное шествие! И ты знаешь все это, и ведешь их туда, и хочешь еще, чтобы я это одобрил, — так?</p><p class="p1">— Сережа, не кричи.</p><p class="p1">Да, конечно. Теперь она будет спорить с его тоном, потому что по существу сказать нечего. Он кричит, он виноват, Юпитер сердится и неправ.</p><p class="p1">— Я не знаю уже, как до тебя докричаться.</p><p class="p1">— Не докрикивайся, я слышу.</p><p class="p1">— Хорошо. — Он сел на диван и уставился на Валю в упор. Неожиданно она засмеялась.</p><p class="p1">— Смешной ты. Я отвыкла.</p><p class="p1">— Да, да. Милый и смешной. По сути мы имеем что-нибудь возразить?</p><p class="p1">— По сути… — Долгая пауза, надо полагать, просчитанная. — По сути мы имеем возразить то, что люди загорелись от первой искры, а я теперь не могу их развернуть. Не пойти тоже не могу. Это будет гапоновщина, разве нет?</p><p class="p1">— Будет, конечно. Это с самого начала гапоновщина.</p><p class="p1">— Но нельзя же так просто ждать! Нельзя же сидеть и ждать, пока они всех! Ведь понятно же, что этим кончится, что весь список идет в пасть!</p><p class="p1">— Все идут в пасть, — сказал Свиридов. — Никто из нас не выйдет отсюда живым, как учил еще Глазов. Правда, тебя тогда не было, ну так я сам тебе скажу.</p><p class="p1">— Сереж, не надо. Ты же понимаешь все.</p><p class="p1">Снова этот собачий взгляд. Хорошо отработано.</p><p class="p1">— Я не понимаю, чего ты хочешь. Ты хочешь одобрения? Чтобы я тебе спасибо сказал, что ты их тащишь на бойню? Пересажают список или нет — я не знаю, меня это в некотором роде тоже касается, и я перестал об этом думать, потому что не от меня зависит. Я не знаю, когда придут, возьмут, кирпич упадет, рак случится, не знаю. Но жить я должен так, как будто этого нет. «Жить так, будто умер» — знаешь такой самурайский принцип?</p><p class="p1">— Почему же ты тогда не пойдешь? — спросила она в упор. Грамотный, вовремя нанесенный удар. С ней нельзя заговаривать о принципах — тут же ударит в самый принцип. — Ты ведь уже умер?</p><p class="p1">— Немножко умер, — с вызовом ответил Свиридов. — Знаешь, «если зерно падши в землю не умрет…». Именно поэтому меня и не волнуют марши. Вы с чем несогласны? Марш прокаженных, несогласных с проказой, — спасибо, поздравляю, увольте.</p><p class="p1">— А ты согласен с проказой?</p><p class="p1">— А я ее не выбирал! Что вас всех объединяет, о чем вам вообще говорить, если бы не список?</p><p class="p1">— Теперь объединяет, — сказала она твердо. — Теперь — список. Это и есть наше общее. И если мы согласны быть в списке, то так нам и надо.</p><p class="p1">— А толку? Толку, Валя? Списки будут всегда, их составляет не ФСБ и не Рома Гаранин, их составляет каждый, в чьем-нибудь обязательно окажешься! Что теперь, идти башку подставлять?</p><p class="p1">— Я не знаю, — сказала она, снова изображая беспомощность. — Я только знаю, что когда говорят: «Евреи, выйти из строя», надо выходить, даже если ты не еврей.</p><p class="p1">— Кому надо?! — закричал он, вскакивая. Еще немного — и он ударил бы ее.</p><p class="p1">— Евреям надо… Если все выйдут — всех же не расстреляют…</p><p class="p1">— Расстреляют как милых. Меньше пленных — меньше расход.</p><p class="p1">— Тогда мне надо.</p><p class="p1">— Ну так и выходи, и не смей обличать белобрысых евреев, которые не выходят из строя! Что за философия, я не знаю, что за безумное требование все время умирать! Что ты все оправдываешь войной! Эти, на израильских форумах, где Лурье полощут, тоже все орут: война, война, мы воюющая страна! На нас падают ракеты, мы всегда правы! Сейчас никто еще не кричит: «Евреи, выйти из строя», — а вы уже шагаете!</p><p class="p1">— Потому что, когда крикнут, будет поздно, — сказала она, не глядя на него.</p><p class="p1">— А ты уверена, что крикнут?</p><p class="p1">— А ты — нет?</p><p class="p1">— А я — нет. И уволь, жить по логике войны я не собираюсь. По этой логике надо все прощать вожаку и объединяться с Панкратовым.</p><p class="p1">— Да не объединяйся, — сказала она. — Ну хочешь, я завтра не пущу Панкратова? Я сейчас ему позвоню и скажу, что он дома нужнее, надо сайт поддерживать, если что-то со мной или с Бодровой…</p><p class="p1">— Как же, останется он. Он теперь небось у Жухова правая рука. Кстати, я далеко не убежден, что сам Жухов пойдет на марш. Наверняка в пробке застрянет.</p><p class="p1">— Он пойдет, Сережа.</p><p class="p1">— Тем хуже.</p><p class="p1">— Сереж, — сказала она после паузы. — Если ты думаешь, что я все это не понимаю…</p><p class="p1">— Понимаю и иду, ага.</p><p class="p1">— Если все идут, то нельзя быть в списке и не пойти.</p><p class="p1">— Почему же? — Он остановился перед ней, засунув руки в карманы. — Я, например, не пойду. И уверен, что половина не пойдет.</p><p class="p1">— Да, наверное, — вздохнула она. — Я имею в виду — мне нельзя.</p><p class="p1">— Ну, если ты все решила — давай. Идите, переводите теоретический спор, в котором был еще хоть какой-то смысл, в плоскость мордобоя. Оно и проще. Средневековье так средневековье. Я не понимаю только, зачем тебе мое одобрение.</p><p class="p1">— А я сама не знаю, — просто призналась она. — Страшно очень дома одной сидеть. Мама плачет.</p><p class="p1">Он представил их жалкую квартирку, заснеженную клумбу под окнами, чахлые цветы на подоконниках, вечно несчастного ваньку-мокрого, плачущего по всем бедным замерзшим деревцам и кустикам за окнами; Валенькины грамоты под стеклом, пела в хоре, Валенькины детские рисунки. Хорошо оплетают, славно придумали. Кто раз придет, будет вечно виноват.</p><p class="p1">— Это я виноват, что она плачет?</p><p class="p1">— Да никто не виноват, Сережа. Я просто думала… ну совершенно же некуда деваться больше. Я к ним не могу.</p><p class="p1">Они сейчас у Волошина сидят, корреспонденты там… У корреспондентов рожи злорадные… Думаешь, мне кажется, я права во всем? Мне кажется, я вообще сволочь последняя…</p><p class="p1">— И все-таки идешь.</p><p class="p1">— Ну а как, Сережа?</p><p class="p1">Чуть не разревелась, но сдержалась. Был бы перебор.</p><p class="p1">— А так, — ответил он. — Справляться со своей проказой наедине. Делать из нее литературу, кто умеет. Жить, будто нет проказы. Есть разные варианты, но маршировать с трещотками, с провокаторами, с ворами в первых рядах — это спасибо.</p><p class="p1">— Сереж, — заговорила она быстро, подняв на него мокрые глаза. — Сереж, я никого в жизни не любила, как тебя. Ты можешь жить как хочешь, я ничего от тебя не требую. Сережа, пойдем завтра с нами, ради бога, пойдем…</p><p class="p1">— Это еще зачем?</p><p class="p1">— Ну не знаю, не знаю я! Почему-то мне кажется, что если будешь ты, они нас не тронут. Ты известный, тебя показывали, ты Тэссе своей пишешь…</p><p class="p1">— Я уже месяц Тэссе не пишу.</p><p class="p1">— Сережа, милый, пойдем. Пойдем, пожалуйста. Я с тобой не боюсь, никогда ничего не боюсь с тобой, я даже залететь с тобой не боялась, помнишь?</p><p class="p1">О, как безупречно она подбирала аргументы, как отлично строила речь; нет, эта девочка не пропадет. Когда-нибудь, лет через двадцать-тридцать, а впрочем, история ускоряется, — в дни, когда я буду листать мое досье, в том числе все эти доносы, которые воображал себе в первые списочные недели… тогда Валя будет королевой, лидером межрегиональной группы, любимицей телевидения, колумнистом обновленного «Огонька». Нас будут презирать за то, что мы не уехали. Пусть. Кончится-то все равно тем же самым.</p><p class="p1">— Валя. Валь, хватит.</p><p class="p1">Она хватала его за руки.</p><p class="p1">— Валь, я просто никуда не выпущу тебя завтра.</p><p class="p1">— Не выпускай, не выпускай, хорошо. Только пойдем с нами завтра, Сережа, ради бога, пойдем…</p><p class="p1">Что ты будешь делать! «Кончится тем же самым» — да, это верно не только применительно к истории, это верно применительно ко всему. На простынях, еще пахнущих Викой. Сволочи мы, сволочи, скоты, нет нам названия. И плакала, все время плакала, как тогда, со своим благоверным. Его не удержала, а меня, кажется, удержит.</p><p class="p1">Она заснула мгновенно, долгая бессонница, наверное.</p><p class="p1">Что мне теперь делать?</p><p class="p1">Придется идти.</p><p class="p1">Это решение заполнило комнату, как сундук. Нечем стало дышать. И во сне он все убегал, убегал.</p><p class="subtitle">14</p><p class="p1">В восемь утра Свиридов сел к компьютеру и открыл сайт Списка.</p><p class="p1">Он сделал это в безумной надежде получить последний толчок, обрести решимость, бросить на весы ничтожное привходящее обстоятельство: человек в тупике, в состоянии неразрешимого выбора, живет в беспрерывном ожидании решающего аргумента и прислушивается к чему угодно, цепляясь за четное число фонарей или трещин в асфальте, не понимая, что любой выбор будет хуже ожидания. Валя спала — счастливо и безмятежно, как народоволка перед терактом: решение принято, прочее в руках судьбы.</p><p class="p1">Свиридов открыл сайт и не нашел себя в списке.</p><p class="p1">В первый момент он, естественно, решил, что ошибся его измученный мозг. Он подробно, имя за именем, прокрутил свою, наизусть известную часть списка — Самсонова, Сварцевич, Стародумов… Стародумов шел сразу после Сварцевича. Свиридова не было. Он исчез. Его устранили.</p><p class="p1">Свиридов раскинул «Солитер», проверяя свою адекватность. Вышли два туза, но это было уже неважно. Он правильно различал масти и не путал карты. Все это что-то значило. Он проверил Валю: Голикова была на месте. Ее призыв так и висел сверху. До выхода на проспект Сахарова оставалось два часа.</p><p class="p1">Ругательски себя ругая за то, что новости списка для него важнее личных, Свиридов открыл свою почту на Яндексе. Непрочитанных писем было два. «Озон» приглашал на распродажу, Гаранин требовал: «Звони срочно!».</p><p class="p1">Он открыл гаранинское письмо, удивляясь размеренности и неторопливости собственных движений. Шестым чувством он понимал, что все уже нормально, но еще боялся словесного оформления: ад казался слишком близок и страшен, чтобы возвращаться туда.</p><p class="p1">«Серый! — писал Гаранин. — С тебя пузырь. Звонил с вечера но не дозвонился. Ты отключен на хуй. Я на связи. Ура не ссать. РГ».</p><p class="p1">Свиридов прочел и несколько раз перечел это письмо, с умилением отмечая пропущенные запятые. Торопился человек, хотел обрадовать. Надо, кстати, включить телефон (дотянулся, включил). Набрал Гаранина.</p><p class="p1">— Здоров! — заорал Гаранин. — Ты что, ебешься там? Добрые люди работают давно!</p><p class="p1">— Чего случилось-то, Ром? — полушепотом спросил Свиридов.</p><p class="p1">— У тебя чего, баба спит? Молодца, Серый, так их! Еби всех! — Рома был неплох уже с утра. — Короче, тебя вычеркнули, Серый! Ты понял? Ты вычеркнут на хер!</p><p class="p1">— Я уже видел, — сказал Свиридов.</p><p class="p1">— Че, на сайт ходил?</p><p class="p1">— Ну.</p><p class="p1">— Ты гляди! — восхитился Рома. — Как у них поставлено! Значит, уже и Бодровой сообщили.</p><p class="p1">— Да я думаю, они взломали давно.</p><p class="p1">— Кому он нужен его ломать! Ты правда что ли думаешь, что этот марш разгонят? Ни хера не будет, Серый! Я думаю, если они тебя убрали, они и других начнут помаленьку. А ты хоть знаешь, кто тебя отмолил?</p><p class="p1">— Ты?</p><p class="p1">— Бери выше!</p><p class="p1">— Ломакин? — предположил Свиридов.</p><p class="p1">— Какой Ломакин, почему Ломакин? Не знаю такого.</p><p class="p1">— Строитель.</p><p class="p1">— Какой на хер строитель! — Гаранин выждал паузу. — Тебя отмолила Лала Графова!</p><p class="p1">Ну что, вполне в жанре. У Кристи убивает наименее подозрительный, у нас все решает наиболее случайный. Только этот персонаж, раз упомянувшись, ни с чем не срифмовался — и вот, пожалуйста, выстрелило даже то ружье, которое все упорно считали граблями.</p><p class="p1">— Она приехала тут сниматься в «Западло»! — орал Гаранин. — «Западня», про шпионов, все его зовут «Западло», но ей оказалось не западло. Ее там в Голливуде никто не хочет знать ни хуя, а сиськи уже не те. Триумфальное возвращение. Приняли наверху. Она говорит — имею личную просьбу. У вас тут есть очень талантливый сценарист, у него проблемы. Какие проблемы, нет проблем, сейчас решим. Ну и все, и ты в шоколаде. Я так думаю, Серый, она там дала. Не знаю кому, но факт, дала. Иначе бы, сам понимаешь… Ну?! Ты счастлив?!</p><p class="p1">— Абсолютно, — сказал Свиридов.</p><p class="p1">— Ну? Когда мне напишешь че-нибудь?</p><p class="p1">— Теперь быстро.</p><p class="p1">— Ну давай!</p><p class="p1">— Давай.</p><p class="p1">Свиридов осторожно положил телефон на стол.</p><p class="p1">Только теперь он почувствовал, какая глыба давила его все это время. Невозможно было представить, как он прожил с этим четыре месяца, какое четыре, скоро пять. «Проказа с Генриха сползла». Где он это читал? Классе в пятом, в Библиотеке всемирной литературы. Том из родительской библиотеки, утеха среднего совка. Гартман фон А-у-э, «Бедный Генрих». «Но тут родительских ушей стенания коснулись, и мать с отцом проснулись. За то, что была в них душа человечья, за их милосердье и добросердечье, проказа с Генриха сползла, Господня милость его спасла». Никакого особого милосердья и добросердечья Свиридов за собой не помнил, но, может, он подал правильному нищему? Бывают же правильные нищие, есть обычные, а есть особенные, у которых самый прямой провод с Господом. Это сюжет, можно развить. Опять появились сюжеты, их можно было развивать. Словно вырвали зуб, сравнение, всегда приходящее в голову, когда исчезает давняя и унизительная боль. Перед стыдной радостью освобожденья ничтожно было все — даже мысль о Вале и о том, как, собственно, теперь Валя. Валя была только часть этой боли, нужная лишь для того, чтобы о ней забыть. Грех признаться, но это ведь так. Никогда не любил Валю. В-Аля, аббревиатура, вынужденная Аля. Кто эта женщина, зачем она тут лежит? Пусть идет маршировать куда угодно, у прокаженных свои радости.</p><p class="p1">Разумеется, в следующую секунду Свиридов забыл свое стыдное облегчение и оставил гадкие мысли. Но зоркость дана человеку не только затем, чтобы подмечать чужие мерзости, — это черта списочности, где все только и следят, у кого больше язв, у кого лик львинее, — но и затем, чтобы знать гнусности за собой. В конце концов, это моя профессия. Хорошо уже и то, что я все это вижу.</p><p class="p1">Ну и что, идти мне теперь на марш или нет?</p><p class="p1">Господи, конечно, нет. Как можно. Это еще пошлее, чем Борисов, вписавшийся в список добровольно в надежде отвести более ужасные расправы. Примазываться к искусственному, донельзя отвратительному столпничеству… ладно, пока я был в списке — это обсуждалось. Но теперь, когда вычеркнут…</p><p class="p1">Свиридов встал и прижался лбом к ледяному стеклу.</p><p class="p1">Что со мной, Господи? Во что я превратился за четыре месяца? Я в самом деле думаю, что меня откуда-то вычеркнули, хотя как можно вычеркнуть меня из списка людей, посмотревших бездарный фильм бездарного фигляра? Я в перечне прокаженных, и меня уже нельзя вычеркнуть оттуда. Я должен пойти туда, где возражают против самого этого порядка вещей: туда, где прокаженные требуют разрешить им ходить без трещоток.</p><p class="p1">Но почему я должен идти ради этого на манифестацию в честь чумы? Ведь они предлагают взамен проказы чуму, холеру, ведь это не выход, там нет выхода. Победит только тот, кто вычеркнет себя из всех списков, кто вообще откажется мыслить в категориях списка, — и сделать это можно только в одиночку, тихо, дома, ни словом не заявляя о себе, ибо где заявление — там тут же новый список… Есть только одна свобода — свобода клопа в щели, тотчас подсказал внутренний голос. Да, клопа в щели, прикрикнул Свиридов на внутренний голос. А ты пошел в жопу, слышать тебя не хочу. Ты думаешь, говоря мне гадости, ты прав? Вспомни лучше вообще, кто тебя кормит.</p><p class="p1">Валя спала. Свиридов раскинул пасьянс. Вышли три туза.</p><p class="p1">Он не знал, что скажет, когда она проснется. Вероятнее всего, в сотый раз изложит премьерную версию Гаранина или попробует объяснить наконец, — ведь наедине с собой это всегда получалось, — почему прыжок из огня в полымя никого не приближает к свободе. Теперь уже не важно, что говорить. Он смотрел в окно, на детей, торопившихся в школу. Половина девятого, скоро звонок. Третий звонок для учителя, первый для вас. По первому уже надо сидеть в позе «кротко». Какая мука, в самом деле, какое унижение — каждый день вставать в семь утра, ладно, в пол-вось-мого, торопиться в класс, в царство сплошной и всеобщей несвободы… Как хорошо, что я купил себе прекрасное право спать до девяти. Сегодня холодно, и я не пойду ни на какой марш. Я никому больше ничего не должен.</p><p class="p1">Да, но не у всех же есть Рома Гаранин и Лала Графова! Ну и что, тут же осадил он проклятый голос, я не виноват, что по крайней мере у меня они есть. Остальные пусть выкручиваются как им угодно, — с меня хватит. Интересно, где моя ворона. А вот и она.</p><p class="p1">Огромная, черная, нахохлившаяся, она сидела на липе напротив и внимательно изучала окно Свиридова. Кажется, она была чем-то недовольна. Во всяком случае незаметно было, чтобы она его поздравляла. Сидит и смотрит, и ведь не денется никуда.</p><p class="p1">Валя проснулась мгновенно, как всегда, — только что безмятежно лежала в своей футболке и вот уже спустила ноги на пол. Долго валяться, нежиться — не ее стиль. В школе небось была отличница: странно, никогда не спросил. А скорей всего, и не спала, все слышала, догадалась.</p><p class="p1">— Здорово, — сказал Свиридов.</p><p class="p1">— Чего не спишь?</p><p class="p1">— Так.</p><p class="p1">— Ага. — Она быстро и прозаично одевалась, минимум эротики. — Кофейку сваришь?</p><p class="p1">— Да, конечно. — Он пошел на кухню.</p><p class="p1">Стоя у плиты, он почувствовал ее взгляд: она стояла в дверном проеме, облокотясь о косяк, и смотрела так же, как Алька во время последней встречи. Почему-то они сразу все умудрялись понять. Она не осуждала его, боже упаси. Это был взгляд из бездны, из такой глубины, на которую он не только не опускался — он не мог ее и предполагать, а они там жили. Это был взгляд не обвиняющий, не умоляющий и уж подавно не завистливый. Просто — ты на поверхности, мы в бездне, мы все понимаем и ни на чем не настаиваем; для нас естественно быть в бездне. А тебя никогда не пустят сюда — и при этом ты будешь вечно чужим на поверхности; взгляд человека, достигшего надежного дна, на человека, вечно носимого всеми ветрами между небом и землей. Вот в чем дело: своим здесь себя чувствует только тот, кто на дне, тот, кому некуда больше падать. В этом состоянии возможны прекрасные поступки. А он человек промежутка, и у него, пожалуй, есть надежда на спасение. Но какой ценой? Вот этой самой: у кого есть надежда, тот не свой, никогда не свой. «Оставь надежду всяк сюда входящий» — это же не угроза, какие угрозы, когда все уже произошло? Это правило пользования лифтом, способ сохранения лица. Оставь надежду, а дальше делай что хочешь.</p><p class="p1">Некоторое время они молча смотрели друг на друга. Кофе вскипел, он осторожно налил ей чашку. Валя выпила мелкими глотками, улыбаясь как-то робко.</p><p class="p1">— Ну… я пойду, наверное, да? — сказала она.</p><p class="p1">— Да, — сказал Свиридов. — Ты, наверное, иди.</p><p class="p1">— Ты, наверное, все правильно решил.</p><p class="p1">— Не знаю, — сказал Свиридов.</p><p class="p1">— Я вот не могу, — сказала она. — Я понимаю, но никак.</p><p class="p1">— Ну тогда иди.</p><p class="p1">Но она все не решалась — понимала, что уходит не на марш, черта ли им там сделают на марше, а от Свиридова, и это уже насовсем. Есть вещи, которые не переступаются.</p><p class="p1">— Ну пойду.</p><p class="p1">— Давай. Позвони вечером обязательно.</p><p class="p1">Она еще раз посмотрела этим своим взглядом de pro-fundis, быстро оделась в прихожей и вышла.</p><p class="p1">Свиридов остался один.</p><p class="subtitle">15</p><p class="p1">Было прохладно, пусто, свежо, белесо. Он сидел за столом, не глядя в монитор, уставившись сквозь тюлевую занавеску на белизну за окном, и стыдная, забытая радость существования наполняла его.</p><p class="p1">Бабушка с мальчиком шла через заснеженный двор, мальчик волочил санки. Две девочки в красном крутились на скрипучей карусели. Три девочки постарше, лет по двенадцать, хихикали, прогуливая школу. Старик выгуливал рыжую беспородную собаку. Другая, черная и тоже беспородная, с нею заигрывала, но та, что на поводке, эти приставания гордо игнорировала. Еще один старик, с двумя рулонами туалетной бумаги в авоське, шел из магазина. Хорошо бы рядом бежал рулон туалетной бумаги и заигрывал с тем, что в авоське, а тот его презирал. Пыхтящий толстяк в расстегнутой синей куртке обметал пыхтящую «мазду», завел и вот чистил, пока греется. «Снег», статья Галиена Марка.</p><p class="p1">Человек, утративший вертикаль, быстро находит утешение в горизонтали. Христос, избегнувший участи в «Последнем искушении», впервые замечает вокруг себя природу, и природа очень недурна. Мир вокруг был сказочно хорош, а он так давно, так высокомерно не замечал этого. Впереди было пространство всех возможностей. День сиял, и пусть это был день без солнца, — прекрасна была и его матовая белизна, и ватная, велюровая сероватость декабрьского неба, и торопящиеся по своим делам люди. Можно было любить людей. Рука, сжимавшая Свиридова, разжалась, и он прекрасно чувствовал себя без этой руки.</p><p class="p1">Еще много будет утешений — яичница с колбасой… Он с радостью подумал, что впереди у него завтрак. Ничего дурного, свинского, чавкающего, — кроткая благодарная радость: яичница с колбасой. Мир хорош, разумен, благоустроен. Как долго он был неблагодарен. Спасибо, Господи.</p><p class="p1">В эту минуту Бог с негодованием захлопал крыльями, завертел головой, вспорхнул с ветки напротив и приземлился на свиридовском подоконнике.</p><p class="p1">— Как, как, что такое? — закаркал, захлопотал он, царапая когтями жесть. — Что такое, не понимаю, куда это мы ускользаем? Кого это мы благодарим? Тоже мне благодарность. Быстро встал пошел вышел марш марш.</p><p class="p1">Свиридов покачал головой.</p><p class="p1">— Нет, нет. Никуда я не пойду, и ты это отлично знаешь.</p><p class="p1">— Что такое вообще?! — возмутился Бог. — Раз в жизни, можно сказать, взял двумя пальцами, приблизил к глазам. Поместил под микроскоп, в интересное окружение. Ослепительные возможности, запах жизни. И тут же сразу же дезертирство, сучение лапками, мольбы о пощаде. Кого молим, юноша? К кому обращаемся? Тебя Господь включил в список, сидит наблюдает! Ты больше всех ныл, что у тебя безвременье! Вот, кончилось безвременье, пожалуйста, действуй! Ты думаешь, без моего ведома кто-нибудь тут составляет списки? Ты думаешь, это они составляют списки? Это я, я, я составляю!</p><p class="p1">Интонации у Бога были ворчливые, как у старой коммунальной еврейки, что часто вообще наблюдается у еврейских стариков, так что ничего удивительного. Буду старик — тоже буду похож на старуху.</p><p class="p1">— Господи, — устало сказал Свиридов. — Я не хочу состоять в списках. Я хочу в списках не значиться.</p><p class="p1">— Что такое, что, что! — захлопотал Господь, перемещаясь вдоль подоконника. — Ты обалдел, что ли, вшивота, ты с кем разговариваешь! В списки ему не хочется. Быть живым в некотором роде и значит быть в списках, ты понял? Это ужасно, хуже всего, это я не знаю что — выпасть из списка! Это значит, дубина, что я о тебе забыл!</p><p class="p1">— Этого я и желал бы более всего, — скромно сказал Свиридов. — Я желал бы, чтобы ты с твоими методами обо мне забыл.</p><p class="p1">— Говорит и не знает, что говорит! Что он такое говорит! — заахал Господь. В былое время он явился бы, конечно, в ином обличье. Как почти во всей хорошей советской фантастике, в мечтах мэнээса, он явился бы в облике старого очкастого учителя, доброго и всепонимающего, в облике железной необходимости с человеческим лицом, и благословил бы на гибель и ужас с этим самым человеческим лицом, и все были бы довольны. Но Господь тоже эволюционирует, как все живое, мир распустился, учитель давно на пенсии, а пенсионер ворчлив по определению. — Ты понимаешь ли, что ты несешь?! Для человека с сотворения мира не было хуже наказания, чем быть отверженным от взора Божия! А тут я смотрю на тебя в упор большими круглыми глазами, и ты недоволен! Ему не нравится список, скажите пожалуйста. Как ты предлагаешь рулить миром без списка? Я говорю: Свиридов, к доске. Свиридов пошел к доске. Что это такое, какие-то подтирки, вычеркивания? Уже ты давно мне внушаешь определенные подозрения, и уже я частично вызвал родителей!</p><p class="p1">— А, — вяло сказал Свиридов. — Пошел шантаж.</p><p class="p1">Господь понял, что переборщил, и попытался взять лаской.</p><p class="p1">— Ну слушай, — сказал он по-товарищески. — Ну как ты хочешь, чтобы строился сюжет? Как я вообще буду формировать человека, если он все время ускользает из рук? Чего ты боишься, неужели у тебя есть сомнения, что это лично я затребовал твое дело и внес тебя в список? Ты пойми, дурацкая твоя голова, что если ты не будешь состоять в этом списке — ты будешь состоять в списке людей, вычеркнутых из списка, и я отнюдь не знаю, в каком лучше.</p><p class="p1">— Было, все было, — сказал Свиридов. — Не забывай, что ты мне кажешься и что вообще ты ворона.</p><p class="p1">— Может быть и да, а может быть и нет, — сказал Господь. — Может быть, и ты мне кажешься. Оставим, однако, эту демагогию и поговорим как серьезные люди. Ты скажешь мне, конечно, да уже и говоришь, собственно, что люди из списка — дурные, глупые люди, что они идут на мертвое дело и уважают себя ни за что. Ха-ха, не думаешь ли ты, что я сам этого не знаю? Я так все тут устроил, что немертвых дел тут нет, все со всех сторон хороши, и единственное немертвое дело можешь в данную минуту сделать ты, встав со стула и пойдя отсюда. Не скрою, соорудить такую конструкцию, в которой все было бы одинаково безнадежно, кроме кратковременных периодов вдохновения и вспышек личного выбора, было делом трудным и тонким, и именно за это, на мой взгляд, меня следовало бы похвалить прежде всего. А не за какие-то сомнительные горы и звезды, перечисленные в одном памятнике народного творчества. Хочу заметить кстати, что этот свой Ветхий Завет они сочиняли сами, без всякого моего участия, и их претензии на избранность мне довольно смешны.</p><p class="p1">— Да, да, я догадывался.</p><p class="p1">— Все обо всем догадываются! — воскликнул Господь. — Штука в том, что одним нужны подтверждения, а другие способны действовать сами. Тебе нужны подтверждения, вот, даю. Все эти декабристы, выходящие на площадь, и все остальные несогласные ни к чему хорошему не ведут и вообще занимаются ерундой, почему я и не даю им победы. Но в момент выхода на площадь в них вырабатывается некое вещество, благодаря которому только и стоило городить весь огород, как пасечник строит улей ради меда. Без этого вещества мир очень быстро прекратится, а я как тонкая материя перестану существовать еще раньше, и тогда мало не покажется никому. Ты бы, дурная твоя голова, подумал, кому ты хуже делаешь. Ты делаешь хуже мне, я недополучаю свой завтрак.</p><p class="p1">Господь потюкал клювом по карнизу, ожидая реакции, но Свиридов молчал.</p><p class="p1">— Один твой приятель, между прочим, — сказал голодный Господь, — высказывал тут дельную мысль насчет того, что сонеты Шекспира суть псалмы и так далее. Черт его знает, что там себе думал Шекспир, но один сонет точно обращен ко мне, я всегда так и понимал. «Послал бы все к чертям, когда б не ты: ведь без меня тебе придут кранты!». Это он к кому обращается? Это он ко мне обращается!</p><p class="p1">— Ну-ну, — заметил Свиридов. — И «Юрий Милославский» тоже твое сочинение…</p><p class="p1">— Точно тебе говорю! — отчаянно заверещал Господь. — Что, это он из-за бабы все терпит? Это из-за меня, потому что если еще один от меня отпадет — меня значительно убудет! Я сущность архаическая, меня и так почти не осталось. Если еще ты отвалишься — я вообще не знаю, что будет!</p><p class="p1">— А что слева бесы и справа бесы, тебя как бы не смущает, — не спросил, а констатировал Свиридов. — Была бы мне моя капля благодати, а на источник плевать с высоты нашего величия, так? Плодожор, людоед.</p><p class="p1">— Ну да, ну да! — захлопал крыльями Господь. — Сталкиваются бесы, а высекается благодать. Здесь нет ничего хорошего, это специально так придумано! Но когда сталкивается, то сразу благодать! Не оставляй без себя Господа Бога своего, Свиридов. Когда его не будет, тебе самому не перед кем будет плясать.</p><p class="p1">Господь смотрел на него жалким горящим глазом, глазом больного, но хитрого старца, хищно и страстно держащегося за жизнь — когтями за жесть.</p><p class="p1">— Интересное кино, — прочувствованно сказал Свиридов. — Когда мы еще молодой, когда мы в силе и славе, мы можем что угодно сделать с несчастным парнем из земли Уц, а в ответ на все претензии демонстрировать свои горы, долины и зверя Левиафана. Который не обеспокоится, хотя бы и весь Нил устремился в нос его. А когда мы стары, и больны, и мало кому нужны, мы прилетаем тут бить на жалость и говорим: пойди, пожалуйста, на бессмысленное дело, получи там по морде, в этом весь смысл, без этого я умру. Господи! Оставь, пожалуйста, эту лирику и скажи прямо: можно ли жить в твоем мире и не состоять в каком-либо списке, который бы с начала до конца определял мое поведение?</p><p class="p1">— Нет, конечно! — закаркал Господь, смущенный прямотою вопроса. — Конечно, нет. Что ты еще себе выдумал, какие еще другие возможности, нет, нет, никогда ничего подобного!</p><p class="p1">— В таком случае, — сказал Свиридов, — пошел вон, Господи.</p><p class="empty-line"/><p class="p1">Как знаешь, как знаешь.</p></span>
