<span><p class="p1">— Не думаю. Понимаете, у одного старого автора — сейчас точно не вспомню, — ставился вопрос: каковы моральные стимулы в отсутствие идеологии? Существуют ли они? В каком-то смысле это самое интересное. Упирается в чистую антропологию: возможен ли человек без погонялки, палки, указки и тэ дэ. Выясняется, что невозможен. Именно поэтому после серых приходят черные. Человек — как поле: сам по себе культурными растениями не зарастет. Мы видим триумф сорняка, и это не государственная политика по сознательному оболваниванию, не-ет. Это следствие эпохи, когда любое воспитание было объявлено насилием. И в результате господствует чушь, потому что именно чушь становится самой победительной силой в обезглавленном обществе. Знаете один эксперимент Барановой? Это модный московский этолог, тридцать пять лет, а весь Запад на нее молится. Так вот: она занималась механизмом социального отбора у крыс. Берем стаю, смотрим, кого выбирают вожаком. Самого умного, сильного и обучаемого: мы ведь, прежде чем сбить крыс в стаю, изучаем их по отдельности. И вот у нее был любимчик, по кличке почему-то Чайковский, — то ли чай любил, то ли очень был музыкален, — не крыса, золото. Только что не говорил, и то пищал с человеческими интонациями. Дальше что она делает? Как только в стае из пятнадцати крыс определяется вожак, она берет его и рраз — изымает. В соседнюю комнату. В стае, естественно, снова начинается селекция. Но только на этот раз умные крысы — помня, что стало с правильным вожаком, — выбирают уже не самого умного и обучаемого, а самого жалкого и подлого, абсолютно тупую гниду, со страшным уровнем агрессии. У человека в девственном состоянии — если его не окультуривать на каждом шагу — примерно те же механизмы. Естественную селекцию у нас всякий раз рушат, а потому любая идея рано или поздно превращается в список.</p><p class="p1">— Но у вас нет догадок, по какому принципу он составлен?</p><p class="p1">— Догадки есть, но это все недодумано. Даже если я примерно опишу механизм, цель от меня пока скрыта. Или я не хочу про нее говорить.</p><p class="p1">— Не хотите — как хотите.</p><p class="p1">— Сформулирую — скажу, — пообещал Глазов. — Не хватает деталей. Вообще у всего этого уже тот плюс, что вот, знакомишься с хорошими людьми. Приходите к нам, с женой, если женаты.</p><p class="p1">— Почти, — соврал Свиридов, а впрочем, не так уж и соврал.</p><p class="p1">Вероятно, это был лучший день за время пребывания в списке — потому что нет большего счастья, чем грозившая и рассосавшаяся неприятность. С этого момента и до самого ноября счастья почти не было, или оно было так тесно сплавлено с подспудным отчаяньем, что помнилось не как счастье, а как тоска.</p><p class="subtitle">11</p><p class="p1">Следующим утром звонок Глазова вторгся в невнятный эротический сон, в котором Свиридов спасал незнакомую девушку от казни; спасти-то он спас, но с оттенком разочарования — хотелось посмотреть на казнь девушки. Она, кажется, тоже уже настроилась и потому слегка расстроилась. Тем не менее Глазову Свиридов обрадовался — вечер накануне был хороший, человек приятный.</p><p class="p1">— Здравствуйте, Глеб Евгеньевич.</p><p class="p1">— Не разбудил, Сережа?</p><p class="p1">— Так, почти.</p><p class="p1">— Ну простите. Дело в том, что Чумакова взяли.</p><p class="p1">Свиридов чуть не выронил мобилу.</p><p class="p1">— Как взяли? Кто?</p><p class="p1">— Непонятно кто. Арестован час назад у себя дома. Пришли участковый и двое в штатском. На сайте уже объявление висит про помощь семье, я сейчас поеду туда. Если хотите, давайте вместе.</p><p class="p1">— Где он живет?</p><p class="p1">— На Гиляровского. Давайте через час в метро «Рижская», в центре зала.</p><p class="p1">— Да, я сейчас.</p><p class="p1">Он вскочил, убрал кровать (от этой привычки — первым делом порядок — не отказывался никогда; откажешься — и распад подкрадывается незаметно), спустился в прохладный вестибюль «Профсоюзной» и через сорок минут был на месте. Глазов, деликатный человек, тоже приехал раньше времени.</p><p class="p1">— Он кем хоть работал-то?</p><p class="p1">— В Счетной палате аудитор.</p><p class="p1">— Странно. Я думал, они наглые, а он вроде тихий…</p><p class="p1">— Потому и взяли. Чтоб не выделялся.</p><p class="p1">— Вы от кого узнали?</p><p class="p1">— Семья сразу Бодровой позвонила, а она всех по цепочке. Ранним утром приехали, что-то в семь. Обыска не делали, забрали и все.</p><p class="p1">— Черт-те что. Значит, все-таки это список на посадку.</p><p class="p1">— Не торопитесь, могли взять и по аудиторским делам. Сейчас силовики грызутся…</p><p class="p1">— Ну утешайтесь.</p><p class="p1">— Сейчас, Сережа, не о том надо думать, за что взяли. Надо адвоката, семье помочь, детям, если есть… Сейчас-то и будет проверяться — может из этого списка получиться хоть подобие общества или все так и останутся стадом, бредущим на убой.</p><p class="p1">Около квартиры Чумакова — на шестом этаже белого точечного дома — уже курили и шептались списанты; было как на поминках. Наличествовал и Гусев — правда, без остальных. Впрочем, Панкратов с панкреатитом был уже нейтрализован. Гусев выглядел бледным и явно перепуганным.</p><p class="p1">Свиридова при виде этой спирохеты перекорежила вдруг такая ненависть, что он решительно шагнул прямо к нему и прошипел:</p><p class="p1">— Это вы его сдали, твари? За то, что вчера вступился за меня?</p><p class="p1">— Вы что, — одними губами прошептал Гусев, — вы с ума сошли… зачем… больное воображение…</p><p class="p1">— Не врать! — шепотом прикрикнул Свиридов. — Не врать, сука! Ты вчера донес, я знаю. Ты всех в книжку писал. Он твоего дружка осадил, а ты смотрел. Это вы его, суки, я точно знаю…</p><p class="p1">— Да ты… да что… да завтра любого, тебя, меня…</p><p class="p1">— Что меня, так это точно, — кивнул Свиридов. — Но если тебя, это будет очень правильно. И рано или поздно это будет железно, понял, издатель?</p><p class="p1">— Нашел время, — сказал Гусев и отвернулся.</p><p class="p1">Свиридов вслед за Глазовым вошел в квартиру — на удивление скромную и малогабаритную, если учесть ранг покойного. (Ой, что это я, а впрочем, оставь надежду всяк туда входящий. Если и выйдет, то лет через пять, безнадежно сломленным, седым, он и так не производит впечатления борца.) Из кухни доносились рыдания: жена? Но рыдала мать Чумакова, высокая тощая старуха, сидевшая на табуретке очень прямо и не утиравшая слез. Она выла на одной ноте, потом всхлипывала, замолкала и снова заводила вой. Жена — маленькая, полная и тоже очень бледная — подносила ей то воду, то валерьянку, то валокордин.</p><p class="p1">— Как вы думаете, что с ним сделают? — неожиданно низким голосом спрашивала старуха у каждого вновь прибывшего. Теперь ей что-то вполголоса объяснял Глазов, но она не слушала, выла, прерывалась и принималась выть опять, словно этот вой был важней любого ответа, ибо поддерживал жизнь в Чумакове.</p><p class="p1">— Я думаю, список ни при чем, — почти шептал Глазов. — Но мы все… всё зависящее… У меня есть очень сильный адвокат, я сегодня же созвонюсь…</p><p class="p1">Чумаков, как ни странно, жил скудно. Может, все откладывал, а может, дело было в том, что у него не было детей: где дети — там обычно хоть дешевые, но яркие игрушки… Вся квартира была в стиле отложенной жизни — это часто встречалось тогда: копим, копим и уж тогда наверстаем. И вот он накопил, а кто будет наверстывать — непонятно. Теперь все эти накопления сожрутся мгновенно — на адвоката, на лечение, когда выйдет… Вообще деньги сберегаются, когда возобновляются, — без движения скукоживаются, как сугроб в марте; Свиридов знал эту закономерность. Ничего здесь нельзя ни копить, ни откладывать — либо деньги отберут, либо тебя; получил — съешь.</p><p class="p1">Свиридов пробился к жене Чумакова, заметив, что на подоконнике, сложив руки на коленях, потерянно сидит вчерашняя училка; он кивнул ей и получил в ответ жалкую, кривозубую улыбку. У таких женщин всегда анемия и пахнет изо рта. «А у тебя, сволочь, чем пахнет изо рта? — прикрикнул он на себя. Уже вписался, за всеми примечаешь мерзость, как и положено в стаде?»</p><p class="p1">— Это все выяснится, — ему казалось, что бледная толстая жена гораздо сильней рослой и сильной старухи нуждается в утешении, потому что старуха — он не мог этого не заметить — немного еще и приторговывала горем. Она, вероятно, привыкла со своими болячками быть центром внимания и теперь не могла смириться, что максимум сочувствия достается Чумакову; а впрочем, ведь и это подлая мысль. Мы всегда жалеем тех, кто страдает тише, меньше действует на нервы. Жена Чумакова слушала молча, кивая, пытаясь даже улыбаться.</p><p class="p1">— Сейчас, вы же читали, проверка. Ну они и хватают. Это все демонстрация, пустой звук. Сейчас немыслимы посадки, не «Юкос», в конце концов…</p><p class="p1">— Он никого не сажал, — безнадежно ровным голосом сказала Чумакова. — Никого никогда. Он вообще не мог посадить. Ничего не брал. Если предлагали, не доносил. Надо было.</p><p class="p1">— Нет, не надо было. Взяли бы все равно, а так хоть совесть чиста. Вы увидите, он выйдет днями.</p><p class="p1">Дольше здесь находиться не было смысла. Свиридов кивнул Глазову:</p><p class="p1">— Вы пойдете?</p><p class="p1">— Нет, побуду. Подожду, пока адвокат подъедет. Введу в курс.</p><p class="p1">Оставаться было тошно, уходить одному — еще тошней. Свиридов курил на лестнице, ни на что не решаясь, когда к нему подошел слегка оплывший кучерявый брюнет лет тридцати пяти.</p><p class="p1">— Вы не родственник? — спросил он участливо.</p><p class="p1">— Нет, знакомый.</p><p class="p1">— Из списка? — со значением уточнил брюнет.</p><p class="p1">Свиридов поднял на него глаза и кивнул.</p><p class="p1">— Ну, теперь всех.</p><p class="p1">— Почему вы думаете?</p><p class="p1">— И вы так думаете, — сказал брюнет. — И все так думают. Не только в списке. Не обойдутся без этого, неужели непонятно?</p><p class="p1">— А вы тоже из Счетной палаты? — злясь на эти вечные карканья, зло спросил Свиридов.</p><p class="p1">— Нет, я из Института рыбоводства. Салтыков Алексей. Осетров спасаю. Нацпроект, слышали? Вымирают осетры.</p><p class="p1">— Ну так за что же вас?</p><p class="p1">— Какая разница. А вы кто будете?</p><p class="p1">— Я Свиридов, сценарист.</p><p class="p1">— А. Слыхал что-то. Ну, вас и подавно есть за что. Да всех есть за что. Жопа есть — за нее и берут, не согласны?</p><p class="p1">— Какая разница, — кисло сказал Свиридов. — Согласен, не согласен…</p><p class="p1">— Пойдемте выпьем, — предложил Салтыков. — Тягостно тут, и стыдно лезть. Пойдемте, тут есть место приличное… Я все равно работу прогулял. Надо же посмотреть, привыкнуть, как оно будет… На похороны ходят с той же целью, нес па, простите мой французский?</p><p class="p1">Некоторое время шли молча, заглянули в ближайшее кафе «Шашлычок» и заказали высокорослой белоруске за стойкой графинчик «Косогорова» и по салату оливье.</p><p class="p1">— Этак я сопьюсь, — хмуро сказал Свиридов.</p><p class="p1">— Не худший вариант, между прочим. — Салтыков ободрительно похлопал его по плечу. — В такие времена лучше быть алкашом, надежнее. Я даже читал где-то — Светлова, кажется… или не Светлова, не суть… вербовали в осведомители. Писательское начальство вызвало, говорит: вы же советский поэт, докладывайте о разговорах! А он сразу: понимаете, я алкоголик. И когда выпью — выбалтываю все. Удержать в тайне факт нашего сотрудничества не смогу, а тогда какой же от меня толк? Вся секретность в задницу. Они, понимаете… ну, будем…</p><p class="p1">Выпили.</p><p class="p1">— Они, — продолжал Салтыков, — могут быть рассмотрены как болезнь. Есть правило, что если у кого экзема, то рак практически исключен. Клин клином.</p><p class="p1">— Это называется «Кому суждено быть повешенным, тот не утонет», — вспомнил Свиридов.</p><p class="p1">— Точно, точно. Можно выбрать наименее травматичный вариант. Выбирая алкоголизм, вы избавляетесь от стукачества, от подозрения в нелояльности — потому что у алкоголика не может быть других страстей, кроме выпить…</p><p class="p1">— По-моему, то ли Германа, то ли еще кого-то прорабатывали, он что-то в ленинградском Доме кино крикнул антисоветское. Его вызвали на «Ленфильм», — заговорил Свиридов, — стали стыдить, шить дело, а он: простите, товарищи, не помню, был пьян, смешал коньяк с портвейном. Сразу со всех сторон сочувствие: как можно коньяк с портвейном? Какой хоть портвейн? «Южный»? Ну, после него только повышать! Что ж вы так, молодой человек, — ну и спустили на тормозах.</p><p class="p1">Оба чувствовали себя как на поминках: невыносимое напряжение разрешилось, имеется законный повод выпить за то, что в этот раз закопали не нас. На поминках, собственно, празднуют именно это, но редко признаются.</p><p class="p1">— Знаете, — Салтыков разлил по второй, — тоже не помню, у кого… В общем, если бы тогдашние партбоссы сообразили вовремя сесть по уголовной статье, политическую им бы уже не пришили. Тогда безопасней было — уголовка. Я думаю, что и сейчас, если бы кто из наших попался на краже, он бы сразу вылетел из списка и попал в другой.</p><p class="p1">— Ну, за кражу наверняка посадят, а тут еще бабка надвое…</p><p class="p1">— Вы думаете? — Салтыков мрачно уставился на Свиридова и покачал головой. — По-моему, вопрос времени. И только.</p><p class="p1">— То есть вы допускаете… массовые репрессии по полной программе?</p><p class="p1">— И вы допускаете, — просто сказал Салтыков. — Мы поэтому и пьем здесь.</p><p class="p1">— Нет, не думаю, — попробовал откреститься Свиридов. Ему казалось, что если он не признается в собственном непроходящем ужасе — этот ужас будет менее реален. — Для репрессий нужна как минимум идеология, а тут…</p><p class="p1">— А, бросьте. Что вы этот либеральный бред повторяете? Все ровно наоборот. Это для идеологии нужны репрессии, а сами они возможны без всякого повода. Я после Чумакова точно понял. Так даже и лучше.</p><p class="p1">— В смысле?</p><p class="p1">— В прямом. Они не средство, понимаете? Они самоцель. Мы сейчас наблюдаем самый чистый случай, на ровном месте. Экономика растет, стабильно все, как никогда, оппозиции близко не осталось. Только сумасшедший может в это время составлять расстрельные списки, нагонять страху, гонять несогласных… Ничего же не происходит, ни-че-го! Но им надо, и они будут. Потому что ничего другого не могут. У меня вообще есть теория — я вам сейчас расскажу коротко…</p><p class="p1">Свиридов усмехнулся. У всех была теория. Каждый придумывал России объяснение и сверхцель сообразно темпераменту, выстраивая такую модель, при которой от самого теоретика требовалось бы как можно меньше поступков и жертв.</p><p class="p1">— У человека одна главная задача, — начал Салтыков. — Забыть о смерти. Он готов от нее заслоняться любой ценой, придумывает миллион отвлечений — вся культура для этого, вся наука, что хотите. Но отвлекаться, как вы знаете, можно высокими способами, а можно низкими. Бетховен сочиняет «Па-па-па-пам!» — Салтыков напел, — Пушкин пишет «Я помню чудное», а дауны дрочат. Вы даунов наблюдали?</p><p class="p1">— В кино. В жизни редко.</p><p class="p1">— А я часто. В молодости думал, что надо делать добрые дела, а все остальное бессмысленно. Ходил в Дом ребенка, видел множество идиотов. Вот они и развлекаются. Дрочат по углам безо всякого стеснения. Это их единственное развлечение.</p><p class="p1">— Помню. Но не хотите же вы сказать, что Россия — такой даун?</p><p class="p1">— Именно это и хочу, — с удовольствием подтвердил Салтыков. — Есть самогипнозы высшего порядка, есть низшего. Здесь даунизм выбран добровольно, в результате проб и ошибок. Попробовали высший порядок, не пошло, неинтересно, — это как любера вести в кино на Антониони. Он посмотрит и опять выберет качалово, мочилово, групповое кричалово на стадионе, насилово в подъезде… В результате для отвлечения от смерти и прочей экзистенциальной проблематики выбран простейший вариант. Пункт а: произвольно делим всех на земщину и опричнину. Пункт б: опричнина ебет земщину. Жестоко, с наслаждением, с надрывом, с полным забвением приличий. Критерий выбора произволен: это могут быть, допустим, бояре и дворяне, а могут русские и евреи, буржуи и пролетарии, коммунисты и беспартийные… В настоящий момент мы видим триумф наслаждения как такового, с полным отказом от мотиваций: список составляется произвольно, и сверху недвусмысленно указывается: этих можно. Аллонз анфан де ля патри, извините мой французский.</p><p class="p1">Чувствовалось, что Салтыков ненавидит Родину и это ему очень нравится. Родина поистине решала все экзистенциальные проблемы Салтыкова, поскольку на нее можно было списать любые неудачи, дурную погоду и даже собственную смертность. В остальном мире, вероятно, никто никогда не умирал — или смерть была не так травматична, вследствие чего и отвлекаться от нее можно было менее брутальными развлечениями вроде того же Антониони; но здесь, чтобы избыть ужас чисто русского небытия, требовался беспримесный садомазохизм.</p><p class="p1">— Вообще вы только что описали нормальный механизм формирования элиты, — сказал Свиридов. — Элита на виду, по ней догадываются о тенденциях, она уязвимее, и формируется она чаще всего именно списком — скажем, списком толстожурнальных авторов при совке, списком «Звезд на льду» после совка…</p><p class="p1">— У элиты, во-первых, есть права, — назидательно возразил Салтыков. — Есть возможности.</p><p class="p1">— Ну и у нас есть, только мы их еще не знаем…</p><p class="p1">— А, не смешите. Право сесть, как у Чумакова?</p><p class="p1">— Чумаков не один, и мы не знаем, за что он сел…</p><p class="p1">— Ах. «Опять эта проклятая неизвестность», — знаете анекдот?</p><p class="p1">— Знаю, знаю. Мне его за последний месяц три раза рассказали.</p><p class="p1">— А кто виноват, что вы с первого не понимаете?</p><p class="p1">— Подождите, Леша. Почему обязательно права? Бывает элита интеллектуальная, бывает светская. У нее никогда никаких прав, только право быть на виду и подвергаться социальным изменениям в первую очередь… На ней как бы демонстрируется, что сейчас будет со всеми…</p><p class="p1">— Никогда не слышал о таком способе формирования элиты, но допустим, — буркнул Салтыков. — Понимать элиту как фокус-группу — это, знаете, что-то новое. Но допустим, что они сделали именно фокус-группу. Тогда, во-первых, категорически непонятен принцип отбора, что уже исключает всякую транслируемую мысль…</p><p class="p1">— Почему непонятен? Модель народа, говорил же Волошин…</p><p class="p1">— Ну какая модель народа, Сережа? Что вы свое сценарное образование никак не уймете, выдумываете сюжет, где нет сюжета? Где в этом списке крестьянство — в крестьянской стране, где сельское население до сих пор шестьдесят процентов?</p><p class="p1">— Может, они составляют модель городского. Сельское нерелевантно, ничего не решает, спивается…</p><p class="p1">— Ничего себе подход, шестьдесят процентов нерелевантны! Вы истребитель прямо! Дети тоже нерелевантны? Старики? Они что, один средний класс моделируют, в диапазоне от двадцати до пятидесяти? Но даже и это допустим, я сегодня добрый. Если бы тем самым транслировалась какая-то мысль, я бы понял. Но транслируется чистое истребление с предварительной диспансеризацией, и я не понимаю, что должно сделать население, которому показывают такую вещь. Я понимаю, когда сажают олигарха: остальные олигархи должны заткнуться и раздать часть активов на благотворительность. Но когда сажают Чумакова, что должны делать остальные чумаковы? Разбежаться из страны? Выброситься из окна? Какую цель они преследуют, кроме разделения и истребления, — у вас есть хотя бы догадка? По-моему, они просто пометили крестом людей, с которыми все можно: тут вам и идеальный выход для народной эмоции, и полная неспособность делать что-нибудь созидательное, все дела.</p><p class="p1">— Но деление и взаимное истребление существовали во всем мире. Вы наверняка знаете, что при Елизавете в Англии было еще кровавей, чем при Грозном…</p><p class="p1">— Господи, ну что вы повторяете эти зады?! Вы же не производите впечатления зомби, простите мой французский! Что вы, Мединского обчитались? Он тоже все доказывает с цифрами в зубах: мы не пьяницы, потому что американцы пьют больше. И не садисты, потому что при Кромвеле убили больше. Все эти оправдатели национальных матриц никак не возьмут в толк: да, убивали, да, больше, да, все вообще когда-нибудь умрут, и со статистической точки зрения между Грозным и любым европейским монархом нет принципиальной разницы, плюс Грозный рисовал и музицировал. Проблема в одном, передайте Мединскому, если встретится, — водка действовала, и отступления Салтыкова становились все многословнее. — Когда девственница-королева уничтожает, положим, Саутгемптона или Эссекса, она искореняет измену или окорачивает зарвавшегося фаворита, но в любом случае вытворяет все эти художества не на пустом месте. Людей варят в котлах, да, но не в массовом порядке, не коптят, не рубят, как туши, не участвуют в казнях лично, не пронзают допрашиваемых посохом, не выдумывают заговоров каждый год, не делят всю страну на англичан и неангличан, на ground-щину и ехсерщину, простите мой английский… Во всех ужасах Елизаветы и Кромвеля, и даже во всех почти ужасах Робеспьера есть смысл и причина. Нигде так явно не прослеживается оргиастическое начало, радость ножа, как говорил Адамович, нигде нет такого упоения процессом при абсолютной мизерности цели — потому что чего он достиг, сука, своей земщиной и опричниной? Что он укрепил, какую вертикаль? Пуф, смутное время, ноль пользы. Страна в говне, народишко сам себя за волосы выволок. А теперь — святой, теперь — с нами иначе никак! Теперь Сталин. Общее место: взял страну с крестьянской лошадкой, оставил с космической ракеткой. Во-первых, сколько помню, это приписывается Черчиллю, а Черчилль вообще был человек не особенно доброжелательный к прочим нациям, он говаривал, что и Гитлер хорош для Германии, и Муссолини для Италии, и Честертон, кстати, приветствовал Муссолини — вы в курсе?</p><p class="p1">Свиридов кивнул, хотя мало знал о Муссолини и того меньше — о Честертоне; но Салтыков и не нуждался в подтверждениях.</p><p class="p1">— Это, знаете… еще по двести, да? Алло, еще по двести! — Белоруска хихикнула на его «алло» и поспешила налить. — Это как белый человек смотрит на игры туземцев, и естественно, чем больше туземцев перебьет очередной вождь, тем лучше для британской короны. Обратите внимание, в Англии всегда одобряют русскую диктатуру. Я вам больше скажу, ее и Штаты одобряют. Но это потому, что мы им когда-то, на миг, показались своими, — а теперь стали окончательно и бесповоротно выродками, чуждым народом, которому безнадежно прививать мораль. Себе бы такой власти в жисть не пожелали, но для дикарей то самое, бич Божий в натуральную величину.</p><p class="p1">Салтыков выпил и уставился на Свиридова.</p><p class="p1">— Смысл, смысла… Всем смысла! А мы живем во времена величайшего его выхолащивания, мы с вами уже вовсе ничем не виноваты, не посягали на власть, не колебали мировых струн, тихие обыватели. Вы видели мебель в квартире Чумакова?</p><p class="p1">— Видел, — кивнул Свиридов. Ему положено было обращать внимание на декорации, и он заметил обшарпанные шкафы из ДСП.</p><p class="p1">— Это похоже на магната? На тайного агента?</p><p class="p1">— Нет, пожалуй. У тайного агента или фанатика было бы совсем голо или бардак, а тут честная бедность. Жалкое зрелище.</p><p class="p1">— Ну! — кивнул Салтыков. — Я про что и говорю. Чистое спортлото. Ну, может, кого-то — с учетом заниженной сопротивляемости, потому что жертва должна быть жалкой. Ручки тоненькие, ножки тоненькие. Вы же видели эту семью. Как вам мамаша?</p><p class="p1">— Жалко мамашу.</p><p class="p1">— И вашу жалко. И мою жалко. Моей матери, между прочим, шестьдесят пять лет, я ранний ребенок. Вполне себе бойкая пенсионерка, подруг масса, женоклуб. Гордится моими успехами как я не знаю что. Особо гордиться нечем, но тем не менее. Фотографии — я и внучки, я и осетры. Очень жалко трогательную старуху и весь женоклуб. Но они от этого и получают особенное наслаждение — борца что же толку хватать? Он только того и ждет, он от этого кончает… А мы плачем, робеем, спиваемся вот тут с вами, обсуждаем участь, пища пищит… Они чаще всего берут семейных, вы заметили? Одиночки никому не нужны.</p><p class="p1">После этих слов Свиридов понял, что вся салтыковская ненависть к отчизне проистекала из страха за семью, бешеного и неотступного. Любить действительно можно что-нибудь одно — или семью, или Родину, и Родина все время угрожала семье. Надо бы узнать, не было ли у Чаадаева тайной страсти или большой семьи; семьи, кажется, не было, мать умерла, когда он был младенцем, что-то было с адресаткой философических писем, темная, бурная история… но скорей всего, виновато было нежное сложение, хронический страх всего, из-за которого он незадолго до смерти даже и доносил, доказывая благонадежность; вот о нем Свиридов читал, поскольку предполагался байопик о Пушкине и надо было знакомиться с материалом. Философическое письмо ему, кстати, понравилось — но слегка смутило именно удовольствием, с каким было написано; автор злился, досадовал, упрекал, но не страдал. Он был хорош на фоне России, такая Россия была нужна ему для самооценки. Вообще все картины мира, в которых во всем была виновата среда, отдавали оскорбительной простотой. Свиридов сам не понимал, отчего салтыковская вера в русскую само-истребительность ему противна; тошней всего было думать, что он стремится поскорей свернуть этот разговор из трусости, потому что Салтыков разглагольствовал все громче и рискованней, могли услышать, подслушать… Ужасно было это стремление объяснять все наиболее унизительным для себя и других образом, и ведь появилось оно недавно, только со времен списка, словно все попавшие туда лишились права на благородную мотивацию. Свиридов воспротивился заказу очередных двухсот граммов и позвонил Але. Этого ему хотелось больше всего, и отказывать себе он больше не мог.</p><p class="p1">— Приезжай, — неожиданно сказала она с грустной лаской, какой Свиридов давно уже не слышал в ее голосе; кажется, она тоже устала чему-то сопротивляться. Он попрощался с Салтыковым, быстро потерявшим к нему интерес и явно набравшимся, и отправился на «Киевскую», где они договорились встретиться. Аля уже была там — она редко приезжала вовремя, а тут дожидалась, и Свиридову увиделся в этом хороший знак. Стало быть, не ему одному несладко в разлуке. Они поднялись на площадь Европы и уселись под пестрый зонтик. Свиридов расслабился и сразу заговорил о том, как не может больше один, как измучился, как сходит с ума от страхов и призраков, — но начисто забыл, что расслабляться с Алей нельзя. Она любила его либо победителем, либо в худшем случае борцом.</p><p class="p1">— Сереж, — сказала она, и он обрадовался этому обращению, тоже редкому, не догадываясь, что за ним последует. — Мне кажется сейчас, что я никогда с тобой не съедусь.</p><p class="p1">Свиридов похолодел.</p><p class="p1">— Можно бы хоть сейчас без загадок, а?</p><p class="p1">— Сереж, ну а что такого сейчас? — спросила она грустно. — Что особенного? Тебя внесли в какой-то список, и это стало главным содержанием твоей жизни. Тебя не вызывают, не берут, с одной работы выгнали, другую предложили. Ты живешь как живешь, и никакой жизни у тебя больше нет. Я не костыль, Сережа. Я не могу съезжаться с человеком, который так зависит от ерунды. Я женщина, мне нужно плечо.</p><p class="p1">— Потрясающая пошлость, — сказал Свиридов.</p><p class="p1">— Ну да, пошлость, а ты чего ждал? Ты не знал об этом, может быть? Ты мечтал, что я буду тебе коней останавливать, нос вытирать? Я никогда не буду мужчине опорой, я сама, между прочим, две недели назад слетела с работы, но ты ведь не узнал об этом?</p><p class="p1">— Какого же черта ты молчала, Аль? Нельзя так — сама молчу и от других требую…</p><p class="p1">— Человек никого не имеет права собой грузить, — сказала она тихо.</p><p class="p1">— Кто тебе это внушил? Что за идиотский принцип? Да человек человеку постольку и нужен, поскольку он вообще способен его собой грузить, что-то ему про себя говорить, вообще перед ним открываться… Кто тебе внушил это человеконенавистничество, что никто никому не должен?!</p><p class="p1">— Человек человеку должен, — говорила она все так же тихо и монотонно, и он видел, что она мысленно не раз проговаривала эти слова, готовилась к встрече и торопила ее сейчас только для того, чтоб скорее разрубить узел. Ситуация была та самая, наихудшая: он был здесь в тягость, ей казалось, что он ее тянет на дно, что его несчастье заразительно. Всякая женщина хочет только одного — приземляться на четыре лапы. Он ненавидел ее в эту минуту. — Человек человеку должен много всего. Должен беречь, помогать, не грузить. Это мерзко, это, наконец, негигиенично — жаловаться женщине на свой страх. Ты меня используешь как прокладку. Ты сейчас мне десять минут рассказываешь, как тебе плохо и страшно и как я поэтому должна с тобой съехаться. А мне самой сейчас плохо и страшно, и мне нужен тот, на кого я могу опираться, тот, кто вытащит меня из этого.</p><p class="p1">— Люди только так друг друга и вытаскивают, Аль, — сказал он, отлично понимая всю бессмысленность разговора. — Тебе плохо, мне плохо, вместе нам лучше.</p><p class="p1">— Так вытаскивают друг друга не люди, а инфузории. Или прокаженные, как ты сам говоришь. Заразились и лежат, где-то я это читала, весь лагерь их ищет, а они под полом спрятались в санчасти и лежат, оба белые и блестящие, как личинки майского жука. Личинка майского жука называется хрущ.</p><p class="p1">Свиридов чувствовал, что отвратителен ей сейчас примерно так же, как этот самый хрущ, белый, блестящий и красноглазый, и ненавидел себя еще больше.</p><p class="p1">— А люди, Сережа, — закончила она, — должны быть друг другу не прокаженными, и не брызгать своим гноем на другого, и не прятаться под полом в санчасти. Вот из-за того, что вы всем списком трясетесь, с вами и можно сделать что угодно. А некоторые, судя по сайту, вообще получают от случившегося большое удовольствие. Только что я был никто, и вот я в списке.</p><p class="p1">— Тебе бы такого удовольствия, — сказал он сквозь зубы.</p><p class="p1">— А ты ничего не знаешь про мои удовольствия. И скажи мне за это спасибо.</p><p class="p1">— Ну спасибо, — сказал Свиридов. — Этого я примерно и ждал. Уж если ты разлюбишь, так теперь, и с полным сознанием своей красоты. Я прокаженный и под полом, а ты в шоколаде и ноги об меня вытираешь. Спасибо, спасибо. Это, знаешь, как маньяк девушке говорит, застегиваясь: посмотри на себя, на кого ты похожа…</p><p class="p1">— Я тебя не насиловала.</p><p class="p1">— Меня другие сейчас насилуют, а тебе не нравится, как я неэстетично ору.</p><p class="p1">— Ну что ты дурак такой? — Она ткнулась ему в грудь и разревелась. — Никто тебя не бросает, я просто говорю, что съезжаться не могу…</p><p class="p1">— Да не надо съезжаться, не надо мне твоей милостыни! — Он почувствовал, что твердыня подалась и надо развивать успех. — Я просто не понимаю, почему я всю жизнь обязан изображать восторг…</p><p class="p1">— Ты ничего не обязан, — сказала она, сразу успокоившись, точно при первой попытке огрызнуться перестала его жалеть. У нее это тоже было хорошо поставлено — быстрые переключения. — Никому ничего не обязан. Но и я не обязана жить в чужой роли, нет? Я могу быть с человеком, которому нужна я. Но тебе сейчас нужна не я, а кто угодно. Лишь бы сопли утирала. Посмотри, во что ты превратился. Ты кисель, ты жалуешься, ты ходишь к этим людям, которые тебе вообще неизвестно кто, и распространя ешь идиотские слухи, которые они выдумывают. Тебе в голову не приходит, что можно просто жить. Просто жить и класть на все это.</p><p class="p1">— Да я рад бы жить! — взорвался он. — Я что, сам себе все это устроил? Я бы жил, но не дают…</p><p class="p1">— Вот когда не дадут, тогда и будешь истерить. А пока тебе все дают, и никаких проблем. Ты уже двадцать раз вещи собрал, а за тобой не идут и не идут, и не придут, можешь мне поверить…</p><p class="p1">— А Чумаков?</p><p class="p1">— Что Чумаков? В этом списке двести человек, одного взяли, и все с ума сошли. Завтра у кого-нибудь, не дай бог, СПИД случится, и ты будешь думать, что тебя тоже заразят? Нельзя же до такой степени идти у них на поводу, им же, кроме страха, ничего не нужно! Тебя за месяц превратили в котлету, а ты хочешь, чтобы я с тобой съезжалась. Я с тобой съедусь, когда ты опять человеком будешь. Если будешь. У меня чувство, что ты теперь нарочно начнешь сырки тырить в гастрономах, только бы взяли поскорей.</p><p class="p1">— Ладно, — сказал Свиридов. — Пойду я.</p><p class="p1">Он надеялся, естественно, что она его будет удерживать, но она кивнула и сама быстро пошла прочь, и правильно сделала — это до того его взбесило, что он затосковал по ней всерьез только через неделю. Лучшей анестезии, чем злоба, еще не придумано. Смотри стихотворение Эдуарда Асадова «Баллада о любви и ненависти», где летчик, замерзая во льдах, лишен всякого стимула ползти дальше, и тогда благородное воинское начальство устаривает ему прямой разговор с женой. Почему-то спасти его нельзя, он может выкарабкаться только сам, но прямую связь организовать можно. И жена, к полному удивлению благородного командира, ему говорит: это очень хорошо, что ты там пропадаешь в снегах, потому что я люблю другого (чуть ли даже не благородного командира). Это так на него действует, что он прополз, выполз, вырубился из льдов, порвал всю Арктику на британский флаг, но как-то вылез. И тогда она ему торжественно говорит: милый, ничего не было, но если б ты как следует не завелся… Мысль о том, что Алька все затеяла из педагогических целей, явилась ему довольно скоро, но он ее отогнал. Кто она такая, чтобы чему-то меня учить? Кто вообще решил, что человек обязан быть сильным? Наше представление о силе чаще всего связано с тупой грубостью, и ей нужно именно это; а я наконец позволю себе быть тем, кто я есть, слабым и мучающимся человеком среди деревянных, и благо списку, если он наконец содрал с меня коросту.</p><p class="p1">Вечером третьего августа ему позвонил Рома и сказал, что сейчас приедет.</p><p class="subtitle">12</p><p class="p1">Рома опять был под шофе. Кажется, в последнее время он вообще не просыхал, боясь, что в первую же пятиминутку трезвости рухнет вся его прекрасная новая жизнь, в которой он был уже не шоумен, а постановщик «Команды», член Общественной палаты и всемогущий любимец верхов. Его уже тошнило. Чтобы поддержать себя в состоянии растущей востребованности и всемогущества, нужно было не уходить в запой, как случалось, что греха таить, в юности, и не завязывать вовсе, а пить в строгой пропорции; и все остальное надо было делать так же, в четверть силы, балансируя на тончайшей грани. Пока ему удавалось соответствовать, но каждый грамм мог непоправимо испортить дело.</p><p class="p1">— Слушай, — сказал он и надолго замолчал, глядя на Свиридова в упор карими коровьими глазами.</p><p class="p1">— Я слушаю, — напомнил Свиридов.</p><p class="p1">— У тебя покурить нет? Косячок?</p><p class="p1">— Нет.</p><p class="p1">— Да не бзди, я не сдам, — широко улыбнулся Рома.</p><p class="p1">— Правда нет. — В последнее время Свиридов разучился поддерживать шутки.</p><p class="p1">— Хер с тобой, обойдусь. Слышь, Свиридов. Я тебе скажу сейчас вещь, которую говорить не имею права.</p><p class="p1">Он опять замолчал. Свиридов стоял у двери кухни, Гаранин сидел на табуретке. Гаранин смотрел все требовательней, снизу вверх, как следователь на картине «Допрос коммунистов».</p><p class="p1">— Знаешь, Ром, — сказал Свиридов, — я уже привык, что сейчас никто ничего не имеет права говорить. Все, кто говорят, делают большое одолжение. Я оценил.</p><p class="p1">Гаранин хлопнул себя по колену и расхохотался.</p><p class="p1">— Ладно, ладно. Хотел сделать обстановку, не вышло. Никакой тайны, Серый. Ни-ка-кой. Ты сейчас уссышься.</p><p class="p1">— Уже, — без улыбки сказал Свиридов.</p><p class="p1">— Ну гляди. Мне вообще довольно стыдно. Я бы еще время потянул, понимаешь? Потому что я тебе скажу, и ты будешь жестоко разочарован. Жес-то-ко.</p><p class="p1">— Хорошо, давай.</p><p class="p1">— Дело в том, — сказал Рома и замолк в третий раз. Свиридов не тормошил его больше. — Дело в том, что вот представь такую вещь. Представь себе, что ты пошел, я не знаю, поехал, или к тебе пошла… что у тебя, короче, девушка. И у вас первый раз. И девушка пошла в уборную и пукнула. И ты услышал, как она пукнула: тпррумпф! — Он изобразил девушкину оплошность, девичью неприятность, детскую неожиданность. — Ты можешь сколько угодно делать вид и вообще. Но можно ли тебя теперь вычеркнуть из списка людей, которые слышали, как эта девушка пукает?</p><p class="p1">Свиридов насторожился. Рома был пьяней, чем ему показалось. Логика его была извилиста. Что я мог такого видеть и слышать, такого сверхтайного, полуприличного? Наверняка что-то про кого-то ляпнул, выдумал и ляпнул, как про эту обосравшуюся с медвежонком, но ведь список начался до того!</p><p class="p1">— Нет, — сказал он осторожно. — Вычеркнуть меня из этого списка нельзя.</p><p class="p1">— Ну! — сказал Рома и протянул ему руку. — Вот ты все и понял.</p><p class="p1">— Ничего не понял, — честно сказал Свиридов, пожимая гаранинскую пятерню.</p><p class="p1">— Ты посмотрел «Команду», — назидательно сказал Гаранин. — Можно ли тебя вычеркнуть из списка людей, посмотревших «Команду»? Нет, это несмываемо. Ты с этим помрешь, и на могиле твоей будет написано: здесь лежит Сергей Свиридов, посмотревший «Команду». Это все, что я имел вам сказать, мой маленький друг, мое кисо.</p><p class="p1">— Ром, не смешно. Я был у Чумаковой, у которой мужа взяли. Ты не представляешь, в каком она состоянии.</p><p class="p1">— Тьфу, черт. — Рома встал и налил себе воды из-под крана. — Что я, не знаю? Я потому и приехал. Серый, вот матерью тебе клянусь, это ни при чем совершенно.</p><p class="p1">— г Да, да. Ты сейчас скажешь, что это совпадение и что он в списке случайно.</p><p class="p1">— Да нет же, твою мать! Ни хера не случайно! — заорал Рома. Привык орать там у себя на Николиной горе, участок в гектар, сколько ни ори — соседей не перебудишь. — Они не знают, что делать, ты понимаешь, нет? Они ничего больше не умеют, кроме как брать. У них есть список, и они мастерятся кто во что горазд. Спускают на таможню — проверяет таможня. Сообщают на работу — одного из одной конторы выгоняют, другого в другом месте повышают. Этого идиота вообще берут. А другие делают диспансеризацию, потому что умеют только делать ди-сран-спан-снаб-спам-сериализацию… стерилизацию… блядь, нельзя столько пить. Ты понимаешь, такое чувство, что они только и ждали списка, чтобы начать действовать… чтобы делать то единственное, что умеют. Вот вообрази. — Ему явилась очередная метафора. — Вообрази, есть мужик и медведь. Деревянный деревенский идиотский тупой дурацкий прибор. Русский народный. Через него при определенных обстоятельствах течет вода, и мужик и медведь, приделанные к колесу, забивают гвоздь или болт или что они там на что забивают. Причем никакого гвоздя нет, у нас деревянное зодчество без единого гвоздя. Потом вода перестает течь, и все замирает, и никто ничего не предпринимает. Но потом вода опять начинает течь, так?! И мужик и медведь опять забивают гвоздь! Мужик и медведь не способны делать ничего другого! Что ж они, виноваты? Ну, виноваты. Но вообще нельзя же не пустить воду.</p><p class="p1">Он налил еще кружку, единым духом опорожнил ее, бросил в раковину и провел по лицу мокрой рукой.</p><p class="p1">— Серый, — сказал он вполне трезво. — Сосредоточься, так? Ты хорошо помнишь, как ходил на «Команду»?</p><p class="p1">— Хорошо.</p><p class="p1">— Помнишь, там стояла рамка?</p><p class="p1">— Да.</p><p class="p1">— И всех переписывали.</p><p class="p1">— Да.</p><p class="p1">— Там вас было триста человек. Они вас всех переписали. И все.</p><p class="p1">— Господи, — сказал ошеломленный Свиридов. — Но зачем?</p><p class="p1">— Таргет-гру-у-уппа! — ликующе протянул Рома. — Прикинь, они дали мне деньги на картину. Фонд народного кинематографа. Это их контора, они через нее крышуют и финансируют всякие свои проекты. Но они же не просто так дают бабки, так? Они, конечно, шестнадцать пишут, восемь в уме. Восемь они пилят, так? Но восемь дают. Я за восемь снимаю «Команду», кручусь, хуё-моё. Но им желательно видеть результат, ты понимаешь? Они спонсорнули патриотичное кино и хотят теперь видеть, как оно подействовало. Их интересует откат, отдача. Сколько призывников изъявило желание пойти и послужить Отечеству? Сколько выполнило демографическую программу и родило в первый же год? Сколько записалось в добровольные осведомители, которых каждый день приглашают на всех эскалаторах? Ну? Они составили список людей, посмотревших «Команду» в первую неделю. Сделали случайную выборку человек на триста — у вас там еще записались не все. Передали его по месту жительства, распространили на таможни, в почтовые отделения, на рабочие места. Они стали наблюдать, как искусство действует на жизнь, потому что вложили в искусство восемь зеленых лимонов. Это они изучили маркетинг, прикинь. Изучили маркетинг, выбрали сто восемьдесят человек из трехсот и стали по ним изучать, как патриотическое кино формирует им страну. Теперь понял?</p><p class="p1">— Нет, — еле выговорил Свиридов. — Не может быть, бред. Почему тогда взяли Чумакова?</p><p class="p1">— Ну а что они еще могут?! — завопил Рома. — Чего ты такой, блядь, тупой?! Они же не доложили там внизу, что это за список. У них же на всех уровнях долбаная секретность. Они спустили список и велели смотреть. А дальше кто во что горазд: ты не знаешь, как понравиться начальству? Один, чтобы ему понравиться, всех сажает, другой всех увольняет, третий устраивает гуманитарную помощь. Четвертый вообще приглашает всех по списку на встречу ветеранов спецслужб, думая, что это список на аккредитацию. И ни одна рука не знает, что делает другая. Ты допер?</p><p class="p1">— Идиотизм, — сказал Свиридов.</p><p class="p1">— Ну а чего ты хотел? Ты пойми: они все только и ждали, пока спустят список! И им совершенно неважно, список чего! Они же со скуки выли, прикинь. Сколько можно брать физиков за дружбу с китайцами?! А тут мы имеем большое благодатное поле. У нас есть сто восемьдесят человек непонятного назначения в оперативной разработке. Даже вот, видишь, медосмотр. Это, наверное, кто-то решил, что вы опергруппа, стал с вами заниматься физкультурой… — Рома беззвучно засмеялся, запрокинув лысую голову. — Блядь. Прости меня, Серый. Я не должен был тебя звать. Я ни хера не знал, что они вас всех перепишут. Если бы я знал, что они из-за этого пиленого бюджета будут контролировать, как моя картина действует на людей…</p><p class="p1">— Ну и как она действует? — поинтересовался Свиридов.</p><p class="p1">— Херово действует! — рявкнул Рома. — Практически никак. А ведь я тебе, Серый, честно скажу, что это не самая плохая картина. Я бы даже сказал, что процентов на семьдесят она хорошая. Дядя мой говорил, что если картина удалась процентов на двадцать, то это большая художественная удача. Так вот, для такого говна, как я, это охеренная художественная удача. Звезды ли так сошлись, хуё-моё, но это кино. А вы все, еб твою мать, вместо того чтобы вести себя как люди, как эти, блядь, дети, которых послали умирать… вы все боитесь неизвестно чего, вы обоссались уже с ног до головы, вы ссыте всеми частями тела! Вы могли сказать, как Федя Смурной: «Смерть придет — меня не будет!», и пойти брать высоту. Но из вас никто ни хера не сказал, вы тоже умеете только ссать, и это не моя, блядь, режиссерская недоработка, а ваша блядская привычка…</p><p class="p1">О своей картине Рома мог говорить только серьезно. Кажется, он верил, что движет мирами, и идея списка почти наверняка была его собственная.</p><p class="p1">— Ну спасибо, — выдавил Свиридов.</p><p class="p1">— Кушай на здоровье, — бросил Рома.</p><p class="p1">Некоторое время они молчали, глядя друг на друга. Свиридов вдруг почувствовал тайное преимущество перед Ромой, чуть ли не моральную правоту — казалось, он давно забыл это чувство, и возвращение его было сладостно.</p><p class="p1">— И что с нами теперь будет? — спросил он наконец, не придумав ничего умней.</p><p class="p1">— Вопрос «что будет?», — сказал Рома, ухмыляясь, — мы всей страной можем теперь засунуть в жопу. Понятно только, что будет херово, причем и вам, и нам. Но понять, как именно будет херово, не может на данный момент никто, включая самого-самого. Могу тебе в утешение сказать, что через двадцать лет… ну тридцать… все вы будете занесены в другой список, типа отважные сопротивленцы или героические жертвы, это я не знаю. Поскольку некоторые к тому времени вымрут сами собой, можно будет списать как жертв. Но ты доживешь, тебе дадут снимать все что хочешь, ты к тому времени от страху будешь в глубоком маразме и снимешь такое говно, что народ окончательно убедится в правильности вашего загнобления. Это устраивает?</p><p class="p1">— Почему ж, устраивает, — сказал Свиридов. — А за границу нас будут выпускать?</p><p class="p1">— Кому ты на хрен усрался за границей?</p><p class="p1">— Да это не вопрос, Рома. Вопрос теперь — жопу спасти.</p><p class="p1">— А откуда я знаю? — спросил Рома. — Ты пойми. Вот я тебе сейчас, чтобы ты лучше понимал, объясню на самом наглядном примере. Но мне надо выпить, Серый. Неужели у тебя нет больше выпить?</p><p class="p1">— Есть ночной магазин через остановку.</p><p class="p1">— Ладно, обойдусь. — Рома снова потер лицо. — Вообрази такую вещь, еще проще, чем с медведем. Есть тело, у которого так много раз отрубали голову, что оно научилось существовать без головы. И даже, я думаю, это такая саморегуляция, потому что я же теперь в Общественной палате, ты понимаешь, да? Я — в Общественной палате! А когда я смотрю там на остальных, которые вообще ни хера не умеют, кроме как организовывать пионерский кружок «Поиск», — я понимаю, что это такой принцип. Есть организм, которому без головы хорошо. Но у него есть нервный центр, находящийся, допустим, в Кремле, или в администрации, или я не знаю где, который периодически посылает импульсы: работайте, блядь, лучше! Работайте больше! Иногда нагоняет страху, типа чтобы стало эффективнее, хотя бояться нечего и мы ничего не строим. Но все органы у этого тела функционируют, они просто не скоординированы и работают кто во что горазд. Понимаешь? Они не имеют цели, но руки, скажем, очень усиленно машут. Ноги идут на месте со страшной силой, высоко поднимают коленки, иногда кого-то лягают с правильной периодичностью. Сердце стучит, как прямо я не знаю, и скачет из груди. Желудок переваривает пищу, потому что он не может не переваривать. Жопа срет. Говно, то есть интеллигенция, воняет, и тоже усиленно. Вот этому телу поступила из нервного центра совершенно хаотическая команда: усилить! Глаза усиливают бдительность. Ноги усиливают шагание. Руки — хватание. Говно — воняние. — Гаранин говорил и показывал; выходило похоже. А я-то все думал, кого или что мне все это напоминает. А оно напоминало пьяного Гаранина в моей кухне. — Мы получаем агрегат, работающий на полную мощность над взаимоисключающими задачами. Есть вы, то есть объект. И вам теперь всем будут с максимальной силой давать звездюлей, давать премии, давать работу, не знаю что еще давать, и все это по полной программе, потому что у этого тела больше нет никаких мозгов. Я не знаю, честно тебе скажу, почему их больше нету. У меня их тоже не очень много, я не мыслитель совершенно, вот как на духу. Очень может быть, что они когда-то были, но поскольку все осмысленные телодвижения рано или поздно приводили в жопу, то они и решили, что без смысла будет лучше. У них же при свободе и несвободе получается примерно одинаково. Теперь они решили вообще безо всего, безо всякого смысла, без добра и зла, и это страшно только для одной категории населения. Только вот для той несчастной категории, которую это тело как-то заметило. Ты про Малинина слышал чего-нибудь?</p><p class="p1">— Про певца?</p></span>
