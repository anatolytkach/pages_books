<span><p class="p1">Ехать до Юры оказалось недалеко — интересно, в список попал только Юго-Запад или еще кто нибудь? Худой серый Юра ждал его во дворе, домой не пригласил.</p><p class="p1">— Лучше тут, — сказал он, не входя в объяснения.</p><p class="p1">— Я так понял, у нас с вами общая проблема.</p><p class="p1">— Можно и так сказать, — уклончиво согласился Юра.</p><p class="p1">— А как еще сказать? Вы тоже допускаете, что это список на поощрение?</p><p class="p1">— А кто так говорит?</p><p class="p1">— Муж сестры вашей, я не знаю, как это называется.</p><p class="p1">— Деверь, — сказал Юра. — Ну, он вообще блаженный.</p><p class="p1">— Не такой уж блаженный, но ладно. Сами-то вы как думаете — действительно налоговая?</p><p class="p1">— Да ну, налоговая, — сказал он. — Будут они из-за двух рублей…</p><p class="p1">— Именно из-за двух рублей и будут. Из-за миллиона им стремно.</p><p class="p1">— Да нет. Я думаю, это список не за что-то, а для чего-то, — сказал сантехник и посмотрел на Свиридова с хищным интересом.</p><p class="p1">Вот такие-то, серые и стертые, всегда и сходят с ума. Не какие-нибудь творцы, богема и пьяницы, а такие тихие. Приходит однажды на работу со сковородкой, надетой на голову — от инопланетных волн, внушающих ему, что он должен сейчас, немедленно, купить двенадцать плавленых сырков «Дружба».</p><p class="p1">— Почему вы так думаете? — ровно спросил Свиридов.</p><p class="p1">— А иначе они не стали бы в интернете размещать, — с готовностью пояснил Юра. — Там же абы кто не может разместить, правильно?</p><p class="p1">— Как раз может абы кто. А что там в интернете?</p><p class="p1">— А вы что, не были? Вэ-вэ-вэ список сто восемьдесят народ ру. Как же вы не знаете?</p><p class="p1">— А вы откуда знаете?</p><p class="p1">— Парень мой нарыл, — с гордостью признался Юра. — Рубит в этом деле, как я не знаю. В поисковик какой-то запостил — «список», и просмотрел все новости. Вторая новость как раз и оказалась. Там про нас целая история. Приглашают записываться.</p><p class="p1">— Почему приглашают? — опешил Свиридов.</p><p class="p1">— Ну, это завели кто попал. Чтобы собрать остальных.</p><p class="p1">— И что сделать?</p><p class="p1">— Это я не знаю, что сделать, — посуровел Юра. — Но уж не просто так, это точно.</p><p class="p1">— И как, вы записались?</p><p class="p1">— А то, — сказал Юра. — Как иначе? Надо же вместе держаться.</p><p class="p1">— Но почему им тогда сразу всех не собрать?</p><p class="p1">— О! — Юра поднял палец. — То-то и оно! Почему всех не собрать? Потому что соберутся только те, кто сами откликнутся. Это отбор.</p><p class="p1">— Но ведь я, например, узнал от вас…</p><p class="p1">— Но ведь вы меня нашли, так? Это значит — уже какая-то оперативность.</p><p class="p1">— И что, мне теперь записываться там… на сайте?</p><p class="p1">— Это ваше дело, — сдержанно сказал Юра. Но ясно было, что любой, кто отклонится от записи, будет им рассматриваться как дезертир.</p><p class="p1">— Ладно. Спасибо.</p><p class="p1">Они пожали друг другу руки, и Свиридов уселся в «жигуль». Он уже выезжал на Симферопольский, когда затрезвонил мобильник.</p><p class="p1">— Сергей Владимирович! — приветствовал его суетливый секретутский голосок. — Вас беспокоит газета «Наш день». Мы вас очень просим, примите, пожалуйста, наши извинения, мы завтра же опровергнем и, если вы не возражаете, очень-очень хотели бы сделать с вами большое интервью, чтобы все расставить по местам. Пожалуйста. Мы очень-очень хотим, просим вас не отказать…</p><p class="p1">— Я не хочу с вами встречаться, — мрачно сказал Свиридов. — Напечатаете опровержение — поговорим.</p><p class="p1">— Да-да, завтра-завтра, — она говорила с интонациями сорокалетней пресс-секретарши, не пустившей Свиридова получать приз за «Чудо». — Обязательно-обязательно, мы сразу-сразу вам позвоним…</p><p class="p1">Свиридов отключился. Чудеса не прекращались. Каких кар наобещал им Гаранин? Дома он взлетел на свой пятый этаж, вошел в сеть и, всеми силами стараясь бог весть перед кем выглядеть спокойным и неторопливым, набрал www. spisok180.narod.ru.</p></span>
