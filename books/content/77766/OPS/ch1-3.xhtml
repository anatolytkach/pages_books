<div class="epigraph">
<p class="p1">Глупец! Пойми — ты живешь и дышишь, пока я на тебя смотрю. Ведь ты только потому и есть ты, что это я к тебе обращаюсь.</p>
<p class="text-author">Абрам Терц, «Ты и я»</p>
