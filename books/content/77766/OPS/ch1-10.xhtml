<span><p class="p1">Свиридов, чья злоба прошла, а страх притух, почувствовал вдруг невыносимую жалость к этим людям. У них все время что-нибудь отнимали, а они все умудрялись любить жизнь и то, что им предлагали вместо нее. Кому они что сделали, в конце концов, перед кем провинились, что их занесли в идиотский список? Теперь небось в Анталью не выехать. Сидят на садовом участке, умудряются быть довольными. «Светит незнакомая звезда»… Ехали, куда прикажут, срывались с места, были счастливы. Еще и пели. «Надежда, мой компас земной». Какой ужас, что они умудряются надеяться. Пойти и сказать им, чтоб не надеялись ни на что. Надежда — худший компас, обязательно заведет в бездну, и, падая в бездну, все еще будут надеяться. Марина в нетерпении тянула его к себе, но ему не хотелось ничего делать с Мариной. Опьянение вошло в элегическую фазу, он всех жалел.</p><p class="p1">— Эх, Маринка, Маринка, — сказал он. — Хорошие же люди.</p><p class="p1">— Я из Краснодара сама, — сказала она, не понимая, о чем речь. Она-таки крепко набралась. Он и сам крепко набрался, но ясности ума не утратил. Подойти к костру, сказать им всем, что они прелестные люди, что он рад разделить с ними список… «Ты ж мене пидманула», — грянули они. Хорошие советские люди, которым ничего не сделалось, вот они, все тут как тут. Маринка стала рассказывать про Краснодар, как она там училась в балетном. Когда они со Свиридовым вернулись к костру, список уже частично разбрелся — кто-то ушел на станцию к вечерней электричке, кто-то храпел на веранде.</p><p class="p1">— Сергей! — окликнул его кто-то.</p><p class="p1">— Ау! — дурашливо отозвался он.</p><p class="p1">— Здравствуйте, я Борисов. Лева Борисов. Вы небось не помните меня?</p><p class="p1">— Нет, не помню. А откуда?</p><p class="p1">— А я у вас однажды на «Родненьких» юридическую помощь оказывал. Я адвокат, цивилист. Вам не надо?</p><p class="p1">У списка были свои преимущества, хорошо, если найдется стоматолог или водопроводчик.</p><p class="p1">— Пока без надобности, — сказал Свиридов. — Хотя скоро, наверное, вы нам всем понадобитесь.</p><p class="p1">Борисов одобрительно усмехнулся.</p><p class="p1">— А ничего тут у нас, а?</p><p class="p1">— Да отлично, — сказал Свиридов. — Разве б иначе собралось столько хороших людей?</p><p class="p1">— Ездить будем, выпивать, — продолжал адвокат. Он был хитрый, но доброжелательный, словно предлагал свою хитрость как орудие в борьбе против темных, но неизменно тупых сил. Зло всегда тупо, потому-то мы и живы.</p><p class="p1">— А у вас какое мнение — почему нас всех это… сюда?</p><p class="p1">— Почему вы думаете, что я знаю? — трезво спросил Борисов. Он подошел к перилам веранды, и Свиридов разглядел его по-настоящему: толстый, но сильный, он знал этот тип. Круглая, наголо бритая, но не лысеющая голова. Что ж он, бреется, чтобы братки за своего держали? Но вроде цивилист…</p><p class="p1">— Мало ли, адвокаты всегда все знают…</p><p class="p1">— Адвокаты много болтают, это да, — прежним дурашливым голосом подтвердил Борисов. — А знают не больше вашего. Но знаете — думаю, ничего страшного. Мне кажется, лучше попасть в этот список, чем в другой.</p><p class="p1">— А будут и другие?</p><p class="p1">— Обязательно, — кивнул Борисов. — Только те уже будут знать, за что. А эти — кто попался. Всегда бывает такой период, хватают, кто попался. И ничего особенного не делают. Насколько я знаю, этот список — первый. А при терроре очень важно успеть в первый список. — Он назидательно поднял палец. — Еще есть ограничения, понимаете? Еще им не все можно. И я всегда клиентам говорю: лучше раньше.</p><p class="p1">— Что раньше?</p><p class="p1">— Все раньше. Вы мой телефон запишите, если понадоблюсь. Я адвокат вообще хороший, дорого беру, но своим бесплатно.</p><p class="p1">Это он явно сказал не спьяну, оценивая себя трезво. Свиридов внес прямой номер Борисова в мобильник, обменялся с адвокатом вялым рукопожатием и отпустил досыпать в темную, с настоем древних дачных запахов глубь веранды.</p><p class="p1">— А как бы нам уехать? — спросил он хозяина.</p><p class="p1">— Есть автобус на Москву в девять, — сказал Вулых, одобрительно глядя на них с Мариной. — От Алтырина.</p><p class="p1">— Ну, пойдем на автобус, — сказал Свиридов.</p><p class="p1">— А че, ты остаться не хочешь? — спросила Маринка. — Можно же.</p><p class="p1">— Нет, мне домой.</p><p class="p1">— Ну щас, еще выпьем и пойдем.</p><p class="p1">— Тебе хватит.</p><p class="p1">— Не командуй.</p><p class="p1">Хор грянул «Ой, да не вечер, да не вечер». Гусев присоединился и визгливым поросявым фальцетом подтягивал за второй голос: «Мало спало-о-ось»… Свиридов терпеть не мог эту песню, неизбежную в любом застолье, и решительно встал.</p><p class="p1">— Пойдем, Мариш, хватит.</p><p class="p1">— Ой, ну ты нудный, — сказала она. — Ты нудный жутко. Как тебя Хабеныч терпит, я вообще не пойму.</p><p class="p1">— Ну и сиди, — обозлился Свиридов и пошел к воротам.</p><p class="p1">— Ладно, — она вскочила и догнала его. — Поехали. Будешь по дороге рассказывать про Хабеныча.</p><p class="subtitle">4</p><p class="p1">Но рассказывать про Хабеныча он не стал. Сгущался красно-синий ветреный вечер. По всему окоему вольготно разлеглись сиреневые облака. За лесом начиналась тоскливая звенящая даль, через дальнее поле шагали вышки ЛЭП, пахло нагретой травой — вокруг было все, что Свиридов давно запретил себе видеть. Он не мог этого выразить, а в невыразимом виде все это было слишком грустно, потому что обманывало, говорило о том, чего нет. Вся красота мира прикрывала в лучшем случае пустоту, в худшем — зловонную пасть, и отсюда была невыносимая детская тоска, с которой он смотрел на зеленые летние закаты, сырые леса, вечерние спальные районы. Он смотрел, а все это его пожирало и никаких других целей не имело. Но сейчас он был пьян и не видел изнанки всего, а видел только дивную просторную тоску, красный восток и синий запад, и след самолета через все небо, медленно расплывавшийся в широкую розовую колею. Надо было ловить момент — он знал, что скоро наступит безразличие, а сейчас можно было кое-что сформулировать.</p><p class="p1">— Это все-таки не Кафка, — говорил Свиридов, не особенно заботясь о том, слушает ли Марина. — Особый жанр, чисто местный. Научились уютно существовать внутри Кафки, вот в чем дело. Все пытаются понять, а ведь очень просто. Вся так называемая особость заключается в уютном существовании внутри того, в чем жить нельзя. Человек этого вынести не может, но особый отдельный тип может — и счастлив. Им спустили список, вырвали из жизни, выставили на позор, подвергли непонятной репрессии неизвестно за что. Им — Божия роса. Они поехали на дачу, нажарили шашлыков, ужасно счастливы. Это как, знаешь, бывают выезды инвалидов на природу. Я читал. Их ничто не объединяет, кроме того, что больны. Ходить в походы с нормальными людьми они не могут, им тяжело, они отстают, задыхаются, с чужими стыдно. А тут все свои, крестовый поход инвалидов, тоже наверняка с гитарой, сидят у костра, едят инвалидный шашлык, поют инвалидные песни. Умение сделать жизнь из всего, вот так бы я сформулировал. Всякое сообщество структурируется как лагерь, и во всяком лагере уют. Нарастает субкультура, фольклор… Если б это было где напечатать, я бы написал. Вот ноу-хау, двухступенчатое! — Он даже остановился, так ему понравилась эта конструкция. — Сначала делаем невыносимым, потом выносимым. Сперва научиться из всего делать барак, потом этот барак обустраивать, вешать занавесочки, поливать цветочки. Песня была — мы рождены, чтоб Кафку сделать былью; нет, мы рождены, чтоб Кафку сделать дачным поселочком, цветочком, палисадничком. И все наши песенки, все наши ремесла — роспись стен в бараке, плетение из колючей проволоки…</p><p class="p1">— Это точно, — сказала Марина, как если бы все понимала, хотя не понимала ничего. — Вот у меня тетка в Таганроге, у нее первый муж. Алексей. Водитель. Он пил, но выпиливал, а второй не пил, но и не выпиливал…</p><p class="p1">Такие люди, как Марина, всегда рассказывали исключительно о своей родне — то ли потому, что их мир ограничивался ближним кругом, то ли потому, что эта родня была так огромна и разнообразна (простые люди учитывают всю родню, вплоть до самой дальней, ибо дальше базовых идентификаций не идут), что в самом деле могла заменить собою мир: все, что может случиться, уже случилось с теткой Настей, шурином Юрой и деверем Колей. Свиридов не слушал историю про тетку в Таганроге, он восхищался собственной формулой про способность сначала построить ад, а потом сделать его уютным, привязать к себе кучей сентиментальных обстоятельств, чтоб и переезжать жалко. Он еще не знал за Мариной удивительной способности рассказывать истории со сдвигом — не к случаю, а под углом к случаю, так что слушатель, взявшийся проследить ее прихотливую логику, понял бы что-то необыкновенное, но такого слушателя, как назло, не находилось, и у Марины была репутация блаженной, хотя она всего-то мыслила ходом коня. Правда, Свиридов уже вошел^в такое состояние, в котором развитие собственной мысли интересней любого резонанса с чужой.</p><p class="p1">— Дурной прием, — говорил он, не особенно заботясь, слушает Марина или нет. На вечерней автобусной остановке, кроме них, сидели две старухи с корзинами грибов да печальный длинноволосый старик с прозрачными глазами Божьего странника. За шоссе растекался закат, и земля под ногами вздрагивала от тяжелых фур, грохотавших в сторону Москвы. — Двойка по профессии. Замкнутое сообщество. Не умеем выстраивать нормальный линейный сюжет — собираем компанию в замкнутом пространстве, искусственная невротизация, истерика. Захват заложников или двенадцать разгневанных идиотов.</p><p class="p1">— «Теремок», — подсказала Марина.</p><p class="p1">— А… ну да. Вашему терему крышка. Нас этому учили на втором курсе. Я тебе заранее расскажу все, что будет с этим списком. Потому что нет ничего более предсказуемого, Господи, ничего более идиотского, чем все эти сюжеты в замкнутом пространстве со списком типичных представителей. Ты никогда не думала, почему они сейчас все эти сюжеты выстраивают в закрытом пространстве? «Команда», блин. Десять, двадцать, сто двадцать человек. Все расписаны по нишам, только в одном случае это ниша на одного, а в другом на десять. Дальше все понятно. Сначала краткая эйфория от того, что все нашли друг друга, никто больше не одинок, никто уже не наедине со своей болячкой. Можно вытащить на люди свой позор, ужас, не стыдиться его больше. У вас трофическая язва? Подумайте, какое совпадение, у меня тоже трофическая!</p><p class="p1">Марина хотела было встрять с историей про бабушку, належавшую себе трофическую язву в боку, но прикладывание отварного лука сделало чудеса. Свиридов терпеливо переждал первые три фразы, взял ее за плечи и слегка встряхнул.</p><p class="p1">— Марина, — сказал он. — Я тебя обожаю.</p><p class="p1">Она захихикала.</p><p class="p1">— Я тебя обожаю, Марина, — повторил он. — Я ужасно опасный маньяк, вампир, сейчас темно, лес кругом, эти несчастные тебя не спасут, до автобуса еще долго. Если ты мне расскажешь еще хоть одну историю про своего родственника, я съем твою печень всю, всю. Целиком. Ты поняла, Марина?</p><p class="p1">— Все, все, молчу, — сказала она, пьяно смеясь. Он не напугал ее ничуточки, вообще был прикольный.</p><p class="p1">— Ну вот, — продолжал Свиридов. — Я сейчас легко могу потерять нить, а тут ты со своими бедными родственниками, с Хабенычем… Ненавижу, блядь, бедных родственников, вообще любых родственников, что вы лезете с вашими имманентностями! Все зло в мире от имманентностей: кровь, почва, родня. Все списки составляются по этому признаку. Родственники. Куда тебе на хер столько родственников, ты с собой разобраться не можешь… Идем далее: эйфория кончилась начисто. Больному нужен врач, а не другой больной. С другим больным можно в лучшем случае успокоиться, перекурить, а болезнь прогрессирует! Она не может не прогрессировать, вирус вброшен, одних уже выгоняют с работы, за другими устанавливается слежка. Что мы имеем внутри замкнутого сообщества? Элементарное драматургическое правило: имеем рост взаимной ненависти, раздражение, раскол по группам. Что распространяется не только на списки, не только на камеру, но на закрытую страну, в которой все меньше чего делить. Закрытость предполагает, что обязательно станет нечего делить. Все закрытые ресурсы исчерпаемы, на чем ни объединяйся. Начинается ненависть, вражда, склоки в интернете, а главное — составление списков внутри списка. Этот недостаточно лоялен, тот не явился на воскресный пикник, третий хотел перебежать в другой список. Возникает альтернативный центр. Одному — положим, это будет Бодрова, — все сдавали деньги на шашлык. Сдавали и сдавали, но тут появился второй, который сказал, что шашлык жесткий. Ты меня слушаешь вообще?</p><p class="p1">— Я сикать хочу, — захихикала пьяная Марина.</p><p class="p1">— Ну поди вон в кусты посикай, я хоть поговорю спокойно. Когда никто не слушает, легче, чем когда одна не слушает.</p><p class="p1">Язык у него уже слегка заплетался. Марина спрыгнула с дороги и зашуршала кустами. Свиридов подумал, что совершенно ее не хочет. Подкатил высокий белый автобус из Сергиева Посада, Марина еле успела выбежать из кустов. Народу было мало, в субботу вечером никто не рвался в Москву. Они уселись впереди, прямо за водителем.</p><p class="p1">— Ну дальше-то? — спросила Марина. — Шашлык жесткий.</p><p class="p1">— А, да. Возникает альтернативный центр. Сдавайте мне на шашлык, и будет мягкий. И почему вообще Бодрова, кто назначил Бодрову? Активничала много, на первом этапе лидирует всегда тот, кто активничает. Но первый этап миновал, выявился настоящий лидер, человек, умеющий извлекать пользу из говна. Мы в говне? — но и в говне можно делать карьеру. Сейчас я стану в говне главным, буду представителем в нормальном мире от говна, войду в народный хурал, надушусь, чтоб не пахло, буду в хурале громче всех говорить, стану спикером хурала, весь хурал превращу в говно… Но для этого сначала надо стать королем увечных. Увечные! — заорал Свиридов, так что старухи вздрогнули. — Изберите меня королем! Отлично, избрали. Идет долгая склока между традиционалистами и новаторами. Дальше полный раскол, неизбежный в закрытом сообществе. Невротизация. Это для дилетантов: не можешь строить сюжет — запри всех в комнате, все будут орать… Закрытые общества, запертые помещения — детское решение, маразм, распад профессии. Заперли всех, и вроде жизнь. Но это же паллиатив: визгу много, развития нет, смотреть невозможно. Что имеем потом? Вариантов два, оба внешние. Либо спускается высокая общая цель, заставляющая временно забыть о распрях. Ибо проказа не есть еще универсальный объединяющий признак, тебе понятно?</p><p class="p1">Марина кивала, но голова у нее моталась все безвольней. Ей хотелось спать. Посикала, и хорошо.</p><p class="p1">— Спускается цель, — продолжал Свиридов. Думать вслух было легче. — Но самообольщения следует оставить, никакой цели ведь нет? Ведь это список не для того, чтобы делать что-нибудь великое. Это список из тех, кто уже сделал что-нибудь не так. Например, здесь родился. И тогда вступает другой внешний момент, а именно: из нашего списка начинают исчезать по одному. И это сплачивает сильнее всякой цели, потому что соседа ты, может быть, видишь в последний раз. А может, тебя все видят в последний раз. И те, кто остается, сплачиваются все теснее, и любят друг друга все сильнее, и наконец, в критический момент, когда их остается десять человек, не могут больше выносить ожидания и кидаются в прорыв! Ааааа! И эти десять последних производят великий бенц, потому что любого действия боятся меньше, чем бездействия. Варшавское гетто. Вот такое будет развитие, и больше никакого. А если вообще ничего не будет, если они просто составили список и глядят, то через три месяца все развалится вообще. Будет десять списков по интересам и яростная взаимная вражда, что мы, собственно, и имели в застой. Закрыли страну, но ничего не предложили делать. Миллион списков по двадцать человек, эзотерические кружки, марксистские кружки, кухонные кружки, все друг за другом приглядывают и друг на друга стучат. То есть либо всех истребят извне, либо все доедят друг друга. Хорошо иметь дело с драматургом, скажи, Марин? Все знает, всему учили…</p><p class="p1">Но она уже спала, а скоро и его сморило. Автобус остановился у трех вокзалов. Во сне Марина привалилась к Свиридову и не видела причин ехать домой. Он отвез ее к себе и, несмотря на календарные обстоятельства, трахнул. Это не доставило ему ровно никакого удовольствия, а для нее давно не было заслуживающим внимания событием. Она, кажется, и не заметила. Утром Свиридов напоил ее кофе и с облегчением выпроводил. Нельзя изменять Але, самому потом мерзко. Какой это ужас, если вдуматься, — встретить кого надо. Как жить с идеалом? То, что она боится съехаться, — правильно, быт может убить все, с другой бы не жалко, а с идеалом жалко. И заменить некем. Свиридов набрал ее, но она еще спала, мобильный был отключен, городской молчал.</p><p class="subtitle">5</p><p class="p1">Впереди было долгое пустое воскресенье. Свиридов с тоской подумал о временах, когда был постоянно занят и мечтал о трех свободных часах, чтобы написать свое. Теперь у него было время, но ни малейшего желания сочинять. Он влез в душ, открыл холодную воду, отгоняя утреннюю жару, проклял окна дедовой квартиры, выходившие на восток, — солнце било в глаза, — плотно задернул занавески, навел чистоту, что всегда добавляло самоуважения, и сел за компьютер. Почты не было, новостей тоже. В это время миллионы счастливых представителей среднего класса в подержанных иномарках устремляются в «Икею», дети резвятся в детском городке, родители вдумчиво выбирают табуретки и бра. Почему я их так ненавижу? Потому что они не просто выбирают табуретки и бра, но позиционируют себя. Мы представители среднего класса, мы перекачиваем воздух, за нами будущее. Мы встроились в будущее, нам повезло. Этот табурет мы поставим в нашей детской, которую имеем, а это белое металлическое кресло на лужайке, которую имеем также. Мы также имеем песик и котик, заходим в сообщество «песик. ру» и делимся познаниями о способах кормления песика, не успевая упомянуть впроброс, как любим мужика, сыника… Выкладываем фото, рассказываем о проблемах, но всякий наш рассказ о проблемах есть, в сущности, рапорт об успехах.</p><p class="p1">Если бы списка не было, его стоило выдумать. Все так и стремятся в список по любому признаку, весь ЖЖ разбит на сообщества: любители котиков, песиков, «Икейки». Хлебом не корми, дай в чем-нибудь состоять. Он открыл «Word» и начал давнюю историю про реалити, ни к чему не обязывающую комедию для Дишдишяна, но слова не складывались в предложения. Он не знал за собой такой беды, обычно сочинял быстро, но сейчас после каждых трех фраз раскидывал пасьянс или залезал в сеть. Текст выходил вязким и безвкусным, как мокрая вата. Либо дело было в проклятом списке, в страхе за будущее — то-то он и спрашивал у «Солитера», возьмут или помилуют, хватит денег или нет, — либо в отвращении к себе: человек, попавший в список, не имел права ничего сочинять. На нем было клеймо, а человеку с клеймом писать не положено. Сверх того, он не совсем понимал, как из этой истории выйти: там тоже было замкнутое сообщество, новое реалити-шоу пожестче предыдущих, с настоящими издевательствами над звездами, вывезенными на одинокий остров в Атлантике. «Последний герой» с садизмом. Но он сам вчера так убедительно рассказывал бедной дуре — никогда больше не затаскивать ее к себе, научиться наконец брезговать случайными связями! — что истории о закрытых сообществах пишутся дилетантами, не умеющими выстроить внятного рассказа. Теперь все развивалось именно в таких компаниях, и никакого выхода, кроме коллективной гибели с выживанием самого адаптивного, для них не предполагалось. Свиридов с мстительным наслаждением уже придумал, кого угробит на своем острове, но убийства не желали монтироваться с пародией, а все двенадцать обитателей атолла надоели ему прежде, чем он закончил список действующих лиц. Список, кругом список… Надо все это как-то разомкнуть. «Надо все это как-то разомкнуть», — написал он, и в эту секунду со двора донесся дружный хор звонких детских голосов:</p><p class="p1">— Поводок сценаристу Свиридову!</p><p class="p1">Это было интересно. Свиридов подошел к окну. Внизу, задрав счастливые азартные лица, толпа «Местных» — левое крыло «Своих» — с зелеными повязками скандировала по команде высокого рыжего типа, дирижировавшего двумя руками:</p><p class="p1">— Сви-ри-дов! По-во-док!</p><p class="p1">Двое, стоя в стороне, размахивали огромным поводком, связанным, должно быть, из дюжины обычных.</p><p class="p1">Свиридов понял, что сейчас решается нечто важное. Он мог вернуться за стол и продолжать работать — то есть раскладывать пасьянс, потому что о работе теперь нечего было и думать; жизнь сама подбрасывала благовидный предлог. Но это означало бы высшую степень трусости: надо было дать им понять, что плевать он хотел на это дозволенное буйство. Полминуты спустя он уже выходил из подъезда.</p><p class="p1">«Местные» только того и ждали. Правда, дистанция соблюдалась: никто к нему не бросился. Отмашки насчет рукоприкладства, видимо, не поступало. Молодежь тут же выстроилась в шеренгу и приступила к исполнению тщательно отрепетированного монтажа.</p><p class="p1">— Позор Свиридову! — заорал левофланговый, маленький, лет двенадцати.</p><p class="p1">— Позор списку! — поддержала толстая девушка с коровьими страстными глазами. — Списанных — на свалку!</p><p class="p1">— Списанных — на свалку! — грянул хор.</p><p class="p1">— Свиридов! — с пафосом обратился к нему третий, очень прыщавый. — Зачем вы травите старых добрых людей собаками?</p><p class="p1">— Может быть, вы сами собака? — спросил четвертый, нехорошо скалясь.</p><p class="p1">— Свиридов — собака! — крикнули все. Свиридов молча слушал, краем глаза, однако, отмечая довольное лицо Вечной Любы в окне второго этажа.</p><p class="p1">— Может быть, вы радикалист? — спросила серьезная дивчина в очках, безбровая и тонкогубая.</p><p class="p1">— А может быть, вы фашист? — У задорного мелкого левофлангового это была уже вторая реплика.</p><p class="p1">— Свиридов — фашист! — поддержал хор.</p><p class="p1">— Нам не нужно ваших вонючих сценариев! — басом сказал длинноволосый рослый юноша с повадками семинариста.</p><p class="p1">— Вас нужно посадить на поводок, чтобы вы не бросались на наших людей, — закончил рыжий дирижер и махнул всей банде.</p><p class="p1">— Свиридову — поводок! Свиридову — поводок! — заскандировали они хором. Свиридов молчал. Сохранение лица пока удавалось.</p><p class="p1">— У вас все? — спросил он.</p><p class="p1">Дальнейший диалог не был расписан, и «Местные» замялись.</p><p class="p1">— Свиридов! — обращение по фамилии было, кажется, их фирменным знаком. — Зачем вы травите наших людей собаками? — Эту фразу, за отсутствием собственных идей, повторил семинарист.</p><p class="p1">Свиридов молча смотрел на них, и это было все, что он мог делать в предложенной ситуации. У Бродского уже был совет человеку, в котором наконец распознали чужака: «Смотри, это твой шанс увидать изнутри то, на что ты так долго глядел снаружи». Внутри и не могло быть ничего другого. Внутри собаки жуть и мрак. Вот он и глядел, пытаясь запомнить и понять выражения их лиц: это были не самые простые лица. На них мешались любопытство, робость и восторг. Робость была рудиментарная, после первой крови от нее не останется и следа. Любопытство, надо полагать, вызывала новая ситуация безнаказанности: им никто еще не разрешал вот так, запросто, кричать на взрослого человека и отправлять его на свалку. Как-никак живой индивид, не эстонское посольство. Теперь им было все можно, и новизна в свою очередь вызывала восторг, которого они не скрывали: из Джекила вырывался Хайд, а этот выход всегда сопровождается ощущениями, похожими на оргазм. (Додумать: человеку вообще нравится, когда из него что-то выходит. «Пять наслаждений знает плоть, — говаривал его мастер, когда любимчики собирались на юбилеи. — Есть; освобождаться от съеденного; пить; освобождаться от выпитого; и только последнее — то, о чем вы, засранцы, подумали». Творческий процесс — ровно то же самое, кстати. И даже выдавливать прыщ… Единственное исключение — роды: это нам предупреждение, что ничего хорошего не получится. Вон сколько нарожали, потных.)</p><p class="p1">Разумеется, только в ощущениях и было дело — поскольку никаких личных претензий у них к Свиридову не было, и что такое список — они понятия не имели. Он просто был тем, с кем теперь все можно, им отдали его на растерзание, как мишку для боксерских упражнений. Свиридов сам поражался, как четко работала его голова. Конечно, ни идей, ни вины, ни смысла: чистое пространство безнаказанного наслаждения. Он был их ощущением, их первым оргазмом, они любили его. Свиридов молчал, они тоже молчали. Истинная любовь молчалива.</p><p class="p1">Первым заговорил он.</p><p class="p1">— Ну идите, что ли. Если у вас всё.</p><p class="p1">— Поводок возьмите, — сказал старший с неуверенной улыбкой.</p><p class="p1">Он шагнул к Свиридову. Девушка с коровьими глазами защелкала блицем. Свиридов отступил на шаг назад.</p><p class="p1">— Себе возьми, — сказал он. — Тебе пригодится.</p><p class="p1">Они переглянулись. Видимо, предполагалось поорать под окном, бросить поводок и разойтись — никто не предполагал, что Свиридов спустится. Наконец двое держателей поводка положили его перед Свиридовым и, конфузливо хихикая, вернулись на место.</p><p class="p1">— Стройся! — скомандовал старший. Местные построились в колонну по два и удалились. Свиридов поглядел на Любино окно.</p><p class="p1">— Хорошие какие ребята, — громко сказал он. — Вам в магазине ничего не надо? Они принесут.</p><p class="p1">— Кобёл ты сраный, — сказала Люба. — Погоди, тебя выселют.</p><p class="p1">Свиридов плюнул в ее сторону, поднялся к себе и, стараясь всячески доказать невидимому соглядатаю, что ничего не произошло и выбить его из колеи не так-то просто, сел писать.</p><p class="p1">Тут, кажется, он стал понимать, почему не мог работать. Работа категорически не имела смысла. Свиридов всю жизнь презирал людей, отбояривавшихся от нее разговорами о бессмыслице, о том, что никто не снимет и не оценит, что картину, старый, бессмысленно писать в стол, — он знал, что такие разговоры ведутся бездарями; но сейчас ему самому было тошно подумать о том, чтобы сочинять связный текст, будь то сценарий, дневник или завещание. Прежде он хоть краем сознания мог надеяться, что написанное изменит мир. Теперь ему было ясней ясного, что ни одно слово — чужое или его собственное — не имело больше никакого веса: от людей перестало что-либо зависеть. Они действовали не по своей воле, а по странной, не формулируемой вслух необходимости, словно играли давно написанные роли. Этих ролей никто не писал, они были всегда. Все было предопределено: славные мальчики и девочки выпускали своих Хайдов не потому, что патологически желали зла, а потому, что так было положено. Эта железная предопределенность — одним стать жертвой, другим палачествовать, третьим улюлюкать, — отменяла любую работу, подвешивала в воздухе всякое осмысленное высказывание, потому никто и не делает ни хрена, даже постного масла своего нет. Кому работать? Для чего? Почитают, посмотрят, пожрут, похвалят и все сделают, как предписано. Ужасней всего была догадка, что так было всегда, что и в девяностые, запомнившиеся ему непрестанной борьбой всех со всеми, вся борьба, похоже, шла столь же бессознательно: не было никаких личных предпосылок к тому, чтобы один стал новатором, а другой ренегатом, один либералом, а другой держимордой: кое-кому везло — удавалось свободно выбрать роль, — но таких единицы. А уж о том, чтобы самому выдумать текст, и говорить не приходилось. С артиста какой спрос? Свиридов хорошо знал артистов и не верил ни одному их слову. Жаль было хороших мальчиков и девочек: они попали на плохие роли, но других нет. Кто хочет играть — должен играть это.</p><p class="p1">Ни учить, ни убеждать, ни писать не стоило. Эта мысль была так невыносима, что Свиридов стиснул зубы и яростно, почти не задумываясь, замолотил по клавиатуре, расписывая никому не нужные диалоги на необитаемом острове. Вопрос о смысле упраздняется, сказал он вслух. Думать о смысле — роскошь. Смысл у всякой работы один — самосохранение. Я полагаю свое занятие наименее вредным и наиболее здоровым, вот и все. Это была последняя и безотказная мотивация.</p><p class="empty-line"/><p class="p1">«Во время исполнения акции «Поводок» клиент трусливо оглядывался и жалко трясся. Так будет со всеми отщепенцами, которые хотят отдать Америке нашу нефть и наш суверенитет, разорвать нашу страну изнутри и сорвать выполнение демографической программы. Каждый должен знать, каждый должен почувствовать, что, задев даже случайно один из членов Организации, завтра он столкнется с могущественным отпором всей Организации. Из нас никто не отдельно, мы все купно. Купность! Купность! Как учит нас преподаватель Высшей школы экономики, заведующий кафедрой национального своеобразия Л. И. Жулькин, неотъемлемые части русской истории суть купность, пупность и неотступность. Купностью называется то особое состояние общества, при котором ощущения одного передаются всем, а полномочия всех делегируются одному. Пупностью называется такое состояние общества, при котором все общество с эсредоточено на одном пупе, осуществляющем в своей неотступности то возвратно-поступательное движение, которое в отличие от убогой западной модернизационной модели характерно для истинно сложных систем с неподвижно центрированным доменом и органически-животной природой (Л. И. Жулькин. Централизация против модернизации). А клиент, что клиент, мы все сделали, как нам сказали».</p><p class="subtitle">6</p><p class="p1">Поработать, однако, была не судьба. Не успел он сесть за комп, как заверещал мобильный.</p><p class="p1">— Это коспотин Свиритов? — спросил немецкий женский голос, оглушая согласные столь карикатурно, что Свиридов тотчас решил: розыгрыш.</p><p class="p1">— Коспотин, — подтвердил он с усмешкой. — А вы есть кто?</p><p class="p1">— Я Тэсса Гомбровиц, корреспондент «Мюнхенер Цайтунг». Коспотин Свиритов, гофорите ли вы по-английски?</p><p class="p1">— A bit, — сказал Свиридов.</p><p class="p1">— Oh, great. So listen. — Дальнейшее Свиридов понял через пень-колоду — телефон, акцент, непривычка переводить со слуха, — но Тэсса Гомбровиц с чего-то заинтересовалась его творчеством и желала сегодня же сделать с ним интервью, поскольку нужно любой ценой успеть в послезавтрашний номер. Она не допускала и мысли об отказе и желала уточнить только, готов ли он подъехать к ней в корпункт или желает принять ее у себя.</p><p class="p1">— Но я на даче, — попытался отвертеться Свиридов. — At my dacha.</p><p class="p1">— Это не проблем, я подъеду. I have a car with a driver, please tell him how to rich…</p><p class="p1">— Алё, — тут же раздался в трубке густой мужской бас. — Как к вам подъехать, какое шоссе?</p><p class="p1">— Не нужно, я уже собираюсь домой, — сказал Свиридов, отступая перед этим напором. — Подъезжайте на Профсоюзную через три часа, — и он назвал адрес.</p><p class="p1">Так, подумал он, все по сценарию. Поп свое, черт свое. С утра местные, к вечеру неместные. Шофер наверняка гебешник, и она наверняка в курсе. Общий сговор: она пишет для мюнхенер или как ее цайтунг, он выявляет тех, к кому она ездит, и берет на заметку. Все довольны. Но подыхать просто так было б обидно — пусть хоть Запад будет в курсе. Чем я, собственно, рискую? Официального запрета на общение с иностранными корреспондентами пока нет. Валяй, посмотрим, что за Тэсса.</p><p class="p1">Он снова собрался работать, вопреки всему, будет хоть пара страниц за те три часа, что оставались до явления корреспондентки с гебешником, — но мобильный вновь требовательно заверещал, и Свиридов опознал номер орликовской приемной. Это конец, понял он. Сейчас мы лишимся последнего.</p><p class="p1">— Сергей Владимирович? — спросил педерастический голос секретаря. Орликов держал в секретарях исключительно педерастов — не потому, что сам принадлежал к стильной касте, а потому, что женщины не умели так подобострастно отвечать «Вячеслав Петрович занят» или «Как вас представить?». Секретарь работал у Орликова без выходных, жил у него в коттедже на правах прислуги и не брезговал садовыми работами. — Вячеслав Петрович хотел бы переговорить с вами. Вы свободны?</p><p class="p1">— Да, конечно, — бодро ответил Свиридов. В нем закипала здоровая злость. Это было лучшее состояние для разговоров с Орликовым.</p><p class="p1">— Сереж, — услышал он мягкий, начальственно-демократический басок Орликова. — Ну ты что ж делаешь.</p><p class="p1">— Да, Вячеслав Петрович? — переспросил Свиридов. — Что я делаю?</p><p class="p1">— Ну а то ты не знаешь? Ты куда же вступаешь? Меня и так за Делягина вчера вызывали на ковер, а тут ты.</p><p class="p1">— А куда я вступаю, Вячеслав Петрович? — невинно спросил Свиридов.</p><p class="p1">— Слушай, кончай! — разозлился Орликов. — Кончай притворство дурацкое. Мне ты знаешь откуда звонили сегодня? С канала мне звонили. И там уже плотно подводят к тому, что или ты, или программа.</p><p class="p1">— Ну, если вопрос уже ставится так… — протянул Свиридов.</p><p class="p1">— Да пойми ты! — Орликов не мог легко выйти из образа демократа. — Мне же не хочется терять способного человека, я же не из тех, кто по первому сигналу…</p><p class="p1">— Вячеслав Петрович, — сказал Свиридов, со значением понижая голос. — Вы же понимаете, что такие вопросы по телефону не обговариваются.</p><p class="p1">— Мой не прослушивается, — ответил Орликов, но было слышно, что он насторожился.</p><p class="p1">— Ну, это ваш не прослушивается, — продолжал Свиридов. — Так что всего я вам сказать не могу, но вообще-то, зная меня не первый год, вы могли бы догадаться, с чьей санкции я в этом списке нахожусь.</p><p class="p1">Орликов помолчал.</p><p class="p1">— Что ж они там, — пробурчал он. — Предупредить не могут?</p><p class="p1">— Вячеслав Петрович, — укоризненно проговорил Свиридов. — Вы можете себе представить, с чьей санкции сценарист «Спецназа» может входить в такие списки?</p><p class="p1">— Ты же вышел из «Спецназа», — напомнил Орликов.</p><p class="p1">— А вы не догадываетесь, почему?</p><p class="p1">— Догадываюсь, — буркнул Орликов, хотя ни о чем не догадывался.</p><p class="p1">— Ну вот. И если я там состою и мне верят — вы же можете догадаться, зачем это нужно, да? Я надеюсь, мы не будем возвращаться к этому разговору?</p><p class="p1">— Все-таки пусть они на канал позвонят, — попросил Орликов после паузы. — Там же не в курсе люди…</p><p class="p1">— Ну да, — сказал Свиридов. — Сейчас Владислав Юрьевич бросит все и будет звонить руководству канала: простите, у вас там сценаристом на «Родненьких» работает некто Свиридов, так вот, он намеренно внедрен в список, это мой информатор, так всем и передайте. Интересно получится, да?</p><p class="p1">— Да, действительно, — признал Орликов. — Ну хоть бумагу какую-нибудь…</p><p class="p1">— Да вы что, смеетесь?! — с бабьим повизгиваньем воскликнул Свиридов. — Вы как себе это представляете?! Сталин Гитлеру пишет: вы там, пожалуйста, не обижайте моего человечка, Штирлиц зовут?</p><p class="p1">— Ладно, работай, — разрешил Орликов и отключился. Некоторое время Свиридов приходил в себя. Только что он благодаря внезапному озарению, отбил очередной наезд и спас заработок — неизвестно, надолго ли. Очевидно было одно — идиотизм происходящего. Оказывается, им можно было пользоваться. Это давало шанс. Все отрабатывали пьесу спустя рукава, радуясь первой возможности увильнуть от худших моментов роли. Товарищи, можно я сегодня не буду душить Дездемону? Вот справка, у меня гипертония. Хрен с тобой, не души, пнешь разок — сама перекинется. У нее, кстати, тоже гипертония. Лев со списком обходит всех зверей: антилопа, завтра ты ко мне на завтрак, капибара, ты жирная, будешь на обед, а ты, заяц, на легкий ужин, чтоб кошмары не мучили. Заяц: а можно не приходить? Можно, вычеркиваю.</p><p class="p1">Правда, видимо, была в том, чтобы в списке вести себя нагло: я вписан не потому, что отвержен и проклят, а потому, что мне можно. Здесь вообще следовало вести себя так, будто все можно, — потому что возникает обратная зависимость: действительно будет можно. Допускаю, что наглая тройка типа «Слава России» руководствовалась тем же принципом. Главный местный закон: у них действительно нет на тебя никакого зла, у них нет к тебе принципиальных претензий, если ты не слишком нарываешься, не грузин и не еврей. Следовательно, отношение к тебе они формируют не априори, а от поведения: если, будучи ввергнут в список, как все, ты ведешь себя по-хозяйски, как хозяин этого гетто, как свой в этом вонючем загоне, куда они по определению вытесняют всех, — то ты и будешь хозяин, тебя сделают капо, дадут плетку с синей ручкой (у самих с красной, заслужить нельзя, выдается по праву рождения). Из этого следовали занятные ходы применительно к «Острову», и Свиридов снова попробовал работать, но Тэсса приехала быстрей, чем обещала.</p><p class="p1">Ей было лет сорок пять, похожа на Эллен Берстин времен «Алисы». На ней было голубое платье с короткими рукавами, оттенявшее ровную смуглость. В юности наверняка была хорошенькой, крепенькой, с ямочками, теперь обтянулась. Бывала в Афгане, Чечне, Ираке, интервьюировала сенаторов, получила премию Союза немецких городов за книгу интервью с турецкими гастарбайтерами «Чужие, но такие же люди». Фильм, снятый по этой книге, демонстрировался на Берлинском кинофестивале в рамках программы «Познавая восточного соседа». Следом за ней, отдуваясь, шел шофер (а что, внешность заплечная — нос картохой, пивная шея). Он тащил тяжелый холщовый мешок, из которого выпирали острые углы. Вероятно, Тэсса ездила на интервью с вещами, боясь оставлять утварь в корпункте: сопрут, варвары.</p><p class="p1">Гомбровиц излучала позитивную энергию. У Свиридова мелькнула мысль, что хорошо бы попросить ее помыть пол, а то, знаете, руки не доходят, — все польза. Она помыла бы ради колоритной детали для будущего очерка, — но он сдержался.</p><p class="p1">— Я узнала о тебе из газетт, — она мгновенно перешла на ты. — Я могу дальше по-английски?</p><p class="p1">— Да, конечно.</p><p class="p1">По-английски она говорила немногим лучше, чем по-русски. Она прочла в газете про список. Ей интересны все люди списка, и она надеется на свиридовскую помощь в установлении контактов. Ей очевидно, что правительство загнало себя в тупик и теперь стоит перед прямой необходимостью массовых репрессий, потому что в обществе зреет недовольство. Ей интересно понять, каков механизм формирования списка, и она имеет основания предполагать, что это люди недовольные, имевшие неосторожность «высказаться мало ли где», пояснила она по-русски. Ее личный друг, депутат Бундестага от земли Рейнланд-Пфальц, сообщил ей конфиденциаль, что список составлен уже давно, но вышел на поверхность только сейчас, и в нем весьма высокопаставленные люди, йа, йа. Так что Свиридов не одинок. И, само собой, она ознакомилась благодаря интернетт с некоторыми его публикациями, с отзывами на фильмы, просмотрела одну серию «Спецназ», отметила, что критика находит в его работах социальный критицизм, и потому не видит особенных причин удивляться. Все в норме, этого следовало ожидать давно.</p><p class="p1">— Я и ожидал, — ляпнул Свиридов.</p><p class="p1">— О! У тебя было причин?</p><p class="p1">Он нехотя, ненавидя себя за пошлое желание соответствовать чужим клише, рассказал о неизбежности «тпру» поеле всякого «ну», о чередованиях оттепелей и заморозков как главном русском законе — все это было до того нудно и многократно переговорено, что он сбивался и пропускал целые звенья: ладно, неважно. В общем, что-то подобное давно должно было случиться. Но почему список составлен именно так, по какому критерию они все отобраны — он понятия не имеет и надеется на ее проницательность.</p><p class="p1">— Но это точно как тогда! — воскликнула Тэсса. — Тогда было точно так, и никто не понимал, за что! Но все это были люди, которые не были готовы повторять за всеми, которые, может быть, были только чуть-чуточку лучше, чем все, но эта чуточка и решала! Посмотри, ведь все это простые люди или очень высокопоставленное начальство, но совсем не затронут средний класс чиновничества, как тогда! Исполнитель тот же. Тогда тоже страдал либо часть верхушка, либо самый низ, беспомощный. Надо только понимать, кто составлял список, и я почти не сомневаюсь, какая организация это может здесь делать одна. Да?</p><p class="p1">Она подмигнула, и Свиридов немедленно почувствовал себя участником антирусского заговора. Впрочем, после утреннего поводка ему было уже все равно. Все попытки быть лояльным заканчиваются одинаково, а если хамить вслух и дружить с иностранными корреспондентами, могут испугаться и не тронуть.</p><p class="p1">— Я привезла договор, моя просьба такая, — продолжала она, улыбаясь и встряхивая пшеничными волосами; должно быть, в белозубой юности эта манера была даже обаятельна. Тэсса неуловимо и неумолимо напоминала пиарщицу детского центра, запретившую Свиридову выходить на сцену за призом. Ведь ровесницы, могли вместе отдыхать в том самом центре, обмениваться потом бессмысленными письмами. И обе все время врут, каждую секунду, оттого и ямочки пропали. — Я прошу, чтобы ты писал как бы дневник. Как вот ты в списке, как сегодня тебя не пустили туда, закрыли сюда, как ты подвергался тому и сему. Это будет дневник изнутри списка. Ты в списке один человек с литературой, с талантливой литературой, я хочу оформить договор. Мы будем перечислять на счет, это хорошие деньги.</p><p class="p1">— Вообще-то, — хмуро сказал Свиридов, — это может ухудшить мое положение.</p><p class="p1">— О нет! — она решительно замотала волосами. — Тогда тоже все думали, что контакт может ухудшить положение. Но ничто не могло ухудшить их положение, оно было решено тогда, когда они попали в список. Неважно, какой: тогда был такой, сейчас другой. И тогда люди тоже знали, что они в списке, и их оставляли на свободе смотреть, как себя поведут. И никто не бунтовал, не бежал, все были готовы. Я хочу, чтобы ты рассказал, как это жить в списке.</p><p class="p1">— Вы считаете, что моя участь решена? И у всех тоже? — Свиридов испугался и потому разозлился. Тэсса погладила его по руке легчайшим европейским прикосновением — вероятно, так она гладила скелетоподобных детей Африки, предлагая им для репортажа подробно рассказать о голодных резях в желудке.</p><p class="p1">— Я не знаю, какая участь. Я знаю, что пока еще можно менять. Если ты будешь рассказывать это для всех — может быть легче всем, всему списку.</p><p class="p1">Ага, мы уже настолько знаем психологию туземцев, что уповаем на неистребимый коллективизм.</p><p class="p1">— Я попробую, — сказал Свиридов. — Но мне нужны гарантии.</p><p class="p1">— Копирайт? — спросила глупая Тэсса.</p><p class="p1">— Мне нужны гарантии на случай ухудшения моего положения. Если после публикации за мной начнется охота, или меня начнут куда-то вызывать, или мое положение ухудшится — вы должны мне помочь с отъездом. Политическое убежище там, я не знаю.</p><p class="p1">— О, это я конечно буду! — воскликнула Тэсса. — Я буду конечно это пытать! У нас сейчас это очень затруднено связи проблемы миграция, ты знайешь, но мой знакомый депутат в Бундестаг помогал, натурализация для турецкие, курдские, еще, может быть, еврейская линия… У тебя нет еврейская линия?</p><p class="p1">— Нет, — отрезал Свиридов.</p><p class="p1">— Ну, это решаемо. Это как целое решаемо. Мы будем это смотреть. И потом смотри, я знаю, что у тебя — у всех — проблема с работой. Тут на первое время, просто от меня и газета. Это будет как аванс.</p><p class="p1">Она указала на мешок. Водитель, все это время тупо сидевший на свиридовском диване, развязал его и продемонстрировал Свиридову богатую внутренность подарка. Там было очень много вурста в полиэтиленовых упаковках, консервные банки с мясным фаршем, пачки сухого какао — месячный сухпаек для Гаргантюа.</p><p class="p1">— Я не могу это взять, — занервничал Свиридов. — Я не голодаю, и у меня еще есть работа…</p><p class="p1">— Ну ты же понимаешь сам, как будет с работа, — улыбнулась она обворожительней прежнего, и Свиридов понял, что его окончательное увольнение для нее крайне желательно как тема. Еще хорошо бы его убили, как Литвиненко, желательно, чтобы он умирал достаточно долго для хорошей серии репортажей. Таллий, бериллий, не знаю, бернуллий. Конечно, Тэсса Гомбровиц не любила его. Она искренне хотела, чтобы он сдох в нищете и мучениях. Но он был нужен ей и не видел оснований пренебречь конъюнктурой. Сейчас не приходилось надеяться на тех, кто его любил. Те, кто его любил, были малочисленны и бессильны. Надо было цепляться за Тэссу, ее депутата от земли Фуфель-Пферд, ее продуктовые мешки с вурстом. Списанные не имеют права на любовь, это дар богов сверх прейскуранта. Рассчитывать надо на тех, кому ты нужен как чучело. А что я нужен как чучело в неблаговидных играх неблаговидной Тэссы — так извини, Родина. Я тебе ничего не сделал, ты первая начала, теперь не обижайся.</p><p class="p1">Сговорились на следующем четверге. К четвергу Свиридов подкопит впечатлений и напишет две тысячи слов о первых неделях пребывания в списке. Деньги придут на валютный счет. Тэсса чмокнула его в щеку на прощание и упорхнула, не переставая заговорщически посмеиваться. Следом шел шофер, идеально энигматичный, не проронивший за час ни слова. Свиридов открыл банку фарша, разжарил его на сковороде и сел обедать. С доставкой на дом, с ума сойти.</p><p class="p1">Но спокойно пообедать тоже было не суждено — роскошные сюрпризы так и сыпались. Список словно вознаграждал его за черную полосу, являя свои внезапные преимущества. Снова заверещал мобильник, и Свиридов услышал бархатный, таинственно-важный голос человека, явно звонящего по серьезному поводу: не будет такой человек напрягаться по несерьезному. Вероятно, так разговаривал профессор Вышинский.</p><p class="p1">— Простите великодушно, — басил незнакомец, — не могу ли я поговорить с Сергеем Владимировичем Свиридовым?</p><p class="p1">— Это я. — Интересно, на кого еще он рассчитывал нарваться по мобильному?</p><p class="p1">— Очень, очень рад. Мне рекомендовал вас Василий Борисович Антонов, вы помните его, вероятно.</p><p class="p1">Свиридов что-то слышал о Василии Антонове, и притом недавно, но понятия не имел, где. У напуганного человека ухудшается память — мозги сузились, сосредоточились на опасности, тут ни до кого.</p><p class="p1">— Не напомните, кто он?</p><p class="p1">— Он с вами был связан в одном общем проекте, неважно. — Незнакомец говорил «пруект». — Он дал вам самые положительные рекомендации. Видите ли, если вы располагаете временем, я вкратце объясню…</p><p class="p1">— Располагаю, — вздохнул Свиридов.</p><p class="p1">— Отлично, отлично. — Он говорил звучно, смачно, сочно. — Для начала позвольте представиться: меня зовут Рыбчинский Альберт Михайлович. Я работаю сейчас — это не основное мое занятие, по основному роду, так сказать, моих занятий я финансист…</p><p class="p1">Он говорил долго, медоточиво, велеречиво. Его «пруект» сводился к циклу познавательных лекций по российской истории — «Вы понимаете, в свете новых концепций…». Василий — Борисович Антонов, которого Альберт Михайлович Рыбчинский знал по совместной работе с самой наилучшей стороны (эта словесная избыточность была у него во всем, он словно насыщался собственным рокотаньем), характеризовал Сергея Владимировича как исключительно одаренного работника, способного придать динамику и так далее, вы понимаете. Было бы желательно встретиться завтра, хотя чем раньше, как вы понимаете, тем лучше: все это надо было, так сказать, вчера. Тем более, насколько известно Альберту Михайловичу, послезавтра Сергей Владимирович зван на определенное мероприятие, пропускать которое для него, конечно, нежелательно, а потому он не смеет, ни в каком случае не смеет претендовать на его время. Значит, завтра. Договорились? Отлично, отлично.</p></span>
