<span><p class="p1">— Нет, про издателя. Такой был контркультурщик, издавал всякую муть. Акционист крутой, все время устраивал акции, что-то с Ренатой, что-то с Охлой, уже не помню. Человек из проклятых девяностых. И он, естественно, изменял сознание. Так он однажды чего-то такого выпил, что сознание покинуло его абсолютно. Приглашали экстрасенсов, всяко разно — нет, говорят, личность стерта как таковая. Он был нормальный, абсолютно, в том смысле, что ходил, и под себя, и вообще, иногда вставал по какому-то позыву, потом ложился, что-то ел, когда давали, — друзья к нему приходили, пальцами там щелкали, Слава, Слава, это типа мы, — но мозги атрофировались полностью, начисто. Понять, что он такого пил, оказалось нельзя, потому что он это пил один, но я думаю, что это же не в результате чего-то одного случилось. Это он по сумме так себя довел. Мне Попов рассказывал, он его снял и акцию сделал. Чтобы сбросились как-то на содействие, потому что родители его забрали из больницы, ему построили такой загончик, и он там ходил. А Попов это все снял, он мне хотел показать, но я отказался. На фиг мне грузиться, как он там ходит с загадочным выражением лица. И подавляющая часть населения, Серый, живет именно так, и никому не хуже. Просто некоторым казалось, что если не будет никакой идеи, то не будет списков ради идеи. А теперь оказалось, что идеи нет, а список есть. Но только если раньше вас бы всех чик-чирик или, наоборот, в наградной отдел, — то теперь вас сначала чик-чирик, потом в наградной отдел, потом паек, потом опять чик-чирик, потом диспансеризация и так далее. Фу, устал я от тебя, Серый.</p><p class="p1">Он действительно устал, его голая голова вспотела, и Свиридову стало его жалко. Он испугался, что Рома сейчас расслабится, окончательно увянет и останется ночевать, но он плохо знал Гаранина. Гаранин был, во-первых, неглуп, а во-вторых, у него был мощный резерв.</p><p class="p1">— Короче, я пойду, Серый, — сказал он спокойно и трезво, словно весь предыдущий горячечный бред был придуман и произнесен исключительно для того, чтобы Свиридову легче было воспринять открывшуюся истину. — Я пойду, а ты там как хочешь, расскажи всем или никому не говори, потому что это уже не принципиально. А что с вами будет, я, Серый, понятия не имею. Малинин помер потом, а про вас и про нас ничего не известно. Но если тебя интересует мое мнение, кем лучше быть в настоящий момент — всадником без головы или вот пучочком цветочков, который попался этому всаднику, — то и на этот вопрос, Серый, у меня нет однозначного ответа, будь здоров.</p><p class="p1">Свиридов чувствовал, что надо еще о чем-то спросить, что сейчас, может быть, Рома выболтает самое главное, — но просить его о содействии в случае чего он стеснялся (Гаранин и так наверняка сделал больше, чем мог), а ситуация была ему ясна и дополнительных расспросов не требовала.</p><p class="p1">— Слушай, Ром, — спросил он наконец, когда Гаранин уже вышел в прихожую, — а если вдруг окажется, что это не тот список, а? Что это все-таки по другому признаку? Мало ли, обнаружится вдруг среди наших человек, который не видел твою картину?</p><p class="p1">— И что? — спросил Рома.</p><p class="p1">— Как — что? Что тогда-то?</p><p class="p1">— Серый, — сказал Рома и посмотрел на Свиридова с искренним состраданием, наморщив огромный лоб и выкатив карие глаза. — Как же ты не понял-то ничего, Серый, я же так перед тобой распинался. Я тебе сказал все, что можно, и даже часть того, что нельзя. А ты так и не въехал никуда, Серый. Как по-твоему, почему я тебе все это рассказал, хотя не имел особенного права?</p><p class="p1">— Чтобы я не наломал дров, наверное, — сказал Свиридов без особой уверенности.</p><p class="p1">— По хрену мне твои дрова. Я тебе это сказал, потому что это совершенно уже неважно, Серый. Это уже настолько же без разницы, как и причина, по которой Слава Малинин иногда вставал, а иногда садился. Ты понял? Теперь уже совершенно насрать, какой это список. И никто уже ничего не может сделать, потому что данная система неуправляема в принципе. Она может только составлять списки и поступать с ними как получится. И ни я, ни кто-либо другой изменить эту ситуацию не в состоянии. Но если я тебе лично смогу быть полезен, то само собой. Хотя, честно тебе сказать, вряд ли я смогу тебе быть полезен, как и вообще кому бы то ни было. Будь.</p><p class="p1">Некоторое время после его ухода Свиридов молча сидел на кухне, а потом ринулся к телефону.</p><p class="p1">— Андрей, — сказал он Волошину. — Извините, что поздно, но это действительно срочно.</p><p class="subtitle">13</p><p class="p1">— Ну да, и вы купились, естественно, — сказал Волошин, когда Свиридов в ночном «Сим-Симе» на Краснопресненской вывалил ему Ромину версию.</p><p class="p1">— Что значит — купился? По-моему, все так и есть. Какие еще могут быть варианты?</p><p class="p1">— Ну да, ну да. Член Общественной палаты приезжает к вам ночью, вбрасывает вброс, сливает слив, и вы с готовностью бежите распространять. Честное слово, я про вас лучше думал.</p><p class="p1">Свиридов ждал какой угодно реакции, но не этой.</p><p class="p1">— То есть… — Он все еще не мог прийти в себя, все-таки потрясений на одну ночь вышло многовато. — Вы хотите сказать, что он меня дурачил?!</p><p class="p1">— Разумеется! — воскликнул Волошин. — И судя по тому, что вы повелись, — дурачил очень успешно! Хотя лично я не понимаю, как можно повестись на такую простую клюкву.</p><p class="p1">— Слушайте, — не успокаивался Свиридов. — Но это же… Это все объясняет! И то, что мне тогда показалось, будто я уже мельком видел вас всех…</p><p class="p1">— Это как раз ничего не объясняет. Мне тоже с определенного возраста кажется, что я всех уже где-то видел. Вам двадцать восемь, первый кризис, мерещится, что все уже было.</p><p class="p1">— Но ведь мы все, все там были! На премьере!</p><p class="p1">— Далеко не факт. Были вы, был я, было, допустим, еще двадцать человек из двухсот. Кстати, всего списка мы не знаем и вряд ли узнаем. Но даже если допустить, что все двести были приглашены на премьеру «Команды», — вам не приходит в голову, почему они там оказались?</p><p class="p1">— Ну? Почему?</p><p class="p1">— Потому что потом объяснить все этой версией будет очень просто. Разослали пригласительные, все туда ломанулись — как же, престижное мероприятие… Но почему разослали именно им — это вам неинтересно?</p><p class="p1">— Андрей! — возмутился Свиридов. — Но ведь там випы сидели только в партере! А в списке — случайные люди, те, кто купили билеты на первый показ!</p><p class="p1">— Тоже не факт. Проведите проверку, расспросите весь список, тогда можно разговаривать. А пока это либо его личный пьяный бред, потому что его пробило на маньку величку от собственного взлета, либо версия прикрытия.</p><p class="p1">Волошину уже так нравилось чувствовать себя в списке, составленном по неясному критерию, что любое рациональное объяснение его не устраивало категорически. Разубеждать его было бесполезно. Даже если бы весь списочный состав поголовно представил ему билеты на премьерный показ «Компании», он выдумал бы версию, объяснявшую попадание всего списка на этот сеанс: вызвали же их всех на встречу с ветеранами ГБ, значит, в каждом отдельном случае подсуетились и тут.</p><p class="p1">— Это у вас манька величка, а не у него. Будет сейчас ГБ вам прицельно организовывать попадание двухсот человек на один фильм…</p><p class="p1">— Сергей, — мирно сказал Волошин. — Если вам спокойней думать так, ну и думайте. Каждый ведь обустраивает реальность сообразно своим потребностям. У вас такие, у меня другие, каждый умудряется сделать себе непротиворечиво. Вы только иногда задавайте себе простые вопросы, вроде вот таких. В кино ведь обычно ходят парами, так?</p><p class="p1">— Так! — Свиридов почувствовал, что почва — в который уж раз за вечер — уходит у него из-под ног.</p><p class="p1">— Но почему тогда в списке так мало семейных пар? Или просто пар? Вот вы — вы один туда ходили?</p><p class="p1">— Нет, с девушкой. — Свиридов лихорадочно соображал: на самом деле он должен был задать Роме именно этот простейший вопрос, но тормознул, потрясенный гаранинской откровенностью.</p><p class="p1">— Тем не менее ваша девушка почему-то не в списке, — ехидно заметил Волошин. — И вы сами сказали мне об этом.</p><p class="p1">— Подождите, подождите… Вулых был без жены… Клементьев был с сослуживцем… Надо просто прошерстить остальных…</p><p class="p1">— Ну прошерстите, — пожал плечами Волошин. — Посмотрим, чего нашерстите.</p><p class="p1">— Стоп, стоп… Это легко объясняется статистически… — Свиридов все цеплялся за Ромин вариант. — В амфитеатре мест шестьсот да еще в бельэтаже триста, это же «Октябрь»… И вполне естественно, что они выбрали одного человека из каждой пары! Иногда совпадало, как у Клементьева с сослуживцем, а иногда брался кто-то один. Зачем им брать всю пару? Можно же пометить одного и так наблюдать, охват будет больше…</p><p class="p1">— Можно, можно. Все можно. Вы, если захотите, все теперь будете объяснять именно так. Но позвольте вам заметить, что при этом раскладе людям, которых не было на сеансе, абсолютно неоткуда было бы взяться в списке! Это в принципе невозможно, потому что они не проходили сквозь рамку, — так?</p><p class="p1">— Да, естественно. А кто из наших там не был?</p><p class="p1">— Как минимум двое! — триумфально воскликнул Волошин. — Первый — мой коллега с «Маяка» Батюшкин. А второй — известный лично мне адвокат Борисов.</p><p class="p1">— Откуда вы знаете?</p><p class="p1">— А вот разговорились чисто случайно. Он сказал, что впервые посмотрел «Команду» на ди-ви-ди неделю назад и нашел картину чрезвычайно удачной. Чрезвычайно. Кипятком писал, — и Волошин взглянул на Свиридова с откровенным торжеством.</p><p class="p1">— Я это проверю, — сказал Свиридов. Он уже никому не верил.</p><p class="p1">— Проверяйте, — развел руками Волошин. — Но когда член Общественной палаты в следующий раз устроит вам ночной слив, не спешите выдергивать людей из постели.</p><p class="subtitle">14</p><p class="p1">Он не мог не поехать к Але. Это был последний шанс, контрольная проверка. Про гордость в этом случае следовало забыть. Весь следующий день он ждал, мучился, метался, садился сочинять, бросал, кое-как досуществовал до пяти вечера. Хотел сначала ехать без предупреждения — так, прозвонить на домашний, проверить, дома ли, — но не дай бог ворваться и кого-то застать, хуже не бывает. Он позвонил ей на мобильный.</p><p class="p1">— Алло, — ровно, безрадостно, безразлично.</p><p class="p1">— Это я.</p><p class="p1">— Ты определился?</p><p class="p1">— Надо увидеться.</p><p class="p1">— Зачем?</p><p class="p1">— Неважно. То есть важно, но при встрече. Где ты?</p><p class="p1">— Дома, где ж я могу быть…</p><p class="p1">— Черт тебя знает. Жди, я сейчас.</p><p class="p1">Он бессчетно раз бывал у нее дома, случалось — и ночевал там, но никогда еще с самого порога, да что — с подъезда, не погружался в такой крепкий настой безнадежности и грусти. Грустно было все — медленно густевшая небесная синева, скрип качелей, крики детей во дворе, брошенные старые машины вдоль ее длинного дома; или это он был невыносимо, расслабленно грустен, вот я, я не могу без тебя, делай со мной что захочешь. Но у себя он не чувствовал ничего подобного, а здесь подступало, накатывало — ничего не поделаешь, Свиридов улавливал чужие волны. Открыла ему Алина мать, впустила, ушла к себе; Свиридов пошел к Але и поразился, как она за эту неделю стала бледна, тиха и беспомощна. Она сидела в углу дивана, того детского дивана, который жалела выбросить и на котором перечитала когда-то всю домашнюю библиотеку, вообще не любила выбрасывать вещи, хотя с людьми рвала, как видим, легко и сразу.</p><p class="p1">— Аль, — сказал он.</p><p class="p1">— Чаю хочешь?</p><p class="p1">— Потом. Аль, дело срочное. Мне надо проверить одну штуку.</p><p class="p1">— Проверяй.</p><p class="p1">Она встала, потянулась, открыла балкон, закурила.</p><p class="p1">— Слушай, у меня был Гаранин.</p><p class="p1">— Поздравляю.</p><p class="p1">— Он объяснил, в чем дело со списком.</p><p class="p1">— Ну? — безо всякого интереса.</p><p class="p1">— Он сказал, что это бред. Что это список людей, посмотревших «Команду» в первые три дня, не весь, а выборка, около половины. Включая випов, которых он пригласил сам. Таргет-группа, короче.</p><p class="p1">Она с усмешкой оглянулась на него.</p><p class="p1">— Забавно.</p><p class="p1">— Да куда забавней. Я просто хотел спросить: ты не там? Не в списке?</p><p class="p1">— А, — сказала она, — цель приезда.</p><p class="p1">— Ну хватит, Алька. Я и так приехал бы.</p><p class="p1">— Да-да, конечно. Мог по телефону спросить.</p><p class="p1">— Не хочу по телефону. Там некоторые попали прямо парами, а некоторые поодиночке, все-таки отбор. Объясни мне, ты в списке или нет?</p><p class="p1">— В списке, — сказала она очень просто.</p><p class="p1">Свиридов покачнулся и прислонился к стене.</p><p class="p1">— А чего ты молчала?!</p><p class="p1">— А какая разница?</p><p class="p1">— Нет, ну ничего себе! Человек с ума сходит, его с работы выгоняют, слежка какая-то начинается, черт-те что, а ты тоже в списке и молчишь! Как ты узнала вообще?!</p><p class="p1">— Я раньше тебя узнала. Ты вернулся, я уже в курсе была.</p><p class="p1">— Откуда?</p><p class="p1">— Из ДЭЗа приходили. Площадь перерасчитывали, вдруг мы недоплачиваем.</p><p class="p1">— И все?</p><p class="p1">— Да какое все. С работы погнали через две недели.</p><p class="p1">— Слушай! — Он сел на диван. — Ну Алька же! Почему, почему?! Я все тебе всегда говорю, а ты что, вообще за человека меня не считаешь?</p><p class="p1">— Ты говоришь, а я не говорю. Это не твоя проблема.</p><p class="p1">Он все еще не мог прийти в себя.</p><p class="p1">— А чего ты на сайте не отметилась?</p><p class="p1">— А что мне за радость отмечаться на сайте? Это как в общаге, чужие испарения кругом. У меня пока своя квартира.</p><p class="p1">— Блин. И на что ты живешь?</p><p class="p1">— Бебиситером устроилась. С понижением, но платят.</p><p class="p1">— Но это не твое дело, Алька!</p><p class="p1">— Как раз мое. По профессии не берут пока.</p><p class="p1">— Но неужели бы я тебя не привел куда-то?</p><p class="p1">— Ты себя привести не можешь, где уж мне.</p><p class="p1">— Аль. — Свиридов изо всех сил старался говорить спокойно; он хотел подойти, обнять ее, но чувствовал, как она не подпускает. — Аль, ради бога. Давай спокойно. Ты действительно считаешь, что человек не имеет права рассказывать другому о своих проблемах?</p><p class="p1">— Если хочет — имеет. А я не хочу. Вот что человек не имеет права требовать, чтобы другой выворачивался наизнанку, — это я тебе, Сережа, точно скажу.</p><p class="p1">— Но я же не виноват, что там оказался!</p><p class="p1">— Ты виноват, что там записался. И что поехал с ними на дачу. И что месяц с ними пьешь, обсуждая, куда и почему вас записали. Вас записали, и вы смирились, и стали жить, как будто целиком теперь этим исчерпываетесь. Вот я чего терпеть не могу, Сережа. Человек, которого я люблю, так вести себя не может. Я никогда не буду жить с человеком из списка.</p><p class="p1">Она говорила это спокойно, даже вяло, но с невыразимой брезгливостью. Свиридов чувствовал, что ей плохо, что она беспомощна и одинока, но и в одиночестве, в поражении, в упадке сил по-прежнему неподкупна; что он может горы жалостных и негодующих фраз нагородить в свое оправдание, но не сдвинет ее с места. Грех его был неискупим: он был в списке — и ничего не почувствовал. Почему? А по тому самому. Был в списке, и страх забил ему все чувствилища, все поры: он не почувствдвал, что она испугана, напряжена, теряет работу, устраивается, отчиавается, бедствует. Все силы уходили на собственный ужас, он жрал их, высасывал и теперь проглядел Альку — ради которой все.</p><p class="p1">— Ладно, я виноват. Прости.</p><p class="p1">— Да какое прости, Сережа! Ты не виноват, и прощать тебя не за что. Я просто… я, если хочешь, благодарна этому списку. Я очень близка была к тому, чтобы остаться с тобой надолго. Мы стали бы жить, и тут случилось бы что-то, и я поняла бы, что это чужая жизнь. А уже не разлепишься. Ты не плохой, не злой, ты ни в чем вообще не виноват. Но я как увидела, что ты записался… все, понимаешь? Как лампочка треснула. Ты же сам себя туда внес, и теперь на тебя будут распространяться все закономерности, которые они выдумают.</p><p class="p1">— На тебя, положим, они тоже распространились.</p><p class="p1">— И что? Я поменяла работу, и что они сделают? Да хоть бы и сделали — я им не соучастница. А ты вписался, и в этом все дело. Ты теперь с ними, ты приклеился. Я не буду, не могу жить со списком.</p><p class="p1">— По-моему, ты себя уговариваешь. И не так уж тебе отлично без меня.</p><p class="p1">— Да мне очень плохо без тебя, Сережа! Очень! — Она вернулась с балкона и села рядом с ним на диван. — Я же привязчива все-таки, хотя ничего такого себе не позволяю. Но я не буду с тобой, Сережа, и не пущу тебя больше в свою жизнь. Еще и потому, Сережа, что ты меня бросил и приехал только через неделю. И только потому, что Гаранин тебе все объяснил.</p><p class="p1">— Я?! — Этой несправедливости Свиридов уже не мог вынести. — Я тебя бросил?! У тебя язык поворачивается мне это сказать?!</p><p class="p1">— Да, Сережа. Это ты меня бросил. Это ты мог ко мне приехать на другой день и не приехал. А приехал ты, Сережа, когда Гаранин тебя посетил со своей, Сережа, благой вестью. И поэтому я никогда к тебе, Сережа, не вернусь, как бы плохо мне ни было, ты понял?</p><p class="p1">Он понял, да. Он понял, что теперь ей нужен был универсальный виновник, и этим универсальным виновником был он. Глупости — все эти разговоры про плечо, которое так ей необходимо; не плечо ей нужно, а тот, на кого можно все свалить. Нечуткость — он, одиночество — он, с работы выгнали — он… Каждый по-своему избывал травму списка. Он метался и пил с кем попало, обсуждая причины, — а она нашла себе громоотвод, следила за Свиридовым со стороны, подмечала и копила его ошибки, измывалась над его трусостью… Конечно, кто ж еще виноват! Он должен был все это время гробиться, спасая ее, — а он смел думать о себе! Действительно, слава богу, что не остался с ней. Обойдусь.</p><p class="p1">— Аль, — выговорил он после паузы. — Откуда в тебе это сознание своей всегдашней правоты, а? Нет, погоди, я договорю, мы с тобой теперь долго не поговорим. Смотри: я не такой дурак, не пацан, мне двадцать восемь лет, я что-то умею. А тебе двадцать три года, и ты думаешь, что ты в сто раз умнее и храбрее меня. Я не понимаю, откуда эта уверенность? Это врожденное или воспитанное?</p><p class="p1">— Воспитанное, — сказала она. — Плохо воспитанное, но стараюсь.</p><p class="p1">— Но пойми: сомнение в своем праве всех судить — это норма, Аля, норма. Если у кого-то нет этой нормы, он урод, рядом с ним люди пачками дохнут.</p><p class="p1">— Не надо, Сережа. Я знаю, с кем дохнут. Ты влез в трясину и меня туда тащишь. Ты хотя бы спросил себя раз в жизни — чего ты боишься? Вот чего? Что они с тобой сделают? Не надо мне только про пугливое воображение, про то, что ты этим страхом пишешь и без него не можешь. Все ты можешь, он тебе не помогает, а мешает писать. Ты на все уже готов, я же помню, как ты мне звонил после этого своего урода, который учебник тебе заказал. Вот когда все треснуло, а ты и не почувствовал ничего.</p><p class="p1">Он мог бы многое ей возразить, но это не имело смысла: тут была пропасть, которую не перепрыгнешь. И ведь он чувствовал в ней то, что она называла твердой землей, а он — глухотой, даже не человеческой, а метафизической; но сперва гнал эти мысли, а потом надеялся, что этим-то они и дополнят друг друга. Он будет за двоих предвидеть, она за двоих бодриться… В том и беда, что никто никого не дополняет, жить можно только с двойником, а не с негативом, и правильно все было придумано в «Паре» — вот же предсказал на свою голову: героиня там вообразила, да и психолог напел, что она ненавидит мужа за страшную рану, нанесенную в прежней жизни, столь страшную, что не может ее даже вспомнить. А потом вспомнила, и оказалось, что она и тогда его точно так же ненавидела, и не доигрывает она с ним старую драму, а переигрывает ее по второму кругу, ибо на свете ничто не доигрывается — все повторяется, горбатого могила исправит.</p><p class="p1">Но так невыносимо печален был весь ее облик, и дом, и синий вечер за окнами, такой тоской звучали скрипучие качели во дворе, так робко, почти бесшумно двигалась ее мать за стеной, что злоба Свиридова погасла, не разгоревшись; ему было жаль ее до слез, до судорог, и жалость эта была безвыходна, отвергаема, замкнута на себя. Август, август пришел, какое ужасное время. Теперь будет темнеть все раньше. Что я буду делать один?</p><p class="p1">— Ну ладно, — сказал Свиридов. — Если надумаешь, позвони.</p><p class="p1">— Я не надумаю, Сережа, но спасибо.</p><p class="p1">Он вышел из комнаты, и Алина мать так же бесшумно ему открыла дверь, и бесшумный лифт увез его в бесшумный синий двор, откуда исчезли вдруг все звуки: тоска затопила их. Он не мог ехать к себе и отправился к матери.</p><p class="p1">Свиридов ждал чего угодно — упреков, расспросов, новых сетований на его неудачливость, — но мать была безупречно настроена на его волну в тот синий вечер. Все друг друга понимали и все сознавали, что сделать ничего нельзя.</p><p class="p1">— Ешь, — она поставила перед ним суп, и он стал есть, как в детстве. Она сидела напротив и рассказывала ему, что тут приключилось без него: у соседки слева из дома ушел десятилетний сын, поймали на вокзале, хотел сбежать к отцу в Петербург; соседке слева во время гипертонического криза вызвали скорую, мать к ней бегала откачивать, отпаивать таблетками, а скорая приехала на следующее утро, когда все уже было нормально; других историй здесь не происходило.</p><p class="p1">— Бедный ты мой, — сказала мать, глядя на него, подсела поближе и стала гладить его по голове.</p><p class="p1">Свиридов понял, что он не один на свете и что этого не изменит никакой список.</p><p class="p1">— Выкарабкаемся, мать, — сказал он.</p><p class="p1">— Бедный ты мой, — повторила она.</p><p class="p1">— Ну бедный. Это, может, и к лучшему. Зачем тебе другой?</p><p class="p1">— Незачем, незачем. Мой — самый лучший. Галчиха галчонку говорит — ты мой беленький, ежиха ежонку говорит — ты мой гладенький.</p><p class="subtitle">15</p><p class="p1">Господи, почему бы тебе не разомкнуть меня?</p><p class="p1">Ведь я знаю много всего.</p><p class="p1">Иди к цветку Виктории Регине, иди в простор, и передай привет от герцогини дель Аква-Тор…</p><p class="p1">Издевались над дешевой экзотикой, а почему? Что есть выше этих недоступных, прекрасных стран, мест, где мы не бывали, слов, которых не слышали.</p><p class="p1">Господи, почему бы тебе не отвлечь мое внимание от меня и от гнусных вещей, на которых я сосредоточен в последнее время?</p><p class="p1">Почему бы тебе не переключить меня на цветы, зеркальные водопады, гигантские древесные паразиты с гнилостным запахом, с названием Раффлезия Арнольди?</p><p class="p1">О сад, сад.</p><p class="p1">Господи, почему бы тебе не переориентировать меня с того, что я вижу и знаю, на то, что я помню неизвестно откуда, на твои, например, пустыни и закаты? В раннем детстве в журнале «Пиф» я видел такой закат: огромная пустыня и над ней полосатое небо. Так ли уж много на свете вещей, в которых я слышал отзвуки этой небывалой действительности?</p><div class="poem">
<div class="stanza">
<p class="v">Блещет вода в колодце чистом, как недра горна.</p>
<p class="v">На раскаленном камне сохнут кофейные зерна.</p>
<p class="v">Красные тени зноя косо плывут над садом</p>
<p class="v">Свесив язык, пустыня загнанно дышит рядом.</p>
<p class="v">Вечер картину зноя мягкою кистью смажет.</p>
<p class="v">Ночь поперек порога сонной овчаркой ляжет.<a href="ch2.xhtml#id2" class="a">[1]</a></p>
</div>
</div><p class="p1">Почему бы тебе не направить мой взор на это?</p><p class="p1">На бесконечные торговые ряды, на безвестные города, на огромные пустые пространства, на то, о чем одна из самых странных твоих дочерей сказала: «На пустынном прилавке заката».</p><p class="p1">Как я знаю этот пустынный прилавок, закрывающийся рынок в портовом городе, где я чужак; где в последнем ряду, в последней лавке, в последний час меня ждет волшебная закономерность.</p><p class="p1">Почему тебе не кинуть мне хоть одну закономерность, чтобы я убедился в твоем присутствии. Почему ты подсовываешь мне одно взаимоисключающее, амбивалентное, толкуемое и так и сяк.</p><p class="p1">Почему ты не хочешь вернуть мне обещания моих первых дней, когда каждый закат между домами доказывал мне тебя.</p><p class="empty-line"/><p class="p1">Раскрой меня, Господи.</p><div class="poem">
<div class="stanza">
<p class="v">Я жду и жду: Господь меня раскроет,</p>
<p class="v">как форточку в конторской духоте,</p>
<p class="v">как заспанную книгу, столько лет</p>
<p class="v">служившую подставкой для бегоний;</p>
<p class="v">пробьет, как брешь</p>
<p class="v">в задристанном невольниками трюме.</p>
</div>
<div class="stanza">
<p class="v">Спускайтесь вниз, цинготная шпана,</p>
<p class="v">по сосенке отобранная с бору,</p>
<p class="v">рябой фасолью сыпьтесь по канатам —</p>
<p class="v">мою пробоину попробуйте заткнуть</p>
<p class="v">мешками, досками, друг другом!</p>
</div>
<div class="stanza">
<p class="v">Я так хочу, чтоб он меня раскрыл</p>
<p class="v">Своим шершавым устричным ножом.<a href="ch2.xhtml#id1" class="a">[2]</a></p>
