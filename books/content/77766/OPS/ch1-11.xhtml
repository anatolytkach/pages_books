<span><p class="p1">Свиридов не помнил ни о каком мероприятии и ничего на завтра не планировал, но тут его пробило. Господи, двадцать девятого июля он был зван на собрание ветеранов спецслужб, на круглый стол в киноцентре «Октябрь». Вот и пригласительный, в ящике стола: в едином, о Господи, строю. Откуда Рыбчинскому известно про единый строй? «Мероприятие» — это явно из их лексикона. Стало быть, я включен в список для работы над сериалом о родной истории? Но что в нем делает Клементьев — пишет серию об истории РЖД? А Бодрова? Бред. Но неужели для работы над историческим сериалом я непременно должен был побывать в списке, чтобы почувствовать на себе всю прелесть русской истории? Ведь она в основном так и делалась — списочно, с последующими увольнениями. Ничего себе способ, вроде как Михалков всех запирал на неделю в поместье, а потом, когда все достаточно возненавидели друг друга, снимал «Неоконченную пьесу». Возможно, врут, но если нон э веро, то бен тровато.</p><p class="p1">Он еще некоторое время тупо сидел перед включенным компьютером, зашел на сайт списка — ничего нового, — просмотрел новости, все чего-то ожидая. Может быть, еще одного звонка. Вот оно: страх всех нас превратил в ожидальщиков. Кажется, Мандельштам. Теперь понятно. Почему? Потому что страх переводит тебя в специальную категорию невесомых, носимых ветром людей, чья жизнь зависит от каждого звонка. Ты возьмешься что-нибудь делать, а тут звонок, и уже не надо. Договор расторгнут, ты уволен. И вообще — уязвленное, болезненное состояние, в котором страстно хочется сочувствия. Позвонит кто-нибудь — и утешит, все-таки живое слово. Или, наоборот, скажет самое ужасное — но тогда его можно будет по крайней мере не ждать. Ничего не происходило. Хорошо, погуглим, какой такой Рыбчинский. Рыбчинский Альберт Михайлович входил в Союз друзей милиции «Щит и меч», в наблюдательный совет по возрождению усадьбы «Останкино», в Союз православных предпринимателей «Потир», на компромате ру не упоминался, числился среди ветеранов Внешторга. Картинок нет. В сущности, ноль. Настораживает, конечно, «Щит и меч», «Потир» скорее забавляет, а главное, я категорически не помню, кто таков мой рекомендатель Антонов, знающий меня с на-и-лучшей стороны. Но презирать не должно ничего.</p><p class="p1">Свиридов выключил комп и отправился в «FAQ», где с остервенением плясал до трех часов утра.</p><div class="cite">
<p class="p1">«Контактен, лабилен, уравновешен, беспринципен, реакция в норме, умеренный гипергидроз, общий тонус с тенденцией к укреплению, тремор отсутствует, но перессал, конечно, страшно. Особых замечаний нет».</p>
</div><p class="p1">Интересно, это Тэсса, Рыбчинский или шофер?</p><p class="empty-line"/><p class="p1">А если кому-то интересно, что это за агентурные вставки, так можно заглянуть в тринадцатую главку последней части. Стоп, куда! Читай по порядку. Ты все равно не найдешь. Там спрятано.</p><p class="subtitle">7</p><p class="p1">Встреча с Рыбчинским была у них запланирована на три часа дня в его офисе, и с утра Свиридов собирался сочинять — но поработать снова была не судьба. В восемь утра его разбудил мобильник.</p><p class="p1">— Сергей Владимирович?</p><p class="p1">— ДаОн напрягся: голос был женский, официальный, эсэсовский.</p><p class="p1">— С вами будет сейчас говорить Валентин Васильевич Ломакин.</p><p class="p1">— Кто это?</p><p class="p1">Но в трубке уже заиграла страшная электронная музыка, которая ни на какие вопросы не отвечает.</p><p class="p1">— Але, — сказал густой голос.</p><p class="p1">— Слушаю.</p><p class="p1">— Это Сергей Свиридов?</p><p class="p1">— Да.</p><p class="p1">— Здорово, я Валя Ломакин. «Форекс групп» знаешь?</p><p class="p1">— Не знаю.</p><p class="p1">— Зря не знаешь. Это девелоперская такая корпорация, большая.</p><p class="p1">Свиридов не знал даже, что такое «девелоперская».</p><p class="p1">— Короче, дело есть к тебе одно.</p><p class="p1">Свиридов испугался окончательно.</p><p class="p1">— А какое дело?</p><p class="p1">— Увидишь, какое. Не по телефону же. Когда можешь?</p><p class="p1">— На той неделе, работы много.</p><p class="p1">— Не, это не разговор. Надо сегодня, это бизнес. В бизнесе, Серый, есть три главные вещи: напор, чуйка и быстро. Ничего я на ты?</p><p class="p1">— Нормально, — пересохшими губами сказал Свиридов. — Но я не могу сегодня, у меня встреча.</p><p class="p1">— Во сколько?</p><p class="p1">Не знаю, как с чуйкой, с ней, наверное, плохо, а с напором у него полный хоккей.</p><p class="p1">— В пять.</p><p class="p1">— Я в восемь за тобой заеду куда скажешь. В семь позвоню. Привезу — увезу. Я даю парти сегодня. На двадцать пятом этаже трейд-центра на Краснопресненском проспекте, у вантового моста. Слышал?</p><p class="p1">— Нет, не слышал.</p><p class="p1">— Ну ё-моё, ты в Африке живешь. Байтовый мост со смотровой площадкой, будем открывать в ноябре. Пока трейд-центр и парти. Все, отбой, до связи.</p><p class="p1">Он все уже решил за Свиридова. Сочинять после этого точно не хотелось. Свиридов на всякий случай прогуглировал и Ломакина с «Форексом». Этот не входил в Союз православных предпринимателей, зато имел собственный сайт — шикарный, с музыкой, с фотогалереей бесчисленных проектов, которые Ломакин возводил по всему миру. Специализировался он на отелях, но сейчас планировал возвесть на Москве сеть торговых комплексов вдоль третьего кольца. Лет ему было чуть за тридцать — ровесник Свиридова, чудом поднявшийся в девелоперскую элиту из десанта, где служил с девяносто пятого по девяносто седьмой. С фотографий глядел детина элитной планировки, с евроремонтом и многоступенчатой охраной, и на его пентхаусе застыло немыслимое напряжение, словно он ежесекундно мог треснуть от переполнявших его денег и сил. Для чего бы я ему нужен — пиар, что ли? Можно наврать, не поехать, отключить телефон — но чем черт не шутит, вдруг работа. Сейчас ни от чего нельзя было отказываться. Чтобы не торчать дома до пяти, Свиридов вышел в раскаленный город, отправился в Серебряный Бор и плавал там два часа кряду среди благословенной жары.</p><p class="p1">Здесь, в Серебряном Бору, он купался когда-то с Калининым, уже выпускником, на которого смотрел как на бога. Калинин умер от внезапного инфаркта в прошлом году. Соавтор Калинина, Басов, разбился на мотоцикле за два года до этого. Мастер их курса, Снаткин, в том же году попал под машин<em>уна тишайшем перекрестке</em>. Почему-то отсюда упорно забирали всех приличных людей, в этом была своего рода режиссура, — все, кто что-нибудь умел, исчезали, чтобы не портить картину. Я тоже что-то умею, но и я не нужен, и поэтому список. Не слишком ли хорошо я думаю о себе? Но Калинин любил меня, и Снаткин звал меня в Матвеевское, в Дом ветеранов кино, и Басов часто со мной выпивал, хоть я и не выдерживал его темпа. И отец меня любил, а потом пропал. Мать меня любит, но у нее своя проблема, заслонившая все: возраст, выживание. В ее возрасте страшно в этом мире, какой он получился, — хуже, чем мне. Никто не будет спасать, вообще никто. Раньше, я еще помню, хоть кому-то было дело. Утону сейчас — и кану, и насовсем, и никакого следа; он увидел, что собирается гроза, испугался молнии и поспешно выбрался на берег. Всего уже боюсь, Господи, во что превратился.</p><p class="p1">Хотелось есть, но обедать он не стал — на жаре разморит, а у Рыбчинского надлежит быть собранным. «Пруект», не шутки. Рыбчинский сидел в офисе на улице Усиевича, в желтом трехэтажном особняке. У входа красовалась золотая доска с тиснением «Трек LTD». Повыдумывали названий — трек, форекс. Черт-те чем занимаются люди.</p><p class="p1">Пропуск был заказан — Свиридову надлежало пройти в комнату 35 на третьем этаже. Против ожидания, там ждал его не обладатель бархатного баса, а сморщенный старик чуть ли не восьмидесятилетнего вида, дряблый, со склеротическими щечками и трясущейся головой.</p><p class="p1">— Сергей Владимирович? — прошамкал, прошаркал он, протягивая Свиридову лиловую ручонку.</p><p class="p1">— Да, здравствуйте.</p><p class="p1">— Вот вы какой. Что, хорошо. Вас просил зайти сегодня Альберт Михайлович, но сначала, не взыщите, мы должны вас встретить как дорогого гостя. Пройдемте.</p><p class="p1">Они прошли в соседний кабинет, где висел на стене портрет Андропова, а на скромном круглом столе стояло скромное круглое угощение: миндальное и овсяное печенье, пузатенький чайничек. Сердце у Свиридова упало. Он понял, что это конец. Непонятно, что отчетливей говорило о конце, — портрет Андропова или овсяное печенье, — но ясно было, что ритуал встречи дорогого гостя закончится в подвале. И ведь предчувствовал, идиот, и сам поперся. Надо было требовать, чтобы вызвали повесткой. А впрочем, тогда они просто взяли бы среди улицы.</p><p class="p1">— Вот, присаживайтесь. У нас не садятфя, у нас присаживаются. — Это было сказано со значением. — Ну-с, при встрече дорогого гостя предполагаютфя вопросы и ответы. Я, если позволите, задам вам несколько вопросов.</p><p class="p1">Свиридов криво усмехнулся.</p><p class="p1">— Так-с. Для начала у вас позвольте узнать, кем работает ваша матушка.</p><p class="p1">— Врач.</p><p class="p1">— Очень, очень благородно. А ваш батюшка?</p><p class="p1">— Отец пропал без вести.</p><p class="p1">— Так. Глубоко соболезную. Но он же, простите, кем-то работал, прежде чем пропасть без вести?</p><p class="p1">— Инженером.</p><p class="p1">— Так, так. И никаких следов?</p><p class="p1">— Никаких.</p><p class="p1">Неужели они что-то знают об отце?</p><p class="p1">— Я вам не представился, — сказал старик, словно только факт пропажи свиридовского отца и позволял говорить с ним доверительно. — Меня зовут Ферапонтов Виктор Максимович, я помощник Альберта Михайловича по вопросам, так сказать, кадровым, по встречам, ну и так дальше, так дальше. Позвольте узнать, вы постоянную работу имеете?</p><p class="p1">— Имею, я сценарист.</p><p class="p1">— Это мы знаем, да. Мы иначе не обратились бы к вам. Мы имеем даже сведения, что вы очень хороший сценарист. Но есть работа, которая потребует всей, так сказать, вашей направленности, всего вашего времени. Или по крайней мере значительного. Это все не так просто. Мы хотели бы знать, так сказать, как вы оцениваете текущий момент и вообще.</p><p class="p1">Свиридов насторожился.</p><p class="p1">— В общем положительно.</p><p class="p1">— Это понятно, мы, так сказать, удивлены были бы услышать обратное. Если вы нормальный человек, то вы, естественно, положительно оцениваете. Но хотелось бы понять: вы понимаете, чем мы именно обязаны?</p><p class="p1">Свиридов лихорадочно нащупывал формулировку.</p><p class="p1">— Думаю, тем, что мы перестали себя стыдиться и начали собой гордиться, — сказал он наконец.</p><p class="p1">Это было достаточно амбивалентно, чтобы не выглядеть прямой лестью и грубой подколкой, и вместе с тем верно: весь успех заключался в том, что исходное состояние нации и страны было принято за образец или по крайней мере норму.</p><p class="p1">Ферапонтов расцвел.</p><p class="p1">— Вот именно это, да. Имено это нам очень было желательно услышать. Теперь, когда мы понимаем, что вы, так сказать, понимаете, мы можем пройти к Альберту Михайловичу. Он просто меня просил выяснить на предмет соответствия, а моя профессия предполагает, так сказать, выяснение именно такого рода и так дальше. Ну, пройдемте.</p><p class="p1">Они вернулись в тридцать пятую комнату, прошли коридором и оказались перед стеклянной дверью в приемную босса. Секретарша лет сорока, из тех, что застали совок, но владеют и компом, одинаково готовы отсосать и спеть на корпоративе «Ой, мороз, мороз», вскочила, как на пружине, и поспешила в начальственный кабинет за черной кожаной дверью. Их уже ждали.</p><p class="p1">Рыбчинский оказался похожим на свой голос — огромным, бархатистым, сановитым; он носил золотые очки и галстук с рыбками. Вероятно, тут было ироническое снижение, намек на фамилию — не бойтесь, мол, я не так страшен. У него были крупные руки с рыжеватыми волосками на пальцах, светло-рыжие волосы, зачесанные на лысину, и длинные брылья.</p><p class="p1">— Здравствуйте, милостивый государь, — басил он, широко улыбаясь. — Виктор Максимович, если вы здесь, то, я так полагаю, вы совершенно удовлетворены первичным общением с Сергеем Владимировичем?</p><p class="p1">— Мы не ошиблись в Сергее Владимировиче, — кивнул Ферапонтов.</p><p class="p1">— Ну отлично, отлично. Дражайший Сергей Владимирович, мы обращаемся к вам потому, что самые лестные рекомендации, так сказать, ну и — вы понимаете. Дело чрезвычайно ответственное. Начну с того, что наша корпорация существует уже около десятилетия и занимается закупкой спортивного инвентаря, и до сего момента мы, так сказать, не имели нареканий…</p><p class="p1">Речь Рыбчинского журчала, кондишен был еле слышен, и эту рыбчащую речь Журчинского Свиридов плохинимал воспро. Требовалось встряхнуться, но до главного Рыбчинский еще не дожурчал, и Свиридов немного расслабился. Сквозь полудрему, враз сменившую болезненное напряжение, он понимал одно: Рыбчинский — большой жучило, и сейчас у него неприятности. В проклятые девяностые он воспользовался связями по первому месту работы, во Внешторге, и откусил большой кусок. Вдобавок он владел фехтовальным клубом, куда съезжались фехтовать первые лица, и располагался этот клуб в превосходном загородном помещении, где до этого, верите ли, была свалка, обычная свалка, а он культивировал, рекультивировал почву и сделал уголок земного рая для утомленных вершителей судеб. Однако теперь случилось так, что над Рыбчинским стали сгущаться определенные тучи. Его бизнес стал подвергаться проверке. Его покровители сделались уклончивы. Вдобавок брат крупного чиновника мэрии — вы понимаете, конечно, кого я имею в виду, — предъявляет свои права на этот участок, занимаясь прямой рейдерской атакой, насылая инспекции, провоцируя охрану и вообще, по сути, грабой прямеж, грабой! Естественно, Альберт Михайлович сохранял еще кое-какие связи вы понимаете где, в том числе и на самом верху, и там заручился поддержкой людей, вы понимаете, да-да. Но там в ответ намекнули, что Альберт Михайлович должен доказать, показать, не просто в финансовой форме, потому что, вы понимаете, в наше время эта форма уже не служит доказательством ничего. Но нужно доказать именно готовность и глубокое понимание происходящих процессов, и вообще как-то продемонстрировать даже не лояльность, но готовность, вы понимаете, я не могу говорить совершенно и окончательно, но определенным образом продемонстрировать.</p><p class="p1">Здесь Свиридов перестал что-либо понимать.</p><p class="p1">— Что именно я могу сделать? — спросил он наконец.</p><p class="p1">— Это деловой подход, — радостно кивнул Рыбчинский. — Мы тоже за деловой подход. Как вы понимаете, страна нуждается сегодня в национально ориентированной науке. И я думаю, что если приложу определенные усилия, то это и будет мой вклад, так сказать, в устроение. Я хотел бы преподнести сегодня России то, что от меня реально зависит, и поучаствовать в создании такого учебника истории, который мог бы читаться одновременно детьми и взрослыми, вы понимаете, как детские рассказы Ишимовой или недосягаемый образец Карамзина. Я хотел бы при помощи авторского коллектива получить такой учебник, который мог быть увлекательным чтением и вместе с тем примером правильного взгляда, в талантливом исполнении. Поэтому, — Рыбчинский широко улыбнулся, — я рассчитывал бы привлечь вас как автора и, оговорив соответствующее вознаграждение, заказать для начала концепцию на пяти-шести страницах, обсудив которую, мы могли бы и стартовать.</p><p class="p1">Свиридов перестал понимать, на каком он свете.</p><p class="p1">— Вы хотите заказать мне учебник истории? — спросил он.</p><p class="p1">— Да, да, совершенно так, — радуясь его понятливости, закивал Рыбчинский.</p><p class="p1">— Именно, — поддакнул Ферапонтов.</p><p class="p1">— Но я не историк, — сказал Свиридов. — Я никогда не писал учебников. Я не умею писать для детей.</p><p class="p1">— Это совершенно неважно, — приговаривал Рыбчинский. — Мы получили рекомендации… господин Антонова…</p><p class="p1">— Но я не помню господина Антонова!</p><p class="p1">— Ну, вы не работали непосредственно с ним. Он был одним из спонсоров мультипликационной серии «Сказки Горыныча»…</p><p class="p1">— Я писал диалоги для двух сказок, но это все детская ерунда, — продолжал отбояриваться Свиридов. — Поймите, это совершенно не то… Вы хоть смотрели «Горыныча»?</p><p class="p1">— Дорогой Сергей Владимирович, — прочувствованно сказал Рыбчинский. — Ваша скромность похвальна. Но мы знаем и главное. Мы знаем, что вы находитесь в том списке национально ориентированной элиты, который хорошо известен там, — он многозначительно поднял палец. — В этот список, как вы знаете, случайные люди попасть не могут, это совершенно, совершенно исключено. И потому, дорогой Сергей Владимирович, ваше участие исключительно важно, при вашем полном праве привлечь любого историка, которого вы сочтете достойным…</p><p class="p1">Это Свиридова добило. Таких сюрпризов список еще не преподносил ему.</p><p class="p1">— Вы уверены, что это список национально ориентированной элиты? — спросил он.</p><p class="p1">— В этом не может быть никакого сомнения.</p><p class="p1">— Я буду писать для вас, — твердо сказал Свиридов. — Черта, дьявола, учебник истории, хроники Нарнии… Сколько стоит синопсис?</p><p class="p1">— Что? — переспросил Рыбчинский.</p><p class="p1">— Проект учебника. Ну, эти пять страниц.</p><p class="p1">— Думаю, что три тысячи долларов в качестве стартовой цифры могли бы…</p><p class="p1">— Нормально, — сказал Свиридов. — Когда вам это нужно? Три недели есть?</p><p class="p1">— Желательно бы две, но в принципе…</p><p class="p1">— Нет, надо три. Это мне надо перечитать кучу всего. Я, конечно, национально ориентированная элита, но многого просто не помню. Ладно, благодарю вас. Можно последний вопрос?</p><p class="p1">— Да, конечно, — благосклонно кивнул Рыбчинский.</p><p class="p1">— Как вы узнали про список?</p><p class="p1">Рыбчинский улыбнулся еще шире и развел руками.</p><p class="p1">— Рассказали доверенные люди. Тоже там состоящие. В них, сами понимаете, я сомневаться не могу.</p><p class="p1">— Грандиозно, — сказал Свиридов. — Благодарю вас. Я позвоню вам через три недели.</p><p class="p1">Рыбчинский торжественно вручил ему визитную карточку твердого желтого картона с золотым тиснением, а Ферапонтов почтительно проводил до дверей.</p><p class="p1">Все это следовало обдумать. Обдумать, обговорить. Жаль, не с кем. Черт-те что. Уйти отсюда подальше и поскорей. На что я только что подписался? Господи, какой ерунды не сделаешь от счастья. Впрочем, они скорее всего не перезвонят… А если перезвонят, это заменит мне любой «Спецназ». Я напишу им учебник, что угодно. С чего они взяли про список национальной элиты? Впрочем, если действительно так…</p><p class="p1">Он чувствовал огромное, стыдное облегчение. Только что ощущать себя прокаженным — и вдруг понять, что это не проказа, а знак отличия, высокая болезнь мокрецов, дар передвигать предметы и думать туман! Поскорей сказать матери. Нет, рано. Он зашел в кофехаус и взял двойной эспрессо. Кофе всегда усиливает настроение, в котором его пьешь. Я стыдно счастлив — пускай он усиливает стыд и счастье.</p><p class="p1">У Али в это время разгар работы, но позвонить хотелось. Список национально ориентированной элиты, Боже правый. Она долго не брала трубку, наконец отозвалась.</p><p class="p1">— Алька. — Он еле сдерживал рвущийся из него счастливый хохот. — Ты знаешь, что это был за список?</p><p class="p1">— А ты еще про него помнишь?</p><p class="p1">— Что ты, как не помнить! Выясняются удивительные вещи. Это список национально ориентированной элиты, слышь.</p><p class="p1">— Да ну, — сказала она без энтузиазма.</p><p class="p1">— Я тебя ни от чего не отрываю?</p><p class="p1">— Отрываешь, но не страшно.</p><p class="p1">В трубке фоном шел детский надсадный крик.</p><p class="p1">— Да ни от чего я тебя не отрываю, ты вон по улице идешь, дети орут!</p><p class="p1">— Да, да. Но иду по делу.</p><p class="p1">— Короче, мне позвонил крутой экспортер спорттоваров и заказал за любые деньги правильный учебник российской истории. Чтобы за этот учебник его простили. На него наезжают сверху, так он для доказательства лояльности хочет учебник. Это дивная какая-то примета времени, я не читал ничего подобного.</p><p class="p1">— И ты согласился?</p><p class="p1">— Ну а чем я рискую? Он говорит, что у него в этом списке надежные люди, сплошь национально ориентированная элита. Я только думаю: что ж они меня за границу-то не выпускали? Не хотят, чтобы элита покидала нацию?</p><p class="p1">— Зря ты согласился, — сказала она. — У тебя не получится.</p><p class="p1">— Да я не буду ничего писать! Я просто думал, ты обрадуешься.</p><p class="p1">— Ну-ну, — сказала она. — Считай, обрадовалась. Что у тебя вечером — учебник пишешь?</p><p class="p1">— Да нет, меня зовет тут… какой-то девелопер, застройщик. Тоже небось учебник истории.</p><p class="p1">— Лучше бы в кино пошли, — сказала она.</p><p class="p1">— Ну, если не поздно отпустит…</p><p class="p1">— Ладно, звони.</p><p class="p1">Он заказал «Цезарь» и мгновенно его сожрал. Напротив сидела девушка старшеклассного возраста, одна, без друзей и подруг: читала что-то толстое, серьезное, жаль — некрасивая, можно было бы… Он замечал, как она украдкой взглядывает на него, отрываясь от книги, набирается решимости и улыбается. Свиридов улыбнулся в ответ. Она тут же отложила книгу и направилась к нему.</p><p class="p1">— Ой, простите, ради Бога. Никогда в кафе не пристаю. Вы Свиридов?</p><p class="p1">— Типа да.</p><p class="p1">— Я, понимаете, про вас читала в «Дне». «На дне». Вы такой герой прямо!</p><p class="p1">— Да что там, — небрежно сказал Свиридов.</p><p class="p1">— Нет, правда. У нас в институте ужасные вещи говорят про этот список.</p><p class="p1">Свиридов опять напрягся. Одного боярина при Грозном казнили, обливая то кипящей, то ледяной водой, и скоро кожа слезла с него, как чулок.</p><p class="p1">— В каком институте?</p><p class="p1">— В Академии права. Там у нас есть ребята, у них родители, понимаете, с самых верхов. Они говорят, что это список на что-то ужасное. Что чуть ли не публичные травли и все. А вы ничего не боитесь, сидите так запросто. Я думала, вы уже спрятались куда-нибудь.</p><p class="p1">— Ну куда же мне прятаться. — Он все еще держался. — А что за ребята, которые говорят?</p><p class="p1">— Да это… — Она отмахнулась. — Мажоры, их всегда полно. Не расспрашивать же. Ой, что я пугаю-то вас? Может, они врут все.</p><p class="p1">— Да вы присаживайтесь, — сказал Свиридов.</p><p class="p1">— Нет, нет, я побегу. Что же мне грузить вас? Вы просто знайте, что мы все следим. И очень восхищаемся.</p><p class="p1">— Чем восхищаться-то, девушка? Как вас зовут, кстати?</p><p class="p1">— Алена, но я же не для этого. Я не чтобы познакомиться, а то вы подумаете не знаю что. Я просто, чтобы вы знали. И держитесь.</p><p class="p1">— Продержусь, продержусь. Но вы хоть телефон оставьте!</p><p class="p1">Она смутилась.</p><p class="p1">— Нет, ну зачем… Я же не для того, чтобы…</p><p class="p1">— Ну и я не для того, чтобы. А просто — вдруг в кино пойти.</p><p class="p1">Она колебалась.</p><p class="p1">— Ой, нет, знаете… Это вам же лучше. Не надо.</p><p class="p1">Она все-таки боится, понял он. Она боится человека из списка. Подойти, выразить сочувствие — это пожалуйста, но дать телефон — уже заразиться.</p><p class="p1">— Ну ладно, — сказал Свиридов. — Бегите, учите право.</p><p class="p1">— Да, да, — сказала она с огромным облегчением, таким же стыдным, как его собственный поросячий визг полчаса назад. — Да, спасибо. Пока.</p><p class="p1">И она убежала, а Свиридов заказал сто грамм. Вот тебе и национально ориентированная элита. Он просто понял, что я в списке, а значит, выхода у меня нет. И теперь я напишу ему национально ориентированный учебник, а он заплатит мне, как негру. Погоди же, будет тебе учебник, такой учебник, что у тебя после него отберут все фехтование вчистую. Что ж это за страна стала, Господи Боже мой, у всех жижа внутри. Не урод же я, в конце концов, не старик, — что же она, дрянь такая, бежит, как от заразы? Да я и есть прокаженный, хватит иллюзий.</p><p class="p1">В эту секунду зазвонил мобильник.</p><p class="p1">— Але, — требовательно сказал мужской голос. — Ломакин Валя.</p><p class="p1">— Слушаю, — кисло ответил Свиридов.</p><p class="p1">— Кофеек попиваем?</p><p class="p1">Свиридов опешил.</p><p class="p1">— Ты тут, что ли?</p><p class="p1">Ломакин захохотал.</p><p class="p1">— Суперприбор! — воскликнул он. — Пеленгонавигатор Гэ-три, на российских спутниках, последняя модель. В серийную продажу пойдет с января, а я уже. Я квартал для ФАПСИ строю, на Черкизовском, вместо рынка. Звоню тебе и вижу: ты на метро «Аэропорт» в кофехаусе, говенном, но с вай-фаем. Через двадцать минут тебя отсюда заберут, никуда не уходи. Если уйдешь, все равно найду, — он опять расхохотался и отключился.</p><p class="p1">За что столько внимания одному сценаристу? Совсем уже больше никого не осталось — пеленговать?</p><p class="p1">Черная шестая «ауди» приехала через четверть часа. Свиридов курил перед входом в кофехаус. Шофер выскочил и распахнул перед ним заднюю дверцу. За все время пути — минут десять по третьему кольцу — он не проронил ни слова. Неслись быстро, бесшумно и нагло.</p><p class="p1">Свиридов никогда еще не был около Байтового моста близ МКАДа. Сооружение было грандиозное, в неоимперском нанотехнологическом стиле. Впоследствии много перьев было искусано в попытке дать определение этой стилистике, внушительной и беспомощной одновременно: все сооружения зрелых нулевых были исполнены кричащей роскоши, словно настаивающей «У нас есть еще!», но при этом вызывающе нефункциональны, даром что прагматизм провозглашался знаменем эпохи. Высшим прагматизмом была именно нефункциональность, страстное стремление убедить всех, что они на многое готовы для угождения незримому божеству, ставившему преданность выше всякой пользы. Байтовый мост был выше, толще, шире, чем надо; на вершинах башен располагались смотровые площадки. Несмотря на всю эту избыточность, он выглядел неуклюже и, главное, фальшиво: в нем была обреченность — не на падение, не на аварию, Боже упаси, а на запоздалые издевательства потомков. Справа от въезда на мост высился тридцатиэтажный недострой — один из верхних этажей был ярко освещен, и там, видимо, начиналось празднество. Свиридов снизу слышал, что живой оркестр играет классику. Гостей подводили к подъемникам, вручали каски и доставляли наверх. Шофер, высадив Свиридова, отъехал за очередным гостем, а сценариста уже приняла в заботливые руки девичья обслуга модельного вида: девушки тоже были бессмысленно длинные, тупо роскошные, безголово технологичные — словом, нанотехнологические, при всех своих мегаразмерах. Нанотехнологический подъемник вознес Свиридова в вечереющую синь, откуда наномуравейник Москвы казался уютным безобидным хаосом.</p><p class="p1">Свиридов, разумеется, бывал на вечеринках, но впервые его занесло так во всех отношениях высоко. Кто-то ему кивал, кого-то он узнавал, но понять, что делают вместе все эти люди, было категорически невозможно. Должно быть, для делового сообщества, кучковавшегося по углам, во всем этом был смысл — договориться, перетереть, засветиться, — но лица у всех были потерянные; действительно серьезные люди не тусовались. Все старательно изображали движуху, то есть двигались в разных направлениях, бешено целовались, громко хохотали, — во всем наверняка был смысл, план и дресс-код (Свиридов демонстративно явился в ковбойке, не в смокинге же было ехать в Серебряный Бор), но для стороннего наблюдателя картина содержала не больше смысла, чем шахматный турнир для дикаря или дикарская пляска для шахматиста. Разве что шахматист смотрит с доброжелательным любопытством, а дикарь с застарелой ненавистью, но это не потому, что он лучше, а потому, что проще.</p><p class="p1">Свиридов перемещался среди визгливых и целующихся девушек, ел с подносов что-то очень диетическое, хрустящее, без всякого вкуса, пил кислое шампанское — вероятно, исключительно дорогое, — и категорически не понимал, зачем он здесь. Тут пронеслись охи, ахи, пахнуло, кажется, серой, — и прямо на него у всех на глазах решительно надвинулся огромный Ломакин, вышедший из тайной двери или спустившийся на незримом подъемнике. Он направился именно к Свиридову, обхватил его тесным объятием и под восхищенными взглядами присутствующих увлек в тайный закоулок. Там стоял низкий столик с фруктами и шампанским. Ломакин извлек из кармана пульт, щелкнул им, и из стен выплыли два дивана.</p><p class="p1">— Умный дом, — сказал девелопер. — Тут у меня пока кабинет. Потом будет на семидесятом, но это года через полтора.</p><p class="p1">Свиридов солидно кивнул, словно повидал уже немало умных домов, но этот был, конечно, самым умным.</p><p class="p1">— Как-то скучно все, — сказал Ломакин. — Все могу.</p><p class="p1">Свиридов опять кивнул, словно уже успел в этом удостовериться. Таких людей, как Валя, было много в то время. Когда с ними наконец случилось то, что случилось, — они так и не успели ничего понять и, кажется, даже обрадовались: наконец им выпало то, чего они не могли обеспечить себе сами, — согласитесь, когда самого себя запираешь без еды на необитаемом острове, это далеко не тот экстрим.</p><p class="p1">— За истекший период корпорация «Форекс» застроила три миллиона квадратных метров, — сказал Ломакин. — Мы применяем такие технологии строительства, каких больше никто.</p><p class="p1">Свиридов уже выслушал сегодня отчет о бизнес-успехах Рыбчинского и приготовился скучать. Он не понимал, почему все эти люди постоянно отчитываются перед ним. Ему еще не хватало чуйки допереть, что они отчитываются не перед ним, а перед кем попало, надеясь отвратить от себя грядущий удар, которого ждали все. Когда подворачивался под руку сценарист, годился и он. — За пять лет мы выросли с малого предприятия до лидера европейского высокотехнологичного строительства. В наших планах — строительство вращающегося дома в Москве, который будет изменять конфигурацию по воле ветра, — продолжал Ломакин.</p><p class="p1">— Там будет размещаться правительство? — спросил Свиридов. — Или главные СМИ?</p><p class="p1">Ломакин натужливо захохотал.</p><p class="p1">— Вижу, малый ты быстрый, — сказал он. — Могу все. Был в джунглях, прорубал там путь себе и парням, — прорубил. Готовлюсь теперь к полету в космос. Пишу книгу «Как стать мной». Но это все не то, ты понимаешь?</p><p class="p1">— Можно вложиться в кино, — осторожно предложил Свиридов.</p><p class="p1">— Во! — воскликнул Ломакин. — И я хочу, чтобы ты написал такое кино. Но!</p><p class="p1">— Почему именно я? — спросил Свиридов. — Сценаристов много.</p><p class="p1">— А ты не хочешь?</p><p class="p1">— Нет, хочу, но мне надо сначала понимать, почему я…</p><p class="p1">— Потому что, — Ломакин подмигнул. — Потому что мне докладывали, что ты знаком с Лалой Графовой.</p><p class="p1">Свиридов действительно был знаком с Лалой Графовой и даже более того. Она была необыкновенно хороша — бывает душа не по телу, а тут тело не по душе, умное, невзрослеющее, горячее тело нимфетки, кемеровское происхождение, непроходимая тупость, ни намека на душевный аналог той волшебной телесной чуткости, с какой она отзывалась на любые желания; но Свиридов был бесперспективен и вдобавок поймал ее на многократном вранье. Теперь эта идиотка давно снималась в Голливуде в бессловесных ролях официанток русских мафиозных ресторанов. Было удивительно, что Ломакин помнил Лалу Графову.</p><p class="p1">— Я ее видел в «Серебряной пыли», — сказал девелопер доверительно. — И я тогда себе сказал: будет день, когда Лала Графова сыграет у меня в картине, и я буду спонсором этой картины, и у меня будет там роль. Я хочу, чтобы ты написал сценарий для Лалы Графовой и привез Лалу Графову. Мне говорили, она к тебе поедет.</p><p class="p1">— Это было тыщу лет назад, — сказал Свиридов, — и она давно в Штатах.</p><p class="p1">— Знаю, — сказал Ломакин. — Мне ее там уже нашли. И с ней были переговоры. И она сказала, что если напишет Свиридов, то она поедет.</p><p class="p1">Тут до Свиридова дошло, и он осознал всю меру коварства Лалы Графовой. Лала помнила о нем, и о том, как он выставил ее из своей квартиры за блядство и ложь, и теперь хотела отдаваться Ломакину на глазах у Свиридова, а Свиридов чтобы переписывал ее монологи по первому требованию. Требований, понял Свиридов, будет много.</p><p class="p1">— Вообще-то я не буду больше работать с Лалой Графовой, — сказал он гордо.</p><p class="p1">— Будешь, — спокойно произнес Ломакин. — Это обязательно.</p><p class="p1">Неожиданно Свиридова осенило.</p><p class="p1">— Слышь, Валя, — сказал он. — Говоришь, все можешь?</p><p class="p1">— Все, — подтвердил Валя, не добавив ни «почти», ни «практически».</p><p class="p1">— Ну тогда смотри, — убедительно сказал Свиридов. — Я готов с тобой работать и писать для Лалы Графовой что угодно. Я напишу тебе крутую роль с продакт-плейсмен-том твоего девелопмента. Я даже не возьму с тебя особенно много денег. Но у меня к тебе большая, серьезная просьба. Я попал в непонятное, Валя. Я попал в какой-то список. Одни говорят мне, что это список национальной элиты, а другие — что список врагов народа. Если ты можешь все, убери меня из этого списка, и я буду работать на тебя бесплатно.</p><p class="p1">— Принято, — кивнул Валя. — Это два звонка. Или один. При тебе позвонить?</p><p class="p1">— Нет, пожалуйста, не надо. Как-нибудь без меня. Но если сможешь, я тебе буду реально благодарен.</p><p class="p1">— Хорошо, — сказал Ломакин. — Но пойми такую вещь. Чтобы налить в стакан, надо отлить из стакана, это пятое правило Ломакина. Знаешь четыре первых правила Ломакина?</p><p class="p1">— Не знаю, — сокрушенно ответил Свиридов, как будто ему не терпелось узнать правила Ломакина. Валя извлек из кармана белых широких шелковых штанов черную узкую брошюру «Кодекс «Форекса»».</p><p class="p1">— Это у меня знают все, от совета директоров до уборщицы. Разбуди их ночью, и они расскажут кодекс «Форекса». Я скажу тебе, Серый, а ты отразишь. Пойми, я не могу играть просто так. Это не должен быть супермен, потому что супермен ни хуя бы не построил того, что строю я. Это должен быть герой, который растет телескопически. Ты знаешь, какое здание «Газпрома» я буду строить в Нижнем Новгороде?</p><p class="p1">— Не слышал.</p><p class="p1">— Еще никто не слышал, — торжественно сказал Валя. — Это эксклюзивный проект. Такого нет нигде в мире. Он будет отражать цены на газ. Башня будет расти, выдвигаясь телескопически. Если цена упадет, башня сложится. Но цена долго не упадет.</p><p class="p1">— А если изобретут альтернативное топливо, — сказал Свиридов, — башня провалится, так?</p><p class="p1">Ломакин захохотал.</p><p class="p1">— Скорость есть, — сказал он снисходительно. — Запомни, Серый: первое правило Ломакина — скорость. Второе — быстрота. Скорость и быстрота — совершенно не одно и то же. Скорость — это стремительность действий, а быстрота — это оперативное принятие решений. Третье правило — натиск. Четвертое — чуйка, потому что без чуйки не может быть ничего. Если ты не чуешь, что сейчас в тебя ударит метеорит, ты не можешь заниматься бизнесом. И ты не будешь им заниматься. Я стою здесь с тобой и чую, что у меня в Эмиратах на строительстве башни «Мачта» сейчас заболел рабочий. Проверим? — Он достал коммуникатор и быстро что-то набрал. — Олег? Приветствую. У тебя заболел там человек на стройке? Насморк? Скажи, что я звонил и что советую фервекс. Фервекс. Да. Да, у нас все в порядке. Будь здоров.</p><p class="p1">Он посмотрел на Свиридова, как Бог, только что на его глазах отделивший свет от тьмы и попутно мизинцем отщелкнувший падшего ангела, все норовившего их смешать. Свиридов понял, что ему будет о чем писать сценарий. Правда, он вряд ли понравится Вале Ломакину и его чуйке.</p><p class="p1">— Но главное, — продолжал Ломакин, — это быть открытым новому. Понимаешь? Пятое правило — надо отлить из стакана, чтобы долить туда еще. И я хочу, чтобы ты вылил из своей жизни все лишнее, чтобы залить туда «Форекс» и меня. Ты будешь летать со мной на медвежью охоту. Ты будешь у меня на совете директоров. Ты полетишь в мой вьетнамский отель.</p><p class="p1">— С девушкой можно? — быстро спросил Свиридов.</p><p class="p1">— Нельзя, — отрезал Ломакин. — Ты должен думать о сценарии, а не о девушке. Если приспичит, мы тебе там купим.</p><p class="p1">— Хорошо, — кивнул Свиридов.</p><p class="p1">— Ты должен будешь забыть все, что знаешь. Ты должен будешь привыкнуть к другому масштабу людей. Ты должен будешь увидеть таких людей, каких не видел еще никогда. Это должна быть… сага, понял? Видишь, я стараюсь быть понятым. И я надеюсь быть понятым.</p><p class="p1">Свиридов понял, что Ломакин выучил слово «сага» — вероятно, прочел в Интернете применительно к «Команде».</p><p class="p1">— А почему ты сам не хочешь написать? — вкрадчиво спросил он. — Мне кажется, у тебя бы получилось.</p><p class="p1">Ломакин кивнул.</p><p class="p1">— У меня проблемы были в школе с русским языком, — сказал он. — Тройки еле натягивали. Это потому, что я думаю быстрей, чем пишу. Троечники лучше успевают в бизнесе. Отличники думают, что все уже знают, а у троечника есть стимул расти. Отличник полон, как стакан, и не умеет отлить. Я набросал тебе тут для сценария, ты распишешь потом. Вот.</p><p class="p1">Ломакин нажал кнопку на коммуникаторе. Вбежал подобострастно согнувшийся клерк с папочкой, словно дожидавшийся под дверью.</p><p class="p1">— Читай, — сказал Ломакин. Он любил скорость.</p><p class="p1">В папке был один листок с тремя абзацами текста. Свиридов пробежал первый: «Взлет! Сверх сверх сверх и еще. Пять правил — пять основ на которых стоит. Чуйка! Но отлить. Жаль бросить — чемодан без ручки. Напор? Но осмыслить! Буллит в хоккее. Один из 16, много из 15. Вторых нет. Стремления мало. Но без стремления нигде. Протуберанцы. Было в Малайзии чуть не погиб встречный ветер 37 км/час, выплыл потому что напор. И с женщинами так но не так. Разлет бровей. Нужна одна но такая чтобы готова все, везде. Иначе дерьмо. Полное понимание! Границ нет. Когда-нибудь космос».</p><p class="p1">Свиридов представил монолог, который напишет главному герою, и еле удержался от счастливого хохота. Пусть вытащит меня из списка, и будет ему суперсупер.</p><p class="p1">— Я понял, — кивнул он. — С этим можно работать. Правда, не сразу, у меня сейчас еще одна работа, — он вспомнил об учебнике.</p><p class="p1">— Есть площадка, — сказал Ломакин. — Такая — закачаешься. Здесь, в Москве. Один мудак держит фехтовательный клуб, но это я дожму. Ему мало там осталось фехтовать. Там будет парк развлечений — Диснейленд сосет. Такого нет нигде, ни в Дубаях, ни в Шанхае. Это будет колесо обозрения выше Останкина. Я хочу сцену на колесе обозрения, и еще там будут американские горки. Мы должны вернуть им название. Американцы же их называют «русские горки», ты в курсе? После этого все будут называть их только «русские горки».</p><p class="p1">Русские горки, да. Не завидую я Рыбчинскому, подумал Свиридов. Это значит, кажется, что мне не придется писать национально ориентированный учебник. Жаль, что я не взял у него аванс. Но у этого парня действительно чуйка. Не успел я подумать про Рыбчинского, как он тут же открыл мне его участь. Как хорошо, что я был дитя в девяностые и не успел отгрызть себе фехтовальный клуб. Сейчас бы мне пришлось много, много отлить, и еще вопрос, простили бы или съели.</p><p class="p1">— Иди сейчас, — сказал Ломакин. Он отпускал его милостиво, с пониманием: великого не должно быть слишком много.</p><p class="p1">Свиридов вышел на этаж, прихватив яблоко. Парти шло своим чередом: две абсолютно голые девушки с крыльями из гусиных перьев вели благотворительный аукцион в пользу детей, больных раком крови. Фотографии лысых детей проецировались непосредственно на тела ведущих. Чтобы дать более наглядное представление о раке крови, разносили «Кровавую Мэри» и раков. Элита распродавала вручную изготовленных пластилиновых ангелов.</p><p class="p1">— Еще одна спасенная жизнь! — голосил незримый Андрей Малахов.</p><p class="p1">Свиридов потусовался еще минут десять, набираясь впечатлений, и прошел к подъемнику. Внизу он долго путался в хаосе досок и балок, прежде чем нашел дырку в заборе. Ауди возле дырки не было: вероятно, он пропустил правильный выход. Пришлось ловить машину, машин не было, он блуждал среди выселенных, обреченных на снос пятиэтажек, среди призраков прежней Москвы, сносимой теперь целыми кварталами, и вспоминал, как среди таких же домов возвращался из школы. Чему и зачем его там учили? Иногда в старых училках, повторявших никому не нужные прописи, он чувствовал обреченность: сегодня вы нас ненавидите, как бы говорили они, а завтра мы ни от чего не сможем вас спасти. Как быстро и бесследно исчезло все, чему они учили, как это удивительно.</p><p class="p1">Он поймал наконец машину с пожилым водителем-кавказцем, всю дорогу жаловавшимся на дороговизну бензина в надежде, что Свиридов прибавит. Они уже подъезжали к Профсоюзной, когда зачирикал мобильник.</p><p class="p1">— Здорово, — сказал грустный густой голос, в котором Свиридов не сразу узнал ломакинский. — По Нахимовскому едешь?</p><p class="p1">— Типа того. Я на Профсоюзной живу.</p><p class="p1">— Хороший район, застройка только плохая, — сказал Ломакин и замолчал надолго. Свиридов испугался, что сейчас его развернут и отправят назад — выслушивать шестое правило кодекса «Форекса». Это было в Валином духе.</p><p class="p1">— Ты извини, — сказал Ломакин. — Есть мне куда расти.</p><p class="p1">— В смысле?</p><p class="p1">— В смысле не все могу. Я не могу тебя убрать из списка. В голосе Ломакина Свиридов уловил то ли покаянные, то ли, страшно подумать, уважительные нотки. Не быть мне частью элиты, не есть раков с кровью. Что же ты, Ломакин, куда же это я попал, Ломакин…</p><p class="p1">— Никак-никак? — спросил Свиридов.</p><p class="p1">— Никак, — просто ответил Валя. — Извини. Ну и, соответственно, сценарий не нужно. Я скажу Лале.</p><p class="p1">— Да уж понятно.</p><p class="p1">— Просто, понимаешь, — сказал Валя. — Раз такой список, то я, наверное, не смогу тебя возить везде, и вообще не пропустят.</p><p class="p1">— А что за список-то? — спросил Свиридов.</p><p class="p1">— Если бы сказали, — сказал Валя, — тогда бы я что-то мог. Но они не говорят. Бывай.</p><p class="p1">Свиридов расплатился и вышел из машины. Он чувствовал странный покой, почти блаженство. Все было правильно. Удивительно, как Господь теперь управляет его судьбой: не надо писать ни учебник, ни сценарий. Правда, авансов тоже не дали, но это и к лучшему. Хорошо побывать за день в двух взаимоисключающих, вдобавок враждующих и одинаково чужих сферах — и понять, что ни в одной из них ты не нужен.</p><p class="p1">Русские горки, да. Зато он знал теперь, о чем написать первую колонку для Тэссы. Славное у нас ремесло — когда нельзя жить, есть о чем писать, и наоборот.</p><p class="subtitle">8</p><p class="p1">В киноцентре «Октябрь» Свиридова ждал такой сюрприз, что все предыдущие показались с овчинку. На круглый стол «В едином строю» были полносоставно приглашены списанные.</p><p class="p1">Уже у входа, перед рамкой, он обнаружил Бодрову и в первый момент не поверил глазам. Ладно, Бодрова — совпадение, но на подходе уже щебетала Светлана Лачинская, которую Бодрова ему тут же и представила: двадцать пять, блондинка, вообще у нас преобладают белокурые, джентльмены предпочитают блондинок. Все были радостно возбуждены, словно их позвали не на посиделки престарелых малют, а на предпремьерный показ заранее нашумевшей мелодрамы с хорошим концом. Досмотр гостей был на сей раз особенно пристален. Свиридов пожимал чьи-то руки, отвечал на приветствия, растерянно улыбался и, страшно сказать, радовался: он был среди своих. Это было порочно, позорно, неправильно, он не должен был считать их своими, если хотел вырваться из лепрозория, — но с первым побуждением ничего не поделаешь: несчастные были приятны ему. В некотором смысле у него не было теперь никого ближе.</p><p class="p1">— Ну, как вы это объясняете? — на правах старого друга спросил он Клементьева.</p><p class="p1">— Никак не объясняю. Хочу посмотреть, что будет.</p><p class="p1">— А не может это быть акцией по всеобщему аресту? Если человека приглашают на встречу со спецслужбами, он и сам может смекнуть…</p><p class="p1">— Непохоже. Смысла нет. Всех, скопом, на виду у города, в «Октябре»? Я понимаю, если бы клуб имени Сидорова на метро «Текстильщики», но это ведь…</p><p class="p1">— Я знаете что думаю? — подключился маленький, лысый, подвижный, явный сефард с обезьяньими благожелательными чертами; на пикнике Свиридов его не видел. — Мне все-таки кажется, что это, так сказать, начало воспитательного процесса, что они наметили целый ряд таких мероприятий в рамках нашего приведения к какому-то знаменателю…</p><p class="p1">— Очень может быть, — серьезно кивнул Клементьев. — Выбрали и воспитывают.</p><p class="p1">— Заметьте, — продолжал лысый, — это первая за все время акция. Первый контакт с нами с момента составления списка.</p><p class="p1">— Ну откуда вы знаете, — усомнился Свиридов. — Может, пикник тоже их инициатива.</p><p class="p1">— Непохоже. Что ж, Вулых из них?</p><p class="p1">— Да зачем Вулыху быть из них. Позвонили, сказали: через неделю все на вашей даче проводим пикник. Возражения? Никак нет. Ну и позвал к себе всех.</p><p class="p1">— Интересный у вас план получается, — сказал красивый молодой человек, явно из хорошей семьи, таких полно в РГГУ; его аристократизм выражался не в надменности, а в трогательной домашности, и всем своим видом он как бы просил гегемонов простить его за мягкость и утонченность манер, балансирующую уже на грани гомосексуальности. Такой взгляд вырабатывался у этой прослойки на протяжении трех поколений. — Вы думаете, они будут сочетать трудовое воспитание с пропагандой?</p><p class="p1">— Ну а кто помешает. — Свиридов немедленно почувствовал расположение к молодому человеку, ибо тот был куда беспомощней самого Свиридова. Фамилия мальчика-тюльпанчика была Сальников, вот никогда бы не подумал, глядя в список: такому надо что-нибудь вроде Голенищев-Кутузов. — Если допустить, что этот список не единственный, тогда вообще хорошо выходит: наша воспитательная программа — копать на дачах и слушать ветеранов. А еще кому-нибудь — пешие походы и лекции о международном положении. Тогда получается, что они так мобилизуют страну.</p><p class="p1">— А почему нам ветеранов? — улыбнулся Клементьев.</p><p class="p1">— Наверное, для реальных силовиков мы слишком лояльны, их бросают на какую-нибудь молодежь.</p><p class="p1">— А что? — сказал стоявший поблизости угрюмый черноволосый тип, ростом повыше Свиридова. — Вполне себе версия. Мы ж люди безобидные, так? Нам сказали — мы пришли. Меня, кстати, Григорием зовут, Григорий Абрамов.</p><p class="empty-line"/><p class="p1">В списке уже общались запросто, знакомились и включались в чужие разговоры без церемоний. Все поспешно представились: сефард оказался Аркадием Липским, режиссером эстрадных представлений, Абрамов служил в автосервисе, а беспомощного юношу звали Данилой, и работал он редактором в «Бессоннице».</p><p class="p1">— Непохоже, — усомнился Клементьев. — Я все-таки думаю, что это их первая попытка всех собрать и, что ли, сагитировать… Знаете, как ветерана приглашают к призывникам.</p><p class="p1">— И нас всех хотят рекрутировать туда? — не поверил Свиридов.</p><p class="p1">— Очень может быть.</p><p class="p1">— Не выпить ли для храбрости? — предложил Липский.</p><p class="p1">— Ни в коем случае, — резко отказался Клементьев. — И вам не советую. После — сколько угодно.</p><p class="p1">Свиридов обратил внимание на человека, которого хорошо знал в лицо, видел на нескольких премьерах, но представлен не был. Это был обозреватель какого-то FM — здесь же, в «Октябре», они пересекались раз десять и даже мимолетно кивали друг другу; странно было, что он тоже загремел в список — хотя мог находиться тут и по своим делам: не явился же он на дачу к Вулыху. В прочих залах шло кино, жизнь продолжалась, пока прокаженные прослушивали свою спецпропаганду. Свиридов все-таки решил подойти.</p><p class="p1">— Сережа! — обрадовался журналист. Ему было под пятьдесят, подвижное обезьянье лицо, шкиперская бородка. — Я все смотрю на вас и думаю — вы, не вы?</p><p class="p1">— Что, переменился?</p><p class="p1">— Да нет, просто что вам тут делать…</p><p class="p1">— Я по списку.</p><p class="p1">— Вона! — Журналист откровенно обрадовался. — И вас загребли?</p><p class="p1">— Ну, я пока еще не очень понял, куда… Простите ради бога, я не помню, как вас…</p><p class="p1">— Андрей Волошин меня зовут, — »Столица-FM». Я еще на «Свободе» рассказывал про одну картину вашу, помните? Ну эту, где он просил-просил другой глобус и получил…</p><p class="p1">— А, мультик. — Свиридов сочинил его когда-то для Туркоса, между делом. Получилось смешно, нестыдно, они думали даже запузырить серию, но умер Татарский, и проект прекратился. — Там Леша больше придумал, чем я…</p><p class="p1">— Хорошая была история. Ну и что вы думаете про все это?</p><p class="p1">— Да я надеялся, вы мне сами сейчас расскажете…</p><p class="p1">— Подождите, надо посмотреть, что они нам тут расскажут. Я сначала думал — это идеальная модель общества, всякой твари по паре. Но что-то много киношников на сто восемьдесят человек, не находите? Значит, наверное, вякнули где-то что-то…</p><p class="p1">— Ну вы хоть вякнуть можете — там, на «Столице». А я-то где?</p><p class="p1">— Мало ли, в разговоре, по телефону.</p><p class="p1">— А, бросьте. Хотя вам положено, вы же за свободу…</p><p class="p1">— А вы нет? — мгновенно посерьезнел Волошин.</p><p class="p1">— Да и я за свободу, — успокоил Свиридов, — только кто ж ее когда видел…</p></span>
