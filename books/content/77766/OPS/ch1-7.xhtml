<span><p class="p1">Отец Свиридова пропал без вести в девяносто пятом году. Таких историй было тогда много. Весь девяносто пятый год выпал из жизни Свиридова, он и теперь, одиннадцать лет спустя, старался его не вспоминать. В реальности появились дыры, и люди проваливались в них сплошь и рядом. У свиридовской однокурсницы в девяносто восьмом так же необъяснимо исчез жених, а до того, в девяносто третьем, у одноклассницы пропал старший брат, но он хоть штурмовал «Останкино» в ополчении Макашова, а жених однокурсницы разругался с партнером по бизнесу: у всех были причины исчезнуть, а у отца никаких. И самое страшное, что Свиридов весь год ждал чего-то подобного — обостренная ли интуиция была виновата, сам ли он себе задним числом внушил, что к тому давно шло, но отец исчезал постепенно, становясь все прозрачней, все необязательней. В институте его сократили за год до исчезновения, бомбить на «москвиче» он не отваживался — водителей тогда грабили за здорово живешь, да и водил он так себе. Сокращение, а до того безденежье капитально выбили его из колеи. Из доброжелательного интеллигента, каких много, он превратился в дерганого, пуганого, хрупкого старика, стал путаться в словах, не мог изложить элементарную жалобу на здоровье, даже заикался временами; тогда Свиридову казалось, что это был стресс, но потом задним числом он понял, что так начиналась болезнь. Никто в семье не предположил, что с отцом может случиться такое, и вдобавок все были заняты собой: старшая сестра Людмила давно жила с мужем, заезжала по праздникам и без особой охоты, потому что дома было плохо, бедно, тревожно, и Свиридов на нее не сердился. Сердилась мать, вечно упрекавшая всех в эгоизме, — у нее и отец был эгоист, хотя весь последний год он только и делал, что неумело хлопотал по хозяйству, повязывая идиотский фартук, стыдясь вынужденного бездействия. Ничего, кроме своего мостостроительства, он не умел, вписаться в новые времена не мог, а от тогдашних авантюр вроде шуб-туров в Грецию или челночничества в Польшу его удерживал чересчур наглядный опыт калугинского разорения: сосед по съемной даче Калугин лишился на российской границе всех шуб, а потом на Черкизовском сгорел ларек его работодательницы, и за двухмесячное челночничество ему тоже никто не заплатил. Выживать и барахтаться стоило не ради денег, которых все равно было не сколотить, — а ради занятости, состояния при деле: барахтаемся, сбиваем масло… Свиридов с самого начала знал, что приспосабливаться бессмысленно: зарабатывать в бизнесе, как он сложился тут, могут только люди особого склада, другим лучше не соваться и работать по профессии, пока дают. А вытеснят — ждать нового шанса, не торгуя дачными огурцами, не покупая место на вещевом рынке в Лужниках и не пытаясь перепродать с автолавки китайский ширпотреб. Отец тоже это понимал, и Свиридов радовался, что он не суетится. Впрочем, суетиться он и не мог — его сил едва хватало подмести и что-то сготовить. На сына он смотрел виновато, стыдясь бесполезности, время от времени заводя разговор о том, что не может обеспечить семью, и морщась, когда Свиридов с неуклюжей горячностью его утешал. На жизнь им хватало — мать отрабатывала две ставки, специалисты ее класса ценились, родная поликлиника МПС, прежде закрытая для посторонних, завела платное отделение, — но дело было не в деньгах, и отец сникал, ветшал, истончался. Один раз он вышел за сигаретами и вдруг забыл, в какой стороне дом: стоял посреди проспекта и стеснялся попросить помощи, потом так же внезапно вспомнил. С исчезновением его до сих пор все было непонятно. Свиридов знал, что его нельзя выпускать одного, и мать наверняка чувствовала, что все эти провалы в памяти не просто так, но, как многие врачи, суеверно боялась лечить своих, да и сама никогда не обследовалась. Может, врачам видней, что несерьезное пройдет само, а серьезное лечить бесполезно. У всех словно опустились руки. Свиридов боялся сказать себе, что отцу позволили исчезнуть. Хотел ли этого он сам — тоже не разберешь: самое странное, что в тот день, шестого сентября, его видели двое, знакомый и незнакомый, и оба позвонили по объявлению, но эти показания лишь окончательно все запутали. Давний приятель, вместе ездили когда-то на машинах в Прибалтику, заметил его в пивной на проспекте Мира — далеко от дома (они жили на Вернадского), днем, в компании тихих алкашей. Отец узнал приятеля, рассеянно кивнул, перебросились незначащими вопросами. Он сроду не пил в незнакомых компаниях, тем более днем. Другой свидетель, вполне посторонний, узнал отца по фотографии — он видел его в электричке Савеловского направления. (С какой стати его понесло на эту электричку? Своей дачи не было, у единственных друзей дома Еремеевых, пять лет назад уехавших к сыну в Испанию, был участок по Курской.) Разве что шел по проспекту Мира, свернул на Сущевку, дошел до Савеловского — не понимая, где он и что с ним? Был, впрочем, крошечный шанс, что он просто сбежал от семьи, ушел туда, где жена и сын не отягощали его совесть вечным напоминанием о бедности и неустроенности, и живет теперь у провинциальной медсестры, колет дрова, воспитывает ее сына от первого брака, — но в эту жалкую идиллию Свиридов не верил ни секунды. Он все-таки знал отца.</p><p class="p1">Менты ничего не делали, да у Свиридова с матерью и не было рычагов, чтобы заставить их шевелиться. Тут молодые, здоровые исчезали каждый день, чтобы обнаружиться по весне в лесополосе, — кому было дело до явно рехнувшегося старика? «Альцгеймер», сказала тогда мать, я должна была давно понять по этой эмоциональной глухоте, по желанию свернуться калачиком, забиться в темноту, но пойми, я боялась даже допускать эту возможность; Свиридов понимал. Они обзванивали больницы, расклеивали объявления по Савеловской ветке — все напрасно, и Свиридов с особенным вниманием изучал истории внезапной амнезии, когда житель Владивостока вдруг обнаруживался в Таганроге, раздетый, обобранный, ничего не помнящий. Из таких историй у него получилась потом «Крыша»: их было удивительно много, больше полусотни, и во всех жертвами оказывались мужчины средних лет, отцы семейств, внезапно исхищенные из обыденности и лишенные памяти.</p><p class="p1">Ужасней всего было представлять, что отец и теперь бродит по Подмосковью, а то и по стране, ночует где придется, просит милостыни, сидит в провинциальной психушке, работает на страшной плантации — и все морщится, все ловит за хвост ускользающую мысль. Хотя, конечно, его давно сбросили с какого-нибудь ночного поезда, или убили на вокзале, или обобрали безжалостные беспризорники, или сам он замерз в ноябре, когда ударили внезапные бесснежные холода. Куда срывались вдруг эти сорокалетние отцы семейств, потрясенные внезапным озарением вроде того, что все напрасно? Отцу, правда, было под шестьдесят. Мать с того сентября год не спала по ночам, не выпускала Свиридова из дома после девяти вечера, изводила его и себя упреками — Свиридов потому и не съезжал из дома до двадцати пяти лет, что боялся оставить ее одну, и теперь навещал по два раза в неделю, благо близко.</p><p class="p1">Если бы отец умер от болезни или несчастного случая, Свиридов вспоминал бы о нем только с тоской и любовью, но он исчез так необъяснимо, что всякая мысль о нем сопровождалась ужасом, до сих пор не притупившимся. Этот ужас был острей любви, резче тоски, неизлечимей скорби: отца проглотило подпочвенное, вечно роящееся внизу и вдруг вырвавшееся наружу. Шел, шел и заблудился в измерениях, провалился в щель, выпал из жизни и не смог вернуться; и то, что выпадали многие, было еще страшней. Объявления о пропавших стариках и детях обновлялись в их районе ежедневно. Пытка надеждой не прекращалась — мать все еще ждала, хотя все понимала. Иногда их собака, двенадцатилетняя колли Бэла, давно ставшая Белкой, принималась стучать хвостом и отчаянно выть, и мать всякий раз белела, стоило собаке задрать морду и завести вой, даром что отец был, скорей всего, ни при чем — должна же и собака оплакать свою старость, слабость и надвигающуюся слепоту.</p><p class="p1">Мать не то чтобы успокоилась, но купила душевное равновесие ценой отказа от воспоминаний, от сильных чувств, от сложности, всегда так умилявшей Свиридова на фоне его безнадежно плоских, в каждом слове предсказуемых ровесниц. Со страной вышло так же: за нынешний вялый покой, похожий на сон в июльской предгрозовой, лиловой духоте, она отдала способность думать и чувствовать, помнить и сравнивать, и любой, кто ее будил, в полусне представлялся ей злодеем. Мать радовалась, когда Свиридов появлялся, но уже не слушала, когда рассказывал о себе. Жаловаться ей было тем более безнадежно: чужие драмы ее только раздражали. Если дело касалось соседки или бывшей коллеги, то есть не требовало сочувствия, — она выслушивала сетования с живейшим интересом, но если предполагалась хоть капля сопереживания — не чувствовала ничего, кроме злости. Свиридов понимал, что для нее это единственный способ сохранить рассудок, и не роптал.</p><p class="p1">Он не стал ничего рассказывать про список. Мать, как всегда, пожаловалась на Людмилиного мужа, похвалила ее ребенка, который при таком отце умудрялся расти начитанным и вежливым, и машинально расспросила про Крым. Свиридов так же машинально ответил, что Крым без изменений. У него была смутная надежда, что мать разглядит его тревогу, присмотрится, начнет расспрашивать — и тогда он с блаженным детским облегчением расскажет ей все, и она скажет, что у них в подъезде уже двое в списке, и ничего страшного, это список на увеличение жилплощади, а на таможню он попал случайно, потому что перепутали список бесквартирных со списком невыездных. Это было бы невероятным, недостоверным счастьем — но это счастье осталось во временах, когда мать еще могла успокаивать его, отца и Людмилу, вечно страдавшую то из-за любви, то из-за фигуры. Теперь ее едва хватало на то, чтобы оградить от тревог себя. Свиридов взял Белку и отправился по старой памяти выгуливать ее в парк.</p><p class="p1">В сущности, ничего не случилось. Шестой сезон «Спецназа» и так заканчивается, и нет уверенности, что будет седьмой. Рома непременно что-нибудь предложит, он всегда говорил — звони. Шура Семин просил помочь с новеллизацией «Подворья», поскольку сам писал кое-как и вообще перекатал всю историю с житийной литературы; это штуки три по нынешним ценам. Можно было позвонить Григорьеву и попроситься в «Глафиру» — неудобно, сам отказался, но к чертям неудобство. В «Глафиру»-то его должны были взять беспрепятственно — чай, не канал «Орден». Да и потом, что за вечный страх остаться без места? Сам все жаловался — нет времени, нет времени. Теперь у тебя есть время, сядь и напиши наконец, что хотел, и не отговаривайся обстоятельствами. Жара кончилась, Москва посвежела, по асфальту металась светотень, блестели листья, матери катили коляски, и хотя липы отцвели, слабый медовый запах еще путался в кронах. Свиридов спустил Белку с поводка — пусть бегает, в конце концов, а то совсем скисла. Она, впрочем, никуда не убегала и степенно трусила рядом, всем видом говоря: да, я без поводка, ибо не нуждаюсь в контроле, но у меня хватает самодисциплины. Только дураки ищут счастья в каждой луже или подворотне — я уже знаю, что счастье в стабильности.</p><p class="p1">Свиридов купил матери творогу и сосисок — собака терпеливо ждала у магазина — и собрался было домой, но на углу Кравченко, у конечной остановки тридцать четвертого троллейбуса, Белка дико залаяла на проходящую мимо таксу: старость старостью, воспитание воспитанием, а такс она ненавидела люто и ни одной не пропускала без оглушительных проклятий. В них было что-то, оскорблявшее в ее глазах саму собачью природу, предательски-приземистое, отвратительно-бесхвостое, сосисочное. Такса ответила старушечьим тявканьем, хозяин быстро утянул ее на поводке в ближайшую арку, а Белка, ленясь бежать за уродиной, облаивала ее вслед, — Свиридов не мешал ей, зная, что это бесполезно, но тут до него донесся стариковский вопль:</p><p class="p1">— Ну ты, ты! Убери ее, ты! Я пройти не могу!</p><p class="p1">— Сейчас, сейчас, — заторопился Свиридов. Он только теперь разглядел высокого тощего старика, беспомощно прижавшегося к стене. У старика были длинные седые космы, защитная рубашка и брюки с бахромой.</p><p class="p1">— Ты что без поводка ее пускаешь, ты! Людям ходить не даешь!</p><p class="p1">— Сейчас уведу. А что вы так орете-то? — обозлился Свиридов. Белка сроду ни на кого не напала. — Она не кусается.</p><p class="p1">— Я откуда знаю, кто кусается, кто нет! Убери ее, я тебе сказал! Пристрелить надо твою собаку! — Старик был из тех неистребимых моченкиных, что еле держатся на ногах и всего до смерти боятся, и Свиридову, безусловно, не надо было заедаться с ним, — но после вчерашних склок с Вечной Любой он был зол на всю эту подъездную шушеру, за отсутствием собственной жизни раздувающую скандал из всего.</p><p class="p1">— Как вы сказали? — ласково переспросил Свиридов. — Кого пристрелить?</p><p class="p1">— Собаку твою! — отчаянно заблажил старик. — Собаку твою и тебя надо пристрелить! Напишу, вызову, будешь наказан, не волнуйся! Не волнуйся, будешь наказан!</p><p class="p1">Видимо, старец совсем выжил из ума. Его словарного запаса не хватало даже на внятную угрозу. Он выглядел необычайно хилым и дряхлым, его шатало ветром, но самая эта хилость почему-то выглядела устойчивой, непобедимой: он пережил все, и пережить Свиридова для него было плевым делом.</p><p class="p1">— Если ты еще раз откроешь рот, — сказал Свиридов, — я сам тебе санитаров вызову. Слышал, развалина?</p><p class="p1">Он сразу понял, что сказал это зря. На лице старика появилось блаженство жреца, наконец вызвавшего дождь.</p><p class="p1">— А, ты угрожать! — задребезжал он. — Ты оскорблять! Я тебя знаю, откуда ты! Я тебя знаю, твою мать знаю, твою собаку знаю! Она ходит тут со своей собакой гадит! Вы все, все будете вот тут!</p><p class="p1">— Мать не трогай! — рявкнул Свиридов, но старик не утихал. Он дождался счастья, ему открылось широкое поле деятельности. Он грозил Свиридову палкой и колотил ею в асфальт, призывая милицию. Свиридов взял Белку на поводок, плюнул в сторону старика и отправился домой, слыша за собой проклятья и дивясь их неиссякаемости. Положительно, список перевел его в разряд жертв: теперь от него пахло затравленностью, он испускал ее флюиды, и каждый норовил добавить. Свиридов не знал, что с этим делать, и купил для успокоения «Отвертку». Настроение было испорчено бесповоротно.</p><p class="p1">— Мать, — спросил он дома, — что это за старец у нас во дворе, косматый?</p><p class="p1">— Это ужас что такое, — сказала мать. — Синюхин. Год назад сюда переехал. Ты его не видел раньше?</p><p class="p1">— Нет, Бог миловал.</p><p class="p1">— Весь район терроризирует. Пишет на всех в милицию. А они приезжают, потому что иначе он пишет на них. Можно тут человека убить, и никто не приедет. А к Синюхину ездят, даже когда у него сосед сверху музыку включает. Ты не знаешь, что это за человек. Он нас теперь замучает, мне будет на улицу не выйти. И что ты только вздумал с ней гулять? Почему из любой твоей помощи получается вот такое?</p><p class="p1">У матери сделалось испуганное и злое, заячье выражение лица. Такое бывало в детстве, когда Свиридов заболевал. Понятно было, что она злится не на него, а на его болезнь — свинку, краснуху, — теперь он заболел синюхиным, но уже исключительно по своей вине. Главное же, что он рисковал заразить синюхиным ее и Белку.</p><p class="p1">— И почему ты никогда не можешь с людьми по-человечески? Почему ты обязательно должен со всеми ругаться?</p><p class="p1">— Да ничего не будет. Что он может сделать?</p><p class="p1">— Он пойдет сейчас писать заявление, что ты без поводка выгуливаешь собаку. Или позвонит и вызовет наряд. Господи, и за что все это? Я как знала, не хотела ее с тобой отпускать…</p><p class="p1">Если такая ерунда, как скандал со стариком Синюхиным, выбивала ее из колеи — можно было представить себе, во что вылился бы разговор о списке; но очень скоро Свиридов убедился, что мать, как и десять лет назад, понимает в жизни больше, чем он. Он едва успел распрощаться и спуститься вниз, как заметил во дворе милицейский «форд». Поначалу Свиридов посчитал это совпадением, но около машины, ликуя, топтался Синюхин. К подъезду уже направлялся мент с черной папкой — толстый, одышливый, белоглазый. Чем-то он неуловимо напоминал сливочную блондинку с почты, тоже вынужденную причинять людям неприятности, не нужные ни ей, ни им, а только непостижимому божеству, чьи потртеты следовало бы вывесить во всех присутственных местах России, если бы кто-нибудь знал, как оно выглядит.</p><p class="p1">Быстро, однако, подумал Свиридов.</p><p class="p1">— Вон он, вон! — дрожащим голосом орал Синюхин. — Угрожал, угрожал мне, старику, бессильному человеку, больному! Больному мне угрожал!</p><p class="p1">Для типичности ему не хватало только потрясать грудой обтерханных справок.</p><p class="p1">— Проедемте, — вяло сказал толстый мент, глядя в сторону.</p><p class="p1">— Куда?</p><p class="p1">— Проедемте, там вам скажут, куда, — повторил он равнодушно.</p><p class="p1">— Я никуда ехать не могу, у меня работа, — сказал Свиридов, понимая, что сопротивление бесполезно.</p><p class="p1">— У всех суббота, у него работа! — орал Синюхин. Со слухом у него все было отлично, дай бог каждому в его годы.</p><p class="p1">— Заткните его, а? — сказал Свиридов. — Чего он лезет? Он угрожал мою собаку убить.</p><p class="p1">Синюхин обалдел от такой наглости и замолк.</p><p class="p1">— Там разберутся, чего кто угрожал, — все так же вяло сказал толстый. — Проедемте, и разберутся.</p><p class="p1">— Да не поеду я никуда! — крикнул Свиридов, понадеявшись, что наглость сработает и против мента. — Кто вы такой, где у вас ордер?</p><p class="p1">Мент не стал ему ничего отвечать, а просто бросил свою черную папку и заломал ему руку — быстро, больно и совершенно равнодушно. Он втолкнул его в машину, где ждал, ни на что не реагируя, мент-водитель с длинным костистым лицом, потом вернулся за своей папкой и, кивнув на прощанье старику Синюхину, плюхнулся рядом со Свиридовым. Старик порывался ехать с ними, желая в отделении лично рассказать, как именно Свиридов угрожал его жизни и здоровью, — но толстяк повторил, что там разберутся.</p><p class="p1">— Учтите, я вам сопротивления не оказывал, — сказал Свиридов. Злость в нем все еще была сильнее страха. — Вы ответите.</p><p class="p1">Мент отвернулся к окну и не удостоил его ответом.</p><p class="p1">Очень все быстро, снова подумал Свиридов. Скоренько, сказал бы Сазонов. Три дня как прилетел — работы нет, в подъезде скандал, теперь взяли. А мы надеялись, что ничего нельзя вернуть. Идиоты, ничего и не надо возвращать. Оно не уходило.</p><p class="p1">Отделение располагалось в трех кварталах от дома, он пару раз бывал тут в паспортном столе, на первом этаже двухэтажного милицейского здания. Против ожиданий, в обезьянник его не бросили, а провели прямо на второй этаж, к начальнику отделения, которого Свиридов знал. Это давало хлипкую надежду: Свиридов учился с его сыном и даже был пару раз у них дома. Фамилия начальника была Горбунов, он был усат, добродушен и вечно утомлен. Толстяк ввел Свиридова в кабинет и вышел. Кабинет был похож на все милицейские и жэковские помещения, наличествовал даже графин с желтой водой, и облупленный зеленый сейф, и несчастный амариллис на подоконнике.</p><p class="p1">Майор Горбунов посмотрел на Свиридова безо всякого выражения.</p><p class="p1">— Я не понимаю, — сказал Свиридов. — Ваш подчиненный на меня набросился, руку мне заломал, я заявление сейчас напишу…</p><p class="p1">— Это да, это извините, — сказал Горбунов. — Писать не надо ничего, я поговорю.</p><p class="p1">— А что вообще такое? Вы же меня знаете, я был у вас, я с Игорем в школе учился… Набрасываются, тащат… Старик какой-то сумасшедший… Мало ли что скажет старик? Ему знаете что может в голову взбрести?</p><p class="p1">— Да старик что? Старик ничего, — сказал Горбунов, глядя на него все так же — без осуждения и сострадания, а словно чего-то ожидая. Свиридов явно должен был сам признаться, потому что Горбунов его щадил — не забирал, не запирал, — и надо было оценить его деликатность, то есть все рассказать самому. Еще немного, и он ласково спросит: «Говорить будем?».</p><p class="p1">— А что я должен, если не старик? — перенимая одышливо-отрывистый стиль, сказал Свиридов. Весь этот Кафка начинал ему надоедать — главным образом буквальными совпадениями с литературой.</p><p class="p1">— Да я бы, сами понимаете, ничего, — после паузы сказал Горбунов, побарабанив пальцами по столу. — Но тут такое дело.</p><p class="p1">Он опять надолго замолчал. Диалог выходил на диво содержательным.</p><p class="p1">— Такое дело, — повторил он, глядя в стол.</p><p class="p1">— Список? — прямо спросил Свиридов.</p><p class="p1">Горбунов поднял на него сенбернарские глаза с оттянутыми книзу веками.</p><p class="p1">— В курсе? — ответил он вопросом на вопрос.</p><p class="p1">— Не в курсе, — зло сказал Свиридов. — Знаю, что есть список, а что за список — понятия не имею.</p><p class="p1">— Ну а кто должен иметь понятие? — задал ему Горбунов все тот же гнусный вопрос, который он выслушивал в третий раз за сутки. — Кто знать-то должен?</p><p class="p1">— Вы, наверное, — сказал Свиридов. — Если вам довели.</p><p class="p1">— Нам довели, да. Но в списке-то вы.</p><p class="p1">— В списке я, да. Но довели-то вам. — Свиридов понял, что надо жестко придерживаться правил игры и во всем имитировать стиль собеседника. Это был балет, танец. Наступил — отступил, выпад — отпад.</p><p class="p1">— А тут приходит сигнал, — выждав еще одну паузу, во время которой родился еще один вялый милиционер, сказал Горбунов. — Так бы я не реагировал. Мне что этот Синюхин? У меня сумасшедших стариков в каждом дворе по одному. Делать нечего, они строчат. Они же не переводятся. Я состарюсь, такой же буду.</p><p class="p1">Это была уже вполне человеческая фраза, вне абсурда, который тут происходил. Свиридову показалось, что в душный горбуновский кабинет вползла струйка живого прохладного воздуха.</p><p class="p1">— Если всех тягать, на кого он стучит, мне узбеков некуда девать будет, — сказал Горбунов. — Вон на стройке узбеки без регистрации. А он пишет: врач ему был невнимателен, дворник ему был неаккуратен. Он сам-то кто? Стоматолог. Людей мучил. Двадцать лет на пенсии. Привык сверлить, вот и сверлит. Но вы должны понять: мне доведен список, я что могу?</p><p class="p1">Подтверждалось свиридовское подозрение: теперь, после попадания в список, любая житейская дрязга будет протекать тяжелей и заживать дольше, как царапина при диабете.</p><p class="p1">— А кто довел-то? — спросил Свиридов и тут же пожалел об этом. Список довела инстанция, о которой не полагалось спрашивать и не принято было отвечать.</p><p class="p1">— Кто надо, — сказал Горбунов. — А то сами не знаете, кто у нас доводит.</p><p class="p1">Неясно было, гордится он тем, что у нас все так обстоит, или стыдится, подобная смесь стыда и гордости с неявным превалированием последней была в основе новой идентичности; какой-то Задорнов.</p><p class="p1">— Догадываюсь, — стараясь вернуть его к союзническому, заговорщическому тону, ответил Свиридов. — Но это же может быть список на награждение, так? На что-нибудь хорошее, нет?</p><p class="p1">Горбунов усмехнулся.</p><p class="p1">— На хорошее они списков не дают, — сказал он. — Не та контора. Это вы даже оставьте, как говорится, надежду.</p><p class="p1">— Ну а что тогда? Если брать, то берите, только не мурыжьте попусту. Вы ждете, что я вам все скажу, а я сам не знаю.</p><p class="p1">— Да это-то понятно, — протянул Горбунов. Он явно искал, к чему прикопаться, и не находил. Свиридов был чист. Он даже нигде, кроме военкомата, не состоял на учете. Его не задерживали в нетрезвом состоянии, не доставляли приводом, не привлекали в качестве понятого. — Просто сами видите — теперь если сигнал, то повышенное внимание.</p><p class="p1">— Но я же не сделал ничего! Это он сделал, он обещал застрелить меня и мою собаку!</p><p class="p1">— Да по собаке вопросов нет, — отмахнулся Горбунов. — По старику нет, по собаке нет… Я маму вашу знаю, — сказал он внезапно, — хорошая мама.</p><p class="p1">По контексту следовало ожидать, что он добавит: «И вон что выросло», — но он молчал, томился, вытирал пот, и так же томился Свиридов. Майор, кажется, в самом деле еще не знал, как к нему относиться. Никаких человеческих чувств к Свиридову он, конечно, не испытывал, но испытывал, так сказать, имущественные. Перед ним сидел человек из списка, особый, обративший на себя внимание самой высокой здешней инстанции, он сидел у него в отделении и жил у него на участке, и непонятно было, как им распорядиться. Из этого могло получиться повышение по службе, а мог большой геморрой; его можно было взять сразу, а можно понаблюдать, вытащить сообщников, накопать целый заговор. Он надеялся, что Свиридов ему что-нибудь подскажет, но он то ли не знал, то ли хитрил. Приходилось решать самому, и надежней всего было тянуть время — вдруг сорвется и проговорится.</p><p class="p1">— Мне на работу надо.</p><p class="p1">— Нет, на работу вы погодите, — сказал Горбунов, и Свиридов понял, что на совещание по «Родненьким» опоздает безнадежно. — Вы посидите, подумайте — может быть, что-нибудь… Это нельзя вот так сразу. Если б он не просигналил, я все равно обязан. По месту прописки. Вы тут не проживаете, нет?</p><p class="p1">— Я у деда на квартире живу, — сказал Свиридов. — А что?</p><p class="p1">— Да вот видите, прописаны тут, живете там. Уже нехорошо. Путаницу создает, и, может быть, кто-то недоволен. Может, вас надо вызвать срочно, а вас нет. И тогда это, допустим, список людей, которые живут там, а прописаны тут. Я же не знаю, меня не вводят. У меня на все отделение вы один по списку, и я про других не знаю.</p><p class="p1">— Слушайте, — не выдержал Свиридов. — А показать мне этот список вы можете?</p><p class="p1">— Нет, как же? — развел руками майор Горбунов. — Если бы вам надо было, так вам бы довели. Я вообще не имею права вам сообщать, это я по дружбе.</p><p class="p1">— А о чем бы вы меня тогда спрашивали, если бы не сообщили? — не понял Свиридов. — Что, мы так друг на друга бы и смотрели?</p><p class="p1">— Не знаю, — вздохнул майор. — Нам не доведено, какие мероприятия. Нам только список.</p><p class="p1">Свиридов отчетливо понимал, что сейчас решается если не сама его участь, то общий ее вектор: в воздухе сгущались и плавали трудноопределимые сущности, и надо было что-то изменить сейчас, пока они не отвердели. То есть конец был один, раз уж он попал на карандаш, но еще можно было выговорить послабление, расчистить люфт. Так в основу приговора чаще всего ложатся первые показания, когда жертва еще не знает, как себя вести. Надо было сказать что-то правильное, свойское, но Свиридов, даром что сценарист, никак не мог придумать такой пароль. Он чувствовал себя как в регулярно повторяющемся сне: он сидит зимой, ночью, во дворе своего дома, и знает, что для облегчения участи — прижизненной или посмертной, во сне не уточняется, — ему надо куда-то пойти и что-то сделать, может быть, просто повидаться. Он идет к себе домой, там все в сборе, собираются пить чай, очень удивляются его возвращению: «Ты же уехал!» — «А куда я уехал?» — «Ты что, не помнишь?!» И от страха снова услышать материнское — ты всегда все забываешь, в прошлом году забыл зонт, всегда забывал в школе сменку, не помнишь, куда идешь, за что мне все это! — он кивает: а, да-да, конечно, ну, я пошел. Значит, не домой. Тогда к Володьке? Но Володьки нет дома, ему так и говорят, и почему-то со страшным раздражением. Ладно, тогда, наверное, на Киевский вокзал. Я должен куда-то уехать. Но на Киевском вокзале закрыты все кассы, и метель заметает пути. То есть совсем, совсем мимо. И тогда он возвращается в сквер и понимает, что ничего в своей участи изменить не может — участь на то и участь, чтобы ее нельзя было изменить. Значит, надо просто сидеть там и ждать. И как только он это понимает — сквер чудесно преображается, принимается падать легкий танцующий снег, даже что-то вроде «Вальса цветов» звучит из окон. Чтобы изменить участь, оказалось достаточно с ней примириться. Это был правильный сон — о том, что не надо дергаться. Он и теперь перестал подыскивать пароль и задал вопрос, который его интересовал.</p><p class="p1">— А сколько нас в списке? — спросил он.</p><p class="p1">Это и было парольное слово. Достаточно было сказать о людях из списка «мы» — и тем окончательно отделить себя от нормальных, никуда не попавших.</p><p class="p1">— Сто восемьдесят, — со вздохом сказал Горбунов. — Ну идите, работайте.</p><p class="p1">— А вы не можете сделать так, чтобы старик не орал? — осмелел Свиридов. Прокаженному можно.</p><p class="p1">— Я ему скажу, — пообещал майор.</p><p class="subtitle">6</p><p class="p1">Свиридов успел на совещание по «Родненьким», где ничего не знали о его увольнении из «Экстры» и спокойно отдали в разработку две новых темы — инцест и похищение. Но история с Синюхиным получила неожиданное продолжение, которое и сделало Свиридова героем среди списочных или списанных, как сами они называли себя впоследствии. В понедельник «Наш день» напечатал сенсационный репортаж о том, что один из создателей культового телешоу собаками травил одинокого старика — из числа тех, для кого это шоу делается.</p><p class="p1">Воскресенье Свиридов провел с Алей, они с утра завалились в Парк культуры, потратили кучу денег, перекатались на всех горках и качелях Луна-парка, и сиюминутный радостный страх рухнуть с огромной лодки, летавшей над Москва-рекой, вытеснил все остальные. Стреляли в тире, Свиридов близоруко мазал, Аля выиграла зеленого слона. Ели шашлык — как всегда, сырой и напоминавший о детстве, об эстраде зеленого театра, на которой читал еще не сваливший Молоток, герой только народившегося слэма; странно, что они с Алей оба бегали сюда и друг друга не знали. Вот уже вторую неделю подряд во второй половине дня проливался стремительный теплый дождь, над красными песчаными дорожками поднялся пар, малышня радостно визжала в детских вагончиках, и Свиридов впервые за неделю поймал себя на том, что не чувствует вражды к обычным людям, не внесенным покамест в скорбные листы. Прежде он их ненавидел, а рядом с Алей это как-то отступало — то ли потому, что ее близость искупала пребывание в любых списках, то ли она, здоровая и счастливая, предстательствовала за всех здоровых и счастливых. Ладно, живите. Вдобавок она осталась у него. Расчувствовавшись, он чуть не выложил ей всю историю про список и мента, но рядом с ней все казалось такой ерундой, а жалобы — такой пошлостью, что Свиридов смолчал. Можно было когда-нибудь со временем рассказать ей эту историю в третьем лице, как собственный замысел: представь себе, любимая, человека, который попал в таинственный список и сразу выпал из всех остальных… но она снова сказала бы что-нибудь про паранойю и про неумение замечать хорошее, а ему совсем не хотелось ругаться. Она была тихой и нежной, редко он видел ее такой, — рассказывала про детство, он не перебивал.</p><p class="p1">Утром она убежала на работу, пока он спал. Свиридова разбудил звонок Бражникова.</p><p class="p1">— Ты «День» читал? — поинтересовался он. У Бражникова была страсть к мерзостям, поэтому он читал «День» от корки до корки и помнил все про всех, хотя не верил ни одному слову ни в одной газете.</p><p class="p1">— Я «День» не читаю. А что?</p><p class="p1">— А напрасно! — протянул Бражников. — Там про вас!</p><p class="p1">Свиридов опять похолодел, как в машине у Сазонова.</p><p class="p1">Переход оказался резковат.</p><p class="p1">— Что про нас?</p><p class="p1">— Как ты пенсионера травил собакой!</p><p class="p1">Была еще надежда, что он шутит, — но Свиридов не рассказывал ему про старика, и взять эту сплетню Бражникову было неоткуда.</p><p class="p1">— Влип, влип, — торжествовал Бражников. — Натворил. Попал под лошадь.</p><p class="p1">— Что написано-то?!</p><p class="p1">— Сейчас прочитаю. — Бражников зашуршал газетой. Свиридову казалось, что он облизывается. — «Властители дум травят свой народ собаками». Это название. Поздаголовок читать?</p><p class="p1">Бражников садически растягивал удовольствие. Этот садизм тихих программистов был Свиридову давно знаком — видимо, долгое общение с машиной отбивало всякие человеческие ограничители вроде сострадания или стыда, а звериное оставалось в неприкосновенности. Неслышный Бражников еще в школе любил отрывать крылья бабочкам и с любопытством наблюдал, как они ползали.</p><p class="p1">— Читай, — спокойно сказал Свиридов.</p><p class="p1">Главное было — не вестись.</p><p class="p1">— «Сценарист патриотического сериала «Спецназ «и трогательного детского фильма «Девочка-танцовщица»…»</p><p class="p1">— «Маленькое чудо», — поправил Свиридов.</p><p class="p1">— Чего ты от них хочешь, им же в конторе запретили польтзоваться инетом. Я знаю, у меня там мужик работает. Главный им сказал — ловите сенсации не из сети, а в жизни. Ловят в основном по милицейским участкам. Ну читать?</p><p class="p1">— Да, давай.</p><p class="p1">— «Сценарист… бла-бла-бла… Сергей Свиридов в свободное от патриотизма время любит выгуливать своего огромного дога без поводка. Когда пенсионер Владимир Николаевич Синюхин, заслуженный медицинский работник с более чем тридцатилетним стажем, спасший жизнь тысячам людей, позволил себе сделать Свиридову тактичное замечание, разгневанный сценарист, крикнув «Фас!», направил своего монстра прямо на испуганного старика. Многочисленные свидетели кинулись защищать старого врача и встали на пути у разъяренного страшилища. Создатель «Танцующей девочки» наблюдал за этой чудовищной сценой, засунув руки в карманы. Адвокат «Дня» предложил Владимиру Синюхину свои услуги. Такие, как Свиридов, должны быть наказаны жестко. Именно такие, как он, зазнавшиеся звезды регулярно избивают нашего фотографа Радия Николаева за любую попытку честно рассказать зрителю об их оргиях. Напоминаем, что месяц назад другая звезда «Спецназа» Михаил Побережный оторвал Николаеву пуговицу, и газета продолжает расследование этого эпизода». Дальше комментарии коллег. Читать?</p><p class="p1">— Это особенно интересно, — сказал Свиридов.</p><p class="p1">— Станислав Говорухин, народный режиссер: «Некоторые режиссеры и артисты считают, что имеют право пасти народы, а сами глубоко презирают свой народ и не знают его. Я понятия не имею, кто такой господин Свиридов, но, конечно, теперь ни одна собака не позовет этого собаковода в свой проект. У меня самого есть собака, но я считаю, что моя свобода заканчивается там, где начинается свобода соседа. На Западе никто не посмеет выгуливать свою собаку без поводка, и все владельцы обязаны подбирать за питомцами их, так сказать, изделия». Александр Новиков, народный певец: «Надо еще проверить, что за детскую порнографию он там навалял. Лично я как советник народного депутата Крушеванова непримиримо борюсь с детской порнографией и своими руками готов удавить любого, кто бла-бла-бла». Это он рассказывает свои подвиги, неинтересно. Владимир Кафельников, главный редактор студии «Экстра»: «Я рад сообщить читателям вашей газеты, с просмотра которой всегда начинаю мой день, что Сергей Свиридов больше не участвует в производстве сериала «Спецназ». Я уже неоднократно делал ему замечания за внешний вид. Свиридов давно включен в список деятелей культуры, чье появление на телевидении не рекомендовано». Ты знаешь, Свиря, по-моему, для полного счастья они должны обозвать тебя бешеной лисой и провести митинг с требованием расстрела.</p><p class="p1">— Я этого и жду, — Свиридову все еще удавалось попадать в тон.</p><p class="p1">— Ну, ты в голову-то не бери. Они судятся каждый день и всегда проигрывают, но у них какой-то колумнист-чеченец, личный друг Кадырова, так что в лучшем случае печатают опровержение. Про тебя завтра все забудут, они вчера уже написали, что Гальцев жену побил. Ты же не круче Гальцева?</p><p class="p1">— Не круче. Я только думаю, как это от матери спрятать.</p><p class="p1">— Скупи тираж, — хохотнул Бражников. — Ну ты понял теперь, что это за список? Ты просто не рекомендован к телевидению.</p><p class="p1">— Список появился раньше. Ты ни хрена не понимаешь, Брага, а разговариваешь как умный. В любом случае — спасибо, что предупредил. Я учту.</p><p class="p1">Свиридов сел на подоконник, закурил и некоторое время существовал растительно. Нельзя дать катастрофе сразу проникать в себя, надо задерживать дыхание, как после удара под дых. Этому его учил инструктор рукопашного боя, с которым Свиридову приходилось беседовать ради очередной драки в «Спецназе».</p><p class="p1">Свиридов не считал себя трусом — хоть и отдавал себе отчет, что жизнь пока, слава богу, не подбрасывала ему особо жестоких проверок. Но он пасовал при встрече с непрошибаемым, монолитным хамством: всегда понятно, как вести себя с человеком, допускающим хоть тень сомнения в собственной правоте. Сам Свиридов всегда немного сомневался в своем праве тут быть, но предпочел бы не быть, чем родиться с непрошибаемой уверенностью в себе. Вероятно, люди только по этому принципу и делятся, все прочие разделения — лишь следствие: одни с рождения уверены, что им тут самое место, а другие всю жизнь оправдываются, тщатся доказать, что им сюда можно. Вторые ради самооправдания все время работают, а первые присваивают их труд, потому что им можно. Откуда взялись эти две расы — надо подумать на досуге, досуга будет много. Теперь он сделал что-то не так или просто обнаружил себя, и прирожденные владельцы всего сущего занимаются им прицельно. Их не устроят никакие извинения и покаяния, никакие отъемы имущества. Свиридова надо съесть целиком, без остатка, чтоб запаха не осталось. Что они перешли в наступление — заметно было давно; но кто их будет кормить? Ведь они ничего не умеют делать сами. Наверное, случился качественный прорыв, они научились худо-бедно обеспечивать себя или приспособили наконец свои желудки к той топорной, шершавой, с примесью жмыха продукции, которую только и умели производить. Все остальное им больше не нужно, и от нас можно избавиться.</p><p class="p1">Катастрофа, никаких самоутешений. Человек, про которого такое написано, выпадает из реальности навсегда. Из профессии точно. Теперь Грега Стилсона не выберут даже в команду живодеров. Господи, что я такого сделал?! Выгуливал собаку без поводка. Нас убьют за то, что мы гуляли по трамвайным рельсам. Все предсказуемо. Конечно, можно судиться. Даже нужно судиться. Но каждый отчет о судебном процессе они будут сопровождать статьями о том, как я выплюнул жвачку перед входом в суд и тем оскорбил труд дворника, как посмел явиться в джинсах и тем оскорбить вкус народного заседателя…</p><p class="p1">Одно преимущество у всего этого есть: голый человек на голой земле. «Родненькие» теперь, конечно, побоку, причем навеки. Сценарист, травящий собаками свой народ, не имеет морального права делать народную программу. Возможно, этой теме будет посвящена очередная народная программа, на которой тихий очкарик попытается меня защитить, а толпа его затопчет. И очкарик, и толпа будут из мосфильмовской массовки. Еще неделю назад Свиридов побежал бы в редакцию, к адвокату, к черту, дьяволу, принялся бы требовать опровержений — успешный профессионал в своем праве; но теперь все его начинания были обречены. Надо было не рыпаться, а достойно принять крах. Это очень трудно. Но кто сказал, что должно быть легко? Да и что возражать: сама тяжесть навалившегося на него монолита была главным аргументом. Правда, в последнее время так давили всех, это было приметой стиля: что ж, оно даже и милосердней — не бросают догнивать, а размазывают сразу. Никаких иллюзий. Надо как-то подготовить мать, чтобы хоть не обухом по голове. Но готовить мать ему не пришлось — зазвонил мобильный.</p><p class="p1">— Сережа, — сказала мать страшным хриплым голосом. — Ты видел?</p><p class="p1">— Мама, я видел и ничего другого не ждал. Это их нормальная практика.</p><p class="p1">— Откуда они знают, Сережа?!</p><p class="p1">— Ну, Господи, они же мне не докладывают. Они даже не связались со мной. Может, этот старик им настучал. Им же нечем заполнять газету, а выдавать какую-то дрянь надо ежедневно. Артисты закончились, они взялись за сценаристов.</p><p class="p1">— Но ты же теперь не сценарист! — закричала мать. — Они выгонят тебя! Ты читал?!</p><p class="p1">— Мама, это все брехня. Ты прекрасно знаешь. Никто бы не выгнал меня за такую ерунду. Я уже звонил на «Экстру», там все знают и готовят иск. — Он врал спокойно, уверенно и в процессе вранья успокаивался сам.</p><p class="p1">— Но я не могу теперь выйти из дому! Мне принесла соседка, теперь знает весь подъезд…</p><p class="p1">— Мама, что я могу сделать? — устало сказал Свиридов. Мать почувствовала слабину и тут же воспламенилась:</p><p class="p1">— Я не знаю, что ты можешь сделать! Чем ты думал, когда выпускал собаку без поводка?! Господи, почему это все с нами?!</p><p class="p1">А в общем, спокойно подумал Свиридов, эта уверенность, что весь мир против нас, ничем не хуже моей. Что унаследовал, так это затравленность. Понять бы еще, кто это нас так затравил.</p><p class="p1">— В любом случае они дадут опровержение, — вставил он в первую же паузу.</p><p class="p1">— Да что мне их опровержение! Я в подъезде его вывешу? Ты понимаешь, что на нас теперь все будут показывать пальцами?! Они отравят Белку!</p><p class="p1">— Мама, я могу тебе предложить только переехать сюда. Извини, я сейчас буду разруливать как-то эту ситуацию, а обвинить меня во всех своих несчастьях ты сможешь в другой раз, ладно?</p><p class="p1">Это было жестоко, но вариантов у него не было. Конечно, он не собирался ничего разруливать, но предоставлять свежую рану для поливания уксусом тоже не хотел.</p><p class="p1">Он собрался было вернуться на подоконник, но затрезвонил городской.</p><p class="p1">— Серега! — Звонил Шептулин, былой соавтор по «Спецназу». — Серег, не бери в голову! Ты читал «День»?</p><p class="p1">Это было очень по-шептулински — сперва посоветовать не брать в голову, а потом поинтересоваться, в курсе ли собеседник.</p><p class="p1">— Да ты плюнь! — долдонил Шептулин, не слушая ответа. Он был то, что называется «хороший мужик», таких всегда все считают хорошими мужиками безо всяких оснований: рохля, неумеха, трепач, пьяница, когда-то подавал надежды (причем то, что ставилось ему в заслугу, тот первый сценарий или дурацкая первая постановка, было ниже плинтуса, просто на этом лежал отпечаток безопасной и безобидной шептулинской личности, и это сходило за человечность). Шептулинская доброта была глупой, халявной добротой алкоголика, и любили его именно за то, что он никому и ни в чем не был конкурентом. Писать он не умел ничего, кроме скупых мужских диалогов. Еще он любил авторскую песню и много времени проводил на слетах. Борода предполагалась сама собой.</p><p class="p1">— Плюнь! — повторял Шептулин. — Чего список, фигня все списки! У меня шурин в списке, и что? Они пишут, что это закрывает доступ на телевидение, а какое телевидение, когда он сантехник? Эта газета — тьфу, подтереться стыдно! Брось, Серег, не переживай.</p><p class="p1">— Стоп, — сказал Свиридов. — Погоди, Толя. Я не переживаю, но ты погоди. Чего ты сказал про список?</p><p class="p1">— Я говорю, у меня шурин тоже в списке каком-то! К нему участковый приходил, сказал — спустили список, а чего делать, не сказали. Ну и ничего не делают, может, это список ударников труда. Плюнь, Серег, я точно тебе говорю, это все хрень… Я к Кафелю сегодня пойду, вот веришь, нет, я точно к Кафелю пойду сегодня и скажу — брось, Кафель, ты что? Что ты за мужик, Кафель? У тебя такой парень работает, а ты его после первого окрика на улицу?! Не бери в голову, Серег, я сегодня пойду…</p><p class="p1">Конечно, он никуда не пойдет и ничего не скажет. От другого человека сочувствие было бы даже приятно, оно развеяло бы этот морок и доказало Свиридову, что хоть в чьих-то глазах его жизнь оправдана. Но Шептулин с его халявной добротой, мягкой седеющей бородой, идиотской улыбкой во всю широкую рожу, многодетной семьей, подпевающей под гитару женой и полной неспособностью ни к одному делу был явно не тем персонажем, чьи соболезнования сегодня добавили бы Свиридову сил. Если он уже черпает силы в состраданиях Шептулина — это может означать только, что он окончательно перешел в разряд таких же лузеров, а с этого дна подъемов не бывает.</p><p class="p1">— Подожди, Толя. Мне важно про шурина. Как он в списке, откуда?</p><p class="p1">— Да я не знаю, тебе лучше с Ленкой поговорить. Котён! Сейчас все скажет.</p><p class="p1">И, не спрашивая, хочет ли Свиридов разговаривать с Ленкой, он сунул ей трубку.</p><p class="p1">Ленка была еще хуже Шептулина — она понимала причины народной любви к нему, отлично знала ей цену и умела пользоваться. Разговаривала она жалким, причитающим голосом, но стоило собеседнику расслабиться и пожалеть семью, она вворачивала что-нибудь едкое, недвусмысленно намекающее, что именно благодаря таким, как некоторые, талантливый человек и его дети прозябают в нищете. Шептулин тут же подмигивал собеседнику и осаживал жену, но осаживал так — ладно, Котён, не бери в голову, что мы, плохо живем? — что полностью подтверждал ее слова. Всякий немедленно начинал чувствовать себя должником Шептулиных, у них это было отлично поставлено. Слово «Котён» Свиридов ненавидел отдельно.</p><p class="p1">— Да, Сережа, — сказала Лена.</p><p class="p1">— Лен, извини, там Толя говорил про шурина…</p><p class="p1">— Да, я слышала. Ты что, тоже в списке?</p><p class="p1">— Вроде да.</p><p class="p1">— Не парься. Это знаешь что, я думаю? Это что-то налоговое. У Юрки приработок, он от «Аманды» унитазы ставит. Думал, они задекларировали, а они думали, что он. Он сейчас доплатил, ему в налоговой сказали, что претензий нет, потому что сам пришел.</p><p class="p1">— Ас чего ты взяла, что я не доплачиваю? — спросил Свиридов. Чем такое сочувствие, лучше было полное одиночество.</p><p class="p1">— Ну откуда я знаю, я предположила просто… Что злиться-то сразу?</p><p class="p1">— Я не злюсь, Лена, извини, пожалуйста, если я был резок. — Свиридова понесло, он не мог остановиться. — Ради бога, прости. Я приношу тебе глубочайшие извинения. Пожалуйста, извини меня, если можешь…</p><p class="p1">— Сереж, что случилось-то? — спросила она уже сочувственно.</p><p class="p1">— Случилось то, что газета с полумиллионным тиражом написала, что я травлю людей собаками и попал под запрет на профессию. Больше ничего не случилось.</p><p class="p1">— Да какой запрет, брось, все выяснится…</p><p class="p1">— Все уже выяснилось. Ты мне дай просто его телефон…</p><p class="p1">— Да пиши, — и она продиктовала домашний номер, откуда-то из Чертанова. — Может, правда тебе с ним поговорить, вместе вы как-то…</p><p class="p1">Тут у Свиридова зазвонил мобильник, он суетливо попрощался и глянул на монитор. Звонил Рома Гаранин, создатель «Команды».</p><p class="p1">— Здоров, Свиридов, — сказал он хмурым басом. — Ты это… резких движений не делай, ага?</p><p class="p1">— Чего случилось, Ром?</p><p class="p1">— У меня с этим «Днем» своя история, — сурово продолжал Рома. — Они у меня живы не будут, это я тебе говорю. Ничего пока не делай, до завтра подожди. Вот увидишь.</p><p class="p1">— А тебе-то что они сделали?</p><p class="p1">— Неважно. Замучаются опровержения давать. Я прямо к ним сейчас еду. Ничего не делай.</p><p class="p1">— Ладно, это хрен с ним. Я сам тебе хотел звонить — со «Спецназа»-то я действительно слетел.</p><p class="p1">— Ну слетел и слетел, давно пора. Что, ты работу не найдешь?</p><p class="p1">— Найду, но если мимо тебя вдруг чего поплывет… — Свиридов с отвращением почувствовал, что заискивает.</p><p class="p1">— Ладно, — буркнул Рома и отключился.</p><p class="p1">Шептулинскому шурину Свиридов позвонил сразу. Тот оказался дома и выразил готовность с ним встретиться, но только в своем районе.</p><p class="p1">— Я отъезжать не могу. Напарник в отпуске, если срочный вызов — все на мне.</p><p class="p1">— Хорошо, я подъеду. Куда?</p><p class="p1">— Метро «Южная», — начал диктовать сантехник. Голос у него был ровный, манера сдержанная, и Свиридов тоже подобрался: слушают их теперь наверняка. Черт бы драл Лену с ее налоговыми догадками. Доходы с «Родненьких» он действительно не декларировал.</p></span>
