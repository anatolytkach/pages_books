<p class="p">2. Когерентный свет</p>
</div><div class="epigraph">
<p class="p1">С тех пор как впервые я обрела разум, склонность моя к учению стала столь крепкой и сильной, что ни осуждение других людей… ни собственные ощущения не могли отвратить меня от следования этому естественному побуждению, дарованному мне Богом. Он один знает почему. И Он знает, что я просила отнять у недостойной этот свет понимания, оставив мне лишь столько, сколько нужно, чтобы творить волю Его. Ведь, как говорят некоторые люди, все прочее излишне для женщины. Иные же утверждают, что свет понимания опасен для всех людей.</p>
<p class="text-author">Хуана Инес де ла Крус. «Ответ епископу города Пуэбла»</p>
</div><div class="epigraph">
<p class="p1">Я хочу предложить на благосклонное рассмотрение читателя доктрину, которая, боюсь, может показаться крайне парадоксальной и противоречивой. Предлагаемая доктрина такова: не следует доверять предположению, если нет никаких оснований считать его верным. Я должен, конечно, признать, что, если подобная идея найдет всеобщее применение, она полностью преобразует и нашу общественную жизнь, и политическую систему. Они сейчас считаются безупречными, но изложенная мысль опровергает их.</p>
<p class="text-author">Бертран Рассел. «Скептические эссе», I</p>
</div><p class="p1">В плоскости экватора бело-голубую звезду охватывало огромное кольцо материи: скалы, металлы, лед и органика — все кружило по своим орбитам. Кольцо было краснее снаружи, а возле звезды голубело. Многогранник размерам с мир скользнул в щель между кольцами и появился с другой стороны. Там, внутри кольца, на него то и дело падали тени кувыркающихся скал и ледяных глыб. Но теперь, когда траектория вынесла его наружу, к противоположному полюсу звезды, солнечный свет заиграл на миллионах чашевидных выступов. Если бы вы глядели на них очень внимательно, то могли бы заметить, как одна из чаш слегка шевельнулась. Но радиоволн — импульсов, устремившихся в глубины космоса, вы бы не заметили.</p><p class="p1">Для нас, людей — гостей Земли временных и недолгих, — ночное небо всегда было другом и источником вдохновения. Звезды утешали. Они как бы доказывали, что небо и сотворено было лишь для блага и наставления человечества. Эта полная патетики концепция стала общепринятой во всем мире. Ни одна культура не обошла ее стороной. Люди видели в небесах дверь, отворенную для религиозного чувства. Величие космоса и его безграничность повергали большую часть человечества в трепет, остальных же небо подвигло на самые экстравагантные полеты фантазии.</p><p class="p1">Когда люди познакомились с истинными масштабами Вселенной, они поняли, что самые немыслимые фантазии человечества в действительности ничто по сравнению с истинными размерами одной только галактики Млечного Пути, и приняли меры, чтобы их потомки попросту не смогли бы увидеть звезд. Миллионы лет люди ежедневно видели над собой извечный небесный купол. Но лишь в последние несколько тысяч лет они начали строить здания и съезжаться в города. А в последние несколько десятилетий большая часть человечества совсем оставила сельскую жизнь. Совершенствовалась техника, города загрязняли небо, и ночи стали беззвездными. Новые поколения вырастали, не ведая неба, ошеломлявшего их предков, того самого небосвода, что породил всю современную науку и технику. Пока астрономия вступала в свой золотой век, большая часть людей отгородилась от неба, даже не заметив этого, и такой космический изоляционизм закончился лишь на заре исследований космоса.</p><p class="p1">Элли частенько глядела на Венеру и представляла ее подобной Земле… населенной растениями, животными и разумными существами. Только другими — не такими, как здесь. На окраине городка после заката она вглядывалась в ночное небо, отыскивала на нем эту немигающую яркую точку. По сравнению с еще освещенными Солнцем высокими облаками планета казалась чуть желтоватой. Элли пыталась представить себе, что там происходит. Привстав на цыпочки, она впивалась взглядом в светило. Иногда ей казалось — и она верила в это, — что пелена желтоватых облаков на миг рассеялась и под ней бриллиантом вспыхивал огромный город. Воздушные автомобильчики носились среди хрустальных шпилей. Ей даже представлялось, что она заглядывает в один из автомобильчиков и видит кого-то из них. Или ей виделся какой-то юноша, который, привстав на цыпочки, смотрит на голубую звезду, горящую на их небосводе, с мечтой о далеких землянах. С этой мечтой было трудно бороться: вот она рядом — жаркая, тропическая планета, кишащая разумными существами.</p><p class="p1">Элли занялась зубрежкой, понимая, что это только подобие образования. Так она получала лишь необходимый минимум знаний, чтобы не отставать, но все свободное время посвящала иным занятиям. Дни и часы она проводила в грязной и тесной мастерской, устроенной в те времена, когда в школе «профессиональному обучению» уделялось больше времени, чем сейчас. Профессиональное обучение в основном сводилось к умению работать своими руками. Там были токарные и сверлильные станки, какие-то механические инструменты, и ей было запрещено подходить к ним… Независимо от способностей она оставалась «девочкой». Не без колебаний ей разрешили заниматься в той части мастерской, где находилось электронное оборудование. Сначала она собирала приемники из имеющихся деталей, а затем принялась за более интересные вещи.</p><p class="p1">Элли сделала шифровальную машину. Набиралась любая английская фраза, и простой перестановкой букв она преобразовывалась в явную тарабарщину. Построить машину, выполняющую обратное действие — превращение зашифрованного сообщения в понятный текст, — было гораздо труднее, ведь способ обратной подстановки заранее не известен. Машина должна сперва проверить все возможные варианты («А» вместо «В», «А» вместо «С», «А» вместо «D» и т. д.), или же следовало учесть, что некоторые буквы в английском языке используются чаще других. Некое представление о частоте использования букв можно было получить прямо в соседней типографии по размеру ящичков для букв «ETAOIN SHRDLU» — мальчишки из типографии довольно точно знали последовательность двенадцати наиболее часто используемых букв. В любом зашифрованном сообщении почти наверняка чаще всего встречалась буква «Е». Элли обнаружила, что некоторые согласные имели тенденцию объединяться в группы, гласные же располагались более или менее случайно. Из трехбуквенных слов чаще всего встречалось слово «THE», определенный артикль. Если «Т» и «Е» внутри слова разделяла буква, ею почти наверняка оказывалась «Н». Если нет — можно было держать пари, что это «R» или гласная. Она вывела еще кое-какие правила и долгими часами подсчитывала частоту, с которой буквы встречаются в различных учебниках, и лишь позже обнаружила, что такие таблицы не только существуют, но и опубликованы. Так что ее шифровальная машина оказалась простой игрушкой. Элли не шифровала писем с ее помощью. Она не была уверена, что друзьям можно поведать о своих занятиях криптографией и электроникой: в подобных случаях мальчишки начинали нервничать и повышать голос, а девочки просто странно глядели на нее.</p><p class="p1">Солдаты Соединенных Штатов воевали в далеких краях, называемых Вьетнамом. Ей казалось, что с каждым месяцем на улицах и на фермах оставалось все меньше молодых парней… потому что их всех отправляют туда. И чем больше она узнавала о причинах войны, чем больше слушала публичные заявления политических лидеров, тем больше овладевало ею негодование. И президент, и конгресс лгут, думала она, лгут и убивают, а все остальные, за редким исключением, просто молча соглашаются. А отчим с радостью повторял официальные оправдания: договорные обязательства, тайная и явная коммунистическая агрессия. Его разглагольствования только усиливали ее решимость. Элли начала посещать собрания и митинги в расположенном неподалеку колледже. Люди, которых она там встречала, казались ей ярче, дружелюбнее — живее, что ли — ее неуклюжих и бесцветных одноклассников. Для начала Джон Стогтон предупредил ее, а потом просто запретил проводить время со студентами колледжа. Они отнесутся к ней без уважения, пояснил он, и всегда будут подчеркивать собственное превосходство, и вообще изображать из себя ученую личность нечего… ею она не является и никогда не станет. Кроме того, она перестала следить за тем, во что одевается, — нечего ссылаться на трудности военного времени… девчонка, кривляка, ханжа… ничтожество, осмеливающееся осуждать американское вторжение в Юго-Восточную Азию.</p><p class="p1">Не ограничиваясь одними только тщетными призывами к миру, мать принимала посильное участие в спорах между ними, но с глазу на глаз всегда умоляла Элли слушаться приемного отца и быть «хорошей» девочкой. Элли начала было подозревать, что Стогтон женился на матери из-за страховки, выплаченной после смерти отца… Из-за чего же еще? Уж он-то явно не обнаруживал к ней никаких признаков чувства и не имел склонности «быть хорошим». Наконец однажды мать раздраженным тоном потребовала от нее хоть что-нибудь сделать для семьи и не пренебрегать более изучением Библии. Пока был жив отец, скептик в вопросах веры, не могло быть и речи о занятиях в воскресной школе. И как только мать могла выйти за Стогтона, едва ли не в тысячный раз спросила она себя. Библейский класс, настаивала мать, поможет ей выработать в себе общечеловеческие добродетели и, что гораздо важнее, докажет Стогтону, что «Элли тоже хочет с ним ладить». Из любви и жалости к матери она согласилась.</p><p class="p1">Теперь каждое воскресенье Элли отправлялась в постоянную дискуссионную группу при ближайшей церкви. Это был почтенный протестантский храм, не отмеченный ни малейшим пятнышком евангелизма. Занятия, которые проводила жена проповедника, посещали несколько студентов и большое число взрослых, главным образом пожилых женщин. Элли еще никогда всерьез не читала Библию и потому была настроена предвзято. В соответствии с не слишком-то справедливым мнением отца она заранее воспринимала Священное писание как «смесь истории и сказок диких кочевников». Весь конец недели перед первым занятием она тщательно вчитывалась в то, что показалось ей самым важным в Ветхом завете, пытаясь относиться к нему не предвзято. Элли сразу же заметила, что в первых двух главах Книги Бытия излагаются две различные и противоречащие друг другу версии Творения. Она не понимала, откуда мог взяться свет и как исчислялись дни до сотворения Солнца; кроме того, ей трудно было понять, на ком все-таки мог жениться Каин. Истории Лота и его дочерей, Авраама и Сарры, Дины, Иакова и Исава удивили ее. Она считала, что место трусости только в реальном мире: здесь сыновья могут обманывать и надувать старого отца, здесь мужчина может терпеть и одобрять совращение своей жены царем и не противиться этому, здесь отцы могут блудить даже с собственными дочерьми. И все эти мерзости словно и не осуждались в Священном писании. Правда, и не одобрялись, их просто как бы не замечали.</p><p class="p1">Когда занятия начались, она так и горела желанием разузнать подробнее о причинах этих загадочных противоречий, хотела, чтобы ее как-то просветили относительно Провидения Божьего и уж по крайней мере дали объяснения, почему автор или авторы не осудили все эти грехи. Но ее ждало разочарование. Жена священника явно тянула время: в дальнейшем она так и не коснулась всех этих историй. Когда же Элли осведомилась, как служанки дочери фараона, обнаружив в тростниках младенца, сумели понять, что он еврей, преподавательница сильно покраснела и попросила Элли более не задавать непристойных вопросов (в этот миг догадка осенила и Элли).</p><p class="p1">Когда они добрались до Нового завета, негодование Элли усилилось. В Евангелиях от Луки и Матфея происхождение Иисуса прослеживалось до царя Давида, но по Матфею между Давидом и Иисусом было двадцать восемь поколений, а по Луке — сорок три. Имена в обоих списках почти не совпадали. Как же могут оба этих Евангелия одновременно быть Словом Господним? Противоречия в генеалогии показались тогда Элли попыткой подогнать события под пророчества Исайи, результатом вольной обработки фактов. Нагорная проповедь очень растрогала ее, рекомендация же отдавать кесарево кесарю глубоко разочаровала, фраза же «не мир я пришел принести, но меч» вызвала и обиду, и слезы, потому что преподавательница дважды как бы не заметила ее вопроса о смысле изречения. Элли объяснила расстроенной матери, что старалась и сделала все, что могла, но более в воскресную школу ее не затянешь и на аркане.</p><p class="p1">Она лежала в постели. Летняя ночь была жаркой. Элвис пел: «Подари мне ночь, иного не прошу». Старшеклассники казались ей зелеными, а завязать какие-то отношения со студентами колледжа, с которыми она встречалась на лекциях, было просто невозможно, учитывая все предосторожности и притеснения со стороны отчима. Джон Стогтон был прав по крайней мере в одном, нерешительно призналась Элли себе: почти все молодые люди без исключения обнаруживали по отношению к ней одни лишь сексуальные устремления. И при том они оказались эмоционально более ранимыми, чем она ожидала. Быть может, одно вызывало другое.</p><p class="p1">Элли не надеялась попасть в колледж, хотя и собиралась покинуть родительский дом. Уж Стогтон не станет платить за нее, где бы она ни продолжала учебу, а кроткие увещевания матери явно не обнадеживали. Но с блеском сдав стандартные вступительные экзамены, она к собственному удивлению обнаружила, что скорее всего ее ждет учеба в одном из знаменитых университетов. Элли сумела выбрать правильные ответы из предлагавшихся, а потому собственный успех считала случайным. Пусть скудные знания позволяют тебе выбрать наиболее вероятные ответы, потом ты правильно отвечаешь еще на десять вопросов, но лишь в одном случае из тысячи на все десять ты ответишь правильно, решила она. В случае двадцати вопросов вероятность равнялась одной миллионной. Но эти экзамены ежегодно сдавали около миллиона школьников. Должен же был <em>кто-нибудь</em> оказаться удачливым.</p><p class="p1">Кембридж, штат Массачусетс, позволял ускользнуть из-под опеки Джона Стогтона, и все же он был достаточно близко, чтобы на каникулах можно было навещать мать, видевшую в ее поступлении выход из сложного положения: выбирать приходилось между оставляемой на собственное попечение дочерью и постепенно приходящим во все большее раздражение мужем. К своему удивлению, Элли предпочла Гарвард Массачусетсскому технологическому институту.</p><p class="p1">Такой она и появилась там в ориентационный период: любознательная юная женщина среднего роста с застенчивой улыбкой. Она поставила себе целью расширить собственные познания и помимо основных для нее курсов — математики, физики, техники — прослушать столько дополнительных, сколько сумеет. Но все сложности связывались с главными интересами. Оказалось, что участвовать в дискуссиях по физике нелегко: трудно было спорить с оппонентами, в основном принадлежавшими к мужскому полу. Поначалу они якобы не замечали ее слов. После краткой паузы дальнейшее обсуждение продолжалось, как если бы она вовсе не открывала рта. Изредка на высказанные ею вслух соображения реагировали, даже хвалили, но ее мысли не находили никакого отклика. Она прекрасно понимала, что говорит вовсе не глупости, и потому не хотела, чтобы ее мнением пренебрегали, а тем более, чтобы к ней относились свысока. Частично — но только частично — виной тому был ее тихий голос. Поэтому она быстро приобрела профессиональный тон, голос физика — ясный, уверенный, громкостью на несколько децибел превышающий потребности разговора. Имея такой голос, следовало почаще оказываться на высоте. И она выбирала моменты. Но долго сохранять подобный тон было трудно… иногда она боялась не выдержать и расхохотаться. Постепенно Элли стала специализироваться на быстрых, порой колких налетах — только с целью привлечь внимание — продолжать можно было и обычным тоном. Попадая в новую группу, ей каждый раз приходилось пробивать себе путь… просто чтобы погрузить свое весло в русло дискуссии. Мальчики, как правило, не видели в этом проблемы.</p><p class="p1">Иногда во время лабораторных работ и семинаров преподаватель начинал словами: «Джентльмены, продолжим. — Но, видя недовольное выражение лица Элли, добавлял: — Извините, мисс Эрроуэй, здесь вы для меня словно один из мальчиков». — Вот и все комплименты, на которые они были способны: мол, в их глазах она не совсем женщина.</p><p class="p1">Ей пришлось сопротивляться, чтобы не стать воинствующим мизантропом. Она обуздала себя. Мизантроп — это тот, кто не любит людей вообще, а не просто мужчин. Конечно, у этих типов нашлось и имя для тех, кто не любит женщин, — мизогинист. Но составители словарей позабыли еще одно слово — название женской неприязни к мужскому полу. За редчайшим исключением, все эти ученые мужи были мужчинами, подумалось ей, они даже не могли представить себе, что кому-то может потребоваться подобное слово.</p><p class="p1">Родительские заповеди мешали ей больше, чем многим другим. Однако новообретенная свобода — интеллектуальная, социальная и сексуальная — просто пьянила. И в те времена, когда многие ее сверстницы устремлялись мыслями к бесформенным одеяниям, сводящим к минимуму различия в одежде между полами, сама она понемногу поднималась до элегантности и простоты, вкупе с косметикой перенапрягавшими ее скромный бюджет. Есть и более эффективные способы сделать политическое заявление, думала она. Она завела несколько близких приятельниц и мимоходом несколько недоброжелателей; последним не нравились ее взгляды на моду, политические и религиозные воззрения и пыл, с которым она защищала собственное мнение. В такой вере в науку и восхищении ее возможностями многие молодые женщины видели укор для себя. Другие же находили в Элли то, что математики называют теоремой о существовании — доказательство возможностей женского пола, свидетельство того, что и женщина может не только преуспеть, но и задавать тон в науке.</p><p class="p1">Попав на гребень сексуальной революции, она принялась экспериментировать с постепенно возрастающим пылом и вдруг поняла, что любовники робеют перед ней. Связи ее длились не более нескольких месяцев или того меньше. В качестве единственной альтернативы приходилось скрывать свои интересы и мнения, что она вовсе не намеревалась делать во время учебы. Участь матери, обреченной на покорность и заточение в доме, не давала Элли покоя. Она стала интересоваться мужчинами, не связанными с академической и научной жизнью.</p><p class="p1">Некоторые женщины — так ей казалось — в своих увлечениях были полностью невинны, едва ли отдавая им хоть каплю рассудка. Другие же разрабатывали тактику с тщательностью полководца, детально продумывали варианты возможных событий, заранее оставляя себе путь для отступления, — и все для того, чтобы «заполучить» желанного мужчину. Впрочем, слово «желанный» таит в себе лазейку, думала Элли. Не то чтобы бедняга был действительно «желанным», он просто нужен как объект вожделения среди прочих, для которых и разыгрывалась вся эта грустная шарада. Большинство женщин, считала она, выбирают нечто среднее между обеими тактиками, пытаясь уравновесить страсть с далеко идущими замыслами. Быть может, втайне от сознания любовь и эгоизм иногда и перекликаются. Но проявления расчетливости в любовных вопросах всегда шокировали ее. Тут, решила Элли, симпатии ее на стороне торопливых. И тогда она познакомилась с Джесси.</p><p class="p1">В свой день рождения она забрела в погребок недалеко от Кенмор-сквер. Джесси пел ритм и блюзы, играл на ведущей гитаре. Он пел и приплясывал так, что она сразу же поняла, чего ей не хватает в жизни. На следующий вечер она опять пошла туда. Уселась поближе и во время обоих номеров музыканта не сводила с него глаз. Через два месяца они уже жили вместе.</p><p class="p1">Теперь она принималась за работу только тогда, когда выступления уводили его в Хартфорд или Бангор. Дни она проводила со студентами — юношами, с поясов которых гирляндой трофеев свисали брелочки с надписями; юношами с пластмассовыми ручками в нагрудных карманах; юношами подтянутыми, долговязыми и нервно посмеивающимися; юношами серьезными, тратящими все свое время, кроме сна, лишь на то, чтобы стать учеными. Поглощенные обучением, готовясь мерить глубины природы, сами они были почти беспомощны в обычных людских делах и, невзирая на глубину познаний, казались ей слишком патетичными и мелочными. Быть может, все их силы поглощали научный рост, непрестанное состязание в учебе, так что времени оформиться как личность уже не оставалось. А может, напротив, именно определенные социальные недостатки заставили их выбрать поле деятельности, где подобные дефекты будут не так заметны? Их общество, по ее мнению, годилось только для занятий наукой.</p><p class="p1">А по ночам был Джесси, приплясывающий и подвывающий, — некая природная сила, вторгшаяся в ее жизнь. В том году, что они провели вместе, Элли не могла припомнить ни единой ночи, когда у него проявилось бы желание спать. О физике и математике он не имел представления, но вокруг была Вселенная, в которой он бодрствовал, а вместе с ним и Элли какое-то время.</p><p class="p1">Ей хотелось увязать оба их мира. Она мечтала о всеобщей гармонии музыкантов и физиков. Но ее вечеринки всегда были неудачны и быстро заканчивались. Однажды Джесси заявил, что мечтает о ребенке. Он будет серьезным, перестанет скитаться, найдет постоянную работу. И даже согласен подумать о женитьбе.</p><p class="p1">— Ребенок? — спросила Элли. — Но тогда мне придется оставить учебу. А до окончания еще несколько лет. Если будет ребенок, я могу и не вернуться в университет.</p><p class="p1">— Да, — отвечал он, — у нас будет ребенок. А у тебя вместо этих занятий появятся другие.</p><p class="p1">— Джесси, — объяснила она, — мне необходимо учиться.</p><p class="p1">Он пожал плечами, и Элли словно увидела, как грядущие тяготы их совместной жизни соскользнули с его плеч. Отношения их продлились еще несколько месяцев, но этот короткий разговор решил все. Они поцеловались на прощание, и Джесси отправился в Калифорнию. Больше она никогда не слышала его голоса.</p><p class="p1">В конце 60-х годов Советский Союз осуществил успешную посадку космических аппаратов на поверхность Венеры. Они оказались первыми машинами, сделанными руками людей, которые заработали на поверхности другой планеты. Но за десятилетие до этого «прикованные» к Земле американские радиоастрономы обнаружили, что Венера является интенсивным источником радиоизлучения. Самое популярное объяснение гласило: массивная атмосфера Венеры поглощает тепло за счет парникового эффекта. Это означало, что на поверхности планеты царит адская жара и о хрустальных городах и мечтательных венерианцах не может быть и речи. Элли так хотелось, чтобы все было иначе, и она без особого успеха попыталась придумать объяснение: может быть, все это радиоизлучение исходит из каких-то раскаленных слоев, парящих над умеренно теплой поверхностью? Некоторые астрономы из Гарварда и Массачусетсского технологического института заявляли, что характер радиоизлучения не допускает никакой альтернативы жаре на поверхности Венеры. Существование сильного парникового эффекта казалось ей ошибочным, в некотором роде даже безвкусным — с чего бы это планете так разойтись. Но когда космический аппарат «Венера» опустился на поверхность и измерил температуру планеты, то оказалось, что ее вполне достаточно, чтобы растопить олово или свинец. Она представила себе, как тают хрустальные города — пусть даже для этого на Венере и не так жарко, — омывая поверхность планеты «слезными» каплями жидких силикатов. Конечно, она романтична. И давно знала об этом.</p><p class="p1">Но в то же время ей пришлось признать и могущество радиоастрономии. Так сказать, не отходя от дверей собственного дома, просто-напросто нацелив приборы на Венеру», ученые измерили температуру почти с той же точностью, как это сделали автоматические зонды тринадцать лет спустя. Электричество и электроника завораживали ее с тех пор, как она себя помнила. Но на этот раз ее впервые глубоко потрясла радиоастрономия. Сиди себе на своей родной планете и води радиотелескопом со всем набором полагающейся электроники, а информация об иных мирах сама собой будет сочиться по проводам наружу. Идея эта восхитила ее.</p><p class="p1">Элли начала посещать скромный университетский радиотелескоп. Время от времени ее просили помочь с наблюдениями и в обработке данных. На лето она поступила платным ассистентом в Национальную радиоастрономическую обсерваторию в Грин-Бэнкс, штат Западная Виргиния, где ей сразу же предоставили возможность с умеренным восхищением созерцать первый в мире радиотелескоп Грота Ребера, собранный им в 1938 г. на заднем дворе дома в городке Уитон, штат Иллинойс. Чего только не может достичь любитель! Ребер сумел обнаружить радиоизлучение от центра Галактики, когда поблизости не оказалось ни одного автомобиля с включенным двигателем и аппарат УВЧ за два дома был выключен. Центр Галактики, конечно, излучал намного сильнее, но медицинский аппарат располагался куда ближе.</p><p class="p1">Атмосфера терпеливой пытливости, изредка вознаграждаемой скромными открытиями, ей вполне подходила. Она попыталась измерить, каким именно образом будет увеличиваться число внегалактических радиоисточников, если заглянуть в космос поглубже. Потом Элли принялась размышлять над способами обнаружения слабых радиосигналов. В положенное время с отличием окончив Гарвард, она продолжила дипломную работу по радиоастрономии на противоположной оконечности страны — в Калифорнийском технологическом институте, Калтехе.</p><p class="p1">Так на год она оказалась ученицей Дэвида Драмлина. Он пользовался мировой известностью — и за блестящие идеи, и за то, что весьма неохотно терпел глупцов. В глубине души Драмлин принадлежал к той породе людей — их можно найти среди ведущих представителей любой профессии, — которые всегда опасаются, что вдруг объявится некто смышленее их самих. Драмлин преподал Элли кое-что из реальных основ предмета, в основном теоретические аспекты. Досужие языки уверяли, что Драмлин просто необъяснимо привлекателен для женщин, но Элли он частенько казался чересчур воинственным и эгоистичным. С его же точки зрения, она была уж слишком романтична. Вселенная строго повинуется своим собственным законам. И наука обязана подчиняться их внутренней логике, а не романтическим предрассудкам (однажды он даже сказал — девичьим мечтаньям). «Допустимо все, что не запрещено законами природы, — цитируя, заверял он. — Но все прочее запрещено». Драмлин читал свои лекции, а Элли разглядывала его, пытаясь докопаться до сути этой загадочной личности. Она видела перед собой мужчину средних лет, находящегося в великолепной физической форме, преждевременно поседевшего и с непременной сардонической улыбкой. На кончике носа — полумесяцы очков для чтения, над галстуком — квадратная челюсть, остатки выговора уроженца штата Монтана.</p><p class="p1">Доброе времяпрепровождение он понимал так: приглашал дипломников и младший научный персонал на обед (отчим приветствовал студенческое общество, но разделять с ними трапезу не считал нужным и расценивал это как экстравагантность). Во время застольных бесед Драмлин обнаруживал редкое чувство интеллектуальной собственности и направлял разговор на темы, в которых был признанным знатоком, быстро расправляясь со всяким, кто пытался противоречить. После обеда он почти непременно показывал им диапозитивы: доктор Д. с аквалангом в Коцумеле, на Тобаго или у Большого Барьерного рифа. На снимках он обыкновенно улыбался в камеру и даже под водой приветливо махал рукой. Иногда среди диапозитивов попадались подводные изображения его ученой сподвижницы — доктора Хельги Борк. Жена Драмлина всегда возражала именно против этих слайдов, утверждая, что их уже показывали после предыдущего обеда. На самом же деле присутствовавшие давно пересмотрели все слайды. Драмлин реагировал на выпады, лишний раз указывая на атлетические достоинства крепкой фигуры доктора Борк, и жена оказывалась посрамленной окончательно. Некоторые из студентов принимались бурно восхищаться кораллами и колючими морскими ежами. Другие же смущенно ерзали или утыкались носами в бокалы с авокадо.</p><p class="p1">Особо отличившиеся дипломники могли надеяться на приглашение (по двое или по трое) проехаться с ним на край любимого его утеса вблизи Тихоокеанских Палисадов. Ухватившись за перекладину дельтаплана, он спрыгивал с утеса в сторону спокойного океана, расстилавшегося в нескольких сотнях футов под ним. В их обязанности входило спуститься на прибрежную дорогу и подобрать его. Восторженно улыбаясь, он сверху пикировал на подъехавших. Драмлин всегда приглашал желающих последовать его примеру, но таковых находилось немного. Так он добивался победы над молодежью и наслаждался ею. Это было настоящее представление. Прочие преподаватели видели в дипломниках интеллектуалов, прагматически рассчитывая передать в руки молодого поколения факел познания. Драмлин же имел собственное мнение по этому вопросу: даже в дипломниках он усматривал будущих конкурентов. Трудно было заранее предсказать, кто из них дерзнет оспорить его право считаться «первым стрелком Запада». Поэтому всех следовало заранее поставить на место. На Элли он никогда не обращал особого внимания, но она была уверена, что однажды непременно попытается.</p><p class="p1">На второй год ее пребывания в Калтехе из проведенного за рубежом саббатического года<a href="ch2.xhtml#id49" class="a">[1]</a> вернулся Питер Валериан. Это был человек мягкий и внешне неброский. Никто, и прежде всего он сам, не считал его яркой личностью в науке. Но в послужном списке этого радиоастронома каждый год появлялись новые заметные достижения; сам он, когда очень уж допекали, объяснял такое постоянство «привычкой». Правда, в его научной биографии был и сомнительный аспект: приверженность к идее существования внеземного разума. Словом, все выглядело так, будто каждому члену кафедры было отпущено по одной слабости: Драмлину — дельтапланеризм, Валериану — жизнь в иных мирах. Другим оставались топлесс-бары, растения-хищники и еще нечто, именуемое трансцендентальной медитацией. Над существованием внеземного разума Валериан размышлял дольше и усерднее, а во многих случаях и тщательнее, чем кто бы то ни был. А когда Элли узнала ученого лучше, то поняла — в этом увлечении для него таилось очарование и волшебство, отсутствующие в повседневной преснятине его личной жизни. И все мысли и труды, связанные с идеей внеземного разума, были для него не работой — игрой. Воображение его воспаряло.</p><p class="p1">Элли нравилось слушать его. Ну словно попадаешь в Страну чудес или Изумрудный город. Только на самом деле все было еще увлекательнее, ведь его раздумья приводили в конце концов к единственному выводу: теперь, когда все продумано и обосновано, вот-вот начнутся события. Скоро-скоро, мечтала она, большие радиотелескопы Земли наяву, не в фантазиях, уловят сигналы. Но, с другой стороны. Валериан все портил строгими физическими соображениями, старательно подчеркивая, что они должны отвечать реальности. Получалось нечто вроде сита, отсеивавшего крупицы полезной информации в мутных потоках. Внеземляне и их техника обязаны придерживаться законов природы — это положение сокрушило многие весьма обнадеживающие идеи. Но то, что оставалось в сите, выдерживало самый скептический анализ с точки зрения и астрономии, и физики и могло оказаться истинным, конечно в порядке возможности. Разумеется, все факторы не учтешь, но умные люди когда-нибудь докопаются до всех необходимых подробностей.</p><p class="p1">Валериан всегда подчеркивал, что люди пребывают в плену собственного времени, культуры и биологии, что наше воображение уже по определению фундаментально ограничено и не в силах измыслить полностью отличные от нас существа или цивилизации. Ведь эволюция происходит в совершенно различных условиях, и разумные существа, населяющие планеты Галактики, обязательно окажутся совсем не такими, как мы. Конечно, куда более развитые расы обладают абсолютно невероятной, с точки зрения землян, технологией — это он едва ли не гарантировал — и могут изменять законы природы. Только совершенно близорукие люди могут предполагать, говорил Валериан, пока они проходили мимо цепи оштукатуренных арок, словно сошедших с картины Де Кирико<a href="ch2.xhtml#id48" class="a">[2]</a>, что все важные законы природы были обнаружены сразу, едва наше поколение занялось наукой. Своя физика будет и в XXI в., и в XXII в., даже в четвертом тысячелетии. Наши представления о способах связи технологически развитых цивилизаций могут оказаться смехотворными.</p><p class="p1">Но тогда, постоянно уверял он себя, внеземлянам надо намекнуть, насколько отсталый мирок наша Земля. Будь мы посмекалистей, они уже бы знали про нас. А мы едва лишь научились ходить на двух ногах, только в прошлую среду открыли огонь, а вчера к вечеру ненароком наткнулись на ньютонову механику, уравнения Максвелла и радиотелескопы, и вот теперь смутно догадываемся о великом объединении законов физики. Валериан уверен, что общение окажется несложным делом. Если уж внеземляне и заведут разговор с такими тупицами, то примут меры, чтобы их поняли. Именно потому, добавлял он, и у него самого появится шанс на успех, как только мы получим послание со звезд. Если ты лишен блеска — это тоже достоинство. Лично он уверен, что ему известно все, о чем следует знать тупицам.</p><p class="p1">По согласованию с кафедрой темой для докторской диссертации Элли выбрала чувствительные элементы радиотелескопов. Она воспользовалась своими способностями в области электроники, тема давала возможность избавиться от склонного к теоретизированию Драмлина и продолжить общение с Валерианом, не делая при этом сомнительного с точки зрения профессиональной репутации жеста. В качестве темы для диссертации исследование внеземных цивилизаций было бы слишком умозрительным предметом. У отчима уже давно вошло в привычку объявлять все ее разнообразные интересы либо нереалистичными и амбициозными, либо, реже, потрясающими своей тривиальностью. Окольными путями — она с ним теперь не разговаривала — он узнал тему ее диссертации и счел очень скучной.</p><p class="p1">Она возилась с рубиновым мазером. Рубин в основном состоит из оксида алюминия, почти совершенно прозрачного вещества. Красный цвет камню придает примесь хрома, распределенного во всем объеме кристалла. Если к рубину приложить сильное магнитное поле, то энергия атомов хрома возрастет, или, как говорят физики, они перейдут в возбужденное состояние. Ей нравилось представлять себе эту атомную мелюзгу, деловито кишащую в любом усилителе, за важным делом — усилением слабого радиосигнала. Чем сильнее магнитное поле, тем больше возбуждаются атомы хрома. Она научилась подмешивать в рубин примеси лантана так, чтобы мазер можно было настроить на более узкий диапазон частот; теперь она могла обнаруживать более слабый сигнал. Созданный Элли детектор приходилось погружать в жидкий гелий. Используя свой прибор на одном из радиотелескопов Калтеха в Оуэнс-вэлли, она сразу же обнаружила в совершенно новом диапазоне частот то, что астрономы называют трехградусным фоновым излучением черного тела — остатки радиоспектра невообразимо огромного взрыва, породившего нашу Вселенную, — Большого взрыва, как его называют ученые.</p><p class="p1">Ничего себе получается, рассуждала она. Берем инертный газ из воздуха, превращаем его в жидкость, вводим в рубин примеси, окружаем его магнитом… и обнаруживаем отблеск света Творения.</p><p class="p1">И сама в удивлении качала головой. Любому, кто не знаком с соответствующими разделами физики, подобные заявления могли бы показаться чистейшей некромантией. Разве можно было объяснить все это лучшим умам прошлого тысячелетия. Правда, они знали о воздухе, рубинах, магнитном железняке, но о жидком гелии, вынужденном излучении и сверхпроводящих насосах не имели даже представления.</p><p class="p1">В самом деле, размышляла Элли, они не знали о радиочастотном спектре, даже о спектре вообще, ну, может быть, имели представление о радуге. Они не знали, что свет — это электромагнитные волны. И разве можно надеяться, что мы сами поймем науку цивилизации, опередившей нас на тысячу лет?</p><p class="p1">Рубины приходилось изготовлять крупными партиями: нужные качества обнаруживались лишь у немногих. Внешне они не походили на драгоценные камни и большей частью были невелики. Кое-какие из забракованных камней Элли стала носить. Они шли к ее темным волосам. Но и после тщательной огранки эти рубины вспыхивали в броши или кольце странным отблеском, если свет падал на них под определенным углом, или отсвечивали желтизной. Своим друзьям, не принадлежавшим к числу ученых, она объясняла, что любит рубины, но просто не в состоянии себе их позволить. Словом, как тот ученый, что первым открыл биохимическую сущность фотосинтеза зеленых растений, а потом все носил то сосновые иглы, то веточку петрушки в лацкане пиджака. Учитывая ее профессиональный рост, коллеги именовали это крохотной идиосинкразией.</p><p class="p1">Грандиозные радиотелескопы на нашей планете располагаются в глухих местечках по той же самой причине, что завела на Таити Поля Гогена, — работать продуктивно они могут только вдали от цивилизации. А когда гражданское и военное радиовещание заполонило эфир, радиотелескопам пришлось прятаться: искать одиночества в безвестной пуэрториканской долине или отправляться в ссылку — в полупустыни Нью-Мексико или Казахстана. Но радиопомехи с каждым годом становились сильнее, и теперь уже появились основания выносить радиотелескопы за пределы Земли. Ученым, уединившимся на этих далеких островках науки, поневоле приходится быть целеустремленными однодумами. Жены бросают их, а дети сбегают из дома при первой же возможности, но астрономы не сдаются. И при этом никогда не считают себя мечтателями. Постоянные сотрудники таких дальних обсерваторий — люди практичные: это в первую очередь экспериментаторы, знатоки антенн, эксперты по части обработки данных; всякими там квазарами или пульсарами интересуются уже в меньшей степени. Словом, они не из тех, что в детстве мечтали о звездах; просто им было некогда — приходилось возиться с карбюратором семейной машины.</p><p class="p1">После успешной защиты диссертации Элли назначили ассистентом на обсерваторию Аресибо, огромную чашу поперечником 305 метров, сооруженную на дне карстовой воронки в предгорьях на северо-западе Пуэрто-Рико. И она с пылом принялась за исследования. С помощью своего лазерного детектора и самого большого радиотелескопа планеты Элли прослушивала всевозможные астрономические объекты: ближние планеты и звезды, центр Галактики, пульсары и квазары. Как полноправный сотрудник обсерватории, она располагала достаточным временем для наблюдений. Доступ к огромным радиотелескопам осуществляется на соревновательной основе — у ученых всегда находится больше тем для исследования, чем можно выполнить. Поэтому предоставление постоянным сотрудникам обсерватории определенного времени для наблюдений — бесценный дар. Многие астрономы только по такой причине и согласны жить в этих Богом забытых местах.</p><p class="p1">Она собиралась прослушать и несколько ближайших звезд, попробовать отыскать сигналы искусственного происхождения. Разработанные ею детекторы позволили бы услышать радиошум Земли с расстояния в несколько световых лет. А передовая цивилизация, намеревающаяся просветить нас, без сомнения, способна потратить на передачи куда больше энергии, чем земляне. Телескоп Аресибо, работая в режиме радара, способен послать в заданном направлении один мегаватт мощности, думала она, тогда цивилизация, даже чуть опережающая нас, может передать сотни мегаватт или более! Если такая цивилизация наведет на Землю радиотелескоп размером с Аресибо, земная обсерватория обнаружит аналогичный источник в любом месте галактики Млечного Пути. Размышляя о поисках внеземного разума, она всегда удивлялась: люди могли уже сделать так много, но на деле… Она решила, что на подобные вещи попросту выделяли недостаточно средств, хотя едва ли можно представить себе более важную тему, чем эта.</p><p class="p1">«Эль Радар» — так местные жители звали установку в Аресибо. Ее назначение оставалось для них в общем неясным, но она позволяла обеспечить столь желанной работой сотню человек. Молодых туземных женщин надежно прятали от астрономов-мужчин, в результате последних почти в любое время дня и ночи можно было видеть на круговой дорожке вокруг телескопа, где они трусцой избавлялись от нервного перевозбуждения. И внимание, уделявшееся Элли сразу же по прибытии, которое и поначалу воспринималось ею без благосклонности, вскоре стало просто помехой для исследований.</p><p class="p1">Вокруг было очень красиво. Вечерами через окно наблюдательной рубки она частенько следила, как за противоположным краем долины собирались грозовые облака — за одним из колоссальных пилонов, в котором размещались энергоподводы и ее только что установленная лазерная система. На вершине каждого из пилонов поблескивали красные огоньки — маяки для сбившегося с дороги залетного аэроплана. Часа в четыре утра она выходила из душного помещения подышать, послушать хор местных наземных лягушек, называемых здесь «кокуи» в подражание издаваемому ими крику.</p><p class="p1">Некоторые астрономы жили неподалеку от обсерватории, впрочем, незнание испанского языка и неумение воспринимать незнакомую культуру обрекали и их самих, и их жен на одиночество. Другие предпочитали жить на базе ВВС Рэми, располагавшей единственной на всю округу англоязычной школой. Но полтора часа езды в автомобиле тоже усиливали ощущение изоляции. Непрестанные угрозы пуэрториканских сепаратистов, ошибочно убежденных в важном военном назначении обсерватории, лишь усиливали еле сдерживаемую истерию, вечное опасение, что местная политическая ситуация вот-вот выйдет из-под контроля.</p><p class="p1">Через некоторое время прибыл с визитом Валериан. Официально он намеревался прочесть лекцию, но было очевидно, что одновременно ему хотелось ознакомиться с делами Элли и обеспечить ей нечто вроде психологической поддержки. Но работа шла просто отлично. Элли успела обнаружить неизвестное скопление межзвездных облаков молекулярного газа, потом с весьма высоким временным разрешением измерила некоторые характеристики пульсара в центре Крабовидной туманности. И даже прослушала три дюжины ближайших звезд, но положительных результатов не получила. Один-два подозрительно регулярных сигнала — и все. Она вновь обследовала подозрительные звезды — на этот раз ничего необычного не было. Если долго слушаешь звезды, рано или поздно космические или земные шумы сложатся так, что сердце невольно дрогнет на миг. Надо только успокоиться и проверить. Если сигнал не повторился, его спокойно можно считать ложным. Строгость к себе просто необходима, если действительно намереваешься сохранить интеллектуальное равновесие, пытаясь услышать чужих. И она собиралась быть серьезной, ограничивая свое любопытство, заведшее ее в эти края.</p><p class="p1">Воспользовавшись своими скудными запасами в холодильнике общежития, Элли соорудила некое подобие закуски для пикника, и теперь они с Валерианом сидели на самом краю гигантской чаши. Вдали группа рабочих чинила или меняла панели, осторожно переступая по алюминиевым листам специальными снегоступами, так что прорвать тонкий металл и свалиться вниз они не могли. Валериан хвалил ее. Потом они обменялись кое-какими сплетнями, перемежая их самыми интересными и свежими научными фактами. Разговор перешел на ПВЦ, как по первым буквам начинали называть поиск внеземных цивилизаций.</p><p class="p1">— Элли, а ты не хочешь полностью посвятить себя этому делу? — спросил Питер.</p><p class="p1">— Я еще не думала об этом. Но ведь это практически невозможно. Насколько мне известно, нигде в мире этим делом не занимаются, по крайней мере на крупных установках.</p><p class="p1">— Пока нет, но это вполне реально. Несколько небольших тарелок рядом с громадной чашей позволит использовать крупный радиотелескоп для решения проблемы ПВЦ. Конечно, это не исключает обычных радиоастрономических наблюдений. Мы получим великолепный интерферометр. Пока это всего лишь возможность — сооружение обойдется недешево, здесь нужны действительно целенаправленные действия, и еще — годы и годы. А пока можно обдумать все это.</p><p class="p1">— Питер, я только что обследовала сорок с лишним ближайших звезд, не слишком отличающихся от Солнца по спектральному классу. Я использовала 21-см водородную линию, которую все считают идеальной для радиомаяка, потому что водород — самый распространенный атом во Вселенной, и так далее… Я производила измерения с никогда еще не достигавшейся точностью. И не услышала ничего — даже намека на искусственные сигналы. Может быть, там никого нет? И все это — пустая трата времени?</p><p class="p1">— Как было с жизнью на Венере? Ну в тебе просто заговорило разочарование. Конечно, Венера похожа на преисподнюю, но это только одна планета, в Галактике их сотни миллионов. И ты прослушала лишь горстку звезд. Как по-твоему, не рановато ли сдаваться? Ты сделала не более миллионной части всей работы, а может быть, и меньше, учитывая диапазон частот.</p><p class="p1">— Я знаю. Но неужели вы не понимаете: если они есть — тогда они повсюду. Пусть в тысяче световых лет от нас живут какие-нибудь смышленые ребята, что может помешать им устроить себе передовой пост на нашем заднем дворе? Иначе вопросами ПВЦ можно заниматься целую вечность, не приблизившись даже к концу работ.</p><p class="p1">— О, слышу речи Дейва Драмлина. Если мы не сумеем найти чужаков еще при его жизни, незачем тратить время на подобный вздор. Люди только начинают заниматься ПВЦ. Ты ведь <em>знаешь</em>, сколько здесь существует возможностей. И мы пока не вправе исключить даже одну из них. Мы обязаны быть оптимистами. В минувшие столетия на эту тему можно было размышлять целую жизнь, но так ничего и не сделать, чтобы найти ответ. Наше время уникально. Впервые <em>любой</em> человек может заняться поисками внеземного разума. Ты придумала детектор, способный обнаружить цивилизации на планетах, кружащих вокруг миллионов звезд. Успеха не гарантирует никто. Но разве существует в науке более важный вопрос? Кстати, представь себе, вдруг окажется, что они постоянно шлют на Землю сигналы, но никто здесь не желает даже прислушаться! Шутка, дурачество?! Нет! Позор для нашей цивилизации… ведь мы могли бы услышать их, но не пожелали!</p></span></span>
