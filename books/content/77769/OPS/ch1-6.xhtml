<span><span id="id4"><div class="title2">
<p class="p">3. Белый шум</p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v">Нам сладостен услышанный напев,</p>
<p class="v">Но слаще тот, что недоступен слуху.</p>
</div>
<p class="text-author">Джон Китс. «Ода греческой вазе»</p>
</div>
</div><div class="epigraph">
<p class="p1">Отъявленной лжи чаще внемлют в безмолвии…</p>
<p class="text-author">Роберт Стивенсон. Virginibus Puerisque</p>
</div><p class="p1">Долгие годы неслись импульсы. Иногда на пути в кромешной тьме попадалось косматое облако газа и пыли, которое забирало кроху энергии или рассеивало. Чуть ослабевший сигнал продолжал свой путь в прежнем направлении. Там, впереди, светился неяркий желтый огонек, он становился все ярче, остальные же не изменялись. Для человеческого глаза он оставался точкой, но теперь она была самой яркой на небе. Импульсы достигли роя гигантских снежков.</p><p class="p1">В административное здание обсерватории «Аргус» вошла стройная женщина, на вид ей было за тридцать пять. Большие и широко расставленные глаза смягчали резковатые черты лица. Темные длинные волосы свободно подобраны на затылке черепаховой заколкой. Неофициальный наряд — тенниска, вязаная кофта и юбка цвета хаки. Дама направилась по коридору первого этажа к двери с табличкой «Э.Эрроуэй. Директор». На руке, потянувшейся к сложному замку, ключом к которому служил ее палец, блеснуло кольцо со странным мутно-красным камнем непрофессиональной огранки. Включив настольную лампу, она пошарила в ящике, извлекла из него пару наушников. На миг на стене возле стола осветилась цитата из «Притч» Франца Кафки:</p><div class="poem">
<div class="stanza">
<p class="v">Дано Сиренам пострашнее песен</p>
<p class="v">Оружие — коварное молчание…</p>
<p class="v">Иной и спасся бы, их голоса</p>
<p class="v">Услышав…</p>
<p class="v">Но от молчания — нет спасения.</p>
</div>
</div><p class="p1">Погасив свет легким движением руки, в полутьме она направилась к двери.</p><p class="p1">В зале управления она быстро убедилась, что все в порядке. В окне ей были видны несколько радиотелескопов из тех, что ста тридцатью одним механическим цветком глядели в небо на десятках километров поросших кустарником пустынь штата Нью-Мексико. Было уже раннее утро, легла она поздно. Радиоастрономией можно заниматься и при дневном свете: воздух не рассеивает идущие от Солнца радиоволны, как это делает он с видимым светом. Если не глядеть на Солнце, для радиотелескопа дневное небо черно, как угольная яма; звездами светят на нем источники радиоизлучения.</p><p class="p1">Там, по ту сторону неба, за земной атмосферой, Вселенная наполнена радиолучами. С помощью радиоволн можно исследовать планеты, звезды и галактики, громадные облака органических молекул, дрейфующие среди звезд, изучать происхождение, эволюцию и судьбу Вселенной. Но все радиоволны порождены физическими процессами — их вызывают электроны, несущиеся по спирали в магнитном поле Галактики, молекулы межзвездного газа, сталкивающиеся друг с другом… отдаленные отголоски Большого взрыва, наполняющие все пространство; к моменту сотворения Вселенной они были гамма-лучами, но красное смещение превратило их в прохладные и тихие радиоволны.</p><p class="p1">И за все те несколько десятилетий, прошедших со дня, когда люди занялись радиоастрономией, из глубин космоса к Земле ни разу не пришел настоящий сигнал, искусственный, посланный инопланетянами. Случались ложные тревоги. Периодические колебания радиоизлучения от квазаров и в особенности пульсаров ученые на первых порах с неуверенностью и трепетом принимали за признаки существования иных населенных миров, за радиомаяки, намечающие путь неведомых кораблей, пронзающих пространство. Квазары оказались мощными источниками энергии, может быть, их порождали огромные черные дыры в центрах галактик, многие квазары были в два раза ближе нас к мигу создания Вселенной.</p><p class="p1">Пульсары — это просто быстро вращающиеся атомные ядра величиной с целый город. Правда, ученым случалось принимать послания, весьма таинственные и объемистые, в известной степени даже разумные, но, увы, лишь отчасти внеземного происхождения. В небе было полно разных секретных спутников — разведывательных и связных. Затянутые в мундиры хозяева этих машин холодно внимали мольбам горстки миролюбивых радиоастрономов. Иногда по небу пролетали настоящие бандиты, словно и не слыхавшие про международные соглашения по системам связи. Судебные разбирательства не проводились и приговоры не выносились. Просто все страны дружно отказывались принять на себя ответственность… Но отчетливого внеземного искусственного сигнала все не было.</p><p class="p1">Людям казалось, что жизнь вездесуща; ведь вокруг так много планетных систем, столько миров, которым были предоставлены миллионы лет, необходимые для биологической эволюции… Они не могли поверить, что скорее всего Галактика вовсе не кишит разумными существами. Радиоволны распространяются со скоростью света, которую, по мнению многих, невозможно превысить. Их легко посылать и легко принимать. Даже весьма отсталые в технологическом отношении цивилизации, вроде той, что существует на Земле, должны овладевать радиосвязью в самом начале изучения физического мира. Овладев только зачатками радиотехнологии, уже через несколько десятилетий после изобретения радиотелескопа можно поддерживать связь с цивилизациями, находящимися вблизи центра Галактики. Но в небе столько уголков, в которые следует заглянуть, столько частот, на которых могут вещать чужие цивилизации, что потребовалась систематическая программа наблюдений… и терпение. Обсерватория «Аргус» проработала уже более четырех лет, и лишь изредка наблюдателей дурачили «призраки» — ложные сигналы. Но сообщений не было.</p><p class="p1">— Добрый день, доктор Эрроуэй.</p><p class="p1">Одинокий инженер любезно улыбнулся ей, она кивнула в ответ. Всеми радиотелескопами проекта «Аргус» управляли компьютеры. Система сама неторопливо сканировала небо, сопоставляя сигналы, получаемые радиотелескопами. Элли поглядела на анализирующее устройство, рассчитанное на миллион каналов, на блоки электронной памяти, занимающие целый простенок, на дисплей спектрометра.</p><p class="p1">Астрономам и инженерам оставалось не слишком много работы, пока телескопы годами терпеливо прощупывали небо. Когда они обнаруживали что-нибудь интересное, автоматически включался сигнал тревоги, и ученые, участвующие в проекте, дружно подпрыгивали в кроватях, если это случалось ночью. Тогда Эрроуэй отправлялась к приборам, чтобы в очередной раз убедиться, что приборная ошибка вызвана прохождением какого-нибудь американского или советского космического аппарата. Вместе с инженерами она занималась вопросами повышения чувствительности оборудования. Присуща ли космическим излучениям какая-то упорядоченность? По ее распоряжению телескопы переключали иногда на разные экзотические объекты, обнаруженные другими обсерваториями. Элли помогала штатным сотрудникам и гостям в работах, не связанных с ПВЦ. Она летала в Вашингтон — поддерживать интерес к «Аргусу» у финансирующей организации — Национального научного фонда. Изредка выступала с сообщениями о проекте — в Ротарианском клубе Сокорро, в Университете штата Нью-Мексико в Альбукерке, иногда доводилось приветствовать предприимчивых репортеров, залетевших в дальние края.</p><p class="p1">Элли приходилось стараться, чтобы не покориться рутине. Среди ее сотрудников попадались достаточно симпатичные мужчины, но даже если считать допустимыми интимные отношения с собственным подчиненным, то надо признать, что общество этих людей ее не вдохновляло. Правда, состоялось несколько скоротечных и бурных, но совершенно случайных романов кое с кем из местных жителей, не имевших абсолютно никакого отношения к проекту «Аргус». Скукой или разочарованием были вызваны поступки, связанные с этой стороной ее жизни, сказать трудно. Она уселась перед одним из пультов, включила наушники. Было бы глупым тщеславием надеяться — она понимала это, — что, прослушав один-два канала, можно обнаружить некую упорядоченность сигнала, которую пропустил компьютер, контролирующий сразу миллион каналов. Но тут она испытывала хотя бы ощущение собственной пользы. Прищурив глаза, Элли откинулась назад, лицо ее заволокло почти дремотное выражение. А ведь и впрямь мила, согласился сам с собой инженер.</p><p class="p1">Как всегда, небо пищало и скрипело; помехи сливались в хаотичный дрожащий шум. Однажды, когда она прослушивала часть неба со звездой АС+79 3888 в созвездии Кассиопеи, до ее слуха донеслось пение; оно то появлялось, то исчезало, почти не различимое, в него трудно было поверить. Та самая звезда, к которой вечно будет лететь «Вояджер-1», пролетевший мимо Нептуна. Космический аппарат унес на себе золотую звуковую пластинку с приветствием, образами и песнями Земли. Итак, свою музыку они посылают нам со скоростью света, а мы отвечаем в десять тысяч раз медленнее? Но всякий раз, слушая беспорядочные помехи, Элли вспоминала знаменитое правило Шэннона из теории информации: если не знаешь ключа к коду, наиболее эффективно закодированное сообщение невозможно отличить от шума. Она быстро нажала две кнопки на пульте, включились сразу две частотные полосы — по одной на каждый наушник. Она поискала поляризованные сигналы, сравнила контрастность линейной и круговой поляризации — можно было выбирать любой из миллиона частотных каналов. И потратить целую жизнь, пытаясь превзойти компьютер с помощью ограниченного человеческого слуха и скудного разума.</p><p class="p1">Ей было известно, что люди великолепно подмечают тонкие различия в упорядоченных сигналах и еще лучше придумывают их, если порядок полностью отсутствует. Всегда найдется такая последовательность импульсов, и какой-нибудь случайный всплеск помех на мгновение создаст впечатление синкопированного ритма, коротенького обрывка мелодии. Она включила сигналы с двух радиотелескопов, наведенных на известные внутригалактические источники, и, пробегая частотные диапазоны, слышала вечное глиссандо — «свист», рождающийся при рассеянии радиоволн на электронах в разреженном газе между радиоисточником и Землей. И чем ярче выражено глиссандо, тем больше электронов встретилось радиолучам на пути, тем дальше находится от Земли их источник. Она проделывала эту операцию так часто, что уже умела — просто по слуху с первого раза — точно оценить расстояние. На этот раз, по ее мнению, источник находился в тысяче световых лет от нашей планеты, далеко за пределами окрестностей Солнца, но все еще внутри великой галактики Млечного Пути.</p><p class="p1">Элли вернулась к методике прослушивания неба, принятой в «Аргусе». И вновь в сигналах не обнаруживалось упорядоченности. Как музыкант ловит отзвуки мелодий в отголосках дальней грозы, так и ей попадались случайные упорядоченные обрывки сигнала; они преследовали ее, с такой настойчивостью протискивались в память, что иногда приходилось возвращаться к конкретным записям, чтобы проверить, действительно ли ее разум и впрямь сумел уловить то важное, что пропустили компьютеры.</p><p class="p1">Всю жизнь Элли дружила со снами. Она видела цветные сны, необычайно подробные и четкие. Например, могла увидеть лицо отца, заглянуть под заднюю крышку старого радиоприемника — во сне ей открывались любые подробности. Она всегда могла припомнить любой сон в самых мелких деталях, если не нервничала, как перед устным экзаменом на степень доктора философии или перед разрывом с Джесси. Но теперь Элли все реже могла припомнить увиденное во сне. К собственному огорчению, ей начали сниться звуки, как это бывает с теми, кто слеп от рождения. Где-нибудь под утро ее подсознание начинало выводить какую-нибудь музыкальную тему, мотив, который она никогда не слышала. Она просыпалась, брала ручку, которую теперь специально держала рядом с кроватью, рисовала нотную строку и наносила звуки на бумагу. Вечерами она иногда проигрывала записи и вспоминала, откуда доносились эти обрывки — из Змееносца или Козерога. К сожалению, ей пришлось признать, что ее психику одолевают призраки электронов и дырок, населяющие приемники и усилители, а еще — заряженных частиц и магнитных полей, пронизывающих холодный разреженный газ, посреди которого мерцают далекие звезды.</p><p class="p1">Звучала только одна тема, высокая и пронзительная, которая все повторялась и повторялась. Элли узнала ее не сразу. И поняла, что не слышала ее уже лет тридцать. Металлический шкив на бельевой веревке принимался жаловаться именно таким образом, когда мать тянула веревку к себе, чтобы под солнечными лучами оказалась очередная рубаха. Малышкой она любила наблюдать, как марширует по веревке армия прищепок, а когда никто не видел, обожала зарываться лицом в свежевысохшие простыни. Сладкая свежесть очаровывала. Если бы вдохнуть ее снова хоть раз! Она вспомнила, как однажды, заливаясь смехом, удирала от простыней, и мать одним грациозным движением подбросила ее кверху, казалось, к самому небу, а потом несла на руках, словно крохотную стопку отглаженного белья, которое укладывали в ящики шкафа, стоявшего в родительской спальне.</p><p class="p1">— Доктор Эрроуэй? Доктор Эрроуэй? — инженер глядел сверху на подрагивающие веки и мерно вздымающуюся грудь. Она дважды мигнула, сняла наушники и со слегка виноватым видом улыбнулась ему — случалось, что ее окликали и погромче: за космическим радиошумом в наушниках ничего не было слышно. И тогда Элли тоже кричала в ответ, чтобы не снимать наушники для недолгого разговора. Когда она оказывалась достаточно занятой, любой случайный и вполне дружеский обмен любезностями показался бы непосвященному резкой и гневной перебранкой, неизвестно почему разразившейся где-то посреди просторного помещения радиотелескопа. Но в этот раз она просто ответила:</p><p class="p1">— Извини, я, кажется, задремала.</p><p class="p1">— На проводе мистер Драмлин! Он в конторе у Джека… утверждает, что ему назначена встреча.</p><p class="p1">— Боже мой, я совсем забыла.</p><p class="p1">За прошедшие годы Драмлин не утратил своего блеска, но с тех пор, когда она была его аспиранткой, он приобрел немало новых привычек. Например, шокируя присутствующих, тянулся проверять, застегнута ли ширинка, если, по его мнению, никто этого не видел. Жизнь успела убедить Драмлина, что внеземлян не существует, а если даже это не так — люди не скоро встретятся с ними: цивилизаций слишком мало, они чересчур далеко. Драмлин прибыл в «Аргус» на еженедельный научный коллоквиум. У него, как поняла Элли, была еще одна цель. Оказалось, Драмлин отправил письмо в Национальный научный фонд. Он считал, что поиски внеземного разума на «Аргусе» следовало прекратить, а обсерваторию переключить на обычные радиоастрономические исследования. При встрече Драмлин извлек черновик письма из внутреннего кармана и настоял, чтобы Элли прочла его.</p><p class="p1">— Но мы проработали только четыре с половиной года и не успели еще обследовать и трети северного неба. Нам впервые удалось свести к минимуму радиошумы на оптимальных диапазонах. Зачем же прекращать работы в самом начале?</p><p class="p1">— Нет-нет, Элли, все труды окажутся бесполезными. Через двенадцать лет выяснится, что вы совершенно ничего не обнаружили, и тогда приметесь выпрашивать, чтобы аналогичную «Аргус» установку построили за новые сотни миллионов долларов где-нибудь в Австралии или Аргентине — разве можно забывать про южное небо. А когда и там ничего не выйдет, вы станете утверждать, что просто не можете обойтись без какой-нибудь орбитальной параболической антенны с волновой ретрансляцией, чтобы можно было прослушать миллиметровый диапазон. Разве сложно придумать новую причину для продолжения наблюдений и все нужные объяснения — почему внеземляне непременно будут использовать для передач именно те диапазоны, которые вы еще не прослушивали?</p><p class="p1">— Ах, Дейв, ну зачем вы повторяете все это в сотый раз? Неудача покажет нам, насколько редка разумная жизнь… по крайней мере разумная в той мере, что и мы сами, и почему-то стремящаяся к переговорам с такой отсталой цивилизацией, как наша. А если мы преуспеем — сорвем космический банк! Открытия большей значимости быть не может… вы ведь понимаете это.</p><p class="p1">— Но многим важнейшим работам так не хватает времени на радиотелескопах. Среди них работы по эволюции квазаров, двойным пульсарам, хромосферам ближайших звезд, даже эти полоумные исследования межзвездных белков. И все они ждут своей очереди, потому что ваша установка — а сейчас это лучшая фазированная антенна в мире — почти полностью занята ПВЦ.</p><p class="p1">— На ПВЦ уходит 75 процентов всего времени, Дейв, а 25 процентов мы тратим на рутинные радиоастрономические исследования.</p><p class="p1">— Не называй их рутинными. У нас появилась возможность заглянуть назад, в то время, когда образовались галактики, и даже в более ранние времена. Мы можем изучать сердцевины громадных молекулярных облаков и черные дыры в центрах галактик. Вот-вот произойдет революция в астрономии, она уже близко, а ты преграждаешь ей путь.</p><p class="p1">— Дейв, не переходите на личности. «Аргус» не стали бы строить, не будь у общественности такого интереса к ПВЦ. Идея этой установки принадлежит не мне. Вы же знаете, они предложили мне стать директором, когда последние сорок тарелок еще сооружались. ННФ стоит за…</p><p class="p1">— У них нет уверенности, а если я выскажусь… Ведь это же показуха. Просто уступка тем, кто фальсифицирует всякие сплетни об НЛО, а еще — редакторам комиксов и слабоумным подросткам.</p><p class="p1">Драмлин сорвался на крик, и Элли чувствовала безудержное желание прервать разговор. Обязанности и занимаемый пост то и дело заставляли ее попадать в научные сборища, где она оказывалась единственной женщиной, кроме прислуги и стенографистки. Несмотря на все ее долгие старания, орда ученых мужей по-прежнему предпочитала общаться только друг с другом, и Элли вечно перебивали, а ее мнением пренебрегали при первой же возможности. Находились среди ученых и такие, как Драмлин, испытывавшие к ней неизменную антипатию. Но он-то по крайней мере подобным образом относился и ко многим ученым-мужчинам, разражаясь вспышками гнева независимо от половой принадлежности ученых, с которыми имел дело. Ее присутствие не вызывало негативной реакции лишь у нескольких коллег-мужчин. Надо бы проводить с ними побольше времени, подумала Элли. Например, с Кеннетом дер Хииром, специалистом по молекулярной биологии из Института Солка, недавно назначенным советником президента по науке. И, конечно же, с Питером Валерианом.</p><p class="p1">Нетерпимость Драмлина к «Аргусу», как ей было известно, разделялась многими учеными. После первых двух лет работы радиотелескопа ее сотрудниками овладело нечто вроде меланхолии. В комиссариате или во время долгих и нудных дежурств происходили бурные споры относительно существования внеземлян. Мы не знаем, насколько они могут отличаться от нас. Трудно понять намерения даже наших собственных выборных представителей в Вашингтоне. Тем более намерения совершенно не похожих на людей существ, живущих на физически отличающейся от Земли планете в сотне или тысяче световых лет отсюда. Некоторые считали, что сигнал будет передаваться не в радиочастотном диапазоне, а в инфракрасном или видимом, даже, может быть, среди гамма-лучей. Что, если внеземляне уже давно сигнализируют, но до нужного уровня технологии нам расти еще тысячу лет?</p><p class="p1">Астрономы других обсерваторий делали замечательные открытия в мире звезд и галактик, обнаруживали объекты, по различным физическим причинам интенсивно излучавшие радиоволны. Они публиковали научные работы, посещали конференции, перспективность и целесообразность собственных работ придавали им уверенность. Астрономы «Аргуса» не стремились публиковаться, и про них всегда забывали, когда Американское астрономическое общество рассылало приглашения на свою ежегодную конференцию или на симпозиум и пленарные заседания Международного астрономического союза, которые проводились раз в три года. Поэтому в соответствии с рекомендацией Национального научного фонда ведущие сотрудники «Аргуса» выделили 25 процентов рабочего времени телескопа на исследования, не связанные с поиском внеземных цивилизаций. Тогда были сделаны кое-какие важные открытия: удалось обнаружить внегалактические объекты, движущиеся, как это ни парадоксально, со сверхсветовой скоростью; измерить температуру поверхности Тритона, крупного спутника Нептуна; исследовать темную материю на периферии ближайших галактик, там, где не видно звезд. Настроение сотрудников начало улучшаться. Персонал «Аргуса» ощутил себя на переднем крае астрономической науки. Времени, необходимого для полного прослушивания неба, конечно, стало больше. Но теперь профессиональная карьера каждого была застрахована. Не обнаружив признаков существования иных разумных существ, они могли извлечь другие секреты из сокровищницы природы.</p><p class="p1">Поиск внеземных цивилизаций, по первым буквам именовавшийся ПВЦ всеми, кроме кучки оптимистов, веривших в связь с внеземными цивилизациями (СВЦ), был повседневным рутинным занятием, нудной возней, ради которой и была построена большая часть установки. Но четверть рабочего времени самого мощного из существующих радиотелескопов Земли можно было использовать в других целях. Надо было лишь выполнить рутинные обязанности. Часть времени выделялась и астрономам других обсерваторий. Когда общее настроение улучшилось, оказалось, что многие сотрудники разделяют мнение Драмлина. С вожделением взирая на это технологическое чудо — на 131 радиотелескоп «Аргуса», — уже предвкушали, как будут пользоваться им для собственных, куда более важных исследований. Элли и убеждала Дейва, и спорила с ним, но это ни к чему не привело. Он был настроен совсем не дружелюбно.</p><p class="p1">Коллоквиум Драмлина частично являлся попыткой доказать, что внеземлян нет нигде. Если уж мы сами достигли столь многого за несколько столетий, спрашивал он, на что же способны действительно развитые существа? Да они же могут передвигать звезды, перестраивать галактики! Но во всем обозреваемом астрономами космосе не обнаружено даже признаков явления, которое нельзя объяснить естественными причинами, не обращаясь к гипотезе внеземного разума. Почему до сих пор «Аргус» не обнаружил ни единого радиосигнала? Или они считают, что на небе один-единственный передатчик, и надеются найти его? Так сколько же миллионов звезд они уже обследовали? Конечно, эксперимент очень важен, но его пора заканчивать. Не стоит прослушивать все небо. Ответ уже получен. Внеземлян нет ни в глубинах космоса, ни поблизости от Земли. Их вовсе не существует.</p><p class="p1">В ходе обсуждения один из астрономов «Аргуса» поинтересовался мнением Драмлина о «гипотезе зоопарка», гласящей, что внеземляне в космосе есть везде и повсюду, но они просто не хотят обнаружить признаков своего существования, а потому разумные расы скрывают от человечества все свидетельства своей деятельности в космосе… Так, специалист по поведению приматов, наблюдающий за стаей шимпанзе в буше, старается не попадаться им на глаза. На это Драмлин ответил другим вопросом: «Разве возможно, чтобы из миллиона цивилизаций в Галактике — а на такую цифру рассчитывают в „Аргусе“ — не нашлось ни одного браконьера? Едва ли все цивилизации способны неукоснительно соблюдать этический принцип невмешательства. Куда вероятнее, если бы они просто кишмя кишели возле Земли».</p><p class="p1">— На Земле, — отвечала ему Элли, — у браконьеров и лесничих примерно одинаковый уровень технологии. Но если окажется, что лесничие лучше оснащены технически… скажем, радарами и геликоптерами, то браконьерам нечего будет делать.</p><p class="p1">Среди штатных сотрудников «Аргуса» послышался ропот одобрения, но Драмлин только бросил:</p><p class="p1">— Не выкручивайся, Элли, ты просто выкручиваешься!</p><p class="p1">Чтобы проветриться, Элли завела привычку надолго уезжать в своем экстравагантном «Тандерберде» 1957 года с откидным верхом и крошечными окошечками по бокам заднего сидения. Часто ночами, откинув назад верх, она носилась по покрытой кустами пустыне, ее темные волосы трепал ветер. Казалось, что за эти годы она познакомилась с каждым убогим городком, с каждым плоскогорьем и холмом, с каждым полицейским на дорогах юго-запада штата Нью-Мексико. После ночного дежурства на телескопе ей нравилось стремительно проскочить мимо контрольного пункта «Аргуса» — проволочной ограды тогда еще не было — и, быстро переключив передачи, отправиться прямо на север. Когда она подъезжала к Санта-Фе, над горами Сангре-де-Кристо<a href="ch2.xhtml#id47" class="a">[3]</a> нередко появлялись первые проблески зари. Зачем это католики, спрашивала она себя, называют детали рельефа только во имя крови, тела и сердца Бога? Почему они оставляют без внимания мозг и прочие важные органы?</p><p class="p1">На этот раз Элли отправилась на юг к горам Сакраменто. Что, если Дейв прав? И ПВЦ вместе с «Аргусом» — всего лишь средство самообмана для кучки прогрессивно настроенных упрямцев-астрономов? Может быть, и впрямь исследования придется прекратить, если год за годом они не будут давать результатов, и ей придется придумывать новые стратегии действий передающих цивилизаций и изобретать все более совершенное и дорогостоящее оборудование? Когда именно придется признать неудачу? В тот миг, когда ей самой захочется сдаться и обратиться к чему-нибудь более надежному и гарантирующему успех? Японская обсерватория в Нобеяме только что объявила, что ее сотрудники обнаружили в плотном молекулярном облаке аденозин, сложную органическую молекулу — строительный блок ДНК. Если она потерпит неудачу с поиском цивилизаций, можно заняться поисками органической материи в космосе.</p><p class="p1">Когда дорога поднялась выше, она бросила взгляд в сторону южного горизонта на созвездие Центавра. В этой группе звезд древние греки видели химерическое существо — получеловека, полулошадь, — научившее Зевса мудрости. Но Элли никогда не удавалось увидеть кентавра в этой кучке слабых светил. Альфа Центавра, самая яркая звезда созвездия, просто чаровала ее. Звезда из числа ближайших, до нее всего четыре с четвертью световых года. На самом деле Альфа Центавра — тройная система, два солнца по близким орбитам кружат друг около друга, вокруг них обращается третье, более удаленное светило. Для землян свет всех трех звезд сливается в одну яркую точку. В особенно чистые ночи звезда над Мексикой была видна и снизу. Но после сильных ветров, поднимавших в воздух пыль, чтобы взглянуть на одно из ближайших светил, приходилось взбираться на гору повыше…</p><p class="p1">Элли выходила из машины и любовалась ею. Возможно, вокруг звезды кружили планеты, только с Земли их нелегко обнаружить. Они могут быть у каждого из трех солнц. Самой интересной орбитой с точки зрения небесной механики была бы стационарная восьмерка, описываемая планетой вокруг двух внутренних солнц. На что это похоже, дивилась она, жить в мире трех солнц? Пожалуй, там будет пожарче, чем в Нью-Мексико.</p><p class="p1">Узкое двухполосное шоссе, к удовольствию Элли, оказалось буквально под стражей. Она часто встречала кроликов, в особенности в Западном Техасе. Они копошились по обе стороны дороги, но под лучами новых кварцевых фар «Тандерберда» вставали на задние лапки, безвольно свесив передние. Казалось, целые мили ушастого почетного караула приветствуют ее… или ревущий автомобиль, несущийся в ночи. Они глядели вверх… принюхиваясь, поводили тысячей розовых носов, двумя тысячами глаз вспыхивали во тьме, когда адское устройство, грохоча, проносилось мимо них по дороге.</p><p class="p1">Быть может, для них это своего рода религия, подумала Элли. Возле дороги собираются в основном молодые кролики. Те, кому никогда еще не приходилось видеть автомобильные фары. Если подумать, два ослепительных луча света, летящих со скоростью 130 километров в час, представляют собой удивительное зрелище. Но хотя обочины кишели тысячами кроликов, ни посреди дороги, возле разделительной линии, ни на краях полотна она ни разу не видела ни одного из них, не видела даже мертвой тушки с ушами, прилипшими к мостовой. И зачем они выстраиваются по краям дороги? Возможно, это как-то связано с температурой асфальта? Но почему же никто из кроликов не пытается в несколько прыжков перескочить черную полосу, отделяющую его от собратьев? Что представляет дорога с точки зрения кроликов? Дело рук неизвестно зачем и откуда взявшихся чужаков, которых большинство грызунов никогда и не видело? Едва ли хоть кто-нибудь из кроликов интересовался всем этим.</p><p class="p1">Шорох шин на шоссе представлял собой тот же белый шум, и Элли поняла, что бессознательно ищет упорядоченности и в нем. Она стала прислушиваться ко многим источникам белого шума: двигателю холодильника, бурчавшему в ночной тишине, к струе воды, с плеском льющейся в ванну, к стиральной машине, когда приходилось заниматься бельем в крохотной комнатке возле кухни, к шуму волн… Она отправилась тогда поплавать с аквалангом вблизи острова Коцумел около Юкатана, но досрочно уехала — так хотелось побыстрее вернуться к работе. Элли прислушивалась к домашним источникам случайного шума, пытаясь определить, не больше ли в них упорядоченности, чем в межзвездных шумах.</p><p class="p1">Прошлым летом, в августе, она побывала в Нью-Йорке на заседании URSI (французская аббревиатура Международного научного радиосоюза). Ей сказали, что в подземке небезопасно, но тоска по белому шуму оказалась сильнее. В лязге и стуке подземной дороги ей чудился ключ к разгадке, и половину рабочего дня она потратила на путешествия: с 34-й стрит на Кони-Айленд, обратно через Манхэттен, а потом по другой линии к дальним окраинам — в Квинс. Она сделала пересадку на станции в Джамайке и вернулась в отель, где проводилась конференция, запыхавшаяся и слегка раскрасневшаяся — в конце концов был жаркий августовский день. Иногда поезд кренился на крутом вираже, тогда в вагоне гас свет и за окнами мелькали лампы дневного света. Ей казалось, что в каком-то невообразимом гиперрелятивистском межзвездном корабле она мчится через скопление юных голубых супергигантов. Потом, когда поезд выходил на прямую, огни загорались вновь, и она снова замечала кислый запах, качающиеся петли над головой, миниатюрные телекамеры в защитных кожухах с замазанными аэрозольной краской объективами, стилизованные многоцветные схемы ходов сообщения, проложенных под Нью-Йорком, тонкий визг тормозов при остановке на станциях.</p><p class="p1">Она вела себя несколько эксцентрично и понимала это. Но ведь всю жизнь она фантазировала. Да, конечно, она несколько увлеклась в своем пристрастии к шумам. Явного вреда от этого быть не могло. Никто ничего не заметил. По крайней мере это было нужно для работы, при таком настрое стоимость путешествия на Коцумел можно было исключить из налоговой декларации — как командировку для исследования шума прибоя. Она ощущала, что в какой-то мере становится одержимой.</p><p class="p1">Вздрогнув, Элли поняла, что приехала на станцию «Рокфеллеровский центр». Торопливо переступая через кучу свежих газет, брошенных на пол у двери вагона, она успела прочесть заголовок в «Ньюс пост»: «ГЕРРИЛЬЯС ЗАХВАТЫВАЮТ РАДИОСТАНЦИЮ ХОБУРГА». Если мы симпатизируем им, это борцы за свободу, подумала она. Если же нет — это террористы. Но когда сразу не выберешь, это геррильяс. Рядом в газете красовался портрет цветущего и уверенного в себе мужчины, над которым был заголовок: «КАК ОКОНЧИТСЯ МИР». ВЫДЕРЖКИ ИЗ НОВОЙ КНИГИ ПРЕПОДОБНОГО БИЛЛИ ДЖО РЕНКИНА. ИСКЛЮЧИТЕЛЬНО В «НЬЮС ПОСТ» НА ЭТОЙ НЕДЕЛЕ». Элли мельком проглядела заголовки и постаралась побыстрее забыть их. Увертываясь, она пробралась через оживленную толпу к отелю, где шла конференция, и успела как раз к сообщению Фудзиты о проекте гомоморфного радиотелескопа.</p><p class="p1">На шелест шин накладывалось периодическое постукивание на швах полотна, которое укладывалось различными бригадами дорожников Нью-Мексико в различные эпохи. Что, если проект «Аргус» уже принимает сообщение со звезд, только передача ведется очень медленно — один бит в час, или, скажем, в неделю, или в десять лет? Что, если пространство пронизывает медленная воркотня древних, весьма терпеливых цивилизаций, которым неоткуда узнать, что познание закономерностей утомляет нас уже за секунды или минуты? Что, если они живут десятки тысяч лет и <em>рреееччь иххх ооочччееннь мееедлееенна</em>? «Аргус» и не узнает об этом. Могут ли существовать столь долговечные существа? И хватит ли им всей истории Вселенной, чтобы не торопясь достичь высот разума? Не статистический ли разрыв химических связей, распад тел по второму закону термодинамики определяют скорость размножения этих существ? И не сокращает ли этот закон их жизнь? Или же они населяют старый и холодный мир, где даже молекулярные соударения происходят нечасто, например раз в день. И ей представился вполне привычный для земного взгляда радиопередатчик где-нибудь на метановом утесе, едва освещенном далеким солнцем, похожим на красного карлика. Безжалостные волны аммиака вгрызаются в берег, издавая белый шум, вовсе неотличимый от шума прибоя в Коцумеле.</p><p class="p1">Впрочем, не исключено и противоположное — какие-нибудь суетливые человечки, мельтеша, выпаливают за одну наносекунду радиосообщение в сотню страниц английского текста. Конечно, пользуясь узкополосными приемниками, воспринимающими небольшой диапазон частот, приходилось надеяться на длительные передачи. Быстрой модуляции таким прибором не уловить. Это следует непосредственно из интегральной теоремы Фурье, близко связанной с принципом неопределенности Гейзенберга. Так, например, если вы работаете с полосой пропускания в один килогерц, то не сможете выделить в ней сигнал с периодом модуляции меньше одной миллисекунды. Звуки сольются. Частотные диапазоны «Аргуса» были уже меньше одного герца, что позволяло обнаружить очень медленные модуляции, меньше одного бита в секунду. Было бы много легче обнаруживать еще более медленные модуляции, скажем длительностью больше часа, если, конечно, у вас хватает терпения, направив телескоп в одну точку, наблюдать за небом в течение многих часов. Но в небе так много уголков, куда следует заглянуть, сотни миллионов звезд ожидают своего исследователя. И потратить все свое время лишь на наблюдение за несколькими звездами просто немыслимо. Элли опасалась, что в поспешном стремлении прослушать все небо менее чем за человеческую жизнь люди забывают и про тараторок-стрекотунов и про тягучих медлителей, по капле выдавливающих слова.</p><p class="p1">Конечно, думала она, инопланетяне знают, какие частоты следует предпочесть. У них есть опыт межзвездной связи, есть и опыт общения с нарождающимися цивилизациями. И если существует некоторый рациональный диапазон скоростей передачи, пригодных для принимающей цивилизации, передающие воспользуются именно им. Модулировать ли за микросекунды, модулировать ли за часы? Во что это им обойдется? По земным стандартам все они там, наверху, обладают и немыслимыми энергетическими ресурсами, и невероятной техникой. Если они пожелают связаться с нами, то сделают все, чтобы облегчить нам прием. Пошлют сигналы по многим частотам, воспользуются модуляциями с различным временным масштабом. Им понятно, с каким отсталым мирком придется иметь дело, и пожалеют нас.</p><p class="p1">Но тогда почему мы еще не обнаружили их сигналы? Неужели Дейв прав, и внеземных цивилизаций не существует? А все эти миллионы миров — всего лишь безжизненные пустыни? И, значит, разум возник лишь в одном из темных закоулков непостижимо обширной Вселенной? Но как Элли ни старалась, отнестись всерьез к подобной возможности она не могла. Уж очень точно совпадала эта идея со всеми людскими опасениями и претензиями, с недоказуемыми доктринами о жизни после смерти и даже с псевдонауками вроде астрологии. Такая мысль была бы воплощением геоцентрического солипсизма, то есть концепции, в которой были убеждены наши предки, что <em>мы одни</em> в этой Вселенной. Аргументы Драмлина в основном сводились к этим мыслям. Уж очень хочется нам в это поверить.</p><p class="p1">Минуточку! Мы еще не провели даже однократного исследования северного неба с помощью телескопов «Аргуса». Повод для беспокойства возникнет лет через семь или восемь, если мы ничего не услышим. Во всей человеческой истории это первая возможность узнать, обитаемы ли другие миры. В случае неудачи мы только по-настоящему оценим эту редчайшую драгоценность — жизнь на нашей планете. В случае же успеха преобразуем всю историю нашего вида, разорвем путы провинциализма. При такой ставке можно пойти на некоторый профессиональный риск, сказала Элли себе, прижимаясь к обочине и разворачиваясь словно гонщик. Дважды переключив передачу, она направилась обратно к «Аргусу». Выстроившиеся вдоль дороги кролики, порозовевшую шерстку которых уже золотила заря, поворачивали головы ей вслед.</p></span></span>
