<span><span id="id25"><div class="title4">
<p class="p">22. Гильгамеш</p>
</div><div class="epigraph">
<p class="p1">Но никогда не вернется</p>
<p class="p1">Лишь то, что скрашивает нам жизнь.</p>
<p class="text-author">Эмили Дикинсон. «Стихотворение номер 1741»</p>
</div><p class="p1">И вот наступило время, повсюду объявленное зарей новой эры, когда похороны в космосе сделались привычной роскошью. Хорошо разрекламированная услуга особенно привлекала тех, кто в прежние времена завещал бы рассеять свой прах над графством, в котором вырос, на худой конец, над заштатным городком, где впервые сколотил состояние. Теперь такие люди могли распорядиться, чтобы их останки вечно, в обыденном понимании этого слова, кружили над Землей. Следовало только упомянуть об этом в завещании. Тогда, конечно, если у вас хватало на это денег, после смерти и кремации останки запрессовывали в крохотную, почти игрушечную урну с именем, датами рождения и смерти и небольшой эпитафией. По выбору покойного урну мог украсить религиозный символ (один из трех основных). Потом в компании сотен столь же миниатюрных гробов ракета уносила останки вверх на промежуточные высоты, чтобы не загромождать область геосинхронных орбит вверху и избежать сопротивления атмосферы на низких орбитах. И пепел усопших триумфально закружил над планетой в самом сердце поясов Ван Аллена, охваченный протонными бурями, — в эти края не отправит свой корабль ни один космический капитан, находящийся в здравом уме. Но у праха разума нет.</p><p class="p1">На этих высотах Землю охватило редкое кольцо погребальных спутников, хранящих останки выдающихся граждан планеты, которые несведущий звездный гость вполне мог бы принять за скорбное кладбище космического века. Опасность, связанная с посещением, исключала визиты скорбящих родственников.</p><p class="p1">Представляя себе это роскошное зрелище, С.Р.Хадден просто дивился, какой малой долей бессмертия согласны довольствоваться достойные богачи. Органические части их тела — мозг, сердце и все прочее, что придавало им внешний облик, — испепелялись в процессе кремации. После огня от тебя <em>не остается</em> уже ничего, думал он, — только пепел и кучка дробленых костей. Даже развитая цивилизация едва ли сумеет восстановить по ним твой облик. Вдобавок гроб с твоим прахом будет медленно печься в поясах Ван Аллена.</p><p class="p1">Куда спокойнее перед смертью сохранить некоторое число живых клеток со всей ДНК. Хаддену представлялась уже некоторая корпорация, за солидную плату замораживающая клетки эпителия, а затем отправляющая их на орбиту над поясами Ван Аллена, может быть, проходящую даже выше геосинхронных. Для этого и умирать не нужно. Делайте все заранее, пребывая в здравом рассудке. А уж потом инопланетные микробиологи или их земные собратья из далекого будущего воссоздают твое тело, клонируют его буквально из ничего. Ты же, потягиваясь, почесываясь и зевая, просыпаешься в десятимиллионном году. И пусть они ничего не могут поделать с твоим прахом — будут существовать многочисленные копии твоего генетического кода! Тогда можно считать себя <em>в принципе</em> живым. Физически ты будешь жить вечно.</p><p class="p1">Но Хадден размышлял, и даже эта схема начинала казаться ему слишком скромной. По правде говоря, жить будешь не ты — несколько клеток, соскобленных с одной из пяток. В лучшем случае по ним сумеют воспроизвести только твой внешний облик. А вовсе не тебя со всеми причудами и привычками. Серьезные люди могут прилагать к наследственной информации семейные фотографии, подробнейшие автобиографические описания, все любимые книги и записи… всю доступную информацию о себе. Даже марки лосьонов после бритья и диет-колы. Идея отдавала крайним эгоизмом и этим нравилась ему. В конце концов век и так породил эсхатологическую лихорадку. Так что не худо подумать о себе самом… и с неменьшим пылом, чем иные борцы за сохранение видов, экологии планеты или претенденты на массовое вознесение в числе избранных.</p><p class="p1">Кстати, откуда внеземляне узнают английский? Если они займутся восстановлением именно вашей личности, потребуется и знание языка. Придется приложить нечто вроде перевода — эта мысль приводила Хаддена в особый восторг. Задача, обратная дешифровке Послания.</p><p class="p1">Но для такого багажа необходима уже достаточно объемная капсула, так что можно будет и не ограничиваться несколькими клетками, а отправить целиком все тело. Быстрая заморозка после смерти дает вам дополнительные преимущества. Конечно, лучше, если здоровье будет в порядке, и кто бы там в будущем ни принялся за эту работу, можно облегчить ему дело. Оживить организм — это не вырастить его из одной клетки. Может быть, они сумеют оживить вас, только устранив причину смерти. Но если с заморозкой промедлили, скажем, потому, что родственники не сразу обнаружили ваш уход, шансы на оживление уменьшаются. Куда разумнее, думал он, осуществлять заморозку <em>перед</em> смертью. Вероятность оживления возрастет, правда, существенно уменьшится число тех, кто обращается за услугой.</p><p class="p1">Но почему тогда <em>непосредственно</em> перед смертью? Предположим, тебе известно, что жить осталось один-два года. Почему в этом случае не заморозиться сразу, чтобы мясцо не протухло? Но, увы, со вздохом признался Хадден самому себе, не исключено, что мучительная болезнь все равно останется неизлечимой и после оживления — можно заморозиться на геологическую эру и, пробудившись, незамедлительно умереть лишь потому, что инопланетяне представления не имеют о меланоме или об инфаркте миокарда.</p><p class="p1">Нет, решил он, его идея может найти идеальное воплощение одним лишь путем: находясь в полном здравии, человек направляется к звездам… без возврата. Такой вариант позволяет избежать болезней и старости. Уже во внешних областях Солнечной системы температура тела упадет до нескольких градусов выше абсолютного нуля. Дальнейшего охлаждения не потребуется. Обеспечен вечный уход. И свобода.</p><p class="p1">Но наконец логика подсказала ему и последний шаг. Если до межзвездных холодов лететь несколько лет, то и торопиться не стоит. С заморозкой можно подождать, пока не вылетишь из Солнечной системы. Нет нужды чересчур полагаться на криогенную технику.</p><p class="p1">По официальным данным, прежде чем отправиться на орбиту, Хадден принял предохранительные меры против любой возможной хвори, даже подвергся ультразвуковому дроблению камней в почках и желчном пузыре. Но смерть настигла его и там. Анафилактический шок. Поклонница завезла в космос пчелу среди фрезий. В холодном трюме «Нарнии» насекомое оцепенело, и, по совести, его не в чем было винить. Крошечное раздавленное тельце переслали судебным медикам и энтомологам. Миллиардера погубила пчела: этот факт не остался без внимания газетных передовиц и воскресных проповедей.</p><p class="p1">На самом же деле все было обманом. Не было ни пчелы, ни жала, ни смерти. Хадден чувствовал себя превосходно. Но чуть ли не с первым ударом часов, возвещавшим наступление Нового года, — через девять часов после включения Машины — возле «Мафусаила» заработали двигатели внушительного вспомогательного корабля. Ракета быстро достигла скорости удаления от системы Земля-Луна. Хадден назвал свой корабль Гильгамеш».</p><p class="p1">Всю свою жизнь Хадден копил богатство и думал о времени… Больше денег — больше власти, но хочется, чтобы их становилось еще больше. Власть и время взаимосвязаны: ведь смерть уравнивает всех людей. Поэтому древние цари и возводили себе памятники. Но сооружения рушились, свершения царей забывались, как и их имена. И что самое интересное, все они оказались мертвы, подобно дверному косяку. Нет, его способ куда элегантнее, красивее и сулит надежду. Он отыскал себе калитку в стене времени.</p><p class="p1">Если бы Хадден широко разрекламировал свои намерения, возникли бы определенные сложности. Каким может быть легальный статус Хаддена, если тело его покоится в десяти миллиардах километров от Земли при температуре четыре градуса Кельвина? Кто будет управлять его корпорациями? В одном из параграфов объемистого завещания он оставил наследникам новую корпорацию «Бессмертие Инк», занимающуюся криогенной и ракетной техникой. Он спихнул и эту заботу.</p><p class="p1">На «Гильгамеше» не было радио. Он знать не желал, что там случилось с Пятеркой. И того, что творится на этой планете, всех ее новостей, бодрых или вселяющих озабоченность… Более никакой бессмысленной суматохи и шума. Лишь одиночество, возвышенные думы и… молчание. В случае неожиданных неприятностей криогенные контуры «Гильгамеша» можно включить простым нажатием кнопки. А пока… он берет с собой целую библиотеку… любимые книги, музыку, видеоленты. Он не будет ощущать одиночества: ведь общество ему никогда не было нужно.</p><p class="p1">Ямагиси собирался отправиться вместе с ним, но в конце концов изменил свое решение — боялся, что долго не выдержит без привычных удобств и прислуги; подобное путешествие не сулило никаких удовольствий. Тем более прислугу негде было разместить. Однообразная пища и отсутствие развлечений могли вызвать лишь уныние. Но сам Хадден верил в свою мечту. Что ему удовольствия и удобства?</p><p class="p1">Через два года его летающий саркофаг попадет в гравитационную потенциальную яму Юпитера, и великан, словно из пращи, выбросит кораблик в межзвездные просторы. Целый день за его окном будет зрелище куда более величественное, чем на «Мафусаиле», — кипящие разноцветные облака Юпитера, самой большой из планет. Если бы приходилось выбирать, руководствуясь одним только внешним видом, Хадден предпочел бы Сатурн с его кольцами. Но до Сатурна с Земли надо было лететь четыре года — рискованно, учитывая все факторы. Если ищешь бессмертия, нужно соблюдать осторожность.</p><p class="p1">При таких скоростях до ближайшей звезды он будет лететь десять тысяч лет. Недолго, если твое тело заморожено почти до абсолютного нуля. И однажды — Хадден был в этом уверен — «Гильгамеш» окажется возле чужого солнца. А может быть, его погребальную ладью перехватят еще в мрачных глубинах пространства, сверхзоркие и мудрые существа поднимут на борт саркофаг и сразу поймут, что следует делать. Никто из людей не предпринимал подобного начинания. Ни у кого из жителей Земли не было возможности для этого.</p><p class="p1">И уверенный в том, что конец его жизни превратится в начало, Халден закрыл глаза и на пробу сложил на груди руки… а двигатели вновь коротко полыхнули, отдавая последнюю энергию, и вороненый корабль отправился в дальнее странствие к звездам.</p><p class="p1">Это случится через тысячи лет, думал он. Бог знает, что тогда станет с Землей. Теперь это не его дело. Да и никогда не было его делом. Пусть проходят тысячелетия, он будет спать в глубоком холоде космоса, а его саркофаг — нестись к звездам. Что рядом с ним Александр Великий, что Цинь Ши-хуанди, что фараоны. Он обставил всех. Он предусмотрел и собственное воскресение.</p></span></span>
