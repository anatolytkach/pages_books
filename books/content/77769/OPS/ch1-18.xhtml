<span><span id="id16"><div class="title3">
<p class="p">14. Гармонический осциллятор</p>
</div><div class="epigraph">
<p class="p1">Скептицизм суть целомудрие интеллекта, и стыдно расставаться с ним слишком рано, отдавая первому встречному; надлежит спокойно и гордо хранить его, продлевая по возможности юность — этого требует благородство. И наконец, в зрелости чувств и разума отдать его, получив взамен преданность и счастье.</p>
<p class="text-author">Джордж Сантаяна. «Скептицизм и животная вера», IX</p>
</div><p class="p1">Оно грозило смертью… Враг был значительно крупней и сильней. Но оно знало его слабости, знало, как одолеть вражеское правительство и воспользоваться всеми ресурсами врага. Миллионы верных лазутчиков уже разошлись по местам…</p><p class="p1">Она чихнула, попыталась на ощупь отыскать чистую бумажную салфетку в пухлом кармане ворсистого президентского купального халата. Она была ненакрашена, на потрескавшихся губах маслянились следы ментоловой мази.</p><p class="p1">— Мой доктор велит оставаться в постели, в противном случае сулит вирусную пневмонию. Я прошу его прописать мне какой-нибудь антибиотик, а он твердит, что на вирусы антибиотики не действуют. Откуда ему знать, что я подхватила именно вирус?</p><p class="p1">Дер Хиир открыл было рот, чтобы ответить, но президент перебила его.</p><p class="p1">— Не надо, дер Хиир. Вы сейчас заведете речь о ДНК, о том, как паразит распознает хозяина, и тогда все силы, которыми я еще располагаю, уйдут на ваш рассказ. Если не боитесь вируса, пододвиньте кресло поближе.</p><p class="p1">— Благодарю вас, госпожа президент. Речь идет о введении. Вот отчет. Вся длинная методика излагается в приложении. Я подумал, что она сможет заинтересовать вас. Вкратце: мы уже читаем и понимаем введение практически без затруднений. С дьявольской мудростью придуманная программа. Конечно, слово «дьявольский» здесь выступает в качестве метафоры, и его не следует понимать буквально. К настоящему времени наш словарь составляет уже три тысячи слов.</p><p class="p1">— Я совершенно не понимаю, как такое может оказаться возможным. Конечно, я могу представить, как они познакомили вас с названиями чисел. Это просто: ставите одну точку и подписываете «один» и так далее. Можно еще нарисовать звезду и рядом с ней написать это слово, но я не представляю, как изобразить глагол, прошедшее время или условное предложение.</p><p class="p1">— Они прибегают к помощи мультвставок. Идеальное средство для таких целей. Очень многое они объясняют, используя числа; даже передают ими абстрактные понятия. Все происходит примерно следующим образом: сперва называют числа и сразу же вводят новые слова, которых мы не понимаем. Их слова я буду обозначать буквами. Итак, мы получаем нечто вроде</p><p class="p1">1A1B2Z</p><p class="p1">1A2B3Z</p><p class="p1">1A7B8Z</p><p class="p1">Как вы думаете, что это значит, если буквами здесь обозначены некоторые вводимые веганцами символы?</p><p class="p1">— Проверяете мои знания по школьной программе? Вы хотите сказать, что «А» обозначает некую комбинацию точек и тире, «В» — другую комбинацию и так далее?</p><p class="p1">— Совершенно верно. Вы знаете, что обозначают единица и двойка, а вот что такое «А» и «В», не представляете. Что говорит вам такая последовательность?</p><p class="p1">— «А» означает «плюс», «В» — «равно», так? Вы это хотели услышать?</p><p class="p1">— Хорошо, мы еще не определили «Z». И получаем нечто вроде 1A2B4Y. Понятно?</p><p class="p1">— Кажется. Дайте еще один пример с «Y».</p><p class="p1">2000A4000BOY</p><p class="p1">— О'кей, по-моему, поняла. Если последние три символа не обозначают еще одно слово, «Z» означает «правильно», а «Y» «неправильно».</p><p class="p1">— Совершенно верно, просто великолепный результат для президента, страдающего сразу от вируса и Южно-Африканского кризиса. Итак, на нескольких строчках текста они сумели познакомить нас с четырьмя словами: «плюс», «равно», «правильно», «неправильно». Четыре очень полезных слова. А потом принимаются за деление. Делят единицу на нуль и вводят слово, обозначающее бесконечность или просто неопределенность. Или, например, передают «сумма внутренних углов треугольника равна двум прямым углам». А затем следует комментарий — это утверждение справедливо, если пространство является плоским, и ошибочно, если оно искривлено. Теперь заодно мы узнали и слово «если».</p><p class="p1">— Я лично не знала, что пространство <em>искривлено</em>. Кен, черт возьми, о чем вы говорите? Как это пространство может оказаться искривленным? Не обращайте внимания. Это же не имеет никакого отношения к вопросу.</p><p class="p1">— На самом деле…</p><p class="p1">— Сол Хадден утверждает, что именно он подсказал вам, где искать введение. Нечего удивляться, дер Хиир. Мне приходится общаться со всеми.</p><p class="p1">— Я вовсе не… э… насколько я понимаю, мистер Хадден добровольно сделал ряд предложений, уже высказывавшихся и прочими специалистами. Доктор Эрроуэй проверила все и в одном случае угодила в точку. Эта штука называется фазовой модуляцией, или кодированием.</p><p class="p1">— Да. Я правильно понимаю, Кен? Введение разбросано по всему Посланию, так? Повторено много раз. И один из повторов начался почти сразу, после того как Эрроуэй приняла Послание.</p><p class="p1">— Как раз после того, как она обнаружила третий слой палимпсеста — проект Машины.</p><p class="p1">— Многие ли страны обладают техническими возможностями, позволяющими производить запись введения?</p><p class="p1">— Для этого нужно устройство, именуемое фазовым коррелятором. Вообще, да. Во всяком случае крупные страны.</p><p class="p1">— Значит, русские могли прочесть введение еще около года назад. Япония и Китай тоже. Откуда нам знать, может быть, все они уже сооружают собственные Машины.</p><p class="p1">— Я думал об этом, но Марвин Янг считает, что подобное невозможно. Фотосъемка со спутников, электронная разведка местонахождения возможных исполнителей позволяют утверждать, что такие работы не производятся ни в одной стране. Нет, проспали <em>все</em>. Слишком уж доверились предположению, что введение окажется в конце или начале Послания. Ведь над иными возможностями мы стали думать только тогда, когда Послание начало повторяться и мы не обнаружили введения. Вся работа проводилась в тесном сотрудничестве с русскими и остальными. Вряд ли кто-то обскакал нас, но не будем забывать, что теперь-то введение есть у каждого. По-моему, нам не следует ограничиваться односторонними действиями.</p><p class="p1">— Я вовсе <em>не настаиваю</em> на односторонних действиях. Я только хочу убедиться, что <em>ни одна другая</em> страна уже не обратилась к подобному курсу. О'кей, вернемся к этому вашему введению. Хорошо, вы знаете понятия «правильно — неправильно», «если — тогда» и что пространство искривлено. И как строить Машину, пользуясь этими словами?</p><p class="p1">— Госпожа президент, вы напрасно пытались убедить меня, что простуда мешает вам. Просто все начинается с этого. Они, скажем, рисуют периодическую таблицу элементов и на ее примере передают нам названия всех химических элементов, а также представление об атоме, о ядре, протонах, нейтронах и электронах. Потом дают кое-что из квантовой механики — чтобы удостовериться в том, что мы не уснули, — но мы уже почерпнули отсюда несколько новых идей. А потом переходят к конкретным материалам, необходимым для изготовления деталей. Например, оказалось, что нам необходимы две тонны эрбия, тогда они снабжают нас изящной технологией извлечения его из обычных пород.</p><p class="p1">Предупреждая вопрос движением руки, дер Хиир продолжил:</p><p class="p1">— Не спрашивайте, зачем нужны две тонны эрбия. Пока еще никто не имеет ни малейшего представления.</p><p class="p1">— Я хотела спросить не об этом. Скажите, откуда им известно, что такое тонна?</p><p class="p1">— Они считали в массах Планка, это…</p><p class="p1">— Не надо, не надо. Конечно, об этих массах знают все физики во Вселенной, не так ли? Но я, увы, не слыхала. Итак, подведем итоги. Я хочу знать, понимаем ли мы введение в достаточной мере, чтобы взяться за прочтение Послания? Сумеем ли мы соорудить эту штуку?</p><p class="p1">— Похоже, да. Мы прочли введение всего лишь несколько недель назад, но уже понимаем целые главы Послания. Конструкция крайне сложная, но все разъяснено и разжевано, кстати, на наш взгляд, сама конструкция Машины обладает избыточным запасом прочности. Если вы считаете необходимым, во вторник на совещании по подбору экипажа мы можем представить ее трехмерную модель. Конечно, мы не имеем даже малейшего представления о том, как она работает и для чего предназначена. Там есть какие-то странные органические компоненты, которым, на наш взгляд, вовсе не место в Машине. Но почти все сходятся на одном — мы ее построим.</p><p class="p1">— А кто возражает?</p><p class="p1">— Луначарский, русские. Разумеется, и Билли Джо Ренкин. Есть и такие, что все еще волнуются, как бы Машина не разрушила нашу планету, не повернула ее ось и так далее. Но ученые просто потрясены тем, что объяснения даны так подробно: одно и то же, как правило, поясняется несколькими способами.</p><p class="p1">— А что говорит Элинор Эрроуэй?</p><p class="p1">— Она считает, что если они захотят нас прикончить, то окажутся здесь лет через двадцать пять, и мы даже тогда ничего не сумеем сделать. Они слишком далеко обошли нас. Поэтому она полагает, что строить надо, только с учетом всех факторов где-нибудь подальше. Профессор Драмлин уверяет, что Машину можно строить прямо в центре Пасадены. И берется сидеть там неотлучно все время, которое потребуется для ее сооружения, и первым взлететь на воздух, если что не так.</p><p class="p1">— Драмлин… это не он ли обнаружил, что перед нами проект Машины?</p><p class="p1">— Не совсем так, он…</p><p class="p1">— Я потом ознакомлюсь с необходимыми материалами, поближе ко вторнику. У вас есть еще что-нибудь?</p><p class="p1">— Вы серьезно собираетесь доверить Хаддену постройку Машины?</p><p class="p1">— Решать не мне одной. В соответствии со сложившейся в Париже ситуацией мы обладаем примерно четвертью прав, четвертью — русские, третья четверть поделена между Японией и Китаем, оставшаяся четверть предназначена прочим странам. Участвовать в сооружении Машины, по крайней мере в изготовлении отдельных ее узлов и деталей, рвутся многие страны. Им нужны престиж, новые технологии, новые знания. Если нас еще не успели обскакать, то все выглядит просто прекрасно. Возможно, и Хаддену достанется кусок. Что вас волнует? Разве он недостаточно компетентен?</p><p class="p1">— Конечно, нет. Просто…</p><p class="p1">— Кен, если у вас ничего больше нет, встретимся во вторник, надеюсь, вирус не помешает.</p><p class="p1">Пока дер Хиир закрывал за собой дверь, до него донеслось оглушительное чихание. Застывший на кушетке дежурный офицер испуганно вздрогнул. У его ног покоился чемоданчик, набитый кодами на случай ядерной войны. Дер Хиир успокаивающе махнул ему рукой. Как бы оправдываясь, офицер улыбнулся.</p><p class="p1">— И это Вега? Было о чем поднимать шум, — не без разочарования спросила президент. Только что окончилась предоставленная прессе пауза, и глаза ее начинали привыкать к темноте после фотовспышек и прожекторов телевизионного освещения. Появившиеся на следующий день во всех газетах снимки, на которых президент стальным взором взирает в телескоп Военно-морской обсерватории, отчаянно врали. Она сумела разглядеть хоть что-то, лишь когда выставили репортеров, и тьма вернулась.</p><p class="p1">— А почему она дрожит?</p><p class="p1">— Воздушная турбулентность, госпожа президент, — пояснил дер Хиир. — Теплый воздух пузырями поднимается вверх и искажает изображение.</p><p class="p1">— Как будто смотришь на Сая через стол, на котором стоит тостер. Помнится, однажды мне даже показалось, что у него куда-то исчезла половина лица, — оживленно проговорила она погромче, так, чтобы ее мог слышать супруг, стоявший поблизости и занятый разговором с облаченным в мундир комендантом обсерватории.</p><p class="p1">— Да, теперь на нашем столе тостера не увидишь, — дружелюбно отозвался он.</p><p class="p1">До отставки Сеймур Ласкер занимал высокий пост в Международном союзе работников дамской одежды. С собственной женой он познакомился несколько десятилетий назад, когда она представляла нью-йоркскую компанию девичьих пальто; так они и полюбили друг друга за долгим обсуждением трудового «соглашения. Учитывая новизну нынешнего положения для обоих, трудно было не отметить, что это здоровый союз.</p><p class="p1">— Без тостера обойтись несложно, хуже то, что приходится так редко завтракать в обществе Сая, — она мельком глянула в его сторону и вновь обратилась к окуляру. — Она похожа на голубую амебу, такая… расползшаяся.</p><p class="p1">После трудного совещания президент была в отличном настроении. С экипажем все ясно, простуда прошла.</p><p class="p1">— А если бы не было турбулентности, что я бы увидела, Кен?</p><p class="p1">— Вы увидели бы просто ровную и немигающую световую точку. Так бывает за пределами атмосферы, если телескоп расположен в космосе.</p><p class="p1">— Одну только звезду? Только Вегу? Ни планет, ни колец, ни боевых лазерных станций?</p><p class="p1">— Увы, госпожа президент, подобные объекты слишком малы даже для самого большого телескопа.</p><p class="p1">— Ну тогда остается только надеяться, что ученые понимают, что делают, — полушепотом проговорила она. — Столько всякого было сказано о том, чего никто не видел.</p><p class="p1">Дер Хиир был несколько озадачен.</p><p class="p1">— Но мы ведь видели 31000 страниц текста — картинки, слова да еще огромное введение.</p><p class="p1">— Все это — слова, в которых нет ничего, что можно было <em>увидеть</em> отсюда. Слишком уж все… умозрительно. И не надо говорить мне, что ученые по всему свету получают одно и то же. Я знаю это. И не следует напоминать, что полученные чертежи Машины совершенно отчетливы и недвусмысленны. Я не забыла про это. Если мы откажемся, Машину построит кто-нибудь другой. Я знаю все это. Но все же я волнуюсь.</p><p class="p1">Процессия медленно шествовала назад к резиденции вице-президента. Только что в Париже после многих трудов завершились предварительные переговоры по выбору экипажа. Соединенные Штаты и Советский Союз требовали по два места и в этом вопросе обнаружили редкое единодушие. Но обосновать подобные запросы перед остальными странами — участницами консорциума было сложно. Теперь переговоры с прочими странами мира складывались для Союза и Штатов менее благоприятно, чем обычно, даже если обе великие державы приходили к соглашению между собой.</p><p class="p1">О происходящем вовсю трубили как об общем деле всего человечества. Уже успели переменить вывеску Всемирного консорциума: «Послание» сменила «Машина». Нации, владевшие кусочками Послания, требовали, чтобы их гражданина включили в состав экипажа. Китайцы же невозмутимо указывали, что к середине будущего столетия их станет полтора миллиарда и то лишь при условии, что в результате контроля за рождаемостью им удастся сократить число детей в семье до одного. В зрелом возрасте эти дети будут спокойнее и умнее, чем дети, рожденные в странах, где законы менее строги. Лет через пятьдесят китайцы станут играть куда более важную роль в судьбах мира и Китаю по праву принадлежит по крайней мере одно место из пяти. Этот аргумент широко обсуждался экспертами во многих странах мира вне всякой связи с Посланием или Машиной.</p><p class="p1">Европа и Япония уступали собственные права на присутствие в экипаже в обмен на ведущую роль в сооружении Машины, полагая, что этот процесс сулит существенные экономические выгоды. В конце концов было решено выделить по месту Соединенным Штатам, Советскому Союзу, Китаю и Индии… вопрос о пятом участнике остался открытым. Предстояли долгие многосторонние переговоры с учетом количества населения, экономической, промышленной и военной мощи, текущей политической ситуации, даже некоторых нюансов истории человечества.</p><p class="p1">С точки зрения географического положения и населенности на пятое место претендовали Бразилия и Индонезия, Швеция предлагала свое участие в качестве посредника на случай политических разногласий, Египет, Ирак, Пакистан и Саудовская Аравия настаивали на равном представительстве религий. Другие предлагали персонально выделить пятое место в соответствии с личными заслугами, а не национальными амбициями.</p><p class="p1">Выборы пятого участника решили отложить на какое-то время, чтобы уменьшить накал страстей.</p><p class="p1">Но четверка избранных стран, ученые, политики и прочие уже выбирали своих кандидатов. В Соединенных Штатах произошло нечто вроде национальных дебатов. В выборочных опросах и голосованиях участвовали в меру собственного энтузиазма религиозные лидеры, герои спорта, астронавты, лауреаты Почетной медали конгресса, ученые, киноактеры, супруга бывшего президента, популярные телеобозреватели и ведущие телешоу, члены конгресса, миллионеры с политическими амбициями, главы фондов, певцы кантри, исполнители рок-н-ролла, президенты университетов, нынешняя мисс Америка…</p><p class="p1">По давней традиции, с той поры как резиденция вице-президента переехала на территорию Военно-морской обсерватории, роль домашней прислуги исполняли филиппинцы, офицеры младших чинов, находящиеся на службе во флоте США. Облаченные в аккуратные куртки с вышитой полосой «Вице-президент Соединенных Штатов», они подавали теперь кофе. Из участников совещания, продолжавшегося целый день, на неофициальный вечерний прием пригласили немногих.</p><p class="p1">Участью Сеймура Ласкера было стать первым джентльменом Америки. Он с отменным терпением и добродушием, мужественно нес этот крест: карикатуры, елейные шутки и выпады — дескать, он бывал там, где не мог быть никакой другой мужчина, и Америка даже простила ему, что женат он на женщине, возомнившей себя способной править половиной мира. Ласкер развлекал жену вице-президента и его несовершеннолетнего сына, а тем временем президент пригласила дер Хиира в библиотеку.</p><p class="p1">— Хорошо, что сегодня, — начала она, — мы не обязаны принимать официальных решений или выступать с публичными заявлениями относительно наших намерений. Посмотрим, какие итоги можно подвести уже сейчас. Мы не знаем, на что способна эта проклятая Машина, но с достаточной уверенностью можно предположить, что она отправится на Вегу. Относительно того, как это произойдет и сколько потребуется времени на перелет, никто не имеет даже малейшего понятия. Итак, насколько далеко от нас эта Вега?</p><p class="p1">— Двадцать шесть световых лет, госпожа президент.</p><p class="p1">— Значит, если Машина представляет собой нечто вроде космического корабля и может путешествовать со скоростью света — я знаю, дер Хиир, что это невозможно, что к этой скорости можно только приближаться, не перебивайте, — то по нашему земному счету потребуется двадцать шесть лет, чтобы они туда добрались. Так, дер Хиир?</p><p class="p1">— Да. Именно так. Плюс, может быть, год, чтобы достичь скорости света и затормозить в системе Веги. Но с точки зрения членов экипажа, времени потребуется намного меньше. Возможно, всего пара лет, в зависимости от того, насколько близко к скорости света они смогут подобраться.</p><p class="p1">— Для биолога, дер Хиир, вы просто великолепно знаете астрономию.</p><p class="p1">— Благодарю вас, госпожа президент. Я пытался полностью овладеть вопросом.</p><p class="p1">Она поглядела на него и продолжила:</p><p class="p1">— Значит, если Машина передвигается со скоростью света, возраст членов экипажа не имеет большого значения. Но если перелет займет десять или двадцать лет — а вы говорите, что подобное вполне вероятно, — нам нужна молодежь. Русские как будто пренебрегают этим аргументом. Насколько мне известно, они выбирают между Архангельским и Луначарским, обоим уже шестой десяток.</p><p class="p1">Эти имена она прочла с некоторой запинкой, приблизив карточку к глазам.</p><p class="p1">— Китайцы наверняка пошлют Си. Ему тоже почти шестьдесят. И если бы я могла быть уверена в том, что они поступают правильно, то в свой черед охотно бы сказала вам — ну ладно, посылаем шестидесятилетнего мужчину.</p><p class="p1">Драмлину было ровно шестьдесят, дер Хиир помнил об этом.</p><p class="p1">— Но с другой стороны… — возразил он.</p><p class="p1">— Я знаю, знаю, индийский доктор. Ей за сорок… Понимаете, о таком дурацком деле мне еще не приходилось даже слышать. Мы выбираем посланцев на Олимпийские игры, но не представляем, что их там ждет. Я не знаю, почему все так уперлись на ученых. Хорошо было бы послать Махатму Ганди… А еще лучше — Иисуса Христа. Не говорите мне, что это невозможно, дер Хиир, я сама знаю об этом.</p><p class="p1">— Когда не знают, чего ожидать, посылают чемпиона в десятиборье.</p><p class="p1">— И тогда вдруг оказывается, что надо играть в шахматы, петь и ваять, и ваш спортсмен окажется последним. О'кей, вы утверждаете, что надо посылать тех, кто занимался внеземной жизнью и был непосредственно связан с приемом и прочтением Послания.</p><p class="p1">— По крайней мере такой человек сможет хотя бы отдаленно представлять образ мышления веганцев. Или их требования к нашему интеллекту.</p><p class="p1">— Значит, приходится ограничиться действительными величинами, а это, по вашим словам, уменьшает число кандидатур до трех.</p><p class="p1">Она вновь обратилась к записям.</p><p class="p1">— Эрроуэй, Драмлин и этот… выдающий себя за римского генерала.</p><p class="p1">— Доктор Валериан, госпожа президент. Я не думаю, чтобы он <em>считал</em> себя римлянином, просто фамилия такая.</p><p class="p1">— Валериан не захотел даже отвечать на вопросы членов Отборочного комитета. Он, дескать, не хочет, поскольку не желает оставлять жену? Так? Я не осуждаю его. Он не дурак и знает, что ему нужно. А жена здорова?</p><p class="p1">— Насколько мне известно, ни на что не жалуется.</p><p class="p1">— Отлично. Прекрасно для них обоих. Пошлите ей личное послание от меня — что-нибудь насчет женщины, ради которой астроном согласен отдать всю Вселенную. Но продумайте текст. Дер Хиир, вы поняли, чего я хочу. Вставьте цитату, что-нибудь из стихов. Но без лишней сентиментальности, — она погрозила ему указательным пальцем. — Эти Валерианы — пример для всех нас. Почему бы не пригласить их на прием? Король Непала посетит нас через две недели. Вполне уместный жест.</p><p class="p1">Дер Хиир торопливо записывал, придется звонить секретарю в приемную Белого дома. А у него всегда куча важных звонков — иногда приходилось часами сидеть на телефоне.</p><p class="p1">— Итак, остаются Эрроуэй и Драмлин. Она моложе дока лет на двадцать, но он в потрясающей физической форме. Летает на дельтаплане, ныряет… к тому же блестящий ученый, весьма преуспел в расшифровке Послания и прекрасно спорил со всеми этими стариками. А он не занимался ядерным оружием? Мне бы не хотелось отправлять туда тех, кто работал в этой области. Впрочем, и доктор Эрроуэй с блеском себя проявила. Она возглавляет обсерваторию «Аргус», до тонкостей разбирается во всех научных вопросах, связанных с Посланием, ей нельзя отказать в проницательности. Безусловно, круг интересов ее чрезвычайно широк. Можно сказать, идеальный пример для американской молодежи, — президент умолкла.</p><p class="p1">— Я знаю, вам она нравится, Кен. И я не вижу в этом ничего плохого. Но иногда она допускает такие ляпсусы. Вы внимательно слушали ее ответы?</p><p class="p1">— Кажется, я понял, <em>что</em> вы имеете в виду. Но ведь члены Отборочного комитета, госпожа президент, задавали ей вопросы почти восемь часов… вполне можно и возмутиться от очередной, с ее точки зрения, глупости. Кстати, и Драмлин вел себя не лучше. Должно быть, она от него и научилась, ведь доктор Эрроуэй его ученица.</p><p class="p1">— Да-а, он тоже наговорил глупостей. По-моему, нужная нам кассета должна быть вставлена в этот видеомагнитофон. Сперва ответы Эрроуэй, потом Драмлина. Кен, нажмите кнопку.</p><p class="p1">На телевизионном экране появилась Элли в собственном кабинете. Дер Хиир заметил даже пожелтевший листок бумаги с цитатой из Кафки. Может быть, учитывая все, что было и еще ждет впереди, для Элли было бы намного лучше, если бы звезды промолчали. Морщины у рта, синева под глазами. На лбу возле переносицы две новые вертикальные черточки. Элли на видеоленте казалась ужасно уставшей, и дер Хиир ощутил укор совести.</p><p class="p1">— Что я думаю о «кризисе перенаселенности земного шара»? — спрашивала Элли. — Вы хотите узнать, одобряю я его или нет? Или же, по вашим предположениям, это ключевой вопрос для веганцев, и они зададут его мне сразу по прибытии туда? Вам нужен ответ? О'кей. Перенаселенность вынуждает меня с одобрением относиться к гомосексуалистам и священникам с целибатом<a href="ch2.xhtml#id56" class="a">[33]</a>. Особенно великолепен последний обычай, он позволяет подавлять естественное распространение наследственной склонности к фанатизму.</p><p class="p1">С невозмутимым выражением Элли дожидалась следующего вопроса. Президент нажала на кнопку «стоп».</p><p class="p1">— Конечно же, я вынуждена согласиться, иные из вопросов действительно оказались не на высоте, — продолжила президент. — Но на таком важном месте — не забывайте про интернациональный характер проекта — нам вовсе не нужен человек, способный публично выступать с расистскими идейками. Мы не можем терять развивающиеся страны. У нас были свои причины задать этот вопрос. Вам не показалось, что подобный ответ свидетельствует об известной… бестактности? Пусть ваш доктор умница, но здесь она чуточку перемудрила. Теперь полюбуйтесь на Драмлина.</p><p class="p1">Голубой в мелкий горошек галстук придавал загорелому Драмлину весьма бравый вид.</p><p class="p1">— Да, конечно, эмоциями наделены все люди, — говорил он. — Но не следует забывать их природу. В те времена, когда люди были слишком глупы, чтобы понимать себя, эмоции обеспечивали мотивацию адаптивного поведения. Когда навстречу тебе мчится стая ощерившихся гиен, нетрудно представить, что тебя ждет. И несколько кубических сантиметров адреналина не помогут мне точнее оценить ситуацию. Если я чувствую желание внести свой собственный генетический вклад в развитие последующих поколений, для этого вовсе не требуется наличия тестостерона в крови. Вы уверены, что далеко обогнавшие человечество внеземные существа по-прежнему страдают эмоциями? Я прекрасно знаю, некоторые считают меня слишком сдержанным, даже холодным. Но, если вы и в самом деле хотите понять внеземлян, пошлите <em>меня</em>. Я похож на них, как никто другой.</p><p class="p1">— Хороша альтернатива, — проговорила президент. — Бестактная атеистка или самозваный веганец. Может быть, необязательно посылать ученых? Что, если послать… просто нормального человека? Увы, вопрос риторический, — быстро добавила она. — Я понимаю, почему мы вынуждены это делать. Послание получено учеными, записано на языке науки. Оказывается, наука и есть то общее, что уподобляет нас жителям Веги. Вполне достаточная причина, Кен. Я не забыла.</p><p class="p1">— Элли вовсе не атеистка, она — агностик. У нее открытый ум, он не отягощен догмами. Это человек интеллигентный, надежный, профессионал высокого класса. Диапазон ее познаний очень широк. Именно такие люди необходимы в подобной ситуации.</p><p class="p1">— Кен, я весьма одобряю вашу преданность «Аргусу». Но нам есть чего опасаться. Или вы думаете, я не знаю, с чем уже пришлось смириться избирателям? Среди опрошенных многие уверены в том, что нам вовсе не следует делать эту штуку. Но если назад пути нет, все захотят, чтобы послали действительно надежного человека. Может быть, Эрроуэй и на самом деле так хороша, как вы ее расписываете, но она не надежна. Уже успела раздразнить и Холм<a href="ch2.xhtml#id55" class="a">[34]</a> и Первоземлян, мой собственный Национальный комитет и все церкви сразу. На той встрече в Калифорнии она произвела, правда, известное впечатление на Палмера Джосса, но Билли Джо Ренкин просто пришел в ярость. Он позвонил мне вчера и сказал: «Госпожа президент, — он вечно не может скрыть неудовольствие от этого сочетания слов, — госпожа президент, эта Машина отправляется прямо к Богу или Дьяволу. И в том и в другом случае нет лучшей кандидатуры, чем преданный Богу христианин». Стремясь угодить Богу, он даже не стал прибегать к помощи Палмера Джосса, чтобы связаться со мной. Можно не сомневаться, что этот христианин — он сам. Для таких, как Ренкин, Драмлин покажется куда более приемлемой фигурой. Конечно, Драмлин, бесспорно, слишком уж хладнокровен. Но он зарекомендовал себя истинным мужчиной. Надежным и преданным. С безукоризненными верительными грамотами от науки. Он и сам добивается этого. Нет. Пусть будет Драмлин. Эрроуэй в лучшем случае может быть его дублером.</p><p class="p1">— Я могу передать ей это?</p><p class="p1">— Ну не следует извещать Эрроуэй прежде самого Драмлина. Я дам вам знать, когда решение будет принято окончательно, и мы проинформируем его. Не унывайте, Кен. Разве для вас не лучше, если она останется на Земле?</p><p class="p1">Уже после шести Элли закончила инструктировать «Команду тигров» из госдепартамента, подстраховывавшую делегацию на переговорах в Париже. Дер Хиир обещал ей позвонить сразу же, едва закончится совещание по поводу экипажа. Он хотел, чтобы результат она узнала только от него самого. Элли понимала, что надерзила членам Отборочного комитета, и потому могла уступить любому кандидату из двенадцати. Но кое-какие шансы, похоже, еще оставались.</p><p class="p1">В гостинице ее дожидалась записка — не розовый бланк «пока вас не было дома», заполненный служащим отеля, — настоящее запечатанное письмо, правда, без марки. Его кто-то принес. Содержание гласило: «Жду Вас в Национальном музее науки и техники в восемь вечера. Палмер Джосс».</p><p class="p1">Ни тебе здрасьте, ни зачем, ни почему, обошелся и без до свидания, подумала Элли. Верит сам и требует веры. Конверт был куплен в этом же отеле. Обратного адреса не было. Ей подумалось, что, понадеявшись застать ее в отеле, Джосс мог забежать после полудня, а о том, что она в городе, он мог узнать от самого государственного секретаря. День был трудным, и ей так не хотелось тратить время на разговоры, вместо того чтобы заняться чтением новых частей Послания. Но, невзирая на известный внутренний протест, она приняла душ, переоделась, купила пакетик орехов кешью и уже через сорок пять минут оказалась в такси.</p><p class="p1">До закрытия оставалось еще около часа, но музей был почти пуст. По углам огромного первого зала возвышались громоздкие мрачноватые машины. В XIX в. ими гордились текстильщики, обувщики, шахтеры. Паровая каллиопа<a href="ch2.xhtml#id54" class="a">[35]</a> образца 1876 года наигрывала веселенькую мелодию, некогда написанную для духового оркестра каким-нибудь туристом из Западной Африки. Джосса нигде не было видно. Она справилась с желанием повернуться и немедленно отправиться восвояси.</p><p class="p1">Где можно разыскать Палмера Джосса в этом музее, ничего не зная о нем, руководствуясь одной лишь беседой о религии и Послании? Задача отдаленно напомнила поиск частоты передачи от внеземной цивилизации. Никому не известно, что представляют собой внеземляне, тем не менее требуется заранее выбрать диапазон волн, в котором эти создания будут вести передачи. Следует уяснить, какими общими знаниями вы можете располагать. Конечно, все во Вселенной знают, какой атом в ней является наиболее распространенным, знают и единственную частоту, соответствующую излучению и поглощению им энергии. На таком основании линия нейтрального атомарного водорода с частотой 1420 мегагерц абсолютно обоснованно использовалась на ранней стадии ПВЦ. Что же заменит им водород в данном случае? Телефон Белла? Телеграф Маркони?.. Конечно!</p><p class="p1">— Есть в этом музее маятник Фуко? — осведомилась она у смотрителя.</p><p class="p1">Стуча каблуками по мраморным плитам, она приближалась к ротонде. Перегнувшись через ограду, Джосс изучал мозаичный пол, на котором были изображены линии, указывающие страны света. Из пола выступали помечавшие время небольшие штырьки, некоторые уже были повалены маятником. Его остановили около семи часов, и теперь он покоился в самом центре. В зале они были совершенно одни, Джосс мог слышать ее шаги по меньшей мере целую минуту, но даже не сказал ничего.</p><p class="p1">— Так, значит, вы наконец решили молитвой <em>остановить</em> маятник, — усмехнулась она.</p><p class="p1">— Подобная идея оскорбительна для веры, — отвечал он.</p><p class="p1">— Интересно почему? Скольких вы сумели бы обратить в случае удачи! Для вашего Бога это ведь такая малость, помнится, вы частенько беседуете с Ним… Разве не так, а? Вы действительно намереваетесь проверить мою веру в гармонический осциллятор? О'кей.</p><p class="p1">Элли несколько удивилась, что Джосс все-таки решил подвергнуть ее этому испытанию, но задалась целью выйти победительницей. Спустив сумку с плеча, она скинула туфли. Изящно перепрыгнув через ограду, он помог Элли перелезть через нее. Наполовину шагом, наполовину скользя, они спустились к маятнику по выложенному мозаикой откосу. Поверхность груза была матово-черной, и Элли подумала — из свинца или из стали?</p><p class="p1">— Вам придется помочь мне, — произнесла она и ухватилась руками за груз. Вдвоем они отклонили его от вертикали, пока груз не оказался возле ее лица. Джосс внимательно смотрел на нее. Он даже не подумал спросить, не волнуется ли она, и вовсе не беспокоился, что Элли может упасть, и, конечно же, не представлял, что выпущенный из рук груз может приобрести горизонтальную компоненту скорости. Позади Элли оставалось на метр-полтора ровного пола, а потом начинался наклонный участок стенки. Она прикинула: тяжелый случай, но придется держать себя в руках.</p><p class="p1">Элли выпустила груз. Он стал удаляться.</p><p class="p1">Период колебания простого маятника, с легким головокружением подумала она, равен 2 «пи», умноженному на квадратный корень из длины маятника L, поделенной на ускорение свободного падения g. Из-за трения в подвесе маятник не может отклониться от положения равновесия дальше исходного. Нужно только не дернуться вперед, напомнила она себе.</p><p class="p1">Возле противоположного края ограды груз замедлил свое движение и остановился. А в обратный путь отправился явно с большей скоростью, чем «туда». Груз приближался, угрожающе увеличиваясь в размерах. Ставший громадным, шар несся к ее лицу. Элли охнула.</p><p class="p1">— Я дернулась, — разочарованно произнесла она, когда груз вновь стал удаляться.</p><p class="p1">— Ну на какую-то малость.</p><p class="p1">— Но все-таки не устояла на месте.</p><p class="p1">— В основном, Элли, вы верите. Верите в эту вашу науку, оставляя сомнению лишь какую-то кроху.</p><p class="p1">— Нет, не то. Мозг лишь миллионы лет борется с инстинктами, зародившимися миллиарды лет назад. Поэтому ваша задача легче моей.</p><p class="p1">— Ну в данном случае мы занимаемся одним и тем же делом. Мой черед, — произнес он, перехватив груз в верхней точке его траектории.</p><p class="p1">— Джосс, ведь проверке подлежит вовсе не <em>ваша</em> вера в закон сохранения энергии…</p><p class="p1">Улыбнувшись в ответ, он постарался принять более устойчивое положение.</p><p class="p1">— Эй, что вы там делаете? — спросил чей-то голос. — Ребята, вы не свихнулись? — музейный смотритель, проверявший залы перед закрытием, обнаружил в уже безлюдном здании неожиданную картину: яму, в ней мужчину и женщину и раскачивающийся над ними маятник.</p><p class="p1">— Все в порядке, командир, — приветливо отвечал Джосс. — Просто испытываем крепость веры.</p><p class="p1">— Такими вещами в Смитсоновском институте заниматься не положено. Здесь музей.</p><p class="p1">Джосс и Элли со смехом оставили маятник в относительном покое и принялись карабкаться вверх по скользкому склону.</p><p class="p1">— Это должно быть разрешено первой поправкой к конституции, — проговорила она.</p><p class="p1">— Или Первой заповедью, — отвечал он.</p><p class="p1">Ступив в туфли и повесив сумку через плечо, она вышла из ротонды с гордо поднятой головой следом за Джоссом и служителем. Хотя они не называли себя, им удалось неузнанными избежать ареста. Впрочем, на всякий случай из музея<a href="ch2.xhtml#id53" class="a">[36]</a> их выставлял чуть ли не взвод облаченных в мундиры служителей, возможно опасавшихся, что поиски своего неведомого Бога Элли и Джосс могут продолжить за паровой каллиопой.</p><p class="p1">По пустынной улице они молча шли вдоль Мэлла. Ночь была ясной. Элли заметила Вегу над горизонтом.</p><p class="p1">— Видите яркую звездочку? Это Вега.</p><p class="p1">Джосс долго глядел на звезду.</p><p class="p1">— Вы теперь читаете Послание — это просто блестящее достижение, — наконец проговорил он.</p><p class="p1">— Ах, ерунда. Все оказалось тривиальным. Трудно придумать текст проще. Мы проявили бы полную бездарность, если бы не справились с ним.</p><p class="p1">— Элли, я успел уже понять, что вы не любите комплиментов. Нет, открытия, подобные вашему, изменяют будущее. Как огонь, письмо, земледелие… или Благовещение.</p><p class="p1">Он поглядел на Вегу.</p><p class="p1">— Если бы вам все-таки предоставили место в Машине и вы встретились с ее создателем, кого бы, по-вашему мнению, вы увидели?</p><p class="p1">— Эволюция — процесс стохастический. Предсказать обличье живого существа — дело безнадежное: слишком многие из возможностей могут реализоваться. Какие признаки указывали в докембрии, что по Земле будут прыгать кузнечики или расхаживать жирафы?</p><p class="p1">— Могу подсказать вам ответ на этот вопрос. Или вам кажется, будто мы сами все напридумывали, начитавших священных книг и молитв? Это вовсе не так. Мою уверенность подкрепляет собственный опыт. Я даже не могу сформулировать эту мысль иначе: я видел Бога.</p><p class="p1">В убежденности Джосса трудно было сомневаться.</p><p class="p1">— Расскажите мне подробнее.</p><p class="p1">И он рассказал.</p><p class="p1">— О'кей, — наконец проговорила она. — Сперва вы были в состоянии клинической смерти, потом ожили, помните, как поднимались к свету из тьмы. Вы видели светящуюся фигуру и решили, что она-то и есть ваш Бог. Никаких свидетельств того, что именно этот огненный силуэт сотворил Вселенную и установил законы морали, вам не было предоставлено. Интересный экспериментальный факт. Но, конечно, вы были потрясены. Впрочем, есть и другие возможные объяснения.</p><p class="p1">— Какие же?</p><p class="p1">— Роды, например<a href="ch2.xhtml#id52" class="a">[37]</a>. Начиная свою жизнь, человек по длинному тоннелю поднимается к свету. Конечно, младенец увидит ослепительное сияние, ведь ребенок провел девять месяцев во тьме. Представьте собственное изумление и потрясение при первом контакте со светом, цветом, тенями… с человеческим лицом — а на его восприятие мы наверняка запрограммированы. Быть может, если мы едва не умираем, одометр просто на какой-то миг возвращается к нулю. Поймите, я не настаиваю на своем объяснении. Это один вариант из многих возможных. Я просто хочу предположить, что вы неправильно истолковали свой опыт.</p><p class="p1">— Но вы же не видели ничего подобного… этому.</p><p class="p1">Он вновь поглядел на мерцавшую холодным голубоватым светом Вегу, а потом повернулся к ней.</p><p class="p1">— А вам не бывает не по себе… в вашей Вселенной? Что делать в ней человеку, как вести себя, если нет Бога? Слепо повиноваться законам, чтобы только не арестовали?</p><p class="p1">— Палмер, на самом деле вас смущает вовсе не это. Вы просто боитесь, что будете не центром, не венцом всего творения. Да, моя Вселенная упорядочена. В ней бездна законов — гравитации, электромагнетизма, квантовой механики, суперобъединения. Ну а что до того, как себя вести… так ли уж сложно <em>своим разумом понять</em>, что наилучшим образом отвечает интересам человечества как вида?</p><p class="p1">— Вы считаете мир добрым и благородным. Да, — и не мне отрицать этого — в человеческом сердце находит место и доброта. Но сколько всяких жестокостей было совершено там, где не чтут Господа?</p><p class="p1">— А там, где чтут? Савонарола и Торквемада любили Бога, по крайней мере сами так утверждали. С точки зрения религии люди — это дети, которых необходимо припугнуть, чтобы они хорошо себя вели. Вы считаете, что люди будут повиноваться закону, только когда верят в Бога? Знакомый рецепт, иного и в голову не придет: всесильная полиция и всеведущий Бог, наказующий за те прегрешения, которые проглядела полиция. Вы недооцениваете человека, Палмер. Почему вы решили, что, если у меня нет вашего мистического опыта, я не смогу воспринять величия вашего Бога. Да наоборот! Я слушаю вас и думаю — как мал его Бог. Творец захудалой планеты, всего с несколькими тысячами лет истории — разве это достойно создателя всей Вселенной?</p><p class="p1">— Тут вы принимаете меня за брата Ренкина, Музей — это его территория. Я-то не возражаю против всех этих миллиардов лет. Просто считаю, что ученые ничего не доказали.</p><p class="p1">— А я позволю себе утверждать, что вы не поняли их доказательств. Зачем они людям, привыкшим обманывать себя всеми вашими религиозными «истинами», этой ложью? Только поверьте в то, что люди вовсе не дети, и сразу начнете проповедовать другое.</p><p class="p1">Короткое молчание нарушал только звук шагов.</p><p class="p1">— Извините, я, кажется, увлеклась, — проговорила она. — Со мной такое случается время от времени.</p><p class="p1">— Доктор Эрроуэй, честное слово, я внимательно обдумаю ваши сегодняшние слова. Вы подняли кое-какие вопросы, на которые мне самому хотелось бы найти ответ. Но позвольте и мне в свою очередь задать вам несколько вопросов? Хорошо?</p><p class="p1">Она кивнула, а он продолжил:</p><p class="p1">— Объясните мне, что такое сознание и откуда оно берется? На каком уровне возникает: среди молекул или уже среди этих самых дергающихся атомов? Еще вопрос — отвлечемся от биологии, — какая наука может научить ребенка любви? И еще…</p><p class="p1">На руке Элли звякнул сигнал. Должно быть, Кен наконец собрался сообщить ей долгожданные новости. Если так, совещание затянулось. Возможно, ее ждут хорошие вести. Она поглядела на буквы и цифры, проступившие в жидком кристалле: ее вызывали из офиса Кена. Телефонов поблизости не оказалось, но через несколько минут им подвернулось такси.</p><p class="p1">— Извините, что я так внезапно вас покидаю. У нас был очень интересный разговор. Я тоже обдумаю ваши вопросы… Кажется, вы хотели что-то добавить?</p><p class="p1">— Да. Каким способом ваша наука способна удержать ученого от обращения ко злу?</p></span></span>
