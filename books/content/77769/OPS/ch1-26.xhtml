<span><span><p class="p1">Все находились в хорошем настроении, как после пикника. Эда появился с потрясающей молодой женщиной в яркой блузке и юбке. Ее лицо было прикрыто кружевным никабом, которому отдавали предпочтение мусульманки в стране йоруба. Эда выглядел очень довольным. По фотографии Элли узнала в ней жену Эда. Сукхавати держала за руку молодого человека с огромными глазами, смотревшего на всех задушевно и прямо. Элли угадала в нем студента-медика Суриндара Гхоша, давно уже умершего мужа Деви. Си оживленно беседовал с высоким и энергичным мужчиной с властными чертами лица, облаченным в пышное, шитое золотом одеяние. Элли представила его возле модели средневекового Китая: он негромко отдавал распоряжения тем, кто уже разливал ртуть.</p><p class="p1">ВГ возвышался рядом с девочкой лет одиннадцати или двенадцати, косички ее подпрыгивали при ходьбе.</p><p class="p1">— Это моя внучка, Нина… в известной мере. Моя Великая Герцогиня. Надо было вас познакомить в Москве.</p><p class="p1">Элли обняла девочку. Она почувствовала облегчение. Слава богу, ВГ не появился в компании эвдизиастки Миры. Отметив его нежность к девочке, Элли обнаружила, что ВГ еще больше нравится ей. За все годы долгого знакомства ВГ ни разу не открыл ей этот уголок сердца.</p><p class="p1">— Я был не слишком хорошим отцом ее матери, — признался он. — И теперь почти не вижу Нину.</p><p class="p1">Элли огляделась. Хозяева станции воссоздали для каждого самого любимого человека. Может быть, просто для того, чтобы облегчить им контакт с разумными существами, так не похожими на землян. Можно было только радоваться, что никто из Пятерки не захлебывается от восторга в беседе с собственным двойником.</p><p class="p1">Ну а если подобное стало бы возможным и на Земле? Наперекор скрытности и самолюбию все были бы обязаны появляться в обществе любимого человека. Что будет, если это вдруг предпишут всем людям? Тогда преобразятся сами основы человеческого общения. Ей представились стайки, окружающие избранных представителей рода человеческого. Круги, восьмерки, цепочки, ряды по бокам. И по конфигурации эскорта можно сразу определить глубину привязанности, так сказать, принцип относительности в социальной психологии. Конечно, подобная организация общества немедленно породит заметные сложности. Но тогда никто не сможет обмануть, если не любит.</p><p class="p1">«Обслуживающий персонал» изъявлял вежливую торопливость. Время, отведенное на разговоры, закончилось. В воздухе проступили очертания входа в шлюз додекаэдра — на том месте, где они и были. Дверь Магритта исчезла — в порядке симметрии или в силу внутренней взаимосвязи в некотором законе сохранения измерений. Все представились. Объясняя императору Цинь, кем был ее отец, Элли чувствовала себя полной дурой. Но Си деловито переводил, и они пожимали руки, словно впервые встретились на пикнике. Жена Эда была воистину прекрасна, и Суриндар Гхош внимательно разглядывал ее. Деви не придавала этому значения, быть может, ее удовлетворило уже только качество подделки.</p><p class="p1">— А куда ты попала, переступив порог? — тихо спросила ее Элли.</p><p class="p1">— Мейденхолл-уэй, дом 16, квартира 4, — отвечала она.</p><p class="p1">Элли недоуменно глядела.</p><p class="p1">— Наша квартира в Лондоне в 1973 году, — Деви кивнула в сторону Суриндара. — Он был тогда жив.</p><p class="p1">Элли подумала, а куда попала бы она сама, если бы хватило смелости переступить этот порог? В Висконсин, в конец 50-х годов? Но она отбилась от стада, и отец разыскал ее, как это частенько случалось тогда в Висконсине.</p><p class="p1">Эда тоже сообщили о послании, скрытом в трансцендентном числе, только с ним говорили не о «пи» или «е» — основами натуральных логарифмов, а о классе чисел, про который она даже не слыхала. Учитывая бесконечность трансцендентных чисел, математикам на Земле трудно будет разобраться, с каким числом придется иметь дело.</p><p class="p1">— Я просто напрашивался, чтобы меня оставили и разрешили поработать, — тихо сказал он Элли. — Я почувствовал, что им нужна помощь, может быть, просто свежий взгляд. Но я понял, «то это дело имеет для них личный оттенок. И они не хотят делить его ни с кем. Но, честно говоря, я считаю, что у нас еще мало мозгов, чтобы предлагать им помощь.</p><p class="p1">Они еще не расшифровали послание, заключенное в «пи»? Это хозяева станции, «обслуживающий персонал», создатели галактик не сумели разобраться с численным кодом за один или два галактических оборота? Или же шифр невероятно сложен, или они?..</p><p class="p1">— Время отправляться домой, — мягко сказал отец.</p><p class="p1">Это было ужасно. Она так не хотела. Элли попыталась глядеть только на пальмовую ветвь. И попробовала задавать вопросы:</p><p class="p1">— Что значит домой? Обратно в Солнечную систему? А как мы спустимся на Землю?</p><p class="p1">— Увидите, — отвечал он. — Вам будет интересно.</p><p class="p1">И он взял ее за плечи, подталкивая к открытому люку.</p><p class="p1">Все было как в детстве. Но, если хватит смекалки задать умный вопрос, тебе позволят чуточку задержаться. В детстве она успешно пользовалась этой уловкой.</p><p class="p1">— Значит, Земля теперь подсоединена, так? В обе стороны? Мы можем отправляться домой, а вы можете в любой миг нагрянуть к нам? Знаете, что-то я начинаю волноваться. Давайте-ка лучше разорвем связь. Прямо сейчас и отсюда.</p><p class="p1">— Извини, Тинка, — отвечал он, словно бы она уже позорно просрочила свое время. Относилось ли его «извини» к тоннелю или к тому, что им пора отправляться? — Пока тоннель будет открыт только для одностороннего движения, от нас к вам, но мы не собираемся им пользоваться.</p><p class="p1">Двадцать шесть световых лет между Землей и Вегой вполне устраивали ее: от наказания за проказы надебоширившую Землю отделяло 52 года. Связь через черные дыры казалась менее приемлемой. Тут они могут нагрянуть мгновенно, прямо на Хоккайдо или сразу повсюду. Транспорт обеспечивал им, как говорил Хадден, возможность для микроинтервенции. Какие бы заверения они сейчас ни давали, все равно будут пристально следить за людьми. Теперь все — никаких проверок каждые десять миллионов лет.</p><p class="p1">Она пыталась разобраться в собственных мыслях. Ситуация явно обретала теологический оттенок: небо действительно населено существами, обладающими невероятными познаниями и могуществом, а также вполне определенными взглядами на поведение рода человеческого. Пусть на словах они и не претендуют на подобную роль, но кто может помешать им казнить и миловать, воздавать по заслугам обитателям крошечной Земли? Чем все это отличается от древних религий? — размышляла она. Ответ явился мгновенно — свидетельствами: ее видеоленты и рассказы членов Пятерки поведают людям Земли о существовании станции, о транспортной системе, образованной черными дырами. Пять независимых свидетельств, подкрепленных убедительными физическими доказательствами, — это факт, а не пустой слух или праздная болтовня.</p><p class="p1">Она повернулась к отцу и выронила из руки пальмовую ветвь. Не говоря ни слова, он нагнулся и поднял ее, чтобы вернуть.</p><p class="p1">— Ты ответил на все мои вопросы, может быть, и я могу что-нибудь рассказать.</p><p class="p1">— Спасибо. Вчера ночью вы ответили на все наши вопросы.</p><p class="p1">— Правда? А что делать нам? Неужели никаких заповедей и наставлений провинциалам?</p><p class="p1">— Все делается не так, Тинка. Просто вы выросли. И теперь сами отвечаете за себя, — склонив голову набок, он вновь ухмыльнулся, и она снова рванулась к родному лицу, ощущая, как ее глаза наполняются слезами. Она не отпускала его до тех пор, пока не почувствовала, что он ласково высвобождается. Время отправляться в постель. Ей вновь представилось, как, выставив указательный пальчик, она выпрашивает у него еще минутку. Впрочем, зачем расстраивать папу.</p><p class="p1">— Пока, Тинка, — сказал он, — передай маме, что я люблю ее.</p><p class="p1">— Будь умником, — ответила она и в последний раз бросила взгляд на оказавшийся в самом центре Галактики морской берег Земли, над которым в столбах восходящего воздуха парили две птицы, похожие на буревестников. Они висели в небе, чуть подрагивая крыльями. У самого входа в шлюз она повернулась и окликнула отца:</p><p class="p1">— А что оказалось в вашем <em>Послании</em>? В том, которое заключено в «пи»?</p><p class="p1">— Не знаю, — с легкой грустью отвечал он, шагнув в ее сторону. — Быть может, все это просто причуда статистики, мы еще работаем над ним.</p><p class="p1">Подул ветерок, шевельнул ее волосы.</p><p class="p1">— Хорошо, позвоните нам, когда что-нибудь выясните, — сказала она.</p></span></span>
