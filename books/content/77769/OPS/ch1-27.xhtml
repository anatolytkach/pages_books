<span><span id="id24"><div class="title4">
<p class="p">21. Причинность</p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v">…Как мухам дети в шутку,</p>
<p class="v">Нам любят боги крылья обрывать.</p>
</div>
<p class="text-author">Уильям Шекспир. «Король Лир», IV, 1,36</p>
</div>
</div><div class="epigraph">
<p class="p1">…Всемогущий будет бояться всего.</p>
<p class="text-author">Пьер Корнель. «Цинна», IV, 2</p>
</div><p class="p1">Они были так счастливы: вернулись! Теряя голову от восторга, разразились криками. Они вставали на кресла. Обнимались и хлопали друг друга по плечу. Все чуть не плакали. Они сделали это — не только сделали, но и вернулись, в обратном порядке проследовав по тоннелям. Перебивая помехи, из громкоговорителя вдруг донеслось сообщение о ходе работы Машины. Все три бензеля замедляли свой бег. Наведенный электрический заряд рассеивался. Судя по всему, снаружи не имели никакого представления о том, что с ними произошло.</p><p class="p1">Сколько же времени прошло на Земле, подумала Элли. Она поглядела на часы. Первый день 2000 года. Многозначительное совпадение. И Элли с надеждой погладила пенальчик с микрокассетами. Мир изменится, познакомившись с ними!</p><p class="p1">В пространство между бензелями подали воздух. Загремела дверь воздушного шлюза, по радио запросили о состоянии экипажа.</p><p class="p1">— Великолепное! — крикнула Элли в свой микрофон. — Выпускайте нас. Вы даже не представляете, что с нами было.</p><p class="p1">Появившись из люка, Пятерка горячо и благодарно приветствовала всех, кто строил и приводил в действие Машину. Японские инженеры салютовали им. Официальные лица торопились навстречу.</p><p class="p1">Деви тихо заметила:</p><p class="p1">— Элли, почему-то все одеты именно так, как вчера. Видишь — на Валериане все тот же жуткий желтый галстук.</p><p class="p1">— Ну он всегда таскает его на шее, — отвечала Элли. — Жена подарила. — На часах было 15:20. Машина включилась почти сутки назад — около трех часов дня. Они провели там чуть больше 24 часов.</p><p class="p1">— Какой сегодня день? — спросила она. На нее смотрели явно не понимая… Что-то было не так.</p><p class="p1">— Питер, напомните, ради бога, какой сегодня день.</p><p class="p1">— Что вы хотите сказать? — спросил Валериан. — Сегодняшний. Пятница 31 декабря 1999 года. Канун Нового года. Вы про это? Элли, с вами все в порядке?</p><p class="p1">Но ВГ уже просил разрешения у Архангельского начать повествование с самого начала. Чиновники и представители консорциума тесным кольцом окружали их. Она увидела дер Хиира, проталкивавшегося к ней через толпу.</p><p class="p1">— А что вы видели отсюда? — спросила она, когда тот уже мог услышать ее.</p><p class="p1">— Ничего. Сработала вакуумная система. Бензеля раскрутились. Скопился электрический заряд. Потом бензеля достигли заданной скорости и то же самое произошло в обратном порядке.</p><p class="p1">— Что значит «в обратном порядке»?</p><p class="p1">— Бензеля замедлились, заряд рассеялся. Подали воздух, бензеля остановились и вы вышли. На все ушло минут двадцать. Пока бензеля вращались, с вами нельзя было разговаривать. А вы хоть что-нибудь почувствовали?</p><p class="p1">Она рассмеялась.</p><p class="p1">— Кен, мальчик мой, у нас для тебя целая история.</p><p class="p1">Пуск Машины и Новый год персонал проекта отметил вечеринкой. Элли и ее товарищи по путешествию отсутствовали. По телевизору показывали праздники, парады, выставки, ретроспективы… лидеры наций выступали с оптимистическими прогнозами. На экране появился даже настоятель Уцуми; он сохранял обычное благочестие. Но ей некогда было бездельничать. Заслушав начало их приключений, директорат проекта решил: что-то не так, и Пятерке было предписано одиночество. Всех пятерых извлекли прямо из толпы правительственных чиновников и официальных представителей консорциума и отправили на предварительный допрос. Официальные лица полагали уместным, чтобы допрос членов Пятерки проводили поодиночке.</p><p class="p1">Дер Хиир и Валериан беседовали с Элли в небольшом конференц-зале. Присутствовали и другие официальные лица, в том числе Анатолий Гольдман, бывший студент ВГ. Она поняла, что Бобби Буи, разговаривавший и по-русски, представляет Америку на допросе ВГ.</p><p class="p1">Слушали вежливо, а Питер время от времени подбадривал ее. Слушатели с трудом воспринимали последовательность событий. Многое из того, что она рассказывала, вызывало в них лишь одно беспокойство — и никакого восторга. Им было трудно понять, что за двадцать минут додекаэдр где-то провел целый день, поскольку армада расположенных снаружи приборов регистрировала все аспекты события и ничего необычного не обнаружила. По словам Валериана, когда бензеля достигли нужного числа оборотов, они заметили только, как дрогнули стрелки, а точнее, эквивалент стрелок на нескольких приборах неизвестного назначения. Потом бензеля замедлили свое вращение и остановились, а Пятерка выбралась из Машины в состоянии крайнего возбуждения. Он не сказал, что они «несли чепуху», но она чувствовала его озабоченность. Элли выказывали всяческое уважение, но она словно читала на лицах вокруг мысль: так вот для чего предназначена эта Машина, на какие-то двадцать минут человек попадает в мир иллюзий или же просто сходит с ума.</p><p class="p1">Она попыталась воспроизвести свои записи на видеокассетах. Коробочки были аккуратно подписаны: «Система колец Веги», «Радиокомплекс Вега», «Пятерная система», «Звезды центра Галактики» и последняя — «Пляж». Она вставила их в видеомагнитофон, нажала на кнопки… пусто. На всех ничего не было. Кассеты были девственно чистыми. Она даже понять не могла, как это произошло. Элли старательно училась пользоваться видеокамерой и успешно прошла испытания перед пуском Машины. Она даже успела проверить камеру несколько раз на пути из системы Веги. Еще больше огорчило то, что отказали и все прочие инструменты, которые брали ее спутники. И вот теперь Питер Валериан выражал желание верить ей, дер Хиир тоже. Но желания мало. Вся эта история, с которой возвратилась Пятерка, оказалась несколько неожиданной и абсолютно не подтвержденной физическими свидетельствами. Еще бы — ведь времени у них было мало. Всего двадцать минут.</p><p class="p1">Такого приема она не ожидала. Но Элли была уверена, что все уладится. В настоящее время с нее было довольно воспоминаний, и она просто старалась по возможности все припомнить — так, чтобы ничего не забыть.</p><p class="p1">От Камчатки подступал фронт крайне холодного воздуха, но в первый день Нового года было необычно тепло, и в Международный аэропорт Саппоро дождем посыпались специальные рейсы. В самолете с надписью «Соединенные Штаты Америки» прибыл новый министр обороны Майкл Китц, а с ним на скорую руку подобранная группа экспертов. Вашингтон подтвердил их прибытие лишь тогда, когда слухи уже широко расползлись по Хоккайдо. В кратком пресс-релизе значилось, что визит является рабочим и не связан ни с какими кризисами или опасными ситуациями; кроме того, в нем отмечалось, что на сборочном предприятии «Машина» к северо-востоку от Саппоро не произошло ничего экстраординарного. Из Москвы всю ночь летел Ту-120, среди прочих он доставил Стефана Баруду и Тимофея Готридзе. Безусловно, обеим ответственным делегациям вовсе не улыбалось проводить новогодний праздник вдали от семей. Но погода на Хоккайдо явила приятный сюрприз, в Саппоро таяли ледяные фигуры, и слепленный додекаэдр превратился в груду льда. Из-под его осевших и округлившихся боков, некогда бывших пятиугольниками, вытекали ручейки.</p><p class="p1">А через два дня началась метель, и добраться к Машине даже наземным транспортом стало уже невозможно. Оказалась нарушенной работа радио и телевидения: наверняка повалило ретрансляционную микроволновую башню. Во время всего расследования связь с остальным миром можно было осуществлять только по телефону. И по вполне понятным причинам с помощью додекаэдра, думала Элл и. Ей так и хотелось одной забраться на борт, раскрутить бензеля и… Она с наслаждением фантазировала на эту тему. Но уверенности в том, что Машина сработает, у нее не было: едва ли теперь возможно войти в тоннель с этого конца. Отец сказал ей, что этого не будет. Она вновь позволила себе вспомнить про песчаный пляж. И про него. Что бы теперь ни случилось, но рана в самой глубине ее существа исцелилась. Правда, мир еще не знал более дорогостоящего курса психотерапии. Многозначительный факт, думала Элли.</p><p class="p1">Национальные представители провели беседы с Си и Сукхавати. Хотя Нигерия не играла значительной роли ни в приеме Послания, ни в его дешифровке, Эда с готовностью провел беседу с нигерийскими официальными лицами. Тем временем ВГ и Элли проходили куда более изощренное собеседование с высококлассными профессионалами, вызванными с этой целью из Союза и Штатов. Представители третьих стран поначалу на эти беседы не допускались, но после возражений консорциума обе державы вновь вспомнили про интернационализм.</p><p class="p1">Собеседование с Элли вел Китц, и, учитывая быстроту событий, он оказался на удивление хорошо информированным. Валериан и дер Хиир старались время от времени замолвить за нее доброе слово, задавали наводящие вопросы. Но спектаклем руководил Китц.</p><p class="p1">Он сказал Элли, что к ее повествованию относится скептически, но вместе с тем конструктивно — в лучших научных традициях. И выразил надежду, что его прямоту она не примет за личный выпад. Сам он испытывает к ней величайшее уважение и постарается не показать, что является давним противником создания Машины. Элли решила оставить без внимания столь наглую ложь и начала рассказывать.</p><p class="p1">Сперва он внимательно слушал, интересовался подробностями, извинялся, перебивая ее. Но на второй день от подобных любезностей уже не осталось и следа.</p><p class="p1">— Итак, нигерийца посетила жена, индуску — ее покойный муж, русского — воструха внучка, китайца — какой-то монгольский хан…</p><p class="p1">— Но Цинь не был монголом.</p><p class="p1">— А вас — ради бога молчите — встретил безвременно усопший отец, сообщивший, что вместе с друзьями занят перестройкой Вселенной. «Отче наш, иже еси на небесех!» Что мы видим? Воздействие религии, историческую антропологию, наконец, Фрейда. Разве вы сами не понимаете этого? Вы же не только пытаетесь убедить нас, что ваш отец восстал из мертвых, вы хотите еще утверждать, что он-то и сотворил Вселенную…</p><p class="p1">— Вы искажаете мои…</p><p class="p1">— Бросьте, Эрроуэй. Хватит оскорблять наш разум. Вы не представили нам ни одного свидетельства и надеетесь, что мы поверим подобной лжи, самой наглой во всей истории человечества. Зачем вы пошли на это? Вы ведь умная женщина. Как могли вы думать, что удастся отделаться от нас такими бреднями?</p><p class="p1">Элли пыталась протестовать. Валериан тоже. Он даже сказал, что считает эти допросы пустой тратой времени. Тем более когда Машина подвергается тонким физическим исследованиям. Китц согласился с тем, что физические доказательства могли бы иметь большое значение. Но заявил, что уже сам рассказ Эрроуэй вполне позволяет понять, что произошло.</p><p class="p1">— Эрроуэй, встреча на небе с отцом доказывает, что вы воспитаны в иудео-христианской культуре. Из всей Пятерки только вы одна полностью принадлежите к ней и лишь вы встречаете там отца. Все согласуется слишком хорошо. К сожалению, в вашем рассказе нет полета фантазии.</p><p class="p1">Дело было плохо. Подобного приема она даже не могла представить. Элли ощутила нечто вроде эпистемологической<a href="ch2.xhtml#id7" class="a">[57]</a> паники — как случается, когда твоей машины не оказывается на том месте, где ты вчера ее оставила, или когда запертая с вечера дверь утром оказывается распахнутой настежь.</p><p class="p1">— Вы обвиняете нас в жульничестве?</p><p class="p1">— Хорошо, давайте я объясню вам нашу позицию, доктор Эрроуэй. В молодости я работал в прокуратуре графства Кук. И у нас обвинитель ставил обычно всего три вопроса. — Он принялся загибать пальцы. — Мог ли обвиняемый совершить преступление? Обладал ли необходимыми средствами? Были ли у него мотивы для этого?</p><p class="p1">— Для чего?</p><p class="p1">Он пренебрежительно поглядел на нее.</p><p class="p1">— Но ведь и наши часы свидетельствуют, что мы отсутствовали больше суток, — возразила Элли.</p><p class="p1">— Ну просто не понимаю, как это я мог быть таким дураком, — насмешливо хлопнул себя по лбу Китц. — Вы одним махом разделались со всеми моими аргументами. Ну как я мог забыть, что часы невозможно перевести на день вперед.</p><p class="p1">— Значит, вы предполагаете заговор. Вы считаете, что Си лжет? И Эда… И…</p><p class="p1">— Я считаю, что нам пора переходить к более важным вопросам. Знаете, Питер, — Китц повернулся к Валериану, — я почти убежден в вашей правоте. Результаты измерений начнут поступать завтра с утра. Поэтому не будем тратить время на… сказки. Сделаем перерыв до завтра.</p><p class="p1">За все дневное обсуждение дер Хиир не проронил ни слова. Лишь изредка неуверенно улыбался ей, и она просто не могла удержаться, чтобы не сопоставить эту улыбку с отцовской. Он чего-то требовал от нее, о чем-то просил одними глазами. Но чего он добивался, Элли понять не могла… Быть может, чтобы она сменила пластинку. Он был знаком с воспоминаниями ее детства, знал, как горевала она об отце. И во взгляде дер Хиира читалось сомнение: не свихнулась ли она в самом деле. А значит, поняла Элли, и все остальные. Массовая истерия. Общая галлюцинация. Folie a cinq<a href="ch2.xhtml#id5" class="a">[58]</a>.</p><p class="p1">— Ну вот, — проговорил Китц. Отчет оказался толщиной в сантиметр. Разбрасывая карандаши, он бросил папку на стол. — Можете проглядеть, доктор Эрроуэй, но, пожалуй, лучше я сперва вкратце изложу вам его содержание.</p><p class="p1">Элли согласно кивнула. Она уже слыхала, что результаты обследования аппарата в высшей степени подтверждают рассказы Пятерки.</p><p class="p1">— Додекаэдр <em>явно</em>, — на последнем слове он сделал ударение, — подвергался воздействию совершенно иных нагрузок, чем бензеля и опорная конструкция. На него действовали колоссальные сжимающие и растягивающие напряжения. Просто чудом все не развалилось на куски, это же относится и к вам. Далее, он побывал в условиях интенсивного радиационного воздействия и до сих пор сохраняет некоторую наведенную радиацию; обнаружены следы космических лучей. Вот вам и второе чудо: как вам удалось выжить после этого облучения? На тех самых боковых гранях, которые, по вашим словам, все время скребли о стенки тоннеля, не обнаружено даже слабых признаков эрозии, нет и следов теплового воздействия; последние появились бы в случае вхождения в атмосферу Земли с достаточной скоростью.</p><p class="p1">— Разве это не подтверждает наш рассказ? Майкл, подумайте. При падении в классическую черную дыру материал будут терзать напряжения расширения и сжатия. Наука знает об этом уже лет пятьдесят. Не знаю, почему мы их не ощущали, быть может, нас как-то защищал додекаэдр. Кроме того, возле черных дыр и у центра Галактики существует жесткое излучение. И радиационное воздействие на материалы вполне независимо подтверждает наш рассказ: ведь мы побывали у черных дыр и галактического центра. Радиационные эффекты нельзя сфальсифицировать. Я не знаю, почему на гранях нет царапин, но поймите, мы имеем дело со взаимодействием едва знакомого нам материала с веществом, полностью неизвестным. Оплавления и обугливания можно было не ждать — ведь мы не входили в атмосферу Земли. Думается, все свидетельства полностью подтверждают нашу историю. Что вас смущает?</p><p class="p1">— Что смущает? То, что все вы слишком умны. А давайте-ка глянем на все глазами скептика. Просто шагнем в сторону и поглядим на всю картину. Что мы имеем: горстку талантливых людей в разных странах. Прекрасно понимая, что мир вот-вот взлетит на воздух, они фальсифицируют Послание из космоса.</p><p class="p1">— Фальсифицируют?</p><p class="p1">— Позвольте мне договорить. Потом они его дешифруют и объявляют, что могут теперь построить очень сложную Машину и задешево — всего за пару триллионов долларов. Мир озадачен, религии трепещут, все ждут наступления нового тысячелетия, и вдруг, ко всеобщему удивлению, оказывается, что Машина готова. И тогда, за одним-двумя исключениями, те же знакомые лица…</p><p class="p1">— <em>Отнюдь не</em> те же, причем здесь Сукхавати, причем Си, причем Эда, и мы забыли…</p><p class="p1">— Дайте же договорить. <em>Практически</em> те же люди получают возможность оказаться в Машине. Правда, ее конструкция не позволяет видеть, чем они заняты после начала эксперимента… и разговаривать с ними тоже. Итак, Машину включают, потом она сама выключается… Ее просто нельзя остановить раньше, чем через двадцать минут. Тогда те же люди, сияя от радости, выбираются из Машины и дарят нам забавно придуманную историйку — о сверхсветовом путешествии к центру Галактики и обратно по всяким там черным дырам. Хорошо, но речь заходит о доказательствах: снимках, видеолентах и так далее… И что же, догадайтесь! Все по счастливой случайности стерто. Ну хотя бы что-нибудь, сувенирчик какой-нибудь прихватили, выпросили у этой своей высшей цивилизации, рассевшейся в центре Галактики! Нет. Хотя бы камешек какой! Нет и камешка. Так зверюшку! Тоже нет. Ничего нет! Единственное физическое свидетельство — разные тонкие повреждения Машины. Остается спросить себя, разве не могут столь умные люди, тем более при такой мотивации, сфабриковать и повреждения, учитывая, что на всю подделку потрачено два триллиона долларов?</p><p class="p1">Элли так и охнула. Она прекрасно помнила, когда такое с ней было в последний раз. Китц излагал события раздражительным и неприязненным тоном. Она подумала, зачем это ему понадобилось? И решила, должно быть, он и впрямь очень расстроен.</p><p class="p1">— Я сомневаюсь, чтобы кто-нибудь поверил в ваши россказни, — продолжал Китц. — Ваша афера — самая остроумная и самая дорогая во всей истории Земли. Вы со своими дружками попытались надуть президента Соединенных Штатов и весь американский народ, не говоря уже о руководителях других стран. Должно быть, вы действительно решили, что вокруг вас одни дураки.</p><p class="p1">— Майкл, это безумие. Десятки тысяч людей записывали Послание, расшифровывали его, строили Машину. Послание записано на магнитные ленты и лазерные диски… на распечатках оно хранится в обсерваториях всего мира. Или вы решили, что все радиоастрономы организовали заговор и привлекли к нему аэрокосмические и электронные компании…</p><p class="p1">— Да нет же. Можно ограничиться меньшим. Нужен только так расположенный в космосе передатчик, чтобы все было похоже на Вегу. Знаете, как вы сделали это? Сперва подготовили Послание, а потом некто… некто, имеющий доступ к пуску космических объектов, отправил ваш передатчик наверх. Скорее всего в качестве побочной задачи его вывели на орбиту, соответствующую сидериальному движению Веги. Может быть, вам потребовался не один спутник. Затем передатчик включается и — хоп! — начинается «угадайка»: ваша обсерватория принимает Послание, делает открытие, а потом сообщает всем разнесчастным жлобам, что оно означает.</p><p class="p1">Тут не выдержал и дер Хиир. Он приподнялся.</p><p class="p1">— Ну знаешь, Майк…</p><p class="p1">Но Элли перебила его:</p><p class="p1">— Я не занималась дешифровкой. С ней возилась целая куча народа. В особенности Драмлин. Вы ведь знаете — сперва он был убежденным противником этих работ. Но когда начали поступать данные, он словно преобразился и принял нашу правоту без всяких оговорок.</p><p class="p1">— Ах да, Драмлин. Бедный Дейв. <em>Покойный</em> Драмлин. О нем вам пришлось позаботиться. Ваш прежний учитель, которого вы никогда не любили.</p><p class="p1">Дер Хиир еще ниже осел в кресле, Элли словно увидела, как он информирует Китца о содержании их интимных бесед. Она пристально посмотрела на него. Возможно.</p><p class="p1">— Когда Послание стали дешифровывать… конечно, не могли же вы сами сделать все. У вас и так <em>хватало</em> дел. Об этом забудешь, о том не вспомнишь. А Драмлин стареет, его тревожит, что бывшая студентка обскакала его. И вдруг перед ним открывается возможность включиться в дело, да еще сыграть в нем главную роль. Вы поймали Дейва на его же собственном нарциссизме. А если бы он не сумел во всем разобраться самостоятельно, вы помогли бы ему. В худшем случае, конечно, вам пришлось бы самой шелушить вашу луковицу.</p><p class="p1">— То есть вы утверждаете, что мы сумели сфабриковать это Послание? Ну знаете, это невероятный комплимент — и мне, и ВГ. Это же невозможно. Немыслимо. Спросите любого компетентного инженера, способна ли горстка физиков и радиоастрономов изобрести эту Машину со всеми прилагавшимися к ней технологическими новшествами? К тому же, где нам было взять <em>время</em> на все эти работы, даже если мы и знали, как все сделать? На такое ушли бы многие годы.</p><p class="p1">— У вас <em>были</em> годы на это, когда «Аргус» ничем не занимался. Работы находились под угрозой закрытия. Драмлин — вы помните — проталкивал такое решение. И именно в самый критический момент начинается передача. Конечно, все разговоры о прекращении работ сразу смолкли. Знаете, по-моему, вы с этим русским и <em>подготовили</em> всю эту аферу в свободное время, которого у вас было предостаточно.</p><p class="p1">— Это же безумие, — проговорила Элли.</p><p class="p1">Тут вмешался Валериан и объяснил, что интересовался делами доктора Эрроуэй в указанный период. Все эти годы она интенсивно занималась научной работой. И временем, необходимым на осуществление столь утонченного обмана, никогда не располагала. При всем уважении к доктору Эрроуэй, если угодно, при всем восхищении ее способностями, он вынужден заявить, что создание Послания и Машины далеко превосходит ее возможности… и не только ее одной. Всех ученых Земли.</p><p class="p1">Но Китц не поддавался.</p><p class="p1">— Это ваше личное мнение, доктор Валериан. Сколько людей, столько суждений. Вы симпатизируете доктору Эрроуэй. Я тоже. Вполне понятно, что вы выступаете в ее защиту, но у нас есть решающий довод. Вы еще не знаете о нем. Слушайте.</p><p class="p1">Склонившись вперед, он внимательно глядел на Элли. Его явно интересовала ее реакция на последующие слова.</p><p class="p1">— Передача Послания прекратилась. Это случилось в момент включения Машины. Когда бензеля вышли на крейсерский режим. С точностью до секунды — это подтверждает весь мир, все обсерватории, наблюдавшие в тот день за Вегой. Мы умолчали об этом, чтобы не отвлекать вас. Послание остановилось на полуслове… Элли, тут вы поступили явно опрометчиво.</p><p class="p1">— Майкл, мне об этом ничего не известно. Но даже если это так, что здесь особенного? Послание выполнило свою функцию. Мы соорудили Машину и отправились в… туда, куда им было нужно.</p><p class="p1">— Но этот факт и ставит вас в затруднительное положение, — продолжал Китц.</p><p class="p1">Вдруг она поняла, куда он гнет. Такого она не ожидала. Он все твердил о заговоре, и ей чудилось безумие в его речах. Но раз он в своем уме, быть может, что-то стряслось с ней самой. Если даже наша цивилизация производит галлюциногены, вызывающие иллюзии, то, вероятно, и более развитые цивилизации способны вызывать чрезвычайно четкие коллективные галлюцинации. На миг это показалось ей возможным.</p><p class="p1">— Давайте подумаем, — проговорил Китц. — Прибывающие на Землю радиоволны оставили Вегу двадцать шесть лет назад. Столько лет им нужно на межзвездный перелет. Но, доктор Эрроуэй, двадцать шесть лет назад не существовало никакой обсерватории «Аргус», а вы разгуливали в прыщах и ныли по поводу Вьетнамской войны и Уотергейта. Конечно, ученые — народ смышленый, но про скорость света забыли. Нет такого способа, которым включенная Машина может остановить передачу Послания раньше, чем пройдет двадцать шесть лет, ведь сигнал в обычном пространстве не может распространяться быстрее света — мы с вами знаем, что это невозможно. Я-то помню, как вы сожалели, что дурни Ренкин и Джосс не знают о том, что передвигаться быстрее света нельзя. И теперь вы вдруг решили, что на это никто не обратит внимания.</p><p class="p1">— Но послушайте, Майкл. Мы слетали туда и обратно, практически не затратив времени на перелет. Двадцать минут, не более. Вблизи сингулярности может нарушаться принцип причинности. Я плохо разбираюсь в этом. Спросите лучше у Эда или ВГ.</p><p class="p1">— Благодарю вас за предложение, — отвечал Китц, — мы уже воспользовались им.</p><p class="p1">Она представила себе ВГ под куда более суровым перекрестным допросом: перед своим всегдашним соперником Архангельским или Барудой — тем самым, кто в свое время предлагал уничтожить радиотелескопы и сжечь записи сигнала. Должно быть, они с Китцем понимали бы друг друга без слов. Элли оставалось только надеяться, что с ВГ не случилось ничего худого.</p><p class="p1">— Вы ведь понимаете меня, доктор Эрроуэй. Я <em>абсолютно</em> в этом уверен. Давайте я повторю. Эти радиоволны были отправлены к Земле двадцать шесть лет назад. Вот они летят между Землей и Вегой. Когда волны оставили Вегу, догнать их в пространстве уже невозможно. Их не остановишь. Даже если передатчик мгновенно зарегистрировал запуск Машины — через вашу черную дыру, если хотите, — сигналы продолжали бы поступать на Землю еще двадцать шесть лет. Не могли ваши веганцы двадцать шесть лет назад наперед с точностью до минуты знать, в какой именно момент будет включена Машина. Чтобы передача прекратилась именно 31 декабря 1999 года, они должны были посылать извещение <em>в прошлое</em>! Так ведь?</p><p class="p1">— Да. Но здесь столько неизвестного. Видите ли, пространственно-временной континуум не зря так называют. И если они способны создавать тоннели в пространстве, почему нельзя предположить, что то же самое они способны проделывать во времени. Тот факт, что мы вернулись на день назад, как раз и указывает на это. По крайней мере в ограниченных масштабах они способны путешествовать во времени. Возможно, когда мы покинули станцию, они отправили сигнал на двадцать шесть лет назад — и передачу закончили. Я просто не знаю этого.</p><p class="p1">— Видите, как удачно все сложилось. Послание, на ваше счастье, закончилось, в противном случае мы могли бы отыскать ваш спутник, перехватить его, извлечь ленты. Тогда-то обман был бы доказан. И вполне однозначно. Вы не могли пойти на такой риск. Приходится придерживаться версии черных дыр, вашего мумбо-юмбо. Как же иначе?</p><p class="p1">Он выглядел озабоченным.</p><p class="p1">Просто параноидальная фантазия… и совершенно невинные факты укладываются в нее, доказывая коварный замысел. Правда, дело отнюдь не банальное и экспертам придется учесть все возможности. И все же в изложении Китца чувствовалась такая озлобленность, что Элли невольно подумала, что он действительно перепуган до чертиков. Она сразу отвергла вероятность коллективной иллюзии. Но все-таки Послание прекратилось — это говорило против нее, в особенности в предложенном Китцем истолковании событий.</p><p class="p1">— Теперь, доктор Эрроуэй, я позволю себе отметить, что у вас, ученых, могло хватить на это ума, имелась и мотивация. Но необходимых средств не было. Пусть даже не русские вывели на орбиту ваш спутник, теперь на это <em>способны</em> не менее полдюжины стран. Но мы все проверили. Никто не запускал спутников на подходящие орбиты. Остается возможность использования частных космических средств. И такую возможность мог предоставить мистер С.Р.Хадден. Слыхали про него?</p><p class="p1">— Не надо этих шуточек, Майкл. Мы же с вами говорили о Хаддене перед моим полетом на «Мафусаил».</p><p class="p1">— Просто хотел убедиться, что вы признаете факт знакомства. Как вам понравится такая схема? Вдвоем с этим русским вы задумываете всю аферу. Хадден финансирует начало работ: изготовление спутника, проектирование Машины, шифровку конструкции и текста, имитацию радиационных повреждений и тому подобное. А взамен, когда будет раскручен проект «Машина», он хочет поживиться частью будущих триллионов долларов. Ему понравилась эта идея. Мало того, что она сулит выгоду, можно еще и правительство поставить в затруднительное положение. И когда возникают сложности в дешифровке — нет введения, — вы даже отправляетесь к нему. И он показывает вам, где искать. Он проявил неосторожность. Вам, Эрроуэй, следовало бы самой обо всем догадаться.</p><p class="p1">— Майкл, подобная неосторожность <em>чрезмерна</em>, — вмешался дер Хиир. — Разве мог тот, кто действительно задумал обман…</p><p class="p1">— Кен, я и сам удивлен. Вы тоже проявили излишнюю доверчивость и прекрасно понимаете это. А теперь вы в точности описываете их соображения… наверное, они сочли остроумным попросить совета у Хаддена. Так, чтобы и мы знали об этом.</p><p class="p1">Он обратился к Элли:</p><p class="p1">— Вот что, доктор Эрроуэй, давайте наконец рассматривать все это с точки зрения нейтрального наблюдателя…</p><p class="p1">Китц настаивал, факты ее жизни искрами вспыхивали в воздухе перед ней, заново укладываясь в предложенные им схемы. Она не считала его тупицей, но подобной изобретательности тоже не подозревала. Быть может, ему помогли. Но эмоциональную основу для этих фантазий, конечно же, обеспечил сам Китц.</p><p class="p1">Он делал широкие жесты, говорил напыщенно и красиво. Это было не просто частью его работы. Этот допрос, собственная интерпретация событий пробудили в нем нечто страстное. Ей показалось, что она поняла в чем дело. Они не привезли с собой оружия инопланетян, не привезли ничего, что могло бы составить текущий политический капитал, — одну лишь донельзя странную историю. Впрочем, имевшую известные последствия. Китц ныне распоряжался самым внушительным арсеналом на всей Земле, но ведь «обслуживающий персонал» умел создавать галактики! А он был всего лишь новым звеном в длинной цепи руководителей, создавших в Америке и Союзе стратегию ядерного противостояния. А сколько миров слилось в амальгаме, составив «обслуживающий персонал»? Уже одно их существование вселяло известные опасения… И еще: что, если тоннель начнет работать — с той стороны, а он, Китц, ничем не сможет помешать этому? Инопланетяне окажутся здесь в один миг. Как тогда ему защищать Соединенные Штаты? Недружелюбно настроенный суд мог бы истолковать его роль в спорах, когда принималось решение строить Машину, как прямое нарушение служебного долга. Что хорошего сможет поведать инопланетянам Китц о плодах управления этой планетой, о достижениях собственных и предшественников? Даже если тоннель не извергнет войско карающих ангелов, мир переменится, узнав правду о путешествии. Он и так уже меняется. А изменится еще больше.</p><p class="p1">И она вновь поглядела на него с сочувствием. Сотни поколений миром правили люди куда худшие, чем Китц. Ему просто не повезло — дорвался до клюшки, когда в правила игры вдруг внесли изменения.</p><p class="p1">— …И даже если вы сами верите в каждую подробность своего рассказа, — говорил он, — разве не ясно, как плохо обошлись с вами внеземляне? Воспользовались обличьем вашего горячо любимого отца, сыграли на самых искренних чувствах. А потом, не поставив вас в известность, засветили все пленки, уничтожили все результаты съемок, даже не позволили оставить там эту дурацкую пальмовую ветвь. Весь инвентарь на месте, отсутствует немного пищи, появилось некоторое количество песка. Итак, за двадцать минут вы что-то сжевали и высыпали из карманов припасенный песок. Вернули они вас примерно через наносекунду после отправления, значит, для постороннего наблюдателя вы никуда и не летали. Если бы внеземляне стремились дать нам понять, что вы и в самом деле где-то побывали, тогда вы вернулись бы через день… через неделю, правильно? Если бы внутри бензелей какое-то время ничего не было, мы просто не могли бы не понять, что вы куда-то улетели. И они не стали бы сразу отключать Послание, если бы хотели как-то облегчить вам жизнь. Так? Вы же понимаете, насколько этот факт компрометирует вас! И они не могли не понимать этого. Тогда зачем же им преднамеренно ухудшать ваше положение? Ваш рассказ они могли бы подтвердить разными путями — ну хотя бы дать какую-нибудь памятку. Могли бы позволить вам возвратиться с отснятыми кадрами. Кто тогда заподозрил бы обман? Почему же они поступили иначе? Почему внеземляне не захотели подтверждать ваш рассказ? Ведь вы так долго пытались разыскать их. Или им не нравится все это? Элли, ну как можно поверить, что эта история действительно произошла? Если это и не выдумка, как вы утверждаете, то все ваши видения — просто… иллюзия. В этом трудно признаться себе, я понимаю. Никто не сознает, что слегка потерял рассудок. А учитывая перенесенное вами психологическое напряжение, подобный исход достаточно вероятен. И если приходится выбирать между временным помешательством и преступным сговором… Может быть, вы все-таки обдумаете это, Элли?</p><p class="p1">Она уже успела подумать.</p><p class="p1">В тот же день, чуть позднее, она встретилась с Китцем наедине. По сути дела, ей предложили сделку. Элли не горела желанием соглашаться, впрочем, Китц был готов и к подобному повороту событий.</p><p class="p1">— Я вам не понравился с первого знакомства, — заявил он, — но как человек я выше этого. Мы будем благородны. Мы уже отправили в прессу сообщение, что Машина была запущена и не сработала. Естественно, мы пытаемся разобраться в чем дело. Учитывая неудачи в Вайоминге и Узбекистане, особых сомнений наше заявление не вызовет. Через несколько недель мы объявим, что положение не изменилось. Мы выполнили все возможное, но продолжение работ требует чрезмерных расходов. Быть может, человечеству просто не хватает еще ума. Но все-таки Машина представляет известную опасность. Как мы всегда и полагали. Машина может взорваться или произойдет что-нибудь подобное. Короче, подводим итог: предпочтительнее заморозить эти работы… до лучших времен. Во всяком случае, мы старались. Хадден вместе со своими друзьями, конечно, возражал бы против этого, но теперь, когда он отправился в заоблачную высь…</p><p class="p1">— Это всего триста километров отсюда, — перебила она.</p><p class="p1">— Ой, значит, вы не слыхали? Сол умер в тот самый момент, когда включили Машину. Не правда ли, странно? Извините, что забыл сообщить вам. Ведь вы были… друзьями.</p><p class="p1">Она уже не знала, верить ли Китцу. Хаддену было немногим больше пятидесяти, и он, безусловно, находился в добром здравии. Придется разузнать обстоятельства.</p><p class="p1">— И какое же место в ваших фантазиях отведено нам? — спросила она.</p><p class="p1">— Нам? Кому это «нам»?</p><p class="p1">— Нам. Пятерым, находившимся на борту Машины, когда она, как вы утверждаете, не сработала?</p><p class="p1">— Ах это. Ну с вами еще поговорят, а потом отпустят. Я надеюсь, что у всех вас хватит ума держать язык за зубами. Но на всякий случай, так сказать, безопасности ради, мы заготовим медицинские заключения. Вот вам общие контуры. Слабый самоконтроль. Все вы принадлежите к числу бунтарей общественной системы, в которой были воспитаны. Вообще, это хорошо. Независимость положительно характеризует человека. Мы приветствуем это качество в ученых. Но напряжение последних лет… Нет-нет, ничего страшного, простое переутомление. В особенности ему подвержены доктора Эрроуэй и Луначарский. Это они обнаружили Послание, прочитали его, а потом убедили правительства в необходимости строить Машину. Но трудности, саботаж, неудачный запуск… Это тяжело. Столько трудов, и без всякого вознаграждения. А ученые — хрупкий народ. И если окажется, что вы слегка свихнулись, все будут только сочувствовать. И ничего более. Но никто не станет вам верить. Никто. Правда, если вы будете вести себя хорошо, этих заключений никто не увидит. Мы покажем миру, что Машина на месте. Едва расчистят дороги, сюда пропустят группу избранных фотографов. И мы покажем им Машину. А что экипаж? Конечно, экипаж испытывает разочарование. Приуныл. И пока не желает разговаривать с прессой. Ну как, по-вашему, изящный план? — улыбнулся он. Надо же, еще добивается, чтобы она одобряла его выдумки. Элли промолчала. — Как хотите, а по-моему, мы даже слишком сговорчивы, если учесть, что выбросили два триллиона долларов, получив за это кучу дерьма! Вас можно было бы упечь в тюрьму, Эрроуэй. Пожизненно! А мы отпускаем вас. Даже оставим вам всю поживу. Я думаю, мы поступаем как джентльмены. Дух тысячелетия. Машиндо, Элли.</p></span></span>
