<p class="p">11. Всемирный консорциум «Послание»</p>
</div><div class="epigraph">
<p class="p1">Почти весь мир поделен на участки, а то, что от него осталось, покоряется, колонизируется, делится. И вот — звезды в ночном небе… Огромные миры, которых нам не суждено достигнуть. Если бы я мог — аннексировал бы планеты; я часто мечтал об этом. Так это грустно — видеть в такой дали их чистый свет.</p>
<p class="text-author">Сесил Джон Родс. «Последняя воля и завещание»</p>
</div><p class="p1">От столика возле окна Элли было видно, как хлещут по мостовой струи дождя. Испуганной ланью, подняв воротник, пронесся промокший насквозь пешеход. Хозяин опустил полосатый навес над лотками рассортированных по размеру устриц, служивших уличной рекламой магазина. В ресторане Chez Dieux<a href="ch2.xhtml#id12" class="a">[23]</a>, известном пристанище театралов, было тепло и уютно. Метеорологи предсказывали ясную погоду — ни зонтика, ни плаща она не захватила.</p><p class="p1">Аналогичным образом экипированный ВГ развивал новую тему:</p><p class="p1">— У меня есть приятельница по имени Мира. По профессии она экдисиаст<a href="ch2.xhtml#id10" class="a">[24]</a> — кажется, я правильно выбрал слово? Когда она работает в вашей стране, ей случается выступать на собраниях и конференциях перед людьми разной профессии. Мира утверждает, что, когда раздевается перед рабочими — скажем на профсоюзных собраниях, — они просто звереют, выкрикивают разные нескромные предложения и пытаются выскочить на сцену. Но когда то же самое она делает перед докторами или адвокатами, те сидят как изваяния. Только иногда облизываются — так она утверждает! И я хочу спросить: чью реакцию следует считать здоровой — адвокатов или металлистов?</p><p class="p1">О том, что ВГ водит знакомство с самыми разными категориями дам, Элли знала давно. Его отношение к женщинам было достаточно прямолинейным и экстравагантным — сама Элли никогда не привлекала его интереса, это одновременно и радовало ее, и сердило, — так что любая могла отказать ему без малейшей неловкости. Многие соглашались. Но все-таки появление в этом кругу личностей, подобных Мире, было несколько неожиданным…</p><p class="p1">Утро они провели за анализом самых свежих данных. Послание не знало усталости и достигло теперь нового важного этапа. Радиоастрономы принимали уже чертежи с Веги. Их передавали тем же методом, что и иллюстрации в газету. На каждую картинку был наложен сетчатый растр. Число белых и черных точек в изображении равнялось произведению двух простых чисел. Снова простые числа. Диаграмм было много, они шли одна за другой, не перемежаясь текстом. Словно иллюстрации на кальке в конце толстого отчета. Когда они закончились, возобновился по-прежнему непонятный текст. Но уже из части диаграмм стало ясно, что ВГ и Архангельский оказались правы: Послание, пусть и частично, содержит инструкции и чертежи для сборки Машины. Каково ее назначение, понять было невозможно. Сегодня в Елисейском дворце на пленарном заседании Всемирного консорциума «Послание» Элли и ВГ должны были впервые ознакомить с некоторыми подробностями представителей других наций, входящих в консорциум. Тем не менее слухи о Машине уже циркулировали.</p><p class="p1">Во время ленча она делилась с ВГ подробностями своих переговоров с Ренкином и Джоссом. Он внимательно слушал, но вопросы не задавал. Словно она исповедовалась перед ним в каких-то порочных для ученого наклонностях, хотя, быть может, эти слова пробудили в нем некие ассоциации.</p><p class="p1">— Вы слыхали про известную артистку стриптиза по имени Мира? С тех пор как Вольфганг Паули открыл принцип исключения, сидя в Фоли-Бержер, я, будучи физиком, считал себя просто обязанным по возможности чаще посещать Париж. Хотя бы только из уважения к Паули. Но почему-то мне никогда не удавалось в собственном отечестве добиться разрешения на это у чиновников, прибегая к такому доводу. Вообще и я тоже не могу обойтись без определенного рода физических упражнений. Но в заведениях вроде того, где мы с Мирой познакомились, я лишь изучаю природу и жду озарения.</p><p class="p1">Тут описательные интонации его голоса сменились деловыми:</p><p class="p1">— Мира утверждает, что американские профессионалы сексуально угнетены, ощущают непрестанные сомнения и чувство вины.</p><p class="p1">— В самом деле? А как характеризует Мира русских профессионалов?</p><p class="p1">— Увы, из них она знакома только со мной. И, естественно, находится в полном восторге. Неплохо было бы завтра провести денек с Мирой.</p><p class="p1">— А все ваши будут на заседании консорциума, — мягко заметила Элли.</p><p class="p1">— Да, к моему счастью, там будете и вы, — хмуро бросил он.</p><p class="p1">— Вас что-то беспокоит, ВГ?</p><p class="p1">Ответил он, правда, не сразу, с легкой, совершенно не свойственной ему неуверенностью.</p><p class="p1">— Не беспокоит… пока просто волнует… Что, если в Послании содержится полное описание Машины? Надо ли нам изготовлять ее? <em>Кто</em> возьмется за это? Консорциум? Организация Объединенных Наций? А кто будет платить? И зачем им это будет нужно? А если Машина потом не сработает? Может быть. Машина нанесет экономический ущерб некоторым странам. Или будет причиной чего-то худшего.</p><p class="p1">Продолжая говорить, Луначарский разлил остатки вина по бокалам.</p><p class="p1">— Даже если Послание начнется заново и мы сумеем прочесть его, удастся ли перевод? Знаете, что говорил Сервантес? Он утверждал: читать перевод — все равно, что рассматривать вышивку <em>с изнанки</em>. Быть может, мы не сможем перевести Послание в точности. И тогда ошибок при изготовлении Машины не избежать. К тому же нельзя быть уверенным даже в том, что мы располагаем всей информацией. Возможно, что-то важное передается на других частотах, пропущенных нами. Знаете, Элли, я просто уверен, что люди сперва отнесутся очень осторожно к этой Машине. Но все-таки однажды настанет день и ее сооружение сделается необходимостью, если, конечно, мы получим введение и расшифруем Послание. А что намеревается предложить американская делегация?</p><p class="p1">— Не знаю, — медленно отвечала Элли, вспоминая, что сразу же после того, как были получены чертежи, дер Хиир начал интересоваться — возможно ли соорудить ее с учетом нынешнего уровня развития технологии и экономики. В этом отношении она ничем не могла ему помочь. Потом она припомнила, что последние несколько недель Кен казался ей очень занятым, иногда даже нервничал. Конечно, он отвечал за все это…</p><p class="p1">— Скажите, а доктор дер Хиир и мистер Китц остановились в том же отеле, что и вы?</p><p class="p1">— Нет, они остановились в посольстве.</p><p class="p1">Так было всегда. Природа советской экономики и необходимость закупать военные технологии, а не потребительские товары, ограничивали русских в твердой валюте. На Западе представителям Советов постоянно не хватало на карманные расходы. Им приходилось останавливаться во второразрядных и еще более худших отелях, даже в меблированных комнатах, тогда как их западные коллеги наслаждались относительной роскошью. Все это часто вызывало известные затруднения в отношениях ученых обеих стран. Оплата счета за такой скромный завтрак нимало не отяготила бы Элли, но была обременительна для ВГ, невзирая на его куда более высокое положение в советской научной иерархии. И теперь ВГ…</p><p class="p1">— ВГ, говорите прямо. Что вы хотите сказать? Что Кен и Майк Китц уже ухватились за это дело?</p><p class="p1">— Именно. Не правда ли, «прямо» — интересное слово: ни влево, ни вправо, а только вперед. И я опасаюсь, что в ближайшие дни мы будем свидетелями преждевременной дискуссии… сооружать ли нам то, что мы не имеем права сооружать. Политики считают, что ученые знают все. А на самом деле мы ничего не знаем. Подобная ситуация таит в себе опасность.</p><p class="p1">До нее наконец дошло, что ВГ считал себя персонально ответственным за раскрытие смысла Послания. И если дальнейшие работы завершатся полной неудачей, он не хотел быть даже косвенной причиной ее. Конечно, у него были и кое-какие менее личные мотивы.</p><p class="p1">— Вы хотите, чтобы я переговорила с Кеном?</p><p class="p1">— Если это удобно. Вы ведь часто встречаетесь, — непринужденно заметил он.</p><p class="p1">— ВГ, не ревнуйте! По-моему, вы заметили мои чувства к Кену, прежде чем я сама в них разобралась. Когда вы в последний раз гостили в «Аргусе», мы с Кеном уже пару месяцев в той или иной степени поддерживали отношения. Надеюсь, вы лично не против?</p><p class="p1">— Что вы, Элли? Я вам не отец и не ревнивый любовник. И желаю только огромного счастья. Просто я предвижу немало возможных неприятностей.</p><p class="p1">Он не стал пояснять, что имеет в виду.</p><p class="p1">Потом они вновь обратились к предварительной интерпретации некоторых диаграмм, покрывавших весь стол. Для разрядки переговорили о политике: о сомнениях Америки в пригодности принципов Манделы для разрешения конфликта в Южной Африке, о все расширяющейся словесной войне между Советским Союзом и Германской Демократической Республикой. Как всегда, и Эрроуэй, и Луначарский с наслаждением критиковали внешнюю политику собственных стран. Это было куда интереснее, чем критиковать чужую политику, даже если последнее сделать было проще. После привычных дебатов по поводу совместного участия в оплате чека Элли заметила, что ливень кончился, но еще падают редкие капли.</p><p class="p1">Вести о Послании с Веги уже успели добраться до последнего закоулка планеты. Люди, прежде не видавшие радиотелескопов и никогда не слыхавшие о простых числах, узнавали странную историю о гласе с небес, о необычных существах — не богах и не людях, — живущих где-то в ночном небе. Их дом — там, в небесах, его легко разглядеть даже при полной луне. И за неумолкающим остервенелым сектантским воем — теперь уже, очевидно, по всему свету — угадывались благоговение и изумление. Свершилось нечто важное, едва ли не чудотворное. И воздух был исполнен возможностей… ощущалось новое начало.</p><p class="p1">«Человечество поступает в высшую школу», — объявляла передовица одной американской газеты.</p><p class="p1">Во Вселенной оказались другие разумные существа. С ними можно было общаться. Скорее всего они были старше нас, возможно, и мудрее. И они послали нам целую библиотеку познаний. Все предчувствовали грядущее откровение века. Специалисты по всем вопросам начали волноваться. Математиков тревожили элементарные начала, которые они могли проглядеть. Религиозных лидеров смущало, что предложенные веганские ценности, какими бы чуждыми они ни были, неминуемо найдут последователей, в особенности среди неоперившейся молодежи. Волновались и астрономы: они не исключали возможности того, что при определении фундаментальных характеристик ближайших звезд могли наделать ошибок. Политические и государственные деятели выражали озабоченность тем, что высшая цивилизация может не одобрить известные на Земле системы правления. И все понимали, что познания веганцев никак не связаны с чисто человеческими институтами, историей земной цивилизации и биологией. Что, если иные из наших истин окажутся лишь недоразумениями, частными случаями, логическими ошибками? И эксперты с нелегким чувством начинали обращаться к основам.</p><p class="p1">Но за всем словесным беспокойством человечество угадывало новое приключение — предстояло заглянуть за угол, вступить в новый век; символическое значение события усиливалось приближением третьего тысячелетия. Политические конфликты никуда не исчезли, некоторые из них были не менее серьезными, чем не прекращающийся кризис в Южной Африке. Но во многих частях света шовинистическая риторика хирела, увядал младенчески самодовольный национализм. Человеческий род, миллионы крохотных искорок жизни, вдруг разом очутился перед беспрецедентной возможностью… а быть может, и перед лицом серьезнейшей опасности, угрожавшей каждому. И многим перед лицом сверхчеловеческой цивилизации с ее огромными потенциальными возможностями казались абсурдными мелочные, но смертельно опасные свары конкурирующих национальных государств. В мире повеяло надеждой. Но люди к ней привыкли, а некоторые путали ее с чем-то другим… смятением или трусостью.</p><p class="p1">Десятки лет, с 1945 года, накапливались запасы стратегических ядерных вооружений. Менялись руководители, менялись ракеты и бомбы, но общее число боеголовок только возрастало. Настало время, когда на Земле их число превысило 25.000 — по десять на каждый город планеты. Инженеры сокращали время полета, увеличивали стойкость ракет к первому удару и стремились хотя бы де-факто обеспечить возможность ответного удара. Только грандиознейшая опасность могла положить конец этой монументальной глупости, которую столь долгое время поощряли руководители многих стран. Но мир наконец обрел разум, по крайней мере в некоторой степени. Соглашение подписали Соединенные Штаты, Советский Союз, Великобритания, Франция и Китай. Оно не преследовало цель избавить мир от ядерного оружия — время для утопии не настало. Но и русские, и американцы согласились сократить свои ядерные арсеналы до тысячи единиц. Подробности были тщательно оговорены, и ни одна из супердержав не испытывала значительных неудобств на стадии сокращения вооружений. Великобритания, Франция и Китай согласились начать сокращение арсеналов, едва супердержавы перейдут границу в 3200 единиц. Ко всеобщему одобрению, Хиросимское соглашение было подписано неподалеку от знаменитой мемориальной доски, поставленной в память погибших в первом городе, разрушенном атомной бомбой: «Покойтесь мирно, подобное не повторится».</p><p class="p1">Каждый день равное количество ядерных зарядов с советских и американских боеголовок поступало на совместное специальное предприятие, созданное Советским Союзом и Соединенными Штатами. Там из них извлекали плутоний, его регистрировали, паковали и отправляли на ядерные электростанции, чтобы превратить в электричество и тепло. Этот процесс, именовавшийся в честь американского адмирала планом Гейлера, одобрял весь мир, справедливо считая его высшим достижением в области перековки мечей на орала. И поскольку каждая нация по-прежнему обладала достаточным количеством средств сдерживания, даже военные не были против. Генералы, как и все прочие люди, тоже не хотят смерти своих детей. Ядерная война исключает многие воинские добродетели: чтобы нажать на кнопку, особой доблести не требуется. Демонтаж первых двух боеголовок записали на пленку и неоднократно передавали по телевидению: советские и американские техники в белых халатах вкатывают в зал два тускло-серых объекта размером с диван, помеченных в разных местах серпом и молотом или звездами и полосами. Передачу видела значительная часть населения Земли. В вечерних новостях обе стороны регулярно подсчитывали число разобранных боеголовок и тех, что еще осталось. Через двадцать с небольшим лет об этом узнают на Веге.</p><p class="p1">В последующие годы разоружение продолжалось своим чередом. Сперва из арсеналов удалили излишний жирок, но военные доктрины не претерпели еще существенных изменений. Последствия кровопускания уже начинали ощущаться — самые опасные системы оружия были уничтожены. Эксперты считали подобное событие невероятным, «противоречащим самой природе человека». Но смертный приговор, как отмечал Сэмюэл Джонсон<a href="ch2.xhtml#id8" class="a">[25]</a>, удивительным образом обостряет рассудок. За последние полгода Штаты и Советский Союз сделали новые серьезные шаги по сворачиванию ядерных вооружений, и дотошные военные инспекции вот-вот должны были обосноваться на территории обоих государств, несмотря на тревогу и недоверие общественного мнения, выражавшиеся устами армейского персонала обеих стран. Организация Объединенных Наций вдруг обнаружила способность эффективно улаживать межнациональные конфликты, как, например, в случае пограничных войн в Западном Ириане или между Чили и Аргентиной. Уже поговаривали, и не без оснований, об ожидающемся подписании соглашения о ненападении между НАТО и странами — участницами Варшавского Договора.</p><p class="p1">Делегаты, съезжавшиеся на первое пленарное заседание Всемирного консорциума «Послание», выражали к друг другу сердечное расположение, совершенно немыслимое в минувшие десятилетия.</p><p class="p1">Каждая нация, располагавшая хотя бы небольшими отрывками Послания, была представлена политиками и учеными; оставалось лишь удивляться тому, сколько стран прислали военных представителей. Несколько делегаций возглавлялись министрами иностранных дел, приехали некоторые главы государств. Делегацию Соединенного Королевства возглавлял виконт Боксфорт, лорд-хранитель печати. Любившей роскошь Элли доставлял удовольствие один его титул. Советской делегацией руководил В.Я.Абухимов, президент Академии наук СССР, заметную роль в ней играли министр среднего машиностроения Готридзе и Архангельский. Президент Соединенных Штатов настояла, чтобы американскую делегацию возглавил дер Хиир, несмотря на то что среди прочих в нее входили помощник госсекретаря Элмо Хоникатт и представитель Министерства обороны Майкл Китц.</p><p class="p1">На обширную и подробную карту, выполненную в проекции равных площадей, были нанесены все радиотелескопы, расположенные на суше и на море — на советских кораблях слежения. Элли оглядела недавно отстроенный конференц-зал, примыкавший к резиденции президента Франции. Шел только второй год его семилетнего срока правления, и президент прилагал все силы, чтобы обеспечить успех конференции. Лица, флаги, национальные облачения отражались в длинных дугах полированных столов красного дерева и в зеркальных стенах. Среди военных и политиков знакомых почти не было, но в состав каждой делегации входил по крайней мере один знакомый инженер или ученый: Аннунциата и Ян Бродерик из Австралии, Федирка из Чехословакии, Брод, Кребийон и Буало из Франции, Кумар Чандрапурана и Деви Сукхавати из Индии, Хиронага и Мацуи из Японии… Элли отметила высокий уровень подготовки делегатов, в особенности японских. Астрофизиков было поменьше: на состав делегаций явно оказала воздействие последняя новость — все слышали, что на конференции будет идти речь о создании какой-то огромной Машины.</p><p class="p1">Еще она узнала итальянца Малатесту; ударившийся в политику физик Биденбо вместе с Клеггом и достопочтенным сэром Артуром Чатосом оживленно болтали позади «Юнион Джека», словно за столиком в ресторане одного из европейских курортов. Она заметила Хайме Ортиса из Испании, швейцарца Прибуду — это озадачивало: Элли прекрасно знала, что Швейцария не располагает радиотелескопами; Бао, блестяще справившегося со сборкой китайского радиотелескопа; Винтергадена из Швеции. Саудовская Аравия, Пакистан и Ирак прислали на удивление большие делегации, конечно, были и советские представители, а среди них она узнала Надю Рождественскую и Генриха Архангельского, тоже разделявших общее радостное возбуждение.</p><p class="p1">Элли искала Луначарского, наконец обнаружив его среди китайцев. ВГ обменивался рукопожатиями с Юй Женьцюном, директором Пекинской радиообсерватории. Она вспомнила, что во времена советско-китайской дружбы оба ученых тесно сотрудничали и считались друзьями. Последующие конфликты прервали все контакты. Китайцы, подобно русским, неохотно выпускали в зарубежные поездки свой старший научный персонал. Элли поняла, что они встретились впервые за целую четверть века.</p><p class="p1">— Что это за старый китаеза, с которым ручкается ВГ? — в устах Китца подобные словесные вольности казались любезностью. Последние несколько дней он постоянно оказывал Элли скромные знаки внимания… На ее взгляд, ничего хорошего это не сулило.</p><p class="p1">— Это Юй — директор Пекинской обсерватории.</p><p class="p1">— А я думал, ребята готовы съесть друг друга с потрохами.</p><p class="p1">— Майкл, — отвечала она, — мир и лучше и, хуже, чем вы о нем думаете.</p><p class="p1">— Вероятно, вы и можете поведать мне нечто, характеризующее его с лучшей стороны, но по части худшей вам едва ли удастся меня просветить.</p><p class="p1">После приветствия президента Франции, ко всеобщему удивлению оставшегося на первые доклады, дер Хиир и Абухимов как сопредседатели доложили процедуру и повестку дня, а потом Элли и ВГ по очереди обобщили имеющуюся информацию — без технических подробностей, все-таки среди собравшихся было много политиков и военных, — ограничившись некоторыми сведениями о том, как работают радиотелескопы, как расположены в космосе ближайшие звезды и об истории Послания-палимпсеста. Их совместное выступление завершилось показом недавно полученного графического материала на специальных мониторах, расставленных перед каждой делегацией. Элли подробно объяснила, как поляризационная модуляция преобразовывается в последовательность нулей и единиц, как из цифр получаются картинки и… что ученые в большинстве случаев еще не имеют ни малейшего представления о сущности изображений.</p><p class="p1">Данные сменяли друг друга на экранах компьютеров. В затемненном зале Элли видела на лицах белые, янтарные и зеленые отблески. На ветвящихся и переплетающихся диаграммах появлялись неожиданные, иногда непристойные биологические формы и идеальный додекаэдр. Длинная последовательность страниц заканчивалась медленно вращавшимся трехмерным изображением. Под каждым непонятным объектом находилась столь же непонятная подпись.</p><p class="p1">ВГ обращал гораздо большее внимание на фактор неопределенности, чем Элли. Но тем не менее, с его точки зрения, не было никаких сомнений в том, что Послание — просто инструкция для сборки Машины. Он и не подумал упоминать о том, что приоритет в этом вопросе принадлежит ему или Архангельскому. Элли при первой же возможности исправила положение.</p><p class="p1">За последние несколько месяцев ей приходилось довольно часто выступать с сообщениями о Послании, и она уже знала, как воодушевляют аудиторию всякие подробности и ожидаемое введение. Но подобной реакции от собравшейся чопорной аудитории она не ожидала. Совместное выступление они с ВГ зачитывали по главам. Когда их выступление завершилось, зал разразился аплодисментами. Советская и восточно-европейские делегации хлопали в унисон — два-три хлопка на сердцебиение, — американцы и многие другие из присутствовавших хлопали каждый сам по себе; этот несинхронизированный белый шум и преобладал в зале. Утопая в неведомом прежде блаженстве, Элли не могла не отметить, насколько же различается национальный индивидуализм американцев и русский коллективизм. Она вспомнила, что американцы в толпе всегда стараются разойтись, почувствовать себя свободнее, в то время как русские держатся насколько возможно близко друг к другу. Разные по стилю аплодисменты и то, что американский хлопок явно доминировал, привели ее в откровенный восторг. На миг она позволила себе вспомнить отчима… отца тоже.</p><p class="p1">После ленча сообщения были продолжены, речь велась об уже полученных данных и их интерпретации. Дэвид Драмлин предложил весьма обстоятельный статистический анализ номеров тех страниц, на которых были отсылки к недавно обнаруженным диаграммам. По его мнению, Послание содержало не только инструкции по сборке Машины, но и описание отдельных узлов и деталей, а также способов их изготовления. В ряде случаев он представлял обоснование наличия в Послании описаний отраслей технологии, еще неведомых на Земле. Открыв рот от удивления, Элли тыкала пальцем в сторону Драмлина, как бы безмолвно спрашивая у Валериана, знал ли он об этом. Выпятив губы, Валериан опустил плечи и повернул руки ладонями вверх. Она искала отражение своих эмоций на лицах остальных делегатов, но видела только усталость. Сложный материал и необходимость рано или поздно принимать политические решения заставляли всех перенапрягаться. После заседания Элли поздравила Драмлина и спросила, почему он не ознакомил ее заранее с новыми результатами. Тот коротко бросил, отходя в сторону:</p><p class="p1">— Просто не хотел беспокоить вас такой чепухой. Надо же было чем-то заняться, пока вы консультировались со святошами.</p><p class="p1">Если бы Драмлин был руководителем моей диссертационной работы, подумала Элли, как же далеко было бы еще до защиты! Драмлин так и не примирился с ней. Их отношения всегда оставались натянутыми. Вздохнув, она подумала, а знал ли Кен о новой работе Драмлина. Вместе с советским сопредседателем дер Хиир сидел на возвышении лицом к изогнутым подковой столам делегатов. Как и последние недели, к нему было не подступиться. Конечно, Драмлин не обязан обсуждать с ней свои открытия. Но почему нельзя хотя бы разговаривать без колкостей… ограничиваясь логической сутью дела? Должно быть, Элли до сих пор подсознательно казалось, что Драмлин перекрывает ей путь к докторской степени, всю дорогу в науку…</p><p class="p1">Утром следующего дня слово было предоставлено советскому делегату. Элли не знала его. На дисплее компьютера значилось: Степан Алексеевич Баруда, директор Института мира, Москва, академик АН СССР, член Центрального Комитета Коммунистической партии Советского Союза.</p><p class="p1">— Началась серьезная игра, — услышала Элли голос Майкла Китца, который обращался к сотруднику госдепартамента Элмо Хоникатту.</p><p class="p1">Щеголеватый Баруда был облачен в элегантный и безукоризненный деловой костюм западного покроя, кажется итальянский. Говорил он непринужденно и почти без акцента. Баруда родился в одной из прибалтийских республик. Слишком молодой для столь важной должности — возглавлявшийся им институт исследовал долговременные последствия стратегического курса на сокращение ядерных вооружений, — он представлял яркий пример новой волны в советском руководстве.</p><p class="p1">— Будем откровенны, — говорил Баруда, — Послание пришло к нам из глубин космоса. И большую часть этой информации приняли Советский Союз и Соединенные Штаты. Важную часть Послания приняли и прочие страны — все представленные на этой конференции. Любой нации, в том числе и русским, пришлось бы долго ждать, пока Послание повторится несколько раз (если это, конечно, произойдет), чтобы принять его целиком. На это ушли бы годы, даже десятилетия, но всем нам не терпится. И потому мы решили поделиться данными. Любое государство, например Советский Союз, могло бы вывести на околоземную орбиту большой радиотелескоп с приемными элементами, настроенными на нужную волну. Это могли бы сделать и американцы либо Япония, Франция или Европейское космическое агентство и самостоятельно получить все данные, потому что расположенный в пространстве радиотелескоп нетрудно постоянно ориентировать на Вегу. Но весь мир мог счесть подобный поступок недружественным актом. Не секрет, что и Соединенные Штаты, и Советский Союз способны сбивать подобные спутники. Мы обменивались данными отчасти и по этой причине: сотрудничество выгодно всем. Наши ученые стремятся обмениваться не только полученными данными, но и итогами размышлений, догадками… и мечтами. В этом отношении все ученые одинаковы. Я не ученый. Моя специальность — руководить. Но я имею представление о науках. Каждая наука осторожна, каждая — подозрительна. Никто из нас по собственной воле не предоставит преимущества возможному противнику. И поэтому здесь речь идет о двух важных моментах — скорее всего их больше, но доминируют по меньшей мере два мнения, — а именно: каждой стране выгоден обмен информацией и каждая старается выгадать для себя некоторые преимущества. Таковы люди. Этот спор выиграли ученые. Поэтому Советский Союз и Соединенные Штаты обменивались большей частью имеющихся у обеих сторон данных, но я хочу подчеркнуть — не всей информацией. Многие данные, полученные другими странами, тоже разошлись по всему миру. Мы рады, что человечество пошло этим путем.</p><p class="p1">Элли шепнула Китцу:</p><p class="p1">— Пустые слова.</p><p class="p1">— Слушайте, — ответил тот.</p><p class="p1">— Но есть и другие источники опасности. И один из них мы хотели бы обсудить на заседании консорциума. — Тон Баруды напомнил Элли рассуждения ВГ за ленчем. Неужели у всех русских зудит именно в этом месте? — Как мы уже слышали, академик Луначарский, доктор Эрроуэй и другие ученые сходятся на том, что перед нами инструкция для сооружения очень сложной Машины. Предположим, как мы все ожидаем, Послание окончится и начнется прием введения, предисловия — так это, кажется, по-английски? — словом, той информации, что позволит нам прочитать Послание. Предположим также, что все члены консорциума по-прежнему интенсивно сотрудничают, обмениваются и данными, и фантазиями, и мечтами. Но что мы знаем о тех, кто шлет нам с Веги эти инструкции? Они делают это не для развлечения. Они хотят, чтобы мы построили Машину. Может быть, в тексте и содержатся указания, для чего она предназначена. Может быть, и нет. Но даже если они и поведают нам об этом, почему мы должны верить их словам? Позвольте мне далее обратиться к собственным фантазиям и предчувствиям. Они безрадостны. Что, если эта Машина — всего лишь троянский конь? С колоссальными затратами мы сооружаем ее, включаем и… армия захватчиков обрушивается на планету. Или же… вдруг это «машина Судного дня»? Строим, включаем — и взрывается вся Земля! Просто принятая у них методика предусматривает подавление цивилизаций, пытающихся проникнуть в космос. Дешевый способ: платишь за телеграмму, и новоявленная выскочка-цивилизация послушно налагает на себя руки.</p><p class="p1">— Это всего лишь предположения, и вы их можете рассмотреть. Надеюсь, обсуждение будет конструктивным. Все мы живем на одной и той же планете, разделяем общие интересы. Не сомневаюсь, что такая формулировка покажется слишком прямолинейной, но все же: не лучше ли сжечь все ленты с данными и разрушить радиотелескопы?</p><p class="p1">Зал забурлил. Многие делегации ринулись одновременно, просили внимания. Сопредседатели сочли необходимым напомнить делегатам, что видео— и диктофонная запись заседаний запрещена. Никаких интервью. Пресса будет получать ежедневные релизы, одобренные сопредседателями и главами делегаций. И все подробности ожидавшейся дискуссии должны оставаться в зале заседаний.</p><p class="p1">Несколько делегатов запросили разъяснении у председательствующих.</p><p class="p1">— Если Баруда прав и мы имеем дело с троянским конем или «машиной Судного дня», — выкрикнул делегат Дании, — мы просто обязаны проинформировать общественное мнение.</p><p class="p1">Но его не расслышали и микрофон не включили. Ожидалось обсуждение куда более серьезных Проблем.</p><p class="p1">Элли торопливо набирала команды на терминале компьютера, чтобы ей дали слово пораньше. Она оказалась второй за Сукхавати, перед делегатом из Китая.</p><p class="p1">Элли была знакома с Деви Сукхавати. Статная, по-западному причесанная сорокалетняя женщина была облачена в роскошное шелковое сари. Медик по образованию, она была одним из ведущих индийских специалистов по молекулярной биологии и теперь все свое время делила между Королевским колледжем в Кембридже и Институтом Тата в Бомбее. В числе немногих индийцев она входила в Лондонское Королевское общество и, по слухам, занимала выгодное политическое положение. Они уже встречались несколько лет назад на Международном симпозиуме в Токио, еще до того, как Послание устранило ряд вопросительных знаков некоторых названий их собственных научных работ.</p><p class="p1">Элли симпатизировала Деви еще и потому, что обе принадлежали к числу немногих женщин, приглашавшихся на научные конференции, посвященные внеземной жизни.</p><p class="p1">— Я понимаю, что академик Баруда поднял важный и тонкий вопрос, — начала Сукхавати. — Было бы глупо и безрассудно отвергать подобную возможность. Учитывая недавнюю нашу историю, идея эта кажется вполне естественной. Однако я хотела бы предостеречь от чрезмерной чувствительности к подобным страхам. Крайне невероятно, чтобы существа, живущие на Веге, находились в точности на нашем уровне технологического развития. Даже на нашей родной планете культуры развиваются не одновременно. Одни опережают, другие запаздывают. Мы знаем, что некоторые культуры способны догонять передовые, по крайней мере технологически. Когда в Индии, Китае, Ираке и Египте существовали высокие цивилизации, в Европе и России жили в лучшем случае кочевники железного века, а в Америке еще доминировала культура камня… Различие технологического уровня в данном случае может оказаться еще более разительным. Внеземляне явно опережают нас более чем на века; быть может, на тысячелетия, на миллионы лет. При этом я прошу вас не забывать про скорость технологического прогресса на Земле в двадцатом столетии. Я выросла в крохотной деревушке на юге Индии. Во времена моей бабушки швейная машина с ножным приводом была технологическим чудом. А на что способны создания, опережающие нас на тысячи лет? Или на миллионы? Один из наших философов сказал: «Изделия достаточно развитой внеземной цивилизации покажутся нам делом магии». И они нас не страшатся. Им нечего опасаться: мы еще долго не сумеем чем-нибудь угрожать им. Это не стычки примерно равных по уровню развития греков и троянцев. И не фантастическое кино, где существа разных миров сражаются похожим оружием. Если они захотят уничтожить нас, то сделают это и без нашей по…</p><p class="p1">— Но какой ценой? — раздался голос из зала. — Или вы не поняли? В этом-то и весь смысл. Баруда утверждает, что наши первые телепередачи просто извещают их: настало время разделаться с нами, а Послание является средством для этого. Карательные экспедиции требуют расходов, Послание много дешевле.</p><p class="p1">Элли не разобрала, кто перебил Деви. Кажется, кто-то из британской делегации. Голос не был усилен микрофоном, председатели не поощряли невыдержанности. Но акустика в конференц-зале была достаточно хорошей, и слова разобрали все. Сидевший на председательском месте дер Хиир пытался соблюдать порядок. Абухимов наклонился вперед и что-то шепнул помощнику.</p><p class="p1">— Вы считаете, что строить Машину опасно, — ответила Сукхавати, — а я считаю, опасно <em>не</em> строить ее. Мне будет стыдно за нашу планету, если мы отвернемся от грядущего. Ваши предки, — она ткнула пальцем в сторону возражавшего, — не были столь застенчивы, отправляясь под парусами в Индию или Америку.</p><p class="p1">Нынешнее заседание обещает сюрпризы, подумала Элли, впрочем, едва ли следует брать в пример Клайва или Рэли<a href="ch2.xhtml#id6" class="a">[26]</a> в решении подобных вопросов. Быть может, в устах Сукхавати это была всего лишь колкость, обращенная к британцам, укор за былые колониальные угнетения. На пульте Элли вспыхнула зеленая лампочка, означавшая, что ее микрофон включен.</p><p class="p1">— Господин председатель, — официальным тоном обратилась она к дер Хииру, которого только мельком видела в течение нескольких дней. Они договорились провести завтра вместе вторую половину дня, воспользовавшись перерывом в заседаниях, и поэтому ход дискуссии ее беспокоил. Ах, не то, думала она.</p><p class="p1">— Господин председатель, мне кажется, мы можем уже сейчас пролить некоторый свет на оба варианта — и троянского коня и «машины Судного дня». Я предполагала обсудить их завтра утром, но сейчас это, по-видимому, более уместно. — Элли набрала на пульте номера нескольких слайдов. В большом зале с зеркальными стенами погас свет.</p><p class="p1">— Мы с доктором Луначарским убеждены, что перед нами различные проекции одной и той же трехмерной конструкции. Вчера мы показали ее во вращении, воспользовавшись компьютерным моделированием. Мы считаем, хотя полной уверенности в этом нет, что перед нами внутреннее помещение Машины, Пока еще не ясен масштаб изображения — может быть, это километры, может быть, нечто микроскопическое. Но прошу вас обратить внимание на эти пять объектов, равномерно расположенных по периферии главной части «интерьера» додекаэдра. Вот один из них. Только эти пять предметов имеют земной аналог. Перед нами обычное кресло, превосходно подходящее для человека. Едва ли возможно, чтобы существа чужого мира, эволюционировавшие в совершенно иных условиях, напоминали нас в такой степени, чтобы разделять наши вкусы относительно меблировки жилых помещений. Посмотрите внимательнее. Еще девочкой я видела такие кресла в кладовой у матери.</p><p class="p1">И в самом деле, не хватало только чехла в цветочках. Элли ощутила легкое чувство вины — в последний раз она звонила матери еще до отправления в Европу, а если совсем честно — вспомнила про нее лишь один или два раза после того, как «Аргус» начал принимать Послание. Элли, Элли, и как ты можешь, корила она себя.</p><p class="p1">На экране вновь показалась вычерченная компьютером диаграмма. Пятилучевая симметрия додекаэдра обусловливала наличие пяти внутренних кресел, каждое из которых было обращено к пятиугольной поверхности.</p><p class="p1">— Так вот, мы, то есть я и доктор Луначарский, убеждены — пять кресел предназначены для нас, для людей. А это значит, что поперечник внутреннего помещения Машины не превышает нескольких метров, а внешний размер — десяти, самое большее двадцати метров. Конечно, создать такую Машину невероятно сложно, но все-таки отрадно, что речь идет не о сооружении размером с город и не столь сложном, как авианосец. Что бы ни представляла собой Машина, объединенными усилиями человечество справится с ее постройкой. Я просто хочу вам сказать; что в бомбу не ставят кресел. На мой взгляд, это не «машина Судного дня» и не троянский конь. Я согласна с тем, что высказала или на что по крайней мере намекнула доктор Сукхавати: сама идея, что Машина может оказаться троянским конем, свидетельствует о том, какой путь нам еще предстоит преодолеть.</p><p class="p1">Выкрики последовали вновь. Но на этот раз дер Хиир не пытался игнорировать их и просто включил микрофон недовольного. Это был тот же самый делегат, что перебивал Сукхавати несколько минут назад, Филипп Биденбо из Соединенного Королевства, министр от лейбористской партии, член нестабильного коалиционного кабинета.</p><p class="p1">— …просто не понимают причину нашей озабоченности. Если бы эта Машина в буквальном смысле слова оказалась деревянным конем, мы бы не испытывали соблазна ввезти инопланетное устройство в городские ворота. Все мы читали Гомера. Но давайте обвесим его попонами и покрывалами — и подозрения сразу исчезнут. Почему? Мы почувствуем, что нам льстят или подкупают нас. Да, нам обещают историческое приключение, сулят новые технологии. Даже намекают — с вами познакомятся… как бы это сказать… высшие существа. Но, невзирая на все милые фантазии радиоастрономов, я утверждаю — если существует даже крошечный шанс того, что Машина может оказаться средством уничтожения, ее не следует строить. Как уже предложил советский делегат, лучше сжечь ленты с данными и объявить создание радиотелескопов тяжким преступлением.</p><p class="p1">Собрание начинало терять благопристойный вид. Делегаты дюжинами просили слова, ожидая электронного разрешения с пульта. Негромкий шум постепенно превратился в гул, напомнивший Элли знакомый радиохаос в эфире. Консенсус явно не представлялся возможным, и сопредседатели не могли унять возбужденных делегатов.</p><p class="p1">Когда встал китайский делегат, информация на экране компьютера запоздала, и Элли оглянулась, пытаясь добиться помощи у кого-нибудь. Она не знала этого человека. К ней склонился Нгуен «Бобби» Буи, сотрудник Совета национальной безопасности, приданный ныне дер Хииру: «Это Си Цяому. Изрядный гусь. Родился во время Великого похода. Двадцатилетним воевал в Корее. Правительственный чиновник, занимается в основном политическими вопросами. Получил нокаут в период Культурной революции. Сейчас член Центрального Комитета. Весьма влиятельная личность. Недавно упоминался в новостях. Ведает в Китае археологическими раскопками».</p><p class="p1">Си Цяому оказался высоким широкоплечим мужчиной. Морщины на лице выдавали его возраст, но благодаря безукоризненной осанке и сложению он выглядел едва ли не молодым. Обязательный китель, как костюм-тройка у американских правительственных деятелей, за исключением, конечно же, нынешнего президента, был застегнут на верхнюю пуговицу. Информация о нем появилась и на экране. Элли вспомнила, что читала длинную статью о Си Цяому в одном из видеожурналов.</p><p class="p1">— Если мы боимся, — заговорил он, — мы ничего не делаем. Это задержит их на время. Но не забывайте, они знают, где нас искать. Наши телепередачи смотрят и на той планете. Мы каждый день напоминаем им о себе. Вы ведь смотрите телевизор? Они не забудут про нас. Даже если мы не станем ничего делать, а им кажется, что мы представляем для них опасность, они явятся сюда сами, и совсем не важно, есть Машина или нет ее. Нам некуда скрыться от них. Не было бы проблемы, если бы мы сидели тихо, ограничиваясь кабельным телевидением и не используя радаров для военных целей. Тогда про нас могли бы и не узнать. Но теперь поздно. Назад пути нет. Курс взят. Если имеются серьезные опасения, что Машина может уничтожить Землю, сборку можно осуществлять и на другой планете. Если она окажется «машиной Судного дня» и взорвет мир… то не наш собственный. Но это будет очень дорого стоить. Пожалуй, слишком дорого. Но если мы боимся не <em>так</em> уж сильно, построим ее посреди великой пустыни. Огромный взрыв в пустыне Такла-Макан в провинции Синьцзин не причинит вреда ни одному человеку. А если мы не боимся вовсе, построим ее в Вашингтоне или Москве. Или в Пекине. Или в этом прекраснейшем городе. В древнем Китае Вегу и две ближайшие к ней звезды называли Пряхой. Видели в них молодую девушку, сидящую возле вращающегося колеса. Многозначительный символ — быть может, эта Машина поможет облачить в новые одежды всех жителей Земли. Мы получили приглашение. Очень необычное приглашение. Может быть, на банкет. Землю прежде не приглашали на банкеты. И отказываться невежливо.</p></span></span>
