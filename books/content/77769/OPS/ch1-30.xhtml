<p class="p">24. Подпись творца</p>
</div><div class="epigraph">
<p class="p1">Говорю вам тайну: не все мы умрем, но все изменимся.</p>
<p class="text-author">Первое послание к коринфянам, 15:51</p>
</div><div class="epigraph">
<p class="p1">Вселенная кажется… упорядоченной и задуманной в соответствии с числом, назначенным промыслом и мудростью Творца всего сущего; по образу, что, подобно наброску, задан был в числах премудростью создавшего мир Бога.</p>
<p class="text-author">Никомах из Герасы. «Введение в арифметику», I, 6</p>
</div><p class="p1">Взлетев по ступенькам приюта на недавно выкрашенную зеленой краской веранду, с равными промежутками уставленную пустыми качалками, Элли заметила Джона Стогтона — неподвижного, сгорбившегося, опустившего руки. В правой руке его был зажат пакет с ручками, в нем Элли разглядела прозрачную купальную шапочку, цветастую коробочку с косметикой, двое шлепанцев с розовыми помпонами.</p><p class="p1">— Она ушла, — произнес Джон, заметив как сузились ее глаза. — Не входи лучше, — попросил он. — Не смотри на нее. Она бы не хотела, чтобы ты увидела ее такой. Ты же знаешь, сколько внимания она уделяла внешности. В любом случае здесь ее теперь нет.</p><p class="p1">Но почти рефлекторно приученной долгими годами к противоречию Элли хотелось все-таки повернуться и войти. Неужели даже в такой ситуации она может выказывать ему привычное предубеждение? Из принципа, так сказать. Но на его лице было написано неподдельное горе, не оставлявшее возможности усомниться в его чувствах к матери. Он любил ее. Может быть, даже больше, чем я, с укором подумала Элли. Мать хворала так долго, что Элли уже не раз задумывалась: как она воспримет тот самый момент. Она вспомнила, какой красавицей казалась ей мать на присланной Стогтоном фотографии, и, забыв про все свои представления об этом моменте, разрыдалась.</p><p class="p1">Вздрогнув, Стогтон шагнул, чтобы утешить ее. С видимым усилием контролируя себя, Элли остановила его жестом руки. Обнять его она не могла даже сейчас. Их, двух чудаков, связывало только мертвое тело. В глубине души она понимала, что напрасно винила Стогтона в смерти отца.</p><p class="p1">— У меня здесь есть кое-что для тебя, — сказал он, покопавшись в пакете и перерыв сверху донизу его содержимое… Она заметила кошелек из искусственной кожи и пластмассовую коробочку для искусственной челюсти. Пришлось отвернуться. Наконец он выпрямился с помятым и потрепанным конвертом в руке.</p><p class="p1">На нем было написано: «Для Элинор». Узнав почерк матери, она протянула руку. Стогтон испуганно отступил, заслоняя лицо конвертом, словно Элли собиралась ударить его.</p><p class="p1">— Подожди, — сказал он. — Подожди. Я понимаю, что мы никогда не ладили. Только сделай кое-что для меня. Не читай этого письма до вечера. Хорошо?</p><p class="p1">Горе сделало его старше лет на десять.</p><p class="p1">— Почему? — спросил она.</p><p class="p1">— Твой любимый вопрос. Просто окажи мне любезность. Разве я прошу многого?</p><p class="p1">— Ты прав, — отвечала она. — Это вовсе не много. Прости меня.</p><p class="p1">Он посмотрел ей в глаза.</p><p class="p1">— Что бы ни случилось с тобой в Машине, надеюсь, это преобразило тебя.</p><p class="p1">— И я тоже, Джон.</p><p class="p1">Она позвонила Джоссу и спросила, не согласится ли он отслужить погребальную службу.</p><p class="p1">— Незачем вам говорить, что сама я не религиозна. Но мать когда-то склонялась к вере. Вы единственный человек, которого вижу в этой роли. Не сомневаюсь, что отчим не станет возражать.</p><p class="p1">Джосс заверил ее, что прибудет со следующим самолетом.</p><p class="p1">Пораньше отобедав в своем номере, Элли сидела и разглядывала конверт, каждую морщинку и складку на его поверхности. Старый конверт. Мать, должно быть, написала письмо много лет назад и носила с собой в сумочке, все думая, настала ли пора отдать его Элли. Запечатан конверт был тоже давно. Интересно, знает ли Стогтон, что там написано? Она хотела немедленно вскрыть конверт, но какое-то предчувствие удерживало ее. И, подобрав к подбородку колени, она долго сидела в кресле задумавшись.</p><p class="p1">Звякнул звонок, ожила вовсе не бесшумная каретка ее телефакса. Он был подсоединен к компьютеру «Аргуса». Напоминание о прошлых днях — теперь в этом не было такой необходимости. Что бы ни обнаружил компьютер, все будет запечатлено в его памяти. И «пи» не изменится, если Земля совершит очередной оборот. А уж послание, заложенное в числе «пи», — если оно существует — может ждать ее целую вечность.</p><p class="p1">Она вновь поглядела на конверт, но позвякивание каретки отвлекало. Если внутри трансцендентного числа заложено сообщение, оно было встроено в геометрию Вселенной от сотворения мира. Значит, она теперь обратилась к работам в области экспериментальной теологии. Но ведь так назвать можно и всю науку, решила она.</p><p class="p1">— ПРИГОТОВИТЬСЯ, — напечатал компьютер.</p><p class="p1">Элли подумала об отце… о копии его, конечно… и об «обслуживающем персонале», источившем своими ходами Галактику. Они были свидетелями происхождения и развития жизни на миллионах миров, созидали галактики, отрезали от Вселенной целые участки. В некоторых пределах могли даже передвигаться во времени. Они были богами, могущество которых превосходило представления почти всех религий — во всяком случае, западных. Но и они не были всемогущи. Не они построили тоннели: это умение было им не подвластно. Не они заложили послание в трансцендентное число, ибо были не в состоянии даже прочитать его. Тоннели и «пи» создал кто-то другой, не оставивший обратного адреса. Когда строители тоннелей невесть куда отбыли, будущие хранители были беспомощны, как одинокие дети. Как она теперь… как она сама.</p><p class="p1">Элли подумала о гипотезе Эда, о том, что тоннели — это ходы, соединяющие бесчисленные звезды в этой и прочих галактиках. В чем-то они были схожи с черными дырами, но отличались свойствами и происхождением. Они не были лишены массы — Элли заметила это в системе Веги по гравитационным возмущениям в обломочном материале кольца. По этим ходам загадочные существа на неведомых и непохожих кораблях пересекали Галактику.</p><p class="p1">Червоточины. Судя по жаргону, физики-теоретики видели во Вселенной яблоко, которое некто вдоль и поперек источил своими ходами. Чудо — с точки зрения бациллы, обитающей на поверхности. Но у стоящего перед яблоком существа подобная перспектива вызывает меньше восторга. Для него строители тоннелей — вредители. Но если и строители тоннелей только черви, тогда кто же мы сами?</p><p class="p1">Компьютер «Аргуса» уже проник внутрь «пи» куда глубже, чем это пытались сделать прежде машины и люди, но еще не настолько глубоко, как «персонал». Слишком уж быстро, подумала Элли, разве может здесь обнаружиться недешифрованное послание, о котором рассказывал Теодор Эрроуэй на берегах не нанесенного ни на одну карту моря? Быть может, в разных трансцендентных числах найдутся послания и попроще, и посложнее, а компьютер «Аргуса» уже обнаружил самое простое. Когда намекнули.</p><p class="p1">На станции она познала смирение, осознала, как мало еще знают люди. Должно быть, подумала она, между вирусами и людьми лежит не меньше категорий живых существ, чем между людьми и высшими… Но эта мысль не угнетала ее, скорее пробуждала чувство изумления. Теперь есть к чему стремиться.</p><p class="p1">Все было похоже на переход из школы в колледж — от беззаботной жизни к кропотливой и упорной работе. В старших классах она справлялась с учебой намного лучше остальных. В колледже оказалось, что иные соображают гораздо быстрее, чем она. Аспирантура предъявила к ней новые, еще более высокие требования, которые только повысились, когда она начала работать астрономом. На каждой стадии вокруг находились более знающие люди, и каждая последующая стадия представляла больший интерес, чем предыдущая. Ну а теперь пусть грядет откровение, думала она, глядя на экран телефакса.</p><p class="p1">— ПЕРЕДАЧА ЗАТРУДНЕНА. S/N</p><p class="p1">Она была подсоединена к компьютеру «Аргуса» через коммуникационно-ретрансляционный спутник «Дефком Альфа». Быть может, у них какие-то проблемы с ориентацией или какой-то еще запрограммированный беспорядок? И не осознавая этого, она распечатала конверт.</p><p class="p1">«Скобяная торговля Эрроуэй», — гласила шапка. Шрифт был тот же, что на старой машинке «Ройял», которую отец держал для деловой и личной переписки. В правом верхнем углу была напечатана дата: 13 июня 1964 года. Тогда ей было пятнадцать. Отец не мог написать это письмо — к тому времени его уже давно не было в живых. Внизу виднелась знакомая аккуратная подпись матери.</p><p class="p1">«Моя милая Элли!</p><p class="p1">Теперь, когда меня нет на свете, я надеюсь, что ты сумеешь простить меня. Я понимаю, что виновата перед тобой, и не только перед тобой. И могу себе представить, как ты меня возненавидишь, когда я все расскажу тебе. Я знаю, как ты любила Теда Эрроуэя, и хочу, чтобы ты знала — я очень любила его. Люблю до сих пор. Но он не был твоим отцом, твой настоящий отец — Джон Стогтон. Я сделала очень скверную вещь. Не следовало бы, и я проявила слабость. Но если бы сложилось иначе, тебя не было бы на свете, поэтому постарайся сохранить обо мне добрую память. Тед знал обо всем, и он простил меня, но мы решили, что ты не должна знать об этом. Сейчас я гляжу в окно и вижу тебя во дворе. Ты сидишь, думаешь о звездах и о прочих вещах, которых я никогда не пойму, и я так горжусь тобой. Тебе всегда нужна правда, и поэтому будет справедливо, если ты будешь знать правду о себе. О своем истоке, я имею в виду.</p><p class="p1">Если Джон еще жив, это письмо тебе передаст он. Я уверена, он сделает это. Он лучше, чем это тебе кажется, Элли. Мне повезло, что я вновь обрела его. Может быть, ты и ненавидишь его потому, что в глубине души чувствуешь правду. Но на самом деле причина твоей ненависти только в том, что он не Теодор Эрроуэй. Я знаю это.</p><p class="p1">Ты все сидишь, даже не пошевелилась, пока я пишу это письмо. Ты думаешь. И я молю Бога, чтобы ты всегда находила то, чего ищешь. Прости меня. Я всего лишь человек.</p><p class="p1">С любовью — Мама».</p><p class="p1">Элли поглотила письмо залпом и снова перечитала его. Она едва могла дышать. Ладони ее взмокли. Узурпатор оказался отцом. Почти всю свою жизнь, не зная того, она отвергала родного отца. И какую же силу характера проявил он во время всех ее девичьих вспышек, когда она корила его только за то, что не он ее отец… и потому не имеет права учить ее.</p><p class="p1">Телефакс звякнул дважды. Ей следовало нажать кнопку, подтверждающую прием. Но у нее не было сил на это. Пусть подождет. Она думала обо всех: об от… Теодоре Эрроуэе, Джоне Стогтоне и своей матери. Они стольким пожертвовали ради нее, а она в слепом эгоизме и не думала замечать. Ей захотелось, чтобы Палмер скорее оказался рядом.</p><p class="p1">Телефакс вновь звякнул, каретка осторожно пошевелилась. Она запрограммировала печать так, чтобы компьютер проявил настойчивость, даже настырность, если в «пи» что-нибудь обнаружится. Но теперь она была так занята — перестраивались сами основы ее внутренней жизни. Должно быть, мать сидела тогда за столом в большой спальне, что на втором этаже, и, обдумывая фразы, глядела в окно на пятнадцатилетнюю Элли, неуклюжую, возмущенную и обиженную.</p><p class="p1">Мать подарила ей и кое-что еще. Письмо обратило Элли вспять, к себе, какой она была так давно. С тех пор ей было чему научиться.</p><p class="p1">Над столом, на котором трещал телефакс, висело зеркало. В нем она увидела женщину, не молодую, не старую, теперь уже не дочь, но и не мать. Они были правы, не доверив ей правды. Она еще не стала по-настоящему взрослой — не могла принять и тем более понять этот сигнал. Всю свою карьеру она потратила на то, чтобы связаться с невероятно далекими и чуждыми ей созданиями, и ухитрилась так и не войти в контакт с кем-нибудь в своей собственной жизни. Занятая борьбой с мифами, с верой, жившей в душах других людей, она проглядела ложь в собственном сердце. Всю свою жизнь она изучала Вселенную, не заметив простейшего: эти немыслимые просторы одна только любовь может сделать пригодными для мелочи вроде нас.</p><p class="p1">Но компьютер «Аргуса» настаивал, изобретая все новые уловки, чтобы вступить в личный контакт с Элинор Эрроуэй, дабы поделиться открытием.</p><p class="p1">Наиболее явно аномалии обнаружились при базе системы счисления, равной 11. Здесь ее можно было записать нулями и единицами. По сравнению с тем, что еще недавно передавала Вега, сообщение было простым, но абсолютно невероятным с точки зрения статистики. Программа перестроила числа в квадратный растр с равным числом цифр в строке и столбце. Первую строчку слева направо образовали только нули. Во второй ровно посередине была единица, а в обе стороны от нее отходили нули. Несколько последующих строчек образовали явную дугу из единиц. Строчка за строчкой они создавали геометрическую фигуру, замкнутую и многообещающую. Наконец в строчке вновь оказались только нули с единицей посередине. Следующая будет состоять из одних нулей, ограничивая ими кадр.</p><p class="p1">Итак, глубоко в трансцендентном числе в строке цифр спрятан круг, четко вырисованный теперь единицами на фоне нулей. Круг этот гласил — Вселенная сотворена. В какой бы галактике ты ни оказался, возьми длину окружности, раздели ее на диаметр, вычисли с достаточной точностью и увидишь чудо — другой круг, нарисованный в километрах за запятой. Дальше найдутся и новые сообщения. И не важно, на что ты похож, из чего состоит твое тело, откуда ты родом. Если ты живешь в этой Вселенной и хотя бы слегка одарен математическими способностями, рано или поздно ты обнаружишь все это. Он ждет тебя. Он во всем. И чтобы найти Его, не надо покидать свою планету. В ткани пространстве, в природе материи, как на величайшем шедевре, запечатлен этот круг — подпись Творца, чей разум выше людей, демонов и богов, «обслуживающего персонала», строителей тоннелей и древнее Вселенной.</p><p class="p1">Круг замкнулся.</p><p class="p1">Она нашла то, что искала.</p></span></span>
