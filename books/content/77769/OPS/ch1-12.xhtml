<span><span id="id10"><div class="title2">
<p class="p">9. Нуминозное</p>
</div><div class="epigraph">
<p class="p1">Основа поклонения в изумлении.</p>
<p class="text-author">Томас Карлайль. «Sartor Resartus»</p>
</div><div class="epigraph">
<p class="p1">Я полагаю, что космическое религиозное чувство является самым сильным и благородным побуждающим фактором научных исследований.</p>
<p class="text-author">Альберт Эйнштейн. «Идеи и мнения»</p>
</div><p class="p1">Именно во время одной из поездок в Вашингтон Элли и обнаружила, что любит Кена дер Хиира.</p><p class="p1">Приготовления к встрече с Палмером Джоссом затягивались. Джосс явно не стремился в «Аргус»; он уверял, что его смущает отсутствие благочестия в среде ученых, а вовсе не их интерпретация Послания. Для проверки характеров требовалась нейтральная почва. Элли была согласна на любое место, специальный помощник президента вел переговоры. Прочих радиоастрономов не беспокоили. Элли должна была вести переговоры одна.</p><p class="p1">Элли все ждала того дня — хотя до него еще оставались недели, — когда она отправится в Париж на первое заседание Всемирного консорциума «Послание». Вместе с ВГ они координировали глобальную программу подготовки данных. Обработка сигнала шла теперь вполне рутинным порядком, за последние месяцы в Послании не наблюдалось ни единого пробела, и, к собственному удивлению, она обнаружила, что располагает небольшим количеством свободного времени. Элли дала обет подольше поговорить с матерью и сохранять вежливость и дружелюбие при любой подковырке. Нужно было еще просмотреть выросшую до невероятных размеров кипу отложенных бумаг и электронной корреспонденции, содержавшую и поздравления, и критику от коллег, и религиозные увещевания, и псевдонаучные спекуляции, изложенные с невероятным апломбом, и текущую почту со всех концов света. «Астрофизический журнал» она не открывала уже несколько месяцев, хотя и значилась первым автором статьи, несомненно явившейся самой выдающейся из всех попадавших когда-либо на страницы этого солидного издания. Сигнал от Веги был настолько силен, что утомленные дурацкими переговорами радиолюбители принялись сооружать небольшие радиотелескопы и анализаторы сигналов. На ранней стадии обработки Послания они выудили кое-какие полезные данные и до сих пор еще осаждали Элли. Им все казалось, что они выявили нечто скрытое от профессионалов, специализирующихся в области ПВЦ. Элли считала себя обязанной ответить им и ободрить. Кроме того, на «Аргусе» велись и другие заслуживающие внимания работы, скажем продолжались исследования квазаров, — и за ними тоже надо было приглядывать. Но вместо этого почти все свое время она проводила с Кеном.</p><p class="p1">Конечно, она была обязана подробнейшим образом ознакомить научного советника президента с работами по проекту. Очень важно, чтобы президент располагала точной и исчерпывающей информацией. Элли могла только надеяться, что лидеры прочих стран получают столь же точную информацию о Послании с Веги, как и президент Соединенных Штатов. Не имея соответствующей научной подготовки, президент тем не менее с уважением относилась к науке и весьма охотно поддерживала перспективные разработки, руководствуясь не только практической выгодой, но отчасти и стремлением к познанию. Со времен Джеймса Медисона и Джона Куинси Адамса<a href="ch2.xhtml#id21" class="a">[19]</a> подобное можно было сказать об очень немногих главах администрации США.</p><p class="p1">Тем не менее все складывалось прекрасно, и дер Хиир много времени проводил в «Аргусе». Каждый день в течение часа или более он вел высокочастотные шифрованные переговоры со своим офисом в старом административном здании в Вашингтоне, откуда правительство заправляло научной и технологической политикой. Все остальное время, насколько она понимала, он просто… слонялся вокруг. То лез во внутренности компьютера, то отправлялся с инспекцией к одному из радиотелескопов. Иногда его сопровождал какой-нибудь ассистент из Вашингтона, еще чаще он бывал один. Через открытую дверь выделенного дер Хииру помещения она часто видела, как он, положив ноги на стол, что-то читал или разговаривал по телефону. Потом приветствовал ее дружеским жестом и возвращался к работе. Ей приходилось встречать его за непринужденной беседой не только с Драмлином или Валерианом, но и с младшими техниками и секретаршами, которые уже не однажды — так, чтобы слышала Элли — объявляли его очаровательным.</p><p class="p1">У дер Хиира находилось много вопросов и к ней. Сперва они имели систематический характер и были чисто техническими, но вскоре превратились в разнообразные планы на случай всевозможных вариантов развития событий вплоть до откровенных спекуляций. Ей уже казалось, что все эти квазиделовые разговоры были для него просто предлогом, чтобы побыть вместе.</p><p class="p1">Как-то прекрасным осенним утром президенту пришлось отложить встречу со Специальной рабочей группой по делу Тайрон Фри. В результате после ночного перелета из Нью-Мексико Элли и дер Хиир обнаружили, что имеют в своем распоряжении несколько свободных часов, и решили посетить Вьетнамский мемориал, спроектированный Майей Инлинь еще когда она изучала архитектуру в Йейле. Здесь среди горестных и скорбных напоминаний о дурацкой войне дер Хиир обнаружил вовсе неуместное оживление, и Элли подумала о некоторых недостатках в его характере. Парочка переодетых в гражданское агентов службы безопасности, с положенным по должности телесного цвета наушником возле уха, неприметно следовала за ними.</p><p class="p1">Дер Хиир расшевелил сучком роскошную голубую гусеницу. Она поползла вверх по ветке, а отливающее радугой тело переливалось волной, следуя движению четырнадцати пар ног. Добравшись до конца ветки, гусеница зацепилась за кору последними пятью сегментами тела и некоторое время тщетно водила по воздуху свободной частью тела, пытаясь обрести новую опору. Не добившись успеха, смышленое создание отправилось назад, перебирая многочисленными ножками. Дер Хиир перехватил ветку за другой конец, добравшись до которого гусеница вновь обнаружила, что идти некуда. Подобно тигру в клетке, с мрачной покорностью судьбе она перебиралась от одного конца сучка до другого. Элли стало жалко несчастное создание… даже если в конце концов окажется, что этот червяк паразитирует, скажем на ячмене.</p><p class="p1">— Что за великолепная программа заложена в голову этого крохотного существа! — воскликнул дер Хиир. — Программа поиска оптимального пути к спасению, которая обязательно срабатывает при необходимости. Такая кроха знает, что падать с сучка нельзя. Для нее вот этот сучок как бы подвешен в воздухе. В естественных условиях гусеница не может столкнуться с подобным явлением, ведь каждый сучок прикреплен к какой-нибудь ветке. Элли, наверное, интересно на себе испытать, как функционирует подобная программа. Я хочу сказать: всякий ли раз, когда доползаешь до конца ветки, становится ясно, что пора поворачивать? Или приходится постоянно задумываться? А тебе не хотелось бы узнать, что чувствуешь, подняв в воздух десять передних ножек и уцепившись за сук остальными восемнадцатью?</p><p class="p1">Слегка склонив голову, Элли пыталась понять ход мыслей дер Хиира… не сам же червяк его интересует, конечно. Или ему нетрудно представить знакомую даму в облике насекомого? Она попыталась уклониться от ответа, подумав, что в нем, должно быть, просто взыграл профессиональный интерес.</p><p class="p1">— И что с ней теперь будет?</p><p class="p1">— Посажу обратно на траву. А что еще можно с ней сделать?</p><p class="p1">— Иной бы просто раздавил.</p><p class="p1">— Трудно убить животное, проявляющее хотя бы начатки интеллекта. — Дер Хиир не выпускал из руки ветки с гусеницей.</p><p class="p1">Молча они шли мимо 55000 имен, выгравированных на блестящем черном граните.</p><p class="p1">— Подготавливаясь к войне, всякое правительство старается представить будущих противников чудовищами, — проговорила она. — Им совсем не нужно, чтобы народ видел людей во врагах. Если человек понимает, что его враг тоже думает и страдает, он может и не решиться убить его. Лучше считать, что тебе угрожают чудовища.</p><p class="p1">— Ну погляди-ка на эту красотку, — обратился он, чуть погодя. — Ну погляди только.</p><p class="p1">Элли поглядела. Не без легкого отвращения она попыталась посмотреть на гусеницу его глазами.</p><p class="p1">— Посмотри, что она делает, — продолжал дер Хиир. — Будь она ростом с тебя или меня, то насмерть перепугала бы всех вокруг. <em>Истинное</em> чудовище, не так ли? Но гусеница мала, ест только листья, занимается собственными делами и добавляет миру толику красоты.</p><p class="p1">Элли взяла его за руку — ту, где не было червяка, — и они, вновь умолкнув, пошли дальше мимо колонок имен, выстроенных по датам смерти. Здесь, конечно, упомянуты были лишь убитые американцы. Но только в сердцах родственников и друзей и нигде более на этой планете не были запечатлены имена двух миллионов погибших жителей Юго-Восточной Азии. В Америке об этой войне чаще всего говорили так: дескать, политики подрезали поджилки военным. Психологически это объяснение было сродни «удару в спину», которым немцы объясняли свое поражение в первой мировой войне. Вьетнамская война нарывом выперла на общественном сознании страны, и президентам до сих пор не хватало храбрости проткнуть его. Последующие действия Социалистической Республики Вьетнам не облегчали этой задачи. Элли вспомнила, что американские солдаты во Вьетнаме привыкли звать своих противников «низколобыми», «косоглазыми» и «грязными». Может ли человечество надеяться одолеть следующий этап собственной истории, если народы не могут удержаться, чтобы не смешать с грязью своего оппонента?</p><p class="p1">Слушая повседневные разговоры дер Хиира, никто не признал бы в нем академика. Увидев его у газетного киоска, трудно было бы догадаться, что это крупный ученый. Явное несоответствие его речи качеству научных работ даже забавляло сотрудников. И его работы, и сам он приобретали все более широкую известность, и потому акцент становился как бы особенностью стиля. Но все-таки произношение некоторых слов, например «гуанозинтрифосфат», казалось, превращало кроткую и невинную молекулу во взрывчатку.</p><p class="p1">До них почему-то очень медленно доходило, что оба любят друг друга. Однако со стороны было виднее. Несколько недель назад, когда Луначарский еще гостил в «Аргусе», он, как случалось, разразился тирадой по поводу иррациональности языков. На сей раз объектом критики был американский диалект английского языка.</p><p class="p1">— Элли, почему люди «опять делают ту же самую ошибку»? Зачем здесь «опять»? И, если я не ошибаюсь, слова «зажигать» и «разжигать» — это одно и то же? А «закрутить» и «раскрутить» — наоборот? И если можно «рассвирепеть», почему нам никогда не удается «засвирепеть»?</p><p class="p1">Она устало кивала. Ей уже не раз приходилось слышать в Союзе, как он жаловался коллегам на противоречивость русского языка. Элли была уверена, что и в Париже услышит то же самое, но уже по поводу французской речи. Она и не думала возражать: любой язык не всегда точен, у каждого было столько различных источников, и потом им приходилось развиваться, отвечая на такие малозаметные раздражители, что было бы даже странно, если бы языки вдруг оказались абсолютно последовательными и внутренне непротиворечивыми. Впрочем, эти притворные жалобы явно развлекали ВГ, и ей просто не хотелось портить ему удовольствие.</p><p class="p1">— А вот еще одна фраза: «Влюбился так, что голова выше пяток», — продолжал он. — Она ведь нередко встречается, не так ли? Но здесь-то все наоборот. Это <em>обычно</em> у тебя голова выше пяток. А влюбился — и сразу пятки <em>над головой</em>. Разве я не прав? Вы ведь знаете, что такое любовь. А тот, кто выдумал это выражение, похоже, не представлял, что это такое. Ему казалось, что влюбленные ходят, а они на самом деле парят вверх тормашками, как на картинах того француза… как его там?</p><p class="p1">— Он был русским, — отвечала Элли. — Упоминание о картинах Марка Шагала позволяло ей по узенькой тропке выбраться из затруднительного положения. Позже она пыталась понять: дразнил ее ВГ или хотел вызвать на откровенность? А может быть, просто подсознательно заметил крепнущее чувство между дер Хииром и ею.</p><p class="p1">Отчасти причины нерешительности дер Хиира были понятны. Как научный советник президента, он вынужден уделять массу времени беспрецедентному, невероятно деликатному делу. А потому эмоциональная близость с ней, руководившей всеми работами, таила для него некоторый риск. Президента интересует лишь трезвый и непредвзятый взгляд. Кроме того, дер Хииру, возможно, придется предлагать варианты, с которыми Элли не согласиться и которые будут противоречить ее интересам. Так что любовь к Элли рано или поздно скомпрометирует деловые возможности дер Хиира.</p><p class="p1">С точки зрения самой Элли, дело обстояло еще сложнее. Прежде чем стать директором крупной радиообсерватории, дамой, обладающей известной репутацией, она переменила многих партнеров. И хотя любовь как таковую она признавала, замужество никогда не соблазняло ее. Она смутно припоминала четверостишие… кажется, Уильяма Батлера Йитса, которым пыталась утешить своих первых обожателей, обычно начинавших горевать, когда она объявляла им о завершении романа:</p><div class="poem">
<div class="stanza">
<p class="v">Напрасно мнить, что дар любви</p>
<p class="v">Пожизненно нам дан:</p>
<p class="v">Увы, частенько эпизод</p>
<p class="v">Удачней, чем роман.</p>
</div>
</div><p class="p1">Она вспомнила, каким очаровательным казался ей Джон Стогтон, когда ухаживал за ее матерью, и как резко изменился, едва став ее отчимом. Она, бедная, выходит замуж, а в нем вдруг открывается новая, абсолютно чудовищная личность, о существовании которой пока ничто не свидетельствовало. Эти романтические наклонности души делают меня очень ранимой, думала Элли, совершенно не намереваясь повторять ошибок собственной матери. Но перспектива безнадежно влюбиться в человека, которого потом уведут, казалась ей пострашнее. Что, если он ее попросту бросит? Этой мысли Элли не уделяла особенного внимания, явно считая подобное невозможным. А не имея серьезных чувств ни к кому, она сама никого не предаст… как это сделала мать по отношению к покойному отцу — в глубине души Элли была уверена в этом. Ей по-прежнему не хватало отца.</p><p class="p1">Но с Кеном, <em>казалось</em>, дело пошло иначе. Или, быть может, с годами у нее поубавилось запросов? В отличие от прочих известных ей мужчин в сложных и напряженных ситуациях Кен держался свободнее, сочувственнее что ли. Склонность его к компромиссу, дипломатический подход к научной политике, конечно же, объяснялись опытом и работой, но за ними, в глубине его, Элли видела нечто надежное. Она уважала его и за то, что наука стала неотъемлемой частью всей его жизни, и за настойчивость, с которой он старался привлечь внимание обеих предшествующих администраций к проблемам познания.</p><p class="p1">Поэтому они, соблюдая известное благоразумие, и встречались в ее крошечной квартирке в «Аргусе». Разговоры доставляли им радость, идеи порхали, словно воланы. Иногда обоим случалось почти точно угадывать еще не высказанную мысль другого. Кен был решительным и изобретательным любовником. Во всяком случае, ей нравились его феромоны.</p><p class="p1">Иногда она даже удивлялась тому, что говорила и делала в его присутствии, побуждаемая любовью. Элли уже начинала восхищаться им в такой степени, что изменилась и ее самооценка: она стала больше нравиться самой себе. И поскольку Кен явно ощущал то же самое, любовь и уважение в их отношениях постоянно «любезничали», пропуская друг друга вперед. Так по крайней мере считала она сама, вспоминая, что холодок одиночества не отпускал ее в компании многих друзей.</p><p class="p1">С Кеном было по-другому. Она охотно рассказывала ему о своих увлечениях, воспоминаниях, детских горестях. Он слушал более чем с интересом, часами расспрашивал ее о детских годах. Вопросы его были всегда точны, иногда проницательны, но тактичны. Она стала понимать, почему речь любовников отдает детскостью: в какой еще обстановке ребенок, упрятанный в глубине ее существа, отважился бы выйти наружу. Если возлюбленная симпатична тебе и в год, и в пять, и в двенадцать, и в двадцать, есть шанс, что все эти индивидуальности будут счастливы. В любви завершится их долгое одиночество. Быть может, степень влюбленности и определяется числом уровней личности, задействованных в данной связи. С предыдущими партнерами ей все казалось, что какой-то отклик находит лишь одна сторона ее существа, прочие же просто при сем присутствовали.</p><p class="p1">Уик-энд перед намеченной встречей с Джоссом они провели в постели. Вечернее солнце, проникая в щели венецианских штор, бросало лучи на их сплетенные тела.</p><p class="p1">— Обычно я могу говорить об отце… с легким чувством потери. Но если я позволю себе и <em>в самом деле</em> вспомнить весь его юмор и нашу глубокую привязанность — все, спокойствие рушится, мне хочется плакать, потому что он ушел.</p><p class="p1">— Нет вопроса: язык может освободить нас от чувств, — отвечал дер Хиир, поглаживая ее по плечу. — Быть может, в этом одна из его функций — помочь понять мир и не дать ему поглотить нас целиком.</p><p class="p1">— Тогда выходит, что изобретение языка не только благодеяние. Знаешь, Кен, я бы отдала что угодно… действительно все, что у меня есть, чтобы вновь провести несколько минут с папой.</p><p class="p1">Ей представились небеса: блаженные папы и мамы перепархивают от облака к облаку или безмятежно покоятся на воздусях. Объемистое должно быть местечко, чтобы в нем смогли разместиться десятки миллиардов людей, которые жили и умерли со времени возникновения человека. Тесновато там, подумала Элли, если только духовные небеса не отличаются от астрономических. Наверняка приходится экономить место.</p><p class="p1">— Должно существовать некоторое число, — произнесла Элли, — определяющее общее количество разумных существ во всем Млечном Пути. Интересно, чему оно может быть равно? Скажем, если существует около миллиона цивилизаций, и каждая из них охватывает около миллиарда личностей, то разумных существ будет 1015. Многие из них должны быть разумнее нас. На таком уровне, наверное, само представление о личности становится неуместным, возможно, в нем просто проявляется земной шовинизм.</p><p class="p1">— Ты права. А теперь давай-ка сочтем объем производства «Голуаз», «Твинки», автомобилей «Волга», карманных передатчиков «Сони». Тогда нетрудно рассчитать и весь объект производства Галактики, а потом и всего космоса…</p><p class="p1">— Зря смеешься, — отвечала Элли, улыбаясь без тени обиды. — Подумай только — сколько их? <em>На самом деле</em> — подумай. Сколько в космосе планет, опередивших нас? Разве это не потрясает, если вдуматься?</p><p class="p1">Она знала, о чем он думает, но продолжила:</p><p class="p1">— Погляди-ка сюда. Я решила прочесть это перед встречей с Джоссом.</p><p class="p1">Элли взяла со столика возле кровати 16-й том старой Encyclopaedia Britannica Macropaedia<a href="ch2.xhtml#id18" class="a">[20]</a> «Рубенс — Сомали» и открыла страницу, заложенную полоской компьютерной распечатки вместо закладки. Она указала на статью, озаглавленную «Священный или святой».</p><p class="p1">— Теологи выявили существование особого нерационального — не хотелось бы прибегать к слову «иррациональный» — аспекта святости. Они именуют его «нуминозным». Этот термин впервые был использован… посмотрим… неким Рудольфом Отто в 1923 году в книге «Идея Святого». Он считал, что предназначение человечества — распознавать и чтить нуминозное, названное им Misterium tremendum<a href="ch2.xhtml#id16" class="a">[21]</a>. Для этого моих знаний латыни хватает. В присутствии Misterium tremendum люди ощущают полное свое ничтожество, но если я правильно поняла — не личностную враждебность. Нуминозное мнилось ему как нечто «полностью иное», а человеческая реакция на него — «абсолютное изумление». И если религиозные люди именно это имеют в виду, когда произносят слова «святой» и «священный», я с ними согласна. Ожидая сигнал, я чувствовала себя почти так же и вовсе не думала о том, что и в самом деле приму его. По-моему, вся наука исполнена подобного трепета. А теперь послушай, — и она зачитала цитату:</p><p class="p1">«В течение последнего столетия многие философы и ученые, занимающиеся общественными науками, замечали исчезновение святого в нашей жизни и предсказывали упадок религии. Из анализа истории религий следует, что религиозные формы могут преобразовываться, кроме того, никогда не существовало единодушия в определении природы и выражения религиозного чувства. И теперь жизненно важен вопрос, сможет ли человек…»</p><p class="p1">— Конечно, и сексисты<a href="ch2.xhtml#id14" class="a">[22]</a> тоже пишут статьи по религиозным вопросам, — заметила Элли и продолжила:</p><p class="p1">«…сможет ли человек в новой ситуации выработать предельно важные структуры, полностью отличающиеся от прежних, традиционно основывавшихся на понятии святости?».</p><p class="p1">— Даже так?</p><p class="p1">— Так. Я считаю, что обюрократившиеся религии пытаются просто ввести определение нуминозного вместо того, чтобы предоставить каждому возможность воспринимать его непосредственно… словно через шестидюймовый телескоп. И если нуминозное гнездится в сердце каждой веры, кто, по-твоему, более религиозен — люди, что просто следуют традиционным обрядам, или те, кто посвятил себя познанию, науке?</p><p class="p1">— Погоди, проверим, понял ли я тебя, — отозвался Кен, творчески обработав вопрос. — Вот дремотный субботний вечер, вот обнаженная пара в постели, занятая чтением Encyclopaedia Britannica и решением вопроса, не проявилось ли нуминозное в туманности Андромеды в большей степени, чем на Земле. Как по-твоему, правильно проводят время эти люди, а?</p></span></span>
