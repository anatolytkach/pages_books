<p class="p">7. Этиловый спирт в W-3</p>
</div><div class="epigraph">
<p class="p1">Не следует вовсе доверять мнению… что демоны действуют как вестники и посредники между богами и людьми, относя на небо все наши просьбы и оделяя нас помощью богов. Напротив, их следует считать духами, стремящимися творить зло, чуждыми какой-либо праведности, раздувшимися от злобы, побледневшими от зависти, утонченными в обмане…</p>
<p class="text-author">Августин. «О граде божием», VIII, 22</p>
</div><div class="epigraph">
<p class="p1">Воздвигнутся новые ереси, предрекал нам Христос, но забудутся ли прежние заблуждения, пророчество не говорит.</p>
<p class="text-author">Томас Браун. «Religio Medici», I, 8</p>
</div><p class="p1">Она собиралась встретить ВГ в Альбукерке и отвезти его на «Тандерберде» в «Аргус». Остальные члены советской делегации отправятся в машинах обсерватории. Она предвкушала поездку в аэропорт по утренней прохладе, быть может, снова под присмотром почетного караула кроликов вдоль обочин, а потом — долгую и обстоятельную беседу с ВГ. Но новая публика из общего отдела наложила вето на ее идею. Всеобщее внимание прессы и выдержанное заявление президента, завершившее пресс-конференцию, привлекли громадные толпы в местечко посреди далекой пустыни. Элли объяснили, что на нее могут напасть. Теперь ей придется ездить только в правительственных машинах и с вооруженной охраной. И вот автомобиль катил в Альбукерке размеренно и неторопливо… ее правая стопа сама собой искала отсутствующую педаль акселератора на резиновом коврике под ногами.</p><p class="p1">Она была рада вновь увидеть ВГ. Последний раз они встречались в Москве три года назад, потом ему снова запретили выезд на Запад. Десятилетиями периоды запрета на выезд сменялись временами свободы, следуя политическим течениям и непредсказуемым выходкам самого ВГ. В последний раз ему отказали после крохотной политической провокации, в которой он просто не мог себе отказать, и разрешили только тогда, когда не удалось подыскать ученого нужного масштаба для очередной делегации. Со всего света его приглашали на лекции, семинары, коллоквиумы, конференции, в объединенные рабочие группы и международные комитеты. В качестве нобелевского лауреата и действительного члена Академии наук, он мог позволить себе больше независимости, чем прочие. Ей казалось, что он вечно дразнит правительствующих ортодоксов, маневрируя у самой границы их терпения и выдержки.</p><p class="p1">Звали его Василий Григорьевич Луначарский, но физикам всего мира он был известен как ВГ — по первым буквам имени и отчества. Его неровные и двусмысленные отношения с советским режимом озадачивали ее и многих на Западе. Он был дальним родственником Анатолия Васильевича Луначарского, старого большевика, сподвижника Горького, Ленина и Троцкого. Луначарский был народным комиссаром просвещения, потом послом в Испании. Умер он в 1933 году. Мать ВГ была еврейкой. Говорили, что ВГ работал над советским ядерным оружием, хотя, судя по возрасту, вряд ли мог играть заметную роль в подготовке первого советского термоядерного взрыва.</p><p class="p1">Его институт был отлично оснащен и укомплектован, научная продуктивность потрясала, и время от времени проводимые в институте работы привлекали к себе внимание сотрудников Комитета государственной безопасности. Невзирая на приливы и отливы, связанные с оценкой его политической благонадежности, ВГ часто выезжал на важные международные конференции, в том числе Рочестерские симпозиумы по физике частиц высоких энергий, Техасские конференции по релятивистской астрофизике и неофициальные, но некогда влиятельные Пагуошские встречи ученых, стремящихся внести свой вклад в уменьшение международной напряженности.</p><p class="p1">В 60-е годы, как ей рассказывали, ВГ посетил Калифорнийский университет в Беркли и был приятно удивлен, обнаружив обилие всяческих дешевых значков с непочтительными, скатологическими<a href="ch2.xhtml#id36" class="a">[11]</a> и политически провокационными лозунгами. С легкой ностальгией она припомнила те времена: терзавшую каждого проблему нетрудно было определить с первого взгляда. В Советском Союзе значки тоже были весьма популярны, ими страстно обменивались, но… на них славили футбольную команду «Динамо» или очередной удачливый лунник. В Беркли значки были другими. ВГ покупал их дюжинами, но с особым удовольствием носил один — размером в ладонь и с надписью «Молись — и дам». Он даже являлся с ним на научные заседания. Когда его спрашивали, отвечал: «Не знаю, как у вас, но в нашей стране это роскошная двусмысленность». Если продолжали настаивать, он отвечал, что его знаменитый родственник-большевик написал работу о месте религии в социалистическом обществе. Потом, когда его английский значительно усовершенствовался — в большей степени, чем русский язык у Элли, — склонность к ношению вызывающих значков ослабела.</p><p class="p1">Однажды после яростной схватки по поводу относительных достоинств обеих политических систем Элли принялась хвастать, что личная свобода позволяет ей протестовать у Белого дома против американской войны во Вьетнаме. ВГ отвечал, что и ему ничто не мешает выйти к Кремлю с протестом против американского вторжения.</p><p class="p1">У него никогда не было желания, например, фотографировать мусорные баржи, наполненные зловонными отбросами, и чаек на них возле статуи Свободы — так поступил один из советских ученых, когда ради развлечения они отправились на пароме на остров Статен во время перерыва в заседаниях конференции. Не пытался он, как некоторые из его коллег, снимать полуразвалившиеся хижины и ржавые металлические хибарки бедных пуэрториканцев во время автобусной поездки из роскошного отеля на пляже в обсерваторию Аресибо. Кому нужны подобные снимки, удивлялась Элли. Ей представлялся огромный каталог в недрах КГБ, объемлющий все несправедливости, горести и противоречия капитализма. Неужели измотанные пороками социализма, они с удовольствием разглядывают эти снимки, свидетельствующие о всяких несовершенствах жизни своих американских собратьев?</p><p class="p1">В Советском Союзе было много блестящих ученых, которых за неизвестные грехи не выпускали на Запад до середины 60-х годов. На международной встрече в Варшаве за столом, уставленным дюжинами бокалов, когда азербайджанский бренди уже сослужил свою службу, одного из них, Константинова, спросили об этом, он ответил:</p><p class="p1">— Эти сукины дети знали, что, если меня выпустят, я никогда не вернусь обратно.</p><p class="p1">Тем не менее его выпускали и без особых строгостей во время оживления научных контактов между учеными двух стран в конце 60-х — начале 70-х годов, и каждый раз он возвращался. Но потом его снова перестали выпускать, и он был вынужден посылать своим западным коллегам фотоснимки: одиноко склонив голову и скрестив ноги, он восседал на сфере, под которой было выписано шварцшильдовское уравнение радиуса черной дыры. Гостившим в Москве он пояснял, что находится в глубокой потенциальной яме, пользуясь известным физическим термином. Больше его так и не выпустили.</p><p class="p1">На ее вопросы ВГ отвечал, что Венгерскую революцию 1956 года спровоцировали фашистские заговорщики, что Пражская весна 1968 года была делом рук крохотной шайки отщепенцев среди руководства, добавляя при этом, что если ему говорили неправду и он ошибается, то его страна не имела права подавлять восстания в чужих странах. Когда речь заходила об Афганистане, он даже и не упоминал официальные оправдания. В собственном кабинете ВГ показал Элли свой коротковолновый радиоприемник… на частотах радиостанций Лондона, Парижа, Вашингтона были наклейки с названиями этих городов, написанные им кириллицей от руки. Он говорил ей, что имеет право слушать любую пропаганду.</p><p class="p1">Настали времена, когда многие из его друзей подпали под влияние националистической риторики относительно желтой опасности.</p><p class="p1">— Представьте себе границу между Китаем и Советским Союзом, и на ней от одного ее края до другого цепочкой стоят плечом к плечу китайские солдаты, начинают маршировать в нашу сторону, — говорил один из них, адресуясь к воображению Элли. Они стояли вокруг самовара в кабинете директора института. — Сколько же дней они будут идти через нашу границу, учитывая скорость рождения детей в Китае? Ответ был воистину мрачным пророчеством, в нем крылось и восхищение подобной арифметикой: «До скончания века». Среди этих русских Уильям Рандолф Хэрст чувствовал бы себя как дома. Но только не Луначарский. Если вывести солдат на границу, рождаемость упадет сама собой, возразил он, сразу подметив логическую ошибку. В его интонации слышалось неудовольствие математической некорректностью, но ошибиться в смысле его слов было трудно. Даже в худшие времена советско-китайских конфликтов он не позволял себе, насколько это было известно Элли, поддаваться эпидемии паранойи и расизма.</p><p class="p1">Элли нравилась сама идея самовара, и ей казалось, что она уже может постичь причины привязанности русских к этому аппарату. Их «Луноход», лунный вездеход, напоминавший ванну на проволочных колесиках, наверное, был в отдаленном родстве с самоварами. Однажды великолепным июньским утром ВГ отправился с ней в обширный парк на окраине Москвы, чтобы показать модель «Лунохода». Там, рядом с павильоном, рекламировавшим товары и красоты Таджикской Республики, располагался огромный зал, буквально до крыши набитый моделями мирных советских космических аппаратов в натуральную величину: «Спутника-1», первого в мире орбитального аппарата; «Спутника-2» с первым животным на борту, собакой Лайкой, умерщвленной потом в космосе; «Луны-2», первого космического аппарата, достигшего поверхности другого небесного тела; «Луны-3», первого аппарата, сфотографировавшего обратную сторону Луны; «Венеры-7», впервые опустившейся на поверхность другой планеты и работавшей там; «Востока-1», первого пилотируемого космического корабля, в котором Герой Советского Союза Юрий Гагарин облетел Землю. Перед павильоном дети ползали по наклонным стабилизаторам ракеты «Восток», светлые головки и красные галстуки с шумом и гамом скатывались на землю. «Земля» — так зовут русские нашу планету. Расположенный в Северном море советский арктический остров называется Новой Землей. Именно там в 1961 году русские взорвали ядерное устройство мощностью 58 мегатонн, люди больше не производили взрывов подобной силы. Но… был летний день, горожане расхватывали мороженое, которым москвичи так гордятся, семьи гуляли, беззубый старик улыбался Элли и Луначарскому понимающими глазами, словно они были любовниками. И древняя земля казалась чудесной.</p><p class="p1">Когда она изредка наезжала в Ленинград или Москву, ВГ частенько устраивал ей вечера. Группой из шести-восьми человек они отправлялись в Большой или Кировский театр на балетные спектакли. Луначарский умел доставать билеты. Она благодарила хозяев за удовольствие, они — ее тоже… и добавляли, что лишь в компании иностранцев им удается попасть на спектакль. ВГ только улыбался. Жену он с собой не брал никогда, Элли так и не пришлось познакомиться с ней. ВГ говорил, что его жена — врач и живет интересами своих пациентов. Когда однажды он вспомнил, что его родители собирались в Америку, но так и не уехали, Элли спросила, о чем он жалеет больше всего.</p><p class="p1">— Жалею я только об одном, — сказал он хрустким, как всегда, голосом, — о том, что моя дочь вышла замуж за болгарина.</p><p class="p1">Однажды ВГ устроил для нее обед в кавказском ресторане в центре Москвы. На вечер наняли тамаду по имени Халадзе. Он был мастером произносить тосты, можно сказать, художником своего дела, но скромные познания в русском вынуждали Элли всякий раз просить помощи у ВГ. Тот заметил:</p><p class="p1">— У нас, русских, алкоголиком считается тот, кто пьет молча.</p><p class="p1">Первый, относительно посредственный тост закончился словами «За мир на всех планетах», и ВГ пояснил, что слово «мир» означает и нашу планету, и мирную спокойную жизнь, и самоуправляющуюся общину, корнями своими уходящую в древность. Они поговорили о том, что мир наверняка был намного уютнее, когда на Земле не было политической единицы крупнее деревенской сходки.</p><p class="p1">— Да, каждая деревня — это целая планета, — произнес Луначарский, поднимая бокал.</p><p class="p1">— Но и каждая планета — деревня, — добавила она.</p><p class="p1">Подобные мероприятия бывали и утомительными. Водка и бренди поглощались собравшимися в чудовищных количествах, не производя, впрочем, серьезного действия. Потом в час или два ночи они с шумом вываливались из ресторана и ловили такси, иногда безуспешно. Несколько раз он провожал ее из ресторана домой пешком — километров пять или шесть. Внимательный, добрый дядюшка — терпимый в политических вопросах, но крутой в научных суждениях. И хотя о его сексуальных эскападах среди коллег ходили легенды, по отношению к Элли он никогда не позволял себе ничего предосудительного, если не считать прощального дружеского поцелуя. Это ее всегда несколько обескураживало, хотя она не сомневалась, что ВГ симпатизирует ей.</p><p class="p1">Среди советских ученых было много женщин, американки меньше интересовались наукой. Но все они, как правило, занимали низшие и средние должности, поэтому советские мужчины-ученые, подобно своим американским собратьям, приходили в легкое изумление при виде хорошенькой женщины, энергично и уверенно излагавшей свои собственные взгляды, к тому же обнаруживая при этом явную компетентность. Иногда Элли перебивали или делали вид, что не слышат ее слов. В этом случае Луначарский всегда наклонялся вперед и громче обычного спрашивал:</p><p class="p1">— Доктор Эрроуэй, что вы сказали? Будьте добры, повторите, я не расслышал.</p><p class="p1">Прочие мгновенно умолкали, и она могла продолжать… шла ли речь о детекторах с присадкой арсенида галлия или о содержании этилового спирта в галактическом облаке W-3. Стопроцентного спирта в этом межзвездном облаке хватило бы жителям Земли на все время существования Солнечной системы, даже если бы каждый взрослый был законченным алкоголиком. Тамаде эта мысль понравилась. В последующих тостах он все обыгрывал эту тему: только ли землян пьянит алкоголь, пьянствует ли вся Галактика… в конце концов все согласились, что ни один тамада на бесчисленных планетах Вселенной не может так искусно провозглашать тосты, как наш дорогой Трофим Сергеевич Халадзе.</p><p class="p1">В аэропорту Альбукерке они обнаружили, что самолет из Нью-Йорка, с которым летела советская делегация, чудесным образом прибыл на полчаса раньше расписания. Элли обнаружила ВГ у ларька с сувенирами, он разглядывал какую-то безделицу. Должно быть, уголком глаза заметил ее:</p><p class="p1">— Секунду, доктор Эрроуэй. Девятнадцать девяносто пять? — продолжал он, обращаясь к безразличному продавцу. — Вчера я видел такую же штуку в Нью-Йорке за семнадцать пятьдесят.</p><p class="p1">Она пододвинулась и увидела перед ВГ колоду голографических карт, на которых обнаженные человекоподобные существа обоих полов красовались в позах, считающихся теперь неизящными; прежние поколения пришли бы от них просто в ужас. Продавец нерешительно пытался собрать их, ВГ же норовил разбросать карты как можно шире и побеждал.</p><p class="p1">— Прошу прощения, сэр, не я устанавливаю цены. Я просто работаю здесь, — оправдывался продавец.</p><p class="p1">— Вот видите, любая плановая экономика имеет свои недостатки, — сказал ВГ Элли, передавая продавцу 20-долларовую бумажку. — В системе истинного свободного предпринимательства я мог бы приобрести это за 15 долларов, даже за 12,95. Элли, не смотрите на меня так, это не для себя. С учетом джокеров здесь пятьдесят четыре карты. Пятьдесят четыре сувенира для сотрудников.</p><p class="p1">Она улыбнулась и прикоснулась к его руке.</p><p class="p1">— Рада вновь видеть вас, ВГ.</p><p class="p1">— Дорогая моя, для меня это редкостное удовольствие.</p><p class="p1">По дороге в Сокорро с общего невысказанного согласия в основном шел обмен любезностями. Переднее сиденье занимали Валериан и водитель, один из новых сотрудников службы безопасности. Питер, в обычных обстоятельствах человек не говорливый, предпочитал, откинувшись назад, прислушиваться к беседе, почти не касавшейся вопроса, ради которого приехали русские: третьего уровня палимпсеста в сложном и изощренном Послании, все еще остававшемся не дешифрованным, несмотря на совместные усилия. После некоторых колебаний правительство США было вынуждено согласиться… Приходилось привлекать даже русских. Впрочем, согласие правительства обусловливалось и тем, что мощный сигнал с Веги могли принимать и весьма скромные по возможностям радиотелескопы. За многие годы домовитые русские понаставили небольшие радиотелескопы по всей Евразии, распростершейся на 9000 километров, а недавно завершили строительство крупной радиообсерватории возле Самарканда. Советские корабли океанической космической связи патрулировали Атлантику и Тихий океан.</p><p class="p1">Некоторые из советских данных были уже известны, ведь обсерватории Японии, Китая, Индии и Ирака записывали то же самое. Конечно, все радиотелескопы мира, над которыми проходила по небу Вега, слушали передачу. Астрономы Великобритании, Франции, Нидерландов, Швеции, Германии, Чехословакии, Канады, Венесуэлы и Австралии по частям записывали сообщение и следили за Вегой от восхода и до заката. В некоторых обсерваториях приемные устройства не позволяли разделять отдельные импульсы. Но они все равно слушали акустический шум. Каждая нация выхватывала по кусочку из головоломки, ведь Земля вращается — о чем Элли в свое время пришлось напомнить Китцу. Задача оказалась сложной. Пока нельзя было даже судить, содержит сообщение символы или изображения.</p><p class="p1">Все прекрасно понимали, что и думать о дешифровке нечего, пока Послание не начнется вновь с первой страницы — если такое случится, — где будут и обозначения, и ключ к коду. А если оно будет длинным, думала Элли, пока ВГ всуе сопоставлял мексиканские полупустыни с тайгой, или начнет повторяться только через сто лет, и введения там не окажется? А что, если Послание (по всей планете это слово, не сговариваясь, писали с прописной буквы) — просто проверка интеллекта, и миры, не сумевшие прочесть его, не в состоянии и воспользоваться информацией? Ей вдруг пришло в голову, какое унижение могут принести человеческому роду все ее старания, если никто так и не сумеет разобраться, что в нем написано. К тому моменту, когда Америка и Советы решили сотрудничать и торжественно подписали соответствующий меморандум, все остальные нации, владеющие радиотелескопами, уже объединили усилия. Образовалось нечто вроде Всемирного консорциума «Послание», и люди пользовались этим термином. Всем были необходимы и чужие данные, и умы, ведь Послание следовало еще расшифровать.</p><p class="p1">Прочие вопросы уже не слишком интересовали прессу. Она все пережевывала жалкую горсточку фактов — простые числа, передачу с открытия Берлинской олимпиады, существование сложного сообщения. На планете едва ли можно было отыскать человека, так или иначе не слыхавшего о Послании с Веги.</p><p class="p1">Религиозные секты, старинные, новые и новейшие, возникшие в непосредственной связи с Посланием, разбирали теологические последствия его существования. Одни считали, что оно от Бога, другие — от Дьявола. Некоторые, как ни странно, колебались. Поднялась волна интереса к Гитлеру и нацистскому режиму — ВГ успел заметить штук восемь свастик в объявлениях «Книжного обозрения „Нью-Йорк таймс“. Элли ответила, что восемь — это еще хорошо, но сама понимала, что преувеличивает. Еще несколько недель назад свастик было лишь две или три. Группа, именующая себя „космоармией“, провозгласила, что обладает исчерпывающими свидетельствами изобретения летающих тарелок в гитлеровской Германии. На Веге созрела новая чистокровная раса нацистов, готовая наконец-то навести порядок и на Земле.</p><p class="p1">Некоторые же относились к Посланию как к скверне и умоляли обсерватории не распространять эту гнусность; были и такие, что считали Послание знаком Пришествия и настаивали на строительстве новых радиотелескопов, в том числе и в космосе. Иные остерегали от использования советских данных — злокозненные русские могли сфальсифицировать какую-то ложь… впрочем, советские данные в точности согласовывались с результатами наблюдений, проведенных обсерваториями Ирака, Индии, Китая и Японии. Люди, ощущавшие изменение политического климата в мире, считали, что даже одно только существование Послания — пусть его никогда не дешифруют — оказывает благотворное воздействие на вздорных политиков вечно ссорящихся государств. Раз уж передающая цивилизация совершеннее нашей и она явно существовала — во всяком случае еще 26 лет назад, — смерть от собственных рук не обязательно ждет технологически развитую цивилизацию. В мире, увлеченно экспериментирующем с мощными ядерными зарядами и системами их доставки, Послание явилось источником надежды для многих: некоторые уже считали его самой радостной вестью за все последние годы. Десятилетиями молодежь старалась не очень-то задумываться о будущем. Теперь возникла добрая перспектива.</p><p class="p1">Люди, склонные к оптимистическим прогнозам, чувствовали, что соскальзывают к грани, за которой начинается хилиастическое движение. Истинные хилиасты провозглашали, что по-настоящему третье тысячелетие начнется, когда на Землю возвратится Христос… Будда, или Кришна, или некий Пророк, который установит суровую к смертным, но благодетельную теократию. Быть может, все это будет предшествовать вознесению избранных на небеса. Существовали хилиасты и иного толка, их насчитывалось гораздо больше. Они полагали, что без физического разрушения мира не будет и Второго пришествия, поскольку на этом сходились противоречивые во всем прочем пророчества. Хилиастов Судного дня тревожил запашок мирового единства, смущало и постоянное уменьшение запасов стратегического оружия — наиболее подходящего средства реализации их убеждений. День ото дня его становилось все меньше. Другие возможные причины для катастрофы — перенаселенность, загрязнения, землетрясения, вулканические взрывы, парниковый эффект, оледенения, даже столкновение Земли с кометой — не могли создать необходимый эффект или же были маловероятны и недостаточно апокалиптичны.</p><p class="p1">Некоторые вожди хилиастов заверяли сборища преданных и верных, что страхование жизни кроме как от несчастного случая есть знак маловерия, но вместе с тем считали кощунством заранее запасаться местом на кладбище и вообще предпринимать какие-то преждевременные шаги в этом направлении. Все верующие телесно вознесутся на небо и станут перед престолом Господним уже через несколько лет.</p><p class="p1">Элли знала, что знаменитый родственник Луначарского был исключительной личностью в том смысле, что среди большевиков умудрился сохранить интерес к мировым религиям. Но реакция самого ВГ на религиозное брожение в мире проявилась очень скупо:</p><p class="p1">— Главный вопрос веры в моей стране, — утверждал он, — отреклись ли веганцы от Троцкого?</p><p class="p1">Когда они стали подъезжать к «Аргусу», обочины оказались забиты автомобилями, велосипедами, палатками и толпами людей. Ночью некогда тихую равнину Сан-Агустин озаряло пламя многих костров. Без сомнения, преуспевали не все из тех, кто толпился возле обочины. Элли заметила две молодые пары. Мужчины были в теннисках и поношенных джинсах, пояса на бедрах, оба ходили слегка вразвалку, как учили их старшекурсники. Пары оживленно переговаривались. Один из мужчин подталкивал обшарпанную коляску, в которой с непринужденным видом развалился мальчик лет двух. Женщины следовали за мужчинами, в руку одной вцепилось юное существо, явно только осваивающее науку прямохождения, живот второй женщины выпирал вперед… месяц-другой и еще одна жизнь появится на этой сумеречной планете. Среди толпы попадались и мистики из изолированных коммун за Таосом, ищущие озарения с помощью псилоцибина, и монахи из монастыря неподалеку от Альбукерке, использовавшие в подобных же целях этиловый спирт. Были там загорелые люди с характерными морщинками у глаз, что провели всю свою жизнь под открытым небом, и тощие книжные черви — студенты из Аризонского университета в Тусоне. Индейцы племени навахо по астрономическим ценам торговали шелковыми галстуками и серебряными цепочками, в чем виделся крохотный реванш в торговых отношениях между белыми и цветными. Повсюду военнослужащие с базы ВВС Дейвис-Монтан настойчиво предлагали жевательный табак и резинку. Элегантный седовласый мужчина в костюме за 900 долларов и подобранной по цвету стетсоновской шляпе, по-видимому, был владельцем ранчо. Здесь собрались люди из бараков и небоскребов, из хижин, сложенных из земляных кирпичей, завсегдатаи ночлежек и трейлеров. Одни явились сюда от безделья, другие хотели рассказать своим внукам о том, что были здесь. Одни приехали в надежде на удачу, другие хотели быть свидетелями чуда. Под яркими лучами утреннего солнца толпа то тихо молилась, то веселилась, ждала чуда и не верила в него. Лишь изредка они глядели на проезжавшую вереницу автомобилей, на каждом из которых значилось: «АВТОПАРК ПРАВИТЕЛЬСТВЕННЫХ СЛУЖБ».</p><p class="p1">Многие завтракали на багажниках и капотах, кто-то разглядывал товары и продукты в придорожных эмпориумах на колесах под эффектными названиями «КОСМИЧЕСКИЕ СУВЕНИРЫ» или попроще — «ЗАКУСОЧНАЯ НА КОЛЕСАХ». Длинные очереди тянулись к неброским сооружениям, рассчитанным не более чем на одну персону. Между автомобилями, спальными мешками, одеялами, складными столами для пикников сновали дети. Взрослые останавливали их, если те приближались к дороге или к забору возле телескопа № 61, где группа бритоголовых, угодливых на вид молодых людей в шафрановых одеяниях нараспев тянула священный слог «Ом». Вокруг виднелись плакаты с претендующими на подлинность изображениями внеземных существ из комиксов или фильмов. Один из плакатов гласил: «Инопланетяне уже среди нас». Мужчина с золотыми серьгами в ушах брился, глядя в боковое зеркало какого-то пикапа. Темноволосая женщина в седане поприветствовала проезжавших, подняв вверх кофейную чашку.</p><p class="p1">Они подъезжали к новым главным воротам, расположенным возле телескопа № 101. С высоты небрежно сляпанного помоста молодой человек поучал небольшую толпу. На нем была тенниска, земной шар на груди разила небесная молния. Элли заметила подобную эмблему еще на нескольких. По ее просьбе за воротами автомобили подъехали поближе к забору, она опустила стекло и прислушалась. Выступавший стоял спиной к ним, и они видели лица в толпе. Эти люди глубоко растроганы, подумала Элли.</p><p class="p1">Речь она услышала с половины фразы: «…многие говорят, что совершена сделка с Дьяволом и ученые продали ему свои души. В каждом из этих телескопов есть драгоценные камни. — Он махнул рукой в сторону телескопа № 101. — Это и сами ученые признают. Кое-кто говорит, что это часть сделки с Дьяволом».</p><p class="p1">— Религиозное хулиганство, — мрачно буркнул Луначарский, отыскивая взглядом дорогу.</p><p class="p1">— Нет-нет, послушаем, — попросила Элли. На ее губах играла удивленная улыбка.</p><p class="p1">— Есть люди, верующие, боящиеся Бога… они считают, что это Послание исходит от обитателей космоса, существ враждебных и чуждых нам, врагов человека. — Последнюю фразу парень выкрикнул и дожидался эффекта. — Все вы устали и разочарованы… Коррупция и растление царят в обществе, их породила ничем не сдерживаемая, бездумная, чуждая Богу техника. Я не знаю, кто прав. Я не могу объяснить, о чем говорится в Послании и от кого оно. Но у меня есть свои подозрения. И скоро все мы узнаем истину. И я уверен, что ученые, политиканы и бюрократы обманывают нас. Они что-то скрывают. Они лгут, как всегда. Слишком долго, о Боже, мы сносили ложь, и растление, которыми нас потчевали.</p><p class="p1">К удивлению Элли, в толпе послышался глухой ропот одобрения. Должно быть, он задел некую струну, о существовании которой она даже не имела представления.</p><p class="p1">— Эти ученые не верят, что мы — дети Господни. Они-то уверены, что нас породила обезьяна. Среди них найдутся и коммунисты. Разве могут подобные люди решать судьбы мира?</p><p class="p1">Толпа отозвалась громогласным «Нет!».</p><p class="p1">— Неужели вы хотите, чтобы кучка неверующих разговаривала с Богом?</p><p class="p1">— Нет! — вновь заревели собравшиеся.</p><p class="p1">— Или с Дьяволом? Да они продадут наше будущее чудовищам из чуждого мира. Братья и сестры, пагубно это место!</p><p class="p1">Элли казалось, что оратор не замечает их присутствия. Но тут он повернулся и указал пальцем через проволочную ограду на остановившуюся процессию.</p><p class="p1">— Они говорят не от нашего имени! Они представляют не нас с вами! И мы не даем им полномочий на переговоры!</p><p class="p1">В толпе возле забора началась толкотня, некоторые, взявшись за руки, начинали ритмично раскачиваться. Это сразу же встревожило и Валериана, и водителя. Моторы негромко урчали на холостом ходу, и через какой-то момент процессия уже помчала к административному зданию «Аргуса», находившемуся отсюда за многие мили пустыни. Отъезжая, Элли расслышала слова оратора за шуршанием шин и рокотом толпы, голос его звенел:</p><p class="p1">— Обещаю вам — зло не будет более твориться здесь!</p></span></span>
