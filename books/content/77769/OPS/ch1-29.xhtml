<span><span id="id26"><div class="title4">
<p class="p">23. Перепрограммирование</p>
</div><div class="epigraph">
<p class="p1">Ибо мы возвестили… не хитросплетенным басням последуя, но бывши очевидцами.</p>
<p class="text-author">Второе послание апостола Петра, 1:16</p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v">Гляди и запомни. Зорче гляди</p>
<p class="v">В самую глубь синевы небесной,</p>
<p class="v">В беспредельность, которой молятся люди.</p>
<p class="v">И говори, кричи, вымаливай чуда.</p>
<p class="v">Ответит? Что же услышишь в ответ?</p>
<p class="v">Небо — не вам. Вы более не оттуда.</p>
</div>
<p class="text-author">Карл Джей Шапиро. «Географическая лекция для ссыльных»</p>
</div>
</div><p class="p1">Телефонные линии починили, дороги расчистили и тщательно отобранные представители прессы были допущены к установке. Горстку репортеров и фотографов сквозь совпадающую выемку во всех бензелях и воздушный шлюз провели внутрь додекаэдра. Записали короткую беседу: репортеры, заняв места в креслах, поведали миру о первой безуспешной попытке запуска Машины. Элли и ее коллег разрешили снять издали, чтобы всем было ясно, что с ними все в порядке, но интервьюировать их было запрещено. Работы по проекту приостановлены, анализируются перспективы их продолжения. Вновь открылся тоннель от Хонсю до Хоккайдо, но тоннель от Земли до Веги теперь закрыт. Проверять не стали, но Элли полагала, что, когда Пятерка оставит Хоккайдо, бензеля попытаются раскрутить вновь. Впрочем, она верила тому, что ей сказали: второй раз Машина не заработает. Тоннели под космосом не для землян. И пусть люди на здоровье проминают пространственно-временной континуум: что толку — никто не станет цепляться за образовавшийся выступ. Дали поглядеть одним глазком, думала она, и бросили спасаться и выживать. Если только мы способны на это.</p><p class="p1">В конце концов членам Пятерки разрешили поговорить друг с другом. Элли попрощалась со всеми. Никто не винил ее.</p><p class="p1">— Конечно, запись производится на магнитных доменах, — напомнил ей ВГ, — а при запуске на бензелях образовалось сильное переменное электрическое поле. Изменяющиеся во времени электрические поля создают магнитное поле в соответствии с уравнением Максвелла. По-моему, тут и погибли все ваши кадры. Вашей вины здесь нет.</p><p class="p1">Ход допросов весьма озадачил ВГ. Его ни в чем не обвиняли, но высказали предположение относительно его участия в некотором антисоветском заговоре, куда его вовлекли западные ученые.</p><p class="p1">— Говорю вам, Элли, неясно мне только одно — возможно ли отыскать разум в Политбюро.</p><p class="p1">— И в Белом доме. Едва ли президент может позволить Китцу так просто свернуть все работы. Она же по уши увязла в проекте.</p><p class="p1">— Этой планетой правят безумцы. Представьте себе, на что только им не приходилось идти, чтобы достичь нынешнего положения. У них нет никаких перспектив. Несколько лет, ну от силы один-два десятка. Они вовсе не думают о том, что будет после них.</p><p class="p1">Элли думала о Лебеде А.</p><p class="p1">— Но они вовсе не убеждены в том, что мы лжем. Просто не могут доказать этого. Поэтому нам придется доказывать свою правоту. В глубине души они не перестают гадать — неужели все это правда? Некоторые из них даже хотели бы поверить. Но это рискованно. Необходимы доказательства. Возможно, мы сумеем кое-что сделать. Например, усовершенствовать теорию гравитации. Или найти астрономическое подтверждение своим словам — в центре Галактики и Лебеде А. Ведь никто не собирается прекращать астрономические наблюдения. Еще мы можем заняться исследованиями додекаэдра, если нам разрешат. Элли, мы заставим, их изменить свое мнение.</p><p class="p1">Трудно убедить безумцев, думала она.</p><p class="p1">— Я не понимаю, каким путем правительства могут уверить свои народы в том, что все это обман, — проговорила Элли.</p><p class="p1">— Неужели? В чем только они не убеждали людей. Убедили же нас столько лет тратить все свое состояние только на то, чтобы всех жителей Земли можно было убить в любой момент… когда правительства решат, что наконец настала пора. По-моему, не сложно заставить людей поверить в любую глупость. Нет, Элли, убеждать они умеют. Просто объявят, что Машина-то включилась, а вот мы свихнулись.</p><p class="p1">— Не думаю, чтобы наша история могла показаться безумной. Но вы, должно быть, правы. Возможно, нам придется сперва обнаружить кое-какие доказательства. ВГ, а с вами все будет в порядке, когда вы… вернетесь домой?</p><p class="p1">— Что они могут сделать со мной? Выслать в Горький? Переживу, в конце концов в моей жизни был <em>тот день</em> на пляже. Нет, со мной все будет в порядке. Мы с вами, Элли, гарантируем друг другу безопасность. Пока вы живы, я нужен своим. И наоборот. Если история окажется подлинной, у нас будут просто счастливы, что нашелся советский очевидец. Об этом будут кричать из громкоговорителей. И тоже начнут, как и ваши деятели, прикидывать военные и экономические дивиденды. И неважно, <em>что</em> нам прикажут делать. Главное, чтобы все были живы. Тогда мы расскажем нашу историю — конечно, независимо друг от друга — сперва тем, кому доверяем. Пусть они поведают ее другим. Поползут слухи. А их не остановишь. И рано или поздно правительства вынуждены будут признать истинным все, что произошло в додекаэдре. Ну а до тех пор мы просто страхуем друг друга. Элли, я так рад. Это самое великое приключение в моей жизни.</p><p class="p1">— Поцелуйте за меня Нину, — попросила она, и ВГ отправился к самолету, отбывающему ночным рейсом в Москву.</p><p class="p1">Во время завтрака Элли спросила у Си, не разочарован ли он.</p><p class="p1">— Разочарован? Я был <em>там</em>, — он поднял глаза к небесам, — видел их… и после этого быть разочарованным? Я осиротел во время Великого похода. Я пережил Культурную революцию. Шесть лет я растил картофель и сахарную свеклу под Великой стеной. Вся моя жизнь — движение вперед, неуклонный подъем. Но я знаю, что такое падение. Мы побывали на банкете, вернулись домой в голодающую деревню и начинаем страдать оттого, что родственники не хотят с нами здороваться. Это не повод для разочарования. Мы проиграли первую стычку. Вглядитесь… в расположение сил.</p><p class="p1">Скоро ему предстояло отправиться в Китай. Он обещал не делать там публичных заявлений по поводу случившегося. Теперь он вернется к своим раскопкам в Сиани. Гробница Циня дожидается его. И ему очень хотелось узнать, насколько похож был этот император на свою копию… Ту, что осталась в центре Галактики.</p><p class="p1">— Простите меня. Я понимаю, что это бестактно, — спросила Элли, помедлив, — но как случилось, что из всех нас только вы встретили там… нелюбимого человека… Неужели, вам так и не довелось почувствовать любовь?</p><p class="p1">Ей хотелось бы тактичнее выразить свою мысль.</p><p class="p1">— Всех, кого я любил, отняли у меня. И уничтожили. На моих глазах воцарялись и низвергались императоры двадцатого столетия. Мне так хотелось встретиться с человеком, роль которого нельзя пересмотреть, которого нельзя ни осудить, ни реабилитировать, даже отредактировать… Из истории человечества нельзя вычеркнуть лишь горстку исторических фигур. — Глядя на крышку стола, он крутил чайную ложку. — Я отдал свою жизнь революции и не жалею об этом. Но я почти ничего не знаю о своей матери и отце. Я даже не помню их. Ваша мать жива. Вы помните отца, видели его вновь. Ну как вы не понимаете своего счастья!</p><p class="p1">Деви страдала как никогда, и Элли видела это. Сперва она решила, что все объясняется тем, как восприняли рассказ директорат проекта и руководители правительств. Но Деви затрясла головой.</p><p class="p1">— Какая мне разница, верят они нам или нет. Главное, Элли, в том, что мы пережили это преображение. Иначе и не назовешь случившееся с нами. <em>Настоящее</em> преображение. В первую же ночь после возвращения на Хоккайдо мне даже приснилось, что наш полет был просто сном. Увы, это был не сон… Да, я горюю. И печаль моя… Знаешь, я столько лет тосковала о Суриндаре, видела его во сне. И встретила его после всех пережитых лет. Он оказался именно таким, как я его помнила, он мне и снился таким. Но когда я увидела его — великолепную имитацию, — я поняла: эта любовь была драгоценной <em>потому</em>, что судьба прервала ее, <em>потому</em>, что я стольким пожертвовала ради замужества. И все. Он был глуп. Лет через десять мы бы развелись. Скорее всего уже через пять. Я ведь была тогда настолько юна и неопытна.</p><p class="p1">— Искренне сочувствую, — проговорила Элли, — случалось и мне оплакивать ушедшую любовь.</p><p class="p1">— Элли, ты ничего не понимаешь. Впервые за всю свою жизнь мне больше <em>не</em> жаль Суриндара. Я плачу о семье, от которой отказалась ради него.</p><p class="p1">Сукхавати намеревалась несколько дней провести в Бомбее, а затем посетить родную деревню в Тамилнаде.</p><p class="p1">— Вообще, — продолжила она, — проще всего было бы убедить и самих себя, что <em>все это</em> — только иллюзия. Каждое утро, каждая ночь сделают пережитое еще более нереальным, похожим на сон. Нам следовало бы держаться вместе, не давать ослабнуть воспоминаниям. <em>Они</em> предвидели эту опасность. Поэтому мы и оказались на морском берегу, в привычных для нас условиях родной планеты. И я не допущу никаких тривиальностей, Элли. Помни это. <em>Все</em> было на самом деле. Не во сне. Не забывай, Элли.</p><p class="p1">Невзирая на все обстоятельства, Эда выглядел абсолютно спокойным. Элли поняла почему. Они с ВГ маялись, держали ответ, а он вычислял.</p><p class="p1">— Как я теперь понимаю, эти тоннели представляют собой мостики Эйнштейна — Розена. В общей теории относительности имеется такой класс решений. Он аналогичен черным дырам, но эволюционно не связан, подобно черным дырам, с гравитационным коллапсом звезд. Но после образования они сразу же расширяются и сжимаются, не позволяя никому путешествовать в них. В черных дырах возникают чудовищные приливные силы и, по крайней мере с точки зрения оставшегося позади наблюдателя, на такое путешествие уходит бесконечное время.</p><p class="p1">Элли не усмотрела в этих словах особого прогресса и попросила Эда дать пояснения. Основная трудность, по его словам, заключалась в том, чтобы удержать открытым тоннель. И Эда уже успел обнаружить целый класс решений своих уравнений поля, свидетельствовавший о наличии неизвестных макроскопических сил, способных наподобие поверхностного натяжения удерживать открытым тоннель. В этом случае можно было избежать всех трудностей, характерных для черных дыр: приливные напряжения становились значительно меньше, в тоннель можно было входить с обоих концов и перемещаться в нем за короткое время, с точки зрения внешнего наблюдателя, не подвергаясь при этом убийственному воздействию излучения.</p><p class="p1">— Я еще не знаю, сохраняет ли тоннель стабильность при воздействии малых возмущений, — сказал он. — Если нет, они могли создать сложные системы подпитки и устранить возможную нестабильность. Но окончательной уверенности у меня пока нет. Но если это действительно мостики Эйнштейна — Розена, нам будет чем ответить на новые обвинения.</p><p class="p1">Эда торопился в Лагос, краешек зеленого билета нигерийских авиалиний торчал из его кармана. Он сомневался, что сумеет полностью разобраться в той новой физике, о существовании которой свидетельствовало их путешествие. Даже выражал неуверенность, что вообще годен для подобной задачи, еще и потому, что считал свой возраст слишком зрелым для физика-теоретика. Ему было уже тридцать восемь. Но больше всего, признался он Элли, его тянуло домой. Эда успел соскучиться по жене и детишкам.</p><p class="p1">Она обняла его на прощание и сказала, что считала знакомство с ним честью для себя.</p><p class="p1">— Зачем прошедшее время? — удивился он. — Мы еще увидимся. И знаете, Элли, — добавил уже почти на ходу, — сделайте кое-что для меня. Вспомните все, что там было, до последней детали. И запишите, а потом пришлите мне. Наш опыт есть результат эксперимента. И один из нас может заметить нечто важное, существенное для понимания событий, что могли упустить остальные. Пришлите мне ваши записи. Я уже всех попросил об этом.</p><p class="p1">Он помахал ей рукой, приподнял потрепанный чемоданчик и исчез за дверцей уже ожидавшей служебной машины.</p><p class="p1">Все разъезжались по своим национальным квартирам, но Элли казалось, что распалась ее семья. Она тоже преобразилась. А как же иначе? Из нее изгнали демона. Даже нескольких. И как раз в тот самый момент, когда она почувствовала в себе способность любить, оказалось, что любить-то и некого.</p><p class="p1">Ее прихватили с завода на вертолете. Весь долгий перелет до Вашингтона на правительственном самолете она проспала — людям из Белого дома пришлось даже расталкивать ее, когда они поднялись на борт с дальней дорожки аэродрома Хиккамфилд на Гавайях.</p><p class="p1">Они пошли на сделку. Элли могла возвращаться на «Аргус», конечно, уже не в качестве директора, и заниматься любым интересующим ее вопросом. С ней, так сказать, заключили пожизненный контракт.</p><p class="p1">— Будем разумными, — провозгласил Китц, соглашаясь на компромисс. — Вы даете нам солидные, убедительные свидетельства, и мы сами поможем вам распространить заявление. Будем считать, что мы просто попросили вас помолчать, пока у нас не появится абсолютная уверенность в вашей правоте. И в пределах разумного будем поддерживать все ваши исследования. Если мы объявим обо всем немедленно, когда схлынет волна энтузиазма, скептики тотчас начнут требовать доказательств. Это будет компрометировать как вас, так и нас. Собирайте доказательства, если сумеете.</p><p class="p1">Похоже, это президент потребовала от него изменить тон. Едва ли Китц сам пошел на мировую.</p><p class="p1">Но при этом она не должна распространяться обо всем, что произошло в Машине. Пятеро посидели-посидели, поговорили и вышли из Машины. И если она осмелится проронить хоть слово или намекнуть… правительство немедленно обнародует врачебное заключение, и тогда, выражая всяческие сожаления, ее немедленно уволят.</p><p class="p1">Она думала, чем пытались купить молчание Питера Валериана, ВГ, Абоннемы. И просто не представляла, как можно заставить молчать остальных, если только не расстрелять следственные группы и весь персонал консорциума. Дело во времени. Значит, решила Элли, они покупают себе передышку.</p><p class="p1">Она удивилась, почему их пытались припугнуть столь незначительными наказаниями, но, с другой стороны, Китц не допустит нарушений соглашения. Впрочем, править ему уже оставалось недолго. Через год в соответствии с Конституцией истекал второй срок правления администрации Ласкер. Китц уже вошел партнером в юридическую фирму, известную в Вашингтоне своей военно-промышленной клиентурой.</p><p class="p1">Но Элли считала, что Китц способен посягнуть и на большее. Его не слишком беспокоило все, что происходит в центре Галактики. Он страдал — она была уверена в этом, — потому что тоннель оставался открытым, и не от Земли, а к Земле. Элли подумала, что сборочное предприятие на Хоккайдо вскоре демонтируют. Инженеры вернутся на заводы и в университеты. Что-то они еще будут говорить… Додекаэдр наверняка выставят в научном городке в Цукуба. А потом через какое-то время, когда внимание мировой общественности будет приковано к иным вопросам, на том месте, где собирали Машину, произойдет взрыв… ядерный, если Китц сумеет подыскать удобное объяснение. После ядерного взрыва под предлогом радиоактивного заражения все это место можно будет объявить запретной зоной. По крайней мере там не будут шататься зеваки, и никто ни на что не наткнется. Возможно, небезразличное отношение Японии к ядерному оружию заставит Китца ограничиться обычной взрывчаткой. Все обставят как очередную катастрофу на угольных копях Хоккайдо. Хотя сомнительно, чтобы даже ядерный взрыв мог нарушить целостность тоннеля, думала Элли.</p><p class="p1">Впрочем, может быть, Китц ни о чем таком и не помышлял. И она просто недооценивает его. В конце концов и он уже наверняка заражен Машиндо. У него есть семья, друзья, любимые люди. Ну хотя бы что-то он должен понимать?</p><p class="p1">На следующий день президент наградила ее Национальной медалью Свободы. Публичная церемония состоялась в Белом доме. Посреди беломраморной стены в камине пылали поленья. Изрядную часть своего политического капитала и куда более обыденной его разновидности президент нажила на Машине и потому намеревалась сохранить лицо перед всей страной и миром. Вложения в Машину приносили доход и в Штатах, и во всем мире. Новые предприятия процветали, новые технологии сулили людям едва ли не большие блага, чем изобретения Томаса Эдисона. Мы обнаружили, что мы не одни, что в космосе существуют создания куда более разумные. И наши представления о себе тоже изменились навеки, заметила президент. От своего имени и, безусловно, от лица всех американцев она берется утверждать, что открытие лишь укрепило ее веру в Бога, творящего жизнь и разум на многих мирах, и это, по мнению президента, не противоречит воззрениям ни одной из религий. Но самым большим благом, дарованным нам Машиной, оказался дух, воцарившийся на Земле с ее появлением, дух сотрудничества и взаимопонимания среди людей, наконец осознавших, что все мы — лишь пассажиры на утлом суденышке посреди волн пространства и времени. Дух, воплотивший в себе глобальное единство планеты как всеобщую цель, известную всем под именем «Машиндо».</p><p class="p1">Президент представила Элли прессе и телерепортерам, сообщила о ее упорных 12-летних трудах, о проявленных в ходе работы выдающихся способностях, о смелости, потребовавшейся, чтобы вступить на борт Машины. Ведь никто не знал, что выкинет этот механизм. Доктор Эрроуэй сознательно рисковала собственной жизнью. Она потрудилась больше, чем кто-либо другой. Но Машина не заработала, и в этом нет вины доктора Эрроуэй. Она заслуживает благодарности американцев и всех живущих на Земле. Элли — очень скромный человек. Но когда потребовалось, она, оставив привычное уединение, возложила на свои плечи этот тяжкий груз — и истолкование Послания, и сооружение Машины. И продемонстрировала такое уважение к прессе, что ей самой как президенту остается только завидовать. А теперь доктору Эрроуэй следует дать возможность спокойно заняться своей научной работой. Все заявления для прессы, брифинга и интервью уже сделали министр обороны Китц и советник по науке дер Хиир. Президент надеется, что пресса не будет возражать против пожелания доктора Эрроуэй, чтобы пресс-конференции не было. Но фотокорреспондентам она предоставит возможность для съемки. Элли покинула Вашингтон, так и не поняв, что же собственно знает обо всем президент.</p><p class="p1">Обратно ее везли на аккуратном реактивном самолетике Объединенного авиатранспортного управления и даже согласились остановиться в Джейнсвилле. Мать Элли была в своем старом стеганом халате. Кто-то слегка подрумянил ей щеки. Элли прижалась щекой к подушке возле головы матери. Способность говорить медленно возвращалась, и она даже сумела чуть заметно погладить Элли по голове правой рукой.</p><p class="p1">— Мам, я кое-что должна тебе сказать. Это очень неожиданная вещь. Попытайся быть спокойной. Я не хочу волновать тебя. Мам… я видела папу. <em>Видела</em>. И он говорил, что любит тебя.</p><p class="p1">— Да, — старуха медленно кивнула, — был здесь вчера.</p><p class="p1">Джон Стогтон вчера навещал ее, Элли знала об этом. И он настоял на том, чтобы Элли отправилась в приют одна… Он сослался на занятость, но нельзя было исключить, что Стогтон просто не хотел мешать ей. И тем не менее с некоторым раздражением Элли проговорила:</p><p class="p1">— Да нет же. Я говорю о <em>папе</em>.</p><p class="p1">— Скажи ему, — с трудом выявила старуха. — Скажи ему. Платье с шифоном. Хватит прибирать… пусть едет домой из магазина.</p><p class="p1">Там, в ее вселенной, отец Элли до сих пор торговал скобяным товаром. Впрочем, и сама Элли так считала.</p><p class="p1">Проволочная ограда широкой дугой тянулась от горизонта до горизонта, мешая расти невысоким кустам. Элли была рада вернуться, заняться новым, конечно, куда менее важным делом.</p><p class="p1">Джека Хибберта назначили исполняющим обязанности директора, и она почувствовала облегчение, освободившись от административных забот. Теперь, когда после прекращения сигнала с Веги освободилась бездна времени для наблюдений, в целой дюжине полузадохшихся отраслей радиоастрономии ощущался заметный прогресс. Ее сотрудники ни в коей мере не разделяли мнения Китца. Послание не могло быть подделкой. Она гадала, что Валериан и дер Хиир говорят ее друзьям и коллегам о Послании и Машине.</p><p class="p1">Элли сомневалась, чтобы Китц осмелился высказать хоть слово из своих предположений где-нибудь за пределами пока еще собственного кабинета в Пентагоне. Однажды она была там. Охранник во флотском мундире с кожаной кобурой на поясе, сложив руки за спиной, перегораживал вход, вероятно, чтобы какой-нибудь случайный гость этого лабиринта не поддался внезапному иррациональному порыву.</p><p class="p1">Вилли сам перегнал «Тандерберд» из Вайоминга, так что машина ждала ее. Соглашение предусматривало, чтобы все ее разъезды ограничивались территорией обсерватории, представлявшей достаточный простор для подобного рода увеселений. Теперь не будет ни поездок в Западный Техас, ни кроликов, выстроившихся вдоль дороги; больше не удастся ей заехать в горы, чтобы глянуть на южную звезду. Вообще-то она жалела только об этом. Впрочем, зимой все равно нечего было надеяться на внимание кроликов.</p><p class="p1">Сперва обсерваторию осаждало целое подразделение журналистов: они надеялись либо докричаться до нее, либо снять ее через телеобъектив. Но она намеренно держалась в уединении. Новые сотрудники, отвечавшие за контакты с прессой, орудовали эффективно и не проявляли ни малейшего сострадания к журналистам. В конце концов так приказала президент.</p><p class="p1">Шли недели и месяцы, полк репортеров сократился до батальона, потом до роты, наконец, до взвода. Оставались только самые настырные: из «Уорлд холограм» и других скандальных еженедельников, хилиастических газет, еще — одинокий представитель некоего издания, именовавшегося «Наука и Бог». Никто не знал, какая секта заправляла им, сам же репортер ничего не рассказывал об этом.</p><p class="p1">Но газеты повествовали о двенадцати годах упорной работы, о ее недолгой кульминации — дешифровке Послания и последующем сооружении Машины, не сработавшей вопреки ожиданиям всего мира, и намекали, что доктор Эрроуэй испытывает разочарование, даже некоторую депрессию.</p><p class="p1">Впрочем, во многих передовицах приветствовали эту паузу. Быстрота, с которой обрушилось на человечество новое открытие, обусловила необходимость в его философском и религиозном осмыслении, требовала времени на пересмотр понятий и переоценку ценностей. Быть может, Земля просто не готова еще для контактов с чуждыми цивилизациями. Социологи и кое-кто из педагогов утверждали, что сам факт существования превосходящего нас внеземного разума потребует умственных усилий нескольких поколений. Они заявляли, что человеческому самолюбию нанесен смертельный удар. Через несколько десятилетий мы уже будем иметь представление о действии принципов, заложенных в основу Машины. И мы обнаружим нашу ошибку и будем хохотать при виде элементарных просчетов, не позволивших ей сработать во время первого запуска в 1999 году.</p><p class="p1">Иные из религиозных комментаторов уверяли, что отказом Машины Бог покарал род человеческий за вечную его гордыню. В передававшемся на всю страну обращении Билли Джо Ренкин предположил, что сообщение было нам послано прямо из части Ада, именуемой Вега, — и он всегда допускал возможность этого. Послание и Машина, говорил он, не что иное, как современная Вавилонская башня. И опять люди в глупости своей тщетно пытались достичь престола Господня. Тысячелетия назад существовал город, где царили разврат и богохульство, — и Господь наказал его и уничтожил. Этот город попытались возродить в наше время. Но верные слову Господню вновь исполнили Его волю. Тогда через Послание и Машину зло снова попыталось одолеть праведных и боящихся Бога. И вновь эта демоническая деятельность была остановлена — в Вайоминге по воле Божьей случилась диверсия, а в безбожной России Провидение Божье «смутило разум коммунистов-ученых».</p><p class="p1">Но, несмотря на очевидные проявления воли Господней, продолжал Ренкин, люди в третий раз попытались построить Машину. И Бог не препятствовал им. Но мягкой и нежной заботой о роде человеческом отразил демонические нападки и еще раз продемонстрировал милость свою и заботу о грешных и блудных и, по правде говоря, вовсе не достойных детях своих на Земле. Пришло время осознать нашу греховность, нашу порочную суть и к новому тысячелетию, истинному тысячелетию, что начнется 1 января 2001 года, вновь отдать себя и нашу планету в руки Всевышнего.</p><p class="p1">Машины нужно уничтожить. Каждую, до последней детали. Ведь никакие машины не позволят человеку стать по правую руку от Господа, если он не очистил своего сердца. Поэтому все надежды на машины следует оставить, пока еще не слишком поздно.</p><p class="p1">Элли дослушала Ренкина, выключила телевизор и вернулась к прерванным занятиям.</p><p class="p1">Ей позволяли звонить лишь в Джейнсвилл, штат Висконсин. Все вызовы из других городов оставались без ответа. Естественно, с вежливыми извинениями. Письма от дер Хиира, Валериана и старой подруги Бекки Элленбоген она вскрывать не стала. Некоторые послания прибыли со скоростной почтой, курьер доставил из Южной Каролины письмо от Палмера Джосса. Она ответила запиской буквально в несколько слов: «Дорогой Палмер. Рано. Элли» — и отправила без обратного адреса; получил ли Джосс записку, она не знала.</p><p class="p1">В телепередаче о ней, сделанной без ее согласия, утверждалось, что Элли обнаружила в себе склонность к уединению, куда более сильную, чем у Нейла Армстронга и даже у самой Греты Гарбо. Элли воспринимала все со спокойным равнодушием. Она была занята другими делами, работала день и ночь.</p><p class="p1">Но ограничения на общение с внешним миром не относились к области чисто научных работ, и через открытую асинхронную телесеть они с ВГ затеяли долговременную исследовательскую программу. Среди изучаемых объектов значились окрестности Стрельца А, центр нашей Галактики и огромный внегалактический радиоисточник Лебедь А. Телескопы «Аргуса» образовывали только часть фазированной антенны, соединенную с советскими телескопами близ Самарканда. В целом такая антенна действовала как радиотелескоп размером с Землю. При длине волны в несколько сантиметров подобный телескоп может разглядеть в центре Галактики объекты, по размеру укладывающиеся в орбиту Марса.</p><p class="p1">Ее беспокоило, что этого мало, что обе кружившие вокруг друг друга черные дыры имеют значительно меньший размер. Но непрерывное наблюдение непременно должно дать какие-то результаты. Что действительно необходимо, думала она, так это радиотелескоп на земной орбите в противоположной от Земли стороне. Если доставить его ракетой и включить в тандеме с радиотелескопами Земли, в центре Галактики можно будет обнаружить объект величиной с Землю. Даже со станцию.</p><p class="p1">Большую часть времени Элли проводила за письменным столом, писала, совершенствовала программы для «Крей-21» и заносила на бумагу мельчайшие подробности — все, что только могла припомнить, — тех расплывшихся до суток двадцати минут по земному времени, проведенных ими в Машине. Впрочем, на полпути она сообразила, что занимается самиздатом — технологией на уровне копирки. Оригинал и две копии она поместила в свой сейф, рядом с уже пожелтевшим томом дела Хаддена. Четвертый экземпляр спрятала за отогнутой платой в электронном блоке 49-го телескопа. А потом спалила копирку. Валил едкий черный дым. Через шесть недель она закончила возню с перепрограммированием и едва успела подумать о Палмере Джоссе, как он собственной персоной возник в проходной «Аргуса».</p><p class="p1">Путь ему расчистили несколько телефонных звонков от специального помощника президента, с которым Джосс, понятно, был знаком далеко не первый год. Вопреки традиционному на юго-западе небрежению к одежде, он, как всегда, был облачен в куртку, белую рубашку и галстук. Она подарила ему пальмовую ветвь, поблагодарила за кулон и, несмотря на все запреты Китца, немедленно выложила содержание всех так называемых видений.</p><p class="p1">Они решили воспользоваться опытом ее советских коллег, предпочитавших обмениваться неортодоксальными мыслями на прогулках. Джосс время от времени останавливался, Элли брала его под руку, некоторое время они шли рядом…</p><p class="p1">Слушал он с осмысленной симпатией, в комментариях проявляя благородство, редкое для человека, чьи убеждения, как ей казалось, она опровергает… Впрочем, может быть, и он не доверял ей. Теперь-то она действительно могла показать ему «Аргус». С ним было приятно, и Элли радовалась его обществу. И даже жалела, что чрезмерная занятость не позволила им встретиться еще тогда в Вашингтоне.</p><p class="p1">Совершенно случайно, конечно, они забрели за узкую металлическую лесенку вокруг опоры телескопа № 49. Вид остальных 130 радиотелескопов — в большинстве своем передвижных, от каждого уходили в стороны рельсовые пути — не имел на Земле аналогий. В электрической будке она отодвинула плату и извлекла объемистый пакет с именем Джосса на нем. Тот положил его во внутренний карман, и снаружи образовалась заметная припухлость.</p><p class="p1">Элли рассказала о протоколах наблюдений за Стрельцом А и Лебедем А, а также о программе для компьютера.</p><p class="p1">— Даже с помощью «Крея» потребуется достаточно много времени, чтобы вычислить число «пи» с точностью до десяти в двадцатой степени знака после запятой. Нам ведь не сказали, что нужно искать <em>именно</em> в «пи». Тогда говорилось в сослагательном наклонении. Так что, может быть, придется рассчитать и «е», или искать в том множестве трансцендентных чисел, о котором они говорили с ВГ. Не исключено, что все может оказаться в совершенно другом числе. Поэтому примитивный силовой подход — прямое вычисление трансцендентных чисел — приведет просто к потере времени. Но «Аргус» располагает очень сложными алгоритмами дешифровки, предназначенными для обнаружения упорядоченных участков в сигналах, имеющих мало-мальски правильный облик. Поэтому я переписала программы…</p><p class="p1">По выражению лица было видно, что Джосс не понял, и Элли поправилась:</p><p class="p1">— …Я сделала так, чтобы они не вычисляли значения «пи» и потом печатали результаты расчета. Для этого у нас мало времени. Моя программа просто перебирает цифры и останавливается только в случае аномальной последовательности нулей и единиц. Вы понимаете, что я говорю? Останавливается, обнаружив что-нибудь упорядоченное. Конечно, нули и единицы будут появляться хаотически. Десять процентов всех чисел составят нули, десять процентов — единицы. Это в среднем. Чем больше десятичных знаков мы переберем, тем длиннее могут оказаться случайные последовательности нулей и единиц. Компьютер использует не только десятичную систему.</p><p class="p1">— Не понял. Разве нужная вам последовательность не может выпасть случайно?</p><p class="p1">— Конечно. Но вы можете определить вероятность такого события. Если уже в самом начале расчетов обнаружилось очень сложное сообщение, оно не может оказаться случайным. Поэтому по утрам компьютер считает мою задачу. Он не считывает данных и не печатает ничего. Просто просчитывает ряды, описывающие «пи», и следит за десятичными знаками. Словом, занимается собственным делом. И не станет ничего говорить, пока не обнаружит искомое. Если я не спрошу. Ну как будто бы рассматривает свой пуп.</p><p class="p1">— Элли, ради бога, вы же знаете, что я не математик. Поясните, пожалуйста.</p><p class="p1">— Пожалуйста. — В карманах ее спортивного костюма не оказалось чистого клочка бумаги, и она даже подумала, не извлечь ли пакет из его нагрудного кармана, но решила, что здесь на открытом месте это делать рискованно. Джосс понял и достал крошечный спиральный блокнот.</p><p class="p1">— Спасибо. «Пи» начинается с таких цифр: 3,1415926… Видите, случайный набор цифр. Правда, единица здесь выпала два раза в первой же четверке цифр, но это ни о чем не говорит: через некоторое время все усреднится. После того, как получено достаточно знаков, каждая цифра от О до 9 будет появляться примерно в десяти процентах случаев. Иногда одна и та же цифра будет повторяться несколько раз подряд, например 4444, но все это подчиняется статистической вероятности. Теперь предположим, что вы перебираете знаки, и вдруг начинаются одни четверки. Целый ряд четверок. Они могут нести в себе любую информацию или же оказаться прихотью случайности. Знаки «пи» можно рассчитывать в течение всего времени существования Вселенной, но так и не обнаружить подряд сотни повторяющихся четверок.</p><p class="p1">— Так вы искали Послание вашим радиотелескопом…</p><p class="p1">— Да, в обоих случаях мы ждали, что среди шума появится сигнал, который нельзя будет объяснить причудами статистики.</p><p class="p1">— Но… будут не одни четверки… так ведь? Эти знаки что-то <em>скажут</em> нам?</p><p class="p1">— Конечно. Представьте себе, что какое-то время спустя мы принимаем длинную последовательность нулей и единиц. В ней, как и в Послании, может оказаться изображение. Понимаете — и изображение, и <em>все что угодно</em>.</p><p class="p1">— То есть вы хотите сказать, что можно обнаружить в числе «ни» картинку… ну, скажем, заповеди, записанные еврейскими буквами?</p><p class="p1">— Именно. Огромными черными буквами, вырезанными на камне.</p><p class="p1">Джосс вопросительно посмотрел на нее.</p><p class="p1">— Простите меня, Элинор, но мне кажется, что вы слишком… уклончивы. Я никогда не думал, что вы вступите в буддийский орден монахинь-молчальниц. Почему бы вам не рассказать все?</p><p class="p1">— Палмер, я бы все рассказала, будь у меня твердые доказательства. Но у меня их нет, и люди, подобные Китцу, утверждают, что я лгу или галлюцинирую. Поэтому мне пришлось передать вам эту рукопись. Вы ее запечатаете, проставите дату, заверите у нотариуса и положите в сейф. Если со мной что-нибудь случится, ее можно будет обнародовать. Я разрешаю вам делать с ней все что угодно.</p><p class="p1">— А если с вами ничего не случится?</p><p class="p1">— Если ничего не случиться? Тогда, если мы обнаружим доказательства, сама рукопись поможет подтвердить наши слова. Я пишу там о наличии в центре Галактики двойной черной дыры, о том, что Лебедь А имеет искусственное происхождение, о спрятанном в «пи» сообщении… — Она легонько прикоснулась к его груди. — Эти факты будут свидетельствовать в нашу пользу. Тогда я выступлю открыто… а пока — не потеряйте.</p><p class="p1">— Я все-таки не понимаю, — признался он. — Нам известно, что во Вселенной действуют математические законы… тяготения и прочие. Но здесь-то другое? Здесь порядок заложен внутри числа «пи»? Что же отсюда следует?</p><p class="p1">— Конечно, здесь дело другое. Разве вы еще не поняли? Ведь главное даже не то, что в основу Вселенной заложены точные математические закономерности, определяющие химические и физические процессы. Речь идет о <em>Послании</em>. Творец Вселенной посылает весть разумным существам, которые возникнут в ней через 15 миллиардов лет спустя. Помните, я ругала вас с Ренкином за то, что вы не понимали меня. Я говорила тогда: «Если Господь хочет дать нам знать о том, что Он существует, почему бы Ему не оставить для нас недвусмысленное свидетельство». Помните?</p><p class="p1">— Прекрасно помню. Значит, вы теперь решили, что Бог — математик.</p><p class="p1">— Ну что-то в этом роде. Если нас там не обманули. Если все это не вздор. И если Послание спрятано именно в «пи», а не в каком-нибудь другом из бесконечного множества трансцендентных чисел. Здесь очень много всяких «если».</p><p class="p1">— Словом, вы ищите откровение в арифметике. Могу порекомендовать вам более простой способ.</p><p class="p1">— Палмер, <em>другого</em> способа нет. Скептиков иначе не убедишь. Представьте себе, что мы кое-что обнаружим. Не обязательно невероятно сложное. Хотя бы просто статистически большую упорядоченность в десятичных знаках числа «пи». Этого достаточно. Тогда и математики всего мира смогут последовать нашему примеру. И никаких разделений на секты. Все читают одно и то же писание. Никто не может оспорить главного чуда под предлогом его фальсификации каким-нибудь фокусником или жуликом от истории или просто влиянием истерии, иллюзии, безотцовщины в период созревания. <em>Всякий</em> сможет уверовать.</p><p class="p1">— Элли, не следует быть уверенной, что вы обнаружите <em>это</em>. Вы можете укрыться здесь и считать себе до морковкина заговенья. Или выйти из уединения и поведать миру свою историю. Рано или поздно вам придется решиться на это.</p><p class="p1">— Надеюсь, Палмер, мне не придется выбирать. Будут физические свидетельства, последуют и публичные заявления. Иначе… Вы же понимаете, насколько уязвима наша позиция? Я думаю не о себе, но…</p><p class="p1">Он почти незаметно качнул головой. В уголках его рта играла улыбка. Забавная ситуация…</p><p class="p1">— Ну что вы так торопитесь предрекать мою судьбу? — спросила Элли.</p><p class="p1">Быть может, он счел вопрос риторическим и не ответил. Тогда она продолжила:</p><p class="p1">— Вы думаете сейчас, что мы с вами странным образом… поменялись местами. Да, я стою перед вами, носительница глубочайшего религиозного опыта, и не могу доказать ничего. Палмер, я даже не могу представить всей глубины случившегося с нами, а вы, закостенелый скептик, пытаетесь быть добрым к легковерной женщине, причем куда более удачно, чем когда-то я сама.</p><p class="p1">— Элинор, — проговорил он. — Ну какой я скептик. Я — верующий.</p><p class="p1">— Да? Но ведь в моей истории нет ни слова о Грехопадении, Воздаянии, о Пришествии и Судном дне тоже. И ничего об Иисусе. Одна из основных истин, открывшихся нам, в том и состоит, что в космосе людям отведена отнюдь не главная роль. Происшедшее со мной делает меня крошечной даже в собственных глазах.</p><p class="p1">— Конечно. Но Бог становится еще величественней.</p><p class="p1">Поглядев на него, она заспешила.</p><p class="p1">— Вы же знаете, что Земля обращается вокруг Солнца, но власти — и светские, и церковные — некогда полагали, что она покоится. Так они казались себе более величественными. Пытались казаться. Ведь правда заставляла их ощущать свою истинную величину. Правда всегда пугала владык, она подрывала основы их власти. Поэтому ее скрывали. Люди считали правду опасной. Представляете ли вы, чем чревата вера в мои слова?</p><p class="p1">— Элинор, я искал правду. И поверьте, в мои годы я распознаю ее с первого же взгляда. Любая вера, поклоняющаяся правде, стремящаяся к познанию Бога, нуждается и в мужестве, чтобы вместить Вселенную. <em>Истинную</em> Вселенную. Все эти световые годы. Бесчисленные миры. Я представляю себе масштаб вашей Вселенной, те возможности, которые она предоставляет своему Творцу, и у меня замирает дыхание. Эта картина куда величественнее одного маленького мирка. Мне всегда не нравилось, когда Землю изображали зеленым подножием престола Господня. Слишком спокойна такая Вселенная… Как детская сказка… как успокоительные пилюли. Но в вашей Вселенной найдутся и время, и <em>место</em> для Бога, в которого я верю. Я бы сказал, что доказательств, собственно, и не требуется. Их уже и так довольно. Лебедь А и все прочее — для вас, ученых. Вы считаете, что будет сложно убедить простых людей в том, что вы не обманываете… Ошибаетесь — это проще простого. Вы думаете, ваша история необычна и невероятна, но мне уже доводилось ее слышать. Вам, кстати, тоже.</p><p class="p1">Закрыв на мгновение глаза, он произнес нараспев:</p><p class="p1">«И увидел во сне: вот лестница стоит на земле, а верх ее касается неба; и вот ангелы Божьи восходят и нисходят по ней… Истинно Господь присутствует на месте сем; а я и не знал… Это не иначе, как дом Божий, это врата небесные».</p><p class="p1">Джосс казался слегка отстраненным, словно бы проповедовал в наполненном храме, а затем открыл глаза с легкой просящей улыбкой. Они шли по просторной улице; слева и справа высились выкрашенные в белую краску огромные радиотелескопы, напряженно вглядывающиеся в небо. Потом он проговорил уже более будничным тоном:</p><p class="p1">— Ваша история давно известна. Такое бывало и прежде. И в сердце своем вы уже знали об этом. Все, о чем вы говорили, не соответствует Книге Бытия. Конечно, нет. Как такое могло случиться? Книгу Бытия можно было понимать буквально во времена Иакова. А ваше свидетельство соответствует другим временам, теперешним. Люди поверят вам, Элинор. Миллионы людей. И по всему миру. Я знаю это…</p><p class="p1">Она покачала головой, а он после недолгого молчания продолжил:</p><p class="p1">— Хорошо. Понимаю. Возитесь сколько хотите. Но если есть способ поторопить события, сделайте это… ради меня. До наступления третьего тысячелетия осталось меньше одного года.</p><p class="p1">— И я понимаю. Потерпите еще несколько месяцев. Если к тому времени мы не сумеем что-нибудь разыскать в числе «пи», я подумаю о публичном выступлении. К первому января. Может быть, захотят выступить и Эда, и остальные. Хорошо?</p><p class="p1">Они молча приближались к зданию дирекции «Аргуса». Поливальные машины опрыскивали лужайку, и лужица под ногами казалась совсем неуместной на этой иссохшей земле.</p><p class="p1">— А вы когда-нибудь были замужем?</p><p class="p1">— Нет, никогда. Дела мешали, наверное.</p><p class="p1">— А любили? — деловито и прямо спросил он.</p><p class="p1">— Так, наполовину, с полдюжины раз. Но… — она отвела взгляд к ближайшему телескопу, — шума было много и сигнал было сложно выделить. А вы?</p><p class="p1">— Никогда, — ровным голосом ответил он и тут же добавил, улыбнувшись. — Но моя вера всегда со мной.</p><p class="p1">Элли решила оставить без внимания эту двусмысленность, и по короткой лестнице они поднялись к главному компьютеру «Аргуса».</p></span></span>
