<span><span id="id20"><div class="title3">
<p class="p">18. Сверхобъединение</p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v">Бурное море!</p>
<p class="v">И Млечный Путь</p>
<p class="v">Простерся над Садо.</p>
</div>
<p class="text-author">Мацуо Басе</p>
</div>
</div><p class="p1">Быть может, выбор Хоккайдо и был обусловлен его скверной репутацией. Здешний климат предъявлял к зданиям требования, весьма необычные по японским понятиям. Этот остров по-прежнему населяли айны, волосатые аборигены, к которым многие японцы и поныне относились свысока. Зимы здесь были ничуть не мягче, чем в Миннесоте или Вайоминге. Конечно, местоположение Хоккайдо в известной мере затрудняло поставки, но в случае… катастрофы остров находился на самом севере Японии, вдали от ее густонаселенных районов. Теперь, после завершения тоннеля длиной в 51 километр, соединившего этот остров с Хонсю, его уже нельзя было считать изолированным. Тоннель стал самым длинным подводным тоннелем в мире.</p><p class="p1">На Хоккайдо можно было без всякого риска испытывать отдельные агрегаты Машины. Однако к сборке Машины там поначалу отнеслись с сомнением. Дело было в том, что окружавшие сборочное предприятие горы несли на себе явный отпечаток недавнего вулканизма. Одна из них продолжала бурно расти — со скоростью один метр в сутки. Даже Советы выразили некоторую озабоченность — их Сахалин был всего лишь в 43 километрах, за мысом Соя или проливом Лаперуза. Правда, шума подняли немного, так сказать, на копеечку, не на рубль. Все прекрасно понимали: при соответствующем стечении обстоятельств Машина может разнести и всю Землю, даже если будет построена на обратной стороне Луны. Опасно уже просто приниматься за ее изготовление, а всякие там мелочи — <em>где</em> и <em>как</em> она расположена — можно не принимать во внимание.</p><p class="p1">К началу июля Машина снова начала обретать законченный вид. В Америке продолжению работ сильно мешало бурление политических и сектантских страстей, сооружению советской Машины препятствовали технические сложности. Но здесь — на заводе куда более скромных масштабов, чем в Вайоминге, — уже установили шпонки и целиком собрали весь додекаэдр. Правда, публичных заявлений об этом делать не стали. Древние пифагорейцы, открывшие додекаэдр, сведения об этой фигуре держали в строгом секрете, угрожая страшными карами болтуну. Так что для нашей планеты не было ничего необычного в том, что о существовании додекаэдра, пусть и величиной с дом, знали только немногие люди, хотя и происходило все это 2600 лет спустя и на другом краю света.</p><p class="p1">Руководитель японского проекта отправил всех сотрудников на несколько дней в отпуск. Обихиро, единственный более или менее крупный город неподалеку, располагался у слияния двух рек Юбецу и Токати. Одни отправились кататься на лыжах — по вечным снегам, покрывающим вершину горы Асахи, другие — строить каменные запруды и греться в теплых водах, подогреваемых энергией распада радиоактивных элементов, рожденных при взрыве какой-нибудь сверхновой за миллиарды лет до наших дней. Кое-кто решил посетить гонки в Бамба, там крепкие тяжеловозы тянули груженые санки по параллельным полосам непаханой земли. Но, чтобы как следует отдохнуть, вся пятерка решила отправиться геликоптером километров за 200 — в Саппоро, крупнейший город Хоккайдо.</p><p class="p1">По весьма многозначительному совпадению они попали как раз на праздник Танабата<a href="ch2.xhtml#id31" class="a">[45]</a>. Службы безопасности считали риск небольшим: успех обеспечивала Машина, а не эти пять человек. И в рациональном мире их будет несложно заменить другими, рассуждала Элли, правда, опять возникнут всякие политические трудности при выборе приемлемых для всех членов консорциума кандидатур.</p><p class="p1">У Си и ВГ оказалось много незавершенной работы, справиться с которой можно было только за сакэ. Так Элли, Деви Сукхавати и Абоннема Эда оказались на одной из боковых улочек возле бульвара Одори. Японские провожатые вели их мимо бумажных вымпелов и фонарей, мимо картин, изображавших листья, черепах, людоедов, молодых мужчин и женщин в средневековых костюмах; на натянутом поперек улицы куске парусины был намалеван ужасно похотливый павлин.</p><p class="p1">Элли поглядела на Эда в длинном, просторном, расшитом одеянии из полотна и высокой жесткой шапочке, потом на Сукхавати в очередном умопомрачительном шелковом сари и пришла в восхищение от подобного общества. Японская Машина уже успела удачно пройти все предписанные испытания, а выбранный экипаж не только представлял население планеты, пусть и не во всем его многообразии, но и состоял из личностей, скроенных отнюдь не по национальному шаблону каждой из пяти стран. Все они были по-своему бунтарями.</p><p class="p1">Вот, например, Эда. Великий физик, создал теорию суперобъединения — элегантного обобщения, включавшего в качестве частных случаев всю прочую физику — от тяготения и до кварков. Его теорию можно было сопоставить лишь с трудами Исаака Ньютона и Альберта Эйнштейна, и Эда с полным правом ставили в один ряд с обоими гигантами. Он родился в Нигерии, в мусульманской семье — случай достаточно обычный в этих краях, — принадлежавшей к неортодоксальной исламской секте Ахмадие<a href="ch2.xhtml#id29" class="a">[46]</a>, членами которой были суфии<a href="ch2.xhtml#id27" class="a">[47]</a>. А суфии, пояснил он всем после вечера, проведенного с настоятелем Уцуми, в исламе играют ту же роль, что дзэн среди буддистов. Последователи Ахмадие провозглашали «джихад пера, но не меча».</p><p class="p1">Спокойный, даже, пожалуй, кроткий, Эда был яростным противником обычного толкования джихада как священной войны и настаивал на интенсивном и свободном обмене идеями. В этом он противоречил консерваторам от ислама, и некоторые мусульманские нации возражали против его включения в экипаж. И не только они. Темнокожий нобелевский лауреат, умнейший из землян, не устраивал и тех, кто скрывал закоснелый расизм под цивилизованным обличьем. Когда четыре года назад Эда посетил Тайрона Фри в тюрьме, темнокожие американцы исполнились гордости, видя в нем идеал для своей молодежи. В расистах Эда пробуждал худшее, во всех других людях — самые лучшие чувства.</p><p class="p1">— Чтобы делать физику, нужно иметь время для работы. Это роскошь, — говорил он Элли. — Многие смогли бы заниматься ею, будь у них такая возможность. Но когда тебе ежедневно приходится добывать на улице пропитание, становится не до физики. И я обязан улучшить условия жизни молодых ученых в собственной стране.</p><p class="p1">В Нигерии он постепенно становился национальным героем. И теперь часто говорил о коррупции, о порочной системе распределения, о роли честности в науке и не только в ней, а еще о том, какой великой страной могла бы стать Нигерия. Сейчас ее население равно населению Соединенных Штатов в 20-е годы, уверял Эда. Нигерия богата разнообразным сырьем, многообразие культур подкрепляет ее силу. Если бы Нигерия смогла справиться с собственными проблемами, говорил он, то стала бы Уаяком для всего мира. Во всех прочих вопросах он был настроен миролюбиво, и в жизни стремился к уединению и тишине… Многие нигерийцы — мужчины, женщины, мусульмане, христиане, анимисты, молодые и не очень молодые — серьезно прислушивались к нему.</p><p class="p1">В Эда многое было достойно уважения, но скромность его просто потрясала. Он редко высказывал мнение, ограничиваясь лаконичными ответами на прямые вопросы. Глубина его мыслей обнаруживалась только в собственных трудах, не в разговорах — разве что после долгого знакомства. Когда весь мир спорил о Послании и Машине, о том, что случится, когда она начнет действовать, Эда ограничился маленьким комментарием: «В Мозамбике, как рассказывают, обезьяны не говорят потому, что знают: скажи только слово — и сразу явится человек и заставит тебя работать». Странно было видеть этого молчальника в столь говорливом экипаже. Как и многие, Элли с особенным вниманием относилась к каждому его слову. Свой ранний, не совсем удачный вариант теории суперобъединения Эда называл глупой ошибкой. Ему было за тридцать, Элли и Деви с глазу на глаз решили, что он просто неотразим. Элли знала, что он женат и счастлив в браке, его единственная жена вместе с детьми пребывала в Лагосе.</p><p class="p1">Праздник Танабата в Японии посвящен любви. Бамбуковая рощица, высаженная специально для подобных торжеств, была украшена, увешана, просто-напросто отягощена тысячами полосок цветной бумаги. Молодые люди, чаще всего девушки, навешивали на деревца все новые странные листья. Плакаты напоминали содержание мифа, рядом шел спектакль на временной сцене. Две звезды полюбили друг друга, но влюбленных разделил Млечный Путь. Только раз в год, на седьмой день седьмого месяца лунного календаря, любовники могли встретиться, правда, если ничто не предвещало дождя. Элли глядела в хрустальную синеву горного неба и желала им добра. Молодой человек, как утверждала легенда, был чем-то вроде тамошнего ковбоя, он стал звездой Альтаир — спектральный класс А7. Девушка была пряхой, и ее символизировала Вега. До включения Машины оставались считанные месяцы. Совпадение их поездки с праздником, посвященным Веге, казалось Элли далеко не случайным. Конечно, решила она, человек, знакомый со многими культурами, найдет в разных странах легенды едва ли не обо всех ярких звездах. Эта легенда родилась в Китае. Си познакомил с ней Элли еще несколько лет назад в Париже на первой конференции Всемирного консорциума «Послание».</p><p class="p1">В больших городах праздник Танабата уже отмирал понемногу. Официально оформленный брак переставал теперь быть нормой, и сочувствие к разлученным любовникам более не воспламеняло сердца. В Саппоро он еще пользовался популярностью — в связи со все еще бытовавшим неприятием браков между японцами и айнами. На острове подвизались своего рода частные детективы, за плату они уточняли родословную женихов и невест. Наличие в жилах крови айнов считалось вполне достаточным поводом для отказа. Памятуя о собственной судьбе, Деви разражалась едкими комментариями. Эда невозмутимо слушал, хотя, конечно, был знаком с историей небесной пары.</p><p class="p1">Празднование Танабата в городе Сендай на Хонсю в тот день было главным угощением, которое японское телевидение подносило людям, едва ли умевшим отличить Вегу от Альтаира. Элли подумала, будут ли веганцы вечно транслировать Послание на Землю? Поскольку работы велись и в Японии, телевизионные комментаторы во время праздничной передачи уделяли заметное внимание Машине. Но Пятерку, как их иногда называли, в студии не приглашали, вообще об их присутствии в Саппоро было известно немногим. Но Эда, Сукхавати и Элли везде узнавали, так что обратно по бульвару Обори они шли под разрозненные аплодисменты прохожих. Многие кланялись. Громкоговоритель возле музыкального магазинчика поливал улицу рок-н-роллом. Элли узнала песенку «Я от тебя не отлипну» темнокожей группы под названием «Белый шум». Под вечерним солнышком грелся старый барбос с покрасневшими глазами, слабо завилявший хвостом, когда Элли приблизилась.</p><p class="p1">Японские комментаторы толковали о Машиндо, пути Машины, полагая, что все люди в равной степени отвечают за будущее крохотной планеты. Подобные мысли начинали звучать в некоторых религиозных проповедях. Правоверные по-прежнему не признавали ни инопланетных знаний, ни Машины. Если воззрения человечества относительно его места во Вселенной имеют религиозное значение, думала Элли, значит, Землю потрясает теологическая революция. Машиндо уже успел оказать воздействие на европейских и американских хилиастов. Но что будет, если и Машина не заработает, и передача закончится? Даже если мы ошиблись при переводе и интерпретации Послания или в инженерных работах, даже если мы не сумеем ничего более узнать о веганцах, все-таки теперь нам известно, что мы не одни во Вселенной и чужаки много мудрее нас. На кое-то время понимание этого объединит планету, подумала Элли.</p><p class="p1">Она спросила Эда, случалось ли тому хоть однажды испытать чувство религиозного благоговения.</p><p class="p1">— Да, — отвечал он.</p><p class="p1">— И когда же? — его приходилось расшевеливать.</p><p class="p1">— Когда я впервые взял в руки труды Евклида и когда я в первый раз понял закон тяготения Ньютона, уравнения Максвелла и общую теорию относительности. И еще во время моей работы над суперобъединением. Мне посчастливилось — я испытал много религиозных откровений.</p><p class="p1">— Нет, — возразила Элли. — Вы знаете, что я имею в виду… что-нибудь не относящееся к науке.</p><p class="p1">— Никогда, — мгновенно отозвался он. — Никогда без науки…</p><p class="p1">Он кое-что рассказал ей о привычных от рождения верованиях. Эда вовсе не считал, что вера как-то ограничивает его, ведь она давала ему спокойствие. Он видел в ней огромную пользу. Секта образовалась относительно недавно, основал ее Мирза Гулам Ахмад в Пенджабе одновременно с Христианской наукой или Обществом свидетелей Иеговы. Деви слыхала, что Ахмадие продолжает привлекать к себе новых адептов. Но особенным успехом секта пользовалась в Западной Африке. Ее происхождение связывалось с эсхатологическими мотивами. Ахмад был объявлен махди<a href="ch2.xhtml#id25" class="a">[48]</a>, появление которого мусульмане ожидали в «конце света». Он объявил себя также явленным Христом, воплощением Кришны и буруз — воплощением Мухаммеда<a href="ch2.xhtml#id23" class="a">[49]</a>. Христианский хилиазм заразил и Ахмадие, и теперь правоверные также ожидали Второго пришествия. Наиболее подходящей датой Второго пришествия Мирзы Гулама Ахмада в качестве махди считалась столетняя годовщина его смерти — 2008 год. Мессианская лихорадка сотрясала земной шар и вовсе не собиралась утихать… Элли выразила свои сожаления относительно неистребимых иррациональных наклонностей рода человеческого.</p><p class="p1">— Ну зачем такое уныние на празднике любви, — заметила Деви.</p><p class="p1">В Саппоро прошел снегопад, и все вдруг вспомнили местный обычай возводить из снега и льда фигуры людей и мифологических персонажей — старательно вылепили и выточили огромный додекаэдр, ставший чуть ли не символом вечерних новостей. Во время короткой не по времени года оттепели скульпторы энергично возмещали ущерб.</p><p class="p1">Вновь послышались опасения: не вызовет ли Машина тем или иным способом апокалипсическую катастрофу? Представители проекта «Машина», сохраняя невозмутимость, успокаивали народы, давали гарантии правительствам, но дату включения держали в тайне. Кое-кто из ученых предлагал 17 ноября — в этот день ожидался самый грандиозный звездный дождь столетия. Подходящий символ, заявляли они. Валериан возражал: если Машина поднимется над Землей, ей придется лететь сквозь облако остатков кометы, подвергаясь ненужной и излишней опасности. Поэтому включение отложили на несколько недель, на последние дни последнего месяца последнего из 1900-х годов. И хотя новый год еще не начинал следующего тысячелетия, намечены были пышные торжества — для тех, кто не слишком интересовался условностями календаря или же просто собирался отпраздновать третье тысячелетие дважды.</p><p class="p1">Хотя внеземляне и представления не имели о том, сколько будет весить каждый член экипажа, они с высочайшей точностью задали массу каждого агрегата и общую допустимую массу. На оборудование земного происхождения места в додекаэдре почти не оставалось. Несколько лет назад этот факт использовали в качестве аргумента в пользу экипажа, состоящего из одних женщин: тогда для приборов нашлось бы больше места; впрочем, всю эту идею сочли легкомысленной.</p><p class="p1">Места для скафандров не было. Оставалось только надеяться, что веганцы сумели заметить, что земляне просто не могут не дышать. Экипаж не имел возможности использовать какие бы то ни было приборы, никто не знал назначения Машины. Учитывая вероятные культурные различия, было понятно, что экипаж идет на огромный риск. Пресса всего мира широко обсуждала этот вопрос — сами же члены Пятерки никогда не разговаривали на эту тему.</p><p class="p1">Представители консорциума настаивали, чтобы экипаж взял с собой миниатюрные приборы: камеру, спектрометр, суперкомпьютер на сверхпроводящих элементах. Это было разумно и неразумно одновременно. В Машине негде было спать, готовить пищу, не было туалета. Приходилось брать с собой какой-то минимум пищи — то, что уместилось бы в карманах. Деви должна была прихватить примитивную аптечку. Сама же Элли намеревалась взять только зубную щетку и смену белья. Если они сумеют доставить меня на Вегу в этом кресле, думала она, значит, смогут обеспечить и всем необходимым. Если мне потребуется камера, заявила она чиновникам, я попрошу ее у веганцев.</p><p class="p1">Высказывалось мнение, кстати, достаточно обоснованное, что Пятерке следует отправляться в обнаженном виде, ведь про одежду в Послании не упоминали. Что, если одежда отрицательно скажется на функционировании Машины? Элли и Деви сперва позабавились, а потом отметили, что в Послании не содержится и <em>никаких запретов</em> на одежду, хотя этот людской обычай был уже очевиден из полученной внеземлянами передачи с открытия Олимпиады в Мюнхене. Веганцы знают, что мы ходим одетыми, согласились с ними Си и ВГ. Они ограничили только общую массу. Что, пломбы тоже вынимать будем, интересовались они, а может, и очки еще оставим? Их точка зрения победила главным образом потому, что многие нации вовсе не стремились увенчать славное предприятие столетия малопристойным зрелищем. Впрочем, дебаты попросту развлекали публику и инженеров, а также членов Пятерки.</p><p class="p1">— Кстати, — заметил Луначарский, — нигде не сказано, что лететь должны именно люди. Может быть, если мы отправим пятерых шимпанзе, веганцы останутся тоже довольны.</p><p class="p1">Элли настойчиво убеждали, что даже простой фотографии любой инопланетной машины не будет цены. Тем более снимкам самих внеземлян. Быть может, она все-таки передумает и прихватит камеру? Дер Хиир, пребывавший теперь на Хоккайдо в составе крупной американской делегации, велел ей вести себя серьезно. Ставка чересчур высока, настаивал он, чтобы… Но Элли оборвала его столь испепеляющим взглядом, что своей мысли он уже не закончил. Она прекрасно знала, что он собирался сказать «чтобы вести себя по-детски». Просто на удивление дер Хиир вел себя так, будто именно его доля и была самой тяжелой… Элли все пересказала Деви, но та не выразила особого сочувствия. Дер Хиир, заявила она, просто душка. Кончилось тем, что Элли согласилась взять сверхминиатюрную видеокамеру.</p><p class="p1">В перечень пожитков в разделе «личные вещи» она занесла: «ветвь пальмовая, вес 0,811 кг».</p><p class="p1">Вразумить ее опять послали дер Хиира:</p><p class="p1">— Ты же знаешь, у нас есть изумительная инфракрасная видеосистема, всего в две трети килограмма. Зачем тебе ветка с какого-то дерева?</p><p class="p1">— Это ветвь пальмы. Пальмы. Я знаю, ты вырос в Нью-Йорке, но все-таки должен иметь об этом представление. Помнишь в «Айвенго»? Или ты не читал этот роман в средней школе? Во времена крестоносцев пилигримы, побывавшие в Святой земле, прихватывали с собой в виде доказательства пальмовую ветвь. Просто талисман. Мне все равно, <em>насколько</em> они там опередили нас. Для меня <em>наша</em> планета — Святая земля. И я несу им эту ветвь, чтобы они поняли, откуда я родом.</p><p class="p1">Дер Хиир только качал головой. Потом она объяснила свои соображения ВГ, и тот выразил понимание.</p><p class="p1">Элли помнила тревоги ВГ, помнила, что он творил ей в Париже о барских дрожках, заехавших в бедную деревеньку. Волновало ее не это. Она поняла — пальмовая ветвь нужна ей, чтобы не забыть о Земле. Элли боялась, что ей не захочется возвращаться.</p><p class="p1">За день до включения Машины она с курьером получила крохотную посылку из ее квартиры в Вайоминге. Ни обратного адреса, ни записки, ни подписи. В посылке оказался золотой медальон на длинной цепочке. Его можно было раскачивать, словно маятник. На обеих сторонах были выгравированы надписи, мелкий шрифт хорошо читался. На одной стороне было:</p><div class="poem">
<div class="stanza">
<p class="v">Гере, королеве</p>
<p class="v">В одеяниях парчовых.</p>
<p class="v">Госпоже «Аргуса»,</p>
<p class="v">Тысячам глаз которого</p>
<p class="v">Открыт целый мир.</p>
</div>
</div><p class="p1">Другая гласила:</p><p class="p1">Так ответили защитники Спарты командующему римской армией: «Если ты бог, не обидишь тех, кто никогда не причинял тебе вреда. Если же человек, приди — и встретишь равных себе мужей». И жен.</p><p class="p1">Элли знала, кто послал медальон.</p><p class="p1">На завтра было назначено включение, и весь старший персонал волновал один вопрос: что будет? Большинство склонялось к тому, что ничего не случится, и Машина просто не сработает. Меньшая часть опрошенных полагала, что Пятерка неизвестным способом очень быстро перенесется в систему Веги, нарушая все каноны теории относительности. Остальные утверждали, что Машина либо предназначена для исследования Солнечной системы, либо в ней нашел воплощение самый дорогостоящий розыгрыш в истории человечества, или же это классная комната, машина времени, просто будка галактического телефона. Один из ученых написал: «Вместо Пятерки в креслах медленно материализуются пятеро невероятно уродливых зеленокожих посланцев, чешуйчатых и зубастых». Среди всех вариантов лишь этот в какой-то мере возвращался к идее троянского коня. Одна записка гласила: «Машина Судного дня».</p><p class="p1">Состоялась небольшая торжественная церемония. Произносились речи, подавали выпивку и угощения. Люди обнимались. Иные тихо плакали. Только немногие были настроены скептически. Общее мнение было таково: если в день включения что-то и произойдет — событие разразится, как гроза с громом и молнией. Многие лица казались счастливыми.</p><p class="p1">Элли дозвонилась до приюта для престарелых и попрощалась с матерью. Она говорила в микрофон на Хоккайдо, ее слова звучали в Висконсине. Но ответа не было. Сиделка сказала, что у матери восстанавливаются кое-какие двигательные функции. Скоро она сумеет уже произносить слова. Простившись таким образом с матерью, Элли почувствовала облегчение.</p><p class="p1">Японские инженеры были в хакимаки, повязках вокруг головы, традиционно предназначавшихся при подготовке к умственным, физическим и духовным усилиям, в особенности к битвам. На повязках был символ — очертания всех континентов Земли. Никакого предпочтения нациям, никаких прочувствованных национальных напутствий. Никто не собирался размахивать собственным флагом. Главы государств прислали короткие напутствия на видеолентах. Особенно выразительным оказалось напутственное слово президента.</p><p class="p1">— Я не наставляю вас и не прощаюсь. Просто — пока. Каждый из вас представляет целый миллиард жителей планеты Земля. Если вас отправят куда-то, глядите внимательно… глядите за всех людей… Нас интересуют не только научные достижения — все, чему можно поучиться. Вы представляете человечество — нынешнее, ушедшее и будущее. Что бы ни случилось, каждому из вас уже отведено место в истории. Вы — герои нашей планеты. Вы будете говорить от лица всего человечества. Будьте мудрыми. И… возвращайтесь.</p><p class="p1">Через несколько часов они впервые вошли в Машину — по одному через небольшой люк. Медленно засветились утопленные лампы. После завершения сборки, когда все предусмотренные испытания были закончены, возникло беспокойство, чтобы Пятерка не оказалась на своих местах преждевременно. Некоторые техники опасались, что Машина включится сразу же, едва все рассядутся, даже если еще не будут раскручены бензеля. И вот они оказались внутри, но ничего неожиданного пока не произошло. Впервые Элли осторожно привалилась спиной к гладкой пластиковой спинке. Где чехлы из сатина, подумала Элли, они оказались бы вполне на месте. Впрочем, в подобных мыслях она усмотрела некий шовинизм, известную национальную гордыню. Пластик — материал более современный, научный и серьезный.</p><p class="p1">Зная склонность ВГ к курению, ему указали, что на борту не должно быть и полсигареты. Услышав запрет, Луначарский разразился проклятиями — на десяти языках. Прикончив на прощание «Лаки страйк», он последним поднялся на борт. ВГ чуть пыхтел, опускаясь в соседнее кресло. Привязные ремни проектом не были предусмотрены, но некоторые из инженеров уверяли, что дополнить ими конструкцию все же следовало.</p><p class="p1">Куда-то нас <em>отправит</em> Машина, думала Элли. Карета подана… едем… куда и когда? Поезд уже стучит по рельсам и свистит гудком, приближаясь к станции… Еще немного, и он увезет тебя из захолустного городка твоей молодости в небесные хрустальные города. Бегство… открытие… конец одиночества? Что, если мы все-таки напутали, с отчаянием подумала она. Не славы ожидала Элли… ну не совсем, конечно… не столько славы, сколько освобождения.</p><p class="p1">Она ожидала чудес. Словно дикий горец, застывший с отвисшей челюстью перед истинными воротами Иштар в древнем Вавилоне; словно Дороти перед шпилями и куполами Изумрудного города в сердце Страны Оз; как мальчишка из мрачных бруклинских закоулков в Коридоре наций на Всемирной ярмарке 1939 года; словно Покахонтас<a href="ch2.xhtml#id20" class="a">[50]</a>, с парусного судна вглядывающаяся в Лондон, раскинувшийся по берегам Темзы.</p><p class="p1">Сердце ее пело от ожидания. Теперь она узнает пределы возможного, узнает, на что способен разум, пусть это разум существ иного мира, странствовавших среди звезд, когда предки людей еще качались на ветвях в приятном мраке тропического леса.</p><p class="p1">Драмлин, подобно многим знакомым, звал ее неисправимым романтиком, и Элли вновь подумалось, почему так много людей считают это предосудительным. В романтике она черпала силы и радость. Но теперь она, адепт и поклонник, должна предстать перед высшим Магом.</p><p class="p1">По радиосвязи доложили о положении дел. Все было в порядке, во всяком случае об этом свидетельствовала целая батарея приборов, размещенных вокруг Машины. Приходилось ждать, пока между бензелями окажется достаточный вакуум. Вакуумные насосы небывалой на Земле эффективности создавали там еще неизведанное разрежение. Элли нащупала рукой микровидеокамеру, погладила пальмовую ветвь. Внутри додекаэдра вспыхнул яркий свет. Две из сферических оболочек уже раскрутились до заданной Посланием критической скорости. Снаружи очертания Машины уже казались размытыми. Вот-вот достигнет нужной скорости и третий бензель. Накапливался электрический заряд. Когда все три оболочки раскрутятся до предела, Машина включится — так говорило Послание.</p><p class="p1">На лице Си была написана суровая решимость, Луначарский казался невозмутимым, Деви широко открыла глаза, лицо Эда отражало лишь спокойное внимание. Заметив взгляд Элли, Деви улыбнулась.</p><p class="p1">Элли пожалела, что у нее нет ребенка. Такова была ее последняя мысль. Потом стены замерцали и стали прозрачными, а Земля словно разверзлась и поглотила ее.</p></span></span>
