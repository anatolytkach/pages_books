<span id="id11"><div class="title2">
<p class="p">ЧАСТЬ ВТОРАЯ</p>
<p class="p">«МАШИНА»</p>
</div><div class="epigraph">
<p class="p1">Всемогущий лектор, использовав научные принципы в структуре Вселенной, пригласил человека изучать ее и подражать Ему. Он словно приказал обитателям этого шара, который мы называем своим: «Я сотворил Землю для человека, чтобы он жил на ней. Я явил ему звездные небеса, чтобы он постигал науку и искусство. И теперь он может позаботиться о себе и на примере моей неограниченной щедрости ко всем стать добрым по отношению к другим».</p>
<p class="text-author">Томас Пейн. «Век разума»</p>
</div></span>
