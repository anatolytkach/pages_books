<p class="p">16. Озонские мудрецы</p>
</div><div class="epigraph">
<p class="p1">Бог, которого признает наука, должен быть Владыкой всеобщих законов — и только. Такой Бог занят общими делами, а не мелкими подробностями. Ему некогда приспосабливаться к отдельным личностям.</p>
<p class="text-author">Уильям Джеймс. «Разнообразие религиозного опыта» (1902)</p>
</div><p class="p1">С высоты в несколько сотен километров Земля заполняет полнеба, и синева, протянувшаяся от филиппинского острова Минданао до Бомбея, которую нетрудно охватить одним взглядом, может разорвать сердце своей красотой. Дом, думаешь ты. Дом. Вот мой мир. Я родом отсюда. И все, что я видела и слышала, родилось там, под этой безжалостной и роскошной синевой.</p><p class="p1">И ты мчишься на восток к убегающему горизонту от зари до зари, облетая планету за полтора часа. А потом уже начинаешь различать подробности на ее поверхности. Невооруженным глазом можно столько увидеть. Вот-вот внизу вновь появится Флорида. Успел ли тот тропический ураган, что бушевал на просторах Карибского моря, добраться до Форт-Лодердейла? Интересно, хоть одна вершина в Гиндукуше освободилась этим летом от снега? И потом ты восхищаешься аквамаринами рифов в Коралловом море. Или глядишь на ледяную шапку Западной Антарктиды и думаешь: неужели, если она растает, потоп и в самом деле погубит все прибрежные города планеты?</p><p class="p1">Впрочем, днем отсюда трудно заметить следы человеческой деятельности. Но в ночное время, за исключением полярных сияний, все, что мигает, моргает и светится на Земле, — дело рук человека. Вот залитая светом Северная Америка, световое пятно протянулось от Бостона до Вашингтона, образуя на деле, не по названию, огромный мегаполис. Вот факелы природного газа над ливийской пустыней. Ясные огоньки флотилии японских ловцов креветок в Южно-Китайском море. На каждом витке Земля открывает перед тобой новую повесть. И ты видишь столб дыма над одним из Камчатских вулканов, унесенное бурей с просторов Сахары песчаное облако возле берегов Бразилии, не ко времени охватившие Новую Зеландию холода. И вся Земля предстает перед тобой живым и единым телом. И о ней хочется беспокоиться, ухаживать за ней… делать ей только добро. Границы между странами невидимы — словно параллели и меридианы, как тропики Рака и Козерога. Но границы эти произвольны. А реальна — планета.</p><p class="p1">Потому-то космические полеты и подрывают устои. Все побывавшие на орбите счастливцы после недолгих раздумий приходят к одинаковым мыслям. Государства создавали космические аппараты ради своего престижа, так что есть некая ирония судьбы в том, что вступившему в космос Земля кажется единым миром.</p><p class="p1">Нетрудно представить то время, когда человек будет провозглашать верность этому хрупкому голубому миру, может быть, даже всей россыпи миров, кружащих вокруг той желтой карликовой звезды, которую люди, еще не подозревая, что каждая звезда — это солнце, именовали Солнцем с большой буквы. И только теперь, когда в космосе побывало столько людей, когда длительное пребывание на орбите оставило им время и на размышления, стало проступать это грядущее планетное единство. Так уж вышло — многие из тех, кто кружил над планетой по невысоким орбитам, оказались влиятельными людьми.</p><p class="p1">Первыми, еще до людей, здесь побывали животные. Космос успел привыкнуть к амебам, плодовым мушкам, крысам, собакам, человекообразным обезьянам. Полеты становились более длительными и давали неожиданные результаты. Впрочем, плодовые мушки и всякие микроорганизмы были тут ни при чем. Как оказалось, нулевая гравитация увеличивала продолжительность жизни млекопитающих на 10–20 %. Причина этого в том, что в условиях невесомости на тело не действуют силы тяготения и окисление в клетках идет не так быстро, как на Земле, а значит, человек живет дольше. Врачи утверждали, что эффект будет сильнее проявляться на людях, чем на крысах. В воздухе запахло бессмертием.</p><p class="p1">Вероятность заболевания раком на орбите оказалась на 80 % ниже, чем в контрольной группе животных, оставшихся на Земле. Вероятность лейкемии и лимфатических карцином снизилась на 90 %. Некоторые признаки, пусть и без достаточной статистической аргументации, указывали, что скорость спонтанной ремиссии новообразований в невесомости значительно увеличивается. Полвека назад германский химик Отто Варбург высказал мнение, что окислительные процессы в клетках порождают многие случаи рака, и низкое потребление клетками кислорода в условиях невесомости стало сулить многообещающие перспективы. Люди, которые десятилетия назад предприняли бы паломничество в Мексику за летрилом<a href="ch2.xhtml#id42" class="a">[40]</a>, теперь требовали билет в космос. Цены оставались чудовищными, а потому профилактика и лечение в космосе были доступны немногим.</p><p class="p1">И вдруг началось. В постройку орбитальных станций медицинского назначения стали вкладываться неслыханные до сих пор суммы. К концу второго тысячелетия в космосе в нескольких сотнях километров над поверхностью Земли появились первые лечебницы для пенсионеров. Кроме дороговизны у орбитальных приютов нашлись и другие недостатки: люди с прогрессирующими остеологическими и сосудистыми заболеваниями не могли вернуться на поверхность Земли. Впрочем, для богатых старцев это не было помехой. В расчете на лишние десять лет жизни они охотно отправлялись на покой в небеса… чтобы умереть там.</p><p class="p1">Некоторые считали подобные приюты чистым мотовством, ведь богатства планеты далеко не безграничны: у бедняков еще слишком много насущных потребностей, чтобы богатые и могущественные могли позволить себе беситься с жиру. Это просто глупость, заявляли они, так когда-нибудь вся элита эмигрирует в космос, а массы останутся на Земле… планета лишится своих землевладельцев. Другие видели в этом знаменье: класс собственников наконец собирает пожитки… там, наверху, им не удастся причинить столько вреда.</p><p class="p1">Едва ли можно было предвидеть главный эффект: судьбы планеты перешли в руки тех, кто способен творить добро. Через несколько лет на орбитах вокруг Земли почти не стало националистов. Глобальная ядерная конфронтация не сулила хорошего тем, кто претендовал на бессмертие.</p><p class="p1">Среди них были японские промышленники, крупные греческие судовладельцы, саудовские принцы, один экс-президент, бывший Генеральный секретарь, китайский каучуковый барон и короли героина. На Западе, кроме некоторых государственных деятелей, правом пребывать на орбите обладал всякий, кто мог заплатить. В Советском космическом приюте подход был иным, он именовался космической станцией, и бывший Генеральный секретарь пребывал там на «геронтологическом обследовании». Но в целом массы не горевали. Однажды, верили все, придет и наш черед.</p><p class="p1">Люди на орбите становились внимательными, осторожными и спокойными. Их семьи и слуги тоже. К отдыхавшим наверху внимательно приглядывались могущественные и богатые люди, пока еще остававшиеся на Земле. Публичных заявлений не делали, но повсюду на планете все стали мыслить почти к одинаково. Почтенные старцы из космоса поощряли дальнейшее сокращение ядерных вооружений всех пяти обладающих атомным оружием держав. Поощряли и сооружение Машины — в ней видели залог грядущего единства мира. Время от времени националисты разражались в печати негодованием по поводу некоего заговора, охватившего из космоса Землю, — о том, как эти слабоумные добряки торгуют отечествами. По рукам ходили памфлеты, объявлявшиеся стенографическими записями совещания на борту «Мафусаила» с участием представителей частных орбитальных станций, съехавшихся ради общего дела. Перечень намеченных действий способен был вселить ужас в любое осененное патриотизмом сердце. По мнению «Таймс уик», памфлеты были подложными, она окрестила их «Протоколами озонских мудрецов».</p><p class="p1">Перед полетом Элли попыталась проводить некоторое время, обычно самые первые утренние часы, на Кокосовом пляже. Она приносила с собой хлеб и бросала его чайкам. Птицы подхватывали куски на лету с легкостью профессионала высшей бейсбольной лиги. Случалось, что двадцать или тридцать чаек зависали в воздухе в одном-двух метрах над ее головой. Раскрыв клювы, они трепетали крыльями, ожидая чудодейственного появления пищи. То одна, то другая, явно случайным образом, время от времени срывалась вперед, но облачко птиц тем не менее казалось застывшим на месте. Возвращаясь, на самом краю песка Элли заметила небольшую и совершенную в своей простоте пальмовую ветвь. Она подняла ее и принесла домой, тщательно смахнув по дороге песок.</p><p class="p1">Хадден пригласил ее в свой уединенный дом, расположенный вдали от прочих домов, в свой космический замок. Он дал ему имя «Мафусаил». О приглашении знали только члены правительства. Хадден стремился избежать внимания публики. И в самом деле, пока еще мало кому было известно, что теперь он живет в космосе и удалился на покой на небеса. Члены правительства дружно советовали ей согласиться. Дер Хиир просто сказал:</p><p class="p1">— Перемена обстановки пойдет тебе на пользу.</p><p class="p1">Президент явно одобряла этот визит, поскольку на следующем же шаттле, стареющем МТКК «Интрепид», немедленно обнаружилось свободное место. Постояльцев и гостей в орбитальные дома отдыха доставляли коммерческие аппараты. Проходила последние испытания новая одноразовая ракета-носитель, но флот стареющих шаттлов по-прежнему вытягивал всю правительственную космическую программу США, военную и коммерческую.</p><p class="p1">— А мы только счищаем после посадки сгоревшие плитки и потом клеим новые, — объяснял ей один из пилотов-астронавтов.</p><p class="p1">Лететь мог любой практически здоровый человек, специальных требований не было предусмотрено. В коммерческих рейсах набивался полный аппарат пассажиров, обратно машины возвращались пустыми. Шаттлы же, напротив, и взлетали, и садились полными. Перед своей последней посадкой на прошлой неделе «Интрепид» состыковался с «Мафусаилом», чтобы вернуть на Землю двух пассажиров. Имена их были знакомы Элли: один — ракетчик, специалист по двигателям, другой — криобиолог. Что они делали на «Мафусаиле»?</p><p class="p1">— Вот увидите, — сулил ей пилот, — такое ощущение, будто с бревна свалился… многим даже нравится, редко кому неприятно.</p><p class="p1">И она увидела. Совместно с пилотами, двумя бортинженерами, строгим военным и чиновником Налоговой службы она бестрепетно перенесла безукоризненный взлет и почувствовала приятное возбуждение от впервые испытанной невесомости — куда более заметной, чем при спуске в скоростном лифте Всемирного торгового центра в Нью-Йорке. Через полтора витка они состыковались с «Мафусаилом». А уже через два дня коммерческий транспортный корабль «Нарния» доставит Элли обратно на Землю.</p><p class="p1">Замок — Хадден настаивал на этом — медленно вращался, совершая один оборот примерно за девяносто минут, поэтому одним концом он всегда был обращен к Земле. И в кабинете Хаддена открывалась великолепная панорама: вся планета была видна не на телевизионном экране, а через обычное, прозрачное окно. Фотоны, попадавшие ей в глаза, снега Анд отразили какие-то доли секунды назад. Оптических искажений почти не было, разве что у самого края окна, где более толстый слой полимера изменял траекторию световых лучей.</p><p class="p1">Элли знала многих людей, в том числе и считавших себя религиозными, стеснявшихся обнаруживать благоговение. Но нужно быть деревяшкой, думала она, чтобы стоять перед этим великолепием и не почувствовать ничего. Сюда следует посылать молодых поэтов, композиторов и художников, людей, исполненных истинной веры, не погрязших в сектантстве. Это зрелище понятно любому обитателю Земли. Какая жалость, что никто еще не пытался этого сделать. Она ощущала… трепет.</p><p class="p1">— К этому привыкаешь, — пояснил Хадден, — но пресытиться невозможно. Даже вдохновляет время от времени.</p><p class="p1">Сам он умеренно посасывал диет-колу. От напитков покрепче отказалась. Какие же здесь на орбите наценки на спиртное? — подумала она.</p><p class="p1">— Конечно, кое-чего не хватает: долгих прогулок, купания в океане, старых друзей, с которыми так и не попрощался. Впрочем, на все это у меня никогда не хватало времени. А друзья, как видите, могут и навестить.</p><p class="p1">— Но какие расходы, — отвечала Элли.</p><p class="p1">— К моему соседу, Ямагиси-сан, наведывается женщина. Каждый второй вторник каждого месяца независимо от погоды: будь то снег или дождь. Кстати, я вас познакомлю с ним. Вот это личность. Военный преступник первой категории — правда, дело ограничилось только обвинениями.</p><p class="p1">— Что же вас всех сюда тянет? — удивилась Элли. — Мир не кончается, это все знают. Что вы здесь делаете?</p><p class="p1">— Наслаждаюсь видами. Кроме того, здесь законодательство предоставляет известные преимущества.</p><p class="p1">Она вопросительно посмотрела на Хаддена.</p><p class="p1">— Понимаете, человек моего уровня — все эти новые изобретения и заводы — всегда балансирует на грани закона. Так обычно бывает потому, что законы еще не сумели подстроиться под новую технику. И приходится столько времени тратить на тяжбы. Снижается производительность. Но это, — широким жестом он указал на замок и Землю, — не принадлежит ни одной стране. Лишь мне, моему другу Ямагиси и еще нескольким людям. Доставка продуктов и всех необходимых материалов производится абсолютно легальным путем. Для надежности замок снабжен экологическими системами замкнутого цикла. Между замком и всеми странами внизу нет никакого соглашения о выдаче. Так что здесь все мои действия дают больший эффект. Только не думайте, что мы занимаемся чем-нибудь нелегальным. Мы просто затеваем много нового, поэтому разумнее обитать в безопасности. Ведь находятся, например, и такие, кто считает, что Машину подорвали по моему приказу. И это притом, что я столько денег затратил на ее изготовление. Вы знаете, как они обошлись с Вавилоном. Мои страховые агенты считают, что в Вавилоне и Терре-Хоте могли орудовать одни и те же люди. Похоже, у меня немало врагов. И я не понимаю почему. Мне казалось, что я делал добро людям. Стало быть, мне лучше крутиться здесь, наверху. Я хотел переговорить с вами о Машине. Ужасно, конечно… вся эта драма в Вайоминге и эта дурацкая шпонка. Мне и в самом деле жаль Драмлина. Крепкий был старый хрыч. Но для вас… это серьезный удар. Вы уверены, что не хотите выпить?</p><p class="p1">Но она предпочитала глядеть на Землю и слушать.</p><p class="p1">— <em>Меня-то</em> это не смущает, — продолжал он, — и вас тоже не должно беспокоить. Может, вы волнуетесь, что американской Машины не будет, поскольку слишком многие хотят, чтобы ее не было? Это беспокоит и президента. Заводы, которые мы понастроили, — не сборочные конвейеры, они выпускают и обычные товары. Чтобы заменить все поломанные части, потребуются новые расходы. По-моему, вы считаете, что мы допустили просчет. Поторопились. Следовало внимательнее и вдумчивее отнестись ко всему. Может быть, лично вы и считаете иначе, но президент настроена именно так. Но если мы не будем торопиться, тогда, боюсь. Машину нам уже никогда не построить. И еще. Трудно надеяться, что приглашенных будут ждать до бесконечности.</p><p class="p1">— Забавно, именно об этом Валериан, Драмлин и я разговаривали перед взрывом! Диверсией, — поправила Элли себя. — Пожалуйста, продолжайте.</p><p class="p1">— Видите ли, верующие люди в большинстве своем видят в нашей планете эксперимент. К этому можно свести все верования. Какой-нибудь бог вечно все устраивает и во все сует нос, водится с женами ремесленников, открывает скрижали на горах, велит приносить ему в жертву детей, разрешает людям говорить одно и запрещает даже упоминать про другое, мешает радоваться и наслаждаться собой. Почему боги не оставят нас в покое? Ведь все их вмешательство просто свидетельствует о некомпетентности. Если бы Бог не хотел, чтобы жена Лота обернулась, почему Он не сотворил ее послушной, покорной мужу? Сотвори Он Лота не таким пустоголовым, быть может, она куда внимательнее прислушивалась к каждому его слову. Если Бог всемогущ и всеведущ, почему Он не сделал так, чтобы все было как надо? Почему Он все постоянно чинит, исправляет да еще жалуется? Нет-нет, из Библии ясно одно — библейский Бог был скверным умельцем, негодным проектировщиком и технологом. Он бы не выдержал конкуренции, если бы таковая была. Поэтому я и не верю в эксперимент с Землей. Во Вселенной должна быть целая куча экспериментальных планет, где боги-практиканты шлифуют свое мастерство. И какой позор, что Ренкин и Джосс родились не там. На <em>этой</em> планете, — Хадден шагнул в сторону окна, — не видно следов какого-либо вмешательства извне даже в малом. Боги не следят за нами, не велят переделать халтурную работу. Взгляните на всю историю человечества, и станет понятно, что мы были предоставлены сами себе.</p><p class="p1">— Да, до сих пор, — отвечала она. — Кстати, а ведь Deus ex machina?<a href="ch2.xhtml#id40" class="a">[41]</a> Вам не кажется? Вы думаете, боги сжалились наконец и послали нам эту Машину?</p><p class="p1">— Ну скорее наоборот, Machina ex deo, так будет правильно на латыни? Нет, мы не эксперимент. Мы следим за этой планетой, которая не представляла ни для кого интереса, сюда никто даже не сунулся. Эталон, кишащий людьми. Смотрите, что с вами будет, если мы не будем опекать вас. «Не будете стараться, получится что-то вроде Земли», — говорят им. Но, конечно, жаль терять из виду целый мир. Быть может, прихватывают с собой божков-неудачников. И заглядывают сюда изредка, по пути. Последний раз видели нас резвящимися в саваннах рядом с антилопами. «Вот здорово, — говорят они. — Ну просто никаких забот с ними. Заглянем-ка еще через десять миллионов лет. Но для безопасности последим за ними на радиочастотах». И вот наконец тревога! Вести с Земли. Что? У них уже телевидение? Посмотрим. Олимпийский стадион. Национальные флаги. Хищная птица. Адольф Гитлер. Ревущие толпы. «Ого-го», — говорят они. Ведь все признаки тревоги им известны. И живо телеграфируют: «Кончайте возню, ребята. У вас же такая планета. Правда, в некотором беспорядке, но вполне еще годная. Ну-ка, стройте Машину». Они заботятся о нас, они-то видят, что мы движемся по нисходящей. И думают, что мы просто изнемогаем от желания поправить дела. Я и сам так считаю. Мы не можем не строить Машину.</p><p class="p1">Элли знала, какого мнения был Драмлин о подобных аргументах. Хотя мысли Хаддена во многом совпадали с ее собственными, она уже успела устать от постоянных резких и безапелляционных споров о намерениях веганцев. Она хотела, чтобы работы продолжались, чтобы Машину собрали, включили, чтобы начался новый этап в истории человечества. Она по-прежнему не доверяла себе и держалась с осторожностью, даже когда ее называли возможным членом экипажа. Задержка работ помогла: за это время она сумела справиться со всеми внутренними проблемами.</p><p class="p1">— Мы пообедаем с Ямагиси. Он вам понравится. Но мы опасаемся за него. По ночам он слишком снижает у себя парциальное давление кислорода.</p><p class="p1">— Что вы имеете в виду?</p><p class="p1">— Чем ниже содержание кислорода в воздухе, тем дольше будешь жить. По крайней мере так нам говорят доктора. И поэтому все мы следим за содержанием кислорода в своих каютах. Днем меньше 20 % не сделаешь, начинает кружиться голова. Плохо функционирует мозг. Но ночью, во сне — пожалуйста. Конечно, это опасно, парциальное давление кислорода нельзя чрезмерно снижать. В последние дни Ямагиси дошел до 14 % — наверное, собрался жить вечно. И потому приходит в себя только к ленчу.</p><p class="p1">— Ну я-то всю свою жизнь провела при 20 %, — рассмеялась Элли.</p><p class="p1">— Теперь он экспериментирует с ноотропными препаратами, чтобы снять головокружение. С такими, как, например, пирацетам. Конечно, память они улучшают. Я не думаю, чтобы химия могла заставить человека поумнеть, пусть об этом твердят врачи. Значит так: Ямагиси принимает кучу ноотропиков, и по ночам ему не хватает кислорода.</p><p class="p1">— Неужели свихнулся?</p><p class="p1">— Свихнулся? Трудно сказать. Мне просто не приходилось встречаться с другими военными преступниками первой категории в возрасте 92 лет.</p><p class="p1">— Вот почему всякий эксперимент нуждается в контроле, — проговорила Элли.</p><p class="p1">Хадден улыбнулся.</p><p class="p1">Невзирая на весьма солидный возраст, приобретенная в императорской армии осанка не покинула Ямагиси. Абсолютно лысый и невысокий человечек с ничуть не подозрительными седыми усами и несколько неподвижным, но сохранившим благородство взглядом.</p><p class="p1">— Я сюда попал из-за бедер, — пояснил он. — Я слыхал и про рак, и про возраст, но сам я здесь из-за бедер. В моем возрасте кости становятся очень ломкими. Барон Цукума упал с футон<a href="ch2.xhtml#id37" class="a">[42]</a> на татами и умер. Половину метра упал. Один половина метра. Его кости сломались. В невесомости бедра не ломаются.</p><p class="p1">В этих словах не было ничего неразумного.</p><p class="p1">Несмотря на ряд гастрономических компромиссов, обед был обставлен на удивление элегантно. Для обедов в условиях невесомости уже была разработана целая технология. Вся утварь имела крышки. Сквозь крышки бокалов были пропущены соломинки. Всякие там орехи и кукурузные хлопья подлежали запрету.</p><p class="p1">Ямагиси угостил ее икрой. Этот продукт, по его словам, принадлежал к числу немногих блюд западной кухни, чья стоимость на Земле превышала расходы на отправку в космос. Как удачно, что эти рыбьи яйца так липнут друг к другу, размышляла Элли. Она попыталась представить себе их облачком, разлетающимся по переходам орбитальной богадельни для состоятельных. И вдруг вспомнила, что ее собственная мать тоже находится в подобном заведении, правда, на несколько порядков менее роскошном. Внизу проплывали Великие озера, и она могла даже указать место, где сейчас находится мать. Болтать два дня на орбите со скверными миллиардерами она может, а выделить пятнадцать минут на телефонный разговор с матерью… Элли поклялась позвонить ей сразу же, едва окажется на Кокосовом пляже. Звонок со спутника Земли может слишком взволновать своей новизной пожилых обитателей дома отдыха в Джейнсвилле, штат Висконсин.</p><p class="p1">Ее размышления нарушил Ямагиси. Он сообщил, что является старейшим среди всех побывавших в космосе. Даже бывший китайский вице-премьер оказался моложе. Сняв пиджак, японец закатал рукава, напряг руку и предложил ей пощупать бицепсы. А потом обратился к подробному повествованию, полному количественной информации о благотворительных мероприятиях, главным спонсором которых он был.</p><p class="p1">Элли попыталась поддержать вежливый разговор.</p><p class="p1">— Здесь так спокойно и мирно. Должно быть, вы наслаждаетесь тишиной.</p><p class="p1">Свои слова она адресовала Ямагиси, но ответил ей Хадден:</p><p class="p1">— Здесь тоже бывает всякое. Сейчас надвигается очередной кризис, и нам приходится реагировать.</p><p class="p1">— Да-да, солнечная вспышка, очень скверно. Делает стерильным, — отозвался Ямагиси.</p><p class="p1">— В случае крупной вспышки на Солнце, после того как ее заметит телескоп, у нас остается три дня, прежде чем поток заряженных частиц достигнет замка. И тогда постоянным обитателям вроде Ямагиси-сан и меня приходится отправляться в убежища. Они весьма невелики и обставлены по-спартански. Но обеспечивают нужную радиационную защиту. Конечно, есть и вторичное излучение. Однако беда в том, что весь временный персонал и посетители вынуждены в трехдневный срок отправляться отсюда. Подобные неприятности могут прокормить весь коммерческий флот. Иногда нам приходится ради спасения людей обращаться к НАСА или Советам. Вы не поверите, кого только не приходилось выставлять отсюда в подобных случаях: и мафиози, и руководителей разных разведок, красавцев и красавиц…</p><p class="p1">— Значит, секс принадлежит здесь к числу ценных товаров, ввозимых с Земли? — не без некоторых колебаний осведомилась Элли.</p><p class="p1">— Ну конечно же. Тому есть много причин. Здешняя клиентура, уединенное местоположение. Но главное — нулевое тяготение. В невесомости ты можешь даже в восемьдесят лет выделывать такие штучки, о которых не мог подумать и в двадцать. Приезжайте-ка сюда отдохнуть — вместе со своим другом. Считайте это приглашением.</p><p class="p1">— Девяносто, — проговорил Ямагиси.</p><p class="p1">— Прошу прощения?</p><p class="p1">— Ямагиси-сан утверждает, что он в девяносто лет может теперь проделать такое, о чем не мечтал и в двадцать. Поэтому всякий стремится сюда.</p><p class="p1">За кофе Хадден вновь вернулся к Машине.</p><p class="p1">— У нас с Ямагиси-сан общие партнеры. Он почетный председатель правления «Ямагиси индастриз». Как вы знаете, эта фирма является главным подрядчиком проводимых на Хоккайдо испытательных работ. Представьте себе проблему. Я намекну. Возьмем три большие сферические оболочки, вложенные одна в другую. Они изготовлены из ниобиевого сплава, в них сделаны странные прорези, и они должны быстро вращаться в вакууме. Техники называют их бензелями. Да вы, разумеется, все знаете. Что произойдет с уменьшенной моделью бензелей, если сильно раскрутить ее? Что будет? Все известные физики считают, что не случится ровным счетом ничего. Но, конечно, никто и не думал экспериментировать. Весьма тонкий опыт. И потому до сих пор никто ничего не знает. Представим себе: когда Машина включается, что-то происходит. Как скажется скорость вращения? Как повлияет материал, из которого изготовлены бензеля? Или расположение прорезей? А масштаб? Вот мы и изготавливали их, и раскручивали — и модели, и полноразмерные копии. Мы хотели бы раскрутить большие бензеля, те самые, что будут установлены на одну из двух Машин, по одному подсоединяя все прочие компоненты. А потом по одной подсоединять все малые подсистемы, может быть, наконец Машина выкинет какую-нибудь штуку и уложит всех нас наповал. Мы хотели бы выяснить, как она работает. Вы понимаете мою мысль?</p><p class="p1">— То есть вы имеете в виду, что втайне собирали копию Машины в Японии?</p><p class="p1">— Ну не совсем втайне. Мы исследуем здесь действие отдельных компонент. Никто не утверждал, что их можно испытывать только по очереди. Поэтому мы с Ямагиси-сан предлагаем изменить схему проведения экспериментов на Хоккайдо. Мы немедленно приступаем к сборке, а если она закончится неудачей, проведем все испытания компонент позже. В любом случае все заказы уже распределены. Мы считаем, что американцы смогут вновь приступить к этому делу только через много месяцев, если не лет. Русские не справятся и через годы. Остается только Япония. И не надо делать никаких заявлений. Мы даже не будем принимать решения о включении Машины, а просто испытаем отдельные ее компоненты.</p><p class="p1">— А вы оба вправе принимать такое решение?</p><p class="p1">— Это вполне укладывается в рамки нашей так называемой должностной ответственности. По нашим расчетам, до уровня, достигнутого в Вайоминге перед взрывом, мы доберемся через шесть месяцев. Конечно, придется быть куда более осмотрительными. Но если не подведут узлы, с Машиной ничего не случится: на Хоккайдо не так просто попасть. Потом, когда сборка и проверка будут закончены, мы запросим у консорциума «Машина» разрешение на испытания, и, если экипаж не передумал, бьюсь об заклад, консорциум возражать не станет. Как ваше мнение, Ямагиси-сан?</p><p class="p1">Ямагиси вопроса не слышал. Он тихо напевал имевшую громкий успех песенку «Свободное падение». В ней откровенно описывались всяческие искушения и сладость падения на орбите Земли. Когда вопрос повторили, он сообщил, что, похоже, понимает не все слова текста.</p><p class="p1">Хадден невозмутимо продолжал:</p><p class="p1">— Теперь неминуемо окажется, что какие-то детали раскручивали, роняли и тому подобное. Но в любом случае они должны пройти назначенные испытания. Не думаю, чтобы это могло испугать вас. Я имею в виду лично вас, Элли.</p><p class="p1">— Лично? А почему вы решили, что я войду в экипаж? Во всяком случае меня не просили, наверняка у них появились кое-какие новые соображения.</p><p class="p1">— Вероятность того, что Отборочный комитет обратится именно к вам, достаточно велика, и теперь президент будет за вас. Ну-ну, — закончил он, ухмыльнувшись, — не всю же жизнь горе горевать?</p><p class="p1">Скандинавию и Северное море затягивали облака, Ла-Манш занавешивала кружевная, почти невидимая пелена тумана.</p><p class="p1">— Как, вы уже едете? — поднялся на ноги Ямагиси и, прижав руки к бокам, отвесил ей глубокий поклон. — От имени всех двадцати двух миллионов работников моих предприятий выражаю свое удовольствие от встречи с вами.</p><p class="p1">Элли отлично выспалась в отведенной ей спальне. Постель была привязана к стенам так, чтобы, повернувшись во сне, она не вылетела из нее и не ударилась во что-то в этой клетушке. Она проснулась, когда все еще спали, и, перебирая руками, выбралась в общее помещение к большому окну. Они были над ночной стороной планеты. Огромный диск охватывала тьма, лишь изредка нарушаемая сетками и пятнышками света — скромными результатами попыток людей осветить отвернувшееся от Солнца полушарие. К восходу — минут через двадцать — она уже решила, что согласится войти в экипаж, если ее попросят.</p><p class="p1">Сзади приблизился Хадден, и она вздрогнула.</p><p class="p1">— Согласен, величественное зрелище. Я провел здесь несколько лет и все еще нахожу его несравненным. А вам не мешает этот корабль? Человек еще не все успел испытать. Представьте, вы в космическом скафандре, и нет ни шнура, ни корабля. За вашей спиной Солнце, впереди и по бокам — звезды. Где-то далеко под ногами Земля. Или иная планета. Лично я вижу под собой Сатурн. И вы плывете в космосе наедине с пространством. Космический костюм обеспечивает вам лишь несколько часов жизни. Корабль оставил вас и удалился… Может быть, вас подберут через час, может быть, нет. И лучше, если корабль так и не придет. Какие последние часы, какая смерть посреди звездных миров в сердце космоса! Если вы неизлечимо больны или просто захотели доставить себе последнее истинное удовольствие. Ну как?</p><p class="p1">— Вы серьезно? Собираетесь выйти с этой идеей… на рынок?</p><p class="p1">— Ну до рынка еще далеко. Пока речь не об этом, а скорее о возможности подобного предприятия.</p><p class="p1">Она решила, что не станет рассказывать Хаддену о принятом решении, а он не спрашивал. Позже, когда «Нарния» заходила на стыковку с «Мафусаилом», Хадден отвел ее в сторонку.</p><p class="p1">— Мы тут говорили, что Ямагиси самый старый среди нас. Если говорить о тех, кто <em>всегда</em> наверху, — кроме прислуги, пилотов и танцовщиц, — я здесь <em>самый молодой</em>. И я кровно заинтересован в решении задачи — медики говорят, что я могу протянуть здесь столетия. Видите ли, я экспериментирую с бессмертием. Но говорю вам об этом не ради хвастовства, а из практических соображений. Если мы уже успели нащупать путь к увеличению продолжительности жизни, подумайте о тех, на Веге. Уж они-то <em>могут оказаться</em> бессмертными. Я человек практический и много думал над этим вопросом. Я думал о бессмертии дольше и куда серьезнее, чем кто бы то ни был из людей. Могу вам кое-что сказать о бессмертных: они очень осторожны и ничего не оставляют на волю случая. Они слишком много потратили, чтобы стать бессмертными. Я не знаю, на кого они похожи, не знаю, что им нужно от нас, но если вам суждено когда-нибудь их увидеть, могу дать один практический совет: то, что вы сочтете надежным, словно скала, для них неприемлемый риск. И не забудьте про это, если вам придется вести там какие-нибудь переговоры.</p></span></span>
