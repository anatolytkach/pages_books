<span><span id="id2"><div class="title2">
<p class="p">1. Трансцендентные числа</p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v">Мое сердце трепещет, как лист.</p>
<p class="v">В снах моих — круженье планет,</p>
<p class="v">Обступили звезды постель:</p>
<p class="v">Я вращаюсь и сплю,</p>
<p class="v">Ты, Земля, — моя колыбель.</p>
</div>
<p class="text-author">Марвин Мерсер. Школа № 153, 5-й класс, Гарлем, г. Нью-Йорк, штат Нью-Йорк, 1981 г.</p>
</div>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v">Жаль мотылька!</p>
<p class="v">Моя рука</p>
<p class="v">Нашла его</p>
<p class="v">В раю цветка.</p>
<p class="v">Мой краток век.</p>
<p class="v">Твой краток срок.</p>
<p class="v">Ты человек.</p>
<p class="v">Я мотылек.</p>
<p class="v">Порхаю, зная:</p>
<p class="v">Сгребет, сметет</p>
<p class="v">Рука слепая</p>
<p class="v">И мой полет.</p>
</div>
<p class="text-author">Уильям Блейк. «Мотылек»</p>
</div>
</div><p class="p1">По людским понятиям, сооружение размером с целую планету не могло быть искусственным. Но настолько странной и сложной была форма таинственного объекта, настолько очевидным было в нем некое загадочное предназначение, что нельзя было сомневаться — только разум мог породить колоссальный неправильный многогранник, усыпанный миллионами чашевидных нашлепок, что кружил по полярной орбите вокруг иссиня-белой звезды. Каждая чаша была устремлена в определенную точку неба. Не было забыто ни одно созвездие. Таинственное дело свое планета-многогранник творила не эры — зоны. Планета была терпелива. Она могла ждать вечно…</p><p class="empty-line"/><p class="p1">Когда ее извлекли на свет, она и не думала плакать. Ее крошечный лобик наморщился — и глаза открылись. Она поглядела на яркий свет, на зеленые и белые силуэты, на женщину, лежавшую на столе. Ее омывали казавшиеся знакомыми звуки. Выражение на лице девочки было, пожалуй, несколько неожиданным для новорожденной: удивленное и озадаченное.</p><p class="p1">Однажды при гостях, когда девочке уже исполнилось два года, она подняла вверх обе ручонки и потянулась к отцу, нежным голоском повторяя:</p><p class="p1">— Папа, вверх.</p><p class="p1">Друзья удивились спокойствию и благовоспитанности ребенка.</p><p class="p1">— Она уже привыкала визжать, когда просилась на руки, — пояснил отец, — но я как-то попросил: «Элли, не надо. Просто скажи: „Папа, вверх“. Дети смышлены. Так ведь, Тинка?</p><p class="p1">Сейчас она была как раз наверху, на головокружительной высоте — на отцовских плечах, — и крепко держалась за его редеющие волосы. Здесь девочка чувствовала себя спокойнее, чем посреди вечно расхаживающих ног. Внизу на нее могли и наступить. Можно было и потеряться. Поэтому она вцепилась покрепче.</p><p class="p1">Отойдя от обезьян, папа с дочкой обогнули угол и оказались возле громадного зверя на ногах-ходулях и с длиннющей шеей… На голове животного росли крошечные рожки, голова же башней возвышалась над ними.</p><p class="p1">— Видишь ли, у жирафов такие длинные шеи, что слова не успевают добраться до рта, — объяснил отец.</p><p class="p1">Элли пожалела немого беднягу, но почувствовала и радость оттого, что такой зверь существует, и восхищение перед подобным чудом.</p><p class="p1">— Ну же, Элли, — мягко поторопила ее мать. В знакомом голосе чувствовалось воодушевление. — Читай.</p><p class="p1">Сестра матери так и не поверила, что в три года Элли уже выучилась читать. Тетя решила, что девочка просто запоминает сказки. Пока в одно прохладное мартовское утро они, прогуливаясь вместе по Стейт-стрит, не остановились перед витриной. За стеклом каплей вина рдел красный камень.</p><p class="p1">— Ю-ве-лир, — медленно прочла Элли, разделив слово на три слога.</p><p class="p1">Крадучись, она вошла в кладовую. Старый приемник «Моторола» оказался на своем привычном месте, большой и тяжелый; подняв, девочка едва не выронила его. Сзади были слова: «Опасно. Не снимать». Но Элли уже знала: пока его не включишь в сеть, опасности нет. Чуть высунув язычок, она отвинтила винты и сняла крышку. Как Элли и подозревала, внутри не оказалось ни крошечных оркестриков, ни куколок-дикторов, спокойно ожидающих, когда нажатие кнопки оживит их. Там были только блестящие стеклянные цилиндры, чем-то похожие на электролампы. Некоторые напоминали главы московских церквей, которые она видела в книжке. Штырьки в основании цилиндров прекрасно входили в отверстия платы. Поставив крышку на пол, Элли включила приемник и вставила вилку в розетку. Что может случиться, если она не будет ничего трогать и даже не подойдет близко?</p><p class="p1">Через пару секунд трубки засветились теплым светом, но звука не было. Радио когда-то «сломалось», и приемник убрали, заменив на новый. Только одна из трубок оставалась темной. Элли выключила приемник из сети, выковыряла непослушный цилиндрик из гнезда. За стеклом виднелся металлический прямоугольник, к которому подходили тонкие провода. Электричество бежит по проволочкам, смутно подумалось ей. Но еще ему нужно попасть в трубку. Один из штырьков оказался изогнутым. Немного потрудившись, Элли сумела выпрямить его. Вставив цилиндрик на место, она вновь включила приемник в сеть и с восторгом увидела, что лампа засветилась, а в кладовой послышался треск помех. Вздрогнув, девочка поглядела на закрытую дверь и уменьшила громкость. Она повернула рукоятку с надписью «Частота» и услышала взволнованный голос: речь шла о новой русской машине, что кружила в небесах вокруг Земли. Кружит и кружит, подумала она. Слегка повернув рукоятку, она поискала другую станцию. Потом, опасаясь, что ее застанут врасплох, выключила приемник и, чуть завернув винты на задней крышке, поставила его обратно на полку.</p><p class="p1">Когда она, немного волнуясь, вышла из кладовой, навстречу ей попалась мать, и девочка вздрогнула.</p><p class="p1">— Элли, все в порядке?</p><p class="p1">— Да, мам.</p><p class="p1">Вид у нее был непринужденный, но сердце колотилось и ладони потели. Потом она устроилась в любимом укромном уголке на небольшом заднем дворе и, уткнувшись носом в коленки, задумалась… о приемнике. Действительно ли нужны все эти трубки? Отец называл их вакуумными лампами. Что происходит внутри них? Неужели там и в самом деле нет воздуха? А как музыка оркестров и речи дикторов попадают внутрь приемника? Взрослые говорили — по воздуху. Разве радио летит по воздуху? Что происходит внутри приемника, когда переключаешь станции? И что такое «частота»? Почему надо включать приемник в розетку, чтобы он заработал? А нельзя ли начертить карту, на которой будет видно, как электричество двигается внутри приемника? Можно ли разобрать его не поранившись? А потом снова собрать?</p><p class="p1">— Элли, что с тобой? — спросила мать, проходя мимо с отжатым бельем к веревке.</p><p class="p1">— Ничего, мам. Просто думаю.</p><p class="p1">Когда ей шел десятый год, они уехали на каникулы в гости к двум двоюродным братьям — Элли их не выносила — пожить на побережье северного полуострова у озера Мичиган. Зачем нужно оставлять свой дом в Висконсине и ехать целых пять часов на другой берег того же самого озера, было за пределами ее понимания. Тем более не стоило этого делать ради общения с двумя неразвитыми и ребячливыми мальчишками. Десять и одиннадцать лет. Младенцы. Как мог отец, всегда так внимательно относившийся к ней, обречь ее на постоянные игры с этими грубиянами? И все лето она провела, старательно избегая общества кузенов.</p><p class="p1">Однажды после ужина, темной безлунной ночью, она спустилась к деревянному причалу. Только что отчалила моторка, и привязанная к причалу весельная лодка дяди еще покачивалась на освещенной звездным светом воде. Она поглядела вверх, на усыпанное бриллиантами небо, и сердце ее затрепетало.</p><p class="p1">Не спуская глаз, девочка рукой нащупала под собой мягкую полоску травы и легла. На небе горели звезды. Их были тысячи, иные мерцали, но некоторые светили ровно и ярко. Приглядевшись, можно было заметить отличия в цвете. Та, яркая, разве не синевата?</p><p class="p1">Элли вновь прикоснулась к земле… твердая и надежная, она успокаивала. Девочка осторожно села, поглядела направо, налево, вниз — за озеро, на противоположный берег. Мир только кажется плоским, подумалось ей. На самом деле он круглый… Это просто большой шар, и он кружит в небе… делая один поворот за сутки. Девочка попыталась представить, как вращается Земля, как несет миллионы и миллионы людей, по-разному одетых и не понимающих друг друга.</p><p class="p1">Она вновь откинулась на траву и попыталась ощутить вращение планеты. Ну хоть чуть-чуть. За озером среди ветвей сияла звезда. Если скосить глаза, лучи запляшут на ветках. Если скосить посильнее, они послушно изменят и цвет, и форму. Ей показалось — или это было взаправду, — звезда немного поднялась над ветвями. Только что, какие-то минуты назад, она мигала в ветвях, то и дело пропадая в вершине. А теперь поднялась выше. Так вот что люди имеют в виду, когда говорят, что восходит звезда, подумала Элли. Земля крутится. На одной стороне неба звезды появляются. Это восток. На другом краю небосвода, за ее спиной — как раз за домиками, — звезды садятся. Там запад. Каждые сутки Земля делает один оборот, и те же самые звезды снова появляются на прежнем месте.</p><p class="p1">Но если такая громадная штука, как Земля, поворачивается за одни только сутки, значит, она вращается с невероятной скоростью. Все, кого Элли знает, несутся вместе с ней. Девочка подумала, что теперь-то она действительно ощущает, как поворачивается Земля… не разумом представляет это, а чувствует собственным нутром, словно спускается на скоростном лифте. Она запрокинула голову подальше назад, так, чтобы не видеть ничего земного — только черное небо с яркими звездами. И тут ее внезапно охватило головокружение… чтобы не сорваться в это небо, не растаять крохотной звездочкой в громадной и темной сфере, ей пришлось изо всех сил вцепиться в траву.</p><p class="p1">Она закричала, не сразу сумев зажать рот ладонью. В таком состоянии ее и обнаружили двоюродные братья. Скатившись по склону вниз, они увидели на ее лице совершенно необычную смесь удивления и смущения и не без удовольствия наябедничали родителям девочки об этом незначительном нарушении правил приличия.</p><p class="p1">Книга оказалась лучше кино. Просто потому, что в ней содержалось много больше. А некоторые сцены и вовсе не совпадали с фильмом. Но и тут и там жил Пиноккио, деревянный мальчуган в полосатом колпаке, почти как настоящий, только в суставах его были штырьки. И когда Джеппетто закончил делать Пиноккио, он повернулся к кукле спиной и от меткого пинка полетел носом вперед. Тут появился приятель плотника и спросил, что тот делает на полу.</p><p class="p1">— Обучаю грамоте муравьев, — с достоинством отвечал Джеппетто.</p><p class="p1">Сценка казалась Элли до крайности смешной, и она с восторгом пересказывала историю подружкам. Но всякий раз, когда она вспоминала ее, в голову приходили одни и те же вопросы: можно ли научить грамоте муравьев? И кому захочется взяться за это? Лежи на земле, а насекомые сотнями будут сновать по твоей коже, да еще и кусаться? Что вообще могут знать муравьи?</p><p class="p1">Однажды посреди ночи Элли встала и отправилась в ванную, где нашла отца в пижамных брюках… Склонив голову на бок, он с гримасой патрицианского высокомерия выбривал верхнюю губу.</p><p class="p1">— Привет, Тинка, — проговорил он. Это было сокращение от «золотника», и ей нравилось, когда отец так ее называл.</p><p class="p1">— Почему ты бреешься на ночь, кто увидит, что ты побрит?</p><p class="p1">— Потому, — с улыбкой отвечал он. — Мама увидит.</p><p class="p1">Только через многие годы она узнала, что тогда не совсем поняла отца. Ее родители любили друг друга.</p><p class="p1">После школы она поехала на велосипеде в маленький парк у озера. Достала из седельной сумки «Справочник радиолюбителя» и «Янки при дворе короля Артура». После недолгих колебаний выбрала вторую книгу; твеновского героя огрели по голове, и он очнулся в Англии времен Артура. Это был сон… а может быть, бред. Или все было взаправду? Но можно ли отправиться назад во времени? Уткнув подбородок в коленки, она отыскала любимое место. То самое, где герой книги встречается с облаченным в панцирь человеком и принимает его за беглеца из сумасшедшего дома. А потом с вершины холма они видят город в долине.</p><p class="p1">«— Бриджпорт? — спросил я.</p><p class="p1">— Камелот, — ответил он.»</p><p class="p1">Она глядела на голубую воду, пытаясь представить себе город, который может оказаться похожим и на Бриджпорт девятнадцатого столетия, и на Камелот шестого века, когда к ней подбежала мать.</p><p class="p1">— Куда же ты подевалась? Я нигде не могла тебя найти. Ну почему ты всегда не там, где тебя легко отыскать? Ох, Элли, — тихо пожаловалась она, — случилось ужасное…</p><p class="p1">В седьмом классе они изучали греческую букву «пи», напоминавшую арки Стоунхенджа: два вертикальных пилона с массивной поперечиной наверху (П). Если измерить длину окружности и поделить ее на диаметр круга, получишь «пи». Дома Элли взяла майонезную банку, обернула ее веревочкой, потом расправила и по линейке измерила длину окружности. То же самое она сделала и с диаметром. Получилось 3,21. Все было просто.</p><p class="p1">На следующий день учитель, мистер Вейсброд, сказал, что «пи» равно примерно 22/7 или 3,1416. Но на самом деле, если быть точным, десятичная дробь продолжается и продолжается до бесконечности не повторяясь… До бесконечности, подумала Элли. Она подняла руку. Учебный год только начался, и она еще не успела задать ни одного вопроса.</p><p class="p1">— А откуда известно, что дробь продолжается и продолжается до бесконечности?</p><p class="p1">— Иначе не может быть, — строгим тоном отвечал учитель.</p><p class="p1">— Но почему? Откуда это известно? Разве можно продолжать знаки после запятой до бесконечности?</p><p class="p1">— Мисс Эрроуэй, — он заглянул в список, — вы задали глупый вопрос. Поберегите время ваших одноклассников.</p><p class="p1">Элли еще никто не называл глупой, и она почувствовала, что на глазах появились слезы. Сидевший рядом с ней Билли Хорстман с пониманием дотронулся до ее руки. Его отец недавно был осужден за махинации со счетчиками пробега на подержанных машинах, которыми торговал, так что Билли сочувствовал публично униженным. Всхлипывая, Элли выбежала из класса.</p><p class="p1">Сразу же после школы она покатила на велосипеде в ближайший колледж поглядеть на книги по математике. И в меру своего разумения поняла, что вопрос ее вовсе не был глупым. В соответствии с Библией древние евреи считали «пи» в точности равным трем. А греки и римляне, которые уже неплохо разбирались в математике, еще не имели ни малейшего представления о том, что десятичные знаки в числе «пи» тянутся бесконечно не повторяясь. Этот факт установили только лет 250 назад. Ну а как она может узнать об этом, если не будет задавать вопросы? Но относительно первых нескольких цифр мистер Вейсброд не заблуждался. Число «пи» не было равно 3,21. Неужели майонезная банка оказалась чуть сплющенной? Или она неаккуратно измерила веревочку? Даже если быть повнимательнее, разве можно измерить хотя бы диаметр с бесконечным числом знаков?</p><p class="p1">Но, как оказалось, была и другая возможность. «Пи» можно <em>вычислить</em> с любой точностью. При помощи какой-то штуки, именуемой дифференциальным исчислением, вывели формулы, по которым «пи» можно вычислять с точностью до любого десятичного знака — насколько хватит терпения. В книге был целый список формул для вычисления «пи»/4. Некоторые соотношения были ей не понятны. Но простота других просто ошеломляла: «пи»/4, как утверждалось в книге, равно 1–1/3 + 1/5 — 1/7 + …, дроби продолжались до бесконечности. Она быстро попробовала подсчитать сумму, попеременно вычитая и прибавляя дроби. Сумма колебалась, величина ее становилась то больше, то меньше, чем «пи»/4, но скоро уже можно было увидеть, что числа сходятся к правильному ответу. Точно это число нельзя было определить, но подбираться к нему можно было с любой точностью. Это казалось чудом — один и тот же ряд чисел определял форму всех кругов в мире? Откуда круги знают о дробях? Она решила изучить дифференциальное исчисление.</p><p class="p1">В книге говорилось и кое-что еще: число «пи» оказалось трансцендентным. Потому что в простых числах нельзя написать такое уравнение, корнем которого было бы это число, если только в уравнении не бесконечное число членов. Она уже учила основы алгебры и понимала, что это значит. «Пи» было не единственным трансцендентным числом, на самом деле их бесконечное множество. Более того, трансцендентных чисел оказалось несравненно больше, чем простых, хотя пока она слыхала только о «пи». Так что с бесконечностью это число было связано не единственным способом.</p><p class="p1">Ей чудилось в этом нечто величественное. Среди простых чисел пряталось бесконечное множество трансцендентных, но, не зная основ математики, о существовании их нельзя было даже догадаться. Лишь изредка какое-нибудь из них неожиданно появлялось в повседневной жизни, подобно «пи». Но большинство этих чисел — бесконечное множество, напомнила она себе, — притаилось по уголкам и занималось там своими делами, стараясь не попадаться на глаза раздражительному мистеру Вейсброду.</p><p class="p1">Джона Стогтона она разглядела насквозь с самого начала. И как ее матери могла прийти в голову мысль выйти за него замуж, да еще всего лишь через два года после смерти отца… просто загадка. Внешность у него была приятная, а при желании, если он старался, могло и в самом деле показаться, что ты для него что-то значишь. Просто солдафон. Собственных учеников он заставлял по субботам приходить полоть и поливать сад у нового дома, в который они недавно переехали, а потом, когда те уходили, осмеивал их. Элли он говорил, что она еще совсем юная и ей ни к чему водить знакомство с подобными болванами. Так и раздувался от сознания собственной воображаемой значимости. А Элли была совершенно уверена, что этот профессор завидует покойному отцу, простому торговцу. Стогтон дал ей ясно понять, что, с его точки зрения, девушке неуместно интересоваться радиоэлектроникой, и что мужа так не найдешь, и что физикой могут заниматься только абсолютно ненормальные и претенциозные дуры. Откуда у нее могут оказаться способности к науке? Увы, это факт, и с ним придется считаться. Он говорил ей все это ради ее же собственной пользы. Когда-нибудь она еще будет благодарить его. В конце концов как адъюнкт-профессор физики он-то знает, что для этого нужно. Подобные поучения всегда бесили Элли, хотя она никогда — пусть Стогтон так и не смог в это поверить — даже не думала о научной карьере.</p><p class="p1">Он не был внутренне благороден, как отец, и не имел ни малейшего представления о чувстве юмора. Когда Элли называли дочерью Стогтона, она приходила в ярость, и все знали об этом. Мать и отчим даже не предлагали ей сменить фамилию на Стогтон: они предвидели, какой будет ее реакция.</p><p class="p1">Но и в нем изредка находилось немного тепла для нее — как тогда в больничной палате после удаления миндалин… Он принес ей великолепный калейдоскоп.</p><p class="p1">— А когда операция? — сонным голосом спросила она.</p><p class="p1">— Уже сделали, — отвечал Стогтон. — Все в порядке.</p><p class="p1">Элли не понравилось, что столько времени может незаметно исчезнуть из памяти, и она винила в этом отчима, понимая, что это ребячество.</p><p class="p1">Едва ли мать могла по-настоящему полюбить его, это казалось невероятным; скорее она вышла за него от одиночества и слабости, ей нужна была чья-то поддержка. Элли поклялась, что никогда не попадет в такую зависимость. Отец умер, мать отдалилась от нее, и в своем доме Элли чувствовала себя так, словно она в заточении и в оковах. Даже Тинкой назвать ее теперь некому.</p><p class="p1">Она замыслила побег.</p><p class="p1">«— Бриджпорт? — спросил я.</p><p class="p1">— Камелот, — ответил он.»</p></span></span>
