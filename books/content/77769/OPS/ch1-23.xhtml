<span id="id21"><div class="title3">
<p class="p">ЧАСТЬ ТРЕТЬЯ</p>
<p class="p">«ГАЛАКТИКА»</p>
</div><div class="epigraph">
<p class="p1">Так я ступаю по беспредельным высотам</p>
<p class="p1">И знаю, что есть надежда</p>
<p class="p1">Для тех, кого слепил Ты из пыли,</p>
<p class="p1">Чтобы утешить в вечности.</p>
<p class="text-author">Свитки Мертвого моря</p>
</div></span>
