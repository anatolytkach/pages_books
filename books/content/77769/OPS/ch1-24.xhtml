<span><span id="id22"><div class="title4">
<p class="p">19. Нагая сингулярность</p>
</div><div class="epigraph">
<p class="p1">Подымаюсь в рай дорогой чудес.</p>
<p class="text-author">Ралф Уолдо Эмерсон. «Мерлин»</p>
</div><div class="epigraph">
<p class="p1">Вполне возможно, что некоторому несравненно превосходящему нас существу Вселенная может казаться равниной, а расстояния между планетами — порами в частице земли, и для него солнце прижато к солнцу, словно песчинки.</p>
<p class="text-author">Сэмюэл Тейлор Колридж. «Omniania»</p>
</div><p class="p1">Они падали. Пятиугольные панели додекаэдра стали прозрачными, пол и потолок тоже. Внизу и над головой она видела только органосиликатное кружево и эрбиевые шпонки. Они явно пошевеливались. Все три бензеля исчезли неизвестно куда. Додекаэдр несся по длинному черному тоннелю, едва не касаясь его стенок. Ускорение примерно равнялось ускорению свободного падения. Сидевшую лицом вперед Элли слегка прижимало к спинке кресла, находившаяся напротив нее Деви, наоборот, несколько наклонялась вперед. Действительно, зря кресла не снабдили привязными ремнями.</p><p class="p1">Трудно было избавиться от мысли, что путь их лежит в глубины Земли, через мантию в ядро из расплавленного железа. Или же они проваливаются прямо в… Она подумала: что, если это невероятное устройство и есть лодка Харона, перевозящая их через Стикс.</p><p class="p1">Стенки тоннеля обладали какой-то текстурой, и скорость можно было ощутить на взгляд. Пятна-кляксы с неясными очертаниями, никаких четких форм. В облике их не было ничего интересного, только зачем они и откуда взялись? Уже в нескольких сотнях километров под поверхностью Земли скалы раскалились докрасна. Но на жару не было и намека. Чертей тоже не было видно, не оказалось нигде и буфетов с горшками, полными мармелада<a href="ch2.xhtml#id19" class="a">[51]</a>.</p><p class="p1">Своей верхней гранью додекаэдр то и дело задевал стенку, от которой отскакивали чешуйки неведомого вещества. Сам додекаэдр казался неповрежденным. И скоро следом за ними уже неслось целое облако мелких частиц. Со всех сторон лился ровный неяркий свет, иногда тоннель чуть поворачивал, и додекаэдр послушно следовал вдоль изгиба. Впереди, насколько это было видно, ничего не маячило. Столкновение даже с воробьем на такой скорости разнесло бы в клочья любой аппарат. Но что это за бездонный колодец? В нижней части ее живота что-то ныло. Сомнений не оставалось.</p><p class="p1"><em>Черная дыра</em>, думала она, <em>черная дыра</em>. Я падаю за горизонт событий в черной дыре к самой сингулярности. А может быть, это вовсе не черная дыра, и мы валимся к нагой сингулярности? То есть к тому, что физики называют нагой сингулярностью. Там, вблизи сингулярной точки, нарушаются законы причинности, следствия предваряют причины, время течет в обратную сторону, и вообще невозможно уцелеть, а тем более что-то запомнить. Вращающаяся черная дыра, старательно вспоминала Элли, представляет собой не точку, а поверхность, сферическую или еще более сложную. С черными дырами не пошутишь. Гравитационные силы могут мгновенно расплющить тебя в лепешку. Или обжать с боков. На подобную беду, к счастью, пока ничто не намекало. За серыми прозрачными стенками, в которые превратились теперь пол и потолок, кипела работа. Органосиликатная матрица в одних местах набухала, в других — опадала, утопленные в ней эрбиевые шпонки поворачивались и ползали вперед и назад. Все прочее внутри додекаэдра, в первую очередь Элли и ее спутники, выглядело вполне ординарно. Конечно, люди были чуточку взволнованы. Но никто из них еще не превратился в лепешку.</p><p class="p1">Праздные мысли, подумала Элли. Физика черных дыр лежала за пределами ее интересов. К тому же она не понимала, как все это может быть связано с черными дырами: одни из них имели космологическое происхождение — возникли, когда Вселенная только рождалась; другие были вторичными — появились в результате коллапса более массивных звезд, чем Солнце. Притяжение черных дыр настолько велико, что, за исключением некоторых квантовых эффектов, они не испускают даже свет… хотя само тяготение остается. Вот и получается «черная дыра». Но в окрестностях Земли нигде рядом нет ни одной коллапсирующей звезды. А каким образом можно попасть в поле первичной дыры, Элли даже не представляла. Никто на Земле не знал, где вообще их искать. А они только раскрутили бензеля, сидя в Машине.</p><p class="p1">Элли поглядела на Эда, тот что-то прикидывал на крохотном компьютере. Каждый раз, когда додекаэдр задевал стенки, ее кости и уши ощущали далекий грохот, и она заговорила погромче:</p><p class="p1">— Вы понимаете, что происходит?</p><p class="p1">— Ни в коей мере, — крикнул он в ответ. — Но одно, кажется, уже могу доказать: всего, что мы видим, быть не может. Вы знакомы с координатами Буайе — Линдквиста?</p><p class="p1">— Увы, нет.</p><p class="p1">— Потом объясню.</p><p class="p1">Она с радостью отметила это самое «потом».</p><p class="p1">Элли ощутила торможение, прежде чем заметила какие-то перемены. Словно бы они только что съехали вниз с американской горки и теперь начинался подъем. Как раз перед этим участок стенки был покрыт особенно густыми узлами и переплетениями. Ни цвет, ни яркость проникавшего в додекаэдр света не изменились. Элли взяла длиннофокусный объектив и принялась вглядываться вперед. Она видела только очередной поворот извилистого пути. Увеличение как бы усложняло структуру стенок, ей даже показалось, что они светятся.</p><p class="p1">Теперь додекаэдр едва ли не полз, но конца тоннелю еще не было видно. Что, если они не доберутся до места назначения или окажется, что ошиблись строители тоннеля? Или же Машина получилась чуточку не такой… быть может, технологические дефекты, считавшиеся на Хоккайдо вполне допустимыми, обрекают их на гибель в… где бы они сейчас ни находились. Поглядывая на облачко следовавших за ними частиц, она все думала, что додекаэдр, пожалуй, слишком часто ударяется о стенки и тем самым теряет количество движения; наверное, при более точной работе этого могло не быть. Зазор между поверхностью стенки и додекаэдром сузился. Что, если они застрянут здесь, в Нигде, и им останется только ждать, пока закончится кислород? А вдруг веганцы забыли, что люди не могут не дышать? Или просто не пригляделись к этим орущим нацистам.</p><p class="p1">ВГ и Эда перебирали арканы<a href="ch2.xhtml#id17" class="a">[52]</a> физики тяготения, звучали слова: твисторы, времяподобные векторы Киллинга, неабелева градиентная инвариантность, геодезическая фокусировка, 11-мерная теория супертяготения Калузы — Клейна; вспоминали, конечно же, и теорию суперобъединения Эда. Однако нетрудно было заметить, что объяснений ждать неоткуда. Элли решила, что через пару-другую часов оба физика все-таки сумеют подобраться поближе к разгадке. Все-таки теория сверхобъединения охватывала все известные на Земле физические законы и учитывала все их всевозможные аспекты и масштабные проявления. В это трудно было поверить… но существование тоннеля не являлось следствием какого-нибудь до поры до времени забытого решения уравнения новой теории поля, созданной Эда.</p><p class="p1">ВГ спросил:</p><p class="p1">— А кто-нибудь заметил нагую сингулярность?</p><p class="p1">— Даже не знаю, на что она может оказаться похожей, — отвечала Деви.</p><p class="p1">— Прошу прощения. Нагота здесь ни при чем. Я хочу знать, не успел ли кто-либо из вас заметить, скажем, каких-нибудь нарушений причинности, что-нибудь совершенно необычное, сумасшедшее, быть может, проявившееся только в процессе мышления — ну что-нибудь вроде того, как омлет сам собой делится на желток и белок?</p><p class="p1">Деви, сузив глаза, глядела на ВГ.</p><p class="p1">— Все в порядке, — торопливо вмешалась Элли. Нервничает ВГ, подумала она про себя. — Эти вопросы имеют отношение к черным дырам. Они вызывают недоумение только на первый взгляд.</p><p class="p1">— Нет, — неторопливо заметила Деви, — ничего безумнее вашего вопроса я не успела ощутить. — Лицо ее просветлело. — Удивительное путешествие!</p><p class="p1">Все согласились. ВГ пребывал в приподнятом состоянии духа.</p><p class="p1">— Так сказать, космическая цензура, — проговорил он. — Сингулярность невидима, даже когда располагается <em>внутри</em> черной дыры.</p><p class="p1">— Шутит ВГ, — отметил Эда. — Если ты попал за горизонт событий, из черной дыры не вырвешься.</p><p class="p1">Несмотря на заверения Элли, Деви с сомнением глядела на ВГ и Эда. Физикам приходится придумывать названия для понятий, весьма удаленных от повседневного опыта. При этом принято было избегать неологизмов и прибегать к привычным, пусть и отдаленным аналогиям. В качестве другого варианта законы и уравнения называли именами первооткрывателей. Поступали и так. Но если не знать заранее, что двое физиков-теоретиков ведут беседу на научные темы, нетрудно ощутить тревогу за них.</p><p class="p1">Элли привстала, чтобы подойти к Деви, но в этот миг Си издал негромкий предупреждающий крик. Стенки тоннеля запульсировали, подталкивая додекаэдр вперед, наконец установился четкий ритм. Каждый раз, когда казалось, что додекаэдр вот-вот остановится, стенки проталкивали его вперед. Элли уже почувствовала легкую дурноту от повторяющихся толчков. Кое-где продвижение давалось с трудом и по стенкам тоннеля бежали волны сжатия и расширения; в других местах, в особенности на прямых участках, они легко скользили вперед.</p><p class="p1">И тут, вдалеке, Элли заметила тусклую звездочку, медленно набиравшую яркость. Сине-белый свет хлынул в додекаэдр. Она видела отблески на темной поверхности уже замерших эрбиевых цилиндров. И хотя все путешествие заняло не более 10–15 минут, контраст между прежним тускловатым светом и этим ослепительным сиянием потрясал. Они мчались к источнику этого света, поднимались вверх по тоннелю и вдруг выскочили в обычное пространство. Перед ними в тревожной близи пылало огромное сине-белое солнце. Элли мгновенно поняла — это Вега.</p><p class="p1">Она не собиралась глядеть на звезду через длиннофокусный объектив. Такая глупость непростительна, даже если имеешь дело с Солнцем, звездой более холодной и тусклой. Взяв листок белой бумаги, она поводила им взад и вперед возле фокусного расстояния объектива и нащупала четкое изображение. Элли успела заметить две громадные группы пятен и что-то похожее на кольцо. Опустив камеру, она выставила руки ладонью вперед, чтобы прикрыть ею диск Веги. Ее изобретательность была вознаграждена видом короны, терявшейся до сих пор в ярком свете звезды.</p><p class="p1">Не опуская руки, Элли вглядывалась в окружавшее Вегу кольцо. О конфигурации системы Веги велись общепланетные дебаты со времени получения простых чисел. И теперь в качестве представительницы астрономического сообщества планеты она старалась не наделать ошибок. Элли несколько раз записала изображение кольца на видеоленту с разной выдержкой и частотой кадров. Они выскочили в пространство почти в плоскости кольца в промежутке между ним и звездой. Кольцо было невероятно тонким по сравнению с собственным поперечником. Части кольца слегка различались по цвету, но ни зерен, ни отдельных частиц не было заметно. Если они подобны кольцам Сатурна, камень поперечником в несколько метров покажется там гигантом. Или Вегу окружает звездная пыль, тонкий снежок?</p><p class="p1">Элли обернулась, чтобы поглядеть, откуда они появились, и заметила позади круглое черное пятно, бархатом немыслимой черноты затмевавшее звезды и часть кольца Веги. Вглядываясь через объектив в глубь черного пятна, Элли увидела в самой сердцевине тьмы странные беспорядочные вспышки света. Излучение Хокинга? Едва ли, длина его волны много больше. Или же это дальние отблески солнечного света вырываются из тоннеля? В невероятной дали, на том конце тьмы, остался Хоккайдо.</p><p class="p1">Планеты, подумала она, где планеты? Элли обследовала плоскость кольца с помощью длиннофокусного объектива, пытаясь обнаружить погруженные в него планеты… дом существ, отправивших Послание. В разрывах кольца она искала миры-пастухи, гравитация которых могла расчистить от пыли кольцевые дорожки, но их не было.</p><p class="p1">— Вы обнаружили планеты? — спросил Си.</p><p class="p1">— Ни одной. Повсюду только кометы. Большие, даже хвосты заметны. Но ничего похожего на планету. Большое кольцо состоит по меньшей мере из тысячи тонких. Насколько я могу судить, все они образованы из пыли. Черная дыра, кажется, расчистила внутри кольца широкую полосу. Очень молодая система, ей всего несколько сотен миллионов лет. Некоторые астрономы полагают, что планеты здесь еще не сформировались. Но кто тогда посылал сигналы?</p><p class="p1">— А если это не Вега, — предложил альтернативу ВГ, — то есть радиосигнал, конечно, исходит от Веги, но тоннель выводит в другую звездную систему.</p><p class="p1">— Вполне возможно, только по забавному совпадению у этой вашей звезды оказалась примерно та же цветовая температура, что и у Веги. Поглядите, она голубовата и, кроме того, окружена кольцом. Конечно, я не могу сориентироваться по созвездиям из-за этого света, но ставлю десять к одному — перед нами Вега.</p><p class="p1">— Но где же <em>они</em>? — спросила Деви.</p><p class="p1">Остроглазый Си глядел вверх сквозь органосиликатную матрицу, сквозь прозрачные пятиугольники стен — в небо над плоскостью кольца. Он молчал, и Элли проследила за направлением его взгляда. Да, там под лучами Веги поблескивал некий объект, обладавший заметными угловыми размерами. Элли поглядела через длиннофокусный объектив. Перед ней оказался какой-то неправильный многогранник: на каждой из его граней возвышалось округлое сооружение. Диск? Блюдо? Чаша?</p><p class="p1">— Эй, Цяому, поглядите. И говорите, что вы видите.</p><p class="p1">— Вижу… Там двойники ваших любимых радиотелескопов. Их, по-моему, тысячи, и все они обращены в разные стороны. Это не мир. Это машина.</p><p class="p1">Ее спутники поочередно глядели через объектив. Скрывая нетерпение, Элли ждала, когда он вновь попадет к ней. Облик радиотелескопа в основном определяется природой радиоволн… Впрочем, Элли чувствовала легкое разочарование оттого, что цивилизация, способная создавать и даже использовать черные дыры для гиперрелятивистских межзвездных перелетов, все еще прибегает к помощи устройств известной ей конструкции. Для веганцев подобная конструкция, пожалуй, была несколько примитивна, воображения им не хватило, что ли… Достоинства полярной орбиты ей были понятны — радиотелескоп подвергался опасности соударения с частицами кольца лишь дважды за один оборот. Но эти тысячи радиотелескопов, обращенных во все стороны… значит, здесь слушали небо, как это делала она сама в «Аргусе». Обращенные к бесчисленным мирам-кандидатам, радиотелескопы вслушивались, ждали телепередач или сигналов боевых радиолокаторов… или бог весть каких еще сигналов, неизвестных земной науке. Часто ли они принимают такие сигналы, подумала Элли, или же Земля — долгожданная удача, первая за какой-нибудь миллион лет? Но никаких делегаций, приветствующих гостей в космосе, не было и в помине. Или же бесчисленные провинциалы Галактики слишком похожи друг на друга и не стоят внимания?</p><p class="p1">Когда объектив возвратили, она очень тщательно подобрала фокус, выдержку и частоту кадров. Ей хотелось получить убедительную картину, чтобы Национальный научный фонд наконец увидел, каким должен быть настоящий радиотелескоп. Хорошо бы оценить размеры рукотворного мира. Телескопы усеивали многогранник, как морские моллюски шкуру кита. В невесомости радиотелескопы можно делать любого размера. Позже, по снимкам, она сумеет установить угловой размер этой планеты — всего несколько угловых минут, но линейные размеры невозможно определить, не зная, как далеко расположена эта штука. Впрочем, планета-многогранник казалась огромной.</p><p class="p1">— Раз нет миров, — заключил Си, — нет и веганцев. Никто не живет здесь. А Вега — просто караульная будка, в которой пограничники греют руки.</p><p class="p1">— Эти радиотелескопы, — продолжил он, — подобны башням на Великой стене. Галактической империей тяжело управлять, если ты ограничен в своих действиях скоростью света. Ты приказываешь гарнизону подавить бунт и через какие-нибудь десять тысяч лет узнаешь, чем закончилось дело. Не хорошо. Слишком медленно. Тогда ты предоставляешь полномочия командирам. И все — нет империи. А <em>это</em>, — он махнул в сторону удалявшегося угольного пятна, — <em>это</em> — дороги империи. Они были в Персии, были в Риме, были в Китае. И тогда скорость света более не ограничивает тебя. Дороги удерживают империю от распада.</p><p class="p1">Глубоко задумавшись, Эда покачивал головой, размышляя о тайнах мира.</p><p class="p1">Теперь было видно, что черная дыра, если они правильно определили природу объекта, обращалась вокруг Веги между внешней и внутренней частями кольца, в широкой полосе, полностью свободной от материи. Трудно было даже поверить, что на свете может существовать подобная чернота.</p><p class="p1">Снимая короткие видеопанорамы кольца, Элли думала, неужели когда-нибудь здесь сформируются и планеты: сперва частицы начнут слипаться в комки, те будут сталкиваться, расти, повинуясь действию сил тяготения, и, наконец, образовавшиеся миры закружатся вокруг своего солнца. Такой, по мнению астрономов Земли, Солнечная система была четыре с половиной миллиарда лет назад. Теперь Элли уже различала неоднородности в кольце, крохотные вздутия, в которых уже происходило слияние материи.</p><p class="p1">По ближайшим к черной дыре кольцам, следом за черной дырой бежала волна, вызванная влиянием ее тяготения при обращении вокруг Веги. Конечно, и додекаэдр создавал в кольце свой собственный прилив, только куда более скромный. Она подумала, что действие постоянного гравитационного возмущения, прохождение по кольцам волн сжатия и расширения наверняка скажутся на формировании планет. А если так, то, возможно, какая-нибудь планета даже своим существованием через грядущие миллиарды лет будет обязана этой черной дыре, а значит, хоть чуточку и Машине… Посланию, в какой-то мере и обсерватории «Аргус». Она понимала, что в ней говорит гордыня: даже если бы ее вообще не было на свете, кто-нибудь из радиоастрономов рано или поздно непременно принял бы Послание. И Машину тогда включили бы, но в другое время, и додекаэдр нашел бы дорогу сюда… Так что эта самая будущая планета окажется не слишком в долгу перед ней… Ну а как насчет мира, что возник бы, не будь ее вовсе на свете? Как же это должно быть ужасно, когда от твоего самого легкого движения зависят судьбы миров?</p><p class="p1">Элли повела объективом, записывая широкую панораму — начиная от внутреннего помещения додекаэдра к распоркам, соединявшим ставшие прозрачными пятиугольные панели, и далее — к кольцевому зазору, внутри которого они теперь обращались вместе с черной дырой. Она поглядела вперед между двумя голубоватыми кольцами: во внутреннем кольце появилась какая-то странная вмятина.</p><p class="p1">— Цяому, — сказала она, передавая длиннофокусный объектив китайцу, — посмотрите-ка, что это?</p><p class="p1">— Где?</p><p class="p1">Она показала. Он сразу же точно навел объектив — она поняла это по едва слышному вздоху.</p><p class="p1">— Другая черная дыра, — отвечал Си, — только много больше.</p><p class="p1">Они падали вновь. На этот раз тоннель казался более просторным, и они чувствовали себя свободнее.</p><p class="p1">— Ну что <em>это</em> такое?! — обращаясь к Деви, неожиданно для себя самой выкрикнула Элли. — Нас доставили на Вегу только для того, чтобы спустить в новую черную дыру. Показали свои радиотелескопы с расстояния в тысячу километров. Мы провели возле нее всего десять минут, и вот — нас уже возвращают на Землю. Зачем было тратить два триллиона долларов?</p><p class="p1">— Не исключено, что мы с вами здесь вовсе ни при чем, — отвечал Луначарский, — если это им самим нужно было попасть к нам на Землю.</p><p class="p1">Элли представились полуночные раскопки где-нибудь возле ворот Трои.</p><p class="p1">Растопырив пальцы на обеих ладонях, Эда успокаивающе замахал руками.</p><p class="p1">— Подождем и посмотрим, — проговорил он. — Это другой тоннель. Почему вы решили, что он приведет нас обратно на Землю?</p><p class="p1">— Тогда нас ждут не на Веге? — осведомилась Деви.</p><p class="p1">— Прибегнем к эксперименту — посмотрим, куда нас занесет дальше?</p><p class="p1">В новом тоннеле додекаэдр почти не соприкасался со стенками, двигался ровно. Эда и ВГ обсуждали пространственно-временную диаграмму в координатах Крускаля — Шекереса. О чем они говорят, Элли не имела ни малейшего представления. Торможение и последующий подъем на горку вновь оказались неприятными.</p><p class="p1">На этот раз свет в конце тоннеля был оранжевым. Они буквально влетели в систему контактной двойной звезды: оба солнца в ней соприкасались. Внешние слои красного гиганта, одутловатого, и пожилого, изливались на фотосферу энергичного, похожего на солнце желтого карлика средних лет. Область контакта ослепительно блестела. Элли поискала взглядом… Ни колец, ни планет, ни орбитальных радиообсерваторий. Ну это еще ничего не значит, подумала она, в этой системе может быть целая прорва планет, но через этот миниатюрный объектив я так и не увижу их. Спроектировав изображение двойного солнца на листок белой бумаги, она сняла его с помощью короткофокусного объектива.</p><p class="p1">Здесь свет центральной звезды не рассеивался на кольцах, как возле Веги, и небо было значительно темнее. Поводив широкоугольным объективом, Элли отыскала созвездие, достаточно похожее на Большую Медведицу. Других знакомых созвездий не оказалось. Яркие звезды Большой Медведицы отстоят от Земли на 200–300 световых лет. Значит, решила она, пока нас перебросили на меньшее расстояние.</p><p class="p1">Она сообщила об этом Эда и поинтересовалась его мнением.</p><p class="p1">— Что я думаю? По-моему, мы в подземке.</p><p class="p1">— В подземке?</p><p class="p1">Элли вспомнила, что вначале ей на миг показалось, что они низвергаются в самые глубины ада…</p><p class="p1">— Да, это метро. Здесь станции. Остановки. Вега здесь и дальше. Пассажиры сходят и садятся. Можно пересесть.</p><p class="p1">Эда махнул в сторону соприкасающихся звезд, и Элли заметила, что его рука отбрасывает две тени — от желтого и красного света. Как в дискотеке — нашла она едва ли не единственную аналогию.</p><p class="p1">— Только вот <em>мы</em> не можем пересесть, — продолжал Эда. — Мы едем в запертом вагоне. Прямо до конца, до вокзала.</p><p class="p1">Подобные измышления Драмлин всегда с полным правом называл фантазиями… И, насколько ей было известно, Эда впервые поддался этому искушению.</p><p class="p1">Из всей Пятерки только Элли была астрономом, хотя область ее интересов и лежала за пределами оптического спектра. Поэтому она считала своей обязанностью собрать как можно больше информации и о тоннелях, и о тех областях обычного четырехмерного пространства-времени, куда их выбрасывало. Черные дыры, из которых выныривал додекаэдр, — если это действительно были черные дыры, — кружили вокруг одиночной звезды или множественной системы. Дыры всегда располагались парами: из одной додекаэдр выбрасывало, и они падали в другую. Это продолжалось до тех пор, пока им не встретились две похожие звездные системы, которые не имели ничего общего с Солнечной системой. Новые их «остановки» обогащали человечество важной астрономической информацией. Но они не видели искусственных объектов вроде додекаэдра или куда более амбициозных сооружений вроде машин размером в целые миры.</p><p class="p1">Третья остановка была возле звезды, просто на глазах менявшей яркость. Элли чувствовала это потому, что изменялась выдержка. Возможно, это была одна из звезд RR Лиры, следующим оказалось пятерное светило, за ним — едва светящийся коричневый карлик. Пространство вокруг звезд было чистым, иногда их окружали светящиеся молекулярные облака.</p><p class="p1">Элли вспомнила предупреждение: «Вычтется из твоей доли в раю». У нее нет рая, значит, не будет и вычетов. Она пыталась сохранять профессиональное спокойствие, но сердце ее замирало при виде очередного солнца. Она все надеялась, что каждое из них чей-то дом или еще станет им.</p><p class="p1">Но после четвертого прыжка появилось беспокойство. По ее субъективному ощущению, да и по наручным часам, миновал уже примерно час с тех пор, как они покинули Хоккайдо. Если путешествие окажется более продолжительным, скажется отсутствие удобств. Возможно, некоторые аспекты человеческой физиологии были совсем не понятны ушедшим далеко вперед цивилизациям, тем более их нельзя было угадать по короткой телепередаче.</p><p class="p1">Но если они там такие умные, почему мы тащимся, еле перескакивая через пространство? Хорошо. Возможно, им пришлось передавать землянам описание устаревшей Машины, которую все-таки могли соорудить бесхитростные аборигены. Но дальше-то… после Веги? Почему сразу не перепрыгнуть в место назначения?</p><p class="p1">Каждый раз вылетая пробкой из тоннеля, Элли ожидала чудес… Что еще они припасли для нее? При этой мысли ей представился совершенно невероятных размеров увеселительный парк, а также Хадден, пролетающий с телескопом в руках над Хоккайдо, над включенной Машиной.</p><p class="p1">И хотя создатели Послания открывали перед ними потрясающие великолепием зрелища, невзирая на невольное удовольствие от собственных познаний, Элли бегло поясняла спутникам эволюцию звезд. Однако спустя некоторое время она ощутила разочарование и едва сумела справиться с этим чувством. Она поняла: хвастают внеземляне. Мелковато для них. Должно быть, дефект характера.</p><p class="p1">Нырнули в новый тоннель, он оказался шире и извилистее остальных. Луначарский поинтересовался у Эда:</p><p class="p1">— Почему остановки устроены в таких малоперспективных звездных системах? Почему мы не увидели ни одной одиночной звезды, находящейся «в расцвете сил», без всяких там колец из звездной пыли?</p><p class="p1">— Потому что все такие системы обитаемы… — отвечал Эда, — конечно, это всего лишь догадка…</p><p class="p1">— И нечего туристам пугать туземцев, — бросила Сукхавати.</p><p class="p1">— Что-то в этом роде, — улыбнулся Эда.</p><p class="p1">— Значит, вы полагаете, что их этические нормы запрещают вмешательство в дела примитивных планет? Они понимают, что однажды кто-нибудь из туземцев может забраться в вагон…</p><p class="p1">— И хотя они доверяют туземцам, — продолжила за нее Элли, — такое доверие не может быть <em>абсолютным</em>. В конце концов примитивные люди всегда останутся примитивными. Пусть садятся только с разрешения. Осторожная публика. Но почему тогда мы тащимся на почтовом поезде, а не летим на экспрессе?</p><p class="p1">— Может быть, для экспресса сложно вырыть тоннель, — проговорил Си, знавший толк в грунтовых работах. Элли вспомнила о тоннеле между Хонсю и Хоккайдо, гордости инженерной мысли землян… целых 51 километр!</p><p class="p1">Последовало несколько весьма крутых поворотов. Она вспомнила езду в своем «Тандерберде», потом поняла, что ее подташнивает. И решила все-таки справиться с этим: в додекаэдре не предусмотрено специальных пакетов.</p><p class="p1">Они вышли на прямую, и вдруг вокруг оказались звезды — повсюду, куда ни глянь. Это была не родная россыпь: жалкие несколько тысяч звезд, которые можно увидеть невооруженным «глазом с Земли. Их было множество множеств. Звезды окружали ее отовсюду, казалось, что многие даже соприкасаются… желтые, голубые, красные, последних было больше всего. На небе полыхали солнца. Она смогла заметить спиральное облако пыли — аккреционный диск, низвергавшийся в черную дыру невероятных размеров, озарявшуюся вспышками излучения, словно летняя ночь зарницами. Если перед нами самый центр Галактики, подумала она, мы сейчас утопаем в синхротронном излучении. Оставалось только надеяться, что внеземляне успели понять, насколько хрупки люди.</p><p class="p1">Но вращение додекаэдра уже открывало им… невероятное, невозможное, немыслимое. Не заметив того, они уже подлетали к Сооружению. Оно заполняло полнеба. Вот они уже летят над его поверхностью. На ней виднелись сотни, скорее тысячи освещенных дверей разной формы — многоугольники, круги, эллипсы, — на которых выступали трубки или сдвинутые усеченные конусы. Она поняла, что перед ними причалы: одни не превышали нескольких метров, другие были не меньше одного километра, попадались и еще более крупные. Каждый причал, подумала Элли, предназначен для приема Машины подобно нашей. Огромные существа на увесистом транспорте прибывают прямо к главному входу, а мелкота вроде нас — к боковой калитке. Впрочем, все устроено демократично, без намека на какие-то привилегии. Разнообразный облик причалов свидетельствовал о некоторых социальных различиях, характерных для разных цивилизаций, и вместе с тем с абсолютной определенностью указывал на немыслимое многообразие живых существ и культур. Вот и Великий главный вокзал — подумала она.</p><p class="p1">И картина населенной Галактики, Вселенной, исполненной жизни и разума, чуть не заставила ее прыгать от восторга.</p><p class="p1">Они приближались к освещенному желтым светом причалу, явно отвечавшему по форме их додекаэдру. Элли глянула на соседний вход, «на котором располагалось нечто напоминающее морскую звезду примерно того же размера, что и их додекаэдр. Она поглядела вверх, вниз, вбок — вдоль невероятных размеров стены, заключавшей в себе Великий вокзал, расположенный в самом центре Млечного Пути. Наконец-то человеческий род добился признания, люди получили приглашение сюда. Есть надежда, думала она, есть и у нас надежда.</p><p class="p1">— Ну это не Бриджпорт, — громко проговорила Элли, нарушив полную тишину, в которой совершалась стыковка.</p></span></span>
