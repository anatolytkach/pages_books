<p class="p">12. 1-Дельта-изомер</p>
</div><div class="epigraph">
<p class="p1">Один взгляд на звезды всегда заставляет меня мечтать: они для меня словно черные точки, обозначающие города и деревни на географической карте. Ну почему, спрашиваю я себя, эти сверкающие точки в небе не могут быть такими же доступными, как черные пятнышки на карте Франции?</p>
<p class="text-author">Винсент Ван Гог</p>
</div><p class="p1">Осенний вечер оказался великолепным, тепло было не по сезону, поэтому Деви Сукхавати оставила пальто в гостинице. Вдвоем с Элли они шли по людным Елисейским полям к площади Согласия. В этническом разнообразии с этим местом могли соперничать разве что Лондон, Манхэттен и еще пара-другая городов планеты. И две идущие рядом женщины, одна в брюках и свитере, другая в длинном сари, совершенно не выделялись из пестрой толпы.</p><p class="p1">К табачной лавке пристроилась длинная, аккуратная и многоязычная очередь… шла первая неделя легальной торговли завезенными из Соединенных Штатов сигаретами с коноплей. По французским законам лица до восемнадцати лет не имели права приобретать их. Многие в очереди были среднего возраста и постарше. Стояли натурализованные алжирцы и марокканцы. В Калифорнии и Оригоне на экспорт выращивали особенно крепкие сорта конопли. В киоске шла торговля новым, вызывавшим особое восхищение сортом, который выращивали под ультрафиолетовым светом — при этом часть инертной растительной массы превращалась в 1-А-изомер. Зелье именовалось «Солнечным поцелуем». На пачках, выставленных в полутораметровой витрине, была надпись: «Вычтется из твоей доли в раю».</p><p class="p1">Обращенные к бульвару окна магазинов пестрели красками. Обе женщины купили каштаны у уличного торговца, наслаждаясь их вкусом и видом. По какой-то непонятной причине всякий раз при виде рекламы BNP (Banque Nationale de Paris)<a href="ch2.xhtml#id4" class="a">[27]</a> Элли читала ее наоборот РИВ — «пив», смешивая кириллицу с латиницей и вспоминая про русское пиво. Потом они дивились на обелиск — память о древних сражениях, — с большим трудом выкраденный из Египта, чтобы стать монументом военных подвигов нового времени. Они решили идти дальше.</p><p class="p1">Дер Хиир не смог освободиться, поэтому она и была здесь с Деви. Он позвонил ей еще утром и не слишком усердствовал в извинениях. Все дело в том, что вчера на пленарном заседании было поднято довольно много политических вопросов. На завтра планировалось прибытие государственного секретаря, прервавшего свой визит на Кубу. Словом, у дер Хиира хлопот был полон рот, и он выражал надежду, что Элли поймет. Она поняла. И возненавидела себя за то, что спала с ним. Чтобы избежать одиночества, она позвонила Деви Сукхавати.</p><p class="p1">— На санскрите слово со значением «победоносный» звучит <em>абхиджит</em>. Так звали Вегу в Древней Индии. Абхиджит. Пользуясь покровительством Веги, индусские божества, культурные герои, победили асуров, богов зла. Элли, ты слушаешь?.. Вот любопытная вещь: в Персии тоже есть асуры, но там они боги добра. Там возникла религия, в которой главным богом является бог света, солнечный бог по имени Ахурамазда. Для зороастрийцев и митраистов<a href="ch2.xhtml#id3" class="a">[28]</a> ахура, асура — одно и то же слово. Зороастрийцы существуют и по сей день, а митраисты успели здорово напугать юное христианство. А вот индусские божества называли дева, женские — деви. Таково происхождение моего имени. В Индии дева — боги добра, в Персии дэвы — боги зла. Некоторые считают, что слово «дьявол» от них и происходит. Словом, полная симметрия. Все это, по-видимому, восходит к смутным воспоминаниям о вторжении ариев, оттеснивших моих предков дравидов на юг. Итак, в зависимости от того, по какую сторону от хребта Киртхар ты живешь, Вега покровительствует либо Богу, либо Дьяволу.</p><p class="p1">Деви поведала ей эту вдохновляющую историю, вероятно, прослышав о религиозных похождениях Элли в Калифорнии. Элли была ей благодарна. Но этот разговор напомнил ей, что она даже не намекнула Джоссу, что Послание содержит лишь описание машины неизвестного назначения. Теперь он скоро сам услышит обо всем из средств информации. Надо бы, строго наказала она себе, позвонить ему за море и все объяснить. Но Джосс, как утверждали, пребывал в уединении. Он не стал выступать с публичными заявлениями относительно их встречи в Модесто. Ренкин же на пресс-конференции объявил, что сам он не против того, чтобы ученые до конца записали Послание, хотя не исключает и кое-какие трудности. Другое дело — перевод. Там будет необходим периодический контроль со стороны всех слоев общественности, в том числе и ведающих духовными и моральными ценностями.</p><p class="p1">Они уже подходили к садам Тюильри, разукрашенным всеми красками осени. Хрупкие немолодые люди — откуда-то из Юго-Восточной Азии — были поглощены спором. Черную литую решетку украшали выставленные на продажу разноцветные воздушные шарики. В центре бассейна белела мраморная Амфитрита. Мимо нее плыли игрушечные парусники, с вдохновением Магеллана спущенные на воду разыгравшимися детьми. На поверхность воды внезапно вынырнул сомик, перевернул первый кораблик, и дети притихли, слегка испуганные неожиданным появлением рыбы. Солнце уже клонилось к закату, и Элли почувствовала прохладу.</p><p class="p1">Они приблизились к Оранжерее, в крыле которой была выставка; плакат гласил: «Виды Марса». Совместная американо-франко-советская экспедиция закончилась успехом. Подвижные роботы сделали целую бездну цветных фотографий Марса. Некоторые из них, подобно снимкам «Вояджеров», фотографировавших внешние планеты Солнечной системы в 80-х годах, выходили за рамки науки в область искусства. На плакате был изображен ландшафт, отснятый на плато Элизиум. На переднем фоне высилась трехгранная пирамида, обтесанная со всех сторон ветром, возле ее основания виднелся ударный кратер. Специалисты утверждали, что свирепые марсианские ветры выточили ее много миллионов лет назад. Второй вездеход, опущенный на другой стороне Марса в области Сидония, завяз в дюне, и в Пасадене, как ни пытались, так и не смогли принять необходимые меры, чтобы вновь привести в движение взывающий о помощи аппарат.</p><p class="p1">В лице Сукхавати Элли обрела достойную соперницу: огромные черные глаза, прямая спина и уже другое, но не менее великолепное сари. Неблагодарная я, подумала Элли. Обычно ей удавалось поддерживать разговор, обдумывая про себя иные вопросы. Но сегодня ей трудно было думать даже о чем-то одном, не говоря уже о большем. Обсуждая достоинства ряда аргументов в пользу сооружения Машины, мысленным взглядом она вернулась на 3500 лет назад к вторжению ариев в Индию. В изложении Деви на победу претендовали оба противоборствовавших народа, и поэтому они искажали историческую правду в угоду патриотическим соображениям. В конце концов былая история превратилась в войну богов. «Наши», безусловно, воплощают добро, «чужие», конечно же, зло. Ей представился Дьявол, козлоногий и рогатый, с заостренным хвостом, каким от стал за истекшее тысячелетие, превратившись из своего индийского предка, у которого, по мнению Элли, на синем теле сидела слоновая голова.</p><p class="p1">— «Троянский конь» Баруды, быть может, и не столь уж дурацкая идея, — неожиданно для самой себя проговорила она. — Но у нас просто нет выбора, как сказал Си. Если они только захотят, то <em>окажутся</em> здесь всего через двадцать с чем-нибудь лет.</p><p class="p1">Они подошли к Триумфальной арке, над возведенным в романском стиле сооружением высилась героическая статуя Наполеона, стоящего в колеснице, — истинный апофеоз императора. Патетическое зрелище, если поглядеть издали, с внеземных высот. Они отдохнули на скамейке неподалеку, длинные тени женщин ложились на клумбу цветов, подобранных в тон знамени Французской революции.</p><p class="p1">Элли хотелось бы поговорить о личных неприятностях, но разговор мог принять политическую окраску. Во всяком случае, ей следовало избегать подробностей. К тому же они с Сукхавати были едва знакомы, и поэтому она попросила Деви рассказать о ее собственной жизни. Сукхавати согласилась без особых колебаний.</p><p class="p1">Родилась она в небогатой брахманской семье с матриархальными традициями, в штате Тамилнад на юге Индии. Матриархальные семьи не редкость в этих краях. Закончила Университет в Бенаресе. В медицинской школе в Англии познакомилась с Суриндаром Гхошем и пылко полюбила его. Но Суриндар был хариджаном, неприкасаемым, и принадлежал к столь низкой касте, что один его вид осквернял взгляд правоверного брахмана. Предкам Суриндара приходилось, подобно совам и летучим мышам, вести ночной образ жизни. Семья обещала отречься от нее, если она посмеет выйти замуж. Отец объявил, что его дочь не должна даже думать о подобном союзе. И если они с Гхошем «поженятся, он оплачет ее как мертвую. Тем не менее Деви решилась на брак. „Я слишком любила его, — объяснила она, — у нас не было выхода. Через год он умер от сепсиса, заразился от случайной царапины при вскрытии“.</p><p class="p1">Смерть Суриндара вместо того, чтобы примирить ее с семьей, побудила ее сделать обратное; получив ученую степень по медицине, Деви решила остаться в Англии. Там она обнаружила склонность к молекулярной биологии и сочла ее вполне подходящим для себя делом. И вскоре проявила настоящий талант в этой кропотливой науке. Интерес к репликации аминокислот заставил ее обратиться к происхождению жизни и как следствие — к жизни на иных планетах.</p><p class="p1">— Можно сказать, что вся моя научная карьера была просто цепью свободных ассоциаций.</p><p class="p1">Последнее время она исследовала характеристики органической материи, найденной на Марсе вездеходами; эти аппараты и сделали те потрясающие фотографии, мимо выставки которых они недавно прошли. Второй раз Деви замуж не вышла, хотя намекнула, что поклонники были. Последним оказался один бомбейский ученый, она назвала его «Аллахом компьютеров».</p><p class="p1">Потом женщины оказались в Лувре, во Дворе Наполеона. В центре его высилась только недавно выстроенная и с шумным негодованием встреченная стеклянная пирамида, а в высоких нишах вокруг располагались скульптурные изображения выдающихся деятелей французской культуры. Под каждой статуей прославленного мужа — существование почитаемых дам скульптурного подтверждения не находило — крупными буквами была обозначена его фамилия. Кое-где буквы отсутствовали: то ли по причине естественной эрозии, то ли по вине недовольных прохожих. Один или два монумента трудно было связать с фамилией уважаемого ученого мужа. Под фигурой, в наибольшей степени пострадавшей от людской злобы, остались лишь буквы LTA…</p><p class="p1">Солнце только садилось, и хотя Лувр закрывался еще не скоро, спутницы не стали туда заходить, а направились по набережной Сены назад вдоль Кэ д'Орсэ. На книжном развале торговля сворачивалась. Какое-то время женщины шли под руку на европейский манер.</p><p class="p1">В нескольких шагах впереди них оказалось молодое семейство. Родители держали за обе руки дочку лет четырех, время от времени подпрыгивавшую вверх. На миг оказываясь в невесомости, дитя испытывало явное блаженство. Родители говорили о консорциуме «Послание». Это, конечно, не было просто совпадением — в газетах ни о чем другом в сущности не писали. Муж высказывался за постройку Машины: новые предприятия должны увеличить занятость и во Франции. Женщина была осторожнее, но причин сформулировать не могла. А девочка скакала, вскидывая волосенки, совершенно не беспокоясь о том, что же человечеству делать с этим полученным со звезд чертежом.</p><p class="p1">На следующий день дер Хиир, Китц и Хоникатт с утра пораньше созвали совещание в Американском посольстве, чтобы получше подготовиться к прибытию государственного секретаря, намеченному на более позднее время. Собрание было секретным и проводилось в Черном зале посольства — комнате, электромагнитными средствами полностью изолированной от внешнего мира: даже сложные приборы электронной разведки были здесь бесполезны. Так по крайней мере утверждали. Впрочем, Элли казалось, что нетрудно создать и такие приборы, которые покончат со всеми подобными предосторожностями.</p><p class="p1">После вечера, проведенного с Деви Сукхавати, она обнаружила в отеле записку, попыталась связаться с дер Хииром, но сумела добраться только до Майкла Китца. Элли заявила ему, что принципиально против всяких секретов в этом вопросе. Совершенно очевидно, что Послание предназначено всей планете. Китц же ответил, что Америка и не собирается ничего скрывать от мировой общественности, а совещание имеет чисто консультативный характер — необходимо сформулировать позицию Штатов перед трудными переговорами. Он взывал к ее патриотизму и личной заинтересованности. Наконец, припомнил и приговор по делу Хаддена.</p><p class="p1">— Насколько я знаю, эта папка до сих пор покоится в вашем сейфе, и вы не прикасались к ней. Советую прочитать.</p><p class="p1">Она попыталась дозвониться до дер Хиира, и вновь безуспешно. Ну вот, явился, поставил весь «Аргус» с ног на голову и влез в твою собственную постель. Впервые за всю свою жизнь ты обнаружила, что влюбилась. И на тебе — чуть ли не на следующий день уже считает возможным не отвечать на звонки. Она решила идти на совещание — просто чтобы поглядеть Кену в глаза.</p><p class="p1">Китц горячо выступал за строительство Машины, Драмлин поддерживал его, но с осторожностью, дер Хиир и Хоникатт, по крайней мере внешне, выражали сомнение, а Питер Валериан корчился в муках нерешительности. Китц и Драмлин уже начали обсуждать, где строить всю эту штуку. Подготовка и даже сборка Машины на обратной стороне Луны из-за расходов на доставку становились невероятно дорогостоящим делом, как и предвидел Си.</p><p class="p1">— С учетом аэродинамического торможения дешевле послать один килограмм груза на Фобос или Деймос, чем на обратную сторону Луны, — высказался Бобби Буи.</p><p class="p1">— А где он, этот Фобосидеймос? — пожелал выяснить Китц.</p><p class="p1">— Это спутники Марса. Я имел в виду аэродинамическое торможение в его атмосфере.</p><p class="p1">— Сколько времени займет перелет до Фобоса или Деймоса? — спросил Драмлин, помешивая ложечкой кофе.</p><p class="p1">— Около года, правда, если завести целую флотилию транспортных кораблей и конвейером использовать их.</p><p class="p1">— Нечего и сравнивать с тремя днями полета до Луны, — вмешался Драмлин. — Буи, вы попусту тратите наше время.</p><p class="p1">— Но это же только предложение, — возразил тот. — Повод для размышлений.</p><p class="p1">Дер Хиир казался рассеянным и невнимательным. Он явно нервничал — то старался глядеть мимо Элли, то безмолвно молил ее взглядом о чем-то. В этом она усмотрела основание для надежды.</p><p class="p1">— Если вас пугает перспектива сооружения «машины Судного дня», — рассуждал Драмлин, — подумайте лучше о затратах энергии, необходимых для его осуществления. «Машина Судного дня» потребует огромного количества энергии. Если из текста не выяснится, что они предусмотрели гигаваттный ядерный реактор, про эту идею можно будет спокойно забыть.</p><p class="p1">— И почему вы, ребята, так торопитесь приступить к сооружению Машины? — спросила Элли сразу у Китца и Драмлина. Они сидели напротив, на столе между ними стояло блюдо с рогаликами.</p><p class="p1">Прежде чем ответить, Китц поглядел на Хоникатта, потом на дер Хиира.</p><p class="p1">— Наше совещание секретно, — начал он. — Все мы, конечно, знаем, что никто из присутствующих не обмолвится ни о чем перед своими русскими друзьями. Все выглядит примерно так: мы не знаем, каково предназначение этой Машины, но из выводов Дейва Драмлина следует, что речь может идти о новых технологиях, даже отраслях техники. И сооружение Машины имеет экономическое значение. А может быть, и военное. По крайней мере так думают русские. Видите ли, русские попали в трудное положение. Возникла совершенно новая отрасль техники, и им опять придется держаться вровень со Штатами. Что, если где-нибудь в Послании найдется описание оружия, способного принести верную победу?.. Или же из него можно будет просто извлечь существенные экономические выгоды? Откуда им знать? Им придется напрягать экономику, чтобы справиться с постройкой. Вы заметили, что Баруда вел речь об экономической эффективности. Если уничтожить Послание целиком — сжечь ленты с данными, разрушить радиотелескопы, — то русские смогут сохранить военный паритет. Поэтому они так осторожны. Вот почему мы вовсе не склонны к этой идее.</p><p class="p1">Ну рыба-рыбой, подумала Элли о Китце, правда, далеко не глуп. Холодных отстраненных людей никто не любит. И Китц выработал некую маску дружелюбия. С точки зрения Элли, толщина этой маски была только в одну молекулу.</p><p class="p1">— А теперь позвольте уже мне задать <em>вам</em> вопрос, — продолжил он. — Вы заметили, что сказал Баруда? Он упомянул, что, оказывается, часть данных утаена. Разве в Послании <em>имеются</em> пропуски?</p><p class="p1">— Только в самом начале, — отвечала она, — в первые недели. Были потом и кое-какие пробелы в китайской части передачи, информации еще не хватает всем сторонам. Но, по-моему, это не может служить поводом для беспокойства. Мы заполним пропуски при повторении.</p><p class="p1">— Если оно состоится, — буркнул Драмлин.</p><p class="p1">Потом дер Хиир перевел дискуссию на практические рельсы: что делать, когда радиоастрономы запишут введение; какие американские, германские и японские фирмы следует заранее оповестить о возможности крупных исследовательских работ; как подобрать ведущий научный и технический персонал для сборки Машины, если такое решение будет принято, и уж совсем коротенько, как обеспечить поддержку работ в конгрессе и среди народа. Он не преминул заметить, что это всего лишь планы, что решение еще не принято и сомнения Советов относительно троянского коня искренни, хотя бы в известной мере.</p><p class="p1">Китца интересовал и состав экипажа — раз кресел пять, в них сядут пять человек. Кто окажется там? Кому решать? Экипаж скорее всего будет интернациональным. Сколько американцев? Сколько русских? Кто еще? Мы не знаем, что случится с теми, кто сядет в кресла, но пусть в них окажутся наиболее пригодные для этого люди…</p><p class="p1">Элли не клюнула на живца, и он продолжил:</p><p class="p1">— Но самое главное, кто будет платить и за что, кто будет изготовлять, кто будет контролировать сборку. Следует попытаться выторговать здесь для Америки еще одного члена экипажа.</p><p class="p1">— Так как, мы по-прежнему намереваемся посылать самых подготовленных специалистов? — несколько прямолинейно заметил дер Хиир.</p><p class="p1">— Конечно, — отвечал Китц. — Только кого считать лучшими? Ученых? Людей из военной разведки? Или просто сильных и выносливых? А может быть, патриотов? Это вовсе не ругательство, не хмурьтесь. И потом, — намазывая маслом рогалик, он поглядел на Элли, — следует учесть также вопросы пола. То есть существование двух полов. Посылать ли только мужчин? А если экипаж будет смешанным, то кого окажется на одного больше — мужчин или женщин? Пять — число, как все знают, нечетное. Все ли члены экипажа сумеют сработаться? Словом, продолжение работ чревато бездной упорных переговоров.</p><p class="p1">— На мой взгляд, это неверно, — возразила Элли. — Речь ведь идет не о месте в посольстве, не о плате за участие в финансировании предвыборной кампании. Дело обстоит куда серьезнее. Кстати, неужели, по-вашему, здесь может найтись место для какого-нибудь мускулистого недоумка, дитятки двадцати годов от роду, ничего еще не знающего о мире, умеющего только бегать стометровку и послушно выполнять приказы? Или для какого-нибудь торгующего собой политикана? Неужели подобные личности могут иметь хоть какое-то отношение к этому делу?</p><p class="p1">— Конечно, вы правы, — улыбнулся в ответ Китц. — Я считаю, мы сумеем подобрать людей и выработать правильные критерии.</p><p class="p1">Осунувшийся, с темными кругами под глазами, дер Хиир во многом потерял в личном обаянии. Закончив совещание, он чуть улыбнулся Элли… одними губами. У дверей их уже ожидали посольские лимузины, чтобы доставить назад в Елисейский дворец.</p><p class="p1">— Я поясню вам, почему лучше послать русских, а не американцев, — говорил ВГ. — Когда вы открывали собственную страну… во времена всяких пионеров, трапперов, скаутов и всего прочего… вам никто не оказывал сопротивления, некому было… вы мчались вперед через весь континент от Атлантики к Тихому океану. И вот результат: вам всегда <em>кажется</em>, что дело разрешится самым легким способом. С нами все обстоит иначе. Нас покорили монголы. Конная культура превосходила нашу. И в своем продвижении на восток мы были куда осторожней. Мы не сидели в глуши, ожидая, что все сложится само собой. Русский народ более приспособлен к сопротивлению, чем вы. Еще соображение — вы, американцы, привыкли к тому, что располагаете самой передовой технологией. Мы же привыкли постоянно догонять вас, в этом смысле теперь каждый человек на Земле сделался русским, в историческом, так сказать, плане. Отсюда следует, что мы более пригодны для выполнения этой задачи, чем американцы.</p><p class="p1">Даже короткий разговор с глазу на глаз сулил ВГ неприятности… впрочем, и ей тоже, о чем не замедлил напомнить Китц. Во время научных встреч в Америке или Европе ВГ разрешалось провести с ней вечерок. Чаще всего его сопровождал кто-нибудь из коллег или «нянька» из КГБ, именовавшаяся переводчиком, даже когда сотрудник этого ведомства владел английским хуже, чем сам ВГ. Или же этот специалист именовался ученым секретарем какой-нибудь комиссии Академии наук; понятно, что познания его в научных вопросах всегда оставляли желать лучшего. ВГ лишь качал головой, когда его спрашивали о них. Но в целом и сам он смирился с ними, принимая их в игру в качестве платы за посещение Запада. Иногда в голосе ВГ слышались даже нотки приязни, если речь заходила о них: подумайте только, как это сложно изображать в чужой стране специалиста по совершенно незнакомому вопросу… занятие не слишком приятное. Быть может, в глубине души и сами приставляемые к ВГ «няньки» тяготились собственным делом так же, как и он их присутствием.</p><p class="p1">Они сидели в ресторанчике «У Богов» за тем же столиком у окна. Было прохладно, приближалась зима, и молодой человек с длинным синим шарфом на шее — единственным знаком холодной погоды — торопливо шагал мимо лотков с замороженными устрицами. По непривычно сдержанным словам Луначарского Элли догадывалась о существовании разногласий у членов советской делегации. Русские были убеждены, что в грядущей пятилетке Машина каким-то образом позволит увеличить военно-стратегическое превосходство Соединенных Штатов. Сам же ВГ был просто шокирован предложением Баруды: сжечь ленты с данными и разрушить радиотелескопы. ВГ не знал об этом заранее. Русские сыграли важнейшую роль в записи Послания, обеспечили долготное покрытие в большей мере, чем любая другая страна, кроме того, лишь у них были океанские радиотелескопы, напоминал ВГ, так что они должны играть существенную роль и в дальнейшем. Элли заверила его, что, если бы все решала только она, никаких проблем не возникло бы.</p><p class="p1">— Понимаете, ВГ, из наших телетрансляций они обнаружили, что Земля вращается и на ней существует множество наций. Об этом свидетельствовала уже первая передача с Олимпийских игр. А все последующие могли только подтвердить этот факт. И раз они столь мудры, как мы считаем, то им ничего не стоило бы учесть вращение Земли при передаче сигнала, чтобы Послание принимала лишь одна страна. Они не стали этого делать и, значит, хотят, чтобы Послание принимала вся планета. <em>Не может быть</em> только американской или только русской Машины. Наши… клиенты хотят совсем не этого.</p><p class="p1">Потом она сказала ему, что вовсе не уверена, будет ли хоть как-то участвовать в сооружении Машины или в выборе экипажа. Назавтра она собиралась возвращаться в Штаты, в основном чтобы ознакомиться с самыми свежими данными, полученными за последние несколько недель. Пленарные заседания консорциума шли своим чередом, прекратить их не представлялось возможным. ВГ, напротив, просили задержаться подольше. Советскую делегацию теперь возглавлял недавно прибывший министр иностранных дел.</p><p class="p1">— Боюсь, что все это плохо кончится, — проговорил ВГ. — Столько всего может не получиться. Технологические ошибки… Политические… Человеческие, наконец. И даже если мы продеремся через все это, даже если из-за Машины не начнется война, если мы не ошибемся при постройке ее, а потом не взорвемся, я буду тем не менее беспокоиться.</p><p class="p1">— О чем же? Что вы имеете в виду?</p><p class="p1">— В лучшем случае нас представят дураками.</p><p class="p1">— Кто же?</p><p class="p1">— Эрроуэй, разве вы не понимаете, — жилка на шее Луначарского билась. — Я удивлен, что вы не видите этого. Земля это… гетто. Да, гетто. И мы, люди, заперты здесь под замком. Вообще-то мы слыхали, что там, за стенами, есть большие города с широкими бульварами, по которым в дрожках раскатывают надушенные красавицы в мехах. Но эти города где-то там, далеко, а у нас, даже у наших богачей, нет денег на такую поездку. Во всяком случае, мы понимаем, что не нужны там. Иначе вряд ли они позабыли бы нас и эту трогательную деревеньку. И вот приглашение, — так выразился Си. — Роскошное, элегантное… они послали нам визитную карточку с виньеткой и пустые дрожки. Вот выберем пятерых… и дрожки отвезут эту деревенщину в… Куда же?.. В Варшаву, в Москву, может быть, даже в Париж. Конечно, кое-кто и хотел бы поехать. Всегда найдутся люди, которым льстит уже то, что они получили приглашение, иные, возможно, даже мечтают вырваться из нашего захолустья. И что вы думаете там произойдет? Великий князь пригласит нас на обед? Или же президент тамошней Академии примется с интересом расспрашивать о повседневной жизни в нашем грязном штетле?<a href="ch2.xhtml#id2" class="a">[29]</a> Или митрополит Русской Православной церкви прочтет лекцию о сравнительном религиоведении? Нет, Эрроуэй. Мы будем шарахаться от автомобилей в огромном городе, а его жители будут смеяться, скрывая ухмылку ладонью! Нас будут демонстрировать как некий раритет. И чем более отсталыми мы окажемся, тем лучше им будет, тем увереннее они станут себя чувствовать. Это просто квота. Каждые несколько столетий пятерка избранных может провести уик-энд на Веге. Надо же пожалеть отсталых провинциалов, показать им, как живет столица.</p></span></span>
