<span><span id="id12"><div class="title3">
<p class="p">10. Прецессия равноденствий</p>
</div><div class="epigraph">
<p class="p1">О, Зевс! О, что скажу я? Соблюдаешь</p>
<p class="p1">Ты точно ль нас? Иль даром ты почтен</p>
<p class="p1">От нас такою славой, а поставлен</p>
<p class="p1">Над смертными лишь случай?</p>
<p class="text-author">Еврипид. «Гекуба»</p>
</div><p class="p1">Все сложилось совершенно неожиданным образом. Она представляла себе, как Палмер Джосс прибудет в «Аргус» и сам увидит, как радиотелескопы записывают сигнал… и этот огромный зал, хранящий на магнитных лентах и дисках результаты многих месяцев работы. Сперва Джосс будет задавать ей вопросы, а потом они займутся компьютерными распечатками все еще непостижимого Послания со всеми этими бесчисленными нулями и единицами. Ей даже не пришло в голову отвести время на подготовку к философским и теологическим спорам. Но Джосс отказался от поездки в «Аргус», объясняя свое решение тем, что его интересуют не магнитные ленты, а характеры людей. Для бесед с проповедниками куда более подходил Питер Валериан: человек скромный и не лукавствующий, наконец, истинный христианин, который был предан вере всю свою жизнь. Но президент скептически отнеслась к этой идее и потребовала проведения переговоров между обеими сторонами, недвусмысленно намекнув, что рассчитывает на присутствие самой Элли.</p><p class="p1">Джосс настоял на том, чтобы дискуссия происходила в музее Библейского научно-исследовательского института в городе Модесто. И теперь она глядела за спину дер Хиира на стеклянную перегородку, отделявшую библиотеку от выставочного помещения. Как раз неподалеку размещалась пластиковая копия отпечатков следов динозавра, обнаруженных на песчаниках вблизи Красной реки: они перемежались со следами обутого в сандалии человека, а это доказывало, как утверждалось в путеводителе по музею, что некогда люди и динозавры были современниками, по крайней мере в Техасе. Отсюда следовало и наличие сапожников в мезозое. На этом основании авторы путеводителя утверждали, что вся теория эволюции — чистая ложь. О том, что многие палеонтологи, напротив, считают камень подделкой, упомянуть не сочли нужным.</p><p class="p1">Эти следы являлись частью пространной экспозиции под названием «Дарвиново заблуждение». Слева от нее находился маятник Фуко, в качестве научного доказательства, подтверждавшего, что Земля вертится. Справа Элли видела часть безумно дорогой голографической установки фирмы «Мацусита» — с небольшого театрального помоста трехмерные изображения самых известных божеств могли обращаться прямо к верующим.</p><p class="p1">К ней же самой в этот момент непосредственно обращался преподобный Билли Джо Ренкин. Она до последнего мгновения не знала, что Джосс пригласил Билли Джо, и новость удивила ее. Обоих разделяли нескончаемые теологические разногласия: грядет ли Второе пришествие и когда именно, будет ли Судный день составной его частью, какую роль играет чудо в повседневных службах и прочее. Но недавно произошло широко разрекламированное примирение — ради благоденствия фундаменталистской общины в Америке. Разрядка отношений между Соединенными Штатами и Советским Союзом привела к глобальному сглаживанию противоречий. И, быть может, проводя диспут именно здесь, Палмер Джосс просто возмещал часть платы за примирение. Очевидно, Ренкин решил, что выставка подкрепит его необходимыми фактами, если в беседе возникнут научные противоречия. И теперь, через два часа после начала дискуссии, Ренкин то бичевал, то просил. Его безукоризненный костюм, наманикюренные ногти и ослепительная улыбка находились в некотором контрасте с рассеянным, взъерошенным и куда более потрепанным на вид Джоссом. Склонив голову и полуприкрыв глаза, с неуловимой улыбкой на лице, Джосс, казалось, молился. Пока ему нечего было сказать. Речи Ренкина, пожалуй, кроме истолкования понятия экстаза, по ее мнению, мало чем отличались от телевизионных бесед самого Джосса.</p><p class="p1">— Вы, ученые, застенчивы, — настаивал Ренкин. — Вы любите прятать свой светоч под корзиной. О содержании ваших работ никогда нельзя догадаться по заглавию. Первая работа Эйнштейна по теории относительности называлась «Электродинамика движущихся тел». И никакого Е=mc<em>2</em> на обложке! Нет, сэр, «Электродинамика движущихся тел»! Думается, если бы Господь решил предстать перед огромной компанией ученых — например, на заседании какой-нибудь ассоциации, — они тут же сгоношили бы статейку под названием вроде «О спонтанном дендритоформном горении в воздухе». Гипотез так много, что даже сами ученые заявляют, что их следует экономить, но они никогда и слова не скажут о Боге. Ученые вообще настроены слишком скептически. — Судя по движению головы Ренкина, Элли заключила, что слова предназначены дер Хииру. — Вы, ученые, вечно все оспариваете, по крайней мере пытаетесь это сделать. Словно бы вам никогда не говорили: «Оставь-ка в покое» или «Не крути эту штуку, пока не сломал». Вы всегда стремитесь проверять — правильно ли то, что вы придумали. Но ваше «правильно» относится лишь к эмпирическим чувственным данным, к тому, что можно потрогать и увидеть. В вашем мире нет места ни откровению, ни вдохновению. И с самого начала вы исключаете из рассмотрения все, что относится к религии. Я не верю ученым, потому что сами вы ни во что не верите.</p><p class="p1">Несмотря на внутренний протест, ей подумалось, а ведь Ренкин-то прав. И его еще считают самым тупым среди современных телеевангелистов. Нет, он не туп, поправила она себя, это он считает тупицами собственных прихожан. А сам-то, как она могла предположить, человек крайне смышленый. Надо ли ей возражать? И дер Хиир, и местная музейная публика записывали дискуссию, но, хотя обе стороны согласились, что записи не будут опубликованы, она боялась поставить в затруднительное положение проект или президента. Однако нападки Ренкина становились все яростнее, а дер Хиир и Джосс не пытались ему возражать.</p><p class="p1">— Я полагаю, что вы ждете ответа, — вдруг услышала Элли свой собственный голос. — Так сказать, официальной научной точки зрения по этим вопросам не существует, и я не взяла бы на себя смелость говорить от имени всех ученых, даже от лица тех из них, кто работает в проекте «Аргус». Но если вы не возражаете, я хочу сделать несколько замечаний.</p><p class="p1">Ренкин энергично, с поощрением закивал, Джосс терпеливо ожидал.</p><p class="p1">— Я хочу, чтобы вы имели в виду — я не собираюсь нападать на чью-либо систему верований. Что до меня, исповедуйте что угодно, даже если вовсе нетрудно показать ошибочность вашей доктрины. Многое из того, о чем говорили вы и преподобный Джосс — недавно я видела его выступление по телевизору, — нельзя просто пропустить мимо ушей. Над вашими соображениями следует еще поразмыслить. Но позвольте мне попытаться объяснить, почему я не согласна с вами.</p><p class="p1">Пока, подумала она, я просто сама кротость.</p><p class="p1">— Вам не нравится научный скептицизм. Но он является следствием того, что мир очень сложен. И самая первая идея не всегда справедлива. Кроме того, люди склонны обманывать себя. Ученые в том числе. Все отвратительные социальные доктрины некогда поддерживались учеными — рядовыми, известными и знаменитыми. Конечно, и политиками. И известными религиозными лидерами. Взять, например, рабство или, скажем, нацизм как вариант расизма. Ученые ошибаются, но и теологи тоже, всякий совершает ошибки. Такова участь человека. Вы и сами утверждаете: «Есмь, чтобы ошибаться». Поэтому, чтобы избежать ошибок или по крайней мере свести к минимуму возможность их возникновения, приходится прибегать к скепсису. Идеи требуют проверки: их следует опробовать на строгих фактах и доказательствах. Я не думаю, что можно сразу изречь правду, но истина постепенно открывается в столкновении идей, когда любой скептик из собственного или чужого опыта может выявить разногласия. Об этом свидетельствует вся история науки. Подобный метод не совершенен, но это просто единственный способ, позволяющий получить удовлетворительные результаты. Теперь обратимся к религиям. Здесь я вижу множество противоречивых мнений. Например, христиане считают, что возраст Вселенной выражается конечным числом лет. Эта выставка свидетельствует, что некоторые христиане, а также евреи и мусульмане полагают, что Вселенной всего шесть тысяч лет. С другой стороны, по мнению индуистов — а их в мире достаточно, — Вселенная бесконечно стара и неоднократно испытывала периоды промежуточного творения и уничтожения. Эти точки зрения не могут быть правильными одновременно. Либо Вселенной конечное число лет, либо она бесконечно стара. Ваши друзья, — Элли махнула в сторону стеклянной двери, за которой мимо вывески «Дарвиново заблуждение» проходила группа музейных работников, — оспаривают мнение индусов. Ведь Бог поведал им что-то другое, чем вам. А вы слышите только свой собственный голос. — Не крепко ли? — подумала она. — Все основные религии Земли противоречат друг другу. И не могут быть правы одновременно. Что, если все они заблуждаются? Это всего лишь предположение, не более. Ведь и вам интересно узнать истину, не так ли? И получается, что выбраться из всех противоречий можно только с помощью скептицизма. Ко всем вашим религиям и верованиям я отношусь столь же скептично, как и к любой новой научной идее. Но в моей работе идеи зовутся гипотезами, а не откровениями и вдохновением.</p><p class="p1">Джосс шевельнулся, но ответил Ренкин:</p><p class="p1">— Нельзя даже счесть откровений, исполненных Богом пророчеств, данных в Ветхом и Новом заветах. О приходе Спасителя говорится у Исайи, стих пятьдесят третий, у Захарии, стих четырнадцатый, в Книге Царств, стих семнадцатый. Что Он родится в Вифлееме, предсказано у Михея, стих пятый. А то, что Спаситель будет из дома Давидова, предсказано в Евангелии от Матфея, стих первый и…</p><p class="p1">— У Луки. Вас не смущают эти генеалогии? И Матфей, и Лука приводят совершенно различные родословные. И что прискорбнее всего, родословная идет от Давида к Иосифу, а не к Марии. Или Бог-отец ни при чем?</p><p class="p1">Ренкин продолжал, словно не замечая, или просто не понял ее:</p><p class="p1">— Священство и страсти Христовы предсказывались Исайей, стихи пятьдесят второй и пятьдесят третий, а еще в двадцать втором псалме. То, что продадут его за тридцать сребреников, следует из Захарии, стих одиннадцатый. Честный человек не может отрицать исполнившегося пророчества. В Библии говорится и о нашем времени. Упоминаются Израиль, арабы, Гог и Магог, Америка и Россия, ядерная война — все можно отыскать в Библии. Это может заметить всякий, у кого есть хоть унция разума. Для этого не надо быть рассеянным профессором колледжа.</p><p class="p1">— Ваша беда, — отвечала Элли, — в недостатке воображения. Все эти пророчества… ну почти каждое… темны, двусмысленны, неточны, открыты для плутовства. Они допускают множество интерпретаций. Даже то откровение… обещание Христа, что некоторые из присутствующих узрят Царствие небесное. И не говорите, что оно внутри нас. Слушатели понимали Его буквально. Вы приводите исполнившиеся пророчества и забываете об остальном. Не следует забывать: все жаждут, чтобы пророчество сбылось. Но представьте себе, что ваш Бог — всесильный, вездесущий и сочувствующий людям — действительно захотел оставить памятку грядущим поколениям, скажем сделать так, чтобы отдаленные потомки Моисея не усомнились в существовании Господа. Это же так легко, тривиально. Какая-нибудь пара загадочных фраз и строгая заповедь — хранить их без изменений…</p><p class="p1">Джосс почти незаметно наклонился вперед.</p><p class="p1">— Ну например…</p><p class="p1">— Например, «Солнце — это звезда», или «Марс — красно-бурая пыльная пустыня с вулканами, подобная Синаю», или… позвольте мне прикинуть. — Она быстро набросала несколько цифр. — «Земля в миллион миллионов миллионов миллионов раз тяжелее ребенка». Или — мне кажется, вас обоих смущает специальная теория относительности, хотя она, правда, ежедневно находит подтверждение в ускорителях частиц, космические лучи тоже подтверждают ее, — это могли быть буквально несколько слов: «Не существует предпочтительной системы отсчета». Или даже: «Да не будешь странствовать быстрее света». Словом, что угодно, о чем люди не могли знать три тысячи лет назад.</p><p class="p1">— Ну а что еще вы могли бы предложить?</p><p class="p1">— Да, таких положений бесконечное множество… по крайней мере не меньше одного на каждый закон физики. Ну скажем: «В каждом камне заключены свет и тепло», или даже: «Земля следует двум, магнит — трем», — я имею в виду, что сила тяготения обратно пропорциональна квадрату расстояния, а сила взаимодействия магнитных диполей обратно пропорциональна его кубу. Если перейти к биологии, — она кивнула в сторону дер Хиира, молчавшего, словно при исполнении обета, — суть жизни определяется переплетением двух лент.</p><p class="p1">— Интересный пример, — заметил Джосс. — Вы имеете в виду, конечно, ДНК. А помните символ медицины? Скажем, у армейских врачей на воротнике. Он зовется «кадуцей». Это две сплетенные змеи. Кусочек двойной спирали. С древних времен он был символом сохранения жизни. Не тот ли это знак, который вы ищете?</p><p class="p1">— Ну мне казалось, что там геликоид, а не спираль. В разных сказках столько пророчеств и символов, что некоторые из них могут быть научно истолкованы даже случайно. Впрочем, я не могу отрицать подобной возможности. Не исключено, что вы правы. Может быть, именно кадуцей и есть знак, данный нам Богом. Но ведь это вовсе не христианский символ, прочие современные религии тоже не пользуются им. Сомневаюсь, что вы станете утверждать или доказывать, что боги общались лишь с древними греками. Словом, я хочу сказать, что если бы Господь действительно хотел поведать нам нечто, не выходя за пределы священных писаний, то Он мог бы и получше справиться с этим делом. Ведь Он не обязан был ограничиваться только словами? Почему вокруг Земли не обращается колоссальное распятие? Почему текст десяти заповедей не врезан в поверхность Луны? Почему в Библии Бог повсюду, а в жизни Его не разыщешь?</p><p class="p1">Джосс явно готов был возразить, лицо его отражало безмятежный покой, но поток слов Элли трудно было остановить… должно быть, он просто посчитал это невежливым.</p><p class="p1">— И еще, почему вы решили, что Господь нас оставил? В то, что по вторникам Он беседовал с пророками и патриархами, вы верите. По-вашему, Бог всемогущ и всеведущ. Что тогда мешает Ему прямо и недвусмысленно изъявить свою волю каждому поколению, ну хотя бы однажды? Так ведь, друзья? Почему же мы не видим Его?</p><p class="p1">— А вот я <em>вижу</em>, — с огромным воодушевлением отозвался Ренкин. — Он повсюду. Наши молитвы не остаются без ответа. И в нашей стране десятки миллионов людей пережили второе рождение, узрев славу Божию. Библия разговаривает с нами столь же прямо и недвусмысленно, как и во времена Моисея и Иисуса.</p><p class="p1">— Не надо. Вы прекрасно понимаете, что я имею в виду. Где сейчас ваши пылающие кущи, где столбы огня, почему величественный голос с небес не говорит нам «Аз есмь сущий»? Зачем Господу проявлять себя столь скучно и незаметно, если Он может просто и ясно показать нам, что существует.</p><p class="p1">— Голос с небес вы-то как раз и обнаружили, — непринужденно заметил Джосс, когда Элли умолкла, чтобы перевести дух. Он не отводил от нее глаз.</p><p class="p1">Ренкин мгновенно подхватил идею.</p><p class="p1">— Именно. Я тоже хотел об этом сказать. У Авраама и Моисея не было радиотелескопов, как же они смогли бы понять Бога, если бы Господь решил общаться с ними с помощью частотной модуляции? Быть может, это Бог по-новому обращается к нам и допускает новое толкование. Или же это не Бог, а…</p><p class="p1">— Да, Сатана… Я слыхала об этом. Это же просто безумие! Не повторяйте, если вы в своем уме. Почему вы решили, что мы получили послание от вашего Бога и что мы слышим голос Господень? Где это сказано, чтобы Бог отвечал на молитву, повторяя ее?</p><p class="p1">— Извините, нацистская хроника — не молитва, — отозвался Джосс. — Вы же сами утверждаете, что таким образом он привлекает наше внимание.</p><p class="p1">— Тогда почему Бог вдруг решил обратиться к ученым? Почему не к проповедникам вроде вас?</p><p class="p1">— Со <em>мной</em> Господь говорит постоянно, — Ренкин ткнул себя в грудь указательным пальцем. — И с преподобным Джоссом. И Господь говорит нам, что грядет Откровение. Близок и Судный день, грешники будут осуждены, избранные вознесутся на небеса…</p><p class="p1">— А Господь не сказал вам, что обратится к человечеству на радиочастотах? Может быть, ваши переговоры с Господом где-нибудь зарегистрированы, и можно проверить, что там у вас было на самом деле? Или придется верить вам только на слово? И почему только Господь обратился к нам, радиоастрономам, а не к вам, не к священнической братии? И разве не странно, что, впервые обратившись к людям за последние две тысячи лет, Господь избрал простые числа… Адольфа Гитлера и Олимпийские игры 1936 года? У такого Бога, должно быть, гипертрофированное чувство юмора.</p><p class="p1">— Мой Бог может испытывать все и обладать любыми чувствами…</p><p class="p1">При первом же намеке на конфликт дер Хиир встрепенулся.</p><p class="p1">— Быть может, мне следует напомнить, зачем мы собрались здесь?</p><p class="p1">Все, грядет Кен-миротворец, подумала Элли. Отвагу он проявляет, если не отвечает за последствия. Зато на словах храбр… наедине с нею. Но в научной политике, особенно как представитель президента, он постоянно выказывает непревзойденную гибкость, а если необходимо, пойдет на компромисс даже с Дьяволом. Она осеклась, подметив невольный теологизм.</p><p class="p1">— Речь не об этом, — она словно бы не заметила вмешательства дер Хиира. — Если сигнал посылает нам Бог, почему же он исходит только из одной точки на небе, к тому же расположенной рядом с одной из самых ярких и близких к нам звезд? Почему же радиоволны не приходят к нам отовсюду, со всего небосклона, подобно космическому фоновому излучению? Сигнал, исходящий от одной звезды, легче истолковать как действия иной цивилизации. Вот если бы сигнал шел со всего небосклона… Тогда можно было бы говорить, что он от вашего Бога.</p><p class="p1">— Стоит Ему пожелать, и сигнал будет исходить из дыры в заду Малой Медведицы, — Ренкин заметно побагровел. — Прошу прощения, но вы просто достали меня. Бог может все!</p><p class="p1">— Вы, мистер Ренкин, стремитесь объяснять с помощью Бога все непонятное. И все тайны Вселенной для вас объясняются Богом, все загадки, бросающие вызов нашему разуму. Это так просто — отключить собственный ум и твердить: все сотворил Господь.</p><p class="p1">— Мэм, я приехал сюда не за тем, чтобы выслушивать оскорбления…</p><p class="p1">— Ах, вы приехали, а я-то думала, что здесь ваше логово.</p><p class="p1">— Мэм… — Ренкин собирался что-то сказать, но передумал. Глубоко вздохнув, он продолжил: — Мы с вами живем в христианской стране, и христиане обладают истинным пониманием Бога, а потому на нас возложена священная обязанность убедиться, чтобы святые слова Господа понимались…</p><p class="p1">— Я тоже христианка, но какое вы имеете право делать заявление от моего лица? Вы погрязли в суевериях, не изменившихся с пятого века. Но с тех пор человечество пережило и эпоху Возрождения, и эпоху Просвещения. Вы, наверное, и не слыхали об этом?</p><p class="p1">Джосс и дер Хиир даже привстали.</p><p class="p1">— Пожалуйста, — попросил Кен, не отводя глаз от Элли. — Едва ли мы сумеем выполнить просьбу президента, если не будем придерживаться повестки дня.</p><p class="p1">— Хорошо, вы же хотели «откровенного обмена мнениями».</p><p class="p1">— Уже полдень, — заметил Джосс, — не сделать ли нам небольшой перерыв, чтобы перекусить?</p><p class="p1">Оказавшись за пределами конференц-зала, Элли подошла к оградке вокруг маятника Фуко и торопливо зашептала дер Хииру:</p><p class="p1">— Я просто хотела выбить из него это самонадеянное всезнайство, эти претензии на ложную святость.</p><p class="p1">— Ну зачем это, Элли? С него довольно собственного невежества и заблуждений!</p><p class="p1">— Да, почему он не может заткнуться? Он же совращает миллионы…</p><p class="p1">— Милая, он думает о тебе то же самое.</p><p class="p1">Вернувшись с дер Хииром в зал после ленча, Элли сразу же заметила, что Ренкин приуныл, а первым заговорил Джосс, державшийся весьма бодро и приветливо, явно не только из одной любезности.</p><p class="p1">— Доктор Эрроуэй, — начал он. — Я понимаю, что вам не терпится ознакомить нас с вашими открытиями и прибыли вы сюда не для теологических диспутов. Но прошу вас еще чуточку потерпеть. У вас колкий язык. Просто не припомню, чтобы брату Ренкину случалось так волноваться на диспутах.</p><p class="p1">Он мельком глянул на коллегу: расстегнув воротник и распустив галстук, тот пальцем водил по желтой коже портфеля.</p><p class="p1">— Меня заинтересовало кое-что из ваших сегодняшних высказываний. Вы назвали себя христианкой, но тогда позвольте спросить, как же возможно такое?</p><p class="p1">— Ну, знаете, таких вопросов не было в той анкете, на которую я отвечала перед тем, как меня произвели в директора обсерватории «Аргус». Я считаю себя христианкой потому, что Иисус Христос, на мой взгляд, был самым замечательным из исторических персонажей. По-моему, Нагорная проповедь является высочайшим достижением мысли во всей истории человечества, более совершенной речи просто не сочинить. И только христианская мысль «возлюби врага своего» открывает для нас перспективу решения проблемы ядерной войны. Мне бы хотелось, чтобы Христос оказался сейчас среди нас. Одно присутствие его благотворно воздействовало бы на всех людей планеты. Но я вижу в нем только человека. Великого, отважного… ясно видевшего всю неприглядную правду. И считаю, что он не был Богом, или сыном Бога, или даже его внучатым племянником.</p><p class="p1">— Ну вы просто <em>не хотите</em> поверить в Бога, — констатировал Джосс. — И не веря в Бога, надеетесь считаться христианкой. А теперь спрошу вас коротко и прямо: <em>верите</em> ли вы в Бога?</p><p class="p1">— Странная формулировка. Отрицательный ответ можно понять двояко: или я уверена в том, что Бог <em>не существует</em>, или я не уверена в том, что Он <em>существует</em>. Но это весьма отличные друг от друга утверждения.</p><p class="p1">— А так ли уж велика разница, доктор Эрроуэй? Вас можно называть доктором? Как ученый вы верите в принцип «бритвы Оккама», так ведь? И из двух версий объяснения одного и того же факта следует выбирать простейшую. Вы говорите, что этот принцип подтверждается всей историей науки. Тогда, если вы всерьез сомневаетесь в том, <em>существует</em> ли Бог — с вашей точки зрения, эти сомнения достаточно обоснованы и не позволяют вам присоединиться к верующим, — значит, вы способны представить себе мир <em>без</em> Бога, такой мир, где Он не присутствует во всей повседневной жизни, мир, в котором люди умирают, не зная Бога, мир, где нет воздаяния, где нет награды. Все святые, все пророки, все верующие, с вашей точки зрения, пустомели и простофили. Так сказать, жертвы самообмана. В подобном мире наше существование на Земле не имеет никакой цели и смысла… Так, просто атомы сталкиваются — вот и все. Даже когда эти атомы находятся внутри человеческого существа. Мне подобный мир кажется бесчеловечным и отвратительным. Я не хочу жить в таком мире. Но если <em>вы</em> действительно можете вообразить его, зачем же колебаться? Зачем придерживаться середины? Если вы и так верите во все это, не проще ли сказать: Бога нет? Вы изменяете принципу «бритвы Оккама». И, по-моему, все это чистый треп. Как может истинный ученый быть даже агностиком, если он в состоянии <em>представить себе</em> мир без Бога? Да вам же ничего другого просто не остается — вы вынуждены быть атеистами.</p><p class="p1">— Я было подумала, что вы станете доказывать, что Бог-то и есть простейшая гипотеза, — отвечала Элли, — но вы сказали куда лучше. И если бы здесь шла научная дискуссия, я, пожалуй, согласилась бы с вами, преподобный Джосс. Наука по сути своей анализирует и корректирует гипотезы. Если уже открытые законы природы объясняют все известные факты, не прибегая к сверхъестественному, и по крайней мере не хуже, чем ваша идея Бога, то до поры до времени я могу называть себя атеисткой. Но если хотя бы один факт будет свидетельствовать, что дело обстоит иначе, я отвергну атеизм. Мы, ученые, способны заметить дефект в любом из законов природы. Поэтому я не считаю себя атеисткой — дело здесь не только в науке. Есть еще религия и политика. Для <em>вас</em> Бог — не гипотеза. И вы решили, что загнали истину в угол, пусть даже я в состоянии указать вам на пару ошибок. Если вас интересует мое мнение, я с готовностью отвечу: просто я <em>не уверена</em> в собственной правоте.</p><p class="p1">— Да, я всегда считал агностиков атеистами, у которых не хватает смелости признаться в этом.</p><p class="p1">— Могу возразить вам, что агностик — это личность глубоко верующая и сохранившая хотя бы рудиментарные воспоминания о склонности человеческого рода к заблуждениям. И когда я говорю, что принадлежу к числу агностиков, то просто имею в виду следующее: у меня нет никаких фактов, позволяющих что-либо утверждать. Убедительные доводы в пользу существования Бога отсутствуют, но и обратного тоже ничто не доказывает. А уж коль более половины жителей Земли не принадлежат к числу христиан, мусульман или евреев, то, на мой взгляд, нет и достоверного подтверждения существования единого Бога. Иначе Ему поклонялась бы вся планета. И я вновь хочу повторить: если бы ваш Бог собрался в чем-то убедить нас, Он должен был внимательнее отнестись к делу. А теперь оцените, насколько истинным кажется нам Послание. Сигнал принимают во всех странах мира. Все радиотелескопы записывают одно и то же, невзирая на местные верования, языки, историю и политику. И частота сигнала, и поляризационная модуляция одинаковы во всех странах для мусульман, индуистов, христиан и атеистов. Любой скептик всегда может просто развернуть к Веге радиотелескоп — даже не слишком большой — и сразу же получить вполне надежные и абсолютно идентичные данные.</p><p class="p1">— Но вы же не считаете ваше радиопослание <em>исходящим</em> от Бога? — спросил Ренкин.</p><p class="p1">— Ни в коей мере. Просто цивилизация Веги, обладая бесконечно меньшими возможностями, чем те, которые вы приписываете своему Богу, сумела сделать все, чтобы не оставить почвы для сомнений. И если ваш Бог общался с нашими предками, прибегая к таким двусмысленным методам, как разговоры и древние манускрипты, то мог бы и сейчас немедленно обратиться к ним, дабы мы не имели возможности усомниться в Его существовании.</p><p class="p1">Элли умолкла, но, поскольку Джосс и Ренкин молчали, решила обратиться непосредственно к полученной информации.</p><p class="p1">— А не лучше ли нам воздержаться от мнений до тех пор, пока Послание не будет прочитано? Вы, быть может, хотели ознакомиться с имеющимися данными?</p><p class="p1">На этот раз они согласились с готовностью. И Элли выложила свои листы, испещренные нулями и единицами — зрелище не назидательное и не вдохновляющее. Она с осторожностью поясняла — говорила и о предполагаемом разбиении на страницы, и о предисловии, на которое можно только надеяться. Не уславливаясь, они с дер Хииром умолчали о высказанной советскими учеными догадке: пока нельзя было утверждать, что Послание представляет собой проект для некой машины. Это всего лишь предположение, о котором русские еще не заявили официально. Она рассказала им немного и о самой Веге — о ее массе, температуре поверхности, цвете, расстоянии от Земли, возрасте и об окружающем звезду кольце обломков, обнаруженном в 1983 году с американского спутника инфракрасной космической аппаратурой.</p><p class="p1">— А вот кроме того, что Вега — одна из самых ярких звезд на небе, есть в ней что-нибудь примечательное? — допытывался Джосс. — Нечто, связывающее ее с Землей?</p><p class="p1">— Звезда как звезда, ничего особенного. Есть, правда, одно совпадение: Вега была нашей Полярной звездой 12 тысяч лет назад и вновь станет ею через 14 тысяч лет.</p><p class="p1">— А я думал, что Полярная звезда всегда останется Полярной, — проговорил Ренкин, все еще поглаживая папку с бумагами.</p><p class="p1">— Полярной она пробудет еще несколько тысяч лет. Земля подобна обычному волчку, ось которого медленно прецессирует по кругу. — И Элли показала карандашом перемещение земной оси. — Это явление называется прецессией равноденствий.</p><p class="p1">— Оно было открыто Гиппархом Родосским, — добавил Джосс, — за два столетия до нашей эры.</p><p class="p1">Странно, подумала Элли, что он помнит это.</p><p class="p1">— Совершенно верно. И в настоящее время, — продолжила она, — направление данной оси указывает на звезду, входящую в созвездие Малого Ковша, или Малой Медведицы. Мы называем ее Полярной. Мистер Ренкин, кажется, перед ленчем вы упоминали именно это созвездие? По мере прецессии земная ось будет указывать на разные области неба, не только на Полярную звезду. Полный оборот Северный полюс совершает за 26.000 лет. Сейчас направление данной оси почти точно совпадает с направлением на Полярную звезду, достаточно точно для нужд навигации. Двенадцать тысячелетий назад она указывала на Вегу. Это случайность, не ищите здесь никакой физической связи. Размещение звезд внутри Млечного Пути никак не влияет на ориентацию вращения Земли, на угол ее наклона к плоскости эклиптики, равный 23,5 градусам.</p><p class="p1">— Но послушайте, ведь цивилизация и возникла 12 тысяч лет назад, за 10 тысяч лет до Рождества Христова? — спросил Джосс.</p><p class="p1">— Что вы, разве Землю сотворили не в 4004 году до нашей эры?</p><p class="p1">— Ну теперь в это едва ли кто верит, так, брат Ренкин? Мы просто думаем, что возраст Земли еще окончательно не установлен, как это и полагают ученые. В том, что касается возраста нашей планеты, можете считать нас агностиками, — блеснул он неотразимой улыбкой.</p><p class="p1">— Значит, в те времена, когда люди начинали заниматься мореходством и впервые переплывали Средиземное море или, скажем, Персидский залив, Вега была их путеводной звездой?</p><p class="p1">— Но тогда еще не успело закончиться последнее оледенение. Для навигации скорее всего было еще рановато. Но именно в это время охотники через Берингов пролив шли в Северную Америку. И, возможно, эта звезда, сиявшая прямо на севере, казалась им удивительным даром — провидением, если хотите… держу пари, это совпадение спасло не одну жизнь.</p><p class="p1">— Весьма интересно.</p><p class="p1">— Я вовсе не хочу, чтобы вы усмотрели в слове «провидение» нечто, кроме метафоры.</p><p class="p1">— Как я могу решиться на это?</p><p class="p1">По физиономии Джосса было видно, что дело близится к завершению, и он не обнаруживал неудовольствия. Впрочем, в повестке дня Ренкина еще оставалось несколько пунктов.</p><p class="p1">— Позвольте усомниться в том, что Вега могла быть Полярной звездой без Провидения Божьего. Я верю в Бога, моя вера прочна и не нуждается в доказательствах разума, каждый новый факт только обретает в ней подтверждение.</p><p class="p1">— Сожалею, но похоже, что вы вовсе не слушали меня утром. Я совершенно не согласна участвовать ни в каком диспуте на подобные темы, если вы заранее отвели себе роль победителя. Насколько мне известно, вы никогда не пытались испытать свою веру. А разве не стоит рискнуть жизнью ради этого? Я, например, вполне могу себе это позволить. Поглядите в окно, видите — вон большой маятник Фуко. Гиря, должно быть, весит пять сотен фунтов. И мое кредо гласит: амплитуда колебаний свободного маятника не может превысить первоначальное отклонение от вертикального положения. Она будет только уменьшаться. Давайте встанем возле него, я приставлю маятник к своему лбу и отпущу. А когда он качнется назад, то, если я заблуждаюсь, все пять сотен фунтов ударят меня в лицо. Как идея? Рискнете опробовать свою веру?</p><p class="p1">— В этом нет необходимости. Я верю вам, — ответил Джосс. Лицо Ренкина напротив выражало явный интерес. Смакует, должно быть, подумала она, на что я буду потом похожа.</p><p class="p1">— Но <em>вы</em> можете встать поближе к точке подвеса на какой-нибудь фут и вознести молитвы к Господу, дабы Он укоротил путь маятника. Ну а если окажется, что правы не вы и Бог не в ваших учениях? Скажете, козни Дьявола? А может быть, просто человеческого воображения. Откуда у вас такая уверенность?</p><p class="p1">— Вера есть вдохновение, откровение и трепет, — отвечал Ренкин. — Не стоит судить обо всех по себе. Отвергайте Господа, но ваши заблуждения не могут сокрыть от других всю Его славу.</p><p class="p1">— Конечно, все мы жаждем чудес. Чисто человеческое свойство. И наука, и религия буквально переполнены ими. Я просто прошу вас ничего не придумывать и не преувеличивать. В реальном мире достаточно поводов для благоговейного изумления. Природа куда более изобретательна в отношении чудес, чем мы с вами.</p><p class="p1">— Возможно, все мы — только путники, бредущие к истине, — заметил Джосс.</p><p class="p1">Дождавшись наконец обнадеживающей нотки, дер Хиир решительно вступил в разговор. Обменявшись натянутыми любезностями, они приготовились расставаться. Элли гадала, сумела ли достичь чего-нибудь положительного. Валериан куда более эффектно справился бы с этой задачей и обошелся бы без моих колкостей, думала Элли. Она уже жалела, что не сдержалась.</p><p class="p1">— День оказался весьма интересным, доктор Эрроуэй, я благодарю вас за это, — Джосс опять казался отстраненным, и любезные фразы доносились словно откуда-то издалека. Он тепло пожал ей руку. На пути к ожидавшей правительственной машине, возле объемного трехмерного стенда «Ложная идея о расширении Вселенной» она увидела табличку «Наш Господь жив и благоденствует. А ваш? Приносим свои соболезнования».</p><p class="p1">Она шепнула дер Хииру:</p><p class="p1">— Извини, я, кажется, только усложнила твою задачу.</p><p class="p1">— Да нет, Элли. Ты была великолепна.</p><p class="p1">— А Палмер Джосс — очень привлекательный человек. Не думаю, чтобы мне удалось сколько-нибудь пошатнуть его веру. Но тебе признаюсь — он едва не обратил меня. — Она, конечно, шутила.</p></span></span>
