<span><span id="id23"><div class="title4">
<p class="p">20. Великий главный вокзал</p>
</div><div class="epigraph">
<p class="p1">Нет ничего естественного, ведь сама природа — творение Бога.</p>
<p class="text-author">Томас Браун. «О снах». Religio Medici</p>
</div><div class="epigraph">
<p class="p1">Ангелы нуждаются в телесном воплощении не ради себя, но для нас.</p>
<p class="text-author">Фома Аквинский. «Summa Theologica», I, 51, 2</p>
</div><div class="epigraph">
<p class="p1">…Дьявол властен облечься в милый образ»…</p>
<p class="text-author">Уильям Шекспир. «Гамлет», II, 2, 628</p>
</div><p class="p1">В шлюзе мог поместиться только один человек. Там, на Земле, когда речь шла о приоритете — представителю какой нации следует первому ступить на планету далекой звезды, — все пятеро начинали отмахиваться и твердить, что этот вопрос не входит в компетенцию их миссии… И сами старались не обсуждать его между собой.</p><p class="p1">Внутренняя и внешняя дверцы шлюза распахнулись одновременно. Никто не открывал их. Эта часть Великого вокзала, видимо, полностью отвечала всем потребностям человека.</p><p class="p1">— Ну и кто будет первым? — поинтересовалась Деви.</p><p class="p1">Элли дожидалась своей очереди с видеокамерой в руке, а затем решила, что ступит на поверхность неизвестного мира вместе с пальмовой ветвью. Вернувшись за ней, она услышала доносящийся снаружи восторженный вопль. Кажется, кричал ВГ. И Элли рванулась к яркому теплому свету. Порожек двери шлюза припорошил песок. Деви, стоя по лодыжку в воде, игриво брызгала в сторону Си. Эда широко улыбался.</p><p class="p1">Они были на пляже. Волны лизали песок. Несколько кучевых облаков лениво плыли по небу, чуть в стороне от воды высился неровный рядок пальм. И солнце было на небе. Одно солнце. Желтое, прямо как наше, решила Элли. Воздух наполнял слабый пряный запах, пахло гвоздикой и, кажется, корицей. Как на берегу Занзибара.</p><p class="p1">Итак, они пролетели 30.000 световых лет и очутились на земном пляже. Могло быть и хуже, подумала она. Дунул ветерок, поднял легкий вихрь песка. Или все это просто искусная имитация земных краев в соответствии с данными, доставленными разведывательной экспедицией сколько-то миллионов лет назад? А может, их покатали немного, по дороге ознакомили с кое-какими началами описательной астрономии и без особых церемоний завершили невероятный перелет в уютном уголке Земли?</p><p class="p1">Обернувшись, она обнаружила, что додекаэдр исчез. А с ним и сверхпроводящий суперкомпьютер со всей библиотекой и остальные приборы. Поглядев на пальмовую ветвь, с таким трудом доставленную сюда Элли, ВГ перевел взгляд на пальмовую рощицу и расхохотался:</p><p class="p1">— В Тулу со своим самоваром.</p><p class="p1">— С углем в Ньюкасл, — согласилась Деви.</p><p class="p1">Но ее ветвь была другой. Может быть, здесь растет не тот вид. А может быть, изготовитель проявил невнимательность. Элли поглядела на море. В голове бродили неясные мысли; так жизнь выходила на сушу 400 миллионов лет назад по земному счету. Где бы ни находились они — в центре Галактики или на острове посреди Индийского океана, — экипаж совершил нечто совершенно беспрецедентное. Да, пусть они и не знали, на чем и куда отправляются… пусть. Но они пересекли межзвездное пространство и открыли новую эру в истории человечества. Элли испытывала законную гордость.</p><p class="p1">Сняв ботинки, Си закатал до колен брюки расшитого всякими эмблемами просторного тренировочного костюма, в которые все они были облачены по настоянию правительств, и отправился бродить по невысоким волнам. Шагнув за пальмовый ствол, Деви выступила из-за него облаченной в сари. Это действо напомнило Элли фильмы с участием Дороти Ламур<a href="ch2.xhtml#id15" class="a">[53]</a>. Эда извлек полотняную шапочку, в которой его знал едва ли не весь мир. Элли снимала их, экономя пленку. Дома все покажется похожим на любительский фильм. Потом она присоединилась к Си и ВГ, бродившим по волнам. Вода оказалась теплой. День был приятным — куда лучше хоккайдской зимы, с которой они простились чуть более часа назад.</p><p class="p1">— Все взяли сюда какие-то символы, — проговорил ВГ, — кроме меня.</p><p class="p1">— Что вы хотите сказать?</p><p class="p1">— Эда и Сукхавати прихватили национальные одежды. Си взял зернышко риса. — Тот и в самом деле держал между большим и указательным пальцами пластиковый мешочек. — Вы прибыли с пальмовой ветвью, — продолжил ВГ, — только я не взял с собой ничего символического, никаких памяток. Стало быть, здесь я — единственный истинный материалист, и все мое заключено в моей собственной голове.</p><p class="p1">Медальон висел на шее Элли под джемпером. Расстегнув воротник, она вытащила его за цепочку. ВГ обратил на это внимание, и она показала ему надпись.</p><p class="p1">— Кажется, из Плутарха, — заметил он чуть погодя. — Мужественные речи спартанцев. Только не следует забывать, что тогда победили римляне.</p><p class="p1">Судя по тону, ВГ решил, что медальон — подарок дер Хиира. В его словах слышалось недовольство дер Хииром, конечно же, оправданное поведением того и нежеланием расставаться с холостяцкой жизнью, — и это согрело Элли. Она взяла его за руку.</p><p class="p1">— Готов убить человека ради пары затяжек, — сказал он, нежно отвечая на ее рукопожатие.</p><p class="p1">Потом все пятеро сидели возле оставленной приливом лужицы. Тихий шум прибоя негромко и ровно шумел в ее ушах, напоминая об «Аргусе» и о долгих годах, проведенных за прослушиванием неба. Солнце над океаном давно миновало зенит. Вправо бочком торопился краб, выставив над панцирем глаза на стебельках. На крабах, кокосовых орехах и прихваченных из дома припасах они некоторое время протянут. Кроме их собственных следов, иных отпечатков на песке не было.</p><p class="p1">— Как мы понимаем теперь, они сделали за нас почти всю работу, — пояснял ВГ их общее с Эда мнение относительно пережитого. — Мы на Земле только создали легкую припухлость в пространстве-времени, к которой они смогли подсоединить свой тоннель. При многомерной геометрии пространства-времени обнаружить малое возмущение очень сложно. А еще труднее воспользоваться им.</p><p class="p1">— Вы хотите сказать, что они изменяют геометрию пространства?</p><p class="p1">— Да, мы сейчас можем утверждать, что пространство топологически нельзя считать простой поверхностью. Оно напоминает — правда, Абоннеме не нравится эта аналогия — плоскую двумерную поверхность. Назовем ее поверхностью умных — сложным лабиринтом трубок; она связана с другой двумерной поверхностью, пусть это будет поверхность дураков. И время, за которое можно перебраться с одной поверхности на другую, определяется длиной трубки. Теперь представьте, что умные спускают со своей поверхности трубку с присоской. Тогда они могут создать тоннель между двумя поверхностями, если тупицы помогут — создадут на <em>своей</em> поверхности вмятину, за которую умные смогут зацепиться.</p><p class="p1">— Поэтому умные посылают дуракам радиосообщение, в котором даются инструкции — как устроить нужный пузырь. Но если эти создания являются по-настоящему двумерными, как <em>могут</em> они сделать вмятины на своей поверхности?</p><p class="p1">— Собрать в одном месте огромную массу, — неуверенно проговорил ВГ.</p><p class="p1">— Но мы не делали этого.</p><p class="p1">— Знаю, знаю. Наверняка это как-то связано с бензелями.</p><p class="p1">— Вот видите, — мягко сказал Эда. — Если тоннели являются черными дырами, это вызывает ряд противоречий. Выведенное Керром точное решение эйнштейновских уравнений теории поля описывает подобный тоннель, но это решение неустойчиво. Малейшее возмущение нарушит его целостность, тоннель превратится в физическую сингулярность, из которой ничто не может выйти. Я попытался представить себе высшую цивилизацию, способную управлять структурой коллапсирующей звезды, чтобы поддержать внутреннюю стабильность тоннеля. Это очень сложно. Такой цивилизации придется вечно стабилизировать тоннель. А это особенно сложно, когда в него падает что-нибудь вроде додекаэдра.</p><p class="p1">— Даже если Абоннема и сумеет понять, как им удается держать тоннель открытым, все равно придется иметь дело с другими проблемами, — заметил ВГ. — Их слишком много. Черные дыры обрастают проблемами быстрее, чем поглощают материю. Взять, например, приливные силы. В поле тяготения черной дыры нас разорвало бы на части. Нас просто вытянуло бы, как персонажи картин Эль Греко или изваяния этого итальянца… Он повернулся за помощью к Элли.</p><p class="p1">— Джакометти, — подсказала она, — только он был швейцарцем.</p><p class="p1">— Да, Джакометти. Есть и другие проблемы. По земным меркам нам потребуется бесконечно много времени, чтобы опуститься в черную дыру, и мы никогда не сумеем возвратиться на Землю. Может быть, так и будет, и мы никогда не вернемся домой. Потом, сингулярная точка — это сущий ад, если иметь в виду излучения… А если вспомнить про квантовомеханическую нестабильность…</p><p class="p1">— Наконец, — подытожил Эда, — в тоннелях керровского типа могут возникать любопытные нарушения причинности. При малейшем отклонении траектории внутри тоннеля от правильной можно вылететь наружу в любой момент истории Вселенной — хоть через пикосекунду после Большого взрыва. Словом, настоящий хаос.</p><p class="p1">— Эй, ребята, — обратилась Элли, — в общей теории относительности я не знаток. Но <em>разве мы не видели</em> черные дыры своими глазами? Разве мы не падали в них? И разве не возвращались благополучно в пространство? Разве грамм наблюдений не стоит тонны теорий?</p><p class="p1">— Знаю, знаю, — страдальческим тоном отозвался ВГ. — Значит, есть еще что-то. Но все-таки наши физические познания не могут абсолютно не соответствовать истине! Так ведь?</p><p class="p1">Свой вопрос он с некоторой нерешительностью адресовал Эда, ответившему на это:</p><p class="p1">— Естественно возникшая черная дыра не может не иметь вид тоннеля, обязательно разделенного на две части непроходимой сингулярной точкой.</p><p class="p1">С помощью самодельного секстанта и наручных часов они установили скорость углового перемещения Солнца: 360 градусов за 24 часа, как на Земле. Пока Солнце не опустилось чересчур низко, они разобрали камеру Элли и линзой зажгли огонь. Пальмовую ветвь она держала возле себя, чтобы кто-нибудь впотьмах не отправил ее в огонь. Си оказался здесь знатоком. Он укрыл костер от ветра и не позволял ему слишком разгораться.</p><p class="p1">Одна за одной проступали звезды. Все родные созвездия были на месте. Элли вызвалась покараулить огонь, пока остальные засыпали. Она хотела дождаться восхода Веги. Пришлось подождать… Ночь была невероятно ясной, и от Веги исходил ровный немигающий свет. По перемещению созвездий по небу, по южным созвездиям, по тому, как невысоко лежала Большая Медведица над северным горизонтом, Элли решила, что они находятся в тропиках. И прежде чем уснуть, подумала: «Если это имитация, хозяевам пришлось потрудиться».</p><p class="p1">Ей приснился странный сон. Впятером они плавали в водных глубинах, не замечая своей и чужой наготы, лениво замирали под роговидными стеблями кораллов, заплывали в щели, мимо которых течение проносило дрейфующие водоросли. Она поднялась к поверхности. Летучий корабль-додекаэдр невысоко парил над водой, и через его прозрачные стенки Элли могла видеть людей, облаченных в саронги<a href="ch2.xhtml#id13" class="a">[54]</a> и дхоти. Они читали газеты и непринужденно беседовали. Она нырнула обратно — ее место там, под водой.</p><p class="p1">Сон тянулся и тянулся, но они не задыхались под водой: вдыхали и выдыхали ее. И никто не волновался — все резвились подобно рыбам. ВГ даже напоминал какую-то рыбину, морского окуня, что-ли. Должно быть, вода перенасыщена кислородом, решила Элли. Не просыпаясь, она вспомнила, что однажды видела мышь в одной из лабораторий — та плавала в банке с такой же водой и даже старательно загребала передними лапками, хвост червячком тянулся следом за ней. Элли попыталась вспомнить, сколько же кислорода необходимо для этого, но это уже требовало слишком больших усилий. Ей показалось, что она думает все меньше и меньше. Правильно. Так хорошо.</p><p class="p1">Теперь все уже оказались похожими на рыб. Деви трепетала прозрачными плавниками. Элли ощущала смутную чувственность. Ей хотелось, чтобы сон продолжался, ведь нужно было понять его смысл. Она хотела получить ответ, но ускользал даже вопрос. Надо же, заставили дышать теплой водой. Что еще они смогут придумать?</p><p class="p1">Проснулась Элли с чувством дезориентации, граничащей с головокружением. Где она? В Висконсине, Пуэрто-Рико, Нью-Мексико, Вайоминге, на Хоккайдо? Или в Малаккском проливе? А потом вспомнила. Даже с точностью в 30.000 световых лет она не может указать, в какой части галактики Млечного Пути сейчас находится. Мировой рекорд дезориентации, подумала она. Несмотря на головную боль, Элли рассмеялась, и спавшая возле нее Деви шевельнулась. Склон пока укрывал их от прямых лучей солнца… вчера они обследовали пляж на протяжении примерно километра, но так и не отыскали признаков жизни. Элли нагребла себе под голову кучу песка. Только что открывшая глаза Деви лежала, положив голову на аккуратно свернутый спортивный костюм.</p><p class="p1">— Знаешь, по-моему, есть нечто приторное в культурах, требующих обязательно мягкой подушки под головой, — начала Элли. — Вот те, кто спал, подложив под голову деревянную упряжь, действительно были крепкими ребятами.</p><p class="p1">Усмехнувшись в ответ, Деви пожелала доброго утра.</p><p class="p1">На пляже послышались крики. Трое мужчин жестами подзывали женщин к себе. Элли и Деви присоединились к ним.</p><p class="p1">Прямо на песке стояла дверь. Деревянная дверь с накладными панелями и медной ручкой. Как в доме. Поперечина, две стойки, порог, только без таблички с именем хозяина. Обычная дверь. Как на Земле.</p><p class="p1">— Обойдите-ка, — скомандовал Си.</p><p class="p1">Дверь исчезла. Элли видела и Эда, и ВГ, и Си, и Деви, и песок, отделявший ее от них. Она шагнула в сторону, замочив пятки в волне, и увидела тонкую, словно лезвие бритвы, вертикальную линию. Трогать не хотелось. Вновь вернувшись назад, проверила, не видно ли теней или отражений, и шагнула вперед.</p><p class="p1">— Браво, — расхохотался Эда. Она обернулась — закрытая дверь была за ее спиной — и спросила:</p><p class="p1">— Что же вы видели?</p><p class="p1">— Как очаровательная женщина выходит прямо из закрытой двери, — отсутствие сигарет мало сказывалось на ВГ.</p><p class="p1">— А вы пробовали открыть ее? — спросила Элли.</p><p class="p1">— Нет еще, — ответил Си.</p><p class="p1">Она отступила назад, наслаждаясь зрелищем.</p><p class="p1">— Похоже на этого… как его… французского сюрреалиста, — заметил ВГ.</p><p class="p1">— Рене Магритта, — отозвалась Элли. — Он был бельгийцем.</p><p class="p1">— Похоже, мы пришли к выводу, что перед нами не Земля, — проговорила Деви, охватывая одним жестом океан, пляж и чистое небо.</p><p class="p1">— Если только нас не отослали на острова Персидского залива на три тысячи лет назад, а вокруг так и кишат джипы, — пошутила Элли.</p><p class="p1">— Не правда ли, все детали воспроизведены до малейших подробностей?</p><p class="p1">— Отлично, — отвечала Элли. — Все выполнено искуснейшим образом. Но зачем это? К чему такая скрупулезность?</p><p class="p1">— Быть может, они не умеют работать иначе — не доводя до совершенства?</p><p class="p1">— А что, если нам просто указывают на дверь?</p><p class="p1">— Непонятно, — заметила Деви, — откуда им известны наши двери до мельчайших подробностей. Подумайте только, насколько разнообразными могут быть двери. Откуда им знать, какие именно они на Земле.</p><p class="p1">— Может быть, телевизор, — отозвалась Элли. — На Веге уже приняли передачи с Земли вплоть до… э-э… 1974 года. Сюда они могут переслать любую информацию едва ли не мгновенно. Наверняка с 1936 по 1974 год по телевизору успели показать целую прорву дверей. О'кей, — продолжала она, словно не заметив, что меняет тему разговора. — Что, по-вашему, произойдет, если открыть эту дверь и шагнуть внутрь?</p><p class="p1">— Если нам здесь назначено испытание, — отвечал Си, — оно ждет нас за дверью и, наверное, для каждого свое…</p><p class="p1">Он был готов. И ей тоже хотелось быть готовой.</p><p class="p1">Тени пальм уже легли на песок. Они безмолвно разглядывали друг друга. Четверо горели нетерпением. Они были готовы. Только Элли испытывала некоторую нерешительность. Она спросила Эда, согласен ли он быть первым? Самого сильного вперед, подумала она.</p><p class="p1">Поправив шапочку, он изящно и широко поклонился, обернулся и шагнул к двери. Подбежав, Элли поцеловала его в обе щеки. Остальные обнимали его. Он вновь повернулся, открыл дверь и исчез, словно растворился в воздухе: первой исчезла нога, последней — отставленная назад рука. Дверь осталась открытой, но за ней не было ничего, только песок и волны. Дверь закрылась, она обежала ее, но от Эда не осталось даже следов.</p><p class="p1">За ним последовал Си. Элли подумала: с какой покорностью принимают люди все предложенное. А ведь <em>они</em> с самого начала могли объяснить, как и где мы окажемся и зачем все это нужно. Эту информацию можно было включить прямо в Послание или сообщить экипажу уже после запуска Машины. Нужно было предупредить, что за шлюзом нас ждет имитация Земли. И о двери тоже можно было рассказать заранее.</p><p class="p1">Правда, какими бы умниками они ни были, разве можно освоить английский язык в совершенстве, используя в качестве наставника только телепередачи? А русский, китайский, тамильский, тем более хауса, так не освоишь. Но ведь они изобрели же язык, использованный в предисловии. Почему не прибегнуть прямо к нему? Чтобы нам было чему удивляться?</p><p class="p1">Заметив, как она глядит на закрытую дверь, ВГ спросил, не хочет ли она войти следующей.</p><p class="p1">— Благодарю вас, ВГ. Я просто думаю. Я понимаю, что это глупо, но почему мы покорно прыгаем в каждый обруч, который они нам предлагают? А если мы не согласимся, что тогда?</p><p class="p1">— Элли, вы просто невозможная американка. Что касается меня, я чувствую себя как дома. Я привык подчиняться властям, в особенности когда выбора не остается, — он улыбнулся и повернулся к двери.</p><p class="p1">— Только не берите денег у Великого Герцога, — крикнула вслед ему Элли.</p><p class="p1">Высоко над головой раздался пронзительный крик чайки. ВГ не закрыл за собой дверь. Но за ней по-прежнему был виден один только пляж.</p><p class="p1">— С тобой все в порядке? — спросила Деви.</p><p class="p1">— Нормально. В самом деле. Я просто должна понять себя.</p><p class="p1">— Элли, это серьезно, я спрашиваю тебя как врач! С тобой все в порядке?</p><p class="p1">— Я проснулась с головной болью. Потом мне снился какой-то странный сон. Я не почистила зубы и не выпила черного кофе. И вообще я хочу утреннюю газету. А в остальном все в порядке.</p><p class="p1">— По крайней мере это звучит здраво. Кстати, у меня тоже болит голова. Элли, будь внимательней. Запомни все, что случится с тобой, чтобы ты могла рассказать мне при встрече… в следующий раз.</p><p class="p1">— Запомню, — пообещала Элли.</p><p class="p1">Они поцеловались и попрощались. Деви переступила порог и исчезла. Дверь закрылась. Элли показалось, что из нее слегка пахнуло карри<a href="ch2.xhtml#id11" class="a">[55]</a>.</p><p class="p1">Она почистила зубы соленой водой. Известная привередливость всегда была частью ее натуры. Осторожно смахнула песок с внешних поверхностей микрокамеры и крошечного набора видеокассет, на которых были записаны чудеса. Потом омыла в воде пальмовую ветвь, как тогда на Кокосовом пляже перед полетом на «Мафусаил».</p><p class="p1">Утро было теплым, и Элли решила поплавать. Сложив одежду на пальмовой ветви, она смело вступила в прибой. Как бы то ни было, решила она, едва ли инопланетян воспламенит обнаженная дама, хотя бы и неплохо сохранившаяся для своих лет. Она попыталась представить себе микробиолога, воспылавшего страстью при виде делящейся под микроскопом бактерии.</p><p class="p1">Она легла на спину, волны мерно покачивали ее. Элли попыталась представить, как умещаются здесь эти залы… копии миров, чем бы они здесь ни считались, — уютнейшие уголки бесчисленных планет. Тысячи и тысячи небес, каждое со своим солнцем и погодой, а под ними океаны, привычная почва, по которой снует мелкая живность, ни чем не отличающаяся от натуральной. Все это казалось ей настолько излишним… Но у них, конечно же, были причины, и это вселяло надежды. Пусть ресурсы их безграничны, но даже тогда едва ли целесообразно сооружать приемный зал с натуральным ландшафтом для пяти подопытных кроликов, доставленных из обреченного мира. Но с другой стороны… им уже все уши прожужжали внеземными зоопарками. Ну а если вся эта колоссальная станция со всеми причалами и помещениями <em>на самом деле</em> зоопарк? «Посещайте, посещайте, — словно услышала она голос зазывалы с головой слизняка. — Экзотические животные в природных условиях». Туристы съезжаются со всей Галактики, в особенности во время школьных каникул. Потом прибывает инспекция. Тогда хозяева станции просто вышвыривают наружу зверье и туристов и ровненько заметают песок… привезенным на замену дикарям отводится полдня на отдых.</p><p class="p1">Или же таким образом они <em>пополняют</em> свои зоопарки? Элли вспомнила, что в тесноте земных зверинцев многие животные не могут размножаться. Кувырнувшись в воде, она постаралась выбросить из головы всякую ерунду и, выбрасывая руки вперед, поплыла к берегу. Во второй раз за последние сутки Элли пожалела, что не имеет детей.</p><p class="p1">Вокруг никого, даже паруса на горизонте. По берегу бродили чайки, они высматривали крабов. Элли огорчало, что она не может бросить им хлеба. Обсохнув, она оделась и вновь поглядела на дверь. Та спокойно поджидала ее. И снова Элли не решалась войти. К нерешительности примешивалось какое-то чувство. Наверное, страх.</p><p class="p1">Не отводя от двери глаз, Элли отступила назад. Усевшись под пальмой, она оперлась о колени и принялась глядеть вдоль белой песчаной полосы.</p><p class="p1">Потом она встала и потянулась. Держа в одной руке пальмовую ветвь и микрокамеру, она приблизилась к двери и повернула ручку. Дверь легко отворилась. В щель Элли увидела белые барашки на волнах. Она потянула, и дверь без скрипа распахнулась. Все тот же пустой и скучный пляж простирался за ней. Покачав головой, она вернулась под дерево. И вновь замерла там в задумчивой позе.</p><p class="p1">Как там остальные, размышляла она. Проходят проверку, держат экзамен, выбирают правильный ответ из предложенных? Или это устный экзамен? Кто его принимает? И она вновь ощутила тревогу. На что может быть похоже разумное существо, сформировавшееся в чуждых физических условиях на непохожей на Землю планете в результате совершенно иной, чем на Земле, цепи мутаций? Трудно было даже представить, что ожидает ее. Если за дверью экзаменационная, хозяева наверняка окажутся совершенно не похожими на людей. В глубине ее души крылось глубокое недоверие ко всяким там насекомым, змеям и светлячкам. Она относилась к числу тех людей, кто чувствует неприязнь — а если быть откровенным, отвращение — к калекам и дефективным. Всякие уродства, дети, страдающие болезнью Дауна, даже легкие признаки паркинсонизма пробуждали в ней, невзирая на сопротивление интеллекта, желание не глядеть, не видеть и оказаться подальше. Обычно Элли могла сдержать себя, хотя вовсе не испытывала уверенности, что никого не задела своим поведением. Она не любила даже думать на подобные темы.</p><p class="p1">И теперь ее смущало, что она не сумеет справиться с собой, увидев инопланетянина, не говоря уже о том, чтобы достойно представить в своем лице человеческий род. На Земле с этой стороны Пятерку не проверяли. Никому и в голову не пришло, что кто-то из них может бояться… мышей, гномов или марсиан. Отборочный комитет просто упустил такую возможность из виду. Элли удивилась, почему об этом никто не подумал. В настоящий момент все казалось достаточно очевидным.</p><p class="p1">Напрасно все-таки послали ее. Что, если она струсит, увидев хозяев… предположим, они окажутся змееволосыми? И тем скомпрометирует все человечество, которое в ее лице не выдержит важнейшего испытания. С опаской и вожделением глядела она на загадочную дверь, теперь уже оказавшуюся в воде. Подступал прилив.</p><p class="p1">В сотне метров от нее по берегу шел человек. Сперва она решила, что ВГ первым освободился из экзаменационной и несет ей добрые вести. Но спортивного костюма, свидетельствующего о принадлежности к проекту, на нем не было. Кроме того, даже издали было видно, что этот человек моложе и энергичнее. Она торопливо потянулась к длиннофокусному объективу, но по непонятной ей причине помедлила. Встала, прикрыла ладонью глаза от солнца. На миг ей показалось… но такое было вовсе немыслимо! Неужели у них даже не хватило благородства, чтобы не брать ее голыми руками…</p><p class="p1">Но ничего поделать с собой Элли не могла. И она уже бежала к нему, а ветер отбрасывал назад ее волосы. Он был как на той из своих самых последних фотографий — счастливый и сильный. Со вчерашней щетиной. И рыдая, она влетела в его объятия.</p><p class="p1">— Привет, Тинка, — сказал он, правой ладонью поглаживая ее по затылку.</p><p class="p1">Голос был его. Она сразу вспомнила это. И запах его кожи, и походка, и смех. И щека его кололась именно так. Все это вдребезги разнесло ее самообладание. Ей уже виделись камень, отваленный от входа в древнюю гробницу, и первые лучи солнца, проникающие в ее забытые глубины.</p><p class="p1">Судорожно глотнув, она попыталась взять себя в руки, но горе накатывало все новыми и новыми волнами, и рыдания не прекращались. А он терпеливо стоял и только безмолвно подбадривал ее взглядом — Элли вдруг вспомнила, что именно так он смотрел на нее от подножья лестницы, когда она впервые самостоятельно карабкалась по ней вверх. Больше всего на свете она хотела хоть на миг увидеть его, и уже давно привыкла подавлять это чувство, понимая, что такое невозможно. И теперь она оплакивала все эти разделявшие их годы.</p><p class="p1">В детстве и в молодости отец часто снился ей; тогда он говорил, что на самом деле жив и ничего не случилось. Было так хорошо. Он брал ее на руки. Но за недолгое счастье приходилось платить горьким пробуждением в мире, где его не было. Но все-таки она всегда ждала этих снов и охотно выплакивалась на следующее утро, выплачивая всю причитающуюся с нее цену, заново переживая и потерю, и горе. Сонное видение — вот и все, что от него осталось.</p><p class="p1">Но теперь он стоял перед ней — не привидение и не сон, а плоть и кровь. Или что-нибудь вроде того. Он позвал ее от звезд, и она пришла.</p><p class="p1">Элли прижималась к нему изо всей силы. Она прекрасно знала, что все это трюк, реконструкция, имитация, но все было выполнено просто безукоризненно. На миг она отодвинулась, положив руки ему на плечи. Великолепная работа, словно давно умерший отец и впрямь на небе, и она, правда, весьма необычным способом сумела встретить его. Элли всхлипнула и вновь обняла отца.</p><p class="p1">Чтобы овладеть собой, потребовалась еще минута. Если бы перед ней оказался, например, Кен, она могла бы заподозрить, что с Земли к центру Галактики отправился второй додекаэдр — возможно, отремонтированная советская Машина. Но уж отец никак не мог здесь оказаться. Его останки давно тлели на кладбище возле озера.</p><p class="p1">Смеясь и плача, она вытирала глаза.</p><p class="p1">— Итак, что же порождает привидения — робототехника или гипноз?</p><p class="p1">— Неужели я похож на машину или на сонное видение? Этак можно усомниться буквально во всем.</p><p class="p1">— Знаешь, даже теперь после стольких лет не проходит недели, чтобы я не подумала — хорошо бы любой ценой, понимаешь, любой, провести хотя бы пару минут с отцом…</p><p class="p1">— Стало быть, вот и я, — приветливо проговорил он, подняв руки и сделав пол-оборота, чтобы она могла убедиться, что и спина его ничем не отличается от отцовской. И он был таким <em>молодым</em>. Она теперь уже старше. Конечно, ведь он умер в тридцать шесть лет.</p><p class="p1">Быть может, ее просто успокаивают подобным образом? Если так, существам этим не отказать в… изобретательности. Обняв за плечи, она повела отца назад к своим пожиткам. Его тело <em>на ощупь</em> казалось вполне естественным. Если под кожей и были упрятаны интегральные схемы и шестеренки, то достаточно глубоко.</p><p class="p1">— Как наши дела? — не без двусмысленности поинтересовалась Элли, — я хочу…</p><p class="p1">— Понимаю. Вы получили Послание, и прошли годы, прежде чем сумели явиться сюда.</p><p class="p1">— Вы выставляете оценки за скорость и точность?</p><p class="p1">— Ни за то, ни за другое.</p><p class="p1">— Ты хочешь сказать, что мы еще не сдали экзамена?</p><p class="p1">Он не ответил.</p><p class="p1">— Ну хорошо, <em>объясни</em> мне тогда, — сказала она расстроенным тоном. — Мы потратили годы на прочтение Послания и постройку Машины. Ты не хочешь объяснить мне, зачем все это нужно?</p><p class="p1">— Экая забияка выросла, — отвечал он, словно бы и в самом деле был ее отцом и припоминал прежнее.</p><p class="p1">Он ласково взъерошил ей волосы. Этот жест она тоже помнила с детства. Но как они здесь, за 30.000 световых лет от Земли, сумели узнать о давних привычках ее отца, жившего в далеком земном Висконсине? И вдруг она поняла.</p><p class="p1">— Сны, — произнесла Элли. — Прошлой ночью, когда мы спали, вы исследовали наши головы? Забрали все, что мы знаем.</p><p class="p1">— Ну мы только сделали копии. Все, что было у вас в головах, осталось на месте. Поверь-ка. И скажи, если чего не хватает, — он ухмыльнулся и продолжил. — Ваши телепередачи не могут содержать всего, что нас интересует. Конечно, они великолепно характеризуют ваш технологический уровень и еще кое-что… Но мы не могли извлечь из них важную для нас информацию даже косвенным путем. Возможно, ты ощущаешь сейчас известное вторжение в тайные уголки души…</p><p class="p1">— Ты шутишь?</p><p class="p1">— Просто у нас было так мало времени.</p><p class="p1">— Значит, экзамен сдан? И на все вопросы мы отвечали во сне? Так провалились мы или нет?</p><p class="p1">— Все совсем не так, здесь у нас не шестой класс.</p><p class="p1">Когда он умер, она как раз училась в шестом.</p><p class="p1">— Не думай, что мы межзвездные шерифы, разбирающиеся со всякими нарушителями галактических законов. Правильнее видеть в нас службу галактической переписи. Мы собираем информацию. Я знаю, вы считаете, что у вас нечему поучиться, раз вы такие отсталые, раз у вас примитивная техника. Но у цивилизаций имеются разнообразные достижения.</p><p class="p1">— Какие же?</p><p class="p1">— Ну, скажем, музыка. Добролюбовность — мне нравится такое сочетание слов. И сны. Люди видят прекрасные сны, хотя по телепередачам с Земли об этом и не догадаешься. В Галактике есть культуры, которые торгуют снами.</p><p class="p1">— Значит, вы направляете межзвездный культурный обмен и вас интересуют именно эти вопросы? А вы не боитесь, что какая-нибудь хищная и кровожадная цивилизация придумает свои звездолеты?</p><p class="p1">— Я же сказал, что мы всюду приветствуем добролюбовность.</p><p class="p1">— А если бы нацисты сумели овладеть всей нашей планетой, а потом изобрели межзвездные корабли, вы вмешались бы?</p><p class="p1">— Ты удивишься, если узнаешь, насколько редко такое случается. Агрессивные цивилизации в конце концов сами уничтожают себя. Такова их природа. Они ничего не могут с ней поделать. Нам остается только предоставить их самим себе и принять меры, чтобы их никто не потревожил, чтобы они сами решили свою судьбу.</p><p class="p1">— А почему вы не оставили <em>нас</em> в покое? Я не возражаю, просто пытаюсь понять принципы галактической переписи. Ведь в первой нашей передаче вы увидели Гитлера. Почему же вы пошли на контакт?</p><p class="p1">— Конечно, кое-что пугало. Признаюсь, мы были глубоко обеспокоены. Но музыка говорила о другом. Бетховен свидетельствовал, что надежда еще не потеряна. Мы специализируемся по сложным случаям. И поэтому решили немного помочь вам. Многого предложить мы не можем. Понимаешь? Принцип причинности налагает известные ограничения.</p><p class="p1">Нагнувшись, он поболтал руками в воде и теперь вытирал их о брюки.</p><p class="p1">— Вчера мы заглянули в вас. Во всех пятерых. В каждом намешано многое: чувства, воспоминания, инстинкты, заученные навыки, прозрения, безумие, сны и любовь. Любовь имеет весьма существенное значение. Словом, интересная смесь.</p><p class="p1">— И все за одну ночь? — попыталась она поддразнить его.</p><p class="p1">— Пришлось поторопиться. У нас напряженный график.</p><p class="p1">— Ну если чем-нибудь…</p><p class="p1">— Нет, если мы не создаем консистентную каузальность<a href="ch2.xhtml#id9" class="a">[56]</a>, она образуется сама, но это всегда хуже.</p><p class="p1">Она не поняла его.</p><p class="p1">— «Создаем консистентную каузальность», — мой папа так бы никогда не сказал.</p><p class="p1">— Сказал бы. Разве ты не помнишь, как он разговаривал с тобой? Он был начитанный человек и всегда общался с тобой как с равной. Или ты забыла об этом?</p><p class="p1">Она не забыла. Она вспомнила. Про мать в доме престарелых.</p><p class="p1">— Великолепный кулон, — произнес он в той самой сдержанной манере, которую, по ее мнению, отец непременно приобрел бы, доживи он до ее лет. — Кто тебе его подарил?</p><p class="p1">— Ах, это, — сказала она, прикоснувшись к медальону. — Дело в том, что я не слишком хорошо знаю этого человека. Он испытывал мою веру… Он… Но вы и так все уже знаете.</p><p class="p1">Он опять улыбнулся.</p><p class="p1">— Я хочу знать, какого мнения вы о нас, — требовательно спросила она. — Какую оценку мы заслужили?</p><p class="p1">Он не медлил с ответом:</p><p class="p1">— Я просто удивлен, что вы управились со всем так хорошо. Вы не располагаете теорией социальной организации, пользуетесь удивительно отсталой системой экономических отношений, не имеете никакого представления о механизме исторического предвидения, к тому же ужасно плохо знаете самих себя. Но, учитывая то, насколько быстро меняется ваш мир, остается только удивляться, почему вы еще не разнесли себя в мелкие клочья. Поэтому-то мы и не хотим списывать вас со счета. Вы, люди, обнаружили известный талант и приспособляемость… по крайней мере в нынешних условиях.</p><p class="p1">— Таково ваше мнение?</p><p class="p1">— Это <em>одна</em> сторона его. Дело в том, что цивилизации, даже не имеющие долгосрочных перспектив, вовсе не кишат во всей Галактике. Приходится или преобразовывать себя, или встречать свою судьбу.</p><p class="p1">Ей хотелось бы знать, <em>как именно относится</em> он к роду человеческому. Испытывает ли сочувствие? Или же только любопытство? Или вовсе ничего — просто выполняет повседневную работу? Может быть, в сердце своем — или каким-то эквивалентным ему органом — он считает человека… чем-то вроде муравья? Но она не могла заставить себя спросить об этом. Наверное, потому, что слишком боялась ответа.</p><p class="p1">По интонациям его голоса, по манере речи она пыталась представить себе истинную природу существа, принявшего обличье отца. Элли обладала огромным опытом общения с людьми. А они, здешние хозяева, только вчера познакомились с ними. Можно ли хоть немного выяснить их реальную суть, упрятанную под дружелюбностью и общительностью? Элли ничего не могла даже представить. Эти речи не могли принадлежать ее отцу. Да он и не пытался настаивать на этой роли и вместе с тем во всем так походил на Теодора Ф.Эрроуэя (1924–1960), торговца скобяными изделиями, любящего отца и мужа. И если бы не постоянное усилие воли, она опять распустила бы нюни перед… этой копией. Частью своего существа она очень хотела порасспросить его, как он жил все эти годы на небесах. Выяснить его мнение о Втором пришествии и Воздаянии. Что принесет людям наступление нового тысячелетия? Многие земные религии учили, что праведники вкушают райскую жизнь на вершинах гор, среди облаков, в пещерах или оазисах, но такого, чтобы тебя отправляли на пляж, если в жизни ты вел себя достаточно хорошо, Элли не помнила.</p><p class="p1">— А есть ли у нас время на вопросы перед… последующими делами?</p><p class="p1">— Конечно. На один или два.</p><p class="p1">— Расскажи мне о вашей транспортной системе.</p><p class="p1">— Можно поступить проще, — сказал он. — Я все покажу тебе. Держись.</p><p class="p1">Тьма амебой растеклась от зенита, затмевая и Солнце, и голубое небо.</p><p class="p1">— Ну и шуточки, — охнула она.</p><p class="p1">Под ее ногами был тот же песок пляжа. И она крепче зарывалась в него большими пальцами ног. А над головой… был космос. Они как будто парили над галактикой Млечного Пути, глядя вниз на ее вращающуюся спираль, и приближались к ней на невероятной скорости. Он деловито пояснял структуру огромного колеса, пользуясь знакомой Элли научной терминологией. Он показал ей спиральный рукав Ориона, в котором в эту эпоху находилось Солнце. Далее в убывающем порядке мифологической значимости шли рукава Стрельца, NORMA/SCUTUM и, наконец, Трехкилопарсековый.</p><p class="p1">Над головой проступила сетка из прямых линий, намечавших транспортную систему. Как в парижском метрополитене. Эда был прав. Станции находились в звездных системах, где были двойные, не слишком массивные черные дыры. Она понимала, что подобные дыры слишком малы и не могут быть порождением звездного коллапса — последней стадии эволюции массивной звезды. Быть может, эти черные дыры относились к числу первичных, оставшихся от Большого взрыва, которые невообразимый звездный корабль захватил и отбуксировал к нынешнему месту? Или же они имели искусственное происхождение? Она хотела спросить, но быстрота, с которой разворачивалось путешествие, не позволяла ей отвлечься.</p><p class="p1">Вокруг центра Галактики обращалось светящееся водородное облако, молекулярные облака внутри него кольцом двигались к периферии Млечного Пути. Он показал ей, как движутся облака в комплексе Стрелец В2. Астрономы Земли десятилетиями считали его самым подходящим полем для поиска сложных органических молекул. Ближе к центру Галактики находилось другое гигантское облако молекул, а за ним Стрелец А «Вест», интенсивный радиоисточник, за которым Элли сама наблюдала в телескопы «Аргуса».</p><p class="p1">А далее в самом центре Галактики в страстных гравитационных объятиях кружила пара колоссальных черных дыр, каждая с массой, равной пяти миллионам солнечных. Реки газа поперечником в Солнечную систему стекали в утробу одной из них. Две колоссальные, Элли посетовала на ограниченность земных языков, две сверхмассивные черные дыры вращались вокруг друг друга в самом центре Галактики. О существовании одной было известно, по крайней мере в пользу этого имелись веские доказательства. Но две? Разве не должно все это сказаться на допплеровском смещении спектральных линий? Ей представилась табличка «ВХОД» возле одной из дыр и «ВЫХОД» рядом с другой. В настоящий момент действовал вход…</p><p class="p1">Возле них и располагался вокзал. Великий главный вокзал нашей Галактики — рядом с черными дырами в самом центре нашей звездной системы. В небесах блистали миллионы юных звезд, но вместе с газом и пылью их поглощала черная дыра.</p><p class="p1">— Все это куда-то переправляется? — спросила Элли.</p><p class="p1">— Конечно.</p><p class="p1">— А можно узнать куда?</p><p class="p1">— Безусловно. Материя перетекает в Лебедь А.</p><p class="p1">Об источнике Лебедь А Элли, конечно, знала. В небе Земли ярче светила только Кассиопея, где располагались останки ближайшей сверхновой. Она вычислила, что в секунду Лебедь А излучает больше энергии, чем наше Солнце за 40.000 лет. Этот радиоисточник удален от нас на 600 миллионов световых лет, он находится за пределами Млечного Пути. Лебедь А — это две огромные газовые струи, разлетающиеся почти со скоростью света. Как это часто бывает с внегалактическими источниками, они образовали в разреженном межгалактическом газе сложный комплекс скачков Гюгонио — Ренкина, радиомаяк светил на всю Вселенную. Вся материя в этой колоссальной структуре, распростертой на 500.000 световых лет, истекала из крошечной, едва заметной точки, расположенной в пространстве точно между двумя струями.</p><p class="p1">— Значит, Лебедь А имеет искусственное происхождение? Это вы <em>создаете</em> его?</p><p class="p1">Ей невольно вспомнилась полузабытая летняя ночь в Мичигане: однажды в детстве она уже боялась упасть в это небо.</p><p class="p1">— О, не совсем так. Эти работы ведут совместно многие галактики. В этом и заключается наша основная работа. Только… немногие из нас занимаются юными цивилизациями.</p><p class="p1">Каждая пауза звоном отдавалась в ее голове… слева у темени.</p><p class="p1">— Значит, галактики предпринимают совместные действия? — спросила Элли. — Значит, существует множество галактик, а в каждой — собственная администрация? Каждой из них подчинены сотни миллионов звезд. Эти администрации сотрудничают. И перебрасывают сотни миллионов солнц в созвездие Центавра… извини, в Лебедь А? Они… Прости, я просто потрясена масштабами. Зачем вам все это? Для чего?</p><p class="p1">— Понимаешь, Вселенная — не дикая пустыня, — ответил он. — Уже миллиарды лет. Считай, что ее… возделывают.</p><p class="p1">Вновь звон.</p><p class="p1">— Зачем? Что возделывают?</p><p class="p1">— Наша цель достаточно очевидна. И пусть тебя не пугают масштабы. В конце концов ты астроном. Дело в том, что Вселенная расширяется и не хватает материи, чтобы остановить этот процесс. Через какое-то время не будет ни новых звезд, ни новых планет, ни новых форм жизни… все та же публика. Все останавливается. Никаких новостей. И поэтому в Лебеде А мы опробуем новую технологию. Истинно новую. Ну что-то вроде эксперимента в области градостроительства. Но это не единственное наше занятие. Если возникнет необходимость, нам придется замкнуть часть этой Вселенной, сохраняя ее пространство для грядущих эонов. Придется заняться увеличением локальной плотности материи. Добрая работа и честная.</p><p class="p1">Словно торговля скобяными товарами в штате Висконсин.</p><p class="p1">Объект Лебедь А расположен в 600 миллионах световых лет от Земли, и астрономы планеты, да и всего Млечного Пути, видят сейчас, что там происходило 600 миллионов лет назад. В ту пору в земных океанах вряд ли можно было найти хоть одно существо, способное сдвинуть камешек с места. Как же они <em>стары</em>.</p><p class="p1">Шестьсот миллионов лет назад на пляже, похожем на этот… только без крабов, чаек и пальм. Элли еще крепче впивалась большими пальцами в песок, она чувствовала себя крошечной амебой, выброшенной на берег… а эти создания уже тогда осваивали экспериментальный галактогенез и основы космического проектирования.</p><p class="p1">— Значит, вы перекачиваете материю в Лебедь А целых 600 миллионов лет?</p><p class="p1">— Да, ваши радиоастрономы уже успели ознакомиться с некоторыми из побочных эффектов ранней стадии наших работ. Теперь мы ушли далеко.</p><p class="p1">Она подумала, пройдут новые сотни миллионолетий, и радиоастрономы Земли, если она еще будет существовать, смогут обнаружить вблизи Лебедя А значительный прогресс в перестройке Вселенной. Постаравшись успокоиться, она ждала новых откровений, дав себе обет не думать о собственном ничтожестве. В космосе обнаружилась целая иерархия могучих существ, подобных которым она не могла даже представить. Но и для Земли отыщется ступенька на этой лестнице — иначе зачем им все эти хлопоты?</p><p class="p1">Тьма втекала обратно в зенит, уступая место Солнцу и голубому небу. Все стало прежним: легкий прибой, песчаный берег, пальмы, дверь Магритта, микрокамера, пальмовая ветвь и… отец.</p><p class="p1">— А эти облака и кольца межзвездного газа возле центра Галактики, разве они не являются результатом периодических взрывов? Разве не опасно располагать станцию именно здесь?</p><p class="p1">— Эпизодических, а не периодических. Они не настолько сильны, как в Лебеде А. Они предсказуемы. И мы ждем их заранее — приходится только вовремя присесть, так сказать. Ну когда случается что-нибудь серьезное, станцию приходится отводить подальше. Все это, понимаешь, повседневная рутина.</p><p class="p1">— Конечно. Рутина. Значит, вы и построили все это? Ходы в том числе… Вы и… инженеры из других галактик?</p><p class="p1">— Нет, мы ничего не строили.</p><p class="p1">— Я чего-то не поняла. Поясни.</p><p class="p1">— Так было во всех галактиках. Мы, например, происходим из многих миров Млечного Пути. Когда первые из нас изобрели звездолеты, то вскоре случайно наткнулись на одну из пересадочных станций. Конечно, тогда мы не знали, что это такое. Мы даже не знали, что это искусственные сооружения, пока не набрались смелости и не нырнули в эти дыры.</p><p class="p1">— Кто это «первые»? Предки… вашей расы… вида?</p><p class="p1">— Нет-нет, мы все не родня по крови, мы происходим из многих миров. И понемногу мы разыскали много ходов, они были различного возраста и по-разному украшены, но все оказались заброшенными. Большая часть ходов действует до сих пор. Мы только кое-что починили и усовершенствовали.</p><p class="p1">— А другие искусственные объекты? Мертвые города? Какие-нибудь анналы? Случайно оставшиеся строители?</p><p class="p1">Он покачал головой.</p><p class="p1">— И никаких заброшенных заводов величиной с планету?</p><p class="p1">Он повторил жест.</p><p class="p1">— Значит, существовала галактическая цивилизация, которая упаковала вещички и уехала отсюда, не оставив иных следов, кроме станций?</p><p class="p1">— Более или менее так. В других галактиках дело обстояло точно так же. Миллиарды лет назад они куда-то исчезли. И мы не знаем куда.</p><p class="p1">— Но куда они могли подеваться?</p><p class="p1">Он в третий раз, но уже медленнее, качнул головой.</p><p class="p1">— Значит, вы не…</p><p class="p1">— Да, мы только «обслуживающий персонал», — проговорил он. — Но однажды они могут вернуться.</p><p class="p1">— Если позволишь, еще вопрос, — попросила Элли, выставив вперед указательный палец, как это делала с двухлетнего возраста, — еще один.</p><p class="p1">— Хорошо, — невозмутимо отвечал он, — но у нас осталось только несколько минут.</p><p class="p1">Она вновь поглядела на дверь и слегка поежилась, когда мимо проскочил небольшой полупрозрачный краб.</p><p class="p1">— Я хочу узнать о ваших мифах, о религии. О том, что наполняет вас священным трепетом. Неужели творцы, обладающие немыслимым могуществом, сами не способны на благоговение?</p><p class="p1">— Люди тоже создают одухотворенные вещи. Я понимаю, о чем ты спрашиваешь. Конечно, мы ощущаем и благоговение, и трепет. Мне просто трудно передать тебе это ощущение во всей полноте. Я приведу тебе простой пример, не совсем точный, но он позволит тебе получить представление…</p><p class="p1">Отец умолк на миг, в этот момент у нее кольнуло слева в затылочной части. Элли поняла, что он как-то перебирает ее нейроны. Неужели прошлой ночью они что-то пропустили? Если так, отлично. Значит, и они не наделены совершенством.</p><p class="p1">— …о природе благоговения в нашем понимании. Возьмем, например, число «пи», отношение длины окружности к ее диаметру. Конечно, ты знаешь и про это число, и про то, что оно бесконечно. Во всей Вселенной не найдется такого создания, которое могло бы вычислить «пи» до последней цифры — умственные способности тут ни при чем, поскольку у числа нет предела. Ваши математики сумели вычислить его до…</p><p class="p1">Она вновь ощутила покалывание.</p><p class="p1">— …Никто из вашей Пятерки не знает… Ну, скажем, до десятимиллиардного знака. Надеюсь, тебя не удивит, что математики других миров дерзнули на большее. Предположим, что расчеты некоторых из них позволили уйти после запятой на десять в двадцатой степени знаков. И тогда происходит следующее: хаос цифр исчезает и начинается невероятно долгий ряд, состоящий только из нулей и единиц.</p><p class="p1">Он небрежно чертил пальцем ноги круг на песке. Элли чуть помедлила, прежде чем ответить.</p><p class="p1">— Потом участок с нулями и единицами заканчивается и вновь начинается беспорядочный набор цифр? — Заметив слабое поощрение в его глазах, она продолжила: — А число нулей и единиц? Оно равно произведению простых чисел?</p><p class="p1">— Да, одиннадцати чисел.</p><p class="p1">— Значит, внутри числа «пи» содержится сообщение, имеющее одиннадцать измерений? Кто-то во Вселенной пытается обратиться к нам с помощью… математики? Но как… помоги, я не понимаю. Ведь математика не подчиняется произволу. То есть число «пи» повсюду имеет одно и то же значение. Как можно заложить послание в «пи»? Значит, оно заложено в самые основы Вселенной?</p><p class="p1">— Именно.</p><p class="p1">Элли молча глядела на него.</p><p class="p1">— Дело обстоит даже лучше, — продолжал он. — Предположим, что последовательность нулей и единиц проявляется только в десятичной системе счисления, а в остальных наблюдается некая путаница. Предположим также, что существа, впервые обнаружившие это, обладали десятью пальцами. Понимаешь? То есть число «пи» миллиарды лет дожидалось внимания десятипалых математиков. Значит, это послание как бы адресовано нам.</p><p class="p1">— Но ведь это только пример, и речь вовсе не о десяти в двадцатой степени знаков? У вас же не десять пальцев?</p><p class="p1">— Действительно, — он вновь улыбнулся.</p><p class="p1">— Но что же, ради бога, в нем говорится?</p><p class="p1">Помедлив, он поднял указательный палец и ткнул им в сторону двери. Из нее выходили люди.</p></span></span>
