<div class="title">
<p class="p">Примечания</p>
</div>
<span id="id49"><div class="title4">
<p class="p">1</p>
</div><p class="p1">Годичный отпуск, предоставляемый ученому для занятий.</p></span>
<span id="id48"><div class="title4">
<p class="p">2</p>
</div><p class="p1">Итальянский художник XX в.</p></span>
<span id="id47"><div class="title4">
<p class="p">3</p>
</div><p class="p1">Кровь Христова (исп.)</p></span>
<span id="id46"><div class="title4">
<p class="p">4</p>
</div><p class="p1">набедренная повязка (инд.)</p></span>
<span id="id45"><div class="title4">
<p class="p">5</p>
</div><p class="p1">От момента начала наблюдений.</p></span>
<span id="id44"><div class="title4">
<p class="p">6</p>
</div><p class="p1">Янский (по имени амер. ученого К.Янского) — единица спектральной плотности потока излучения (сокр. обозначение Ян).</p></span>
<span id="id43"><div class="title4">
<p class="p">7</p>
</div><p class="p1">Относительно звезд.</p></span>
<span id="id41"><div class="title4">
<p class="p">8</p>
</div><p class="p1">Объединенная система противовоздушной обороны Североамериканского континента.</p></span>
<span id="id38"><div class="title4">
<p class="p">9</p>
</div><p class="p1">Томас Пейн (1737–1809) — политический деятель США, автор Декларации независимости (1776).</p></span>
<span id="id39"><div class="title4">
<p class="p">10</p>
</div><p class="p1">Милленаризм, или хилиазм, — религиозно-мистическое учение о грядущем «конце света» и наступлении Царства Божия.</p></span>
<span id="id36"><div class="title4">
<p class="p">11</p>
</div><p class="p1">Имеющими отношение к испражнениям.</p></span>
<span id="id34"><div class="title4">
<p class="p">12</p>
</div><p class="p1">Многонародный (греч.)</p></span>
<span id="id32"><div class="title4">
<p class="p">13</p>
</div><p class="p1">Повторным объединением.</p></span>
<span id="id30"><div class="title4">
<p class="p">14</p>
</div><p class="p1">Или бодисатва (санскр.) — в буддизме идеальное существо, которое выступает как наставник и образец для других людей, ведущий их по пути нравственного совершенствования.</p></span>
<span id="id28"><div class="title4">
<p class="p">15</p>
</div><p class="p1">Первая заповедь: «Да не будет у тебя других богов перед лицом Моим».</p></span>
<span id="id26"><div class="title4">
<p class="p">16</p>
</div><p class="p1">Господи помилуй (греч.)</p></span>
<span id="id24"><div class="title4">
<p class="p">17</p>
</div><p class="p1">Джеймс Ашер (1581–1656), ирландский богослов.</p></span>
<span id="id22"><div class="title4">
<p class="p">18</p>
</div><p class="p1">толкованием (греч.)</p></span>
<span id="id21"><div class="title4">
<p class="p">19</p>
</div><p class="p1">Джеймс Медисон (1751–1836), четвертый президент США; Джон Куинси Адамс (1767–1848), шестой президент США.</p></span>
<span id="id18"><div class="title4">
<p class="p">20</p>
</div><p class="p1">Большая Британская энциклопедия (лат.)</p></span>
<span id="id16"><div class="title4">
<p class="p">21</p>
</div><p class="p1">тайна ужасающая (лат.)</p></span>
<span id="id14"><div class="title4">
<p class="p">22</p>
</div><p class="p1">Люди, обожествляющие сексуальную сторону человеческой жизни.</p></span>
<span id="id12"><div class="title4">
<p class="p">23</p>
</div><p class="p1">«У Богов» (фр.)</p></span>
<span id="id10"><div class="title4">
<p class="p">24</p>
</div><p class="p1">ecdysis (лат.) — линька, сбрасывание покрова.</p></span>
<span id="id8"><div class="title4">
<p class="p">25</p>
</div><p class="p1">Английский писатель и лексикограф (1709–1784).</p></span>
<span id="id6"><div class="title4">
<p class="p">26</p>
</div><p class="p1">Роберт Клайв (1725–1774) — английский колониальный деятель, губернатор Бенгалии; Уолтер Рэли (1552–1618) — английский мореплаватель, колонизатор Америки, поэт, драматург, историк.</p></span>
<span id="id4"><div class="title4">
<p class="p">27</p>
</div><p class="p1">Парижский национальный банк.</p></span>
<span id="id3"><div class="title4">
<p class="p">28</p>
</div><p class="p1">Почитатели древневосточного пророка Зороастра (иран. Заратуштра) и Митры — бога дневного света, чистоты, подателя жизни (в индоиранских религиях).</p></span>
<span id="id2"><div class="title4">
<p class="p">29</p>
</div><p class="p1">городишке (евр.)</p></span>
<span id="id1"><div class="title4">
<p class="p">30</p>
</div><p class="p1">В архитектуре Древней Месопотамии культовая башня.</p></span>
<span id="id58"><div class="title4">
<p class="p">31</p>
</div><p class="p1">Вооружение гладиаторов в Древнем Риме.</p></span>
<span id="id57"><div class="title4">
<p class="p">32</p>
</div><p class="p1">По современным воззрениям, облако комет, окружающее Солнечную систему за пределами орбиты Плутона.</p></span>
<span id="id56"><div class="title4">
<p class="p">33</p>
</div><p class="p1">безбрачие католических священников (лат.)</p></span>
<span id="id55"><div class="title4">
<p class="p">34</p>
</div><p class="p1">Капитолийский холм, здание конгресса США в Вашингтоне, резиденция правительства США.</p></span>
<span id="id54"><div class="title4">
<p class="p">35</p>
</div><p class="p1">клавишный музыкальный инструмент (амер.)</p></span>
<span id="id53"><div class="title4">
<p class="p">36</p>
</div><p class="p1">Основан решением конгресса в 1846 г. в соответствии с завещанием английского ученого Джеймса Смитсона.</p></span>
<span id="id52"><div class="title4">
<p class="p">37</p>
</div><p class="p1">Подобное объяснение не позволяет описать всех фаз процесса умирания, известных из работ Р.Моуди, П.Калиновского, С.Роуза и др.; к тому же при клинической смерти по такому тоннелю летят, а не ползут или проталкиваются.</p></span>
<span id="id51"><div class="title4">
<p class="p">38</p>
</div><p class="p1">Братский союз (гол.)</p></span>
<span id="id50"><div class="title4">
<p class="p">39</p>
</div><p class="p1">Четырнадцатое февраля (исп.)</p></span>
<span id="id42"><div class="title4">
<p class="p">40</p>
</div><p class="p1">Левовращающий гликозиднитрил; растительный продукт, извлекаемый из косточек миндаля и абрикоса, считающийся эффективным средством против многих случаев рака.</p></span>
<span id="id40"><div class="title4">
<p class="p">41</p>
</div><p class="p1">Бог из машины (лат.)</p></span>
<span id="id37"><div class="title4">
<p class="p">42</p>
</div><p class="p1">невысокий спальный помост (яп.)</p></span>
<span id="id35"><div class="title4">
<p class="p">43</p>
</div><p class="p1">Традиционный широкий пояс из яркого шелка.</p></span>
<span id="id33"><div class="title4">
<p class="p">44</p>
</div><p class="p1">Китайский революционер-демократ (1866–1925); в 1912 г. основал партию гоминьдан.</p></span>
<span id="id31"><div class="title4">
<p class="p">45</p>
</div><p class="p1">Один из пяти народных праздников Японии, отмечаемый 7 июля; посвящен звездам Веге и Альтаиру, Пряхе и Пастуху, покровительствовавшим любви, портняжному делу и каллиграфии.</p></span>
<span id="id29"><div class="title4">
<p class="p">46</p>
</div><p class="p1">Мусульманская секта, основана в конце XIX в. Мирзой Гуламом Ахмадом, которого почитают как пророка.</p></span>
<span id="id27"><div class="title4">
<p class="p">47</p>
</div><p class="p1">Последователи суфизма — мистико-аскетического течения в исламе, возникшего в VIII в. (араб.)</p></span>
<span id="id25"><div class="title4">
<p class="p">48</p>
</div><p class="p1">мусульманский мессия, спаситель (араб.)</p></span>
<span id="id23"><div class="title4">
<p class="p">49</p>
</div><p class="p1">В европейской литературе — Магомет (ок. 570–632), основатель ислама.</p></span>
<span id="id20"><div class="title4">
<p class="p">50</p>
</div><p class="p1">Дочь вождя племени алгонкинов (1596–1617), сыгравшая известную роль в ранней истории штата Виргиния.</p></span>
<span id="id19"><div class="title4">
<p class="p">51</p>
</div><p class="p1">См. начало «Алисы в Стране чудес» Л.Кэрролла.</p></span>
<span id="id17"><div class="title4">
<p class="p">52</p>
</div><p class="p1">Здесь — законы; имеются в виду карты-символы Тарот.</p></span>
<span id="id15"><div class="title4">
<p class="p">53</p>
</div><p class="p1">Известная американская киноактриса, снимавшаяся в приключенческих фильмах в 30-70-х годах.</p></span>
<span id="id13"><div class="title4">
<p class="p">54</p>
</div><p class="p1">Саронг — мужская и женская одежда в виде длинной юбки, распространенная в Юго-Восточной Азии.</p></span>
<span id="id11"><div class="title4">
<p class="p">55</p>
</div><p class="p1">Соус из мяса, рыбы, фруктов или овощей, приправленный разными пряностями.</p></span>
<span id="id9"><div class="title4">
<p class="p">56</p>
</div><p class="p1">причинность, причинная обусловленность (лат.)</p></span>
<span id="id7"><div class="title4">
<p class="p">57</p>
</div><p class="p1">Эпистемология (филос.) — теория познания.</p></span>
<span id="id5"><div class="title4">
<p class="p">58</p>
</div><p class="p1">помешательство впятером (фр.)</p></span>
