<span><span id="id15"><div class="title3">
<p class="p">13. Вавилон</p>
</div><div class="epigraph">
<p class="p1">С надежнейшими из друзей бродил я по улицам Вавилона…</p>
<p class="text-author">Августин. «Исповедь», II, 3</p>
</div><p class="p1">Компьютер «Крей-21» должен был каждый день сравнивать снятый «Аргусом» урожай данных с более ранними записями палимпсеста. Сопоставлять одну длинную невразумительную последовательность нулей и единиц с другой, столь же малопонятной, но полученной ранее. Так проводилась статистическая обработка различных частей еще не прочитанного текста. В нем постоянно попадались одни и те же короткие цепочки нулей и единиц, которые исследователи оптимистически называли словами; они повторялись снова и снова. Однако многие из них только по разу встречались на тысячах страниц текста. Статистический подход к дешифровке был известен Элли еще по высшей школе. Самостирающиеся подпрограммы, по специальному распоряжению президента предоставленные «Аргусу» экспертами Совета национальной безопасности, проявили себя при прочтении наилучшим образом.</p><p class="p1">И какие только умственные усилия, размышляла Элли, тратятся на прочтение чужой переписки! Глобальная конфронтация Соединенных Штатов и Советского Союза, несколько ослабевшая в последнее время, все еще пожирала ресурсы планеты. В эту прорву уходили не только средства, расходуемые всеми нациями на военные цели. Общие военные расходы планеты уже превышали два триллиона долларов… цифра просто ужасная, если учитывать наличие у людей житейских потребностей. Но худшее она видела в том, что на гонку вооружений безвозвратно растрачивался умственный потенциал.</p><p class="p1">Примерно половина всех ученых планеты в той или иной форме сотрудничала с одним из без малого двух сотен военных ведомств, разбросанных по всему свету. Причем в оборонку шли вовсе не неудачники, так и не справившиеся с азами физики и математики. Некоторые из ее коллег изредка обнаруживали склонность к подобным мыслям, когда возникал неловкий вопрос — что отвечать очередному претенденту на докторскую степень, выпестованному какой-нибудь из оружейных лабораторий. «Был бы ассистентом в Станфорде, если бы он годился на что-нибудь», — так однажды в ее присутствии высказался Драмлин. Сама Элли считала, что он неправ и что применением математики и прочих наук в военных целях занимались люди определенного склада… скажем те, кто в детстве любил устраивать всякие взрывы или не любил драк на школьном дворе, а теперь добивался реванша… и еще — вечно юные любители головоломок, способные расшифровывать самые сложные сообщения. Погонял их политический кнут — порождение международных конфликтов, иммиграционной политики, ужасов последней войны, жестокости полицейских или национальной пропаганды — современной или давнишней. Элли понимала, что многие из них действительно способные люди. И все-таки не могла по-настоящему понять причины, побудившие этих специалистов заниматься подобными делами. Она все пыталась представить себе, что могло бы произойти, если бы все эти талантливые люди посвятили свой труд процветанию человеческого рода и его планеты.</p><p class="p1">Элли корпела над материалами, накопившимися за время ее отсутствия. В дешифровке послания успехов почти не было. Несмотря на это, результаты статистического анализа составляли уже стопу бумаги метровой толщины. Этот факт не вдохновлял.</p><p class="p1">Она жалела, что в «Аргусе» у нее нет близких подруг, с кем можно было бы поделиться своей обидой на Кена. Все они были далеко, а пользоваться телефоном в этих целях Элли решительно не хотела. Она сумела выбраться на уик-энд в Остин к Бекки Элленбоген, подруге по колледжу. Но Бекки, обычно сухо или с осуждением оценивавшая мужчин, в данном случае высказалась неожиданно мягко:</p><p class="p1">— Все-таки он советник президента по науке, а ты сделала самое изумительное открытие в истории всего человечества. Лучше будь с ним помягче, он вернется.</p><p class="p1">Бекки принадлежала к числу тех, которым Кен казался очаровательным, — ей случилось познакомиться с ним на освящении Национальной нейтринной обсерватории. Пожалуй, она обнаруживала известную восприимчивость к обаянию власти. Если бы дер Хиир обошелся с Элли подобным образом будучи просто профессором молекулярной биологии, Бекки безжалостно выпотрошила бы его и замариновала.</p><p class="p1">Возвратившийся из Парижа дер Хиир имел теперь вид преданного и раскаявшегося человека. Я сильно перенапрягся, пояснял он, было столько дел, в том числе трудные и незнакомые мне политические вопросы. Кроме того, его положение главы американской делегации и сопредседателя конференции могло бы стать уязвимым, если бы об их взаимоотношениях с Элли проведала публика. Китц был несносен. И ему, Кену, столько ночей подряд приходилось спать всего по несколько часов. Элли рассудила, что причин уж слишком много. Но решила продолжать роман.</p><p class="p1">Случившееся опять первым заметил Вилли на предутреннем дежурстве. Впоследствии быстроту, с которой свершилось открытие, он объяснял в большей степени возможностями новых хадденовских интегральных схем, использованных для распознавания текста, чем быстродействием криогенного компьютера и программами, предоставленными экспертами Совета национальной безопасности. В любом случае, когда компьютер поднял поначалу недооцененную Вилли тревогу, Вега уже клонилась к горизонту. Не без недовольства Вилли отложил книгу — новый сборник по скоростной фурье-спектроскопии — и заметил на экране следующие слова:</p><p class="p1">«ПОВТ. ТЕКСТА СТР. 41617 — 41619. РАССОГЛАСОВАНИЕ БИТОВ 0/2271. КОЭФФИЦИЕНТ КОРРЕЛЯЦИИ 0,99».</p><p class="p1">Пока он глядел, 41619 превратилось в 41620, а потом в 41621. Цифры под наклонной чертой непрерывно менялись. Число страниц и коэффициент корреляции увеличивались, свидетельствуя, что совпадение не может быть случайным. И он пропустил еще пару страниц, прежде чем вызвать Элли по прямому телефону.</p><p class="p1">Стряхнув глубокий сон, она на миг потеряла ориентацию. Но быстро включив лампу возле кровати, после недолгого раздумья распорядилась вызвать весь старший персонал «Аргуса». А сама она, как сообщила в трубку, попытается разыскать дер Хиира, который должен быть где-нибудь неподалеку. Дело оказалось нетрудным — она просто тронула его за плечо.</p><p class="p1">— Кен, вставай. Говорят, началось повторение.</p><p class="p1">— Что?</p><p class="p1">— Послание повторяется. По крайней мере так говорит Вилли. Я уже выхожу. А ты можешь подождать минут десять, пусть они подумают, что ты был в своей комнате в общежитии младшего персонала.</p><p class="p1">Элли была почти у двери, когда он окликнул ее:</p><p class="p1">— Но ведь это же не начало? Введения по-прежнему нет.</p><p class="p1">По экранам попарно бежали цепочки нулей и единиц. Шло прямое сравнение данных, только что полученных «Аргусом», с принятыми год назад. Программа позволяла выявлять отличия. Пока их замечено не было. Это радовало — значит, при приеме удалось избежать существенных ошибок, и только изредка обнаруживалось, что какое-нибудь плотное межзвездное облако съело нуль или единицу. Теперь «Аргус» был постоянно связан с дюжинами других радиотелескопов, принадлежавших консорциуму, и новость о начале повтора уже отправилась на запад, в Калифорнию, на Гавайи, на борт «Маршала Неделина», бороздившего просторы южной части Тихого океана, и в Сидней. И если бы это событие состоялось, когда Вега находилась над любым телескопом, в «Аргусе» мгновенно узнали бы об этом.</p><p class="p1">Страшно разочаровывало отсутствие введения, но это было не единственным сюрпризом. Номера страниц при повторе уменьшились примерно от 40000-й до 10000-й. Значит, «Аргус» принял сообщение с Веги почти в тот момент, когда оно пришло на Землю. Сигнал был достаточно сильным, и его могли принимать даже небольшие ненаправленные телескопы. По какому-то удивительному совпадению передача достигла Земли именно тогда, когда телескопы «Аргуса» были обращены к Веге. Неужели это означало, что текст начинался с 10000-й страницы? А где первые 10000? Или это только на отсталой Земле принято нумеровать листы в книгах начиная с цифры 1? А может быть, весь этот последовательный ряд чисел — не номера страниц, а нечто другое? Или — и это более всего беспокоило Элли — мышление людей и чужаков различалось коренным и неожиданным образом? Тут возникали вполне обоснованные сомнения: консорциум может не понять текста Послания, даже получив введение.</p><p class="p1">Послание повторилось, все пробелы были заполнены, но никто не был в состоянии прочесть хотя бы одно слово. Людям казалось невероятным, что передающая цивилизация, настолько скрупулезная во всем, попросту упустила из виду необходимость какого-то введения. Все-таки и Олимпийские игры, и внутреннее помещение Машины свидетельствовали о том, что все предназначено именно людям. Едва ли стоило затевать все эти хлопоты, не предусмотрев помощи адресату. И скоро все сошлись на том, что в палимпсесте должен быть и четвертый слой. Но где?</p><p class="p1">Диаграммы были опубликованы в кофейного цвета восьмитомнике, ставшем известным всему миру. По всей планете люди старались понять, что же изображено на картинках. Особенно красноречивыми казались сам додекаэдр и квазибиологические формы. В «Аргус» стекались разнообразные «проницательные» догадки, которые внимательно просеивались учеными. Вместе с тем широкой популярностью пользовалось и великое множество дурацких прочтений, в основном из числа публикуемых еженедельниками. Уже возникла целая индустрия — этого создатели Послания явно не могли предусмотреть, — занимавшаяся откровенным надувательством с помощью диаграмм. Стало известно о древнем мистическом ордене Додекаэдра. Машину связывали с НЛО и называли колесом Иезекииля. Ангел поведал о назначении Послания и диаграмм британскому бизнесмену, распространявшему — поначалу за собственный счет — эту ерунду по всему миру. При наличии большого числа загадочных рисунков и схем можно было не сомневаться, что все религии мира отыщут в Послании со звезд собственную символику. В главном поперечном сечении Машина в известной степени напоминала хризантему, что было встречено с энтузиазмом в Японии. Если бы среди всех диаграмм оказалось человеческое лицо, мессианская лихорадка вспыхнула бы с удвоенной силой.</p><p class="p1">Тем временем многие люди, ожидая Второе пришествие, подводили жизненные итоги и уходили от дел. Объем производства снизился во всех странах мира. И раз конец света запаздывал, многие из тех, кто раздал свое состояние бедным, вынуждены были обратиться за помощью к государству, поскольку подобные дары и составили основу для благотворительности. Многим из филантропов пришлось жить плодами собственной щедрости. Делегации требовали от правительственных лидеров гарантий, что, скажем, шистосоматоз или голод исчезнет после Пришествия, чтобы людям было еще на что надеяться. Более трезвомыслящие безмятежно полагали, что если на мир и напала хворь бескорыстия, то не грех погреть на этом руки.</p><p class="p1">Некоторые утверждали, что введения просто не существует, что цель Послания — научить людей смирению или же свести их с ума. Передовицы пространно разглагольствовали о том, что человечество вовсе не так разумно, как хотелось бы думать, корили ученых, не оправдавших всех наших надежд, учитывая всю ту поддержку, которую оказывают науке правительства. Что, если люди гораздо глупее, чем предполагали веганцы? Быть может, Послание — просто тест, рассылаемый всем молодым цивилизациям, которого не избежала ни одна планета в истории Галактики? Иные комментаторы так и льнули к теме смирения перед лицом космоса, старательно напоминая, что они всегда твердили об этом.</p><p class="p1">В конце концов, Элли поняла, что ей нужна помощь.</p><p class="p1">Они осторожно входили через ворота Энлиля под охраной, выделенной хозяином эскорта. Правительственная охрана маячила невдалеке, несмотря на появление дополнительного эскорта, а может быть, именно поэтому.</p><p class="p1">Солнце еще не село, и грязные улицы уже освещались масляными плошками, редкими факелами. У входа в лавку, торгующую оливковым маслом, располагались две высокие амфоры, способные вместить человека. Объявления были писаны клинописью. Здание напротив было украшено барельефом львиной охоты из библиотеки Ашшурбанипала. Когда они приблизились к храму Ашшура, толпа забурлила, а охранники, толкаясь, расчистили место, чтобы Элл и могла беспрепятственно поглядеть на зиккурат<a href="ch2.xhtml#id1" class="a">[30]</a>, видневшийся в дальнем конце поперечной улицы. Он впечатлял куда более, чем на фотографиях. Незнакомые инструменты в свете факелов отливали воинственной медью. Мимо в колеснице проехали трое, голову возницы украшал фригийский колпак. В соответствии со средневековой традицией вершина зиккурата тонула в низких сумеречных облаках, как на иллюстрации к Книге Бытия. Оставив дорогу Иштар, они вошли в зиккурат из переулка. Оказавшись в частном лифте, сопровождающий нажал на кнопку самого верхнего этажа — на ней было написано «Сорок». Никаких цифр. Не оставляя место сомнениям, засветилась стеклянная табличка с надписью «Боги».</p><p class="p1">Мистер Хадден не заставит себя долго ждать. Не желает ли она тем временем выпить чего-нибудь? Учитывая репутацию этого места, Элли отказалась. Под ногами ее простирался Вавилон, по общему мнению во всем великолепии восстановленный через тысячелетия.</p><p class="p1">Днем автобусы из школ, музеев и туристских агентств останавливались возле ворот Иштар, прибывшие переодевались в соответствующую одежду и оказывались в прошлом. Все дневные доходы мудрый Хадден жертвовал на благотворительные нужды Нью-Йорка и Лонг-Айленда. Дневные экскурсии пользовались невероятной популярностью во многом потому, что предоставляли возможность посетить Вавилон тем людям, которые никогда не стали бы даже близко подходить к нему ночью. Ничего, пусть потом пускают слюнки.</p><p class="p1">С наступлением темноты Вавилон становился местом увеселений для взрослых. Пышностью, масштабом и выдумкой он затмевал, скажем, Реепербан в Гамбурге. Крупнейший туристический аттракцион Нью-Йорка, приносящий к тому же и самый обильный доход. Каким образом Хадден сумел убедить городские власти Нью-Йорка и Вавилона, как он добился смягчения законов о проституции штата и города, не ведал никто. Теперь из Манхэттена до ворот Иштар можно было доехать меньше чем за полчаса. Несмотря на сопротивление охраны, Элли настояла на поезде и там обнаружила, что почти треть посетителей принадлежала к женскому полу. На стенках вагона не было ни ругательств, ни откровенных рисунков, и можно было почти не опасаться ограбления. Поездка оказалась куда менее шумной по сравнению с нью-йоркской подземкой.</p><p class="p1">Хотя Хадден являлся членом Национальной инженерной академии, он ни разу, насколько было известно Элли, не присутствовал на заседаниях, поэтому ей еще не приходилось встречаться с ним. Но миллионы американцев прекрасно знали его в лицо — результат кампании, проведенной против него рекламными агентствами. «Это не американец» — так было написано под весьма не приукрашенным портретом. И все-таки она невольно отшатнулась от стеклянной стенки, когда ход ее мыслей нарушил невысокий толстяк.</p><p class="p1">— Ох, извините. Никак не могу понять, почему вечно пугаю всех.</p><p class="p1">Голос его оказался на удивление музыкальным. Он и разговаривал словно в квинту. Представляться, с его точки зрения, явно было излишне, и он вновь кивнул ей в сторону распахнутой двери. Поскольку в подобной обстановке любые эксцессы казались невозможными, она молча вошла в соседнюю комнату.</p><p class="p1">Он подвел ее к искусно сделанной настольной модели древнего города, куда менее претенциозного, чем Вавилон.</p><p class="p1">— Помпеи, — пояснил он. — Главное здесь стадион. После введения ограничений на бокс в Америке не осталось ни единого здорового вида спорта. А они очень важны. Выпускают стоялую кровь из жил нации. Спроектировали, изготовили, и на тебе!</p><p class="p1">— Что же?</p><p class="p1">— Никаких гладиаторских игр! Я только что получил сообщение из Сакраменто. Там уже рассмотрели закон, запрещающий проведение гладиаторских игр в Калифорнии. Слишком крутое зрелище, с их точки зрения. Всякий раз, когда утверждается проект нового небоскреба, заранее известно, что погибнут двое или трое рабочих. Об этом знают и профсоюз, и сами строители, но на эти жертвы идут только ради того, чтобы соорудить новый офис для нефтяной компании или для адвокатов с Беверли-Хиллс. Конечно, жертвы будут. Но мы же намереваемся ограничиться сетью и трезубцами<a href="ch2.xhtml#id58" class="a">[31]</a>, а вовсе не короткими мечами. Хадден криво улыбнулся и вновь предложил ей выпить, Элли опять отказалась.</p><p class="p1">— Так, значит, вы хотите переговорить со мной о Машине, я и сам хочу того же. Начинайте. Вы пришли узнать, где искать введение?</p><p class="p1">— Мы ищем помощи у немногих — только у одаренных и проницательных людей. А поэтому решили, что при вашем-то огромном количестве изобретений — тем более именно ваша схема распознавания использовалась для обнаружения повторяющихся частей текста — вы способны представить себе, как поступили веганцы, и намекнуть нам, где следует искать введение. Безусловно, мы понимаем, что вы очень заняты, и мне крайне жаль…</p><p class="p1">— Ах, нет. Правильно. Конечно, я занят. Стараюсь привести в порядок дела, потому что предвижу крупные перемены в собственной жизни…</p><p class="p1">— Готовитесь встретить новое тысячелетие? — Элли попыталась представить, как он раздает бедным свой исследовательский институт «Хадден энд компани», брокерскую контору на Уолл-стрит, «Дженетик энжиниринг Инк», «Хадден кибернетике» и «Вавилон».</p><p class="p1">— Ну не совсем. Дело не в этом. Просто мне было очень приятно поразмыслить над этим. Я так обрадовался, узнав о вашей просьбе. Я проглядел диаграммы, — он махнул рукой в сторону знакомого восьмитомника, в беспорядке разложенного на рабочем столе. — Я обнаружил там удивительные чертежи, но едва ли все это имеет отношение к введению. По крайней мере его можно не искать среди диаграмм. Не понимаю, почему вы решили, что введение должно быть частью Послания. Они могли укрыть его на Марсе или Плутоне, в кометном облаке Оорта<a href="ch2.xhtml#id57" class="a">[32]</a> наконец, и мы обо всем узнаем через какую-нибудь пару-тройку столетий. Ну а пока мы имеем чертежи чудесной Машины вместе с пояснениями к ним на тридцати тысячах страниц. Но нам неизвестно, сможем ли мы построить ее, даже если прочтем Послание. Так что будем спокойно ждать: пройдет несколько столетий, техника будет совершенствоваться, и когда-нибудь задача окажется нам вполне по силам. Если введения нет, тем крепче мы связаны с последующими поколениями. Людям прислали задачу, чтобы над ней потрудилось несколько поколений. Не так уж это и плохо. Подобная задача может оказать на человечество благоприятное воздействие. Может быть, вы напрасно ищите… лучше, чтобы оно не нашлось…</p><p class="p1">— Но мне просто необходимо найти введение. Быть может, они не станут дожидаться целую вечность, пока мы созреем. Что, если, не услышав ответа, они повесят трубку? Возможно, мы тогда пожалеем, что этот телефон звонил.</p><p class="p1">— Хорошо, может быть, вы правы, и я обдумал несколько вариантов. Могу предложить вам пару тривиальных возможностей и одну нетривиальную. Сперва тривиальные: введение входит в состав Послания, но передается с другой скоростью. Если скорость передачи составляет около бита в час, сумеете вы обнаружить такую передачу?</p><p class="p1">— Естественно. Обычно мы контролируем и долгопериодические сигналы. Но при одном бите в час мы получим всего лишь… позвольте прикинуть… десять, нет, двадцать тысяч бит до начала повтора Послания.</p><p class="p1">— Такое возможно, если только введение окажется <em>много</em> проще Послания. Но <em>вы</em> ведь так не считаете. И я с вами согласен. А как насчет более высоких скоростей? Можете ли вы поручиться, что под каждым битом описания Машины не скрываются миллионы битов введения?</p><p class="p1">— Подобное привело бы к чудовищному расширению частотного диапазона. Мы бы сразу заметили это.</p><p class="p1">— Хорошо, значит скоростная часть просто повторяется время от времени внутри Послания. Представьте себе крошечную точку, повторяющуюся в разных частях Послания. Перед ней заголовок — полоска с надписью «Внимание, введение!», сразу за ним точка, а в ней заключены сотни миллионов бит, переданных с очень большой скоростью. Проверьте, не обнаружится ли на самом деле что-нибудь в этом роде.</p><p class="p1">— Но мы бы такое заметили.</p><p class="p1">— Тогда вот вам нетривиальная идея. Если все-таки Машину когда-нибудь соорудят и пассажиры усядутся в нее, кто-то нажмет кнопку и все пятеро отправятся неизвестно куда. Кстати, интересный вопрос: вернутся ли они назад? Может быть, и нет. Что, если все это — затея каких-нибудь веганских похитителей тел, их биологов, зоологов, антропологов? Представьте себе, что им понадобилось несколько человеческих тел. Лететь на Землю сложно, неизвестно, разрешат ли еще всякие транспортные службы. В общем одна суета и никакой выгоды. Тогда они просто посылают на Землю всю нужную информацию, и все хлопоты по доставке берут на себя сами <em>земляне</em>. Знаете, как собирают марки? Мальчишкой я любил это дело. Просто отправляешь письмо в любую страну, и, как правило, тебе отвечают. Не важно, что будет в письме, — отправителю нужна только марка. Вот вам мое мнение: такие коллекционеры есть и на Веге, они рассылают свои письма по всей Вселенной, а потом собирают прибывшие тела. Неплохо бы познакомиться с этой коллекцией…</p><p class="p1">Он улыбнулся и продолжил:</p><p class="p1">— Ну хорошо, вы спросите, какое это имеет отношение к введению? Никакого. Введение уместно только в том случае, если я ошибаюсь. А если я ошибаюсь, если эти пятеро вернутся на Землю, им выгодно, чтобы мы располагали космическими кораблями. Какими бы умными и проворными они там ни были, сажать на планету такую Машину не шутка — слишком уж много тут понакручено. Только Господь знает, что у них за двигатели. Если Машина вывалится из пространства в нескольких метрах под Землей, то готово — спеклись. А что такое несколько метров по сравнению с 26 световыми годами? Риск. Когда Машина вернется, она должна оказаться у Земли, над Землей — может быть, в космосе, но не под Землей и не на Земле. Если они уверены, что мы уже обладаем космическими кораблями, значит, пятерых можно вернуть на Землю из космоса. Тогда они начинают торопиться и прыгают на месте от нетерпения, ожидая, пока до Веги доберутся вечерние новости 1957 года. И что они в этом случае делают? Часть Послания передается таким образом, чтобы ее можно было принять только в космосе. Какую часть? Введение. Если сумели его обнаружить, значит, у вас есть космические корабли и вы сможете вернуться обратно. Не исключено, что введение передают в микроволновом диапазоне, на частотах максимального поглощения атмосферным кислородом, или же в ближней инфракрасной области — словом, в любой части спектра электромагнитных волн, которые не пропускает атмосфера Земли…</p><p class="p1">— Телескоп «Хаббла» исследовал Вегу в видимом, ультрафиолетовом и ближнем инфракрасном диапазонах. Никакого намека на передачу. Русские починили свой прибор миллиметрового диапазона и с его помощью исследовали только Вегу, но тем не менее ничего не нашли. Но мы продолжаем наблюдения. Какие могут быть еще варианты?</p><p class="p1">— Вы уверены, что не хотите выпить? Сам я не пью, но многие…</p><p class="p1">Элли вновь отказалась.</p><p class="p1">— Других возможностей нет. Теперь мой черед отвечать. Но я хочу вас попросить кое о чем. Увы, я плохо умею просить. Никогда не умел. Люди представляют меня богачом, смешным и неразборчивым в средствах уродом, которого только интересует, где и как урвать лишний доллар. Не надо говорить, что сами вы иного мнения. В это верят все, по крайней мере отчасти. Возможно, вы уже слыхали кое-что из того, о чем я собираюсь сейчас рассказать, но дайте мне минут десять, и я объясню вам, как все это началось. Я хочу, чтобы вы сперва кое-что узнали обо мне.</p><p class="p1">Она села, недоумевая, чего он от нее хочет, стараясь внутренним оком не представлять себя нагой в святилище храма Иштар, а рядом распаленного Хаддена с парочкой возничих, готовых сменить его.</p><p class="p1">Несколько лет назад Хадден изобрел электронный модуль, автоматически отключавший звук при включении телерекламы. Поначалу в нем не было какого-либо распознающего текст устройства. Модуль просто анализировал амплитуду несущей волны. Телереклама обычно была громче и сопровождалась меньшими шумами, чем передача, которую она прерывала. О модуле Хаддена заговорили. Люди испытывали чувство облегчения, даже блаженства, освободившись от груза обязательной рекламы, отравлявшей им 6-8-часовое пребывание перед телевизором, на которое обречен средний американец. И прежде чем индустрия телевизионной рекламы сумела отреагировать, «Рекламникс» приобрел огромную популярность. Владельцам каналов и рекламистам пришлось менять частоты, но всякий раз Хадден новой выдумкой парировал их меры. Иногда он даже изобретал системы, противодействующие таким сложным мерам, до которых, кроме него, никто еще не додумался. Тогда он принимался уверять рекламные агентства, что облегчает им жизнь, удерживая от работ в этих направлениях, и экономит деньги пайщиков, удерживая компании от ненужных и бесперспективных расходов. Количество раскупавшихся блоков все возрастало, но Хадден поддерживал низкие цены. Шла электронная война. И он побеждал.</p><p class="p1">На него подали в суд, обвинив в подрыве торговли. Обвинители имели достаточное политическое влияние, и ему не удалось добиться закрытия дела, но, чтобы выиграть, им все-таки не хватило политической мускулатуры: его противники оказались довольно слабыми. Процесс заставил Хаддена проштудировать весь свод законов. Вскоре после этого Хадден заказал телерекламу собственного товара через некое агентство на Мэдисон-авеню, основным пайщиком которого негласно являлся он сам. После нескольких недель пререканий, ему отказали. Тогда он подал в суд на все три телекомпании и тут уже сумел доказать преднамеренное противодействие торговле. Сумма выплаченной ему компенсации оказалась рекордной для дел подобного рода и в какой-то мере способствовала кончине пострадавших компаний.</p><p class="p1">Конечно, находились и люди, живо интересовавшиеся рекламой, и поэтому им «Рекламникс» не был нужен. Но таких постепенно становилось все меньше и меньше. На уничтожении телерекламы Хадден нажил целое состояние. И одновременно — кучу врагов.</p><p class="p1">К тому времени, когда на продажу пошли распознающие текст схемы, Хадден успел создать «Проповеднике», субмодуль, подключаемый к «Рекламниксу». Он сам собой переключал каналы при первых звуках религиозного доктринерства. Кодовое слово можно было менять. Устанавливая, скажем, «Пришествие» или «Экстаз», можно было избавиться от пустого многословия. «Проповеднике» был благословением Божьим пусть для меньшей, но все-таки значительной части исстрадавшихся телезрителей. Наполовину в шутку, наполовину всерьез поговаривали, что следующий блок Хаддена будет называться «Трепникс» и будет срабатывать только во время публичных обращений президентов и премьеров.</p><p class="p1">По мере дальнейшего развития текстораспознающих схем Хаддену стало ясно, что они могут найти куда более широкое применение — в науке, образовании, медицине, в военной разведке и промышленном шпионаже. Последнее и послужило причиной знаменитого дела: «Соединенные Штаты против „Хадден кибернетикс“. Одна из микросхем Хаддена оказалась слишком шикарной для гражданского применения, и по настоянию Совета национальной безопасности предприятия и персонал, производящий самые совершенные распознающие схемы, были переданы правительству, которому просто позарез необходимо было знать содержание секретной переписки русских. А уж если русские сумеют прочесть нашу, произойдет бог весть что, уверяли его.</p><p class="p1">Хадден отказался содействовать правительству при передаче предприятия и дал себе обет заниматься исследованиями, которые уж никак нельзя будет привязать к оборонным вопросам. Он принялся во всеуслышание обвинять правительство в том, что оно национализирует промышленность. Мы их считаем капиталистами, а они при первой же возможности показывают свою социалистическую физиономию, говорил Хадден. Он обнаружил неудовлетворенную общественную потребность и легальными и цивилизованными средствами удовлетворил нужды народа. Это же капитализм в чистом виде. Впрочем, среди капиталистов нашлось достаточно трезвых голов, полагавших, что он зашел слишком далеко с «Рекламниксом» и что его действия противоречат американскому образу жизни. В редакционной статье за подписью «В.Петров», написанной в резкой форме, «Правда» назвала этот конфликт образцом капиталистических противоречий. На это «Уолл-стрит джорнел» несколько поверхностно возразил, что и в самом названии «Правда» — по-русски «истина» — кроется конкретный пример внутренних противоречий коммунизма.</p><p class="p1">Хадден подозревал, что секретность здесь только повод и что реальной причиной репрессий была его борьба с телеевангелизмом и телерекламой. И он неоднократно утверждал, что в «Рекламниксе» и «Проповедниксе» видит воплощение идеи капиталистического предпринимательства. Смысл капитализма и состоит в том, чтобы предоставить людям свободу выбора.</p><p class="p1">— Я тогда говорил всем, альтернатива возникает, когда <em>отсутствует</em> реклама. Если нет существенной разницы между образцами рекламируемой продукции, на рекламу уходят колоссальные средства, но когда изделия заметно различаются, люди приобретают лучшее. Реклама же учит людей не верить собственному суждению, она отупляет их. А сильной стране нужны смышленые люди. Поэтому по своей сути «Рекламникс» патриотичен. Теперь производители могут потратить на усовершенствование продукции ту часть денег, которая прежде попусту тратилась на рекламу. Так что потребитель будет только благодарен. А журналы, газеты, почта достигнут процветания, и это поможет уменьшить потери рекламных агентств. Так в чем же дело?</p><p class="p1">«Рекламникс» вызвал целый поток обвинений в клевете и все-таки «похоронил» прежние коммерческие телекомпании. Через некоторое время сонмища безработных рекламистов, служащих телекомпаний и безденежных святош возжаждали крови Хаддена. Выросло число и более серьезных врагов.</p><p class="p1">Еще бы, подумала Элли, а Хадден — человек интересный.</p><p class="p1">— Так что я считаю, пора мне уходить на покой. Денег у меня столько, что я уже и не знаю, что с ними делать. Я нажил врагов повсюду, даже собственная жена терпеть меня не может. Теперь я хочу сделать что-нибудь значительное, настоящее. Такое, о чем люди будут вспоминать через сотни лет и с благодарностью думать обо мне.</p><p class="p1">— То есть вы хотите…</p><p class="p1">— Да, я хочу построить Машину. Имейте в виду, лучшей кандидатуры, чем я, у вас не найдется. У меня работают самые лучшие кибернетики, эксперты и практики; персонал у Карнеги — Меллона, в Массачусетсском технологическом, Станфорде и Санта-Барбаре уступает моему. Из полученных схем ясно одно: слесарю с молотком, зубилом и ведерком краски здесь делать нечего. Это будет в некотором смысле аналог генетического конструирования. Вы не подыщите для этой работы более подходящего исполнителя. К тому же я собираюсь не драть с вас три шкуры.</p><p class="p1">— Мистер Хадден, не мне решать, кому делать Машину, если дойдет до этого. Решение будет приниматься на международном уровне. Следует учитывать различные политические аспекты. В Париже до сих пор еще спорят, <em>стоит ли</em> делать эту штуковину в случае, если мы расшифруем Послание.</p><p class="p1">— Я хорошо осведомлен об этом и воздействую на ситуацию, используя связи, влияние и коррупцию. Но я просто хочу, чтобы и ангелы вовремя замолвили обо мне доброе словечко. Вы понимаете? Кстати, об ангелах. Вы просто потрясли Палмера Джосса и Билли Джо Ренкина. Я не видал их такими возбужденными со времени перепалки о водах Марии. Ренкин уже утверждает, что никогда и нигде не одобрял этой Машины и что, видит Бог, его неправильно поняли.</p><p class="p1">В поддельном ужасе он покачал головой. Обоих просветителей разделяла давнишняя вражда, но раз изобретатель «Проповедникса» в некотором смысле ухудшил их положение, Элли вдруг решила взять их под защиту.</p><p class="p1">— Вообще-то оба они люди смышленые, хотя об этом иногда трудно догадаться. Но Палмер Джосс… человек искренний. Он не пустое трепло.</p><p class="p1">— А вы уверены, что причина здесь кроется не в личном обаянии? Простите, но так важно, чтобы люди все правильно понимали. Ошибки обходятся слишком дорого. Я знаю обоих шутов. В глубине души это шакалы. Но многих религия привлекает — в духовном или сексуальном плане. Не хотите ли поглядеть, что сейчас происходит в храме Иштар?</p><p class="p1">С легким отвращением Элли поежилась и ответила:</p><p class="p1">— Лучше я выпью.</p><p class="p1">Сверху она видела ступени зиккурата, украшавшиеся в зависимости от времени года естественными или искусственными цветами. Она глядела на возрожденные висячие сады Вавилона, одно из «семи чудес света». К ее удивлению, все нисколько не напоминало отель Хиатт. Далеко внизу, освещая себе путь факелами от ворот Энлиля к зиккурату, шествовала процессия. Во главе нее четверо обнаженных до пояса мужчин несли закрытое кресло. Кто или что в нем находилось, понять было невозможно.</p><p class="p1">— Сегодня церемония в честь Гильгамеша, одного из древнешумерских правителей.</p><p class="p1">— Да, я слышала о нем.</p><p class="p1">— Он искал бессмертия, — деловито заметил Хадден и поглядел на часы. — Вы наверняка слыхали, что именно на верхушке зиккурата месопотамские правители получали указания от богов. В частности, от доброго бога Ану. Кстати, я выяснил, как они называли Вегу: Тиранией, жизнью небесной. Не правда ли, интересно?</p><p class="p1">— Ну а вы получили указания?</p><p class="p1">— Нет, боги гостят у вас, не у меня. Имейте в виду, следующая процессия Гильгамеша начнется только в девять часов.</p><p class="p1">— Боюсь, что не сумею задержаться так долго. Но я хочу спросить кое о чем. Почему Вавилон? Почему Помпеи?.. Ведь вы едва ли не самый изобретательный человек на планете. Вы уже создали несколько новых отраслей промышленности, сразили рекламу в ее собственном логове. Ну неважно, что получили порку из-за этих распознающих микросхем. Вы могли бы еще столько сделать. Зачем вам это?</p><p class="p1">Внизу процессия уже приближалась к храму Ашшура.</p><p class="p1">— Вы считаете это недостойным занятием? — спросил он. — Я просто пытался удовлетворить известные общественные потребности, которые правительство старается не замечать или попросту игнорирует. Таков капитализм. Все мои действия имеют легальный характер, приносят радость людям. А кроме того, позволяют выпускать пары, накапливающиеся в некоторых дурных головах, порождаемых этим обществом. Правда, так я считал не всегда. Все очень просто. Я точно помню тот миг, когда мне впервые пришла в голову мысль о Вавилоне. Это случилось в Диснейленде. Мы с моим внуком Ясоном плавали на пароходике по Миссисипи, сзади крутилось колесо. Внуку тогда было года четыре, может быть, пять. Я как раз подумал, как это мудро придумано у Диснея: там не продают билеты возле каждого аттракциона, по входному билету ты можешь бродить целый день, входить куда тебе угодно. Это позволяет немного сэкономить на зарплате, на билетерах, к примеру. Но гораздо существеннее то, что люди всегда переоценивают собственные возможности, они охотно переплатят за право увидеть все, хотя обычно довольствуются куда меньшим. Так вот, возле нас с Ясоном стоял какой-то восьмилетка с отсутствующим взглядом. Не знаю, может быть, ему было лет десять. Отец о чем-то спрашивал его, а мальчик только односложно отвечал. Он поглаживал дуло игрушечной винтовки, оперев ее о перила и придерживая приклад ногами. Он хотел только, чтобы его оставили одного с этой винтовкой. А позади него высились башни и шпили Волшебного королевства. Вы понимаете, о чем я говорю?</p><p class="p1">Наполнив бокал диет-колой, он чокнулся с Элли.</p><p class="p1">— Да погибнут ваши враги, — провозгласил он. — Я прикажу, чтобы вас вывели через ворота Иштар, процессия наверняка запрудила всю улицу до ворот Энлиля.</p><p class="p1">Мгновенно, словно из ниоткуда, возникли провожатые, аудиенция была закончена. Ей вовсе не хотелось задерживаться.</p><p class="p1">— Не забудьте о фазовой модуляции, проверьте полосы поглощения кислородом. Но если я ничем не помогу вам в поисках введения, не забудьте — только я могу построить Машину.</p><p class="p1">Ворота Иштар были ярко освещены. Их поверхность была украшена изразцовыми изображениями странных голубых зверей. Археологи назвали их драконами.</p></span></span>
