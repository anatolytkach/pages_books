<span><span id="id7"><div class="title2">
<p class="p">6. Палимпсест</p>
</div><div class="epigraph">
<p class="p1">А если сами охранители несчастливы, кто же тогда может радоваться?</p>
<p class="text-author">Аристотель. «Политика», кн.2, гл.5</p>
</div><p class="p1">Когда самолет вышел на крейсерскую высоту, оставив Альбукерке более чем в сотне миль за собой, Элли лениво разглядывала небольшую белую карточку, прямоугольник с синими печатными буквами, что был приколот к конверту с авиабилетом. Теми же самыми словами, не изменившимися со времени ее первого полета, он извещал: «Настоящий документ не является багажным билетом (квитанцией), соответствующим 4-й статье Варшавской конвенции». Почему все авиакомпании так беспокоятся, чтобы пассажиры не приняли эту небольшую картонку за билет Варшавской конвенции? Что из себя представляет этот самый билет? Почему она ни разу не видела его? Или их хранят в другом месте? Не иначе, за этими словами скрывается важнейший пункт в истории коммерческой авиации: какая-нибудь невнимательная авиакомпания некогда позабыла про эти слова и разорилась оттого, что разгневанные пассажиры настояли на соблюдении условий Варшавской конвенции. Несомненно, какие-то экономические причины для подобного беспокойства во всемирном масштабе имелись, думала Элли. Во всем прочем Варшавская конвенция себя не проявила. Подумать только, сколько полезного можно было бы напечатать вместо двух дурацких строчек — например, историю познания мира, научную информацию, хотя бы среднее расстояние полета до авиакатастрофы в расчете на одного пассажира.</p><p class="p1">Ей не пришлось бы размышлять об этом, если бы она воспользовалась предложением дер Хиира и отправилась на военном самолете. Но такой жест слишком обязывал бы к дальнейшему сотрудничеству с армией. Они решили лететь обычным рейсом. Едва Валериан устроился поудобнее на своем сиденье возле нее, глаза его закрылись. Особенно спешить не было необходимости, правда, в последний момент пришлось ознакомиться с некоторыми подробностями: тщательный анализ свидетельствовал, что в луковке оказался еще один слой. Они успели на рейсовый самолет, прибывающий в Вашингтон задолго до утреннего совещания, так что времени должно хватить и на сон.</p><p class="p1">Она поглядела на свой телефакс — аккуратный кожаный чемоданчик стоял в ногах перед ней. Этот действовал быстрее на несколько сотен килобитов в секунду, чем старенький, принадлежавший Питеру, и шрифт был более четким. Итак, завтра утром ей придется объяснять президенту Соединенных Штатов, какое отношение к Веге имеет Адольф Гитлер. Если честно, Элли несколько волновалась. Ей никогда прежде еще не приходилось встречаться с президентами, нынешний же по стандартам конца XX века был не так уж и плох. Времени причесаться и заняться косметикой не оставалось. Пусть — в Белый дом она летит не для того, чтобы производить впечатление.</p><p class="p1">Что теперь скажет отчим? Неужели все-таки будет твердить, что наука не ее дело. А мать, прикованная сейчас к инвалидному креслу в приюте для престарелых? Удалось лишь мельком переговорить с ней сразу после открытия — это было уже неделю назад, и она обещала позвонить утром.</p><p class="p1">И снова чуть ли не в сотый раз Элли заглянула в окошко и попыталась представить, что думал бы внеземной наблюдатель, пролетая над Землей на той же высоте — в 12 или 14 километрах над поверхностью планеты, если, конечно, зрение его подобно нашему. Просторы Среднего Запада были как будто вымощены тесно уложенными квадратами, прямоугольниками и кругами городов и сельскохозяйственных угодий, здесь же, на юго-западе, через пустыни и горы к горизонту лишь изредка устремлялась прямая линия дороги — единственное свидетельство деятельности разума. Значит, чужие миры, принадлежащие более развитым цивилизациям, окажутся полностью геометризованными, перестроенными их обитателями? Или же <em>подлинно</em> развитая цивилизация вовсе не оставляет следов? Смогут ли они, так сказать, на глазок определить, на какой ступени великой эволюционной последовательности развития интеллекта находится наша планета?</p><p class="p1">Что они могут увидеть? По степени синевы неба можно грубо оценить число Лошмидта — количество молекул в кубическом сантиметре воздуха на уровне моря: приблизительно 3*10<em>19</em>. По размерам теней на земле можно оценить высоту облаков. Если они знают, что облака состоят из водяных паров, то смогут приближенно определить профиль изменения температуры в атмосфере — там над облаками температура падает до —40 градусов Цельсия. Эрозия ландшафта, сливающиеся и петляющие реки, озера, источенные ветром вулканические конусы — все свидетельствовало о древнем поединке тектонических и эрозионных процессов. Действительно, даже в глаза бросается, как стара эта планета и юна ее цивилизация.</p><p class="p1">В большинстве своем планеты Галактики, конечно, преклонного возраста, они не знают техники, а скорее всего и жизни. Изредка должны попадаться цивилизации и постарше нашей. Миры, где технологическая цивилизация только формируется, едва ли часто встречаются в космосе. В этом-то и состоит, быть может, вся уникальность Земли.</p><p class="p1">К ленчу ландшафт под крылом начал становиться более цветущим: они приближались к долине Миссисипи. Во время современных воздушных путешествий собственного движения не ощущаешь, думала Элли. Она поглядела на дремавшего Питера. Перспективу перекусить в самолете он отверг с негодованием. Рядом с ними, в кресле через проход, путешествовало совсем юное существо месяцев трех от роду, уютно посапывавшее на руках у отца. Как воспринимают младенцы воздушные путешествия? Сперва тебя куда-то увозят, потом вносят в большую узкую комнату, уставленную креслами, где и рассаживаются. Потом комната начинает дрожать, гудеть… и так часа четыре. Потом встают и выносят тебя. Человечек волшебным образом оказывается в другом месте.</p><p class="p1">Как все это случилось, младенцу не понять, но идея элементарно проста, и чтобы догадаться, что произошло, вовсе не обязательно быть знатоком уравнений Навье — Стокса.</p><p class="p1">Около полудня они уже кружили над Вашингтоном, ожидая разрешения на посадку. Между памятником Вашингтону и мемориалом Линкольна Элли смогла различить огромную толпу. Как прочла она час назад в телефаксе Таймс», там происходила внушительная демонстрация темнокожих американцев, протестующих против экономического неравенства. Учитывая справедливость их претензий, думала она, можно только удивляться их терпеливости. Элли подумала, как-то отнесется президент к демонстрации и сообщению с Веги: завтра ожидались официальные заявления по обоим вопросам.</p><p class="p1">— Кен, что вы имеете в виду под словами «они уходят»?</p><p class="p1">— Госпожа президент, я хочу сказать, что наши телевизионные сигналы покидают нашу планету и уходят в космос.</p><p class="p1">— И насколько далеко они туда заходят?</p><p class="p1">— Госпожа президент, дело обстоит не совсем так.</p><p class="p1">— А как?</p><p class="p1">— Сигналы распространяются от Земли сферическими волнами, словно рябь на поверхности пруда. Они путешествуют со скоростью света — это 186000 миль в секунду — и уносятся в бесконечную даль. Чем чувствительнее приемник у инопланетной цивилизации, тем на большем удалении от Земли он сумеет принимать наши телевизионные передачи. Мы и сами уже в состоянии обнаружить мощную телевизионную станцию вблизи любой из ближайших звезд.</p><p class="p1">На миг президент выпрямилась, заглянув через французские двери в Розовый сад. Потом она повернулась к дер Хииру:</p><p class="p1">— Вы хотите сказать… там увидят все? Весь телевизионный вздор? Автомобильные аварии? Борьбу? Порнофильмы? Вечерние новости?</p><p class="p1">— Все-все, госпожа президент, — с подчеркнутым сожалением покачал головой дер Хиир.</p><p class="p1">— Если я правильно понимаю вас, дер Хиир, и мои пресс-конференции, и дебаты, даже инаугурационная речь теперь путешествуют в пространстве?</p><p class="p1">— Вот это как раз и отлично, госпожа президент. Плохо то, что их предваряют телевизионные выступления вашего предшественника и, скажем, Дика Никсона… И советских руководителей. К тому же ваш конкурент наговорил о вас целую кучу всякого вздора. Так что непонятно — радоваться или нет.</p><p class="p1">— Боже мой! Хорошо, продолжайте, — президент отвернулась от французских дверей и принялась углубленно рассматривать мраморный бюст Тома Пейна<a href="ch2.xhtml#id38" class="a">[9]</a>, недавно возвращенный сюда от подножия Смитсонианского института, куда его выставил предыдущий хозяин Белого дома.</p><p class="p1">— Все объясняется так: эта коротенькая телевизионная передача, буквально несколько минут, была отправлена в эфир в 1936 году из Берлина с открытия Олимпийских игр. Хотя ее принимали только в Германии, она была первой, пусть и слабой, передачей с Земли. В отличие от обычного радиовещания 30-х годов телесигналы пробили ионосферу и ушли в космос. Может быть, там, на Веге, они смогли принять только приветствие фюрера.</p><p class="p1">— Значит, с их точки зрения, появление Гитлера на экране свидетельствует, что разум на Земле достиг необходимого совершенства. Я не пытаюсь иронизировать. Смысл передачи им не понятен, поэтому они просто записывают ее и транслируют нам. Скажем так: «Привет, мы вас услышали». Чистая любезность, не более. Кстати, вы, кажется, говорили, что потом до окончания второй мировой войны никто не занимался телепередачами?</p><p class="p1">— Мелочи, ничего достойного упоминания. В Англии состоялась трансляция коронации Георга VI и еще кое-что в этом же роде. По-настоящему телевидение началось только в конце 40-х годов. И все сигналы тех лет уносятся от Земли со скоростью света. Представьте себе, что Земля здесь, — ткнул пальцем в воздух дер Хиир, — и в 1936 году от нее побежала слабенькая сферическая волна. Она расширяется и удаляется от Земли со скоростью света. Рано или поздно волна достигает ближайшей цивилизации. Та оказывается на удивление близко, всего в 26 световых годах отсюда, на одной из планет вблизи Веги. Передачу записывают и ретранслируют обратно несколько кадров. Но чтобы кадры с Берлинской олимпиады вернулись на Землю, нужно еще 26 лет. Поэтому веганцы и не думают заниматься ее расшифровкой. Они готовы, оборудование настроено. Им нужны лишь телесигналы. Но если они уже не побывали у нас хотя бы сотню лет назад, откуда им знать, что мы в состоянии изобрести телевидение? Поэтому доктор Эрроуэй считает, что эта цивилизация следит за всеми ближайшими планетными системами. Ждет, когда молодые соседи достигнут нужного технологического уровня.</p><p class="p1">— Кен, здесь есть над чем подумать. Вы уверены, что эти — как вы назвали их — веганцы? — не понимают смысла телепередач.</p><p class="p1">— Сомневаться в их интеллекте у нас нет оснований, госпожа президент. Переданный в 1936 году сигнал был очень слабым. Надо обладать фантастически чувствительными приемниками, чтобы его выделить. Но я не допускаю даже возможности, чтобы им был понятен смысл передачи. Даже облик этих существ может весьма отличаться от нашего. У них и другая история, и другие обычаи… как им узнать, что для нас означает свастика и кем был Адольф Гитлер?</p><p class="p1">— Адольф Гитлер! Кен, я просто <em>вне себя</em>! Сорок миллионов человек отдали жизни, чтобы уничтожить этого одержимого, и вдруг он является нам в первой передаче со звезд? Чтобы представить нас <em>им</em>. И <em>их</em> нам. Воистину сбылись самые бредовые идеи этого безумца.</p><p class="p1">Она остановилась и продолжила более спокойным тоном.</p><p class="p1">— Знаете, мне всегда казалось, что Гитлер был не в ладу с нацистским приветствием. Он никогда не вытягивал руку перед собой, вечно тыкал куда-то в сторону. А потом выдумал этот пикантный жест: стал сгибать руку в локте и помахивать ею. Если бы его «Хайль Гитлер» исполнял кто-то другой, беднягу наверняка заслали бы на русский фронт…</p><p class="p1">— Все-таки есть разница. Он отвечает на приветствия, а не выкрикивает: «Хайль Гитлер».</p><p class="p1">— Ошибаетесь, — возразила президент и жестом пригласила дер Хиира из Розового кабинета в коридор. Там она вдруг остановилась и поглядела на своего советника по науке.</p><p class="p1">— И что было бы, если бы нацисты не изобрели телевидение в 1936 году? Что бы произошло тогда?</p><p class="p1">— Ну тогда место Берлинской олимпиады заняла бы коронация Георга VI или одна из передач со Всемирной выставки в Нью-Йорке в 1939 году, если только сигналы в то время были достаточно сильными, чтобы достичь Веги. А потом любая другая программа конца 40-х — начала 50-х годов. Сами понимаете. Здра-здра, Милтон Берль, и слушания по делу Маккарти — все это чудеснейшим образом характеризует уровень интеллекта на нашей планете.</p><p class="p1">— И эти проклятые программы представляют нас в космосе… хороши же посланцы Земли. — Она на мгновение умолкла, смакуя про себя фразу. — Посол должен представлять все лучшее, а мы сорок лет забиваем космос всяким мусором. Хотелось бы знать, как воспримут эту мысль телевизионные корпорации. И надо же такому случиться — безумец Гитлер оказался первым человеком Земли, о котором узнали там! Что теперь о нас подумают?</p><p class="p1">Когда дер Хиир и президент вошли в кабинет, небольшие группки, на которые разделились собравшиеся, сразу приумолкли, сидевшие стали подниматься. Небрежным жестом президент дала понять, что предпочитает неофициальную обстановку, и непринужденно поздоровалась с государственным секретарем и помощником министра обороны. Медленно и внимательно обвела глазами собравшихся. Некоторые в свою очередь отвечали ей взглядом. Другие же, подметив легкое неудовольствие на лице президента, опускали глаза.</p><p class="p1">— Кен, а где ваш астроном? Как ее, Эрроусмит? Эрроурут?</p><p class="p1">— Эрроуэй, госпожа президент. Они с доктором Валерианом прилетели вчера вечером. Быть может, их задержала дорога.</p><p class="p1">— Доктор Эрроуэй звонила из гостиницы, госпожа президент, — проявил инициативу тщательно ухоженный молодой человек. — Она сказала, что на ее телефакс начали поступать новые данные и ей хотелось бы представить их совещанию. Мы можем начинать без нее.</p><p class="p1">Майкл Китц наклонился вперед, тон его голоса и выражение лица выдавали негодование.</p><p class="p1">— И они передают такую информацию по открытому телефону, по незащищенному каналу, да еще в вашингтонскую гостиницу?</p><p class="p1">Дер, Хиир возразил так тихо, что Китцу пришлось еще больше наклониться вперед, чтобы расслышать.</p><p class="p1">— Майк, ты ведь знаешь, что ее телефакс обеспечивает кодировку по крайней мере на уровне коммерческой тайны. И не забывай, вопрос пока не засекречен. Не сомневаюсь, что доктор Эрроуэй станет сотрудничать с нами, если дело все-таки решат засекретить.</p><p class="p1">— Хорошо, давайте начнем, — произнесла президент. — Итак, мы проводим сегодня совместное неофициальное совещание Совета национальной безопасности и Специальной группы по чрезвычайным ситуациям. Хочу сразу же предупредить — из всего, что вы здесь услышите, ни одной мельчайшей подробности, подчеркиваю, <em>ни одной</em>, нельзя сообщать никому, кроме министра обороны и вице-президента, находящихся в отъезде. Вчера доктор дер Хиир вкратце проинформировал многих из вас о невероятном событии — телепередаче со звезды Вега. По мнению доктора дер Хиира и остальных — она оглядела собравшихся, — Адольф Гитлер блистал на экране в качестве героя лишь в результате случайного совпадения. Но в итоге возникает… неловкая ситуация. Я попросила директора Центрального разведывательного управления представить мне перечень возможных осложнений с точки зрения национальной безопасности. Представляет ли прямую угрозу эта самая чертова передача? Есть ли возможность попасть в беду, если будет получено новое сообщение и какая-нибудь другая страна первой расшифрует его? Впрочем, позвольте мне сперва спросить вас, Марвин, нет ли здесь какой-либо связи с летающими тарелками?</p><p class="p1">Директор ЦРУ, властного вида мужчина более чем средних лет в очках с металлической оправой, сразу подвел итоги. Неопознанные летающие объекты, иначе НЛО, время от времени беспокоили ЦРУ и ВВС, в особенности в 50-е и 60-е годы, во многом потому, что подобные слухи давали возможность противнику сеять смятение и перегружать коммуникационные каналы. Редкие достоверные случаи оказались вполне обыкновенными нарушениями воздушного пространства США, простыми пролетами над их территорией весьма совершенных самолетов Советского Союза или Кубы. Вообще подобные рейды — общепринятый способ проверки бдительности потенциального противника, и в свой черед Соединенные Штаты достаточно часто нарушали советское воздушное пространство или пытались проникнуть в него. НОРАД посчитало нежелательной для распространения информацию о кубинском МИГе, залетевшем на 200 миль до миссисипской низменности, прежде чем его обнаружили. В таких случаях ВВС всегда отрицали нахождение <em>своих</em> самолетов вблизи места наблюдения НЛО и не распространялись о несанкционированных нарушениях, мистифицируя таким образом общественное мнение. Это объяснение вызвало на лице начальника штаба ВВС легкое неудовольствие, однако он промолчал.</p><p class="p1">Большая часть наблюдений НЛО, по словам директора ЦРУ, соответствовала реальным объектам, неправильно истолкованным очевидцами. Экспериментальные самолеты необычной конструкции, отражения лучей света автомобильных фар, воздушные шары, птицы, рой светящихся насекомых — все эти объекты принимались за НЛО.</p><p class="p1">Значительная часть сообщений объяснялась обманом, наконец, иллюзиями, порожденными психозами. С тех пор как в конце 40-х годов газетчики изобрели термин «летающая тарелка», по всему миру НЛО наблюдали более миллиона раз, но ни в одном случае не было обнаружено четких свидетельств о визите инопланетян. Впрочем, идея вызвала всплеск эмоций, появились разные группки и публикации, даже некоторые ученые из академических вузов стали увязывать НЛО с жизнью на других планетах. Недавно возникшая милленаристская<a href="ch2.xhtml#id39" class="a">[10]</a> доктрина сулила пришествие из космоса спасителей на летающих тарелках. Официальное расследование ВВС, получившее в своем окончательном виде наименование Синей книги, было закончено в 60-х годах по причине отсутствия новой информации, хотя ЦРУ и ВВС по-прежнему продолжали проявлять умеренный интерес к этой проблеме. Научное содружество всегда было убеждено, что это дутый вопрос, и когда Джимми Картер потребовал от НАСА провести исчерпывающее исследование проблемы НЛО, ученые без колебаний отклонили требование президента.</p><p class="p1">— На деле, — вмешался один из находившихся за столом ученых, — возня с НЛО только затруднила проведение серьезных работ в области ПВЦ.</p><p class="p1">— Хорошо, — вздохнула президент. — Способен ли кто-нибудь из присутствующих обосновать наличие связи между НЛО и передачей с Веги? — дер Хиир разглядывал ногти. Все молчали. — Увы, вашей уверенности мало. Это ничего не значит, теперь начнется поток писем — <em>говорил же я вам</em> — от всяких свихнувшихся энэлотиков. Марвин, почему вы не продолжаете?</p><p class="p1">— Итак, госпожа президент, в 1936 году крайне слабый телевизионный сигнал с открытия Олимпийских игр поступает на горстку телеприемников в районе Берлина. Это начало переворота в общественных отношениях. Налицо прогресс, олицетворяющий достоинства германской техники. Пробные передачи проводились и до этого, но мощность их была весьма невелика. На деле мы опередили немцев. Министр торговли Герберт Гувер мельком появился на телеэкране… 27 апреля 1927 года. В любом случае сигнал германского передатчика покидает Землю со скоростью света и через 26 лет достигает Веги. Несколько лет они возятся с сигналом — эти самые неизвестные «они» — и, чудовищно усилив, посылают его обратно. Впечатляет уже их способность принимать столь слабый сигнал, а потом усиливать его до такой степени. Уместно вспомнить и про вопросы, связанные с безопасностью. Наши специалисты по электронной разведке хотели бы знать, как вообще можно обнаружить столь слабые сигналы? Люди они или кто-нибудь еще, но на Веге, знают больше нашего… быть может, они вырвались вперед только на несколько десятилетий, но скорее всего намного больше. Никакой другой информации о себе они нам не представили… правда, оказалось, что на некоторых частотах сигнал передатчика не обнаруживает эффекта Допплера, связанного со смещением планеты по орбите. Они постарались облегчить нам обработку данных… помогли нам. До сих пор не получено ничего, что могло бы иметь интерес с военной или вообще с какой-либо иной точки зрения. Пока мы сумели понять, что они превосходные радиоастрономы, любят простые числа и способны ретранслировать наши телепередачи обратно. В этом трудно усмотреть что-либо оскорбительное для любой нации. Не забывайте: радиотелескопы других стран тоже принимают сейчас этот трехминутный отрывок с Гитлером в главной роли. Просто ученые еще не успели догадаться, <em>что</em> нужно делать с сигналом. Русские, немцы да кто угодно рано или поздно натолкнутся на поляризационную модуляцию. Я считаю, госпожа президент, хотя все Штаты и не обязательно согласятся со мной, что следует сделать официальное сообщение, пока нас не обвинили в сокрытии информации. Если ситуация не изменится и мы не сдвинемся дальше, придется выступить с публичным заявлением, даже показать весь этот трехминутный фильм. К сожалению, мы не смогли обнаружить в германских архивах информацию о содержании передачи. А потому не можем испытывать абсолютной уверенности в том, что жители Веги не изменили ее содержание, прежде чем ретранслировать. Конечно, Гитлера узнает каждый, показанная часть олимпийского стадиона в точности соответствует съемкам 1936 года. Но мы не знаем, пощипывал ли Гитлер на самом деле усы, улыбался ли.</p><p class="p1">Слегка задыхаясь, вошла Элли, за ней следовал Валериан. Они попытались занять места поодаль, у стенки, но дер Хиир вовремя обратил на них внимание президента.</p><p class="p1">— Доктор Эрроу-э-эй? Рада видеть вас в целости и сохранности. Во-первых, позвольте мне поздравить вас с этим великолепным открытием. Великолепным. Э… Марвин…</p><p class="p1">— Я уже окончил, госпожа президент.</p><p class="p1">— Хорошо. Как я понимаю, доктор Эрроуэй, у вас есть новости. Что вы собираетесь нам сообщить?</p><p class="p1">— Госпожа президент, извините за опоздание, но мы, кажется, все-таки сорвали этот космический банк. Мы… это… позвольте мне попытаться пояснить свою мысль такими словами. В прежние времена, когда пергамента было мало, люди смывали текст с уже написанных свитков и у них получалось то, что мы теперь называем палимпсестом. То есть запись производится сверху по остаткам другой записи. Конечно, полученный от Веги сигнал очень силен. Вы знаете, он содержит простые числа, под которыми поляризационной модуляцией записана эта картинка с Гитлером. Но подо всем этим — и под числами, и под олимпиадой — мы только что обнаружили невероятно содержательное сообщение, теперь в этом нельзя сомневаться. И насколько можно судить, оно велось с самого начала. Этот сигнал слабее, но я со стыдом признаюсь — мы могли бы обнаружить его еще раньше.</p><p class="p1">— И что же гласит новое сообщение? — спросила президент. — Хотя бы о чем оно?</p><p class="p1">— Пока мы не можем сказать даже приблизительно, о чем идет речь. Сотрудники «Аргуса» натолкнулись на новое сообщение только сегодня, чуть ли не после полуночи по вашингтонскому времени. Мы работали над ним всю ночь.</p><p class="p1">— Передавали по открытому телефону? — осведомился Китц.</p><p class="p1">— Со стандартной коммерческой кодировкой, — Элли казалась слегка смущенной. Открыв свой чемоданчик с телефаксом, она быстро извлекла из него прозрачную распечатку и через проектор направила изображение на экран.</p><p class="p1">— Вот все, что нам известно. Мы получаем блок информации объемом около тысячи бит. Потом идет пауза, за ней повторяется этот же самый блок бит за битом. Потом снова пауза, за ней следует новый блок, он тоже повторяется; подобное дублирование каждого блока позволяет уменьшить ошибки при ретрансляции. Должно быть, им кажется весьма важным, чтобы мы точно записывали их передачу. Каждый из блоков информации можно назвать страницей. Ежедневно «Аргус» получает несколько дюжин таких страниц. Но мы еще не представляем, о чем идет речь. Ясно лишь, что на них закодирована не простая картинка вроде этих Олимпийских игр. Текст здесь глубже и шире. Впервые мы получили информацию, которую создавали <em>они сами</em>. Пока единственным ключом является нумерация страниц — похоже, они перенумерованы, — каждая из них начинается с числа, записанного в двоичной системе. Видите?.. Вот оно. И новая страница всякий раз начинается со следующего целого числа. Сейчас мы смотрим на страницу номер 10413. Перед нами объемистая книга. По числу страниц получается, что передача началась около трех месяцев назад. Нам просто очень повезло, что мы ее заметили хотя бы сейчас.</p><p class="p1">— Ну я был прав, а? — Китц перегнулся к дер Хииру через стол. — Вот это сообщение и следует придержать… оно не для японцев, китайцев и русских, не так ли?</p><p class="p1">— А расшифровать будет сложно? — спросила президент через голову шепчущего Китца.</p><p class="p1">— Мы, конечно, постараемся. Вероятно, будет полезным, если Совет национальной безопасности тоже займется этим. Но без какого-либо намека с Веги, без ключа к дешифровке, я думаю, далеко мы не продвинемся. Можно быть уверенным только в одном: сообщение написано не на английском, не на немецком, не на каком-нибудь другом языке землян. Остается надеяться, что Послание закончится на 20000-й или на 30000-й странице, а затем вновь начнется с начала… тогда мы сможем заполнить пробел. И перед Посланием, возможно, окажется введение… нечто похожее на начальное пособие, которое поможет нам понять сообщение.</p><p class="p1">— Позвольте мне, госпожа президент…</p><p class="p1">— Госпожа президент, это доктор Питер Валериан из Калифорнийского технологического института, один из первых начавший исследования в этой области.</p><p class="p1">— Пожалуйста, доктор Валериан.</p><p class="p1">— Это сообщение предназначено нам. Они знают, где мы и кто мы. Передача с Земли 1936 года дала им представление об уровне нашей технологии, нашего развития. И они не взяли бы на себя весь этот труд, если бы не хотели, чтобы мы поняли сообщение. Оно обязательно будет содержать ключ к дешифровке. Дело лишь затем, чтобы тщательно записать всю информацию и очень внимательно ее проанализировать.</p><p class="p1">— А как по-вашему, в чем может состоять ее содержание?</p><p class="p1">— Пока у меня нет оснований для каких бы то ни было заключений. Могу только согласиться с доктором Эрроуэй. Отправившая сообщение цивилизация стремится, чтобы ее поняли. Быть может, все сообщение окажется сжатой в один небольшой том Галактической энциклопедии. Звезда Вега в три раза массивнее Солнца и ярче его примерно в 50 раз. Поскольку она сжигает свое ядерное горючее так быстро, срок ее существования будет куда меньше, чем у нашей звезды…</p><p class="p1">— Да. А если на Веге что-то не так, — перебил его директор ЦРУ, — если их планете угрожает гибель? Быть может, они хотят, чтобы хоть кто-нибудь узнал об их цивилизации, прежде чем она погибнет?</p><p class="p1">— Или же, — предположил Китц, — они ищут куда перебраться, и Земля великолепно подходит для этого. Что, если кадры с Адольфом Гитлером отправлены нам не случайно?</p><p class="p1">— Подождите, — вмешалась Элли, — возможностей много, но отнюдь не каждая из них реальна. Передающая цивилизация не может знать, приняли мы сообщение или пег, и уж тем более она никак не узнает о том, насколько мы преуспели в дешифровке. Если мы обнаружим в Послании что-нибудь оскорбительное, то вполне можем промолчать. Но даже если мы ответим, пройдет 26 лет, прежде чем они получат наше сообщение, и еще 26 потребуется, чтобы их новый ответ дошел до нас. Скорость света велика, но не бесконечна. Мы надежно защищены от Веги расстоянием. Так что паниковать еще рано. — Последние слова она произнесла, адресовав Китцу приятную улыбку.</p><p class="p1">— Ваше мнение понятно, доктор Эрроуэй, — отвечала президент, — но события развиваются очень быстро… чертовски быстро. И пока в них преобладает неизвестность. А я еще даже не сделала публичного заявления об этом. Даже о простых числах, не говоря уже о презренном Гитлере. Теперь придется еще иметь в виду эту <em>книгу</em>, которую они, как вы утверждаете, посылают нам по радио. К тому же ваши ученые не стесняют себя в разговорах, слухи и так уже носятся повсюду. Филлис, где эта папка? Посмотрите только на заголовки.</p><p class="p1">Открыв перед собой папку, обращенную к собравшимся, она перелистала газеты. Речь в них шла об одном и том же событии, небольшие различия в формулировках определялись фантазией журналистов: «Док-звездочет говорит: „Жукоглазые монстры шлют нам весточку“, „Астрономы сообщают: „Обнаружен внеземной разум“, „Голос с небес?“, «Чужаки идут! Чужаки идут!“ — президент дала вырезкам разлететься по столу.</p><p class="p1">— Хорошо, что пока не всплыла еще история с Гитлером. Я уже вижу заголовок: «США утверждают: Гитлер жив и благоденствует в космосе». Или чего-нибудь похлеще. По-моему, сейчас совещание можно закончить. Соберемся, когда поступит новая информация.</p><p class="p1">— Позвольте мне, госпожа президент, — с явной нерешительностью вмешался дер Хиир. — Прошу прощения, но, по моему мнению, теперь возникает новая причина для международных осложнений.</p><p class="p1">Президент вздохом выразила согласие.</p><p class="p1">Дер Хиир продолжил:</p><p class="p1">— Поправьте меня, если я ошибаюсь, доктор Эрроуэй. Каждый день звезда Вега восходит над пустыней Нью-Мексико, и тогда вы получаете очередные страницы этого сложного Послания — неважно, что там написано, — которые в настоящий момент приходят на Землю. Потом через восемь часов или более звезда закатывается. Так? Хорошо. На следующий день звезда восходит вновь, но вы уже потеряли часть сообщения за то время, пока она не была видна. Так? И тогда вы получите страницы с 30-й по 50-ю, затем с 80-й по 100-ю и так далее. Неважно, сколь скрупулезно мы проводим наблюдения — в полученной информации всегда окажутся разрывы. Пробелы. Даже если сообщение будет повторяться, значительная часть информации останется пропущенной.</p><p class="p1">— Совершенно верно, — Элли поднялась и подошла к огромному глобусу. По каким-то соображениям наклонное положение Земли в пространстве не устраивало Белый дом: ось этого глобуса была направлена вертикально. Она робко подтолкнула его.</p><p class="p1">— Земля вращается. Чтобы не было пробелов, радиотелескопы должны равномерно располагаться по долготе, и тогда каждая страна ловит свою часть сообщения, может быть, что-то интересное, а может быть, и нет. Та же проблема возникает при работе с американскими межпланетными станциями. Пролетая вблизи очередной планеты, они передают свои сообщения на Землю, но поверхность Соединенных Штатов в нужный момент может оказаться обращенной в другую сторону. Поэтому НАСА использует для слежения три радиостанции, равномерно распределенные по долготе. Вся система великолепно функционирует уже десятилетия. Но… — голос ее застенчиво умолк. Она посмотрела на П.Л. Гаррисона, администратора НАСА. Худощавый, даже тощий мужчина дружелюбно подмигнул.</p><p class="p1">— Благодарю вас. Да. Это называется системой дальней космической связи, и мы ею очень гордимся. Наши станции располагаются в пустыне Мохаве, в Испании и Австралии. Конечно, финансирование у нас недостаточное, но при небольшой поддержке мы сможем быстро развернуть работы…</p><p class="p1">— Испания и Австралия? — спросила президент.</p><p class="p1">— Чисто научные исследования, — проговорил госсекретарь, — по-моему, никаких проблем не предвидится. Но возможны и осложнения, если в этой работе обнаружится политический подтекст.</p><p class="p1">Отношения с обеими странами последнее время были прохладными.</p><p class="p1">— Политические обертоны в этом деле очевидны.</p><p class="p1">— Но необязательно же держаться за поверхность Земли, — вмешался генерал ВВС. — Вращение планеты не страшно, если только располагать большим радиотелескопом на орбите.</p><p class="p1">— Прекрасно, — президент снова обвела глазами вокруг стола. — Есть у нас такой радиотелескоп? Сколько времени потребуется на его создание? Кто может сообщить? Доктор Гаррисон?</p><p class="p1">— Увы, нет, госпожа президент. Мы, НАСА, все три последних финансовых года предлагали создать орбитальную лабораторию «Максвелл», но каждый раз бюджетное ведомство вычеркивало ее из своих планов. Конечно, мы сделали некоторые проработки проекта, но в космос ее можно будет запустить только через годы… на все потребуется не менее трех лет. Но сейчас уместно напомнить присутствующим, что у русских до прошлой осени на орбите работал радиотелескоп миллиметрового и субмиллиметрового диапазонов. Мы не знаем, что там произошло, но они сейчас в лучшем положении; можно ведь просто послать туда несколько космонавтов и отремонтировать его, нам же придется начинать изготовление телескопа практически с нуля.</p><p class="p1">— Значит, так? — спросила президент. — НАСА располагает в космосе обычным телескопом, а большого радиотелескопа не имеет. Можно ли воспользоваться чем-нибудь из того, что крутится наверху? Что скажет разведка? ЦРУ? Ничего?</p><p class="p1">— Следует иметь в виду, — добавил дер Хиир, — что этот сильный сигнал передается на многих частотах. Когда Вега находится над Штатами, сигнал принимают и записывают не менее полдюжины стран. Их установки не столь сложны, как обсерватория «Аргус», возможно, они еще не заметили поляризационную модуляцию. Если взяться за создание космического радиотелескопа, передача может окончиться к моменту его запуска. Не следует ли отсюда, что единственным решением является немедленная организация сотрудничества многих стран, не так ли, доктор Эрроуэй?</p><p class="p1">— Едва ли Штаты сумеют справиться с такой задачей в одиночку. Следует привлечь все существующие крупные радиотелескопы в Австралии, Китае, Индии, Советском Союзе, на Среднем Востоке и в Западной Европе… Мы проявим полную безответственность, если в итоге окажется, что пропущена важная часть сообщения только потому, что за Вегой не следили все время. Придется обеспечить наблюдение в Восточной части Тихого океана, от Гавайских островов до Австралии, а может быть, и из Центрального района Атлантики.</p><p class="p1">— Ну, — ворчливо отозвался директор ЦРУ, — у советских есть несколько кораблей слежения, они используют диапазоны от S до X. Например, «Академик Келдыш» или «Маршал Неделин». Если мы договоримся с ними, они могут послать корабли в Атлантику и Тихий океан и перекроют пробелы.</p><p class="p1">Элли едва успела открыть рот, чтобы ответить, но президент опередила ее.</p><p class="p1">— Прекрасно, Кен. Быть может, вы правы. Но я снова повторю, все развивается слишком быстро. Я считаю, что директору ЦРУ вместе со своим персоналом, а также Совету национальной безопасности придется в течение сегодняшней ночи установить, возможны ли иные варианты, кроме сотрудничества с другими странами, в особенности если они не относятся к числу наших союзников. Я бы хотела, чтобы государственный секретарь совместно с учеными подготовил перечень стран и лиц, к которым следует обратиться для возможного сотрудничества и действий при различных вариантах развития событий. Может быть, какая-нибудь из стран выразит недовольство, если мы дадим понять, что не нуждаемся в ее помощи. Возможен ли шантаж: вдруг кто-нибудь пообещает нам информацию и попытается придержать ее? Следует ли прибегать к услугам более чем одной страны в каждом диапазоне долгот? Проанализируйте последствия. И ради бога, — глаза ее обежали лица над длинным полированным столом, — помалкивайте обо всем. И вы тоже, Эрроуэй. У нас и так хватает проблем.</p></span></span>
