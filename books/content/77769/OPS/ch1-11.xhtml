<p class="p">8. Случайный перебор</p>
</div><div class="epigraph">
<p class="p1">Теолог с легкостью может обратиться к приятному занятию; ему нетрудно писать, что религия нам дарована небом во всей своей младенческой чистоте. Обязанности историка куда более меланхоличны. Ему приходится помнить и о том неизбежном переплетении ошибок с пороками, к которым она подтолкнула слабых и неразумных обитателей Земли.</p>
<p class="text-author">Эдуард Гиббон. «История упадка и разрушения Римской империи», XV</p>
</div><p class="p1">Не прибегая к методике случайного поиска, Элли последовательно переключала каналы. «Жизненный стиль знаменитых убийц» содействовал с «Клянусь собственной задницей». Уже с первого взгляда было ясно — посулам телекомпаний не стоило верить. «Дикие кошки Джонсон-Сити» на баскетбольной площадке сражались с «Тиграми Юнион-Эндикотт»: молодые мужчины и женщины старались изо всех сил. По другому каналу на персидском языке увещевали нарушающих правила Рамазана и одобряли выполняющих оные. Следующий канал был кодирован — здесь вниманию телезрителей явно предлагалось очередное отвратительное распутство. Потом она наткнулась на отданный рекламе новых фантастических игр канал программных премьер, теперь испытывавший трудные времена. С использованием домашнего компьютера он позволял сыграть в каждую игру только один раз — сегодняшняя называлась «Галактический Гильгамеш». Хозяева программы надеялись, что игра увлечет телезрителя, который тут же закажет гибкий диск через один из коммерческих каналов. Используемые меры предосторожности не позволяли переписать программу прямо во время игры. Насколько она понимала, все эти игры большей частью безуспешно пытались подготовить подростков к сложностям взрослой жизни.</p><p class="p1">Потом взгляд ее на какое-то время привлек явно добродетельный диктор некой старой телекомпании, с несомненной озабоченностью осуждавший событие, именовавшееся неспровоцированным нападением в Тонкинском заливе северовьетнамских торпедных катеров на два эсминца седьмого флота США. В своем заявлении президент Соединенных Штатов утверждал, что обладает всеми полномочиями и имеет право прибегнуть к любым необходимым ответным мерам. Эту программу она полюбила совсем недавно. «Вчерашние новости» начинались с повторения давнишней передачи, за которой следовал подробнейший анализ соотношения в ней информации и дезинформации, и заканчивалось все обличением средств массовой информации, с прискорбной кротостью безоговорочно доверявших любым запросам прежних администраций, какими бы легковесными они ни казались. Передача шла по каналу, принадлежащему организации Риели-ТВ, еще там упоминались «Обещания, обещания» — в этой программе учитывались невыполненные обещания, данные в предвыборных кампаниях по городам, штатам и стране в целом, а также «Мошенничество и надувательство» — еженедельное разоблачение общеизвестных предрассудков, мифов и пропаганды. В нижней части экрана была дата — 5 августа 1964 года, и Элли окатила волна воспоминаний — слово «ностальгия», пожалуй, было бы здесь неуместным — о днях, проведенных в высшей школе. Она включила следующий канал. Перебирая по порядку, Элли пропустила передачу, посвященную восточной кухне вообще, а на этой неделе — готовке на японской жаровне-хибачи, подробную рекламу первого поколения домашних роботов общего назначения фирмы «Хадден кибернетикс», новости на русском языке, сопровождающиеся комментариями советского посольства, те же новости, но уже на английском, несколько детских программ, снова новости, математическую передачу «Новый Корнеллский курс аналитической геометрии» с великолепной компьютерной графикой, канал, отданный объявлениям о продаже домов и земельных участков, целый змеиный клубок каких-то невыносимых дневных сериалов, и, наконец, наткнулась на религиозный канал, по которому со сдерживаемым, но заметным возбуждением обсуждали Послание.</p><p class="p1">Церковные службы шли по всей Америке. Послание, как думала Элли, явилось для всех чем-то вроде говорящего зеркала, в котором каждый мог увидеть или подтверждение, или отрицание своих верований. Ссылками на Послание обосновывались взаимоисключающие эсхатологические и апокалиптические доктрины. Повсюду — в Перу, Алжире, Мексике, Зимбабве, Эквадоре и среди индейцев племени хопи — шли ожесточенные публичные дебаты; дискутировалось предполагаемое космическое происхождение местной цивилизации. Противники этой точки зрения объявляли ее колониалистической. Католики сомневались в благодатности иных миров. Протестанты обсуждали возможность явления Иисуса на ближних планетах и его грядущего возвращения на Землю. Мусульмане выражали известную озабоченность: Послание уже нарушало заповедь о недопустимости изображений. В Кувейте некто объявил себя скрытым имамом шиитов. Соссафер-хасидов терзала мессианская лихорадка. В прочих конгрегациях ортодоксальных иудаистов внезапно возродился интерес к фанатику Аструку, некогда опасавшемуся, что знания подточат основы веры. В 1305 году по его настоянию раввин Барселоны — главный еврейский священник тех лет — под страхом отлучения запретил преподавание наук и философии молодежи, еще не достигшей двадцати пяти лет. Подобные же устремления все очевиднее обнаруживались и в исламе. Философ из Фессалоник с многозначительным именем Николас Полидемос<a href="ch2.xhtml#id34" class="a">[12]</a> пламенными аргументами старался привлечь внимание человечества к тому, что он называл «реюнификацией»<a href="ch2.xhtml#id32" class="a">[13]</a> религий, правительств, народов. Критики начинали прямо с приставки «ре-».</p><p class="p1">Группы исследователей НЛО организовали круглосуточное дежурство возле Сан-Антонио на базе ВВС Брукс. По слухам, в холодильниках этой базы с 1947 года скрывались четыре трупа пришельцев из летающей тарелки, разбившейся при посадке; согласно общему мнению, зубастые внеземляне были ростом около одного метра. Из Индии сообщали о явлении Вишну, в Японии видели Будду Амиду, в Лурде происходили массовые исцеления, в Тибете объявилась бодхисатва<a href="ch2.xhtml#id30" class="a">[14]</a> женского пола. Из Новой Гвинеи в Австралию завезли новый вариант культа карго; для обретения небесных благ сперва следовало изготовить хотя бы простенький радиотелескоп. Всемирный союз свободомыслящих объявил, что Послание, безусловно, доказывает, что Бога нет. Мормонская церковь провозгласила его Вторым откровением от ангела Морони.</p><p class="p1">Люди, принадлежащие к различным культурам, объявляли Послание доказательством существования многих богов, или только Единого, или же вовсе небытия оных. Некоторые уже начинали предсказывать наступление тысячелетнего царства в 1999 году — каббалистическом отображении 1666 года, в котором подобное событие предрекал Саббатай Зеви. Другие пророки предпочитали иные даты: 1996 или 2033 — двухтысячелетие годовщины рождения и распятия Иисуса Христа. Большой календарный цикл древних майя завершался в 2011 году — эта полностью не зависимая от культур Старого Света традиция предсказывала конец существованию всего космоса в том же году! Совпадение предсказаний майя и христианского милленаризма породило апокалиптическую лихорадку в Мексике и Центральной Америке. Верившие в самые ранние даты хилиасты уже начинали раздавать свое добро бедным, потому что скоро оно все равно сделается бесполезным и чтобы откупиться от Бога в новом его Пришествии.</p><p class="p1">Искренняя вера, фанатизм, страх, надежда, пылкие споры, тихая молитва, мучительная переоценка ценностей, образцы бескорыстия и узколобого ханжества, драматическая тяга к новым идеям с разгулом эпидемии поразили разумные существа, проживающие на крохотной планете.</p><p class="p1">Но во всеобщем брожении, как казалось Элли, угадывалось уже некоторое понимание того, что этот мир — всего лишь бисеринка на расшитом ковре космоса. А само Послание тем временем отражало все попытки прочесть его. Прикрываясь Первой заповедью<a href="ch2.xhtml#id28" class="a">[15]</a>, ехидный комментатор обвинял ее, ВГ, дер Хиира и в меньшей степени Питера Валериана в целой куче прегрешений, как-то: склонность к атеизму и коммунизму и утаивание Послания от человечества в личных целях. По мнению Элли, ВГ трудно было назвать истинным коммунистом. Валериан же искренне и без всяких сомнений веровал в Христа, а обширные знания только укрепляли его веру. Она подумала» если только им удастся сколь-нибудь близко подобраться к дешифровке Послания, хорошо бы вручить полученный текст этому благочестивому насмешнику. Дэвид Драмлин, напротив, ходил у него в героях: он-то и расшифровал простые числа и олимпийскую запись… Такие ученые необходимы народу! Она вздохнула и вновь переключила канал.</p><p class="p1">Теперь Элли попала на Эй-би-си, радио— и телевещательную корпорацию Тернера, единственный уцелевший коммерческий канал из числа некогда доминировавших на телевидении Соединенных Штатов, пока изобретение прямого спутникового вещания и 180-канального кабеля не покончило со всеми ними. «Кроме Эй-би-си», — говорил Палмер Джосс, редкий гость телевидения. Как и большинство американцев, Элли мгновенно узнала его звучный голос, слегка запущенную физиономию, украшенную тенями под глазами, явно доказывавшими, что их обладатель почти не спит, озабоченный нашими грехами.</p><p class="p1">— Так что же на самом деле дала нам наука? — вопрошал он. — Она сделала нас счастливее? Я имею в виду не голографические приемники и не виноград без косточек. Стали мы <em>счастливее</em> в основе своей? Или же ученые только откупаются от нас своими научными безделушками и технологическими побрякушками, а сами тем временем подтачивают нашу веру?</p><p class="p1">Этому человеку, думала она, следовало бы родиться в более бесхитростные времена. Он всю свою жизнь пытался согласовать несогласуемое. Джосс всегда осуждал любые живописные проявления поп-религии, а потом решил, что имеет право усомниться в эволюции и принципе относительности. Кстати, ничто не мешает ему усомниться и в существовании электрона, ведь и сам Палмер Джосс не видел ни одного электрона, да и Библия умалчивает об электромагнетизме.</p><p class="p1">Действительно, какие у нас основания верить в электрон? И хотя Элли никогда не слушала его выступлений, можно было не сомневаться, что в конце концов он перейдет к Посланию… так и случилось.</p><p class="p1">— Ученые придерживают свои находки. А нам суют под нос одни объедки да крошки, чтобы мы не волновались. И считают нас дураками, вовсе неспособными понять, чем они там заняты. Ученые знакомят нас только с выводами, не предъявляя никаких доказательств, будто бы их открытия — новое Священное писание, а не результаты логических размышлений, выводы из теорий, созданных на основе ряда предположений… словом то, что простой человек называл бы догадкой. Этих ученых совершенно не интересует, способны ли их новые теории достойно заменить в душах людей те верования, которые пытается вытеснить наука. Ученые переоценивают собственные познания и недооценивают наши. Но когда мы просим у них объяснений, они отвечают: чтобы понять все это, вам потребуются годы; Я согласен с этим, и в теологии существуют известные тонкости, на постижения которых уходят годы и годы. Человек может потратить всю свою жизнь, но так и не приблизиться к пониманию сути всемогущего Бога. К сожалению, не видно, чтобы ученых интересовали труды религиозных умов, их прозрения и молитвы. Ученые не позволяют нам с вами иметь собственное мнение, они вечно обманывают нас и заводят в тупик. А теперь нам говорят, что ученые приняли Послание со звезды Вега. Звезды не посылают сообщений. Посылает всегда НЕКТО. Кто же? Божественным ли целям служит это Послание или козням сатаны? Чья подпись в конце концов обнаружится под последними строчками «Вечно Ваш Господь»… или «От всего сердца. Дьявол»? И когда наконец ученые откроют нам содержание Послания, всю ли истину они сообщат нам? Или все-таки утаят кое-что — ведь они уверены, что мы не заметим этого, — может быть, просто потому, что факты будут противоречить их собственным верованиям? Разве это не те самые люди, которые научили нас уничтожать друг друга? Говорю вам, друзья мои, наука — слишком важная вещь, чтобы ее плоды можно было доверять одним только ученым. В процессе прочтения Послания должны принимать участие и представители основных вероисповеданий. Мы должны видеть сырые данные. Сырыми зовут их ученые. Иначе… иначе получится вот что. Они скажут нам, что вычитали там что-то. Может быть, этот текст будет соответствовать их убеждениям, может быть, нет. Но нам придется соглашаться со всем, что станут утверждать ученые. А ведь есть вещи, о которых они знают, но есть и другие — поверьте мне на слово, — о которых ученые не имеют ни малейшего представления. Может быть, это Послание отправлено неким небожителем. Может быть, нет. Разве они могут быть уверены, что Послание — не подобие Золотого тельца? Я уверен, они не отличат ангела от истукана. Это же они… ведь эти самые люди и одарили нас водородной бомбой. Господи, прости мне, что не могу испытывать заметной благодарности к этим добродетельным душам. Я видел Бога. И я поклоняюсь Ему, верую в Него, люблю Его всей своей душой, всем моим существом. Едва ли кто-нибудь может верить сильнее меня. А потому я не думаю, что вера этих ученых в свою науку сильнее моей веры в Бога. Завидев новую идейку, они всегда готовы отречься от прежних своих «истин». И начинают превозносить ее. С их точки зрения, познанию нет конца. По их мнению, остальное человечество прозябает в невежестве… и так будет до скончания века. Ньютон ниспроверг Аристотеля, Эйнштейн — Ньютона. Завтра явится новый гений и низвергнет Эйнштейна. Только человечество начинает понимать их теорию — глядь, а на ее месте уже другая. Я бы и не стал обращать на это внимание, если бы они заранее предупреждали нас, что прежние их идеи могут оказаться недостаточно точными. Но они говорят: «Закон всемирного тяготения Ньютона». И зовут его так до сих пор. Но если это и в самом деле закон природы, он не может быть ложным. Кто может отменить его? Один Господь изменяет законы природы, но уж никак не ученые. Они не понимают этого. Если прав Альберт Эйнштейн, то Исаак Ньютон — неумеха или просто любитель. Запомните, наука не всегда права. Ученые хотят отобрать у нас веру, не предлагая взамен никаких духовных ценностей. И сам я ни на йоту не усомнюсь в Боге, если ученые напишут какую-то книгу и объявят ее посланием с Веги. Я не собираюсь преклоняться перед наукой. И не преступлю Первой заповеди. Я не стану поклоняться Золотому тельцу.</p><p class="p1">В молодые годы, задолго до того, как он стал известным проповедником, Палмер Джосс работал в карнавальной труппе. Об этом было написано в «Таймс-уик», впрочем, он и сам не скрывал этого. Чтобы заработать, он вытатуировал на теле карту Земли в цилиндрической проекции — операция была весьма болезненной. И в таком разрисованном виде Джосс красовался потом на местных ярмарках и шоу от Оклахомы до Миссисипи — среди жалких и тщедушных потомков некогда процветавших бродячих трупп. На голубом просторе океана боги ветров раздували щеки… западные и северо-восточные преобладали. Надувая грудь, он заставлял Борея приниматься за дело — вздымать валы на просторах Атлантики… А потом очередному потрясенному поселянину декламировал стихи из 6-й книги «Метаморфоз» Овидия:</p><div class="poem">
<div class="stanza">
<p class="v">Сила под стать мне. Гоню облака я унылые — силой,</p>
<p class="v">Силой колеблю моря и кручу узловатые дубы,</p>
<p class="v">И укрепляю снега и градом поля пробиваю…</p>
<p class="v">Тот же, когда я вношусь в подземные узкие щели,</p>
<p class="v">В ярости спину свою под своды пещер подставляю,</p>
<p class="v">Мир весь земной и Ад тревожу великим трясеньем.</p>
</div>
</div><p class="p1">Огонь и сера Древнего Рима. Помогая себе руками, Джосс демонстрировал дрейф континентов. Края Западной Африки, словно две части головоломки, смыкались с Южной Америкой, так сказать, по меридиану, проходящему через пупок. В афише он значился под именем Геос, Человек-Земля.</p><p class="p1">Джосс был тогда страстным читателем и, не будучи обременен систематическим образованием за пределами начальной школы, так и не понял, что классическая литература и науки — темы, труднодоступные для малоподготовленного человека. Этот взъерошенный симпатяга умел втираться в доверие к библиотекарям во всех городах на пути карнавала. Он просто спрашивал у них, что они рекомендуют прочесть, и заявлял, что хочет стать лучше. А потом усердно читал: как к друзьям приходит успех; о вложении капитала; как шантажировать знакомых, чтобы они не догадались об этом… Содержание подобных книг казалось ему поверхностным. Зато в древней литературе и современной науке он находил существенные достоинства. На долгих гастролях все свободное время Джосс проводил в библиотеках городов или графств. Тогда-то он и освоил многое из азов географии и истории. Чтение необходимо ему для работы, объяснял он Эльвире, девушке-слонихе, которая весьма заинтересовалась причинами его отлучек. Она подозревала злостный флирт — в какой библиотеке нет библиотекарши? Она так и сказала однажды, но в конце концов вынуждена была признать, что научный уровень его болтовни возрастал. Правда, иногда содержание книг казалось ему заумным, но знания доставлялись прямо на дом. И к всеобщему удивлению, карнавальная клетушка Джосса начала приносить доход.</p><p class="p1">Как-то раз, когда, обратившись к публике спиной, он изображал столкновение Индии с Азией и последующее образование Гималаев, из низких, вовсе не грозовых туч над головой вылетела молния и наповал сразила артиста. Над Оклахомой бродили торнадо, и вообще повсюду на юге погода была какой-то необычной. И тут он совершенно отчетливо ощутил, как оставляет собственное тело, эту жалкую плоть, поверженную на покрытый песком дощатый пол… Вокруг уже собралась небольшая кучка сочувствующих, не без трепета вглядывавшихся в распростертое тело. Сам же он все поднимался и поднимался по черному тоннелю к ослепительно яркому свету. И посреди этих лучей, пусть и не сразу, Джосс разглядел могучую фигуру воистину божественного облика.</p><p class="p1">Придя в чувство, он не без разочарования ощутил, что снова жив и лежит в скромной спальне. А над ним склонился сам преподобный Билли Джо Ренкин, не теперешний носитель этого имени, но его отец — достопочтенный суррогат священника образца третьей четверти XX в. Позади него, как показалось Джоссу, дюжина силуэтов в клобуках пела Kyrie Eleison<a href="ch2.xhtml#id26" class="a">[16]</a>. Впрочем, в этом он не был уверен.</p><p class="p1">— Слышишь, папаша, жить я буду или помру? — тихим голосом осведомился молодой человек.</p><p class="p1">— В свой черед и то и другое, мальчик мой, — отвечал преподобный мистер Ренкин.</p><p class="p1">Джоссом овладело чувство открытия: мир действительно существует. Но ему трудно было выразить свои чувства, они как-то противоречили той величественной фигуре и ощущению бесконечного счастья, которым сопровождалось видение. Реальность и испытанное блаженство конфликтовали в душе. А потом он вдруг начал в разных ситуациях обнаруживать, что то один, то другой из этих аспектов его сознания требует, чтобы он что-то сделал или сказал. Ему оставалось только подчиниться им обоим.</p><p class="p1">Потом Джоссу объяснили, что он действительно умер. И врач в самом деле засвидетельствовал смерть. Но над ним молились, пели гимны и даже попытались прибегнуть к массажу области Мавритании, так сказать. И он вернулся к жизни. В прямом и переносном смысле слова Джосс родился заново. И поскольку все это прекрасно соответствовало его собственным ощущениям, он без возражений принял эту точку зрения. Хотя Джосс никогда и не говорил об этом, внутренне он был уверен в значимости события. Он был убит поделом. И воскрешен не без причины.</p><p class="p1">Под руководством своего наставника он принялся за серьезное изучение Священного писания. Идея Воскрешения и доктрина об Искуплении трогали его до глубины души. Джосс начал помогать преподобному мистеру Ренкину сначала понемногу, в основном в дальних или трудных поездках, особенно после того, как, повинуясь зову Господня, младший Билли Джо Ренкин отбыл в город Одессу, что в штате Техас. И тогда Джосс обрел свой пасторский стиль, не столь увещевательный, как поясняющий. Простыми словами, обыденными сравнениями он толковал о крещении и загробной жизни, о связи между христианским откровением и классическими мифами Греции и Рима, о плане Господнем для всего нашего мира, о совместимости религии и науки, если правильно разделять сферы их интересов. Проповеди звучали несколько непривычно, многим они казались слишком уж экуменическими, но тем не менее пользовались необъяснимой популярностью.</p><p class="p1">— Джосс, ты родился заново, — говорил ему старший Ренкин. — И тебе следовало бы сменить имя. Но для проповедника имени лучше, чем Палмер Джосс, просто не придумаешь. Только дурак может от него отказаться.</p><p class="p1">Как доктора или адвокаты, поставщики религиозных услуг редко критикуют предлагаемый конкурентом товар. Но однажды вечером он посетил в Крусадере новую церковь Господню, чтобы послушать младшего Билли Джо Ренкина, с триумфом возвратившегося из Одессы. Билли Джо строго придерживался доктрины в вопросах Воздаяния, Возмездия и Искупления. Но тот вечер был посвящен Исцелению. Как было сказано собравшимся, сегодня Исцеление им подаст нечто куда более священное, чем щепка истинного Креста Господнего, и куда более могущественное, чем бедренная кость Святой Терезы Авильской, которую, по слухам, генералиссимус Франциско Франко держал в кабинете для увещевания неблагочестивых. Билли Джо заверял, что располагает настоящей амниотической жидкостью, хранившей и оберегавшей нашего Господа и сохраненной, как утверждали. Святой Анной в древнем глиняном сосудике. Крохотной капли этого средства достаточно, чтобы исцелить любого из нас воздействием божественной Благодати. Святейшая вода, святейшая из всех…</p><p class="p1">Джосс был возмущен не столько попыткой подлого жульничества, предпринятой Билли Джо, сколько суеверием, которое проявили ни в чем не усомнившиеся прихожане. По прежней своей жизни он знал многие способы надувательства. Чего еще ждать от бродячего шоу? Но здесь иное… здесь вера! Только она способна правильно объяснить действительность, не прибегая к выдуманным чудесам.</p><p class="p1">В ближайших выступлениях он с лихорадочным возбуждением обрушился на разные извращения христианского фундаментализма, в том числе и на всяких там начинающих герпетологов, испытывавших собственную веру в возне с ядовитыми змеями, буквально истолковывая библейское изречение: дескать, чистый сердцем не убоится змеиного яда. В одной часто цитировавшейся потом проповеди Джосс перефразировал Вольтера. Он сказал, что вовсе не рассчитывал иметь дело с людьми столь ядовитой породы, теми, кто согласен с отпетыми богохульниками, утверждающими, что первый священник — это первый обманщик, встретивший первого дурака. Такая вера губительна в своей основе. И он изящно грозил пальцем.</p><p class="p1">Джосс оспаривал даже то, что в каждой религии есть некая доктрина и все выходящее за ее пределы просто оскорбляет чувства верующих. Люди спорят о том, где провести эту грань, но самим религиям нет до этого дела: они вторгаются туда, куда им вздумается. Народ не оболванить, объявил он. Приводя в порядок земные дела, старший Ренкин за день до смерти передал через посланника Джоссу, что сожалеет о знакомстве с ним.</p><p class="p1">Уже тогда Джосс начал утверждать, что наука дает ответ не на всякий вопрос. В теории эволюции концы явно не сходились с концами. И ученые старательно скрывали, по его мнению, все не укладывавшиеся в канву факты. Их утверждение, что Земле 4,6 миллиарда лет, на самом деле не более обосновано, чем мнение архиепископа Ашера<a href="ch2.xhtml#id24" class="a">[17]</a>, верившего, что нашей планете шесть тысяч лет. Никто не видел, как происходит эта самая эволюция, никто не измерял, сколько времени прошло с момента Творения. «Истекло две сотни квадрильонов Миссисипи…» — ему вдруг представился терпеливый голос, отсчитывающий число секунд от сотворения мира.</p><p class="p1">Теория относительности Эйнштейна так же бездоказательна. Эйнштейн уверяет, что никто не может путешествовать со скоростью, превосходящей скорость света. Откуда ему это известно? Он что, сам пытался достичь скорости света? Относителен сам характер постижения мира людьми. Никакому Эйнштейну не дано знать, чего сумеет достичь человек в далеком грядущем, и тем более не ему ставить ограничения там, где речь идет о Боге. Кто может помешать Господу перемещаться быстрее света, если Он только захочет? И если Ему это угодно, разве не в силах Он отправить нас с вами куда угодно со сверхсветовой скоростью? Преувеличения имеют место и в науке, и в религии. Разумный человек не будет относиться к ним слишком серьезно. Теологи создали множество интерпретаций Писания, а ученые — множество научных картин мира. И то и другое сотворено Господом, а потому обе картины должны согласовываться между собой. И если существуют взаимные расхождения, значит, ученый или теолог, а может быть, и оба не справились со своей работой.</p><p class="p1">Беспристрастную критику науки и религии Палмер Джосс перемежал призывами к покаянию — он уважал разум собственной паствы. И постепенно его репутация достигла общенациональных масштабов. Во всяких дебатах — и по поводу преподавания «научного креационизма» в школах, об этической стороне абортов и использования замороженных эмбрионов, о допустимости генетической хирургии — он пытался держаться среднего пути, избегая карикатурного противопоставления религии и науки. Оба лагеря негодовали, а популярность Джосса только росла. Он стал доверенным лицом президентов. Его проповеди цитировались на редакторских полосах главных светских газет. Но он отвергал постоянные приглашения и льстивые уговоры стать основателем электронной церкви. Джосс продолжал вести простую жизнь и лишь ненадолго — только по приглашению президентов или для поездки на очередной экуменический конгресс — оставлял сельский юг. Укрываясь за традиционным патриотизмом, он взял себе за правило не вмешиваться в политику.</p><p class="p1">Так на стезе своей, пересекающей поле деятельности с множеством сомнительных начинаний, обаятельный и эрудированный моралист Палмер Джосс стал выдающимся христианским проповедником наших времен.</p><p class="p1">Дер Хиир спросил, не могут ли они пообедать вдвоем, где-нибудь в тихом уголке? Вместе с ВГ и советской делегацией он улетал на итоговую конференцию, посвященную недавним достижениям в прочтении Послания. Но южно-центральные районы Нью-Мексико кишмя кишели журналистами, собравшимися со всех концов света, и на сотню миль в любую сторону в штате не нашлось бы ресторанчика, где можно было пообедать, не опасаясь чужих глаз и ушей. Поэтому Элли пригласила его к себе и сама приготовила обед в своей скромной квартире, расположенной неподалеку от гостиницы для прибывающих в «Аргус». Им было о чем поговорить. Иногда казалось, что вся судьба проекта висит в руках президента на тонкой ниточке. Но легкий трепет, с которым она ожидала гостя, был вызван не только этим — и Элли смутно догадывалась о причинах. Разговор о Джоссе не относился к числу деловых. Поэтому к нему приступили, загрузив посуду в судомойку.</p><p class="p1">— Он боится, — сказала Элли. — Потому что у него узкий кругозор. Ему кажется, что Послание несовместимо с библейской экзегезой<a href="ch2.xhtml#id22" class="a">[18]</a> и противоречит его вере. Он совсем не представляет, каким путем новая научная парадигма поглощает предыдущую. И еще вопрошает, что дала ему наука, и потому, должно быть, его считают голосом рассудка.</p><p class="p1">— В сравнении с хилиастами Судного дня и Первоземлянами Палмер Джосс выглядит воплощением умеренности, — отвечал дер Хиир. — Быть может, именно мы не сумели объяснить методологию науки в той мере, насколько это необходимо. Меня это беспокоит последнее время. Кстати, Элли, а ты действительно уверена, что Послание не от…</p><p class="p1">— Бога или Дьявола? Кен, постарайся быть серьезным.</p><p class="p1">— Хорошо, тогда назовем их весьма развитыми существами со злой или доброй сущностью, хотя, на взгляд таких, как Джосс, их трудно отличить от Бога или Дьявола.</p><p class="p1">— Кен, кем бы ни были эти существа из системы Веги, я уверена — Вселенную создали не они. И они не имеют никакого отношения к Богу Ветхого завета. Разве ты забыл, и Вега, и остальные ближние звезды находятся на самом краю этой заурядной Галактики? Ну что Ему, который есть Все, делать в таком захолустье? У Него найдутся дела поважнее.</p><p class="p1">— Элли, мы связаны по рукам и ногам. Ты ведь знаешь, каким влиянием пользуется Джосс. Он входил в окружение трех президентов, в том числе и правящего. Президент склоняется к тому, чтобы облечь Джосса некоторыми полномочиями, хотя я не думаю, чтобы она собиралась включить его вместе с горсткой проповедников в Комитет по дешифровке Послания, а с ним и тебя, Валериана и Драмлина… не говоря уже о ВГ с товарищами. Трудно даже представить себе, что русские станут сотрудничать со священниками-фундаменталистами. Подобный шаг может развалить все. А почему бы нам самим не переговорить с Джоссом? Президент утверждает, что тот просто заворожен возможностями науки. Представь себе, вдруг нам удастся привлечь его на свою сторону?</p><p class="p1">— Неужели ты решил <em>обратить</em> Палмера Джосса в нашу веру?</p><p class="p1">— Я совершенно не хочу, чтобы он изменил своим верованиям, пусть только поймет, что представляет собой «Аргус», что мы не обязаны отвечать на Послание, если нам не понравится его содержание, и что расстояния между звездами надежно охраняют нас от всех козней веганцев…</p><p class="p1">— Кен, но ведь он даже не верит, что скорость света является предельной в космосе. Мы будем говорить на разных языках. Кроме того, у меня накопился долгий опыт неудач в приспособлении к традиционным религиям. Эти вечные противоречия и ханжество не для моего рассудка. Кстати, я вовсе не уверена, что из встречи между Джоссом и мной получится то, что ты хочешь. И президент тоже.</p><p class="p1">— Элли, я лично уверен лишь в том, на кого из вас поставил бы свои деньги. И просто не вижу, каким образом разговоры с Джоссом могут повредить делу.</p><p class="p1">Она разрешила себе улыбнуться в ответ.</p><p class="p1">Теперь, когда в морях несли вахту корабли слежения и несколько небольших, но хорошо оснащенных радиотелескопов были сооружены в таких местах, как, например, Рейкьявик и Джакарта, сигналы с Веги без потерь стали записывать по всем долготам. Общая конференция Всемирного консорциума «Послание» была назначена в Париже. Вполне естественно, что подготовку дискуссии вели страны, обладающие основной долей информации. Подготовительное совещание затянулось на четыре дня, главным образом для того, чтобы люди вроде дер Хиира, посредники между учеными и политиками, вошли в курс дела. В состав советской делегации, номинально возглавлявшейся Луначарским, входили известные ученые и крупные инженеры. Среди них был Генрих Архангельский, недавно назначенный главой международного консорциума «Интеркосмос», и Тимофей Готридзе, значившийся министром среднего машиностроения и членом Центрального Комитета.</p><p class="p1">ВГ обнаруживал явную нервозность: он вновь начал непрерывно курить. Разговаривая, он держал руку, зажав ладонью вверх сигарету между указательным и большим пальцами.</p><p class="p1">— Я согласен, мы обеспечили достаточное перекрытие по долготе, но меня беспокоит дублирование записи. Предположим, на борту «Маршала Неделина» сломается ожижитель гелия или в Рейкьявике начнутся перебои с электроснабжением, и в Послании возникнут пробелы. Предположим также, что передача Послания от начала до конца займет два года. Тогда, если мы пропустим какую-то часть, нам придется ожидать два года, чтобы заполнить пробел. К тому же пока мы не можем быть уверены, что Послание повторят. А если повтора не будет, пробелы останутся навсегда. Я думаю, следует предусмотреть любые возможности.</p><p class="p1">— Что вы хотите предложить? — спросил дер Хиир. — Установить аварийные источники энергии на каждой входящей в консорциум обсерватории?</p><p class="p1">— Да, а также независимые усилители, спектрометры, автокорреляторы, дисководы и прочее. Еще следует обеспечить возможность быстрой доставки жидкого гелия на все обсерватории в случае необходимости.</p><p class="p1">— Элли, ты согласна?</p><p class="p1">— Полностью.</p><p class="p1">— Что еще?</p><p class="p1">— Я думаю, следует продолжать наблюдение Веги в широком диапазоне частот, — сказал ВГ. — Быть может, завтра начнется новая передача на другой частоте. Надо следить и за другими участками неба. Что, если ключ к Посланию станут передавать от другой звезды…</p><p class="p1">— Позвольте пояснить, почему мне кажутся важными соображения ВГ, — вмешался Валериан. — Возникла уникальная ситуация: мы принимаем Послание, но не можем рассчитывать на его успешное прочтение. У нас нет никакого ключа, поэтому приходится учитывать все варианты. Ведь нельзя же терять пару лет из-за собственной непредусмотрительности или забывчивости. Пока наше предположение, что Послание будет повторено, является простой догадкой. В структуре самого Послания еще ничто не предвещает повтора. И любые потерянные сейчас возможности могут оказаться упущенными навечно. Я согласен, нужны новые приборы. Насколько мы понимаем, у палимпсеста может быть и четвертый слой.</p><p class="p1">— Следует помнить и о персонале, — продолжил ВГ. — Что, если передача будет длиться не один-два года, а десятилетия? А вдруг она окажется первой в длинной цепи посланий с небес? В мире сейчас не более нескольких сотен радиоастрономов. Этого слишком мало, когда ставка так высока. Промышленно развитые страны должны выпускать больше первоклассных радиоастрономов и радиоинженеров.</p><p class="p1">Элли заметила, что в основном молчавший Готридзе ведет подробный конспект. И ее вновь поразило, насколько советские коллеги лучше владеют английским языком, чем американцы — русским. В начале столетия ученые всего света говорили по-немецки или хотя бы читали на этом языке. До того языком науки был французский, а еще раньше — латинский. В следующем столетии обязательным языком ученых может стать… хотя бы китайский. Но сегодня это английский, и все ученые планеты вынуждены разбираться в этой зачастую двусмысленной и неподдающейся правилам речи.</p><p class="p1">Раскурив новую сигарету от тлеющего кончика предыдущей, ВГ продолжил:</p><p class="p1">— Я бы хотел высказать еще одно предположение. Оно даже не так аргументировано, как гипотеза о том, что Послание будет повторено… профессор Валериан вполне обоснованно считает эту мысль простой догадкой. В другой ситуации я бы не стал выдвигать такую сомнительную идею, тем более в столь незрелом виде. Но если в ней кроется зерно истины, мы немедленно должны принять соответствующие меры. Я не решился бы поднимать этот вопрос, но академик Архангельский независимо пришел к тому же выводу. Как известно, прежде наши мнения не совпадали ни в чем — и когда речь шла о квантовании красного смещения линий в спектрах излучения квазаров, о природе источников света сверхвысокой светимости, о массе покоя нейтрино, о физике кварков в нейтронных звездах… Мы спорили буквально обо всем. Вынужден признать — иногда был прав он, иногда я. И, по-моему, никогда на столь ранней и умозрительной стадии исследования мы не соглашались. Но в данном вопросе наши мнения совпадают.</p><p class="p1">— Генрих Дмитриевич, вы не поясните?</p><p class="p1">Все это время Архангельский терпеливо молчал и даже как будто развеселился. Многие годы они с Луначарским соперничали во всем и вели яростные научные споры, особенно знаменитой была их полемика по поводу советской термоядерной программы.</p><p class="p1">— По нашим предположениям, — начал он, — Послание содержит в себе инструкции для сооружения некой машины. Конечно, пока мы не имеем никакого представления о способе дешифровки. Основанием для предположения являются внутренние отсылки. Приведу пример. На странице 15441 обнаружена вполне очевидная ссылка на страницу 13097, которой мы, к счастью, тоже располагаем. Одна страница была принята здесь, в Нью-Мексико, другая, ранняя, на обсерватории возле Ташкента. На странице 13097 имеется новая ссылка, относящаяся к периоду, когда запись на всех долготах не производилась. Подобных примеров обратной отсылки достаточно много. В общем, и это важно, на последующих страницах находятся более подробные инструкции, чем на предыдущих. В одном случае на странице предыдущий материал упоминается восемь раз.</p><p class="p1">— Ребята, это вовсе не убедительный аргумент, — возразила Элли. — Что, если это просто последовательность математических упражнений, и последующие основываются на предыдущих? Или же продолжительный роман… если они живут дольше нас… в котором события сравниваются с теми, что были в детстве… или что у них там называется этим словом. Или же это религиозное писание со множеством перекрестных ссылок.</p><p class="p1">— Десять миллиардов заповедей, — усмехнулся дер Хиир.</p><p class="p1">— Возможно, — отвечал Луначарский, через сигаретный дымок бросив взгляд в окно на радиотелескопы. С затаенной страстью они вглядывались в небо. — Но если внимательно проанализировать расположение ссылок, мне кажется, вы согласитесь с тем, что перед нами инструкция по сборке машины, и один Бог знает, для чего она предназначена.</p></span></span>
