<span><span id="id17"><div class="title3">
<p class="p">15. Шпонка из эрбия</p>
</div><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v">Земля, — разве этого мало?</p>
<p class="v">Мне не нужно, чтобы звезды</p>
<p class="v">спустились хоть чуточку ниже,</p>
<p class="v">Я знаю, им и там хорошо, где сейчас,</p>
<p class="v">Я знаю, их довольно для тех,</p>
<p class="v">Кто и сам из звездных миров.</p>
</div>
<p class="text-author">Уолт Уитмен. «Листья травы»</p>
</div>
</div><p class="p1">Только на достижение общего согласия ушли годы, но когда закончились дипломатические кошмары, люди начали строить Машину, воплощая в ней мечту разума. Для ее названия предлагались разнообразные неологизмы — производные от объектов и персонажей древних мифов. Но с самого начала вся планета называла ее просто Машиной, и это слово стало ее официальным названием. Весь комплекс тонких и деликатных международных договоров передовицы западных газет именовали «Политической машиной». Уже после первой, еще достаточно приблизительной оценки ее стоимости ахнули даже титаны аэрокосмической промышленности. Но сумму удалось разложить на несколько лет, и ежегодные расходы свелись к половине триллиона долларов, что составляло около трети военного бюджета планеты, если к ядерным приплюсовать обычные вооружения. Некоторые опасались, что затраты на постройку Машины погубят экономику планеты. «Экономическая диверсия с Веги?» — вопрошал лондонский «Экономист». Даже в «Нью-Йорк таймс» то и дело стали попадаться заголовки попричудливее, чем в почившем лет десять назад «Отечественном исследователе».</p><p class="p1">Беспристрастные публикации свидетельствовали, что ни экстрасенсы, ни пророки, ни ясновидцы, ни гадалки, ни разные там провидцы вроде астрологов, нумерологов и авторов декабрьских статей под заголовком «Что нас ждет в грядущем году» не сумели предсказать ни Машины, ни Послания, ни тем более связанных с ними подробностей: самой Веги, простых чисел, нового явления Адольфа Гитлера на Олимпийских играх. Впрочем, не было недостатка в запоздалых претензиях: нашлись и такие, кто уже предвидел события, но почему-то поддался непонятному легкомыслию, помешавшему вовремя обнародовать достоверные пророчества. Чем удивительнее событие, тем точнее и пророчество, если только не торопиться заносить его на бумагу. Таков один из странных законов повседневной жизни. Верования разного толка ударились в иную крайность: творческое и дотошное изучение священных писаний позволяло обнаружить в текстах точное предсказание всех удивительных событий.</p><p class="p1">Но в остальном Машина являла собой потенциальный клад для мировой аэрокосмической промышленности, пришедшей повсюду в прискорбный упадок после вступления Хиросимских соглашений в полную силу. Новые разновидности стратегического оружия более нигде не разрабатывались. Правда, процветали фирмы, сооружающие космические поселения, но их расцвет едва ли компенсировал отсутствие в космосе орбитальных боевых станций, вооруженных лазерами и прочими изысками космической обороны, замысленных предшествующей администрацией, но так и оставшихся на бумаге. Но, как всегда, едва речь зашла о должностях, доходах и карьере, многие ярые противники Машины, еще недавно переживавшие за судьбы планеты, принялись за ее сооружение.</p><p class="p1">Высокопоставленные лица прекрасно понимали: ничто не сулит больших выгод высокоразвитым отраслям промышленности, чем возможная угроза из космоса. А потому рекомендовали немедленно предпринять оборонительные меры, заняться сооружением чудовищной мощности радарных установок, разместить аванпосты на Плутоне или в кометном облаке Оорта. Никакие доводы в пользу абсолютного военного превосходства ожидаемых пришельцев над землянами не могли смутить отважных визионеров. «Хорошо, пусть наши меры окажутся недостаточными, — возражали они, — надо же хотя бы заметить их приближение!» Ожидался крупный барыш, они чуяли его. Конечно, они-то и сооружали Машину, в их карманы стекали триллионы долларов, отпущенных на ее создание, но Машина — всего лишь начало, если правильно разыграть партию.</p><p class="p1">Состоялись перевыборы президента, победа Ласкер, по сути дела, вылилась в национальный референдум, решивший участь Машины, за которым маячил невероятный политический альянс. Ее соперник напоминал и о троянском коне, и о Судном дне, даже о том, что нация может почувствовать себя отсталой перед лицом чужаков, уже успевших изобрести все на свете. Президент же высказывала уверенность в американской технической мысли и даже намекнула, что со временем изобретательность американцев посрамит всяких веганцев. И была переизбрана пусть и не подавляющим, но все-таки надежным большинством.</p><p class="p1">Вопрос по существу решили сами инструкции, заложенные в Послании. И во введении, посвященном основам языка и технологии, и в основном тексте, содержащем описание Машины, не было непонятных мест. Напротив, зачастую вполне очевидные шаги разжевывались подробнейшим образом… как это было, например, с основами арифметики: если дважды три равно шести, то и трижды два тоже. Каждая стадия работ сопровождалась проверками: полученный эрбий должен иметь 96 %-ную чистоту и содержать не более одного процента примесей других редкоземельных металлов. После изготовления узла 31 и последующего травления в шестимольном растворе плавиковой кислоты внешний вид деталей должен соответствовать прилагаемому рисунку; после завершения сборки узла 408 приложенное поперечное магнитное поле напряженностью в два мегагаусса должно раскрутить ротор до такой-то скорости, и только совершив положенное число оборотов, он может остановиться. Если выходило не так, рекомендовалось повторить все операции заново.</p><p class="p1">Через какое-то время изготовители привыкли к проверкам и спокойно ожидали результатов очередной. Все было сродни зубрежке. Некоторые из деталей, что были изготовлены на фабриках, сооруженных по инструкциям Послания, попросту не поддавались никакому человеческому пониманию. Невозможно было даже представить, как и почему все это должно действовать. Но узлы собирали, и они работали. Ничего не понимая в сути этих устройств, люди пытались найти им применение. Уже были достигнуты известные успехи в нанесении покрытий в металлургии и технологии полупроводников. В ряде случаев в Послании предусматривались различные способы изготовления одной и той же детали: внеземляне не были заранее уверены в том, какой из них больше подойдет землянам.</p><p class="p1">Строились заводы, изготавливались первые образцы, таяло неверие в способность рода человеческого воссоздать инопланетную технологию по инструкциям, написанным на неизвестном языке. Выглядело это так, словно человечество явилось на экзамен неподготовленным и вдруг обнаружило, что можно отвечать на вопросы, руководствуясь только общим образованием и здравым смыслом. Но как бывает, если экзамен готовили компетентные специалисты, ученик, отвечая на вопросы, обучался. Все первые тесты были успешно пройдены: получен эрбий необходимой чистоты, после травления нарисованная деталь обрела нужный вид, ротор также вращался должным образом. Критики утверждали, что Послание льстит ученым и инженерам; увлекаясь технологическими проблемами, они забывают про все связанные с ним опасности.</p><p class="p1">При изготовлении одной из деталей потребовалось воспроизвести сложную цепь реакций с органическими веществами, полученный продукт нужно было вылить в целый плавательный бассейн, заполненный смесью формальдегида и водного раствора нашатырного спирта. Масса росла, обретала очертания и структуру, наконец, просто застыла — невероятно превосходя в сложности все созданное человеческими руками. Через пронизывающий ее лабиринт каналов, возможно, должна была циркулировать какая-то жидкость. Темно-красное источенное трубками желе на взгляд казалось плотным. Оно не обладало способностью к самовоспроизведению, но его чисто биологический вид смутил многих. Всю процедуру повторили, характер итогового продукта не изменился. Как может вещество, получающееся в результате химических реакций, оказаться более сложным, чем предусмотрено инструкциями по его изготовлению? Причина так и осталась невыясненной. Поэтому органическая масса покоилась на своей невысокой платформе и, насколько можно было судить об этом извне, никак себя не проявляла. Она была предназначена для заполнения в додекаэдре полостей над и под помещением экипажа.</p><p class="p1">Соединенные Штаты и Советский Союз строили две одинаковые Машины. Обе державы предпочли строить их в удаленных местах — не столько из предосторожности на случай того, что Машина действительно окажется «машиной Судного дня», сколько для того, чтобы по возможности избавиться от любопытствующих, протестующих и прессы. Штаты сооружали свою Машину в Вайоминге, Советский Союз — за Кавказскими горами и морем — в Узбекской ССР. Неподалеку от мест сборки воздвигались новые заводы. Если детали можно было изготовить традиционными методами, то заказы старались разместить насколько возможно шире. В Йене по субподряду изготавливались и испытывались оптические компоненты, предназначенные и для американской, и для советской Машин; такие же детали отправлялись еще и в Японию, где каждая из них подвергалась систематическому обследованию, чтобы понять, как она действует. Работы на Хоккайдо продвигались неспешно.</p><p class="p1">Высказывались опасения, что непредусмотренное в Послании исследование свойств способно нарушить тонкие взаимосвязи различных компонент Машины, если она заработает. В общем она состояла из трех вложенных друг в друга сфер, оси которых располагались под прямыми углами друг к другу; все три сферы должны были быстро вращаться. На сферических оболочках были проточены сложные и тонкие узоры. Будет ли работать оболочка в Машине, если ее предварительно раскрутить несколько раз? И будет ли исправно функционировать оболочка после непредусмотренного воздействия?</p><p class="p1">Основной контакт на выполнявшиеся в Америке работы был заключен с компанией «Хадден индастриз». Сол Хадден настаивал, чтобы ни одну деталь перед общей сборкой не испытывали и заранее не собирали даже узлов. Он велел тщательно соблюдать букву инструкции до последнего бита информации — Послание не содержит пустых слов. И своим служащим в качестве примера приводил средневековых некромантов, до буковки, до ударения соблюдавших каждое слово заклинания. Хадден говорил — нельзя сделать ошибки в едином слоге.</p><p class="p1">Шло время… И по всем календарям планеты, невзирая на эсхатологические доктрины, до наступления нового тысячелетия оставалось около двух лет. Так что многие уходили «на покой», поблаженствовать в ожидании Судного дня или Второго пришествия или того и другого вместе. В некоторых отраслях обнаруживалась нехватка искусных работников. Однако умение Хаддена оптимальным образом организовать работы, в максимальной степени учитывая интересы субподрядчиков, стало одной из причин успехов американцев.</p><p class="p1">Вдруг ушел на «заслуженный отдых» и сам Хадден. Это явилось неожиданностью, учитывая широко известное высказывание автора «Проповедникса»: «Хилиасты сделали меня атеистом». Эту его фразу часто цитировали. Впрочем, его подчиненные утверждали, что контроль за основными решениями по-прежнему оставался в руках Хаддена. Но вся связь с ним теперь осуществлялась через скоростную асинхронную телесеть: подчиненные помещали свои отчеты, запросы и вопросы в ящик, находившийся в популярной научной телестудии. Ответы Хаддена извлекали из другого ящика. Однако странный способ общения неплохо срабатывал. Первые и самые трудные шаги остались уже позади, Машина начинала приобретать соответствующий чертежам облик, а имя С.Р.Хаддена упоминалось все меньше и меньше. Уполномоченные Всемирного консорциума «Машина» выражали озабоченность, но после длительного пребывания в гостях у мистера Хаддена в неких и оставшихся неизвестными краях к ним возвратилось спокойствие. Другие не знали о его местонахождении.</p><p class="p1">Впервые после середины 50-х годов общее количество ядерных боеголовок во всем мире стало меньше 3200 штук. Шли многосторонние переговоры о более сложной стадии разоружения: сокращение числа ядерных боеголовок до минимума, обеспечивающее сдерживание. Ведь чем меньшим количеством боевых единиц обладают обе стороны, тем ужаснее могут оказаться последствия, если одна сверхдержава сумеет утаить хотя бы маленький арсенал. Количество средств доставки резко уменьшилось — и это несложно было установить при новых методах автоматизированной проверки соблюдения договора. После заключения нового соглашения о прямом инспектировании перспективы на дальнейшее сокращение вооружений стали еще более обнадеживающими. Этот процесс уже набрал известную инерцию и по оценкам экспертов, и в общественном мнении. Как в свое время было с гонкой вооружений, обе стороны теперь старались не отставать друг от друга в обратном стремлении. С военной точки зрения фактически особых изменений пока не произошло — генералы по-прежнему могли уничтожить всю земную цивилизацию. Однако будущее уже виделось менее зловещим, у нового поколения появилась надежда… и в этом отношении достигнуто было очень много. Вооруженных конфликтов между народами — не без влияния надвигающегося праздника гражданского и канонического тысячелетия — с каждым годом становилось все меньше. «Наступил мир Господень», — объявил кардинал-архиепископ Мехико.</p><p class="p1">В Вайоминге и Узбекистане сооружались заводы, рядом с ними вырастали новые города. Расходы, конечно, в разной мере ложились на промышленно развитые страны, но в среднем на одного жителя Земли приходилось около сотни долларов в год. Для четверти населения планеты такая цифра составляла внушительную долю годового дохода. Деньги, расходуемые на Машину, не создавали ни услуг, ни товаров, но они стимулировали новые технологии и обещали прибыль, даже если Машина не заработает.</p><p class="p1">Многим казалось, что человечество слишком резво взялось за постройку Машины, что каждый шаг в этом направлении необходимо было обдумать, прежде чем идти дальше. Что плохого, если сооружение Машины растянется на поколения? Тогда расходы распределятся на многие десятилетия, существенно ослабляя нагрузку на экономику планеты. Впрочем, в создавшихся условиях благоразумному совету трудно было последовать. Нелегко заниматься только одним узлом Машины, когда по всей планете инженеры и ученые буквально набрасывались на любое мало-мальски знакомое дело, если о нем упоминалось в Послании.</p><p class="p1">Других, наоборот, беспокоило, что, если с Машиной не поторопиться сейчас, потом ее, возможно, никогда так и не удастся закончить. Нынешний американский президент и советский премьер рассматривали сооружение Машины с позиций национальных интересов. Взгляды их преемников могли измениться. Кроме того, по вполне понятным личным мотивам руководители хотели бы увидеть завершение работ, оставаясь на своих постах. Некоторые даже настаивали: мощная передача со звезд на многих диапазонах была вызвана насущной необходимостью. Нас просили построить Машину не тогда, когда мы будем готовы к этому, а именно сейчас. И темп работ нарастал.</p><p class="p1">В начале работы использовались элементарные технологические процессы из первой части Послания. Контрольные испытания были преодолены с достаточной легкостью. Позже при опробовании более сложных систем у обеих стран, но чаще в Советском Союзе, случались и неудачи. И поскольку никто не знал, как работают испытуемые детали или узлы, по характеру отказа невозможно было определить место ошибки в технологическом процессе. В некоторых случаях детали изготавливались параллельно, подрядчики конкурировали в точности и быстроте работы. Если испытания проходили два компонента, то каждая страна по возможности предпочитала отечественные изделия, поэтому обе Машины не были полностью идентичными.</p><p class="p1">Наконец в Вайоминге настал день сборки: отдельные компоненты пора было собрать воедино. Начинался, по общему мнению, самый легкий этап. Можно было ожидать, что через год-другой эти работы завершатся. Однако некоторые считали, что своевременный пуск Машины и приведет к ожидаемой по календарю кончине мира.</p><p class="p1">В Вайоминге кролики оказались более сообразительными. А может, и нет. Трудно сказать. Огни фар «Тандерберда» все-таки время от времени выхватывали из тьмы очередного зверька. Но чтобы они сотнями выстраивались вдоль обочины — подобный обычай, должно быть, не успел еще дойти из Нью-Мексико до Вайоминга.</p><p class="p1">Все тут было похоже на «Аргус»: научный центр окружали десятки тысяч квадратных километров дивной, почти необитаемой природы. Только здесь Элли не распоряжалась, даже не числилась в экипаже. Просто в числе многих принимала участие в одном из самых грандиозных предприятий, о котором мечтали многие поколения людей. Что бы там ни случилось по окончании работ, открытие, сделанное на «Аргусе», явилось поворотной точкой в истории человечества.</p><p class="p1">Небесная синева разразилась подобной молнией как раз в тот самый момент, когда человечество так нуждалось в объединении. Тьма небесная, поправила себя Элли. Двадцать шесть световых лет, 230 триллионов километров. Перед лицом цивилизации, опередившей земную на тысячелетия, трудно ощущать себя шотландцем, словенцем или жителем Сычуани. Разрыв между самыми развитыми и отсталыми нациями нашей планеты не столь велик, как тот, что отделяет ее самых передовых обитателей от жителей Веги. И внезапно все неискоренимые прежде различия — расовые, религиозные, национальные, этнические, лингвистические, экономические и культурные — стали чуточку менее глубокими.</p><p class="p1">«Все мы люди», — эти слова частенько можно было услышать в те дни. Просто удивительно, как редко подобные мысли высказывались в предыдущие десятилетия… особенно в прессе. Все мы жители одной крохотной планетки и принадлежим, если пренебречь некоторыми ничтожными различиями, к одной всепланетной культуре. Трудно представить, чтобы внеземляне могли всерьез отнестись к переговорам с представителями одного или другого идеологического лагеря. Сам факт существования Послания — пусть его предназначение остается загадкой — связывал мир воедино. Это происходило буквально на глазах.</p><p class="p1">Узнав, что Элли не выбрали в экипаж, мать первым делом поинтересовалась: «А ты не плакала?». Да, она ревела. В конце концов, это естественно. И она действительно хотела бы оказаться на борту Машины. Но все-таки Драмлин куда более подходящая кандидатура, говорила она матери.</p><p class="p1">Русские пока не решили, кому отдать предпочтение: Луначарскому или Архангельскому, но официально заявили, что оба кандидата будут «готовиться» к своей миссии. Чему еще можно научить эту пару, учитывая их познания, Элли не понимала. В Америке пытались обвинить русских в новой попытке добиться увеличенного представительства в экипаже, но Элли считала подобный выпад необоснованным. Оба, и Луначарский, и Архангельский, — люди весьма одаренные. Интересно, по какому критерию будет отдано предпочтение одному из них? Луначарский как раз находился в Штатах, но не в Вайоминге. Он гостил в Вашингтоне в составе важной советской делегации, прибывшей по приглашению государственного секретаря и Майкла Китца, только что произведенного в заместители министра обороны. Архангельский находился в Узбекистане.</p><p class="p1">Новый метрополис, подраставший посреди вайомингской глуши, назывался Машиной: город Машина, штат Вайоминг. Такое же имя носил советский аналог нового города. Жилые и деловые районы перемежались с заводами, резиденциями и предприятиями. Внешне ничего впечатляющего, подчас все важное можно было охватить одним взглядом. В глуши располагались только потенциально опасные предприятия, например химические заводы, изготавливающие органические компоненты Машины. Не сулившие неприятностей технологические системы были разбросаны по всему миру. Но все сходилось к корпусу системной сборки, построенному возле исчезнувшего ныне поселка Вагонвиль, штат Вайоминг, куда свозились готовые компоненты. И когда поступала очередная деталь, Элли отправлялась инспектировать сборку. Узлы соединялись с узлами, подсистемы проходили предусмотренные испытания, и она уже ощущала в сердце некую гордость, сродни материнской.</p><p class="p1">Элли, Драмлин и Валериан собрались для рутинного, давно намечавшегося совещания, посвященного все той же передаче с Веги, так и не собиравшейся прекращаться, но уже длительное время доносившей до Земли только избыточную информацию. Собравшись вместе, они обнаружили, что все вокруг говорят о пожаре в Вавилоне. Он случился рано утром, в те часы, когда в городе оставались лишь самые настырные и абсолютно не контролируемые завсегдатаи. Вооруженные минометами и зажигательными снарядами налетчики одновременно ворвались через ворота Иштар и Энлиля. Зиккурат вспыхнул свечкой. Телевидение показывало снимки перепуганных, едва одетых людей, разбегавшихся из храма Ашшура. Погибших, как ни странно, не оказалось, но раненых и обожженных было в избытке.</p><p class="p1">Незадолго перед нападением в газету «Нью-Йорк сан», контролируемую Первоземлянами, символом которой является расколотый молнией земной шар, позвонили и предупредили о налете. Это не что иное, как кара Господня, пояснил голос в трубке, воздаяние притону сему во имя добропорядочности и морали от лица тех, кто изнемог от растления, грязи и коррупции. В заявлении президента компании «Вавилон Инк» кроме осуждения налета содержались еще и обвинения в преступном сговоре, но С.Р.Хадден, где бы он ни находился, по крайней мере пока не отозвался ни единым словом.</p><p class="p1">Здесь знали, что Элли встречалась с Хадденом именно в Вавилоне, и некоторые из присутствовавших попробовали выяснить ее мнение. Оно интересовало даже Драмлина, хотя, судя по его познаниям в топографии Вавилона, сам он явно не единожды посещал увеселительное заведение. Элли без всякого труда могла представить себе Драмлина на колеснице. Впрочем, он мог и просто много читать о Вавилоне. Во всяком случае, фотокарты города публиковались едва ли не в каждом еженедельнике.</p><p class="p1">Наконец добрались до дела. Передача так и не прекращалась, она шла на тех же частотах, в тех же диапазонах, с той же скоростью и при той же поляризации и фазовой модуляции. Там на Веге настырный народ. Или просто забыли выключить передатчик. Валериан слушал с отсутствующим выражением на лице.</p><p class="p1">— Питер, вы что-то ищете на потолке или думаете?</p><p class="p1">По слухам, в последние несколько лет норов Драмлина смягчился, но данная колкость свидетельствовала о другом. Он постоянно говорил, что ему оказана огромная честь. Президент Соединенных Штатов выбрала его представителем наций перед лицом инопланетян. Будущее путешествие, пояснял он близким, будет высшей точкой всей его карьеры. Временно переведенная в Вайоминг, его жена с прежней собачьей преданностью сносила демонстрации все тех же слайдов уже новой аудитории — ученым и инженерам, сооружающим Машину. Родная Монтана лежала неподалеку, и Драмлин время от времени наносил туда непродолжительные визиты. Однажды Элли довезла его прямо до города Мизула… впервые со времени их знакомства он держался корректно несколько часов кряду.</p><p class="p1">— Ш-ш-ш! Я думаю, — отвечал Валериан. — Это просто способ подавления шумов. Я пытаюсь свести к минимуму визуальные помехи, а теперь вы вводите дополнительные шумы в аудиоспектре. Вы желаете спросить, почему для этого нельзя воспользоваться листком белой бумаги? Дело в том, что листок слишком мал. А думаю я вот о чем. Почему мы продолжаем принимать одно и то же: Гитлера, Олимпийские игры и прочее? Ведь прошли уже годы. Они там должны были принять телепередачу об инаугурации Британского короля. Так почему мы не видим ни скипетра, ни державы, ни пурпура, не слышим слов «коронуется Георг VI, милостью Божьей король Англии и Северной Ирландии, император Индии»?</p><p class="p1">— А вы уверены, что Вега стояла над Англией в момент передачи? — спросила Элли.</p><p class="p1">— Да, мы проверили это сразу, как только приняли сообщение об Олимпийских играх. И сигнал был сильней, чем передача о Гитлере. Нет, я уверен, на Веге должны были принять трансляцию с коронации.</p><p class="p1">— Вас пугает, что они стремятся утаить часть того, что им известно о нас? — спросила она.</p><p class="p1">— Они торопятся, — отвечал Валериан. Подобные пророчества иногда срывались с его уст.</p><p class="p1">— Просто хотят, чтобы мы не забыли, что им известно о Гитлере, — возразила Элли.</p><p class="p1">— Это не существенно отличается от моих слов, — парировал Валериан.</p><p class="p1">— Ну хорошо. Только зачем тратить время на эти фантазии? — простонал Драмлин. Всякие выяснения причин, которыми руководствуются инопланетяне, всегда тяготили его. Гадать — значит попусту терять время, утверждал он, скоро мы и так все узнаем. И порекомендовал всем вдумчиво изучать Послание, его совершенство, полноту и избыточность информации, не допускающие двойного толкования.</p><p class="p1">— Пора вернуться к реальности. Почему бы нам не пройти в сборочный цех? Там, наверное, уже устанавливают эрбиевые шпонки.</p><p class="p1">Общий геометрический облик Машины был очень прост. Только все детали были до крайности сложными. Внутри додекаэдра, в его выпуклой середине, уже были установлены пять кресел, предназначенных для экипажа. Никаких приспособлений для сна, еды и отправления прочих потребностей человеческого организма веганцы не предусмотрели; похоже, путешествие на борту Машины продлится недолго, если только оно состоится, конечно. Некоторые находили в этом свидетельство того, что где-нибудь в пространстве возле Земли находится межзвездный корабль и после включения Машина быстро соединится с ним. Правда, самая тщательная радиолокация и оптические исследования не позволяли обнаружить даже косвенного намека на существование подобного тела в ближнем космосе. С другой стороны, трудно было предположить, что внеземляне способны забыть об элементарных физиологических потребностях людей. А если Машина никуда не отправится? Быть может, она проделает что-то над экипажем? Никаких приборов в кабине не было… штурвалов, ключей зажигания тоже, лишь пять кресел друг с друга, чтобы каждый член экипажа мог видеть всех, не входя со своего места. Общий вес экипажа и его пожитков веганцы строго ограничили. На практике это давало преимущество «миниатюрным» претендентам.</p><p class="p1">Полости в сужающихся частях додекаэдра под кабиной и над ней были уже заполнены органическим веществом, до сих пор озадачивавшим всех своей сложной структурой. Эту часть додекаэдра на первый взгляд случайным образом пронизывали шпонки из эрбия. Снаружи додекаэдр охватывали три концентрические сферические оболочки, по одной на пространственное измерение. Оболочки покоились на магнитном подвесе; инструкции предусматривали наличие мощного генератора магнитного поля, в пространстве между додекаэдром и оболочками должен был выдерживаться высокий вакуум.</p><p class="p1">В Послании не было никаких названий всему, что входило в состав Машины. Эрбий определялся просто как атом с 68 протонами и 99 нейтронами. Отдельным частям Машины присваивались номера: например, узел 31. Инженеры называли вращающиеся концентрические сферы бензелями по предложению чешского специалиста в области техники, помнившего, что в 1870 году Густав Бензель изобрел карусель.</p><p class="p1">Конструкция Машины и ее назначение направляли инженерную мысль к бездонным глубинам, приходилось по ходу дела пересматривать все техническое оснащение человечества. Но все-таки Машина состояла из материи, и чертежи ее были доступны любому — пресса разнесла разрезы сборок по всему миру. Уже на глаз было видно, что близится завершение работ. И мир пребывал в состоянии технологического оптимизма.</p><p class="p1">Драмлин, Валериан и Эрроуэй миновали пропускной пульт: личность входящего устанавливалась по пропуску, отпечаткам пальцев и сонограмме. Лишь после этого их пропустили в просторное сборочное помещение. Мостовой кран на третьем этаже подавал эрбиевую шпонку. На высоком рельсовом транспортере висели пятиугольные пластины, предназначенные для внутренней части додекаэдра. Было известно, что Советы столкнулись со значительными проблемами, но все изготовленные в США подсистемы прошли испытания, и уже начинал проступать внешний облик Машины. Как хорошо все складывается, думала Элли. После завершения всех работ Машина станет похожей на одну из армиллярных сфер астрономов Ренессанса. Что стал бы с ней делать Иоганн Кеплер?</p><p class="p1">Пол и круговые мостики, на различной высоте охватывающие сборочный зал, были полны народа, инженеров, правительственных чиновников, представителей консорциума «Машина». Наблюдая за происходящим, Валериан заметил, что президент прислала письмо его жене, которая даже не сообщила ему содержание послания, объявив, что вправе иметь личную переписку.</p><p class="p1">Почти все шпонки были уже размещены, и сегодня в цехе впервые собирались начать сборку основных систем. Кое-кто полагал, что устройство, рекомендованное веганцами для проверки новой операции, представляет собой гравитационный телескоп… И когда эксперимент начался, все трое как раз обходили опору, чтобы лучше видеть.</p><p class="p1">Вдруг Драмлин как бы взлетел на воздух. И все вокруг тоже. Элли успела представить себе торнадо, занесшее Дороти в Страну Оз. Вытянув руки вперед, Драмлин словно при замедленной съемке налетел на нее и грубо подмял под себя. Неужели решил-таки приступить к ней с намерениями после всех лет знакомства, промелькнуло в голове Элли? Как же его до сих пор не научили вежливому обхождению?</p><p class="p1">Кто это сделал, впоследствии так и не удалось выяснить. Ответственность, не стесняясь, приписывали себе Первоземляне, отряды Красной Армии, Исламский Джихад, подпольная ныне Организация термоядерщиков, Сикхские сепаратисты, Сверкающий путь, Кхмер Верт, Афганский Ренессанс, радикальное крыло организации «Матери против Машины», Реюнифицированная церковь Реюнификации, Омега Семь, хилиасты Судного дня (Билли Джо Ренкин отрекался от всяческой связи с ними и уверял, что подобным названием могли воспользоваться лишь нечестивцы, стремящиеся скомпрометировать Господа), Broederbond<a href="ch2.xhtml#id51" class="a">[38]</a>, El Catorce de Febrero<a href="ch2.xhtml#id50" class="a">[39]</a>, подпольная армия Гоминдана, Сионистская лига. Партия Бога и недавно воскресший Симбионезийский фронт освобождения. В большинстве своем эти организации даже не имели возможности совершить подобную диверсию; этот список свидетельствовал лишь о всеобщем характере оппозиции.</p><p class="p1">Ку-клукс-клан, Американская нацистская партия, Демократическая национал-социалистическая партия и ряд аналогичным образом настроенных организаций сдержанно промолчали. Небольшая, но влиятельная группа их членов была уверена, что Послание отправил сам Гитлер. Согласно одной из версий, он вознесся с Земли на ракете германского производства в мае 1945 года, а с тех пор нацистам удалось добиться кое-каких успехов.</p><p class="p1">— Не знаю, куда бы отправилась Машина, — заявила президент спустя несколько месяцев, — но если она изготовлена столь же небрежно, как и все на этой планете, едва ли стоило затевать путешествие.</p><p class="p1">Как установила следственная комиссия, взрыв разломил одну из эрбиевых шпонок на два плоских обломка, что обрушились вниз с высоты в двадцать метров со значительной скоростью в боковом направлении. Они повредили несущую перегородку, деформировавшуюся под ударом. Было убито одиннадцать человек, ранено сорок восемь. Погибла часть крупных узлов и блоков, но, поскольку стойкость и воздействие взрыва не значились в предусмотренном веганцами перечне испытаний, взрыв погубил и уцелевшие компоненты. Когда ничего не знаешь, приходится действовать с особенной осторожностью.</p><p class="p1">Несмотря на поток признаний от организаций, претендовавших на сомнительную честь, подозрение Соединенных Штатов пало на две стороны, вовсе не старавшиеся оказаться в списке диверсантов: внеземлян и русских. Вновь послышались речи о «машине Судного дня». Она и должна была взорваться сразу же после сборки, утверждал кое-кто, к счастью, мы несколько поторопились и сработала только часть всего заряда — так сказать, детонатор «машины Судного дня». Они настаивали на немедленном прекращении работ и советовали, пока не поздно, захоронить уцелевшие детали в одной из разбросанных повсюду соляных копей.</p><p class="p1">Но следственная комиссия быстро обнаружила доказательства земных причин преступления. Посреди каждой шпонки располагалась эллиптическая полость неизвестного предназначения, стенки которой были покрыты сложной сеткой из тонкой гадолиниевой проволоки. В полость взорвавшейся шпонки и было помещено пластиковое взрывчатое вещество с часовым механизмом — эти ингредиенты в Послании не предусматривались. Шпонки с полостью и гадолиниевая сетка были изготовлены, собраны, испытаны и опечатаны на заводе «Хадден кибернетикс» в Терре-Хоте, штат Индиана. Гадолиниевая намотка была слишком сложна для ручной работы, поэтому для ее изготовления потребовались специальные сервороботы. Чтобы их изготовить, в свою очередь пришлось соорудить целую фабрику. Расходы взяла на себя «Хадден кибернетикс», имея в виду и другие, более выгодные применения.</p><p class="p1">Проверили еще три эрбиевые шпонки из этой же партии, но пластиковой взрывчатки не обнаружили. Когда на советском и японском предприятиях стало известно о взрыве, каждую шпонку сперва подвергли дистанционной проверке и только потом на всякий случай вскрыли. Оказалось, что заряд вместе с таймером поместили в полость шпонки перед окончанием сборки на заводе в Терре-Хоте. До Вайоминга минированная шпонка ехала вместе со всеми остальными на специальном поезде под вооруженной охраной. Время взрыва и характер диверсии свидетельствовали, что к делу причастны лица, знакомые с конструкцией Машины… орудовали свои.</p><p class="p1">Но расследование не дало заметных результатов. Рискнуть могли несколько дюжин сотрудников: инженеры, контролеры, инспекторы, готовившие деталь к транспортировке, но ни у одного из них не было ни средств для диверсии, ни причин для нее. У тех, кто дрогнул на детекторе лжи, оказалось железное алиби. Никто из подозревавшихся не обмолвился по пьянке в ближайшем баре, никто не позволял себе необъяснимых расходов. На допросе тоже никто не сломался. И хотя службы, обеспечивающие выполнение закона, усердствовали, тайна так и осталась нераскрытой.</p><p class="p1">Желавшие видеть во всем происшедшем вину Советов указывали, что у русских были и мотивы — не допустить, чтобы Америка опередила их, — и все технические средства для совершения подобной диверсии. Они обладали и необходимыми познаниями о Машине и методах работы, принятых по обе стороны Атлантического океана. Но Анатолий Гольдман, бывший студент Луначарского, подвизавшийся в Вайоминге в качестве резидента советской разведки, связался с Москвой немедленно после несчастного случая, и порекомендовал провести предварительную проверку всех шпонок перед сборкой. В обычном порядке перехваченная Советом национальной безопасности информация на первый взгляд доказывала, что русские не имеют никакого отношения к диверсии, но тонкие знатоки предполагали, что радиограмма предназначалась, чтобы отвести подозрения от Союза… или же Гольдмана просто не предупредили о диверсии. За оба этих аргумента с восторгом ухватились те, кому не давало покоя недавнее ослабление напряженности в отношениях между обеими ядерными сверхдержавами. Узнав о подобных подозрениях, Москва по понятным причинам была крайне возмущена. Дело в том, что при создании Машины Советы сталкивались с большими затруднениями, чем это было известно на Западе. Действуя в соответствии с инструкциями Послания, Министерство среднего и тяжелого машиностроения сумело добиться заметных успехов в обогащении руд, в металлургии и аналогичных областях. Но в современной микроэлектронике и кибернетике возникали серьезные трудности. Большая часть деталей по контрактам была изготовлена в Европе и Японии. Еще более сложную задачу для промышленности Союза представляли органические компоненты, для изготовления которых требовался основательный опыт в молекулярной биологии.</p><p class="p1">В 30-е годы Сталин нанес едва не оказавшийся смертельным удар по советской генетике, решив, что менделизм идейно не отвечает марксистской идеологии. Тогда общепризнанной стала доктрина умудренного в политических интригах агронома Трофима Лысенко. В результате целых два поколения талантливых советских студентов практически ничего не знали о наследственности. Даже теперь, шестьдесят лет спустя, советская молекулярная биология и генная инженерия плелись в хвосте современной науки, и лишь немногие из главных открытий принадлежали советским ученым. Сходный факт имел место и в Соединенных Штатах, где по указке теологов долгое время запрещали преподавать теорию эволюции, одну из основных идей нынешней биологии. О ней старались даже не упоминать, поскольку традиционное истолкование Библии считалось не совместимым с процессом эволюции. К счастью для американской молекулярной биологии, религиозный фундаментализм в Штатах обладал куда меньшим влиянием, чем Сталин в Советском Союзе.</p><p class="p1">В заключении, представленном президенту по данному поводу, указывалось, что нет никаких свидетельств, подтверждавших участие русских в диверсии. Напротив, имея равное представительство со Штатами в экипаже, русские скорее заинтересованы в американской Машине. «Если ваша технология соответствует уровню три, — пояснял директор Центрального разведывательного управления, — а ваш потенциальный противник опережает вас и находится на уровне четыре и с небес на вас валится техника пятнадцатого уровня, вы будете просто торжествовать, получив доступ к достижениям и ресурсам бывшего соперника». Сторонников другой версии в американском правительстве почти не нашлось, и президент неоднократно делала публичные заявления о том, что Советы тут ни при чем, но устоявшаяся привычка отмирала с трудом.</p><p class="p1">— Никакая кучка безумцев и заговорщиков, никакая тайная организация не заставят человечество отказаться от осуществления поставленной исторической цели, — заверяла президент.</p><p class="p1">Но на практике достичь консенсуса в масштабах страны теперь было гораздо труднее. Диверсия дала новую жизнь прежним предубеждениям против Машины, как разумным, так и дурацким. Но русские могли первыми закончить свою Машину — это соображение только и поддерживало существование американского проекта.</p><p class="p1">Жена Драмлина хотела, чтобы похороны мужа остались семейным делом, но и в данном случае ее благим намерениям не суждено было осуществиться. Физики, дельтапланеристы, правительственные чиновники, аквалангисты, радиоастрономы, ныряльщики, аквапланеристы, все мировое сообщество исследователей внеземного разума стремились присутствовать на похоронах. Некоторое время даже думали, что придется прибегнуть к услугам Нью-йоркского кафедрального собора Иоанна Евангелиста — в стране не нашлось другого храма нужной величины. Но жена Драмлина одержала небольшую победу, и всю траурную церемонию совершили под открытым небом родной Мизулы в штате Монтана. Власти согласились, поскольку это упрощало работу служб безопасности.</p><p class="p1">Хотя Валериан не избежал серьезных травм и врач рекомендовал ему не посещать похорон, тем не менее он произнес свой панегирик, сидя в кресле-каталке. Гений Драмлина, по словам Валериана, особенно проявлялся в том, что покойный умел задавать вопросы. К проблемам ПВЦ он подходил критически, но ведь скептицизм — сердце науки. И едва стало понятно, что наконец со звезд получено Послание, Драмлин обратился к его исследованию с рвением и пылом истинного ученого.</p><p class="p1">Заместитель министра обороны, Майкл Китц, от имени президента подчеркнул личные достоинства покойного: душевную теплоту, заботу о людях, блестящий интеллект и выдающиеся атлетические способности. И если бы не трагическая и подлая диверсия, Драмлин вошел бы в историю в качестве первого американца, отправившегося к звездам.</p><p class="p1">Элли предупредила дер Хиира, чтобы ее не включали в список выступающих. И никаких интервью, разве что несколько фотографий — необходимость этого она понимала. Она просто не верила, что сумеет сказать все правильно, хотя и умела выступать перед большой аудиторией, ведь столько лет она делала доклады и о ПВЦ, и об «Аргусе», а потом о Послании и Машине. Но сейчас было иначе. Все это следовало еще пережить.</p><p class="p1">Ей было ясно, что Драмлин погиб, спасая ее жизнь. Он успел заметить неладное раньше других, и рефлексы спортсмена позволили ему оттолкнуть Элли назад за стойку, едва он заметил падающую на них сверху эрбиевую деталь массой в несколько сотен килограммов.</p><p class="p1">Дер Хиир, которому она рассказала о своем предположении, возразил:</p><p class="p1">— Ну знаешь, скорее всего Драмлин хотел спасти собственную шкуру, а ты просто оказалась у него на пути. — В голосе Кена явно слышалась преднамеренная неблагодарность. — Или же, — продолжил дер Хиир, ощутив ее недовольство, — возможно, Драмлина подбросило в воздух, когда эрбиевая деталь ударила о помост.</p><p class="p1">Но Элли была абсолютно уверена. Она же видела все собственными глазами. Драмлин хотел спасти ее жизнь. И спас. За исключением нескольких царапин, Элли не получила практически никаких повреждений. Прикрытому стенкой Валериану обрушившаяся перегородка переломила обе ноги. Ей повезло и в остальном: она даже не потеряла сознания.</p><p class="p1">Но первая ее мысль — едва она поняла, что произошло, — была не скорбь о своем учителе, Дэвиде Драмлине, раздавленном у нее на глазах, не удивление, не благодарность — ведь Драмлин отдал за нее жизнь, — и не беспокойство о недостроенной Машине. Колоссальным звоном в голове отдавались слова: <em>«Теперь лечу я, теперь им придется послать меня, больше некого, я лечу!»</em></p><p class="p1">Она мгновенно осадила себя, но слишком поздно. Эгоизм и самовлюбленность, неуместные в столь трагический миг, поразили ее. Неважно, что Драмлин иногда вел себя не лучшим образом. Элли с ужасом поняла, пусть и на мгновение, что в ее душе — только суета, планы, работа и никого, кроме себя самой. Но хуже всего было то, что весь этот эгоизм уже не осознавался, она ощутила отвращение к себе. Ее эго не чувствовало за собой вины — только хотело пользоваться правами… Это было ужасно. Элли понимала, что вырвать с корнями подобный жуткий эгоизм не удастся. Придется потрудиться над собой, решила она, пристыдить, даже припугнуть.</p><p class="p1">Когда явились следователи, она не была расположена к разговорам.</p><p class="p1">— Боюсь, я не смогу вам сообщить много. Мы шли втроем, и вдруг произошел взрыв… все взлетело на воздух. Сожалею, я не сумею помочь вам. Право, мне бы очень хотелось.</p><p class="p1">Коллегам Элли сказала, что не желает даже разговаривать о случившемся, и надолго заперлась в собственной квартире; им пришлось послать целый отряд разведчиков, чтобы узнать о ее самочувствии. Она пыталась припомнить каждый нюанс: содержание разговора перед тем, как они вошли в сборочный цех; их беседу с Драмлином по пути в Мизулу и каким был Драмлин, когда она познакомилась с ним в самом начале научной карьеры. Постепенно она поняла, что некоторой своей частичной, не осознавая того, желала Драмлину смерти… еще до этого соперничества за место в экипаже. Она ненавидела Драмлина за то, что он унижал ее перед другими студентами, за его борьбу против «Аргуса»… и за те слова, которые он произнес, увидев изображение Гитлера. Она хотела его смерти. И он <em>умер</em>. Так что в известной мере она считала себя виновной в его смерти, хотя в целом эта мысль казалась ей неискренней и притянутой за уши.</p><p class="p1">А попал бы он сюда, не будь ее на свете? Конечно. Послание все равно обнаружили бы, и Драмлин не смог бы оставаться в стороне. Да, так. Но стал бы Драмлин глубоко интересоваться Машиной, если бы не… ее научная беззаботность? Шаг за шагом перебирала она все возможности. Неприятные старалась обдумать тщательнее: за ними что-то таилось. Элли вспомнила о мужчинах, которые по тем или иным причинам восхищали ее. Драмлин, Валериан, дер Хиир, Хадден… Джосс, Джесси… Стогтон?.. Ее отец.</p><p class="p1">— Доктор Эрроуэй?</p><p class="p1">Размышления Элли, пожалуй к ее собственному удовольствию, нарушила плотная блондинка средних лет в платье с голубым узором. Опознавательный ярлычок на обширной груди гласил: «Х.Борк. Гетеборг».</p><p class="p1">— Доктор Эрроуэй, у вас… у нас такая потеря. Дэвид мне рассказывал о вас.</p><p class="p1">Конечно же! Легендарная Хельга Борк, напарница Драмлина в подводных экскурсиях, которую не одно поколение учеников Драмлина знало по диапозитивам. Кто же, впервые подумала Элли, фотографировал их? Какой фотограф сопровождал эту парочку на подводные свидания?</p><p class="p1">— Он говорил мне, что вы были очень близки…</p><p class="p1">Что она хочет этим сказать? Или же Драмлин и ей успел наговорить всякого?.. На глазах Элли выступили слезы.</p><p class="p1">— Извините, доктор Борк, я себя еще не очень хорошо чувствую.</p><p class="p1">Опустив голову, Элли поспешно отошла в сторону.</p><p class="p1">На похороны прибыли многие из тех, с кем ей хотелось бы повстречаться: ВГ, Архангельский, Готридзе, Баруда, Юй, Си, Деви. И Абоннема Эда, в котором все чаще видели пятого члена экипажа — если у представителей участвующих стран хватит ума поддержать его кандидатуру, думала она, и если эту Машину суждено наконец построить. Взрыв разнес в клочья ее выносливость, на долгие собрания и речи не было сил. Она не хотела выступать, потому что не знала, в какой мере ее слова могут послужить благу проекта, а не собственным амбициям. Все вокруг выражали сочувствие и понимание. В конце концов именно она оказалась ближе всех к Драмлину, когда эрбиевая шпонка расплющила его тело.</p></span></span>
