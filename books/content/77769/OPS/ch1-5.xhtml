<span><span><p class="p1">Слева проплывали 256 изображений левого мира, столько же изображений правого мира проплывали справа. Все 512 картинок сливались в панорамное изображение. Она была в чаще. Вокруг раскачивались огромные травины, одни зеленые, другие бурые, они уходили куда-то ввысь, но она без труда поднималась по толстым стеблям и опускалась на землю лишь изредка. Теряя равновесие на согнутой травине, она перебиралась на упругие горизонтальные листья, придерживаясь выбранного пути. Она могла бы сказать, что вся отдалась пути, так манил он своей новизной. Она и думать не думала о том, что впереди может оказаться непреодолимое препятствие. Крючья и веревки были не нужны, всем необходимым она располагала. Почва впереди была пропитана запахом химического маркера, оставленного недавно кем-то из разведчиков ее семьи. Тропа приведет к пище… так было почти всегда. Пища появится сама собой — это разведчики находят ее и помечают. Иногда пищей были создания, обликом напоминавшие ее, иногда кристаллики, бесформенные крошки. Когда добыча была велика, собратья, объединяя усилия, тащили ее домой. Она предвкушала удовольствие.</p><p class="p1">— Лично меня более всего смущает, — продолжала Элли, — то, что <em>они</em> не пытаются с нами связаться. Они, конечно, способны на это, но не занимаются межзвездной связью — не потому ли, что не видят в ней никакого смысла? Словно… — она поглядела вниз на край салфетки, разложенной на траве, — словно мы для них муравьи. Смотрите — они наши соседи. У них бездна хлопот. На собственном уровне они прекрасно овладели средой. Но мы не пытаемся с ними связаться. И я не думаю, чтобы у них могло появиться хотя бы смутное представление о нашем существовании.</p><p class="p1">Крупный муравей оказался на салфетке и торопливо бежал вперед, вдоль диагонали одного из красно-белых квадратов. С легкой брезгливостью Элли торопливо сбросила его в траву… где ему и надлежало быть.</p></span></span>
