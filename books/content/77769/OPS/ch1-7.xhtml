<span><span id="id5"><div class="title2">
<p class="p">4. Простые числа</p>
</div><div class="epigraph">
<p class="p1">Что же, на Луне нет моравских братьев, и ни один миссионер так и не посетит нашу бедную языческую планету, чтобы цивилизовать ее цивилизацию, чтобы сделать христианским ее христианство?</p>
<p class="text-author">Герман Мелвилл. «Белый бушлат»</p>
</div><div class="epigraph">
<p class="p1">Величье — только в молчании; все прочее — слабость.</p>
<p class="text-author">Альфред де Виньи. «Смерть волка»</p>
</div><p class="p1">Холодный черный вакуум остался позади, импульсы уже приближались к ничем не выделяющейся карликовой желтой звезде, прокладывая свой путь среди миров ее сумеречной системы. Они мерцали у планет из газообразного водорода, проникали в недра ледяных лун. Пронзили органические облака, окутавшие холодный мир, на котором только еще зарождались отдаленные предшественники жизни, на лету миновали планету, давно пережившую пору расцвета. Плеснули о берега теплого мира, голубого и белого, медленно вращавшегося на черном усыпанном звездами поле.</p><p class="p1">Жизнь пышно цвела на этой планете, удивляя количеством и разнообразием форм. Даже на заледеневших вершинах высочайших гор этого мира прыгали пауки, а возле трещин, извергавших горячую воду, у подножий океанских хребтов копошились питающиеся серой черви. Планета породила существа, что могли жить только в концентрированной серной кислоте, и такие, что мгновенно в ней гибли; породила создания, для которых кислород — яд, и бесчисленные организмы, не способные существовать без этого живительного газа.</p><p class="p1">Не столь давно по всей этой планете распространился некий вид разумных существ. Теперь их можно было встретить и на дне океана, и на низких орбитах. Они так и кишели в каждом уголке и, складке этого крохотного мирка. Линия утра, разделяющая ночь и день, перемещалась на запад, и, следуя за ней, миллионы таких существ приступали к своим утренним ритуалам. Одевали свои пиджаки или дхоти<a href="ch2.xhtml#id46" class="a">[4]</a>, выпивали настой чая, кофе или одуванчика, садились на велосипед, автомобиль или в повозку, влекомую быками, и отдавали некоторое время пахоте, учебе… или судьбам планеты.</p><p class="p1">Первые импульсы цуга радиоволн пронзили атмосферу и облака и, попав на твердую поверхность, частично отразились обратно в космос. Земля поворачивалась, налетали следующие импульсы, они обволакивали не только саму планету, но и всю Солнечную систему. Лишь малая доля этой энергии поглощалась ее мирами. Большая часть все стремилась вперед за желтую звезду, совершенно не в ту сторону, куда летела она, — в кромешную тьму.</p><p class="p1">Начиналась вечерняя пересменка. Дежурный наблюдатель в дакроновой куртке со словом «Мародеры» над стилизованным вельветовым волейбольным мячом входил в контрольное помещение. Небольшая группа радиоастрономов как раз отправлялась обедать.</p><p class="p1">— Ну, ребята, и сколько же лет мы ищем зелененьких человечков? Уже больше пяти, а, Вилли?</p><p class="p1">Говорили они добродушно, но в смешках чувствовалось раздражение.</p><p class="p1">— Пора сделать перерыв, Вилли, — добавил один из них. — Все снимают густые сливки на измерениях светимости квазаров. А у нас дело затянется до бесконечности, если нам будут оставлять только два процента времени для наблюдений.</p><p class="p1">— Конечно. Ты прав, Джек.</p><p class="p1">— Вилли, мы заглядываем во времена рождения Вселенной. И наша программа тоже сулит многое… Мы-то <em>знаем</em>, что Вселенная существует, но ты едва ли можешь поручиться, что в ней найдется хоть один зеленый человечек.</p><p class="p1">— С подобными вопросами обращайтесь к доктору Эрроуэй. Она охотно выслушает ваше мнение, — несколько кислом тоном отвечал тот.</p><p class="p1">Дежурный вошел в помещение. Быстро оглядел дюжину телевизионных экранов с результатами измерений. Только что закончили прослушивать созвездие Геркулеса. Они заглянули в самое сердце великого роя галактик за пределами Млечного Пути, скопления Геркулеса, удаленного от Земли на сто миллионов световых лет; прослушали М—13, рой примерно из трехсот тысяч звезд (если не учитывать гравитационно-двойные), обращающийся вокруг галактики Млечного Пути в 26 тысячах световых лет от нас; изучили Рас Альгети, двойную звезду, а еще Дзета и Лямбда Геркулеса — звезды, отличающиеся от Солнца и похожие на него, но находящиеся неподалеку. Звезды, которые мы видим невооруженным взглядом, удалены от нас не более чем на несколько сотен световых лет. Они тщательно просмотрели сотни небольших секторов неба в созвездии Геркулеса на миллионе различных частот и не услышали ничего. В минувшие годы они изучали созвездия, лежащие к западу от Геркулеса: Змеи, Северной Короны, Волопаса, Гончих Псов… но и там ничего не услышали.</p><p class="p1">Несколько телескопов, как мог видеть дежурный, добирали какие-то пропущенные данные в Геркулесе. Остальные целились в прилежащий участок неба, в следующее созвездие к востоку от Геркулеса. Несколько тысяч лет назад жителям восточного Средиземноморья показалось, что оно напоминает струнный музыкальный инструмент, его связывали с греческим мифологическим героем Орфеем. Созвездие называли Лирой… Лира.</p><p class="p1">Компьютеры повернули телескопы, чтобы следить за звездами Лиры от восхода до заката. Теперь они будут накапливать радиокванты, управлять поведением телескопов, представлять результаты человеку в удобном для осмысления виде. Даже <em>один</em> дежурный в сущности был излишеством. Последовательно миновав банку с конфетами, кофеварку, записанное рунами эльфов изречение Толкиена на распечатке из Станфордской лаборатории искусственного интеллекта и наклейку на бампер со словами «ЧЕРНЫХ ДЫР НЕ ВИДАТЬ», Вилли подошел к пульту управления. Он мило кивнул дежурному дневной смены, собравшему бумаги, чтобы отправиться на обед. Поскольку результаты измерений этого дня светились янтарем на главном экране, необходимости задавать вопросы Вилли не ощущал.</p><p class="p1">— Сам видишь, ничего особенного. Был какой-то проблеск… по крайней мере похоже было… на сорок девятом, — сказал он, махнув куда-то в сторону окон. — Бригада специалистов по квазарам освободила десятые и двадцатые около часа назад. Кажется, у них очень интересные данные.</p><p class="p1">— Да, слыхал. Они не понимают…</p><p class="p1">Вдруг его голос затих, на пульте ярко замигал сигнал тревоги. На дисплее под надписью «Зависимость интенсивности от частоты» возник резкий вертикальный пик.</p><p class="p1">— Ну-ка, похоже на монохроматический сигнал!</p><p class="p1">На другом экране с надписью «Зависимость интенсивности от времени» слева направо за пределы экрана шествовала цепочка импульсов.</p><p class="p1">— Числа, — слабо промолвил Вилли. — Кто-то передает числа.</p><p class="p1">— Быть может, кто-то из ВВС. Где-то в районе 16-й сотни часов<a href="ch2.xhtml#id45" class="a">[5]</a> я заметил самолет дальнего обнаружения, наверное, из Киртленда. Забавляются ребята.</p><p class="p1">При всеобщем безмолвном согласии ряд радиочастот был зарезервирован для радиоастрономии. Но именно потому, что они представляли собой свободный канал, военные просто не могли удержаться от искушения. Если бы дело дошло до всеобщей войны, первыми о ее начале узнали бы именно радиоастрономы. В радиоокна, открытые в космос, повалили бы приказы боевым и наблюдательным спутникам на геосинхронных орбитах, трансляции кодовых распоряжений на удаленные аванпосты. Однако и без военных передач, прослушивая сразу миллион диапазонов, приходилось быть готовым к помехам. Молнии, зажигание в двигателях автомобилей, передающие спутники — все порождало радиопомехи. Но в компьютеры были заложены все их параметры, и при обработке данных такими помехами пренебрегали, сомнительные сигналы компьютер выслушивал с большим вниманием, проверяя на соответствие заложенным в память параметрам. Время от времени в порядке разминки над ними пролетали самолеты электронной разведки с радарной установкой, кокетливо замаскированной под летающее блюдце, тогда радиотелескопы «Аргуса» мгновенно обнаруживали несомненные признаки разумной жизни. Впрочем, эта жизнь всегда принадлежала к вполне определенной разновидности, наводящей на грустные размышления. Она действительно была в известной мере разумной, но только чуточку внеземной. Несколько месяцев назад самолет F—29E с современными установками электронного противодействия пролетел в 80.000 футах над обсерваторией и вызвал тревогу на всех телескопах. С точки зрения штатских астрономов, радиосигналы были достаточно сложны и могли принадлежать внеземной цивилизации. Но потом они обнаружили, что самый западный телескоп принял радиоволны минутой раньше восточного, и стало ясно, что их породил объект, перемещающийся в окутывающем Землю тонком покрывале атмосферы, а не какая-то невообразимо чужая цивилизация из космических глубин. Наверное, история повторяется.</p><p class="p1">Пальцы правой руки Элли были вставлены в пять равномерно расположенных гнезд в невысоком ящичке, находящемся на столе перед нею. Изобретение экономило полчаса в неделю. Но большой необходимости в нем не было, поскольку тратить эту половину часа все равно было не на что.</p><p class="p1">— Я рассказала обо всем миссис Ярборо. Ее кровать теперь рядом с моей, после того как от нас ушла миссис Вертхеймер. Не хочу зазнаваться, но в твоих успехах есть и моя доля.</p><p class="p1">— Да, мама.</p><p class="p1">Элли поглядела на ногти и по их блеску решила, что необходима еще минута, может быть, полторы.</p><p class="p1">— Я вспомнила тот день, когда ты была в четвертом классе. Помнишь, с утра все лил дождь и ты не хотела идти в школу? Ты просила, чтобы на следующий день я написала записку в школу, что ты не могла выйти в тот день, потому что прихворнула. А я не согласилась и сказала тебе: «Элли, на свете после красоты самое важное — образование. Красива ты или нет — зависит не от тебя, но знания — дело твоих собственных рук. Иди в школу. Откуда знать, что ты услышишь там сегодня?» Разве я была не права?</p><p class="p1">— Да, мама.</p><p class="p1">— Именно так я тебе и сказала тогда.</p><p class="p1">Четыре ногтя уже великолепно блестели, но большой еще оставался немного матовым.</p><p class="p1">— И я принесла тебе галоши и желтый плащ, тот блестящий, ты в нем была настоящим бутончиком, и прогнала тебя в школу. Это было в тот день, когда на уроке математики ты не сумела ответить на вопрос мистера Вейсброда. После чего ты разозлилась, отправилась в библиотеку колледжа и читала, читала, пока не узнала больше мистера Вейсброда. На него это произвело впечатление. Он говорил мне об этом.</p><p class="p1">— Он тебе говорил? Я не знала. А когда ты разговаривала с мистером Вейсбродом?</p><p class="p1">— На родительском собрании. Он сказал мне: «А у вас растет дерзкая девчонка». Или что-то в этом роде. «Она так разозлилась на меня, что действительно разобралась в этом вопросе». «Действительно разобралась». Так он и сказал. Я же говорила тебе об этом.</p><p class="p1">Ноги Элли покоились на ящике стола, она откинулась назад во вращающемся кресле, удерживая равновесие лишь кончиками пальцев, вставленных в лакировочную машину.</p><p class="p1">— Мам, мне надо идти.</p><p class="p1">— Я <em>уверена</em>, что все тебе уже рассказывала. Ты просто никогда не слушаешь меня. А мистер Вейсброд был чудесным человеком. Ты просто тогда не могла разглядеть его с лучшей стороны.</p><p class="p1">— Мам, меня действительно вызывают. Мы поймали какой-то призрак.</p><p class="p1">— Призрак?</p><p class="p1">— Ну, мам, что-то вроде сигнала. Я тебе говорила.</p><p class="p1">— Таковы мы обе: вечно одна не слушает другую.</p><p class="p1">— Пока, мам.</p><p class="p1">— Хорошо, только потом перезвони.</p><p class="p1">— Хорошо, мам, обещаю.</p><p class="p1">Во время всего разговора одиночество матери и потребность ее в собеседнике вызывали у Элли желание побыстрее закончить разговор… убежать. Она ненавидела себя за это.</p><p class="p1">Элли торопливо вошла в зал управления и приблизилась к главному пульту.</p><p class="p1">— Вилли, Стив, привет. Посмотрим. Хорошо. А куда вы затолкали график амплитуд? Хорошо. А интерферометрическое положение определили? О'кей. Теперь посмотрим, есть ли там какая-нибудь звезда. Боже мой, да мы нацелились прямо на Вегу. Ближняя соседка.</p><p class="p1">Элли говорила, а ее пальцы сновали по клавиатуре.</p><p class="p1">— Так, звезда всего в 26 световых годах от нас. Ее не раз уже прослушивали, только всегда безрезультатно. Я сама изучала ее в первый год работы на Аресибо. Какая абсолютная интенсивность сигнала? Боже. Сотни янских<a href="ch2.xhtml#id44" class="a">[6]</a>. Да его можно принимать в среднечастотном диапазоне на домашний приемник.</p><p class="p1">— О'кей. Итак, имеем призрак, расположенный на небе неподалеку от Веги. Частота около 9,2 гигагерц, сигнал близок к монохроматическому. Сигнал линейно поляризован и состоит из двух наборов импульсов, различающихся по амплитуде.</p><p class="p1">В ответ на набранные команды компьютер показывал теперь ориентацию всех радиотелескопов.</p><p class="p1">— Сигнал принимают 116 радиотелескопов. Определенно он не является результатом неисправности одного или двух из них. О'кей, займемся временной базой. Смещается ли источник относительно звезд? Может быть, это спутник или самолет электронной разведки?</p><p class="p1">— Могу подтвердить величину сидериального<a href="ch2.xhtml#id43" class="a">[7]</a> перемещения, доктор Эрроуэй.</p><p class="p1">— О'кей, весьма убедительно. Значит, источник сигнала не на Земле и не на орбите «Молнии», последнее придется проверить. Вилли, попробуй связаться с НОРАД<a href="ch2.xhtml#id41" class="a">[8]</a>, интересно, что скажут они… нет ли над нами спутника. Если его нет, останутся две возможности: или это подделка, или кто-то действительно передает нам сообщение. Стив, запиши сигнал вручную несколькими радиотелескопами по отдельности — сигнал достаточно сильный для этого — и проверь возможность фальсификации: что, если какой-то шутник решил доказать вздорность наших занятий?</p><p class="p1">Вокруг главного пульта собралась горстка ученых, инженеров и техников, сбежавшихся по сигналу тревоги, поданному компьютером «Аргуса». На лицах блуждали улыбки. Никто не мог еще всерьез воспринять сам факт передачи сообщения из космоса, но вокруг царило возбуждение школьников, узнавших об отмене урока; наступал многообещающий перерыв в общей скукоте, к которой все уже успели привыкнуть…</p><p class="p1">— Если кто-нибудь может привести иное объяснение, кроме внеземного сигнала, я хочу слышать его мнение, — произнесла Элли, признавая присутствие собравшихся закономерным.</p><p class="p1">— Разве этот сигнал может идти от Веги, доктор Эрроуэй? Ее системе лишь несколько сотен миллионов лет. Планеты находятся в стадии формирования. Разумная жизнь там просто не могла так быстро возникнуть. Источник скорее всего проецируется на этот участок, это какая-то фоновая звезда… или галактика.</p><p class="p1">— В таком случае мощность передатчика становится невероятно огромной, — возразил один из специалистов по квазарам, вернувшийся, чтобы посмотреть, что происходит. — Надо провести точные измерения собственного смещения радиоисточника, проверить, следует ли он за Вегой.</p><p class="p1">— Ты прав, Джек, это нужно сделать, — сказала Элли. — Но есть еще одна возможность. Быть может, не Вега породила их, просто они к ней прилетели.</p><p class="p1">— Ничуть не лучшее предположение. Вокруг этой звезды полным-полно всякого мусора. Планетная система или еще не сформировалась, или же пока находится на ранней стадии развития. Стоит покрутиться там подольше, и в корабль что-нибудь да угодит.</p><p class="p1">— Ну значит, они только что прилетели. А может быть, умеют испарять подлетающие метеориты. Или менять орбиту, когда крупный камень подлетает по чреватой столкновением траектории. И, может быть, они просто летают не в плоскости кольца, а по полярной орбите. Возможностей — миллион. Но ты совершенно прав. Зачем гадать, где располагается источник, если мы можем легко определить это. Сколько времени потребуется на определение собственного движения? Кстати, Стив, твоя смена закончилась. По крайней мере предупреди Консуэлу, что опоздаешь к обеду.</p><p class="p1">На лице Вилли, только что говорившего по телефону около соседнего пульта, блуждала отсутствующая улыбка.</p><p class="p1">— Вот что, я пробился к майору Брейнтри из НОРАД. Он клянется всеми святыми, что в небе нет ничего, что может дать подобный сигнал, тем более на девяти гигагерцах. Конечно, они всегда так отвечают на любые запросы. Во всяком случае, он утверждает, что ни одного космического аппарата с прямым восхождением и склонением, соответствующими положению Веги, они не обнаруживали.</p><p class="p1">— А как насчет «темных»?</p><p class="p1">К этому времени в космосе накопилось уже достаточно «темных» спутников, имевших умеренный радиопоперечник и почти не заметных для радаров; до поры незаметные и неслышные, они кружили вокруг Земли без всякого шума. И только если случится ядерная война, если вдруг выйдут из строя штатные спутники, предназначенные для подобных целей, в небе появятся дублеры спутников обнаружения запусков ракет или связи… Изредка один из «темных» оказывался в поле зрения больших астрономических радаров. Тогда все страны единодушно принимались отказываться от объекта, а астрономы с трепетом приступали к обсуждению… неужели и впрямь на земную орбиту залетел корабль инопланетян? Приближалось новое тысячелетие, и культ НЛО расцветал пышным цветом.</p><p class="p1">— Интерферометрия свидетельствует против принадлежности сигнала аппаратам типа «Молния», доктор Эрроуэй.</p><p class="p1">— Дело идет все лучше и лучше. Теперь глянем повнимательнее на эти «марширующие» импульсы. Если это двоичная система, никто не пересчитал, что будет в десятичной? Что это за последовательность чисел, а? Хорошо, прикинем в уме… 59, 61, 67, 71… Но ведь это простые числа?</p><p class="p1">Легкий ропот удивления обежал пультовую. На миг нечто затаенное промелькнуло и на лице Элли, но выражение это быстро сменилось трезвым расчетом — опасением… ведь так легко увлечься, забыться, потерять лицо перед подчиненными.</p><p class="p1">— Хорошо, проверим интерпретацию результатов. Сделаем это простейшим способом. Будьте добры, проверьте, не упускаю ли я чего-нибудь. Имеем очень сильный, почти монохроматический сигнал. Вне границ диапазона не слышно ничего, кроме белого шума. Он имеет линейную поляризацию, словно его передавали радиотелескопом. Частота сигнала около девяти мегагерц, она близка к частотам, соответствующим минимуму галактического фона. Такими частотами целесообразно пользоваться, если хочешь, чтобы тебя услышали на большом расстоянии. Мы измерили сидериальное движение источника, он движется так, словно находится среди звезд, а не исходит от какого-то близкого радиопередатчика. НОРАД не знает таких спутников — ни наших, ни чужих, — что отвечали бы положению источника… интерферометрия позволяет исключить возможность передач с околоземной орбиты. Стив проверил данные в ручном режиме, результаты проверки свидетельствуют, что можно исключить и программную ошибку, которую некто с извращенным чувством юмора мог бы ввести в компьютер. В изучаемой области неба находится Вега, карликовая звезда главной последовательности класса А-нуль. Она немного похожа на Солнце, находится в 26 световых годах от нас и окружена протопланетным облаком. Есть ли у нее планеты, нам неизвестно, но вокруг Веги могут обращаться любые спутники. Сейчас мы проводим измерения собственного движения источника, чтобы определить, не расположен ли он за Вегой. Через несколько недель, если полагаться на собственные силы, или несколько часов, если удастся организовать интерферометрические измерения с большой базой, мы узнаем ответ. Наконец, мы как будто бы принимаем длинную последовательность простых чисел, которые, как известно, делятся без остатка лишь на единицу и на себя. Ни один астрофизический процесс не в силах породить последовательность простых чисел, и поэтому я могу утверждать… следует, конечно, соблюдать осторожность… но я все же скажу, что по всем имеющимся у нас критериям ситуация похожа на долгожданный сигнал. Странно, что сообщение послано с планеты, обращающейся вокруг Веги, тогда этим ребятам пришлось эволюционировать невероятно быстро. Ведь самой звезде всего лишь около четырехсот миллионов лет. Несколько неожиданное место для ближайшей цивилизации. Поэтому крайне важны результаты измерения собственного перемещения источника. Но я бы хотела еще раз убедиться в невозможности фальсификации.</p><p class="p1">— Ну-ка, — начал один из державшихся на втором плане специалистов по квазарам. Он кивнул головой на запад — розовое свечение точно указывало на место, где Солнце только что опустилось за горизонт. — Через пару часов Вега сядет. В Австралии она, кажется, уже взошла. Не позвонить ли нам побыстрее в Сидней, чтобы они понаблюдали за ней одновременно с нами, пока здесь Вега еще не села?</p><p class="p1">— Хорошая идея. Там еще только близится вечер. При такой базе совместные измерения дадут хорошую точность. Дайте мне полную распечатку, и я отправлю ее телефаксом в Сидней из моего кабинета.</p><p class="p1">Решительная и деловая Элли оставила сгрудившихся вокруг пультов сотрудников и вернулась в свой кабинет. Дверь за собой прикрыла весьма тщательно.</p><p class="p1">— Боже мой, Боже! — прошептала она.</p><p class="p1">— Будьте добры, Яна Бродерика. Да. Это Элинор Эрроуэй из обсерватории «Аргус». Очень важно. Благодарю, я подожду… Хелло, Ян! Быть может, все окажется вздором, но у нас здесь пошел призрак, мы бы хотели, чтобы вы проверили его вместе с нами. Частота около девяти мегагерц, ширина полосы несколько сотен герц… параметры передаю по телефаксу… У вас уже все готово к работе на этой частоте? Удачно… Да, Вега прямо в самой серединке. Мы сейчас принимаем нечто вроде последовательности простых чисел… на самом деле. О'кей, я подожду.</p><p class="p1">Она вновь подумала, насколько же захолустен еще мирок радиоастрономического сообщества. Общая компьютерная база данных еще не создана, а ведь только для асинхронной телесвязи…</p><p class="p1">— Послушайте, Ян, когда развернете телескоп, взгляните, пожалуйста, на зависимость амплитуды от времени. Назовем импульсы малой амплитуды точками, а большой — тире… Получаем… да-да, эту же картину мы наблюдаем уже полчаса… Может быть, ничего более достоверного нам не попадалось за все пять лет… Конечно, я не забыла дурацкий промах русских в 1974 году со спутником «Биг Бэрд». Да, как я понимаю, тогда США проводили альтиметрическое картографирование Советского Союза для наведения крылатых ракет… Да-да, картографирование. А русские принимали сигналы этого спутника ненаправленными антеннами. Они не могли даже понять, откуда исходит сигнал. Им было только известно, что ранним утром в определенное время регистрируется одна и та же последовательность сигналов. Их разведывательные службы уверяли, что Америка здесь ни при чем, и они решили, что виной тому инопланетяне… Нет, конечно, мы уже исключили возможность подобной ошибки. Ян, можно попросить вас проследить за объектом, пока он на вашем небе? Проблемы интерферометрии обсудим позже. Я хочу попросить о том же другие радиообсерватории, благо по долготе они распределены равномерно… Да, но я не знаю, легко ли дозвониться в Китай. Я хочу послать телеграмму Международного астрономического союза… Отлично. Весьма благодарна, Ян.</p><p class="p1">Элли замерла в дверях зала управления — в этом названии была некоторая ирония, поскольку всем управлял компьютер, расположенный в другой комнате, — и невольно восхитилась крохотной группой ученых, оживленно переговаривающихся, пересмеивающихся, изучающих на дисплеях природу сигнала. Ну стиля в них нет, подумала Элли. По обычным понятиям они даже не слишком хорошо выглядят. Но было в них нечто безошибочно привлекательное. Они были великолепны за своим делом и, совершая открытие, полностью отдавались работе. Заметив ее, коллеги умолкли, выжидательно поглядывая в ее сторону. Теперь числа из двоичной системы в десятичную преобразовывались автоматически… 881, 883, 887, 907… знакомые простые числа.</p><p class="p1">— Вилли, раздобудьте карту мира. И свяжите меня с Марком Ауэрбахом в Кембридже, штат Массачусетс. Он, наверное, будет дома. Отправьте ему это сообщение телеграммой Астрономического союза для рассылки во все обсерватории мира, но в первую очередь во все крупные радиообсерватории. И проверьте, не уточнит ли он имеющийся у нас телефонный номер Пекинской радиообсерватории… А потом свяжите меня с советником президента по науке.</p><p class="p1">— Вы собираетесь обойти Национальный научный фонд?</p><p class="p1">— После Ауэрбаха я прошу связать меня с советником президента.</p><p class="p1">В разноголосице, наполнявшей ее ум, уже слышались радостные тона.</p><p class="p1">Телефоны, велосипеды, грузовики, пешие почтальоны разнесли этот крохотный абзац в астрономические центры всего мира. В большие радиообсерватории Китая, Индии, Советского Союза, Голландии текст сообщения был отправлен телетайпом. Когда выключалось печатающее устройство, офицер безопасности или оказавшийся рядом астроном пробегал текст глазами, отрывал от барабана и, не скрывая любопытства, нес в соседнюю комнату. Вот что гласило это сообщение:</p><p class="p1">«АНОМАЛЬНЫЙ ИСТОЧНИК РАДИОИМПУЛЬСОВ С ПРЯМЫМ ВОСХОЖДЕНИЕМ 18 ЧАСОВ 34 МИНУТЫ, СКЛОНЕНИЕМ ПЛЮС 38 ГРАДУСОВ 41 МИНУТА ОБНАРУЖЕН ПРИ СИСТЕМАТИЧЕСКОМ ПРОСМОТРЕ НЕБА ОБСЕРВАТОРИЕЙ „АРГУС“. ЧАСТОТА СИГНАЛА 9,24176684 ГИГАГЕРЦ, ШИРИНА ПРИМЕРНО 430 ГЕРЦ. РАСПРЕДЕЛЕНИЕ АМПЛИТУД БИМОДАЛЬНО — ПРИМЕРНО 174 И 179 ЯНСКИХ. С ПОМОЩЬЮ АМПЛИТУД ЗАКОДИРОВАНА ПОСЛЕДОВАТЕЛЬНОСТЬ ПРОСТЫХ ЧИСЕЛ. СРОЧНО НЕОБХОДИМО ПОЛНОЕ ПОКРЫТИЕ ПО ДОЛГОТЕ. ПРОСЬБА ОБРАЩАТЬСЯ ЗА ИНФОРМАЦИЕЙ ДЛЯ КООРДИНАЦИИ НАБЛЮДЕНИЙ.</p><p class="p1">Э.ЭРРОУЭЙ. ДИРЕКТОР ОБСЕРВАТОРИИ «АРГУС»</p><p class="p1">СОКОРРО, НЬЮ-МЕКСИКО, США».</p></span></span>
