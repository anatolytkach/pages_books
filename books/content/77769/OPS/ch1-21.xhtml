<span><span id="id19"><div class="title3">
<p class="p">17. Сон муравьев</p>
</div><div class="epigraph">
<p class="p1">Звуки человеческой речи заставляют вспомнить надтреснутый горшок, на котором люди барабанят ритм медвежьих плясок, хотя мечтали музыкой своей плавить звезды.</p>
<p class="text-author">Гюстав Флобер. «Мадам Бовари»</p>
</div><div class="epigraph">
<p class="p1">Популярная теология… это просто нагромождение порожденных невежеством противоречий… Боги существуют потому, что природа сама впечатала представление о них в разум людей.</p>
<p class="text-author">Цицерон. «О природе богов», I, 16</p>
</div><p class="p1">Элли как раз паковала бумаги, магнитные ленты и пальмовую ветвь к отправке в Японию, когда ей сообщили, что у матери случился удар. Едва ли не сразу после этого курьер принес письмо. Оно было от Джона Стогтона и не содержало никаких вежливых прелюдий:</p><p class="p1">«Мы с матерью часто говорили о твоей ограниченности и недостатках. Этот разговор всегда был нелегким для нас. Когда я тебя защищал — а такое случалось часто, хотя ты, возможно, и не поверишь, — она заявляла, что я действую по твоей подсказке. Когда я осуждал тебя, она говорила, что это не мое дело.</p><p class="p1">Но я хочу, чтобы ты знала: твое постоянное нежелание видеть ее после того, как начались все эти дела с Вегой, всегда причиняло ей боль. Она вечно твердила своим старухам в этой ужасной богадельне, куда решила переселиться только по собственному желанию, что скоро ты навестишь ее. Годами твердила: «Скоро вот». И все представляла себе, как будет показывать всем свою знаменитую доченьку, в каком порядке будет знакомить тебя со всеми хворыми подругами.</p><p class="p1">Быть может, тебе неприятно это читать, я тоже без особой радости пишу об этом. Только чтобы ты поняла наконец. Ты причинила ей очень много боли, куда больше, чем все прочее в ее жизни, даже больше, чем смерть твоего отца. Возможно, ты стала теперь большой шишкой, и твой голографический портрет известен всему миру, и все политиканы так и вьются возле тебя, но как человек ты ничему не научилась после окончания высшей школы…»</p><p class="p1">Глаза Элли наполнились слезами, она стала комкать и письмо, и конверт, но нащупала в нем прямоугольник жесткой бумаги, полуголограмму, воссозданную компьютером по старой фотографии; оказалось, изображение можно разглядеть со всех сторон. Этого снимка она раньше не видела. Молодое милое лицо матери улыбалось… она положила руку на плечо отца, почему-то небритого. Оба так и светились счастьем. С досадой, гневом на Стогтона, ощущая собственную вину и легкую жалость к себе, Элли подумала, что, возможно, ей уже не суждено увидеть никого из запечатленных на этом снимке.</p><p class="p1">Ее мать неподвижно лежала в постели со странным безразличием на лице, не выражавшем ни радости, ни сожаления… лишь ожидание. Она могла только иногда моргать глазами. Слышит она Элли и понимает ли ее — понять было невозможно. Элли уже обдумывала схемы коммуникации и ничего не могла с собой поделать — мысли эти приходили в голову сами. Моргнула один раз — «да», два раза — «нет». Можно еще подсоединить энцефалограф, поставить его так, чтобы мать могла видеть экран и научить ее изменять бета-ритм. Но в кровати перед ней лежала ее <em>собственная мать</em>, а не Альфа Лиры. Ей нужно было сочувствие, а не алгоритмы.</p><p class="p1">И она держала мать за руку и говорила, говорила… часами. Элли вспомнила об отце и о своем детстве, про то, как крошкой ковыляла по улицам и родители возносили ее до небес. Говорила о Джоне Стогтоне, извинялась, просила прощения. Даже поплакала.</p><p class="p1">Волосы матери были перепутаны. Отыскав гребенку, Элли причесала ее. В чертах морщинистого лица она узнавала себя. Запавшие глаза, влажно поблескивая, неподвижно глядели в какую-то даль, моргая лишь изредка.</p><p class="p1">— Теперь я знаю, кто я родом, — тихо проговорила Элли.</p><p class="p1">Мать едва заметно повела головой из стороны в сторону, словно с горечью напоминая ей о долгих годах, проведенных без дочери. Элли слегка пожала старческую ладонь, и ей показалось, что она ощутила ответ.</p><p class="p1">Врачи сказали, что жизнь матери вне опасности. Если в ее состоянии произойдут какие-нибудь изменения, Элли дадут знать прямо в Вайоминг. Через несколько дней мать из больницы переведут обратно в дом престарелых, где, как уверяли, обслуживание будет не хуже.</p><p class="p1">Стогтон выглядел подавленным. Оказалось, что о глубине его чувств к матери Элли даже не догадывалась.</p><p class="p1">Строгую мраморную прихожую украшало, быть может, несколько неуместное здесь настоящее изваяние — не голограмма — нагой женщины, выполненное в стиле Праксителя. Она поднялась на лифте фирмы «Отис-Хитати» — надписи в нем были сдублированы на английском брайлевскими буквами — и оказалась в огромном зале, где люди толпились возле текстовых процессоров. Слова набирали знаками хираганы, японской фонетической азбуки, на экране появлялся соответствующий иероглиф китайского письма — канси. В памяти компьютера хранились сотни тысяч «букв»-идеограмм, но для чтения газеты было достаточно только трех-четырех тысяч иероглифов. Поскольку одно и то же слово можно было составить из разных по смыслу знаков канси, в порядке вероятности приводились и возможные переводы. Текстовой процессор имел контекстуальную подпрограмму, располагавшую возможные варианты в порядке убывания вероятности, определяемой по смыслу компьютером. Ошибался он редко. Текстовой процессор произвел настоящую революцию в коммуникационной сфере, ведь иероглифическая письменность еще недавно упорно сопротивлялась даже попыткам внедрения пишущей машинки. Успехи науки вовсе не радовали людей, сохранявших верность традициям.</p><p class="p1">В конференц-зале вокруг низкого лакированного стола располагались невысокие кресла — явная дань западным вкусам, и уже подали чай. Со своего места Элли видела за окном крыши Токио. Я слишком много времени провожу возле окон, подумала она. Газета называлась «Асахи Симбун» — «Утреннее солнце». Среди политических репортеров Элли с интересом обнаружила женщину — редкость с точки зрения американских и советских газет. Япония пересматривала роль женщины. Традиционные мужские привилегии медленно уступали женскому натиску. Улица за улицей, стенка за стенкой. Только вчера президент фирмы «Наноэлектроникс» жаловался ей, что во всем Токио не сыщешь девушки, способной правильно завязать оби<a href="ch2.xhtml#id35" class="a">[43]</a>. И как это было с галстуками-самовязами, рынок заполонили подделки. У женщин Японии теперь не хватало времени на долгое одевание. Репортер была в строгом деловом костюме с длинной до лодыжек юбкой.</p><p class="p1">В целях безопасности журналистов не допускали на Хоккайдо к Машине. Но когда члены экипажа или официальные лица оказывались на Хонсю, они обычно давали интервью журналистам Японии и прочих стран. Перечень вопросов сделался уже привычным. Репортеры планеты в общем одинаковым образом относились к Машине, не считая незначительных различий национального характера. Рада ли она, что, несмотря на «неудачи» в Америке и Советском Союзе, Машина достраивается в Японии? Не чувствует ли себя неуютно на суровом Хоккайдо? Не опасается ли за детали и узлы, прошедшие в Японии больший объем испытаний, чем предписывало Послание?</p><p class="p1">До 1945 года эта часть города принадлежала Императорскому флоту. Неподалеку виднелись два серебристых купола Военно-морской обсерватории, расположенные под ними телескопы до сих пор применялись для измерения времени и контроля календаря. Куполы сверкали на солнце.</p><p class="p1">Почему Машина состоит из додекаэдра и трех сферических оболочек, называемых бензелями? Конечно, репортеры понимают, что она не может знать этого, их просто интересует ее <em>собственное мнение</em>. Она ответила, что полное отсутствие фактов делает сомнительными любые суждения. Репортеры настаивали, и она посоветовала им быть терпеливыми перед лицом неведомого. Существует ли реальная угроза того, что пошлют роботов, а не людей, на чем недавно настаивал японский эксперт по искусственному интеллекту? Возьмет ли она с собой какой-нибудь талисман? Семейные фотоснимки? Микрокомпьютер? Финку?</p><p class="p1">Элли заметила, что на крыше из люка появились две фигуры. Их лица были спрятаны за забралами. Мужчины были облачены в сине-черные доспехи средневековых самураев. Взяв в руки длинные шесты, они, поклонившись друг другу, сразу же принялись наносить удары и отражать их… В течение получаса завороженная зрелищем Элли едва слышала обращенные к ней вопросы. Впрочем, никто и не обратил внимания на ее рассеянность. Дубинки, видимо, были тяжелыми: движения фехтовальщиков наконец сделались неторопливыми, как на морском дне.</p><p class="p1">Сколько лет она была знакома с докторами Луначарским и Сукхавати до приема Послания? А с доктором Эда? С мистером Си? Что она думает о них, об их достижениях? Как у всех пятерых складываются дела? Оставалось только радоваться, что она член так удачно подобранного экипажа.</p><p class="p1">Что она думает о качестве изготовленных в Японии деталей? А что может сообщить о встрече Пятерки с императором Акихито? Какие результаты принесли переговоры с главами синтоистской и буддийской общин… следует ли видеть в них только знак признательности к стране-хозяйке или же — новую попытку осмысления мировых религиозных истин? Как все-таки лично она считает — может ли Машина иметь отношение к Судному дню или окажется троянским конем? Элли старалась отвечать любезно, коротко и не ввязываться в споры. Сопровождавший ее представитель консорциума «Машина», отвечавший за контакты с прессой, казался довольным.</p><p class="p1">Наконец интервью закончилось. Главный редактор пожелал ей успехов от лица всех собравшихся и, выразив надежду получить интервью после возвращения, пригласил почаще гостить в Японии.</p><p class="p1">Хозяева кланялись и улыбались. Воины в доспехах нырнули в люк. Она видела своих охранников, переглядывавшихся за дверью конференц-зала. По пути к двери Элли спросила у женщины-репортера о привидениях, явившихся из средневековой Японии.</p><p class="p1">— Ах эти, — отвечала та. — Астрономы из береговой охраны. Они каждый день занимаются кендо в обеденный перерыв. По ним можно часы проверять.</p><p class="p1">Си родился в Великом походе и юношей воевал с Гоминьданом за революцию. Потом служил офицером разведки в Корее и постепенно стал одним из руководителей оборонной промышленности Китая. В годы Культурной революции был подвергнут публичным унижениям, приговорен к домашнему аресту, но в конце концов его с шумом реабилитировали.</p><p class="p1">Одним из преступлений Си против Культурной революции было преклонение перед древними конфуцианскими добродетелями, в частности он восхищался одним отрывком из «Великого учения», который уже многие столетия знал наизусть каждый сколько-нибудь образованный китаец. Именно этот отрывок, по собственному признанию. Сунь Ятсен<a href="ch2.xhtml#id33" class="a">[44]</a> положил в основу своего революционно-националистического движения в начале века:</p><p class="p1">«Древние, стремившиеся установить добродетель в Поднебесной, сперва устраивали собственные дела. А чтобы устроить собственные дела, они наводили порядок в семье. А чтобы навести порядок в семье, воспитывали в себе личность. А чтобы воспитать в себе личность, исправляли сердца. А чтобы исправить сердца, стремились к искренности в мыслях. А чтобы обрести искренность в мыслях, старались до предела расширить свои познания. И познания расширяли изучением вещей».</p><p class="p1">И Си был уверен, что основа будущего благополучия Китая кроется в познании. Красная гвардия считала иначе.</p><p class="p1">Во время Культурной революции Си был отправлен в провинцию Нинся, район с глубокими мусульманскими традициями, в бедное коллективное хозяйство неподалеку от Великой стены. Там, вспахивая заброшенное поле, он обнаружил искусно украшенный бронзовый шлем времен династии Хань. Возвратившись к кормилу власти, он позволил себе перевести взгляд со стратегических ракет на археологию. Культурная революция попыталась пресечь пятитысячелетнюю традицию китайской культуры. В ответ Си начал возводить мосты к прошлому и со все возрастающим увлечением принялся раскапывать подземные гробницы в окрестностях города Сиань.</p><p class="p1">Тогда-то и состоялось великое открытие. Они обнаружили терракотовую армию того самого императора, именем которого назван Китай. Звали его Цинь Ши-хуанди, но причуды транслитерации преобразили это имя на Западе в Чина. В III в. до н. э. Цинь объединил империю, построил Великую стену и милостиво повелел, чтобы после его смерти весь двор — слуги, воины и дворяне — последовали за ним в виде терракотовых копий, хотя, по старому обычаю, их должны были просто заживо похоронить вместе с императором. Армия терракотовых воинов составила 7500 человек, примерно дивизию. Лицо каждой скульптуры походило на портрет. Там были собраны люди со всего Китая. Император объединил множество прежде самостоятельных и склонных к раздорам провинций. В обнаруженной неподалеку гробнице нашли превосходно сохранившееся тело маркизы Таи, служившей в невысоком чине при дворе императора. Искусство консервации тел — лицо маркизы сохраняло строгое выражение, выработавшееся, наверное, от десятилетий управления слугами, — явно превосходило древнеегипетское.</p><p class="p1">Цинь упростил письмо, создал кодекс законов. Он строил дороги, воздвиг Великую стену, объединил страну. И у всех отобрал оружие. Его обвиняли в кровавой резне, которой он подверг критиковавших его политику ученых, и в умышленном сожжении книг возмутительного содержания; на это он возражал, что тем самым уничтожил гнездо растления и установил мир и порядок. Си усмотрел в этом сходство с Культурной революцией и попытался представить себе конфликт между противоречивыми стремлениями в сердце императора. Самомнение Циня достигало невероятных размеров: он даже велел наказать неугодившую ему гору; на ней уничтожили всю растительность, а потом выкрасили красной краской, как это делали с осужденными преступниками. Цинь был и велик, и безумен одновременно. Зачем объединять столько непохожих и к тому же еще конфликтующих народов, если ты пребываешь в здравом рассудке? Тут тронешься сразу, как только начнешь, с усмешкой говорил Си.</p><p class="p1">Он все больше увлекался раскопками в Сиани. И наконец поверил, что и сам император Цинь дожидается его собственной набальзамированной персоной в гробнице, пока таящейся неподалеку от глиняной рати. Древняя летопись сообщала, что под одним из курганов сокрыта даже модель всего Китая, каким он был в 210 г. до н. э. — вплоть до каждого храма и пагоды. Реки этой модели, со слов летописца, наполнены ртутью, и миниатюрная баржа императора странствовала по своему подземному государству. И когда в почве Сиани обнаружили повышенное содержание ртути, воодушевление, охватившее Си, еще более окрепло.</p><p class="p1">Ему даже удалось отыскать под землей анналы времен самого императора Циня, содержавшие описания громадных куполов, которыми тот повелел покрыть свои подземные владения, модель Поднебесной — так называлось его государство. Поскольку китайская письменность не изменилась за прошедшие 2200 лет, Си мог читать найденные тексты, не прибегая к помощи лингвистов. Летописец через века обращался прямо к нему. Чтивший память усопшего, Си, засыпая, много ночей пытался представить себе Млечный Путь, куполом накрывший могилу великого императора, и во всем блеске озарявшие его хвостатые кометы.</p><p class="p1">Все последнее десятилетие Си занимался в основном поисками места погребения Циня и модели Вселенной. Пока гробница императора оставалась не найденной, поисками интересовался весь Китай. И о Си в стране говорили такими словами: «Людей в Китае миллиард, но Си — только один». Так он становился образцом нации, в которой понемногу пускал корни индивидуализм.</p><p class="p1">Цинь боялся… он искал бессмертия. Человек, чьим именем стали звать самый многочисленный народ планеты, император, для которого построили самое огромное сооружение тех времен, словно опасался, что его могут забыть. А потому велел возводить новые и новые монументы; сохранить, то есть воспроизвести, для потомков обличье своих придворных, построить гробницу и модель мира, которые усердно разыскивал Си, и все слал и слал в Восточное море экспедиции на поиски эликсира жизни. Он жаловался на расходы, но снова затевал походы. В самый крупный из них ушли дюжины океанских джонок, уносивших на себе три тысячи молодых мужчин и женщин. Все они не вернулись домой, судьба их осталась неизвестной. Напиток бессмертия так никто и не нашел.</p><p class="p1">Но лет через пятьдесят культура риса и железные орудия словно сами собой объявились в Японии, полностью изменив жизнь страны и попутно породив целый класс воинственных аристократов. Си утверждал, что само название «Япония» — Страна восходящего солнца — полностью отражает китайские корни ее культуры. На каком берегу нужно стоять, спрашивал Си, чтобы видеть Солнце восходящим над Японией? Словом, даже в названии ежедневной газеты, редакцию которой посетила Элли, Си видел напоминание о жизни и делах императора Циня. Элли решила, что рядом с Цинем Александр Македонский смахивает на школьного проказника, в известной мере, конечно.</p><p class="p1">Цинь свихнулся на вечной жизни, а Си — на Цине. Элли рассказала Си, как гостила у Сола Хаддена в его заоблачной резиденции, и оба они согласились, что, живи император Цинь в наши дни, искать его пришлось бы на орбите. Потом она представила Си Хаддену по видеотелефону и оставила мужчин продолжать беседу с глазу на глаз. Великолепные познания в английском языке Си проявил совсем недавно — во время передачи британской колонии Гонконг Китайской Народной Республике. Разговор затянулся, и когда «Мафусаил» опустился за горизонт, они продолжили беседу с помощью геосинхронных спутников. Им было о чем поговорить. Через какое-то время Хадден потребовал, чтобы Машина была включена в тот момент, когда «Мафусаил» будет находиться прямо над ней. В этот долгожданный миг он хотел видеть Хоккайдо сверху через телескоп.</p><p class="p1">— Как вы думаете, верят ли буддисты в Бога? — поинтересовалась Элли, когда они ехали на званый обед к настоятелю.</p><p class="p1">— По моему, они полагают, — сухо ответил ВГ, — что Бог их велик настолько, что может позволить себе не проявляться ни в чем.</p><p class="p1">Они разговаривали об Уцуми, настоятеле самого известного дзэнбуддийского монастыря в Японии. Несколько лет назад на церемонии в память 50-летия разрушения Хиросимы Уцуми произнес речь, обратившую на себя внимание всей мировой общественности. Он прекрасно разбирался в политической жизни Японии и был чем-то вроде духовника правящей партии, хотя большую часть времени проводил в монастыре и молитвах.</p><p class="p1">— Отец его тоже был настоятелем буддийского монастыря, — заметила Сукхавати.</p><p class="p1">Элли вопросительно подняла брови.</p><p class="p1">— Не надо удивляться. Им разрешается жениться… как русским православным священникам. Не правда ли, ВГ?</p><p class="p1">— Это было раньше, — рассеянно отвечал тот.</p><p class="p1">Ресторан располагался в бамбуковой роще и назывался «Унгецу» — «Луна за облаком». Вечерело. Месяц и впрямь перебрался за тучку. Их японские хозяева устроили так, чтобы других гостей не было. Элли, как и ее спутники, сняла обувь и в чулках прошла в небольшую столовую с видом на бамбуковую поросль.</p><p class="p1">Бритоголовый настоятель был облачен в расшитое серебром одеяние. Он приветствовал гостей на безукоризненном английском, позже Си шепнул ей, что китайским настоятель владеет не хуже. Окрестности располагали к отдыху, шел непринужденный разговор. Каждое блюдо казалось произведением искусства — настоящие съедобные самоцветы. Элли подумала, что новая кулинария планеты многим обязана японской традиции. Если бы, по обычаю, следовало есть с завязанными глазами, вкус блюд угодил бы самому взыскательному гостю. И наоборот, если бы на блюда можно было только смотреть, удовольствие было бы не меньшим. Ну а видеть все это и чувствовать небом, думала Элли, просто дар Божий.</p><p class="p1">Она сидела возле Луначарского, напротив настоятеля. Ее спутники интересовались, к какому виду или хотя бы царству живой природы принадлежит то или иное блюдо. Перед орешками гинкго разговор принял серьезный характер.</p><p class="p1">— <em>Почему</em> мы общаемся? — спрашивал настоятель.</p><p class="p1">— Чтобы обмениваться информацией, — отвечал Луначарский, казалось, полностью поглощенный палочками для еды.</p><p class="p1">— Но почему мы <em>стремимся</em> обмениваться информацией?</p><p class="p1">— Мы потребляем ее. Информация необходима для нашего выживания. Без информации мы погибнем.</p><p class="p1">Луначарский безуспешно пытался подцепить палочками орех гинкго, выскакивавший при любой попытке донести его до рта. Он склонился, чтобы перехватить орех на полпути.</p><p class="p1">— А я думаю, — продолжил настоятель, — что к общению нас побуждает любовь или сочувствие. — Взяв пальцами ядрышко ореха гинкго, он отправил его прямо в рот.</p><p class="p1">— Значит, вы ищите в Машине сопереживание? — спросила Элли. — Не рискованно ли?</p><p class="p1">— Я могу сопереживать и цветку, — продолжал настоятель. — Я могу общаться с камнем. Уверен, у вас не будет сложностей при общении с созданиями — я правильно сказал? — из другого мира.</p><p class="p1">— Вполне могу поверить, что камни говорят, — заметил Луначарский, прожевывая орех. Он последовал примеру настоятеля. — Но я сомневаюсь в том, что камень способен понять вас. Какие могут быть у вас доказательства? Мир и так полон ошибок. Вы уверены, что не обманываете себя?</p><p class="p1">— Вполне законный научный скептицизм, — улыбнулся в ответ настоятель. С точки зрения Элли, улыбка была просто неотразима: невинная, чуть ли не детская.</p><p class="p1">— Чтобы общаться с камнем, надо постараться стать… не таким занятым. Следует не столько думать, сколько говорить. Когда я утверждаю, что общаюсь с камнем, то имею в виду не слова. Христиане говорят: «В начале было Слово». Но я говорю об общении предначальном, лежащем в основе основ.</p><p class="p1">— О Слове говорится лишь в Евангелии от Иоанна, — менторским тоном заметила Элли и укорила себя в бестактности, еще не договорив последнего слова. — В более ранних, синоптических Евангелиях этого нет. Мотив заимствован из греческой философии. Но о каком общении без слов вы говорите?</p><p class="p1">— Ваш вопрос состоит из слов. Вы просите меня словами описать нечто, не имеющее ничего общего со словами. Попробую. Есть такая японская сказка «Сон муравьев». Дело происходит в муравьином королевстве. История долгая, я не стану все пересказывать. Но смысл таков: чтобы понять муравья — стань муравьем.</p><p class="p1">— Ну на самом деле язык муравьев имеет химическую природу, — заметил Луначарский, проницательно глянув на настоятеля. — Они наносят определенными молекулами метки, помечающие дорогу к еде. Чтобы понять муравья, нам потребуется газовый хроматограф или же масс-спектрометр. Так что нет необходимости становиться муравьем.</p><p class="p1">— Возможно, вам под силу стать муравьем только таким вот способом, — не глядя на него, возразил настоятель. — Объясните мне, зачем вам, ученым, изучать следы, оставленные муравьями?</p><p class="p1">— Энтомолог сказал бы, — предположила Элли, — чтобы понять муравьев и их общество. Познание доставляет ученым удовольствие.</p><p class="p1">— Это просто другой способ признаться в любви к муравьям.</p><p class="p1">Элли слегка подала плечами.</p><p class="p1">— Да, но те, кто платит энтомологам, скажут иначе. Они скажут, что хотят управлять муравьями, уметь изгонять их из любого жилья… Или глубже понять агробиологию почвы. Биологические методы безопаснее пестицидов. Едва ли здесь можно усмотреть любовь к муравьям.</p><p class="p1">— Скорее нашу заинтересованность, — заметил Луначарский. — Пестициды ядовиты и для людей.</p><p class="p1">— Зачем вспоминать о пестицидах во время такого обеда? — возмутилась сидевшая напротив Сукхавати.</p><p class="p1">— Помечтаем о муравьях в иное время, — негромко сказал настоятель, улыбнувшись Элли той же неотразимой и невозмутимой улыбкой.</p><p class="p1">Обувшись с помощью метровой длины рожков, они пошли к маленькой стайке автомобилей, а официанты и хозяин ресторана улыбались и церемонно кланялись. Элли и Си смотрели, как настоятель садится в лимузин вместе с кем-то из хозяев-японцев.</p><p class="p1">— Я спросил у настоятеля, если он способен разговаривать с камнем, значит, может общаться и с мертвыми? — проговорил Си.</p><p class="p1">— И что он ответил?</p><p class="p1">— Он сказал, что с мертвыми общаться несложно. Куда труднее — с живыми.</p></span></span>
