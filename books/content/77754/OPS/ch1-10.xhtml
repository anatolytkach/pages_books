<span><span id="id7"><div class="title2">
<p class="p"><strong>VI</strong></p>
</div><p class="p1">Господи, уже скоро зима. Дождь смешается со снегом, холодный ветер обтянет красные ладони, ударит в лицо, вырвет из рук зонт, белые хлопья залепят глаза... слепота — что может быть страшнее?</p><p class="p1">Хорошо, что контора недалеко от дома. Люблю ходить пешком. В любую погоду.</p><p class="p1">Элизабет купила газету, быстро проглядела светскую хронику: так... Майкл Джексон делает себе очередную пластическую операцию, так... скончалась Анна-Мария Кросс... Сен-Клер развелся с женой... русский миллионер Стерлигофф покупает картины... Надо его познакомить с Эрлом. А, впрочем, все миллионеры одинаково мало смыслят в искусстве. Навстречу пробежали братья-близнецы со своим псом, Элизабет весело помахала им рукой из–за газеты. Грузчики возились у своего фургона. Японские детишки со своей воспитательницей важно шествовали по улице. Все было как всегда; мир не изменился. В мире стало больше на одного Джонни, так что с того? В мире стало меньше на одну Элизабет — и ладно...</p><p class="p1">Входя в галерею, она чуть придержала дверь и оглянулась. Теперь Элизабет так делала всегда, надеясь увидеть Джона на той стороне улицы или в окне противоположного дома. Ни разу не увидела.</p><p class="p1">— Опять приходил этот осел со своим псом, — сообщила Молли. — Полчаса глядели на «Ожидание», топтались, вздыхали, урчали и ушли.</p><p class="p1">— Никто не звонил? — рассеянно спросила Элизабет.</p><p class="p1">— Эрл звонил. Он вернулся к себе на виллу. Приглашал в гости. О наших успехах не спросил ни разу. — Молли восхищенно развела руками. — Что за выдержка у человека!</p><p class="p1">— Да... — Элизабет отчего–то вздохнула. — Хорошо быть Эрлом.</p><p class="p1">— Нашла кому завидовать, — Молли потянула сигарету из пачки, щелкнула зажигалкой. — Не верь счастью одиноких. Им нехорошо. Даже когда они наедине с Богом.</p><p class="p1">— Ты не права, Молли. — Элизабет повернулась в кресле, вытянув ноги перед собой. — Во-первых, ему хорошо. Во-вторых, я ему не завидую. Зависть — это когда ты желаешь чужие удачи примерить на себя. А я бы не хотела быть Эрлом. К тому же я счастлива...</p><p class="p1">— Да? — Молли сверху вниз в упор разглядывала подругу. — Ты прости меня, ради Бога, мы знакомы уже несколько лет... и кое–что знаем друг о друге...</p><p class="p1">— И что же ты знаешь обо мне? — Элизабет рассмеялась. В самом деле, о каждом своем новом увлечении Молли рассказывала всей конторе. Помнится, в прошлом году Джейн, шеф и Элизабет бурно негодовали на некоего Фила, с которым Молли никак не успевала кончить, такой эгоист попался... Своим прошлым и настоящим Элизабет с Молли не делилась никогда.</p><p class="p1">— Я знаю тебя как облупленную. — Подруга все так же в упор смотрела на Элизабет. — Мне не нужно никаких твоих слов, чтобы безошибочно определить, как ты провела вчерашнюю ночь.</p><p class="p1">— И как же я ее провела? — Элизабет усмехнулась и тоже закурила.</p><p class="p1">— Ты провела эту ночь одна. Спала плохо. И полночи мечтала о мужике.</p><p class="p1">Элизабет перестала улыбаться,</p><p class="p1">— Ты уже дня три не можешь встретиться со своим Джонни, — безжалостно продолжала Молли, — и сильно напрягаешься по этому поводу.</p><p class="p1">— А как ты... — пролепетала Элизабет.</p><p class="p1">— Никакой мистики, — резко хохотнула Молли, — Он каждый день звонит тебе, вы болтаете, я все слышу. У него какие–то срочные дела, шляется хрен знает где по ночам, скупает какие–то акции, да?</p><p class="p1">— Подслушиваешь, — грустно констатировала Элизабет.</p><p class="p1">— Подслушиваю?! — возмутилась Молли. — Да ты так орешь, что посетители шарахаются, во всей галерее СЛЫШНО.</p><p class="p1">— Прости, ты права.</p><p class="p1">— Я всегда права. И, знаешь, что скажу тебе... не обидишься?</p><p class="p1">— Постараюсь. — Элизабет тяготил этот разговор, но обрывать его тоже почему–то не хотелось.</p><p class="p1">— Ты живешь неправильно. — Молли загасила сигарету в пепельнице и села в кресло напротив Элизабет. — Для тебя любой преходящий роман — пустая и досадная случайность, а главное в жизни — это любовь. Настоящая. Серьезная. С большой буквы. Только ради нее и стоит жить.</p><p class="p1">— А разве не так, Молли?</p><p class="p1">— Не так! Самое подлое и гнусное, что только есть в нашей траханной жизни — это большая любовь. Хуже нее могут быть только вонючие девичьи мечты обо всей этой дребедени.</p><p class="p1">— Слушай, — Элизабет поморщилась, — ну что за глупый цинизм, ей-богу... Можно подумать, ты не влюблялась никогда.</p><p class="p1">— Влюблялась! — Молли схватила новую сигарету. — О, еще как! Я влюбляюсь каждый день. И каждый день счастлива. Потому что нет ничего прекраснее влюбленности и нет ничего гаже любви. Этой рабской зависимости от какого–нибудь подонка, от его капризов, от его проблем, от его тщеславия, от его... — Молли яростно закашляла, задохнувшись дымом. — Нет ничего прочнее случайных связей, — торжествующе прохрипела она.</p><p class="p1">Элизабет зевнула; она и вправду сегодня не выспалась. Спорить не хотелось.</p><p class="p1">— Я никого не люблю, — докладывала Молли, — и я влюблена в каждую подвернувшуюся сволочь. Знаешь, в кого я влюблена теперь? Ну, догадайся.</p><p class="p1">Элизабет приоткрыла рот: быть не может!..</p><p class="p1">— Угадала, милая, — глазки Молли томно блестели из–за пелены табачного дыма. Потухшая сигарета в руке Элизабет слегка дрожала. — С твоим Брюсом! Господи, ты бы видела, как робко он трахал меня в первую ночь и как разошелся за эту неделю... В жизни у меня не было такого нежного и напористого мужика. Между прочим, — Молли округлила глаза, — должна тебе сказать, что мне он достался... прости опять–таки... совсем неумелым мальчиком. На третью ночь он чуть не со слезами сознался, что до меня почти нечего не знал об искусстве любви. Он так удивился, когда узнал, что можно, оказывается, и сзади. До тридцати лет дожил, бедняга, и такой пробел!</p><p class="p1">Элизабет была смущена.</p><p class="p1">— Я не любила, его, Молли, — тихо сказала она. — И вообще... давай не будем об этом.</p><p class="p1">— Да я что, тебя упрекаю, что ли?! Просто мне обидно. Ты уже месяц ходишь с каким–то безумием в глазах, то светишься, как дура, а то слезы глотаешь. Жалко мне тебя, вот что.</p><p class="p1">— Молли, — Элизабет, сгорбившись, сжала руки коленями и так застыла, — насчет того, как вы там сзади... все это малоинтересно. Хотя, конечно, очень хорошо, что знания Брюса о жизни столь существенно расширились. И все благодаря тебе. Спасибо...</p><p class="p1">— Я принесу воды, — заволновалась Молли.</p><p class="p1">— Не надо. Лучше дай мне сигарету, мои кончились, — Элизабет глубоко затянулась. — Знаешь что, — жалобно заговорила она, — не могу я его понять, этого Джона. Иногда с ним так легко... так бывает, когда люди одни и те же книги читали. А потом вдруг — тяжесть, нелепость, невнятица...</p><p class="p1">— А он что, начитанный? — пробормотала Молли.</p><p class="p1">— Что? Нет, какие книги... ты опять права. Ни черта не читает. Я вообще не понимаю, как он живет. И... я не понимаю, что у меня с ним... что меня с ним... связывает... что у нас... происходит... и все это откладывается куда–то в подсознание. А знаешь, что самое ужасное?</p><p class="p1">— Самое ужасное, — медленно и отчетливо, как первая ученица, вдруг заговорила Молли, — заключается в том, что неизвестно, чем все это кончится. Эта ваша Большая Любовь.</p><p class="p1">— Да, — сказала Элизабет. — Эта наша Большая Любовь. Это маленькое время, отмеренное нам для счастья. Ты знаешь, Молли, ведь я, правда, счастлива.</p><p class="p1">Зазвонил телефон. «Слушаю, — Молли кивнула подруге. — Тебя».</p><p class="p1">...Пропустили ее легко, да и кто, собственно, мог бы ее задержать? — хотя ей отчего–то представлялось, что в такого рода местах обязательно должен сидеть у входа или страж с пистолетом, или угрюмая секретарша с непроницаемым лицом. Но у лифта ей встретился чрезвычайно обаятельный и неприлично молодой человек в безукоризненном костюме и популярно объяснил, как найти нужный кабинет.</p><p class="p1">И секретарша у дверей этого кабинета кивнула ей понимающе, даже, как показалось Элизабет, несколько игриво, — многих ли она сюда пропускала? Или он так же, как и с ней, предпочитает обходиться свободным временем, а на службе имеет дело только со служебными делами. И было ли у него что–нибудь с секретаршей? «Была у меня одна секретарша, так у нее была привычка в постели пукать и икать от страсти...» Нет, такого он, разумеется, никогда не говорил, но фразочка вполне в его духе. Что–то будет после нее? «Была у меня одна экзальтированная блондинка, относившаяся ко всему с комической серьезностью, плакавшая в оргазме и с высоты своего образования презиравшая минет, потому что при этом рот занят и не поговоришь...» Нет, никогда!..</p><p class="p1">Через три минуты секретарша вышла с кротко потупленными глазами. Нет, так быстро он не мог успеть.</p><p class="p1">— Вас ждут.</p><p class="p1">Впервые у него на службе.</p><p class="p1">И без приглашения.</p><p class="p1">Впрочем, он любит сюрпризы. И хоть раз инициатива в них не будет принадлежать ему.</p><p class="p1">Кабинет был огромен, но Джон в нем не выглядел ни меньше ростом, ни, как бы это подумать без иронии, стройнее, скажем так. Хотя он всего лишь чуть полноват, но мягок, значителен и крупен. Плюшевый медведь из детства — вот кого он ей напоминал. Все хорошее в своей жизни она возводила к детству. Когда ее кормили с ложечки, но не претендовали на власть и не валяли по столу с раздвинутыми ногами и порванной юбкой...</p><p class="p1">— Ммм?</p><p class="p1">Он поднял на нее глаза. Посмотрел одобрительно, нежно и призывно. Сейчас будет очередная авантюра.</p><p class="p1">— Вот, — она протянула ему пакет. — Твое любимое.</p><p class="p1">Это были печенья из китайского ресторанчика внизу. С предсказаниями. Он любил предсказания даже больше, чем печенье, хотя был большим сластеной.</p><p class="p1">— Ну–ка, ну–ка! — Он оживился, но оживление у него выражалось всегда только в особенной глубине голоса, мягкости и плавности движений, как у тигра перед удачной охотой. Элизабет протянула ему пакетик.</p><p class="p1">— Тяни, фаталист.</p><p class="p1">— А вдруг ты все подменила, и там написано: «Еще одно печенье, и под лемуром сломается ветка»?</p><p class="p1">— Ты что! Как можно подменять судьбу?! Там, скорее всего, написано: «Той, что любит тебя, ты не предложишь сесть даже на пол».</p><p class="p1">— Посмотрим, посмотрим... — его серьезность и вера в судьбу умилила ее и заставила пожалеть о сказанном.</p><p class="p1">Он откусил половину одного из печений. Развернув бумажку, Джон прочел нараспев, словно молясь:</p><p class="p1">— «Твое сокровище в твоих руках, все прочее — лишь ветер».</p><p class="p1">— То есть воздух, — уточнила Элизабет. — Которым ты торгуешь.</p><p class="p1">Но Джон был рассеян и не обратил внимания на этот выпад. Он стоял у экрана дисплея и внимательно, по обыкновению, следил за курсом акций, за информацией, за темными и светлыми полосами диаграммы. «Ветер, — бормотал он. — Ветер, это ведь воздух с направлением, воздух, который заставили вертеть мельницу... Ну да, торговля воздухом — но это совсем не так плохо, правда, Элизабет?»</p><p class="p1">— Судя по тебе, это превосходно.</p><p class="p1">—- А теперь ты.</p><p class="p1">Она вынула предсказание и вчиталась в буквы, стилизованные под иероглифы:</p><p class="p1">«Ровно через двое суток ты встретишь свою судьбу. Доверься»</p><p class="p1">— А если я уже встретила свою судьбу?</p><p class="p1">— Это значит, что двое суток спустя ты опять придешь к бедному, старому Джонни, чтобы принести ему поесть, — он прожевал рассыпчатое, нежное печенье. — И чтобы увидеть наконец, чем он, собственно, занимается, пока ты там в поте лица своего продаешь чужие безумства. Которые тем и отвратительны, что неестественны, неорганичны и рассудочны.</p><p class="p1">— А то, что делаешь ты, конечно, гораздо почетнее.</p><p class="p1">— Конечно! Я, по крайней мере, не порываюсь назвать дисплей произведением искусства (хотя в галерее у них было и не такое — один из учеников и последователей Дали выставил унитаз на середину зала и на полном серьезе пытался уверить окружающих, что это новое слово в искусстве. Какой смысл из унитаза выводился — она уже не помнила. Да и к чему это ему? — ему, Джонни, который и к серьезному–то искусству равнодушен).</p><p class="p1">— Ну, и какие же радостные открытия ты для себя сделала, прелесть моя?</p><p class="p1">Она села на пол. Ибо приглашения от него так и не дождалась. Она чуть откинулась назад, оперлась на руки, согнула левое колено, все это время поглядывая на Джона хитро, вызывающе и лукаво — как он научил ее. Вся она была — насмешка, и вся — призыв. Он был таким, и она уже никогда не станет другой. И будет такой со всеми, хотя лучше бы после него никого не было...</p><p class="p1">— Я открыла для себя, что у тебя огромный кабинет. Очень привлекательная секретарша. Очень серьезные дела. Одним словом, я решила представить себе, куда девается большая часть твоего времени. И чем вызваны эти внезапные перерывы в наших встречах. Теперь я знаю: на работе ты работаешь. И устаешь. И поэтому быстро засыпаешь, и снятся тебе колонки цифр, столбцы информации, сводки по стоимости воздуха... Грозовой воздух — из России, влажный — из Англии, теплый — на Франции...</p><p class="p1">— Ты действительно могла предположить, что я изыскиваю предлоги и бегаю от тебя?</p><p class="p1">— Нет, ну конечно, я не могла этого предположить. Я даже сказала себе: кто согласится его терпеть, где он найдет другую такую идиотку? Но подозрение есть подозрение, с ним ничего поделать нельзя.</p><p class="p1">— Другую такую я действительно нигде не найду. А какая ты еще будешь! — он тихонько засмеялся.</p><p class="p1">— Может быть, сейчас — хоть слово о браке? Хоть отдаленная надежда на перспективу?</p><p class="p1">— Ты будешь просто изумительна, Элизабет, — нараспев говорил он. — Я научу тебя всему. Научу совсем не думать. Научу достигать оргазма при одной мысли обо мне...</p><p class="p1">— И чем все кончится?</p><p class="p1">— А этот вопрос ты вообще забудешь. Потому что почему, черт побери, все должно кончаться? Или ты пришла ко мне, чтобы услышать о будущем. Так предсказаниями будущего занимаюсь не я, а китайское печенье. Через двое суток судьба к твоим услугам.</p><p class="p1">Элизабет медленно встала. С улыбкой посмотрела на него. Эта улыбка ничего не должна была ему сказать. Загадочная и медлительная. Пусть думает, что хочет. Повернулась на каблуках. Это он научил ее такой кошачьей мягкости, загадочности, медлительности. Пошла к двери. Оглянулась. Он следил за ней с восхищением, как учитель на достойную ученицу. Вот, кажется, все, что ему было нужно — женщина, не требующая ничего. Она резко распахнула дверь.</p><p class="p1">Он не пошевельнулся.</p><p class="p1">Гибко покачивая бедрами, стараясь идти как можно независимее и прямее, она вышла из кабинета.</p><p class="p1">Он стремительно нажал кнопку на пульте и, приблизив губы к встроенному микрофону, приказал секретарше:</p><p class="p1">— Не выпускайте ее!</p><p class="p1">У секретарши, видимо, был опыт выполнения таких распоряжений.</p><p class="p1">— Простите, мисс, во вы не можете выйти.</p><p class="p1">— Почему?</p><p class="p1">— Чтобы покинуть этот кабинет, нужно специальное разрешение. Пропуск.</p><p class="p1">— Очень странно. Чтобы войти, не нужно, а чтобы выйти...</p><p class="p1">— Сожалею, мисс, во таковы правила. Вернитесь в кабинет, вам выпишут пропуск, он даст вам право спуститься, а я по внутренней связи предупрежу служащего, что стоит у входа.</p><p class="p1">— Когда я входила, у входа никого не было.</p><p class="p1">— Вы просто никого не заметили.</p><p class="p1">Элизабет хмыкнула и вернулась в кабинет Джона.</p><p class="p1">— Судьба! Выпусти меня из своих лап, пожалуйста. Напиши мне расписку, что я тебя не убила, не ограбила я не уношу в кармане. Чтобы похищать такого бегемота, надо заранее договориться о предоставлении ему жилья в зоопарке.</p><p class="p1">— Иди сюда, — сказал Джон с самой обворожительной из своих улыбок. — Я займусь предсказанием. Сейчас тебе предстоит посещение мемориала «Здесь возлюбленный подкреплялся».</p><p class="empty-line"/><p class="p1">Их столовая напоминала скорее ресторан — никогда в жизни, кажется, Элизабет не видела такого количества людей во фраках, в идеально начищенных ботинках, в идеально отглаженных сорочках. Впрочем, здесь это не производило впечатления роскоши и выглядело скорее униформой, а потому угнетало. Она не любила униформы, даже если речь шла о столь презентабельном ее варианте.</p><p class="p1">Джон и здесь выделялся — то ли потому, что фрак сидел на нем очень уж по-домашнему, то ли потому, что в его поведении не было напыщенной важности, присущей остальным. Здесь и ели, словно священнодействовали. Урвав время у дел и ни на секунду не роняя себя в собственных глазах. Интересно было бы представить такого типа в сортире. Он, наверное, и на унитазе восседает с важностью вершителя судеб. И, опорожняя желудок, продолжает прикидывать в уме наибольшую выгоду, которую можно из этого извлечь. Яппи как он есть, да еще в такой концентрации. Впервые Элизабет присутствовала при подзарядке такого количества роботов. Яппи ей были противны с университетских времен. Впрочем, как и хиппи. Грязнуля и чистюля — одного поля ягоды.</p><p class="p1">— Хочешь почувствовать себя одним из этих мужчин?</p><p class="p1">А что, — было бы забавно!</p><p class="p1">— Каким образом ты предлагаешь мне это сделать? Поиграть на бирже?</p><p class="p1">— Зачем же. Чтобы представить себя женщиной, вовсе не обязательно отдаваться. Пошли, сейчас вернемся.</p><p class="p1">— Что ты собираешься делать?</p><p class="p1">— Не задавай лишних вопросов.</p><p class="p1">Она заразилась его весельем, которое было на этот раз каким–то болезненным, почти лихорадочным. Все–таки он здесь чужой, не менее чужой, чем она, — даром что с ним уважительно здоровались, раскланивались и обменивались дежурными фразами.</p><p class="p1">— Тебе ведь тут нравится?</p><p class="p1">— Не нравится.</p><p class="p1">— Я тебя понимаю. Это зависть, да?</p><p class="p1">— Господи, Джонни, чему тут завидовать?!</p><p class="p1">— Сейчас поймешь.</p><p class="p1">Потайной шкафчик в его кабинете, куда они вернулись почти бегом, держась за руки, — потряс ее. О, у этого маньяка, как у всякого настоящего маньяка, заготовлен целый арсенал! На полках были аккуратно разложены брюки, фрак, бабочка, сорочка, туфли, — все настоящее, только на несколько размеров меньше, заготовленное в расчете явно на женскую фигуру.</p><p class="p1">— Не будешь же ты утверждать, что закупил все это специально для меня?</p><p class="p1">— Не буду, — сказал он, глядя ей прямо в глаза.</p><p class="p1">— Ты что, уже устраивал здесь подобный маскарад?</p><p class="p1">— Допустим...</p><p class="p1">— С журналисткой? Засылал се в качестве шпионки? Подслушать разговоры конкурентов?</p><p class="p1">— Как они проводят уик-энды, я и сам примерно догадываюсь.</p><p class="p1">— Тогда зачем же?</p><p class="p1">— Чтобы тем вернее вызвать отвращение к ней. Журналистка во фраке — это был уже некий предел, который переходить нельзя.</p><p class="p1">— Ты хочешь вызвать у себя рвоту при виде меня?</p><p class="p1">— Если этого до сих пор не произошло, ситуация безнадежная.</p><p class="p1">Она и не хотела возражать. Ей не нравилась шутка. Но в ней было странное обаяние безумия, была новизна, и Элизабет ощущала себя все большей и большей рабыней этой новизны. Он умело разжигал в ней страсть к постоянному обновлению жизни. И, видимо, он чувствовал, как болезненно и неотразимо влекут ее любые проявления безумия среди рутинного однообразия жизни, — того безумия, которое мелькнуло ей единожды и с тех пор сопровождало на каждом шагу.</p><p class="p1">— Как я выгляжу?</p><p class="p1">— Чертовски возбуждающе.</p><p class="p1">— Джонни, клянусь, ты скрытый педик!</p><p class="p1">— Подожди, мы забыли существенную деталь!</p><p class="p1">Из кармана ее фрака он извлек небольшие рыжие усики, купленные, видимо, в магазине театральных принадлежностей, где обычно закупают антураж для школьных спектаклей. Он осторожно приладил усы под ее носом, сдвинул вправо, влево, потом удовлетворенно полюбовался и, не удержавшись, сдернул чуть наискось. Левый ус залезал ей в рот.</p><p class="p1">...На него посмотрели с удивлением, на худощавого новичка в коротковатых штанах — с чувством презрительного превосходства. Джон, едва отвечая кивками на приветственные возгласы, вел ее к свободному столику.</p><p class="p1">— Билли, дружище, — громко говорил он, глядя прямо на нее, — как я рад, что сейчас мы наконец–то поговорим о делах! Поправь цилиндр, старина, вечно он у тебя съезжает. Отрастил лохмы.</p><p class="p1">Джон заказал два коктейля, как выяснилось, довольно крепких, потому что после первых глотков у Элизабет прошли все страхи и опасения, неприятный осадок исчез, и в душе она хохотала над ничего не подозревающими ублюдками вокруг. Ее слегка лихорадило, возбуждение росло, она чувствовала, что сегодня он выкинет еще что–то. Да, пожалуй, его изобретательности хватит надолго. Связывает ли их что–нибудь, кроме этих авантюр? О да, несомненно. Она многажды задавала себе этот вопрос. И теперь, когда желание росло в ней с каждой секундой и сердцебиение учащалось, она не представляла, как могла опасаться за их будущее.</p><p class="p1">А Джонни блистал. Здесь он был в своей стихии. Импровизация и эпатаж, да еще где? — среди своих, среди ослов, считающих его равным, здесь, где репутация — превыше всего! Может быть, и его лихорадило. Но скорее всего, он четко вел роль, готовый к любым неожиданностям. Неужели это уже было у него с кем–то? Ложь, чушь, быть того не может! Он все это заготовил для меня. Иначе почему все так прекрасно сидит, только брюки коротковаты?</p><p class="p1">— Работаешь, работаешь, работаешь, — говорил он чуть громче, чем нужно, и на такое нарушение нормы соседи немедленно оборачивались, чтобы уже не оторвать взгляда от странного блондина рядом с Джонни: светлые длинные волосы, нервное лицо, рыжие усы...</p><p class="p1">— Весь в трудах, весь в бегах... встречаешься с людьми... А люди тебе не нужны. Нет, бывают, конечно, исключения вроде тебя, старина Билли, но в основном... Они пытаются что–то продать тебе. Это не то слово — продать. Всучить, всучить, не питай иллюзий, старина. А потом ты возвращаешься домой. Один-одинешенек, выжатый, как лимон, полный неосуществленных планов, радужных надежд, — да, лимон, полный неосуществленных надежд. Помнишь меня в колледже. Романтические устремления, стихи... Как сейчас помню: как пахнет роза... э-ммм... да, как пахнет роза, тьфу ты черт... вот видишь, все перезабыл. Падаешь на кровать, мысли путаются, жизнь проиграна... Ложь и обман! Да в каком мире мы живем, черт возьми?! Готовишься к следующему дню. который ничем не будет отличаться от предыдущего. Опять те же люди, которые чего–то от тебя хотят, хотят... а ты от них — только одного, но не подумай, старина Билли, не того, чего всегда хочешь ты. Совсем другого: чтобы все они провалились в задницу, теснясь, толкаясь, и чтобы всем хватило места! И знаешь, что меня поддерживает? Ну, уж ты–то, казалось бы, должен догадаться. Единственное, что держит меня в форме, — это женщина. Готов поспорить на что угодно, у тебя никогда не было такой бабы! Клянусь, не было! Потрясающая баба, я даже иногда не могу поверить, что она моя...</p><p class="p1">И весь этот спектакль — ради меня, ради меня! Чтобы показать всю разницу между собой и прочими! Как он все понимает, что он творит!</p><p class="p1">— Н-да. — Он отрезал кусочек бифштекса, машинально протянул ей на вилке, но, спохватившись, проглотил сам. Она поперхнулась смехом. Он жевал и не умолкал ни на секунду. — Особенно когда я вижу ее голой. Умница, образована, как я не знаю что, хотя, пожалуй, в этом вас с ней можно сравнить. Чиста, как снег, в смысле принимает душ четырежды в день. Но самое главное — у нее великолепный зад. Просто великолепный! Ты знаешь, что меня еще в колледже страстно влекло к задам. В женщине прекрасно все, например, уши, — мне очень нравятся уши, — и еще передний зуб, который должен быть чуть кривоват, и вообще желательно, чтобы баба была убогонькая, хроменькая, например, или с врожденным пороком — типа заикания. Это несказанно возбуждает. Но у этой такой зад, что он искупает все. Если бы кто–то спросил меня, что вкладываю я в слово «жопа», то, я сказал бы тебе, я сказал бы каждому, что вкладываю я в эту жопу! Это жопа пар экселянс, жопа из жоп! Вот такой формы. Ты спросишь: а сиськи? И я отвечу тебе: глаза! Но все остальное — жопа... — И тихо, наклонившись к ней, он прошептал ей в самое ухо, обжигая его жарким дыханием:</p><p class="p1">— Ты действительно прекрасна! Действительно! Потрясающе красива! Поцелуй меня, поцелуй, я не выдержу...</p><p class="p1">И в следующую секунду он уже прильнул к ее губам. Это был один из тех поцелуев, который действовал на нее неотразимо — он обнял ее и чуть покусывал нижнюю губу, поглаживал пальцами ее висок и щеку...</p><p class="p1">— Отдай мне усы!!! — крикнул он на весь ресторанчик. — Старина Билли, отдай мне усы!!!</p><p class="p1">Он сорвал рыжие усики с ее верхней губы и исступленно накинулся на нее с объятиями и поцелуями. На них смотрели с брезгливым презрением, в котором она напрасно надеялась уловить испуг. Яппи были непроницаемы, непрошибаемы, — их может испугать только то, что касается их лично. Это их лично не касалось.</p><p class="p1">— Бежим отсюда!</p><p class="p1">— А моя одежда?</p><p class="p1">— Ничего, полежит у меня!</p><p class="p1">— Но куда ты?!</p><p class="p1">— Куда угодно.</p><p class="p1">Они растолкали поджимавшихся, расступающихся яппи и вылетели в коридор, а оттуда, не разнимая объятий, — на лестницу. Кубарем скатились вниз (она едва не падала в неудобных и великоватых ботинках). На улице хлестал ливень.</p><p class="p1">Машина неслась на них стремглав и едва успела затормозить. Элизабет в негодовании стукнула кулаком по капоту.</p><p class="p1">— Педик проклятый!</p><p class="p1">Как ни странно, это было единственное ругательство, приходящее ей на ум в любых ситуациях. Другого она, видимо, просто не знала.</p><p class="p1">Водитель, и без того обозленный, выскочил из кабины. Он показался ей похожим на того итальянца, который без особенной доброжелательности посмотрел на нее еще во время их первого свидания с Джоном, в итальянском ресторанчике, когда Джон — Господи, тысячу лет назад! — рассказывал ей про чьи–то выбитые мозги. Конечно, это вряд ли был тот самый итальянец. Это был просто итальянец. Усатый, в расстегнутой рубахе, открывающей волосатую грудь. У итальянцев, как и у всех вообще южан, здорово развита солидарность. Следом за ним из кабины выскочили еще двое, и судя по солидарности, это тоже были итальянцы. Они что–то кричали Джону и Элизабет, и Элизабет непременно разобрала бы итальянский у них акцент или какой–то другой. Она была здорово пьяна, и пьян был Джонни, но он, по всей видимости, пьянел от того, что ввязался наконец в нормальную историю, — пьянел от опасности.</p><p class="p1">Они стремглав неслись по каким–то мокрым тротуарам. Она не узнавала мест. На улице случился еще какой–то итальянец, который побежал вслед за соотечественниками. Впрочем, может быть, это был враг тех итальянцев, человек из другой мафии, который решил их догнать. Мысли ее путались, дыхание прерывалось.</p><p class="p1">— Джонни! Не беги так! Я за... за...</p><p class="p1">— Заикаешься?</p><p class="p1">— Задохнусь!</p><p class="p1">— Удерем — поговорим.</p><p class="p1">— Ууу, сукин сын! — крикнул волосатогрудый, приблизившийся на критическое расстояние.</p><p class="p1">— Он не сукин сын! — крикнула Элизабет. Ей стало обидно за Джонни. Чего доброго, они их догонят, ее не тронут, а его прибьют. А что сделают ей? Наверное, изнасилуют. Как приятно, наверное, как интересно быть изнасилованной итальянцем! Мафиози! Чтобы Джонни лежал рядом и сквозь синяк пытался на это смотреть. Интересная инсценировка. Вполне в его духе. Она расхохоталась на бегу. Джон втащил ее в подворотню, а затем...</p><p class="p1">Она не сразу сообразила, где они очутились. Водоочистная станция не принадлежала к числу мест, по которым Элизабет любила прогуливаться. Потоки воды хлестали по ступенькам, ведущим вниз. Там они намеревались затаиться, но следом по лестнице, оскользаясь и ругаясь на чистом английском, валился итальянец и его веселые друзья.</p><p class="p1">— Ах ты подонок!</p><p class="p1">Джонни молчал и только грозно сопел. Она еще никогда не видела его в драке. Исходя из того, что ему пришлось сопротивляться сразу троим, — он недурно дрался. Элизабет подбежала к итальянцу, державшему Джонни за отвороты пиджака, и наподдала ему под зад коленом. Он обернулся с криком «Сука!» и кинулся на нее, но Джонни обхватил его сзади и швырнул на кирпичную склизкую стену. Тот стал медленно сползать по стене. Другой выхватил нож, третий погнался за Элизабет, но поскользнулся и шмякнулся в грязь. Рядом с ним упал нож, выбитый Джоном у противника, а вслед за ножом полетел и его владелец, сраженный прямым ударом в челюсть. «Браво, Джонни!» — завизжала Элизабет и бросилась ему на шею. «Спешишь», — пробормотал Джон и оказался прав: на его шею нашелся еще один претендент. Итальянец, отлипнув от стены, мокрыми пальцами сдавил ему горло.</p><p class="p1">Джон захрипел, извиваясь в руках недобитого итальянца.</p><p class="p1">«Нож!» — мелькнуло в голове Элизабет, она бросилась на цементный пол, нашаривая в воде рукоятку или лезвие. Джон, схватив противника за волосы, тщетно пытался перебросить его через себя. Элизабет схватила нож и с криком «Держись, любимый!» с размаху вонзила его в задницу душителя. Тот взвыл и, закружившись на одном месте, принялся изрыгать самые страшные итальянские ругательства. Резко выдернув нож, Элизабет изготовилась к повторной атаке, но это уже не понадобилось. Жутко завывая и закрыв, постыдную рану, мафиози драпанул с поля боя. За ним потянулись и остальные, ибо южанам положено бегать от северян.</p><p class="p1">— Победа! — заверещала Элизабет, бросая окровавленный нож и в избытке чувств рванув на груди сорочку. — Мы победили, Джонни! Смерть макаронникам!</p><p class="p1">Джон сопел и силился улыбнуться.</p><p class="p1">Выглядел он, прямо сказать, не лучшим образом. Фрак клочьями свисал с плеч, бабочка улетела безвозвратно, пуговицы с сорочки осыпались. Хорошо еще, что в эту минуту Элизабет не видела себя: цилиндр остался далеко позади вместе с последними остатками благоразумия. Мокрая разодранная ткань плотно облегала соски. Глядя на нее, Джон быстро приходил в себя.</p><p class="p1">То, что он окончательно стал походить на себя прежнего, подтвердилось незамедлительно. Он положил ей руки на плечи, притянул к себе и поцеловал так, как никогда прежде, — но как поцеловал ее Фредди Макгоул, ее одноклассник, в день когда он впервые избил оскорбившего ее верзилу из соседней квартиры. Тогда он впервые решился поцеловать ее, но был еще чрезвычайно раззадорен дракой и слишком возбужден — не так возбужден, как обычно предполагается в таких ситуациях. Поцелуй был слюняв. Да, надо отдать ему должное, — он был слюняв, но горяч, и горячее прерывистое дыхание другого существа впервые обжигало ее полуоткрытые губы. Они сильно стукнулись зубами, Фредди неумело попытался просунуть язык ей в рот и щекотно проводил им по небу, и еще полчаса она, сама не слишком опытная в таких делах, учила его целоваться. Так и здесь. Она взяла инициативу на себя и принялась ответно целовать Джона — сначала осторожно, нежно прикасаясь губами к его разбитой верхней губе, осторожно слизывая кровь, осторожно гладя волосы, — потом, склонив голову набок и закрыв глаза, с жадностью и страстью, с отчаяньем и безумной надеждой, прерывисто дыша, не отрываясь... Задохнувшись, она на секунду отстранилась и пьяными глазами поглядела на него:</p><p class="p1">— Я люблю тебя! — кричала она. — Как я люблю тебя Джонни! Я — люблю — тебя!</p><p class="p1">Словно рыба, бившаяся на берегу и брошенная обратно в воду, она ловила ртом холодные капли и брызги, ныряла в объятья как в волны...</p><p class="p1">— Джон, я — люблю — тебя!</p><p class="p1">Джон смотрел на нее загадочно.</p><p class="p1">— Волной цунами смыло сумасшедший дом, — зашептал он. — Все врачи и психи погибли. В живых остались лишь два пациента: из мужской и женской палаты. Нездешняя сила швырнула их в канализацию. Они впервые увидели друг друга.</p><p class="p1">— Нет, Джон, — пролепетала Элизабет. — Они уже виделись однажды. Она глядела на него из окна, когда он избивал — старшую сестру на прогулке...</p><p class="p1">Эту суку, — шептал Джон.</p><p class="p1">— ...эту гадину, которая измывалась над ней и отбирала искусственный член. И она полюбила его!</p><p class="p1">— Искусственный член? — выдохнул Джонни.</p><p class="p1">— Да нет же, — расхохоталась Элизабет. — Тебя, дурака!</p><p class="p1">— И вот, смытые в канализацию, они глядят друг на друга...</p><p class="p1">Белый косой луч проникал в подвал, где они стояли. Вода хлестала по ступенькам. В белом луче, в смутном полумраке подвала лицо Джонни было темным, разбитые губы чуть шевелились:</p><p class="p1">— Они глядят друг на друга и чувствуют, что еще немного...</p><p class="p1">— И их смоет потоком дерьма! Я угадала?</p><p class="p1">— Ты угадала, Элизабет! И они понимают, что выход есть только один: насладиться друг другом как можно скорее!</p><p class="p1">— Он расстегивает брюки...</p><p class="p1">— Она скидывает наконец эту долбаную рваную блузку...</p><p class="p1">— Но ей холодно!</p><p class="p1">— Но он ее согреет, а блузка и так хоть выжми...</p><p class="p1">— Он целует ее, и немедленно...</p><p class="p1">— Но и не быстро...</p><p class="p1">Его слова перешли в постаныванье, — сначала ироническое, затем и самое настоящее, она знала этот короткий стон, с которым он входил в нее, проникая резкими короткими толчками. Она раздвинула ноги. На ней оставались только ботинки, дурацкие ботинки яппи.</p><p class="p1">Джон, казалось, ничего вокруг себя не замечал. Вода хлестала, холодные брызги обдавали ноги Элизабет до колен. Джон прижался к ней всем телом, подхватил под ягодицы, поднял, и она уперлась ногами в противоположную стену, а спина ее прижималась к холодному, шершавому кирпичу. Она не замечала ничего, отдаваясь столь полно и самозабвенно, что каждая клеточка ее тела растворялась, казалось ей, в этом кирпиче, потоке, луче белого света в водяной пыли. Джонни покусывал ее плечи и шею. Ом двигался быстро, лихорадочно. содрогаясь всем телом. Ее ноги скользили, цепляясь за выбоины и выщерблины на стене. Он удерживал ее на весу, проникая в нее так глубоко, как никогда прежде, задыхаясь, торопя наслаждение. Она выгибалась, охватывая его шею, стараясь прижаться к нему еще плотней, еще плотней. Плеск воды, лихорадочная частота дыхания, и запрокинутая голова. Это длилось, длилось, не кончаясь, долго, бесконечно долго, его пылающее лицо, его руки, его плечи, острое, растущее блаженство, растворение друг в друге, захлеб, задыхание, плеск.</p><p class="p1">Извержение — извержение любви, воды, света.</p><p class="empty-line"/><p class="p1">— Мы должны завтра же избавиться от своей старой обстановки.</p><p class="p1">— Новая жизнь?</p><p class="p1">— Обновление вообще необходимо. И как можно чаще. Перемена декораций, полный поворот кругом. Мне надоела эта кровать.</p><p class="p1">— У тебя же с ней столько связано!..</p><p class="p1">— Больше, чем ты думаешь. Ты.</p><p class="p1">— Ну вот! А ты говоришь — менять мебель.</p><p class="p1">— Чем больше кроватей будет с тобой связано. — сказал он. приподнимаясь на локте и улыбчиво рассматривая ее, — тем лучше.</p><p class="p1">Она изучала его сквозь полуприкрытые веки, стараясь, как всегда, понять, насколько он серьезен.</p><p class="p1">— И на сколько еще кроватей, по-твоему, нас хватит?</p><p class="p1">Он улыбнулся еще загадочней.</p><p class="p1">— Это будет зависеть только от скорости, с какой мы будем их менять.</p><p class="p1">Она сладко потянулась, закинув руки за голову. Он поцеловал ее подмышку. Элизабет засмеялась от радости и щекотки.</p><p class="p1">— Ты щекотный. — пожаловалась она.</p><p class="p1">— Ты не знаешь, где можно купить хорошую кровать?</p><p class="p1">Когда–то он так же щекотал ей ухо своим шепотом. И что–то там было, связанное с кроватью, при чем–то тут была кровать...</p><p class="p1">Его фотографии а столе. Пистолет. Его звонок. Голос по телевизору...</p><p class="p1">— Джонни! Я знаю такой магазин! Дешево и, в общем, вполне прилично. На этой кровати могло бы уместиться еще пять пар!</p><p class="p1">— Кстати! — Он явно загорелся идеей, — Свежая мысль. Об этом стоит подумать.</p><p class="p1">— Тебе уже не хватает меня? — Она раздумывала, обидеться или нет.</p><p class="p1">— Перемена обстановки только к лучшему. Я же говорил. Это как спектакль: его нельзя играть в одних и тех же декорациях.</p><p class="p1">— Ты серьезно?</p><p class="p1">— Успокойся, — он рассмеялся. — Не более, чем всегда.</p><p class="p1">Но два следующих дня ей все равно отчего–то казалось, что с покупкой этой кровати переменятся не только декорации. Она знала, что это глупо. Но ничего не могла с собой поделать — ни взять себя в руки, ни махнуть на все это рукой, ни заставить себя пойти в магазин, — она откладывала этот поход, как могла, и могла до тех пор, пока на третий день не поняла: или она увидит Джонни и сделает все, как он хочет, или у нее так и будет все валиться из рук, порвется новое платье и окончательно выйдет из строя кухонный комбайн.</p><p class="empty-line"/><p class="p1">Сначала они пошли в ювелирный отдел.</p><p class="p1">Джонни выбирал цепочку так же придирчиво и умело, как две недели назад присматривал платье, и точно так же не советовался с ней — только подносил цепочки к ее шее, отстранялся, рассматривал, клал на прилавок. Выбор его остановятся на крупнозвенчатой, но тонкой, ажурной золотой цепочке, достаточно длинной. чтобы свободно лечь на не хрупкие ключицы.</p><p class="p1">— Пожалуй, эта, — сказал он, но опять–таки не ей, себе.</p><p class="p1">Сумма была такой, что выражать недовольство было бы непозволительной бестактностью. Элизабет чувствовала себя и так неловко при любопытствующих покупателях и снисходительно улыбающемся продавце. Джон с улыбкой выложил деньги. Потом он аккуратно забрал сдачу и спрятал ее в потрепанный бумажник.</p><p class="p1">— Хочешь, купим тебе новый бумажник? — спросила она.</p><p class="p1">— Не люблю новые бумажники.</p><p class="p1">— Но ты же любишь перемены?</p><p class="p1">— Не во всем. С этим у меня связаны воспоминания.</p><p class="p1">— А ты суеверен. Разбогател с этим бумажником и боишься, что разоришься с другим?</p><p class="p1">— Ты опять меня подменяешь собой. Мои денежные дела не зависят от случайностей. Просто — привычка.</p><p class="p1">— А ко мне?</p><p class="p1">— Девочка моя, когда ты дойдешь до состояния этого бумажника, чего я постараюсь не допустить, я подумаю над твоим предложением. Но пока ты выглядишь у меня как новенькая.</p><p class="p1">Что ему понадобилось в отделе сувениров? Он безошибочно направился к витрине, где продавались маски и костюмы, театральный антураж, забавные вещицы, предназначавшиеся не для использования, а для любования или игры.</p><p class="p1">Там он выбрал вещь настолько странную, что в ее голове никак не укладывалось, какую пользу или радость можно из нее извлечь.</p><p class="p1">Гибкий охотничий стек свистнул в воздухе. Джон пробовал его шутя, играя, становясь то в одну, то в другую позу; потом поднял глаза на нее:</p><p class="p1">— Ну, как?</p><p class="p1">— Обворожителен. Ты решил купить собаку?</p><p class="p1">— Зачем. У меня уже... — Он замялся. — Годы не те, чтобы с ней бегать по утрам.</p><p class="p1">Она вспомнила о близнецах, бегающих с собакой каждое утро около ее дома. Да, Джонни в этой ситуации представить себе трудно. Скорее уж собака бегала бы за ним, как собака. А он за ней... Нет, разве что собака сумела бы совсем заморочить ему голову обещаниями веселых перемен.</p><p class="p1">А стек свистел все резче и резче. Шутки кончились. Глаза Джонни горели не яростью, но веселым, как бы удивленным азартом. А можно, оказывается, и так! И вот так! И вот еще так!..</p><p class="p1">— Я беру, — отдышавшись, бросил он продавцу.</p><p class="p1">Двадцать девять долларов на ветер. Впрочем, ерунда. Если он еще что–то задумал... Как знать? В любом случае его отговаривать бесполезно, и оттого лучше всего имитировать безразличие. У всех свои причуды, а его жизнь вообще состоит из причуд. Иногда очень приятных. Она дотронулась кончиками пальцев до цепочки, которая вначале чуть холодила плечи и шею, но быстро согрелась ее теплом. Элизабет были приятны восхищенные и завистливые взгляды. Смотрите, смотрите! Это мне, мне, а не кому–то другому. И кровать будет мне. И сам он — тоже. И все, что он купит... кроме, надеюсь, стека.</p><p class="p1">— ...Очень даже ничего себе, — сказал Джон, плюхнувшись на кровать. Ни скрипа, ни стона пружин. А ведь он тот еще медведь. Прекрасное приобретение.</p><p class="p1">Пожилая продавщица улыбнулась ему доброжелательно, но Элизабет заметила на ее лице некоторый испуг и неприязнь. Еще бы, каждый такой коала будет приходить и с размаху всем седалищем прыгать на кровать! Впрочем, он не толст. Во всяком случае, это здоровая полнота здорового мужчины, у которого мускулов значительно больше, чем жира. Не дряблый жирок засидевшегося интеллектуала, который гордится своим бессилием, подводя под него философские оправдания. А в постели потеет. Тоже мне. Нет, это была полнота человека, который в юности, должно быть, прыгал в высоту и был чемпионом колледжа, а потом следил за собой, много ходил, ел то, что хотел, и все делал с аппетитом.</p><p class="p1">— Когда мы можем это получить? — оборотился он к продавщице, которая смотрела на него, не отрываясь.</p><p class="p1">— Я думаю, не раньше пятницы. Но для вас, — она подчеркнула это «для вас» с профессионализмом старой продавщицы, знающей, как купить и удержать клиента, — для вас я постараюсь, и вы получите ее не позднее четверга. К которому часу привезти кровать? Оставьте адрес. Доставка входит в стоимость.</p><p class="p1">— Сколько?</p><p class="p1">— Семь тысяч долларов.</p><p class="p1">Элизабет тихонько присвистнула.</p><p class="p1">— Лемур, — шепнула она, наклоняясь к его уху, — а куда же мы денем старую? Поставим на эту? Или пристроим под нее?</p><p class="p1">— Сдвинем вместе, а там посмотрим, — может быть дождемся Нового года и по обычаю выкинем из окна.</p><p class="p1">Элизабет усмехнулась. Она представила себе, как их старая, вполне еще хорошая, много всего пережившая кровать выпадет из окна и полетит на морозную улицу. Из тепла, из родной комнаты, где она была нужна, незаменима, любима, где на ней любили, где утыкались в нее лицом, — полетит, ничего не подозревая, ни к чему не готовая, вниз, в холод... Или нет. Разумеется, она будет к этому готова. Потому что новая кровать будет ей страшно хамить. Молодость беспощадна. А старуха каждый вечер будет надеяться, что лягут именно на нее. И она опять почувствует содрогания и торопливую жадность любящих, которым все равно никогда не слиться до конца.</p><p class="p1">Господи, остановила себя Элизабет, что это со мной?! Она на секунду представила себе, как Джонни с ее помощью — если, конечно, никуда не денется до Нового года, вот ведь проклятая мнительность! — пропихивает кровать в окно. Какая чушь! И потом — неужели неистребима эта сентиментальность, эта детская жадность к вещам, а вернее — жалость к вещам? Она с детства была страшно привязчива, привязывалась в том числе и к игрушкам, и к обстановке, и к прежним квартирам, — так что когда кукла падала, она поднимала ее и целовала ушибленное место. Ей и посейчас бывало мучительно жалко любимых, а то и просто принадлежавших ей вещей. Чужих вещей она не любила: всегда боялась, что несчастья, когда–то случавшиеся с владельцами, теперь могут передаться ей, произойти и у нее. А свои вещи, наоборот, она не любила дарить или терять — особенно в последнее время, когда они могли передать другим толику ее удачливости. Или Джонни. Или надежду.</p><p class="p1">Сколько можно думать о всякой ерунде? Ведь за все эти слезоточивые размышления Джонни может ее возненавидеть рано или поздно. Как он еще терпит ее, за что?</p><p class="p1">— Именно за это, — услышала она его голос.</p><p class="p1">Что за мистика?!</p><p class="p1">— Именно за это я и плачу, — повторил он, обращаясь к продавщице. Элизабет, задумавшись, прислонившись к колонне и заложив ногу за ногу, пропустила весь разговор.</p><p class="p1">— И, пожалуйста, все вместе. В комплекте. И белье, и этот... Ну как это называется... ну прыгает, прыгает... Пружинный матрас!</p><p class="p1">— Вы разве не хотите все это выбрать сами?</p><p class="p1">— Нет, вполне полагаюсь на вас.</p><p class="p1">Старушка не скрыла изумления: платить такие деньги и во всем полагаться на продавца? Нет, конечно, со своей стороны... их фирма... их известность... мы существуем уже около полувека, сударь... тем не менее, я польщена...</p><p class="p1">— Так вы твердо решили, что покупаете?</p><p class="p1">— О да, — Джон, улыбаясь, склонил голову, затем обернулся к Элизабет. — Дорогая, ты ведь всю жизнь мечтала о такой кровати?</p><p class="p1">— С тех пор как себя помню, — твердо ответила Элизабет, прикусив губу, чтобы не рассмеяться,</p><p class="p1">— Ну, это недавно, — заметил Джон. — Со вчерашней ночи, не правда ли?</p><p class="p1">Старушка захихикала.</p><p class="p1">— Даю вам слово, — поддержала она беседу, — что в четверг покупка будет вам доставлена.</p><p class="p1">— Неужели? — вежливо переспросила Элизабет.</p><p class="p1">— О, конечно! Бывает, что мы доставляем в пятницу, но я вам даю слово, что это случится в четверг.</p><p class="p1">— А почему? Я слышала, обычно постели доставляются по пятницам? — поинтересовалась Элизабет.</p><p class="p1">— Ну, это так естественно, — заулыбалась старушка, — перед уик-эндами... чтобы как следует отдохнуть!</p><p class="p1">— Я попрошу вас, — важно произнес Джон, — доставить нам все вместе: и белье, и пружинный матрас.</p><p class="p1">— О да! Причем в четверг, а не в пятницу.</p><p class="p1">— И знаете, — Джон задумался, — нужны еще четыре большие подушки.</p><p class="p1">— Какие? — старушка наморщила лоб. — С пуховой или синтетической набивкой?</p><p class="p1">— Я предпочитаю, — Джон был серьезен как Ротшильд, покупающий пуговицу для подаяния нищему, — м-да, я предпочитаю пух. Пух — он мягкий.</p><p class="p1">— О да! Прямо в четверг...</p><p class="p1">— Пух желательно в среду. И еще, — он изобразил мучительное сомнение, — мне совершенно необходим тикающий звук.</p><p class="p1">— О, конечно, — старушка была сама услужливость, — если вам нужны часы, то выбирайте, есть любые...</p><p class="p1">— Вы меня не поняли, — строго проговорил Джон, — я говорю о матрасе. Понимаете, мне нужно, чтобы матрас тикал. Причем уже во вторник.</p><p class="p1">— То есть завтра? — ужаснулась продавщица.</p><p class="p1">— Боюсь, что даже завтра будет уже поздно, — с грустью произнес Джон. — Вот придем мы сегодня с нею домой, — он кивнул на Элизабет, — разденемся, ляжем отдыхать, разложим на полу всю мою коллекцию пуховых подушек... М-да, начнем совершать некое любовное действо, такой, знаете, набор банальных движений... вперед-назад, вжик-вжик... и будет все — стоны, объятия, слезы, но, — он стукнул себя кулаком по груди, — тикающих звуков не будет! Это невозможно вынести! Любовь длится, а время не идет! Согласитесь, это ужасно?</p><p class="p1">— Выберите, пожалуйста, цвет подушек, — прошептала старушка, испуганно поглядывая на Джона. — А матрас... матрас мы поищем... Это все?</p><p class="p1">— Да, пожалуй, — он уверенно подошел к постели и присел на белоснежное одеяло. — Дорогая, — обратился он затем к Элизабет, — подойди, пожалуйста, ко мне. Так. Сядь рядом, пожалуйста.</p><p class="p1">Она осторожно села рядом.</p><p class="p1">Джон прилег, придирчиво, но благожелательно поглядывая на нее.</p><p class="p1">— У тебя красивые ноги. Не правда ли, у моей спутницы очень красивые ноги? — отнесся он к продавщице.</p><p class="p1">— Да, — пролепетала она.</p><p class="p1">— И какие славные пальцы ног. Не правда ли? А вы не станете возражать, если Элизабет ляжет на постель? Элизабет! Тебе разрешено лечь.</p><p class="p1">— Пусть ляжет, конечно, — проговорила старушка. — Это одна из самых популярных наших моделей...</p><p class="p1">— Но не самая популярная?! — ужаснулся Джон.</p><p class="p1">— Джонни, — Элизабет смущенно глядела на него, медленно ложась рядом, — это — самая лучшая модель.</p><p class="p1">— Ух, — он облегченно перевел дух, — а то я было испугался... как же так... кровать не лучшая, матраса тикающего не докричишься...</p><p class="p1">Он лег рядом с Элизабет, поглаживая ее по плечу, по туловищу, по бедрам...</p><p class="p1">— Тебе удобно? — спросил он.</p><p class="p1">— Удобно, милый. Все хорошо. Пойдем?</p><p class="p1">— А в изголовье удобно? Пух не слишком твердый? Ягодицам мягко? Горошины никакой под собой не ощущаешь?</p><p class="p1">Элизабет надоело сдерживаться и смущаться. Она от души рассмеялась.</p><p class="p1">— Горошина не беспокоит, дорогой. Она такая мягкая, Джонни... словно из пуха.</p><p class="p1">— Хорошо, — успокоился Джон. — Теперь, пожалуйста, раздвинь ноги.</p><p class="p1">— Зачем?! — она опять стала испытывать неловкость.</p><p class="p1">— Раздвинь ноги! — тоном приказа произнес он. — Да никто не смотрит! Вы ведь не смотрите, верно?</p><p class="p1">Старушка с ужасом глядела на Элизабет. Та опять рассмеялась.</p><p class="p1">— Так мягко? — он провел ладонью по ее ляжке. — И мне мягко. Хорошая постель, — с удовлетворением отметил Джон. — А так хорошо? А так? А если...</p><p class="p1">Элизабет, покраснев и часто дыша, вскочила с кровати.</p><p class="p1">— Так значит, в пятницу? — Джон, смеясь, тоже поднялся с постели.</p><p class="p1">— В пят... нет, в четверг. — Старушка взяла себя в руки и с достоинством отчеканила: — Я лично гарантирую, что товар будет доставлен вам в четверг.</p><p class="p1">Ответом на ее слова был бешеный визг Элизабет.</p></span></span>
