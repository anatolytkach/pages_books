<span><span id="id4"><div class="title2">
<p class="p"><strong>III</strong></p>
</div><p class="p1">Эта девушка лежала на спине в ожидании любви, шли годы, небо над ней было серым и безжизненным... она лежала, раздвинув ноги, никто ее не покупал. Странная девушка с картины Эрла. Чем–то она отпугивала всех покупателей — то ли тупым и безнадежным ожиданием своим, то ли нелепой, откровенной позой. Где вешать картину с этой несчастной бабой? В гостиной, нагоняя тоску и уныние на добропорядочных гостей? В спальной, отбивая у людей охоту к продолжению рода? В детской? В уборной? Критики высоко оценивали эту картину, но и они не желали ее покупать, ссылаясь на безденежье. Оставалась надежда на дурака, который ни черта не смыслит в искусстве, но и по дурости своей плюет на гостей, детей, да вообще на весь мир. Дураков много, да надежда невелика.</p><p class="p1">Дурак пришел с утра со своей дурацкой собакой. Дурак улыбался, собака скалилась. Обоим, кажется, не слишком везло в жизни. Зато в живописи понимали одинаково. Оба, склонив головы, переминались перед Элизабет, важно, высунув языки, переходили от картины к картине, пока наконец не добрались до «Ожидания». Дурак задумался. Пес прикусил язык. Оба поглядели на Элизабет.</p><p class="p1">— Это... — сказал человек, — а вот, как бы даже, что–то ведь вообще, да?</p><p class="p1">— Простите? — переспросила Элизабет.</p><p class="p1">— Ну, — человек дернул поводок, и пес нервно тявкнул, — это... ведь даже, может, она вот, да?</p><p class="p1">— Шедевр, — подтвердила Элизабет.</p><p class="p1">— А вот, — разговаривал человек, — это... трудно вообще, да?</p><p class="p1">— Двадцать тысяч долларов, — сообщила Элизабет.</p><p class="p1">Человек выкатил глаза и попятился от нес. Пес испуганно зарычал.</p><p class="p1">— А вот, — произнес кто–то из них, — уж если как–то... это, а?</p><p class="p1">— К сожалению, это цена — твердая, — вздохнула Элизабет.</p><p class="p1">— Да ведь баба! — закричал человек. Собака облизнулась. Элизабет подмигнула ей. Пес вздохнул и потянул за собой хозяина.</p><p class="p1">...Уборщики подметали пустую галерею. Зачем, спрашивается, они ее подметали? Сорить было некому. Фигуративизм, фовизм и импрессионизм, вместе взятые, неспособны были привлечь никого, кроме трех молчаливых японцев и одного старика-пенсионера, которому негде было переждать дождь. Еще забежала парочка, которая прыскала около ошейника верности, в задумчивости рассматривала «Депрессию №5», стараясь отыскать некую Депрессию — видимо, иностранку — в хаосе спиралей и овалов, и откровенно потешалась над «Парижским утром», которое по колориту и настроению мало чем отличалось от нью-йоркского вечера. Элизабет нимало не огорчалась тому, что до сих пор ничего не было продано. В душе она жалела Эрла, но не придавала значения таким пустякам, как малое количество посетителей и их низкий культурный уровень. Мысли ее то и дело возвращались к вчерашнему вечеру. Не только глаза и уши — все ее тело помнило каждое прикосновение, каждое движение Джона, помнило все, до последней дрожи, до последнего мига, когда она вдруг разревелась, как дура, и счастливо, легко выплакалась за все пять последних лет.</p><p class="p1">И утро, когда Джон не хотел просыпаться и сонно ворочался в кровати, не в силах продрать глаза и отпихиваясь в ответ на ее тормошения и подначки.</p><p class="p1">— Джон! Ну Джонни! Ну щенок несчастный!</p><p class="p1">— У нашей Мэри был щенок, имевший нечто между ног...</p><p class="p1">— Лемур сонный, ленивец несчастный!</p><p class="p1">— У нашей Мэри был лемур, он часто делал с ней лямур...</p><p class="p1">Она и сейчас хохотала. И когда, сияющая, она выбежала из галереи, еле дождавшись пяти часов вечера, — уборщики понимающе переглянулись.</p><p class="p1">— Догадываешься, куда она навострилась?</p><p class="p1">— Да, сейчас этой девочке будут показывать другие картинки…</p><p class="empty-line"/><p class="p1">Она была у него сегодня впервые, и все ее интересовало.</p><p class="p1">— Я могу присесть?</p><p class="p1">— Разумеется, не можешь. Так и будешь стоять столбом, пока не упадешь.</p><p class="p1">— Не дождешься. Слушай, у тебя так много телевизоров... Зачем?</p><p class="p1">Не отвечая ей, он выдвинул пульт управления одного из телевизоров, стоявшего на полке шкафа, и принялся нажимать кнопки. Первый, пятый, двенадцатый канал... Что он ищет? Элизабет еще не видела у него такого выражения лица: как всегда, снисходительное — есть ли на свете хоть что–нибудь, к чему он не снисходит?! — но и слегка досадливое, серьезное, словно мысли его в ту минуту вращались вокруг не слишком приятной, но неизбежной работы.</p><p class="p1">— Мой дядя, — сказала Элизабет, глядя на Джона снизу вверх и покачивая ногой (краем глаза этот лемур умудрялся–таки следить за ее ногой, за шлепанцем, повисшим на пальцах и готовым сорваться, за пяточкой в черном чулке). — Мой дядя умер, когда смотрел телевизор. У него было три телевизора. Хотела бы я знать, сколько их у тебя?</p><p class="p1">— Спасибо тебе, моя радость, за сравнение и предсказание.</p><p class="p1">— Нет, ну что ты, Джон! Он смотрел только спорт. Любой вид спорта. Три телевизора и радиоприемник. Представляешь? У тебя же нет радиоприемника, так что ты умрешь от чего–нибудь другого. От жадности, например. — Она подошла к нему сзади, предварительно скинув шлепанцы и оттого ступая бесшумно. Джон изучал курс акций, возникавший на экране по мере нажатия каких–то кнопок на пульте. Ни в кнопках, ни в акциях она как следует не разбиралась.</p><p class="p1">— Это и есть твоя работа, Джонни?</p><p class="p1">— Видишь ли, не всегда приходится заниматься только тем, что нравится. Иначе, кроме игр с тобой, бы ничем не занимался. — Он повернулся к ней, намереваясь поцеловать, но она отскочила назад, и он только едва скользнул губами по ее щеке.</p><p class="p1">— А дядя умер от инфаркта во время Олимпиады 1976 года, — сказала Элизабет и замолчала, усевшись назад в кресло и вытянув ноги. Ей нравилось в этой квартире: нравилось огромное окно, минимум мебели, картинка на стене. Картинка изображала толстого черного кота, весьма довольного собой, с подписью «До работы», и рядом — несчастного, неузнаваемо похудевшего, в каплях пота и клочьях шерсти, с подписью «После работы». Слава Богу, Джонни больше походил на первого кота. Даже, — она усмехнулась, — даже после любви. Да и вряд ли что–то способно вывести его из равновесия и сбить эту вечную самодовольную улыбочку... вот хоть и сейчас.</p><p class="p1">— Какой дядя? — рассеянно спросил он.</p><p class="p1">— Дядя Чарли, — с некоторым удивлением сказала она (какой еще может быть дядя?) — Он жил всегда один, в своем трехэтажном доме в Калифорнии, даже прислугу не держал. В юности он играл в бейсбол за «Черных Медведей». Тебе интересно, милый?</p><p class="p1">— Ему чуть не оторвали ногу, и он ушел из большого спорта, — отозвался Джон, зевнув. — Безумно интересно.</p><p class="p1">— Что ты, милый, ему чуть не оторвали голову. Сумасшедший Кларк во втором тайме так вцепился ему в горло, что всей командой оттаскивали...</p><p class="p1">— Иди ко мне.</p><p class="p1">— Нет, это интересно. Так вот, представляешь, он жил в этом своем доме... с тремя телевизорами и радиоприемником. Бегал по дому, как заведенный. От бейсбола к баскетболу и обратно. А умер он, когда русские за секунду до конца матча забросили мяч нашим в корзину. Я иду к тебе.</p><p class="p1">— Постой, — он предостерегающе поднял ладонь. — Не двигайся... нет, двигайся.</p><p class="p1">— Что?</p><p class="p1">— Когда–то я был таким же, как твой Чарли. Подойди ко мне, — в его голосе не было прежней твердости, невозможно было понять, что с ним творится. Он достал из кармана пиджака большой красный футляр, раскрыл его. — Это подарок тебе.</p><p class="p1">— Какие красивые часы!</p><p class="p1">— Всякий раз, как ты посмотришь на циферблат — ровно в 12 — ты будешь вспоминать обо мне. А теперь сделай шаг... еще... еще! — он нетерпеливо щелкал пальцами. — Я хочу посмотреть, как ты ходишь.</p><p class="p1">Она сделала несколько неуверенных шагов.</p><p class="p1">— Нет! — он хлопнул в ладоши. — Ходи естественней, как ты ходишь по улице. Можешь сделать это для меня? Так, чтобы лодыжки чуть задевали друг друга, и улыбайся рассеянно, как будто за поворотом тебя ждет немыслимое счастье, которое на самом деле пристало к тебе только однажды, в китайской лавке...</p><p class="p1">— И стало пожирать глазами...</p><p class="p1">— И уложило в постель...</p><p class="p1">— И подарило часы! — не думая больше ни о чем — ни о дядюшке, ни о походке, — она раскинула руки, подбежала к нему и потерлась своей щекой об его неизменную трехдневную щетину.</p><p class="p1">— Ты знаешь, что раньше гипнотизировали при помощи тиканья часов? — спросила она, оторвавшись от него наконец и чуть отстраняясь, чтобы заглянуть ему в глаза. Джон держал ее за плечи.</p><p class="p1">— Н-не знаю, — произнес он в задумчивости. — Слушай... Я могу задать тебе один вопрос?</p><p class="p1">— Ради Бога. Прочесть тебе таблицу умножения? Или рассказать о детских кошмарах?</p><p class="p1">Он отвернулся, отпустил ее и отошел к стене. Минута прошла в молчании. Он сел на корточки. Она подошла к нему погладила его по голове. Джон прижался щекой к ее колену. Неожиданно для самой себя она быстро сняла чулки. Может быть, ей хотелось чувствовать его прикосновение кожей. Он поцеловал ее коленку и встал.</p><p class="p1">— Ты о чем–то хотел меня спросить, Джонни?</p><p class="p1">— Но ты будешь вспоминать меня всякий раз, как посмотришь на эти часы? Ровно в двенадцать?</p><p class="p1">— Если хочешь, то и в остальные часы тоже.</p><p class="p1">Рыженькая Ингрид — типичная шведка, по-скандинавски аккуратная в работе и преданная мужу, напоминающая молочницу с пакетика сливок, — крикнула ей от телефона:</p><p class="p1">— Элизабет! Тебя! Не Сен-Клер и не Эрл!</p><p class="p1">Элизабет, улыбаясь, бросилась к телефону. В ее движениях в последнее время появилась заметная для всех грация, одновременно чуть томная и вместе с тем хрупкая, почти подростковая.</p><p class="p1">— Да! Да, Джонни! Конечно, подожду!</p><p class="p1">Она прикрыла трубку узкой ладошкой:</p><p class="p1">— Караул! По-моему, меня гипнотизируют.</p><p class="p1">— Элизабет! — послышалось в трубке. — Элизабет! — он вкрадчиво шептал ее имя, протяжно смакуя каждый звук. — Элизабет!</p><p class="p1">— Что ты хочешь мне сказать, ленивец?</p><p class="p1">— Посмотри на часы!</p><p class="p1">Она поднесла к глазам запястье, близоруко и мило сощурилась.</p><p class="p1">— Двенадцать без пяти!</p><p class="p1">— Это ничего. Можешь уже начать меня вспоминать.</p><p class="p1">— Я и не забывала.</p><p class="p1">— В общем, все сдвигается на час, но в остальном остается в силе.</p><p class="p1">Он повесил трубку. Она представила, как Джон медленно изменяет выражение лица. Не может же быть, чтобы он и работал с таким выражением, с каким обычно говорит с ней, — снисходительным, поддразнивающим и нежным.</p><p class="p1">— Чем ты сегодня чистила зубы? — хохоча, спросила Ингрид. — Держу пари, что его кремом для бритья!</p><p class="p1">— Ну вас к черту! Правду говорят, что самый неисправимый цинизм возможен только в женском обществе!</p><p class="p1">— Твой бывший муж звонил, между прочим, — сказала Молли, меняя тон на серьезный и сочувственный. — Приглашал в ресторан. Какой–то он печальный в последнее время.</p><p class="p1">— Молли, детка! Ну я никак не могу! Ну согласись, это бесчеловечно по отношению к нам обоим! — Элизабет прижала к груди кулачки. — Сходи ты сама, ей-богу!</p><p class="p1">— Лиз! — Молли подняла на нее темно-коричневые, абсолютно серьезные глаза.</p><p class="p1">— Правда, сходи!</p><p class="p1">— Ты это... серьезно!</p><p class="p1">— Господи, Молли! Что особенного я тебе предлагаю? Да и потом, мы с Брюсом давно чужие люди. Я вспоминаю его только тогда, когда приходится самой себе отвечать на вопрос: куда я умудрилась деть пять лучших лет жизни?</p><p class="p1">— Хорошо, Лиз, — Молли опустила глаза и принялась перекладывать бумаги на столе. Элизабет сейчас, конечно, только и дела было, что до Брюса. Бедняга Брюс. И, главное, бедняга Молли. В виде компенсации за такое сомнительное удовольствие подарю ей альбом Сера. Или коробку любимых ее бисквитов. Брюс стоит бисквитов. Господи, как было все это возможно, если Джон... что он делал тогда? То же, что и теперь, — поглядывал на мир властно, озорно и снисходительно, и знать не знал об ее существовании, и... но о других лучше не думать. Нет других. Нет никого. Есть он и она. Элизабет засмеялась, подошла к Молли и чмокнула в щеку.</p><p class="empty-line"/><p class="p1">Шеф дал ей набор слайдов с традиционным напутствием:</p><p class="p1">— Посмотри эту чушь и скажи, имеет ли смысл выставлять мазню этого губошлепа в нашем свинарнике!</p><p class="p1">Просмотровый зальчик был в полуподвальном помещении. Крошечный, уютный, на двадцать мест, с проектором и небольшим складным экраном, без окон, он навевал покой и чаще всего сон. Даже кресла, обитые коричневой кожей, здесь взывали ко сну и напоминали о покое. К тому же рассматривая опусы молодых постреалистов, она и в комнате, в самый ясный день могла заснуть, а уж в полуподвале, в темноте, бледно разгоняемой лишь пыльно-голубоватым лучом проектора...</p><p class="p1">Но сегодня ей не хотелось спать. Она долго смотрела слайды, нажимая кнопку на пульте и прощелкивая без малейшего сожаления один слайд за другим.</p><p class="p1">Она была здесь одна, совсем одна. Ей думалось не о слайдах. Думала не только ее голова — думало, кажется, впервые в жизни все ее тело. Памятью каждой клетки она помнила горячую и гладкую кожу Джона, темные курчавые волосы на его груди, его пухлые, неутомимые губы, его едва уловимый, но самый родной для нее теперь запах. Она вспомнила, как его пальцы безошибочно нажимают и поглаживают те точки, те самые заветные уголки ее тела, о которых она не догадывалась и сама. То, как он охватывал губами сосок и прикасался к нему языком — быстро, коротко, и язык его трепетал, как змеиное жало. И то, как медлительно, смакуя каждый жест, он ее раздевал в строгом, ему одному понятном порядке, — оставляя на ней и лифчик, если она его надевала, и блузку, снимая только чулки и трусики... И то, как он любил гладить и целовать ее ступни и голени. И то, как он целовал ее сюда... нет, нет, хватит.</p><p class="p1">Но смотреть на экранчик не было ни силы, ни необходимости. Желание, сильное и непобедимое, как никогда раньше, охватило ее. До встречи с Джоном оставалось три часа. Она зажала руки между ногами, стала поглаживать ноги от бедра до колена. Потом, оглянувшись зачем–то на дверь, словно лишний раз убедившись, что в зальчике она одна, осторожно сняла трусики и спустила чулки до колен. Прохладная, еще не согретая ее телом, чуть липнущая кожа кресла. Она слегка раздвинула ноги и принялась осторожно гладить лобок левой рукой. В правой она по-прежнему сжимала пульт, машинально нажимая кнопку, чтобы менять картинку на экране. Но голова ее была запрокинута, глаза полуприкрыты.</p><p class="p1">Страшное, желтое лицо, жуткая голова, лысая, как бильярдный шар, неотвратимо глядела на нее с экрана. Это была картина одного страхового агента, наконец нашедшего себя в живописи, — «Кошмар 27 июля». Но Элизабет на эту голову не глядела. Она перестала нажимать на кнопку, и голова, никуда не исчезая, продолжала сверлить ее ледяным безумным взглядом.</p><p class="p1">Элизабет дышала неглубоко и часто. Она забылась и перестала преодолевать себя, сдерживаться, следить за собой со стороны. Она думала о Джонни, и все ее тело вспоминало Джонни. Вот и все.</p><p class="p1">...Собственно, никогда, с детства, лет с одиннадцати, когда это впервые пришло к ней, — она не относилась к этому, как к преступлению или к чему–то постыдному. Девчонки в классе называли это «гладить себя». «Ты гладишь себя?» — смех, перешептывание, стыдливость.</p><p class="p1">А когда она после пятого класса год прожила в скаутском лагере, подруги однажды зазвали ее в лес и там проделывали это все вместе. На скорость. Кто застонет и кончит быстрее. Ей и теперь было тошно вспоминать об этом. В последние годы, когда мужчины были не слишком частыми гостями в ее доме, она занималась этим довольно часто, особенно по утрам, когда просыпалась одна. Она умела осторожно возбудить себя так, чтобы забыть об окружающем. Умела нежно защемить сосок большим и указательным пальцем. Умела... Умела все, что умел сделать с ней Джон, но чего, кроме него, никто так не чувствовал и потому дать ей не мог.</p><p class="p1">Она вспоминала, как он начинает — движениями нежными, редкими и неглубокими толчками, словно боясь причинить боль. Как его руки поддерживают ее на весу. Как его губы бродят от ключицы к соску. Но потом, постепенно распаляясь, он проникал глубже, глубже, до боли — самой сладкой боли, которую она знала, — и она всем телом ощущала то страшное напряжение, в которое приходило все его большое, сильное тело. Все мышцы напряжены. Он содрогался, сжимая ее плечи, она откидывалась на подушки. Он замирал.</p><p class="p1">...Она поднесла влажный палец ко рту. Лизнула. Потом расстегнула верхние пуговицы на блузке. Грудь с потемневшим, набухшим соском высвободилась из блузки, и Элизабет осторожно водила пальцем вокруг соска. Пульт выпал из ее левой руки. Что–то в нем замкнулось, когда он ударился о пол, и картинки на экране пошли сменяться с головокружительной быстротой. Серое пустынное поле и огромный одинокий глаз над ним. Буря в пустыне. Угрюмое лицо старика. Молодая толстуха с похотливым, жадным ртом и тупыми глазками. Хаос красных и зеленых пятен. Туши в мясной лавке. Пасмурный пейзаж побережья. Все здесь дышало тоской и тревогой, все предостерегало — казалось, от самой жизни.</p><p class="p1">Элизабет не смотрела на экран. По-прежнему запрокинув голову, она шире расставила ноги, уперлась в пол. Тело ее выгнулось, как тело рыбы на прилавке. Она качала бедрами, движения ее рук были все быстрее, лихорадочнее. Блузка была расстегнута до последней пуговицы. Рот приоткрылся, языком она проводила по пересохшим губам. Блаженство и мука боролись на ее лице.</p><p class="p1">В этом действительно не было ничего стыдного. Один из способов отключиться от мира. Уйти. Одна из разновидностей мечты. Сублимация. Замена несостоявшегося. Утешение. Но сейчас она не искала оправданий. Боже мой, я не думаю вообще. Я уже не прежняя Элизабет. Он сделал из меня животное, которое может водить за собой на поводке. И пусть, пусть...</p><p class="p1">Она вспомнила его неожиданно узкие бедра. Гладкую кожу. Горячие, мягкие ладони, скользящие вдоль тела, к бедрам...</p><p class="p1">Жаркая волна захлестнула ее. Короткий вздох, всхлип. Не открывая глаз, она тяжело, расслабленно опустилась на кресло, потом опомнилась, торопливым движением натянула трусы и чулки и только потом затихла. Дрожь не проходила еще долго. Она действительно ни о чем не думала. Впервые. Ни о чем.</p><p class="p1">Слайды кончились. Желтое пятно света, как единственный глаз, смотрело на нее с экрана. Но она не открывала глаз, склонив голову набок, по-прежнему зажав руки между ног.</p><p class="p1">Шефу она сказала, что картинами вполне довольна, но такую интимную сторону жизни едва ли стоит выносить на всеобщее обозрение. Ее эстетическое чувство вполне удовлетворено, но просмотр картин утомит и эпатирует зрителя. Шеф кивал, не подозревая, до какой степени она была с ним откровенна. Старина Шеф.</p><p class="empty-line"/><p class="p1">Брюс глядел прямо перед собой, шевеля губами и сдержанно жестикулируя. Люди, проходившие мимо в двери ресторана, оглядывались на него. Молли постояла рядом, послушала. Понять ничего было нельзя. Как и всякий человек, разговаривающий сам с собой, Брюс проглатывал окончания слов, а то и целые фразы, поскольку собеседнику и так все было понятно. В тоне его звучал упрек, а то робкая просьба, лицо его непрерывно менялось. Вот он презрительно улыбнулся и вдруг страстно, громко зашептал: «Ты думаешь, что... а мне ничего от тебя не надо, понимаешь, ничего, лишь бы...» Он слепо поглядел перед собой и погрозил кулаком кому–то. Молли это надоело, да и жутковато сделалось. Она тронула его за плечо.</p><p class="p1">— Ты опять опоздала, — произнес он явно заученную фразу, — ты ведешь себя так, как будто мечтаешь выскочить замуж за меня.</p><p class="p1">Молли расхохоталась.</p><p class="p1">— Точно, Брюс, только накорми сперва, ладно?</p><p class="p1">Он с недоумением поглядел на нее.</p><p class="p1">— Молли? Привет. А где же Элизабет?</p><p class="p1">— Элизабет? Она не придет, Брюс. У нее дела.</p><p class="p1">— А ты что здесь делаешь?</p><p class="p1">— Голодаю, я же сказала. — Молли рассматривала Брюса в упор, без улыбки. — Ты пригласишь меня в ресторан? — жалобно спросила она.</p><p class="p1">— Конечно, — он глядел куда–то в сторону, — конечно...</p><p class="p1">— Учти, я не динамщица.</p><p class="p1">— Правда? — он медленно открывал дверь.</p><p class="p1">— Даму пропускают вперед, — сказала она.</p><p class="p1">— Правда?</p><p class="p1">— И предлагают меню.</p><p class="p1">— Вот как?</p><p class="p1">— И охмуряют при помощи белого вина.</p><p class="p1">— Белого?</p><p class="p1">— И отвозят домой на своей тачке. И раздевают. Нет, я не хочу так, я хочу так. Чуточку быстрее. Еще. Еще!.. Ты... лучше всех. Ты хороший.</p><p class="p1">— Правда?</p><p class="empty-line"/><p class="p1">...Молли поглядела в глазок и медленно открыла дверь. Элизабет проскользнула на кухню. Молли вернулась в комнату и нырнула под одеяло. «Я не одна, — крикнула она Элизабет, — не входи, пожалуйста».</p><p class="p1">Элизабет рывком раскрыла дверь.</p><p class="p1">Молли лежала, раскидав волосы по подушке.</p><p class="p1">В руках у нее была пластмассовая кукла, которую она прижимала к груди.</p><p class="p1">Элизабет с облегчением рассмеялась.</p><p class="p1">— Спи.</p><p class="empty-line"/><p class="p1">...Они долго бежали под дождем, взявшись за руки, как дети. Это был последний теплый дождь в году. Так, по крайней мере, сказал Джон. Элизабет скинула туфли. Она была без чулок, в бежевой мини-юбке. Ее ноги разбрызгивали лужи, она не чувствовала холода. Но когда они вбежали в подъезд и поднялись к нему, Джон коснулся ее щиколоток и почувствовал, что они холодны как лед.</p><p class="p1">— Быстро в душ, — сказал он голосом, не предполагающим возражений. — Там белый купальный халат и махровое полотенце, готовые служить тебе верой и правдой.</p><p class="p1">— Я не замерзла, Джонни! Горничная моя, разбери постель!</p><p class="p1">— Разберу, но прежде ты отправишься в душ, грязнуля. Не хочешь же ты с грязными ногами, пробежавшись по городским лужам, лезть в мою чистенькую кроватку!</p><p class="p1">— Но Джонни!</p><p class="p1">— Шагом марш!</p><p class="p1">Она капризно захныкала, и тогда он подхватил ее на руки и отнес в ванную.</p><p class="p1">— Слышишь, толстяк! Напускай поменьше воды! Если ты действительно намерен туда плюхнуться вместе со мной, мы устроим небольшое наводнение. Ты помнишь закон Архимеда?</p><p class="p1">— Слушай, Лиз, я иногда поражаюсь, какая ты умная! Я даже иногда сомневаюсь, действительно ли ты паршивый художественный критик или Мари Кюри!</p><p class="p1">— Закрой воду, Винни-Пух!</p><p class="p1">— Лиз, посмотрю я на тебя лет через сорок! Когда ты станешь отвратительной старухой! Жирной, мерзкой, злобной старухой! Провидение накажет тебя за то, что ты издевалась над бедным Джонни, который никогда не весил больше сотни фунтов! Жирная, ворчливая старуха, гнусно пристающая к прохожим, — он снял брюки, — мерзкая потаскуха, вся в складках, и никто не верит, что когда–то она была такой сушеной рыбиной, как ты сейчас! — Он плюхнулся в воду, разбрызгивая небольшой фонтан, и хвойная, зеленая вода поднялась почти до бортиков ванны. — Подвинься, стерва!</p><p class="p1">Он сидел теперь напротив нее и улыбался непостижимой своей улыбкой. Она долго, не отрываясь, смотрела в его желто-зеленые глаза. Подняла из воды мокрую руку. Провела по его щекам и губам. При его росте ему приходилось сидеть по-турецки, поджав ноги.</p><p class="p1">Элизабет забыла о тех временах, когда стеснялась наготы. Нет, перед собой — никогда: она знала, что хороша. Но перед другими, даже перед Брюсом... Но теперь осталось только восхитительное чувство свободы.</p><p class="p1">Джон чуть наклонился вперед. Она почувствовала, как его рука гладит ее колени, потом бедра, потом...</p><p class="p1">— Что ты там ищешь, хотела бы я знать?</p><p class="p1">— Постигаю бесконечность.</p><p class="p1">— С какой это стати ты стал так любознателен? Оставь бесконечность в покое!</p><p class="p1">— Скажи спасибо, что я пока постигаю ее разумом, а не чувством!</p><p class="p1">— Ах ты развратник! Сейчас твое чувство будет ущемлено! — и она потянулась рукой к тому, что он так изысканно назвал чувством, и осторожно погладила кончиками пальцев. Он любил эту робкую, застенчивую ласку, ее легкие руки, ее осторожные объятия.</p><p class="p1">— Чувство мое при виде тебя возрастает неимоверно!</p><p class="empty-line"/><p class="p1">В белом махровом халате, доходившем ей почти до пят, в белых носках из плотной, но мягкой ткани она сидела на кровати и неотрывно глядела на него. Это было то выражение, которое он хорошо знал, — выражение лица, которое бывает только у любящей женщины. Действительно любящей, забывшей обо всем, о чем большинство женщин помнит даже в самые счастливые минуты: о том, как она выглядит, о том, чем все кончится, о том, как полнее завладеть мужчиной и ловко удержать его. Он и это знал и привык не обольщаться, но здесь все было серьезнее. Она смотрела на него с тем отчаянием, с той безнадежной, тоскливой, беззащитной нежностью, которую он видел в своей жизни только раз, и об этом лучше не вспоминать. Господи, говорил ее взгляд, что с нами происходит, что делается, и что нам делать теперь?</p><p class="p1">— Лиз, — прошептал он. Он сам почти забылся в эту секунду. Почти.</p><p class="p1">Он наклонился к ее губам. Нижняя губа с ложбинкой. Мягкие губы влюбленной женщины. На секунду ему стало страшно.</p><p class="p1">Со своим поразительным тактом, которому он не переставал изумляться, — нет, нет, все–таки в его руки попало сокровище! — она спасла положение, и он снова обрел почву под ногами.</p><p class="p1">— Я умираю от голода. Слышишь?</p><p class="p1">— Господи! Сейчас, только не вздумай ходить на кухню. Это священнодействие, тайна. Не будь любопытна, и послушание твое будет вознаграждено.</p><p class="p1">Он вышел. Она остановилась посреди комнаты, пробормотала «Тайна... А почему, собственно, тайна?» — и бесшумно, в одних носках, его носках, которые ей страшно велики, прокралась на кухню. Он резал перец, насвистывая тему из «Челюстей».</p><p class="p1">— Ты любопытна, — сказал он, не поворачивая головы.</p><p class="p1">— Я соскучилась, — призналась она, вздохнув. — Ты почему бросил меня одну, Джон?</p><p class="p1">— Закрой глаза, — сказал он.</p><p class="p1">— Оставил одну, совсем одну, — жаловалась Элизабет, — одну в пустой комнате, я там хожу, хожу... одну секунду хожу, другую секунду хожу... три секунды хожу! — ее глаза округлились от ужаса. — Представляешь, Джонни, три секунды без тебя хожу, одна, в белом махровом халате и в жутких, спадающих носках! — Она схватилась за голову. — В чужих носках, в разлуке с любимым! Наконец, я не выдерживаю этой страшной муки... бреду на кухню к своему ненаглядному, и что же я вижу?</p><p class="p1">Джон, склонив голову, с улыбкой глядел на нее.</p><p class="p1">— Что же ты видишь, дорогая... говори скорей, я сгораю от любопытства.</p><p class="p1">— Я вижу любимого, — строго сказала Элизабет и погрозила пальцем. — Любимый с мокрыми волосами стоит и вовсе не думает обо мне. Он... ты не поверишь, Джон, что делает этот негодяй...</p><p class="p1">— Он изменяет тебе?</p><p class="p1">— Хуже, Джон, гораздо хуже. Этот жулик, этот уголовник с темным прошлым и безысходным будущим... нет, я не могу об этом говорить, Джон!</p><p class="p1">— Я, кажется, догадываюсь, дорогая, что делает этот мерзавец. Он... режет... перец?</p><p class="p1">Элизабет задохнулась в беззвучном крике. — Он режет перец, Джон! Сволочь, правда? И запрещает мне подглядывать за ним. У него от меня тайна, Джон! Что мне делать?</p><p class="p1">— Закрой глаза, Элизабет, — сказал он.</p><p class="p1">— Джон, — вполне серьезно произнесла Элизабет. — Меня, право, начинает это смущать. Что ты там вытворяешь, пока я, как дура, сижу с завязанными глазами?</p><p class="p1">— Разве тебе это неприятно? Ново, конечно, но где–то в самой глубине души, — разве ты не хотела этого? Разве, когда ты не видишь меня, тебе не кажется, что я... как бы везде? Потому что неизвестно, что я сделаю в следующую секунду... И вообще. Разве это не увлекательно, что я положу тебе в рот в следующий раз?</p><p class="p1">— В принципе я догадываюсь...</p><p class="p1">— Ты ни о чем не догадываешься. Завяжи глаза, или не получишь даже того, что имеешь в виду.</p><p class="p1">— Джонни...</p><p class="p1">— Да, дорогая?</p><p class="p1">— Ты... короче, если ты хочешь уйти... — Она была абсолютно серьезна, и он заметил, что глаза у нее на мокром месте. — Если ты собираешься уйти, то лучше сделать это в ближайшее время, пока... — Ее голос дрогнул. — Пока я не привыкла.</p><p class="p1">— Элизабет, — сказал он мягко. — Элизабет, я люблю тебя. Завяжи глаза, детка. Или я слопаю все это один, с меня станется.</p><p class="p1">— Оно и видно, — сказала она с интонацией провинившейся школьницы. Вздохнула. Запахнула халат, перед этим намеренно распахнув его, но не слишком — ровно настолько, чтобы ее грудь и живот на миг мелькнули перед ним. — Завязывай мне глаза и клади в рот что захочешь.</p><p class="p1">Он подошел к ней — так же медленно, крадучись, как прежде, у нее дома. Завязал глаза салфеткой.</p><p class="p1">— На пол, на пол!</p><p class="p1">— Джонни, ты сошел с ума!</p><p class="p1">— Ну хорошо, так и быть. Вот тебе табуретка.</p><p class="p1">Он придвинул ей стул, несколько раз делал вид, что сажает мимо, но наконец она угнездилась в углу, у стола. Пальцы ее, тонкие, почти детские пальцы, шарили по столу, цеплялись за его край. Чувствовалось, что эта игра не столько забавляет, сколько пугает ее и этим, может быть, особенно обостряет чувство.</p><p class="p1">— Ты будешь есть, не открывая глаз, — сказал Джон. Она почувствовала во рту ягоду. Он думает накормить ее ягодами? Хотелось бы чего–нибудь поосновательней... Она раскусила ягодину: маслина! Соленая маслина! Так с ним всегда, все иллюзия, все обман. Она вспомнила, как впервые в детстве выплюнула маслину из–за такого же разочарования. Теперь, правда, она их любила. И Джона любила.</p><p class="p1">— Еще маслинку, — попросила она жалобно.</p><p class="p1">— Как же, как же, — с готовностью отозвался он и, проведя по ее губам следующей маслинкой, положил в рот клубничину.</p><p class="p1">— Джонни!!!</p><p class="p1">— Что, невкусно?</p><p class="p1">— Очень вкусно!</p><p class="p1">А разве, в самом деле, невкусно? А если он все это закупил специально к ее приходу? Ведь она признавалась ему, что любит клубнику, а насчет маслин, вероятно, он сам догадался.</p><p class="p1">— Выпей! — Он поднес к ее губам бокал, нарочно уронив несколько капель на грудь. Халат распахнулся, и она не запахивала его. Правая рука безвольно лежала на столе, левая, сжатая в кулачок, висела и иногда крутила полу халата.</p><p class="p1">Капли вина еще стекали от ключиц по груди, скатывались на колени, а он уже протягивал ей ложку сиропу. Она не успевала настроиться на что–то одно: в непредсказуемой последовательности за сиропом следовали спагетти, за спагетти — фруктовое желе. Всегда он так! Интересно, как ест он сам? Желе вишневое, прелесть какая! Он поднес ложечку с желе к ее губам, она лизнула край ложечки, словно в благодарность. Он поднимал руку выше, — она трогательно тянулась открытыми губами к дрожащему куску лакомства. Она была в его власти. Он мог делать с ней все, что угодно. Она не противилась. Может быть, ей действительно втайне всегда хотелось только этого?</p><p class="p1">А вот этого она в самом деле не хотела никогда — острый маринованный зеленый перец! Рот обожгло, она поперхнулась и захохотала, потом потянулась ртом вслед за его ускользающей рукой в надежде чем–то запить или зажевать этот невыносимо жгучий вкус! Он опять что–то подносит к ее губам... Господи, хвостик того же перца! Мерзавец! Она ему так верила, а он... это жестоко, наконец, потешается он, что ли, над ее мучениями? Пожар во рту внезапно пригас — Джонни щедро заливал его молоком. Молоко стекало по подбородку и шее, лилось на халат, холодило грудь и живот, по животу стекало ниже, ниже... Следом — поток содовой, ударивший из бутылки, которую он умудрился открыть так, что струя ударила с напором, как из брандспойта. Струя била прямо между ног, потом поднялась выше и вдруг ударила в рот, в лицо! Она задрыгала ногами, отпихивая невидимого Джона, захохотала, забыв обо всем на свете. Это было невыносимо, как всякое счастье.</p><p class="p1">— Я прошу: не открывай пока глаза!</p><p class="p1">Как хочешь, все — как хочешь, только что ты еще собираешься делать?! Воображаю, что сейчас творится на столе, на полу, какой разгром он учинил ради меня!</p><p class="p1">— Высунь язык!</p><p class="p1">Она высунула узкий, медный язык, который затрепетал, ожидая даяния. Сладкая тягучая капля пролилась сверху. Мед, свежий, прекрасный мед! Такого ужина она никогда не знала.</p><p class="p1">— Дальше... Дальше!</p><p class="p1">Она высунула язык, насколько могла. Мед не переставал течь, и стоило ей на секунду втянуть язык, донести до рта это благоухающее летним лугом, сладостное великолепие, как струя попала на колени, потекла по коленям, мед затекал в носки... Она подставила ладони под струю, облизала их, ткнулась в них лицом, размазывая мед по щекам, по повязке... Пропади все пропадом! Счастье есть счастье!</p><p class="p1">— Браво, Элизабет! Я только этого и ждал!</p><p class="p1">Да, он только того и ждал, чтобы она перестала бояться, беречься и вошла в игру — нет, не на равных, игрой это не предусмотрено, игра предусматривает неравенство, но она принимает все, любые правила, как всем существом, всей наконец раскрывшейся глубью принимает в себя его, когда сжимает его плечи, когда позволяет ему вытворять с собой что угодно...</p><p class="p1">Он приблизил свое лицо к ее лицу — она чувствовала это по его горячему, пахнущему легким белым вином дыханию. Он лизнул ее щеку. Взял ее губы в свои. Принялся облизывать с них медовую сладость. Она обхватила его за шею. Он спустил халат с ее плеч, и она высвободила руки, хотя он, быть может, и не хотел этого, во всем любя недосказанность, игру, неполноту. Но на ней и так оставались носки и повязка.</p><p class="p1">Его руки скользили по ее бедрам, размазывая мед, а губы не отрывались от ее губ. Она снова напряглась в предвкушении блаженства, и блаженство было на этот раз сильнее всего, что ей пришлось испытать. Мед, мед тек по их телам, мед тек в жилах, она прижималась к нему всем телом, сливаясь с ним в горячий, нежный, неразрывный клубок.</p><p class="empty-line"/><p class="p1">Разумеется, на следующий день она не могла ни о чем думать, и шеф отчитал ее за рассеянность, но она не придала этому значения. В жизнь ее прочно и окончательно вошло нечто, без чего это все уже нельзя будет назвать жизнью, и все, что было до этого, тоже называлось теперь иначе. В рассеянности она покусывала ручку, приоткрыв губы. Молли изредка бросала на нее быстрые взгляды и поражалась происшедшей в ней перемене. Перед ней сидела невероятно помолодевшая и раскрепостившаяся, юная женщина, похожая на школьницу, впервые узнавшую любовь и открывшую в своем теле новый источник наслаждения. Молли никогда не видела ее такой. Она смотрела на нее не с завистью, не с восхищением, — почти со страхом. Наконец Молли не выдержала, встала и принялась ходить по комнатке, где они сидели, между столов, задевая за них бедрами.</p><p class="p1">— Нет, нет и нет! — воскликнула она. — Я бы могла этого не делать, но я это сделала! Нет, нет, нет!</p><p class="p1">Элизабет не сразу расслышала ее.</p><p class="p1">— Ты ко мне обращаешься?</p><p class="p1">— Помнишь, ты сказала, чтобы я пошла на свидание с твоим бывшим мужем?</p><p class="p1">— Да, и что же из этого?</p><p class="p1">Молли собралась с духом и выпалила:</p><p class="p1">— Так вот, я пошла. И не смогла сказать ему «Нет».</p><p class="p1">— То есть?!</p><p class="p1">— В общем, я с ним переспала.</p><p class="p1">Элизабет обалдело уставилась на нее, потом губы ее растянулись в улыбку:</p><p class="p1">— С Брюсом? С моим бывшим мужем?!</p><p class="p1">Старина Брюс. Старина Молли. Вот так штука!.. Господи, да уж не ревнует ли она? О, как эгоистично и жестоко это было бы! Два одиноких, не слишком счастливых человека... Когда она так счастлива, — правда, недавно и ненадежно, но, может быть, в самом деле навсегда! Ведь не ушел же он, когда она попросила его уйти сразу! Значит, все надолго... А у Молли с Брюсом — скорее всего нет. И разве Молли нужен в постели такой мужчина, как Брюс?</p><p class="p1">Все это в одно мгновение пронеслось в ее голове. Странные шутки шутит судьба! Но теперь, теперь все должны быть счастливы.</p><p class="p1">— Я просто подумала, что должна тебе сказать об этом...</p><p class="p1">Между прочим, это было вовсе необязательно. Но уж если тебе так хотелось поделиться впечатлениями, подумала она... Как же ты в таком случае все–таки несчастна, бедняга Молли! И бедняга Брюс. Бедняк бедняка, как и дурак — дурака, видит издалека.</p><p class="p1">— Н-ну... Моей матери он понравился когда–то, — сказала Элизабет — то ли для того, чтобы что–то сказать, — а что можно сказать в ответ на такое признание лучшей подруги? — то ли чтобы придать Брюсу какого–то дополнительного веса и очарования в глазах Молли. Да и почему ему было не понравиться маме? Он был вполне надежен, тих, интеллектуален, умел понравиться и поддержать разговор... Не водился с дурными компаниями... В жизни не попробовал наркотика, а напился только один раз — на первую годовщину их развода. Он все кричал тогда: «Но ведь у тебя же никого нет! Если бы ты ушла к кому–то — это можно было бы понять! Но у тебя же никого нет! Девка, дрянь, даже блядью я не могу тебя назвать! Даже этого права ты меня лишаешь! Ну ладно бы, ты ушла к другому! Но ты же ушла просто от меня! Просто из–за меня! Значит, я дрянь, так? Ничтожество, так?! Да сама ты ничтожество, у тебя никого нет и не будет!» Больше таких вспышек она у него не помнила. Никогда. Ни до, ни после. Он заснул тогда на ее кровати, а она весь вечер, всю ночь ходила по кухне из угла в угол и думала, что он прав, что он все напророчил верно, но сама мысль о близости с ним противна ей, как мысль о зубоврачебном кресле.</p><p class="p1">— Моей–то маме он точно понравится, — сказала Молли решительно.</p><p class="p1">О, какие далеко идущие планы! Неужели она это всерьез? А впрочем, она всего на год старше Элизабет, и со времени ее развода прошло уже девять лет, а Брюс так одинок и так нуждается хоть в ком–то рядом — тем более в энергичной и яркой Молли... Может быть, Элизабет, не обладавшая именно этими качествами, потому–то ему и не подошла? Что же, дай Бог им счастья, тем более что она сама так счастлива!..</p><p class="p1">Но смутный неприятный осадок все–таки остался у нее в душе после этого разговора. И укрепился, когда через полчаса у входа в галерею, под самым их окном, снова появился приплясывающий рассыльный. Швейцар принял от него букет, по одному виду которого можно было догадаться, что он от Брюса: белые растрепанные хризантемы, его постоянная любовь. Как всякая любовь, они производили достаточно жалкое впечатление. Поймав себя на этих мыслях, Элизабет тотчас раскаялась. Вот вновь появляется у них приплясывающий рассыльный из цветочного магазина. Вестник счастья. Символ радости. Всего две недели назад — нет, уже три, о Господи, как летит время! — он осчастливил ее, и она расцеловала обалдевшего от неожиданности шефа. Сегодня он осчастливит Молли. Вестник судьбы. Молли кинулась к столику у дверей, на котором лежал букет. Поспешно развернула его. Прочла записку. Расхохоталась. Бросилась к Элизабет и расцеловала ее большими, мокрыми губами, измазав в помаде и обдав запахом табака и кофе.</p><p class="p1">Ну, положим, делать это было уже совсем не обязательно.</p><p class="p1">Элизабет долго и задумчиво смотрела в окно, наблюдая, как удаляется посыльный.</p><p class="empty-line"/><p class="p1">На этот раз они опять сидели у него.</p><p class="p1">— Слушай... Тебе со мной действительно хорошо?</p><p class="p1">— Не понимаю, почему ты мне не веришь.</p><p class="p1">На самом деле он, конечно, все понимал. Но во всех случаях, в любых отношениях ее с мужчинами, подругами, начальниками она добровольно выбирала роль подопечной, слабейшей, младшей. Может быть, это был скрытый инфантилизм. Даже в постели она не любила оказываться сверху. Это могло показаться знаком неопытности, но на самом деле было естественным продолжением ее отношений с мужчинами. Вести, командовать, играть первую скрипку в отношениях она не могла. Да ей и не нужны были другие отношения, кроме тех, в которых она сама была ведомой. С Брюсом, например, все распалось именно из–за того, что ему невозможно было отдаться. О, разумеется, только в переносном смысле, хотя, как теперь выясняется, и в прямом. Все действительно познается в сравнении. И в отношениях с Джоном все неожиданно и очень естественно оказалось точно так же. Впрочем, может быть, отношения сами собой всегда отливаются в единственно возможную форму, как форма соляного кристалла в растворе всегда одна и та же? Или Джон просто точнее других и раньше других почувствовал, что втайне она всегда хотела быть рабой, чтобы с завязанными глазами идти за кем–то?</p><p class="p1">Да, — но не до конца. Принадлежать кому–то до конца было бы для нее немыслимо. Идти вслед за кем–то — но иметь право свернуть. Не подчинять своей воле полностью. Сохранять остаток самоконтроля. Ибо, ведомая по природе, она была сильна и вынослива — и знала это. Она страдала достаточно, но принадлежала к числу тех людей, которые не выковываются страданием и развиваются по собственной, изначально заложенной программе. Страдание вообще едва ли способно сформировать чей–то характер. Ожесточить — да, но выковать — нет. Элизабет была кротким и терпеливым ребенком, но иногда переупрямить ее было невозможно. И потому полное подчинение любимому, полное растворение себя в нем и его в себе было для нее немыслимо. Она слишком уважала себя — и даже не как себя именно, но как человеческую особь со своим неотъемлемым правом на свободу. В отличие от Дженнифер, она никогда не принадлежала к феминисткам и считала, что они занимаются ерундой от пустоты своей жизни. Ее жизнь была заполнена искусством, работой, в молодости — романами, пусть даже и платоническими. И одинокими размышлениями над ходом вещей, которыми она не стала бы делиться даже с самым близким человеком. Просто из нежелания обесценивать свои главные мысли.</p><p class="p1">Может быть, мысль принадлежать мужчине целиком, без остатка — была соблазнительна и даже восхитительна. Но неосуществима. Ибо принадлежать всегда, во всем — значило для нее отказаться от себя. А в глубине души, краем сознания, она даже сейчас, сидя перед Джоном, понимала, что нет у нее опоры более безусловной, чем она сама. Нет, не было и никогда не будет.</p><p class="p1">Как все сильные натуры, воспитавшие себя или Богом созданные сдержанными, сильными и глубокими, она была болезненно мнительна. Ей часто казалось, что она делает что–то не так. Когда студентик-славист, некто Саймон Рюйк, не смог однажды кончить в ее постели — соседка по кампусу была предусмотрительно выслана и, кажется, благополучно прилепилась к весьма расхристанной компании, — Элизабет чуть с ума не сошла от раскаяния: ей все казалось, что она недостаточно возбудила его. Тогда–то, преодолевая брезгливость, она девятнадцати лет от роду впервые познакомилась с оральным сексом, и ее чуть не вырвало. Кончить же Саймон не мог по весьма простой причине, знакомой, без сомнения, каждому представителю мужского пола: он перепил. А Элизабет во всем обвиняла себя и чувствовала себя глубоко несчастной неумехой без каких–либо перспектив в семейной жизни. А когда Брюс в первые месяцы после свадьбы кончал практически мгновенно, — она опять–таки обвиняла в этом себя и мучилась, пока не поняла, что речь идет опять–таки о вполне естественном явлении — следствии большой любви и гораздо меньшего опыта.</p><p class="p1">Тем не менее даже сейчас, в идеально гармонических отношениях с Джоном, где гармония в постели только подчеркивала гармонию слов, взглядов, прозвищ, шуточек и угадываемых биографий (они не любили говорить друг другу о своих историях, — все и так все знали)... Даже сейчас, в этих идеальных (почти! почти!) отношениях, она была не до конца уверена в себе — нет, не в силе своей привлекательности, а в достаточном умении, в опытности, наконец, в том, что она, откажись Джон от нее сейчас, вряд ли будет еще кому–нибудь так близка и так нужна.</p><p class="p1">Джон по обыкновению хлопотал у стола. Элизабет сидела в углу. Она не уставала поражаться грациозности, легкости и аккуратности его движений. Он двигался, как заправский повар, несколько утомленный общим вниманием. Но Элизабет думала сейчас о другом: о том, надолго ли все, не разделит ли этот ее роман участь предыдущих увлечений, когда независимо от разделения ролей в паре побежденной и проигравшей неизменно оставалась она — ибо женщина всегда проигрывает, если не может выиграть поединка.</p><p class="p1">А в том, что всякий союз — поединок, ей сомневаться не приходилось. Неужели и с Джоном? Да, ведь он, кажется, каждую секунду старается подчинить ее себе... Это все игра, игра. Успокойся, дурочка. Он играет с тобой, но на самом деле зависит от тебя не меньше, чем ты от него. Если верить его признаниям, такого блаженства он ни с кем никогда не знал — и не списывать же все это, в самом деле, на постель!</p><p class="p1">Будем надеяться, что он играет. Если же нет... что же! Поединок есть поединок. Один подставляет щеку, другой целует. Один хочет влияния, другой требует внимания... Нет, равенства в любви нет. Или это не любовь. Джонни никогда не говорил об этом. Но к чему ему об этом говорить со мной?..</p><p class="empty-line"/><p class="p1">Они не заметили, как наступил вечер. Они не зажигали огня. Молчали. Он лениво прихлебывал чай. И курил, аккуратно стряхивая пепел в ракушку.</p><p class="p1">— Я хочу познакомить тебя с моими друзьями, — сказала Элизабет.</p><p class="p1">Он с недоумением пожал плечами: — Зачем?</p><p class="p1">— Затем. Хочу, чтобы ты знал обо мне больше.</p><p class="p1">— Мне достаточно того, что я знаю с первого дня.</p><p class="p1">— Интересно, что же знаешь?</p><p class="p1">Он вдавил сигарету в пепельницу, подошел к Элизабет, обнял ее за плечи. Она попыталась высвободиться.</p><p class="p1">— Ты маленькая упрямая девочка, которая мечтает только о том, чтобы ее переупрямили. Тебе не кажется, что нас и вдвоем много? Лет пять назад была у меня одна журналистка. То есть так... пыталась быть.</p><p class="p1">— Вроде меня?</p><p class="p1">— Почти во всем, — он усмехнулся. — Только она думала, что разбирается в политике, а тебе кто–то наврал, что ты сечешь в живописи и оказываешь этим неоценимую услугу благодарному человечеству.</p><p class="p1">— Ты–то, конечно, — она прищурилась, — что в политике, что в живописи — дока. Торгуешь воздухом, и только благодаря тебе человечество еще не задохнулось.</p><p class="p1">— Я не люблю человечество. Знаешь, что я с ним делал?</p><p class="p1">— Примерно то же, что с журналисткой?</p><p class="p1">— Ты умнеешь на глазах. Ну так вот, эта самописка решила ввести меня в свой писучий свет. Какие–то бородатые чучела и усатые стервы хлопали меня по плечу, пачкали фиолетовой помадой и орали «Как дела, Джонни», как будто хоть что–нибудь петрили в моих делах. Снобы паршивые. Засиратели общественных мозгов. Я у них — Джонни, Картер у них Джимми, этот новый русский... как его... у них Горби.</p><p class="p1">Он потянул из пачки сигарету.</p><p class="p1">— Я уберу посуду, — ровно сказала Элизабет.</p><p class="p1">— Сиди! Все кончилось превесело. Я оттрахал ее подружку прямо на «Ай-Би-Эм», чтобы она, эта лохмоногая выдра, по крайней мере, получила право со мной фамильярничать. Думаю, что Горби и Джимми на моем месте поступили бы так же.</p><p class="p1">— Я так и не поняла, кого ты там трахнул, — молвила Элизабет, — но мне очень жаль, что тебе плевать на моих друзей. Значит, тебе плевать и на меня.</p><p class="p1">— Да ты не поняла! — он раздраженно махнул рукой. — Видишь ли, когда двоим хорошо вместе, им вовсе необязательно демонстрировать это другим. Чужое счастье, знаешь ли, дурно пахнет и глаза колет. Тебе непременно нужно обзавестись толпой завистников?</p><p class="p1">— Да нет, — она погладила его по руке. — Кто нам будет завидовать?</p><p class="p1">— А разве я так незавиден? Да и была мне охота глядеть на твоих ухажеров. Не хочу тебя ни с кем делить.</p><p class="p1">— Но Джонни! Я же не могу принадлежать тебе одному? У меня есть свой круг, в конце концов... Работа, которую я люблю и до которой человечеству нет никакого дела... Как ты справедливо заметил.</p><p class="p1">— Да, я хочу, чтобы ты принадлежала мне одному. Признайся, ты и сама втайне об этом мечтаешь.</p><p class="p1">— Я втайне мечтаю помыть посуду.</p><p class="p1">Голос его неожиданно изменился. В нем зазвучали мягкие, властные отеческие нотки.</p></span></span>
