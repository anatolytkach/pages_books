<span><span id="id13"><div class="title3">
<p class="p"><strong>I</strong></p>
</div><p class="p1">Чемодан был большой и старый. С этим чемоданом Эмили с матерью ездили к тетке в Калифорнию ровно десять лет назад. С тех пор Эмили не была в Калифорнии и вообще выезжала редко.</p><p class="p1">Она была привязана к старым местам и старым вещам, как и мать. Ей не слишком хотелось выезжать. И сегодня тоже. Хотя, в общем, она легко относилась к жизни и взяла себе за правило ни о чем не задумываться более трех минут.</p><p class="p1">В двенадцатилетнем возрасте в душе Эмили произошел перелом. Она поняла, что мир не ограничивается Средним Западом, узнала, откуда берутся дети, и пришла к выводу, что в чудовищно жестоком и грубом мире, противостоящем ее детским представлениям, жить совершенно невозможно. Ее добрая мать своевременно подбросила ей книги Карнеги, и с тех пор мир для Эмили был ясен, прост и истолкован раз и навсегда.</p><p class="p1">В колледже ее представление о мире не претерпело существенных изменений. Она училась на юриста, и волей-неволей ей приходилось выслушивать историю европейской философии. Эмили никогда не могла толком понять, к чему ломать голову над столь простыми и очевидными вещами, выдумывая вороха абстракций, многоэтажных символов и многослойных толкований. Смысл жизни вообще мало занимал ее — как и большинство однокурсников, впрочем, которые тоже не склонны были ломать голову над различиями позитивизма и неокантианства. Однажды Эмили поставила в тупик старика-профессора, когда, густо и провинциально краснея, спросила его своим низким, глубоким голосом:</p><p class="p1">— Простите, но мне не совсем понятно: как соотносится все это с реальной жизнью?</p><p class="p1">— Не понял вас?</p><p class="p1">— Я имею в виду... ну... чисто прагматический аспект. Если у вас есть проблемы, вы можете пойти к дантисту или психоаналитику? Изменить диету, например?</p><p class="p1">— Но видите ли, мисс Рид...</p><p class="p1">Профессор окинул взглядом ее стройное тело, высокую крепкую грудь, посмотрел в большие миндалевидные глаза, скользнул глазами по длинным, крепким, смуглым ногам, открытым лишь настолько, насколько это позволяют нравы и обычаи лихого, но довольно пуританского Запада.</p><p class="p1">Перед ним стояла откормленная особь нового поколения. Это была девушка редкой красоты, хорошего воспитания, выросшая, как он знал, без отца, под влиянием бедной сентиментальной матери. Ребенок своевременно подавил в себе детскую сентиментальность, столкнулся с миром, перестал ощущать себя защищенным и тотчас решил прожить свою жизнь с максимальной пользой для себя. Вопрос о душе здесь не стоял. Карнеги растлил больше молоденьких американок, чем все растлители малолетних во главе с идиотским Г. Г. этого русского...</p><p class="p1">И вместе с тем девушка не утратила способности краснеть, и глубокий голос ее вздрагивал от волнения, когда она говорила о Гражданской войне или сестрах Бронте, на книгах которых выросла. Новый, обеспеченный и оттого не менее жестокий мир не успел еще раздавить в ней окончательно детской сострадательности и доброты. Как странно, однако: мы ждали, что обеспеченность и благополучие сделают нас добрей, — ничуть не бывало! У Эмили Рид всегда все будет хорошо. Она выучится на юриста и будет зарабатывать побольше моего в первый же год практики, — усмехнулся профессор. И никакой там феноменологической редукции.</p><p class="p1">— Садитесь, мисс Рид. Я освобождаю вас от посещения моих лекций. И оценку поставлю высшую, — ибо вы уже ответили себе на вопрос о смысле жизни с помощью Карнеги, а разве ответ на этот вопрос не является целью всякой философии?..</p><p class="p1">Эмили была несколько ошарашена. Ей нравился этот добрый старикан, и она никогда не могла понять, почему добряк, похожий на аптекаря из их квартала, тратит свое время на изучение всякой надмирной ерунды, когда нужно прежде всего как можно лучше устроиться в этом непознаваемом и жестоком мире, а потом устраиваться в нем все лучше и лучше, ибо разве цель жизни — не в устроении своей судьбы?</p><p class="p1">Вопреки ожиданиям однокурсников, она действительна воспользовалась разрешением профессора. И в свободное время предпочла выучить китайский. Ей нравилось ставить перед собой трудные задачи. «Эмили, детка, — говорила она себе часто, — нас с тобой никто не будет жалеть, и пробиваться нам нужно самостоятельно. Будь осторожна, но помни, что чем труднее поставленное перед тобой задание, тем больше будет радость победы!»</p><p class="p1">Она привыкла преодолевать себя и постоянно держала свой нрав в узде, ощущая себя одновременно и диковатой, норовистой лошадкой, и опытным, рассудительным наездником.</p><p class="p1">Так же рассудительна была она и во всем, что касалось любви. Для этого в ее карьере еще не наступило время. Ей надо было делать карьеру, чтобы содержать свою добрую, бедную мать, оставшуюся в мире без всякой опоры после смерти отца. Эмили никогда не знала богатства, привыкла к тому, что в их доме экономят решительно на всем, потому ей не так уж трудно было отказывать себе в нарядах и угощениях. Она любила простую еду, хотя успела возненавидеть тот самый дешевый, отвратительный бифштекс, которым мать из воскресенья в воскресенье потчевала ее. Уж лучше эта ее морковка со сливками — ее добрая мать была совершенно убеждена, что этот деликатес она готовит просто гениально, а от горошка, от ревеня и от морковки со сливками Эмили воротило больше, чем от чего–либо другого. Она любила ветчину, манговый соус и ванильное мороженое, и по воскресеньям в колледже она позволяла себе все это.</p><p class="p1">Что же до любви, — мало кто из мужчин мог заменить ей Карнеги, и Эмили не слишком интересовалась худшей половиной населения. Ей была странна и почти противна соседка по кампусу — Мэгги Бриш, еврейка, из семьи эмигрантов. Мэгги была распутна до последней степени — так представлялось Эмили, ибо на ее глазах Мэгги бесстыдно целовалась с Майклом, своим приятелем из числа будущих программистов, и называла это «сосаться». «Мне нравится сосаться с Майклом, — говорила она со своей неистребимой, странной интонацией. — Когда с ним сосешься, кажется, что кто–то из тебя высасывает душу». «Не мешало бы тебе высосать из себя хоть немного дури», — подумала Эмили, но вслух ничего не сказала: Карнеги научил ее сдерживать свои эмоции и говорить с каждым о том, о чем ему, а не тебе, интересно. Рыба любит червей, а ты — клубнику со сливками, но только идиот может ловить рыбу на клубнику со сливками. Как остроумен этот Карнеги! И, конечно, Паркинсон. Законы Паркинсона Эмили знала наизусть, и если бы Паркинсон и Карнеги были знакомы, они несомненно стали бы друзьями даже большими, чем Маркс и Энгельс. Эмили мечтала о тех временах, когда памятник Паркинсону и Карнеги, стоящим в обнимку, украсит главную площадь Вашингтона, где она никогда не была.</p><p class="p1">Но приходилось выслушивать рассказы Мэгги об ее похождениях. Особенной религиозностью Мэгги не отличалась, и оттого в ее многокрасочной палитре находились весьма соленые словечки, а в обойме ее дружков был всего один иудей, и тот необрезанный. Эту деталь Мэгги расписывала с особым смаком, который явно выдавал знакомство с предметом. «Знаешь, — доверительно сообщала она Эмили, — чем больше кожи на конце, тем больше это свидетельствует об инфантильности. Все нынешние мужики — дети в душе, верней, не в душе, а кое-где еще...» — и она хохотала. Эмили кисло улыбалась в ответ. Ее ум был занят совершенно другими вещами.</p><p class="p1">— Знаешь, подруга, — как–то сказала ей Мэгги, варя на плитке свой знаменитый бульон, который почему–то называла «еврейским пенициллином», помогающим даже от «французского насморка». — Ты ведь очень даже ничего себе. Ты, наверное, часто смотришь на себя в зеркало голой, да? Тогда ты должна признать, что так оно и есть: ты очень хороша.</p><p class="p1">Эмили вспыхнула. Она действительно иногда смотрела на себя в зеркало голой, но считала, что это — ее собственное, индивидуальное и оттого ей одной известное, тайное извращение.</p><p class="p1">На диком Западе рано становятся женщинами, шутит судья в их городке, и уж совсем рано — девушками. Это было грубо, но верно. Эмили стала девушкой в двенадцать лет. Тогда она выскочила из ванной, белая как полотно, с криком «Мама!», и ее матери пришлось потратить не один час на то, чтобы успокоить ее и разъяснить ей, что же, собственно, с ней происходит. Но Эмили привыкла относиться к своему телу без трепета и благоговения. У него, у этого тела, были некоторые загадки. Странности. Когда грудь горела и побаливала — это значит, что она росла. Что ж. Раз в месяц необъяснимо портилось настроение, хотелось орать, срываться и дуться на весь свет. Карнеги и здесь помогал держать себя в руках. Опять–таки все это не стоило внимания. А желание иметь детей — что же, ведь оно не только не предосудительно, оно так объяснимо! Не стоит, наверное, связывать это желание с тем, что происходит между мужчиной и женщиной. Мать Эмили никогда особенно не распространялась об этом, но всегда напоминала дочери: «Твой отец, конечно, был редчайшим, изумительным исключением. Обычно женщина попадает в рабство и остается в нем до конца своих дней. А то, что мужчина предлагает ей вместо своего сострадания, тепла, нежности и ее утраченной свободы, — обычно совсем не стоит всех этих действительно прекрасных вещей». Эмили не знала, откуда у ее доброй матери это убеждение. Однако не спорила. Более того, глядя на своих однокурсников, только и умевших, что разговаривать о бейсболе и врать друг другу о своих победах, — она понимала вполне отчетливо, что попадать хоть в минимальную зависимость от такого существа — значило обречь себя на массу унизительных хлопот, отвлечься от своего основного дела ради тела, которое к тому же едва ли что–то приобретет, а главное — Эмили была свято убеждена, что любовь в ее жизни произойдет именно тогда, когда для нее настанет время. А сейчас время для того, чтобы закрепить свои позиции в обществе. Ужасная судьба сестер Бронте может послужить для всех предостережением.</p><p class="p1">Примерно это она и изложила Мэгги — разумеется, гораздо мягче и ироничнее, как учил Паркинсон, — в ответ на все комплименты своей фигуре.</p><p class="p1">— Молоко в девушке не должно киснуть, — ответила Мэгги, помешивая свой еврейский пенициллин. — Знаешь, ты, может быть, и права, — во всяком случае, мы с тобой сходимся в одном. Жить несомненно следует только для собственного наслаждения. Но ведь у каждого оно свое. Знаешь притчу? Лежит негр и жует банан. Мимо идет деловой американец и спрашивает негра: ну чего ты тут разлегся? Дело надо делать! Негр в ответ: а зачем? Американец ему: ну, чтобы заработать, чтобы укрепиться в обществе, или как там вы, американцы, это называете (Мэгги последовательно называла американцами только белых). А негр отвечает: а дальше? А дальше, отвечает американец, сделаешь деньги, потом еще деньги, потом еще деньги... И тогда, заканчивает самодовольный американец, можно будет спокойно лежать на травке, есть банан... Вот, отвечает негр. На хрена же мне все это, когда я уже сейчас, видишь, лежу с бананом!.. Это, в сущности, притча про нас тобой, подруга. Ты проходишь мимо меня со своим неизменным стареньким портфельчиком, вся такая деловая, крутая, прекрасная, целеустремленная и даже с очками на носу, которые, как ни странно, тебя не портят. А я лежу рядом, и тоже почти негритянка — даже хуже, потому что и белая, и ленивая, и кудрявая, и почти такая, как надо, но от меня исходит какая–то непонятная, еле уловимая вонь, от которой так воротит всех дисциплинированных, государственных, порядочных людей. Только та еще разница, что лежу я не с бананом, а с... — И Мэгги расхохоталась, — поэтому никогда нельзя было понять, шутит она или говорит серьезно. Каждую свою тираду она заканчивала идиотской притчей вроде этой или взрывом хохота, как сейчас. Карнеги ни о чем подобном не упоминал. И оттого Эмили, по совету своих духовных вождей, только улыбнулась в ответ и перевела разговор на другую тему.</p><p class="p1">Подруги ее уважительно сторонились: их и подругами–то назвать было нельзя. Все ее время уходило на учебу, массу дополнительных спецкурсов, бразильский и португальский языки с какими–то диалектами... Впрочем, когда для лучшего ознакомления с национальными особенностями латиноамериканцев на спецкурсе им порекомендовали прочесть Маркеса и Кортасара, Эмили при всем своем прилежании не смогла осилить этих книг. Борхес вообще показался ей литературным надувателем. К реальной жизни, с которой все они каждый день имели дело, — все это никак не относилось, и стоило ли тратить время на какую–то ерунду, пришедшую в голову странного кудрявого колумбийца, который к тому же по всякому поводу выступал с заявлениями в поддержку Кастро?</p><p class="p1">Жизнь ее была до того заполнена, что в ней не оставалось места на пустоту. Между тем пустота, может быть, в любой жизни необходима — странная, сосущая пустота, зов Пленительного и Неясного. Эта пустота — обещание будущего, которое отличается от поезда тем, что не приходит по расписанию. Эмили же расчислила свою жизнь, и понять ее несложно: девочка, которой больше не на что рассчитывать, должна пробиваться сама. Так или примерно так думали о ней однокурсники, которые робели перед ней и даже взглядами провожали как–то тайно, стыдливо.</p><p class="p1">Иногда на диком Западе, этом поистине самом загадочном из всех районов необъятной страны, и без того необъяснимой, — рождаются чудеса вроде этой девочки, смуглые красавицы с миндалевидными черными глазами, с кристально-простыми представлениями о добре и зле, с рано заложенной в них сентиментальностью, с простым, чистым и кротким воспитанием в бедной семье, а если в наше время тотальная нивелировка убрала из общества явно богатых и явно бедных (если только последние не слишком дураки или подонки), то будем это называть семьей среднего достатка. Эти девочки до известного предела растут себе и развиваются по тем законам, которые навязывает семья или которые они сами себе внушают, — пока в жизнь их не входит нечто необычное, пока не меняется цель, пока установка не исчезает, сменившись простой и крепкой радостью жизни, — а эту радость жизни в наши времена только и способны испытывать здоровые и простые души. Так или примерно так думал о мисс Рид ее преподаватель латиноамериканской истории, которому она открыто заявила о своей неприязни к Кортасару, поскольку когда человеку есть что сказать, он говорит, что считает нужным, а не играет в классики.</p><p class="p1">После окончания колледжа Эмили — круглая отличница, лучшая студентка своего потока, «эй-стрим» с первых своих дней в школе, — вернулась на месяц к своей матери, в захолустный, пыльный, горячий городок Южного Запада. Она редко позволяла себе приезжать к матери, откладывая и покупая разные приятные вещи. Нарядов ей не было нужно — она предпочитала строгие костюмы, — но для матери она успела кое–что подкупить, не говоря уж о довольно приличной, хотя и подержанной машине, в которой она приехала на каникулы уже на третьем курсе. Сейчас она приехала отдохнуть и повидаться с матерью перед тем, как поступить на работу в Нью-Йорке, откуда ей пришло приглашение. Впрочем, от предложений отбоя не было: грамотная юристка со знанием пяти языков (и двух — не в совершенстве), отлично знающая законы Латинской Америки и Китая, разбирающаяся в тонкостях коммерции и прекрасно умеющая себя вести, — такая юристка представлялась сущим кладом для любой фирмы, которая занимается, к примеру, покупкой недвижимости или инвестированием на золотом и загадочном материке.</p><p class="p1">Правда, в Нью-Йорк Эмили пригласили не за эти достоинства. В колледж приехал Джеффри Магнус — молодой представитель нью-йоркской фирмы, в чьи обязанности входило обеспечивать родное предприятие молодыми волками с крепкими зубами и неослабной хваткой. Он был почти уверен, что для работы в Бразилии отберет молодого человека немногим младше себя, спортивного сложения, прекрасного пловца и теннисиста, который много может выпить на презентации и потом ночь напролет вести переговоры, ни на секунду не путаясь в цифрах и датах. Но увидев Эмили в ее строгом костюме, очках, со строгим черным бантом в темных волосах, — увидев Эмили, он тут же понял все. Что говорить, была у него и своя корысть: он всю жизнь мечтал о такой девочке. И вызывая ее в Нью-Йорк, он всем сердцем надеялся, что рано или поздно их куда–нибудь пошлют вместе или, напротив, дадут ей постажироваться пока внутри страны под его руководством. Кто бы мог подумать! Такая удача — там, где он не ожидал ничего подобного! Стройная, сильная, смуглая, — она была вполне в его вкусе, и объездить такую лошадку он взялся бы сию же секунду. О том, что у лошадки уже есть наездник, и что этот наездник — сама Эмили, он знать не мог. Еще больше его, несомненно, удивило бы, что Эмили до сих пор девственница и расставаться с невинностью в ближайшее время не планирует, ибо ей претит любая зависимость — от кого бы то ни было. Зависимости же от своего молодого, жаждущего, сильного тела она пока не чувствует, ибо слишком занята своей судьбой, карьерой и спортом. Плавание и теннис, к слову сказать, интересовали ее ничуть не меньше, чем это предполагалось для молодого адвоката, на поиски которого Магнус явился к ним в колледж.</p><p class="p1">Нельзя сказать, чтобы в родном городке Эмили чувствовала себя хуже, чем обычно. Подруги повыходили замуж и к двадцати одному году превратились в сущих куриц-наседок, квохчущих над детьми и озабоченных исключительно поведением мужей. Все это было довольно скучно, Эмили поблагодарила судьбу за то, что она с самого начала выбрала наиболее выгодную специальность, хороший колледж и куда более интересную судьбу. Что говорить о смысле жизни, когда ее жизнь и так гораздо более осмысленная, чем жизнь соседок-наседок, и уж во всяком случае сулит ей больше перемен, путешествий и, наконец, просто денег!</p><p class="p1">Мать постарела — почему–то именно сейчас, после окончания колледжа, это их очень сплотило, спаяло их. Эмили ощущала себя уже не ребенком, а скорее главой семьи, и это новое чувство, хотя и грустное, особенно при ее неистребимой сентиментальности, своей новизной отчасти радовало ее и приятно льстило. Теперь она сможет хоть как–то расплатиться с матерью за ее неустанную заботу. Теперь перед ней действительно надежное будущее. Со временем она окончательно сможет обосноваться в Нью-Йорке, перевезет к себе мать, они устроят нормальную жизнь, — тогда можно подумать о муже, о детях, о той семейственности, которая всегда составляла идеал Эмили.</p><p class="p1">Но теперь, как автомобиль, остановившийся на полном ходу, она затормозила слишком резко. После неутомимой работы и довольно интенсивного, хоть и неглубокого общения с ровесниками в колледже, Эмили почувствовала себя в провинциальном городке странно неуместной. Время текло медленно. Делать здесь было решительно нечего. Она с самого начала сделала все визиты, которые считались обязательными при ее возвращениях, посетила всех подруг, поболтала со всеми одноклассниками, кто еще не разлетелся из родного гнезда или слетелся в него на лето, — и тут–то в ее жизни стала ощущаться та пустота, которой просто неоткуда была взяться прежде.</p><p class="p1">Пустота... но при мысли о ней Эмили посещало странное чувство, в котором соединялись тоска и наслаждение. Она одна. Одна на целом свете. Помощи ждать неоткуда. Выходишь на улицу, холодок эдак щекочет темя, солнышко сияет в небесной голубизне, люди какие–то... ты никому не нужна и тебе никто не нужен. Кроме тебя самой. Ты глядишься в зеркало как фонарь глядится в высохшую лужу, и ровный свет твоего одинокого тела льется в твои глаза, кроткие темно-карие глаза за стеклами немодной оправы (Эмили любила в такие минуты надевать очечки, да хотя б для того, чтобы лучше себя видеть), взор печален, ресницы слегка опущены, рот приоткрыт, длинные тонкие пальцы гладят щеку... Одиночество? Какое, к черту, одиночество! Мужики не сводят с нее глаз. Провожают ее взглядами. Заговаривают о романах Кортасара!</p><p class="p1">Кроткий, печальный взор победительницы, которая придет, увидит, победит тогда, когда пожелает. А нынче еще рано.</p><p class="p1">Испанский язык нетруден. Его жестокая и нежная музыка так близка Эмили, так похожа на музыку ее души! Даже свирепая печаль португальского, кровожадная мудрость китайского, гордая грусть японских звуков не сравнимы с простотой и стройностью испанской речи. Этот язык так же прекрасен, как ее одиночество, которое будет прервано и отставлено навсегда прочь по ее желанию, по ее прихоти, по ее судьбе, которую Эмили творит сама!</p></span></span>
