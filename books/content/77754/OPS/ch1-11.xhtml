<span><span><p class="p1">— Что с тобой, милая? — удивленно спросил Джон. — Она у меня очень впечатлительная, — объяснил он вздрогнувшей продавщице. — Редко видит дорогие вещи. А кроватей вообще почти не знает. Все, знаете, по люкам шляется да по помойкам... Надо отучать. Так, значит, в четверг? Пойдем, милая.</p><p class="p1">На лестнице Джон чуть не согнулся пополам от сильнейшего удара локтем. «А будешь щипаться, сволочь, — горячо зашептала ему Элизабет, обвивая шею и целуя его в щеку, — я тебе все яйца оторву!»</p><p class="p1">На улице мелкий дождь смешивался с крупным снегом.</p><p class="empty-line"/><p class="p1">Кровать доставили в четверг. Джонни, как ни странно, сумел проспать три ночи, во время которых под ним ничего не тикало, хотя Элизабет, не удержавшись от соблазна и привыкнув к его иронической манере поведения в постели, нет-нет и начинала тикать, оказываясь под ним: «Тик-так, тик-так, хочешь кончить — делай так!»</p><p class="p1">В половине шестого вечера молодой негр с каннибальской наружностью, взыскующей расовой дискриминации, позвонил в дверь и не без ехидства доложил, что кровать находится внизу.</p><p class="p1">— Заносите! — лаконично распорядился Джонни.</p><p class="p1">Элизабет, в его белых носках и халате, (правда, уже красном, не таком длинном и приобретенном специально для нее), стояла сзади. Не удержавшись, она показала негру язык. Негр хмыкнул и вскоре вернулся с напарником и кроватью. В сложенном виде она казалась меньше, уютнее, и представить ее почти бескрайней, какой она выглядела в понедельник, в магазине, было сложно.</p><p class="p1">Негры установили кровать рядом со старой, на которой Джонни только что сидел, снимая носки и рассказывая Элизабет, что он намерен на этот раз предпринять. На этот раз ему хотелось взять ее сзади, и она не имела ничего против, но теперь, когда две кровати заняли почти всю комнату и образовали сексодром, нельзя было исключать, что Джонни захочется взять ее на бегу, после игры в догонялочки на четвереньках. Элизабет подумала, что если она будет избегать его притязаний, убегая достаточно быстро, ей, глядишь, удастся склонить его к гораздо более симпатичному варианту, когда он сначала долго целовал ее живот и — фигура умолчания, — а потом оказывался сверху, и можно было видеть его лицо. В таких размышлениях она рассеянно смотрела на установку кровати и не замечала взглядов негров, которые явно думали о том, что предстоит хозяевам после их ухода, а потому не торопились уходить, явно желая отсрочить чужое удовольствие.</p><p class="p1">— Что, хороша? — спросил Джонни, показав головой на Элизабет.</p><p class="p1">— Наша фирма гарантирует качество, — откликнулся тот, что стоял спиной, укладывая пружинный матрас.</p><p class="p1">Джонни расхохотался.</p><p class="p1">— Слышишь, Элизабет? Их фирма гарантирует твое качество. Интересно, откуда они знают. Когда тебя доставили, я что–то нс заметил фирменного знака. А ну, показывай, где ты его прячешь?</p><p class="p1">Он распахнул на ней халат, прежде чем она успела что–либо сообразить и, следовательно, предпринять.</p><p class="p1">— Здесь? Или здесь?</p><p class="p1">Что он делает? При них? Господи! Зачем? Или ему так необходимо делать ее любовь посмешищем для всех и вся?!</p><p class="p1">— А может быть, здесь?</p><p class="p1">Она не знала, смеяться ей или плакать. Дать пощечину или подыграть в шутке. Она выбрала второе. В крайнем случае, перед собой всегда можно оправдать эту недостаточную решимость: человек — это то, что он сам о себе думает. Если не считать себя униженным, унижения действительно не произойдет.</p><p class="p1">— Это секретное клеймо, — сказала она. — Оно внутри. И потому вполне могло отпечататься у тебя на том месте, которым ты обычно проверяешь качество.</p><p class="p1">Блестящий ход! Он был явно ошарашен. Она расстегнула его брюки, приспустила трусы и нежными пальцами извлекла на свет второе «Я» Джонни. Это было, собственно говоря, подлинное второе «Я», поскольку Джонни ласково называл его Эндрю — его любимое мужское имя — и в ответ на ее упреки в бабничестве и безумии неизменно отвечал:</p><p class="p1">— У него своя голова, у меня — своя.</p><p class="p1">Покаянно опустив голову, Эндрю явился собранию. Негры глазели на него, оставив дела.</p><p class="p1">— Ты бы мог и встать перед гостями, — безжалостно произнесла Элизабет. — Где же у нас клеймо? А, вот оно. — Она указала на небольшое красноватое пятнышко: Джонни накануне несколько переусердствовал. — Бедный дружок, ты, кажется, смутился. Что же, ступай на место, моя курочка, высиживай свои яйца. Авось чего–нибудь и высидишь.</p><p class="p1">Джонни, совершенно ошарашенный, ничего не предпринимал. К тому же прикосновения пальцев Элизабет были ему явно приятны. Он спокойно дал застегнуть себе штаны и только слегка поморщился, когда Элизабет нечаянно причинила ему боль. Во взгляде его недоумение сменилось явным одобрением, хотя в глубине души, чувствовалось, он был сильно уязвлен.</p><p class="p1">— Я вижу, вам предстоит неплохое развлечение с нашим товаром, — сказал один из негров, ошарашенный и потому уже не столь развязный. — Белье здесь, — он показал на тюк. — Застелите, надеюсь, сами?</p><p class="p1">— Без сомнения. А что, старина, ведь неплохо бы поразвлечься с такой? — он опять показал на Элизабет. Негры в смущении молчали, и в их переглядывании отнюдь не читалось одобрение.</p><p class="p1">— С вами, мистер, тоже неплохо бы, — наконец сказал один из них, критически оглядывая Джонни. Мало кому в своей жизни была Элизабет так признательна.</p><p class="p1">Джонни прикинул свои силы. Один на двоих.</p><p class="p1">— Вы свободны. — сухо сказал он.</p><p class="p1">— Приятных снов. — сказал первый негр, тот, что молчал все время. Голос у него оказался неожиданно высокий и мелодичный. Широко улыбаясь, чрезвычайно довольные собой, они покинули квартиру.</p><p class="p1">Элизабет влепила Джонни звонкую пощечину. Скрестив руки на груди и после секундной паузы влепила другую.</p><p class="p1">— Господи, ну за что?</p><p class="p1">Теперь он избрал такую тактику. Инициатива в ее руках. Она усмехнулась внезапному каламбуру. Смотря что называть инициативой.</p><p class="p1">— Я решил их немного подурачить, — только и всего.</p><p class="p1">— А все правильно. Мы продолжаем играть. По условиям игры тебе полагается получить по морде. Что, разве не так?</p><p class="p1">Из ситуации не могло быть другого выхода, кроме как плавно перевести ее в следующую и постараться забыть. Они перешли некую границу. Элизабет вспомнилась где–то в когда–то прочитанные стихи: «Словно покинувшие тюрьму, мы знаем друг о друге нечто страшное. Мы в аду, да и мы ли это?!».</p><p class="p1">— Пожалуй, что так, — медленно произнес Джонни.</p><p class="p1">За всем происшедшим могло последовать только одно — внезапный приступ жуткого, лихорадочного веселья.</p><p class="p1">И он понимал это лучше, чем она.</p><p class="p1">— Музыкальный антракт, — объявил он. — Танцы с волками! При послушном молчании ягнят!</p><p class="p1">Он присел на корточки перед своим музыкальным центром и нажал на кнопку с надписью «Power». Она засветилась молочно-белым светом. «Power». Сеть. Наброшенная на нее — нет, теперь на них обоих. Власть.</p><p class="p1">Его? Нет, теперь, кажется, не только... Хотя...</p><p class="p1">А Элизабет раскрепостилась вполне. Ее лихорадочное напряжение требовало выхода.</p><p class="p1">— Налей мне!</p><p class="p1">— Чего?</p><p class="p1">— Рому. Хочу настоящего рому. В жизни не пробовала.</p><p class="p1">Он достал из бара бутылку с головой негра, плеснул в два стакана.</p><p class="p1">Элизабет услышала музыку. Это был добрый старый Элвис.</p><p class="p1">Старомодность Джонни — пожалуй, единственное, что к нему сейчас располагало. Да еще его покорность. Оглушили мальчика. Увы, Элизабет не была рождена для лидерства. Перехватить инициативу она могла, по удержать — никогда. Ей легче было подчиняться — так она чувствовала себя более правой в собственных глазах. Легко было слушаться его и подспудно сознавать его правоту или неправоту. Легче было сохранить себя, утаивая чувства и оценки, а не выставляя их напоказ, как того требует лидерство. Лидер подставляется, ведомый — никогда. Лидеру есть что терять. И она почувствовала, что Джонни скоро обретет прежнюю властность.</p><p class="p1">— Танцуют все! — Она одним глотком выпила ром и забилась, судорожно попадая в ритм безумного Элвиса. Джонни закурил, опустился в кресло и принялся наблюдать.</p><p class="p1">В конце концов, что произошло? Ничего не произошло. Поиграли. В игру. Кто против?</p><p class="p1">Сумерки в комнате сгущались. Он включил лампу и направил прямо на нее. Элизабет танцевала спиной к нему. Она почувствовала перемену освещения и встала так, чтобы свет просвечивая ее насквозь. Нет, надо переместить источник. Она схватила лампу, кружась все в том же ритме, и переставила на подоконник. Теперь можно опять повернуться к Джонни спиной. Халат просвечивал красным, ее ноги ясно рисовались сквозь ткань. Она быстро покачала бедрами. Тряхнула головой. Волосы рассыпались по плечам. Пора. Она чуть приспустила халат с плеч. Откинулась назад и затрясла плечами, как цыганка в фильме. Джонни зачарованно наблюдал. Вот теперь время настало. Она резко повернулась к нему и одним движением сбросила халат.</p><p class="p1">Так–то. Теперь она в одних носках. С одной стороны, крошечная часть одежды, остающаяся на теле, все–таки возбуждает. С другой — ей хотелось, чтобы на ней не осталось ни одной нитки. Носки долой. Ром ударил в голову. Все в том же бешеном ритме она задрала одну ногу, потом другую. Носки слетели — один плюхнулся рядом с креслом, второй упал в руки Джонни. Он понюхал носок и поцеловал. Какова меткость! Джонни закинул ногу на ногу. Пресли неистовствовал. Элизабет ощутила невероятную свободу и нарастающее желание. Собственная нагота всегда возбуждала ее. Нет, что ни говори, а она хороша. Она вспрыгнула на кровать и сделала мост. Гимнастическая школа не пропадает даром. Джонни тряхнул головой. Такого у них еще не было. Что она выкинет теперь? Она рухнула на колени, словно ноги у нее подломились. Теперь он видел все. Она села на пятки и принялась гнуться влево и вправо, подняв руки над головой. Гибкая и близкая. Все ее тело покрылось легкой испариной. Он чувствовал запах ее пота. Вскочила, босыми ногами спрыгнула на пол, точно приземлившись на носки. Повернулась к нему спиной, нагнулась... Джонни терял власть над собой. Элизабет кидалась на стены. Гладила себе ладонями грудь и живот. Упала на колени, оперлась на локти и выгнулась по-кошачьи, — он посмотрел на ее грудь. Темные, отвердевшие соски. Когда она поднимала руки — он видел, как обозначаются ее ребра, когда выгибалась, заводя руки за голову — он видел, как проступает грудная клетка. Элизабет слегка задыхалась. Она была пьяновата, возбуждена и доведена до сердцебиения бешеным ритмом. Такой он не видел ее никогда. Это был танец призывной, ликующей, победительной страсти. Да, если бы она всегда была с ним такой, он, может быть, впервые захотел бы покориться женщине, подумал о браке, о постоянстве, и никогда не пожелал бы ничего другого, хотя краем сознания в своих отношениях с женщинами всегда оставлял возможность разрыва и — более того — понимал его неизбежность. Не оттого, что был Дон-Жуаном, хотя, несомненно, сладчайшим периодом в любви для него всегда бывало его постепенное узнавание, начало страсти, — все до первой ночи включительно. Потом, впрочем, тоже бывало хорошо, если ему удавалось поддерживать разнообразие на достаточном уровне. Отлично! Но это не значит, что он закабален. Ибо не было еще женщины, которая оказалась бы сильнее его, — и не могло быть по определению. Неужели на этот раз произошло что–то подобное? О, нет! Он не собирается сдаваться. Любит ли он ее? Да, безусловно. О, черт побери, что она творит!..</p><p class="p1">В это время, чувствуя нарастание страсти в композиции Элвиса, Элизабет как раз опустилась на колени, широко разведя ноги. Левой рукой она ласкала свой левый сосок, пальцами ощущая частые толчки сердца. То, что она делала правой, не могло заменить Джонни, но он воспринял это именно как замену.</p><p class="p1">Он не трогался с места. Пусть кончит. Пусть сделает все, как хочет.</p><p class="p1">С последними звуками музыки ее движения становились чаще. Она стонала и всхлипывала. Потом вдруг медленно открыла глаза и уставилась на него в упор. Прозрачные, ясные, сумасшедшие глаза кошки, бездонная, невыносимая глубина. Элизабет содрогнулась. И с последним, победным вскриком Элвиса она уронила руки, не вставая с колен и не отводя глаз.</p><p class="p1">Джонни выдержал этот взгляд. Встал. Быстро разделся. Подошел к ней и поднял на руки. Она не сопротивлялась. Лицо ее было абсолютно серьезно и бесконечно печально. Почти отчаяние читалось на нем.</p><p class="p1">— Девочка, — прошептал он, зарываясь лицом в ее волосы, прижимая к себе. Она обхватила руками его шею и поцеловала долгим поцелуем. Он чувствовал ее кожу, нежную, как у младенца, смотрел в лицо. Она так и не научилась целоваться с открытыми глазами. — Девочка, — повторил он в самое ее ухо. Маленькое горячее ухо. — Что случилось, мой бедный, радость моя? Я люблю тебя, все прекрасно, не думай ни о чем...</p><p class="p1">Она опять была девочкой. Он опять был всезнающим, всепонимающим, всепрощающим хозяином. Абсолютным Покоем и Приютом. Она положила голову на его плечо. Какая она легкая, его Элизабет. Он долго носил ее по комнате, шепча слова любви и утешения. Рассказывая сказки про утят, которые застали Поночку со Скруджем Мак-Даком. Потом опустил на новую кровать. Белья они не застилали, укрывшись старым покрывалом. Они заснули обнявшись и спали до полудня.</p><p class="empty-line"/><p class="p1">— Эрл совершенно сходит с ума, — произнесла Молли.</p><p class="p1">Элизабет оторвалась от зеркальца и посмотрела на нее.</p><p class="p1">— Да-да, подруга, — сказала Молли совершенно серьезно, кивая. — Большая любовь — великая вещь, но старик чувствует себя не лучшим образом. Надо что–то предпринять. Опять созвать знатоков, что ли. Твой Сен-Клер так ни черта и не написал. Не продано ни одной картины. Кроме дурака с собакой, никто даже не спрашивал о цене. Эрл старый. Подумай о нем, ладно? Ты тоже будешь старая, и если итог твоей жизни будет мало кому интересен, а денежных поступлений не произойдет, — ты поймешь его и двадцать раз проклянешь чужую большую любовь.</p><p class="p1">— Молли, но ты могла бы и сама...</p><p class="p1">— Что значит «могла бы»? Я ему и позвонила. Он железный старик и ни разу даже не спросил, что куплено на выставке. Кажется, заметил, что статья Дженнифер комплементарна, но поверхностна. Просил тебя позвонить.</p><p class="p1">— Господи, разумеется, но... что делать?</p><p class="p1">— Хотя бы не бросать старика. Поехать к нему. Разузнать, чем он дышит, и как–то подготовить к тому, что прибыли не будет...</p><p class="p1">— Слушай, но почему шеф этого не предвидел?</p><p class="p1">— Эрла любят в Европе. Он и здесь человек с именем. Всякие умные слова, — ты знаешь, я в этом не понимаю, мое дело — заключать сделки и устанавливать цены. Это вы с шефом — эксперты. А мое дело — утешать Эрла и понукать тебя.</p><p class="p1">— Молли, но я была в Европе... в Париже, Вене, Лондоне... Его картины кое-где куплены, но его знают гораздо хуже, чем ты полагаешь...</p><p class="p1">— Я ничего не полагаю. Я читала монографию.</p><p class="p1">— Гарднера?</p><p class="p1">— Господи, Лиз, ну откуда мне помнить... Там сказано, что он большой художник. Сейчас это никому не нужно. Нужно то, что вы все тут называете кичем. Эти двое, из русских, как их там, Быкофф и Ке...</p><p class="p1">— Кеворкофф?</p><p class="p1">— Ну да, в этом роде. Портрет Рейгана на куриных ногах. Кажется, «Хижина, повернись ко мне задом», — так, что ли, это называется? Какое–то русское присловье... Вот это могут купить. Теперь же любая русская мазня выглядит как протест против их системы. А Эрл — все–таки художник. Здесь и сейчас искусство действительно никому не нужно. Поэтому мне его жалко, понимаешь? Если ты не можешь ничего сделать, то хотя бы утешь старика. Ладно?</p><p class="p1">— Хорошо, я непременно выберу время...</p><p class="p1">— Нет уж, голубушка, сейчас время выбирает тебя, а не наоборот. Верно сказано, что чужое счастье дурно пахнет. Это не от зависти. Это из–за того, что любовь эгоистична. А страдания из–за любви того больше, — впрочем, всякое страдание эгоистично, а уж из–за любви — одно на другое...</p><p class="p1">— Один умный человек сказал: «Зачем придумывать слово «эгоист», когда уже есть слово «человек»? Все мы эгоисты, — Элизабет вздохнула. Молли в чем–то была права. И приятного в этом, конечно, мало. — Ты не знаешь, Эрл женат?</p><p class="p1">— Был, трижды, и с третьей женой расстался без развода. Она спилась.</p><p class="p1">— Из–за него, интересно?</p><p class="p1">— Думаю, что спиваются не из–за чего–то, а по врожденной склонности. Как знать, — может быть, он и вправду гений? С гением жить трудно...</p><p class="p1">— Жить трудно со всеми. С любым и каждым трудно жить. А гений по крайней мере компенсирует это тем, что он гений.</p><p class="p1">— Молли, Молли... Почему ты так не любишь влюбленных?!</p><p class="p1">— Я тебе много раз говорила об этом. Я сама была влюблена и сейчас не чужда этому состоянию. Не могу сказать, чтобы я себе нравилась при этом.</p><p class="p1">— А в кого ты влюблена, если не секрет?</p><p class="p1">— Это не секрет, это секреция, подруга. Проклятая плоть, требующая своего, плюс проклятая душа, требующая себе души. Сообщающегося сосуда. Странно, что души сообщаются через такие неприглядные места. Впрочем, Брюс — славный малый.</p><p class="p1">— Брюс? — Элизабет словно хлестнули. — Вы встречаетесь?</p><p class="p1">— Правильнее было бы сказать, что не расстаемся.</p><p class="p1">— И... и как он тебе?</p><p class="p1">— Мы считаем умного умным, если он с нами согласен. Только тогда. В этом смысле он умный. Мы считаем другого хорошим, когда он такой же бедный, как мы. Потому что мы бедные, а единственная причина этого — то, что мы хорошие. Правда ведь?</p><p class="p1">— Ты сегодня просто Карнеги!</p><p class="p1">— Дерьмо собачье твой Карнеги рядом со мной, — усмехнулась Молли, потягиваясь. Элизабет только сейчас заметила темные круги у нее под глазами, потрескавшиеся губы без обычного слоя помады... Брюс помады не любил. Она ночью не спит. И это не идет ей на пользу, старит. Чувствуется, их ночки проходят не ахти. Хотя как знать? Этот темный огонь в ее глазах; это похудание — или только кажущееся? — и эти брюки; Молли всегда предпочитала юбки, хотя никогда — мини; но Брюса возбуждали женщины в брюках...</p><p class="p1">— Дерьмо твой Карнеги. Мог он так взять в рот, как это делаю я? А я, как видишь, могу, да еще и рассуждаю при этом несколько своеобразнее, чем твой Карнеги. Все, чему он учит, нормальный всосал с молоком матери, а ненормальный всему этому не научится никогда. Ты всегда будешь видеть, где и когда он врет.</p><p class="p1">— Нет, но ты мне скажи о Брюсе. Как у него, например, с деньгами?</p><p class="p1">— Ну что ж, он преуспевает, доволен жизнью, водит меня по ресторанам и страшно боится потерять.</p><p class="p1">— Говорит обо мне какую–нибудь дрянь?</p><p class="p1">— Отнюдь. Интересуется, кто у тебя сейчас, и желает счастья. Я, как ты понимаешь, на сей счет особенно не распространяюсь, — это твои дела, и я сама не очень–то в курсе, так ведь? Он говорит, что ты была ему не по зубам, — вот, собственно, и все. Он говорит, что тебе нужен маньяк или сумасшедший.</p><p class="p1">— Откуда он знал? — вырвалось у нее. И тут же ее ожгло: значит, он чувствовал, знал, значит, он все видел! А она–то держала его за слепца!</p><p class="p1">— Оттуда же, откуда и я. Может быть, мы с ним не хорошо владеем высокой лексикой, но суть иногда улавливаем. Причем оба не считаем своей заслугой то, что плохо владеем высокой лексикой.</p><p class="p1">— М-да... Молодец Брюс! Передай ему... впрочем, ничего не передавай. Но я рада, за вас обоих.</p><p class="p1">— Не исключено даже, что ты не врешь.</p><p class="empty-line"/><p class="p1">Элизабет звонила Эрлу на виллу, где он жил один, и он ответил ей со своей обычной старомодной галантностью, что ждет ее в любой день, одну или со спутником, и что кроме разговора о делах, а лучше бы вместо него они могут поболтать о вещах куда более приятных, — например, о лучизме.</p><p class="p1">Его вилла находилась довольно далеко от Нью-Йорка, и Элизабет взяла такси после долгих колебаний. Но Джонни как раз собирался выдать ей на расходы порядочную сумму, о которой она его не просила, — и она позволила себе шикануть. В конце концов, это не выезд на пикник, а деловая поездка. Все правильно.</p><p class="p1">Эрл жил анахоретом, не пуская к себе почти никого, да к нему не особенно и ломились, — он, может быть, для того и запустил легенду о своей нелюдимости, чтобы спровоцировать паломничество. Впрочем, еще на их курсе в колледже побывать у Эрла было неким знаком почета, показателем уровня, а его личный друг, читавший спецкурс по колористике, почитался как выдающийся знаток, вхожий к Мастеру. Он передавал суждения Эрла, неизменно точные и ядовитые, с понятным пиететом и почти трепетом.</p><p class="p1">Вилла была обнесена высоким деревянным зеленым забором. Элизабет нажала на кнопку звонка.</p><p class="p1">Ей открыл сам Эрл, подстригавший кусты в саду. Высокий, худой, сухой, лицо покрыто красноватым загаром. Он походил на Роберта Фроста в старости, только был выше и крепче на вид. И у него не было вечной фростовской усмешки, добродушной и хитроватой, — лицо его было открытым, внимательным, любопытным, меткий и цепкий взгляд художника, живая игра морщин, ум и галантность, светящиеся во всем.</p><p class="p1">— Мистер Эрл, я давно чувствую необходимость поговорить с вами... хотя бы для того, чтобы отчитаться о ходе выставки...</p><p class="p1">— Дорогая Элизабет, это совершенно напрасные опасения. — Он вел ее к веранде, где уже был накрыт чайный столик: печенье, кофе, сливки, масло, джем. — Вы полагаете, судьба картины занимает меня после того, как она окончена? Зенит моей славы давно позади, и я был бы последним идиотом, не понимай я этого. Я ушел от времени, и время ушло от меня. Наше расхождение, слава Богу, свершилось с обоюдного согласия, как давно ожидаемый развод, и если я стану анахронизмом, то по крайней мере добровольно выбрал эту участь. Выставка — попытка подвести итог последнему десятилетию работы, не более. Разумеется, мне интересно, что скажут и напишут. Любой, кто утверждает, что ему неинтересно, — нагло врет. Но поскольку я материально обеспечен на ближайшие сто лет при скромном образе жизни, мне незачем ждать сверхприбылей от моих скромных развлечений...</p><p class="p1">То, что он заговорил об этом сразу, сняло напряжение, но Элизабет почувствовала, что тема эта волнует его, раз он решил сразу ее снять. Нет, Молли не права: за своей любовью она не разучилась понимать людей. Слышать их и жалеть их.</p><p class="p1">— Мистер Эрл, — сказала она, — я выросла в уважении к вашему таланту, и не мне утешать вас или приукрашивать действительность. С большими художниками не заигрывают. Мне никогда не было близко то, что вы делаете, и ни один ваш период я не могу назвать своей живописью, — но тем вернее моя оценка и тем искреннее мое восхищение: я могу беспристрастно судить о вас и нахожу вас крупнейшим Мастером. — Она почти не лгала. — Я должна вам откровенно сказать, что ни одна картина пока не продана, но наибольшие шансы у «Ожидания»: к ней прицениваются.</p><p class="p1">— Не сомневаюсь, — он разлил кофе, — не сомневаюсь. Картина недурна, но несколько мрачна по колориту... вы не находите? Впрочем, ожидание — вообще довольно мрачная вещь. Вы прекрасно выглядите.</p><p class="p1">— Мистер Эрл...</p><p class="p1">— Меня зовут Эд.</p><p class="p1">— Мне трудно привыкнуть...</p><p class="p1">— Дитя мое, давайте не будем лишний раз напоминать старику, что он стар. Или я буду вас называть — мисс? миссис?</p><p class="p1">Боясь, что ей придется вдаваться в этот довольно тонкий нюанс, она торопливо остановила его:</p><p class="p1">— Хорошо... Эд.</p><p class="p1">Хотя на самом деле она могла бы ему рассказать о себе. Такому старику. Который и в старости — все еще мужчина. И все поймет, и все оценит. Да ему и не может быть больше шестидесяти пяти.</p><p class="p1">— Я давно мечтала связаться с вами, — она налила в кофе сливок, положила сахару и с наслаждением отпила глоток. — Просто чтобы рассказать, как все происходит... и вообще. Но вы поймете меня: мне хочется продать хоть что–то, и уж только потом отчитываться перед вами.</p><p class="p1">— В этом совершенно нет нужды, Элизабет. Старики, конечно, тщеславны, но я еще не завершил свой переход от юноши к старику, поэтому у меня большие текущие замыслы.</p><p class="p1">— Я всегда недоумевала: как вам так удается поймать эти мгновения.</p><p class="p1">— Занятно, какие же?</p><p class="p1">— Моменты переходного, сумеречного состояния, — стремительно врала Элизабет. — Ваши работы последнего периода отражают, по-моему, смятение. Эта неопределенность очертаний... ассоциативность... прихотливый, причудливый ход авторской мысли, смешанная техника...</p><p class="p1">— Разве? — приподнял брови улыбающийся Эрл. — Мне как раз казалось, что последние работы классичны, светлы... А размытость, дымка... что ж, это для меня как раз аура предмета, если хотите — аура мира. Предмет предстает нс таким, каков он есть на самом деле, а как бы окруженный флером ассоциаций, воспоминаний, обаяния... Впрочем, ваше прочтение имеет право на существование, ибо всегда лучше видно со стороны. Я привык доверять всем искусствоведам, кроме Гарднера.</p><p class="p1">— Разве? А по-моему, прекрасная монография!</p><p class="p1">— Лестная — не значит прекрасная. Мне, разумеется, лестно, что он ставит в один ряд меня, Генри Мура и Олега Целкова. Но Целкова я не люблю, как почти всех этих социальных русских, кроме одного, может быть, Неизвестного. Генри Мур — это явно иной уровень, да и как можно ставить рядом живопись и скульптуру? Сюжеты моих ранних картин, еще имевших сюжеты, для Гарднера ясны. В целом он формалист. Это скучно.</p><p class="p1">Элизабет слушала его спокойную, ироническую речь, выглядывала в окно. Природа была в лихорадке. Ноябрь кончался, и был один из последних пронзительно-синих, солнечных осенних дней, когда последние листья медлительно срываются с веток. Прозрачное тепло отвесно стояло в воздухе. В окне веранды был виден сад, яблони с коричневыми, жалко свисавшими листьями, высокие дубы и ясени, заваленные листвой дорожки.</p><p class="p1">— Что до новых работ, — проходит время, и не то что возвращаешься на круги своя, — продолжал Эрл, — но скорее приходишь к пониманию, что все ведь очень просто. Искусство не способно дать человеку ничего, кроме энергетики. А каковы источники энергетики? — ритм и колорит. Стык, контраст, ритмическое построение — в этом смысле, например, очень интересна барочная композиция, ранний Рембрандт... Энергетика, энергия, — вот все, чего мы ждем, когда читаем стихи или смотрим картину. А источник энергии в душе — это или любовь, или страх смерти, порождающий тщеславие, боль, надежду...</p><p class="p1">Элизабет прислушивалась и кивала, но последние слова заставили ее поднять глаза и недоуменно посмотреть на Эрла.</p><p class="p1">— Да, да, — кивнул он. — Любовь или страх смерти. Эти понятия взаимоисключающие: есть либо любовь, либо страх. Когда человек влюблен, он не думает о смысле жизни. Этот смысл жизни ему дается. Кастраты и сектанты могут любить идею, а мужчины и женщины, достойные таких имен, должны любить друг друга, — вот и все, в сущности. Если же любви нет, — а она почти всегда проходит, когда оказывается слишком сильна, и неизбежно приводит к разрыву, — тогда остается искусство как дорога в бессмертие. Ничего другого человечество пока не придумало. Я ловлю предметы тогда, когда они думают о смерти. И людей, когда они думают о любви. Вещь уже знает, что такое смерть. Но она, неодушевленная, способна размышлять, а человек не способен. Он думает только о любви, ибо мысли его бегут от смерти. Он не знает ее. И тогда он живет ожиданием, как моя девушка.</p><p class="p1">— Скажите, — задумчиво произнесла Элизабет, всерьез заинтересовавшись разговором, оставив тон экстатического искусствоведа. — Вы сказали о слишком сильной любви. Где же критерий?</p><p class="p1">— Слишком сильная любовь, — после паузы заметил Эрл, — отличается от обыкновенной только по одному критерию. Отметем сразу понятие «слабая»: слабая любовь — это оксюморон, наподобие «соленого сахара» или «честной девушки» (Элизабет хмыкнула). Ну-с, есть такая любовь, при которой возможно увести девушку у соперника, и он отдаст ее или она сама захочет уйти. Для этого есть несколько десятков способов. При такой любви партнеры, в сущности, взаимозаменяемы. Представьте себе, — он разложил перед собой десять картонных спичек, — что это уровень нормальный. Таких большинство.</p><p class="p1">Следом, — и он соорудил над частоколом из спичек забор пореже, — идут индивидуумы более высокого порядка. Их уже не сотни, а десятки. Им подходит далеко не каждая женщина. Появляется отбор. Но это еще не предел.</p><p class="p1">Это, — он поместил выше еще четыре спички, — совсем высокий уровень. Таких людей, как видите, немного. Речь идет не об уровне интеллекта и даже не о степени внутренней свободы, что далеко не одно и то же и встречается гораздо реже. Речь идет об уровне интуиции, а главное — о знании себя. Знающий себя знает, чего он хочет. Такие люди крайне долго ищут партнера, ибо количество критериев, по которым он выбирается, в несколько десятков раз выше, нежели даже у предыдущей ступени, не говоря уже об этом, — он показал на частокол, — мыслящем тростнике.</p><p class="p1">Наконец Эрл наложил наверху образовавшейся пирамиды еще две спички.</p><p class="p1">— И, наконец, эти двое, — сказал он, чиркая одной из спичек «частокола», — в данной выборке являются уникальными. Они равны по интуиции, по уму и чутью, и оттого подобных им очень мало. Их шанс встретить пару весьма невелик. Именно такие люди придумали легенду о «единственной», о той, которая «сразу все поймет», о главной и одной на всю жизнь любви... Не знаю, на пользу или во вред человечеству эта легенда, — я вообще не мыслю в категориях «вредно» — «полезно», — но вот вам налицо ее происхождение. Есть моя единственная, которая меня где–то ждет. Здесь критерий может быть всего один, но он гораздо тоньше. Она вот так поправляет волосы, вот так держится за поручень, вот так закидывает ногу на ногу или в таком–то возрасте читала такую книгу. Это вполне естественно: идет отбор, и для человека с чутьем количество критериев значения не имеет. Он их выводит из книжки, прочитанной ею тогда, когда и он ее читал. Или из пейзажа, открывающегося из ее окна. Или из конфеты, взятой в детстве без спросу. Генная память каждому покажет, кто — «его», а кто — не «его». Один любит только рыжих, курносых, синеглазых и веселых. Другой — только носящих очки и желательно чуть косящих. Третий любит тех, кто любит виноградное повидло, — одним словом, именно на этом этапе существует своя, единственная женщина. Это и есть сильная любовь. Никакой другой не существует.</p><p class="p1">— Но... неужели в вашем случае — а я уверена, что вы пережили нечто подобное, — все закончилось трагически?</p><p class="p1">— Отчего же. Мы вовремя поняли, что если так пойдет дальше, — нас перестанет интересовать все остальное, и за этими бесконечными ссорами, перемириями, экстазами и упоениями мы совершенно забудем о том, что есть ведь еще и хлеб насущный. И о нем, представьте себе, тоже нужно думать. Это ведь только разговоры, будто любовь способствует творчеству. Да, разумеется, — если вы несчастны, отвергнуты, одиноки, вам ничего не остается, кроме творчества. Творчество — универсальная компенсация пережитых вами унижений. Если вас ни разу не унизили, — какой из вас, к черту, творец?! Но такая любовь, любовь, поглощающая все ваше время... Вы начинаете творить совсем в другой области, — Эрл усмехнулся. — А мир между тем продолжается, продолжаются его борения и страсти, дети лишаются крова, дураки рвутся к своей и чужой гибели... Нет, я хоть и привык к отшельничеству, но до такой степени прощаться с миром...</p><p class="p1">— Вас, может быть, удивляет, отчего старик с вами разоткровенничался? — спросил он, закуривая, и продолжал, даже не обратив внимания на ее протестующий жест. — Вы представляетесь мне неглупой женщиной, которую весьма мало волнует моя живопись. Чтобы скрасить вам пребывание здесь, я готов был бы говорить о чем угодно, но, впрочем, тема любви и меня когда–то сильно волновала... до тех пор, пока я не понял, что кроме первой любви, нет никакой другой. Все прочее — измена, суррогат, который мы себе придумываем. Но первая любовь почти никогда не бывает счастливой. А если бывает — на нее так скучно смотреть со стороны... Или это наша зависть?</p><p class="p1">— Чужое счастье дурно пахнет, — произнесла она в задумчивости поразившую ее когда–то мысль.</p><p class="p1">— Совершенно верно. Оно пахнет скукой. Мне в последнее время все более интересны неживые объекты. Пойдемте в мастерскую.</p><p class="p1">Мастерская Эрла располагалась на втором этаже домика. Свет поздней осени лился через прозрачную крышу. Хорошо, должно быть, спать тут зимой, просыпаться, смотреть, как падает снег...</p><p class="p1">Вся мастерская Эрла была заставлена новыми работами. Как много он писал все это время! Но эти работы не были похожи ни на один из его прежних холстов — начинался, видимо, новый период... Самый страшный, — так подумала Элизабет, едва войдя. На резких, контрастных полотнах были только вещи — выписанные во всей своей четкости и наглядности. Бездушные, замкнутые на себе, вещи как вещи — не детали обихода, не одухотворенная, живая утварь эллинов, — нет, холодные, резко очерченные предметы, презрительно безучастные к человеку.</p><p class="p1">— В вашем теперешнем мире страшно, — пожаловалась Элизабет, как ребенок. Любой другой художник мог бы ответить на ее детское замечание снобистской усмешкой, неопределенным кивком или размытым замечанием насчет предшественников. Но не Эрл. Он спокойно кивнул ее замечанию, словно своим мыслям.</p><p class="p1">— Это путь всякой плоти, если угодно. Теперь меня занимает только это. Может быть, я просто приближаюсь к тому же состоянию, которое пытаюсь тут отобразить.</p><p class="p1">— Но такого жестокого реализма я у вас никогда не встречала!</p><p class="p1">— Что поделать. Мне еще никогда не было шестидесяти пяти лет...</p><p class="p1">Он подвел ее к столику, неприметно стоявшему в наименее освещенном углу комнаты.</p><p class="p1">— Видите, — это сюжет будущей картины. Не правда ли, как интересно?</p><p class="p1">Будущий натюрморт, искусно скомпонованный Эрлом, состоял из запыленного графина, нескольких разнокалиберных рюмочек и длинной сухой рыбины, которая лежала поперек стола. Эрл взял ее в руки и протянул Элизабет на раскрытых ладонях:</p><p class="p1">— Не правда ли, это гораздо интереснее всех моих прошлых объектов? И более странно. Возьмите ее в руки.</p><p class="p1">Это была вещь, вещь, бывшая когда–то живой и страдающей, поэтому сейчас ее рот оскален, рыбий зубастый рот, разинутый в последнем вздохе. От этого застывшее выражение ярости казалось безнадежным и пугающим — выпученный рыбий глаз, как бы увидевший нечто, чему нельзя сопротивляться, но что не перестает от этого быть ненавистным и пугающим. Рыба, увидевшая свою смерть. Рыба, знающая больше, чем они оба, стоящие над ней. Неодушевленный предмет. Ей уже не биться, не выгибаться в руках продавца. Желтых, ласковых руках палача. Элизабет вспомнила китайский ресторанчик и день открытия выставки Эрла. Когда это было? Два месяца назад? Этого не может быть...</p><p class="p1">Что с вами? Вам дурно?</p><p class="p1">— Нет, ничего... ничего... Душно, и с утра побаливает голова.</p><p class="p1">— О Господи! Старый идиот занимает вас разговорами... Пойдемте вниз, скорее вниз, на воздух. Я налью вам джину.</p><p class="p1">Элизабет оперлась на его руку. Они пошли к выходу, но с порога она обернулась на столик в углу. Рыба, небрежно положенная на место, сухая и твердая, по-прежнему скалилась. Путь всякой плоти.</p><p class="p1">Ступеньки деревянной лестницы поскрипывали, и каждая, казалось Элизабет, проваливается под ее ногой. Эрл знал, о чем говорить. Она сама предчувствовала. Поединок без победителя. Или полная власть над ней, или немедленное расставание, пока она еще в силах сопротивляться. Остатка дня она не помнила.</p></span><span id="id8"><div class="title2">
<p class="p"><strong>VII</strong></p>
</div><p class="p1">— Ползи!</p><p class="p1">Джон улыбался ей своей приклеенной улыбочкой; глаза его была страшим. Глаза садиста. Глаза мима. Глаза убийцы, который сейчас прикончит ее, не меняя гримасы тонких искривленных губ.</p><p class="p1">— Ползи!</p><p class="p1">Страшно. Нет... ничего страшного. Джонни играет в игру. Богатенький Джонни в своей квартире, перекладывая старые джинсы, рассыпал монеты по пату. Зашвырнул джинсы в угол. Нагнулся за деньгами... и какой–то хищный огонек блеснул я его тигриных глазах.</p><p class="p1">— Элизабет, — произнес он, — я хочу попросить тебя об одном одолжении. Помнишь, позавчера ты просила у меня денег?</p><p class="p1">— Я не просила, Джонни, — она напряглась.</p><p class="p1">— Неважно. Ты нуждалась в деньгах. И ты их получишь. Сядь на четвереньки, подбери эту мелочь — и она твоя. Заплачу еще сверху.</p><p class="p1">Все это было так чудовищно, что Элизабет растерялась. Она глядела на Джона с изумлением и упреком, у нее запершило в горле, к глазам подступили слезы. Она молчала.</p><p class="p1">— Ты слышишь меня? — в его голосе послышалось раздражение.</p><p class="p1">— Я... не понимаю тебя.</p><p class="p1">Он глядел куда–то мимо нее, в стену, пустую белую стену, и взгляд его выражал пустоту.</p><p class="p1">— Давай сыграем в одну игру, — пробормотал он тусклым, безжизненным голосом. — Ты сядешь на четвереньки и соберешь деньги. А я буду наблюдать за тобой. Вот... отсюда.</p><p class="p1">Он уселся в кресла</p><p class="p1">— Так... ладненько. — Джон потер ладони и уставился ей в глаза. — Ты послушная девочка. И ты сделаешь то, о чем я тебя прошу. Сделаешь, детка?</p><p class="p1">— Зачем это тебе? — она сглотнула подступающие слезы.</p><p class="p1">— Не задавай вопросов. Это мне... нужно. И ты, — он сбросил маску равнодушия и казался взволнованным, — ты должна подчиниться. Ты должна подчиниться! — заорал он на всю комнату, — Ползи!</p><p class="p1">— Я не хочу, — тихо сказала она.</p><p class="p1">— Элизабет!!! Ползи!</p><p class="p1">«Он невротик... — пронеслось у нее в голове. — Везет мне на психов... он сейчас убьет меня. Ему нужно... навязчивый невроз... если не закрыть форточку, то случится что–то страшное... так было у меня после Виктора...</p><p class="p1">Она с жалостью и страхом посмотрела на Джона.</p><p class="p1">— Успокойся, милый. — сказала она, пытаясь придать голосу ласку и нежность.</p><p class="p1">— Ползи, б..! — он даже подскочил в кресле.</p><p class="p1">— Нет!! — Ее вдруг захлестнула волна страшной ненависти, сердце превратилось в кусок льда, слезы высохли, не дойдя до глаз. — Не смей унижать меня, сволочь, выродок, псих, подонок!</p><p class="p1">Он улыбался (ужасен был у него этот переход от ярости к равнодушной наигранности садиста).</p><p class="p1">— Ползи.</p><p class="p1">— Сам ползай!</p><p class="p1">— Собирай деньги с пола!</p><p class="p1">— Сам подбирай свои вонючие центы!</p><p class="p1">— Элизабет, — гримаса, заменяющая улыбку, прыгала на губах, щеки его дрожали, глаза были холодны. — Тебе нравится эта игра, — голос его обрел гипнотическую интонацию, смягчился, стал тише, глаза горели. — Тебе нравится ползать по полу. Тебе нравится валяться у меня в ногах. Тебе нравится, когда я беру тебя — беспомощную, с завязанными глазами. — Он зашептал свистящим шепотом. — Тебе нравится, что я... в любой миг могу убить, но не убиваю... а ты подчиняешься мне... своему хозяину. Ползи, сучка! — шипел он, улыбаясь, — ползи, слышишь, это очень важно, ты обязана, слышишь... ползи!!!</p><p class="p1">— Нет!</p><p class="p1">— Тебе нравится эта игра!</p><p class="p1">— Я ненавижу эту игру!</p><p class="p1">Элизабет судорожно схватила несколько монет и, размахнувшись, швырнула их в лицо своему мучителю. Монетки просвистели по комнате, одна шмякнулась в колено ему, Джон привстал, ухмыляясь, и медленно двинулся к Элизабет. В руке у него вдруг оказался ремень.</p><p class="p1">— Тебе нра-авится, — говорил он, — ты это любишь... а еще ты любишь, когда тебя бьют по морде ремнем... по морде, по спине, по заднице... это так же приятно, когда я беру тебя сзади... нет, еще приятнее!</p><p class="p1">— Мразь! — Вскочив, она плюнула ему в лицо, бросилась, натыкаясь на мебель, вон из комнаты, рванула с вешалки пальто и выбежала на улицу. Прочь, прочь... больше никогда... все кончено... сволочь, выродок, мразь, подонок... гадина... мразь, подонок, пидор, сволочь... сука, подлец, кретин, ублюдок, ублюдок, ублюдок... все... больше никогда... сволочь, сволочь, сволочь... будь ты, проклят, дерьмо... торгаш вшивый... будь ты проклят!!!</p><p class="p1">Она ни о чем не думала в тот момент. Только потом она спрашивала себя: или и все было игрой, которая с самого начала должна была так развиваться, так закончиться? И не находила ответа: игрушкой она была с первого дня или действительно единственной женщиной в его жизни? Она ничего не могла понять до последнего дня, который — это она знала — уже недалек. Тогда будет поставлена точка, картинки сложится в мозаику. А пока, сходя с ума, она два дня не выходила из дома.</p></span></span>
