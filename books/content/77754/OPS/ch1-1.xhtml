<span><p class="empty-line"/><p class="p1"><em>В последние годы популярность двух работающих в паре молодых американских писателей, Мэтью Булла и Элии Миллера, перешагнула границы США, Не в последнюю очередь причиной тому послужил огромный успех таких шедевров кино, как «Калигула», «9 1/2 недель», «Дикая орхидея» и ряда других. Дело в том, что в романах Булла и Миллера (сами авторы называют их «кинороманами») сохраняются сюжетная канва и действующие лица знаменитых фильмов, однако при этом читатель получает возможность глубже вникнуть в психологию героев кино, движущие мотивы их поступков, понять истоки их счастья и их трагедии. Надо сказать, что Булл и Миллер, начав свой путь в искусстве как сценаристы, позднее стали создавать некоторые свои романы на сюжет просмотренных ими фильмов — совершенно независимо от сценариев, написанных другими людьми, В Америке, где весьма ревниво относятся к авторским правам, это было немалым риском, и тем не менее не было ни одного случая, чтобы писателей попытались привлечь к суду за плагиат: кинокомпании решили, что оглушительный успех романов Булла и Миллера является для них прекрасной даровой рекламой. Прозрачный язык этих произведений, изобретательность авторов, которые умудряются еще больше обострить сюжет даже самого авантюрного фильма, глубокое проникновение во внутренний мир персонажей, драматизм конфликтов и утонченность эротических сцен — все эти стилистические достоинства принесли книгам Булла и Миллера заслуженную славу. Их творчество стало совершенно новым явлением в мировой литературе: пожалуй, впервые не кино раскрывает в зримых образах литературное произведение, а, наоборот, кинематографические образы становятся исходным материалом для художественной прозы, которая их углубляет и обогащает. Не случайно известный американский актер, сценарист и автор нескольких нашумевших приключенческих романов Френк Луччезе сказал о Булле и Миллере: «Благодаря этим ребятам я вдвое больше узнал о фильме, в котором снимался, и вдесятеро — о человеке, которого играл». Нам остается лишь позавидовать читателям: им предстоит новая встреча с героями любимых фильмов и первое знакомство с увлекательными романами, придавшими очарованию этих фильмов новые краски.</em></p><p class="empty-line"/><p class="p1"><em>Печатается с любезного разрешения издательства «Кантли и Флеминг», Нью-Йорк, США</em></p><p class="empty-line"/></span>
