<p class="p"><strong>I</strong></p>
</div><p class="p1">Есть два вида любви. Можно сказать, что их гораздо больше, — двадцать два, двести двадцать два, столько же, сколько влюбленных, — но на самом деле от участи не спрячешься. С одной любовью можно еще что–то сделать, с другой — ничего. Одна протекает мирно и счастливо, начинаясь знакомством в своем, уютном привычном кругу. Затем — медленное движение друг к другу, наилучшие пожелания близких, возрастающая взаимная приязнь и, наконец, привычка. Другая обрушивается внезапно, со всей катастрофичностью непрошеного счастья, со всем жаром мгновенного узнавания, — обрушивается, не щадя и не спрашивая, не дав ни опомниться, ни защититься от неизбежности. Первая заканчивается благополучно, венчаясь венчанием или добропорядочными совместными уик-эндами с выездами за город или к обоим друзьям. Так или иначе — этот поезд идет по графику. Вторая неуправляема, как бешеный экспресс без машиниста, рушит семьи, опрокидывает надежды, обо всем заставляя позабыть, на все блаженно махнуть рукой, — и никогда не доводит до добра. Мечтая о такой любви, мечтай обо всем, кроме благополучного финала, — ни к чему себя растравлять несбыточными надеждами. Рано или поздно любящие, вырванные каждый из своей жизни страстным, неумолимым притяжением, усталые и сломленные, вернутся на крути своя. Вокруг — мир, навсегда лишившийся красок; унылый пейзаж катастрофы, с корнем вывороченные деревья, клочья травы, остовы сметенных зданий под безнадежным бесцветным небом, которому уже не засиять.</p><p class="p1">Эта страсть не протекает безмятежно: в безмятежности нет страсти. Если судьба из милости заранее устранила барьеры, не обременив любящих семьями, нищетой или робостью, — любовь воздвигает препятствия сама себе, мучит, изводит, сводит с ума обещанием невыносимого счастья, за одно мгновение которого двое беззащитных безумцев отказываются от всего, кроме друг друга. Мир становится враждебен им в ту же секунду, как на беду свою они впервые встречаются взглядами — на случайной вечеринке, на автобусной остановке, в убогом кафе на окраине. Не ждите, чтобы благополучные любовники вызвали такую ненависть, — их проводят добродушным подмигиваньем, поощряющей усмешкой. Но благополучные любовники не знают такой страстной, изводящей тяги друг к другу, заставляющей забывать о любых приличиях в баре, картинной галерее или мебельном магазине, — пусть смотрят, пусть видят, пусть завидуют втайне, ибо втайне о миге безумия грезит каждый.</p><p class="p1">Благополучных влюбленных тянет друг к другу, ибо их жизни изначально похожи. Так любят пастух и пастушка. Их сплачивает общая любовь — не друг к другу, а к покою, расчисленному бытию и надежной почве под ногами. Не так у внезапной, сумасшедшей любви, выбирающей жертв наобум. Принц и нищая, странствующий рыцарь и жена дровосека. У таких влюбленных — почти ничего общего, кроме какой–то одной, потаенной, самой болезненной струны, вроде книги, прочитанной обоими в детстве, или парка, мимо которого они бегали в школу. Их ничто не роднит, кроме единственной, никому не известной черты, — кроме которой, оказывается, ничего никогда не было.</p><p class="p1">Такая любовь срывает любые маски. Один всегда был повелителем, другая — втайне — всегда жертвой. Их встречи коротки и случайны, ласки ненасытны, во время дневных разговоров или блужданий все напоминает им о ночах. Постель — их крепость, их дом, их последнее и единственное пристанище. Этого не было и не будет ни с кем другим — только сейчас, пока их страсть запретна и будущее неясно, хотя оба догадываются о худшем. Они знают, что судьба глядит за ними пристально, пристальней, чем за любовниками-друзьями, благополучными партнерами в обоюдно признанной игре.</p><p class="p1">Обреченные любовники знают, что время их коротко и будущее печально. Они торопятся прожить отпущенный миг так, чтобы обнищавшим, смирившимся, изломанным и опустошенным, им было что вспоминать.</p><p class="p1">Эта любовь изобретает свои словечки, клички, условные знаки. Она, как может, отгораживается от мира, никого к себе не подпуская. Эта любовь — объект презрения и насмешки. Она опустошает и губит. Она калечит. Она сродни смерти. Двоим, предназначенным друг для друга, — лучше никогда не встречаться.</p><p class="p1">Но только это и зовется любовью. Все остальное, что претендует на ее имя, — подделка для бедных, жалкий заменитель, утешение для тех, кого не задел ураган. Пусть себе думают, что любят. Мы знаем.</p><p class="empty-line"/><p class="p1">Элизабет любила спать голой (не обнаженной, а голой — применительно к себе и к любому другому живому существу она этого слова не признавала — голая натурщица становилась «обнаженной натурой» только на полотне, а с полотнами она и имела дело уже десять лет, в колледже и галерее; да и вообще — к чему ложные красивости?). Она спала без ночной рубашки, хотя второй год просыпалась одна, — редкие случайные гости, приходившие и уходившие быстро и бесследно, не в счет. После развода с Брюсом она предпочитала не связывать себя ничем. По большому счету в ее кругу было не из кого выбирать, а покидать этот круг она всегда боялась, ибо с детства чувствовала себя с людьми не слишком свободно. В отличие от Молли, которая могла трепаться и пересмеиваться с кем угодно, ничему не придавая значения. Элизабет не любила утро, а это не нравилось ей совсем. Серый свет тек в окно, просачивался сквозь белые занавески. Она спустила ноги с кровати и босиком прошла в ванную. Пустила душ. Горячий душ возвращал ей если не бодрость, то спокойствие. Вода разгоняла остатки сонной слабости. Элизабет всегда мечтала заставить себя резко чередовать теплую воду с холодной — подруги вовсю расхваливали эффект, — но у нее никогда не хватало духу пустить ледяную струю. Что вы хотите, оправдывалась она перед собой, нежная плоть, сливочная кожа блондинки. Меньше всего на свете люблю менять привычки.</p><p class="p1">Вытираясь, она глядела в зеркало — не оттого, что любила рассматривать себя, но скорее машинально, привыкнув быть в форме. Тонкие руки, острые локти девочки-подростка. Она подняла руки, вытирая голову (узкие запястья, ногти, как всегда, без маникюра, никакой вульгарности). В детстве она боялась, что из–за худобы у нее никогда не разовьется грудь. Напрасные опасения. Брюс говорил, что более совершенной груди — упругой, округлой, с удлиненным соском — он не видел никогда; впрочем, много ли видел Брюс? Элизабет не удивилась бы, узнай, что она была у него второй или в крайнем случае третьей, — тем лучше, значит, он не лгал.</p><p class="p1">Прикосновение полотенца к животу и бедрам будоражило ее, возбуждало, но лишь слегка, — что ни говори, а зациклена на сексе, в отличие от Молли, она никогда не была. Ей есть чем заполнить свою жизнь. К чему превращаться в самку? Ей никогда не приходилось забываться, терять самообладание, вытворять безумства в постели, да и Брюс был сдержан, весь свой мужской пыл вкладывая в выяснение отношений. О, для этого рождены все неудачники. Поиск виновного увенчивается долгожданным успехом, после этого он принимался каяться и просить прощения, утыкаясь ей в колени. Ах да, колени. Своими ногами она вправе была гордиться и никогда не носила макси. Тонкая лодыжка, узкая ступня с длинными пальцами. Светлые волоски на голени почти незаметны. Некоторые бреют или выщипывают. Отвратительная манерность. Лучше вообще оставаться такой, какая ты есть, — Элизабет не любила ни кричащего грима, ни духов с душным, резким запахом. Максимум естественности. Когда Брюс ее встретил, она больше всего любила джинсы и свитера, словно знак своей принадлежности к давно ушедшей эпохе. Сейчас ей нравились скромные платья холодных тонов, длинные свободные плащи, шали. Какая прелесть — кутаться в плащ, халат, шаль, какая прелесть — вообще кутаться! Не тем манерным, кошачьим движением, каким, например Дженнифер набрасывает на плечи платок. Нет, какая радость просто погружаться в тепло, отгораживаться, замыкаться, уходить, как улитка в раковину!</p><p class="p1">Элизабет знала, что нравится многим, — но именно нравится, и только. Вызвать обожание она едва ли могла, да и не хотела. Скромная девочка из хорошей семьи. Естественно, школьные вечеринки, студенческие компании и все такое. Но чтобы кто–то из–за нее прыгнул с моста или перерезал себе вены — нет, никогда... страшно вспомнить! Ей хватило Стива, молодого художника, о котором она писала в прошлом году; после экспозиции в их галерее он совершил то, что называл «веселым безумством»: подхватил ее на руки и умудрился съехать по перилам, не уронив и не упав сам. Впрочем, и живопись у него была в том же духе.</p><p class="p1">Она нравилась умным мужчинам и любила умных мужчин, но от их вечных разговоров ни о чем, от бесплодных поисков и смешных метаний ее тошнило. А выяснять отношения Брюс ее отучил навеки, спасибо ему. Постепенно она привыкла к отсутствию постоянного собеседника. Люди всегда утомляли ее — чужие люди, как она называла их про себя, хотя своих вокруг нее всегда было немного. Одна. В одиночестве есть свои преимущества. Она слышала, что о ней говорят как о замкнутой и недоступной — в какой–то степени ее это радовало, хотя легенда эта льстит недолго. На самом деле она дорого дала бы за то, чтобы кто–нибудь сегодня разбудил ее осторожным поцелуем, хотя бы вот сюда... идиотка несчастная, засмеялась она... а потом принес кофе, хотя лучше, чем она, его все равно никто не сварит!</p><p class="p1">Она кладет в джезву две палочки гвоздики. Не больше. Чуть корицы. Горошину черного перца. Вот так. Пока кофе закипает, она смотрит в окно. Та странная пауза между дневным и ночным дождем, которую стыдно называть утром. Дома, в Атланте, хорошей погоды было гораздо больше. Или это оттого, что там она была дома и радовалась каждому пробуждению? С тех пор, как она уехала — сначала в колледж, а потом с Брюсом сюда, в Нью-Йорк, — никто особенно не радовался ее пробуждению. Что ты удивляешься, оборвала она себя. Тебе двадцать семь. В этом возрасте смешно по-щенячьи радоваться жизни. Да вообще смешно по-щенячьи радоваться чему–то. Не те твои годы, не тот твой характер, не то, наконец, твое образование. Отец учил ее никогда не радоваться шумно и к любым неприятностям быть готовой заранее. Спокойнее, спокойнее. Что у нас плохого, кроме погоды? Выставка Эрла. Желательно продать хотя бы три картины. Сегодня ей вместе с Молли предстоит заняться организацией банкета. Кого позвать? Без Сен-Клера обойтись не удастся: его слово — закон в их кружке, его статья может сделать Эрла знаменитостью, его мимолетное и снисходительное одобрение стоит самого восторженного и пространного отзыва любого из коллег. Нужно позвать кого–то из критиков и хотя бы одного газетчика. Вот этой публики Элизабет не любила. Говорливые, поверхностные во всем, сегодня пишущие о Дали, а завтра — об очередном скандале из–за того, что губернатор штата в младенчестве отличался особой жестокостью в играх со своей кошкой. Нет, ей не нравились профессионалы, — а в эту профессию дилетантство входило как непременная составляющая. И все равно кого–то ангажировать придется — ведь если они не продадут ни одной картины, шеф будет капитально огорчен, а огорчать этого добродушного, длинноволосого, обзаводящегося брюшком субъекта, который был так снисходителен к их отлучкам и опозданиям, ей не хотелось.</p><p class="p1">Эрл быт сложный и странный художник, весьма далекий от нее самой, — не то импрессионист, не то фовист, а в последнее время он явно тяготел к примитиву, хотя прошел через соблазны фигуративности. Именно работы этого периода сделали ему имя. Она, выросшая на Буше и Ватто, теперь больше всего любила Ренуара и Сера, нравился Матисс и голубой Пикассо, но после тридцатых годов, казалось ей, живописи не существовало, — существовали более или менее удачные попытки прикрыть импотенцию и пустоту. Мир вообще устал. Никому ничего не нужно. И она еще хочет кому–то продать картины, не нужные никому. Как и она сама. Впрочем, может, это и к лучшему — не она ли мечтала о мире, в котором никто никому не будет должен и каждый будет сам за себя? Без излияний, без притязаний на душу.</p><p class="p1">Она допила кофе — нет, нет, что ни говорите, а это ей удается в совершенстве, такого она не пила ни у кого! — прошла в комнату, скинула халат и принялась одеваться. Времени было в обрез — она мельком глянула на часы. Элизабет, напевая — не от радости, а исключительно чтобы подбодрить себя и позлить кого–то невидимого, кто, казалось ей, недоброжелательно за ней наблюдал уже не первый год — застелила постель. Одевание было для нее не самой приятной процедурой. Готовило к рабочему дню и вырывало из нежных объятий халата. Свободная, но холодная шелковая блузка. Лифчиков Элизабет не признавала. Серо-зеленый, в цвет глаз, длинный свитер, купленный на распродаже полгода назад. Плащ. Она готова.</p><p class="p1">Слава Богу, она жила недалеко от галереи и шла туда обычно пешком. Осень давала себя знать, хотя сентябрь только начался и до индейского лета было не так уж далеко. Водяная пыль сеялась над мостовой. Как всегда, Элизабет купила газету, но, не успев просмотреть, вынуждена была использовать ее как зонтик. Навстречу пробежали два брата-близнеца (очкарики, каждый с неправильным прикусом, рыжие, неизменно улыбающиеся ей) — они, как всегда, бежали со своим псом, туго натягивавшим поводок, тащившим хозяев за собой. Элизабет рассеянно кивнула. Бег по утрам? — какой тут нужен героизм, стоицизм, если хотите! А каждое утро выгуливать пса, в любую погоду? — нет, увольте, вот почему у нее нет собаки! Отвечать за любое другое существо — значит опять попадать в кабалу, а других отношений она не знала... Грузчики, запихивавшие мебель в свой фургон, посмотрели ей вслед, и это ее беспричинно обрадовало. Подумаешь, грузчики! Однако кому–то, а хоть бы и грузчикам, равенства еще никто не отменил, — кому–то она способна нравиться, и оттого не следует ставить на себе креста. На службу она влетела в половине десятого. Шеф улыбнулся ей со своего места. Молли протянула записку.</p><p class="p1">— Вот, Сен-Клер просил тебе передать.</p><p class="p1">— Он заходил?</p><p class="p1">— Да, вчера вечером. Ты уже ушла.</p><p class="p1">Значит, он получил ее приглашение на вернисаж. Что ж, посмотрим, что пишет Сен-Клер. Их отношения, конечно, не отличались особой теплотой, — у Сен-Клера ни с кем не могло быть теплых отношений, а по слухам, которые он сам усердно распускал, — женщины его вообще мало интересовали, и с некоторых пор пресыщенный эстет предпочитал мальчиков, причем китайского происхождения. Не знаю, как там насчет мальчиков, а китайская кухня ему чрезвычайно по душе, подумала Элизабет, разворачивая записку.</p><p class="p1">Сен-Клер извещал, что получил «прелестное приглашение» и любезно лгал, что был польщен. «На вернисаж Эрла я, пожалуй, не явлюсь, и не оттого, что слишком хорошо знаком с его творчеством, но оттого, что мне надоели разочарования. К вам, дорогая Элизабет, я загляну с большим удовольствием. Надеюсь, вы все расскажете мне о вернисаже и об Эрле вечером 13-го сентября, после вернисажа. Смею просить вас впустить меня на банкет, невзирая на мое отсутствие на официальной части празднества. Сердечно ваш — Сен-Клер».</p><p class="p1">Что ж, важно не то, что он посмотрит или не посмотрит картины; важно, что он заглянет сегодня вечером к ней и, напившись, по обыкновению начнет разглагольствовать. Журналисты и даже коллеги любят его послушать, особенно в подпитии. Будет ли он ругать или хвалить Эрла — интерес обеспечен. Лишь бы не ляпнул, будто не знает, кто это такой. Элизабет сложила записку, потом выбросила в корзину. Потомство обойдется без этого уникального человеческого документа, тем более что Сен-Клер наверняка сделал копию для своего архива.</p><p class="p1">Молли отправляла курьера за завтраком. Она, как всегда, не успела перекусить дома. Старина Молли. Пышная, хотя уже несколько обвисшая, слишком мягкая грудь. Темные, как маслины, черно-карие глаза. Шапка кудрявых крашеных волос. Громкий голос и заливистый смех. Дымит, как паровоз. Всеобщая отдушина и жилетка, всеобщая любовь Молли. Провинциалка, которая всюду дома. Вышла замуж в восемнадцать и развелась в девятнадцать. Одиночка Молли. Добрая душа, не теряющая надежды сосватать для Элизабет пожилого холостяка — совершенно не ее круга, но тем и лучше! Это она полгода назад подарила Элизабет котенка, пообещав впоследствии достать и настоящего кота. Молли перечисляла:</p><p class="p1">— Купишь шоколадную булочку, пирожное и кофе.</p><p class="p1">— А мне принеси горячую воду и лимон. И пусть денег не берут! — усмехнулся со своего места шеф.</p><p class="p1">— Ты деньги экономишь? — улыбнулась ему Элизабет.</p><p class="p1">— А что делать? Если мы не продадим картины, нас всех уволят, — осклабился шеф. — Кстати, ты написала об Эрле для «Файн-арт-мэгэзин»?</p><p class="p1">— Написала, написала. Такой рекламы он еще не получал. Я позволила себе утверждать, что на «Женском портрете» у него все дышит такой первозданной чистотой и страстью, как будто...</p><p class="p1">— Как будто это единственная натурщица, которую он не успел разложить у себя в кабинете.</p><p class="p1">— Или в мастерской, где все прекрасно оборудовано, — вставил шеф. — Все для соблазнения.</p><p class="p1">— Ты–то откуда знаешь?! — они расхохотались.</p><p class="p1">— Это что! Я даже могу на «Женском портрете» сравнительно легко в лабиринте линий обнаружить женщину!</p><p class="empty-line"/><p class="p1">К банкету надлежало кое-чего подкупить.</p><p class="p1">— Сливки, соленые огурцы, — перечисляла Элизабет, спускаясь по лестнице. — Сен-Клер ведь, кажется, вегетарианец?</p><p class="p1">Они с Молли шли в китайскую лавочку. Их обгоняли косоглазые школьники, направлявшиеся туда же за сластями. Взгляд Элизабет упал на прилавок соседнего магазинчика. Сквозь окно было видно, как продавец, вооруженный длинным ножом, разделывает рыбу на прилавке.</p><p class="p1">Он брал крупную живую рыбину и несколько мгновений смотрел, как она бьется. Может быть, так нужно было — выждать несколько мгновений. Рыба упиралась в прилавок головой и хвостом, вяло, обреченно билась, переворачивалась, шлепалась. Жабры ее дышали редко, приоткрывались едва-едва. Элизабет с брезгливым ужасом смотрела на эту странную, уродливую агонию, — на рыбу, выгибающуюся в руках продавца, на рыбном прилавке. Что–то почти эротическое — и оттого еще более обреченное и отталкивающее — было в движениях бьющейся рыбы и в движениях крупных «желтых» рук продавца. Он резко хватал рыбину, отсекал голову и принимался чистить. Элизабет с отвращением отвернулась.</p><p class="p1">Они зашли в лавочку.</p><p class="p1">— Вы думаете, мы собираемся эту вашу рыбу съесть?! — по обыкновению, кричала Молли, торговавшаяся там, где нужно, и там, где это вовсе необязательно. — Да мы просто собираемся ее надлежащим образом похоронить!</p><p class="p1">Элизабет не удержалась и прыснула, следом расхохоталась Молли, а содержатель лавочки так и не уяснил себе смысла сказанного. Зато случайный посетитель, вздыхавший при взгляде на цены, очень хорошо оценил шутку и от души расхохотался, поглядывая больше на Молли.</p><p class="p1">Внезапно Элизабет почувствовала на себе взгляд. Она никогда не верила в такие вещи, но сейчас ощущала инстинктивно, что кто–то смотрит на нее с любопытством и восхищением. Она оглянулась. Сзади нее стоял незнакомый мужчина лет тридцати и весело ей улыбался.</p><p class="p1">Он был полноват, хотя строгий темный костюм сидел на нем безупречно. Его глаза улыбались озорно и доброжелательно, но и в повороте головы, чуть склоненной, и в улыбке, и в том, как он стоял у двери и смотрел оттуда на Элизабет, то — мельком — на Молли, то на свободный столик, — во всем этом чувствовался лад с миром и умение его подчинить себе, когда нужно.</p><p class="p1">Он смотрел на нее, как на девочку-подростка, — как никогда не смотрел на нее отец, слабый, добрый и всегда, кажется, побаивавшийся дочери. Нет, этот смотрел без всякой робости: как на младшую, насквозь понятную, — смотрел с тайным одобрением, словно, например, она только что на его глазах лихо проехала на велосипеде, отпустив руль. «Молодец», — невесть почему говорил его поддразнивающий взгляд, в котором читалось: «Я–то и не так еще могу».</p><p class="p1">Она улыбнулась ему в ответ. Подумаешь. Это ни к чему ее не обязывало.</p><p class="p1">Молли заметила, что Элизабет улыбается незнакомцу, и посмотрела на него с той обаятельной, но нагловатой оценивающей усмешкой, от которой так тушевались мужчины. Этот, впрочем, усмехнулся в ответ и не отвел глаз.</p><p class="p1">— Пожалуйста, пятнадцать китайских печений с предсказаниями судьбы, — попросила Молли продавца.</p><p class="p1">Тот принялся бережно и осторожно перегружать в ее пакет хрупкие, ароматные чудеса своего загадочного искусства. Элизабет не выдержала и, закусив губу, чтобы не рассмеяться, еще раз оглянулась. Незнакомец по-прежнему улыбался ей, как старший мальчишка из дома напротив, — поддразнивающе и одобрительно. Склонив голову набок. Темно-каштановые волосы, круглое лицо. Глаза хулиганистого подростка, привыкшего прилично вести себя в обществе, но во всякую секунду готового что–нибудь выкинуть. Элизабет поймала себя на том, что ее улыбка становится почти призывной, приглашающей за ними последовать. Молли уже тянула ее к выходу. «Неужели пойдет за нами и заговорит?» — думала Элизабет с испугом и тайной надеждой. Давно она так не улыбалась никому, да и с чего бы это вдруг? Она оглянулась в последний раз, уже закрыв за собой стеклянную дверь. Он шутил о чем–то с продавцом. Он и не думал за ними следовать. Так тебе и надо, мечтательная дура.</p><p class="p1">...У нее в квартирке, где и должен был состояться банкет, Молли с ходу сбросила сандалии и босиком прошлепала на кухню. Элизабет смотрела ей вслед. Полные, сильные икры, смуглые ноги с темными волосками — из–за этого Молли никогда не могла себе позволить мини-юбку. Отчего у нее все так просто? Не может быть, чтобы она была лучше Элизабет. Глядя на ее ноги, вспоминаешь о расческе. Хоббит-Молли, и однако она с поразительной легкостью затаскивала к себе в постель, кого хотела. Даже шеф, поговаривают, однажды с ней переспал, — правда, сама Молли яростно отрицала это. Элизабет сунула ноги в мягкие вязаные тапочки и прошла вслед за подругой, которая уже хозяйничала на кухне. Впрочем, она была единственной, кто действительно гостил здесь частенько. Готовила она, как богиня кулинарии, если только такая существовала в мифологии. Элизабет напрочь перезабыла почти все, чему ее учили в колледже, не путаясь только в направлениях живописи XX века, — хотя кому какое дело до них сегодня?..</p><p class="p1">Молли взглянула на нее иронически:</p><p class="p1">— Ты все переживаешь из–за таксиста?</p><p class="p1">С таксистом вышло действительно неловко. Когда он вез их из лавочки, Молли издевалась над бедным малым, как хотела. Начать с того, что она тормознула машину только потому, что крикнула во все горло: «Я беременна! И она тоже!» Шофер подозрительно оглядывал Элизабет: если она и могла быть беременна при своей фигуре, то максимум на втором часе беременности. Молли, впрочем, от души веселилась.</p><p class="p1">— Из–за таксиста? Что ты, он был вполне тобой очарован.</p><p class="p1">— Или тебе понравился этот, в лавочке? Этот пухлый?</p><p class="p1">— Он не пухлый, — машинально вступилась Элизабет за незнакомца.</p><p class="p1">— Успокойся, подруга! Ты можешь прийти в себя? Ты скоро будешь помешать объявления в копеечных листках: «Разведенная женщина, белая, протестантка, — ты протестантка? С прекрасной фигурой и прозрачными серыми глазами. Образованная, — ведь ты образованная? — ищет парня, с которым можно весело перепихнуться, не обременяя себя заботой о его комплексах и желудке». Так?</p><p class="p1">Элизабет поморщилась.</p><p class="p1">— Про меня ты все знаешь. О себе подумай.</p><p class="p1">— Да я–то что, я грубая, невоспитанная, сексуально озабоченная, старая лохматая женщина, но тигрица в постели. Мелкие острые зубы и мохнатое, теплое заветное место, жаркий источник экзотических удовольствий... Ласки до посинения.</p><p class="p1">Элизабет против воли рассмеялась. Молли была неисправима, но и неотразима. Один Бог знал, чего ей это стоило. Или Элизабет нарочно придумывала ей проблемы и несчастья? Может быть, она так и жила — просто, ни о чем особенно не задумываясь? Может быть, только у самой Элизабет все так сложно?</p><p class="p1">Она прогнала эти мысли, заодно махнув рукой и на незнакомца. Но он еще несколько раз вспомнился ей, пока она раскладывала оливки, заталкивала огурцы в овощерезку и смешивала особенный, французский салат, которому ее научил еще в колледже один стройный француз, обожавший Мане, Пикассо и одно время — ее.</p><p class="p1">Чайная ложечка висела на носу. Нос принадлежал Дженнифер. Эта шуточка была вполне в ее духе. Дженнифер вела колонку в «Файн-арт-мэгэзин» и отличалась абсолютной разнузданностью при полном невежестве. Однако она так уже умела щегольнуть словцом или именем, чтобы произвести впечатление на коллег и дилетантов, как умела иногда в разговоре упомянуть свое фривольное приключение так, чтобы шокировать даже самую раскованную публику. Вот и теперь, с ложкой на носу, под общий хохот она рассказывала:</p><p class="p1">— Дамы и господа, у меня недавно произошел прелестный эпизод с новоприбывшим русским маэстро, из эмигрантов. На родине все по нему сходили с ума, кей-джи-би и все такое. Он думал, что и здесь на что–нибудь сгодится. Получает он действительно гораздо больше, чем у себя, в подвале на Лубянке...</p><p class="p1">— Деточка, в подвалах на Лубянке получают совсем другое, — перебил Сен-Клер, еще не слишком набравшийся и на редкость благодушный. Элизабет не раз ловила на себе его снисходительный и в то же время отчего–то жалкий взгляд.</p><p class="p1">— Ну, я не знаю, мозги сломаешь с этими русскими... Фамилию не выговоришь... Брюлляев...</p><p class="p1">— Деточка, Брюлляева звали Брюллофф. Был такой классицист, он умер полтораста лет назад.</p><p class="p1">— Господи, ну какая разница, Бурляефф, может быть... Короче говоря — вы, буквоеды, слушайте, сейчас будет интересно! — он подметает здесь улицы и вполне доволен жизнью, платят ему прекрасно, но ни одной картины он пока не продал. Он рисует своих бывших президентов, я забыла, как звали этого, хорошенького, с такими бровями...</p><p class="p1">— Его звали Президент Брежнефф, детка.</p><p class="p1">— Ну да, он нарисовал его голову, прилепленную к торсу Давида. И вместо пращи слуховой аппарат. Дешевка, но прелесть. Он затащил меня к себе и пытался рассказать о своем творческом пути, все такое. Называл каких–то наших мастеров, у которых якобы заочно учился. То ли дело в произношении, то ли в моем невежестве, но я не знала никого, кроме Раушенберга. Он напоил меня русской водкой, которую привез оттуда и понемножечку разливает тем, кого считает влиятельными критиками. Словом, на какое–то время я отключилась, а когда очнулась, мне было прекрасно. Этот русский медведь раздирал мне внутренности. В их хваленой неотесанности есть своя изысканность...</p><p class="p1">— Дженнифер, прелесть моя, вы не боитесь рассказывать об этом?</p><p class="p1">— Помилуй Бог, они теперь в большой моде. Он кончил, и я почувствовала себя на седьмом небе. Господа, с этого дня я искренне полюбила все русское! Положительно, коммунизм идет на пользу мужчинам!</p><p class="p1">— Дженнифер, еще немного, и я примусь читать Маркса! — вставил давний ухажер Дженни, журналист и выдающийся пустослов Грегори.</p><p class="p1">— Это помогает не всем, — молниеносно среагировала Дженнифер.</p><p class="p1">Грегори как–то вздрогнул.</p><p class="p1">— Ну, это может сделать кто угодно, — невнятно пробормотал он.</p><p class="p1">— Трахнуть Дженнифер или читать Маркса? — поинтересовалась Молли.</p><p class="p1">— Трахнуть Маркса! — орал Сен-Клер, пытаясь перекричать общий хохот.</p><p class="p1">— Тебе бы Мао-цзе-Дуна трахнуть, — зло прошипел Грегори.</p><p class="p1">Сен-Клер, как ни был пьян, перекосился и застыл с ошалелой улыбкой, уставясь безумными глазами в потолок. Элизабет стало его жалко. Она вдруг увидела, как он стар, одинок, жалок со своими никому не нужными книжками и никем не читанными статьями. Его подпись, его рекомендация, его одобрение стоили многого, но для того, чтобы узнать, как он относится к такому–то художнику, совершенно необязательно было дочитывать до конца. А мальчики... что ж мальчики... она никому не судья.</p><p class="p1">— Грегори, ты не прав, — сказала Элизабет, стараясь разрядить обстановку. — Держать ложку на носу и беседовать о русских — на это способна только Дженнифер.</p><p class="p1">— С ложкой на носу? — переспросил Грегори. По его лицу было заметно, что он силится придумать какую–нибудь гадость, но никак не может придумать.</p><p class="p1">Элизабет отвернулась к Сен-Клеру.</p><p class="p1">— Надеюсь, вам все же нравится Эрл? — ласково спросила она.</p><p class="p1">— Какой Эрл? — Сен-Клер все глядел в потолок, пальцы его, сжимавшие бокал, дрожали.</p><p class="p1">— По-моему, он настоящий художник, — мягко произнесла Элизабет, — он пишет серьезные портреты.</p><p class="p1">Глазки Грегори хищно и счастливо сверкнули.</p><p class="p1">— Он снимает штаны, засовывает кисть себе в задницу и так рисует! — Грегори прямо–таки визжал от хохота.</p><p class="p1">— Я думаю, что ты так же пишешь свои рецензии, — сухо проговорила Элизабет.</p><p class="p1">Сен-Клер, расплескивая вино, быстро пробирался к выходу. Дженнифер в упор глядела на Грегори. Молли дремала в кресле. Вечер был скомкан, как неудачный эскиз. «Выброси его в корзину», — пьяно пробормотала Молли. Элизабет вспомнила странную девушку с картины Эрла: она лежала на спине в ожидании любви, лежала долго, шли годы, текли столетия, небо над ней было серым и безжизненным... она лежала, слегка раздвинув ноги, глаза ее были закрыты, никто не приходил.</p></span></span>
