<span><span><p class="p1">— Извините ее, ребята, — заговорила Кло, кладя ногу на ногу. — Все вы детишки взрослые. У всех есть жены. Все вы знаете, какими мы бываем в определенные дни месяца. И когда полная луна. И далеко от дома... Ты, наверно, привык к подобным вещам, Джером, — обратилась она к изумленному Гэлбрейту. — Я имею в виду: ты привык к подобным вещам здесь, в командировке?</p><p class="p1">— К-какой Джером, — тупо произнес Козел, начиная заикаться.</p><p class="p1">— Я месяц назад виделась с Синти, очаровательной твоей женушкой, — невозмутимо продолжала Кло. — У нее тоже что–то подобное бывает, верно? А какая она впечатлительная, твоя половина! Причем я заметила, что она очень ревнива. И совершенно безосновательно, правда, милый? Как она иногда мучает тебя своими глупыми подозрениями, сладкий мой мальчик. Мне тебя иногда просто жалко. Помнишь я тебя жалела как-года, а один раз зашла пожалеть и опоздала, тебя уже жалели без меня. Ах, Синти, Синти, — тараторила Кло, — не ценишь ты своего юриста!</p><p class="p1">— Гэлбрейт, в чем дело? — наклонился к нему Элиот.</p><p class="p1">— Дело в том, — объяснила Кло, — что наш мальчик слишком много путешествует. С тех пор, как ее отец сделал тебя партнером по фирме. Когда я как–то виделась с ней, она пожаловалась, что дети совсем не видят отца.</p><p class="p1">— Д-да, — проговорил Гэлбрейт, — я и с-сам п-подумываю о том, чтобы проводить с ними побольше времени.</p><p class="p1">— А это просто, — посоветовала Кло. — Пусть ваш клиент подпишет мою бумагу и катится с вами на все четыре стороны.</p><p class="p1">— Подписывай, — произнес Гэлбрейт, переглянувшись с коллегой.</p><p class="p1">— Подписывать? — спросил Элиот.</p><p class="p1">— Подписывай, кисуля! — сказала Кло. — Вот так. А теперь прощайте, ребятки. И, Джером, не забудь, пожалуйста, передать нашей Синти, что я заеду к ней нынешним летом. Чао!</p><p class="p1">Взяв Эмили под руку, она удалялась, покачивая бедрами и напевая что–то из «Битлз».</p><p class="p1">...Кло рассеянно трогала мужские костюмы в самом дорогом из окрестных магазинчиков, куда они зашли принарядиться перед карнавалом.</p><p class="p1">— Ты составила документы для китайцев?</p><p class="p1">— Да, конечно.</p><p class="p1">— Дэн Сяо Пин х... не подточит?</p><p class="p1">— Едва ли ему захочется точить х... о такое соглашение, — сдержанно улыбнулась Эмили. Если ей всегда теперь придется общаться с людьми в таком стиле, это не стоит ее гонораров. — Но с китайским законодательством все согласуется.</p><p class="p1">— Отпечатала?</p><p class="p1">— Да, девушки все сделали. Три экземпляра, как ты просила.</p><p class="p1">— И с точки зрения ихних законов там все гладко?</p><p class="p1">— Более-менее. Конечно, инвестировать что–то в такой отель — рискованное дело, тем более что у китайцев последняя сделка с бразильцами имела место быть сорок лет назад. И тогда ничего толком не вышло. У китайцев шло резкое покраснение, а потом за них краснели бразильцы. Все сорвалось. Но теперь, кажется, Дэн провозгласил контакты, дружбу, жвачку и все такое...</p><p class="p1">— Откуда ты все это знаешь?</p><p class="p1">— Училась хорошо, — коротко и корректно сказала Эмили.</p><p class="p1">— Слушай, — сказала Кло задумчиво. — Ты никогда не хотела быть мужчиной?</p><p class="p1">— Странная связь. Женщина-юрист ничуть не хуже. Сегодня ты мне доказала, что это даже имеет свои преимущества, — Эмили вымученно улыбнулась.</p><p class="p1">— Я не о юриспруденции... — Кло была мягкой и задумчивой. Сделка подходила к благополучному завершению, и дозволялось расслабиться. — Я о другом. Почувствовать, что чувствует мужчина... Побыть, например, Уидлером. Хоть пятнадцать минут.</p><p class="p1">Эмили попыталась представить Уидлера с полицейской дубинкой между ног. Не получалось. А интересно, как это у него выглядит. Если только он не импотент, чего исключать нельзя... Хотя такая бешеная энергетика не может исходить от импотента. Побыть им... Эмили представила себя с полицейской дубинкой между ног. Если бы Уидлер был женщиной, она бы раздела его и пнула ногой: ступай, ты никому не нужен. И пошла бы трахать Гэлбрейта, если бы он был шлюхой. И затрахала бы его до обморока. Она расхохоталась.</p><p class="p1">— Только если бы Гэлбрейт был бабой, — сказала она Кло. — Тогда, в порядке реванша, — сколько потребуется!..</p><p class="p1">— Ладно, — остановила ее Кло. — Только не надо мне говорить, что ты не хотела бы хоть раз в жизни, хоть пятнадцать минут, хоть ценой унижения, но побыть в шкуре Уидлера.</p><p class="p1">Она говорила непривычно медленно и печально.</p><p class="p1">— Странный–то он конечно странный... Не думай: я не для того тебя ему подсунула, чтобы он проглотил наживку. Его все равно так не раскусить. И не для того, чтобы отвлечь его на тебя: он не должен много разузнать о нашей сделке, а то — чем черт не шутит! — возьмет и перебьет, а если ты его зацепила, это его, конечно, остановило бы... Но не в том дело. Все равно на свидание с ним надо было кому–то идти. Я ничего не подстраивала нарочно. Но я надеялась его раскусить...</p><p class="p1">Странно, подумала Эмили. Все хотят что–то почувствовать через меня. Собственной чувствительности не осталось, что ли?</p><p class="p1">— Он, конечно, умелый малый, — задумчиво продолжала Кло, на которую нашел некоторый сентиментальный стих, — Дистанция. Полный контроль... А я хочу, — вдруг резко и решительно сказала она. — Хочу быть Уидлером. Потому что тогда я, может быть, пойму, в чем секрет его власти надо мной.</p><p class="p1">— Его — над тобой?</p><p class="p1">— Он меня подсек, как только в его увидела.</p><p class="p1">Эмили передернуло. Да что же это такое? Мне вовсе неинтересны ее откровения... Господи! Или я ревную? Не может быть, чтобы она — она! такая! — была его любовницей!</p><p class="p1">— Он появился впервые, когда мне надо было разобраться в одном деле. Я ведь тоже юрист по образованию, знаешь? И передо мной лежала папка. С делом. Об этих ребятах, которые наглым образом отмывали деньги. Он пришел. Увидел. И, соответственно, победил.</p><p class="p1">Кло говорила непривычно ровно, без единого грубого слова.</p><p class="p1">— Он пришел и забрал дело. И все. А мне было все равно, я уже принадлежала ему, честное слово. Вот что называется «подсек». А потом он стал меня использовать...</p><p class="p1">— Использовать как? — спросила Эмили, едва шевеля губами.</p><p class="p1">— Как своего посредника в разных делах. Как помощницу.</p><p class="p1">Эмили надеялась, что ее облегченного вздоха никто не заметил. Ни девушка-продавщица, воззрившаяся на них, — и впрямь странно было видеть двух иностранок, разоткровенничавшихся так некстати, — ни сама Кло, решившая вдруг рассказать подруге свою трудную и печальную жизнь. Эмили терпеть не могла таких рассказов и сама, согласно Карнеги, не слишком любила обременять окружающих фактами своей биография.</p><p class="p1">— Я стала следить за ним. Везде, куда бы он ни мчался. Он колесил по всему континенту, прежде чем осел здесь. Куда бы он ни ходил, за ним следовал мой человек. Я наняла частного детектива, — да, да, даже так! — чтобы проверить его прошлое.</p><p class="p1">— Я не хотела бы показаться грубой, — сказала Эмили, — но я... — Она собралась с духом: — Я предпочла бы не слушать о вашей личной жизни.</p><p class="p1">— В этом нет ничего личного, — горько сказала Кло. — Он ни разу до меня не дотронулся. А что, — она прищурилась, — что, если я тебе скажу, что он был сиротой на улицах Чикаго и Филадельфии? Был бунтарем в школе? А потом, в свое время, творил такое!.. Какие безумства! Чикаго, Калифорния, да что там — пол-страны, я уверена, о них говорят!</p><p class="p1">Ну уж и пол страны, с неприятным ревнивым чувством подумала Эмиля. Ревновать его к такому количеству людей, конечно, смешно, но все–таки он не новый русский лидер, чтобы о его безумствах говорила вся Америка...</p><p class="p1">— А знаешь ли ты, — мечтательно гладя мужские костюмы, полузакрыв глаза, говорила Кло, — знаешь ли ты, что моя одержимость им стала неуправляемой, невыносимой...</p><p class="p1">Эмили отметила про себя, что если Кло и приходилось когда–то гладить мужскую одежду, то исключительно рукой. Женщина, свободная от быта, находящая романтичным свое увлечение миллионером и его костюмами. Она и заговорила теперь в том стиле готических романов, на котором, вероятно, была воспитана, пока за ее воспитание не взялась жизнь как таковая.</p><p class="p1">— Ты не представляешь, до чего доходило! Я переоделась служанкой — ну, горничная (Правильно, подумала Эмили, служанка — это уж из Флобера, из Мопассана). Наколочка, фартучек, блудливые потупленные глазки. (Ну, тут не понадобилось входить в роль, усмехнулась Эмили, глазки есть, осталось потупить). Он меня застукал. Но ни слова не сказал, вида не подал! Я была вся красная, а он стоял и ждал, пока я заправлю постель. Идеально чистая постель, он не приводил к себе накануне никакой бабы, уж я–то разбираюсь, какие следы оставляют бабы. Я была в жуткой панике, что он заставит меня, например, драить сортир, — и я бы пошла, потому что я не могла его не послушаться и потому что я же горничная, куда я денусь... Но он просто стоял, скрестив руки на груди. А я хорошо заправила постель, только с перепуга сначала положила покрывало не той стороной. Высоченная постель, — как воздушный пирог из детства. Он положил на подушку бешеные деньги — чаевые — и не сказал ни слова.</p><p class="p1">А что, подумала Эмили, это на него похоже. Но только уж больно великодушно. И уж если бы ты мыла номер у меня, то я заставила бы тебя вылизать сортир неоднократно. Интересно, как это можно — с такой легкостью класть на подушку крупные чаевые? Если бы Уидлер разорился — это бы его вывело из себя хоть ненадолго или нет? Похоже, нет. Его ничто не выводит из себя. Потому что такие не разоряются.</p><p class="p1">— На следующий день, — в полном уже делириуме продолжала Кло, только что не гладя себя между ног, — я получила роскошную коробку. С черным платьем. Потрясающим. Очень простым, но изысканным и стоившим бешеных денег, вот действительно. И я же блондинка, так что ко мне очень шло. К платью была приложена записка: «Если вам так нравится переодеваться, то почему бы не делать это как следует?». Мелкий круглый почерк.</p><p class="p1">Эмили замерла.</p><p class="p1">— А что, если я скажу тебе, — она напряглась и покраснела, — что мне это неинтересно?</p><p class="p1">Кло вскинула на нее глаза, полные тоски и нежности. И снисходительности — так смотрит девушка, впервые познавшая мужчину, на десятилетнюю сестру.</p><p class="p1">— А что, если я скажу тебе, что я нарочно подстроила все это? И нарочно подставила тебя с этим платьем — только для того, чтобы посмотреть, поступит ли он с тобой по-другому?</p><p class="p1">Она подошла к Эмили вплотную и уже по-кошачьи хищно заглянула ей в глаза:</p><p class="p1">— Есть между вами что–нибудь или нет? Отвечай!</p><p class="p1">Но тут же добавила вкрадчиво и почти жалобно:</p><p class="p1">— Ну пожалуйста!</p><p class="p1">Да она сумасшедшая, поняла Эмили. Уидлер ее сломал, сделал своей рабыней, уничтожил ее личность! В кого она превратилась? Она рехнутая, просто рехнутая!</p><p class="p1">— Нет, — сказала Эмили, испуганно делая шаг назад. — Нет, абсолютно ничего.</p><p class="p1">Это, конечно, ложь. Положим, есть. Но то, что есть, неизмеримо больше, чем то, что имеет в виду Эмили. Точнее, было. Он, конечно, крупный зверь, и я с самого начала не претендовала на него. Но он сделал меня женщиной, — правда, не в кровати. В чужой кровати, на паркетном полу. Он сделал меня женщиной, не прикоснувшись ко мне. Он меня научил. Он показал мне, как надо. И, кажется, он меня не сломал — не то что тебя. Ведь из тебя он сделал тряпку.</p><p class="p1">Но ничего этого она, разумеется, не сказала вслух.</p><p class="p1">— Ну, тогда... — Кло рассмеялась с видимым облегчением. Значит, дело было не в ней. Значит, таков он был со всеми. — Тогда... давай сделаем это!</p><p class="p1">— Что?! — Эмили перепугалась, что Кло подталкивает ее к занятиям лесбийской любовью.</p><p class="p1">— Дурочка! — усмехнулась Кло. — Сегодня же карнавал. Давай зададим им жару! В конце–то концов это ведь праздник, и можно как следует оторваться! Ну прошу тебя, ну Эмили, ну цветочек! (и ты туда же, с цветочком, подумала Эмили и сама поразилась тому, как трезво и снисходительно научилась думать о людях за эти три дня. А ведь это только начало, и до той страшной, последней правды, которую обо всех знает Уидлер, ей еще жить и жить! Впрочем, она ей не нужна, эта последняя правда. Если так все время думать о себе и людях, считая всех дрянью и себя — дрянью в квадрате, — то и жить не захочется. Оттого–то Уидлер и не знает покоя. Но она сумеет на этом пути вовремя остановиться).</p><p class="p1">— Нет-нет, — сказала она. — Что значит «отрываться»?</p><p class="p1">— Давай наденем мужские костюмы! Оденемся, как сиамские близнецы! Помнишь, как в «Девяти с половиной неделях» этот толстяк одевает ее в мужской костюм, с усами! Разве плохо! Разве не возбуждает?!</p><p class="p1">— Ты, по-моему, и так достаточно возбуждена, — натянуто улыбаясь, сказала Эмили. Она постепенно возвращалась в образ пай-девочки.</p><p class="p1">— Эмили, душка! Ну умоляю тебя! Ну давай! Как близняшки — брюнетка и блондинка! Ну мне так хочется! Что же мне, на колени встать?</p><p class="p1">— Уидлера скорее всего не будет на карнавале, — пролепетала Эмили. — Это не в его духе — бывать на карнавале, да еще по случаю чужой удачной сделки. Так ради кого же стараться?</p><p class="p1">— Да я не из–за него! — крикнула Кло. — Я просто так, для смеха.</p><p class="p1">— Нет-нет, — неуверенно сказала Эмили.</p><p class="p1">...Они вышли из магазина через полчаса в строгих черных мужских костюмах, в штиблетах самого малою размера, какие там только нашлись, и у Эмили, и у Кло была маленькая изящная нога. Народ в изумлении глядел на их роскошные шевелюры, выбивавшиеся из–под шляп.</p><p class="p1">— Черт побери, — шепнула Кло, наклоняясь к уху Эмили. — Что–то не так. Хоть бы не до того, как мы подпишем все с китайцами! Я просто жопой, ты понимаешь, жопой чувствую, что–то не так, не так!</p><p class="p1">— Это от непривычной одежды, — успокоила ее Эмили, тоже шепотом, сама начиная находить смак в карнавале.</p><p class="p1">— Нет, нет, — шептала Кло. — Что–то не так! Господи, только бы китайцы подписали, а там мы уж посмотрим, посмотрим...</p><p class="p1">— Эй! Клаудиа! — крикнули им вслед.</p><p class="p1">— Не оборачивайся! — воскликнула шепотом Кло, схватив Эмили за локоть и вертя задом, словно ввинчиваясь в толпу.</p><p class="p1">— Кло! — кричал Флавио, голос которого Эмили теперь узнала. — Кло! Я вижу тебя! Постой! Очень важное дело!</p><p class="p1">Клаудиа грязно выругалась сквозь зубы. Как это все в ней уживается, уму непостижимо. Хотя как в разбомбленном доме уживаются обломки кирпича, брызги бетона, осколки «баккары», детские игрушки и крысы на развалинах?</p><p class="p1">— Кло! — кричал Флавио, запыхавшись, подбегая к ним, весь потный, с блестящим черным лицом. Следом за ним семенил тот самый длинный клерк в очках, который в первый день их пребывания в Рио опоздал с переустройством офиса в гостинце.</p><p class="p1">— Ну что случилось, мальчики? — крикнула Кло. — Почему такие вытянутые лица?!</p><p class="p1">Она сжала своей ледяной рукой руку Эмили.</p><p class="p1">— Кло, катастрофа! — выдохнул Флавио, подбегая. — Я узнал, что кто–то купил старый отель. Кто бы он ни был, он заплатил наличными. Я клянусь, я клянусь тебе, что к утру я узнаю, кто это, кто бы он ни был, я его из–под земли достану, я с ним, я с ним... такое сделаю...</p><p class="p1">Он задыхался, хрипел и пучил глаза.</p><p class="p1">— Не стоит, — неожиданно холодно и спокойно сказала Кло.</p><p class="p1">— То есть как не стоит? — Клерк обмер.</p><p class="p1">— Такое у меня чувство, будто я знаю, кто это сделал, — сказала Клаудиа с ледяным спокойствием. — Я это чувствовала. Мы будем себя вести так, будто ничего не произошло. Все нормально. Все так, как оно должно быть.</p><p class="empty-line"/><p class="p1">— Вот здесь он обычно обедает, — сказала Кло, указывая на небольшую дверь в старой кирпичной стене. Вывески не было.</p><p class="p1">— Ресторанчик для посвященных. Потрясающая кухня, вечерами девочки, но ему это ни к чему. Меня тут тоже знают.</p><p class="p1">Она резко толкнула дверь. Двое дюжих шкафоподобных типов у входа на долю секунды напряглись, но тут же снова лениво расслабились в своих креслах. Эмили шла за Клаудией, ничего не соображая и не сопротивляясь.</p><p class="p1">Уидлер сидел в отдельном кабинете и читал газету. Читал он полосы реклам, откладывая в сторону новости и скандалы.</p><p class="p1">— Это ты купил старый отель?</p><p class="p1">Он поднял глаза, даже не посмотрев на Эмили. От его тарелки, еще не тронутой, поднимался пряный запах.</p><p class="p1">— Я.</p><p class="p1">Кло и Уидлер смотрели друг другу в глаза. Он чуть улыбался, но был спокоен, как профессионал во время привычной и любимой работы.</p><p class="p1">— Зачем ты это сделал?</p><p class="p1">— Это моя профессия.</p><p class="p1">— Зарабатываешь деньги на людях?! — Кло ткнула пальцем в Эмили, стоявшую рядом, с опушенными глазами и закушенной губой. Эмили даже не пыталась протестовать. Все было безразлично. Карьера пошла прахом, и тоже из–за него. Теперь ее, конечно, выгонят. Она влюбилась, как дура, а он воспользовался отсутствием Кло и обвел ее вокруг пальца. Она думала, что он привез ее в старый отель, чтобы разговаривать о любви и позволять к себе прикасаться. А он осматривал местность. Приценивался к зданию. И теперь все это купил. Акула. Холодный, жесткий, настоящий делец. Спасибо. Он преподал ей стоящий урок. Она теперь тоже будет такой. Всегда. И мужа найдет такого же. Этого урока она не забудет.</p><p class="p1">Уидлер молчал, не глядя на Эмили. Он смотрел только на Кло. Спокойно, как человек, привыкший к победам.</p><p class="p1">— Если ты думаешь, что тебе удастся сорвать мою сделку с китайцами, — крикнула Кло, — ты жестоко ошибаешься! Ты все делаешь жестоко, но так жестоко ты еще никогда не ошибался! Ничего у тебя не выйдет, слышишь, ничего!</p><p class="p1">— Мало тебе? Не надоело тебе деньги заколачивать? Не хватит еще?</p><p class="p1">— Никогда не хватает.</p><p class="p1">Кло с силой рванула на себя скатерть. Уидлер усмехнулся. Посуда со звоном посыпалась на каменный пол. Содержимое загадочной тарелки вывалилось наружу. Но и тогда Эмили не поняла, что же, собственно, он ел.</p><p class="empty-line"/><p class="p1">— Главное, не бросай меня, — шептала Кло, расширившимися от ужаса и возбуждения глазами глядя на самолет, катившийся по бетонной полосе. — Главное, ты меня не бросай. Ведь ты не сделаешь этого, правда?!</p><p class="p1">— Но на что ты надеешься?</p><p class="p1">— Главное, ты не бросай меня сейчас. Я уверена, что–то произойдет. Одна только ночь! Ну потерпи, что тебе стоит?</p><p class="p1">— Нет-нет, — успокаивала ее Эмили. — Конечно, не брошу. Но ведь сейчас мы подпишем сделку, банкет, презентация, а утром выяснится, что отеля никакого нет, что все это шкура неубитого Уидлера!</p><p class="p1">— А мы ничего! — Кло расхохоталась. — Знаешь, есть одно святое правило: блефуй до последнего! Иногда, знаешь ли, такое происходит... Авось!</p><p class="p1">— Что такое «авось»? — переспросила Эмили. Кло сказала это не по-английски. Может быть, какой–то из неизвестных Эмили местных диалектов?</p><p class="p1">— Это говорил один мой русский друг, — сказала Кло. — Всегда сидел без денег, но трахался, как Приап. Потом написал об этом роман. Стал известен на весь мир. У себя, там, — тоже. Правда, он стал коммунистом. Это в нем сперма играет. Когда он со мной развлекался, ему было не до коммунизма. Со временем я бы сделала из него настоящего республиканца, но теперь он неисправимый левак. Книжка, однако, забавная. Там он расточает комплименты моей... — и она употребила заборное слово. Ее веселье было явно истерическим. — Так вот, все русские надеются только на «авось». Волшебное слово. Стоило ему сказать «авось», когда он сидел без гроша и огромный член был его единственным богатством, как тут же появлялся какой–то случайный друг, который приводил баб, а одной из них оказалась я. Или приносил водку. Или кто–то где–то печатал рассказ. Так благодаря этому русскому педичке — он с русскими тоже любил развлекаться, и они его так прозвали за пристрастие к неграм, — благодаря ему я освоила волшебное славянское слово. И всегда помогает.</p><p class="p1">Самолет остановился. Подъехал маленький, словно игрушечный трап. Из самолетика стали выходить желтолицые маленькие люди, сплошь одинаковые, с одинаковыми портфельчиками, в одинаковых темно-синих костюмах.</p><p class="p1">— Старина Дэн, конечно, раскрепостил экономику, — сказала Эмили. — Но форму одежды не может отменить даже старина Дэн. Удивительная вещь этот Восток, Кло. К ним так идет коммунизм, конфуцианство и вообще любое единообразие!</p><p class="p1">— Думаешь, мы их проведем?</p><p class="p1">— Убеждена, — решительно сказал Эмили, поправляя мужской пиджак. — Они будут так шокированы нашим видом, что подпишут любую чушь. — Теперь она была абсолютной союзницей Кло. Уидлер будет наказам. Хотя бы их упорством. И если они проиграют, — они проиграют достойно.</p><p class="p1">— Ты уверена, что они не потребуют купчую на отель? — спросила Кло, бледная, как скатерть. Эта мысль давно не давала ей покоя.</p><p class="p1">— Каждая сделка с западным партнером для них — событие, — сказала Эмили. — Пусть еще спасибо скажут. Так что не они будут требовать, а мы. Нам должны верить на слово.</p><p class="p1">— Твоими бы устами... — вздохнула Кло.</p><p class="p1">— Если желтозадые попробуют, — сказала Эмили, стараясь сделать Клаудии приятное употреблением ее жаргона. — мы напустим на них местных черножопых.</p><p class="p1">Обе расхохотались.</p></span><span id="id19"><div class="title3">
<p class="p"><strong>VII</strong></p>
</div><p class="p1">— Пошли, — сказала Кло, улыбаясь из последних сил.</p><p class="p1">Они решительно зашагали навстречу китайцам. Шедший впереди желтолицый, низенький и толстый, протянул Кло руку лодочкой, безошибочно угадав в ней старшую.</p><p class="p1">Кло протянула руку, как для поцелуя. Китаец потряс ее и повторил ту же процедуру с Эмили. Лицо его лучилось, как блин.</p><p class="p1">— Они что, всегда так здороваются? — одними губами спросила Кло.</p><p class="p1">Эмили протиснула в щелочку между китайскими приветствиями английское «Заткнись, дура, это обычай».</p><p class="empty-line"/><p class="p1">...Стол сверкал. Как ни была Эмили увлечена Уидлером, а договориться с ближайшим китайским ресторанчиком не составило для нее особенного труда. Тут были жареные кузнечики, похожие по вкусу на их родные западные подсолнуховые семечки; была фаршированная змея, была свинина с рисом, был гусь, и все это было зря, но напоследок, перед крахом, можно было покушать и повеселиться от души. Бог с ней, с карьерой, не все потеряно. Теперь она будет умнее, только и всего. Веселое отчаянье овладело ею.</p><p class="p1">Аппетит противился любым приветствиям, но китайское сознание ритуализовано до предела. Встал низенький и толстый.</p><p class="p1">Он заговорил на том плохом китайском, на котором говорит всякий уроженец страны, который усвоил все ошибки крестьянского произношения, не имел времени их исправить в процессе подъема по служебной лестнице и научился корявым витиеватостям на высших ступенях партийной карьеры. Это был суконный, аппаратно-крестьянский язык, обильно политый соусом национальной мифологии.</p><p class="p1">— Прекрасна моя страна, — журчал китаец, — как прекрасно рисовое зерно на рассвете (он, вероятно, хотел сказать «роса на рисовом поле», как говорилось в «Речных заводях», но плохо знал собственную литературу). Но есть страны столь же прекрасные, и я счастлив добавить прекрасное и в эту и без того прекрасную землю.</p><p class="p1">Китайцы одновременно зааплодировали, шестым чувством угадав, когда именно это следовало сделать, по опыту съездов.</p><p class="p1">— Благодарю, — сказала Эмили и перевела. Кло тоже захлопала в ладоши и предложила выпить.</p><p class="p1">— Господин Чин еще не закончил, — сказала Эмили и по-китайски обратилась к желтолицему: «Продолжайте, прошу вас, наши уши ожидают вашей речи, как поле жаждет дождя».</p><p class="p1">Китаец благосклонно сглотнул.</p><p class="p1">— Земля, рождающая таких красавиц, — он окинул Эмили взглядом, приняв ее за уроженку Бразилии, — достойна того, чтобы посланцы великой державы, жители Поднебесной, под мудрым руководством коммунистической партии Китая, строящей социализм на нашей земле, прекрасной, как капля солнца на листе банана, — он запутался в двух землях, но вскоре вынырнул: — Земля, рождающая таких красавиц, как улитка рождает жемчуг, достойна, чтобы коммунистическая партия Китая крепила с ней контакты!</p><p class="p1">Китайцы восторженно зааплодировали. Эмили еле сдерживалась, чтобы не прыснуть, представляя улитку, рождающую жемчуг. Партийный босс позабыл, что жемчуг родится в других раковинах.</p><p class="p1">— Примите этот скромный, как сельская девушка, дар в ознаменование нашего контракта, — медоточиво сказал китаец и вручил Эмили и Кло по коробочке. В коробочке была еще коробочка, в той — еще одна, в ней — бумажка, а в бумажке — ожерелье из речного жемчуга. Эмили потупила глаза и пролепетала слова признательности. Грянули барабаны. Музыка прервала неостановимого китайца. Он благосклонно кивнул и сел под овации соплеменников. Американцы и Флавио тоже хлопали, сдерживая смех и страх. Господин Чин принялся за кузнечиков и расправился с ними быстрее, чем с речью.</p><p class="p1">С ответной речью к собравшимся обратилась госпожа Клаудиа.</p><p class="p1">— Нас разделяет многое, — начала она, изящно приподняв двумя пальчиками бокал с шампанским. — Нас разделяют океаны и материки, цвет кожи и политические убеждения. И лишь в одном мы заединщики, — Кло намеренно употребила это редкое английское слово, но Эмили без труда нашла ему китайский аналог — нечто среднее между душеприказчиками и просто душевными людьми. — Мы заединщики в бизнесе. Мы мечтаем построить на этой прекрасной земле прекрасные отели, которые будут приносить нам огромную прибыль. А это значит, что наши великие народы станут еще богаче, ведь мы, американцы, от каждой сделки платим в казну налоги, а вы, китайцы, — Кло на мгновенье задумалась, — вообще только тем и живете, как бы облагодетельствовать свой народ. Я хочу выпить за дружбу между нашими народами, которая рано или поздно, подобно рисовому зерну, прорастет на чахлой почве взаимных предубеждений, недоверия... ну, и прочего дерьма, — обратилась она к Эмили, и та вместо «дерьма» еще за что–то похвалила великий китайский народ.</p><p class="p1">— Я поднимаю свой бокал за неизбежность смены! — возвысила голос Кло. — За нашу дружбу и любовь! И пусть он перетрахает всех китаянок вместе с вами, товарищи, пусть этот поганый Уидлер пустит всех нас по миру, но сегодня мы выпьем за дружбу! Вот протокол о намерениях, господин Чин! Подписывайте его, ни хрена не боясь! За вас, дорогие вы мои то-ва-ри-щи!!!</p><p class="p1">Захмелевший китаец подмахнул протокол не глядя. Молодая китаянка вынырнула у него из–за плеча и ловко шмякнула печать на белоснежную бумагу. В ту же секунду радуга разноцветных огней вспыхнула на черном бразильском небе. Душераздирающе взвыла труба, и в яростном ритме латиноамериканских танцев закружились толпы полуголых «дикарей». Кло вцепилась в плечи господину Чину и закружила его в каком–то немыслимом темпе. Новый залп салюта слился с восторженным ревом толпы. «Веселись, — орала Кло прямо в лицо бледному, перепуганному, жалко улыбающемуся китайцу. — Веселись и ни о чем не думай! Мы остановим этого сукиного сына! Мы ему яйца оторвем! Через четыре года здесь будет город-сад!!!»</p><p class="p1">— Прощай, Уидлер! — кричала Эмили, задыхаясь в объятиях гориллообразного бразильца. — Прощай, мать твою так! Подавись этими вонючими отелями, любимый!</p><p class="p1">— Верно, Эмили! — откликалась Кло. — Пусть подавится! Пусть жирует, капиталист хренов! Мы еще отомстим! Мы еще вернемся сюда под знаменами китайской освободительной армии! Мы ему покажем социализм с человеческим лицом! Будет он у нас на рудниках тачку катать, сучий потрох! Но пасаран! Да здравствует пе-ре-строй–ка! Виват председателю Мао!</p><p class="p1">Оттолкнув китайца, она бросилась в гущу танцующих, разодрала на себе платье и заколотила ногами по асфальту в жутком остервенении. Какой–то мулат облапил ее, она боднула его лицом в живот, подбежала к Эмили и потащила ее за собой.</p><p class="p1">— Ну, — кричала она, хрипло дыша, — ну, Эмили, ну же!..</p><p class="p1">Эмили, туманно улыбаясь, рвала у себя на горле галстук, словно освобождаясь от удавки и легким жестом смуглой руки отбрасывала удавку в сторону. Галстук, кувыркнувшись в воздухе, растворился в атмосфере. Подняв с земли кем–то сброшенное шмотье, Эмили накинула его на плечи и отправилась бродяжкой шляться по карнавалу.</p><p class="p1">Праздник выл, ликовал, визжал, орал, отдавался, расфуфыривался, тряс грудями, взметал ноги к разноцветным небесам, шумел петардами, булькал из горла, кололся, щетинился, бил по морде, оттягивался, сосался, тянул верхние ноты, лежал в отключке, оттаптывал, кусался, бормотал — и неотвратимо влек медленно бредущую бродяжку прямо навстречу медленно бредущему мужчине в черном костюме.</p><p class="p1">Они увидели друг друга одновременно, Эмили и Джим. Бродяжка в серебряном парике глядела, не отрываясь, как воду пила, с такой неизбывной тоской и горечью, что Уидлер, не выдержав, первым опустил глаза.</p><p class="p1">Рядом с Эмили выросла Кло в золотистом парике. Ее слегка шатало. Взор был слеп, на губах застыла улыбка удава, размышляющего о кролиководстве. «Пойдем», — шепнула она Эмили, та вырвала руку.</p><p class="p1">— Почему? — Простой этот вопрос Эмили произнесла тоном известного проповедника Билли Грэма, с тем лишь отличием, что знаменитый жулик-миссионер только притворялся, что знал ответ на него, а Эмили не умела притворяться. Она точно знала, что Джим предал и унизил ее, и даже ответ на свой вопрос знала, и не собиралась читать проповеди, но поглядеть в глаза предателю и задать этот бессмысленный вопрос считала необходимым.</p><p class="p1">— Пойдем, что с ним разговаривать?</p><p class="p1">Быстрым шагом они пошли мимо него. Джим не оглянулся. И медленно побрел дальше, ступая по лужам своими черными лакированными ботинками.</p><p class="p1">Странное чувство владело им. Ему казалось, будто жизнь только что кончилась, он умер, вознесся на небо, но там не приняли его, а, пробормотав что–то вроде «иди, попробуй еще раз», столкнули вниз, прямо в эти лужи. В той, прошедшей жизни он точно знал цену всему: деньгам, дружбе, измене, любви. Он прожил ту жизнь как умел. Он нравился себе в той жизни. А в этой оказался растерянным мальчиком тридцати с чем–то лет, одиноким и жестоким от одиночества.</p><p class="p1">Карнавал остался где–то сзади, за спиной, и глухо бушевал там, перемалывая своими волнами обезумевших людей. Джим брел по городу, маленький, ничтожный, богатый, и не знал, что ему делать с этим ненужным подарком — другой жизнью, которая начиналась сейчас, в эту минуту, в эту ночь. Что–то хрустнуло у него под ногами, он опустил глаза. Осколки разбитой бутылки, цветок орхидеи, вбитый подошвой в асфальт. Стараясь не поцарапать руку, он осторожно поднял цветок с земли. Зачем–то сунул его в петлицу и полез в карман за сигаретами. Спички отсырели, он долго и безуспешно ломал их о коробок. «Эмили», — пробормотал он и двинулся дальше. В прежней жизни не было счастья, но он и не мечтал о нем. Хватало простых удовольствий: денег, женщин, власти над людьми. В этой, дарованной, удовольствий будет немного, зато счастья — с избытком. Он подумал о том, что неплохо бы сейчас повеситься. Или выпить. Или увидеть Эмили.</p><p class="p1">Промокший до нитки, он возвращался в отель. Душная после дождя ночь сжимала ему виски. Цветок болтался в петлице.</p></span></span>
