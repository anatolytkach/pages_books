<span><span id="id5"><div class="title2">
<p class="p"><strong>IV</strong></p>
</div><p class="p1">Она шла под дождем, обходя лужи, глядя под ноги, иногда поднимая глаза и обводя взглядом мокрую улицу, прохожих под зонтами, мокрых собак. Бедный коричневый спаниель, с длинными мокрыми ушами посмотрел на нее, домогаясь сочувствия.</p><p class="p1">Она думала, что тоска ее никогда не вернется, но тоска вернулась.</p><p class="p1">Причиной этому могла быть — и скорее всего была — погода, а могло быть то, что Джон оказывался все жестче и серьезнее, гораздо серьезнее, чем ей казалось. Наконец, причина могла быть в том, что Молли расцветала на глазах, и Элизабет, никогда не знавшая, что такое ревность, испытывала не ревность, но похожее, тяжелое чувство. Плюс она никудышный психолог. Ей могло примерещиться что угодно, но роман между Брюсом и Молли... нет, не более, чем роман между лесбиянкой и гомосексуалистом.</p><p class="p1">Как всегда в такие минуты, когда окружающее становилось серо и безнадежно, она обвиняла себя и у самой себя пыталась допытаться: в чем дело? Что не так?</p><p class="p1">Если он почувствует в ней слабину, почувствует ее неравной — пиши пропало. Он немедленно выспится на ней. Вытрет об нее ноги. Сделает с ней что угодно ради самоутверждения — даже самые благополучные из них (она имела в виду мужчин) испытывают постоянную тягу к самоутверждению.</p><p class="p1">Он начнет делать из нее то, что хочет сам. Не то, что могло бы получиться у них обоих.</p><p class="p1">Где был в ее судьбе этот поворот, который сделал из нее мнительное, уродливое, болезненное существо? Ведь она была удачлива. Ведь она была счастлива в любви — ее всегда любили, только она–то не всегда отвечала на это... Что делать, если она умнее или талантливее большинства сверстников, а старики ее не привлекают?</p><p class="p1">В такие дни она всегда вспоминала свой роман, самый, может быть, счастливый. И самый больной, трудный, странный.</p><p class="p1">Элизабет терпеть не могла, когда подруги рассказывали о своих первых романах. «Разговор за столом зашел об оргазме, — ехидничала она в таких случаях. — Нервных просят выйти. Присутствующие заметно оживились, слюна закипела в уголках их ртов». На нее не обижались; ей разрешалось ехидничать. Может быть, они просто жалели ее втайне и оттого прощали желчность: все знали, что после Брюса ни один ее роман не тянулся дольше месяца. Надоедало или оказывалось не тем, разочаровывало, утомляло.</p><p class="p1">Но о своем первом романе она не рассказывала никогда, да и рассказывать, в сущности, было не о чем: все главное неизбежно осталось бы за словами и могло быть понято разве очень немногими. Она пыталась поделиться этим с Брюсом — еще до брака, когда, казалось ей, они были особенно близки. Но стоило ей начать, она почувствовала, что история становится плоской, бледной, и рассказывать о ней смешно и унизительно. Никто не стоил этой правды, которая на самом деле очень многое в ней объясняла.</p><p class="p1">Сам по себе ее первый роман достаточно далеко отстоял по времени от той дурацкой ночи, когда на вечеринке в их классе подруга по имени Мэджи познакомила ее с другом своего Марка. Друг Марка был симпатичный тип. Элизабет знала, что в классе осталось две девственницы, и одной из них была она, одна из самых симпатичных девиц в классе. Девственницами, утешала она себя, остаются либо уродины, либо красавицы. Первых никто не хочет, вторые сами никого не хотят. Но поскольку она уже давно испытывала смутную тягу к чему–то совершенно новому и значительному, и, будучи во всем самостоятельна, неизменно хотела «быть как все»; и поскольку она острее всего чувствовала себя одинокой, когда видела весной на улицах парочки и слушала разговоры о детской распущенности, — исходя из всего этого, она была готова к решительным шагам.</p><p class="p1">Друг Марка, которого звали Стив, носил футболку с надписью «Я дурак и ты тоже», — и понравился ей тем что умел играть на гитаре и разговаривать о чем–то кроме этого их чертового спорта, и совместных попоек, которыми они почему–то гордились, и придурочных мотоциклов, на которых они мотались по пыльным дорогам, находя в этом нечто мужественное и романтическое. Марк вообще ни о чем говорить не мог, кроме своих проклятых мускулов. Ему было шестнадцать, и он говорил, что если он тридцать раз подтянется, то, значит, он способен тридцать раз толкнуть свой вес. У него была своя система тренировок, и странно, что помимо системы тренировок у него могли быть друзья. Стив тем более не походил на его друга, потому что спортом он интересовался мало, мотоциклу предпочитал отцовскую машину, которую водил с одиннадцати лет. И вообще он думал о карьере юриста, но при этом знал, кто такой Сэлинджер. Меньше всего Стив походил на «яппи». Ни пиджака, ни галстука, ни дежурной улыбки, ни заигрывания с собеседником с намерением купить его на комплименты, вытянуть как можно больше информации и употребить в каких–то своих дурацких целях.</p><p class="p1">Стив много пил и делал это умеючи. Мэджи смешивала какой–то свой коктейль — что–то с оливками и чуть ли не с горчицей, но на вкус было недурно, — Стив тянул его через соломинку, иногда небрежно остря. Он был явно поумнее остальных, и к нему ее потянуло сразу, но не всерьез, не так, как потом... — словом, она выпила еще и поняла, что не будет против, пожалуй, если сегодня этот парень попробует спустить с нее трусы.</p><p class="p1">Ей было легко и отчаянно, и он почувствовал это, когда после третьего медленного танца поволок в свою машину и отвез к себе, где никого не было. Элизабет, достаточно пьяная к этому моменту, но довольно наблюдательная для своих шестнадцати, — успела заметить, что Марк бросает ему вслед поощрительные взгляды, но Стив на них не отвечает, и это ей тоже понравилось.</p><p class="p1">В машине, на каждом перекрестке, у каждого светофора, он целовался с ней, охватывая ее губы своими, сухими и горячими, и обдавая запахом коктейля. В нем не было и тени той тошнотворной серьезности, которую она так не переносила и которой так боялась в людях, и потому ей нравилось, как он улыбается, как легко все делает, как легко ведет машину и как спокойно, чуть ли не подмигнув ей, он резко затормозил у своего дома, но не стал выходить из машины. Было пол-третьего ночи.</p><p class="p1">— У тебя кто–то есть? — спросила она. Она ничего не боялась. Ей было интересно.</p><p class="p1">— Нет; но что–то есть, — усмехнулся он и, протянув к ней руку, расстегнул верхние пуговицы на рубашке. Она носила тогда мужские рубашки, которые, как ей казалось, подчеркивали худобу, прямоту и хрупкость ее фигуры.</p><p class="p1">Тогда Элизабет еще признавала лифчики. У Стива были теплые пальцы. Длинные, тонкие пальцы музыканта. Он погладил лифчик, забрался рукой за ее спину, осторожно расстегнул застежку. Она смотрела на него все с тем же любопытством. Пожалуй, все происходит несколько буднично. Она рассмеялась.</p><p class="p1">— В чем дело? — переспросил он, но без обеспокоенности, которая бы выдала закомплексованность юнца, с ответной улыбкой.</p><p class="p1">— Слушай, — произнесла она сквозь смех, — тебе всегда приходится перед этим говорить о Сэлинджере?</p><p class="p1">— Нет, — он покачал головой. — Иногда о Стивене Кинге.</p><p class="p1">— Тоже ничего.</p><p class="p1">— А иногда о «Секс пистолз». Но мой собственный секс-пистол на такие разговоры реагирует однозначно. Он вешает нос.</p><p class="p1">— Как прекрасна была бы жизнь, если бы тебе не пришлось обременять себя беседами! Сделал знак, щелкнул пальцами, и если девушка согласна — она идет с тобой, а если нет — ты ищешь дальше...</p><p class="p1">— Нет, это было бы невыносимо скучно.</p><p class="p1">— Почему вдруг?</p><p class="p1">— Видишь ли, — он поглаживал ее сосок, не придвигаясь и не сводя глаз с ее улыбающегося лица. — Одним нравятся акты, другим — антракты. Одним — процесс, другим — результат. — Он гладил ее грудь, легонько сжимая соски, и соски твердели под его рукой. Потом он расстегнул последние пуговицы на рубашке. Расстегнул пуговицу на джинсах. Она даже чуть сползла с сиденья, чтобы ему было удобнее. По-прежнему не придвигаясь, он теперь ласкал ей живот.</p><p class="p1">— Тебе что, больше нравится в машине? Разве там не твой дом, да еще и пустой, как нарочно?</p><p class="p1">— Мой. И мне не нравится в машине. Мне нравится вот так с тобой сидеть и разговаривать. А когда мы пойдем в дом, там все будет чужим для тебя. Чужая мебель, чужие запахи. Ты, чего доброго, пожалеешь, что приехала. У тебя даже в животе забурчит от неудовольствия. Я не хочу сейчас все ломать. Я хочу с тобой сидеть и разговаривать. Ночь длинная.</p><p class="p1">— А если, допустим, я голодна?</p><p class="p1">— Я тебя, допустим, накормлю.</p><p class="p1">— Сколько тебе лет?</p><p class="p1">— Семнадцать.</p><p class="p1">— И откуда ты успел всего этого набраться? Наглости, информации, опыта?</p><p class="p1">— Это все лежит под ногами. И потом, я же присматриваюсь к миру. Для юриста это нелишне.</p><p class="p1">— А если я тебе скажу, — он уже запускал руку ей в трусы, касался волос, — если я скажу тебе, что у меня сегодня мои ежемесячные проблемы и в том месте, к которому ты подбираешься, стоит «тампакс»?</p><p class="p1">— Будь я чуть более циничен, я бы пообещал тебе затолкать его поглубже.</p><p class="p1">— Ну, — она рассмеялась, оглядывая его, — судя по твоему виду, очень–то далеко ты его не затолкаешь.</p><p class="p1">— Ну, — сказал он, — после такого ответа, пожалуй, я сделал бы вот что...</p><p class="p1">Он вышел из машины, захлопнул дверцу, открыл дверь с ее стороны и, когда она попыталась ступить на землю, резко подхватил ее на руки.</p><p class="p1">— Марк может тебе позавидовать, — шепнула она ему на ухо. — Ты с легкостью толкаешь пятьдесят пять килограмм.</p><p class="p1">— Марк — идиот, — сказал Стив, неся ее к дому. — Все идиоты. Один я лапонька. Я чудо. И ты лапонька, — он отпер дверь, предварительно опустив Элизабет на землю, и легонько подтолкнул — входи. Сам он шел за ней.</p><p class="p1">— Света я не зажигаю, — сказал он. — Так веселей. Представь себя в замке. Летучие мыши, паутина, старые винные бочки. Ты спустилась в подвал или поднялась на чердак, уж не знаю, чтобы изменить мужу с шутом.</p><p class="p1">В своей комнате он включил торшер. Это была небольшая комната с узкой кроватью.</p><p class="p1">— Все предусмотрено, — сказал Стив. — Смотри сюда.</p><p class="p1">Он что–то такое нажал в изголовье, повернул в ногах — и кровать раздвинулась по меньшей мере вдвое.</p><p class="p1">Элизабет с уважением посмотрела на него.</p><p class="p1">— Боюсь, я тебя разочарую, — сказала она с усмешкой. — Если бы в в своей жизни узнала столько, сколько узнала и увидела эта кровать, — тогда другое дело. Но сейчас, боюсь, я тебе малоинтересна.</p><p class="p1">— С тобой весело. — сказал Стив. — И ты не дура. Чего еще надо? Ложись, я сейчас, — и он вышел в соседнюю комнату.</p><p class="p1">Он вернулся голый, и Элизабет приятно удивилась стройности его тела. Сама она ограничилась тем, что сняла лифчик и рубашку, но Стив сел на кровать (Элизабет впервые так близко видела мужскую наготу) и стянул с нее сначала джинсы, а потом трусики. Ни стыда, ни смущения она не чувствовала. Он все делал играючи, и в этой игре, легкости, может быть, скрывалась тайна его обаяния. Возможно, мелькнуло в ее голове, для дебюта оптимален именно такой вариант?</p><p class="p1">Он осмотрел ее внимательно и любовно, сак художник осматривает модель. Потом лег рядом и обнял. Она не противилась. Ей было приятно его тепло, его улыбка у самых ее губ, его веселый шепот:</p><p class="p1">— Скажи... я не ошибаюсь, для тебя это первый раз?</p><p class="p1">— Как ты догадался?</p><p class="p1">— Стоит протянуть руку к какой–нибудь из наших девчонок, из тех, которые вьются вокруг Марка, — они сами в ответ начинают кидаться тебе на шею. Скука смертная. Ты — другое дело. Я подумал, что это зависит либо от характера, либо от неопытности. Прости, если я ошибаюсь, но мне бы такое заблуждение только польстило.</p><p class="p1">— У меня — и от характера, и от того, что ты имеешь в виду.</p><p class="p1">— Черт побери, это очень досадно.</p><p class="p1">— Отчего же? Ты падаешь в обморок от вида крови?</p><p class="p1">— Дело не в этом. После этого, скорее всего, женщина или безоглядно влюбляется, или до конца дней ненавидит. У тебя не такой характер, чтобы безоглядно влюбиться, да и я не тот тип, в каких безоглядно влюбляются. Остается предположить, что я стану тебе противен. — Он целовал ее в губы мелкими, частыми поцелуями, и они тоже были приятны ей, но она не находила в себе ни сил, ни желания расслабиться до конца. Слишком ироничен и легок он был.</p><p class="p1">— Не станешь, я приму к этому все меры. Если ты до сих пор не стал мне противен, — дальше я как–нибудь овладею собой.</p><p class="p1">— В том–то и беда, что ты слишком хорошо владеешь собой, даже тогда, когда тобой собирается овладеть совсем другая личность.</p><p class="p1">Она рассмеялась. Ее волосы рассыпались по подушке. Он взял одну из прядей и поцеловал ее.</p><p class="p1">— Будет жутко обидно, если ты после этого меня возненавидишь. Меньше всего мне бы хотелось тебя потерять сразу.</p><p class="p1">Все дальнейшее произошло просто и так же весело, как происходило все, что он устраивал. Знакомство с родителями или выезд за город. Ее отъезд в колледж и их веселая, легкая встреча опять в Атланте, год спустя, когда он и она после первого курса приехали домой.</p><p class="p1">Она почти не почувствовала боли, и лицо его лишь слегка напряглось. Он просил ее не закрывать глаз и все время смотреть на него. А та жуткая, раздирающая боль, о которой писалось в дамских романах, на самом деле была весьма незначительна. И когда все произошло, она не чувствовала ни особенного наслаждения, ни особенного отвращения. Хотя смутное разочарование боролось в ней с радостью от того, что некий барьер, отделявший ее от взрослой жизни, благополучно преодолен.</p><p class="p1">Они мило болтали около часа, он принес кофе, потом ближе к утру, они сделали это еще раз. И на этот раз боли не было, хотя он проникал глубже, и внизу живота было странное, не слишком приятное чувство. Но приятны были его прикосновения, жар его тела, его объятия.</p><p class="p1">Утром он отвез ее домой, она рухнула на кровать и заснула, а когда проснулась, вспоминала вчерашнее без малейшей тревоги, легко и счастливо.</p><p class="p1">Их роман так и продолжался — легко и почти безразлично, ибо, хотя она ценила в Стиве его ум и легкость, он был от нее чрезвычайно далек как по кругу общения, по среде, так и по характеру. Этот роман не мог иметь никакого развития, и никакой болезненной тяги друг к другу они не испытывали. Так она поняла, что для нее возможен, помимо небывшей и только предполагаемой любви, еще один тип отношений с мужчинами — приятная обоим дружба без взаимных обязательств. Такими были все ее романы после Брюса.</p><p class="p1">А первое настоящее увлечение случилось уже тогда, когда она покинула Атланту и уехала в колледж, простившись со Стивом нежно и необременительно. Она знала, что он не ограничивается отношениями с нею, и не ревновала. Как можно было ревновать Стива?</p><p class="p1">Впрочем, иногда он поражался ее спокойствию. Никогда не негодовал, — просто тихо изумлялся. Вот и сейчас, на прощанье, он сказал ей:</p><p class="p1">— Слушай... Тебе что, ни капли не жаль расставаться со мной?</p><p class="p1">— Ну почему же, Стив. Конечно, жаль. Мне даже будет тебя не хватать, — ты доволен?</p><p class="p1">— Вполне. Но почему ты никогда настолько не принимала меня всерьез?</p><p class="p1">— А ты когда–нибудь что–нибудь принимал всерьез?</p><p class="p1">— Ммм... Вероятно.</p><p class="p1">— Что же это было?</p><p class="p1">— Это была ты. Иногда.</p><p class="p1">Она усмехнулась:</p><p class="p1">— Я же сказала, Стив. Мне будет тебя не хватать.</p><p class="p1">— Мне тебя тоже, — сказал он прежним, знакомым тоном. — Когда тебе будет меня не хватать, ты будешь хватать кого–нибудь другого и тащить в постель. Только не шепчи ему в ухо «Стиви!» — а то он обидится. Если, конечно, не будет моим тезкой.</p><p class="p1">— Я тебе никогда ничего не шептала, — улыбнулась она.</p><p class="p1">— Нет, был грех, — покачал он головой. — Однажды ты прошептала: «Осторожнее, ты наступил мне локтем на прическу!»</p><p class="p1">— Можешь быть уверен, больше я никому такого не шепну. Таких косолапых у меня, надеюсь, больше не будет.</p><p class="p1">Они поцеловались, как старые друзья, и она уехала навстречу своей первой настоящей любви, из–за которой, собственно, все в ее здоровом и трезвом характере так причудливо менялось иногда.</p><p class="p1">...В колледже она долгое время чувствовала себя одинокой, но тогда, до Джона, она легче переносила одиночество. По комнате в кампусе она оказалась соседкой пухлой девушки с молочно-розовой кожей, бесцветными глазами и белыми ресницами. Ее звали Стефани, она писала странные стихи без рифм и размера (в поэзии Элизабет была чудовищно старомодна, и пределом ее вкуса оставался Лоуэлл). Стефани, невзирая на свою мирную и бесцветную внешность, была революционеркой решительно во всем. Она провозгласила нонконформизм главным принципом своей деятельности. На лекциях она появлялась крайне редко, всегда одевалась вызывающе легкомысленно, рисовала на лице и теле Бог весть что и называла это вивризмом. Кроме всего прочего, она однажды совершенно искренне предложила Элизабет заняться лесбийской любовью.</p><p class="p1">— А ты когда–нибудь уже... делала это? — в некотором испуге спросила Элизабет. Она вообще–то любила Стефани, с ней было не скучно, но такое...</p><p class="p1">— Нет, никогда, — просто ответила Стефани, очень честная и неизменно прямая. — Но, наверное, это забавно. Надо попробовать все, а друг друга мы по крайней мере достаточно знаем, чтобы не стесняться.</p><p class="p1">— Знаешь, Стефани, — отвечала Элизабет, покусывая нижнюю губу, чтобы не расхохотаться. — Один умный человек сказал: я бы охотно стал гомосексуалистом или хоть раз попробовал бы, но для этого у меня слишком развито чувство юмора.</p><p class="p1">Они расхохотались, и пришлось ли Стефани на ком–то попробовать себя — осталось загадкой. Однако постоянный парень у нее был — лохматый, смуглый, всегда грязный, особенно Элизабет отпугивали его грязные ногти. Он тоже был из авангардистов. Его рисунками была увешана вся их комнатка в кампусе. Элизабет ничего в них не понимала — и Стефани, скорее всего, тоже, но заходившим студентам долго и с наслаждением объясняла, почему это хорошо и почему по сравнению с этим плох, например, Дали или Пикассо.</p><p class="p1">Долгое время — почти весь первый семестр — Элизабет считала, что такой экстравагантностью Стефани компенсирует свою внешнюю невыразительность, заурядность внешности. Но потом поняла: меньше всего она задумывалась над тем, как воспринимают ее окружающие. Для нее абсолютно естественно и органично было появляться в чем попало, сочинять стихи и любить своих абстракционистов. Точно так же вполне естественно было для нее и заняться любовью однажды прямо на лекции — если это можно было назвать любовью. Элизабет, недостаточно искушенная в технической стороне дела и не испытавшая еще настоящего чувства, была потрясена, увидев, как во время скучнейшей лекции по античной истории Стефани нагибается к брюкам Уилла, их сокурсника и тоже не слишком чистоплотного субъекта (лектор, казалось, дремал и вещал сквозь дрему). Вскоре голова Стефани начала совершать вращения и колебания, послышался чмокающий звук, — отвратительно, подумала Элизабет, отвратительно, никогда, никогда! — с задних рядов с любопытством заглядывали, перегибаясь через их спины. Уилл гладил затылок Стефани. Наконец она подняла лицо. Элизабет с отвращением СМОТРЕЛА на ее влажный рот.</p><p class="p1">Именно Стефани познакомила ее с Виктором, выходцем из французской семьи, приехавшей в Америку в начале сороковых годов, кажется, чуть ли не сразу после оккупации Франции. Виктор не был авангардистом: он зашел к Стефани посмотреть работы ее приятелей, о которых был наслышан, и сдержанно, но резко и язвительно высказался о них, чем сразу расположил к себе Элизабет.</p><p class="p1">— Это портрет брата, — сказала Стефани, показывая небольшой картон, на котором рука ее экстравагантного друга вычертила несколько густо-красных овалов. — Фигуративность, но очень крепко по колориту.</p><p class="p1">— Будь я его братом, — сказал Виктор, — я сделал бы все, чтобы автор портрета максимально походил на свое произведение.</p><p class="p1">— Знаешь, что написано на дверях «Прадо»? — сказала Стефани довольно мирно. Авангардисты вообще довольно мирные ребята. — Бережно относитесь к тому, что вам непонятно, — это может оказаться произведением искусства.</p><p class="p1">— Я слыхал другое, — небрежно парировал Виктор. — Если не умеешь рисовать, проведи по холсту черту, назови это «Настроение №36» и называйся авангардистом.</p><p class="p1">— Что ж, Виктор, — сказала Стефани. — Твои вкусы вполне актуальны до конца прошлого века. Сноб бы сейчас уделал тебя, а я не стану. Пойди погуляй с Элизабет. Вы сойдетесь в симпатиях.</p><p class="p1">...Элизабет нравилось то, что он француз, — она любила французскую литературу, французскую живопись и французскую кухню. Она любила Бреля, на которого Виктор молился и которого пел под гитару вполне прилично. «В Амстердамском порту», — пел он медленно и печально, и Элизабет не понимала слов, но видела неведомый Амстердамский порт, пьяных моряков, хохочущих девиц, видела дождь, бьющий в стекла кафе, и грязное у берега, туманно-серое вдали море за косой пеленой.</p><p class="p1">Ей нравились его крупные губы, небритые щеки, худое, чувственное лицо, клок волос, спадающий на бок. Его сигареты «Гитан». Его мечтательные глаза, его узкое, сухое тело. Он не спешил переходить от поцелуев к тому, что для большинства их сверстников составляло суть любых отношений. Он отличался от большинства сокурсников еще и тем, что был абсолютно чужд снобизму в любых его проявлениях. Ему, как и Элизабет, были присущи простота и здравый смысл, хотя для остальных Виктор был закрыт, замкнут и холоден. Он не спешил раскрываться даже перед ней. Но ей нравилось, что он не афиширует своих религиозных убеждений, не сходит с ума из–за политики, не следит за перипетиями предвыборных компаний, не озабочен защитой прав голубых и розовых и не считает, прочитав Гессе, что стал тем самым выше на голову, нежели весь мир, не читавший Гессе. «Дурно написано, — говорил он, очаровательно грассируя, — а книга, написанная дурно, не может искупить этого греха никакой начинкой».</p><p class="p1">Но в нем было кое–что, всерьез настораживавшее ее. Внезапные вспышки злости, ярости, иногда отчаяния заставляли предположить, что он наркоман или по крайней мере балуется травкой — именно о таких приметах ломки Элизабет читала и слышала от подруг. Но на самом деле, как она вскоре поняла, все это было следствием глубокой психической неустойчивости. Умный и тонкий человек, он совершенно не умел держать себя в руках, срывался, выходил из себя из–за пустяков. Однажды в припадке ярости он так схватил ее за рукав, что оторвал манжет от новой блузки, и она неделю не разговаривала с ним, — причиной ссоры послужило то, что Элизабет отказалась пойти с ним в кино, сославшись на свое обещание быть на вечеринке у подруги.</p><p class="p1">Впрочем, это она ему простила. И многое еще прощала. С ним было интересно и легко, и даже непредсказуемые вспышки его тоски, злости или меланхолии казались ей особенно обаятельными. Она ощущала его отчасти зависящим от себя, ибо могла как–то влиять на его состояния, уговаривать, и с ней он подолгу оставался тихим, мирным и простым. В остальном же это был совершенно нормальный, не слишком легкий в общении, но вполне доброжелательный человек с отвратительными оценками из–за постоянно пропускаемых занятий и приступов апатии. Учеба его мало интересовала. Элизабет осваивала искусствоведение, он — филологию. Преимущественной его любовью и вниманием пользовался Рембо, которого он мог часами декламировать в оригинале, — напившись же, и даже в этом состоянии неотразимо обаятельный, сутулый, худой, с безумными черными глазами, он неизменно читал «Пьяный корабль»: «Между тем, как несло меня вниз по теченью... вниз по теченью...» Он сам выглядел в эту секунду огромным, прекрасным, беспомощным и неуместным кораблем, неумолимо увлекаемым вниз по теченью силой, которую невозможно переспорить.</p><p class="p1">Эту силу, которой он был тайно подчинен, Элизабет всегда ощущала, но никогда не могла найти ей названия. Она чувствовала только, что этот мужчина, наиболее близкий ей из всех, кого она когда–либо встречала, — одержим, и гением ли, болезнью ли — никто не смог бы ответить.</p><p class="p1">В один из вечеров, высвобождаясь из его объятий, но постоянно ощущая губами тепло его губ, их повелительность и силу, — Элизабет, слегка пьяная и не владеющая собой, спросила его напрямик:</p><p class="p1">— Виктор, ты француз или я уж не знаю кто?</p><p class="p1">— Слушай, не трогай мою национальность!</p><p class="p1">— Да нет, напротив, кто же ее трогает... твою национальность. Хотя, раз уж больше нечего потрогать... Виктор, я скоро начну думать и говорить, как последняя девка. О чем ты, интересно, думаешь? Мы встречаемся уже три месяца. Планируешь ли ты от поцелуев переходить к чему–нибудь более существенному?</p><p class="p1">— Пожалуй, — сказал он дрогнувшим голосом. — Но где и когда?</p><p class="p1">— Есть наша со Стефани комната, есть твоя... Ты давно уже мог бы договориться с соседом, но так как вы, французы, все такие рыцари, то изволь, я поговорю со Стефани. И я хочу, чтобы это все случилось именно этой ночью, — она говорила с решимостью и силой, которых сама не ожидала от себя.</p><p class="p1">— Почему именно этой ночью?</p><p class="p1">Она поглядела в его черные огненные глаза:</p><p class="p1">— Допустим, по чисто физиологическим причинам. Сегодня ты мог бы кончить в меня, не опасаясь беременности. Мне тоже гораздо приятнее, когда это все попадает в меня. Ты прелесть, Виктор, и я не хочу мучить тебя презервативом. Представляешь, его ведь потом надо снимать... куда–то нести... бр-р... Разве не прекрасно совершить все в первобытной простоте?! — нет, все–таки она была тогда здорово пьяна.</p><p class="p1">— Хорошо, — решительно сказал он после небольшой паузы. — Идем!</p><p class="p1">Они пришли в комнату Элизабет и Стефани. Стефани что–то штопала, сделавшись с недавних пор добродушной и семейственной. Она с одобрением относилась к роману Элизабет и Виктора.</p><p class="p1">— Стефани, — решительно начала Элизабет, входя в комнату. — Виктор...</p><p class="p1">— Виктор здесь ни при чем, — из–за ее плеча промолвил улыбающийся, виноватый Виктор.</p><p class="p1">— Ну хорошо, не он, а я прошу тебя выйти буквально на тридцать минут, — и Элизабет подмигнула Виктору, но тот ответил словами:</p><p class="p1">— Это вовсе не обязательно, Стефани. Но если бы вдруг вам захотелось спуститься к какой–нибудь из подруг-авангардисток, или в столовую, если она не закрыта, или в соседнюю комнату, где стоит видеомагнитофон. И авангардисты собираются подучить и подновить мир! — сам себя перебивая, воскликнул Виктор. — Эти люди не чувствуют даже, когда им надо выйти на двадцать минут!</p><p class="p1">Монолог его был беспорядочен, как и большинство его монологов, но он возымел на Стефани немедленное действие. Ворча себе под нос, она прошла мимо Элизабет и, обернувшись, видела, как Виктор обнял ее и уложил на кровать, на которой они только что сидели рядом.</p><p class="p1">...Что же ты, что же... — шептала Элизабет, лихорадочно стаскивая джинсы. Ей никогда так безумно не хотелось любви, любви самой буквальной, низменной, животной, но ничего низменного и животного с Виктором не могло быть связано. Он тоже раздевался торопливо, однако не забывая аккуратно складывать одежду, что посмешило Элизабет, как смешит милая причуда близкого человека. Виктор всегда был для нее тайной, и она надеялась сейчас, здесь, в постели, разгадать эту тайну и слиться с ним окончательно. Он говорил о невозможности такого слияния, ссылался на Камю, на экзистенциалистов; утверждал, что женщина — природное начало, дочь стихии, а мужчина — олицетворение рациональности, — но все это было теорией, а на практике слияние мужчины и женщины. И Элизабет вполне серьезно полагала, что после такого слияния их единение с Виктором будет полным, ибо ничего ей еще так не хотелось, как подчинить себя и одновременно подчинить себе этого властного, непредсказуемого, черным пламенем горящего человека.</p><p class="p1">Он лег с ней рядом и с какой–то истерической страстностью принялся покрывать поцелуями ее лицо, — щеки, губы, шею, подбородок, — и она сначала отвечала ему, но почувствовала, что он весь дрожит и страшно напряжен. Тогда он обхватила его руками, стараясь согреть, но он дрожал по-прежнему. Она припала губами к его губам, на секунду он расслабился, но вскоре его тело снова чудовищно напряглось. Она целовала его плечи, гладила спину, — он целовал ее грудь и скользил руками по бедрам и животу, но никак не переходил к тому, ради чего, собственно, она и затащила его в постель.</p><p class="p1">«Может быть, он слишком требователен, а я недостаточно опытна? Может быть, он ждет, пока я сделаю с ним то, что Стефани делала с Уиллом? Нет, нет! Но если он хочет этого?» — и она села на кровати и наклонилась к его коленям. Она увидела, что Виктор мгновенно перевернулся на живот и ударил кулаком в подушку.</p><p class="p1">«Он ни на что не способен?! Этого не может быть: мне говорили о его похождениях! — думала она. — Или это я ему не подхожу? Или я оказалась слишком активна? Что это может значить?»</p><p class="p1">— Виктор! — тихо позвала она.</p><p class="p1">Он не отвечал. Она наклонилась к его лицу: оно было мокро. Он плакал от отчаяния и бессилия.</p><p class="p1">— Виктор, милый, что случилось? Успокойся!</p><p class="p1">— Рано или поздно это должно было случиться, — говорил он, словно выталкивая слова сквозь стиснутые зубы. — И надо же, чтобы именно с тобой! Когда впервые... когда я чувствовал...</p><p class="p1">— Но ведь раньше у тебя так не бывало!</p><p class="p1">— Нет... никогда... Но должно было именно с тобой. Я чувствовал, я знал! Это знало, когда меня настигнуть! Впрочем! — он перевернулся на спину и расхохотался натужно, и этот смех был ей знаком, как и мгновенная смена настроений и интонаций. — Впрочем, не слушай. Уязвленное самолюбие, переутомление и все такое. Французы — нервная и утонченная нация. Твой авангардист-альбинос подкосил мои силы.</p><p class="p1">— Стефани?</p><p class="p1">— Кто же еще. Но ты не ставь на мне креста, я еще покажу себя. Когда буду менее утомлен. Разумеется, я попрошу тебя не слишком распространяться о моей... неудаче.</p><p class="p1">— Как ты плохо обо мне думаешь, Виктор! Неудивительно, что такая женщина даже не возбуждает у тебя желания.</p><p class="p1">Она тихо засмеялась, взяла его за руку и положила эту руку себе на грудь.</p><p class="p1">— Тебе так хорошо?</p><p class="p1">— Да! — захохотал он, и в его смехе ей послышалось рыдание. — Да, мне очень хорошо!</p><p class="p1">— Глупый, — успокаивающе прошептала она и положила его руку на низ живота.</p><p class="p1">— Знаешь, иногда рукой это бывает даже приятнее, чем... словом, чем обычным способом.</p><p class="p1">— У мужчин — никогда.</p><p class="p1">— Да, но мы — женщины — сложнее устроены. Мы совершеннее, — и Элизабет принялась направлять его руку, чтобы он смог сделать так, как она хотела.</p><p class="p1">Он делал это поначалу вяло и неумело, но вскоре она обо всем забыла, и горячая тьма опустилась на них. Она открыла рот, она раздвинула ноги, насколько позволяла узкая студенческая кровать, и когда блаженство ее достигло высшей точки, она приоткрыла глаза. Виктор лежал рядом, бледный и изможденный.</p><p class="p1">— Спасибо, — прошептала она. — Виктор... Я, возможно, была слишком настойчива сегодня. Но так, как с тобой, — так хорошо, поверь мне, — не будет и не было ни с кем. Если ты хочешь, чтобы я призналась тебе в любви, — вот, я признаюсь.</p><p class="p1">— Ты славная, — тихо ответил он. — Но все это бесполезно, конец один.</p><p class="p1">— Брось, Виктор! Ты начитался своих экзистенциалистов, язык сломаешь, честное слово! Тебя любит коренная американка, очаровательная блондинка, которую ты только что успешно довел до оргазма. Чего еще нужно?</p><p class="p1">— В сущности, ничего, — сказал Виктор. — Лиз... боюсь, что какое–то время нам лучше не встречаться.</p><p class="p1">После такого блаженства она не готова была к внезапному перепаду.</p><p class="p1">— Ты хочешь сказать, что мы не должны будем видеться?</p><p class="p1">— Нет, — он усмехнулся. — Видеться нам придется. Как–никак один курс. И все привыкли видеть нас вместе, так что вопросов не оберешься, — на людях придется показываться вдвоем. Но прошу тебя, давай реже встречаться по вечерам. Ты потом поймешь, почему.</p><p class="p1">— Виктор! Ради Бога, не говори загадками.</p><p class="p1">— Это не загадки, черт побери! — Он опять кричал. — Это мое право! Дай мне прийти в себя!</p><p class="p1">— Но Виктор... Если ты думаешь, что из–за этого в наших отношениях что–то изменится...</p><p class="p1">— Мне плевать! — заорал он, и она испугалась: сейчас–то эта вспышка ничем не могла быть объяснена, кроме огромного и уязвленного мужского самолюбия. — Да и потом, — мгновенно остыл он, — все равно скоро каникулы, хоть и две недели, а все же. Мы разъедемся — ты в Атланту, я в Нью-Джерси. Ты вернешься. И я... — Он выждал. — И я вернусь. И все будет прекрасно. И тогда я тебя не пожалею, — он усмехнулся, но опять искусственно.</p><p class="p1">— Виктор, ты меньше всего похож на девственника. И я знаю, что ты все можешь. Это моя бестактность, или депрессия, или переутомление...</p><p class="p1">— Да, да.</p><p class="p1">— Но я боюсь тебя потерять. Я чувствую, что это возможно. Ты или за что–то обиделся на меня, или у тебя в самом деле что–то не так. Слушай, уж не замешан ли ты в таинственной французской мафии?</p><p class="p1">Это ее шутка спасла положение. Они еще около получаса импровизировали на эту тему, как любили вдвоем. Затем Виктор сослался на головную боль, Элизабет сладко и счастливо заснула почти сразу после его ухода и не слышала, как вошла Стефани.</p><p class="p1">Виктор стал с ней суше, они реже встречались вечерами, а перед экзаменами, накануне каникул, и вовсе виделись мало, — но того отказа от встреч, который он обещал и которого она боялась, все–таки не произошло. Они продолжали видеться, вместе сидели в кафе, он целовал ее, но по молчаливому уговору к теме секса они не возвращались никогда. Самый существенный барьер между ними не только не был устранен, — он вырос до новых, почти непреодолимых размеров. Элизабет так и не знала тайны Виктора, которая составляла основу его почти болезненной притягательности. Он был явно отличен от других, но чем и почему, кроме французского происхождения и экстравагантных вкусов, — Элизабет по-прежнему не могла понять.</p><p class="p1">Наконец подошли каникулы, и Элизабет с Виктором в последний раз сидели во французском ресторанчике. Элизабет грустила, но впереди у нее была Атланта, по которой она успела изрядно соскучиться, и спокойный, веселый Стив, с которым все просто. За это время Виктор придет в себя. Они встретятся и станут опять близки. Их родители перезнакомятся. Возможно, она выйдет за него замуж. Отчего–то мысль о замужестве приятно согрела ее. Ребенок от француза. Муж-француз. Всеобщее восхищенное изумление с оттенком зависти. Французская любовь. Выезд в Париж. Совокупления где попало, на чем попало. Ей вспомнилось, как однажды в подземке они с Виктором целовались так самозабвенно, что какой–то старик, чья молодость предшествовала еще Великой Депрессии, осмелился высказать им свое недовольство.</p><p class="p1">Виктор взорвался:</p><p class="p1">— Почему вы, старый недоносок, делаете замечания двум бедным влюбленным, которые никому ничего не делают, а рядом с вами расселся здоровеннейший пьяный негроид, и попробовали бы вы ему сказать, что он позорит город, нацию и корни своей культуры, — ему было бы наплевать на ваши седины, он бы стер вас в порошок вместе с вашими сентенциями! А о нас можно, о нас все, конечно, можно! Ибо бедные влюбленные не могут постоять за себя, они любят друг друга, — и им это довольно!</p><p class="p1">И он принялся целовать Элизабет с еще большей страстью, расстегнул ей рубашку, сорвал лифчик и принялся целовать грудь, брал в рот соски, лизал их, — Элизабет только хохотала, прижимая его голову к груди. Такого освобождения, такой веселой злости она еще не знала. Вот за такие–то веселые безумства его и стоило любить, а больше никого не стоило.</p><p class="p1">...После каникул, прошедших весело — дочь привыкла к другим людям и другому месту, родители радовались быстрой адаптации ребенка в новом коллективе, — Элизабет не нашла Виктора в кампусе.</p><p class="p1">Он мог не явиться на занятия, но исчезнуть из кампуса бесследно или опоздать, не вернуться после каникул, — он не мог.</p><p class="p1">Она пошла к его товарищам по комнате.</p><p class="p1">Друзья его любили, но относились к Виктору настороженно, ибо тоже, видимо, чувствовали в нем темную, тайную силу, которая несет его вниз по течению и с которой он не в силах бороться. Элизабет знала, что о нем говорят за глаза.</p><p class="p1">— Энтони, — окликнула она в коридоре его соседа, белобрысого бейсболиста. — Где Виктор?</p><p class="p1">— Виктору не на пользу пошло образование, — сказал Энтони. — Некому будет теперь орать по ночам.</p><p class="p1">— Что случилось?! — Элизабет подбежала к нему и вцепилась в его рукав. — Мразь, что случилось?</p><p class="p1">— Крыша у твоего Виктора окончательно съехала, — ответил Энтони. — Мне дружки его рассказали. Я–то, ты знаешь, с ним не слишком ладил. Он поехал к себе в Нью-Джерси и там съехал. Как его папаша. Давно пора.</p><p class="p1">В тупом оцепенении Элизабет брела по кампусу, когда к ней подбежал Джозеф, маленький очкастый еврей, единственный настоящий вдруг Виктора, сотни раз приходивший ему на выручку и успокаивавший во время депрессий или приступов ярости.</p><p class="p1">— Лиз! Я ищу тебя! Ты уже знаешь?</p><p class="p1">— Ничего не знаю. Скажи, что случилось?</p><p class="p1">— Я звонил его родителям. Он все скрывал. Это у них наследственное, дед сошел с ума в юности и жив до сих пор, живет в сумасшедшем доме в Швейцарии. Виктор был весь в него, и у матери тоже бывают припадки. Плюс родовая травма. В общем, теперь стало понятно, откуда у него эти приступы... и все. Я не хотел тебе говорить, но, может быть, ты что–то сумеешь сделать? Он сидит в больнице и никого не узнает, он как Освальд в «Привидениях»...</p><p class="p1">— Не говори глупости, Джо. У Освальда был сифилис.</p><p class="p1">— Ну, я не знаю, — он никого не узнает, но, может быть, тебя он узнает? Он действительно очень тебя любил, понимаешь?</p><p class="p1">Вопрос об ее поездке в Нью-Джерси был решен мгновенно. Стефани предложила денег, и Элизабет не отказалась. Джо привез билеты на послезавтрашний рейс. За два дня Элизабет уладила все свои дела, купила в дорогу два учебника по психиатрии, переговорила со знакомым врачом, — никто не мог сказать ей ничего определенного. Адрес Виктора в Нью-Джерси ей дал тот же Джо, пресекавший в колледже любые разговоры о безумии друга и страдавший по-настоящему.</p><p class="p1">— Лиз, — спросил ее перед отъездом Джо, — у вас точно ничего не произошло с ним перед его отъездом? Прости, я, может быть, не имею права знать, — но он действительно очень любил тебя, Лиз, и говорил мне об этом...</p><p class="p1">— Нет, Джо. Ничего не произошло, — сказала Элизабет, в глубине души невыносимо мучаясь сомнениями и тоской. — Я затащила его к себе в койку, вот и все.</p><p class="p1">— О, от такого счастья и я бы сошел с ума, — сказал Джо со своим вечным еврейским юмором. Элизабет любила таких парней, но до Виктора им было далеко — в Викторе все было крупно и загадочно. — Но вы не ссорились, ведь так?</p><p class="p1">— Нет, не ссорились.</p><p class="p1">...Всю дорогу до Нью-Джерси она неустанно корила себя и проклинала тот день, который, может быть, стал для Виктора роковым. Его бессилие в тот вечер теперь не удивляло ее. Он психанул. Он переволновался. Он был утомлен борьбой с недугом. Ему было трудно держать себя в руках, вот и все. Отсюда все его выходки. Он боялся ей рассказать. Самолюбие. Неужели она никогда больше не окажется в его объятиях? Неужели не будет его больших губ, его сильных, длинных рук, его странного акцента, песен, ласк на глазах у всех? Он сделал ее тем, чем она стала сейчас, он раскрыл ей ее истинную сущность, — неужели для него теперь все кончено?!</p><p class="p1">Родители Виктора встретили ее без особой доброжелательности.</p><p class="p1">— Простите меня, ради Бога, — говорила она, — но Виктор, наверное, рассказывал вам обо мне. Он любил меня, слишком любил, чтобы я могла в этом сомневаться. Я знаю это и прошу вас простить меня, если горе ваше слишком тяжело, но мне кажется, я могла бы...</p><p class="p1">Она переводила взгляд с лица его матери на лицо отца и не находила ни малейшего сходства. Он был чужим в этой семье, чужим абсолютно, и не только внешне, — недаром он никогда о родителях не рассказывал и все расспросы безжалостно пресекал.</p><p class="p1">— Виктор всегда был странным ребенком, — сказала его мать, поджимая губы. — Анри тоже замечал это.</p><p class="p1">Анри, старший брат Виктора, о котором он тоже не любил упоминать, жил где–то на Западе, делал деньги и был, очевидно, любимцем семьи, что редко бывает со старшими братьями — только с наиболее положительными.</p><p class="p1">— И выбор у него тоже странный, — продолжала мать, критически оглядывая Элизабет. — Я могла надеяться, что вы хотя бы известите звонком или телеграммой о своем приезде.</p><p class="p1">— Я слишком спешила, — ответила Элизабет, а про себя окончательно уверилась в том, что ее здесь не примут, не любят и считают виновницей происшедшего. Родительская ревность? Но и сам Виктор, кажется, был в своей семье отчасти чужим, лишним человеком, почти парией...</p><p class="p1">— Виктор находится в больнице, — сухо сказала мать. Отец безмолвствовал. — Думаю, ему лучше не волноваться.</p><p class="p1">— Но... я слышала, он никого не узнает, — может быть, узнает меня?</p><p class="p1">— Узнает, возможно; и что же дальше? Вы все равно не останетесь с ним, а лишнее волнение может только повредить мальчику.</p><p class="p1">Ах, так вот оно что! Здесь его по-прежнему считали мальчиком, и это, несомненно, было одной из причин его бесправных ссор с родителями — эти ссоры были единственным, о чем он упоминал, говоря о доме!</p><p class="p1">— Я все–таки надеюсь, что имею право увидеть его. Он сам вам скажет... — Она осеклась. Может ли он что–то сказать? — Он сам скажет вам, — твердо продолжала она, — что ничего плохого из этой встречи выйти не может.</p><p class="p1">— Жюль, — сказала мать Виктора, обращаясь к мужу. — Объясни, как доехать до больницы.</p><p class="p1">И она величественно удалилась. Ни чаю с дороги, ни тем более обеда никто не предложил. Муж, правда, был чуть благосклоннее жены — на мужчин Элизабет всегда производила более благоприятное впечатление.</p><p class="p1">— Простите, — сказал отец Виктора. — Мы приняли вас неласково, но уж что поделаешь. Она слишком потрясена болезнью бедного мальчика и считает вас виновницей, потому что Виктор говорил только о вас и был мрачен.</p><p class="p1">— Что же он говорил? Ради Бога, ведь это очень важно!</p><p class="p1">— Он говорил, что познакомился случайно с девушкой, которая могла бы стать ему женой или подругой, но болезнь настигает его. Эта болезнь была его идеей фикс. Он однажды в жизни увидел дедушку: Виктору было двенадцать лет, когда я поехал к отцу в Швейцарию. Отец уже ничего не понимает и выглядит, сами понимаете, не очень привлекательно, особенно тяжело это действует на двенадцатилетнего мальчишку, который к тому же так на него похож... Знаете, сходство через поколение — типичная вещь... Словом, он всю жизнь боялся, что болезнь его догонит.</p><p class="p1">— И догнала? Можно ли сказать, что эта болезнь уже не отступит?</p><p class="p1">— Нет, скорее всего, этот приступ минует. Но думать о колледже и тем более о браке, боюсь, для него уже совершенно бессмысленно. Это инвалид, и я с детства догадывался об этом. Если хотите, можете посетить его, но не думаю...</p><p class="p1">...Врач принял ее куда более любезно:</p><p class="p1">— Знаете ли, ваше присутствие мало что изменит. Классический случай наследственной шизофрении. Не вижу оснований запрещать или откладывать ваше свидание. Он может вас узнать, может не узнать, но во всяком случае ни при каких обстоятельствах не набросится с кулаками. Он не буйный. Более того, при первых случаях — вы ведь знаете, что он не первый раз попадает сюда? — ах, не знаете, ну так вот: при первых случаях он еще подавал какие–то надежды. Шизофрения, как мы сегодня полагаем, — это расстройство связи между человеком и миром. У него эти связи давно нарушены. Посмотрели бы вы на его почерк. Связи разрушены окончательно. Вы, вероятно, представляетесь ему роботом. Или агентом, который подослан, чтобы разрушить его психическое здоровье. Ко мне он точно относится как к разведчику или диверсанту, который подослан специально, чтобы мешать ему.</p><p class="p1">— Мешать в чем?</p><p class="p1">— Ну, в каких–то его раздумьях, каких–то тайных замыслах... Он сидит, уставившись в одну точку. Немой и бледный. Может, вам удастся его растормошить...</p><p class="p1">— Это не будет шоком, потрясением?</p><p class="p1">— Не большим, чем гроза для тонущего. Дождь ничего не меняет для захлебывающегося человека. Вы должны скорее опасаться за свою психику.</p><p class="p1">Виктор... сильный, ни с чем не считающийся Виктор — беспомощный, замкнутый, уверенный во враждебности всего мира... Нет более жуткого зрелища, чем сильный человек в беспомощности и унижении...</p><p class="p1">— Я готова. Проведите меня в его палату. Он один?</p><p class="p1">— Разумеется.</p><p class="p1">Виктор не изменился. То есть ни в чем, ни на секунду не стал другим. Это был прежний Виктор. Крупный. небритый и странный.</p><p class="p1">Он резко встал ей навстречу. Она отшатнулась.</p><p class="p1">— Не бойся, Элизабет. Я ждал тебя. Только тебя. Видишь, куда они меня упрятали?</p><p class="p1">Она инстинктивно боялась безумцев, но ее так же инстинктивно влекло к нему, н это было сильнее любых доводов рассудка.</p><p class="p1">— Но, Виктор... Может быть, тебе надо передохнуть?</p><p class="p1">Она ждала чего угодно, но не готова была к тому, чтобы увидеть его прежним. И даже улыбающимся. Может быть, чуть более резким в движениях.</p><p class="p1">— Передохнуть, да... Это, конечно, только временный приступ. Увидишь, я еще вернусь, и все у нас будет как надо. Ты уверена, что они сейчас не подглядывают за нами?</p><p class="p1">— Я просила об этом.</p><p class="p1">Она внезапно ощутила себя его сообщницей. Такой же безумной, как он сам. И почувствовав запах его одеколона в палате, ощущая даже на расстоянии тепло и запах его тела, она была готова к любым безумствам.</p><p class="p1">— Раздевайся.</p><p class="p1">— Здесь? Прямо сейчас?</p><p class="p1">— Да. И я твой должник — ты не помнишь? И разве ты не за этим приехала?</p><p class="p1">Она расстегнула блузку.</p><p class="p1">— Но Виктор... Может быть, мы отложим это до лучших времен? Когда ты будешь здоров и вернешься?</p><p class="p1">— Скажи еще — до Страшного Суда. Раздевайся, прошу тебя.</p><p class="p1">— Прежде ты мне помогал. Сделай это сам.</p><p class="p1">— Хорошо. Ложись.</p><p class="p1">Она легла на его койку со сбившимся одеялом, со смятой простыней. Безумие во всем. Но это к лучшему. Может быть, беря на себя часть его безумия, она помогает ему вернуться к жизни.</p><p class="p1">Он присел на край кровати и опять долго смотрел на нее. Потом прикоснулся к ее груди. Осторожно погладил сосок, прильнул к нему губами. Расстегнул свои брюки.</p><p class="p1">...В его запахе было что–то новое, что–то острое, болезненное, — запах безумия, с испугом подумала она. Неужели это уже можно уловить даже обонянием? В этот раз все было так, как должно было случиться тогда, месяц назад. Только месяц. Она поразилась силе его эрекции.</p><p class="p1">— Виктор, да ты только притворяшка! Несчастный притворяшка, который хотел меня разжечь!</p><p class="p1">— Заткнись! — оборвал он грубо. Он не хотел ее милосердия. О, да в нем еще сильно самолюбие и жажда жизни!</p><p class="p1">...Жар, раскалывающий виски, раскалывающий потолок над ней. Невыносимо долгое, невыносимо сладкое и все нарастающее блаженство. Он проникал глубже и глубже, двигался медленнее и медленнее, сжимая ее бедра сильными, горячими руками. Она чувствовала его дыхание около своей шеи. Он рывком приподнял ее, застыл...</p><p class="p1">— Кончай же! — не выдержав, выдохнула она. — Кончай, я не вынесу, я с ума сойду! — О бестактности этих слов она не думала в ту секунду, да и о чем она могла думать, когда немыслимое блаженство, которого она не в силах была вместить, рвало ее напополам?!</p></span></span>
