<span><span><p class="p1">Жаркая струя ударила где–то в глубине ее существа. Виктор разжал пальцы. Они оба откинулись на кровать. Некоторое время он лежал сверху, благодарно целуя ее груди с набухшими сосками, потом долго целовал ее живот и бедра, потом — колени и ступни.</p><p class="p1">— Теперь иди, — сказал он после невыносимо долгого молчания. — Иди. Я за тобой.</p><p class="p1">— Но... разве ты не пробудешь здесь еще какое–то время?</p><p class="p1">— Разумеется, пробуду. Но в то же время останусь с тобой. Ты не вернешься. Но я уйду отсюда с тобой вместе.</p><p class="p1">«Бедняга, — подумала Элизабет, — Он думает, что я могу забеременеть. Он не знает, что я давно предохраняюсь...»</p><p class="p1">— Мне приходить завтра? — вслух спросила она.</p><p class="p1">— Приходить? — он словно оторвался от каких–то своих мыслей, обернулся к ней вполоборота, стоя у окна. — Да, да, конечно, если захочешь...</p><p class="p1">— Ты так атаковал меня, что я совсем забыла передать тебе привет от Джо!</p><p class="p1">— Кто такой Джо?</p><p class="p1">— Джо Мильштейн... ты не помнишь его?..</p><p class="p1">— Ах, этот лилипут... Как он поживает? — В его голосе чувствовалось раздражение.</p><p class="p1">— Он очень тоскует по тебе.</p><p class="p1">— Передай, чтоб не тосковал.</p><p class="p1">Она расценила это как обещание скорого возвращения. Но что–то не давало ей покоя. Она подбежала к нему, прильнула к его губам, ощутила шершавую корочку — видимо, он кусал губы...</p><p class="p1">— Виктор, Виктор, милый... У меня нет, не было и не будет никого, кроме тебя. Я люблю тебя, слышишь?! Ты не можешь оставить меня одну! Ты вернешься!</p><p class="p1">Он с силой оторвал ее от себя.</p><p class="p1">— Иди, иди сейчас... Выйди вон, слышишь? Умоляю тебя, приходи завтра. А сейчас — уходи, уходи, прошу тебя, уходи!</p><p class="p1">Он почти кричал, и она сочла за лучшее уйти.</p><p class="p1">Ночью в гостинице она почти не спала и с утра побежала в больницу. На что она надеялась? На полное и внезапное выздоровление, которое обещал ей маленький врач, потрясенный «сердечностью их встречи», как он выразился? На этот раз врач принял ее неприветливо, хмуро, да и допустил к себе не сразу.</p><p class="p1">— Придется огорчить вас, — сказал он. — Сегодня к нему нельзя. И вряд ли когда–нибудь будет можно.</p><p class="p1">— Что случилось? — выдохнула она, опускаясь на стул и не находя в себе сил справиться с бешено колотящимся сердцем.</p><p class="p1">— Ночью он пытался покончить с собой. Разбил стакан и воткнул осколок себе в горло.</p><p class="p1">— О Господи!..</p><p class="p1">— Не вините себя. Суицидные попытки бывали у него и раньше.</p><p class="p1">Она никогда в жизни не падала обморок. Не упала и теперь. Только лицо ее побелело, и он протянул ей какую–то жидкость в мензурке.</p><p class="p1">— Родители еще не знают, и я попытался все от них скрыть. Он теперь в безопасности — рана неглубокая. Но стресс, похоже, оказался ему не по силам. Скажите, не стесняясь ничего: вчера между вами что–то было?</p><p class="p1">Она бессловесно кивнула.</p><p class="p1">Я надеялся, что этот шок поможет ему. Вы слышали об инсулиновом шоке? Это было бы потрясением посильнее, не только гормональным, но и чисто нравственным... И вот, как видите, результат прямо противоположный. Не вините себя. Как знать, не последняя ли это радость в его жизни?..</p><p class="p1">...Безразличная ко всему, через три дня она возвращалась в колледж. Виктор пришел в себя, но уже никого не узнавал и только бессвязно мычал в ответ на вопросы. Видимо, его попытка казаться нормальным была последней попыткой человека, попавшего во власть темной силы и несущегося вниз по течению, контактировать с миром. Улыбнуться из бездны перед концом. И, как знать, не была ли их близость последним осознанным счастьем, дарованным ему перед тем, как превратиться в куклу, в ребенка, которого кормят с ложки, в окончательно деградировавшего идиота, который доживал свой век в городской больнице Нью-Джерси?..</p><p class="p1">Он и сейчас был там. В отдельной палате. Один. Невменяемый и опустившийся. Проносящий ложку мимо рта. Она не видела его таким. И даже если бы захотела увидеть, — не смогла бы пересилить себя. Она была последней из мира живых, с кем он говорил и кого видел. Потеря оказалась невыносима. Она не могла отделаться от чувства вины. Может быть, не будь ее, он дольше оставался бы в рассудке? Хотя нет. Врач говорил, что при прогрессирующей шизофрении деградация личности неизбежна.</p><p class="p1">Но Виктор не хотел отпускать ее — даже теперь. Она видела его во сне. Она не могла забыть его, помня всем телом то безумное, то запретное, на грани смерти блаженство, которое он дарил ей. И она была теперь убеждена, что полюбить здорового человека не сможет никогда. Проклятие безумия тяготело над ней. Другим могут нравиться простые и здоровые люди, но это не для нее. Призрак безумия осеняет каждый ее шаг, каждое слово. Безумец, живой мертвец не выпустит ее из своей власти.</p><p class="p1">После этого она отнюдь не стала пуританкой. Наоборот, с бесстыдством отчаяния она предлагала себя чуть ли не каждому, на удивление Стефани и к неописуемому горю маленького Джо. Но о Викторе, кроме Джо, почти никто не вспоминал. Разве что лектор по истории Возрождения. А она ни в чем не находила радости и с отвращением гнала от себя каждого, кто засыпал рядом с ней. Она были ей отвратительны. Пока не появился Брюс. Брюс был в постели ничем не лучше, а может быть, и хуже, чем десять его предшественников. Больше десяти у нее не могло быть.</p><p class="p1">Брюс был ничем не лучше прочих как любовник, но он был умен и тонок, и ничто еще не выдавало в нем неудачника. И когда он сделал ей предложение, ей подумалось на секунду, что призрак безумия отступил от все.</p><p class="p1">Она ошиблась. И потому теперь по лужам шла на свидание к мужчине, о котором ничего не знала. Который тоже, возможно, был безумцем. Который заменял ей остальной мир и стал орудием старого проклятия.</p><p class="p1">Он, непонятный, любимый, сумасшедший, ждал ее в пять, после рабочего дня, н она шла к нему, обходя лужи, не замечая дождя, глядя прямо перед собой.</p><p class="empty-line"/></span></span>
