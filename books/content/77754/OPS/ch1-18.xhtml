<span><span id="id17"><div class="title3">
<p class="p"><strong>V</strong></p>
</div><p class="p1">Клаудиа перед отъездом настояла, чтобы Эмили надела вечернее платье, непременно черное, строгое и открытое. Сочетание открытости и строгости должно было достигаться изысканным покроем, в котором все — полунамек, обещание, но ничего определенного, никаких вульгарных разрезов и все такое. Грань. Пикантность.</p><p class="p1">— Но Кло... боюсь, вы мой гардероб переоцениваете. У меня такого нет, — робко возразила тогда Эмили.</p><p class="p1">Клаудиа была уже в машине:</p><p class="p1">— Ничего, ребенок, у меня как раз есть такое. Я настаиваю, слышишь, — настаиваю, чтобы ты его надела. Этот мужик очень и очень непрост. От него у нас слишком многое зависит. Мы должны произвести на него впечатление. Верней, ты должна. Я–то уже произвела...</p><p class="p1">Эти, последние перед отъездом, слова Клаудиа произнесла то ли с облегчением, то ли, наоборот, разочарованно.</p><p class="p1">В номере Эмили первым делом осмотрела платье. Оно было и впрямь великолепно: легкое, строгое, обещающее, ласково облегающее тело. И сидело на ней, словно сшитое по заказу, прекрасно подчеркивая крепкую грудь, стройные ноги, безупречную талию.</p><p class="p1">Может быть, не нужно? Надевая чужие вещи, мы навлекаем на себя судьбу их владельцев...</p><p class="p1">Но уж решено так решено. Где гарантия, что этот деловой и могущественный тип не донесет Кло, в чем была Эмили? А вдруг это и не платье вовсе, а какой–то тайный магический знак, по которому бизнесмен узнает нечто, известное Кло, но пока скрытое от Эмили? Она фыркнула в ответ на собственные предположения, скинула блузку и цветную юбку, приняла быстрый, легкий прохладный душ — к вечеру жара спадала, но освежиться было необходимо, — подбрила подмышки, сбрызнула их тонкими французскими духами и бесстрашно влезла в платье.</p><p class="p1">Она спустилась на лифте и осторожным, как бы неуверенным шагом заскользила по мраморному полу. Деловое свидание отчего–то немного волновало ее, но в этом волнении, как вспоминала потом Эмили, не было ничего похожего на судьбы. Так входят в кабинет к шефу, о котором только то и известно, что он — влиятельный человек. И оттого, что этот человек способен как–то повлиять на твою жизнь, ты начинаешь думать о нем с приятным волнением. Другой вариант не рассматривается, хоть он и возможен, отчего бы и нет? Но ты уверена в себе, ты себе нравишься, и это чувство не может не передаться другому!</p><p class="p1">Эмили знала, что от нее требуется немого: произвести впечатление. Быть любезной, доброжелательной, ровной, улыбаться, если ему вздумается шутить (вне зависимости от качества шуток) и торжественно покачивать головой, если он окажется таким идиотом, что с первой встречи с молодой и красивой женщиной поведет разговор о делах.</p><p class="p1">Его не было.</p><p class="p1">Эмили разволновалась чуть сильнее. Она все же опоздала, ненадолго, на пять минут, но вдруг этот тип окажется таким комплексующим педантом, что уйдет, не дождавшись ее, а потом устроит скандал Кло, та наорет на Эмили, все полетит к чертям, навсегда исчезнет из глаз загадочный город с его дымящимися от любви развалинами... и черт с ним! Будет другая жизнь, другой город...</p><p class="p1">Эмили усмехнулась. Его не было.</p><p class="p1">— Я Джеймс Уидлер.</p><p class="p1">Голос раздался у нее за спиной. Приятный, чуть глуховатый голос с какой–то странной ноткой, звеневшей в нем. Ноткой всезнающего любопытства...</p><p class="p1">Она медленно обернулась.</p><p class="p1">— Извините, что я опоздала. Я ненавижу опаздывать.</p><p class="p1">Эту фразу произносить не следовало. Если вы в чем–то чувствуете себя виновной — постарайтесь забыть о своей вине, тогда и собеседник забудет. Старина Дейл. Но это так написать легко. А когда вам в душу заглядывают холодные насмешливые глаза, и блестят в них нагловатые искры, и неожиданно красные пухлые губы на бледном небритом лице шепчут прямо в ухо свое имя, и горячие пальцы едва касаются вашего черного плеча, и в голосе звучит усталость и прощение, и укор, и тайная грусть, — тут уж, мадам, вы позабудете и расчетливость свою, и все уроки добрых волшебников, умеющих так облагородить вашу жизнь, и независимость, и красоту, и неотразимый лоск... Вы глядите ему в глаза, и губы ваши, приготовленные к дежурной равнодушной улыбке, вдруг улыбаются широко и просто, как доброму другу, которого вы знали тысячу лет.</p><p class="p1">— Я бы предпочел, чтобы вы называли меня Уидлер. В тех редких случаях, когда я спокойно переношу свое имя, ему предшествует какое–нибудь хлесткое словцо. Скотина Джим, например.</p><p class="p1">— Старина Джим, — предложила Эмили.</p><p class="p1">— Сволочь Джим, — не согласился Уидлер.</p><p class="p1">— Добрый Джим, — возразила Эмили. — Дай, Джим, на счастье лапу мне...</p><p class="p1">Они рассмеялись. Вдруг из–за плеча Уидлера Эмили увидела устремленный на нее обжигающий страстный взгляд. Она смутилась. Глядел на нее какой–то черный мальчишка, лет 12. Смущение могло бы перерасти в обиду, когда бы во взоре этом зрелая мужская дерзость не соединялась бы с детским восхищением и обожанием. Он глядел на нее, чуть приоткрыв рот, словно был не в силах отвести взгляда.</p><p class="p1">Она отвернулась. Надо было что–то говорить.</p><p class="p1">— Я Эмили.</p><p class="p1">— Да уж надеюсь, — тоном капризной старухи произнес он. — Не хватало еще, чтобы вас звали Лиззи, Пегги или как–нибудь еще в этом роде.</p><p class="p1">— Почему? — вежливо спросила она.</p><p class="p1">— Я бы чувствовал себя полным дураком, — непонятно сказал он, но ей почему–то не захотелось переспрашивать.</p><p class="p1">Глаза его снова блеснули. В ухе блеснула серьга.</p><p class="p1">Ресторан был наполовину пуст в это время. Они прошли по залу мимо столиков, являя собой довольно живописную пару. Она — в черном закрытом платье в ее спутник — в черном пиджаке, черной рубахе и джинсах неопределенно-темного цвета. Рубаха, перечеркивая весь этот траур, была распахнута на груди.</p><p class="p1">Дорогой Эмили обнаружила, что за ними неотступно следуют два амбала с бандитскими рожами. Она испугалась; фантазия нарисовала ей жуткую картину похищения бедной женщины, утомительно-яркие сцены насилия, требования огромного выкупа, ужас матери... и зловещим клоуном показался ей этот странный Уидлер, поглядывавший теперь на нее искоса, как кот на чужое мясо.</p><p class="p1">Она замедлила шаг. Он усмехнулся.</p><p class="p1">— Не бойтесь, — произнес он, и звук его голоса сразу ее успокоил. — Это не за вами. Они со мной.</p><p class="p1">— Кто они? — спросила Эмили.</p><p class="p1">— Мои телохранители, — небрежно бросил он. — Они везде со мной ходят.</p><p class="p1">Джим опять усмехнулся, подумав: плати я этим оборванцам столько, сколько предложил сегодня, едва познакомившись, — они так и будут ходить...</p><p class="p1">— А зачем вам телохранители? — поинтересовалась Эмили. Страх отпустил ее; она отчего–то легко и сразу поверила Уидлеру.</p><p class="p1">— Меня однажды похитили, — уронил он, как бы не желая погружаться в подробности давнего и уже забытого кошмара. — С тех пор я решил поберечь себя от неожиданностей. Это мешает работе.</p><p class="p1">— Да-а... — протянула Эмили, с уважением глядя на Джима.</p><p class="p1">— Да нет, — загадочно сказал Уидлер, хотя она ничего не ответила на его заявление. — Это не совсем то, что выдумаете. Никаких пыток, заливания клея в задницу, утюга на животе... Назначили выкуп, а самого меня содержали в чудных условиях. За жизнь я мог не опасаться: хрен бы им тогда обломился вместо выкупа, а может быть, хрен каждому обломали бы и в самом буквальном смысле. Я славно проводил время. Три дня полного досуга, манговый соус и прочая экзотическая кухня...</p><p class="p1">Эмили вздрогнула. Он тоже любит манговый соус?!</p><p class="p1">— Вы тоже любите манговый соус? — спросила она.</p><p class="p1">— А... люблю, — рассеянно отозвался он. — Все авантюристы любят. И красный перец. Один знакомый террорист рассказывал, что все настоящие революционеры должны любить красный перец. Ну и вот — это похищение, оно дало мне приятное чувство собственной значимости. — Он наклонился к ее уху, одновременно поглядывая, какое впечатление производят они на зал. — Раз тебя похищают, три дня кормят даром и наконец вручают за тебя выкуп, — значит, в тебе есть кое-какая нужда. Слава Богу, я прилично ориентируюсь даже с завязанными глазами, потому что приценивался когда–то к половине трущоб в этом городишке. Вот я с ними, с этими парнями, уже не очень церемонился. Они мне все вернули с процентами и уползли задом, с благодарностями.</p><p class="p1">Какой он бизнесмен?! Он не был похож на мальчика, читавшего Карнеги, на парня из хорошей семьи, на выпускника престижного колледжа. Он был лукав и непредсказуем. Он был похож на Рурка. Не внешне — пожалуй, Рурк был попухлее, помягче, — но глубоким, неистребимым мальчишеством, авантюризмом, легкостью, лукавой и хитрой улыбкой. Он был огромного роста — так казалось Эмили. Даже при ее хорошем женском росте она едва доставала ему до плеча Когда он наклонялся к ней, жарким дыханием обдавая ее шею, — что–то сладкое и запретное щекотало ей нервы, не говоря уж о том, что шее тоже было щекотно.</p><p class="p1">— Опасное местечко этот ресторан, — сказал Уидлер, блаженно откидываясь на стуле. — Темное. Особенно после десяти вечера. Не в том смысле опасное, что вас тут могут похитить или изнасиловать, — о нет, не надейтесь, — он усмехнулся, и Эмили не обиделась на него. — Просто тут все не так, и все не те, за кого они себя выдают. Вот эта красавица, что подвела нас к столику и смотрела на меня, как добрая знакомая, — она на самом деле промышляет вовсе не тем, что выражает свою радость по поводу встречи с очередным посетителем. И вообще — все сидящие в зале только делают вид, что они сюда приходят есть. Они сюда приходят делать вид. Как и все мы, грешные. Кроме тебя, — он пристально на нее посмотрел. — если я, конечно, не заблуждаюсь. — И, не дав ей вставить слова, он полуобернулся и щелкнул пальцами. Дальняя колонна, оказавшаяся официантом, то есть опять–таки обманчивая, особенно для близоруких, заскользила к их столу. Эмили зачарованно смотрела на Уидлера.</p><p class="p1">Огромный попугай, висевший в клетке недалеко от их стола, вдруг встрепенулся и заорал что–то похожее на «Альтерадо! Альтерадо!»</p><p class="p1">— Эльдорадо? — спросила Эмили.</p><p class="p1">— Нет. «Добро пожаловать» на одном из местных диалектов.</p><p class="p1">— А сейчас?</p><p class="p1">— Сейчас — «Добро пожаловать» по-португальски.</p><p class="p1">— А мне послышалось — «Берегись!»</p><p class="p1">— Ну, здесь ведь все не то, за что оно себя выдает.</p><p class="p1">Официант приблизился — в зеленом пиджаке с краевой перевязью, медлительный, с хищной, плоской улыбкой.</p><p class="p1">— Для начала два мартини и эти ваши салаты из креветок, — сказал Уидлер. — Подробности письмом. Остальное позже.</p><p class="p1">Официант кивнул и ускользнул.</p><p class="p1">— Ты часто здесь бываешь? — спросила Эмили.</p><p class="p1">— Бывает, что и бываю.</p><p class="p1">— Сколь мужественно с твоей стороны после похищения не изменить привычек и по-прежнему посещать злачные места.</p><p class="p1">Она чувствовала себя поразительно свободно с ним, хотя не выпила еще ни капли. Она произнесла все это, глядя на его телохранителей, примостившихся за соседним столиком и добродушно переговаривавшихся. Здесь обманчиво все. Он проследил за ее взглядом.</p><p class="p1">— Ты имеешь в виду их?</p><p class="p1">Она кивнула.</p><p class="p1">— Ты хочешь, чтобы я извинился за то, что богат? Изволь. Извини.</p><p class="p1">Она густо покраснела, и это сделало ее невероятно прекрасной, хотя она не знала об этом. Слезы выступили у нее на глазах. Что она наделала! Она расслабилась, н вот он уже нанес удар.</p><p class="p1">— Знаешь, — не дав ей опомниться, сказал он. — Я бы не прочь их отпустить. И поехать назад не в машине, а в автобусе. А то ведь, пока мы шли сюда, машина ехала за нами.</p><p class="p1">— Я не заметила.</p><p class="p1">— Я не удивлен. Ну так как? В этом есть свое очарование. Давай?</p><p class="p1">Не дождавшись ее ответа, он щелкнул пальцами. Этот жест доминировал в его общения с миром. Амбалы встали из–за стола, синхронно, как двое из ларца, и исчезли в дверях.</p><p class="p1">— Теперь с нами может произойти все что угодно. Ресторанчик ведь тоже только притворяется ресторанчиком. На самом деле это бывший работорговый рынок. Тут торговали такие, как мы, то есть наши предки, такими, как они, — он указал на мулатку-официантку, — то есть их предками. Поэтому, как нетрудно догадаться, в душе они все вас очень-очень любят. Они показывают нам верхний слой своей жизни, знакомят с самыми дешевыми и простыми из своих обычаев, а в душе носят свою темную звериную суть и темную звериную злобу. Их магия непостижима, их сила больше того, что может понять рассудок. Энергетика, гений местности. То–то они сходят с ума от своих беспрерывных переворотов. Мозг этих аборигенов убог, но он способен изучать волны, над которыми мы не властны.</p><p class="p1">Эмили встала.</p><p class="p1">— Я на минутку.</p><p class="p1">— Как выйдешь, третья дверь направо.</p><p class="p1">Она улыбнулась ему. Чего-чего, а комплексов у него нет. Но и у нее, по счастью, тоже. Она пошла по мозаичному полу, опасаясь поскользнуться или споткнуться в непривычно длинном платье. Но и сама знала, что хороша.</p><p class="p1">Дело было не в том, что ей действительно следовало бы заглянуть в сортир. Она никогда не могла понять девушек, которые в присутствии знакомых парней боялись отпроситься в туалет. Но дело было не в этом: ей хотелось на секунду остаться одной. Даже не для того, чтобы подкраситься и поглядеть на себя. Просто для того, чтобы отдать себе отчет в происходящем. Какой он, к черту, деловой партнер? Но и рифма, что напрашивается к слову «деловой», тут тоже не подходила. Эстет, гурман? Нет. Но он смотрит на нее странно. Как будто... Она по привычке додумывала историю, подмазывая губы у зеркала. Кло отчего–то настаивала, чтобы Эмили всегда была здесь ярко накрашена. Так вот, он смотрит на нее, как будто в чужой стране, в чужом, диком мире они оба — тайком засланные туда соотечественники-шпионы. И оба догадываются, что другой — оттуда. И оба восхищены тем, как ловко и остроумно другой скрывает свою принадлежность к тому миру. И живут они в этом мире послами не имеющий названья державы. Но пока не хотят признаться друг другу в том, что они — одной крови, он и она. Как два равно сильных, молодых и красивых зверя, окруженные чужаками, они исподволь любуются друг другом, но не решаются сделать последнего шага — ибо тогда что–то такое выплеснется наружу, что–то такое обнаружится для всех, что раз и навсегда из изобличит. Поврозь они еще способны маскироваться. Но вместе... Вместе они будут, может быть, сильнее, чем поврозь, но все равно не смогут противостоять толпе внезапно прозревших дикарей. Если они сойдутся, если б их — да судьба свела... О, тогда что–то страшное и прекрасное стало бы явным для всех! А пока, эмиссары неизвестного, почти небесного Отечества, они приглядываются друг к другу, по случайным паролям, по вскользь оброненным словам догадываясь об истинной сущности друг друга... Эта игра доставляет им обоим бездну наслаждения.</p><p class="p1">Она вышла из туалета и направилась в зал.</p><p class="p1">Он смотрел на дверь и следил за ней взглядом. Когда Эмили подсела к столу, Уидлер некоторое время молчал, и молчала она, часто дыша, улыбаясь смущенно и прелестно.</p><p class="p1">— Мне нравится, как ты ходишь, — произнес он наконец. — Мне нравится на тебя смотреть. Когда–нибудь ты будешь рассказывать внукам о том, как в бывшем рабовладельческом рынке, в нынешнем странном и опасном ресторанчике ты сидела с одним типом в платье другой женщины.</p><p class="p1">Она обалдело уставилась на него.</p><p class="p1">— Откуда ты знаешь?</p><p class="p1">— Я сам подарил Клаудии это платье.</p><p class="p1">Эмили вновь густо покраснела. Так вот оно что!.. Ну, я поговорю с Кло по ее возвращении...</p><p class="p1">— Я не о том. Откуда ты взял, что у меня будут внуки?</p><p class="p1">Великолепный выход из положения! Браво.</p><p class="p1">— Ну, это несложно. Твоя мама сказала, что ты всю жизнь мечтала осесть, выйти замуж, нарожать кучу детей, которые в свою очередь, безудержно размножаясь, окружат тебя толпой внуков.</p><p class="p1">Ни-чего себе! Эмили не совладала с собой и перепугано посмотрела на Уидлера.</p><p class="p1">— Ты... звонил моей матери?!</p><p class="p1">— Ну, зачем же я. На это есть агент. То есть опять же, пардон, я не хочу этим сказать, что сбор данных о тебе ниже моего достоинства. Но мне, во-первых, неловко как–то, я чрезвычайно застенчив... а во-вторых, не буду же я лично узнавать номер твоего телефона на диком Западе!</p><p class="p1">— А... как ты узнал, что это вообще буду я? Что я вместо Клаудии приду сегодня на сви... на встречу? Мою фамилию, мой адрес... откуда?</p><p class="p1">— Ну, во-первых, о том, что ты приехала с Клаудией, я знал позавчера. Мне надо быть в курсе всего, что тут происходит с куплей-продажей недвижимости. Нет, не из–за конкуренции или других деловых умыслов, — он успокоил взглядом встрепенувшуюся было Эмили. — Хотя... и это тоже, но не в том суть. А во-вторых: должен же я знать о том, что ты любишь есть на ужин. Вкусы Кло мне достаточно известны, она норовит выставить сотрапезника на феерическую сумму, надеясь хоть так подорвать бюджет конкурента. Ты — другое дело. Твоя мама мне сообщила, что больше всего на свете ты любишь хорошо прожаренный ростбиф, картофельное пюре и морковку в сливках. О чем здесь уже предупреждены. Конечно, им тут пришлось попотеть насчет морковки, ну да уж ладно...</p><p class="p1">— Ну... и как там мама?</p><p class="p1">— Замечательно. Твоя подруга Джоан развелась, у вашего судьи родился внук, погода стоит роскошная, и урожай кукурузы обещает быть ого-го.</p><p class="p1">— Знаешь... — Эмили помолчала, прищурившись. — На самом деле я терпеть не могу хорошо прожаренный ростбиф.</p><p class="p1">— Не может быть!</p><p class="p1">— Ага. Представь себе. Просто он маме удавался всегда лучше всего. И сама она очень любит морковку в сливках, поэтому всегда готовит ее по праздникам. А что до картофельного пюре, так ведь мы, знаешь ли, небогаты. Не сочти за бестактность: я вовсе не хотела тебя попрекать твоим богатством. Знаешь, у нищих свой снобизм, но я, во-первых, не из нищих, а во-вторых, не из снобов. Просто мне часто приходилось в детстве есть картофельное пюре. И хорошее воспитание не позволяло сказать, что оно у меня уже вот где. — Эмили коснулась рукой горла. Все, что она говорила, странно не гармонировало с ее роскошным платьем, со всем этим миром и с собеседником напротив.</p><p class="p1">— А что же ты любишь?</p><p class="p1">— Уют, — сказала Эмили. — Комфорт. Чтобы все было тепло и надежно. Чтобы я лежала в полудреме, а рядом кто–нибудь что–нибудь делал. Что до еды, то я предпочитаю манговый соус — не из подражания вашей светлости, а из своего природного к нему расположения. Разумеется, ветчину, разумеется, ванильное мороженое. Сугубо англосаксонские вкусы.</p><p class="p1">— Мое бедное дитя. Придется мне самому съесть морковку. Не зря же они тут так пыхтели. Откажусь, а они ножом полоснут из–за угла. Или отправят в свой подвал, где прежде томились рабы, и будут кормить одной морковью с хорошо прожаренным ростбифом и картофельным пюре.</p><p class="p1">Оба расхохотались. Эмили ни с кем еще не чувствовала себя так легко, свободно и прекрасно. Деньги? Нет, дело было не в его деньгах, хотя она и позавидовала восхищенно той легкости, с которой он переменил заказ и потребовал на стол гору ветчины, нарезанной тоньше лепестка орхидеи.</p><p class="p1">Он почти не ел, потягивал мартини, брал креветки из салата и медленно смаковал. Он смотрел, как она глотает, как вздрагивает ее нежное горло, как блестят ее глаза на раскрасневшемся, счастливом лице.</p><p class="p1">— За матерей! — он приподнял свой бокал и подмигнул ей.</p><p class="p1">Эмили глядела на него как школьница на учителя.</p><p class="p1">— Я, наверное, такая смешная, — пожаловалась она. — Не могу сдерживать эмоции.</p><p class="p1">— Но это совсем не плохо, — возразил Джим. — Мы все должны иногда теряться, чтобы находить себя.</p><p class="p1">Каламбур был второсортный, но, странное дело, все, что бы ни говорил этот Уидлер, в эту минуту казалось ей необычайно важным и значительным. Или она много выпила? Нет, только пригубила...</p><p class="p1">— Ты не согласна со мной? — спросил Джим.</p><p class="p1">— Я не знаю, — сказала Эмили. Ей хотелось продолжить эту игру в школьницу и учителя.</p><p class="p1">— Конечно, знаешь! — он провел ладонью по воздуху, будто отмахиваясь от детской забавы: какой он учитель, какая она ученица? Взрослые, свободные люди. — Повернись! — приказал он, тут же нарушая новые правила.</p><p class="p1">Эмили послушно повернула голову.</p><p class="p1">— Смотри, — он перегнулся через столик и зашептал ей в ухо, — там, за соседним столом сидит пожилая женщина...</p><p class="p1">— Ты что, — так же тихо заговорила она, — она совсем не пожилая. Ей 35, от силы 40 лет.</p><p class="p1">Он прикрыл глаза в нетерпении.</p><p class="p1">За соседним столом сидела пара средних лет. Он и она. Лица их были печальны. Она, в белом жакете и юбке, курила длинную сигарету. Рядом, лениво поглядывая вокруг, сидели два телохранителя. Тоже в белом. «Под цвет ее платья» машинально подумала Эмили.</p><p class="p1">— Как ты думаешь, — продолжал Джим, — что нужно сделать, чтобы вывести ее из себя?</p><p class="p1">Вывести женщину из себя? Для этого существуют тысячи способов. Эмили вспомнила, как однажды проплакала всю ночь, встретив в закусочной даму в тех же туфельках, что у нее. Да что туфельки! Слишком наглый или равнодушный взгляд в толпе, скрипучий шепот за спиной, треснувшие колготки, каблучок, хрустнувший под ногою, зонтик под цвет платья, оставленный в случайном такси, прыщик на лбу, лак, соскользнувший с ногтя, плохая погода, хорошая погода, никакая погода... В данном случае — парик.</p><p class="p1">— Парик! — уверенно сказала Эмили, как лучшая ученица, вызванная наконец к доске. — Если снять с нее парик, то она точно потеряет самообладание.</p><p class="p1">Вопрос был слишком прост. Джим указывал не на пару в белом, а на одинокую старуху, сидевшую в глубине зала.</p><p class="p1">— А как насчет них? — он указал на соседей. — Как ты думаешь, они счастливы иди печальны?</p><p class="p1">Ну, это снова был простой вопрос! Женщина зажигала новую сигарету, ее пальцы слегка дрожали, глаза были сухи. Он молча ел, мягкими движениями уверенных рук ловко орудуя вилкой и ножом.</p><p class="p1">— Они печальны, — правильно ответила Эмили. — Определенно печальны, — добавила она, радуясь своей проницательности.</p><p class="p1">— А чьи это деньги? — он показал глазами на пачку долларов, небрежно лежавшую на столе, ближе к мужчине. Его или ее?</p><p class="p1">Эмили на минуту задумалась. Мужчина все так же не спеша поглощал свой поздний обед или ранний ужин, дама все так же быстро и нервно курила. Но нет, она не была похожа на содержанку или бедную девушку с русской картины «Неравный брак». Ее надменное лицо, гордый нос и властные бледные губы выдавали принадлежность к аристократическому роду, ее тонкие пальцы даже на расстоянии поражали голубой прозрачностью кожи. Эта дама привыкла только к повиновению. Эмили представился родовой замок где–нибудь на юге Германии, огромный зал, выхоленные бесшумные слуги и сама госпожа, с тем же отрешенным, неподвижным лицом одиноко сидящая за столом...</p><p class="p1">— Это ее деньги, — сказала Эмили.</p><p class="p1">Джим одобрительно кивнул в ответ.</p><p class="p1">— Когда они познакомились? — продолжил он свой допрос.</p><p class="p1">— Это было давно... — произнесла она. Ей и вправду начинало казаться, что они тысячу лет знакомы. Только вот кто — они?..</p><p class="p1">— Где они познакомились? — голос его стал строг после ее уклончивого ответа.</p><p class="p1">— На лыжном курорте в Швейцарии, — быстро заговорила Эмили, стремясь поскорей исправить допущенную ошибку и доказать господину учителю, что она отлично выучила заданный урок.</p><p class="p1">— Он был лыжным инструктором, — предположил Джим. Голос его смягчился, ученица исправлялась прямо на глазах.</p><p class="p1">— Он тренировался там к Олимпийским шрам... в Саппоро, — не согласилась Эмили. — И сломал ногу, — отчего–то со злорадством произнесла она. — А она ухаживала за ним.</p><p class="p1">— А как ее туда занесло?</p><p class="p1">— Так, — Эмили пожала плечами. — Брала уроки слалома. У богатых свои причуды. Не все же в замке сидеть. Скучища в этих замках, Уидлер.</p><p class="p1">Он улыбнулся одними глазами.</p><p class="p1">— Это была любовь с первого взгляда?</p><p class="p1">Он глядел на нее в упор. Голос его, казалось, дрогнул. Нет, конечно же, это ей показалось. Ученица явно была достойна высшего балла, но в той школе, где преподавал Джим, высших отметок не ставят. Это не принято, признак дурного тона. Потому что никто ничего не знает в совершенстве. Впрочем, может быть, чудо?.. Что ж, тогда он задаст ей этот, самый трудный вопрос. Ответит верно, что почти невозможно — с традицией будет покончено. Собьется, допустит ошибку — вылетит вон, на улицу. В этой школе ошибок не прощают. Никому, даже лучшим, даже самым любимым ученицам. Даже таким, без которых сама эта школа никому даром не нужна. Ну, Эмили!..</p><p class="p1">— Да, — ответила она.</p><p class="p1">И поглядела на него с торжеством непуганой девочки. Что, съел, милый? Я знаю все ваши уроки, и не то чтобы они мне безразличны, а просто — пока не нужны. Мулат любит мулатку, а я люблю шоколадку... Но я никогда не забуду вас, господин учитель, клянусь вам! Собственно говоря, мне никого, кроме вас, не надо. Только не теперь. Еще не время. Да и слишком романтично для первой ученицы — крутить роман в Рио. У меня еще нет аттестата зрелости. У меня еще мама. Я еще маленькая, хотя уже очень-очень большая...</p><p class="p1">Но оказалось, что экзамен совсем не окончен, он продолжается.</p><p class="p1">— А как она узнала, что это любовь? — спросил он.</p><p class="p1">— О, это просто, Джим. — У Эмили слегка кружилась голова, пересохло в горле, она сделала маленький судорожный глоток, и снова он внимательно следил за тем, как нежно двигалась вверх-вниз кожа на ее горле.</p><p class="p1">— Это просто, Джим. — Она вдруг замолчала: это было не просто. Как аристократка узнает о том, что влюбилась? Что она в своем замке знает о любви? Камердинера застукали с горничной и надавали плетей на конюшне, он кряхтел и плакал, горничная бежала в леса, и там, уткнувшись лицом в травы, лежала ничком, горько раскаиваясь. Книжки? Книжки — это не то, их пишут возомнившие о себе журналисты, бессонными ночами изнемогая от жажды славы и денег... Что же тогда?</p><p class="p1">— А просто она... — подсказал Джим, — просто она испытала такое чувство...</p><p class="p1">— ...какого никогда прежде не испытывала, — подхватила Эмили, благодарно глядя на Джима, — такое чувство, какого никогда прежде не испытывала. Тут была и жалость к нему, такому сильному и красивому мужчине, беспомощно лежащему на диване... да, почти материнская жалость к нему... и еще что–то, чему названия нет, и внезапное желание... страсть, захлестнувшая ее... она никогда не испытывала ничего подобного.</p><p class="p1">— Свадебная ночь, Эмили. — Он бросил ей, как бросают шарик. — Расскажи мне об их первой ночи. Куда они пошли?</p><p class="p1">Эмили наморщила лоб. Куда они пошли? Она села в свой самолет и увезла его к себе в замок? Вот еще... знакомить его с привидениями, с брюхатой горничной, сидеть на холоде за огромным столом под презрительными взглядами настенных предков? Они пошли в отель, как любые нормальные люди. Эмили сама живет в отеле.</p><p class="p1">— Они пошли в отель, — прошептала она.</p><p class="p1">Эмили жила в большом отеле.</p><p class="p1">— Они пошли в большой отель, — сказала она.</p><p class="p1">Ее отель стоял на берегу.</p><p class="p1">— Отель стоял на берегу океана, — продолжала она свой рассказ. — Они заказали номер по телефону.</p><p class="p1">— И все случилось в отеле? — нетерпеливо спросил Джим.</p><p class="p1">— Да... к сожалению. Отель был когда–то большой и богатый, а в те дни, когда они были вместе, пришел в упадок. В комнате было холодно. Он ненавидел отели. А ей понравилось. Она впервые принадлежала ему... впервые принадлежала мужчине. Она чувствовала себя...</p><p class="p1">— Как? — Он весь подался вперед, к Эмили, и в глазах его мелькало безумие, как у того дерзкого восхищенного мальчишки, что встретился ей тогда, у лифта, тысячу лет назад.</p><p class="p1">Как?! Это неправильный вопрос, господин учитель! Его нет в программе! Откуда мне знать, как она себя чувствовала? Мне это, может быть, неинтересно! Эмили почувствовала, что сейчас заплачет. Она не знала ответа. Почувствовала себя счастливой? Эмили и так счастлива. Нет, несчастлива... потому что... Что эта аристократическая дамочка проделывала со своим любимым? Трахалась с ним! Бросала всех своих именитых предков ему под ноги, плакала и кусала подушку, извиваясь в его объятиях... падала в бездну греха. Падала, была в упадке... может быть, что–то в этом роде?</p><p class="p1">— Она чувствовала себя... по-декадентски, — пробормотала Эмили и покраснела, чувствуя, что сказала глупость.</p><p class="p1">Он насмешливо глядел на нее.</p><p class="p1">— Проводим их в комнату?</p><p class="p1">— Я хотела сказать — по-дилетантски, — поправилась она.</p><p class="p1">— Это ничего, оговорка по Фрейду. Ну так проследуем за ними в номер?</p><p class="p1">— Ну... что значит проследуем? Что ты хочешь от меня услышать — что он с ней стал делать?</p><p class="p1">— Эмили. Я страшно любопытен. Я всю ночь не усну, если ты мне не расскажешь.</p><p class="p1">— Боюсь, что это уже будет характеризовать меня, а не их.</p><p class="p1">Это было уже похоже на то, как если бы на уроке биологии учитель попросил ученицу наглядно продемонстрировать строение ее гениталий.</p><p class="p1">— Эмили! Ты хочешь, чтобы я встал и сам у них спросил об этой первой ночи?</p><p class="p1">Он говорил как–то странно, томно, расслабленно.</p><p class="p1">— Нет, ты этого не сделаешь! Пожалуйста, не надо!..</p><p class="p1">Уидлер встал. Вот он какой, оказывается! Она опять позволила себе забыть обо всех предупреждениях Кло!</p><p class="p1">— Нет, нет, я должен знать конец рассказа. Что бы там у них ни произошло, это наложило свой отпечаток на них. Навсегда.</p><p class="p1">— Да не дошли они до той комнаты! — Чтобы остановить его, Эмили ляпнула первое, что пришло в голову, но, может быть, по слову старого поэта, «чем случайней, тем вернее»?</p><p class="p1">— То есть как не дошли?</p><p class="p1">— Ты разве не видишь? Ему не нравился отель. — Ей на выручку пришла придуманная сегодня — а казалось, сто лет назад — история о владельце отеля, одиноком мечтателе, и молодой паре, которая съезжает из гостиницы после первой же неудачной ночи.</p><p class="p1">— Ему не нравился отель? — Джим с удовольствием подхватил неожиданное продолжение. — Он оставил ее, да? Он оставил ее одну в вестибюле. А сам? Представляешь, он выбежал, а она, со своими чувствами, со своими впервые пробудившимися желаниями, чувствуя себя сразу же смешной, старой, ненужной, навязчивой...</p><p class="p1">О, как он, однако, холодно смотрит на людей! Не дай Бог никому смотреть на себя такими глазами, глазами холодного и жестокого врага. А если он и за собой так же следит со стороны... Нет, Эмили всегда была убеждена, что себя надо любить. Взнуздывать, воспитывать, объезжать, — но любя. Он же, видимо, за людьми и, значит, за собой замечал слишком многое. Поэтому всегда играл, никогда не раскрывался и полагал, что все на свете только делают вид, что живут. Ну что ж. И у меня не слишком женский ум. Посмотрим!</p><p class="p1">— Она была разгневана, — кивнула Эмили после паузы. — Она хотела... хотела сквитаться с ним. Осмотрелась вокруг. Пустота, холод, мрак... Пустой отель... В холле висит зеркало. Она увидела в нем... позади себя... другого мужчину.</p><p class="p1">— Слушай! Но не слишком ли это странно — бросить женщину в первую брачную ночь только из–за того, что тебе не понравился отель!</p><p class="p1">— Господи, да при чем тут отель! Это только предлог. Этот парень проще ее, недостоин ее, как ему кажется. — Эмили прищурилась и уставилась на пару за дальним столиком. Перед аристократкой стояло нетронутое блюдо. По-прежнему. — Не настолько уж он тонок и чувствителен, чтобы из–за отеля сходить с ума. Не в том дело. Просто он захотел убежать, почувствовав себя не на месте. И убежал. Потому что у них, в слаломе, короткая дистанция между желанием и его исполнением.</p><p class="p1">— А что же она?</p><p class="p1">— А что ей оставалось делать? Она увидела другого, и ей показалось, что это будет месть. Хотя на самом деле — только заполнение пустоты. Разве мы мстим кому–то, когда нас отвергают и мы выбираем другого? Это не месть, это кислая мина при горькой игре.</p><p class="p1">— И что же?</p><p class="p1">— Она дождалась, пока кельнер уйдет спать. Отель пустой и старый, так что вполне естественно, что ночью он может спать, не опасаясь нападений и грабежа. И она уходит к себе, оставив дверь открытой. Тем более, что дверь и не запирается...</p><p class="p1">— Подожди. А у этой новобрачной кто–нибудь был до этого?</p><p class="p1">— Был, конечно. И был один неудачный, страстный роман, когда только тело ее участвовало в отношениях, а мысли витали далеко. Несовпадение возрастов, вкусов и прочего. Но в этом мальчике-слаломисте — впрочем, не таком уж мальчике, он ее младше лет на пять, не более — ей так нравилось все, и все было настолько иначе, и их так роднила глубинная общая несчастность и какая–то, знаешь ли, неукорененность в жизни...</p><p class="p1">Он улыбался. Кажется, на этот раз она отвела грозу. Он лакомится ее сокровенным, заставляя выуживать из памяти любимые книжки и собственные истории.</p><p class="p1">— Ну, и ночью к ней пришел этот, в зеркале. Он был загадочен, странен, худощав, он все время молчал, и они без слов понимали друг друга. Кроме спящего кельнера, больше никого в отеле. Он взял ее за ночь трижды, а когда она проснулась, его уже не было.</p><p class="p1">— И что, ей было хорошо?</p><p class="p1">— Ничуть. Ей может быть хорошо только тогда, когда хорошо именно ей, а не ее телу. Но она была этой ночью не одна, и он утомил ее. Именно в силу этих двух причин она и смогла заснуть.</p><p class="p1">— Идем, — сказал Уидлер.</p><p class="p1">— К ним? — перепугалась Эмили. — Я же тебе все рассказала!</p><p class="p1">Он встал.</p><p class="p1">— Вот именно. С ними мне ясно почти все, — а что неясно — так незначительно, что уж ночь–то до завтра я смогу проспать. Пойдем туда, где настоящее.</p><p class="p1">— А будет еще и настоящее? — Она не все доела, в вообще ей тут нравилось, и хорошо было бы тут еще посидеть.</p><p class="p1">— Да, я же говорил тебе, что этот ресторан — не совсем то, чем он притворяется. Пойдем, пожалуйста. Не пожалеешь. Ради этого сюда и приходят.</p><p class="p1">Она встала. Сквозь окно за ней пристально следил чей–то восхищенный, но и дразнящий взгляд. Она не чувствовала его, а Уидлер почувствовал. Он обернулся. За огромным, во всю стену, окном, за которым кипел и переливался ночной, жаркий, жуткий и манящий город, стоял мальчик из отеля. Босой, в шортах и маечке, выглядящий лет на двенадцать, не больше. Он провожал Эмили взглядом, в котором было нечто большее, чем восхищение или любовь. Он смотрел на нее так, словно что–то знал.</p><p class="p1">На Уидлера он не смотрел.</p><p class="empty-line"/><p class="p1">...Когда они вошли в маленькую дверь в противоположном конце зала, Эмили чрезвычайно удивилась. Она была уверена, что это выход. Однако, пройдя коротким коридором, они оказались в другом зале, ничуть не меньше того, в котором только что сидели. Трудно было понять, почему ни звука из этого второго зала не долетало до их ушей во время ужина. Но то ли звукоизоляция тут была в самом деле на высоте, то ли попросту Эмили ни на что не обращала тогда внимания, то ли — и это вероятнее всего — веселье и музыка только что начались. Звучал народный танец, по ритму напоминавший «Ламбаду», но совсем иной по мелодии и аранжировке: это была легкая, льющаяся мелодия, в которой была, конечно, и страстность, и нега, но было и веселье, и нежность, и доверие к судьбе.</p><p class="p1">Над залом витал пьяный, пряный запах — запах духов, горячего пота. Еще пахло спиртным. Еще пахло чем–то совершенно неуловимым, — и Эмили это ощущала со звериной чуткостью: что–то было не так, что–то предвещало выход вечера из обычных границ, переход то ли к оргии, то ли к общему буйному веселью, в котором что–то было от отчаяния и безумия. Искателю острых ощущений только этого и надо было. Уидлер блаженствовал.</p><p class="p1">— Мы как раз вовремя. Погоди, сейчас начнется такое... — прошептал он ей в самое ухо.</p><p class="p1">Эмили полуобернулась к нему:</p><p class="p1">— Ты уверен, что это — то, что нужно?</p><p class="p1">— Без всякого сомнения.</p><p class="p1">— Может, побродим лучше по городу?</p><p class="p1">— Зачем? Тебе что–то тут не показалось?</p><p class="p1">— Не знаю... Я тут впервые. Ты же знаешь.</p><p class="p1">— А я не впервые. Сейчас все увидишь.</p><p class="p1">И Эмили увидела. Чего-чего, а музыкальности и чувства ритма у танцующих было не отнять. Горячие смуглые тела изгибались, качались, сплетались в глухом, нарастающем ритме. Музыка становилась громче, быстрей, страшней. Высокая сорокалетняя — так показалось Эмили, — густо накрашенная мулатка рванула на себе платье. Ее примеру последовали многие в разных концах зальчика. Молодой мужчина в белых брюках и розовой рубашке с темными полукружьями под мышками подбежал к Эмили и попробовал втянуть ее в танец. Она робко оглянулась на Уидлера. Тот пожал плечами. Она выдернула руку, как будто ее ударило током.</p><p class="p1">Волна веселья вздымалась все выше. Странная, отчаянная радость захлестывала зал.</p><p class="p1">— Если это и гниение, то очень благоуханное, — сквозь зубы сказал Уидлер, не обращаясь к ней, но она расслышала, хотя и почла за лучшее не отвечать.</p><p class="p1">Смуглая женщина необычайной красоты, поразительно сложенная, с полной грудью, тонкой талией, почти черным, большим ртом, возбужденная, задыхающаяся, вскочила на стол, некоторое время высоко вскидывала ноги, танцуя, кружась, потом резко уселась, невозмутимо стянула майку и осталась в одной короткой юбке. К ней подскочил юноша — судя по всему, он не был ее спутником и вообще видел ее впервые. Он распахнул рубашку на волосатой, блестевшей от пота груди, под ребрами белел шрам. Женщина широко раздвинула ноги. Юноша встал между ними и принялся в ритме танца совершать вполне недвусмысленные движения, хотя брюки его были застегнуты, да и женщина пока не расставалась с юбкой.</p><p class="p1">Не много ли мне на сегодняшний день? Они что здесь, ничем другим не занимаются? — подумала она и чуть было не сказала этого вслух, но тогда Уидлер не отстал бы до утра, утверждая, что он теперь всю ночь спать не будет и ему жизненно необходимо узнать, чего именно она уже успела насмотреться в Рио. И ей пришлось бы не только рассказывать, но, глядишь, и показывать, причем простым показом он бы не удовлетворился. Не из похоти, а из чистого любопытства, но ей едва ли было бы легче от этого.</p><p class="p1">— Это танец, — сказал ей на ухо Уидлер, заметивший, что губы ее дрогнули, а руки порывисто охватили плечи. Так, со скрещенными руками, злая, недоумевающая, она была прекрасна и почти трогательна, как разъяренная Диана во время оргии, — девственница на пиру чужого позора.</p><p class="p1">— Что — и это?</p><p class="p1">— Ну разумеется. Они движутся в ритме музыки. Имитируют жизнь во всех ее проявлениях. Разве это не называется танцем?</p><p class="p1">Сказала бы я тебе, как это называется, подумала Эмили. В ней закипало раздражение. Ей опять вспомнилась фраза насчет клубники со сливками и червей. Если рыба любит червей, нечего предлагать ей клубнику со сливками. Если тебе это все — бальзам на душу, то мне сплошное отвращение, стыд и неловкость.</p><p class="p1">Она не знала, как здесь себя вести. А веселье, кажется совсем ударило в головы присутствующим. Уидлер наблюдал за происходящим без особого интереса, — скорее с каким–то энтомологическим любопытством.</p><p class="p1">— Стой, — спохватился он. — Главное–то я забыл!</p><p class="p1">Он достал из кармана серебряную полумаску и осторожно надел на Эмили. Она не сопротивлялась, лишь подняла на миг пальцы к вискам и тотчас безвольно опустила. Уидлер взял ее руку и поцеловал.</p><p class="p1">— Ничего особенного не происходит. Но здесь ведь все притворяются. Ты притворяешься, что тебе не нравится, они все притворяются, что им нравится. Маскарад как маскарад!</p><p class="p1">Эмили видела в прорези полумаски чуть хуже и чуть меньше, чем раньше. Чувство опасности и брезгливости боролось в ней с любопытством, ощущением сладкой, запретной новизны. Она вздрагивала, щеки ее горели. Она тряхнула головой и подошла чуть ближе к толпе танцующих. Девушка на столе уже скинула юбку. Трусики — два треугольника ткани, связанные чуть различимыми тесемками на бедрах — вот и все, что на ней осталось. Она стонала, откидывалась назад, охватывала бедра юноши ногами, раскачивалась на столе взад и вперед. Ее партнер — пока еще, надеялась Эмили, партнер по танцу — уперся руками в край стола и смешно вращал ягодицами. Эмили хихикнула, но, ободрившись ее улыбкой, к ней устремился исключительно волосатый брюнет, похожий на Габриэля Гарсиа Маркеса — и такой же безумец, мелькнуло в ее голове. Ей менее всего хотелось быть здесь «своей» и было множество шансов стать «чьей–то», а это уж было совсем за гранью добра и зла. Она стерла улыбку с лица, как писали в одной старинной балладе, и отвернулась. Разлетевшийся было брюнет промчался мимо и ухватил кого–то рядом стоящего.</p><p class="p1">На соседних столах пока еще ничего особенного не происходило, если не считать того, что бутылки, тарелки, бокалы летели с них с чудовищной силой. Интересно, подумала Эмили, тут такое каждый вечер? Трудно себе представить что–нибудь гаже. Им что, настолько нечем жить? Или просто деньги некуда девать? Видимо, мир действительно сошел с ума и пресытился до такой степени, что только подобные безумные развлечения могут еще довести этих людей до экстаза. Так извращенец, о котором она читала в одной из газет, — бедный, невинный извращенец, — не мог испытать оргазма, пока не получал при поцелуе изо рта в рот виноградину, которую до этого раскусила возлюбленная. Так и они: испытав все, пресытившись всем, они тратят жизнь в расчисленном, предусмотренном, тщательно спланированном буйстве. В этом была глубокая фальшь. Изначальная. Та, темная, дикая, туземная страсть, которую она видела сегодня в заброшенной гостинице, не имела ничего общего с этим буйством избранных и допущенных. Тем двоим ничего не нужно было, чтобы почувствовать страсть, нежность и восторг. Этим нужно бесконечно долго себя заводить, искать тончайшие ухищрения... Как хорошо, что она сберегла свое чувство, не пресытившись, не доведя себя до отчаяния и отупения! Теперь она сможет себя, нерастраченную, девственную, отдать сполна настоящему чувству — а не первому встречному, как хотят отдаваться эти женщины здесь...</p><p class="p1">Так думала она, глядя на мелькающую перед ней пестроту. Что говорить, это была красивая пестрота. Это была славная музыка, и в первое время Эмили сама хотела отдаться ритму, закружиться со всеми. Но сейчас... Сейчас это прошло. Осталась тоска, отвращение, ощущение своей тут неуместности. Она повернулась к Уидлеру, чтобы попросить его уйти. Она испытывала сейчас почти нежность к той паре за столом, о которой они говорили. Пусть они по-своему жалки, несчастны, даже смешны, но они честнее и чище этого маскарада, и хорошо, что они не пошли сюда. Эмили хотелось опять сидеть в ресторане с Уидлером, разговаривать с ним, поражаться тому, как он чувствовал и понимал все тайные струны ее существа, — даже неясные ей самой, скрытые от мира. Он так понимал ее, как никто никогда! — он не сможет сейчас не понять ее...</p><p class="p1">Дрожа, она огляделась. Уидлера рядом не было. Вдруг огромный мужлан в темном — знакомом, знакомом! — костюме кинулся к ней, занес над ней лапищи, картинно выждал секундную паузу и с идиотским ревом опустил их на ее обнаженные плечи...</p><p class="p1">— Вон! Вон! Прочь отсюда! — взвизгнула она, вырываясь. Путаясь в платье, она побежала вверх по ступенькам, ее голые стройные ноги мелькали в разрезе платья, и за ней увязался брюнет, похожий на Маркеса. Он был уже изрядно пьян, и Эмили пнула ногой незадачливого кавалера, попав аккуратно под коленку. Брюнет взвыл. Медведь наблюдал с любопытством и, казалось, одобрительно.</p><p class="p1">Выбежав на улицу, Эмили скинула полумаску себе под ноги и стремглав бросилась бежать по мостовой, мокрой после недавнего дождя и отсвечивающую загадочным голубоватым светом.</p><p class="empty-line"/><p class="p1">Первое, что она увидела, проснувшись, был Уидлер.</p><p class="p1">О да! То был Уидлер. Он сидел напротив, глядя на нее мечтательно и улыбчиво. Хо-хо! Что могло бы смутить Уидлера? Она, конечно, не ожидала его здесь увидеть. Но хотела ли? Да, несомненно. Она вообще больше никогда не хотела его видеть. Но она хотела увидеть его еще один раз, чтобы сказать ему о том, до какой степени она не хочет его видеть.</p><p class="p1">Накануне Элизабет заснула без ночной рубашки. Без любимой, педантично выглаженной шелковой ночной рубашки, в которой она всегда спала дома. Она до такой степени устала, бродя по городу и отыскивая обратную дорогу в отель, коря себя и ненавидя Уидлера, рыдая, ища и не находя сочувствия у Карнеги и Паркинсона, что смешно было бы переодеваться. Она сбросила с себя все и нырнула под одеяло. Сейчас она ощущала на себе последствия своей поспешности и усталости. Уидлер, по всей вероятности, долго глядел на нее, спящую. Во сне она могла того... разметаться. Одеяло могло сползти. Нога могла высунуться из–под одеяла больше, чем следует. Одним словом, могло произойти многое. Если эта грязная свинья... этот медведь... эта скотина, которая думает, что если она богата, то ей все позволено и все такое... Короче, если этот сейчас на меня набросится, я буду кричать, и вообще. Как он смеет. Грубое насилие. По законам моего штата... но здесь могут быть другие законы.</p><p class="p1">Все это пронеслось в ее голове мгновенно, пока глаза ее, широко раскрытые, упирались в его — ласковые и усмешливые. Она чувствовала все свое тело под одеялом. У нее покраснело не только лицо, но и плечи, и грудь. Она подтянула одеяло к самому подбородку. Машинально взгляд ее упал на корзину орхидей, стоявших в изголовье. Он, значит подходил сюда и склонялся к изголовью. Только этого тут не хватало! Она съежилась, села в кровати, подогнув колени и подоткнув одеяло с боков.</p><p class="p1">Зазвонил телефон.</p><p class="p1">— Возьми трубку, — ласково посоветовал Рурк.</p><p class="p1">Эмили ничего не оставалось, как послушаться совета.</p><p class="p1">Иначе трубку взял бы он, — с него бы сталось, — и звонивший ей мог бы Бог весть что подумать.</p><p class="p1">— Эмили! — послышался в трубке энергичный и жизнерадостный визг Кло. — Ты не поверишь!</p><p class="p1">— Охотно поверю, — сказала Эмили. — Чему угодно. — Уидлер залюбовался жестом, каким она левой рукой поправляла прядь, в то же время как ее прелестная правая рука прижимала к уху трубку, и одеяло она уже не прижимала ничем. Оно чуть сползло, приоткрыв ключицы. Уидлер с любопытством смотрел на ключицы, как будто никогда прежде не видел ключиц.</p><p class="p1">— Эмили, это черт знает что! У нас тут такое!!!</p><p class="p1">— У нас тоже, — хотела было сказать Эмили, но осеклась. Кло, несомненно, отнесла бы это к чисто деловому аспекту их отношений.</p><p class="p1">— Надеюсь, вы хорошо проводите время, — сказала Эмили очень вежливо.</p><p class="p1">— Потрясающе! — завопила Клаудиа. — Элиот действительно женился! Наш консультант здесь, ты его знаешь! Местные подрядчики все, как один, гуляют на его свадьбе! Я чувствую себя помолодевшей на сто двадцать лет! («Достаточно было бы и на двадцать», — подумала Эмили). Как будто я провалилась во времени! («Чего вам и желаю»). Мы танцуем твист на крыше Санта-Марес! Ты слышишь?</p><p class="p1">В трубке зазвучал твист, который, судя по доносящимся оттуда же звукам, мог танцеваться только на крыше Санта-Марес! Никакая другая крыша, разумеется, не могла давать подобного эффекта.</p><p class="p1">— Эмили! Элиот передает тебе привет!</p><p class="p1">В трубке опять заговорила и загалдела крыша Санта-Марес. Послышались звуки твиста и Элиота. Звуки Элиота были не в пример музыкальнее.</p><p class="p1">— О донна миа! — спел Элиот. «Иа» удалось ему прекрасно. «Черт бы их всех побрал. Когда они делают свои деньги и за что их получают? День и ночь — непрерывное, истерическое, грязное веселье. Неужели этим придется заниматься и мне?!»</p><p class="p1">Словно прочитав ее мысли, Кло со своей крыши спустилась к делам:</p></span></span>
