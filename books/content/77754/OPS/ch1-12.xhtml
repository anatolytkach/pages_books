<span><span id="id9"><div class="title2">
<p class="p"><strong>VIII</strong></p>
</div><p class="p1">Только на третий день Элизабет вышла в галерею, объяснив шефу свое отсутствие депрессией и головной болью, и шеф попрекнул ее недостатком изобретательности.</p><p class="p1">С ней бывало такое — после сильного потрясения, которое надламывало ее навсегда, наступал некоторый период отупения, почти покоя. Сонливая, словно затворившаяся в раковину, она не возвращалась мысленно к тому дню, когда, как решила для себя, бесповоротно потеряла Джонни. Потеряла навсегда, и в этом нельзя было сомневаться, — нечто главное решилось, нечто в ней надломилось, и каким бы ни оказалось будущее, прошлое кончилось бесповоротно. Она рассеянно чертила что–то на листке бумаги. Играла сама с собой в крестики-нолики. Вяло отвечала на телефонные звонки.</p><p class="p1">Странно, — стало даже спокойнее, и теперь, подумала она с неизведанным равнодушием, ей долго никто не будет нужен. Если раньше, подсознательно, тайно, она всегда надеялась на встречу со своим единственным, — теперь на этом придется поставить жирный крест. А на лбу, как у Гессе, написать «Только для сумасшедших». И, может быть, остаться одной — или удовлетвориться монотонным, простым и надежным счастьем с чужим человеком, к которому можно притерпеться.</p><p class="p1">В эти два дня она не скучала по Джонни. Не пыталась ему звонить. Не ожидала его звонков, и если отключила телефон в первый день, то только чтобы не выводили ее из этого внезапного, полубредового равновесия. Во второй день ей звонили только по делу, да еще Дженнифер полчаса болтала с ней об этом своем русском, от которого оказалось не так–то легко отвязаться, да и не очень ей этого хотелось. Дженнифер никогда не надеялась встретиться с единственным и потому была счастлива с каждым вторым.</p><p class="p1">На работе шеф удивил ее:</p><p class="p1">— Видишь ли, Элизабет... Я все, конечно, понимаю здоровье, личная жизнь, у меня вот тоже всякие подобные дела, — но знаешь, мы до сих пор не продали ничего из работ Эрла.</p><p class="p1">Ах да, Эрл... он ведь, кажется, что–то ей предсказал... нет, не знаю, не помню, не буду об этом думать.</p><p class="p1">— И что ты предлагаешь?</p><p class="p1">— Ничего особенного. Надо будет все это перевесить, отобрать самые удачные работы и сделать второй вернисаж. Со скандалом. С пьяным Сен-Клером. Я не знаю, с кем еще, — обзвони всех. Но что–то сделать необходимо, — иначе мы в яме.</p><p class="p1">— Хорошо, — равнодушно сказала она.</p><p class="p1">— Но пойми: я не заставляю тебя заниматься всей этой ерундой... и вообще... Мне кажется, тебе следовало бы после всего этого как следует отдохнуть, и, видит Бог, у тебя будет такая возможность... Только напрягись и сделай на этот раз по высшему разряду. Ладно?</p><p class="p1">Первый вернисаж она организовывала до Джонни. Второй будет после. Это к лучшему.</p><p class="p1">В тот же вечер она обзвонила друзей, сговорилась с Дженнифер и пыталась дозвониться Молли, которой не было ни на работе, ни дома. Не могла же она уехать, черт побери! Впрочем, не к спеху. Наглотавшись снотворного, почти не приходя в себя весь день и оглушая себя на ночь, она упала в кровать и заснула мгновенно.</p><p class="p1">С утра, входя на службу, она с ужасом заметила, что с другой стороны к дверям приближается ничего не видящий, как всегда, отрешенный, гордо закинувший голову Брюс с необъятным букетом роз.</p><p class="p1">Господи! Что угодно, только не это! Только не видеть его, только не говорить с ним сейчас — после очередного поражения...</p><p class="p1">— Молли! — Элизабет кинулась к ней, уже сидевшей на обычном месте, напротив ее собственного стола. — Молли, детка, там... Там Брюс! Сделай что–нибудь, я не могу с ним сейчас говорить!</p><p class="p1">— А он не к тебе, — абсолютно спокойно проговорила Молли, раскрывая пудреницу и начиная подкрашиваться перед зеркальцем, на котором тонким розовым слоем лежала пудра. — Он ко мне.</p><p class="p1">В первый момент Элизабет с облегчением вздохнула, но в следующую секунду зависть и ревность колыхнулись в ее душе.</p><p class="p1">— У вас... все в порядке?</p><p class="p1">— Да, я сегодня ночевала у него, и мы договорились днем поехать к его друзьям. Он договорился с кем–то из своих режиссеров, и тот хочет мне предложить сценарий для обработки. Ты же знаешь, я неплохо пишу, а там нужно именно отредактировать текст... Более мягкого редактора, чем я, им, кажется, не найти, — Молли усмехнулась и взглянула в глаза Элизабет поверх зеркальца.</p><p class="p1">Когда–то он давал Элизабет собственные тексты для редактирования...</p><p class="p1">— Ну, что ж... я очень рада, — Элизабет вымученно улыбнулась. — Скажи, а как же... а как же вечная любовь?</p><p class="p1">— Вечной любви, детка, не бывает, — сказала Молли, улыбаясь себе в зеркало. Она действительно похорошела и посвежела, как всегда во время очередного романа. — Бывает удачное сочетание привычек. Бывает хорошо в кровати. Бывает симбиоз неумелого писаки и грамотного редактора. Бывает чувство уюта оттого, что ты не одна. Бывает надежность. Вот, собственно, и все, чего вполне достаточно для счастья.</p><p class="p1">— И вы поженитесь?!</p><p class="p1">— Что ты, Боже меня упаси. Брюс один раз уже был женат и, кажется, неудачно. Я тоже обожглась на молоке, хотя по сравнению с ним это была, конечно, вода... Но тоже блондин, как и его неудавшаяся любовь. Представь себе — после блондинки он любит только брюнеток! Типа меня.</p><p class="p1">— Ну, что же... Желаю счастья.</p><p class="p1">— Он передает тебе привет и аналогичные пожелания. — Молли убрала пудреницу, подхватила сумочку, встала и направилась к выходу. — Брюс, привет! Я иду.</p><p class="p1">Он вышел из–под лестницы, где поджидал ее, и поднял голову. На лице его было выражение спокойной радости. Почти счастья.</p><p class="p1">Но тут же он перевел взгляд на Элизабет, которая вышла на лестницу вслед за Молли и даже не помахала ему рукой в знак приветствия.</p><p class="p1">В глазах его появился знакомый ей упрек, и невысказанная тоска, и ностальгия по тем временам, когда он обладал ею, и ее тело было в его власти, и он, все время чувствуя себя недостойным ее, мог считать судьбу незаслуженно милостивой, чтобы потом называть заслуженно жестокой. Вечный страдалец Брюс. Как, должно быть, его мучило в одинокие ночи воспоминание о том убогом удовольствии, которое заменяло им секс, — если считать сексом то, что было с Джонни! Как, должно быть, мучительно искал он, в чем ошибался, — хотя именно этот поиск, эта неуверенность в себе и была роковой причиной его ошибок! Нормальному неудачнику нечего делать рядом с ненормальной, Брюс. Но сейчас в его глазах, помимо упрека и тоски, было нечто новое, что она смогла определить не сразу. Даже не в глазах, а в складке у рта. Это было... любопытство и сострадание. Так горожане, собираясь на площади, смотрят на приговоренного. Ну–ка, ну–ка, посмотрим, кто это зарезал бедную вдову с тремя детьми! Господи, да он же совсем еще птенец!..</p><p class="p1">Так смотрел на нее Брюс. С любопытством и жалостью человека, знающего о чужом падении, любопытствующего и не верящего, что наказание по заслугам. И она смотрела на него испуганно, ибо впервые оказалась в ситуации, в которой Брюс был счастливее ее. Он, должно быть, грезил об этой минуте не один месяц. Хотя вряд ли. Он никогда не отличался мстительностью. А с другой стороны — что она знает о мужском самолюбии? То, что она всегда чувствовала себя перед ним виноватой и не умела этого скрыть, — не было ли это самым страшным ударом по его самоуважению? Женщина жалела его, но не материнской жалостью любящей, а жестокой, снисходительной жалостью одержавшей верх. Сегодня он победил. Он счастлив, насколько это вообще для него возможно. У него есть Молли. — Теперь, глядишь, его дела пойдут в гору, он переломит судьбу, Молли станет его талисманом... Элизабет вообще было свойственно преувеличивать чужое счастье во время собственных несчастий. Успех всего милей тому, кто вечно невезучий, нектар оценит только тот, кто жаждой был измучен... В Пурпурном Братстве ни один ликующий воитель так верно не расскажет вам, чем дышит победитель, как тот, кто побежден и пал, когда в предсмертной муке он ясно слышит вдалеке победных воплей звуки...</p><p class="p1">Эмили Дикинсон, единственный поэт, сопровождающий всю ее жизнь.</p><p class="p1">Может быть, и ей была уготована жизнь вечной затворницы, Прелестницы Амхерста, как Дикинсон? Может быть, Эмили чувствовала в себе безумие, его разрушительную силу, и оттого сознательно оберегала себя и мир друг от друга? Может быть, — как знать?..</p><p class="p1">Молли сбежала по ступенькам и вызывающе звонко чмокнула Брюса в щеку. Но тот не отводил взгляда от Элизабет. Они смотрели друг другу прямо в глаза и понимали все — может быть, впервые в жизни.</p><p class="p1">Молли проследила его взгляд и повернулась к Элизабет.</p><p class="p1">— Счастливо, Лиз! — бросила она. — Я побежала. Увидимся на вернисаже.</p><p class="empty-line"/><p class="p1">Пусто одной в пустой квартире. Пусто одной, в пустой... Пусто одной. Пусто. Вот ты и снова одна. Опять не повезло. Облом.</p><p class="p1">Элизабет плакала.</p><p class="p1">Джонни, Брюс, Виктор... это не имена людей, а название ее судьбы. Потом будет еще кто–нибудь — ничего не изменится. Блондинка ищет друга. Чтобы перепихнуться. Сука Молли. Подлая трахучая тварь, которой все равно, с кем перепихиваться — лишь бы палка была тверда. Лучшая подружка Молли. Единственный постоянный гость в ее доме. Теперь и Молли не будет. Нет, я не ревную тебя к Брюсу, чудище лохмоногое. Хотя, конечно, тебе не следовало... А собственно, почему, Элизабет? Да так, я бы никогда на ее месте... А если бы на месте Брюса был бы Джон? Нет, все равно! Я иначе воспитана. Тогда с самого начала ничего бы не было. Хотя... бывали ведь и у меня чужие мужья. Двое, что ли. Так я с их женами не дружила, в доме у них не бывала. И уж точно в подруги не набивалась.</p><p class="p1">Сука Молли. Сука Джонни. Несчастная моя жизнь.</p><p class="p1">Господи, ну что за рок такой, за что это проклятие, в конце–то концов... Виктор... ты был лучше всех... что ж ты, милый, несчастный, любимый мой? Бросить все к черту, умотать к нему в лечебницу, устроиться медсестрой... выносить за ним горшки, гладить по забинтованной руке, глядеть в безумные глаза, слушать слюнявый бред... нет, это невыносимо. А вот уж за кем не бросилась бы никогда горшки выносить — так это за Джоном. Но у этого другой тип сумасшествия. И помрет он другой смертью. Какая–нибудь мулатка сорвет платок с глаз, выхватит пистолет из дамской сумочки и разрядит его прямо в эту змеиную улыбочку.</p><p class="p1">Элизабет передернуло — так ясно представила она себе эту великолепную картинку. Джонни с приклеенной улыбочкой валится на пол, и женщина с черными волосами пинает его ногой. И еще раз, и еще — по улыбочке, по улыбочке, по...</p><p class="p1">Элизабет опомнилась. Господи, так и самой недолго свихнуться. Я ведь не такая. Просто я измучилась. Как быстро он меня... сколько мы с ним знакомы? Месяц... два... девять недель. Абсолютно чужой, циничный, порочный тип. Надо полить цветы. Циничный, порочный и... несчастный. Больной. Больной, несчастный бедненький Джонни. Выродок. Господи, больно–то как…</p><p class="empty-line"/><p class="p1">Элизабет сняла с подоконника лейку, наполненную водой. Ах да... надо прослушать автоответчик. Может быть. Нет. Цветочкам вода нужнее, чем несчастной Лиззи услышать виноватый голос любимой скотины Джона. Потерпишь. Расплескивая воду, она стала поливать цветы. Бедненькие мои, так и усохнете месте со своей хозяйкой. Она тоже задыхается. Бьется об дерево в холодных, мягких руках. Хватает жабрами пустой воздух.</p><p class="p1">Автоответчик был лаконичен. Всего один звонок. Из клиники Рут Кохен. Суховатый женский голос. «Вы не пришли на обследование. Мы напрасно прождали вас. Чек на оплату придет вам по почте. Надеюсь, что вы придете в следующий раз». Рут настолько была обижена на нее, что даже звонить сама не стала. Попросила медсестру. Ну, и провалитесь. От рака я не погибну. Просто у меня сейчас разорвется сердце. А счет вам оплатит контора. Если у вас хватит совести требовать денег с умершей женщины, которую вы лечили.</p><p class="p1">Вода из цветочного горшка, укрепленного на стене, лилась на пол.</p></span></span>
