<span><span><p class="p1">— Познакомишься с Элиотом в Рио. Я его притащу даже на поводке, если это понадобится. («Слыхали мы это»). Слушай: начнем работать, как только я приземлюсь в аэропорте. Договорись, пожалуйста, о встрече и ни в коем случае не соглашайся ни на какой отрицательный ответ! Мы прилетим почти одновременно с китайцами. Пусть там у Флавио все будет готово к банкету, а ты подчитай китайское законодательство, вспомни там язык, налоги и вообще... Целую!</p><p class="p1">Кло чмокнула трубку и отключилась.</p><p class="p1">— Да-да, — сказала Эмили умолкшей трубке и повесила ее, хотя с большей радостью повесила бы собеседницу. Оставляет меня одну черт-те на кого. Я сделай то, я сделай это, а меня считают дешевой провинциалкой и сейчас, кажется, изнасилуют.</p><p class="p1">— Я не привык, чтобы женщины от меня убегали, — сказал Уидлер с трогательной серьезностью. Ах, ты не привык. Ты, может быть, привык к другого рода женщинам, а теперь тебе захотелось бедной скромной девочки из провинции?</p><p class="p1">— Нам всем когда–нибудь приходится менять привычки. Я тоже, знаешь ли, не привыкла, чтобы меня кусали в шею.</p><p class="p1">Да-да, именно в шею. Так же, как я тебя сейчас выгоню отсюда. Кончиком мизинца на левой ноге Эмили ощущала некоторую прохладу — там одеяло было недостаточно плотно подоткнуто и, значит, мизинец мог быть виден. Это совершенно необязательно, но если начать шевелиться, может невзначай приоткрыться еще что–нибудь, и он подумает, что я его соблазняю, и мне немедленно придется менять свои привычки гораздо капитальнее, чем вчера. Одеяло не может прикрыть девочку целиком, девочка уже выросла большая. Одеяло в функции камзола Трианона из известной басни Лафонтена.</p><p class="p1">— Это не мой стиль, Эмили. Ты меня с кем–то спутала.</p><p class="p1">Может, и вправду? Тогда в хорошенькое же положеньице она вчера поставила его и себя. Но тон его стал подозрительно серьезен. Кто вдвинул вас сюда, пусть выдвинет отсюда.</p><p class="p1">— Он был похож на тебя. И чувствовался, как ты.</p><p class="p1">Какое косноязычие! Хороша же я буду, говоря по-китайски.</p><p class="p1">— Откуда ты знаешь, как я чувствуюсь?</p><p class="p1">Прежняя, удивительно обаятельная, ласково-ироничная улыбка осветила его лицо. Он комично вытаращил глаза. Смотри, смотри.</p><p class="p1">— Слушай... Как бы я там тебя ни обидел, я хочу загладить свою вину.</p><p class="p1">Ага, мы признаемся. Значит мы МОГЛИ обидеть.</p><p class="p1">Значит, я не так уж и зря его сегодня держу на расстоянии. Главное — не улыбнуться. Этим я все погублю.</p><p class="p1">— Я заеду за тобой в полдень. Я хочу показать тебе кое-какие места.</p><p class="p1">Ого! Разве мне не хватает с избытком тех мест, которые ты мне уже показал? Хотя, с другой стороны, ты мне, кажется, хочешь показать совсем другие места. Свои собственные. Заодно и поглядеть на мои, которые сейчас так неумело драпируются этим одеялом.</p><p class="p1">— Я уверен, кое–что тебе понравится. Увидишь, Эмили.</p><p class="p1">— Откуда ты знаешь, что мне нравится?</p><p class="p1">Так, так его! Откуда ты знаешь, как я чувствуюсь?!</p><p class="p1">Взгляд ее снова упал на орхидеи. Но все–таки насколько это мило с его стороны! Черт побери.</p><p class="p1">Он подошел к корзине с орхидеями, проследив за ее взглядом. Положил корзину ей на кровать, около подтянутых к подбородку колен. Застыл, глядя ей в глаза другим взглядом, приблизив лицо.</p><p class="p1">Если он сейчас приблизится или сделает еще хоть одно движение, я закричу. Честное слово. И это будет не «Добро пожаловать», а, скорее всего, «Огонь! Пожар!» Так учили кричать в школе. Это лучше привлекает внимание толпы в случае, не приведи Господь, изнасилования, а также шокирует самого преступника.</p><p class="p1">Но он не приблизился. Он с явным сожалением отшатнулся и покачался с пятки на носок.</p><p class="p1">— Так я заеду в полдень.</p><p class="p1">В ухе блеснула серьга. Но Эмили не заподозрила бы его в пристрастии к гомосексуализму — хотя до этого такие серьги она видела только у геев. Впрочем, Уидлеру она прибавляла сходства с пиратом, и только. Да он и так был хорош.</p><p class="p1">— Я не могу в полдень. Клаудиа звонила. У меня работа.</p><p class="p1">— Хорошо. Тогда я заеду в два.</p><p class="p1">Нет, но какова невозмутимость! Женщины, похоже, действительно никогда от него не бегали! Что мы все... что они все в нем находят?! Наглый, самоуверенный, самоупоенный болван, который думает, что все можно купить! Телохранители! Орхидеи он купил! Хотя, конечно, орхидеи...</p><p class="p1">Уидлер вышел из номера так же бесшумно, как и вошел, не прощаясь, как и не поздоровался, и не спросив ничьего разрешения, как не спросил он ничьего разрешения и тогда, когда брал у портье второй ключ.</p><p class="p1">Эмили очень торопилась, чтобы успеть к двум, и в результате закончила все, о чем просила Клаудиа, к половине второго, а до двух ругала себя, Клаудиу, Уидлера, Рио и весь род человеческий.</p><p class="p1">Уидлер приехал в десять минут третьего.</p><p class="empty-line"/><p class="p1">— Знаешь, ты не так уж и ошиблась, — сказал он, ведя ее за руку — она не вырывала руки — к выходу из офиса, который Эмили и Флавио оборудовали на одиннадцатом этаже отеля. — Они познакомились не в Швейцарии, а в Монако, и он не лыжник, а автогонщик, и это был не слалом, а гонки на Гран-При, и он сломал себе не ногу, а челюсть. Но с учетом этих поправок следует признать тебя почти весталкой.</p><p class="p1">На что он намекает? Помимо своей проницательности и близости к богам, весталки отличались девственностью!</p><p class="p1">— Ну, — добавил он — и с учетом еще нескольких поправок, конечно... хотя все относительно.</p><p class="p1">— Кто — они? — спросила Эмили, не развивая тему.</p><p class="p1">— Я взял на себя смелость представиться и познакомиться, — сказал Уидлер. — Раз ты все равно ушла. Надо же было как–то спасать прекрасно начавшийся и разом пропавший вечер.</p><p class="p1">— Да о ком ты говоришь?! — спросила она, со сладким ужасом догадываясь.</p><p class="p1">— Мотоциклы, — сказал Уидлер, — моя гордость и радость. Лучшие годы в своей жизни я провел, практически не слезая с мотоцикла.</p><p class="p1">Перед ними распахнулись автоматические двери.</p><p class="p1">Близ отеля стоял прекрасный, очень дорогой и сказочно мощный мотоцикл. Сделанный явно на заказ. Коллекционный, если бывают коллекционные мотоциклы. Черный, блестящий, огромный, вполне достойный быть предметом гордости и радости.</p><p class="p1">— Я их повсюду с собой вожу, — сказал Уидлер с гордостью и радостью. — Знакомься: Адо и Хана Мунк, из Мюнхена.</p><p class="p1">И прежде чем Эмили успела понять, к мотоциклам или к кому–либо еще относится это представление, из блестящей черной машины, стоявшей рядом, вышел с одной стороны вчерашний «инструктор по слалому» и его спутница — с неизменной тонкой сигаретой.</p><p class="p1">— Ты, наверное, никогда не ездила на таком, — сказал Уидлер. На этот раз, несомненно, он имел в виду мотоцикл.</p><p class="empty-line"/><p class="p1">Она впервые в жизни поняла, что значит «слепящая скорость». Он посадил ее впереди себя, выдав предварительно специальные защитные очки. Эмили все время чувствовала позади себя его большое, горячее, сильное тело. Он закладывал такие виражи и выжимал на сумасшедших горных дорогах такие скорости, что черный «мерседес» еле поспевал за ними. Даром что Адо был автогонщиком. На его месте, подумала Эмили, я бы теперь сильнее опасалась за свою челюсть.</p><p class="p1">А за свою она не опасалась. Она вполне доверилась Уидлеру. Лишь раз она обернулась на его спокойное лицо. Блаженство и уверенность застыли на нем. У Эмили закружилась голова, руки вспотели, — как раз в этот момент мотоцикл на повороте лег почти горизонтально.</p><p class="p1">Они обогнали студенческую свадьбу. В кузове медленного, чихающего, с трудом ползущего в гору грузовика веселились и пели по-английски. Бог весть по каким приметам в них признали американцев, но замахали, загикали, крича: «Привет из Гарварда!». Видимо, студенты на своей дряхлой развалюхе проводили здесь медовый месяц с компанией друзей. Долговязый босоногий парень с полоской красной ткани вокруг головы поднял гитару и завопил:</p><p class="p1">— Все, что тебе нужно, — это любовь!</p><p class="p1">— Уаэ! — поддержали цитату остальные.</p><p class="p1">Уидлер поднял обе руки от руля, сцепил пальцы в приветственном жесте, помахал руками и долго еще не опускал их на руль. Эмили сидела раньше между ними, как в теплом и надежном кольце. Теперь, почувствовав себя беззащитной, она вцепилась в руль побелевшими ледяными пальцами, но тут же отдернула их из страха вывернуть машину, куда не следует. Уидлер заметил это, но продолжал форсить и ехать без рук. Эмили напрягла все душевные силы, чтобы не взвизгнуть, — недаром в уличных боях ей всегда нравилось участвовать наравне с мальчишками и она считалась храброй девчонкой.</p><p class="p1">Наконец Уидлер ухватился за руль и тихо засмеялся — Эмили почувствовала его хихиканье спиной. «Надо мной», — обреченно подумала она.</p><p class="p1">— Забавный народ студенты, — сказал Уидлер. — Всегда им завидовал. Никогда не был студентом. Должно быть, очень весело. Поступить, что ли, куда–нибудь на старости лет.</p><p class="p1">— Сколько тебе лет? — спросила Эмили, но Уидлер за свистом ветра не расслышал ее слов, и она не стала переспрашивать. Тем более что на следующем вираже у нее здорово заложило уши, а когда она решилась открыть глаза, перед ними расстилалась зеленевшая внизу долина и бесконечно далеко, низко-низко, плескалось ласковое, ласковое сегодня море. Все время спуска Эмили просидела с закрытыми глазами. Уидлер был похож на большое белое мотоциклетное божество, если бы таковое существовало в греческой мифологии. Они подкатили к пляжу и лихо тормознули у самой полосы песка.</p><p class="p1">Это был почти дикий пляж в сравнении с теснотой и многолюдьем пляжей города. Здесь резвилась по преимуществу молодежь, на вид такая же легкая, веселая и безобидная, как встретившиеся им студенты. Гремела музыка из старого «Акай», летал над пляжем невероятных размеров мяч, на котором изображался земной шар, и красная Россия целовалась со звездно-полосатой Америкой. «Лесбийский поцелуй», — про себя заметил Уидлер, но Эмили расслышала и улыбнулась. Черный «мерседес» затормозил почти через минуту после того, как Уидлер и Эмили уже шли на пляж.</p><p class="p1">— Почему ты не раздеваешься? — спросила Эмили.</p><p class="p1">— Ну, так уж сразу и купаться. Сперва потанцуем. Посмотрим, как будут развиваться события.</p><p class="p1">— А что–то будет развиваться?</p><p class="p1">— Несомненно. Все увидишь. Какая любопытная. У любознательной Эммы вечно бывают проблемы.</p><p class="p1">— И что, танцы будут типа вчерашних?</p><p class="p1">— Тебя уже кто–нибудь кусает за шею? В маске слепня?</p><p class="p1">Эмили расхохоталась.</p><p class="p1">— Слушай, — сказал Уидлер, — ты заметила, как нам с грузовика показали большой надувной фаллический символ?</p><p class="p1">— Я подумала, что это воздушный шар.</p><p class="p1">— Он и был воздушный, но не шар. Так вот. Ты заметила, как Хана тут же подняла темное стекло в «мерседесе» и всем своим видом выказала неудовольствие?</p><p class="p1">— Ты мог еще за ними наблюдать?</p><p class="p1">— Конечно.</p><p class="p1">— А я нет, — честно призналась Эмили — Бели бы я смотрела назад... («Меня бы вырвало», — хотела она сказать, но промолчала).</p><p class="p1">— То не увидела бы ничего, кроме твоей обширной фигуры, загораживавшей все, — находчиво закончила Эмили.</p><p class="p1">— Не худший пейзаж, — сказал Уидлер. — А сейчас нам кое–что предстоит. Кое–что забавное. Во всяком случае, хотелось бы надеяться.</p><p class="empty-line"/><p class="p1">Огромный пирс уходил в океанскую даль. Гигантский медведь вальсировал с полуголой, без верхней части купальника, девицей гренадерского роста. Эмили уже не смущали такие детали, как отсутствие верхней части купальника. Она знала, что ее грудь и без этих новшеств, в довольно скромном купальнике значительно превосходит почти все, что она сейчас видит вокруг себя.</p><p class="p1">Серебристые парики мелькали вокруг. Их срывали друг с друга, подбрасывали в воздух. Они были сделаны из мишуры и приятно шуршали, будучи подбрасываемы.</p><p class="p1">Хана шла по песку, неловко оступаясь в туфлях на высоких каблуках, экзальтированно взвизгивая всякий раз, как шпилька увязала в песке. Потом скинула туфли и пошла босиком. Адо шел вслед за ней и взглядывал на Уидлера, как показалось Эмили, заискивающе.</p><p class="p1">«Интересно, что они обо мне думают? — вдруг задалась она вполне естественным вопросом. — Второй раз подряд я с ним вместе у них на глазах. И сейчас мы уже двумя парами поехали сюда. Не считают же они меня его любовницей? Или он их подговорил что–то такое устроить, чтобы здесь меня высмеять? Или, наоборот, со мной что–нибудь вытворить и опозорить всерьез, перед всеми? Идиотка. Нельзя тебе было с ним сюда ехать. Это тебе не китайские налоги. Здесь ты ничего не понимаешь. И ежеминутно можешь оказаться в смешном, идиотском, проклятом положении. Дикая девочка с Запада. Деловая женщина. Сидела бы ты дома за шитьем, как говаривали в старину...»</p><p class="p1">Начался новый танец. На эстраде вовсю извивался певец, который откровенно пел под фонограмму и потому больше танцевал, чем следил за артикуляцией. Потом он и вовсе перестал делать вид, что поет, и стал выкрикивать в паузах песенки идиотские прибавки; через строку он кричал: «В штанах!», через строку же — «Без штанов!»:</p><div class="poem">
<div class="stanza">
<p class="v">Сад затих, ни шороха, ни звука!</p>
<p class="v">В штанах!</p>
<p class="v">Ни словца, ни хохота, ни диска!</p>
<p class="v">Без штанов!</p>
<p class="v">Если бы только знала ты, подруга!</p>
<p class="v">В штанах!</p>
<p class="v">Как люблю я вечера под Фриско!</p>
<p class="v">Без штанов!..</p>
</div>
</div><p class="p1">Публика была в восторге. Судя по всему, миссия певца состояла именно в том, чтобы такого рода комментариями, не блиставшими, правда, разнообразием, делать песню более доступной и приятной для потребителей.</p><p class="p1">Хану вовлекли в танец против ее воли, к тому же ее босым ногам было не слишком надежно в этом горячем песке, среди бутылочных осколков. Но все танцевали босиком, пыталась танцевать и она, тоже с натужной, заискивающей улыбкой. Правда, губы ее дрожали, а глаза беспокойно скользили по лицам присутствующих. Она словно что–то подозревала.</p><p class="p1">— Эмили, — почти не разжимая губ, тихо сказал Уидлер. Он был абсолютно спокоен, наклоняясь к ее уху. — Посмотри направо.</p><p class="p1">Она посмотрела сперва на него — нет, чуть бледнее обычного! — и потом туда, куда он указывал взглядом. Уидлер сплюнул.</p><p class="p1">— Видишь того морячка?</p><p class="p1">— Ну да...</p><p class="p1">Морячок был пьян, весел и выглядел вполне разбитным малым. Причем весьма истеричным. Такие типчики обожают затевать драки. Они долго в упор смотрят на абсолютно незнакомого человека, а потом вдруг хрипло кричат, рванув ворот, словно он их душит: «Пусть меня сдерживает целая рота! Или, клянусь, я покажу ему! Во Вьетнаме — дрянь, ты помнишь Вьетнам?! — полк из–за него такого натерпелся!!!» Хотя Вьетнам состоялся в момент, когда морячку было от силы три года, да и то, скорей всего, морячок еще не родился к началу Вьетнама... А человека, которого он видит впервые, он вовсе не хочет убивать: ему подавай общую панику, драку и возможность выплеснуть собственную истерику на толпу ни в чем не повинных собутыльников.</p><p class="p1">— В левом ботинке у него маленький пистолет, — сказал Уидлер. — По-моему, «беретта», хотя ручаться не могу.</p><p class="p1">Эмили похолодела и с тревогой поглядела на Уидлера.</p><p class="p1">— Так вот, когда он его достанет, — сказал Уидлер...</p><p class="p1">— А он его достанет?! — в испуге прошептала Эмили, не слыша собственного голоса.</p><p class="p1">— Он его обязательно достанет, — успокоил ее Уидлер. — Как пить дать. Так вот, как только он его достанет, ты подойдешь к нему и выплеснешь ему в лицо вот это.</p><p class="p1">Он властно подошел к пляжному зонтику, под которым расположилась безмятежная пара, и подхватил ведерко со льдом. После чего всыпал в него нечто из браслета своих часов.</p><p class="p1">— Это не серная кислота? — спросила Эмили в ужасе, но вопрос был настолько наивен, что он принял его за шутку.</p><p class="p1">— Хвалю, храбрая девочка, — сказал он. — Способность шутить есть способность жить, так же как способность есть — это прежде всего способность жевать!</p><p class="p1">И замолчал.</p><p class="p1">Эмили, не отрываясь, следила теперь за морячком, но он затесался в гущу танцующих. А Хана чувствовала себя все неувереннее и оглядывалась на Адо, который медленно каменел в десяти метрах от группы танцующих.</p><p class="p1">Их, кстати, становилось все больше. В бестолковый, на вид счастливый и безмятежный танец втягивались парочки из–под пляжных зонтиков. Иные выпрыгивали из воды. Девушки в мокрых купальниках, обтягивавших тугие, крепкие груди, юноши с мокрыми волосами. Они прыгали на песке, не слишком заботясь о ритме. И тем не менее во всем этом милом веселье что–то вызревало — Эмили чувствовала это всегда очень точно и с хорошим опережением.</p><p class="p1">Вообще она верила своим предчувствиям. Жизнь научила. Она предсказывала погоду с той точностью, о какой старый ревматик — судья, живший в их городишке — мог только мечтать. Она заранее знала про все объяснения в любви и предложения прыгнуть в койку... впрочем, об этом знают почти все женщины. Она знала, что все в ее жизни будет хорошо — и это было, сбывалось. Она знала, явившись тогда в контору, что ее не только возьмут на службу, но и отправят к черту на рога. Рио–де-Жанейро? Этот город однажды в детстве приснился ей в странно черно-белом сне: люди в белых штанах бродили под черным небом, размахивали ножами и страшно кричали. Она чувствовала волнение, когда летела сюда. Это было приятное волнение; предчувствие счастья? Какого счастья? С карьерой все было в порядке, значит...</p><p class="p1">— Отпусти меня, — вдруг закричала Хана, пытаясь вырваться из лап морячка. Тот, молча перебирая ногами, глядел на нее в упор, каменными пальцами сдавливая ей плечи.</p><p class="p1">— Отпусти!</p><p class="p1">— Молчи, сука, — пробормотал он и вдруг медленным, страшным движением сжатой пятерни рванул на ней платье.</p><p class="p1">Хана завизжала. Той же пятерней он вцепился ей в грудь и резким толчком повалил на землю.</p><p class="p1">Танцующие оглядывались на них — скорее с любопытством, чем со страхом. Видно, здесь привыкли к подобным вещам.</p><p class="p1">Эмили, оцепенев от ужаса, глядела на Хану.</p><p class="p1">— Отпусти!!!</p><p class="p1">Адо, расталкивая окружающих, спешил на помощь жене. В глазах его был ужас.</p><p class="p1">Эмили увидела Уидлера. Он, мягко касаясь плеча морячка, что–то убедительно ему втолковывал. Однако не убедил. Отпустив Хану, тот обернулся к Джиму; описав дугу, его кулак со свистом рассек воздух. Джим ударил двумя руками, почти одновременно — в подбородок и в поддых. Морячок взлетел вверх, обретя скорость и направление. У кромки пляжа он приземлился; мулаты, хохоча, погрузили его в лодку и оттолкнули ее от берега. Морячок поплыл. Плавать ему было хорошо, тем более в отрубе и в лодке. Он глядел в небо широко раскрытыми удивленными глазами, и солнце светило прямо ему в лицо.</p><p class="p1">Танцы прекратились, но музыка стала громче. Хана, с плачем прикрывая грудь, медленно поднималась с земли. Адо взял ее за локоть. Она резко выдернула руку.</p><p class="p1">— Отпусти! — кричала она, с ненавистью глядя на мужа.</p><p class="p1">— Прикройся — бормотал он, — прикройся... — и мягкими пальцами пытался ее обнять.</p><p class="p1">— Не прикрывай меня! Уйди! Пусть я так и подохну голая! — казалось, Хана сошла с ума.</p><p class="p1">— Тебе не нравится, как я выгляжу, да? — орала она, отталкивая Адо. — Я тебе отвратительна? Тебе не нравится моя грудь?</p><p class="p1">Хана сама рванула платье, и материя снова треснула. Грудь ее колыхалась, белые, молочной белизны, соски бились в ладонях мужа.</p><p class="p1">— Смотри на меня! — кричала она. — Смотри, тварь! И пусть все смотрят!</p><p class="p1">Морячок плавал.</p><p class="p1">Вдруг он вздрогнул и приподнял голову, дико озираясь. Кругом был океан, впереди — пляж. Подгребая руками, он медленно поплыл к берегу. Джим что–то шептал Хане. Морячок, не отрываясь, глядел на Джима. Эмили с ужасом стелила за морячком. Что–то надо делать, немедленно... Она забыла.</p><p class="p1">Морячок плыл прямо на нее.</p><p class="p1">Вот он причалил. Тяжело спрыгнул на песок. Потянулся дрожащей рукой к левому ботинку. «Беретта», — прошептала Эмили, и глаза ее заметались по песку. Ведерко со льдом! Морячок, сжимая в руке черную стреляющую машинку, приближался, задумчиво разглядывая Джима. Эмили бросилась вперед и выплеснула воду из ведерка прямо в лицо покорителю морей. Тот, схватившись ладонями за лицо, глухо заматерился и упал. Сегодня ему так не везло!</p><p class="p1">«Эмили, скорей!» Джим, Адо и Хана быстро усаживались в машину, толпа бразильцев с гиканьем и свистом за ними гналась. Эмили, расплескивая воду из ведерка, бросилась к ним. Тяжело дыша и увязая в песке, она бежала навстречу толпе. Черная тень настигающих уже падала к ее ногам, когда Джим, схватив ее на руки и швыряя ведерко в толпу, втискивал Эмили в машину. Взревев, «мерседес» заскользил колесами в горячей жиже и резко рванулся вперед. В стекла полетели камни, на крышу кара взлетел мулат и, не удержавшись, скатился вниз с диким воем.</p><p class="p1">Толпа отдалялась, отдалилась, навсегда скрылась из глаз.</p><p class="empty-line"/><p class="p1">«Мерседес» мчался по автостраде. В глухой, взрываемой лишь светом фонарей, черноте тоннеля немка разрыдалась. Адо тихо гладил ей руку. Эмили молчала, испытывая чувство страшной неловкости. Невольно, случайно, она подглядела чужую жизнь... сквозь разорванное платье как в замочную скважину. Больше всего на свете ей хотелось сейчас выйти из машины, упасть на землю ничком и плакать. Плакать, как маленькая девочка, которая никогда не знала и не желает знать о том, что писатели называют «семейной трагедией», когда двое, запертые в семью, как в мчащуюся в тоннеле машину, мучают друг друга и мучаются сами — без любви, без надежды, прикованные друг к другу лишь общей бедой.</p><p class="p1">Как страшно!</p><p class="p1">«Я никогда не выйду замуж, — думала Эмили, — я не хочу и боюсь этой страшной зависимости от чужого тела и своего темперамента. Боже мой... эти двое когда–то любили друг друга... им было легко вместе, а потом... что случилось потом? И этот Джим... как он мог тогда в ресторане выдумывать для меня эти дурацкие тесты... разве можно так вторгаться в чужую жизнь? Нельзя нельзя!»</p><p class="p1">Машина вылетела на автостраду. Эмили искоса поглядела на Уидлера. Он усмехался, глядя неподвижно перед собой. Эмили почувствовала раздражение.</p><p class="p1">— А можно остановить машину? — наклонилась она к Джиму.</p><p class="p1">— Нельзя, — прошептал он, щекоча ей ухо губами. Она сердито отодвинулась.</p><p class="p1">Похоже, Хана просила своего мужа о том же. Он покачал головой.</p><p class="p1">— Отпусти, — тихо проговорила немка и робко коснулась его плеча. Он рывком сбросил ее руку.</p><p class="p1">Хана снова заплакала, стараясь — безуспешно — стянуть куски разорванной материи на груди.</p><p class="p1">— Не надо, — обернулся к ней Джим, — не надо прикрываться.</p><p class="p1">Он глядел на нее в упор, серьезно, печально и нежно.</p><p class="p1">— Я хочу посмотреть на тебя, — продолжал Джим своим мягким, звучным, завораживающим голосом.</p><p class="p1">— Ты ведь этого хочешь, не так ли, Хана?</p><p class="p1">Она благодарно взглянула на него. Губы ее искривились в улыбке. Немка безвольно опустила руки, обнажая грудь.</p><p class="p1">— У тебя идеальная кожа, — ворковал Джим. — Прекрасная грудь. У тебя замечательный, плоский, упругий живот. У тебя никогда не было детей, да?</p><p class="p1">Это был не вопрос, скорее — утверждение. Немка, продолжая страдальчески-благодарно улыбаться, кивнула головой.</p><p class="p1">Джим перевел свой взгляд на Адо. Глаза его стали еще печальнее, голос сместился на октаву ниже.</p><p class="p1">— Да, Адо, — согласился он с невидимым собеседником, — посмотри на свою жену. Она прекрасна. Тебе повезло. Береги свое счастье. И забудь о том, что так разозлило и потрясло тебя.</p><p class="p1">Глаза Адо сверкнули и тут же погасли.</p><p class="p1">— Ты застал ее с другим мужчиной? — и снова вопрос Джима звучал так, словно в нем уже содержался ответ.</p><p class="p1">Немец опустил голову.</p><p class="p1">— Ты видел ее в объятиях соперника, — говорил Джим, — и ты видел, что ей это понравилось. Она сама сказала тебе об этом. Так начались твои беды, не правда ли?</p><p class="p1">Эмили, сжавшись, слепо глядела в окно.</p><p class="p1">— Ты наказываешь не за измену, а за то, что ей было хорошо с другим?</p><p class="p1">Адо молчал, тяжело дыша.</p><p class="p1">— Ты застал их, когда они были вдвоем. Его рука лежала у нее на колене. Она выглядела счастливой. Она смеялась. А ты давно не слышал ее смех, так?</p><p class="p1">Адо молчал. Хана улыбнулась мечтательно.</p><p class="p1">В голосе Джима зазвучали прокурорские нотки.</p><p class="p1">— Или его рука лежала на ее груди? В этом дело, да? Так все случилось, Адо?</p><p class="p1">Адо прохрипел что–то невнятное.</p><p class="p1">Джим взял его за руку и приложил ее к груди Ханы. Медленно, нежно провел его рукой по груди.</p><p class="p1">«Мерседес» въехал в тоннель. Эмили отвернулась. Смущение и брезгливость соединились в ее душе. Немка счастливо улыбнулась, дыхание ее участилось, рот чуть приоткрылся.</p><p class="p1">Адо робко поцеловал ее. Она прильнула губами к его губам. Машина мчалась тоннелем. Странно: на пути сюда Эмили не помнила никаких тоннелей. Впрочем, не исключено, что они просто возвращаются в город другим путем: не гонять же «мерседес» по таким горам, по каким они ехали сюда... Теперь они едут под этими горами. Тогда она была смущена и счастлива. Теперь — смущена, несчастна и пристыжена.</p><p class="p1">Хана меж тем перебралась к Адо на колени и стала поспешно расстегивать его белые брюки. Молния не поддавалась. Помогая ей, он уперся ногами в пол и выгнулся на сиденье. Эмили старалась не смотреть туда, куда Хана пробиралась пальцами. Адо дышал с хрипом. Он схватил жену за плечи, прильнул лицом к ее груди. Тело ее было крепким, сильным, несмотря на уже осенний возраст. Эмили хотела бы остаться такой к тридцати пяти годам.</p><p class="p1">Уидлер с удовольствием, поощряюще улыбаясь словно глядя на детскую игру, наблюдал за их действиями. Он прикуривал, мечтательно выпуская дым, и, похоже, ему доставляла массу удовольствия миссия парламентера и психоаналитика в одном лице. Эмили казалось, что он и сам с большим удовольствием принял бы участие в игре, хотя Хана как будто совсем не в его вкусе. Ну да... если ему нравлюсь я, то к чему ему эта хорошо сохранившаяся немка? И что это за способ соблазнения — сводить на глазах возлюбленной другую пару? Дура, зачем она позволила себя в это вовлечь! Может быть, он продолжает играть, может быть, для него в самом деле никакой роли не играет она сама. Только как зритель его спектакля. Интересно, этот шофер, заблаговременно припрятанный в машине, предупрежден обо всем? Эмили видела только его квадратный стриженый затылок. Ведь по дороге на пляж машину вел сам Адо. Водителя подсунул сам Уидлер, наверное. И водителю, наверное, не впервой возить такие парочки на этот пляж, где всякое бывает. Маловероятно, что Уидлер импровизирует. По всей вероятности, культурная программа была одна и та же для всех. Кло, вероятно, тоже подвергалась всему этому аттракциону. Вот все и встало на свои места. Теперь, кажется, настала ее, Эмили, очередь. И она едет в чужой машине, с чужим, совсем чужим, теперь чужим Уидлером, вовлеченная в эту игру — слава Богу, пока только как свидетель. Он щекочет ее и свои нервы. Шахматист, только играет он живыми фигурами. Заставляет их краснеть, драться и спариваться. Убегать по чужому городу из борделей. Любоваться на соития немолодых европейских пар. Запах... какой, однако, возбуждающий и отталкивающий запах! Глаза Эмили против ее воли обратились к Хане и Адо.</p><p class="p1">Адо держал в руках тяжелые груди своей жены. Глаза его были полузакрыты. Он, как мальчишка, восхищался Ханой. Много ли женщин было у него до нее? Конечно, он ее младше, но ненамного. Может быть, и были, — только не такие, как эта аристократизированная, утонченная помесь Брюнхильды с борзой. Аристократизм в лучших германских традициях. Эмили поймала себя на ненависти к Хане. Ведь Уидлер сейчас любуется ею. Что за радость? Что он в ней находит?</p><p class="p1">Может быть, я совершенно не нравлюсь ему в он хочет со мной только поразвлечься? Тот смысл, который в колледже вкладывали в этот глагол, — для него уже недостаточен. Ему для развлечения необходим риск, щекотка нервов, чужое унижение и участие в чужой судьбе, о котором его никто не просил. Черт бы его побрал! И Хану, которая ему нравится. Не может быть, чтобы его не возбуждало это дикое зрелище. Значит, черт бы побрал их обоих и недоумка Адо впридачу. Хотя он в этой компании самый нормальный и достойный сочувствия. Закрутить роман с Адо назло Хане и Уидлеру. Посмотреть на обмороки Ханы и на вытянутую рожу Уидлера. Хотя вряд ли Уидлер будет удивлен — он просто порадуется неожиданному повороту сюжета. Конечно! Он богат, и ему нравится эдаким принцем Флоризелем проникать в чужие судьбы, ломать или выстраивать их по своему образцу. Господи, да что же они так возятся!..</p><p class="p1">Ответ на этот вопрос не заставил себя ждать. Уидлер осторожно взял Эмили за подбородок и повернул ее голову к паре. Пара... «Как делать детей с помощью пара и электричества? Берется пара, гасится электричество...» Тоннель продолжался. По Фрейду, в тоннелях тоже есть нечто сексуальное. Вагинальный символ. Не знаю насчет вагинальности, а наш автомобиль точно может быть интерпретирован в фаллографической терминологии. Эмили задрала голову, чтобы Уидлер не смог повернуть ее лицо к малопривлекательному зрелищу, но он властно прикоснулся к нее затылку, пригнул ее подбородок к груди, шепнул в ухо:</p><p class="p1">— Смотри! Это же прекрасно! Смотри, не отворачивайся, ведь сейчас на твоих глазах к ним возвращается счастье!</p><p class="p1">Не знаю уж, какое там счастье. Здесь, в машине, при нем, при мне!.. И ведь вслух, Господи Боже мой, ничего не скажешь...</p><p class="p1">Но что–то завораживающее было в глазах Уидлера, и в том, как Хана, разведя ноги, задрала до предела шелковую юбку, как Адо обхватил ее ягодицы... Треск материи. Он порвал на ней трусы, резко привлек к себе... Она застонала громче и замотала головой. Ее пальцы сжались в кулаки, потом разжались опять, она обхватила его затылок и привлекла его голову к своей груди. Потом она принялась подниматься и опускаться на его коленях, медленно, вращая при этом бедрами и чуть постанывая от наслаждения. Адо держал ее за лопатки, гладил обнаженную спину, сжимал плечи, потом все сильнее принялся прижимать ее к себе, сам попадая в такт ее движений и, видимо, проникая в нее все глубже и глубже. Тоннель кончился, и белый свет хлынул в кабину, ослепляя их, но подняты были темные стекла, и этим двоим нечего было смущаться.</p><p class="p1">— Первый раз это у них тоже случилось в машине, — шепнул Уидлер на ухо Эмили. Она поморщилась. Значит, в отеле у них действительно тогда ничего не получилось. Да и не следовало бы, наверное, выдавать своих чувств... Но какого черта он мне сообщает об этих подробностях? Мало ли где у них случилось это в первый раз. В машине? Значит, они специально нанимали водителя? Эмили представила, как в миг наивысшего возбуждения Адо замечает, что водитель неправильно переключает скорость, сбрасывает ничего не подозревающую Хану со скипетра своей страсти, как называл это один прозаик из русских, хватает водителя за плечо и дает советы. Или, наоборот, водитель, более опытный в любовных делах, отвлекается от дороги и дает полезные советы Адо: «Не так! Глубже, чаще, черт тебя побери! Дай мне, уж я–то вам покажу!..» Эмили отнюдь не чувствовала возбуждения и теперь уже кусала губы, чтобы не расхохотаться. Трезвость ума и конкретное мышление, столь уместные у юриста, чудовищно мешали ей как женщине. Или, наоборот, помогали. Во всяком случае, Уидлер добился прямо противоположного эффекта. Хотя, может быть, он именно на это и рассчитывал... И хотел сделать все, чтобы они как можно дольше не переходили к таким отношениям, которые она видела вчера в ресторане и сегодня в машине. Правда, откуда ему знать о ее девственности?</p><p class="p1">Любимый в колледже анекдот припомнился ей: Мэгги всегда рассказывала его в компании, и неизменно он сопровождался диким взрывом хохота. Почему нельзя изнасиловать женщину на Манхэттене? Замучат советами...</p><p class="p1">Уидлер не обращал никакого внимания на усмешки Эмили или приписывал их ее смущению. Сам он искренне наслаждался, и Хана с Адо, похоже, радовались не меньше его. Эмили даже устыдилась своих гнусных мыслей — так они были счастливы вернувшейся близостью и не смущались присутствием зрителей, которым не было никакого дела до их счастья. Хорошая машина. Просторная. Хана только что о потолок не стукалась, вздымаясь и опадая над Адо, как огромная, горячая белая волна. Лицо ее раскраснелось, пот выступил под глазами. Она странно помолодела. Руки мяли волосы Адо, крутили соломенные пряди, она встряхивала головой и всхлипывала от блаженства. Стон полного счастья исторгнулся из груди Адо, и он откинулся на спинку. Хана, по-видимому, кончила еще раньше, и сейчас его оргазм застал ее на пике нового возбуждения. Она несколько раз, быстро, с силой приподнялась и опустилась, вращая бедрами, и наконец обессилено опустилась на его колени, припав к его плечу усталым, раскрасневшимся, неузнаваемым лицом.</p><p class="p1">Уидлер разочарованно отвернулся.</p><p class="p1">Эмили испытывала странное торжество. Во-первых, это все–таки кончилось, Всегда кончается. Во-вторых, игра Уидлера тоже кончилась. Хватит с него, пожалуй. Теперь он, должно быть, испытывает то острое разочарование и раскаяние, о котором говорила Мэгги применительно к мужчинам вообще: «Понимаешь, мы–то только после этого и начинаем их любить, а они наоборот — ничего, кроме разочарования, не чувствуют. Да зачем я это сделал, да теперь она начнет тянуть из меня соки, да она совсем нехороша... Потому что после этого, подруга, — особенно если нам действительно было хорошо, — мы выглядим не больно–то привлекательно. Как женщина умная и трезвая, ты должна отдавать себе в этом отчет».</p><p class="p1">Хана, однако, была ничего себе...</p><p class="p1">Интересно, кончил Уидлер или нет? А водитель? Во всяком случае, автомобиль кончил. Он плавно затормозил. Они прелестно скоротали дорогу. Она занимала куда больше времени, когда Уидлер вез Эмили туда, на мотоцикле. И все же туда она согласилась бы ехать еще и еще, а обратно... Хорошо, что они приехали. Очень хорошо!..</p><p class="p1">Интересно, как она теперь пойдет домой без трусов, в мятой и мокрой юбке... Впрочем, Хану, судя по всему, это нимало не заботило. Она смотрела на Эмили с превосходством счастливого человека. Свободного и счастливого. Закусив нижнюю губу. Звериный оскал страсти.</p><p class="p1">Уидлер распахнул дверцу. Эмили выскочила наружу.</p><p class="p1">Нимало не заботясь о Хане и Адо, — да и машина–то принадлежала, в конце концов, им, и лучше им остаться теперь наедине, — он пошел следом за Эмили, которая в недоумении озиралась. Это был вовсе не ее отель. Сквозь затемненные стекла она не узнала местности. Они стояли теперь у того самого полуразрушенного отеля, который составлял главный предмет ее профессиональных забот. Машина мягко тронулась, исчезла из виду, оставила их вдвоем на пустынном берегу. Где, разумеется, не велось никаких работ. Да и к чему? Рабочие, наверное, сейчас переустраивают пляж в полумиле отсюда. А отель все равно подлежит сносу...</p><p class="p1">— Ты не мог им сказать, чтобы они прекратили?</p><p class="p1">Уидлер мягко улыбнулся. Сейчас он был ее союзником. Прежним. Хотя каким прежним? — она знала его два дня...</p><p class="p1">— Не хотел. Но я и не мог бы. Расскажи мне лучше, что ты видела?</p><p class="p1">— Я видела людей, занимающихся сексом.</p><p class="p1">Получите, господин учитель!</p><p class="p1">Господин учитель был тих и печален.</p><p class="p1">— Ты видела людей, занимающихся любовью. Это большая разница.</p><p class="p1">Когда–то с точно такой же интонацией лектор освободил ее от занятий по истории европейской философии. Значит, она опять чего–то не понимает, в чем–то неполноценна...</p><p class="p1">— А как же твой мотоцикл? — вспомнила она.</p><p class="p1">— Билл отгонит назад.</p><p class="p1">— Какой еще Билл?</p><p class="p1">Он усмехнулся:</p><p class="p1">— Ах да, я же вас не представил... Ты его видела вчера. Тот, повыше и более толстый. Из моих телохранителей. Хранителей моего тела.</p><p class="p1">— Он что, был на пляже?</p><p class="p1">— Разумеется. С утра. Только я ему строго-настрого наказал не вмешиваться в происходящее. Кстати, пистолет заметил я сам. А подсунул его морячку, наверное, он.</p><p class="p1">— Он?!</p><p class="p1">— Ну да. Это мой пистолет, Только не «беретта», а кольт. Я ему сказал — всучи там кому–нибудь, кто будет попьянее, и пусть палит. Когда время настанет.</p><p class="p1">— Врешь!</p><p class="p1">— Ага, — засмеялся он. — Вру. Но Билл там был действительно. Только вмешиваться он и в самом деле не имел права. Если бы он вмешался, началось бы жуткое месиво. Его тут в полиции хорошо знают. Я понимал, кого брать на службу. У меня он зарабатывает больше, чем своими прежними грабежами. Но если еще раз засветится в полиции — все, ему крышка. Попадет в газеты. А я не хочу компрометировать свою команду.</p><p class="p1">Он был так прост и мил, что Эмили не могла не расхохотаться.</p><p class="p1">— А почему я его не заметила?</p><p class="p1">— А я тоже не заметил. Хитрый, скотина. Умеет маскироваться. Дерусь я, правда, получше. Меня учили не так, как его. Его — в местной школе карате, а меня — в Чикаго, на улицах, но это отдельная история.</p><p class="p1">— Зачем же тебе тогда он?</p><p class="p1">— А две головы всегда лучше, чем одна, — беспечно сказал Уидлер.</p><p class="p1">Эмили вспомнила, как в колледже ей один из ухажеров — неудачливых, потных и застенчивых — подсунул журнальчик с голыми фотографиями. Кажется, «Пентхаус». Фотоочерк о любви втроем. Название было — «Три головы лучше, чем одна». Она опять рассмеялась. Таким ухажерам уж точно ничего не светило. А люди посерьезнее и сами понимали, что к чему, и оттого искали себе кого–нибудь поромантичнее и подоступнее.</p><p class="p1">— Женщина с трезвой головой — лучшая женщина, — сказал Уидлер. — Правда, н ей трудно, и с ней трудно. Но тип «вакханка» или тип «бедняжка», или тип «Снегурочка» проигрывает по очкам в первом же раунде.</p><p class="p1">Он подошел к Эмили и поправил на ней очки. Потом направился к отелю. Она последовала за ним.</p><p class="p1">Неужели все произойдет здесь и сейчас? Пожалуй, он может даже кончить в нее — цикл сейчас позволяет это... Тьфу, черт, двадцать два года беречь девственность, чтобы отдать непонятому коммерсанту на второй день знакомства и душу и тело! Да еще в развалинах отеля, где вчера в это же время занимались любовью туземцы, лишенные комплексов цивилизации... О чем она только думает?! И если все мужчины, овладев женщиной, действительно испытывают разочарование...</p><p class="p1">— Не споткнись! Гляди под ноги! А, впрочем, ты тут уже была...</p><p class="p1">Откуда он знает?! Откуда он знал уже вчера, в ресторане?! Неужели у них сейчас будет, как у Ханы с Адо?.. Сладкое возбуждение, учащенное дыхание, озноб. Она не узнавала себя. Странное, счастливое предчувствие новизны и счастья. Все бывают после этого разочарованы и думают: «Зачем я это сделал?». Но ведь он — не все. Он — не как все. И что могла понимать Мэгги, которой и не снился такой Уидлер?..</p><p class="p1">— Осторожнее.</p><p class="p1">Он остановился на площадке второго этажа и смотрел на нее с любопытством. Здесь она уже была. А вот и зеркало. И вода хлещет, как вчера, но шум близкого, разгулявшегося к вечеру моря заглушает ее... Закат, золотистый и нежный, к вечеру багровел, предвещая ветер. Волны разбивались о песок. Их кипение, плеск, шорох внятно доносились из–за тонких, рассыпающихся стен. Карточный домик. Багроватые отсветы проникали сквозь пустые окна. Так здесь — каждый вечер. Люди здесь должны испытывать благоговение и ужас. И любовь.</p><p class="p1">— Мне кажется, это место — твое последнее яркое впечатление. Хочу узнать, почему.</p><p class="p1">Эмили с легким удивлением уставилась на него.</p><p class="p1">— А зачем это тебе?</p><p class="p1">Похоже, он предъявлял на нее какие–то права. Эмили не могла понять, нравится ей это или нет. Впрочем, «нравится» — не то слово. Эмили чувствовала, что их отношения с Джимом уже не вписываются в привычные рамки. Она не знала, как это называть. Джим похоже, знал.</p><p class="p1">— Затем, что я интересуюсь тобой, — ответил он. — Я готов поклясться, — добавил он, помолчав, — что ты пела в каком–нибудь пресвитерианском хоре. Так и вижу тебя выводящей хорал. Любила все эти семейные встречи.</p><p class="p1">Эмили глядела на него широко раскрытыми глазами.</p><p class="p1">— Собирала черную смородину. — безжалостно продолжал он, — красную смородину,., малину там всякую... — он призадумался, вспоминая названия ягод. — землянику, ежевику... Помогала маме. Была единственной радостью для своего старика отца.</p><p class="p1">— У меня такое чувство, — проговорила Эмили, — что если я не дотронусь до тебя, то ты исчезнешь.</p><p class="p1">Они в упор глядели друг на друга, не отводя глаз.</p><p class="p1">— Ну, попробуй, — произнес Джим, — посмотри, что будет.</p><p class="p1">Эмили горящей щекой прикоснулась к его плечу. Странная гримаса исказила лицо Джима. Смущение, презрение, радость, нежность... когда бы их мог кто–нибудь видеть и при этом был склонен к рефлексии, он долго бы пытался разгадать значение этой улыбки.</p><p class="p1">— Прости, — прошептала Эмили. Кончиками пальцев она погладила лацканы его пиджака и — отстранилась.</p><p class="p1">— Дело не в тебе, — проворковал Джим.</p><p class="p1">Он наклонился к Эмили, почти касаясь своим носом ее щеки. От него слегка пахло одеколоном и табаком.</p><p class="p1">— Дело во мне, — продолжал Джим. — Я не настолько хорош, чтобы ко мне так робко притрагиваться. Меня уж лапать надо, — он горько усмехнулся, — или отталкивать.</p><p class="p1">Он явно клевещет на себя, подумала она. Или хочет меня предостеречь — но от чего? Конечно, после него уже никто другой не нужен. Это ясно. Он слишком многое знает о людях, а кто отравлен этим знанием, кто хоть раз в жизни соприкоснулся с ним, — тому уже ничего на свете не надо. Но, может быть, сближение таит в себе непонятные ей пока опасности? И он только насмехается над новой жертвой? Все равно. Ее тянуло, влекло к нему неудержимо. Сейчас она ни о чем не помнила.</p><p class="p1">Уидлер вынул из кармана серебряную цепочку с кулоном — красным рубином, небольшим, но ярким, как закат, оправленным в серебро.</p><p class="p1">— Они подарили мне это. Адо и Хана.</p><p class="p1">— Когда они успели? Я ничего не заметила!</p><p class="p1">— Это дар за то, что я их помирил. Вернул друг другу. Я хочу тебе это отдать. Я хочу, чтобы именно ты это себе взяла.</p><p class="p1">— Я их друг другу не возвращала.</p><p class="p1">— Откуда нам знать? Может быть, если бы не ты, и я бы не затеял всей этой истории.</p><p class="p1">— Неужели я тебя сподвигла? — она заглянула прямо ему в глаза, потом опять припала щекой к его груди.</p><p class="p1">Он вздохнул:</p><p class="p1">— Я же говорю тебе: никто не знает. Никто. Они думают, что их помирил я. А мне кажется, что я этим обязан тебе. Так что возьми.</p><p class="p1">— Но это... очень дорогая вещь!</p><p class="p1">— То, что мы для них сделали, — именно мы, — стоит дороже, мне кажется!</p><p class="p1">Он взял Эмили за плечи и слегка отстранил, словно любуясь ею. Затем осторожно надел цепочку ей на шею, застегнул сзади. Она чувствовала жар его рук, словно наэлектризованных, насыщенных страстью. Неужели все кончится тем, что он наденет на нее цепочку?</p><p class="p1">— Не снимай это даже на ночь, — попросил он. — Носи всегда. Ведь не слишком же эта просьба обременительна, верно? Тебе так идет... Ради меня.</p><p class="p1">Он говорил уже не властно, а просительно, почти заискивающе. Нет, на игру это уже не похоже.</p><p class="p1">Он откинулся к полуразрушенной стене, потрогал ее пальцами. Эмили читала в его взгляде то ли просьбу, то ли изумление. Что ей было делать — начать раздеваться самой? Нет, ни в коем случае. Сейчас это было не нужно. Она–то боялась, что он попытается что–то с нее снять, а он еще и надел. Цепочку. Она–то представляла, как он начнет ее раздевать, и еще краем сознания воображала, как это будет забавно, если он захочет снять ее серьги и долго будет путаться в волосах. Похоже, умение видеть комизм в любой, даже отдалено предполагаемой ситуации свойственно им обоим. Не так он прост. И сближение их — а скорей, ее испытание — прошло пока только первую фазу.</p><p class="p1">...Когда они вышли, у отеля их ожидал но тьме быстро наступающей южной ночи белый автомобиль.</p><p class="p1">— Это за тобой.</p><p class="p1">— Откуда?!</p><p class="p1">— Билл позаботился.</p><p class="p1">— Отбуксировал мотоцикл и приехал сюда?</p><p class="p1">— Вроде того.</p><p class="p1">— Значит...</p><p class="p1">— Значит, хочешь ты сказать, это все не импровизация? Нет, не импровизация. Экспромты редко проходят удачно. Но на самом деле были варианты. Просто несколько точек, где нас можно было застать. Сработала именно эта. Он, наверное, давно уже ждет. Я, впрочем, предупредил его, что, вероятнее всего, мы будем здесь. (Ее радовало это «мы», это сообщничество). Что–то такое есть в этом месте, ты не находишь?</p><p class="p1">— Н-нахожу...</p><p class="p1">— Ну вот и отлично. Садись в машину.</p><p class="p1">— А ты?</p><p class="p1">— А я еще тут побуду. Люблю вечерний океан.</p><p class="p1">Эмили с тревогой посмотрела на бушующие волны, разгулявшиеся не на шутку. Потом на Уидлера — прямо в глаза, тревожно:</p><p class="p1">— Как же ты доберешься?</p><p class="p1">— Пусть тебя это не заботит. Спасибо за прогулку. И приятных снов.</p><p class="p1">Он даже не попытался напроситься провожать ее. Впрочем, напрашиваться — не в его духе. Он ведь может легко войти, куда угодно и когда захочет, и ее номер — не исключение. Он распахнул перед ней дверцу машины. Она села на заднее сиденье, не заметив страстного, осуждающего и восхищенного, взгляда из бывшего подъезда бывшего отеля. Вчерашний мальчишка смотрел вслед машине, пока она не исчезла.</p><p class="p1">Ни о чем не думая, счастливая и отчего–то печальная, Эмили откинулась на спинку сиденья. Легкая, грустная музыка наигрывала в салоне. Водитель был худощав, молчалив. Мир был музыкален, сумрачен, печален. Вереница огней усыпляла ее. Она рассеянно глядела в окно, расслабленная, слишком озадаченная и печальная, чтобы быть счастливой, но удивление и печаль всегда сопутствуют радости. Ее душа, чувствовала она, пробуждается к чему–то непостижимому, новому, — совсем не дикому и не пугающему, как думала она прежде, а ласковому и грустному.</p><p class="p1">Уидлер провожал ее машину взглядом, пока она не скрылась из виду. Потом посмотрел на ночной, светящийся океан, на кружева пены у своих ног... Полоса прибоя подвигалась все ближе и ближе к полуразрушившемуся отелю. Шторма сегодня не миновать. Не сильного, конечно, а так... умеренного. Чтобы наутро купальщики могли обсуждать его и гадать, каким ветром нагнало тучи и надолго ли волнение. Недаром накануне вода была теплая. Много водорослей и медуз. Интересно, вынесет на берег что–нибудь интересное или нет? Океан всегда был для Уидлера чем–то непостижимым, живым и мыслящим существом, у которого — свои тайные замыслы. С ним Уидлер вел нескончаемый диалог, и, как знать, — может быть, океан и подсказывал ему какие–то ответы?</p><p class="p1">Через минуту созерцания Уидлер оглянулся на отель и коротко свистнул. По-мальчишески, резко и пронзительно.</p><p class="p1">Из подъезда выкатился мальчик лет двенадцати. Тот самый. Уидлер поманил его пальцем. Они присели на камнях, и Уидлер достал из кармана небольшую повязку. Он повязал ее вокруг головы и с серьгой в ухе сразу стал похож на пирата.</p><p class="p1">Мальчишка вынул из кармана маленькую бутылку вина. Уидлер извлек из кармана брюк карманный, походный набор из пяти стаканчиков. Достал два, один протянул мальчишке, другой поставил на песок рядом с собой.</p><p class="p1">Они сидели друг против друга — серьезные мужчины.</p><p class="p1">Уидлер поднял глаза и посмотрел на звезды, прятавшиеся в просветах туч.</p><p class="p1">Мальчик умело откупорил бутылку и, бережно держа ее, стараясь не расплескать ни капли, наполнил стаканчики.</p><p class="p1">— Слушай, — заметил Уидлер. — Ты меня, конечно, не поймешь, хотя черт вас тут знает. Вы, маленькие дьяволы, здорово научились болтать по-английски.</p><p class="p1">Мальчик смотрел на него серьезными, большими глазами, в которых была и мечтательность, и озорство, и хитрость, и глубокая, серьезная печаль. Он не пил, ожидая, пока Уидлер поднимет стакан. Налетел порыв ветра. Уидлер покачал головой.</p><p class="p1">— Мрачно. И красиво. Слушай, зачем ты за ней следишь?</p><p class="p1">В ответ мальчик улыбнулся. Поднял стакан. Они выпили.</p><p class="p1">— Я вообще–то за тобой тоже поглядываю. Вчера, когда она убегала, ты поднял полумаску и спрятал в карман. Где–то, должно быть, и сейчас хранишь. Верно?</p></span></span>
