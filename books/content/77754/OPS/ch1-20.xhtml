<span><span><p class="p1">Мальчик указал глазами на отель.</p><p class="p1">— Ты тут живешь? Бродяжничаешь?</p><p class="p1">Мальчик покачал головой.</p><p class="p1">— Ну да ладно, это неважно. Поднял полумаску, потому что она к ней прикасалась, да?</p><p class="p1">Ответа не было. Мальчик разлил снова.</p><p class="p1">— И что ты за ней следишь? Тебе что, делать нечего? Времени навалом? То ли дело я, человек занятой, деловой...</p><p class="p1">Мальчик улыбнулся.</p><p class="p1">— Ты держись от нее подальше, старина. — Уидлер выпил. — Она запросто может сердце тебе разбить. С ума сведет — недорого возьмет. Ну, будь здоров!</p><p class="p1">Они долго еще молча сидели под звездами в рваных тучах и смотрели в ночной океан, серебристый, стихающий. Они молчали, и все трое — мальчик, Уидлер и океан — хорошо понимали друг друга.</p></span></span>
