<span><span id="id18"><div class="title3">
<p class="p"><strong>VI</strong></p>
</div><p class="p1">Эмили сидела перед зеркалом.</p><p class="p1">Она только что вышла из ванной, где лежала полчаса перед тем, как одеться и выйти к Уидлеру. Он собирался встретить ее в небольшом ресторанчике, где тоже были приняты полумаски. Правда, Уидлер клятвенно заверил, что ничего, даже отдаленно напоминающего их первый вечер, там не произойдет.</p><p class="p1">— Скромный ресторанчик при гостинице. Гостиница, конечно, захудаленькая, но славная европейская кухня.</p><p class="p1">Она не противилась.</p><p class="p1">И сейчас, после прохладной ванны (о горячей даже вечером страшно было подумать — жара не спадала, да еще этот влажный воздух, облеплявший тело, как мокрая ткань), — после ванны Эмили сидела на мягком, бархатистом стуле, всей кожей ощущая горячий застывший воздух номера. Во всем было ожидание и трепет.</p><p class="p1">Ей пора было одеваться, но она томилась и медлила, разглядывая себя в настольном зеркале. Совершенно голая, с еще влажной кожей, смуглая, свежая и крепкая. Одеваться ей не хотелось. Томление переполняло ее тело. Ничего подобного с ней не бывало прежде.</p><p class="p1">Да, она ничем не уступает той девушке в разрушенном отеле. И груди у той были хуже. У Эмили они меньше, но крепче, прекрасной удлиненной формы, с маленьким острым соском. Они упруги и не нуждаются в лифчиках. Она худа, но не болезненно-аристократической худобой Ханы. И у нее не такая фарфоровая, с голубизной, кожа. У нее прекрасный, смугло-розовый, цвет лица. И глаза, горящие ожиданием и страстным нетерпением. Она только пробуждается к чему–то новому, тогда как у всех вокруг в глазах таятся пресыщение в скука.</p><p class="p1">Эмили встала. На всякий случай она задернула занавески, хотя подглядывать за ней на одиннадцатом этаже было некому. Впрочем, увидев за окном Уидлера, она бы не удивилась. Слишком многое ему удавалось с волшебной легкостью. Каждому нужен свой Карлсон. В детстве у нее Карлсона не было, а теперь появился Уидлер. Необычайно приятно чувствовать себя Малышом. Она усмехнулась, вообразив Уидлера с пропеллером и кнопкой на животе. Кстати, она еще ни разу не видела его голым. Он при ней даже не искупался. Интересно, есть у него кнопка? Или главная кнопка, приводящая его в действие, находится все–таки ниже? Нет, он не похож на самца. Вчера, в разрушенном отеле, он мог сделать с ней все, что угодно. Но правильно почувствовал, что вчера из этого не вышло бы ничего хорошего. Все бы кончилось очень грустно, не успев подержать в сладком напряжении.</p><p class="p1">Взгляд ее упал на орхидеи. Они ничуть не потеряли в своей свежести и прелести со вчерашнего дня.</p><p class="p1">Эмили забыла думать о работе и, дисциплинированная от рождения, выполняла обязанности юриста чисто машинально. Конечно, пренебречь ими она не могла: ей нужно было постоянно чем–то занимать свое время, самодисциплина вошла в привычку, и ничегонеделанье, дольче фар ньенте, могло бы тешить ее не дольше двух-трех дней. Но сейчас, работая и выполняя мелкие поручения задержавшейся Кло, она совершенно не думала об успехе сделки. Это меньше всего ее заботило сегодня. Да и насчет Уидлера у нее не было никаких корыстных планов, хотя своим богатством он иногда по-детски бравировал. Должно быть, много бедствовал. Иначе где его всему этому научили и откуда у него это постоянное желание щеголять своими деньгами? Эмили, однако, совсем не интересовалась его доходами. Его, кажется, это даже задевало. Но у нее решительно отсутствовала корысть. Чистое любопытство, не более.</p><p class="p1">Она встала перед большим зеркалом, вделанным в дверцу шкафа с внутренней стороны. Бесстыдно разглядывая себя, она не могла скрыть удовлетворенной, гордой улыбки. Она никогда не занималась специально поддержанием формы. И была слишком молода, чтобы эту форму надо было поддерживать.</p><p class="p1">Она взяла со столика подаренный Уидлером рубин на серебряной цепочке и надела на шею. Длинная, горделивая шея, мягкий овал лица, упрямый, почти детский подбородок с ямочкой. Рубин оказался как раз между грудей и засиял темно-красным, теплым светом. Эмили коснулась сосков, и они выпрямились, потемнели, и испарина выступила на груди и плечах.</p><p class="p1">Она знала, что многие глупышки в колледже гордились плоскими животами. Нет, линия живота должна быть божественно округла, как у древней статуи, — Эмили погладила низ живота, где жестко курчавилось руно. Живот действительно должен быть как чаша. Чаша пшеницы среди лилий... так, кажется, в Библии? Песнь Песней Эмили помнила лучше, чем остальные главы Ветхого Завета, — но никак не из–за любви к такого рода поэзии, а просто из–за того, что гимн любви был крайне неожидан в Библии. Остальные Книги Ветхого Завета не внушали ей особого интереса. Но критерии красоты у древних интересовали ее всерьез. И были ей куда ближе нынешних.</p><p class="p1">Она подняла руки, проверяя, как побриты подмышки. Заодно полюбовалась своими руками — тонкими и сильными. Она не признавала цветного лака, и ногти у нее были вполне умеренной длины, естественного цвета, розовые, миндалевидные. Она никогда не ломала их за дисплеем или пишущей машинкой.</p><p class="p1">Может быть, сегодня надеть чулки? Черные, новые. Странно, почему они считаются столь притягательными. Кажется, ее нога — стройная, с маленькой ступней, нога идеальной формы — сама по себе способна привлечь внимание любого. Эмили теперь не сомневалась в этом. Она все же примерила чулки, наслаждаясь шелковистыми прикосновениями к влажной коже. Но постояв перед зеркалом в одних чулках, решила обойтись без них. Так было гораздо лучше.</p><p class="p1">Впервые с неохотой она надела черное платье Кло. Оно ей нравилось, но без него, кажется, тоже было лучше. Впрочем... как знать! Если бы этот день стал последним днем ее девственности, она, пожалуй, не слишком огорчилась бы...</p><p class="p1">Она была права, и это лишний раз подтверждало ее дар предсказывать будущее. Впрочем, все произошло совсем не так, как она себе рисовала.</p><p class="p1">Уидлера не было.</p><p class="p1">То есть где–то он, разумеется, был. Она ощущала его присутствие. Ошибиться было нельзя: он приедет, конечно, если еще не приехал, если еще не устроился где–нибудь в потайном отдельном кабинете, исподтишка наблюдая за нею. Но видно его пока не было. А полумаска мешала оглядываться. Кабачок назывался «Карнавал», и маска полагалась исключительно названия ради. Был он невелик, и отель рядом, полупустой и старый, тоже был невелик, да и то заселен едва ли наполовину. Впрочем, как говорил Уидлер, тут было хорошо любителям экзотики. Европейцы и американцы часто тут селились, особенно любители романтических приключений. Может быть, романтические приключения и стоили того, но Эмили предпочитала современность и комфорт.</p><p class="p1">В черном платье, черной полумаске, с черным бантом в черных волосах, а в остальном вся розовая и чрезвычайно собой довольная, Эмили царственно прошла к стойке. Уселась на высокий табурет. Если здесь часто останавливаются европейцы и американцы, можно обратиться к бармену и по-английски. Но лучше завоевать его расположение.</p><p class="p1">— У вас есть амаретто? Кофейный амаретто?</p><p class="p1">— Разумеется, синьора. Но я бы рекомендовал вам наше отличнейшее белое вино. Такого белого вина, уверяю вас, вы не выпьете нигде — только в «Карнавале».</p><p class="p1">— Ну что ж. Тогда отличнейшего белого вина.</p><p class="p1">Ей нравилось, что она красива, и что немногочисленные посетители смотрят на нее с восхищением, но без той наглой плотоядности, которая всегда так отвратительна. И то, что своим безукоризненным испанским она расположила к себе немолодого худощавого бармена, ей тоже нравилось. Она задумалась о том, что у бармена есть своя жизнь. Извечная детская сентиментальность и привычка додумывать чужие истории подсказала ей, что у бармена — семья, и семья эта держится только им, один ребенок болен, другой беспутен, и не такой уж он ребенок, ему восемнадцать, и это не он, а она, почти ровесница Эмили, и тоже недурна собой, как все дети, рожденные от любви. Но за ум браться не хочет. Носится на мотоциклах неизвестно где, неизвестно с кем. Бедный бармен. Ему отвратительно видеть рожи американцев и европейцев, которые обращаются к нему не на гортанно-певучем, свищущем испанском наречии, а на своих лающих, отрывистых языках. И любой из них, может быть, вечером проводит к себе в номер такую же, как его дочь. А может быть, и ее саму, его девочку, которая никогда в детстве не обещала вырасти в такое странное, злое и неуправляемое, жалкое и несчастное существо. А она, должно быть, хороша. Как все местные женщины, на которых Эмили чуть похожа. Но в ее глазах — больше веры в себя, и спокойствия, и уверенности. Она примерная девочка из хорошей семьи, и о ней никто не подумает ничего плохого. Все–таки Карнеги прав и мы сами — хозяева своей судьбы. Наше будущее в значительной степени предопределено нами.</p><p class="p1">Она, конечно, не знала, в какой малой степени ее картина мира соответствовала реальности. Бармен был очень благополучен и гораздо больше любил америкашек, чем местных. Да и сам был наполовину американцем — плодом краткого, но бурного романа певицы и коммивояжера в начале сороковых. Бармен преуспевал. Чаевые от иностранцев были гораздо щедрее, чем от местной публики, всегда грязной и крикливой. И потной.</p><p class="p1">Что до семьи самого бармена, то там у него стоял если не полный, то хотя бы приблизительный порядок, или, как говорили эти американцы, душевный комфорт. А что является целью жизни, если не душевный комфорт, а конце–то концов? Ребенок у бармена был один. Мужеска пола. Мальчик подавал большие надежды. Ему было шестнадцать, на жизнь он зарабатывал с двенадцати, и с первого заработка он купил матери черепаховый гребень, а отцу — цепочку для часов. Прекрасный мальчик. Он мечтал о карьере бизнесмена и непременно сделает ее, если уже сегодня бойко торгует путеводителями в аэропорту Рио.</p><p class="p1">А насчет того, какими взглядами провожать Эмили и может ли она возбудить подозрения, а также насчет того, в какой степени мы хозяева своей судьбы, — жизнь сама очень скоро ответила ей на этот вопрос, и очень скоро.</p><p class="p1">Рядом с ней на высокий вертящийся табурет подсел высокий вертлявый молодой человек в полумаске. Глаз его не было видно. Так, поблескивало что–то в прорезях. От него исходили не слишком приятные токи, и Эмили инстинктивно подвинулась в сторону. Ерзать не нужно. Эмили сразу угадала в нем соотечественника: развязный, быстрый и слишком много хотящий от жизни. Странно: она сама иногда хотела быть такой, но добивалась всего честнее и серьезнее. Может быть, поэтому она никогда не симпатизировала подобным типам? А сейчас он был ей просто отвратителен. Квадратный подбородок. Замечательная мускулатура. Частые тренировки. Такой человек действительно решает все свои проблемы у дантиста, а психоаналитик ему и близко не нужен. Странно, право: теперь, после четырех дней на новой работе и на новом месте, этот тип людей был ей крайне неприятен. Гораздо больше, чем раньше.</p><p class="p1">— А мне мартини, — сказал он бармену вяло и небрежно, и тот подобрался, почувствовав хозяина жизни. — Чистый, неразбавленный, с двумя оливками.</p><p class="p1">Знает толк, подумала Эмили. От двух оливок сейчас бы и я не отказалась. Правда, мартини хорош и сам по себе, без всяких оливок. И уж точно — без подобных типов.</p><p class="p1">Тип повернулся к Эмили. Он смотрел на нее с вызовом. Гладкая рожа. Красивое откормленное животное. С двенадцати лет моет посуду по ближайшим кафе и уже в пятнадцать купил свой первый автомобиль.</p><p class="p1">Она, правда, опять ошиблась. Первый спортивный автомобиль, красный, блестящий и невероятно скоростной, Уолтеру Гэлбрейту подарил его очень богатый отец, когда тому исполнилось восемь. А когда ему исполнилось пятнадцать, спортивных автомобилей у него было уже три. И мыть посуду ему нигде не нужно было. Он знай себе учился на юриста. Он не подавал никаких особых надежд и не брал, в отличие от Эмили, ни работоспособностью, ни терпением, ни талантами в области языков. Он работал в Рио второй раз в жизни, но после первой трехмесячной командировки сюда такими темпами постигал местную экзотику, что не имел и часа свободного для занятий языком. Тем более что скромное «грасиас», которое поутру произносили скромные черноглазые девушки, уходя от него со скромным гонораром, он научился понимать очень скоро. Как ясно из предыдущей фразы, Гэлбрейт любил все скромное. Разнузданные девицы надоели ему почти сразу, несмотря на все свое искусство и опыт. Неприступность скромниц оказалась легко ликвидируемой ширмой, за которой, правда, было не распутство, а горячая и страстная душа. Гэлбрейту нравилось их бросать. Ему нравились их слезы. Ему доставляла удовольствие собственная значимость: его, выходит, любили не только за его деньги! Ему, как всем самовлюбленным и балованным юнцам, было невдомек, что скромница — только профессионалка более высокого класса, умеющая в миг расставания честно отработать гонорар и пролить непрошеную слезу, испокон веку входящую в незримый прейскурант. Над такими, как Гэлбрейт, здесь посмеивались. Он был здоровый двадцатипятилетний самец, замечательная любовная машина, выхоленная богатством и хорошим питанием. Он любил растягивать удовольствие и гордился своим рекордом в час и сорок пять минут. С ним было неплохо, и он так по-детски радовался, не умея этого скрыть, когда девушка плакала на рассвете, что с ним, ей-богу, было гораздо забавнее дружить, чем со стариками из отелей поприличнее. Он жил в «Карнавале» и минимум четыре раза в неделю приводил в свой номер новенькую. Иногда ему случайно попадалась честная девушка, у которой до него было всего шесть, ну, максимум восемь американцев. И тогда, в случае крайней неприступности, в ход шли деньги. Не гонорар, а аванс. Он оставлял ключ от номера и клал под него сто долларов. Если девушка нравилась очень — двести. Зато потом не платил. Или, если оставался доволен, платил меньше. Гэлбрейт был богат, но уж собственным–то гонорарам он счет знал. Отец его, владелец сигарной фабрики на этом побережье и еще кой-каких фабрик в Штатах, косвенно связанный с кубинской наркомафией, не делал тайны для сына из своих доходов, и Гэлбрейт с ранних лет усвоил: большие деньги — большие хлопоты. Каждому — своя цена. Каждой — тем более. Тем более что еще неизвестно, кто кому должен. Здесь, в Бразилии, девчонки куда темпераментнее американок. Они кончают под тобой раз пять, почти непрерывно, из них просто выскальзываешь, они заводят глаза, стонут, рычат, извиваются — или, наоборот, лежат с закрытыми глазами, с голубоватыми тенями под веками, покорные и тихие, и лишь потом постанывают сквозь зубы, стыдясь своего блаженства. Гэлбрейту было невдомек, что местные профессионалки просто лучше замаскированы и изображают оргазм с большим перевоплощением, чем на его исторической родине. Здесь оргазму традиционно придается большое значение: у всех народов, близких к природе и не постигших еще всех хитростей цивилизации, у всех полутуземных, полуцивилизованных племен считается священной благодарность. Женщина, изображающая удовольствие, должна считаться более порядочной и нравственной, чем такая, которая пассивно, как одолжение, принимает ласку. Долг женщины — отблагодарить за то, что выбрана она. За то, что ее оценили, избрали, да еще и заплатили ей. С Гэлбрейтом, конечно, и правда было хорошо, хотя утонченности, пряных изысков, умения чувствовать женщину в нем не было ни на грош. Это был хорошо отлаженный автомат, почти сразу засыпающий после любви. Иногда, впрочем, если ему бывало уж очень хорошо, он пытался фантазировать, но почему–то у него лучше всего получался простой вариант, который в Латинской Америке зовут крестьянским. Среди проституток, обслуживающих квартал, где находился «Карнавал», — а проституток в этом квартале хватало, — Гэлбрейта ласково называли «наш златорогий бычок». Этот златой телец никогда еще не бывал влюблен по-настоящему, ибо считал, что каждой женщине есть назначенная, заранее установленная цена, которую она сама почти всегда знает. Цены себе, разумеется, он не знал. Кончая, он мычал и сотрясался. Девушки под ним сдерживали смех или делали вид, что смеются от блаженства.</p><p class="p1">Эмили, разумеется, всего этого знать не могла. Не могла она знать и того, что Гэлбрейт панически боялся дантистов, но, слава Богу, природа дала ему превосходные зубы. И полные губы, и квадратный подбородок, и безволосую, но мускулистую грудь, и отличную кожу, загоравшую мгновенно, без обязательного для блондинов этапа обгорания и покраснения.</p><p class="p1">Впрочем, откуда Эмили было это знать? Из всей этой информации ее могло заинтересовать одно: Гэлбрейт был весьма посредственным юристом и мог взять только обаянием здоровья. Чем и брал. Он и сам–то о себе не слишком много знал. К чему осложнять жизнь, которая ни разу нс ставила перед ним вопросов о своем смысле?</p><p class="p1">— Слушай, того... — сказал он Эмили на плохом испанском, приняв за местную по ее выговору и общению с барменом, да и по цвету кожи, вероятно. — Латиноамериканский этот ваш... — выговорил он по-английски. По-американски, говоря его словами. — Того... пить хорош? Я иметь вид — о-кей пить? Хорош вин? Ты тоже хорош...</p><p class="p1">Он чертыхнулся.</p><p class="p1">— Вот язык–то! Я американец. Джером. Американос.</p><p class="p1">— Си, — сказала Эмили, не глядя на него и опустив голову. «То, что надо», — подумал Уолтер Гэлбрейт, который никогда не называл себя Уолтером Гэлбрейтом, когда общался с девушками. Единственный писатель, который ему нравился, был Джером К. Джером. Иногда, правда, он назывался Уолтом Уитменом, а один раз — даже Сэмом Клеменсом.</p><p class="p1">— Понимай! — сказал он по-испански. — Ты понимай!</p><p class="p1">Эмили пригубила вино и стала думать об Уидлере. Который запаздывал. Впрочем, вполне в его духе будет дождаться очередной драки и всех тут раскидать. Но она уже знает об его боксерских способностях, — хватит, честное слово, зачем же опять доводить ситуацию до кипения?!</p><p class="p1">— Знаю по-испански пять слов — доверительно сказал Уолтер Гэлбрейт, которого сегодня звали Джером. — «Си», «каррамба», «американос», «мьерда», «мухер», «мухерьего». — Этот набор должен был произвести на нее впечатление, и она нс удержалась, улыбнулась уголком рта, ибо мужчина, произносящий подряд: «Да, американец, черт побери, дерьмо, женщина, бабник», — не может не вызвать умиления и радости.</p><p class="p1">— Чертовски глупо чувствую себя в этой полумаске, — сказал он по-английски. Все–таки хорошо она знает язык и держится. Ее, значит, проще принять за местную. Из нее вышла бы неплохая разведчица. Так и будем себя вести. Как резидент. Очень успокаивает. Чего только ему от меня надо, в конце концов? Неужели меня можно принять за... за...</p><p class="p1">— Чертовски жаль, что вы меня не понимаете, — сказал Гэлбрейт. — Потому что я хотел сделать вам комплимент. — Голос его привычно сделался ниже, страстнее, как ему казалось. Он зашевелил ноздрями и заговорил с придыханием. — Как только я увидел вас... Я вас захотел больше, чем когда–либо чего–либо в жизни. Клянусь вам. Честное слово. — Он, видимо, все еще надеялся, что она немного понимает английский. Но интонация и так была достаточно красноречива. — Но вам–то насрать на это, да? — Переход был столь внезапен, что Эмили чуть не прыснула, но именно это спасло ее от смущения, и она умудрилась также не покраснеть. — Вам с высокой горы насрать. Насрать! — крикнул он и пристукнул по стойке. — Вам только деньги мои нужны, да? Всем вам нужны мои деньги. И только! А жаль.</p><p class="p1">Видимо, его всерьез припекло, потому что на остальных он не обижался, когда они изображали неприступность. А тут ему захотелось большой и чистой любви. Каждому когда–нибудь хочется любви большой и чистой, как слон под душем.</p><p class="p1">— Вообще, — сказал Уолтер Гэлбрейт, который сегодня был Джером, — с такой внешностью, как у вас, можно было бы сейчас круто перевернуть всю свою жизнь. Я бы вас взял к себе домой. Туда, где я живу, — он пальцами изобразил самолет. — Вы, верно, там никогда не бывали. Прекрасная, могущественная Америка. Макдоналдс, биг мак, испанские ресторанчики, так что будете как дома. — В понятиях Уолтера Гэлбрейта патриотизм мог быть по преимуществу гастрономическим. — Кучи зеленых валяются под ногами, и я по мере надобности и сил их буду поднимать и класть к вашим ногам. Нужды не будете знать ни в чем. Совью вам за хорошие деньги прелестное гнездышко. — Он искренне верил всему, о чем говорил. — Прекрасный дом, привратник, потолок роскоши. Все, что можно. Ванная комната с розовым кафелем и все такое. Вы сами, конечно, не из бедных, судя по манерам и упаковке, но там... Вы себе не представляете, что там было бы. Деньги тебе нужны? — ладно, были бы тебе деньги. Сама понимаешь, сначала я должен попробовать как оно с тобой будет, и не будешь ли ты ломаться, как целка, или вяло лежать как бревно, и не храпишь ли ты, и чистые ли у тебя ноги, и не слишком ли они волосатые ближе к... — Он осекся. Но был вполне убежден, что она его не понимает. Страстным, хорошо отрепетированным голосом, изображая любовный монолог и наслаждаясь этой идиотской игрой, он говорил: — А то бывает вонючая девка, корчит из себя целку, — он страстно посмотрел на нее, — а на самом деле шлюха, портовая шлюха! Ты, правда, не из таких. Хотел бы я посмотреть на твою киску. Поцеловать ее. Понюхать. Проникнуть сначала пальцем. Или даже двумя. Потом этим пальцем коснуться твоих губ. Дать его пососать. — Эмили молчала, глядя в стену, но краска уже заливала ее щеки. — Ты спала бы до полудня в этом домике, — вернулся он к теме гнездышка, — чувствовала бы себя королевой.</p><p class="p1">Интересно, понимает ли его бармен? Или он только и знает, что свои мартини?</p><p class="p1">Бармен его, конечно, понимал. Но ничем не обнаруживал своего понимания, потому что он был уже немолодой и умный мужчина, всего навидавшийся на своем веку, на вечном карнавале.</p><p class="p1">— Ты ела бы в роскошных ресторанах. Слушай, я вполне серьезно. Только сделай для меня один пустяк. Ну что тебе, трудно? Что, лучше с каким–нибудь из местных вроде него? — он кивнул на бармена, тот обернулся — с готовностью услужить. — Ничего, ничего, — на плохом испанском сказал ему Гэлбрейт. — Так вот. Крошечный пустяк. Тебе же нетрудно. Ты же не пожалеешь. А? Ну, положи мне руку вот сюда. На колено. Я тебе за одно это отвалю — вот, видишь? — Он достал стодолларовую бумажку. Ничего. У него сейчас как раз намечалось недурное дельце, так что можно было и купить на ночь такое тельце. — Ну, положи мне руку на колено!</p><p class="p1">Он подвинулся к ней, выставил колено, коснулся ее ноги. Она дернулась, как от тока, покраснела еще гуще и посмотрела на него в упор.</p><p class="p1">— Можешь не снимать полумаску, — сказал он, откровенно любуясь ею, но не так, как Уидлер. Для Уидлера она была чем–то вроде произведения искусства.</p><p class="p1">И он любовался ею иначе. А этот смотрел уже как на собственность, которая кобенится.</p><p class="p1">— Ну! Уно, дос, трес! Раз, два три! Еще раз: считаю до трех, и ты кладешь мне руку на колено! Уно, дос, трес! Сделай это! Это твое! Уно, дос, трес!</p><p class="p1">Он взял ее руку и положил к себе на колено.</p><p class="p1">Эмили вскочила, выдернула руку и, не найдя в себе сил дать мерзавцу по морде, все еще чувствуя себя в его горячих тисках, направилась к выходу.</p><p class="p1">Навстречу ей вошел Уидлер, — поразительно вовремя, надо сказать. Вслед смотрел Гэлбрейт, временно — Джером.</p><p class="p1">— Этот сукин сын, — прошептала Эмили прерывисто и хрипло, — этот сукин сын хотел меня купить. Он мне предлагал... Он мне предлагал...</p><p class="p1">— Ну и что же? Это очень естественно.</p><p class="p1">Эмили отпрянула. К этому она готова не была. Она была готова к тому, что Уидлер окажется ее союзником и набьет морду нахалу, который пытается занять его место и говорит его девушке всякую дрянь. Его девушке? Да, его, несомненно, она знает себя.</p><p class="p1">— Ты серьезно?</p><p class="p1">— А ты посмотри. Он–то уж точно серьезнее, чем ты думаешь.</p><p class="p1">Уидлер кивнул на стойку бара. Эмили с негодованием обернулась. Гэлбрейт-Джером клал на стойку триста долларов и сверху — ключ от своего номера.</p><p class="p1">Эмили повернулась к Уидлеру.</p><p class="p1">— Он мне прямо предлагает идти в его номер.</p><p class="p1">— Так иди.</p><p class="p1">Слава Богу, он, кажется, ревнует. Или шутит.</p><p class="p1">— Я что, действительно так выгляжу?</p><p class="p1">— Как именно?</p><p class="p1">Гэлбрейт резко вышел мимо них, нарочно чуть не толкнув Уидлера, но тот посмотрел на него с таким ласковым любопытством, что Гэлбрейт отвел взгляд и еще стремительнее выбежал из ресторанчика.</p><p class="p1">— Как ты выглядишь? Желанной? Такой, что тебя хотят?</p><p class="p1">— Да.</p><p class="p1">— Безусловно, именно такой ты и выглядишь. Смею тебя уверить. И не вижу в этом ничего плохого. Наоборот. Радоваться надо. Тебя это удивляет? Неужели это так плохо — хотеть кого–нибудь?! Настолько хотеть, что люди даже готовы за это платить. За то, что, по идее должно им доставаться даром, как всякое истинное счастье, всякая радость...</p><p class="p1">— Что ты хочешь этим сказать?!</p><p class="p1">— То, что таким образом это даже более возбуждающе. И для тебя.</p><p class="p1">— Для кого?!</p><p class="p1">— Для тебя. И для меня. Что, ты хочешь сказать, что не согласна? Тогда тебя бы здесь не было. Но ты ведь сама захотела сыграть в эту игру!</p><p class="p1">— Я?!</p><p class="p1">— Ну конечно.</p><p class="p1">Она начала догадываться.</p><p class="p1">— Ты сам... ты сам даже не дотрагиваешься до меня, говоря, что дело во мне, не во мне, в тебе... Путаешь, темнишь... Ты... хочешь взять меня чужими руками?!</p><p class="p1">Лицо его было жестко. И непроницаемо.</p><p class="p1">— Ну да... но это не совсем точно сказано. Хотя — да, и руками тоже.</p><p class="p1">— Ты сам уже ничего не чувствуешь... и хочешь почувствовать через меня?! Когда я буду принадлежать другому? В этом дело?</p><p class="p1">Он закурил.</p><p class="p1">— У меня нет слов, — медленно сказала она. — Нет слов сказать тебе, что я сейчас чувствую. Невыносимо.</p><p class="p1">— А ты скажи. Нет, правда. Мне интересно.</p><p class="empty-line"/><p class="p1">Эмили поднялась на этаж. Ключ от чужого номера болтался у нее на пальце. Глаза ее были широко раскрыты. По ковровой дорожке она шла быстрой, решительной походкой. «А ты скажи, — бормотала она, — мне интересно... ему интересно... сволочь паршивая... где же комната этого недоноска... ему интересно... сейчас тебе будет еще интереснее...»</p><p class="p1">Дверь! Уверенным движением она всадила ключ в замочную скважину. Замок не открывался. Эмили растерянно оглядела пустой коридор. Снова попыталась открыть дверь. Замок не поддавался. Она тихонько вскрикнула — ошибка! Номер принадлежал ей... Нет, не ей конечно. В этом проклятом чужом отеле она поднялась на свой этаж и теперь как бы ломилась в дверь своего номера. Потому что в своей комнате она хотела дождаться Джима. И разговаривать с ним. И любить его. И спать — в обнимку, послав к черту всех этих американских свиней.</p><p class="p1">За дверью завозились. Сонный мужской голос недовольно заорал: «Кто там?!» Коротко всхлипнув, Эмили метнулась по коридору, выдернув ключ из замка. К счастью, лифт дожидался ее на этаже: в эту пору постояльцы разбредаются по пляжам.</p><p class="p1">Отдышавшись в лифте, Эмили еще раз глянула на ключ. Американец жил на первом этаже. Оказывается, этот козел еще и боится высоты. Вонючий горный козел, всегда обходящий горы.</p><p class="p1">Приехали. Дверь. Ключ. Дверь распахнулась.</p><p class="p1">Это был самый дрянной номер из всех, какие ей случалось видеть в свей жизни. Огромная бесформенная комната. Нелепые картины на стенах: обнаженные бабы, поливающие цветы, кормящие собак, обнимающие столы и стулья. Членистоногая люстра. Зеркало в четверть стены, в тусклой пыли, куда только и глядеться с похмелья или вялого соития. Решетки на окнах: даже головой о стекла побиться нельзя.</p><p class="p1">Эмили подошла к окну.</p><p class="p1">За решеткой, в тихом уютном садике находился Джим. Он сидел, чуть раскачиваясь, в кресле-каталке, и грустно-подбадривающе глядел на Эмили. Некоторое время они молча разглядывали друг друга.</p><p class="p1">«Зачем я здесь, Джимми?» — говорили ее глаза.</p><p class="p1">«Так надо, Эмили», — отвечал он взглядом.</p><p class="p1">«Я хочу к тебе», — умоляюще смотрела она.</p><p class="p1">«Нельзя», — качал он головой.</p><p class="p1">«Забери меня отсюда», — по щеке ее скатилась меленькая жалкая слеза.</p><p class="p1">«Еще не время», — и он отвел взор.</p><p class="p1">За спиной Эмили раздался сдержанный кашель. Вздрогнув, она оглянулась.</p><p class="p1">Козел вонючий стоял перед ней. Он был совершенно голый, как только может быть гол мужчина, в припадке страсти сдирающий с себя, разрывая по швам, сорочку, майку, джинсы, трусы, даже о носках не забывающий.</p><p class="p1">Мистер Джером был гол как утопленник. Раскрытые глаза его помертвели от желания. О том, что он живее всех живых, свидетельствовал и этот странноватый кашель (все–таки голышом в номере холодно), и тяжелое дыхание, а главным образом — полицейская дубинка восставшая вертикально вверх к пупку от мошонки.</p><p class="p1">Эмили отвернулась.</p><p class="p1">В следующую секунду она почувствовала, как цепкие потные пальцы коснулись ее плеч, сползли к груди, ощупали живот и ягодицы. Гэлбрейт подошел сзади. Она почувствовала на своей шее благодарный поцелуй, — или, во всяком случае, то, что Гэлбрейт считал благодарным поцелуем. Она в упор смотрела на Уидлера. Гэлбрейт проследил направление ее взгляда и уставился вниз с видом победителя-самца, который оттеснил соперника и сейчас покажет ему, как делаются такие дела.</p><p class="p1">Он развязал тесемки на ее плечах. Платье упало к ее ногам. На ней остались туфельки черной кожи, трусы и черная полумаска. Она прижалась грудью к холодной решетке окна, вцепилась пальцами в прутья. Уидлер смотрел прямо ей в глаза, и лицо его было непроницаемо. Он курил.</p><p class="p1">Беречь себя для того, чтобы отдать здесь... Сейчас... И этому... На глазах у того, кто, возможно, был ее — впервые в жизни! — достоин... Погоди, Эмили, не может быть. Все уладится. Все еще может оказаться ерундой.</p><p class="p1">Гэлбрейт растягивал наслаждение. Его возбуждение передавалось ей, но боролось в ее душе с отвращением и ненавистью к нему и к себе. Сердце билось в горле. Гэлбрейт оторвал ее руки от решетки, поднял на руки, как ребенка, и отнес на кровать. Уидлер ничего не увидит. И к лучшему. Пусть он там сойдет с ума. Если он с ней — так... Тогда она отдаст себя первому встречному.</p><p class="p1">Но не может быть! Может быть, он вбежит сейчас в номер и так отделает этого самца-пар-экселянс, что у него лицо превратится в гуляш... Надо как угодно оттянуть время! Уидлер вычислил номер, он уже бежит сюда!</p><p class="p1">Эмили вскочила с двуспального ложа и бросилась бежать, но Гэлбрейт настиг ее, опрокинул, она упала на четвереньки, вырвалась, вскочила, но тут же снова оказалась на полу. Он навис над ней. Его возбуждало сопротивление. Она, конечно, была гораздо лучше, чем все, кого он знал до сих пор. Ему предстоит нечто небывалое!</p><p class="p1">Он сорвал с нее полумаску и замер. После этого она уже не сопротивлялась и лежала на полу, подогнув одну ногу, глядя в потолок. Гэлбрейт осторожно, медленно стаскивал с нее трусики, нежно прикасаясь губами к животу, лобку... а теперь... Она зажмурилась. Гэлбрейт был умелец. Новизна ощущений на какой–то миг вытеснила стыд и отвращение. Но что должен думать Уидлер?</p><p class="p1">Может быть ей в самом деле подсознательно всегда хотелось этого? Гэлбрейт нависал над ней, и она охватила пальцами его руки, упиравшиеся в пол. Своими ногами он развел ее ноги, — она не сопротивлялась. Озноб ожидания бил все ее тело. Гэлбрейт касался губами ее сосков. Он был весь мокрый после душа, и с его мокрой головы на нее текло. Он слизывал капли горячим сухим языком.</p><p class="p1">Мгновенная боль пронзила ее. Она сильнее сжала пальцы на его руках, вскрикнула, застонала и затихла.</p><p class="p1">Гэлбрейт трудился, как умел. В сущности, умел он неплохо. Он был потрясен тем, что впервые за весь его бразильский период, за весь этот перманентно тянувшийся медовый месяц, он впервые встретил настоящую. Ту, у которой был первым; которая не косила под невинность, но и на самом деле была горда, невинна... и любила его, если пришла сюда!..</p><p class="p1">И он показывал все, на что был способен. Она лежала с закрытыми глазами, но он чувствовал, как расширяется заветный тоннель, в котором он скользил, как напрягается ее тело, как она начинает отвечать его движениям, — наконец, расслабившись, она вполне впустила его в себя, и он ощутил, что теперь он властей над ней во всем. Она приняла его. Ее тело, против ее волн, радовалось этому молодому зверю.</p><p class="p1">Так вот как это все произошло у нее впервые! С первым встречным. На полу. В чужой гостинице. В чужой стране. Возлюбленный — или бывший возлюбленный, ибо теперь–то я уж никогда его к себе не подпущу — стоит и выжидает внизу. В надежде, что я потом поделюсь впечатлениями. Обладание через необладание. Слышали мы об этом, читали и видели. А ты не увидишь и не услышишь ни о чем. С тобой кончено.</p><p class="p1">Никто никому не будет обязан. Утром они расстанутся. Он хорош, он силен, он молод. Он скотина. Лучше начинать со скота, молодого, здорового и красивого скота.</p><p class="p1">Он проникал в нее все глубже, до корня, до основания. Нет, он не раздирал ей внутренности, о чем она читала раньше, она не испытывала боли, и крови, наверное, почти не было. Ей был приятен этот неутомимый горячий стержень. Она лежала, бессильно раскинув руки, и ей было приятно это бессилие. Внезапно она ощутила нечто новое: с каждым его движением внутри нарастало сладкое жжение, волшебное возбуждение всего ее существа, и она стала двигаться в такт ему, и быстрее, чем он, и все глубже принимала его в себя, и согнула ноги, и выгнулась, и уперлась лопатками в пол...</p><p class="p1">И обессиленно опустилась на паркет, почувствовав, что после ослепительной вспышки счастья во всем теле из него стремительно ушла сила и крепость. Она лежала на полу, отвернув голову от поцелуев Гэлбрейта. Почувствовав, как сокращаются ее мышцы и судорога блаженства сводит тело, он и сам кончил почти одновременно с ней, предусмотрительно разбрызгав несостоявшегося потомка по паркету.</p><p class="p1">В эту ночь он брал ее еще дважды, второй раз был очень кратким, третий — бесконечно долгим и бесконечно сладостным. Благодарности она не чувствовала, мыслей не было. Обо всем думало тело. Само, без участия рассудка, оно покорялось или брало власть, но Эмили понимала, что если в этом деле возможен природный талант, то она его не лишена. Ей стали ясны многие из ее детских комплексов, страхов, смутных желаний. Ей стало ясно, почему она любила теплые ванны, и сильный ветер, и облегающие платья. Ее кожа, чувствительная к любому прикосновению, ее нервы, отвечающие ветру, океану, просторам пустоты и одиночества; ее спящая чувственность — все подводило ее к сегодняшнему дню. Ее душа оказалась подчинена телу и одновременно независима от него. Воли не было. Душа — была. И она была независима от того, что происходило. Они больше никогда не увидят друг друга. Нежности к Гэлбрейту не было и быть не могло, отвращения не было тоже, — а уж о том, чтобы он испытал отвращение нечего и говорить. Да, иногда он был разочарован в своих девчонках. Но не сегодня. Сегодня, черт побери, ему по-настоящему повезло. Эта девочка, верно, хранила девственность, но кое–что умела. Ее явно учили. Или она все видела, как некая Иветта, или инстинктом постигла все, или кто–то успел ее развратить, пощадив невинность тела и уничтожив невинность чувств.</p><p class="p1">К утру Гэлбрейт обессиленно заснул. Эмили не чувствовала раскаяния. Рубикон был перейден. Сладкая усталость во всем теле, дрожь в коленях. Никто ни от кого не зависит. Она оделась и тихо вышла. Гэлбрейт пошевелился во сне, чмокнул сонно и перевернулся на другой бок. Он так уснул на паркете, в костюме Адама. Эмили вышла из «Карнавала» на сером, смутном рассвете. Ночь дефлорирована, подумала она. Сейчас — полоска крови на горизонте, и в щель хлынет ослепительный свет. Усмехаясь, она взяла такси и поехала по полупустым рассветным улицам в свой отель. У входа караулил мальчишка лет двенадцати. У нее не было мелочи, и она не подала ему — всегда подавала нищим, но сегодня, ввиду исключительных обстоятельств, мысленно оправдалась она перед собой, не обязательно. Мальчишка проводил ее взглядом. Эмили тут же забыла о нем. Нырнула в ванну, в которой десять часов назад сидела девственницей. Никаких принципиально новых ощущений не было, вопреки известному стихотворению одного нобелевского лауреата. Ранка оказалась небольшой. Все равно на всякий случай надо будет поставить гигиенический тампон.</p><p class="p1">Она упала в кровать, не забыв на этот раз надеть ночную рубашку. Утром позвонила Кло и сказала, что вылетает. Просьба встретить ее в аэропорту оставалась в силе. Следовало найти Флавио и зарядить его, как сказала Кло, по самое оно.</p><p class="p1">— Сделаю, — сонно и ласково ответила Эмили. Она не проспала еще и пяти часов.</p><p class="p1">— Что–нибудь случилось?</p><p class="p1">— Нет, ничего.</p><p class="p1">— Я имею в виду сделку.</p><p class="p1">— А я целку, — хотела ответить Эмили в рифму, но тут же подобрала другую: безделку. О такой безделке не стоило сообщать.</p><p class="p1">— Я тоже имею в виду сделку, — сказала Эмили.</p><p class="p1">Стыд ее не мучил. Ведь они никогда больше не увидятся. А рано или поздно это все равно произошло бы. Лучше уж так: по крайней мере, экзотичнее. Они ведь не увидятся больше. В конце концов, ночь прошла гораздо более плодотворно, чем если бы она потратила все время на прогулку с Уидлером. Она еще скажет ему, как она его ненавидит. А с этим она никогда больше не увидится. Никогда больше не увидится. Никогда.</p><p class="empty-line"/><p class="p1">Всю ночь Уидлер носился по горным дорогам на мотоцикле. Мотоцикл ревел, Уидлер тоже. Он, конечно, сдерживался, но все равно они с мотоциклом рычали и рыдали если не одинаково громко, то одинаково страстно. Уидлер не разбился, и это его очень разочаровало. Он впервые в жизни сомневался в своей правоте и не знал, что ему теперь предпринять. Потом он окончательно махнул на себя рукой и понял, что ему теперь предпринять.</p><p class="empty-line"/><p class="p1">Кло вернулась.</p><p class="p1">Она вернулась, ведя на поводке средних лет мужчину с выражением затравленной гончей. Мужчину звали Элиот. Они так и выпрыгнули из самолетика: энергичная, шумная Кло в плаще и неизменным портфелем в руке, и тихий сгорбленный Элиот из их фирмы, неровной походкой бредущий под зычные крики своей конвойной.</p><p class="p1">— Я тебе говорила, — заорала она Эмили вместо приветствия, — что если понадобится, я его на поводке приведу?</p><p class="p1">— Говорила, — кивнула Эмили, хотя она сейчас с трудом припоминала, кто такой этот Элиот и зачем его надо тащить на поводке.</p><p class="p1">— Загулял на свадьбе, — кричала Кло, размахивая руками, — и забыл, что он мне тут позарез нужен. Я уволить хочу его, говнюка, а он на свадьбе гуляет!</p><p class="p1">Кло, щелкнув металлическим ключиком, раскрыла ошейник. Элиот счастливо заскулил. Эмили вспомнила, что он работает в их фирме. Коллега, стало быть. Она улыбнулась Элиоту.</p><p class="p1">«Бьюик» мчался по гладко отполированному шоссе. Кло беспрерывно курила. У Эмили разболелась голова.</p><p class="p1">— Теперь слушай внимательно, — как сквозь вату доносился до нее резкий голос Клодии. — Ожидается большой банкет. Для китайцев — наших закадычных друзей, маоистов сраных, — она коротко хохотнула. — Мы устроим для них праздник. Я так хочу. Будут девочки, танцы, море шампанского, океан цветов. Эти китайцы приедут с другого конца света. Надо, чтобы все было тип-топ. Или кончится этот бардак со стройкой, — отнеслась она к Элиоту, — или убирайся отсюда, дрянь паршивая.</p><p class="p1">Эмили потрогала пальцами голову. Жилка на виске билась, в башке гудело...</p><p class="p1">— Надеюсь, ты хорошо нынче выспалась, — продолжала Кло, обращаясь к Эмили, — ты еще сегодня будешь нужна.</p><p class="p1">— Выспалась, — коротко отвечала та.</p><p class="p1">— Говорят, Элиот, этот наш бездельничек вшивый, вызвал пару адвокатов из Нью-Йорка. Без них мы бы его скрутили, а так у него еще могут оказаться козыря в рукавах.</p><p class="p1">В гостинице Кло быстро приняла душ и тут же вызвала к себе Эмили.</p><p class="p1">— Как тебе Уидлер? — спросила она, вытягивая очередную сигарету из пачки.</p><p class="p1">Эмили замялась.</p><p class="p1">— Не молчи, не молчи. Что ты о нем думаешь? Скажи первое, что придет в голову.</p><p class="p1">Голова по-прежнему болела. Ни о чем Эмили говорить не хотелось, меньше всего — об Уидлере.</p><p class="p1">— Странный он... — выдавила она из себя. — Странный, да.</p><p class="p1">— Да, он странный, — согласилась Кло. — Но это бы еще ничего, если бы только странный... — она задумалась, выпуская дым из ноздрей. — А о чем вы разговаривали?</p><p class="p1">— Знаешь, мне не хочется сейчас об этом беседовать, — твердо произнесла Эмили.</p><p class="p1">— Ого, — расхохоталась Кло, — даже так?! — Она поперхнулась дымом. «Покашляй вот так и сдохни», — от души пожелала ей Эмили.</p><p class="p1">Кло поглядела на часы. — Ладно, пошли! — твердым голосом она произнесла, и Эмили с сочувствием подумала об Элиоте.</p><p class="p1">В холле гостиницы их уже ждали. За длинным столом сидел заметно повеселевший Элиот в окружении двух мужчин с юридическим выражением кислых лиц.</p><p class="p1">— Привет, ребята! — закричала Кло, — далеко же вы от дома забрались! И занесла же вас нелегкая!</p><p class="p1">Мужчины переглянулись.</p><p class="p1">— Я вовсе не жажду битвы, — развивала наступление Кло. — Мы можем сразу уговориться на том, что вы проиграли.</p><p class="p1">Один из них оторвал глаза от бумаг и насмешливо поглядел на Кло. Эмили зажмурилась от ужаса. Только этого не хватало!.. Милый ее любовник, как-бы-Джером, Наглый Трахальщик, Козел Вонючий и прочая, прочая, прочая... в серой тройке парился за столом. Почувствовав на себе испуганный взгляд Эмили, он уставился на нее недоуменным взором. Эмили отвернулась.</p><p class="p1">— Садимся, — Кло похлопала ее по спине и подвела к столу. Эмили на подгибающихся ногах села на краешек стула. Прямо напротив Джерома. Тот поскреб в затылке, затем глазки его хищно сверкнули, и вот он заговорил:</p><p class="p1">— Мы ведь знаем друг друга, — обратился он к покрасневшей Эмили, — не так ли, крошка?</p><p class="p1">Эмили промолчала.</p><p class="p1">Выручила Кло, которая явно не собиралась терять время на пустячные разговоры; мало ли кто кого знал... Сперва надо о деле.</p><p class="p1">— Так вот, — заговорила она, — мои переговоры были весьма конкретны. Соглашения, которых мы достигли, подходят мне вполне.</p><p class="p1">Она достала сигарету. Козел любезно поднес зажигалку. Кло мотнула головой и закурила от своей.</p><p class="p1">— Так что давайте не терять времени, джентльмены. Если вы джентльмены, конечно. Итак, можно считать, что мы договорились?</p><p class="p1">Козел вежливо улыбнулся и тут же поджал губы.</p><p class="p1">— Кло, я бы очень хотел сделать тебе приятное. Однако в соглашении есть несколько пунктов, которые следует обсудить. — При этом он значительно взглянул на Эмили, отчего та еще сильнее вжалась в стул.</p><p class="p1">— А ты не мог бы высказаться более подробно, Гэлбрейт? — ядовито улыбнулась Кло.</p><p class="p1">«Гэлбрейт, — пронеслось в голове Эмили, — это даже хуже, чем Козел».</p><p class="p1">— Охотно, — согласился Гэлбрейт. — Мне пришло в голову, что после вашего замечательного соглашения мой клиент останется без работы.</p><p class="p1">Кло испепелила взглядом Элиота и с той же цианистой любезностью обратилась к Гэлбрейту.</p><p class="p1">— Ваш клиент вылетит на улицу, в этом можете не сомневаться. Но виной тут не мое соглашение, а его безделье. Ваш клиент, и я хочу заявить об этом со всей определенностью, мистер Гэлбрейт, — самый уникальный сачок и лентяй из всех, с какими сталкивала меня судьба. А она меня, поверьте, сталкивала с самыми удивительными бездельниками. И все же, — Кло важно подняла вверх указательный палец, — твой Элиот — рекордсмен среди них. Чемпион. Бобби Фишер.</p><p class="p1">Мистер Козел казался глубоко опечаленным.</p><p class="p1">— Как ни жаль мне, Кло, — заговорил он, — но я никак не могу согласиться с тобой. Мистер Элиот — очень опытный и трудолюбивый работник. Вышвыривать его на улицу — значит отказываться от уникального человеческого опыта. Я уж не говорю о законе, Кло. Заметь, Кло, — подражая ей, он тоже помахал в воздухе своим указательным пальцем с бриллиантовым кольцом, — я еще ни слова не сказал о законе.</p><p class="p1">— Ты еще о правах человека скажи, — проговорила Кло.</p><p class="p1">— Если ты настаиваешь, я могу сказать и о правах. Разве можно свободного человека уподоблять собаке? Кто разрешил тебе одевать на него ошейник?</p><p class="p1">— Он сам, — хохотнула Клаудиа.</p><p class="p1">— Ты запугала его, вот он и согласился... Наговорила с три короба про какие–то штрафы. Никакие штрафы ему не грозят. А тебе, Кло, с такими повадками самое место служить в Архипелаге ГУЛАГ. Ты читала Солженицына?</p><p class="p1">Кло зевнула.</p><p class="p1">— Тебе бы в конвойных войсках служить, — продолжал мистер Гэлбрейт, — С твоими повадками.</p><p class="p1">— Нельзя ли покороче? — Клаудиа со злостью ткнула недокуренную сигарету в пепельницу и потянула из пачки новую. Козел осекся.</p><p class="p1">— Вы могли бы, — заговорил второй адвокат, — оставить нашего клиента координатором и консультантом между новыми подрядчиками и старыми владельцами.</p><p class="p1">— А на хрена им такой координатор? — поинтересовалась Клаудиа. — Что, у них мало своих бездельников? Впрочем, это не мое дело. Если хотите, обращайтесь к ним. В моей фирме он больше служить не будет.</p><p class="p1">— А я думаю, — снова вступил в разговор Гэлбрейт, — что все эти люди будут связаны с вашей фирмой.</p><p class="p1">— Откуда такие сведения? — прищурилась Кло.</p><p class="p1">— Скажите, эти сведения неверны?</p><p class="p1">Эмили впервые увидела на лице Кло растерянность.</p><p class="p1">— Я полагаю, что 350.000 долларов в год будет вполне приемлемой для моего клиента суммой, — развивал успех Гэлбрейт. — Надеюсь, и вы согласны со мной? — внезапно обратился он к Эмили.</p><p class="p1">Эмили вспомнила решетки на окнах, полицейскую дубинку между ног и триста долларов на стойке бара. «Нет, я с тобой не согласна, — подумала она, — что бы ты ни сказал, гад, я с тобой не согласна».</p><p class="p1">— Вы, кажется, забываете, — вежливо заговорила она, — что неспособность вашего клиента к ведению дел навлекла на нас многие неприятности. Об этом здесь знают все.</p><p class="p1">— Мы не забываем, сударыня, — перебил ее Гэлбрейт. — Что до меня, так я вообще ничего не забываю.</p><p class="p1">Эмили поглядела на него с откровенной ненавистью. Он продолжал, ухмыляясь:</p><p class="p1">— Мы все совершаем ошибки, в которых впоследствии раскаиваемся. Да, вашему клиенту случалось ошибаться. С тех пор он сделал для себя соответствующие выводы. А вы, сударыня, всегда делаете выводы из своих ошибок?</p><p class="p1">Эмили рывком встала. Кло с недоумением глядела на нее. Мужчины шептались. Кло взяла Эмили за плечи и отвела в сторону.</p><p class="p1">— Дело у нас в кармане, — донесся до них торжествующий голос Гэлбрейта.</p><p class="p1">Эмили, плача, рассказывала Клаудиа о своем ужасном падении. «Мы проиграли, да? — спрашивала она, по-детски шмыгая носом. — Я не должна была так поступать? Теперь все пропало, да?»</p><p class="p1">Кло вдруг расхохоталась.</p><p class="p1">— Так ты что, дала этому ублюдку?</p><p class="p1">— Я не знаю, как это случилось...</p><p class="p1">— Я тебе потом объясню! — Кло, смеясь и легонько подталкивая Эмили, вернулась к столу.</p><p class="p1">— Мне кажется, я должна уйти с переговоров, — зашептала Эмили.</p><p class="p1">— Зачем?</p><p class="p1">Кло была удивлена.</p><p class="p1">— Ну, мне кажется, что... они теперь будут нас шантажировать... и тебе придется нелегко...</p><p class="p1">— О, мне всегда легко! Теперь только самое веселье начинается. Я о таком только мечтать могла.</p><p class="p1">— Что ж тут веселого, Кло? — в ужасе шептала Эмили.</p><p class="p1">— Сейчас увидишь, как мы их разделаем.</p><p class="p1">Они уселись за стол.</p></span></span>
