<span><span id="id6"><div class="title2">
<p class="p"><strong>V</strong></p>
</div><p class="p1">Тренькнул телефон. Джон лениво изогнулся в кресле и, прокашлявшись, буркнул в трубку: «Алло!» Некоторое время он молчал, затем проговорил «О-кей» и поднялся.</p><p class="p1">— Мне нужно встретиться с приятелем, — бросил он Элизабет и с какой–то нагловатой усмешкой поглядел на нее.</p><p class="p1">— Я пойду, — сказала она с мягко обозначенной вопросительной интонацией.</p><p class="p1">— Нет, — он удивленно пожал плечами, — ты останешься и дождешься меня.</p><p class="p1">— Что за приятель? — без интереса осведомилась Элизабет. — Ночью, под дождем...</p><p class="p1">— Под дождем только и дружить, — туманно ответил он и, накинув плащ, вышел на улицу.</p><p class="p1">Она приподнялась на диване, скользнула взглядом по комнате и с любопытством уставилась на письменный стол. Его письменный стол. Что может храниться в потайных ящичках у этого жулика? Револьвер, томик какого–нибудь внезапного Шекспира, надорванный пакетик с презервативами, удавка для юных журналисток? «Нехорошо копаться в чужих вещах», — важно произнесла Элизабет, нашаривая тапочки. «Это признак дурного воспитания», — продолжила она, кружа по комнате. «Да просто свинство», — заключила, поудобнее усаживаясь на стуле. «Но ведь интересно», — жалобно произнесла она, оправдываясь перед незримым собеседником. Собеседник, по-видимому, был неумолим. «Ну, и пошел в жопу», — обиженно сказала Элизабет. И потянула на себя верхнюю ручку.</p><p class="p1">Так. Револьвер. Кондомчики... у ты, мой лапушка. А вот с Шекспиром напряженка, книг в его доме вообще почти нет. Так, какие–то справочники да случайный Набокофф («Лолита», конечно, чего же еще?), которого она обнаружила на деревянной полке в уборной, рядом с керамической пепельницей невнятной формы. Кредитная карта. Рваный доллар. Бережешь, милый, все склеить некогда... А вот кое–что поинтереснее. Конвертик. А в нем... ну, конечно, мой милый Джонни с очаровательной киской. Брюнеточка. А глазки грустные. Замучил, значит, наш ласковый, обкормил, да... а может, от статеек своих устала, журналисточка. Нет, все–таки перекормил. Элизабет испытала к этой девочке прилив нежности почти материнской.</p><p class="p1">— В нашей постели вы поплывете по жизни, минуя все рифы, что встретятся вам на пути, — проворковал за спиной чарующий женский голос. Элизабет оглянулась. Миловидная старушка на телеэкране рекламировала нечто, никак не уступающее по размерам и оснастке хорошему русскому ледоколу.</p><p class="p1">Элизабет загляделась на эту плавающую семейную крепость, давящую на своем пути хрупкие льдинки обреченных случайных связей. Постель-ледоход раздвигалась в четыре стороны, передвигалась на колесиках, мягко скрипела пружинами под бременем любовных ласк, сколько бы ни было девочек у Джонни — все они могли бы разместиться здесь, а моложавая старушка могла разносить мороженое для всех желающих...</p><p class="p1">Снова тренькнул телефон. Элизабет испуганно покосилась на него и быстро, аккуратно сунула свои трофеи на место, захлопнула ящичек. Бросилась к телефону, вскрикнула — ей навстречу кинулась какая–то блондинка с вытаращенными от ужаса глазами. Господи... это же я... черт бы побрал Джонни с этим его громадным зеркалом во всю стену. Так, спокойно. Блондинка остановилась прямо перед ней, пригладила волосы, пригасила взор и, медленно отвернувшись, слегка дрожащими пальцами коснулась трубки.</p><p class="p1">— Алло, — кашлянув, сказала она.</p><p class="p1">Трубка молчала.</p><p class="p1">— Алло, — нетерпеливо повторила Элизабет.</p><p class="p1">Молчание.</p><p class="p1">— Джонни ушел под дождь, — честно призналась она, — если вы думаете, что не туда попали, то вы ошибаетесь, а если вы думаете, что попали туда, но не хотите разговаривать, — Элизабет на секунду задумалась, — если вы какая–нибудь брюнетка из «Нью-Йорк пост», то позвоните через полчаса, когда Джонни вернется из–под дождя. Он даже зонтик не взял, — заметила она с грустью.</p><p class="p1">В трубке зашевелилась жизнь. Жизнь разговаривала шепотом. Мужским.</p><p class="p1">— Элизабет, — зашептал кто–то, — привет!</p><p class="p1">— Привет, — она тоже зачем–то заговорила шепотом. — А ты кто?</p><p class="p1">— Меня зовут Джонни, — шепот был такой вкрадчивый, что у нее зачесалась мочка уха. — Я твой любимый.</p><p class="p1">— Любимый, — сказала она. — Ты чего щекочешься.</p><p class="p1">— Не говори ничего, — горячо и быстро зашептал Джон. — Я хочу задать тебе вопрос. Но ты на него пока не отвечай. Это — долгий и коварный вопрос. Вот я сидел тут с другом. У нас не было зонта. Мы мокли и разговаривали. Но это все неинтересно. А интересно вот что: что ты делаешь одна в моей квартире? Не разглядываешь ли ты мое белье, не суешь ли свой белоснежный нос в ящики моего комода?</p><p class="p1">— Нет, — сказала она, переводя дыхание. — Иди домой.</p><p class="p1">— И я сказал себе то же самое: нет, Джон, это невозможно. Твоя девочка совсем не такая, как ты думал. Она не роется в чужом комоде. Она — хорошая девочка!</p><p class="p1">— Хорошая, — согласилась Элизабет и переложила трубку к другому уху. — Я скучаю по тебе, Джонни. Ты где?</p><p class="p1">— Не перебивай! — строго проговорил он, и шепот его стал сух. — И тут я спросил себя: а не могла ли моя девочка забраться в письменный стол своего любимого Джонни? Ну скажи, да или нет? Ты молчишь?</p><p class="p1">Она молчала.</p><p class="p1">— А почему ты молчишь? Ты не можешь сказать мне правду? Но и врать тоже не хочешь, да?</p><p class="p1">— Да, — призналась она.</p><p class="p1">— Ты была любопытна, — укоризненно заговорил он. — Ты сунула свой нос туда, куда тебе не следовала его совать. И что же ты там нашла?</p><p class="p1">— Я видела доллар, — призналась Элизабет. — Рваный доллар. Рваный грязный доллар. Вроде той потаскухи, с которой ты сфотографировался на память.</p><p class="p1">Она прижала телефон плечом и пересела на диван, сбросив тапочки. Блондинка из зеркала глядела на нее печально, но без испуга.</p><p class="p1">— Ты была любопытна, — произнес он. — Как жаль! Но я никому не скажу об этом. Пусть это будет нашим маленьким секретом, о котором не узнает никто. Ладно?</p><p class="p1">— Да, — сказала она.</p><p class="p1">— Что «да»?</p><p class="p1">— Да. Я была любопытна. Приходи.</p><p class="p1">Она положила трубку. Встала, разминая ноги, остановилась перед зеркалом. Блондинка глядела на нее без особенного интереса. Они закрыли глаза. Приоткрыв глаза, Элизабет увидела за спиной блондинки совершенно мокрого типа, смутно напоминающего Джонни.</p><p class="p1">— Ты мокрый, — сообщила она.</p><p class="p1">— Зачем ты это сделала, — тихо проговорил он, осторожно снимая плащ и рывком сбрасывая его на ковер. — Какого черта ты копалась в моих вещах?! — заорал он. Но тут же взял себя в руки. — Элизабет, ты очень плохо вела себя. Ты вела себя как шпионка. А со шпионками у меня разговор короткий. Встань к стене, задери юбку. Я тебя отшлепаю.</p><p class="p1">Она отшатнулась.</p><p class="p1">— Ты шутишь?</p><p class="p1">— Я не шучу. Становись к стене.</p><p class="p1">— Это что — приказ?</p><p class="p1">— Мне повторить?</p><p class="p1">— И что я должна сделать?</p><p class="p1">— Повторяю. — Голос его был спокоен, подчеркнуто ровен и безжалостно холоден. — Ты становишься к стене. Разумеется, лицом к стене, как девочка, которую ставят в угол. — Он то ли заводил себя, то ли действительно все больше и больше возбуждался от собственной изобретательности. Элизабет не могла поверить в реальность происходящего; как же, должно быть, страшно было Виктору, когда мир вокруг него так же терял реальные очертания! — И ты задираешь юбку. И ты снимаешь трусы. И я тебя шлепаю.</p><p class="p1">Элизабет на секунду замерла. Потом резко прошла в комнату, Джонни пристально наблюдал за ней, и бесовский желто-зеленый огонек ровно тлел в его глазах, — схватила сумочку и пошла к выходу. Хлопнула дверь.</p><p class="p1">Джонни щелкнул пальцами.</p><p class="p1">— Раз, — сказал он тихо. — Два, три, четыре, пять, шесть...</p><p class="p1">На счете «семь» она ворвалась обратно в квартиру.</p><p class="p1">— Да что ты вообще за человек?! — заорала она. — Человек ты или нет? Кто ты вообще, чертов оборотень?! А?!</p><p class="p1">Она подскочила к нему и с размаху ударила по щеке. От следующего удара он уклонился. Ей и в голову не могло прийти, что она способна его ударить. С тех пор, как она в школе дралась с мальчишками, драться ей не приходилось вообще, а ударить человека по лицу всегда было для нее задачей трудноразрешимой. Но сейчас она не соображала, что делает.</p><p class="p1">Следующий удар она готовилась нанести снова по лицу, но Джонни поднырнул под ее руку, и она попала по макушке, да и по той лишь скользнула ребром ладони. Он обхватил ее, она вырвалась и на этот раз попала по щеке, рядом с подбородком. Он схватил ее за руку. Нет, конечно, он не будет наносить ответные удары, в конце концов он мужчина! Но он крепко сжимал ее запястье. Она наподдала ему коленом. Нет, это не игра, она всерьез почувствовала себя взбешенной. Видимо, это не укрылось и от него, — такие пощечины играя не раздают, — но он, кажется, только радовался этому. Бесовский огонек разгорался все ярче и ярче. Привыкший все рассчитывать, он предвидел и этот ход в игре, и эту комбинацию, поэтому с некоторым любопытством наблюдал за происходящим, ловко уклоняясь от града ударов.</p><p class="p1">А вот такого он не ждал! В глазах у нее кипели злые слезы, она прикусила нижнюю губу, вырвала руку и со всего размаху засадила ему звонкую пощечину, не собираясь, судя по всему, ограничиваться ею. Дело было не только в этой размолвке.</p><p class="p1">— Побить — не значит понять, — пробормотал он.</p><p class="p1">— Что ты за человек?! — продолжала выкрикивать она, колотя его неумело и жалко, и тогда он схватил ее, вырывающуюся, и кинул на огромный, гладко отполированный стол.</p><p class="p1">— Отпусти меня, ублюдок! — выкрикнула она, задыхаясь.</p><p class="p1">— Что я слышу!</p><p class="p1">— Отпусти, гадина! — Она брыкалась, туфли слетели с ног. Она дралась вполне серьезно, царапаясь, норовя вцепиться ему в волосы. Джона это не смутило. Он рванул на ней юбку. Молния с треском вырвалась. Джон стащил с нее юбку, не давая Элизабет ни приподняться, ни выскользнуть. Потом он так же рванул рубашку на груди Элизабет. Страстное возбуждение, нетерпеливое и жгучее, овладело им. Ее сопротивление — о, это что–то новое!</p><p class="p1">Элизабет ясно сознавала, что идет, по сути дела, та же игра, но по новым правилам, спешно подправленным по ходу событий. Она делала все возможное, чтобы он не одолел ее на этот раз, но сопротивляться его властным рукам было невозможно. Она видела, как он расстегивает свои брюки, как спускает плавки...</p><p class="p1">— Дрянь!!!</p><p class="p1">Он распахнул рубашку на ее груди. Элизабет, извиваясь, пыталась укусить его за руку. Она елозила по гладкому столу, молотя ногами пространство. Он раздвинул ее ноги и встал между ними.</p><p class="p1">— Скотина! Пошел вон!</p><p class="p1">Может быть, если бы она сейчас успокоилась, — успокоился бы и он. Но так они только пуще заводили друг друга.</p><p class="p1">Он порвал ее трусы. Она мельком вспомнила, что даже в самые бурные минуты их страсти он был чрезвычайно бережен и осторожен, — что ж, погляди теперь и на такого Джона. Но и в те минуты, и сейчас он оставался игроком, неумолимо отслеживающим все, что происходит с ним, с ней, с миром. И сейчас она была частью его замысла, не более.</p><p class="p1">Боль пронизала ее. Он не снял с нее чулок. Ноги в черных чулках разом ослабли, сделались ватными. Она уже не могла сопротивляться. Он наклонился над Элизабет, как монумент, навис над ней, заглядывая в глаза. Всей спиной она каталась взад-вперед по гладкой, лакированной поверхности стола. Взад-вперед, взад-вперед, — он был беспощаден, и жестокий, злой, веселый огонек горел в его глазах. Что же, сыграем в эту игру!</p><p class="p1">Она пыталась схватить его за волосы, но он уклонялся. Боль становилась блаженной, наполняла ее всю словно золотым соком, который вот-вот прорвет оболочку плода, вот-вот брызнет, взорвется сладостью и ослепительным светом...</p><p class="p1">Волосы ее рассыпались. Она протянула руки и обняла Джона за шею. Он, как всегда, безупречно чувствовал ее и в этот раз не пытался уклониться. Судорожными пальцами она схватила его за воротник рубашки, пытаясь притянуть к себе. Он нагибался к ее губам, ближе, ближе, — и впился в них, кусал, подложил ладонь под ее затылок и приподнял...</p><p class="p1">Взад-вперед, взад-вперед. Плод наполняется соком, который уже светится сквозь оболочку. Блаженство длится и полнится...</p><p class="p1">Взрыв! Он настиг их одновременно. Всхлипывая и сотрясаясь, она прижалась мокрым от слез и пота лицом к его груди.</p><p class="empty-line"/><p class="p1">Он выбирал ей платье. Медленно и вдумчиво.</p><p class="p1">Еще утром, когда она проснулась и открыла глаза, в которых была сонная, блаженная и ласковая, улыбка, — он посмотрел на нее прежним долгим взглядом и весело сказал:</p><p class="p1">— Завтрак готов. Поешь, и мы пойдем тебя приодеть.</p><p class="p1">— Всеми моделями Ле-Монти ты не искупишь своего свинства. Свиноподобия. Скотства, — она перевернулась на живот. Он прилег рядом и стал гладить ей спину — она любила это.</p><p class="p1">Ее восхищало, как ловко и быстро его руки управляются с кухонным комбайном, с тостером, с выжималкой для апельсинового сока. Сок он неизменно давил вручную, считая, что автоматизация, а тем более покупка консервированного продукта губительны для настоящего вкуса, да и потом готовка — половина удовольствия. Ее он постоянно лишал этой половины удовольствия — впрочем, утверждая, что наблюдение за его действиями, волхвованием над яичницей и ворожбой над апельсином, стоят всех ароматов Аравии.</p><p class="p1">Ее восхищало также, как придирчиво, медленно, со знанием дела, — знанием, изобличавшим опыт, и это кольнуло ее — он выбирает ей платье. Она смотрела на него с легкой грустью, а продавщица-японочка — с вежливым недоумением, однако и на нее, чувствуется, действовало его непреодолимое обаяние, его всегдашняя полуулыбка, его добродушное, хитрое, мгновенно меняющееся лицо, как бы всегда предвкушающее нечто восхитительное.</p><p class="p1">Нет, они едва ли смогут быть вместе. Как ни приятно разубеждать себя в этом, она почти сдалась, почти до конца принадлежит ему, а он никогда не будет принадлежать ей до конца. У нее нет на него ни малейших прав. По-прежнему. Собственность есть собственность, он принадлежит только себе, зато и владеет собой так, как лучший гонщик — самой послушной машиной. Как она никогда не смогла бы владеть: ни собой, ни кем угодно другим.</p><p class="p1">— Примерь.</p><p class="p1">В кабинке она придирчиво осмотрела себя. Он зашел туда вместе с ней — вероятно, к ужасу японочки, они же все, кажется, такие пуританки, несмотря на голые фотографии в журнальчиках, — и Элизабет с тайным удовольствием показала ему синяк чуть выше локтя.</p><p class="p1">— Тебе это ни о чем не говорит?</p><p class="p1">— Говорит. Прекрасная, нежная кожа.</p><p class="p1">— Что еще?</p><p class="p1">— В пределах нормы реагирующая на внешние раздражения.</p><p class="p1">— А еще?</p><p class="p1">— Слушай, японка подумает обо мне лучше, чем я того заслуживаю. Примерь мое искупление и будь счастлива.</p><p class="p1">Платье было прекрасно. Синее со звездами. Строгое. Цвета неба в августе, в сумерках. В таких сумерках в детстве она любила играть в бадминтон во дворе.</p><p class="p1">— Превосходно, — сказал Джонни. Они вышли из кабинки и стояли перед огромным зеркалом, почти как у него дома. Блондинка напротив Элизабет была сегодня особенно бледна, но, в общем, умиротворена и даже довольна.</p><p class="p1">— Мы берем это, — обратился Джонни к японке.</p><p class="p1">— Вы будете платить наличными?</p><p class="p1">— Да, разумеется.</p><p class="p1">— Пятьсот сорок девять долларов, пожалуйста.</p><p class="p1">Это было хорошее платье. Стоившее половину самого паршивого «Настроения №38» на выставке Эрла. Ни одна картина которого так и не была никому нужна. В отличие от платья. Шил бы он лучше платья.</p><p class="p1">— Джонни! Ты даже не спросишь, нравится мне или нет?</p><p class="p1">Ну разумеется, ей нравилось. Как могло ей не нравиться? Но хотя бы спросить перед тем, как доставать бумажник...</p><p class="p1">Он пристально посмотрел на нее.</p><p class="p1">И покачал головой.</p><p class="p1">— Интересно, ты о других заботишься так же, как обо мне?</p><p class="p1">Она назойливо повторила этот вопрос, когда дома, на стуле у окна, в счастливом бездельи уик-энда, мечтательно глядела в окно, а Джон расчесывал ее легкие волосы, — расчесывал мягче и деликатнее, чем самая опытная горничная.</p><p class="p1">— Так скажи, Джонни! Мне интересно!</p><p class="p1">— Во многой мудрости, — сказал Джон, — много печали.</p><p class="p1">— Но имею же я право хоть что–то знать!</p><p class="p1">Вместо ответа он поцеловал ее долгим, нежным поцелуем, как в тот, первый их счастливый день, когда, она простила его за колесо обозрения.</p><p class="empty-line"/><p class="p1">Шляпа взлетела выше второго этажа. Ловко у него это выходит, подумала она. Неужели поймает? Но ловить он и не думал. Это было вполне в его духе. Шляпа шлепнулась в лужу. Ах ты паршивый лемур! Элизабет с визгом бежала за ним, он улепетывал со всех ног. Она не стала подбирать шляпу. Он купит ей новую. Пусть попробует не купить! Они мчались до самого ее дома. Она обогнала его, но лупить не стала. Был план хитрей. Элизабет вскочила в лифт, мгновенно отперла свою квартиру, заперлась и закрылась на цепочку.</p><p class="p1">Джон позвонил. Она не откроет. Нет, нет, хватит с нее и со шляпы! Довольно этих шуточек, пускай помучается.</p><p class="p1">Но, само собой, без ее ключей он выйти не мог. Ключами они обменялись еще три недели назад.</p><p class="p1">Она защелкнула собачку. Это не оказалось для него серьезным препятствием: кроме ее ключей, были и другие. Какие — она не видела. Но вряд ли была дверь, которую эта отмычка не отомкнула бы.</p><p class="p1">Элизабет выглянула через щелочку. Цепочка, слава Богу, крепкая. Но как он забавен, бедняжка! Старина Джонни. Он стоял с детски-покаянным лицом, чуть покачиваясь с пятки на носок, как нашкодивший ребенок.</p><p class="p1">Элизабет прижалась спиной к стене и погрозила Джону пальцем. Вместо ответа в щель просунулась ромашка.</p><p class="p1">— Если выпадет «любит», то открывай.</p><p class="p1">— А если нет?</p><p class="p1">— А если нет, оторви головку от стебля, и получится то, что нужно. То есть любит.</p><p class="p1">— А как же чистота эксперимента?</p><p class="p1">— А как же правда жизни?</p><p class="p1">Она отомкнула цепочку.</p><p class="p1">В этот раз он принес ей набор постельного белья — снежно-белые простыни, наволочки. Все сияло и было явно куплено только что. Кроме всего прочего, он, ни о чем не спрашивая и не зная даже размеров, купил для Элизабет несколько комплектов нижнего белья — тончайшие, нежнейшие кружевные трусики, крошечный лифчик, вполне позволявший, впрочем, надеть его и на более массивную грудь. Но Элизабет была сложена на удивление гармонично, и все на ней смотрелось превосходно.</p><p class="p1">Джонни настаивал, чтобы примерка происходила обязательно при нем, — он имел, непременно подчеркивая это, немалый опыт в выборе одежды.</p><p class="p1">— И потом, — сказал он, с обычной своей улыбкой и нагловатой откровенностью глядя на Элизабет, — мне нравится, как ты одеваешься.</p><p class="p1">— А как раздеваюсь?</p><p class="p1">— В этом должен помогать тебе я. Во всем должен помогать тебе я и только я.</p><p class="p1">— Я так долго обходилась... Впрочем, я благодарна тебе бесконечно.</p><p class="p1">Она разделась. Сняла трусики и надела новые.</p><p class="p1">— Лифчик примерь!</p><p class="p1">— Я ведь все равно обычно лифчиков не ношу!</p><p class="p1">— Мало ли. Вдруг придется. На прием к жене английского посла.</p><p class="p1">— Смотреть там будет больше не на что, — сказала Элизабет. Но лифчик ей чрезвычайно понравится, как и весь набор белья, который Джон с такой щедростью разложил перед ней на кровати.</p><p class="p1">— Это все для тебя, любимая! — сказал он со своей вечной иронией.</p><p class="p1">— А это — для тебя, — ответила она, сняла трусики...</p><p class="p1">— Спасибо, — он взял их, поднес к лицу, вдохнул, зажмурился... — Лифчик не снимай.</p><p class="p1">— Я, некоторым образом, вручаю тебе не трусы, а свою любовь и преданность.</p><p class="p1">— Трусы мне тоже симпатичны, — заметил он. — А лифчик ты все–таки не снимай.</p><p class="p1">Все произошло прекрасно. Как обычно. Но уж слишком он любил парадоксы.</p><p class="empty-line"/><p class="p1">...Ратуша стояла на окраине, куда их занесло на одной из прогулок во время уик-энда. Кругом дымили странные трубы, и ратуша выглядела анахронизмом, прелестным, жалким и необычайно притягательным. Часы пробили шесть.</p><p class="p1">Стрелки застыли, как солдат по стойке «Смирно».</p><p class="p1">— Вольно, — сказал Джон, и Элизабет его поняла. Они давно без слов понимали друг друга.</p><p class="p1">Джон посмотрел на нее:</p><p class="p1">— Ты никогда не мечтала оказаться в часах?</p><p class="p1">— Все детство.</p><p class="p1">— А ты не задавалась вопросом: откуда они знают сколько времени?</p><p class="p1">— Конечно! И до сих пор не знаю.</p><p class="p1">— Там внутри такая штука. Хочешь, покажу?</p><p class="p1">Она часто закивала, как школьница.</p><p class="p1">Джон бежал по крутой лесенке, вьющейся винтом в пыли. Элизабет задыхалась. Стены сдавливали пространство, давили на нее. Господи, думала она, как страшно быть замурованной. Но забрезжил просвет, и они оказались в пыльном, светлом, смутном пространстве.</p><p class="p1">Работали громадные шестерни. Часы жили обособленной и замкнутой жизнью, каждая шестерня занималась своим делом.</p><p class="p1">— Тебе ничего не напоминает это зрелище?</p><p class="p1">— А тебе?</p><p class="p1">— Мне нравится, как они входят в зацепление.</p><p class="p1">Она и здесь мгновенно поняла его. И принялась раздеваться с лихорадочной быстротой. Спустила с плеч блузку. Скинула юбку. Джон сбрасывал пиджак, жилет, сорочку, подхватил ее и прижал к себе. Они целовались жадно, задыхаясь, быстро и беспорядочно. Нет, сейчас он не играл. Или ему хотелось и это попробовать? Но нет, его слишком стремительно бросило к ней, они слишком жадно и торопливо насыщались друг другом. Его дыхание было хрипло и прерывисто, он постанывал, она кричала, не стесняясь. Через минуту все кончилось.</p><p class="p1">В счастливом изнеможении они еще долго не разнимали объятий.</p><p class="p1">...Она стояла под дождем, сдвинув лодыжки, опустив руки, невинно склонив голову набок, как стояла когда–то перед матерью после первой школьной вечеринки, на которой впервые выпила.</p><p class="p1">Джон держал над собой зонт — большой, старомодный черный зонт. Он питал привязанность к старым вещам, и это их тоже роднило.</p><p class="p1">— Что ты на меня смотришь? Хочешь под зонтик?</p><p class="p1">— Не хочу.</p><p class="p1">— А чего глядишь?</p><p class="p1">— Так, любуюсь.</p><p class="p1">Ведь действительно любуюсь, подумала она. Еще поражаюсь, как это мимо него спокойно проходят девчонки, не оглядываясь, не кидаясь ему на шею. Правда, они не знают, каков он в постели. Но уж об этом догадаться несложно.</p><p class="p1">Она не ревновала его, ибо была убеждена, что ни одна душа на свете так не будет принадлежать ему, как она; никто не будет терпеть эти бесконечные капризы и втайне им радоваться; никто из этих девчонок в детских снах не мечтал о чьей–нибудь растворяющей, всеобъемлющей власти; никто так не мечтал о чужом безумии. Это, может быть, была ее вечная ошибка — вера в свою исключительность. Не такая, как все, хотя все не как все — это она успела понять еще в отрочестве. Но когда она не спала — ей казалось, что весь город спит; когда была несчастна — полагала, что все кругом счастливы.</p><p class="p1">И теперь, когда она была счастлива и любовалась на Джонни, она была убеждена, что никто никогда, нигде не знал ничего подобного. Признайся он ей сейчас, что у него есть другая женщина, она бы расхохоталась. Не испугалась, не разозлилась, нет, расхохоталась от всей души. Пусть их будет десять.</p><p class="p1">— Я, конечно, свинья, — сказал он, и она поймала его быстрый, хитрый, предвкушающий взгляд. — Я, конечно, порядочная свинья, но со мной интересно.</p><p class="p1">— Даже сверх меры.</p><p class="p1">— А кто любит меру? И кто ее видел?</p><p class="p1">— Слушай... Но пройдет полгода, да что я говорю, пройдет месяц, и тебе надоест.</p><p class="p1">— Никогда на свете.</p><p class="p1">— Но ты не сможешь вечно выдумывать новые декорации. Допустим, тебе захочется попробовать любовь полярной ночью. Мы съездим на Северный Полюс, но на Луну тебе уже никак не попасть.</p><p class="p1">— Во-первых, — сказал он, — в одном Нью-Йорке нам хватит улиц и площадей до конца жизни. Равно как и времен года, и настроений погоды, и мы еще ни разу не пробовали при насморке. Но дело не в этом. Если бы мне нравилось только затаскивать тебя в ратуши, подворотни и луна-парки, мы могли бы не вылезать из койки, и уверяю тебя, все было бы не хуже.</p><p class="p1">— Что же тебя держит?</p><p class="p1">— Трудно сказать. Мне нравится, что ты сама о себе не все знаешь.</p><p class="p1">— А ты знаешь обо мне все?</p><p class="p1">— Больше, чем ты думаешь. Со стороны виднее, что о тебе надо заботиться. Всю жизнь. Каждую секунду. И я буду этим заниматься каждую секунду, когда не торгую воздухом.</p><p class="p1">— Ты уверен, что представления о заботе у нас совпадают?</p><p class="p1">— Абсолютно.</p><p class="p1">— А я нет.</p><p class="p1">— Слушай, Элизабет, ты можешь раз в жизни быть безмятежно счастлива?</p><p class="p1">— Уже шесть недель.</p><p class="p1">— Тогда не говори мне, что грядет эмансипация, борьба за равноправие и все такое. У меня была одна феминистка, — она знала, что упоминания о его прежних женщинах неизбежны, и они всякий раз уязвляли ее; и он это чувствовал, но это, видимо, как–то входило в программу перевоспитания, которую он для нее наметил. Кто дал ему право намечать программу для ее перевоспитания? Уверен ли он — о да, несомненно, уверен, он ни в чем не сомневается, если делает всегда только то, что хочет, — уверен ли он, что раскрывает ее, освобождает, а не губит?</p><p class="p1">— У тебя было несколько феминисток, насколько я понимаю.</p><p class="p1">— Нет, эта была особенно страстной. Часами могла рассуждать о равноправии.</p><p class="p1">— Тобой, кажется, она, могла быть довольна. Ей никто не мешал посвящать себя теннису, политике и охране окружающей среды, пока ты стелил постели, готовил завтраки и выбирал наряды.</p><p class="p1">— В том–то и дело, что готовить ей было ниже моего достоинства. Я заставлял ее, умолял, угрожал: поди ты раз в жизни на кухню, поджарь мне, ради Бога, яичницу, я посмотрю, как ты это сделаешь! Тут я понял, откуда у них все эти разговоры о равноправии...</p><p class="p1">— На кухне она так смотрела на персик, что ты угадал в ней лесбиянку?</p><p class="p1">— Если бы! Будь она нормальной лесбиянкой, я привел бы ей девку и с радостью понаблюдал, как они тут будут почковаться. Но она была феминисткой, а это худший тип полового извращения. Она панически боялась любой работы по дому, потому что у нее все валилось из рук. Она не умела включать утюг. Бекон у нее был как резина. Сварить кофе для этой идиотки было пыткой.</p><p class="p1">— За что же ты ее любил?</p><p class="p1">— Ну, разумеется, не за кулинарные способности! Впрочем, она и лицом была не слишком чиста, и фигурой небезупречна, но не хочу при одной женщине ругать другую, хоть бы и феминистку. Я ее не любил, но она мне была интересна. Как интересен, например, фетишист, утонченный какой–нибудь педик... Так и она. Любопытство к жизни, не более.</p><p class="p1">— Экземпляр для коллекции.</p><p class="p1">— Ты сейчас это примеришь на себе, если я соглашусь, и надуешься до вечера. Нет, не для коллекции. Просто человеческий экземпляр. И я понял, знаешь ли, откуда весь этот феминизм: от неумения быть просто женщиной. Существом подчиненным и потому главенствующим. От неумения нравиться, ходить, говорить, от недостатка женственности, от классического бессилия на кухне...</p><p class="p1">— А откуда ты взял, что я тебе подойду?</p><p class="p1">— Ну, положим, я к тебе присматривался, когда ты выходила из галереи. Я тебе не говорил? — я ведь работаю недалеко.</p><p class="p1">О его работе она по-прежнему ничего не знала.</p><p class="p1">— Где именно — недалеко?</p><p class="p1">— Напротив.</p><p class="p1">— Так ты в этой конторе, где внизу китайский магазинчик?</p><p class="p1">— Совершенно верно. И я видел, как ты ходишь, как смеешься, как покупаешь еду... Потом я увидел, как вы с этой твоей лохмоногой покупаете рыбу, — как раз шел мимо...</p><p class="p1">Ей вспомнилась рыба. Живая, раскрывающая жабры, бьющаяся на прилавке. В том, как медленно и трудно эта рыба раскрывала жабры, стараясь вдохнуть и уже не в силах вдохнуть, — да разве годится рыбе наш воздух?</p><p class="p1">Он только сушит, обжигает нежные ткани, — в том, как эта рыба выгибалась под руками продавца, Элизабет чувствовала страшную обреченность. Но эта обреченность не пугала и не отвращала ее. Вот и я теперь, как рыба у него в руках, подумала она. Только он у меня вместо воздуха. Не будет его — не будет ничего.</p><p class="p1">— Ну и вот, — продолжал он. — И я понял, что нет большего счастья, чем кормить такую женщину с ложечки.</p><p class="p1">— Это явное извращение — кормить женщину с ложечки.</p><p class="p1">— Вовсе нет. Это совершенно естественная вещь. Женщина должна принадлежать. Если она сама не хочет этого — она называется не феминисткой, а гермафродитом. А в тебе я сразу почувствовал желание принадлежать. Быть частью. Словом, ты то, что мне надо, а я то, что тебе надо.</p><p class="p1">— Ты очень быстро принимаешь решения, и слишком часто — за меня.</p><p class="p1">— Что делать. Как всякая истинная женщина, ты не создана проявлять инициативу.</p><p class="p1">— Кстати, я бы не возражала, чтобы кто–нибудь покормил меня с ложечки. Например, ананасным компотом. Становится холодно, и ветер, и очень хочется ананасного компота. Как беременной. У беременных, знаешь, бывают прихоти. А так как я в порядке, — она изучающе посмотрела на него: обратит ли он внимание на разговор о беременности, возможной, конечно, не сейчас, а в будущем? — Так как я в порядке, значит, я просто давно не ела ананасного компота.</p><p class="p1">— Пойдем...</p><p class="p1">— Куда?</p><p class="p1">— Покупать компот и есть его в тепле и уюте.</p><p class="p1">Она чуть не запрыгала от счастья. И все–таки невнятное опасение томило ее до тех пор, пока он не усадил ее напротив себя на диван и не принялся кормить ананасным компотом, тщательно дозируя количество кусочков в каждой порции.</p><p class="p1">— Но Джон... я могла бы повести себя совсем иначе!</p><p class="p1">— Не могла.</p><p class="p1">— Но откуда ты знал, что я отвечу на все именно так, а?</p><p class="p1">Он отставил компот в сторону, потянулся к ее губам:</p><p class="p1">— Тогда я сейчас сидел бы здесь один, и мне досталось бы гораздо больше ананасного компота.</p></span></span>
