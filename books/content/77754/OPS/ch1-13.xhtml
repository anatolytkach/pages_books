<span><span id="id10"><div class="title2">
<p class="p"><strong>IX</strong></p>
</div><p class="p1">Его квартира была пуста, как и следовало ожидать. И он не ждал ее визита. И она его не ждала. Зачем она зашла — проститься? Или в безумной надежде застать его? Или, наоборот, побыть одной там, где они были, кажется, счастливы вдвоем? Ведь были? Она вся дрожала и с облегчением вздохнула, когда квартира оказалась пуста.</p><p class="p1">Тайно ее влекла сюда тяга повторить все, но без него. Заняться этим, как тогда, в просмотровом зале. Тем более, что, — она усмехнулась, — это грозит стать ее уделом на ближайшие два-три года. Здесь в этом была особая острота. Может быть, безумие, начало извращения. Может быть, раскрепощается то, что было в ней заложено раньше. Но ей хотелось сделать это здесь. И уйти, оставив на столе ключи и навсегда захлопнув дверь. Правда, это будет звучать как приглашение к звонку, прощальной сцене, выяснению отношений, — не проще ли выкинуть ключи с моста, к чертям собачьим. Вариант самоубийства, но простой и безобидный: вместо того, чтобы кидаться в воду самой, — об этом она и в последнем отчаянии не думала никогда еще, и вряд ли подумает впредь, — выкинуть ключи, образ прежней жизни. Нет. Оставить ему: есть особая радость в том, что он отдаст их другой. Как и ей отдал — не первой, а после кого–то. И новая рука, влажная от возбуждения, будет поворачивать этот ключ в замке, и новая женщина будет снимать чулки и ложиться на эту кровать, чувствуя холодок белья... и раздвигать ноги — нет, не слишком, чуть-чуть, как он любил; и чувствовать его пальцы здесь, и здесь... а потом его губы, его язык... Осторожные и властные движения... Интересно, будет ли он и с ними так активно вовлекать в дело холодильник? — нет, вряд ли, ледышка предназначалась для нее одной. Кто еще выдержит весь этот набор болезненных чудачеств, смешных издевательств, унизительных изобретений?.. Не думать об этом. Она уже лежала на кровати, согнув ноги в коленях, спустив чулки и трусики. Зажав правую руку между ног, а левой...</p><p class="p1">Нежная, влажная плоть. Да, должно быть, ему было хорошо с ней.</p><p class="p1">Через несколько мгновений, когда, еще не отдышавшись, она глядела в потолок, бессильно распростершись на его кровати, раздался телефонный звонок.</p><p class="p1">Она вздрогнула. Вскочила.</p><p class="p1">В конце концов, подняв трубку, она ничем не рискует.</p><p class="p1">— Э–ли–за-бет! — его горячий, почти щекотный шепот заставил ее содрогнуться. Он говорил, как прежде, лаская, растягивая каждый звук, смакуя ее имя. Шепотом. Она слышала шум его дыхания.</p><p class="p1">— Э–ли–за-бет! — шептал он на все лады. — Э–ли–за-бет!</p><p class="p1">Она молчала.</p><p class="p1">— Я люблю тебя!</p><p class="p1">Господи, только этого ей и хотелось! Чего же еще! Он сейчас скажет ей, что не может жить без нее, что он вылечится на ней, что ничего подобного никогда больше не будет... Ведь он сущий дьявол, — как он угадал, что она здесь? Это можно почувствовать только тем самым, непостижимым чутьем, которое дает истинная, единственная любовь! Заткнитесь все! Она существует! Кроме нее, нет ничего! Господи, Господи! Наконец все будет, как надо, — но как же быстро она забылась, разнюнилась, бросила надежду! Как можно было из–за одного-единственного его нервного срыва так безумствовать, так махнуть рукой, так оставить его, несчастного, один на один с боязнью! Все будет прекрасно. Он все знает. Он все чувствует, не мог же он шпионить за ней, когда она входила в его подъезд! Они будут вместе. Он сейчас придет.</p><p class="p1">Она молчала, но все ее существо было проникнуто восторженной радостью, которая не знает слов, не находит выхода, не хочет разрешения.</p><p class="p1">— Я люблю тебя. Я хочу, чтобы ты кое–что для меня сделала.</p><p class="p1">Для тебя, для тебя — такого? Все, что угодно. Вернись, милый, и я буду твоей вещью! Только не будь таким, как тогда, — да, быть с тобой, но не такой, не такой ценой!..</p><p class="p1">— Это очень простая вещь. Прошу тебя.</p><p class="p1">Она молчала и всхлипывала в ответ. Почти беззвучно. Он, наверное, не слышал. Но всегда все понимал. Знал.</p><p class="p1">Элизабет повесила трубку.</p><p class="p1">Что ж, одеваться и не потребуется. Ни чулок, ни трусов на ней уже нет. Она расстегнула рубашку. Черная маечка — вот все, что на ней осталось. Он так любил. Ничего, только маечка, которую можно осторожно приподнять, под которую можно запустить руку. Бретельки которой можно снять с плеч, и она соскользнет. Потом она выйдет из нее, переступив. И он подхватит на руки, прижмет к себе, задохнется...</p><p class="p1">Он вошел неправдоподобно быстро. Видимо, стоял внизу. Значит, все–таки следил? Хотя едва ли. Ведь она здесь уже полчаса. Не может быть, чтобы он с утра выжидал в своей засаде. Иначе откуда ему знать, что она вошла? Только засада с утра — или чутье. Второе куда вероятнее, и все же подозрение томило ее...</p><p class="p1">— Элизабет! Это очень простая вещь. Прошу тебя.</p><p class="p1">Он не поцеловал ее, не погладил по голове. Он был серьезен и сосредоточен, как иногда, перед тем как опробовать новое свое изобретение. Она смотрела на него снизу вверх, сидя на кровати, смотрела с мукой — мукой гибнущей, абсурдной, последней надежды.</p><p class="p1">Джонни решительно подошел к шкафу. Достал оттуда черный шелковый шарф. Повязка. На этот раз черная. В цвет майки. Колорист задумался бы. Нет, нет, — совпадение! Просто совпадение! Ведь и майка–то если вглядеться, не черная, а темно-синяя... Только и всего...</p><p class="p1">Он протянул ей повязку. Хочет, чтобы сама. Может быть, это добрый знак.</p><p class="p1">Она вздохнула, взяла повязку и быстро завязала себе глаза. Так, чтобы все было честно. Не подглядеть. Если убьет, — может быть, это и к лучшему, уж про это она успела подумать. По крайней мере сразу — и рядом с ним, вместе с ним.</p><p class="p1">Он проверил, хорошо ли у нее завязаны глаза. Погладил плечи и шею, поцеловал в левое плечо. Осторожно коснулся затылка, провел рукой по лопаткам. Поцеловал в ключицу.</p><p class="p1">— Я люблю тебя!</p><p class="p1">Она покорно сложила руки на коленях. Жалкое, должно быть, зрелище. Сидит на кровати, одна, с безвольно опущенными руками, завязанными глазами, в одной маечке, почти голая... Хорошо еще, что не связанная. Что дело происходит не зимой. А то, чего доброго, он бы связал ее, открыл все окна, а сам надел шубу. И наблюдал бы из своего угла. С него станется. Нет, нет, не может быть...</p><p class="p1">Шорох в дверях. Он уходит? Ну, тогда это их последняя игра и вообще последим его шутка! А что, если нанять людей, избить его как следует, насладиться его мукой и унижением?! Пнуть в улыбочку... Почему нет? Нет, нет! Кого она наймет — Сен-Клера, который может справиться только с китайским мальчиком?.. Отдастся первому попавшемуся негру, а в оплату попросит его измочалить Джонни?! Нет, нет. Сама мысль об этом была ей противна, бесконечно отвратительный план. Он ведь сам тебя довел до этого состояния, подумала она. Без посторонней помощи. Стоит отплатить ему взаимностью, — по крайней мере, честную расплату он заслужил.</p><p class="p1">Но он был здесь, она чувствовала его присутствие, все взаимно. Он открыл дверь, но не ушел. Почти тут же ее захлопнул. Чьи–то бесшумные шаги, которые она скорее угадала, чем почувствовала... Он проверил, нет ли кого за дверью? Может быть, за ним следят, и отсюда все его страхи? Как же, следят... Прежние женщины... Что за глупость!</p><p class="p1">Чьи–то холодные руки коснулись ее голых колен. Она вскрикнула.</p><p class="p1">Она почувствовала, как Джонни у входной двери закурил. Она поняла: это чужие руки. Узкие ладони. Длинные пальцы, острые ногти. Жадный, душный лепет на незнакомом языке, кажется, испанском... У Элизабет закружилась голова. Она потеряла всякое представление о происходящем.</p><p class="p1">— О, ты хороша, — задыхаясь, шептал голос. — Твое тело нежно, твоя кожа влажна, это признак чувственности, — послышался сдавленный смешок. Джонни не издавал ни звука, но Элизабет чувствовала, что он стоит у двери. Неведомая женщина продолжала гладить ее голые ноги, потом опустила бретельки у майки, коснулась груди чуть выше соска...</p><p class="p1">— У тебя прекрасная фигура. Он молодец. Да и лицо у тебя прекрасное, хотя я не вижу всего...</p><p class="p1">Черт побери, что он хочет делать? Переспать с нами двумя? Заставить нас совокупляться на его глазах? Лесбос, говорят, возбуждает этих скотов... Может быть, он окончательно стал импотентом и уже ничто не способно его возбудить? Юстиниан заставлял мальчиков совокупляться перед ним... Или Тиберий...</p><p class="p1">Но когда она ощутила прикосновение чужих губ к своему животу — скользких, жирно накрашенных губ, она чувствовала это, — ей стало невмоготу. Терпеть это дольше? — нет, ни секунды! Тем временем властная рука — рука Джонни, подошедшего ближе — уже касалась ее колен, проскальзывала между ними...</p><p class="p1">Элизабет вскочила и сдернула повязку. Перед ней на коленях стояла улыбающаяся, невыносимо вульгарная, грубо накрашенная мулатка лет тридцати и глядела ей в глаза с такой победительной наглостью, что Элизабет в первую секунду не сообразила, что делать и как вырваться отсюда. Она знала, что ей нельзя было возвращаться сюда. Это было под запретом. Навсегда. И теперь — кончено все, все, бесповоротно!</p><p class="p1">Она лихорадочно одевалась. Джонни не мешал ей. Он, скрестив руки на груди, наблюдал за новой забавой. Мулатка, наоборот, стягивала майку, и без того весьма откровенную. Тяжелая смуглая грудь, которую она сама оглаживала... воплощенное бесстыдство! Элизабет мгновенно натянула чулки. Джон грубо толкнул ее на постель. Она вырвалась с силой, которой сама от себя не ожидала.</p><p class="p1">— Сиди! Ты никуда не уйдешь!</p><p class="p1">Она не отвечала. Как же! Такое удовольствие, уже вот-вот, все было готово... Переживешь, импотент, садист, палач-недоучка!</p><p class="p1">— Что ты собираешься делать? Куда ты? Постой!</p><p class="p1">Она уже стремглав неслась к дверям. Резко хлопнула дверью — прямо ему в лицо. Нет, теперь уже никогда — ни тоски, ни жалости, ни презрения даже: одна брезгливость, брезгливость... Вон, вон!</p><p class="p1">Ключи остались лежать на столе. Мулатка была теперь одна в комнате. Да, что говорить, Джонни всегда был со странностями, с большими странностями... Но зачем он позвал ее к этой девчонке, которая ни к чему не была готова и ничего, верно, толком не умеет? В былые времена они веселились иначе. Взять хоть все эти шуточки с утоплениями в ванне, прижиганиями сигаретой, с драками... У него была крутая компания, когда он был помоложе. А теперь, видать, решил остепениться и перед свадьбой научить жену кое-чему из их прежних забав. Она оказалась недотрогой. В этом есть свой шарм. Остатки невинности. Незажившая ранка на месте плевы. Какая прелесть! Жаль, что ничего не получилось. Но мог бы он напоследок позабавиться хоть с ней самой! А впрочем... Забавно, как он с ней теперь поговорит! И расскажет «ли ей когда–нибудь о том, чем занимался в прыщавой юности, с дружками, которым было денег некуда девать. Она–то знает. Бедняга Джонни! Каково–то ему сейчас будет!</p><p class="p1">Она стояла посреди комнаты и хохотала.</p><p class="empty-line"/><p class="p1">...Элизабет успела вскочить в такси перед самым носом Джонни, и понятливый водитель тронул с места так резко, что Джон едва ли успел проследить за номером. Хотя к чему ему номер?! Не пустится же он вдогонку.</p><p class="p1">Это падение... бесповоротное, полное падение. Но удерживаться от него было бесполезно: с первого мига их связи падение было предрешено. Куда теперь? Домой? Нет, что угодно, но не пустая квартира, не быть наедине с автоответчиком, со своими мыслями... К Молли? К счастливице Молли? Нет, прочь и это! Куда угодно, к людям, в шум, в ресторан, в любое, самое грязное заведение, напиться до беспамятства, лечь под первого попавшегося, — лишь бы вытеснить из памяти скользкие прикосновения мулатки, ее наглый хохот, властную грубость Джонни, — грубость, за которой, она поняла теперь, только слабость, отчаяние и болезнь. Прочь! Прочь! С кем угодно, под кого угодно, — лишь бы заполнить эту пустоту другим, убедиться, что с другим для нее еще возможно если не наслаждение, то хотя бы его жалкая замена. Прочь! Лишь бы стереть их прикосновения чьими угодно другими — грязными, грубыми, наглыми, но чужими и потому не трогающими души!..</p><p class="p1">Таксист остановил машину, когда она увидела небольшой бар, в котором никогда не бывала прежде. Элизабет тронула водителя за плечо. Визгнули на мокром асфальте тормоза. Она выскочила на улицу, под проливной дождь. Мокрая, обезумевшая, она влетела в бар и ринулась в толпу, танцующую, вечернюю, праздничную.</p><p class="p1">Здесь пахло духами, потом, разгоряченным телом, но и еще один запах, странный, острый, носился в воздухе. Красноватое, болезненное освещение, маленький дымный зал. Танцевали с рюмками, с кофейными чашечками в руках, курили, — нет, курили, кажется, только табак, но лица у многих были отрешенные и счастливо-безучастные, такие бывают под кайфом, Элизабет знала это... Лишь раз в жизни она сама покурила травки и сохранила об этом не лучшие воспоминания: ей казалось, что она может проходить сквозь стены, она двигалась между каких–то прозрачных сверкающих плоскостей, похожих на застывшие лопасти гигантского самолетного пропеллера. Потом лопасти закружились, — очнулась она от того, что Стефани била ее по щекам... Одна из танцующих напомнила ей Стефани... нет. Обман зрения. Откуда? В этом дыму, в красном полумраке она возбужденно осматривала лица и не могла понять, что будоражит присутствующих. Запах возбуждения, даже не запах, а некие флюиды, которые она всегда улавливала безошибочно, — все это неспроста. И лишь через несколько минут она уловила смутное шевеление в дальнем углу зальчика, к которому никто не приближался. Там девчонка-негритянка, голая, стройная и блестящая от пота — лет пятнадцати, не больше, — хихикая, дергалась в бешеном ритме — назвать это танцем было невозможно, — а на коленях перед ней стояли два негра, юноша и старик, в каких–то тряпках, напоминавших набедренные повязки. На девчонке тоже был купальник, которого Элизабет сначала не заметила, и все это создавало иллюзию благопристойности... О Господи! На какую окраину ее занесло?! Но все равно. Она подошла к стойке, взяла бренди, осушила одним глотком. Ей обожгло внутренности, и она вспомнила, что ничего не ела с утра. Пускай! Быстрее ударит в голову. В эту минуту дверь распахнулась, и Элизабет увидела Джона, складывающего зонт.</p><p class="p1">Здесь он явно был завсегдатаем, — на него обернулись, некоторые кивали и подмигивали. Господи! Неужели это судьба дает им обоим одуматься в последний раз? Что же, он зашел сюда, преследуя ее? — нет, этого не может быть... Значит, он здесь для того, чтобы утешиться после неудачи со своей проклятой затеей! Пришел развлечься в злачное местечко черт знает где! И ее занесло сюда же! — нет, этому не может быть разумного объяснения. Их сводит судьба — вот и все. И только. И это последний, последний-последний, самый последний раз.</p><p class="p1">Но, может быть, он ее еще не видит? Потому что она не переживает еще одной пытки! Что угодно, но не это, — может быть, еще удастся избежать нового возвращения?!</p><p class="p1">Она кинулась в гущу зрителей, которые чуть покачивались в такт музыке, и кинулась на шею первому попавшемуся. Это был усатый, мрачный, потный тип, высокий, лет сорока, смуглый и неулыбчивый. И даже когда она повисла на его шее, он в первый момент не сумел скрыть своего изумления — его оторвали от зрелища в тот самый момент, когда молодой негр при поощрительном хохоте старого прижался лицом к трусам девчонки! И с чего это вдруг его выбрала сумасшедшая с мокрой от дождя головой, с безумными глазами, глядящими в никуда? Глаза дикой кошки. Но что было делать, да и блондинка была недурна, — он обнял ее небрежно и снисходительно, потом лениво поцеловал, и тогда она прижалась к нему с силой и страстью, каких трудно было ожидать от столь анемичного, бледного и продрогшего существа... Хотя в таких есть свой шарм!</p><p class="p1">Он не успел додумать мысль о шарме, когда властная рука легла ему на плечо. В тот же миг Джонни оторвал его от Элизабет и почти неуловимым, но точным движением отшвырнул в сторону. Путаясь в собственных ногах, усач отлетел метра на два, и присутствующие не нашли в этом ничего необычного. Прежде чем усач успел сообразить, следует ли ему ввязываться в драку и за что, собственно, судьба сперва отметила его, а потом немедленно отлупила, Элизабет уже прижалась к Джонни и уткнулась мокрым лицом в его грудь.</p><p class="p1">Они танцевали молча. Джон не проронил ни слова, и лицо его было непроницаемо. Да Элизабет и не поднимала на него глаз. Она не думала ни о будущем, ни о прошлом. Судьба была сильней. Судьба все решила. Что будет дальше — решит она, Элизабет. Но пока решила судьба.</p><p class="empty-line"/><p class="p1">...Человек и собака переминались с ноги на ногу, глядели в пол, тяжко вздыхали. Элизабет глядела на них с безразличием. Опять пришли. Будут торговаться. Ничего не купят. Все равно.</p><p class="p1">— Я... это, забыл вам представиться. Меня зовут Джеймс Скоукрофт. А это Пиф. — Человек поцеловал ей руку, пес осторожно кивнул головой.</p><p class="p1">Они стояли перед «Ожиданием».</p><p class="p1">— Мы решили... значит... купить это.</p><p class="p1">Элизабет недоверчиво взглянула на покупателя.</p><p class="p1">— Да, — он важно поджал губы. — Мы, значит, покупаем «Ожидание».</p><p class="p1">Помолчали.</p><p class="p1">— Вот так живешь, живешь, — внезапно заговорил Джеймс Скоукрофт с воодушевлением, — все ждешь чего–то... да... это... а ничего не происходит. И никогда уже не произойдет. Я вдовец. Уже почти 20 лет. Друзей не осталось, никого не осталось. Вот... один только у меня друг. — Он погладил собаку по голове. Пиф лизнул руку хозяина.</p><p class="p1">— Никого не вижу, — продолжал старик. — Изволите слышать... уже разучился говорить по-человечески. Сам себя... это... не всегда... да.</p><p class="p1">— Не всегда понимаете? — подсказала Элизабет.</p><p class="p1">— Да. И я... это... не понимаю, зачем покупаю у вас... значит, картину. Но только... это про меня. Про меня. И это должно висеть в моем доме. Я ведь... это, не бедный человек. Вы не смотрите, что я так одеваюсь. Просто все так бессмысленно, что можно ходить голым.</p><p class="p1">Еще помолчали.</p><p class="p1">— Надо завести собаку, — внезапно произнесла Элизабет.</p><p class="p1">Покупатель кивнул.</p><p class="p1">— Собаку надо заводить в любом случае.</p><p class="p1">— Когда вам хотелось бы получить картину?</p><p class="p1">Старик задумался.</p><p class="p1">— Деньги я вам заплачу сегодня. Сейчас... это... выпишу чек. А можно... картина пока останется у вас?</p><p class="p1">Элизабет удивленно поглядела на него.</p><p class="p1">— Я боюсь, как бы Пиф не стал ревновать меня к ней. Он уже свыкся со всеми вещами в нашем доме. Двадцать лет ничего не меняется. Ладно, Пиф?</p><p class="p1">— Вы сможете взять картину в любой момент, — сказала Элизабет.</p><p class="p1">Старик медленно заполнял листок в чековой книжке. Пес заглядывал ему через плечо.</p><p class="p1">— Я заведу собаку, — убежденно произнесла Элизабет.</p><p class="empty-line"/><p class="p1">На закрытии экспозиции Эрла было неожиданно шумно. Впрочем, этого следовало ожидать. Выпить на дармовщинку явился даже Сен-Клер, что уж говорить о корреспондентах второстепенных изданий, критиках со своими бабами и без баб, одиноких художниках и прочих завсегдатаях подобных тусовок.</p><p class="p1">Эрл не пришел.</p><p class="p1">Молли, Дженнифер и Ингрид сбились с ног, разнося водку, шампанское и закуску.</p><p class="p1">Подвыпивший Грегори приставал к Элизабет.</p><p class="p1">— Дорогая, помогите мне! — орал он на весь зал. — Я ничего не понимаю!</p><p class="p1">— Что вы не понимаете, Грегори? — вежливо интересовалась Элизабет.</p><p class="p1">— Я не понимаю, отчего вы носитесь со своим Эрлом? Что вы находите в этой мазне? Я ему сам так и сказал однажды, — Грегори покачнулся, но удержался на ногах. — Старик, говорю ему, ты пишешь странные картины, да! Каких–то баб рисуешь с титьками, так что и не разобраться — где баба, а где титька...</p><p class="p1">— И что он вам ответил? — хохотнула Молли, проходя мимо с подносом.</p><p class="p1">— Ну, что? — удивился Грегори. — Стоит и молчит, как баран. Хоть бы выпить предложил. Поглядел на меня так... странно и ушел. А на критиков нельзя глядеть странно! — расходился Грегори. — С критиками надо дружить. Правда, лапуля? — он ущипнул Элизабет за ягодицу и попытался приобнять, приблизив к ее лицу свой слюнявый рот.</p><p class="p1">Та вцепилась ему в волосы. Грегори взвыл, хватая ее за руки и тщетно пытаясь освободиться. Но тут же ее хватка ослабла. Она опустила руки и устало сказала: «Отвяжись, щенок, сил нет...»</p><p class="p1">Сен-Клер смотрел на нее издали и, кажется, понимал.</p><p class="p1">Он подошел к ней и шепнул на ухо:</p><p class="p1">— Дорогая, давайте сбежим отсюда.</p><p class="p1">— Я и без вас сбегу, — тем же заговорщическим шепотом ответила она. — Бегать лучше поодиночке. Это я недавно поняла.</p><p class="empty-line"/><p class="p1">Джонни открыл глаза. Серый туманный рассвет заглядывал в огромное окно, хотя никто его об этом не просил. Медленный мелкий снег опускался на мостовую. Элизабет, одетая, с сумочкой через плечо стояла у открытого платяного шкафа, уткнувшись в пальто Джона.</p><p class="p1">— Ты уходишь?</p><p class="p1">— Да.</p><p class="p1">Он знал, что уговоры бесполезны и на этот раз она действительно уходит. И все же сказал:</p><p class="p1">— Останься, Лиз.</p><p class="p1">Он проговорил это беспомощно, как ребенок. Глаза его были как никогда серьезны. Верно, спросонья он еще не успел нацепить свою обычную маску. Знакомая улыбочка никак не желала приклеиваться к его бледным губам.</p><p class="p1">— Нет.</p><p class="p1">— Ты мне нужна.</p><p class="p1">— Я знаю. Но иначе я буду сама себе не нужна.</p><p class="p1">— Лиз.</p><p class="p1">В голосе его звучала не прежняя властность, а безысходная усталость и безнадежная тоска.</p><p class="p1">Она молчала.</p><p class="p1">— Хорошо, — произнес он после паузы. — Я только хочу, чтобы ты знала. Я не маньяк и не садист. Не хочу, чтобы ты вспоминала обо мне так.</p><p class="p1">Она смотрела в окно. Джонни сел на постели.</p><p class="p1">— У меня шесть братьев, — тихо сказал он. — Я самый младший. Мы жили в небольшом городке, рядом с Чикаго. Отец работал на сталелитейном заводе. Выматывался, как черт, приходил вечно грязный, злой. А мать — ну как это? — клерком была... нет... кассиршей, так это, кажется, называется... Так вот, у меня семья, — он закрыл глаза и снова лег на кровать, закинув руки за голову. Ответа не было.</p><p class="p1">— И вот, понимаешь, они уже не работают. На пенсии. Я им помогаю.</p><p class="p1">— Слишком поздно, — сказала Элизабет.</p><p class="p1">— Почему? — удивился он. — Моя помощь вполне своевременна. Теперь я и сам встал на ноги.</p><p class="p1">— Я не о том, — тихо произнесла Элизабет.</p><p class="p1">«Черт побери, — подумал он. — Слезу я из нее выжимаю, что ли?!»</p><p class="p1">— Ладно, — сказал он. — Ты будешь знать все. Представь чикагского подростка. — Он попытался усмехнуться. — Дитя улицы и все такое. Меня часто били. Толстый и... в общем, понятно. Однажды мне завязали глаза и поднесли ко рту ложку. В ложке был засохший кусок собачьего дерьма. Я не мог есть три дня. И тогда я сказал себе: я стану, как они! С двадцати лет — вообще безнадежный разгул. Легкие деньги. Свинство такое, что страшно вспомнить. Я должен был стать, как все, и круче всех. И стал грязнее всех. Хотя оставался толстым ребенком из Чикаго. У меня было много женщин. Молодых.</p><p class="p1">Он встал с дивана, остановился напротив Элизабет, заслоняя ей окно.</p><p class="p1">— Но я хочу, чтобы ты знала. Никогда раньше я подобного не испытывал. До тебя — ни с кем. Ты знаешь... все дело в том, что ты чувствуешь меня. У тебя ведь тоже что–то было... такое, да?</p><p class="p1">Она повернулась я медленно пошла к двери.</p><p class="p1">— Постой! — закричал он. — Слушай, помнишь, как мы познакомились? Ну, еще был цыпленок, да? Курица, несущая деревянные яйца? Признайся, у тебя в детстве была такая игрушка! Была ведь, да? Где она теперь?</p><p class="p1">— В чулане, — пробормотала Элизабет.</p><p class="p1">— А мне ее сломали! — крикнул Джонни. — Наступили ногой — и кррак! А мне ее было жалко, слышишь, я думал, ей больно! У нее же цыплята внутри! А они — крррак!</p><p class="p1">Она на секунду остановилась.</p><p class="p1">— Останься, — вдруг прошептал он умоляюще.</p><p class="p1">— Нет, — она покачала головой, полуобернувшись к нему. — Ты ведь никогда не успокоишься. Пока я не буду принадлежать тебе вся. Целиком. Я слишком долго ждала.</p><p class="p1">Она помедлила.</p><p class="p1">— Я, наверное, пришлю кого–нибудь за вещами.</p><p class="p1">Хлопнула дверь.</p><p class="p1">Джонни рухнул на диван, закрыл лицо руками, но тут же взял себя в руки, встал и начал медленно ходить по комнате.</p><p class="p1">Губы его искривила знакомая усмешка.</p><p class="p1">— Я люблю тебя, Элизабет, — сказал он хитро. — Я досчитаю до пятидесяти, и ты вернешься. Куда ты денешься. Раз…</p><p class="empty-line"/><p class="p1">Элизабет, плача, ничего не видя перед собой, шла по утренней улице, в толпе народа, спешащего на службу. Ее толкали, она не реагировала.</p><p class="p1">Джонни подошел к окну. Он не видел ее среди мелькания спин и плеч. Город приходил в себя после первой зимней ночи, сырой и туманной. Холодный серый свет. Снег повалил гуще, и сквозь хлопья уж точно было ничего не разглядеть. Облако, похожее на рыбу, наползало с Востока.</p><p class="p1">— Двадцать шесть... двадцать семь... двадцать восемь...</p><p class="p1">Элизабет, не оглядываясь, шла по улице. Слезы на ее лице смешивались с тающим снегом. Мальчишка на углу испуганно проводил ее взглядом.</p><p class="p1">— Сорок девять... Пятьдесят...</p><p class="p1">Сейчас! Сейчас!</p><p class="empty-line"/><p class="p1">Элизабет повернула за угол.</p><p class="p1">Впереди был длинный, поганый день. Впрочем, не такой уж и длинный. Зимой быстро темнеет.</p></span><span id="id11"><div class="title2">
<p class="p"><strong>IX 1/2</strong></p>
</div><p class="p1">Мы прощаемся с нашими киногероями.</p><p class="p1">В данном случае это честное слово — «наши». Хотя мы не читали романа Элизабет МакНил, по которому Ник Лайн снял свой знаменитый фильм. Нам неизвестно, сколь точно и обстоятельно режиссер обошелся с романом. Зато можем сказать с полной определенностью: от фильма в нашей книге осталось немного. Наш роман с ней протекал по той же схеме, что и роман Джонни с Элизабет. Мы не жалеем об этом.</p><p class="p1">Глядя с русского берега на несчастную Элизабет и противного Джонни, трудно было удержаться от соблазна сочинить такой эротический роман, который соответствовал бы нашим представлениям о «тамошней жизни». Что осталось от них, а что привнесено нами, — тайна.</p><p class="p1">К тому же фильм давал массу возможностей для импровизаций. Ведь все или почти все, что должно быть в привычном для российского читателя романе, оставалось за кадром. Мы не знали психологической подоплеки происходящего.</p><p class="p1">Тогда мы решили домыслить то, что выкинул режиссер. О чем он умолчал.</p><p class="p1">Прошлое и настоящее героев, их любовные переживания, их странности и безумства, — все попытались объяснить, понять, угадать...</p><p class="p1">Должно быть, ничего не угадали.</p><p class="p1">Так ли уж это важно? Важно, решит читатель, знакомый с творчеством Э. МакНил или лучше нас разобравшийся в сюжете «Девяти с половиной недель». Но мы писали для другого читателя. Для того, кто сумеет (или хотя бы попробует) оценить прелесть литературной импровизации, игры, — или, если угодно, шутки. Впрочем, герои расстались, любовь прошла, сердце разбито, — до шуток ли?</p><p class="p1">Наконец, только проклятый неврастеник станет смеяться над прекрасной раздетой Ким Бэсинджер... то есть Элизабет. Только очень гнусный, нехороший человек захохочет над ее любовью и утратой.</p><p class="p1">Мы прощаемся с Джонни и Элизабет. Мы не виноваты ни в чем. Так получилось. Герои больше не встретятся никогда. И нам жаль с ними расставаться. Игра окончена, в зале зажигается свет, зрители расходятся по домам, усталые авторы варят на кухне кофе, курят — одну на двоих — последнюю сигарету и негромко беседуют о любви.</p><p class="empty-line"/></span></span>
