<span><span id="id3"><div class="title2">
<p class="p"><strong>II</strong></p>
</div><p class="p1">Жонглер-мулат подкидывал булавы. Он проделывал это не с той жалобной, вымученной улыбкой, с какой большинство уличных фокусников вытворяют свои копеечные чудеса, — нет, он радовался вместе со всеми и получал, ей-богу, искреннее удовольствие от своего ремесла. Не глядя на шляпу, в которую изредка кидали мелочь. К спине жонглера была привязана связка воздушных шаров, и всем своим видом он показывал, что при желании мог бы улететь, и только желание потешить себя и публику еще удерживает его на тротуаре.</p><p class="p1">Джон тоже был счастлив — беспричинно, хотя только таким и бывает настоящее счастье. Стоял прохладный, чреватый дождем денек начала осени, и Джон любил такие деньки. Был выходной, и он любил выходные. Неподалеку отсюда он недавно переглянулся с очаровательной, застенчивой блондинкой, которая смотрела на него с любопытством и приязнью, и он любил блондинку. Спешить было некуда.</p><p class="p1">Он проходил вдоль торговых рядов, глядя, как редкие покупатели беззаботно, из чистого любопытства останавливаются примерить шапку или карнавальную маску. Купил зачем–то клоунский нос и, надев его, развеселил пробегавшего мимо мальчишку. Рядом неистовствовал джаз-банд, наяривавший милые сердцу Джона мелодии шестидесятых годов. Старый негр самозабвенно дул в саксофон, в паузах напевал, притопывал ногой и строил рожи слушателям. Они играли «Садись в поезд А». Старина Дюк. В представлении Джона Эллингтон был таким же добродушным стариком, искренне радующимся миру, дождю, случайной улыбке прохожего. Садись в поезд А. Что–нибудь должно было случиться. Джон не торопил судьбу: она решала за него.</p><p class="p1">...Элизабет примерила шаль.</p><p class="p1">— Как красиво! — выдохнула она, хотя обычно не разговаривала с уличными торговками и редко покупала новые вещи — не столько из жадности или стесненности в средствах, сколько из привязанности к старым.</p><p class="p1">— Ручная работа, — сказала пожилая торговка с сильным славянским акцентом. — Триста долларов.</p><p class="p1">— Сколько?</p><p class="p1">— Триста. Меньше никак.</p><p class="p1">Элизабет виновато улыбнулась.</p><p class="p1">— Нет, извините. Очень красиво. Но не по средствам.</p><p class="p1">Это было по средствам, но триста долларов за шаль — нет, как угодно, это не в ее правилах. Вот продадут что–нибудь из работ Эрла, тогда, возможно...</p><p class="p1">Воздух был полон мыльными пузырями. Их выдували мальчишки, взявшие соломинку у торговца — просто так, на пробу, но они уже десять минут взбалтывали мыло в пузырьке и выдували шары, а он и не думал отбирать у них свой товар. Один пузырь опустился на рукав Элизабет и лопнул не сразу. Она улыбнулась пузырю.</p><p class="p1">Элизабет вдруг замерла, вскрикнув от восхищения. Детство глядело на нее деревянными куриными глазами. Папа подарил ей в день рождения... когда это было, лет двадцать назад? — автоматическую несушку, к ней еще, помнится, был такой ключик... золотой... вот здесь... он поворачивался с легким скрипением, и Ряба начинала беспрерывно нести круглые цветные яички. Отец умер от рака. Это было давно. Элизабет с грустью подумала о том, сколько ж там пыли... в том чулане, куда она выбросила все свое детство!</p><p class="p1">Детство с хитрой латиноамериканской ухмылкой глядело на нее. Продавец не был особенно удивлен. Эти нервные дамочки часто с умилением замирают возле его несушки, да только никогда ни черта не покупают. Обилие яиц их, что ли, притягивает?</p><p class="p1">— Сколько? — спросила Элизабет.</p><p class="p1">— Для вас — сорок, — он осклабился еще нахальнее.</p><p class="p1">— Тридцать, — строго молвила блондинка.</p><p class="p1">— Тридцать пять!</p><p class="p1">— Тридцать долларов, и ни цента больше!</p><p class="p1">— Ладно, — весело согласился он. Похоже, дамочка всерьез нацелилась на покупку.</p><p class="p1">Им помешали.</p><p class="p1">Кто–то тихо проговорил у нее за спиной: — Всякий раз, как я вас вижу, вы покупаете цыплят.</p><p class="p1">Она оглянулась.</p><p class="p1">Тот же строгий темный костюм сидел на нем так же безупречно. И тот же спокойно-одобряющий взгляд, и голова, чуть склоненная набок... Мужчина «из лавки». Рыба, бьющаяся на прилавке. Можно улыбнуться в ответ, ведь это ни к чему не обязывает...</p><p class="p1">— Вас зовут Джон, — сказала она Бог весть почему.</p><p class="p1">— Еще бы, — произнес он. — А вас зовут... — он изобразил задумчивость, — Мэри. У нашей Мэри был петух, который яйца нес за двух.</p><p class="p1">Она рассмеялась.</p><p class="p1">— Я угадал?</p><p class="p1">— Ага. У нашей Мэри был баран, он брал овечек на таран.</p><p class="p1">Несушка не унималась, рядом с ними выросла уже целая гора деревянных шариков. Продавец улыбался все нетерпеливее.</p><p class="p1">— А почему... — она замялась, — почему когда я вижу вас...</p><p class="p1">— Что?</p><p class="p1">— Вы улыбаетесь мне.</p><p class="p1">— Вы голодны?</p><p class="p1">— Странный переход.</p><p class="p1">— Это по ассоциации с бараном. Не могу же я его ассоциировать с собой, — как вы полагаете, Мэри?</p><p class="p1">— Вообще–то, — сказала она, — меня зовут Элизабет.</p><p class="empty-line"/><p class="p1">В итальянском ресторанчике по случаю выходного были заняты все столики, кроме единственного, у окна. Туда они и отправились. Итальянец с густой шапкой курчавых волос, улыбаясь до ушей, склонился перед ними.</p><p class="p1">— К вашим услугам!</p><p class="p1">Джон, не советуясь с ней, — видимо, он бывал здесь часто, и она не возражала, — заказал спагетти, кьянти, салат и мороженое. Спагетти она позволяла себе редко: берегла фигуру. Но сегодня ничто не имело значения. Впервые за долгие годы она ни о чем не думала и не следила за собой со стороны.</p><p class="p1">Красавец? Нет, какой же это красавец. Но противиться этому обаянию, нежному и властному, не было никакой возможности. Он и ел неправильно, некрасиво, но неотразимо обаятельно. Разговаривал с набитым ртом. Находил у себя лакомые кусочки и протягивал ей на вилке.</p><p class="p1">— Вы не находите, что сыру маловато?</p><p class="p1">— Нет, что вы. По-моему, просто прелесть.</p><p class="p1">— Это вы по молодости и неопытности. Ничего, я вас еще угощу настоящим спагетти. Возьмите вот это.</p><p class="p1">Он протянул ей на вилке оливку. Она потянулась к ней губами. Он чуть приподнял вилку, и ей пришлось привстать со стула, чтобы дотянуться.</p><p class="p1">— Между прочим, — сказал он, втягивая в себя спагетти и смешно шевеля полными губами; отчего–то она не отрывала взгляда от его губ, — между прочим, именно на этом месте сидел осенью 1963 года известный всему нецивилизованному миру Малыш Билли. Вы знаете, кто это такой?</p><p class="p1">Элизабет затрясла головой.</p><p class="p1">— Что ж вы так. Это была личность замечательная. Сидел, понимаете ли, тут и жрал спагетти. Ел все то же, что и вы. И совесть его, отягощенная сотнями садистских убийств, была чиста и спокойна, как у новорожденного. Малыш Билли был малый без комплексов, — Джон отпил изрядный глоток, все так же покровительственно и поощрительно улыбаясь. — И вот ел он салат, пил кьянти, и тут ему, представьте себе, вышибли мозги. Разнесли весь череп. Из крупнокалиберного пистолета. Он чрезвычайно удивился и чуть не подавился.</p><p class="p1">Она против воли засмеялась.</p><p class="p1">— Ну вас!</p><p class="p1">— Ага, а убийца сидел вон там. И ел то же самое, что и я. Потом выбежал на улицу, и поминай как звали. Вот там, где ребенок сидит, видите, тот, что весь жилетик обкапал мороженым, — вон там он и сидел. А когда выстрелил, то так разволновался почему–то, что даже не доел мороженое. Хотя волноваться, по-моему, следовало как раз Малышу Билли. Так что место, где вы сидите, — до известной степени историческое. Не так все просто. У итальянцев свои дела и свои счеты. Семейный ресторанчик. Оглянитесь вон на того, усатого...</p><p class="p1">Элизабет обернулась. Мрачный тип с сединой в проволочных, жестких волосах, с шрамом, с тяжелыми массивными часами на волосатой лапище смотрел на них исподлобья, постукивая пальцами по столу.</p><p class="p1">— Еще не хотите ли? — безмятежно спросил Джон, протягивая ей вилку с кусочком ветчины.</p><p class="p1">Хохоча, она встала. Они выбежали из ресторана и на улице продолжали хохотать вместе.</p><p class="p1">Он залез в карман и достал оттуда сверток.</p><p class="p1">— Отвернитесь.</p><p class="p1">Она покорно встала к нему спиной и вдруг почувствовала, что плечи ее окутывает что–то волшебно-мягкое и уютное. Он чуть задержал свои большие, мягкие ладони на ее плечах. Плечах подростка.</p><p class="p1">— Узнаете?</p><p class="p1">Это было цветастое чудо, которое приглянулось ей на улице. Легкая, теплая, яркая роскошь. Шаль, на которую она пожалела триста долларов, кажется, могла бы заменить и мужские объятия своим окутывающим, нежным теплом... но не эти объятия.</p><p class="p1">Она задохнулась и прижала руки к груди.</p><p class="p1">— Только ничего не говорите.</p><p class="empty-line"/><p class="p1">В тумане смутно рисовались дома на том берегу. Джон протянул ей руку. Они долго перепрыгивали с лодки на лодку, шли по кромке воды, наконец он достал ключ и отомкнул дверь небольшого домика на берегу.</p><p class="p1">На огромном окне чуть колыхалась прозрачная занавеска. Холостяцкая обстановочка, отметила она про себя. Неужели он здесь и живет?</p><p class="p1">— Это все ваше?</p><p class="p1">— Нет, это принадлежит моему другу. Добро пожаловать.</p><p class="p1">Джон сразу направился к большой низкой кровати, занимавшей не меньше трети комнаты. Этакое игрище-лежбище. Он снял покрывало и аккуратно сложил его. Повесил на спинку стула. Потом подошел к шкафу, вынул простыню снежной белизны, хрустящую, свежую. Она представила прохладу этой простыни и зябко вздрогнула.</p><p class="p1">Джон подошел к ней и осторожно снял шаль.</p><p class="p1">— Вам не кажется, — она осеклась, — не кажется... что вы слишком многое себе позволяете?</p><p class="p1">— И тебе так не кажется, — сказал он, вернувшись к постели и продолжая колдовать над простыней.</p><p class="p1">— А мне кажется, что вы меня с кем–то спутали. И вообще... как–то для вас все слишком просто.</p><p class="p1">Джон взялся за постель всерьез: перекладывал какие–то наволочки, убрал простыню, достал другую, взбил подушку.</p><p class="p1">— Ты любишь музыку?</p><p class="p1">— Музыку? При чем здесь музыка?</p><p class="p1">— Это дурно — отвечать вопросом на вопрос.</p><p class="p1">— Я люблю музыку, но ваша мне едва ли понравится.</p><p class="p1">Он включил проигрыватель, бережно вынул пластинку из конверта и поставил ее на крутящийся диск.</p><p class="p1">Высокий мужской голос пел фокстрот. Казалось, певец слегка пританцовывает на сцене, подмигивая публике.</p><p class="p1">— Это Билли Холлидэй, — произнес Джон.</p><p class="p1">— Я знаю.</p><p class="p1">Пластинка мягко посверкивала в полумраке. Певец веселился от души. В комнате пахло одиночеством и пылью. Ей опять отчего–то вспомнилась рыба, бьющаяся на прилавке под мягкими безжалостными руками. Рыба ожидает смерти, как та девушка... с картины Эрла ожидает любви. Рыба дождется смерти. Девушка ни черта не дождется. Элизабет начало знобить.</p><p class="p1">Он окончательно разобрался с постелью.</p><p class="p1">— Вы готовитесь в горничные? — поинтересовалась она.</p><p class="p1">— Да, уже три раза провалился на конкурсе. Иди ко мне.</p><p class="p1">Ей стали надоедать эта комната, эта самозваная горничная, этот фокстрот.</p><p class="p1">— Чем вы занимаетесь? — вежливо спросила она.</p><p class="p1">— Покупаю и продаю деньги, — скучно отозвался он.</p><p class="p1">— И как вы это называете?</p><p class="p1">Он удивленно поднял брови:</p><p class="p1">— Да так и называю. Заработком.</p><p class="p1">— Вы спите с двумя телефонами под подушкой?</p><p class="p1">— Раньше так спал.</p><p class="p1">«Занесло интеллектуалку к жулику», — подумала она. Вообще было скучно. Пора уходить.</p><p class="p1">— Это рискованный бизнес, — сказала Элизабет, чтобы хоть что–нибудь сказать.</p><p class="p1">Он холодно улыбнулся.</p><p class="p1">— Да, я рискую. А кто не рискует? — Он остановился прямо напротив нее. — Вот вы... пришли сюда одна, к незнакомому мужчине... Я не знаю вас, вы не знаете меня... Дом на отшибе. Соседей нет — никого не крикнешь, на помощь не позовешь. И нет за углом такси, которое можно подозвать. И на улице нет телефона-автомата... А что, если я маньяк, который завлек вас в этот дом?</p><p class="p1">Она глядела на него с ужасом.</p><p class="p1">— Вы полностью в моей власти, — продолжал он. — Полностью, дорогая Мэри.</p><p class="p1">— Мне не нравится ваш тон, — медленно произнесла она, глядя ему в лицо, в эти странные желто-зеленые глаза, в которых все отчетливее горел огонек безумия. — Я хочу домой.</p><p class="p1">— Я пошутил, — сказал он тихо. Огонек погас. Она рассердилась.</p><p class="p1">— Я хочу немедленно уйти отсюда.</p><p class="p1">— Я не держу вас.</p><p class="p1">Он казался слегка растерянным, поникшим.</p><p class="p1">Элизабет остановилась у дверей.</p><p class="p1">— Вас действительно зовут Джон? — зачем–то спросила она.</p><p class="p1">— Да. Прощайте.</p><p class="p1">Игла медленно поднялась над пластинкой и вернулась в исходное положение. Билли Холлидэй откланялся и побрел по холодным улицам домой. Осенний ветер назойливо насвистывал ему в уши мелодию надоевшего фокстрота. Билли чертыхался и зябко кутался в плащ.</p><p class="empty-line"/><p class="p1">— Это сюда! — сказала Элизабет. — Черное — к черному.</p><p class="p1">— Колористка, — сквозь зубы выругался Залевски, но картину перевесил. Залевски был эмигрант, из поляков, сбежавший еще от Ярузельского. Он сам немного рисовал, а галерея была у него одним из многих источников заработка, которого все равно никогда не хватало.</p><p class="p1">— Говорю тебе — черное к черному, красное к красному. Это у него что — ну как, как называется этот ошейник?</p><p class="p1">Беспричинное раздражение одолевало ее с утра. Дура, недотрога. Поразительно еще, как ты умудрилась выскочить замуж за такую хилую личность, как твой Брюс. Поделом тебе. Пойди и расскажи кому–нибудь, что к двадцати семи годам у тебя не было и десятка любовников. Ничтожество в кругу ничтожеств. Выше этого тебе не прыгнуть, хоть расшибись.</p><p class="p1">— Этот ошейник, — холодно сказал Залевски, державшийся с достоинством шляхтича, — называется «Пояс верности».</p><p class="p1">И сиди, кретинка, со своим поясом верности. Неизвестно кому, — уж во всяком случае не верности себе. И пусть каждый полячишка хамит тебе по поводу и без повода. Развешивая бездарную мазню старого импотента.</p><p class="p1">— Элизабет! — крикнул ей шеф. — Подойди сюда! Тебе что–то принесли!</p><p class="p1">Если это номера «Файн-арт-мэгэзин» со статьей, я вцеплюсь посыльному в рожу и выдеру шефу остатки шевелюры. И возьму расчет. И пойду на панель. Где меня не подберет ни один цветной.</p><p class="p1">Посыльный приплясывал в такт ему одному слышной музыке. В ушах у него были наушники. На столе у шефа лежал только что принесенный букетище красных роз, который стоил не меньше двухсот долларов, но стоимость его, естественно, в тот момент прикидывала не Элизабет, а шеф.</p><p class="p1">— Я всегда тебя уважал, чертова кукла, — сказал шеф. — Но после этого ты вырастаешь в моих глазах прямо–таки до размеров Чертова колеса на Кони-Айленде.</p><p class="p1">Элизабет торопливо разворачивала обертку. Среди шуршащих лент и сверкающей упаковки лежала открытка.</p><p class="p1">«Извини. Больше не буду. Мое мальчишество можешь списать на свое очарование. Надеюсь припасть к ногам Вашего Щепетильного Величества завтра, в четыре часа пополудни, на том месте, где ты покупала петуха с двумя яйцами и внезапно попала на барана с тем же арсеналом. Офигевший Джон».</p><p class="p1">Шеф никогда — ни в тот день, ни после — не мог объяснить себе, почему Элизабет, олицетворение хороших манер и сдержанности, кинулась ему на шею и расцеловала во все, что попалось под губы. Слава Богу, она их не красила.</p><p class="empty-line"/><p class="p1">Связку воздушных шаров он привязал к ее пуговице. Шары рвались вверх, их относило назад, когда они бежали. Джон тащил ее за собой, приплясывая, и она бежала следом, спотыкаясь и хохоча, а потом он оборачивался и обнимал ее — мягкие и властные руки с большими ладонями, пухлые губы, едва различимый запах хорошего одеколона и хорошего табака. Даже трехдневная щетина, которая, похоже, была в его стиле, не мешала и не портила удовольствия. Однако, подумала она. Этот парень умеет целоваться так, что и в постели, по-видимому, будет требовательнее владельца гарема. Вряд ли это врожденный талант. Скорей, филигранная техника, отшлифованная опытом. Сколько ему лет? — вряд ли больше тридцати. Хороша же я буду, когда окажусь перед ним застенчивой школьницей, ни на секунду не перестающей видеть себя со стороны. Блондинки легко краснеют. У них краснеют грудь, шея, даже спина. А впрочем, некоторым это нравится. Этакая задержавшаяся невинность. Что он вытворяет! Пошло все к черту.</p><p class="p1">Этот парень действительно кое–что умеет своим языком, думала она, когда он подсаживал ее на колесо обозрения. Умеет не только болтать, во всяком случае, хотя и болтает он ядовито и весьма неглупо. Но то, как язык его находит эту сладкую струночку под ее собственным и играет на ней, то, как Джон не отрывает своих губ от ее мягкого, безвольного рта по десять, кажется, минут, — все это так славно, что, пожалуй, будь что будет! Всерьез это или нет? — Господи, но к чему мучиться над этим, когда жить надо настоящим! — так или примерно так размышляла она, когда колесо вознесло ее на вершину.</p><p class="p1">— Эй, парень, — сказал Джон хозяину аттракциона. — Не хочешь ли пойти со мной и выпить по чашечке кофе?</p><p class="p1">Он легко ладил с людьми, к какому бы кругу они ни принадлежали. Аттракционщик охотно хлопнул его по плечу, указывая направление, в котором располагалось ближайшее кафе.</p><p class="p1">Колесо остановилось. Аттракционщик прекрасно знал, что Элизабет зависла в раскачивающейся кабинке на самой верхней точке. Она пугалась, визжала, топала ногами и от этого только больше раскачивала утлую кабинку.</p><p class="p1">— Парень, так надо, это входит в правила игры, — тихо сказал Джон на ухо новому приятелю. Тот кивнул, и оба расхохотались.</p><p class="p1">— Джон! — неслось с высоты. — Джон, не оставляй меня! Что ты делаешь! Мерзавец! Ааааах! — это кабинка особенно резко качнулась взад-вперед, и Элизабет изо всех сил ухватилась за поручни. — Долбанусь, как пить дать долбанусь!</p><p class="p1">— Посиди, дорогая, передохни! Я только кофе глотну и тут же обратно! Там не холодно?</p><p class="p1">— Свинья, мерзавец, гнусный хам!</p><p class="p1">— Чего? Я на ухо стал туговат!</p><p class="p1">— Скотина!</p><p class="p1">...Через три минуты она уже бежала за ним вдогонку, размахивая идиотскими шарами. Пятясь, он бежал к набережной.</p><p class="p1">— Ангел мой, в чем дело? Мой ангел! Мой демон! У нашей Мэри был...</p><p class="p1">— Козел!</p><p class="p1">— Все правильно, у нашей Мэри был козел, она висит, а он ушел...</p><p class="p1">— Ах ты дрянь! — она вцепилась ему в рукав и с хохотом размахнулась. Связкой шаров ему по башке, по морде, по наглой, смеющейся, неотразимой морде.</p><p class="p1">Этот поцелуй показался ей дольше всех предыдущих.</p><p class="p1">— Слушай мою команду, — сказал маленький чернявый мальчишка лет одиннадцати. — Вы видите этих двух влюбленных идиотов?</p><p class="p1">Джон и Элизабет, уже не отрываясь друг от друга и оттого почти не разбирая дороги, шли по набережной. Шары болтались над ними как знак высшей справедливости их союза и, если угодно, знак принадлежности к иным мирам.</p><p class="p1">— Этого одуревшего я сейчас выставлю на пять долларов, — сказал заводила своей команде. Команду составляли: семилетняя серьезная негритянка в очках, толстяк — ровесник и брат вожака, представлявший полную противоположность близнецу, китайчонок с вечной улыбкой и еще несколько личностей в возрасте до двенадцати лет включительно. Личности эти с утра мечтали о воздушной кукурузе, но мечты их никак не осуществлялись. Что поделать, думал вожак. Дураков нет, и все хотят кукурузы. Но сейчас, кажется, им обломятся сразу два дурака, которые не нашли другого занятия, как липнуть друг к другу под связкой шаров. Глупая вещь любовь. Я, во всяком случае, никогда не стану совершать глупостей из–за того, что мне хочется кого–то обслюнить.</p><p class="p1">— Мистер! — крикнул он Джону. — Эй, мистер!..</p><p class="p1">Джон оторвался от Элизабет и облизнул губы.</p><p class="p1">— Чего тебе, злобный карлик? (Он часто называл детей злобными карликами и вообще не слишком их жаловал).</p><p class="p1">— Мистер! Мой брат за пять долларов может пропукать вам тему из кинофильма «Челюсти»!</p><p class="p1">Элизабет засмеялась, как сумасшедшая. Она готова была расцеловать каждого из компании. Прекрасная вещь любовь, — единственное состояние, когда вопроса «Зачем» не существует. За вопрос «Зачем» надо приговаривать к наказанию плетьми.</p><p class="p1">— Джон, жадина, дай им пять долларов. Никогда не слышала тему из «Челюстей» в таком... таком исполнении!</p><p class="p1">— За пять долларов, — назидательно сказал Джон, — я пластинку могу купить!</p><p class="p1">— Пластинка — это совсем не то, мистер!</p><p class="p1">— Ну ладно, ладно, отцы, вот ваши пять долларов, но чтобы эти импровизации происходили не против ветра...</p><p class="p1">Толстяк был готов к своему трюку. Они довольно часто его проделывали. В особенности удачно он прокатывал с иностранцами, не знающими темы из «Челюстей». Толстяк вышел в центр полукруга, который немедленно образовали остальные. Слегка присел, отклячив свой основательный музыкальный инструмент. Надулся. Уперся руками в колени. Напряжение нарастало. Он тужился минуты полторы, набирая в грудь воздуху и зажмуриваясь. Наконец напряжение торжественной минуты разрешилось не слишком долгим, но несомненно музыкальным звуком, который в такой же степени напоминал тему из «Челюстей», как и тему судьбы из Пятой Бетховена.</p><p class="p1">— Обдираловка! — вскричал Джон. — Какое гнусное мошенничество! Там было еще «пам-па-па-па-па-па»!</p><p class="p1">Элизабет, впрочем, была единственной слушательницей. Да и она почти сразу заткнула ему рот, приникнув к его губам и обхватив плечи. Маленькая банда стремительно улепетывала в направлении киоска с кукурузой.</p><p class="empty-line"/><p class="p1">Автоответчик говорил разными голосами. Властный голос принадлежал, по-видимому, пожилой женщине, привыкшей к безоговорочному повиновению.</p><p class="p1">— Элизабет! Напоминаю тебе, что завтра в 13.00 ты приходишь ко мне на осмотр.</p><p class="p1">Это была Рут Кохен, домашний врач Элизабет. Она едва ли могла упрекнуть свою пациентку в неаккуратности. Раз в месяц та, как школьница на экзамен, являлась на прием, послушно сдавала анализы, покорно выслушивала советы и с трепетом, как подсудимая, ожидала приговор. С тех пор как умер отец, она страдала ракобоязнью. Это было, как ни странно, не трусостью, а посмертной жалостью к отцу. Она не боялась собственных страданий, просто не думала о них. Но она помнила отца, его страдания и не желала, чтобы он — ее болью — мучился вновь.</p><p class="p1">Рут была плохим врачом, но хорошим человеком. Все ее советы Элизабет сводились, в общем, к тому, чтобы непреклонно блюсти половую гигиену и как можно реже менять мужчин. Если уж это так необходимо — менять их. А лучше и вовсе обойтись без них. Остальное время они мило трепались о тех же мужчинах, ибо других тем у женщин не существует. Даже разговоры о тряпках неизбежно приводили к тому моменту, когда их предпочтительнее снимать. О мужчинах Рут судила с той жесткой уверенностью профессионала, которая отпугивала от нее всех пациентов мужского пола. Странно, что к собственному мужу, лысоватому адвокату с неожиданно низким и красивым голосом, она испытывала страстное семейственное благоговение. Вообразить эту пару в постели Элизабет никогда не смогла, если бы Рут не живописала ей во всех подробностях свое исключительное женское счастье.</p><p class="p1">Следующая запись. Голос болезненно знаком, и, спохватившись, Элизабет была потрясена, что не сразу его узнала.</p><p class="p1">— Я ждал до десяти. Ты что, забыла? — с уже привычной укоризной в голосе говорил вечный неудачник, давний мучитель, перед которым все чувствовали смутную вину, ибо так уж он умел поставить себя, что любой мало-мальски везучий человек был перед ним без вины виноват. Вот и теперь. Она впервые во взрослой жизни безоглядно, бесстыдно счастлива, а Брюс, бедный Брюс, бывший муж, живая укоризна, прождал до десяти часов. Он, конечно, не мог ждать меньше часа. Этого было бы недостаточно, чтобы жалеть себя столь убедительно. Да ведь она и впрямь забыла, что они сговорились встретиться — в их встречах не было ничего от любви или даже взаимного уважения, да и расстались они безболезненно, никаких мук и сожалений. Просто она пообещала вернуть ему книгу, которая после развода осталась у нее. Он ей оставил сборник Элиота, а теперь он ему внезапно понадобился. Хотя к чему сценаристу мыльных опер мог понадобиться Элиот? Чтобы в очередном телесериале герой-интеллектуал единственный раз продемонстрировал свою интеллектуальность, процитировав Элиота и тем утвердив репутацию? Брюс испекал свои оперы с поразительной легкостью и отнюдь не бедствовал, но даже успех оборачивался у него неудачей, и в самом легком подпитии он всегда принимался жаловаться, что растрачивает свой несомненный талант на пустышки для увеселения обывателя. Пять лет назад это произвело на нее впечатление: раз человек так убивается по своему таланту — стало быть, есть по чему убиваться? В постели он не оставлял разглагольствований на эту тему, и когда ей безумно хотелось спать, мог до утра философствовать, уверяя, что такое ничтожество, как он, недостойно такой женщины, как она. С утра она его видеть не могла. Бедный Брюс.</p><p class="p1">— Он пишет текстовки для телепостановок, — виновато сказала Элизабет Джону. Такой уж был человек Брюс, что после него надо было говорить виновато. Везде некстати. — Это мой бывший муж. Мы с ним были женаты три года.</p><p class="p1">Джон в задумчивости курил.</p><p class="p1">— Ты не хочешь поинтересоваться, какие у меня с ним сейчас отношения?</p><p class="p1">Джон улыбнулся своей мальчишеской улыбкой удачника и покачал головой.</p><p class="p1">Элизабет в ответ улыбнулась ему благодарно.</p><p class="p1">— Хорошо.</p><p class="p1">Она снова нажала клавишу. Господи, какое счастье!</p><p class="p1">— Лиззи! Я звоню узнать, помнишь ли ты меня!</p><p class="p1">Мама! Она не удержалась и крикнула это вслух.</p><p class="p1">Ближе человека у нее нет и не может быть. Лучшее, что в ней есть, — от матери. Мать никогда не вешает носа. Трезво и просто подходит ко всему. Матери можно было рассказать обо всех романах. Вообще обо всем. Каждый ее звонок — для Элизабет праздник.</p><p class="p1">Больше не звонил никто. Пленка моталась с тихим шелестом.</p><p class="p1">— Ты снимешь платье? — неожиданно спросил Джон.</p><p class="p1">Он спросил об этом так же просто, как предлагал вторую порцию спагетти. Как интересовался, не хочет ли она воздушных шаров или мороженого. Если этот тип сегодня останется у меня, поняла она с веселым ужасом, я буду не только не против, — я буду счастлива! Он мне невероятно близок, хотя мы знакомы три дня и до этого дважды переглянулись. При нем я не постесняюсь ничего. Если он уйдет, я никогда уже не буду счастлива. Ни с кем. Нигде. Разумеется, я сниму платье.</p><p class="p1">Впрочем, подумать так было проще, чем взять и расстегнуть воротник. Это было хорошее зеленое шерстяное платье. Теплое и просторное. Первая покупка после Брюса. Элизабет знала, что хороша, и любила быть голой, когда оставалась дома одна, — может быть, так компенсировался избыток стыдливости на людях, — но раздеться перед Джоном сейчас ей было не так просто. Она отпила глоток виски в надежде, что это придаст ей храбрости. Потом неловко стянула платье и встала против света, так что он пронизывал легкую, почти прозрачную блузку. Ткань ее нежно касалась сосков. Элизабет знала, что лампа высвечивает все ее тело, и блузка ничего не скрывает. Она попыталась принять как можно более раскованную позу. Оперлась рукой о стол. Попыталась улыбнуться.</p><p class="p1">Он смотрел на нее не оценивающе, — смотрел так, словно видит все что ожидал, и рад этому. Словно знал ее давно, но не видел год. Или нет: смотрел со снисходительной нежностью, понимая ее робость и неловкость, и сознавая, как они смешны. Ибо во взгляде его было и восхищение, и радость узнавания, и тот бесовский огонек, жар блаженного предчувствия, который так испугал ее там, в пустом доме.</p><p class="p1">Неожиданно он подошел к вешалке и снял с нее белый шелковый шарф, который она надевала сегодня, когда они гуляли по городу.</p><p class="p1">— Можно, я завяжу тебе глаза? — вдруг спросил он.</p><p class="p1">Что за странная причуда? Мало ли что он может сделать со мной, если я ненадолго ослепну. Ударит? Она вспомнила, как холодно было его лицо, когда они впервые остались наедине в пустом доме, как жутковаты слова: «Вы полностью в моей власти», так он говорил, да?.. и еще... это пугающее словечко «маньяк». Она с испугом взглянула на него. Джон глядел на нее с отцовской лаской и нежностью юного, неопытного любовника. Быть в его власти... совершенно беспомощной перед ним... принадлежать ему. Ты хочешь завязать мне глаза, любимый? Ты хочешь, чтобы я была безвольной игрушкой в твоих руках? Ты хочешь взять меня за руку, как девочку, и подарить мне такую игрушку, от которой бешено заколотится сердце, да? Ты этого хочешь, милый?</p><p class="p1">— Я могу отказаться, — прошептала она, — но...</p><p class="p1">Он молчал.</p><p class="p1">— Я могу отказаться, — повторила она.</p><p class="p1">— Ты можешь сказать, чтобы я ушел, — мягко произнес он. — И я уйду.</p><p class="p1">— Но... — она прислушивалась к себе и с радостью ощущала, что ни страхов, ни протестов, ни опасений не осталось в ее душе, — я хочу, чтобы было так, как ты хочешь.</p><p class="p1">— А разве ты сама...</p><p class="p1">— Да, да.</p><p class="p1">Его движения стали мягкими и бесшумными. Лицо оставалось улыбчивым и озорным. Он медленно подошел к ней и бережно завязал глаза. Она попыталась их открыть. Шелк нежно касался век, щекотал ресницы. Она улыбнулась, вспомнив детство. Ему можно было довериться вполне.</p><p class="p1">— Опусти руку. Не так. Сюда.</p><p class="p1">Ее рука повисла вдоль тела. Она не могла и не хотела сопротивляться его мягким и властным движениям. Джон приобнял ее и подвел к постели. Колени у нее дрожали и подгибались, но не от страха, а от возбуждения и предчувствия. Он осторожно взял ее на руки, — Господи, как легко и осторожно, — а затем положил на кровать.</p><p class="p1">Он расстегнул ей блузку. Элизабет закрыла глаза под белой повязкой. Белая пелена сменилась полумраком, который внезапно взорвался красным. Ей снова вспомнился тот огонек безумия, который она заметила в его глазах. Что он делает? Элизабет видела, как он направил настольную лампу прямо на ее лицо. Вдруг она почувствовала холод стекла. Джон осторожно проводил краем стакана по ее подбородку и нежному горлу. Она услышала позвякиванье кубиков льда о стекло. Что–то холодное и влажное — она не сразу сообразила, что это и был кубик льда, — скользнуло по ее шее к груди. Джон медленно касался ледышкой ее груди, она сжала кулачки и закинула руки за голову. Тело ее напряглось.</p><p class="p1">— Ты... — пробормотала она.</p><p class="p1">— Между прочим, ты тоже можешь ко мне прикоснуться, — сказал он, по-прежнему с улыбкой в голосе. Она нежно дотронулась до его плеча. Он все еще не снял пиджак. Капли ледяной воды текли по ее шее, подбородку, капали на губы и нос, — наверное, теперь он держал кубик над ней? Она смеялась, ловила льдинку губами, лизала и посасывала ее. Одна капелька медленно стекала с соска в ложбинку между грудей, оттуда скатилась в пупок, оставив на животе влажный след. Пальцы Джона, задержавшись на острых ключицах, спустились к выпирающим косточкам ее бедер и ласкали теперь низ живота.</p><p class="p1">Она беззвучно засмеялась. Или всхлипнула.</p></span></span>
