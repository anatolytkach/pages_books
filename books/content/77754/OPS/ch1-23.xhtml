<span><span id="id20"><div class="title3">
<p class="p"><strong>VIII</strong></p>
</div><p class="p1">Эмили и Кло стояли на балконе. Солнце било им в глаза. Кло курила. Эмили, сжимая виски, бормотала жалобно:</p><p class="p1">— Неизвестность меня убивает. Это подвешенное состояние...</p><p class="p1">— Что тебе еще неизвестно? — усмехнулась Кло. — Что он сволочь?</p><p class="p1">— Перестань.</p><p class="p1">— Так ты говоришь, — Кло ловким щелчком бросила сигарету с балкона, — что занималась любовью с этим адвокатишкой, а Уидлер наблюдал за вами из окна?</p><p class="p1">— Я не хочу об этом разговаривать.</p><p class="p1">— Ну, и черт с вами.</p><p class="p1">В волейбол сегодня никто почему–то не играл. То ли местный сезон кончился, то ли все волейболисты отсыпались после карнавала. Впрочем, один из этих молодцев уже плескался в океане, смывая вчерашнее похмелье. Выйдя из воды и отфыркиваясь, он мельком глянул на красавиц, прищурился и послал им воздушный поцелуй.</p><p class="p1">— Хорошо плаваешь, — поощрила его Клаудиа.</p><p class="p1">Он улыбнулся, не понимая.</p><p class="p1">— Красивый ты, говорю, мужик, — не унималась Кло. — Хочешь с нами поразвлечься? Переведи ему, Эмили.</p><p class="p1">— Не надо, Кло, — умоляюще поглядела на нее Эмили.</p><p class="p1">Та поглядела на нее с нескрываемой злостью.</p><p class="p1">— Милая, — губы ее зазмеились, заставив Эмили опять вспомнить о кроликах. — Работу и деньги здесь тебе даю я. Твое дело — пе-ре-во-дить. С человеческого языка на мартышкин. И точка. А что надо и что не нет — определяю я. Сейчас мне нужен этот мальчик. Хочешь к вам? — закричала она опять. — Переведи!</p><p class="p1">— Не зайдете ли к нам в гости? — тихо произнесла Эмили.</p><p class="p1">Парень заулыбался, уставившись на иностранок. Похоже, он расслышал шепот Эмили, но не поверил своим ушам. Кло бросила ему ключ с балкона. Ключ, прозвенев о прибрежный песок, шмякнулся к его ногам. Парень поднял его с земли, восторженно прижал к губам и счастливо засмеялся.</p><p class="p1">Дверь распахнулась через минуту.</p><p class="p1">Кло указала ему на кресло. Он осторожно уселся на краешек, медленно переводя взгляд с одной женщины на другую. Пожалуй, на Эмили его глаза задерживались чуть дольше. Во взоре его было любопытство и — страсть. Эмили покраснела. Кло глядела в зеркало, где этот парень отражался во всей своей местной красе.</p><p class="p1">— Я пойду, — сказала Эмили.</p><p class="p1">— Нет, ты останешься, — проговорила Кло. — Как я с ним стану объясняться без тебя?</p><p class="p1">— А вы что, будете еще и разговаривать?</p><p class="p1">— Какая ты стала циничная! — расхохоталась Клаудиа. — Представь себе, перед этим делом иногда разговаривают. Конечно, у вас, на Диком Западе, это, наверное, не принято— но у нас, так сказать, европейцев...</p><p class="p1">Эмили поглядела на нее с плохо скрытой ненавистью. Кло выдержала взгляд.</p><p class="p1">— Девочка моя, — произнесла она с материнской тоской в голосе. — Из–за твоего романа с Уидлером полетел наш контракт. Из–за твоего романа с Джеромом меня чуть не съели с потрохами эти сучьи выродки — нью-йоркские адвокаты. А я по-прежнему плачу тебе деньги и, поверь, дам самую лучшую рекомендацию, даже если ты все–таки вылетишь из фирмы. Сегодня мне захотелось немножко оттянуться. Я прошу тебя о небольшом одолжении; останься и переводи. Неужели это так трудно, дитя?</p><p class="p1">— Хорошо, Кло, я останусь.</p><p class="p1">— Вот и лапочка. Спроси его, нравится ли ему то, что он видит,</p><p class="p1">Эмили перевела. Парень так радостно залопотал на своем наречии, но Кло жестом остановила Эмили.</p><p class="p1">— Попроси его снять штаны.</p><p class="p1">Эмили сдавленным голосом произнесла несколько фраз.</p><p class="p1">— Он сказал: с удовольствием.</p><p class="p1">Это было чистой правдой. На лице бразильца, быстро стянувшего плавки с бедер, застыло выражение счастья.</p><p class="p1">— С нею перепихиваться будем? — отнесся он к Эмили, призывая ее в союзницы и кивая на Кло.</p><p class="p1">— Д-да... я думаю, да, — Эмили покраснела.</p><p class="p1">— Понимает ли он, — бесстрастным голосом продолжала допрос Клаудиа, — какое удовольствие мы испытываем, глядя на обнаженного мужчину?</p><p class="p1">Глядеть и впрямь было на что. Загорелое мускулистое тело лоснилось свежестью и здоровьем, а что касается мужских принадлежностей, то сии были выше всяческих похвал.</p><p class="p1">Вместо ответа он подошел к Кло и быстрым движением развязал пояс на ее халате. Халат распахнулся, пояс упал на ковер.</p><p class="p1">— Переводить? — в тоне Эмили сквозила ирония.</p><p class="p1">Парень заговорил быстро, проглатывая слова.</p><p class="p1">— Он хочет взять тебя, — перевела Эмили. — Уйти с тобой в другую комнату, где вы смогли бы остаться наедине. Меня он стесняется, — не удержалась она, — в отличие от тебя...</p><p class="p1">— Дерьмо собачье! — внятно произнесла Кло.</p><p class="p1">Парень вопросительно уставился на Эмили. Та махнула рукой и направилась к выходу. Он обхватил ее за талию, не причиняя боли, но и не отпуская. Руки его были горячи, как прибрежный песок. Эмиля вдруг вспомнила тех двоих, в заброшенном отеле, ужас и страсть вспыхнули в ее глазах.</p><p class="p1">На пороге бесшумно возник Уидлер.</p><p class="p1">Эмили заметила его не сразу. А только тогда, когда он вихрем пронесся мимо нее, вынырнув из–за спины, направился к Кло, резко отпихнул ее, взвизгнувшую, а потом за волосы схватил голого бразильца. И хотя бразилец был глазок, полон сил и возбужден, как бывает возбужден определенный орган в определенный момент, — Уидлер с легкостью опрокинул волейболиста. Тот чрезвычайно изумился, взглянул снизу в его лицо и понял, что это лицо не предвещает ему ничего хорошего — во всяком случае, любовных утех не предвещает точно. Это был простой местный парень. Он часто доставлял удовольствие богатым старухам. Иногда — менее отвратительным, менее богатым. Иногда — совсем небогатым и довольно симпатичным. Сочетание прелести и богатства, да еще в двух экземплярах, встретилось ему впервые. Правду говорили древние: ничего слишком. Удача явно перехлестнула через край. Волейболист не знал этого мужика, но понял — с безошибочным чутьем, присущим туземцам и отельным мальчикам, — что иметь дела с этим мужиком не надо. Он встал, нашарил рукой плавки, натянул их на мигом опавший, но и теперь внушительный стержень своего естества и убежал, звонко шлепая босыми ногами и недоуменно оглядываясь.</p><p class="p1">Эмили в первый момент была поражена. В ней вспыхнула надежда. Впрочем, через несколько секунд ставшее привычным безразличие охватило ее. Возбуждение нашло выход в злобе, кислой и безысходной злобе, всегда сменяющей нервный срыв.</p><p class="p1">Уидлер некоторое время постоял, пытаясь отдышаться после своего подвига. Клаудиа, ни на кого не глядя, вихрем промчалась в ванную и там заперлась. Уидлер постоял немного и, тоже ни на кого не глядя, вышел. Впрочем, на кого и глядеть ему было, как только не на Эмили?</p><p class="p1">В дверях он неожиданно поднял на нее затравленный взгляд. Посмотрел исподлобья. И ринулся наружу.</p><p class="p1">Секунду Эмили оставалась неподвижной. Потом вскочила и в чем была — в расстегнутой на груди мужской сорочке, в черных мужских брюках и штиблетах кинулась следом.</p><p class="p1">— Сукин сын! — заорала она истерично, не думая, что перебудит весь отель. Голос ее сорвался на визг, руки сжались в кулаки. — Сукин сын, мудак, сволочь! — От бессильной злобы дыхание ее сбилось, щеки горели. — Ублюдок! Чего тебе надо?!</p><p class="p1">Уидлер остановился, но не оборачивался. Он молчал.</p><p class="p1">— Если ты хочешь мне что–то сказать, — крикнула Эмили, — говори сейчас!..</p><p class="p1">Он молчал.</p><p class="p1">— Ты подставил нас! — заорала она с ненавистью. — Зачем ты это сделал?!</p><p class="p1">— Я не подставлял вас, — по голосу слышалось, что он поморщился. И объяснил, как недоумку-ребенку: — Я никого не подставлял. Это только жизнь подставляет и обставляет. Жизнь.</p><p class="p1">Эмили молчала, не в силах что–то возразить на эту холодную реплику. Закоренелый циник. С ним безнадежно разговаривать. Это стало ясно. Но как он стоит — потухший, сгорбленный...</p><p class="p1">— Ты ведь адвокат, милая, — крикнул Уидлер с другого конца холла. — Значит, ты должна знать, что главное — застукать преступника на месте преступления. С дымящимся пистолетом. Косвенные улики не имеют значения. Вот я сейчас и застукал. Пиф-паф — ты виновна! Ты виновата в том, что ты такая же, как все остальные. Понимаешь? Такая же, как все остальные.</p><p class="p1">В его голосе не было прежней уверенности, но она не уловила этого. Она приняла усталость за пренебрежение и равнодушие.</p><p class="p1">— У тебя никогда никого не было! — закричала она, напрягая голос до царапанья в горле. — И никогда не будет! Ты ничего не можешь, слышишь, ты! Никогда! Никого! Не было! И не будет!!!</p><p class="p1">Уидлер неторопливо вышел из отеля.</p><p class="empty-line"/><p class="p1">Мотоцикл ревел и почти горизонтально ложился на виражах. И черт с ним. Если сейчас рухну, то и черт с ним. Уидлер досадовал на собственное мастерство. Он знал, что хорошему пловцу труднее утопиться. Хорошему мотоциклисту почти невозможно нарочно попасть в катастрофу.</p><p class="p1">Ветер обжигал его лицо. Он выжимал предельную скорость, и ветер тоже. Он отпустил руки перед поворотом, но инстинктивно снова схватился за руль. Он не знал, куда едет. Он был оскорблен. Нет, и оскорблен он не был. Все отодвинулось, все лежало далеко внизу, как море, как горе. Уидлер ехал над уровнем горя. Это был уже не тот уровень, который он мог выдержать.</p><p class="p1">Старик, пора признаться, что не ты сделал что–то в жизни, а она сделала из тебя, что ты хотел сделать из нее. За все приходится платить. Ты доигрался с людьми до того, что ничего, кроме этого, не можешь. Тебе ничего не нужно. Ты набивал их собственными деньгами, собственными кишками, собственными страстями. Вот чем ты их набивал, этих кукол, которые перед тобой играли по твоей идиотской прихоти. Внутри ничего не осталось. Все пошло на их кукольные внутренности.</p><p class="p1">Да что говорить, все люди жалки. Всякий человек смешон, ежели его раздеть и так поставить на морозе. Нет человека, который бы не боялся смерти, не любил денег, не хотел любви и признания. Нет бабы, которая не ох...ела бы, когда ты ведешь ее на бывший рынок рабов, на пряности. Нет бабы, которая бы не вешалась тебе на шею, не хотела бы втайне твоей власти. Нет бабы, которая бы, обломавшись на тебе, на затащила к себе в койку первого попавшегося молодого красивого ублюдка с вот таким...</p><p class="p1">Мотоцикл занесло, у Уидлера захватило дух, и он лихорадочно стал выравниваться. Да и сам ты, если вдуматься, дерьмо собачье. Боишься смерти, как всякий сопляк.</p><p class="p1">Но, положим, можно глядеть на людей иначе. Можно. И проливать сопли, слезы, слюни. И желать добра, и жалеть, и осыпать бесплатными приложениями к собственной персоне... В юности, на мотоциклах, в черной банде, в хрустящей коже, по ночам, среди таких же, как он, только менее отчаянных и оттого подчинявшихся ему — вожаку, — он экспериментировал. Он искал тех, кому будет не страшно. И он нашел девчонку, которая не испугалась. Он добился ее и сделал равной себе. Через полгода она стала спать с лысым ублюдком, у которого было все, кроме красоты, силы и молодости. Уидлеру было шестнадцать лет.</p><p class="p1">С тех пор перед ним пасовал каждый, и за это он ненавидел всех. Если бы он увидел человека, который бы перед ним не спасовал... о, тогда! Тогда, как в романе Кинга, он пошел бы за ним хоть на смерть. Убийца, который хочет последовать за жертвой, если только жертва умерла достойно. Но он еще не встретил достойной жертвы. И убийцей не был. Он просто еще не видел человека сильнее себя. И чище. Да, и чище! — потому что от мог пойти на что угодно, но нельзя было его испугать и нельзя было продать. Ни от кого он не ждал ничего хорошего. Ничего особенного не просил: только не продавайся, не бойся, не ври.</p><p class="p1">И впервые в жизни он встретил то, что ему было нужно.</p><p class="p1">Она вела себя точно так все, как рисовал он себе в мечтах. И так же выглядела. И на все его тесты реагировала так, как должна была реагировать в замысле. Он сам ее придумал. Он ее создал.</p><p class="p1">И он испугался.</p><p class="p1">Потому что этого быть не могло.</p><p class="p1">И он отдал ее первому попавшемуся, и она пошла, потому что она любила его, Уидлера, который сам себе запретил называться Джимом, потому что Джимов полно, а он Уидлер, должен быть один, и это имя должно было говорить всем обо всем. Джим был никто, а Уидлер был все, а она любила и Джима и Уидлера. И Уидлер от нее не заслонял Джима, и наоборот.</p><p class="p1">И тогда он решил быть окончательной сволочью, сволочью по преимуществу, дрянью из дряней, к тому же выиграть надо было хоть в чем–то, раз уж в главном он проиграл. И он решил, что растопчет ее и себя, и будет новая жизнь, с нуля, в пустоте, без надежды. И он растоптал себя, а ее растоптать не сумел, потому что любил ее по-прежнему, а она его по-прежнему не боялась, но уже не любила.</p><p class="p1">— Не любила?</p><p class="p1">— Нет.</p><p class="p1">Так он ответил себе, потому что привык рассчитывать на худшее и всю жизнь из худшего исходил, и потому ему везло в делах, а во кем остальном не везло. И уж либо верить в лучшее, набивать себе шишку на каждом шагу и быть иногда счастливым, либо не совершать ошибок, быть готовым ко всему, ни на секунду не забываться и забыть только, что такое счастье.</p><p class="p1">И, в общем, оправдался главный его постулат: человек — это то, что он сам о себе думает.</p><p class="p1">И второй главный постулат Уидлера сбылся: судьба твоя предопределена тобой, самим тобой и ничем больше. Ты вдавлен в мир, и судьба твоя — слепок. Каждый получает то, чего хочет.</p><p class="p1">Если, конечно, речь идет не об автокатастрофах, стихийных бедствиях и тому подобное...</p><p class="p1">Стоп!</p><p class="p1">Его занесло так резко, что он еле выровнялся. И сразу затормозил.</p><p class="p1">Сейчас бы он погиб, и никто уже не оставил по нем другой памяти, кроме него самого, а он уже не смог бы ничего исправить, и она будет его всегда ненавидеть.</p><p class="p1">В принципе, конечно, это дамская, девчоночья сентиментальность: думать о самоубийстве или о красивом, кстати подвернувшемся несчастном случае. Но из ее жизни он исчез — это ясно. Как и то, что она его любила, как и то, что он ее продал, как и то, что другого такого шанса не будет ни у нее, ни у него. Она достанется подонку, ублюдочному клерку с каменной задницей, а он будет довольствоваться шлюхами, а может, вообще никем не будет довольствоваться, потому что это не по нему. Он предпочитает брать то, что любит, а если этого нет — не брать ничего.</p><p class="p1">Пусть у девочки будет по крайней мере в одном все нормально. Если у нее не вышло удачного старта в любви, если она сразу попала на чересчур искушенного, пресыщенного аморального типа, — пусть ей повезет в бизнесе. Она в нем смыслит. У нее будет хорошее будущее. Он поможет.</p><p class="p1">Он резко развернулся и покатил в город. Камешки вылетали из–под колес его огромного черного мотоцикла. Да вам-давай, старина. Выжмем из тебя максимум сил. Надо торопиться. Благородные поступки надо совершать быстро. Это ведь позор — благородные поступки, добрые дела, щенячья благотворительность. Тот, кто не знает этого и не стесняется собственных добрых дел, тот вообще не знает, что это такое.</p><p class="empty-line"/><p class="p1">В старом отеле, на ступеньках, был тот, кого Уидлер искал. Он знал, где искать. Это существо ему было нужно, и это существо было здесь, и оно было единственным, кто в этот миг искренне обрадовался Уидлеру.</p><p class="p1">Мальчик сидел и глядел в океан. На его смуглых коленках лежал лист бумаги. Уидлер думал, что мальчик рисует Эмили, но мальчик рисовал океан. В его представлении, видимо, океан больше соответствовал его душевному состоянию. Впрочем, черт их знает, этих местных.</p><p class="p1">— Здорово, — сказал Уидлер.</p><p class="p1">Мальчик широко улыбнулся ему.</p><p class="p1">— То есть просто полный провал, — сокрушенно сказал Уидлер. — Я влюблен, я несчастлив, я тебя предупреждал. От нее надо держаться подальше. Именно поэтому ты сейчас пойдешь к ней.</p><p class="p1">— Си, — сказал мальчик.</p><p class="p1">Это было первое, что он сказал.</p><p class="p1">— Ну да, си, — согласился Уидлер. — Так вот, ты, значит, сейчас пойдешь со мной, мы тут обделаем одно дельце, и ты поедешь опять же со мной, но уже дальше. Сейчас еще рано, семь утра, а в восемь китайцы поедут сюда, смотреть участок. В десять у них обратный самолет. Купчая должна быть на месте, все такое. Короче, ты пойдешь к ней и отдашь бумагу.</p><p class="p1">— Си, — опять сказал мальчик. Похоже, он все знал. Откуда? Этого Уидлер не понял, да и какая, в сущности, разница?</p><p class="p1">— Ты делаешь успехи, — сказал он. — Из тебя запросто может подучиться такой, как я. Не дай тебе Бог. Лучше чего–нибудь попроще. Впрочем, бомба никогда не попадает в одну и ту же воронку. Ты будешь другой, и все у тебя будет другое. А я еще чего–нибудь куплю. Мало ли кругом домов. Скажи, этот отель ведь ничего из себя не представляет?</p><p class="p1">— Но, — серьезно сказал мальчик.</p><p class="p1">— Вот и я говорю — но, — сказал Уидлер. — Поехали?</p><p class="p1">— Си, — сказал мальчик.</p><p class="empty-line"/><p class="p1">Уидлер все оформил очень быстро. В его офисе это вообще было неплохо поставлено.</p><p class="p1">Через десять минут он уже несся по улицам города, умиротворенный и веселый. В офисе, кстати, никто не посмотрел на него, как на идиота. Он втайне этого боялся. Впрочем, ничего он не боялся. Да и потом, его слово тут было законом.</p><p class="p1">Ровно в семь пятьдесят пять он остановился у двери отеля, откуда вышел меньше двух часов назад. Мальчик с важным видом слез, взял толстокожую синюю папку, в которую был вложен один-единственный лист.</p><p class="p1">Босые грязные ноги составляли контраст с роскошным мраморным полом, с утра девственно-чистым. Все видели, что мальчика послал Уидлер, поэтому малолетнего лохматого грязнулю никто не остановил.</p><p class="p1">Мальчик с важностью прошлепал к лифту и поднялся на одиннадцатый этаж.</p><p class="empty-line"/><p class="p1">— Нет, — сказала Кло в трубку. — Нет и еще раз нет. Ваша информация неверна. А где, хотелось бы знать, вы ее почерпнули?</p><p class="p1">В трубке прокашлялись и неуверенно сказали, что это исходит из компетентных источников, которые они не хотели бы раскрывать.</p><p class="p1">— Лучше бы этот ваш источник не раскрывал рта. Сделка остается в прежнем виде. Хотите берите, хотите нет. Это ваше право, но наша репутация безупречна. Понятно? Прекрасно. Чао.</p><p class="p1">Тоскливо, протяжно кричали чайки. Кло села к столу, обхватив голову руками, наморщив лоб, проводя по сухим губам таким же сухим язычком. Зря этот черт не дал ей лечь под мальчишку — последнее удовольствие отнял. Или уж сам бы взял ее. Хотя нет, никогда. Она бы сама потом раскаялась. И насчет мальчишки, и насчет Уидлера.</p><p class="p1">А дело–то проиграно. Да. Через пять минут китайцы придут смотреть: номер им известен, они постучатся, потребуют купчую и захотят поехать в отель, на их земельный участок. Принадлежащий Уидлеру. А Уидлер сейчас безмятежно дрыхнет в своей безупречно чистой постели.</p><p class="p1">Она, конечно, не говорит Эмили. Да зачем знать девочке? Девочке, кстати, ничего и не грозит. Теперь ее, Кло, вышвырнут за дверь, а если и не вышвырнут, то унижения не оберешься. В тридцать пять лет поздно начинать. Убыток нешуточный. И даже если все останется, как есть, — это будет первый крупный провал.</p><p class="p1">Не надо было подставлять девчонку. Девчонка мала и глупа. Она все испортила. Она не знала Уидлера. Любопытство, проклятое бабье любопытство. Дрянь.</p><p class="p1">Очень печально. Флавио–то, положим, выкрутятся. Но как быть с Элиотом? Ведь Уидлер возьмет Элиота на работу, только чтобы унизить ее. А Элиот многое знает.</p><p class="p1">И тогда огромная часть тайн ее фирмы окажется в руках Уидлера, у, у, у, Уидлер!..</p><p class="p1">Послышался стук в дверь.</p><p class="p1">Все.</p><p class="p1">Прошло около минуты.</p><p class="p1">Ну что они там тянут?!</p><p class="p1">— Кло! — позвала Эмили.</p><p class="p1">Ну конечно. Поражение тоже должна признать она, а не этот цветок прерии.</p><p class="p1">— Здравствуйте, товарищи! — громко сказала Кло.</p><p class="p1">— Да подожди ты с товарищами! — досадливо отмахнулась Эмили. В номере никого не было, кроме нее. — Пришел мальчишка, принес бумагу. Говорит, от Уидлера. Мистера Уидлера. Тут купчая на отель. И на участок. На мое имя.</p><p class="p1">Кло села на пол и запустила руки в волосы.</p><p class="p1">— Слушай, — задумчиво произнесла Эмили. — Может, еще не поздно спасти сделку?</p><p class="p1">— Спасти?! — переспросила Кло сквозь слезу. — Сделку?! Можешь поставить голову, что сделка спасена! Поздравляю!</p><p class="p1">Она вскочила и расцеловала Эмили в обе щеки.</p><p class="p1">— Поздравляю! Ты все–таки достучалась до него!</p><p class="p1">Эмили не знала, как на все это реагировать. Она смертельно устала.</p><p class="p1">— Ложись, ложись! — хлопотала Кло. — Может быть, примешь ванну? Бедная моя девочка, ты совсем побелела! Ложись, пожалуйста, прошу тебя! Ванну — потом. А я побегу. К китайцам. Они на десятом этаже?</p><p class="p1">— Да, — безразлично сказала Эмили.</p><p class="p1">— Ну, мы побежали смотреть отель, — сказала Кло. — Господи, я же говорила: авось! Авось всегда вывезет! Слава Богу, и да здравствует русское авось!</p><p class="p1">Она поцеловала Эмили в лоб.</p><p class="p1">— Ты ведь не ненавидишь меня?</p><p class="p1">— Ненавижу, — устало усмехнулась Эмили.</p><p class="p1">— Нет, правда! Ведь утром вещи несколько вышли из–под контроля, правда?</p><p class="p1">— А кто сказал, что они всегда должны находиться под контролем?</p><p class="p1">— Девочка моя, ты бредишь. Но, впрочем, это неважно: мы спасены. Кстати, я все равно бы у тебя попросила прощения, вне зависимости от того, выиграли бы мы это дело или нет. Шансы были нулевые. Впрочем, как знать. — Она быстро чмокнула Эмили в щеку и выбежала. А Эмили села на кровать, потом легла, почувствовала шеей и щекой прохладу подушки... Встала. Открыла из последних сил окно. Снова легла. Заснула, улыбаясь, не раздеваясь, как три дня назад.</p><p class="empty-line"/><p class="p1">Проснулась она от того, что кто–то сидел и смотрел на нее. Разумеется, это был Уидлер. Он заметил, что она проснулась, улыбнулся и поставил на одеяло корзину диких орхидей. Одна орхидея розовела в петлице его белого пиджака, а под пиджаком ничегошеньки не было.</p><p class="p1">— Когда я был маленький, — сказал Уидлер, — давным-давно, мы с отцом жили в маленьком домике у моря. Или мне хотелось, чтобы у моря. Или мне кажется, что у моря. Но будем считать, что именно на берегу морском. Так вот, отец все время говорил, что у нас нет денег. Я больше слышать об этом не мог, а он не мог больше ни о чем говорить. Он научил меня плавать. Кажется. Или ходить, не помню. А когда он исчез — даже и не знаю, как он исчез, — я несколько лет почти не разговаривал. Три года просидел в третьем классе. Учителя меня считали не то отсталым, не то двинутым, но хрен редьки, знаешь ли, не слаще, вот... Мне даже позволяли голову держать под партой, я боялся. Я не задавал им никаких вопросов, потому что боялся, а они ни о чем не спрашивали меня, потому что со мной и так все было ясно. И жалели они меня, понятное дело. Короче, лет до одиннадцати такая вот была жизнь. Своеобразная.</p><p class="p1">— Ну, а потом, — продолжал он, бегло взглянув на нее и закуривая, то есть как бы спрашивая взглядом позволения закурить, — я после некоторых обстоятельств стал работать день и ночь, как вол. Работал, работал и в шестнадцать лет купил свой первый дом. Образования у меня никакого, но руки есть. Дом был в самой худшей части города. Команда у меня была, конечно, та еще. Я ее распустил и с лучшими из них стал все это ремонтировать. Я этот дом купил не на ворованные, — поспешно, словно оправдываясь, добавил он. — На самые что ни на есть заработанные. Купил и стал ремонтировать. Я же подрабатывал, я умел, а стоил он копейки. Ну вот, я его отремонтировал, почти в одиночку, потому что от них–то что было толку? И купил два дома. В другой части города. Не самой худшей. Я получил все, чего хотел. С тех пор и пошло. И наконец исполнились все мои детские мечты. Потом появились дамы, леди, бляди. Из тех, у которых внутри всепожирающая Торричеллева пустота. Их привлекает чужой успех. Если бы Тихий океан был полон супа, всего этого супа не хватило бы, чтобы их насытить. Они всосали бы все. Этого, однако, мне было мало. Чужой ненасытностью сыт не будешь. Для них было все равно, кто я и что я. А я нарочно вел себя, как свинья, и чем резче и грубее я их отпихивал, тем больше их тянуло ко мне, они это принимали за проявление силы. Универсальный закон: хочешь чего–то? — фигушки. Не хочешь — получай в изобилии. Чтобы добиться, надо НЕ ХОТЕТЬ. Ну, и я стал играть в разные игры, и игры стали образом жизни. Теперь я понимаю, что я не смог бы выбраться из этого. Даже если бы захотел. И я, кстати, здорово этого хотел. Толчка не было.</p><p class="p1">— Если ты хочешь меня, — тихо сказала Эмили, — иди сюда и обними меня.</p><p class="p1">— Я могу пойти в любой дорогой ресторан, — словно не слыша ее, сказал Уидлер. Он стоял спиной к ней, у открытого окна. Балкон был распахнут, кричали чайки, с пустынного пляжа доносились крики чаек, она проспала до вечера, и багрово-красные отблески легли на пол. — Могу сидеть за своим собственным столиком, за который, кроме меня, никто не сядет, если я этого не захочу. Даже когда меня нет в ресторане. Но я не могу проглотить свою чертову жратву!..</p><p class="p1">— Просто протяни руку, — сказала Эмили. — И дотронься до меня.</p><p class="p1">Они поменялись местами. Теперь она просила его дотронуться до себя. А он молчал.</p><p class="p1">Она расстегнула мужскую сорочку и сбросила на пол. Сняла лифчик. Кинула на стул у стены. Расстегнула мужские брюки, в которых заснула.</p><p class="p1">Он оглянулся.</p><p class="p1">— Прости, — сказал он. — Мне жаль разочаровывать тебя окончательно. Но я уже не умею иначе.</p><p class="p1">— Дотронься, — сказала она с незнакомой ему властностью. И одновременно было в глазах ее детское настойчивое бесстыдство. Она поманила его пальцем. Потом осторожно стала водить тем же пальцем вокруг своего левого соска.</p><p class="p1">Вдруг ей стало зябко. Она снова надела сорочку.</p><p class="p1">— Извини, — натянуто улыбаясь, сказал Уидлер. — Я просто боюсь, что ты исчезнешь.</p><p class="p1">— На самом деле ты всего-навсего не можешь этого сделать, — сказала Эмили. В ее голосе не было ни презрения, ни насмешки, ни вызова. А только бесконечная, невыразимая печаль и горечь.</p><p class="p1">Он рванулся к ней, неудержимый и стремительный. Принялся целовать в затылок, грудь, шею. Обхватил ее крепкими горячими руками. Стремительно скинул с себя все. Она ему помогала. Пальцы ее были холодны и непослушны. Она прикасалась к своему телу, как к чужому.</p><p class="empty-line"/><p class="p1">...Но будем лучше говорить о прозе.</p><p class="p1">Что может проза? Чему она способна научить, чем развлечь, чем порадовать? Проза — всего лишь инструмент познания мира. Одним из многих. У нее, конечно, свое пространство, свои пейзажи, рельефы, повороты дороги... Но она не может никому ничего вдолбить. Вообще говоря, ее единственная задача, как ее понимает всякий честный автор, — это пояснить читателю, что он не один такой. И, может быть, ему еще будет хорошо-хорошо-хорошо... хорошо... хорошо…</p><p class="empty-line"/><p class="p1">Да, вот и это, как видим, можно передать средствами прозы.</p><p class="p1">— Опытный ты, — сказала ему Эмили.</p><p class="p1">— Да, — сказал он, — ты тоже ничего. Ты все чувствуешь.</p><p class="p1">Они помолчали.</p><p class="p1">— Слушай, — сказал Уидлер, — а я прочел у Рут... как ее? Ну, я не помню фамилию... Еще книжка посвящается Биллу, мы с ребятами все думали — ну и мужик же, наверное, этот Билл! Там так подробно написано, как искать клитор, там даже написано, что клитор — это такой странный зверек, он где–то там всегда прячется... Нет, тебе со мной правда было хорошо?</p><p class="p1">— Правда, — тихо сказала Эмили.</p><p class="p1">— Ну, спасибо. Правда. Так вот, я до сих пор, знаешь, как–то не очень хорошо его себе представляю. Иногда сразу нахожу, а иногда рыщешь, рыщешь, не находишь...</p><p class="p1">— Ты его сейчас разве не почувствовал? — улыбаясь, спросила Эмили голосом старшей.</p><p class="p1">— Нет, ну почувствовал, конечно... но не так чтобы очень.</p><p class="p1">— У меня он небольшой, — сказала Эмили. — Сейчас поищем. Давай лапу. Почему лапа холодная? Вот так...</p><p class="p1">Она поцеловала его руку, потом осторожно проводила ее в нужном направлении.</p><p class="p1">— Вот. Чувствуешь?</p><p class="p1">— Какая прелесть! — сказал Уидлер. Потом осторожно провел влажным пальцем по губам Эмили.</p><p class="empty-line"/><p class="p1">...Но будем лучше говорить о прозе.</p><p class="p1">Конечно, проза еще никого не удержала от злодейства, никого ничему не научила, никого не сделала чище, светлей, умней и прочая. Но зато она способна энергетику авторской личности передавать усталому читателю. Она черпает эту энергию ниоткуда: из столкновения двух сил, двух сюжетов, двух далеких друг от друга слов. Патетики и иронии. Но именно этим она делает читателя лучше!.. чище!.. лучше!.. чище!.. лучше!.. ч и щ е... Уф…</p><p class="empty-line"/><p class="p1">— Слушай, — сказал Уидлер. — Ты не думай, я не думаю, что ты мне отдалась за купчую.</p><p class="p1">— Забудь ты, — сказала Эмили.</p><p class="p1">— Ты не устала?</p><p class="p1">— Что ты, мне так хорошо.</p><p class="p1">— Мне тоже, — сказал Уидлер. — Я закурю, а?</p><p class="p1">— Конечно.</p><p class="p1">— Слушай, а это ничего, что я не предохраняюсь?</p><p class="p1">— Вообще сейчас опасный период, но ты делай, как тебе лучше. Мне же тоже от этого лучше.</p><p class="p1">— А тот ублюдок...</p><p class="p1">— Не бойся. Он вовремя выдергивался.</p><p class="p1">— Говорят, вредно.</p><p class="p1">— Ну вот, видишь.</p><p class="p1">— Слушай... А период правда опасный?</p><p class="p1">— Успокойся, я не собираюсь шантажировать тебя ребенком.</p><p class="p1">Уидлер приподнялся на локте.</p><p class="p1">— Надо ли понимать, что ты не хочешь за меня замуж?</p><p class="p1">— Нет, ни замуж, ни детей я сейчас как–то не планирую.</p><p class="p1">— Но ты же любишь семейственность!</p><p class="p1">— Но я еще молода. Карьера не сделана, на ногах я не стою толком...</p><p class="p1">— Какая карьера! Я куплю тебе прекрасный дом, питание в лучших ресторанах, одежда от кого захочешь, хоть с плеча Пьера Кардена...</p><p class="p1">— Мне это все уже предлагали.</p><p class="p1">— Кто?!</p><p class="p1">— Тот ублюдок.</p><p class="p1">— И ты что?</p><p class="p1">— Согласилась, конечно.</p><p class="p1">— Нет, серьезно. Ты совсем не хочешь за меня замуж?</p><p class="empty-line"/><p class="p1">...Но будем лучше говорить о прозе.</p><p class="p1">В отличие от поэзии, проза не знает ограничений. Ни тематических, ни формальных. Она касается чего угодно и не связана законами размера и рифмы. Но у прозы свои законы. Она избегает прямых указаний. Настоящая проза любит намеки, тайные параллели, ходы, выкрутасы, фигуры умолчания. И пока она отвлекает читателя, позволяя пробегать одно, сосредоточиваться на другом, увязать в третьем, перескакивать через четвертое, блаженно мечтать на пятом, — герои ведут себя, как хотят, живут своей жизнью, занимаются, чем только сочтут нужным, потому что они совершенно свободны! свободны! Свобод-ны!..</p><p class="empty-line"/><p class="p1">— Слушай, — сказала Эмили. — Мне с тобой так хорошо... Говорят, если двоим слишком хорошо в постели, значит, они будут скандалить. И только в кровати им будет хорошо, а все остальное их будет тяготить, и они не решаться разойтись из–за этой кровати и своего страшного взаимного тяготения, и будут вечно мучить друг друга...</p><p class="p1">— Глупости, — сказал Уидлер, уже сонный и совершенно счастливый. — Это все чушь. Это неудачники выдумали, как и большинство других легенд. О пользе и необходимости страдания, о вреде и невозможности счастья... Эта совместимость — просто показатель другой, универсальной совместимости. Решительно во всем, вообще, понимаешь? То есть, например, пастушку тянет к герцогу, а принцессу — к свинопасу. Это ведь не значит, что герцог и принцесса развратны и не пожалеют для удовлетворения своих скотских интересов ничего — ни репутации, ни денег, ни чести и происхождения? Конечно, нет! Это просто значит, что ими движет не похоть, а нечто большее. Что и сближает их с объектом стра-а-асти, — Уидлер зевнул блаженно, — даже если у них нет ничего общего. Внешне. В образовании там, в достатке, в уровне интеллекта, как там у вас в университете это еще называют. Взять тебя: красивая, богатая девушка. Свой отель в Бразилии. Кстати, ежели ты за меня выйдешь, он все равно останется твоим, только иногда советуйся со мной, ладно? Я тебя буду очень основательно и бесплатно консультировать. Так вот. Ты красива, богата, умна, окончила университет, семь языков плюс свой, очень красивый, гораздо более богатый, гибкий и выразительный. И я, грубый, необразованный, неотесанный мужлан. Что нас сближает? Родство душ!</p><p class="p1">— И вообще, — продолжал Уидлер, затягиваясь и пуская дымок из ноздрей. — Тут ведь как. Двое любят друг друга, — он потянулся и уткнулся лицом в грудь Эмили, — потому что внутри у них сидит один и тот же черт. Искорка такая. И она–то все определяет. Хотя на самом деле это может быть, например, общая любовь к манговому соусу...</p><p class="p1">— Ляг вот так, — сонно сказала Эмили.</p><p class="p1">— Как именно? — сонно заворочался Уидлер.</p><p class="p1">— Глупый. Все тебе надо объяснять. Ну вот так!</p><p class="p1">Он подвинулся ближе, и она зажала его ногу между своих.</p><p class="p1">— Мне так больше нравится. И прижмись ко мне крепче. А то я боюсь, что ты исчезнешь.</p><p class="p1">— Нет уж, — сказал Уидлер. — Теперь не надейся. Я самый долгосрочный контракт в твоей жизни. Ладно?</p><p class="p1">Но Эмили уже спала, улыбаясь во сне. Ей снился Уидлер, показывающий китайцам отель. «Прекрасно рисовое зерно на рассвете, — говорил Уидлер, — но Эмили прекраснее. А с вас, ребята, хватит и отеля. Привет руководству Коммунистической партии Китая!»</p><p class="empty-line"/><p class="p1">Мальчик сидел на берегу океана, загадочно улыбаясь. Он напевал песенку, смысла которой Уидлер не понял бы, а Эмили бы обязательно поняла и перевела примерно так:</p><p class="p1">Ах, ла-ла-ла, ла-ла, ла-ла...</p></span></span>
