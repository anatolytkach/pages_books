<span><span id="id16"><div class="title3">
<p class="p"><strong>IV</strong></p>
</div><p class="p1">...Эмили шла по пустому побережью.</p><p class="p1">Клаудиа стремглав умчалась вместе с Флавио — отлавливать загадочного Элиота и того из местных подрядчиков, чьи яйца подвергались столь серьезной опасности. Рабочие вернулись к безделью. Говорят, что только русские умеют филонить по-настоящему. Ничего подобного: это черта любого отсталого народа. Еще валят всегда на свои исторические корни, национальный менталитет и прочую бредятину. Что ни говори, а осовременивать и цивилизовать дикарей — достаточно унылое занятие.</p><p class="p1">И вместе с тем в дикости есть свое очарование. Не случайно ее родной Запад — дикий. Пыль, горячий песок, скалы, голубоглазые веснушчатые парни. Только там еще осталось что–то от настоящей Америки — той Америки, которую почем зря малюют в комиксах и снимают в дешевых фильмах. Она чувствовала эту Америку лучше, чем ее друзья и сверстники. И любила пустынные пейзажи, которых еще не коснулась цивилизация. Как это уживалось в ней, она бы и сама не ответила. С одной стороны, стремление все упорядочить, все цивилизовать и поставить на место. С другой — какая–то странная, дикая часть ее души жаждала новизны, не принимала рациональных объяснений, требовала непостижимого.</p><p class="p1">Впрочем, даже теперь Эмили прекрасно помнила обо всех поручениях Клаудии. Инвентаризацию, как Клаудиа это называла, она закончила легко и быстро: переписала технику, уточнила условия контракта и спросила рабочих, не притесняют ли их местные подрядчики. Флавио должен был вернуться за ней после того, как он забросит Кло в аэропорт. То, что Элиота оказалось не так легко поймать, можно было предположить: судя по тону Клаудии в разговоре с ним, еще в буфете фирмы, — трудолюбием он не отличался. Сейчас он улетел — якобы на родину невесты, жениться. В это верилось с трудом, особенно если верить Кло, утверждавшей, что он еще не расхлебал своего предыдущего, третьего по счету и наиболее скандального развода. Местный подрядчик гулял на той же свадьбе. Клаудиа посулила привести Элиота на поводке и, судя по всему, готова была сдержать свое слово. Сейчас же до возвращения Флавио оставался как минимум час. Эмили сама была не слишком легка на подъем, хотя в лени ее никто не упрекнул бы. Ей нравилось спокойно идти по побережью наедине со своими мыслями, с их ровным течением, под такой же ровный и мерный шум океана. Волна накатывала на песчаный берег, стремительно мутнея, унося поднятый со дна песок, и рассыпалась у ее ног. Эмили отпрыгивала.</p><p class="p1">Вечером ей предстояло заменить Клаудиу на таинственном свидании, о котором та не слишком распространялась. «Полезный и влиятельный человек, — говорила она, уже усаживаясь в машину. — Надо на всякий случай заручиться его поддержкой. Конечно, со странностями, так что держи ухо востро. Первая твоя генеральная проверка, боевое крещение. Как друг — незаменим, как враг — врагу не пожелаю».</p><p class="p1">Она укатила.</p><p class="p1">Эмили знала, как она действует на мужчин. В ее внешности все говорило о тайной, властной силе ее характера, хотя трудно было заподозрить в скромной, диковатой красавице дремлющий темперамент и железную волю. Она, честно говоря, не любила копаться в себе и, чувствуя скрытые, необузданные силы, побаивалась их. Но пока неизменно держала себя в узде. А если понадобится тонкая дипломатия... что же, можно пустить в ход обаяние невинности, кажущееся простодушие и всю свежую прелесть Запада.</p><p class="p1">Обидно, как ни говори, что скоро этот дикий берег приобретет все черты нормального цивилизованного курорта. Конечно, это неизбежно. Много ли осталось на Земле таких уголков? Впрочем, когда–то здесь уже была гостиница, старая и не слишком популярная. Хозяин, видимо, разорился. Эмили нравилось придумывать чужие биографии, вписывая их в пейзажи и интерьеры. В кампусе, еще студенткой, она любила по надписям и случайно забытым фотографиям представлять, кто жил в комнате до нее. Эту надпись над кроватью «Кончил дело — гуляй смело; кончил — гуляй!» придумал весельчак и разгильдяй, не слишком удачливый в любви. Вряд ли кто–то повесил бы такую табличку у собственного ложа. Скорее всего, это было напутствие соседу, который был более удачлив. Не со зла — так, дружеская шутка. Когда удачливый сосед принимал девушку, весельчак уходил, а возвращаясь, дружелюбно подкалывал обоих. А эта фотография обезьяны, сосущей банан, с пририсованными к банану яйцами (и что это яйца всем не дают покоя?), — дело рук какого–нибудь закоренелого и не слишком умного циника, из тех, что пририсовывают груди президентам в учебнике истории.</p><p class="p1">Эмили и сейчас придумывала хозяина отеля, прекрасно отдавая себе отчет в том, что ее фантазии грешат литературностью и прямолинейностью, но отчего–то придумывать одинокого мечтателя, владельца прогорающей гостиницы, было приятно. Немолодой, одинокий, перевидавший в жизни много всякого всего. Купил отель на диком берегу и стал ждать таких же, как он сам, гостей. Жил тут в уединении, слушал шум океана, мечтал подарить этот океан и этот дикий пляж своим будущим постояльцам, романтическим неудачникам. Слушать с ними зимний гул волн. Пусть приезжают сюда с женщинами, а лучше — без женщин. Никакой суеты, угодничества, ухаживаний. Слишком пустынно, слишком далеко от города. До Великой Депрессии, от которой им здесь тоже не поздоровилось, еще годы и годы. Всю жизнь копил и откладывал, и вот — купил гостиницу. Но никто не хочет ехать в эту романтическую даль, вдыхать йодистый, загадочный запах Океана, вслушиваться в его гулкую речь, пытаться расслышать в ней темные, странные слова неизвестно о чем. Одиночество, покой и бедность. Разве что иногда случайная парочка остановится ненадолго, но назавтра же съезжает по требованию молодой. Хозяин, конечно, и так, и сяк пытается угодить, показывает любимые уголки побережья, рассказывает местные легенды, готовит коктейль собственного изобретения. С маслинами. Но ничего не помогает: молодая приехала путешествовать, ей комфорт подавай. Она не расположена слушать старые легенды в диком и глухом месте. В первую же ночь заниматься любовью мешает шум океана, который, как в старом французском анекдоте, сбивает с ритма. Муж, послушный, недалекий тюфяк виновато пожимает плечами, извиняясь перед хозяином. Хозяин кивает. Этого можно было ожидать. Где же сейчас найдешь романтиков? Их времена прошли. Настала эра звукового кино, новых автомобилей Форда и совершенно бездушного джаза, который не чета прежнему, настоящему.</p><p class="p1">А потом хозяин... нет, не умирает, зачем же. Он разоряется и уходит. Исчезает отсюда. Уходят, как и пришел, налегке. Без разочарования, но и без прежней надежды. Так, — уходит, куда глаза глядят, прекрасно зная, что таких, как он, на этом берегу, а, может быть, и на этом свете, не осталось. Он уходит одинокий, печальный, добрый и гордый, оставив на берегу свою мечту — полуразвалившуюся гостиницу.</p><p class="p1">Потом приходит кризис, тяжелые времена, всем — ни до чего. Потом война сотрясает континент, хоть и не касается его. Потом сюда бегут проигравшие, скрывающиеся и пленные. Никому нет дела до пустой, разваливающейся гостиницы на пустом, диком берегу. Зимний ветер выдувает последние остатки жилого запаха из разрушающихся комнат, из осыпающихся стен. Крыша проваливается. Это не такая уж добротная постройка, хоть она и достояла до наших дней. Как старая церковь, в которой не служили. Гостиница, которая оказалась никому не нужна. Теперь ее снесут. На ее месте будет отель, похожий на Клаудиу. Блестящий, сверхсовременный, милый, но неотличимый от сотен других...</p><p class="p1">Эмили вошла в полуразрушенное здание. Стоять ему недолго. Она пошла по серой каменной лестнице, придерживаясь рукой за ветхие перила, другой рукой ощупывая шершавую стену. На втором этаже, в одной из комнат, на стене висело мутное зеркало. Должно быть, здесь была ванная. Впрочем, не обязательно. Эмили заглянула в мутную стеклянную гладь. Это зеркало долго отражало только пустоту. Теперь она увидела в нем себя, странно дисгармоничную, неуместную здесь. Пустота, серый камень, запустенье и хлам — и она, в яркой юбке, в белом жакете, смуглая, с открытой грудью, — эта блузка держалась на одних тонких тесемочках, и уж конечно, под ней не было лифчика. Чуть обозначались маленькие твердые соски под нежной, шелковистой тканью.</p><p class="p1">Внезапно все тело Эмили покрылось испариной. За ее спиной в зеркале мелькнул силуэт.</p><p class="p1">Напридумывала, поспешила она успокоить себя. Детские сказки. Игры в привидения.</p><p class="p1">Но странный шорох нарушал тишину — если можно было назвать тишиной. Гул океана, где–то льется струйкой вода — Господи, неужели в этом рушащемся на глазах здании цел водопровод? — строить они все–таки умели... Но в этот гул и шум влился новый, сыпучий, вкрадчивый шорох. Штукатурка где–то осыпается, что ли?</p><p class="p1">Нет... шаги!</p><p class="p1">Эмили резко обернулась.</p><p class="p1">Огромный мускулистый мулат, словно призрак, но чересчур живой, чересчур вещественный и плотский для призрака, медленно, осторожно, как огромная кошка, крался по коридору. Эмили не видела его глаз, но знала, что он видит и преследует цель. Он шел прямо на нее... повернул... остановился.</p><p class="p1">Эмили замерла.</p><p class="p1">Тут, вглядевшись (близорукая, она никогда не носила очков и пренебрегала линзами, от которых уставали глаза), она наконец увидела.</p><p class="p1">Почти сливаясь со стеной, часто дыша, так что высокая грудь вздымалась и опускалась, стояла высокая негритянка — нет, тоже мулатка, но покрасневшая сквозь смуглоту. Теперь Эмили все видела отлично. Он ее преследует? Она что–то знает? Может быть, о сделке, и он — агент конкурентов? Он сейчас ее убьет. Здесь же никого нет. Надо помешать, предупредить... Она приблизилась, но пока ничем себя не обнаруживала.</p><p class="p1">А этим двоим было не до нее. Мулат резко шагнул к женщине и рванул на ней легкое белое платье. Ткань порвалась с треском. Платье упало к ее ногам. Мулат не касался большой, смуглой груди с набухшими, почти черными, крупными сосками. Женщина не сопротивлялась — нет, она вся подалась ему навстречу и дышала часто, с хрипом. Эмили только теперь разглядела, что ей было не больше восемнадцати лет, но здесь, под южным солнцем, развиваются и созревают рано. Странный, новый запах примешался к запаху океана и пустого, разрушающегося здания. Мулат резко сбросил плавки и протянул руки к девушке, по-прежнему стоявшей у стены. Но он не касался ее тела — только водил руками вдоль него, чувствуя ее тепло. Вот легко коснулся грудей, бедер... И девушка кинулась к нему, сомкнув объятия, прижавшись к нему всем телом. В беззвучном танце они стремительно кружились среди развалин.</p><p class="p1">Никто не собирался никого убивать. Ритуальный танец? Странная игра? Эмили еще не приходило в голову, что эти развалины служат случайным туристам и местным жителям храмом любви, где некому потревожить и помешать им...</p><p class="p1">Мулат поднял девушку, придерживая ее за ягодицы. Она по-прежнему обхватывала руками его шею, вжимаясь крупными, черными губами в его губы, шею, плечи. Двое подвигались все ближе к стене, и наконец спина девушки коснулась серого, шершавого камня. Почти в тот же миг она протяжно застонала, впившись руками в волосы мулата. По-прежнему придерживая ее под ягодицы, он всем телом прижал ее к стене. Своими ногами она обнимала его бедра.</p><p class="p1">Мулат словно подкидывал ее вверх, сжимая ее ляжки, иногда освобождая одну руку и так же яростно хватая ее за грудь, и было слышно его громкое, частое дыхание. Это был танец первобытной страсти среди руин. Струйка воды стекала по стене, струйка штукатурки сыпалась с потолка. Своей любовью они разрушали собственное убежище. После одного из самых резких толчков — они становились реже, но ярость нарастала, — стена дала трещину, и вода из проржавевшей трубы, ржавая, холодная вода хлынула потоком. Но она не могла охладить их разгоряченных тел. Мулатка, запрокинув голову, ловила открытым ртом капли. Вода стекала с ее губ. Она вцепилась ногтями в плечи мужчины, сама поднимаясь и опускаясь в такт его движениям, вторя им со звериной безошибочностью.</p><p class="p1">Эмили впервые видела это. Она, естественно, не избежала порнофильмов и эротического искусства, посмотрела почти все, о чем говорили в колледже, прочла Балли и Миллера, Арсан и МакНил. «Девять с половиной недель» казались ей пустоватым фильмом — она предпочитала роман, где и герои выглядели человечнее, и мотивы их поведения объяснялись проще. Да и вообще сексу уделялось слишком много внимания во всем этом — Господи Боже ты мой, было бы из–за чего сходить с ума, когда для думающей и способной женщины в мире столько возможностей реализации! При минимуме эротических переживаний — несколько поцелуев, влюбленностей, вполне платонических, и любования своим цветущим и свежим телом перед зеркалом — Эмили прекрасно отдавала себе отчет, что силы, дремлющие в ее теле и душе, ей и самой не вполне подконтрольны. Но то, что ее ждет, — это совсем другое дело, другая судьба, ее судьба. А происходившее перед ней сейчас... Нет, она не стыдилась того, что подглядывает. Нет, это не было стыдно, тем более — в первый раз она присутствует при... Почти участвует. Но... это не может быть тем, о чем она читала. Она читала о кратковременном, часто случайном удовольствии, дополняющем жизнь богемы, приятно разнообразящем монотонность будней, — не более того! Здесь же перед ней была страсть, живая, пугающая, не страшащаяся ничего и никого. Этих двоих, даже одетых, даже поврозь, невозможно было бы представить в современном городе. Перед ней буйствовала, не желая смириться, не желая остановиться, — буйствовала и длилась темная, чудовищная стихия, в которой не было почти ничего человеческого. Как могут общаться на людях эти двое? Обмениваясь случайными взглядами, понимающими улыбками, томительными рукопожатиями? Может ли быть между ними духовная близость, нужна ли им она? Или — только стихия, только сжигающий, жаркий, безрассудный поток страсти? Повторится ли это у каждого из них с другим или другой? Как можно шутить над этим, сводить это к развлечению, к удовлетворению потребности («стакан воды», о котором так шумели во времена сексуальной революции пятидесятых!) — как можно не пугаться этого взрыва стихии, буйства? Может быть, если их так кидает друг к другу, у них есть и духовное, тайное, внутреннее родство? Нет, едва ли. Как правило, речь идет о простом сходстве темпераментов, раскрепощении скрытого. Не случайно так безумно швыряет друг к другу короля и прачку, богача и бродячую артистку-танцовщицу, подлеца и святую, святого и последнюю портовую тварь... Это голос чего–то более древнего, загадочного и непостижимого, чем разум.</p><p class="p1">Мулат в последний раз подбросил девушку, крепче прижал ее к себе, впился зубами в ее плечо. Она снова запрокинула голову, застонав протяжно и сладко. Эмили представила, как горячая тугая струя ударяет в ее чрево. Мулат опустил ее на землю, но не отошел. Теперь они целовали друг друга — тихо, нежно и благодарно. Девушка гладила его плечи, он стоял, уткнувшись лицом в ее волосы.</p><p class="p1">Краснея, Эмили сбежала по лестнице. Они вряд ли услышали быстрый стук ее каблучков. Им было не до того. Да если бы и услышали — преследовать ее сейчас у них не было ни времени, ни сил. Ни желания.</p><p class="p1">А вот так забываться Эмили никогда не умела. Она всегда следила за собой со стороны. Впрочем, нет. Один раз...</p><p class="p1">Это было, когда ей едва исполнилось пятнадцать. Она тоже созрела и развилась рано, и в пятнадцать лет на нее уже заглядывались, хотя высокие скулы, строгие глаза, аскетические очки в простой оправе — все в ней говорило об уме, воле, решимости, а с такими девушками, знает на Западе каждый, лучше не связываться, пока они сами не сочтут себя готовыми к любви. На Западе такие отважные девчонки еще не перевелись: приставать к ним прежде, чем смягчатся их взгляды и будет достигнута некая, им одним известная цель, — дохлый номер.</p><p class="p1">Эмили впервые в жизни посмотрела «Сердце ангела» — странный и страшный фильм Паркера, полный лейтмотивов, намеков, хитросплетений... Она любила Микки Рурка, хотя он казался ей не слишком интеллектуальным и человечным. Но было что–то такое в его глазах, вкрадчивых движениях, чуть полноватой, но крепкой фигуре... Она слышала, что Микки — боксер и по сей час неплохо выступает на профессиональном ринге. Слышала она и то, что количество его женщин давно измеряется чуть ли не четырехзначной цифрой, что образования у него никакого, что он строит собственный дом в Голливуде, надеясь всех перещеголять и потому берясь ради прибыли за самые ничтожные роли. Она знала, что в детстве и ранней юности Рурк принадлежал к лихой и разбитной банде, которая терроризировала все окрестные кварталы, как банда «Алекса» из «Заводного апельсина», хотя, разумеется, без такого садизма... Главной добродетелью в этой банде считалось количество сексуальных подвигов. У всех, кто в компании состоял, на половом члене была татуировка, — была и у Микки, сообщала дотошная журналистка, видимо, эмпирически путем подтвердившая свои основанные на слухах догадки. Что ж, по понятиям Эмили, ради рекламы можно было трахнуть и журналистку...</p><p class="p1">Небывало откровенная и столь же небывало эстетская, единственная на весь фильм истинно эротическая сцена, в которой Микки Рурк безумствовал в постели с молоденькой негритянкой — дочерью собственного героя, которую потом убивал, выстрелив ей из пистолета между ног, — эта сцена произвела на Эмили глубочайшее впечатление. Там тоже хлестала вода в протекающий потолок, а затем кровь проступала на потолке и на спине Рурка — метафора возмездия, отчаяния и кровосмесительства. Негритянка была очень молода и еще более красива, чем в фильме «Вестсайдская история».</p><p class="p1">Когда Эмили возвращалась с сеанса со своим одноклассником Питером, ей претили его тупые, прыщавые остроты:</p><p class="p1">— Почему, ты думаешь, он ей выстрелил между ног? В таком месте у такой женщины не то что кое–что — и пистолет кончит. Пистолет просто кончил, и все дела.</p><p class="p1">Эту остроту Питер повторил раза два или три — настолько она ему нравилась и как свидетельство знания жизни. На самом деле в их классе вовсе не было распутства.</p><p class="p1">В тот же день, вечером, Эмили уселась в ванную, чтобы с полчасика поблаженствовать. Она думала о Рурке, о кровосмесительстве, он стоял перед ней ясно, объемно и живо. И только тут она заметила, что при этом гладит себя между ног. Рассказать кому–то? Никогда в жизни! Признаться себе самой? Но она даже не вполне отождествила то, о чем писали в книгах как о занятии вредном и постыдном, со своими ощущениями. Представила мужчину, который нравится, и при этом... ну, совсем немного... погладила себя. Это было действительно очень приятно. И, может быть, только в эти десять минут она думала о чем угодно, кроме того, как она выглядит со стороны.</p><p class="p1">С тех пор ее сознание не отключалось. И она всегда знала, как выглядит со стороны.</p><p class="p1">Хотя, быть может, забудь она об этом на секунду — она выглядела бы лучше?</p><p class="p1">Но темная страсть не для нее. В конце концов, здесь, на диком берегу, где люди просты и естественны; здесь, в полуразвалившемся здании, которое только и жило благодаря чужой любви; среди развалин, которые с завистью или снисхождением всезнания наблюдают за чужой жизнью, за самым живым, что в чужой жизни может быть... Это поэтично, это не отвратительно, но это странно и возможно только тут.</p><p class="p1">Флавио приехал через двадцать минут. Она сидела на берегу, подперев подбородок кулачком. Рабочие по-прежнему бездельничали, но на вполне законных основаниях: начальства не было, а рассматривать тоненькую иностранку как надсмотрщика им не приходило в голову. Эмили смотрела вдаль, в океан, который к вечеру собирался по-настоящему штормить. Волны позеленели, они росли, гулко бились о плоский берег, с шуршанием растекались пенным кружевным узором по отглаженному песку.</p><p class="p1">Всю дорогу до гостиницы Эмили была, как обычно, вежлива, но тиха и немногословна.</p><p class="p1">— Вас никто не обидел? — спросил Флавио со своим милым акцентом. — А то ведь эти наши лоботрясы и головорезы, я знаю...</p><p class="p1">— Ваши лоборезы и головотрясы, — улыбаясь, сказала Эмили, — были тише воды, ниже травы.</p><p class="p1">Черт возьми, что это со мной, подумала она. Завидую я, что ли, этой мулатке?..</p><p class="p1">До восьми, до свидания, оставалось еще двадцать минут. Эмили взбежала на ступеньки отеля, прошла через холл, вскочила в лифт, так и не почувствовав прицельного, в упор следящего за ней, насмешливого и властного взгляда.</p></span></span>
