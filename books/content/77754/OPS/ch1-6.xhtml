<body class="z">
<span><span><p class="p1">— Ты не будешь мыть посуду. Тебе никогда больше не надо будет этого делать. Я сам буду мыть посуду. Я буду покупать продукты. Я буду сам готовить. Ты знаешь, я это умею. Еще я буду мыть полы. Я буду чистить ковер. Я не хочу делить тебя с пылесосом. Я буду кормить тебя. Одевать и, естественно, раздевать. Одевать утром, а раздевать вечером. А иногда наоборот. Как уж получится. Я буду рассказывать тебе сказки.</p><p class="p1">— Сейчас я как раз слышу одну из них.</p><p class="p1">— Увидишь. Вечером, ночью и утром я буду заботиться о тебе, а днем ты можешь встречаться со своими друзьями. Которые больше понимают в Пикассо, чем сам этот недалекий испанец.</p><p class="p1">— Темно, — вздохнула она.</p><p class="p1">Вот теперь он доволен, подумалось ей. Расписался за двоих. Все решил. Все права принадлежат ему. Я вся твоя, любимый. Великодушен и счастлив. Потому что Хозяин. Потому что ни с кем не намерен делить меня, даже со мной. Без него меня теперь нет. И если он вздумает уйти, пустоту будет уже не заполнить. Сплошной черный квадрат.</p><p class="p1">Джон зажег свет.</p></span></span>
</body>
