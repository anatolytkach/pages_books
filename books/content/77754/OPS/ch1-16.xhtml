<span><span id="id14"><div class="title3">
<p class="p"><strong>II</strong></p>
</div><p class="p1">— Ну все, мама, я пошла.</p><p class="p1">Эмили с трудом втащила огромный чемодан в огромный «Грейхаунд» — пустой автобус, стоящий в одиночестве посреди пустой дороги. Рейс «Глушь — Нью-Йорк». Из глуши, да не греши... Мама глядела на нее сквозь стекло и молча шевелила губами. Эмили тихо плакала, без слез. Плакать теперь нельзя никогда. Правда, богатые тоже плачут, но не ранее, чем разбогатеют...</p><p class="p1">Автобус взревел и медленно поплыл по пыльной дороге. Сгорбленная фигурка мамы медленно таяла вдалеке. Эмили сняла очки.</p><p class="empty-line"/><p class="p1">Эмили сняла очки и близоруко сощурилась на рассевшихся вокруг стола мужчин. Она знала, что этот ее беззащитный взгляд неотразимо действует на мужчин известного сорта. Мужчин, от которых что–то зависит. Мужчин, которые любят чувствовать себя сильными, черпая свою силу в беззащитности других. Эмили к тому же знала, что слабее этих мужиков никого нет на свете. Слабее и гнуснее...</p><p class="p1">— Знаете, я никогда не уезжала со Среднего Запада, — доверчиво глядя на гладенького, с острыми голубенькими глазками Майкла Клинтона, тихо говорила Эмили. — Я окончила университет, защитилась, работала в небольшой фирме в Чикаго...</p><p class="p1">— Какие языки вы знаете? — перебил ее прыщавый круглолицый Роберт, смоливший «Кэмел» и небрежно стряхивавший пепел мимо пепельницы.</p><p class="p1">— Я владею испанским, португальским, французским, итальянским, — с нежностью глядя на него отвечала она. — В совершенстве, — добавила Эмили и мило улыбнулась.</p><p class="p1">— В совершенстве, — пробормотал Майкл, задумчиво глядя на ее грудь. — Совершенство — это хорошо. А еще?</p><p class="p1">— Еще... немного владею китайским и японским.</p><p class="p1">— А как лучше овладевать — в совершенстве или немного? — сострил прыщавый Роберт и громко захохотал.</p><p class="p1">Эмили снова улыбнулась, ничего не сказав. Старина Карнеги был начеку. Майкл поморщился, скосившись на Роберта.</p><p class="p1">— Скажите, — приступил к допросу солидный, крупный Джек Харрисон, — почему вы избрали международную юридическую практику, а не обычные криминальные дела?</p><p class="p1">Это был хороший вопрос. Эмили, как бы в задумчивости, провела пальцами по волосам, как пианист, чуть притрагивающийся к клавиатуре.</p><p class="p1">— Меня всегда интересовала культура, — взволнованно заговорила она, задерживая взгляд на Майкле. — Чужие обычаи, нравы... Знаете, мне всегда хотелось примирять людей между собой, ведь у них так много общего! Это особенно ясно понимаешь, когда глубоко изучишь чужие законы. — Эмили сделала едва заметную паузу после слова «глубоко». — Это куда увлекательнее, чем вести уголовные дела.</p><p class="p1">— Отчего же? — глубокомысленно изрек Роберт, закуривая новую сигарету. — Уголовнички — это интересно.</p><p class="p1">— О, я позволю себе не согласиться с вами. Улаживать разногласия между людьми, указывать им пути примирения — что может быть интереснее? Знаете, когда глубоко знаешь нравы и обычаи разных народов, то неизбежно приходишь к выводу, что у них нет ни малейшего повода к ссоре.</p><p class="p1">— Ни малейшего? — усмехнулся Майкл.</p><p class="p1">— Ни малейшего, — подтвердила Эмили. — И, знаете, что всех объединяет? Вовсе не политика, даже не юриспруденция, а...</p><p class="p1">— Бабы, — захохотал Роберт.</p><p class="p1">— Культура, — улыбнулась Эмили, как бы не расслышав прыщавого ублюдка, который начинал выводить ее из себя. — Культура примиряет всех.</p><p class="p1">— Вы курите? — спросил Майкл.</p><p class="p1">— Даже не пробовала, — не моргнув глазом, соврала Эмили.</p><p class="p1">— Хорошо, — молвил Джек. — Что вы скажете, мисс Рид, если мы потребуем, чтобы вы завтра утренним рейсом вылетели в Рио–де-Жанейро?</p><p class="p1">Эмили в душе заорала от счастья, мысленно облобызала всех присутствующих, потом плюнула в морду прыщавому Роберту, щелкнула по носу похотливого Майкла, потрепала по щеке солидного Джека, прошлась нагишом по столу, сметая бутылки с минеральной и пепельницы, подпрыгнула до потолка, покачалась на люстре и спрыгнула вниз прямо в объятия...</p><p class="p1">Эмили изобразила минутную задумчивость, на самом деле размышляя о том, в чьи объятия ей бы хотелось в этот миг спрыгнуть нагишом с люстры. Так и не решив этот сложный вопрос, она медленно надела очки и тихо переспросила:</p><p class="p1">— Завтра?</p><p class="p1">— Завтра, — подтвердил Майкл. Он был здесь главным и, задавая свой вопрос, Джек успел перекинуться с ним быстрым взглядом.</p><p class="p1">— Я бы спросила — а почему не сегодня?</p><p class="p1">Мужчины захохотали. Девочка была явно что надо.</p><p class="p1">— А не страшно? — спросил Джек. Похоже, он был здесь самый человечный из всех.</p><p class="p1">— Страшно, мистер Харрисон, — честно созналась Эмили. — Но было бы куда страшней, если бы вы отправили меня гораздо ближе.</p><p class="p1">— На хер? — это, конечно, Роберт пошутил.</p><p class="p1">— За дверь, — не удостаивая его взглядом, кротко молвила Эмили.</p><p class="p1">...В буфете, куда ее привел стремительно потеплевший Харрисон, Эмили поняла, что проголодалась капитально. То ли напряжение дало себя наконец знать, то ли просто заговорила молодая, здоровая плоть, которую Эмили не подкармливала со вчерашнего вечера. С утра она не ела ничего, чтобы изо рта не пахло, хотя полость рта была обработана специальным дезодорантом отвратительного ментолового вкуса.</p><p class="p1">— Что вы предпочитаете?</p><p class="p1">— О, благодарю вас, я заплачу сама...</p><p class="p1">— За что же вы хотите платить?</p><p class="p1">— ...За яйца!.. — раздался женский визг сзади. Эмили в первый момент ничего не сообразила, так как не видела перед собой никаких яиц, но, обернувшись, увидела в дальнем углу бара блондинку лет тридцати, которая, бурно гримасничая, зажав одно ухо и прижав к другому радиотелефон, орала:</p><p class="p1">— За яйца, я говорю, тебя ухватил твой банк! Не будь таким геморройщиком, пидор! Мы говорим с тобой не о хирургах мозга и не о голодающих в Африке, твою мать, и не о слепорожденных камчадалах! Мы говорим о нескольких миллионах долларов, сукин ты сын! Элиот! Ты подчистил все до цента, и через три дня тебе выплачивать следующие проценты! Если за эти три дня дело не будет спасено, ты разоришься и пойдешь гулять по Рио с голой жопой! С голой седой старческой жопой!</p><p class="p1">Обладатель седой старческой жопы и заложенных в банк яиц вяло оправдывался на том конце провода, но блондинка слышать ничего не хотела:</p><p class="p1">— Откуда я все это знаю? Дорогой, ты очень удивишься, но наш общий друг разговаривает во сне. Надеюсь, тебя не интересует, где я подслушала его сонные бормотания? Поразительная догадливость! Нет, то, чем мы занимались, называется иначе: я бы сказала, что позволяла свечному фитилю тереться о свои бедра в надежде самовозгорания. Но если трахается он безобразно, то болтает потом очень хорошо! Короче, завтра! Завтра, Элиот! И побрей жопу, чтобы не позориться перед людьми!..</p><p class="p1">Она положила радиотелефон рядом с собой и с прелюбезным видом уставилась на Эмили и Харрисона.</p><p class="p1">— Харрисон! Это и есть твой адвокат-переводчик?</p><p class="p1">— Будь я на твоем месте, я бы не возражал.</p><p class="p1">— Будь я на твоем месте, у меня, по крайней мере, не было бы такого облизывающегося выражения и жирного голоса. Клаудиа Леннис. Проще — Клодия. Можно — Кло. Родители бежали из Будапешта в пятьдесят шестом. Не спасла даже фамилия, здорово напоминающая одну, наверняка вам знакомую. — Она протянула сухую, длиннопалую, горячую руку.</p><p class="p1">— Эмили Рид.</p><p class="p1">Эмили несколько оробела, поскольку представить себя в паре с этим тайфуном венгерского происхождения было для нее довольно затруднительно.</p><p class="p1">— Съешьте какой–нибудь сэндвич. Эй, Билл! Принеси нам, козлик, какой–нибудь сэндвич. Съешьте сейчас, в Рио вам ничего подобного не светит.</p><p class="p1">— Спасибо, я не голодна...</p><p class="p1">— Давайте-давайте. Там вам придется поработать как следует. — Она потрепала Эмили по щеке, сказала ей, где завтра надлежит быть для отъезда в аэропорт, и умчалась вихрем. Отлично расслышав ее голос и даже привыкнув к некоторым модуляциям, Эмили тем не менее не успела толком разглядеть свою новую компаньонку. Она заметила только, что Клодия хороша собой, бела кожей и вообще составляет почти полную противоположность Эмили — коренной уроженке Запада, смуглой, темноглазой, темноволосой и молодой. Клодии было под тридцать, если не за тридцать; глаза ее на усталом, густо накрашенном лице с ранними морщинками были веселы и доброжелательны. Впрочем, это могло только выдавать знакомство с Карнеги. Что до эксцентричности, — привычны мы и к этому. После пяти лет в обществе Мэгги, которая бы, не дрогнув, прошлась нагишом перед любой аудиторией, Эмили трудно было удивить. Иное дело, что в работе такие люди трудны. Здесь главное — ничем не выдавать своих истинных чувств. Изображать овцу. «Да», «нет», «не знаю». Плюс абсолютная профессиональная компетентность. Я все–таки девчонка с Дикого Запада. Хоть и с домашним воспитанием, а и на улице, в игре и драке, была не из последних. Господи, да неужели я завтра буду в Рио? Ведь все, кроме этого, неважно!..</p><p class="empty-line"/><p class="p1">— Здесь все, что вам надо знать о деле, — сказала Клодия в самолете. На ней было короткое белое платье, открывавшее стройные, хотя несколько сухощавые ноги, да и вся она была поджарая, как рыба-меч. — Короче: мы покупаем комплекс старых отелей. Пригородный курорт. Отели старые, разваливаются. Наш человек, Элиот, взялся там наблюдать за работами, но по сути дела все провалил: почти разорился, подписал с банком грабительский контракт, — короче, нужны новые вложения. Я связалась с консорциумом китайских инвесторов. — Слова «консорциум», «инвесторы» и «яйца» она произносила одинаково легко, вкладывая в слово «китайский», пожалуй, даже больше презрения. — Надо успеть уладить дело, пока не поползли слухи о возможном банкротстве и все такое. Понятно, детка моя?</p><p class="p1">— О да, — Эмили скромно кивнула.</p><p class="p1">— Впоследствии надо суметь деликатно избавиться от Элиота, потому что платить ему за то, что он работает дырой в нашем кармане, я совершенно не намерена. Ты, надеюсь, со мной солидарна?</p><p class="p1">— О, вполне. Это как раз не составляет труда.</p><p class="p1">— Умница моя! И пожалуйста, развлекайся в Рио, как знаешь. Сделка нетрудная, а для дебюта ничего лучшего не подобрать. Рио — прелестный город, полный соблазнов. Делай, повторяю, все, что хочешь, но ради Бога, не вляпывайся в истории. Эта горячая кровь, это местное население и все такое. Все в белых штанах.</p><p class="p1">Эмили улыбнулась и потупила глаза:</p><p class="p1">— Знаете, Клодия, в белых штанах и вообще в штанах я разбираюсь куда хуже, чем в языках...</p><p class="p1">— Очень напрасно, деточка, — усмехнулась Клодия. — Языками они иногда действуют гораздо убедительнее, чем этой штукой в штанах... Ты успела купить что–нибудь летнее?</p><p class="p1">— Все произошло так стремительно... Я не успела сделать никаких покупок.</p><p class="p1">— Там жарко, как в аду. Серьезно. Ты с непривычки не заснешь, если только перед этим какое–нибудь волосатое смуглое снотворное не вымотает тебя до последней степени. Ты будешь получать неплохие деньги, и если бы мне в твои годы кто–нибудь устроил такую работенку — я бы выписывала чеки так, что чернила не успевали бы высохнуть. Деньги надо уметь не только зарабатывать. Их надо уметь тратить. В этом вот, что на тебе надето, ты через пять минут вспотеешь. Будешь мокрая, как мышь. Впрочем, запах бабьего пота на некоторых действует... — Она засмеялась.</p><p class="p1">Не знаю, как на кого действует запах бабьего пота, подумала Эмили, а на меня отвратительно. Сразу же по приезду куплю себе море всякого всего. И купальник, совершенно открытый купальник. Чтоб все видели. Нынче эти идиотки все ходят с силиконовыми грудями и говорят, что от умственной работы грудь портится. Я покажу им всем грудь. Я покажу им всем умственную работу. Мне, похоже, здорово повезло. И я всем покажу, как умею этим пользоваться.</p><p class="p1">До Рио оставалось лететь двадцать минут. Эмили откинулась на спинку кресла, блаженно прикрыв глаза. Они у меня увидят дикую девочку с дикого Запада.</p><p class="p1">Гигантская статуя Христа была видна с самолета. Христос стоял на горе над городом, раскинув руки. Он стоял в позе одновременно благословляющего и распятого. Впрочем, подумала Эмили, раскинешь руки благословить — сейчас же и распнут.</p><p class="p1">Она была потрясена. Каменный лик был неразличим. Но фигура была огромная, она видела это, — огромнее, чем что бы то ни было, виденное ею в жизни. Христос стоял над городом, Христос благословлял:</p><p class="p1">многокилометровые рыжие и золотые полоски пляжей вдоль лаковой, тихой глади океана;</p><p class="p1">бесконечные концентрические круги улиц, улочек, проулков, неизменно ведущих к берегу, путаных, гнутых, ломаных, полных запахов еды, пота, морской соли, распаренного тела, любви; ночных улиц, на которых всюду таится порок, страх, волшебство внезапного превращения; улиц Рио, где черт ногу сломит, потому что Бог их хранит на своей высоте;</p><p class="p1">жестко шелестящие пальмы, горячий и сухой ветер, налетающий на них и перебирающий, словно жесть, их зеленые лопасти; пряно пахнущий кустарник вдоль пляжа; бесконечный автомобильный поток, пешеходов в белых рубахах, в рискованных купальниках;</p><p class="p1">смуглые груди, смуглые бедра, откровенные и призывные улыбки, раскованную походку, насмешливые белые зубы, полуприкрытые, сияющие, всеобещающие глаза.</p><p class="p1">Христос благословлял пряный, пьяный, горячий город, лежащий у его ног, — город, задуманный как рай, с известными коррективами, которые люди всегда вносят в Божий замысел, но которые не слишком его искажают. Такси летело из аэропорта в отель вдоль бесконечного золотого пляжа. На нем абсолютно веселые люди, у которых впереди не маячили никакие переговоры, играли в волейбол. На мгновение Эмили увидела, как у одной из девушек в прыжке развязался купальник, — крошечная полоска ткани, завязанная простым узлом. Компания захохотала. Девушка, ничуть не стесняясь, продолжила игру. Впрочем, без верхней части купальников тут сидели многие. А Европа, говорят, вообще давно перешла на такое — во всяком случае, последние репортажи с Каннского фестиваля именно это доказывали вполне.</p><p class="p1">Ну нет, подумала Эмили. Не дождетесь. Что за уродство. Нудисты, конечно, другое дело, — это просто извращение. А так... И что вы демонстрируете друг другу? Все равно у меня там все гораздо лучше, чем у вас. Маленькие соски. Грудь без всякого лифчика имеет изумительную форму — слава Богу, играла в колледже в волейбол, повидала подруг и могу сравнивать. Вообще на этом пляже мне вслед нашлось бы кому обернуться. Впрочем...</p><p class="p1">Мысли ее легко переключились на контракт.</p><p class="empty-line"/><p class="p1">Молодой негр смело улыбнулся Эмили и заглянул ей прямо в глаза.</p><p class="p1">Их «шевалье» затормозил у отеля, о котором Клодия отзывалась в высшей степени одобрительно. Здесь Эмили решительно не с чем было сравнивать: она еще никогда не бывала в отелях такого уровня, да и в отелях другого уровня, честно говоря...</p><p class="p1">Негр подхватил ее чемоданы и, сверкнув зубами, понес в подъезд. Эмили и Клодия последовали за ними.</p><p class="p1">Их уже встречали: к Клодии подбежал молодой человек в очках, с вытянутым черепом, заискивающей улыбкой и даже на вид влажными ладонями. Эмили всегда почему–то умела это определять.</p><p class="p1">— Ну что, мальчики? — спросила Клодия, обращаясь к единственному мальчику. — Когда начнем переговоры? И вообще — как дела?</p><p class="p1">— Дела... — Очкастый мальчик замялся. На его белой рубашке с короткими рукавами были темные полукружья пота под мышками, галстук несколько съехал набок. Нет, это не «профи», это скорее щенок, мальчик на побегушках. Таких не люблю и сама такой никогда не буду.</p><p class="p1">— Клодия, а где твой переводчик?</p><p class="p1">— Вот мой переводчик, — Клодия кивнула, указав на Эмили. — Правда, ничего себе парнишка? По-моему, все бабы здесь его.</p><p class="p1">Молодой человек пораженно заскользил по Эмили взглядом. Его взгляд оставлял ощущение улитки, ползущей от плеч к бедрам, коленям и оттуда — назад тем же путем.</p><p class="p1">— Д-да, — произнес потный юноша. — Дела, в общем, идут... Ничего пока не происходит...</p><p class="p1">— Когда мы можем начать работать? Когда я смогу выйти на связь с китайцами? Где документы?</p><p class="p1">Она забрасывала его вопросами, и Эмили могла оценить профессиональную хватку.</p><p class="p1">— Ммм... Как тебе сказать... Видишь ли, Клодия, еще не все готово. Завтра, я думаю, с самого утра мы приступим..,</p><p class="p1">— Завтра?! — взвизгнула Клодия, — Я лечу сюда, как комета Галлея, срываю бедную девку с рабочего места, не дав опомниться, у меня дела в Нью-Йорке, а у вас тут не все готово?! Мы немедленно едем на стройку! Ты слышишь? Немедленно! Ты хоть понятие имеешь, о том, что здесь поставлено на карту?!</p><p class="p1">Неожиданно лицо ее застыло, и почти тотчас выражение злобы и раздражения на нем стало вытесняться широчайшей, доброжелательнейшей и самой что ни на есть искренней улыбкой, — Эмили готова была биться об заклад, что Клодия не может так улыбаться.</p><p class="p1">— Стоп! — закричала она. — Флавио!</p><p class="p1">К ней неспешно двигался пожилой невысокий негр — респектабельный, с брюшком, в зелено-красной рубашке навыпуск и белых брюках, с матовой шоколадной кожей и живыми карими глазами.</p><p class="p1">Клодия подпрыгнула, взвизгнула и кинулась к нему. В следующую секунду они уже обнимались, и Клодия отчаянно хлопала негра по сутуловатой спине.</p><p class="p1">— Я так скучал по тебе, — говорил негр практически без всякого акцента, только, может быть, чуть мягче произнося согласные. Этот испанский акцент Эмили хорошо знала.</p><p class="p1">— Эмили! — крикнула Клодия. — Подойди сюда! Видишь, кто это? Это Флавио, мой сэнсей, учитель, гуру, наставник, как там это у вас еще называется? Он сделал из меня то, что я есть, и научил решительно всему!</p><p class="p1">— Положим, — любовно глядя на нее, заметил негр, — кое–что ты и сама умела.</p><p class="p1">— Ах ты негодный мальчишка! Кстати, Эмили, я вас не представила. Это наш Флавио, — наш человек в Рио, — он буквально ходячая энциклопедия. Знает все. Как только тебе что–то будет нужно — можешь обращаться к нему сразу же и по любому поводу. Флавио, счастлива представить тебе Эмили. Моя переводчица и юрист. Девушка с хорошим прошлым, радужным настоящим и большим будущим!</p><p class="p1">— Очень рад, — спокойно и доброжелательно произнес Флавио, и, поскольку ни в словах, ни во взгляде, ни в рукопожатии его не было ничего, кроме спокойной доброжелательности, он сразу же понравился Эмили. Она хорошо чувствовала людей. От этого человека можно было не ждать подвоха — только помощь и скрытое одобрение.</p><p class="p1">— Ну, — Клодия обернулась к Эмили, — с завтрашнего дня, с самого утра на телефоне должны сидеть секретарши. Работать придется двадцать четыре часа! Я должна знать все, что тут происходило, плюс все цены на землю и материалы, плюс все связи наших китайских друзей, плюс весь компромат на Элиота, плюс прогноз погоды на побережье на ближайшие лет пять! — Она расхохоталась, но в веселье ее, как всегда, Эмили почувствовала что–то лихорадочное. — Теперь мы едем на стройку. Только нужно принять душ, переодеться во все свежее — и вообще. Эмили, поднимись к себе — твой номер на восемнадцатом этаже. Через десять минут жду тебя внизу. Привет!</p></span><span id="id15"><div class="title3">
<p class="p"><strong>III</strong></p>
</div><p class="p1">Эмили вышла на балкон. После полумрака гостиничной комнаты с бесшумными кондиционерами она почувствовала себя рыбой, выброшенной из воды на шипящую сковородку. Солнце, застывшее в белом бразильском небе, жарило так, словно в этом городе, осененном статуей Христа, собрались все грешники Земли. Эмили слегка поежилась, поймав себя на богохульных мыслях. Она не была истово верующей, но в ее семье, в ее кругу, среди людей, с которыми она могла общаться, атеизм был признаком дурного тона. К тому же учеба в колледже раскрыла ей, как казалось Эмили, красоту католического мира.</p><p class="p1">На пляже, не замечая солнца, красивые мускулистые мулаты играли в волейбол, бешено колотя ладонями по мячу.</p><p class="p1">Зазвонил телефон. — «Сударыня, я жду вас в машине». Эмили, чуть подкрасившись, быстро спустилась вниз. Флавио, поджидая ее, сидел за рулем большого красного «бьюика» с открытым верхом.</p><p class="p1">— Сегодня я буду вашим гидом, — произнес он, галантно улыбаясь.</p><p class="p1">Экскурсовод повез ее на развалины. Развалины на берегу Тихого океана. Казалось, волна цунами недавно накрыла стоявшие здесь отели, и отхлынула прочь, унося с собой стекла, стены, битый кирпич.</p><p class="p1">— Здесь будут стоять прекрасные отели, корты, — мечтательно закатывая глаза, говорил Флавио, — огромное здание театра. Потрясающий построим курорт, правда? Бассейны с морской водой. Деньги хлынут...</p><p class="p1">— Океаном, — подсказала Эмили.</p><p class="p1">Он расхохотался, приобняв ее за плечи.</p><p class="p1">— У нас есть права на эти бассейны? — поинтересовалась Эмили.</p><p class="p1">— Не беспокойся. Никуда они от нас не уйдут.</p><p class="p1">Со страшным скрежетом рядом с ними остановился роскошный белый «мерседес».</p><p class="p1">— А вот и я, — выпорхнув из машины, Клаудия быстрым шагом направилась к строителям, копошащимся невдалеке.</p><p class="p1">— Эй, ребята, — с места в карьер заорала она, — где ваш босс? Эмили, быстро сюда, переводи!</p><p class="p1">— Он уехал, — отвечали ребята, явно раздосадованные тем, что их отвлекают от перекура.</p><p class="p1">— Что значит — уехал, выродки, — взвилась Клодия, демонстрируя умение общаться с рабочим классом. — Куда уехал этот старый мудак?! Мы должны были встретиться здесь, слышите вы, засранцы?</p><p class="p1">Эмили переводила с большими купюрами, но ток Клодии и некоторые ее слова были понятны аудитории без перевода. Пролетарии зароптали.</p><p class="p1">— У нас была назначена встреча, — не унималась Клод. — Быстро его к телефону, скоты паршивые!</p><p class="p1">Как–то сам собой, видимо испугавшись начальственного гнева, заработал экскаватор.</p><p class="p1">— Прекратить! — буйствовала Кло, а с нею и Эмили, пытаясь перекричать оглушительное рычание мотора. — Где этот подонок?! — Эмили, заразившись чувствами новой подруги, переводила уже вовсю. — Где этот вонючий кобель? Заткните свою поганую землеройку и вызовите подлеца к телефону!</p><p class="p1">Экскаватор испуганно смолк. Черный мальчишка со всех ног бежал к сердитой мадам, держа в руке трубку с радиотелефоном.</p><p class="p1">— Так, — распорядилась Кло, — я буду говорить, потом ты переведешь, выслушаешь ответ и кратко мне изложишь. Впрочем, нет, — она махнула рукой, — его речи можешь не переводить, я и так заранее знаю, что этот гад будет врать!</p><p class="p1">Она схватила трубку.</p><p class="p1">— Где ты прохлаждаешься, козел?! Я тебе яйца с корнем вырву, сачок дроздоболистый! Твои макаки бразильские всю неделю груши околачивают своим червивым хреном, а ты, небось, думаешь, что я им деньги за это буду платить? Пососешь свою лапу, бездельник! Переведи, — отнеслась она к Эмили.</p><p class="p1">— Вы не работаете, — тихим голосом проговорила</p><p class="p1">Эмили, — и если это будет продолжаться, то мы вам не будем платить. Мы расторгнем контракт и обратимся в другую фирму. Козел, — неуверенно добавила она.</p><p class="p1">Хриплый мужской голос в трубке монотонно повторял одно и то же.</p><p class="p1">— Сейчас выезжаю, мадам. Сейчас выезжаю, мадам. Сейчас выезжаю, мадам.</p><p class="p1">— Что я ему яйца с корнем вырву — перевела? — спрашивала Клаудиа. — С корнем, слышишь?! Любая другая угроза на него не подействует.</p><p class="p1">— И вообще, — запинаясь, произнесла Эмили, — если все это будет продолжаться, то вам обещано удалить ваши мужские принадлежности вместе с корневой системой. И вам придется, — Эмили задумалась, подбирая слова, — засунуть себе в рот руку и таким образом производить хлюпающе-втягивающие движения языком. Вы меня слышите?</p><p class="p1">— Сейчас выезжаю, мадам. Сейчас выезжаю, мадам. Сейчас выезжаю, мадам, — доносилось из трубки.</p><p class="p1">— Он сейчас выезжает, мадам, — сообщила Эмили.</p><p class="p1">— Сучий выползень! — крикнула Кло напоследок в трубку и швырнула телефон мальчишке. Тот ловким движением поймал его.</p><p class="p1">«Трудная работенка выпала», — подумала Эмили. «Особенно с языком». И неожиданно для себя и окружающих весело рассмеялась.</p></span></span>
