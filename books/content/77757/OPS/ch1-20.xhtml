<span id="id19"><div class="title1">
<p class="p">16 августа 1935, Зеленская</p>
</div><p class="p1">— Ну, вот тут, — говорил Шелестов, показывая Муразовой крутой обрыв над серебряным, тихо плещущим, словно радующимся себе (запомнить!) Доном. — Вот сюда Татьяна топиться бегала.</p><p class="p1">— Прямо ваша вотчина тут, — говорила Муразова, любуясь им. Она давно полюбила его, как почти всякий пациент психиатра, а редактор писателя: есть что-то в этих занятиях сближающее. Еще, говорят, ассистентка хирурга, особенно фронтового. — У вас как Ясная Поляна, все отсюда.</p><p class="p1">— А тут дядя мой жил, — говорил Шелестов. — Учитель. Меня выучил всему, что знаю. Здесь же и похоронен. Люди отзываются все прямо как про ангела, если б ангелы были.</p><p class="p1">— А у меня нет родового гнезда, — сказала Муразова. — Все разорено. Под Тамбовом было имение, там папу убили. Мама еще в десятом году уехала. В квартире мужа давно чужие люди.</p><p class="p1">— Он кто был? — спросил Шелестов. Бестактностью было расспрашивать, но еще бестактней — не интересоваться.</p><p class="p1">— А не помню, — усмехнулась она. — Юрист какой-то.</p><p class="p1">Некоторое время шли, не обмениваясь ни словом.</p><p class="p1">— Да, — произнесла она. — Мне тут книжечку прислали. Не знаю уж, насмешник или поклонник. Перая книжка моя — «Гнездо». Я и забыла это все. Ахматовщины много, конечно, ты что-то с плеч губами кружева отводишь в темноте полупрозрачной. И всякое — лебеди, пруд, твои легкие руки, как струны… Ужас! — Она засмеялась, закрыв лицо руками. — А потом — знаете что? Через три года! Господи, через три! Плакат обходит скиталец, в него упирается палец. Аршинные буквы кричат: а ты записался в отряд? Щитами защитными кроясь, сегодня уйдет бронепоезд… Представить это вы можете, а? Только представить! Вот скажите мне, где была я настоящая: там или тут?</p><p class="p1">— Вы бы книжкой одной издали, — сказал Шелестов, не зная, чем ее утешить. — Наглядно было бы.</p><p class="p1">— Да зачем же, Кирюша, позориться? Я перечитывать боюсь и то, и это! Любовная блажь, революционная — одинаково блажь!</p><p class="p1">— Я тоже до революции себя почти не помню, — признался он.</p><p class="p1">— Ну, вам и не надо. Вы прозаик, ваше дело — вбирать мир. А я поэт… была, — поправилась она, — и должна бы хоть что-то иметь, чтобы это выразить, но что же во мне было?</p><p class="p1">— И вам сейчас ничего своего не нравится? — неуклюже спросил он.</p><p class="p1">— Нет, почему. Одно стихотворение нравится.</p><p class="p1">— Прочитайте.</p><p class="p1">Она помолчала.</p><div class="poem">
<div class="stanza">
<p class="v">— Тут, как встарь, ревнуют дряхлые боги,</p>
<p class="v">Вечера полны духоты и луны,</p>
<p class="v">Но поет кузнечик, и в пыли дороги</p>
<p class="v">Отъезжающим астры еще видны.</p>
</div>
<div class="stanza">
<p class="v">И он говорит: — Кончилось лето.</p>
<p class="v">Так кончается жизнь, а мне легко</p>
<p class="v">Оттого, что много красок и света,</p>
<p class="v">Оттого, что небо не так высоко<a href="ch2.xhtml#id1" class="a">[1]</a>.</p>
</div>
</div><p class="p1">— И кто же это написал? — спросил он. — Та или лругая?</p><p class="p1">— Третья, — сказала она. — Но я ее не видела почти никогда.</p><p class="p1">Вечером гуляли в степи, Шелестов прихватил восьмилетнего сына — хотелось похвастаться перед Муразовой всеми своими достижениями. Правду сказать, он мало внимания уделял семье, все уходило в «Пороги», но и как же иначе? Не учит ли нас все кругом, включая родную партию, что надо делать свое дело, а на прочее не отвлекаться? Отвлекается ли, например, закат и вообще природа? Думали бы они о человеке — разве у них получалось бы так хорошо? Но сына он захватил, держал за худую ручку, чувствуя смутную неловкость: и сын робел, и самому как будто не о чем было говорить с ним. С Муразовой вот было о чем — хотелось услышать от нее, как обнаглели завистники и как он всех победит; но сын, видно, тоже что-то свое думал и на обратной дороге, когда густо-лиловые тонкие облака на горизонте стали почти черными, спросил вдруг:</p><p class="p1">— Папа… Почему дураки в Бога верят?</p><p class="p1">— Ну, не одни ж дураки, — смущенно сказал Шелестов, поглядывая на Муразову с гордостью, а вместе и виновато: он не знал, верит ли она в Бога, точней, верила ли в него Баланова. Муразова-то, конечно, совсем иное дело. Но она взглянула на него с усмешкой и вызовом — то ли ему почудилось в темноте: как-то выкрутишься?</p><p class="p1">— Ведь нет же ничего, — сказал мальчик уверенно. То ли из школы принес, то ли сам додумался. Если сам, подумал вдруг Шелестов, то плохо.</p><p class="p1">— Ну как бы это, — начал он, выигрывая время. — Человек же себе объяснить должен как-то. Откуда гром, молния, — это получилось у него очень уж глупо, школьно, и он оборвал себя. — Ты вообще подумай: вот книга есть. Написал же кто-то? И вот это все есть, — он обвел рукой темнеющее грозное великолепие с болезненно-алой полосой последнего закатного света. — Ну и думает человек: взялось же откуда-то?</p><p class="p1">И он ощутил обиду за Бога, скорее авторскую, чем церковную. Старался, столько натворил — а тут ходит восьмилетний оболтус, от горшка не видно, говорит, что нету. Так же вот и ему говорили, что он ничего не писал, и он убить был готов. Да, использовал материал, и что? Не исключено, что и тут имело место использование материалов, но они носились в пустоте в виде первоэлементов, а стала стройная система, степь, закат, сам Шелестов с его безупречным внутренним устройством, пишущий всякую секунду, даже когда в руке у него не ручка типа вставка, а ручка сына. Потом приходят дураки и говорят: вышло само. Само выходит знаешь что?</p><p class="p1">— Но как же он тогда терпит? — спросила вдруг Муразова. — Я верила когда-то. Но потом поняла, что не могу. Не моим умом. Сказано же: могущий вместить — пусть вместит. Я не вмещаю. Непонятно, как можно все это видеть и терпеть. И вот хотя бы фашизм сейчас — он как это терпит?</p><p class="p1">Не надо бы ей при Гришке, подумал Шелестов, ведь в школе разнесет — и пойдут разговоры: поповщина… Он мог, по обыкновению, отмолчаться, но чувствовал, что для Муразовой все это не пустой разговор, что сама она стоит перед трудным решением, о котором он ничего знать не может; и вечная осторожность изменила ему.</p><p class="p1">— Был у меня разговор с одним попом, — сказал Шелестов медленно, словно продолжая отмерять — насколько можно проговориться. — С нашим попом, да, то есть фактически обновленцем. Помните, были? И вот я тоже ему говорю: ну хорошо, а как он терпит-то? И поп этот мне сказал: ведь он не терпит. На себя-то посмотри. Тебе ведь все дадено, так что же ты спрашиваешь. Себя спрашивай, а не его.</p><p class="p1">— Но это чистый гностицизм, — сказала Муразова разочарованно, словно ей подсунули давнее и обманувшее снадобье. — Если он не всемогущ, если зло сотворено отдельно и до него…</p><p class="p1">— Это не совсем, не совсем, — мучительно морщась, словно припоминая старательно забытое, заговорил Шелестов. — Зачем вот вы… — Он хотел сказать «при ребенке», но не в ребенке было дело. — Зачем вот вы так говорите, когда… Ну пусть нет, но какая сама мысль эта интересная! Что он не один, а что, скажем, два! Ведь в этом есть какое-то… я в детстве тоже вот много думал. Смотрите. Мы знаем, конечно, мы это чувствуем, потому что есть же почерк… что не могла одна рука вот эти облака, — он заговорил в рифму и сам на себя обозлился, но остановиться уже не мог и не хотел, — вот эти облака и, скажем, ребенка. Это разные совершенно вещи. И я не думаю, что с Бога, если бы был… вы понимаете, что я это все в порядке сюжета… что с него нельзя спрашивать за грозу, наводнение, что бацилла всякая… Это, коротко говоря, другое дело. Но совесть, человек там, понятия добра и зла… Какое у степи и даже у птицы может быть понятие добра? Но в человеке есть, и с него уже мы можем спрашивать. И тогда уже появляется огромная эта мысль, что нет одного, есть двое. Условно пусть отец и сын, хотя где-то, наверное, муж и жена… Но согласитесь, что если человек до этого додумался, то он уже не так глуп, человек-то? Уже когда древним пришло это в голову, то они ведь поняли главное — что этой степи… и, скажем, мне… нам по-разному дано и разное можно! Я не думайте, я не это! Я просто думаю, как красиво — что эту степь пишет одна рука, а вот нас с вами — совершенно другая, и все, от чего мы мучаемся… все, от чего человек вообще сходит с ума, и любит там, и пишет… все вот от этого зазора! Что мы смотрим на степь и понимаем — она будет без нас. А смотрим на детей или на какую-нибудь рукопись, которая ведь иным и дороже детей, — и ясно, что они без нас не будут! И поэтому, когда смотришь на курган, скажем, на Дон тот же — ты видишь это раздвоение, оно-то в тебе больше всего и болит. Что есть прекрасное, а есть, скажем, грязный ребенок. Я не скажу, что грязный ребенок — плохо, но просто он другое прекрасное. Или вот с любовью, — он понимал, что нужно уже остановиться, но ведь так редко говорил с людьми, так много уходило в книгу — и так никто вокруг ничего не понимал! — Ведь я почему так с этим Панкратом, с дураком… мучаюсь так и его мучаю. Он не Анфису любит! Но Анфиса — в ней то же есть, что в степи этой, не знаю, в птице, в кусте… В ней та есть красота, которую поймать невозможно, и когда он с ней, то он в этой красоте. Хотя она, может быть, и дура. Вот Борисов пишет, что она такая и сякая. Я, думаете вы, не понимаю, какая она? Я и про степь знаю, я вырос в ней, я понимаю отчетливо, что в ней сплошь жесткая трава и все друг друга едят. Но это вместе дает ту ужасную красоту, которую чувствуют люди простые, и чем он проще, чем меньше мешает ему голова, тем, может быть, он больше чувствует. И он хочет ее, хотя умом прекрасно понимает. — Тут он потерял мысль, потер шрам и тряхнул головой. — Да, но я не про то.</p><p class="p1">— Почему же, — тихо сказала Муразова. — Я знаю.</p><p class="p1">— Нет, не про то! — Вечно ей, редактору, казалось, что она лучше понимает, чего он хотел. — Я про то, что сама эта догадка — двое вместо одного… она очень, очень хорошо про человечество говорит! Все вообще, что написано, — оно от этого зазора, от щели этой. И все это ожидание — что придет, может быть, третий завет, я читал же, не совсем мы люди темные… оно от того, что все ждут какого-то нового автора, вот он придет и сведет воедино. Сведет, что мне голодно и холодно, что я заброшен, может быть, в снегу, в этой степи, как в седьмой части Панкрат мой… и что в это время — прекрасно! Что степь сверкает, что лед горит, что небо над всем этим как наилучший хрусталь. Придет и сведет, потому что иначе эти двое… два автора, если так уж назвать… они никак не помирятся, и действительно никак невозможно примирить…</p><p class="p1">Муразова молчала, сын, кажется, испугался. Шелестов понял, что надо выходить из разговора, сводить его на шутку.</p><p class="p1">— И это, может, будет редактор, — сказал он с неловким смешком. — Вроде вот вас.</p><p class="p1">Он не решался взглянуть на Муразову прямо. А любопытная мысль, про третьего редактора. Ветхий — писал, новый — переписывал, придет третий и будет вычеркивать, вычеркивать… Да уже, кажется, и пришел.</p><p class="p1">— Хорошо, — сказала она после долгого молчания, когда они втроем почти дошли до станицы. — Вы, значит, допускаете, что человек все же сотворен?</p><p class="p1">Ну вот, понял Шелестов. Идеализм. Осторожно надо с ними, с комиссаршами, расчувствовался, теленок.</p><p class="p1">— Не сотворен, — сказал он досадливо. — Может, сам взялся. Но у меня чувство, понимаете, что ему дали мир, в нем горы, реки, звери. И он переписывает так, чтобы этому дать смысл. Которого на самом деле нет. Я разболтался чего-то. Мы чаю сейчас попьем. Я вас хоть напою с чабрецом. После обеда с мятой пили, а сейчас с чабрецом.</p><p class="p1">Ночью он спал плохо, болела голова и мучила неловкость. Гришке он настрого запретил спрашивать о серьезном при чужих и вообще думать о чем попало. Уроки вон учи, почерк как след галочий.</p><p class="p1">«За семью запорами да еще за одним держит свою душу этот человек», — записала Муразова; от девичьей привычки вести дневник она не избавилась никогда. Но разговор ей чем-то не понравился — может, тем, что увидела она ненадолго не совсем того Шелестова, какого воображала. А это никакой женщине не понравится, будь она хоть декадентка, хоть комиссарша.</p></span>
