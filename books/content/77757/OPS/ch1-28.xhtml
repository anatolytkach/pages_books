<p class="p">17 февраля 1942, Ленинград</p>
</div><p class="p1">Логинов давно не был в Капоэре — с тех самых пор, как стал забывать слова. Мозг, видимо, отключался, не в силах обеспечить трудный, энергетически затратный переход. Как хотелось, как надо было бы сбежать туда! Может, там удалось бы поесть. Но в последнее время и там были все какие-то переходы через пустыню, потом вдруг льды. Он нес ценное, природы которого ему не сообщали. Мучил голод и неизвестность. Логинов все меньше понимал, кочевники были грубые и страшные люди. Надо было с ними договариваться, чтобы пропустили, любой ценой надо было пронести — если бы хоть знать, что несешь, но по условиям этого-то и не разрешалось. Он вырвался, пронес, но люди льдов — они называли себя людье — были вовсе уж невыносимы. Все-таки холод страшнее всякой жары. То, что он должен был пронести, было как-то связано с одиннадцатью и четырнадцатью, — несешь одиннадцать, принесешь четырнадцать, — но точнее ему не сообщали, просто назвать эти два числа, когда принесешь.</p><p class="p1">И он не был там с сентября.</p><p class="p1">Но все последние дни, весь февраль, более адский, чем девятый круг ада, Логинова переполняло блаженство. Оно почти уже не имело отношения к телесному, да и тела почти уже не было. Он не вставал. Сначала приходили, потом перестали. Наконец взяли в больницу, но там ничего не изменилось. Он чувствовал, что донес, пронес через все, победил, что в Капоэре близится великое ликование, и напоминал себе только: сказать одиннадцать-четырнадцать. Он не сомневался, что бояться нечего, что другие, может быть, исчезнут, а он попадет в Капоэр. И когда блаженство достигло высшей точки, совершенного, бестелесного освобождения, — он прошептал, хотя, казалось ему, кричит оглушительно:</p><p class="p1">— Одиннадцать! Четырнадцать!</p><p class="p1">Но услышать его было некому. Он стоял на вершине одинокой горы, откуда вела в свежую зеленую долину единственная тропа. Среди деревьев по всему каменистому склону перелетали и пели птицы, каких не бывало ни на земле, ни в Капоэре. Оперение их было преимущественно лиловым, пение преимущественно беззвучным, но угадывался настрой: одни звали, другие жаловались, третьи приветствовали. Небо имело странный вид, оно казалось столь же рельефным, как земля: тут были горы, холмы, впадины. Светило стояло высоко и грело слабо, ровно так, как надо. Позади и чуть слева было очень опасно. Справа нарастало ликование, подобного которому Логинов не испытывал никогда. Под самыми ногами из почвы нахально лез красный росток, похожий на подосиновик, — хлестанул стремительным щупальцем вверх и спрятался. Возможно, за лесом внизу было какое-то море, в нем горько жаловалась и молилась какая-то рыба. Горные жители были подозрительно тихи, но замышляли. Наблюдающий взгляд неизвестного существа был благожелателен.</p><p class="p1">Третий мир, понял Логинов, бинарная система показала несостоятельность. Вся надежда была на третий мир.</p></span>
