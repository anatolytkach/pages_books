<p class="p">20 июля 1956, Лондон</p>
</div><p class="p1">«Авторство романа „Пороги“, — писал Стайн, — представляет собою одну из неприкосновенных для обсуждения советских загадок, поскольку знаменитая стереоскопичность этой самой знаменитой русской книги ХХ века, не свободной, конечно, от мелодраматизма и некоторой заданности, едва ли может быть заслугой одного человека. В ней есть события, увиденные взглядом их явного участника, белоказачьего офицера (belokazak), и есть вставки, писанные молодым, но сильным пером победившего класса, человека явно просоветских и даже инквизиторских взглядов. Под слоем явно позднейшей идеологической правки прочитывается классический русский любовный роман о чувстве, долге и роковой красавице, но правка эта органична и умела, так что предположить редакторское вмешательство мы не можем. Легче всего представить, что этот роман написан братьями-близнецами, один из которых был по белую, а другой — по красную сторону баррикад; но такое предположение скорее напоминает блестящий исторический парадокс в духе Шоу. Еще более в его духе было бы сделать авторами Панкрата и Анфису, то есть мужчину и женщину, которых история раскидала по враждующим станам».</p><p class="empty-line"/><p class="p1">Но увы, история — жестокая вещь, и парадоксы ее грубее изящных догадок недавно почившего писателя. Кстати, Стайн много сделал для популяризации «Порогов» на Западе, ознакомившись с переводом избранных глав еще в 1931 году. Он первым назвал Шелестова «советским Шекспиром», подчеркнув тайну авторства: «Не прекрасно ли это говорит о человечестве, что всякий раз, столкнувшись с истинным величием, оно отказывается признавать его человеческим? Орлеанская дева была ангелом и, возможно, гермафродитом; Шекспир не мог сам сочинить свои трагедии, а потому состоял из трех мужчин и одной женщины, возможно, королевы Елизаветы. Шелестов воспользовался записками трех офицеров, из которых один был ангелом, другой женщиной, а третий, возможно, самим Дьяволом».</p><p class="empty-line"/><p class="p1">Правда и то, что позднейшие сочинения Шелестова — публицистическое «Письмо красноармейцу» о том, что смерть не страшна и даже желательна (?!), а также цикл коротких зарисовок о природе «Охотничья сумка», — не дают никаких оснований увидеть в нем великое перо нашего века; но, во-первых, его стойкое нежелание писать о чем-либо, кроме природы, вполне объяснимо — он не хочет ронять свое имя, — а во-вторых, и у Шекспира найдется множество приписанных ему текстов, не достойных автора не только «Гамлета», но даже «Виндзорских насмешниц». «Я сам, — замечал в этой связи Шоу, — пишу иногда, как мой слабоумный двоюродный брат, вдобавок никогда не существовавший. Впрочем, разве можно отказать в силе его недавно опубликованному очерку „Путь человека“ — о том, как фронтовик выдает себя за дядю мальчика-бродяги? Сцена, в которой старый солдат скрипучим голосом спрашивает: „Я дядя твой, или ты меня не помнишь?“ — может быть, единственно живая в этом рассказе, но читателю трудно избавиться от чувства, что автор лично слышал нечто подобное. Это чувство невыдуманности, органической правды знакомо любому, кто читал „Пороги“, в особенности первую книгу и мучительный, внезапный финал.</p><p class="p1">Я встретил Шелестова, — продолжает Шоу, — единственный раз в Москве, на выставке сомнительных прагматически, но поразительных художественно достижений советского народного хозяйства, среди тыкв, дынь и баклажанов, больше похожих на плоды изощренного воображения, а не прозаические плоды земные. У нас почти не было времени для разговора, но выразителям одной эпохи не надо много времени, чтобы понять друг друга. Он показался мне тщедушен, как бы раздавлен массой свалившегося на него опыта и славы, но держался молодцом. Его все время заставляли кого-то приветствовать. Наконец я улучил мгновение, чтобы поговорить с ним, — точнее, задать ему единственный интересовавший меня вопрос.</p><p class="p1">— Скажите, Шелестов, или молодой орел, как вас еще зовут, — спросил я, — правда ли, что создать эпос нового века сможет только тот, кто окончательно позабудет прошлое, растопчет его, откажется от груза европейской и восточной культуры? Думаете ли вы, что с грузом этих критериев, поначалу свирепых, как Левиафан, а сейчас гибких, как эластик, — что с их грузом нельзя ни понять, ни выразить нового мира, нельзя увидеть систему в том, что мы, старики, полагаем хаосом? Верно ли, что надо забыть Афины и Спарту, Фивы и Сиракузы, Гая Фокса и Дизраэли, — чтобы увидеть будущий мир с его непостижимыми героями? Верно ли, наконец, что в наши дни дословно сбывается библейское пророчество о зерне, которое не воскреснет, если не умрет?</p><p class="p1">Он всего лишь торопливо кивнул, но в одном этом кивке было больше понимания, трагедии и стоической готовности к ней, чем во всей напыщенной декламации отца нашего Шекспира. И потому всеми силами моей души, всем авторитетом, который я накопил, а еще верней всей ненавистью, всеми проклятиями, которых я удостоен, — ручаюсь: автором „Порогов“ является Шелестов, величайший из писателей нового века, героически отряхнувший с ног прах напрасной человеческой истории».</p></span>
