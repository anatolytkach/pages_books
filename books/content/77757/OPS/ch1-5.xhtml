<p class="p">26 июня 1928, Париж</p>
</div><p class="p1">В Париж Бутыкин прибыл прохладным ярким утром, и на душе его было радужно: мало того, что Максимыч похвалил, так еще и донскую гадину — иначе он Шелестова про себя не звал — наконец учебутычат, даром что у него рука в самом ЦК.</p><p class="p1">«Учебутычить» — было словцо сапожника, у которого он учился. Руки у Бутыкина были крюки, известное дело — писатель, для грязной работы не годился, а сапожник и вообще его недолюбливал, хотя мужик был незлой, с похмелья всегда виноватый. Спьяну же кидался в Бутыкина болванками и орал неизменное: «Я тебя учебутычу!» От фамилии, что ли, производил? Но Бутыкин запомнил, дважды уже употребил в «Черноземе», у него был там развеселый дедок, раньше многих молодых поверивший в новую власть, — только такими словами и тетюжничал.</p><p class="p1">Похвалам Максимыча он, согласно совету рабочего классика Пырялова, доверял не шибко: «Он на слезу слаб, от всего рыдает, всех нахваливает». А поручение от НКВД — это хорошо, серьезно: тут чуял он влияние посильней Максимычева.</p><p class="p1">Направил его Климов, самолично отынструктировав:</p><p class="p1">— Думаю, товарищ Бутыкин, что можем вам доверить деликатное политическое поручение. Вашего друга, товарища Шелестова, пытается скомпрометировать белогвардейская печать. В статье яро антисоветской газетенки «Последние новости» некий бывший белоказак, сбежавший семь лет назад от заслуженной кары, пишет, гадина, простите, что будто бы лично наблюдал автора «Порогов» в рядах Кубанской казачьей батареи и будто бы автор этот смертельно был ранен на его глазах волной от взрыва еще в августе девятнадцатого года на Дону в станице. Рукопись же, как утверждает этот, с позволения сказать, Манахин, хранилась всегда у его друга в походном его рундуке и насчитывала тогда уже триста страниц, кабы не более. Манахин многое тогда читал и даже посвятил другу в день рождения стишок, довольно гнусный, который тут же и приводит: желаю, мол, в скором будущем тебе так же разбарабанить всю русскую литературу, как твой Панкрат — твою Анфису. Каково же его, значит, удивление, когда он видит эту самую рукопись под авторством чужого человека. Помнит он будто бы и содержание всего дальнейшего романа, как он там написан, и обязуется рассказать, чем кончилось у Панкрата с Анфисой, которые и объединились наконец, подробности в следующем номере. Тут все, как вы понимаете, довольно сомнительно: и то, что этот якобы офицер возит с собою в рундуке рукопись, и то, что он ее там пишет, пока мы их, так сказать, долбали за милую душу, и ясно, что все это затеяно для удара по молодой советской литературе.</p><p class="p1">Так вот, мы имеем к вам поручение, товарищ Бутыкин. (<em>Пауза. Умеют</em>.) Поручение деликатное. (<em>Пауза</em>.) Понимая, что вы человек разумный и все это — строгая секретность. Короче, вы находите там этого Манахина. И если действительно этот Манахин что-то такое знает, то мы, конечно, готовы вывести любого литературного плагиатора на чистую воду. Но поскольку Манахин, как вы понимаете, ничего не знает и все один блеф, то вы раздраконьте-ка нам его как следует, да и самому объясните, что если он там будет рот открывать, так ведь у нас и во Франции друзья среди рабочего класса. Внятно это вам, товарищ Бутыкин? Действуйте тогда, визу мы обеспечим, и прямо-таки из Сорренто, значит, поедете в столицу мировой моды. Женаты? Ну так женке чулок, а то одним черноземом бабу не накормишь, — и усмехнулся так мило, так по-братски, ухремно, как говаривают у нас в воронежских краях.</p><p class="empty-line"/><p class="p1">План действий был оговорен, и нашелся в Париже свой человек, — вправду, значит, у Климова и среди эмиграции имелись свои, — который мог вывесть прямиком на Манахина. А хорошо было бы вот так заявиться, и не во всяких костюмах-штиблетах, которых накупил он с Максимычем, а в сапогах, во френче, да мало ли, а то и в буденовке, которой сроду, конечно, у Бутыкина не было, но для такого дела подошло бы, — зайти бы в эти самые «Последние новости» да и сказать:</p><p class="p1">— Руки вверх, пришли последние известия!</p><p class="p1">Но эффектом пришлось пренебречь, да и не было, сказал верный человек, никакой редакции: собирались на дому у редактора еженедельно, сдавали кто что мог, с миру по нитке.</p><p class="p1">Со связным переписка была серьезная, жаль только, что не шифром: «ждать вас (телеграфировал он русские слова латинскими буквами) буду в кафе „Lis“ на третьей от вокзала улице в одиннадцать часов ровно». Бутыкин не успел даже закинуть саквояж — новенький, коричневый, тоже от Максимыча, в дешевую гостиницу на бульваре с невыговариваемым названием «Рошешуар»: сразу отправился в «Lis». Там его уже ждал за столиком у окна — посетителей было мало, не ошибешься, — высокий, худой, с такими глазищами, каких в России Бутыкину сроду не встречалось, а больше он нигде не бывал. Человек с таким честным взором, таким чистым лбом только и мог быть агентом. Бутыкин это подумал со странной мстительностью. Агенты были, конечно, святые люди, а все-таки его простая натура протестовала. И он, маленький, со свиными глазками, чуть больше себе понравился, глядя на этого агента, который явно нервничал и своей ролью тяготился.</p><p class="p1">— Ну, что там, как? — горячо расспрашивал агент, хоть и понижая голос. Бутыкин солидно рассказал, как хорошо идет смычка, как борются за здоровый быт, каких успехов достигла в особенности гигиена (между вторым и третьим томами «Чернозема» он выпустил рассказец «На другой день» о безобразном жеребячестве, очень нашумевший, и потому был в курсе, как идет борьба с венеризмом).</p><p class="p1">Против ожиданий, агента все это совсем не интересовало. Он расспрашивал о новостях литературных, причем Бутыкина даже не читал («Я, понимаете, жду, когда вы окончите… чтобы уж сразу…» — и нехорошо подмигнул, дескать, мы-то с вами понимаем, что не окончите никогда). Спрашивал он все о втором и даже пятом ряде: Пастернак, Олеша, какой-то Соболь, который в позапрошлом году застрелился, — ну да, застрелился, вспомнил Бутыкин, а что? Он что написал-то? Значительный интерес представляли «Рождение героя» Либединского, «Разгром», эт-самое, Фадеева, хотя и содержащий, конечно, ошибки правого уклона. Но правый уклон был агенту совершенно в диковинку. «Куда, вы говорите?» — распахнул он и без того невозможные глаза, и Бутыкин не стал посвящать белогвардейца, хоть и нашего, в тонкости литфронта. «Вам тута не будет понятно», — сказал он с должным высокомерием, а на вопрос о Булгакове ответил, что на враждебные вылазки не ходит и другим не советует. Тут агент улыбнулся так широко и дружески, что Бутыкин против воли криво ухмыльнулся, иначе не умел.</p><p class="p1">— Значит, Манахин, — сказал бывший белогвардеец с внезапной деловитостью. — Константин, отчества не знаю, да он молодой, года тридцать четыре. Он шофером тут, до этого письма не печатался. Таксирует. В прошлом артиллерист, повадки до сих пор офицерские, так что вы аккуратно с ним.</p><p class="p1">Бутыкин самодовольно хмыкнул. Еще с шоферами деликатничать, из бывших, щас.</p><p class="p1">— И он парень честный, — сказал агент задумчиво. — Я о нем спрашивал у галлиполийцев. Шершавый, конечно, грубый, но офицер боевой. Врать не будет.</p><p class="p1">Бутыкин, видно, не смог скрыть радости, потому что агент спросил:</p><p class="p1">— А вы верите, что Шелестов… да? Вы же знаете его?</p><p class="p1">— Я, господин хороший, верить или не верить, эт-самое, не обучен. Я и в Бога не верю, я исключительно уважаю научное знание. Когда мы будем знать положительно, материально, тогда мы, так сказать, можем. Но я для того и прибыл, чтобы разъяснить этого Манахина на месте.</p><p class="p1">— Ну а Шелестов? Я первую часть прочел, немножко, конечно, этнографично, — виновато сказал агент, словно это он отвечал за промах Шелестова. — Но забирает, знаете, и хотя местами похоже на Мельникова — в лесах и на горах, — но безусловный писатель, и жаль было бы, если…</p><p class="p1">— Вот мы гадать и не будем, — припечатал Бутыкин. — Что до товарища Шелестова, то как вам сказать. Первый том — первый ком, главна-то штука, я вам скажу, написать второй. (Сам он написал уже три.) Он имеет на себе, конечно, пережитки казачества и тоже правый уклон… Но нельзя отнять, что живописность и прочее. А парень он свой, товарищеский парень, — спохватился он, — и мы имеем решимость, чтобы не смели тут… своими щупальцами… почему я и здесь.</p><p class="p1">— Да-да, — заторопился агент, — вот адрес.</p><p class="p1">Бутыкин в такси доехал до отеля (вот был бы номер — подсесть к Манахину! Он для проверки всю дорогу ругался ядренейшим матом — шофер и усом не вел), обустроился, закушал обед с невкусным луковым супом и медно-кислым красным вином, подивился бедности хваленой парижской публики, приобрел действительно жене чулки и себе галстук, а к семи вечера был у черта на рогах, в шестнадцатом районе, на улице с двойным названием, которое еле выговорил другому таксисту: Колонель-Бонне. Дома семнадцать не было — пятнадцатый и сразу девятнадцатый, как-то он отступал вглубь, и вид у него был потертый, чуть не средневековый. Внизу, на входе, сидела вахтерша, вылитая Клавдия с общежития Трехгорной мануфактуры, куда Бутыкин захаживал к одной интересной Мэри, и так же не хотела пускать, но он повторял: «Манахин, Манахин, русский», — и она махнула рукой, потому что у русских, видимо, были свои чудачества.</p><p class="p1">На лестнице в нос Бутыкину шибануло запахом старины — старого дерева, затхлости, общей несвежести, <em>укуркости</em>, как говаривали у них под Воронежем. Запах казался коричневым, Бутыкин все-таки был писатель и чутье на запахи имел, так сказать, цветовое: мясо пахло красно, мыло «Лориган» — фиолетово, а этот лестничный запах был чисто коричневый, цвета опилок, трухи, старческой дрябнущей кожи. Нехорошо жил Манахин, и тяжко ему было, верно, вдыхать каждый день этот дух чужого распада, долгой беспросветной неудачи; может, если б он честно разоружился и признал, то его бы к нам? Шофера и у нас нужны, а что бывший белый, то мало ли бывших белых! Если он, конечно, действительно знает и разоблачит… Но Манахина не было дома, это, видать, и пыталась втолковать Бутыкину вахтерша внизу, потому и махнула рукой — пусть сам убедится, русские иначе не понимают. У, курва! Манахин, значит, в ночную. Бутыкин с трудом дотерпел до завтрашнего обеда. У него было в Париже три дня, он не мог провалить поручение. К трем таксист уж всяко отоспится.</p><p class="p1">Вахтерша на этот раз пустила его без звука, Бутыкин с колотящимся сердцем поднялся на пятый этаж по узенькой, чуть втиснуться мужчине его сложения, винтовой лестнице — и решительно постучал. С той стороны молчали, потом заскрипели пружины, постоялец по-медвежьи заворочался, всхрапнул, крякнул, встал и тяжело прошел к двери.</p><p class="p1">— Ки э ля? — спросили хрипло.</p><p class="p1">— Я русский, пришел по делу, Бутыкин, — сказал Бутыкин поспешно. Дверь приоткрылась ровно настолько, чтобы в мелькнувшем просвете можно было разглядеть горбатый нос — видимо, манахинский. — Я из Советского Союза, — быстро сказал Бутыкин, — по поводу статьи вашей. Насчет Шелестова.</p><p class="p1">За дверью молчали. Наконец Манахин решился, и Бутыкину предстал типичный казак, ровно такой, каким его когда-то рисовали в «Известиях». Манахин был выше среднего роста, с тяжелыми руками, квадратными плечами, вислыми усами — как эти французы садились к нему в машину? Бутыкин и в Москве к такому не сел бы. Манахин был в белой рубашке, фланелевых брюках на подтяжках и в сетке на голове — помыл, видно, после смены, так вот, чтоб волосы не растрепались. На столе в крошечной комнате — кровать занимала ее четверти на три, — лежали раскрытые, корешком вверх, шелестовские «Пороги» в издании «Роман-газеты».</p><p class="p1">— Слухаю вас, — буркнул Манахин.</p><p class="p1">Никакой радости, в отличие от агента, он не выказал, сесть не предложил и угощать точно не собирался, хотя под выпивку разговор пошел бы легче. Бутыкин надеялся, что тоска по Родине заставит Манахина сперва хлебнуть, а там и разговориться, но он и руки не протягивал. Бутыкин засуетился.</p><p class="p1">— По русскому обычаю, господин Манахин, надо б сперва обзнакомиться. — Он искал точки соприкосновения с белоказаком и не находил, кроме водки. — Поговорить, эт-самое, погутарить. Привет с Родины, — это было уж вовсе некстати.</p><p class="p1">— Слухаю, — повторил Манахин, не предложив сесть.</p><p class="p1">— Гражданин Манахин, — уже без «господина», с полагающейся суровостью заговорил Бутыкин. Он понял, что душевного контакта не будет и давить надо по-советски. — Вы описали в «Последних новостях», как знали настоящего автора романа товарища Шелестова «Пороги». У нас это строго поставлено, нам чужого не надо, и если товарищ Шелестов действительно присвоил чужое, то мы со всей, эт-самое, пролетарской прямотой. Потому что и у нас имеются основания полагать, что, может быть, данное дело не очень-то и чисто.</p><p class="p1">Манахин слушал как каменный, только видно было, как бьется на виске у него извилистая жилка. Руки белоказак держал в карманах, но видно было, что ежели вдарит, то вдарит. Бутыкин никогда не любил казачества, ни белого, никакого.</p><p class="p1">— Поэтому, — продолжал Бутыкин, — нам желательно было бы ваши, так сказать, материалы, если вы располагаете и если разоблачение действительно пойдет, то я вам уполномочен передать гарантии, определенные гарантии определенных лиц. — Он заторопился. — А то что в самом деле, русский человек в какое-то такси. И возвернуться можно, и там у нас сейчас, вы знаете, смычка… Многие сейчас, как вы знаете, вот так вот, назад… А товарищ Шелестов действительно позволяет, и мы давно замечали, поэтому если вы, так сказать…</p><p class="p1">— Знацца, так, — тихо сказал Манахин. — Смычка, да? — И Бутыкин прямо почувствовал, как он там, в карманах, сжал свои чугунные кулаки. Такие кулаки хорошо подносить к носу и спрашивать: «Чем пахнет? Смертью пахнет». — Ты щас, товарищ, повернешься кругом арш и смыкнешься отсюдова, я табе два раза повторять не буду. Ты слыхал?</p><p class="p1">— Но слушьте, — затараторил Бутыкин, — ну что вы это, как несознательный… Ведь вы сами писали, никто не тянул. Статья, эт-самое, хорошая статья по делу, ну если каждый так будет чужое… што вы, я не знаю…</p><p class="p1">В ответ Манахин несознательно сделал один шаг в сторону Бутыкина, и писатель, не прекращая увещаний, выкатился на лестницу. Что интересно, он долго еще потом продолжал говорить. Вахтерше внизу — слова «консьержка» он не узнал до старости, — тоже сказал почему-то, размахивая руками:</p><p class="p1">— Но несознательно же. Вот так каждый будет воровать книги, что будет?</p><p class="p1">Но в Москве миссию Бутыкина сочли выполненной, потому что не для того же его посылали, чтобы вызнать истинную картину. Его для того посылали, чтобы прекратилась белогвардейская вонь по поводу похищения нужного романа. А она прекратилась, и белоказачий шофер Манахин так никогда и не рассказал всей правды про съединение Панкрата с Анфисой. Только Климов, выслушав доклад, потеребил усы и спросил Бутыкина:</p><p class="p1">— Странность все же, товарищ Бутыкин. Почему он еще пятого июня хотел разоблачать товарища Шелестова, а три недели спустя уже вот так? Мог ли, допустим, товарищ Шелестов как-то воздействовать?</p><p class="p1">— Да он такой, он никого слушать не стал бы, — поспешно ответил Бутыкин. — Это какая-то ему под хвост, извините, вожжа.</p><p class="p1">— Вы говорите, на столе «Роман-газета» была? — задумчиво спросил Климов.</p><p class="p1">— Лежала, с «Порогами». Прямо вверх портретом.</p><p class="p1">— Портретом? — переспросил Климов. — Они с портретом теперь печатают?</p><p class="p1">— Ну а как же. И с меня снимали. С марта месяца так выходит.</p><p class="p1">— Ну ладно, — отпустил его Климов и два месяца спустя, когда стало уже ясно, что разоблачения Манахина не возобновятся, поощрил Бутыкина посещением распределителя.</p></span>
