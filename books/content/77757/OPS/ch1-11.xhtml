<p class="p">17 июня 1913, Петербург</p>
</div><p class="p1">Это случилось с Дехтеревым, когда он стал уже не первой молодости, а все ж, по сравнению с нынешним статусом, в безоблачные и легкомысленные времена. Состоялась уже «Физиология памяти», и приглашение в Базель, и одобрительное письмо от Фройда, — но в России ты до пятидесяти лет никто, а ему исполнилось сорок с небольшим, и он ходил еще в подающих надежды. Он сидел в вегетарианском зале «Венеции», когда к нему подсела странная тревожная женщина в ярко-оранжевой накидке, так и запомнилась эта накидка, как тревожное пятно.</p><p class="p1">— Вы Дехтерев, я узнала вас, — говорила она, не давая вставить слова, — я посещала вашу лекцию по телепатическим радиоволнам (он сроду не читал такой лекции, но она так поняла его эксперименты с Дуровым). Я хочу показать вам рисунки. Вы только не говорите сразу, всмотритесь. Это важно исключительно. Вы меня не знаете, я Бутникова, ученица Дирка. Я работала у Дирка, разочаровалась. (Дирк был шарлатан, оккультист, смешно слушать.) Но этот случай особенный, и я как знала, что увижу вас, поэтому захватила. Прошу вас, смотрите.</p><p class="p1">Она выложила на стол потрепанную картонную папку с рисунками, и Дехтерев, всегда охочий до практики, принялся их рассматривать, в самом деле увлекаясь больше и больше. Листов было семнадцать, на некоторых по две-три композиции.</p><p class="p1">— Ну-с, я вас слушаю, — сказал он минут через пять.</p><p class="p1">— Это я вас слушаю, — возмутилась она.</p><p class="p1">— Но должен же я знать хотя бы, кто это нарисовал.</p><p class="p1">— А мне нужно, чтобы сказали вы, — повторила она с нажимом.</p><p class="p1">— Тогда, — произнес он уже с некоторым раздражением, — все это не более чем мои фантазии, мало чем подкрепленные. По двадцати рисункам я ничего не скажу достоверно даже о больном, которого наблюдаю месяцами. Но в общем случае… я предполагаю, что это рисовал один человек; что этот человек сошел с ума; что рисунки выложены по хронологии.</p><p class="p1">— То есть… — Бутникова уставилась на него, картинно оцепенев. — То есть вы утверждаете, что вот это, — она взяла Жар-птицу, — нарисовано позже, чем лошади?</p><p class="p1">— По всей видимости да, — сказал Дехтерев, наслаждаясь эффектом. — Это несложно. Смотрите: орнамент на крыльях тот же, что на седле, и даже, пожалуй, изощреннее. Но сама птица сделана по-детски, либо, что вероятней, в сумеречном состоянии, и вообще в этих поздних работах меньше сюжета. Видите? Со щенком — готовая жанровая сцена, и рядом, с дворником, карикатура хоть в «Сатирикон». А тут — они развернуты статично, хотя на рисунке их двое. Я только не вполне понимаю, что надвигается…</p><p class="p1">— Вы думаете, это, — она показала на плиту, как бы падавшую на застолье, — надвигается?</p><p class="p1">— Падает, давит, приближается, как хотите. А что такое «Тароп»?</p><p class="p1">— Я этого не могу вам сказать.</p><p class="p1">Черт бы их драл с этой неточностью выражений.</p><p class="p1">— Не можете или не знаете?</p><p class="p1">— Не знаю, — с неохотой призналась Бутникова.</p><p class="p1">— А как это вообще к вам попало?</p><p class="p1">— Расскажу. Но сначала еще немного, пока вы не знаете обстоятельств. Как, по-вашему, эти вторые рисунки… они сделаны больным человеком?</p><p class="p1">— Не сказал бы, что именно больным. Представьте, — он пощелкал пальцами, ища слово, — ну, хоть алкоголика, или любое другое сумеречное состояние талантливого человека, когда навык в руках остался, а мыслить человек уже не умеет, или это ослаблено, и в голове только сны… Я живописью не занимался, ни как дилетант, ни как исследователь. Но и мне видно, что этот второй человек умеет рисовать, и даже, пожалуй, лучше первого… потому что этот условно первый — все-таки, знаете, маэстризм. Вот как в альбомы рисуют: щенок, дождик… А второй — ну, что ж, это сейчас в Париже произвело бы впечатление, и у нас произведет, и даже сошло бы за новое слово. Но это новое слово тяжелобольного человека, которого… которого многое еще вдобавок томит, — закончил он машинально, кое-что приметив на последнем рисунке и не желая распространяться. Но приглядеться стоило. Случай был не так схематичен, как Дехтерев сейчас рассказывал.</p><p class="p1">— Хорошо же, я открою вам, — пообещала Бутникова, словно он долго вымогал у нее роковую тайну, которая сейчас его прямо в «Венеции» и убьет. И она рассказала Дехтереву тот самый случай, который он должен был в четырнадцатом году докладывать в Берлине, но помешала война; и, может быть, прекрасно, что помешала. Кто знает, чего наделали бы люди, расскажи он тогда про свою новую мнемонику — и от чего сам он удерживался, более не занимаясь этой сферой?</p><p class="p1">Веронике Лебедевой, наполовину француженке (отец давно вернулся в Марсель, и она жила под фамилией матери, известной петербургской портнихи), было двадцать лет, когда она угодила под один из немногих еще в Петербурге автомобилей. К двадцати годам она была известной в узких кругах художницей и даже выставлялась, Сомов ее хвалил, Железкин к ней сватался, но был высокомерно отвергнут. Красавица, идеально соответствовавшая тогдашней моде, — высокая, тонкая, насмешливая, невинно-порочная бердслеевская женщина, одна из тех, в которых Дехтерев ничего не понимал, хотя всегда ими любовался. Что-то было у них с эмоциональной сферой — они то ли подавляли ее, то ли, в преддверии великих перемен, природа сделала их нечувствительными, чтобы с ума не посходили.</p><p class="p1">Лебедева любила выезды на природу с компанией богатых бездельников, любила скачки, сама участвовала в какой-то любительщине, но ее считали опытной наездницей. Она превосходно плавала, управляла яхтой (был роман с безмозглым, но бронзовым яхтсменом), стреляла даже из лука — вспомнить, какой только экзотикой не увлекался предвоенный Петербург! И при всем том акварели ее были мрачны, бессолнечны, знаменитый (среди кого знаменитый? — но Бутникова отрекомендовала так) автопортрет изумлял отчаянным выражением беспомощных глаз и опущенных углов рта, а в последний год Лебедева и вовсе замкнулась, порвав с кружком и отшельничая с этюдником. Какая-то любовь? Нет, сказала Бутникова, скорей ранняя усталость, а впрочем, что мы все знаем.</p><p class="p1">— Так, — спросил Дехтерев, не желая себе признаться, что судьба этой недурно рисующей красавицы его заинтересовала и даже взволновала. — В каком же она положении теперь?</p><p class="p1">Теперь она была в положении плачевном. Бегунья и спортсменка передвигалась в коляске, и хотя врачи сулили чудо, ибо ноги ее сохранили чувствительность и, стало быть, могли вновь зашевелиться, — всего печальней была начисто стершаяся память. Она не узнавала ни Железкина, ни яхтсмена, ни даже Сомова, заглянувшего к ней и бежавшего через четверть часа в слезах. Она не могла решить простейшую задачу. Она из всей родни признала только мать, и то лишь полгода спустя после травмы. Мать дала ей краски, карандаши, и постепенно, рисуя сначала совершенно по-детски, а затем все уверенней, — она стала, говорила Бутникова, создавать образы; но боже правый, что же это были за образы! Страшные, грозные призраки подсознания, птицы с гигантскими крыльями и оскаленными, зубастыми клювами, адские люди с чудовищными руками…</p><p class="p1">— Ну уж, ну уж, — успокоил ее Дехтерев. — Дети всегда так рисуют, руки огромные, потому что развиваются их функции, начинается всякое хватание и попытки мастерить… Зверозубые птицы — тоже детское, сочетаются черты разных зверей, комбинируются признаки… Ничего не нахожу удивительного, она проходит детский путь.</p><p class="p1">— Вам ничего удивительного, а жених сходит с ума, — верещала Бутникова. Ее было не остановить. — Когда он пришел навестить ее, она закричала: «Уйди, мужчина! Чужой мужчина!» Вообразите только, что он чувствует. Они души не чаяли друг в друге.</p><p class="p1">— Интересно, — сказал Дехтерев. — И рисунки, и сама… Я посмотрел бы на нее, если не потревожу слишком.</p><p class="p1">— Но на вас вся и надежда! Я только потому к вам и подошла!</p><p class="p1">— Я не думаю, — сразу отсек Дехтерев ненужную надежду, — не думаю, что могу здесь исправить. Человек не табуретка, память — штука тонкая, повреждения, сколько могу судить, ужасные, и при таких ударах восстановить личность не удавалось еще никогда. Если б я мог, то есть будь это мой случай… Мы же все, доктора, связаны порукой: меня позвали бы. Но, видимо, тут не по моей части.</p><p class="p1">— Не можете же вы знать все! Ее лечил и сейчас наблюдает Серебров, Георгий Михайлович…</p><p class="p1">— Нет, не знаю. Это, видимо, хирургия.</p><p class="p1">— Хирургия, конечно, еще бы, такие травмы…</p><p class="p1">— Ну вот. А я ведь психиатр. Но посмотреть — посмотреть я могу и, больше того, хотел бы…</p><p class="p1">Дехтерев вполне отдавал себе отчет, что он действительно хочет посмотреть, т. е. интересует его не медицинский случай, а красивая девушка. Но и случай его заинтересовал — он сам еще не понимал, чем именно, и только ночью, проснувшись, понял: в рисунках ее не было детского, вот в чем дело. Она рисовала, да, как рисовал бы ребенок, — но навыки были, не утратила, и не только двигательные; она была художник, личность ежели и стерлась, то не до конца. И ему страшно стало. Он подумал, что лучше к ней не ходить — где, в каком промежуточном мире, среди зубастых птиц, она сейчас блуждает? И что такое этот ТАРОП, надвигающийся, падающий квадратной тяжестью на маленьких людей за столом? Он так и сяк покрутил тароп. Не выходило. Ночью всегда было страшней, но и утром он надеялся, что Бутникова не позвонит. Она, однако, позвонила и назначила на завтрашний полдень; и он отправился на Большой проспект Петроградской стороны.</p><p class="p1">Его встретила мать Лебедевой, моложавая и быстрая. За ее бодростью, впрочем, он разглядел истерику, неослабное напряжение всех сил. У них в доме, видимо, был уже отработан ритуал — сначала мать показывала рисунки, рассказывала о том, что всем казалось небывалым успехом («Мне кажется, она уже узнает гостей…»), и только после вступления — явление: распахивалась дверь, и разрешалось войти в следующую комнату, нет, еще не к Веронике, тут следовало набраться мужества или восхищения, и лишь в третьей комнате он увидел женщину, за которой на край света пошел бы, встреться она ему до своей беды.</p><p class="p1">Дехтерев был женат. Он был женат удачно. Он был, что называется, счастлив в браке. Но любые счастливые браки разлетаются, господа, во прах, когда мы слышим голос трубы — вот именно трубы, с этим инструментом ассоциировался в сознании Дехтерева зов, ничего общего не имевший с потным призывом пола. Это нам показали край закатного неба с такими красками, которых не бывает; это мы увидели водопад на бледном дагерротипе, это в душном, гнусном зале синематографа между военной хроникой и приездом императора в Одессу возник туземный берег, это нам вдруг нарисовался не обычный, типовой продукт творения, а его дивный, почти уродливый эксцесс. Почему нас пленяет фантастический цветок с медно-синим отливом, попугай с огромным и ненужным наростом на голове, почему мы так вглядываемся в лапки и жальце смертоносного, жуткого инсекта, в безопасную его заспиртованность? Да потому, что творец, столь долго являвший нам свою поденную работу, грубое ремесленное производство, — оказался вдруг художником совсем иного склада, а то, что мы видели, — это тьфу, это потому, что мы родились в таком скучном месте, похожем на склад. Хотя и склады, пакгаузы в желтом закатном свете, осенью, очень бывают хороши в том самом смысле. Даже то излучение, которое шло от нее сейчас, в десятую часть обычной силы, заставило Дехтерева содрогнуться от особенной тоски, которая, как заметил Чехов, всегда отзывается в нас при виде красавицы; и не потому мы грустим, что она не наша, а потому, что и она умрет, и вообще творить такую для таких — только силы тратить.</p><p class="p1">Она его не заметила. Он догадался, что, вероятно, поврежден и слух. Действительно, на левое ухо она была теперь глуховата, но и не в том еще беда — она плохо понимала речь. При этом ничего страшного, ничего отталкивающего — напротив, ее грация словно окончательно раскрепостилась; он увидел красоту, начисто лишенную самосознания. В том, как она ласкалась к матери, виделось не одно только детское, но и женское, с той игривой иронией, с какой Дункан, приезжая, изображала кошку.</p><p class="p1">Она улыбалась и новым людям, и собственным рисункам, с которыми часами тихо возилась, ни на кого не обращая внимания. Но с самого начала что-то его смущало, кололо, — он не мог еще разобраться, все больше влюбляясь в эту разбитую статую. И коляска ее не портила. Венера сидящая — нет, Артемида, — нет, античность не знала такого типа красоты. В ней не читалось ничего царственного, она вся была домашность, и если действительно так неприступна, как говорила дура Бутникова, — то потому лишь, что все эти атлеты и эстеты оказались недостаточно дети. Ямочки на щеках — Дехтерев был не сентиментален, но тут прослезился бы: ах, если бы кто так на него смотрел, как смотрела она с тут же показанного ему автопортрета! Но в том и дело, что смотрела в никуда — или уж в себя: никто, никто не достоин.</p><p class="p1">И только через час, когда, чувствовал он, стоило уже уходить, — вдруг ему стал ясен источник этого беспокойства. Она все понимала. Это не было заблуждение влюбленного, никак не могущего смириться с потерей своего идола, — нет, Дехтерев был ученый, человек даже слишком холодный, как писал ему Юнг. Он принялся наблюдать. Ему с самого начала казалось, что стоит отвернуться — и она поднимает на него разумный, цепкий взгляд, сопровождает малейшее его движение, но вот он повернул голову к ней — и опять эта улыбка ребенка при виде котенка, или даже котенка при виде ребенка… Он видел, случалось, или скорее чувствовал — у него хорошо это было поставлено, — как гордый, самодовольный, иногда почти люциферический тип отслеживает реакцию других на себя: вот он смотрит на тебя с горделивым презрением — но вот ты отвернулся, и он робким, словно обрывающимся взором следит, достаточно ли ты впечатлен; э, говорим мы себе, а люциферианство-то с прорехами, с проплешинами, на дрянной подкладке. Здоровые люди так себя не ставят.</p><p class="p1">Она следила иначе, но несомненно следила. И Дехтерев следил, и этот их поединок обоим нравился. Он поручился бы за это. Он видел, что она его узнает, но видел и то, что всякие попытки разбудить память ей неприятны; он приятен, а попытки — нет.</p><p class="p1">Он приметил еще одно. На рисунках ее все чаще появлялись цифры — 35, 29, 86, — но чаще других встречались 11 и 14. В этом не было никакого смысла, она могла стихийно вспоминать цифры, никакие важные события в ее жизни не приходились на эти годы, — но цифрой 11 были маркированы сюжеты реальные, бытовые, люди, куклы, а 14 — райские цветы и птицы, которых он не встречал, которых и быть не могло. Они немного похожи были на рисунки в старой книге, где нельзя разобрать ни одного слова, а растения цвели небывалые. Он раскладывал перед ней эти цифры из картонной кассы, которую купил нарочно, — реакции не возникало, и только раз в ее взгляде почудилось ему лукавство, но она и просто так иногда улыбалась непонятно чему.</p><p class="p1">Он стал замечать точки. Учение о точках только формировалось у него тогда. Он стал примечать, что некоторые слова, произносимые в ее присутствии, вызывали странный жест рукой — словно заслонялась от чего-то. Они не нравились ей, ассоциации были ужасны. Другие радовали ее, и она повторяла их беззвучно. Он стал эти слова вписывать. Он заметил также, что при слове «Тароп» она опустила однажды голову, но расслышала ли его толком — он сказать не мог. И помимо всего замечал, что новая личность, нарастающая в ней, моложе и жизнерадостней, да что там, восторженней прежней. Ее все радовало. Прежняя Вероника была задумчива, скорей меланхолична. Новая любила яркие цвета, требовала подавать ей красные платья. Тут что-то было, он не понимал еще что. Вероятно, прежняя жизнь ее тяготила, она поставила железную стену меж собою прежней, несчастной, и новой, счастливой и глупой.</p><p class="p1">Однажды он попросил у нее рисунок, хотел свернуть в трубку.</p><p class="p1">— Кто так носит! — крикнула она здоровым голосом художника, оскорбленного небрежением, но тут же, вспомнив о маске, затаилась и принялась повторять улыбчиво: мур-р… Дехтерев знал, что, если ударить в некую точку, он обрушит и всю стену, и тогда вернется девочка, которую он сроду не видел, но успел полюбить всей своей сухой и, в общем, недоброй душой; но стена стояла гладко, незыблемо, на двери не найдешь замка.</p><p class="p1">Он начал уже молиться об этом замке, а в доме Вероники его визиты начинали находить неприлично частыми, когда в конце июня, прогуливаясь на островах в обычной своей вечерней сосредоточенности, он увидел на стене рыбного ресторанчика крупно, красно, кричаще выписанное «ТАРОП».</p></span>
