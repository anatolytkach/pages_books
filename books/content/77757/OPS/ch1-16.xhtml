<p class="p">23 июля 1930, Москва</p>
</div><p class="p1">Смотр советского хозяйства был организован с римским размахом. На полную мощность включенное солнце — зимой, конечно, посинеем, зато сейчас уж изумим всех гостей! — заливало бесконечные ряды шатров, простирающиеся до горизонта. Воздух был битком набит запахами: сладости, фрукты, овцы, немытые люди. Все это не только цвело красками и пахло, но и издавало невообразимую какофонию. Туго шевелилась толпа — пестрее не придумаешь, и Шоу пораженно вертел головой на птичьей жилистой шее. Рядом семенил Петр, переводчик, рассказывая на ходу о том, какое несомненное значение имеет именно сегодня эта выставка для страны, едва только вставшей твердо на ноги.</p><p class="p1">— …и объединенные идеей народы сложат свои вековые умения в один котел, в котором родится новое общество! — Петр закончил речь возле площадки, где несколько черноусых красавцев в папахах гарцевали в пыли на тонконогих жеребцах. Начал он ее еще возле узбекских ковров, и она была столь же бесмысленна, как эти ковры. Когда-то, в древности, их узоры имели смысл и могли сообщить, наставить, но теперь смысл утрачен, осталось украшательство… Кто где видал, чтобы что-то рождалось в котле? Только что плесень у дурной хозяйки. Шелестов должен был быть здесь, выступать перед какими-то не то виноделами, не то овцеводами — хотя что бы он мог сказать им, чтобы они услышали?</p><p class="p1">И вдруг Шоу увидел его — Шелестов шел через толпу, не глядя по сторонам, с ним были еще какие-то люди, но тот сразу выделялся, сразу было понятно, что вот он, автор великой книги, а те, рядом, даже и не читатели. Шоу рванулся к нему — и тут же потерял из виду.</p><p class="p1">— Петр! Остановите его! Я должен поговорить! — крикнул он, задыхаясь, но Петр спешил совсем в другую сторону. Шоу остался один среди толпы, и тут же его окружили чужие тела, головы, руки, молодая женщина с черными, заплетенными в несколько тонких кос волосами, что-то быстро говорила ему, пихая в рот липкий кусок, который Шоу послушно проглотил, не разобрав вкуса, дернулся от нее и двинулся туда, где мелькнул Шелестов. Кто-то сзади взял ирландца под локоть — оглянувшись, он увидел взволнованного Петра.</p><p class="p1">— Ну куда же вы пропали? Пойдемте, пойдемте, — поторапливал тот, и они выплыли из пахнущего пряностями и человечиной восточного кошмара.</p><p class="p1">— Видите ли, эта выставка — небольшой образец Советского Союза. Западному человеку без советского проводника невозможно не заблудиться, — строго сказал переводчик. — Сейчас я вам кое-что покажу, вы удивитесь. — С этими словами он ввел его в просторный шатер, где, слава богу, было прохладно. Посередине стоял огромный стеклянный куб, на дне что-то копошилось, скакало, мельтешило. Зрители подходили по очереди, широкоплечий детина с русой бородой и в вышитой рубахе протягивал увеличительное стекло, и очередной зевака в недоумении вглядывался несколько минут внутрь куба, после чего отходил, покачивая головой. Переводчик подошел к детине, что-то ему шепнул, после чего поманил Шоу пальцем.</p><p class="p1">— Берите стекло и смотрите. Вот сюда, да.</p><p class="p1">По дну террариума ползали крупные рыжие тараканы в кафтанчиках и сапожках. Одежда заметно стесняла их движения, и ползали они, будто контуженные. Один таракан был весь в кружевах, а на лапке болтался крошечный веер, — этот уже вообще не мог ползать, а беспокойно кружил на одном месте, шевеля длинными, не дамскими усищами. В углу лежало крупное насекомое в мундире — его придавило саблей не больше булавки.</p><p class="p1">— Ну, каково? — прошептал Петр. — Русский крепостной подковал блоху, а советский мастер одел таракана!</p><p class="p1">Мастер по одеванию тараканов мелко кланялся в углу. «Хороший костюм, — думал Шоу, — ткань добротная. Поистине, настоящее величие видно только под микроскопом». Он рассматривал насекомых с отвращением и жалостью — видеть таракана в одежде было все равно что ночью обнаружить на потолке в гостиной голого человека. Несомненно, когда-нибудь в Советском Союзе станет возможным и это.</p><p class="p1">— Через полчаса начнется представление, — сообщил переводчик. — Расстрел царской семьи. Вон тот таракан, видите, — Петр прильнул к стеклу, — тот в мундире — Николашка. И Шурхен с ним рядом, с веером. Расстреливать будут горящими спичками из миниатюрной пушечки.</p><p class="p1">— Я восхищен мастерством и изобретательностью советских людей, но…</p><p class="p1">— Как знаете. — Они вышли из шатра в июльскую духоту и шум.</p><p class="p1">— Петр, где будет выступать Шелестов? Мне очень нужно с ним встретиться.</p><p class="p1">— Да-да, разумеется. Не беспокойтесь, я вас потом провожу. А сейчас пойдем дальше.</p><p class="p1">В следующем шатре, куда они зашли, маленький сухонький мужичок выкладывал на холсте картины из зерна. Мужичка представили художником Николаем Ржаным. Ржаной запускал руку в мешок и резво бросал горсть зерна на полотно, смазанное клеем. За десять минут он изобразил невозможно уродливый, очень похожий портрет Шоу с овсяной бородой и кукурузными глазками. Молча он всучил ему картину и принялся за следующую — кажется, это была обнаженная крестьянка в поле: обернувшись на выходе, Шоу заметил, как Ржаной, высунув от усердия язык, прилаживал к пшеничной груди просяной сосок. Но Петр уже вел его дальше. Подаренный портрет нести было неудобно, выручила сбежавшая откуда-то коза. Подкравшись, она ухватила картину за угол и ускакала, жуя. Шерсть козы отливала розовым, и Шоу с восхищением вспомнил Красный серп.</p><p class="p1">— Ничего, — сказал Петр. — Я договорюсь, он новый сделает. Но скажите, как вам вот это все?</p><p class="p1">— Я в восторге, — мрачно ответил Шоу. — Я думаю, вам надо почаще вот это все устраивать. Буквально каждый год, чтобы вот так. И вот именно здесь. Построите фонтаны, павильоны, будете там своих тараканов друг другу демонстрировать. — Он уже страшно устал, сказывались годы, и к тому же он боялся, что снова так и не встретится с Шелестовым — встреча их срывалась уже дважды, скоро уже надо было уезжать, поэтому сегодня или никогда.</p><p class="p1">— Петр, — решительно сказал он. — Давайте к Шелестову, а потом уже все остальное.</p><p class="p1">— Как хотите. — Петр пошевелил острым носиком и двинулся через толпу. Вскоре они вышли к наспех сколоченной невысокой сцене, возле которой стройными рядами стояли дети в белых рубашках и красных галстуках. Ни на овцеводов, ни на виноделов они не походили, Шелестова нигде не было видно. Вокруг детей сновали юноша и девушка, оба загорелые, стриженые, с острыми локтями. Переводчик быстро подошел к ним и заговорил, кивая в сторону почетного гостя. Те внимательно выслушали и кивнули. Затем девушка подбежала к Шоу и поприветствовала его на сельском английском. Подоспел Петр.</p><p class="p1">— Они просят вас выступить перед активистами пионерской организации. Очень просят. Видите ли, товарищ Шелестов немного запаздывает, а пока он не пришел, вы сказали бы несколько слов молодому народу…</p><p class="p1">Никаких слов говорить не хотелось, да и что он мог сказать пионерам? Мойте руки? Плохой совет, совет для леди Макбет… В пионерах было что-то пугающее — может быть, как раз эта недетская чистота и опрятность во всем, серьезные лица, взрослый вызов в глазах. Шоу с трудом поднялся на сцену. Черт их знает, как к ним обращаться вообще, к этим пионерам…</p><p class="p1">— Дети, — начал он, но это было не то. — Друзья! — уже лучше. — Я счастлив видеть вас здесь сегодня. Я восхищен вашей страной. Конечно, в этом пока нет вашей заслуги. Но я вам завидую. Вы начинаете свою жизнь в новом, молодом мире.</p><p class="p1">«Что я несу, — думал он, — заговорил, как мой переводчик. Но что еще сказать? Знать бы хоть пару фокусов или колесом пройтись — прошибить эту серьезность». Но надо было говорить дальше. По соседству грянула бодрая музыка, какие-то барабаны, трубы, что-то народное, бог знает, какого только народа… Под эту музыку прекрасно было танцевать, сеять, лить чугун, но только не формулировать мысли. Но здесь никто этого, кажется, и не пытался делать, и место предназначалось для другого, и время. «Еще несколько дней назад мне было слегка за семьдесят, а теперь уже под восемьдесят», — подумал он и, перекрикивая музыку, продолжал:</p><p class="p1">— Я не знаю фокусов и не умею делать трюков. Моя работа — строить фразы из слов, ваша — строить новый мир на ровном месте, очищенном от обломков старого. Приходит время новой морали, и несете ее вы, вы — как то новое, чистое поколение евреев, не помнящее рабства!</p><p class="p1">Это библейское сравнение Петр, естественно, не перевел, заменив сельскохозяйственной метафорой: овцы, пастух…</p><p class="p1">— Пионеры! Идите вперед, твердыми шагами прочь от несовершенства прежнего мира…</p><p class="p1">И тут он увидел, как за бело-красным строем детей мелькнула знакомая фигура: Шелестов быстро удалялся от сцены в сторону выхода с выставки, и Шоу вдруг понял, что он сюда не придет и выступать здесь не будет.</p><p class="p1">— Пионеры! Идите… В общем, идите вверх, вперед, к черту, к дьяволу, as you like it! — это он выкрикивал, уже слезая по шатким ступенькам, а Петр честно переводил: «Пионеры! Уходите от бога и от всякой религии, не давайте пережиткам прошлого тормозить вас на пути прогресса».</p><p class="p1">Они нагнали Шелестова почти у выхода. Он выглядел моложе, чем на портретах, раздраженный, немного как будто испуганный. Но рукопожатие было сухим и горячим, такое и ожидалось от человека с фотографий. Шелестов выжидательно смотрел то на иностранца, то на переводчика, и, хотя Шоу в последние дни много раз представлял себе этот разговор, теперь он решительно не знал, как его начать. Вопрос у него был, один-единственный, но вытекал он из предыдущих двух тысяч лет и потому требовал предисловия. Наконец он заговорил — долго и выспренно, так что до Петра доходило едва десятое слово. Упоминались эластик (резина), зерно, потом что-то о разрушении, т. е., видимо, сносе и строительстве.</p><p class="p1">— Не думаете ли вы, что всю эту природу, — он повторил жест Шоу, сместив, однако, с толпы на окружавшие их елочки, — следует застроить новыми, оштукатуренными домами, чтобы в них смогли расселиться как можно больше советских людей, и чтобы всем хватило резины и зерна?</p><p class="p1">Шелестов смотрел на Шоу с недоумением. Не такого вопроса мог ждать писатель от писателя. Резина, зерно? Строительство? Он судорожно кивнул, потом еще раз.</p><p class="p1">Шоу обнял его со слезами на глазах.</p></span>
