<p class="p">7 декабря 1928, Москва</p>
</div><p class="p1">— И чего им надо всем, я не понимаю, — говорил Шелестов в досаде, разламывая каменно-твердую сушку в бухгалтерском кабинете Маслова на третьем этаже. Поспел и чаек, отменно крепкий, заваренный по-масловски, с мелиссой. За окном давно стемнело, по стеклу бежали струйки — Маслову полагался примус, и в крошечной бухгалтерии сделалось жарко от пара. Вот другому кому не дали бы примуса — сказали бы, пожарная безопасность. А Маслов, который мухи бы не обидел, умел договориться, все ему позволялось, потому, наверное, что хороший бухгалтер был на вес золота.</p><p class="p1">— Да нормально, Кирилл Саныч, — говорил Маслов, крупный, уютный, идеальный счетовод, и непонятно было, как он в огневую нашу эпоху умудрился сохранить такую уютность. Верно, и всю гражданскую где-нибудь так просидел, и не чувствовал к нему Шелестов никакого зла — хорошо, хоть кого-то не коснулся ураган. — Ты человек молодой. У тебя книга такая, ее вон вся Европа читать будет. Они хотят тебя нагнуть, а ты не давайся. Умел писать — умей не даваться.</p><p class="p1">— Но так што же мне делать! — воскликнул Шелестов в досаде, чуть не в ярости. — Я написал том. Написал другой. И тут они мне комиссию. Какая-то мразь, шваль белогвардейская написала, что это будто бы чужое. Но какое же чужое, когда я все судьбы… все, можно сказать, истории… ведь это родня моя! Вон Дарья, которая утопла. Это селькорша Тихонова так утопла. Вон Барсуков, начштаба. Так это я ездил к Игнатьеву разговаривать, пять дней с ним пил, уже пить не мог, а он все рассказывал. Героический человек.</p><p class="p1">— Игнатьев? — переспросил Маслов. — Константин?</p><p class="p1">— Ну он, да. Ты читал, что ли, про него? — Шелестову стало обидно, что тихий бухгалтер знает про героического начдива. Он думал теперь, что Игнатьев — его, Шелестова, собственность.</p><p class="p1">— Приходилось, — кивнул Маслов.</p><p class="p1">— Да они брешут все, которые пишут. Я один его про самую подноготную расспросил. Он, думаешь, всякому расскажет? Он такой, что никому не говорит, его три дня поить надо, чтоб на четвертый он про Ракитную рассказал. Ты хоть знаешь, что там было, под Ракитной?</p><p class="p1">— Слыхал…</p><p class="p1">— Слыха-ал, — передразнил Шелестов. Он, хоть и был годами младше Маслова, относился к нему несколько свысока: а впрочем, после второго тома почти на всех так смотрел. — Там было, брат, такое, что я не знаю, как в третьем томе про это описать. Ты представь: третью неделю Игнатьев гоняет батьку Швырина. Швырин уходит. Надоело все уже всем до смерти. И они там стали друг друга просто уже месить! Это такое было, что я не знаю, где еще можно подобное… Я ни в какой истории… — Шелестов вспомнил тут, что вообще не очень знал историю, ни чужую, ни русскую, но уже привык, что превзошел всю мудрость жизни. — Мне Семенов говорил, историк, старый человек, что ни в одной истории войн такого не видел на ровном месте месилова! Как это написать — я, конечно, смогу, но ишо не знаю…</p><p class="p1">— Ты это, — деликатно, но хмуро сказал вдруг Маслов. — Игнатьеву ты не верь очень-то.</p><p class="p1">— Почему? — изумился Шелестов.</p><p class="p1">— Да мало веры ему. Рожа такая… гладкая… и вообще.</p><p class="p1">— Слушай, Георгий Валентиныч! — обиделся Шелестов. — Давай уж я сам буду решать, кому вера, кому нет веры. Ты всю жизнь в своих бумажках, в цифирках своих, а есть люди, которые жизнью играли. Я вот под огнем мало бывал — и то, я доложу тебе, описать невозможно, как человек весь меняется в минуту. А этот под огнем, можно сказать, три года, а до того ишо в империалистическую, и ты теперя гутаришь, что у него рожа гладкая. Да ты бы на месте его…</p><p class="p1">— Ну, тоже может… всяко может, — бухгалтер в мягкой своей манере ушел от спора. — А только я ведь добра тебе хочу, на твою книгу весь мир смотрит. Ты Игнатьева слушай, а и другого кого тоже, он не один же там был, под Ракитным.</p><p class="p1">— Не один — точно. Но оттуда мало живых вышло, знаешь? Там и Швырина самого, и весь штаб его… Там, почитай, на Колевом поле — слыхал про такое? — тыщи три полегло только мертвыми, ранеными не меньше. Это я даже не пойму, из-за чего так схлестнулись, и объект вроде не стратегический…</p><p class="p1">— Ну так он же не всегда стратегический-то, — сказал Маслов, прихлебывая чай. — Иногда, знаешь, вокруг такой ерунды бывает… Вот ты «Войну и мир» небось читал, так скажи: Бородино что — стратегический пункт был? Все равно потом Москву взяли.</p><p class="p1">— Бородино — ладно, большое село. Оно у их на пути к Москве всяко было. Но почему в Ракитном-то? Это ж просто под руку подкатилось. Три недели гонялись, вот и вырвалась злоба. Это просто так не могло, тут какая-то, мабуть, причина…</p><p class="p1">— А ты знаешь как напиши? — предложил Маслов, и свиные его глазки загорелись внезапным вдохновением. — Ты напиши, что Игнатьев с этим Швыриным бабу не поделили.</p><p class="p1">— Э-э, Георгий Валентиныч, куды тебе выдумывать? — раздраженно сказал Шелестов, у которого уже начала выстраиваться красивая концепция с выплеском внезапного безумия с двух сторон, не хуже, чем у Толстого про это самое. — Сиди ты с цифирками своими… Што, ишо три тыщи человек тоже бабу не поделили?</p><p class="p1">— А очень может быть, — сказал Маслов весело. — Я одну бабу знал, она говорила, что тыщу через себя пропустила за десять лет очень свободно. Ты представь, как они тама все сошлись под Ракитной…</p><p class="p1">Шелестов не выдержал и усмехнулся. Ясным покоем веяло от Маслова. Не верилось, что за пределами его бухгалтерии, которую, казалось, все бури века обошли стороной, бывают Ракитные, шашки и даже комиссии по авторству.</p><p class="p1">— Ну и как мне с ними, с гадами? — спросил Шелестов уже почти мирно. — Как я им докажу? Я им рукопись — они скажут, списал. Я им селькора — они скажут, совпадение. Я им возьмусь прямо при них писать — они скажут, дерьмо.</p><p class="p1">— А ты, Кирилл Саныч, про них не думай, — посоветовал Маслов. — Ты знаешь как думай? Ты писать-то пиши, а этот весь разбор — ты, не ты, — неси его мимо рыла, будто это вообще не с тобой происходит. Можешь такое представить?</p><p class="p1">— Ну… — Шелестов помедлил. — Вроде могу.</p><p class="p1">— Так и представь. И тогда ты их — вона как! — и Маслов расколол в кулаке сушку с таким зверским видом, что Шелестов расхохотался, и как-то в самом деле отлегло.</p></span>
