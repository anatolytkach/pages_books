<p class="p">От автора</p>
</div><p class="p1">Это повесть не о тайне авторства «Тихого Дона», но о тайне авторства как такового.</p><p class="p1">Стартовая ситуация — молодой донской журналист получает по почте увесистый пакет с чужой рукописью — вдохновляла многих. Объяснения предлагались самые невероятные: якобы автором был гениально одаренный тесть Шолохова, который не мог печататься под собственным именем; или — убитый офицер, чью рукопись впоследствии опознали в советском романе многочисленные однополчане погибшего. Андрей Лазарчук и Михаил Успенский предложили свою версию: заставили престарелого Шолохова — автора огромной непубликабельной эпопеи — отправить ее через портал времен себе же молодому, в двадцатые, когда у такого романа еще был шанс… Было бы нечестно отвергать сходство Шелестова с Шолоховым, но история таинственного советского романа — лишь частный случай другой, куда более древней проблемы, занимающей автора вот уже многие годы.</p><div class="cite">
<p class="text-author">Дмитрий Быков</p>
</div></span>
