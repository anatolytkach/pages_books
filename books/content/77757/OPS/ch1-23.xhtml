<p class="p">14 июня 1939, Москва</p>
</div><p class="p1">Дехтерев приехал на совещание психиатров, но Шелестов этого не знал. Ему не до того было. Черт знает что делалось с его «Порогами», и он не мог думать ни о чем другом, разве еще краем сознания о том, что сын растет законченной дворовой сволочью, но и это бы все ничего, только бы кончить проклятый роман. Он был уверен, что кончит — и сразу все в его, а то и в государственной жизни сдвинется с мертвой точки; роман преградой лежал на всех путях, «Пороги» — на дороге. Если б Шелестов их закончил, он бы тут же принялся за все, наладил бы и семейную жизнь, и личную (он их не смешивал), и сыну вправил бы мозги, и с Манюней съездил в Крым, и На Самый Верх, возможно, решился бы написать о перегибах. Но с незаконченным романом, как с камнем на шее, он ничего не мог — а самое страшное что: он чувствовал, что еще немного — и роман-то его будет никому особенно не нужен.</p><p class="p1">Шелестов не знал, из чего сложилось у него это чувство. Может, ему самому надоело, а может, он видел наступление таких времен, что всем станет не до Панкрата с Анфисой, поскольку новая большая заваруха, о которой только ленивый уже не писал, будет страшней Гражданской, задвинет ее в тень, а уж кто там кого любил пятнадцать лет назад — вовсе забудется. Слабым утешением служило Шелестову то, что и все кругом писали эпопеи, первый том, второй том, — а дальше у них увязало, потому что неясно было, чем кончится. И всем это было неясно, потому что ежели такое ужасное чудо случилось только ради нынешнего всеобщего визга и трясения, — «ансамбль писка и тряски», говаривал злючка Воронов, — то не только смысла и оправдания, а даже порядочной финальной сцены не напишешь.</p><p class="p1">Диспозиция на конец четвертого тома была у него такая: Панкрат в колхозе, и вроде уже как бы совсем наш. Уже и Варька у него, ровно такая девка, как надо для новой жизни, с чертами той новой редакторши, Семенихиной Калерии (откуда только вытащили ее пролетарские родители такое имечко?), которая сменила пропавшую Муразову. Муразова как-то пропала. В последнюю встречу предупреждала, что исчезнет, может быть. Шелестов помнил, что надо бы поискать, заняться, — но только когда разберется с романом, а до того откладывал все. Муразова говорила, что устала ждать непонятно чего и уедет, может быть, в Одессу, где у нее друзья, а может быть, в Сибирь, где можно еще затеряться. Он подумал — что же, решение не худшее, но подумал какой-то темной половиной головы. Он многое вообще вытеснял туда, в эту темную материю, чтобы не мешало дописывать. А мешало теперь все: звонок, вызов на совещание, на котором опять кого-то перечисляли и громили, выезд в провинцию, от которого нельзя было отказаться, потому что и так уж намекали, спрашивали, когда же, когда же… «Или пиши, или ездий», — злобно говорил себе Шелестов, но вынужден был ездить, потому что не мог писать.</p><p class="p1">Есть, значит, Варя, Варюха, она же Калерия. Серые глаза блестят, и вся такая же — серая и блестит. И уже у них намечается пополнение, но тут прискакивает к Панкрату кто б вы думали! Прискакивает к нему Сарматский, былой товарищ по банде, сытая харя. И говорит: давай, мол, сопротивляться, и кроме того, есть у меня к тебе весточка. Панкрат разворачивает дрожащими руками — а там платок, платок Анфисы, с чабрецовым, мнится, запахом ее глупой головы! Стыдно Панкрату донести, а еще стыдней перед товарищами: они-то поверили, он-то предал! К работе у него ничто больше не лежит, на Варю не стоит, не хочется ему даже лапши с бараниной! В страшную ловушку загнал Шелестов своего героя, и надо было б окончательно зашибить Анфису и закончить все вешним севом — но стоило ли затевать ужасное чудо, чтоб вот так?!</p><p class="p1">И он сидел над чистым листом и всех ненавидел, а домашние ходили на цыпочках, и раз в месяц звонили из «Нового мира», а еще раз в месяц — из «Вечерней Москвы»: как, мол, да что на столе у классика? И страшней всего было, что через два, много три месяца звонить не будут. А Шелестов привык уже со сложной смесью ненависти и надежды ждать этого звонка: отрывают, бутетенят, сволочи, но еще ведь кому-то нужен! И когда раздался в полдень звонок Дехтерева, он привычно-глухо рыкнул «Слухаю», уверенный, что это «Вечерка», пора бы. Он жене не доверял брать трубку, все сам, потому что напряжение этого ожидания сделалось под конец невыносимо, вот-вот прорвется в гениальный эпилог или столь же масштабный запой. Но звонил Дехтерев, психиатр.</p><p class="p1">И странно: как в день смерти Маяковского обрадовался он людям из комиссии по собственному прошлому, так сейчас его чуть не осчастливил звонок Дехтерева. И чувство от этого звонка было у него такое, словно сейчас вырвут больной зуб, т. е. будет боль, а после великое облегчение, вскрылся гнойник или отсекся, как говорится, страдавший член. Он с этим чувством и сказал: а-а, как же, как же, очень помним. Что это вы вдруг в наши края и для чего вам лично мы?</p><p class="p1">— Я зашел бы, поговорил, — сказал Дехтерев суховато, но без тревоги, т. е. явно не просил за себя и не собирался советоваться, куда бы кануть. — Мне кажется, для вашей работы это будет небесполезно.</p><p class="p1">«Ну а что, — подумал Шелестов. Хватит врать, что я пишу. Я ничего не пишу, а он, доктор, возьмет да и подтолкнет меня. Душевную клизму, так сказать?» — хотел грубовато поинтересоваться он, но вместо этого искренне и просто сказал Дехтереву:</p><p class="p1">— Очень рад, давайте прямо хоть сейчас.</p><p class="p1">— Нет, завтра, завтра, — туманно ответил Дехтерев, записал адрес и простился.</p><p class="p1">Назавтра Шелестов распорядился приготовить все лучшее, например, карпа в сметане, и Манюня уютно, шумно хлопотала, а сам хозяин с усиливающимся волнением, которого не мог себе разъяснить, похаживал по кабинету и беспрерывно курил. Дехтерев явился ровно к двум пополудни, почти не переменившийся, разве чуть похудевший, но по-прежнему румяный, уверенный, без старческой сутулости. Семидесяти никто ему не дал бы, вот и гадай, в чем фокус: ледяные ли купания или осмысленные занятия. И странно — Шелестову рассказывали, мол, когда входит ветеринар отравить больную собаку, она не только не противится, но подается ему навстречу, почуяв избавление. И Шелестов так же вдруг потянулся к этому врачу, словно почувствовав сразу, что главный-то порог он сейчас преодолеет и больной, душащий его вопрос разрешится, да только разрешение это будет таково, что лучше не предполагать.</p><p class="p1">Шелестов давно заметил, что у культурных людей считается почему-то приличным для начала поотказываться от еды, хотя неприлично было как раз оскорблять отказом труд хозяйки; но Дехтерев был человек не культурный, а умный, что гораздо важней, и сразу принялся, нахваливая, и за карпа, и за кубанские разносолы, исправно привозимые от тестя.</p><p class="p1">Все, включая Гришку-лоботряса, ели аккуратно и говорили мало, с чувством, что совершается важное. Так угощали, должно быть, доктора в барском доме, где дочь вот-вот должна разродиться, но, пока она мечется и тужится, не пропускать же обед.</p><p class="p1">— Вот скажите, доктор, — начал Шелестов, желая подвести к главному шутейно. — Вы, значит, тут на конгрессе, а скажите, требуют ли от вас, чтобы какая-либо душевная хворь, либо же, скажем, белая горячка были в точности излечены в СССР в назначенный срок?</p><p class="p1">Дехтерев подумал и отвечал, что такого, нет, не требуют.</p><p class="p1">— То есть развитие науки, — сказал Дехтерев, — можно, конечно, предуказать. Но невозможно требовать, чтобы открытие было сделано в точный час. Окончательное же излечение душевной болезни вообще есть понятие проблематичное, потому что если болезнь физическая происходит от явного возбудителя, то что послужит спусковым крючком в параноидальном, например, расстройстве, мы этого сказать не можем. Тут сложный комплекс общественного и биологического, и не так глупо правительство, — он так и сказал, — чтобы торопить ученого.</p><p class="p1">— Вот именно, — сказал Шелестов радостно. — Именно что оно неглупо! Но тогда почему же, вот скажите, от нас требуют в конкретный срок выдать книгу, и чтобы она была шедевр? Хоть бы в нынешнем году: с меня спрашивали четвертый том к Первомаю! Да я, может, только к первому сентября додумаюсь, как мне его так завершить, чтобы три первых не пропали!</p><p class="p1">— Это да, резонно, — заметил доктор. — Книга, конечно, не корабль, чтобы к празднику спускать со стапелей. Вы сколько уже ее пишете?</p><p class="p1">— Да шестой год бьюсь, — честно признался Шелестов. — Я, знаете, наблюдаю: срок удваивается. Я первую делал месяцев восемь, вторую полтора, третью три. На четвертую шесть и выйдет. Требуешь, знаете, с себя, и, потом, ответственность…</p><p class="p1">Дехтерев согласился, что с годами писатель тратит все больше времени на шлифовку, хотя, казалось бы, должен приходить опыт.</p><p class="p1">— Но есть и естественный процесс, — добавил Дехтерев мягко, — иссякание энергии, попросту меньше сил… Выдумка не ослабевает, но развитие начального импульса требует огромной работы, а кора уже не та, и есть уже неизбежные, как зрелость, склеротические явления. Я бы сказал, что само творчество не страдает, по-прежнему легко проектировать и фантазировать, но осуществление требует уже значительной решимости. Нет стимула, нет того молодого тщеславия, когда только крикнуть бы о себе любой ценой… Словом, как в архитектуре: все легче начертить проект — есть знания, навык, — но тесать камни уже трудно.</p><p class="p1">— Да и не это, — отмахнулся Шелестов, взглядом спрашивая, налить ли, и натыкаясь на вежливый отказ гостя. — А просто, понимаете, с героями этими я десять лет прожил. Ну и не могу я уже решить за них, чего они хотят. Сами они мне подсказывают. А я что же? Нагнуть и заставить? Нет, я подожду, покуда созреют…</p><p class="p1">— И потом, — сказал Дехтерев, — сейчас и момент довольно переломный. Я не то что думаю, будто вы зависите от момента, а просто, когда зависло все так, очень трудны бывают художественные решения.</p><p class="p1">— И куда завернет, вы думаете? — быстро спросил Шелестов.</p><p class="p1">— Я думаю, никуда не завернет, — уверенно ответил Дехтерев. — Так и пойдет.</p><p class="p1">В кабинете Шелестова хозяин закурил «Казбек», а гость любезно рассматривал и похваливал библиотеку.</p><p class="p1">— Ну так что же, Всеволод Дмитрич, — сказал Шелестов, не желая тянуть. — Слухаю ваш срочный разговор, дюже любопытно.</p><p class="p1">«Ох, не торопился бы ты», — подумал Дехтерев, но после почти десятилетних наблюдений сомнений у него не было. Да и роман Шелестову вполголовы не кончить, ясно же. А роман хорош, жалко будет, если…</p><p class="p1">— Для начала ответьте мне на один вопрос, Кирилл Александрович. Вы в самом деле чувствуете некие трудности с вашей книгой в последнее время?</p><p class="p1">— Писать, оно, знаете, никогда не легко, — удивительно спокойно отвечал Шелестов. Ни тени раздражения, ни малейшей настороженности. — Торопятся пусть кто помоложе.</p><p class="p1">— Я хочу вам сказать нечто существенное, — решился Дехтерев. Нечто важное о вас. Но сначала подумайте, действительно ли вы хотите это узнать.</p><p class="p1">«Родители», — понял Шелестов. Вот оно. Но вслух сказал:</p><p class="p1">— У меня, Всеволод Дмитрич, есть в четвертом томе, еще вы не читали, один казак, так он все носится с супризом. Вбегает: «Суприз!» А никакого суприза нет. Его так и кличут Супризом, не в обиду вам, конечно.</p><p class="p1">— Ну что же, — сказал Дехтерев и сделал руками свой любимый жест, как бы их умывая, даром что хирургией сроду не занимался. — <em>Станция Ольховая, дистанция херовая. Гора и вишня, стремительное развертывание. Отсидеться думал, гнида? Четыре, восемь, трубка пять. Цветы, вот оно. Человек рожден, чтобы растить цветы. Они его закопали, совсем закопали, ничего не осталось. Без почки жить можно, без почвы сложно. Земля молчит, камень поет. Когда отрывает ногу, что же тут интересного. Не кровь страшна, вонь страшна. Из черного логова выходит осторожный, осторожный, очень осторожный медленный зверь. Один такой зверь. Где четырнадцать, там и одиннадцать. Вам следовало бы, может быть, сначала зарезать, а потом сжечь. Человечина всем хороша, только несъедобна. И откуда столько грязи, все разговоры такие грязные. Мучительная соль подходит под горло. Наши слова расставлены не в том порядке. Но когда они будут расставлены в том порядке, мы заговорим. Мучительнее всего окрошка. На станции Ракитной крошили, крошили, искрошили всех. Цветы и окрошка. Аравийское месиво, крошево с галицийских кровавых полей.</em></p><p class="p1">Он замер, вглядываясь в белое лицо Шелестова. Тот сидел с закрытыми глазами, уронив руки, и Дехтерев испугася уже, что удар оказался непереносим, но писатель внезапно открыл глаза и ясным взором ответил на тревожный, незаданный вопрос врача.</p><p class="p1">— Что же, — сказал он. — Чрезвычайно вам благодарен.</p><p class="p1">«Ведь может и убить», — подумал Дехтерев.</p><p class="p1">— Что же, ведь я, в сущности, знал, — продолжал Шелестов медленно, словно состарившись лет на шесть. — В последние месяцы осознание уже было почти полным, мозг, вероятно, подтягивал резервы. Сейчас мне кажется, что я ни на секунду не переставал помнить.</p><p class="p1">— Как вас зовут? — тихо, почти благоговейно спросил Дехтерев.</p><p class="p1">— Это совершенно неважно. Ну, скажем, Трубин. Я не собираюсь менять фамилию.</p><p class="p1">— Вы не чувствуете боли, головокружения? Скажите, у меня с собой медикаменты…</p><p class="p1">— Нет, ничего такого. С тою разницей, что вам, допустим, было тридцать восемь лет, а стало сорок четыре. Ведь он был такой молодой, этот парень, так жаден. Такая отличная тужурка, я, как тужурку, носил его.</p><p class="p1">— Но вы помнили?</p><p class="p1">— Сейчас уже мне кажется, что да. Это, знаете, как с картинкой, когда надо что-то там составить из линий, и уже не веришь, что могло быть иначе. Но в первые лет пять, конечно, был только Шелестов. Я впервые заподозрил, что, может быть, в жизни случаются неосознанные периоды. Когда ко мне вдруг пришла описанная мной женщина. Этот дурак высоко себя ценил, но все-таки не настолько, чтобы думать, будто Творец подражает ему. Она повторяла бабу из романа полностью, до физических примет. Вот тогда он — я — тогда мы впервые подумали, что я знал ее когда-то, но до последнего времени он объяснял это темной памятью. Темная материя жизни — ужасная глупость. Мне рассказал это, как его, Нильсен. Он это выдумал, наверное, чтобы не помнить, как доносил. Вы читали, ему орден дали?</p><p class="p1">Дехтерев не понял, о чем речь, но на всякий случай кивнул.</p><p class="p1">— Что же, — сказал Шелестов, — этому надо было случиться. Не спрашиваю, как именно…</p><p class="p1">— Это я как раз могу объяснить, — заторопился Дехтерев. — Это случай из моей практики. Очень давно, вы не поверите, почти тридцать лет назад. Я впервые тогда заметил, что эта новая личность, вырастающая как бы поверх прежней, как рукопись пишут поверх рукописи, — что она запирает себя на кодовые замки, и эти слова легко опознаются. Есть система фраз, на которые она реагирует мучительно. Это легко видеть из вашего романа, но я наблюдал вас и в другое время. Я хорошо видел, на каких опорных точках вы теряли самообладание. И поверьте, я никогда не пришел бы к вам. Я никогда не решился бы делать эксперимент, если бы не чувствовал, что ваш дар иссякает, что нельзя писать с половиной головы. А я хотел, чтобы единственная книга нашего времени была все-таки дописана, это мой корыстный читательский интерес.</p><p class="p1">— Книга? — презрительно спросил Шелестов. — Какая книга?</p><p class="p1">Дехтереву стало холодно, он почувствовал слабость.</p><p class="p1">— Книга была про то, как молодой дурак боролся с дураком постарше, про то, как в кентавре ссорились конское и человеческое. Какая же теперь книга? — продолжал Шелестов. — Я, честно признаюсь, ждал чего-то такого от вашего визита. Я думал, что вы, врач, поможете мне столкнуть это дело с мертвой точки. Но теперь, когда я здоров, — усмехнулся он, — когда мне все о себе известно… Камень поет, это вы точно. Крым, пятнадцатый год. В камне есть щель, и в ней поет ветер, но зачем же петь монолиту?</p><p class="p1">— Это неправда, вы просто не хотите работать, — забормотал Дехтерев. — Я лечил молодую художницу, она после излечения рисовала лучше прежнего. У нее сейчас выставка в Брюсселе. Она уехала с матерью, сейчас замужем…</p><p class="p1">Дехтерев лепетал эти никому не нужные оправдания, отлично понимая, что дело не в них, что художница может быть устроена иначе, что уникальный механизм, который он думал спасти, сейчас необратимо разрушен, ибо писал не Шелестов, не Трубин, но их смертельная борьба; и психиатр думал об этом эффекте, но не верил в него, как не верил до конца и в то, что сработает его заклинание, составленное за три месяца непрерывного труда и десять лет пристрастных наблюдений. О ключевом слове, раскрепощающем тайную личность, он не сказал бы никому — один раз поделился намеком в письме британскому коллеге, и все, уже и фильмы снимают о том, как можно пословицей, детской загадкой, кодовым числом расколдовать память; но поиск опорных точек был его догадкой, ее он не раскрывал никому. Не было материала, полная амнезия при сохранении интеллекта — не такая частая вещь.</p><p class="p1">— А вот вопрос, — медленно произнес Шелестов, — вы к себе не пробовали применить?</p><p class="p1">После воссоединения он стал так умен, словно у него была не одна, а две головы. «Любопытный эффект, и значит, творить он сможет по-прежнему», — успокоил себя Дехтерев.</p><p class="p1">— Нет, нужно ведь сначала, чтобы появилось это второе я. А я революцию прожил тихо, и никакие девочки меня эликсиром не угощали.</p><p class="p1">— Каким эликсиром?</p><p class="p1">— Это бред одного пациента, не обращайте внимания.</p><p class="p1">Он лукавил. Он никого не хотел из себя выпускать, а приступы ярости, случавшиеся у него при чтении оппонентов, ничего хорошего не сулили.</p><p class="p1">— И это так со всяким? — спросил Шелестов, глядя на Дехтерева в упор словно выцветшими глазами.</p><p class="p1">— Видите ли, — осторожно сказал Шелестов, — один сумасшедший… глупейшая, механическая теория. Два полушария, две души. Я в это не верю, конечно. Но в то, что человек может быть бинарной системой, если угодно, биквадратным уравнением… Все эти пробуждения с чувством счастья, когда ничто к тому не подталкивает, эти странные перемены настроений, вспышки грусти… И особенно занятны все чаще описываемые случаи неожиданно открывающихся способностей — посмотрите, что делалось после семнадцатого года. Я столько раз наблюдал — нельзя, невозможно было предположить в этом человеке его же прежнего. А потом опять словно ничего не было.</p><p class="p1">— Я видел, — кивнул Шелестов. — Много раз видел. Муразова такая была, бухгалтер был такой…</p><p class="p1">— Кто? — переспросил Дехтерев.</p><p class="p1">— Неважно, их уже нет, скорее всего… Ты снимешь с плеч губами кружева… Молодому командиру подвели коня гнедого. Режь, товарищ, ешь, товарищ. Вот с ней бы провести ваш сеанс. Но теперь не проведешь.</p><p class="p1">— Меня очень интересует, простите, что я так к вам, — заговорил Дехтерев после минуты молчания, которой они словно почтили исчезнувшую Муразову, — но мне надо понять: вы испытываете счастье, ну, хоть радость от этого воссоединения? Ведь это встреча с человеком, который был вам довольно дорог, как бы, знаете, души смотрят с высоты на ими брошенное…</p><p class="p1">— Счастье? — спросил Шелестов так, что Дехтереву стало стыдно и мерзко. — Да Трубин, может, терпеть не мог Трубина. Он мешал писать, знал и думал слишком много, ни одного свежего слова. Мертвое, пресыщенное поколение. Если бы Трубина не контузило, он не написал бы больше ни слова. Я встретил его, как смертельно надоевшего гостя, который все ломился в дверь, а вы ему открыли. Я не знаю, кого попросить теперь, чтобы меня как следует ударили по голове… Впрочем, не за горами война, и там это счастье может повториться. Вас же я в любом случае благодарю. Вы убрали камень у меня с дороги, я могу теперь плюнуть на Панкрата с его сучкой… есть одно дело, которое я обязан сделать, и слава богу, что вы напомнили. Это болело сильней всего, но теперь придется.</p><p class="p1">Он поднялся и с хрустом потянулся, долго, словно впервые ощутив собственное тело после долгого паралича, переступал с ноги на ногу и сгибал пальцы.</p><p class="p1">— Манюня! — крикнул он прежним хозяйским голосом. — Наверни-ка с собой пирожков товарищу доктору, этих, сиговых. Заработал, худого не скажу, заработал.</p></span>
