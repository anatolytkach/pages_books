<p class="p">17 ноября 1928, Ленинград</p>
</div><p class="p1">Опоязовца Стрельникова тревожила история про «Пороги». Давно уже он не интересовался ни одной из предложенных задач — ни соотношением глаголов и существительных в речах Ленина, ни ритмами в детской поэзии, а тут было над чем посидеть ночь, как в блаженном двадцать первом, когда, только что вернувшись с фронта, он вдруг ррраз — и открыл с голоду семантическое поле четырехстопного хорея на материале песни «Как родная меня мать».</p><p class="p1">Прелесть задачи состояла в том, что роман, да, явно писали две руки, но как бы левая и правая, принадлежащие одному человеку, владевшему ими с равной свободой. Вспоминался Стрельникову так называемый манускрипт Мерлина. Им был одержим Калиновский, читавший Стрельникову лингвистику в шестнадцатом году: манускрипт нашелся на распродаже курьезов монастырской библиотеки, хранитель считал его подделкой, с которой странствовал безвестный лекарь, чтобы заморочить головы богатым горожанам. Текст был писан неизвестной азбукой, сопровождался загадочными картинками (девы в садах) и расшифровке не поддавался, но Калиновский его купил и подверг анализу по собственной методе. Оказался язык, и не один, а два, с полным соответствием открытому лично Калиновским закону распределения: явно осмысленный текст непонятно о чем, в первой части на одном наречии, во второй — явно на другом, тоже непонятном, но еще более иностранном.</p><p class="p1">Мазуров тогда сказал: другая планета? Клингенмайер предположил, что текст вообще не о понятиях и написан не словами, а шифрует именно соотношения, т. е. при подстановке любых слов получается осмысленно. Это уж так было мудрено, что никто не понимал, но Клингенмайер успешно подставлял, и всегда у него получалось осмысленно — якобы Мерлин открыл алхимические соотношения между всеми вещами, и если ими пользоваться, то можно вести себя правильно. Манускрипт оставался не прочитан, — по крайней мере, ни одна версия не была полностью обнародована, — но Клингенмайер, судя по его удивительной биографии, вел себя правильно. Зато был открыт и обнародован закон Калиновского — о статистическом распределении сходных оборотов в тексте, — а вслед за ним и десяток правил, которые Стрельников запомнил с тех самых пор, да не к чему было приложить. Теперь лежало перед ним нечто полюбопытней, чем манускрипт Мерлина, — с той разницей, что текст был понятен, даже слишком; непонятно было, откуда он взялся и как действовал. Потому что ведь забирало, он с радостью это почувствовал (во всяком филологе первичен вкус, не верьте тому, кто скажет, будто вкус антинаучен): действовало с такой силой именно потому, что написано было с двух точек, как с двух точек снят штурм в «Гражданине победителе», — но у камеры нет своих пристрастий, как же Шелестов в себе так соединил? Ответ о двойном авторе разрешал все противоречия, но вот же штука…</p><p class="p1">Любимый час, любимый вид: ночь, половина первого, высшая точка его интеллектуальных возможностей — Садовников рассчитал им всем биоритмы. Лампа, яблоко, слои сизого дыма, сырые крыши в окне. Он применил третье правило Калиновского — статистика конструкций «существительное плюс глагол в функции грамматической основы»: во фрагменте А насчитал 283, во фрагменте Б — 295, в пределах погрешности, а в «Мареве» — 300 на 60 страниц, то есть процент сошелся до десятых. Пересчитал. Для таких вещей хорошо держать лаборанта, но какой ему лаборант? — вся молодежь обслуживала патриарха Долбенина с его фольклором; кому нужен фольклор, что в нем? Ладно же, что нам скажет пятое правило — существительное с прилагательным в препозитивной позиции (на всякий случай он посчитал потом постпозитив — Шелестов, будь он А или Б, этим наследием символистов почти не пользовался. Луг зеленый, сердце горящее… мои одиннадцать лет, мой Псков, «Весы» в отцовской приемной). Сходилось. Он замерил и среднюю длину слов в предложении — положим, фрагмент Б, как положено сводке боевых действий, был и впрямь динамичней, 8 против 12 в любовной главе, — но те же цепочки однородных глаголов, независимо от того, Панкрат ли уестествлял свою Анфису, семьдесят вторая кавдивизия — восставших вешенцев… Было около пяти и сна ни в одном глазу, когда он взялся за Гулина.</p><p class="p1">Гулин разочаровал его еще в первом чтении — типичный народолюбец, писал, как человек с бесконечным запасом времени — вяло, многоречиво, мутно. Разумеется, ничего общего с бешеным водоворотом первых двух частей у Шелестова, с двумя стремительными воронками — любовной и революционной; войну Гулин писать вообще не умел — видно было, что ни дня не пробыл в строю, в казачестве любил только патриархальность и зверство, особенно подробно описывал еду, дела половые у него выходили так сахарно и скучно, что чувствовалось желание скорей вернуться к еде; вообще проза была сырая, никакого сходства с глаголистой, поджарой, жарко дышащей скороговоркой Шелестова, всегда словно шепчущего бабе в ухо, соглашайся, мол.</p><p class="p1">Для очистки совести прогнал его через третий и пятый подсчеты — ничего, конечно, общего, сам ритм фразы другой. Если «Пороги» и писала чья-то вторая рука, принадлежала она молодому, горячему и не испорченному опытом — тому, кто должен бы полностью дублировать Шелестова, с той поправкой, что противоположных взглядов. Что могло все это значить? Где, в какой миг происходил в голове у автора этот полный разворот — никак не сказывавшийся на силе и плотности слога? Сон начинал уже обарывать Стрельникова, он всегда в седьмом часу дремотно смаривался (привычка думать в темпе и манере разбираемого текста осталась у него с детства, он и теперь разговаривал с собой на языке «Порогов») — но прежде чем закемарить, исключительно лишь для очистки совести, решился на последнюю пробу. Правду сказать, десятый закон учитывал закономерность третьестепенную и не нашедшую покамест применения: ясно было, что и длина фразы, и количество глаголов на абзац — писательские константы, обозначающие скорость мышления, энергию, а число инверсий говорило о склонности к перверсии, но к чему нужен десятый закон — сам Калиновский знал приблизительно, а теперь уж не спросишь. Но Стрельников, при всем быстроумии, был лингвист добросовестный, тем и славился, — и еще час убил на то, чтобы прогнать оба фрагмента по десятому параметру.</p><p class="p1">Когда досчитал, сон отлетел от него мгновенно: так шпион машинально раскрывает шифровку, выписывает слова, пользуясь железнодорожным справочником или мало ли, — а потом читает получившееся, и волосы встают дыбом. Десятый критерий Калиновского давал разброс полный, полярный, — не простое несовпадение, а законченную противоположность, найти которую так же трудно, как идеальную возлюбленную. Вопреки всем прежним пунктам, результат десятой проверки вопил: не он, не он! Фрагменты А и Б писали не разные, но взаимоисключающие люди, стивенсоновские Джекил и Хайд. Стрельников и пересчитывать не стал, ибо о чем-то таком догадывался с самого начала.</p><p class="p1">Просчитал Гулина — Гулин и тот оказался больше похож на автора А, чем автор Б. Но Гулин — это уж было так, для последней честности. Склизкое питерское утро застало Стрельникова над листком отчета: он не знал, как об этом написать. Сидел серый, с отросшей за ночь колкой щетиной, тер лоб и щеки и вертел в голове одну фамилию: Дехтерев, с этим надо идти к Дехтереву, но что ж я ему скажу?</p></span>
