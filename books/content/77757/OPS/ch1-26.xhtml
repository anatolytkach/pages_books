<span id="id25"><div class="title1">
<p class="p">27 мая 1965, Москва</p>
</div><p class="p1">Сказать, чтобы Шелестов вовсе не давал интервью, неверно. Их не печатали, да и не записывали, потому что какой же прок писать, визировать и пробивать по начальству текст, который заведомо не пройдет никуда, даже и в «Грани»? Какие же «Грани» напечатали бы то, что он сказал Олегу Гарькавому, дерзкому юному провинциалу, который пришел к нему от «Недели», без рекомендаций, можно сказать, с улицы? Гарькавому было двадцать шесть. После журфака он сразу пришел в «Неделю», где писал всякую стыдную мелочовку, типа пингвин Гумбольдта в Московском зоопарке высидел яйцо или милиционер спас лося, — но после известных событий случились перетасовки, и Гарькавый оказался на первых ролях. Он писал теперь про культуру, хватит уже про лося. Такие, как он, везде теперь писали про культуру.</p><p class="p1">И была у него мечта-задумка — сделать беседу с классиком Шелестовым: ни у кого не выходило, а у него выйдет. Он подчитал «Пороги», проглядел «Охотничью сумку», полистал в подшивках юбилейные номера трехлетней давности, — нигде ничего, юбиляр молча принимал почести и поглядывал в фотокамеры безумным глазком гения, — и понял: это и был тот гвоздь, которого все от него ждали. Заявиться, заявить себя! Он писал уже и о балете (в котором понимал не больше, чем в пингвинах Гумбольдта), и расспрашивал писателя Бороздина про поездку в Индию (ему там запомнился человек, водивший по дорогам медведя, он и стих написал про человека с медведем, рифма «едем» — «медведем» встречалась там трижды), но тут было настоящее, такое, после чего уже имя и все дела. И он с этим пошел к редактору отдела культуры, страшно культурному человеку, завсегдатаю Московского кинофестиваля и знакомому самого Рихтера (он освещал однажды гастрольную поездку Рихтера в Харьков — игру на раздолбанном рояле в клубе тракторного завода, сравнимую с подвигом Паганини при дворе княгини Элизы).</p><p class="p1">Он думал уже о мемуарах: пришел к начальнику, тот посмотрел недоверчиво, но скепсис был сломлен и т. д. Редактор отдела был крестьянского происхождения, с отчеством Саввич, и послал Гарькавого так, что в мемуарах не отразишь. Гарькавый на собственный страх и риск заглянул в справочник Союза, обнаружил телефон Шелестова и запросто, внаглую позвонил, уверенный, конечно, что его перенаправят к секретарю или в крайнем случае к родственникам. Ему представлялось, что жена у Шелестова в секретарях, — сам мечтал о такой писательской жене.</p><p class="p1">— Слухаю, — сказал уже после третьего гудка глуховатый голос (это Гарькавый так подумал о нем. На самом деле голос был самый обыкновенный, немного сиплый от постоянного курения).</p><p class="p1">— Кирилл Александрович, — затараторил Гарькавый, — это корреспондент «Известий» (так было солидней, не от приложения, а от матки), очень хотелось бы взять интервью о творческих планах, в любое удобное…</p><p class="p1">— А чего ж, — сказал Шелестов. — Приходите.</p><p class="p1">В эту минуту Гарькавый впервые почувствовал, что «прослабило от радости» — не такая уж и гипербола.</p><p class="p1">— То есть как? — спросил он. — То есть сейчас?</p><p class="p1">— А вы заняты? — любезно поинтересовался Шелестов.</p><p class="p1">— Нет, что вы, я… — залепетал Гарькавый. — Я никогда, ничем… Я сейчас же…</p><p class="p1">— Адрес знаете?</p><p class="p1">— Ну как же! — воскликнул Гарькавый, как если бы адрес Шелестова был известен всякому читателю. Впрочем, многие действительно знали — высотное здание на Котельнической, к нему туда однажды Косыгин приезжал, был репортаж.</p><p class="p1">— Ну валяйте, — сказал Шелестов с неопределенной интонацией — то ли радушной, то ли равнодушной. Да велика ли, в общем, разница у русского человека. Не убил — скажи спасибо, а по доброте или сыт был, какая разница.</p><p class="p1">«А может, он пьян, — подумал Гарькавый. — Может, он в запое, и ему не с кем выпить». Говорили, что пьет страшно. Что ж, по пьяни больше выболтает. Хотя сама мысль о том, чтобы пить с Шелестовым, всемирным классиком и лауреатом всего, что можно, — не столько его бодрила, сколько пугала. Он знал, что пьяные классики потом предпочитают не видеть тех, с которыми пили. Ему про это рассказывали, да и по себе он, будущий классик, мог вообразить.</p><p class="p1">Но стал мне самому противен мой вопрос, как говорил классик, и с прежней храбростью схватился я за нос, — то есть он прихватил блокнот, но тут задумался. Достаточно ли будет блокнота, пухлого, так сказать, от записей? Не следует ли ему озаботиться так называемым «репортером», то есть радийным таким магнитофоном с удочкой, который, как великую ценность, давали лишь на самые главные интервью? В редакции таких не было, но у Гарькавого работал однокурсник в детской редакции радио; Гарькавый ему позвонил и под залог паспорта выпросил «репортер» на три часа. Он намекнул, что часть беседы — единственное интервью Шелестова за многие годы! — сможет отдать на радио, но это, старик, если получится. Как же ты его уболтал? Да очень просто. Он очень прост, старик, ему просто не с кем поговорить. И он помчался на Качалова, в дом радио, а оттуда на метро по прямой ветке с «Баррикадной» на «Таганскую».</p><p class="p1">Был жаркий, счастливый май, полный надежд, не только карьерных и не только у Гарькавого. Казалось, кончился бред, начнется нормальная жизнь без всякого этого волюнтаризьма. Поначалу всегда так кажется, робкие домашние люди радуются, потом их, конечно, начинает смущать запах — но поздно, приехали, поприветствовали, посмеялись фильму «Тридцать три», теперь чего же ты хочешь? Летал уже пух, и особенная умиротворенность царила в природе, как у очень молодой матери, серой весны-пэтэушницы, которая вдруг нечеловеческим усилием родила май и сразу расцвела. Кто бы разглядел в этой без пяти минут мадонне, хоть и сельской, вчерашнюю замурзанную сироту-отроковицу, которую по пьяни изнасиловал после танцев местный фулюган Скворцов? Он сел теперь, местный фулюган, на полтора года, а когда вернется — не узнает эту расцветшую, молодую, независимую, на которую самые серьезные виды имеет уже целый инженер. Она сидит в подъезде нового дома, где у нее только что получена от фабрики квартира. Она на большой фабрике повариха. По ней, по белой груди, по рукам, по чистому лбу скользит лиственная тень. И в женщине этой какой-то новый покой. Она потом и инженера выгонит, потому что перерастет, большая начальница станет, суровая, несчастная, отвратительная. Но сейчас у нее май месяц.</p><p class="p1">В высотке дежурила, как положено, лифтерша, и Гарькавый думал ее удивить, сказавши небрежно: «Корреспондент, к Шелестову». Но их, видимо, к Шелестову на седьмой этаж ездило достаточно. Что Шелестов! там на восьмом укротительница тигров Бугримова жила. Дверь отворил сам Шелестов, он был один. На нем, мгновенно подметил зорким глазком Гарькавый, были тренировочные штаны и зеленая ковбойка. Спиртным вроде не пахло.</p><p class="p1">— Проходите, — сказал классик и провел корреспондента в скромный кабинет. — Вон у вас дура какая, — и кивком показал на репортер, действительно громоздкий, но Гарькавому, юному, удачливому, он казался легче тополиного пуха. Он подумывал уже о книге бесед с классиком: никто не решался, а он решился, только и надо — чуть побольше провинциальной храбрости, Москва зажралась.</p><p class="p1">— Я, может быть, странную вещь скажу, — начал Гарькавый с подобострастной улыбкой. — Но мне «Охотничья сумка» кажется иногда лучше, важней «Порогов». То есть лично мне важней. Она мне ближе. Я в детстве с отцом много на Валдае… реки там, на веслах… И мне кажется…</p><p class="p1">— Этта хорошо, — сказал Шелестов, глядя на обоих репортеров, железного и потного, с легкой безуминкой. — Этта мы похвалили старого идиота. Никто не хвалит его за эту дрянь, исписалси. А мы похвалили. И он к нам теперь проникнетца. Очень, очень прозорливо.</p><p class="p1">Гарькавому стало кисло.</p><p class="p1">— Я действительно, — сказал он, прижав зачем-то руку к груди.</p><p class="p1">— Ну а як же, — сказал Шелестов. — Разумеется.</p><p class="p1">— И все-таки, как вы понимаете, — начал Гарькавый, — я не могу не спросить: есть ли замысел нового, так сказать, эпического романа?.. потому что вы же понимаете, что после «Порогов» весь мир продолжает ждать…</p><p class="p1">— Эпический роман — хорошо, — процедил Шелестов. — Вы, может, чаю хотите?</p><p class="p1">Он был похож на свои фотографии, только лицо оказалось подвижнее, а сетка морщин — гуще. Обычный он был старичок, готовый, впрочем, на мелкие пакости, вечный дедок-рыбак, сперва вызывающий на снисхождение, а потом жестоко и быстро наказывающий за него.</p><p class="p1">— Не откажусь, — сказал Гарькавый, уже уверившийся, что наглость берет города.</p><p class="p1">— Чай… да… — повторил Шелестов. — Ну подождите, я поставлю.</p><p class="p1">Он ушел в кухню, загремел там чайником, чиркнул спичкой и вернулся.</p><p class="p1">— Да, эпический роман, — сказал он. Гарькавый включил запись. — Эпический роман «Залупа» в трех томах, про сибирскую жизнь. Ясно вижу синие эти тома.</p><p class="p1">Гарькавый ничему уже не удивлялся, но все-таки вздрогнул.</p><p class="p1">— Заимка «Медвежья залупа» терялась в глухой саянской тайге, — поглаживая усы, продолжал Шелестов. — Густой быт. Три революции прокатились сквозь нее. Какой-нибудь купец там, скупщик меха. Или золотопромышленник. Фамилия будет Вяков, можно Крюкин. Мясоватый, с соком, с дегтярной кровью, апоплексического складу человек, все у него стоят раком. Большая семья Гугнивых. Папаша старовер, мамаша забита по маковку, трое сыновей один другого дубоватей. Один по партейной части, другой по женской, третий дурак. Потом там золото нашли. Что смотришь, теля? Ну или нефть. Хороший роман, на государыню потянет. Государыня наша, гусыня.</p><p class="p1">Гарькавый не знал, что такое «государыня», и подумал, что тут темный намек на Екатерину. Она любила фаворитов, могутных мужиков, вроде вот Гугнивых.</p><p class="p1">— Теперь клубника, — раздумчиво (это Гарькавый так думал, остатком сознания, потому что мозг его взрывался) говорил Шелестов, глядя в сине-зеленое окно. — Без клубники ноне ничто не делается. Там есть баба, звать на А. Они после Анфисы все на А. Она ядреная такая баба, повышенной плотности. Имеется у нее поступь. Ее в десятилетнем возрасте снасильничал купец Вяков. Она с тех пор не верит в мужскую любовь, все у нее кобеля. Но тут пронзает ее буквально до печени чистое чувство, и она купается в росе, бегает нагишом по разнотравью, имея в виду очиститься. Для очищенья хорошо корень дикого ревеня.</p><p class="p1">Гарькавый ничего уже не понимал.</p><p class="p1">— Обратно же ты можешь спросить, молодой человек, зачем залупа. А? Ты можешь это спросить? Отвечаю: я вижу в этом названии тугость. Тугость, очень тут присущую лучшим образцам. Весь век прошел под знаком русской залупы. Бескрайняя плоть. Что-то чайник, а?</p><p class="p1">Чайник ответно засвистал. Сама неживая природа была послушна гению.</p><p class="empty-line"/><p class="p1">Гарькавый не помнил, как откланялся и, пятясь, удалился. Но запись он сохранил, не показав, естественно, никому. Совет Шелестова пригодился ему лишь через пять лет, когда, набравшись храбрости, он засел за трехтомную сибирскую эпопею «Судьба твоя». Апоплексического купца у него звали Зыков.</p><p class="p1">Шелестов дожил только до выхода первого тома, но читать его, верно, уже не стал: был он болен, почти не вставал, в семьдесят пятом тихо умер и был увековечен в названии районного центра на Дону.</p></span>
