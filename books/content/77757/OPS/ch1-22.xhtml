<span id="id21"><div class="title1">
<p class="p">15 апреля 1938, Ленинград</p>
</div><p class="p1">После выхода из лечебницы Логинов жил в комнате на Шестой Советской, которую снимал у толстой, слезливой, всего боящейся старухи. Он работал бухгалтером, в Капоэр путешествовал регулярно и всегда непредсказуемо. Иногда его окружали в подворотне, чтобы избить и отнять деньги, и он думал, что вот сейчас улетит в Капоэр, и побьют не его, а того, кто останется. Но били его, и весьма чувствительно. А иногда он ложился в постели с Риточкой, хорошей девочкой, любившей его по-настоящему, — денег-то у него не было, какой прок, одни сказки, — и только обнимет, как вдруг улетит. И Риточка назавтра, встречаясь на службе, смотрит на него нехорошо. Такая непредсказуемая была жизнь, но он привык, смирился, находил даже удовольствие.</p><p class="p1">В Капоэре как-то не могло у него определиться: одни его очень уважали, другие любили, третьи люто ненавидели непонятно за что. Он что-то все перевозил, переправлял. Но никогда не знал, удачно ли: словно за секунду до конца трудной операции срабатывал переключатель, и он не знал, хороший ли он перевозчик. Бухгалтер он был хороший.</p><p class="p1">Однажды в трамвае увидел он человека, которого должен был назавтра перевести с одного конца города на другой, прячась от патрулей, отсиживаясь под мостами — черт-те сколько мостов было в Капоэре! — но сейчас этот человек был в Ленинграде и подозрительно на него смотрел, словно напоминая: ты должен меня перевести! Логинов вышел вслед за ним и долго шел следом, не решаясь подойти.</p><p class="p1">— Вам что, собственно? — спросил человек неприятно. Он был лысый, густобровый, но сравнительно молодой, вероятно, кавказец.</p><p class="p1">— Мы с вами виделись, — тихо, как и подобает связному, сказал Логинов. — Мы в Капоэре с вами виделись, помните?</p><p class="p1">— КПР? — переспросил человек. — Какой КПР?</p><p class="p1">— Я вас перевожу завтра, — напомнил Логинов. — Завтра утром, если только вовремя там окажусь.</p><p class="p1">— Слушайте, — явно уже с кавказским акцентом произнес незнакомец. — Если вы пианы, так и не приставайте к людям, так?</p><p class="p1">Капоэрцы тут ничего не помнили, и Логинов не знал, как их разбудить.</p><p class="empty-line"/><p class="p1">А однажды, в апреле, к нему вдруг пришел Фрязин, человек, много для него значивший когда-то.</p><p class="p1">— Я умоляю вас, — сказал шепотом Фрязин. Слушать его было страшно. Он был явно безумен и все боялся, что их подслушивают. — Я умоляю вас, простите меня. Выпейте, вот, я принес.</p><p class="p1">Он вынул из кармана пузырек с микстурой.</p><p class="p1">— Вы помните, тогда, — шептал Фрязин. — Вы тогда выпили у меня микстуры, ошибкой. Дочка вам дала. Она уже наказана, муж бросил, нет ей ни в чем счастья. Но я знаю теперь микстуру обратного действия. Я вывел. Я еле вас нашел, после больницы не дают адрес, а вы с прежней квартиры съехали.</p><p class="p1">— Мне там не по карману теперь, — объяснил Логинов.</p><p class="p1">— Ну хорошо, вы поправитесь, вам теперь все будет по карману. Я вам клянусь. Выпейте, вы будете здоровы. Вы не знаете, в каком аду я живу. У меня там это второе, вот это второе полушарие, этот второй мир… вы представить себе не можете. Начиналось очень хорошо, а сейчас все время пытки. Я там разбогател, потом разорился. Больше не могу, знаю, что выпью. Гори оно все огнем.</p><p class="p1">— А в каком же состоянии мне его выпить? — хитро спросил Логинов. — В состоянии Капоэра или здесь?</p><p class="p1">— Какого Капоэра? — не понял Фрязин.</p><p class="p1">— Это я там, — пояснил Логинов дружелюбно.</p><p class="p1">— Ну так в каком захотите! В каком вам хорошо, в том и пейте! Держите ампулу во рту, а когда захотите, раскусите! Я сделаю вам ампулу, дам, это нетрудно.</p><p class="p1">— Нет уж, — насмешливо сказал Логинов. — Я знаю теперь, что жизнь только в одном мире не достойна человека. Кто не живет в двух мирах, тот — тупица, и надо бы вам вашу микстуру — ту, первую, — влить в ленинградский водопровод.</p><p class="p1">— Ах, вы ничего не знаете! — крикнул Фрязин. — Жить в двух мирах — это значит не жить ни в одном, про Джекила и Хайда все было верно, он не угадал только самого главного. Это не добро и зло, вообще другое разделение. Я не понимаю, кто я здесь и там. Я знаю только, что, пока я здесь, там мое тело без меня совершает идиотские и часто ужасные вещи…</p><p class="p1">— Но я не готов выбирать, — сказал Логинов. — Я не готов оставить здесь или там половину своей головы. В ком нет двоих, в том нет ни одного полного вот бы я как вас поправил…</p><p class="p1">— Не понимает, никто не понимает! — прошептал Фрязин и убежал. А Логинов уставился в апрельское окно, где медлительно обозначалась первая звезда, и словно в благодарность за верность Капоэру было ему почти сразу счастливейшее видение. Он сидел в степи, обрывавшейся вдруг в море, над ним парила огромная, смутных очертаний птица, а рядом лежала девочка-дикарка из степного племени, маленькая, лет пятнадцати, с шершавыми ладонями и пыльными смуглыми ногами. Она любила его, а назавтра, понял он, забудет, и это так хорошо, когда ничто не окончательно. Степь вся переливалась жесткой, сухой травой, меняющей цвет под ветром — с голубого на белесый.</p><p class="p1">— Э, я понял, кажется, — сказал он вдруг, чтобы не спрашивать девочку, как ее зовут, а то еще обидится. На ней было короткое черное платье, но он чувствовал, что полчаса назад на ней не было никакого платья, и были они с ней друг другом довольны.</p><p class="p1">— Что понял? — спросила она без всякой сонливости — жители степей от любви не уставали.</p><p class="p1">— Понял, почему я в Капоэре так живу. Вокруг меня с детства все только кончается. А здесь ничего не кончается, все без конца, без начала. Какое счастье.</p><p class="p1">Вряд ли она поняла, но не переспросила.</p><p class="p1">— А зачем, чтобы кончалось? — спросила она через минуту. — Надо, чтобы обрывалось. Пришел-ушел. Не прощаться, ничего. Я вот нигде не дома, и хорошо.</p><p class="p1">— Ну, вы другие. У вас степи.</p><p class="p1">Ему почему-то никуда не надо было торопиться. Накануне он должен был переводить странного парня с огромной гитарой за плечами и, видимо, перевел. Птица снизилась, покружила, наблюдая, и снова ушла вверх. Она была как чайка, но лучше.</p><p class="p1">— А что степи? Кто тебе в городе так жить мешает?</p><p class="p1">«А и правда, — подумал он. — Сколько ответственности я себе придумал, сколько обязанностей, никому не нужных и мне самому смешных. Жили бы все как эти степные. Но зачем, собственно, я у них оказался?»</p><p class="p1">Она словно услышала его мысли.</p><p class="p1">— Ты вчера еще когда пришел, отец тебя сразу убить хотел, — призналась она доверительно. — Но мы с матерью знаем, откуда ты. Тебя в порту видели, ты колесом ходил. Говорили, предатель, но я не поверила. Если ты покупатель, какой же ты предатель?</p><p class="p1">— А я покупатель? — уточнил он осторожно.</p><p class="p1">Она посмотрела с веселым удивлением:</p><p class="p1">— Да ведь ты купил. Как же не покупатель.</p><p class="p1">— Ну, купить-то я купил, — у него был порядочный опыт таких уклончивых разговоров. — Купить купил. Но где теперь это, что я купил? Знаешь?</p><p class="p1">Она нахмурилась.</p><p class="p1">— Про такие вещи только голуби спрашивают.</p><p class="p1">— А почем ты знаешь, что я не голубь?</p><p class="p1">— Видела! — расхохоталась она. — Только что видела!</p><p class="p1">— А как бы мне отсюда в город попасть? — спросил он уже деловито. Степь степью, а надо и дело делать. Он уже выучил путь от порта к своей халупе в рыбацком квартале.</p><p class="p1">— Да зачем же тебе в город? Незачем в город.</p><p class="p1">— Ты почем знаешь?</p><p class="p1">— Никто больше в город не попадет, — сказала она и хихикнула.</p><p class="p1">— Он что же, закроется, что ли?</p><p class="p1">— Зачем закроется. Вон видишь?</p><p class="p1">Птица вела себя странно, поднимаясь и опускаясь, как огромный мяч на резинке.</p><p class="p1">— Ты меня приласкай, — сказала девочка, — я тебе, может, что и скажу, городской.</p><p class="p1">Он погладил ее по глянцевой ноге, поднял глаза и вдруг увидел. Море вдали чернело, накипала пена, шла волна, какой еще не видел Капоэр. Девочка смотрела туда, подперев голову руками, и он смотрел, и оба не двигались с места.</p></span>
