<p class="p">15 апреля 1927, Москва</p>
</div><p class="p1">— Приходите к шести, — сказала молодому прозаику Шелестову редакторша «Земли и фабрики» Лидия Муразова. — Все разойдутся, спокойно поработаем.</p><p class="p1">Шелестов заподозрил бы соблазнение, если бы круглую, крепкую, соломенную его голову могла посетить мысль о домогательствах со стороны Муразовой. Муразову можно было представить за каким угодно занятием, но с мужчиной — никогда. Сухая жердь, красное обветренное лицо, губы в нитку. Рассказывали о ее комиссарском прошлом.</p><p class="p1">Домогательств Шелестов не опасался, а вот что вторгнется в первый том — это запросто. Федор Бутыкин в пивном подвале напротив «ЗиФа» рассказывал, что она из его «Чернозема» железной рукой вычистила все родные воронежские словечки — <em>буторный, заматишный, пыжный</em>. «Ну ты ж подумай! — кричал Бутыкин и бил вялым кулаком по мокрому деревянному столу. — Пыжный! Скажи „пыжный“ — и ты, ютить, видишь сугроб, жаркий, жирный, как, эт-сам, напыженный! Скажи „пышный“ — и что ты видишь? Ты видишь тьфу!» В жизни Бутыкин, правду сказать, выражался нецветисто, все больше матерно — никто б не угадал в нем автора «Чернозема», который, гутарили, и в Воронеже мало кто понял. «Эт-сам» через слово, и вся черноземность.</p><p class="p1">Для самоуверенности, чтобы не уступить ни слова из романа, Шелестов постоял немного в той самой пивной — сидячих мест не было, не баре, — выпил кружечку, заел бледным, морщинистым моченым горохом, послушал разговоры. Был мягкий вечерний час, по Никитской глухо цокали копыта — весна случилась поздняя, в середине апреля по мостовым еще лежала снежная слякоть, — и Шелестов думал, что гостю из будущего, забреди он научным чудом в апрель двадцать седьмого, интересней всего будут не тресты, не концессии, не англо-русский комитет, даже и не Чан Кайши в Шанхае, а пивной треп за соседним столиком, Люська, которая легла на вычистку, Трункевич, который ездил к родне в Тамбов и видел трактор, Коля, который отравился килькой. «Лютая бредомуть! — говорил бесцветный узколицый комсомолец про похождения путешественника Бьернсена, только что прочитанные. — Лютая!» И Шелестов думал, что непременно впишет это во второй том. Дело у него шло, он был настроен хоть и твердо, но благостно, как всякий человек, у которого ладилось задуманное. Никогда еще не работалось ему так бодро и ясно, и поздняя весна казалась подспорьем — он сам словно переживал позднюю весну, и никакая Муразова не могла ему помешать.</p><p class="p1">Муразова одна ждала его в кабинете, где днем было не продохнуть от папиросного дыма и где три литработницы «ЗиФа» соревновались в бесплодном, ядовитом пересмеивании авторских ляпсусов.</p><p class="p1">— Я, собственно, — сказала она, как всегда, без предисловий, — хотела проработать с вами одну главу, часть вторая, где ваш этот Стельнецкий в Петербурге знакомится с Софьей, вот этой, Балановой.</p><p class="p1">У Муразовой была неприятная манера вставлять «<em>этот ваш</em>», «<em>вот эта</em>» — словно в действительности ничего такого быть не могло, а только в шелестовских «Порогах».</p><p class="p1">— Баланова — лицо историческое, — предупредил Шелестов, чтобы снять вопросы заранее.</p><p class="p1">— Это неважно, — отмахнулась Муразова. — Я о другом. Вот эта сцена в «Харчевне трубадуров», где Баланова у вас танцует на столе. Я не знаю, зачем это. Я бы сняла.</p><p class="p1">— Это не ко мне, — начал было Шелестов, но быстро прикусил язык.</p><p class="p1">— В каком смысле? — насторожилась Муразова.</p><p class="p1">— В таком, — ответил он уже зло, — что это так было, то есть бывало, и нечего теперь приукрашивать…</p><p class="p1">— Вы откуда это знаете? Вы бывали в «Приюте»?</p><p class="p1">— Я в «Приюте» бывать не мог, — ответил Шелестов, все более раздражаясь, — мне было тогда, сами понимаете, пятнадцать, и я, сами понимаете, пахал. Но вы не станете же отрицать, что тогдашняя вся эта богема вела, так сказать, образ жизни…</p><p class="p1">— Богема, может быть, и вела, — сказала Муразова неожиданно мягко. — Но в «Приюте» никогда не собиралась богема. Это же не «Клюква», в конце концов. Там бывали Евреинов, Сухоногов, Барский. Там никто не танцевал на столе.</p><p class="p1">— Слушайте, какая разница, — сказал Шелестов, — у нас, у меня то есть, не учебник истории, я могу, если вы так настаиваете, кабак переназвать. Пусть будет «Танцующие на столе».</p><p class="p1">— Ну отчего же. — Она заглянула в рукопись. — С этим все как раз правильно — Малая Морская, подвал, дерево это райское… с конфетами… Прямо вы как будто бывали. И тем оскорбительней, понимаете… Зачем же переименовывать? Это деталь, сообщает достоверность. Но просто не надо смешивать, верно?</p><p class="p1">— Да это не так все важно, — с досадой сказал Шелестов, — там, понимаете, это один эпизод. И сам Стрельнецкий, собственно… только чтобы видеть разложение…</p><p class="p1">— Но из этого и складывается! — с неожиданной комиссарской горячностью возразила Муразова. — Из этого и может соткаться общая неправда! Вот смотрите: у вас дальше он знакомится с Балановой и приглашает ее на острова. Никакая, понимаете вы, никакая уважающая себя женщина тогда… поэтесса тем более… не поехала бы вот так, со второй встречи, с мужчиной на острова! Тем более к Волынцеву. Это был ресторан с определенной славой.</p><p class="p1">— Ну Баланова и женщина была с определенной славой! — не сдавался Шелестов. — Вы же знать должны, все это мутное вино и все прочее…</p><p class="p1">— Я не защищаю Баланову, — вспылила Муразова и тут же осеклась. — Это чуждое искусство и упадок. Но одно дело искусство, а другое — ехать на острова. Тем более она тут у вас говорит: «…у вас пахнет изо рта, вам надо полоскать рот». Какая женщина так могла сказать мужчине? Есть вещи, которых вслух не говорят.</p><p class="p1">— Ну так мне и важно, — рубил Шелестов, — что она такая, что при своей нечистоте она заботится об чужой чистоте…</p><p class="p1">— Про нечистоту отдельно. Вот смотрите, она у вас с Блоком едет в Стрельну. Неважно, что Блок никогда не ездил в Стрельну, но Баланова никогда не ездила с Блоком!</p><p class="p1">Это Муразова выговорила с неожиданной страдальческой силой, словно жалея, что Баланова так никогда и не съездила с Блоком в Стрельну. Вообще разговор шел не так, как предполагал Шелестов. Муразова цеплялась вовсе не к судьбе Панкрата и не к истории ярыгинского рода, и даже сомнительная сцена в стогу ее, кажись, устраивала; но вот Баланова… «Ведьма, сущая ведьма! — думал Шелестов, поневоле опуская глаза, когда она вдруг взглядывала на него исподлобья. Не позавидую я тому, над кем она комиссарила».</p><p class="p1">У него начался тик — не тик, а так, как сам он шутя называл это состояние: он стал хвататься правою рукой за незримую шашку, как бы висящую слева. Эта странность его самого изумляла — шашки сроду не нашивал, воевал только в ЧОНе, кобуру носил справа, как положено, но, видимо, так уж он слился с героями, бывает. Но не надо было сердить писателя, когда начинался тик: это значило, что им уже владеет демон по имени Панкрат. Вдобавок темнело, но Муразова не зажигала света — тяжелая лампа с красным стеклянным абажуром праздно стояла у нее на столе, и Шелестов опасался уже, что редакторша, чего доброго, хватит его этой лампой за какую-то Баланову, которая и нужна-то была в первом томе единственно для переноса действия в Петроград, для местного, так скажем, колорита. И уже он чувствовал наплывавшую дурноту, столь частую в первый год после контузии, но и теперь еще нет-нет нападавшую на него в душных помещениях, в минуты душевного расстройства.</p><p class="p1">— Лидия Алексеевна! — сказал Шелестов, набравшись наконец духу и прямо глядя в узкие глаза Муразовой. — Что вы вообще цепляетесь к этой… второстепенный же персонаж! Что вам, женщине, так сказать, современной и комиссару, как я слышал, вся такая вот эта…</p><p class="p1">— Потому, — очень спокойно сказала Муразова, — что Софья Баланова — это я.</p></span>
