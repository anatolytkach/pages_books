<span id="id17"><div class="title1">
<p class="p">10 февраля 1932, Ленинград</p>
</div><p class="p1">Но уж окончательно Шелестов ощутил себя гением в канун весны тридцать второго, когда совсем было разобрался с третьим томом и даже Муразовой твердо сказал: все, в международный день имени Клары Цеткин будет вам подарок. Так ладно сложилось — он и сам верил, что допишет. Хватит уже Панкрату с этой Анфисой, честное слово. Он ясно понимал, что в четвертом томе надо, надо привести его на верную сторону. Не потому, что напечатают и так дальше. Нет, объективно. Он и мысли не допускал, что Панкрат, его Панкрат, бывший для него теперь чем-то между сыном и братом, выберет не нашу сторону. Это все Анфиса, змея, сбивала его с панталыку. Такая страсть вообще раскрепощает, превращает человека в животное. И он хорошо, старательно про это писал, и в себе знал зверя — даже с беленькой Манюней иногда такое начинало видеться в разгар этого самого, что ууух! А иногда хотелось ударить ее, тихую. И ей бы, что странно, понравилось. Он ловил у нее в глазах иногда что-то такое, томное. Вот эта звериная, несознательная сущность перла и перла из него, пока он путался с поганой бабой. Уже пора ей было остепениться, уже ей было двадцать шесть лет, уже другие троих выкормили, а она все настигала Панкрата на всех его путях; но довольно — кончилась Гражданская война, пометался, и ладно, давай теперь, пожалуйста, обрастай хозяйством на правильных рельсах.</p><p class="p1">Возвертать его к Татьяне у Шелестова и в мыслях не было. Еще чего, Татьяна, лепешка пресная. Была у него приготовлена городская, из личных запасов, девушка-шофер. В книге, конечно, он не сделает ее шофером. А просто — приедет из города: может быть, учителька, может, агитаторша. Бодрая, свежая. Запах ее телесной чистоты, юной ясности он прямо чувствовал, у него как раз намечалось с этой шофершей. Познакомился по случаю, выступая в автоклубе. Не то чтобы он много гулял от Манюни, но она, кажется, и сама понимала: писателю же надо знать жизнь. И он совсем было прикончил третий том, оставалось написать сцену решительного расставания с Анфисой, Шелестов уже и в красках ее видел — лиловое, холодное утро, хрусткий иней на траве, свежесть новой жизни. Оттолкнет ее Панкрат и выйдет на баз, навстречу новому дню. Пьяный осенний запах, звериная чуткость, голодная, ясная сила во всем теле. Пойдет, во всем покается, простят, конечно. Тогда еще прощали. И будет поднимать хозяйство, а там и новая в кожаночке — он только не решил еще, Светлана или, как в жизни, Полина.</p><p class="p1">И надо же тут было ему поехать в Ленинград!</p><p class="p1">Надо же было поехать в Ленинград, говорил он себе три дня спустя, сидя на разобранной кровати в гостинице «Октябрьская», смоля пятую подряд папиросу, оглядывая с изумлением и номер, и заоконную вьюжную муть, и собственное полуголое тело, такое незнакомое сейчас. А не поехал бы — что написал бы, Господи! Он вздрагивал даже. Как у Толстого, ей-богу, как это — «Все хорошо, что хорошо кончается», недописанный вариант, в котором князь Андрей живехонек и Петя целехонек. Ведь это что же было бы! Срам, срам. Он словно вырос над собою на две головы. Перечел даже с испугу страниц пять из первого тома, опасаясь, что с этой новой высоты и они покажутся дрянью, — нет, даже там, где сквозила иногда фальшь в чувствах по детскому неведенью, спасала крепость слога, плотная теснота слов, ножа не всунешь. Кое за что и Муразовой спасибо. А мог все испортить, все! Бросает Анфису, передразнил он себя. Лиловое утро. Сейчас тоже было утро, мутное, серое, но сквозь эту муть пробивался такой свет, что Шелестов всего себя чувствовал высвеченным и пронзенным. Он знал, что придет Анна, только это и знал о ней, что — Анна. Она за ночь сделала из него то, чем ему и быть надлежало, да все попадались не те. Вечером она обещала прийти опять, и он ждал, так ждал, что и писать не мог, и встать, и одеться не решался, боясь, что выйдет из номера — и все окажется неправдой.</p><p class="p1">Подошла после общего вечера, на который — он знал — шли только ради него: он читал последним, на сладкое, другие только подкладывали фольгу под алмаз, и подобралась бригада, как нарочно, из беллетристов пятого ряда, все сплошь бытовики, он слушал вполуха. Но, выказывая дружелюбность, — больше всего боялся упреков в заносчивости, оторвался, мол, — сидел каменно, вдумчиво, хлопал тщательно. Наконец читал сам — пятую и шестую главы, небольшие, как раз анфисины: для публичного чтения выбрал поэффектней. Там хорошая вещь удалась ему: едет Панкрат в поезде, в отпуск к семье. И что-то женщина в тамбуре, некрасивая простая баба, странную внушает ему жалость. Сроду баб Панкрат не жалел. И такая некрасивая, такая несчастная! С такой, конечно, никто по доброй воле, не то бы снасильничали давно. Время, сами видите, какое, опасно одной-то в поезде.</p><p class="p1">И такая боль, такая горькая жалость взяла его к этой, некрасивой и бессчастной, — вот, подумал он, где-то так же сейчас и Анфиса моя… одна, без опоры… И замечталось ему с чего-то, что это Анфиса, да так замечталось, что сам поверил. Смотрит, смотрит — и как бы уже видит в смуглой, грязной бабе родные ее черты! Быть не может! Но с каждым поворотом головы, с каждым быстрым, птичьим ее движением все отчетливей видит: она, только очень уж намучилась. Бред, бред, наваждение! Сошла на Шумовской. Не доехал до семьи, за ней пошел. Идут по снегу, по серому насту. И оглянулась — и как же блеснули на него глаза и зубы, как же он сразу, сразу все узнал! Ведь не виделись два года, ведь чего-чего с ней за это время не было. Долго всматривалась неузнающе, сама еще не верила. Кинулась к нему, да так и остановилась в полшаге. Панкраша, Панкра… — Анфиса, горькая моя! И только тут, по охрипшим голосам, узнали друг друга; и когда уже обнял — как же трудно родной, природный ее запах пробивался сквозь все чужие, сквозь всю наносную грязь! Так и стояли, до конца себе не веря, и не поехал он, конечно, ни в какую семью. Хорошая была сцена. Читал у Алексея Толстого в гостях, тот жил широко, собирал литературный, что ли, салон, хоть и со скромной советской закусью — тоже боялся оторваться. Прочитал. Долгое молчание, потом хозяин, краснея, перхая, словно скрывая невольные слезы (может, и впрямь?):</p><p class="p1">— Да, знаешь, Кирилл… знаешь, Кирька… — впервые так назвал его, прежде все выкал, — это, знаешь, шельмец, посильнее Библии будет. Есть у меня в Библии любимый эпизод, по дороге в Эммаус, как апостолы Христа сперва не узнали, а потом узнали. Я не в том, конечно, смысле, ты не подумай, но как литература… я все для себя это откладывал. Просто, знаешь, как прием! Вы не подумайте, товарищи, — обратился ко всем, широко, — я в этот хлам уже в четырнадцатом году не верил, как военным корреспондентом на фронт поехал от «Биржевки». Ведь у Льва, у дяди моего, — любил этак шутковать, — помнишь, Пьер, как пришел из плена, не узнал Наташу! Я дословно не помню, а Вася Качалов помнит, он эту сцену на концертах читает, ну-ка, Вася, прочти!</p><p class="p1">И широкий, потный Вася, ласково посмеиваясь, выдал сценическим своим голосом: «Он взглянул раз на лицо компаньонки, увидал внимательно-ласково-любопытный взгляд, устремленный на него, и, как это часто бывает во время разговора, он почему-то почувствовал, что эта компаньонка в черном платье — милое, доброе, славное существо, которое не помешает его задушевному разговору с княжной Марьей. Но когда он сказал последние слова о Ростовых, замешательство в лице княжны Марьи выразилось еще сильнее. Она опять перебежала глазами с лица Пьера на лицо дамы в черном платье и сказала:</p><p class="p1">— Вы не узнаете разве?</p><p class="p1">Пьер взглянул еще раз на бледное, тонкое, с черными глазами и странным ртом, лицо компаньонки. Что-то родное, давно забытое и больше чем милое смотрело на него из этих внимательных глаз.</p><p class="p1">„Но нет, это не может быть, — подумал он. — Это строгое, худое и бледное, постаревшее лицо? Это не может быть она. Это только воспоминание того“. Но в это время княжна Марья сказала: „Наташа“».</p><p class="p1">— Вот чем хотите поклянусь, не вспоминал даже, — покраснев, сказал Шелестов, который как раз незадолго перед тем опять перечитывал в разных местах, на чем откроется.</p><p class="p1">— Да конечно! — затрубил Толстой. — Конечно, просто явление то же самое! Ты и про Библию не думал! Мы просто не узнаем друг друга, вот что. Случились великие потрясения, и все мы другие люди — вот что он хотел сказать, а не то что — плагиат! Боже упаси. Ведь я сам сколько раз, — и пустился в парижское воспоминание, но его не слушали, а взглядывали все на Шелестова, и он не без радости это отметил. Конечно, он им напомнил, какая бывает любовь. Сейчас никто так не пишет.</p><p class="p1">Ну вот, и в Ленинграде слушали недурно, они умели тут слушать, и даже почудился Шелестову тихий всхлип, когда Анфиса прильнула к Панкрату, к гулевой, неверной судьбе своей, такой горючей, такой несчастливой, а деваться некуда, — и когда Шелестов, обессилев, выговорил едва слышно: «Долго так стояли они, прильнув друг к другу раньше срока седеющими головами», — опять было молчание и потом только шквал. Шелестов стоял в кругу ленинградских литераторов, почтительных, а все же скрытных, что-то таящих, как всегда казалось в разговоре с ними: вежлив, а вот сейчас кольнет. Но тут помалкивали, только кивали одобрительно, — и вдруг, словно прорвав окружавшую его незримую стену, шагнула прямо к нему высокая, прямая, черноволосая, лет тридцати, но еще яркая, без примет увядания.</p><p class="p1">— Замечательно, товарищ Шелестов! — сказала она, прямо глядя ему в глаза, и он подивился: давно не видывал таких больших, таких зеленых, да у кого же, полноте, видел такие в последний раз? Да у нее же, у проклятой, у ведьмы Анфисы Мизгиревой, с которой как раз теперь он разделывался. — Гораздо лучше пишете. Когда же третий том, мы все заждались.</p><p class="p1">Он ответил нарочито грубо:</p><p class="p1">— Скоро робят слепых родят.</p><p class="p1">— Что же, подождем. А не хотите выпить самогону нашего, донского, вчера прислали? Я ведь тоже ростовская. Теперь здесь, журналистка.</p><p class="p1">И пошел, пошел за ней, как во сне, раздвинув плечом тихих питерских, буркнув что-то вроде: извините, товарищи, зов крови. Изумленно вскинул заплывшие глаза музыкальный критик Небаба, форменный зверь, про которого шутили, что при царском режиме быть бы ему городовым. Шелестов отодвинул его прямо даже с вызовом. И она, оглянувшись, полоснула своими зелеными лихо и одобрительно — точно как Анфиса взглядывала на Панкрата на тех первых скачках в пятнадцатом году.</p><p class="p1">Чем дальше, тем неотразимей делалось это сходство. И поначалу Шелестову все это нравилось: ишь, думал он, как живу-то я теперь этим делом, как все у меня идет в переплавку, как жизнь сама мне подбрасывает, словно «Пороги» притягивают полезных типажей, и вот как раз, когда надо разделываться с Анфисой и поярче, порезче написать ее, — как нарочно, живая Анфиса, старше разве, да ненамного. Но потом он стал настораживаться, и недаром: пошли ее манеры, ее словечки, ее воспоминания о первом муже — была, была у Анфиски дурная такая манера, то в дурном расположении ставила его Панкрату в пример, а то ночами шептала, ткнувшись ему в плечо, что с первым такого никогда, никогда… вообразить не могла, что бывает так… Вот и эта все поминала про мужа, и когда Шелестов на третий раз спросил — кто он, муж-то? — уставилась вдруг исподлобья:</p><p class="p1">— Ну Ше-е-лестов! — И, с каким-то даже восхищением: — Ну, писа-а-атель!</p><p class="p1">— Да что такое, е-мое! — Самогон уже слегка забирал его.</p><p class="p1">— Да ничего. Любопытный больно. Знать все хочешь.</p><p class="p1">— Такое наше дело — все знать…</p><p class="p1">— Успеешь ишо. Капустку вон кушай.</p><p class="p1">Она привела его в узкую комнату в огромной, извилистой темной квартире на проспекте Володарского. Снимает, значит, с подругой. Подруга тоже была ничего, казашка, молчаливая, хитрая, видно, что с бесом, — курила, взглядывала искоса, явно была не прочь. Работала плановичкой, какие там радости, бумаги одни. На вопрос, откуда она, ответила невнятное, гортанное: атырау… тоторау…</p><p class="p1">Надо бы, думал Шелестов, пьянея, а о главном не забывая, — надо бы мне словечки этой Анны запомнить для Анфисы. Все эти «хлеб да соль, едим да свой», «купи ложечку, да ишь понемножечку», все эти раскрепощения по мере сближения — вплоть до «женятся, ебутся, а нам не во что обуться», — надо бы придать Анфисе, а то она выходила у него мертвовата, бумажна. С самого бы начала ему такую бабу, такую огневую, хоть и не первой уже юности, — но только такая непервая юность и бывает по-настоящему охоча до любви и понимает в ней толк. Он все боялся, как бы не разговориться про главное: расскажешь придуманное — потом не напишешь. Это как гриб: увидели — все, дальше расти не станет.</p><p class="p1">Как-то упомянул, что считают его еще молодым, позволяют себе, глупышки, учить.</p><p class="p1">— Ты-то молодой? — Она расхохоталась, взяла его за руку, стала вдруг смотреть линии. — Чего-то я не пойму. Ну-ка! А что-то руки у вас такие мягкие, товарищ писатель?</p><p class="p1">— Мозоли ищешь? — Шелестов обиделся. — Мозоли знаешь у кого? Кто к работе не привычный, у того мозоли.</p><p class="p1">— Да нет, не мозоли! Просто мягкие, странно. Сердце, что ли, доброе?</p><p class="p1">— Это я не знаю. Я сам про себя не могу сказать.</p><p class="p1">— А молодой-то с чего, с чего ты молодой?</p><p class="p1">— А ты сколько б дала?</p><p class="p1">— Тридцать шесть и дала бы. Как мне.</p><p class="p1">— Так тебе тридцать шесть? — Он и не поверил даже: на восемь лет его старше! Ему еще льстило, когда принимали за старшего, да и сам он теперь, почти закончив третий том, не сказал бы, сколько ему лет.</p><p class="p1">— Все мои. И что, нехороша Аня?</p><p class="p1">— Очень хороша, — вдруг сказал он совсем просто, словно весь хмель из него вышел. Она смутилась и еще помолодела.</p><p class="p1">— Ну, ну. Что это мы серьезные такие.</p><p class="p1">— Я пойду уж, наверное. — Была половина первого ночи, и пора определяться. Здесь не останешься, казашка, да и какой смысл — в гостинице у него роскошная комната, кровать — троим широко.</p><p class="p1">— Ну, пройдусь, провожу до угла, — сказала она, и казашка понимающе кивнула.</p><p class="p1">Объятия, жадные поцелуи, даже и легкие укусы — все началось уже на лестнице; сама кинулась к нему, словно невтерпеж. Ни примеси вульгарности, ни намека на обычную бабью жадность не было во всем этом: словно знали друг друга век и вот расстались на месяц, но теперь уж, конечно, никаких разлук. Но вдруг отстранилась, взяла лицо его в ладони и сказала:</p><p class="p1">— Ну скажи, скажи. Я никому ни слова не скажу.</p><p class="p1">И так он был разнежен, что выдал тайну:</p><p class="p1">— Уйдет он от нее, Аня. Тебе одной говорю. Другого нет у нас пути.</p><p class="p1">Некоторое время она еще всматривалась, словно не понимая.</p><p class="p1">— Нету, значит?</p><p class="p1">— Нету. Сама посуди, куда он с ней? Она баба балованная, теперь время не для нее. Полюбятся еще, конечно, напоследок, да и пускай.</p><p class="p1">«Как же всем интересно, как всех волнует его Панкрат!» — подумалось ему.</p><p class="p1">— Напоследок, значит? Ну, пошли, — сказала она вдруг, словно на что-то решившись; и дальше до самой гостиницы, благо недалеко, не говорили ни слова.</p><p class="p1">В гостинице и случилось то, что не давало ему потом покоя: когда уж после первого раза, не насытившись, а лишь ненадолго приглушив внезапную и неуемную тягу к ней, он в нее всматривался под красным торшером с бархатным абажуром, невозможно буржуазным, как ему казалось, — он увидал то, что должен был увидать, но этого же не могло, не могло быть, никак не могло! Она почувствовала, как он замер, открыла глаза и сказала почти грубо:</p><p class="p1">— Что смотришь, там все на месте.</p><p class="p1">— А вот, — он потрогал крупную родинку правей пупка.</p><p class="p1">— Так и всегда там была.</p><p class="p1">Он молчал. Была-то была, но ведь у Анфисы! У Анфисы, которую он выдумал, от которой в первоначальной рукописи только и были зеленые глаза да отвратительный сучий характер, а он ее напоил живой кровью, создал из былых своих подруг, а больше из стыдных мечтаний, — и вот, пожалуйста, Пигмалион или как это там называлось, явилась не запылилась героиня собственных его «Порогов», постарше, конечно, на десять лет, но в остальном копия! Оно, конечно, всякое возможно, и родинка правее пупка есть у каждой, может быть, десятой; но в сочетании с зелеными глазами… ростовчанка… и самое страшное было то, что он понимал теперь Панкрата. Нельзя было оставить эту женщину. Не в том было дело, что она в каждую минуту именно то делала и говорила, чего он ждал и хотел, — нет, просто она была для него, он для нее, и любые другие соображения тут веса не имели. Он словно всю жизнь ее знал, и что же теперь? Как теперь им быть, что он скажет Манюне? Впрочем, и Манюня теперь мало что значила; куда больше беспокоился он за роман. Ну куда, куда пойдет его Панкрат в новую жизнь? Какая глупость новая жизнь, как будто она вообще бывает. Есть женщина, есть такая степень близости, которой не наживешь с другими за десять лет, а здесь она с первого слова, с первого жеста, которым она расстегивала сзади пуговицу на черном платье, из чего-то дешевого, но на ней глядевшегося царственно. Никогда не запоминал названий этих: саржа? габардин? Как легко было манипулировать Панкратом, пока сам не знал Анфисы, а теперь как же он справится? И Шелестов ронял голову на подушку, засыпая на полминуты, и просыпался тут же, боясь упустить хоть миг чуда.</p><p class="p1">— А назвал ты их хорошо. Верно назвал. Панкрат, Анфиса…</p><p class="p1">— Обыкновенно.</p><p class="p1">— Нет, не обыкновенно. Панкрат — всемогущий, вся власть. А она — цветущая.</p><p class="p1">— Вот не думал. Ты-то откуда знаешь? Это по-каковски?</p><p class="p1">— По-гречески. Что же, ты и греческого не помнишь?</p><p class="p1">— Откуда мне помнить. И не знал никогда.</p><p class="p1">— Ну, тем лучше. Чем случайней, тем вернее.</p><p class="p1">Где-то он это слышал.</p><p class="p1">— Это откуда?</p><p class="p1">— Так. И что же ты с ними дальше хочешь?</p><p class="p1">— А не знаю. Не скажу теперь.</p><p class="p1">И опять он забылся, и опять проснулся, и опять не мог насытиться этой небывалой близостью.</p><p class="p1">— Что же, ты женат?</p><p class="p1">— Ты будто не знаешь.</p><p class="p1">— Да я мало про тебя знаю. Говорят, скрытный.</p><p class="p1">— А чего ж открываться. Ну, женат.</p><p class="p1">— Давно?</p><p class="p1">— Шесть лет.</p><p class="p1">— Дети есть?</p><p class="p1">— Дочке год.</p><p class="p1">— Дочка? Хорошо. Назвал как?</p><p class="p1">— Анной, как тебя.</p><p class="p1">— Спасибо.</p><p class="p1">— Да за что ж спасибо, это жена захотела.</p><p class="p1">— Вот видишь. Опять чем случайней, тем лучше.</p><p class="p1">— Но ты пойми! — сказал он с болью, чуть не со скрипом зубовным, чувствуя, как трещит по швам вся его жизнь. — Не знал же я, что тебя встречу!</p><p class="p1">— Что ж не искал?</p><p class="p1">— А знал я, где искать? Я в Ленинграде этом пять лет не был.</p><p class="p1">— А я хотела написать, — она потянулась мечтательно. — Как прочитала первую часть, так и решилась. А потом думаю — нет, еще чего… Испорчу все дело ему…</p><p class="p1">— Не испортила бы.</p><p class="p1">— Да у меня самой тогда было, знаешь… — Закурили, оба глубоко затягиваясь, затрещали папиросами. — Нехорошо было. Мать болела. Работы не было, еще потом всякое…</p><p class="p1">Он хотел спросить о муже, но удержался: захочет — расскажет. Она молчала, только гладила его по голове.</p><p class="p1">— А это что тут?</p><p class="p1">— С войны шрам.</p><p class="p1">— Хорошо ударили.</p><p class="p1">— Шашкой.</p><p class="p1">— Как же ты пишешь?</p><p class="p1">— Да я, может, и не писал бы без него. До войны разве я бы мог? Совсем не та была голова…</p><p class="p1">— Подумай только. Всех бы так, по голове-то…</p><p class="p1">— Не говори.</p><p class="p1">Теперь, утром, когда она ушла, пообещав вечером вернуться к нему, он сидел на кровати, гладил шрам, думал и не мог выдумать: куда ему с Панкратом? Куда Панкрату с Анфисой? Что он скажет Манюне и скажет ли что? Как ему теперь с этой женщиной, не похожей ни на новых, ни на старых, ни на комсомолок, ни на дворянок? Кто она, почему он ничего не знает о ней, почему она, неизвестная, родней ему всех других? Был уже полдень, а он все не оделся. Надо было наконец пройтись, остудить голову; и он вышел в февральский петербургский день, не успевший просветлеть и уже угасавший, в мокрую серую метель.</p><p class="p1">Ленинград обступил, облепил его, как в детстве тюлевая занавеска — бабушка сажала Кирилла на подоконник, строила с ним тюлевый дом; он детство помнил плохо, после ранения еще хуже, всплывали не слова, а картинки — мир сквозь тюль. Самый воздух тут был густ, полон теней, столько всего тут было — нельзя жить в городе, где столько всего было и миновало; каждый шаг приходился на могилу, все ходили по чужим бесповоротно оконченным жизням. Как же мы живем, столько раз себя хороня? Вот и называется по-другому, Ленинградом, и во дворцах все другое, — как же можно всякий раз начинать что-то новое, когда со старым не разобрались? Ведь придет, настигнет, как из прошлого вдруг пришла к нему женщина, которой он не знал, которая должна была встретиться прежде, — а он до этого прошлого не дожил, не успел, и вот теперь у него чужая жизнь. Почему, откуда он так знал ее, почему сначала написал, а потом встретил? Может быть, в самом деле свойство гения — так менять под себя мир? Ведь и Пушкин, и Лермонтов сначала написали, как их убили. Но отчего-то эта мысль не тешила, а пугала. Ни в коем случае нельзя убивать Панкрата. Но писать ему новую жизнь он теперь тоже не хотел — нет, только Анфиса.</p><p class="p1">Три часа шатался он по городу, которого не знал, заходил в магазины, в пивные, задыхался среди мокрых шуб, один раз его узнали, одобрительно кивнули, не ответил. Вот бы встретить ее сейчас, — но таких случайностей не бывает, это слишком. Показалось было, что она, — нет, она на службе. Чувствуя, как разгорается в нем страшная жажда, более жгучая, чем любая телесная похоть, — жажда слиться не с ней, а с собой, своим настоящим, так долго от себя таимым. Он поднялся в номер и тут испугался всерьез: что, если не придет, если помешают любые случайные обстоятельства? Задержат на службе, аврал. Муж — ведь был какой-то муж? В то, что передумает, Шелестов не верил: такое — ТАКОЕ — всегда взаимно, иначе мир бы рухнул. В шесть не было, в семь не было. Ведь не спросил фамилию, ведь и адрес той комнаты, с казашкой, помнил смутно! Володарского, Володарского… Ничего, найдет. В восемь в дверь постучали, он кинулся открывать — коридорный принес конверт. В конверте была ее фотография, выцветшая, рыжая, срезанная, словно кто-то был там с ней рядом — муж? — и не хотела показывать. Тут же и записка, подозрительно детским, сильно наклонным почерком, совсем незнакомым: «Я считаю себя теперь совершенно свободной», без подписи.</p><p class="p1">Что это все значило, черт бы ее побрал совсем? Издевательство, бред.</p><p class="p1">— Откуда у вас это?</p><p class="p1">— Женщина передала, сказала — в руки.</p><p class="p1">— Где?!</p><p class="p1">— Внизу была, ушла сразу.</p><p class="p1">— Вернуть! Черт! Когда!</p><p class="p1">— Сейчас только, может, догоните…</p><p class="p1">— Ах, мать вашу так! — прыгнул в сапоги, на ходу влезая в куртку, ринулся вниз по лестнице, да какое: метель, сумятица, вечерняя мокрая толпа, яростные гудки авто у вокзала. Сволочь, дрянь. Вываживает. Но ничего, мы это сами… «Что я не так сделал?! Всегда все делаю не так». Билет у него был на завтрашнее утро, но он похерил этот билет. Он до полуночи боролся с собой, а потом побежал на Володарского; дом нашел сразу — вот она, глазная писательская память! — мельком подивился планировке, лестница номер пять, квартиры три, семь и шестнадцать, безумие, а не город, — взлетел на третий этаж, прочел список жильцов. Эркенова, три звонка. Вышла казашка, злая, заспанная, в халате.</p><p class="p1">— Ну? Что вы?</p><p class="p1">— Где подруга ваша? — не здороваясь, задыхаясь.</p><p class="p1">— Откуда я знаю.</p><p class="p1">— Но она живет же с вами тут!</p><p class="p1">— Никогда не жила. Это она в гости вас вчера приводила.</p><p class="p1">— А где живет?</p><p class="p1">— Не знаю я. Что вы кричите? Случилось что?</p><p class="p1">— Случилось! — заорал он. — Говори, Азия, говори! Где она!</p><p class="p1">— Я вот вам сейчас покричу, — сказала она испуганно. — Квартиру всю перебудишь. Ну чего тебе? Не знаю я, где она.</p><p class="p1">За спиной казашки нарисовался в коридоре квадратный, с бугристыми плечами, — хахаль, сосед?</p><p class="p1">— Чего вы, гражданин? — спросил он покамест мирно, но видно было, что сейчас разговор будет другой. — Чего ночью?</p><p class="p1">Шелестов принялся лихорадочно хвататься правой рукой за левую полу, за незримую шашку, — давно не был в бешенстве, забыл этот странный тик.</p><p class="p1">— Я ищу женщину, — начал он.</p><p class="p1">— Так не по адресу, — хохотнул бугристый.</p><p class="p1">— Я женщину ищу! — повысил голос Шелестов. — Вчера была тут со мной! У меня после нее кошелек пропал, — нашелся он, — украла кошелек!</p><p class="p1">— Не стала бы она кошельки красть, она приличная! — вступилась казашка с азиатским бешенством, даже акцент прорезался. — Что говоришь, на кого говоришь!</p><p class="p1">— В милицию надо, товарищ, если кошельки. А здесь чего ж? Людям на работу вставать. Баламутите только. Вон в милицию, за угол…</p><p class="p1">— А, черти! — заорал Шелестов и сбежал в метель. Город этот его морочил. Из любого двора скалились призраки, чужая жизнь хватала за ноги. Вдруг померещилось, что она непременно там, в гостинице. (Она и была там, бродила у входа, но, не решившись зайти, ушла, растворилась, поминай как звали.) Он так резко представил ее там, внутри, — без него не пускают в комнату, ждет у стойки, кусает нетерпеливо губу, — что побежал в «Октябрьскую» шибче зайца, но, конечно, никто его не ждал. Он весь день провалялся на диване и убыл с вечерним поездом. Зато с Анфисой теперь все было ясно.</p><p class="p1">«Ты у меня жива не будешь, подлюка, — думал он. — Ты у меня, змея, не только что Панкрата потерять, — ты у меня получишь пулю; вот так мы рвем с любыми соблазнами, вот так, вот так!»</p><p class="p1">И когда чертом из табакерки выскочил в конце третьего тома бывший муж Анфисы, которого отпели еще во втором, которого уж и забыли в станице Озерской, — никто Шелестова за это не укорил, съели — слова не сказали. Даже Левин, на что уж ко всему цеплялся, вынужден был признать: пусть явление анфисиного мужа ничем и не подготовлено, но мы ведь с самого начала подспудно ждали возмездия, которое должно разразиться над головами всех несознательных героев романа. Сцена же, в которой Петр забивает Анфису ногами, а потом достреливает в голову, — принадлежит к числу наимощнейших, кровью сердца писанных, так что поневоле страшно за автора — носит же он в себе такое! В известном чутье Левину все-таки отказать было нельзя.</p><p class="p1">А фотографию Анны Шелестов хранил, порвать не мог: больно хороша она там была, шестнадцатилетняя или около. Сидела на какой-то завалинке. Иногда Шелестов думал: а ну как вернется? Он нарочно так сделал, что достреливал ее Петр в хате, Панкрат не видал. Сшиб дверь с петель, ворвался и порешил Петра, тем более что тот был явная и давняя контра, — и дальше сразу пейзаж, перебивка, лиловое утро, конец третьего тома. Вдруг живая? Героя надо убивать за дверями, в решающий момент отводя глаза, — вдруг понадобится. Это Шелестов знал теперь накрепко, и потому в четвертом томе у него почти не было зверств и агоний, которых в первых трех томах случалось по паре на главу.</p></span>
