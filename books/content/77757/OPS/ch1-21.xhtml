<p class="p">19 октября 1937, Кисловодск</p>
</div><p class="p1">Путевку в Кисловодск Шелестов взял единственно потому, что на четвертом томе застрял, казалось, безвылазно. Панкрат, надоевший ему до смерти, не шел в колхоз ни под каким видом. В тридцать третьем Шелестов поездил по колхозам, навидался. Это было хуже Гражданской — и той, какую он бегло видел, и той, какую написал. В Гражданскую все они были люди, продавали жизнь дорого. Теперь с ними делали что угодно, и ни одного очага сопротивления было не видать — Шелестов недоумевал почему, но потом понял. После Гражданской все уже воспринималось как расплата. И только Панкрат, все это отлично понимавший, не хотел идти в колхоз — может, потому, что еще не остыла в нем Гражданская и цепко держала Анфиса.</p><p class="p1">Относительно своей ленинградской Анфисы Шелестов догадок не имел и вспоминал ее часто, то с бессильным бешенством, то с благодарностью. В Кисловодск он приехал с Манюней, удивительно похорошевшей после тридцати. Она немножко раздалась, конечно, однако это ее не портило: сколько ж можно бегать безгрудой девочкой, поди-подай. Кошачья хищноватая грация проявилась в ней. Она теперь уж не смотрела ему в рот, позволяла себе и подсмеиваться — эх, писатель, в четыре года сто страниц не можешь написать. Но Шелестов и не торопился. Шелестову нравилось быть писателем, от которого ждут. Это сейчас лучше, чем говорить вслух. Вслух можно сказать не то, а что «то» — они сами еще не решили. А когда от писателя ждут — это значит, он пишет медленно, несуетно, неторопко. Теперь очень вообще поощрялась медленность. А уж как получил по шапке Демьян со своими «Богатырями» — так и стало понятно, что чем русей, тем лучше, а русей значит хуже. Когда-то борьбу за право быть хуже вел РАПП, но оказалось, что надо хуже РАППА, т. е. то же самое, но эпически. Шелестов-то понимал, что это все игры для дураков, лезущих в писатели, а настоящим писателям можно все, как ему, — но с другой стороны, каким-то тайным пожеланиям надо было соответствовать, просто он этих тайных желаний пока не почувствовал. Приведет он своего Панкрата в колхоз, а завтра окажется, что колхозов было не надо, и прощай роман.</p><p class="p1">В Кисловодске публика подобралась интересная, и санаторий был непростой — имени Куйбышева. Пролетариат сюда не допускался, он нехотя лечился в заведениях рангом пониже, имени, скажем, Десятилетия Октября, — нехотя, потому что у пролетариата было о лечении свое представление. Он пил, блевал, бил себе морду, а отчаявшиеся кастелянши и дежурные сестры разгоняли пьяных по номерам, вытаскивали из женских корпусов — к негодованию женщин, которые тоже приехали сюда пить не воду и разминаться не на теренкуре. Крики пролетариата долетали слабо, но явственно. В Куйбышевском санатории, напротив, лечились самопожертвенно, отчаянно: литрами пили невкусную, но действительно страшно полезную воду, словно впитавшую дикую энергию самой земли, километры отмахивали по пешеходной тропе, брали солнечные ванны в строго отведенные часы, когда солнце меньше кусалось. Питание было невкусное, но опять же здоровое, сплошь нежирное, отварное, паровое. Шелестов не писал, стараясь дождаться той полной, звонкой пустоты в голове, когда вдруг прочувствуешь то единственное, что нужно, угадаешь дуновение воздуха — и окажется, что ты же давно знал, просто почему-то не решался написать именно так. Он даже не читал ничего, кроме аккуратно подвозившихся к столовой свежих газет. Сосед его за столом был астрофизик Нильсен, норвежского происхождения, но очень давнего: сейчас это был безупречный русак, полный, но сильный, степенный, седоусый. К Шелестову он относился почтительно, хоть романа не читал: «Знаете, все некогда… Но я непременно!» Шелестов и рад был, что хоть астрофизик не будет лезть с расспросами, куда придет Панкрат. Рассуждать с ним о звездах было одно удовольствие.</p><p class="p1">Нильсен выглядел очень надежным, вот в чем дело. Иначе бы Шелестов не разоткровенничался. Ему, лишившемуся родителей в незапамятном детстве, очень хотелось иной раз к кому-то прислониться, да что — попросту высказать сомнения, но некому было, все глупей, и чем старше, тем меньше понимают. С Нильсеном он, пожалуй, впервые поговорил по душам — однажды вечером, без жен, как раз на пешеходной тропе: Шелестов радовался тому, как быстро и молодо ходит, не иначе чудесная вода помогла всему сразу, и не то чтобы захотелось вдруг дописывать, но как-то ясно стало, что и спешить, может быть, не надо. Его одно тревожило — необъясненность ленинградской Анны; и он начал, похихикивая в усы, как бы ничего серьезного, рассказывать, что вот — переспал с собственной героиней, и родинку упомянул правее пупка, и не могла же она, Анна, нарочно себе сделать ту родинку в честь женщины из любимой книги? Нильсен слушал серьезно, поглаживая усы, не задавая лишних вопросов, какими хотят обычно изобразить любопытство, а на деле только сбивают.</p><p class="p1">— Ну что же, — сказал он спокойно, вообще трудно было представить его повышающим голос. — Такое случается чаще, чем думаем. Это темная материя.</p><p class="p1">— Да не такая уж темная, — сказал Шелестов с принужденной усмешкой. — Все помню в полной ясности.</p><p class="p1">— Не в том смысле, — пояснил Нильсен. — Вы слышали, может быть, или читали о темной материи?</p><p class="p1">— Откуда же! — Нильсену, как всякому человеку, полно и честно живущему своим делом, представлялось, что о тонкостях его науки осведомлены все.</p><p class="p1">И астрофизик принялся объяснять, что немец Брафф — не фашист, конечно, еще в двадцатые! — предположил, что львиная доля мира для нас невидима, поскольку состоит из частиц, не воспринимаемых нашим взглядом, не регистрируемых нашими приборами, вообще не доступных человеческому знанию до той поры, пока мы не начинаем замечать их разнообразные влияния. Тут он принялся сыпать такими терминами, что Шелестов понимал едва десятое слово: выходило, что они как-то отклоняли свет, что огромные их скопления во Вселенной засасывали любой мимолетящий объект, и потому-то, может быть, никто из жителей других планет до нас пока не добрался; выходило также, что мы давно бы уже наблюдали самые отдаленные звезды, если бы не скопления этих темных облаков, заслоняющих от нас все самое интересное. Упоминался знаменитый диспут Браффа с Эйнштейном, на котором Эйнштейн сказал: «Бог не станет создавать то, чего не может увидеть человек», а Брафф возразил: «Бог только это и создает, потому что у Бога и человека разное устройство зрения, и видеть главного мы не должны». Тогда Эйнштейн спросил, кривляясь: а как же Бог тогда допустил вас и вашу догадку? Случайность, но ее легко исправить, ответил, горько усмехаясь, Брафф и через неделю был сбит автомобилем, которого не нашли. Дело уже, однако, было подхвачено: во всем мире, в том числе и у нас в Харькове, изучали темную материю. Очень талантлив был молодой Ландау. Вокруг физики, оказывается, кипели такие же страсти, как вокруг литературы, хотя в физике-то, казалось бы, есть объективные данности, — но темная материя спутала все карты, сделав физику такой же таинственной, как лирика. Революционней всех были работы молодого Хаусмана, предположившего, что хотя Эйнштейн и не понял выкладок Браффа («Между нами — еврейская физика вообще очень упряма и от своих умозрений отказывается с трудом»), но методы самого Эйнштейна были к темной материи вполне применимы, «и здесь начинается главное».</p><p class="p1">Нильсен даже остановился и посмотрел на Шелестова в упор:</p><p class="p1">— Смотрите. Если связь пространства и времени давно уже не гипотеза, а общеизвестное уравнение, то помимо темного, ненаблюдаемого нами пространства ДОЛЖНО СУЩЕСТВОВАТЬ И ТЕМНОЕ ВРЕМЯ!</p><p class="p1">И, словно сам ошеломленный этим выводом, отступил на шаг и развел руками.</p><p class="p1">— То есть, то есть! — воскликнул понятливый и тоже потрясенный Шелестов. — То есть некоторую часть времени…</p><p class="p1">— Мы не наблюдаем! — кивнул Нильсен. — Мы живем во Вселенной, как бы в кукольном картонном домике, где на стенах нарисованы для нас звезды, солнце, деревья, нравственные законы. Но настоящая Вселенная лежит за стенами домика, и о ней мы едва-едва начинаем догадываться. Нужно нечеловеческое зрение и уж вовсе нечеловеческое воображение, чтобы представить себе этот мир, в котором нам, живым созданиям, места нет. В сутках может быть вовсе не двадцать четыре, а, например, тридцать три часа. И припомните — много ли мы помним из каждого дня? Те, кто не ведут дневников, вообще ничего вспомнить не могут, а те, кто ведут, знают, что они туда-то поехали и с тем-то говорили, в лучшем случае о том-то думали, как Толстой. Большинство людей видит лишь себя. Вот навстречу нам прошли несколько человек — вы их заметили?</p><p class="p1">— Как же, заметил, — сказал Шелестов. — Темно, правда, но ничего особенного. Семеро. Сначала женщина одна, в руке сумка матерчатая, видимо, с книгой. Потом двое явно местных, один с бородой, другой в белой панаме, лет по пятьдесят. Еще один потом, на лбу шрамик, очки, похож на учителя, и трое подростков по пятнадцати где-то, очень тихие, странные.</p><p class="p1">— Писатель! — развел руками Нильсен. — А я и не заметил ничего…</p><p class="p1">— У кого какой дар, — скромно сказал Шелестов. — Это потому, что я себя совсем не вижу, на себя не смотрю, все на других. Так, наверное, надо романисту. Если б я стихи писал, то был бы, наверное, самоуглублен.</p><p class="p1">— Вот видите, — словно его теория подтвердилась, обрадовался Нильсен. — Вы все про других, а про себя могли и не помнить. У вас была эта Анна, но поскольку дело касается только вас, а не жизни, не литературы, — вы про нее и забыли. А потом ваше подсознание вам подсунуло ее с этой родинкой, и вы ее описали, потому что у писателя все в дело.</p><p class="p1">— Ну, знаете, — выдохнул Шелестов после паузы. — Если б у меня такая была, я бы не забыл.</p><p class="p1">— А откуда мы можем знать? Может быть, мы как раз забываем самое главное, чтобы потом не мучиться, — сказал Нильсен с неожиданной болью. — Я любил один раз, до жены. И я совсем ее сейчас не помню — ни имени, ни лица, ни тела, ничего. Я узнал бы ее из тысячи, но это если бы мне показали. А если бы нет, вот сказали бы — нарисуй… нет, ни одной черты. Почему? Потому что жить и помнить было выше сил…</p><p class="p1">— Да ну нет, — поморщился Шелестов. — Чтобы совсем забыть, как с нуля? Этого быть не может.</p><p class="p1">— Но как же не может! — горячо зашептал Нильсен. — Как же не может! Смотрите, вот все эти люди, которые теперь признаются. Ведь это явные враги. Но вспомните, как упорно они все отрицали, как на допросах их приходилось ставить перед очевидностью, ведь все же есть! Но вот они не помнили. И я даже думаю, что они в остальное время искренне считали себя честными советскими людьми. Мозг сам от себя закрывает, а может быть, самые темные дела, самые страшные вредительства как раз и попадают в темное время!</p><p class="p1">Себя спросите: стараетесь вы помнить свои грехи? А может быть, есть уже и приборы, — ведь это Германия, там осталась школа Браффа, и некоторые теперь, возможно, служат фашистам, — может быть, есть уже и машина, позволяющая воздействовать на ум, и в темное время попадает все, что вы делали по их заданию? Но когда их поставили перед очевидным фактом, или применили силу, или перестали, может быть, кормить, — я считаю, что в таких случаях все методы оправданны, — они тут же и вспомнили, нет? Величайшее счастье человека, что он не все помнит, что не все время работает механизм восприятия. Если бы мы все воспринимали, нельзя было бы жить!</p><p class="p1">«Сумасшедший, — с ужасом подумал Шелестов. — Я один с сумасшедшим в горах на пустой лунной дороге». Луна светила ярко, тоже как сумасшедшая.</p><p class="p1">— Впрочем, — буднично сказал Нильсен, — все это гипотеза, и Хаусман сам небезупречен. Он немного идеалист. Видите вы, кстати, этот кратер на Луне? Считается, что все это следы от метеоритных столкновений, так считает Станюкович, гениальный студент. Но есть еще версия, что все это скрытое послание, что и Луна, собственно, присланный нам в виде небесного тела след от другой цивилизации, так думает один очень занятный палеоантрополог, с которым вам непременно надо познакомиться. Вообще, знаете, современные научные силы…</p><p class="p1">И они неспешно, несуетно отправились обратно.</p><p class="p1">Шелестов часто вспоминал потом этот разговор. И когда все вокруг начали признаваться в том, чего быть не могло, — он думал о темном времени и допускал: чем черт не шутит. Днем пишет, а ночью взрывает. Господи, если бы мы помнили все, что делаем, — кто вынес бы?!</p></span>
