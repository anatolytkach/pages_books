<p class="p">12 октября 1925, Ростов</p>
</div><p class="p1">Рукопись пришла на его имя в газету «Молот», где Шелестов печатал фельетоны и главы будущего «Марева степного», с запиской: так и так, мне кажется, что вы сможете лучше других закончить эту повесть. Почерк был незнакомый — что в записке, что в повести. И Шелестов кинул бы рукопись в корзину, как много раз уже кидал, — ему писали почему-то главным образом сумасшедшие, словно чуяли тайное родство. Он знал за собой странности — удивительно было, откуда они-то знали? Разве в запятых, в строе речи что-нибудь прорывалось… Но первую страницу добросовестно прочел — может, из тайной надежды, знакомой каждому автору, что вот явился второй. Тяжело быть единственным гением, шутил про него Пименов, главред «Молота», — а что ж, и вправду тяжело. За первой прочел вторую, а там и всю главу, и так зачитался, что не сдал в срок фельетона про комсомольца Бугрова, которого в Буканове приняли за ревизора.</p><p class="p1">Не сказать, чтоб было очень хорошо. Не Лермонтов, которого Шелестов в тайной внутренней иерархии ставил повыше Пырялова, но что-то было в этих «Порогах», чего ему именно сейчас и не хватало. Словно знал, но забыл, умел, но утратил. То ли в ритме было дело, плавном, нескором, точном, то ли в словесном подборе — Шелестов впервые тут понял, что такое это самое слово на месте, про которое им все уши прожужжал на рабфаке длинноносый нудный Баренцев. Как на крючке, повисала на конце каждой главы единственно точная фраза. Сложное было чувство: Шелестов словно шел по канату, и каждый шажок грозил оборваться в пропасть — вот не то скажет, слишком общо или мимо, но автор не обманул его ни разу. Это была первая книга про недавнее время, действительно хорошо написанная. Он сам бы так писал, если б мог. И в «Мареве», он знал, есть уже куски, которых не стыдно, — но «Марево» писал еще начинающий, а тут виден был опыт. Человек знал столицы, знал помещичью и генеральскую жизнь, повоевал на Отечественной, которая звалась теперь Империалистическая, и покрутился в донском пекле девятнадцатого года, про которое, впрочем, писал смутно. Оно и понятно — он был на той стороне, а на той стороне где ж видеть всю картину? У Шелестова самого имелись по этой части, правду сказать, пробелы, он после ранения не все помнил, потому что память людская милосердна и стирает лишнее. Но даже если они в мае месяце и допустили некоторого лишку, когда чистили Вешенскую после мягкотелых инзенцев, не на этом надо было сосредоточиться. Не на этом. Правильный взгляд диктует нам забирать шире, с учетом всей исторической правоты, которую Шелестов уже знал, а безвестный автор знать не мог.</p><p class="p1">Неделю Шелестов читал, неделю думал, за отсутствием обратного адреса ничего разъяснить не смог, на почте ничего не сказали, кроме того, что штемпель новозыбковский, а это он знал и без почты. Шанс был — дважды не предложат: тот самый охват, которого так недоставало ему в «Мареве», и анонимно, без автора, лежит бесхозно, не пропадать же добру! Главное — руки чесались писать: он знал, как сделать эту вещь, где сократить, где, напротив, дописать для развития, потому что автору только и не хватало верного взгляда. Ему все мешали сомнения, встревала лишняя жалость — иногда будто глаза отводил, а надо было кровавее, этого Шелестов насмотрелся. И, подумавши, отправился он к Славскому, главреду, — Славский был человек партийный и сверх того образованный: так и так, наличествует рукопись, но в нынешнем виде печатать нельзя, а в усовершенствованном — можно. Он боялся, что Славский захочет прочесть и ему тоже понравится, а там, глядишь, и тиснет как свою. Но Славский был совсем не писатель, у него этих амбиций не имелось. Читать он тоже не стал — торопился в Москву, — а Шелестову сказал: «Чего ж не взять? Ты только, сам понимаешь, обработай».</p><p class="p1">— Но, Владимир Матвеич, — сказал Шелестов, краснея, — я думаю — вдруг враги? Вдруг это нарочно заслано, а они потом — раз! — и окажется плагиат?</p><p class="p1">— Дак ведь ты перепиши, — подбодрил Славский. — Сам же говоришь — нельзя как есть, а когда перепишешь — это уж будет и не плагиат. Ты ж там не просто менять белое на красное, а с проработкой?</p><p class="p1">— Это да, — согласился Шелестов. — Это полный будет поворот взгляда…</p><p class="p1">И работа у него пошла на диво легко — совсем не так, как над несчастным «Маревом», с которым он просто не знал теперь, как разделаться. Через силу дописал он историю своего Матвея, который порешил бабу за то, что шпионила на банду, а мальца, рожденного ею, выкормил сам (сколько смеху было в «Молоте» и в литобъединении над тем Матвеем! — а ничего особенного, тесть рассказывал, что у них в станице казачка умерла родами, а муж ее, пока нашел кормилицу, питал мальца кобыльим молоком).</p><p class="p1">Теперь все вечера у Шелестова были заняты переработкой «Порогов» — он легко, как в разношенный любимый сапог, поместился в чужую повесть, да и не повесть уже, а роман, поскольку обходиться одними только впечатлениями безвестного автора в рассказе о великом всероссийском противостоянии казалось ему стыдно. Он широко пользовался документом, без документа в наше время никакая проза не может соответствовать, — кстати, и собственная его речь начала неуловимо меняться. Он на летучке однажды заметил: вот мы все пишем — показания не соответствуют, уборочная не соответствует… — а чему? Ведь этот глагол требует после себя конкретного слова. Мы все как-то хотим соответствовать, а чему — не понимаем. Посмеялись, но без веселья: правильно ведь сказал. И некоторые, Шелестов заметил, посмотрели на него нехорошо: попал он в точку, в какую лучше не попадать.</p><p class="p1">Дивно было сравнить сочинения Шелестова до начала двадцать шестого — и после, уже, скажем, весною: не то чтобы стал он использовать больше слов или глубже проникать в людскую душу — но изменился сам голос его прозы: вместо петушиного крика — свист и россыпь певчего дрозда! Прежде Шелестов мог написать фельетон — хороший, нет спору, фельетон, со своим ходом, про разговор, допустим, трех пуговиц в портняжной мастерской: одна была на пиджаке нэпмана, другая на буденовке, а третья на рабфаковских штанах; это было дельно, но рабфаковская пуговица говорила, что от студенческих штанов «пахнет молодостью и здоровьем», и даже машинистки прыскали, когда входил Шелестов, — теперь он сам не понимал, как вырвалось у него про эти проклятые здоровые запахи штанов. Он и смотреть стал иначе, словно что-то выискивал в собеседнике, и завел записную книжку для удачных речений, — а когда Славский попросил у него первую часть правленого текста и, ночь не спавши над ним, в двух местах прослезился, то Шелестов и сам понял, что выходит у него небывалое.</p><p class="p1">— Есть у меня дружок еще по университету, — сказал Славский, успевший до революции два года отучиться в Москве. — Он в Москве теперь, в «Красной нови». Пошлю посмотреть, а ты не бросай знай. Если наши тебя будут командировками муторить, так ты скажи — по моему заданию пишешь летопись семьдесят второй кавдивизии.</p><p class="p1">Что, в общем, было недалеко от правды.</p><p class="p1">А Шелестова и просить не надо было. Ах, какое счастливое было лето двадцать пятого года! Как шла у него работа, как гостилось у тестя, как бежал он каждое утро к туманной, обжигающе свежей воде, как плавал до восьми с ликующим щенячьим фырканьем, как до обеда — долгого сельского обеда с непременным последующим сладким сном до сумерек — самозабвенно, от руки писал в саду, кроя чужую фразу, придавая рассказу ширь и глубь, добавляя то единственно верное, что, казалось, мог знать он один; конечно, материал был выдающийся, но сырой, сырой! Видно, что писано очень молодым, многое повидавшим, ничего еще не понимавшим. А потом наступал тревожный сумеречный час, и тесть зажигал керосиновую лампу, об которую бились страшные, несчастные, беспомощные мохнатые существа; «не на свет летят, а на тот свет», — шутила теща, большая затейница.</p><p class="p1">Сумерки гнали Шелестова из дому: он быстро, почти бегом, срывался в степь, смотрел, как ночь наползает оттуда, как первые звезды проступают в разрывах облаков, как темная конница налетает на станицу, неся то ли страх, то ли счастье, а верней всего то и другое. Ведь и мохнатое чудище, влетая в огонь, попадает на свой тот свет и через миг ужаса просыпается счастливым, на райском каком-нибудь лугу. И потом еще два часа, лучшие за весь день, по результату уж точно, писал он в их с женой комнате, а она не смела торопить, любовалась, как, упершись в левую ладонь крутым смуглым лбом, правой он стремительно, почти не останавливаясь, перебеляет, черкает и правит. Из трехнедельного отпуска в Балашовке привез он сто шестьдесят рукописных листов, больших, желтых, — много приключений было суждено этим листам, — и машинистки, которым отдал он на перепечатку вторую часть, при его появлении уже не прыскали, а смотрели чуть не с испугом. Младшая, Валя, в коридоре поймала его однажды и обратилась на вы, по отчеству, что в «Молоте» принято не было: Кирилл Александрович, нельзя ли все же так сделать, чтобы Панкрат с Анфисой… а? Дурочка, хотел высокомерно улыбнуться Шелестов, разве же мы можем по читательскому заказу… но вместо этого вполне писательского ответа вдруг улыбнулся детски-счастливо и сказал: Валя, если хочешь, то, конечно. Я и сам, по совести, так хочу.</p><p class="p1">А в августе приехал порыбачить Филимонов и, отчего-то стесняясь, сказал:</p><p class="p1">— Так вот вы какой… Действительно, совсем юноша. Прямо как этот у вас, «Недостреленок». Что же, как вторая часть? Просто, знаете, самому интересно. Продолжайте, будете наш, — и усмехнулся кривовато, — «красный» Толстой.</p><p class="p1">Но после второй части уже не усмехался, долго жал руку, ударил вдруг по плечу и сказал:</p><p class="p1">— Вот оно! Вот ради чего мы… а, Матвеич?</p><p class="p1">И Славский улыбнулся с отеческой гордостью, а Филимонов вдруг сказал:</p><p class="p1">— Нельзя ли только, понимаете, чтобы Панкрат все-таки эту Анфису послал подальше?.. Нехорошо выходит.</p><p class="p1">И Шелестов, сжав губы, твердо пообещал, что Панкрат не будет больше шастать к чужой жене, а выйдет на твердую дорогу.</p><p class="p1">А в ноябре вышел тот самый номер «Красной нови», и понеслось.</p></span>
