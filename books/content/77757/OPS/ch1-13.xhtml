<p class="p">15 августа 1929, Москва</p>
</div><p class="p1">«В огненно-лазоревой глубине неба махрилось, клубясь, кипенное облако, смотрелось в зеркальную зелень Дона, гладко застывшего в полуденной тишине Троицына дня, и коршун бурыми упругими полудужьями крыл обозначался вдали, словно без него, едва намеченного в густом куреве у горизонта, не так чувствовалась бы потная, истомная жара, не так ярко блистал бы на выгорающей степи ковыль».</p><p class="p1">Шелестов перечел, как художник, отходя, смотрит — что, поймал? Поймал, но ловить ему было сейчас уже мало. Он чувствовал, что может, что сам слегка пропотевает, весь уходя в жаркий лютый день двадцатого, когда Панкрат возвращался на хутор Ягодный, а между тем Анфиса-то с Петром! С Петром она, чудом спасшимся, пришедшим из плена, приплывшим из самой Франции, где оказался он после мира; и даже появилась у него там баба, рослая, справная, но потянула смертная тоска назад к Дону, и он пришел, и Анфиса, покуражившись, вернулась к нему. Это уж она в третий раз к нему возверталась. А тут Панкрат, мало ему законной жены Татьяны, румяной, дородной, родившей ему трех сыновей, или двух, Шелестов тут немного путался. Его не это занимало, дети вообще не главное. Главное, что тянула, томила Панкрата эта Анфиса, бывают такие бабы, что не отделаешься. И Шелестов знал, нутром чувствовал эту бабу, хотя в жизни ему, слава богу, не встречалось ничего подобного. Он вообще, надо сказать, по женской части жил скромно, как закрутил с Манюней, так на сторону ни-ни. Но что значит писатель! Он просто вот знал, какие они бывают, видел словно перед собой эти темные, немного вывернутые губы, хотелось назвать их негрскими, и почти белые на смуглом лице глаза, хотелось назвать их бесстыжими, и неожиданно маленькие, при широких бедрах, тугие груди, хотелось назвать их титьками и мять долго, больно. И много еще чего хотелось назвать. Откуда-то он знал про нее все, как кричит в любви, как спит потом беспамятно, по-детски беспомощно, открыв рот, тоже печальный, вдруг детский, и как царапает спину Панкрату (и Петру, стервина, Петру!), знал даже — придумал! — шрам на высокой блестящей голени от серпа, в отрочестве порез, едва кровь уняли.</p><p class="p1">Анфису он сам хотел, притом как человек она ему не нравилась. Да и была ли она, собственно, человек? Она демон была на нашу погибель, милый демон, как названо у Пушкина. Сейчас как раз читал, Лаура точно такая. Он пересмотрел вступительную фразу трудной главы, хлебнул ледяного квасу, поскреб темя — ранняя начиналась лысина, проклятие всех кучерявых, молод еще казак! — нет, цветисто. Оно и надо бы цветисто, поздняя весна, цветет степь, — но любовь-то уж отцветает, вон и Петро какой вернулся сутулый, сухой, не по-нашенскому одетый и словно припыленный пылью всех жарких городов. И возрастом его уже присыпало, в глазах, в радужках даже пеплинки. И он убрал огненно-лазоревость, оставил только глубину. В глубине неба махрилось, клубясь, как и в жизни Панкрата клубилось, махрясь. Облако здесь нужно было, он чувствовал, оно держало все небо, как и махрящаяся жизень Панкрата держала на себе всю картину гибели тихого Дона. Ведь зачалось все, он понимал теперь, не тогда, когда поделились на красных и белых, а когда Анфиса впервые стала бегать к Панкрату. Он бегал от красных до белых и обратно, от Татьяны своей до Анфисы, и на этом теперь все удерживалось, вся Гражданская война. А Петро, законный Анфисин муж, не удержавший такую бабу, не находил себе теперь места: за границей нет ему приклону, а в хуторе Ягодном кому же он теперь нужен. Что-то нехорошее чувствовал в нем Шелестов, в чем-то он, Петро, сам был виноват, как в революции царь Николашка. Шелестов сам еще не знал, куда теперь денется Петро. Ясно же, что Анфиса с ним не улежит. Он ее только бил, как есть Николашка, а Панкрат был ласковый. «Ты на любовь дюже способный», — говорила одна щедрая телом жалмерка, утешенная им на долгом безмужье проездом через хутор Галдячий.</p><p class="p1">Тревожил коршун. Это уж обозначался Панкрат. Но — бурый? Шелестов знал, что для темно-кирпичной спины коршуна нет другого слова, однако бурый бывает медведь, закрепил бурость за собою намертво, и он заменил вначале на темно-кирпичный, потом оставил как было, потом вычеркнул определение вовсе. Как трудно стало писать! Раньше перо само бежало. И не потому только, я уверяю вас, что писал по чужому, поверх, а потому, что появилась теперь требовательность к себе, чтобы каждое слово увязывалось с другим, чтобы выходила стальная цепь, кольчужка. Он перечел давеча первый том — там-то легко, с лету, находилось музыкально верное слово; но ведь там и время другое, Анфиса с Панкратом молодые, даже Петро еще не такой заскорузлый. Теперь шло туго, как и жизнь туго идет на крутом изломе к тридцати. А после тридцати какая там жизнь? Надо было это дать почувствовать, потому что и переход от мая к июню есть уже перелом года, а тут ковыль блестит. Блестеть ему не время, и Шелестов вычеркнул весь этот сверкающий хвост. Вписал: «не так пуста была выгорающая степь». А что степь? Выбросил совсем. Тут надо нам сосредоточиться на стеклянном, гладком Дону, застывшем перед бурей: Панкрат идет, он вам щас покажет! И он еще подчеркнул: «непобедимою прохладой стынущего в полуденной тишине» — потому что там, на глубине жизни, никакие наши страсти не согреют вечного холода, хоть ты тут пополам разорвись со своей Анфисой. Но перечел — что такое, какой-то прямо Кнут Гамсун! Короче, ибо вот уж полчаса он тут с этой камертонной фразой мучится, три папиросы прикурил одну от другой, а Панкрат еще не идет на Ягодный, а его ждет многомиллионный советский читатель. Но с другой стороны — зачин должен быть мирен, долог, чтобы тем внезапней ударила встреча; и он сделал так:</p><p class="p1">«В пылающей небесной глуби Троицына дня махрилось, клубясь, кипенное облако, смотрелось в зеркальную зелень непобедимо стынущего в полуденном покое Дона, и коршун бурыми упругими полудужьями крыл обозначался вдали, словно без него, едва намеченного в густом куреве у горизонта, не так чувствовалась бы потная, истомная жара».</p><p class="p1">Так было короче, но лучше ли? Недоставало густоты, долженствующей передать загустевший жаркий воздух, полный запахов и предчувствий. Он нуждался теперь постоянно в одобрении, но не на каждую же фразу искать одобряющего читателя? Не к Муразовой же бежать с каждым новым зачином? Она болела за книгу, он видел, но меньше десяти страниц кряду показывать вовсе уж было смешно. Странно, что теперь, в полной свободе распоряжаясь своими возможностями, не мог он выбрать единственный вариант — слишком их было много. Легко играть, как пастух на дудочке, ничего другого не умея, — а теперь, умея все, что ты выберешь единственное? Над ледяным в жару… хорошо, тут контраст, у нас и дальше будет все на контрасте… над ледяным среди жары, зеркально-зеленым Доном махрилось, клубясь… Ледяным — нет; лучше стынущим. Над стынущим среди жары… стеклянно-сонной жары? это перебросило бы мост к стеклянности Дона. И хотя августовский день стоял прохладен, Шелестов совсем вспотел.</p><p class="p1">Поприкидывав так и сяк, он решительно ввинтил в угол упрямого рта шестую папиросу и на новом листе вывел:</p><p class="p1">«Жаркое небо с единственным облаком смотрелось в ледяное зеркало Дона, да коршун едва виднелся на горизонте, когда Панкрат…»</p><p class="p1">Это было уже ничего, тут была упругость. Но что же, Панкрату делать нечего, как смотреть на коршуна? Не о коршуне должна была болеть смоляная его голова, напеченная майским солнцем. И что это мы тут вообще с пейзажем? В молодости еще позволительно пейзажничать, а зрелые люди думают о людях. Не пишется пейзаж — так брось его. И на новом листе тверже прежнего он вывел:</p><p class="p1">«Жарко было, да одинокое облако плыло над Доном, когда на усталом четырехлетнем жеребце подъезжал Панкрат к родному хутору».</p><p class="p1">Ничего, подумал он. Жарко было. Тут тебе и облако, и ледяная стынь, и Анфиса с Петром.</p></span>
