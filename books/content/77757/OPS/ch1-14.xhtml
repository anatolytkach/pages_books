<p class="p">17 апреля 1930, Москва</p>
</div><p class="p1">После похорон Маяковского в малом буфете дома Герцена собрались, не сговариваясь, недавние члены шелестовской комиссии: Воронов, Борисович, Пырялов, Гребенников, Сосновский — и подсевший к ним длиннолицый, иронический драматург Гердман, происхождения не еврейского, как думали иногда, а скандинавского. В самом деле, был он беловолос, синеглаз и, как истинный викинг, молчалив, но если уж острил, то жестоко: наклеенные им ярлыки не отдирались. Он был явно из бывших, но без вечной виноватости, присущей этой породе: напротив, во всем, что он делал, сквозило сознание правоты и чуть ли не вызов. С вызовом он ходил на бега, играл и выигрывал, с вызовом, будучи женат, открыто ухаживал за первой красавицей второго МХТ Васильевой (а жена его, зубной врач, тоже роковая красавица, дико и молча ревновала, спала по очереди со всеми его друзьями, но отказаться от викинга не могла). Другой бы с таким набором качеств гляделся циником, а Гердман — романтиком, несбывшимся гением: говорили, что втайне и для себя он пишет какое-то ого-го, хотя зарабатывал эстрадными скетчами и сценариями ревпразднеств, такими откровенно плохими, что и в этом виделся вызов. Женщины его обожали, мужчины побаивались. Сам покойный Маяковский выделял его из толпы почитателей, вызывал на бильярдные соревнования (игромания — проклятье неуверенных в своем праве быть!) и сносил язвительные выпады. Гердман и сегодня отличился.</p><p class="p1">— Как вы думаете, от чего все-таки… — заискивающе спросил молодой журналист Бескин, чья пьеса «Стальной километр» только что пошла у Таирова.</p><p class="p1">— На венки смотрели? — процедил Гердман. — «От Левого фронта», «От РАПП», «От Советского правительства»…</p><p class="p1">За всеми столиками малого буфета пили главным образом водку, которую покойник не переносил, пересказывали сплетни, от которых он умолял воздержаться, и вообще делали все, чтобы ощущение сомкнувшейся над ним чуждой жизни казалось как нельзя более полным. В этом упоении скотством сквозила своя правда: вместе с ним хоронили последние иллюзии. Раз уж он в этом новом мире не выдержал, нам и пытаться не стоит. Скорбной попойкой правил экстаз падения.</p><p class="p1">— Я, наверное, не должен признаваться, но в тот день первая моя мысль родилась — правильно сделал, — сказал мрачный Воронов. — Когда не можешь больше писать, надо окончить так.</p><p class="p1">— А что, смысл — только писать? — спросил Сосновский. — Писать, может, — вроде болезни, как амбра у кашалота. Мог жить просто так, молчать пять лет, потом бы опять набралось… Я, когда не пишется, уезжаю к себе в Заманиху, — тишина, хвоя, народ удивительный…</p><p class="p1">И все дружно подумали, что не может дурной беллетрист не перетянуть одеяла на себя, не заговорить про свою Заманиху, хотя умер другой, несравненно более прекрасный, не спасаемый никакими Заманихами, и все порадовались чужой бестактности, а заодно и своему такту: никто не осадил Сосновского, и слова его повисли в тишине.</p><p class="p1">В этот момент к их столу решительно направился Шелестов.</p><p class="p1">— Здорово, товарищи, — сказал он сурово, словно общее горе снимало барьеры. — Я присяду?</p><p class="p1">— Да пожалуйста, — сказал Воронов.</p><p class="p1">Шелестов подошел потому, что в этом буфете, во всем этом здании не было у него друга: страшное дело, на писательской тризне он мог подсесть только к инквизиторам, чуть не приговорившим дело его жизни. Но не приговорили же! Подтвердили-таки право на любимое детище. Остальные хоть не вслух, молча — но только завидовали; эти же, со всеми оговорками, сняли с него ужасную тень подозрения, и сам он окончательно поверил в свою правду.</p><p class="p1">Он не испугался даже Гердмана, который, кажется, за его спиной язвил: мол, единственный дозволенный жанр сегодня — роман-эпопея «Обивая пороги». За спиной-то острить все горазды, а ты поди издай хоть строчку, напиши хоть пьеску. Для себя, в стол… — а в столе небось всего и есть две тыщи для фининспектора, как у Маяка в прощальном письме, очень, кстати, пошленьком, тоже мне самоубийство. Есенин хоть стишки написал, хоть и так себе, а этот вообще — две тыщи… Еще на Есенина ворчал, учил его, что надо жить. Вот, доучился. Инцидент исперчен. Беспризорники уже распевали: «Как говорится, инциНдент исперчен, и лодка любовная разбилася о быт. В столе две тыщи, их фининспектор сыщет, а остальное Лиле Брик».</p><p class="p1">Но Шелестов молчал про все это, только пил и глядел в пол. Ему хотелось послушать, что другие скажут. Его радовало теперь всякое новое доказательство мелочности писательских натур, мещанская мишура мыслишек. Маяковский был не Бог весть что, это по молодости, в «Молоте», Шелестов им увлекался, а серьезному писателю и читать его всерьез было неприлично. Что такое, одна истерическая любовь да лозунги, но не вслух же об этом. Он ждал, пока другие то же скажут, — тогда можно либо красиво осадить, либо сдержанно присоединиться, он не решил еще.</p><p class="p1">— Беречь, надо беречь, — горячо заговорил Борисович, маленький и очкастый. — Я, знаете, даже как думаю? Вот те, кто его прямо травил, критики, которые ничем другим не занимались… И этот Шенгели, ничтожество… И эти крики, что исписался, — от тех, кто в жизни ни строки… Надо сейчас просто уголовное наказание. С писателями разговаривают как в приготовительном классе. А если бы одного сейчас взять за шкирман — доведение до самоубийства, ведь это есть в Кодексе, — уже не смели бы, а?</p><p class="p1">— Да разве от хамской статьи кончают с собой? — угрюмо возразил Пырялов, не поднимая глаз и чертя пальцем на мокром столе. — Это я не знаю, какое самолюбие надо иметь, чтобы от газетной статьи стреляться. Нахамили — так пошел морду набил.</p><p class="p1">— Не все могут морду, и всем не набьешь.</p><p class="p1">— А как убережешь? — задумчиво сказал бытовик Макаров от соседнего стола, бывший фельетонист «Сатирикона», знавший Маяковского по тем еще временам и ездивший с ним в четырнадцатом году по югу России. — Травля что, последняя капля. Газетная статья тогда трогает, когда в себя не веришь. А тут уже ничем невозможно помочь.</p><p class="p1">Как точно, подумал Шелестов. Я верю, в этом дело, вот меня ничто и не берет.</p><p class="p1">— Как, товарищ Шелестов? — спросил вдруг Гребенников. — Когда третьим томом обрадуете?</p><p class="p1">— Да что ж про меня-то, — уклонился он. — Не по мне поминки.</p><p class="p1">— Но интересно же, — не отставал Гребенников. Шелестов все знал про его гадости, знал, что он больше прочих сопротивлялся оправдательному выводу. — Хочется знать, чем кончится.</p><p class="p1">— А вот этим и кончится, — зло сказал Шелестов, обводя рукой буфет. — У всех этим кончится.</p><p class="p1">Он поймал на себе испытующий, но в общем одобрительный взгляд Гердмана и осердился на то, что так этому радуется. Кто такой вообще Гердман, как еще его пустили сюда, что написал такой писатель?</p><p class="p1">Но Гердман вдруг заговорил — и все, даже с соседних столиков, умолкли и прислушались, словно понимали, кто тут писатель.</p><p class="p1">— Я думаю, как хорошо было бы то, что написал бы Маяковский после самоубийства, — сказал он так, словно посмертное сочинительство — самое простое дело. — Как много лишнего осталось бы за бортом, какой был бы чистый звук. Как его ничто не волновало бы, кроме главных вещей. Я уверен, что после смерти все вообще писали бы лучше, потому что нечего больше бояться. Но после самоубийства — это, должно быть, совсем особенное. Ведь мы все с этого начинаем. Кто не убил себя — тот не может ничего написать.</p><p class="p1">И он почему-то в упор посмотрел на Шелестова — у того мороз пробежал по шкуре.</p><p class="p1">— Каждому надо убить себя, — повторил он грозно, или Шелестову показалось? — Я напишу когда-нибудь про самоубийцу. Как бы мы все писали, боже мой, если бы убили себя… И как бы мы жили. Только тот стал человеком, кто написал себя заново, поверх вычеркнутого…</p><p class="p1">И больше не открывал рта до глубокой ночи, когда стали расходиться. Шелестову очень стало не по себе. Он часто потом вспоминал эти слова, и особенно то, как Гердман взглянул на него. Ему и в голову не могло прийти, что Гердман смотрел не на него, а просто в окно. Не на эти же рожи смотреть серьезному человеку.</p></span>
