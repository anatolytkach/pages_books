<p class="p">15 декабря 1928, Ленинград</p>
</div><p class="p1">…Но в «Астории», где поселила его для переговоров с режиссером ленинградская фабрика Совкино, стали Шелестова мучить кошмары, и было это, надо полагать, следствием чрезмерного увлечения работой над пресловутым Ракитным. Он всю вторую часть третьего тома думал отдать под это сражение, о котором почти не писали, потому что никто в нем до сих пор не разобрался. Оно противоречило всему, что говорилось о военном искусстве. В нем не было никакого смысла. И только для Шелестова, для него первого, это кружение вокруг крошечного населенного пункта и страшная бойня, разразившаяся под ним на ровном месте, были лучшим символом всей войны — тяжкого, долгого самоуничтожения: словно пьяному во хмелю явился спасительный путь, а стрезва он увидел, что это дорога к выгребной яме, и вот он лупит, лупит башкой о стену в ненасытной и все же недостаточной жажде гибели. И умереть жалко, и жить нельзя. Так же было и у Панкрата с Анфисой: никакой не было моченьки жить с нелюбимой дурой Татьяной, а кинуть детушек он жалковал, и тянулась промеж них эта безвыходная несносность, от которой то с кулаками, то со злой похотью кидался он уж и на Татьяну, и на Анфису, а уж как рубал шашкою то белых, то красных — степь дрожала.</p><p class="p1">В третьем томе Шелестов такого достиг, что сам иногда, запозднившись, чувствовал нечто вроде священного озноба: промозглый Ленинград лежал за окном под тяжестью набрякшего, водянистого снега, не звенели трамваи, не горели окна, и Шелестову казалось, что он бодрствует один и силой собственного воображения создает и город, и зиму, и, чем черт не шутит… Богом он был в те последние дни двадцать восьмого, и даже комиссия по авторству не волновала его, а волновал один сон, который стал вдруг неотвязно повторяться именно в эти вершинные его недели.</p><p class="p1">Он будто шел по Кудасову полю под Ракитной — там, баяли старики, прежде стоял богатый хутор старика Кудасова, убившего сына то ли из ревности (старик был, по наговорам, снохач), то ли что ему привиделось на ровном месте, навели наваждение, сглазили, потому что он еще ходил в ближнюю деревню к одной вдове — так могла вдова; вообще место выглядело мрачным — открытая всем ветрам, лысая, ровная, как блин, степь близ Воронежа и два одиноких кургана, особенно страшно, что именно два. После страшной гибели Кудасовых — отец зарубил младшего брата и его жену, отца зарубил старший и повесился, таких трагедий немало случилось тогда по югу России, особенно почему-то в Царицыне, Воронеже, Ростове, — никто не селился на поле, земля запустела, сорок лет не зная плуга. Там-то, на месте смертоубийства, на окаменелой земле бывшего хутора, от которого и фундаментов не осталось, схлестнулись намертво четыре силы — красные, банда Игнатьева, белые и анархист Балашов. Никакого порядка боя, никакой цели в нем не просматривалось — крошили друг друга в капусту, так, что спаслось не более трети, и долго потом расползались, не претендуя на победу, молясь, что живы. И вот ближе к ночи, стремительно, как балашовская конница, наступавшая на степь с запада, он шел будто бы по Кудасову полю, каким увидел его в творческой поездке по памятным местам, шел, оглядывая трупы (раненых не было — расползлись, что ли?) и вслушивался в тихий, все нарастающий стон. Кому там стонать — ведь все вокруг недвусмысленно мертвы, так и застыли, подрубленные шашкой, скошенные пулей, кто обняв землю, кто на спине, уставившись в пыльное небо; лица у всех были черно-земляные и странно сосредоточенные, словно и теперь они продолжали гадать, что станет после смерти, и от этого их собственного последнего решения зависит загробная участь. При жизни все не хватало времени, в бою тем паче — и вот теперь в смерти им первым делом предстояло понять: есть что-нибудь или нет; и судя по хмурым, озлобленным лицам, ничего не оказалось.</p><p class="p1">Вот он вглядывался — Мокей, значит, и ты, Мокей, шутник, легкая душа, утешение автора, всегда мог разрядить беду, зашутковав, а то затянув бескрайнюю дорожную песню, но и тебя настигла шальная свинцовая оса, пробила шею справа. А вот Стасевич, белая сволочь, не лишенная, впрочем, эффекта и лоска, — Шелестов с трудом его узнал, поскольку пуля угодила Стасевичу ровно в глаз; эх ты, Стасевич, я думал, ты перекуешься! Кто воюет не за белое дело, а ради удовольствия, тот может оказаться и наш. А вот Германова, ах ты, боже мой, анархистка Германова, смертная, до укусов, любовь батьки Балашова, — и ты нашла погибель в авангарде его конницы, и меткая пуля сшибла тебя с тачанки; на черно-синем лице страшно белели оскаленные зубы. А кто же это все-таки стонет? Кто один тут стонет за всех? И Шелестов метался по полю, натыкаясь то на неведомых убитых, то на собственных героев, еще даже из «Марева», — вон он, казачок Кулема, порешивший собственную бабу за связь с белой контрразведкой, — а сам все искал, откуда идет стон, и нашел наконец.</p><p class="p1">Перед ним лежал на животе, спрятав лицо в ладони, смутно знакомый и явно живой — он и со спины узнал этого живого, ибо никого на свете не любил и не ненавидел так, как его. И прежде еще, чем наклонялся он к раненому, чем вглядывался в его черно-синее лицо, — он уже знал тайным сонным знанием, что это и есть самое страшное, то, чего он боялся, себе не признаваясь, и в чем с самого начала был уверен. Наклонялся он, значит, и переворачивал живого мертвеца — и как раз в миг, когда готовился увидеть его лицо, просыпался в липком поту.</p><p class="p1">Он включал лампу с розовым абажуром, старорежимную лампу, которую и гасить потом на ночь перестал — так и спал при ее бледном свете, вроде и уютном, а на деле вон каком тревожном; вскакивал на кровати и умолял незнамо кого — хватит, что со мной, ведь я, я не мог оказаться там! И к шести утра наплывал блаженный сон, уже без видений; но каждую ночь, проработав до двух, он падал на кровать — и шел, шел между двумя адскими курганами, в которых, он знал теперь, захоронены старые враги, чья вражда не кончилась и ничем не разрешилась, вот и бьются между ними новые поколения, насыщая древнюю жажду; шел — и неизменно находил среди мертвых того, чье лицо знал лучше всего на свете, того, кто каждое утро смотрел на него из зеркального овала в бронзовой безвкусной оправе.</p></span>
