<p class="p">20 июля 1930, Подмосковье</p>
</div><p class="p1">После нескольких часов немилосердной тряски огромный черный «Мерседес» вырулил на идеально укатанную дорогу. Теперь наконец можно было оценить вид из окна: бескрайние поля до горизонта, рощицы, залитые поднимающимся солнцем. Зарубежный гость думал о том, что такой простор принуждает к широте души, он-то и заставляет человека ставить перед собою экстремальные задачи. Масштаб во всем, вот что особенно поражало. Масштаб впечатлил его и в Америке, но там он был другого рода, более, что ли, спокойного, огромные пространства были дружелюбны, они будто говорили американцу: «Смотри, это все твое». Русские же поля и леса высокомерно замечали: «Попробуй-ка, сравнись с нами».</p><p class="p1">Вскоре на обочине показался деревянный щит, на котором алыми буквами значилось: «Добро пожаловать в сельскохозяйственную артель „Красный серп“». Краска на щите еще не просохла и блестела, подтекая.</p><p class="p1">— Петр, почему серп красный? — спросил он у переводчика, маленького розовоносого человечка с намечающейся лысиной.</p><p class="p1">— Серп — крестьянское орудие. Он красный от крови крестьян, пострадавших за большевизм.</p><p class="p1">— Как же это? Что же они, сами себя — серпами?</p><p class="p1">— Умирая, они орошали серпы своей кровью, потому что до последней минуты не выпускали их из рук, — не моргнув глазом ответил Петр Антонов. Переводчиком он был опытным и мог не только перевести, но и истолковать что угодно без ущерба для родины и для своей шкуры. — Приехали. Сейчас пойдем к председателю.</p><p class="p1">«Мерседес» остановился напротив красного здания казенного вида. Рядом со входом стояло ведро с остатками краски. В окне колыхнулась занавеска, а через секунду двери распахнулись, и на пороге появился улыбающийся во все зубы высоченный товарищ в буром пиджаке. Протянув руку, он широкими шагами подошел к автомобилю, из которого выгрузился первым переводчик, затем пожилой иностранный гость, следом — двое серьезных молчаливых мужчин, которые назывались «сопровождающими». Шофер выбрался последним, закурил папиросу и картинно оперся на капот, подставляя мужественное лицо солнцу.</p><p class="p1">После пахнущего кожей, бензином и маслом салона воздух колхоза то есть буквально ошеломлял. В нем перемешались запахи сумасшедшего цветения, свежей травы, навоза — и ко всему запах краски.</p><p class="p1">— Добро пожаловать в «Красный серп»! — воскликнул председатель, поочередно пожимая руки гостям. — Это и есть наш писатель? Ну, так сказать, сейчас мы покажем, чего может человек, так сказать, при правильной организации труда и хозяйства. Но сначала чайку! Эк я, забыл же совсем представиться: Георгий Иваныч Лаптев, здешний председатель вот уже как год, стою, так сказать, на службе обеспечения родины питательным продуктом. А что гость-то, по-нашему не балакает? — обратился он уже к Антонову. — Не? Это ты зря, — снова обернулся к гостю. — Надо учить, пригодится. Ну пошли, пошли. Надо чайку, прежде чем с Дарьей Михалной знакомиться.</p><p class="p1">Не умолкая ни на минуту, Лаптев повел гостей внутрь. Антонов переводил выборочно.</p><p class="p1">— У нас тут по-простому, не как в парижах ваших, но, так сказать, чем богаты. — С этими словами он провел их через маленькую комнатку, где за пишущей машинкой сидела румяная девица в красной косынке.</p><p class="p1">— А нам, Верочка, чаечку, и скажи мудаку Гришке, что я ему это ведро в жопу затолкаю, чтоб не бросал где попало, — не переставая гостеприимно лыбиться, сказал председатель девице. Та застучала по ундервуду с утроенной силой, при этом не отводя глаз от иностранца. Чего она там печатала, бог знает. Хорошо, гость не посмотрел, а печатала она вот что: лщвоалдывоплджупомшщу4. Она впервые сидела за сложным этим прибором.</p><p class="p1">За комнаткой обнаружился небольшой кабинет, в котором стоял несоразмерный тяжелый стол, занимавший почти все пространство, так что было непонятно, как туда поместился еще и диван. На этом диване расположились писатель с переводчиком, а серьезные мужчины скромно уселись на стульях. Председатель занял свое место за столом, и выглядел он солидно, особенно когда постукивал карандашом по стопке папок (на самом деле в них была чистая бумага, но гости этого не знали, так что солидность получалась правильная, начальственная). Вошла Верочка с подносом — стреляя глазами по всем правилам, поставила чашки и замешкалась, все не уходя. Антонов пожирал ее глазами, пожрал бы и зубами, но люди, люди, приличия. Чай был так себе, и еще немного мутило с дороги. К тому же монолог Лаптева не прекращался — Антонов переводил добросовестно, как машина, не опуская никаких деталей, бесконечных цифр — а уже страшно хотелось увидеть своими глазами чудеса русского фермерства.</p><p class="p1">Трофима Лысенко Бернард Шоу считал выдающимся молодым ученым, это, пожалуй, был третий человек, с которым он мечтал бы встретиться — после Сталина и Шелестова. Но Лысенко теперь работал в Одессе, занимался яровизацией. Сама идея яровизации была великолепна — что зерно, посеянное при низких температурах, пережившее испытание холодом, закалялось, вызревало скорей и давало более обильные всходы. Это была библейская истина, удивительным образом открытая в стране, отказавшейся от Библии. «Впрочем, не от религии, — поправил он сам себя, — религия всегда одна, но в сотне обличий. Меняются названия, имена богов, суть же остается той же, и в этом смысле коммунизм ближе к христианству, чем что-либо другое. Он даже ближе к Христу, чем христианство. Стремиться к Царствию Божьему, к царству справедливости — разве не это основная цель христиан и советских людей? И пусть сейчас для Запада это выглядит дико — какая великая истина не начиналась как кощунство?»</p><p class="p1">— А в этом году восемьдесят семь сантиметров, представьте только! Вот такенный! Видали вы когда-нибудь огурец в восемьдесят семь сантиметров, а? Вот скажите мне, дорогой мой, какого размера вы ели огурец? Тридцать? Тридцать пять?</p><p class="p1">Задумавшись, Шоу не сразу понял, что от него ждут ответа. Сколько это в дюймах, он не представлял, но догадывался по лицу председателя, что много.</p><p class="p1">— Когда я был ребенком, мать покупала на рынке просто огромные огурцы, они были с мою руку. Но по мере того, как я рос, они становились все меньше, — пошутил он. Но Антонов не понял шутки, и серьезно перевел Лаптеву, что таких больших огурцов за границей не может быть.</p><p class="p1">— Так мельчает и весь ваш капиталистический строй, — строго сказал Антонов, обращаясь к гостю. Кажется, судя по жестам Лаптева, который, хохоча, широко разводил руки, а потом сводил пальцы, показывая что-то совсем уж крошечное, в оригинале ответ был несколько более подробным.</p><p class="p1">Наконец допив, они вышли на улицу. Солнце уже начало припекать. Возле автомобиля галдела толпа детей — шофер, открыв капот, копался в механизме, а мальчишки дрались за честь подать ключ.</p><p class="p1">— Там у нас картофельные поля, — рассказывал Лаптев по дороге. — Посредством скрещивания и отсеивания мы уже, так сказать, на сегодняшний день добились двадцати клубней с куста. Это притом, что на пропитание среднего советского человека при условии соблюдения рациона идет примерно сто сорок клубней в год! А сколько у нас советских людей? А сколько клубней? Только в нашем колхозе! А? Через пять лет советский картофель будет везде, повсюду! А морозостойкие сорта? Приедете, товарищ писатель, в Арктику — и там будет наш, советский красный картофель!</p><p class="p1">— Красный?</p><p class="p1">— А что же, белый выращивать? — опередил переводчик. — Последние белые ростки должны быть вырваны под корень.</p><p class="p1">Красный картофель, размножаемый вегетативно, вырождался с каждым годом, давая все более мелкие клубни, и к тому же страшно гнил, но эти его свойства выяснились намного позже, через несколько лет. В Арктике он, разумеется, так и не вырос.</p><p class="p1">Лаптев тем временем махал руками, приглашая дальше.</p><p class="p1">— Сейчас мы пойдем смотреть теплицы, — объяснил Антонов.</p><p class="p1">Теплицы были похожи на храмы погибшей цивилизации — огромные полупрозрачные конструкции, тесно стоящие, казалось, до самого горизонта. Возле первой, подбоченясь, высилась крупная женщина, тоже в косынке.</p><p class="p1">— А вот наш агроном, Марья Прокофьевна. Обучалась в самой Москве, с Лысенкой знакома, — отрекомендовал Лаптев. Это было уже интересно — хорошо бы поговорить с нею о том, что за человек этот Лысенко. Говорили, что мрачный.</p><p class="p1">— Добро пожаловать на наши огороды, — голос у Марьи оказался неожиданно тонкий. — Вот, товарищ гость, сейчас мы продемонстрируем наши достижения, которых мы достигли благодаря товарищу Сталину и его неусыпному вниманию к проблемам выращивания кормовых культур. Вам Георгий Иваныч уже рассказывал про восемьдесят семь сантиметров? К сожалению, этого огурца вы не увидите, мы его уже отправили товарищу Сталину. Но есть еще несколько — восемьдесят четыре, семьдесят девять и семьдесят шесть — это по вчерашним замерам. Очень важно, чтобы воздух шел, а сквозняков не было. Понимаете? Воздух снаружи должен поступать, но под строгим контролем, потому что если станет больше, чем надо, или очень холодный, или по неправильному пути, то все труды пойдут псу под хвост… Ой, это не переводите, скажите, «будет все напрасно», — запнулась она, но Антонов уже перевел: «внешнее влияние может оказаться губительным для хрупких ростков, которые едва только всходят на нашей почве».</p><p class="p1">Действительно, в нескольких местах были видны приоткрытые окошки, какие-то были открыты полностью, где-то — на щелку.</p><p class="p1">— Катерина! Давай на вторую стадию, солнце поднялось! — крикнула Марья, и молодая женщина забегала вокруг теплицы, дергая за какие-то рычаги — окна стали открываться и закрываться в другом порядке. Это был чудесный, удивительный танец. Они вошли внутрь.</p><p class="p1">Сразу нахлынула духота, несмотря на всю систему подачи воздуха. Вдаль уходили высокие, до крыши, ряды сплошной зелени с обильными бурыми вкраплениями. Отерев пот со лба, Шоу подошел ближе. Бурые вкрапления оказались…</p><p class="p1">— Ну?! Как вам, а? Чай, в парижах такого не видали? — Председатель приплясывал, потирая руки. Первый в мире красный огурец! Идейно, так сказать, верного цвета!</p><p class="p1">Шоу оглянулся. Лаптев, Марья и подбежавшая Катерина смотрели на него с торжеством.</p><p class="p1">— Конечно, это еще не совсем наш цвет, но мы работаем над этим! — звонко воскликнула Марья. — А тот, что мы послали товарищу Сталину, был уже почти красный.</p><p class="p1">— Как это удалось? — спросил изумленный гость.</p><p class="p1">— Это вам вряд ли интересно, — поспешно ответил Антонов, едва Марья открыла рот. — Опыты по скрещиванию и селекции — сами понимаете, предмет трудный, к чему утомительные подробности? Главное — результат. А результат вот он, висит перед вами.</p><p class="p1">Тем временем Марья с Катериной о чем-то перешептывались чуть в стороне, горячо споря, судя по всему. Марья указывала руками куда-то вверх, а Катерина — на гостя. Наконец договорившись, они подошли.</p><p class="p1">— Дорогой наш товарищ Шоу! — заметно волнуясь начала Катерина. Она чем-то неуловимо напоминала Стеллу, хотя говорила как Шарлотта, движениями головы подчеркивая акценты. — Высоко ценя ваш интерес к нашей молодой стране, мы решили сделать вам подарок. Мы растили его с любовью, а теперь преподносим вам! Примите восемьдесят четыре сантиметра от всего нашего советского народа. — На этих словах Марья достала из-за спины огромный кривой огурец, чудовищно бурого цвета, покрытый наростами и бородавками. Она сжимала его в сильной руке так, что он, казалось, сейчас лопнет. В глазах ее стояли слезы. Шоу взял огурец — он был шершавый и холодный, несмотря на адскую температуру в теплице.</p><p class="p1">— Кусайте! — завопил председатель.</p><p class="p1">— Они просят вас попробовать немедленно, — сказал Антонов. — Для них… Для нас это очень важно. Мыть не надо. У нас чистые руки.</p><p class="p1">— Боюсь, что я не могу… Это не еда, а произведение искусства. Я отвезу его в Лондонский музей…</p><p class="p1">— Для музея вам дадут еще. Ну откусите, ну что вам стоит?</p><p class="p1">Ничего не оставалось. Шоу вздохнул и с хрустом откусил. Раздались аплодисменты. Шкура огурца была тверда, как броня, а нутро оказалось бледно-розовым, с серо-бурыми твердыми семечками. На вкус это было так же далеко от огурца, как и на вид, но, кажется, не опасно.</p><p class="p1">— Что ж, — сказал он, прожевав, — думаю, что этот чудесный огурец займет подобающее ему место в музее. «Не жрать же его, в самом деле», — закончил он про себя.</p><p class="p1">Они вышли из теплицы — огурец приходилось так и нести в руке, и гость полагал, что выглядит с ним глупо. «Не глупее все же, чем когда выхожу на поклоны», — утешил он себя. Его долго еще водили среди парников и грядок. Гостю показали красные тыквы, красную репу, красный хрен — по счастью, его пробовать не пришлось. Женщины, работающие среди растений (почему-то одни женщины), приветливо махали ему и сразу возвращались к труду. Овощи неожиданного цвета повергли писателя в долгие размышления. В этом было и величие, и безумие — впрочем, они всегда ходят рука об руку. Встреча со Сталиным была еще впереди, а уже так не терпелось… Каков же должен быть человек, который, ничего прямо не говоря, не отдавая приказов, может заставить всю огромную страну безропотно грызть невкусную, но — как там они сказали — идейно верную еду! «Если бы мясо не было красным, пожалуй, эти люди сделались бы вегетарианцами», — думал он, разглядывая кроваво-алый баклажан. Все было настолько лишено своих свойств, в очередной теплице он замер в недоумении.</p><p class="p1">— Ну а это что, по-вашему? — ликуя, спросил Лаптев.</p><p class="p1">Шоу помедлил. Это было похоже и на сливу, но таких красных и мясистых слив не бывает, и на дивную гигантскую ягоду, какие, возможно, растут лишь в Сибири, и на какую-то, черт ее знает, клубнику без семечек, — но цвет был подлинно алый, тот самый, как кровь рабочего класса.</p><p class="p1">— Право, я теряюсь, — сказал он.</p><p class="p1">— Это помидор! — воскликнула Катерина. — Наш колхозный помидор!</p><p class="p1">«Господи, — подумал Шоу. — Я уж и забыл, что бывают вещи, красные от природы. Так истина приходит в облике парадокса: ты думаешь, что перед тобой парадокс, — а это таблица умножения».</p><p class="p1">И он записал это в книжечку.</p><p class="p1">— Ну а теперь пообедаем — и к Дарье Михалне! — сообщил председатель. Они подошли к пахнущей краской постройке, из которой доносились сквозь краску запахи еды. — Вот, так сказать, наша колхозная столовая, куда советский человек может прийти покушать, не впрягая советскую женщину в кухонное рабство.</p><p class="p1">Антонов почему-то пропустил эту неточность и перевел, как было сказано. «Значит, и здесь, при всем их равенстве, советский человек не то же самое, что советская женщина, — подумал Шоу. — Слава богу, еще живо в них что-то человеческое».</p><p class="p1">В дверях столовой появилась баба с хлебом-солью. Хлеб и соль оказались нормального цвета. В самой столовой не было ни души.</p><p class="p1">— Время не обеденное, — объяснил председатель. На самом деле время было самое обеденное, но работникам колхоза загодя сказали, что обедают они сегодня часом позже. Гостя усадили за стол, и перед ним появилась тарелка густого красного (это уже не удивило, борщ подавали и в гостинице) супа с плавающим в нем жирным куском мяса.</p><p class="p1">— Простите, но я не ем мяса, — осторожно заметил Шоу.</p><p class="p1">Повисла пауза. Затем переводчик начал что-то быстро говорить председателю, а тот — поварихе. Гость не мог понимать, о чем речь, а говорили они вот что:</p><p class="p1">— Георгий, ты понимаешь, что ты творишь? — возбужденно шептал Антонов.</p><p class="p1">— А мне кто чего сказал? Что я сделаю? Эй, Фроська! Слышь, че? Мяса, говорит, не ест! То есть вообще не ест, понимаешь ты? Что там у тебя еще?</p><p class="p1">— Ест, не ест! Поработал бы по-человечески, на земле, все бы съел, — ворчливо отзывалась повариха. — Ниче, щас дам ему другого, который для наших.</p><p class="p1">— Ну, теперь можно и к Дарье Михалне! — Доев, Лаптев встал и похлопал себя по животу. — Николай ждет уж.</p><p class="p1">У столовой действительно ждала телега, запряженная печальной серой лошаденкой. Николай был приземистый мужичок в алой рубахе — он стоял возле лошади, что-то шепча ей в ухо. Ехали минут двадцать, телега привезла их к рядам длинных бараков — запах навоза тут витал и вовсе невыносимый, он перебивал даже стойкий и неизменный запах свежей краски. Антонов побледнел, а председатель будто не замечал вони.</p><p class="p1">— Животные у вас тоже красные? — спросил гость.</p><p class="p1">— Мы работаем над этим. Красить пробовали, но они дохли. Коровы сейчас на выпасе, так что пойдем прямо к Дарье.</p><p class="p1">Они обогнули ближайший барак. За ним обнаружилась огороженная площадка, посыпанная свежей соломой. Посередине площадки возвышался серый бугор.</p><p class="p1">— Вот, так сказать, наша героиня, сама Дарья Михална, красавица наша, кормилица! — Председатель подобрал ком земли и бросил в бугор. Он зашевелился.</p><p class="p1">Это была самая гигантская свинья, которую когда-либо приходилось видеть кому-либо. Лениво привстав, Дарья Михална посмотрела на посетителей маленьким заплывшим глазом. Затем с неожиданной резвостью вскочила, так что гости отпрыгнули, постояла, качаясь на маленьких копытцах, и с тяжким вздохом рухнула обратно, продолжая, однако, настороженно поглядывать на людей. Она была страшна. В ней одной поместился бы сам сатана со всем своим легионом.</p><p class="p1">— Шестьсот пятьдесят три килограмма, — с восторгом прошептал председатель. — Это год назад, с тех пор не вешали. Самая большая свинья в мире, уверяю вас!</p><p class="p1">Почти полторы тысячи фунтов. Шоу не мог отвести глаз от Дарьи Михалны. Она же глядела на него, разом поняв, кто тут главный зритель, всем своим видом говоря: «Ты никто, вы все никто, вы существуете, чтобы я ела!»</p><p class="p1">— Мы Дарью Михалну бережем, — продолжал председатель. — Чтоб жила долго и росла.</p><p class="p1">— Какие же поросята рождаются? Этак вы выведете свиней размером со слона.</p><p class="p1">— Слона не видал, но скажу вам так, товарищ писатель, — поросят мы с нее не имеем — это ж еще не всякий хряк управится. Да и говорю ж — бережем ее, родимую! А с поросят свинья худеет.</p><p class="p1">— Значит, на котлеты?</p><p class="p1">Председатель даже вздрогнул.</p><p class="p1">— А еще вегетарьянец, товарищ писатель! Это как же Дарью Михалну на котлеты? Это ж как меня вон или вас все равно. Она — наша гордость. Может, даже к премии приставят.</p><p class="p1">— Что ж, вы ее заслужили. — Шоу все смотрел на свинью. Она с трудом подняла голову.</p><p class="p1">— Да не нас к премии, ее, Дарьюшку! Нас-то чай много, а она одна такая.</p><p class="p1">Свинья издала протяжный стон. Тут же откуда-то со стороны бараков примчались две совсем юные девчушки, вдвоем они тащили здоровенное ведро с дурно пахнущим месивом. Осторожно отодвинув щеколду, они втащили ведро в загон, вывалили содержимое в корыто и метнулись назад — но свинья оказалась проворнее. Вновь подскочив с невообразимой для такой туши прытью, она разбежалась и тупым рылом боднула зазевавшуюся девчонку пониже спины. Та с визгом повалилась на солому — солома сбилась и под тонким слоем обнаружилось месиво из грязи и навоза.</p><p class="p1">Дарья Михална невозмутимо отвернулась и, волоча брюхо по земле, вразвалку поковыляла к корыту, погрузила туда голову и стала жрать, рыча и похрюкивая.</p><p class="p1">— Георгий, почему ее так зовут? — спросил гость.</p><p class="p1">— Так Мишки Косого была свинья до коллективизации, вот и Михална. А теперь общественная.</p><p class="p1">— А где теперь хозяин?</p><p class="p1">— Сожрала, — вздохнул председатель. — Год уж как. Голодная была, так-то не тронула бы. А он к ней зашел по старой памяти, а Дарья-то привыкши, что он с кормом, а он пустой. Ну и обиделась, красавица.</p><p class="p1">Шоу посмотрел на свинью.</p><p class="p1">— Но если ни поросят, ни котлет, да еще бросается, то зачем же она… такая? — недоумевая спросил он. Лаптев оторопел.</p><p class="p1">— Да как же вы, товарищ писатель, не поймете?! Она ж вон какая! Как это зачем? Я вам так скажу: если свинья такая огромная, то и спрашивать не надо, зачем она.</p><p class="p1">И теперь наконец начал проступать смысл. В словах председателя читалась та самая разгадка, ответ на вопрос, которым задавались многие западные умы, говоря о Советском Союзе.</p><p class="p1">— Но вообще-то, — председатель понизил голос, — вообще-то, кое-что нам Дарья Михална дает.</p><p class="p1">Свинья все ела. Председатель приблизил губы к уху гостя и прошептал:</p><p class="p1">— Вы только представьте, сколько ценнейшего навоза…</p><p class="p1">Вот так и мы, подумал Шоу, но додумывать эту мысль у него не было сил. Поговорю с Шелестовым, он поймет, — подумал он с тихой радостью.</p><p class="empty-line"/><p class="p1">Между тем На Самом Верху без восторга отнеслись к перспективе этой встречи.</p><p class="p1">— Что, товарищ Шоу доволен? — спросили там.</p><p class="p1">— Доволен, но ищет встречи с товарищем Шелестовым, — трепеща, сообщили соответствующие.</p><p class="p1">— Это неуместно, — сказали в ответ. — Товарищ Шелестов писатель, а не оратор. Как всякий серьезный писатель, он сосредоточивается, когда пишет, и тратит на это все силы, а говорить товарищу Шелестову необязательно. Нужно проследить, чтобы товарищ Шелестов был плотно занят.</p><p class="p1">Так и вышло.</p></span>
