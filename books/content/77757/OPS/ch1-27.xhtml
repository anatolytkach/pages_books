<p class="p">15 октября 1925, станица Зеленская</p>
</div><p class="p1">Никого так не любил бездетный учитель математики Василий Шелестов, как племянника Кирилла, которого после смерти родителей растил и баловал один; но племянник его умер в семнадцать лет от тифа, потому что был мальчик нежный, холеный, и с тех пор души в Шелестове не было, а было пустое черное дупло. Но когда накатились в четвертый раз на станицу агеевцы и оставили у него в доме тяжелораненого офицера, с виду хоть и постарше племянника, но такого же нежного и светловолосого, — в черной этой пустоте завелась постепенно привязанность, а там и живая зависимость. Офицер был беспомощен младенчески, помнил лишь то, что воевал, и когда окреп, в минуты особого волнения усиливался выхватить шашку, нащупывал ее, невидимо висящую на левом боку, и тик этот остался с ним навсегда.</p><p class="p1">Он удивительно быстро учился всему — Шелестов не зря был учитель, умел давать знания в системе. Слова вернулись почти сразу, и подбор их говорил о том, что офицер был человек образованный, хоть и мало еще знавший жизнь. В любой сельской работе он был до смешного неловок, но почерк после первых попыток оказался уверенный, круглый, с четкими нажимами и росчерками. Рисовать не умел вовсе. Потянулся как-то к гитаре, но оставил, еще плохо слушались пальцы. Жаловался на неотступные головные боли и, главное, мучающие его сны, значения которых он не понимал: память была утрачена начисто, и он не знал людей, являвшихся к нему.</p><p class="p1">В пятнадцатом с войны вернулся в Зеленскую Трофим Голубков, после тяжелой контузии начисто забывший весь последний год, но по крайности помнивший жену и отца; отлежался, кое-что припомнил, но остался странным. В девятнадцатом — что ему померещилось? — вдруг медведем бросился на зашедшего в хату хорунжего, и тот, нервный, выстрелил ему в живот, не разобравшись. Голубков был отмечен, такие не выживают, смерть за ним с детства ходила, еще когда шестилеткой в проруби тонул.</p><p class="p1">А молодой офицер по ночам стонал, словно не желал возвращения памяти, и прежнюю жизнь вспоминал с явной неохотой, как племянник Кирюша не хотел вставать в школу; будить обоих была мука мученическая, и учитель Шелестов скоро отказался от попыток вызвать прежнюю личность нечаянного постояльца. Тот с радостью, с детским счастьем заново учился всему, а о прежнем и слышать не хотел. Может быть, там драма, кто знает. Ему все время снился какой-то черный зверь, выползающий, нет, выходящий из чащи или пещеры. Часто он бредил цифрами: одиннадцать, четырнадцать… И однажды Шелестов решился.</p><p class="p1">Решение было принято в день, когда после месяца красной власти, поняв, что это уж навсегда, учитель Шелестов сжег в печке документы на имя Алексея Трубина и закопал рундук с бумагами, которые успел просмотреть, но вдумчиво изучить не собрался, робел, как при чтении чужого письма.</p><p class="p1">— А меня вы совсем не помните? — спросил он с замиранием, когда выздоравливающий, похлебав капустного супа, сидел за столом и чертил ногтем непонятные фигуры.</p><p class="p1">— Нет, — неуверенно отвечал офицер. Он уже выходил из хаты, брал и рассматривал пилу, топор, клещи, словно пытаясь понять — зачем это? чего можно с помощью этих предметов добиться от человека?</p><p class="p1">— Не помнишь, значит, меня? — спросил учитель, уже на ты. — Я дядя твой. Боялся тебе сказать, пока ты слаб был. Дядя твой, брат отца. Отец умер у тебя, мать его пережила ненадолго. Растил тебя я. Ты воевал, за красных воевал. Кровь пролил.</p><p class="p1">— Дядя? — переспросил бывший Трубин радостно и ясно, словно после долгого болтания по волнам встал наконец на твердую почву. — А я чувствовал. Я чувствовал! И про родителей… вот, я даже помню, кажется!</p><p class="p1">— Ты не можешь их помнить, — поспешно сказал учитель. — Тебе было пять лет!</p><p class="p1">— Но я помню! — настаивал он — Был конь, рыжий, с зеленым седлом!</p><p class="p1">— Может, и был, — ушел от разговора Шелестов. — Но растил тебя я, ты делал большие успехи… документы все погибли, многое сгорело. Но вот твои похвальные грамоты! Ты и тогда уже удивительно быстро схватывал. Удивительно.</p><p class="p1">И такая радость была на лице раненого, что учитель поклялся себе страшной учительской клятвой никогда не проговариваться. Документы на вновь обретенного племянника он выправил легко, тогда еще, в неотвердевшее время, это делалось запросто. Да и не знал вернувшийся в Зеленскую комиссарить Григорий Турин, мужик звероватый, но в общем отходчивый, что племянник учителя помер: похудел, конечно, парень, возмужал, но в общем узнать можно. Еще и от агеевцев пострадал, смотри, акая жалость.</p><p class="p1">А потом приехала в гости к соседям Манюня, загляделась и влюбилась, и Шелестов-старший не противился судьбе. Манюня была дочь хорошего человека, и надо же было Кириллу обрастать всем, что положено молодому казаку. Он поехал в Ростов учиться, стал печататься, быстро и уверенно пошел по литературной части — и, читая его фельетоны в «Молоте», учитель радовался. Да полно, такой ли уж простой гость ему достался? И Василий раскопал рундук, прочел «Пороги».</p><p class="p1">Что говорить, это было слабо, и молодо, и односторонне. А все-таки баба вышла до того жива, да и предвоенный Дон дан был с такой юной зоркостью, когда счастье распирает грудь, — что душа учителя наполнилась тем же, забытым теперь счастьем, и все его любовные неудачи представились радостями, потому что живой — и уже прекрасно. Он чувствовал в последнее время неприятную тяжесть справа, жаловаться племяннику стеснялся, а лечиться не видел смысла. Серьезное лечить бессмысленно, а несерьезное пройдет само, говорил Чехов, шелестовский любимец. Но когда доктор в Ростове в середине октября осмотрел его и сказал, что надежды мало, почку не спасти, — Шелестов усмехнулся и сказал любимое: «Без почки жить можно, без почвы трудно», — а сам про себя все решил.</p><p class="p1">Жизнь была хорошая. Не задумываясь об ее смысле, он делал, что надо, понимая, что конец один и другого не выдумаешь. Все в последнее время придумывали чего-то, какое-то искание небывалой веры, экспериментировали над собой, как эта Баланова в рукописи, и вообще придумывали лишнее, а все ведь просто. Надо помогать, кому можно помочь, и поменьше болтать. Так что в сопроводительном письме, которое он написал одним из многочисленных своих почерков, была всего одна строчка.</p></span>
