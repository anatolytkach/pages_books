<span id="id7"><div class="title1">
<p class="p">30 ноября 1928, Ленинград</p>
</div><p class="p1">— Ну-с, господин Логинов, — сказал седой, краснолицый, бодрый Дехтерев, усаживаясь напротив субтильного субъекта и прихлопывая себя по коленкам. Дехтереву принадлежала крылатая в медицинской среде фраза — если больному при виде врача не делается легче, к чертям свинячьим такого врача! — и при виде его приободрялись даже здоровые. Казалось бы, Логинов — страдалец, особенно безумный, озлобленный, — должен был с первого взгляда возненавидеть этот сгусток душевного и физического здоровья; однако Дехтерев излучал такую надежность, что его посещения ждали, как манны. Субтильный не выглядел больным — ни затравленного взгляда, ни навязчивых движений, настораживала, пожалуй, лишь рассеянная мечтательность, но кто же сейчас не мечтателен? Если смотреть по сторонам и все понимать, с ума сойдешь.</p><p class="p1">— Здравствуйте, профессор, — ответил Логинов с радостной готовностью, словно давно ждал случая поговорить с умным человеком. Так оно и было: люди, окружавшие его в финотделе, были по большей части глупые, и в Капоэре, как назло, попадались простые души.</p><p class="p1">— Где же мы сегодня? В Ленинграде или Капоэре? — спросил Дехтерев без тени насмешки.</p><p class="p1">— В Ленинграде, профессор. Разве вы не видите?</p><p class="p1">— Да как же я увижу?</p><p class="p1">— Очень легко, — сказал Логинов с детской улыбкой. — Я был бы тогда не господин Логинов, и господин Логинов не ответил бы вам.</p><p class="p1">Дехтерев был видный спец, и «господин», равно обращаемый к больным и здоровым, сходил Логинову с рук.</p><p class="p1">— А вчера?</p><p class="p1">— Вчера чудом только я спасся, — доверчиво признался Логинов. — Обратите ваше внимание, что переход далеко не всегда совершается в минуту критическую. Напротив, иногда в самый приятный момент. Но вчера была действительно погоня, я завернул за угол и ощутил себя в больнице. Что происходит там теперь, я не знаю и возвращаться боюсь, но дело начато, и нужно его окончить.</p><p class="p1">То есть он понимает, что сидит в больнице; очень интересно.</p><p class="p1">— Дело какого рода?</p><p class="p1">— Я переправляю через границу крупного человека, значительного.</p><p class="p1">— Чем же именно значительного? Или вам нельзя здесь говорить об этом?</p><p class="p1">— Почему, я могу здесь говорить что угодно. Там это никак не влияет. Это революционер, ну, не в нашем смысле, но в переводе на местный язык это и будет именно революционер. Его преследуют в соседней области, я переводил его через горы.</p><p class="p1">— Перевели успешно?</p><p class="p1">— Успешно, но они взяли мой след. Он успел скрыться, он в надежном теперь месте, не беспокойтесь.</p><p class="p1">— Что мне за него беспокоиться, — нахмурился Дехтерев, — я за вас беспокоюсь. Ведь вам теперь там, должно быть, несладко.</p><p class="p1">— Это так, — с достоинством кивнул Логинов, — но там я обладаю довольно удивительными навыками. Я там такое могу, — добавил он с тихим восторгом, — что здесь удивляюсь, да и только.</p><p class="p1">— Что же, например?</p><p class="p1">— Не спрашивайте меня, — сказал Логинов и вдруг потупился. В этой книжной, с долгими периодами речи, юношеской застенчивости и внезапной смене настроений, пожалуй, только и видна была болезнь. — Не спрашивайте. Только если вам надо знать для вашей науки.</p><p class="p1">— Ну разумеется, голубчик, для науки. Для праздного любопытства у меня насекомые есть. — Энтомологические заслуги Дехтерева были хорошо известны.</p><p class="p1">— Здесь… здесь я не мог бы… убить, — сказал Логинов и поднял на профессора ясные глаза.</p><p class="p1">— А там приходилось?</p><p class="p1">— В исключительных обстоятельствах — приходилось, — ответил он твердо, с той смесью стыда и гордости, с какой, должно быть, православный воин отчитывался перед Сергием об убийстве врага, а тот кивал бы всепонимающе: так, чадо… так, чадо…</p><p class="p1">— А здесь это никак не сказывалось?</p><p class="p1">— Никогда, — уверенно ответил Логинов. — Я же говорил, связи если и есть, то они трудно установимы.</p><p class="p1">— Но вы сейчас хорошо себя чувствуете? Нет тревоги, тошноты?</p><p class="p1">— А, вы про это, — улыбнулся Логинов. — Хи-итрый! Я тоже думаю, что там все хорошо. Я убежал, видимо.</p><p class="p1">— Иначе бы чувствовали?</p><p class="p1">— Чувствовал бы, конечно. Когда меня там однажды избили, вы не представляете, как меня здесь три дня ломало. Вы не представляете просто. Это счастье, что я тогда был не там. Зато я здесь все-таки попал, думал — убегу, но как назло. Все перенес полностью. В подворотне трое подошли, не грабили, ничего. Просто, знаете, от злости. На Васильевском часто бывает.</p><p class="p1">— А скажите, — спросил Дехтерев, поскребывая подбородок. — Вы и здесь, и там одинаково не можете восстановить, что было, пока вас не было?</p><p class="p1">— Нет, пожалуй, не могу. Разве что гадательно или если рассказывают. Вообще, — Логинов оживился, — вообще есть одна закономерность. Но поскольку я давно уже тут, у меня мало было возможностей проверить. Это меня тревожит сильно, чрезвычайно сильно. Я вам скажу, но это еще проверять. В общем, всякий раз, как я нахожусь там, то есть душа, или вот это, что вы называете «эго», — когда, словом, оно там, я здесь более склонен к поступкам безнравственным. — Он опять потупился. — Я не говорю, конечно, про всякую грязь, это может быть, но я ведь почти не пью, вы знаете.</p><p class="p1">— Знаю.</p><p class="p1">— И по женской части у меня нет излишеств. Нормально, но без излишеств. — Вероятно, Логинов боялся, что его заподозрят в недостаточной активности по женской части, и подчеркнул: нормально. Я про другое. Когда я однажды… отсутствовал, я здесь… я, в общем, не могу вам сказать в подробностях. Но я… фактически был мною предан товарищ.</p><p class="p1">Произнести страшные слова «я предал» Логинов не решался.</p><p class="p1">— А там?</p><p class="p1">— Там… что вы хотите сказать? — Он побледнел. — Вы хотите сказать, что я, может быть, сейчас там… предал?</p><p class="p1">— Что вы. Вы сейчас бы чувствовали, — успокоил его Дехтерев. — Но, может быть, есть и там зависимость?</p><p class="p1">— Там… я прослежу, конечно… там я не чувствовал. Видите, там мне не приходилось еще… бывать в таких ситуациях. Или реже, гораздо реже. Там нет многого, что есть тут.</p><p class="p1">— Там — лучше? — прямо спросил Дехтерев.</p><p class="p1">— О, гораздо, гораздо! Это у них, за горами, случаются преследования. И подчас их агенты попадают к нам. Вот когда я переводил Криста — Крист, ну этот…</p><p class="p1">— Да-да, вчерашний, я помню, — подтвердил Логинов.</p><p class="p1">— Да. Несколько из них прорвались к нам. Но обычно — нет, что вы. Капоэр — не то место, где каждый день вот так перемалывают. Они и уходят к нам поэтому, а от нас — реже.</p><p class="p1">— Ну, от нас тоже редко уходят, — сказал Дехтерев и заговорщически подмигнул. — Много вы знаете случаев, чтобы от нас ушли?</p><p class="p1">— Из больницы? — понимающе кивнул Логинов.</p><p class="p1">— Да нет, из больницы уходят часто, иначе грош нам была бы цена. Я шире забираю. А впрочем, не станем пока… Вы записываете про Капоэр?</p><p class="p1">— Пишу, — виновато сказал Логинов, — но очень, знаете, плоско. Там совсем не так…</p><p class="p1">— Может, зарисовать? Вам передать принадлежности?</p><p class="p1">— Я попробую, — радостно сказал Логинов, — надо хоть попытаться… Я не ручаюсь за контуры, но цвета — да, я могу передать цвета.</p><p class="p1">— Хорошо, я распоряжусь. Идемте, — Дехтерев кивнул Стрельникову, и они вышли.</p><p class="p1">— Что, интересный? — гордо спросил профессор в коридоре, словно логиновская мания была его личной заслугой.</p><p class="p1">— Чрезвычайно. Скажите, а язык этого Капоэра…</p><p class="p1">— Вот! — Дехтерев торжествующе поднял палец. — Лингвисту все язык подавай. Нет-с, он обычный. Русский как есть, хотя слова употребляются в неожиданных значениях — рукой, например, называется всякий вытянутый мыс. Там мысов много, места морские.</p><p class="p1">— Проще всего, — сказал Стрельников, который из формальной школы вынес привычку «тривиализировать», — допустить, что он бессознательно сбегает…</p><p class="p1">— Э! — махнул рукой Дехтерев, не любивший, чтобы в его сложную науку лезли по-дилетантски. — Он ведь сбегает не только от плохого. У него иногда перещелкивает — и он от бабы уходит. Что-то с бабой делает, а ум не там.</p><p class="p1">— Но это как раз очень легко. Он боится бабу…</p><p class="p1">— В подворотне он тоже боится, однако не сбегает. И его бьют как милого. Нет, вы простые ваши разделения оставьте. Тут серьезно все. Он бежит не от чего-то и не к чему-то, а он в некотором роде как Россия. Сколько думали, пытались — вот мы выведем формулу, когда происходит возмущение. А возмущение происходит на ровном месте. Человека не тогда тошнит, когда он подумал не то, а когда он не то съел. Ну и здесь — его утомляет пребывание, он перебегает. Может утомить с бабой, а может на службе. А в подворотне ему, может, интересно стало.</p><p class="p1">— Но как началось? — спросил Стрельников, когда они уже пили чай в кабинете Дехтерева на втором этаже, с заснеженными деревьями за окном. Зима предстояла теплая, мокрый снег тяжело лежал на ветках, таял, сползал и шлепался.</p><p class="p1">— Они в таких случаях всегда придумывают толчок задним числом. Он якобы зашел к другу, самоучке. Этот самоучка, некто Фрязин, будто бы занимается устройством психики, но специалистам не верит — знаете, как все безумцы. Друга дома не было, была дочка. И дочка эта, угощая его чаем, все как-то странно хихикала. Может, кокетничала, может, что. И потом только он сообразил, что она, возможно, в чай ему подлила эликсир. Отец не рисковал использовать, а на нем они решили попробовать. И через день в трамвае случилось это первое выпадение. Он на десять минут выпал, проехал свою станцию, и виделись ему там какие-то горы, через которые он бежит, а его преследуют.</p><p class="p1">— Его всегда там преследуют?</p><p class="p1">— Не всегда. Но вообще в точку — он всегда там в движении.</p><p class="p1">— Здесь, видимо, не хватает.</p><p class="p1">— Здесь у него скучная жизнь, да. Но самое тонкое, что он здесь, в больнице, все это обосновал. Он же финансист, учил математику. И вот ему представилось, что человек есть биквадратное уравнение, в котором всегда два корня. Не может так быть, чтобы переменная в квадрате, а корень один. Он вывел, что полушария два, и значит, в одном идет одна жизнь, в другом — другая. Очень все последовательно.</p><p class="p1">— А вы хоть раз заставали его в состоянии, условно говоря, Капоэра?</p><p class="p1">— Нет, конечно. — Дехтерев был очень доволен. — И нельзя.</p><p class="p1">— Почему?</p><p class="p1">— А он всякий раз говорит: профессор, вот ночью было выпадение. Вот вчера, вас не было, сразу выпадение. И никогда его в этом состоянии нельзя застать. Я уж ему говорю: звоните! Электрический звонок есть в палате. А он: как же я из Капоэра вам позвоню? То есть он в состоянии, условно говоря, Капоэра не видит палату. Я понял бы, если бы тут это звонок, а там, скажем, бутылка: вот ударьте бутылкой, придет сестра. Но он действительно там не видит ничего.</p><p class="p1">— Действительно интересный, — сказал Стрельников.</p><p class="p1">— А! То-то. Дехтерев вам плохого не покажет. Ну, давайте, выкладывайте ваши графики. Надо будет за вашим Шелестовым поглядеть.</p></span>
