<span id="id16"><div class="title1">
<p class="p">30 июля 1913, Петербург</p>
</div><p class="p1">Он оказался, конечно, Вериным любовником. Все было совсем, совсем не так, как представлялось матери.</p><p class="p1">Что рассказывала мать? Что присутствовал в Вериной жизни мужчина, старше лет на двадцать, то, что называется солидный, тоже художник, хоть и не первого ряда. Что воспитывал и направлял с отрочества. Что было подобие страсти, но дисциплинированной, введенной в рамки. Намекалось на темные обстоятельства, препятствующие браку: с женой давно не живет, но не разведен. И тут оказалось, что все это время. На глазах у потрясенной публики, ничего не замечавшей. А он, старый недоумок, не понимал главного: от чего она бежит в свое цветное забытье. А вот от этого.</p><p class="p1">Он был, конечно, демон, то, что так модно было тогда, и один из них, самый плюгавый, даже написал, что хоть ангел, хоть демон, а все людское — презренно. Знал бы он, в какую меру наичистейшего золота оценят потом эту скучную, всеми презираемую человечность! Но две вещи они умели: умирать, когда придется, — ибо тому, кто смотрит по сторонам и отслеживает реакцию, претит собственная слабость, сноб гибнет только героем, или он не сноб, — а вторая вещь была нравиться, нравиться женщинам, вообще всем. Пустота прельстительна, каждый вдумает в нее, что хочет. И этот оказался ровно такой, и имя носил самое демоническое, Юрий Зигварт. Что-то еврейское, тщательно скрываемое, виднелось в крыльях носа — в юности, должно быть, угристого, — в бровях, в преувеличенной сладости, под которой таился лед и ничего более. Ну, да ведь кто же не любит мороженого.</p><p class="p1">Они встречались тут. Он ее мучил по тогдашней моде. Ему нравилось томиться между двух. Почему надо одну, почему нельзя двух? Предлагал немыслимые гадости. Она — естественно, нет. Исчезал, якшался бог знает с кем, писал стихи — дрянные. Вообще вел себя хуже последнего мерзавца, но любил ее, вот что всего непостижимей. Любил. Никогда не говорил об этом.</p><p class="p1">Когда Дехтерев, красный и сумасшедший от волнения, ворвался в ресторан, Зигварта не встретил там, конечно. Нашел зато хозяина, тот и объяснил, что слово «ТАРОП» намалевано неизвестным хулиганом и смысла не имеет. Приходили юноша и девушка, частые посетители, да, Лебедеву узнал по описанию сразу, но давно не бывают, потому что расстались. Вот почему слово на картинке тяжким грузом, плитой опускается на них.</p><p class="p1">Найти юношу казалось уже делом пустячным — он, шикуя, оставил визитку. Дехтерев явился к нему в дешевый журнальчик, где тот печатал карикатуры (что это я так ненавижу его, все думал он, не ревность ли?). Его учтиво, с большою сладостью встретил прилизанный красавец, в котором чувствовалась и воля, и насмешливость. Они расстались с Лебедевой год назад. Он слышал о несчастье с ней, но видеть ее в инвалидном кресле не хочет. «Согласитесь, это было бы оскорбление красоты. Я помню ее совершенной, класть на это другой отпечаток было бы… Милосердие никак с красотой не связано». В подробностях это обосновал. В конце концов все мы умрем, и не дело засорять человечностью… Дехтерев сдержался. Следовало выведать, клещами вытащить из него все.</p><p class="p1">Они встречались пять раз, многое в рисунках стало ясно. Он знал теперь уязвимую точку, дверь в стене, ключ, понимал причины бегства от себя прежней, — но привести его к Лебедевой не решался, да и не силком же тащить. Наконец он понял, что большего не вытянешь. Зигварт относился к нему с холодным терпением, словно это он врач, а Дехтерев — пациент; но тут и Зигварт стал проявлять беспокойство — для чего все это? Дехтерев сказать не мог. Могло ничего не выйти. Он уселся за любимый, отцовский, красного дерева стол с зеленой лампой, кинул в миску несколько кусков сушеной рыбы, странно помогавшей сосредоточиться, взял чистый лист и разметил его, выписывая зоны, остававшиеся в ее поврежденном уме под замком.</p><p class="p1">Дехтерев выписал прежде всего слова, вызывавшие дурные видения, от которых Вера заслонялась рукой. Взял несколько надписей с картин — в последнее время они появлялись все чаще, далеко не все он понимал, но происхождение большинства было ему теперь ясно. Кое-какие сигналы он научился подавать, и как она ни прятала отзыв, он видел, что причиняет ей боль точечными напоминаниями; другие слова были, напротив, уколами блаженства. Он понимал, что осаду ее башни надо вести с разных сторон — не сработает одно заклинание, тотчас другое; он чувствовал себя Мерлином, взрывающим замки набором грозных имен. К пяти утра перед ним лежала формула, которая могла воскресить прежнюю Веронику, а могла сделать его посмешищем в собственных глазах; но он верил, что не проснуться от трезвона нескольких будильников сразу она не сможет. Очень уж ему не нравилась новая она, рычащая от радости при виде мороженого глухая девка в красном.</p><p class="p1">Не совсем ясны были цифры. Одиннадцать и четырнадцать как-то знаменовали переход от одной реальности к другой, от прежней личности к новой, но почему — он догадаться не мог. Вероятно, из детства. На случай, если не сработает, он интуитивно выбрал 86 — что-то в этой цифре действовало на него самого.</p><p class="p1">И на следующее утро, три часа проспав в прокуренном кабинете, он поехал на Большой проспект, твердо зная, что либо пан, либо пропал: метод до сих пор казался ему слишком фантастичным. Он не знал, что сделает, если заклинание сработает: женится на ней? Зачем он ей нужен, да она же и нескоро встанет на ноги… Но зачем бросаемся мы спасать любую красоту, низринутую в грязь? Не всем же можно воспользоваться, что любишь. Извозчик тащился отвратительно медленно. Наконец Дехтерев вывез ее на давно привычную прогулку и осторожно, ни слова не говоря, довез коляску до островов. Вероника улыбалась блаженно.</p><p class="p1">Едва он повернул к ресторанчику, она стала проявлять неясное беспокойство: подносила руки к глазам, вертелась. Он ощущал нарастающую тяжесть, словно катил коляску в крутую гору, но заговорил, и пока говорил, это сопротивление все усиливалось.</p><p class="p1">— <em>Кагрум</em>, — заговорил он. — <em>Одиннадцать. Восход Луны приветствует трава. Ты совершенство, но другая. Говорю тебе, что никогда. Отсюда одна. Фонарь под темною стеной с утра не тот же, а иной. Мама, бедная мамочка, что мне делать? Нехорошо здесь. Какие-то везде норы. Трава бывает красной, а бывает синей. Ты, вероятно, та, я, вероятно, тот, один из нас уйдет, второй из нас умрет. Зверинская, десять. Бардут. Я никогда ничего не буду обещать тебе. Грозен день, широк раскат, звери плачут, звери спят. Четырнадцать. Никогда, никто больше не увидит меня там.</em></p><p class="p1">Ничего не происходило. Он оставил коляску, встал перед ней, заглянул ей в лицо — и тут она, отпихнув его так, что он едва не полетел вверх тормашками, принялась сама вращать руками колеса. Она мчала коляску к берегу, высокому, почти отвесному в этом месте. Он едва успел схватить ее, догнав метрах в пяти от пропасти.</p><p class="p1">— Зачем? — со страшной злостью, без слез спрашивала она. — Зачем, зачем?</p></span>
