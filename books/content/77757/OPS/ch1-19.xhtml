<p class="p">5 мая 1933, Капоэр</p>
</div><p class="p1">Звук тянулся на одной низкой ноте, от этого звука колоколом гудела грудь, будто в нее ударили медным, обернутым мягкой ветошью языком. Порой чей-то голос выбивался из хора, срывался, но тут же снова вправлялся в течение песни. Хотя кто бы назвал это песней? Сидели все за огромным длинным столом, слева от Логинова оказался толстый вислоусый старик, постоянно рыком прочищающий горло, справа — миловидный светлокудрый юноша с отсутствующим взглядом. Соседи не обращали на Логинова никакого внимания, никто не притрагивался и к блюдам, стоящим на столе, — а выглядели они, надо сказать, весьма аппетитно. По-видимому, до окончания пения есть было нельзя.</p><p class="p1">Песня стала затихать, один из сидящих за столом встал на ноги и заговорил-запел тягуче, поповской манерой:</p><p class="p1">— Дорога, дорога, далека да крива, не лесом идет, не полем идет, не болотом идет, не горами идет. Солнце днем глядит, да не выглядит вас, луна ночью следит, да не выследит вас, только ветер один далеко летал, далеко летал, да вас увидал, да не выдаст…</p><p class="p1">На дальнем углу стола завыла, заголосила женщина, потом к ней присоединилась еще одна, и от нестройного этого воя Логинову захотелось зажать уши, но было неудобно. Слов он разобрать не мог, но тоже было что-то про дороженьку и на кого же вы нас покинули. Логинов понял, что оказался на похоронах, но чьих? Он совершенно не знал, как себя вести. Оглянулся по сторонам, но никто не обращал на него внимания. Впрочем, особенного горя на лицах он не заметил.</p><p class="p1">Вдруг одна из женщин, уже в возрасте, так сказать, слегка забродившем, вскочила из-за стола и лихо пошла кругом, широко разводя руки и взвизгивая. К ней подскочили другие — все тоже немолодые, и стали виться вокруг нее, запевая что-то уже развеселое, сдергивая с пляшущей одежду и бросая на гостей. «Лучше бы вышла вон та, черненькая», — подумал Логинов, глядя на оставшихся сидеть девушек. Черненькая захихикала, кося на него, будто услышала. Но тут весь этот клубок перезрелой плоти докатился до него, и он смог разобрать, что они пели: пели про девушку и женишка с посошком, песня была довольно хулиганская. «Да это же свадьба, — понял Логинов. — Свадьба! Поэтому сначала и горевали, так положено, когда выдают. Но кого выдают? Не эту же…» Усач слева от Логинова весело хлопал в ладоши, от чего трясся весь, блондин справа лениво откинулся на спинку стула и не хлопал. Логинов на всякий случай тоже не стал, он оглядывал стол в поисках невесты, но найти не мог. Между тем почти уже голая плясунья, в одной нижней юбке, по второму кругу дошла до них.</p><p class="p1">— Справа ангел, слева черт, остальные не в счет, снизу ад, сверху рай, кого хочешь выбирай! — заверещали бабы. Женщина закружилась на месте, после чего тяжело плюхнулась прямо на стол перед Логиновым, закинув нижнюю юбку на лицо. Юбка закрыла наконец от изумленного Логинова сморщенные и желтоватые, как вялая дыня, пожилые груди, распластавшиеся по бабьему животу и сползающие на стол. Но взамен открылся такой чернослив, что уж лучше, ей-богу, были дыни! Логинов окаменел, а вокруг творилось уже черт знает что: женщины визжали, мужики одобрительно орали и хлопали, даже бледный юноша выказывал что-то, похожее на восторг. К Логинову подошел статный высокий мужчина с окладистой бородой и протянул ему посох.</p><p class="p1">— Ты выбран для совершения обряда! — воскликнул он и грохнул посохом оземь.</p><p class="p1">Логинов оторопел. Набравшись смелости, он наклонился к соседу слева, усачу, и прошептал:</p><p class="p1">— Простите, что за обряд? Что я должен… Я раньше никогда не… не проводил обрядов…</p><p class="p1">— Обряд благодарности Земле-матери, — так же шепотом ответил усач. — Эта женщина — Земля-мать. Вы — сын Земли. Берите посох!</p><p class="p1">Логинов встал и робко взял кривой посох. Что с ним делать дальше, он не представлял совершенно. Он оглядел ритуальный посох, и вдруг его озарила страшная догадка… Это что же, он должен ее этим посохом… Землю-то мать?</p><p class="p1">Откуда-то ударили барабаны, перед Логиновым на столе оказалась здоровая чаша с мутноватым маслом. Он не хотел проводить никаких обрядов, и вообще ни в чем таком участвовать не хотел, но куда было деваться — все уже смотрели на него. Он перевел взгляд на лежащее перед ним тело. Бледные ляжки, перевитые канатами синих вен, призывно дрожали. Логинов собрал волю в кулак, другим кулаком стиснул покрепче посох и быстро макнул его толстый скругленный конец в масло. Он не заметил, как недоуменно переглянулись гости, как открыл рот от удивления усатый толстяк. Плохо понимая, где он и что, Логинов перехватил посох и ткнул им почти вслепую, наугад, куда-то в черносливную мякоть.</p><p class="p1">Баба вскочила, заорала, выхватила посох, огрела Логинова по башке и убежала, причитая и держа руками болтающуюся грудь, он пошатнулся, ухватился за край стола, увидел изумленные лица вокруг и бессильно опустился на стул, хотя лучше было бы ему провалиться вот прямо здесь, на этом самом месте. Кажется, он сделал что-то не то. Из угла доносились рыдания бабы.</p><p class="p1">— Ну ладно, ладно вам, — спустя какое-то время уговаривал его усач. — Вы же не знали. Хотя странно, вообще-то, так везде делают, когда провожают.</p><p class="p1">«Значит, все-таки похороны», — пронеслось в голове у Логинова.</p><p class="p1">— Но поймите, я правда раньше никогда…</p><p class="p1">— Ну ничего, ничего. Вас простят. А эта-то как заорала! Ей бы радоваться, в ее-то годы, хорошему посошку, — толстяк сально захихикал, но, увидев, что Логинов к шуткам еще не готов, сбавил обороты. — Вы должны были лить на нее масло, знаете — как умащивать землю, и посохом стучать оземь. Как бы посох — это дерево, которое вырастила Земля-мать. А масло — это мы поливаем и удобряем наш урожай. Это чтобы Земля-мать помогла своим сыновьям всегда возвращаться к ней. Стихия, понимаете? — Толстяк задумался. — Но вообще-то, я думаю, что раньше этот обычай имел форму, кхм, несколько ближе к вашей версии.</p><p class="p1">— Вы уж мне подсказывайте, если что, — попросил Логинов. — Неудобно вышло.</p><p class="p1">Бородатый, тот, что подавал посох, уже занял свое место во главе стола. Теперь он встал и зычно выкрикнул:</p><p class="p1">— Вкусим!</p><p class="p1">— Вкусим! — завопили все. Бородач первым схватил кусок мяса и смачно вгрызся. Логинов сперва посмотрел, чтобы все уж точно начали есть, а потом и сам робко потянулся к здоровой плошке с желтоватой массой, похожей на кашу. Но тут усач дернул его за рукав.</p><p class="p1">— Это не трогайте! Да вы что, право слово, как не отсюда? Вот, возьмите гуся — вон там.</p><p class="p1">Ничего даже отдаленно похожего на гуся на столе не было, и Логинов растерянно завертел головой. Усач хмуро глядел на него, а затем плюхнул ему на тарелку что-то черное с торчащей белой костью. Это и была гусячья нога, только обгорелая вся. После конфуза с Землей-матерью есть совсем не хотелось.</p><p class="p1">— Жри, сволочь, — разозлился вдруг усатый. — Что, хочешь, чтоб наши все плотью в море полегли? До кости жри, чтоб чистая осталась! — и он хрипло закашлялся.</p><p class="p1">Логинов огляделся и увидел странную картину — те, кто уже доел, с размаху швыряли обглоданные дочиста кости через плечо, не целясь. Одна кость, покрытая чьими-то слюнями, упала ему на колени, он хотел было скинуть, но не знал, можно ли. Так и сидел, стараясь не смотреть вниз.</p><p class="p1">— Давай, я докушаю, — неожиданно подал голос нежный юноша. — У меня дядька с ними идет.</p><p class="p1">Логинов не понял про дядьку, куда и с кем он идет, но с благодарностью отдал свою порцию избавителю. Юноша, урча, сожрал мясо и запустил обсосанную кость через стол.</p><p class="p1">— Чтоб все кости в землю вернулись! — выкрикнул он тонко. В этом уже была какая-то логика, Логинов немного успокоился и снова склонился к версии с похоронами. С дядькой вот только… Но спрашивать было неловко, вдруг это дядьку и хоронят. Да и к тому же все ели молча. Он осторожно глянул на усатого соседа, но тот больше не злился, а вообще потерял к Логинову какой-либо интерес, расправляясь со своим куском гуся. Набравшись смелости и убедившись, что на него никто не смотрит, Логинов дернул ногой и стряхнул кость. Теперь он внимательно следил за юношей и ел все то, что он. Еда — та, которая не ритуальная — была непривычной, но приличной.</p><p class="p1">Вскоре гости начали один за другим откидываться на спинки. Теперь встала одна из девушек — это была та самая, на которую Логинов обратил уже внимание. Черноволосая, вся кругленькая, с быстрыми глазками, она оказалась совсем маленького роста. В руках у нее откуда-то появилась огромная кружка. В полном молчании девушка шла вокруг стола, и Логинов уже чувствовал, что идет к нему. Так и вышло: подошла, встала — ростом она была немногим выше его, сидящего. Он видел, как она изо всех сил старается сохранять серьезность, но губы то и дело вздрагивали, а в глазах вовсю плясал смех. Видимо, он должен был теперь оправдаться за свою ошибку с этим посохом — но вот беда, он и теперь не знал, что ему делать. Украдкой он взглянул на усача, но тот отвернулся, тогда он с мольбой обернулся вправо. Юноша едва заметно кивнул ему, указав глазами на кружку и дернув кадыком. Логинов с облегчением — уж теперь не напутает — схватил сосуд и сделал большой глоток.</p><p class="p1">Горло схватила судорога, слезы брызнули из глаз. Большей дряни ему не приходилось еще пить, хотя пить случалось разное. Но это было что-то! Это была кислая горечь с запахом гнилой лужи, да к тому же на языке ощущались мелкие частицы чего-то, о чем думать не хотелось. Логинову показалось, что он теряет сознание, но второй раз ударить в грязь лицом?! Закрыв глаза, он полностью расслабился, стараясь отключить все органы чувств — это всегда помогало, когда били или когда замерзал, да вообще всегда. Остатки зловонной жижи проскользнули в желудок, он глубоко вдохнул носом и открыл глаза. Первым, что он увидел, было лицо девушки, исполненное ужаса. Он обвел взглядом стол — на всех лицах застыло то же выражение отвращения и страха.</p><p class="p1">— Горе, горе! — закричала какая-то женщина. — Ой, наглотаются, ой, нахлебаются! Горе нам! Ох, детушки наши!</p><p class="p1">Рыдания сотрясали зал. Сосед Логинова, тот, у которого был дядя, бился головой о стол, усатый толстяк заламывал руки и выл в голос. Логинов почувствовал, что проваливается в пустоту…</p><p class="p1">«Какие детушки, — успел он подумать, — что опять не так, господи?!» — и в этот миг желудок скрутила судорога и его шумно вырвало всей этой зеленой мерзостью, перемешанной с обедом, так, что он еле успел отвернуться от стола.</p><p class="p1">Первой заметила черненькая — она все время так и стояла здесь, словно окаменев.</p><p class="p1">— Не будет горя! Не будет! Не будет! — приседая, она визжала, пока ее не услышали, и тыкала пальцем в пол. — Не будет горя! Не нахлебаются!</p><p class="p1">Люди начали вскакивать из-за столов, побежали к ним, толкаясь и разглядывая лужу на полу. Те, кто еще не понял, в чем дело, вертели головами, но постепенно рыдания сменились радостными возгласами, все накинулись на бледного, в испарине, Логинова, обнимая его, целуя в нечистый рот, дружески пихая в бока. Бородач, видимо, главный здесь, сграбастал его в охапку, крича в ухо: «Ах, молодец! Ах, спас!» Откуда-то подбежали женщины и быстро вытерли все под ногами.</p><p class="p1">Когда его оставили, наконец, в покое и все расселись по местам, Логинов, которого еще мутило, наклонился к юноше — усатого он еще опасался — и прошептал:</p><p class="p1">— Ты же сказал мне пить…</p><p class="p1">— Не пить! — так же шепотом ответил тот. — Не пить, набрать в рот и выплюнуть. Это чтобы они в море не наглотались воды, не утонули. Иначе наглотаются. Один раз обряд не провели — тогда вообще мутное время было, все боролись с традициями, говорили, что они не дают идти вперед, стариковские сказки, суеверия. Ну и вот. Тогда отправили много тысяч, а провожать не провожали. Ни Землю-мать не умащивали, ни костей не бросали… И что же?</p><p class="p1">— Что?</p><p class="p1">— Все потонули к чертям собачьим! — с неожиданным злорадством воскликнул паренек. — Ни одной досочки не нашли, ни кушака, ни сапога! Не слышал, что ли?</p><p class="p1">— Нет, — растерянно проговорил Логинов. — Я недавно… Послушай, но что же ты мне не сказал, что надо выплюнуть?</p><p class="p1">— Так ведь это ж такое говно — не захочешь, а выплюнешь! Я ж не знал, что ты такой… сильный духом. Там знаешь, чего намешано?</p><p class="p1">— Нет! — взмолился Логинов. — Не надо…</p><p class="p1">— И правда, не надо тебе. Но так у тебя даже лучше вышло. Теперь уж точно живые вернутся. Ну, может, только болезнь какая или враги побьют. А вода не заберет.</p><p class="p1">Вот оно что. Они действительно провожали, но только не покойника на тот свет и не жениха с невестой в новую жизнь. Это моряков провожали — Логинов только не знал, на войну или еще куда. Но теперь была хоть какая-то ясность, и он сразу успокоился. На другом конце стола женщины запели удивительно красивую песню, от которой было и грустно, и хорошо. Он почувствовал если и не родство еще с этими людьми, то уже что-то общее, какую-то близость — и с толстым усачом, и с огромным бородачом, и с юношей, у которого уплывал дядя, и с черненькой, и даже (это было неловко, но неизбежно) с той бабой, которая была Землей-матерью. И когда внесли десерт, он уже знал, что с ним делать. Он погрузил туда лицо, но сквозь божественный ванильно-клубничный привкус проступила вдруг омерзительная капустная тухлятина.</p><p class="p1">…Логинов сидел перед грязным столом со связанными за спиной руками и выхлебывал больничные щи.</p></span>
