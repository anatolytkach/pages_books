<p class="p">15 октября 1928, Москва</p>
</div><p class="p1">Подбором комиссии по делу Шелестова занимался лично Климов. О деле доложено было на самом верху. По документам на Шелестова не было ничего, настолько ничего, что самая способность его к литературному творчеству представлялась фантастическим делом: он словно бы и не жил — откуда ж брал? Ведь он вот уже второй том заканчивал, уже первую его половину печатал литературный журнал «Октябрь». Там дело шло о первых днях революции, о феврале, когда ему было пятнадцать, о бегствах с фронтов, увиденном глазами опытного бойца, который хоть и понимал все про царский режим, а все же болел за Россию. Откуда ему за нее болеть, когда он ее, собственно, не видал? Когда он только и видал, что советскую власть, и та его почти не трогала? Климов на него посмотрел. Он участвовал в разгроме Маслакова в двадцать первом, был легко ранен — не так, как описывалось у него, с кишками наружу и прочими ужасами, а пустяшно задет; был в продотряде — решительно ничем не отметился; учился очень так себе, четыре гимназических класса, семья весьма среднего достатка. Кто там сейчас разберет, что в действительности было на Дону? Климов весь девятнадцатый год проработал в аппарате Дзержинского и такого навидался, что половины не помнил, а другой половине не верил. Хотя, казалось бы, что особенного? Но это сейчас он в книгах читал про все эти дела — и цифры не впечатляли; а ты поди посмотри в глаза тем цифрам, когда они в еще живом виде тут ползали, до последнего надеялись, пытались даже угрожать… Если в Москве, у аккуратиста Эдмундыча, творилась такая неразбериха, что одного человека по всем документам расстреляли три раза, а он был жив, благополучен и работал сейчас резидентом в Палестине, — мало ли что там было на Дону. Вот только история с «Роман-газетой» очень не нравилась Климову. Что он такого там увидел, белая дрянь, в этой «Роман-газете»?</p><p class="p1">Шелестов во всех отношениях вынырнул ниоткуда: родители умерли, воспитывался у дядьки, женат был на дочери соседа, вся жизнь у хутора на виду, и никто в нем сроду не замечал способностей. Климов отправил человека на тот хутор, под предлогом заботы о творческих условиях. Тот неделю прожил у Шелестова, доложил: чисто. Работает каждодневно по четыре-пять часов, пишет со всей серьезностью. Есть черновики рукой жены, но что ж такого? За Толстым и то жена переписывала, сам себя не разбирал. Шелестов был дружелюбен, пустил в самую, можно сказать, кухню: есаула Крячкина убьют в конце второго тома, с Дарьей, женой его, еще не решил… Анфиса вряд ли будет наша, а Панкрата постараюсь, постараюсь. Говорил он, правда, — чтоб такое заметить, хватило и наблюдательности молодого агента, — не так живо и густо, как писал; но ведь и Толстой небось не каждую свою устную фразу оплетал вечной своей паутиной попутных соображений!</p><p class="p1">Мало ли что молод, — а Лермонтов что, был стар? И это еще сто лет назад, когда вообще все было медленней. Теперь, говорят, ребенок уже в восемь все понимает, а в Африке с шести рожает. Странно сказать, в душе Климов был за Шелестова. Он хотел, чтобы у нас был честный красный Толстой, а еще больше хотел, чтобы Панкрат воссоединился с Анфисой. И конечно, белый таксер не мог сказать правды. Мы их недодавили, а они нам оттуда будут отравлять нашего честного писателя. Нешто какой-то роман мог уцелеть в Гражданскую, и чтоб его возили с собой по фронтам? Но для очистки совести нужна была комиссия, причем гласная, с таким решением, чтобы ответить всем «Последним новостям»; и Климов ее собрал.</p><p class="p1">Туда вошел, для начала, молодой гений Воронов, для которого это было первое общественное поручение по писательской линии. Воронова не любили коллеги, ругали критики и не считали своим На Самом Верху. При этом все его уважали, вот странность, и чем больше ругали — тем больше уважали. Про него уж никто не подумал бы, что — украл. Нет, именно Воронов и написал — потому что Воронов похож был на свою прозу; но это именно и делало ее только прозой, хорошей, конечно, но все-таки не «красный» Толстой. Он был ровно таким же — угрюмым, тяжелым, не слишком жалующим человечество; замах у него был не на красных или белых, а на то, что сам человек вообще неправильное, уродливое, никакими условиями не исправишь порока в изначальной формуле. У него все хорошо было с тканью, как называли это в критике, то есть со слогом, по-человечески говоря; но это был слог именно человеческий, и последней, небесной либо подземной правды за ним не стояло. Видно было, что пишет очень умный и очень обиженный человек, которого хватает на то, чтоб проклясть и озлиться, но никогда на то, чтоб полюбоваться.</p><p class="p1">Любоваться всем этим можно было только с самого высокого этажа, на котором и выпущенные кишки — не больше чем так, красочка; но на этот этаж Воронова не пускали. С Шелестовым он был старательно дружелюбен, дабы и мысль о зависти не закралась в злобно-приглядчивые литераторские умы. И только сам он понимал, что гении — из того, шелестовского, теста: не похож, как бы отдельно от написанного. Пришло через него, не более. Так Блок мог быть любым — и вовсе не красавцем, а маленьким, щуплым еврейчонком либо роскошным полнотелым русопятом, басовитым, окающим: а стихи все равно были бы Блока, то есть Божьи.</p><p class="p1">Позвали и Борисовича, белоруса, автора эпопеи «Торф», первый том которой только вышел, а он уже плотно сидел над вторым, неохотно отвлекаясь на писательские попойки и жургазовские командировки. Этот был тихий, добродушный, очкастый, с мягкими желтыми волосами над потным белым лбом человек; повествование вел фольклорно, с обширными вкраплениями полесских легенд, которые только и читались как следует, — у него дети пересказывали страшные слухи о развалинах, в которых горел огонек, а это там подпольщик сидел. Подпольщик чудесно увязывался со всякой нечистью, он был беглый каторжанин, они его прятали потом. Во второй части выросшие дети должны были сражаться за советскую власть, и тоже в полесских болотах. Борисович был добрый малый, хоть и не без язвительности, прятавшейся в нем, как подпольщик в руинах.</p><p class="p1">Гребенников выступал как крестьянский прозаик из группы «Стальной мах» — певец наступления города на деревню; начинал с книги сказов «Бирюзово колечко», продолжил «Повестями о странных мужиках» (они все у него искали мужицкий рай, а находили грамотность или полезное месторождение). Ужасно бездарным выглядело все, что он писал, и Климов понимал это ясно, а Гребенников — уж настолько-то ЧК в людях разбиралось, — не был бездарен, нет. Повести его получались иногда так плохи, что почти уже хороши, и действительно дзержинцы видят насквозь — в столе у него лежала повесть про коммунистический город высоко в горах, написанная поперек всех литературных правил, но ведь и жили последние десять лет всему поперек. Гребенников думал ее когда-нибудь напечатать, а пока читал главы, и об этих чтениях был Климову донос; ужасно хотелось конфисковать у Гребенникова рукопись — просто чтоб почитать, — но Климов медлил, чтоб грести уж под «дело». Чтоб он жалел Гребенникова — что вы, кого он вообще жалел? Он дочку свою жалел, когда болела, маленькую бедную девочку. К тому же Гребенников был неприятный, ершистый, с носом-кнопкой, и все лицо как бы вдавлено, словно на эту кнопку нажимали и говорили: «Тихо сиди»!</p><p class="p1">Сосновский — переводил. Он был еще когда-то поэт, две книжки в Питере до революции, но потом то ли остыл, то ли не вписался. Он переводил теперь: для денег — буржуазную дурь, путешественников, колонизаторов, новых жюльвернов, а для себя «Энеиду». Говорил, что скоро закончит, но работы, по всему судя, хватало еще лет на двенадцать, и он не торопился, растягивал. Репутацию эрудита, узнающего по двум строкам любого классика, заработал еще в юности. Многие считали, что он не наш, а Климов знал, что наш и всех переживет, хотя никогда про это не говорил и даже думал темными, недостаточными словами. Нужных слов он не знал. Сосновский хорошо понимал иерархии, что получше, что похуже, кто великий, кто так себе, а потому был в глубинном смысле наш, больше, чем Борисович со всеми его руинами. А может, просто Вергилий его хранил, у него есть такие возможности.</p><p class="p1">Пырялова, старого писателя, громче всех хвалившего молодое дарование, Климов включил как знатока Дона. Единственным достоинством старого писателя Пырялова — его иначе уже и не называли, он все время подчеркивал, какой он старый, — оказалось то, что донскую жизнь он описывал с 1889 года, когда опубликовал стихотворение в прозе «Курган». Его вечно использовали в писательских третейских спорах — именно потому, что он старый. Будучи старым, он всегда чувствовал, где сила, и безошибочно брал ее сторону. Это и есть мудрость, а какую вы еще видали?</p><p class="p1">И вот Климов их всех собрал повестками — указав целью экспертизу, чтоб не обделались, — и объявил задачу: так и так. Своего не отдадим, чужого не хотим, требуется определить принадлежность сочинения, потому что в белоэмиграции мы имеем клевету, да и у нас ползают всякие слухи. Этот вопрос требуется закрыть сразу и навсегда, потому что дворянство не может смириться с изумительным ростом пролетарской культуры. Они будут нам доказывать, что могут только они, а наше дело — молотить и бороновать. Но ничего, мы докажем, а если разовый случай покражи, то не боимся самоочищения.</p><p class="p1">Шелестов с виду даже обрадовался. Он сам все повторял, что желал бы положить конец и так далее. В душе у него в это время делалось бог знает что. Он привык уже, что это его книга, а тут — такое. Он самое лучшее, самое интересное там написал. До него это было черт-те что и сбоку бантик, девичья фантазия, которую даже если и писал какой-то хорунжий, то глупый, несерьезный хорунжий. Пусть не Шелестов придумал Панкрата с Анфисой, но он влил им горячую кровь. До него это институтка была, а не казак Панкрат, а уж Анфиса просто была какие-то «навьи чары», которых он не читал, но на рабфаке так называли всякую дореволюционную мистятину.</p><p class="p1">Рукопись, полученная в двадцать пятом, существовала теперь в двух видах. Часть ее была аккуратно переписана при помощи Манюни (оригинал тут же уничтожался, жегся, якобы черновики), а то, чего переписать они не успели и что нужно было для третьего тома, он прикопал. Прикопано было в хорошем месте, не найдут. Так что с этой стороны бояться было нечего. Он с другой боялся: писатели, зависть. Писатели умели завидовать лучше всех. Они, собственно, ничего другого не делали. Даже рабкоры завидовали не так, у них ума не хватало на такую гадость.</p><p class="p1">Он предоставил: рукописи, черновики, начало второго тома, выписки свои из архивов в огромных клеенчатых тетрадях, блокноты разговоров с участниками, все, вообще все. Он это с такой легкостью отдал, потому что, во-первых, продолжение-то было прикопано, а начало второго тома уже печаталось. Исправления все же видно. Толстой так не черкал, как он. Даже перед отдачей рукописи еще в ней почеркал. У него было, конечно, подспудное чувство, что Климов за него, и На Самом Верху за него, потому что нужен, нужен наш гений. Но черт их знает, писателей. Каждый руку отдаст за то, чтоб другого потопить. Хотя, казалось бы, пиши сам этою рукой — или места мало? Или мало покрошили народу на Гражданской войне — МЕСИВО, КРОШЕВО, — и не хватит описать на всех? Хочешь быть наш гений — ну и будь, другим не мешай! Так что уверенности не было у Шелестова, нет. И на те две недели, что работала комиссия, он уехал к тестю и там попытался все забыть, живописуя корниловский поход, все источники подобраны; но душа волновалась, и выходило скучно, бегло.</p><p class="p1">После двух недель поочередного ознакомления с рукописями — больше Климов не дал, реагировать на «Последние новости» требовалось спешно, — комиссия собралась у Сосновского писать бюллетень. У Сосновского были две комнаты на Петровке. В них царил холодный, строгий старорежимный порядок. Сосновский разрешил курить, но разрешением никто не воспользовался, даже и говорить старались тише.</p><p class="p1">— Ну что же, — начал Гребенников, — я просмотрел все, и мне кажется, что сомнений нету.</p><p class="p1">Он выдержал паузу. Все сидели как замороженные.</p><p class="p1">— То есть наш товарищ чист, как есть чист, — пояснил он, видя общее недоумение.</p><p class="p1">— Давайте прямо, друзья, — после еще одной паузы предложил Сосновский. — Мы хотим подладиться или сказать как думаем?</p><p class="p1">— Это-то и вопрос, — кивнул Борисович.</p><p class="p1">— Мы не можем знать, чего хотят, — сказал Сосновский, поправляя тяжелые очки. — Может так случиться, что забежим впереди паровоза. Книга у него ни за, ни против, куда вывернет — понять нельзя, и очень может статься, что сейчас его выбрали под удар. Тогда это будет с нашей стороны нехорошо, даже если мы все честно полагаем, будто писал не он. Потому что он это писал или не он, а я со своей стороны скажу, что книга исключительная, и чем дальше, тем более исключительная.</p><p class="p1">— Ну я не стал бы так, — заметил Гребенников. — Книга как книга, я не скажу, что он стоит прямо как дуб среди долины ровныя. Достойная вещь, ее и печатают, ее бы не печатал «Октябрь», если бы не достойная. Но вылепливать гения, захваливать всесторонне — я оснований не вижу. И ничего там такого нет, чего не мог бы написать человек в двадцать шесть лет.</p><p class="p1">— Иные и в сорок не напишут, — сказал неприятный Воронов, язвина.</p><p class="p1">— Если мы говорим сейчас в своем кругу, — и Сосновский со значением всех оглядел сквозь очки, — вне любых соображений, независимо, кто и чего от нас хочет, — то я сказал бы, что в двадцать шесть лет такую книгу написать невозможно, в особенности при учете всего, что мы знаем. Боевого опыта ноль, продотряды я не думаю, чтобы могли называться боевым опытом… Он так описывает в деталях вооружение, уход за лошадьми, особенности конного строя…</p><p class="p1">— Это на Дону всякий знает, — сказал Пырялов, старый писатель, жуя седые усы. — В крови это у донцов.</p><p class="p1">Уж Пырялов-то, были уверены все, за Шелестова горой, курганом, — он готов был любого вознести на пьедестал за один факт рождения на Дону. Местнический этот патриотизм был невыносим и в последнее время выходил Пырялову боком — казаков не жаловали, однако и к ним, и к Пырялову отношение было двусмысленное. Они, конечно, были оплот царизма и все такое, и Троцкий в девятнадцатом году так погулял на Дону, что имя его там и посейчас было хуже самой черной ругани; однако где сейчас был Троцкий? Сейчас вон и товарища Шелестова роман печатали, и товарищ Сталин был почетный казак станицы Горячеводской с 1925 года, за что публично и торжественно благодарил, клянусь, мол. Конечно, посвящение в почетные казаки прошло без должной формальности, шашку не дарили, нагайку не вручали, но ходока отправили прямо в Сочи, где товарищ Сталин имел в то время лечение печени, измученной в подполье. Ходока пропустили, накормили, напоили кирпичным чаем, ласково приняли и отпустили восвояси с дружественной запиской. Оно конечно, терское казачество можно понять, кто ж тронет теперь родную станицу товарища Сталина? Казачеству, понимали все, без разницы было, за какую власть хлестать нагаечкой, — лишь бы потакала их бесконечной, бесплодной кичливости; говорили, им и национальность разрешат в бумагах писать — казаки, потому что они не русские, не кисель; русским приходилось теперь, пожалуй, еще и похуже, чем казакам. Мерзейшие их черты — вот эта кичливость, драка по всякому поводу, культ грубости, хэканье, гэканье, которого и у Шелестова было по самое не могу, — очень даже нравились теперь На Самом Верху, их поднимали на щит, донцам намекали, что ничего не забудем, но зла не держим, — так что Пырялов, пожалуй, верно чуял силу, выгораживая друга-донца, птенца орла, как он гордо его именовал (орлом, надо понимать, был он сам, сутулый, усатый, вонючий).</p><p class="p1">— Но перемещения войск в пятнадцатом году у него не могут быть в крови? — с тихой злостью спросил Сосновский. — Или у донцов полная история отечественной войны всасывается с молоком матери, тогда как истпарт над нею только еще работает?</p><p class="p1">Все ждали, что Пырялов его срежет, но тот лишь покачал лысой, в старческой «гречке» головой.</p><p class="p1">— Ну, Лев Толстой тоже всего за два года изучил в деталях ход войны, — напомнил Гребенников.</p><p class="p1">— Лев Толстой служил в артиллерии, если вы помните.</p><p class="p1">— Так у него не так уж много войны-то. Самих боевых действий почти нет, — засуетился Гребенников, — все больше перемещения. В бою не поговоришь, а у него все только и делают, что гутарят. Причем одинаково гутарят про баб и про революцию, которой вдруг все казачество так и ждет. Это как раз черта незрелого писательства.</p><p class="p1">— Дак они так и гутарили! — вступился Пырялов. — Про баб да про революцию, про что еще казаку было гутарить?</p><p class="p1">— Я бы скорей о другом, — сказал вдруг Борисович. — Там много у него, конечно, откровенного, на грани даже приличия… И я подумал, что это молодому писателю не свойственно. Может быть, я один так стыдлив, — и он улыбнулся кроткой белорусской улыбкой, — но мне стыдновато было так прямо обо всем этом… я избегал, даже теперь избегаю… (он говорил: «ИзбЯгаю» — и это было еще трогательней, что писатель сознавал, конечно).</p><p class="p1">— А это как раз и есть дело молодое! — снова защитил донца старый писатель Пырялов, которому одна теперь была услада — почитать, как другие умеют. — Как на Дону говорится, надо, чтоб стоял до звона! — чтобы так писать, я имею в виду.</p><p class="p1">На Дону, в изложении Пырялова, все время говорились ужасные глупые грубости, и это считалось по-казачески храбро, стойко.</p><p class="p1">— И мне кажется, — кротко, но упрямо продолжал Борисович, — что это книга зрелого, опытного мужчины. Потому что юности свойственно, что ли, чувство тайны, она любит загадку. А для Шелестова загадок нет, он видит все, что ли, очень прямо, я не слишком хорошо говорю («Ты и пишешь не слишком», — подумали все), но это различие между юношеским миром, таинственным, и миром взрослого я очень понимаю, потому, наверное, что сам сейчас героев через это провожу («Не мог не свести на себя», — подумали все снова).</p><p class="p1">— Коллеги, я хочу вернуть разговор на конкретику, — призвал Сосновский. — Все видели рукопись, она кажется мне аутентичной, подлинной, имеет следы работы со словом, и даже если Шелестов пользуется чужим материалом, то он им пользуется умно, осознанно. Можем ли мы сегодня считать грехом использование чужих записок или хотя бы даже художественного произведения? Нет, надо признать, что с этой стороны товарищ Шелестов защищен прекрасно. У нас имеется образчик, когда Некрасов, поэт, без сомнения, великий и притом высоконравственный («Ну как же», — опять подумали все), использовал почти дословно французские записки Марии Волконской, тогда большинству читателей не доступные. Что же, осудим мы Некрасова? И более того: литература будущего, возможно, вся будет состоять из обработанных документов, как полагает, в частности, уже сегодня товарищ Брик.</p><p class="p1">Возможно, что товарищ Шелестов и некритично, и слишком обильно использует чужой материал, но это не есть еще преступление. Я только хочу понять, что привнесено в книгу собственно товарищем Шелестовым, и не портит ли он ее, заставляя казаков в пятнадцатом году рассказывать о том, как прекрасно они заживут после революции?</p><p class="p1">— Нет, уж я скажу, — взыграло ретивое у Пырялова, и все приготовились к долгой, злобной защитительной речи, в которой он замарал бы всех, а птенца-донца вознес на курган, — и тем сильнее было потрясение.</p><p class="p1">— Я скажу, — начал Пырялов, как подобает старому писателю: перхая, отмахиваясь от сочувствий, шумно отхлебывая воду. — Вы говорите все не о том. Я не знаю, что использовал Шелестов. Я только знаю, что Кирилл Шелестов — не коренной донец. Нет! Роман его, может быть, и писал человек с Дона, и даже наверняка, — я знаю, вижу. Но сам Кирилл Шелестов, в ком нет главного — нет знания традиции, почитания старших, нет чувства долга нашего перед ними, — он не наш, я убедился в этом, товарищи. Я в этом не-од-но-кратно убедился! Я вам со всею точностью говорю: вы можете делать, что хотите, но я не признаю Шелестова за донца.</p><p class="empty-line"/><p class="p1">Во всю свою литературную жизнь Пырялову не удавалось так удивить аудиторию. Немногие знали, что Шелестов неосторожно поучаствовал в кампании против старого писателя, да и как поучаствовал? — тьфу! «Комсомольская правда» затеяла дискуссию об использовании местных речений, диалектных и жаргонных словечек; Горький прислал из-за границы статью, что они только засоряют речь, и попенял Пырялову. Что же? Шелестов горячо присоединился и сказал, что сам он уже чистит свои «Пороги» от донских речений; но Пырялов обиделся, конечно, не за донские речения. Он обиделся, что Шелестов не защитил учителя, не вспомнил, кто и отвел-то его в «Октябрь» и обласкал его детское «Марево», не говоря уж о первой части романа; он слова не сказал в защиту старика! И больше: Пырялову передавали, что как-то в писательском застолье Шелестов, всегда немногословный и осторожный, почувствовав, видимо, себя настоящим литератором, сказал вскользь: да ну, Пырялов! Что это за писатель? Он очеркист, и то так себе. У него же природа неживая, и говорят, как в оперетте. Что он знал, чтобы так себе позволять? Пырялова Бунин хваливал! — но Бунин теперь уехал, сука, и некому было заступиться.</p><p class="p1">Нет, Шелестов не был, не мог быть писателем. И Пырялов даже один раз с донской прямотой подступился к нему: что же ты, курва, не защитил старого писателя?! Или ты не знал, что Максимычево слово теперь закон, что если Максимыч кого выпорет, то уже пощады не будет? И он ответил, прямо глядя стальными своими голубыми глазами в пыряловские, с обвисшими нижними веками, глаза старой собаки:</p><p class="p1">— Михаил Григорьевич, мне важно теперь спасти мой роман. Мой, понимаете? Я не имею права никого защищать, ни за кого вступаться: мой роман. В котором главная правда. Который должен быть любой ценой. Понимаете теперь?</p><p class="p1">Донец не мог так сказать. И уж, конечно, так беспокоиться можно было только за чужую собственность. Пырялов ничего этого не рассказал, но повторял с деревянным стариковским упрямством: он не наш, он на Дону внешний. Я по всему это чувствую. Эту книгу писал не он. Это дело надо раскапывать и показательно разоблачать.</p><p class="p1">Конечно, все поняли, что суть не в донцах. Попросту старый писатель Пырялов хотел быть главным, а лучше бы единственным донцом в литературе, и тут его позиции, раз-два, потеснил Шелестов, да так, что от всех заслуг Пырялова грозила остаться строчка в шелестовской биографии: в гроб сходя, благословил. Пырялову не хотелось в гроб, у него на будущий год намечался юбилей, сорок лет литературной деятельности. Он рассчитывал на повышенную пенсию. Он уже в девяносто третьем в аллегорическом рассказе «Суслики» заклеймил соглашательскую интеллигенцию. Максимыч, который был тогда не наше все, а грубый, хитрый волгарь, лебезивший перед сильными, гаерскими рассказами забавлявший полумертвого Чехова, — говорил ему: сОчнО, сОчнО! ГустО забираете!</p><p class="p1">И вот теперь Шелестов, двадцать шесть лет, прошу любить и жаловать. Нет, старый писатель впился в звание первого донца, он не мог пустить туда мальчишку! И всем стало нехорошо при виде этой некрасивой старости, потому что от такой не застрахован никто из нас: все мы будем ненавидеть молодых и по возможности им гадить, а молодые, если выживут, будут со скрежетом зубовным нас благодарить за хорошую школу. И пока Пырялов, не в силах остановиться, повторял все яростней, что за Шелестовым нет опыта, не чувствуется знания, — все сидели с опущенными от неловкости глазами.</p><p class="p1">— А знаете, — начал вдруг Воронов, и уж от него-то все ждали последнего удара, — я бы не согласился. Извините. Я скажу про себя. Или нет. Начну не про себя. Я видел давеча одного командира, славного командира, у которого, однако, даже среди своих репутация была… как сказать? Зверь он был, проще говоря. И вот я его увидел. Он был тишайший, толстый человек. Он работал бухгалтером. Я гонорар там получал, ну и увидел. Я даже фамилию его вам скажу, наверняка знаете, — и он сказал фамилию, и Борисович кивнул, а Сосновский усмехнулся. — Так вот это тот самый. Им детей пугали. И он был худой, высокорослый. А теперь этот рост скрался толщиной, и он сидел такой уютный, такой точный! Он считает прекрасно. Так вот я скажу вещь странную и даже, может статься, идеалистическую, но вы уж простите меня, мы все с вами немножко недозволенные люди. — И Борисович хмыкнул, а Сосновский кивнул. — Нас всех немножко перерезало пополам, и все мы не совсем мы.</p><p class="p1">Волосы у него были черные, вороново крыло, а глаза синевы необыкновенной, и он был бы красавец, если бы не выражение боли и тайной злости, даже, пожалуй, неловкости за человечество. И проза его была красивая, но с трещинкой. Однако когда он говорил сейчас, все им любовались, потому что он был первый, кто сказал по делу.</p><p class="p1">— Еще пример: солдаты наполеоновских войн, кто не умирал, жили потом очень долго, исключительно даже долго по тем временам. Я полагаю, они были обожжены славой. Есть облучения, дающие нечеловеческую силу, — и все мы, которые начали в двадцать, в двадцать пять лет жить как бы с нуля, мы моложе своих лет и притом старше. Мы все пишем по чужой рукописи, и все, что мы печатаем, — палимпсест. Что же мы цепляемся к одному? Нас переломило, и новое в нас поверх старого, а где и перепуталось с ним, — но все мы обожжены, и нельзя к нам относиться как к обычным тридцатилетним. Мне двадцать девять, и мне же восемнадцать, и навсегда будет восемнадцать, как было в октябре; и мне же триста, столько я видел. Мы прошли излучение вроде лучей Рентгена, оно на нас застыло, и от наших страниц сто лет спустя будет исходить оно. Говорят, революция многих убила. Да, так! Но и скольких она сотворила! Когда-нибудь, лет через сто или раньше, ей припомнят всю кровь. Но пусть припомнят и то, что мы стали — боги!</p><p class="p1">Он умел похвалить с неожиданной стороны, потому и выжил; и возразить было нельзя, так что даже Пырялов перестал перхать и с трудом подавлял желание вытянуться в струнку.</p><p class="p1">— Мы без возраста, без социального происхождения. Наша биография — это сколько книг мы прочли и сколько человек убили. И я стрелял, и я убивал, и сейчас не верю. Я сижу сейчас перышком вожу, а тогда я был кто же? Я был кентавр, сросшийся с конем, в седле евший и пивший, и, случалось, ночевавший. А он, может, младше был, так его и сильней поломало. Так что я бы за то, товарищи, чтобы отказаться от старых критериев… и пускай себе товарищ Шелестов пишет, как пишет. Потому что, — и тут он даже, кажется, подмигнул Сосновскому, — товарищу читателю ведь все равно, он тоже кентавр.</p><p class="p1">Посовещавшись еще для виду, они подали Климову заявление, что считают роман Шелестова романом Шелестова и рекомендовали бы разве что — votum separatum (отдельное мнение) Сосновского, поддержанный Пыряловым, — обратиться для окончательного вердикта к кому-нибудь из опоязовцев, дабы числовыми выкладками уничтожить последние сомнения.</p></span>
