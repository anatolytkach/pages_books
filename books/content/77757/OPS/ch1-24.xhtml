<p class="p">15 сентября 1940, Тула</p>
</div><p class="p1">Дивно ясной, солнечной и долгой запомнилась жителям средней России последняя предвоенная осень, словно заранее все знавшая и желавшая побаловать напоследок всех, кто умрет так скоро, так страшно, а если не умрет, то лишится крова, любимых и себя прежнего. И такая была несказанная печаль в этом тихом лиственном облетании, в ярко-синем небе, в сухой ломкой траве, в полете последних крапивниц и шоколадниц, что все иные чувства из души светлоглазого и строгого пассажира, сошедшего в Туле с трехчасового московского поезда, она мгновенно вытеснила.</p><p class="p1">Он прошел пешком через центр, не задержался в заводских районах — Штыковая, Патронная, — и спустился к Оке, в лабиринт старых улочек почти сельского вида. Дома тут были большей частью двухэтажные, а то и вовсе скромные халупы того неопределенного цвета, какой бывает у русских деревянных домов на восьмом десятке жизни, когда, бесконечно перекрашиваясь и уже не надеясь никого обрадовать своим видом, стоят они, храня отпечатки всех покрасок, и обретают наконец серебристо-серый с оттенком старческой розовости, словно вывернутые веки у нищего; таковы же бывают и русские лица, которым пришлось сменить с десяток выражений, от угодливого до грозного и обратно, и теперь, в умиротворенный прощальный день, проступило на них то единственное, которое и есть последняя подлинность. Трудно назвать эту основу здешнего характера, ошибочно принимаемую иными за покорность и даже кротость, а между тем это лишь бесконечная тоска существ, перепробовавших все и понявших, что переменить ничего невозможно. Ничего другого не будет, кроме как вот так; и если им повезло не самоуничтожиться под какой-нибудь очередной Ракитной, они сидят на старых лавках либо завалинках и провожают выцветшими глазами такого же светлоглазого прохожего, до которого, в сущности, им нет никакого дела.</p><p class="p1">Он прошел Садовую, Краснознаменную, странную Мастерскую — окраины, тающие, растворяющиеся в заокских лесах, лугах и прочей природе, как сказал бы его любимый собутыльник, такой же светлоглазый, все повидавший и ничего не изменивший южнорусский уроженец. В этих промежуточных, полусельских-полугородских домах жили промежуточные люди, не заводчане, не поселяне, кустари-одиночки, огородники и ремесленники, так хитро проникшие в щель между мирами, что додавливание их всегда оставалось на потом, а потом всегда что-нибудь случалось, и на них опять не хватало времени, сил, свинца и олова. Больше года искал прохожий двух стариков, проживавших на улице красного героя Смирненкова, сменившей за тридцать лет третье название, потому как предыдущий красный герой Валухин оказался впоследствии троцкист; за всеми этими переменами фамилий, названий и правил хорошего тона как же отыщешь двух стариков, которым ты уже, в сущности, никто? Даже помощь товарища Аркатова, видного организатора всеобщей переписи, сильно напоминающей инвентаризацию кладовой перед решающим обедом, сработала лишь летом, когда во всесоюзной адресной службе совершенно бесплатно изыскали адрес подходящего по возрасту пенсионера Валериана Ильича с супругой Ириной Николаевной.</p><p class="p1">Прохожий нашел когда-то лиловый, а может, коричневый, ныне же серо-бурый домишко посреди клочка сухой песчаной земли с грядками мальв и табака. У ворот сидел старик в ветхой соломенной шляпе. Прохожий поздоровался и предложил закурить. Старик посмотрел недоверчиво, но папиросу взял.</p><p class="p1">— От сына вашего вам привет, Валериан Ильич, — сказал прохожий.</p><p class="p1">— Давно пропал, — глухо ответил старик. — Говорят, большой человек стал. А может, умер.</p><p class="p1">— Здравствуй, отец, — сказал прохожий.</p><p class="p1">Отец взглянул на него и не удивился.</p><p class="p1">— А и правда, — сказал он ровно. — Здорово, Алексей. Что, большой человек стал?</p><p class="p1">— Да так, — неопределенно ответил сын.</p><p class="p1">— Что ж пропал-то?</p><p class="p1">— Ранен был, болел. Память потерял.</p><p class="p1">— Многие теряют-то, — заметил отец сочувственно и даже одобрительно. — Я тоже плохо все помню. Это сколько ж ты лет пропадал?</p><p class="p1">— Двадцать будет, — сказал сын.</p><p class="p1">— И как же ты?</p><p class="p1">— Подобрали добрые люди, чужое имя дали. Я с ним пообвыкся.</p><p class="p1">— И чего ж, не помнил ничего? — спросил старик без удивления.</p><p class="p1">— Ну как, помнил чего-то… Но мне, отец, нельзя помнить-то было.</p><p class="p1">— Да и я уж много не помню, — опять сказал отец. — Ростов забыл почти.</p><p class="p1">— А мама где, отец?</p><p class="p1">— Мама к соседям пошла. Придет счас. Или сходи за ней.</p><p class="p1">— Не надо. — Сын присел рядом с отцом на скамью. Проступило в них сходство, да наблюдать было некому. Оба были смуглолицые, светлоглазые, пустые и светлые были их глаза, у сына тоже начинали седеть усы, а руки были меньше отцовских и мягче. — Не хочу, чтоб знали тут. Не надо.</p><p class="p1">— А и то, — сказал отец и после молчания добавил: — Сапожничаю вот.</p><p class="p1">— Ну и я вроде того. Я денег привез.</p><p class="p1">— Хорошо, спасибо, — сказал отец. — Вообще все есть так-то. Сейчас появилось все, это раньше не было. Мать придет, супу поешь.</p><p class="p1">— А что Оля, отец? — спросил сын.</p><p class="p1">— Оля померла в Ленинграде, в Ленинград поехала и померла.</p><p class="p1">— А помнишь, Анна, Анна такая была, я привозил ее в шестнадцатом году?</p><p class="p1">— Анну помню, — твердо сказал отец. — Помню, была. Так она была у нас.</p><p class="p1">— Когда? — спросил сын, стараясь ничем себя не выдать.</p><p class="p1">— Так лет пять назад. Она и сказала, что ты жив, большой человек стал.</p><p class="p1">— А сама потом куда?</p><p class="p1">— Не знаю, адреса не оставила. Она замуж вышла. Она у нас еще в Тамбове была.</p><p class="p1">— Что ж ты в Тамбове делал?</p><p class="p1">— А у брата жили, дядьки твоего. Его сын женился потом, мы в Тулу съехали, тут у матери двоюродная сестра. Она померла потом. Много померло.</p><p class="p1">У прохожего мелькнула мысль — уйти, не дожидаться матери, но мысль эта была подлая, не для того он так долго искал ее. И он сидел на лавке, чужой человек, с чужим, в сущности, стариком, с которым и говорить было не о чем, потому что, побывав приказчиком и хозяином собственного дела, он побывал потом беженцем, конторщиком, плотником и вот сапожником, и ни одна его новая жизнь не была настоящей, а настоящую он забыл. И когда мать в тесной, нечистой комнатке кормила его супом, гость напрасно искал следы детства, вещи оттуда — ни одной не было. Мать сидела напротив и сухими глазами смотрела, как он ест. На улице все сильней припекало, есть ему не хотелось. В комнате много было мух.</p><p class="p1">— Мама, — спросил он, — а помнишь, конь у меня был деревянный, рыжий? Седло зеленое?</p><p class="p1">— Не помню, — сказала мать. — А, был, да.</p><p class="p1">— Прости, что я не писал, — сказал гость. — Я двадцать лет почти не помнил ничего.</p><p class="p1">— Я ждала, ждала, — сказала она, — потом перестала.</p><p class="p1">— Я денег привез, буду присылать, — сказал сын.</p><p class="p1">— Ах, да что, — сказала она. — Нам много ли надо?</p><p class="p1">Он искал хоть тень былой интонации, хоть голос, хоть что-то от ее прежнего запаха, — но ничего не было, все было другое. Какую же вам книгу, подумал он, какую еще книгу? Что можете вы сделать с этим? Он не знал, к кому обращался, а «это» было слишком велико и вместе с тем слишком понятно, чтобы его разъяснять. Вообще ничего не надо было больше разъяснять, и ничего не было нужно.</p><p class="p1">— Я денег пришлю, мама, — сказал он.</p><p class="p1">— Да ничего не надо, все есть. Ты раньше бы писал, — сказала она, — я раньше ждала, а ты не писал, я перестала. Мне друг твой написал, убили тебя. Но я ждала, потом только перестала.</p><p class="p1">— Я книгу допишу, пришлю, — сказал гость.</p><p class="p1">— Допиши, — сказала она, — пришли. Сосед говорил, будто с портретом напечатали, будто похож. А я смотрела — не похож. Глаза другие, весь другой.</p><p class="p1">Эммаус, вспомнилось ему. Апостолы не узнали его по дороге в Эммаус. Между тем он был тот же самый, просто умер, но ведь жизнь на этом не кончается.</p><p class="p1">— Пумпончик, — сказала мать. Он вспомнил: до шести лет был пумпончик, шапочка голубая с пумпончиком. Ничего больше не осталось, и пумпончика давно не осталось.</p><p class="p1">— Пойду я, — сказал он.</p><p class="p1">— Женился? — спросила вдруг мать.</p><p class="p1">— Женился.</p><p class="p1">Он достал фотографию Манюни с сыном, держащимся за ее юбку, и дочкой на руках.</p><p class="p1">— А хорошие какие, — сказала мать, но в гости привезти не попросила.</p><p class="p1">— Я приеду еще.</p><p class="p1">— Приезжай, конечно, — сказала она. — Ты слышал, Оля умерла?</p><p class="p1">— Да, отец сказал.</p><p class="p1">— В Ленинграде.</p><p class="p1">— Да.</p><p class="p1">— Тогда не было ничего, — сказала она, — теперь все есть.</p><p class="p1">— Да, теперь все есть.</p><p class="p1">Он постоял еще в центре песчаного квадрата земли, среди мальв и табака, и вышел на улицу героя Смирненкова. Улица героя упиралась в лес, он пошел в лес, оттуда тропинка вывела его на сухой желтеющий луг, потом на берег обмелевшего озерца с расщепленным сухим деревом на краю, и тут он некоторое время стоял, щурясь.</p><p class="p1">Вот Дехтерев все интересовался, как это на эмоциональном уровне, подумал прохожий без злости, вообще без всякого чувства. А это никак. Бывают кентавры, да, бывают люди, написанные поверх себя прежних, и даже люди, воскресшие из мертвых. Но не бывает людей, которые бы при всем этом сохранили живое чувство к чему-либо, хоть бы и тщеславие. Наверное, в природе весь этот хваленый покой, который кажется кому-то величием, именно от того, что она была уже и раскаленным океаном, и буйным древним лесом, и ледником; тут все теперь очень красиво, но совсем мертво. Россия тоже всем была, сейчас она Шелестов, глупая, молодая. Но когда-нибудь вспомнит все и станет как я сейчас, спокойная, может быть, но мертвая, ни на что не годная. Как же будет выглядеть набор слов, который разбудит ее, какой Дехтерев скажет ей эти слова, и какой ужас обрушится на нее, если меня эта память едва не раздавила? Но я крепкий, подумал он, и буду жить долго, как это мертвое дерево на берегу, как эта сухая трава, которая будущей весной забудет себя.</p><p class="p1">— Вот как он вспомнил все, так и не может больше ничего, — сказал он вслух. Странный разговор с Муразовой в степи вспомнился ему — он говорил тогда не свои слова и впервые почувствовал близость воссоединения. — Только когда же вспомнил? Верно, в Эммаусе, когда они узнали его. Вспомнил все и теперь ничего не может, как и я не могу. Неужели никогда больше? Ведь он все умел! А теперь одна вот эта трава, одна вот эта береза.</p><p class="p1">Четвертый том «Порогов» и весь роман заканчивается огромным, неоправданно длинным пейзажным отступлением, которое в первый момент ошарашивает читателя: он так и не узнает, что случилось с Анфисой, как она выжила, уйдет ли к ней Панкрат, предав свою Варю, и что станется с колхозом, против которого умышляет бывший хорунжий. Вместо финала роман увенчивается описанием сухого луга и небольшого зеленоватого озерца, на берегу которого сохнет расщепленное грозой «дерево, которому не расти снова» — этой фразой заканчивается роман, получивший в 1941 году Сталинскую премию и переведенный на главные языки мира.</p><p class="p1">О смысле этой финальной фразы написаны книги, чей совокупный объем давно превысил «Пороги». Кто-то видит в ней намек на «разделенное в себе царство», кто-то — на непреодолимый российский раскол, одним из проявлений которого стала Гражданская война. Отдельная литеатура, посвященная гипотезе о двойном или даже тройном авторстве главного советского текста тридцатых годов, интерпретирует финал как смутное авторское указание на собственную двойственность или расколотость коллектива. Сам смысл пейзажного отступления трактуют либо в духе «Отцов и детей», дескать, все примиряет природа, либо представляют дело как отказ Шелестова выбраться из собственного мировоззренческого тупика. Закончить роман правдиво он не мог, заканчивать казенно не хотел и вот все увел в поле, пруд и расщепленное дерево.</p><p class="p1">Бесчисленные школьники писали диктанты на основе этих последних двух страниц великой эпопеи, бесчисленные мастера художественного слова зачитывали вслух со сцены это без пяти минут стихотворение в прозе, а литературоведы уподобляли природный эпилог военно-любовного романа аналогичной шутке Толстого, тоже ведь закончившего «Войну и мир» десятками страниц рассуждений, не имеющими отношения к судьбе героев. Только Толстой увел все в Шопенгауэра, а наш красный гений — все в природу, которая умней Шопенгауэра. Советская власть вообще любила природу, потому что походила на нее.</p><p class="p1">Сам Шелестов ничего не комментировал, отделываясь фразой «Там все написано». При этом, как писали все советские издания, он «лукаво посмеивался в усы», хотя публично он никогда не посмеивался и вообще усмешку его видеть было упаси Бог.</p><p class="p1">Правда, читая в специально для него сделанном переводе предисловие Ленгстона Стайна к первому полному переводу «Порогов» на английский, он все-таки усмехнулся.</p></span>
