<p class="p">16 июля 1929, Гатчина</p>
</div><p class="p1">— Ну вот, — сказал бывший начдив, а ныне агроном-селекционер Иващенко, показывая Шелестову свои цветы. — Вот это, так сказать, имеются розы.</p><p class="p1">Он говорил о цветах странно, со скрежетом зубовным, словно ненавидел свое новое мирное занятие. И все как-то косо взглядывал, оценивая, достаточно ли Шелестов восхищается розами. Восхититься было чем — у Иващенко оказался явный талант: Пурпурное Сердце с его странным запахом, то ли черноземным, то ли, чем черт не шутит, почти трупным; Роза Люксембург, белые лепестки с траурной каймой; Незабываемый 1919-й, ярко-алый, с одуряюще-пряным духом, словно гибнуть в 1919-м было одно удовольствие, — да так оно и было, вероятно. Шелестов очень жалел, что по молодости не попал на войну: ЧОН — чушь, одно название, что отряд.</p><p class="p1">— А вы до войны тоже по агрономии? — спросил он для поддержания разговора. Ему все меньше нравилось тут. Полдень был душный, давящий, с тугими синими тучами, заходившими с восточной стороны. Налетели ветры злые, да с восточной стороны. Жара пригнетала к земле, и душно, страшно пахло розами. Главное же — очень неприятен казался агроном Иващенко, а не расспросить его о событиях под Белой Церковью было никак невозможно. Он долго отказывался от встречи, ссылаясь на занятость, на давно оставленную армию, на цветоводство, отнимавшее все время, — и лишь когда подключили Буденного, согласился на короткий разговор для государственного дела. Теперь, когда обвинение в плагиате пало, Шелестов был человек государственный и нес это бремя с достоинством. В нем не играла уже молодая гордость, и сам он ничем не напоминал молодого журналиста, автора первого тома «Порогов». Роман подрастил и даже состарил его. В лице его появилось нечто жертвенное, словно он не просто записывал, расспрашивал, а ежеминутно служил. Писать стало тяжелей, но и слаще. Он много чего теперь поправил бы в первых томах, но это уж потом, когда выйдет вымечтанное издание в одном томе — он так и видел его, строгое, без картинок.</p><p class="p1">Теперь ему хотелось любой ценой разговорить бывшего начдива, выманив у него подробности Белоцерковского сражения, — никто лучше Иващенко не обсказал бы, как оно случилось на самом деле, до того, как в главные герои выдвинулся Мальцев. Теперь он был замнаркома и личный друг товарища Ворошилова, а в незабываемом девятнадцатом и в прочно забытом, малоудачном двадцать первом про него мало кто слыхивал. С Мальцевым и говорить казалось бессмысленно — мы рубали да мы рубали, а кого и где — вспомнить затруднительно. Чувствовалось, что он по большей части рубал картошку с маслом, и сам был как картошка: круглый нос, бугристый череп, всегда в мундире. Иное дело Иващенко, но Иващенко теперь любил розы.</p><p class="p1">— До войны-то? — переспросил он. — Гм. Нет, пожалуй что, до войны и не думал. А что?</p><p class="p1">— Так просто. Ведь не могли же вы… с размаху, с нуля так вот…</p><p class="p1">— Ну, что я мог, чего не мог, это я сам про себя понимаю, — уклончиво сказал Иващенко и опять зыркнул сбоку, без большой, правду сказать, доброжелательности. — Меняются люди. Иной так переменится, что не узнаешь его, собаку. А приглядишься — не-ет, то самое.</p><p class="p1">Шелестов насторожился, но тут они пошли смотреть садовые колокольцы. Тут, казалось, и хозяина оставила настороженность — простые, полевые, хоть и усовершенствованные цветы нравились ему больше, чем розы.</p><p class="p1">— Да-да, — рассеянно приговаривал Иващенко, похлопывая себя прутиком по голенищу. — А вы, значит, так сказать, по литературной теперь части?</p><p class="p1">— По литературной, — признал Шелестов. — Газету оставил, всего себя посвятил, так скажем, в книжную работу. Ответственное дело очень. — Он помолчал, не желая раскрывать секреты мастерства.</p><p class="p1">— И что, как есть правду описываете? — спросил Иващенко с нехорошим опять же прищуром. Тут Шелестов разозлился. С чего это он так на него смотрит, или не читал первый том «Порогов»? Первый том «Порогов» читали все. Сам должен понимать, правда или нет.</p><p class="p1">— Правда, дорогой товарищ, — сказал Шелестов с искусственной, подчеркнутой задушевностью, — она ведь как земля, так? Из которой, собственно, и растут розы. Вот перед нами мы имеем землю, почву, разнообразный перегной. Навоз имеем — я ведь вижу писательским глазком, что тут у вас не без навозу. Торф, опилочки. А на всем на этом вырастает прекрасный, можно сказать, цветок, Пурпурное Сердце или Роза Люксембург. Вот так и мы, писатели. Мы те же агрономы. — Славно вышло, подумалось ему, теперь уж он не только на бумаге, а и в устной беседе выдавал подчас мысли о-ого-го, внезапные для самого себя, словно диктовал кто. — Мы берем, значит, грубую, земляную правду, еще и с говном, и выращиваем из нее жаром наших сердец прекрасную розу. Вот эта ваша роза — разве она пахнет правдой? — Он указал носком сапога на Пурпурное Сердце. — Она пахнет жизнью, всей радостью, но и немного, конечно, говном. И это, может, в ней ценнейшее. Вот так бы я вам ответил бы.</p><p class="p1">— Вот как? — спросил Иващенко. Он совсем не разозлился на упоминание навоза. — Это вы любопытно. У меня как раз под Белой Церковью интересный разговор вышел. Тоже… про цветы. Я, может, тогда и подумал: будет мир — непременно стану выращивать розы.</p><p class="p1">— А с кем разговор? — живо заинтересовался Шелестов. Он еще по газете помнил, что, когда собеседник начинает раскрываться — иногда по самому случайному поводу, — тут и прыгай на него.</p><p class="p1">— Да так, — неопределенно сказал Иващенко. — Пойдемте, пообедаем. Вы насчет окрошки как?</p><p class="p1">— Окрошка — отлично! — с деланой бодростью воскликнул Шелестов. — Окрошечка! Кроши, как говорится, гада!</p><p class="p1">Он думал сделать Иващенке приятное — в паре очерков о нем, которые он просмотрел, вдумчиво готовясь, упоминалось его любимое «Кррроши!», вселявшее в сердца бойцов беспримерную отвагу, — но Иващенко глянул на него с неожиданной тоской, даже и мукой, словно пощады попросил. И на секунду проступило в его лице с седеющими усами и бронзовыми, словно твердыми щеками нечто сельское, давнее, агрономическое, будто и в самом деле в роду у него были сплошь земледельцы, а краскомом со знаменитым «Кррроши!» стал он по горькой случайности. Иващенко хотел что-то сказать, но отвернулся и закашлялся.</p><p class="p1">— Да, — сказал он, отдышавшись. — Пойдемте, покушаем.</p><p class="empty-line"/><p class="p1">Подавала жена Иващенки, скромная, молчаливая, очень молодая. Шелестов ею залюбовался — лет через пять красавица такого склада наверняка отяжелеет, но сейчас, в двадцать, двадцать два самое большое, она умиляла, сказал бы он, молочно-восковой спелостью. Молочно-войсковой, подумал он: такие любили военных. Под зорким его глазом — чисто писательское, никакой похоти, — она смутилась и нежно заалела.</p><p class="p1">— Вот где роза, — сказал Шелестов, осмелев и кивая вслед красавице, когда она вышла. Иващенко, против ожидания, — это такая была проба, — кивнул задумчиво и почти благожелательно.</p><p class="p1">— Я первый том прочел, — сказал он после недолгого молчания, когда оба с наслаждением хлебали ледяную окрошку на неожиданно сладком квасе, с ломтиками ветчины, с укропом, с густой желтоватой сметаной. — Интересно.</p><p class="p1">— Спасибо, — сказал Шелестов, ожидая, куда вывернет похвала. Он уже понял, что с Иващенко надо разговаривать осторожно.</p><p class="p1">— Ну и вот, — сказал селекционер. — У меня разговор один случился интересный… не припоминаете?</p><p class="p1">— Откуда же, — не понял Шелестов.</p><p class="p1">— Все оттуда же. Под Белой Церковью как раз. Пленный один попался… лллюбопытный. И вот он сказал, — Иващенко продолжал тянуть свои паузы. — Он сказал как раз, что красные там, белые… все это так, временно. Что в одной семье есть красные и белые, и семья потом по-живому срастется. Что мы и имели многократно.</p><p class="p1">— Это и я наблюдал, — кивнул Шелестов.</p><p class="p1">— А важно, — не слушая, продолжал Иващенко, — что есть абсолютная красота. Он так сказал. И вот ради абсолютной красоты… какая есть в оружии, скажем, или в крови там, или в поле перед атакой, — он, стало быть, воевал. Они все в плену говорили, что они противники войны, что, будь их воля, давно бросили бы оружие и все такое. Человек ради жизни своей чего не скажет. Но этот очень интересно говорил, не находите? И я подумал тогда, что когда кончится… ну, это все… что я буду тогда заниматься абсолютной красотой, а она не в людях. В людях нет ее. Она есть в цветах. И вот я занимаюсь цветами, а как и чего там воевали — кому сейчас нужно?</p><p class="p1">— Не скажите, — начал было Шелестов, но Иващенко его остановил.</p><p class="p1">— И поскольку, — тяжело сказал он, кирпично краснея, — я тому офицеру… не станем уточнять, чего там дальше… поскольку я тому офицеру в некоей мере обязан, и даже сохранил ему, так сказать, жизнь в рамках революционного милосердия, так? — то я, конечно, ничего про вас говорить не стану.</p><p class="p1">— Чего? Кому?! — не понял Шелестов.</p><p class="p1">— Ничего и никому. Говорить я не стану. Но вас я со своей стороны прошу… Вы проверили? Убедились? — спросил он с неожиданной злостью. — Устроились? Я очень рад, что же. Но со мной вы эти тити-мити даже не вздумайте. Я цветы-то развожу, а все-таки я комбриг Иващенко. Поняли?</p><p class="p1">— Я никогда, я что же, я не сомневался…</p><p class="p1">— Ну и хорошо. И никому не скажу. Но вас, уважаемый товарищ писатель, — он странно выделил «товарищ», — я тоже от себя убедительно попрошу, чтобы никаких… вы поняли?</p><p class="p1">— Да каких же?!</p><p class="p1">— Таких, что совесть мою революционную испытывать не надо! — крикнул Иващенко. — Цветы цветами, но я вас попрошу со своими вопросами… идите вон в партархив.</p><p class="p1">— Ну так что, мне уйти? — оскорбился Шелестов, не понимая причины этой вспышки.</p><p class="p1">— Зачем же уйти, — миролюбиво сказал Иващенко. — Кушайте. Еще будет свинина.</p><p class="p1">Остаток обеда прошел в разговорах о необязательном. Шелестов оставил расспросы, никаких попыток разведать подробности более не делал и тянул время до отъезда. Обратный поезд был у него в шесть сорок пять, Иващенко проводил его до леска, за которым слышались гудки и перестуки со станции. У леска они остановились, Иващенко все похлопывал себя по голенищу.</p><p class="p1">— Это московский скорый, — сказал он, когда за лесом опять быстро и дробно прошумело.</p><p class="p1">— Да, — согласился Шелестов, словно ему было дело до московского скорого. — В столицу, значит.</p><p class="p1">— А вообще, — сказал вдруг комбриг, — я и правда думаю: без человека… без человека гораздо красота совершеннее. Вам виднее, вы — писатель. Но вот посмотрите: лес, небо. — Он указал прутиком на золотящийся запад. — И тут мы вот с вами. Я так понимаю, что человека надо убирать.</p><p class="p1">— Ну, вы в этом направлении поработали, — сказал Шелестов с внезапной обидой. Он день потратил черт-те на что, а сейчас всякая минута была на счету, книгу ждали, и сколько он бы написал за этот день, пока обедал дурацкой комбриговской окрошечкой! Он лучше, вернее бы написал, чем любая правда, и все поверили бы, что было как у него в «Порогах», а не как у комбрига в его скучной настоящей Белой Церкви.</p><p class="p1">— И мы поработали, и вы поработали, — неожиданно спокойно кивнул комбриг. — Ведь оно как было? Ведь под Ракитной — знаете? Были же под Ракитной?</p><p class="p1">— Не случилось по молодости.</p><p class="p1">— Ну хорошо, ладно. По молодости. — Иващенко усмехнулся. — А вот сейчас живем все, как не было ничего. Значит, это что было? Это же не так было, что одни — такие, а другие — другие. Все были люди. Вот как я, как вы. И значит, не одни других уничтожали, а просто сами себя… так? Потому что поманило чем-то таким, чего не бывает, а потом оказалось — нет, изволь, приехали, все будет обратно так, как будет. Хорошо это? Нет, это нехорошо. И тогда сами себя… в окрошку. Чтобы не было. Вот это правильно, я считаю. Без человека земля имеет вид.</p><p class="p1">Шелестов ничего не понимал.</p><p class="p1">— Надо куда-то деть человека, а лучше бы он сам себя куда-то дел, — мечтательно продолжал комбриг Иващенко. — Вот как комбриг Иващенко. Где комбриг? Нет комбрига. А есть ученый-агроном, по случайности носящий то же фамилие. Вот есть писатель Шелестов, хорошо. А где один другой человек? Никто не знает. И вот если бы мы все так исчезли, пропали… то, может быть, на месте нас народилося бы другое, прекрасное, как роза. Где Роза Люксембург? Нет Розы Люксембург. А что же мы имеем? Мы имеем совсем другое, цветущее. И это есть та нечеловеческая красота, которая вам пора на поезд, на поезд, идите, пожалуйста, и не оглядывайтесь, — закончил он внезапно, резко повернулся и пошел в сторону своего сада.</p><p class="p1">А Шелестов пошел на поезд, твердо убежденный, что все-таки Гражданская война не проходит бесследно даже и для самого грубого рассудка.</p></span>
