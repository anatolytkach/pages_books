<span><p class="p">— В этом как раз нет ничего особенного, — сказал Горбовский. — Подростки же.</p><p class="p">Аль-Гатуни посмотрел на него внимательно, сплюнул и отошел.

    <strong>21.</strong></p><p class="p">Саблин назначил Горбовскому встречу на шесть. «В шесть часов вечера после Волны», — уточнил он.</p><p class="p">— Ладно, — сказал Горбовский, уютно, в своей манере усаживаясь в кресло, в котором еще недавно сидел напротив Матвея. — Допрашивайте.</p><p class="p">— Ну что вы, Леонид Андреевич, — сказал Саблин с очень уютным, очень спецслужебным, очень неприятным выражением на неожиданно постаревшем лице. — Какой же это допрос. Мы хотим — не люблю ужасного слова «побеседовать» — сверить часы, и только. Вопрос же у меня к вам, в сущности, только один. Почему звездолетчик вашего класса летит на Радугу с грузом, абсолютно рутинным рейсом, и вызывается на этот скучнейший рейс добровольно? Тащит с собой Марка и Перси, четырежды героев, галактических монстров, чтобы на провинциальную планету перевезти запчасти, — это как вообще?</p><p class="p">— Думаете, диверсия? — спросил Горбовский и улыбнулся знаменитой смущенной улыбкой, растиражированной во множестве презентаций на тему «Пионеры Второй Межгалактической».</p><p class="p">— Да нет, какая диверсия, — отмахнулся Саблин. — Провалились глубоко, но не настолько же. Я просто знаю, что должен был лететь Мидл на «Рейнджере», молодой скромный пилот, у него девушка тут, и вдруг в последний момент Мидл жалуется на печеночную колику и летите вы, срывая, между прочим, совещание по чему-то там сверхскоростному с вашим участием. Это вообще как?</p><p class="p">— Матвея захотел повидать, — развел руками Горбовский. — Мы многое прошли вместе. У него, насколько я понял из последних сообщений, не очень хорошо в семье, мы привыкли вместе решать такие вещи. Практически все серьезные звездолетчики беспомощны в делах быта, я писал об этом. Я сам, если вы знаете, не очень счастливый семьянин.</p><p class="p">— Я думал, Леонид Андреевич, мы поговорим как взрослые люди, — разочарованно сказал Саблин. — Есть множество видов связи, а в апреле, кстати, Вязаницын собирался на Землю с докладом. Даже я об этом знал, а вы уж как-нибудь в курсе.</p><p class="p">— Да семья-то не будет ждать до апреля.</p><p class="p">— Да не так у него все было плохо, — в том ему отозвался Саблин. — Не так плохо, чтобы идти к Мидлу и просить его пожаловаться на печеночную колику.</p><p class="p">— Зря он вам это сказал, — заметил Горбовский после паузы.</p><p class="p">— Так он и не сказал. Он вас как раз, как говорили в старину, отмазывал до последнего. И объективно, кстати сказать, у него действительно такой желтоватый цвет лица, мог он у себя заподозрить внезапный гепатит, хотя прекрасно знает, что получил этот загар на Гиганде.</p><p class="p">— Ну, тогда вы все сами понимаете, — сказал Горбовский. — Может быть, вы в курсе — есть у меня такое свойство, такое беспокойство. Если что-то где-то должно произойти, у меня возникает некий зуд. Чувство, что без меня не обойдется. Радуга у меня стала вызывать такое беспокойство, я решил слетать и не ошибся.</p><p class="p">— Так вот понимаете ли, — Саблин прошелся по комнате, делая вид, что ищет формулировку. — Есть мнение, что именно ваш прилет, так сказать, и спровоцировал… Что именно ваше беспокойство и вызвало, как это часто бывает…</p><p class="p">— Каким же образом?</p><p class="p">Горбовский рассматривал и эту версию, но полагал, что она возникла в результате его самоедства.</p><p class="p">— Ну, таким образом, что волна нового типа возникла в ответ на прилет «Тариэля». Не потому, что это мощный звездолет. Он как раз маломощный, мы в курсе. А потому, что количество людей особого типа на Радуге превысило некий уровень, и планетарный гомеостазис отреагировал вот так.</p><p class="p">— Гомеостазис, — проворчал Горбовский. — Всегда вы его защищаете, а что в нем хорошего? Папа ваш гомеостазис?</p><p class="p">— Очень хорошо сказано, — кивнул Саблин. — В некотором смысле безусловно папа. У человечества есть баланс, этот баланс нарушать опасно. Вы, я полагаю, не догадываетесь о существовании КОМКОНа-3, а пришло время вам с ним познакомиться.</p><p class="p">— Почему же не догадываюсь, — ответил Горбовский, поднимая на Саблина улыбающиеся глаза. — Я допускаю и КОМКОН-4. Я допускаю вообще бесконечное множество КОМКОНов. Я прекрасно понимаю, что технические возможности для выхода за пределы галактики есть давно. И мне даже кажется, что к выходу на контакт с загробным миром давно нет особых препятствий, чикагский эксперимент это показал…</p><p class="p">— Ваша осведомленность, — сказал Саблин, в самом деле удивленный, — делает вам честь.</p><p class="p">— А все беспокойство, все оно. Именно оно когда-то привело меня в Чикаго, и я с удивлением узнал, что вся десятка экспериментаторов не пожелала вернуться в человеческое состояние, так и лежат до сих пор в анабиозе, а где пребывают их души — или, если угодно, сознание, — науке неизвестно. Ментаграммы показывают ровную линию. При этом испытуемые принимаются иногда шептать, и то, что они шепчут, вам наверняка известно.</p><p class="p">— А вам?</p><p class="p">— А мне нет, конечно. Но я полагаю, что лучше мне и не знать.</p><p class="p">— Да, наверное. Во всяком случае — это уж я вполне могу вам сообщить, коль скоро вы сами так далеко продвинулись, — это никак не «Чернокрылый воробей».</p><p class="p">— Трепеща и одиноко, — улыбнулся Горбовский вовсе уж по-детски.</p><p class="p">— Да, да. Это скорее похоже на «а крыють струфиан» или что-то в таком роде.</p><p class="p">— Если б я курил, — сказал Горбовский мечтательно, — сейчас бы закурил.</p><p class="p">— Да, в общем, ничего особенного я вам открывать не собираюсь. Просто гомеостазис для своей защиты принимает непредсказуемые формы. Иногда запускает Волну. Иногда производит Одержание. В общем виде все это и есть одержание, сдерживание на опасном пути.</p><p class="p">— Вас послушать, так любой путь опасен.</p><p class="p">— Разумеется. Радуга зашла дальше, чем надо. Наши люди здесь работали.</p><p class="p">— Не раскроете?</p><p class="p">— Нет, конечно. Но наши люди есть везде, где идет продвижение, и особенно там, где оно идет быстро. Просто мы, что называется, вас недоучли.</p><p class="p">— Так, — сказал Горбовский. — Теперь я еще и в этом виноват. Кто ездит, на том и возят.</p><p class="p">— Не огорчайтесь вы так, — сказал Саблин сострадательно. — Мы совсем не уверены, что это вы. Это гипотеза. Это может быть Скляров.</p><p class="p">— Он-то каким образом?</p><p class="p">— Слишком сильно полюбил, — пожал плечами Саблин. — Так полюбил, что нарушил баланс, полюбил больше себя самого, больше человечества, больше совести… За этой сферой мы, к сожалению, не научились следить. А ведь Таня права — он был единственный настоящий человек на Радуге. Остальные здесь, как вы заметили, стеснялись чувств или считали их роскошью. Даже Джина. А вот он — ну, тоже недоучли, попал сюда человек, которого девушка заинтересовала больше физики. Вы обратили внимание, что Волна случилась после двух событий? Одно — ваш прилет, это вы, скорее всего, уже успели продумать. А второе — она у него впервые заночевала. И, возможно, в эту ночь им было так хорошо, что биосфера отреагировала таким вот странным образом…</p><p class="p">— Знаете, — усмехнулся Горбовский, — судя по количеству эвакуированных рожениц, такие катастрофы тут случались регулярно.</p><p class="p">— Такие, да не такие. Не совсем такие. На Земле тоже бывали в этом смысле сомнительные ситуации, иной раз молодая мать заведет служебный роман, а потом торговые центры взрываются.</p><p class="p">— Что-то я не помню такого.</p><p class="p">— Да мало кто помнит. Была забытая история, изложенная однофамильцем одного вашего друга. Не берите в голову.</p><p class="p">— И вы всерьез полагаете, — Горбовский все еще не верил избавлению, — что такая сильная взаимность…</p><p class="p">— Ну а почему нет? Нам ведь не совсем понятна природа Волны. Я, собственно, потому вас и расспрашиваю — вы очень опытный наблюдатель. Самонаблюдатель в том числе.</p><p class="p">Горбовский в чем-то изменился после этих слов. В последнее время все, что он говорил и делал, выглядело еще более неуверенным, слегка смущенным или смещенным, как в его дорадужной жизни, но здесь он словно попал в щель Кассини или в иной неприятный угол галактики, где уже не требовалось быть приятным человеком. Это изменение в нем происходило быстро, не всегда заметно для окружающих, но чуткому собеседнику все становилось понятно. В помещении словно снижалась температура на градус-другой.</p><p class="p">— Например, увеличивается подозрительность, — сказал он суховато. — Человек так называемого кануна, середины этак двадцать первого столетия был чрезвычайно подозрителен. На него надвигалось, он это понимал — самые глупые понимали лучше всех, потому что у них интуиция развита лучше анализа, спинной мозг, как мы говорили в жестокой молодости, развит лучше головного. Они чувствовали, а объяснить не могли. Провал туда сопровождается чувством сильной опасности, исходящей неизвестно откуда. Восток, Запад, прошлое, будущее — все может быть. Это было крайне депрессивное состояние. Мельников вам наверняка рассказывал про слухи. Он, кстати, советовался, прежде чем к вам идти.</p><p class="p">— Я не просил его ни о каком неразглашении.</p><p class="p">— Очень мило с вашей стороны. Ну так вот, мне сейчас легко представить, что Волна — это не природное явление и даже не моя скромная заслуга. Во всяком случае, любое одержание вполне укладывается в вашу логику.</p><p class="p">Саблин кивнул.</p><p class="p">— То есть это мы.</p><p class="p">— Это ваша репутация, скажем так. Ваш почерк. Потому что нуль-Т — если у Ламондуа или Кружкова, неважно, в конце концов получилось бы — сделает мир гораздо менее управляемым и гораздо более ускоряемым. И смотрите, как все прекрасно укладывается. Человеческих жертв нет. «Стрела» прилетает вовремя — а я как все-таки неплохой водитель могу вам сказать, что для такого своевременного прилета Калиныч должен был находиться на низком старте. Само природное явление оказывается травматичным, но несмертельным. И сейчас все ваши разговоры — явно готовящие нас к возвращению на Землю — имеют рефреном одно: не надо далеко заноситься мыслью, не надо отрываться от прикладных нужд, а так вообще ничего страшного. И обратите внимание, среди весьма немногочисленных летальных случаев самый заметный — это именно Ламондуа. Кружков жив. Майлс жив. Огилви прекрасно себя чувствует. А Ламондуа погиб от огорчения — вы же знаете, вам приписывают отличную лабораторию.</p><p class="p">— Очень стройно, да, — невозмутимо сказал Саблин. — Но вы же знаете шестой постулат, верно?</p><p class="p">Горбовский знал постулат, как и весь катехизис альтернативной истории, преподаваемый в седьмом классе: если что-либо логично, оно антиисторично. То есть оно не было, не происходило, как убийство царевича Димитрия. Все сам.</p><p class="p">— Я даже могу вам наконец сформулировать, что мы такое делаем, — сказал Саблин с превосходной искренностью, которую все сотрудники его уровня талантливо отрабатывали. — Мы для того и занимаемся Одержанием, чтобы предотвратить одержание природное, значительно более ужасное.</p><p class="p">— Да-да, — сказал Горбовский. И добавил, не удержался:</p><p class="p">— Убиваем исключительно для того, чтоб сами не умерли.</p><p class="p">— Да ведь и не убиваем, — невозмутимо отозвался Саблин. — Сюда мы просто не успели. Нам поэтому исключительно важно знать, как это чувствовалось на личном уровне.</p><p class="p">— Отвратительно, — сказал Горбовский. — Хуже, чем я мог себе представить. Полное ощущение бессмысленности всего и частичная дезориентация в пространстве. Насколько я знаком со свидетельствами, нечто подобное было в Чернобыле.</p><p class="p">— В Чернобыле и было нечто подобное, — пожал плечами Саблин.</p><p class="p">— Да, я читал. И детей потом привезли — их тоже эвакуировали в первую очередь. Им разрешили забрать все самое необходимое. Они на стенах писали: прощай, мой светлый город.</p><p class="p">— Наверняка и здесь напишут, — подтвердил Саблин. — Прощай, Радуга-дуга. И даже уже пишут.</p><p class="p">— Знаете, у меня бывало такое — на уровне догадок, которым я сам особого значения не придавал… — Горбовский опять преисполнился решимости и наконец высказал заветное. — У меня всегда было чувство, что Теория Бесконфликтности существовала до нас, равно как и Одержание, и все вот это. Мы на Земле явно не первые, свидетельства слишком многочисленны. Наверняка какая-нибудь ваша контора — не знаю, КОМКОН-5, КОМКОН-25 — занята блокированием исторической памяти. А то такого можно раскопать… Мы ведь знаем, летали достаточно, что жизнь могла возникнуть в одном месте и в одних уникальных условиях. Большой антропный принцип, который сколько ни ругают, а ничего лучше пока не выдумали. И я предполагаю, что весь этот Саракш, и вся эта Гиганда, и вся эта Леонида с ее органической цивилизацией — остаток тогдашнего расселения. Всех повыкинули, а сами занялись нуль-Т или еще чем-нибудь перспективным. И тогда прошла Волна, следы которой легко будет обнаружить и в Помпеях, и на троянских кирпичах, и в Мачу Пикчу, и у атлантов, и в Мохенджо-Даро…</p><p class="p">— Леонид Андреевич! — воскликнул Саблин с прекрасно изображенным недоумением. — Ну Леонид Андреевич! Ну серьезно! Это вы куда-то совсем провалились, извините, это вас отбросило на триста лет… Индийские йоги, кто они?!</p><p class="p">— Да, — сказал Горбовский, — конечно. Еще немного, и буду смотреть телевизор.</p><p class="p">— Никакого Мохенджо-Даро не было — в том смысле, о каком вы говорите. Был город, в нем был упадок цивилизации, его восстановили давно, там все обследовано, были наводнения, никакого оплавления не было…</p><p class="p">— Может, восстановили, — кивнул Горбовский. — А может, уничтожили. То есть срыли окончательно. И теперь никто уже ничего…</p><p class="p">Он потер лоб.</p><p class="p">— Да, — сказал он растерянно, — что-то я действительно…</p><p class="p">— Но в главной интенции, — поспешил утешить его Саблин, — вы вполне можете быть правы. «Нам с тобой, товарищ ангел, предстоит поубавить излишнюю резвость похотей и мыслей для продления жизни на земле. Любой меч длиною от Балтики до Тихого океана сломился бы на первом же полувзмахе, кабы не секретная присадка к русской стали наших коррозирующих средств».</p><p class="p">Горбовский не опознал цитату, поскольку, в отличие от Саблина, не обладал машинной памятью, да вдобавок у него не было времени читать такое количество ерунды.</p><p class="p">— Он только геометрически был не совсем прав, — добавил Саблин. — Это не пирамида. Это именно дуга вроде Курской, выступ, который срезается ходом вещей. Если этому ходу своевременно не помешать. Знаете, как говорил один мой предшественник? На всякое одержание есть содержание.</p><p class="p">— Или задержание, — широко улыбнулся Горбовский.</p><p class="p">— Очень примитивная шутка, — неодобрительно сказал Саблин. — Примерно как рифма «колбаса, блин». Этот же друг говорил: разговоры с тобою, Саблин, монотонны, как колбаса, блин.</p><p class="p">Они вежливо посмеялись.</p><p class="p">— Я вот теперь и думаю, — пристально посмотрел на него Горбовский, и Саблину стало понятно, что растерянность его кажущаяся. — Я вот и думаю, не есть ли все человечество такая дуга, спрямление которой мне как раз привелось увидеть.</p><p class="p">— Да ну что вы, — махнул рукой Саблин. — Нормальная машина, в которую встроены тормоза.</p><p class="p">— Просто я боюсь, что этой машине с некоторых пор больше нравится тормозить, чем ехать, — никак не желал Горбовский закончить разговор, явно тяготивший Саблина. Что-то у него случилось с теми самыми тормозами, а ведь бывало — слова не вытянешь. — Регрессоров стало больше, чем прогрессоров, и самое печальное, что они получают от своей работы гораздо больше удовольствия, чем прогрессоры. Я даже боюсь, что мы в полушаге от возвращения к пыточным практикам, потому что ваша профессия гораздо туже завязана на эрос, чем принято думать, Земля уже знала такие оргиастические увлечения…</p><p class="p">— Леонид Андреевич, — сказал Саблин очень серьезно. — Действие Волны, насколько могу видеть, выражается главным образом в том, что человек начинает охотнее верить в худшее. Это бывает, и это характерно для отдельных исторических эпох. Но в целом для человека это нехарактерно. Я не могу предлагать вам лечение, лечение — вещь сугубо добровольная. Но впадать в такие представления — это именно болезнь, капитуляция, антиутопия, это всегда так кажется внутри болезни — что она никогда не пройдет. Но если вы в состоянии в чем-то поверить человеку вроде меня — не из КОМКОНа, а из дюжины, — поверьте, что в вас говорит слабость и что эта слабость может быть побеждена.</p><p class="p">— Да ну что за бред собачий! — неожиданно взорвался Горбовский. — Вы же вот сейчас, сейчас смотрите на меня и врете! Сучью, тысячу раз простите, вашу я давно натуру знаю — к вам же других не берут! Вы смотрите на меня честными глазами и знаете, что меня никогда больше не пустят к управлению звездолетом, потому что ни один человек, попавший в ваши файлы, не вернется в Дальний Космос! Тем более человек, попавший в катастрофу. Побывавший под смертью. Я не знаю, что ли, как это бывает? Комиссия, вторая комиссия, возможность психологического срыва, ненадежность, вам же лучше, а потом сделают меня надсмотрщиком в интернате и посадят учить спиногрызов на тренажерах. Вы так любите детей, Леонид Андреич, так прекрасно с ними ладите! Я не люблю детей, Константин Сергеич, и я вам не верю! Если бы я любил детей, они бы у меня были, но у звездолетчиков с семьями проблемы.</p><p class="p">Он успокоился так же внезапно, как и вспыхнул.</p><p class="p">— Про невозвращение в космос — это вам Диксон сообщил? — заговорщицким шепотом спросил Саблин и улыбнулся.</p><p class="p">Горбовский посмотрел на него нехорошо.</p><p class="p">— Дикссон у васс? — спросил он сквозь зубы, с каким-то змеиным присвистом.</p><p class="p">— Диксон — область, центр которой нигде, а окружность везде, — сказал Саблин, и в голосе его впервые прозвучало нечто, похожее на уважение и даже тайную радость. — Диксон улетел. Мы понятия не имеем, где Диксон, но где бы он ни был — там раздается сейчас добродушное ворчание. Всех обманул.</p><p class="p">— Первое радостное известие за много дней, — сказал Горбовский. — А может быть, за много лет. Я почему-то вам верю, и даже знаю почему.</p><p class="p">— Ага, — сказал Саблин. — Потому что знаете Диксона. Все, все знают Диксона, даже дети. Но никто не знает, где Диксон, этот Карлсон нового века. Надо позвонить в колокольчик — вдруг прилетит? Впрочем, ступайте. А то вам опять покажется, что я нарочно притворяюсь человеком.</p><p class="p">И он отпустил Горбовского царственным жестом, которого человек уж конечно в этой ситуации не сделал бы.

    <strong>22.</strong></p><p class="p">Все кончается, и через три недели Земля, прикинув что-то там, сказала: можно.</p><p class="p">Горбовскому предстояло лететь на «Тариэле», Валькенштейн с Постышевой никуда не торопились, Скляров лететь отказался, Таня сказала, что тогда и она останется, и тогда Скляров сказал: летим. Видимо, на Земле ему казалось проще затеряться. За детьми и комиссией прислали роскошный, скорее прогулочный, чем скоростной, корабль психического комфорта «Гепард». На нем эвакуировали участников самых пострадавших, самых травмированных экспедиций. Там был бассейн, не бассейн, а одно название — коллективная теплая ванна; но на людей ведь, как известно, действует не теплая вода, тем более в чужом присутствии, а сам факт заботы.</p><p class="p">Все сошлись на площади перед Управлением, и состоялся концерт. Он не мог быть долгим, ибо все-таки подмораживало, пощипывало, — но люди готовились, нельзя было обидеть их невниманием. Группа Габы — восьмилетние старички с выражением вечного злорадства на желтых личиках — держалась отдельно и перемигивалась.</p><p class="p">Первым пел Тимоти Сойер в сопровождении банджо, подпевала ему вся четверка мушкетеров, несших его некогда на могучих плечах в океан. Это был, кажется, первый случай в истории Радуги, когда их песенка исполнялась публично и с начала до конца. Обычно на Радуге все куда-то спешили, а потому слышали один куплет. А куплетов там много, и теперь было самое время выслушать их с начала до конца — после отлета Тимоти Сойера на планете не оставалось ни одного банджо и ни одного человека, который умел бы на нем играть.</p><p class="p">Пели они вот как:</p><p class="p">Когда, как черная вода,</p><p class="p">Лихая, лютая беда</p><p class="p">Была тебе по грудь,</p><p class="p">Ты, не склоняя головы,</p><p class="p">Смотрела в прорезь синевы</p><p class="p">И продолжала путь.</p><p class="empty-line"/><p class="p">Когда вода проникла в рот,</p><p class="p">А серый сероводород</p><p class="p">Не дал тебе вздохнуть,</p><p class="p">Ты, помня истинную цель,</p><p class="p">Смотрела в синенькую щель</p><p class="p">И продолжала путь.</p><p class="empty-line"/><p class="p">Когда вода дошла до глаз,</p><p class="p">А спертый дух народных масс</p><p class="p">Затмил и цель, и суть, —</p><p class="p">Закрыв глаза на всякий случ,</p><p class="p">Впитала ты последний луч</p><p class="p">И продолжала путь.</p><p class="empty-line"/><p class="p">Когда вода дошла до лба</p><p class="p">И с неба грянула труба,</p><p class="p">Фальшивая чуть-чуть, —</p><p class="p">Ногой нащупывая дно,</p><p class="p">Ты прошептала: «Все одно», —</p><p class="p">И продолжала путь.</p><p class="empty-line"/><p class="p">Пока ты продолжаешь путь,</p><p class="p">Одни поють, другие пьють,</p><p class="p">А третьих просто бьють,</p><p class="p">Но ты, забыв про эту муть,</p><p class="p">Плетешься рысью как-нибудь</p><p class="p">И продолжаешь путь.</p><p class="empty-line"/><p class="p">Снаряд, конечно, принесло,</p><p class="p">Сперва башку оторвало,</p><p class="p">Потом и жопа — фьють!</p><p class="p">Но ты, о Радуга-дуга,</p><p class="p">Плюешь на друга и врага</p><p class="p">И продолжаешь путь!</p><p class="p">Никто ничего не понял, потому что атмосфера, некогда породившая эту лихую песню, кардинально изменилась, как бы улетела в дыру, пробитую Волной, Волнами; и даже звуки, кажется, доходили как сквозь вату, — но в целом все звучало бодро, оптимистично, и казалось, что там, впереди, на Земле, еще не раз пригодится умение сохранять присутствие духа и верность себе — а в случае полного поражения по всем фронтам умение хотя бы красиво покидать поле.</p><p class="p">Дальше дети читали монтаж, подготовленный на основе сценария обычного выпускного: после интерната на Радуге большинство возвращалось на Землю продолжать образование — в конце концов, далеко не все устремлялись в физику. На выпускном все в ироничных и напыщенных выражениях прощались с родной планетой, которую называли светлым будущим, просто наступившим пока не для всех. В антураже вечной зимы и торчащих из-под нее обломков эти слова теперь звучали довольно зловеще, и дети сами это поняли, а потому дочитывали стихи без всякого энтузиазма, откровенно комкая мероприятие. Школьный оркестр на сохранившихся, но почему-то помятых и как бы состарившихся инструментах исполнил гимн интерната, после чего все должны уже были грузиться, но тут две девочки — одна индианка, другая китаянка — сказали, что хотели бы попрощаться с Радугой и городом от собственного лица, и под аккомпанемент подвывающего ситара затянули нечто настолько грустное, настолько нежное и неуместное, пронзительное и дикое, грамматически неправильное — прощай, любимая планета, оазис света и тепла, благодарим тебя за это, за все, за что ты нам дала, — что сначала заревели все вокруг, а потом и они сами. Наверное, это было бестактно. Наверное, им не следовало вытаскивать наружу то, что и так понимали все. Но как-то им, что ли, показалось неблагодарно покинуть Радугу без этого последнего прощания, без последнего доброго слова о разрушенных домах и попранной жизни; и Горбовский подумал, отводя глаза, что так же, наверное, прощались с Припятью — тоже оазисом будущего, а ведь с ее крушения началась и гибель всей тогдашней Радуги, какой бы черно-белой, чернобыльской она ни была. Конечно, мы принесем на Землю эту заразу, подумал он. Конечно, все кончено. И ему стало совсем тошно, однако населению Радуги не суждено было попрощаться с планетой на этой ноющей ноте.</p><p class="p">Десять второступенников, оставленных в лесу по милости Склярова и переживших не вполне понятную мутацию, выпрыгнули в центр площади и хрипло заорали:</p><p class="p">— Сдохни, Радуга! К чертовой матери, Радуга!</p><p class="p">Они побежали к управлению и стали швырять в стекла заранее заготовленные снежки и камни, они топтали остатки сквера перед управлением, пинали трибуну, ломали кусты и орали так, словно их была сотня, а не десятеро. В них не было ничего от кротких очкариков Радуги, ничего от вундеркиндов, с детства щелкающих олимпиадные задачки, ничего от Детского, где дурное настроение каждого заботило всех; это была даже не шпана полуночной эпохи, а провал в самую глубокую глубину, чуть ли не в крестовый поход детей. И пока желтолицая эта команда доламывала и крушила все, что пощадила Волна, — детские психологи переглядывались с видом авгуров, хотя решительно ничего не понимали и не представляли, что делать: в них с первого курса вбивали, что травмированного ребенка надо уважать, не обесценивать его страдания и не мешать самовыражаться. Вот они самовыражались. И ясно было, что они отлично научились скрывать свои истинные чувства, и теперь они жертвы и чувствуют себя в своем праве, и никакой психической реабилитацией нельзя вытравить из них эту жажду сломать весь мир, зашедший в тупик, и построить на его руинах свой мир, такой мир, в котором тупик будет нормой, а на любые попытки что-то построить ответ будет один — построили тут уже одни такие. Все это пронеслось в голове у Горбовского в долю секунды, и он понял, что их нельзя везти на Землю, а самое правильное — оставить их тут и самому остаться с ними, и попробовать что-то сделать. Но он один раз уже остался. Ни от кого нельзя требовать повторной жертвы.</p><p class="p">И он отбыл на Землю, оставив себе только одну привилегию — подняться на «Тариэль» последним. Но перед тем, как взойти, оставил дежурному записку и попросил отдать ее первому со «Стрелы», кто вернется на Радугу.</p><p class="p">Дежурный не понял, о чем он говорит.</p><p class="p">— Со «Стрелы»? — переспросил он. — Думаете, они сюда? Не на Землю?</p><p class="p">— Подозреваю, что сюда, — пожал плечами Горбовский. — Кто-нибудь обязательно вернется. Так вы передайте ему, ладно? И если он скажет «нет», дайте мне знать.</p><p class="p">— А если скажет «да»? — в изумлении спросил дежурный.</p><p class="p">— Ну тогда тем более! — воскликнул Горбовский уже почти с прежней, издевательски-приветственной интонацией. — Тогда прямо сразу! Но я подозреваю, что он скажет «нет». И это будет означать только одно: что у него все получилось. И теперь его окружность нигде, а центр везде.

    <strong>23.</strong></p><p class="p">Прошло полтора земных года, когда на Радугу, весь персонал которой составлял теперь тридцать человек, прилетел грузовой «Кузов» с пятеркой пассажиров. Четверо сменяли вахтовиков, а пятый был Аронсон, нуль-физик, улетевший тогда со «Стрелой» за несколько мгновений до Волны.</p><p class="p">Аронсона некому было узнавать, а то сказали бы, конечно, что он неузнаваем. Он был похож на старого пса, даже, кажется, пуделя — с черно-седыми кудрями, одышкой и трагическими глазами навыкате. Он был похож на еврея, смирившегося с тем, что ему везде гетто. Он был одет так же, как в день отлета с Радуги: холщовые штаны и рубаха в красно-синюю клетку.</p><p class="p">— Вам люди не нужны? — спросил он молодого кадровика, прибывшего сюда без году неделя.</p><p class="p">— В принципе, нет, — сказал молодой. На прежней Радуге отвечали бы многословно, с натужными шутками, доказывая, что люди везде нужны, людям все рады и вообще люди — это хорошо, но теперь здесь господствовал деловой стиль разбитой армии.</p><p class="p">— Я все умею, — сказал Аронсон, не обижаясь. — Не только теорию там, а, может быть, грузчиком… Робот не все может, бывают вещи, когда руками надежнее.</p><p class="p">— Ну я посмотрю, — пообещал кадровик без особого энтузиазма. Энтузиазм теперь вообще выглядел дурным тоном. — А почему вы именно к нам? Масса же вариантов…</p><p class="p">— Да как сказать, — неопределенно ответил Аронсон. Настроение у него постепенно улучшалось, потому что, видимо, он скучал по Радуге. — Меня тут ждет кое-кто. Ой, мы там такое видели, не сказать, не описать. Очень интересно, но не совсем приятно, не очень. Там было как? Калиненко довольно-таки сразу сказал, хотя я и до него понял: мы инфицированы, и если бы мы остались — то Волна бы это все смыла, и можно было бы жить дальше. Но мы улетели, мы как бы оттянули пружину, и теперь она, конечно, ударит. Он интересно объяснял, у него такая картина мира своеобразная — ну, что вы хотите, звездолетчик, много времени проводит один, голова думает сколько влезет, иной раз до такого додумывается!</p><p class="p">— У нас тоже на дежурстве не сахар, — заверил его дежурный.</p><p class="p">— Но вы другое дело, — уважительно сказал Аронсон, — вас же потом прислали. Вы появились, когда все уже вот это. А с нами должно было случиться, но мы избежали. И теперь мы это всюду несем с собой. Калиненко умный, он сразу сообразил. И мы теперь куда ни прилетали, нас всюду ждало такое, что это ужас. Прилетим куда-нибудь, а там Волна. Буквально все сидят и ждут. Или прилетим, а там эпидемия. Еще не все мрут, но прямо вот-вот. А один раз прилетаем — там наводнение, представляете? Вся планета буквально на глазах превращается в огромный океан, и что самое обидное, мыслящий! Это что же он такое будет мыслить, кто может это представить? Мы иногда, не поверите, даже заправиться не успевали: прилетаем так — бах! — надо уже улетать. Некоторым надоедало, и они оставались. А некоторые решили летать, пока не вы́летаем весь этот запас катастроф. Но я вот попросился на Радугу, потому что, мне кажется, тут сейчас самое безопасное место. Понятно, что Вселенная вступила в эсхатологический период, это бывает, я читал где-то. Но поскольку у нас все уже было, то я счел как-то разумным вернуться, вне зависимости от того, что тут теперь.</p><p class="p">— А что про нас говорят? — с живым интересом спросил дежурный.</p><p class="p">— Ну всякое, — не очень охотно сказал Аронсон. — Говорят, что всякие явления.</p><p class="p">— Ой, тут такие явления! — с энтузиазмом воскликнул радужанин. — Иногда по ночам такое, что просто с ума сходишь. Собака бегает, воет.</p><p class="p">— Собака в порядке? — живо спросил Аронсон.</p><p class="p">— В полном. Ее подкармливают, но как она ест — никто не видит. И воет все время.</p><p class="p">— Это по мне, — непонятно сказал Аронсон. — Ну, теперь перестанет. А еще что?</p><p class="p">— Да всякое. Танцующие созвездия, потом эти призраки, иногда снег такие формы принимает — прямо непонятно, кто лепит! Какие-то будто невидимые дети, но очень ужасные. Такого слепят иногда, выходишь — мама дорогая! Но некоторые считают, что это все глюки. Я, если честно, вообще не очень понимаю, зачем тут держать пост, но считается, что рано или поздно расконсервируют производство, вот, может быть, тогда мы все как-то пригодимся.</p><p class="p">— Очень может быть, — согласился Аронсон. — Мне кажется, что самое лучшее место сейчас то, где все уже произошло. Так что вы не против, если я останусь?</p><p class="p">— Да оставайтесь, — сказал дежурный. — У нас неплохо вообще-то, только бюрократии много. Вы же знаете, тут до сих пор все бумажное. Сейчас вас оформлю, и чайку попьем. Пока вы не оформлены, извините, я не имею права.</p><p class="p">— Да-да, — равнодушно сказал Аронсон. — Я что-то подобное и предполагал. Ну, вы дежурьте пока, я потом зайду и оформлюсь. Пока прогуляюсь, посмотрю, как чего.</p><p class="p">— Минуту, — сказал дежурный. — Тут Горбовский — помните, десантник? — вам записку оставил. Щас.</p><p class="p">Он слазил в ящик стола.</p><p class="p">— Лично мне? — удивился Аронсон.</p><p class="p">— Ну, не прям вот лично-лично, но первому, кто вернется.</p><p class="p">Аронсон внимательно прочел три строки, написанных идеально четким, тонким почерком Горбовского: «Встречался ли вам где-либо в ваших путешествиях Перси Диксон, бортинженер „Тариэля“? Он провел эксперимент по нуль-Т второго типа и покинул Радугу с моей помощью».</p><p class="p">Этим он как бы размазывал ответственность.</p><p class="p">— Нет, не видел, — с изумлением сказал Аронсон. — А что, можно было?</p><p class="p">— Наверное, можно. Горбовский бы огорчился, наверное. Я ему передам. А он, в свою очередь, просил передать, что у Перси теперь центра нет, а окружность везде.</p><p class="p">— Да, интересно, — сказал Аронсон, хотя это было ему совсем не интересно и не очень понятно. От десантников везде одно беспокойство. — Все-таки я прогуляюсь, можно? Очень мечтал, как прилечу, — а тут весна.</p><p class="p">— Только в Детское не ходите, — предупредил дежурный. — Там Зона, туда без защиты не надо.</p><p class="p">— Конечно-конечно, — закивал Аронсон. — А кстати, интересно, почему именно там. Но это я посмотрю, разберусь. Времени много, правда?</p><p class="p">Но дежурный уже его не слушал, потому что дежурил. Он был погружен в дежурство с головой, как лесник в свое лесничество, как ответственный за КПП в свое КПП.</p><p class="p">Аронсон постоял в дежурке, потом вышел на снег и задрал голову к небу. Танцующих созвездий в эту ночь не было, а вот Змей летал, удивительный бесхозный Змей, водимый незримой рукой. Он напоминал о тех океанских просторах и зеленых степях, которые были здесь когда-то, но еще, возможно, и будут. Он как бы обещал все это, потому что жизнь брала свое, и кое-где даже уже подтаивало. Все говорило о начале нового цикла, в том числе странные скорбные звуки из-под земли. Это коренное население страдало от того, что жизнь на поверхности опять нормализуется и надо будет возвращаться под землю. А может, это оно так радовалось — поди разбери кто-нибудь, какие неземные чувства скрываются в этом деликатном скрежете и постанывании, — словно большие массы льда скрипят, оседают и трутся друг о друга.</p><p class="p">Аронсон сунул руки в карманы и зашагал в сторону Северного шоссе, мурлыча себе под нос:</p><p class="p">Ты каждый раз, ложась в постель,</p><p class="p">Смотри во тьму окна</p><p class="p">И помни, что метет метель</p><p class="p">И что идет Волна.</p><p class="empty-line"/></span>
