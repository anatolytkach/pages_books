<span><p class="p">— Поговорим серьезно, — проникновенно сказал Тамидзи. — Я понимаю, шок, стресс и все вот это. Я понимаю также естественный ужас перед прогрессом, боязнь иностранцев, жажду закрытости. Жизнь со всех сторон окружена смертью, подобно Японии, со всех сторон окруженной морем. Но это один раз уже привело к ужасному тупику и всякий раз приведет туда же. Не слишком ли дорогую цену мы уже платили за отказ от будущего?</p><p class="p">— Но всякий путь ведет к ужасному тупику, — ответил Канэко с простодушным изумлением, делая жест акамбэ, то есть оттягивая пальцем нижнее веко, что означало: я крайне, крайне удивлен, мне с вас смешно. — Нет пути, который не вел бы к океану смерти. Наш выбор лишь в том, достойно ли мы выглядим при этом. Планета Нидзи выглядела недостойно. Много суеты, пустая болтовня. Многие мужчины и женщины позволяли себе.</p><p class="p">— Планета Нидзи достигла великих результатов, — назидательно сказал Тамидзи.</p><p class="p">— Планета Нидзи достигла полного саморазрушения и вся покрыта глубоким слоем юки. Гадатель не знает своей судьбы, — ввернул он древнюю пословицу.</p><p class="p">Тамиди заметил грамматическую ошибку, но промолчал, не желая оскорблять самурая. Он ничего не умел делать вполсилы, поэтому его японский был лучше, чем у Канэко. Канэко иногда путал времена и наклонения. В спряжениях глагола он тоже путался, да и тренироваться было не с кем. Где ему было взять на опустевшей Радуге японский разговорный язык?</p><p class="p">— Чем намерены вы, самурай Канэко, заниматься, заполнять свой досуг? — перевел разговор Тамидзи.</p><p class="p">— Теперь это я достигать себе наибольшее совершенство в бесполезном, — отвечал самурай на ломаном японском. — Всегда Все прагматическое безобразно себя.</p><p class="p">Тамидзи представился безнадежный тупик цивилизации, отыскавшей идеал в ритуале, спасение — в безнадежном прошлом, эстетическую прелесть — в барочной развесистости, избыточности, культе бессмысленного. Всякое действие обрастало гроздьями обсессий, а чайная церемония, смысл которой был единственно в том, чтобы попить чаю, затягивалась на три часа драгоценного времени. Тьфу, брр! На Радуге было теперь ужасно холодно. Канэко, видимо, не мерз — или научился вести себя так, что ничем более не выдавал своих чувств.</p><p class="p">— Вернетесь ли вы на Землю? — поинтересовался Тамидзи.</p><p class="p">— Полагаю, программа на Нидзи будет свернута, — равнодушно отвечал Канэко. — Присутствие станет невозможным. Мой путь — возвращение, я намерен возвратиться на землю предков. Мои предки происходили из Нары, древнего благородного города.</p><p class="p">— Что намерены вы делать себе в Наре?</p><p class="p">— Основать монастырь.</p><p class="p">— Никто не разрешит вам основать монастырь, — быстро ответил Тамидзи. С опасной иллюзией следовало покончить немедленно. — Последний монастырь на Земле закрыт в 2096 году.</p><p class="p">— Чтобы основать веру, не нужно разрешения, — пожал плечами Канэко. — Ясумаро ни у кого не спрашивал.</p><p class="p">— О да, — кивнул Тамидзи. — И Мусасимару также. Что и позволило ему победить в битве двух ёкодзун.</p><p class="p">Его начинал раздражать весь этот спектакль. Он представил себе Землю, пошедшую путем этой напыщенной мерзости, этого патетического зверства.</p><p class="p">— Для монастыря достаточно одного монаха, — спокойно отвечал Канэко. —Не в бревнах, а в ребрах церковь моя.</p><p class="p">Это было уже совсем не японское, но из той же оперы — возвращение в древнюю веру людей, убоявшихся развития. Все это бывало. Все это было глупо. Все это много раз уже вело к самосожжениям и один раз к Хиросиме.</p><p class="p">— Мы оставляем за собой право, — произнес Тамидзи ритуальную формулу КОМКОНа, рассчитанную на крайние случаи.</p><p class="p">— Я исполнен решимости, — кивнул Канэко, произнеся ритуальную формулу Хагакурэ, рассчитанную на то же самое.</p><p class="p">Аудиенция была окончена. Кто кому давал аудиенцию, Тамидзи не сказал бы. Канэко казалось, что оба они давали ему кому-то третьему, но кто-то третий, кажется, был не слишком впечатлен. После того как он вырвался наружу на Радуге, на него уже трудно было произвести впечатление.

    <strong>12.</strong></p><p class="p">Камилла вызвал Саблин, относительно которого известно было только, что он или гениальный психолог, или фантастически наглый выскочка. В дистиллированном мире Радуги таких споров не велось — тут преобладали профессионалы или уж те, кто ни на что не претендовал: статисты. Саблин за десять лет сделал то, на что у других уходила вся жизнь: создал научную школу, построил глобальный институт, заложил несколько направлений, и было ему тридцать. Ходили темные слухи, один другого неподтвержденнее.</p><p class="p">Саблин восседал в кое-как восстановленном кабинете, где до него была диспетчерская. Теперь на Радугу почти никто не прилетал, и координировать было некого. Саблин тоже был своего рода диспетчер — он решал, кого куда. Обычно для формирования концепции ему хватало трех дней полевых наблюдений, и ошибался он очень редко. С Эссекской эпидемией самоубийств, Чикагской сектой и Красноярским призраком он справился оскорбительно быстро, хотя выводы его никогда не бывали слишком рациональны. Саблин был нескучный человек. Его побаивались.</p><p class="p">— Прекрасно выглядишь, — сказал он Камиллу.</p><p class="p">— Я и чувствую себя прекрасно.</p><p class="p">— А я нет.</p><p class="p">— Представляю.</p><p class="p">— Так что это было?</p><p class="p">— Не знаю, — сказал Камилл. — Второе рождение. Четыре вторых рождения.</p><p class="p">— Абигайль? — быстро спросил Саблин.</p><p class="p">— Гораздо хуже. Аннабель Ли.</p><p class="p">— Вот же ты остряк.</p><p class="p">— Вообще жалко, — сказал Камилл. — Неплохие люди.</p><p class="p">Они разговаривали в несколько ускоренном темпе. Во времена «чертовой дюжины» их клокочущих и щебечущих слов никто не разбирал, но с тех пор люди в целом ускорились, поэтому человек из КОМКОНа-2, который слушал этот разговор, понимал практически все. Одного он не понимал — что ему надо было смотреть в другую сторону. Из этого разговора он все равно ничего не почерпнул, а вот наблюдение за Северным шоссе, которое вело в столицу из лесистого островка рядом с Детским, могло бы дать ему ценный материал. Но КОМКОНовцы всегда смотрят не в ту сторону.</p><p class="p">— Я-то ждал, что будет примерно как на Галиде, — признался Саблин.</p><p class="p">На Галиде обитали и работали люди с потенциально криминальными наклонностями, планета была дикая, и осваивать ее силами нового казачества казалось соблазнительно. Однако новому казачеству надоело, охрана еле успела эвакуироваться, и теперь Галида была обитаема двумя видами хищников — ракообразными и человекообразными. При этом у ракообразных уже намечался прогресс, первые признаки расслоения и даже письменность, а гоминиды пока успешно с любым прогрессом боролись и в хорошем темпе самоистреблялись, а письменность утратили уже через три поколения.</p><p class="p">— Да ну что ты, — сказал Камилл. — Тут некому.</p><p class="p">— А тогда что?</p><p class="p">— Тут была дуга, выступ, — объяснил Камилл. — Примерно как в Курске, такая Курская аномалия. В Курске всегда аномалия, надо исследовать.</p><p class="p">— Уже, — кивнул Саблин.</p><p class="p">— Вот все интересовались, чего их тогда — ну, тогда — туда понесло. А их не понесло, их втянуло.</p><p class="p">Саблин опять кивнул, он так и думал. История августа-24 вообще была показательна, кое-что объясняла даже триста лет спустя.</p><p class="p">— Создается выступ, потом гиперкомпенсация. Мы, собственно, могли иметь это в виду. У нас могло получиться то же самое, но мы своевременно…</p><p class="p">— Нас было всего тринадцать, так что вряд ли.</p><p class="p">— И тем не менее, — настойчиво повторял Камилл, — и тем не менее.</p><p class="p">«Чертова дюжина» никуда не делась, но приняла решение раствориться. Столь радикальное ускорение эволюции могло привести к последствиям, которых даже они, сверхлюди, рассчитать не сумели. Прежние личности были стерты, биографии упразднены, внедрялась версия о массовой гибели в результате научной самоотверженности. К счастью, никто не обратил внимание на почти синхронное появление молодых и чрезвычайно талантливых специалистов в чересчур разных областях. В какой-то точке эти области, безусловно, сходились, но некому было просчитывать, как сопрягутся нуль-физика, японская морфология, американская энтомология и еще десять предельно разбросанных сфер. Камилл оказался на Радуге. Он был единственным, кто не шифровался, потому что в силу некоторых анатомических последствий эксперимента вынужден был всегда носить шлем.</p><p class="p">Все они периодически собирались в первые годы после эксперимента, но заметили, что опротивели друг другу до последней возможности, и потому теперь не виделись без крайней необходимости. Теперь такая необходимость была.</p><p class="p">— Я склонен был думать, — сказал Саблин, — что это все-таки последствия нуль-Т. Какая-то сверхмасса.</p><p class="p">— Никакой сверхмассы. То есть масса была, и даже критическая, но не в эксперименте. Они посылали и больше, только без шума.</p><p class="p">— То есть, — сказал Саблин не утвердительно, а вопросительно.</p><p class="p">— Нуль-физика вообще ни при чем. Нуль-кабины через двадцать лет будут стоять на каждом углу. Еще пара лет работы, потом адаптация, и транспорт исчезнет.</p><p class="p">— Но тогда, — Саблин встал и прошелся по диспетчерской. — Тогда. Тогда.</p><p class="p">— Тогда надо искать причину в чем-то, отличном от нуль-физики.</p><p class="p">— Издеваемся, да?</p><p class="p">— Ничуть не бывало. Просто вспомни, что случилось с утра в день катастрофы.</p><p class="p">— Ничего, — буркнул Саблин и вдруг сел. У древних было выражение «так и сел», и с ним случилось именно это.</p><p class="p">— Горбовский прилетел, — сказал он радостно. Открытия всегда приносили ему радость, даже если это были мрачные открытия.</p><p class="p">— Ну, не только Горбовский, — пояснил Камилл. — Не только. Еще Валькенштейн, Диксон.</p><p class="p">— Они точно не…?</p><p class="p">— Нет, раньше здесь никто из них не появлялся.</p><p class="p">Все они по-прежнему улавливали идеи друг друга, иногда им не мешали и космические расстояния. Это не была телепатия — телепатии, как и телепортации, не существует; это было существование в одном темпе, так называемая первая сверхчеловеческая скорость, как шутил один из них, когда-то биохимик, ныне балетмейстер.</p><p class="p">— Х-хо! — сказал Саблин. — То есть скопилась, иными словами, критическая масса идеальных людей, и тогда…</p><p class="p">— Я не сказал бы, что идеальных. Сам Горбовский показался мне даже недалеким.</p><p class="p">— Да тебе все…</p><p class="p">— Не все. Вязаницын явно умней. Жена Вязаницына еще умней Вязаницына.</p><p class="p">— Но не Диксон же?</p><p class="p">— Чисто интуитивно — Валькенштейн. Мне в его брюзгливости послышалось что-то наше. Что-то снисходительное.</p><p class="p">— Диксон, — вспоминая, медленно проговорил Саблин. — Диксон, что же я знаю про него? Он самый сильный звездолетчик, физически сильный. У него лучшие показатели в шахматах. Лучший рейтинг в бисере…</p><p class="p">— Это интересно, кстати. На Радуге бисер в большой моде.</p><p class="p">— Но это же никак не коррелирует…</p><p class="p">— Почему, все-таки не для дураков.</p><p class="p">— Но эта Волна, — Саблин снова стал ходить из угла в угол, — эта конкретная Волна… Надо просто понять, кто вызвал критические значения.</p><p class="p">— Слишком много параметров. Может быть, именно эта его простоватость, я про Горбовского…</p><p class="p">— Понял, не дурак.</p><p class="p">— Может быть, именно она вошла в конфликт с местным интеллектом. Может быть, сила Диксона. Может быть, эмпатия Валькенштейна, хотя здесь было так себе с эмпатией. Над Скляровым, например, они все глумились, и на его месте я многих бы просто размазал. Прежний я, конечно, а не Камилл.</p><p class="p">— Ну хорошо. Ты здесь жил, так скажи — в чем здесь выступ?</p><p class="p">— Выступ всегда более или менее в одном и том же, — сказал Камилл с легким недоумением. Он не понимал, почему даже Саблину приходится объяснять очевидные вещи. — Выступ образуется из-за преодоления человеческого, невнимания к человеческому, из-за следующей ступени человеческого. Тогда происходит реванш, и все отбрасывается — иногда на век, иногда на год.</p><p class="p">— Х-ха. А ты можешь сказать, в чем принципиальное отличие от нашего случая?</p><p class="p">— Это трудно, — признался Камилл.</p><p class="p">— Глупости, тебе ничего не трудно.</p><p class="p">— Получится дешевый парадокс.</p><p class="p">— Дело привычное.</p><p class="p">Камилл стрельнул в него глазами с настоящей застарелой ненавистью.</p><p class="p">— Грубо говоря, — сказал он вкрадчиво, — в нас не осталось ничего животного, а в них теперь проснулось только животное.</p><p class="p">— А в тебе?</p><p class="p">— Во мне, — сказал Камилл, — очень много злости.</p><p class="p">— Я чувствую.</p><p class="p">— Есть чувство, что меня обманули, хотя обманывал себя всю жизнь только лично я. Оказалось, любое развитие рано или поздно дает выступ, любой выступ рано или поздно дает Радугу. Предельная задача состоит не в том, чтобы ускорять прогресс, но в том, чтобы вовремя и в нужных точках его притормаживать.</p><p class="p">— Это тривиально.</p><p class="p">— Все вообще тривиально.</p><p class="p">— Правильно будет сказать, что после Радуги ты способен только на тривиальное.</p><p class="p">В эту секунду в бывшей диспетчерской вылетело окно. Ворвался сырой холод.</p><p class="p">— Твои штучки? — без паузы спросил Саблин.</p><p class="p">Камилл выглянул наружу.</p><p class="p">— У меня, — сказал он с облегчением, — таких способностей нет.</p><p class="p">Заоконный холод был ему приятен. Бешеная вспышка злобы оседала, как пена.</p><p class="p">— Раньше мы друг другу сочувствовали, потом ненавидели, — объяснил Камилл. — Теперь преобладает раздражение. Сильных эмоций у меня вообще мало.</p><p class="p">— А тогда кто это? — поинтересовался Саблин, по-прежнему не глядя на пустую раму. В здании Дворца были кармалитовые стекла, они выдержали Волну. Теперь в них метнули чем-то, чего они не выдержали.</p><p class="p">— Это снежок, — пояснил Камилл.</p><p class="p">— Че-го?</p><p class="p">Саблин, оказывается, не разучился удивляться.</p><p class="p">— Кармалит выдерживает любые температуры, — сказал Камилл, — но на морозе он хрупок. Довольно слабого удара, а тут был сильный. На Радуге никогда не было снега. При нормальной температуре пуля не прошибла бы, а теперь вот.</p><p class="p">— И кто так шутит?</p><p class="p">— Это, — сказал Камилл, — предстоит выяснить тебе.

    <strong>13.</strong></p><p class="p">В Детском детский психолог Ли Синь собирался беседовать о детском с так называемыми детьми Габы, которые пережили Волну в непонятных лесных убежищах. Шанса добраться до столицы у них, разумеется, не было, поскольку Габа мог в силу своей специальности затормозить любой двигатель, включая двигатель прогресса, а разогнать, тем более без горючего, не мог ничего. Но Габа был человек древнего племени и чувствовал пустоты в земле, а также легко входил в ментальный контакт с представителями любого коренного населения. Он что-то пошептал, и открылся лаз. Дети охотно об этом рассказывали, но вообще Ли Синю они не нравились. Они смотрели так, как не должны смотреть дети, а именно свысока. И лица у них были нездорового и недетского цвета, желтоватые, не смуглые, а как бы перезревшие. Хотелось назвать их желтушными.</p><p class="p">Как всякий хороший детский психолог, Ли Синь выбрал эту печальную профессию не от хорошей жизни. Он жалел в каждом неадекватном ребенке себя, потому что сам был не совсем обычным школьником: в свой первый день в интернате он безутешно рыдал, так что на второй его отпустили. Напрасно его уверяли, что никто не хочет ему зла, что теория воспитания предполагает полную добровольность, что он может отправиться к родителям в любой момент, но просто здесь ему будет лучше, сам посмотри, гораздо же лучше! — нет, он рыдал как сумасшедший, как обманутый, как дитя, которому пообещали поездку с родителями на карусели, а вместо этого призвали в армию. На него было так жалко смотреть, что воспитатель сказал матери: ничего не поделаешь, это не болезнь, а особый склад психики, и возможно, он рожден для каких-нибудь уединенных занятий. Мать не поверила и жестоко его отругала за распущенность, но он так был счастлив вернуться домой, что ни на какую ругань не обращал внимания и только тихо поскуливал от счастья. Он и сейчас легко мог воспроизвести тогдашнее отчаяние, погрузиться в него — в этот мир стопроцентно и безнадежно чужих, которым хорошо было вместе, а вот ему с ними совершенно никак, до отвращения, и ему казалось, что они постоянно подчеркивают эту свою отдельность, демонстрируют ему свою спаянность, и он никогда не научится преодолевать эту границу между уютным миром собственной комнаты, где у каждой игрушки была своя история, свой день рождения (день покупки), свои сложные ритуалы укладывания спать, — и вот этим чужим пространством, где обменивались фантиками от жвачки и смотрели комиксы. Как ни странно, вся его жизнь как раз проходила на публике, он беспрестанно общался с толпами и решал чужие проблемы, ездил на конференции, налаживал связи в коллективах, пресекал травлю, вообще занимался всем, чего требует экстремальная педагогика, — но заниматься всем этим мог только потому, что в семилетнем возрасте испытал на себе милосердие; его пощадили и отпустили. Поток тепла, который от него шел, как раз и вызван был вечной благодарностью к тому воспитателю и к матери, которая, вопреки твердой и бесчеловечной воле отца, сказала: никуда он больше не поедет. И ничего, как-то самовоспитался дома, читая литературу и смиренно выслушивая периодические нотации. А потом счастливо женился, вопреки всем прогнозам, и счастливо трудоустроился — а все потому, что иногда надо пожалеть ребенка, увидевшего мир как он есть, то есть глазами потерявшегося щенка.</p><p class="p">Вот он теперь со всей душой, с полной готовностью помочь, адаптировать, вытащить из депрессии наблюдал так называемых детей Габы — но эти дети, числом десять, совершенно не нуждались в его услугах. Они не просились к родителям — хотя родители изводили комиссию требованиями немедленно их выдать на руки; они знай переглядывались и посмеивались. Это не были кукушата Мидвича, не были мутанты, которых чудесно и ужасно преобразила Волна, — или, верней, она преобразила их кардинально, но отбросила не назад и не вперед, а в сторону. Уже по первым секундам общения Ли Синь — как-никак один из ведущих профи в своем деле — уловил телепатические сигналы, которыми они обменивались; сигналы были невербальные, не фразированные, не иероглифические — это были именно перепасовывания усмешек, скептических и временами брезгливых. Им было смешно. На взрослых они смотрели как на юных недоумков, надеявшихся спасти их со спасательной шлюпки и бросить обратно в свою ледяную воду. Они были вне человечества и не желали вернуться.</p><p class="p">— Так что вы делали в убежище? — осторожно расспрашивал Ли Синь.</p><p class="p">— Там был дедушка, старичок, — широко распахивая прозрачные глаза, с хорошо разыгранным простодушием говорила девочка Соня, и в тоне ее было издевательство. Так говорили дети в самых плохих фильмах.</p><p class="p">— Где?</p><p class="p">— В лесу, в норе. В глубине норы. — Она округляла глаза и мелодраматически ахала. — Он дал нам орешков.</p><p class="p">— Вы их съели или что-то сохранилось?</p><p class="p">— Что-то сохранилось, — сурово говорил мальчик Илья. — После чего съели.</p><p class="p">— И что? — заинтересованно, однако тоже очень фальшиво говорил Синь.</p><p class="p">— И с тех пор нас ничто не радует, не интересует, — пояснял мальчик Саша, которому было семь, а говорил он как сорокалетний. — Ничто не может нас теперь привлечь. И когда мы смотрим на вас, — говорил он, не пугаясь, а именно расчетливо пугая, — мы видим в углу его. Ааааа!</p><p class="p">Он показывал пальцем в угол. Дети дружно ахали и хохотали. Ли Синь никому тут не был нужен со своей любовью, ему как бы говорили, что пошел бы он вон. Им было прекрасно в коллективе, они ни на что не жаловались.</p><p class="p">— Да-да, — скучно говорил он. — И он скалит зубы и говорит вам: выплюнь да разотри.</p><p class="p">Он прекрасно знал этот рассказ. Он другого не понимал: откуда они знали? В школе им не читали этого.</p><p class="p">— Ты не понимаешь, — вдруг серьезно сказал мальчик Сережа. — Тебя тут не было.</p><p class="p">То, что они называли Ли Синя на ты, было тоже неправильно. В Детском учили говорить на вы с незнакомцами.</p><p class="p">— Хорошо, меня не было, — кротко соглашался Ли Синь. — А вы были. Что теперь с вами не так?</p><p class="p">— С нами все хорошо, но вы же нас предали. Вы нас бросили, — сказала Соня.</p><p class="p">Теперь взрослые были у них во всем виноваты. На самом деле, разумеется, не виноват был никто, даже Скляров, но все чувствовали вину, а дети умело эту вину эксплуатировали. Они вымещали на взрослых странную вражду. Иначе говоря, это были первые дети в истории Полудня, которые видели во взрослых исключительно врагов, и сами назначили себя их врагами, и ненавидели все, что эти взрослые делали и могли предложить.</p><p class="p">— Вы другие, вы не такие, как мы, — старательно объясняла Соня. Она была тут у них главный спикер. — И не надо думать, что это Волна сделала. Это всегда так было. Мы это всегда чувствовали, но только теперь можем назвать.</p><p class="p">— Вы заблудились и нас туда же тащите, — с видом вдумчивого карапуза цедил Мехмет, изображавший медлительность. Мехмет не был медлителен, Ли Синь отлично видел, что это быстрый, острый, жестокий мальчик. Но он как бы играл в том же плохом фильме роль туповато-рассудительного бутуза. Он даже казался толстым, надувал щеки.</p><p class="p">— Мы не дадим вам нас увлечь и вовлечь, — добавлял Сережа. — Мы дети Радуги, мы всем расскажем.</p><p class="p">Эти дети отлично понимали, что никто их на Радуге не оставит, что дегуманизация зашла далеко, но не настолько же; но они пережили откат гораздо более жестокий и желали теперь откатить туда же весь мир. Они будут теперь расчетливыми, холодными антилидерами, они будут высмеивать любую инициативу, тормозить любое добро; с блистательным цинизмом будут они измываться над любым проектом. Они будут делать это из чистого наслаждения разрушать все, до чего дотянутся, — потому что строить им скучно и пресно. Они не будут даже потреблять. Они будут антидетьми антирадуги, полной противоположностью отцам, и все это они будут проделывать под тем предлогом, что их бросили в лесу.</p><p class="p">— А между прочим, — сказал Ли Синь, глядя прямо в распахнутые эмалированные глаза Сони. — Между прочим, никто же не знает, кто слил топливо из аэробуса. Как это так получилось, что в аэробусе не было топлива.</p><p class="p">— Ну же конечно же это же сделали не мы, — убежденно и невинно сказал Мехмет. — Ну разумеется, не мы. С больной головы на здоровую. Ты сам же должен знать, что Таня просто не подготовилась.</p><p class="p">— Таня тут вообще ни при чем, — отмахнулся Ли Синь. — Что у вас за претензии к Тане?</p><p class="p">— Таня, вместо того чтобы спасать вверенных детей, вертела хвостом своим, — с интонацией древней старухи, сплетничающей у подъезда, сказала молчавшая доселе Джейн, девочка очень решительная. — Она заслуживает порицания вообще-то, было бы хорошо ее порицнуть как следует, чтобы было неповадно вертеть своим хвостом.</p><p class="p">— Порицание! — завизжали они хором и так же внезапно успокоились.</p><p class="p">— И мы еще будем внимательно изучать вопрос, — произнес Ли Синь со смутной угрозой, — кто вообще погнал Волну. У нас нет однозначного вывода, кто ее погнал, но у нас есть совершенно точная информация, что эксперименты ни при чем.</p><p class="p">Дети заулыбались и перепасовали друг другу — это прямо вот чувствовалось — дружное «Мы так и знали».</p><p class="p">— Мы знали, что мы у вас будем виноваты, — пискнула Джейн. — У вас в так называемом взрослом мире всегда виноват потерпевший.</p><p class="p">Они не знали, не могли знать этих слов, им неоткуда было взять эту лексику анонимок.</p><p class="p">Они не были новым поколением, вот в чем дело, — новым в обычном смысле, теми, кто приходит на смену. Они были стариками, чудом дотянувшимися до молодых, воскресшими старцами из дворов и подъездов, вот кем были они; злорадными стариками, которые теперь умеют не просто перемигиваться, а еще и считывать друг друга, видеть мозг соседа насквозь. Это были враги, и страшные враги. Им не хотелось строить новую землю, им вполне было достаточно не дать родителям сохранить старую. Это был самый деструктивный из новых культов, и непонятно было, какой старик с орешками их этому научил. Очень может быть, хотя никто этого не мог ни подтвердить, ни опровергнуть, — что в недрах Радуги действительно таилась негуманоидная жизнь, не попавшая ни на какие сканеры; а возможно, они умели отводить глаза и наводить порчу. Но кто бы там ни был, этих детей научили срывать родительские замыслы и ненавидеть всех, кто старше двадцати; только прежние поколения не хотели брать родителей в свое будущее, а эти собирались не пустить их в свое прошлое. В них сидело страшное злорадство. Они ничего не умели, кроме этой своей телепатии, но их усмешек было достаточно, чтобы разрушить любое светлое будущее. А сделать с ними ничего было нельзя — ведь они были дети, и вдобавок пострадавшие.</p><p class="p">— Кормят хорошо? — вдруг спросил Ли Синь. Он умел внезапно переключаться, это сильно действовало на негативно настроенных подростков. Это называлось «метод Банева», но эти были не лебеди — просто гадкие. Не все гадкое лебедь.</p><p class="p">— Ничего себе, — ответил за всех Игорь. У него были трогательные короткие штанишки и зачем-то зубная щетка в руках, поигрывал ею. — Но мы в свое время вас будем хуже кормить.

    <strong>14.</strong></p><p class="p">Выжившие стыдятся. Так было всегда, и нашумевший роман трехсотлетней давности назывался «Стыд выживших». Его еще помнили, потому что после него романов долго не писали; с него, собственно, и начался тот переворот в умах, который отделил Полночь от Полудня. Частью этого переворота была мысль о том, что он вообще возможен; второй частью — догадка, что он может произойти от романа. Имя автора и тема романа были, впрочем, совершенно забыты, потому что в наступившем мире Полудня все это перестало иметь значение. Но название осталось.</p><p class="p">В госпитале лежали тяжелые. Горбовский их навещал. Он полагал, что в сложившихся обстоятельствах у него нет других обязанностей, а потому надо выполнять эти. Жить вовсе без обязанностей он пока не был готов. Пименов — серьезный физик и самый приятный на Радуге собеседник — был теперь собеседником скорее неприятным. Обычно его отряжали объяснять гостям и корреспондентам, чем именно занимались на Радуге и в какой стадии пребывала работа. Над его пояснениями, которые тиражировали разные научные обозреватели, ржала потом вся Радуга — прежняя, высокомерная, загорелая и спортивная Радуга, любившая экспериментальную физику и экстремальный спорт. Теперь он пытался давать совсем другие пояснения — на что именно он жаловался. У всех в госпитале был примерно один и тот же набор страданий. Жаловались там на вещи, которые триста лет назад насторожили бы разве что ипохондрика, но сейчас это были очень серьезные, чуть ли не смертельные показания, и никто не знал, что с ними делать.</p><p class="p">Показаний этих было три типа, и прежние диагнозы к ним не прилипали — в номенклатуре немедленно появлялись новые болезни с определением «радужный». Радужный сердечный синдром, радужные обсессии, радужные сновидения. Раз за разом Пименов во сне облетал на огромном самолете, взлетавшем почему-то прямо из центра города, огромный готический собор — нет, целый комплекс соборов, о котором он понятия не имел; почему-то собор назывался Мюнхенским. Мюнхенский собор существовал и был одним из самых высоких в Германии, но он и вполовину не был так огромен, как то, вокруг чего летал Пименов. Сон внушал такое чувство счастья, что просыпался Пименов всегда совершенно и глубоко несчастным, и даже спустить ноги с кровати представлялось ему подвигом. Потом, каждое его движение обрастало теперь гроздью ритуалов, куда более сложных, чем те, что совершались в соборе. При этом бояться ему было совершенно нечего, ибо все уже случилось, — но, видимо, сама мысль о случившемся внушала возможность его повторения, а с этим Пименов жить не мог. Он жаловался также — он, который вообще никому и ни на что не жаловался и даже мигрени ни разу не испытал, — на дрожание в области сердца. «Болтанка», пояснял он, и врачи ничего не понимали: объективно все было нормально, а от слабости никто не застрахован. Слабость действительно была ужасная: теперь ему требовалось долго собираться с духом, даже чтобы отправиться в уборную. И он много читал — он, всегда презрительно отзывавшийся о любой беллетристике, кроме отцов-основателей, которые и то казались ему в последнее время примитивными. Это уж было кощунство, но Пименова как раз за кощунства уважали. Теперь у него в читалке был скачан даже «Я хобот» Жирковского — произведение, давно признанное днищем жанра, но однажды его неосторожно похвалил Ламондуа, и теперь его звали не иначе как «возомнивший о себе Жирковский». Надо бы это вычеркнуть, это ведь тоже бессмертие — а зачем раздавать его направо и налево?</p><p class="p">— Понимаете, — говорил Пименов Горбовскому, — меня теперь утешает всяческая третьесортность. Все первосортное напоминает мне о том, каким я когда-то был и больше не могу. Наверное, так было с Дау после катастрофы.</p><p class="p">— Дау было легче, — сказал Горбовский. — Он был человек самоуверенный и никогда не задавался вопросом, почему с ним так.</p></span>
