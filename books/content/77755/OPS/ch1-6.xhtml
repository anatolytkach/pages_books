<span><p class="p">Пименов отвечал ему затравленным взглядом, в котором благодарность за понимание смешивалась с ненавистью за догадливость.</p><p class="p">— Господи, — сказал Пименов. — Это же снова жить.</p><p class="p">— Ну а вы на что рассчитывали? — спросил Горбовский. — Вы собирались дезертировать? Дудки.</p><p class="p">— Да не то что дезертировать, почему же, — вяло сказал Пименов. Речь его была похожа на руку больного, который поднял ее в палате, чтобы поприветствовать гостя, но сил у него хватило на один взмах. На Земле теперь болели редко, а на Радуге того реже, но очень тяжело. Если человек попадал в больницу, то, значит, дела его были не плохи, а ужасны. Многих откачивали, но прежними они не были, потому что опыт бессилия — самый унизительный из опытов.</p><p class="p">— Почему же дезертировать, — повторил он. — Но ужасно стыдно, понимаете?</p><p class="p">И он процитировал из радужного фольклора, в изобилии сочинявшегося нулевиками:</p><p class="p">— Ведь если жизнь не удалась — то это, в общем, полбеды,</p><p class="p">Но если смерть не удалась — пошел ты на хуй!</p><p class="p">— Ага, ага, — с полным пониманием кивнул Горбовский и процитировал другую песенку своей юности: «И что ж? Могильный камень двигать опять придется над собой, опять любить и ножкой дрыгать на сцене лунно-голубой».</p><p class="p">Эта цитата не произвела на Пименова никакого впечатления. Его поэтические вкусы ограничивались нулевым во всех отношениях фольклором. Он любил и запоминал только то, что хорошо распевалось по дороге.</p><p class="p">— Со мной случилось примерно вот что, — выговорил он медленно. — Античность умела много гитик, потом христианство все это забыло. Но представьте себе, что христианство пошло по другому сценарию, что оно вспомнило не статуи и мифы, а все эти заговоры, всю эту Медею, высевание драконьих зубов при лунном свете… весь огромный набор суеверий, которые знал Рим, гадание по печени и прочие авгуры. Вот это был бы тот еще ренессанс, даже резистанс. Я чувствую себя как человек, вспомнивший десять предыдущих веков одновременно, и все эти навыки во мне ожили.</p><p class="p">Он помолчал и добавил:</p><p class="p">— Я становлюсь подозрителен.</p><p class="p">В самом деле, это было стыдное признание. Стыдней этого трудно было что-либо представить.</p><p class="p">— Кроме того, — продолжал он с некоторой даже важностью, хотя впечатление важности, скорей всего, создавалось самóй медлительностью речи, — я часто забываю, что хотел сделать, и вынужден вести записи: сделать то-то. Но делать мне практически нечего, поэтому записей я не веду.</p><p class="p">— Вы довольно точно описываете человека трехвековой давности, — сказал Горбовский, — человека, по которому ежедневно проезжался паровой каток. При этом, как и у многих людей поздней Полуночи, у вас сохранялось сознание человека Полудня, но оно не находило опоры в окружающем мире.</p><p class="p">— Ну да, — вяло сказал Пименов, — но это все совершенно бессмысленно, то, что вы говорите.</p><p class="p">Горбовский не возражал, ибо это тоже было бессмысленно.</p><p class="p">— Ну хорошо, утешьте меня, — сказал Пименов, — опишите ваше состояние. С вами что-нибудь случилось? Вы-то ничего не потеряли, кроме корабля, который вам, думаю, вернут.</p><p class="p">— Случилось, — серьезно сказал Горбовский. — Случилось самое значительное из всего, что когда-либо со мной было вообще. Я был плоский, 2D, а стал трехмерный. И даже, я бы сказал, шестимерный. Но до того я был двуногим, а стал, как бы сказать, шестиногим.</p><p class="p">— Вот если бы возможны были путешествия во времени, — сказал Пименов, но фразы не закончил.</p><p class="p">— Ламондуа говорил, что после нуль-Т немедленно займется этим.</p><p class="p">— Ну, Ламондуа шутил. Он все-таки был не сумаcшедший, вечного двигателя тоже не планировал.</p><p class="p">— А вот Козырев…</p><p class="p">— Козырев интересен только как прототип, — сказал Пименов, не проявив интереса к теме. — Но если бы путешествия во времени хоть насколько-то были реальны, я бы к ним туда слетал, потому что среди раздавленных людей мне было бы комфортнее.</p><p class="p">— Да, — кивнул Горбовский, — идеальная среда для других раздавленных. Но они бы вас не приняли. Они бы вас приняли за мигранта — и были бы правы. А к мигрантам там плохо относились, что их и сгубило в конце концов.</p><p class="p">Пименов посмотрел на него с внезапной надеждой.</p><p class="p">— Именно это? — спросил он по-детски.</p><p class="p">— Именно это, — серьезно кивнул Горбовский. — А нам это не грозит, как не грозит человеку Возрождения вспомнить лунные заклинания. Да и луны у нас тут нету, и все, что происходит с нами, намного менее романтично.</p><p class="p">Он тяжело поднялся. Ему тоже все давалось тяжело.</p><p class="p">— Так что придется жить, Валя, — сказал он без улыбки. — Пойду, мне надо бы поговорить с Габой, но почему-то к нему не пускают. Наверное, я и ему не нужен.

    <strong>15.</strong></p><p class="p">Желающих поговорить с Габой было трое, потому что далеко не всякий атлет, специалист по четырем основным единоборствам и лучший бегун планеты, мог бы скрываться в белоснежном пейзаже, будучи негром. После многих лет забвения это слово опять было на Радуге в ходу, тут не уважали никакого лицемерия и называли вещи прямо.</p><p class="p">Желающих было трое, а поговорил четвертый.</p><p class="p">— Потому что он наш, — веско пояснил так называемый Вятич; не знали, фамилия это или позывной.</p><p class="p">— В каком смысле? — насторожился Авраменко, начальник охраны Столицы неизвестно от кого. Странно, как только Столица перестала функционировать, там понадобилась охрана, а прежде и слова такого не знали.</p><p class="p">— В том, что мой.</p><p class="p">У Вятича была неприятная манера шифроваться и тем подчеркивать свою значимость. В комиссии все были люди неслучайные, но одним из главных минусов КОМКОНа-2 было то, что в нем в силу глубокой секретности большинство специалистов друг друга толком не знали. От кого они прятались — Авраменко не сказал бы, потому что Странников никто никогда не видел, а более высокой инстанции на Земле вроде бы не водилось. Разве что Планетарный совет, но Планетарный совет давно пребывал в статусе Неизвестных отцов и появлялся в основном на парадах. Где все нормально, говорил Глухов, там власти не должно быть видно.</p><p class="p">Вятич, однако, и сам плохо понимал, как построить разговор с Габой. Это был далеко не тот Габа, которого он видел два года назад, и самое ужасное, что, как и в случае с детьми, он не мог сказать о переменах в нем ничего внятного. Габа с детьми был теперь связан неотчетливо просматривающимся заговором, они перенесли вместе нашествие Волны, а потом неделю зимы, понимали друг друга с полужеста, и Габа постоянно приказывал им молчать, таинственно прикрывая глаза и поджимая губы. Между ними шла какая-то игра, но игра недетская и неприятная. Самое обидное, что с ними ничего теперь нельзя было сделать. Они были защищены статусом детей, и статусом пострадавших, и чувством вины, которое испытывали перед ними все, потому что взрослые их не спасли и теперь должны были вечно искупать свою ошибку. Разумеется, можно было перевалить весь груз на Склярова, и Скляров не возражал — Исусик, новый святой, вот так теперь выглядит Юность мира, — но Скляров был доказанно и подтвержденно не виноват. А вот кто тот фрайер, который не заправил флайер, — это был отдельный вопрос, это предстояло выяснить, и если это было дело Габы, то с ним следовало разобраться с предельной жесткостью. Правда, ни один регрессор таких полномочий не имел, и понять его логику Вятич не мог, хотя понимал многое и быстро. Для начала, подумал Вятич, в общем тренде не столько деградации, сколько архаизации — надо сказать комплимент, люди древних культур к этому чувствительны. Канэко вчера весь день был счастлив, когда психотерапевт похвалил его самодельную катану, два дня ее вытачивал по древним чертежам. Канэко никогда не был гением, распределение не требовало гениальности, но в прежнем своем состоянии, Канэко доволновой, никогда не пришел бы в восторг от столь грубой лести столь примитивному навыку. Габа был регрессором высокого класса, но Волна прокатилась и через него, и Вятич сказал заискивающе:</p><p class="p">— Прежде всех прочих выяснений мне хотелось бы понять, дорогой друг, каким образом ваша славная команда, ваши, так сказать, Chums of Chance на совершенно лысой планете укрывались в течение недели.</p><p class="p">Если бы Габа начал изображать смущение или, напротив, пыжиться, это значило бы, что Волна травмировала и его; но он шмыгнул носом и буркнул: there are more things in Heaven and Earth, Horatio, than are dreamt of in your philosophy.</p><p class="p">— Я лишь хочу заметить, — проговорил Вятич очень осторожно, без всякого нажима, — что по протоколу КОМКОНа не могу настаивать ни на какой откровенности, но по протоколу общения КОМКОНа-2 встать, смирно.</p><p class="p">Габа усмехнулся криво, но встал смирно.</p><p class="p">— Во-от, — с удовлетворением произнес Вятич. — Пока мы, так сказать, живы, никакие чудесные выживания не отменяют иерархии нашего небольшого мужского клуба.</p><p class="p">— Наш маленький мужской клуб, — заметил Габа с интонациями Гага, которому генерал Фрагга скомандовал «без званий», — наш маленький мужской клуб по итогам происшедшего не имеет для меня, малого человека, никакого значения, но по старой дружбе я готов давать любые пояснения.</p><p class="p">Пояснения, сказал он, а не показания. Вятич это услышал.</p><p class="p">— Тем не менее я хотел бы понять, каким образом, — сказал он.</p><p class="p">— Шахты являются не единственными убежищами на лысой планете, и бóльшая их часть имеет характер, так сказать, природный. Некоторые, впрочем, искусственный. Короче, приличному человеку есть куда деться, если он по разным причинам не хочет контактов.</p><p class="p">Вятич помолчал и прошелся по комнате. Габа продолжал стоять.</p><p class="p">— Я предлагаю поговорить начистоту, — сказал наконец Вятич.</p><p class="p">— Если начистоту, — ответил Габа, широко улыбаясь, — то по итогам происшедшего я окончательно уяснил себе отношение к устройству данной планеты и намерен сделать все возможное, чтобы данное устройство никогда и нигде больше не повторилось. Я намерен это делать до тех пор, пока закон позволяет мне оставаться здесь, а когда перестанет позволять, я его нарушу.</p><p class="p">— То есть надо полагать, — осторожно проговорил Вятич, — ты увидел альтернативу данному устройству?</p><p class="p">— Ну, альтернатива данному устройству рано или поздно появится сама собой. Если прекратить данное устройство.</p><p class="p">— Дороговато может встать.</p><p class="p">— Да ничуть не бывало. Люди давно чувствуют, что заехали не туда.</p><p class="p">— Может быть, — медленно сказал Вятич, — очень даже может быть, что ты с ребятами вышел на некий контакт, который тебе не очень хочется со мной обсуждать.</p><p class="p">Габа впервые за время разговора посмотрел на него с уважением.</p><p class="p">— Если ты даже и не знаешь, то догадываешься, — сказал он. — Вас там неплохо натаскивают.</p><p class="p">— Снег — такая материя, — заметил Вятич тоном фенолога, — такая интересная материя, что на нем, в отличие от поверхности, скажем, степи, остаются следы. Поскольку прежде тут снега не было, некоторые аборигены понятия не имеют, что их можно заметать.</p><p class="p">— Ну, прямо говоря, — улыбнулся Габа и вернулся в кресло, будто общее знание их уравняло, — аборигены не представляются мне хорошей альтернативой, Николай Семенович. Александр Селькирк не мог ужиться с современниками и оказался на своем обитаемом острове, но это не сделало его каннибалом.</p><p class="p">— Если б подольше пожил, может, и нашел бы вкус.</p><p class="p">— Вряд ли. Ему нравилась козлятина.</p><p class="p">— Козлятины-то, кстати сказать, может не хватить.</p><p class="p">— Резерв Радуги, Николай Семенович, — самодовольно ответил Габа, — был рассчитан на пятьсот человек, а останется тут хорошо если десять.</p><p class="p">— Насчет десяти даже не думай, — очень серьезно сказал Вятич. — Оставлять тебе детей никто не собирается.</p><p class="p">— Так ведь и прекрасно! — воскликнул Габа, улыбаясь во все тридцать два белейших зуба. — Это самое лучшее, что вы мне можете сказать. И сделать. Я очень хочу, чтобы они поехали на Землю. Если мы хотим что-нибудь менять, менять надо там.</p><p class="p">Возникла пауза.</p><p class="p">— А уничтожить их, — добавил Габа, — вы не можете, ваши, то есть наши возможности я примерно представляю. Бросить на произвол Волны еще куда ни шло, и то надо быть идиотом вроде Склярова, и то это стоило ему полной трансмутации личности. А уничтожить — это нет, на эту ступень вам уже не вернуться. Система приступила к автодемонтажу, Николай Семенович, как и предсказано в базовой теории. Принципиальная новизна ситуации заключается в том, что Волна не отменяет этот процесс, а ускоряет.</p><p class="p">— Габа, — проникновенно спросил Вятич. — Чем именно тебе так не нравится система? Мы, кажется, в курсе, что никакая революции ничего не улучшает, в лучшем случае отбрасывает назад. Регрессоры на то и существуют, чтобы тормозить аутоимунные процессы. Все очень хорошо работало, выросло несколько поколений счастливых, гармоничных людей, пусть даже им пришлось разбросать по другим галактикам некоторое количество деструктивных элементов, в том числе самых талантливых. В чем претензия?</p><p class="p">— Претензия в том, Николай Семенович, — так же просто и даже сочувственно ответил Габа, — что получился у вас в результате мир, в котором управляют две комиссии — КОМКОН-1 и КОМКОН-2. Формально одна отвечает за внутренние угрозы, а вторая за внешние. На самом деле одна блокирует прогресс, а другая — регресс. Возникает общество счастливых посредственностей, подвешенное в пустоте. Идеально гармоничное общество умеренного познания. Все свои крайности оно благополучно разбрасывает по галактике. Но тогда происходят две поистине ужасные вещи, ай, ай, какие ужасные. Первая — в обеих комиссиях оседает некоторое количество сверхчеловеков, очень умных, никто не спорит, вот лично вы очень умный человек, все знают, как я вас уважаю. Но рано или поздно КОМКОН начнет убивать, скорее второй, чем первый, но первый просто дольше раскачивается. Внешней разведке всегда дозволяется больше. А вторая неприятность, Николай Семенович, та, что на некоторых планетах возникает дуга, то есть пресловутое опережающее развитие вызывает гиперкомпенсацию. Выступы надо срезать, это закон природы, его не вы придумали и не Братья Основатели, а гомеостатическое мироздание. И там, где обитает криминальный элемент под присмотром некоторых ушастых, вроде как на Саракше, вспыхивают непредвиденные восстания. А там, где обитает интеллектуальная элита, вроде как на Радуге, возникает Волна. Тоже, кстати, предсказанная некоторыми догадливыми людьми. «Осада! приступ! злые волны, как воры, лезут в окна. Челны с разбега стекла бьют кормой. Лотки под мокрой пеленой, обломки хижин, бревны, кровли, товар запасливой торговли, пожитки бледной нищеты…» — родное Детское, и ты! А потому что нечего, нечего, Николай Семенович, вечно давить болото гранитом, рано или поздно помчится к морю против бури, не одолев и так далее. И среди всего этого ходит какой-нибудь задумчивый Габа — или еще более задумчивый Олешкевич — и говорит: вот сейчас-то да, сейчас-то, может, обойдется, а лет через сто? А тогда-то шиш! И пока вы не побыли под Волной, вам кажется, что вы можете эвакуироваться. А когда вы под ней полежали в компании нескольких невинных деток, вы отчетливо понимаете, что нет, шалишь, — никогда и никому вы больше не позволите тут построить ничего подобного. Потому что нельзя каждый раз устраивать конец света в оплату вашего прорыва. И больную эту систему я воспроизводить не дам, потому что любая естественность лучше Волны.</p><p class="p">— Очень красиво, — кивнул Вятич. — Просто любая естественность приводит к тому же самому. Нет и никогда не будет общества, во главе которого не оказались бы КОМКОН-1 и КОМКОН-2.</p><p class="p">— Вот на это мы и посмотрим, — убежденно ответил Габа.</p><p class="p">— Да смотри, обсмотрись. Разве что ты нарыл тут в ваших пещерах какую-нибудь интересную негуманоидную форму жизни… каких-нибудь квинтян, а?</p><p class="p">Видно было, что впервые за время разговора ему стало по-настоящему интересно. Видно было, что в мозгу у него уже нарисовалась схема: подобно тому, как древний Фоменко спрессовал все века истории в одно тысячелетие, он уже спрессовал все планеты Великого Кольца в одну Радугу, и теперь у него здесь обитали квинтяне; ну, что поделаешь, редукция была их главной реакцией на действительность, без этого в КОМКОН не брали. Ни в первый, ни во второй.</p><p class="p">— А хоть бы и квинтян, — сказал Габа, снова улыбаясь своей широкой улыбкой.

    <strong>16.</strong></p><p class="p">— Я больше всего боялся, — сказал Марк, — что не успею рассказать ей всего. Ей-то двадцать три года, а мне надо было рассказать про семьдесят. Но оказалось интересное. Оказалось, что мне почти не о чем говорить, а у нее была огромная жизнь, из которой она почти все помнила. Так что говорила в основном она, а после… ну, после уже и говорить почти не надо.</p><p class="p">— Погоди, — перебил Пишта. — Мне важно. Если это метафора, то одно дело. Едина плоть, почему не быть единой душе? Но если у вас действительно общая память…</p><p class="p">— Общая, — кивнули Марк и Постышева абсолютно синхронно. Это общение, похожее на плавание или фигурное катание, отчасти умиляло Пишту, но начинало и раздражать, ему виделась тут какая-то искусственность, как в большинстве счастливых семей. Он любил Линду, а как же, но мог без Линды. Возможно, он немного завидовал, но в самой глубине ума понимал, что не хотел бы таких отношений и даже видел бы в них, пожалуй, посягательство на индекс P.</p><p class="p">— То есть ты не можешь спрятать от нее даже…</p><p class="p">— Выяснилось, — сказала Постышева, — что ничего особо стыдного. Ну то есть как-то после Волны все эти вещи перестали иметь смысл. Человеку почти нечего стыдиться, понимаешь?</p><p class="p">— Слушай, — тут Пишта заколебался, но в разговоре столь существенном соображения такта ничего уже не значили. — Я начинаю думать, что вся теория воспитания может уложиться в три часа. В те три часа, в которые люди будут ждать Волну, а потом приходить в себя. По крайней мере эмпатия будет полная и навеки.</p><p class="p">— Но ты же видишь, — Постышева хотела сказать это сама, но Марк сжал ей локоть и она кивнула. Видимо, мысль посетила их одновременно, но от Валькенштейна выслушать ее было легче. — Ты же видишь, что это как бы побочный эффект. И далеко не у всех. А главный ты видел, и он почти у всех вот такой вот.</p><p class="p">— Ты же видел Леонида, — добавила она, хотя знать не знала до катастрофы никакого Леонида. Так, слышала.</p><p class="p">— Ну а вдруг, — выдал Пишта главную мысль, которую от себя прятал, но в присутствии этих двоих фальшивить было невозможно. — Вдруг именно это главное, а всякая вот эта работа… шла бы она лесом, действительно. Вдруг счастливое человечество — это человечество, которое разбилось на счастливые пары.</p><p class="p">— Ты знаешь, — задумчиво проговорила Постышева, — мне кажется, что мы бы в конце концов и без Волны… Просто на это ушло бы лет пять. А так все сразу. И потом — Марк, можно я скажу?</p><p class="p">Он кивнул, мгновенно поняв, что именно будет сейчас сказано.</p><p class="p">— Оно, конечно, стóит того, — тут на миг мелькнула прежняя Постышева, с этой хулиганской манерой проговаривать вслух то, что многие боятся и подумать. — Оно стоит того, и все-таки, Стас, это было очень неприятно. Настолько неприятно, что я почти ничего не помню. В некотором роде это было хуже смерти, и поэтому…</p><p class="p">— И поэтому потом стало лучше жизни, — кивнул Пишта.</p><p class="p">— Ты смотри, он стал понимать, — усмехнулся Марк. — Ты не хочешь к нам того… подключиться третьим?</p><p class="p">Они засмеялись тем новым смехом, которым смеялись теперь все выжившие.</p><p class="p">— Стас, Стас, в хорошем смысле! — сказала Постышева сквозь этот холодноватый смех. — Чистая телепатия.</p><p class="p">— Нет, ребята, — ответил Пишта чрезвычайно серьезно. — Такого я не выдержу.</p><p class="p">…Он ушел, и они начали делать это; то, что они делали, мало было похоже на любовный акт. Это было похоже на совместный плач и взаимное утешение или совместный танец, в котором танцоры сначала взлетают, а потом ползут — то змеи, то птички, — после чего засыпают, бессильно, но тесно обнявшись.

    <strong>17.</strong></p><p class="p">Всякого человека жалко, но мысль о гибели Ламондуа вызывала самую острую боль. Его уговорили уйти в шахту, и он не особенно сопротивлялся, потому что бесценный опыт очевидца обнулялся полной неопределенностью результата: увидеть и даже почувствовать Волну можно было только один раз и никому уже об этом не рассказать. Когда наступила тремор-фаза, то есть всех даже на глубине начала бить дикая дрожь, — на лице Ламондуа появилось самое странное выражение, но всем было, вообще говоря, не до наблюдений. Эта фаза была отвратительна, всех трясло не от страха, а скорее от физиологического отвращения к происходящему. Творилось нечто настолько мерзкое, что с этим невозможно было сосуществовать физически. Это как бы высасывало душу, и этого-то Ламондуа не мог пережить, потому что человеческого в нем было и так немного. А только это человеческое, как выяснилось, и выжило. Патрик бросил на него взгляд, надеясь утешиться — Ламондуа всегда ему казался твердыней, наверняка и теперь выдерживает все, как каменный, — но на лице Ламондуа он увидел вдруг выражение, какого никогда не видел, не то чтобы у него, а у взрослых людей вообще. Это было выражение ребенка, которому никто никогда не перечил, — и вдруг его ударили, и в эту секунду он понял, что его теперь будут бить всегда. То ли родители отдали его в ужасный класс, то ли просто больше ничего не могут сделать для его защиты, то ли просто нет больше никаких родителей, все кончено, — на лице Ламондуа были обида, ужас и страшное понимание, что мир таков и есть. Ребенок может с этим жить, у него пластичная психика, а взрослый человек не вынесет такого открытия. И Ламондуа умер.</p><p class="p">Он был вундеркиндом, трехлетним читателем энциклопедий, пятилетним пятиклассником, восьмилетним слушателем курса Абрикосова, в двенадцать опубликовал первую работу по запутанным па́рам — и повторял, что первая работа определяет всю жизнь: все его любовные истории, многочисленные и несчастные, отличались запутанностью. Он был из тех, кому всего мало, жил страшно быстро и при этом ничего не успевал, ибо главная проблема оставалась неразрешимой. На нуль-физику смотрели сначала как на самую перспективную область, потом — как на занятие для дерзких и бескорыстных, а в последние годы как на утеху неудачников, которые в случае почти невероятного везения перевернули бы мир, а при любом другом исходе могут утешаться по крайней мере величием замысла. Единственное интервью Ламондуа заканчивалось цитатой из древней поэмы — тот, мол, кто не добрался до вершины горы, все-таки забрался выше того, кто покорил кочку. Иногда казалось, что сам Ламондуа — последний аргумент в пользу нуль-физики: если явный гений этим фанатично занимается — не может быть, чтобы это оказалась совсем пустышка. И когда Ламондуа показалось на стадии тремора, что и это пустышка, и все вообще чушь, — в нем просто ничего не осталось: Волна высосала из него жизнь, как мифический страж порога высасывает душу.</p><p class="p">Шахтеры клялись, что защита была надежна, вон же, другие же хоть и почувствовали, но отделались тремором… Ламондуа, хотя у него стабильно ничего не получалось, был символом бесконечного поиска. Правду сказать, физика последнего века решала задачи все больше инструментальные, на новую относительность не замахивалась, занималась расчисткой завалов вокруг нескольких грандиозных построек; ясно было, что идея перемещения во времени останется радостью третьесортных фантастов, а расслоение человечества хоть и совершилось, но ни у кого не хватало храбрости его осознать. Время откровений прошло, настала эпоха адаптаций. Радуга на этом фоне была единственным обещанием прорыва — и это-то обещание так ужасно взорвалось, и Ламондуа был последним аргументом для сумасшедших мальчиков. Его смерть доказывала, что сумасшедших мальчиков больше не будет. Все кончилось, как всегда, наихудшим образом. Пагава даже сказал, что вывел, кажется, главный физический закон мироздания: в большинстве случаев обходится, зато уж тогда, когда не обходится, все происходит по худшему сценарию, без всякого милосердия. И добавил: Этьен не был оптимистом и даже считал оптимистов дураками. Хороший физик прежде всего понимает, как устроен мир. В это понимание входит догадка о том, что мир устроен ужасно.

    <strong>18.</strong></p><p class="p">Немолодой, но цветущий и сильный, похожий на викинга Мельников пришел к Саблину без вызова и заговорил без предисловия, обратившись без отчества.</p><p class="p">— Нам хотелось бы знать, Константин, когда мы можем увидеться с нашими детьми.</p><p class="p">— Мне тоже хотелось бы это знать, — мягко улыбнулся Саблин.</p><p class="p">— Кто мешает? — весело сказал Мельников. — Кто вставляет нам палки? Давайте их убьем!</p><p class="p">С КОМКОНом следовало говорить по-свойски, весело и напористо.</p><p class="p">— Полететь на Землю, Александр Петрович, вы сможете только по завершении расследования. Когда мы будем точно знать, представляете ли вы опасность для землян.</p><p class="p">— Какую опасность? — не понял Мельников.</p><p class="p">— Прежде всего вирусологическую. Мы не знаем, что несет Волна и какие мутации может вызвать. Мы видели уже летальные случаи.</p><p class="p">— Ну так необязательно же нас туда. Можно их сюда.</p><p class="p">— То есть вы их хотите перезаразить?</p><p class="p">— Костя, если можно…</p><p class="p">— Конечно, конечно.</p><p class="p">— Костя, мы с вами оба понимаем, что нет никаких вирусов. И еще мы понимаем, что среди оставшихся ходят слухи. Не очень приятные. Нам говорят, что мы вообще никогда не вернемся, что Земля нас уже похоронила, что там нас не очень-то хотят видеть. Потому что всякий выживший в катастрофе напоминает о чьем-то разгвоздяйстве.</p><p class="p">— Ну, слушайте, — Саблин развел руками. — Ну это-то откуда вы взяли?</p><p class="p">— Нас давно встречали бы с цветами, будь это иначе. Как встречали Масленникова.</p><p class="p">Масленников чудом спасся во время марсианского извержения, которое сам должен был предсказать и не предсказал, — просто считалось, что Лем давно умер, в смысле вулкан, названный в его честь. И вулкан, и Лем давно умерли, но оба вдруг оказались живехоньки — вулкан чуть не погубил всю экспедицию, а Лем предсказал ряд фиаско.</p><p class="p">— Интересно, — заметил Саблин. — Все стали очень подозрительные после Волны, вы не находите?</p><p class="p">— А по-моему, это мы вам подозрительны. Кстати, пятнадцатый канал не транслируется, вы обратили внимание?</p><p class="p">— Я обратил внимание, Сан Петрович, что на Радуге опять стали смотреть телевизор. А его, между прочим, никогда не смотрели. Его и на Земле смотрят в основном в интернатах — в детских учебный канал, а в стариковских сериальный. Есть три занятия, недостойных человека, — процитировал Саблин одного лагерника. — Бить собаку, жрать с пола и смотреть телевизор.</p><p class="p">— Но делать-то нечего, Костя. Семей-то нет. Не в карты же играть, правильно?</p><p class="p">— Лучше в карты.</p><p class="p">— А чем вы сами объясняете этот фокус с пятнадцатым каналом?</p><p class="p">— Да понятия не имею! — воскликнул Саблин. — Я телевизор с детства не смотрел, с мультиков. Пятнадцатый канал везде плохо принимается, его делают венерианцы, там идиотские сплетни…</p><p class="p">— Но там выходят «Версии», — настаивал Мельников. — И в «Версиях» наверняка говорят про нас. Я понимаю, мы теперь просто портим статистику. Но если нам навсегда закрыт путь на Землю, по крайней мере скажите прямо.</p><p class="p">— Я вам говорю прямо, — устало сказал Саблин. — Мы вместе вернемся на Землю. Вместе. Как только завершится работа комиссии. Но сейчас, поверьте мне, ни вы, ни Земля не готовы к вашему возвращению.</p><p class="p">— Да почему? — закричал Мельников. — Мы что теперь, прокаженные? Что такого случилось-то?</p><p class="p">— В этом и дело, — кивнул Саблин. — Мы не знаем, что случилось. Со всеми случилось разное, воздействие Волны на каждого человека строго индивидуально. Мы не знаем. Или, точней, мы не понимаем, что случилось.</p><p class="p">— И если вы не поймете, — наступал Мельников, — мы не вернемся? Мы виноваты, что выжили? Так и скажите!</p><p class="p">— Ну что вы такое говорите, а? — проговорил Саблин с несколько бабьей интонацией. — Что же вы такое говорите? Разве Радуга не получает идеальное лечение, самую совершенную медпомощь, самую передовую психологию?</p><p class="p">— Нам не медпомощь нужна. Нам надо видеть наших детей. И не по видеосвязи пять минут в день, а по-человечески.</p><p class="p">— Да увидите вы ваших детей! Вы точно их увидите. И вот тогда…</p><p class="p">Саблин замолчал.</p><p class="p">— И что тогда?</p><p class="p">— И тогда вы увидите, насколько вы не готовы.</p><p class="p">— К чему?</p><p class="p">— Видеть ваших детей, — сказал Саблин. — И показываться вашим детям.</p><p class="p">Он нисколько не лукавил, этот человек, почти никому не говорящий правды и давно стерший собственную личность. Они никогда не позволили бы себе сказать вслух, что лучше для Радуги в самом деле было погибнуть, — тогда она вошла бы в историю как героическая жертва науки. Теперь она тоже входила в историю, но уже как несчастная жертва регресса, как пример невозможности прорыва, как ракета, которая не взлетела. Как символ человечества, остановленного на взлете. И все-таки Саблин был не тот человек, чтобы врать жертвам катастрофы, и тем более не хотелось ему отрывать родителей от детей. У него, между прочим, были свои дети. Когда-то, в первой жизни. В новой, «дюжинной», у него никаких родственников не было и быть не могло.</p><p class="p">Но на Землю он об этом разговоре доложил. И ему сказали: конечно-конечно, пусть не беспокоятся. Самим им к нам пока рановато, мало ли, а вот группу детей мы к ним, конечно, отправим. Мы должны показать всем, что работаем с Радугой и что никакой катастрофы не было, по крайней мере в тех масштабах, о каких писали вначале. Да вообще ничего не было. Выпал снег, бывает. Мы, разумеется, отправим детей, но не всех, а делегацию. После этого, возможно, у ваших подопечных пройдет охота задавать вопросы.

    <strong>19.</strong></p><p class="p">Горбовский ходил по «Тариэлю» с чувством, с каким в древности хозяева наводили порядок в квартире, временно сдаваемой, то есть туда пускали пожить за деньги, но потом квартира становилась нужна им самим — например, сын женился — и жильцов выдворяли, а сына с невестой водворяли. И, обследуя квартиру, пропитанную чужим духом, древние люди с тоской сознавали, насколько все-таки другие люди, даже самые аккуратные, отличаются от нас и все делают не по-нашему. Горбовский вспомнил также, что мать, уезжая на дачу и предоставляя ему все возможности для бодрых и, так сказать, инициирующих каникул — было ему, скажем, пятнадцать, — наводила потом порядок в квартире с тайной укоризной, с горькими вздохами. И это они еще старались убирать за собой, это они еще проветривали, вылизывали, выгребали из самых неожиданных мест самые неожиданные предметы гардероба. Горбовский воспитывался в Ташлинском лицеуме, по всем параметрам довольно элитном, там учили следить за собой, и дома он тоже не распускался, но мать умудрялась найти и продемонстрировать ему множество следов чуть ли не римского разгула. Тогда Горбовскому казалось — ну подумаешь; с годами он оборудовал себе идеальную берлогу, и когда в ней гостила очередная подруга, морщился от перестановок и посторонних предметов. Только два раза эти перестановки были ему не в тягость. Теперь он предпочитал вовсе никого не впускать в свое пространство, а если случался роман, ехал с девушкой в отпуск. И не было еще такого случая, чтобы возвращаться после отпуска в берлогу с самодельным абажуром и шотландским пледом ему не хотелось.</p><p class="p">Нормального человека не может раздражать результат собственного доброго дела, но звездолетчик относится к кораблю довольно специальным образом. Мало того, что с «Тариэля» выбросили и не вернули три четверти научного оборудования, оставив только то, без чего отказала бы навигация. Мало того, что дети намусорили, как мусорят они всегда. Понятно, что все были в ужасном стрессе и сразу после старта осознали наконец, как мало шансов увидеться с родителями, — сначала поле притяжения словно держало их в уверенности, что обойдется, — но они воспользовались кораблем как-то неблагодарно, и Бог его знает, откуда у Горбовского появилось такое чувство, но он явственно сознавал свою чисто служебную роль в этой истории. Никто не оценил его жертву. Все ее приняли как должное. Это было новое поколение детей, дети-модернисты, дети Радуги. У них плоховато было с эмоциональной сферой, хотя все они были румяные, стройные акселераты. Разумеется, от них шел резковатый подростковый запах, к которому Горбовский вдруг стал чувствителен, но не в запахе было дело. Горбовский вдруг понял, что эти дети ему неприятны; что на их месте он бы отказался лететь; что он мог бы, конечно, их заставить и даже власть употребить — в конце концов он был не только капитан, но член Мирового Совета и человек с так называемой третьей группой допуска (чистая формальность, но на старшеклассника могло подействовать). И однако, ему не пришлось ни на кого воздействовать. Они понимали, что дети наше все, и взошли на его корабль с полным правом. Почти уверенные, что ему так лучше, — ведь он давно жил, столько сделал, а у них все впереди. Прежнего Горбовского это бы умиляло, а нынешний был гораздо более человеком, и эта его сущность заявляла свои права на его жизнь, обижаясь на то, что столь долго была подавлена. Он даже включил проигрыватель, чтобы тамтамы отвлекли его от ужасных мыслей, но тамтамы играли что-то древнее и вошли с его злостью в такой резонанс, что он вздрогнул от неожиданной белой ярости.</p><p class="p">Горбовский был человек эры модерна и плохо понимал, что такое инстинкт собственника. Как у всякого звездолетчика, у него случались приступы ипохондрии, и как всякий нормальный человек после пятидесяти, он понимал, что жизнь прожита напрасно. Поскольку его нынешний возраст давно считался пиком формы, эти мысли уходили так же легко, как приходили, а вызывать эйфорию он умел — на то и гимнастический комплекс, которому научил его Си, и бифштекс по-леонидянски, с кисло-соленым соусом на основе местного лилового перца, и таблетка митрагинии, если требовалась полная мобилизация всех способностей. Горбовскому не приходилось так уж строго воспитывать себя — он был человек естественный и до неприличия здоровый. Но теперь он не понимал, что здесь делает, и не вполне отдавал себе отчет, что именно по нему прокатилось. Он понимал только, что по нему проехал каток, и если этот каток кое-чего прибавил ему, то главным образом струпьев.</p><p class="p">Неясно было, как жить дальше. Раньше на все случаи жизни имелась пословица: надо было жить и выполнять свои обязанности. Но в чем заключались теперь обязанности — он сам не сказал бы. Раньше он считал благом ускорять жизнь, в том числе перелеты, а теперь видел, чем это кончается. Раньше у него не было ни собственнического инстинкта, ни страха смерти — после Волны он уже точно знал, что с жизнью ничто не кончается, и вполне представлял, что после смерти может быть хуже. Его мир страшно расширился, но расширился по направлению к адским областям, и сам он чувствовал себя примерно как Юлиан Отступник, обнаруживший вдруг, что христианство отвергло целый пласт знаний и умений. Теперь все эти отвергнутые таланты — дар предвидения, дар сомнения, жадность, трусость, страх познания, ревность, зависть — накинулись на него, невыносимо обостряя восприятие, но и придавая всему воспринимаемому мерзкий привкус человеческого, слишком человечины, сказал бы он.</p><p class="p">Он ходил по кораблю и чувствовал себя недостойным корабля. Это был первый раз, что он попал на «Тариэль» после катастрофы. Волна была катастрофой, нечего прятаться. И самое ужасное, что голый пейзаж Радуги, серый беззвучный снег Радуги, низкое дневное небо Радуги он воспринимал теперь в тысячу раз острее, чем степь со всеми ее цветочками и запахами — в день прилета. Он был похож на здание, в котором открыли все окна, и, хотя оно стояло так, что из окон было не на что смотреть, — любой пейзаж разрушенной промзоны говорил ему теперь больше, чем любые джунгли Пандоры. Он не знал, как будет жить с такой остротой чувств, но восприятие было так ярко потому, что сам он больше не мешал себе. Волна стерла то, что было «я», — то сознающее, воспитанное «я», которое так старательно выращивали три века. Так, должно быть, чувствовали себя люди, ушедшие в пещеры. Смотреть там было не на что — но в любом случае они видели больше, чем переполненные собой люди античности.</p><p class="p">Горбовский проверил, может ли он завести корабль и хорошо ли помнит, в каком порядке запускаются системы на старте. Все он помнил, профессиональная память отмирает последней, не понимал только, куда и зачем лететь. У него адски заболела голова, это была боль вроде той, с какой отдирают бинт с подсохшей раны. Пошатываясь, он пошел спать, то есть смотреть непостижимые сны о детстве, каком-то чужом, загнанном и затравленном детстве, — которые ему теперь показывали.

    <strong>20.</strong></p><p class="p">Встреча с детьми Радуги, прибывшими навестить родителей в преддверии их полного исцеления и скорого возвращения, была устроена в актовом зале школы, где они когда-то с таким энтузиазмом готовили свои капустники.</p><p class="p">Дети страстно рвались к родителям, но в последний момент заробели. Перед самой отправкой двое отказались, сославшись на головокружение. Никто не неволил. Бог весть, чего они боялись: увидеть увечья? Может быть, их терзало чувство вины — ложной, разумеется? В общем, они прибыли на «Тариэле», который, надеялись, вернет Горбовскому душевное равновесие. Они знали, конечно, что на Радуге все в снегу, но скрыть ужаса не смогли, и даже не в снеге было дело: покидали они хоть и обреченную, но цветущую планету, со степями и океанами, с прекрасно функционирующей земной жизнью, биостанциями и детским театром, оранжереями и лучшими лабораториями, а встречали их пустые здания, уцелевшие со странной избирательностью. Все, что касалось науки, было начисто стерто с лица земли, кое-где торчали обломки стен; все, что касалось развлечений, частично обрушилось, но частично устояло; все, что касалось управления и администрации, было невредимо, но вид имело озлобленный и сиротливый.</p><p class="p">Конвоировавший их на Радугу психолог Аль-Гатуни услышал, как один сильно похудевший и повзрослевший мальчик прошептал, прильнув к иллюминатору: мерзость, мерзость. Почему именно эти слова? Вероятно, ему вспомнилось древнее выражение «мерзость запустения», но все было не так уж запущено, просто очень жалко. Их поместили в аэробус и прямо с главной площади отправили в Детское, где ждали родители. Родители даром времени не теряли, изготовили гигантский плакат «Дети — наше будущее!» и разрисовали стены кривыми идиотскими зайцами. Мельников, который считал себя организатором всего этого и втайне гордился, сказал: чем хуже, тем лучше. В конце концов им не нужны эти рисунки, им нужна наша любовь. Сам он никого не ждал, на Земле у него была внучка, которую, слава Богу, на Радугу никогда не возили. Он был из тех стихийных общественников, что стараются за других.</p><p class="p">Дети увидели покореженного железного верблюда на игровой площадке, и многие зарыдали: верблюда-то за что? Рыдания, как всегда в детском коллективе, стали передаваться эпидемически, и Аль-Гатуни вынужден был оглушительно заорать петухом гимн научной молодежи, чтобы истерический плач перешел в такой же истерический гогот.</p><p class="p">Когда дети вошли под грохот спешно включенной «Алохи» — так на Радуге встречали и провожали гостей из Мирового совета, — никто из родителей не шелохнулся. Вероятно, они не верили глазам. Биолог Лашкина — она была на Радуге, в общем, маргинальным специалистом, планировала изучать воздействие нуль-Т на организм, но изучать пока было некого, — страшно побледнев, встала и прищурилась, вглядываясь в лица прибывших.</p><p class="p">Ее дочь, та самая девушка в белых спортивных брюках, неуверенно шагнула ей навстречу и робко сказала:</p><p class="p">— Мама, мы…</p><p class="p">— Что вы сделали?! — тонко заорала Лашкина. — Кого вы привезли?</p><p class="p">Родители беспокойно зашевелились.</p><p class="p">— Что такое? — спросил Мельников.</p><p class="p">— Кого они привезли? Где наши дети? — повторяла Лашкина, царапая себе щеки.</p><p class="p">— Вот ваша дочь, — неуверенно сказал Аль-Гатуни.</p><p class="p">— Это не мой ребенок! — кричала Лашкина. — Вы подменили мне ребенка! Они все погибли, никто не долетел! Где мой ребенок?!</p><p class="p">Родители вставали и пытались подойти к детям, но их удерживал то ли страх, то ли уважение к КОМКОНу. Они привыкли уже действовать по сигналу, а сигнала не было. Саблин наблюдал.</p><p class="p">Лашкина подскочила к Аль-Гатуни, несколько раз ударила его в могучую неуязвимую грудь и, бешено визжа, выбежала на холод.</p><p class="p">— Вы нас простите, — сказал физик Баткин, чьи близнецы переминались в дверях. — Мы вас очень ждали. Очень волновались, — и хрипло закашлялся, словно залаял.</p><p class="p">— Да не очень и ждали, — сказала вдруг техник Семенова, ответственная за стерильность оборудования, не ученая, а обслуга Радуги, вечно ворчавшая на физиков, что разводят срач. Если б никто не работал, то и срача не было, и мир пришел бы к идеальному, с точки зрения Семеновой, состоянию. У Семеновой не было детей, и она действительно никого не ждала. Все на нее обернулись, и она поняла, что пришел ее час. Дальнейшее она говорила, подбоченясь. Горбовский, который сидел в углу и старался стать невидимым, впервые увидел на практике, что значит подбочениться: прежде он встречал этот жест только в книгах, даже в кино его никогда не снимали.</p><p class="p">— Не очень и ждали! — повторила Семенова. — Нигде не рады предателям.</p><p class="p">— Бог знает, Семенова, что вы такое говорите, — досадливо проворчал Мельников, но он уже почувствовал, что его затея зашла не туда.</p><p class="p">— А вы мне рот не затыкайте! — взвизгнула Семенова. — Вы тут поговорили уже вволю, вы тут уже такого натворили, что вот! — Она ткнула стальным пальцем в окно, за которым стемнело, но угадывался снег. — Мы вас уже послушали, уже мы вас не перебивали, и вот вы нам тут сделали! И я вам теперь скажу, что нам тут беглые без надобности! Вы сбежали при первых признаках, вы убежали куда подальше, и пока тут решалась судьба планеты, мы что-то вас не видели!</p><p class="p">— Прошу прощения, — негромко сказал Горбовский, вставая. — Никто никуда не сбегал, решение об отправке детей принял я единолично…</p><p class="p">— Мы единоличника тоже еще заслушаем! — заверещала Семенова. — Мы еще не знаем, может, это из-за вас все и вышло! Может, это вы звездолетом своим тута нам вызвали! — Она никогда прежде не говорила «тута», но архаика есть архаика и требует всего человека целиком.</p><p class="p">Горбовский не привык, чтобы его перебивали, и был совершенно сражен этой вспышкой. Когда он говорил, прислушивались даже в Мировом Совете, но здесь, на Радуге, Мировой Совет не имел больше силы, здесь скорей послушались бы Верховного Совета или даже Священного Синода. Он принял, как всегда, самое доброе решение и в ужасе опустился на стул, но тут же вскочил. В нем актуализировался звездолетчик. И когда Семенова, не слыша ничего вокруг себя, орала о предательстве и дезертирстве, Горбовский подошел к ней на длинных журавлиных ногах и с невесть откуда взявшейся силой оторвал корпулентную Семенову от лазуритового пола. Он легко взял ее под мышку и, виновато кивая, вынес на снег.</p><p class="p">— И мы спросим еще! — орала Семенова, понимая, в чем сила, брат, и не особенно брыкаясь. — Мы спросим еще, кто вовлек детей в дезертирство и сделал им предательство! Мы посмотрим еще, под чьим руководством…</p><p class="p">Крики за дверью затихли. Горбовский вернулся, брезгливо отряхиваясь.</p><p class="p">— Здрасьте, ребята, мы весьма рады и все это, — сказал он голосом папы Карло и одновременно папы Криса, и тут все вспомнили, что обоих играл Гринько. — Вы нас тоже должны понять. Среди нас есть люди, так сказать, слабоватые на голову, и многие из нас думали, что мы вообще вас не увидим больше, ну и естественно…</p><p class="p">После этих его слов всех словно прорвало. Родители кинулись к детям, дети — к родителям, и в актовом зале повис такой вой, с каким и в древних деревнях не провожали на войну. Это были хриплые мужские рыдания, отчаянный женский визг, детские причитания, и в этих причитаниях звучала накопившаяся за месяц невыносимая тоска и неверие в то, что когда-то они вернутся в изуродованное пространство, на изувеченную родину; и ненависть к Волне, которая все это устроила из ведомых только ей, нечеловеческих соображений; и ужас перед бездной, которая теперь между ними разверзалась, потому что никто из них не был прежним, и на их любовь легла тень вечной разлуки, о которой им теперь не дано будет забыть никогда. Они выли и называли друг друга самыми ласковыми прозвищами, не стесняясь посторонних. Они гладили друг друга по головам. Горбовский сидел, как истукан, улыбаясь застывшей улыбкой, потому что не имел права себе позволить никакой другой реакции; да и способность плакать, счастливую способность разразиться очистительными рыданиями, он после Волны утратил начисто. Другие могли, а он никак.</p><p class="p">Вокруг него раздавался отчаянный хор:</p><p class="p">— Маленькому зайчику на лесной опушке прежде глазки тешили яркие цветочки…</p><p class="p">— Ежик резиновый в шляпе малиновой…</p><p class="p">— Бедный ежик спать не может, сядет и сидит…</p><p class="p">— Маленькой елочке холодно зимой…</p><p class="p">— Белые кораблики, белые кораблики по небу плывут…</p><p class="p">Бог весть, откуда все это всплыло и как сохранилось. Правду сказать, в последние годы в мире Полдня мало сочиняли детского. Это был мир несентиментальный, детей тут воспитывали в готовности к радости, а особенно к работе, и детское творчество, как писали в специальной литературе, светилось мягким юмором. Этого мягкого юмора было очень много, он бил через край, это общество не было рассчитано на сентиментальных изгоев, и если ребенок плакал по ночам в интернате, скучая по дому, его немедленно и безропотно отпускали домой, но и сколько-нибудь престижное занятие ему не светило; Женя Вязаницына знала, на что обрекала своего Сереженьку, но ей нужен был хороший сын, а не хороший специалист. Женя Вязаницына тоже прилетела на Радугу, но в актовый зал не пошла, потому что хотела объясниться с Матвеем. Предстоял мучительный разговор, но откладывать его было бы мучительнее. Ужасно, сколько на Радуге стало мучительного, а до этого единственной проблемой был дефицит ульмотронов. Да гори они огнем, эти ульмотроны, что и случилось. Теперь на Радуге дружно плакали, ощущая ужасную вину и беспомощность друг перед другом и перед чем-то третьим, которое они предали. Они все были теперь предатели, это чувство в них было сильней всего, и Семенова лишь проорала вслух то, о чем думали все.</p><p class="p">И они плакали, пока не стали улыбаться, и продолжали друг друга гладить по головам. Этого Аль-Гатуни уже не вынес и вышел на снег курить. Здесь к нему присоединился Горбовский.</p><p class="p">— Самое ужасное, — сказал Аль-Гатуни, — что по-прежнему действительно никогда не будет. Они не станут друг к другу нормально относиться. Они сейчас прощаются. Я знаю совершенно точно, что уже завтра они начнут ссориться.</p></span>
