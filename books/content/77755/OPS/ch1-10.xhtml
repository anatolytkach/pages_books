<span><p class="p"><strong>Можарово </strong></p><p class="empty-line"/><p class="p"><em>Памяти Валерия Фрида</em></p><p class="p">— Значит, повторяю в последний раз, — сказал Кошмин, высокий сухой человек, больше похожий на следователя-важняка, чем на инспектора гуманитарки. — В Можарове стоянка пять минут. Этого им достаточно, чтобы отцепить вагон с гумпомощью. При первой же вашей попытке открыть двери или окна я буду действовать по инструкции. Потом не обижайтесь.</p><p class="p">Васильеву и так было страшно, да еще и за окном сгущалась июльская гроза: набухали лиловые тучи, чуть не касавшиеся густого сплошного ельника. Безлюдные серые деревеньки по сторонам дороги глядели мрачно: ни живности, ни людей, только на одном крыльце сидел бледный большеголовый мальчик и провожал поезд недобрым внимательным взглядом, в котором не было ничего детского. Иногда Васильев замечал такой взгляд у безнадежных сумасшедших, словно сознающих свое печальное состояние, но бессильных его изменить.</p><p class="p">— Да не буду я, — сказал Васильев с досадой. — Вы же еще в Москве пять раз предупреждали.</p><p class="p">— Всех предупреждали, — буркнул Кошмин, — а некоторые открывали…</p><p class="p">— Да у нас вон и окно не открывается.</p><p class="p">— А Горшенин, который перед вами ездил, бутылкой разбил окно, — мрачно напомнил Кошмин.</p><p class="p">— Ну, у нас и бутылки нет… И решетки вон снаружи…</p><p class="p">— В эту решетку свободно можно руку просунуть. Хлеба дать или что. И некоторые просовывали. Вы не видели, а я видел.</p><p class="p">Васильева бесило, что Кошмин столько всего видел, но ни о чем не рассказывал толком. Он терпеть не мог неясностей.</p><p class="p">— Вы лучше заранее скажите, Георгий Валентинович, — Васильеву было всего двадцать пять, и он обращался к инспектору уважительно. — Что это за сирены такие, перед которыми невозможно устоять? Честное слово, проще будет. Кто предупрежден, тот вооружен.</p><p class="p">— А чего вы такого не знаете? — настороженно глянул Кошмин. — Вам все сказано: на станции подойдут люди, будут проситься, чтоб впустили или там открыть окно, принять письмо для передачи, дать хлеба. Принимать ничего нельзя, открывать окна и двери не разрешается ни в коем случае. Можарово входит в перечень населенных пунктов, где выходить из поезда запрещается, что непонятного?</p><p class="p">— Да я знаю. Но вы хоть скажите, что там случилось. Зона зараженная или что.</p><p class="p">— Вас когда отправляли, лекцию читали? — спросил Кошмин.</p><p class="p">— Ну читали.</p><p class="p">— Перечень пунктов доводили?</p><p class="p">— Доводили.</p><p class="p">— И что вам непонятно? Какая зараженная зона? Обычная зона гуманитарной помощи в рамках национального проекта поддержки русской провинции. Все нормалдык. Но есть определенные правила, вы понимаете? Мы же не просто так, как баба на возу. Мы действуем в рамках госпроекта. Надо соблюдать. Если не будете соблюдать, я довожу о последствиях.</p><p class="p">— Понял, понял, — сказал Васильев. Он терпеть не мог, когда ему что-либо доводили. Это его доводило. Также он терпеть не мог слов «йок» и «нормалдык».</p><p class="p">— А почему тогда вообще не закрыть окна на это время? Жалюзи какие-нибудь спустить железные, ставни, я не знаю…</p><p class="p">— Ну как это, — поморщился Кошмин. — Едет же пресса вроде вас. Иностранные наблюдатели вон едут. Что, в глухом вагоне везти, как скотину? Вон в седьмом едет представитель фонда этого детского, Майерсон или как его. Он и так уже приставал, почему решетки. Ему не нравится из-за решетки глядеть. Он не знает, а я знаю. Он Бога должен молить, что решетки.</p><p class="p">Люди вроде Кошмина всегда были убеждены, что за их решетки все должны кланяться им в пояс, потому что иначе было бы еще хуже.</p><p class="p">— И потом, это же не везде так, — добавил он успокоительно. — Это одна такая зона у нас на пути, их и всего-то шесть, ну, семь… Проедем, а дальше до Урала нормально. Можно выходить, картошки там купить отварной, с укропом… пообщаетесь с населением, если хотите… Заповедник, природа… Все нормалдык! Зачем же ставни? Всего в двух пунктах надо соблюдать, Можарово и Крошино, а в остальное время ходите, пожалуйста, ничего не говорю…</p><p class="p">Васильев попытался вообразить, что делается в Можарове. Еще когда их группу — три телевизионщика в соседнем вагоне и он от «Ведомостей» — инструктировали перед отправкой первого гуманитарного поезда, пересекающего Россию по случаю нацпроекта, инструктор явно чего-то недоговаривал. К каждому журналисту был прикреплен человек от Минсельхоза с внешностью и манерами профессионального охранника — что за предосторожности во время обычной поездки? Оно, конечно, в последнее время ездить между городами стало опасно: вовсю потрошили электрички, нападали на товарняки… Ничего не поделаешь, тоже был нацпроект — приоритетное развитие семи мегаполисов, а между ними более или менее дикое поле, не надо нам столько земли… Кто мог — перебрался в города, а что делалось с остальными на огромном российском пространстве — Васильев представлял смутно. Но он был репортер, вдобавок с армейским опытом, и его отправили с первым гуманитарным — писать репортаж о том, как мегаполисы делятся от своих избытков с прочим пространством, где, по слухам, и с электричеством-то уже были перебои. Правда, о том, что на отдельных станциях нельзя будет даже носу высунуть на перрон, в Москве никто не предупреждал. Тогда симпатичная из «Вестей» точно бы не поехала — она и так все жаловалась, что в вагоне не предусмотрена ванна. Ванна была только в спецвагоне Майерсона, потому что он был филантроп и Бог знает какой миллиардер, Гейтс курит.</p><p class="p">За окном плыл безлюдный и ничем не примечательный, но именно поэтому особенно страшный пейзаж: все те же пустые серые деревни, иногда одинокая коза с красной тряпкой на шее, иногда тихий косарь, в одиночку выкашивавший овраг, — косарь тоже смотрел вслед поезду, нечасто он теперь видел поезда, и лица его Васильев не успевал разглядеть; мелькало поле с одиноко ржавевшим трактором — и опять тянулся угрюмый ельник, над которым клубилась лиловая туча. Быстро мелькнули остатки завода за полуразвалившимся бетонным забором, ржавые трубы, козловой кран; потянулось мелколесье, среди которого Васильев успел разглядеть бывшую воинскую часть за ржавой колючей проволокой, на которой так и остался висеть чей-то ватник, — небось мальчишки лазали за техникой… Поезд замедлял ход.</p><p class="p">— Что там хоть раньше-то было, в Можарове? — спросил Васильев, чтобы отвлечься от исподволь нараставшего ужаса. Он знал, что Минсельхоз просто так охранников не приставляет, — там работали теперь люди серьезные, покруче силовиков. — Может, промыслы какие?</p><p class="p">— Кирпичный завод, — нехотя ответил Кошмин после паузы. — Давно разорился, лет тридцать. Ну и по мелочи, обувная, мебельная фабрика… Театр кукол, что ли… Я тогда не был тут.</p><p class="p">— А сейчас есть что-то?</p><p class="p">— Если живут люди — значит, есть, — сказал Кошмин с таким раздражением, что Васильев почел за лучшее умолкнуть.</p><p class="p">— В общем, я вас предупредил, — проговорил Кошмин после паузы. — К окну лучше вообще не соваться. Если нервы слабые, давайте занавеску спущу. Но вообще-то вам как журналисту надо посмотреть. Только не рыпайтесь.</p><p class="p">— Ладно, ладно, — машинально сказал Васильев и уставился на медленно плывущую за окном станцию Можарово.</p><p class="p">Сначала ничего не было. Он ожидал чего угодно — монстров, уродов, бросающихся на решетку вагона, — но по перрону одиноко брела старуха с ведром и просительно заглядывала в окна.</p><p class="p">— Раков! — покрикивала она. — Вот раков кому! Свежие кому раки!</p><p class="p">Васильев очень любил раков и остро их захотел, но не шелохнулся. Старуха подошла и к их вагону, приблизила к стеклу доброе изможденное лицо, на котором Васильев, как ни вглядывался, не мог разглядеть ничего ужасного.</p><p class="p">— Раков! — повторила она ласково. — Ай кому надо раков?</p><p class="p">— Молчите, — сквозь зубы сказал Кошмин. Лицо его исказилось страданием — тем более ужасным, что, на взгляд Васильева, совершенно беспричинным. Не может быть, чтобы ему так сильно хотелось раков и теперь его раздирала борьба аппетита с инструкцией.</p><p class="p">Старуха отвернулась и тоскливо побрела дальше. Станция постепенно заполнялась людьми — вялыми, явно истощенными, двигавшимися замедленно, как в рапиде. К окну подошла молодая мать с ребенком на руках; ребенок был желтый, сморщенный, вялый, как тряпичная кукла.</p><p class="p">— Подайте чего-нибудь ради Христа, — сказала она тихо и жалобно. Несмотря на толстое стекло, Васильев слышал каждое ее слово. — Работы нет, мужа нет. Христа ради чего-нибудь.</p><p class="p">Васильев со стыдом посмотрел на дорожную снедь, которую не успел убрать. В гуманитарных поездах кормили прекрасно, Минсельхоз не жалел средств. На купейном столике разложены были колбаса двух сортов, голландский сыр, что называется, со слезой и паштет из гусиной печени с грецким орехом, так называемый страсбургский. Прятать еду было поздно — нищенка все видела. Васильев сидел весь красный.</p><p class="p">Вдоль поезда шла девочка с трогательным и ясным личиком, словно сошедшая с рождественской олеографии, на которых замерзающие девочки со спичками обязательно были ангелоподобны, розовы, словно до попадания на промерзшую улицу жили в благополучнейшей семье с сытными обедами и ежеутренними ваннами. Васильеву казалось даже, что он видел эту девочку на открытке, сохранившейся в семье с дореволюционных времен, — в этой открытке прапрапрадедушка поздравлял прапрапрабабушку с новым 1914 годом. Девочка подошла к окну, подняла глаза и доверчиво произнесла:</p><p class="p">— Мама болеет. Совсем болеет, не встать. Дяденьки, хоть чего-нибудь, а?</p><p class="p">Она просила не канюча, улыбаясь, словно не хотела давить на жалость и стыдилась своего положения.</p><p class="p">— А я песенку знаю, — сказала она. — Вот, песенку спою. Не прошла-а-а зима, снег еще-о-о лежит, но уже домо-о-ой ласточка спеши-и-ит… На ее пути горы и моря, ты лети, лети, ласточка моя-а-а…</p><p class="p">Васильев знал эту песню с детского сада и ребенком всегда плакал, когда ее слышал. Он посмотрел на Кошмина. Тот не сводил с него глаз, ловил каждое движение — не было никакой надежды обмануть его и хоть украдкой выбросить в окно деньги или упаковку колбасы; дай решетка…</p><p class="p">— Ну вот скажите мне, — ненавидя себя за робкую, заискивающую интонацию, выговорил Васильев, — вот объясните, что был бы за вред, если бы мы сейчас ей подали кусок хлеба или три рубля?</p><p class="p">— Кому — ей? — жестко переспросил Кошмин.</p><p class="p">— Ну вот этой, девочке…</p><p class="p">— Девочке? — снова переспросил Кошмин.</p><p class="p">Что он, оглох, что ли, подумал Васильев. Может, он вообще сумасшедший, псих проклятый, придали мне урода, а я теперь из-за него не могу ребенку дать еды.</p><p class="p">— Вы не видите, что ли?!</p><p class="p">— Вижу, — медленно сказал Кошмин. — Сидите смирно, или я не отвечаю.</p><p class="p">К окну между тем подошла еще одна старуха, маленькая, согбенная, очкастенькая, с личиком провинциальной учительницы. Дрожащей скрюченной лапкой она протянула к самому лицу Васильева маленькие вязаные тапочки, такие еще называют пинетками, собственные его пинетки до сих пор хранились дома, покойная бабушка связала их крючком. Если бы не дедушкина пенсия да не проживание в Москве, покойная бабушка на старости лет могла бы стоять точно так же.</p><p class="p">— Купите тапочки, — умоляюще сказала старушка. — Хорошие тапочки, чистая шерсть. Пожалуйста. Дитенку там или кому… Купите тапочки…</p><p class="p">Вот они, сирены Можарова. Вот к кому нам нельзя теперь выходить. От собственного народа мы отгородились стальными решетками, сидим, жрем страсбургский паштет. Васильев встал, но Кошмин как-то так ткнул его стальным пальцем в подреберье, что журналист согнулся и тут же рухнул на полку.</p><p class="p">— Предупреждал, — с отвратительным злорадством сказал Кошмин.</p><p class="p">— Предупреждал он, — сквозь зубы просипел Васильев. — Суки вы все, суки позорные… Что вы сделали…</p><p class="p">— Мы? — спросил Кошмин. — Мы ничего не сделали. Это вас надо спрашивать, что вы сделали.</p><p class="p">Парад несчастных за окном в это время продолжался: к самым решеткам приник пожилой, болезненно полноватый мужчина с добрым и растерянным лицом.</p><p class="p">— Господа, — лепетал он срывающимся голосом, — господа, ради Бога… Я не местный, я не как они… Поймите, я здесь случайно. Я случайно здесь, я не предполагал. Третий месяц не могу выбраться, господа, умоляю. Откройте на секунду, никого не впустим. Господа. Ведь нельзя же здесь оставлять… поймите… я интеллигентный человек, я такой же человек, как вы. Ведь невыносимо…</p><p class="p">Голос его становился все тише, перешел в шепот и наконец сорвался. Мужчина рыдал, Васильев мог бы поклясться, что он плакал беспомощно и безнадежно, как младенец, забытый в детском саду.</p><p class="p">— Я все понимаю, — снова начал он. — Я вас понимаю прекрасно. Но я вас умоляю, умоляю… я клянусь чем хотите… Вот! — внезапно осенило его, и из кармана мятого серого плаща он извлек какую-то обтерханную справку. — Тут все написано! Командировка, господа, командировка… умоляю… умоляю…</p><p class="p">Тут он посмотрел влево, и на лице его отобразился ужас. Кто-то страшный в водолазном костюме неумолимо подходил к нему, отцеплял от решетки вагона его судорожно сжатые пальцы и уводил, утаскивал за собой — то ли местный монстр, то ли страж порядка.</p><p class="p">— Ааа! — пронзительным заячьим криком заверещал пожилой, все еще оглядываясь в надежде, что из вагона придет помощь. — Спасите! Нет!</p><p class="p">— Это кто? — одними губами спросил Васильев.</p><p class="p">— Кто именно?</p><p class="p">— Этот… в водолазном костюме…</p><p class="p">— В каком костюме?</p><p class="p">— Ну, тот… который увел этого…</p><p class="p">— Милиция, наверное, — пожал плечами Кошмин. — Почему водолазный, обычная защита… Тут без защиты не очень погуляешь…</p><p class="p">Станция заполнялась народом. Прошло лишь пять минут, а вдоль всего перрона тащились, влачились, ползли убогие и увечные. В них не было ничего ужасного, ничего из дурного фантастического фильма — это были обычные старики, женщины и дети из советского фильма про войну, толпа, провожающая солдат и не надеющаяся дождаться их возвращения. Уйдут солдаты, придут немцы, никто не спасет. В каждом взгляде читалась беспокойная, робкая беспомощность больного, который живет в чужом доме на птичьих правах и боится быть в тягость. Такие люди страшатся обеспокоить чужого любой просьбой, потому что в ответ могут отнять последнее. На всех лицах читалось привычное кроткое унижение, во всех глазах светилась робкая мольба о милости, в которую никто толком не верил. Больше всего поразила Васильева одна девушка, совсем девчонка лет пятнадцати, — она подошла к вагону ближе других, опираясь на два грубо сработанных костыля. Эта ни о чем не просила, только смотрела с такой болью, что Васильев отшатнулся от окна — ее взгляд словно ударил его в лицо.</p><p class="p">— Что ж мне делать-то, а! — провыла она не с вопросительной, а с повелительной, надрывной интонацией, словно после этих ее слов Васильев должен был вскочить и мчаться на перрон, спасать всю эту измученную толпу. — Что ж делать-то, о Господи! Неужели ничего нельзя сделать, неужели так и будет все! Не может же быть, чтобы никакой пощады нигде! Что ж мы всем сделали?! Нельзя же, чтобы так с живыми людьми…</p><p class="p">Этого Васильев не мог выдержать. Он все-таки отслужил, вдобавок занимался альпинизмом, так что успел повалить Кошмина резким хуком слева, своим фирменным, — и выбежал в коридор, но там его уже караулил проводник. Проводник оказался очень профессиональный — в РЖД, как и в Минсельхозе, не зря ели свой страсбургский паштет. Васильев еще два дня потом не мог пошевелить правой рукой.</p><p class="p">— Нельзя, — шепотом сказал проводник, скрутив его и запихнув обратно в купе. — Нельзя, сказано. Это ж как на подводной лодке. Сами знать должны. Знаете, как на подводной лодке? — Странно было слышать этот увещевающий шепот от человека, который только что заломал Васильева с профессионализмом истинного спецназовца. — На подводной лодке, когда авария, все отсеки задраиваются. Представляете, стучат люди из соседнего отсека, ваши товарищи. И вы не можете их впустить, потому что устав. В уставе морском записано, что нельзя во время аварии открывать отсеки. Там люди гибнут, а вам не открыть. Вот и здесь так, только здесь не товарищи.</p><p class="p">— Мрази! — заорал Васильев, чумея от бессильной ненависти. — Мрази вы все! Кто вам не товарищи?! Старики и дети больные вам не товарищи?! Это что вы за страну сделали, стабилизаторы долбаные, что вы натворили, что боитесь к собственному народу выйти! Это же ваш, ваш народ, что ж вы попрятались от него за решетки! Хлеба кусок ему жалеете?! Рубль драный жалеете?! Ненавижу, ненавижу вас, ублюдков!</p><p class="p">— Покричи, покричи, — не то угрожающе, не то одобрительно сказал проводник. — Легче будет. Чего он нервный такой? — обратился он к Кошмину.</p><p class="p">— Журналист, — усмехнулся Кошмин.</p><p class="p">— А… Ну, пусть посмотрит, полезно. Тут, в Можарове, журналистов-то давно не было…</p><p class="p">— Что они там возятся с вагоном? — неодобрительно спросил Кошмин у проводника. Они разговаривали запросто, словно коллеги. — Давно отцепили бы, да мы бы дальше поехали…</p><p class="p">— Не могут они быстро-то, — сказал проводник. — Меньше двадцати минут не возятся.</p><p class="p">— Ослабели, — снова усмехнулся Кошмин.</p><p class="p">В этот момент поезд дрогнул и тронулся. Несколько девочек в выцветшем тряпье побежали за вагоном — впрочем, какое побежали, скорей поползли, шатаясь и сразу выдыхаясь; Васильев отвел взгляд.</p><p class="p">— Ну, извиняй, журналист, — сказал проводник, переводя дух. — Сам нам будешь благодарен.</p><p class="p">— Ага, — сказал Васильев, потирая плечо. — За все вам благодарны, всю жизнь. Скажи спасибо, что не до смерти, что не в глаз, что не в рот… Спасибо, век не забуду. Есть такой рассказ — вы-то не читали, но я вам своими словами, для общего развития… Называется «Ушедшие из Омеласа». Имя автора вам все равно ничего не скажет, так что пропустим. Короче, есть процветающий город Омелас. И все в нем счастливы. И сплошная благодать с народными гуляниями…</p><p class="p">— А в жалком подвале за вечно запертой дверью, — невозмутимо вступил Кошмин, — сидит мальчик-олигофрен, обгаженный и голодный. Он лепечет: выпустите, выпустите меня. И если его выпустить, весь город Омелас с его процветанием полетит к чертям собачьим. Правильно? Причем ребенок даже не сознает своего положения, и вдобавок он недоразвитый. Даун он, можно сказать. Слезинка ребенка. Читали. Урсула Ле Гуин. Наше ведомство начитанное.</p><p class="p">— Какое ведомство? — спросил оторопевший Васильев.</p><p class="p">— Минсельхоз, — сказал Кошмин и подмигнул проводнику. Тот жизнерадостно оскалился в ответ.</p><p class="p">— Но если вы все это читали… — упавшим голосом начал Васильев.</p><p class="p">— Слушай, журналист, — Кошмин наклонился к нему через столик. — Ты думать можешь мало-мало или вообще уже все мозги отшибло? Ты хорошо их слышал?</p><p class="p">— Кого — их?</p><p class="p">— Ну голоса их, я не знаю, кого там ты слышал. Хорошо слышал?</p><p class="p">— Ну, — кивнул Васильев, не понимая, куда клонит инструктор.</p><p class="p">— А ведь стекло толстое. Очень толстое стекло, журналист. А ты их слышал, как будто они рядом стояли, — нет? И видел ровно то, что могло на тебя сильней всего надавить, так? Зуб даю, что-нибудь из детства.</p><p class="p">— А вы? — пролепетал потрясенный Васильев. — Вы что видели?</p><p class="p">— Что я видел, того тебе знать не надо! — рявкнул Кошмин. — Мало ли что я видел! Тут каждый видит свое, умеют они так! Интересно послушать потом, да только рассказывать чаще всего некому. Тут щелку в вагоне приоткроешь — и такое…</p><p class="p">— Ладно, — устало сказал Васильев. Он все понял. — Кому другому вкручивайте. Ведомство ваше, Минсельхоз, Минпсихоз или как вы там называетесь, — вы хорошо мозги парите, это я в курсе. И фантастику читали, вижу. Но дураков нет вам верить, понятно? Уже и телевизор ваш никто не смотрит, про шпионов в школах и вредителей в шахтах. И про призраков в Можарове, которых я один вижу, — не надо мне тут, ладно? Не надо! Я и так ничего не напишу, да если б и написал — не пропустите.</p><p class="p">— Вот клоун, а? — усмехнулся проводник, но тут же схватился за рацию. — Восьмой слушает!</p><p class="p">Лицо его посерело, он обмяк и тяжело сел на полку.</p><p class="p">— В двенадцатом открыли, — еле слышно сказал он Кошмину.</p><p class="p">— Корреспонденты? — спросил Кошмин, вскакивая.</p><p class="p">— Телевизионщики. Кретины.</p><p class="p">— И что, все? С концами?</p><p class="p">— Ну а ты как думал? Бывает не все?</p><p class="p">— Вот дура! — яростно прошептал Кошмин. — Я по роже ее видел, что дура. Никогда таких брать нельзя.</p><p class="p">— Ладно, о покойнице-то, — укоризненно сказал проводник.</p><p class="p">Васильев еще не понимал, что покойницей называют симпатичную из «Вестей». До него все доходило как сквозь вату.</p><p class="p">— Нечего тут бабам делать, — повторял Кошмин. — В жизни больше не возьму. Что теперь с начпоездом в Москве сделают, это ужас…</p><p class="p">— Ладно, пошли, — сказал проводник. — Оформить надо, убрать там…</p><p class="p">Они вышли из купе, Васильев увязался за ними.</p><p class="p">— Сиди! — обернулся Кошмин.</p><p class="p">— Да ладно, пусть посмотрит. Может, поймет чего, — заступился проводник.</p><p class="p">— Ну иди, — пожал плечом инструктор.</p><p class="p">Они прошли через салон-вагон перепуганного Майерсона. “Sorry, a little incident”, — на безукоризненном английском бросил Кошмин. Майерсон что-то лепетал про оговоренные условия личной безопасности. Пять вагонов, которые предстояло насквозь пройти до двенадцатого, показались Васильеву бесконечно длинным экспрессом. Мельком он взглядывал в окно, за которым тянулись все те же серые деревни; лиловая туча, так и не проливаясь, висела над ними.</p><p class="p">В тамбуре двенадцатого вагона уже стояли три других проводника. Они расступились перед Кошминым. Васильев заглянул в коридор.</p><p class="p">Половина окон была выбита, дверцы купе проломаны, перегородки смяты, словно в вагоне резвился, насытившись, неумолимый и страшно сильный великан. Крыша вагона слегка выгнулась вверх, словно его надували изнутри. Уцелевшие стекла были залиты кровью, клочья одежды валялись по всему коридору, обглоданная берцовая кость виднелась в ближайшем купе. Странный запах стоял в вагоне, примешиваясь к отвратительному запаху крови, — гнилостный, застарелый: так пахнет в пустой избе, где давным-давно гниют сальные тряпки да хозяйничают мыши.</p><p class="p">— Три минуты, — сказал один из проводников. — Три минуты всего.</p><p class="p">— Чем же они ее так… купили? — произнес второй, помладше.</p><p class="p">— Не узнаешь теперь, — пожал плечами первый. — Не расскажет.</p><p class="p">— Иди к себе, — обернулся Кошмин к Васильеву. — Покури пойди, а то лица на тебе нет. Ничего, теперь только Крошино проехать, а потом все нормалдык.</p></span>
