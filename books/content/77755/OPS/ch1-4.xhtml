<span><p class="p">Бывшего слепого звали Тимоти Сойер, он был тувинец по матери и совершенно не соответствовал своей хулиганской фамилии, даже в молодости. Подлинный его характер обнаружился лишь после аварии, которая его изуродовала. Он был классный теоретик и шахматист, игравший вслепую, и его не отправили домой, потому что в работе он был по-прежнему бесценен, — на Радуге никого не стали бы держать из жалости, и Сойер сам бы ни на что подобное не согласился. В самой космополитической среде тувинцы опознавались мгновенно, и, хотя они никогда не стремились вступать в брак исключительно со своими — еще чего! — дети опять получались тувинцами, и сам Буян был сыном смуглой узкоглазой матери, лыжницы из Турана, и бородатого рослого канадца. От канадца в нем была страсть к рыбалке, рост и терпимость-переносимость к любому холоду, а лыжи любили оба родителя, и отпуска он проводил на Чогори, где был теперь лучший лыжный курорт восточного полушария. Здоровья он был стального, но и мнительности истинно дикарской, туземной: соблюдал сотни примет, подмечал и тщательно исцелял малейшую неполадку в организме (средства применял варварские, древние: олений жир, пихтовый настой, нашел на Радуге целебную невкусную сухую ягоду Карину — назвал так в честь первой возлюбленной, тоже кисловатой); всегда боялся слепоты и от одного старого тувинца слышал, что после смерти слепые прозревают, то есть душа опять все видит. И как он с отрочества догадывался, что ослепнет, — так и все два года с той аварии знал, что прозреет, только после другой аварии. Масштабов ее он, конечно, не предполагал.</p><p class="p">— Клин клином, — сказал ему Маляев.</p><p class="p">— Не то, — возразил Сойер, но объяснять не стал.</p><p class="p">У врачей не было никакого объяснения. На Радуге теперь работал большой меддесант, прибывший после первого рапорта Пишты. Еще на первом сеансе связи, когда на вопрос «Есть живые?» он ответил крайне расплывчато — «Да почти все, но лучше вам на месте», — на Земле поняли, что лучше не расспрашивать. Возьмем аварию в Копейске, когда после эксперимента с Д-плазмой не осталось, собственно, никакого Копейска (единственная вина города заключалась в главной, как тогда казалось, его удаче — гигантских залежах синдерита, о свойствах которого до Генкина вообще никто не догадывался). В Копейске построили комбинат, о Третьей энергетической революции штамповали блокбастеры и кропали оперы, и тут жахнуло, причем виновных установить не удалось, поскольку датчики тотально расплавились, а люди не могли дать показаний. Как? — да вот так и не могли, и все попытки вывезти их для разбирательства заканчивались трагически, поскольку нормально функционировали все выжившие только в Копейске. В любом другом городе, хотя бы и в крупнейшем медицинском центре, они начинали стремительно чахнуть, как Незнайка на Луне, н не то что давать показания, а и до уборной добраться не могли. Зато в Копейске к ним немедленно возвращались силы, да и не просто возвращались, а удесятерялись, и любовь к родному краю принимала несколько патологический оттенок. Это называли в специальной литературе «синдром Антея», хотя правильней было бы, наверное, — «синдром Незнайки», но в те времена считалось, что людей, особенно натерпевшихся, надо любой ценой оберегать от новых травм. Вот так всегда, говорил Лемхин, ты делаешь Третью энергетическую революцию, а после первой же неудачи получаешь взрыв местнического восторга; откапываешь синдерит, который сделает из непригляднейшей местности новую Синдереллу, а получаешь патриотит (который в этой истории вообще был ни при чем — это был безоговорочно полезный минерал, огромные запасы которого нашлись на Ганимеде, и назывался он в честь Патриашвили, первым додумавшегося применять его от панкреатита). Поэтому в Копейске пришлось разбираться на месте — синдром Антея сопровождался не только болезненной зависимостью от территории, но и полной неспособностью фигурантов поучаствовать в установлении истины. Все они фанатически покрывали друг друга, выгораживали начальство и не допускали даже мысли о трезвом расследовании, и, несмотря на серьезные масштабы разрушений, дело как-то забылось, поскольку и жертв в обычном смысле не было; а Третью энергетическую без всякого синдерита сделали в Пхеньяне на обычном атмосферном азоте. Не копать надо было, сказал Атос, а воздухом дышать; ничего хорошего выкопать нельзя, а вот выдохнуть запросто.</p><p class="p">И вот теперь Сойера осматривали на месте, но объяснить ничего не могли, потому что у него в буквальном смысле выросли новые глаза. Выращивать глаза научились очень прилично, были даже мнения, что земная медицина шагнула дальше космологии, и это понятно — жить хотят все, а космос интересен в лучшем случае десяткам. Но у Сойера был фатально поврежден зрительный нерв, а с этим до сих пор справлялись очень плохо. Теперь он видел почти идеально — правда, несколько близоруко, но это как раз было признаком нормальности. Представим себе яблоко, синтезированное алхимиком. Если бы это было идеальное яблоко, было бы скучно; но если оно с червем, то это подлинное чудо.</p><p class="p">— Как вы сами объясняете? — спросил его доктор Кха, чье подлинное монгольское имя было практически непроизносимо.</p><p class="p">— Да нормально же, — просто сказал Тимоти. Он был скуп на жесты, а то развел бы руками. — После смерти же тоже, я рассказывал… у нас верят так…</p><p class="p">— У нас тоже так верят, — терпеливо ответил Кха. — Но вы же не умерли.</p><p class="p">— Это как сказать.</p><p class="p">— Сказать объективно, сказать научно, без суеверий. Мой отец добился моей матери тем, что пообещал умереть от любви, если она откажет. Но, как видите, не умер и даже зачал семерых балбесов бол бола больше.</p><p class="p">— Но так ведь она же согласилась, — сказал Сойер. У него теперь почти всегда было хорошее настроение. Он этого стыдился, поскольку купил исцеление слишком дорогой ценой. — Если бы отказала, то никто же не знает.</p><p class="p">— Энэ бол үндэслэлтэй, — согласился доктор Кха. — Разве что, может быть, очень сильный шок, сверхшок…</p><p class="p">— Это не был шок, — сокрушенно сказал Сойер, искренне хотевший послужить медицине, но совершенно неспособный соврать. — Это было наоборот, как подтверждение самого ужасного, о котором всегда догадываешься. Есть такое правило семи тысяч метров, знаете?</p><p class="p">— Никогда не слышал, — признался Кха, отличавшийся в свои шестьдесят страстным любопытством. Он изучал сейчас цветную металлургию, а в планах у него были подводные рельефы.</p><p class="p">— Это альпинистский такой термин. Вы в горы не ходили?</p><p class="p">— Нет. Харам салтай.</p><p class="p">— Ничего, успеется. Вот на семи тысячах бывает такой синдром, что все зря. Зря полез, зря идешь… Ну правда же, какой смысл? Потом, когда семь пятьсот, бывает эйфория. Вроде горной болезни. Она долго потом, до восьми, а у некоторых и на спуске сохраняется. Но сначала надо преодолеть семь. Это очень ужасное ощущение, даже кажется, что и рождаться не надо было. Я каждый раз тяжело переживал, хуже похмелья. Я поэтому и не пью совсем, что похмелье очень ужасное.</p><p class="p">— Да-да, — сказал Кха. — Это и у нас тоже.</p><p class="p">— В смысле у врачей? — не понял Сойер.</p><p class="p">— У степняков. Так что про семь тысяч?</p><p class="p">— Вот это было как семь тысяч, — сказал Сойер. — Только в десятой степени.

    <strong>8.</strong></p><p class="p">Почти везде, где жили когда-то люди, живут собаки. Обычно при переездах их берут с собой, но бывают такие обстоятельства, что люди переезжают в особые области, в которых собакам нет места; или люди перемещаются так быстро, что не успевают их прихватить; или с людьми происходит такое, что они перестают замечать своих собак, и собаки обычно с этим смиряются, хотя им, конечно, невесело. По улицам Поселка тоже бегала собака, принадлежавшая когда-то технику Аронсону, но судьба техника Аронсона была еще не выяснена. Собака была умная, знала, где лежит корм, и сама брала столько, сколько было нужно. Врут, что собаки не знают меры и сытости. Это они при хозяевах не знают, а когда надо решать самим, все они понимают прекрасно. Техник Аронсон был лодочник и рыбак, любил выходить в океан на ярко-красной моторке под названием «Нимфа» — он был человек одинокий, не слишком приспособленный к жизни с женщиной, на Радугу завербовался после развода и, как все одинокие люди, мечтал о прекрасных небывалых женщинах и лодкам давал соответствующие имена.</p><p class="p">Собака же никакого имени не имела, называлась просто Собакой или Псиной, или иногда, в честь реки, Псоу, — поскольку представляла собой не идеал, а обычную собаку, приблудившуюся к Аронсону еще на Земле. Он взял ее с собой, на Радуге домашних животных было не много, а если они и были, то не показывались, потому что и домов этих никто толком не видел: великие мечтатели обычно не наблюдательны, хорошо хоть зерноедок замечали.</p><p class="p">Аронсон не успел взять собаку в шахту, или куда он там делся, — по крайней мере, на «Стреле» его не видели; наверное, он потому и остался, что не хотел улетать без собаки, а забрать ее из поселка не успевал и в обычной своей манере подумал — да мало ли! И, как мы увидим из дальнейшего, не ошибся.</p><p class="p">Теперь собака была предоставлена сама себе и, не будучи сосредоточена на Аронсоне, его мыслях и настроениях, видела и понимала много интересного. Если бы в составе комиссии был хоть один грамотный ксенопсихолог или, на худой конец, кинолог, он мог бы расспросить собаку и не поверить ее показаниям, но кто же в такие комиссии включает кинолога? Последний понимающий кинолог сидел на планете Надежда, осматривая очень интересные, но никому не нужные карусели.</p><p class="p">Теперь собака — как всякая собака, у которой не завелся человек, — вся превратилась в слух, нюх и живейший интерес. Человек самонадеянно полагает, что он друг собаки и что ей без него крышка. Собака — дикое животное, куда тесней связанное с дикой природой, чем кошка, но, в отличие от кошки, умеет это скрывать. Человек дает собаке кров, пищу, работу и приятное чувство неодиночества — примерно как утомительный любовник. К нему привыкаешь, его страшно потерять, но когда вдруг прыгаешь в это новое состояние, как в холодную воду, — оказывается, что бояться было нечего, что вокруг масса интересного, что стоило освободиться от уютной и, в общем, скучной зависимости, как вокруг открывается масса авантюрных возможностей. Считается, что каждый человек похож на свою собаку и бессознательно выбирает ее по этому признаку, — и это, может быть, верно: собака была похожа на Аронсона. Он, пока не развелся, очень боялся потерять жену, а стоило развестись — и сразу оказалось, что можно делать массу прекрасных вещей, улететь на Радугу, например. Он иногда скучал по жене и особенно по дочке, но сразу отвлекался на какое-нибудь интересное наблюдение или таинственное предчувствие.</p><p class="p">Собака Аронсона таскалась теперь по окрестностям, прислушиваясь то радостно, то испуганно. Всякая собака, вбегая на новую территорию, прежде всего ощущает, кем она населена; это сложное чувство, не вполне осознанное. Так инженер, держа в руках конструкцию, понимает, что внутри там — у ей внутре — находится разомкнутая цепь; но спроси его, откуда он это знает, — и он ответит, как матрос, учуявший трактир: не знаю, капитан, ничего более, как голос сердца. Собака чуяла, что вокруг долго еще не будет хорошо, а прежде было ничего, иногда просто прекрасно. Люди были весело раздражены и в целом поглощены приятным делом, им было интересно. Потом весь день было ужасно, страшно, очень чудовищно — совершенный брым-брум-ган, говоря по-собачьи. Но дальше стало хуже, потому что к страху прибавилась невыносимая скука, скука снега, и не того, какой бывал на Земле, а больного. Когда люди попрятались, а частью улетели, и особенно когда не стало слышно детей, шумевших очень утомительно и приятно, — сквозь тоску и страх начала проступать смутная надежда: люди, казалось, ждали спасителей, спасателей, которые вместе со спасением принесут ужасный разнос — такого разноса собака удостаивалась иногда, когда просыпалась ночью и начинала лаять, ей снилось то, что она теперь ясно слышала, но тогда это являлось только во сне и очень ее напрягало.</p><p class="p">Так вот, помимо этого очень людского ощущения подступающего спасения и разноса в недрах Радуги шевелилось нечто, чрезвычайно озлобленное и испуганное, чрезвычайно неприятное, но в его шевелениях слышалась, страшно сказать, злобная радость. Конечно, все произошедшее было ужасно, а вместе с тем это ужасное как бы полностью укладывалось в слова «мы говорили». В недрах Радуги жило что-то такое, что один раз тоже попробовало и больше не захотело, и потому ушло в недра. Оно понимало бесконечно больше, чем люди, оно знало, что никогда ничего не получится. Оно сидело там глубоко и ужасно разозлилось, когда прилетели люди и развернули тут свои эксперименты. Оно сидело и ждало, пока на людей обрушится то самое, что уже давно, в незапамятные времена когда-то обрушилось на них. И когда люди доигрались, в глубине Радуги наступило хоть и скорбное, а ликование. С таким примерно чувством на Землю из межпланетного отпуска возвращается хорошо поохотившийся или позагоравший патриот, уже истосковавшийся несколько по родным улицам с их зеленым шумом, — но прилетает он как раз в разгар ужасного серого дождя, и все вокруг глядят на него без малейшей радости, словно ничуть не соскучились. И тогда, садясь в птерокар или что там к нему ближе, он оглядывает окрестный пейзаж с мрачной радостью: вот, так сказать, плюхнули мы в родную стихию. Ужасно. А все-таки есть в этом и тайная гордость: вот где живем, и ничего, не жалуемся.</p><p class="p">У Радуги не было луны, и повыть было не на что, и тем не менее собака выла — но не на воображаемую луну и даже не на серебристые облака, которые стали вдруг появляться над планетой после катастрофы. Бог их знает, что это были за облака, — то ли ядовитые, то ли просто совершенно бессмысленные, но, в общем, ничего хорошего. Собака выла не на них, а на Хозяев. Хозяева были тут, никуда не делись, Хозяева были тут всегда. Они были до местных, ныне подземных, и после них. Хозяева никогда не были довольны. Собака не имела к ним отношения, они не обращали на нее внимания, и это было самым невыносимым. Местных собака еще не видела, но знала, что в конце концов они вылезут. Она чувствовала, что и местные бывают разные, у них какие-то свои расслоения, но думать об этом было не очень интересно. Был сериал, в котором выжившие пассажиры разбившегося лайнера попали на необитаемый остров: там из одной дыры в острове шел черный дым, а из другой белый дым, и это было увлекательно, но потом оказалось, что там еще куча всяких дымов и страшное количество сложных местных, и пассажиры все не просто так собрались в самолете, и, короче, к третьему сезону стало неинтересно, и даже НЕИНТЕРЕСНО. Вообще в мире слишком много всего, а если бы меньше — наверняка прорисовалась бы и динамика, и даже какой-то смысл. Собака знала, что если пахнет всем и сразу, — это скучное место. Теперь на Радуге пахло очень немногим, и она принюхивалась с любопытством, со страстным наслаждением.</p><p class="p">Но эти Хозяева, которых она ощущала всей шкурой, были настолько ужасны, что хуже любой катастрофы, и о них она старалась не думать. Только иногда, когда на рассвете облака становились красными, — она, казалось, что-то про них понимала, и тогда выла, и дрожала, и в отчаянии поджимала хвост.</p><p class="p">Но, к счастью, это чувство быстро проходило, и тогда можно было ненадолго заснуть, ткнувшись носом в порог. Спала она чутко — в любой момент мог вернуться Аронсон. Если он не сделает ужасной ошибки, то, конечно, появится. Ужасной ошибкой в воздухе тоже пахло, но собака этот вариант отметала. Как-никак она третий год знала своего Аронсона.

    <strong>9.</strong></p><p class="p">На стене клуба «Интеграл» при Управлении (все клубы при управлениях традиционно назывались «Интеграл», и многие находили это забавным) кто-то написал перед уходом в шахты древнее четверостишие, от которого Волна оставила всего несколько слов — остальное стерлось, посеклось и как бы вдавилось в стену, так что проступало теперь словно из глубины веков: каждый… постель… окна… метель… идет… Вероятно, это было что-то любовное. Это было тревожно и таинственно. Мы в постели, а кто-то идет. Горбовский никаких таких стихов не знал.</p><p class="p">Перси сидел напротив и смотрел печальными собачьими глазами.</p><p class="p">— Ноги моей больше не будет на «Тариэле», — повторил он.</p><p class="p">— Что же, Перси, — сказал Горбовский, — прекрасно вас понимаю. И даже не стану отговаривать. Мне давно уже казалось — капитан, вы знаете, должен быть в курсе настроений команды, — что мы вам здорово надоели. Мы вам уже на Владиславе надоели.</p><p class="p">— Если бы только вы! — сказал Перси.</p><p class="p">— Это тоже понятно, — кивнул Горбовский. — На Владиславе вообще все было глупо и молодо, но тогда все мы, если угодно, были стажеры.</p><p class="p">— Это «Возвращение», — напомнил Перси.</p><p class="p">— Я помню. Я в широком смысле.</p><p class="p">Повисло грустное молчание.</p><p class="p">— Помню, я всегда думал, как будет выглядеть наш последний рейс вместе, — признался Горбовский. — Ну, всегда же думаешь. Я никогда бы не представил даже, что это будет рейс на Радугу. Но всегда догадывался, что последний рейс надо бы туда, откуда не возвращаются. Или, иначе, туда, где хочется остаться. Вот вы придумали что-то такое. Но у меня сильное подозрение, что это все-таки зря. Вспомните, не было ни одного удачного опыта.</p><p class="p">— Это тогда, — упрямо сказал Перси. — Теперь произошло нечто вроде жертвы, и можно предполагать, что она принята.</p><p class="p">— Да ну на фиг. Что за глупости. Такое чувство, что вся планета провалилась в совершенно неприличную архаику. Жертвы, принятие…</p><p class="p">— Это тоже может быть, но вероятнее другое. Вероятнее, что этого только и не хватало для полноценного запуска. Может быть, как раз сегодня Радуга — идеальное место для нуль-Т.</p><p class="p">— Ну да, ну да, — безропотно согласился Горбовский. — В рассуждении того, что сегодня отсюда действительно очень хочется транспортироваться. Мы же знаем — сильное желание уже половина успеха.</p><p class="p">Он часто теперь цитировал школьные истины, желая показать то ли их совершенную справедливость, то ли полную бесполезность. Радуга стала очень неуютным местом, крайне неуютным; как все места, где было когда-то очень хорошо, а теперь вообще не осталось ничего хорошего. И силы, в руках которых она теперь находилась, были безлики и неназываемы.</p><p class="p">— По крайней мере, стартовое ускорение будет колоссальное, — заявил Перси, словно это было его личной заслугой. — Вы же не считаете меня пошляком, способным на самоубийство?</p><p class="p">— Боже упаси, — искренне сказал Горбовский. — Какое самоубийство, о чем вы. Из всей Радуги на самоубийство в очень отдаленной перспективе способен только Камил, и то потому, мне кажется, что он уже, в сущности, на это и решился со своей Дюжиной. Но у него вышло недостаточно. Остальные получили то, что хотели, и построили себе прекрасную новую жизнь. А он хотел совсем другого и с тех пор все ищет случая, который бы его убил. Со временем, возможно, он просто примотает себя к дереву, обольется бензином и вынет зажигалку. И самое обидное, что зажигалка у него не сработает.</p><p class="p">Они посмеялись, причем довольно весело. Им представился примотанный к дереву Камилл. Они его недолюбливали, как всегда недолюбливают современники любого коллегу, которому всего мало.</p><p class="p">— У Ламондуа, — деловито сказал Перси, — было два вида установок. Одни — которые он испытывал, это я понял сразу, да мне и рассказали кое-что. Ну и Валькенштейн кое-что узнал от Постышевой, она все-таки стояла близко к Патрику… Но были другие, вполне законченные. На ином принципе, которого я совсем не понимаю, — я все-таки физиолог, а не физик. Эти вторые он испытывать не давал, потому что это было бы не просто разочарование — это было бы сворачивание всей работы. А он совершенно не хотел, чтобы закрыли Радугу. Про эти установки даже Габа толком не знал.</p><p class="p">— Почему «даже Габа»? — насторожился Горбовский. Он о чем-то таком догадывался, но вслух ни с кем не делился.</p><p class="p">— Потому что Габа — глава отряда испытателей, — пожал плечами Диксон.</p><p class="p">— Не только.</p><p class="p">— В смысле «не только»?</p><p class="p">— В смысле куратор, — уточнил Горбовский. — Мне кажется, что он слал на Землю отчеты о результатах. Можно предположить, что он жаловался на бездействие, ему действительно неуютно было простаивать. А можно допустить другое.</p><p class="p">— Не надо допускать другое, — брюзгливо сказал Перси. — Всегда вы допускаете другое, а потом оно происходит.</p><p class="p">— И вы, значит, — невозмутимо продолжал Горбовский, — решили стартовать на этих штуках второго типа?</p><p class="p">— Да, мне показалось, что кто-то должен это сделать. И лучше пусть это буду я, по мне особо плакать некому.</p><p class="p">— Да по всем нам особо плакать некому, кроме Валькенштейна. И то в последнее время.</p><p class="p">— Просто, понимаете, — после очередной паузы сказал Перси, — мне представляется, что Радуга должна исполнить свое предназначение. Иначе некрасиво. Кто-нибудь должен отсюда стартовать на установке нуль-Т. А больше сейчас все равно никто не решится.</p><p class="p">— Очень соблазнительно у вас получается, — сказал Горбовский. — Просто хочется полететь с вами.</p><p class="p">— Увы, увы, — сокрушенно ответил Перси. — Там уцелела только одна такая установка. Они знаете, где стояли? Под столовой. Там уж точно никто не стал бы искать.</p><p class="p">— Ну да, конечно. Сытость расслабляет. А как они хоть выглядят?</p><p class="p">— Да вы увидите, — успокоил его Перси. — Вы же пойдете меня провожать?</p><p class="p">— Конечно, конечно.</p><p class="p">— Выглядят они как такие кресла, стоящие в будках. Будка прозрачная, вроде древнего автомата. Набирается код и улетается.</p><p class="p">— Ничего не выйдет, — с облегчением сказал Горбовский. — Вы еще романтик, Перси. Еще стажер. Но чтобы вас отсюда отправить, там вас должен кто-то принять. Иначе информация о вас размажется по Вселенной и вы станете богом. Не так уж трудно стать богом, Перси. Согласно определению, кажется, Николая Кузанского — я никогда толком не знал космогонию, — вы станете сферой, центр которой везде, а граница нигде. Вы и так уже почти сфера, то есть вы достигли определенной сферичности, определенного совершенства… Ориген, кажется, говорил, что праведники воскреснут в сферических телах…</p><p class="p">— Смейтесь, смейтесь, — сказал Перси, не обидевшись. — А если я вам скажу одну штуку, одну такую штуку, которая вас удивит?</p><p class="p">— Даже не знаю, что это может быть. Разве что признание, что вы уже летали и вернулись.</p><p class="p">Горбовский иногда видел себя со стороны, это было одно из любимых его упражнений — вдруг взглянуть на себя вне контекста. И сейчас ему очень не понравилось это зрелище: он сидел на окраине доступной Вселенной с одним из лучших друзей, человеком исключительной надежности, и всерьез обсуждал план его исчезновения. В далеком — столь далеком, что почти уже позабытом, — детстве бывал с ним такой эпизод (такой эпизод, как показывает практика, бывал почти в любом детстве). Бродя по окраинам поселка, где они жили с матерью, — научного поселка, каких множество было тогда в Приуралье, — он уперся в полуразрушенную лабораторию, дверь которой, однако, была заперта. Дверь заперта, а стены полуобрушены, вот что он очень хорошо запомнил. И помнил также, что влезать через пролом в стене показалось ему очень неправильным, надо было войти через дверь; и он решил совершить нечто заведомо глупое, но голова у него была пустая и звонкая, он недавно болел, ему было всего одиннадцать лет, и потому эта глупость извинительна. Он решил открыть дверь своим ключом, нормальным ключом, какие все еще применялись, — потому что магнитные иногда сбоили, как-никак в первое время после Полуночи в Приуралье творились не очень хорошие дела и потому на каждом шагу была аномалия. У него был, конечно, магнитный, но был и обычный, древнего образца, с бородкой; и он стал вставлять этот ключ в заржавленную скважину, и ключ, естественно, не вставлялся, и он его перевернул! перевернул! — и ключ вошел как по маслу и легко повернулся против часовой стрелки. Еще бы чего не хватало, по часовой. Только против, конечно, потому что это было против всяких правил. И одиннадцатилетний Горбовский вошел в это пространство, пахнущее не сыростью, запустением или ржавчиной, а чем-то химическим, чем-то до сих пор грозным и актуальным. Выглядело все как в «Сталкере», а пахло живым и опасным. Был зимний вечер, мать задерживалась на работе, она вообще работала очень много, и Горбовский с детства умел играть один и путешествовать по таким вот местам, каких полно было в то время, — ведь прежде чем все закончилось довольно-таки катастрофически, как и предсказывали банально мыслящие люди, небанально мыслящие люди успели воспользоваться моментом и далеко продвинуть науку. Они прекрасно понимали, что другого такого шанса не будет, что если контракт на работу находится у дьявола, и этот дьявол находится среди людей, то и черт с ним, черт его побери, — надо торопиться и просунуть нос как можно дальше. Блистательные эксперименты шли по всей Восточной Сибири, а кое-где и по Западной, где была тогда такая роскошная цветная металлургия, далеко не сводящаяся к мирному алюминию; сколько было таких запреток и лабораторий! Сколько интересных мутантов, которых — Горбовский все детство в это играл — далеко не сразу распознает вдумчивый испытатель природы! Это он так себе придумал, чтобы интересней было учиться и гулять: отличать, кто мутант. И он сказал однажды матери: мама, а ведь завраспределителем, ну этим, мясным, — мутант, я просто чувствую! Мать подняла его на смех, а три недели спустя, когда они по карточкам получали любимую любительскую колбасу, эта Рая вдруг сначала заговорила мужским басом, потом пошатнулась, а потом зеленой лужей растеклась по полу, и Горбовский с тех пор смотреть не мог на эту колбасу, которую так про себя и называл — Райской.</p><p class="p">И вот он, открыв своим ключом потаенную, ему одному предназначенную лабораторию, бледно-синим зимним вечером, когда все небо покрыто было как бы морозным налетом, зашел туда. В центре небольшого прямоугольного помещения мигал лампочками — причем никакие провода не были подведены к полуразрушенному зданию, он это помнил прекрасно, так что были это, видимо, подземные коммуникации — прибор, явно генерировавший все вокруг. То есть лес, овраг, окраина — все производилось непосредственно им, но с огромным трудом и неохотой, под грузом усталости, разочарования и всеобщей неблагодарности. Как, должно быть, уютно и радостно тут было, когда это все работало! Но теперь он работал тут один, и весь его расчет был на одинокого мальчика, который сюда забредет. Каким-то образом он учитывал все, даже и тот факт, что мать не отдавала Горбовского в интернат, он ходил в обычную школу, это уж через год он настоял на том, чтобы его отправили учиться на звездолетчика, а оттуда через год — за склонность открывать незнакомые двери — перевели его в десантники.</p><p class="p">Но самым большим счастьем его детства было это воспоминание — о том, как он своим ключом открыл дверь к мигающему столбу из забытого эксперимента. А когда мать, уступив мольбам, пошла с ним на эту окраину — не было там уже никакого полуразвалившегося здания, потому что агрегат, видимо, передумал. Или выполнил свою миссию и отдумал себя в другое место, где, видать, был еще один будущий звездолетчик, нуждавшийся в таком парадоксальном наставлении. Вот теперь они с Диксоном сидели в похожем месте, и единственная работающая установка нуль-Т второго типа рисовалась ему такой же.</p><p class="p">— Вы же меня предупредите, когда полетите? — попросил он Диксона.</p><p class="p">— Разумеется. Это будет послезавтра.</p><p class="p">— Почему именно?</p><p class="p">— Завтра — плохое слово, все говорят себе: я пойду завтра. Я полечу послезавтра, и это наверняка. Не вздумайте ходить туда до меня — там код на двери, вы его точно не взломаете.</p><p class="p">— Интересно, — протянул Горбовский. — Код или ключ?</p><p class="p">— Ключи на Радуге не работают, вы же знаете, — вздохнул Перси. — Все по старинке. А код я не сам вычислил, конечно. Я же не инженер, я биолог. Мне его Постышева сказала, только никому не это самое.</p><p class="p">— Да кому же, — протянул Горбовский.

    <strong>10.</strong></p><p class="p">И послезавтра Диксон в самом деле зашел за Горбовским (он втайне надеялся, что Перси передумает, но Перси был такой, если уж что втемяшится — не сдвинешь), и они отправились в столовую, в которой в самом деле обнаружилась потайная дверь с кодовым замком, а за ней лестница.</p><p class="p">— Перси, — сказал Горбовский, спускаясь. — Я не должен вам, наверное, этого говорить…</p><p class="p">— Не должны, — сказал Перси, глуховато усмехаясь. Вообще все звуки в этой сырой темноте гасли, и собственный голос казался Горбовскому чужим, старым.</p><p class="p">— Просто я немного читал про нуль-Т. Вы не можете улететь туда, где нет реципиента. А на Земле, я думаю, сейчас вся экспериментальная часть свернута.</p><p class="p">Они стояли в просторном помещении, где две прозрачных кабины были темны, а одна освещена, и в ней мигали лампочки. В середине кабины размещалось просторное и даже уютное бледно-синее кресло, ничуть не похожее на электрический стул — а ведь Горбовскому рисовалось в воображении что-то подобное.</p><p class="p">— Во-первых, — назидательно сказал Перси, — вся экспериментальная часть не может быть свернута никогда. Потому что с тех самых пор, как открыта нуль-Т, на Земле ждут Странника, который открыл это раньше нас. Даже если с Радуги никто больше не отправится, всегда есть шанс, что забросят чужого. А во-вторых, на Земле свет не клином. Я ведь уже заходил сюда, только отправиться не мог, потому что нужен ассистент. Простите, но это будете вы.</p><p class="p">— Я уже понял, — вздохнул Горбовский.</p><p class="p">— Не беспокойтесь, если меня и размажет, вы ничего не увидите. Вы же знаете суть нуль-Т? Человек превращается в информацию, как голос в электрические сигналы. А потом собирается обратно. Если что-то и случится, то с информацией.</p><p class="p">— Никогда этого не представлял и не понимал.</p><p class="p">— Современная физика, — процитировал Перси, — может объяснить даже то, чего не может представить.</p><p class="p">— Да-да. Но мне интересно про свет не клином.</p><p class="p">— Дело в том, что вот на этой карте, — Перси показал на голубой прямоугольник, светившийся на стене кабины, — есть все возможные координаты приемных точек. Двенадцать из них на Земле, из них функционируют две. А семь не на Земле, то есть там нас продолжают ждать. Самое печальное, что я понятия не имею, где они. Они закодированы. Но на Землю, извините, Леонид, я точно не полечу. Там в ближайшее время делать нечего.</p><p class="p">Это было для Горбовского полной неожиданностью, и он не знал, как реагировать.</p><p class="p">— Чем мы вас так разозлили? — спросил он наконец.</p><p class="p">— Да ничем особенно, просто я понял, что рейс на Радугу последний. Стар я для Глубокого космоса, организм не тот. А на Земле меня ничто не интересует, кроме Глубокого космоса. Вот я и попробую на новом месте — вдруг пригожусь. Я уже все сделал на Земле, что мог, понимаете?</p><p class="p">— Что-то вы недоговариваете.</p><p class="p">— Может быть. Но, по крайней мере, и себе, и вам. Я просто не хочу больше ничего делать на Земле, там неинтересно. А про возможные точки приема мы ведь ничего не знаем, Ламондуа никому не говорил.</p><p class="p">— Я только думаю: почему же он сам не улетел? Он же мог.</p><p class="p">— Наверное, ему стыдно было. В одиночку-то.</p><p class="p">— Почему стыдно? Никто бы не узнал.</p><p class="p">— Ассистент, Леонид, — напомнил Перси. — Ассистент узнал бы.</p><p class="p">— Он же не думал, что ассистент переживет Волну.</p><p class="p">— Он не думал, он знал, — уточнил Перси. — Это ведь он предсказал снег. Он с высокой вероятностью знал, что не все мы умрем, но все изменимся.</p><p class="p">— И вы не боитесь вот так лететь неизвестно куда, наобум Лазаря? Там же могут быть, я не знаю…</p><p class="p">— Кто бы там ни был, — сказал Перси устало, — там по крайней мере нет всего вот этого. У меня после Волны такое чувство, что отсюда надо быть как можно дальше. Если Волна прошла по Радуге, до Волны на Земле остается года три-четыре. А во второй раз, как хотите, я этого точно не переживу. Не знаю, как вам, а мне это все показалось вечностью, и я испытал очень неприятные ощущения.</p><p class="p">— Интересно, — сказал Горбовский мечтательно, — кто-нибудь испытал приятные?</p><p class="p">— Наверняка, — сказал Перси. — Вон, слепой прозрел.</p><p class="p">— Да, — согласился Горбовский, — действительно.</p><p class="p">Он смотрел на Перси и понимал, что видит его в последний раз, — то есть вероятность, что они еще раз пересекутся в Космосе, близка к нулевой. И он знал, что, если он действительно очень сильно попросит — или просто прикажет, были у него со времен «Тариэля» такие полномочия, — Перси уступит ему кабину. Но этот вариант его не прельщал, да и не верил он, что у Перси получится. До сих пор ни у кого не получалось, и у него не получится. И он бессознательно тянул время.</p><p class="p">— А как же, — спросил он, хотя знал ответ, — как же вот эти вот все… огромные затраты энергии? Якобы после каждой отправки возникала Волна, якобы каждая транспортировка требовала включения всех станций…</p><p class="p">— Да чушь все, — спокойно сказал Перси. — Волна, конечно, возникала, только это была совсем не та Волна. Это ерунда была, а не Волна, ее элементарно поглощали харибды. А насчет всей энергии — на одну отправку местных аккумуляторов хватит, а другие меня, если честно, мало интересуют.</p><p class="p">— Но мы-то все тут выживем? Или вы высосете сейчас из планеты весь ток?</p><p class="p">— Да ну что вы. Это же установки второго типа. Работают на чистой биоэнергии. Грубо говоря, на температуре тела.</p><p class="p">Горбовский представил ужасное: вот он сейчас запустит Перси, а весь ток на Радуге вырубится, и он не сможет выйти из подвала, не сработает кодовый замок, отключится все электричество, и он не сможет даже подать сигнал, окажется замурован тут. И еще он понял, что впервые в жизни не разбирается в логике Перси. Если допустить хоть на долю процента, что все сработает, — он все-таки полетел бы на Землю, вопреки всему. Значит, Перси знал и чувствовал больше, чем он сам; что-то он такое понимал, до чего Горбовский не доходил, или весь свет ему застила тоска по Земле, по матери, по вещам, которых он толком не помнил, но они привязывали его крепче любой цепи. А у Перси был отец, это он знал точно. У Перси была полная семья и два брака, один формально продолжался до сих пор. Перси пожил достаточно, чтобы испытывать стойкое отвращение к жизни. Теперь он уцепился за возможность все изменить раз и навсегда, обнулить прошлое. На то она и нуль-Т, чтобы все обнулять. Но как же паршиво все обернется на Земле, если можно так не хотеть туда вернуться. У Горбовского были, конечно, определенные догадки. Он потому и старался проводить как можно больше времени в экспедициях, что на Земле все заворачивало не совсем туда; самые умные — прогрессоры и десантники — эвакуировались раньше времени. И все-таки самый дальний отъезд нужен был ему для того, чтобы вернуться; он не представлял, как это — не вернуться. Оказывается, все это время рядом с ним летал человек, который отлично это воображал и даже, может быть, отрепетировал.</p><p class="p">— Ну, поеду я, — сказал Перси.</p><p class="p">— Спокойной плазмы.</p><p class="p">— Смешно, — усмехнулся Перси. — И вам не хворать. Когда я махну, нажмите здесь, — и он показал на малозаметную кнопку в стене.</p><p class="p">Дальнейшее показалось Горбовскому сном, скорее приятным, чем кошмарным. Перси сел в кресло, пристегнулся и махнул. Горбовский, не колеблясь, нажал на кнопку — в конце концов, каждый выбирает по себе, этому учили в третьем классе, — и свет в кабине изменился, стал опалесцирующим, после чего от Перси Диксона довольно быстро остались одни глаза. Все остальное растаяло, контуры задрожали и унеслись, а глаза остались на прежнем месте и смотрели на Горбовского. В «Человеке-невидимке», вспомнил он, тоже последними оставались глаза.</p><p class="p">— Ну ладно вам, Перси, — сказал Горбовский не очень уверенно. — Хорош меня пугать.</p><p class="p">После этого — он мог бы поклясться — один глаз ему подмигнул, и кабина опустела окончательно.</p><p class="p">— Дай Бог, чтобы там никакой мухи не было, — вслух сказал Горбовский. — Или зерноедки.</p><p class="p">Он поднялся в столовую, особенно мрачную и пустынную в этот час — невыносимей всего было видеть плакатики «Тщательно пережевывая, ты способствуешь!» и «Когда я ем, завидно всем», — и вышел на снег. Единственный фонарь около столовой светил тускло-желтым, и кое-что на снегу привлекло внимание Горбовского. Вот этого он еще не видел.</p><p class="p">На Радуге никогда не было снега, а потому не видали и следов; человеческая деятельность оставляет след в виде конструкций либо руин, но не всем же строить и разрушать, некоторые просто передвигаются. На снегу под фонарем явно кто-то резвился, танцевал для незримого зрителя.</p><p class="p">Ох, это был странный танец. Никому лучше не видеть такой танец. На снегу оставались полосы, словно кого-то тащили, — такие полосы бывают на ментаграмме, фиксирующей припадок безумия; глубокие точки, словно кто-то топал отдельной конечностью — может быть, единственной уцелевшей; дальше кто-то, видимо, пускался вприсядку. Вероятно, танец этот в знак своего ликования исполняли на опустевшей планете когдатошние ее обитатели, обыватели, давным-давно загнанные в норы, и следы этого танца оставались на снегу, а так-то, может, самонадеянные земляне раньше заметили бы, что по ночам тут кто-то вылезает и смотрит, не пора ли еще. Но было еще не пора, а главное, не было снега; и тогда они осторожнее лезли наружу, понимая, что не пришло еще их время. Самое же страшное они спляшут, когда и снег сойдет, и когда тут будут пески. Они всех пересидят там, под землей, и доживут до песка; и тогда настоящие хозяева скажут им: можно. Ваше теперь время. Вот тогда здесь будут следы так следы — ползучее ликование ползучих, адские подскоки приплюснутых, безмолвное торжество возбужденных осужденных побежденных.

    <strong>11.</strong></p><p class="p">Но кто действительно изумил начальника комиссии Тамидзи Кэндо, так это Канэко, известный прежде главным образом тем, что регулярно требовал отставки. Канэко ведал распределением — не потому, что этого желал, но потому, что математическая его специальность, а именно теория решений, наилучшим образом этому соответствовала. Он работал в той междисциплинарной области, которая получила особое развитие в ХХ веке — когда, собственно, строгих наук в полуночном понимании почти не осталось. Это было время расцвета физической психологии, моральной стереометрии, антропологической топологии (она, собственно, в свое время и навела Камилла на идею синтеза — ведь все земные инструменты так или иначе вышли из биологии, нож — из зуба, шланг — из хобота; добровольцы штурмовали лабораторию, превращаясь по собственной воле в подъемные краны, широко шагающие экскаваторы, поющие фонари, — то был золотой век бионики; сращивание с автомобилем было уже дурным тоном — двухколесные люди-сегвеи, которым не требовалось топлива, наводнили сначала улицы Токио, а потом Иерусалима). Канэко занимался ПИА (Перельман — Исбел — Акбулут), то есть распределениями в самом широком смысле, на основе панинской теории густот, но это тоже долго рассказывать, — как всегда предупреждал Канэко, вербуя очередного неофита, но все равно никогда не мог остановиться. Теория густот была придумана в отдаленном подобии Радуги, когда в последний век Полуночи додумались до Большого Расслоения: свой поселок имели писатели, свой — синематографисты, физиков тоже собирали в безопасных местах под тщательной охраной. Первые ракеты разрабатывались именно там и в конце концов полетели, а в открытых сообществах не полетели бы никогда. В одной из таких шалашек — называвшихся так, видимо, из-за потаенного лесного расположения, — Панина осенило: он разработал универсальный принцип распределения, позволявший оправдать в том числе и шалашки. Всякий создает теорию, оправдывающую его положение, сформулировал для себя Канэко. Конечно, при жизни Панина считали безумцем, — так ведь и Репнина, он же Козырев, называли шарлатаном, одного только объяснить не могли: каким образом он с помощью двух алюминиевых зеркал прыгнул через два столетия, принял участие в межпланетной экспедиции, открыл ученым феномен банного листа и, подкормившись, вернулся обратно, где не погиб, а через двадцать лет возглавил отдел в Пулкове? Теория Козырева не нашла никаких экспериментальных подтверждений, кроме одного: он был на Сауле и рассказал о Полдне одному из подчиненных, что и привело к Первому Откровению, о котором знает теперь любой интернатник.</p><p class="p">Впоследствии антинаучная, оболганная и осмеянная теория Панина привела к созданию новой топологии, которая и предопределила Большое Расслоение: заповедник нуль-физики на Радуге, оазис обывателя на Пандоре, цитадель подростковой романтики на Аноре… Всего и оказалось достаточно для мирного сосуществования расслоенного человечества открыть такое топливо, которое позволило бы Человеку Воспитанному, Человеку Пассионарному, Человеку Романтическому и даже Человеку Отсталому жить и работать в полном соответствии с открытой еще в 1952 году и тут же оболганной Теорией Бесконфликтности, то есть разлететься друг от друга на безопасное расстояние. Канэко с детства считал распределение Густот и Пустот самой благородной задачей ученого, а потому распределился на Радугу, где и стал размазывать по ее засушливой поверхности необходимый инвентарь, фруктовые соки, кислое местное вино с неповторимым привкусом селитры и радужную форель, которую выпустили в океан сотрудники красивой Джины. К сожалению, распределить красивую Джину между всеми, кому она нравилась, не представлялось возможным, но Канэко верил в теорию распределения и не сомневался, что со временем как-то уравновесит и эти густоты с пустотами. Он работал над приложением теории к самой капризной сфере, когда пришла Волна, — и с ним произошло то, что не укладывалось в голове у Тамидзи Кэндо.</p><p class="p">Тамидзи, глава комиссии, уже неделю не мог для себя сформулировать природу Волны, потому что на каждого она воздействовала в соответствии с тайными склонностями жертвы. Больше всего он волновался за детей, которые вели себя абсолютно естественно и вместе с тем выглядели непостижимо другими: он проверял их на всех возможных детекторах и сканировал на всех томографах, но по-прежнему не мог понять, что произошло. Зато насчет Канэко все было даже слишком понятно — непонятно только, почему именно этот корректнейший и уравновешенный человек, сама специальность которого была связана с равновесными распределениями, под действием Волны ощутил себя самураем. Если раньше он периодически подавал в отставку, то теперь с той же периодичностью репетировал сэппуку.</p><p class="p">Разумеется, до сэппуку не доходило. В конце концов, у самого アドバンスド (адобансудо) самурая только одна жизнь, и если каждый день сэппучиться — никакой 救急車 (кюкюся) не хватит; но искусство распределения полностью ушло из сферы интересов Канэко, он демонстративно перестал говорить на синкрете и ежедневно выучивал сотню слов на японском, носил исключительно кимоно эпохи Эдо, упражнялся с мечом и осваивал кэндо, подвесил к потолку голограмму Мисимы в мундире офицера национальной гвардии, а о межнациональном синтезе отзывался со странной злобой, как о бабьих сказках. Агрессивность странно сочеталась в нем с изысканной вежливостью. Тамидзи часто казалось, что Канэко хочет его убить, но очень вежливо, с бесконечными извинениями и ритуалами.</p><p class="p">Это было омерзительно. Это было необъяснимо. Это было ни на что не похоже, и ужаснее всего было то, что Волна вытащила из всех самое подавленное — и самым подавленным, тайным, стыдным и желанным было, стало быть, вот это вот, носившее таинственное имя кокумин-но-сэйсин.</p><p class="p">Тамидзи не знал японского — не то что «знал, но забыл», как лепечет двоечник, но просто никогда в нем не нуждался. Можно при желании выучить вавилонскую клинопись, на Земле бывали в ходу и не такие хобби, но даже в строительстве моделей первых звездолетов было больше смысла. Канэко, однако, наотрез отказался говорить с японцем на неяпонском. Если у вас есть вопросы ко мне, извольте пройти свою половину пути. Ладно, в КОМКОНе умели решать и не такие задачи, Тамидзи нацепил мнемокристаллы шестого поколения и за ночь выучил дзэкко-но нихонго, знай наших. Он надеялся поставить Канэко в тупик, но тот и бровью не повел, как говорили древние (брови у древних играли большую роль в мимике).</p><p class="p">— Спрашиваю я, Тамидзи: как изволите вы объяснять себе происшествие с двумя волнами? — спросил глава комиссии в лучших традициях Кодзики.</p><p class="p">— Отход от правил, забвение традиции, — лаконически отвечал самурай Канэко, сидя в позе сэйдза (ступни соприкасаются, большой палец правой ноги строго над большим пальцем левой).</p><p class="p">— Отход от традиции совершился тысячелетие назад, в эпоху Кинсэй, — заметил Тамидзи, сидя довольно свободно, демонстративно закинув ногу на ногу: я уважаю ваши традиции, извольте уважать мои.</p><p class="p">— Райдзин терпит долго, мстит жестоко, — проговорил Канэко, всем видом выражая готовность терпеть и мстить в лучших традициях Райдзина.</p><p class="p">— Осмелюсь вам заметить я, Тамидзи, что традиция имеет священный смысл для уроженца Ниппона, но никакого не может иметь священного смысла, синсэйна ими, для гайдзина.</p><p class="p">— Отход от всех традиций, — сурово отвечал самурай. — Изнеженность поведения, распущенность костюма. Мужчина ведет себя как женщина. Нет благоговения перед прошлым. Позорный интерес к удобным ботинкам, мягким штанам. Похоть познания, праздное любопытство. Сошли с пути смерти, и вот теперь тянутся перед нами кривые, глухие, окольные тропы. Обожествление ложного синтёку-дзёкё.</p><p class="p">— Почему ложного? — быстро спросил Тамидзи.</p><p class="p">— «До» мужчины не ведет к удобству, — все так же статуарно отвечал Канэко. — «До» достойного ведет к свободе и, следовательно, смерти. Живой несвободен и, следовательно, недостоин.</p><p class="p">Тамидзи слышал когда-то весь этот бред, в КОМКОНе изучали секты самоубийц, но тут было иное. Он честно пытался разбудить свои древние гены, актуализировать корни, проникнуть даже в подсознание, но подсознание ко всему этому бреду было глухо, как кирикабу, старый сухой кирикабу цветущей когда-то сакуры.</p></span>
