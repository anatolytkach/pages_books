<span><p class="p"><strong>От автора </strong></p><p class="empty-line"/><p class="p">«Дуга» написана к 60-летию первой публикации моей любимой повести Стругацких «Далекая Радуга», но задумана давно, поскольку факт выживания Горбовского после катастрофы на Радуге нуждался в интерпретации: то ли «Стрела» успела, то ли шахты спасли остающихся, то ли Волна оказалась не смертельной. Автор всегда догадывался, что сработали все три фактора плюс четвертый, но участвовать в проекте «Время учеников» в свое время не стал, потому что об этом четвертом факторе имел тогда самое приблизительное понятие. Теперь, когда одна Волна прокатилась по нему, а другая еще только собирается столкнуться с ней на экваторе, он позволил себе поделиться некоторыми ощущениями.</p><p class="p">«Далекая Радуга» заканчивалась стихами Самуила Маршака, посвященными Тамаре Габбе. Автор остался верен этой традиции. Финальное четверостишие, в котором я заменил одно слово, было впервые опубликовано в детском календаре на 1942 год. Это первое стихотворение, которое моя пятилетняя мать выучила наизусть.</p><p class="p">Пожелать читателю приятного чтения автор никак не может, а потому желает здоровья.</p><p class="p"><em>Бичвуд, 31 декабря 2024</em></p><p class="empty-line"/><p class="p">
    <strong>1.</strong></p><p class="p">Снег лежал везде, сколько хватало глаз. Ламондуа с Пагавой не ошиблись, вообще ошибались редко. Полтора метра или больше — с коптера было не видно.</p><p class="p">Пишта сдал командование «Тариэлем» еще на Нептуне и вернулся первым рейсом «Ковчега», отправленным разбирать и забирать все, что осталось. Его убеждали, что живых не будет, что шансов нет, что обреченные всегда надеются, но на Земле с первого же рапорта Вязаницына понимали все. Пишту никто не посмел задерживать — он был директором интерната и старым другом Горбовского, так что у него были сразу две причины возвращаться. Разумеется, нашлись люди, утверждавшие, что он просто боится ступить на Землю, поэтому надеется выслужить прощение на Радуге. Такие толкователи всегда находятся. Катастроф подобного масштаба не было лет семнадцать, и любой выживший взрослый должен был позавидовать оставшимся. Но он летел не за спасением, — все же были и те, кто знал Пишту. Он должен был увидеть Радугу после Волны. И еще он знал Горбовского сорок лет и поэтому не верил, что Горбовский может пропасть. Никто из первого поколения звездолетчиков не верил в это, но из первого поколения почти никого не осталось.</p><p class="p">Это не было похоже на земной снег, и на снег Саулы, и на вечный снег Альтеи, такой уютной, приветливо мерцающей бесчисленными домашними огнями. Это был именно тот сероватый снег, который будет после всего, а ожидался после ядерной зимы, вроде бы уже нереальной и до сих пор всегда возможной. Это был больной снег, вызванный безумным превышением всех сил, снег, кладущий предел любым начинаниям. Он лежал неподвижно и неопровержимо, и не было ветра, чтобы носить его с места на место. Говорят, такой лежал в Антарктиде, пока ее не растопили, но тот, судя по архивным съемкам, был белый. Этот был серый, зеленоватый, на морском берегу почему-то лиловый — под невыносимым маленьким солнцем Радуги в невыносимое вязкое предвечернее время. Не смерть страшна, а предсмертие: ночью, думал Пишта, станет спокойнее.</p><p class="p">Он облетал планету третий час. Ничего нигде не было. Страшней всего, что и холод был несмертельный, средний, при таком вполне можно выжить, — но выживать, понимал Пишта, было некому. Ныла где-то на дне души дикая надежда, что Габа спас детей, но Габа был не Горбовский, физик, а не звездолетчик. Он выжить не мог. Разве что дети, с детьми случаются чудеса, — но почему-то Пишта боялся думать о том, какие это будут дети.</p><p class="p">Катышев сказал про первых десантников: конечно, грубые ребята, но все как один верят в чудеса, десантники всегда суеверны. Именно поэтому чудеса с ними регулярно случаются, а науке надо с этим просто смириться. И что-то было очень естественное в том, что Горбовский выжил, — ему всегда так страшно, так пугающе везло, и в конце с ним должно было случиться самое страшное, последнее чудо. Выжил один из всех, сделав все возможное, чтобы не выжить. В конце такой биографии, как у Горбовского, обязана была случиться героическая смерть, и потому именно ему, такому неожиданному во всем, могла достаться чудовищная жизнь, спасение в одиночку, на пустой, заваленной снегом планете.</p><p class="p">Цвет этого снега — цвет грязной бледности, грозной бедности — был у мертвых, которых Пишту видел, у отца, которого хоронил: цвет щетины, отросшей уже после смерти. Говорили, что это не щетина растет, а кожа опадает, проваливается, — он не вдавался в детали, было о чем подумать, кроме этого. В сущности, за последние десять лет у него и не было шанса остаться одному так надолго. Теперь он инспектировал это опустевшее пространство, черные пятна на месте лопнувших «харибд», станции, пустой лабораторный комплекс к югу от столицы, и у него было время подумать, почему все так кончилось, но думал он о совершенно других вещах, и прежде всего о том, откуда взялось у него это новое чувство полного финала. На небольшой лабораторной планете погибло почти все взрослое население, это была катастрофа явно нерядовая и даже первая в этой рискованной области за время существования нуль-физики, но лабораторных планет было около сотни, а обитаемых планет — тысячи, а досягаемых галактик — десятки, и в масштабах космоса Радугу можно было просто не заметить. В конце концов, все ее население, включая младенцев, составляло четыре тысячи девятьсот двадцать три человека, эту цифру он знал точно, потому что к пятитысячному гражданину уже готовились, уже прикидывали, чем его встретят и как наградят. В иных войнах на иных архаических планетах столько гибло за месяц, и далеко не все войны КОМКОН мог остановить.</p><p class="p">Смерть вообще была нормальное дело. Смерти сильно боялись только в последние годы перед Откровением — фигурально говоря, за полчаса до Полдня. Полдень был таким рывком, что сразу перестали бояться чего бы то ни было, словно вдруг оказались на том самом миру, на пиру, на котором и смерть красна. Каждая человеческая жизнь стала вдруг стоить бесконечно дорого, но именно за этот новый мир не страшно было умереть, и у десантников, прогрессоров и Глубокого Поиска это вдруг стало нормальным делом. Но Радуга была особым случаем, и потому у Пишты было острое чувство финала — то ли потому, что это была его планета, гибель его личного мира, то ли потому, что Радуга была авангардом, и словно само будущее вдруг обозначило собственные контуры: до этого рубежа вы дойти можете, а дальше вам отомстит сила компенсации, сила, которую вы сами разбудите, сделав то, что человеку не положено. Пиште казалось, что после Волны во всем мире дела пойдут иначе, словно вчера еще он жил в мире Полдня, а теперь уже в мире Часа пополудни. А час пополудни не нравился ему с детства — Полдень обещал что-то небывалое, он был вроде экватора, а тут — хорошо, пересек ты экватор, а за ним та же вода. Некоторые называли это кризисом среднего возраста.</p><p class="p">В это самое время Пишта в который раз пересекал экватор и тут заметил дым.</p><p class="p">Этого не могло быть, но было. На Радуге отроду не жгли костров — разве что в скаутских походах, обязательных во втором классе, но этот навык нигде на планете пригодиться не мог: бóльшая часть планеты была необитаема, а в обитаемой, сплошь лабораторной, открытый огонь понадобиться не мог. У Пагавы был мангал, которым он страшно гордился, жарил на нем свои варварские шашлыки, и то раз в год, на день рождения жены. Тем не менее на горизонте что-то дымилось, и Пишта снизился. И прежде чем он подлетел к черной точке и разглядел силуэт сгорбленного человечка около дрожащего, очень яркого пламени, — он уже с полной отчетливостью знал, что это Леонид. Некому здесь было жечь костер, кроме Леонида. Что он тут жег в степи? Видимо, рогозник — так называли тут жесткие, сухие кусты, появлявшиеся в степи клочками, пятнами, без всякой логики, как родинки.</p><p class="p">Горбовский не поднял головы и даже не помахал. Он словно дождался рейса, прибывшего по расписанию. Лицо у него было цвета все того же снега, и так же проступала на нем щетина, и что-то в нем изменилось, но самое страшное, что перемена эта была малозаметна — не так, как разница между днем и ночью, а как между полуднем и часом пополудни. Глаза у него словно стали меньше, а лоб больше. Пишта понимал, что так не бывает, это какая-то иллюзия. Но самое удивительное, что Горбовский не радовался. Пишта хотел броситься к нему, — но понимал, что делать этого нельзя. Может быть, он призрак, а при встрече с призраком соблюдается особый этикет. Он спустился на снег и стоял у вертолета, и Горбовский подошел сам.</p><p class="p">— Спасибо, — сказал он, и это тоже было странно. Голос не изменился, но это было явно не то слово, которым они могли бы поприветствовать друг друга после недельной разлуки, в которую поместилась гибель планеты.</p><p class="p">— Что «спасибо»? — переспросил Пишта, как идиот.</p><p class="p">— Что прилетел, — терпеливо объяснил Горбовский.</p><p class="p">Они стояли, придирчиво оглядывая друг друга, и оба недовольны были результатами осмотра. Мелкие, жалкие следочки были рассыпаны вокруг, словно прыгала птичка, становившаяся вдруг змеей; становилась — и тогда ползала.</p><p class="p">— А еще кто-нибудь есть?</p><p class="p">— Много, — протянул Горбовский. — Кто где.</p><p class="p">— Полетели? — не очень уверенно предложил Пишта.</p><p class="p">— Да, спасибо, — повторил Горбовский. — А то я замерз.</p><p class="p">И прежде чем забраться в вертолет, разметал и затоптал костер.

    <strong>2.</strong></p><p class="p">«Стрела» прибыла на Радугу приблизительно за двадцать минут до того, как волны должны были соприкоснуться на экваторе. По расчетам Калиненко, ее пятидесятилетнего капитана, погрузка всех оставшихся взрослых должна была занять четверть часа, не более. Пассажирская камера вмещала сотню человек, ее спуск на планету и подъем на борт занимал три с половиной минуты, Калиненко рассчитывал успеть и даже промедлить последние роскошные три секунды, сделав так называемую паузу Дундича. Про Дундича, эпического героя, уже и в двадцатом веке ничего толком не было известно, он участвовал в тогдашней ролевой игре, в которой все делились на красных и белых (по мотивам битвы краснокожих с колонизаторами, что-то такое из Купера), и многие так увлекались, что наносили друг другу настоящие увечья, во что в XXIII веке верилось с трудом. Дундич был выдающимся кавалеристом, то есть очень профессиональным наездником ярко-рыжего коня, и прекрасно управлял трофейным автомобилем, но от всех его подвигов осталось одно упоминание: он доставил командиру белых письмо от командира красных с требованием сдаться. При этом он переоделся в форму белых, нацепил «позументы» (так, кажется, назывались золотистые боковые полосы на штанах) и газыри, нечто вроде патронташа; в этом комическом наряде, который, как и все прочее, был ему к лицу, он явился в приемную командира и отчеканил: «В собственные руки, срочно!» Пока командир белых ломал печать и вспоминал, где он видел это широкое усатое лицо (а видел он его, разумеется, на плакатах Wanted в бесчисленных белых салунах), — Дундич успел впрыгнуть в седло, но перед этим, артист, картинно закурил папироску и затоптал спичку! Эти три секунды задержки обеспечили ему бессмертие. Калиненко был из украинцев, его предки в той ролевой игре блистали по обе стороны, а в другой войне, куда более серьезной, больше всех сделали для обрушения Мира Полуночи; а потому репутация отчаянного парня бежала впереди него, и от него требовалось только ей соответствовать. Над его лихачествами одни потешались, другие ругали его за ненужный риск, но Горбовский всегда его брал под защиту — и, как видим, не ошибся.</p><p class="p">Калиненко знал, что у звездолета класса W два режима работы — нормальный и корректный; да в общем, еще за век до Большого откровения все отчетливо делилось на два (Стогов говорил — не поделилось, а умножилось). Эмоциолисты с рационалами с ефремовских времен взаимно обзывались неандертальцами и кроманьонцами, не очень, впрочем, понимая, о чем речь. Вообще-то и без Большого откровения все понимали, что всякая идея в своем развитии делится на две ветки — условно говоря, на Сикорски и Бромберга, — и навязывать им единые правила значит с гарантией уничтожить обоих. Поэтому начиная с класса W, благополучно летавшего уже тридцать лет, особые пилоты, с раннего возраста выделявшиеся КОМКОНом-3, получали допуск к нормальному режиму полета. В корректном режиме «Стрела» добралась бы до Радуги за десять часов, в нормальном — за четыре, а Калиненко знал, что, если отключить так называемый контроль идиота, долететь за три мог любой серьезный профессионал, просто не все знали, где отключается контроль идиота. Отключение его — в чем заключалось главное отличие звездолетов класса W, почти полностью сращивавших человека с машиной, — происходило в мозгу пилота, и для этого всего-то было достаточно три раза сказать про себя громко и отчетливо (да, про себя — и громко): «Сивка-бурка, вещая каурка, встань передо мной, как лист перед травой». Ничего не поделаешь, проектировщик «Стрелы» был по третьему образованию фольклористом и, работая по пятой профессии, никак не мог отказаться от прежнего интеллектуального багажа.</p><p class="p">Со времен звездолетчика Петрова, чьим именем называлось Второе Высшее Командное, было известно, что за скорость приходится платить, — ну так покажите человека, страну, общество, которым не пришлось бы платить за скорость! Одни вызывают Волну, другие десятилетиями воюют с ближайшими родственниками, а третьи, вроде Калиненко, наживают к сорока годам кардиомиопатию и еще кое-какие неприятности, сравнительно легко компенсируемые. Хуже всего обстоит с нервами, они разбалтываются; на некоторых скоростях человек начинает думать, что ему все позволено, — и в самом деле, редкий герой после победы способен вести себя как обычный человек; но Калиненко проводил мало времени с обычными людьми, а профессионалы не склонны заниматься моральными проработками. Прорабатывают те, кому делать нечего. Поэтому он успел за двадцать минут до схождения, и звездолет его, появившись в сужающейся щелке ослепительного неба над Радугой, оповестил о себе даже раньше, чем на всю площадь грянуло:</p><p class="p">— Трррехминутная готовность!</p><p class="p">Шахтеры повыскакивали из шахт, воспитатели — из школы, где по пятому разу пели хором ритуальную прощальную выпускную «Когда уйдем со школьного двора», физики потянулись к Дворцу совета, по которому ветер гонял священные вчера и ненужные теперь бумажки (на Радуге не пользовались электронными носителями — излучение ульмотронов мгновенно обнуляло любую флешку, дрожку и плюшку). «Стрела» неслась к площади стремительно, вот-вот грохнется, избавив всех от невыносимых последних минут! — но Калиненко элегантно затормозил в десяти метрах над поверхностью несчастной планеты и мягко посадил гигантский корабль, оказавшийся вблизи куда выше «Тариэля». «Стрела» была, сообразно названию, более длинной и узкой, как бы целеустремленной — в отличие от Горбовского и его корабля, которым как раз целеустремленности и недоставало.</p><p class="p">Капитан спустился в капсуле и торжественно сказал:</p><p class="p">— Прошу!</p><p class="p">Но никто не торопился. Это было странно, это не вмещалось в сознание. Это было неправильно. И тем не менее люди, только что спешившие к месту посадки, замерли перед возможностью спасения. Роберт Скляров шагнул вперед и сказал:</p><p class="p">— Без меня.</p><p class="p">И очень красивая, но совершенно седая женщина рядом с ним положила руку ему на плечо:</p><p class="p">— Я не знаю, как я там буду. Я не смогу там смотреть ни на кого.</p><p class="p">— Нам здесь больше нравится! — крикнул молодой нулевик.</p><p class="p">Ламондуа сказал, что его профессиональный долг — присутствовать при столкновении волн. Несколько влюбленных пар, завороженных остротой ощущений, тоже предпочитали остаться, да не успели и толком одеться, а Постышеву с Валькенштейном, умчавшихся в неизвестном направлении, вообще никто не спросил. Некоторые физики желали разделить с Ламондуа радость последнего наблюдения, а кроме того, они верили во взаимную деритринитацию волн. К капсуле потянулся в основном обслуживающий персонал ульмотронов — те немногие, кто тайно проклинал физиков, за сомнительные эксперименты которых должны теперь расплачиваться простые люди. Радуга предназначалась явно не для простых людей, и было только справедливо, что они покидали ее так своевременно.</p><p class="p">Некоторое время Калиненко молча смотрел на это безобразие, хотел плюнуть под ноги, но потом понял, что остающиеся были, в сущности, ребятами его склада и, если бы мог, он бы тоже остался вместе с кораблем. Если им всем суждено погибнуть, то лучше такой смерти все равно не придумаешь, а если выжить — лучше такого выживания тем более не найдешь. Он хотел, конечно, повидаться с Горбовским, но если Горбовский с самого начала выбрал оставаться, переубеждать его во второй раз было бессмысленно. А черт его знает, подумал Калиненко, он очень живучий — может, он их спасет одним своим присутствием. Есть такие люди, которых ничто не берет, такие хлопцы, что хоть хлопни об стену — беспокоиться надо о стене.</p><p class="p">— Спокойной плазмы! — крикнул кто-то из оставшихся, когда схлопнулись створки капсулы.</p><p class="p">— Спокойной Волны! — крикнул Калиненко, но вряд ли кто его услышал. Тем более что вокруг уже очень громко ревело.

    <strong>3.</strong></p><p class="p">Это был рев не простой — что-то в нем слышалось жалобное. Так ревело бы сентиментальное чудовище, обло и озорно, немыслимый зверь, собирающийся вас сожрать и все-таки надеющийся к себе же вызвать сострадание. Чем приходится заниматься, боже мой, а ведь это не мой выбор, я просто такой родился! На Пандоре есть особый вид тахоргов, которые прямо-таки умываются слезами в процессе поедания ханургов, а ревут в паузах так, что хоть святых выноси. Кажется, без этого воя пища не доставляет им удовольствия. Рев волн усиливался, и Горбовский успел подумать, провожая «Стрелу» одобрительным взглядом с пляжа: вот же, и помереть не дадут спокойно, флегматично, опять вокруг шумят.</p><p class="p">Но если бы это был только шум! Это было чудовищное, невыносимое чувство, что все напрасно. Бледная тень этого чувства посещает некоторых по ночам, когда они задумываются, что живут неправильно. Это было чувство изначальной неправильности проекта — не Радуги, не Полдня, всего проекта с самого начала. Это было чувство отвращения к тому, как бездарно он жил, и как бездарно прилетел сюда, и ради жеста остался. При этом улететь было бы еще хуже, а вообще тут хорошего выбора не было. Человек, который не считает, что он жил напрасно, жил не просто напрасно, а, можно сказать, вообще не жил. Тьма сгущалась, сближалась, на отвесных бархатных стенах зазмеились ужасные краски, каких не бывает ни на земле, ни на небе. Это был болезненный багрец, рисунок вен на стенке поглощающего всех желудка. Там закручивались еще какие-то спирали. Волна жила жизнью, была существом со своей мыслью, эта мысль была настолько больше их всех со всеми их затеями, что им смешно было и голос возвышать против этой силы; и в адской иерархии Волна была еще далеко не главным, она была преддверием. Космос был полон этих сил, верховную помыслить было нельзя, и это не была злая сила — это была сила бесконечного презрения, для которой все они были насекомые и хуже насекомых. Но эта мерзость была несчастна, вот в чем дело; счастье было уделом мелкой сволочи вроде них, а все великое и подлинное было несчастно. У Горбовского — и он чувствовал, что это переживалось всеми, все они слиплись в омерзительную массу, в пищевой комок, — заболело все и сразу, дикая, детская тошнота выворачивала его, помутился рассудок, выступил ледяной пот, и вообще стало действительно очень плохо, хуже, чем бывало при любых перегрузках. А перегрузки, кстати сказать, он переносил очень плохо, у него вообще была физиология думателя, а не звездолетчика. Звездолетчик — был неправильный выбор, и все выборы в его жизни были неправильные. Вечно что-то из себя изображал, а хотел в жизни только одного, одну женщину, и этой одной женщине никогда не был нужен.</p><p class="p">Волна смыкалась над ними постепенно, это со стороны она казалась стремительной, а внутри нее все происходило крайне медленно. Горбовский понял, что сбывается главный его кошмар, тот, от которого он просыпался ночами, с похмелья или при сильной простуде, единственной болезни, которая оставалась непобедима. Ему казалось тогда, что он после смерти будет наказан за все свои грехи — а их было куда больше, чем он сознавал, — бессмертием, но самым страшным, то есть бессилием и бездействием. Это будет вечная темнота при полном сознании и памяти, и он не сможет увидеть ни мать, на встречу с которой так надеялся, ни Надю, по которой так слезно тосковал, ни сыновей, перед которыми каждую секунду был виноват. Именно в первые секунды после сна накатывала такая слезная, мучительная жалость к ним, такое чувство вины, и ничего нельзя было сделать. Вдобавок он задыхался, и было ясно, что теперь он будет задыхаться вечно. Он будет вечно помнить и вечно мучиться, как вечно и неизбывно тоскует по сыну мать — страшней этой тоски ничего не бывает, другие могут отвлечься, забыться, а она никогда. Наверное, он должен будет так задыхаться, пока не вспомнит действительно все: каждый день, каждую секунду. Все это хранилось в памяти, он знал. Он должен будет набрести на то главное преступление, о котором старался забыть, и это будет совсем не то, в чем он каялся, потому что здесь другие критерии, другие расценки. Вот теперь это настало, смерть оказалась бессмертием, вечностью муки, бесконечностью темноты, в которой вдобавок такая теснота, невозможно пошевелиться. Многие тысячи лет он будет вспоминать свои сто, и никто его не пощадит, даже когда он вспомнит действительно все. Он успеет подумать все, что можно подумать, и перебрать все, что знает, и перебрать не по одному разу — и никто не простит, потому что прощать некому; он мечтал иногда о бессмертии — и вот получил бессмертие. Ничего, ничего не могло быть страшней этой вечной памяти в вечном одиночестве, нечем было утешиться, сама мысль о любви и прощении казалась оскорбительной для этой темноты; и вот он пережил это в ту секунду, когда волны сомкнулись над ним.</p><p class="p">Они сомкнулись и тут же вспыхнули, но этой секунды полной темноты оказалось достаточно, чтобы он успел пережить тысячи, миллионы лет бесконечного перебирания своей жалкой памяти; чтобы он успел смертельно затосковать по всем, кого любил и потерял, чтобы он успел почувствовать ничтожность своего существования перед бесконечными веками, в которых его не было и не будет. Все это нельзя было описать, для этого не было слов; и после этого нельзя было жить — для этого не было сил. Горбовский не знал, сколько времени он отсутствовал. Он, собственно, и не присутствовал никогда. Была одна бесконечная Волна, вроде океанской, которая на несколько жалких мгновений приняла его форму. А так-то Волна была всегда, ничего, кроме Волны. На секунду он вернулся в эту субстанцию, но секунды было достаточно, чтобы ни к чему больше не испытывать любопытства. И если во время страшных пробуждений он понимал, что будет утро и все как-то забудется, — то теперь никакое утро не могло ему вернуть человеческого. Он был под Волной, он побыл Волной, и это было не из тех ощущений, которые притупляются.</p><p class="p">И когда на него, на почерневшую, спекшуюся, стеклянистую землю, на остатки строений стал опускаться медленный, мертвенный снег — снег, похожий на пепел всего когда-то живого и важного, — Горбовский не чувствовал холода. Или, вернее, холод был благом — он был лучше, чем пустота и теснота. Есть такие вещи — мысли, чувства, судьбы, как хотите, — по сравнению с которыми полная смерть и окончательное поражение уже великое благо; и Горбовский испытывал невыразимое облегчение. Лучше был любой холод, чем вот так.</p><p class="p">Людей он не видел. Они, несомненно, были, но он их не видел. То ли он утратил способность их замечать, то ли слишком долго пролежал без сознания и все они успели уйти. Он попробовал встать — с третьей попытки удалось — и с адской болью, доставлявшей такое же адское наслаждение, побрел прочь от замерзшего моря, которое, впрочем, почти ничем уже не отличалось от земли.

    <strong>4.</strong></p><p class="p">Диспозиция теперь выглядела так: на Радуге осталось в общей сложности порядка шестидесяти живых. Детей, оставшихся с Габой, пока не нашли, но, если считать их живыми (на что указывали отдельные признаки, описанные ниже), их было вместе с Габой десятеро; в шахтах задохнулись трое, остальные чувствовали себя прилично; восемь человек уцелели на Севере, хотя, конечно, их крепко покалечило. Это они подавали сигналы, пойманные в Столице. Самой болезненной проблемой оставалась участь улетевших на «Стреле», потому что их-то не дождались ни на Земле, ни в окрестностях.</p><p class="p">Поначалу Калиненко шел ровно, подавал сигналы, рапортовал с дороги. Потом он начал передавать непонятное, недешифруемое, попросту абсурдное. Выходило, что они там вдруг передумали возвращаться на Землю.</p><p class="p">Земля недоумевала, негодовала, требовала. Калиненко пожимал плечами — этого никто не видел, но жест домысливался так. Он повторял: поймите, вам же лучше. Они тут все взведены. Они прилетят и вам устроят, вам это надо? Мы пока полетаем, посмотрим, может быть, где-то нужны специалисты. Какие специалисты, спрашивали его, вы с ума сошли? Немедленно на Землю! Да погодите, отвечал Калиненко, мы сейчас вот только заправимся — и тут же домоиньки. Он прилетал и заправлялся, брал топливо и провизию, и там опять что-то случалось, и он летел дальше, унося проклятие. Они скитались в космосе, как Агасферы, вечные жиды, прóклятые за то, что избежали участи. Надо было честно пройти сквозь Волну, и все бы обошлось, а так они спаслись, зато теперь всюду тянутся перед ними окольные тропы. И ладно бы только перед ними, а то они на всех теперь навлекают. Страшно было представить, что делается на потрепанном, одиноком, до смерти надоевшем корабле, который пытается вы́летать, изжить свое проклятье, а его все не прощают и не прощают, и они вынуждены, до смерти друг другу надоев, таскаться по галактикам и везде встречать одно и то же — мир, замерший в ожидании расплаты. Несколько раз они прилетали в ситуацию гражданской войны и еле успевали унести ноги. Но на Землю было нельзя. Калиненко не мог принести на Землю синдром Радуги. Он ждал, когда «Стрела» разрядится. Встреча с ним стала дурным знаком, его боялись, как Летучего голландца. Он сросся со своим кораблем, забыл свою земную жизнь, и как пилот земного самолета, бесконечно пересекая часовые пояса, молодеет от их смены и от жизни на высокой скорости, так и он помолодел, похудел, подтянулся, кожа у него на руках свисала лохмотьями, зато седая борода опять почернела, а в глазах появился библейский блеск. Иногда на сеанс связи с ним выходил психолог и в панике прекращал разговор, а Калиненко утешал его. Все, кроме него, уже понимали, что он никогда не вернется, но он все еще верил и повторял: ну эти, ну как их, ну релоканты… вернулись же…</p><p class="p">Никто не понимал, что он имеет в виду. Скорее всего, это были какие-то старые украинские дела, генетическая память. Можно было, наверное, напомнить ему слова другой украинки, надпись на обелиске погибшим в Глубоком космосе — «Все ушли, и никто не вернулся, только, верный обету любви, мой последний, лишь ты оглянулся, чтоб увидеть все небо в крови». Никто не вернулся. Но, может быть, она как раз его предвидела, своего последнего.

    <strong>5.</strong></p><p class="p">Танина ладонь, прохладная и влажная, лежала у него на глазах, и Роберту была неприятна эта ладонь. Она ему мешала, он хотел быть один, но Таня теперь ходила за ним, как собака, и у него почти не было времени как следует все обдумать. Надо было понять очень многое, а времени почти не оставалось, только по ночам, когда Таня ненадолго засыпала; но стоило ему проснуться и начать формулировать для себя хоть какие-то принципиальные вещи, Таня приподнималась на локте и начинала смотреть с рабским обожанием. Эти большие глаза раздражали его особенно, и Роберт не понимал, как мог когда-то подолгу в них смотреть и обнаруживать там все богатство мира, все радости и смысл жизни в придачу.</p><p class="p">Таня говорила теперь очень много глупостей. Она повторяла, что он единственный из них человек, потому что всем остальным до человека не было дела; что он готов был погубить за нее свою бессмертную душу, а выше этого нет ничего; что он один понимал любовь и умел ее испытывать, а все остальные, и в первую очередь она, думали только о себе, прикрывая это заботой о деле или о будущем. Он был готов на самое страшное — на изгойство, на предательство, даже на то, чтобы пожертвовать другими ради нее. Собой-то любой пожертвует, а вот другими! Она говорила, что с первого дня в интернатах, и особенно в Детском, учили ерунде; что все они жили коллективом и были коллективом, а наедине с собой не оставались и принимать решения не умели. Все они умели двигаться в потоке, а развернуться в потоке не могли и вне его себя не представляли. Все они были не люди, а модели человека, и только он был настоящий (это «настоящий» применительно к нему бесило его больше всего), и не зря Роджер ваял с него «Юность мира». Только Роджер сделал его моделью, а на самом деле моделями были остальные, человеком был Роберт, и Роджер, настоящий художник, это почувствовал.</p><p class="p">Роберт еще до Волны понял, что он не человек, а предатель, и отвращение его к себе все углублялось, но Таня договаривалась до того, что с предательства только и начинается подлинная человечность. Роберт догадывался, что она так не думала; он понимал, что у нее теперь нет другого образца и критерия, кроме него, и если бы он начал страдать энурезом, она говорила бы, что человек начинается с энуреза. Раньше он был тут в тягость всем и люди чувствовали неловкость при его появлении, а теперь ему в тягость были все, начиная с Тани, но люди начинали к нему тянуться. Беда была еще в том, что Таня направо и налево рассказывала о нем, она была теперь пророком секты Роберта, напоминая ему о его преступлении, обо всем, о чем следовало молчать. И он молчал, а самое ужасное, что любая мысль о физическом контакте с Таней была ему отвратительна. Подумать только — Роберт Скляров, юность мира, ничего больше не мог сделать с женщиной и вздрагивал от одной мысли о прикосновении чужого тела! Но именно теперь она лезла к нему со своей липкой любовью.</p><p class="p">А он не мог теперь быть ни с кем, не только с Таней, а с кем бы то ни было: он не понимал, как люди могут это делать друг с другом и зачем делают. Проблему размножения давно решили инкубаторы, которых не предсказывал только ленивый; беременность была благополучно побеждена еще три века назад, асексуалы доказали, что воздержание благороднее веганства, потому что восемьдесят процентов мировых злодейств совершались из-за секса и его производных, десять — из-за обжорства и еще десять из тщеславия. Роберт ничему больше не радовался, но больше всего похоже на радость, пожалуй, было вот это чувство сброшенного поводка. Пожалуй, он идеально годился теперь в основатели новой религии, потому что пороков не имел, аппетита ни к чему не чувствовал и вообще всей душой стремился к смерти; всему этому научила его Волна, и, если бы он в самом деле чувствовал себя достойным основать культ, это был бы культ Волны.</p><p class="p">Таня оставляла его в покое, только когда ее забирали для бесед — а забирали ее чаще других, потому что ее случай был всего нагляднее. Они жили теперь в профилактории — здании бывшей больницы, которое вечно пустовало, потому что прежде на Радуге все были отвратительно здоровы, десятками защищались диссертации о том, что занятые любимым делом люди не болеют в принципе. (Вот и Ламондуа никогда ничем не болел, словно все упущенные им болезни дождались, набросились и уничтожили его.) Тех, кто пострадал серьезно — их было около сотни с физическими повреждениями и человек десять с острыми психозами, — отделили и собрали в госпитале, прочие отлеживались в профилактории и проходили собеседования. Странно, что их, чудесно спасшихся, никто не любил. Они словно разочаровали всех, надо было сделать что-то, чего они не сделали: то ли коллективно нуль-транспортироваться на Землю, то ли героически пожертвовать собой и стать легендой, — а они вот выжили, и в этом не было ничего героического. Они не спасли оборудования, не утащили в шахты драгоценные ульмотроны, не говора уж о максидромах и коллайдерах, и из них нельзя было сделать ни символы, ни монументы. Их не за что было награждать. Они не сумели указать Земле новый путь, а ведь чувствовалось, что подобное указание было бы как раз вовремя; они не сумели стать этапной катастрофой, и с ними было неинтересно. Вот если бы оборудование было цело, а они погибли — так действовала одна древняя бомба, — по крайней мере, было бы о чем говорить; а гордиться тем, что очень быстро вырыли убежище… Это как если бы дезертир, как называли в древности марафонского бегуна с фронта, гордился тем, что бегает быстрее всех.</p><p class="p">КОМКОНу надо было установить полную картину происшедшего, и делать это, конечно, следовало на Радуге. Роберт замечал, что в первое время все очень старались общаться и подробно рассказывали друг другу, где и как их застала Волна и что именно они почувствовали; но странно — или это тоже было следствие Волны? — за неделю все успели друг другу опротиветь и теперь стремились к уединению, а больница на это рассчитана не была. Уединение считалось подозрительным. Уединяться может художник, Сурд, в крайнем случае Роджер, а нуль-физику это зачем? Хочешь подумать — закажи время в тинк-танке, где дзета-облучение заставляло мозг работать на максимуме, а остальные размышления — например, о времени и вечности, как острил Пагава, — маскируют элементарное нежелание работать. Вместо «околачивает груши» на Радуге говорили: «он думает о времени и вечности». Роберт много теперь об этом думал, а Таня отвлекала.</p><p class="p">— Ну вот скажи, — приставала она, — теперь ты на какой счет мучаешься?</p><p class="p">— Я думаю о Габе, — отвечал он, надеясь, что хотя бы этот разговор она поддерживать не захочет.</p><p class="p">— Габа! — Она смешно взмахивала руками, как делали, наверное, домохозяйки древности. — Мальчик мой, что ты знаешь о Габе!</p><p class="p">Это был верный расчет — на какой-то миг просыпался прежний Роберт и начинал ревновать.</p><p class="p">— А что, и он пробовал?</p><p class="p">— Попробовал бы он! — смеялась Таня. — Нет, ты просто ничего про него не знаешь.</p><p class="p">— Да что там знать, — бормотал Роберт. И хорошо, что он не чувствовал к ней особенного интереса и с облегчением прекращал разговор. Таня не знала бы, что сказать, начни он всерьез расспрашивать. Что Габа, будь он сто раз испытателем, — представитель хамар, самого воинственного из самых темных племен? Так ведь дело было не в этом, а говорить об остальном ей было нельзя. Но Роберт, к счастью, не расспрашивал.</p><p class="p">И все-таки она любила его больше всего на свете. Он был единственным, что у нее осталось. Он пожертвовал ради нее всем. Когда-то они были две образцовые молодые особи, теперь тоже остались образцами — седая и вечно грешная она, седой и святой он. Они были последними преступниками, их преступность дошла до святости, но, как все святые, они ничего уже не могли друг другу дать. И хорошо, что они не могли зачать ребенка. Этот ребенок уничтожил бы мир, толкнул падающего. А может, и надо было постараться, и Таня не оставляла стараний. Ведь она действительно, действительно, повторяла она в тысячный раз, действительно любила его.

    <strong>6.</strong></p><p class="p">Вязаницын сильно похудел и вообще сдал, но по привычке крепился. Его обнаружили дома, где он, собственно, почти не бывал, потому что горел на работе, как это называлось в старину. Теперь у него не было никакой работы, и весь его безразмерный досуг был практически поровну заполнен любовью и ревностью. Он жил в своем опустевшем доме, в поселке, и Джина Пикбридж переехала к нему — не потому, что любила, а потому, что у них была общая беда, и этого достаточно было для близости.</p><p class="p">Но любила она не его, и это было странно для Радуги. На Радуге прежде не бывало треугольников, на них вечно не хватало времени. На Радугу ехали работать, это было время великого нуль-прорыва, и отвлекаться на личные отношения было так же нелепо, как во время напряженных личных отношений думать об экологической безопасности или отвлекаться на здоровую пищу. Человек, у которого во время любовного акта вдруг чешется спина, есть, безусловно, человек несчастный в любви. У счастливо влюбленных спина не чешется. Радуга была целиком поглощена решением проблемы, которая поставлена двести лет назад, считалась безнадежной и вот начала поддаваться. Поддавалась она, как всегда, по нескольким направлениям сразу. Фостер подрывал гору с одного конца, Пагава с другого, Маляев шел самым сложным путем, но все они, при всей разнице темпераментов и методик, чувствовали, что гора сыплется, что еще немного — и ее подковырнут. Только Камилл говорил, что ошибка заложена в самой постановке вопроса и что живая материя никогда не сможет пересобраться, — но и Камилл понимал, что на известном уровне самоорганизации пересоберется как милая. Вязаницын тоже был поглощен делом, но он не был физиком, понимал предмет поверхностно и отвечал за функционирование центра, а наукой руководить нельзя. Она сама в какой-то момент вырулит к очевиднейшему выводу, и все ахнут, как это не видели такой простой вещи.</p><p class="p">Теперь все рухнуло, и само направление могли прикрыть надолго, если не навсегда. Теперь у Вязаницына не было никакой работы, и как при серьезной болезни вылезают все скрытые пороки, так его стали одолевать все загнанные в подсознание преступные страсти. Вязаницын любил Джину Пикбридж, и у него были основания надеяться на взаимность. Она и прежде любила у него бывать и порой задерживалась в кабинете без объяснения причин. Я ведь биолог, говорила она, мне нравится ваш бесконечный эмоциональный резерв. Я на вашем месте выгорела бы еще год назад.</p><p class="p">Правду сказать, Вязаницын не очень любил жену Женю, он и на работе сгорал потому, что дома ему с ней было тошновато. Именно из-за нее он когда-то вышел из команды звездолетчиков — потому что Жене был нужен дом, ребенку — отец, и в интернат она его не отдавала, явно ломая мальчику жизнь, и квохтала над ним больше необходимого. Женя вообще не верила в коллективное воспитание. Она сама начиталась педагогических энциклопедий, прошла десяток курсов, не меньше, и считала, что будет для Алешки всем. Это вообще была мода последнего времени — не доверять коллективу, верить в семью, совместные походы и отпуска и все вот это. Вязаницын не отдавал себе отчета в том, что Женя была душная. И главное, Вязаницын был совсем не то, что нужно Жене. Получалось, он зря ушел из отряда. Им с Женей было замечательно в первые два года, но это приедается, и тогда оказывается, что самый прочный роман — производственный. Вот с Джиной он был бы счастлив, он часто представлял их общую жизнь и общего ребенка, веселого, легкого и независимого. Алешка был похож на Женю, а их с Джиной общий ребенок, например Стивен, был бы похож на Джину. И то, что Женю и Джину звали почти одинаково, тоже казалось Вязаницыну знаком судьбы, тайною милостью.</p><p class="p">Джина, однако, совсем его не любила, просто оба они были одиноки и страдали от невзаимности. Джина побывала замужем за очень, между прочим, талантливым художником, разошлась — художник оказался не особенно талантливый, и она понимала это давно, а месяц назад увидела Сурда. Сурд прилетел на выставку, привез картину. Картина была небольшая и вызывала острейшее чувство счастья. Джина не взялась бы определить, что на ней изображено. Кто-то говорил, что это вечернее мартовское небо в звездах и тучах, а кто-то — что океан на Маврикии, и одни утверждали, что все дело в ритмах — Сурд в последнее время все больше экспериментировал с ритмами, — а другие говорили, что в подсветке. Но дело было даже не в картине, а в самом Сурде. Ему было за шестьдесят, он был не по возрасту изношен работой и вечным недовольством, он знал, что может лучше всех, но этого было мало. Он однажды сказал Джине, что, если бы биологи нашли способ извлекать из человека его максимум, цены бы не было биологам, а так они научились только продлевать жизнь, которая, в общем, успевает человеку все показать уже за первые двадцать лет. Джина не решалась признаться Сурду до Волны, а после Волны совсем оробела. Она переехала к Матвею, потому что была ему нужна. Она жила с ним и мучилась. Это был какой-то девятнадцатый век, не то усадебный роман, не то анекдот: люблю я Петю, а живу с Васей. У Джины не было дела, потому что на Радуге не осталось никакой биологии. Зато было много консервов, и она экспериментировала теперь с ними. У Вязаницына каждый день было на обед что-то новое из консервированного мяса и соленых овощей, и Вязаницын умилялся до слез и повторял: “What this is I know not, but with gratitude, my tears fall”.</p><p class="p">И она не отнимала рук, которые он целовал, щекотал усами, но сама чуть не плакала от чувства вины. Как в старом романе: не любят меня — плохо, любят — плохо. Почему надо было обставлять размножение таким количеством психологических условностей?</p><p class="p">Самое же невыносимое — ибо невыносимей всего, когда падают сильнейшие и отказывают компасы, — заключалось в том, что Сурду надоела его живопись, он больше ею не занимался. Он понял древнюю поговорку о том, что после концлагеря — он забыл, какого, вообще немцы многое постарались забыть, — нельзя писать стихи. Оказывается, это касалось не только стихов. У Джины был свободный час, она к нему пошла, не в силах держать в себе этот переполняющий ее избыток любви и жалости, — и он сказал ей: все, Джина. Мы все время играли в игрушки, и каким же я был идиотом, когда просил капитана взять на Землю мою мазню. Мы все хотим, — он иронически говорил «хотимс», вообще ко всему теперь добавлял лишние буквы, делая слова окончательно смешными и бессмысленными, — мы все хотимс, чтобы от нас что-то оставалось. Но ни от кого не остается ничего, все теряет смысл сразу же после нашего исчезновения. Остается, в общемс, только то очень немногое, что мы умудрялись сделать в невыносимых обстоятельствах: собака, которую мы накормили, ребенок, которого мы утешили. Имеет смысл только живое, вся же материальная культура уничтожается в одно дуновение. Вот вы пришли, вы меня утешили, мне полегчало, спасибо; идите теперь.</p><p class="p">Он отсылал ее не потому, что любил другую, и даже не потому, что любил живопись. А просто Сурд был умный, хотя умс его был не вполне рационален, и этого умса ему хватало, чтобы понять: его можно было любить только за художество, и она его любила за этот миф, за то, что он был великий, и это величие ощущалось всеми, включая полных профанов по части живописи. Он был великий игрок в никому не нужные, оскорбительные игры. Теперь он ни во что подобное больше не играл, не мог играть, из него вытащили позвоночник, единственное, ради чего он мог быть терпим. И Джина, совсем не просто женщина, которую может вдохновлять слезливая бабья жалость, — прекрасно это почувствовала и действительно ушла. Ей вспомнилась история про супружескую пару, которая готовила друг другу рождественские подарки: она ему — цепочку для проданных часов, а он ей — гребень для отрезанных волос. Они все теперь любили друг друга за то, чего у них больше не было, и эта любовь на глазах истаивала, заносилась снегом. Все семь цветов Радуги превратились теперь в белый, как в детской игрушке, когда крутишь радужный зонтик, и все его пестрое сверкание на глазах превращается в снег.</p><p class="p">Конструкция, возникшая после Волны, поражала полным отсутствием всякого целеполагания — точнее, поражала бы, если б осталось кому наблюдать; но человека, способного взглянуть на ситуацию сколько-нибудь сверху, в Столице не осталось, ибо не было больше никакого верха. В самом деле, Вязаницын любил Джину за ее доброту и нежность, которых больше не было; Джина безумно любила Сурда за живопись, которой он больше не занимался; Сурд утвердился в мысли о безоговорочном примате жизни над искусством, но жизнь прекратилась. Таким образом, все трое смотрели не друг на друга, а в сторону; те они, какими они стали, совершенно никому не были нужны. До Волны всех объединяла общая система конвенций, не лучше и не хуже любой другой, — но Волна эту конвенцию опрокинула, и вокруг был снег, единственно только снегс, та субстанция, которая для своего существования не нуждалась ни в причинах, ни в цели. Она ни перед кем не отчитывалась. Любая пара из гипотетически возможных — Вязаницын и Джина, Джина и Сурд, Сурд и живопись — могла бы сказать о себе: какой бы мы счастливой были парой, мой милый, если б не было Волны. Но Волна была и отменила все, ради чего какая бы то ни было пара могла жить вместе.

    <strong>7.</strong></p></span>
