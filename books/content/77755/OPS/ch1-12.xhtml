<span><p class="p"><strong>Синдром Черныша </strong></p><p class="empty-line"/><p class="p"><strong>1.</strong></p><p class="p">Сначала была клиника неврозов, потом центр Морозова, потом опять клиника, уже другая, и все говорили: нормально, легкий случай, затем держали три недели, пожимали плечами и выписывали. Все было нормально, ела, пила, разговаривала, но не могла работать, не умела заставить себя по утрам встать с постели и сварить кофе, а по ночам сплошные слезы, никогда бы не смогла поверить, что в одном человеке может быть столько слез. Дело было уже не в Черныше и не в аборте. Что-то такое из нее вынули, без чего человек перестает держаться. Она со всей возможной доходчивостью объясняла это отцу, брату, профессору Дымарскому, молодому и славному человеку, перед которым ощущалось даже нечто вроде вины: десятый час вечера, домой давно пора — нет, он сидит с ней и ведет разговоры. Дымарский уверял, что поступает так из чистого эгоизма: твой случай, говорил он, войдет в историю. Ведь ты здорова. Ты самый здоровый человек в районе, а не только в клинике. Я могу заколоть тебя препаратами до полной обезлички, ты будешь, как Самсонова, видела Самсонову? — кивает — нет, не кивай, ответь словами: видела? Хочешь, как она? Никакой депрессии, очень довольная, имя только забывает, а так полный о’кей. Между прочим, домашние уже на все согласны. Но я-то вижу. Я вижу, что ты абсолютно в себе, не надо мне косить под психическую, я психических повидал. Была бы ты парнем, я понял бы, классический случай, армия впереди. Но тебе не грозит армия, от тебя требуется только собраться, это как в детстве перестать плакать, хотя хочется хныкать еще. Один раз глубоко вдохнула и пошла жить, Господи, люди теряли детей, родителей, проходили через Освенцим, что я тебе рассказываю, ты все знаешь, это позорная распущенность, в конце-то концов! Как было объяснить Дымарскому, что Освенцим не утешает, наоборот. Прежде ужас мира можно было переносить, хотя он торчал отовсюду: жалко было выброшенную газету, которая не успела все рассказать, сломанную ветку, не говоря уже про облезлую елку, которую она в марте, в первом классе, нашла на свалке и пыталась воткнуть в землю. Земля же влажная, вдруг приживется. Жаль было всех, всегда, но была какая-то защита. Теперь пробили дыру, и вся та влага, которая обволакивала душу, как околоплодные воды, весь этот защитный слой, который был как желточный мешок у малька, — все вытекло, и защита лопнула, и нечем залатать. Хорошо, говорил Дымарский, хотя она ничего не говорила. Допустим, это я понял. Прости, ляпнул сдуру. Конечно, не утешает и ничего не дает. Но вообразим невообразимое — заметь, я с тобой откровенен вполне, постарайся и ты так же. Хоть я-то тебе не кажусь монстром? Нет, вы не кажетесь. Отлично, тогда вообразим, что он вернулся. Это что-нибудь изменит? Он был готов к любой реакции — слезы, гнев, — но она только улыбнулась: нет, что вы, что вы, что вы. Это все равно как — она не подобрала сравнения, но он понял: все равно как предлагать вернуть Елену на пятый год Троянской войны или Судеты в разгар Сталинградской битвы. Поздно уже, какие Судеты.</p><p class="p">Ну вот что, сказал Дымарский отцу. Я вам советую сейчас не кипешиться и набраться терпения. Если честно, скорей уж вы мой пациент, чем она. Вам я могу помочь, а ей нет. Можно внушить человеку, что жизнь переносима, и подкрепить это таблеткой, но нет такой таблетки, которая объяснит, зачем она вообще нужна. Мы все, если угодно, ходим по тонкому льду, но этого не помним, а она вспомнила, причем после первой же трещины. На самом деле жить нельзя, это я вам как врач говорю, но если живем — надо соблюдать какие-то конвенции. Вот с ней не соблюли эти конвенции, и она теперь не понимает, как можно существовать вообще, когда — ну что я вам объясняю… (Он видел, что отец не понимает: человек действия, привык, что из любой ситуации есть конкретный выход, а если нет, надо доплатить.) Я вам предлагаю больше по клиникам ее не таскать, только хуже сделаете. Она вся сейчас без кожи и не желает ею обрастать. Это случай не медицинский.</p><p class="p">— Может быть, гипноз? — невпопад спросил отец.</p><p class="p">— Поймите, тут никто посторонний ничего не сделает, — с тоской произнес Дымарский. — Это она, она сама себя должна загипнотизировать. Как гипнотизируем мы, вы, я, любой на улице встречный идиот. Каждый с утра, в первую минуту пробуждения, чувствуя, так сказать, бремя мира, внушает себе, что жизнь приемлема. У нее сломался клапан, который за это отвечает. Он может заработать, пробуйте возить, развлекать, ни в коем случае не навязываться, потом, может быть, вернется интерес к учебе, интеллект не поврежден, годы ее позволяют надеяться — восемнадцать лет… Я буду приходить, наблюдать, телефон у вас есть, звоните в любое время, но от лечения, честно вам скажу, лучше воздержаться.</p><p class="p">Отец, конечно, не поверил, и была еще одна клиника — как она догадывалась, на пределе средств — элитная, в районе Профсоюзной, неподалеку от больницы Академии наук. Палата на одну, с телевизором — санаторий, а не клиника. Знаменитый профессор, на которого вся надежда, старый, длинный, сухой, все больше молчал. Он решился все-таки попробовать гипноз, но толку не было. За оградой начинался лесопарк, и однажды, когда она гуляла — тут гуляли без присмотра, в пределах территории полная свобода, — к ней подошел Антон, он же Черныш.</p><p class="p">Она много раз представляла себе, как это будет, потому что в глубине души всегда знала — будет; так душа на самом дне все-таки знает, что бессмертна. Идея мести отбрасывалась сразу: отомстить никому нельзя. Если бы он пришел через неделю, еще до всего, была бы надежда на временное помрачение, с кем не случается. Если бы пришел после, когда вся семья дружно возила ее лицом по стене — образно выражаясь, конечно, — за то, что никому ничего не сказала и пошла выскребаться, она бросилась бы к нему как к спасению от семьи, и простила бы, и обошлось. Если бы он пришел в первый месяц, была бы надежда, что связь между ними никуда не делась, он почувствовал, как все плохо, и вернулся. Но он не почувствовал, прошло четыре месяца, без нее начался учебный год, про нее уже мало кто помнил, и постепенно Черныш в ней умер, как умирает, говорят, нежизнеспособный зародыш. И если бы он пришел прежний, здоровый, веселый, излучавший счастье, она бы оттолкнула его, даже не слишком сильно, спокойно, как лодочник отпихивает бревно, — но он пришел страшный, черный, изглоданный раскаянием, изменившийся даже больше, чем она.</p><p class="p">— Как ты прошел? — спросила она вместо приветствия и всякого выяснения отношений. Они стояли среди опавших листьев у черной холодной решетки, он боялся взглянуть ей в глаза и носком ботинка разгребал листву, и ботинок тоже был старый, обшарпанный, она никогда его не видела в таких. Кто-кто, а Черныш за собой следил. Этот ботинок сказал ей больше, чем все слова, которые он мог бы выговорить и которые застряли у него в горле.</p><p class="p">— Я давно тут хожу, — выдавил он наконец.</p><p class="p">— Почему?</p><p class="p">Он молчал.</p><p class="p">— Мне очень плохо, Черныш, — сказала она. — Я думаю, я уже никогда ничего не смогу.</p><p class="p">— Я тоже, — сказал он и поднял глаза. В них плескалось столько боли, словно в разлуке с ним прошло не четыре месяца, а четыре раза по четыре года, и каждый день в эти четыре года он истязал себя; и она подошла и ткнулась растрепанной головой ему в грудь. Он даже словно стал ниже ростом — теперь ее макушка приходилась ему под самый подбородок.</p><p class="p">— Как-нибудь надо жить, да? — сказала она и почувствовала по движению этого острого подбородка, что он кивнул.</p><p class="p">— Я убийца, — сказал он вдруг.</p><p class="p">— Это я убийца, — сказала она. — Но они там сказали, что есть еще шанс… есть же еще шанс?</p><p class="p">Он опять молча кивнул и обнял ее наконец, и так они стояли, пока не стемнело. Потом он ушел, но на следующий день пришел снова, и начал было рассказывать, как страшно было без нее, но она его остановила. Зачем? Чужая боль оказалась целебней любого лечения. Жить можно было опять, только бы он никуда не делся; какое глупое слово «простила». Ожила — вот это то, что надо.</p><p class="p">Через неделю она выписалась из больницы, отец снял им квартиру, и они впервые стали жить вместе — не ночевать, а жить.

    <strong>2.</strong></p><p class="p">Первый месяц был поистине медовым, но на второй она стала замечать, что медицинская помощь, пожалуй, требовалась не ей, эгоистке и дуре, а ему. Подтверждалась старая мужская шовинистическая максима: вы чувствуете глубже, но излечиваетесь быстрее. Вы приземляетесь на четыре лапы. Вы природнее, а потому и раны ваши затягиваются быстрей, как заплывает смолой шрам от топора на сосне. Так оно и выходило: прежний Черныш, всегда веселый и легкий, исчез безвозвратно. Всегда такой ровный, такой неуязвимый, способный взять себя в руки — да что там, не выпускающий из них! — теперь он чередовал эйфорию с беспросветной апатией, и она не знала, что хуже. Пожалуй, эйфория. Тогда его болезнь была еще наглядней: ничто так не подчеркивает уродства, как желание урода выглядеть здоровым, на костылях поспешать за физкультурниками. Вот увидишь, говорил он, я преодолею это и смогу… я доучусь… я устроюсь, вот увидишь, мне же предлагали приличные места! В конце концов, архитектор — это сейчас нужно. Все как бешеные взялись перестраивать квартиры, и еще это… ландшафтный дизайн. Но помилуй, какой же ты архитектор? Ты учился вместе со мной на биолога, тремя курсами старше; рисование — твое увлечение, не более… Все это она могла бы ему сказать, но не говорила. Если после нескольких эскизов — славных, но аляповатых — он считает себя художником, и даже — поди ты — архитектором… Он рисовал и ее, как раньше, в одежде, без, на улице, на балконе, — но в новой, отталкивающей манере: на этих картинах она сама на себя не была похожа. Что это? Почему раньше было столько света, а сейчас сплошная тень? Хорошо, говорил он и рисовал ее на солнце, но получалось еще страшней — беспощадный белый свет и под ним она, съежившаяся на скамейке. Что с тобой, Черныш? — спрашивала она.</p><p class="p">Он устроился куда-то на работу, но когда не было заказов, часами лежал лицом к стене. Иногда она подозревала, что дело не в заказах, а в этом его отвратительном внутреннем календаре: месяц бешеной активности — два месяца сонной тоски. Она посоветовалась даже с Дымарским, когда он — из чисто научного любопытства, все человеческое старательно отрицалось — зашел навестить их. Ну вот, сказал он удовлетворенно, что я говорил. Здорова, как сорок тысяч братьев. И даже пирог — о, какой пирог! Вижу, что покупной, но как старательно разогрет! Что касается Черныша, сказал он, когда вышел с ней курить на балкон, что ж, бывает — а прежде ты не замечала? Нет, что вы, он был удивительно ровен… Ну так тем лучше, сказал Дымарский. Значит, переживает. Иногда человеку нужно переживать, а то уже почти научились спасаться от совести таблетками. Чуть что, сразу МДП, МДП! Знаешь ли ты, глупая, что такое МДП? Это серьезное заболевание, не твоему чета. Это когда человек в маниакальной стадии от избытка энергии спать не может, а в депрессивной ему трубку поднять тяжело. Не придумывай своему красивых болезней, сегодня депрессия — самое модное слово, а он просто человек с совестью, и скажи спасибо. Спасибо, сказала она, но просто вы не знали его тогдашнего. Не знал, кивнул Дымарский, и не жалею. Теперь он, по крайней мере, на человека похож. Жениться не думаете? Нет, сказала она, почему-то не хочу.</p><p class="p">После очередной неудачи — клиент сорвался в последний момент — он три ночи где-то прошлялся, а потом вернулся, тихий и покаянный, изменив тон, прическу и профессию. Ничего, сказал он ровно, попробуем с другого конца. Не забывай, у меня есть и первое образование, неоконченное, правда, но кое-что — переводческое, английский плюс португальский, попробуем.</p><p class="p">К такой резкой смене она оказалась не готова, но это было лучше, чем прыжки из эйфории в отчаяние и обратно. Он стал нормально спать по ночам — правда, закурил, но от нервов чего не выдумаешь, — начал делать зарядку, искать заказы, скоро набрал, и начались невеликие, но регулярные заработки. Он с равной готовностью брался за технический, юридический и даже художественный перевод, ночами просиживал за компьютером, и — странное дело — она не жалела, что он не спит рядом. Почему-то после этого его внезапного оздоровления он не то чтобы перестал ей нравиться — что там, она его любила, ничего не могло быть проще, родней и естественней, чем любить Черныша, — но в постели все стало далеко не так хорошо, как во время депрессивно-эйфорических метаний. Сдвинулся какой-то рычажок — то ли ушла острота, то ли сам он стал, как бы это назвать, бесстрастней. Ей по-прежнему было хорошо с ним — хорошо лежать, просыпаться, готовить ему, по воскресеньям болтаться по парку, кататься на велосипедах — он очень пристрастился к велосипеду, — да и как могло быть плохо с Чернышом? Это же был он, часть ее существа, — и она утешала себя тем, что с родным в самом деле не может быть так, как с чужим, еще новым, непривычным, вот так она образуется, привычка, нарастает новая кожа, и неужели она хотела бы прежней боли, пусть оборачивающейся иногда невыносимым счастьем? Нет, конечно. Конечно, нет.</p><p class="p">И все-таки он стал другой, другой настолько, что Дымарский, зайдя год спустя, не узнал его. Он быстро справился с собой, но первой реакции скрыть не смог.</p><p class="p">— Что, очень изменился? — спросила она тревожно, провожая его вниз до машины.</p><p class="p">Дымарский смотрел внимательно и, как ей показалось, сочувственно.</p><p class="p">— Меняются люди, — сказал он неопределенно. У него было правило — не врать, почти невыполнимое при его профессии, но он хотя бы старался.</p><p class="p">— Я сама чувствую.</p><p class="p">Он посмотрел еще внимательней.</p><p class="p">— Как тебе легче, так и делай.</p><p class="p">— В основном все по-прежнему, — уговаривала она не то его, не то себя. — Это же Черныш. Ему все-таки двадцать четыре уже. Пора остепениться, он сам говорит.</p><p class="p">— Рановато. Мне вот тридцать восемь, лысина уже, и никакой степенности.</p><p class="p">— Ну какая у вас лысина…</p><p class="p">— Обычная, — сказал он. — Как он, работает?</p><p class="p">— Да. Но главное, больше не болеет. Зарабатывать я и сама теперь буду — вон редактором на радио звали…</p><p class="p">— Тебя учили не этому.</p><p class="p">— Какая разница. Сейчас все не по специальности. Скажите — вам со стороны видней, — в чем он изменился? Я же каждый день вижу, глаз замыливается…</p><p class="p">Дымарский снова долго молчал, стоя у своего древнего «мерса» и глядя прямо на нее.</p><p class="p">— Потолстел, — сказал он наконец, и непонятно было, то ли шутит, то ли всерьез. Наверное, он был в меня чуть-чуть влюблен, думала она, поднимаясь в лифте обратно. Это бывает между пациентками и врачами. Главное, что мы не дали этому ходу, и теперь он подспудно завидует. Это естественно. Вид Черныша — его спины, его монитора, чашки чаю сбоку от мышиного коврика — ее успокоил и странным образом слегка огорчил: какая широкая спина, подумала она, правда, что ли, потолстел?</p><p class="p">И он словно почувствовал этот взгляд и взялся работать над собой с таким энтузиазмом, что она впервые испугалась. Он забросил велосипед, потому что от велосипеда сутулость, и прекратились их чудесные прогулки. Зато началось прослушивание бесконечных телебесед с целителями, которых стало в ящике больше, чем когда-либо, словно вся страна одновременно отчаялась излечиться традиционными способами, и надежда осталась только на уринотерапию. До этого, слава богу, не дошло, но постоянные замеры температуры, артериального давления, согласование каждого шага с врачами — все это поначалу смутно раздражало, а вскоре начало ее бесить. Она помнила, что это Черныш, тот самый, с которым она живет два года, тот, из-за которого когда-то чуть не погибла, тот, наконец, от которого она все еще надеялась зачать ребенка. Теперь он согласовывал это занятие с фазами луны и другими приметами, которых она не понимала. Он бегал по утрам, вместо чая пил отвары, кофе исключил напрочь и укоризненно качал головой, когда она утром приводила себя в чувство обжигающим горьким глотком, и она впервые задумалась о том, что мужчина в наши времена не может реализоваться уже ни в чем — ему остается бешеная, абсурдная забота о своем здоровье, хотя для чего беречь такую жизнь? Переводы он забросил, напросился в бизнес к другу, торговал теперь запчастями, друг был сомнительный, очень неприятный — Черныш перед ним явно заискивал, только что не приседал: ну посмотри, Рома, какая она у меня. Правда же, хороша? Рома смотрел сонно, как смотрят только самые хищные рыбы. Черныш, откуда ты взял этого Рому? Ты мне никогда раньше не показывал его. Повода не было, солнце, говорил он, и это «солнце» тоже появилось недавно — раньше был «малыш», тоже не очень приятный, напоминающий о другом, теперь уже, кажется, невозможном малыше. Но Черныш продолжал сообразовываться с фазами луны.</p><p class="p">— Слушай, — сказал он однажды, — давай, может быть, поженимся?</p><p class="p">Два года назад чего бы она ни отдала, чтобы он так сказал; но сегодня ее даже слегка передернуло, и эта его новая манера спать в майке, которую он вдобавок не слишком часто менял…</p><p class="empty-line"/><p class="p">Странней всего, однако, была появившаяся недавно привычка красить волосы. Она объяснила это себе тем, что так он убегает от чувства вины. В конце концов, все раз навсегда перед кем-то виноваты и теперь маскируются, меняют профессию, любовников, стараются выдать себя за другого. Но количество его странностей стало зашкаливать: она стерпела бы эту рыжину, искусственную, совершенно ему не идущую, но не могла понять, почему он стал выдумывать биографию. Знаешь, сказал он однажды, вот в армии был у нас старшина… Она перебила: Черныш, какая армия? О чем ты, в конце концов? Кому ты врешь? Он смотрел, как баран: что ты, я же тебе рассказывал! Что ты мне рассказывал, взорвалась она впервые за все эти два года, как ты, идиот, мог мне рассказывать то, чего не было! Следи за собой, как женщина, простаивай часами у зеркала, крась волосы, но не ври, что ты был когда-то в какой-то армии, этого не было, кому, как не мне, знать твою жизнь! Но я военный билет тебе покажу, прошептал он. Тогда почему ты молчал?! Ты не спрашивала…</p><p class="p">Это она уже отказывалась понимать и позвонила Дымарскому: пожалуйста, если можно, ничего срочного, но в субботу… где хотите… Он подъехал, презрительно поморщился при вопросе о деньгах, сказал, чтобы звонила при первом подозрении и даже без него, просто по-дружески. Ну что? А то, что у него нарастает какая-то новая личность, и я не знаю, что с этим делать. Возможно, он так бегает от сознания вины, от того, что зачать не получается… Синдром Черныша, берите название, дарю. Однако, усмехнулся Дымарский. Поначиталась литературы и понаслушалась разговоров. Какая новая личность, с чего? Не знаю с чего, он врет, что служил в армии. Почему ты думаешь, что врет? Может, действительно служил? Но послушайте, этого не может быть. Я была знакома с его матерью… немного, еще до всего. Она меня возненавидела, сейчас мы не видимся. Но клянусь вам, что тогда он не служил, она еще говорила, как страшно было бы отдать в армию такого чистого, такого кристального… Дымарский неприятно усмехнулся. Понимаю вашу иронию, но я не могу смотреть, как близкий человек, фактически ближайший, фактически муж, фактически сходит с ума! Попроси показать военный билет, сказал Дымарский неожиданно холодно. Она вскинула на него глаза: боюсь. Боюсь, потому что тогда окажется, что он еще и билет подделывает для каких-то своих целей.</p><p class="p">— О-о-о, как все прочно, — сказал Дымарский. Она не поняла этой фразы.</p><p class="p">— Кстати, дай ему мой телефон, — попросил он.</p><p class="p">— Зачем?</p><p class="p">— Мало ли. Вдруг заметит за собой странности, испугается… В конце концов, я друг дома.</p><p class="p">Она удивилась — ей не хотелось делиться Дымарским, — но телефон дала.

    <strong>3.</strong></p><p class="p">Неделю спустя, за обедом, она вдруг перестала понимать, что он говорит.</p><p class="p">Он пришел с работы, она в тот день была дома, писала диплом. Сварила борщ. Он ел борщ и повествовал о новостях с неожиданно тягучей, занудной интонацией, какой она прежде у него не слышала, даже когда он рассказывал о своих невыносимых фазах луны. Какие-то шпиндели, какие-то Ивановы… Какие Ивановы? — спросила она, еле сдерживая брезгливость. Он поднял бараньи глаза: как, но ты же сама… Что я сама?! Но мы же были у них позавчера! Мы не были у них позавчера, я не знаю никаких Ивано… но тут, вглядевшись в его расплывающиеся, стремительно одрябшие черты, она зажмурилась и затрясла головой. Она не знала этого человека.</p><p class="empty-line"/><p class="p">Он замер с ложкой на весу и даже, кажется, с открытым ртом, а она все трясла головой, словно надеялась вытрясти оттуда новое знание: это был не он, она его не знала, сквозь черты Черныша проглянула жуткая, пластилиновая рожа, рожа человека из спального района, какой не было и не могло быть у ее мужчины. Она слыхала, что безумие меняет людей, но не так же, в одночасье. В кого он превратился? Маска молодого, пусть странного, пусть рыжего, но все еще любимого, треснула и обвалилась, как грим: за этим новым лицом стоял долгий опыт полунищей жизни, утеснений, унижений, постыдного вранья, бессмысленных стоячих застолий с мужиками в пивняке, от этой рожи пахло прогорклым маслом, он сразу стал похож на мать, Боже, как он стал похож на мать, какое дряблое, бабье из него поперло! Как она могла этого не видеть! С такого сталось бы пить мочу. И когда он робко спросил: что с тобой, киска? — этой киски она уже не вынесла, бросилась в комнату, рухнула на диван и закусила зубами подушку. Но и сквозь подушку продолжала выть, а на все его попытки подойти отвечала таким визгом, какого и представить не могла, — неужели это она сама, сама так орет? Но вообразить, что он прикасается к ней, было еще немыслимее.</p><p class="p">Дымарский приехал через два часа, когда она уже охрипла: раньше не мог, пробки, город стоял.</p><p class="p">— Ну, я где-то в это время и ждал, — сказал он Вите, когда она спала после укола. — Кстати, она вас так и не звала по имени?</p><p class="p">— Никогда. Только Чернышом. Я все удивлялся, откуда эта кличка.</p><p class="p">— Надо было мне вас предупредить, — сказал Дымарский. — А впрочем, это все равно кончалось. Очень быстро пошло.</p><p class="p">— Все-таки я не представляю, — после паузы признался Витя. — Не могла же она в самом деле…</p><p class="p">— Запросто могла, — убежденно ответил Дымарский. — Я же говорил… правда, не вам, а ее папе… но какая разница? Мы все на одно лицо… Я говорил, что все мы ходим по тонкому льду. И если не внушать себе на каждом шагу что-то другое, а просто видеть вещи как есть, — не выдержит никакой мозг, никакой рассудок… Я и ей говорил: если что-то спасет, то только самогипноз. Это сильней любого чужого. И когда к ней в клинике подошел мальчик из соседнего корпуса, банальный МДП, ерундовый, в общем, случай, — она могла заговорить с ним на единственном условии: представив, что это и есть Черныш… которого я, кстати, никогда не видел.</p><p class="p">— Но почему вдруг на ровном месте?! — взорвался Витя. — Я ничего не делал, сидел, ел…</p><p class="p">— Вы ни при чем, — сказал Дымарский устало. — Это как таблетка: кончилось действие — кто виноват? Только здесь она научилась сама, а резерв оказался не бесконечен.</p><p class="p">— Но как можно жить с четырьмя, как вы говорите, мужчинами и внушать себе, что все это один и тот же?</p><p class="p">— А зачем внушать? — усмехнулся Дымарский. — Все мы один и тот же, и я, и вы… Земля вокруг солнца или солнце вокруг земли — выглядит одинаково, нет? И потом, я столько перевидал… с самыми экзотическими маниями, уж поверьте… все более или менее похожи, всем страшно, все хотят одного, иногда и правда перепутаешь… Синдром Черныша, так и назову. Я давно за этим случаем слежу, уже и описал. Теперь можно публиковать.</p><p class="p">— А как вы думаете… — с надеждой начал Витя, но Дымарский оборвал неожиданно жестко.</p><p class="p">— Никак не думаю, — сказал он. — Знаю. Что, красивая? Нравится? Самому нравится. Ничего не поделаешь, теперь все. Двух самогипнозов не бывает. Раньше надо было думать, дорогой товарищ, когда ребенка ей сделал и сбежал.</p><p class="p">— Какого ребенка, куда сбежал? — лепетал Витя, но Дымарский уже отвернулся.</p></span>
