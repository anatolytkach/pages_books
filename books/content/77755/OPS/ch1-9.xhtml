<span><p class="p"><strong>Председатель совета отряда </strong></p><p class="empty-line"/><p class="p"><strong>1.</strong></p><p class="p">Борисов пришел в восьмой класс нашей частной школы «Циркуль» не как нормальные новички — к началу учебного года, — а со сдвигом, к концу октября, перед осенними каникулами. В этом сдвиге тоже было нечто тревожное. Русичка Рита коротко и невнятно объявила, что к нам прибыл новый товарищ из-за границы, прошу любить и жаловать. Заграницей нас было трудно удивить, в «Циркуле» училась элита, но главным образом те, кто не усидел в Летово или Дубках. Народ вообще был пестрый и не сказать, чтобы благополучный: родители занимались деньгами, карьерами, иногда — если женились на молодых — друг другом (у нас полкласса были из таких семей — отцы после первых успехов обзаводились свежими подругами, а детей в виде компенсации устраивали в дорогую школу, где их не напрягали науками и часто возили в увеселительные поездки). Люди мы были тертые, рано повзрослевшие, всякого повидавшие и обиженные на мир. До прямого буллинга доходило редко, но дружелюбия тоже не наблюдалось.</p><p class="p">Борисов был высок, желтоволос и сосредоточен. Решились подвергнуть его дежурству. Это было у нас обычное развлечение, проба на слабину. Дежурство в «Циркуле» не предусматривалось, порядок в классах наводили специальные люди, во время перемен они быстро стирали следы маркера с белых скрипучих досок, после занятий профессионально мыли полы, приводили в порядок буфет и вообще делали все, за что у состоятельных людей отвечает горничная. Борисову сказали, что в качестве новичка он должен после занятий вымыть пол и тщательно прополоскать губку. Некоторые новички к общей потехе принимались неумело мыть полы, другие залупались и получали по шее (либо, если сами могли дать по шее, перемещались на следующую ступень общества). Борисов выслушал информацию очень спокойно, глядя прямо в глаза Биргеру, который взял на себя инициацию, и сказал, как бы удивляясь незнанию элементарных вещей:</p><p class="p">— Но меня не назначают дежурным. Я председатель совета отряда.</p><p class="p">Никто понятия не имел, что это такое, но выглядел и звучал он так уверенно, что Биргер несколько опешил.</p><p class="p">— Ну и что, — сказал он. — У нас тут без разницы. Пришел — значит, дежуришь. Это школьная традиция.</p><p class="p">Слово «традиция» в последнее время объясняло все.</p><p class="p">— Это меня не касается, — холодно сказал Борисов. — Председатель совета отряда действует по регламенту.</p><p class="p">Отец рассказывал мне что-то такое из пионерского детства (я поздний ребенок, и мой старик застал времена глубокого совка), так что термин был мне смутно знаком. Я помнил, что это нечто идейное и выборное. До новой пионерии дело не дошло, но быстро к ней катилось.</p><p class="p">— Мы тебя не выбирали, — сказал я Борисову, чье спокойствие начало меня бесить. Он казался старше всех наших. Глаза у него были интересные, ярко-зеленые с ржавыми пятнами. Казалось почему-то, что у него должны быть веснушки.</p><p class="p">— Конечно, — сказал Борисов. — Вы и не могли меня выбирать. Это не ваша обязанность.</p><p class="p">— А чья? — спросил Биргер.</p><p class="p">— Этого вам знать совершенно не нужно, — ответил Борисов не нагло, а скорее сочувственно. Он как бы жалел нас, которым не нужно знать такую интересную вещь.</p><p class="p">— Ну вот что, — решил подбавить жару Гороховский, человек скандальный и обидчивый. — Быстро пошел набрал воды, швабра в туалете на пятом этаже, вымыл пол и стер с доски, потом доложился охране внизу и кыш из школы на все четыре.</p><p class="p">— Ничего подобного не бывает, — странно ответил Борисов. Он держался так, словно за ним стоял не только школьный охранник, но и личный охранник, и ангел-хранитель. Он небрежно отодвинул Биргера и пошел к выходу.</p><p class="p">— Э, э! — крикнул было Биргер, но тут я почувствовал, что трогать этого человека не надо, что мы можем сделать себе хуже и что даже победа над ним не доставит нам никакой радости</p><p class="p">— Оставь его, Семен, — сказал я по возможности презрительно. — Мэн не в себе.</p><p class="p">Борисов остановился и внимательно на меня посмотрел.</p><p class="p">— А позвони домой, — сказал он с тем же непонятным сочувствием.</p><p class="p">— Кому? Тебе, что ли? — Как уже сказано, я был поздним ребенком и всегда боялся, как бы чего не случилось с отцом. Старик был тогда еще крепок и никогда не жаловался, но я его любил и беспокоился, когда он вдруг задремывал во время разговора или беспричинно вздыхал за обедом.</p><p class="p">— Позвони, — повторил Борисов и вышел. За ним никто не приехал, я видел в окно, как он вышел из школы и с рыжей кожаной сумкой на плече неторопливо пошел к выходу из нашего двора, в котором доцветали последние астры. У него был вид человека, который никуда не спешит и никогда не опаздывает. Он двигался сосредоточенно, вот как я подумал о нем.</p><p class="p">— Он …нутый, — сказал Биргер.</p><p class="p">— От…дить всегда успеется, — сказал я и, хотя мне не хотелось звонить при наших, набрал отцовский номер. Отец был недоступен. У него, вероятно, шло совещание, или его вызвали в министерство, куда вообще в последнее время дергали часто — они все время там теперь совещались, пытаясь остановить неизвестно что. Мне, однако, стало тревожно, даже руки вспотели. Я набрал мать, но она не ответила. Старшая сестра была у себя в Вышке и знать ничего не могла. Я договорился сегодня идти с Гороховским к нему — проходить «Атаку дронов», но вместо этого вызвал шофера и рванул домой, сам себя презирая за идиотскую тревогу. Конечно, отец вернулся к девяти и был в полном порядке, мать была очень тронута моим беспокойством и сказала, что я добрый мальчик, но вместо того чтобы возненавидеть Борисова, я ощутил, как говорил во время аттестаций историк Бархатов, неприятный трепет в членах.</p><p class="p">Дело в том, что к чему-то такому шло, и важной частью этого была именно «Атака дронов». Мы как раз получили седьмой выпуск, рассылал ее по подписке таинственный Мистер Рипер, жил он то ли в Израиле, то ли в Португалии и кому-то даже отвечал на письма, я лично видел пару его посланий, предупреждавших о сумрачном и непонятном, но с непременным вкраплением пары точных слов и узнаваемых примет. Игра была очень так себе, но всегда обрывалась на самом таинственном месте, а следующий выпуск всегда начинался с другого, не менее таинственного. Герои каким-то образом участвовали в войне, ходили по разбомбленным городам, искали непонятные артефакты в виде обломков странной техники, инопланетной с виду, и иногда бесследно исчезали. Играло страшное количество народу, и кто-то, говорят, даже встречался в реале, но сам я ни на одну такую встречу пока не попадал. У меня было подозрение, что разведчик Глюк — девочка, причем красивая и опытная, что-то такое чувствовалось в ее манере держаться, и я много раз ей намекал, что хорошо бы пересечься в «Неоне», исправно работавшем, несмотря на все ограничения, — но она туманно отвечала, что сейчас не время.</p><p class="p">Все это, включая Борисова, складывалось одно к одному: еженедельные рассылки «Дронов», в которых война становилась все кровавее, ужасное настроение отца, который уже и не пытался его скрывать, затянувшаяся золотая осень, из-за которой казалось, что оттянутая пружина бьет больнее, — и теперь еще этот на наши головы председатель совета отряда, профессор кислых щей, с его повадками право имеющего. Я хотел уже на следующий день очень серьезно сказать, что мои домашние дела — не повод для шуток и пусть он лучше подумает про свое здоровье, но как раз ночью у нас взорвался котел, чего в поселке до сих пор не бывало; конечно, вовремя подняли тревогу и привели отопление в норму, до пяти утра длился переполох, и отец на всякий случай вызвал людей из Следственного комитета. В «Циркуль» меня не повезли, а там и пятница, и в следующий раз я увидел Борисова только через три дня. Он один сидел за последним столом в среднем ряду и рассеянно слушал историка, периодически делая пометки в темно-зеленой тетради Pelican с бархатной обложкой.</p><p class="p">На него как-то быстро перестали обращать внимание. Он почти ни с кем не разговаривал, мало ел во время завтраков, с собой ничего не приносил и после уроков сразу уходил домой. Или не домой — черт его знает, куда он направлялся через двор этой сосредоточенной походкой, не глядя по сторонам и не вынимая рук из карманов. Он всегда был очень хорошо одет, и все это замшевое или кожаное прекрасно на нем сидело, но очень скоро я забывал, что это, собственно, было. А очень скоро всем стало не до него, наметилась поездка в Питер, и Борисов не напоминал о себе до тех пор, пока его не вызвал физик. Странно, я даже не помню толком, о чем шла речь.</p><p class="p">— Мне это не очень интересно, — сдержанно ответил Борисов.</p><p class="p">Физик Шатунов и сам был тот еще фрик, с великими, как говорили, заслугами в прошлом, — будто бы он раньше работал на оборонку, но, не желая продавать душу, ушел в теорфизику, зарабатывал репетиторством и почти уже открыл что-то чрезвычайно великое, в чем разбирались на свете три человека — двое в Йеле и один в Принстоне. Объяснял он крайне необычно, но если немного напрячься — понятно; мне, во всяком случае, суть его объяснений открывалась после некоторого скачка, как при вглядывании в объемную картинку, когда сначала все хаос, хаос, а потом вдруг зая на задних лапках. Надо расслабить глазной нерв — и вдруг разверзается объем, и в следующую секунду уже непонятно, как этого не видят другие. Шатунова любили, считали безобидным и никакого издевательства над ним не потерпели бы.</p><p class="p">— Если ты не понял, — Шатунов никому не выкал, — можно подойти после уроков, я, может быть, что-то подскажу.</p><p class="p">— Да нет, что там не понять, — с легкой досадой сказал Борисов. — Дженкинсу, например, это тоже неинтересно.</p><p class="p">— Какому Дженкинсу? — не понял Шатунов; видно было, что об этом физике, или кто он там был, он слышит впервые, а это было как минимум маловероятно.</p><p class="p">— Такому Дженкинсу, — терпеливо сказал Борисов. — Еще такой есть Шариф. Ему тоже неинтересно.</p><p class="p">Тут подал голос Хвостенко, который в физике разбирался лучше всех, регулярно ездил на олимпиады, готовился в МФТИ и время от времени консультировался у Шатунова насчет особенно заковыристых задачек. Всего Сканави он перерешал к шестому классу.</p><p class="p">— Юрвас, — сказал он со своего третьего стола, за которым сидел с Юдиной, такой же продвинутой. — Вы на него не обращайте внимания. Он не знает ни черта, но очень грамотно себя позиционирует.</p><p class="p">— Он вообще …нутый, — выкрикнул любимую формулу Биргер.</p><p class="p">— Подумаешь, ну не физик, но почему сразу …нутый? — сказал Шатунов, явно радуясь поддержке. — Ты не стесняйся, — обратился он уже к Борисову, — если не сразу все понятно, я в конце концов объясню. Ты у нас человек новый…</p><p class="p">— Я человек новый, — скучно протянул Борисов, слегка наклонившись вперед и упираясь длинными пальцами в стол, — вы человек старый, спасибо, я ценю вашу предупредительность.</p><p class="p">Юрвас поперхнулся, но проглотил это.</p><p class="p">— Борисов, — сказал он проникновенно, — мне кажется, твои комплексы осложняют тебе учебу. Будь проще, и само пойдет.</p><p class="p">— У кого другого пошло бы, — грустно ответил Борисов. — Но я председатель совета отряда.</p><p class="p">— Чего ты председатель? — удивился Юрвас.</p><p class="p">— Я председатель совета отряда, а еще бывает предатель совета отряда, — сказал Борисов и уставился глазами с рыжими искрами прямо в переносицу Юрвасу, как будто именно Шатунов и был предателем совета отряда, успешно скрывающим этот ужасный факт из своего пионерского детства. — Но я не предатель совета, поэтому у меня не получится быть проще.</p><p class="p">Юрвас помолчал с полминуты, шумно высморкался и продолжил с того места, на котором задал Борисову вопрос про физический смысл калории, а Борисов сел на свою камчатку и продолжил делать пометки в «Пеликане».</p><p class="p">На перемене он сразу подошел к продвинутому Хвостенко и сказал ему с чрезвычайно приятной улыбкой, какой я никогда прежде у него не видел:</p><p class="p">— Поздравляю, дорогой товарищ. Теперь вы член совета отряда.</p><p class="p">Он достал из кармана своей замши глянцевый прямоугольник и протянул его Хвостенко, который попервости отшатнулся, но потом послушно взял карточку.</p><p class="p">— Звони, если что, — сказал Борисов, поднес к виску два пальца, как бы салютуя, и отошел.</p><p class="p">Я немного выждал для приличия и подошел к Хвосту. Он всегда меня консультировал, если было надо, и вообще был человек добродушный, целиком сосредоточенный на тайнах мироздания, мало кому интересных.</p><p class="p">— Можно глянуть? — спросил я тихо.</p><p class="p">Хвост не стал мне показывать карточку и вообще смутился.</p><p class="p">— Там телефон, — сказал он еще тише, — больше ничего.

    <strong>2.</strong></p><p class="p">Само собой, я тут же вбил в поисковик этого Дженкинса — по-русски и по-английски; самый известный Дженкинс оказался автором одной музыкальной пьесы в минималистском духе, выражавшей, как было сказано, крайнюю тревогу; нашелся и ролик, на котором очень толстый и очень печальный человек дирижировал струнным оркестром, а оркестр играл пьесу, в которой повторялась одна и та же действительно быстрая и тревожная тема, как будто толстяк запыхался и никак не мог начать говорить, но знал безусловно что-то неприятное и касающееся всех. Все остальные Дженкинсы вообще ничего из себя не представляли — где-то жили, состояли в каких-то сообществах и выкладывали снимки своих семейных торжеств. Но ситуация продолжала меня тревожить, и вид Хвоста мне не очень понравился, а потому я рискнул написать Мистеру Риперу. Никогда нельзя было предугадать, на что он ответит: иногда его спрашивали о вопросах жизни и смерти, о смертельной любви или об эмиграции, — а он молчал или отделывался глумлением, но иногда какой-нибудь идиот спрашивал, как провести дома наиболее забавные опыты с полиакрилатом натрия, — и он вдруг начинал в деталях рассказывать, как извлечь его из памперса. Короче, я обнаглел и со всеми респектами спросил его на голубом глазу, что почитать о Дженкинсе и насколько вообще релевантны (я недавно выучил это слово) его мнения о современной физике.</p><p class="p">Рипер думал около суток и неожиданно ответил:</p><p class="p">— My young friend! I highly recommend you never ask such questions, especially in conversation with people whom you don’t know thoroughly. Should you also ask me about Sharif!</p><p class="p">Про Шарифа я помнил, и с этого дня Борисов стал занимать меня всерьез, если можно так сказать о человеке, про которого ты ничего не можешь узнать. Разумеется, первая моя мысль была о том, что Борисов и есть Рипер; в конце концов, Риперу свободно могло быть пятнадцать лет, бывают и не такие вундеркинды, а ничем больше объяснить его знакомство с таинственными Дженкинсом и Шарифом я не мог. Если честно, я и сейчас не до конца уверен, что Борисов не был Рипером или по крайней мере не входил в его команду. Но потом я эту мысль отбросил — во-первых, реальный Рипер вряд ли стал бы так палиться, привлекать к себе внимание и морочить людей необъяснимым советом отряда, а во-вторых, Борисов почти не пропускал школу — у него элементарно не осталось бы времени вести столь бурную сетевую деятельность. Кроме того, Рипер в маске периодически обращался к подписчикам то из Тель-Авива, то из Нью-Йорка, то из Буэнос-Айреса, издевательски подчеркивая, что выбирает только города с дефисом в честь родного Ростова-на-Дону.</p><p class="p">Подходить к Борисову лично я боялся, потому что мне все еще казалось, будто он нечто знает про отца; он на меня не смотрел и ко мне не обращался. Добро бы я хоть раз поймал на себе его взгляд — но ничего подобного. В конце ноября он неожиданно начал действовать, хотя, как учила нас Рита, действием могло называться что-то, направленное на объект, а остальное называется суетой. Сначала он произвел в члены совета отряда преподавательницу истории искусств, предмета, который ни в какую программу не входил, но у нас присутствовал для понта, в порядке конкуренции с Дубками. Про Вазари и Скарлатти нам рассказывала симпатичная, худосочная и очень небогатая, как я теперь понимаю, девушка лет двадцати пяти; держалась она, однако, с достоинством и знала множество смешных казусов про отношения знаменитых художников. После одной такой лекции про Моцарта, который, оказывается, вовсе не был жизнерадостным гением, а наоборот, любил изобретательно мучить завистливых коллег, — Борисов подошел к ней и негромко, но отчетливо, чтобы все слышали, сказал:</p><p class="p">— Приглашаю вас стать членом совета отряда. Вот телефон.</p><p class="p">— Какого отряда? — спросила Коала, как мы ее называли за фамилию Ковалова.</p><p class="p">— Отряда приматов, — с вежливой улыбкой сказал Борисов. — Исключительно в знак уважения. Если что-нибудь нужно — обращайтесь.</p><p class="p">Что самое интересное, Коала обратилась; однажды ей надо было перевезти в квартиру новую тахту, тратиться на грузчиков не хотелось, и она — исключительно шутки ради — позвонила Борисову. Эту историю я знал от матери, а ей рассказала директриса, с которой у них была еще школьная дружба (почему меня, собственно, несмотря на отсутствие талантов и пихнули в «Циркуль»). Коала и не предполагала использовать детский труд, и вообще не воспринимала этот звонок всерьез, — но то ли она была совсем одинока, то ли ей хотелось проверить возможности Борисова и посбить с него спесь. Учился он так себе, отвечал строго в рамках программы и вообще не блистал интеллектом, если не считать идеально продуманных манер. Но Борисов немедленно откликнулся и приехал по указанному адресу с компанией довольно здоровых старшеклассников, относившихся к нему с неподдельным благоговением. Они, как древние тимуровцы, про которых я читал в глубоком детстве советскую странную сказку, нагрянули к ней и спокойно снесли тахту по лестнице, а потом вызвали «Грузовичкова» и отвезли мебель на другой конец Москвы. Коала порывалась накормить их чаем с тортом, но добровольческая бригада сдержанно отказалась и растворилась в ноябрьском дожде. Коала настолько обалдела, что рассказала обо всем директрисе, а та отчитала ее за использование детского труда и впредь просила воздержаться от этой практики.</p><p class="p">Второй прием в совет отряда состоялся неделю спустя, когда у Маши Светловой посадили отца. Такие вещи случались в последнее время все чаще, я читал про это еще в воспоминаниях о тридцатых годах (как вы могли заметить, я вообще интересуюсь очень немногими вещами, но история входит в их число). Хорошо хоть теперь не требовалось отрекаться, но когда Машин отец, недавний подмосковный мэр, сел только за то, что не захотел делиться, и об этом все знали, — на редкость противная женщина, географиня, сказала после Машиного ответа, что она одобряет ее прекрасную подготовку и что ей сейчас, наверное, нелегко — потому что непросто же вот так все иметь, без особенных причем заслуг, а потом потерять в одночасье, как всегда бывает с людьми, путающими свой карман с государственным. Маша, которую я честно считал самым красивым человеком в школе и к которой всегда боялся подойти, покраснела, побледнела, сдержалась и сдавленным голосом сказала, что она никому не позволит плохо говорить об отце, про которого вдобавок ничего не доказано. Но я что же, сказала географиня, я ничего, — и отпустила Машу, а на перемене, на которую у нас распускали темой тореадора в динамиках, к ней подошел Борисов и протянул свой прямоугольник, сказав, что предлагает ей высокую честь стать членом совета отряда с правом совещательного голоса; и Машка, от которой в последнее время многие отворачивались, настолько обалдела, что взяла.</p><p class="p">В третий раз, что называется, закинул он невод — пришел невод с одною рыбкой; у нас в классе был исключительно грязный тип, пошлейшая личность, Сердюк, по кличке, естественно, сами догадываетесь как, потому что подобное подобным, — человек, который рассказывал самые грязные анекдоты, отпускал самые сальные шуточки и базлал направо и налево о своих исключительных подвигах, главным образом о хватании за сиськи, за которые он, кажется, перехватал уже всю школьную Москву. Сердюка терпели, потому что всем вообще ни до чего не было дела, особенно в последнее время, когда быть бы живу; но однажды на литрé он нарочито громко загнул особо вонючую пошлость, и Рита, которую в принципе нелегко было вывести из себя, отчитывала его перед всеми полчаса; сначала он ухмылялся, потом начал краснеть, и наконец его проняло — он даже залепетал «а чо я, а ничо я». Он был сынком довольно известного охранника, и его еще никогда так не осаживали, да и Риту я не видел в таком пылу и жару, — но Сердюк был совершенно размазан. Борисов подошел к нему, как всегда, после урока и сказал то же, что и всем избранникам: поздравляю вас, вы член совета отряда, обращайтесь. Это было уж поперек всякой логики, и я подумал даже, что Борисов инопланетянин, которого интересует коллекция крайних проявлений, как возвышенных, так и отвратительных. Судя по всему, о его загадочном поведении подумал не только я, и, если бы все мы не были разбиты на такие отдельные группы, весь класс уже всерьез решал бы вопрос о Борисове, — но у каждой команды были свои интересы, и до серьезного разбирательства не доходило. Однако на следующий день к Борисову неожиданно подошел самый привлекательный человек в «Циркуле», никогда и ни с кем толком не общавшийся, но выдававший иногда предельно точные слова; если бы я у кого-то и спросил совета по жизненно важному вопросу, то у Федора Острецова. Острецов был сын режиссера, далеко не последнего, и в том, что он разбирался в людях, не было ничего неожиданного; разбираться-то он разбирался, но от общения старался воздерживаться. Он уже снялся в двух фильмах, причем не у отца, и сыграл прилично, без скидок на восьмой класс. С некоторыми людьми он был на ты, с другими на вы — переходы эти были так же непредсказуемы, как с цветных сцен на черно-белые в противных военных фильмах его отца. Противность была в том, что фильмы у него получались как бы продвинутые и с понтами, а между тем настолько подлые и лизательные, что коллеги при его появлении брезгливо замолкали. Короче, Острецов подошел к Борисову и без всяких экивоков сказал: я, кажется, понимаю, что вы делаете.</p><p class="p">— Разумеется, — кивнул Борисов с видом полного уважения и даже благодарности. — Поэтому вы никогда не станете членом совета отряда.</p><p class="p">— Я не очень и стремлюсь, — сказал Острецов без всякой обиды.</p><p class="p">— Это совершенно неважно, кто и куда стремится, — ответил Борисов, глядя прямо в глаза длинному Острецову, для чего приходилось задирать голову. — Но членом совета отряда вы не будете.</p><p class="p">И они пошли в разные стороны, явно довольные друг другом.</p><p class="p">Думаю, примерно в этот момент продвинутые люди догадались, что произойдет в конце этого рассказа, но если им показалось, что в рассказе еще хоть раз появится Острецов, — увы, скажу я вам, вы совсем не продвинутые люди.

    <strong>3.</strong></p><p class="p">В декабре Борисов начал свои так называемые каминные встречи — у себя дома или у двоюродного брата, устроившегося еще шикарней. Борисовских родителей никто никогда не видел, он собирал людей не за городом, как обычно в своих поселках делали мы, а в огромной московской квартире с камином. Обставлено все было по-старинному, как в детективных романах незапамятных времен. Все рассаживались у камина, мерцал красноватый свет, источник которого оставался неясен, — свечей не было. Борисов однажды сказал, что это пошлость. Собирались дважды в неделю и обсуждали таинственные слухи, которых в это время стало особенно много: в центре Москвы завелся людоед, похищавший подростков, в канализации снова видели гигантских крыс, а вернувшиеся с фронта ловили школьников и такое с ними делали, что этого не писали даже в агентстве Mash. Иногда Борисов обзванивал всех срочно и собирал якобы по экстренному поводу, но повод оказывался пшиком — например, он с серьезным видом сообщал о пропаже своего приятеля из бывшей школы, откуда его перевели к нам по неизвестным и тоже таинственным причинам. Борисов вел свои заседания, сипя незажженной трубкой, и трубка эта придавала всему особенно приятный колорит: если бы он курил, сказала мне Маша Светлова, это тоже была бы пошлость. По стенам комнаты висели картины странного содержания. Так высказался Шаинян, человек темпераментный, от которого я тщетно пытался добиться подробностей. Отец Шаиняна был банкир и коллекционировал живопись, но во всей отцовской коллекции сроду не было ничего подобного.</p><p class="p">— Ну например! — приставал я. Мне почему-то казалось, что именно по содержанию этих картин многое можно было сказать о Борисове и его прежней жизни и, может быть, даже о предках, — но Шаинян только и смог описать картину, на которой в ряд стояли трое арлекинов в клетчатых костюмах, но без голов. Еще на одной картине было звездное небо, просто звездное небо, одни светящиеся точки покрупней, другие помельче. Еще висел портрет человека с длинным лицом, выражавшим крайнее неодобрение. Фотографий на стенах не было, прислуга не появлялась, родителей не обнаруживалось. У двоюродного брата собирались всего дважды, на зимних каникулах, когда Борисов по каким-то причинам не мог собрать людей дома. У двоюродного брата была дочь, которую Шаинян охарактеризовал как самую красивую девушку, когда-либо им встреченную.</p><p class="p">— Ну хоть на кого похожа? — расспрашивал я.</p><p class="p">— Этого я не могу объяснить, — говорил Шаинян со значением, и акцент его от нервов усиливался.</p><p class="p">На собраниях Борисов иногда раздавал задания. С советом отряда он вел себя как истинный председатель, то есть до объяснений не снисходил. Он вручал карточку с телефоном, типа такой же, которую выдавал при посвящении, и там тоже стояли только имя и номер. По номеру надо было позвонить, представиться именем, которое Борисов тоже называл, оставаясь наедине с очередным порученцем, и задать условный вопрос. Вопрос был, как правило, идиотский, то есть внешне в нем не было ничего особенного, но стоило ли звонить, чтобы спросить «Который час?» и в четверть восьмого получить ответ «Половина шестого»? Отзыва Борисов никогда не говорил, он предупреждал только: тебе ответят. А правильно ли ответят? Это абсолютно неважно, отвечал он в своей манере. После этого надо было прибыть по адресу — или встретиться в магазине, почему-то чаще всего в чайной лавке на Никитской, — выпить там чаю, непременно ни говоря ни слова (это было фундаментальное условие), а потом получить пакет. Иногда Борисову передавали не пакет, а книгу. Название книги никак не было связано с тайной совета отряда: иногда это были «Любимые стихи о городе на Неве», а иногда шахматные задачи Тригорина. Понятное дело, что книги служили не для изучения шахматных задач, а либо для шифровок, либо для передачи вложенных в них фотографий; чрезвычайно любопытный Прошкин внимательно пролистал переданную ему книгу «Фольклор австралийских аборигенов» и действительно обнаружил в ней фотографию середины прошлого века, с зубчиками, на которой была изображена девочка лет двенадцати с ликующим, сияющим лицом, — но это ликование было такого свойства, что отчего-то немедленно становилась ясна дальнейшая судьба этой девочки, очень безрадостная. Может быть, она была болезненно худа, и это изобличало скрытый недуг и скорую гибель, а может быть, просто в этой щербатой улыбке была такая беззащитность, с которой в наших местах долго не проживешь; но снимок этот произвел на Прошкина очень грустное впечатление. На обороте была надпись косым школьным почерком: «На память обо всем чего лучше бы не было», с пропущенной запятой. В этом пропуске была почему-то особая печаль. Конечно, он ни о чем не спросил Борисова, но Борисов, принимая книгу, смотрел на него испытующе, наверняка о чем-то догадавшись.</p><p class="p">Меня вся эта таинственность угнетала главным образом потому, что я никак не мог получить приглашение в совет отряда, в котором было уже пятнадцать человек со всей школы, — но в феврале прием новых членов прекратился, потому что Борисов на одном собрании сказал, что хватит. В школе Борисов стал фигурой исключительной важности, на моей памяти ни у кого не было подобного авторитета, хотя он не изменился, по-прежнему учился средне и некоторый интерес проявлял только к математике. У нас не было общественных поручений, и вообще нас старались не напрягать; до коллективных выездов в Питер или Казань Борисов не снисходил. Его звали Игорь, но это имя шло к нему не больше всякого другого, и по имени к нему никто не обращался. Шаинян сообщил, что на квартире Борисов разговаривал несколько иначе, чем в школе: речь его становилась несколько, что ли, книжной. Он рассказывал таинственные истории без конца и предлагал желающим додумать этот конец. Что особенно интересно, он никогда не предлагал выпить, хотя все наши с седьмого класса хвастались алкогольными подвигами. Иногда Борисов вкатывал тележку с пирожными, иногда чай, а иногда просто раздавал желающим колу. Не предлагал даже бутербродов. После посещений борисовского жилья совет отряда не расходился, а шел в ближайшую кофейню, где по тайному уговору никогда не обсуждали услышанное, а с загадочным видом трепались о ерунде.</p><p class="p">Однажды Лена Свиридова, человек бойцовского склада, рыжая, всегда ни с чем не согласная и занимавшаяся альпинизмом, дерзко, в своей манере подошла к Борисову и сказала:</p><p class="p">— Я хочу вступить в совет отряда.</p><p class="p">Борисов рассматривал ее молча, склонив голову набок.</p><p class="p">— Я человек полезный, — сказала Свиридова, краснея. — То есть я могу быть полезным человеком. У меня много, это самое, экстремальных навыков, и я умею оказывать первую помощь.</p><p class="p">— Первую оказывать поздно, — сказал Борисов. — Сейчас уже надо вторую.</p><p class="p">Они помолчали. Свиридовой, видимо, хотелось провалиться сквозь землю. Унижений она не выносила.</p><p class="p">— Понимаешь, — сказал Борисов очень мягко и уважительно. — Я все вижу и, собственно, уже давно бы… Но твой уровень — это совет дружины. Я не могу, то есть я не уполномочен.</p><p class="p">— Сказал бы прямо, что тебе не надо, — горько и с усилием проговорила Свиридова. Почему-то при Борисове, таком спокойном, сильные люди резко теряли самообладание. — А то разводит, как это самое.</p><p class="p">— Я не могу набирать совет дружины, — сказал Борисов и тоже покраснел. — Это не тот уровень, меня туда не пускают. По большому счету я и говорить с тобой недостоин.</p><p class="p">Свиридова, которая собиралась уже развернуться и убежать, посмотрела на него с живейшим интересом.</p><p class="p">— В каком смысле недостоин?</p><p class="p">— Примерно в том, в каком Шарма был недостоин говорить с Шёнингом, — тихо сказал Борисов. — В каком Черный недостоин говорить с Третьим.</p><p class="p">Свиридова помолчала, кивнула и сказала вдруг:</p><p class="p">— Но мне кто-нибудь позвонит?</p><p class="p">— Или бактерия с головастиком, — продолжал Борисов свои странные сравнения.</p><p class="p">— Спасибо, — сказала Свиридова после паузы и отошла. На следующей перемене я спросил ее, пользуясь давним взаимным доверием, кто такие Черный и Третий (про Шарму и Шёнинга я посмотрел, он выбрал людей из ее сферы), но она со смешком ответила, что Борисов не в себе и принимать его всерьез могут только дураки, а вот мой цвет лица в последнее время ей не нравится, какой-то я стал желтый. После чего она глупо заржала, а я задумался, потому что дела мои в последнее время действительно шли не блестяще — я сильно проигрался в «Атаке дронов», и мне впервые за два года пришлось просить финансовой помощи у отца, плюс к регулярной salary, полагавшейся мне за успеваемость. Это было стыдно и непристойно, но других заработков у меня тогда не было.</p><p class="p">В начале марта Шаинян позвал меня в кино и там доверительно сообщил, что сумел установить связь с той исключительной красавицей, ну той, которая. Это получилось случайно, он встретил ее в кофейне и узнал, и она согласилась с ним увидеться, но только в присутствии третьего человека. Он просил меня быть этим третьим человеком. Мне самому стало страшно интересно, мы договорились на будущий четверг, но в среду произошло непредвиденное. На обеде, в буфете, Борисов подошел к Шаиняну и тихо, но очень решительно сказал ему:</p><p class="p">— Ключ.</p><p class="p">Шаинян забегал глазами и собирался, кажется, позвать на помощь. Но Борисов был вообще не из тех людей, которому легко сопротивляться, и он так спокойно стоял перед Шаиняном, глядя на него в упор, что все поспешили отвернуться, уставились в тарелки, а Шаинян стал шарить в карманах и наконец, тоже отведя глаза, вручил Борисову желтый трехгранный ключ, какого я сроду не видал, кроме как в довольно занудной игре «Братство единорога», на которую сдуру убил два месяца в пятом классе.</p><p class="p">Борисов молча положил ключ в карман серой замшевой куртки и ушел, а Шаинян имел вид человека, утратившего карту острова сокровищ, причем странным образом было заметно, что и карту, и самый остров он считал уже личной собственностью.</p><p class="p">Мне было и жалко его, и любопытно, и немного спустя я к нему подошел:</p><p class="p">— Шая, что за ключ?</p><p class="p">— Слушай, не лезь ко мне, а! — вскрикнул Шаинян с такой болью, какую я сроду не предполагал в этом довольно нахальном и плохо воспитанном восточном человеке.</p><p class="p">— Я ничего, — сказал я, — но просто если этот председатель тебя будет нагибать…</p><p class="p">— Цвет, что ты знаешь! — совсем уже страдальчески воскликнул Шаинян (Цветков — это моя фамилия, на всякий случай, но вам она все равно ничего не скажет, потому что у отца другая). И я понял, что действительно ничего не знаю о совете отряда и самом отряде, и впервые всерьез об этом пожалел.

    <strong>4.</strong></p><p class="p">В апреле Карина Степанова неожиданно упала в обморок, вызвали скорую, и, хотя ничего серьезного у нее не оказалось, директрисе каким-то образом стало известно, что Степанова входила в совет отряда. Видимо, о нем знали и раньше, поскольку проболталась Коала, но считали это невинным делом вроде игры в дроны (о которой тоже никто понятия не имел — разве что родители были в курсе, что мы собираемся поиграть). У Степановой обнаружилось что-то вроде нервного истощения, это тоже было понятно, потому что у ее родителей как раз в это время начались большие неприятности; как часто бывало теперь, они кончились ничем, все повисло — вообще все постоянно подвисало, словно дожидаясь окончательного решения, которого все вроде бы и ждали, а вместе с тем боялись. Всем было понятно, что дальше так нельзя, а вместе с тем возникало подозрение, что потом вообще ничего не останется и поэтому пусть уж как раньше. Степанова была девочка чувствительная, и очень возможно, что на нее давила не только родительская ситуация, но и атмосферный столб в целом. Вдобавок зима была затяжная, весна медленная, случались снегопады, все ходили злые как черти, людей уже хватали прямо на улицах, и когда я спросил отца, как дела у родителей Степановой, он сказал мне необычно холодным тоном, что лучше бы я держался от нее подальше, хотя лично она, конечно, ни в чем не виновата. Тем не менее после обморока Степанову стали о чем-то расспрашивать, потому что обращать на себя внимание чем угодно, хотя бы и болезнью, было уже нежелательно; наверное, как всегда во время этих расспросов, ей не предъявляли никаких обвинений, а просто создавали впечатление, что все очень серьезно, чтобы она все выложила сама, а если выкладывать нечего — то выдумала. И, видимо, под этим напором, да еще с тем чувством обреченности, которое у нее было с начала года в силу слишком многих и разносторонних давлений, — она им проболталась то ли о совете отряда, то ли о посиделках на квартире, где никогда не бывало взрослых, то ли о какой-то уже своей напряженной личной жизни. У всех в классе была та или иная личная жизнь, наивно было бы думать, что у людей в пятнадцать лет ее не бывает, — казалось, к этой сфере был сугубо равнодушен только Борисов, и то разве потому, что у него были другие, еще более запретные удовольствия. Но, видимо, у Степановой эти отношения зашли дальше, чем было принято, или дальше, чем она могла выдержать, может быть, она даже уже раздевалась, — короче, она вызвала повышенное внимание, и постепенно на расспросы стали тягать всех. Меня это не коснулось, поскольку я не был членом совета отряда, и я впервые этому порадовался. О содержании расспросов члены совета никому не рассказывали, но ходили как в мутную воду опущенные. До большинства мне дела не было — поскольку, как вы могли заметить, мне вообще мало до чего есть дело, это так было с первого класса и осталось до сих пор, когда я — но это неинтересно. Короче, в совет входила Ира Селиванова, до которой мне дело было. У нас никогда не происходило даже серьезных разговоров, мы один раз ходили в кино и один раз целовались, но делали это серьезно и после этого не спешили повторить, потому что поняли, что лучше, может быть, подождать, чтобы не испортить. Я не расспрашивал Селиванову про совет, мы вообще мало говорили, но кое-какие сведения она приносила. Я никогда не ревновал к Борисову, это было не то слово, хотя Борисов всегда Селиванову выделял и к ее мнениям прислушивался, особенно когда рассказывал свой бред про маньяков и как бы спрашивал совета у совета, хотя что этот совет мог присоветовать? Как бы то ни было, Селивановой все это было особенно тяжело, у нее и так была психованная младшая сестра и не очень приятный отчим, а когда у нее стали допытываться по совет, она совсем стала на себя не похожа. Я подошел к Борисову после уроков, когда он уже намылился со своей рыжей сумкой сосредоточенно отвалить в арку нашего здания на Ленинском проспекте, и сказал, что нам надо поговорить.</p><p class="p">— Поговорить нам совершенно не надо, — ответил Борисов в своей манере.</p><p class="p">— Хорошо, мне надо.</p><p class="p">— Тоже необязательно.</p><p class="p">— Борисов, — сказал я. — Я понятия не имею, в какие игры ты играешь, и мне это не очень интересно. Но в твои дела замешан важный для меня человек. Я бы хотел, чтобы ты этого человека прикрыл или оставил в покое, если это в твоих силах.</p><p class="p">Я нарочно подбирал такие слова, чтобы у него оставался отходной путь, — сказать, что это не от него зависит, или мало ли. Я допускал, что он инопланетянин, за которым действительно стоят наблюдатели. Я вообще уже много чего допускал в то время, потому что каждый сходил с ума по-своему, и очень возможно, что это было не сумасшествие, а даже прозрение. Например, на крышу дома на Остоженке залез оборванный мужик и стал орать, что сейчас будет атака дронов, его немедленно сняли, но на следующий день действительно была атака дронов, так что никогда не знаешь. Очень может быть, что у беспилотника собственная воля: никогда не знаешь, что придет в отсутствующую голову.</p><p class="p">— Кто там замешан в мои дела, этого даже я не знаю, — сказал Борисов в предсказуемой манере, — но что касается тебя, то происшествие в четвертом классе не осталось без последствий.</p><p class="p">Это было ниже пояса. Дело в том, что однажды, когда я возвращался домой от тогдашнего одноклассника (собственно, это и была одна из причин попадания в «Циркуль»), меня довольно сильно отлупили в Кунцеве без всякого повода, наговорив мне при этом чрезвычайно унизительных вещей. Это были люди, которых я никогда не видел ни тогда, ни потом. Напали они на меня просто со злости, а может, приняли за другого. Никаких особых увечий они мне не нанесли, а руку вправил сосед-врач даже без вызова скорой; отец, конечно, поговорил с полицией, но когда они кого находили? Просто это была вещь, которая сильно повлияла на мое отношение к людям и, хотя закалила, с одной стороны, но, как всегда бывает, сделала особенно уязвимым, с другой, и я предпочитал о ней не вспоминать, как собака старается не наступать на раненую ногу. С четвертого класса я знал, что со мной можно сделать что угодно, и я не всегда смогу этому воспрепятствовать. Отец говорил мне, что найдет этих нелюдей под землей, — поздних детей обычно любят больше, чем ранних, — и я ему даже верил, но, поскольку он никого нигде не нашел, я и к нему с этого момента относился, скорее, сострадательно. Я понял, что и с ним могут сделать что угодно. Вообще, сдержанные люди обычно впечатлительны, и лучше их не впечатлять таким образом, а то вся их жизнь — примерно как вся моя жизнь с того времени — может пойти довольно неожиданным путем; в конце концов, туда, где мы с вами сейчас разговариваем, я тоже скорей всего не записался бы, если бы не тот инцидент в четвертом классе. Поэтому первое мое желание при упоминании о тогдашнем событии было — врезать Борисову примерно так, как мне врезали тогда, после сообщения о том, что у меня нет с собой денег; тогда недавно прошел пацанский сериал и требование денег произносилось почти всегда в начале стычки, отвратительным гнусавым голосом. С тех пор я кое-чему научился, но Борисов, возможно, тоже кое-что умел, а возможно, умел кое-что другое; как бы то ни было, среагировал он быстро и даже не отпрыгнул, а как-то очень резко переместился вбок.</p><p class="p">— Внимание, — сказал он — словно и не мне, а тем, кто за ним все это время наблюдал. — Внимание, надо держать себя в руках. Все-таки я председатель совета отряда.</p><p class="p">Он сказал это примерно с такой же важностью, как полгода назад, когда отмазывался от дежурства, но еще уверенней, словно за время своего председательства внутренне разбух и пропитался общим уважением к своей загадочности. Это был уже не тот Борисов, который пришел в октябре. Этого уже никто не заставил бы дежурить. Что именно в нем изменилось — я бы не сказал, но он стал, по-моему, старше года на два, а зеленые глаза его стали еще ядовитее.</p><p class="p">Я действительно взял себя в руки, потому что ни при каких обстоятельствах не надо терять лицо и не факт, что у меня получилось бы как следует его побить. Он был выше меня и гораздо увереннее, а уверенность в таких делах весит больше силы.</p><p class="p">— Борисов, — сказал я, — что ты знаешь про четвертый класс?</p><p class="p">— Ничего, — ответил он ровно. — Я знаю, что четвертый класс был, только и всего.</p><p class="p">Он ничего не знает, подумал я с огромным облегчением. Он ляпнул первое, что пришло в голову, и это случайно совпало.</p><p class="p">— И что случайного ничего не бывает, — сказал он с этим своим пресловутым чтением мыслей, и я погрузился в прежний ад.</p><p class="p">— Но без последствий, — сказал он, — тоже не бывает ничего. И я, как говорится, принял к сведению.</p><p class="p">Не знаю, что уж он там принял, но сначала на расспросы перестали тягать Селиванову, а потом полиция и вовсе отвязалась от «Циркуля», и все нас оставили в покое. Впрочем, возможно, после пожара в ЦУМе всем просто стало не до нас, а в мае — опять же без календарного повода — Борисов буднично сказал совету отряда, что увольняется, в смысле переходит в другую школу, и дальше совет должен функционировать без него. Поскольку организация прекрасно себя проявила, сообщил он, и многое предотвратила, за что совет дружины объявил ему личную благодарность, а он транслирует ее нам, — то его руководство больше не нужно и дальше можно собираться самостоятельно. Это его заявление передала мне Степанова, потому что Селиванова, словно что-то чувствуя, контактов со мной в последний месяц избегала, сказав только, что я, конечно, хороший человек, но иногда и хорошим людям надо сначала думать, а потом совершать хорошие поступки.</p><p class="p">Пятнадцатого мая — хорошо это помню, потому что на следующий день отец отмечал юбилей, — Борисов подошел ко мне во дворе, где уже вовсю пахло сиренью и нагретым асфальтом, и сказал, что нам есть о чем поговорить.</p><p class="p">— Да? — переспросил я в его духе. — А по-моему, совсем не о чем.</p><p class="p">— Это не очень интересно, — ответил он небрежно. — Мое дело передать артефакт.</p><p class="p">Он залез в карман рыжей кожаной куртки и вынул красную машинку Sylvanian, вроде тех, какие я собирал во втором классе, когда отец часто летал в Японию. Конечно, мало ли кто коллекционировал Sylvanian, но конкретно такой гоночной модели у меня не было.</p><p class="p">— Теперь ты председатель совета отряда, — сказал он совершенно без пафоса.</p><p class="p">Я всегда знал, что буду председателем совета отряда, но представлял передачу полномочий совершенно иначе. Он мог бы, не знаю, хоть поздравить меня или пожать руку, но — это я помню совершенно точно — вышло так, что за весь учебный год он ни разу ко мне не притронулся. Он жал руку даже Шаиняну, когда они после месяца напряжения помирились. Но меня он никогда не тронул пальцем — даже когда передавал мне красный Hornett.</p><p class="p">— Игорь, — сказал я. — Если ты заметил, я обычно вопросов не задаю.</p><p class="p">— Очень хорошо, — кивнул Борисов.</p><p class="p">— Но сейчас, понимаешь, я должен спросить. Я примерно догадываюсь, зачем все это надо, но, по-моему, любые советы, включая советы отряда, в сложившихся обстоятельствах бесполезны.</p><p class="p">Я сам удивился, что наконец заговорил с ним так, как говорил только сам с собой, и то исключительно по ночам, когда просыпался и мучительно следил за тенями от прожектора во дворе. Двор у нас всегда освещался прожектором, и его ртутный свет наводил на меня при зимних пробуждениях невыносимую тоску.</p><p class="p">— Наступило время пушек, — сказал Борисов буднично, — и пора увлечь детей не коллекцией игрушек, а плетением сетей.</p><p class="p">— Время пушек? — переспросил я, потому что такое совпадение было уж очень неожиданно.</p><p class="p">— Время душек, — пожал плечами Борисов. — Время сушек. Это совершенно неважно.</p><p class="p">И удалился, вскинув на плечо рыжую сумку. На следующий день мне позвонили из совета дружины и сообщили адрес квартиры, где мы теперь будем собираться. Я не стал спрашивать, заказывать ли мне глянцевые карточки. В конце концов председатель совета отряда и без указаний сверху знает, что ему делать.</p><p class="p">И с этой передачей книг, конечно, дурной тон. Структуры структурами, в аморфное время других способов не придумано, но лучше передавать более нужные предметы. Никогда не знаешь, что может понадобиться, но книги уж точно больше не пригодятся.</p></span>
