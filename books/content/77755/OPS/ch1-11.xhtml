<span><p class="p"><strong>Мистер и миссис Куст </strong></p><p class="empty-line"/><p class="p">Когда Аня Холщевникова умерла после тяжелой и унизительной болезни, Бог превратил ее в куст.</p><p class="p">Это было лучшее, что Он мог сделать в сложившихся обстоятельствах. Анин гражданский муж Слава этих обстоятельств не знал, не догадывался, как и от кого Аня получила роковое ранение, и теперь не то чтобы утратил веру, но шел в пустую квартиру от троллейбусной остановки в тягостном, горьком недоумении. Оба они находились с Богом в слишком тесном контакте, чтобы когда-нибудь усомниться в Его бытии. Даже сам их союз был нагляднейшим доказательством, потому что никто другой такого подстроить бы не мог, поэтому Слава не роптал и не сомневался, а просто не понимал. Три часа назад Аня отправила его за мороженым, и врач сказала: теперь все можно, бегите. А когда он вернулся, она уже остывала и самым теплым был калоприемник, тот самый, над которым они столько смеялись. И вот теперь он шел домой за всеми требующимися документами и платьем, и тут увидел куст и сразу его узнал, потому что еще вчера, когда он забегал домой переодеться, куста не было. Да и трудно было не узнать: среди лета он светился ярко-рыжим, потянулся цапнуть Славу за рукав, и общее выражение у него было вполне узнаваемое — он разводил ветками, говоря, что вот и опять мы вляпались, но ничего страшного, ты знал, на что соглашался.</p><p class="p">С Аней всегда происходили истории, комические неприятности, внезапные отъезды, которых она никогда не могла объяснить: сегодня мы улетаем в Тбилиси. Я уже взяла билеты. Зачем? И у нас работа! Но мы не сделаем эту работу, если не улетим. И разводила руками — совершенно с тем выражением на лице, как у того идиотского паровоза из советского мультфильма, приучавшего детей к раздолбайству: если мы не увидим первых ландышей — восторженно пища, с придыханием, — мы опоздаем на всю весну! Она не все могла ему сказать, да больше того, не все она и знала: надо было отправить ее в Тбилиси, решить там весьма серьезное дело, но если Бог каждому своему агенту будет в деталях объяснять задание, у Него не останется времени на мониторинг. И потому Аня Холщевникова просыпалась с невыносимым желанием съесть мацони с медом именно на улице Табукашвили, нигде более, и они все бросали, летели туда, знакомились с массой интересных людей, которых она прямо-таки притягивала, причем спасали одну пару от развода, а с двумя другими регулярно обменивались рецептами. И ей было совершенно невдомек, что развод-то вовсе не был фатален, подумаешь, а вот обмен рецептами спасал человечество от катастрофы.</p><p class="p">Слава не стал задавать вопросов, почему именно куст. Он правильно догадался, что от тех сил, которые давно за ней охотились, надежнее всего было прятать ее именно в таком обличии, а чтобы он уж точно не прошел мимо — поместить ее именно в том месте, где она иногда поджидала его с работы. Он побежал домой, схватил с балкона лопату и большой пустой горшок от сдохшего лимона, осторожно выкопал куст, насыпал сухой земли и отнес наверх, приговаривая про себя Бог весть откуда всплывшее в памяти: “Whose woods these are I think I know” — и действительно знал.</p><p class="p">На похоронах Слава был удивительно спокоен. Пришло очень много народу, в том числе тех, кого он вообще не знал, тех, кто никогда ее не видел и только читал «Хронику выздоровления», как она назвала этот блог, даже не допуская иного исхода. Все были уверены, что Слава просто не понимает происшедшего, потому что если даже они, никогда ее не видевшие, так ее полюбили, — что должен чувствовать человек, который с ней прожил пять лет? Но никому и в голову не приходило, что этот человек получил дар, что ему предоставили утешение, что Господь не бросает своих и перевел Аню в ту форму существования, в которой ее никто не найдет, а Слава будет все понимать. Нельзя сказать, чтобы никто раньше не догадывался о такой возможности. В фильме «Фонтан» жену героя уже превращали в дерево, чтобы увезти на другую планету и там спасти. Но там дерево было скучное, безэмоциональное и почти не разговаривающее, потому что Даррен Аронофски все-таки не бог.</p><p class="p">А здесь у куста было то же всегда радостное и слегка при этом виноватое выражение, которого Слава не встречал больше ни у кого, и даже заниматься она продолжала более или менее тем же. К Славе приходили друзья, и он был, разумеется, не дурак, чтобы сразу объяснять новое положение вещей, он просто говорил, что сидеть одному невыносимо, заводить собаку обременительно, поэтому он завел себе куст. И друзья хорошо его понимали, и это их дополнительно сплачивало, так что вокруг его горя образовались до конца года две пары, трудно сказать, насколько богоугодные, но у одной из них запросто мог родиться гений, а у другой как раз такой идиот, чтобы жизнь не казалась гению медом и у него был стимул творить.</p><p class="p">Слава оставался на службе, и периодически ему приходилось выезжать в командировки. Он был не таким одаренным агентом, как Аня, но тоже ценным, и как минимум раз в месяц начальство отправляло его в дальние поездки, а иногда ему самому приходила странная фантазия посмотреть Иссык-Куль, и на службе не возражали — человек пострадал, надо развеяться. На время отлучек он оставлял кусту механическую поилку, то есть поливалку, которая дозированно вливала ему витаминную воду. Правда, в ноябре он все равно облетел, но Слава этого ждал и не огорчился. А весной случилось возрождение, как и положено, и Слава окончательно уверился, что их затея удалась: теперь ее догнать не могли.</p><p class="p">Не сказать, чтобы они не пытались. Один раз — был страшный день с ледяным дождем — на лестничной клетке его поджидала темная личность, из тех, которые всем обликом своим внушают тревогу: он стал спрашивать, не здесь ли живет Аня. Вынь да положь ему Аню. Он утверждал, что давным-давно она его очень выручила и вот теперь он выкарабкался и желает поблагодарить. Видно было, однако, что ниоткуда она его не выручила, что он в такой же беде и продолжает сеять эту беду вокруг себя, но изо всех сил хорохорится и бодрится. Такой же вид был у одного мужика, небритого, со свежими ссадинами, обильно смазанными зеленкой: он на Финляндском вокзале просил на билет, многозначительно добавляя, что едет к женщине. Он даже подмигивал. Ясно было, что женщины у него не было очень давно. Возможно даже, это был тот же самый мужик, которого тогда подсылали, чтобы Славу задержать, а теперь — чтобы выведать про Аню. Но Слава, разумеется, все понял.</p><p class="p">— А откуда вы знаете, что она здесь живет? — спросил он.</p><p class="p">— Она дала мне адрес, — заторопился темный, — давно написала, я все не мог, хотел, понимаете, чтобы уже во всем блеске…</p><p class="p">— Дело в том, — очень отчетливо сказал Слава, — что она здесь больше не живет.</p><p class="p">— Как так? — Мужик развел руками, подражая ее жесту, и Слава окончательно понял, что это давняя слежка. — Как это возможно, она же мне написала…</p><p class="p">— А что, вы разве не знаете ее? — спросил Слава, улыбаясь. — Она такая: сегодня здесь, завтра там. Или вы ее действительно не знаете?</p><p class="p">И он посмотрел на темного так, как умел. Он это умел с детства, Бог тогда его и приметил и осторожно завербовал за велосипед. Мужик смешался, как-то съежился и убежал. Он мог, конечно, не знать, не читать ее блог, не следить — Аня была не так уж знаменита. Но то, как он съежился, сомнений не оставляло. И Слава не пошел домой, он вышел пройтись, обмануть их. А когда вернулся, куст имел бледный вид, словно старался спрятаться, но куда он мог спрятаться?</p><p class="p">— Никто их не впустит, я их увел, — сказал Слава, хотя вовсе не был уверен, что отвадил их окончательно. Еще один, на этот раз женщина, караулил его зимой у подъезда.</p><p class="p">— А чтой-та тут кустик был, а таперя нету? — спросила баба, от которой ужасно пахло сырым, недавно съеденным мясом и очень плохой водкой.</p><p class="p">— А чтой-та вы мине спрашиваете? — спросил Слава и опять улыбнулся.</p><p class="p">— Ты самый он и есть, — вдруг сказала баба и внезапно заорала на весь двор: — Держитя его, он погубитель! Он всему погубитель!</p><p class="p">Слава знал, что бежать нельзя. Он спокойно стоял и улыбался. На вопль выглянул водопроводчик Толя, которого его баба выгоняла курить в подъезд.</p><p class="p">— Ты ее не слушай, она рехнутая, — сказал он Славе, и никаких других последствий не было. Баба сразу шмыгнула носом и убежала. Куст на этот раз ничего не почувствовал, потому что дело было в подъезде, а жил Слава на седьмом этаже.</p><p class="p">Слава никогда не называл куст Аней. Не то чтобы он так ее прятал, но, скорее, он уважал ее новое состояние. От нее, наверное, тоже требовались усилия, чтобы ничем себя не выдавать, в особенности при гостях, и потому Слава даже наедине не вел с ней разговоров. Если же ему требовался совет, он молча, без слов, излагал свою проблему и так же молча, без возражений, выслушивал ответ. Если Аня принималась слегка раскачиваться без всякого ветра, он успокаивал ее, говоря вслух, что ничего пока не предпримет, но обычно она все поясняла без лишней жестикуляции. И жизнь их была почти так же безоблачна, как до болезни, но как-то они ее достали. Может быть, им действительно удалось что-то выведать, подсмотреть ночью в окно, догадаться по его покупкам — поилка, растительный витамин, — а может быть, рана, нанесенная ей тогда и вызвавшая болезнь, была слишком глубока. Так или иначе, с августа следующего года куст начал чахнуть. Слава вызвал растительную «скорую помощь». Пришла женщина его лет, очень миловидная, да что там, просто красавица. Она просидела у него час, они выпили чаю. Куст она почему-то называла «товарищем». «Товарищ выкарабкается», — говорила она, посоветовала антибиотики и подкормку, стала заходить — просто так, без вызовов, — и Славе было с ней легко. В сентябре они вместе пересадили куст, потому что инфекция могла таиться в горшке. Это была последняя операция Ани, проведенная безупречно, потому что во время пересадки Слава все время встречался с растительным доктором пальцами, а то и взглядами, — и после этой операции куст погиб, высох в три дня. Но не сказать, чтобы Слава сильно огорчался, потому что когда умирает человек — это совсем не похоже на ситуацию, когда умирает куст. Это просто другое дело, и это дар Божий — позволить пережить смерть возлюбленной как смерть куста.</p><p class="p">На следующее утро после того, как он вынес куст на прежнее место и положил у подъезда, Слава проснулся спокойным и ясным, с твердым пониманием, что ничто никуда не исчезает. Может быть, Бог прятал ее теперь в другом месте, а может, вообще забрал к себе поближе, потому что работы хватает и там, просто абы кого Он к себе не призовет. А может, она уже сделала здесь все, что могла. Как бы то ни было, он чувствовал себя очень хорошо — и глубоко внутри, тем участком мозга, которым всегда чувствовал связь с центром, понимал, что это не просто так. В конце концов, он тоже был ценный агент, и ему еще многое оставалось сделать — miles, так сказать, to go before I sleep.</p></span>
