<span><p class="p"><strong>Annotation</strong></p><p class="p">Перед вами — продолжение знаменитой повести братьев Стругацких «Далекая Радуга». Впрочем, «продолжить» «Радугу» в каком-то смысле и невозможно, поскольку сюжет этой книжки самодостаточен и логически завершен. Автор, по большому счету, продолжать и не пытался, просто написал «альтернативную историю» планеты Радуга. И получилось весьма неожиданно и нестандартно. «Дуга» в правильной пропорции совмещает отвращение, отчаяние, умиление и надежду. И читается с большим интересом. (Андрей Стругацкий)</p><p class="empty-line"/><p class="empty-line"/><p class="p">ДУГА</p><p class="p">Дуга</p><p class="p">От автора</p><p class="p">Готические рассказы</p><p class="p">Председатель совета отряда</p><p class="p">Можарово</p><p class="p">Мистер и миссис Куст</p><p class="p">Синдром Черныша</p><p class="empty-line"/><p class="empty-line"/><p class="p">
