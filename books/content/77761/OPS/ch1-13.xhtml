<span><p class="p1">Свиньи, общим числом двенадцать, толкались и хрюкали в загоне. Только что двое одноруких чистовцев, которые накануне снимали с козел гроб новонедоказненного Гавриила, приволокли им из столовского барака огромный котел объедков, оставшихся с обеда. В котле, в отвратительной жиже, хлюпали арбузные корки, куски хлеба, каша с жирным мясом. Котел был встречен взрывом хрюканья и визга. Свиней содержали чисто, но свинья грязь найдет — загон был вытоптан и вымешен полусотней копыт, и в этой пыли, которую после каждого дождя, вероятно, развозило в липкую кашу, валялись две самые толстые, уже не в силах подняться.</p><p class="p1">— Свинья — зверь простой, а умный, — с непонятной гордостью за свиней сказал Павел. — Знает, когда жрать несут.</p><p class="p1">— Когда резать будете? — спросил Рогов, чтобы что-нибудь спросить.</p><p class="p1">— До холодов всех порешат, — с такой же гордостью, но уже, видимо, не за свиней, сказал Павел. — Каких поедим, каких продадим. Надо тебя Прову показать. Пров!</p><p class="p1">На зов из крошечной слепой избушки вышел низкорослый мужик лет тридцати, с желтым, одутловатым лицом и мутными глазами. Рогов по привычке искал у него увечья, но не нашел — видимо, что-то под одеждой, вроде Гаврииловых шрамов.</p><p class="p1">— Кто звал? — спросил он равнодушно, но Рогов за этим равнодушием, за бегающими глазами навыкате уже чувствовал дикую злобу, искавшую только повода.</p><p class="p1">— Я звал, — радостно сказал Павел, предчувствуя, видимо, развлечение. — Нового показать привел.</p><p class="p1">— Ты, что ли, новый? — все так же ровно, но в высшей степени пренебрежительно, словно Рогов принадлежал к безнадежно низшему сорту, спросил Пров. — А? Чё молчим, новый?</p><p class="p1">Это обращение на «мы», имитирующее разговор с ребенком, Рогов хорошо знал по армии: что буреем, воин?</p><p class="p1">— А что с тобой говорить-то? — спросил он, начиная закипать.</p><p class="p1">— А чё ты чёкаешь-то? — незабытым, столь знакомым тоном безнаказанной шпаны спрашивал Пров. За Провом явно был опыт шестерки, долго наблюдавшей подобные инициации в качестве рядового члена команды, — команда, верно, стояла полукругом, пока пахан производил ритуальный опрос, служивший прелюдией к долгому и изощренному измывательству. — Ты чё чёкаешь-то, чё? Чё ты чёкаешь, ты? — И он ткнул Рогова в грудь кривым пальцем.</p><p class="p1">Павел стоял у загона, отвратительно скалясь. Рогов ощутил ненавистный холод в желудке, словно ледяной кулак сжимался там.</p><p class="p1">— Карантин, — сказал он, ненавидя себя за подлое желание прикрыться здешним законом. — Что ты лезешь, я в карантине.</p><p class="p1">— В карантине, ну и чё? — невозмутимо повторял Пров, наступая на него. — И чё? И трава не расти?</p><p class="p1">— Пров, новых не трогают, — подал голос Павел, но явно исключительно ради проформы, рассчитывая на изобретательный ответ.</p><p class="p1">— И чё? — спросил и его Пров. — А про число сегоднее ты помнишь? Какое седня число? Седня двадцать пятое число. — И снова повернулся к Рогову, продолжая наступать на него. Число было двадцать первое, это Рогов помнил. — Карантин ему. Закон он выучил. Закон тебе, да? Говно жрать — твой закон. А? Чего молчим-то? А? — И Рогов, не успев увернуться, получил тяжелый, неожиданной силы удар в челюсть; рот сразу наполнился кровью.</p><p class="p1">Этого ему хватило, чтобы мобилизоваться: он ненавидел прелюдии, ожидания, подготовки, но после первого удара страх исчезал, и тогда Рогов действовал четко — на зависть шпане. Никогда не тренируясь, не занимаясь никакой борьбой, считая ниже своего достоинства изучать приемы самообороны, Рогов чувствовал иногда такую душную ярость, что оттащить его от жертвы бывало непросто. В армии он так дрался всего единожды, когда сержант выбросил из его тумбочки материнские письма; инцидент стоил ему пяти и потом еще пяти нарядов по роте, но сержанта никто не любил, и большая часть роты была на роговской стороне. Так что драться Рогов не умел, а вот убить, вероятно, в известном состоянии мог бы.</p><p class="p1">— Убью, сука! — взвыл Пров, еле успевая заслоняться от града ударов, но Рогову этот визг только прибавил прыти. Он и ноги пустил в ход, и Пров уже встал на одно колено, закрывая только голову, а потом и вовсе упал, — но тут Рогова сбил с ног прыгнувший на него Павел.</p><p class="p1">— Ты что, тебе ж конец теперь! — заорал он. — Оставь его, ты, чума бешеная! Он же свинарь, тебе за свинаря знаешь что будет?!</p><p class="p1">— Убери, убери его! — стонал Пров, катаясь по земле. Сквозь шум крови в ушах Рогов слышал бешеный топот и хрюканье, доносившиеся из загона. Он оглоушил бы и Павла, но начал уже выдыхаться, да и Павел был здоров.</p><p class="p1">— Ты что, — уже мирно продолжал Павел. — Свинаря кто же трогает? За свинаря по закону тебе шкаф, да после шкафа три дня самому за свинаря. — Рогова особенно раздражало, что Павел произносит «свинаря» с ударением на «и», но сил злобиться у него уже не было: как всегда после приступа ярости, он чувствовал только опустошение.</p><p class="p1">— Что за шкаф? — спросил он равнодушно.</p><p class="p1">— Теперь узнаешь, тебе через три дня сразу шкаф. И учти, свинарь в любом случае пишется: в карантине ты, не в карантине…</p><p class="p1">— Лично ему шкаф сделаю, — плюясь красным и поднимаясь с кряхтением, говорил Пров. — Лично, гад буду, лично!</p><p class="p1">— Ладно, — широко улыбаясь, сказал Павел. — Познакомились. Пошли обратно, скоро сбор большой. Пров, ты пойдешь Петра-то смотреть?</p><p class="p1">— Не видел я твоего Петра, — сплюнул Пров.</p><p class="p1">На обратном пути Рогов спросил Павла:</p><p class="p1">— Слышь, а почему за свинаря пишут в карантине? Три дня же, Константин говорил.</p><p class="p1">— Три дня, пока закон не всосешь, — с прежним дружелюбием отвечал Павел. — А раз на свинаря полез, значит, ты закон всасывать начал. Глядишь, у тебя на второй день карантин закончится.</p><p class="p1">— Понятно, — сказал Рогов. — А сколько он у тебя был?</p><p class="p1">— А тебя скребет? — оскалился Павел, с прежней внезапностью переходя к злобе.</p><p class="p1">— Скребет, а чё? — вопросом на вопрос ответил Рогов.</p><p class="p1">— Смотри ты, — проговорил Павел с подобием уважения и чуть ли не любования в голосе. — Еще чуть — и совсем всосешь. Я все три дня всасывал, даже в книжку писал — то-то надо, то-то нельзя… Константин увидел книжку, мне потом груша была.</p><p class="p1">— Полная груша-то? — спросил Рогов, полагая, что груша — что-то аналогичное крантам.</p><p class="p1">— Была бы полная — жив не был бы, — сплюнул Павел. — До половины раскрыли.</p><p class="p1">Рогов, не в силах представить себе грушу, замолк. В оставшиеся до сбора полтора часа он валялся на траве под присмотром Павла и, кажется, даже задремал ненадолго — настолько все было нереально и так он устал от этого.</p><p class="p1">Сбор был главным событием дня: кто в чем — в старой военной форме, в тренировочных костюмах древнего образца, в ватниках и болоньевых куртках, в грязных китайских пуховках жители Чистого тянулись к помосту. Откуда они только не брались: из леса, из бараков, из столовой, из-под земли; Рогов наконец увидел, что пятеро копали яму, явно слишком большую даже для братской могилы. Она располагалась на краю площадки, за Константиновым бараком, и смысла в ее рытье было не больше, чем в таскании бревна. Земля, выброшенная из ямы, видимо, тут же разбрасывалась и разравнивалась: насыпей Рогов не видел.</p><p class="p1">Из своей избы вышел Константин с неизменным Андроном — сам в чистом длинном пальто, доходившем ему до пят, Андрон — во вчерашнем тулупе. Свежело, Рогов попросил у Павла разрешения сбегать в барак за рюкзаком, но одного его, естественно, никто отпускать не собирался. Они дошли до барака, Рогов натянул свитер. Павел с явным нетерпением торопил:</p><p class="p1">— На сбор не опаздывают. Ты знаешь, что тебе после карантина будет за опоздание на сбор? Палец, не меньше.</p><p class="p1">Что такое все эти груши и пальцы, Рогов уточнять не хотел. Он пробыл в поселке меньше суток, а ему уже до смерти надоело метаться между страхом и злобой: других состояний — просветлений, озарений, благости — он и не предполагал тут. Последние сомнения мог развеять сбор — главное, видимо, что он должен был тут увидеть. Но самой страшной была мысль о том, что только такая жизнь, всецело подчиненная сложному и изощренному закону, и могла стать уделом обитателей подлинного Чистого или их наследников: ни в чем, кроме усложнений закона и кар за его несоблюдение, смысла для них быть уже не могло. И поскольку Рогов нигде в мире не видел ничего подобного этому поселению, оставалось признать, что его-то он и искал — и не мог бы найти ничего другого, потому что лишь беспрерывное самоограничение со все новыми изощрениями могло представлять интерес для человека, прошедшего Верховную проверку. Такой человек должен был обожествлять принципы и в принцип возводить любую мелочь, регламентировать каждый чих и за несоблюдение регламента в мелочах карать так же, как за убийство, например, — ибо с точки зрения человека, выдержавшего полгода пыток и не сдавшегося, разницы между ошибкой, проступком и преступлением по определению нет.</p><p class="p1">Но что такое закон, думал Рогов, идя со всеми к помосту, — что такое закон, который он, по словам Павла, начал уже понимать — и понимать, если верить Павлу, после нападения на свинаря? Впрочем, чему здесь можно было верить… Все было обманкой для нового человека, и пройти по этому минному полю, не подорвавшись, не смог бы и самый тренированный провидец. Закон двадцать пятого числа, бывшего к тому же двадцать первым; северный ветер; чудесное превращение чужих часов в собственные; неприкасаемый Николка, груша, палец, палки-рогульки, три сезона — все сливалось в один затяжной, бессмысленный кошмар, и подобрать к нему единый код было по определению нельзя; только отсутствие кода могло быть единственным законом — но в этот миг его отвлекли. Он так сосредоточился на собственных мыслях, что не заметил, как одноглазая подошла к нему и тронула за рукав. От нее шел тот же тонкий, тошный запах женского барака, но она накрасилась — и что самое отвратительное, накрасила не только губы и щеки, но даже грубо, как на тюремном вечере самодеятельности, размалевала веки; особенно ужасно было сморщенное синее веко отсутствующего левого глаза. А ведь она молода, мелькнуло у Рогова, молода и была бы хороша, будь при ней оба глаза и пропади куда-нибудь эта боевая раскраска.</p><p class="p1">— После сбора приходи, со мной пойдешь, — тихо сказала она, наклонясь к его уху и чуть не касаясь его губами; он узнал влажный, жаркий шепот, который вчера на закате морочил его в лесу.</p><p class="p1">— А этот? — Он кивнул на Павла.</p><p class="p1">— Этот ничего тебе не сделает, я с ним договорюсь. Как будет отбой, час выжди. Часы взяли?</p><p class="p1">Рогов кивнул.</p><p class="p1">— На. — Она быстро сунула ему крошечные женские часики с браслетом. — В десять.</p><p class="p1">— А ты?</p><p class="p1">— Я себе еще возьму, я староста барака. — В голосе ее зазвучала начальственная гордость. — Что, не ждал?</p><p class="p1">Рогов пожал плечами.</p><p class="p1">— А патруль?</p><p class="p1">— Ты не понял? — Во взгляде единственного ее глаза читалось явное разочарование. — Нет никакого патруля. На тебя случайно напоролись, там наши деревья метили. Что ж ты тормозной-то такой, новый? Мне ж Пашка сказал, ты вроде продвинулся.</p><p class="p1">— Когда он успел? — удивился Рогов.</p><p class="p1">— Нам много время не надо. Ты бы спал побольше. — Она хихикнула и отстала.</p><p class="p1">Тут же к Рогову подпрыгнул Николка.</p><p class="p1">— А, новый, новый! Петра посмотришь, Петра посмотришь! А потом сам, а потом сам! Внимательно смотри, пригодится!</p><p class="p1">— Пошел ты, — сказал Рогов.</p><p class="p1">— Сам пойдешь, сам пойдешь! Андронушко, запиши ему!</p><p class="p1">Но Андрон был уже далеко впереди, и было ему не до Николки. Он давал последние наставления четверке мрачных людей, окруживших пятого, связанного. Разглядеть его толком за широкими спинами охранявших Рогов не сумел — видел только, что толстый; в Чистом вообще было на удивление много дородных. Помост пока стоял пустым; потом двое вынесли на него кресло — для Константина, догадался Рогов. Догадывался он и о том, кто был Константин, и понимал даже, почему его однополчанин с такой смесью ужаса и омерзения, словно увидев выходца из ада, бежал от лейтенанта Сутормина в сорок восьмом году. Как будто прочитав его мысль, Константин обернулся в его сторону и кивнул — не ему, а своим мыслям; потом пальцем подманил Андрона и что-то шепнул ему, подобострастно нагнувшемуся. Андрон направился к Рогову, и тот со стыдом и омерзением почувствовал, как потеют руки и снова ледяная рука сжимает желудок. Двадцать пятое число: карантин больше не охранял его. Он не был застрахован ни от одной из местных казней. Господи, подумал он, что ж я не остался с ними, с теми? Господи, сделай меня деревом, травой, тропой, Господи, спрячь меня от человека!</p><p class="p1">— Пойдем, — пробасил Андрон. — Константин возлюбил тебя, воспомнил. Говорит, поставьте нового, чтобы лучше видно было.</p><p class="p1">— Свинарь! Свинарь! — закричали в толпе, снова с ударением на «и». Рогов понял кое-что, и это кое-что его не обрадовало.</p><p class="p1">Между тем постепенно темнело, пасмурный свет мерк. Константин тяжело поднялся на помост и медленно опустился в кресло. Андрон пять раз звучно хлопнул в огромные ладони, — видимо, это заменяло бой курантов. Воцарилась тишина. Еле-еле покрапал дождь, но тут же стих.</p><p class="p1">— Собратья, — тихо и скрипуче выговорил Константин. — Сегодня мы в первый раз казним двух новопосвящаемых, Алексея и Елисея, удушаем сестру нашу Анну, предавшую нас, и в последний раз прощаемся с братом нашим Петром, превысившим меру терпения нашего. Время позднее, погода серая, — поторопимся. Андрон, подымись да прочти.</p><p class="p1">Всего, что происходило затем, Рогов старался не видеть, но не мог ничего с собой сделать и время от времени смотрел: искушение было сильно, хоть он и понимал темную, подземную природу этого искушения. Страшное возбуждение владело им, и только одно оправдание могло быть у этого возбуждения — он так до конца и не верил в реальность происходящего. Между тем происходящее было реально: двое дюжих выволокли на помост бледного, онемевшего от ужаса молодого парня, который трясся и повисал у них на руках.</p><p class="p1">— Новопосвящаемый брат наш Алексей! — возгласил Андрон. — Преступление: выбросил окурок между полуднем и первым часом пополудни. Наказание через отрубление. Свинарь, делай свое дело.</p><p class="p1">— Стой, стой. — Константин поднял руку и остановил церемонию. — Не задерживай, да не гони. Надо слово сказать. Говори, Алексей, свинарь-то у нас дело знает, он успеет.</p><p class="p1">Но Алексей не мог не только говорить — он еле стоял. Рогов снова опустил глаза, однако хорошо успел разглядеть его белое лицо, длинные рыжие кудряшки, забранные в хайратник, и широко раскрытые серые глаза. Парня этого гораздо проще было представить в хипповой коммуне или программистской, допустим, тусовке; смотрелся бы он и у толкиенистов. Алексей немного похватал ртом воздух, оглядел лица, скользнул и по Рогову, который нет-нет и взглядывал воровато на помост. Прошло около минуты.</p><p class="p1">— Пу… пу…пустите меня, я передумал, — очень тихо сказал Алексей.</p><p class="p1">В толпе зааплодировали. Рогов наконец оглянулся: на всех лицах был написан жгучий интерес и непритворное наслаждение.</p><p class="p1">— Молод. — Константин поощрительно улыбнулся. — Молод, но перспектив не лишен. Ничего, еще обучится, — пальцев много. Приступаем, брат свинарь.</p><p class="p1">На помост вскочил Николка, который, конечно, не мог пропустить зрелища. Он закружил, захлопотал вокруг плахи, приговаривая:</p><p class="p1">— Мало тебе, мало тебе, Алексеюшка! Запишите ему — плохо просит, плохо просит! А ты окурками не швыряйся, не швыряйся!</p><p class="p1">Никто не осаживал Николку, напротив — такой образ действий, судя по всему, был в поселке привычен и вызывал горячее одобрение.</p><p class="p1">Двое, державшие брата Алексея, с силой подтащили его к плахе и положили на нее левую руку новоказнимого. Алексей завизжал, как резаная свинья. Менее всего Рогов мог представить себе, что сам он станет делать в подобной ситуации, которая запросто могла ему предстоять уже на следующий день: во-первых, есть вещи, которых не отрепетируешь, ибо в экстремальных положениях все происходит наоборот, против обычной логики; во-вторых, реальности происходящего верить было невозможно. Кругом был девяносто шестой год, август, Восточная Сибирь, — и тем не менее свинарь размахнулся, с радостным хеканьем опустил топор, визг Алексея оборвался, и мгновение спустя что-то шлепнулось на помост. Пров тут же подскочил к упавшему предмету, поднял его и показал толпе: Рогов понял, что имел в виду Павел, говоря о казни «палец». Понятно, тут же подумал он: нарушений множество, жизней не напасешься. А пальцев вон сколько, считая те, что на ногах. Интересно, что сделали однорукие. Не иначе, чихнули во время церемонии. Алексей тихо плакал, повизгивая; двое быстро и привычно бинтовали ему левую руку. Свинарь сунул отрубленный палец в карман. Послышались приветственные крики.</p><p class="p1">— Оттяпали, оттяпали! — кричал Николка. — Небось обделался, верно уж обделался! — Он скатился с помоста по ступенькам, не решаясь спрыгнуть по малости роста и, как догадался Рогов, робости натуры. Рогов охотно убил бы его. Теперь он почти не сомневался, что смог бы это сделать, и более того — что этот поступок мог бы стать главным оправданием его жизни.</p><p class="p1">— Порадуемся за новонаказанного брата нашего, — тихо и тепло сказал Константин. — Каждый из нас знает, какое умиление снизошло сейчас на душу его. Живому пройти через казнь и с новой силой вернуться к жизни, отвергнуться от братьев своим неслыханным проступком и вернуться в их прощающие объятия — есть ли другой рай, возлюбленные? Поприветствуем брата Алексея!</p><p class="p1">Сзади бешено захлопали. Павел закурил. Рогов дал себе слово проследить, куда он денет окурок.</p><p class="p1">— Брат Елисей! — басом возгласил Андрон. — Преступление: не выбросил окурка между двенадцатью и часом пополудни. Окурок спрятан в карман, обнаружен братом Евгением. Наказание через отрубление. Осложнение: просил не записывать ему. Наказание через плюновение.</p><p class="p1">— Приступай, свинарь, — разрешил Константин.</p><p class="p1">Елисей, видимо, был лагерник со стажем, ибо шел уверенно, его даже придерживали сзади, чтобы не так рвался вперед, к самому интересному. Свинарю поднесли пучок какой-то травы; он взял ее в рот и медленно начал жевать, тяжело двигая челюстями.</p><p class="p1">— Говори, Елисей, — сказал Константин, вновь жестом останавливая Прова.</p><p class="p1">— Сознаю тяжесть греха моего и умоляю простить хотя бы после искупления, — бойко отбарабанил Елисей.</p><p class="p1">— Ты бы сверх формы что-нибудь, — поморщился Константин. — В другой раз, Андрон, напиши ему. Нельзя же все по образцу, тебя люди слушают.</p><p class="p1">— А если не по образцу. — Елисей расправил плечи. — Если не по образцу, а от сердца… тогда я так скажу: семь дней дали мне между проступком и казнью, и все семь дней боялся я, что будет со мною. А сейчас не боюсь, братья, потому что все будет уже сейчас! Смерти бояться — это, я скажу по-простому, все одно, что бабу драть и бояться кончить! Вот что я вам скажу, и дозвольте мне, как любимому герою моего незабвенного детства, самому скомандовать: руби меня, свинарь!</p><p class="p1">— Андрон, — неприязненно сказал Константин, чувствуя, видимо, что толпа не знает, как реагировать на дерзкую, слишком гладкую речь. — Запиши ему самоволие с отсрочкой на две недели, наказание через кислоту. Оно, конечно, есть закон: казнимому перед казнью не писать, но есть и другой закон: самоволия не поощрять и в казнимом; за преимуществом второго закона противоречие решается в его пользу. Теперь приступай, свинарь.</p><p class="p1">Снова на помост выскочил Николка:</p><p class="p1">— Своевольничать, своевольничать! Плюновение совершу, плюновение совершу!</p><p class="p1">Двое так же приложили к плахе руку несколько опешившего Елисея, Пров хекнул, Елисей коротко взвыл, потом выждал паузу и наконец заорал долго и мощно, на одной ноте, запрокинув к небу искаженное лицо. Его ловко перевязали, потом вдруг резко вывернули руки, и он нагнулся, перестав орать от неожиданности.</p><p class="p1">— Плюновение! — объявил Андрон; Пров подошел к Елисею и смачно выхаркнул ему в лицо травяную жвачку. Рогов зажмурился и принялся тереть лицо — щеки, веки, — чтобы погасить приступ тошноты.</p><p class="p1">Елисея сволокли вниз и швырнули под помост, где он тут же скорчился на боку в позе эмбриона. Теперь он орал беззвучно — широко раззявливал рот, не смея или позабыв утереться. Палец аккуратно положили рядом с ним. Выполнив все это, двое вернулись на помост.</p><p class="p1">— Павел, — обратился Рогов, временно уговорив себя, что все-таки видит сон. — Ты прости уж, что отвлекаю…</p><p class="p1">— А? — переспросил Павел, совершенно поглощенный зрелищем.</p><p class="p1">— Я спросить хочу: один бросил окурок, другой не бросил. А пальцы обоим рубанули. Закон это объясняет как-нибудь?</p><p class="p1">— Ну а как же. — Павел заплевал окурок, положил его в рот и, пожевав немного, проглотил. — Закон все объясняет. Один — Алексей, другой — Елисей. Ежели бы Алексей окурка не выбросил, так ему бы ничего не было, хоть он все карманы окурками набей, хоть ватник ими сожги. А ежели бы Елисей, примерно сказать, окурок выбросил, так ему бы даже поощрение было. Ага, поощрение. Видишь, какой закон у нас? Закон у нас всеобщий, — непонятно, но с удовлетворением закончил Павел. — А сейчас самое как есть интересное пойдет.</p><p class="p1">Под помостом суетился Николка, поплевывая в лицо Елисею.</p><p class="p1">— Сестра наша Анна, — сухо сказал Константин, когда стих возбужденный гул, — снова предала нас третьего дня, покинув лагерь ночью. Наказание через удушение.</p><p class="p1">Рогов изумился было, почему объявить о наказании Анны решил сам Константин, не доверив Андрону, — но все понял, едва Анна, точно на эстраду, взбежала на помост. Анной звали одноглазую старосту барака, ту самую, которая звала его из лагеря ночью. Если старосте барака за ночную отлучку грозит удушение, подумал Рогов, мне и вовсе башку оттяпают. К тому же если удушение настоящее (проступок был посерьезнее окурка, и он вполне допускал, что хоть одна казнь на каждом сборе может оказаться реальной) — тогда предложение Анны встретиться с ней ночью приобретало занятный смысл. Эта мысль несколько расшевелила отупевшего Рогова: он знал за собой эту счастливую способность тупеть в минуты сильного страха или опасности: подлинный ужас догонял его потом. Так отходил наркоз, и эта боль, быть может, бывала еще и побольнее той, от которой он был избавлен благодаря счастливому свойству психики.</p><p class="p1">Двое, которые сначала тащили Алексея, а потом вели Елисея, встали рядом с Анной; она присела на плаху. Третий выскочил откуда-то сзади с длинным мокрым полотенцем. Еще одна пара — неизменные двое одноруких — внесла на помост носилки и спрыгнула вниз, рядом с отпрянувшим Роговым. Рогов, однако, с ужасом ловил себя на том, что возбужден не на шутку и на удушение Анны посмотрит с большим интересом.</p><p class="p1">— Делай! — скомандовал Андрон.</p><p class="p1">Анна сняла платок и оказалась темной шатенкой с блестящими, хорошо промытыми волосами. Свинарь подошел сзади и взял ее за руки. Двое (их Рогов мысленно прозвал «двое из ларца», в отличие от пары безруких, обозначенных им как «двое без ларца») захлестнули вокруг ее шеи мокрое полотенце, свели его концы и принялись закручивать, как закручивают белье. Скоро побежала вода, лицо Анны побагровело, она несколько раз царапнула по помосту каблуками высоких грубых сапог. Рогов жадно смотрел на нее. Полотенце закручивалось все туже, Анна уже с трудом дышала и наконец несколько картинно уронила голову набок; «двое из ларца» с видимым трудом крутанули полотенце еще пару раз, выжав несколько тяжелых капель, и тут же размотали его. Рогов не видел, в сознании Анна или нет: единственный глаз ее закатился, и она не шевелилась. Общими усилиями ее положили на носилки и снесли под помост.</p><p class="p1">— Притворяется, — уверенно сказал Павел. — Я Аньку знаю. Они плохо давят: она только забалдела — эти и кончают. — (У Рогова хватило еще мерзости, которой он тут же устыдился, обратить внимание на двусмысленность.) — Вот я ее давил, голыми руками, — у нее настоящий кайф был. Она рассказывала, что ангелов видела. Говорит — все в искрах. Меня вот дави не дави, я никогда ангелов не увижу.</p><p class="p1">— Петр! — звучно и празднично объявил между тем Андрон, и Рогов услышал сдержанный гул одобрения. Шоу Петра, по всей видимости, было кульминацией сбора, тем более что Константин назвал казнь Петра последней, ибо терпение солагерников было истощено.</p><p class="p1">На помост втолкнули толстого и рослого малого со связанными руками; ватник его был распахнут, виднелся тельник. Лицо у Петра было откровенно бандитское, пухлое, небритое, и для довершения приблатненности облика он был по всему телу сизо татуирован и подстрижен под бобрик; низкий лоб собрался в морщины.</p><p class="p1">— Развяжите, — милостиво кивнул Константин. — А ты, свинарь, готовься: голову рубить — не то что палец. Это всего третье, кажись, обезглавливание у тебя?</p><p class="p1">— Четвертое, — поправил свинарь.</p><p class="p1">— Андрон, запиши ему возражение… Приступай, Петр.</p><p class="p1">— Прости, Константин, — густо и убедительно сказал Петр. — Ведь так вот всегда: покаешься, потом подойдет под сердце — и опять грешишь. Не хотел я тебе согрубить, видит Бог, не хотел.</p><p class="p1">— Ты Бога-то не поминай, — с видимым удовольствием произнес Константин, которому разыгрывание этой пьесы перед небольшой, но страшно воодушевленной аудиторией доставляло приятнейшие минуты. — Ты кайся, тебе секунды остаются.</p><p class="p1">— Соколик мой, горностаек! — закричал Петр, падая на колени с гулким стуком; помост содрогнулся. Лежавшие под ним Елисей и Анна, однако, не отреагировали. — Светик мой, семицветик! Ножки тебе буду целовать, дай еще раз мамыньку увидеть. Как же я помру, не увидевши мамыньки! — Причитания его приобретали все более надрывный характер, составляя удивительный контраст со специфической внешностью. — Мамынька глазыньки проглядит: где-то мой сынок непутевый? Пощади, отец родной, заставь век Бога молить!</p><p class="p1">Что-то подобное я слышал или читал, подумал Рогов. Он сам дивился, как у него хватает сил и гнусности спокойно, с некоторым даже эстетизмом анализировать происходящее. Впрочем, никак иначе ко всему этому и нельзя было относиться — сборы явно были давно и хорошо отрежиссированы, и Рогов каким-то краем сознания понимал, что взывают они в конце концов именно к его эстетическому, а никак не к нравственному чувству — особенно если учесть, что преступление Петра не оглашалось, да и вряд ли имело значение. Но где-то я это определенно читал, снова подумал он. «Князь Серебряный»? «Доктор Живаго»? Про мамыньку точно из «Живаго», про ножки — из одного горьковского рассказа, где убивали конокрада; поразительно начитанная публика!</p><p class="p1">Петр между тем совсем уж картинно мотал головой, стоя на коленях, и раскачивался всем телом из стороны в сторону. Слезы были самые настоящие, и чем каменнее выглядело спокойствие Константина, которому начинал уже, кажется, надоедать затянувшийся пролог зрелища, тем более подлинное отчаяние читалось на лице Петра: он, видимо, начинал понимать, что теперь ему действительно ничто не поможет.</p><p class="p1">— Ладно, — сказал наконец Константин. — Неинтересно. Связывайте его, ребята, обратно, да и порешим поскорей. Ужинать пора.</p><p class="p1">— А-а-а! — взвыл вдруг Петр, вскакивая с колен и одним прыжком отдаляясь от края помоста, к которому, напирая сзади на Рогова и жарко дыша, подалась толпа. — Жестокие, жестокие! А-а-а! Ой, не троньте меня! Всех убью, один останусь! — Он вдруг выхватил из рукава необыкновенно длинную и острую заточку и несколько раз рассек ею воздух вокруг себя. Свинарь, стоявший сзади, бросился было к нему, но Петр его заметил — почувствовал, видно, дрожь досок, — стремительно обернулся и кулаком вломил свинарю промеж глаз; тот, уже получив сегодня от Рогова и еле запудрив кровоподтеки на лице, отлетел метров на пять и чуть не рухнул на землю. Пользуясь общим замешательством, Петр спрыгнул с помоста назад, к огороду, и, пнув кинувшегося ему наперерез садовника, дернул в лес. В сгущающейся темноте августовского вечера там ему едва ли угрожала погоня.</p><p class="p1">Сдержанное «А-а-ах!» прокатилось по толпе.</p><p class="p1">— Ушел, — густо сказал Андрон. — Пишу себе.</p><p class="p1">Толпа замерла, не зная, как реагировать. Молчание тянулось минуты две; Константин не оборачивался и не вставал из кресла. Голова его была опущена, и молчание не предвещало ничего хорошего.</p><p class="p1">— Слабовато Петька отработал на этот раз, — пренебрежительно, сквозь зубы, сказал Павел. — С пистолетом лучше получилось. Но у него Константин отобрал пистолет, потому что он в тот раз Макара ранил по-настоящему.</p><p class="p1">— Так что ж, он уйдет? — тупо спросил Рогов. — Не ищут же…</p><p class="p1">— Да кому он нужен, его искать. — Павел широко, сладко зевнул, но тут же испуганно прикрыл рот рукой. — Искать еще. Завтра припрется как милый. У него же специализация такая — побег, больно причитает хорошо. Его еще ни разу не казнили. Приговаривают каждую неделю, а казнить не казнят. Он побег показывает. Один раз прямо из петли убежал — подговорил Григория, тот веревку успел подрезать. Ну сюрприз был! Сегодня он так, не в ударе. Было время — все плакали, как он просил. В ногах валялся. А потом все равно сбегал. Это у него для подзавода распорядок такой — сперва просит-молит, потом пиф-паф! Или вот с заточкой, как сейчас. Один раз со спицей бегал, у баб спер. Изобретательный, зараза. Но вообще лениться стал: конец сезона, что ты хочешь.</p><p class="p1">— И что? — спросил Рогов. — Он завтра вот так спокойно вернется?</p><p class="p1">— Если зверь не заест, — кивнул Павел. — Да какой тут зверь? У Петьки наверняка нора вырыта, или шалаш он себе поставил — ночь просидит, а утром вернется. Он же не хочет бежать, куда ему бежать? Это ему Константин такую работу определил, а так он даже не отлучился отсюда за три сезона на моей памяти ни разу. Бегает тут поблизости ночью, иногда баб пугает — стонет там в лесу всяко… А к утру всегда тут, жрать-то хочется. Он знаешь как жрет? Но Константин велел ему не жалеть: у него, говорит, амплуа нервное…</p><p class="p1">То единственное, в чем на миг мелькнула подлинность, оказалось главной обманкой. Петр не был ни мучеником, ни беглецом. Со странной смесью отвращения и умиления посмотрел Рогов на Константина. Да, сомневаться нельзя было: это он, последний, кто остался от первого поколения чистовцев. Кто угодно из обитателей поселка мог оказаться потомком его деда — двоюродным дядькой, троюродным братом самого Рогова; Павел, кстати, вполне годился в троюродные братья. Что еще им оставалось тут делать? Какие другие развлечения были доступны людям, которых все время проверяли и мучили, пока они не поняли, что это единственное занятие, к которому в конечном итоге сводятся все остальные? Стоило ли развлекаться, ссориться, любить, если предельным выражением жизни, ее наиболее насыщенной формой была казнь, сочетавшая в себе и подспудный эротизм, и соблюдение сложного закона, и чувство справедливости, и элемент воспитательного развлечения для наблюдателя? Что было интересного, кроме казней, что более предельное мог измыслить человеческий мозг и что еще было делать людям, чьи родители ушли от мира? Все казалось бы мало тем, кто жил тут, в тайге, без комфорта и электричества: нужна была острая и напряженная жизнь, и ничто, кроме непрерывного самомучительства, такой остроты не давало. Да, он в Чистом, сомнений не было. Кретов не врал про изображения пыток, которые видел в местном боевом листке. Интересно только, почему они замазали надпись «Дома никого нет» и куда девались скамейки, стоявшие раньше на плацу. Впрочем, тогда, вероятно, не было помоста, а скамейки нужны были для того, чтобы высиживать бесконечно длинные партсобрания и политзанятия. Теперь вместо них были сборы, то есть казни, — это короче, а главное, динамичнее. Мучительство — единственное, что никогда не надоест.</p><p class="p1">Константин сидел все так же неподвижно, свесив голову на грудь. Андрон подошел к нему, нагнулся и заглянул в лицо. Рогов не успел даже заподозрить, что старик помер во время представления: все-таки Петр умел рвать душу. Конечно, смерть старика мало огорчила бы Рогова, хотя без того тут запросто могла начаться смута, в которой не поздоровилось бы ему первому. Но больше всего он испугался того, что теперь никто не расскажет ему про деда. Константин, однако, был живехонек. Он просто уснул. Андрон потряс его за плечо, и старик поднял белую голову, мутным взглядом обводя толпу. Нитка слюны свисала с губ. Он был все-таки очень стар, страшно сказать, как стар.</p><p class="p1">— Расходимся, братья, ужин, — спокойно сказал Константин и вновь свесил голову на грудь. Андрон бережно подхватил его и, как ребенка, понес в резиденцию. Сзади «двое без ларца», симметрично покачивая пустыми рукавами, несли кресло.</p><p class="p1">Ужин прошел в сдержанных обсуждениях побега Петра и в спорах, во сколько ждать его завтра; кто-то назойливо выспрашивал, отчего не идет Елисей — он мужчина крепкий, от плюновения никто еще не умирал…</p><p class="p1">— А чего Анну не отпевают? — спросил Рогов у Павла.</p><p class="p1">— Чего ее отпевать, это разве казнь? Бережет ее Константин, любит. Больно хорошо ногами скребет, только отрубается быстро. Рассказывает потом — закачаешься. Что она там видела и все дела.</p><p class="p1">— И что, многое видела?</p><p class="p1">— Жри давай. — Перемены настроения у Павла были мгновенны.</p><p class="p1">Нет, положительно главного воспитателя-карантинщика, старого медведя Балу, знатока закона, что-то связывало со старостой женского барака. Он был в нее влюблен, — может быть, даже взаимно, — и уж точно оказывал ей услуги, которые при желании можно было расценить как любовные: душил голыми руками, доводил до состояния, в котором она видела ангелов… Непонятно, зачем ей мог теперь понадобиться новый человек. Но судя по тому, что она не скрыла от Павла своего намерения встретиться с ним ночью, — как любовник Рогов ее не интересовал.</p><p class="p1">— Павел, — Рогов переменил тему, — скажи, ты тут никого по фамилии Скалдин не знаешь?</p><p class="p1">— Не-а, — покачал головой Павел, набив полный рот хлебом с маслом; сверху, по маслу, он размазал смоченный в чашке чаю сахар.</p><p class="p1">Так многие делали в армии, и зрелище было отвратительное. Рогов предпочитал свой кусок сахару давить между двумя столовыми ложками. Впрочем, сейчас у него вообще не было аппетита.</p><p class="p1">— Никого по фамилиям не знаю, — добавил Павел, прожевав. — У нас не принято. И я только три сезона…</p><p class="p1">— А раньше? Многие тут раньше?</p><p class="p1">— Есть, — неопределенно ответил Павел. — Но фамилии один Константин знает, а тебе к нему до конца карантина обращаться нельзя. — Допив чай из алюминиевой кружки, Павел склонился к уху Рогова: — Про ночные походы твои я ничего не знаю, ничего не слышал. С Анькой ночью лучше не ходить, но раз позвала — иди: в карантине не отказываются. Только смотри, чтоб не знал никто. В карантине выбор хороший. — Он понимающе гыгыкнул. — Не пойдешь — шкаф, пойдешь — груша.</p><p class="p1">— Слышь, Павел. — Рогов снова осмелел, втайне обрадовавшись тому, что Павел по ночам с Анной не ходит. — А куда свинарь пальцы денет?</p><p class="p1">— Известно куда, — усмехнулся Павел. — Свиньям скормит. Свиньи все сожрут.</p><p class="p1">После ужина разошлись по баракам. Рогов глянул на часики: четверть девятого. Он так устал и так был полон увиденным, что заснуть поначалу не мог — не отпускало возбуждение, и все та же ледяная рука нет-нет да и сжимала желудок при мысли о том, что он тут пленник, что вывести его отсюда некому. На Павла в этом смысле полагаться было нельзя — выслушает, покивает сочувственно да прямо Константину и сдаст. С послезавтрашнего дня на него, якобы уже все насчет закона усвоившего, но так ничего и не понявшего, этот самый закон начинал распространяться, а потому для бегства оставался один день — завтрашний.</p><p class="p1">Он все-таки засыпал потом, но ненадолго, урывками. Прежде интересовавшая или пугавшая чужая воля, в полном распоряжении которой он был, внушала ему теперь ненависть. Никто не смеет держать его черт-те где, да и все эти фокусы с казнями… Те закалялись и проверялись, эти развлекаются. Нет, бежать, бежать, одна надежда, что Анна выходит из поселка по ночам. Может быть, это лунатизм, а может, тоска по любви, но она куда-то исчезает ночью; а может, ей просто хочется нормальной еды, а не вечной этой жирной тушенки с водянистыми овощами. Тогда она точно бегает в деревню — хотя бы за хлебом; отсюда и тамошние слухи о таинственных людях. Может быть, она в этот раз и возьмет его с собой, хотя он решительно не понимал, чем мог заслужить ее благосклонность. Стопроцентной уверенности в ее доброжелательности не было, но относительно других была стопроцентная уверенность, что еще и сдадут. Не пойдешь — шкаф, пойдешь — груша.</p><p class="p1">Но если было даже полшанса бежать из этого вымечтанного Роговым места, следовало попытаться; и каждые полчаса он просыпался и рассматривал часики. Стрелки их слабо светились (знала, что дать!) и показывали девять, полдесятого, десять… Рогов ощутил даже желание угреться, посещавшее его всегда, когда уют бывал непрочен: ничто не делает одеяла таким теплым, как необходимость вставать! В армии, помнится, когда дневальный будил его на смену в наряд по КПП или в столовую (кухонный наряд вставал на час раньше роты), Рогов давал себе слово в Москве ставить будильник каждую ночь на полчетвертого, самое сонное, по его наблюдениям, время, — чтобы с тем большим наслаждением понять, что идти никуда не надо, и снова завалиться спать. Он так и не успел эту идею осуществить — и не успеет никогда, подумал он, если не вырвется отсюда.</p><p class="p1">Без четверти одиннадцать он встал, предупредил дежурного, ходившего между дверью и печкой взад-вперед с выражением тупым и сонливым, соврал, что идет до ветру («Знаешь куда?» — «Знаю»), и вышел на холодный воздух.</p><p class="p1">Тучи закрывали небо, прятали месяц и звезды; поднимался ветер. Рогов не мог взять рюкзака, чтобы дежурный ничего не заподозрил, но перед выходом натянул второй свитер. Жалко было оставлять сумку, свою, родную вещь, в чужих руках; все тут были ему трижды чужими, больше того — инакими, иноприродными; но он должен был представлять себе, что ищет. Выбора у чистовцев, как и у него, не было. Дети несчастных, свезенных сюда насильно, они обречены были стать такими — вечная дисциплина, вечная проверка, вечная охота на новых, чтобы не иссякал материал…</p><p class="p1">Рогов поднял воротник куртки и поспешно, широкими шагами пошел к женскому бараку, но тут не пойми откуда, как всегда, выскочил Николка.</p><p class="p1">— Новый сбежит! — заорал он невыносимо визгливым голосом. — Почти сбежал, уже бежит! Поднимайтесь, люди, свежее мясо уходит!</p><p class="p1">Рогов, начисто забыв о Николкиной неприкосновенности, со всего размаха ударил его в нос.</p><p class="p1">— Нет такого закона, чтобы бить Николку! — отчаянно завизжал юродивый.</p><p class="p1">— Нет такого закона, чтобы всех бить, а одного не бить, — сказал Рогов и добавил ему, уже под глаз: — Нет такого закона, чтобы ублюдков не трогать. Нет такого закона, чтобы их терпеть!</p><p class="p1">Николка тут же замолчал и взглянул на Рогова в непостижимом восторге, в его глазах, один из которых стремительно заплывал, Рогов прочел почти преклонение.</p><p class="p1">— Во въехал! — прошептал юродивый, показывая большой палец. — Всосал закон, въехал, въехал… Превышай, просто превышай, вот тебе и весь закон… Они тебе — нет такого закона, а ты им — нет такого закона, чтобы не было такого закона! И вообще. Ай, понял! Ай, понял! — И он укатился в никуда, как и появился ниоткуда.</p><p class="p1">Тут-то все части головоломки и сложились у Рогова в целую картину. Он понял, что никакого закона нет, не будет и никогда не было, а единственная цель жителей поселка — не соблюдение закона, а достижение максимума возможной муки при минимальном, чисто формальном ее оправдании. Эта мысль мелькала у него и раньше, но не оформлялась словесно: да, конечно, никакого режима тут нет! И большого закона, закона Империи — тоже никогда не было, ибо он полон юридических бессмыслиц и противоречий, и единственная его цель во все времена — максимально изобретательно мучить всех, ибо в противном случае человек превращается в медузу без костяка. Мучительство было единственным способом дать человеку сверхличную цель — ведь в благополучии он способен был заботиться только о личной, а человек устроен так, что на метр семьдесят он прыгнет, только если планка поставлена на метр девяносто; в случае же отказа от планки очень скоро начинает переступать ногами на месте — вот тебе и все прыжки.</p><p class="p1">Только под пытками открывалась истина, все прочее заслоняло ее. Так было во всем, в большом мире тоже: закон давно ничего не регламентировал. Он предписывал систему пыток, частичных казней и прочих способов взаимного мучительства, а правила поведения — Бог с ними, их можно было преступать по двадцать раз на дню. Правота покупалась дешево, как никогда: достаточно было сказать любому прохожему: «Нет такого закона, чтобы шаркать», — и ты делался его господином, пока он не понимал, что отзыв на этот пароль: «Нет такого закона, чтобы лезть». Чем глупее и мерзее вещь, которую ты про него сказал, тем больше шансов на успех, на жестокое порабощение: и шпана, когда воспитывала хлюпика, и власть, когда боролась с диссидентами, начинали примерно с одного и того же: посмотрите на себя! Следовал нелицеприятный анализ внешности героя, внимание акцентировалось на грязном, несвежем белье; если бы диссиденты в ответ замечали следователю, что да, они в несвежем белье и перхоти, но у него-то гнилостно пахнет изо рта, — как знать, быть может, это превышение ошеломило бы следователя так, что он рухнул бы со стула или выпустил диссидента. «Нет такого закона, чтобы ты тут существовал», — на каждом шагу напоминала страна. «Нет такого закона, чтобы ты открывала пасть», — так должен был выглядеть законный ответ.</p><p class="p1">Теперь он действительно понял. Теперь на утверждение, что при северном ветре четного числа нельзя начинать сморкаться с левой ноздри, Рогов всегда мог ответить, что согласно приложению это допускается, потому что сегодня пасмурно; а вот вы нарушаете, серьезно нарушаете — вы вчера в ковбойке были, ай-яй-яй, по воскресеньям — в ковбойке, позор! Пункт пятнадцатый статьи тридцать восьмой, не помните? Как же! Там за это вплоть до сами знаете чего… Никакого критерия, кроме готовности идти все дальше и дальше и наконец расплатиться жизнью, пока не изобретено.</p><p class="p1">Вот я и один из них, подумал он. Вот я и знаю закон. Единственный закон, по которому жила найденная им элита нации, да и самураи, делавшие все возможное, чтобы обставить свою жизнь максимумом запретов и при малейшем их нарушении совершить ритуальное самоубийство: говори и делай что хочешь, лишь бы мука твоя была максимальна. В ней — единственная гарантия значимости того, что делается с тобой. Поначалу, может быть, какой-то закон и впрямь регламентировал их жизнь, но за шестьдесят лет, прошедших со дня основания Чистого, ситуация не то чтобы выродилась, но логически дошла до желанного абсурда, до естественного предела. Соблюдение оказывалось не так важно, как нарушение; и если пытки так и так составляли главное занятие чистовских, то логично было постепенно сделать их самоценными, а повод — чисто формальным. Жизнь присутствовала здесь в своем предельно концентрированном выражении, благая сущность наказания выступала в химически чистом виде, сама по себе, не омраченная поводом, предлогом, торговлей… Смешон и глуп загробный мир в представлении тех, кто видит его этакой гигантской небесной бухгалтерией: ты сделал, и тебе воздалось. Нет, очистка души, ее возгонка осуществляется вне зависимости от твоих грехов, — да и чем ты виноват, если, родившись, пришел в мир, где все начинает пытать тебя с первого дня? Никто не волен никого судить, ибо ни один человек не лучше другого; никто не волен поставить над другим закон, но всякий волен мучить всякого, ибо только это дает человеку почувствовать, что он живет. И любовь была острее в постоянном соседстве ужаса, и равенство гарантировалось само собой, когда и староста барака, и последний юродивый во всякий день могли стать жертвами свинаря на глазах у толпы; и усвоившим закон считался именно тот, кто бросался на неприкосновенного — на шута-юродивого, на палача-свинаря… Исполнение закона начиналось с посягательства на закон, текст загробной службы не имел никакого смысла, ритуал соблюдался ради соблюдения ритуала…</p><p class="p1">Ай да Константин! Рогов искренне восхищался им в эту минуту. И хотя ночной, мучительный телесный страх боли и постоянного дискомфорта внушал ему, что такая жизнь не для него, — он ясно понимал, что мечта его, мечта о справедливом мире, где люди заботятся не только о жратве, — осуществилась тут. Правда, без всякого искусства, без какого бы то ни было просвета, — но все искусство ушло в пытки, а разве пытка не есть концентрированное выражение той же литературы, которую Рогов еще имел наивность любить? Что делает литература? Транслирует чужой опыт, чаще всего опыт боли. Пытка транслировала тот же опыт, давая почувствовать себя то средневековым колдуном, то советским партизаном. Если где-то в мире еще существовала интенсивная жизнь с концентрированной, невыносимо сгущенной любовью, страхом и надеждой, — это было здесь, в Чистом, и только потомки любимых питомцев Верховного могли до такого додуматься. Вот откуда была физически ощутимая густота бытия в фильмах тридцатых годов и в музыке, скажем, сороковых.</p></span>
