<p class="p">РЕКОНСТРУКЦИЯ-1</p>
</div><p class="p1">В августе сорок восьмого года капитан Иммануил Заславский, по новым документам Григорий Абраменко, приехал в Москву.</p><p class="p1">На Казанском вокзале было шумно, но чисто. Мороженое не продавалось: торговля у станций метро или вокзалов, во избежание людских скоплений, была запрещена. Милиция щеголяла в новой форме. На улицах было тесно от блестящих, лакированных машин, многие из которых он видел раньше только на фотографиях в иностранных журналах, поступавших к отцу для ознакомления.</p><p class="p1">Их предупредили, что Москва давно не та и вообще мало что осталось тем. Предупреждение, впрочем, исходило от нового смотрителя, которого прислали из центра взамен убитого Голубева в сорок пятом году. Голубев ни за что не употребил бы формулировки «не удивляйтесь»: он знал, что в Чистом давно никто и ничему не удивляется.</p><p class="p1">Голубев вообще считался приличным человеком. Погиб он под Кёнигсбергом, совершенно по-дурацки. Кёнигсберг был его последним делом, после него он рассчитывал вернуться домой, к семье, жившей где-то в Куйбышеве. Заславский, честно говоря, был уверен, что тогда же их и распустят, — но именно новый смотритель, которого так и называли Новый, хотя фамилия его была Добров, с темным намеком поведал о далеко идущих планах по развертыванию нескольких операций в Европе: видимо, имелось в виду закрепление успеха.</p><p class="p1">Тем не менее до новой войны дело не дошло — то ли сыграла роль американская бомба, то ли Черчилль добился своего и запугал всех в Фултоне, — решено было пока помедлить, и весь первый призыв, изрядно повыбитый тридцать восьмой год, распустили по домам, которых у большинства давно не было. Заславскому-то уж точно некуда было возвращаться. Его родители умерли почти одновременно, в первый же свой лагерный год: отец надорвался раньше, мать пережила его на три месяца. Точной даты их гибели Заславскому, естественно, не сообщили, но о том, что ждать его будет некому, намекнул в сороковом году Голубев — возможно, в нарушение инструкций.</p><p class="p1">Голубева прислали в январе сорокового вместо Файнштейна, убитого Коротиным за издевательства. Только тогда наверху сообразили, что обращаться с ними после всего следовало чуть иначе: заметно смягчился режим, стали кормить не только сытно, но и вкусно, начали даже сообщать о судьбах родственников, хотя и в самых общих словах. Файнштейн был зеленый, многого не понимал. Он не понимал, что терять им всем нечего. Дело было не в гордости, после всего, что было, никто не гордился, попав в «золотой легион», который они между собой, не чинясь, называли «золотой ротой». Какая тут гордость: Михайлова в камере изнасиловали (он не подписал и после этого, но человеком себя уже не считал), Эскину мочились в рот, Гальпериной выжгли волосы на лобке, а уж о насилии и говорить не приходилось — она, на беду свою, уродилась красивой, цыганистой. Нет, гордость была ни при чем, но, видимо, в человеческую природу очень уж глубоко, с рождения кем-то вложено уважение к мертвым. С покойниками следовало обращаться прилично, а Файнштейн гонял их на бега, топал ногами, ругался по матери. Это посягало на единственное, что у них оставалось, — на гордость, на своеобразное достоинство мертвеца, который заслуживал уважения живых уже потому, что они были живы, а он нет.</p><p class="p1">Выяснилась неожиданная вещь: выдержать любые пытки способен не только силач Бамбула, но и стопроцентный хиляк, из тех, кого травили в школе и тем закалили до полного отвращения к жизни. Наверху рассудили правильно: главное — душок, а выучить можно всему… В Москве это понимали, а Файнштейн не понимал. Он не верил, что перед ним элита нации, которой предстоит отразить нападение фашистов, возродить страну и, возможно, покорить Европу. Пока перед ним была инвалидная команда, едва подлеченная после пыток и не умевшая толком ни бегать, ни стрелять. Публика подобралась самая разношерстная, так что приятель Заславского, некто Кузнецов, при жизни врач, просто терялся: выстаивали и коренные сибиряки, угрюмая туповатая деревенщина, и совершенные хлюпики с огромными еврейскими носами (у всех, кстати, перебитыми в первые же дни после ареста). Более того: интеллигентские недобитки держались приличнее всех, и уж совсем поражала Кузнецова, как, впрочем, и Заславского, худая строгая дама из бывшей богемы: ее готовили теперь на военврача — должен же будет кто-то и оперировать под огнем. Однажды у костра они разговорились, и Заславский выразил восхищение ее спокойным достоинством. «Ничего особенного, — просто ответила она, — мы еще в тринадцатом году понимали, что жизнь ничего не стоит». В тюрьме ей высверлили, а затем выбили все зубы и перебили обе ноги.</p><p class="p1">Заславский понимал ее. Он был гордым балованным мальчиком, советским принцем, и по всем раскладам ему полагалось сломаться первым. Но именно кичливость советского принца не позволяла ему поддаваться мучителям. Часто балованные дети и изнеженные дамы оказываются выносливее самых упрямых и красношеих простолюдинов, потому что презирают жизнь, а любят по-настоящему только пирожные.</p><p class="p1">А родители Имы Заславского, надеясь спасти сына, подписывали все, что требовалось, и погибли в голоде и холоде, в избиениях конвоя и нечеловеческой работе, при этом врозь, а не спасли все равно никого. Сам Заславский ничего не подписал и попал в Чистое. Впрочем, может быть, в том, что ближайшие родственники почти у всех чистовских были уничтожены, тоже имелся некий смысл: писать некому, на свете ничто не держит, в случае чего легче будет умирать за Родину.</p><p class="p1">Первое время он еще надеялся, что родители живы, а после их смерти непременно покончил бы с собой, но Голубев провел с ним долгую беседу, в которой пытался обосновать происшедшее. Он почти убедил Иму, что никак иначе спасти от внешнего врага первую в мире справедливую страну было невозможно, что эксперимента, подобного этому, не было в мире, что разделить человечество на сталь и шлак пора уже давно, — Заславский не проникся величием эксперимента, но разницы между жизнью и смертью уже настолько не ощущал, что от попыток прежде времени уничтожить себя пока отказался. Тем более, что никто в Чистом не сомневался: весь их эксперимент — до первого боя. Из покойников не готовят солдат. Из покойников готовят смертников.</p><p class="p1">Большинство было уверено, что и Коротина после того, как он в буквальном смысле свернул Файнштейну шею (Файнштейн был тренированней, но Коротин — здоровей, шире), не расстреляли, а отправили в какое-то еще более элитное, еще более Чистое. Расстрел устроили бы показательный, на плацу — там же, где поощряли отличившихся в стрельбе или рукопашном бою. Поощрения были словесные, чисто символические: смешно объявлять увольнение в тайге или баловать покойника сгущенкой. Правда, грех жаловаться — в город вывозили, водили в кино; никто из горожан ни о чем не догадывался — идет строй солдатиков (по этому случаю всех переодевали в неудобную общевойсковую парадку). Фильмы в большинстве своем казались Заславскому чушью: то ли действительно стали хуже снимать (всех, кто снимать умел, вероятно, отобрали и теперь готовили к более серьезным делам), то ли после случившегося выглядело мелким любое кино. Хороша, правда, была молоденькая артистка по фамилии Целиковская. Чем-то похожа на Иру, но, конечно, поэффектней.</p><p class="p1">То, что их рано или поздно распустят, было для Заславского очевидно давно — с того самого момента, как он понял, что убьют не всех. Их вообще почти не убивали: есть странный закон, по которому бомба не падает дважды в одну воронку. Голубев погиб именно потому, что был смотрителем, присланным в Чистое сверху для координации (и, вероятно, вообще мог откосить от фронта, но на все операции вылетал с чистовскими).</p><p class="p1">Непонятно было, что Верховный собирается с ними делать после войны. Убивать они годились, строить — навряд ли. Был процент идейных, которых даже в Чистом называли красными, и процент порядочный — они прошли через все, получили подтверждение, что ни в чем перед Родиной не виновны, с гордостью носили в нагрудных карманах возвращенные партбилеты и испытывали благодарность к Верховному, который выделил их из миллионов других и призвал для выполнения своих великих задач. Но красных было куда меньше половины — остальным, как и положено после смерти, стало решительно все равно, что будет дальше, и зажечь их идеей великой стройки не сумел бы и самый пламенный трибун. В Чистом обычным делом было встать и отойти, не дослушав собеседника, — и собеседник понимающе замолкал, потому что и ему было все равно, рассказывать дальше или нет. Мужчины и женщины жили рядом и общались на равных, как души: естественно, в женский барак мужчин не пускали, да мужчины бы и не пошли, но на отлучки в лес охрана смотрела сквозь пальцы. Спаривались где попало, хоть и на скотном дворе (Заславский стал мужчиной в кухонном наряде; вольных не было — готовили свои, первой его женщиной была ленинградка Клара, троцкистка, которой на допросе выбили глаз). При такой простоте нравов и необязательности отношений сплоченного коллектива не получалось, как не могло бы его быть и на кладбище: пугать нечем, объединять, стало быть, — тоже, а общий пыточный опыт не сплачивает, скорей разъединяет, как всякое подспудное, постыдное знание друг о друге. Дружбы в Чистом завязывались редко. Умирать в бою — умирали, потому что за три месяца (а кто и за полгода) привыкли умирать. Но вот строители из них были никудышные — подправлять бараки, латать щели, налаживать печи приходилось охране.</p><p class="p1">Дело забывчиво, а тело заплывчиво, и всякая рана со временем рубцуется: раз уж привелось жить, то надо жить; многих, как и Заславского одно время, выручало сознание исключительности и величия собственной судьбы. Но жить надо куда-то, зачем-то, им же, вырванным из семей, ввергнутым в чуждую среду, лишенным надежды на возвращение, доживать было незачем и нечем, и не будь их день так заполнен изучением шифров, борьбы, новейшей техники — многие переубивали бы друг друга от скуки. Вражда народа и интеллигенции и после смерти никуда не делась — не многие, как Коротин, уважали книжников и хлюпиков, прочие считали, что городских привезли в Чистое по ошибке, и понадобился год, чтобы они поняли: городские дают им хорошую фору по части терпения, а временами и злобы. В общем, с такой командой нечего было делать после войны.</p><p class="p1">Хотя — если вспомнить то, чему учили в Чистом, и то, что ему приходилось потом делать с другими: так ли жестоко их испытывали? За десять лет, проведенных в Чистом и на фронте, плюс операция в Японии, плюс Западная Украина, — Заславский понял, что их еще, в сущности, берегли. Есть вещи, вынести которые свыше человеческих сил; есть вещи, перенеся которые человек утрачивает желание и силу жить; есть пытки, непоправимо уродующие тело. Он с особенным интересом прочитывал фронтовые очерки и смотрел фильмы, где были сцены в фашистских застенках: немцы во многом шли дальше. У них, впрочем, было зверство от обреченности, думал Заславский; они поняли, что проиграли, и попросту отыгрывались на жертвах, — у нас же не отыгрывались, а растили, можно даже сказать, ковали. Потому большинство их пыток странным образом восходило к опыту Грозного (с историей которого вряд ли из них кто был знаком), а большинство наших — к «Молоту ведьм»: Грозный мучил кого попало за то, что у него ничего не получалось с опричниной, а ведьм очищали для будущей жизни — совсем другой коленкор. Проверялась-то, как он понял довольно скоро после прибытия в Чистое и отрывочных разговоров с товарищами по участи, вовсе не способность терпеть боль: проверялась способность стоять на своем в заведомо безнадежной ситуации, без смысла, ради самой своей правоты, до которой, в конце концов, никому уже не было дела.</p><p class="p1">Но именно люди, способные гибнуть за бесполезную, никому не нужную правоту, гибнуть ради собственной совести, — совершенно не годились для какого бы то ни было строительства, ибо всякая жизнь есть один большой компромисс. Или не очень большой, как кому повезет.</p><p class="p1">Заславский не знал одного — как именно от них избавятся. Если перебьют, то поодиночке: массовый расстрел у них не пройдет. Отправлять «золотую роту» на войну в этом смысле было ошибкой: при попытке массовой расправы сработал бы инстинкт сопротивления. Они со своим боевым опытом до сих пор не разоружили охрану только потому, что некуда было бежать, — но за посмертную свою жизнь дрались бы как бешеные. Конечно, потом их все равно переловили бы, но стягивать войска, устраивать поиски и облавы под Омском, в густых лесах… нет, это громоздко. Стало быть, или убивать по одному, или отпускать. Но когда отпустили, Заславский, хоть и ожидавший такого исхода, все-таки удивился.</p><p class="p1">Новый выстроил всех на плацу ясным и горячим июньским днем. Он был при полном параде. Впрочем, он на все праздники был при полном параде: Седьмое ноября, Первое мая, Тридцатое июля — день открытия Чистого… Слов «коммуна», «колония» или «лагерь» тут не употребляли: говорили — «Чистое», и всё.</p><p class="p1">— Товарищи! — зычно крикнул он. — Сегодня для всех нас… для нас с вами… знаменательный день! Истек срок вашего пребывания на службе Родине, и Верховное главнокомандование… приняло решение… вернуть вас в мирную, трудовую жизнь!</p><p class="p1">Все пятьсот человек — население Чистого, на четверть выбитое войной, в остальном же невредимое, — не шелохнулись. Новый знал, что от них можно ожидать всего, а потому считал за лучшее не ожидать ничего. Он выдержал паузу и продолжил:</p><p class="p1">— Каждый из вас… начнет жизнь с нуля! Новую жизнь, товарищи! Вы послужили Родине, и она не забудет вас! Те из вас… у кого есть семьи… вернутся в семьи! Те, кого некому ждать… потому что так получилось… — Он замялся. — Те же, чьи семьи, к сожалению, не выдержали Верховной проверки… и по разным обстоятельствам оказались в соответствующих местах… те получат новые документы и будут обеспечены жилплощадью! Мною лично получен приказ… в течение трех месяцев… осуществить полное расформирование поселка Чистое!</p><p class="p1">При этих словах Заславский подумал, до чего неистребим в человеке инстинкт дома: всякий раз, возвращаясь в Чистое с задания (а таких возвращений у него за войну было три — после Севастополя, Сталинграда и Кёнигсберга, да после войны кое-что), он все-таки радовался знакомому месту. Другого дома у него на свете не было, и покидать этот, как ни странно, будет жаль. Зря, кстати, их — москвичей — боялись в сорок первом посылать под Москву. Опасались, что сбегут. Куда им было бежать?… Впрочем, такие опасения бытовали не только в Чистом — поселки с «золотыми ротами» были еще в нескольких местах, на что неоднократно намекал Голубев, да и ясно было, что проверку никак не могли выдержать только несколько сот человек. Речь шла о десятках тысяч — но где размещались остальные, Заславский не знал (и Рогов, в чьей голове разворачивалась по дороге в Омск эта реконструкция, не знал тоже).</p><p class="p1">Заславского отпустили в первой партии. Понятие партии, впрочем, было условно — они уходили поодиночке. Даже до Омска каждый добирался своим ходом: все словно торопились расстаться побыстрей. Вместе их уже ничто не удерживало. Новыми адресами не обменивались, и прощальное «Пиши!» звучало чистой условностью. Клара не уронила и слезы из единственного глаза.</p><p class="p1">Только один человек при прощании повел себя необычно: был он, как правило, молчалив, а если открывал рот, на собеседника перла такая циничная похабщина, что Заславский иногда, стыдясь себя, краснел. Ничто его не брало, а это брало. Подобная грязь особенно неприятна была потому, что марала их посмертную честь: как бы грязны ни были иные дела, которыми приходилось заниматься, — общее и главное их дело, в конце концов, было чистое. Кто забывал об этом — воевал на порядок хуже.</p><p class="p1">Правда, как раз изрыгатель похабщины был диверсант отличного класса, получавший, видимо, удовольствие от самого процесса. Он трижды летал в белорусские командировки налаживать партизанское движение и в конце войны получил майора. Человек он был неприятный, с маленькими острыми глазками в круглых очках, с неуместной и неопределенной улыбочкой — так улыбаются подтверждению самых постыдных своих мыслей. Этот-то майор, подойдя к Заславскому проститься, сказал неожиданно серьезно:</p><p class="p1">— Я вот чего думаю, юноша…</p><p class="p1">— Я не юноша, майор, — хмуро оборвал Заславский. — Мне двадцать семь лет, какой я, к дьяволу, юноша…</p><p class="p1">— Вечный, — усмехнулся майор. — Есть такой тип чистого и горячего, страшно самолюбивого русского мальчика, в массе своей еврея. — Он неприятно хихикнул. — Так-то, мальчик.</p><p class="p1">Не надо возражать, подумал Заславский. Майор всегда играл на повышение — вякну еще чего-нибудь, младенцем назовет.</p><p class="p1">— Так я вот чего думаю, — продолжал майор, хитро блестя глазками. — Я до всех дел немного сочинял и вот прикидываю: если все это — одна большая проверка, что же нас там-то ждет? А?</p><p class="p1">Он ткнул в небо коротким толстым пальцем.</p><p class="p1">— Кого что, — пожал плечами Заславский. — Кто похабные анекдоты рассказывал — точно на лесоповал пойдет. — (Нба тебе, кушай.)</p><p class="p1">— Да я, может, и хочу на лесоповал, — невозмутимо ответил майор. — Потому что самые-то упертые для таких дел готовятся, что нам здесь, грешным, и подумать страшно. Мы все думаем: там рай. А там опять надо будет поезда взрывать, представляешь? Сатану бомбить, мелких бесов агитировать. Вот тебе и весь рай, девственные гурии. Слыхал про девственных гурий? — (Заславский торопливо кивнул, чтобы избежать очередной гнусной лекции.) — А самое обидное, что выслужиться нельзя. Чем лучше будешь воевать, тем более крутые места будут тебе там предложены. А как там всех перебьешь — опять куда-нибудь переведут, Господнего дерьма не перетаскать, как говорил товарищ Балмашев… — (Товарищ Балмашев, верно, тоже был изрядной скотиной.) — Вот нас к чему готовят, представляешь, голубчик? Худшим — рудники, а лучшим — войнушка. Небесное воинство, а? Ты подумай на досуге, стоит ли в эти игры играть. Бывай, однако. Желаю тебе счастья, здоровья хорошего. Главное — жену добрую, русскую и кучу детей. Дети — они, знаешь, для нашего брата жида главное.</p><p class="p1">И отошел.</p><p class="p1">Новый вручил Заславскому документы на новое имя и ордер на комнату в Москве. Видимо, подумал Заславский, я все-таки прилично воевал, — комната была хоть уже и не на Ордынке, а в Марьиной Роще, но ведь могли закатать вообще не пойми куда, а так он все-таки возвращался в город своего детства. И имя, и комната почти наверняка принадлежали человеку, которого собирались брать в ближайшее время. Вероятнее всего, родни у Абраменко не было. Впрочем, может быть, его уже взяли, и он либо умер, не выдержав пыток, либо все подписал и поехал в лагеря. К тем, кто подписал, большинство населения Чистого относилось презрительно, даже если речь шла о родне: презирать выживших было их единственной привилегией. Между тем Заславский не знал, кому было трудней: им ли, которых полгода пытали, заставляя подписывать самооговоры, или тем, кто оговорил себя немедленно и потом годами мучился в забоях и на лесоповалах. Были, впрочем, и те, которые подписали всё и тем не менее получили расстрельные приговоры: так Верховный расправлялся с теми, кому верил. Он им верил, а они сломались после первого спецдопроса. Да и не резон было маршалов, как-никак знавших очень много, отправлять в один лагерь со всякой шушерой. Так, во всяком случае, понимал Заславский, и так объяснял Голубев, вообще не считавший нужным скрывать слишком многое. Он, видимо, не думал, что кто-то из них выйдет отсюда живым. Получилось иначе. Не зря говорили, что Верховный к старости смягчился.</p><p class="p1">Вообще-то Заславскому в Москве надо было встретиться с одним человеком. Точнее, с двумя. Во-первых, ему интересно было повидать свою первую любовь Иру. Честно говоря, теряя невинность с троцкисткой Кларой, он представлял именно ее. Иру любил Марик — единственный человек в классе, с которым Заславский по-настоящему дружил, и раз Заславского забрали, Марик наверняка на ней женился. Иму это совершенно не обижало, в Чистом предрассудков не признавали, но повидаться с друзьями ему хотелось. Новый предупредил, что разглашение информации о Верховных проверках нежелательно, — но предупредил нестрого, поскольку версия такая давно бытовала и слух о Всеобщей проверке на вшивость муссировался во многих очередях. Обитателям Чистого все равно никто бы не поверил, а если бы кто и поверил и поспешил посетить засекреченный поселок, на его месте все равно осталась бы только пустая поляна с пятью бараками. Поди пойми, что тут было: поселок? лагерь? деревня староверов? Да и кто поперся бы в Омск проверять…</p><p class="p1">Заславский, впрочем, был не настолько наивен, чтобы предполагать, будто за ним никто не следит. Их учили распознавать слежку (многие из Чистого оказались потом в разведке), но учили явно не всему, да и слежка наверняка должна была начаться уже в Москве. Не зря же им сразу выдали ордера. Все квартиры точно под контролем, наверху даже интересно, как они поведут себя теперь.</p><p class="p1">Собственно, встречаться с Ирой и Мариком было незачем. Важно было узнать, брали их или еще нет. Очень возможно, что не брали. Тех, кто как следует воевал в опасных местах, могли и не тронуть, зачтя им за проверку боевой опыт. Но тех, кто избежал фронта благодаря брони или иным хитрым способом, должны были тягать полным ходом. Наверняка Верховный в очередной раз растасовал свою колоду, низвергая тех, кто оказался сверху. Если Марика еще не взяли, надо было деликатно объяснить ему, что это ждет всех и что вести себя там надо по возможности твердо. Пытки не бесконечны, до смерти не запытают — если, конечно, Марик был теперь не слишком хлипок, — а после полугода мучений начнется вполне приличная жизнь с перспективой возвращения, так что не надо ничего подписывать. Это было все, что он хотел ему сказать. Естественно, делиться всем этим с Ирой он не собирался: она женщина, ей труднее будет удержать язык за зубами. Говорить следовало с Мариком. Марик был его другом, достойным того, чтобы очутиться в поселке типа Чистого, а не гнить в городе типа Магадана.</p><p class="p1">Новый адрес Марика Има разыскал на диво легко. В первом же адресном столе ему указали дом близ Парка культуры. Туда он и направился — что-то мешало ему сначала поехать в Марьину Рощу. В Марьиной Роще, подозревал он, все вещи еще пахнут хозяином.</p><p class="p1">Иру он легко узнал бы и на улице. Как все девочки-хулиганки, она расцвела, но не слишком потолстела и не поблекла за те десять лет, что они не виделись. Это была женщина во всем блеске двадцативосьмилетней красоты, женщина умелая и ловкая, отлично державшая дом (ему хватило одного взгляда на квартиру). Долго живя в бараке, в окопах, потом ночуя в поезде пять последних ночей, другой счел бы роскошной и самую простую обстановку, но глаз советского принца был наметан и придирчив. Марику повезло. И хорошо, что угадал: конечно, они поженились. А кто другой, кроме лучшего друга Имы Заславского, заслуживал бы ее?</p><p class="p1">Она тоже узнала его с первого взгляда, и это было лучшим доказательством того, что предназначены они были друг другу, да вон как оно все вышло.</p><p class="p1">— Има! — Она выронила тряпку. — Имка! Да где же ты был?!</p><p class="p1">— Эх, Ира, — ответил он (ему казалось, что браво, вышло горько). — Легче сказать, где я не был.</p><p class="p1">— Да зайди же, я сейчас тебя накормлю! — (И точно, пахло едой, запах был домашний. Нет, там, в Чистом, он не расслаблялся ни на секунду, но здесь, в Москве, пожалуй, были еще вещи, способные его размягчить, — вещи, которые нельзя вообразить на расстоянии, потому что ими наслаждается плоть, а у плоти воображения нет: ванна с горячей водой и пеной, море, еда, которая в действительности всегда оказывается вкуснее, чем в самом голодном воображении). — Сейчас все будет готово.</p><p class="p1">— Ирочка, я спешу. Надо бы мне с Мариком поговорить, кое-что передать ему.</p><p class="p1">— Заходи же наконец! Марик в Алма-Ате, в командировке. Гостиницу строит. Он все время в разъездах, я уж и не помню, когда он жил дома дольше недели…</p><p class="p1">Шанс, машинально отметил Заславский. Остаться, и к вечеру она моя. У него было много женщин кроме одноглазой Клары: в Европе в конце войны не принято было церемониться. Но Ира была его женщиной, и он мог получить свое. Правда, потом, если у них дойдет до того, для чего в его словаре не было слова, придется с ней говорить, а он пока не знает, что ей сказать.</p><p class="p1">— Нет, Ира, я еще зайду. Говоришь, через три дня?</p><p class="p1">— Да, но пообедай сейчас! Что же ты, сразу уйдешь?</p><p class="p1">Он подхватил чемодан, в котором лежала только смена белья, и пошел к лифту.</p><p class="p1">— Има! — окликнула она его совершенно прежним голосом. — А помнишь, ты письмо мне выбросил, из поезда? «Поезд мчится в даль, а я — в неизвестность».</p><p class="p1">Словно ток высокого напряжения прошел через него. Вся прежняя жизнь нахлынула разом, вернулась от одной этой фразы — и тут он понял, чтбо у него отняли. Никакое величие участи не компенсировало такой потери. Он вспомнил жаркое мягкое купе, и вечно брюзжащую сестру, которая вышла замуж за летчика, уехала на Дальний Восток и через год умерла от энцефалита, и себя, восьмиклассника, за два года до исчезновения, выбрасывающего письмо, в которое обернут заранее подобранный на вокзале камень. За окном стремительно пронеслись мокрые кусты, колючие даже на вид, — на темно-синем небе июньской ночи чернели их лохматые силуэты, — и сестра опустила стекло. Он никогда не вспоминал об этом. Вспоминать во время проверки — значило проиграть сразу, разнюниться, расползтись, разрешить себе понимать происходящее. Этого было нельзя. А потом, после удара, от которого он на всю жизнь оглох на левое ухо, воспоминания вообще приходили редко и стали гораздо неразборчивее.</p><p class="p1">Но он умел держать себя в руках.</p><p class="p1">— Помню, — сказал Има Заславский, ныне Григорий Абраменко. — Знаешь, столько всего забыл, а это помню.</p><p class="p1">Подошел лифт.</p><p class="p1">Он отправился в Парк культуры, съел мороженое (деньги еще оставались, а Новый обещал, что проблем с трудоустройством не будет: в паспорте поставлен специальный знак, возьмут и в вуз, и, если он захочет, на производство). Прошел Нескучным садом. Думал зайти на Ордынку, но решил поберечь себя. Хватало удара от невыносимо яркого воспоминания, которое вернула ему Ира. А интересно было бы посмотреть на сволочей, которые жили в его квартире. Тут же одернул себя: он уже лет восемь не думал ни о ком с такой горячей ненавистью.</p><p class="p1">Город был в цвету, но люди казались пыльными, несколько пришибленными. В его время все были ярче. Сперва он списал это на войну, потом понял, что не меньше половины страны уже прошло проверку, а она не добавляет жизнерадостности.</p><p class="p1">Было много новых домов, сплошь серых, похожих на вертикально поставленные длинные бараки, и немало начатого строительства. Заславский не понимал, зачем столько строить, если все равно в результате проверки останется не больше четверти народу. Остальные если и будут где-то жить, то уж явно не в столице. Сколько времени может занять эксперимент? Примерно пятая часть населения осталась на войне, еще столько же профильтровали до нее — стало быть, все кончится лет за двадцать.</p><p class="p1">Но кому тогда строят эти дома? Неужели их всех действительно вернут — тех, кто выдержал, и тех, кто сломался, тех, кого по году уродовали и потом по десять лет учили убийству, и тех, кто ублажал блатных? Ведь и у них кончатся сроки, а у кого-то, может, уже и кончились, — и теперь они ходят в той же толпе, что и он? Хмурые люди, умеющие молчать; люди, приученные к терпению. Проверка имела целью поделить население на первых, не готовых подписать ничего, и вторых, готовых подписать все. От кого больше толку — вот единственный вопрос: первые годятся для войны, вторые — для мира. Но как они будут сосуществовать?</p><p class="p1">Эту мысль он отогнал тут же. Конечно, никто не вернется. Жителей Чистого отпустили только потому, что они уже не представляют опасности, а какое-никакое величие души Верховному все же присуще. Благодарность, если угодно. Они ничего не попытаются изменить, большинство не заведет семей — вот почему пытки задумывались не столько мучительными, сколько унизительными: измученный оклемается, растоптанный не восстанет. Двадцать убийств, тридцать карательных операций, в которых ты, железный диверсант, победоносно поучаствуешь, не окупят тебе тридцати секунд, когда ты раззявленным распоркой ртом глотал следовательскую мочу. После этого можно отпускать безбоязненно — хоть в Чистое, хоть обратно домой. Иное дело — работяги, оговорившие себя и теперь медленно доходящие на Севере: рабы не перестанут быть нужны, а отпускать их незачем и не за что. Публика второго сорта Верховному была неинтересна. Но тогда получалось, что дома строят просто так — без надежды их заселить? Заславский даже усмехнулся тому, что эта простейшая мысль не пришла ему в голову. Их строят, чтобы строить, как и их мучили, чтобы мучить, а вовсе не для того, чтобы они в чем-то признались. Результат перестал быть важен давно — главенствовал процесс.</p><p class="p1">Правда, по хмурым лицам, на которых давно не было никакого энтузиазма, а только усталость и тоска, Заславский легко мог догадаться, что — вечен или нет Верховный — затеянное им точно не вечно. Человеческая порода, не прошедшая закалки в Чистом, была все той же бедной человеческой породой; если они, нежизнеспособный и бесполезный теперь призыв тридцать восьмого года, знали все-таки и настоящие страсти, и настоящую боль — в том террариуме, в который превратилась Москва, чувств не испытывали вообще, а жили подделками. Верховная проверка еще могла бы сделать людей из этого населения, но и то вряд ли. И потому рано или поздно они должны были выйти из-под гипноза этой жизни — не взбунтоваться, а просто вяло выползти, перестать сначала ходить на работу, а потом и просто обслуживать себя, — и это станет не триумфом свободы, а выражением бесконечной скуки и усталости. Это будет победа гнили, потому что железо побеждается только ржавчиной, все прочее против него бессильно.</p><p class="p1">Так-то вот, пока Заславский ходил по парку, в нем поднималось сначала раздражение, а потом живое, горячее бешенство, причины которого он сам сначала не понимал, но, сидя на скамейке среди пыльных кустов давно отцветшей сирени, вдруг понял. Он любил Иру, любил сильно. Воспоминание давно выцвело, но живая Ира была тут как тут. А вместе с ней, с ее живой прелестью, воскресла и ненависть к Марику, в которой он себе не признавался, и жажда жизни, на которую он уже не надеялся.</p><p class="p1">Злоба умирает последней, он знал это: она жива, когда все чувства давно отмерли. И потому воскресение его начиналось с возвращения живой злобы, которую давно вытеснила спокойная, привычная тоска. Злоба клокотала в горле, он не знал, что с ней делать. Сломал ветку, снова сел на лавку. Надо было успокоиться. Ведь что тут случилось на самом-то деле? Пока из него делали элиту страны, последнюю ее надежду, — женщина, предназначенная ему самой судьбой, попала в руки к другому. Это не входило в расчеты, этого не учли. В конце концов, никто не виноват, что его взяли первым. То, что Марика это не минует, — несомненно. Но тогда, значит, это грозит и ей, и тогда он потеряет ее снова. Это уже никуда не годилось, он встал и быстро пошел к выходу. Надо было немедленно что-то делать, куда-то идти, тратить силы, разгонять кровь, жарко приливавшую к голове.</p><p class="p1">Стоп, стоп. Всех ли проверяют? А дети? Но он знал, что как раз с тридцать восьмого, в котором проверка приняла небывалые масштабы, снят был возрастной ценз и для детей: их брали с двенадцати, кое-где и с десяти… Собственно, на фронте до него доходили слухи о детском лагере, народу там было много — в конце концов, как было в той балладе? «Мальчику жизни не жалко, гибель ему нипочем, мне продавать свою совесть совестно будет при нем». (Проверить, когда это переведено, сказал себе Рогов.) Из этих детей получались потом превосходные диверсанты, так называемые сыны полков, о происхождении которых впоследствии не сумели придумать ни одной внятной легенды. Дети, взятые в тридцать восьмом, бывшие тремя годами младше его, в сорок первом творили чудеса: восемнадцатилетний Матросов, арестованный как раз тогда, сделался легендой, хотя о том, что его сажали, нигде не упоминалось; естественная вещь. Да, если берут детей, у нее подавно нет ни малейшего шанса: всех, так уж всех. Разве что…</p><p class="p1">Он, привыкший за десять лет считать проверку единственным спасением для страны во враждебном окружении, он, со сладострастием мечтавший в первые свои дни в Чистом, как никто из бывших одноклассников и отвратительных дворовых мальчишек ее не минует, — сам не замечал теперь, что в уме яростно защищает Иру от общей судьбы.</p><p class="p1">Заславский не знал еще (у него не было времени это узнать), что принадлежал к счастливому и немногочисленному отряду людей, которых в старину называли положительными: любовь рисовалась ему как царство взаимного доверия и уюта. Оттого и мысли, приходящие ему по поводу Иры, были самого мирного свойства: Крым, укладывать и будить, дети… Обычные мысли семейного, чадолюбивого и женолюбивого существа — нашего брата жида, прав был чертов майор. У Заславского никогда не было времени задуматься о собственной необоримой природе, и страшный, глухой инстинкт защиты своего рода только теперь заговорил в нем. Не троцкистку же Клару было беречь для будущей жизни.</p><p class="p1">Постой, постой. Конечно, если первым возьмут Марика… детей у них пока нет? Нет. До детей ли было. Если берут Марика, тогда все просто. Тогда он окажется рядом, подставит плечо, она привыкнет, будет ему благодарна за помощь и защиту, и все решится само собой. Но если возьмут ее? Черт, надо уезжать, уезжать: возвращаясь из Омска и глядя в окно поезда, он видел гигантские, невообразимые пространства, до которых добрались бы в последнюю очередь, а может, и не добрались бы вообще. Надо им сказать, чтобы уехали, и уехать с ними… а с другой стороны, почему с ними? С ней. Она поедет с ним, он это видел по ее глазам. Он придет к ней завтра же. Возвращаться сегодня нелепо, да и действовать надо с умом, с оглядкой. Марик в Алма-Ате еще две недели, можно успеть многое. Он был теперь совершенно уверен, что думает именно о ее спасении, а не о собственном счастье.</p><p class="p1">Вдруг захотелось есть; никогда со времен школы, когда он стремглав несся домой, размахивая заграничным черным кожаным портфелем, ему так не хотелось есть. Только что отменили карточки, открылось несколько новых кафе; одно, неподалеку от парка, звалось «Южное». Поедим южного. Из кавказской кухни, однако, наличествовала одна манная каша да запеканка «лапшевник»; давайте лапшевник. Мать готовила божественную запеканку. Вдруг, впервые за десять лет, ему с небывалой ясностью вспомнилась эта запеканка; как она уговаривала ее съесть! Как она любила его! Страшный избыток вложенной в него любви до сих пор ждал на дне его сознания неприкосновенным запасом; часть этой любви переродилась в ненависть, помогая ему воевать, но основной ее капитал был перерождениям не подвержен и, как зарытое золото, ждал своего часа. Теперь этот избыток надо было перенести на другое существо, потому что таков закон жизни и другого нет.</p><p class="p1">На удивительные мысли способен был навести лапшевник, кислый, осклизлый лапшевник, нежный, невыразимый, таявший во рту.</p><p class="p1">Только когда стало темнеть, Заславский на дребезжащем трамвае, натужливо певшем на разгоне, как самолет на взлете, поехал в Марьину Рощу. Трамвай был почти пустой, совершенно довоенный, со скользящими по поручням кожаными петлями, на которых так неудобно было висеть, но в давке московского трамвая обычно можно было обходиться без поручня, держала толпа. Теперь он ехал один, если не считать довольно поганого старика на заднем сиденье и молодой парочки впереди. На него оглядывались: видимо, привлекал внимание поношенный парусиновый пиджак, купленный в Омске на барахолке, и худоба. До войны Има Заславский никогда не бывал в Марьиной Роще. Этот район пользовался дурной славой, как почти все московские окраины. Он и вправду выглядел мрачно, но это была не романтическая мрачность школьных легенд, а убожество приплюснутой, скудной жизни, в которой должны кипеть свои приплюснутые, как кепка, и такие же засаленные страсти.</p><p class="p1">Заторможенный, замороженный, он только теперь понял, до чего отвык от человеческой жизни и до чего больно ему будет возвращаться к ней, зная, что после очередной Верховной проверки (где гарантия, что эта была последней?) он может все потерять в одночасье. Полгода его пытали, два года учили убивать, пять лет он убивал, еще два года прожил как во сне и ничего не знал о человеческой жизни. В человеческой жизни была не только твердая кость, на которую была похожа вся его жизнь, а и жалкая мякоть, о которой он запретил себе думать. Можно было позволить себе пожить этой жизнью, но, но, но?! Жизнь кончена, и если возобновлять ее — то уж никак не в затхловатом и уязвимом уюте. Нужно попробовать иначе — может быть, путешествовать? Рисковать? Главное — быть одному, чтобы избежать соблазна слабости, чтобы никто не смог его шантажировать чужой судьбой, чтобы на выжженном поле не появилось нового ростка. Глупо было снова дать себя завлечь. Но тут он вспомнил Иру и понял, что выбор сделан, думать поздно.</p><p class="p1">Он успел уже про себя сто раз прокрутить все подробности этого разговора с нею, вспомнил, каким золотым светом зажглись у нее глаза, как она уговаривала остаться — не без намека, конечно, не без намека; нет, она думала о нем все эти годы, раз помнила даже его письмо, выброшенное из поезда, — какие могут быть сомнения? Все прочие варианты жизни сразу показались ему невозможной ерундой. Путешествовать, рисковать… во имя чего, собственно, он мог рисковать? Полуребенком, восемнадцатилетним избитым узником, приходившим в себя в закрытом санатории под Москвой вместе с сотней таких же, как он, все выдержавших москвичей из лубянской и прочих тюрем, неподвижно лежа на койке целыми днями и обретая какое-никакое понятие о будущем, то есть впервые за полгода допуская мысль о нем, — Заславский мечтал: вот выйду, вот отомщу… Кому было мстить и где была граница между проверкой и самопроизвольным мелким злом? Где-то в реальности первого порядка она наличествовала, но в реальности истинной, на которую при прощании намекал майор, отсутствовала. Всякое испытание было проверкой, и спасаться от него было так же бессмысленно, как просить за арестованного. Дальше выбор был за тобой: покоряйся или отбивайся. Он выбрал, будет теперь отбиваться. Заславский искренне пожалел тех, кто встанет у него на пути.</p><p class="p1">Трамвай дальше не шел. Старик объяснил, что здесь конечная, а ему от конечной надо еще минут десять идти дворами, ну пять, если хорошим ходом… Хорошего хода не получалось: туфли жали ногу, привычную к сапогу, да он и находился за этот день. Указывая ориентиры, старик смотрел на него особенно пристально — и Заславский вдруг снова, в третий раз за день, заподозрил наблюдение. Он помнил инструкцию Нового на случай проверки, ареста или любого уличного недоразумения с милицией. Пароль лежал в нагрудном кармане, его выдавали при отъезде из Чистого. Новый уверял, что органы по всей стране предупреждены. Заславский достал круглое карманное зеркальце и показал его старику.</p><p class="p1">Некоторое время тот изучал собственную небритую физиономию, потом поднял глаза на Заславского:</p><p class="p1">— Продаете? Не интересуюсь.</p><p class="p1">— Жалко, — машинально ответил Заславский и спрятал зеркальце обратно в карман.</p><p class="p1">Во дворах пахло мокрой листвой. Несколько раз он вынужден был обходить белье, развешанное на веревках между деревьями. Небо было темно-синее, позднее июньское небо, но все-таки не такое, как двенадцать лет назад, когда он бросал письмо. Тогда он смотрел на него из мягкого купе, вот в чем было дело.</p><p class="p1">— Слышь, — окликнули его.</p><p class="p1">Он ни на секунду не сомневался, что окрик адресован ему. Больше вокруг никого не было. Он едва различал темные двухэтажные дома. Марьина Роща в легендах его детства славилась отсутствием фонарей, и в этом смысле ничего не изменилось. Но людей он умел видеть в любой темноте — навык полезный — и опасность тоже ощущал сразу. Опасность была, не слишком серьезная, но была.</p><p class="p1">— Не слышит, — сказали сзади. — Глухой дядя.</p><p class="p1">Он заметил, что окружают его быстро и что драться предстоит с пятью, а может, и с шестью противниками, в чьих намерениях сомневаться не приходилось. Одного он видел перед собой ясно, тот придвинулся и теперь вонял на Заславского чесноком. Примерно так же дышал на него его первый следователь (он, впрочем, оказался слабохарактерным, и за дело принялся второй). На лоб стоявшего перед Заславским парня лет двадцати пяти была низко надвинута кепка, та самая, о которой он думал, когда только ехал сюда. Лицо было гладкое, круглое, спокойное, с перебитым носом. Заславский часто видел такие лица.</p><p class="p1">Если бы он был обычной жертвой, над ним поглумились бы да прирезали, потому что щадить поздних прохожих в Москве сорок восьмого года было не принято. Разочарования ему уж точно не простили бы, а разочарование оказывалось неизбежным: в чемодане Заславского, кроме смены белья и повседневной формы, принятой в Чистом (черное хебе, сапоги, портянки), ничего не было. Денег у него хватило бы еще на неделю очень экономной жизни. Останавливать его стоило только для того, чтобы покуражиться. Заславский благодаря чутью хорошо подготовленного диверсанта знал, что сейчас его сзади схватят за руки. У стоящего перед ним парня был нож, Заславский не видел ножа, но чувствовал его.</p><p class="p1">В такие минуты, точней, секунды он соображал очень быстро. Файнштейн, конечно, был дурковат, а вот Голубев знал свое дело, да и другие инструкторы у них были не общеармейским чета. Заславский не боялся. Но у него мелькнула мысль: если проверка? Если старик следил? Если он доложил? Вот его проверяют, и как он себя поведет — даст ли над собой надругаться, как десять лет назад, или раскидает противников, или позовет на помощь? Чистое продолжалось, из него не было выхода. Вырвался на пару часов, воспарил, возмечтал — так вот тебе. Он был на вечном учете, на вечной проверке, и мучить его, закаляя до последней крепости, предстояло всю жизнь таким вот приплюснутым людям с запахом чеснока. Это была их привилегия, не обеспеченная ничем. Это была их работа, и далеко не все они потом выдерживали Большую проверку. Ведь никто не предупреждал их, что проверка касается всех. И теперь они считали, что человечество будет делиться на тех, кого проверяют, и на проверяющих, получивших это право от рождения. Но кто-то должен был им объяснить.</p><p class="p1">Правда, подстраховаться не мешало никогда. Еще оставался шанс избежать столкновения (Ира! Ира!), и Заславский достал зеркальце, заметив, как блеснули глаза у главного в кепке. Он, верно, решил, что жертва полезла за деньгами. Заславский вынул зеркало и поднес к лицу вожака. Тот уставился, не понимая.</p><p class="p1">— Слепит, падла! — хрипло крикнул он своим, хотя кого могло ослепить карманное зеркальце в кромешной тьме без единого фонаря?</p><p class="p1">Нет, понял Заславский, это не проверка, бить надо первым и сразу. Выбить зеркальце он уже не дал. Его реакцией восхищался даже Файнштейн, который редко чем восхищался. Откуда что берется в этих московских мальчиках.</p><p class="p1">Рогов поймал себя на том, что реконструирует этот эпизод в лучших традициях современного боевика, героем которого непременно был тайно обученный, строго засекреченный советский диверсант, из какого-то самого последнего резерва, в существовании которого был уверен любой житель Империи. Все могло кончиться, но в последний момент вводился в действие последний и сверхсекретнейший план, ибо допустить, что не все предусмотрено, житель Империи не мог. В боевиках, которыми наводнились все книжные лотки и киоски, действовал офицер — почему-то особенно часто майор — из расформированного сверхсекретного подразделения, предназначенного именно для действий в экстремальнейших, последних обстоятельствах. Может быть, этой надеждой — тоже очень советской, а откуда было взяться другой — диктовалось и роговское желание найти Чистое. Там и было спрятано второе дно Империи, ее последний резерв, который предохранил бы ее от полного гниения и окончательного распада. Что для человека из Чистого были эти пять кентов?</p><p class="p1">Стратегия Заславского была проста: следовало вырубить одного — остальные разбегутся. Он понимал, что серьезный противник — один, перед ним. Молниеносно сунув зеркало в карман, Заславский тут же кинулся на вожака с ножом и в кепке; отбиваться приходилось действительно от пятерых, он не ошибся, но учили его все-таки прилично. Не учили одному — останавливаться, потому что от смертника ничего подобного не требовалось. Несколько раз в короткой драке его обожгла густая, белая боль — но он любил боль. Он даже ответил себе когда-то, почему так было: она напоминала о тюрьме, о допросах, о временах его безоговорочной правоты. И она же — уже в Чистом, во время диверсионной подготовки — делала из него зверя: это было сладостное чувство. Когда он пришел в себя, трое из пятерых лежали на земле: один еще стонал, двое других молчали и были неподвижны. Остальные (двое, как он прикидывал) убежали — видимо, за подмогой, а может, прятаться.</p><p class="p1">Заславский даже устыдился того, что принял их за проверяющих. Это была обычная сытая шпана — с ней легко справился бы любой тренированный десантник, а не только покойник. Группа Заславского бывала в переплетах много хуже. Заславский лишь на миг почувствовал ту дикую, блаженную злобу, которая просыпалась только в бою. Все-таки Верховный знал, что делал, когда пропускал их через свою мясорубку: ничего не было, ни любви, ни страха, но злоба была. Злоба была древнее любви и страха. Она где-то гнездилась и до пыток, но они не знали о ней. Теперь знали.</p><p class="p1">Заславский нагнулся к вожаку в кепке. Он был несомненно мертв: собственный нож торчал у него из горла. Такие вещи Голубев учил делать не раз. Второй был столь же недвусмысленно готов, а третий корчился. Добивать его Заславский не стал.</p></span>
