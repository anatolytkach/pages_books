</div><p class="p1">В омской гостинице «Юбилейная», сидя над картой области, купленной в газетном киоске, Рогов курил и намечал маршруты. Близость цели, неясность собственного статуса и азарт первопроходца — все делало его легким и смелым.</p><p class="p1">Первое Чистое, которое он еще в Москве наметил для начала, было ближайшим к городу, доступнейшим и маловероятнейшим местом предполагаемого поселения. Маловероятна, впрочем, была удача всей затеи, но еще в самолете, реконструируя историю Заславского, он понял со всей определенностью: среди людей им места не было. Они могли только вернуться и зажить своим обособленным миром. Вернулись бы и женщины, которым точно было не приспособиться к роли тихих домохозяек, послушных жен и кротких совслужащих. Пошли бы дети. Скорее всего любовь случалась и до войны, но за тем, чтобы никаких детей, следили наверняка — и сами, и приставленные. Какие дети у диверсионной группы? Радистка Кэт — бред, сюжетный ход…</p><p class="p1">Этих потомков, выросших на поселении, на которое не распространялся ни один из человеческих законов, Рогов и рассчитывал найти. Он знал, что для достижения совершенства «золотая когорта» должна была пройти через последнее испытание — через мирную жизнь, которая обречена была их отвергнуть, как и они отвергли бы ее. Нужен был последний, высший подвиг: омский затвор, в который их ввергли искусственно, должен был превратиться в добровольный. Здесь для Заславского, каким его видел Рогов, должна была начаться истинная жизнь — жизнь без изнурительных тренировок, драк и стрельб. И в ней, возможно, они поняли бы замысел о себе Верховного, а возможно, и Высочайшего главнокомандующего, который решил на пепелище их жизней выстроить новый мир. Этот новый мир, возводимый их детьми вне соблазнов большой земли, Рогов мог увидеть уже завтра. Но в душе он был уверен, что истинная встреча с ним состоится не в первом и даже не во втором, а в третьем Чистом — самом отдаленном, отстоявшем от города на триста километров. Первое, по сибирским меркам, находилось под боком — каких-то сто пятьдесят: до Кулемина автобусом, а там, сказали на автовокзале, надо искать, кто подвезет. До этого Чистого автобус не ходил давно: там и жили-то, объяснил ему разговорчивый охотник в ожидании автобуса, полтора человека.</p><p class="p1">Через три часа разболтанный тупорылый автобус старосоветского образца, заляпанный грязью до полной неразличимости его истинного цвета, высадил десяток пассажиров в Кулемине.</p><p class="p1">Удаляясь от Москвы, Рогов почти физически чувствовал, как удаляется он и от современности, погружаясь в какое-то среднее и неизменное общероссийское время. В Кулемине стоял примерно год семьдесят пятый. Здесь было спокойно, жизнь шла медленно, и, несмотря на хронический неуют, который Рогов, подобно всем домашним детям, испытывал поначалу в чужих местах, угрозы для себя он не чувствовал никакой. Если Москва была предельно уязвимым пространством, через которое тянулись тысячи силовых линий, неся опасность и новизну, — здесь царила та полузабытая, идиллическая стабильность, от которой большинство чувствовало себя как в теплой ванне, а меньшинство сходило с ума. Здесь поразительно легко было поверить, что ничто и никогда не изменится, — и либо так и прожить всю жизнь, не просыпаясь, либо спиться от этого сознания. Это была часть Омской области, больше всего похожая на среднюю Россию: смешанный лес, пологие равнины, вдоль которых полз автобус, резкая синева неба, пыль и запах сухой травы.</p><p class="p1">Кулемино представляло собой не город, и не райцентр, и не поселок городского типа, а какой-то универсальный населенный пункт с признаками всего перечисленного — выродившийся город среди выродившихся деревень. Рогов непонятно зачем походил по нему, пытаясь, по всей вероятности, отсрочить разочарование или шок от находки. На местном базаре, насчитывавшем два ряда, торговали семечками, облепихой и серой — палочками горькой смолы; серы Рогов, экзотики ради, купил: просто желая почувствовать, что вокруг Сибирь. На вкус смола была отвратительна и жестоко липла к зубам. Наконец он начал спрашивать, как ему проехать в Чистое, но сначала никакого Чистого никто не мог вспомнить, а потом некоторые с трудом припоминали, что да, есть неподалеку такая деревня, то есть она была, но что с ней сейчас — сказать невозможно, поскольку туда давно никто не ездил за ненадобностью. Уже пять лет назад там жили три старика и пять старух, изредка добиравшиеся до Кулемина, а кто жив сейчас — поди пойми. В Кулемине было три старообразных «Волги» с шашечками, но в Чистое ехать не хотел никто. Дорога, как сказали Рогову на базаре, размыта и разбита, а главное — поездка не имела никакого смысла: пустых деревень по области полно. Слишком больших денег Рогов предложить не мог.</p><p class="p1">В конце концов ему пояснили, что всей дороги до Чистого будет километров двенадцать и он с легкостью их преодолеет еще до обеда, если выйдет засветло; теперь же наилучшим для него было устроиться в местный дом для приезжих. Он так и назывался — видимо потому, что на гостиницу не тянул. Это было двухэтажное строение, облупленное, но изначально крашенное отчего-то розовой краской. Рогов оказался в нем вторым постояльцем. Первым был военный моряк, старший лейтенант, приехавший к отцу в отпуск. Ночевать у отца он, однако, не стал — у него была давняя, первая любовь в родном Кулемине, и встретиться с ней, теперь разведенной и в одиночку поднимающей десятилетнего сына, он мог только в доме для приезжих, — отец, видимо, был старых правил, не такой, чтобы приводить к нему в дом бабу, хотя бы и разведенную. Кроме того, под Мурманском на базе у моряка остались жена и дочка (он не повез их к бате: нечего таскаться через всю страну), отец о них знал и измену не одобрил бы; к бабе тоже было нельзя: у нее сын. Пришлось соврать, что ушел выпивать к однокласснику, и ждать, когда первая любовь уложит сына. Со скуки моряк был невероятно разговорчив. Они сошлись в комнате у дежурной, которая пила чай из железной кружки и смотрела черно-белый, дребезжащий от громкого звука телевизор, принимавшийся гудеть при появлении любых титров — вернейшая примета старости. Старлей, по счастью, ни о чем не спрашивал и говорил только сам — в основном о невыносимой службе, об идиотизме начальства, отсутствии денег и жилья. Рогов был неинтересным собеседником. Он только кивал и никак не разделял возмущения старлея, потому что вообще не очень умел поддерживать разговор с незнакомыми людьми; да и не до того ему было. Завтра он мог увидеть собственного деда или хоть тех, кто его знал. Рогов ловил себя на том, что к деду почти ничего не испытывает, кроме смутной вины за то, что тому пришлось вынести, — нормальный человек всегда чувствует себя виноватым перед тем, кто много вынес, и из-за этого тысячи мерзавцев, которых много и заслуженно били люди без предрассудков, преуспевают во все новых и новых мерзостях, не встречая сопротивления.</p><p class="p1">Об этом Рогов успел путано подумать тем долгим вечером в Кулемине, отойдя наконец от телевизора, выглядевшего здесь единственным напоминанием о реальности, и избавившись от моряка. Один в комнате на троих (других в доме для приезжих вообще не было, человек, добравшийся до Кулемина, был по определению неприхотлив), он долго смотрел в лиловеющее окно и в который уже раз пытался понять: есть ли в страдании хоть какой-то смысл и можно ли обойтись без этого опыта? Он и сам втайне мечтал о Верховной проверке: без нее любая доброта казалась ему неполной и неподлинной. Да он и не любил доброты. Чаще всего она была ограниченной, напористой и агрессивной. Он ценил не доброту, а надежность, добротность — то, что чувствовалось в Кретове и в хорошо сохранившихся вещах пятидесятых годов. Доброта потакала человеку и расслабляла его до того невыносимого состояния, в котором находился теперь весь мир вокруг Рогова — мир попустительства, необязательности и осыпающихся зданий. Заснул он, однако, быстро. В сильной тоске у него включался какой-то защитный механизм, отрубавший сознание.</p><p class="p1">Утро обещало жаркий день. Рогов проснулся в восьмом часу. Дежурная спала на диване внизу, не раздеваясь: какое непостижимое чувство долга заставляло ее ночевать тут, где она все равно была никому не нужна (и откуда могли в Кулемино приехать ночью, если автобус ходил раз в сутки?), понять было невозможно, но Рогов порадовался этому беспричинному и бесполезному самопожертвованию. Это было одно из явлений, свидетельствовавших, что не все еще на свете свелось к слабости или выгоде. Рогов вышел на улицу с длинными резкими тенями. Всех вещей у него был рюкзак с двумя свитерами, сменой белья, банкой консервов, ножом и спичками. В нагрудном кармане он с самой Москвы держал кретовское зеркальце, которое на ночь клал под подушку.</p><p class="p1">Направление ему указали накануне: на запад от Кулемина, вдоль линии электропередачи. Электричество в Чистое провели еще в тридцатые годы, — что ж, все совпадало, хотя об электричестве Кретов не говорил ни слова.</p><p class="p1">Чтобы преодолеть двенадцать километров, ему требовалось обычно два с половиной часа, но до Чистого он шел добрых четыре, останавливаясь передохнуть. Чем ближе была деревня, тем труднее становилось ему идти. Он словно преодолевал чье-то сопротивление, задыхался — то ли от волнения, то ли от странной для августа жары, — и останавливался на дороге, петляющей среди ровного поля. Иногда встречались полосы леса, по небу медленно ползли высокие, пышные кучевые облака со свинцовым плоским исподом. Низко, словно на самом поле, вдали лежала пыльно-сизая туча. Ни одной деревни между Кулемином и Чистым не было — это подтверждало слова Кретова о том, что поселок разбили в безлюдном месте, — но Кретов говорил о лесах, тогда как тут было поле, ровное, похожее на степь. Не мог же лес исчезнуть? Возможно, он начинался ближе к Чистому, ведь не со стороны же Кулемина подходил к нему Кретов пятьдесят лет назад! Никаких следов человека — ни домов, ни стогов — в поле не было, только линия электропередачи тянулась дальше и дальше. Было же кому когда-то осваивать эти пространства! Теперешний мир сконцентрировался, сузился, тогда как главной задачей того было непрерывно расширяться, отвоевывая себе место для жизни, а иногда и просто оставляя следы. Провода вполне могли обрываться где-то, а линия — никуда не вести: важно было обозначить, что и тут проходил человек. Линия и обрывалась километров через семь от города, провода доходили до последней башни — и все; но направление уже было задано, так что теперь он не мог бы сбиться.</p><p class="p1">К полудню Рогов дошел наконец до жилья — до семи черных изб, которые, верно, выглядели не слишком добротными и в лучшие свои годы. Аврально строили, подумал Рогов. Сразу за деревней начинался редкий желтеющий смешанный лес, подступивший к ней вплотную. Никакой таблички с названием населенного пункта не было. Рогов несколько раз кричал «ау» и «эй», но никто не отзывался.</p><p class="p1">Он подошел к избам ближе и хотел уже обходить их по одной, когда из самой дальней, стоявшей у леса, вышла девушка с ведром в руке. Ни о какой девушке он в Кулемине не слышал, все, кто помнил о Чистом, говорили о стариках. Не туда зашел?</p><p class="p1">— Скажите, это Чистое? — спросил Рогов.</p><p class="p1">Девушка подняла на него глаза — серо-зеленые и совершенно прозрачные — и кивнула. Что еще сказать, Рогов не знал. Она прошла мимо него к колодцу, но оглянулась, и он принял это за приглашение идти с ней.</p><p class="p1">Он не взялся бы сказать, хороша она или некрасива, но и обычным назвать ее лицо он не решился бы. Вся она — и голые руки, и ноги, и лицо — была не бледной, а белой, такая белизна бывает у разбавленного молока. Росту в ней было не больше метра шестидесяти. Пушистые соломенные волосы, выбивавшиеся из-под такой же, как кожа, белой косынки, светились в солнечном луче, но во всем облике была какая-то покорная, кроткая грусть — видимо, так казалось еще и оттого, что она не говорила ни слова. Они дошли до колодца, мятое ведро спустилось в сырость, пахнущую полусгнившей древесиной, и поднялось, гулко плеща. Рогов попытался взять у нее ведро, чтобы донести обратно, но она так же молча покачала головой и понесла его сама, словно выполняя только ей определенную повинность.</p><p class="p1">Рогов шел за ней — девушка не звала, но и не возражала. На пороге избы она обернулась и поманила его. Будь на ее месте другая или другой, он испугался или, во всяком случае, напрягся бы, но от нее и самый подозрительный гость не мог ожидать дурного. Опустив голову, она шагнула в полумрак старого рассохшегося дома, в котором пахло какими-то травами и сухими цветами, но запах полусгнившего дерева — не такой резкий, как от колодца, — пробивался и тут. У стола сидел высокий белобородый старик в линялых кальсонах и такой же белой, как снятое молоко, рубахе навыпуск. Ласково улыбаясь, он встал Рогову навстречу.</p><p class="p1">По всему полу была разложена сухая степная трава и полевые цветы, все это сохло и пахло, но какой смысл было сушить в избе эту траву, когда на дворе жарко, а вдобавок и трава самая обычная — полынь, степные злаки, никакого целебного действия, — он не постигал. Старик улыбался молча, как-то виновато. Рогов несколько раз громко назвал себя, сказал, что приехал поискать сосланных, среди которых в этих краях мог быть и его дед, — но старик только смотрел на него, даже не кивая; девушка подошла к старику и встала рядом, чуть впереди, словно желая защитить того от роговского громкого голоса, и так они, не переглядываясь, кротко глядя на Рогова, стояли минут пять, пока он говорил. Опомнившись, он вынул зеркальце. Девушка улыбнулась, подошла, мягко взяла зеркальце из его рук и, поймав солнечный луч, пустила зайчика, словно показывая ему этот фокус впервые. Доверчиво улыбаясь, она вернула круглое стеклышко, и он, не понимая, получил ли отзыв на свой пароль, сунул его обратно в карман. Девушка без тени стеснения взяла его за руку, подвела к столу и указала на грубую деревянную табуретку. Рогов сел, и на такую же табуретку напротив опустился старик. По-прежнему не говоря ни слова и улыбаясь, девушка налила молока из большого глиняного кувшина, достала из прибитого к стене расписного, как в детском саду, шкафчика краюху хлеба и отрезала толстый ломоть. Рогов поблагодарил и отпил молока, тоже белого, чистого, нежирного, и откусил черствого, но вкусного хлеба. Только тут он понял, как хочет пить, а напившись (девушка тихо подливала), ощутил и голод, до того изгоняемый жаждой.</p><p class="p1">Он не представлял, как себя вести, хотя не чувствовал особого напряжения: встретили его по крайней мере приветливо. Молчание девушки, стоявшей за спиной старика, и самого старика, не сводившего ласковых глаз с Рогова, покуда он ел, было одинаково не похоже на обет молчания, на испытание, которому подвергают новичка, или на болезнь — например, глухонемоту. Рогов видывал глухонемых, знал их беспокойные, судорожные жесты, которыми они мучительно пытались показать собеседнику всю силу не находящих выхода, обуревающих их желаний, надежд и кошмаров. Здесь же был покой и тихий внутренний лад, заставляющий, однако, подозревать, что это не столько гармония, сколько деградация, медленное превращение в растение, в дерево, в собственную избу. Язык тут был не нужен, и его забыли за ненадобностью, заместили глухотой и тишиной, словно избавились от лишней составляющей и теперь торопились освободиться от прочих ненужностей вроде мышления.</p><p class="p1">Допив вторую кружку молока и прожевав ломоть, Рогов хотел было пуститься в объяснения и расспросы, но почувствовал их ненужность и промолчал, не сводя глаз со старика, словно боясь пропустить какой-то знак. Старик встал и, ничего не объясняя, вышел. Рогов выглянул: хозяин сел на крыльцо и глядел куда-то вдаль; самым естественным Рогову показалось сесть рядом. Он все ждал, когда с ним наконец заговорят, разъясняя глубокую и важную тайну, ради которой он добрался сюда, — но если тайна и была, ее предлагалось постичь самостоятельно. Здесь происходило что-то простое, но чрезвычайно серьезное, требующее замкнутости и тишины. В бесшумном жарком воздухе только кричал иногда большой рыжий петух на дворе да жужжала очнувшаяся вдруг муха, но в молчании этом чувствовалась не сонливость, а сосредоточенность все на той же тайне. Чтобы постичь ее, нужно было всего-навсего отказаться от слов, воспоминаний, всего ненасущного и сиюминутного: опуститься на ступеньку ниже, к траве, дереву, мухе, к их бессловесной и сосредоточенной жизни; но Рогов не мог сделать этого усилия — он был не отсюда и шел, по всей видимости, не сюда. Может быть, произведи он над собой эту единственную и такую нехитрую операцию, он понял бы, что и идти никуда не надо, и искать больше нечего, потому что вся беда наша в какой-то избыточности, зря гоняющей нас с места на место, — но он не был еще готов зажить такой сокращенной, травянистой жизнью. Ему все еще казалось, что человеку зачем-то даны слово и мысль, а в Чистом уже догадались, что все это ни к чему.</p><p class="p1">Он не знал, сколько так просидел рядом со стариком — минуту ли, час ли. Из соседней избы вышла сгорбленная, подслеповатая старуха с темным ласковым лицом и принялась кормить кур, а потом снова скрылась в доме, успев, однако, пристально поглядеть на Рогова и улыбнуться ему, словно жданному гостю, который не мог не прийти, — и оттого слишком-то радоваться его появлению не обязательно. Вскоре вдали показалось небольшое, голов на девять, стадо, которое так же сосредоточенно и послушно, как все здесь, шло к избам, наплывая из медленно меркнущего солнечного сияния. За стадом, забросив кнут на плечо, шел невысокий пыльный пастух. Как и все деревенские пастухи, виданные Роговым в жизни (эта-то похожесть всего вокруг на его собственные представления и заставляла его потом думать, что Чистое ему только привиделось), этот шел в разбитых, рыжих от старости кирзачах, одет был в пузырястые штаны и латаный серый пиджак, а на голове носил серую парусиновую кепку. На вид ему было не меньше шестидесяти лет, во рту поблескивали железные зубы. Он смолил беломорину, но, подойдя к деревне, заплевал и выбросил ее. Загнав коров в длинный сарай на самом краю деревни (этот край Рогов назвал про себя степным в отличие от лесного), пастух зашел в небольшую, самую древнюю и хлипкую на вид избу и больше не показывался.</p><p class="p1">Девушка, которая все это время с чем-то возилась в избе, тоже вышла и села на крыльцо, и Рогов обрадовался ей. Она взяла его левую руку, долго рассматривала ладонь, словно собиралась гадать, но вместо этого только провела по ней легкими и ласковыми пальцами, так что он поморщился от щекотки. Улыбалась она при этом так, как улыбаются незлые, тихие дети, вечно думающие одну свою думу, но не обижающиеся, когда их отвлекают. Рогов вспомнил, где и когда видел такую улыбку.</p><p class="p1">Однажды, когда он был влюблен в студентку мединститута, она взяла его в загорский интернат для слепоглухонемых; были там и другие дети с врожденными патологиями, одна страдала каким-то странным заболеванием лобных долей мозга — они медленно разрушались без видимой причины. В детстве она еще запоминала стишки, участвовала в играх, но к началу отрочества почти совсем перестала реагировать на внешний мир. Воспитательница, водившая их по интернату, в котором Рогов, против обыкновения, не боялся уродов, а горячо жалел их, попросила его обратить особое внимание на тонкие, аристократические пальцы девочки, всю ее гибкую и длинную фигуру, на благостное и сосредоточенное выражение лица: трудно было поверить, что у этого ребенка нет никакой тайны, есть только тихая жизнь растения (хотя, возможно, жизнь растения и есть самая большая тайна — вот почему посмертный распад тела, превращение его в грязь, камни и траву обставляется в нашем сознании такой таинственностью и надеждой). Взгляд девочки, ни на минуту не фокусируясь, бродил по стенам. Она почти не чувствовала боли или холода, легко обходилась без прогулок, скоро должна была перестать самостоятельно ходить в уборную, — но обо всех этих страшных вещах Рогов, глядя на нее, не думал, а чувствовал только кротость и благость, исходящие от этого полурастительного существа. И это Чистое напоминало ему весь загорский интернат, потому что, когда он вместе с воспитательницей ходил по тому, тоже безмолвному, дому, он ощущал невероятно напряженное поле, словно дети, лишенные речи, непрерывно обменивались какой-то внесловесной информацией. Тут не говорили, тут ловили сигналы, — и точно так же, вспомнил он, его вдруг взял за руку глухонемой, но хорошо видящий мальчик лет восьми, который несся куда-то мимо и вдруг задержался, пристально посмотрел на Рогова и захотел с ним поздороваться. Что мальчик мог прочитать по его руке? Почему сразу отошел в сторону, погрустнел, постоял секунд десять и опрометью бросился обратно — туда, откуда только что прибежал? И какую невыразимо печальную правду поняла о нем эта девушка, долго вглядывавшаяся в его ладонь и погладившая ее словно в утешение?</p><p class="p1">Все вокруг жалело его: пыльное поле, опускавшееся солнце, бледная, но на глазах сгущавшаяся голубизна. Все вдруг стало туманным и бледно-синим, и в этом тумане, млечном, как синяя акварельная краска, разведенная в только что налитой из крана воде с еще не осевшей мутью, двигались неопасные, дружелюбные тени. Из домов выходили люди, тянулись к старику, который встал с крыльца и жестом позвал Рогова за собой. Старик снял с пузатого буфета керосиновую лампу, поставил ее на стол и засветил. Тотчас в теплом вечернем воздухе, воздухе последних теплых вечеров, закружились над столом бледнокрылые, белые и бежевые бабочки. Девушка достала из печи чугунок картошки (Рогов именно так и представлял себе никогда не виденный чугунок). В избу — видимо, посмотреть на гостя — сходились новые и новые люди, общим числом девять: Рогов разглядел старуху, кормившую кур, и еще двух, таких же древних, согбенных и ласковых. Последним пришел пастух, ему не хватило табуретки, и он встал в углу, около двери. Девушка не присаживалась ни на минуту, она хлопотала у стола, доставала миски, накладывала картошку и квашеную капусту, резала хлеб, потом бесшумно прошла к печке и встала, прислонившись к ней спиной.</p><p class="p1">Стол стоял у окна, и синий свет, медленно загустевая и темнея, падал на миски с картошкой, на глечик и хлеб. Полоса прохладного тумана протянулась между домом и лесом. Запахло землистой сыростью. Мотыльки неутомимо бились о лампу. Рогов сам не заметил, как возник в воздухе тягучий, высокий звук, похожий и на стон проводов, и на гудок далекого поезда, — такие звуки слышатся иногда ночами в степи. Он рос, то повышаясь, то понижаясь, и только когда это протяжное мычание подхватил второй голос, Рогов понял, что старики поют.</p><p class="p1">Это была песня без слов и как будто без мотива — или с мотивом настолько сложным, что непривычное ухо не могло его уловить. Невозможно было понять, ведет ли каждый свою отдельную партию потому, что не слышит других и не хочет подстраиваться к ним, или потому, что это так надо. Нет, понял Рогов, они слышат, иногда в плетении голосов возникало что-то похожее на диалог — один делал паузу, другой подхватывал, — но уловить фразировку было невозможно: ритм тоже либо отсутствовал, либо был слишком сложен и разнообразен, как непериодическая дробь. Старики, однако, мычали истово, вытягивая шеи, напрягая пальцы рук, сложенных на коленях, и глядя в окно, все в одну сторону и как будто даже в одну точку. Рогов не взялся бы определить, сколько времени это продолжалось. Уже совсем стемнело в степи, а они все не расходились: стон стихал, прерывался, певцы откашливались и сморкались, но начинали через минуту ровно с той же ноты, на которой смолкли. Молчала только девушка. Она стояла у печи не двигаясь, иногда только переводя ласкающий, нежный взгляд с одного лица на другое; скользили ее глаза и по Рогову.</p><p class="p1">Вдруг все повернулись к ней: она, видно, ждала этого, четко зная момент, когда должна вступить, — но все-таки вздрогнула, напряглась и сжала опущенные руки в кулачки. Потом она выпрямилась, странно запрокинула голову и взяла горловую высокую ноту, словно вскрикнула гортанно, и замолчала опять. Вскрик повторился, пальцы ее сжимались и разжимались. На лицах стариков выражалось напряженное внимание.</p><p class="p1">С третьей попытки она повела вдруг мелодию — Рогову впервые показалось, что он ее уловил, впервые в ее течении, подъемах и спадах появилось какое-то подобие ритма, — и чем-то невыносимо прекрасным должна была обернуться эта тема в своем развитии. В ней чувствовалось огромное, бесконечное пространство, не казавшееся, однако, величественным: выпевалась горькая жалоба, которую на всем этом бескрайнем пространстве некому услышать, а степь и небо умолять бесполезно. Но из самой тщетности этой жалобы могла родиться и вот уже рождалась неизреченная, ни в каких словах не нуждавшаяся красота, и Рогов даже привстал на своей табуретке, подаваясь ей навстречу, — как вдруг девушка оборвала мелодию и громко закашлялась, прижимая руки ко рту и глядя на всех с выражением вины и испуга.</p><p class="p1">Видимо, так было не в первый раз. Каждый день старики исподволь вели неясную, неуловимую песню, подводя ее к главному соло, и каждый раз все срывалось, когда, казалось бы, уже должно было родиться что-то небывалое. Чем могло обернуться преодоление этого незримого порога? Речь бы вернулась, степь ли зазеленела бы новыми всходами, небо ли засияло бы всеми звездами? Рогов не знал, но чувство близкого, обещанного и не случившегося чуда было так явственно, что он не шевелился, боясь спугнуть его. Минут пять все молчали. Потом старик подошел к девушке, обнял ее, и она спрятала голову у него на груди.</p><p class="p1">Все принялись прощаться — подходили к девушке, гладили ее по голове, плечам, рукам, быстро припадали к груди старика и выходили, на пороге оглядываясь с тревожным сожалением. Одна из старух, направляясь к двери, мелко кивала. Скоро Рогов остался в избе с девушкой и стариком. Старик вышел на крыльцо и снова долго сидел там, глядя куда-то в степь. Туман рассеялся, по горизонту ходили тихие бледные зарницы.</p><p class="p1">Девушка, сразу ставшая еще более кроткой и виноватой, быстро вышла в сени и вернулась со старинным пестрым тюфяком, набитым сухой травой: точно такой был у Рогова на даче. Она положила его у печи и быстро, не раздеваясь, забралась на лежанку. Рогов скинул куртку, лег и укрылся ею. Он еще слышал, как вернулся старик и, тихо вздыхая, устроился на лавке. С лежанки не доносилось ни звука. Рогов забылся и спал без снов, пока чье-то легкое прикосновение не разбудило его.</p><p class="p1">Он открыл глаза. Девушка сидела у его изголовья на полу, положив легкую теплую ладонь ему на голову. Пальцы ее вздрагивали, словно улавливали какие-то тайные и мучительные его мысли, не понятные даже ему самому. Бледный рассвет занимался за окнами, девушка, видно, сидела так уже давно. На лице ее было такое сострадание и мука, что Рогов почувствовал отчаянную жалость и к ней, и к себе самому. Ни о чем, хоть отдаленно похожем на близость, он и подумать не мог. Ее губы беззвучно шевелились, и непонятно было — то ли она лепит слова, то ли просто покусывает губу от боли, которую причиняет ей соприкосновение с его душой.</p><p class="p1">Рогов потерял счет времени и незаметно забылся опять. Когда он проснулся снова, на этот раз окончательно, было уже совсем светло. День намечался золотой и горячий. Старик сидел у стола и приветливо улыбался. Рогов вскочил, скатал тюфяк, кивнул старику и вышел на улицу.</p><p class="p1">Старуха из соседнего дома молчаливо и сосредоточенно набрасывала на траву густую мелкоячеистую сеть; потом поднимала ее и набрасывала снова. Сначала Рогову показалось, что она кого-то ловит, но сеть падала и поднималась без всяких следов улова. Старуха поворачивалась на месте и снова забрасывала в траву свой невод, и опять он был пуст — только травинки, случалось, застревали в ячейках. Это занятие по бессмысленности — или по непостижимости смысла — было сродни сушению травы на полу, в избе. Еще одна старуха копалась в своем огороде — копалась в самом буквальном смысле, расковыривая палкой какую-то ямку в земле. Еще один старик вышел из ближайшей к лесу избы, повернулся прямо к лесу и принялся мочиться; Рогов подошел к нему и присоединился. Ни одной уборной он около домов не заметил — видимо, здесь давно обходились так.</p><p class="p1">Девушки нигде не было видно. Когда Рогов вернулся в избу, старик осторожно и вдумчиво втыкал в стены бумажные флажки, вроде тех, которыми военачальники в советских фильмах обильно кропят карты. Флажки были изготовлены из булавок и неровно вырезанных квадратиков алой бумаги для аппликаций; иногда старик задумывался и перемещал только что воткнутый флажок по ему одному ведомому закону — чуть выше или ниже по косяку, дальше или ближе от окна. Он виновато посмотрел на Рогова и продолжил свое таинственное занятие. Рогов ободряюще кивнул и, не желая мешать ему, вышел на крыльцо.</p><p class="p1">Он не знал, что здесь делать. Делать можно было что угодно: носить решетом воду, конопатить щели блинами, поджигать воду и тушить ее соломой, — но он не дозрел еще до этих занятий и потому понимал, что в Чистом ему не место. Понимал он и то, что люди, которых он искал, живут не здесь. Бог весть когда он понял это: во время ли бессловесного пения, ночью ли, теперь ли, когда каждый из них занят методичной, но бессмысленной и таинственной работой (он знал, что это распространяется на всех жителей деревни: тех, что в домах, и тех, что, быть может, в лесу), но «золотая когорта» избранных не могла доживать в таком идиллическом распаде, и старческая кротость не должна была стать их уделом. Может быть, он и встретил чудо — новую ступень в эволюции человека на обратном его пути к бессловесной твари, — но это было не то чудо, которое он искал.</p><p class="p1">Девушка вышла из леса с корзиной грибов, издали улыбнулась Рогову и, подходя, уже не отводила от него глаз. Потом поставила корзину перед крыльцом и встала перед ним, словно ожидая чего-то. Ему вдруг захотелось рассказать о себе, хотя все главное она откуда-то знала и так, — может, действительно ночью пальцами прочла его мысли. Он взял ее за руку — она не отняла ее — и повел за собой в степь.</p><p class="p1">От деревни отошли метров на триста. Девушка шла безропотно, ни о чем не спрашивая и все так же ласково поглядывая на него сбоку и снизу. Бог знает чего она ожидала. Наконец Рогов сел на жесткую траву и указал ей место рядом с собой.</p><p class="p1">Он долго сидел молча, глядя на эту сухую, колкую осеннюю траву, которую вообще любил больше весенней: весенняя была беззащитна, ничего не понимала и радовалась неизвестно чему, а эта уже что-то знала, до чего-то доросла и переставала быть просто травой. Она ужесточалась, деревенела, кололась, при попытках выполоть ее резала руки. Еще немного — и она перешла бы в другое качество: стебли репейника, татарника, зверобоя становились твердыми и ломкими, целый лес репьев вырастал на даче, сухими бодыльями торчала московская мимоза, — это были почти деревья, уже знающие что-то главное, но одеревенение их означало смерть. Никакой другой ценой понять главное было нельзя.</p><p class="p1">Рогов посмотрел на девушку: она не сводила с него глаз и не двигалась с места.</p><p class="p1">— Вот что, — сказал он. — Спасибо тебе, я уйду сейчас. Я, понимаешь ли, ищу таких людей, которые уже не совсем люди. Их много мучили, они многое видели. Их специально отбирали, чтобы спасти всех остальных, понимаешь?</p><p class="p1">Она не кивнула и не пошевелилась, но он знал, что ей понятно все сказанное, а может быть, и не сказанное.</p><p class="p1">— Я не очень представляю себе, какие это должны быть люди, — продолжал он, улегшись на живот и чувствуя покалывание сухих стеблей сквозь рубашку. — Совсем не знаю их. Я только знаю, что если кто-то сегодня и спасет всех — то исключительно они или те, кого они вырастили вместо себя. Иначе мы все погибнем, а может, выродимся. Или станем как ваши старики, которые траву сетью ловят. Они очень хорошие старики, но я с такими жить не хочу.</p><p class="p1">Она опустила глаза — в первый раз отреагировав на его слова чем-то внешним; ей было неприятно слышать это.</p><p class="p1">— Я остался бы с тобой, — торопливо оправдывался он. — Я понимаю, что без тебя им конец, а может, ты сама отсюда и не можешь жить нигде больше. Но я не хочу так. Это, конечно, тоже не совсем человеческое, но мне нужно другое…</p><p class="p1">Девушка по-прежнему смотрела на него; тень тревоги как будто мелькнула в ее глазах, хотя могло и показаться.</p><p class="p1">— В общем, я уйду, — сказал он твердо. — Я еще вернусь, конечно. — Он отлично знал, что не вернется, но от этих несчастных нельзя было уйти просто так, не поблагодарив, не оставив надежды. Может быть, они ждали кого-то вроде него, как ждут Мессию, — чем иначе объяснить их странное гостеприимство, их песню, которую, быть может, они пели только ради него? Нет, нет, он не мог уйти, не обещав вернуться. — Я приду потом, когда найду. Или не найду. Тогда и скажу тебе — нашел или нет.</p><p class="p1">Он встал, но она, оставаясь на земле, обеими руками поймала его руку и потянула вниз; она тянула слабо, но упорно, и на лице ее показалось умоляющее, слезное выражение — такое беспомощное и робкое, что еще немного, и у него опять защипало бы в носу.</p><p class="p1">— Надо, — сказал он. — Мне так надо, понимаешь?</p><p class="p1">Она отчаянно затрясла головой.</p><p class="p1">— Надо, — повторил Рогов. — Я тут у вас жить не смогу и там, — он махнул рукой в сторону далекого Кулемина, — тоже не смогу. Ты в городе-то бываешь? Хлеб иногда купить, пенсию за них получить?</p><p class="p1">Она кивнула.</p><p class="p1">— Ну, значит, сама все видишь.</p><p class="p1">Девушка опустила голову и отпустила его руку.</p><p class="p1">— Вставай, пойдем. — Он нагнулся к ней и заглянул ей в лицо. Выражение его было теперь странным — тупым, застывшим; глаза смотрели в землю, но вряд ли что видели. — Пошли, пошли. — Рогов тронул ее за плечо.</p><p class="p1">Медленно и неловко она встала и побрела за ним. Они вернулись в деревню, Рогов взял рюкзак, с порога поклонился старику и вышел. Девушка, как ватная кукла, стояла у косяка. Она не шелохнулась, когда он вышел. Словно костяк вынули, подумал он.</p><p class="p1">Кем он был для этих людей, да и людей ли? Чаемым принцем, за которого они отдали бы свою единственную спасительницу, свою последнюю радость? Или действительно тем пророком, с приходом которого они наконец смогли бы целиком спеть свою вечно обрывающуюся песню? Или здесь настолько отвыкли от людей, что в радость был каждый новый пришелец?</p><p class="p1">Рогов надел рюкзак, еще раз оглянулся и пошел к городу. Несколько раз он оборачивался с дороги: девушка стояла в дверях, старуха ковырялась в земле палкой. Он отошел уже метров на восемьсот, когда вслед ему от деревни вдруг донеслось глухое, жалобное мычание. Он посмотрел назад: к деревне брели коровы. Некоторые уже дошли до домов и стояли там, вытянув шеи ему вслед и беспомощно, жалобно мыча.</p><p class="p1">Он зажал уши и стремительно побежал прочь. Кто останется тут на два дня — вообще не уйдет отсюда. Но и когда Рогов, задыхаясь, перешел на шаг, а дома исчезли из виду, он все еще слышал тонкий протяжный стон и не знал, снаружи доносится он или вечно теперь будет звучать в его голове.</p></span>
