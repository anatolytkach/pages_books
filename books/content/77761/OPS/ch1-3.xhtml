</div><p class="p1">Доцента Московской сельскохозяйственной академии Ивана Антоновича Скалдина взяли в декабре тридцать восьмого года по известному «михайловскому делу». Сам Михайлов успел умереть за неделю до того, как начали арестовывать всю его школу. Жизнь — а точнее, смерть — спас ему как раз Скалдин: огромного роста, сильный, редко в чем сомневающийся, он пришел на квартиру к учителю и застал его в прискорбном состоянии. Не смевшая возразить семья жалась по углам: старик был крут. Врач «скорой» настаивал на госпитализации, но семидесятилетний академик прогнал его. О больнице он не желал слышать. Его отец, дед, прадед — все померли дома и не снисходили до того, чтобы обманывать судьбу. Скалдин недолго думая вызвал карету «скорой помощи», подхватил слабо отбивавшегося академика на руки (если б не уважение к основателю школы, он бы вовсе перекинул его через плечо) и так снес в машину. Старик под конец, покорясь чужой и доброжелательной воле, испытал даже облегчение и поверил было, что выкарабкается. Но врачи «скорой» не знали, где больница Академии наук, и повезли туда, куда было ближе. Пока Скалдин созванивался с лечащим врачом академика, пока больного перекладывали из машины в коридор, из коридора снова в машину, пока довезли до отдельной палаты — ноябрьский ледяной ветер его продул, и к вечеру другого дня Михайлов после короткой агонии умер. Дочь его проклинала Скалдина, кричала, что дома и стены свои, и он, может, был бы жив, что он не перенес волнения, — и сам Скалдин себя жестоко корил, хотя на гражданской панихиде в академии его и назвали наследником «михайловского дела». Но слова «михайловское дело» имели уже другой смысл, и в первых числах декабря старика пришли брать. Опухшая от слез жена и насмерть перепуганная дочь объяснили приехавшим, что Михайлова уже взяли, и трое — один стертый и вежливый, двое мордатых — отбыли то ли в некотором разочаровании, то ли в испуге. Впервые на их глазах неподконтрольная сила так явно вмешивалась в судьбу жертвы.</p><p class="p1">А Скалдина взяли пятого декабря, в день новой конституции, потому что ни праздников, ни выходных в НКВД теперь не было. Он не испугался и ни на секунду не усомнился в том, что будет выпущен. У него, как и у Михайлова, остались на воле жена и дочь, и во время обыска он успокаивал их, как только мог. В то, что дело его разъяснится, он верил, пока сознавал себя, потому что слишком уж странные вещи ему предъявляли в качестве доказательств вины и слишком мало понимал следователь в том, чем они в академии вообще занимались. На обыске у него нашли опытные семена и предъявили как доказательство хищения народной собственности. Когда же он, не переставая широко улыбаться, рассказал следователю, что и дома продолжал работать, изучая и проращивая образцы, что так делали все, что они спешили к годовщине конституции рапортовать о новом сорте, — следователь решил, что семена он брал для передачи иностранным агентам. Скалдин весело расхохотался и сказал, что ни одного агента он никогда не видел, работа еще только в завершающей стадии и довести ее до ума мог лишь Михайлов, а после Михайлова только он. За границей же, насколько ему известно, таких специалистов нет. Поняв, что Скалдину что-то известно о загранице, следователь разъярился окончательно и в первый раз ударил его кулаком в зубы.</p><p class="p1">Ивана Антоновича никто никогда не бил, разве что в детстве, когда он и сам дрался очень часто. При его богатырском сложении, а главное, добродушном характере врагов у него не было, и он так дружелюбно, естественно ставил себя с людьми, что и завистников не нажил. Он убежден был, что работает на благо Родины, что лучше его страны нет на свете и что издеваться над людьми здесь не будет никто и никогда. Слухи, доходившие о том, что делали с исчезнувшими коллегами и соседями, он считал недостоверными. Поколебать Ивана Антоновича в его вере было невозможно. Следователь не встречал еще таких людей и потому совершенно не ожидал, что Скалдин в ответ набросится на него и начнет колотить со всей крестьянской мочи. Хотя крестьянином был только его дед, а уже отец выбился в люди и выучился на агронома, но сила и упрямство были у них в роду, и за это Михайлов, сам из рода поволжских крестьян, Скалдина выделял особо.</p><p class="p1">Ивана Антоновича, конечно, за такое убили бы сразу, но он нужен был для большого сельскохозяйственного процесса, на котором объяснились бы все неурожаи и голод начиная чуть ли не с двадцать второго года. Сходные процессы бывали, но задумывался главный спектакль, и потому каждый специалист с именем был на счету. Следователь успел нажать кнопку. Скалдина с того допроса держали в наручниках, не давали спать, ставили в клетку с гвоздями и вообще подвергали пыткам такой тяжести, что и сами не понимали, на чем он держится. Держался он на своем крестьянском характере, добродушии и искренней вере, что все разъяснится. Пока ему не сломали правую руку, он писал бесконечные письма, в которых подробно, доступно, доброжелательно раскрывал суть своих и михайловских опытов. В результате чудовищного недоразумения ценный работник был выключен из важного дела, и дело могло теперь — нет, не погибнуть, конечно, незаменимых нет, и к тем же выводам непременно придут другие, но это случится позже, а ведь дорог каждый день. Их пшеница сулила Родине возрастание урожайности по меньшей мере в полтора раза, причем климатически была приспособлена к суровым условиям русского Севера, — письма его походили на популярные брошюры, такие же ясные и благожелательные, и следователь читал их с интересом, не переставая, однако, недоумевать: что ж он, и в самом деле ничего не понял? Следователь тоже не понимал главного, он не догадывался о цели, да и запретил себе о ней думать, но некоторые детали генерального плана уже были ему ясны — и прежде всего он сообразил, хоть и не сразу, что если кто к ним попался, то обратного хода нет. А Скалдин все не понимал, и это одно давало ему силы писать свои письма, которые страшно раздражали следователя. Только поэтому ему и сломали правую руку. Обычно правую берегли, чтобы хоть осталось чем подписываться, но Скалдин уж очень достал органы дознания своей доброжелательностью и страстью все объяснять. Не барин, в случае чего накалякает левой. Каллиграфии не требуется.</p><p class="p1">Однако даже потом, со сломанной рукой и отбитыми почками, он не желал сотрудничать со следствием, то есть оговаривать себя. И когда ему пригрозили, что возьмут жену, он опять не понял, потому что жене было двадцать два года, а дочери на двадцать лет меньше, и он представить себе не мог, чтобы в его стране были возможны такие фашистские методы дознания. С тем, что такое творили с ним, он смирился — похоже, кто-то ввел людей в ужасное заблуждение, но он-то был здоровый тридцатилетний мужчина, а с женщинами, даже в заблуждении, ничего такого делать нельзя. В его стране не было людей, которые могли бы делать такое с женщинами. И он засмеялся.</p><p class="p1">Он смеялся и тогда, когда ему дали почитать показания ближайшего его друга, тоже михайловского ученика (в их группе не было зависти, старых и молодых объединяло дело, и все признавали скалдинское первенство среди равных). Показали ему и самого друга. У того пол-лица занимал багровый кровоподтек, и он еле слышно повторил, что Скалдин в разговорах вечно сетовал: вот, мол, приходится работать на советскую власть, а в Германии, например, их труд оценили бы совсем иначе. И Скалдин смеялся, и смеялся после, когда ему опять не давали спать, и через неделю следователь понял, что он теперь всегда будет смеяться. Он забыл свое имя, забыл все. Следователь знал по опыту, что такие очень долго не гнутся, а потом ломаются в одночасье, но тогда от них уже никакого толку. О том, чтобы вывести Скалдина на процесс, и речи не было. Можно было попробовать привести к нему жену — вдруг идиот очухается, перепугается, — но санкции не давали, и вообще интерес к «михайловскому делу» с апреля почему-то заглох. Такие вещи происходили непредсказуемо. Заинтересовались военными, и агрономы отпали: отработанных, их пустили по «тройке», без публичного процесса.</p><p class="p1">Случись иначе, жену Скалдина, Марину, скорее всего действительно взяли бы, тем более что происхождение ее было двусмысленное, интеллигентское: она была дочерью учителя гимназии, взятого в заложники после убийства Урицкого в восемнадцатом году и расстрелянного через две недели. Ей было тогда два с половиной года, и она ничего не помнила, но атмосферу безнадежности, поселившуюся с тех пор в доме, впитала навсегда. Поэтому и ареста мужа Марина ждала с самого начала, еще когда у нее на работе (она печатала на машинке в той же академии, и там ее полюбил Скалдин) взяли старшую машинистку. Это была строгая, суровая женщина, всегда отчитывавшая девушек, если они в погоне за нормой делали слишком большие поля или раньше времени выкручивали из каретки лист, в котором вполне хватило бы места еще на две строчки, а ведь в стране и до сих пор не хватало хорошей бумаги (Марине по ее добросовестности попадало за другое — она допечатывала лист до самой кромки). Марина знала таких женщин: они не могли быть замешаны ни в чем преступном. Говорили, что старшая машинистка передавала врагам какие-то данные, к которым имела доступ по работе, и девочки шептались, что грымзе так и надо, но Марина помнила, как начальница отпустила ее с работы, когда у нее на втором месяце закружилась голова, и как она уважала Скалдина, и главное — она даже под пыткой никогда и ничего не передала бы врагам. И с того самого момента, как Наталью Семеновну взяли, она уже ничего хорошего не ждала.</p><p class="p1">Кстати, тогда же выяснилось, что старуха вовсе и не старуха, что ей сорок восемь лет и что вместе с ней живет племянник, сын ее умершей от рака сестры. Племяннику было шестнадцать лет, она никогда не приводила его на работу и ни словом о нем не проговаривалась, не желая, видимо, приоткрывать свою жизнь перед подчиненными, и объявился он впервые только через месяц после того, как ее взяли. Это было в тридцать седьмом, когда нескольких человек вдруг выпустили, и тогда женщина, бывшая в камере с ней и вышедшая на волю, этого племянника по просьбе Натальи Семеновны нашла. Она передала ему, что Наталью Семеновну оговорили, что если вступятся коллеги, то ее, может быть, отпустят и что все это только ужасное недоразумение. Племянник оказался хромоножкой, у него была родовая травма — сестра Натальи Семеновны была партийным работником, много ездила, долго недоедала и потому рожала трудно. Еще у него после шока, вызванного арестом тетки, немного подергивалось лицо, словно он пытался стряхнуть с него выражение униженности и мольбы, с которым пришел за нее просить. Он побывал в машбюро, пытался добраться и до какого-то начальства и всех уверял, что им стоит пойти к следователю — и Наталью Семеновну освободят, надо только добиться, чтобы их выслушали. Ему обязательно надо было, чтобы коллеги подтвердили ее невиновность, ведь все они хорошо ее знали, и все кивали в ответ, а девочки-машинистки даже напоили его сладким чаем (новая старшая машинистка, Клавдия Степановна, была добрая, не то что грымза), и все обещали пойти поговорить, но никто, конечно, не пошел. Марина некоторое время казнилась, но она с самого начала понимала, что ходить никуда не надо, потому что выбор сделан и заместить жертву нельзя, это такой закон. Наталья Семеновна обладала какими-то чертами, за которые надо было взять именно ее, она была уместна в этой жизни и годилась ей в пищу. Тем не менее Марина ласково поговорила с мальчиком, который, кажется, ее не слышал, и рассказала ему про крошечную дочь, словно подсознательно оправдываясь, почему никуда не пойдет (впрочем, тут же оборвала себя, потому что нехорошо было рассказывать про свою семью бедному хромоножке, у которого никого не было), и даже дала свой телефон — на случай какой-нибудь нужды — и сунула денег. Деньги мальчик взял, страшно краснея и подергиваясь лицом, — ему, видно, приходилось совсем туго, — но не позвонил ни разу. Что случилось с Натальей Семеновной, Марина так и не узнала, и мальчик тоже никогда уже не появился.</p><p class="p1">Марина не знала, и никто не знал, что шестнадцатилетний хромой мальчик действительно пытался пробиться на прием к следователю, потому что одна его одноклассница, самая красивая девочка в школе, такого приема добилась и ходила, говорят, к самому наркому. Нарком ее выслушал, тоже напоил чаем и переправил к своему заместителю, а заместитель затребовал дело, и вскоре ее отец, директор мебельной фабрики, был на свободе. Правда, на фабрику он не вернулся, а уехал к родителям в Брянск и увез туда же всю семью, и никто в школе больше не видел девочку. Но пересказывали про ее удачу часто и говорили даже, что замнаркома, погладив ее по голове, сказал, что вот если бы у всех были такие дочери, то меньше было бы судебных ошибок, из-за которых враги очерняют органы. И мальчик стал добиваться, чтобы его пустили к следователю, — но он был один и, конечно, ничего не добился. Он отстаивал очереди, у него брали передачи, но ничего не говорили. И в очереди его не любили, потому что он дергался лицом и загнанно косился.</p><p class="p1">Из школы он ушел; денег в доме не было, как не было и никакой родни. Он устроился грузчиком на ту самую мебельную фабрику, директор которой уехал в Брянск, и его взяли на работу, хотя по возрасту и положению он не имел на нее никакого права. Тогда он понял, что единственный способ помочь тетке — это оказаться рядом с ней, то есть быть арестованным как ее пособник и открыть следователям глаза, и он пошел в главную приемную на Лубянке и заявил, что был теткиным сообщником. Вот тогда его наконец и взяли, но Марина ничего этого не знала.</p><p class="p1">Она не знала и того, зачем всех берут, но чувствовала только, что так надо, что это органическим образом вытекает из самого порядка вещей. Она все-таки была дочерью гимназического учителя словесности и, хотя совсем не помнила его, с рождения усвоила чувство гармонической цельности мира, его подчиненности художественным законам. И мир, в котором она со Скалдиным жила, в котором он катал ее в лодке по Москве-реке, угощал шоколадом и рассказывал о великих планах по преобразованию почв, — предполагал и изнанку, страшный черный подвал, куда время от времени по случайному, но безошибочному выбору сволакивали всех этих только что веселившихся, а теперь навеки выселившихся людей. Никакого разумного обоснования у выбора не было, но был количественный показатель, непременный процент, обусловленный не статистикой, а гармонией, как вот теплые или холодные краски, и позволявший поддерживать в остальных все нараставшее лихорадочное веселье. И яркость красок, и даже повторившееся дважды кряду рекордно жаркое лето, когда в Москве плавился асфальт, обеспечивались наличием изнанки, о которой никто ничего достоверно не знал, но Марина угадывала. И потому ей было ясно, что Скалдина возьмут, — их жизнь была слишком хороша, чтобы кончиться иначе. Очередь была за ней, потому что расплачиваться предстояло всем счастливым; она страшилась только за ребенка, но у нее была старая мать, которая жила отдельно, и после скалдинского ареста Марина упросила ее приехать. Старуху, верила она, не возьмет никто. Добрая, слезливая и на всю жизнь испуганная старуха никому не нужна. Брали сильных, красивых, как Скалдин, или упрямых и строгих, как Наталья Семеновна, или молодых и догадавшихся, как она сама.</p><p class="p1">Но ее не взяли. Случилась, как это нередко тогда бывало, непредвиденная перемена ветра, и вместо «михайловского дела» все силы были брошены на очередной военный заговор. Конечно, выпускать Скалдина, полуживого, седого и даже в тюремной больнице не перестававшего хохотать, никто не стал бы. Но Марина была спасена: в июле тридцать девятого года у нее просто не приняли очередную передачу. На иное она и не рассчитывала. Она похоронила Скалдина в тот самый день, когда он спускался по лестнице их арбатского дома (они жили в коммуналке на втором этаже) и несколько раз оглянулся, чтобы широко улыбнуться ей.</p><p class="p1">Ее никто не выгонял с работы — Скалдина любили все, как-никак он был главной надеждой Михайлова, а Михайлов был корифеем, и многие верили, что разберутся. Она ушла сама и по знакомству, через профессора-почвоведа, нанялась в секретари к известному писателю Савину, писавшему для пионеров о достижениях науки. Однажды ей случилось перепечатывать его статью о Михайлове для «Пионерской правды», Михайлова там называли светочем отечественной науки, человеком кристальной чистоты, представителем передового отряда дореволюционной интеллигенции, который одним из первых понял и признал советскую власть. Оказалось, что его книга о переустройстве почв нравилась Ленину — об этом вспоминал Бонч-Бруевич. Перепечатывая эту статью, Марина лихорадочно искала упоминаний об учениках, но учеников словно и не было — на Михайлове агрономическая наука закончилась, и дальше ее предстояло развивать массам в своем творческом дерзании. Марина хотела объяснить Савину, что ученик у Михайлова был, и если бы ей еще не сказали тогда, что с мужем все решено и надежды нет, она бы, конечно, попыталась вступиться, что-то сделать, хотя и понимала безнадежность попытки. У Савина были знакомства на самом верху, его приглашали на целый день на какие-то дачи, откуда он возвращался мертвецки пьяным, — Марина тогда сразу уходила, бросая неоконченную работу. Но вступаться не имело уже смысла, а главное — она понимала, что мужа взяли не за группу Михайлова, и Михайлова взяли бы не за его опыты. Оба сильные, веселые и упрямые, они представлялись любимыми детьми этой новой жизни и по ее неформулируемому, но естественному закону должны были ее собою окупить или, вернее, удобрить. Если бы они не были плоть от плоти и кость от кости ее, им ничто бы не угрожало. Это было так же естественно, как то, что мы не едим камней, а питаемся органической пищей, из которой, по сути, построены. Только Михайлов успел умереть, а мертвые не годились в еду, потому что переставали быть живой материей, становясь камнем, почвой, водой.</p><p class="p1">Во время войны Савин бросил Марину, не похлопотав ни о ней, ни о ее дочери, ни о ее матери. Ей самой пришлось устраиваться с эвакуацией, в академии ее помнили и взяли в поезд. До сорок четвертого года она прожила в Ташкенте, а потом вернулась на Арбат. Мать ее в Ташкенте умерла, не выдержав переезда, голода и жары. Марина словно закаменела и не плакала, когда ее зарывали. Ей было жаль только, что вокруг чужая, сухая земля, что в ней должно быть неудобно телу, построенному из другого вещества. Здешние люди сухи, а мать ее была тяжела, сыра и слезлива.</p><p class="p1">У Марины осталась на свете одна Катя, не похожая ни на нее, ни на Скалдина, но славная и смышленая девочка, только тихая, словно с самого рождения знавшая, что защищать ее некому. Лишь в Ташкенте Марина вдруг догадалась, что и она, и Катя потеряли отцов в одинаковом возрасте и что это может стать их родовым проклятьем, но и об этом она подумала вскользь, не позволяя себе развивать мысль. Секретарствовать у Савина Марина не вернулась, хотя знала, что он жив-здоров, пересидел войну на Урале, откуда писал в «Пионерскую правду» о маленьких тружениках тыла. Она работала теперь в отделе кадров на заводе имени Сталина. От красоты ее мало что осталось: она сжалась, высохла, стала меньше ростом и почти не читала ни книг, ни газет. Когда она подолгу сидела в их маленькой комнате, глядя в окно, Катя, поднимавшая голову от тетради, боялась задать матери вопрос и тем нарушить течение ее мыслей. Она сильно удивилась бы, узнав, что никаких мыслей не было, а было какое-то безнадежное и послушное ожидание. Иногда же Марина про себя разговаривала с мужем, рассказывала ему, что и как она делала сегодня, потому что в душе понимала, что больше с мужем разговаривать некому. Если он где-то и был, то только в ней, и постепенно в ее мыслях он оформился в какое-то внутреннее существо, единственным убежищем которого была ее, Маринина, голова. Он сидел там, словно в капсуле, потому что не мог же такой большой Скалдин исчезнуть целиком, это было бы неправильно, — и если тело его легло в фундамент того яркого и насыщенного мира, естественной частью которого он был, то ведь было же что-то в его душе, принадлежавшее только ей, и это что-то никуда не могло деться, потому что никому больше не было нужно. Она разговаривала с мужем нечасто, но знала, что если о нем не вспоминать, он обидится и может умереть, как вот если вовремя не покормить собаку. Нельзя сказать, чтобы эти разговоры были ей в тягость, но они напоминали о прежней жизни, в которой она еще жила, а не доживала, и потому слишком часто тревожить себя Марине не хотелось. Она научилась говорить с мужем очень скрытно, ничем себя не выдавая. У них выработался особый кодовый язык, происхождения отдельных понятий в котором она уже и не помнила, однако ей достаточно было намекнуть, и муж понимал. Но он требовал подробностей, ему скучно было в ее заторможенной, всегда полусонной голове, где давно не было мыслей, а только ожидание и призраки — его, мамы, Натальи Семеновны, где-то ютились и добрые узбеки, и хромоногий мальчик, но очень многих выдуло. Слишком много народу там и не могло поместиться: чтобы подкармливать такую капсулу и продлевать ее существование, нужна сила, а силы у Марины больше не было. Хозяйство было на дочери, с ранних лет выучившейся мыть пол, готовить, читать в углу не приставая. Она все делала отлично и тихо и боялась только, что матери однажды станет плохо. Но Марина не могла себе такого позволить, и девочка каким-то чутьем об этом догадывалась.</p><p class="p1">Однажды, пятого сентября сорок восьмого года, двенадцатилетняя Катя делала уроки, и вдруг ее позвали к телефону. Она испугалась — ей показалось, что заболела мать. Но это была не мать и не кто-то с работы матери, а незнакомый и сильный мужской голос:</p><p class="p1">— Это ты, Снегурка? Мама дома?</p><p class="p1">— Нет, — ответила Катя и хотела уже спросить, кто это и что передать, но тут поняла, что знает, кто это. Мать редко рассказывала ей про отца, и Катя знала только, что он погиб на фронте, а до этого два года был вдали от дома с особым заданием. Отец и называл ее Снегуркой, потому что она была беленькая, а они с матерью — темноволосые. Скалдин действительно шутил, что дочь ни в мать, ни в отца, но про проезжего молодца не добавлял, потому что не хотел обидеть Марину. Сама Марина никогда так не называла дочь, но в немногих рассказах про отца обязательно упоминала Снегурку. Больше от него, собственно, ничего не осталось: был игрушечный песик, сделанный из целлулоида, но он потерялся в песочнице, когда Кате было три года. Мать тогда очень сердилась на нее.</p><p class="p1">— Катька! — весело сказал голос. — Передай матери, что я буду ждать ее сегодня, в восемь, около Почтамта. Я приехал ненадолго, мне еще тут надо кое-что сделать, а потом я к вам зайду. Но сначала мы должны с ней увидеться, обязательно. Я ей кое-что должен отдать. Поняла? Только обязательно запомни: в восемь часов, около Почтамта. Она где сейчас работает?</p><p class="p1">— На заводе имени Сталина, — задыхаясь, ответила Катя. Она не могла позвать отца домой, потому что он, видимо, все еще был на задании. Но как это он, выполняя такое важное задание, не знает, куда перевелась мать? — Я могу дать телефон, можно позвонить, ее позовут… — Она старательно избегала любых конструкций, в которых требовались «ты» или «вы».</p><p class="p1">— Нет, я звоню от друга и не хочу его обременять, — сказал веселый голос. — Позвони ей сама, а может, лучше ее и не тревожить. Она ведь придет часов в шесть?</p><p class="p1">— Да, она обычно приходит в шесть. — Катя обрадовалась, что отец по крайней мере знает, во сколько мать приходит с работы.</p><p class="p1">— Ну вот, тогда и передашь ей. Скоро увидимся, Снегурка. Будь здорова. — И отец повесил трубку.</p><p class="p1">Катя долго еще стояла в коридоре у телефона, и боясь, и надеясь, что он еще перезвонит. Мимо прошаркала туфлями старуха-соседка, недавно поселившаяся к ним вместо прежнего соседа, — она иногда пускала ее в свою комнату полюбоваться картинами и попить чаю из старинных тонких чашечек, так называемых кузнецовских. Непонятно было, как они уцелели в войну, в пустом доме. Наверное, старуха куда-то спрятала их, как клад, а потом достала.</p><p class="p1">— Мама звонила? — спросила старуха.</p><p class="p1">— Нет, — ответила девочка, но про отца ничего не сказала. Отец был на задании, сейчас шел самый ответственный, последний его этап, и если он даже не может зайти домой — значит, ничего про него говорить пока нельзя. — Это подруга, спрашивает уроки.</p><p class="p1">— Вам очень много задают, — посочувствовала старуха. — Разве нам столько задавали? — и, вздыхая, пошла на кухню.</p><p class="p1">Катя попыталась вернуться к урокам, но учеба не шла, даты из Смутного времени не запоминались, так и оставаясь смутными. Один раз ей вдруг показалось, что отец уже тут, стоит за дверью, только почему-то не может войти. С сильно бьющимся сердцем она подошла к двери, постояла у нее, но открыть не решилась.</p><p class="p1">Мать пришла без десяти шесть, когда Кате уже начинало мерещиться, что она видит, как стрелка на ее маленьких наручных часах (подарок к окончанию четвертого класса) двигается: медленно-медленно, но различимо. Ей было страшно, только что какой-то мужчина — видимо, пьяный, — громко и зло кричал за окном. На улице шел дождь, мать была в старом прорезиненном плаще. Зонта она не брала с собой, потому что по рассеянности часто забывала его в трамвае или метро. В другое время Катя сразу кинулась бы разогревать ей обед — ведь мать очень устала. Потом они сели бы есть, Катя расчистила бы стол от своих учебников и стала рассказывать школьные новости, они как раз проходили «Дубровского», и она хотела спросить мать, почему Дубровский не увез Машу с собой, а так и оставил неизвестно на кого. Но теперь, конечно, было не до Дубровского.</p><p class="p1">— Мама, — начала она осторожно, боясь напугать Марину. — Ты не волнуйся, пожалуйста. Папа звонил.</p><p class="p1">Марина ничего не поняла и потому переспросила, какой папа. Катя объяснила ей все, с самого начала, постоянно умоляя не волноваться. Марина как раз всю дорогу домой от метро — долгую, осеннюю, дождливую, мимо луж, по дробящимся на асфальте отражениям фонарей и окон — рассказывала мужу, что живут они неплохо, поэтому переход к Катиному сообщению был ей странным образом облегчен. Муж мог позвонить, ничего необычного, ведь она только что с ним долго разговаривала. И ей понадобилось минут двадцать, чтобы заново осознать, что позвонить он не мог. Впрочем, она тут же отняла десять от сорока восьми и поняла, что в июле у него истек срок, а ведь что такое десять лет без права переписки — ей все объясняли по-разному. Оборачивалось по-всякому, и Марина знала это, хотя каким-то тайным и единственно верным чутьем давно поняла, что Скалдина могли только убить, а вернуть не могли, потому что для поддержания той жизни он был нужен весь, и именно такой, а про нее и Снегурку никто не подумал.</p><p class="p1">И все-таки Марина так привыкла быть неправой, то есть так часто убеждалась в том, что ее правота, как и она сама, никому не нужна, — что могла же она, в конце концов, и ошибиться, а значит, Скалдин мог быть жив.</p><p class="p1">В капсуле ее сознания он валил лес, дробил камни, его использовали в каких-то страшных медицинских экспериментах (ведь фашисты экспериментировали на людях, значит, это зачем-то нужно). В ее снах он водил машины по горным дорогам, осушал болота, горел в топке, которую отчего-то можно было топить только людьми, и непременно еще живыми. Он мог вернуться при одном условии — от него должны были целиком взять ту веселую силу, к которой она так захотела прислониться в свои девятнадцать лет, — а потом его, наверное, можно было отрыгнуть.</p><p class="p1">— Катя, — спросила она строго, — какой у него был голос? Это очень важно.</p><p class="p1">— Веселый, — недоуменно ответила Катя. — Нормальный голос. — Как будто она могла помнить обычный голос отца.</p><p class="p1">— Хорошо, — с трудом проговорила Марина. — Сиди смирно, никому не открывай, а я пойду.</p><p class="p1">— Рано еще, мамочка, — попыталась удержать ее Катя. — Посиди, поешь. Ты ведь устала.</p><p class="p1">— Нет, нет, Почтамт далеко, я пойду.</p><p class="p1">Она вышла из дома. Из булочной, что на первом этаже, выносили огромные овальные торты. Рядом стояла карета «скорой помощи». Вероятно, кому-то плохо стало на сеансе в душном зальчике арбатского «Арса». Марина давно не ходила в кино.</p><p class="p1">К Почтамту, на Кирова, она шла пешком, чтобы успокоиться, но никакого успокоения не наступало — она даже чуть не попала под зеленую «Победу», обрызгавшую ее с ног до головы, и все это время в ней не унималась внутренняя дрожь, от которой трудно было не только идти, но и дышать. Она старалась идти медленно и все равно пришла на полчаса раньше условленного времени. Перед поворотом на Кирова, у Сретенского собора, пришлось долго подниматься в гору, и она никак не могла справиться с дыханием. Часы на Почтамте показали без пяти восемь, восемь, пять минут девятого. Она боялась привлекать внимание своей неподвижностью, поэтому принималась ходить вдоль фасада, но боялась и пропустить мужа — и застывала снова. У нее мерзли ноги, странно дрожало что-то за глазами и чесался почему-то язык. В четверть девятого все еще никто не пришел, но ей уже казалось, что постовой-регулировщик странно поглядывает на нее, — хотя до нее ли было регулировщику в такой дождь?</p><p class="p1">Москва вокруг нее была совсем не та, в которой брали Скалдина. Из нее навсегда ушла праздничность, которую только и могли подпитывать непрерывным отбором веселых и сильных людей, исчезавших неизвестно куда. Их лица глядели с каждого листочка, и потому листочки были такие свежие. Теперь люди тоже исчезали, хотя и не так часто, но прежней радости уже не было ни в чем. Сила, которую она раньше чувствовала вокруг себя, словно надорвалась на войне. А может, вся она ушла в землю, бесполезно потратилась во время боев, когда жизнь проливалась из человека в никуда, а не усваивалась тем божеством, которое всех их хранило и обеспечивало. В общем, Москва стала серая, и даже новые здания, отстроенные взамен разрушенных, не добавляли ей красоты и света. Марина не могла этого объяснить, но чувствовала. Если бы в такой Москве появился прежний Скалдин, на него все оглядывались бы. Но таких, как он, больше не было, а другие мало годились в пищу. Их ели нехотя, без радости, чтобы не умереть.</p><p class="p1">В половине девятого никто не пришел, но она твердо решила ждать до девяти. Скалдин никогда не опаздывал, но мало ли какие у него могли быть обстоятельства. Только без четверти девять незнакомый мужской голос вдруг окликнул ее:</p><p class="p1">— Маруся!</p><p class="p1">Так называл ее он. С бешено заколотившимся сердцем она обернулась, но тут же увидела высокого молодого человека, навстречу которому бежала худенькая девушка с зонтом. Зонт вырывался у нее из рук, но она не смеялась, как смеялась бы Марина десять лет назад. Лицо у нее было хмурое и сосредоточенное, словно и ловить зонт, и бежать к молодому человеку — работа. Молодой человек не обнял ее, как обнял бы Скалдин, а только коротко прижал к себе, потом взял за руку, сунул ее в свой карман — согреть, — и они быстро пошли в сторону центра.</p><p class="p1">После этого Марина отчего-то не стала дожидаться девяти, а медленно, снова пешком, пошла прочь. Именно тут ей стало ясно, что никто не придет. Она могла доехать до Арбата на метро, с пересадкой, но хотела именно идти, и только на ходу, на углу Петровки, ей вспомнилось, что в Москве есть и другой, новый почтамт. Так иногда называли Центральный телеграф, построенный лет десять назад на улице Горького, наискось от Художественного театра. Может быть, Скалдин ждал ее там, а может быть, и до сих пор стоял там, но все то же тайное знание сказало ей, что никакого Скалдина нигде нет. Словно эта другая, чужая Маруся раз навсегда подтвердила ей, что ждать больше нечего. Это же тайное знание говорило ей раньше, что бесполезно хлопотать за Наталью Семеновну и Скалдина, и бесполезно просить Савина, и не нужно ничего ждать. Все происходило навсегда.</p><p class="p1">Дома она сказала Кате, что папа не пришел, что это была чья-то плохая шутка или кто-то ошибся номером. Он погиб на войне, и ждать больше не надо.</p><p class="p1">— Но ведь находятся! У Сони отец нашелся, он был в плену и вернулся! — сказала Катя, которая к приходу отца убрала квартиру и вырезала три бумажные салфетки — для их первого тройственного чаепития.</p><p class="p1">— Это чья-то ошибка, Катя, — отрезала мать.</p><p class="p1">— А Снегурка? — воскликнула Катя чуть не плача.</p><p class="p1">— Многих девочек называют Снегурками… — И машинально, для убедительности, Марина добавила: — И меня так в детстве звали.</p><p class="p1">Тут же она вспомнила, что мать действительно назвала ее так однажды, когда она, вся в снегу, пришла домой после прогулки с первым своим кавалером. Ей было тогда тринадцать лет. Но больше никто и никогда не называл ее так. Ее поразило только, что почти все, что она говорит, оказывается правдой, словно ей откуда-то заранее все известно.</p><p class="p1">Катя с мамой сели пить чай и больше не говорили об отце. Но самое странное, что наутро в песочнице нашелся красный целлулоидный пес. Катя шла в школу через двор и увидела его случайно. Она почти забыла эту игрушку, но сейчас вдруг вспомнила с необыкновенной ясностью. Конечно, это был он. Откуда он взялся? Может быть, отец купил такого же и передал привет, чтобы они не думали, будто он опять уехал навсегда? Или просто малыши рылись в песке и нашли игрушку, которую не сумели отыскать Катя с мамой девять лет назад?</p><p class="p1">Она бережно взяла пса, поцеловала его и положила в портфель, а дома показала маме. Мама долго плакала и сказала, что это, конечно, дети, кто же еще. С тех пор он снова жил у них в квартире, смешной, нелепый, — стоял на почетном месте, на буфете, и Катя иногда тайком брала его в постель, а когда она вышла замуж и родила сына, и ему иногда давала поиграть красного пса.</p><p class="p1">Катя никогда не расспрашивала мать, щадя ее, а когда выросла — расспросить не могла, потому что через год после Катиного замужества Марина потеряла рассудок. Она никому не позволяла прикасаться к себе, ибо это могло повредить живущим внутри нее существам, у которых любое чужое прикосновение отбирало силы. Все и трогали ее только потому, что хотели зарядиться их силой, а больше силы нигде не было. В психиатрической больнице она перестала есть, потому что это была плохая еда, вредная для них, и умерла за месяц.</p><p class="p1">Все это случилось задолго до рождения внука, в пятьдесят шестом году. Слава носил фамилию Катиного мужа — Рогов — и о деде знал только, что тот пропал. Конечно, в пятьдесят седьмом его реабилитировали, выдали справку с фальшивой датой и странной причиной смерти без указания ее места (сорок третий год, сердечная недостаточность, — словно дед воевал, был под Сталинградом и умер там от сердечного приступа). В шестьдесят третьем году Скалдина даже включили в список любимых учеников Михайлова, когда о том вышла подробная книжка в серии «Жизнь замечательных людей». Оказалось, правда, что последние опыты Михайлова и учеников, прерванные смертью старшего и арестом почти всех младших, были обречены с самого начала, никакой сверхустойчивой пшеницы у них бы не получилось, о чем их всех предупреждал другой молодой профессор, ученик Вавилова, арестованный за год до «михайловского дела». Перед расстрелом он оговорил всех своих родственников в надежде, что эти абсурдные показания докажут абсурдность и его собственного ареста. Так рассуждали многие, но никого это не спасло, и молодой ученик Вавилова был расстрелян за попытку затормозить прогресс. Затормозить прогресс нельзя, поэтому все когда-нибудь окажутся не правы. Просто одни сначала мучаются и смеются в ответ на все вопросы, другие оговаривают себя и всех родственников, а третьи успевают умереть.</p><p class="p1">У самой Кати не было сомнений в том, что отец погиб, но история эта продолжала ее томить, и в восемьдесят пятом году она рассказала ее сыну. Так Рогов узнал о посмертном звонке своего деда. А в восемнадцать лет он услышал другую историю. У его одноклассника, к которому он часто заходил в гости и где иногда оставался обедать, была бабушка Ира, толстая, но статная старуха, в свои немалые уже годы казавшаяся Рогову чем-то бодрее его матери. Бабушка Ира привечала его и за что-то жалела. Он напоминал первую ее любовь — мальчика с редким именем Иммануил, Има. Этот Има учился с ней в одном классе в тридцатые годы, когда не было еще раздельного обучения. Он был сыном высокопоставленных, таинственных родителей, о которых в классе почти ничего не знали, но трепетали, когда полный, густобровый отец Имы, казавшийся очень старым (Има был поздним ребенком), заходил в школу. Директор лично выбегал встретить его и не мог нахвалиться на сына, в самом деле круглого отличника. Фамилия Имы была Заславский.</p><p class="p1">В него были влюблены все девочки класса: высокий полноватый еврей с ярко-синими глазами, он был со всеми дружелюбен, охотно давал почитать книги из огромной отцовской библиотеки, помогал с уроками, но никого особенно не приближал. Дружил он только с Марком, который и стал впоследствии дедом роговского одноклассника. Вместе они ставили какие-то химические опыты у Имы дома, в огромной квартире на Ордынке.</p><p class="p1">Лето он обычно, по слабости здоровья, проводил на юге, куда ездил со старшей сестрой, в противоположность ему очень некрасивой и сердитой девушкой, иногда приходившей на родительские собрания, когда мать и отец бывали заняты. Родителей из города даже на лето не отпускали дела. Тогда все очень много работали.</p><p class="p1">Однажды — класса после седьмого — Има пообещал бабушке, а тогда девочке Ире, что по дороге на юг, когда поедет мимо Царицына, выбросит ей письмо. В Царицыне девочка Ира жила на даче, которую ее мать снимала за невеликие деньги. Поезд проходил мимо их станции поздней ночью, потому что из Москвы отправлялся в одиннадцать. Место было таинственное, с легендами, с темным силуэтом недостроенного дворца, который царица отвергла из-за того, что он ей напомнил гроб — кстати, совершенно безосновательно. Дачные дети у костра рассказывали о привидениях. В одиночку Ире было страшно идти на станцию, и она взяла с собой подругу. Без четверти двенадцать мимо Царицына прошумел скорый поезд, и из желтого, уютно освещенного окна вылетел камень, обернутый в бумажку. Стекло тут же поднялось: Име были опасны сквозняки. Девочки долго искали камень в колючих кустах, царапая руки и коленки, но наконец нашли и прочитали письмо. Бабушка Ира помнила из него только одну строчку, которая потрясла ее до глубины души: «Поезд мчится в даль, а я — в неизвестность!»</p><p class="p1">— Ну и что такого? — подзуживал ее внук. — Подумаешь! На улице идет дождь, а у нас идет концерт!</p><p class="p1">— Заткнись, дурак, — беззлобно отвечала бабушка. — Ничего ты не понимаешь. Слушай дальше.</p><p class="p1">Насчет неизвестности, в которую мчался поезд, все оказалось правдой. В десятом классе Има исчез, потому что исчезли его родители. Говорили, что отца и мать взяли в одну ночь (они и работали вместе), а самого Иму отвезла к себе на Украину бабушка. Это потом не подтвердилось. Учитель математики, единственный в школе мужчина, кроме преподавателя военного дела, сказал, что Има — любимый его ученик, кстати, — прислал ему письмо и что он вместе с бабушкой в ссылке. Письма, впрочем, не показал и вообще больше на эту тему не распространялся. Рассказал он про письмо только Ире, да и то в походе. Походы были его страстью.</p><p class="p1">А летом сорок восьмого года Ира прибирала в двухкомнатной квартире мужа неподалеку от станции метро «Парк культуры» (там они жили с Марком, чьи родители почти одновременно умерли вскоре после войны), и тут в дверь позвонили. Она открыла. На пороге стоял Има.</p><p class="p1">Она узнала его сразу — по огромным синим глазам и густым бровям, — хотя больше в нем не осталось ничего прежнего. Даже волосы его, прекрасные черные волосы, пропали, — на голове кустами топорщилась серая короткая поросль. Выпирал огромный костистый нос. Парусиновый пиджак болтался на Име, как на пугале. У ног его стоял неуклюжий фанерный чемодан, похожий на самодельный.</p><p class="p1">— Имка! — ахнула бабушка. — Заславский! Где же ты был?</p><p class="p1">— Эх, Ира. — Он отвел глаза. — Легче сказать, где я не был. А Марик дома? Я хотел ему кое-что передать.</p><p class="p1">— Марик в командировке, в Алма-Ате. Он будет через три дня. Да заходи же ты, ради Бога! Он там гостиницу строит. Слушай, вот он обрадуется! Заходи, поживешь у нас, пока его нет.</p><p class="p1">— Ира, я зайду вечером. Мне сейчас бежать надо. — Има подхватил чемодан и повернулся уходить.</p><p class="p1">— Да постой ты! Хочешь, оставь мне, что нужно, — он вернется, и я все передам!</p><p class="p1">— Нет, нет, Ирочка, — ответил Има полуобернувшись. — Это я могу только лично. Я зайду через три дня. — И он пошел к лифту.</p><p class="p1">— Има! — окликнула Ира. — А помнишь, как ты мне письмо писал? «Поезд мчится в даль, а я — в неизвестность».</p><p class="p1">— Помню. — Има даже остановился от неожиданности. — Помню! Слушай, столько всего забыл, а это — нет.</p><p class="p1">— Да ты останься хоть пообедать, что мы на лестничной клетке разговариваем!</p><p class="p1">— Я зайду, Ирушка. Обязательно зайду. — И лифт поглотил его.</p><p class="p1">Но он, конечно, никогда не зашел. Марик, когда узнал об этом визите, очень расстроился и даже ходил к Име домой, но там давно жили другие люди.</p><p class="p1">А в восемьдесят девятом году Рогов прочел в «Вечерней Москве» воспоминания о Бабеле, написанные сыном журналиста-правдинца Козаева, благополучно пережившего и репрессии, и войну. Больше всего в этих воспоминаниях его поразила история, приключившаяся летом того же сорок восьмого — спустя восемь лет после официальной даты бабелевской смерти. Тогда пятнадцатилетний сын журналиста сидел дома один — отец, как всегда, был в разъездах, мать зашла к соседке за мукой и заболталась. Раздался телефонный звонок, и мальчик узнал голос Бабеля.</p><p class="p1">— Это ты, Леша? — Даже по телефону слышно было, как Бабель улыбается. — Ты больше не хочешь стать бибизяной? — И сын журналиста узнал его короткий смешок.</p><p class="p1">Этого не мог знать никто, кроме ближайших друзей семьи. Леша в пять лет действительно мечтал стать «бибизяной», потому что она может не ходить в сад и на работу, а только скакать в джунглях и есть за бананом банан.</p><p class="p1">— Это вы, Исаак Эммануилович? — спросил Леша, который никогда не верил, что такой хороший человек может пропасть насовсем.</p><p class="p1">— Я, я. Узнал, хитрец. Скажи, пожалуйста, папа дома?</p><p class="p1">— Он уехал, Исаак Эммануилович! В командировку. Хотите, подойдет мама? Она у соседей, я сейчас позову…</p><p class="p1">— Да не надо. Я думаю, у нас будет еще время встретиться. Передай им… а впрочем, я сам передам. Вечером зайду и передам.</p><p class="p1">Но он не зашел, хотя о звонках его в это же время вспоминали еще три человека. Всем он хотел что-то передать, но всякий раз откладывал визит. Он был спокоен, сдержан и, казалось, куда-то торопился.</p><p class="p1">Таких историй Рогов за пятнадцать лет скопил множество. Совершенно достоверны из них были, правда, только пятнадцать — остальные напоминали апокрифы, и получил он их из третьих рук. Но те, которые он слышал от участников и не подвергал сомнению, были почти одинаковы, сходясь в большинстве деталей. Лишь два случая несколько разнились от прочих: один он услышал от дальнего родственника с отцовской стороны, когда отец возил его к себе на родину в Ленинград, а второй — от попутчика в поезде. Эти истории стекались к нему по какому-то странному закону, а может, люди просто чувствовали его интерес. В обоих случаях никакого телефонного звонка не было и никто ничего не передавал, тогда как в семи из тринадцати прочих историй фигурировало обещание передать что-то, на словах или в виде свертка, но непременно лично. Оба возвращенца появлялись въяве — одного видели в трамвае в начале сорок девятого (он исчез в августе сорок первого года, взятый при начале блокады за пораженческие слухи), а второй померещился случайному роговскому попутчику уже в пятидесятом, в телефонной будке. Он звонил кому-то, не забывая спокойно, но внимательно оглядываться по сторонам. Заметил он и давнего фронтового знакомца. Этот самый знакомец сорок лет спустя ехал на встречу с однополчанами по тридцать пятой дивизии, собиравшимися в Калаче-на-Дону. Дело было осенью девяностого года, и третьекурсник Рогов, младший сержант запаса, не дослуживший год по милосердию Минобороны (всех призванных студентов отпустили домой), ехал в Ростов на конференцию истфака местного университета. В вагоне-ресторане они и разговорились.</p><p class="p1">— Его арестовали за какие-то письма, — рассказывал старик. — Он был отличный офицер, хотя человек высокомерный и со странностями, как многие москвичи. Но я уважал его за храбрость, и мы часто разговаривали. Он знал много стихов, некоторые я попросил списать, чтобы послать жене. Что-то Блока, кажется… Постойте, я, кажется, даже наизусть помню. «Дуют четыре ветра, волнуются семь морей, все неизменно в мире, кроме души моей…»</p><p class="p1">— Это не Блок, — покачал головой Рогов.</p><p class="p1">— Да? Ну, может быть, он сам писал… Я ведь военный, не специалист. — Старик задумался. — Да, может, и сам. Его вызвали в особый отдел, и больше он не вернулся. Я знал, что у него арестованы родители, какие-то московские шишки, и он надеялся выслужить им прощение. На фронте рассказывали про такие случаи. В нем было что-то такое, знаете… какой-то слом, предназначение, если хотите. Я за войну и потом, когда остался в армии, такие вещи научился различать лучше любой гадалки. Но все-таки мне обидно было, что он гибнет ни за что, и жалко было родителей — он немного про них рассказывал. Он писал отцу в лагерь и матери в ссылку, мать отвечала, а от отца давно ничего не было. В начале войны многих заключенных утопили на баржах, — вы, наверное, знаете.</p><p class="p1">Рогов кивнул.</p></span>
