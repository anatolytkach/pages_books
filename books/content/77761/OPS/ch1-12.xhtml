<span><p class="p1">В избе пахло сырым деревом и горячим свечным воском, пол был устлан хвоей. Весь дом состоял из крошечных сеней и огромного, просторного, ярко освещенного помещения с забитыми окнами: помимо ставней, изнутри все три окна были забраны щитами, сколоченными из грубых серых досок. Горело множество свечей: и привычных, церковных, гладко-коричневых, и самодельных — витых, перекрученных, неровных, а то и вовсе состоявших из плошки с расплавленным воском и длинного, угрем плавающего в ней фитиля. У дальней стены на таких же грубых и серых козлах стоял свежеструганый, белый, любовно и заботливо сделанный гроб — кощунственно-затейливая лиственно-ягодная резьба покрывала его, и вообще в этой сырой и просторной избе он выглядел самым светлым и праздничным предметом. В гробу, укрытый по самую бороду линялым ватным одеялом, лежал седой мужик лет сорока пяти — возраст его Рогов мог определить единственно по крепкому и почти дородному сложению: мужик был, судя по всему, гол; по бугристым безволосым плечам и груди не без живописности были разложены длинные, черные с сединой космы и почти сплошь седая борода. На плечах виднелись следы побоев — как показалось Рогову, от бича, недавние, едва запекшиеся. Свежий труп, свежие раны, свежий гроб — Рогов сам подивился тому, что именно это определение просится и к мужику, и к антуражу; одно только линялое одеяло снижало праздничность картины. Новоказненный Гавриил имел выражение надутое и тупое. Рогов редко видел покойников, но в лице каждого замечал тайну — или покой, или невыразимое презрительное равнодушие, вот уж подлинно несовместимое с жизнью, как писали в медицинских заключениях о травмах и ранах. Если новоказненному Гавриилу что-то и открылось в последние его микросекунды, зрелище это преисполнило его такой важности, такого запоздалого достоинства, словно он всю жизнь догадывался именно о том, что увидел, и подтверждение собственной прозорливости даже на смертном одре было ему важнее, чем эта новая реальность. Впрочем, возможно, он просто никогда не считал себя достойным рая, а увидев рай, первым делом напыжился от гордости. Каким именно способом казнили этого могучего бородача, Рогов не понял: странгуляционной полосы не было видно из-за волос и бороды, да и вряд ли перед повешением кто-либо стал бы полосовать приговоренного кнутом, — а никаких увечий, кроме шрамов на плечах, издали видно не было.</p><p class="p1">В светлом помещении Рогов вдруг и сразу перестал бояться, он и вообще не боялся покойников, скорее жалея их — отыгравших свое, оставленных той силой, которая одушевляла мир и вот отвернулась от них. Они сделали что-то такое, что от них требовалось, и внимание невидимых хозяев переключилось на других, — какой смысл интересоваться законченными вещами? В загробную жизнь Рогов тоже не верил ни секунды: она полностью обессмысливала земную. Реализоваться следовало на отведенном пятачке.</p><p class="p1">Вышло так, что, подталкиваемый Андроном, он оказался на самой середине избы и здесь остановился, не решаясь подойти ближе. Чуть поодаль, сунув озябшие руки под мышки, стоял Константин: при ярком свете было видно, что ему никак не меньше семидесяти пяти, а может, и хорошо за восемьдесят. При этом белые волосы его были густы и аккуратно расчесаны на прямой пробор. Прочих Рогов видел смутно, да и мудрено было разглядеть их — почти все мужчины заросли бородами, немногочисленные женщины стояли в платках, повязанных низко, над самыми глазами. Все были в ватниках и кирзовых сапогах — впрочем, чистых: видимо, по торжественному случаю.</p><p class="p1">— Погляди, погляди, — прогудел Андрон, подталкивая Рогова в спину. — Так же вот лежать будешь.</p><p class="p1">— Почему? — обернулся Рогов.</p><p class="p1">— Все так лежать будем, — вздохнул Андрон.</p><p class="p1">Рогов пожал плечами и ничего не ответил. Старик подождал, пока все зайдут в избу и встанут вдоль стен: набилось человек семьдесят.</p><p class="p1">— Все ли? — спросил он, почти не повысив голоса.</p><p class="p1">— Все, — ответил кто-то от двери.</p><p class="p1">— Ну, начнем, что ли, — произнес Константин все так же ровно, выступая на полшага вперед, к гробу, — и чем ближе он к нему подходил, тем с каждым шагом громче делался его ровный голос. — Гавриил, солагерник наш, — (при слове «солагерник» у Рогова вздрогнуло сердце — он тут же перестал сомневаться, что достиг наконец цели), — знал закон — и отступил от закона; отступил от закона — и соблюл закон; соблюл закон — и отлетел от закона.</p><p class="p1">В дальнейшей его речи, более всего похожей на паутину или, верней, на ус телескопической антенны, где каждая фраза общим звеном соединялась с предыдущей, Рогов немедленно запутался и перестал видеть хотя бы тень смысла. Он поразился только тому, как может старик помнить весь этот двадцатиминутный бубнеж, в котором все вертелось вокруг закона: отступил от закона, исполнил закон, исказил закон; иногда глаголы повторялись, но с неправильной периодичностью, которая окончательно лишала рационального зерна эту странную молитву. Рогов попробовал считать, глядя в пол: вот «преступил» прозвучало через три слова, вот «исказил» промелькнуло через пять, вот появилось вовсе уже странное «распустил закон», «испустил закон», — но Константин строил свою речь строго, явно по заранее заготовленному чертежу, и через пятнадцать минут этого словоплетения Рогову стало уже казаться, что, если тот ошибется, недоплетет, пропустит глагол, рухнет и изба, и гроб, и лес. И напротив, правильное, в строгом соответствии с законом повторение слов про закон могло каким-то образом если не оживить голого Гавриила, то препроводить его в мир иной максимально гладким образом. Бог не упоминался ни разу, и ни разу Константин не повернулся лицом к собравшимся, — он так и стоял у гроба, опустив голову и внятно произнося слова. Закончил он так же внезапно, как начал: «Раздражил закон — и умилостивил закон, умилостивил закон — и принял закон, принял закон — и вместил закон», — и на этих словах внезапно развернулся, встав лицом к толпе. Рогова поразили его застывшие расширенные глаза.</p><p class="p1">Но не успел Константин повернуться, как сзади, от дверей, взлетел звонкий до пронзительности женский голос — Рогов машинально поднес руки к ушам; оборачиваться было бесполезно — сзади монолитно, тесно стояла темная сырая масса, и он все равно никого не разглядел бы в ней. Голосившей было лет сорок, судя по визгливости и надсаде, а может, и меньше — кто знал, быстро ли тут старели.</p><div class="poem">
<div class="stanza">
<p class="v">Везут бревно семь коней,</p>
<p class="v">Семь не увезут — восьмого припрягут,</p>
<p class="v">Восьмого припрягут — второго не уймут,</p>
<p class="v">Второго не уймут — налево не пойдут,</p>
<p class="v">Налево не пойдут — чужого не возьмут,</p>
<p class="v">Чужого не возьмут — другого не поймут,</p>
<p class="v">Другого не поймут — дороги не примнут,</p>
<p class="v">Дороги не примнут — подковы не погнут,</p>
<p class="v">Подковы не погнут — шелкову не порвут…</p>
</div>
</div><p class="p1">Дальше смысл опять потерялся, и Рогову показалось, что повторы эти нужны только для того, чтобы, повторяя очередное звено, плакальщица успела придумать следующее. Ни пресловутого закона, ни логики во всем этом странном плаче, размеренном, как свист военной флейты, уловить было нельзя — соблюдалась лишь рифма, а потом исчезли и слова, превратившись в кашу слогов, созвучий, организованных только внешне: «Корова баламут — подова роговут, подова роговут — заслова калабут, заслова калабут — угова забарут…» Здесь вступили два мужских голоса, частящих и причитающих на одной ноте: «Шел кузнец — нес песец, нес песец — плел борец, плел борец — пал боец, пал боец — стал отец…» Рогов перестал вдумываться и только ждал, когда это кончится. Но до конца было далеко — вступали все новые голоса и вносили новые ритмы: слово было не более чем материалом, строительным кирпичом. Рогову подумалось про радения, но на радениях бичевали друг друга, бились и падали, — здесь же стояли неподвижно, истово выкрикивая непостижимую ахинею, прерывая ее в четко определенный момент и словно передавая другим эстафету обряда. Сам обряд, видимо, заключался только в смене ритмов, то есть в чисто внешнем следовании какому-то давно утраченному канону; на канон указывали осмысленные, как будто ясные первые строчки каждого нового плача, Рогов даже знал фольклорные прообразы этих текстов — о бревне, о кузнеце, — но стоило плакальщикам начать, как от оригинала оставался только размер да фонетический рисунок, соблюдавшийся с бессмысленной строгостью.</p><p class="p1">— Вышиб дно и вышел вон, — снова заговорил от гроба Константин, — выпил дно и выжег вон, видел дно и выпил вон, вытер дно и вытек вон…</p><p class="p1">Он остановился (внезапность остановки, как догадался Рогов, входила в правила) и опустил глаза; это означало конец какого-то одного этапа церемонии и начало нового. Установилась неподвижная тишина. Константин снова посмотрел на толпу, перебегая взглядом по лицам. Рогов стоял чуть впереди прочих, сзади — неподвижный Андрон, словно запрещавший оглянуться.</p><p class="p1">— Гавриил стал преступником и перестал быть преступником, — спокойно сказал старик. — Все мы знаем, в чем его проступок, и все мы знаем, что до его проступка нам нет дела. Пусть в мире считают, что есть тяжкие проступки и легкие проступки: мы знаем, что всякий проступок есть проступок и за любой можно карать равно. Кто преступил в малом — преступит и в большом, кто преступил в большом — преступал и в малом. В мире не знают, но мы знаем. — (Рогов понял, что миром называлось все, кроме поселка.) — Казнь совершилась, порядок водворен. Гавриил ошибся в счете, недосчитался двух деревьев и казнен бичеванием. Если бы он украл или убил, он не смог бы преступить закона сильнее, чем сделал это. Но теперь он чист, и мы снова зовем его братом. Время. Кто ответственный?</p><p class="p1">— Павел, — хрипло сказал мужской голос.</p><p class="p1">— Поможешь Гавриилу убраться, — буднично распорядился старик. — У нас новый, нового поставите на довольствие и спать определите к Павлу в избу. Павел, объяснишь ему правила на первые дни. Расходимся.</p><p class="p1">При этих его словах голый Гавриил сел в гробу, откинул линялое одеяло и спустил неожиданно худые, покрытые язвами ноги. Из-за спины Рогова вышагнул рослый мужик и протянул ком одежды — Гавриил без тени стыдливости принялся натягивать черные трусы, старые брюки, розовую байковую рубаху. Все его тело было исполосовано старыми и свежими рубцами. Рогов смотрел на него оцепенев.</p><p class="p1">— Так он живой? — спросил он, обернувшись к Андрону и чувствуя в нем чуть ли не единственную свою опору в этом рехнувшемся мире.</p><p class="p1">— А ты думал, мертвый? — широко улыбнулся Андрон, показывая ровные, крепкие нижние зубы и полное отсутствие верхних. — Где ж народу напасешься. У нас до смерти не казнят.</p><p class="p1">Толпа шумела, расходясь; Гавриил, наскоро одевшись, уже схватил метлу и подметал пол, еще двое мужиков, странно потоптавшись у гроба, словно примериваясь, как бы половчей взяться, снимали его с козел. Лишь приглядевшись, совершенно обалдевший от всего увиденного, Рогов заметил, что у каждого из работников нет одной руки — у одного левой, у другого правой. Гроб они снимали, стоя друг к другу спинами. Вдруг, приплясывая и кривляясь, к ним подскочил малорослый мужичонка — скуластый, бледный, косоглазый; он все словно приседал, упершись руками в бока, и мелко частил:</p><p class="p1">— Гаврилушко, Гаврилушко, поделом, поделом! Мало тебе влупили, мало, мало! — Он вприсядку ходил вокруг Гавриила, картинно-широкими движениями подметавшего пол, путался под ногами и гримасничал: — Тебя били, а ты ветры пускал! Тебя били, а ты пердел! Уперднулся, Гаврилушко! В другой раз не так бить будут! Андронушко, запиши ему!</p><p class="p1">Рогов был уверен, что вот сейчас Гавриил врежет мужичонке, но тот все продолжал мести, стараясь не задеть дергающегося уродца.</p><p class="p1">— А где новый-то, новый-то! — закричал вдруг юродивый, останавливаясь и оглядываясь. Раскосый взгляд его наконец уперся в Рогова. — Справный малый, справный, справный! Надолго нам его хватит! — Он снова пошел вприсядку, теперь вокруг Рогова; от него кисло несло.</p><p class="p1">— Николка, отвяжись, — не оборачиваясь и не повышая голоса, сказал ему от двери Константин. — Он первый день, не вошел еще.</p><p class="p1">— А и не войдет, дедонька, по глазам вижу — не войдет, не войдет! Где ж ему войти! — Николка хлопал себя по коленям и ляжкам, ходя вокруг Рогова, как цыган вокруг лошади. — Быть ему на палках, быть на рогульках!</p><p class="p1">Рогов почувствовал к этому приплясывающему уроду такую внезапную, редко когда в жизни испытанную ненависть, что замахнулся было, но Николка отпрыгнул с визгом:</p><p class="p1">— Дедонька, накажи его! Напиши ему! Николку трогать нельзя! Николку не трогают! Напиши ему! — и завыл так, что Рогов снова захотел заткнуть уши пальцами.</p><p class="p1">Константин, уже выходя и по-прежнему не оборачиваясь, бросил:</p><p class="p1">— Николку не трогают. Тебе Павел объяснит.</p><p class="p1">— Я объясню, — густым басом сказал рослый мужчина, отделяясь от стены; он, очевидно, ждал этого момента. В голосе его была радостная готовность, особенно испугавшая Рогова: так, верно, один людоед делится с другим сведениями о своем аппетите, стараясь при этом, чтобы будущее жаркое получше слышало этот нежный, воркующий разговор. — Все ему сейчас объясню. Пошли со мной, новый! Да, слышь, помни: когда зовут, отвечай по имени: «Слышу, Павел!» Закон такой. Понял, нет?</p><p class="p1">— Понял, Павел, — послушно ответил Рогов, уже сообразив, что за первые три дня он должен любой ценой найти лазейку для бегства.</p><p class="p1">Вглядываться в лицо Павла он боялся, но когда наконец заставил себя поднять глаза — отшатнулся: человека с вырванными ноздрями он видел впервые. О подобных вещах ему случалось только читать. Павлу было на вид лет тридцать, и ясно, что изуродовали его никак не в застенках Верховного, — стало быть, пытки в Чистом продолжались; да, в сущности, чем и могли заполнять свой досуг люди, чья жизнь была подчинена непрерывной закалке и проверке? Только теперь Рогов понял, что те, кого он искал, обречены были проводить свою жизнь в беспрерывном взаимном мучительстве, испытывая друг друга на прочность и знание закона: все остальное не имело смысла, да они и не умели уже ничего другого.</p><p class="p1">— Пойдем. — Павел ласково взял Рогова за плечо и повернул к выходу. В дверь просачивались остатки толпы — кто с костылем, кто с палкой, кто натягивая шапку, кто простоволосый, с непременными длинными и грязными патлами.</p><p class="p1">— Нет закона трогать новых, — прогудел Андрон. — Руки прими от него. Пишу тебе.</p><p class="p1">— Ах нет, нет, нет, Андрон! — застонал Павел, вихляясь и хватаясь за голову; Рогов сразу понял, что он придуривается, но не разобрал зачем. — Ах, Андрон, не пиши мне! Не буду, Андрон!</p><p class="p1">— Нет закона, чтобы меня упрашивать. Пишу тебе на завтра палки, — сказал Андрон. С тетрадью он не расставался: свернутая в трубку, она крепилась у него в специальной петле под мышкой, к ней была пришпилена обгрызенная шариковая ручка образца еще семидесятых, казалось, годов. — Ступай, не показывайся.</p><p class="p1">— Пошли, пошли, — протянул Павел, держа на всякий случай руки в карманах.</p><p class="p1">Рогов вышел на холодный воздух. Он боялся, что, как только они с Павлом останутся без Андронова присмотра, тот окончательно распояшется и набросится на него с приставаниями ли, с кулаками ли, — и потому, сам себя ненавидя за трусость, он несколько раз оглянулся в надежде, что Андрон идет за ними. Как ни ужасен тот был, для него все-таки существовал закон. Павел, однако, вел себя смирно; он подталкивал Рогова к дальней избе, а Андрон уже спешил в другую сторону — нагонять Константина.</p><p class="p1">Теперь Рогову ничего не оставалось, как идти с Павлом к длинному бараку, к которому уже тянулись еле различимые впереди группки по три-четыре человека; шли в молчании, только вспыхивали огоньки папирос. Павел ничем себя не обозначал. Рогов ожидал инструктажа, но, видимо, некоторая пауза для нагнетания страстей входила в условия игры: жертва должна была дозреть в страхе и неопределенности. Скоро пришли: как и в главной избе, служившей, видимо, для скорбных и праздничных сборов (если здесь вообще бывали другие праздники, кроме того, которому Рогов только что был свидетелем), ставни были наглухо закрыты. Сквозь щели не пробивалось никакого света.</p><p class="p1">Рогову надоело молчать и ждать. Он уже понял, что в ближайшее время нарушит закон не раз и не два, а потому надо пользоваться трехдневной безнаказанностью и задавать как можно больше вопросов.</p><p class="p1">— Где я спать-то буду?</p><p class="p1">— Сейчас покажу, — неожиданно спокойно и почти дружелюбно ответил Павел. — Тока у нас нет, сам видишь, а свечей мы зазря не палим. Заходи.</p><p class="p1">Рогов вошел в помещение, где возились и укладывались обитатели барака, общим числом, как мог он оценить приблизительно, до двадцати. В нос ему ударил запах немытого тела и сырой одежды: сукна, шерсти, — так пахло в ротной сушилке после кросса под дождем. Павел посветил зажигалкой.</p><p class="p1">— Вот тут будешь спать. — Он указал место в углу. — Со мной рядом покуда. Куда тебя после карантина определят — пусть решает Константин, три дня буду тебе показывать, что к чему, и если въедешь в закон — авось жив будешь.</p><p class="p1">В этих словах Рогову померещилось утешение. Он подумал даже, что Павел втайне не желает ему зла и, глядишь, поможет в случае чего бежать, — но слишком раскрываться перед ним Рогов не спешил. Все тут было обманчиво, и за дружелюбием могла скрываться новая ловушка; да и бежать было рано. Так и не понятно было, нашел ли он, что искал.</p><p class="p1">В середине барака, на полу которого все и разлеглись, подложив одежду, тюфяки или спальники, стояла большая железная печь, и около нее бодрствовал дежурный. Время от времени он подкладывал дрова, потом снова и снова брел по проходу между двумя рядами лежавших, от стены до двери. В казарме такой проход назывался «взлетной полосой».</p><p class="p1">— Сейчас спи, с утра поведу показывать, как живем. Ложись, нба вот тебе укрыться. — Он безошибочно, в полной тьме, взял откуда-то с невидимой полки суконное солдатское одеяло и пихнул его Рогову в руки. Вокруг них молча укладывались, откуда-то уже доносился храп.</p><p class="p1">— А если на двор ночью?</p><p class="p1">— Подойдешь к дежурному, попросишься на двор. Там он тебе покажет, за домом. Смотри драпануть не вздумай: сегодня такой патруль ходит — ни одного ребра не оставят, в мешок превратят.</p><p class="p1">— Да я и не собираюсь…</p><p class="p1">— Мне дела нет, что ты собираешься, не собираешься… Язык не распускай.</p><p class="p1">Больше всего Рогова поражала внезапность этих переходов: от симпатии Павел стремглав переходил к ярости, как вот сейчас, и Рогову стало уже казаться, что это тоже входит в правила игры, как в правила дзэна входит внезапный удар палкой.</p><p class="p1">Он безропотно лег на деревянный пол. Глаза, как водится, постепенно привыкали к темноте, но смотреть было не на что, кроме дежурного, расхаживавшего взад-вперед по «взлетной полосе»; время от времени тот подходил к одному из спящих и светил ему в лицо карманным фонариком, иногда толкал ногой слишком расхрапевшегося; кто-то вышел на двор и вернулся. Павел лежал рядом, дыша почти бесшумно: спал или караулил? Рогов заснул нескоро, и сон его был душен, тяжел.</p><p class="p1">Проснулся он как от толчка: в помещении было по-прежнему темно, но в полуоткрытую дверь проникал серый пасмурный свет. Утро против его ожиданий начиналось не с общего подъема и построения, а с покряхтываний, ругательств и стонов: каждый вставал сам по себе, иные еще лежали, натянув на голову одеяла или закрывая лица шапками, оберегая остатки сна. Дисциплина вообще была нестрогой, и это более всего поражало Рогова в первый день: закон с его бесчисленными иезуитскими тонкостями, которыми обставлялся каждый шаг, не предполагал ни идеальной чистоты в бараках, ни единообразной одежды. Если целью поставлено максимальное мучительство себя и других, мелочи вроде чистоты или распорядка дня никого занимать не могут, но это Рогов понял только к вечеру. К вечеру он вообще многое понял.</p><p class="p1">Теперь, при свете дня, он мог наконец рассмотреть весь лагерь. Вырубленная и вытоптанная площадка среди леса была много больше, чем показалось ему ночью, — большое, ровное пространство, на котором нетесно стояли десять деревянных строений. Самым маленьким из них была Константинова изба, срубленная из толстого бруса, самым большим — барак, в котором давеча отпевали недоказненного Гавриила. На дальнем краю площадки, за бараками, Рогов разглядел высокий деревянный помост, предназначенный, как показалось ему сначала, для публичных выступлений. Ели в деревянной столовой стоя, начерпывая кашу с тушенкой из больших бачков, похожих на армейские, — и, как в армии, перекуривали после каждой еды. Завтракали сразу после подъема: Рогов увидел группки обитателей поселка, тянувшиеся к столовой от трех других бараков. Общее число лесных жителей он оценил только вечером — многие, как выяснилось, не ходили есть; всего в бараках жило человек восемьдесят. На вчерашнюю церемонию не явился патруль да несколько больных.</p><p class="p1">Перловки с тушенкой каждый накладывал себе вдоволь (Рогова особенно заинтересовал вопрос, где взяли консервы, — но, видимо, местные жители частенько захаживали в Чистое, доезжали и до самого Омска, только выпускали туда не всех, а уже проверенных). Хлеба было мало — своего, видимо, не пекли, да и где в тайге будешь сеять-веять-молотить; этими словами Рогов, не сильный в сельском хозяйстве, определял для себя все земледельческие работы. Для желающих на отдельном столе стояло несколько мисок с овощами — грубо накрошенные горькие огурцы и бледные помидоры, посыпанные крупной крупитчатой солью. Все это, видимо, росло на огородах, темно-зеленой полосой видневшихся за помостом. После завтрака, завершившегося желтым чаем без сахара, Павел повел Рогова как раз туда.</p><p class="p1">— Сбор каждый вечер там, — показал он на квадратный, ограниченный колышками плац перед помостом. — Там и казним.</p><p class="p1">— Что, каждый вечер?</p><p class="p1">— Не, казним по праздникам. Вчера праздник был — новолуние. Каждый вечер казнить никакого интересу. В будни так — по мелочи. Когда палки-рогульки, когда порка, когда дыба. — Он хохотнул. — Да ты не бойся, у тебя еще два дня.</p><p class="p1">— Павел, а с законом где-то можно… ознакомиться хотя бы?</p><p class="p1">— Ежели ты за три дня поймешь закон, так тебе не надо с ним знакомиться. А ежели не поймешь, то тебе и никакое знакомство не поможет. Ты пойми, садовая голова, закон не писан, закон вот тут должен быть. — Он ткнул себя пальцем в покатый лоб. — Сам откуда?</p><p class="p1">— Из Москвы.</p><p class="p1">— Эк тебя занесло! Что ж ты сюда-то собрался?</p><p class="p1">— Посмотреть, — осторожно ответил Рогов.</p><p class="p1">— Рассказал кто? Вроде некому, у нас московских не было… Кроме Константина, конечно, но он уж лет сорок в Москве не был.</p><p class="p1">— Геолог один говорил.</p><p class="p1">— Откуда ж тут геолог? Разве, может, слух до них дошел… Не, у нас с самой Москвы еще не было. Были всякие, из Новосибирска были, с Алтая были, с Кулунды…</p><p class="p1">— А сам ты откуда? — Рогов вполне был готов к окрику: «Язык не распускай!» — или: «Сегодня мы спрашиваем!», но услышал вполне дружелюбное:</p><p class="p1">— С Казахстана я. Там жить не стало возможности, казахи все отняли, с работы погнали… Ну, я и поехал в Омск к брату, а тут про Константина услышал. Про него всякое говорят, но вообще уважают… Ну и поехал.</p><p class="p1">— И как?</p><p class="p1">— А как? Живем… — неопределенно ответил Павел.</p><p class="p1">Они дошли до помоста, на котором Рогов вблизи разглядел огромную колоду — именно такова в его представлении была плаха. Рядом возвышался невысокий, крепко вбитый в землю глаголь, правда без петли. Тут же была будка, похожая на дачный сортир и явно рассчитанная на одного.</p><p class="p1">— Ну, главное все вечером увидишь, — небрежно пояснял Павел, — а тут огороды. Земля славная, родит хорошо… Садоводов не трогают, их трогать нельзя. Садоводов всего пять. Их казнить можно, а наказания им не пишут: на них же земля, работа, кроме них некому…</p><p class="p1">Отвоеванная у леса почва и впрямь была плодородна: Рогов с изумлением увидел арбузные плети, а на них — небольшие, но вполне кондиционные с виду арбузы. Густо росла петрушка, высоко возносились желтые созвездия укропных соцветий, перла из земли огромная морковь, небольшими тугими вилками белела сквозь темную зелень внешних листов капуста.</p><p class="p1">— Где ж воду берете? — спросил Рогов. Он не заметил вокруг ни пруда, ни водокачки.</p><p class="p1">— А река недалеко, ты не видал, что ль? Как же ты шел?</p><p class="p1">— Я не сам шел, — усмехнулся Рогов. — Вели меня, глаза завязали…</p><p class="p1">— Вон там река, метров двести. За лесом. Константин около нее и велел строиться.</p><p class="p1">Рогов слышал о таких таежных реках, похожих скорее на ручьи, но сам ни разу их не видел. Больше всего он жалел сейчас о том, что не вышел к реке в своих вчерашних скитаниях: русло вывело бы его, он знал — идя вдоль реки, не заблудишься. Главное теперь было — попасть к реке, но туда в одиночку, ясное дело, нового человека не пустили бы, да и патруль… Он не понимал одного: если на каждое новолуние кого-то забивают до полусмерти, а каждый вечер мучают по сокращенной программе — почему не сбегают остальные? Или тут охраняют каждого? Хотя откуда взять столько охраны? Впрочем, он начинал уже догадываться о целях этого странного поселения, но пока представлял их смутно, боясь верить собственной догадке. Больше всего ему хотелось спросить, как они со своими жалкими печками и щелястыми бараками выживают жестокой, континентальной омской зимой, — но это-то мучительное выживание как раз не противоречило его догадке.</p><p class="p1">— А давно ты тут? — спросил он Павла.</p><p class="p1">— Третий год езжу, — непонятно ответил тот.</p><p class="p1">Сами бараки явно были выстроены не в тридцатых, — уж как-нибудь Рогов отличил бы тогдашнюю постройку от сравнительно недавней. Вообще от тех времен в поселке, где преобладали люди в возрасте от тридцати до пятидесяти, остался, по-видимому, один Константин. Впрочем, надежда сохранялась — Рогов видел пока далеко не всех.</p><p class="p1">— Пойдем детский лагерь покажу. — Павел подтолкнул его в сторону небольших домиков у самого края леса.</p><p class="p1">Рядом с домиками шатким плетнем была выгорожена большая, примерно двадцать на двадцать метров, площадка. Когда они подошли к ней — от помоста до лагеря было шагов пятьсот, — Рогов разглядел через забор, что дети в ватниках и дешевых старых куртках занимаются чем-то похожим на зарядку. Никаких детей на вчерашнем отпевании не было, но, с другой стороны, брать их на подобные мероприятия, к тому же поздние, действительно не было резону.</p><p class="p1">Зарядка происходила в молчании, и мужчина лет сорока, в старом спортивном костюме, без видимых увечий, показывал упражнения. Впрочем, показывал он одно, а дети делали совершенно другое, каждый свое. Роднила все эти упражнения только их абсолютная бессмысленность: тренер стоял на одной ноге, поджав другую, сводя и разводя в стороны руки, согнутые в локтях. Его тощая фигура напоминала цаплю, бьющую крыльями, только очень ритмично и невозмутимо. Детей было пятнадцать, Рогов сразу подсчитал их, — все разного возраста, от восьми до пятнадцати примерно лет, и каждый выполнял свое, некрасивое, монотонное и бессмысленное движение. Иной кружился волчком, иной, отставив одну руку в сторону и опустив вдоль тела другую, переступал на месте вправо-влево, иной отжимался, подчас просто падая на землю и некоторое время так лежа (ведь холодно, ужаснулся Рогов), или хлопал себя по ляжкам, по плечам, по ушам — и вновь, в другом порядке, повторял резкие хлопки.</p><p class="p1">— Надолго они так?</p><p class="p1">— До обеда, — пожал плечами Павел.</p><p class="p1">Тут тренер резко подпрыгнул, приземлился на обе ноги, развернулся на сто восемьдесят градусов и, стоя задом к детям, непристойно нагнулся, коснувшись земли пальцами тощих рук. Теперь Рогов видел, что у него нет уха. Никто из детей даже не смотрел на тренера, движения каждый менял, как и когда хотел, и на Рогова с Павлом оглянулись всего два или три человека. Остальные казались целиком поглощенными бессмысленной гимнастикой.</p><p class="p1">— А что толку-то им так дергаться?</p><p class="p1">— Освобождаются. Пока голову не очистишь, закон не поймешь.</p><p class="p1">— Может, и мне попробовать? — расхрабрившись и уже позволяя себе некий вызов, спросил Рогов.</p><p class="p1">Вместо ответа Павел вдруг резко ударил его в глаз. Первым побуждением Рогова было немедленно дать сдачи, но Павел был явно здоровее, да и понимал, что пленнику рисковать не след. Был, правда, риск, что теперь Павел подумает, будто с ним все можно, — но сразу ставить себя, как называлось это во всех замкнутых коллективах, он не решился.</p><p class="p1">— Ты чего, в чем дело? — отпрыгивая и сам ненавидя себя за жалко-суетливую интонацию, выкрикнул он.</p><p class="p1">— Вот твоя гимнастика, — неожиданно спокойно ответил Павел. — Пойдем пасеку покажу.</p><p class="p1">Пока они снова шли на другой конец поселка, к пасеке, в голове Рогова промелькнула тысяча способов отомстить и бежать, но все они были покуда малоисполнимы. У него отобрали нож, да он и не слишком представлял себе, как бы стал им орудовать; завалить Павла ударом кулака было нереально, оглушить сзади невозможно — тот все время шел позади и словоохотливо, уже без всяких роговских расспросов, объяснял назначение лагеря.</p><p class="p1">— У нас, вишь ты, с детьми многие, ну нельзя ж их в общие бараки, вот и живут в лагере. Опять же много беспризорщины в городе, — которые знают, те и свозят их сюда. Они у нас живо в закон въезжают.</p><p class="p1">В этом Рогов не сомневался, но вслух ничего не сказал. Он иногда щупал глаз, под которым набряк фингал. Павел ударил его далеко не со всей мочи, но и этого хватило. Можно, конечно, было сказать ему, что новых не трогают, — но это, видимо, и не называлось «трогать». Это было именно что-то вроде инициации, после которой Павел сразу стал дружелюбнее, или гимнастического упражнения, только во взрослом варианте местной гимнастики.</p><p class="p1">Навстречу попались трое, тащивших тяжелое бревно. Среди них Рогов узнал Андрона.</p><p class="p1">— Павел, что шапки не ломаешь? — спросил Андрон. — Пишу тебе!</p><p class="p1">Все трое синхронно остановились, сбросили бревно. Павел торопливо сдернул синий вельветовый берет, но Андрон уже доставал из-под мышки свою тетрадь. Он старательно вписал туда несколько слов (Рогов разглядел, что наверху страницы стояло красивое, красной ручкой выведенное «Павел Баташев», — видимо, на каждого была заведена своя страница) и снова спрятал тетрадь под мышку, после чего скомандовал:</p><p class="p1">— Взяли!</p><p class="p1">Зачем и куда они несли бревно, Рогов не понял: никакого строительства вокруг не наблюдалось. Пасека раскинулась вдоль опушки метров на двести: несколько больших ульев, между которыми расхаживал в брезентовой робе рослый бородач, отвечающий за все это хозяйство. Рогов почти не удивился, увидев, что все лицо его заплыло и опухло от множества пчелиных укусов, от которых тут, вероятно, не принято было предохраняться.</p><p class="p1">— Здоров, Михаил! — крикнул ему Павел еще издали. — Нового веду!</p><p class="p1">— Покрестить его, что ли? — бодро спросил Михаил, и у Рогова не возникло сомнений в характере предстоящего «крещения».</p><p class="p1">— Нет, он на карантине пока! Так, покажешь ему…</p><p class="p1">— Это можно, — гостеприимно проговорил искусанный Михаил; он вообще был мужик уверенный, и казалось, что эта-то уверенность, красная, ядовитая, его и распирает, так что с каждым укусом он словно все больше преисполнялся самовлюбленностью. Причина, должно быть, была еще и в том, что пасечник жил отдельно от всех, вне бараков, на отшибе, и в отличие от прочих имел право жить с женой: изба его, несколько кособокая, но крепкая, стояла тут же. Жены, правда, нигде не было видно, но по намекам, которыми он обменивался с Павлом, Рогов успел понять, что пасечник женат недавно и жену привез из города. Дело на пасеке было поставлено отлично: ничего не понимая в пчеловодстве, Рогов не мог не отметить основательности ульев и не оценить меда; три куска сот Михаил поднес ему на алюминиевой тарелке.</p><p class="p1">— Прямо как знал я, — сказал он радостно. — Баба мне говорит сегодня: дай медку! А я в ответ: нет, мать, погоди, быть гостю! Чую нового! Он когда же пришел?</p><p class="p1">— Вчера, — ласково отвечал Павел. Интонация его, когда он говорил о Рогове с другими обитателями поселка, становилась снова той же самой ласковой, воркующей, и какая-то тайная гордость за Рогова звучала в ней — так хозяйка хвалит сына-отличника или удавшийся пирог. — Его вчера привели, он и на отпевании был. Зря ты не пошел.</p><p class="p1">— Не положено, — вздохнул Михаил.</p><p class="p1">— Да ладно, — махнул рукой Павел. — Ты на сколько отпеваний отлучен?</p><p class="p1">— На четыре, — жалобно протянул Михаил, вмиг растеряв всю уверенность.</p><p class="p1">— И сколько еще?</p><p class="p1">— Еще одно…</p><p class="p1">— Да простил бы он тебя. В следующий раз сходи.</p><p class="p1">— А когда теперь?</p><p class="p1">— Эх, Михаил, — сказал Павел. — От людей отбился, ничего не знаешь. Сегодня вечером Петька представление покажет, стало быть, и конец ему.</p><p class="p1">— Петька-то? — Пасечник усмехнулся. — Это погляжу. Это стоит того.</p><p class="p1">До обеда Павел показал Рогову склады, сказав, что закон запрещает к ним приближаться всем, кроме женщин — дежурных по кухне; рассказал, как назначаются дежурные по поселку и патруль (каждому приходилось заступать по два раза в месяц), а напоследок повел к женскому бараку. Мужских было два, женский — один, и запах в нем стоял как будто более слабый, но и более отвратительный, чем в том, где спал в эту ночь Рогов. Он замечал иногда и в больницах, где ему случалось по разным поводам недолго лежать в молодости, что вонь женских палат — другая: более тонкая, но и более мерзкая. Подспудно Рогов знал и то, что увидит в женском бараке нечто куда более страшное, чем видел до сих пор в мужских: он знал и то, что женщины, часто бывая не в пример прекраснее, отважнее и талантливее мужчин, точно так же превосходят их и в падении, небрежении, невежестве, — и даже женское уродство страшней и как-то кощунственнее мужского. Женщин в поселке не было видно — только одна попалась Рогову на глаза, когда они с Павлом ходили к помосту. Женщина — вероятно, дежурная по кухне — вышла из лесу с коромыслом. Свободные от дежурства, догадался Рогов, весь день проводили в бараке; по здешним законам, видимо, допускалось и особое, дополнительное мучение — строго раздельная жизнь.</p><p class="p1">В бараке было душно. Одни шили, другие вышивали или вязали, третьи, сидя на крыльце и вдоль стены, перетирали с сахаром облепиху. Внутри барака, где тоже топилась железная печь, многие были полуодеты, и приход двух мужчин не заставил их ни смутиться, ни прикрыться. Со стыдливостью в Чистом вообще обстояло странно.</p><p class="p1">Рогов инстинктивно отводил глаза. Его не встретили ни глумливыми усмешками, ни подначками, — рассматривали спокойно и просто, как экспонат, видимо, прикидывая, каков он будет, когда и на него начнут распространяться общие правила; поскольку единственной радостью обитателей поселка было наблюдать за мучениями друг друга, каждый житель Чистого тут же соображал, каков будет Рогов на дыбе или на рогульках (рогульки он представлял себе смутно, и как выглядит наказание ими — не знал). Только один взгляд он почувствовал кожей — взгляд, полоснувший его, как узкое лезвие. Рогов уставился в тот угол барака, откуда блеснул темный глаз, горячо скользнувший по нему: невысокая девушка в низко повязанном платке, согнувшись, сидела на лавке, протянувшейся вдоль стены, и что-то бормотала, покачиваясь. Рогов вслушался: ему померещилось, что из угла доносится тот самый жаркий шепот, который послышался ему тогда в лесу.</p><p class="p1">— Марака… карака… барака… тарака… — бормотала она с ударением на втором слоге, опустив голову, повязанную грязно-белым платком, и сцепив перед собой пальцы. Но вдруг, словно почувствовав его взгляд, подняла лицо и посмотрела на него исподлобья, прямо, с вызовом.</p><p class="p1">Он испуганно заметил, что у нее один глаз — один, но огромный, черный и влажный, как ягода; вторая глазница была прикрыта дряблым веком. На вид ей было лет двадцать пять, лицо смуглое и скуластое — треугольное лицо с маленьким коричневым ртом. Что-то притягивающее и пугающее было в ее птичьем, круглом глазе, и странная связь была между Роговым и ею — он понял это сразу и в тот же миг вспомнил, что в странной фантазии, пришедшей ему по поводу Имы Заславского, тоже была любовь к одноглазой троцкистке. С ним часто бывало такое, он знал за собой эту способность угадывать будущее, на первый взгляд абсурдное и непостижимое, — самые бредовые догадки, которые он боялся даже додумывать до конца, вдруг сбывались в его судьбе, и не зря же пришла ему в голову эта одноглазая! Теперь она сидела напротив, нацелившись в лицо ему своим единственным глазом, и он понимал, что забрел в эти края не без ее тайного участия.</p><p class="p1">— Пошли, — подтолкнул его Павел. — В женский барак нашим ходу нет, только новым показываем — чтоб знали, куда ходить не след.</p><p class="p1">Они вышли на свет. Рогов посмотрел на часы — было уже два.</p><p class="p1">— Часы не положены, — важно сказал Павел и протянул за ними руку в полной уверенности, что Рогов безропотно повинуется.</p><p class="p1">Часы было жалко — дорогие, купленные в Чехии, — но Рогов и впрямь их отдал. Это почему-то вызвало у Павла скептическую ухмылку.</p><p class="p1">— Не въедешь ты в закон, — покачал он головой, и Рогов так и не понял, относилось ли это к тому, что он не отдал часов сразу, или к тому, что отдал их теперь.</p><p class="p1">Обедали долго, все той же тушенкой — правда, теперь с водянистой намятой картошкой; выдано было несколько арбузов. После молча курили. К Рогову никто не подходил, словно пребывание в карантине делало его заразным, зачумленным и доступным только для Павла. Рогов понимал, что на этот и ближайшие два дня попал в полную зависимость от Павла, и боялся того, чем все это могло закончиться. Павел же охотно разговаривал с остальными, но Рогова не упоминал: обсуждали в основном предстоящее шоу Петра. Судя по всему, посмотреть было на что. Самого Петра видно не было: из реплик Павла следовало, что тот готовится, уединившись в будочке около помоста. Шоу предполагалось через три часа после обеда, и время, особенно без часов, тянулось для Рогова невыносимо медленно. Из курилки, представлявшей собою деревянный, типа караульного, гриб возле столовой, все постепенно начали расходиться. Больше всего Рогова занимал вопрос — куда деваются люди из поселка днем: они сходились для вечернего сбора или для жирной консервно-крупяной трапезы, но на утрамбованной территории лагеря Рогов со своим гидом за все предобеденные три часа встретил только Андрона с тремя помощниками, несших непонятное бревно. В лагере никто не работал: лишь женщины, судя по всему, так и сидели в бараке, штопая свою и чужую одежду или заготавливая затируху. Все бросали окурки в железное ведро, стоявшее под грибом, и уходили в разных направлениях — иногда поодиночке, иногда по двое-трое. Одни исчезали в бараках, другие в лесу: стало быть, выход за территорию поселка на работы был разрешен.</p><p class="p1">Глядя на этих людей, уходивших делать свои таинственные дела, Рогов испытывал все более глубокую тоску: такую же тоску он чувствовал всегда, попадая в новые места, где люди уже живут заведенным порядком, а ему в этот порядок еще только предстоит войти. Вот так же чувствовал он себя, оказавшись в новой школе после переезда — то был восьмой класс, — или впервые проснувшись в армии, в учебке, куда он прибыл с последней партией. Все уже маршировали, бегали, что-то таскали, — они же, последняя троица только что обскубанных тупой машинкой новобранцев, только пришивали погоны к хебе. Их посадили как раз в ротную курилку и предоставили самим себе; иногда кто-то из «духов», прослуживших уже неделю-другую, забегал к ним и с видом прожженного, опытного знатока предупреждал, что скоро придется вешаться. Кругом кипела жизнь, какая-никакая, они же были выброшены из всякой. Подшиваться надо было так, чтобы между стежками не проходил палец. Шить Рогов не умел. Но тоска происходила не только от этого и даже не от этой отдельности от всех, которая в другое время Рогова бы обрадовала, — а главным образом от того, что все это было преддверием новой и ужасной жизни, в которую будет вовлечен и он. Любые переходные и межеумочные времена вообще всегда были для Рогова мучительны — он любил определенность, и даже солнечный осенний день заставлял его в душе кричать: скорее бы! Скорее бы началась мерзость зимы с ее темными утрами и тотальной враждебностью человеку — враждебностью, которую он и так чувствовал во всем, но летом она маскировалась, а зимой бывала обнажена: если убивать, то лучше сразу и честно.</p><p class="p1">Вот и теперь, сидя в курилке, он мучился больше всего оттого, что пока присутствует в аду туристом, а через три дня натурализуется, и тогда непостигаемые правила преисподней распространятся и на него. Плохо быть отдельно от всех, но хуже будет со всеми, — это он понимал, и душа его выла.</p><p class="p1">— Павел, а что они все делают? — решился он спросить, потому что не мог больше молчать.</p><p class="p1">— Да кто что. — Павел сплюнул. — Время проводят. Одни деревья метят, другие считают. Гавриил вон сбился — видал, что было с Гавриилом? Ну, по дереву работают по мелочи… Иногда пилят, валят… Мышцу качают…</p><p class="p1">— А кто задания дает?</p><p class="p1">— Да в начале сезона Константин определяет, где кому быть, — они там и торчат. Только дежурных назначают да вот с новичками в карантин. Меня часто на карантин бросают — я закон хорошо знаю. Всосал.</p><p class="p1">Рогова озадачили слова о начале сезона, но входить в детали он не стал, даром что Павлу, казалось, нравилось болтать. Рогов ничего не понимал в настроениях Павла. На глазах сбывался один из самых страшных кошмаров его детства — путешествие с безумным спутником; кошмар этот возникал чаще других и заставлял его вскакивать с колотящимся сердцем. Ему снилось, что он бродит по пустому закатному городу, как правило, по Москве, по каким-то ее районам, на которых она тогда для него кончалась, и по мере расширения географии его поездок — к родне, к друзьям, к репетитору — изменялся и пейзаж сна, пока действие его наконец не переместилось в реальные окраины и пригороды вроде Новопеределкина. Был болезненно-красный закат, солнце уже село, но все небо было в алом тумане, и жарким, пыльным вечером он бродил и по городу с сумасшедшим спутником (реже спутницей), не зная, как от него отвязаться. Самое страшное заключалось в том, что спутник был непредсказуем — мог засмеяться, мог наброситься, и приходилось его все время заговаривать, причем с какого-то момента тот переставал слушать начатую историю и только смотрел на Рогова в упор, как умеют смотреть сумасшедшие, — с бессмысленной подозрительностью. Так они кружили и кружили, пока спутник вдруг не лез в нагрудный карман за чем-то невыносимо страшным — но за чем именно, Рогов никогда не успевал досмотреть. Больше всего на свете он боялся безумия — чужого, потому что о своем и подумать не мог без дрожи.</p><p class="p1">— А зачем считать деревья? — спросил Рогов.</p><p class="p1">— За вопрос «зачем», вообще говоря, по закону бичевание, — сказал Павел с мрачным удовлетворением. — Имей в виду.</p><p class="p1">— Что, запишешь мне?</p><p class="p1">— Во время карантина не пишут. А вот ты себе где-нибудь запиши.</p><p class="p1">— А еще какие вопросы нельзя?</p><p class="p1">— По ситуации, — расплывчато ответил Павел. На лице его заиграло что-то похожее на вдохновение: видимо, он действительно хорошо знал и любил закон. — Иногда, например, нельзя спрашивать: «Как дела?» При ясной погоде нельзя спрашивать: «Что мне сегодня делать?» При пасмурной погоде нельзя про патруль: кто, мол, в патруле да когда я дежурный? При северном ветре нельзя спрашивать, который час.</p><p class="p1">— Так ведь часы запрещены, — полувопросительно произнес Рогов, потому что погода была пасмурная, а мало ли какие слова нельзя произносить при такой погоде.</p><p class="p1">— Ну, — рассудительно кивнул Павел. — Запрещены. — (Он сделал паузу, словно придумывая объяснение.) — Но это только в карантине, а после карантина кой-кому разрешены. Мне, например, можно — но только при условии, что у меня будут свои. Видишь, у меня свои. — Он вынул из кармана часы Рогова и невозмутимо показал ему.</p><p class="p1">Тень догадки мелькнула в голове Рогова — на секунду ему показалось, что он ухватил самую суть закона, — но тут же все потонуло в прежней мути.</p><p class="p1">Неожиданно — он всегда появлялся неожиданно — из дальнего барака (второго мужского, мысленно окрестил его Рогов) выскочил Николка и стремительно понесся к столовой. Ни на завтраке, ни на обеде его не было, видимо, он ел отдельно и вообще обладал привилегиями.</p><p class="p1">— Что, Павлушко, — кричал он издали, — не все сожрали, не все смолотили? А? Не все новый пожрал? Здоровый малый, здоровый, здоровый, брюхо-то набил! — Он закружился вокруг Рогова. — Пожрешь, потом отработаешь, всем отработаешь! Полюбуемся, полюбуемся новым! — Он еще попрыгал, зловонно дыша на Рогова, а потом отскочил в сторону и боком побежал к столовой, все косясь на курилку.</p><p class="p1">— А Николка что делает? — спросил Рогов.</p><p class="p1">— Что хочет, то и делает, — пожал плечами Павел. — Он на таком положении, что ему только Константин указ. Николка Божий человек, блаженный.</p><p class="p1">Рогов затруднялся представить себе Бога, у которого такие люди, но другого Бога здесь, видимо, не знали.</p><p class="p1">— И что, его трогать нельзя?</p><p class="p1">— Трогать нельзя, жаловаться на него нельзя, спорить с ним нельзя. В нем закон и есть. По закону, скажем, воровать нельзя. Но ежели Николка сворует, то ему можно. Кому другому — нельзя, а ему можно.</p><p class="p1">— И что ж вы его терпите?</p><p class="p1">— Мы не терпим, — вдруг озлился Павел. — По закону он нужен. Без него закон неполный. В Николке соль земли. Богоносец он, понял ты или нет?</p><p class="p1">— Бого-кто? — спросил Рогов, откровенно издеваясь. Ему начало всерьез надоедать все это, а злоба у него всегда изгоняла страх, как жажда забивает голод.</p><p class="p1">— Богоносец! — рявкнул Павел. — «Бого-кто»! Это ты бого-кто, чумоход болотный, а Николку не трожь! Из него все вышли, от него сам Константин зависит! Им повелевает, но от него и зависит. Глас Николкин — глас Божий. Тут все во имя Николкино. Для кого иначе-то?</p><p class="p1">Снова что-то знакомое мелькнуло Рогову во всех этих сочетаниях — глас Николки, вышли из Николки, во имя Николкино, — но ум его в Чистом мутился, и мысль снова потонула в страхах и тоске.</p><p class="p1">— Все уж видели, — раздумчиво между тем сказал Павел. — Разве свинарник тебе показать… Пошли посмотрим. — И они направились к краю поселка, забирая левее помоста.</p></span>
