</div><p class="p1">Летом Рогов с родителями жил на даче. Крошечный садовый участок получил в семьдесят втором году его отец, инженер на большом московском заводе. Все давалось отцу с трудом, но в конце концов он обзавелся набором советского благосостояния — правда, в самом жалком его варианте: у них с Катериной Ивановной появилась двухкомнатная квартира, за год до рождения сына они купили машину — первую «Волгу», с передачами на руле, — а когда Славе исполнилось три года, получили и дачу, чтобы ребенку было где дышать свежим воздухом и есть незагазованный, выращенный без химии витамин. Участки заводу дали в сырой и кочковатой местности, километрах в восьмидесяти к югу от Москвы, и дачный поселок имени Станюковича, имевшего когда-то усадьбу в этих местах, стал расти и обстраиваться. Строились кто во что горазд, из среды заводских немедленно выделились люди с незабытыми или генетически усвоенными сельскими навыками, население мигом расслоилось на тех, у кого почва осушалась и в огороде все родилось, и тех, кто, подобно Роговым, тщетно вбухивал в болотистую местность песок и время. Песок немедленно проседал, гряды зарастали, а если их от сорняков покрывали рубероидом, вырезая в нем пятиугольные дырки для клубничных усов или смородинных саженцев, то сорняки перли и сквозь рубероид. В парниках, под немедленно рвавшейся пленкой, отчего-то урождалась одна влажная, белесая трава. Памятником бесплодному усилию для Рогова навеки остался отец с тачкой, только что вываливший в гряду очередную порцию песка или навоза и отирающий лоб; он скалился от усталости, тяжело дышал, и лицо его выражало при этом не гордую радость и даже не здоровую злость, а почему-то мольбу. Природа его мольбы не слышала, и съесть огурец, выращенный собственным трудом, ему удалось, кажется, единожды в жизни. Но и огурец этот он ел с выражением жалобным, словно умоляя не растаять вдруг, как мираж.</p><p class="p1">После выхода на пенсию отец окончательно разуверился в любых своих усилиях и начинаниях (он работал бы и еще, но его выпихнули, — правда, сын уже поступил на истфак, и можно было расслабиться). Он проводил на даче все больше времени, но вместо того, чтобы высвободившееся время посвятить обработке земли, пристрастился к походам за грибами. Впрочем, и тут ему не везло, земля его не любила; и когда соседи приносили гигантские плетеные корзины, полные доверху и прикрытые папоротником от завистливых взглядов, он еле набирал пакет лисичек и сыроежек, которые от сдавливания еще и крошились. Рогов-младший с детства недолюбливал соседей, но стыдился и отца. Сам он, рослый, светло-русый, с широко поставленными глазами и неторопливой речью, — пошел в Скалдиных — умел и любил повозиться в земле, но тщета отцовских усилий вечно стояла у него перед глазами. Дача была для всей семьи чем-то вроде навязчивого ритуала, от которого не хватало духу отделаться: каждое лето мать выпалывала тут же стремительно зараставшую, выродившуюся клубнику, отец в тачке развозил по участку и рассыпал кучками очередную машину песка, а Рогов, когда его удавалось затащить на дачу, принимал во всем этом посильное и неохотное участие. Он любил дачу не за это, а за то же, что и все книжные дети его времени: тут было искаженное, отдаленное напоминание об усадьбе, свидание с той книжной Родиной, которая для всякого думающего человека давно уже свелась к пейзажу, потому что все остальные столкновения с ней были слишком скучны или страшны.</p><p class="p1">Со временем дачный поселок менялся, старые владельцы умирали или продавали участки, новые на месте старых полутораэтажных халуп-курятников возводили краснокирпичные коттеджи с пристроенными парниками, и весь путь от станции до дома, проходивший когда-то через колхозное поле, петлял теперь между тесно поставленными новорусскими домами, одинаковых и почти жалких на фоне дальнего леса. Из былых дачников на всей их улице остались только Роговы да старик Кретов, который заходил к ним иногда поболтать. Жизнь у Кретова была бурная. Он любил выпить, от выпитого добрел и рассказывал про свои странствия. В конце двадцатых он гонялся за какими-то басмачами по Средней Азии, потом возводил завод на Урале, занимался журналистикой в Москве, хитростью избежал фронта, вдруг заинтересовался геологией, получил первое в жизни высшее образование (было ему уже за тридцать) и после этого изъездил всю страну, от Певека до Горного Алтая. Благодаря общительному нраву он сходился со страшным количеством людей, помнил все их фамилии и истории, и именно от него Рогов впервые услышал множество полудостоверных, увлекательнейших сплетен — от истории убийства Кирова до тайны летающей тарелки, которую наши сбили в семьдесят втором под Новосибирском и тут же навсегда засекретили. Тарелку эту Кретов часто видел, работая в Сибири, и уверял, что одного юношу из их партии инопланетяне похитили, потому что, взятый ими в Новосибирске, он очнулся потом в Астрахани на автовокзале и не помнил ничего, кроме собственного имени да еще того, что какой-то трехглазый делал ему укол.</p><p class="p1">Рассказывать все это маленькому Рогову было для Кретова особым наслаждением, потому что маленький Рогов боялся. По большей части их беседы происходили в лесу, куда Кретов уходил в шесть утра и долго блуждал какими-то своими, заповедными тропами. После его смерти Рогов множество раз пытался пройти тем же маршрутом, но выходил всякий раз в какие-то скучные, прозаические и давно известные места — постоянно пропускал развилку. Только Кретов знал, куда повернуть, чтобы после трехчасового петляния и блуждания по грибному осиннику выйти вдруг на крутой обрыв, с которого открывалась недостоверной красоты деревушка на берегу реки, с церковью и краснокирпичным зданием, похожим на станционное, — без всякой, однако, железной дороги. Только Кретов однажды привел Славу Рогова в земляничник, про который наказывал никому не говорить, — на огромной поляне среди густого елового леса двенадцатилетний Рогов увидел столько ягод, сколько не встречал никогда ни до, ни после. Это было то самое, сказочное: «Одну ягодку беру, на другую смотрю, третью примечаю, а четвертая мерещится». Он отлично помнил дорогу, но сколько ни ходил потом, все сворачивал в какое-то болото. Кретов всегда присаживался перекусить на один и тот же пень, доставал бутерброд из черного хлеба с венгерским салом, а перед входом в ельник, кряхтя, бормотал про себя одно и то же: «Эхма, была бы денег тьма, купил бы баб деревеньку да и драл бы их помаленьку». Рогов на полном серьезе пытался копировать его, повторял и про баб деревеньку, но никогда больше не видел земляничной поляны.</p><p class="p1">Родители отпускали его с Кретовым легко, хотя отец и ругался беззлобно, называя геологические россказни бредом. Для маленького Рогова именно эти россказни были первой отечественной историей, как дача была первой Родиной. Это была Родина билибинская, с острыми еловыми верхушками на алом рассвете, с буреломом, с паутиной, липшей к лицу. Там желтые березовые листья были похожи на грибные шляпки, там легко было представить брошенную, а на деле обитаемую невидимыми существами избу (про такие избы, рассыпанные по тайге, часто рассказывал Кретов). Там, за поваленным бурей деревом, упавшим как будто куда попало, без всякого закона, — вдруг начинался совсем другой лес, словно этот рухнувший дуб и обозначал границу другого мира. В том мире, который Кретову был известен и открыт, а Рогову в одиночку недоступен, было огромное черное озеро в глубине светлого, дружелюбного березняка, и Кретов всерьез уверял, что дна у озера нет, специально искали они вдвоем с приехавшим товарищем, выплывали на резиновой лодке на середину, производили замеры и ничего не нашли. А однажды, еще в семьдесят пятом году, когда сам Кретов только-только купил тут участок (на котором, кстати, проводил весь год, кроме зимы, уютно устроившись в бревенчатом доме, питаясь кашей из разных круп и куря свою носогрейку), — он нашел в этом озере обломок доски с выгравированными на ней буквами «The Em», что могло означать только «The Empire», название славного британского фрегата, затонувшего у берегов Америки в середине прошлого века; и говорило это, конечно, о том, что в черном озере была дыра насквозь. Рогов умолял показать ему эту доску, но Кретов, увы, сжег ее в своей голландке прошлой холодной осенью. Тем не менее он успел показать ее другу, и в Москве он непременно познакомит Рогова с этим другом, чтобы тот подтвердил.</p><p class="p1">Однако в Москве они отчего-то никогда не встречались: здесь была совершенно другая жизнь, которая удивительным образом начиналась сразу после пересечения кольцевой. Не успевал маленький Рогов в отцовской «Волге» проехать мимо огромных букв «Москва», встречавших их на въезде в город, как весь дачный мир с его чудесами отодвигался непонятно куда. Кретов мог существовать только в той жизни, как глубоководная рыба на километровой глубине. Вытащенный оттуда в обычную московскую жизнь, где была школа, ежедневная газета и горячая вода, он бы тут же потерял все свое очарование, поблек и, возможно, испарился. Он был представим только в высоких болотных сапогах, клетчатой ковбойке, старом пиджаке и непременной шляпе, обязательно небритый, в сивых усах, лучше бы с огромной плетеной корзиной, которая, как он уверял, сама притягивала грибы и тащила его в грибные места. Кретов слушался корзины, и Рогов лет до восьми всерьез верил, что это она, как компас, ведет его единственно верным путем.</p><p class="p1">Кретовские рассказы были неиссякаемы, и Рогову, который быстро взрослел, никогда не становилось с ним скучно. Иногда Кретов запускал его на свой чердак, где лежали у него в огромном пыльном мешке журналы «Вокруг света» с незапамятных времен и никогда потом не встречавшийся Рогову даже в хороших библиотеках «Сибирский следопыт». Там, при свете карманного фонарика (на чердаке было темно, только пыльные лучики жаркого дня проникали сквозь щели меж смолистыми досками), Рогов перечитал тьму фантастических историй, которые в таком множестве писали в двадцатые годы. В этих историях был бодрый дух исканий, смесь наивной научной деловитости и счастливого авантюризма. Так видели мир хозяева первых радиоприемников, сосредоточенные очкастые мальчики, которые непременно построили бы новый мир, если бы их всех не перебили. После одной такой истории, впрочем, Рогов не спал две ночи. Он был мальчик впечатлительный и на всю жизнь запомнил странный рассказ (к сожалению, ему было тогда не до фамилии автора, у тогдашних книг в его сознании вообще не было авторов — зачем?) — некий американский ученый открыл способ оживлять казненных на электрическом стуле. Ему дали для эксперимента банду из шести жестоких убийц — пятерых мужчин и одну женщину. После казни надо было выждать три часа (почему три часа? для чистоты эксперимента, чтобы уж никакой жизни в них не осталось? или чтобы с душой произошли какие-то необратимые перемены, вследствие которых она осознала бы всю мерзость убийства?). Потом профессор с красивой лаборанткой, изображенной тут же на густо зачерненном рисунке тушью, производил надрезы на ступнях убитых, вставлял туда электроды, делал какую-то инъекцию, включал ток… и трупы медленно оживали, приподнимались на своих стерильных кушетках и оглядывались мутным, ненавидящим взглядом, словно не в силах простить того, кто вернул их в эту юдоль скорби и порока. Таинственный профессор отселял воскресших убийц на пустынный остров, выкупленный в личную собственность. И там-то начиналось самое интересное, потому что шестеро убийц — пятеро мужчин и женщина — начали среди дикой природы строить новый мир, не похожий на наш, строить по тем законам, которые открылись им в страшные три часа, когда они были уже не здесь и еще не совсем там, — и автор, восклицая: «Но какой это был страшный мир!», умолкал до следующего номера. Этого-то следующего номера в кретовском мешке не было, и сам Кретов не знал, что случилось дальше. Вероятно, этот журнал он извел на растопку, потому что периодически залезал на чердак за бумагой для своей печурки, и на ритуал растопки Рогов тоже иногда приглашался. Ему невероятно жаль было исчезавших в огне журналов, за которыми следовали крепкие, звонкие березовые дрова (Кретов ходил за ними в лес с удобным, как все его вещи, топориком), но радость от растопки стоила того. Маленький, а потом и не такой уж маленький Рогов с наслаждением смотрел, как с одной спички схватывается вся печь, как от умело уложенной бумаги огонь ползет все выше, по коре, бересте, и, наконец, как ровное гудение слышится в кретовской клетушке, по стенам которой пляшут тени.</p><p class="p1">Все, что рассказывал Кретов, было волшебно и достоверно, и все в его доме было так же полусказочно. Там стоял огромный ламповый приемник со шкалой, на которой таинственно поблескивали названия городов: Москва, Рим, Стокгольм. Там был и старый, давно не работающий телевизор «КВН» с огромной линзой, посредством которой Кретов учил Рогова добывать огонь (огонь добывался); было множество старых, громоздких, но добротных вещей, и вся советская жизнь представлялась Рогову громоздкой, таинственной и добротной, как эти вещи. Тут ничего не было прочного, кроме нее, и потому после нее стояло и работало только то, что было придумано или произведено при ней.</p><p class="p1">Эта жизнь, как и сам Кретов в его не знавших сноса сапогах, в его коробом стоявшем тулупе, который он надевал ближе к осени, выходя погулять по вечерам, — эта жизнь находилась в таинственном завете с окружавшей природой и одна умела с ней договариваться. Она потому и победила всю эту природу, заставила ее служить себе, что была одной с ней крови и одного замеса, так же естественна и так же органически бесстыдна. Она не знала никакого закона, кроме закона жизни, и слепо следовала ему. Поэтому-то, пока эта советская жизнь была могуча и молода, она с такой легкостью подчиняла себе льды и леса, камни и пустыни: они договаривались, и меньшая сила уступала большей. Все, сделанное при этой советской жизни, было как природа — величественно и таинственно — и всегда обладало каким-то дополнительным, секретным предназначением помимо основного. По приемнику Кретова можно было ловить не только наши, но и вражеские голоса; больше того, Рогов был вполне убежден (хотя никогда не спросил об этом Кретова напрямик), что при случае по этому приемнику, как по рации, можно было бы связаться и с какой-нибудь большой землей — если бы они все, жители дачного поселка, оказались вдруг на малой, то есть, например, в особо дождливое лето их затопило бы. Именно для этих целей служила огромная суставчатая антенна, валявшаяся на чердаке и похожая на ус страшного с виду, но полезного и добродушного жука. Там же нашелся старый телефон, огромный, из плотного тяжелого эбонита, с матерчатым, а не резиновым даже шнуром, на срезе которого поблескивали желтые точки проводков круглого сечения. Но и телефон этот был вполне дееспособен и, даже будучи отключен от линии, мог соединить с кем-то, кому нельзя было дозвониться по линии. Каждая советская вещь имела двойное дно, иногда доброе, иногда злое, но в таких категориях мыслить не следовало. Было не доброе и не злое, а жизнеполезное и жизнеопасное, и даже не так, потому что и жизнь не была высшей ценностью. Было правильное и неправильное, но что правильно и что неправильно — мог знать только посвященный, а может быть, и никто, кроме того, кому можно было дозвониться по отключенному телефону. И маленький Рогов брал трубку и слышал в ней шорох. Он услышал бы и голос, но всегда боялся и швырял трубку на рычаг, а потом долго гладил ее, надеясь выпросить прощение.</p><p class="p1">В Империи, как она представлялась Рогову, стояла вечная ночь. Представление это, по-видимому, сформировалось не без влияния единственной довоенной книжки, которая была у них в доме, — полярных дневников Кренкеля. Книжка была черная, со множеством карт и иллюстраций, и дело в ней происходило главным образом полярной ночью; в Империи все самое главное тоже делалось по ночам. Эта полночная страна рисовалась Рогову в виде огромной живой карты, на которой таинственно перемигивались телебашни, радиовышки, кремлевские звезды и летящие в низких тучах военные самолеты. Там шла гайдаровская, добротная и загадочная жизнь: по засекреченным адресам отбывали поезда, в которых пили чай немногословные светловолосые военные. Глубоко под землей строили метро — не то, карта которого висела у них в прихожей, а тайное, резервное, на какой-то особенный случай. Летчики в кожаных куртках с белыми меховыми воротниками, в шлемах с наушниками, в защитных очках толстого стекла направляли самолеты в пике прямо на льдины, успевая подхватить полярников. Все было черное и белое: ночь и зима стояли в Империи; только поезда были голубые, а самолеты зеленые.</p><p class="p1">Детское ощущение огромной бодрствующей страны не оставляло Рогова и после: он любил ночевать в поездах, легче засыпая оттого, что за окнами, на пролетающих мимо станциях, кто-то контролировал движение составов, связывался с Москвой, рассылал загадочные сообщения. На красных станционных зданиях горели белые ртутные лампы в жестяных конусах. На самом пустынном разъезде обязательно сидел специальный человек, осуществляя тайную связь, посылая сигналы, участвуя в непостижимом общем деле.</p><p class="p1">Эта же советская жизнь смотрела на Рогова с обложек старой «Юности», которую он стал почитывать на том же чердаке лет в пятнадцать. В шестидесятые Кретов выписывал многие журналы — геологам хорошо платили. Получал он сразу по пять-шесть номеров: они дожидались его на почте, пока он в своих болотных сапогах пропадал в экспедиции. С каждой обложки смотрели огромные пустые пространства: то опоры ЛЭП-500 ровной, беглыми штрихами намеченной цепочкой уходили в снежную даль на фоне идеально круглого красного закатного солнца; то лыжники в голубых шапочках, он и она, скользили по замерзшей глади неведомого водохранилища; то рыбаки в таких же вязаных шапочках выбирали из сети рыбу у огромного сине-зеленого моря; то лопасть вертолета, бросая синюю тень, зависала над тайгой. Картинки занимали только половину обложки, и за их границей угадывалась какая-то бесконечность, но человек не терялся в ней, ибо знал к ней ключи и был того же нрава, так же мало ценил свою жизнь, как и она.</p><p class="p1">Теперь Империя исчезла, и природа задним числом мстила ей, расправляясь с нею так же легко и нерассуждающе, как и та когда-то с природой. В лесах Рогов все чаще находил брошенные железные предметы непонятного назначения: иногда в них еще угадывался остов старой печки, труба, трансформатор, но чаще это была уже просто груда ржавчины, медленно уходившая в землю. Этот умирающий предмет был даже интереснее, чем мог он быть в своей силе и славе, — потому что как раз теперь он был и не печка, и не трансформатор, а что-то совсем другое, и, возможно, теперь из него начало бы торчать второе, тайно заложенное предназначение. Но целомудрие и детский страх смерти мешали Рогову толком его рассмотреть.</p><p class="p1">До самой армии Рогов проводил лето на даче, редко-редко выезжая с матерью на юг, когда в семье были деньги. После второго курса ему предстояло служить — студентов все еще брали, он угодил в последний призыв. Армии он боялся страшно, как все интеллигентские дети, и каждый поход с Кретовым казался ему последним. Призывался Рогов с другими студентами (сессию милосердно давали досдать — порадуйся напоследок!) под самый занавес набора, в июле, и уже вручена была ему под расписку последняя, окончательная, зеленая повестка, в которой неотвратимее всего были слова: «Приходить помытым и опрятно одетым». Непомытый и неопрятно одетый он не годился в пищу. Как назло, июль был прекрасный. Грибам еще не вышло время, и они с Кретовым просто ходили по лесам, собирали землянику и редкую в Подмосковье костянику, понемногу выпивали. Кретов всегда брал с собой старую, такую же добротную, как все его вещи, фляжку, — но прежде он Рогову не наливал, а теперь делился.</p><p class="p1">Шел восемьдесят девятый год, время больших разоблачений, Рогов был историк и внук репрессированного, поэтому читал много и с жадностью. Странно, что о репрессиях Кретов говорил мало, о всеобщем страхе вообще не упоминал и сам, казалось, его не испытывал. В таинственной и праздничной советской истории, похожей в его изложении на густую морозную ночь с гирляндами огней, страху не было места — вернее, то был именно детский святочный страх, ничего общего не имевший с серым ужасом очередей.</p><p class="p1">— И все-таки я не понимаю, — сказал однажды Рогов. — Может быть, для поддержания страха… или для разгрома оппозиции… действительно нужны были аресты, но не в таком же количестве? Не в том масштабе?</p><p class="p1">— А кто тут судья? — спросил Кретов, вкусно надкусывая неизменный свой бутерброд. Он сидел на пне, широко и прочно расставив крепкие ноги в сапогах и примостив рядом волшебную корзину, которую брал с собой, даже когда грибов явно еще не было. — Ты думаешь, они брали для страха? Или чтобы народу поменьше было? Я тут прочел, что Россию только тогда и можно накормить, когда половина ест, а половина сидит и бесплатно пашет. Ну не чушь ли собачья? Да Россия могла бы весь мир кормить, если б хотела… Очень ей это надо — кормить.</p><p class="p1">— Но тогда зачем? Какой смысл? — Рогов немного захмелел по молодости и стал разговорчив. — Понимаете, дядя Леша… Ну пусть бы брали самых талантливых, да? Но и этот критерий не работает. Сколько бездарей погибло. Сколько мрази, которая сама стучала, а потом попала под те же колеса. Хорошо, допустим, что гибнет потенциальная оппозиция. Но смотрите, сколько взяли вернейших! Ладно, представим, что берут именно вернейших, что он хочет вернуть империю. — Слово «он» в их разговорах давно означало только одного человека, и расшифровка не требовалась. — Но тогда чем объяснить уничтожение почти всей интеллигенции, которая была тайно против? Я не вижу принципа. Не могу понять, по какому параметру он отсеивал…</p><p class="p1">— Так и не было параметра. — Кретов спокойно вытер рот и по вечной своей привычке провел большим пальцем по усам. — Не было, Славушка. Ты ведь неглупый малый, мог бы и сам дотумкать. Ты думаешь, он тех брал, а этих не трогал? Бред, голубчик. Он брал ВСЕХ.</p><p class="p1">— В смысле?</p><p class="p1">— В том и смысле. Всех, без исключения.</p><p class="p1">— Но ведь вы же уцелели? Да две трети уцелели…</p><p class="p1">— Он просто не успел. Если бы он прожил еще год, друг милый, система была бы закончена. Он же фильтровал, пойми ты это. Одних выпускал — эти, значит, ни на что не сгодились. Других совал в лагеря. А третьи… про третьих разговор особый, тут мне самому не все ясно. Не время про это говорить.</p><p class="p1">Кретов был великий рассказчик и знал, на чем прервать разговор. Он всегда рассказывал страшное в несколько приемов, и его приходилось долго упрашивать, чтобы он вернулся к теме, — но и это входило в условия игры. Как раз теперь небо над ними потемнело, повеял ветерок, и вместо того, чтобы углубляться в любимый ельник, приговаривая про денег тьму, Кретов направился обратно. Он жаловался на боль в ногах, хотя шел по-прежнему ровно, без хромоты и одышки.</p><p class="p1">— Нет, но все-таки, дядя Леш? — спрашивал Рогов, поспевая следом. — В чем смысл-то?</p><p class="p1">— Вот почему сейчас в армию всех подряд стали брать? Раньше же тоже студентов не брали, а теперь тебя марш-марш — и в сапоги. Почему? — не оборачиваясь, спросил Кретов. Рогов любил его и за то, что он говорил об этом «марш-марш в сапоги» легко и естественно, словно ничего особенного в армии не было, подумаешь, две зимы и две весны. Дома его кормили лучшими блюдами и разговаривали осторожно, соглашаясь во всем, как с покойником, и это Рогова пугало и злило дополнительно.</p><p class="p1">— Служить некому, — с усмешкой ответил Рогов.</p><p class="p1">— Да чего сейчас служить-то, кому мы нужны? Или у нас враг новый объявился? Не смеши… Или ты думаешь, что они армией будут прежний порядок наводить? Да какой же порядок наведет такая армия, а главное — у кого там наверху хватит сейчас пороху на такое дело? Нет, Славушка, это примерно то же самое, но в других масштабах. Поняли, черти, что он дело говорил.</p><p class="p1">— Да что за дело-то, дядя Леш? — не выдержал Рогов. — Всех пересажать — и все дело?</p><p class="p1">— Проверить, Слава, проверить, — терпеливо, как второгоднику, повторил старик. — Не пересажать, а всех посмотреть на свет. Знаешь, как нефть делят на фракции? Она тоже небось думает: и зачем ее добывают и потом мучают, так хорошо было в подземке-то… — И он пустился было в рассказ о нефтедобыче, которую знал как никто, потому что все шестидесятые годы провел в Западной Сибири.</p><p class="p1">— И что, дядь Леш, — не отставал Рогов. — Вы думаете, если б не помер — так пропустили бы через эту мясорубку всех?</p><p class="p1">— Да ведь вагоны уже стояли, — ответил Кретов, с неудовольствием отвлекаясь от нефти.</p><p class="p1">— Где?</p><p class="p1">— А ты не знал? На всех вокзалах. Развозить народ. С пятьдесят второго года.</p><p class="p1">— Да зачем, чего ради?! — почти выкрикнул Рогов, впервые отчаиваясь понять. — Работать, что ли, стало некому? Уран был нужен для бомбы? — Он навскидку припоминал все самые свежие мифы, но объяснения не находил.</p><p class="p1">— Да чтобы выбрать кого надо, смешной ты человек! Ну как ты в обычной жизни выберешь кого надо? Нешто тут человек на виду? Вот погоди, ты вернешься — поговорим. Специально доживу, тебя дождусь. Тебе не понять сейчас, извини уж, — не понять.</p><p class="p1">— А вернусь? — криво усмехнувшись, спросил Рогов, в душе уверенный, что его забьют ногами в сортире свои же сопризывники на другой день. Он много всякого слышал об армии и, хотя не жаловался на силу и выдержку, не выносил коллектива, распорядка и скуки. Ужаснее всего была непредсказуемость запретов, бессмысленность тысячи мелких ритуалов, цель которых, казалось, была только в воспитании повиновения.</p><p class="p1">— Вернешься, — уверенно сказал Кретов. — Я и бутылку припасу, разопьем в день возвращения. Тогда поговорим.</p><p class="p1">И Кретов не соврал. Он всегда откуда-то все знал. Через год их отпустили — вышел указ о возвращении студентам брони. Рогов отчасти даже жалел о таком скором избавлении: он чувствовал себя не демобилизованным, а комиссованным, помилованным, словно его покатали во рту, надкусили и выплюнули. Все самое трудное он успел перенести, а плоды этого годового терпения ему уже не достались.</p><p class="p1">Он всю жизнь, с самого раннего детства, ощущал себя чем-то вроде моста между домашней и внешней жизнью. Дома он, поздний и единственный ребенок, был окружен деспотической и в то же время робкой любовью; дома все было слабо, хрупко, ломалось, шаталось, держалось на честном слове. За стенами квартиры шла другая, куда более суровая жизнь, и она была для Рогова менее мучительна, чем домашняя, — как и зима была для него легче осени, потому что осень выглядела промежутком, межеумочным временем колебаний и тягостного ожидания, а зима бесповоротна: худшее наконец наступило, и его можно уже не бояться. Армия была легче, чем ожидание армии, и жизнь в ней была простая, безусловная, в отличие от тонкой, зависящей от тысячи оттенков жизни домашней. Там все боялись друг друга ранить, а здесь никто никого не берег — все было честней, голей и ближе к действительности. Можно было не врать. Рогов старался не вспоминать о доме — это разжалобило и ослабило бы его; он мучительно тосковал по отцу и особенно по матери, и жалость эта была тем надрывнее, чем беспомощнее казались они отсюда. Рогов был другой породы, он мог выдержать.</p><p class="p1">В армии, как ни странно, у него было много времени, чтобы думать. Собственно, это было единственное, чем он мог занять себя, потому что массу никому не нужной работы и бессмысленных строевых упражнений выполнял не он. Он только пытался вывести для себя законы мира, в котором оказался. Для него как историка это был любопытный, хотя и несколько затянувшийся эксперимент. Бессмысленно было все, бессмыслицу приняли как условие игры, которые не обсуждались. Наказания и поощрения также не мотивировались ничем, поскольку деды не снисходили до мотивации. Любимцем роты не обязательно становился остряк и силач, изгоем далеко не всегда оказывался слабейший, и сам Рогов, к великому своему удивлению, не только не был убит в первый же день за неуместную задумчивость, но благополучно дослужил свой год почти без серьезных стычек. Перед ним был принципиально иррациональный мир, в котором беда прилетала ниоткуда. Здесь бессмысленно было делать добро, выглядевшее признаком слабости, и так же бесполезно — творить зло, которое в силу тысячи случайных причин не успевало осуществиться. Здесь, как и в природе, не было добра или зла, но была возможна только последовательность, поскольку все другие критерии оказались утрачены. Последовательный неучастник в тотально непоследовательной игре, Рогов уцелел. Ему достаточно было хоть раз открыть рот, чтобы заступиться за травимого или одернуть наглого, — и его оборона была бы разрушена, но он ни на секунду не перестал быть инопланетянином-наблюдателем и даже толком запомниться никому не успел. Зато ему запомнились многие.</p><p class="p1">Пополнять свою коллекцию таинственных возвращений ему не удавалось, но думать о механизмах отбора во время репрессий он не переставал ни на минуту и выработал целую теорию: случайность, непредсказуемость повода стала ему казаться главным признаком Божественной воли. Волю, управляемую обычными человеческими правилами, нельзя было уважать. Сержанта чтили исключительно до тех пор, пока он мог потребовать чего угодно, в том числе сверх устава, хотя сам по себе устав, если следовать ему детально, был олицетворением абсурда. На свое счастье, Рогов не должен был никем командовать. Он попал в связистскую учебку и благополучно провел последние пять месяцев службы на узле связи. Это не освобождало от периодической ссылки в роту, от строевых смотров и забегов, но в целом служба была сравнительно легкой. Он сильно тосковал по дому, впервые в жизни мучительно жалел отца и особенно мать. Раз в три месяца она приезжала к нему, и всякий раз ему надрывали сердце ее вопросы о службе. Он не мог ей объяснить, что мир этой службы описывается в иных категориях, нежели добро, зло, жалость и прочая. Единственное, что он мог сказать, почти не соврав, — это утешить мать тем, что кормят прилично. И действительно могло быть хуже.</p><p class="p1">В армии выработалась у него привычка подолгу задумываться, молчать, вполголоса разговаривать с самим собой; эта привычка была осознанной и ничем ему не грозила. Другая, неосознанная, была страшней: он окончательно привык отсчитывать от нуля, уверившись в том, что ни на кого надеяться не следует, что есть только сила — и сила эта сильна до тех пор, пока мотив ее не ясен и действия непредсказуемы. Именно в армии ему стала отвратительна слабость во всех ее видах, и не вступался за травимого он не из одной трусости. Трусости, собственно, и не было. Он так же понимал бесполезность заступничества, как его безумная бабка Марина. Жертва могла выжить только одним путем — сживаясь с этой ролью и находя в ней наслаждение; такую жертву никогда не добивали до конца, ибо она была нужна снова и снова. Самое изощренное мучительство, проистекавшее отнюдь не только от скуки, а скорее от того, что в пространстве казармы человека ничто не отвлекало от его истинной природы, основывалось на том, чтобы никогда не домучивать до известного предела, который палач и жертва чувствовали обоюдно. Вмешаться в этот расклад значило нарушить чистоту жанра. Если жертва начинала бунтовать — жалко, как все, что она могла делать, — это не вызывало уважения, а скорее усугубляло презрение, как любая измена. Здесь же, в армии, Рогов понял, что измена условному злу в пользу условного добра — точно такое же предательство, как всякое иное. Империя потому и была империей — со всем своим величием, с победой над природой, с изготовлением прекрасных, громоздких и добротных вещей множественного предназначения, — что упраздняла добро и зло, деля всех на последовательных палачей и столь же последовательных жертв, и в этом была ее несравненная, ностальгически милая цельность. О последнем разговоре с Кретовым он не думал и на дачу в первое послеармейское лето тоже не поехал — как ни соблазнительна была перспектива распить со стариком его бутылку, хотелось оттянуться на юге. Да и бутылки, наверное, никакой не было.</p><p class="p1">Но бутылка была, и распили они ее с Кретовым совсем не так, как оба предполагали летом восемьдесят девятого. В девяносто первом у Рогова умер отец, и на дачу никто из семьи не ездил. Там все напоминало о нем, все было сделано его неумелыми худыми руками, вопреки судьбе, желанию и здравому смыслу. Старая «Волга», все еще бегавшая, тоже была отцовская, и сел в нее Рогов только в октябре: надо было поехать на дачу, как всегда перед зимой, и развинтить водопровод, чтобы при наступлении холодов лед не разорвал трубы.</p><p class="p1">Дача имела вид запущенный и жалкий, и отвоевывать ее у природы было так же бессмысленно, как просить за Скалдина или вступаться за рядового Массалитинова с его огромным носом и страдальческим взором. Трава заполонила участок, но в свою очередь сдалась заморозкам и пожухла. Заходить в дом было слишком тяжело, все вещи в нем были слабы и умоляли о защите — но ни для кого нельзя было ничего сделать. Рогов развинтил трубу, перекрыл воду, проверил замок. Все выло, все просило зайти и хотя бы погладить, потрогать, хоть как-то напомнить вещам, что они не забыты, не окончательно брошены, — но себя было жальче. Рогов вспомнил любимую фразу когдатошней своей пассии, девочки с биофака: «Высшие формы жизни имеют предпочтение». Она сама полагала себя высшей формой жизни и потому кинула Рогова очень быстро, а предпочтение получил третьекурсник МГИМО, растоптавший ее так, что она за всю жизнь не собрала костей. Рогов помнил об этом и не любил разговоров о высших формах жизни, но сейчас высшей формой был он, и растравлять себя видом несчастных вещей и пыльных поверхностей не было никаких сил.</p><p class="p1">Имущество тут было не кретовскому чета — ломаные, сосланные на доживание вещи шестидесятых и семидесятых годов, вообще удивительно хлипкие, хоть и с претензией на изящество, — как, впрочем, и люди тех времен. Рогову было жаль эти предметы и тогда, когда их сюда свозили, и он словно видел их молящие улыбки — мы сгодимся, мы послужим… Теперь, когда в дом за все лето никто не приехал, от них вовсе не было толку, и они должны были окончательно отчаяться. У Рогова не было сил заполнять жилище собственным хилым теплом. Дому предстояла зима, но вещь — она и есть вещь, и летом хозяева приедут снова. Так утешал он себя и свои вещи. Он съел горсть рябины, уже сладкой после первого холода, и подумал, что по-настоящему сейчас хорошо бы выпить, именно и только выпить.</p><p class="p1">Тут он заметил дым, поднимавшийся из трубы соседнего дома. Кретов еще не уехал. В пустом дачном поселке он остался один, топил печь, ходил в лес, выпивал, вероятно. Рогов постучал, и старик не удивился.</p><p class="p1">— Чего не приезжали в это лето?</p><p class="p1">Рогов рассказал про отца.</p><p class="p1">— Жалко, хороший мужик был, — просто и естественно, как всегда, сказал Кретов. — Что ж, ты теперь за хозяина. Не женился?</p><p class="p1">— Собираюсь, — признался Рогов.</p><p class="p1">— Что не привез?</p><p class="p1">— Да что ей сейчас тут делать…</p><p class="p1">— Это дело, это дело… Ну, по маленькой?</p><p class="p1">Кретов брал водку в ближайшем городке, до которого раз в месяц добирался на электричке, покупал сразу много и настаивал — на чесноке, сельдерее, перце. Получавшаяся настойка сочетала в себе выпивку и закуску. Рогов с наслаждением хряпнул стопку и заел венгерским салом.</p><p class="p1">— Как служилось? Мать вроде говорила — не жаловался?</p><p class="p1">— Не жаловался, сносно. Я думал — хуже будет…</p><p class="p1">— То-то. Глаза боятся, руки делают. Не стесняйся, закусывай, я запасся.</p><p class="p1">Кретов подбрасывал дровец в печку, рассказывал, как один сумасшедший на участке завел двенадцать коз, а Рогов пил, не задумываясь особо, как будет возвращаться. Он водил прилично, дорога была пустая, а выпить ему сейчас требовалось, тем более что погода установилась на редкость промозглая. Добро бы настоящие холода — но они все не наступали, а вместо них стояло серое, сирое не пойми что.</p><p class="p1">Коротко поговорили о путче, Кретов весь его пересидел на даче, слушая радио, и расспрашивал о подробностях, но Рогов путчем не озаботился. Во-первых, он не выходил из дома, чтобы не пугать мать, а во-вторых, был все-таки историком, уже четверокурсником, и понимал, что из подобной затеи ничего выйти не могло. Шум вокруг августовской победы только раздражал его, а последствия могли оказаться хуже всякого путча — победители получили карт-бланш, о котором не смели и мечтать.</p><p class="p1">— Вот и я говорю, — удовлетворенно поддакнул Кретов. — Если бы кто сейчас и мог взять власть… да их, верно, не осталось никого.</p><p class="p1">— Подпольный обком? — спросил Рогов. — Стальная когорта? Золотая рота?</p><p class="p1">— А ты не смейся. — Старик кряхтя налил себе и ему. — Помнишь, был у нас с тобой разговор насчет того, как нефть делят на фракции?</p><p class="p1">— Помню. Перед самой армией.</p><p class="p1">— Так вот. Я объяснял тебе тогда, да ты не врубался. Посадки-то эти для чего нужны были? Ты небось наслушался: армия бесплатных рабов… Нет, голубчик, они бы и на обычных своих местах пахали как бесплатные рабы. Все это, Слава, был один большой фильтр, так я понимаю. И задача его была одна — отфильтровать тех, кто в случае чего и войну отразит, и страну поднимет, и мир завоюет. Прикидываешь?</p><p class="p1">— Это как же — отфильтровать?</p><p class="p1">— Да очень просто, милый. Проще не придумаешь.</p><p class="p1">— Кто выживет, что ли?</p><p class="p1">— Не-ет, кто выживет — те второй сорт. — Кретов разгладил усы большим пальцем правой руки. — Те жилистые, конечно, крепкие ребята, но они слабину дали — себя оговорили. Им веры мало. Подписал на себя показания, еще пару-тройку человек сдал — и ту-ту, поехал жопой клюкву давить. Эти годятся на исполнителей — максимум. А первый сорт, элита — те, кто ничего на себя не подписал. Ни единого словечка не признал. Не оговорил никого под пытками. Как ему еще было проверить население? Гитлер в Германии вовсю пытает своих, крепчайшие коммунисты ломаются, война неизбежна — как тут разберешь, кто сможет такой махине противостоять? Он и отбирал — жестоко, конечно, но если вдуматься, так способ его был не худший. Нет, не худший.</p><p class="p1">— Не может этого быть, — сказал Рогов не очень уверенно. — Ведь единицы же выдержали, остальные сломались…</p><p class="p1">— То-то и оно, что единицы. — Старик поднялся пошуровать в печке. — Единицы, а зачем ему остальные были нужны? Он так и решил для себя: остальных — не жалко. Если они все такие гнилые, с ними не то что светлого будущего, прочного настоящего не построишь. Вот и стал делить на сталь и шлак. Большинство — в лагеря: лучшего недостойны. Он бы всех потихоньку туда переместил. Жили бы, как в Камбодже при Пол Поте. Ты обрати внимание, что он ведь и окружение начал фильтровать: в последние годы под Берию подкапывался, на Молотова орал… Мы-то знали, как он на Девятнадцатом съезде ярился. Передали только официальную его речь, маленькую, — доклад Маленков делал, — а он потом на закрытом совещании еще три часа говорил! В семьдесят-то лет, прикинь… Он потому и тасовал их как хотел. Ягоду снял, расстрелял. Ежова снял, расстрелял. Берию не успел.</p><p class="p1">Чтобы избавиться от наваждения, Рогову понадобилось встряхнуть головой и заново осмотреть давно знакомую обстановку кретовского жилья — стол, печь, диван. Все было прежнее, никакой мистики. Но то, что говорил старик, выглядело не просто убедительным — все это совпадало с роговскими армейскими догадками, таимыми даже от себя.</p><p class="p1">— Ладно вам, дядь Леш, — сказал он без особенной уверенности. — Эта вся мясорубка не при нем началась, не на нем и кончилась. Что ж, Брежнев диссидентов тоже фильтровал?</p><p class="p1">— Да Брежнев разве так фильтровал? — Старик махнул рукой и подбросил еще дровец.</p><p class="p1">— Ну черт с ним, с Брежневым. Но началось-то все при Ленине!</p><p class="p1">— О! — Кретов поднял палец. — Но заметь: при Ленине-то принцип прослеживается очень четко. Берут дворянство, так? Берут интеллигузию. Пусть без повода, пусть в заложники, — но не берут же они в заложники какого-нибудь еврейчика из черты оседлости, пьянчугу из рабочей слободы? Они хватают очень даже конкретную публику. И Сталин видит, как вся эта публика, еще вчера державшая в руках страну, учившая жить, писавшая во всякие журналы, на глазах обделывается! Да это что ж такое, господа хорошие? Хоть посопротивляйтесь для порядку! Нет — идут под нож и еще мучаются чувством вины. Тут он и понял: с нормальным народом, с прежними спецами никакой сверхдержавы не построить. Сверхстрану должны строить сверхчеловеки. А иначе — ну сам ты посуди, зачем через двадцать лет после революции перелопачивать всю Россию? Это он понял: подготовительный этап закончился, начали возводить башню… Отцеживать спецконтингент.</p><p class="p1">Рогов все еще не принимал этой гипотезы всерьез, но здравое зерно в ней было — пусть даже исполнители сами до конца не понимали, что творят, но подспудный импульс вполне мог быть таков. Когда на их глазах кололся маршал, ползал по цементному полу недавний вершитель судеб, сдавал жену и детей любимый партийный фельетонист — даже самый тупой следователь не мог не испытывать, помимо обычной плебейской мстительности, еще и удовлетворения более высокого порядка — от исполнения какой-то высшей справедливости. Если такая гниль учила их всех жить или стояла во главе армии — так ей и надо! Кретовская догадка одна позволяла объяснить тотальность посадок и расстрелов, масштаб и непредсказуемость очередных кампаний, которые — как он знал теперь из документов — к пятьдесят четвертому году и впрямь коснулись бы всех уцелевших.</p><p class="p1">— И куда же они девались? Те, кто не подписывал?</p><p class="p1">— Вот это уже вопрос! — Старик назидательно поднял палец. — Это главный вопрос! И вышло так, что я знаю ответ. Я, видишь ли, в сорок седьмом разведывал нефть под Омском. Нефти там, конечно, никакой не оказалось, так что я уж готовился к разносу, а то и к чему похуже. Тогда ведь всем клеили вредительство, я не знал еще, что ярлык этот только для виду. И один местный житель, у которого в избе я стоял, мне рассказал, что где-то под Омском есть поселение тех вроде как расстрелянных, а на самом деле туда тайно свезенных. У него кум там на строительстве работал. Построили поселок, не маленький, с хорошую воинскую часть, — верстах в десяти к северу от деревни. Там уже тайга еле проходимая. И с тридцать седьмого года стали туда свозить — отфильтрованных, со смертными приговорами. Они для всех переставали существовать, и тут уж их должны были готовить по-настоящему.</p><p class="p1">— К чему?</p><p class="p1">— Кого к чему. По склонности. Одних — в какой-нибудь отряд смертников, так я полагаю. Других — в штабы, в военную элиту. Третьих — руководить производством в тылу, пуп рвать, но патроны давать… И знаешь — они-то ведь и выиграли войну! Они и есть те неизвестные солдаты. Ты думаешь, население в массе своей было готово так отражать нашествие? Население мне рассказывало, когда я под Питером был, что при немцах было очень даже замечательно. Порядок и жидов меньше. А как наши перебегали к немцам? Правы были эмигранты: ни у одной армии мира не было столько дезертиров. Дивизиями в плен сдавались. А этих Сталин берег как главный резерв, они в декабре и повернули ход войны. Помнишь сибирскую дивизию?</p><p class="p1">— Помню, — машинально сказал Рогов.</p><p class="p1">— Эти сибиряки и спасли положение. Как их ввели в бой — мигом все наладилось. Думаю, то омское поселение было не единственное.</p><p class="p1">Рогов хотел было спросить, откуда Кретов знает насчет сибиряков и что, собственно, сам он делал во время войны, но чувствовал, что эту тему трогать не стоит. Это было единственное, о чем старик не заговаривал никогда. Будет время — сам расскажет.</p><p class="p1">— А памятник в Александровском саду — ты думаешь, это неизвестному солдату? Дудки: они и были неизвестными солдатами. Секретный резерв смертников, которым возвращаться было некуда. Ну а кто выживет — тому домой. Прикидываешь, почему была нужна эта формулировка — «десять лет без права переписки»? Кто-то все равно должен был вернуться. Не может так, чтобы всех. Сталин прикидывал, что за десять лет — с тридцать седьмого-то — и с войной, и с восстановлением управятся. Разведка ведь, как говорится, доложила точно — он знал, когда начнется. Потому и армию всю перетряхнул — помнишь, как маршалов стали уничтожать? Буденного и Ворошилова оставил для символа, а прочих — в мясорубку. Кто выдержал — тех под Омск, кто предал, подписал на себя — тех, известное дело, под расстрел. На хрен нужна такая армия. Тухачевский все признал, а считался главной надеждой. Блюхер, остальные… Гамарник сам застрелился.</p><p class="p1">— А родню-то их за что было брать? — не выдержал Рогов. На его глазах людоедство обретало смысл и цель.</p><p class="p1">— А родня знала много, — усмехнулся старик. — Или догадывалась. А может, он думал: раз сами такие гнилые, так и родня гнилая… Он ведь жизнь им сохранил, только в ссылки да в лагеря отправил… А туда бы все и так пошли. Кроме тех, кто вынес. Выпускал он только такую гниль, что уж совсем ни на что не годилась: эти и сами бы померли.</p><p class="p1">— Это вам все в Омске рассказали? — спросил Рогов.</p><p class="p1">— Какое — в Омске… Сам с годами додумался. Окончательно убедился, когда в Александровском саду памятник Неизвестному солдату открыли. С вечным огнем. Останки-то брали под Москвой, как раз где сибиряки сражались. Между прочим, двадцать восемь панфиловцев были тоже из смертников. Потому так долго и скрывали, что трое выжили. Я помню, только в шестьдесят пятом, кажется, возник вопрос: ежели все они погибли, кто же о подвиге-то рассказал? Вопрос, может, возникал и раньше, но рассекретили только тогда. Тут и дали слово этим троим. Ну, может, не все они были оттуда, из отфильтрованных, но Клочков точно оттуда. Ты не знаешь разве, что его в тридцать девятом брали?</p><p class="p1">— Впервые слышу, — удивился Рогов.</p></span>
