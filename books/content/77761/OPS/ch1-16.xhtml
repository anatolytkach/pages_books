</div><p class="p1">Люди ушли недавно. Это чувствовалось во всем — казалось, в печке найдется горячая каша; но каши не было, а так — полная иллюзия живого присутствия. Рогов ходил из дома в дом, осматривая вещи, ища следы. У каждой двери он сначала стучался, спрашивал: есть ли кто, — и, не дождавшись ответа, входил.</p><p class="p1">Но это было то, то самое. Здесь уж сомневаться было нельзя. Третье Чистое, в которое Рогов ехал через большую узловую станцию Крутихино и потом еще добирался пешком, вернуло ему надежду. Был божественно ясный день и божественно красивый лес, золотой на просвет, и в лес вела хорошо убитая, ровная тропа, по которой, верно, часто ходили.</p><p class="p1">С самого утра Рогов чувствовал беспричинный восторг. Третье Чистое, куда он поехал для очистки совести, с самого начала обещало наконец разгадку: что ж, что два раза не повезло, в третий он не промахнется. И все словно подманивало, объясняло, обещало: сделай следующий шаг — а там и откроется, там и откроется…</p><p class="p1">В избах было пусто, но обстановка — деревянные столы, табуретки, старые серванты — была на месте. По России было бессчетно оставленных деревень, но в этой теплилась жизнь — запустением не пахло. Конечно, вглядись он чуть пристальней, отрешись хоть на миг от веры в то, что цель его так близка, — он заметил бы и паутину в углах, и пыль на столах, и выгнившие кое-где бревна, но он так долго искал жизнь и смысл там, где давно не было ни того, ни другого, что не вглядывался. Было чувство, что люди ушли только для того, чтобы выманить его, чтобы он поспешил за ними по тропинке, уводящей в лес, — так живописно она лежала среди поля, так манила в золотой березняк метрах в пятистах от деревни. И Рогов, обойдя все десять изб, направился по тропе.</p><p class="p1">День сиял, словно медленно оттаивая, наливаясь прощальным теплом. Лес, казалось, играл с ним — то приближался, то отдалялся. Наконец он вошел в редкий поначалу, быстро густеющий березняк; тропа не сужалась, она по-прежнему уверенно вела его к цели. Он словно чувствовал на себе доброжелательные, радостные взгляды и все ближе, все уверенней пробирался к цели долгого путешествия.</p><p class="p1">Ведь возможна красота и вне человека, возможен и человек, вымахавший выше себя самого! Все говорило об этом: восхитительная гармония, мягкость, чистота; только на фотографиях в старых календарях мыслим был такой августовский, зелено-золотой лес, небо такой глубокой, невероятной синевы, стволы такой прямизны.</p><p class="p1">Впереди завиднелся просвет: большая, идеально круглая поляна, вся покрытая пестрым разнотравьем. Рогов различал бесчисленное множество цветов, разросшихся столь буйно и густо, что удивительно было, откуда в лесу вдруг это полевое пиршество. Тропа подводила к самой поляне и исчезала, словно цель пути была здесь наконец достигнута. У цели следовало помедлить.</p><p class="p1">— Здравствуйте! — крикнул Рогов.</p><p class="p1">Эхо отозвалось ему — или то было не эхо? Он вспомнил вдруг, где видел такую поляну. Точно так выглядело земляничное место, куда привел его Кретов и куда он потом никогда не мог добраться сам. Вот ведь добрался! Он верил, что, преодолевая время и пространство, старик показал ему тогда будущее — но, пока не исполнились сроки, в это будущее не было пути. Вспомнив о Кретове, чей дух, наверное, ликовал теперь, сопутствуя ему (и впрямь кто-то словно подталкивал в спину), Рогов достал из кармана зеркальце и послал солнечный зайчик направо, налево, вперед!</p><p class="p1">Гармонический, светлый, свободный мир ждал его — мир новых людей, спасших землю, вырастивших в тиши и тайне поколение таких, каким случайно вырос он, Рогов. Дивная, немыслимо прекрасная жизнь начиналась в этом раю, куда до него не мог попасть никто, — заколдованный замок ждал своего открывателя.</p><p class="p1">И, счастливо хохоча, он шагнул на поляну; сперва шагнул, потом побежал, побежал, побежал — и не понял, как очутился по грудь в ледяной жиже, засасывавшей его глубже и глубже. Просто цветы оказались вдруг у самого лица, а потом холод поднялся по ногам.</p><p class="p1">Громадное, идеально круглое болото простиралось вокруг него. Лес казался невообразимо далеким. Цепляться за сочные, хрустко ломавшиеся стебли было бесполезно, руки путались в них. Не прошло и трех минут, как он ушел в ледяную жижу по горло, пытался, но не мог и кричать. Тонкий сип выходил из груди, и, молотя руками по зыбкой поверхности, он только глубже уходил в черноту, в подпочву, в изнанку царственной роскоши, благоухавшей вокруг.</p><p class="p1">То живое и теплое, что одно только и было Роговым, отличая его от ледяного и замкнутого мира вокруг, уходило в бездну, в царство бешеного и бездумного роста, в пространство распада, где не было мысли, совести, памяти — ничего не было. То человеческое, что мечтал он преодолеть, — преодолевалось наконец. И некого было звать на помощь — потому что проваливался он в себя, в собственное оправдание проверок, смертей, мясорубок, в собственное признание их великого тайного смысла. Смысл был здесь, под ним и вокруг, — все, что он принял и оправдал, поглотило его.</p><p class="p1">Опускаясь, задыхаясь, в последнем напряжении теряя остатки рассудка, повредившегося еще год назад, незаметно для всех, как сошла когда-то с ума его несчастная бабка Марина, — он ничего не понимал. Он не успел понять — и с чего ему было понять, — что старик Кретов завещал ему талисман, с которым не расставался во всех поездках, — карманное зеркальце, ничего особенного; подарок одной подруги, случайный роман много лет назад. Кретов не воевал, потому что сидел, вышел только в сорок шестом, спасся чудом: чертежники были в дефиците, а чертил он мастерски. Неучастия своего в войне простить никогда не мог, хотя так и не знал, кого следует винить; как знать, может, без посадок и войну б не выиграли. Версию о проверке он выдумал именно в своем подневольном КБ, когда надо было чем-то занять голову. Иногда потом забавлял друзей и возлюбленных, многие говорили, что и сами догадывались.</p><p class="p1">Как-никак, стране он послужил: после освобождения оказался востребован как геолог, искал и находил нефть. Зеркальце путешествовало с ним по Сибири с сорок девятого года. Любовь не сложилась: вернувшись из последней экспедиции, он увидел на пыльном столе в запущенной комнате записку: «Дома никого нет» — и все понял. А вот талисман, оставшийся от нее, выручал. Значит, все-таки любила. После семьдесят второго он жил на пенсию, работать уже не мог: посадил здоровье и в лагере, и в экспедициях, развлекался тем, что читал газеты, подчеркивал от нечего делать ляпсусы и повторы. Например, если на одной странице случались два одинаковых заголовка.</p><p class="p1">А стихи про четыре ветра и семь морей были напечатаны в 1934 году в «Сибирском следопыте». Книжный мальчик Кретов и книжный мальчик Сутормин оба любили этот журнал. Кретов выжил, Сутормин — тоже. И книжному мальчику Име Заславскому повезло больше, чем его родителям. Но Скалдина, седого, сумасшедшего Скалдина, расстреляли в январе тридцать девятого года, и Бабеля расстреляли, хотя другу-правдисту Козаеву так не хотелось в это верить. Могли расстрелять и Соловьева, дальнего ленинградского родственника роговского отца. Но ему повезло: дело, которое ему клеили, оказалось чересчур дуто: он должен был целиться из своего окна в товарища Жданова, когда тот проезжал по Староневскому, но окно его квартиры на Староневском, вот незадача, выходило во внутренний двор. Он отделался десяткой и был так счастлив, так счастлив, все время с тех пор был счастлив, и, уже вернувшись, улыбался всем детям, а в случае хорошей погоды посылал им солнечных зайчиков. Не было в Ленинграде более счастливого человека. Он думал, что это Бог его спас, что во всем происходящем был великий изначальный замысел: всех пересажать и перестрелять, а его отпустить, чтобы был в Ленинграде счастливый человек.</p></span>
