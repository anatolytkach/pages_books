<p class="p">РЕКОНСТРУКЦИЯ-3</p>
</div><p class="p1">— Холод — это наша есть жизнь, — прочувствованно сказал бородатый. — Окружи себя холодом, и будешь ты победитель природы. Теплое и хорошее — оно что? Оно фьють. — Он показал глазами вверх, то ли указывая таким образом на эфемерность всего теплого или хорошего, то ли давая понять, что все теплое по вечному своему физическому свойству должно вознестись туда. — Сначала все холодное и плохое, а потом оно победит, и тогда можно смотреть, можно говорить.</p><p class="p1">Старик выцепил Скалдина из множества попутчиков в разболтанном жестком вагоне на второй день пути. Скалдин — чуть ли не единственный на весь вагон — ехал без спутника, без семьи, и старик, возможно, решил его развлечь по своим понятиям; а может, безошибочным чутьем психа угадал, что здесь если и пошлют, то по крайней мере не сразу.</p><p class="p1">— Теперь другое: зачем ты выплевываешь из себя? Ты харкнул, и вот тебя покинул грамм силы. Я трое суток могу не лить, не класть, и тогда во мне такая сила, что вот смотри! — Сумасшедший вытащил из кармана бахромчатых штанов гвоздь, изогнутый буквой «зю», и с легкостью разогнул его. Согнут он, вероятно, был для предыдущего собеседника.</p><p class="p1">— Паршек знаешь кто? — спросил он Скалдина и сделал паузу, словно ожидая ответа.</p><p class="p1">— Не знаю, — сказал Скалдин. — Ты, наверное.</p><p class="p1">Они стояли в невыносимо грязном и душном тамбуре — два огромных человека, почти ровесники, оба выглядящие много старше своих лет. Скалдин — сухой, с ровно-коричневым строгим лицом, широкий в кости, одетый в темные, хорошего покроя брюки и защитного цвета рубашку, — и второй, босой сумасшедший, лет сорока пяти, по скалдинской прикидке, но кажущийся дедом-лесовиком или некрасовским богатырем Савелием из-за огромной пегой бороды, кучерявой и нечесаной; волосом он вообще порос густо — ситцевая рубаха с оторванными рукавами позволяла видеть бугристые плечи и толстые руки, сплошь заросшие рыжим, местами седеющим каракулем.</p><p class="p1">— Паршек есть водитель нового пути, — назидательно сказал старик. — Паршек идет туда, куда не все идут. Паршек под немцем был, Паршека немец проверял. В мотоциклетке катал, вишь ты. А что мне мотоциклетка? Я и в двадцать градусов босой ходил, и в двадцать пять босой ходил. Хотели в проруби спытать, но лень стало вертеть прорубь. А Паршек им не сказал, Паршек только Сталину скажет. Это подарок на тридцать лет советской власти. Послезавтра приедем, буду ходить, смотреть, как чего. Может, Агафьюшка поможет. Везде есть Божьи люди, и в Москве есть Божьи люди: они Паршека знают, прямо к Сталину приведут. Ты думаешь, он Божьих людей не слушает? А я так думаю, что Божьи люди все ему говорят, иначе как бы ему в голову вошел такой ум? Такой план великий как бы ему в голову вошел? Он сам понимает, он на холодное опирается. Всех приморозит. Вот тебя подморозил, и ты смотри какой стал, какой хороший, для всех удобный. Только выплевываешь зря. Теперь скажи мне, детка, что ты кушаешь?</p><p class="p1">— Что есть, то и кушаю, — усмехнулся Скалдин. Любопытно было послушать психа — в его словах шевелился темный, не вполне понятный, но в принципе уловимый смысл.</p><p class="p1">— Э, так не годится, так не будет твоя заслуга, — покачал головой бородатый. — Твоя заслуга, победа твоя будет, когда ты с пятницы до воскресенья ничего кушать не будешь, — тогда ты будешь господин природы. Мне природа сама все в голову подает, я давно понял. Ты помнишь, дитё вчера плакало? Я в руки взял — сразу заснуло дитё. Ты слушай: с пятницы никогда ничего, а в воскресенье выйдешь голыми ножками на снег, встанешь, два раза проглонёшь…</p><p class="p1">— Чего проглону? — спросил Скалдин, от души забавляясь.</p><p class="p1">— Что проглонёшь — слюни проглонёшь, не перебивай. Проглонёшь, а потом всем людям пожелай добра. Скажешь: люди мои, люди, желаю вам счастья, здоровья хорошего. Вот, детка, а потом иди и кушай все, что тебе захочется. Можешь покурить даже, если совсем нет терпежу. Если терпежу нет, вообще многое можно: вредней себя одолевать-то. Мудрость природы есть в чем? — Как большинство пророков, старик предпочитал излагать свое учение в виде ответов на собственные вопросы. — Мудрость природы есть в том, чтобы самому все захотеть, что тебе не хочется. И тогда ты будешь господин природы.</p><p class="p1">Скалдин подумал и рассудил про себя, что лучшего подарка к тридцатилетию советской власти сделать было нельзя.</p><p class="p1">Он еще несколько раз выходил с бородатым в тамбур; в общем вагоне не было никакой возможности разговаривать: жара, вонь. В Омск их в тридцать девятом везли зимой, и мучились они тогда в степи, наоборот, от холода, — но тот вагон был королевским по сравнению с этим. Видно, совсем они стали не нужны, если распускали их по одному и денег выдали ровно на месяц скудной жизни да на дорогу домой самым дешевым поездом. Правда, был у Скалдина теперь орден.</p><p class="p1">Кроме общения с господином природы, развлечений в поезде не было. Вагон был густо набит плотной людской массой, ехали какие-то казахи, какие-то чучмеки в халатах, — Скалдин встречал чучмеков на войне, воевали они плохо. Злость в них была, но тупая, и просыпалась, только когда у них свои же что-нибудь крали. Если бы у них что-нибудь украли немцы, о, чучмеки были бы неудержимы, — но увы. Воевали вообще плохо, это Скалдин вынужден был признать: без чистовцев, да без мелединцев, да без новосибирского ударного батальона, в который свезли упорствующих со всей средней России, они бы со всем своим пространством проиграли войну не раз. Идиот Жуков полагал, что войны выигрываются кулаком и криком, идиот Власов — ненавистью к жидам; поразительные люди были эти советские генералы, и ежели б не Грохотов, прошедший через Меледино и негласно руководивший обороной Москвы, а потом блеснувший при Курске, — не видать бы Верховному теперь ни Москвы, ни Берлина. Но Верховный сам был из сидельцев, понимал в этом деле и в тридцать восьмом году все успел. Идея большого фильтра была хорошая идея.</p><p class="p1">Скалдин был замечен еще под Москвой и Грохотову лично известен, ему открывалась бы славная военная карьера, но из людей, прошедших фильтр, Верховный предпочитал не выращивать крупное начальство. Поначалу Скалдин очень обижался, но теперь понимал, что и здесь была мудрость — жестокая, конечно, но всякая мудрость жестока. Они свое дело сделали, для новой войны хватит новых, фильтр работал, а слишком хорошо воевать и расти по службе чистовским и мелединским не след. В мирное время в армии должны служить идиоты, иначе, не ровен час…</p><p class="p1">Нет, о мести Скалдин не думал, и переворот его не соблазнял. Но слишком большое количество профессионалов в армии опасно для страны, где все решает один; идея с двумя армиями — мирной, тупой, и резервной, из смертников, — имела свои плюсы. Другое дело, что теперь ему вовсе не улыбалось встраиваться в мирную жизнь, потому что он знал уже цену этой мирной жизни и своим довоенным трудам; кому охота растить хлеб, который будет спален или потоптан при первой же атаке — а атак будет еще ого-го… Какая разница, что жрать человеку; лучше, если бы он мог совсем не жрать.</p><p class="p1">До войны Скалдин был не то чтобы глуп, но избыточно доверчив. Что говорить, в нем была корневая сила, славная сельская закваска, которая и позволила ему выжить в тюрьме, потом в Чистом, потом под Москвой, под Курском, под Варшавой. (Дальше Польши их не пустили: боялись перебежек; ну, перестраховщики! Да дорвись они до того мира, нешто они стали бы встраиваться в него? Всем бюргерам жирные их глотки бы перервали, да и только.) Да, так вот, сила была, а ума не было. Занимался черт-те чем. Пшеничка. Пшаница, как уважительно говорил учитель его, Михайлов, тоже хороший мужик и тоже дурак. До войны Скалдин занимался, как бы сказать, тончайшим слоем, называвшимся то наукой, то культурой, — в общем, маслом на бутерброде, кремом на торте, и к истинной жизни, откуда и шла его корневая сила, все это не имело никакого отношения. Не будь фильтра, так бы и прожил.</p><p class="p1">Он отчетливо помнил миг, когда условности отступили, словно оставшись в другой жизни: последние добольничные дни помнились ему смутно, разве что страшный гнет бессонницы, сумеречной реальности, в которой слова вдруг теряли значение. Ему показали потом запись того, что он говорил на последнем допросе: решительно непонятно было, как он мог это говорить. «В людях понедельник, вторник, среда, четверг, пятница. Иголка, шило, нож, топор, пила, молоток, рубанок, шприцы. Корова, лошадка, коза, овца. — (Ему, верно, казалось, что следователь показывает какие-то картинки, надо называть, что на них, иначе примут за сумасшедшего). — Ухват, курица, утка, гусыня, индюшка, соловей, щегол, синичка. Лошадка копытом бьет, дождик сверху льет, знать, погода плохая. А вода в ванну нальется, надо садиться купаться. Вон корову поят. Нога моя меняется в боли, рука меняется в боли. Почты долго нет, а хотелось бы почитать, тут есть какой-то секрет. Прочитано мне и с моих слов записано верно».</p><p class="p1">Когда он очнулся в больнице, ничего не было понятно; просто было чувство, что все хорошо, спокойно. Вошла красная в белом, принесла прозрачное; дала пить — горькое. Вошел белый в белом, сказал обычное: ну-с, ну-с, как-с. Огромное облегчение, хотя слов «огромное облегчение» тоже еще не было. На сломанной правой руке был гипс, поили горьким три раза в день, на ночь сладким, с утра кислым. Слова он вспомнил на удивление быстро, но вот понятия некоторые так и не вернулись. Например, приходил следователь, желто-зеленый в белом; следователь — потому что так следовает, следует, чтобы он приходил. Спрашивал про пшеницу. А я не знаю, какая пшеница, зачем ее растить, когда всем известно, что пшеницу земля родит сама. Спрашивал про академию: а зачем академия, когда сам человек знает, сколько нужно, а больше ему для жизни не нужно? Восстанавливался он теперь на удивление быстро. Больше ни о чем не спрашивали. Однажды доктор, это ведь был он — белый в белом, сказал: вот все бы так. Но не у каждого можно вызвать реактивный психоз. Этот после психоза словно шкуру сбросил, а под ней оказался идеальный солдат.</p><p class="p1">Конечно, к идеальному солдату вернулась потом вся память, и что говорить — это было больно, больно. Но ощущение излишности, избыточности всего, чем он жил, — какой-то любви, какой-то семьи, какой-то науки, — не оставляло его. Какая наука, когда с человеком так просто сделать все, что угодно? Положим, любовь к прекрасному, о которой так много говорил в Чистом один ленинградский искусствовед. Именно любовь к прекрасному, утверждал он, позволила ему выжить, выстоять и ничего не сказать. Ему казалось, что, сознаваясь в небывших грехах, он тем самым оскорбит прекрасное, которое до такой степени ему доверялось, что позволяло себя исследовать. Значит, плохо били, сказал тогда Скалдин; в Ленинграде вообще плохо бьют. Надо укреплять кадры. Теперь, он слышал, уже взялись. Поднес спичку к холсту — и все твое прекрасное. Все крем на торте, масло на бутерброде. Величие их страны в том и было, что она научилась отсекать лишнее.</p><p class="p1">— Но только масло и делает его бутербродом, — поджав губы, заметил искусствовед.</p><p class="p1">— Хлеб надо жрать, — сказал тогда Скалдин. — Вы думаете, искусство делает вас человеком, любовь делает вас человеком… Червем они вас делают, только и всего. Человек — это то, чего нельзя отнять; вместе с жизнью разве что. Я говорю о советском человеке, понятное дело.</p><p class="p1">Подъезжая к Москве, бородатый в последний раз наставлял Скалдина в тамбуре:</p><p class="p1">— Значит, отпиши мне, я вернусь к себе в Чувилкино и буду ждать. Напиши, как пошло, какое теперь твое есть счастье. Помнишь, как не кушать?</p><p class="p1">— Помню, — улыбнулся Скалдин. Псих был единственным человеком в поезде, который не вызывал у него отвращения, и если вдуматься, не такой уж он был псих.</p><p class="p1">— И ножками, ножками по снегу чаще. Надо сознательно искать холодное и плохое, не богатству учиться, а бедности. Все у себя отними, и ты будешь господин. Понятно говорю?</p><p class="p1">— Понятно, — кивнул Скалдин. Сумасшедший говорил дело.</p><p class="p1">— Вот, — удовлетворенно кивнул Паршек. — А я потому так понятно говорю, что мне сама природа шепчет. Ну, желаю тебе счастья, здоровья хорошего.</p><p class="p1">— И тебе счастья, здоровья хорошего, — ответил Скалдин и крепко пожал ему руку.</p><p class="p1">Эта фраза Бог знает почему привязалась к Рогову еще в самолете на Омск, где он читал в «Московских новостях» яростную статью Дворкина. Теперь он никак не мог от нее избавиться.</p><p class="p1">Скалдин сам не знал хорошенько, зачем едет в Москву. Надо было повидать семью, может, помочь чем-то. Жить с женой он, конечно, теперь вряд ли смог бы: Марусю он помнил слабой, нежной, и сделать из нее человека было практически невозможно — все в ней было человеческое, ничего сверх. Была еще дочка, можно попытаться хоть из нее воспитать человека, настоящего человека без предрассудков, выучить ее ничего не хотеть, чтобы ничего не терять, — но только при условии, что Маруся не будет лезть. Работу ему обещали, он умел теперь многое. Грохотов, которого взяли в Московское управление Октябрьской железной дороги небольшим, но влиятельным начальником (армейскую карьеру, естественно, обрубили уже в сорок пятом), обещал в случае чего содействие. И то сказать, на транспорте много чего следовало подтянуть, — вот вам наглядный пример, опаздываем чуть не на полсуток. Надо будет обратиться, Грохотов вспомнит. Он написал из Москвы одному Скалдину, как только устроился: сжато, конечно, без эмоций, как и должен писать настоящий человек настоящему человеку.</p><p class="p1">Нет, их не переселили; по крайней мере эта милость была их семьям оказана. Их и не взяли. Один молоденький еврей на полном серьезе уверял, что все семьи взяты, чтобы уж никто не ждал дома. Глупости. Человек — хозяин своих чувств, и если ему надо забыть, что кто-то ждет дома, он забудет без всяких усилий государства. Надо самому себе быть государством, это и значит быть государственником. Еще бы не хватало, чтобы ты стал настоящим солдатом, арестовывать всю твою семью. Нет, его семью, конечно, не тронули. Он попросил Грохотова проверить, и тот проверил: жена работала на ЗИСе, бывшем АМО, Катя училась в школе; прислал и телефон — Г1-16-29. До войны телефона не было.</p><p class="p1">Заявляться сразу не нужно. Скалдин позвонил из автомата.</p><p class="p1">Трубку взяла старуха, которой он не помнил (ее вселили в сорок шестом вместо уехавшего к родителям в Куйбышев соседа Зингермана; Зингерман вдруг решил бросить перспективную работу в Музее Революции и поехал на Волгу, якобы собирать материал о революционном движении, а на самом деле просто сбежал, надеясь пересидеть там новые надвигающиеся чистки; Рогов это знал от матери, а Скалдин не знал). Он попросил позвать Марину, ее не было, хорошо, тогда Катю, Катя была.</p><p class="p1">— Снегурка, — начал он, сердясь на себя за это прозвище, нечего пудрить ребенку мозги нежностями, но надо было произнести пароль, что-то безусловно опознаваемое. — Мама дома?</p><p class="p1">— Нет, она на работе, — сказал почти Маринин, но еще более нежный, слабый голосок, домашний, как байковый халат.</p><p class="p1">— А когда она будет?</p><p class="p1">— Часов в шесть, — испуганно ответила девочка.</p><p class="p1">— Катька, — желая ее подбодрить, сказал Скалдин. Он машинально отметил, что сердцебиение усилилось совсем чуть-чуть — вот что значит владеть собой. Конечно, страна позаботилась о солдатской жене и ребенке, что же тут удивительного? Это была особая, новая страна, она не бросала своих солдат, и потому ее стоило защищать. Суровая, но любимая страна. — Катька, я тут должен маме кое-что передать. — (Наверняка у них трудности с деньгами, пусть знают, что он приехал не пустой.) — Мы с ней должны увидеться, но я пока не могу к вам прийти. Хочу кое-что сделать. Я сейчас у друга, не могу долго занимать телефон. Скажи маме, что я буду ждать ее сегодня на Почтамте в восемь часов вечера.</p><p class="p1">Почтамт он придумал давно, еще в Чистом. Хорошее место, лучшее для встречи: много людей, светло, празднично. Все ждут писем, отправляют письма. Он все-таки жалел, что в Чистом не бывает писем, хотя, естественно, умел подавлять подобные импульсы. Встретиться вне дома было необходимо, чтобы сразу избежать неловких ситуаций: вдруг он придет и увидит там другого мужчину, он не просил Грохотова проверять еще и это, человек занятой, для чего же обременять. Да и как проверишь. Надо испытать Марусю, придет ли: если придет, значит, ему можно в дом. Может оказаться, что заявляться сразу еще по каким-либо причинам неудобно; и вообще — удачная разведка есть уже половина боя. Холод — это наша есть жизнь. Вот неотвязная фраза!</p><p class="p1">— Я все передам, — робко сказала девочка. — А когда… когда можно будет…</p><p class="p1">— Я скоро приду, — весело уверил ее Скалдин. — Ты как учишься?</p><p class="p1">— На отлично, — ответила дочь дрожащим голосом.</p><p class="p1">— Вот и очень хорошо. Ну, до свидания.</p><p class="p1">Он повесил трубку и только теперь ощутил, как голоден, какой прекрасный солнечный день в Москве, как радостно начало осени, а вместе с нею и трезвых, сильных холодов Родины, проверяющих на подлинность все живущее. Он задержался в Омске, ожидая ответа от Грохотова, — не хотел ехать наобум лазаря, — и в Москву прибыл только пятого сентября; жильем в Омске его готовы были обеспечивать долго, выслужил, и он прожил у тихой хозяйки две недели, ожидая подтверждения из Москвы. Как выяснилось, Грохотов не обманул.</p><p class="p1">Кафе — роскошь, денег мало; он направился прямо в гастроном близ трех вокзалов, новый, до войны его не было. Во всем этом новом московском великолепии была доля и его труда. Да, тяжеловато, несколько избыточно, хотелось бы большей аскезы; но в столице можно позволить себе царственную пышность. Прочая страна и так жила аскетически, — он видел, знал. Холод — это наша есть жизнь.</p><p class="p1">— Сарделечек килограммчик, — ворковала женщина прямо перед Скалдиным.</p><p class="p1">Он простоял в очереди за своей бутылкой кефира и полубуханкой пеклеванного уже полчаса, и от недавней гордости не осталось и следа. Москва жрала, Москва вырождалась. С кем мы будем побеждать? А ведь если нам еще воевать и строиться, нужны настоящие люди, неужели всех перековывать? Никаких кузниц не хватит!</p><p class="p1">— Яичек десяточек, — и долгая, долгим недоеданием воспитанная нежность к еде звучала в ее невыносимом голосе. — Яички свеженькие у вас?</p><p class="p1">Интересно, какой ответ она ожидала услышать? Голос ее был влажен, в нем звучало отвратительное гортанное бульканье, сырой подспудный призвук; и еда, которую она выбирала, по консистенции была этому голосу под стать. Разумеется, яички она произносила как иички, даже — йийички.</p><p class="p1">А ведь по-настоящему-то не голодала, подумал Скалдин. Он легко отличал людей, хлебнувших лиха хотя бы неполным хлебком: беда придавала им не то чтобы благородства — из иного дерева не выточишь ферзя, — но хотя бы минимальную сдержанность. Эта же была говорлива: она могла теперь поговорить, долго и с наслаждением позаказывать. Скалдин не терпел и барственности, жалкого снобизма бывших, который теперь только и мог проявляться в ресторанах да магазинах (он помнил еще довоенное, дочистовское — до всего — посещение ресторана с Марусей, их единственный поход в «Рыбацкий», что близ Курского): отвратительную манеру подзывать официанта, манеру, в которой сочеталось презрение к лакею и вместе с тем тайное подмигиванье (оба из тех), связь с ним — палача с жертвой: принесите ветчины, но проследите, чтобы ветчина была настоящая. Сволочь, тебе бы брюквы. Но эта крайность — уменьшительно-ласкательное обожание, преклонение перед едой, жалкая попытка выбрать из того никакого ассортимента, который возник после отмены карточек, — была еще отвратительнее. И он еле выдерживал злобу, душившую его. Эта же злоба душила его внука Рогова, стоявшего теперь в очереди в продовольственном магазине «Березонька» напротив гостиницы «Юбилейная» в Омске. Женщина перед ним неутомимо перечисляла:</p><p class="p1">— Шпроточек баночку… пожалуйста, сырочку еще… хороший сырочек? — (Сырочек был один, пресный «Адыгейский», больше похожий на слежавшийся творог.) — Хлебушка, пожалуйста, батончик… маслица пачечку…</p><p class="p1">Вас бы в Чистое, думали дед и внук, всех бы вас в Чистое. Человек был везде, человек стоял в очередях и давился в транспорте, человек занимался решением своих копеечных проблем и переваливанием их на окружающих, все было человеком, человека не должно было больше быть. Человека развелось невероятно, нечеловечески много. Его надо было отфильтровать, сжать, прокипятить в десяти водах — да не так, понарошку, как в Константиновой коммуне, а так, чтобы великое общее дело заслонило все его частные интересы, чтобы он думать забыл про свое здоровье и погоду, чтобы ему навсегда расхотелось «йийичек». Скалдин не помнил, как достоял эту очередь.</p><p class="p1">И как очутился на Арбате, он тоже не помнил.</p><p class="p1">Он потом себя уговаривал, что разведка есть разведка, нельзя же не узнать хотя бы, как они живут. Двор его дома был тот же самый, прежний. Марина вернется только в шесть, сейчас пять. Он поднялся по лестнице, по которой спустился в декабре тридцать восьмого. Прибитый им ящик для почты висел на своем месте. Вот, порадовался он. Была война, бомбежки, черт знает что, а ящик висит. Хорошо сделанная вещь есть хорошо сделанная вещь.</p><p class="p1">Я вернулся, рапортовал он лестнице, чувствуя уважение к ее крепким ступенькам и грязным, но целым, выстоявшим стенам дома. Я ушел и вернулся, вот я здесь, крепкий, не погнувшийся. Вы целы, я цел. Я знал, что вернусь сюда, и докладываю: вот — я — здесь, по слову на ступеньку. И никакой одышки. А ведь сорок. И почти никакого сердцебиения. Разумеется, звонить в дверь он не будет. Он просто показывает этой двери, что цел.</p><p class="p1">(Если бы мать знала, что он за дверью, — что сделала бы она? Выбежала бы к нему навстречу, повисла на нем? Нет, едва ли. Скорее всего с таким же бешено бьющимся сердцем, с расширенными сухими глазами замерла бы с той стороны, боясь пошевелиться.)</p><p class="p1">Так они постояли друг против друга. Потом одновременно повернулись и пошли каждый своим путем: Скалдин во двор, Катя — читать про Смутное время.</p><p class="p1">Во дворе Скалдин уселся на скамейку (новую, раньше не было), закурил и стал смотреть на детей, играющих в песочнице, и на молодую мамашу с мальчиком лет пяти, сидевшую на соседней лавочке. Мальчик ползал по лавочке и не хотел слушать стихи, которые мать ему читала по толстой синей книге. Скалдин прислушался.</p><div class="poem">
<div class="stanza">
<p class="v">Ночь идет на мягких лапах,</p>
<p class="v">Дышит, как медведь.</p>
<p class="v">Мальчик создан, чтобы плакать,</p>
<p class="v">Мама — чтобы петь.</p>
</div>
<div class="stanza">
<p class="v">Отгоню я сны плохие,</p>
<p class="v">Чтобы спать могли</p>
<p class="v">Мальчики мои родные,</p>
<p class="v">Пальчики мои.</p>
</div>
</div><p class="p1">Ну зачем вот все это — мальчики, пальчики?! Зачем все это? Кого они, в конце концов, растят? Есть же, например, Аркадий Гайдар… Скалдин отвернулся.</p><div class="poem">
<div class="stanza">
<p class="v">Сын окрепнет, осмелеет,</p>
<p class="v">Скажет: «Ухожу».</p>
<p class="v">Красный галстучек на шею</p>
<p class="v">Сыну повяжу…</p>
</div>
<div class="stanza">
<p class="v">И прилаженную долю</p>
<p class="v">Вскинет, как мешок,</p>
<p class="v">Сероглазый комсомолец,</p>
<p class="v">На губах пушок.</p>
</div>
</div><p class="p1">Ну да, да, это уже ничего.</p><div class="poem">
<div class="stanza">
<p class="v">Налепив цветные марки</p>
<p class="v">Письмам на бока,</p>
<p class="v">Сын мне снимки и подарки</p>
<p class="v">Шлет издалека.</p>
</div>
<div class="stanza">
<p class="v">Заглянул в родную гавань</p>
<p class="v">И уплыл опять.</p>
<p class="v">Мальчик создан, чтобы плавать,</p>
<p class="v">Мама — чтобы ждать.</p>
</div>
</div><p class="p1">Ну, а кто же возражает против такого порядка вещей?</p><div class="poem">
<div class="stanza">
<p class="v">Вновь пройдет годов немало…</p>
<p class="v">Голова в снегу;</p>
<p class="v">Сердце скажет: «Я устало,</p>
<p class="v">Больше не могу…»</p>
</div>
<div class="stanza">
<p class="v">И, бледнея, как бумага,</p>
<p class="v">Смутный, как печать,</p>
<p class="v">Мальчик будет горько плакать,</p>
<p class="v">Мама — будет спать.</p>
</div>
</div><p class="p1">Господи, что же это такое?! Это надо было остановить немедленно!</p><div class="poem">
<div class="stanza">
<p class="v">А пока на самом деле</p>
<p class="v">Все наоборот:</p>
<p class="v">Мальчик спит в своей постели,</p>
<p class="v">Мама же — поет.</p>
</div>
<div class="stanza">
<p class="v">И фланелевые брючки,</p>
<p class="v">Первые свои,</p>
<p class="v">Держат мальчикины ручки,</p>
<p class="v">Пальчики мои.</p>
</div>
</div><p class="p1">— Что, что, что это такое?! — заорал Скалдин. — Что вы делаете, что?! Что это у вас, что?!</p><p class="p1">Перепуганная молодая женщина показала ему синий переплет: «Избранное» Веры Инбер.</p><p class="p1">— У этого же автора есть прекрасные стихи! — кричал Скалдин. — «Пулковский меридиан», «Путь воды»! Что вы делаете, чему вы учите детей! Ведь этим детям убивать, этим детям умирать! Это растление, как вы не понимаете, что все это растление! Вы не должны учить его всему тому, что потом придется сдирать, как кожу!</p><p class="p1">Женщина в ужасе подхватила мальчика и убежала, оставив книгу, дети из песочницы бросились врассыпную, кого-то унесла мать, только что беседовавшая с соседкой. Двор опустел, а он все кричал, да не кричал уже — хрипло лаял, и пока не поднес руку к лицу, не понял, что рыдает.</p><p class="p1">Он не плакал никогда, никогда не плакал. Может быть, он и теперь не плакал: погода испортилась, стал даже покрапывать дождь. Конечно, это был дождь.</p><p class="p1">Отсюда надо было уходить, да и Маруся, вероятно, скоро придет. Был соблазн посмотреть на Марусю и уж потом следом за ней отправиться к Почтамту, но зачем, не надо — он пройдет пешком, один, он развеется. Скалдин с трудом поднялся со скамейки и сделал два шага, но вдруг почувствовал, что ноги не держат его.</p><p class="p1">Он тяжело сел прямо на бортик песочницы и стал пальцами царапать, разгребать песок — влажный с краю, в центре защищенный грибом. Боль в подушечках пальцев и под ногтями должна была отвлечь от разрастающейся, раскаленной боли в груди.</p><p class="p1">Пальцы его наткнулись на какой-то небольшой твердый предмет: он вытащил его, поднес к глазам (вдруг стало темнее, нет, все-таки погода сильно испортилась) — и узнал первую игрушку, которую купил дочери: это был целлулоидный пес с большими ушами, красный, с белыми глазками, словно удивленными какой-то непомерной обидой: вертикальные, овальные, зрачки внизу.</p><p class="p1">Скалдина взяли, всех взяли, а тех, кого не взяли, еще брали; прошла война, убили несчитанное количество человек; Скалдин освобождал концлагерь, видел, что там творили с людьми, и понимал, что не будь Большой проверки — его страна не устояла бы против такой машины; горели дома, в руинах лежали города, умерли Свенцицкий, Гусев, Копосов, Балаболин, Харламов, Патин, Чибисов, Коломейцев, Говорунов, Балаян, Крохин, Петрухин, Лоренц, Касатиков, Кружевецкий, — а целлулоидный красный пес лежал в песочнице, дожидаясь, пока он придет сюда. Вот что было долговечней всего.</p><p class="p1">Боль становилась невыносимой. Совсем стемнело: должно быть, усиливался дождь. Скалдин разжал руку. Через полчаса та самая молодая мать, которую он испугал, вспомнила, что забыла под дождем книгу — хорошую, новую книгу, купленную накануне в книжном магазине напротив арбатского «Арса» за пятнадцать рублей. Промокшая книга дожидалась ее на скамейке. Странный мужчина, наверное, уже ушел. Но он не ушел, он лежал в песочнице, на боку. Вызвали «скорую», оказалось — поздно. Впрочем, сказал врач, с самого начала было поздно.</p><p class="p1">А может, он выжил и все случилось иначе? Может, он просто не захотел видеть жену и дочь, понимая, что мирная жизнь уже не для него? Стал военным, нашел Грохотова, после разоблачения культа попал в армию инструктором? Или уехал к сумасшедшему в Чувилкино и помогал ему проповедовать, что холод — это наша есть жизнь? Или вернулся в Чистое вместе со всеми и создал с ними новую коммуну — без принуждения, на добровольных началах, где все они вместе поддерживали форму на случай, если завтра война?</p><p class="p1">А пса, наверное, выкопали дети, кому же, кроме детей.</p><p class="p1">Ничего не знал теперь Рогов, едущий в третье Чистое.</p></span>
