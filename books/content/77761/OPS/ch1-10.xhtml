<p class="p">5</p>
<p class="p">РЕКОНСТРУКЦИЯ-2</p>
</div><p class="p1">— Папы нет дома, — ответил ломающийся голос, и тепло, трогательно прозвучало «папа», сказанное этим юношеским баритоном. Остро толкнулась зависть, но сам виноват, сам бросил Мишку. — Он в командировке, будет через две недели. Хотите, Исаак Эммануилович, я маму позову? Она у соседей…</p><p class="p1">— Не надо, — сказал Бабель. — Я вечерком зайду и передам.</p><p class="p1">Нет, говорить с женой Козаева он не собирался, с его сыном — тоже. Показаться в Москве нужно было как можно меньшему числу людей из прежней жизни: ненужные расспросы и слухи только во вред. Он давно знал, что будет делать, выйдя из Чистого (что Чистое не вечно — не сомневался, сомневался только, доживет ли). Анонимность, полная безымянность, другой человек с другой судьбой. Его и предупредили: писать пишите, но помните: вы Тернович. У них там были забавные представления о писательстве и о говорящих фамилиях. Он никогда не позволил бы себе такой безвкусицы в повести о своих скитаниях: Тернович.</p><p class="p1">Заплатить только кое-какие старые долги. Предупредить, чтобы знали, как себя вести: в том, что как-то себя вести рано или поздно придется всем, он не сомневался. Первый эксперимент — тот, что поставлен над ними, — во время войны принес блестящие результаты, а война была не последняя: будет и еще, и скоро; не внешняя, так внутренняя.</p><p class="p1">Он вышел из будки и направился на почту — низенький, очкастый, незаметный в любой толпе; на круглом лице блестит нееврейский нос-пуговица, на плече брезентовая сумка.</p><p class="p1">В почтовом отделении пахло расплавленным сургучом, под двумя портретами кисла сонная девушка. Он купил конверт и к нему сдвоенный лист почтовой бумаги с изображением деревенского домика наверху. Перья были из рук вон, корябали бумагу. Он писал, как всегда, медленно, выбирая слова: не было гарантий, что не читают уже ВСЮ почту. С ним больше ничего нельзя было сделать, с ним и с самого начала мало что можно было сделать, — но вредить Козаеву не хотелось. Устная речь — другое дело, на словах он мог бы многое объяснить, теперь же приходилось быть осторожным. Письмецо отняло у него полчаса времени, один раз на него пристально взглянул старик, зашедший узнать, почему ему в ящик не положили «Гудок», который он вот уже двадцать лет выписывает, стыдно! — но, не найдя ничего интересного в круглом, по-безуховски небритом лице, кивнул каким-то своим мыслям и вышел. Бабель посмотрел ему вслед, подождал — и перо снова пошло повизгивать и царапаться (как женщина, которая нас не хочет, добавил бы он в юношеские годы).</p><p class="p1">«Милый друг мой, — писал он, ставя по неискоренимой привычке „мой” после „друг”, вообще любя постпозитивы, — милый друг мой, пишу коротко, вы поймете. Письмо это уничтожьте сразу. Я был на работе, трудной и сопряженной с опасностью. Не все можно рассказать. Будет время, и мы обо всем поговорим, как раньше. Мы тогда спорили с вами, есть ли замысел во всем, что происходит. — (Формулировка казалась ему достаточно обтекаемой, можно было понять и в метафизическом смысле, но Козаев поймет в буквальном, ибо разговоров явно не забыл.) — Мне кажется, что он есть, и потому не удивляйтесь, если и вас коснется судьба. Об одном прошу: соглашайтесь со всем, что вам будут говорить. Не упорствуйте. Помните, как мы предположили с вами: если не будет упорствовать никто, то общая участь, быть может, смягчится. Вы были правы, хотя и не буквально. Помните: упорствуя, вы никого не спасете. Мы никогда не знаем общего плана, можем лишь посильно не мешать ему. Я вернулся ненадолго, и никто не должен знать об этом отпуске. Предупреждая вас, я не превышаю своих полномочий и все же прошу никому не говорить об этом письме. Но если вы найдете нужным передать мой совет еще кому-то, это будет только к лучшему. Вы можете сказать, что получили его от надежного человека. Я знаю теперь, что определение это имеет ко мне кое-какое отношение.</p><p class="p1">Не грустите и будьте бодры, мы еще увидимся. Вспоминаю чудесную Валечку и милого Лешу и верю, что всякое горе минует вас. Но если участь многих окажется и вашей, — (он спросил себя, не слишком ли это ясно, и нашел, что не слишком), — знайте, что ничто не делается без смысла и учета наших свойств. Не случайна была и моя судьба, вовсе не столь безысходная, как можно было думать. Если же сейчас вам покажется, — (это был важный, тонкий момент, и его следовало как-то подчеркнуть), — что я передаю вам не свое мнение или склоняю вас к ошибке, вспомните мое обещание никогда не хитрить с вами. Я обязан вам, и помню это, и ценю сказанное слово. Если когда-то и в чем-то вы верили мне, если помните вечера в славном вашем доме, о котором я часто думал вдалеке от него, — прошу вас поверить и сейчас.</p><p class="p1">Обнимаю вас и верю — нет, знаю, — что впереди у нас много еще встреч и радостей, и родной наш юг еще увидит нас веселыми, жирными стариками, которым будет тогда что вспомнить. Ваш ребе Исаак».</p><p class="p1">Тут было два пароля: ссылка на жирных стариков (Козаев немало тогда забавлялся этой фразе) и «ребе Исаак», принятая в их разговорах шутливо-почтительная форма. Они должны были уничтожить любое сомнение.</p><p class="p1">Он вдруг с усмешкой подумал, что никогда не писал Козаеву. Общение их было устным, свободным от этикета письменной речи. Беседовали чаще всего наедине, не особенно поэтому заботясь об иносказаниях. Козаев был простой малый, Бабель любил цельных и ясных людей, не доверяя эстетам — обычно слабакам и истерикам. Но нехитрую тайнопись журналист должен был понять, не ясно только, мог ли еще поверить. Мало было теперь людей, которые бы чему-нибудь верили — особенно если речь шла о старых, давно не виденных друзьях. Прошлое отдалялось с каждым новым днем страха, с каждой бессонной ночью. Иногда Бабель жалел тех, кто прожил эти десять лет на свободе. Их беспрерывное и бессмысленное ожидание было страшней всякой пытки. Думал он подчас и о том, что мертвые жалеют живых, — но мертвые никого не жалели, это он знал наверняка.</p><p class="p1">Да, сегодня люди не верили, что они существовали и как-то действовали вчера и позавчера, время растягивалось, и сам он сомневался, что жил когда-то с людьми, не в тайге, не в Чистом. Но Козаев был не из тех, кто отказывается от прошлого, он видел это по немногим его публикациям, которые успел просмотреть на фронте и потом, в Москве. Конечно, ушла свежесть и радость и тот наивный задор, с которым все козаевские ровесники, толком не видавшие Гражданской, писали о пустынях, колхозах и самолетах. Наивный и радостный пафос странствий и освоений, детский их конструктивизм, недолгое упоение безобидным и благотворным, казалось, насилием над реками и пустошами быстро вытеснялись болезненной восторженностью, истерической экзальтацией самоуничижения. Тон как будто остался тот же — восторг и священная оторопь, но мощь была уже не своя, чужая, и восхищались все эти юные счастливцы уже не человеком как таковым, но вполне конкретным человеком, в котором словно слились все их таланты и воли. Козаев, пожалуй, еще продержался дольше других. Непостижимо было, как все эти первопроходцы и преобразователи за каких-то пять лет превратились в беспомощных, насмерть перепуганных детей, как повелители песчаных бурь сами низвели себя до песка: он и теперь не вполне понимал, как это сделалось. Никаким страхом нельзя было этого добиться — видно, работала другая закономерность. Стоило ощутить себя всемогущим, сделаться господином рек и дорог, как тотчас рождалась мечта и о самоподчинении. Нет господина, который тут же не сотворил бы себе другого, верховного господина, — наверняка его видел над собой и Сам, и Бабель не удивился бы, узнав, что к концу жизни (не может же она, в самом деле, длиться вечно) он думает удалиться в монастырь, препоручив ответственность за паству господину всего. Тот, кто более всех упивался собственной мощью, проходя безводной равниной или взлетая в облака с летчиком, затянутым в черную кожу, — тот был первым и в упоении собственным ничтожеством перед лицом власти и не лгал ни раньше, ни после. Не было иерархии, в которой хоть один участник пирамиды оказался бы свободен от чувства всевластия над обитателями нижней ступеньки и беспомощного преклонения перед хозяевами верхней, все звенья бамбукового ствола были намертво впаяны друг в друга, Козаев ни в чем не виноват.</p><p class="p1">Он заклеил письмо, надписал адрес, опустил конверт в ящик и вышел в умытую ливнем, посвежевшую Москву. Август сорок восьмого был горячий, душный, с частыми грозами. Только после них ненадолго и можно было вздохнуть. Так во всем. Как ни было погано в девятнадцатом году, а все-таки дышалось как никогда, и сквозь истончившуюся ткань почти исчезнувшего быта просвечивала изнанка, различались узелки. Он плохо смотрел тогда, глаза его слишком часто туманились жаждой оправдания, но дышалось, дышалось — вольнее, чем прежде и потом. Если бы возможна была эта волшебная свежесть без грозы! — но, сама служа грозе единственным оправданием, она не могла возникнуть ниоткуда.</p><p class="p1">Он шел по Москве и думал: почему в новой ее архитектуре разлито такое величие, а в литературе — такая невыносимая пошлость? Почему эти огромные кирпичи, сложенные в просторные здания, прекрасны и будут прекрасны даже на будущий вкус (может быть, на него-то и станут особенно хороши, очистившись от времени, его примет и наслоений), а такие же многопудовые громады нынешних эпопей из колхозно-индустриальной жизни вызовут только хохот?</p><p class="p1">Он вспомнил, как в Омске первым делом зашел в книжный магазин: ненавидя себя за это, он так и не нашел за всю жизнь ничего интереснее литературы. В Чистом новые книги были редкостью, не надо им было читать книг. Только после долгих и назойливых его просьб стали что-то присылать, но тут уже началась война и стало не до чтения. В Омске, конечно, не достать свежих журналов, но книжный выбор изрядный, солидный: он пролистал несколько суконных эпопей и понял, что за время его отсутствия изменилось немногое. Новый гений не родился из всего этого пламени, да и пламя оказалось не тем, что в девятнадцатом году. Из одного огня выпархивает феникс, из другого выскальзывает саламандра, из третьего вообще ничего не добудешь, кроме пепла и костей.</p><p class="p1">Скорее всего разгадка была в том, что во всех изобразительных искусствах, от живописи до кино, в котором он много халтурил в предвоенные годы, мертвая натура была прекрасна и величественна, а в литературе — единственном из всех искусств, имевшем дело с живой душой, — мертвечина оставалась мертвечиной. Все, даже музыка, было телом культуры, монументальным и музейным телом, в одной литературе дышала душа — и если переставала дышать, слово было только бесчувственной материей. Нечто подобное он еще в начале двадцатых понял об авангарде. Авангард был прекрасен в живописи, в архитектуре, в теории, но в литературе невыносим — нельзя было читать футуристов, немыслимо скучны были эпигоны Белого, так и сяк ломавшие язык. Это была мертвая масса, нечем вздохнуть. Поэтому он не любил романа, не верил больше в роман. Роман был домом новой постройки, многопудовым, каменным, с тою только разницей, что жили в нем такие же мертвые кирпичи под разными именами. Теперь надо было писать совсем коротко, он знал уже, как надо, но не спешил. Сперва уехать очень далеко, спрятаться.</p><p class="p1">Эренбургу он позвонил из уличной телефонной кабинки. Было странно, что столько всего изменилось в городе, а телефоны прежние. Пожалуй, ни в ком Бабель не был уверен так, как в Эренбурге: менялись те, кто мог ломаться, а этот всегда только гнулся. Вода принимает форму колбы, стакана, шприца, но форма сосуда не влияет на состав воды. Это свойство стоило уважать: он и в Париже, и у нас, и, верно, в первой своей загранице, году в пятнадцатом, когда они еще не знали друг о друге, был один и тот же.</p><p class="p1">В сущности, слово «еврей» ни о чем не говорит, оно еще шире, размытее, чем слово «русский». Есть иудей, есть жид, есть хасид, рабби, шлимазл, жовиальный одессит, есть несколько женских типов, которые он склонен был называть скорее по именам, ибо типы эти ему встречались, со многими был он близок. Но если был на свете еврей, именно еврей, чистый еврей, то это был Эренбург.</p><p class="p1">В нем доминировала единственная еврейская черта — точнее, сплав их, чудный синтез независимости и приспособляемости не только не исключающих, но обусловливающих друг друга. Он соглашался на все, прилаживался к любой среде — лишь бы сохранить что-то свое, совершенно от среды не зависящее. Бабель и сам затруднился бы сказать, что это было: вольномыслие? скепсис? жалоба? Печально-юродивое «нет», которое еврей говорит Творцу, тогда как все говорят только «да», тысячу раз «да» и «спасибо»? Бабель любил этот его анекдот, любил и всю эту книгу, в которой сквозь газетную скоропись проглядывала неодолимая тоска внутренней пустоты. Может быть, евреев гнали во все времена именно за то, что они догадались об этой пустоте и служили миру вечным напоминанием о ней; во всяком случае, бешеная их деятельность шла только отсюда. Все это — забалтывание бездны, заплетание ее нитями кропотливого и бессмысленного труда, вся цель которого была в том, чтобы забыть про отсутствие цели. Эту сосущую, свербящую пустоту чувствовали в них, и ей-то благодаря они были так неуловимы, неистребимы. Еврей на всем рисовал вопрос. Иудей знал, зачем живет, и чувствовал в тощих своих чреслах великую мощь Творца; одесский налетчик знал, зачем он живет, и даже иной шлимазл умудрялся выстроить себе мироздание по мерке; но еврей, истинный еврей, трусливый и независимый, неутомимый и робкий, знал, что ничего нет. Для него материя мироздания исчезла задолго до ошеломляющих открытий молодого века. Эренбург был такой еврей — лихорадочно-пустой, и за одно то, что никакому убеждению, никакой цельной системе не позволял он заполнить свою бездну, вечно носимую внутри, Бабель уважал его особо. Не важно было, что он пишет. Все, что он писал, только подчеркивало свистящую эту пустоту, как гипс, залитый в пустоты помпейского пепла, лишь яснее обозначал их.</p><p class="p1">Даже война ничего не изменила в нем, хотя сделала ему имя, настоящее имя, которого не сделали ни стихи, ни проза. Его фельетоны и передовицы, часто водянистые, всегда избыточные, потому только и читались, что он со своей вечной незаполненностью пытался понять всех: для него и немцы были люди, жалкие, обманутые люди, и потому чтение его статей было утешительно. Враги в его показе были не иноприродными существами, которых так боялись поначалу, а конкретные, со своими семьями и страхами курты и фрицы, и уж обычных-то людей нам, все-таки не совсем людям, грешно было не побить.</p><p class="p1">Бабель знал, что сам Эренбург к телефону не подойдет, не тот масштаб. Но знал он и то, что Эренбург в Москве: позавчера выступал на конгрессе, он всегда выступал на конгрессах, для того и держали. Ему все равно было, о чем говорить и с кем. Скулящая от огромности мировой пустоты душа его не принимала в этом участия.</p><p class="p1">— Вас слушают, — казенно сказал женский голос — секретарша или домработница.</p><p class="p1">— Скажите Илье Григорьевичу, что с ним хочет говорить Исаак Эммануилович, он знает, — быстро проговорил Бабель, не забывая поглядывать по сторонам маленькими, но зоркими глазами в круглых очках.</p><p class="p1">Эренбург, конечно, ничего не понял. Бабель услышал его ворчание.</p><p class="p1">— Илья, я в Москве и хочу вас видеть, — так же быстро сказал Бабель в ответ на его хмурое «Слушаю». Этой фразой — «Я в Москве и хочу вас видеть» — начинал он всегда их все более редкие разговоры; вечно один не заставал в Москве другого.</p><p class="p1">Эренбург осип от волнения, Бабель услышал, как он прочищает горло.</p><p class="p1">— Иса, — выдавил он со второй попытки, — Иса, я знал. Ничего не говорите. Или вы можете?</p><p class="p1">— Я могу говорить, но надо увидеться. К вам лучше не надо. Где и когда вам будет удобно?</p><p class="p1">— Может быть, у Герцена? — привычно спросил Эренбург, но тут же смешался: — Простите, я просто… я всегда знал, но сейчас стал совсем дураком от неожиданности.</p><p class="p1">— Ильюша, вы неисправимы. И я даже рад, что вы так неисправимы. Вы забыли, что я и раньше никогда не ходил к Герцену. Если вас не смущает такая перспектива, встретимся на Гоголевском бульваре, у фотоклуба. У вас ведь теперь автомобиль с шофером?</p><p class="p1">— Да, — ответил Эренбург с гордостью, которую не успел спрятать.</p><p class="p1">— Так оставьте ваш автомобиль где-нибудь в начале бульвара и подходите пешком. Мы с вами на этой лавочке однажды сидели, помните, когда встретили старуху…</p><p class="p1">— Господи! — воскликнул Эренбург. — Он помнит старуху! Скажите, но где вы остановились?</p><p class="p1">Голос его ничуть не изменился, и такая же, почти женская, наседочья забота звучала в нем иногда.</p><p class="p1">— Мне останавливаться незачем, — сказал Бабель. — Если есть дела, отменяйте: я завтра уеду, а поговорить надо.</p><p class="p1">Он действительно ничуть не изменился, и та же нераздельная смесь трогательного и отталкивающего, трогательно-отталкивающего была в нем. Это сочеталось, как полет и шарканье его походки — хлопотливая устремленность вперед. Так же шаркали отступления в его романах, хороших репортерских романах, испорченных потугами на эпос. И так же он говорил «Иса». Всегда хотел быть немного европейцем, или азиатом, или кем угодно, но только не тем, кем был. Вода искала сосуд, боялась пролиться… Однажды даже Павленку назвал Пьером — тот дернулся, как дернулся бы русский рабочий, предложи ему собственная жена французскую любовь. Иса — это было скорее по-кавказски, угадывались бурка, шашка, словно намек на кавалерийское прошлое.</p><p class="p1">Когда-то на этой же лавке, шестой от храма Христа Спасителя, сидели они с ним, только что посетив «Землю и фабрику», выпив чаю в кабинете уютного, по-хохлацки располневшего Нарбута, обреченность которого как-то стушевалась и заплыла, перестала напоминать о себе. (Он знал про Нарбута, его взяли раньше; думал спасти жену, подписал все и выжил бы, но он был калека, а у калеки шансов не было. Калеке надо было стоять до конца, терять нечего. Впрочем, много ли знаем мы о том, что делают с другими?) Тогда, в апреле, звонким и блещущим днем они вышли из «ЗИФа», что располагался на Варварке, и побрели, беседуя, благо делать было нечего, по Бульварному кольцу — до «Художественного» и дальше; здесь присели, и Эренбург закурил отвратительно зловонный «Норд». Он и курил быстро, жадно и так же ел и не мог наесться.</p><p class="p1">Шел разговор, чуть ли не первый у них настоящий, — Илья, конечно, играл немного в ученика, подшучивал, обращался «мэтр» (Францию любили оба). Мимо спешили какие-то счастливые люди, гулко щелкали копытами лошади, пахло навозом, землей, мокрой корой, — но тут напротив них остановилась высокая грузная старуха, явно из бывших, хотя такое же величавое достоинство видывал он подчас и у самых простых крестьянок. Она остановилась, пристально вгляделась и сказала неожиданно высоким для ее фигуры голосом:</p><p class="p1">— Вы думаете, мы всю жизнь будем за вас платить? Нет, любезные, сперва мы за вас, потом вы за нас. Так колесико и движется.</p><p class="p1">Оба они смутились, хотя Эренбург и крикнул в ответ что-то дерзкое: мол, пошла вон, карга, мы по субботам не подаем, — но настроение было испорчено надолго. Не в обиде на жидов было дело, понял потом Бабель. Колесико действительно так и двигалось, только ускорилось до того, что между «ними» и «нами» почти не осталось разницы.</p><p class="p1">Теперь они стояли перед той же лавкой; Эренбург неуклюже обнял его и сразу отстранился. Бабелю было это больно. Он совсем было позабыл при виде не меняющегося друга, что сам-то теперь построен из другого вещества, людям неуютно рядом с ним. Нет, к Тоне нельзя ни в коем случае…</p><p class="p1">— Вы совсем вернулись? — спросил Эренбург, чтобы заполнить паузу.</p><p class="p1">— Я был не в лагере, — ответил Бабель, — была одна работа, она и есть, она еще не кончена.</p><p class="p1">— Рудники? — с ужасом спросил Эренбург. Он, как всегда, знал все слухи.</p><p class="p1">— И не рудники. Будет время, я скажу вам. Как вы, Ильюша, чтбо вы? Я мало знаю о вашей жизни, хотя много читал…</p><p class="p1">— Последний роман не читали? — оживился Эренбург. — Думаю, стоящий. Впервые за много лет почувствовал, что дал Европу, живую Европу. — (Выражения типа «дать» или даже «дать вещь» остались от конструктивистов: тот же производственный подход, делатели вещей, дежурная просьба о включении литературы в пятилетний план, чтобы потом отчитаться…) — Но что я! О себе говорите, о себе! — И он стеснительным жестом погладил рукав бабелевского пропыленного пиджака.</p><p class="p1">Бабель покачал головой, глядя поверх очков. Ильюша не менялся, и не менялось все кокетливое, комическое, неприятное в нем. Впрочем, одно неприятное и не меняется, спасибо ему, низкий поклон! Что в нем-то самом изменилось, кроме страсти все за всеми замечать? Читал ли он последний роман! Допустим даже, что там, где он был (мало ли какие бывают опасные задания), у него находилось время и возможность читать советские новинки, — но начать разговор с этого… Эренбург и у известной стенки спрашивал бы целящихся, читали ли они последний роман и что о нем думают. Проклятое ремесло, заставляющее считать свои буковки смыслом и оправданием мира. Люди, люди, что с вами сделаешь! Как говаривал один его неслучившийся персонаж, все дожидавшийся очереди, но так, кажется, никуда и не вставленный, — гомельский сапожник, нещадно колотивший ученика: «Сколько ни колоти, толку не выколотишь. Если бить мясо, так можно сделать отбивную, но осетрину вы уже не сделаете. Если бы наверху это понимали, так все давно бы уже было иначе. Но если все только гладить и облизывать мясо, то и отбивной не получится», — добавлял сапожник. Что ж, в словах его был резон. Интересно, какие у него вырастали ученики. Скорей всего как у всех — из имеющих склонность к ремеслу толк получался, из остальных выходили мученики.</p><p class="p1">— Ильюша, — помолчав, заговорил Бабель, — я не могу вам всего рассказать, но многие догадки наши были верны. Я вижу, вас узнают. Пройдемся, чтбо сидеть у всех на виду.</p><p class="p1">— Ждет машина, — предложил Эренбург. — Едем ко мне?</p><p class="p1">— Нет, не нужно. Погулять хочу, давно не был в Москве.</p><p class="p1">Они встали и чинно пошли по бульвару, свернули на Сивцев Вражек — там меньше было народу, — и Эренбург закурил; он курил теперь длинные, изящные папиросы с золотым ободком, из коробки с надписью «Советская Украина». Вероятно, их подарили ему на каком-то юбилее советской Украины. Он порывался заскочить в маленький книжный магазин на Арбате, купить Бабелю свой последний роман, но Бабель спешил. Он не забывал поглядывать по сторонам: нет, слежки все не было.</p><p class="p1">— Вы хотя бы пишете там, Иса? — спросил Эренбург.</p><p class="p1">— Пишу, пишу. Я напечатаю скоро. Но позвал я вас не для того, чтобы говорить о литературе. Я вас должен предупредить: вас могут взять.</p><p class="p1">Лицо Эренбурга побелело, колени подогнулись. Странно, что он до сих пор так боится.</p><p class="p1">— Я знаю, — пролепетал он.</p><p class="p1">— Не вас лично, — поморщился Бабель, — взять могут любого. У вас столько же оснований бояться, как у всех. Я только хочу сказать: если вас возьмут, подписывайте все. Не больше, чем вам предъявят, но и не меньше. Рассказывайте, кайтесь, придумывайте подробности. Они не очень хорошо умеют придумывать подробности. Помогайте следствию, вы же писатель. Главное — не упорствуйте, что ни в чем не виноваты. Будут пытать, а конец все равно один. Если во всем сознаетесь, что было и чего не было, поедете в лагерь, ну, дадут вам пять или семь… Выживают люди.</p><p class="p1">— Я знаю, — кивнул Эренбург, — Заболоцкий вернулся… Я думал, что и вы вернулись…</p><p class="p1">— А он вернулся? — оживился Бабель. — И что, печатается?</p><p class="p1">— Да, у него взяли два стихотворения, чтобы разругать. Он теперь долго не высунется. Переводит в основном. Переменился очень, постарел, худой…</p><p class="p1">— Ну, худой — не страшно. А то совсем был поросенок. Видите, пишет… Главное, помните: если вас берут — это не значит, что вы провинились. Это значит, что вы нужны, что идет проверка — и надо соглашаться, понимаете, соглашаться. Вы, может быть, думаете, что меня подослали. Нет, Ильюша, хотя я не знаю, какие вам дать доказательства. Поверьте мне, ведь вы знали меня.</p><p class="p1">Он отметил про себя это «знали» в прошедшем времени и подумал, что его язык умнее его.</p><p class="p1">— Я думал, вас нет больше, — тихо сказал Илья.</p><p class="p1">— В известном смысле нет, то есть здесь нет, в литературе нет… Ну, в литературе давно не было — так, обозначался, чтоб не подумали, будто совсем потерял дар речи. Я ведь не писал ничего, вы знаете? Роман, новый цикл — все вздор: было тридцать папок начал и концов, набросков, цельного куска ни одного. Я только там опять начал писать, там много любопытного.</p><p class="p1">— Вы — там? — мотнул головой Эренбург, указывая куда-то, где, видимо, рисовалась ему заграница.</p><p class="p1">— Нет, я внутри страны, тоже дел хватает. Был во время войны в Белоруссии, был в Польше, прошел по старым конармейским местам… Думаю сделать добавления в книгу, — легко соврал он, хотя про Белоруссию и Польшу — правда: был туда заброшен, организовывал партизанский отряд. Отряд действовал удачно, много деревень пожгли за его удачные действия. — Я немного знаю вас, Ильюша, и люблю, поверьте мне. Именно поэтому я не говорю вам всего, легкая, открытая вы душа. Вы ни одного услышанного слова не можете удержать в себе: бурлите, клекочете. Иногда надо поверить на слово. Меня к вам не подсылали, я не агент, не шпион, я не работаю в разведке. Я был довольно близок ко всем этим делам, ходил в известные дома, но их человеком никогда не был, вы знаете. Мне только хочется вас избавить от лишних мучений. Многие из тех, кто упорствовал, спасли себя, купили жизнь. Так купил ее и я, хотя заплатил подороже, чем надо: она не стоит столько. Я не признал ничего. Но вы до конца не выдержите, а тех, кто сдается на полпути, не ждет ничего хорошего. Поэтому я говорю вам: сдавайтесь сразу. Этим вы ничего не измените, никого не предадите. Сами не называйте имен, но если они про кого-то спрашивают, значит, человек уже на карандаше и вы не навредите ему.</p><p class="p1">— Вас спрашивали про меня? — снова бледнея, прошептал Эренбург.</p><p class="p1">— Про вас — нет, — соврал Бабель. — Но слушайте дальше, я перехожу к трудным вещам. Они берут не для того, чтобы осудить. Они просто расставляют людей по местам, потому что только так можно проверить, кто к чему годен. Им кажется, что такой предельной проверкой можно правильно разделить общество. Молоку, верно, тоже несладко в сепараторе, а? Раньше был принцип: кто сколько сделает; потом пришли суровые времена, и они придумали принцип: кто сколько выдержит. Тех, кто выдержит все, они используют, тех, кто ломается, — выбрасывают; правильнее всего поведут себя те, кто сразу откажется играть в эту игру и предоставит им наговаривать на себя что вздумается. Такие получат по пять или семь лет и вернутся.</p><p class="p1">Они шли мимо школы, в которой заканчивались приготовления к началу осени: дети, уже вернувшиеся с каникул, подметали площадку перед входом и собирали ветки, другие украшали лозунгом вход, два мальчика красили решетки.</p><p class="p1">— А что, девочек теперь не берут на субботники? — спросил Бабель. — Берегут?</p><p class="p1">— Вы не знаете? — вопросом на вопрос ответил Эренбург. — Теперь обучают раздельно. Где же вы все-таки были, что не знаете таких базовых вещей?</p><p class="p1">— Там детей не было, — вздохнул Бабель. — Вы не думайте, Ильюша, — это же отдельный, особенный мир, в нем своя иерархия и множество провинций. В аду есть истопники, есть наблюдатели и есть грешники. Я думаю, грешникам лучше всего. Их помучают, очистят от грехов и выпускают. А истопникам и наблюдателям торчать там вечно. В аду лучше быть гостем, чем хозяином, вы не находите?</p><p class="p1">— Пожалуй, — как бы нехотя согласился Эренбург. — А вы меньше изменились, чем кажется. Я хотел бы почитать, что вы пишете.</p><p class="p1">— Почитаете, — пообещал Бабель. — Но если я действительно мало изменился, вы поверите мне и не будете играть в их игры. Знаете, что самое главное? Главное — не принимать их условия. Я пытался это делать тут, но там не сразу сориентировался. Ведь они действуют как? Я тоже не сразу это понял, но теперь могу примерно сказать: главное — они хотят, чтобы вы играли по правилам. А сами могут делать что угодно. Они хотят, чтобы вы были последовательны, а сами сделают свою прямую такой извилистой, что вы концов не найдете. Главная задача — повернуть так, чтобы вы были не правы. Так будьте не правы с самого начала — тогда с вами уже никто не сделает ничего.</p><p class="p1">— А вы? — спросил Эренбург. — Как было с вами?</p><p class="p1">— Я — другое дело, — неохотно отвечал Бабель, — я думал сначала, что если упереться, то можно их заставить пойти на попятный. В результате они сохранили мне жизнь, дали даже работу, но это только мой вариант, другим он не годится. Они все равно возьмут свое. Если вы выдержите все, — предположим такой немыслимый случай, — они заставят вас делать все, что угодно, думая, что вам теперь все равно, раз вы железный. И вы будете это делать ради них. Все, что вы делаете, будет ради них, в том-то и штука. Вы все равно не поймете сейчас, о чем я говорю. Поэтому просто послушайтесь и сразу признайтесь: тогда они по крайней мере не смогут сначала мучить, а потом использовать вас.</p><p class="p1">— Нет, я пойму, — неожиданно сказал Эренбург, — я давно догадываюсь. Знаете, Иса, это к лучшему, что вы сейчас не в Москве и что вас вообще не видно. Я знаю по некоторым признакам… и говорят… — Он приблизил губы к уху Бабеля и зашептал с лихорадочной быстротой: — Скоро возьмутся за нас. Будет государственный погром.</p><p class="p1">Бабель в изумлении посмотрел на него поверх очков. Он не совсем еще разучился удивляться.</p><p class="p1">— Очень интересно.</p><p class="p1">— Да, да… Они готовят большой погром, мы уже не смогли напечатать книгу о фашистских зверствах на оккупированных территориях, уже считается, что победил один русский народ… Они начинают издали, но метят в нас. Сначала ругают Запад, потом преклонение перед Западом… я знаю, знаю. Следующие будем мы. Может быть, это тоже испытание — в конце концов, он семинарист, он мог читать, что Бог испытывает свой народ. Но скорее всего мы ему просто надоели. Я думаю, вы преувеличиваете, говоря про испытание. Вас одного могли оставить в живых чудом, вспомнить заслуги, талант… Может быть, им нужен свидетель их небывалых дел, когда можно будет рассказать… Они же так любят дарить писателю бесценный опыт. Но здесь все будет без испытаний, они просто возьмут и натравят на нас остальных, — (он даже тут не сказал «русских», он любит русских, подумал Бабель). — Вы знаете, это легко.</p><p class="p1">Насчет испытания Бабель разубеждать не стал. Ни к чему рассказывать про Чистое: не запрет, но стыд подсказывал ему молчать о поселке. Вообще говоря, идея разобраться с евреями была по-своему красива, была роскошной иллюстрацией той непоследовательности, которая составляла главное условие всех побед. Только что мы спасли еврейский народ и тут же показали ему, кто теперь Бог Израиля. В этом внезапном повороте чувствовалась почти библейская мощь. Значит, рассортировать евреев, сделать отряд НАШИХ евреев… остальных можно в пыль — ненадежный сорт… Черт, может, они это смекнули, глядя на меня? Я ведь был у них на хорошем счету, говорили, что такого подрывника поискать… Да, что бы ты ни делал, всегда играешь в их игры. Но с другой стороны… с другой стороны, тут была последовательность особого рода — последовательность неумолимого, самого точного выбора; он знал ее за Верховным и сейчас опять поразился его чутью. Отбирать из уже избранных, отфильтрованных веками гонений, закаленных тысячелетиями скитаний… странно, что он не начал с нас, но поначалу еще надо было соблюдать видимость всеобщего равенства. Теперь можно переходить к нам; да, да, прицел был таков с самого начала. Как странно, что даже в худших своих предположениях я до сих пор не поспеваю за ним! Все дело в том, что он всегда играет на повышение: не успеваешь научиться жить без одной руки, как тебе обрубают ноги…</p><p class="p1">— Я не исключаю, — медленно проговорил Бабель, — хотя не знаю всего. Но думаю, что мой совет верен и в этой ситуации. Кайтесь в любых грехах.</p><p class="p1">— Как Бухарин, — прошептал Эренбург еле слышно.</p><p class="p1">— Бухарин — отдельный случай, сам из них, — быстро ответил Бабель. — Бухарин был ближний круг и так легко сломался, им это казалось предательством. Остальные — совсем не то, их не убивали. И вас не убьют, не та вы шишка, чтобы они считали вас своим. А если убьют — надо иметь в виду и такой вариант, его всегда надо иметь в виду, — вы по крайней мере умрете человеком. Не животным, ползающим в своих испражнениях, а человеком.</p><p class="p1">— Человеком?! — возмущенно переспросил Эренбург. — Все признать, оговорить себя — это вы называете хорошей смертью?</p><p class="p1">— Хорошей смерти не бывает, — улыбнулся Бабель. — Бывает плохая и очень плохая. Та, о которой я говорю вам, — не худшая.</p><p class="p1">— Иса, вы живы? — спросил вдруг Эренбург. — Мне кажется, что вас послали не они, а какая-то, — он усмехнулся, — более высокая инстанция.</p><p class="p1">— Это опасное заблуждение, — сказал Бабель. — Чрезвычайно опасное. Большой наш порок, что мы все время думали, будто они имеют какое-то отношение к более высокой инстанции. Будто она посылает нам что-то через них. Нет, Ильюша, у них свои промыслы, а там — свои.</p><p class="p1">— Там мы тоже всегда проигрываем, — скептически улыбнулся Эренбург.</p><p class="p1">Он был все тот же Эренбург, трусливый, но говорящий «нет»; очень может быть, что и «нет» свое он говорил из трусости, не желая признать правоты за кипящей, кровавой, огненной лавой жизни, — но за этой лавой и не было никакой правоты. Надо ли было вариться в ней всю жизнь, чтобы понять это? Не всегда надежный, тщеславный, как все данники их постыдного литературного дела, он во всех компромиссах сохранил свое отрицание — такое отрицание, что на фоне его было все равно, к чему приспосабливаться. Да, это был все тот же Эренбург, но они не виделись десять лет, и он понял теперь, как все-таки любил его, бедного.</p><p class="p1">— Не думаю, — ответил Бабель. — Там мы проигрываем не всегда. Ну, поговорим позже.</p><p class="p1">Странно, что Илья не победил еще в себе страха. Не дай Бог, чтобы страх этот из него выбили следовательскими кулаками. Пора было идти. Бабель не знал, увидятся ли они еще, но почти не сомневался, что Эренбургу придется идти по своим кругам: кажется, он сделал все, чтобы дать ему шанс на спасение. Страшно было отпускать его туда, но и прятать некуда.</p><p class="p1">— Вас они не убьют, — вдруг успокоил его Бабель. — Вы слишком фигура, чтобы вас убить, сделать врагом. Вы им нужны будете живой. Сделайте, как я сказал, и будете живы. Это я говорю вам верно. Ну, свидимся.</p><p class="p1">Он быстро и неловко обнял Эренбурга и пошел прочь.</p><p class="p1">— Иса! — крикнул Эренбург вслед. — Вы появитесь еще?</p><p class="p1">Он обернулся, кивнул и ускорил шаг.</p><p class="p1">Только одного еще человека надо было повидать непременно, и человек этот был Олеша — чудом уцелевший, обреченный еще в тридцать седьмом. Все, кого Бабель в тех кругах знал, прозрачно намекали: Олеша ведет себя неправильно. Одно время Бабель думал, что это хитрость (он во всем тогда видел многослойную, сложную хитрость, пока не догадался, до чего все просто). Многие думали, что Олешу, со всеми его ресторанными филиппиками и салонной фрондой, не трогали именно из-за этого: ходил в осведомителях… Но в осведомителях он не ходил. Бабель был уверен на протяжении своей жизни в пяти-шести друзьях, из них до сего дня дожили трое, двоих он уже предупредил.</p><p class="p1">У Олеши телефон сменился, но Бабель знал, где можно найти друга. Был никому не ведомый шалманчик у Белорусского вокзала, туда Олеша ходил во дни безденежья. Судя по атмосфере, дела его не могли быть блестящи. Это до войны он хаживал в «Националь». В сущности, предупреждать его было ни к чему: он был теперь, видимо, почти руина, таких не брали. Разрушать себя он начал давно и целенаправленно, вообще был педантом, и это был лучший выход: опередить на ход, успеть раньше, чем тебя разрушат они. Его потому и не взяли в тридцать восьмом, что, по сути, уже и в тридцать шестом-то нечего было брать. Эренбурга Бабель уважал за самосохранение, Олешу — за самоуничтожение, в котором он опередил собственную судьбу. Такая игра дорогого стоила.</p><p class="p1">Бабель успел выпить две кружки пива, стоя за грязным мраморным столиком. Неопрятный старик, сутулившийся рядом, предложил ему вяленого леща, Бабель поблагодарил и взял. За окном стал сеять дождь, уже не тот, что утром, — буйный, освежающий, — а мелкий, тихий. Бабель не услышал, а увидел его косой пунктир на стекле, которое с каждой минутой мутнело и синело. Бабель никогда не понимал, как можно написать московский пейзаж: в московском пейзаже не было красок.</p><p class="p1">Олеша пришел к девяти вечера, уже пьяный, в грязном черном пальто, несмотря на теплынь: пусть дождь, но не ходить же летом в этом убожестве! Первый признак разрушения — все время мерзнешь: все виденные Бабелем бродяги и старые, потерявшие удачу воры были в сальных тряпках, облезлых кацавейках. Олеша постоял на пороге, выискивая знакомые лица, увидел Бабеля и без тени изумления или страха направился к нему.</p><p class="p1">— Здравствуйте, Бабель, — сказал он.</p><p class="p1">Старик рядом кивнул Олеше и не обратил ни малейшего внимания на произнесенную фамилию: был поглощен своей рыбой.</p><p class="p1">— Хорошо, что вы пришли. В последнее время все такая дрянь ходит. Вчера был Авербах.</p><p class="p1">Авербах подписал все, оговорил тьму народу, каялся, но его пощадить не могли: своих не щадили. Дали власть, а он не оправдал.</p><p class="p1">— Ходит кто попало, — продолжал Олеша, не делая пауз для возможного ответа собеседника. Он давно привык работать в режиме монолога: некому было поддерживать блестящий разговор, и не призраку же предоставлять слово для ответа. — Был Воронский, был Дементьев. Мейерхольд никогда не придет, он мне не может простить, что я не защитил Зину. Что же я мог? Маяковский не ходит, он верил в меня, а я не оправдал его надежд. Но то, что я делаю здесь, тоже искусство.</p><p class="p1">Это было немного театрально, но, в общем, неплохо. В конце концов, лучше, чем эпопея. В некотором смысле он изобрел новый жанр, но в нем мог работать только сам. Хорошо, что меньше стало метафор: они отвлекали от сути и резали глаз, в то время как основной язык, язык чувств и характеристик, был бедноват. Олеша умел сравнить так, чтобы было видно, как он умеет сравнить, но не так, чтобы было видно предмет.</p><p class="p1">— Неплохо, — честно одобрил Бабель. — Но надо записывать, или это умрет с вами. Может быть пьеса, монопьеса. Вы один говорите со всеми, их не видно, зритель видит только вас, но для вас они реальность.</p><p class="p1">— Я остыл к театру, потому что мне не нравятся его люди. — Олеша достал из кармана ополовиненную чекушку и прикончил в один глоток. — Я любил Мейерхольда, но он бросил меня. У Мейерхольдов было так: они брали человека, приближали к себе, делали своим, а потом выбрасывали, потому что увлекались новым. Я должен был к этому готовиться, но я — другое. Лисица знает множество вещей, еж знает одну большую вещь. Я всю жизнь думаю об одном и том же — о моем праве на жизнь. Мейерхольд думал о тысяче разных вещей, и я быстро наскучил ему. Я наскучил всем, а вы меня терпите только потому, что вас тоже интересует одна большая вещь. Вас интересует гибель, а я гибну. И вы смотрите.</p><p class="p1">— Я бы даже сказал — любуюсь, — ответил Бабель, действительно любовавшийся.</p><p class="p1">— И что, узнали вы там наконец, как это бывает?</p><p class="p1">— Как это бывает, я знал и здесь. Но что это такое, не понял до сих пор. Самое обидное, что ты и там этого не понимаешь. Более того: чаще всего даже не замечаешь, в какой именно момент это с тобой происходит.</p><p class="p1">— Но вы в раю? Я надеюсь, что вы в раю.</p><p class="p1">— Нет, друг мой, все не так просто.</p><p class="p1">— Минуту, минуту… Это интересно. Вы подождете, пока я возьму себе пива?</p><p class="p1">Бабель хотел было попросить, чтобы он взял и ему, но понял, что это будет нарушением правил, и молча кивнул. Олеша вернулся с двумя кружками, обе поставил перед собой и тщательно сдул пену с первой.</p><p class="p1">— Ну так продолжайте. Вы начали про рай.</p><p class="p1">— Я не был еще в раю, — ответил Бабель. — Был в аду, поварился там, надоел всем. Полагаю, что главные грехи мои искуплены. Теперь я в чистилище — какой-то полусвет, столы, кружки… Сегодня ночью меня переводят в рай.</p><p class="p1">— Остро… — Олеша взглянул на него исподлобья. — Из вас не выварили яда в вашем аду. Если это чистилище, то здесь неплохо. Пиво только дрянное, но оно везде теперь дрянное. Все теперь дрянное. Раньше было качественнее: и мучители, и мученики, и пытки. Теперь так себе, отрабатывают жизнь спустя рукава…</p><p class="p1">— Имеете двадцать копеек, — сказал Бабель.</p><p class="p1">— Нет, нет, меня тоже коснулось это обесценивание. Разве так я говорил раньше? Впрочем, вы не помните, там, говорят, отмирает память…</p><p class="p1">— Врут.</p><p class="p1">Олеша его не услышал — шел новый монолог:</p><p class="p1">— Но я еще могу придумать сюжет. Хотите сюжет? Вам все равно не пригодится, но если вдруг в раю потянет писать — берите. Некий изобретатель… психолог… вдруг открывает, что каждого человека можно свести с ума, подобрав к его рассудку особый код. Сказать несколько слов, и вы ребенок, или маньяк, или растение — без чувств, без мыслей… Он забавляется, подбирая эти ключи, изучая биографии, ставя опыты… И знаете ли, что выясняется? Чтобы девушка, чьей любви он домогался, утратила всякую волю к сопротивлению, ей надо прочесть древний воинственный гимн — настолько сильна ее ненависть, настолько тверда воля. Гимн войдет в резонанс с ее ненавистью, как рота солдат с мостом, и сопротивление рухнет. Но самое странное, что надо сделать, чтобы свести с ума местного тирана. Надо прочесть ему детскую считалку: эники-беники ели вареники. Ведь он дитя, всего только обиженное дитя… Самые страшные существа в мире — обиженные дети. В сущности, я всю жизнь только тем и занимаюсь, что ищу такие ключи, но пока свел с ума только себя самого…</p><p class="p1">Старик, предложивший Бабелю вяленого леща, в испуге взглянул на Олешу и, не допив кружки, с неожиданной для него быстротой вышел.</p><p class="p1">— Вот еще один, — улыбнулся Бабель.</p><p class="p1">— Да, я мог бы написать это… но теперь большие вещи уже не для меня. Я могу теперь писать только крошечные кусочки — по одной, по две фразы. Это конец, распад. — Олеша сделал огромный глоток.</p><p class="p1">— Вы напоминаете мне птицу, — по привычке оглянулся Бабель. — Вы напоминаете мне птицу, которая научилась летать и жалуется, что не может больше ходить. Зачем писать романы? Это мертвый жанр, жанр детства человечества. Посмотрите, все уменьшается, стремится к миниатюре. Мы доживем еще до переносных радио, до крошечных пишмашинок, которые сами бегают по листу, управляемые, может быть, движением вашего глаза… Литература сведется к рассказу, а рассказ — к слову, знаку. Пишите свои отрывки, составьте из них книгу, и это будет книга вашей жизни.</p><p class="p1">В глазах Олеши, впервые за время разговора, загорелась надежда.</p><p class="p1">— Вы думаете? — спросил он.</p><p class="p1">— Думаете вы, — ответил Бабель. — Я только выражаю ваши собственные тайные мысли.</p><p class="p1">— Но что, если вы живой? — спросил Олеша. Как все настоящие, законченные алкоголики, он ненадолго трезвел от выпитого, чтобы потом окончательно обвалиться в беспамятство.</p><p class="p1">Бабель опять усмехнулся: забавно. Эренбург боялся, что он мертвый. Олеша боится, что он живой.</p><p class="p1">— Я вам подарю сюжет для пьесы. — Бабель снова оглянулся. — Разговаривают двое, и каждый уверен, что собеседник мертв. В некотором смысле оба правы. По крайней мере можно ничего не скрывать. Это единственная форма откровенного разговора.</p><p class="p1">— Слушайте, — сказал Олеша с неожиданно жалобной нотой в голосе. — Почему меня не берут? Я что, полное ничтожество?</p><p class="p1">— Будет вам, — успокоил его Бабель. — Это не критерий. А насчет книги отрывков правда подумайте. Я с удовольствием прочел бы ее. Мне пора. Будете в Одессе, заглядывайте.</p><p class="p1">— Так вы в Одессу?</p><p class="p1">— Думаю, да, — сказал Бабель. — Какой еще рай они выдумают, кроме Одессы? Впрочем, знаете, иногда я думаю: а вдруг и в раю все то же, только более высокого порядка? Опять кого-нибудь убивать… Мне начинает даже казаться, что у вас в чистилище лучше. Как на ваш вкус?</p><p class="p1">Но Олеша уже не ответил ему. Кратковременное оживление прошло, взгляд его сделался бессмысленным, нижняя губа безобразно отвисла. Красивого разложения не бывает. Бабель положил под его кружку несколько купюр и вышел в дождь.</p><p class="p1">Наутро Олеша проснулся и смутно припомнил разговор. Приходил Бабель, да; подсказал идею с книгой короткой прозы… Но Бабеля давно нет. Это говорил его собственный больной рассудок, ведь слова его галлюцинации — его слова. Значит, мозг нащупал выход. Надо только писать каждый день, пусть хоть строчку, но каждый день. Он так и думал до конца дней, что сам это изобрел.</p><p class="p1">Поезд в Одессу отходил с Киевского вокзала в двадцать три пятнадцать. Бабель взял билеты еще с утра, дел в Москве больше не было, он не спеша добрался на троллейбусе «Б» до Смоленской площади и пешком перешел Бородинский мост. Вокзальная площадь была перегорожена: строилось метро. Он подходил уже к башне вокзала, когда услышал сзади окрик:</p><p class="p1">— Майор!</p><p class="p1">Народу в этот час было мало. Окрик мог относиться только к нему, надежду следовало оставить. Майора он получил после Кракова. Обернулся.</p><p class="p1">— Большой город, а не разминешься, — сказал Сутормин.</p><p class="p1">Сутормин попал к нему в группу в конце сорок третьего, когда набора в Чистое уже почти не было. Серьезный был малый, потому и взяли.</p><p class="p1">— Здоров, лейтенант, — сказал Бабель.</p><p class="p1">— Куда собрался?</p><p class="p1">— Что мне тут делать, я на родину поеду.</p><p class="p1">— А жена, дети?</p><p class="p1">— Сын давно с другим папой, жену пугать не хочу.</p><p class="p1">— А я гуляю, майор. Тут в вокзальном буфете до утра наливают, икорка, культурненько… Слышь, пошли бы опрокинули грамм по двести.</p><p class="p1">— Не могу, поезд скоро.</p></span>
