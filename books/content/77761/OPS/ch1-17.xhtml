</div><p class="p1">Нам осталось досказать немногое.</p><p class="p1">Нам осталось рассказать, кто, собственно, позвонил Кате Скалдиной в тот день, пятого сентября, когда дети у них во дворе выкопали из песочницы красного целлулоидного пса.</p><p class="p1">Шестнадцатилетний племянник-хромоножка Марининой начальницы, Натальи Семеновны, которую взяли незадолго до Скалдина, оговорил себя, чтобы попасть к тетке, но оговорил так неумело, что к расстрелянной тетке, слава Богу, не попал и получил только пять лет. Следователь его пожалел и, конечно, отпустил бы, но мальчик пришел сам, и отпустить его было нельзя.</p><p class="p1">Он отсидел, выучился на фельдшера, выжил, срок истек в сорок третьем, держали до конца войны, но выпустили со стандартным поражением в правах «минус десять»; это значило, что десять крупнейших городов страны для него закрыты, и он поселился в Смоленске, просто потому, что врач, с которым он подружился в лагере, жил там и обещал его устроить.</p><p class="p1">В сорок шестом он приехал в Смоленск, в сорок седьмом устроился, в сорок восьмом женился. У него были теперь небольшие деньги: он работал медбратом в местном госпитале, начинал уже думать о высшем образовании, ведь он отсидел, искупил, могли принять в Смоленский мединститут. Ему нравился город с его знаменитым собором, с холмами, с католической строгостью, проступавшей в местных православных храмах, с добрыми светловолосыми девушками, с дружелюбным кружком местной интеллигенции. Два года он сидел тихо, на третий решил отдать один долг.</p><p class="p1">Дело в том, что перед самым его приходом к следователю — перед последней и отчаянной попыткой выручить тетку — он попытался пойти к ней на работу, поискать заступников, свидетелей ее сказочной добросовестности, но там от него шарахались, как от прокаженного. А ведь Наталья Семеновна помогала всем этим девушкам, хотя и была с ними строга, и одну отговорила от аборта, деликатно ссужала деньгами, хотя сама нуждалась… Только один человек выслушал его, напоил чаем и пожалел, и это была Марина Скалдина, чей муж скоро разделил участь его тетки.</p><p class="p1">Теперь он был не тот бедный мальчик с нервным тиком, а красивый, уверенный в себе мужчина, пусть хромой, пусть по-прежнему с легким подергиванием века, — но он выжил, прошел через многое, научился не бояться, драться, зашивать раны. Таким он мог показаться Марине Скалдиной. Теперь он мог ей помогать, был в госпитале на хорошем счету, и со времени его освобождения прошло два года — можно было попробовать хоть раз выехать в Москву и встретиться с единственным человеком, не предавшим и пожалевшим его. Он позвонил по межгороду — телефон помнил все десять лет, — Марины не было дома, дочка в школе, но старуха-соседка подтвердила, что они по-прежнему живут на Арбате. В конце концов, чем он рисковал? Многие освобожденные жили в Смоленске, у многих было минус десять, и все ездили в Москву — ничего, обходилось. Один даже был в Большом театре, слушал «Евгения Онегина» с Лемешевым. Как-никак, с войны прошло три года — паспортные проверки на улицах становились все реже, а от милицейского патруля в центре он легко убежал бы, отлично помня город. Центр, говорят, берегли — не перестраивали.</p><p class="p1">И вечером четвертого сентября, сказав молодой жене, что через день вернется, а сейчас поедет навестить одноклассника, племянник-хромоножка сел в поезд, а утром вышел в Москве. Он вез Марине денег и две банки маринованных грибов — теща отлично мариновала грибы. Букет он решил купить перед встречей.</p><p class="p1">Он растворился в московской толпе, погулял по городу, дождался, пока школьники пойдут из школ, позвонил Марининой дочери (он помнил, что в семье ее называли Снегуркой, и решил воспользоваться этим прозвищем, чтобы девочка не испугалась) — и узнал, что Марина придет с работы к шести. Просто так заявляться к ней домой было опасно — все-таки мало ли, вдруг заинтересуется старший по квартире, проверит документы у позднего гостя, а у него в паспорте минус десять. Скрипучий голос старухи ему очень не понравился. Встретиться лучше всего было в нейтральном месте — например, у Почтамта: и в центре, и людно, и не ошибешься.</p><p class="p1">Он зашел в маленькую пивную на Трубной, пропустил пару кружечек, с наслаждением оглядывая посетителей, слушая их московский говор. В Смоленске так не говорили, хотя акцент тамошних жителей был почти неопределим. Тик у него стал как будто сильней, чаще, как всегда при сильном, хотя бы и радостном волнении. Особенно понравился ему высокий молодой военный за соседним столиком, настоящий красавец. Военный был с девушкой, шутил, обсасывал гвардейские усы. После войны стало гораздо больше хороших людей. Воздух как-то очистился.</p><p class="p1">Военный этот был штатный осведомитель и покупал таким образом свободу (попался на растрате казенных денег в своем полку, где служил начальником финчасти), да заодно и получал некоторое количество деньжат на посещения московских пивных в обществе девушек. Ему сразу показался подозрительным нервный тип с нервным тиком, и когда племянник Натальи Семеновны вышел из пивнушки, медленно направляясь к Кирова, капитан Советской Армии попросил девушку подождать, а сам добежал до ближайшего постового, назвал человека, которому раз в месяц докладывал обо всех разговорах, предъявил свой паспорт и указал на подозрительного прохожего, который, прихрамывая, удалялся по Бульварному кольцу, с трудом одолевая подъем.</p><p class="p1">Постовой поблагодарил, быстро вызвал наряд, и дальше племянник-хромоножка шел в сопровождении двух оперативников в штатском, которым тоже показалась подозрительной и его хромота, и то, что он все время озирался по сторонам.</p><p class="p1">Он шел и дышал воздухом влажного московского вечера: покрапал дождь, расцвели зонты. Улыбка не сходила с его лица, и даже участившееся подергиванье щеки не портило настроения. Это был его город, и толпа в нем была его, дружественная, она бы не выдала. Он шел отдать долг женщине, которая помогла ему когда-то, — шел выживший, сильный, помнящий добро.</p><p class="p1">Почтамт был совсем рядом, за углом. Он посмотрел на часы: оставалось пять минут. Медленно, предвкушая счастье, улыбаясь дрожащим лицом, по мокрому асфальту, сиявшему отражениями фонарей, двинулся он к освещенному подъезду.</p><p class="p1">Тут-то его и взяли.</p><p class="empty-line"/><p class="p1"><em>Чепелево — Москва.</em></p></span>
