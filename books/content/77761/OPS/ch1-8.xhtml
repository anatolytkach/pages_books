<span><p class="p1">Этот третий принадлежал к хорошо ему известному типу — такие водились и на Ордынке времен его детства, хотя из какого-то древнего холопского инстинкта советских принцев они не трогали. Это был малый с изнеженным, девичьим лицом, широко расставленными глазами, почти полным отсутствием волос на подбородке и теле. Такие были страшнее всего, и именно таков был второй следователь Заславского. Этот тип отличался поразительной легкостью и внезапностью перехода от дружелюбия к ярости: если обычному бандиту (каких Заславский повидал, когда его кинули к уголовникам) для самоподзавода требовалась небольшая истерика, то розовые и ласковые наносили первый удар, не переставая улыбаться. Было в них что-то педерастическое, и древние герои, эталоны мужества и красоты вроде Патрокла с его девичьим румянцем и девичьей же насмешливостью, наверняка были таковы. Розовые и ласковые не повышали голоса. Заславский подозревал, что они необыкновенно сентиментальны, — у его второго следователя на столе стояла фотография дочери с плюшевым мишкой, а блатарь этого типа, которого он видел в камере, переписывал в тетрадь песни и сам тоскливо, жалостно пел что-то народное. Эта любовь к народному — узорным словечкам, каким-то бабьим, пригорюнившимся позам — вообще была удивительна; ласковость, с которой они убивали, и наслаждение, с которым мучили, выдавали подлинный, чистый садизм, граничащий с нежностью к жертве. Второй следователь часто называл Заславского голубком и сладко улыбался, ломая ему пальцы. Заславский постоял секунд десять, вглядываясь в искаженное лицо красавца. Тот корчился и поскуливал, тоже по-бабьи, но и в этом поскуливании Заславскому чудилась игра, тот почти непременный артистизм и наигрыш, без которого розовые и ласковые не делали ни шагу. Впрочем, если тот и переигрывал, то несильно. В Чистом готовили на совесть, и до утра красавец скорее всего не протянул бы.</p><p class="p1">Долго торчать тут, однако, тоже не следовало. Через минуту нагрянут люди — подмога или милиция. Разумеется, в темноте его толком не разглядели, но запомнили хорошо — парусиновый пиджак, например, от которого, впрочем, мало что осталось. Заславский сбросил его и остался в застиранной сорочке, купленной там же и тогда же. Идти по указанному адресу было бессмысленно. И вообще ему больше не хотелось жить в Марьиной Роще.</p><p class="p1">Заславский подхватил чемодан и побежал обратно, к трамвайной остановке. Там стоял одинокий трамвай, светясь в сгустившейся сырой темноте, — видимо, последний. Через полчаса Заславский был на вокзале.</p><p class="p1">У касс он не заметил ничего подозрительного. Слежки, похоже, не было. Еще через пять минут он взял билет до Омска. Это было единственное место, куда он мог вернуться, — соблазн мирной жизни исчез сам собой. Он жалел только, что не поговорил с Мариком. Все-таки надо его предупредить. Ничего, пошлет письмо с дороги.</p><p class="p1">Поезд на Омск отходил в два часа ночи. Все деньги ушли на билет. Не страшно, в поезде умереть с голоду не дадут. Поезд мчится в даль, а я — в неизвестность, подумал он. Вот тебе и вся неизвестность.</p><p class="p1">В плацкарте долго не спали, возбужденно переговаривались, как всегда бывает в первый час в ночных поездах. Заславский попросил у хорошенькой попутчицы — видимо, студентки — лист из блокнота и ручку и стал писать письмо Марику, надеясь опустить его на ближайшей станции, но после первой строчки понял, что писать бессмысленно. Он вернул ручку, скомкал листок и пошел в тамбур курить. Стекло было выбито. Заславский достал зеркальце, завернул его в смятый листок и выбросил в пролетающие кусты.</p></span>
