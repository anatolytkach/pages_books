<span><div class="cite">
<p class="p1">К 1938 году в НКВД скопился материал, достаточный для того, чтобы арестовать все население СССР.</p>
<p class="text-author">Р. Конквест.</p>
</div><div class="cite">
<p class="p1">Холод — это наша есть жизнь. Надо сознательно искать холодное и плохое и им огородиться. Вот тогда-то и будут силы твои, ты будешь Победитель Природы. Как хорошее и теплое умирало, так умирает и будет умирать до тех пор, пока не возьмутся люди за врага и не дадут ему сокрушительный отпор. Это сделает все холодное и плохое.</p>
<p class="p1">Желаю тебе счастья, здоровья хорошего.</p>
<p class="text-author">Порфирий Иванов.</p>
</div><div class="cite">
<p class="p1">Я вам скажу, только вы на меня не сердитесь: я очень люблю царственную пышность.</p>
<p class="text-author">Тэффи.</p>
</div></span>
