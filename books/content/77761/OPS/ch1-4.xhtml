<span><p class="p1">— Обратиться напрямую к особисту я, конечно, не мог, — продолжал попутчик. — Я был обычный старший лейтенант, пусть уже и представленный к ордену, и никто не стал бы передо мной отчитываться. Но слухи до меня доходили, и я узнал, что его как раз и взяли за переписку с отцом. Это показалось подозрительным, да и мало ли что он мог там писать. Больше о нем не было никаких сведений, но я его не забывал, хотел даже матери его отписать, но не знал адреса. Искал, не нашел. Однажды, году в сорок седьмом, я случайно встретил того особиста — пересеклись у нашего помпотеха, он демобилизовывался. Особист наш был не такой, как теперь про них пишут, а человек смелый, и я даже уважал его вчуже. Выпили крепко. И я набрался храбрости, спросил: ну а как старший лейтенант Сутормин? Может быть, вы помните его? И представьте себе, он помнил. Сутормина трудно было забыть. Красавец, бледный… Он сказал, что его затребовали в Москву, дело оказалось серьезное, как-то он попал под кампанию, что ли, — все отрицал, ни в чем не признался и сгинул. Особист мне намекнул, что в живых его бы не оставили. Сорок четвертый год, что вы хотите.</p><p class="p1">И вот представьте, я летом сорок восьмого приезжаю в Москву по делам, остановился в гостинице, иду на ВДНХ — и что вижу? Его, живого, невредимого! То есть мне сначала так показалось, что невредимого. Стоит в телефонной будке, накручивает диск, потом что-то говорит, но сам посматривает по сторонам, словно опасается слежки. Одет кое-как, костюм поношенный, какого, знаете, бродяга постыдился бы, — но на нем прилично сидит, на нем все прилично сидело, даже гимнастерка прожженная, — представляете, какие у нас в сорок четвертом были гимнастерки? Сами не мылись месяцами, чего уж тут… И вот, знаете, когда водил он глазами по сторонам, вдруг заметил меня. Ни один мускул в лице не дрогнул. Он продолжал говорить, но глаз с меня уже не сводил — у него были черные пронзительные глаза, огромные, я по ним-то и увидел при первом знакомстве, что он не жилец. Демон, мы так и звали его. И вот смотрит, говорит, а рукой делает мне знак: подойди! Вы меня, конечно, осудите, да я и сам себе теперь простить не могу, — но я словно врос в землю. Смотрю на него, глаз не отвожу, а шагнуть боюсь. Я и сейчас вам не объясню, что это было… хотя с конца сорок второго, с семнадцати лет был на фронте и видел всякое. И даже скажу вам, что боялся мало. Это был обычный страх, где-то даже привычка. Поначалу он ощущался, а потом приходила осторожность, навык, — в общем, знали уже, что если не лезть на рожон, так, может, и обойдется. Но тут я смотрел в эту будку — лето, люди кругом, шум стоит, машины, говор, какие-то узбеки в халатах, — а я стою от него в десяти метрах, и мороз дерет меня по коже. Потому что это был и Сутормин — и не Сутормин.</p><p class="p1">Самое страшное, что он стал будто меньше ростом, сплющило его и пришибло. Он был высокий, тонкий, а тут — словно вырубленный из дерева, обкорнанный какой-то обрубок, фигура неуклюжая, квадратная. Лицо бледное, как всегда, но надулось: то ли вода под кожей, то ли он как-то весь оплыл, опустился. Не потолстел, нет, но именно что оплыл. Он и сейчас был демон, но даже не демон поверженный, а — как бы сказать — если бы из демона вдруг стал бес, обычный бес, — вот так оно точнее всего. Он словно смотрел на меня из такого ада, который только и есть настоящий ад — не с кострами и сковородками, а вот, простите за сравнение, одна огромная параша, из которой нету выхода, а если и есть, то он уже не нужен. И вот я до сих пор думаю: кому же он мог звонить?</p><p class="p1">— Наверное, хотел что-то передать, — машинально сказал Рогов.</p><p class="p1">— Что вы говорите? — перегнулся к нему старик.</p><p class="p1">— Нет, так. А что дальше было?</p><p class="p1">— Ничего не было. Он поманил меня пальцем, а сам смотрит в упор, и такое глянуло на меня из его глаз, что собрал я все силы да и дернул прочь, как заяц. Боевой офицер, с наградами, майор артиллерии. А бежал не оглядываясь, очнулся уже на какой-то окраине, куда и трамвай не ходил. Смотрю — вечер, бараки вокруг — длинные, безглазые. И мерещится мне, что в них все такие, как он… На мое счастье, ехал мимо таксист. Как его туда занесло? Не иначе, ангела с машиной прислали по мою душу. «Садись, майор, подвезу». Вернулся я в гостиницу, пошел в ресторан, напился, как давно не напивался, и всю ночь проспал как убитый. Только утром отпустило, но на ВДНХ в тот раз я так и не побывал.</p><p class="p1">— И Сутормина больше не видели?</p><p class="p1">— И не видел, и сведений не имел. Хотел было запрос подать, но знаете — страх взял. Мне легче думать, что обознался. Все-таки любил же я его — где мне было с ним таким заново встречаться? Ну сами вы посудите, молодой человек?</p><p class="p1">— Нет, вы скорее всего не обознались, — задумчиво сказал Рогов.</p><p class="p1">— А почему вы так думаете?</p><p class="p1">— Не знаю. Тогда многие вернулись…</p><p class="p1">— Это верно, — кивнул старик. — Многие. И видел я многих оттуда. Но по ним, знаете, и не сказать было иногда. Как законсервировались они в мерзлоте этой. Веселые, отличные мужики… А таких я не видел, нет, таких больше не видел. Ну правда, и досталось же ему — сперва родителей взяли, потом фронт…</p><p class="p1">— Лазарь, — сказал про себя Рогов, но старик расслышал.</p><p class="p1">— Вы думаете, все Каганович?</p><p class="p1">— Нет, другой Лазарь. Помните, Христос воскресил Лазаря, и никто не мог выдержать его взгляда?</p><p class="p1">— Не читал, — виновато признался старик. — Видите, до сих пор не удосужился…</p><p class="p1">— Жаль, что вы не подошли, — сказал Рогов. — Нет, нет, не платите, пожалуйста. Позвольте мне. Вы сами не представляете, как мне важен ваш рассказ.</p><p class="p1">— Вы не родня ему? — Старик прищурился. — Бывают такие совпадения, что ни в одной книжке не вычитаешь…</p><p class="p1">— Нет, — ответил Рогов, — не родня.</p><p class="p1">Это свидетельство было тем ценнее, что речь шла о единственной личной встрече с вернувшимся: в остальных случаях визуального контакта не было, не считая, впрочем, того мимолетного ленинградского эпизода в трамвае, — но родственник отца был близорук и мало что успел разглядеть. Видел он только, что ехавший в трамвае двоюродный брат его жены, которого он и до войны видел мельком, два-три раза, был занят странным для своего возраста делом: держал в руке маленькое карманное зеркальце и показывал его кому-то в окне. Трамвай, в котором ехал двоюродный брат, проходил по Петроградской стороне, мимо улицы Барочной, и в старинном доме на углу кто-то смотрел в окно. Кажется, девочка, кажется, славная. Но все это близорукий родственник роговского отца видел мельком, а достоверно заметил только, что двоюродный шурин (кажется, это так называется? я путаюсь во всех этих отношениях…) пускает солнечного зайчика по стене. Родственника он не заметил — тот стоял на остановке и ждал другого трамвая. Двоюродный брат жены казался сосредоточенным, и вид у него был слишком серьезный для человека, занятого таким легкомысленным делом.</p><p class="p1">Этот зайчик и эта сосредоточенность были единственными звеньями, для которых Рогов не находил места в своей цепи. Остальное он, кажется, понимал. Он понимал то, о чем боялся задумываться следователь его деда, и то, чего не могла выразить словами его бабка Марина, всю жизнь медленно терявшая рассудок и забывавшая то, что было вчера. Он понимал, почему их брали и почему они возвращались. Но нужны были годы, чтобы все встало на места.</p></span>
