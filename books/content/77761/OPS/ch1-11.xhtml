<span><p class="p1">— А… Ты понимаешь, я уж думал — все, ничем меня не возьмешь. Но тут гулял я сегодня по Москве и вдруг вижу — он! Который сдал-то меня тогда. Я знаю, он донес, больше некому. Особист, конечно, не говорил — кто; там вообще разговоры были короткие. Но я-то чуял, я о многом только с ним говорил. Может, письма еще… но письма я аккуратные писал. И представляешь — идет гладкий, в форме, остался, стало быть, в армии… Еще стихи мы с ним друг другу читали, ты представляешь? Я много стихов знал… Идет прямо мне навстречу, а? Я юркнул в будочку телефонную, там стою, и тут словно кто взгляд его направил — как упрется в меня! Слушай, побелел весь. Тут-то у меня сомнений не осталось: все, точно он. Он донес. Я его подманиваю, а сам глазами шнырк-шнырк: если народу много, так никто и не заметит, как я его… Конечно, хорошо бы помучить, чтоб понимал, но где ж ты его помучаешь? Со мной не пойдет никуда, тоже не дурак… А так бы я его аккуратненько положил, подруга-то верная вот она. — Сутормин сделал неуловимое движение, тоненько блеснуло лезвие. Эти штуки он умел хорошо. — Ну вот. А он как дернет от меня… Думаю, уклался, не иначе. Теперь гуляю. Имею я право, майор?</p><p class="p1">— Имеешь, лейтенант, — ответил Бабель. — Имеешь, Костя.</p><p class="p1">Он мог теперь назвать его по имени. Сутормин слишком мало пробыл в Чистом, он был еще слишком живой, в нем жива была ненависть и смешной дух мщения. Никому нельзя отомстить: все, кто был там с довойны, это понимали.</p><p class="p1">— Пойду я, — сказал Бабель. — Ты бы подругу-то не распускал.</p><p class="p1">— А кто меня теперь тронет? Мы ж неприкасаемые. Отслужили. Дальше Чистого не пошлют.</p><p class="p1">— Пошлют, Костя. — Бабель прямо посмотрел в его сплошь черные, чуть навыкате глаза. — Никто ни на что не посмотрит, и вся их благодарность — может, сразу шлепнут. Ты думаешь, у тебя здесь индульгенция лежит? — Он хлопнул его по нагрудному карману. — У тебя, может, здесь смертный твой приговор лежит.</p><p class="p1">— Индуль… что?</p><p class="p1">— Ладно, Константин, передо мной-то не играй. Я своего брата книжника за версту чую. Это там мы еле говорили — поди-подай, целься-пли… Ты ведь вузовец, верно?</p><p class="p1">— Догадлив, майор. С исторического.</p><p class="p1">— А если с исторического, так вдвойне должен все понимать про их благодарность. И мой тебе совет — уезжай из Москвы подальше. Мама жива?</p><p class="p1">— Жива. Вернулась недавно.</p><p class="p1">— Вот и уезжайте, пока целы оба. Подальше, подальше. Лучше бы в деревню. Тебе на виду ходить не надо, тебе прятаться надо.</p><p class="p1">— Думаешь?</p><p class="p1">— Я не только думаю, я и делаю. — Бабель взглянул на часы: у него оставалось десять минут — ровно столько, чтобы пройти к поезду. — Бывай здоров, лейтенант.</p><p class="p1">— Ты куда теперь?</p><p class="p1">— В Брянск, — схитрил Бабель. Нечего слишком откровенничать, даже и с таким хорошим парнем, как Сутормин. Встречи с прошлым хороши, но утомительны.</p><p class="p1">— Буду в Брянске — поищу.</p><p class="p1">— Поищи. — Бабель хлопнул его по плечу, повернулся и пошел к поезду.</p><p class="p1">— Слышь, майор! — крикнул Сутормин ему вслед. — Как тебя звать-то? Теперь-то?</p><p class="p1">— Симен, — отозвался Бабель не оборачиваясь.</p><p class="p1">В Одессе он снял комнату близ порта, устроился в «Маяк», где ответственным секретарем служил верный человек, помнивший его, и тихо прожил еще двадцать лет, работая правщиком — то есть придавая ума и блеска чужим газетным писаниям, в которых за угрюмой скукой канцелярита не так уж трудно было разглядеть ироническую и пылкую душу южанина. Он выпускал эту душу, счищал с нее шелуху, и ничего прибавлять не требовалось. «Маяк» стало можно читать, им начали гордиться.</p><p class="p1">Он увидел любимую свою Молдаванку, и Привоз, и Дюка, и Екатерининскую, и Пушкинскую. И он увидел море. У моря он проводил теперь почти все свободное время, додумывая свою московскую мысль о том, что монументальная архитектура прекрасна, а монументальная литература невыносима. Он брал теперь шире. Сидя у моря, он понимал, что пленившая его когда-то эпоха только и делала, что подражала природе, перенимала ее законы — или, вернее, единственный ее закон целесообразности. В мире природы нет незаменимых, одна морская волна не хуже другой, и он жил в мире, где никто не считался единственным. Природа не знает нравственного закона, но знает глухой и слепой инстинкт жизни: он прекрасен в траве, в плюще, заплетающем развалины, прекрасен даже тогда, когда природа жадно и быстро уничтожает дело рук человека. Но общество людей, руководимых только этим инстинктом, невыносимо для живой души.</p><p class="p1">Природа знает примеры взаимопомощи и примеры борьбы за выживание, она гениально непоследовательна и этим неотразимо обаятельна. Природе нельзя верить, ее смешно наделять душой и мыслью. Душа и мысль даны только нам, и если в погоне за величием природы мы подражаем ее равнодушию и жадной, ползучей воле к жизни, единственным доступным нам величием становится величие зверства. Он понимал теперь, что восхищало его в крупных и сильных характерах девятнадцатого года. Перед ним была людская масса, отринувшая все людское, живущая темным и необоримым инстинктом выживания, целесообразности и равновесия; он был мыслящей щепкой, носимой по этому морю, но слезы страха и восторга мешали ему видеть истину. Истина заключалась в том, что страна, полагавшая высшей добродетелью приспособление и цепкость, была обречена пожирать самое себя, с болью и мукой вновь рождая человека. И как мертвеет литература, перенимая каменное монументальное величие нового ампира, так мертвеет жизнь, когда общество распространяет на себя критерии дочеловеческого тварного мира, в котором нет совести и сознания, хотя есть дикая мощь и подлинное величие.</p><p class="p1">Он любил смотреть на море, наслаждаясь тем, как уместно и гармонично здесь было все то, что мучило его в истории. Он полюбил пустые пляжи, пустыри и ржавчину окраин, торжество травы и песка над следами человека, победу круга над прямой, силу и беспощадность природы в предельном ее выражении. Его вечно тянуло к противоположности, к слепой и могучей жажде, к бессмертию ползучей силы. Он любил все это, как можно любить абсолютно и безнадежно другое. Все это нас переживет, и правильно сделает. Человека всегда тянет к морю, пустыне и джунглям, к жадному росту, пышному цветению, ломким сочным стеблям, к бессовестным и лживым женщинам, которые одни умеют внушить истинную страсть; но пока человек жив, он другой породы.</p><p class="p1">В пятьдесят втором он женился на молоденькой, только из школы, и за последующие шестнадцать лет своей жизни рассказал ей все. Он написал две книги коротких рассказов и несколько писем к старым друзьям, якобы от читателей. Получил участок за городом, с удовольствием там возился. Сын его, родившийся в этом браке, эмигрировал в начале восьмидесятых, сейчас в Лос-Анджелесе, программист. Проза лежит у жены, готовая к публикации, но время ее еще не пришло.</p><p class="p1">Это здесь, чувствовал Рогов, и все сходилось: в большом селе Чистом, куда надо было идти три километра пешком от разъезда Камышинского, он не провел и часа, а уже понимал, что теперь наконец нашел. Все сходилось с описаниями Кретова: кругом лес, о живших в нем когда-то людях здесь разговаривали неохотно, и пейзаж был самый что ни на есть соответствующий легенде, в которой Рогов уже не сомневался ни на секунду: величественно и мрачно. Впрочем, возможно, виноват был странный красновато-бурый цвет вечернего неба и неприветливость старика, у которого Ротов остановился. Дом был старый, крепкий, пахнущий сложно и сборно, — тут жило много народу, и каждый оставил в этом запахе что-то свое. Теперь старик перебивался один, но присутствие многих людей странным образом законсервировалось и еще ощущалось — такое бывает в бревенчатых домах. И по тому, как старик себя вел, трудно было предположить, что он одинок: в нем не чувствовалось ни слабости, ни тоски, ни надлома. Рогова он пустил без особенной охоты, и даже отданные вперед за три ночлега деньги никак не изменили его настроения: постоялец дал щедро — три бумажки по сто тысяч, — но старик только сунул их на полку, в книгу, названия которой Рогов не разглядел. Почитать в доме вообще было мало что — несколько старых «Работниц» да древний «Справочник агронома», еще довоенный, скалдинских времен. Забавно, если Скалдин его видел, уходя из Чистого и останавливаясь здесь.</p><p class="p1">Ужинать сели не по-деревенски поздно, в девятом часу. Старик, видно, ел только к ночи и только чтоб уснуть, — на сытое брюхо он чувствовал сонливость. Над столом горела голая, слабая желтая лампочка. По углам лежали тени. Старик ел молча, на электроплитке сипел чайник. Рогов полил картошку постным маслом, окунул в соль черемшу и отрезал себе черного хлеба. Втайне он надеялся, что старик поставит выпить и разговорится, да и расслабиться хотелось — он все-таки устал, добираясь. Но хозяин не пил — старовер, да и только.</p><p class="p1">— А что, Николай Акимыч, — спросил Рогов, приступая к чаю и выкладывая из рюкзака пакет пряников, — нет ли тут поблизости поселения? Я слышал, ссылали…</p><p class="p1">— Ходят люди, — неопределенно сказал старик.</p><p class="p1">— Далеко?</p><p class="p1">— Я откуда знаю… Они к нам не заглядывают.</p><p class="p1">— Что же, в лесу ходят?</p><p class="p1">— Бывает, и в лесу.</p><p class="p1">— А что за люди?</p><p class="p1">— Не знаю.</p><p class="p1">Рогов понял, что ловить тут нечего, и подивился, как крепко вбит был в хозяина страх. Вся секретность давно кончилась, но он, видимо, все еще боялся проболтаться. Надо было попробовать зайти с другого конца:</p><p class="p1">— Дед у меня тут жил, примерно ваших лет.</p><p class="p1">— Может, и жил, — бессмысленно ответил хозяин.</p><p class="p1">— Сослали его сюда.</p><p class="p1">— Это когда ж сослали? К нам не ссылали. — Старик смотрел на него в упор с крайним недружелюбием.</p><p class="p1">— В тридцать девятом, — сказал Рогов. Пора было идти ва-банк.</p><p class="p1">— Я с двадцать четвертого, — подозрительно сказал старик, — никого тут не ссылали. Ты думаешь, раз в Сибирь, так и к нам? Сибирь большая.</p><p class="p1">Рогов не нашелся, что на это ответить, а в объяснения входить побоялся. Это выглядело бы как попытка в чем-то оправдаться перед хозяином, хотя никакой вины Рогов за собой не знал. Задавать же вопросы о селе: сколько народу, да чем живут, да платят ли в преобразованном колхозе — он не собирался: из собственного опыта ему было известно, что разговоры эти у сельских жителей чаще всего вызывают злость. То ли они понимали, что Рогов в действительности интересовался совсем другими вещами, то ли им неприятно было лишний раз признаваться в нищете и развале.</p><p class="p1">После некоторого молчания старик заговорил первым. Он не взял роговских пряников, допил свой чай, хрустя твердым желтым рафинадом, и опять уставился на гостя.</p><p class="p1">— Ты что ж, деда ищешь?</p><p class="p1">— Ищу. — Рогов не отвел взгляда.</p><p class="p1">— И откуда знаешь, что он тут? Писал, что ли?</p><p class="p1">— Не писал, а так… косвенно догадываюсь.</p><p class="p1">— Сказал, что ли, кто?</p><p class="p1">— Да, человек один. — Рогов не хотел раскрывать всего. — Он тут геологом работал и… в общем, видал его.</p><p class="p1">— Где видал-то?</p><p class="p1">— В лесу.</p><p class="p1">— Смотри ты… — Старик впервые улыбнулся, впрочем, без всякого веселья. — Лесовик он, что ли, дед-то твой?</p><p class="p1">— Не лесовик, — зло ответил Рогов. Ему не нравилось, что старик без всякого повода так явно к нему недоброжелателен, да еще и издевается над Скалдиным. На секунду у него мелькнула мысль, что это Скалдин и есть и что любой старик здесь теоретически мог быть им, но уж деда-то он узнал бы. Николай Акимыч не имел ничего общего с человеком на фотографии из дела, да и выглядел он слишком молодо, слишком хорошо даже для своих лет. Деду было куда больше.</p><p class="p1">— Ты вот что. — Старик зачем-то оглянулся на дверь. — Ты жить живи, я не запрещаю, ты мне не в обузу. Но мой тебе совет: в лес не ходи. Знаю я, какого ты деда ищешь.</p><p class="p1">— Какого? — встрепенулся Рогов. — В чем дело-то?</p><p class="p1">— А в том. Ты меня дурить хочешь? Другого кого дури. Так вот я тебе скажу… без этих ваших… У нас тут прямо говорят. В лес не ходи. Не то тут место, чтобы в лес тебе ходить. Пойдешь искать — и такое найдешь, что сам не думаешь. Во. А дурить меня не надо, меня много кто дурил. Ищи их теперь.</p><p class="p1">— Слушайте, Николай Акимыч. — Рогов разозлился всерьез. — Вы мне начистоту — я вам начистоту. Я слышал, что моего деда, которого взяли в тридцать восьмом, выслали сюда. Должны были расстрелять, а вместо этого выслали. И что таких, как он, было много. Поэтому я его ищу. Понятно это? И не надо мне приписывать чего ни попадя. У вас тут золота нет и нефти тоже, искать нечего.</p><p class="p1">Старик посмотрел на него внимательно, с выражением, которого Рогов не понял: то ли издевательским, то ли сострадающим.</p><p class="p1">— Ты что ж, думаешь, их всех не расстреливали, а ссылали?</p><p class="p1">— Не всех. Некоторых.</p><p class="p1">— Я думал, в это только тогда верили. Да и то дураки. Я уж думал, перевелись такие.</p><p class="p1">Рогов не стал отвечать на это. Старик помолчал.</p><p class="p1">— В общем, мое дело сказать. Кого ты там ищешь — не моя печаль. Но в лес не ходи. Не те тут места, чтобы новый человек один в лес ходил.</p><p class="p1">У Рогова мелькнула мысль, что старик набивает себе цену и просится к нему в проводники.</p><p class="p1">— Может, вы меня сводите? — спросил он.</p><p class="p1">— Ты со мной шуток не шути! — прикрикнул вдруг хозяин с такой яростью, которой Рогов, при всем стариковом недоброжелательстве, никак не мог предположить в нем. — С другими шути, дома у себя! А у меня со мной не шути!</p><p class="p1">— Да я не шучу, вы же сами сказали…</p><p class="p1">— Что я сказал, я сам знаю! Хочешь идти — иди, твое дело. Не жалуйся потом.</p><p class="p1">Старик встал из-за стола и вышел на крыльцо курить. Рогов пошел укладываться. В душном бревенчатом доме ему долго не спалось, а когда он заснул, сон был неспокойный — все время снился какой-то складной летательный аппарат, который он носил в рюкзаке и доставал по мере необходимости, когда надо было перелететь на небольшое расстояние; аппарат представлял собой что-то вроде складного стула со множеством шестеренок под сиденьем. Надо было сесть на этот стул и резко потянуть вниз, до упора, черную металлическую рукоятку — тогда аппарат взлетал и с заводным металлическим стрекотом несся низко над лесом. Сон был цветной, в черно-лиловых тонах, и черно-лиловым был островерхий, еловый лес. Но, взлетев в очередной раз, Рогов почувствовал, что сделал какую-то непоправимую теперь ошибку — то ли недостаточно сильно оттянул рукоятку, то ли забыл собрать руль, — как бы то ни было, теперь не он задавал направление, а стрекочущий аппарат нес его по собственной воле. Рогов помнил во сне, что эта воля сильно расходилась с его собственной, что ему надо было совсем не туда, что он вообще, может, собирался повернуть к дому, — но теперь сделать было уже ничего нельзя. Внезапно его перевернуло, он почувствовал, что летит теперь вниз головой — да, собственно, не летит, а падает. Аппарат медленно, как осенний лист, опускался вместе с ним куда-то в лес, в черную густоту деревьев, расступавшихся по мере падения; в лесу были поляны, а между ними колодцы, и последним усилием — кажется, мысленным — можно было не угодить в колодец, а с поляны попытаться стартовать снова, но Рогов, уже просыпаясь от ужаса, успел понять, что аппарат не взлетит больше никогда. Это был не тот лес, из которого можно улететь, и даже не тот, из которого удается уползти.</p><p class="p1">Он проснулся в тягостном недоумении: одним из самых стойких, детских его предубеждений была уверенность в том, что, если летаешь во сне — значит, растешь. Расти ему было поздно. Ни счастья полета, ни обрывающегося, колотящегося ужаса падения он не испытывал очень давно, но вот смутное и тягостное чувство человека, зашедшего не туда, было ему знакомо. Сон тем и был страшен, что это чувство, подспудно отравлявшее ему две последние недели, вышло наконец наружу и могло быть названо. Это не был страх неизвестности или неуют в непривычных местах, но именно сознание того, что его относит дальше и дальше от цели и что самой цели нет, что она выдумана, и выдумана плохо. Иногда спросонок он спрашивал себя, что делает здесь, но зеркальце, кретовское зеркальце под подушкой на все отвечало ему. Он нащупал его и сейчас, подумал мельком — не показать ли Николаю Акимычу, — но тут же отмел эту мысль. Николай Акимыч был не тот человек, чтобы показывать ему зеркальце.</p><p class="p1">Черная тишина мерно тикала: шли стенные часы, слава Богу, без боя, — видимо, давно испорченные. Время они еще показывали, а бить разучились. В кромешной темноте, держась за стену, Рогов выполз на крыльцо. Ночь была холодная, с множеством крупных августовских звезд. Как всегда в холодную ночь, все они были ярки и одноцветны — того бело-голубого оттенка, каким в нашем сознании всегда обладает либо очень холодный, либо очень горячий предмет. Рисунок созвездий был не знаком, сдвинут: Рогов с трудом нашел «дубль-ве», искать ковш пришлось дольше, а на краю неба уже был различим серебристый мазок, всегда видимый осенью. Только очень чуткий глаз разглядел бы там четыре звезды ромбиком и пятую у одной из его вершин. Про себя он называл этот мазок змеем, имея в виду бумажного.</p><p class="p1">Ни в одной избе вокруг не горели окна, не слышалось даже собачьего лая во дворах. Молчал и лес, ни звука не доносилось оттуда. Его черная зубчатая стена казалась монолитной: черней, непроглядней дымно-синего неба, она впервые испугала Рогова по-настоящему.</p><p class="p1">«И бездна нам обнажена», — вспомнил он. Ночью не следовало принимать решений, доверять ночным настроениям тоже было нельзя. Но именно сейчас он, как никогда, захотел домой. Даже в армии Рогов не испытывал ничего подобного. Еще немного — и он расплакался бы, как потерянный щенок или ребенок, плачущий ночью об этом щенке. Надо вернуться, говорил он себе вслух, чтобы успокоиться. Вернуться и оставить все это или приезжать не в одиночку. Почему я поехал один? Потому ли, что это только мой долг и мое дело? Но мало ли что может случиться, я же с самого начала знал, что направляюсь в глушь. Мало ли как меня встретят, никакие пароли не спасут. Он озяб и передернул плечами. Да, но кого мне было брать с собой? Друзей, которым можно стопроцентно доверять, у меня нет. Я совершенно один. Раньше это состояние его радовало, теперь мучило. Он чувствовал невероятное сиротство здесь, в Богом забытом углу, под крупными звездами. Раньше звезды вызывали у него легкую, сладостную грусть, как что-то прекрасное и недосягаемое, но теперь они были грозны, и даже не то что грозны, а невыразимо равнодушны. Чужим было все: старик, изба, лес, небо. Все жило своей жизнью, которая никак не пересекалась с роговской. И с чего я взял, что они меня примут? У них точно та же, отдельная, жизнь, которая давно не связана с миром живых. Все их связи тысячу лет как перерублены. Он зашел не туда, но зашел уже так далеко, что не мог просто так вернуться.</p><p class="p1">И куда ему было возвращаться? Эта мысль проявлялась в сознании по мере того, как он все полнее просыпался и трезвел, и над испуганным его телом с его животными страхами постепенно брал верх рассудок. Рассудок расставлял все по местам и устанавливал привычные ориентиры. Он спрашивал: что дома? Дома был круг жизни, из которого не находилось выхода; женщины, которым нужна была только нянька; слабость и жалкость, следы которых он находил повсюду; мать, по которой он скучал все время, но с которой не мог ладить, пока не разобрался в себе. А разобраться в себе — значило найти причину того, что здесь происходило сорок лет назад, потому что просто так жить с этим он не мог. Следовало либо отказаться от всякой человечности, признав высшую логику, либо вернуться в теплую и скучную, захламленную жизнь, в которой ему нечего было делать. И он посмотрел на звезды уже как равный, но в небе ничего не изменилось.</p><p class="p1">Обняв себя за плечи, он еще некоторое время постоял среди двора, потом пошел спать. Старик следил за ним в окно, но Рогов не обратил на него внимания.</p><p class="p1">Теперь он шел по лесу и все отчетливее понимал, что заблудился, но Теперь он шел по лесу и все отчетливее понимал, что заблудился, но странно: когда ночью, в относительной безопасности, он проснулся и вышел на крыльцо — ему было страшно под бело-голубыми звездами, а теперь, в неизвестном и буреломном лесу, где на много верст вокруг, казалось, не было человека, он не чувствовал страха. Может, дело было в дневном свете, еще ярком, хотя его часы показывали половину пятого, а может, в том, что лес он любил с детства. Самоубийством было в одиночку идти в тайгу, где мог встретиться зверь, мог потеряться путь, но он чувствовал, что идет верно, словно чей-то взгляд в спину подталкивал и направлял его. Кроме того, у него была краюха хлеба, банка тушенки, был нож, спички, было, наконец, зеркальце.</p><p class="p1">Лес вокруг него был странен — Рогов всегда иначе представлял себе тайгу. Деревья росли то густо, то редко, часты были бурые поляны, засыпанные хвоей, встречались острова чистого березняка — они всегда казались Рогову просветом, выходом, потому что на даче березы росли вдоль опушки, и он так и привык — раз березы, значит, дом близко. Но здесь он шел по тропе, впадавшей то в березняк, то в осинник, и она все глохла; вдруг он обнаружил, что идет без дороги. Пошел было назад, но, видно, взял левей. Тропа потерялась, хотя сколько бы ни было вокруг бурелома, сколько бы ни громоздились мертвые, поваленные стволы, местность не выглядела дикой. Правда, и привычных для подмосковного грибника примет человеческого пребывания не было, это-то его и смущало поначалу: он никогда еще не бродил в лесу, где не валялись бы ржавые железки или пластиковые стаканчики. Здесь человек не оставлял никаких следов, разве что странные метины на стволах, иногда свежие, иногда заплывшие, метрах в полутора от земли. Но это мог быть и зверь в конце концов. Остановился, поглодал кору, пошел дальше. Какой зверь? Этого он не представлял. Лось, что ли? В метинах не было никакого смысла: бессистемно раскиданные по осиновым и березовым стволам горизонтальные надрезы, ничего больше. Попадались грибы — размокшие и перестоявшие; впрочем, несколько отличных подберезовиков Рогов пропустил с сожалением. Иногда лес принимался шуметь, но вообще день был тихий и ясный, напоминающий золотую осень. Паутина липла к лицу. Компас у Рогова был, и он знал, что возвращаться в случае чего — если начнет темнеть, а он так и не найдет ни поселка, ни тропы — надо будет строго на запад.</p><p class="p1">Пролетел самолет. Розовеющий след его был Рогову надеждой и утешением, он доказывал, что где-то есть привычный мир, а кроме того, сама блестящая точка самолета в небе над лесом напоминала про обложки «Юности», которые он в изобилии видел у Кретова на чердаке. Самолеты летали и над их дачным лесом: неподалеку располагался военный аэродром. Этот длинный след словно явился из старых фильмов о геологах, о кострах с пением под гитару, о вырубке просек, о высоковольтных линиях в тайге. Всякий раз, когда он в лесу слышал звук заходящего на посадку самолета или просто видел в небе белую газовую полосу, тянущуюся за еле различимой и неспешно движущейся точкой, — это напоминало о быстрых и ненадежных, но веселых временах. И Рогов повеселел.</p><p class="p1">Никаких звуков, кроме его собственного дыхания и шагов да периодических негромких разговоров с самим собой, чтобы не чувствовать одиночества, в лесу не было. И вдруг — сразу после того, как он проводил глазами самолет, — в ушах у него раздался быстрый и неразборчивый женский шепот, словно кто-то в самое ухо ему произнес непонятную фразу; несколько раз в ней настойчиво повторялось одно и то же слово. Странно было не только то, что он слышал явственный, хоть и непонятный шепот в пустом лесу, странно было то, что шепот этот, раздававшийся у самого уха, не был похож на обращение, скорее на заклинание. Кто-то бормотал сам с собой, и это было еще странней, чем сам звук чужого голоса рядом.</p><p class="p1">Рогов вздрогнул и огляделся: как раз в это время залепетала над ним осина, и галлюцинация получила простое, почти скучное объяснение. Он, однако, испугался не на шутку: все эти одинокие хождения пора было кончать. Он сверился с компасом и решительно двинулся на запад, хотя и без компаса видел, куда садилось солнце. Рано или поздно он выйдет на тропу, до темноты наверняка.</p><p class="p1">Но не сделал он и пяти шагов, как шепот повторился, по-прежнему явственный; теперь не было даже спасительного сомнения насчет того, не лиственный ли это лепет. К тому же и ветер стих, ни один листок не шевелился над головой Рогова. Фраза, которую произносил голос, была короткой, но повторялась как минимум трижды, правда, без настойчивости, а вот именно так, как бормочет себе под нос сумасшедший, словно заговаривая, забалтывая самого себя. Почему Рогов решил, что голос женский, он не ответил бы и сам: наверное, виновата была жаркость и какая-то подспудная влажность шепота, который он чувствовал словно в глубине собственной ушной раковины. Он резко оглянулся — и опять не увидел ничего. Бормотание повторилось, он зашагал быстрее. Это было похоже и на молитву, и на заговор, и на заклинание, но больше всего напоминало бессвязное бормотание во сне.</p><p class="p1">Через десять минут быстрой ходьбы Рогов испугался всерьез: места были незнакомые, зарубки на стволах повторялись все чаще и были теперь разной формы: извилистые, тильдой, или прямые, парные, параллельные; один раз ему померещилось что-то похожее на стрелку. Он точно здесь не проходил. Утешив себя, что раньше петлял, а теперь идет напрямик, но не переставая корить себя за беспечность в тайге, с которой шутки плохи, он пошел дальше, но ужас, подобный тому, который он испытал однажды в море, отплыв слишком далеко от берега при небольшом начинавшемся шторме, уже наползал откуда-то снизу, словно поднимаясь по ногам. К тому же и темнело. Самым же страшным, тем, в чем он себе не признавался, было непроходящее ощущение чьего-то взгляда, который подталкивал его в спину. Впрочем, теперь он не подталкивал, а с тайным злорадством наблюдал, что Рогов будет делать.</p><p class="p1">Он оглянулся. Снова тот же звук!</p><p class="p1">Невидимая струна повисла в воздухе. Рогов чувствовал невероятное напряжение, готовое вот-вот разрешиться. За ним следили, и следили недоброжелательно, как старик за ужином. Черт бы побрал старика с его предупреждениями! На всякий случай Рогов вынул зеркальце и показал его по-прежнему пустому лесу. Ничего не изменилось.</p><p class="p1">— Этак я с ума сойду, — сказал он громко и вслух.</p><p class="p1">Хрустнула ветка. Он стремительно обернулся на хруст: никого. Часы показывали половину шестого, но времени, казалось ему, прошло много больше часа: он приложил часы к уху. Тиканье их показалось ему оглушительным.</p><p class="p1">Темнело быстро, как всегда бывает в лесу. Розовое небо начало густо лиловеть, Рогов приметил и первую звезду. Он разговаривал с собой теперь безостановочно, надеясь отогнать галлюцинацию, но и звук собственного голоса казался ему странен. Сердце у него колотилось, как у загнанного зайца. Между тем впереди завиднелся просвет, и Рогов ускорил шаги. Вероятнее всего, он выходил к Чистому, только не совсем там, где вошел. Он и при возвращениях из дачного леса обычно брал левее или правее, может быть, подсознательно желая разнообразия. Впереди определенно было жилье: ему казалось даже, что он чувствует запах дыма.</p><p class="p1">Но вместо жилья перед ним была широкая поляна, почти идеально круглая. Напротив Рогова стоял незнакомый мужик в болотных сапогах. Мужик смотрел выжидательно и как будто не без злорадства. Над плечом его выступал ствол ружья, на голове была бесформенная кепка. Что-то еще странное было в этой фигуре, но что именно, Рогов не успел разглядеть.</p><p class="p1">— Вы не скажете, как выйти к Чистому? — спросил он срывающимся голосом.</p><p class="p1">Человек молчал, и Рогов подумал было, что везет же ему на бессловесные встречи, но тут из кустов с разных сторон вышли еще двое, тоже в темном, с ружьями, в бесформенных шапках. Четвертый и пятый так же одновременно подошли к Рогову сзади. Он почувствовал их приближение и резко обернулся, но оба, не говоря ни слова, схватили его за руки и вывернули их. Рогов согнулся и сдавленно крикнул:</p><p class="p1">— Вы что? Я из Чистого… пустите… вы что…</p><p class="p1">Человек в центре поляны сделал жест рукой. Рогова подвели к нему. Держали крепко — он не мог даже толком оглянуться и рассмотреть тех, кто его вел. Только теперь он разглядел, в чем заключалась другая странность в облике молчаливого хозяина, — он был тут, видимо, за старшего, — у него не было бровей, вместо них тянулись шрамы. Когда Рогова подвели совсем близко, он заметил, что на левой кисти у странного человека не хватает двух пальцев.</p><p class="p1">Прокаженные, с ужасом понял он. Колония прокаженных, прячущихся в тайге. Вот о чем предупреждал старик.</p><p class="p1">Старший дернул шеей — это, видимо, был условный знак, — и двое других, так и стоявшие у кустов, из которых вышли, приблизились и обыскали Рогова. Стащили рюкзак, забрали нож, остальное попихали обратно. У Рогова мелькнула последняя надежда.</p><p class="p1">— Посмотрите в нагрудном кармане. — Он попытался подбородком указать на карман.</p><p class="p1">Когда его общупывали и обхлопывали, на зеркальце не обратили внимания. Старший сделал шаг к Рогову, вынул зеркальце, посмотрел, коротко кивнул и спрятал обратно.</p><p class="p1">— Откуда? — спросил он тихо и хрипло, как человек, давно не говоривший вслух.</p><p class="p1">— Геолог один… дал. Завещал.</p><p class="p1">— Сам откуда? — с раздражением уточнил вопрос старший. Рогов так и не понял, сработало зеркальце или нет.</p><p class="p1">— Из Москвы, — ответил он, ненавидя себя за страх.</p><p class="p1">— Здесь зачем?</p><p class="p1">— Я ищу… — Он замялся. Он и в самом деле не определил даже для себя, как называть тех, кого выслали сюда в тридцать восьмом. — Сосланных.</p><p class="p1">— Зачем?</p><p class="p1">— Здесь был мой дед… кажется, — ответил Рогов.</p><p class="p1">— Кого привел?</p><p class="p1">— Я один. А кто вы?</p><p class="p1">На этот вопрос не последовало никакого ответа. Странный человек долго и молча разглядывал Рогова. У Рогова, впрочем, был теперь шанс в свою очередь разглядеть его. Он не решился бы определить возраст старшего: ему могло быть и сорок, и шестьдесят. Рогов никогда не догадывался, что отсутствие бровей может так изменить лицо, сделать его почти инопланетным, хотя и природные данные у этого землянина были хоть куда. Лицо длинное, желтое, без единой горизонтальной морщины, с младенчески чистым лбом, но с двумя глубокими вертикальными складками, тоже похожими на шрамы, вдоль щек. Самым же удивительным было выражение, которое Рогов никак не мог приписать одной своей поимке: это было выражение странной радости, отдаленно схожее с тем, которое на самых последних безумных фотографиях было у Ленина. С таким же выражением смотрел на новобранца один из самых жестоких дедов его роты, сержант, необычайно изобретательный по части унижений. Если остальные припахивали новобранцев традиционно, не утруждаясь выдумыванием преднамеренных унижений (такое выдумывание требовало наблюдения за жертвой, знания ее слабых мест и страхов), то у сержанта Гамалеева не было других развлечений, кроме самоцельного, сознательного и тонкого измывательства. Жертва в первый момент не могла себе представить, что кто-то может всерьез получать удовольствие от подобных развлечений. Сержант Гамалеев был персонажем сказочного толка, почти героем детской книжки — клинический случай зла, сознающего себя и наслаждающегося собой. Чувствовал ли он себя сверхчеловеком, заставляя того же Массалитинова рвать письма от девушки, которые тот хранил в тумбочке, или в подробностях высказывая несчастному Чурилину все, что он думает о его матери, приехавшей в часть после одного из особенно печальных его писем? В последнем случае, кстати, вся прелесть пытки заключалась в том, что Чурилин чувствовал себя соучастником преступления, то есть тоже как бы издевался над собственной матерью, потому что три человека его держали, и ничего сделать с Гамалеевым он не мог, а плевать ему в лицо было бы слишком мелодраматично — это значило бы опозориться окончательно. Чурилина, кстати, из части в конце концов перевели, но единственное письмо, полученное от него в роте с нового места, свидетельствовало о том, что там ему еще хуже.</p><p class="p1">Так вот: допустить, что Гамалеев мечтал об одной сверхчеловечности, Рогов не мог. Он, не вступаясь за жертв и не участвуя в пытках, внимательно наблюдал за сержантом и догадывался, что получаемое им удовольствие было другого рода. Гамалеев всерьез изучал пределы человеческой природы и Божьего терпения. И то и другое оказывалось безграничным. Простых избиений или заурядного дедования вроде приказа постирать хебе для таких экспериментов было недостаточно. В результате рядовой Масленов, «дух», не прослуживший и трех месяцев, ногами лупил своего слабейшего сопризывника Громова, потому что иначе Гамалеев со свитой измордовал бы его самого, — и Гамалеев, чистый, строгий идеалист, в эту секунду с наслаждением погиб бы под обвалившимся потолком или принял в себя испепеляющую Божью молнию, но Господь бездействовал, Громов повизгивал, а Масленов ощущал себя почти ровней дедам и входил в раж (и потому особенным наслаждением было сразу же после этого заставить его отжиматься на очке). О таких утонченных испытаниях (которым Гамалеев подвергал, конечно, не столько «духов», сколько совсем другого духа) никто из участников этого глобального эксперимента не догадывался, они и в книжках не читали ни о чем подобном, и потому Гамалеев был для них персонажем именно сказочным: в жизни ведь очень немногие делают зло из чистого, идеалистического желания злодействовать. Зло обычно делается из лености или корысти, со множеством самооправданий. Гамалеев был особая статья, хотя, возможно, его демонический вызов Господу диктовался на самом деле заурядным врожденным садизмом и неумением ему противостоять. Но как бы то ни было — поверить в реальность столь чистого, незамутненного образца последовательной и упорной античеловечности жертве поначалу было трудно, особенно если она была малообразованна и вообще попала под призыв, спустившись с гор за солью. И вот при виде этого-то недоумения, неверия в реальность происходящего — «неужели это со мной, неужели это может быть вообще» — на лице Гамалеева и появлялось то же выражение скрываемой, как бы стыдливой радости, с какой развратник смотрит на новую пассию, оказавшуюся девственницей. Он со своей стороны тоже почти уже не верил, что такое бывает. Нечто подобное этой стыдливой радости, в которой сливались презрение, обожание и предвкушение, Рогов увидел на лице старшего — и по-настоящему пожалел, что сунулся в Чистое.</p><p class="p1">— Глаза, — бросил старший с тем великолепным презрением, без которого не обходится ни одна пытка, и Рогову завязали глаза.</p><p class="p1">Дальше его чрезвычайно грубо и сильно толкали куда-то, продолжая держать за руки сзади. Он не задавал вопросов, понимая, что лучший для него вариант сейчас вообще никак себя не обозначать. Прошло не меньше получаса, когда вместо хвойной подстилки и скользкой листвы он ощутил под сапогами утоптанную, твердую почву. Ему вспомнился рассказ Кретова про плац посреди тайги. Но и по этому плацу его водили минут десять, прежде чем вся процессия остановилась. Рогов услышал скрип двери: видимо, старший вошел куда-то доложить о нем. Еще минуты три все ждали. Наконец Рогову пригнули голову и втолкнули в жарко натопленное помещение. Здесь пахло нагретым деревом, как в сауне.</p><p class="p1">— Вот, — сказал старший, стоявший, судя по голосу, где-то поодаль. — Деда он ищет.</p><p class="p1">— Отпустить, — произнес вяловатый старческий голос. — Да глаза развяжите ему, теперь-то что…</p><p class="p1">Стоявший сзади развязал тугую повязку, и Рогов, жмурясь, встряхнул головой. В помещении, куда его привели, было полутемно, а в окне, против которого он стоял, застыла уже сплошная чернота: видать, проходили они долго. На самодельном, грубом столе горела керосиновая лампа, к которой сидевший у стола старик потянулся, чтобы сделать язычок огня подлиннее. Он внимательно рассматривал Рогова, а у того перед глазами плыли звезды: повязка была туговата, и теперь он мало что различал.</p><p class="p1">Все же видно было, что у стола, сбоку, сидит в таком же самодельном, грубом, но удобном кресле очень бледный старик, с бритым скопческим лицом и глазами, которые казались угольными, — да и где было разглядеть сослепу, при одной керосиновой лампе. За верность догадки Рогов не поручился бы, но старик, казалось, пребывал в некотором недоумении. Во всем облике его была важность и привычка к власти, но как эту власть употребить применительно к Рогову, он явно не понимал. Молчание затягивалось, старик слегка барабанил пальцами по столу и покачивал головой. На вид ему было за семьдесят. Рогов заметил, что ростом он был мал, телом довольно сух и с виду слаб.</p><p class="p1">— Ты, Василий, иди, — сказал наконец старик. — Орлов своих забери. Мне Андрона хватит. — (В углу, на лавке, сидел еще один крупный, толстый мужик, но лица его Рогов не видел.) — Потолкуем с новым, какой такой дед.</p><p class="p1">Василий усмехнулся и вышел. За ним протопали двое, только что державшие Рогова. Двое других из группы, видимо, ждали снаружи. Роговский рюкзак лежал на столе, уже распотрошенный; жалкие его внутренности ни у кого интереса не вызвали.</p><p class="p1">— Помяли они тебя? — ровным голосом спросил старик, когда дверь закрылась. Сесть он не предложил, да и не на что было — всей мебели в комнате была андроновская лавка, стул и стариково кресло. Очевидно, сидя со стариком не разговаривали. Он был тут главный, столь главный, что старшинство Василия над своими было иллюзорно по сравнению со стариковским старшинством над всеми.</p><p class="p1">— Не очень, — честно ответил Рогов.</p><p class="p1">— Зла не держи, им положено. Это охрана наша, — не меняя тона, блекло сказал главный. — Говори, чего тебе надо.</p><p class="p1">Вместо ответа Рогов достал зеркальце и показал старику. Тот протянул руку, взял его и повертел. Рогову показалось, что на лице его мелькнула та же растерянность, что и в первый момент: надо было как-то отреагировать, но он не совсем понимал как. Наконец он кивнул, как и Василий на поляне, и вернул зеркальце.</p><p class="p1">— А все-таки кто тебе сказал? — спросил он, по-прежнему не меняя голоса, так что Рогов так и не понял, поведал ему о чем-то кретовский пароль или нет.</p><p class="p1">— Мне о вашем поселении рассказал один человек, который был тут в сорок восьмом, — решил прямо признаться Рогов. — Я думаю, что здесь был и мой дед. И вообще я хотел… посмотреть, если это можно.</p><p class="p1">— Померещилось твоему человеку, — сказал главный. — В сорок восьмом тут одни волки бродили. Он волка встретил, ему и показалось со страху. Что за человек?</p><p class="p1">— Геолог.</p><p class="p1">— Геологам и не то кажется. Что смотреть хочешь?</p><p class="p1">Рогов не нашелся, что ответить. Он и себе не отвечал, чего тут ищет, настолько ясно было ему самому, что он ищет в Чистом какой-то другой жизни; но как было это объяснить человеку, живущему этой самой другой жизнью, он не представлял.</p><p class="p1">— Дуют четыре ветра, волнуются семь морей, — продекламировал он, решив выкладывать все. — Все неизменно в мире, кроме души моей.</p><p class="p1">Старик приподнял бровь, но ничего похожего на узнавание Рогов не заметил на его белом лице.</p><p class="p1">— Говоришь ты складно, а закона не знаешь, — сказал он наконец. — На будущее запомни: когда со мной говорят, стоят смирно. Ну да с тебя три дня спросу не будет: живи, смотри. Если за эти три дня поймешь закон — будешь жить, не поймешь — пеняй на себя. Три дня у нас человек присматривается, грехи за ним записывают, но не наказывают. На четвертый все, в чем ты грешен, тебе припомнится — будут наказывать наравне со всеми. Андрон, — старик обернулся к толстяку на лавке, — запиши за ним: не стоял смирно. — Он вновь оборотился к Рогову: — Как зовут тебя?</p><p class="p1">— Вячеслав.</p><p class="p1">— Андрон, запиши за ним: неполный ответ. Надо говорить: «Меня зовут Вячеслав» — или: «Мое имя Вячеслав», — как тебе больше нравится, но отвечают мне полно. Меня зовут Константин, и я здесь за старшего. Выше меня только закон, и закона я слушаюсь, как все. Спросить ни о чем не хочешь?</p><p class="p1">— А закон… где-то можно ознакомиться с законом? — спросил Рогов, не желая больше делать ошибок.</p><p class="p1">— Андрон, — повернулся Константин в темный угол, где ворочался толстяк, что-то записывая в смутно белевшую амбарную книгу. — Запиши ему второй неправильный ответ. Ты мне не ответил; я спросил: «Спросить ни о чем не хочешь?» Надо отвечать: «Хочу», или: «Я хочу», или: «Да, я хочу», или: «Я хочу спросить», — как тебе нравится. Тогда я говорю: спрашивай. Тогда ты спрашиваешь. Ты спросил неправильно и нарушил закон. Тем не менее я тебе отвечу: закон можно понять или не понять. Он слишком велик, чтобы его можно было записать. Записывают не законы, а их приложения к разным случаям. Мы не можем предусмотреть все случаи, поэтому не записываем закон. Если ты его поймешь, будешь жить. Еще о чем-то спросить хочешь?</p><p class="p1">— Нет, — ответил Рогов, продолжая стоять по стойке «смирно».</p><p class="p1">— Этот день не в счет, тебя привели вечером. Три дня присматривайся, на четвертый будешь как все. Теперь пойдем, мы нынче хороним новоказненного Гавриила. Заодно посмотришь на похороны, у нас это редко.</p><p class="p1">Старик встал, оказавшись выше, чем предполагал Рогов, и прямо на свою белую рубаху набросил ватник, висевший тут же на прибитой к стене толстой, гладко отполированной сухой ветке. Сзади поднялся Андрон: Рогову стоило большого труда не отшатнуться при виде его лица. Лица, собственно, не было — сплошные узлы и бугры, свежие и старые шрамы и единственный глаз, циклопически смотревший из всего этого мясного месива. Угадывались и нос, и подбородок, но все было в красных вздутиях. Да, это прокаженные, понял Рогов, прокаженные, у которых не осталось никакой иной жизни и никакого развлечения, кроме как предельно регламентировать свою жизнь и наказывать непокорных. Господи, неужели они заразят и меня? Но ведь проказа не всегда заразна, бывали случаи, когда люди находились рядом с ними годами — и ничего… Андрон был в черной рубахе и старых тренировочных штанах. Он был огромен и напоминал гору.</p><p class="p1">— Ты сегодня гость, прямо со мной пойдешь, — объявил Рогову Константин.</p><p class="p1">Это, видимо, считалось исключительной честью. Через три дня Рогов перестанет быть гостем, станет как все и будет подвержен любым наказаниям, но теперь у него был зыбкий статус нового человека, сомнительная привилегия гостя, чья расплата отсрочена. Константин был единственным, на ком Рогов не замечал никаких увечий — по крайней мере видимых. Впрочем, в стране слепых и король кривой — было вполне естественно, чтобы над этой коммуной прокаженных властвовал здоровый.</p><p class="p1">— Виноват я, папа, — густо, неразборчиво, словно с кашей во рту, проговорил Андрон. — Я сперва подумал, что ты не возьмешь его, а ты его взял. По закону я не мог про тебя так думать, а я подумал. Записать мне?</p><p class="p1">— Подойдешь к старосте и скажешь, — с легким раздражением ответил старик. — Что тебе на себя писать, ты что, не запомнишь? Пошли…</p><p class="p1">Старик подтолкнул Рогова, они вышли, и Рогов впервые смог осмотреться. Под теми же холодными и ясными звездами, под которыми он пережидал прошлой ночью приступ тоски и слабости, на идеально утоптанной, твердой площадке среди леса, стеной обозначавшегося вокруг в радиусе доброго километра, стояли семь или восемь больших бревенчатых домов. Рогов, памятуя кретовский рассказ, ожидал увидеть именно бараки, но тут же понял, что в новом, добровольном своем отшельничестве обитатели Чистого наверняка должны были обзавестись более цивильным жильем. Избы казались огромными, грозно-прочными; света не было ни в одной. Людей Рогов различил только возле самой дальней избы, около которой попыхивали красные папиросные огоньки и угадывалось движение небольшой, человек в двадцать, толпы. Кто-то входил, кто-то выходил.</p><p class="p1">К этой дальней избе они и направились. Рогов подумал было, по своему обыкновению, что сейчас последний его шанс бежать: Андрон шел сзади, но миссия его была, по всей видимости, охранять старика и прислуживать ему, да если он и бросится за Роговым вслед в темный лес — что он там различит единственным глазом, среди ночи? Но здесь люди какие-никакие и жилье, — там же был холод, ощущавшийся все острее, да и рюкзак с теплыми вещами, ножом, спичками остался в стариковой избе. Рогов мало верил, что нашел тех, кого искал, но кто бы они ни были — надо было по крайней мере получить новый и неожиданный опыт. И потом, сколько он себя помнил, попытка бегства всегда оставалась для него лишь теоретической возможностью, своего рода утешением для испуганной души. Он спрашивал себя иногда: а если бы его дед знал, что за ним завтра придут, — стал бы убегать или нет? Ведь всегда есть возможность шагнуть в сторону, ночью выйти из дома, взять билет на поезд, уехать в глушь, в Тмутаракань, спрятаться там… Многим, как он знал, страна представлялась такой же глухой толщей, как ему — ночной лес: там можно спрятаться, переждать, пересидеть бурю. Но никто не уходил, все тряслись в ожидании ночных звонков — и не потому, что на новом месте трудно было устроиться, а новый человек обратил бы на себя внимание: была еще такая глушь, где и устраиваться было не надо, и на новых людей не обращают внимания — живи себе, никого не трогай… Шага в сторону никто не делал исключительно потому, что слишком сильна была вера в неизбежность, должность происходящего: таков был заведенный порядок, игра по правилам. Наказание в этой игре входит в правила и не предполагает вины, — виной же является нарушение правил, отход от них, и уж отошедшему не будет никакой пощады. Тот, кого возьмут ночью, еще может доказать свою невиновность, но тот, кто сбежит, не должен рассчитывать на снисхождение, если попадется. А если не попадется — значит, в игре от его бегства сдвинется какой-то такой винтик, от которого в итоге разрушится вся система, и это будет хуже любого наказания. То, что происходило с Роговым сейчас, тоже было должным, — не зря же какая-то сила сорвала его с места и погнала из уютной Москвы, которая теперь выглядела несуществующей, в глухие леса, в деревню уродов, на похороны казненного. Хотя какой смысл имела казнь в поселке, где каждый здоровый мужчина наверняка на счету?</p><p class="p1">Чем ближе они подходили к избе, тем отчетливее был виден свет сквозь глухие, почти без щелей, ставни. Свет этот казался особенно ярок в густой тьме и словно распирал избу изнутри. Стоявшие на крыльце люди, которых Рогов не рассмотрел, стремительно расступились перед Константином. Старик поднялся на крыльцо, подталкивая перед собой Рогова. Сзади протопал Андрон. Видимо, ждали только их: курившие затоптали папиросы и без единого слова поднялись следом.</p></span>
