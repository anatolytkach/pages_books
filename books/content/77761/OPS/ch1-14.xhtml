<span><p class="p1">В Чистом пошли дальше: они начисто отказались от унылых, рутинных занятий вроде хлебопечения или сталелитья, к минимуму свели заботы о прокорме, весь день посвящали нарочито бессмысленной деятельности, раскрепощавшей ум… «Вот твоя гимнастика», — вспомнилось ему. Что ж, не худшая гимнастика. Да и разве перенесение бревна или копание ямы менее осмысленны, чем долгая и унылая, изо дня в день, работа на прокорм, на унитаз, работа, от которой никому ни жарко ни холодно, работа, после которой наливаешься пивом у телевизора и проваливаешься в сон? Чистое потому и было Чистым, что являло собой пример предельно очищенной жизни, в которой все условности были отброшены, все механизмы обнажены; жизнь во всей ослепительной наготе, графическая модель, косточка без персика — вот что они устроили в сибирской тайге, уважительно расступившейся перед великим и бессмысленным страданием — единственным, что отличало человека от прочих тварей. Смысл жизни был не в зарабатывании денег на хлеб, не в строительстве домов, которые рано или поздно обречены рухнуть, не в сочинении книг, количество которых, множась, совершенно уничтожало значение новых; смысл жизни был не в истреблении себе подобных, не в захвате чужих земель, не в жалкой, животной по своей сути борьбе за существование, — он был в причинении и переживании боли, бессмысленной и бесполезной, то угнетающей, то возвышающей душу. Боль была поставлена во главу угла — не тупая боль избиваемого животного, но высокая метафизика наказания, перед лицом которого все равны; боль утонченного мучительства, боль-катарсис, боль-облегчение! Этот поистине сверхчеловеческий замысел имел единственный недостаток — он был слишком высок; но когда-нибудь дозреют же все!</p><p class="p1">Восхищенно замерев перед этой ледяной абстракцией, Рогов не замечал ни усиливающегося ветра, ни глухо гудящего в отдалении леса. Ежели бы теперь внезапно расчистилось небо и проступила ясная темно-синяя твердь, звезды, отрастающий ноготь месяца — это как нельзя больше соответствовало бы внезапной и ослепительной ясности в его душе. Но ничего подобного не произошло — природа не терпит спецэффектов.</p><p class="p1">Анна с небольшим рюкзаком за плечами ждала его у крыльца, ежась и притоптывая, пристукивая сапогом о сапог. На кончике носа у нее блестела капля: холодно, товарищи, холодно!</p><p class="p1">— Ты б еще подольше! — шепотом крикнула она. — Кто-нибудь видел?</p><p class="p1">— Дневальный только… — О случае с Николкой Рогов умолчал.</p><p class="p1">— Ну, дневальный у вас сегодня тупой, — спокойно сказала Анна. — Ладно, пошли. — И быстро пошла к лесу. Рогов еле поспевал за ней.</p><p class="p1">— Мы куда? — спросил он, когда они подошли к первым деревьям.</p><p class="p1">— Выведу тебя. Убьют тебя наши, больно ты прям для них.</p><p class="p1">Рогов чувствовал одновременно и безумное облегчение, и почти невыносимое презрение к себе: только что ему открылась высшая, истинная жизнь — и он оказался так позорно не готов к ней! Но ничего, у него будет еще время охладеть к земным соблазнам и вернуться сюда.</p><p class="p1">— Скажи, — спросил он, — не знаешь ли ты кого здесь по фамилии Скалдин?</p><p class="p1">— Откуда мне знать. — Она не обернулась, уверенно и быстро идя между высоких стволов. — Мы по именам общаемся, имена сами себе даем. Я тоже не всю жизнь Анной была.</p><p class="p1">— А давно ты тут?</p><p class="p1">— Шестой сезон. Как аборт сделала, мне сказали, что детей уж не будет. Я жить не хотела. Константин встретил, привез. Ох же, думаю, и дура была! Жизнь-то вона где. Я и не видела жизни-то. Константин хитро меня взял — утешать не стал. Хочешь вешаться — вешайся, говорит, но что ж добру пропадать. Пусть хоть люди посмотрят. Ну и привез сюда, а там втянулась.</p><p class="p1">— Постой, — не понял Рогов. — Ты где с ним встретилась?</p><p class="p1">— А в Омске. Его у нас многие знают. У него вся милиция, все газеты — свои, везде дружки. Не то б давно сюда ментов навели или телевизионщики понаехали. А нам зачем? Тутошняя жизнь не для всякого.</p><p class="p1">— Так он что, в городе живет? — Рогов даже остановился.</p><p class="p1">— А что такого? — Она посмотрела на него через плечо. — Мы все в городах живем, сюда на сезоны выезжаем. С июля по сентябрь: раньше — гнус, клещ, дальше — холодно. Ты в тайге поживи без электричества, зимой-то.</p><p class="p1">— Жили же люди…</p><p class="p1">— Ну да. Агафья Лыкова. Она пусть и живет, мы не староверы.</p><p class="p1">— Это да, — усмехнулся Рогов. — Вы новые.</p><p class="p1">— К нам отовсюду приезжают, — гордо продолжала она. — Только с Москвы еще не было. Ну, не всем и говорят, не всех и берут… А тебя я приманила. Слыхал, как я на поляну тебя вывела?</p><p class="p1">— Слыхал шепот какой-то.</p><p class="p1">— Так я ж и шептала. Я в тот день деревья метила — гляжу, мальчик хорошенький. Думаю, дай приманю, побалуюсь напоследок. Скоро в город, кому я в городе нужная? Скучные все. И наши все — сам видел, какие, с ними не разбалуешься. Один Пашка безносый туда-сюда… Сам попросил ноздри ему порвать. Да у нас почти каждый сам себе назначает. Алеша вот опозорился вчера: сам же предложил палец рубить. Никто его силком не тащил. Смысла захотелось. Смысл — он-то не для всякого…</p><p class="p1">— Стоп, стоп. — Рогов снова остановился по вечной своей неспособности соображать на ходу. — Так что ж, это поселение… не с сороковых тут?</p><p class="p1">— Не, поселение с сороковых. Большая, знатная секта была. Как раз староверы. Строго жили, себя блюли. С коммуняками — ни-ни, все сами по себе. Хозяйство было: коровы, козы… Потом раскол у них случился. Что это, я не знаю, всегда так бывает, — она подняла к нему лицо и требовательно уставилась смородинным глазом, — как кто отколется от основного, так тут же и внутри себя раскалываться начинает? Это, наверное, самая радость — раскалываться-то; кто раз попробовал, тот уж не то что с другой компанией, а и с человеком не уживется. Константин их расколол. Закон их ему не понравился. Грубо живете, говорит. Ну и ушел со своими, рядом построился. Те потом к людям вернулись, а Константин стал из города людей набирать. Многие ездили, да не все выдерживали. Постепенно костяк подобрался — человек шестьдесят; иной и по три сезона не ездит, как вот Василий, а потом опять потянет сюда — ну, он и снова к нам. Всех тянет. Я уж и не знаю, куда б делась, если бы не Костино.</p><p class="p1">— Костино? — переспросил он.</p><p class="p1">— Ну да, Костино. Сам Константин так назвал, в свою честь. Он же закон-то открыл.</p><p class="p1">— А Чистое?</p><p class="p1">— Чистое — это деревня тут, тупорылая, — засмеялась Анна. — Боятся они нас. Три тут деревни: Белое, Голое да Чистое. Про Голое — верно, а две другие — такое все черное, такое грязное… Как живут люди — не поймешь. Зачем живут, для чего живут…</p><p class="p1">— Скажи, — протянул Рогов, до которого доходило медленно: слишком много полных поворотов кругом за один день, — так Константин не сидел при Сталине?</p><p class="p1">— Ну откуда ему было сидеть. Он у староверов вырос, не воевал даже. Тут в Камышинском боялись их трогать, в военкомате-то районном. Они своих не выдавали, ну, их и не трогали. Не то б пожгли тут все — я тебе говорю, суровая же секта была.</p><p class="p1">Она замолчала. Минут десять шли молча, продираясь через бурелом; признаков жилья не было. Рогов всерьез перепугался — Анна говорила непонятные, всю его стройную систему перевернувшие вещи. Вдруг она безумна? Путешествие с сумасшедшим из старого его сна повторялось который уж раз за сутки.</p><p class="p1">— А куда мы идем-то? — стараясь придать голосу как можно больше беззаботности, спросил он.</p><p class="p1">— Говорю же, выведу тебя, — отвечала она не оборачиваясь; но в голосе ее клокотал теперь какой-то призвук, предвкушение. — Скоро уж, скоро.</p><p class="p1">А ведь в систему Чистого, подумал Рогов, вполне вписывается такой ход: отведет меня от всех и будет мучить одна; какая ей знакома любовь, кроме мучительства? А если я, допустим, скручу себя и сумею-таки ударить, даже оглушить женщину, то куда я отсюда денусь? Мне и днем отсюда не выйти, не то что ночью.</p><p class="p1">— Скоро, скоро, — повторила Анна, и еще через пять минут беспорядочной, быстрой, петляющей ходьбы им открылась небольшая круглая поляна, в середине которой смутно виднелся скособоченный дом.</p><p class="p1">— Изба охотничья, — сказала Анна, наконец оборачиваясь. — Сама нашла. Тут будешь жить.</p><p class="p1">— Ты же меня хотела в Чистое вывести! — крикнул Рогов.</p><p class="p1">— Эх, новый, новый. — Анна покачала головой. — Никогда ты в закон не въедешь. Закон ведь что? Обманка. Только так в суть-то и влезают. Привыкнешь, что все тебе врут, — ну и начнешь за обманной маской вещей различать их истинный облик. — Она заговорила как по писаному, пересказывая, вероятно, проповеди Константина. — Вот пошел ты со мной, думал: я тебя так возлюбила, что к людям выведу. Верно, выведу, да только не к людям, а от людей. Был ты общий, а станешь мой. Когда ж мне и побаловаться-то? Про эту избу никто не знает, нас не найдут. Жратвы я сюда натаскала загодя — на месяц хватит, ты ж знаешь, это не первая отлучка моя… Вот и еще консерв принесла, — она скинула рюкзак, — дрова есть, печь тут исправная… Поживем, побалуемся. Надоешь — выпущу. Или тут брошу. Зачем ты мне нужен, когда надоешь. Вишь, как оно все выглядит? А ты небось напридумал себе: любовь, побег… Да никакого нет побега, вот тебе весь побег твой. И деваться тебе некуда: убьешь меня — сам не выйдешь. Пошли.</p><p class="p1">Анна резко распахнула скрипучую дверь, взяла откуда-то спички, засветила керосиновую лампу, подошла к печке. Сквозь сени, полные сырым, гнилостным запахом старого дерева, Рогов прошел за ней. В избе было грязно, сыро, в крошечное оконце выведена труба железной печки, у стены — широкая лавка, ближе к окну — стол. Под столом грудой были навалены консервные банки: судя по их количеству, готовилась она основательно, планируя провести с ним не меньше месяца.</p><p class="p1">— Слушай, — все еще не мог смириться он. — Так это поселение сам Константин и выстроил?</p><p class="p1">— Почему сам. Люди с ним пришли, они построились. А тот поселок староверов, секта-то, он и посейчас цел, пустой стоит. Километра два от нас, может, три…</p><p class="p1">Туда, верно, и забрел Кретов, с ужасом догадался Рогов. Увидел пустые бараки и решил, что это лагерь Верховного. А это брошенная секта. Значит, ничего нет, и только что открывшаяся ему правда нового мироустройства была собственным его вымыслом? Значит, ездили сюда, как на турслет, только с пытками?</p><p class="p1">— Слушай, Анна, а руки этим… что всегда парой-то ходят… за что отрубили?</p><p class="p1">— Не поняла, — сказала Анна с ударением на «о». — Не поняла. Каким, что плаху несли, что ль?</p><p class="p1">— Ну.</p><p class="p1">— Ой, чудак ты человек! — залилась она. — Ой, новый, да когда ж ты въедешь-то! Ты что ж думаешь, тут руки рубят? Тут пальцы-то не всякий день рубят. Инвалиды сюда ездят, вот и все. Им среди наших увечных проще, они не такими убогими себя чувствуют. Вот и вся недолга. Нешто тут человек бы выжил, без больницы-то, если бы ему руку отрубить? Это из Омского общества инвалидов, их много у нас… Богатые есть. Ты склады наши видел, тушенку ел? Чтоб к Константину попасть, большие деньги платят, еду привозят. Где еще такого повидаешь, чтобы живую бабу душили? — Она засмеялась. — Есть любители, есть…</p><p class="p1">— А глаз тебе тоже… здесь…</p><p class="p1">— Глаз мне муженек мой выбил, когда мне еще девятнадцати не было, — с ненавистью сказала Анна. Переход от доброжелательности к ожесточению совершался у нее, как и у Павла, мгновенно. — Избил меня, глаз повредил, ну и удалили глаз. По лицу бил, сволочь, царство ему небесное, прости Господи. — (Об участи муженька Рогов расспрашивать не стал.) — Живот не трогал — знал, что беременная, ребенка хотел. А я и сделала аборт, да только не его, а себя наказала. Мне теперь никогда ребеночка не иметь, а мне только ребеночек и нужен. Уж я воспитала бы его…</p><p class="p1">Уж ты воспитала бы его, подумал Рогов. Ох, ты и воспитала бы его!</p><p class="p1">Анна меж тем затопила печь, куда были заблаговременно сложены сухие березовые дрова; крошечный домик наполнился дымом, но вскоре его вытянуло.</p><p class="p1">— Есть хочешь? — спросила она. — Чайку, может? Нет? Ну, тогда выпей. Вот, фляжку я тебе взяла. Думаешь, легко у нас тут выпивку достать? Ан достала, для милого дружка и сережку из ушка.</p><p class="p1">Вполне допуская, что при здешней системе обманок во фляге может быть что угодно, вплоть до мочи, Рогов отвинтил крышку мятой солдатской фляги и хлебнул: нет, ничего, обычный свекольный самогон, он пивал такой на практике, собирая в Белоруссии свидетельства о партизанской войне после четвертого курса. Там он, кстати, и узнал, как расплачивались белорусские деревни за партизанские вылазки. Самогон был хорош.</p><p class="p1">— Ладно, присосался. — Анна с раздражением отобрала флягу. — Всем бы вам одного.</p><p class="p1">— А вам — другого, — добродушно ответил он.</p><p class="p1">— А нам — другого, — вдруг улыбнулась она. — Начинаешь, начинаешь въезжать-то понемногу… Ну, сейчас согреется в избе, да и ляжем. Раздевайся покуда.</p><p class="p1">Мысль о том, что ему придется лечь с ней, что она для этого и притащила его сюда и будет теперь требовать исполнения этой повинности не раз и не два, вызвала у Рогова новую вспышку злобы. Мало ей было отнять у него только что обретенную веру в существование и обретение настоящего Чистого, мало того, что вымечтанный им образчик новой жизни оказался, по сути, туристским лагерем с садомазохистским уклоном, — теперь он должен был еще и ублажать ее! Может, если долго ее бить, она покажет дорогу? Да нет, она привычная, битье ей только в радость… Он вырвал у нее из рук фляжку и сделал еще два больших глотка.</p><p class="p1">— Ну что? — Он поставил фляжку на стол и схватил Анну за плечи. — Любиться будем? А? Любиться будем? — Он сам за собой заметил, что стал повторять слова, как Николка: это здорово подзаводило.</p><p class="p1">Единственный глаз Анны заморгал, как ему показалось, испуганно.</p><p class="p1">— Ты что, ты что, — забормотала она.</p><p class="p1">Весь страх прошедших суток, все разочарование, все отчаяние — все поднялось в нем. Повторяя: «Любиться будем, да? Любиться будем?», он срывал куртку, кофту, юбку с ее покорного, но крепкого тела, — он чувствовал, каким сильным было это чистое, гладкое тело сибирячки; и даже сырой запах дома не забивал здорового, жаркого запаха этого тела — от нее пахло пботом, и ромашкой, с которой она мыла блестящие волосы, единственное свое украшение, и женским желанием. Груди были маленькие, горячие, с длинными сосками, живот сильный и твердый, все тело было таким жарким, что казалось смуглым, да он и не видел его толком во тьме избы. Если не замечать сморщенного века и не помнить, как она его украла из одного плена в другой, с ней можно было иметь дело, особенно после свекольного самогона — тем более, что в такие минуты зрение Рогова как бы размывалось, он старался не вглядываться, чтобы не увидеть чего-то, что сразу погубило бы любое возбуждение. Такие детали есть, и потому он фиксировал взгляд на шее, на плече.</p><p class="p1">Да, она могла и умела вызвать желание, даром что была груба, проста, лжива, — грубость и ложь были женские, а тело молодое, девическое, и можно было забыть о ее вранье и глумливом смехе. Но не помнить о том, как она увлекла его из константиновского плена в свой, как обманом заманила туда, откуда уж вовсе нельзя было бежать, — он не мог, а потому сильно и грубо мял ее тело, с отвращением понимая, что ей только того и надо. Она и сама не отставала, кусала его рот, царапала спину. Лавка была узка, они свалились на пол, и он долго, зло, как никогда прежде, вбивался в нее на полу; почувствовал, что подступает, с другой бы начал сдерживаться, чтобы продлить ей удовольствие, но тут не стал — невелика барыня. Она полежала молча, стиснув зубы и выравнивая дыхание. Он лежал рядом на животе, и сон одолевал его.</p><p class="p1">— Слабоват, — сказала она. — Ну да ничего, время будет, притремся.</p><p class="p1">Рогов, впрочем, не поручился бы, что это не приснилось ему. Ветер шумел за окнами. Не было сил противиться сну, больше похожему на обморок.</p><p class="p1">Он проснулся внезапно, с необыкновенной ясностью в голове и легкостью в теле. Сел на лавке: огромный месяц за окном стоял так низко, что едва не упирался нижним рогом в стекло. В его ртутном белом свете ясно виднелись обесцвеченные стволы, листья, травы. Видимо, ветер разогнал тучи. Анна спала на боку, по-детски подложив под щеку сложенные ладони. Рогов слышал ее хрипловатое дыхание.</p><p class="p1">Мысль о побеге явилась естественно и мгновенно: уходить надо было теперь, пока месяц еще не выцвел и сон ее не истончился перед рассветом. Стараясь двигаться неслышно, Рогов встал, подхватил с пола сумку с едой (Анна дорогу знает, не пропадет, ему нужнее) и вышел из домика.</p><p class="p1">Лес был светел, и в сиянии месяца все выглядело нереально четким, как пестрые картинки на изнанке век. Странно, но Рогов отлично знал теперь, куда идти. Месяц стоял на юго-западе, Чистое было на востоке. Минут пять он шел среди высвеченных стволов и вдруг увидел перед собой широкую поляну; на поляне стояла изба — та самая, из которой он только что вышел, — а в ней спала Анна. Он знал это, даже не заходя внутрь: в ушах у него снова раздался тот же самый жаркий голос, что и позавчера (Господи, неужели позавчера?), в день, когда он заблудился в лесу. Но теперь это было не заклинание — теперь это был смех, не ликующий и не злорадный, а ровный, тихий смех, смех шепотом.</p><p class="p1">Рогов кинулся дальше, миновав поляну, побежал наискось от месяца, опускавшегося все ниже. Он стоял теперь прямо над лесом, неестественно огромный. Шарахаясь от него и натыкаясь на стволы, Рогов бежал те же пять минут и снова выбежал на поляну, и снова безрадостный смех раздался в его ушах.</p><p class="p1">Месяц висел теперь плашмя, как белое крыло, и занимал собою полнеба. Не разбирая дороги, не соблюдая направления, Рогов ломился через лес, натыкаясь на кусты, путаясь в неожиданно выросшей траве, — но снова безрадостный смех звучал у него в ушах, и силуэт дома на поляне в ртутном свете виднелся еще издали. Этот белый свет затоплял лес, белый свет с черного неба. Дверь дома открылась, и так страшно было то, что должен был увидеть Рогов на пороге, что его подбросило на лавке, и на этот раз он проснулся действительно.</p><p class="p1">Белый свет пасмурного дня заливал дом, и смертельная скука была в этом пасмурном дне, как и во всяком позднем, больном пробуждении. Анна спала на боку, по-детски подложив под щеку сложенные ладони. Мысль о побеге… нет, все это уже было. Мысли о побеге приходят главным образом во сне. Рогов сел на полу и обхватил голову руками. Анна зашевелилась, потянулась и села рядом, не глядя на него. Лицо у нее было одутловатое, опухшее со сна, старое. На тело он старался не смотреть. Она встала, привела в порядок одежду, вынула откуда-то из складок юбки круглое зеркальце — точь-в-точь такое, как у него, — посмотрелась в него и поправила волосы.</p><p class="p1">— Откуда у тебя оно? — сипло спросил Рогов.</p><p class="p1">— У всех такое, Константин сказал носить, — удивленно ответила она. — Как же без него?</p><p class="p1">И действительно, с удивившим его самого спокойствием подумал Рогов. Как же без него? Отрежут ухо, рассекут бровь — надо же полюбоваться. Вроде татуировки у дикарей: поглядеть хоть, за какую красоту терпел.</p><p class="p1">— Ну? — спросил он. — И что теперь будем делать?</p><p class="p1">— Как что? — спросила она так презрительно-равнодушно, что он, решивший уже ни одной новой обманке не дивиться, все-таки изумился и обиделся. — Домой пойдешь.</p><p class="p1">— В Чистое?</p><p class="p1">— Зачем в Чистое? Нешто у тебя там дом? Откуда пришел, туда и пойдешь.</p><p class="p1">— Как я пойду, я дороги не знаю?</p><p class="p1">— Что тут знать-то, три километра. Я тебе покажу, в какую сторону. Неужто не дойдешь? За руку тебя вести?</p><p class="p1">— Но ты же вчера говорила…</p><p class="p1">— Мало что я говорила. Не место тебе тут. Нам такие мальчики без надобности.</p><p class="p1">Господи, подумал Рогов. Вдруг это и было испытание, вдруг ее подговорил Константин?</p><p class="p1">— Это что же, он тебе присоветовал меня так проверить? — спросил он с ненавистью.</p><p class="p1">— Дурак ты, дурак, — равнодушно сказала она. — Вижу, мальчик гладкий, отчего не поиграть. Поиграла, и ладно. Мальчик как мальчик. Нечего тебе делать с нами, хилый больно.</p><p class="p1">Только тут он испугался ее по-настоящему. Конечно, все это нужно было понять с самого начала. Зачем он ей, и какая ей нужна любовь — после той безумно напряженной жизни, которая шла в поселке? Там, где каждый день творится произвол, и страх, и мука, там, где каждый день казнь и всегда не до конца, — какая ей еще любовь? Любовь в этих местах только такой и может быть — на одну ночь, с бесчисленными обманками. А наутро надо рвать любую связь, потому что только боль и дает еще им всем почувствовать, что они живут. Как он мог купиться? Ведь один знакомец как-то в сильном подпитии говорил ему: в любви самое ценное — разрыв, помнишь про страсть к разрывам, так вот, она действительно манит, потому что только разрыв и дает тебе почувствовать, что любовь была. Раньше, говорил он, я ненавидел разлуки, теперь тороплю их, как могу. Прощания, расставания разные — мирные, бурные, яростные, — только они и дают доказательство, что я жив. Вот она, их любовь, и только такая любовь могла быть в настоящем Чистом, если оно было где-то и когда-то. На все про все сутки, а дальше опять пальцы рубить.</p><p class="p1">Он встал, застегнул рубаху, достал из нагрудного кармана зеркальце: недоуменное, по-детски обиженное небритое лицо смотрело на него.</p><p class="p1">— Ладно, иди, — скучно сказала она. — Тут тебе напрямую полчаса ходу. Шагов через сто от дома выйдешь на тропу, она тебя приведет.</p><p class="p1">— К Константину? — не удержался он. — У вас ведь все тут… с двойным донышком…</p><p class="p1">— Больно нужен ты Константину, — отвернулась Анна.</p><p class="p1">Надо было что-то сказать на прощание, что-то злое. Он вспомнил закон. Закон в том и заключался, чтобы все время превышать уровень чужой мерзости, отвечать на него мерзостью десятикратной, — но что он мог сделать? Сказать, что у нее рожа опухшая, что изо рта пахнет? Еще как-нибудь ударить горбатого по горбу? Он знал, что для таких слов она неуязвима, да он и не сказал бы таких слов. Ударить ее? Да, пожалуй, он мог бы ее ударить. Но доставить ей большей радости было нельзя, только того она и хотела — может быть, и сознательно провоцировала его. Он представил себе ее блаженно закатившей единственный глаз и передернулся от омерзения.</p><p class="p1">И все-таки Рогов нашел последние слова.</p><p class="p1">— Ладно, — сказал он, стоя у двери. — Бывай здорова, желаю тебе счастья, здоровья хорошего. Мужа доброго и детей побольше. Дети — они, знаешь, главное.</p><p class="p1">— Мразь! — Яростный черный глаз уперся в него.</p><p class="p1">— Бывай здорова, — повторил Рогов и спустился с крыльца.</p><p class="p1">Через час он был в Чистом, а еще через два часа — в Камышинском.</p></span>
