<span><p class="p1">— А ты проверь, проверь. Я даже недавно читал где-то… Ну, под Омском, понятное дело, не знали этого ничего. Их ведь когда на фронт вывозили, то, явно, не всех, да и тайно. Так что хозяин мой ничего про их участие в войне не слыхал. Они, мужики-то, сначала думали — на вредное производство или на опыты какие их прислали, но оказалось — они там стали жить своим вроде как колхозом. Переписываться им ни с кем, понятно, было нельзя. Доступа — никакого, охрана за версту не подпускает, район строго засекреченный. Я и сам тогда подумал, что не иначе как опыты ставят на них. В Москве, слава Богу, разнос меня миновал, но историю я эту запомнил и на будущий год опять туда поехал. По своей инициативе. Поздно ты, Алексей Степаныч, говорит мне мужик, у которого я стоял. Распустили их. То ли выслужили они себе свободу, то ли больше не нужны. Один, говорит, ко мне зашел, заночевал, расспросил, что в мире делается. Информации у них там не было, понятное дело. Сам я его на подводе на станцию отвез, в поезд посадил… И охрану сняли. Не веришь, говорит, — сам сходи, погляди. И рассказал мне примерно, как до поселка добираться.</p><p class="p1">Как всегда, на самом интересном месте Кретов сделал паузу, долго возился с носогрейкой, сопел, пыхтел… За окном начинало смеркаться, пора было садиться в машину и возвращаться в Москву, но Рогов привык дослушивать стариковские рассказы до конца. Они завораживали его. Тем более, что разговор был в тему.</p><p class="p1">— И вы пошли, дядь Леш? — спросил Рогов, выждав положенную паузу.</p><p class="p1">— Пошел, — кивнул Кретов. — Заблудился, долго ходил, но я в тайге ориентировался прилично — нашел. На совесть выстроено было. Да только пусто.</p><p class="p1">— Что, никаких следов?</p><p class="p1">— Никаких. Пустые дома как есть. Барачного типа, длинные, с крошечными оконцами. Внутри буржуйки ржавые. Электричества нет, проводов не подвели, — как уж они там жили, не представляю. Много странного я там видел, Слава. Плац не плац, а площадь — то ли для маршировки, то ли для собраний. Прудик выкопан вручную, как уж наполняли, не знаю, дождевой, что ли, водой… Стенды с картинками, которые видеть — Бог не приведи.</p><p class="p1">— А что?</p><p class="p1">— Ой, не спрашивай. Рисунки какие-то, а на них — пытки, уроды… Лозунга ни одного. Ерунды этой, которой в городах полно, вроде «Слава труду», близко не было. Только один лозунг на барачной стене, но такой, что лучше бы не было.</p><p class="p1">Рогов затаил дыхание. Рассказывать Кретов умел.</p><p class="p1">— Красной краской, ровными буквами, аккуратно, знаешь, и чтобы издалека видно, выведено: «Дома никого нет».</p><p class="p1">Рогов засмеялся:</p><p class="p1">— Все ушли на фронт.</p><p class="p1">— Э, нет. — Кретов погрозил пальцем. — Ты думаешь, это они перед уходом написали? Нет, брат, все не так просто. Лозунг-то старый был, краске лет уж десять. Это они себе напоминали о том, что их никто не ждет. Что та жизнь вся кончилась, вся за бортом. Отрезаны, для всего мира давно мертвы и заново родились. Все — с нуля. И то сказать — какая им была бы прежняя жизнь после всего, что с ними творили? Теперь уж только голый человек на голой земле… Передовой отряд строителей коммунизма…</p><p class="p1">— С чего же их распустили?</p><p class="p1">— Этого я знать не могу. Очень ты многого хочешь, голубчик. Я так думаю, действительно выслужили они чем-то себе свободу. А может, просто разочаровался он в этой затее — больно мало их было… Но тогда, думаю, брать перестали бы. Скорей всего эти просто свое дело сделали, вот их и пожалели. А новых набрали. Да только место не высвободилось — они все вернулись.</p><p class="p1">— Когда?</p><p class="p1">— Кто когда. Это уж мне тот самый мужик отписал, у которого я гостил. Я ему специально адрес оставил: узнаешь, мол, что новое, отпиши. Они в Сибири не так были запуганы, как в России. Куда их сошлешь? У них и так на тысячу верст тайга… Так что он скрывать не стал, отписал мне.</p><p class="p1">— И что отписал?</p><p class="p1">— Я в пятьдесят первом году письмо от него получил, может, и цело где. Писал, что еще в сорок восьмом первые стали возвращаться, тоже через деревню прошли. Все седые, серые, рожи — страшней не придумаешь. Не разговаривают почти, а между собой все больше на полупонятном каком-то языке, вроде лая. Может, и вправду там над ними эксперименты какие-то ставили?</p><p class="p1">— Могли, — в задумчивости сказал Рогов.</p><p class="p1">— Больше я туда не ездил. Долго добираться, да и страшно, знаешь, как-то. Но поселок тот пустой до сих пор передо мной, как вчера, стоит. И знаешь ты самое страшное?</p><p class="p1">— Куда уж страшней…</p><p class="p1">— Там, на плацу этом, стояло несколько скамей, как для зрителей. Я боялся отчего-то на них присесть, но на одной видел надпись. И запомнил. Да и как не запомнить — стихи…</p><p class="p1">— Ну! — почти крикнул Рогов.</p><p class="p1">— «Дуют четыре ветра, волнуются семь морей…»</p><p class="p1">— «Все неизменно в мире, кроме души моей», — закончил Рогов, сразу все поняв.</p><p class="p1">— Ты откуда знаешь? — Кретов посмотрел на него почти в испуге.</p><p class="p1">Вспоминая потом этот вечер, Рогов думал, что было ему чего испугаться, что, услышав от дачного соседа, мальчишки, стихи из своего давнего кошмара, — осенним вечером, в безлюдном поселке, без света, которого они не зажигали, сумерничая, а только в отблесках печки, в которой дотлевали уголья, — сам он непременно сошел бы с ума. Но Кретов был старик крепкий. Рогов рассказал ему историю о Сутормине.</p><p class="p1">— Может быть, может быть… — Старик покачал головой. — Больно похоже… Но не забывай, эти стихи не обязательно написал тот офицер. Их просто могли знать два человека…</p><p class="p1">— Могли, — кивнул Рогов. — Но я в такие совпадения не верю, дядь Леш.</p><p class="p1">— А что, веришь в другие совпадения?</p><p class="p1">— Да. Видите ли, я несколько раз слышал истории о том, как расстрелянные возвращались. Да вы и сами мне говорили, что формула «десять лет без права переписки» могла означать вполне реальные десять лет на секретном заводе, если речь шла о ценном специалисте. Так что, похоже, вы и впрямь набрели на какой-то секретный отряд…</p><p class="p1">— Да не набрел, — вздохнул Кретов. — Я же только пустое место видел…</p><p class="p1">— Может, скажете, дядя Леша?</p><p class="p1">— Чего скажу?</p><p class="p1">— Название поселка.</p><p class="p1">— Да что ты, милый, какой же там теперь поселок… Той деревни давно нет. Там город теперь, Омск-то разросся… Я специально проверял, хоть и не ездил. И тайги там давно нет. Так что если и остались где-то те выжившие или их потомки — то явно ушли от людей гораздо дальше. Их сейчас не там искать надо…</p><p class="p1">— Лукавите, дядь Леш, — сказал Рогов уверенно. — Я по голосу слышу.</p><p class="p1">— Да какой смысл мне тебе врать? Был бы молодой, я сам бы съездил. Да и тебе это нужно — ты историк, сразу книгу бы написал…</p><p class="p1">— Так скажите!</p><p class="p1">— Да что я тебе скажу, если нет давно никакого поселка? Город там, говорю тебе, город.</p><p class="p1">Рогов посмотрел на часы. Дома мать, вероятно, уже тревожилась: он обещал вернуться к шести, а засиделся у Кретова до половины седьмого, и ехать ему предстояло по темной дороге не меньше двух часов. Гнать после двухсот граммов водки, пусть и настоянной на чесноке, он себе не разрешал.</p><p class="p1">— Еще-то приедешь? — спросил Кретов, как показалось Рогову, с надеждой.</p><p class="p1">— Да в этом году уже вряд ли, дядя Леша. Может, забрать вас в Москву?</p><p class="p1">— Нет, я до ноября побуду. Чего мне в Москве делать? Скука… Здесь я один — и никого кругом, а там я один — и вокруг люди. Напоминают. Нет, поживу здесь… Летом приезжай!</p><p class="p1">Только в машине Рогов протрезвел и понял, что старик скорее всего не врал. Услышав стихи, он действительно схватился за стену, словно боялся не устоять на ногах. Скорее всего он и впрямь наткнулся на поселение, в котором держали репрессированных. Впрочем, это еще не было окончательным доказательством кретовской версии о том, что под Омск свозили отфильтрованных и ни в чем не признавшихся. Рогов почти верил, но ему не хватало последнего аргумента — и он этот аргумент получил. Хорошая версия всегда притягивает нужные подтверждения.</p><p class="p1">В очередном альманахе «Былое» сотрудник Омского краеведческого музея опубликовал очерк о местном городском сумасшедшем, чье безумие давно не вызывало сомнений, но при общей деградации личности он отличался поразительной памятью на эпизоды серебряного века и стихи тогдашних поэтов. Умер он в шестидесятом в местной психиатрической больнице, а до этого десять лет скитался по Омску как юродивый. Богомольные старушки подкармливали его и считали провидцем. Он не называл своего имени, но утверждал, что знал Блока, видел Есенина, слушал Маяковского. Потом, говорил он, его сослали. Но Омск не был местом ссылки, и до пятидесятого года этого юродивого никто здесь не видел. С особенным упорством он повторял, что умер и живет теперь вторую жизнь, после смерти, но об этом ему свидетельствовать нельзя. Несколько приведенных в очерке рассказов юродивого о Блоке, с точным цитированием его реплик и стихов, выглядели поразительно достоверно — Рогов, хорошо зная серебряный век, не сомневался, что перед ним один из жителей странного поселка.</p><p class="p1">— Они хотели, чтобы я их оговорил. Всех оговорил: и живых, и мертвых. И Александра Александровича, — говорил юродивый. — Но я ничего им не сказал. Ничего не сказал. Дудки!</p><p class="p1">Это явно был один из тех, ничего не подписавших и никого не оговоривших. Бежать ему было некуда: он лишился памяти и рассудка и жил в Омске подаянием. Но в том, что сумасшедший видел и слышал живого Блока, не было сомнений. Именно Блок мог сказать в десятом году: «Все мы не те, за кого себя выдаем, и те, которые понимают это, лгут вдесятеро больше. А тех, кто не лжет, вообще следовало убить при рождении».</p><p class="p1">Рогов, возможно, сомневался бы и после этого, но открылся доступ к архивам КГБ, и ему как внуку репрессированного и вдобавок молодому историку быстро дали допуск. Все факты о Клочкове были закрыты, получить его воинские документы он не смог. Это не подтверждало, но и не опровергало Кретова. По возрасту Клочков вполне мог успеть сесть в тридцать девятом.</p><p class="p1">Получил Рогов и дело деда, которое ему выдали после известного приказа Бакатина. Странно было, что о его деде, который в конце тридцатых занимался безнадежным экспериментом, так заботятся — хранят дело, например… Теперь, когда он был мертв, то есть принес главную жертву, заботиться уже было можно. Рогов вспомнил, что и в армии, в первый день, когда майор в военкомате в последний раз досматривал их вещи перед отправкой на городской сборный пункт, в интонациях его просматривалась почти отеческая нежность. Они были тут, никуда не делись, привезли и принесли себя, — пища была доступна и вызывала теперь дружеские чувства. Забота о деле Скалдина была как замена надгробия, которое тому не полагалось, как уход за могилой, хотя теперь Рогов отнюдь не был убежден, что пепел доцента ссыпали в общую яму в Донском крематории. Дед держался фанатически, Рогов ощутил прилив внезапной гордости за него, и особенно его умилило, что на фотографии в следственном деле Скалдин улыбался. Пожалуй, сходство между ними действительно было налицо. В деле над ней словно не властно было время, и она выглядела как снятая вчера. Никакой печати обреченности Рогов на этом лице не прочитал. Скалдина фотографировали до всяких допросов, он был еще полон жизни, и Рогов впервые заподозрил, что не только бабка его была безумна, дед тоже страдал странной формой душевного заболевания, чем и объяснялась его патологическая стойкость. Скалдин в самом деле ничего не понимал. Он пересказывал всю свою биографию, подробно, как для «Пионерской правды», излагал теорию Михайлова (согласно которой, кстати, растения реагировали на тембр голоса садовода и агронома, так что общаться с ними следовало ласково, — антропософский взгляд, заметил про себя Рогов: доктор Штайнер тоже занят был выведением метафизики навоза…). Так держаться в самом деле мог только человек безграничной наивности, переходящей в идиотизм. Правда, протоколы последних допросов были ужасны. Там дед уже не говорил ничего: страшны были эти однообразные листы без ответов и подписи. Подшита была (работали честно) и справка из тюремной больницы о реактивном психозе, который, как выяснилось, излечению не поддавался. В июне тридцать девятого Скалдина расстреляли, хотя в этом-то Рогов теперь сомневался серьезнее всего. На папке стоял жирный красный крест, и ни один архивист не мог объяснить его значения.</p><p class="p1">Правда, на деле Бабеля никакого креста не было, но Бабель поначалу себя оговорил и только в тридцать девятом взял все показания обратно. Акт о его расстреле был отпечатан на машинке, никаких указаний на судьбу рукописей Рогов в нем не обнаружил. Но последним в деле — уже после акта об исполнении приговора — был подшит странный бумажный лист, на котором наискось, слева направо, прямым острым почерком было крупно выведено: «Рассмотреть». Что тут было рассматривать после того, как в феврале сорокового года Бабель, столько раз в молодости избежавший расстрела, все-таки был убит, Рогов понять не мог. Возможно, речь шла как раз о судьбе рукописей. Если так, надеяться было не на что: рассмотрение вряд ли оставляло им шансы.</p><p class="p1">Никаких документов на старшего лейтенанта Сутормина Рогову получить не удалось. Архивы Министерства обороны, правда, не рассекречены и по сю пору, но в справке, которую Рогову выдали, говорилось, что в период с 1943 по 1945 год человека с такой фамилией и в таком звании никто не арестовывал. Ветеран в поезде мог ошибиться.</p><p class="p1">Разумеется, был и некоторый процент несознавшихся, которые, однако, общим неизменным порядком поехали в лагеря: это несколько нарушало стройность теории. Рогов прочел несметное количество «мемориальских» сборников, в которых печатались воспоминания таких героев. Для очистки совести некоторые из них он проверил, если, конечно, выдавали дело: выяснилось, что большая часть авторов героизировала себя задним числом. Отказываясь признать самый опасный пункт обвинения — типа террора, — они почти без нажима брали на себя агитацию или любой другой менее гибельный подпункт пятьдесят восьмой, получали свой пятерик или семерик и отбраковывались в лагерники — фракцию второго сорта. Существовали, правда, и те, кто действительно ничего не признал и все равно получил срок: видимо, что-то главное о них стало ясно уже в процессе следствия, и их просто не стали додавливать до конца. Такое случалось в основном до переломного, костоломного сорок восьмого года, в начале которого проверка стала жесточе, чем когда-либо. С чем это было связано, Рогов не знал: видимо, Верховный опасался новой войны и слишком еще помнил, как бесславно начал эту. Слабаков надо было выбраковать заблаговременно. После сорок девятого тех, кто ничего не подписывал, додавливали уже до конца — либо вырывали признание, либо гнали по всем кругам: большинство упершихся после этого значились «умершими от сердечной недостаточности» (Рогов уже почти не сомневался, что это означало отправку в «золотой легион»). Смертная казнь была к тому времени гуманно отменена, ввели четвертак, но как раз четвертака-то никому из таких отказников не давали: они, так сказать, успевали умереть.</p><p class="p1">Правда, и процент упорствующих в своей невиновности значительно уменьшился: признавались почти все, причем в вещах столь фантастических, что это наводило уже на мысль о полном безразличии и следователей, и обвиняемых к истинному положению дел. Большая проверка на глазах становилась бессмысленной уже потому, что чувство вины вошло в кровь, все ощущали себя если не виновными, то обреченными, и отстаивать свою чистоту в этих обстоятельствах не имело смысла. Невиновный в одном был непременно замешан в другом, да и ясно было, что мотивом ареста является никак не вина. Из этой новой генерации, выросшей в результате послевоенного разочарования и нового террора, нельзя уже было выковать никакого «золотого легиона». То-то Верховный и перестал их жалеть: брали больше и неразборчивее, чем в тридцать седьмом.</p><p class="p1">Судя по всему, сам Верховный не ждал такого результата. Он учел все, кроме того, что после пятнадцати лет отбора станет не из кого выбирать. Людям тридцатых было для чего отстаивать свою невиновность, люди сороковых готовы были с равной легкостью принимать пытки за несуществующую вину или за отказ от нее: им ясно было, что никакой вины нет или что все — вина, а это по большому счету одно и то же. Из этого нового поколения, безразличного к собственной участи, никак не получалась бесстрашная когорта: случился тот перебор страха, после которого ужас сделался буднями и превратился в равнодушие. Это и было концом эксперимента и вероятной причиной роспуска тех, кого отобрали в тридцать седьмом.</p><p class="p1">Проживи он чуть дольше, анекдоты стали бы рассказывать ему в лицо.</p><p class="p1">За всеми этими делами, за несколькими беглыми студенческими романами, за поездками на пару заграничных конгрессов (в начале девяностых наши были приглашаемы охотно и повсеместно) прошли два года, в которые Рогов не выезжал на дачу. Он хотел кое о чем порасспросить Кретова, но догадывался, что старик сказал все или почти все — допытываться было бессмысленно. Кроме всего прочего, в девяносто третьем Рогов женился, а в девяносто пятом развелся, потому что жена, в его классификации, была как раз олицетворением слабости. Его злила ее беспомощность, робость, детскость, ему не льстила роль столпа и защитника, и он не любил, когда ему смотрели в рот, — тем более, что был абсолютно уверен в лицемерии жены, которая не понимала ни слова из того, о чем он говорил, а значит, в душе должна была его презирать, потому что — в этом он не сомневался — люди презирают все, что выше их понимания.</p><p class="p1">К двадцати четырем годам он вообще стал тяготиться людьми. Даже мать иногда раздражала его, хотя к ней одной он и был по-настоящему привязан. Мать он не подвергал своей вечной пробе на слабость или силу, потому что сильна была ее любовь к нему и его любовь к ней, сильна была их связь, а прочее не имело значения. Прочие люди, окружавшие его, не выдерживали даже самой снисходительной пробы: настали времена попустительства, слабость возвели в принцип, идея любой иерархии отвергалась с порога. Слово ничего не значило, клятва ничего не весила, понятие долга на глазах упразднялось, и больше всего это было похоже на загнивание тела, отвергшего душу за ее обременительностью. В этом мире не то что не к кому было прислониться — Рогов давно выучился самодостаточности, — но и некого было ненавидеть, потому что ненавидеть пришлось бы всех.</p><p class="p1">Рогов, однако, не впадал ни в злобу, ни в панику. Он был историком и понимал, что всякая тирания растит умников, которым становится тесна, а всякая свобода поощряет глупцов, которым она не нужна. Каждая эпоха в собственных недрах взращивала своих могильщиков, и этим обеспечивался их вечный круговорот, опровергавший плоскую теорию формаций. Никаких формаций не было — была одна безвыходная смена диктатур и попустительств, сглаженная на Западе, чересчур откровенная на Востоке. С годами она, как и все в истории, убыстрялась, чем наводила на мысль о неизбежности конца света: ежедневной смены мир бы не выдержал. Хотя эту модель стоило обдумать: день казней сменялся ночью реабилитаций, оргиастическое самоистребление — оргиастической свободой. Год вмещал сотни эпох. Беда была в одном: не хватало населения. Оно должно было бы вымереть после полугода таких смен: публичные казни требовали сырья, свобода требовала вредных излишеств. Получалось что-то среднее между гитлеровским Берлином и нероновским Римом с некоторой примесью Ивана Грозного. Но и эта жизнь — непрерывная оргия на руинах, окончательно сближавшая крайности, — была бы лучше, чем тотальное расслабление, которому Рогов был свидетелем и посильным хроникером.</p><p class="p1">Он неплохо зарабатывал, сочиняя «исторические календари» и фривольные очерки для глянцевых журналов; не был обделен женским вниманием, хотя долгими отношениями тяготился; много времени проводил один. Он продолжал — сначала из любопытства, потом словно по обязанности — пополнять свою картотеку загадочных возвращений 1948 года и все чаще задумывался над гипотезой Кретова. Гипотеза по-прежнему объясняла все, исследования Суворова и Авторханова только подтверждали ее. Пройти через аресты предстояло не отдельным жертвам случайного выбора, а народу в целом — в этом Рогов не сомневался; он не до конца верил только в «золотую когорту», в поселение под Омском, но понимал, что иначе весь фильтр не имел смысла.</p><p class="p1">За это время он побывал на даче считанные разы, привозя и увозя мать. Один раз он Кретова не застал: тот как раз уехал за продуктами и новой порцией водки, в другой раз бегло с ним поздоровался, а летом девяносто пятого старик вообще не решился поехать на дачу: хворал и отлеживался в городе. Рогову приходила мысль его навестить, тем более, что и больной Кретов все-таки ассоциировался у него не со слабостью, а с силой, — но не было времени, и вряд ли теперешний, преждевременно повзрослевший, замкнутый Рогов был старику по-настоящему нужен. Он умел не требовать и даже не вызывать сочувствие — в этом было его достоинство, и Рогов уважал это редкое по нынешним временам свойство. Для очистки совести он все-таки позвонил. Телефон Кретова был записан в телефонной книжке отцовским крупным и тоже как бы просящим почерком. Рогов позвал дядю Лешу и усмехнулся про себя: какой он ему теперь дядя? Соседка сказала, что старика нет дома.</p><p class="p1">Тем не менее ранним летом девяносто шестого Рогову все-таки пришлось поехать к тому домой, на Красные ворота, но живого Кретова он уже не увидел. Позвонила соседка — Кретов жил в коммуналке — и сказала, что Алексей Алексеевич (Рогов впервые услышал его отчество) просил кое-что передать ему. Это совпадение Рогова смутило. Большинство вернувшихся тоже хотели кое-что передать. Он почувствовал укол совести — мог бы и навестить старика, тот был неотъемлемой и, может быть, лучшей частью его детства, и вместе с ним это детство ушло совсем уж невозвратно, хотя видеть слабость и дряхлость Кретова было бы, наверное, еще страшней. Так он по крайней мере останется для Рогова олицетворением той прочности и загадочности, которую оба они так ценили в старых вещах. И Рогов подумал, что именно что-то из этих старых вещей Кретов и завещал ему.</p><p class="p1">Против всех его ожиданий в Москве Кретов жил бедно, почти скудно. Старая соседка провела Рогова в маленькую комнату, которую теперь получал соседкин внук (видимо, так и ждавший кретовской смерти). Стены были голые, в отставших обоях, — только на одной висела огромная и подробнейшая географическая карта СССР. Вместо кровати был топчан, тогда как на даче Кретов спал на уютнейшем, добротном черном кожаном диване, словно впитавшем усталость нескольких поколений и оттого так и манившем прилечь. Бывают намоленные иконы, бывают и належанные постели, на которых перебывало много усталых людей и на которых слаще всего спится.</p><p class="p1">Все лучшее старик явно свез на дачу, и грустно было Рогову стоять среди убожества, которое того окружало. Кретов жил совсем один, хотя на дачу нашлась наследница — какая-то внучатая племянница, седьмая вода на киселе, которая в больнице не навестила старика ни разу, а ведь умирал он долго и тяжело — от нефрита, но после его смерти объявилась буквально на другой день и предъявила права на наследство. За год до смерти, в девяносто пятом, старик на месяц ездил куда-то — соседке сказал, что по местам былых экспедиций, где у него остались друзья. В Москве у него был единственный друг, заходивший изредка, тот самый, о котором он рассказывал Рогову, когда они вышли к бездонному озеру. По словам соседки, это был тоже бодрый еще, сухой и крепкий старик, но в последнее время не появлялся и он. Видно, тоже болел. А может, Кретов не хотел показываться ему в своей немощи.</p><p class="p1">Дачное соседство внучатой племянницы Рогова опечалило: ему грустно было думать, что вещи его детства вышвырнут на свалку или пропитают своим, чужим, запахом. Чувство вины перед стариком было у него даже острее, чем вина перед отцом. Все-таки я свинья, подумал Рогов. В комнате не слышалось никакого запаха, кроме сыроватой затхлости: квартира была старая. Даже кретовской носогрейкой тут не пахло. Трубка лежала на столе. Соседка вышла, на минуту оставив Рогова одного, а потом принесла что-то плоское, в газете.</p><p class="p1">— Вот, он просил передать вам, — сказала она. — Прямо так, в газете, специально завернул.</p><p class="p1">Газета была обычная, полстраницы из «Комсомолки» семидесятых, судя по шрифту, годов: Кретов хранил старые подшивки, утверждая, что интересуется этими напластованиями как геолог. Рогов развернул плоский сверток. В руках у него оказалось круглое карманное зеркальце.</p><p class="p1">Он умел держать себя в руках, но тут кровь прилила к голове и застучала в ушах. Кретов мог оставить ему любую из своих вещей, но только не эту. В этой не было никакого видимого смысла, кроме того, о котором он мог лишь смутно догадываться. Такое же круглое карманное зеркальце показывал какой-то девочке в окне петербургский дальний-предальний родственник отца — выходит, он не просто так пускал своего зайчика. В руках у Рогова был пароль, неизвестно о чем говорящий, неизвестно кому предназначенный. Он осмотрел газетную страницу с обеих сторон. В глаза ему бросился крупный заголовок — «Чистое сердце наставника»; на обороте был другой, помельче, — «чистое небо над Анголой». Слово «чистое» было оба раза подчеркнуто красным фломастером.</p><p class="p1">— Он сказал, что вы поймете, — тихим голосом предупредила его вопрос соседка.</p><p class="p1">— Я понял, — неожиданно для себя отозвался Рогов. — Тут все, что надо. Спасибо вам.</p><p class="p1">Поселок, о котором говорил Кретов, и не мог называться иначе. «Чистое» было единственно возможным названием, и если место выбирали со смыслом, а не случайно и не в силу труднодоступности, то и названием было сказано все, что нужно. Непонятно было только, при чем тут зеркальце, — об истории с ленинградским родственником Кретов ничего сколько-нибудь внятного не знал. Рогов на всякий случай приложил зеркальце к газете, но никакая тайнопись в ней не обнаружилась — обычные перевернутые буквы.</p><p class="p1">Рогов, естественно, навел необходимые справки. Он пролистал подшивки «Комсомолки» за семидесятые годы и обнаружил, что Кретов завернул зеркальце в клочок газеты от 27 марта 1973 года, но ему эта дата ни о чем не говорила. Проверил он по автомобильному атласу СССР и наличие деревни или поселка с названием «Чистое» в Омской области. Таких Чистых было три, и которое имел в виду старик — неизвестно. Все три были порядочно удалены от города и находились в местах, малодоступных даже по нынешним временам.</p><p class="p1">Отпугнуть Рогова это не могло. Он не рассчитывал на встречу с кем-то из уцелевших — дожить до девяносто шестого могли единицы, а после таких пыток и таких условий в глухом сибирском поселке это представлялось почти невероятным. Но поселение было цело — не зря Кретов ездил туда. В августе, когда в тайге уже не так много мошкары, Рогов взял отпуск, сказал матери, что едет в Сибирь погостить к бывшей однокурснице, быстро собрался и вылетел в Омск.</p><p class="p1">Утром последнего своего дня в Москве Рогов вышел на балкон и со странным, прощальным чувством оглядел двор. Он почему-то делал так перед каждой поездкой: ощущение собственной хрупкости и смертности было ему знакомо с детства. Мог разбиться самолет, мог перевернуться автобус, да, в конце концов, он мог просто остаться в Чистом, если найдет его. Это настроение тихого прощания усугублялось общей августовской грустью, яркой синевой неба с большими неподвижными облаками, прохладой, рябиной. В детском городке малышей не было, какой-то великовозрастный детина пощипывал струны обшарпанной гитары, у соседа внизу орал телевизор. Шло обычное, мирное и сладостное утро городской окраины, радостно-печальное, как всякий погожий день в конце лета; прекрасны были березы с прожелтью, старухи на скамейках, тополя с их пыльной листвой, дом напротив с его голубыми балконами, завешанными бельем, — все было прекрасно, но делать здесь больше было нечего.</p></span>
