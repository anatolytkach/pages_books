<span><p class="p1">Седова умерла в ночь на шестнадцатое марта, одна, в своей монашеской комнатке на третьем этаже Елагина дворца, рядом с дворцовой церковью. Ей не было и шестидесяти лет, она все жаловалась на усталость, но и сама не придавала значения хворям, и другим запрещала расспрашивать о них. Утром она не вышла к завтраку. Ловецкий побежал наверх, отчего-то уже на лестнице догадавшись о случившемся. Седова лежала поверх одеяла в своем неизменном мышеватом, как его называли, платье, — сером с прозеленью, шерстяном; будто прилегла отдохнуть, не раздеваясь, и здесь умерла в одночасье. Один глаз был полуоткрыт и мутен.</p><p class="p1">О чем она думала в свои последние минуты, что делала в своей холодной, маленькой, аскетической комнатке, что читала, кроме всюду путешествовавших с ней житий? Не было даже догадок, да по большому счету — кого и могла всерьез заинтересовать Седова, пока была жива? Она за все время пребывания в коммуне брала слово два или три раза; и слова ее были самые безликие, самые ортодоксальные — всю жизнь изучая цветистые, избыточные русские говоры и диалекты, сама она говорила стертым голосом, стертыми словами, точно раз навсегда испугавшись всех этих народных художеств и противопоставляя им холодную петербургскую норму. Раз только видели ее вышедшей из себя — когда она вдруг закричала, что не позволит Борисову позорить его учителя, — но и тогда она почти тотчас успокоилась. Как ни ужасно это признать, но бывают люди никакие: всякому из нас приходилось хоть раз наскочить с лёту на такого человека, разрешать его загадку, отыскивать в нем то, что дает силу жить в этом равновесии — и отступаться в недоумении: сосуд запечатан, на поверхности — ни трещины, ни шва. Бушевали ли в седовской душе непредставимые страсти? Хранится ли где-нибудь зашифрованный дневник с засушенным цветком или закладкой из той самой ленты с той самой шляпки? Или во всю свою жизнь умудрился наш таинственный спутник не полюбить, не отчаяться, не обрадоваться? Быть может, только так жить и следует — и, как некоторым дается от рождения вера в Бога, так другим, вероятно, вручается душевное равновесие, род нирваны. Я не хотел бы такой участи, нет — не хотел бы. Казарин даже тряхнул головой, прогоняя видение.</p><p class="p1">Похороны назначены были на третий день, на Волковом кладбище — у Седовой обнаружилась вдруг двоюродная сестра, рослая шумная старуха, уже семнадцатого с утра явившаяся в коммуну. Сестра тут же принялась выспрашивать, кто в коммуне главный (за главного с самого начала считался Хмелев, но никакими административными полномочиями не обладал), не причитается ли ей теперь какой пенсии или пайка за Седову, не будет ли помощи от Наркомпроса в деле организации похорон, нельзя ли ей поселиться вместо сестры, приведя с собою заодно и бабу-прислугу, — и сколь ни был Хмелев заинтересован в росте численности своих единомышленников, кузине он отказал наотрез. Понявши, что он никакой не начальник, двужильная баба принялась на него орать, прямо обвинять в гибели единственной родной души (о которой она до того годами не вспоминала) и в равнодушии к ее посмертной участи; Хмелев действительно не находил в себе сил ехать к Чарнолускому и требовать гроб, могильщиков, пособие, которого так домогалась двоюродная сестра… Обо всем неожиданно позаботился Хламида, которому сразу доложил бледный длинный секретарь: хотя Седова и не приняла никакого участия в работе «Всеобщей культуры», под патронаж Хламиды автоматически подпадали теперь все елагинцы, и вопросы решились тут же. Кузина сообщила, что отец Седовой (между прочим, главный инженер Головинского чугунолитейного завода) похоронен на Смоленском кладбище в 1902 году и на могиле его стоит огромная чугунная клетка, сваренная из лучшего сорта чугуна, который инженер Седов лично разработал. Под клетку и решено было положить дочь инженера.</p><p class="p1">Никогда не удостаивалась Седова таких почестей: гроб несли по очереди лучшие представители столичной профессуры, шел за ним и Хламида, печально опустив голову, пощипывая усы и порой смахивая слезу. Он видел Седову единожды в жизни и понятия не имел, кто она такая. Процессия растянулась на десятки метров, к ней приставали нищие, интеллигенты, потрепанные аристократы, городские сумасшедшие, и часть пути прошел даже патруль, которому все равно днем делать было нечего — так хоть поглазеть. В хвосте процессии не знали, кого хоронят, да и ответить на этот вопрос было затруднительно: как объяснить петроградскому нищему, что к последнему упокоению движется прах диалектолога? Он решит, что это дохтур, и будет по-своему прав. «Профессор», — скупо отвечал Казарин. Хламида честно пытался достать и оркестр, но музыканты были в тот день заняты — в городе одновременно закладывалось три памятника героям революции, в том числе Шарлю де Костеру; в честь Костера Чарнолуский говорил речь, а потому на похоронах Седовой присутствовать не смог. Если б не Костер, вероятно, он пришел бы — и события могли пойти по непредсказуемому сценарию; но нарком, никак не ожидавший превращения похорон Седовой в митинг, предпочел говорить речь об искрометном Тиле, злейшем враге косности и поповщины. Большая часть пролетарской аудитории, собравшейся на закладку памятника, заключила, что Костёр — нечто вроде псевдонима, взятого пламенным борцом за народное дело. Поскольку в речи Чарнолуского, растянувшейся, по обыкновению, на три четверти часа, постоянно упоминался какой-то пепел класса (очевидно, пролетарского), слушатели пришли к выводу, что буржуазия вместе с поповщиной бросила своего злейшего врага в костер: ты, мол, так прозывался, так ты же теперь и гори. Уже после того, как нарком, заложив первый символический камень в столь же символический постамент, уехал с Лиговки в Смольный, обыватели долго еще делились впечатлениями:</p><p class="p1">— Вишь, они говорили ему: отступися! Отступися, добром просим! А он — ни в какую: вы, говорит, утиль! Ну, они и кинули его в костер, в костэ-эр, по ихнему-то говоря: гори, говорят, разбойник ты эдакой. Твоим же салом тебя и по сусалам. Вот как болел за народ, а не то что сейчас.</p><p class="p1">— Да, эти-то гладкие ездют…</p><p class="p1">День был солнечный, ясный, с блекло-голубым, совсем уже весенним небом. Ослепительно, радостно блестела грязь, и кое-где обнажились мостовые. У часовни Ксении Петербургской толпились, как всегда, богомольные старухи и кладбищенские нищие; молодая заплаканная девушка долго стояла у стены, прижимаясь к ней то ладонями, то губами, — потом повернулась и быстро пошла прочь; за кого она просила? Ксению звали «скорой помощницей», Казарин любил легенды об этой истинно русской святой, любил и саму святую, в которой так; просто и ясно воплотилось все лучшее в его городе. Ему никогда не нравился Питер каменный, Питер административный, — чуть больше он любил город салонный, ресторанный и клубный, но какой-то частью души особенно сладко и болезненно чувствовал родство с окраинами, с их сырым простором и деревянными купеческими домами. Это был город нестрашных суеверий, тихих, невидимых миру слез, глубоких и скрытых страстей — тут случались примеры любви удивительной, надрывной, верной, тут ютилась кроткая нищета (часто готовая, впрочем, обернуться зверством), и Ксения Петербургская была хранительницей и заступницей этих мест. В ней не было ничего от грозной правоты русских святых, — но и в том, как она ночами выходила в поле, за город, молиться, и в том, как тайно носила кирпичи на леса строившейся тогда Смоленской церкви, и в том, как клюкой грозила мальчишкам, и даже в том, как говорила купеческим дочкам — «Беги на кладбище, там тебя ждет жених» (а в это время на свежей могиле лежит без чувств молодой вдовец), — была подлинная, ни с чем не сравнимая святость, и агностик Казарин безропотно и любовно склонялся перед ней. Он и теперь незаметно и неумело поклонился часовне Ксении Петербургской, но креститься не стал — не потому, что боялся быть уличенным, а потому, что не любил публичных жестов. Многие после переворота принялись демонстративно креститься на храмы, — но что на свете хуже дозволенной фронды?</p><p class="p1">В церкви отпевали какого-то старика, пришлось ждать; Казарин считал отпевание оскорбительным предрассудком, пение над гробом казалось ему бессмысленным; различив слова о том, что раба Божия Анна должна упокоиться в лоне Авраамовом, он попытался себе представить, что общего у Седовой с этим старым евреем, — и, коря себя за кощунство, никакого сходства не нашел. Может быть, ограничивая роль церкви в жизни общества, компомпомы были не так уж и не правы, — если б только это делали не они, совсем было бы хорошо; но эти мысли он отогнал тут же. Он твердо знал с самого начала, что оправдывать их нельзя ни в чем — от частных оправданий был всего шаг до сговора с дьяволом, а лик дьявола во всей его грубой простоте рисовался Казарину ясно, стоило вспомнить о декретах, реквизициях, упразднениях и разрешениях всех мировых вопросов путем ликвидации вопрошающих. От марксизма воняло — воняло с тех еще невинных пор, когда молодые русские профессора принялись поверхностно им увлекаться; от марксизма же, прошедшего через окопы, воняло так, что, даже если бы Ленин выучился словом излечивать чуму, Казарин сделал бы все, чтобы заразиться. Разумеется, это была только метафора, — теперь надо было жить, жить любой ценой, пусть даже и удерживаясь у зверя на спине, вцепившись обеими руками в его жесткую, колкую холку. Он посмотрел на Ашхарумову: хороша! Марья и в церкви была на месте, и что-то старорусское, иконописное проступило в ее лице. Как стремительно она меняется — платок, что ли, виноват? Спасительная протеичность, воплощенная органика: может, за это не тронут их обоих?</p><p class="p1">Клетка седовского отца виднелась издали; в ограде еле нашлось место, чтобы рядом с этим невероятным памятником положить дочь инженера. Первым говорил Хламида. Он говорил о хранителях культуры, чьи ряды редеют с каждым днем, об ордене, прячущем ковчег, о тайном братстве, оберегающем огонь знания от варварских орд… и о том, что ничего не пропадает… Один Ять, пожалуй, оценил бы его слова, — но и Ятя, верно, отпугнули бы эта расчетливая прочувствованность, дерганье усов, якобы в поисках единственного слова (давно затертого, насквозь книжного), эти слезы на ядовито-синих глазах.</p><p class="p1">После Хламиды, однако, заговорил Хмелев. Тут уж не было громких словес и всхлипываний, которыми так часто прерывалась речь писателя: скупо и сухо перечислив научные заслуги Анны Васильевны, скромного и честного труженика лучшей, без сомнения, диалектологической кафедры России, он почти сразу перешел к смутным угрозам, намекам и чуть ли не к призывам начать кампанию гражданского неповиновения. Начав скромно, он постепенно распалился и вскоре уже сам искренне верил (как всякий хороший лектор, способный убедить любого, и в том числе себя), что в смерти Анны Васильевны непосредственно виновны комиссары. Похороны на глазах превращались в митинг, — как и все в Петрограде в последний год: хлебная очередь, гимназический урок и даже свадьба. Впрочем, в последние тридцать лет российской истории не было стихийного бедствия, в котором не обвинили бы правительство; Казарин резонно рассудил, что большевики не заслужили никаких привилегий и должны разделять участь всех властей. Он почувствовал внезапный укол тоски, представив, как слушает эти речи Седова — если слушает, конечно; ни в какую загробную жизнь Казарин не верил, но по литераторской привычке к допущениям вообразил ее тихое удовлетворение. Конечно, она не возразила бы. Она удивительно легко покорялась любому начальству, и все ее работы были, в сущности, добротным развитием чужих открытий, — так о ней за глаза говорили в коммуне при жизни; сам Казарин о ее трудах понятия не имел. Она во всем брала сторону Хмелева. И теперь, когда он на глазах елагинцев и приставших по дороге бездельников производил ее в жертвы режима, она не возразила бы ни словом.</p><p class="p1">— И мне видится символ в том, — грозно закончил Хмелев, привычно чувствуя власть над аудиторией, — что на могиле этой жертвы — жертвы, увы, не первой и не последней, — высится железная клетка: в эту клетку заточено ныне любое проявление свободной мысли, в этой клетке томится теперь русская наука, от этой клетки нет спасения и в смерти. Перед нами простой выбор: доживать, довольствуясь гнилым мясом, которое нам бросают, и надеясь на пришлого освободителя, — или попробовать в последней попытке сломать эти прутья… и умереть, как умерла наша соузница.</p><p class="p1">Теперь выходило, что Седова умерла в борьбе за свободу (которой боялась больше всего на свете). Хмелев отошел от ограды, и место его тотчас занял Алексеев, — но не успел он закончить первой фразы («Лучшие люди России гибнут вместе с Россией»), как послышались звуки погребального оркестра. Все обернулись. По соседней аллее приближалась толпа крестовских раскольников. Четверо, и в их числе возвышающийся над толпой Корабельников в барашковой шапке, несли обтянутый красным кумачом длинный гроб. Нельзя было разглядеть, кого несут; зато отлично видна была несомая перед гробом черная деревянная конструкция, сбитая из фанерных кругов, квадратов и треугольников. Это был футуристический памятник Борисоглебскому.</p><p class="subtitle">11</p><p class="p1">За пять дней до того, тринадцатого марта, молодой Краминов — ученик Льговского — принес от Чарнолуского столь долго ожидаемые мандаты на чтение лекций для питерского пролетариата. О местонахождении пролетариата у Чарнолуского было весьма приблизительное представление: он даже сходил за консультацией к Бронштейну, но тот обругал его и выставил. В самом деле, смешно было идти к военному, наиболее занятому наркому с вопросом, где сейчас может быть пролетариат. Значительная его часть после подписания мира вернулась с фронтов, но работать не спешила: едва ли в Петрограде действовало хоть три фабрики. Большинство трудоспособного населения занималось грабежом, спекуляцией и иными формами перераспределения собственности. Иногда Чарнолускому являлась даже крамольная мысль о том, что Маркс где-то, ошибся (а впрочем, он толком не читал Маркса, в чем никому не признавался: этот глубокий эконом невыносимо скучно писал): революцию с первых ее дней называли пролетарской, а между тем роль пролетариата в ней была пренебрежимо мала. Можно сказать, ее вовсе не было. Чарнолуский утешал себя тем, что название перевороту дают не те, кто его совершил, а те, во имя кого он совершался, — но никакого одобрения со стороны пролетариата опять же не было, если не считать грабежей, которые можно, конечно, рассматривать как выражение восторга, но лишь с известной натяжкой. Поэтому, когда Льговский, Корабельников и Краминов по очереди требовали от наркома хоть какой-нибудь работы на благо революции, Чарнолуский только улыбался, пытаясь охладить их пыл, а сам замирал от стыда и растерянности: он был комиссаром отсутствующего просвещения в городе пустых гимназий и еле функционирующего университета.</p><p class="p1">Впрочем, к шестнадцатому марта он нашел выход — простой, как все гениальное. Из очагов культуры в городе исправней всего действовали кинематографы, на каждом сеансе заполнявшиеся до отказа. Надо полагать, пролетариат сидел там. В городе не хватало решительно всего, даже мирный договор почти не улучшил положения с зерном, крупами, мукой, не говоря уж о мясе, — настоящего голода, как в феврале, уже не было, но людей на улицах по-прежнему шатало от слабости; и в этом-то городе был в избытке представлен кинематограф как отечественного, так и иностранного происхождения. Видовые, комедийные, мелодраматические картины, экранизации, любовные трагедии, одинаковые истории с неотличимыми роковыми красотками (голые плечи, жирно намазанный рот, черные блюдца вместо глаз) заполняли собою Петроград. Там и надо было ловить пролетария. Чарнолуский выписал Краминову несколько предписаний для дирекции синематографов (прикинув попутно, что к лету пора бы и обобществить их — стригут, подлецы, купоны и ни копейки не платят в казну!) и порекомендовал в случае сопротивления — мало ли, откажутся пускать или еще что — сразу звонить в Смольный. Тематику лекций они обговорили давно: новое искусство, левая поэзия, опыты Мельникова с языком.</p><p class="p1">Борисоглебский уже около месяца жил в Крестовской коммуне и совершенно не понимал происходящего. Пару раз он проглядел газету с нескромным названием «Правда». Мир, не желавший постичь его учение, уже расплачивался за это, в нем было неспокойно, клокотала Германия, поеживалась Франция, и даже в Англии что-то назревало. Ничего не происходило в одной России, скучной, как всегда, — только шипела какая-то гидра да сияло чье-то равноправие. О царе не сообщалось ничего. Вероятно, он совсем погряз в роскоши и перестал управлять страной. Борисоглебский машинально ел, пил слабый чай, отвечал на приветствия короткими судорожными кивками — но не мог отдать себе отчета, что он тут делает в обществе всех этих людей. Пару раз он заикнулся о том, что хотел бы вернуться в Ростов, — и ему со всей деликатностью объяснили, что поезда в Ростов временно не ходят, придется ждать. Он дал дочерям несколько телеграмм, но не получил ответа. Рукопись «Универсологии» у него постоянно просили — то для ознакомления, то якобы для издания, — и он отлично раскусил все эти хитрости и никому книгу не давал. Каждый из обитателей коммуны норовил украсть идею, хотя на вид все были славные мальчики из приличных семей, великовозрастные гимназисты, чистые личики. Больше всех Борисоглебского раздражал высокий, в кожаном пальто и курчавой шапке: этот вообще плохо понимал обращенную к нему речь, кивал «да-да, совершенно верно», — и стремительно убегал, словно стыдясь своего невежества. Все невежды перед «Универсологией», никого нельзя назвать знающим, пока он не постиг основополагающей системы, — но люди, окружавшие его, не только мало знали, но и учиться ничему не хотели! Им казалось, что все и так понятно.</p><p class="p1">Занятия крестовцев были и в самом деле беспорядочны: Кульбин и Митурин взялись было расписывать стены домов, в соответствии с манифестом «Искусство — улице», но были задержаны патрулем и три часа провели на Гороховой, поскольку документов при себе не имели. Попытки получить у Чарнолуского мандат на роспись питерских зданий окончилась ничем: комиссар поил художников чаем, долго и смущенно хихикал, говорил об исторических ценностях — короче, оказался типичным «музейщиком», хотя и добрейшим малым. Корабельников устраивал почти ежедневные поэтические вечера, на которых разделывался со старым искусством и провозглашал окончательную победу футуризма во всероссийском масштабе. Он лично рисовал афиши, постоянно требовал от Чарнолуского новых заданий — у него как раз проекты были конкретные, деловые: писать агитплакаты, стихами переписывать сведения о международном и внутреннем положении, доходчиво излагать законы о наказаниях за спекуляцию и саботаж;… Он соглашался, что искусство должно быть внятным, и даже мог быть в самом деле полезен, но уж слишком активно оттеснял от этой пользы всех других, настаивая, что он и его друзья — единственные подлинные революционеры в искусстве. Правда, о том, чтобы растерзать Пушкина, он уже не заикался. Чарнолуский поругивал его за вождизм.</p><p class="p1">Прочая молодежь во главе с Барцевым вообще резвилась как хотела. Гимназистки, курсистки, медички, студенты, члены Союза учащихся бегали на Крестовский, устраивали праздники, маскарады и самодеятельные спектакли. Родители давно махнули на все рукой. Сидеть в притихших, голодных домах было страшнее. Пожалуй, больше всего веселилась в восемнадцатом году петроградская молодежь — шестнадцати — и семнадцатилетние юноши и девушки, для которых все происходящее было одной грандиозной мистерией, специально для них разыгранной в осыпающихся столичных декорациях. Они радостно приветствовали вторую молодость своего города, так счастливо совпавшую с их молодостью. Им казалось, что и дома радуются, сбрасывая опостылевшие вывески, и природа ликует, потому что март восемнадцатого года был холодный и солнечный, синий и льдистый. Нищих больше не было, потому что нищими были все. Дети, воспитанные в интеллигентских разговорах о мерзости русской действительности, никак не могли понять, отчего их отцы и матери, которые вели с ними эти самые разговоры, не радуются осуществлению своих надежд. До революции, марксизма, большевизма и прочих слов детям не было никакого дела. Они видели, что настала небывалая жизнь, — и им нравилось ночами на Крестовском слушать небывалую поэзию, бегать домой к доброму заумнику Труханову, заваривавшему травяной чай и похожему на лесного гнома, под руководством Барцева выкладывать из сухарей сложные композиции (Барцев утверждал, что сухари от этого становятся питательнее) и устраивать студию футуристического танца на втором этаже прилукинской дачи (танцевали почти голыми — руководительница студии, сорокалетняя армянка Акопова, часами могла говорить о поэтике тела и решительно отметала эротический план танца: и то сказать, после столь бурной молодости, какая выпала ей, придавать эротизму серьезное значение было поистине невозможно; то ли дело пластические этюды).</p><p class="p1">Впрочем, детям нравились не только футуристы. Очень многие уже месяц ходили к Комарову на Елагин, в его подпольную лингвистическую студию, и на тайных заседаниях орфографического общества добрались до вполне серьезных языковых открытий. Корнейчук, проводивший теперь на Елагином по десять часов ежедневно в бесконечных спорах, сколько и в каких переводах взять во «Всеобщую» из Лонгфелло, а что — из Суинберна, затеял детский театр и лично взялся переделывать для подростков «Ромео и Джульетту»; когда он успевал редактировать бесконечные рукописи, заведомо не могущие претендовать на публикацию, писать детские пьесы и записывать воспоминания старух шестидесятниц — один Бог ведал, но, если бы он не глушил себя работой, в чуткой и умной душе его, верно, завыл и засвистел бы такой ужас, что Корнейчук, и так с детства страдавший бессонницей, вовсе лишился бы сна.</p><p class="p1">Самое удивительное, что и в студию футуристического танца, и в детский театр Корнейчука, и на семинары Барцева, и в подпольную академию Комарова-Пемзы захаживали по большей части одни и те же подростки, общим числом до ста человек; часть принципиально не посещала Елагин, часть избегала Крестовского острова, но этих упрямых маленьких бойцов (среди которых первенствовала старшая дочь Корнейчука) было не больше десятка. Все прочие решительно не понимали, отчего коммуны двух островов враждуют между собой: в конце концов, порознь все их обитатели были прелестными людьми, каждый со своим чудачеством, а отстаиваемые ими принципы казались так ничтожны на фоне радостного крушения всего и вся, что вдаваться в причины раскола петроградской профессуры у юных гостей не было ни времени, ни желания. Куда интересней было слушать рассказы Комарова о летописях или сказки Труфанова о странствиях. Молодежи не нравился только Борисоглебский — высокий ворчливый старик, говоривший вдобавок с неприятным южным акцентом. Он был явно сумасшедший, и его боялись. Именно ради него и затеял Льговский вечернюю лекцию в «Паризиане». Собственно, «Паризиан» было две: одна на Невском, вторая в Пятой линии Васильевского острова. Вторая была ближе, да и начинать лекции следовало с небольшого зала, чтобы не так громок оказался провал. Льговский прочел за свою двадцатипятилетнюю жизнь страшное количество лекций в самых разных аудиториях — от основательных докладов в Обществе любителей словесности до кратких предварительных замечаний в «Бродячей собаке»; где выступали друзья-поэты, поставлявшие стиховой материал для его теоретических работ. Он умел распалить и подразнить аудиторию, знал тонкости литературной полемики и даже акустические особенности петербургских залов, но понятия не имел, как говорить с пролетариатом. В душе он сильно сомневался, что площадное искусство в самом деле способно заинтересовать тех, кто ходит по площадям, а просвещать пролетариат в кинематографах было с самого начала идиотской затеей. Единственным оправданием этого мероприятия могло послужить публичное выступление Борисоглебского: у старика в самом деле были удивительные прозрения, он явно томился и скучал в Петрограде.</p><p class="p1">Кинематограф «Паризиана» на Васильевском представлял собою полуподвальное помещение с десятью рядами по двенадцать кресел, служившее некогда пивной (запах пива впитался в стены и сделался дополнительной приманкой для публики). На всех сеансах шла кинодрама в пяти частях «Поруганные грезы», слепленная ханжонковцами в 1916 году. Кинодрама была сильная, со специально приглашенной из Парижа звездой варьете Мари Суаре (которая, точно, была приглашена из варьете, но харьковского, и звалась на самом деле Варварой Суриковой). На вечерних сеансах перед «Поруганными грезами» демонстрировалась видовая фильма из двух частей «Полет фельетониста Кокини на дирижабле, в Одессе». Кокини, в настоящее время сотрудник одесской ЧК, в недалеком прошлом журнальный репортер, без обмана летал на дирижабле, и это было еще самое невинное из его предприятий. О нынешних его занятиях тоже можно было бы снять неплохую видовую фильму.</p><p class="p1">Льговский без проволочек прошел со стариком прямо в комнатку около кассы, где директор кинематографа Кугельман пил спирт. Жизнь Кугельмана в последнее время была нервная. Он с минуты на минуту ждал, что у него реквизируют помещение. Трудно было представить, кому могло понадобиться такое помещение, но ведь и пели большинства других реквизиций не мог объяснить никто. Кугельман боялся и поэтому пил спирт, и тут вошли двое — маленький, крепкий, лысый, весь в черной коже, и длинный, старый, в потрепанном пальто, хмурый и глядящий в пол.</p><p class="p1">— Имею честь говорить с директором? — вежливо спросил маленький, кожаный. Непонятно было, каких он лет: может, двадцать, может, и все сорок. Кугельман почуял было слабое, теплое дуновение надежды: кожаный был как будто еврей.</p><p class="p1">— Я директор, — сипло сказал Кугельман, не успевший запить спирт.</p><p class="p1">— У меня мандат от наркома образования, — вынул бумагу кожаный, и у Кугельмана оборвалось сердце. Это была реквизиция, конец.</p><p class="p1">— Я тоже имею мандат от наркома образования, — сказал он.</p><p class="p1">Мандат действительно был, его написал для Кугельмана писарь Петроградского гарнизона, уверявший, что он умеет выправлять такие бумаги; правда, бумага давала лишь право ночного передвижения по городу — без этого права Кугельман не мог бы показывать ночные картинки, особенные картинки из самой Одессы, попавшие туда из Марселя, — неподвижные, но очень интересные для матросов.</p><p class="p1">— Ваш мандат нас не интересует, — улыбнулся кожаный. — Мы пришли выступить с лекцией перед зрителями.</p><p class="p1">В следующую секунду Кугельман испытал облегчение, которое не с чем было сравнить. Сердце его, остановившееся было, забилось с утроенной силой. Он боялся, что его удары будут слышны гостям. Он нагнулся, достал из корзины для бумаг бутыль спирту и взболтнул ее перед кожаным.</p><p class="p1">— Не желаете перед лекцией? — спросил он уже вполне по-свойски. — Очень хороший спирт, настоящий медицинский.</p><p class="p1">— Откуда? — пресекая панибратство директора, поинтересовался Льговский.</p><p class="p1">— Ах, оставьте. Довоенный запас, — отмахнулся Кугельман. — Может быть, ваш товарищ выпьет?</p><p class="p1">— Я выпил бы, — вдруг сказал Борисоглебский. — Сильная натура напряжением воли подавляет опьянение, но питательность спирта выше хлеба, выше даже масла, а энергийные затраты организма на его усвоение значительно ниже.</p><p class="p1">— Ну, налейте, — разрешил Льговский. Он чувствовал смутную вину перед стариком, которого сначала привел на прилукинскую дачу, а теперь вот втравил в еще более сомнительное предприятие. — Когда у вас ближайший сеанс?</p><p class="p1">Кугельман вынул тяжелые, безвкусные серебряные часы с механикой.</p><p class="p1">— Через двадцать минут. Перед началом кинодрамы — видовая фильма, я вам предлагаю читать между ними. Когда зритель будет уже заинтригован. Я вас лично представлю.</p><p class="p1">— Не надо, — брезгливо сказал Льговский, которому был противен этот развеселившийся трус. Льговский и вообще питал предубеждение против своих братьев по крови, но, как философ, понимал, что национальные предрассудки приводят к религиозному миросозерцанию, которое с формальной точки зрения было системой ложной и противоречивой. Поэтому он предпочитал о еврейском вопросе не думать, но уж очень не любил одной черты, наблюдаемой им в любом еврее: все они, когда проходила опасность, слишком явно радовались и чересчур быстро расслаблялись, — тут же начинались панибратство, заигрывания, предложения «випить» и прочая атрибутика, которую он называл «синдромом внезапно отпущенного».</p><p class="p1">— Ну, не надо — так не надо, — развел руками Кугельман. — Билетов можете не покупать.</p><p class="p1">«Паризиана» была заполнена до отказа. У Кугельмана разрешалось курить. Тапером служил талантливый мальчик, единственная надежда матери, которого привели к Кугельману общие дальние родственники; поначалу директор не верил восторженным рекомендациям, однако мальчик оказался и впрямь способный. Он знал весь модный репертуар, а по ночам импровизировал такое призывное и страстное, с долгими тремоло, с внезапными порывами форте, что особенные картинки приобретали вид высокого искусства. Тапер втайне мечтал показать свои опыты Стравинскому, но Стравинский давно был за границей.</p><p class="p1">После того как Борисоглебский под испуганным взглядом Льговского и уважительным — Кугельмана хватанул полстакана спирта, могучим усилием воли заглушив опьянение и восприняв одну энергийность, лекторы прошли в зал. Кугельман чинно вынес им из своей комнатенки два низких стула с гнутыми кавалерийскими ножками. Борисоглебский был угрюм, хотя и сильно покраснел лицом; Льговский знал, что, как только он скажет первые слова, ввяжется в драку — страх пройдет тут же, но пока тянулось самое противное — ожидание; он и в детстве ненавидел это состояние больше всего на свете. Мучительно длился для него последний урок в гимназии, после которого — он знал это — на углу Малой Николаевской улицы в родном южном городе его будет поджидать страшный, страшный человек Каська Каленый (он и теперь не знал, почему его звали Каськой: быть может, от Кассио?). Каленый не преследовал никаких материальных целей — гимназистику Льговскому денег не давали; он издевался над мальчиком Льговским из чистого удовольствия. Мальчик Льговский не сопротивлялся, это было бесполезно. Он крепился, молчал и падал, как мешок. Каська Каленый оставил мальчика Льговского в покое только после того, как гимназист выпросил у дружественной кухарки медный пестик от ступы и очень серьезно достал его из кармана курточки, в очередной раз завидев Каську на углу; нельзя было сомневаться — он успеет ударить один раз, но этого раза окажется достаточно. «Тю, скаженный!» — сказал Каська и лениво, вразвалку удалился — но по спине его было видно, как хочет он ускорить шаг.</p><p class="p1">Теперь сотня этих касек — может быть, и добродушных, может быть, и чистых душою — заполнили полуподвал, и Льговскому предстояло перед ними говорить. Он не выбрал еще темы, хотел объяснить по крайней мере, как приняли петроградские художники революцию и зачем они вообще нужны, — но люди пришли в кинематограф, и отвлекать их от зрелища было неправильно… Они гоготали, толкались, дымили, у некоторых были винтовки (краем глаза Льговский заметил матросский патруль, зашедший погреться и повеселиться — явно бесплатно. Погас свет, и тотчас усилился гогот, фельетонист Кокини подъехал к дирижаблю.</p><p class="p1">Маленький очкастый тапер заиграл «Прощай, любовь». Кокини подставил руку тоненькой даме, выходящей из кареты; короткий поцелуй на прощание. Решительный проход к дирижаблю (тема «Прощай, любовь» зазвучала маршеобразно). Кокини по лесенке взобрался в гондолу и махнул короткопалой рукой; помощники бросились обрезать канаты. «Прощай, любовь» пошла крещендо, с немыслимыми вариациями (молодец тапер, подумал Льговский, жаль, некому оценить, никто не смеется). Дирижабль взлетал криво, приседая на хвост, — потом выровнялся, и Кокини, уменьшаясь, бешено замахал оператору. «Паризиана» разразилась хлопками и одобрительным гиком. Плавно взмывающий дирижабль растворялся в небе под звуки романса, сыгранного уже в его природном темпе. В конце фильмы Кокини медленно приземлялся среди совсем другого поля, и к нему от правой границы кадра, придерживая шляпы, бежали зрители; гондола тяжело бухнулась о землю, выбив фонтанчик пыли (сухое, знать, лето). Дирижабль заметно сдулся, но еще бодрился, какое-то время тащась по полю; наконец выбрался Кокини, и на первом плане грянул добежавший наконец до места посадки беззвучный оркестр. Особенно старался толстяк с тарелками. Тапер изобразил туш. Кугельман включил свет.</p><p class="p1">— Господа товарищи! — обратился он к публике, раскланиваясь, как одесский фельетонист на старте. Это обращение, видимо, в «Паризиане» было принято. — Господа товарищи, у нас по предписанию народного комиссара товарища господина Чарнолуского выступают сегодня два лектора. После них сеанс продолжится, как и было объявлено. Я человек законопослушный, у них предписание, так что — прошу!</p><p class="p1">Представь себе, что это зал Второго коммерческого училища, чуть не вслух сказал себе Льговский. Ты предваряешь Мельникова, только что вернувшегося из Монголии, его никто еще здесь не слышал, вас освищут, растерзают, ведь для чистой и изломанной публики нет законов — они могут быть у матросов, но не у этих снобов, пришедших смотреть на твой позор; вставай, сейчас будет драка, но ты представительствуешь здесь от имени искусства и не отдашь его на поругание. Вставай, сейчас все они будут твои. (А все-таки приходится представлять себе тех чистеньких мерзавцев, успел подумать он. Те — враги, но свои, а эти не враги, но…)</p><p class="p1">— Товарищи! — сказал он, встав перед экраном; Борисоглебский стоял рядом и смотрел в пол. — Вы видели сейчас кино — искусство, за которым будущее. О том, каким будет это будущее и зачем нужно в нем искусство, — мы сейчас расскажем. Я хочу представить вам моего учителя. Вы увидите человека, который задолго до нашей революции предсказал и объяснил эту революцию. Григорий Константинович Борисоглебский жил в Ростове, но учение его распространится по всему миру. Это он придумал отменить правописание, закрывавшее вам путь к грамоте. Он первым понял, как устроен мир, и сейчас изложит вам это понимание.</p><p class="p1">Зал разочарованно загудел, когда Кугельман объявил лекцию, но вид маленького Льговского и длинного старика, похоже, развеселил аудиторию, приведенную в благодушное состояние удачным приземлением Кокини. Вероятно, дирекция для разнообразия завела своих Пата и Паташона.</p><p class="p1">— Отчего летает дирижабль? — громко и уверенно, с места в карьер начал Борисоглебский, подняв наконец голову и в упор глядя на аудиторию. — Дураки скажут: он легче воздуха. Но он не легче, а теплее воздуха и благодаря нагретому пару летит. Пар от блюдца, если кто из вас видел блюдце чаю, тоже поднимается кверху. Но так и все в природе: теплое поднимается вверх, а холодное остается внизу. Роль теплоты в обществе выполняет умственное развитие, умственные силы должны подниматься наверх, а глупые, неразвитые — опускаться на дно. Все другие попытки подняться наверх обречены, такой дирижабль не полетит. Мир един, и нравственные его законы едины с физическими. В крови борются красные и белые тельца. Красные — это теплота…</p><p class="p1">— Жарь, старик! — крикнули сзади. — Красное сверху!</p><p class="p1">— В небе борются красные и белые звезды, — продолжал Борисоглебский, не слушая выкриков. — Каждого из нас можно бесконечно делить на клетки, клетки — на другие, еще мельчайшие частицы, и дойти в их дроблении до конца никогда нельзя. Но мир бесконечен и в другую сторону — в сторону увеличения, и никогда нельзя сделать вещь, которая бы оказалась больше всех вещей…</p><p class="p1">— Сколько ни навали — придет лошадь и больше нагадит! — крикнул молодой солдатик. Его замечание встретили одобрительным хохотом.</p><p class="p1">— Нет, человек больше лошади гадит, — скептически сказал много повидавший пролетарий. — Человек самый из всех вонький…</p><p class="p1">— Человек прорастает в космос, — не слушал их Борисоглебский, — и космос внутри человека. Космос специально задуман таким, чтобы мы могли его понять, потому что картина звездного неба совпадает с анатомическим атласом…</p><p class="p1">«Он прекрасно говорит», — подумал Льговский. В эту секунду в Борисоглебского угодила ручка, оторванная от кресла.</p><p class="p1">— Ша, дядя, — сказал молодой ленивый голос. — За фильму плочено.</p><p class="p1">Борисоглебский замолчал и внимательно вгляделся в полутемный зал.</p><p class="p1">— А вы идиоты, — неожиданно и спокойно сказал он. — Идиоты и хамы, и место ваше на дне истории. Вам на коленях надо слушать, что я говорю. Вам надо в хлев, в стойло, и потому вы загаживаете все, чтобы хлев был там, где вы. Но организм выводит из себя отходы, и общественный организм тоже выведет из себя отходы. Куча этих отходов и есть вы, и потому все ваши мысли бродят вокруг дерьма…</p><p class="p1">— Э, дядя! — предостерегающе произнес все тот же ленивый голос. — Легше, дядя…</p><p class="p1">— Ты на кого попер?! — внезапно, подзаводясь на ходу, впал в истерику какой-то солдат, явно из контуженых. — Я кровь лил, а ты мне — отходы? Во мне кости целой нету, а ты мне — дерьмо?</p><p class="p1">— Тебя кто заслал?! — угрожающе загудел какой-то матрос, и двое с разных концов зала уже спешили к первому ряду, чтобы Борисоглебского взять; зашевелился и патруль, до того только переглядывавшийся и пересмеивавшийся.</p><p class="p1">Льговский понял, что, если сию секунду не спасти положения, им обоим никогда уже не выйти отсюда. Кугельман злорадно усмехался и, конечно, не пошевелил бы и пальцем, чтобы прекратить расправу. И футурист выпрыгнул из угла, в котором стоял, скрестив руки и слушая Борисоглебского, — выпрыгнул так, что оказался прямо перед гигантской бабой с семечками, и пошел вприсядку, визгливо распевая:</p><div class="poem">
<div class="stanza">
<p class="v">Ой, ктой-то такой на тебе, Матрена!</p>
<p class="v">Ой, ты ж, моя мать, сроду не…</p>
</div>
</div><p class="p1">и далее весь текст народной баллады, записанной им на первом курсе филологического факультета, в краткой фольклорной экспедиции под руководством совсем еще молодого Борисова; исполнив половину баллады, то есть наименее цензурную ее часть, он перешел на «Здравствуйте, женившись, дурак и дурка», сочинение Тредиаковского, выученное наизусть все на том же первом курсе и исполнявшееся хором на всех студенческих свадьбах, после чего без всякого перехода рассказал известную скоморошину про попа и вдову; ему уже хлопали и подсвистывали. Не переставая притопывать, кружиться и исполнять уже что-то вроде лезгинки, он с сильным горским акцентом рассказал гимназическую переделку лермонтовской колыбельной, в финале которой русский овладевал горцем, но этим его познания в области народной неподцензурной поэзии исчерпывались. Тогда он выдал танец — вовремя включился сообразительный тапер (спасибо, мальчик, может, ты жизнь нам спас), и Льговский изобразил потрясающее попурри из танго, матчиша, шимми (в пару подхватил толстую бабу — зал лег), он танцевал все, что знал, прошелся на руках и отбил чечетку. Несмотря на слабость и отвычку от физических упражнений (в университетские времена каждый день начинал с пробежки и гирь), плясалось легко — страх придавал ему сил. Остановиться до известного момента нельзя было: они должны были изнемочь прежде, чем он. И они изнемогли: смех перешел в стон, в хоровой вой неизъяснимого томления. Льговский же, танцуя уже чуть ли не перделемешке, припоминал Паралипоменон, Давида, пляшущего перед Богом, и Мелхолу, уничижающую его в сердце своем. Не совсем понятно, правда, в честь какой радости пляска: может быть, в честь отмены правописания и возвращения к простейшим, жестоким и главным вещам, о которых так сильно у Мельникова — «каменари, плоскогари, животари, братари»… все, я сейчас рухну.</p><p class="p1">Но рухнуть он не успел — его подхватил под руку тапер. Под неистовые рукоплескания Кугельман раскланялся, даром что не имел к их успеху никакого отношения, и кнопкой выключил освещение. Механик закрутил аппарат, в пыльном луче заклубились объемные тени, затрещала кинодрама — пока без музыки. «Я сейчас!» — крикнул тапер, подталкивая Льговского и Борисоглебского к выходу. На улице морозный ветер ударил Льговского в разгоряченное лицо, голова сразу закружилась.</p><p class="p1">— Я вас узнал, — восторженно, подростковым дискантом повторял тапер, — вы Льговский, я был на вашей лекции год назад… Это правильно, что вы ушли в эксцентрику. За эксцентрикой будущее. За словами — первичные формы, синкретическое искусство, мистерия, танец… удивительно! Я и сам над этим давно думаю, позвольте мне к вам зайти. У вас есть инструмент? Я покажу вам свой балет для голоса с хором…</p><p class="p1">— Непременно, непременно, — задыхаясь, кивал Льговский. — Спасибо, очень славно играли, и на сеансе тоже…</p><p class="p1">— Я живу на Прядильной, восемнадцать, зайдите, — быстро прощался тапер. — Простите, мне играть… Вас я найду, я знаю про Крестовский. Превосходный номер, благодарю!</p><p class="p1">— Да, да, — невпопад кивал футурист. — Спасибо и вам…</p><p class="p1">Тапер скрылся за дверью, и почти сразу из-за нее донеслись звуки романса «Дай мне руку». Лекторы в оцепенении стояли на Пятой линии.</p><p class="p1">— Простите меня, Григорий Константинович, — после долгого молчания произнес Льговский. — Я не рассчитал… но со временем, конечно, они начнут понимать. Не нужно их сразу, насильно накачивать высшими достижениями культуры, они только начинают путь… и вообще революция для художника, а не художник для революции…</p><p class="p1">— Да, да, — тускло ответил Борисоглебский. — Ничего, я сказал, что хотел.</p><p class="empty-line"/><p class="p1">— Ты сдался, — рычал Корабельников на Льговского. — Ты пошел на поводу. Тебе бы еще спеть им солдатские частушки.</p><p class="p1">— Я не знаю солдатских частушек, Саша.</p><p class="p1">— Надо было начать читать им стихи.</p><p class="p1">— Твои, что ли?</p><p class="p1">— Хотя бы и мои! Я читал перед матросами, они всё понимают…</p><p class="p1">— У меня нет такого голоса, Саша.</p><p class="p1">— Не в голосе дело! Есть энергия слова, есть звук, ты сам писал!</p><p class="p1">— Они не слышат звука.</p><p class="p1">— Звук все слышат! Мельникова можно корове читать, и она поймет.</p><p class="p1">— Вот и читай корове. Я не буду больше устраивать лекции в синематографах. Нельзя тащить человека силком через шестьсот лет развития искусства. Пока футуристы пришли к новой простоте, они прошли через всю сложность и через кризис ее. Революция не для того делалась, чтобы тыкать рабочего носом в наши книги.</p><p class="p1">— Значит, пусть он смотрит «Поруганные грезы»?</p><p class="p1">— Значит, пусть смотрит, — сказал Льговский и пошел проведать Борисоглебского.</p><p class="p1">Тот лежал в своей комнате на втором этаже, поверх одеяла, не раздеваясь. Железная печка погасла, а растопить ее у него не было сил. Но он не чувствовал холода. Льговский побоялся ее топить — старик заснет, угорит…</p><p class="p1">— Вам не нужна помощь, Григорий Константинович? — спросил он.</p><p class="p1">— Что? Нет, ничего. Идите, идите.</p><p class="p1">Льговский пошел с горя в студию пластического танца, долго сидел там, глядя на упражнения Акоповой и ее учениц, и горько жалел о том, что не выпил кугельмановского спирта.</p><p class="p1">— Раз-и, два-и! — командовала Акопова. — Свободнее, свободнее! Ну! — и «свободнее» звучало у нее резко, как хлыст. Какая может быть свобода в танце?</p><p class="p1">Борисоглебский проснулся ночью от невыносимой тоски, какой не знал еще никогда в жизни. В окне горела одинокая звезда и чернела за Малой Невкой далекая полоса парка на Елагином острове. Некоторое время он лежал неподвижно, припоминая, откуда в Ростове эта река и далекий парк. Обычно, просыпаясь по ночам, он видел напротив магазин Арзумяна «Портьеры и ткани», два фонаря, крутой спуск… Понадобилось несколько секунд, чтобы вспомнить, где он, и не меньше получаса, чтобы ответить на главный вопрос зачем он тут? Ответа он не знал и беспомощно затряс головой, чтобы сдвинуться с проклятого места, обойти логическую ошибку. Но ошибка не исчезала: он попал не туда.</p><p class="p1">Разумеется, он был не настолько глуп, чтобы невнимание пьяной матросни принять за знак ложности своей теории. Он просто спросил себя, зачем теория, если сам он сейчас стар, беспомощен и бесконечно несчастен, а жена его мертва и дочери мучаются неизвестно где? Борисоглебский и представить не мог, что они благополучны: весь мир, все вокруг были несчастливы, и сиротливая звезда над далекой, черной, чужой полосой была несчастней всех. Тоска его шла из ниоткуда, из темной, непостижимой глубины, куда он всю жизнь боялся заглядывать. Быть может, он и теорию стал придумывать для того только, чтобы замазать роковую щель, скрепить собственное расползающееся «я». Говорили потом, что он сжег «Универсологию». Это неправда: он никогда, даже и в предсмертной слабости, не совершил бы столь мелодраматического поступка. Памятник тщетному усилию иногда важней памятника высокому, удавшемуся свершению: жизнь, потраченная на оправдание и обоснование смерти как наиболее последовательного и героического акта, многих может отвратить от ложного пути. «Универсология» дошла до наших дней при обстоятельствах, о которых будет сказано в свое время.</p><p class="p1">Боль и холод разливались по всему его телу, как тяжелая, густая ледяная вода, сама плоть становилась холодом и болью; сиротство всего сущего на Земле было невыносимо, и не было в ту ночь на Петроградской стороне более горького сироты, чем шестидесятилетний Борисоглебский. Сиротствующий мир вокруг Борисоглебского полнился звездным холодом и болью. Льговский, придя навестить старика поутру, нашел его уже окоченевшим.</p><p class="subtitle">12</p><p class="p1">— А-а, — хрипло протянул Хмелев. — Приспешнички.</p><p class="p1">Борисоглебского разрешили похоронить на Смоленском кладбище, ближайшем к островам. Обращаться к наркому Льговский отказался — он лично договорился с могильщиками, добыв для них по каким-то своим каналам бутыль спирта; молодежь поговаривала, что он силой отнял ее у какого-то владельца синематографа. Нашлось и место, и удалось даже организовать оркестр — юноша-тапер из «Паризианы» имел широкие знакомства в кругу петроградских молодых музыкантов.</p></span>
