<span><p class="p1">— Так я помню, помню! Вы же у меня в ноябре были! — еще любезнее расплылся Мироходов. — Я тогда требование ваше выполнил, все чин чином…</p><p class="p1">— Ваше направление не изменилось, — резко сказал Минкин. — Распоряжением Единой комиссии ваше издание закрывается.</p><p class="p1">— То есть как же оно может закрываться, голубчик?! — развел руками Мироходов. — Ему всего два месяца, и какое у нас направление? Мы, кроме афиш, и не печатаем ничего…</p><p class="p1">— Ваша газета не выражает точки зрения свободы, — крикнул Минкин, и матросы нахмурились. Темный все улыбался.</p><p class="p1">— Какая же у свободы может быть точка зрения? — поинтересовался Ять. — Я сотрудник газеты, так позвольте узнать, в каком духе…</p><p class="p1">— Я говорю с редактором! — взвизгнул комиссар. — Под прикрытием свободы вы протаскиваете угнетение. Свобода может быть одна — для победившего класса. Я опечатываю помещение.</p><p class="p1">— Голубчик, но у меня же мандат, — спокойно произнес Мироходов. И визг Минкина, и спокойствие редактора словно входили в условия не вполне понятной Ятю, но им обоим давно ясной игры. Мироходов уверенно извлек сложенный вчетверо грязный листок, на котором было вкось, в начальственной манере, без ятей и еров начертано:</p><p class="empty-line"/><p class="p1">«Мандат. Настоящим удостоверяется, что газета „Наш путь“ является провереной мною лично и может выходить в санкцыонированом мною порядке без чинения ей каких-либо препятствий со стороны других комиссий и подкомиссий. Председатель Петроградского комитета по делам культурной политики Грачев».</p><p class="empty-line"/><p class="p1">Минкин изучал этот документ долго и так сверлил глазами каждую букву, что Ять не удивился бы, увидев бумагу прожженной в нескольких местах. Поглощенный изучением листка, комиссар даже не сразу отогнал Ятя, заглянувшего ему через плечо.</p><p class="p1">— Я не знаю никаких Грачевых, и Грачев мне не указ, — произнес Минкин уже менее уверенно.</p><p class="p1">— Зато он вас очень хорошо знает, — улыбнулся Мироходов и извлек из жилетного кармана еще одну бумагу, не менее грязную и исписанную тем же почерком. Ее Ять из-за, плеча читать не стал, опасаясь гневить комиссара.</p><p class="p1">— Если вам еще удается наладить связи с отдельными слабохарактерными товарищами, это не значит, что ваша газета неприкосновенна, — с ненавистью сказал Минкин, возвращая листки. — Я проверю, что за Грачев.</p><p class="p1">— Ради Бога, — кивнул Мироходов, — чрезвычайно обяжете. Если будут сомнения, заходите, я всегда рад представителю победившего класса.</p><p class="p1">Минкин окинул его таким взглядом, что менее хладнокровный представитель побежденного класса на месте Мироходова растаял бы в воздухе — но редактор только скрестил руки на груди и стоял так, пока комиссар с матросами и темным, стуча сапогами, выходили на лестницу.</p><p class="p1">— А в самом деле, кто такой Грачев? — спросил Ять, когда грохот затих и хлопнула дверь внизу.</p><p class="p1">— А я почем знаю? — картинно удивился Мироходов. — Сегодня Грачев, завтра будет Лебедев… Я решил птичками подписываться, чтобы соблюсти систему.</p><p class="p1">— Дайте посмотреть, — попросил Ять. На втором листке тем же твердым почерком было начертано:</p><p class="p1">«т. Минкин! Прошу умерить революционную бдительность. Гр. Мироходов известен лично мне. У молодой республики достаточьно врагов, и вы лутше послужите ее делу, истребляя их а не борясь с сочуствующими. Пред. Петр. Ком. По дел. Культ. Грачев».</p><p class="p1">Ниже красовалась печать, в которой Ять с изумлением узнал печатку, которую он сам подарил мироходовской младшей дочери на двенадцатилетие. Печатка изображала мышь, склонившуюся над книгой.</p><p class="p1">— Сами писали? — спросил он.</p><p class="p1">— Почему сам?! — искренне возмутился Мироходов. — Метранпаж писал! Где ж мне взять такую роспись? Это же росчерк повелителя миров!</p><p class="p1">— И верят?</p><p class="p1">— Да чему же тут не верить, голубчик! — воскликнул Мироходов. — Я ее специально грязными пальцами захватывал, чтобы был настоящий документ! Они всякой бумажке верят. Вы думаете, Минкину хочется мою газету закрывать? Не читал он мою газету! Он и помещение реквизировать не хочет: не видно разве — борец, фанатик! Ему нравится ходить и власть употреблять. Образ власти для него теперь — любой текст, написанный на бумаге. А уж когда бумага адресована лично ему… воля ваша, устоять невозможно! Он ведь послезавтра опять придет.</p><p class="p1">— А вы?</p><p class="p1">— А я ему опять бумагу, опять с печатью.</p><p class="p1">— А если узнает, что нету никакого Грачева?</p><p class="p1">— Да как же он это узнает, ежели и комиссии никакой нет! — вознегодовал Мироходов на непонятливость собеседника, от которого вправе был ожидать все-таки большей сообразительности. — Не может же он знать все комиссии! Их сейчас знаете сколько — комитетов, подкомитетов? В иерархии черт ногу сломит. Но раз его знают — значит, вышестоящие. Признак вышестоящего — знать подчиненных. А почем он ведает, вдруг этот Грачев шишка, вдруг он за неповиновение попрет Минкина из комиссаров на германский фронт?</p><p class="p1">— Но рано или поздно это раскроется, — покачал головой Ять.</p><p class="p1">— Рано или поздно все это кончится, — Мироходов обвел рукой окружающее пространство и вернулся в кабинет.</p><p class="p1">— Знаете что, — смеясь, проговорил Ять. — Выпишите и мне такую бумажку! Если не пригодится при встрече с патрулем, я для истории сберегу.</p><p class="p1">— Да пожалуйста, — пожал плечами Мироходов. — Будете писать мемуары — не забудьте упомянуть, что это придумал редактор «Нашей речи», большой путаник, но человек приличный.</p><p class="p1">Он взял лист серой бумаги, задумался, потом решительно начертал несколько строк и вручил Ятю. На листке стояло:</p><p class="p1">"Справкой удыставерено, что предявитель сего совершенно благонадежен и мною лично на сей предмет досмотрен. Председатель Петр. Раб. Сов. По вопр. Пролет. Благонад. Павлинов».</p><p class="p1">Росчерк занимал всю нижнюю половину страницы и в самом деле напоминал распущенный хвост.</p><p class="subtitle">20</p><p class="p1">На Сенной перед Ятем в наибольшей полноте и яркости развернулось зрелище, которое он привык уже видеть в Петрограде с пятнадцатого года, с первых военных неудач: иное дело, что в конце последней осени процесс этот неимоверно ускорился. На всем необъятном рынке с его колеблющимися, притопывающими, дышащими паром рядами, как и по всей России, тоже колеблющейся и окутанной паром, шел обмен необязательного на необходимое, избыточного на насущное. То, что было духовным хлебом для сотен — хорошо, ежели тысяч, — менялось на хлеб как таковой, сырой и землистый. На Сенной деньги стоили мало; валютой служили картофель, коричневые кубики мыла, плоская серебристая вобла с ее невыносимым и все же аппетитным запахом (и в нем-то Ять видел воплощение главного противоречия своей нынешней жизни — смесь отвращения и жадности, с которыми ел, смотрел, прислушивался).</p><p class="p1">Странным казалось, что столько сложных, изысканных атрибутов прежней жизни враз потеряли смысл. Все они обладали ценностью только во взаимосвязи, условием существования каждой была тысяча других, — сами по себе они были странны, как вынутая из мозаики стеклянная чешуйка с обрывком линии, пятнышком цвета. Во множестве продавали книги, и вид у торговцев был отнюдь не жалкий, как думал пугливый Ять, опасаясь слишком непереносимых впечатлений; расставание с книгами, понял он вскоре, вовсе не мучительно. Многие он со временем не только продал, а и сжег — февраль был жестокий, — но ведь тело книги, в сущности, служило только бедной оболочкой ее души, которая давно перекочевала в его собственную. Продавая книгу, ты ее не лишался. Были, конечно, картины душераздирающие, и с одной из таких начался для Ятя долгий обход Сенного. На углу Садовой стояла невысокая старуха, явно из мещанок, в длинном суконном пальто и темно-зеленом платке. На снегу рядом с ней лежала стопка книг, по виду самых дешевых, не единожды прочитанных, — Ять привычно различил Нагродскую; сверху лежала впервые им виденная книжка «Тепло и уютъ в вашемъ доме» — одно из бесчисленных и бесполезных пособий (полезных он не встречал), которыми вдруг наполнились книжные прилавки году в десятом. Тогда все кинулись догонять время, обустраивать свою жизнь сообразно с прогрессом — словно, отчаявшись одолеть проклятые вопросы, решили зайти с другой стороны и попытаться наладить жизнь снизу, без оглядки на абсолют. Потоком хлынули брошюры, и если какой-то год назад это были рекомендации по исканию и созиданию Бога, по овладению тайнами Тибета, то теперь тайны Тибета упоминались лишь применительно к аптеке, кухне и затеям под одеялом (восточная мудрость проникла решительно во все). Обывателя учили украшению жилищ, мясной и вегетарианской диете, уходу за ногтями, стихосложению, искусству составления писем; многие приятели Ятя сделали тогда небольшие, но быстрые деньги на выполнении заказа времени. Потом пришла сначала порнографическая, а затем патриотическая мода, между которыми успела еще вклиниться волна любовных саг, каждая по три тома.</p><p class="p1">Нынче, однако, никакая высокая словесность, полная великих страстей, не могла бы тронуть Ятя больше, чем копеечное руководство по обустройству жилья. Вот же, были в доме этой старухи тепло и уют, которые она старательно, по брошюре, наводила. Были те, для кого она старалась, были наивные, жалкие ухищрения, все та же ненасущность и избыточность — прелестные мелочи вроде салфеточек, вышивок, гардин. В жизни не думая об украшении собственного жилища, презирая потуги на стиль, — теперь Ять готов был плакать от умиления при мысли о милом домашнем труде. Он хотел было взять у старухи книгу и непременно взял бы, будь у него свободные деньги. Когда час спустя он покидал Сенную, старуха все так же стояла около своей стопки, и так же на ледяном ветру предлагала свои советы лиловая брошюра «Тепло и уютъ в вашемъ доме».</p><p class="p1">Но попались ему и утешительные зрелища. Рослый профессор исторического факультета, из немногих последних дворян, всею статью своей опровергавших тезис о вырождении аристократии, неуступчиво и грозно торговался за толстенную «Историю итальянской живописи», с красочными вклейками, проложенными папиросной бумагой, и множеством фотографий среди текста. Просил он дорого — когда Ять проходил мимо, речь шла о превосходном ватном пальто, в котором легко можно было пересидеть в квартире любой холод даже при недостатке дров. До войны такая книга, изданная вдобавок в Италии, потянула бы на четыре ватных пальто, но по теперешним меркам торг был равный. Ять слушал однажды лекцию этого профессора и поражался его импровизационному дару, почти спекулятивной легкости извлечения концепций из любых двух сведенных вместе мелочей; теперь профессор спекулировал не менее убедительно.</p><p class="p1">Проходя по рядам, Ять дивился количеству отсеянного, выброшенного за границы жизни. До этой последней правды хотел дойти враг условностей Толстой, но ему не дано было понять в остервенелом срывании покровов, что только в покровах и заключается вся прелесть, весь смысл. Персики делались неотличимы, когда их объедали до косточки, а люди делались не просто равны, но одинаковы, чуть только сквозь мишуру личных примет и смешных странностей злорадно, словно намекая на ошибку метода, оскаливалась основа. И Ять не удивился, обнаружив в одном из рядов скелет — лаборант горячевских курсов распродавал учебное имущество.</p><p class="p1">— Это что ж у тебя, дружок, что ли? — невесело усмехнулся, проходя, желтолицый горбун в подрезанной шинели без погон и фуражке путейца. — С голоду помер, так не пропадать же?</p><p class="p1">— Первый друг! — радостно отвечал лаборант. — Возьми, браток. Мементо мори.</p><p class="p1">— На что он мне, я скоро сам такой стану, — горбун сплюнул и двинулся дальше.</p><p class="p1">Откуда бралась в городе еда, которую можно было теперь увидеть лишь на Сенной, — Ять не знал и вникать не хотел. Привычный ход воображения подсказал ему рассказ о стране, в которой ничего нет и в то же время все есть, но где-то там (придумать ряд условий, которые надо соблюсти, чтобы попасть туда — грэмовской разрядкой); в городе нет трамваев, извозчики редки, не горят фонари, — там, напротив, от трамваев тесно, иллюминация горит, как днем, и все, чего нет здесь, там в избытке. Отсюда само следовало, что все, отсутствием чего он так остро мучился здесь, перекочевало туда и пышно расцвело — любовь, мудрость; загадка была в том, что сосредоточено все было не в одном месте, а в нескольких, которые надо знать. Еды в городе нет, но вся еда — на Сенном; трамваев нет, и все трамваи на Стрельне; нет любви, и вся любовь… Господи, куда же поместить ее? Какая часть города казалась ему средоточием нежности? Вероятно, на какую-то из набережных: любовь никогда не связывалась у него с уютом, с теплом постели — всегда с простором, с ясными небесными красками: Пряжка, дымы, залив… Вся мудрость, естественно, поместилась на Елагином, где мудрецы, лишенные еды и привычной роскоши, корпят над отысканием причин этого внезапного перераспределения. Очень хороша могла быть сцена в пустой Стрельне с безлюдными, праздно ржавеющими трамваями, тоскующими по пассажирам. Электричества тоже нет… где же все электричество? Царство сияющих дуг, свист стремительно летящих частиц; любой, кто попадает в это пространство, чувствует, как сквозь него мчатся незримые лучи. Это должно быть похоже на ледяной душ, на пролет сквозь грозовую тучу… может быть, один из островов? Лучше Марсово: оно и так поле.</p><p class="p1">Так из утопии равенства, распределения всего между всеми сама собой получилась и почти уже осуществилась сказка о том, как все собралось сгустками и осело в разных частях Петрограда. Что же на его Зелениной? На пасмурной Зелениной ему захотелось поместить все одиночество мира, переставшее быть проклятием — ставшее блаженством и доставшееся ему. Но чем кончить, как смешать все это воедино? Почему из великого смешения получилось предельное расслоение — и когда это вышло? Видимо, ничего ни с чем нельзя было смешивать: мир состоял из вещей, все более отдельных и все менее стыкующихся. Никак нельзя было собрать воедино мудрость и любовь, и ни одна из них не годилась для союза с едой… Это могло получиться весело, особенно если решить повесть (разумеется, рамки рассказа уже будут этой истории тесны) как странствие героя через расслоившийся город, от трамваев до независимости, сквозь электрическое Марсово поле… Он запомнил сюжет и пообещал себе вернуться к нему вечером, после празднества. Здесь, на холоде, сил хватало только на первый толчок замысла. Он выменял запонки на грудинку, за триста пятьдесят керенских рублей купил фунт карамели и отправился домой.</p><p class="subtitle">21</p><p class="p1">Квартира, в которой они собрались, тронула Ятя с самого начала, и весь вечер обещал удаться — еще когда в серых петроградских сумерках, под мелкой и влажной метелью, он подходил к дому на седьмой линии Васильевского острова. Даже в воздухе разлилось что-то праздничное, обещающее. Дом был старый, годов семидесятых, с высокими лепными потолками. В прихожей Ятя встретила невысокая светловолосая девочка лет шестнадцати, в неправильном и милом ее лице светилась кроткая приветливость, и все опасения Ятя насчет того, что он окажется чужим среди молодежи, немедленно развеялись. Она так серьезно и аккуратно принялась отряхивать его шапку, что он, давно не видавший ничьей заботы, смутился. «Проходите, почти все уже здесь, — сказала она не приглашающе даже, а просительно. — Я Зоя». Это и была хозяйка, о которой говорил Казарин. Ять церемонно вручил ей карамель и грудинку.</p><p class="p1">Зоя, дочь адвоката Коротина, впервые принимала гостей одна: родители решили устроить дочери настоящий взрослый праздник (как-никак шестнадцатилетие!) и отправились к друзьям на Зверинскую. Они прекрасно знали круг знакомств дочери. Петроградский союз учащихся был представлен в тот вечер лучшими своими людьми. Тут сошлись все, кто с февраля по декабрь успел проявить блестящие ораторские способности и даже дар организовывать митинги, и все эти гимназисты искренне полагали, что делают великое и святое дело, в меру сил способствуя раскрепощению самого бесправного класса — детей. Зайкины родители не находили ничего дурного в деятельности Союза учащихся, которая почти совершенно свернулась к началу нового года, но дружеские связи, слава Богу, не порвались. Все это были мальчики с задатками и девочки с запросами, из которых несомненно образовался бы цвет будущей государственности, если бы свободное государство не было удавлено в зародыше. Зоя, которая казалась отцу изнеженным и домашним ребенком, много выиграла от участия в Союзе, обзавелась друзьями, расцвела на глазах — и оставить ее дома одну с компанией сверстников можно было без всякого риска. Естественно, мать приняла живое участие в подготовке застолья: изобрела несколько видов картофельных закусок, поджарила хлебцы, кое-что было прикуплено и отложено заранее — контраст между роскошью сервировки и скудостью угощения способствовал непредвиденному, но от того не менее обаятельному комическому эффекту. Народу собралось чрезвычайно много — гораздо больше, нежели рассчитывала Зоя, которую вслед за родителями все друзья называли Зайкой; хорошо, что каждый что-нибудь принес — иначе совсем нечем было бы накормить нежданную ораву и Зайка опозорилась бы на первом самостоятельном приеме. Явился Карамышев, сын арестованного министра, пришел его друг, студент-филолог Лосев; Казарин пригласил Льговского, с оратором Бражниковым пришел его старший брат, и средний возраст собравшихся вскоре повысился с шестнадцати до девятнадцати. Самого Казарина с Ашхарумовой еще не было — они обещали подойти к одиннадцати.</p><p class="p1">Это были хорошие дети, балованные и потому добрые, — мальчики и девочки из хороших семей, те, кому Ять с юности завидовал голодной завистью разночинца, — однако, несмотря на все разговоры о дворянском вырождении, они и теперь, в голоде и скудости, держались с достоинством маленьких лордов, с презрением ко всему внешнему, свойственным одним наследным принцам. Они были элегантны в подростковых платьицах и курточках, из которых успели вырасти, аристократично ели поджаренный черный хлеб, картаво и светски щебетали, и прелестна была их молодая способность еще трунить над всем, что вызывало скучную скорбь взрослых людей образованного круга. Воспитанные на всем лучшем, они безошибочно уловили второсортность обещанной свободы. Пока, однако, им было очень весело. Разговор некоторое время покрутился вокруг нового года, в котором фантастичность обыденности должна была достичь новых высот и превзойти самое изобретательное воображение. Ять рассказал о грядущей отмене зимы, чем вызвал дружный хохот; затем выслушал несколько остроумных соболезнований по поводу своего упразднения. Кое-кто его читал, кто-то даже помнил отдельные фельетоны февральской поры («в которых было отрезвление», — с важностью заметил Коля Карамышев; стало быть, и министр читал, — и Ять улыбнулся собственному тщеславию). Правда, сущим кумиром этой молодой публики оказался почему-то Льговский, чьи «Проблемы структуры» Ять так и не осилил, ибо не верил в возможность статистического подхода к лирике. Льговский, многих узнав в лицо (очевидно, то была его постоянная публика), заговорил о том, что каких-нибудь сто лет спустя все реалии нынешней петроградской жизни покажутся вымыслом.</p><p class="p1">— Да и мало фактов уцелеет, — говорил он, блестя глазами и посылая в разных направлениях заговорщицкие улыбки. — Никто не пишет прозы, и хорошо, если от этой эпохи останутся хотя бы дневники. Ведите дневники, это литература будущего! Проза действительно сейчас бессильна, ее напишут нескоро. Нельзя уже написать «Иван Иванович пошел», «Антон Антонович сказал»… Мера условности превышена. Можно написать «Петр Петрович полетел», и этому поверят скорее.</p><p class="p1">— А от прежней жизни и вовсе ничего не останется, — подхватил студент-филолог. — Я сейчас уже многие стихи читаю и поражаюсь: о чем идет речь?</p><p class="p1">— Да, да! — Льговский расхохотался. — Представляете себе, как будет выглядеть через сто лет реальный комментарий… Господи, ну хоть к «Незнакомке»! Все ведь смешается, для потомков седьмой и семнадцатый год будет — одно!</p><p class="p1">— Попробуйте, попробуйте! — умолял сквозь хохот Бражников.</p><p class="p1">— Ну, извольте. Как это понять: «По вечерам над ресторанами горячий воздух дик и глух»? Вероятно, в ресторанах готовят пищу и жар поднимается вверх: стоят огромные жаровни, на них мясо… несвежее, разумеется, потому что свежего негде взять, — так что вокруг разносится «весенний и тлетворный дух»: именно тлетворный.</p><p class="p1">— «Чуть золотится крендель булочной»! — продолжила высокая горбоносая девушка с прелестными миндалевидными глазами; ее называли Идой. — Дело в том, что накал электрических лампочек внутри кренделя соответствовал количеству хлеба в булочной, и если ток был слаб, то крендель именно «чуть золотился». Отсюда же и «детский плач», раздающийся неподалеку: детям не досталось хлеба!</p><p class="p1">— «И каждый вечер за шлагбаумами, заламывая котелки»! — подхватил Мика Бобышев. — Дело в том, что горожане не выходили на улицу без котелков, в которые складывали кашу… солдатскую кашу, которую иногда раздавали на улице голодным… Но котелок был предметом дорогим и редким, взять его было негде, и потому петроградцы вырывали котелки друг у друга…</p><p class="p1">— Заламывая руки, — кивнул Льговский. — «И каждый вечер друг единственный в моем стакане отражен» — это, конечно, Пяст, близкий друг автора в исследуемый период; он отражен в стакане, ибо подкрался к автору сзади и намеревается выхватить у него из-под носа вожделенный сосуд… Спиртное было в городе на вес золота!</p><p class="p1">— «Девичий стан, шелками схваченный»! — чуть не визжал от восторга Бражников. — Шелка — члены так называемой Школьной Единой Литературно-Критической Ассоциации, страшные бандиты из совета учащихся, нападающие на женщин по ночам. Женщины, схваченные шелками, никогда не возвращались…</p><p class="p1">— И заметьте, — уже серьезнее продолжал Льговский, — что вся эта музыка, гипнотизировавшая ваших родителей, а быть может, и вас, — сегодня никого уже не тронет, все приемы обнажены, торчат! Звукопись, сквозные «а» и «е», несколько искусственная музыкальность… а в целом — слово размыто, оно больше не значит!</p><p class="p1">Ять хотел ему возразить, но понял, что ввяжется в долгий спор и будет наголову разбит статистическими аргументами; рано или поздно эти дети все равно поймут очарование ненавистной баллады, в которой запечатлелась его собственная глупая юность. В конце концов, немузыкальные времена невечны, отлив закончится, начнется прилив — и на черные обнажившиеся скалы хлынет живительная вода, и сами эти скалы в разводах, ракушках и трещинах предстанут под нею райскими садами.</p><p class="p1">Но пора было подумать о паре. Последняя связь Ятя, тяжелая и нервная, оборвалась в сентябре; с тех пор он жил монахом. Не сказать, чтобы это слишком его тяготило — но с тридцати пяти он все чаще просыпался по ночам, вспоминал не то, что хотелось бы… Отказ отказом, но живому довлеет закон жизни. Вокруг сидела прелестная молодежь — почему бы и нет?</p><p class="p1">Однако у прелестной молодежи были свои пароли и явки, система общих воспоминаний, в которой Ятю не находилось места. Эта компания еще до всякого Союза учащихся ездила в Озерки, бегала в синематографы, ходила на поэтические вечера, — и не то чтобы у всякой девушки непременно был кавалер: просто девушки пока и не особенно нуждались в кавалерах. Здесь царила подростковая дружба, хотя и не без того, что Толстой называл влюбленьем. Куда было Ятю с его вполне понятной целью — тут полагалось долгое ухаживание, общность интересов… Пожалуй, Ида была недурна; Зайка совсем некрасива, но до невозможности обаятельна. Ей ужасно хотелось, чтобы вечер удался, чтобы его запомнили. Она ловила все взгляды, кидалась поддерживать все разговоры, — это была не светскость, а детскость, трогательное желание сплотить и развеселить. Ять заметил славную летучую рыбу, улыбавшуюся с полудетского рисунка на стене, в самодельной рамке, — Зайка перехватила и этот его взгляд и закивала: «Очень красиво, правда? Прелесть… Это Юра нарисовал!» — и показала на студента Лосева.</p><p class="p1">Вот эту девочку и жальче всего, подумал Ять. Я все думаю, кто больше всего проиграет от происходящего, и забываю, что хуже всего придется маленьким добрым девочкам. Это перед ними больше всего виноваты декаденты всех мастей, посеявшие бурю… Когда все стало можно, большевики пришли на готовенькое. И пострадают от них больше всего, естественно, не стены Кремля, — стенам Кремля ничего не сделается, они и не такое видели, — а девочки вроде Зайки. Сейчас Зайка как раз командовала мальчиками, чтобы те убрали стол и освободили место для танцев.</p><p class="subtitle">22</p><p class="p1">Ять пьянел — давно не пил, а тут, помимо единственной бутылки шампанского, извлеченной из старых адвокатских запасов, стол украшала литровая бутыль спирта, который разбавляли «крюшоном» — так Зайка называла разведенное в воде клубничное варенье с крупными размокшими ягодами. Спирту принес Барцев, он в основном на него и налегал. Члены Союза учащихся пригубили, поморщились и отставили кружки. Ять, чувствуя ностальгическую грусть среди этих милых детей, выпил кружки три и проходил теперь все привычные стадии опьянения (особенно заметные, когда пил дрянь): сначала сентиментальность и умиление, потом беспричинную, тяжелую злость и под конец непобедимую сонливость. Сейчас он как раз переходил от умиления к раздражению. В начале двенадцатого, как и обещали, пришли Казарин с Ашхарумовой. Они явились не одни — Казарин прихватил любимого ученика.</p><p class="p1">Ашхарумова показалась Ятю еще красивее, чем прежде: черное бархатное платье, правда уже коротковатое, шелковые чулки, туфли, принесенные с собой в газетном свертке; преображение ее совершилось мгновенно — только что в прихожей стояла рядом с Казариным снежная баба в толстой шубе, платке, валенках… Зайка кинулась целовать ее и тормошить — видно было, что она влюблена в Ашхарумову, как только добрые и некрасивые девушки бывают влюблены в блистательных старших подруг. Казарин нацепил на свой черный фрак линялый красный бант и острил по этому поводу. Их спутник, юноша лет двадцати, с моноклем, не понравился Ятю с первого взгляда: уже по тому, как он небрежным кивком поздоровался со всеми сразу, бегло оглядел присутствующих, вошел в комнату, уже по тому, как безукоризненно он был одет, как гибко опустился в кресло и замер в расслабленной позе, — видно было, что ученик Казарина, как почти всякий ученик, усвоил у него худшее, а лучшего не перенял. Казарин мог быть снобом, игроком, ницшеанцем, дешевым парадоксалистом, — но его жег пламень нешуточный. Ученик, представившийся Стечиным — имени не назвал, — слишком позировал каждым своим жестом, чтобы заподозрить в нем талант (для Ятя талант начинался не то чтобы со вкуса, — он знал, что талант и вкус часто враждуют, — но с простого, ненатужного, лучше бы иронического отношения к себе). И копившееся в Яте раздражение тут же обратилось на Стечина: тот молчал, но Ять поглядывал в его сторону, ждал, когда эстет заговорит и можно будет его срезать. Эстеты обычно полуграмотны.</p><p class="p1">Танцевали немногие — под граммофон, пост у которого тут же занял старший брат Бражникова. Между танцами Мика стал вдруг упрашивать Барцева, чтобы тот почитал, и Барцев принялся читать стихи, в которых Ять ничего не понял. Размер и рифма были в них соблюдены образцово, наличествовала даже какая-то звукопись, но смысл ускользал после первой же строчки. Барцев читал громко, скандируя, делая ударения на самых неожиданных словах:</p><div class="poem">
<div class="stanza">
<p class="v">«Рас-кру-тил-ся ШАР фонарный,</p>
<p class="v">опустился ЖАР угарный,</p>
<p class="v">рухнул локоть, встал рассвет,</p>
<p class="v">хочешь плакать? Можно нет.</p>
<p class="v">Вот корова, вот пятно,</p>
<p class="v">вот мужик и домино.</p>
<p class="v">Говорили мужику:</p>
<p class="v">ты умеешь ку-ку-ку?</p>
<p class="v">Отвечает ирокез:</p>
<p class="v">я желал бы наотрез».</p>
</div>
</div><p class="p1">Сочинить такое можно было только в наркотическом бреду или шутки ради, но Барцев был необыкновенно серьезен и умудрялся как-то помнить свои алогичные сочинения. Мика, однако, покатывался. Остальные слушали с вежливым недоумением.</p><p class="p1">— Скажите, — спросил Ять, когда Барцев вдруг выпалил «Всё!», тряхнул головой и сел на диван. — Скажите, как вы их запоминаете?</p><p class="p1">— Они нетрудно запоминаются, — объяснил Барцев. — Попробуйте, сами увидите. Мне гораздо труднее запомнить «Мой дядя самых честных правил». Какой дядя? Что мне за дело до его дяди? Я пишу лучше, потому что занимаюсь конкретным искусством. У меня слово опять значит. Я его помещаю в контекст, где оно не должно стоять, и в этом контексте оно обнаруживается. Дама надела домино — скользит мимо слуха, но мужик надел домино — а еще лучше, мужик надела домино, — высвечивает и домино, и мужика.</p><p class="p1">— Это сильнее футуристов, — покачал головой Ять.</p><p class="p1">— Вы совершенно правы, — без тени иронии кивнул Льговский. — Стихи Барцева идут много дальше того же Корабельникова. Что такое Корабельников, поэт большой, но, я полагаю, уже исчерпанный? Он мой друг, отличный парень, но его стихи — тот же Надсон, переписанный дольником. Он крупный мужчина, его не понимает маленькая женщина, от этого он злится на весь свет и считает себя революционным, но революционности в нем не больше, чем, например, в «Записках охотника». Он нигилист, Базаров, шестидесятые годы. А Барцев и его друзья по конкретному искусству — это действительно революция, хоть и ямбом, потому что вещь вырывается из привычного ряда и ставится в другой, что мы и наблюдаем сейчас.</p><p class="p1">— Но ведь в итоге получается поэзия, которую невозможно любить, — улыбнулся Ять. — Можно слушать, допустимо как эксперимент, но вы не станете этого читать на любовном свидании…</p><p class="p1">— Я непременно стану! — крикнул Мика. — Смех сближает.</p><p class="p1">Казарин снисходительно улыбнулся, Стечин остался непроницаем. Льговский не очень понятно заговорил о том, что комический эффект продуцируется в таких стихах помимо авторской воли и возникает по принципу средневекового карнавала, когда на место сакрального символа помещается символ непристойный. Он заметил также, что поэзия вообще не для чтения, не для услаждения приказчиков («Я не вас, конечно, имею в виду. Но сколько напортили поэзии приказчики всех родов со своими вкусами! Сколько сладкозвучных, слащавых, фальшивых пустышек было ради них понаписано!»). Поэзия существует для изучения, как, например, Мельников.</p><p class="p1">— О, Мельников! — подхватил Барцев, одобрительно кивавший все время, пока Льговский многосложно его интерпретировал. — «И ты, бряцающий толпою, и ты, глотающий песок, грохочешь молнией тупою и возрождаешься, как сок!»</p><p class="p1">— Только бессмысленное прекрасно, — улыбнулся Льговский в заключение своей тирады, — и вы сами, помнится, писали об этом.</p><p class="p1">— Я писал о вещах, лишенных прикладного смысла, — поправил Ять. — Я говорил о том, что прекрасны только вещи, польза от которых неочевидна. Но ваша поэзия, думается мне, сознательно уходит от своей первостепенной задачи — гармонизировать мир, делать его выносимым, фиксировать какие-то состояния, в которых вы могли бы узнать собственные…</p><p class="p1">— Вы гораздо больше собственных состояний можете узнать в моих стихах, — уверил его Барцев и принялся читать, словно раскалывая каждое слово надвое: — Вот: «Гаме-эли, бени-оли, Шами-лона, Мале-она»… Вы можете думать, что это о вашем отчаянии, а кто-то решит, что это об удачно выдержанном экзамене. Это понятно человеку любой страны и даже любой планеты.</p><p class="p1">— А может, вы и правы, — махнул рукой Ять. Льговский примирительно засмеялся.</p><p class="p1">Старший Бражников сел к фортепиано и принялся артистически наяривать полечку, Мика подхватил и закружил Зайку, а Казарин подсел к Ятю и, весь светясь тихим счастьем, предался воспоминаниям.</p><p class="p1">— Все мы говорили о крахе, о гибели, а были между тем здоровые, богатые, молодые люди, полные желаний, и смерть нас манила как одно из неизведанных наслаждений, чуть более экзотическое, но и только. Вы видели шубу Брюсова? Человек в такой шубе — неужели может искренне хотеть гибели?</p><p class="p1">— Он никогда и не хотел, — пожал плечами Ять.</p><p class="p1">— Ну, не он же один так любил роскошь и почет… Или Бугаев: написал мне однажды письмо… Я думаю, что могу рассказать его содержание, потому что он всем так писал, и в статьях тоже. Что-то о черной птице, которая шелковыми крылами весь мир занавесила; что-то про плат зари… И тут же, около плата, — оплата: подробнейшие расспросы, сколько платят в «Мусагете» (я был туда вхож), сколько могут ему дать за лист… Сто рублей просил за лист, вы слышали о чем-нибудь подобном? Ясно же после этого, что все его черные птицы с шелковыми крылами не стоят ломаного гроша…</p><p class="p1">В этом был весь Казарин: безошибочно выискивал смешные и натянутые фразы в сочинениях больших поэтов и жестоко высмеивал тех, кто, несмотря на все свои провалы и глупости, был в тысячу раз отважнее. Бугаев написал пропасть всякой ерунды, но поэт был несомненный и прозаик, при всей своей вечной путанице, большой: во всякой фразе слышался живой голос. Казарин больше всего добивался, чтобы его самого в его писаниях не было видно, — Бугаев распахивался в каждой строчке.</p><p class="p1">— Но теперь, — продолжал Казарин, — теперь, когда все мы действительно лишились всего, я действительно слышу эту самую, столько раз осмеянную и опошленную музыку сфер. Словно убрали все лишнее. И если литературе нашей остались каких-то два года, прежде чем нас перебьют или мы сами вымрем, — это будут прекрасные два года, римские годы музыкального упадка…</p><p class="p1">— В римском упадке не было ничего музыкального, — сказал Ять. К ним подсел Барцев, и Ашхарумова скользнула по нему любопытным взглядом. Барцев был широкоплеч, конопат, трогательно курнос, под рыжими бровями часто моргали глаза — большие и несколько телячьи. — И я не думаю, — продолжал Ять, — что нас ожидает только упадок. У меня всегда было подозрение, что гибель — наша собственная выдумка, что мы свою гибель принимаем за конец Европы. А между тем наступает конец лишь нашей замкнутости в собственной скорлупе, может прийти свежая сила — как в шестидесятые годы пришли разночинцы, — и жизнь обновится.</p><p class="p1">— Ну что это такое! — воскликнул Казарин. — Не крестьянство же вы имеете в виду!</p><p class="p1">— Нет, конечно, не мужика… Я же говорю не о гении от станка или от сохи. Просто сами события придадут сил нам, все тем же нам, — уже появился истинный масштаб происходящего, как в начале войны. Не знаю, как вы, а я тогда радовался. То есть знал, что это постыдно, и в то же время ликовал: всем нашим связям, литературным потугам, внутрицеховым спорам вдруг придали дополнительное измерение. Историей запахло. И заметьте, что в самом августе очень многие стали писать, как давно не писали, — вовсе не о войне… Мне кажется, и сейчас будет что-то подобное.</p><p class="p1">— Обязательно, — заговорил Барцев и, как часто бывает, взяв сторону Ятя в споре, немедленно сделал его позицию смешной и жалкой. — Вот я читаю сейчас Пушкина — и мне тесно в его словаре. Словарь в несколько сотен слов. Лексикон поэту надо расширять за счет улицы, впускать в стихи техническую речь…</p><p class="p1">— Ах, да я вовсе не о том, — махнул рукой Ять и закаялся продолжать полемику.</p><p class="p1">Как всегда, он оказался меж двух огней: Барцев, милое и глупое дитя, понес какую-то новомодную чушь про техническую речь, чтобы произвести впечатление на Ашхарумову, Казарин упивался гибелью, — несомненно, с той же целью, — а он, как идиот, пустился в серьезный разговор о будущем литературы. Опьянение вступало в новую стадию — поднималась тяжелая злоба. Этим людям всегда было безразлично все, кроме производимого ими впечатления.</p><p class="p1">— Ну, а вы что думаете? — спросил наконец Ять у Стечина, почти грубо прервав рассуждения.</p><p class="p1">— Я ничего об этом не думаю, — пожал плечом Стечин.</p><p class="p1">— То есть как?</p><p class="p1">— Я не думаю о таких вещах.</p><p class="p1">— Вероятно, вы слишком для этого хороши? — открыто нагрубил ему Ять.</p><p class="p1">— Я не понимаю, что вы хотите сказать, — высокомерно отвечал Стечин, отворачиваясь.</p><p class="p1">— Я вам поясню, — сказал Ять почти вкрадчиво. Он чувствовал прилив настоящего бешенства и знал, что в таких состояниях бывает грозен. — Вы, вероятно, полагаете нужды грешной жизни слишком мелкими для того, чтобы человек вашего круга на них задерживался?</p><p class="p1">— Я не мыслю в таких категориях, — снова пожал плечом Стечин. — Я не пользуюсь такой лексикой — «нужды грешной жизни», «человек моего круга»… Я не работаю в прессе.</p><p class="p1">— То есть вам не нравится язык прессы? — еще вкрадчивее продолжал Ять. — Отлично, отлично! Я сам ненавижу его! Знаете, именно необходимость зарабатывать хлеб в газетах — это наследие первородного греха, если позволите, — лишила меня должной высоты взгляда. Я понимаю, какой чудовищной пошлостью должны вам казаться любые разговоры о политике, о размерах хлебного пайка, о деньгах, наконец… Человеку, напрямую подключенному к сферам, из которых истекают ледяные ливни искусства… так, кажется, писал г-н Маринетти?</p><p class="p1">— Мне нет дела до того, что писали всякие пошляки, — сказал Стечин, не пошевелившись в кресле. Набор пренебрежительных жестов был исчерпан: он уже и отворачивался, и пожимал плечом, к закурил — больше демонстрировать высокомерие было нечем. — Я не понимаю, с какой стати должен отвечать на ваши вопросы.</p><p class="p1">— Боже упаси, вы никому ничего не должны! — воскликнул Ять. — К вам обратились с вопросом, желая вовлечь в разговор. Тысяча извинений. Мне показалось, что вам скучно…</p><p class="p1">— С собою мне не бывает скучно, — с великолепным презрением ответил Стечин.</p><p class="p1">— Будет вам задираться, Ять, — попытался урезонить его Казарин. — Валя — человек другого темперамента, даже я не могу вызвать его на спор…</p><p class="p1">— Именно не можете! — продолжал Ять, замечая, что никто уже не танцует и не меняет пластинок — все следят за их ненужной, неуместной ссорой, — но остановиться уже не мог. — Пока мы с вами спорим, пока другие идиоты убивают друг друга — Валя покоится на своем Олимпе, совершенный, холодный, пресыщенный всем, признающий из всего мирового искусства только две строчки Рескина, три стихотворения Уайльда, хлястик пальто Метерлинка… Валя, вы любите кокаин?</p><p class="p1">— Я люблю, когда меня оставляют в покое, — отчеканил Валя. — Я люблю, когда люди знают свою меру и не пьют больше положенного.</p><p class="p1">— О да, да! Слово сказано: знание меры! Вот оно, истинное знание меры. Валя, позвольте перед вами преклониться: когда бы вы знали, до чего же я люблю людей, которые всегда правы! Ведь вы никогда ни в чем не замараетесь, потому что никогда и ни в чем не будете убеждены. Скажите, Валя: когда вы в последний раз заглядывали в газету?</p><p class="p1">— Вячеслав Андреевич, — обратился Стечин к Казарину. — Вы разрешите мне уйти? По-моему, я сильно раздражаю этого господина, и он уже не вполне владеет собой…</p><p class="p1">— Помилуйте, зачем же вам уходить! — пылко воскликнул Ять. — Как можно выживать из дома безукоризненного денди вроде вас. Останьтесь, заклинаю! Ведь ваш выбор предопределен? — он обернулся к Зайке. — Ведь в вашем молодом обществе, конечно, уместнее эстет? Ради Бога, простите, что я позволил себе напомнить о реальности. Реальности нет. Честное слово, я восхищен людьми, идущими на смену! Помните, Вячеслав Андреевич, когда мы пытались усовершенствовать реальность — ничего не выходило; пришли люди, попросту упразднившие ее! И самое поразительное — поверьте, я не так еще пьян, чтобы этого не заметить, — самое-то поразительное в том, что мне решительно нечего вам возразить, — снова отнесся он уже напрямую к Стечину. — Вы умеете каждой своей репликой внушить собеседнику, что он со всеми своими надеждами и опасениями не стоит носка вашего ботинка — о, безупречного ботинка! Вы всегда будете безупречны, а мы обречены на неправоту — хотя бы уж потому, что у нас есть убеждения, а у вас — только ваша безупречность, ваше презрение прежде всякого знания…</p><p class="p1">— Это вы на нас новые «Листки» обкатываете? — вяло спросил Стечин. — И много теперь платят за этот бред?</p><p class="p1">А, радостно подумал Ять, он читает «Листки». Но как стремительно переориентируются наши индивидуалисты: уже заговорил от лица всех! Еще немного — и этот кокаинист расскажет мне о вреде пьянства.</p><p class="p1">— Ну что вы, — почти завизжал Ять в ответ. — Кто же станет теперь платить за это? Я пишу «Листки» единственно по привычке, а питаюсь подаянием. Хожу в гости, пока пускают, и стараюсь накушаться побыстрее. Благодарю вас, господа, я и так уже злоупотребил вашим вниманием. — При общем молчании он отвесил поклон Зайке-хозяйке, зачем-то подпрыгнул и выпорхнул в коридор, не переставая истерически хихикать. Краем глаза он все время замечал упрямый и пристальный взгляд Ашхарумовой, и в нем читалось чуть ли не восхищение.</p><p class="p1">Он лихорадочно наматывал на себя шарф, когда к нему в прихожую выбежали Зайка и Барцев.</p><p class="p1">— Останьтесь, — умоляюще сказала Зайка. Она чуть не плакала: вечер испортился так внезапно и незаслуженно! — Останьтесь, пусть как будто ничего не было… да? Я понимаю, вам трудно, сейчас всем трудно… Жалость к ней еще подогрела раздражение Ятя против Стечина.</p><p class="p1">— Видите ли, Зайка, — сказал он очень спокойно, демонстрируя владение собой. — Мы с этим господином распознали друг друга с первого взгляда. Он любит быть всегда прав, я люблю быть неправ. Разойдемся полюбовно. Простите, что я вам подпортил праздник, но, ей-Богу, это не нарочно. Возвращайтесь к гостям и постарайтесь все забыть. Спасибо, все было чудесно, и вы чудесная.</p><p class="p1">— Я с вами во многом согласен, — надвинулся на него Барцев. Он был гораздо пьянее Ятя. — Вы точно сказали: хлястик Метерлинка. В наши времена к символистскому искусству уже нельзя относиться всерьез. Они не поняли величия индустриального века, прошли мимо автомобиля…</p><p class="p1">— Ага, — сказал Ять. — Искусно как коснулись вы предубеждения Москвы к любимцам, к гвардии, к гвардейцам, гвар-ди-он-цам! Да, да, вы тоже, в сущности, прелестный человек. Будете идти мимо — заходите. И вышел.</p><p class="subtitle">23</p><p class="p1">Снег облепил, закружил его, обдал свежестью горящее лицо. Ять все еще не утратил хмельного воодушевления. Ему еще не казался постыдным собственный демарш — напротив, он был вполне собой доволен. Он возвращался на Зеленину, размахивая руками, громко разговаривая сам с собой.</p><p class="p1">— О да! — повторял он. — Да, вы несомненно представляете новую ступень в развитии человека. Но не спешите радоваться. Заметьте себе, что выигрывает всегда тот, кто проигрывает. Вы друг друга пожрете раньше, чем мы успеем что-либо с вами сделать. Вы не сможете воспроизводить себе подобных, потому что при таком взгляде на жизнь какие же дети? Ледяные, бездушные дети гнилого времени, способные говорить только об искусстве и кокаине… бессмертная гниль! Вот кто расчистил путь темному человеку. Пришли и сказали: можно все. Пресыщенные, усталые, безжизненные, испробовавшие все, кроме самого утонченного зла, — и зло пришло, и остановить его некому. Потому что добро стало смешно, пошло, глупо, жизнь вышла из моды — и вот кого вы все пустили в мир!</p><p class="p1">Об этом следовало еще подумать. Ять почти не чувствовал холода, а заблудиться не смог бы и в бреду: он шел быстро, не прекращая монолога. Страшно хотелось курить, но папиросы он оставил на столе. Вокруг Дымилась вьюга, ни одно окно не горело, и ни одной живой души не попадалось навстречу. Шел третий час ночи. Он был уже на Пушкарской, когда фонари на всей улице мигнули, потом еще раз — и вдруг бледно, смутно загорелись; тут и пурга утихла, как по заказу, и в ровном неживом свете Ять увидел ледяную перспективу улицы, сосулечные наросты недавней оттепели на крышах и карнизах, черные окна — многие с выбитыми стеклами. Он замер, глядя на эту мрачную геометрическую красоту, и вдруг заметил под дальним фонарем маленькую фигурку. На темной ночной Пушкарской в третьем часу стоял ребенок лет восьми — менее всего Ять ожидал увидеть в эту ночь ребенка, и, однако, это не было ни сном, ни галлюцинацией. Он бросился бежать к фонарю. Там, сжавшись, засунув ручки глубоко в карманы пальто, в самом деле стоял и тихо всхлипывал мальчик. На голове его была вязаная шапочка, на ногах сапожки.</p><p class="p1">— Что ты тут делаешь? — крикнул Ять. Мысль о грабителях, о возможной приманке, о ловле на сострадание не пришла ему в голову. — Откуда ты? Мальчик не отвечал и продолжал жалобно плакать, шмыгая кнопочным носом.</p><p class="p1">— Потерялся ты, что ли? — не отставал Ять. Он вытащил ручки ребенка из карманов, принялся их растирать и греть. Они были ледяными, и Ять испугался за мальчика по-настоящему.</p><p class="p1">— Я… потерял папу, — чуть слышно ответил ему наконец мальчик. — Мы шли с папой… на него напали, я убежал позвать… никого не было, я бежал… заблудился… Папа, наверное, ищет…</p><p class="p1">Вид у мальчика был ухоженный, приличный и речь хорошего, воспитанного ребенка; ужасно было видеть его ночью, совсем одного, на пустой улице.</p><p class="p1">— Ну вот что, — решительно сказал Ять. — Адрес свой ты помнишь?</p><p class="p1">— Мы… мы живем на Третьей Рождественской, — всхлипывал мальчик. — Дом четырнадцатый…</p><p class="p1">До Рождественских надо было полгорода пройти пешком — вьюжной ночью предприятие почти неосуществимое, да вдобавок ребенок был едва жив от холода. Завтра с утра надо отвести его к родителям, а теперь Ять, присев перед ним на корточки, постарался как можно ласковей и убедительней позвать его к себе: отогреется, поест, а там и утро близко. Мальчик едва мог идти, с трудом передвигал застывшие ноги, — шагов через тридцать Ять попросту подхватил его на руки, поразившись, до чего он легок. Свет снова мигнул и погас, но метель не возобновилась (хотя так и казалось, что в темноте она начнется снова); своего углового дома он достиг через четверть часа. Хмель не то чтобы выветрился, но перешел в лихорадочную жажду деятельности. Ять был теперь собран и решителен.</p></span>
