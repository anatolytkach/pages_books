<span><p class="p1">Трамвай тронулся дальше, звон и дребезг заглушили речь о раскрепощении детства. Слава Богу, несчастный безумец перестал быть представителем наркома и вернулся в естественное состояние. Его никто не слушал, но в слушателях он и не нуждался. Между тем все сказанное им было вовсе не так безумно. Дайте детям играть, в их детские игры, не лезьте со своим воспитанием, не читайте лекций, не ставьте памятников, не навязывайте грамоты. Дайте детям вырасти, усложниться и снова взорвать свой мир и не пробуйте нарушить цикла… Год спустя безумца в самом деле заметили, теперь уже всерьез, и в 1921 году он возглавил Петроградский институт остановки времени, просуществовавший до 1927 года; видимо, к 1927 году он уже выполнил свою задачу. На Троицком мосту трамвай встал; Ять вспомнил, как по этому мосту в январе восемнадцатого шел к Чарнолускому, сморщился от стыда и отогнал гадкое воспоминание. Опять мост, и опять эта большая, свинцовая вода; почему я должен жалеть о ней, если я протеку, а она останется? Протечет все, что ни есть на берегах, размоются, осыплются и сами берега, — но вода всех переживет и отомстит граниту, сковавшему ее путь. Надо было идти. Трамвай так и остался стоять на мосту, и вагоновожатый задремал, укрывшись курткой.</p><p class="empty-line"/><p class="p1">Финляндский был пустынен, поезд уже стоял на пятом пути; штурмом его никто не брал — от поездов, идущих за границу, в девятнадцатом году подчеркнуто держались в стороне, как от прокаженных: выезд понимался как бегство, бегство — как предательство. Около вагонов стояла, бродила, покуривала относительно чистая публика, выглядевшая, однако, ничуть не чище прочей — разница определялась по лицам, и Ять чуть не заплакал, увидев эти лица. Он давно не видывал таких. Кажется, путь был действительно свободен. Он в самом деле уезжал из России. Оставалось пройти последние шагов сорок от ажурных железных ворот до перрона, — и тут он почувствовал чей-то взгляд; оглянулся — и в стайке грязных вокзальных детей увидел того, кого искал два года. Несомненно, это был его мальчик, его Петечка, но какая разительная и страшная случилась с ним перемена! Жалкое и запуганное выражение приросло к личику, как маска, — но за этой привычной маской городского нищего Ять легко видел теперь скрытое торжество ловкого обманщика; Ять увидел его черные глаза и шафранно-желтое лицо, все в морщинках, складочках, в мешочках больной кожи. Это был мальчик из гурзуфского сна — мальчик, бросившийся на него.</p><p class="p1">Будь это прежний Петечка, дитя, возникшее из метели и отогревшееся у него в доме, будущий гимназистик, умеющий играть в «Море волнуется», — Ять не колеблясь бросил бы все, порвал билет, выбросил визу, вернулся к себе на Зеленину, убил столяра, убедил дворника и вырастил мальчика, сделав его вторым собою; но из этого мальчика ничего уже было не сделать — гримаска плаксивого хищника не оставляла надежд. Он смотрел на Ятя с тоской и мольбой — но Ять знал, что стоит ему подойти и протянуть Петечке хоть сухарь, хоть монету, как вся стая безмолвно набросится на него. Этих детей не зря тренировали по ночам. Теперь, впрочем, они и днем ничего не боялись. Он в последний раз поглядел на Петечку, отвернулся и пошел к поезду.</p><p class="p1">— Колю больше не видай! — крикнула ему вслед цыганка, промышлявшая гаданием на вокзальной площади; он оглянулся и узнал Соню.</p><p class="p1">— Не буду, — кивнул он. И это было последнее, что он сказал в Петрограде.</p><p class="empty-line"/><p class="p1">В купе с ним оказались два американца, священники-энтузиасты, отбывавшие теперь в Гельсингфорс на предмет ознакомления с новой жизнью независимой Финляндии; оба были в восторге от Петрограда, в особенности от того, что революция почти не повредила архитектуры, ибо была бескровной и поистине всенародно чаемой. Он не стал поддерживать разговора и стоял у окна, пока роскошный поезд не тронулся.</p><p class="p1">Ять порылся в мешке и достал книгу Клингенмайера — пергаментно-желтая бумага, какая, кажется, только и была в его лавке; обложка без единого знака, без единой черты, пустая, — и ряды пересекающихся фигур на каждой странице. Вот волнообразные треугольники, вот восходящие по диагонали квадраты, летящие по кругу круги, — овалы, обвалы, молнии внезапно пересекающихся прямых, многоугольники, ромбы, стрелки: клинопись неведомого шифра, музыкальная грамота безумца. И точно, мелодия угадывалась, но тут же сбивалась резким диссонансом; написано было старательно, но никто не понимал, что написано. В руках у него был апофеоз бессмысленного усилия, лучшая в мире орфография. Накренились, потянулись, побежали за окном дома, деревья, заборы, сыпанул мелкий дождь, начертив на стекле круга, овалы, косые линии, замелькали пятна зелени с проступающей между ними чернотою голой, жирной, последней правды; простучал короткий мост, низко опустилось небо, и из всех красок на свете остались зеленая, лиловая, серая. Скучна и безвыходна северная весна, и начало ее не радостнее конца.</p><p class="empty-line"/><p class="p1"><em>Санкт-Петербург — Артек,</em></p><p class="p1"><em>август 2001 — июнь 2002</em></p></span>
