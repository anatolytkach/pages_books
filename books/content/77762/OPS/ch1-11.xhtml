<span><p class="p1">— Ваша воля — доносить или не доносить на меня, обнародовать или нет мои интимные разговоры, — устало сказал Хмелев. — Да, я ненавидел Керенского и не верил в его правительство. События показали мою правоту — ни страны, ни власти эта компания не удержала. И если я их под горячую руку назвал шайкой, — не отрицаю, бываю резок, ибо душой кривить не умею, — то нынешних впору назвать взбесившимся стадом. Шайка — это хоть человеческое понятие, а стадо — звериное.</p><p class="p1">— Да Николай же Алексеич! — громче обычного воскликнул Борисов, которого никто еще не видел в таком возбуждении. — Неужели вам, человеку в полном смысле интеллигентному и безусловно честному, нравилось то, во что превратилась Россия? Неужели вам не внушает надежды возможность покончить со всею этой рутиной единым махом? И назовемте уж вещи своими именами — мы с вами лучше прочих знаем русскую орфографию; кто из серьезных ученых, положа руку на сердце, назовет ее совершенной? Кто из нас осмелится защищать русскую государственность? И в орфографии, и в управлении обществом — страшные наслоения ненужных условностей, века рабства, триумф муштры, тупой силы… Нам ли с вами не знать, что такие завалы голыми руками не разгребаются — их надо взорвать, чтобы с самого начала выправить весь русский путь, вытравить русскую татарщину! Оставьте в организме одну больную клетку — завтра она вновь изуродует его, скрючит в три погибели, рабством отравит кровь! Неужели мы не оценим единственного исторического шанса, неужели отвернемся от него? Ведь если не мы — новую Россию и впрямь построят такие люди, что Господь не приведи. Нам ценить надо, что чарнолуские готовы спрашивать нашего совета. Не в традициях русского интеллигента — презирать народ, третировать его за темноту и отказывать ему в праве решать собственные судьбы…</p><p class="p1">— Стыдно, Константин Борисович! Стыдно-с! — оборвал его Алексеев, вставая с места. По вечной привычке к кафедре он ораторствовал стоя. — Вы говорите о традиции русской интеллигенции, а два лучших русских интеллигента лежат на Волковом, и торжествующим скотам дела нет до их традиций! Традиции сострадания к народу действенны до той лишь поры, пока народ не берет колья, не жжет книг, не гадит во дворцах! Вам же угодно, как и вашему отлученному кумиру, — верю, что он теперь горит в аду на костре из своих сочинений, — лизать этот народ, трусливо прислуживать ему и гордиться его зверствами! В личной своей судьбе вы вольны, но зачем же всю нацию толкать на этот путь? Никто не скажет, что царствование последнего императора было совершенно. Не в последнюю очередь и он виновен. Но лечить больного можно по-разному, рубить ему голову — не лучший способ!</p><p class="p1">— Я слушаю вас, — вступил наконец Льговский, словно очнувшийся от задумчивости, — слушаю и тоже чувствую себя мертвецом. Что плакать по орфографической норме, которою унижали и насиловали двадцать поколений русских детей? Лотреамон и Корбьер упразднили традиционную пунктуацию за пятьдесят лет до большевиков. Свифт писал вовсе без знаков препинания. Мысль является вся, сразу, не сообразуясь с правилами. Мысль требует знака для наиболее полного выражения, но вынуждена довольствоваться грубыми буквами. Буквы чертил дикарь. Дикарю нужны были ограничения на любые случаи, Бог говорил с ним одним словом — «нельзя». Но пришел сын Бога и сказал, что Бог не в запрете. Мы живем в дни третьего завета. Может быть, теперь время отказаться от букв вовсе и единым иероглифом двигать миры. Когда молодой Бог творил молодой мир, он говорил «А» — и от этого звука рождались не арбуз и алмаз, надоевшие нам в азбуках, а свет и воздух, пространство и время. Вам жаль орфографии, а мне жаль, что не упразднены слова — бедные, грубые слова. Я хочу, как Мельников, говорить «Брут, браг, агабаран!» — и слышать, как братья над брагой клянутся в верности, закалывают барана, кричат от счастья в горах, и горное эхо им вторит: ага! ага! Я хочу самоценного звука и небывалого слова, а вы заставляете змею плакать над сброшенной кожей. Погибли двое, погибнут еще многие, — старый яд крепок. Но нам ли, словотворцам и словознатцам, бояться смерти? Мы не умираем, мы становимся новым словом, какого еще не было. Нет Шергина и Кошкарева, есть знак-Шергин и знак-Кошкарев, и они будут жить, пока жив язык. И я хочу быть знаком-Льговским, а не приват-доцентом Льговским.</p><p class="p1">Он говорил размеренно, словно читал Библию, четко отделяя один стих от другого. Его речь хотелось так же, по-библейски, записать — стихами, короткими абзацами, состоящими из одного предложения.</p><p class="p1">— Тупой футуристический бред, — сквозь зубы заметил Долгушов. — Я с господином Льговским спорить не стану, я не имею чести его знать достаточно близко… Но вы-то, Константин Борисыч! — обернулся он к Борисову. — Вы ученый с именем, я вас студентом помню — вы были вдумчивым, любознательным юношей! Я и работу вашу первую помню, о языке Герцена, — что ж, кто-нибудь вам мешал заниматься Герценом? За демонстрацию в пятом году хотели вас исключать, помню, — но ведь отстояли, ездили к Мирскому, петицию подавали за вас и еще десятерых студентов с задатками! Неужели вы всерьез слушаете все эти разговоры о самоценных звуках?!</p><p class="p1">— Владимир Николаевич, я все помню, — в тон ему, тихо ответил Борисов. — Но признайте и то, что вся сколько-нибудь талантливая литература в последние годы пошла налево, а не направо, и даже закоренелые декаденты…</p><p class="p1">— Да эти пусть себе выдумывают что угодно! — воскликнул Хмелев. — Писатель на то и писатель, чтобы проживать чужую жизнь. Нацию-то зачем толкать в пропасть? Поодиночке пусть спиваются, нюхают кокаин и упраздняют пунктуацию — народу-то к чему подстраиваться под них?!</p><p class="p1">— Поймите, Николай Алексеевич, — мягко сказал молчавший доселе Ловецкий, — никто не подстраивается. Это же они не с потолка взяли, а в воздухе поймали. Вы скажете, что декаденты устраивают оргии, — а я вам скажу, что оргии, которые устраиваются в сибирских деревнях, среди самых темных и озверевших мужиков, дадут сто очков вперед любому декаденту!</p><p class="p1">— Это верно, — окая сильнее обычного, словно стремясь доказать глубокое знание жизни, подтвердил Горбунов. — Это — очень верно…</p><p class="p1">— И не стал бы я считать это только бредом, — вступил барин Соломин, от которого менее всего можно было ожидать подобной реплики. — Как хотите, я всей современной поэзии предпочту Корабельникова. Если откуда и вольется свежая кровь в русскую поэзию — то не от Мельникова даже (Мельников, на мой вкус, сумбурен, в нем нет поэтической дисциплины), а вот от этого дылды с его гримом и кошками.</p><p class="p1">— Льется, льется уже свежая кровь! — надрывно выкрикнул Алексеев. — Вовсю льется!</p><p class="p1">— Не бывает без крови-то, — заметил Соломин. — Она и в четвертом, и в пятом лилась, и в четырнадцатом — море… И больше прольется, если не найдется кто-то, за кем будет сила. Воля ваша, силу я вижу за этими. Россия может быть либо сильной, либо, простите уж, никакой. В Корабельникове есть мощь… Да и Мельников, кстати сказать, дворянин, только нарочно через «т» себя пишет.</p><p class="p1">— Дворятин? — хохотнул Комаров-Пемза.</p><p class="p1">— Творянин, — спокойно поправил Соломин. В тоне его Комаров с некоторым ужасом почувствовал неискоренимое презрение профессора и дворянина, хотя бы и самого демократичного, к разночинцу, хотя бы и лучшему в Петербурге словеснику. Ему страшно было подумать, что может получиться из смеси этой сословной спеси, имперских взглядов и большевистской «свежей силы», — и он успокоил себя: померещилось.</p><p class="p1">— Неужели вам не хочется начать сначала? — снова заговорил Льговский. — Неужели вам не хочется построить новую жизнь с нуля, без кнута и татарщины? Вы скажете мне сейчас, — он прямо, тяжело посмотрел на Алексеева, — вы скажете мне: чем жид — лучше татарин. Вам невдомек, что я предлагаю вам мир без жида и татарина, без границ и условностей…</p><p class="p1">— И земного тяготения, — ехидно вставил Казарин.</p><p class="p1">— И земного тяготения, — твердо продолжил Льговский.</p><p class="p1">— Вы думаете, что связаны пиджак и плечо, — сказал Барцев. — А я думаю, что связаны пиджак и четыре. Может быть логика Евклида и логика Лобачевского, физика Паскаля и физика Эйнштейна. Вы хотите жить в двухмерном мире, а я в четырехмерном. Чтобы был трехмерный, нужны мы оба.</p><p class="p1">Ашхарумова улыбнулась и посмотрела на него долгим заинтересованным взглядом. Он говорил дело. Ей давно уже казалось; что Эйнштейн, Лотреамон и Мельников упразднили старое искусство, что мир утратил прежний порядок и силу тяготения, — и падать ей было слаще, чем ходить. Она вопросительно глянула на Казарина — отчего тот молчит? — но он лишь отрицательно качнул головой. Разговор был принципиальный, дело шло не о репутациях, а о том, удастся ли сохранить единство; на единство ему было наплевать — он всю жизнь был сам по себе, — а репутацию при таком накале страстей стоило поберечь. Можно было ограничиться парой mots, не имевших особенного смысла.</p><p class="p1">— Демагогия, мерзкая демагогия! — не выдержал Долгушов. — Убивать ради искусства, насиловать ради новой логики… Боже мой! До чего докатилась нация, если таков ее цвет! И это в день, когда два мученика…</p><p class="p1">— Оставьте вы в покое двух мучеников, — неожиданно резко сказал Соломин. — Эти мученики были воплощенными посредственностями, я знал обоих, и единственный свой подвиг совершили, когда умерли. Не будем же оскорблять лицемерием их память и признаемся, что к великим событиям подошли банкротами. Ради такого признания стоило погибнуть… чтобы другие могли начать заново. Когда гибнет империя — за ее возрождение надо заплатить.</p><p class="p1">Льговский подумал, что возрождение империи — последнее, чего ему бы, пожалуй, хотелось на этом свете. Но терять такого союзника, вдобавок непредвиденного, он тоже не собирался, а потому почел за лучшее промолчать.</p><p class="p1">— Значит, война, — твердо и грустно произнес Хмелев, но тут же с последней надеждой поднял глаза на Борисова. Борисов молчал.</p><p class="p1">— Тогда уж знайте — все пойдет всерьез, — опустив глаза, проговорил Хмелев. — Если вы с ними — мы враги.</p><p class="p1">— Если для вас важней, с кем мы, а не кто мы, — мы действительно враги, — также потупившись, отвечал Борисов.</p><p class="p1">— Ну, прощайте. Я вас всегда любил, Константин Борисыч.</p><p class="p1">— Я и впредь буду любить вас, Николай Алексеич.</p><p class="p1">Только прощального объятия недоставало, но от этого последнего движения удержались оба. Некоторое время все молчали.</p><p class="p1">— Господа, прошу ко мне, — деловито сказал наконец Соломин. — Квартира велика, там обговорим наши планы, а затем выберем новое место. Вещи можно завтра забрать, а я живу тут неподалеку.</p><p class="p1">Он встал и пошел к выходу. За ним потянулись остальные раскольники — общим числом пятнадцать человек. Льговский выжидательно обернулся на Ловецкого, но тот отвел глаза и остался на месте.</p><p class="p1">— Да, — сказал Хмелев. — Ну что ж, ну что ж. Да… Жаль, что они не дают нам спирту. Сейчас не повредило бы, честное слово.</p><p class="p1">— А вы взяли бы у них спирт? — спросил Казарин.</p><p class="p1">— Отчего ж нет, взял бы. Отняли профессию — пусть обеспечивают. Не романы же мне писать о братьях Чихачевых и роковых Маланьях.</p><p class="p1">— И что вы намерены делать?</p><p class="p1">— Будем спорить с ними, пока они будут нас терпеть. Будем бороться…</p><p class="p1">— Ну, Бог в помощь, — сказал Казарин. — Я буду с вами. Веди нас, Сусанин. Есть времена, когда важно не делать то-то и то-то, а быть там-то и там-то.</p><p class="p1">Ашхарумова посмотрела на него загадочно — он прочитал в этом взгляде только нежность, но было в нем и любопытство, и вызов, если угодно. Впрочем, она не сомневалась: где надо быть — он знает лучше других. Ночи прекраснее этой у них еще не было.</p><p class="subtitle">27</p><p class="p1">Первым газету развернул Ватагин; некоторое время он сидел в полном оцепенении.</p><p class="p1">— Что ж вы не читаете? — вмешался наконец Оскольцев. — Что там такого, большевиков, что ли, скинули?!</p><p class="p1">— Убили, — выдохнул Ватагин.</p><p class="p1">— Кого? Кого? — зашумели все.</p><p class="p1">— Шергина с Кошкаревым.</p><p class="p1">— Быть не может, дайте! — Гуденброк решительно шагнул к нему и вырвал газету. Ватагин не пошевелился, так и застыл с выпученными глазами. — Ну где, что? (В полутьме, вечно царившей в семнадцатой камере, человеку с его зрением трудно было разглядеть узкий шрифт «Речи».) Господи! Господи!</p><p class="p1">— Да читайте же, черт бы вас.</p><p class="p1">— «В ночь на двадцать второе января караульный Изотов, под чьей охраной арестованные министры были перевезены в Лазаревскую, с тремя матросами ворвался в больницу. Изотов, как рассказал снятый им караульный матрос, был в сильном опьянении и ярости… С караульным он не разговаривал, сказал ему только, что „нечего врагов стеречь“». — Голос Гуденброка задрожал, и он опустился на нары.</p><p class="p1">— Мерзавцы, — прохрипел Ватагин. — Как они смели нам не сказать? Мерзавцы!</p><p class="p1">— А для чего вам говорить? — тихо спросил Гуденброк. — Овца не должна знать, что ее зарежут. Но теперь-то вы поняли, что отсюда не выйдет никто?</p><p class="p1">— Мерзавцы, — повторял Ватагин. — Мерзавцы. Мерзавцы.</p><p class="p1">Все еще повторяя это слово, он встал, сомнамбулически подошел к двери и принялся медленно, размеренно колотить в нее кулаками. Скрежетнул ключ, и в дверь просунулась голова караульного Крюкова.</p><p class="p1">— Что буяните? — спросил он с добродушием сытого кота.</p><p class="p1">— Убийца! — заорал Ватагин и плюнул; Крюков еле успел убрать голову, но тут же вновь просунулся в камеру.</p><p class="p1">— К своим захотелось? — уже без всякого добродушия, ровно спросил он. — Так это мы живо. Погодите, скоро все к ним пойдете. Кончилась лафа.</p><p class="p1">Прошло около часа — в молчании, в редком обмене ничего не значащими словами, — когда ключ опять повернулся в замке и в камеру по-хозяйски вошел Изотов. Он был крепко избит, левый глаз его заплыл, на правой скуле багровела ссадина. Между тем глядел он победителем, хозяином.</p><p class="p1">— Слышь, братишка, всех их сразу-то не пореши, — хохотнул ему вслед Крюков.</p><p class="p1">— Не боись, тебе оставлю, — не оборачиваясь, ответил Изотов.</p><p class="p1">Он стоял у двери, захлопнувшейся за ним, на виду у всей семнадцатой камеры; девять человек с ужасом глядели на него.</p><p class="p1">— Послан для укрепления боевого духа, — сказал Изотов. — Разнежились тут, так вот для порядку. Приказ главного командования, — он усмехнулся и прошел к свободному месту в углу. Прежде это место занимал Шергин.</p><p class="p1">— Стоять! — заорал Ватагин, вскакивая. — Не сметь! Не сюда!</p><p class="p1">Изотов посмотрел на него с любопытством, подошел вплотную и некоторое время постоял, качаясь с пятки на носок и заложив руки за спину. Вдруг он с птичьей, хищной внезапностью ткнул Ватагина головой — удар пришелся в нос, Оскольцев знал, как это больно. Ватагин закрыл лицо руками и сел.</p><p class="p1">— Митинг объявляется открытым, — сказал Изотов. — Слово имеет… имеет кто или нет? Не имеет. Митинг объявляется закрытым. Он лег, вытянул ноги (толкнув Гротова), надвинул на лицо бескозырку и засопел.</p><p class="subtitle">28</p><p class="p1">Замысел поместить Изотова в семнадцатую камеру принадлежал Бродскому, не такому уж простому парню. В последнее время его довели до белого каления бесчисленные жалобы на жестокость новой власти. В результате новая власть второй раз вынуждена была наказывать вернейших людей, и все из-за семнадцатой камеры. А потому он принял иезуитское, но единственно логичное решение: всех этих людей, требовавших наказания для виновных, следовало проучить раз и навсегда. Бойтесь ваших молитв, ибо молитвы ваши будут услышаны. Изотова, безусловно, следовало арестовать как нарушителя революционной дисциплины, но поместить его надо было к тем, кто своими руками отправил Шергина и Кошкарева в Лазаревскую больницу. Бродский воображал, какую жизнь устроит им Изотов, — и не ошибся.</p><p class="p1">В шестом часу Изотов заворочался и сел на нарах. Некоторое время он соображал, где находится, потом все вспомнил, плюнул, высморкался и усмехнулся.</p><p class="p1">— Ну вот что, сердешные, — сказал он бодро, выходя на середину камеры. — Осталося вам немного, и кто первей отсюда выйдет в деревянном бушлате, тому остальные позавидуют хорошей завистью. Направлен я к вам, сами понимаете, не просто так. Жизня у вас пойдет с этого дня интересная, бойкая жизня. Заскучали вы што-та, закисли своим кружком. Боевой дух нужен. А так что ж, никакой дисциплины, одно разложение. Жить будем задумчиво, в сердешной дружбе. — Он легко воспроизводил дурашливый деревенский стиль, хотя много знал, читал и не зря вырос до старшины второй статьи. — Ну-к што ж, огласим распорядок нового нашего уставного жития. Как скляночки прозвенят шесть, так будет у нас маршировка на месте под мою команду. Ежели нет охоты маршировать, так можно и ползком. Кто марширует молодцевато, тому лишнюю паечку — в подарок от того, кто марширует немолодцевато. Затем чтение вслух, интересные занимательные рассказы, вы народ культурный, я послушаю. Чесать пятки не прошу, не царское время. В обед поощрение лучшего рассказчика, а потом, сердешные, сладкий сон, как у бабки на печке. В это время, сами знаете, люблю тишину. Вечером по распорядку — кто поет, кто сказки сказывает. Опять же не без упражнений. В нашем положении тело блюсти — это самое первейшее де…</p><p class="p1">Договорить он не успел, потому что один из обитателей семнадцатой камеры стремительным прыжком достиг Изотова, сшиб его с ног и вцепился в глотку. Удар был так силен, что Изотов в первые секунды не мог сопротивляться — так и рухнул на пол всей массой, и, пользуясь этим, нападающий сильнее и сильнее давил на его бычью шею. Кто напал — разглядеть было невозможно. Изотов хрипел, ворочался, беспомощно шлепал руками по полу, — одну руку нападающий прижимал коленом. Никто не бросился на помощь — то ли страх удерживал обитателей семнадцатой камеры, то ли остатки чести: куда вдевятером на одного, хотя бы и матроса? Страх не так легко отличить от понятий о чести; верно и обратное. Лишь когда хрип Изотова начал слабеть и переходить в бульканье, все словно очнулись.</p><p class="p1">— Оставьте, оставьте его! — закричал Ватагин.</p><p class="p1">— Убьете, тогда нам всем конец! — вторил Бельчевский.</p><p class="p1">— Да кто это, черт вас возьми! — орал Карамышев. Темная фигура выпрямилась. Туша Изотова неподвижно лежала на полу.</p><p class="p1">— Я, Гротов, — сказал Гротов.</p><p class="p1">— Да вы убили, убили его! — Ватагин боялся тронуться с места, чтобы убедиться в своей правоте.</p><p class="p1">— Хорошо бы, — задыхаясь, ответил Гротов. — Хоть раз в жизни… сделал, что хотел. Бельчевский вскочил и заколотил в дверь.</p><p class="p1">— Надзиратель! — завизжал он. — Над-зи-ра-тель! Крюков просунулся в дверь.</p><p class="p1">— Что, дает вам Коленька жару? — спросил он весело.</p><p class="p1">— Забирай своего Коленьку, — сказал Гротов. — Недолго он тут… жару давал… Начальству своему скажешь, что Гротов его отдохнуть отправил. Гротов, запомнил? Башка-то дырявая, вылетит. Забирай, а то и впрямь помрет.</p><p class="p1">Крюков испугался заходить в камеру один. Он поспешно запер дверь, протопотал по коридору и вернулся в сопровождении трех других матросов, неся с собой «летучую мышь». Один караульный стал у двери, двое других бросились к лежащему Изотову, подхватили неподвижное тело и, согнувшись, вынесли. Крюков вышел последним.</p><p class="p1">— За Коленьку… — прохрипел он рыдающим голосом. — За Коленьку… О, падаль буржуйская! Флотским братством клянусь, — если с Коленькой что… тот, кто Коленьку… жив не будет! Зубами, зубами загрызу, никто не спасет! Лично говорю!</p><p class="p1">— Пшел вон, — безразлично сказал Гротов, уже успокоивший дыхание по индийской системе. Мало кто знал, что министр финансов в последнем правительстве долго и серьезно готовил себя к испытаниям. Но, с другой стороны, кому ж, как не финансисту, было знать, куда все катится и к чему себя готовить?</p><p class="p1">— Вот что, — сказал Ватагин, когда Крюков запер дверь. — Никого не выдавать. Отвечать всем. Это, я полагаю, само собой понятно?</p><p class="p1">— Оставьте, — презрительно сказал Гротов. — Прошу не обсуждать больше это происшествие, оно не стоит того. Желательно, конечно, было бы отомстить по-настоящему, так, чтобы не откачали. Но индийская борьба запрещает брать на себя такие полномочия. — Он наконец сел на нары и замолчал, применяя практику полного расслабления. Ему нужно было сейчас совершенно опустошить голову и прогнать всякую мысль о том, что будет с ним завтра.</p><p class="empty-line"/><p class="p1">На рассвете загремели ключи, и сменившийся караульный рявкнул:</p><p class="p1">— Гротов! С барахлом!</p><p class="p1">Гротов заснул только под утро, а потому отозвался не сразу. Но Ватагин не спал. Он чувствовал себя смутно виноватым за то, что не он вчера положил конец мерзостям Изотова, хотя и был крупнее и сильнее всех в камере.</p><p class="p1">— Отвечать будут все! — заорал он. — Никто тебе не выдаст Гротова, хамская твоя рожа…</p><p class="p1">— Оставьте, говорю вам, — с раздражением бросил Гротов. — Мне неважно, куда выходить отсюда, лишь бы вон… Ничего они мне не сделают, живехонек их Коленька…</p><p class="p1">Гротов шел по коридору, подталкиваемый сзади незнакомым матросом, и ловил себя на странном, радостном чувстве: впереди была какая-никакая, но перемена. Со вчерашнего вечера он чувствовал себя свободным, и чувство это до сих пор не прошло, а только окрепло с рассветом.</p><p class="subtitle">29</p><p class="p1">Новый стиль съел тринадцать дней. Ять лег спать тридцать первого января, а проснулся тринадцатого февраля — и, узнав о переходе на европейский счет времени, поймал себя на тайной радости. Если бы от каждого зимнего месяца отнимать половину, жизнь стала бы куда переносимее.</p><p class="p1">В первый день нового стиля — день неуютный и ветреный, когда особенно не хочется покидать захламленную нору, — в дверь неожиданно позвонили. На пороге стоял Льговский — вот уж кого Ять не ждал.</p><p class="p1">— Я на минуту, — сказал он. — Зайдете завтра?</p><p class="p1">— На Елагин?</p><p class="p1">— Нет, мы уж теперь не на Елагином. Всякие события.</p><p class="p1">— Да зайдите, расскажите!</p><p class="p1">— Не могу, бегу. Адрес ваш дал мне Фельдман, он тоже просит быть. Открываем свою коммуну, хватит за старье цепляться. Те, на Елагином, совсем с ума сошли от страху. Им угодно на политике спекулировать, а нам угодно новую культуру строить. Думаем, что вам небезынтересно.</p><p class="p1">— Конечно, конечно, — сказал Ять. — Во сколько?</p><p class="p1">— В шесть, не опаздывайте. Молодых соберем… На открытии Борисоглебский будет. Знаете его?</p><p class="p1">— Слышал, — пожал плечами Ять. — Но ведь это бред… что-то там о введении новых букв? И потом, по-моему, он же ростовский…</p><p class="p1">— Уже питерский, — улыбнулся Льговский. — Волшебное совпадение. Я его у Чарнолуского встретил. Чудак, но наш: многое предсказал в своем Ростове. Я его «Орфографию будущего» как прочел — сразу понял, что иду в верном направлении. Заходите, послушаем.</p><p class="p1">— Буду, буду, спасибо. Да зашли бы, чаю…</p><p class="p1">— Не могу, бегу. — Льговский протянул ему ледяную красную руку и поспешно сбежал по лестнице. В Петрограде зимой восемнадцатого года он оставался одним из немногих людей, которым было куда торопиться.</p><p class="empty-line"/><p class="p1">Григорий Борисоглебский до реформы орфографии жил в Ростове и преподавал в гимназии. Система преподавания была своя, особенная, — как, впрочем, и все у него. Прежде всего, его не устраивало раздельное обучение. Лишь женская интуиция в сочетании с мужским расчетом способна была постичь двойственную суть вещей. Двуполы были все явления в мире, и постижение их с однополой, убогой точки зрения лишало мир цельности. Это, однако, было простейшей из реформ, и до нее рано или поздно должны были додуматься. Куда более порочна была сама идея раздельного преподавания всех дисциплин. Следовало создать единую науку наук, учение о мире, которое Борисоглебский называл универсологией, то есть всеобщим знанием о вселенной, — и обучать биологии, математике, физике и словесности в рамках одного курса.</p><p class="p1">Идея об отмене орфографии пришла ему не сразу: к тому моменту он два года уже преподавал в родной гимназии Красилова естественные науки и был даже любим гимназистами. Он казался им безвредным, временами скучноватым чудаком: вдруг принимался среди урока рассказывать о теории витализма — жизненной силы, пронизывавшей собою воздух, как некое животное электричество. Именно развивая эволюционную теорию о том, что общество отбрасывает условности и приближается к живой жизни, Борисоглебский и вывел, что одной из самых бессмысленных условностей является орфография. Написавши фразу «Асений ветир ганял па улитсе сухии листя», он все равно мог быть уверен в том, что его поймет любой русский и даже иностранец посметливее. Занявшись на досуге подсчетами, Борисоглебский выяснил также, что упразднение идиотического ера в конце слов (без которого сам он давно обходился даже при заполнении журнала, чего никто и не замечал по крайней непонятности его почерка), позволило бы сэкономить до пятнадцати процентов бумаги, затрачиваемой ныне на книгу; так мысль об упразднении гуманитарных дисциплин явилась ему во всем своем блеске. К двенадцатому году, когда вышла наконец его «Орфография будущего», по нелепому требованию московского издателя напечатанная в соответствии с отвратительной орфографией прошлого, он был уже своеобразной ростовской достопримечательностью. Жизнь главного врага сложных условностей была опутана сотнями условностей более низкого порядка: человек, отказавшийся соблюдать сложные ритуалы, обречен повиноваться простым. Борисоглебский не засыпал, не повернувшись с боку на бок строго определенное количество раз, и никому не позволял дотрагиваться до своей чашки и ложки.</p><p class="p1">Революция добиралась до Ростова медленно, ибо юг ленив и беззлобен. Городовых тут распустили только к апрелю, и не так, как в Питере, — со злобой настоящего разгона, — а скорее с благодарностью за беспорочную службу. О такой ерунде, как Временное правительство, Борисоглебскому думать было некогда — ничто временное его уже не интересовало. Он только что построил таблицу сходств кровяных телец с дальними звездами, причем предположение его блестяще подтвердилось — из новейших астрономических трудов, за которыми он как раз следил, было уже известно, что и звезды подразделяются на красные и белые, и выводы отсюда следовали грандиозные; деление на красное и белое (а не надуманное противоречие белого и черного) должно было определять мир. К сентябрю начались трудности с продовольствием. Следовало сосредоточиться Для последнего рывка, но мысли разбегались… разбегались. К зиме жена слегла, деньги были на исходе, никто не хотел работать. В октябре он закончил «Универсологию», на страшно опоздавшем поезде дотащился до Петрограда и принялся искать публикатора.</p><p class="p1">Потолкавшись по издательствам, Борисоглебский узнал ошеломляющие новости. Весь мир объединился, чтобы заглушить открывшуюся ему научную истину. В таких условиях нечего было и думать о справедливом вознаграждении за многолетние труды, о должном внимании к его системе, о публичных лекциях и просто о хорошем издании. Жизнь в Ростове выглядела куда сытнее — они все-таки ели и птицу, и донскую рыбу, а Петроград голодал и жил по карточкам, которых у Борисоглебского не было. В гостинице почти не топили. По улицам носились взбудораженные толпы, пару раз его чуть не затерли, притиснув к стенам… Он хотел было вернуться, но вернуться просто так не мог. Папка с перебеленной рукописью жгла ему руки. Ее публикация могла остановить безумие, все встало бы на место, и вместо этой дурацкой войны люди принялись бы наконец за изучение серьезного труда, — но один издатель сказал, что ему не до того, а другой просил оставить книгу на неделю, посмотреть. Знаем мы это «посмотреть» — сейчас же набежит питерская профессура и разворует идеи. Борисоглебский давал на просмотр несколько страниц из начала и середины и заставлял читать при нем. Эти невежи ничего не понимали. Мир куда-то катился и не желал слушать своего единственного спасителя. Кончались деньги. Он дал телеграмму жене, что скоро будет, и по пути с почты в гостиницу купил газету. Так он узнал, что орфография упразднена. Случилось это, как он понял, давно, еще пятого января.</p><p class="p1">— Как… что же это! — забормотал старик. — Это же моя, моя мысль! Все украдено!</p><p class="p1">Он беспокойно озирался по сторонам, снова и снова перечитывал газету (в которой не было уже половины нужных запятых), шевелил губами, топтался на месте. Шок был слишком силен. В декрете ни разу не упоминалось его имя. Надо было немедленно к кому-то идти, чего-то добиваться. Три дня он выяснял, кто в новом правительстве отвечает за науку, еще три дня передавал через матросов письма и записки, но никак не мог попасть к министру. В конце января началась катавасия с каким-то убийством, и только тридцатого Борисоглебский застал наконец министра (он назывался почему-то на французский манер комиссаром) на месте. Матросы сжалились над стариком и провели на четвертый этаж, в приемную с бильярдным столом.</p><p class="p1">— К вам, Александр Владимирович, — сказала бледная секретарша.</p><p class="p1">— Борисоглебский, — назвался старик за ее спиной.</p><p class="p1">— Борисоглебский?! — воскликнул чернявый молодой человек, вальяжно сидевший в кресле у комиссарского стола. — Вы здесь, вы не в Ростове?</p><p class="p1">Он вскочил и подбежал к новому гостю.</p><p class="p1">— Я давно здесь, — пробурчал старик. — Мне нужно видеть комиссара.</p><p class="p1">— Это я, — произнес приятный, но легкомысленный с виду мужчина лет сорока. — Я получил ваше письмо, товарищ Борисоглебский, и сожалею, что не мог вас принять сразу. Всю эту бюрократию искореним, дайте время. Прошу вас.</p><p class="p1">— Да вы знаете, кто это?! — радостно воскликнул чернявый. — Воистину — на ловца и зверь! Это же автор «Орфографии будущего», он первый высказал эту мысль!</p><p class="p1">— Вот видите, — еще шире улыбнулся комиссар. — А мы реализовали. Очень, очень рад.</p><p class="p1">— Это все так, — сказал Борисоглебский. — Однако второстепенно. Я закончил, видите ли, главную книгу свою. В сравнении с нею идея орфографии — частный случай, не стоящий внимания. Я полагал бы нужным эту книгу издать, и если мне за отмену орфографии причитается какой-то гонорар или вознаграждение, я не знаю, что у вас принято, — я просил бы мне ее выдать, эту сумму, потому что я издержался. Да, издержался. И я просил бы издать. Рукопись со мной.</p><p class="p1">— Вы где остановились? — учтиво спросил комиссар.</p><p class="p1">— Я живу в гостинице у Финляндского, в «Атласе»…</p><p class="p1">— И прекрасно! — повторял поклонник, представившийся Льговским. — Вы нам как нельзя кстати, как нельзя… Вы, Федоров и Мельников — отцы новой философии. Вы читали Федорова?</p><p class="p1">— Федоров — сумасшедший, — буркнул Борисоглебский. — Воскрешать покойников, заселять звезды… Есть еще один сумасшедший в Калуге, он тоже все про заселение звезд…</p><p class="p1">— Кто? Я не знаю, — заинтересовался Льговский. — Фамилию не помните?</p><p class="p1">— Да вот еще, буду я помнить всякую чушь. Комиссар вежливо рассмеялся.</p><p class="p1">— Ну, ничего. Перебирайтесь к нам. У нас футуристическая коммуна. Новая власть помещение дала, на Крестовском. Только что, на ваших глазах, окончательно решили вопрос. Ну, это знак, Александр Владимирович. Я говорил — случайным такое совпадение быть не может. Напомните мне ваше отчество, — обратился он к Борисоглебскому.</p><p class="p1">— Константинович, — мрачно ответил тот. Ему не нравилась вся эта суета, многословие — солидности не было. Свистульки, ничего не поймут. Для этих ли он тратил жизнь?</p><p class="p1">— Григорий Константинович тоже будет с нами. До завтра, до открытия, я его поселю у себя, а завтра переедем. Очень прошу вас быть.</p><p class="p1">— Буду, конечно, буду! — улыбался Александр Владимирович.</p><p class="p1">— Вам бы сразу с этого начать, — уже серьезнее сказал Льговский. — С футуристов. Вы свое сделали, теперь мы сделаем свое. Ну, спасибо, ждем завтра в шесть. Прошу, Григорий Константинович, — идемте ко мне, там обо всем и поговорим.</p><p class="p1">— Но рукопись, — не очень уверенно обратился Борисоглебский к комиссару.</p><p class="p1">— Завтра все и решим, — кивнул комиссар. «Свистульки, свистульки, — думал Борисоглебский, спускаясь по лестнице. — Черт знает что».</p><p class="p1">— Лучшего момента, чем сейчас, не найти, — обернувшись к нему, полушепотом сказал Льговский, спускавшийся впереди. — Вы понимаете, что пришло наше время? Сумасшедший, подумал Борисоглебский.</p><p class="subtitle">30</p><p class="p1">Крестовский остров, второй по величине среди невских островов, получил свое прозвание благодаря двум аллеям, крест-накрест его пересекавшим, и с начала века был особенно любим дачниками. Это был уж не город, а пригород — сырая, цветущая дачная местность, усаженная соснами и разгороженная на аккуратные наделы. Дачи тут были небогатые, двухэтажные, уютные; близ моста, соединявшего Елагин остров с Крестовским, выстроил себе летнюю резиденцию видный распутинец, чуть ли не правая рука всесильного самозванца, Алексей Прилукин.</p><p class="p1">Прилукин был личность известная, уважаемая и дружно ненавидимая. Его слова было довольно, чтобы погубить или вознести. Он любил поиграть в мецената, собирал у себя в летнем дворце изысканную публику, щедро угощал и сообщал на ушко сенсационные, большею частью выдуманные детали дворцового быта. Чего ради устраивает он свои сборища — не понимал никто, да Прилукин и сам не знал хорошенько. Может, желал добиться признания бывших коллег (он сам начинал как поэт, издал сборник «Вечерняя нега»), может, уставал от общества Тришки и его прихлебал, а всего вероятнее, смотрел на то, как петербургские литераторы уписывают его закуски, и думал, что какой бы дрянью все они его ни считали, а нет такого презрения, которое оказалось бы сильней алчности. Между тем у писателей была своя корысть — их интересовал колоритный, хоть и мелковатый тип, и потому Прилукин перекочевал в добрую дюжину тогдашних скандальных, романов; литераторский цинизм кого хочешь перециничит: ты думаешь, что используешь литератора, ан глядь — он уже использовал тебя.</p><p class="p1">Сбежал меценат таинственно: когда в семнадцатом ликующая толпа носилась по городу и искала, чего бы погромить, о Прилукине вспомнили почти сразу. Кинулись к нему — дверь заперта; взломали — никого. Между тем все в доме указывало на недавнее хозяйское присутствие, кое-кто из незваных гостей даже видел тень, мелькнувшую в окне… Прилукин, однако, исчез — как сквозь землю провалился. Больше о нем ничего не слышали. Получить наркомовское разрешение на переезд радикально-лояльной части елагинцев в покинутый дворец на Крестовском острове не составило труда. На другой день после раскола Льговский с Барцевым лично перетащили из Елагина дворца три буржуйки, еще шесть прислал комиссар, Барцев собрал дружественную молодежь, и двадцать седьмого января будущие крестовцы с благословения присутствующего тут же Фельдмана зашли в полуразгромленную дачу.</p><p class="p1">Они взялись за дело: наводили порядок, брезгливо выбрасывали хозяйское тряпье и начинали помаленьку сколачивать огромную «декорацию будущего», украсившую вход. Декорация была фанерная, по эскизу Митурина; часть деталей, выпиленных заранее, принес сам Митурин, прочее мастерили из прилукинской мебели. Льговский лично приколотил треугольник, клином входивший в круг: это футуризм (чье внеземное происхождение как бы подчеркивалось) раскалывал земной шар. Как раз такими — работающими, разгоряченными — застал их прибывший из Москвы Корабельников. Случись в это время на прилукинской даче сторонний наблюдатель, он из всех ее старых и молодых обитателей, по-своему не менее колоритных (карлик, богатырь-бородач, дворянин с молотком и долотом), выделил бы одного человека: высокого, костистого, очень худого, деловито, но с тайным торжеством командующего, что куда. Так победивший Люцифер распоряжался бы переустройством рая: победили, но никаких фанфар. Деловито: облака туда, солнце сюда. Ангелы, присоединяйтесь: побежденным мы не мстим.</p><p class="empty-line"/><p class="p1">А вот этого Ять не знал — он и думать не мог, что Корабельников в Питере. Перед ним был строгий, сдержанный человек — ничего от юноши, ни тени истерики; отличная лепка бритой головы, барашковая папаха, узкое коротковатое пальто черной грубой кожи. Прежде он ненавидел всех, кроме двух-трех ближайших соратников (и те вызывали у него приступы бешенства). Теперь он оценивал людей по единственному критерию: могут они быть полезны или обречены идти в переплавку. Новый Корабельников был ясно и недвусмысленно счастлив. И главное, у него были новые зубы.</p><p class="p1">Ять однажды увидел его рыдающим — он стоял в редакции «Сатирикона», читал какое-то письмо и истерически, со всхлипами плакал. Редакционные барышни не решались к нему приблизиться со стаканом воды и словом утешения. Ему было тогда чуть ли не двадцать два года. Ять смотрел на него со жгучим, но и высокомерным состраданием: он был почти уверен, что этот молодой человек, при всей своей хваленой мощи, так и сгинет от собственных крайностей, неряшливости, неухоженности и гнилых зубов. Теперешний Корабельников сам вел свой корабль и дюжину других, пристроившихся в кильватере.</p><p class="p1">Есть люди, с облегчением давящие в себе человеческое, как только тому начинает благоприятствовать эпоха, — и Корабельников, при всей душевной тонкости, был из их числа. Он готов был трижды оплакать участь врага, но с тем большей решимостью подписал бы ему приговор. Не случись Октября, он явно покончил бы с собой или свихнулся: о тупике кричала вся его лирика, действительно великолепная, но исчерпавшая себя за три года. Бешеная энергия, которую он научился развивать, могла направиться только на внешнее переустройство или на самоуничтожение. На его счастье, осуществился первый вариант. Многие удивлялись потом, как он умудрялся не спать по шесть ночей кряду, рисуя свои плакаты (никому, по совести сказать, не нужные): Ятя никогда это не удивляло. Все эти ураганы, которые в его «Океане» громоздили водяные горы и сносили с лица земли Чикаго, самумы нечеловеческих страстей по любому поводу — перестали наконец терзать его несчастную голову и устремились наружу; хорошо было, по крайней мере, что Корабельников мечтал не рушить, а созидать.</p><p class="p1">Он приехал без зова, по наитию, понимая, что история делается сейчас в Петрограде, которого он не любил и в котором неизменно проваливался. Москва его обожала, барышни носили на руках (и в панике бежали прочь, как только он пытался их невинное обожание истолковать по-своему и на первом же свидании предлагал разделить с ним ложе). В Питере его принимали иронически, в «Собаке» освистали, и даже питерские единомышленники с подозрением косились на эти московские эскапады. Тем не менее он примчался на каком-то поезде — шальном, вне расписания, — успел уже побывать в Смольном и предложить свои услуги, потом отправился к Льговскому и услышал от его тишайшей матери, робкой толстухи с базедовыми глазами, что Мишенька теперь будет жить на Крестовском острове. Льговский обожал мать и всегда держал ее в курсе своих перемещений. Корабельников нагрянул на Крестовский внезапно и был встречен дружными восторгами — открываемся, присоединяйся, — и тут же его главенство стало очевидным, а распоряжения стремительно принимались к исполнению. Жуя папиросу новыми, белыми, даже с оттенком синевы зубами (он вставил их в Москве еще в июле, но в Питере его видели таким впервые), он и сам что-то уже рисовал на стене, попутно успевая объяснять восторженной пухлой блондинке, как лучше повесить занавески. Одновременно он отвечал на расспросы Льговского о московских приятелях и выслушивал местные новости.</p><p class="p1">В углу бывшего прилукинского кабинета, который сейчас как раз расписывал Корабельников, сидел — точно для рифмы — тихий Мельников с лицом блаженного; глаза его были прикрыты, он улыбался, как китайский божок, и так же сомнамбулически покачивал головой. Иногда Корабельников ласково на него поглядывал. Мельникова принято было носить на руках, кадить ему и объявлять гением, — и Ять никогда не мог понять, делается ли это всерьез или в порядке дополнительного издевательства над публикой. Несчастный сумасшедший был, разумеется, ни в чем не виноват, но в стратегию футуризма это вполне укладывалось: пересмеивая все и вся, они запросто могли завести себе юродивого вождя. Не увидев даже, а почувствовав Ятя, явившегося чуть пораньше, в надежде расспросить Льговского о расколе, Мельников вскочил и поклонился. Ять протянул ему руку, Мельников вяло пожал ее и так же стремительно, бескостно сложился в углу, заведя глаза и продолжая раскачиваться.</p><p class="p1">— А, вы? Рад, — сухо сказал Корабельников. — К нам?</p><p class="p1">— Нет, я послушать. Меня Льговский позвал.</p><p class="p1">— Через час начнем. Вот, отнесите пока наверх, ждут, — он кивнул на только что дорисованный двумя бледными юношами плакат «Вырвем запятые из книг и пустим кометами!» Восклицательный знак они, судя по всему, решили пока пощадить. Ять беспрекословно подчинился, отнес плакат в бывшую столовую на втором этаже, где несколько девушек — явных гимназисток по виду — уже натягивали огромный кумачовый транспарант «Долой искусство жирных».</p><p class="p1">Там же, на втором этаже, сидел высокий старик в поношенном черном пальто. Он прижимал к груди толстый кожаный портфель и испуганно озирался, не понимая, куда попал и что от него требуется. Вероятно, это и был хваленый Борисоглебский. Ять поклонился ему и вернулся вниз. Навстречу, дружелюбно улыбаясь, поднимался Льговский. Он тащил фанерный щит, на котором поверх хаоса кое-как валявшихся русских и латинских букв был густо намалеван китайский иероглиф.</p><p class="p1">— А повеселей у нас будет, чем на Елагином. Правда? — спросил он, подмигивая.</p><p class="p1">— Фельдман тоже у вас живет?</p><p class="p1">— Да, на первом этаже. Он у себя пока, отдыхает. Скоро Соломин подойдет.</p><p class="p1">— Соломин — с вами? — поразился Ять.</p><p class="p1">— Еще как, — усмехнулся Льговский.</p><p class="p1">«Вот все крайности и сошлись», — подумал Ять, покачал головой и пошел прикурить у Корабельникова: кончились спички.</p><p class="p1">— Только курите на улице. Больше одного курильщика при Косте нельзя, — Корабельников заботливо кивнул на юродивого вождя, так и не открывшего глаз. На лице младшего футуриста читалось благоговение.</p><p class="subtitle">31</p><p class="p1">Импровизированный вечер по случаю открытия второй петроградской филологической коммуны начался в половине восьмого, когда подъехал все тот же Чарнолуский с подарками: три банки краски, огромный рулон кумача, баллон клея и три таинственные коробки, которые он вместе с шофером демократично помогал разгружать. Корабельников ласково приветствовал его. Чарнолуский, имитируя мальчишескую легкость, столь уместную в облике строителя нового мира, взбежал по лестнице на второй этаж, осмотрел столовую, вгляделся в иероглиф, кивнул, якобы все поняв, и с особенным вниманием воззрился сквозь пенсне на тропининский портрет Пушкина, повешенный вверх ногами.</p><p class="p1">— Это за что же вы его так? — поинтересовался он у Корабельникова.</p><p class="p1">— Это мы не его, — хмуро ответил тот, — а портрет. Самого бы мы распропагандировали, к нам бы ушел.</p><p class="p1">Чарнолуский усмехнулся и уселся во втором ряду.</p><p class="p1">Первым говорил Льговский, кратко объяснивший причины возникновения Крестовской коммуны. Несколько слов сказал Фельдман, «позволивший себе выразить надежду, что в горниле войны и социальных катаклизмов (слова „революция“ он старательно избегал) выкуется новое искусство, а без нового искусства не будет нового человека». Он был несколько растерян происходящим, но его успокоил Борисов. Сам Борисов говорил дольше — о крахе академической науки, о том, что филология без литературы мертва, что новая литература отвергает идею возврата к вчерашнему, а потому и ученые не должны отрываться от объекта своего исследования. Он выразил надежду (кивнув комиссару), что новая власть не будет препятствовать свободному самовыражению.</p><p class="p1">Выступление Корабельникова смутило Ятя. Он начал с того, что предостерег «милейшего Александра Владимировича» от поощрения свободного самовыражения. «Свободно самовыражается и вор в трамвае. Десять лет в русской литературе мертвые хватали живых. Сегодня надо закопать мертвых и помогать только новому искусству. Дядя Ваня, жующий на сцене свои страданьица среди раззолоченных декораций, — не просто трухлявое барахло, но такое же угнетение, как Романовы. Потом, в радостное и сытое время, любите что хотите и самовыражайтесь хоть на заборе. Но сейчас идет драка, драка живых с мертвыми, и поддерживать надо живых. Разговоры про свободу сейчас на руку тем, кто свободу как раз душил и хочет душить дальше. Я прошу прощения у Борисова, он хороший парень, просто не знает, что говорит. Он сказал тут, что филология должна быть с литературой. Вот пусть и слушается нас, литература — это мы. Мы из него эту академическую пыль выколотим, и он сам почувствует, насколько легче стало».</p><p class="p1">Борисов ухмылялся в бороду, но не возражал. Все это могло сойти за обычный эпатаж анфан террибля, однако Ять не склонен был умиляться. Он понимал, что Корабельников мстит всем, кто затирал и презирал его прежде, — и в этом не было бы ничего дурного, ежели бы он не апеллировал к государственной помощи.</p><p class="p1">— А теперь, — с места сказал Льговский в полной тишине, наступившей после корабельниковского рокота, — мы получим небывалую еще возможность выслушать величайшего социального мыслителя, чьи мечты сбываются сейчас. Мы, молодые (Ять особенно отметил про себя этих «молодых», довольно забавных в устах человека, стремившегося к солидности), возникли не на пустом месте. Были те, кто обгонял свое время и мыслил в иных категориях. Один из этих гигантов прошлого — автор «Орфографии будущего» Григорий Константинович Борисоглебский. Этот революционер в науке изложит нам сейчас свой взгляд на происходящее.</p><p class="p1">Никто не шелохнулся. Борисоглебский был погружен в размышления и по-прежнему сжимал портфель.</p><p class="p1">— Григорий Константинович! — повысил голос Льговский. — Мы вас слушаем!</p><p class="p1">Борисоглебский вскинул на него безумные глаза.</p></span>
