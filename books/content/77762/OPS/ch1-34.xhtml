<p class="p">От автора</p>
</div><p class="p1">«Орфография» — скорее опера, нежели роман, и потому требовать от нее исторической достоверности так же странно, как искать исторические ошибки или этнографические погрешности в «Хованщине» или «Чио-чио-сан». Автор не документалист, однако за некоторые частности может поручиться.</p><p class="p1">Всякий, кто жил в России в девяностые годы, не может не знать русскую революцию: есть вещи, типологически присущие всем пред — и постпереворотным эпохам. Накануне переворота чувствуешь восторг и напряжение, творческий подъем и несравненную причастность мировым судьбам; после переворота приходит черед разочарования и скуки. Все это очень похоже на любовный акт и многократно описано. Каждая революция порождает и раскол в среде интеллигенции, причем типологически все эти расколы тоже неотличимы: часть несчастной прослойки, свято веря в необходимость перемен или мечтая забежать впереди паровоза, устремляется сотрудничать с гегемонами — другая занимает консервативно-охранительные позиции, скептически относится к перспективе революционных перемен и в итоге всегда оказывается права. Оттепели нужны только для того, чтобы легитимнее выглядели заморозки; закономерность открыл великий мыслитель Луазон, и жаль, что за отсутствием такого мыслителя мне пришлось его изобрести.</p><p class="p1">Тем не менее в «Орфографии» не так уж много вымысла. Отмена русского правописания — пожалуй, единственное фантастическое допущение, которое я себе позволил и без которого, как выяснилось впоследствии, вполне мог обойтись. Это была своего рода первая ступень ракеты, неизбежно отваливающаяся при взлете, но необходимая для того, чтобы оторваться от земли. Что касается Ятя, то у этого героя был вполне конкретный прототип — Виктор Яковлевич Ирецкий (Ириксон), публицист «Речи», автор замечательных фантастических рассказов и нескольких романов, в которых чувствуется недюжинный талант в сочетании с несколько избыточным вкусом и тонкостью. Чтобы стать настоящим писателем, Ирецкому не хватало стихийной изобразительной мощи, способности к обольщениям и, может быть, чувства Родины. Этот вечный чужак, полуеврей, всех станов не боец, умер в эмиграции от туберкулеза в 1935 году (умудрившись, однако, уже после отъезда опубликовать на родине роман «Завет предков» — в России остались поклонники таланта Ирецкого, которые сумели выдать его роман, написанный на скандинавском материале, за произведение настоящего скандинава. Книга вышла в 1928 году, когда русскому эмигранту надо было непременно рядиться в благонадежного и дружелюбного викинга).</p><p class="p1">Гувер и Арбузьев тоже существовали, хотя их фамилии чуть изменены, а самому персонажу пришлось раздвоиться. Настоящего Губера хорошо знают в современной России благодаря довольно посредственной (уж никак не лучшей у него) работе «Арнжуанский список Пушкина». Арзубьев — его псевдоним в «Речи», под этим псевдонимом он опубликовал несколько замечательных интервью, репортажей и статью о русской орфографии, из которой я почерпнул кое-какие ценные сведения, — но полемика между двумя ипостасями скромного публициста Губера шла в гораздо более сдержанной форме, нежели между Гувером и Арбузьевым. С остальными прототипами все более-менее понятно, и, найдя уже постфактум множество подтверждений своим самым фантастическим вымыслам, я не поручусь сейчас, что Елагинская коммуна никогда не существовала. Как бы то ни было, именно 15 мая 1918 года Елагин дворец правительственным декретом был превращен в музей.</p><p class="p1">Есть прототип и у самой «Орфографии» — вся она, как выяснилось в процессе ее сочинения, представляет собой частью сознательную, а частью и бессознательную вариацию на темы романа Александра Житинского «Потерянный дом, или разговоры с Милордом» (1986). На этой книге, знаковой для моего поколения и очень важной для меня самого, прервалась традиция отечественного эпоса. В свое оправдание могу сказать только, что в этих случайных и неслучайных перекличках и заимствованиях мною руководило желание эту традицию возобновить — а начинать лучше всего там, где закончил ближайший и любимый предшественник.</p><p class="empty-line"/><p class="p1">Я был очень счастлив, пока писал эту книгу.</p><p class="p1">Самым большим счастьем было заканчивать ее в крошечной типографии Артека, а начинать — в Петербурге, в квартире Льва Мочалова. Я не написал еще ни строки и собирал материалы в публичной библиотеке. Каждое утро всезнающий Никита Елисеев, более известный как критик и менее — как библиограф, прикатывал мне на тележке огромные подшивки петроградских газет восемнадцатого года. За окном был июнь, летал тополиный пух, в читальном зале сидели девушки необычайной прелести. Иногда я уходил курить и изучал надписи в сортире Публичной библиотеки: на его стенах велись бурные, как в Интернете, споры о России, еврействе, либерализме и империи. В другом крыле Фонтанного дома (в этом дворце располагается теперь газетный зал Публички) шли занятия в музыкальном училище; время от времени до меня долетали фрагменты оперных арий, а иногда в воздухе рассыпались фортепьянные шопеновские каскады. Настенные споры о свободе и империи, летающий за окнами пух, который Мендельштам называл «погромным», и классические арии постепенно становились лейтмотивом «Орфографии», внушая мне мысль о ненапрасности моего труда.</p></span>
