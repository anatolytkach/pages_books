<span><p class="p1">— Не так, доктор! — попробовал возразить красноглазый, но уже без прежней язвительности. — Вы говорите «душевнобольной» — но мы говорим «иначе мыслящий»! Мыслящий, но иначе! Иначе мыслящие есть совесть того зажравшегося жиром общества, какое поглощает себя самое через отказ выслушать свою совесть…</p><p class="p1">— Спать! — рявкнул Зудов, и небритый гость, обмякнув, сполз по стене.</p><p class="p1">— Не беспокойтесь, — с улыбкой сказал Зудов. — Его накормят и отпустят — брать новых больных я не могу.</p><p class="p1">— Можно мне глянуть его мандат? — спросил Ять.</p><p class="p1">— Да, конечно. Он носит его в нагрудном кармане.</p><p class="p1">Ять брезгливо сунул два пальца в карман мятого серого пиджака, в котором по-прежнему разгуливал упразднитель зимы. Он развернул мятую бумажку. Подпись Чарнолуского была подлинная — Ять хорошо ее знал, да, признаться, и не сомневался. Чарнолуский всегда ценил революционное творчество масс.</p><p class="empty-line"/><p class="p1">Бредя к Клингенмайеру по солнечной, мокрой улице, замечая и детей, гоняющих обручи, и голубей, и глубокую небесную синь — все, чего не видел прежде, — он чувствовал несказанное облегчение, объяснить которое и сам не взялся бы. Никаких утешений он не получил. Но мать по-прежнему встречала его расспросами, мать ждала, мать существовала — существованием своим защищая его от окончательного одиночества, стоя между ним и смертью последней преградой.</p><p class="subtitle">7</p><p class="p1">Ночью прошел дождь, первый настоящий ливень в этом году; струи его звонко барабанили по окну, слышался плеск водостока, дважды пронесся Бог весть откуда взявшийся автомобиль, в тревожном свете фар мелькнули мокрые деревья и сверкнули зигзаги капель на стекле. Дождь знаменовал начало недолгого расцвета северной весны: мир был заново сотворен, омыт и запущен на новый круг. Ять просыпался трижды — а за окном все плескалось, лилось и шуршало; в приоткрытую форточку проникал свежий запах, скорее дачный, чем городской, — так пахнут только первые дожди. После этой ночи, похожей на ночь творения — бурной, вешней, зеленой, — настало утро, скучное, как всякое разочарование: новый мир за окном был совсем, совсем прежний. Ять долго стоял у окна в халате, медля одеваться, весь во власти апатии и тоскливого нежелания шевелиться, — и отвращение к себе вползало в его ум. Теперь, когда не было работы, главного из самогипнозов, придуманных человечеством, — пусть даже работы, нужной ему одному, — бессмысленность собственного существования была Ятю очевидна. Он понимал и то, что разговоры о смысле жизни бессмысленней всякой жизни, ибо для раздачи рецептов и расстановки оценок следовало подняться над человеком — а это не в человеческих силах. Он ненавидел всех, кто присваивает себе право судить, и первый отвернулся бы от того, кто посмел бы назвать его жизнь пустой, — но сам-то он имел право сказать себе, что не воспитал сына, не вырастил дерева, не выстроил дома (и слава Богу — такой дом наверняка не простоял бы и получаса), не накормил голодных и не утешил страждущих. Жизнь протекла в никуда.</p><p class="p1">Ять читал о чем-то подобном — это называлось кризисом середины жизни, — но так привык отличаться от остальных, что никогда не применял к себе общих правил. Ему иногда казалось, что он и физически устроен совершенно иначе: придет час — вскроют и отшатнутся. Тем не менее это был типичный кризис середины — осознание несомненной, возрастающей трудности прогресса и ничтожности практического результата; он давно привык смотреть на себя нелюбящим взглядом, и зрелище, открывшееся ему серым апрельским утром, было непривлекательно.</p><p class="p1">Этот первый приступ самоосуждения был так силен, что пять минут, спустя Ять уже пожалел себя. А кому же и жалеть меня, как не мне! Господи, если бы я встретил такого человека, как я, — как я любил бы этого человека! До чего я дошел к тридцати пяти годам! Не сегодня-завтра придется забирать к себе мать — куда я ее заберу! Сделался безработным приживалом, который за пищу и кров расплачивается альмекской дудкой; серьезный прогресс, нечего сказать. Проскользил по жизни, как бледный бес из запоминалки: редькой с хреном пообедал — хрен оказался редьки не слаще; ничем не насытился и не прельстился. Даже и родине, вовсе мне не безразличной, толку от меня с гулькин нос. Впрочем, родина давно уже была где-то отдельно. По другой стороне Зелениной тащился одноногий инвалид на костылях, рожа у него была красная и помятая (вообще, ужас, с какими рожами ходят теперь по городу); мимо окна проскакала на одной ножке белобрысенькая девочка с крысьим рыльцем, радостно передразнивая инвалида, — девочки тоже стали такие, что Господь не приведи; никого пожалеть не получалось. Неужели он один оказался не нужен! — помилуйте, да ведь и елагищы с крестовцами ровно в том же положении, даром что первые «против», а вторые «за». Одних подкармливает государство — других содержат спекулянты, но сами по себе ни те ни другие никому не нужны, как и предмет их изысканий — русский язык, дошедший ныне до уровня глумкой плешти. Почему я до сих пор не с ними, хотя пайком своим и крышей над головой они обязаны в конечном счете именно мне — да, да, не будем прятаться хоть от одного убогого благодеяния, к которому я подтолкнул растерянную власть. Какой ложный стыд мешал мне сунуться туда с самого начала! Казарин небось не постыдился — правда, он теперь и заплатил за это, ну так и я заплачу сколько потребуется…</p><p class="p1">Он отошел от окна и принялся быстро одеваться, собирать постель и скатывать тощий матрас. Клингенмайера еще не было — ладно, зайдем позже, попрощаемся. Ять вышел и, чувствуя во всем теле необычайную легкость, происходившую частью от голода, а частью от принятого наконец решения, направился к островам. Куда идти — он знал с самого начала: как ни хорош Хмелев, а быть в одном лагере с Казариным Ять не жаждал. Надо было попробовать пожить с крестовцами, они звали. Кубов, конечно, рисовать не стану, на демонстрации я смолоду не ходок, но почему не очеловечить новую власть, коли есть надежда!</p><p class="p1">Больше всех обрадовался Краминов. Впрочем, приветливо улыбался и Барцев; Корабельников сдержанно предложил занять комнату Льговского, месяц назад освободившуюся, и начались три веселых дня Ятя в Крестовской коммуне, она же ЕПБХ.</p><p class="empty-line"/><p class="p1">Да, это были веселые дни, и вспоминал он их всегда с удовольствием — особенно по контрасту с последующим пребыванием у елагинцев, ничем не занятых, а все чего-то ждущих. В Елагинской коммуне филологи давно забыли о том, что они филологи, и жили единственно надеждой на то, что государство их раздавит, — в Крестовской кипела жизнь, и за три дня Ять успел чрезвычайно много.</p><p class="p1">Он выслушал специально для него разыгранные фрагменты корабельниковской мистерии, посетил занятия эквиритмическим танцем (среди учениц Марьям-нагой были прехорошенькие), высидел, хоть и не без труда, вечер Мельникова — не дочитавшего до конца ни одного из своих бесконечных путевых стихотворений, своеобразных и однообразных, как степь; поел энергийной пищи нового типа, которую юный химик Дранкин изготовлял из березовой коры, уверяя, что именно так будут питаться в будущем, — была у Дранкина целая теория насчет того, что полезна только растительная еда, причем предпочтительна весенняя: ростки, почки, содержащие в себе небывалый заряд витальности. Ять поприсутствовал на докладе Краминова о кризисе филологии и о новом подходе к анализу текстов; метод был статистический, в духе Льговского, но забавный, и многое искупалось страстностью изложения. Он понаблюдал за работой над «Окнами» и лично раскрасил по трафарету нескольких немцев и буржуев — по распоряжению Корабельникова их всегда делали буро-зелеными. Ему чрезвычайно понравился доклад экономиста Манцева «Долой деньги», в котором как дважды два доказывалось, что деньги будут совершенно уничтожены во всероссийском масштабе через два года, а в мировом — не позже как в 1929 году. Ять с трудом сдерживался, чтобы не рассмеяться во время доклада, и отхохотался в кулуарах. Почему-то, кроме него, смеялся один Митурин — вообще симпатичный художник, хоть и несколько угрюмый с виду; у него и буржуи на плакатах выходили обаятельными.</p><p class="p1">Познакомился Ять и с пресловутой парочкой — Драйберг и Камышин оказались вовсе не так отвратительны, как предупреждали крестовцы. Это были тихие и почти безобидные шпионы, не обратившие на Ятя никакого внимания — на лбу у него, что ли, написано, что он не способен ни к каким решительным действиям? Естественно, они слушали все доклады и, почти не стесняясь, делали пометки в своих одинаковых черных гроссбухах; естественно, регулярно наведывались в Смольный и возвращались оттуда с папиросами, а один раз на извозчике привезли три ящика французских рыбных консервов — вероятно, с какого-то реквизированного склада. Рыбу ели все, кроме Корабельникова, — тот отказался, угрюмо буркнув, что нынче не до разносолов. Корабельников, кстати, сильно сдал: он похудел, под глазами залегли тени, и сходство его то ли с безжалостным коммунистическим демоном, то ли с падшим буржуазным ангелом все усиливалось. Тут был свой парадокс — конструкционист, враг всяческого декаданса, бредящий электрическою машиной и прагматической организацией труда, он с каждым днем обретал все более декадентские черты и, кажется, даже понюхивал кокаин — ничем иным его круглосуточную лихорадочную деятельность было не объяснить. Спал он, кажется, два часа в сутки — возле печки, сунув под голову бревно, все в той же мастерской, где рисовал плакаты. Иногда у него случались вечера, на которые сбегались, увы, не матросы, которых он желал бы видеть в зале, а те самые курсистки, которых он презирал и которые составляли аудиторию всех его былых соперников. Черта ли было ему в курсистках? Он нарочно читал им самое страшное, то, что перло из него иногда бессонными ночами, — как он сделал бы чашу из черепа возлюбленной или дудку из ее позвоночника. Беспрерывное, хоть и не осознаваемое насилие над собой аукалось наконец в стихах сущей вакханалией садизма — и эти-то стихи были едва ли не лучшими из всего, что он написал. Утопии выходили хуже — Ять выслушал главу из поэмы о будущем, в которой все питались молоком, выдоенным из облаков, а жилища сверкали, как операционные, — в стихах тоже что-то было операционное, клацающее; есть поэты, рожденные писать об одном страдании, о непрерывном насилии — и Корабельников был из их числа: радость в его стихах была такая, словно героя долго воспитывали коваными сапогами: радуйся, радуйся!</p><p class="p1">Ять, быть может, и дольше прожил бы этой веселой жизнью, не слишком сытой, но насыщенной. У него завелся даже легкий, не лишенный перспективы роман с прелестной носатой армянкой Маркарян, влюблявшейся во всех по очереди, и они даже прогуляли полночи вокруг прилукинской дачи, — но все это время он ни на секунду не переставал про себя посмеиваться, отлично понимая, что лучше уж приживальство и тотальное неучастие, нежели осмысленное, серьезное пребывание в рядах Крестовской коммуны. Крестовская была заведением невыносимо комичным; и она несомненно представляла бы опасность, если бы не ребяческая наивность всего, что в ней происходило.</p><p class="p1">Сюда стеклись, сползлись, сбежались все непризнанные авангардисты Петрограда, здесь излагались безумные прожекты и разрабатывался небывалый государственный строй, здесь резвилась молодежь, абсолютно не понимающая природы русского политического переворота, уверенная только в том, что Россия помолодела, — тогда как она на глазах впадала в детство. Крестовцам будущее рисовалось в виде технократической утопии, близкой к прожекту об упразднении зимы: освободившись от гнета любых социальных отношений, человек начинал летать, материализовать еду силою взгляда и выключать солнце во время засухи. В этом будущем место было только тому исключительно трудоспособному альтруисту, у которого личных запросов не могло быть по определению; можно догадаться, почему такая жизнь сделалась оптимальна для Корабельникова, отвергнутого любовника, в ответ отвергнувшего быт, — но трудно было вообразить хотя бы троих подобных мучеников, ангелов или демонов, способных радостно влиться в царство лучистой абстракции, которое так убедительно рисовал лучист Илларионов. Однако Ять выдержал бы и это — не ввались на четвертое утро Краминов и не сообщи задыхающимся фальцетом, что «эти идиоты взяли Ловецкого».</p><p class="p1">В столовой на первом этаже сидело всего человек шесть — обитатели прилукинской дачи по-прежнему предпочитали есть в своих комнатах. Корабельников и Соломин, впрочем, каждое утро спускались вниз и трапезничали вместе — молча, ибо говорить им давно было не о чем. Поп временно отбыл в поездку по окрестностям Петрограда, и Ять так и не успел насладиться его беседой. С Соломиным Ять едва кланялся. Кроме них, пшенную кашу, называемую в коммуне «кирзовой», поглощали иссохший, прозрачный от слабости Фельдман, молчаливый Теремных и крестьянский поэт Конкин, тип отчаянно неприятный, неряшливый и все время улыбающийся щербатой улыбкой отъявленной шельмы.</p><p class="p1">— Ловецкого? — шелестящим шепотом переспросил Фельдман.</p><p class="p1">Ловецкого Ять хорошо помнил — именно он устроил когда-то — Бог весть, всерьез или шутки ради — безобидную провокацию с историей чихачевской мануфактуры; о чтении его рукописи Ять и теперь вспоминал с усмешкой.</p><p class="p1">— Как? Когда? — вскинулся он.</p><p class="p1">— Сегодня ночью… Господи! Что они творят! Нельзя же с таким тупым упорством рубить единственный сук, на котором держишься… Идиоты, несчастные идиоты! Нашли с кого начинать.</p><p class="p1">— Их давно пора разгонять, — отчетливо сказал Корабельников.</p><p class="p1">— Оставь, пожалуйста! — отмахнулся Краминов. — Тысячу раз обо всем этом переговорено…</p><p class="p1">— Дураку тысячу раз скажи — все мало.</p><p class="p1">— Если их разогнать — для чего мы?</p><p class="p1">— А ты ради них тут сидишь? — с интересом посмотрел на него Корабельников. — Забавно…</p><p class="p1">— Наше дело спорить, мы для этого созданы, — не обращая внимания на его ехидство, продолжал Краминов. Он так и стоял в дверях столовой, опираясь о косяк, в негодовании тряся головой и заводя глаза. — Человек культуры может и должен спорить с другим человеком культуры; но когда в их полемику ввязывается обезьяна… Да он умный, изумился Ять. Он дело говорит.</p><p class="p1">— Мы до того доспоримся, что немцы возьмут город, и твои дорогие оппоненты понесут им на блюдце список революционеров, — мрачно предсказал Корабельников. — И те, которые больше всех миндальничают, будут там первыми.</p><p class="p1">— Лучше мне быть в этом списке, чем в списке расстрельной команды… Ах, и что сейчас спорить об этом?! Сейчас надо спорить о том, как достать его оттуда. Пойми, ведь если их действительно разгонят — значит, нам тоже надо немедленно расходиться…</p><p class="p1">— Лично я никуда расходиться не намерен, — буркнул Корабельников. — А ты можешь проваливать на все четыре стороны, следом за господином Льговским, который так любит чистоту…</p><p class="p1">— Ты тут один останешься, Саша.</p><p class="p1">— Я и до этого был один, и ничего, не умер.</p><p class="p1">— Нет, погодите, — желая предотвратить еще один раскол, влез Ять. — Погодите друг друга гонять, давайте сначала разберемся… За что его взяли? Он же из самых безобидных… Это может быть и ошибкой, в конце концов…</p><p class="p1">— Никакой ошибки, его вызвали на Гороховую. Он оттуда протелефонил в «Путь», чтобы не ждали, — у него там встреча была. Хорошо хоть разрешили сделать звонок.</p><p class="p1">— Ты-то откуда знаешь? — ехидно поинтересовался Корабельников. — Тоже, что ли, в «Путь» бегаешь?</p><p class="p1">— А что, я уже должен тебе отчитываться?</p><p class="p1">— Да нет, на здоровье. Может, ты и в Елагин похаживаешь за мармеладом?</p><p class="p1">Краминов сморщился, как от зубной боли, и вышел. Соломин продолжал невозмутимо уплетать пшенку.</p><p class="p1">— А вы действительно хотели бы разгона елагинцев? — спросил его Ять.</p><p class="p1">— Государство обязано уничтожать своих врагов, если не хочет, чтобы они его уничтожили, — пожал плечами красный барин.</p><p class="p1">— Так-таки уничтожать?</p><p class="p1">— Во всяком случае, не опускаться до полемики. Если люди явно хотят, чтобы их арестовали, — почему государство должно отказывать им в такой невинной просьбе? Русская интеллигенция обязана избавляться от остатков террористического сознания, — он царственным жестом отодвинул тарелку. — Это роковое заблуждение — что нельзя быть солидарным с властью. Если власть истребляет чуму, я, естественно, буду на ее стороне.</p><p class="p1">— А когда она задумает истребить вас, кто будет на вашей?</p><p class="p1">— Если я начну мешать России, дай Бог, чтобы у нее хватило духу расправиться со мной.</p><p class="p1">— Хватит, непременно хватит! — заверил его Ять. — Тем более что с точки зрения государства вы такой же микроб — только не чумы, а, скажем, холеры.</p><p class="p1">— Это ваше мнение, — ледяным тоном подчеркнув «ваше», Соломин прекратил спор. — Но позвольте вам заметить, что мы тут дело делаем, а потому споры неуместны. Если уж вы пришли в чужой монастырь, надо соблюдать его устав, а не обсуждать нравственность монахов…</p><p class="p1">— Николай Константинович, пожалуйста, не нужно таких аналогий! — тихо предупредил Фельдман. — Этот господин — давний член нашего Общества, и у него ничуть не меньше прав пребывать в нашем монастыре, нежели у вас. Не нужно все время подчеркивать, что вы занимаетесь делом… Я вот не занимаюсь никаким делом, кроме изучения новых слов в русском языке, однако вы не указываете мне на дверь…</p><p class="p1">— Вы тут с самого начала, — отрезал Соломин. — Вы были у истоков раскола. Ваш выбор был трудней. Очень легко сейчас сюда прийти, когда ясно, на чьей стороне сила. Но в январе это было вовсе не так очевидно, и тогда к нам примазываться отнюдь не спешили…</p><p class="p1">— Не беспокойтесь, господин Соломин, я уйду немедленно, — поднялся Ять. — У меня нет ни малейшей охоты примазываться к вашему победившему делу…</p><p class="p1">— Сидите! — рявкнул Корабельников. — А вы, Николай Константинович, не берите на себя слишком много…</p><p class="p1">Соломин воззрился на него в крайнем изумлении.</p><p class="p1">— Но вы сами только что чуть не выгнали Краминова!</p><p class="p1">— Краминов — мой друг, и я имею право с ним говорить, как хочу. Ять пришел как гость, он с нами недавно, у него есть право заблуждаться… тем более что мыслит он в правильном направлении…</p><p class="p1">— Должен вас разочаровать, Александр Александрович, — покачал головой Ять, — я мыслю без всякого направления, и это совсем неправильно, по-вашему говоря. Я все равно ушел бы — не сегодня, так завтра. Решительно не могу оставаться ни в одном клане дольше трех дней — и знаете, чем дольше я с вами живу, тем больше разуверяюсь в вашем деле. Спасибо, конечно, за приют, но классовая теория, кажется, отчасти верна. Мне надлежит сейчас быть с моим классом… и уж по крайней мере с теми, кого сейчас арестовывают.</p><p class="p1">— Это в чем же вы успели так разочароваться? — с неприкрытой злобой спросил Корабельников, вставая. Видимо, после бегства Льговского и выдворения Лотейкина приход Ятя был в его глазах хоть и небольшим, а все-таки козырем: всякий новый боец был в цене.</p><p class="p1">— Извольте, я объясню. Потерпите, потерпите, господин Соломин. — Ять видел, что аристократ разозлился всерьез. — Нельзя же, в самом деле, вот так уйти, не отблагодарив за гостеприимство. Вы все по-своему превосходные люди, и утопия ваша — тоже по-своему — чрезвычайно привлекательна. Но рассчитана она, к сожалению, на тех прекрасных особей, которых не бывает. Вам нужен новый человек…</p><p class="p1">— Мы создадим нового человека!</p><p class="p1">— Не трудитесь, Господь уже поработал. Никакого другого человека нет и быть не может, массовая переплавка рода человеческого — задача неблагодарная. Строй, который вам мечтается, исходит из идеального представления о человечестве, — но тем яростней придется вам истребить всех, кто этому представлению не соответствует, и закончится таковое истребление тем, что вы в самом деле останетесь в одиночестве. Зато для всякого рода подонков ваш строй открывает широчайшие перспективы, — я, разумеется, не имею в виду никого лично, хотя, если кто-то примет оскорбление на свой счет… Соломин грозно засопел. Корабельников жестом остановил его.</p><p class="p1">— Продолжайте, интересно.</p><p class="p1">— Так вот, как всякий строй, исходящий из идеальных представлений, он будет удобен прежде всего мерзавцам, — Ять со вкусом выделил последнее слово. — На Елагином острове в человека не верят — и потому хотят его закрепостить до полной животности; у вас в человека слишком верят — и потому хотят раскрепостить до полного зверства. Всех, кто не соответствует вашему идеалу, всех, кто воспользуется свободой для нерегламентированного творчества и бесконтрольного воровства, вы обречены выжигать каленым железом — идеалисты всегда так кончают. Никакие запретители не перерезали столько народу, сколько честные идеалисты из святой инквизиции. Вы отлично знаете, что пролетарий воспользуется свободой никак не для того, чтобы доить облака. Трех дней довольно, чтобы понять, чем вы кончите; разумеется, в основе своей все это очень благородно… но я привык думать о людях чуть хуже, чем они есть, — чтобы при столкновении с ними быть чуть милосерднее. Я ответил на ваш вопрос?</p><p class="p1">— Ответили, — закуривая папиросу, глухо пророкотал Корабельников. — С вами все ясно, господин Ять. Пусть, значит, свинья лежит в своем болоте — так? Пусть человек остается ходячей фабрикой нечистот — так? Ваша бы воля — обезьяна никогда бы с дерева не слезла… Жаль, очень жаль, господин Ять, — закончил он грозно. — У меня были основания думать о вас получше…</p><p class="p1">— А уж мне-то как жаль, — признался Ять. — Мне в самом деле было у вас прекрасно. Мне страшно за вас будет, когда вы все поймете сами. Это может обернуться серьезным кризисом — приходите ко мне тогда, я, кажется, специалист по чужим кризисам, поскольку не вылезаю из собственного…</p><p class="p1">— Это не кризис, Ять, — услышал он знакомый басок. В дверях стоял Борисов. — Все правильно. Прости, Саша. Я тоже больше не могу.</p><p class="p1">— Ты?! — опешил Корабельников. — Ты?! Но ведь с тебя все и заварилось…</p><p class="p1">— Кто же знал, что так кончится. Знать бы, где упадешь, — соломки бы подстелить.</p><p class="p1">— И куда ты теперь? К Льговскому?</p><p class="p1">— Зачем же к Льговскому, — удивился Борисов. — Я к товарищу Чарнолускому. Надо бы прежде всего узнать, за что Ловецкий сел. А потом… потом к себе — квартира, Бог даст, цела.</p><p class="p1">Ять посмотрел на Борисова с немой благодарностью — он отвык от того, что с ним были согласны.</p><p class="empty-line"/><p class="p1">Так начался третий, предпоследний этап в истории Елагинской коммуны, который в ее истории, будь она когда-либо написана, получил бы название миграционного. Он ознаменовался переходами с одного острова на другой небольшой колеблющейся группы, которую возглавлял Борисов. В свое время один из пионеров русской, а впоследствии и нерусской социологии предлагал для прекращения полемики об оптимальном русском пути разделить любезное Отечество по линии Уральского хребта — на условный Восток и условный Запад, расселив по обе его стороны столь же условных славянофилов и западников. От серьезного рассмотрения этого проекта, который позволил бы определить истинную природу России и выбрать для нее идеальное будущее, его остановило только одно соображение: основным занятием всего населения России при таком положении дел немедленно станет кочевье из Сибири в Европу и обратно. С 25 апреля 1918 года бывшая Елагинская коммуна в буквальном смысле заходила ходуном, совершая в иной день по два бесповоротных перехода на сторону противника.</p><p class="subtitle">8</p><p class="p1">— И все-таки, — упрямо повторил Ять, — вы делаете мертвое дело, Николай Алексеевич, и это мешает мне взять вашу сторону, при всей нашей общественной и, смею думать, человеческой близости.</p><p class="p1">— Ну так зачем вы здесь? Милости прошу! — в последнее время Хмелев вскипал мгновенно.</p><p class="p1">— Мы не должны утрачивать способности к диалогу, в конце концов! — вступил наконец Борисов. — Ведь это черт знает что, простите меня! Не вы ли, Николай Алексеевич, сами всю жизнь предостерегали нас от сектантства в науке! Ведь от нашего противостояния не выигрывает никто, а силы тратятся на позорную, на мелочную борьбу…</p><p class="p1">— Вам она кажется позорной и мелочной, потому что вам где-то в светлых далях рисуется всеобщее единение, — прервал его Алексеев. — А мне в этом вашем будущем нет места, да и вам нет, только вы себя наловчились утешать…</p><p class="p1">— Кстати, Ять, — заметил Долгушов. — Вы вроде и дело говорите — что можно иногда через себя переступить… будущему послужить… Я, знаете, печальную вещь заметил: кто через себя переступит, для того уж другие — пустой звук! Через себя! — важно повторил он. — Ведь для человека, почитай, ничего страшней нет. Самоубийство — грех хуже убийства: не на чужого посягнул — на родного, можно сказать! Думаете, что сейчас через себя переступите, а потом ведь так и начнете по головам шагать…</p><p class="p1">— Это все умственные игры, — покачал головой Ять. — Видите ли, я по всем критериям должен быть с вами… хотя бы потому, что вы гонимы… но не могу, не могу — потому что мешает мне это проклятое интеллигентское комильфо! Быть любой ценой против власти, ненавидеть власть, подкусывать власть…</p><p class="p1">— Да ежели власть бандитская! — воскликнул Стежкин.</p><p class="p1">— Тут, положим, не так все просто. Видите ли, есть страшный соблазн, главное обольщение — которое уж вам-то ведомо: я говорю о соблазне лояльности. Она в России всегда — именно соблазн, с тех самых пор, как интеллигенция себе присвоила полномочия совести. Но надо ведь понять, что без единства мы никогда не выберемся из ямы…</p><p class="p1">Этот спор уже третий час тянулся в красной гостиной, где возвращенцы пили чай с сухарями и тщетно внушали елагинцам мысль о единении. Извольского, по счастью, не было — убежал по своим темным ночным делам, — и твердокаменных елагинцев представляли Хмелев, Алексеев, Стежкин и Долгушов. Хотел зайти Казарин, но он был совсем плох в последнее время — или попросту видел безнадежность спора, — а потому обходились пока без него.</p><p class="p1">— Бывают обольщения, — продолжал Ять, — которые по крайней мере плодотворны. Если придется благословлять жертвоприношения, я первый в ужасе убегу…</p><p class="p1">— А сейчас вам не видно, что к чему идет?! — поинтересовался Алексеев.</p><p class="p1">— Ну, если туда идет — так, значит, другого пути и не было. В любом случае надо думать о том, на кого мы страну оставим, а не о том, комильфо нам или не комильфо сойти наконец с баррикад…</p><p class="p1">— Я, кажется, понимаю, что вы, Ять, хотите доказать. — Хмелев посмотрел на него остро и пристально, как медик перед решительным диагнозом. — Вы хотите сказать, что раз они победили, так других и не было. То есть все действительное разумно. И если нет у них альтернативы, так, значит, есть за ними и правда, — верно я говорю?</p><p class="p1">— В общем, верно, — задумчиво согласился Ять, привыкая к новой формулировке; всегда трудно узнать свои взгляды в чужом изложении. — Но что поделать, если ответственность за Россию в конечном счете взяли на себя именно они!</p><p class="p1">— За уничтожение России, хотите вы сказать, — вставил Стежкин.</p><p class="p1">— Уничтожения никакого я пока не вижу, вижу попытку выбраться из войны и начать наконец заново строить страну. Без некоторого ограничения свободы этого, боюсь, не получится. Мы слишком долго требовали себе свободы, только свободы… Помните кружок Сокольниковой? И вот за право Сокольниковой болтать, простите, либеральный вздор вся страна должна лежать в руинах, за которые, между прочим, ответственны никак не только большевики. Я догадываюсь, если угодно, вот о чем: Россия не может быть ничем иным, как империей. В этом мы, кажется, все согласны?</p><p class="p1">— Положим, — кивнул Хмелев.</p><p class="p1">Они, конечно, будут строить империю, — продолжал Ять, — к этому идет все. Сами они этого пока не понимают и говорят о свободе, но Корабельников, кажется, уже догадывается… и не очень возражает. А Соломин со своим попом давно поняли, куда все катится. Что же вас останавливает от сотрудничества с этой властью? Ведь и вам, Николай Алексеевич, либералы отвратительны, и вам, Владимир Александрович, — он кивнул Алексееву, — это казалось еврейской прерогативой — свободная печать и прочие глупости…</p><p class="p1">— Но газеты закрывать я сроду не призывал, — буркнул Алексеев.</p><p class="p1">— Ну вот, а они закрывают. Так что если у вас и есть основания их ненавидеть — то разве за то, что они немного радикальнее… и осуществляют то, о чем монархисты не смели и мечтать.</p><p class="p1">— Именно! — вскочил Хмелев. — Тут-то я вас и поймал: именно! Мы и думать не смели о том, что примутся осуществлять они. Ибо не любой же ценой возрождать империю и не в любой же империи я согласен жить! Если для спасения России, какой она вам видится, нужен отказ от грамотного письма, — в этой хамской стране мне делать нечего!</p><p class="p1">— Но погодите, будет и грамотное письмо! — попытался урезонить его Ять. — Будет и новое усложнение, это же вещь стадиальная…</p><p class="p1">— Вы на рожи, на рожи их посмотрите! — кипятился Хмелев. — Вы думаете, за ними может быть историческая правда? Да что это за представление об исторической правде: подошел к вам ночью бандит, вынул нож, а то и без ножа обобрал, просто потому, что он сильней и моложе! Не было альтернативы бандиту, за бандитом историческая истина, он перераспределяет собственность, а потому поступает правильно… Что это за мерзкая готовность оправдывать всякое насилие над собой — предательская, я скажу, готовность! Вы же не одного себя предаете, Ять, вы ремесло, правду, грамоту свою предаете, по первому требованию соглашаясь упраздняться!</p><p class="p1">— Видите ли, — улыбнулся Ять, — я так давно понимаю, что меня не должно быть… Я живу с этой мыслью, как-то привык…</p><p class="p1">— Ну, а меня увольте от такого привыкания. Я — за Россию, за цельную и великую Россию, но не за Россию любой ценой. Лучше ей погибнуть, нежели выродиться.</p><p class="p1">— Пускай мир погибнет, а я буду прав, — кивнул Борисов.</p><p class="p1">— Ну, а вы-то, вы-то! — не выдержал Алексеев. — Вы на что надеетесь? Вы что, хотите их облагородить, очеловечить, вымыть? Научить манэ-эрам? Да ведь когда наводнение, то Неве неважно, друг милый, за нее вы или против нее… Она вам островка не оставит для проповедей и научных занятий. Когда наводнение, надо дамбу строить или лодку искать, а не думать, что в этом историческая справедливость…</p><p class="p1">— Если пять поколений разрушали дамбу, — улыбнулся Ять, — что ж ее строить заново? Может, имеет смысл построить новый город? Это в любом случае, знаете, осмысленней, чем кричать, что вода мокрая…</p><p class="p1">— Да неужели вы сами не понимаете, что это безнравственно, без-нрав-ствен-но! — взвился Долгушов. — Ни во что не верить, ни к кому не присоединиться… ходить оттуда сюда…</p><p class="p1">Вместе с Ятем неустанно мигрировала, словно сшивая острова, небольшая компания переселенцев, не находивших себе места ни на Елагином, ни на Крестовском. Переговоры, однако, ни к чему не вели, миграция становилась все бессмысленнее, а запас аргументов иссякал.</p><p class="p1">— Да оставьте вы, господа! — озлился Ять в полном соответствии с теорией Луазона, что борющиеся обязаны уравниваться. — Сколько можно с нравственной точки зрения интерпретировать то, что есть и не может быть иначе?! Нет правоты в истории, нет, это такое же холодное царство, как мир насекомых или минералов! Нет никакой правоты, а есть система предрассудков: орфография, родина… Либо о репутации заботиться, либо дело делать! Мне до репутации дела нет, просто в силу собственных моих предрассудков я перехожу к тем, кому хуже. Мне это диктует собственное чувство, которое я не рискнул бы назвать нравственным; это мои предрассудки — быть со слабейшими, но я не претендую на святость и не прилагаю моральных категорий к тому, что от них не зависит…</p><p class="p1">Они, как всегда, не доспорили — в красную гостиную тяжело ввалился Барцев.</p><p class="p1">— Прошу прощения, — запыхавшись, произнес он. — А у нас Краминова взяли. Сейчас матушка его пришла, рассказала. К ним с обыском пришли.</p><p class="p1">На миг повисла тишина: в силу русских интеллигентских традиций такие известия пока еще было принято встречать скорбным молчанием. Неожиданно Борисов расхохотался.</p><p class="p1">— Пошли! — выговорил он сквозь смех. — Пошли, Ять… обратно! Теперь наших берут!</p><p class="subtitle">9</p><p class="p1">В петроградской литературе, торговле, религии и власти долго еще на равных соседствовали приметы монархии, республики и диктатуры; газета «Известия» с марта вернула ять в свою шапку, ибо рабочие жаловались, что без ятя читать неудобно; арестовывали и выпускали без согласования и системы. Арест Ловецкого — нелепейший сам по себе, но логичный с точки зрения метафизической — был результатом сложного и хаотического взаимодействия нескольких петроградских властей. Эти власти были: Апфельбаум с его патрулями, непосредственно подчиненными ему как председателю Петросовета; Чарнолуский — без каких-либо рычагов, кроме личной харизмы; Бродский во главе ВЧК и Аренский во главе следственного комитета. К аресту Ловецкого привела следующая цепочка: товарищ Воронов из Москвы отослал отношение товарищу Аренскому о необходимости «разобраться» с газетой «Наш путь», направление которой, как загадочно формулировал Воронов, перешло всякие границы. Аренский взялся за дело рьяно, ибо в его задачи входило натворить во власти как можно больше зверств, чтобы тем спровоцировать наконец народное восстание. Он хотел уже вовсе прикрыть несчастный «Путь», посадив редактора, но редактор приходился двоюродным братом жене Апфельбаума, чем и объяснялась относительная свобода, которой газета продолжала пользоваться. Аренский решил тогда взять и как следует повымотать допросами ведущих публицистов издания, но для этого требовалась санкция Чарнолуского. Чарнолуский горой встал за ведущих публицистов, но у него, как мы уже заметили, был личный план относительно Елагинской коммуны — он думал, что вполне достаточно будет арестовать одного ее обитателя, чтобы надолго перепугать всех остальных; ища пересечения в списке сотрудников «Пути» и перечне обитателей коммуны, он обнаружил Ловецкого, человека совершенно безобидного, — и Аренский со скрежетом зубовным вынужден был Ловецкого взять, удовольствовавшись этой вполне невинной мерой, о которой тут же было доложено в Москву.</p><p class="p1">Ни Аренский, ни Чарнолуский понятия не имели о том, что Ловецкий не только скромный фельетонист, пишущий под собственным именем, но и главный публицист газеты «Наш путь», укрывшийся под псевдонимом Арбузьев; что публицист этот в действительности придерживается самого пробольшевистского направления; что между ним и его вечным оппонентом Гувером давно уже был заключен договор о ведении как можно более радикальной полемики, пусть даже против собственных убеждений, — дабы сохранить в обществе терпимость к противоположным мнениям; и что, наконец, в результате елагинского раскола так называемый Гувер вслед за друзьями отселился на Крестовский остров, ибо был молод. Главная пикантность ситуации, доставлявшей Арбузьеву и Гуверу немало приятных минут, заключалась в том, что условный сторонник большевиков жил и действовал среди елагинцев, а их условный противник — среди крестовцев, и это давало обоим возможность идеально чувствовать слабые стороны оппонентов. Разумеется, если бы на Елагином вызнали, что Ловецкий и есть тот самый Арбузьев, его погнали бы с улюлюканьем — хорошо еще, если без побоев; впрочем, если бы на Крестовском стало известно, кто таков в действительности Гувер, без рукоприкладства бы никак не обошлось. Оба публициста встречались раз в неделю в редакции «Нашего пути», редактор которого обязался хранить тайну, и, посмеявшись, обменивались убийственными аргументами — после чего расставались как лучшие друзья. И потому арест Ловецкого был глубоко закономерен — новая власть, сама того не желая, взяла-таки одного из двух главных авторов несчастного издания, но, как и во всех своих попытках действовать целенаправленно, схватила не того.</p><p class="p1">Тот, а именно публицист, умывавшийся под псевдонимом Гувер, отправился к Чарнолускому скандалить и требовать, чтобы посадили его, а ни в чем не повинного Ловецкого выпустили, — но по дороге в Смольный нарвался на патруль. Документы у него оказались в порядке, но командиру патруля не понравились раздражение и странная торопливость интеллигента, который вдобавок стремился в Смольный — а по какому делу, сообщить отказывался; до выяснения обстоятельств его препроводили на Морскую, а на Морской товарищ Аренский, узнав о роде занятий задержанного, радостно приказал отправить его в кутузку.</p><p class="p1">Получив по своим каналам информацию об аресте двух публицистов, Бродский немедленно поехал в Смольный и доложил наркому Чарнолускому, что отдельные товарищи хватают людей на улице просто так — и пусть потом не удивляются, когда читают в газетах о зверствах ЧК. ЧК не желает иметь к этому никакого отношения. Услыхав об аресте второго «путейца», да вдобавок крестовца, Чарнолуский некоторое время хохотал, потом посидел в оцепенении, написал и скомкал еще одно прошение об отставке, а потом пошел к Апфельбауму. У Апфельбаума уже сидел его несчастный родственник, редактор «Пути».</p><p class="empty-line"/><p class="p1">— Так вы утверждаете… — не поверил нарком.</p><p class="p1">— Ну конечно! — пожал плечами редактор.</p><p class="p1">Это был пренеприятный тип еврейского журналиста-дельца, для которого свобода — не более чем товар; он полагал себя тертым калачом, дважды получал предупреждения еще при царизме, как-то раз три дня отсидел в предварилке (но какой редактор там не сидел! — это было вроде нашивки за ранение) и теперь думал отделаться легким испугом. Чарнолускому хотелось выгнать его пинками.</p><p class="p1">— Вы взяли не того, — самоуверенно и развязно говорил редактор. — Собственно, не следовало бы брать никого… но раз уж вы решили брать кого-то из моей газеты, так я обязан дать консультацию. Господин Ловецкий никогда не писал ни слова против советской власти.</p><p class="p1">— А кто же писал против?</p><p class="p1">— Этого я не могу вам сказать, — заерзал редактор, — последнее уложение о печати разрешало не раскрывать псевдонимов… Могу вам только сказать, что поискать врага вам следовало бы у себя под носом…</p><p class="p1">— Да его, кажется, уже и нашли, — сказал нарком. — Мы лучше информированы, чем вы думаете. Что ж, товарищ Краминов неплохо конспирировался…</p><p class="p1">— Я вам ничего не говорил, — пропыхтел редактор. Чарнолуский поднялся к себе и походил по кабинету, прикидывая варианты. Ловецкого надо было немедленно отпускать — он и в самом деле был ни в чем не виноват. Его Арбузьев наркому давно нравился. Что было делать с Краминовым — нарком не понимал. С одной стороны, это был замечательный повод, чтобы поставить на место Корабельникова: ты требовал арестов — так вот и арестовывай, враг сидел у тебя под носом. С другой же — в отдаленной перспективе вся эта ситуация могла сработать на решение главной задачи — оставалось только придумать, как с нею разобраться, чтобы взаимно уничтожить коммуны, породившие в своих недрах двух невольных изменников… Коль уж сама судьба сложилась так удачно, что Гувер и Арбузьев попались и раскрылись одновременно, нельзя было упускать случая. Вероятно, обоих надо было выпустить. Вероятно, обоих надо было шантажировать… а верней всего, они и сами охотно поучаствуют в этом замысле. Примерно через час у Чарнолуского был готов план. Он спустился к Апфельбауму.</p><p class="p1">— Пожалуй, их надо выпускать, Гриша, — сказал он по возможности дружелюбно.</p><p class="p1">— Обоих? — в недоумении выкатил Апфельбаум бараньи глаза.</p><p class="p1">— Думаю, да. Они мне понадобятся, чтобы решить наконец елагинский вопрос.</p><p class="p1">— А что ты скажешь Аренскому?</p><p class="p1">— Аренскому я ничего говорить не обязан.</p><p class="p1">И еще через час товарищ Бродский, торжествуя, лично отправился выпускать Гувера и Арбузьева. Так что, когда к Чарнолускому в Смольный ворвался Корабельников, вопрос был уже решен.</p><p class="p1">— Не беспокойтесь, не беспокойтесь, — сказал нарком. — Возможно, он уже ждет вас там, на Крестовском… хотя сомневаюсь, что он захочет возвращаться именно туда.</p><p class="p1">— Почему? — взвился Корабельников.</p><p class="p1">— Ну, знаете, — уклончиво пожал плечами Чарнолуский. — Все-таки семья, родители… Зайдет успокоить, чаю попить… Не хотите чаю? У меня настоящий.</p><p class="p1">— Я уже пил, — буркнул поэт.</p><p class="subtitle">10</p><p class="p1">В семнадцатой камере Трубецкого бастиона к началу всей этой маленькой бури остался один человек, словно уравновешивавший своей неподвижной участью бурные перемены последних пяти месяцев. После увода Ватагина Оскольцев сидел в одиночестве.</p><p class="p1">Ватагин, всегда флегматичный и даже во время редких вспышек гнева утешительно нормальный, Ватагин, умевший и в тюрьме брюзжать так же, как брюзжал он, бывало, на заседаниях правительства или на газетных страницах, — в последнюю свою ночь что-то почувствовал и метался по камере, как зверь. Оскольцев, который как раз почему-то был безмятежен в тот вечер, не понимал, с чего бы вдруг такие метания; люди вроде Ватагина вовсе не обладают даром дальновидения, по части предсказаний они страшно близоруки и способны улавливать только ближайшие опасности, которые уже — вот, стучатся; Оскольцев был устроен ровно наоборот — он видел только далекое и не замечал того, что под носом. Вот почему в последнее время он успокоился: смерть настолько приблизилась, что вышла из его поля зрения.</p><p class="p1">Ватагина же, кажется, наконец пробрало, пробило. Он долго ворочался, потом встал и забегал, коротко постанывая и повторяя: «О Господи… что ж это… О Господи!» Наконец он остановился и жалобным, не своим голосом воззвал:</p><p class="p1">— Оскольцев! Не спите! Как вы можете спать!</p><p class="p1">— Да что такое случилось?</p><p class="p1">— Оскольцев, меня уведут завтра! Уж это точно! Я чувствую.</p><p class="p1">— Почему вы знаете? По-моему, давно забыли про нас…</p><p class="p1">— Не-ет, не-е-ет! Они никогда не забудут… Чувствую! Вы одно только мне объясните: за что? Все взять, унизить, как только возможно, истерзать со всей изобретательностью, без всякой иной цели! Только бессмысленное мучительство, только максимум мерзости! Что бы им было убить всех нас сразу?! Нет, они ждут, пока каждый, каждый сломается, пока мы на коленях приползем целовать им сапоги, умоляя, чтобы нас убили! В том только и смысл, чтобы узник просил не даровать ему жизнь, а прикончить его как можно скорей! И с Россией, негодяи, сделали то же самое: так истерзали, что сама, матушка, на четвереньках приползла — что хотите делайте, только прикончите, не мотайте больше кишок на колючую проволоку! Вот тогда и прикончили; правду говорят, что перед смертью чутье просыпается. Уж подлинно — нашла кого попросить!</p><p class="p1">Ватагин еще некоторое время бегал и выкрикивал все эти мстительные речи, припоминая всех, кто в разное время унизил его, недоплатил, не дал ходу, — по вечному закону человеческой неблагодарности, в несчастии мы тут же вспоминаем все свои прошлые беды, но в счастии никогда не помним прежних радостей; накануне гибели вся жизнь представилась Ватагину цепочкой мучительных неудач. Побегав и постонав часа три, он вдруг рухнул на нары и с Полуоткрытым ртом захрапел, а уже в восемь утра Крюков завозился с ключами. Ватагин вскочил, дико озираясь. Он словно искал, куда спрятаться.</p><p class="p1">— А? — спросил он Оскольцева, мотнув головой в сторону двери. — А?! Ааа?! — Непонятно было, о чем он спрашивает этим хриплым криком: то ли требует подтверждения своей прозорливости, то ли не может поверить, что это в самом деле конец, и ждет от Оскольцева окончательных разъяснений. Сказать в любом случае было нечего, слова ничего больше не значили.</p><p class="p1">— А?! Ааа?! Ааааааа?! — хрипло орал Ватагин все время, пока Крюков повторял ему, как глухому: «С вещами, Ватагин! С вещами! Отсиделся, подымайся!»</p><p class="p1">Сам он встать не мог — Крюкову пришлось вызвать караул, чтобы его выволочь, и все это время Ватагин хрипло, без слов, орал; вопль этот и теперь почти каждую ночь слышался Оскольцеву. Понял Оскольцев только одно: чего бы с ним под конец ни делали, так уходить он не будет. С тех пор он сидел один, и в камере его не было больше никакого зловония — он высох до того, что перестал пахнуть; а может, это была святость — еще немного, и он стал бы благоухать, светиться, лечить наложением рук. Его суета улеглась, восторжествовала абсолютная покорность — Оскольцев принимал любую участь, ибо избавился от главной своей пытки: вечного подозрения в неправоте. Как бы ни было ужасно все, что он сделал в своей жизни, это было многократно искуплено, он был чист теперь, как дитя, и смиренно ожидал решения своей участи. Не правы в любом случае были теперь его мучители; мера страдания была превышена. Что бы с ним теперь ни сделали — он лишь кротко повторил бы: «Прости им, ибо не ведают, что творят». Целые дни проводил он молча, поджав ноги, сидя на нарах, с тихой благодарностью жуя липкий хлеб или возведя глаза к решетчатому окошку. Он и сам ощущал свою святость, и это было одно из самых блаженных ощущений, ведомых ему.</p><p class="empty-line"/><p class="p1">Попав в камеру, Ловецкий изумился: не было пресловутого зловония, о котором упоминали узники российских тюрем во все времена. Впрочем, для него не так ужасно было зловоние и прочие неудобства заключения, как навязанное общество — и после первых минут в камере он страшно обрадовался, что сидеть предстоит с человеком интеллигентным.</p><p class="p1">Оскольцев смиренно ждал гибели, почти уже не прислушиваясь к шагам в коридоре, — но вместо гибели явился новый сокамерник, сорокапятилетний интеллигент с мягкой улыбкой. Пенсне у него отобрали — с некоторых пор отбирали все колюще-режущее (в Москве эсер Каланчев вскрыл себе вены стеклом от пенсне, и Воронов оперативно разослал соответствующее предписание). Ловецкий подробно расспросил Оскольцева о судьбе обитателей семнадцатой камеры и понял, что дела его плохи.</p><p class="subtitle">11</p><p class="p1">Когда пятнадцать часов спустя в семнадцатую камеру впихнули Краминова, Ловецкий лежал без сна на узких нарах и пытался выдумать верную линию поведения на предстоящих допросах — он давно готовился к чему-то подобному, как всякий русский интеллигент, томимый комплексом вины и ожидающий расплаты неизвестно за что. Естественно, редактора «Пути» надо было представить в возможно более выгодном свете; на вопрос о настроениях в Елагинской коммуне следовало отвечать, что они умеренно критичны, но в целом лояльны, ничего противозаконного; на вопрос о Гувере… Но тут заскрежетал ключ, и в камеру влетел Краминов.</p><p class="p1">— Что такое? — не разобравшись сослепу, крикнул Ловецкий.</p><p class="p1">— Илья, вы? — узнав голос, спросил от двери Краминов. Света не было, лампу давно не давали.</p><p class="p1">— Краминов?! — поразился Ловецкий и, не удержавшись, расхохотался.</p><p class="p1">— Здравствуйте! Черт… где вы тут? Темно, как у негра в желудке…</p><p class="p1">— Идите сюда. Что, взяли все-таки?</p><p class="p1">— Вы не поверите, какой бред. Ведь написать — все решат, что вымысел. Пошел вас вызволять… ну и напоролся на патруль! Но подумайте, какое совпадение!</p></span>
