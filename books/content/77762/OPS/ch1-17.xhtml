<span><p class="p1">— Я говорила тебе! — глядя на Ятя восторженными круглыми глазами, хохотала Таня. — Я говорила, что ты еще сегодня будешь свободен! Мы спускаемся, спускаемся! — Она выхватила из пыльной бутылки сухую розу и кинула ее Маринелли. Толстяк ловко поймал ее и комически раскланялся. Лошадь под ним едва удержалась на ногах.</p><p class="p1">По булыжному спуску в Гурзуф нестройно входили скалящиеся, переговаривающиеся по-своему, деловитые конные и пешие татары. Ять никогда не видел столько татар.</p><p class="subtitle">15</p><p class="p1">Неясности начинались с его фамилии: то ли Извольский, то ли Изборский. Представлялся неразборчиво, спросить было неудобно. Тайной было также, кто его привел, кто был к нему ближе остальных, кто пустил: мигом стал своим, перезнакомился со всеми и лез ко всем. Он был среднего роста, с длинным лицом (отчего туловище казалось коротким), с бегающими глазками; носил пенсне. Удивительно хорошо был осведомлен о научной деятельности каждого елагинца. Любому умел сказать единственно нужное слово, обольстить, попасть в тон. Поначалу не знали, как к нему относиться: ждали, переговаривались, косились на Хмелева. Хмелев явно одобрил. И Извольский стал своим.</p><p class="p1">— Публицист, — представлялся он, пробормотавши фамилию. — Знаком с вашими трудами, возмущен позорной ссылкой. И ведь они дальше пойдут! Вы слышали про резервации для детей? Ну как же, весь город говорит! Силой отторгать детей от родителей и свозить в какие-то лагеря. Тоже коммуны. Там дети из порядочных семей вместе с беспризорниками. Весь день маршировка, зубрежка из Маркса, стрелковые соревнования. Мальчики и девочки спят в одной спальне. Что вы, как можно этого не знать!</p><p class="p1">— Но как родители отдают?! — возмутилась жена Долгушова, пришедшая навестить мужа.</p><p class="p1">— А как не отдать? Вооруженное сопротивление? Сразу расстрел. Они всех рассуют по резервациям, разлучат семьи, и вы не слушайте, что они сейчас обещают не трогать интеллигенцию. С интеллигенции-то всегда и начинается. Мозг — самое хрупкое, без кислорода гибнет в три минуты. Вы не слышали? Ну как же, опыты Павлова… Они всерьез рассматривают обобществление жен, делать-то больше нечего — в экономике ни бельмеса, в политике того меньше… Весь мир глядит, рот открыв. Жен — отдельно, мужей — отдельно. Понятие дома упраздняется как таковое. Все на физические работы. Детский разврат поощряется, а взрослым будет предписано абсолютное воздержание. Первый лагерь уже строят, туда, для виду, посадят своих несогласных. Потом примутся за остальных.</p><p class="p1">Поначалу всю эту репетиловщину не воспринимали всерьез, тем более что Извольский заносился в своих фантазиях далеко; но когда слух о разгроме «своих несогласных» подтвердился (Горбунов принес «Правду», в которой изничтожали эсеров), к публицисту стали прислушиваться. Слухов в городе и впрямь ходило множество, и каждый, кто их переносил, претендовал на небывалую доверительность со стороны какого-то одного высокопоставленного, раскаявшегося и чрезвычайно болтливого большевика; говорили, что немцы уже в пути и войдут в Петроград не сегодня завтра и никакой сепаратный мир не защитит; что в Киеве всю власть взял таинственный гетман, которого погнали большевики, которых, в свою очередь, погнали анархисты — наверняка с песьими головами; более экзотических слухов не воспроизводил и Афанасий Никитин, описывая географию Индии со слов своих индийских приятелей. О, как любил Казарин эту книгу, эту сказочную, волшебную географию, ботанику и зоологию, с печальной птицей Гугук, предвещающей смерть, со всеми песьими головами и волосатыми людьми, заселяющими таинственные окраины плоского покуда мира! И как страстна, как трогательна была эта неожиданная молитва в конце — спаси меня, Господи, помилуй меня, Господи, убереги, дай мне приют от твоего бесконечного разнообразия, животного, растительного, ползущего, блеющего, блещущего, — спаси меня, Господи, помилуй, Господи… Но в восемнадцатом году в Петрограде некому было умиляться бесконечным Божьим чудесам, да и волосатые люди с песьими головами не сидели больше по окраинам мира, а посматривали из каждой подворотни. Передавали, что Одесса занята французами, которых вдруг выгнали англичане. Рассказывали, что в Германии революция, в Италии восстание, а большевики для того только взяли власть, чтобы тем вернее восстановить монархию, — но слух этот, утверждал Извольский, запустили сами большевики.</p><p class="p1">— Ленин? Еврей, — уверенно говорил публицист. — Поймите, я никоим образом не оправдываю погромов и вообще не приемлю наших жидоборцев, эти кислые щи… но задумайтесь: ведь вся верхушка — еврейчики! Конечно, я понимаю, угнетение и все прочее, хотя не так уж и угнетали… у меня множество друзей в этой среде, и все прекрасно сотрудничали в печати или имели обширную адвокатскую практику… Но положим даже, что угнетение: разве может быть случайностью такой состав правительства, в котором русских не больше четверти? А насчет Ленина лично знаю, наслышан от его же бывших товарищей. По отцу русский, и то сомнительно, по матери еврей. Вы послушайте эту картавость, а главное — посмотрите на жесты, на иудейскую убежденность в своей правоте…</p><p class="p1">— Слушайте, Илья Васильевич, — не выдержал как-то Казарин, встретив в коридоре Ловецкого. — Вы всех знаете, везде печатались. Этот Извольский, или как его, он что, в самом деле публицист?</p><p class="p1">— Точно не скажу, голубчик, — сокрушенно покачал головою Ловецкий. — Возможно, что и публицист. Этого добра знаете сколько развелось перед войной? Где-то я его определенно видел. Вертелся по редакциям или на митингах орал — но мордография мне знакома.</p><p class="p1">— По-моему, он тут не просто так, — многозначительно сказал Казарин.</p><p class="p1">— А по-моему, он идиот, и только, — кротко отвечал Ловецкий.</p><p class="p1">— Идиоты-то всех и опасней, — сквозь зубы проговорил Казарин, отходя.</p><p class="p1">На четвертый день беготни и трепотни Извольского он пошел к Хмелеву.</p><p class="p1">— Можно к вам, Николай Алексеевич?</p><p class="p1">— Входите, входите, — добродушно пригласил профессор.</p><p class="p1">Он постарел за последнее время и как-то смягчился, словно побоище на Смоленском его отрезвило; и странное дело — в этой мягкости чувствовалась большая сила, чем в желчности и ярости, кореживших его в январе.</p><p class="p1">— Вы, я знаю, простите меня, если что не так скажу, — начал Казарин, усаживаясь (он поколебался, не перекреститься ли на икону, которую Хмелев с первого дня в Елагином дворце повесил в правый угол комнаты, — но решил, что перед серьезным человеком притворяться грешно). — У меня сильные подозрения, что этот наш новый гость — провокатор.</p><p class="p1">— Не думаю, — нахмурившись, сказал Хмелев. — Провоцировать нас бессмысленно, у них других дел хватает. Что, по-вашему, в Смольном только и думают, на чем нас подловить?</p><p class="p1">— Очень возможно, — кивнул Казарин. — Они сами теперь не знают, как от нас избавиться: хотели дворец искусств, а получили очаг сопротивления. Самый лучший способ пересажать всю петроградскую интеллигенцию — это спровоцировать нас на выход из берегов.</p><p class="p1">— Да опомнитесь вы, Вячеслав Андреевич, вон Гувер в «Нашем пути» в каждом номере пишет, что их надо перевешать, — и что ж они, реагируют? Два раза закрыли, редактор поменял вывеску — и пожалуйста!</p><p class="p1">— Писать про них можно что угодно, они читать не любят. А вот заговор — прекрасный предлог, и заговор они в скором времени слепят, — твердо сказал Казарин. — Своими руками, чтобы тем вернее скомпрометировать нас. Пока мы действуем в рамках закона — убогого, неправого, несправедливого, какого угодно, — мы в своем праве. Но как только они поймают нас на заговоре, а еще лучше бы на спекуляции, — прикроют не только коммуну, это бы Бог с ним, а и всю прессу и всякое инакомыслие.</p><p class="p1">— Да с чего вы взяли, что он плетет заговор?</p><p class="p1">— Он постоянно об этом говорит. Вы послушайте его за обедом, как разглагольствует!</p><p class="p1">— Я не слушаю, я далеко сижу…</p><p class="p1">— А напрасно! Он только и повторяет: вы, первые жертвы режима… сосланные, запертые… создать оплот духовной борьбы, возглавить движение против извергов! И все это, знаете, так пылко — совершенно в духе большевиков!</p><p class="p1">— Вы что, предлагаете мне выкинуть его отсюда? — вскинул брови Хмелев. — Но какие мои полномочия?</p><p class="p1">— Чтобы указать на дверь, полномочия не нужны.</p><p class="p1">— Вот что я вам скажу, Вячеслав Андреевич, — проговорил профессор серьезно и тихо. — Время теперь такое, что закладывается все на много лет вперед. И повернуть события еще не поздно — я знаю, что говорю. Неужели вы вправду думаете, что они удержат власть? Что. Россия так вот и дастся им в руки? Погодите, будет и сопротивление, и захват Петрограда патриотически настроенной армией, и расправа над всей этой швалью. Громко ликовать не будем, тихо перевешаем. Но — перевешаем, миндальничать не станем. Так вот, пока наши не вошли в город, наше дело — расшатывать их власть изнутри: митинги, разговоры, что хотите. Мы начнем, армия поддержит.</p><p class="p1">— Вы что, всерьез в это верите? — В следующую секунду Казарин понял, что говорить этого не следовало.</p><p class="p1">— А если вы не верите, так вот вам Бог, а вот порог, — указал на икону, а потом на дверь профессор.</p><p class="p1">— Я пришел к вам, чтобы вы выставили провокатора, а вы выставляете меня, — скорбно ответил Казарин. — Впрочем, это логично…</p><p class="p1">— Нет-с, не логично, Вячеслав Андреевич. Да никто вас и не выставляет. — Хмелев устыдился своей резкости. — Я говорю только, что в решающий момент лапки складывать — грех. Я профессор, старик, половину жизни над русскими летописями просидел, а другую — над «Словом о полку». Сроду пистолета не взял в руки, ружье охотничье только и видел, что у приятеля в усадьбе, — а и то чувствую, что нельзя отсиживаться да играть в постороннего. А вам вдвойне грех, вы молодой.</p><p class="p1">— И зачем вам этот Изборский… или Извольский?</p><p class="p1">— А об Изборском в свой черед узнаете. Мне его верные люди прислали. Организатор он дельный, приведет побольше народу, выведем людей на улицы… И послушайте вы меня, голубчик… — Хмелев заглянул ему в глаза почти просительно. — Вы взрослый мужчина, вы в том возрасте, когда дело дороже слова… Видит Бог, я люблю и знаю поэзию, я никогда не жил монахом, — но как можно, чтобы весь мир заслоняли стихи да юбка? Простите, что лезу не в свое дело, но уж коли пошел такой разговор: ведь не за стихи нас будут судить, а за дела наши. Что ж, вы на суде стихи предъявите? Один-единственный шанс нам дает история — погибнем, может быть, но хоть пример подадим. На что мы, книжники, годны? Только на то, чтобы гибель наша разбудила остальных. Если и не выйдет ничего, так, может, обыватели, увидев беспримерное зверство, проклянут их поганое правление.</p><p class="p1">— Вы ненавидите декабристов, а рассуждаете, как декабрист, — улыбнулся Казарин.</p><p class="p1">— Что ж, в том-то и беда, что и у мерзавцев иногда хватает решимости… Знаете, какую мне сказку студенты из экспедиции привезли? Они много ездили — по Кижам, по Заонежью, — удивительные былины привозили. Я уж не помню в деталях, но суть была в том, что дьявол с Христом спорил: отчего, говорит, никак я над тобой верха не возьму? Ведь все могу дать — и золота сколько хочешь, и женщин, и славы, — что ж ты побеждаешь, объясни мне, пожалуйста, это чудо! Христос и говорит ему: мучеников, говорит, у тебя нет, а без мучеников мертво всякое дело. Вы вдумайтесь! Если нет мучеников — мертво дело; и ежели не хотите вы писать зайца через «ю», обобществлять детей да гадить в храмах, то без мученичества тут, никуда. И уж простите, пусть Извольский болтает что хочет: он не только болтать может.</p><p class="p1">— Да ведь он дурак, — одними губами прошептал Казарин.</p><p class="p1">— И что ж, что дурак? Во-первых, все-таки поумней Чарнолуского, а во-вторых, не боги горшки обжигают. Чтобы сопротивление поставить, только такой и нужен. Хватит, кончились игры, позаседали мы во «Всеобщей культуре», послушали Хламидку, покушали конинки. Надо дело делать, раз уж Господь так управил, что всех нас тут собрал.</p><p class="p1">— Последнее, — сказал Казарин. — Я не буду вам клясться в верности, расписываться кровью — вы знаете, что мне отступать некуда, я свой выбор сделал и останусь с вами до конца. Но погибать из-за провокатора — и провокатора грубого, тупого — мне обидно. Насколько тверды ваши гарантии, что этот человек не шпион?</p><p class="p1">— Достаточны, — посуровел Хмелев. — А что до гарантий… проститься надо с этим, Вячеслав Андреевич. Какое же мученичество, ежели гарантии. Нам и бессмертия никто не гарантировал. Кто чует в себе бессмертную душу — тот ее бережет, кто не чует — тому не докажешь.</p><p class="p1">— Благодарю вас, — сказал Казарин. — Спокойной ночи.</p><p class="empty-line"/><p class="p1">«Господи, как все глупо, — думал он, пробираясь со свечой по длинному коридору второго этажа. — Глупо и ложно-красиво — первый признак настоящего идиотизма. Чего ради, чего ради… Ведь я первый задохнусь, если даже цель их осуществится и вернется хмелевский идеал: удесятеренное самодержавие-православие-народность, с виселицами на площадях… И какой это обыватель пойдет на улицы после ареста тридцати старых филологов?»</p><p class="p1">Бывают дни, когда все представляется в особенно мрачном свете и лепится одно к одному; кажется, что мир сошел с ума. С таким чувством после разговора с Хмелевым подходил Казарин к своей комнате, — прекрасно зная, что срывать зло и страх на Марье нельзя, однако сильно сомневаясь, что удастся сдержаться. И сдержаться, естественно, не удалось: она сидела на ковре, принесенном из дома, и смотрела в багровый глазок их печки. При виде ее спокойно-мечтательного лица Казарин ощутил страшное одиночество: ей ли понять его смятение? Он вспомнил всю свою жизнь с ней и с небывалой ясностью понял, что и с ней он все равно один — более, чем когда-либо. Он был стар, она — молода, он болен, она здорова, она весело, почти азартно следила за тем, как рушится его мир, — и ради нее он взял на душу тягчайший грех: оставил жену! Сейчас, при виде Марьи, сидящей у печки на ковре, он испытал не привычное уже умиление, а жестокий стыд. Она была чужая, еще дальше от него, чем Ираида, и все, что пугало его, вызывало у нее смех.</p><p class="p1">— Половина первого ночи, — сказал он тихо. — Ты, я вижу, не очень-то удивлена моим отсутствием. Она пожала плечами:</p><p class="p1">— Ты сам себе хозяин.</p><p class="p1">— Могла бы хоть испугаться…</p><p class="p1">— Что от этого изменится?</p><p class="p1">— Да, ты-то женщина без предрассудков…</p><p class="p1">Слово за слово, он выдал ей по первое число. Она слушала молча, ни разу (против его ожиданий) не заплакала и все смотрела в огонь, иногда подкладывая в раскаленный печной зев сырое еловое полено. Тогда огонь принимался шипеть. Молчание ее бесило Казарина сильнее всего.</p><p class="p1">— Если хочешь, я уйду, — наконец сказала она устало.</p><p class="p1">— Нет, уйду я! — крикнул он в ответ. — Я уйду, потому что ночевать вместе после этого — страшная ложь! Подожди, за ночь я, может быть, приду в себя. Прости, если я наговорил тебе лишнего. Но я в самом деле сейчас не владею собой.</p><p class="p1">Она кивнула, удерживать не стала, и это тоже взбесило Казарина. Он хлопнул дверью, промчался по коридору и вышел в ночь, сырую и пахучую, как еловые дрова. В последний раз они гуляли вместе неделю назад. Он быстро прошел по мосту, брезгливо миновал Крестовский и очутился на Петроградской, в город они с Марьей выбирались редко — для прогулок был парк, в гостях бывали и того реже: пару раз у Стечина да трижды у Зайки. Теперь он шел по ночному Питеру в смятении и раскаянии: не надо было ссориться; если часто ругаться, она непременно уйдет. За все время знакомства мы не ссорились столько, сколько за январь, — но что поделать, совместная жизнь трудна. Удивительно, как профессора до сих пор друг друга не поубивали. По ночам все еще было холодно. Уличное электричество, само собой, отключили, и город наполнился звуками — словно только свет мешал им набрать настоящую громкость. В городе пели, кричали, звали на помощь, убегали от погони, стреляли, — Казарин отвык от такого количества звуков в своей елагинской идиллии. Он остановился посреди Зелениной и прислушался.</p><p class="empty-line"/><p class="p1">Казалось бы, все было на месте: ночь, весна, город, — и даже зеленый оттенок неба, словно грезящего о поре, когда зазеленеет все; и вместе с тем этот Петербург был так не похож на волшебный мир его юности, что и в саму юность верилось с трудом. Миг, когда от столицы отлетела душа, остался никем не замечен. Последняя зима была еще прекрасна — голодной легкостью всего тела, кокаиновым снежным холодом, гибельным вдохновением; но с весной все кончилось, потекло, отсырело. Петербургская весна всегда была временем тягостным и гнилым — но в болотистых ее испарениях, как в парах опия, были болезненное опьянение, темные зовы, мучительные обещания. Нынче каждый дом был только домом, подворотня — только подворотней. «А всего верней, это я постарел», — подумалось ему.</p><p class="p1">Казарин родился в чопорной, вместе гордой и уязвленной Варшаве, провинциальность которой сразу понял, едва в восемнадцать лет приехал держать экзамен в Петербургский университет. Он любил и время, которое проклинали теперь все кому не лень, — время расшатывания устоев и прилежного усвоения пороков. Казарин знал, что в обвинителях недостатка не будет — его поколению припомнят и роскошь, и праздность, и мнимое равнодушие к великим вопросам — однако был ли лучший ответ на великие вопросы, нежели все эти легкие, невесомые мальчики и девочки, так любившие пудру и сафьян, так мало любившие жизнь?</p><p class="p1">О да, они были легки — но кто упрекнет в избытке легкости фарфоровую танцовщицу из музыкальной шкатулки? Кто же не знал, что у Сонечки Голубкиной чахотка? — но как весело смеялась сама Сонечка и как светло она плакала: из-за скорой смерти, думаете вы? Дудки! стоит ли смерть наших слез, покрасневших глазок и бледности! Она плакала из-за того, что парикмахер испортил ей локоны… перекалив щипцы. Княжнин прочел письмо Спесивцевой, расхохотался, ушел в кабинет и застрелился. Инеса, чьего настоящего имени никто не помнил, пять раз клялась, что отравится от несчастной любви, и отравилась после шестой клятвы; и можно ли было желать лучшей судьбы для крошечной большеглазой девочки, вечно ходившей в черном и влюбленной в какого-то католика, монаха, которого, скорей всего, никогда не существовало? Но откуда тогда на ее похоронах взялся строгий джентльмен — тоже в черном, — ни слова ни с кем не сказавший и исчезнувший так же неожиданно, как и появился? Бедная Инеса.</p><p class="p1">Да, Бердслей, да, маскарад, да, запоздалые русские игры в галантный век — которого у нас не было, потому что какая же галантность под вечный хриплый крик терзаемого на дыбе, под щелканье бича, под азиатское гиканье Пугача и его зипунного войска! Казарин за то и любил Стечина, что в нем и его приятелях узнавал ту же легкость — только новые денди меньше улыбались; прежние выбрали гибель добровольно — новых никто ни о чем не спросил. Неприспособленность к жизни; о, эта неприспособленность к жизни! Да было бы к чему приспособляться… Деньги стоило только получать в наследство или выигрывать в карты. Прекрасны неприкаянность и беспомощность, отвратительны угрюмая земская честность, самодовольная основательность, болтовня борцов…</p><p class="empty-line"/><p class="p1">Тут Казарин остановился, заметив на углу Большого проспекта странную сутулую фигуру, закутанную в тряпье. Он узнал растрепанную бороду и длинные седые космы: сомнений не осталось, ночью по городу бродил издатель Булгаковский, бывший священник и неутомимый борец с пьянством. Этот пропагандист воздержанности и труда давно уже был общим посмешищем, — Казарин отлично помнил, как Княжнин принес на одно из заседаний «Клуба сумасшедших» (помилуйте, когда же это было? тринадцатый год!) брошюру «Жалость взяла». Таких учительных брошюр Булгаковский выпускал по два десятка в год, названия их помнились Казарину и по сей день: «Терзание одно», «Несчастные», «Замерз в поле» — и каждая сопровождалась уведомлением на обложке:</p><p class="p1">«Автор награжден серебряной медалью на Парижской выставке 1908 г. за брошюры с приложением световых картин из жизни людей, преданных пьянству».</p><p class="p1">Эти «преданные пьянству» произвели в клубе гомерическое действие.</p><p class="p1">«Ждет не дождется бедная жена любимого мужа, — при общем стоне зачитывал Княжнин, в одной руке держа книжонку, в другой — бокал. — Но тщетно дожидается несчастная своего голубчика: лежит он, хмельная головушка, в грязной канаве!»</p><p class="p1">Вероятно, тут следовало показать световую картину, но приобретать эти стеклянные пластины для демонстрации в волшебном фонаре Княжнин не стал то ли из лени, то ли из жадности. Не вполне было понятно, на какую аудиторию рассчитывал Булгаковский: волшебных фонарей в избах не держали, а в состоятельных семьях не читали брошюр из жизни людей, преданных пьянству. Особенно забавна была святая уверенность автора, что как только русский народ перестанет пить — тут же и разрешатся сами собою все роковые вопросы.</p><p class="p1">Булгаковский, покачиваясь то ли от ветра, то ли от слабости, стоял под мертвым фонарем и время от времени обнимал его, чтобы не свалиться. Казарин подошел, интересуясь, не нужна ли помощь, — и отшатнулся: издатель был пьян встельку.</p><p class="p1">— Да-с, — сказал Булгаковский, подняв на подошедшего Казарина жалкие глаза. — Не имею чести знать, но… Позорно слаб-с. Гибну и сознаю.</p><p class="p1">— Полно, — дружелюбно сказал Казарин. — Этому пороку я сочувствую больше прочих.</p><p class="p1">— Сочувствовать, пороку нельзя-с, — слабым, дрожащим тенорком, столь странным при его могучей поповской комплекции, произнес Булгаковский. — Сочувствие пороку широко отверзает для него двери; притворяемся человеколюбцами, а любим между тем один порок… Не ищу сострадания и не хочу оправдания. Покуда мог, противился. Но вот уже пятую ночь не имею сил удержаться, пал низко. Григорий Алексеев, наборщик, из раскаявшихся пьяниц (издатель произносил «пианиц», придавая грубому слову дополнительный музыкальный смысл), возымел жалость и своими путями достал мне спирту. Вы добрый господин, примите исповедь несчастного, погубившего свою душу.</p><p class="p1">— Нет ли у вас еще спирту? — поинтересовался Казарин.</p><p class="p1">— Нет, — посуровел Булгаковский, — но хотя бы и был, не дал бы. Губить себя — моя воля, губить другого я, и падши, не стану.</p><p class="p1">— Что же, слушаю. — Казарин был разочарован (выпить в самом деле очень хотелось), но отказать несчастному не мог. Такие ли сумасшедшие встречались ему в ночных скитаниях пятилетней давности!</p><p class="p1">— Дети, — хрипло прошептал Булгаковский.</p><p class="p1">— Какие Дети?</p><p class="p1">— Ночные дети, — еще тише проговорил он. — Перенес бы все, но здесь бездна глубже человеческого разумения. Вы не видывали?</p><p class="p1">— Нет.</p><p class="p1">— Стайками, — отрывисто пояснял издатель. — В подворотнях, в переулках. Молча. Этакие ангельские личики.</p><p class="p1">— Господи, да мало ли нищих детей! — Казарин рассмеялся с облегчением. — У Николаевского всегда отирались…</p><p class="p1">— Нет-с, это не нищие, тех я знаю-с… — Булгаковский посмотрел на него с обидой. — Тех я видел-с, и они ничего-с. Эти же набрасываются на прохожего и забивают в секунды, с жестокостью истинно зверской. В последние годы слаб стал телом, но, быть может, предостерегу. Спирт же пью единственно для угнетения страха, терзающего меня повсечасно. Ибо ежели и дети отданы диаволу, то из нас ни единый не спасется.</p><p class="p1">— Да, может, вам померещилось, — неуверенно предположил Казарин.</p><p class="p1">— Померещиться мне не могло-с, — строго произнес Булгаковский. — Возвращался в первом часу от старого моего друга, священника Никольского собора. Своими глазами видел, как забили прохожего. Повалили, обобрали. Ни слова единого, но слышал легкое как бы урчание, словно у голодного пса. Когда разбежались, лежал раздетый. Сам же я укрылся в воротах ближнего дома, по счастию не запертых, и долго еще не решался выйти, кляня позорную трусость. Ежели бы взрослый грабитель, я тут же вмешался бы. Но тут нечто свыше нашего разумения, и потому согрешил. Теперь посильно искупаю грех мой, но не имею сил выходить на ночную стражу без спирта. Ужас ведет вдоль всего тела как бы ледяным лезвием, — доверительно добавил он, — и в ногах чувствую слабость, не соответственную возрасту. Оно и голод, и годы, конечно, — но тут иное. Диаволу отдана вся власть, и дети наши обратились против нас. Сказано: открылся кладязь бездны… Се иду как тать.</p><p class="p1">— Пойдемте, я провожу вас, — предложил Казарин и взял Булгаковского за рукав, но тот деликатно отстранился.</p><p class="p1">— Нет, это я провожу вас, ежели угодно, а сам продолжу ночную мою стражу. Грех мой неискупим, но, быть может, хоть одну живую душу спасу. Далеко ли изволите идти?</p><p class="p1">— Я дойду, — успокоил его Казарин. — Мне близко. Но я не хотел бы оставлять вас… в таком состоянии…</p><p class="p1">— Состояние мое прискорбно, — кивнул издатель. — Но чему поглумишься, тому поклонишься. Прощайте, Господь с вами, господин.</p><p class="p1">Он тяжело вздохнул и, пошатываясь, побрел по пустому проспекту. Казарин посмотрел ему вслед и решил вернуться. Пока он шел один и вспоминал свою молодость, никто не мог его тронуть — он был словно невидим для встречных, облако сожалений и воспоминаний окутывало его. Он всегда, предполагал, что человек, сосредоточенный на собственных размышлениях, легко проходит через заставы и караулы — просто потому, что не замечает их; однако теперь, насильственно возвращенный к реальности, он чувствовал себя неуютно. Вдобавок за домами протрещали выстрелы и тренькнуло разбитое стекло — Петербург уже привык к этим звукам, но бродить Казарину враз расхотелось.</p><p class="p1">Посреди овального зала на стуле по-прежнему похрапывал матрос Елисеев. Он не проснулся, даже когда Казарин нарочито громко хлопнул дверью. Охрана! Да эта охрана не пошевельнется, если нас придут вырезать, а то и поможет резать… Казарин тихо вошел в свою комнату и прислушался к темноте. Дрова прогорели, печь остывала. Он засветил керосиновую лампу. В комнате было пусто. Марья ушла.</p><p class="p1">Да, ушла. Этого надо было ждать. Саквояж ее, правда, стоял на месте, но за вещами она вернется, когда сочтет нужным. Она не из тех, кто думает о вещах. Только теперь он понял, в какую невыносимую пустоту попадет без нее, как много поставил на эту карту, как ничтожны все ее грехи и грешки перед тем великим и важным, что было между ними. Боже мой, куда я пойду теперь? И куда делась она в пустом городе? Бежать, искать? Все бессмысленно, все к черту. Он сел на пол и схватился за голову. В этой позе и застала его Ашхарумова десять минут спустя, когда вошла в комнату.</p><p class="p1">— Вернулся? — ласково сказала она. — Вернулся, вернулся. Ну прости меня. Он поднял на нее дикие, больные глаза.</p><p class="p1">— Где ты была, Маша?</p><p class="p1">— Это я тебя должна спрашивать, радость моя. Выдумал убегать от меня по ночам. Мне стало грустно, я пошла к подземному ходу. Комаров мне говорил, что там дальше интересный зал, я решила дойти… ну, прошла и подальше зала. Знаешь, куда ведет ход? Она наклонилась к его уху, горячо зашептала, засмеялась. Он неуверенно улыбнулся.</p><p class="p1">— Да не может быть!</p><p class="p1">— Вот представь себе.</p><p class="p1">— Господи, Маша, какое счастье, что ты здесь. — Он обнял ее, прижался щекой к холодной щеке. — Господи, Маша, как я боялся. Прости меня за все, я знаю, что невыносим…</p><p class="p1">— Ну что ты, что ты. Зато теперь я знаю…</p><p class="p1">— Как я боялся, — повторял он. — Как я боялся.</p><p class="subtitle">16</p><p class="p1">Хорошим или плохим, а все-таки Корабельников был прежде всего поэтом и потому все последние дни не испытывал ничего, кроме тупого ужаса. Ужас этот был той самой породы, что и в болезненном сне, когда понимаешь, что вся логика этого сна дурная, ложная, — и, однако, она неотвратимо толкает тебя в пучину. Все, что с ним происходило, было логично, одно вытекало из другого, и вместе с тем в конце маячило нечто невыносимое. Он расписывал стены домов, читал перед матросами и обучал восхищенный молодняк. На страдания не было минуты свободной, и, может, статься, все прежние страдания происходили исключительно от избытка времени. Днем и ночью под его руководством шестеро художников-плакатистов и три поэта сочиняли и рисовали агитационные рассказы в картинках, лозунги и информационные бюллетени в стихах, и спал он три часа в сутки, подложив под голову собственную барашковую шапку солдатского образца, укрывшись кожаным пальто. Искусство служило делу и производилось поточно. И тем не менее Корабельников чувствовал, что бешеную свою деятельность он не может прекратить ни на секунду именно потому, что без нее ужас захлестнет его волной и лишит рассудка. Корабельников, как ни искал, не мог найти ошибки: он все делал в согласии с убеждениями — и вышло только хуже, потому что год назад его тошнило от всего человечества, а в последние три месяца от себя самого.</p><p class="p1">Он думал сначала, что причина в скудости быта, в отсутствии, отдыха, — но здоровья у него было на роту солдат, а в тюрьме, где он по дурости отсидел три месяца семнадцатилетним щенком, развлечений не было вовсе, однако такого отчаяния он не испытывал и там. Наоборот, были некий подъем духа и гордое сознание правоты; здесь он останавливался, поскольку дальше пришлось бы признать, что теперь никакого сознания правоты, нет и неизвестно, когда будет. Каждый день приходилось мириться еще с чем-то гнусным, и количество гнусностей обещало возрастать в геометрической прогрессии. Происходило все, о чем он мечтал, и оттого к неотступному ужасу добавлялось сознание своей к нему коренной причастности. Его уносило все дальше от него самого, и остановить это движение не было никакой надежды.</p><p class="p1">Он не мог даже сказать, что именно его пугает. Просто с некоторых пор любой враг был ему ближе друга, и все чаще он ловил себя на тоске по этим врагам. Те, кто не пускал его в литературу и издевался над юношескими эскападами, не желая видеть за ними трагедии, те, кто клеветал на него в своих листках и речах, те, кто в тяжелейшее для страны время картежничал по притонам или пил ворованный спирт, — были все-таки людьми, и он понимал, как с ними себя вести; те же, кто окружал его на Крестовском, на лекциях и в некоторых кабинетах Смольного, людьми совсем не были, а признать их новой, высшей ступенью эволюции отказался бы и закоренелый дарвинист. Но не успевал Корабельников, стыдившийся сантиментов, посочувствовать врагам, как они затевали очередную подлость, и он опять оказывался обречен на войну. То, что они вытворяли, было неслыханно. Его объявили продавшимся, палачом, лично ответственным за все исчезновения и перестрелки в городе и вдобавок публично намекнули, что он примкнул к крестовцам небескорыстно. Корабельников непристойно отругивался и несколько раз — сам себя в душе презирая — прозрачно намекнул Чарнолускому, что оплот контрреволюции на Елагином пора прикрыть. Ведь они там защищают не свободу (больно много у них было свободы при Николае! — и ничего, терпели), а собственное право считаться героями. Они, кажется, разрешили себе уже все, от прямой клеветы до шантажа, и в борьбе с этим очагом «правой революции» запрещенных приемов не было. Так он думал днем, но вечером земля опять уходила из-под ног — и вместо злобы накатывал мальчишеский, стыдный стыд.</p><p class="p1">Переезд правительства в Москву тоже не добавил ему радости. Выходило, что они таки боятся, ни черта не веря в собственный мирный договор, за который их разлюбили и те, кто честно пытался полюбить. Корабельников на фронте себя не мыслил, один раз уже обманул судьбу, устроившись после мобилизации чертежником (впрочем, никто уже не ловил уклонявшихся — все бежали кто куда); других могли ввести в заблуждение его зычный бас и челюсть молотобойца, но сам твердо знал, что при виде первого же убитого впадет в истерику, а в бою растеряется, не поймет, где свои, где чужие, — ужас тошнотой подступал к горлу, едва он воображал штыковую или газовую атаку.</p><p class="p1">Так что на фронт, тем более в плен, ему не хотелось, а между тем переезд правительства означал возможную сдачу города; что еще хуже, он означал трусость комиссаров, в которых Корабельников искренне пытался увидеть новых людей. В Корабельникове сильно было желание работать на власть: вывести Россию в будущее можно было только общим усилием — сто лет дворянской фронды доказали это вполне. Между тем из всех представителей новой власти в Питере остался один Чарнолуский, но у него, как назло, вкусы были самые фармацевтические.</p><p class="empty-line"/><p class="p1">Для довершения картины Чарнолуский придал футуристам двух товарищей непонятного назначения — что-то вроде матросов, обслуживавших Елагинскую коммуну, но с функциями идейных руководителей и чуть ли не цензоров. Согласно идее наркома, именно они должны были осуществлять связь между ним и художниками: визиты крестовцев стали его утомлять. Хотели руководства — получите руководство. Приданные товарищи отличались друг от друга разительно: один был крупный, крепкий, круглый, с крутым розовым лбом и каменным затылком, с вечным окурком на губе и приплюснутой кепочкой на бритой голове; второй — маленький суетливый еврей, хитролицый, юркий. Первого звали товарищ Камышин, второго — товарищ Драйберг, и никто не знал, что эту почти цирковую пару поместили в коммуну по личному указанию товарища Воронова. Товарищ Воронов не стал объяснять Чарнолускому своих мотивов, да Чарнолуский и сам был достаточно умен, чтобы понять: речь идет о вульгарной слежке на предмет благонадежности. Странно было, что никого не прикомандировали к елагинцам, и Чарнолуский боялся дать себе самый простой ответ: там осведомитель, видимо, уже был.</p><p class="p1">Камышин при ближайшем рассмотрении напоминал не пролетария, а бандита: он слишком часто упоминал о своем происхождении (настоящие пролетарии даже после революции скорее стыдились родословной), чересчур умилялся стихам, в которых не должен был ничего понимать, и навязывался с разговорами. Он без приглашения тяжело входил в комнаты и мрачно говорил:</p><p class="p1">— Вот, пришел я.</p><p class="p1">— Вижу, что пришел, — хмуро откликался Льговский. — Чего забыл?</p><p class="p1">— Да так, мимо шел… Ты как сам-то?</p><p class="p1">— Все как обычно, — отвечал Льговский.</p><p class="p1">— А-а, — говорил Камышин и усаживался в кресло. — Ну, ладно, ладно…</p><p class="p1">— Ты бы шел себе, Боря, — не выдерживал Льговский. — Я работаю.</p><p class="p1">— А-а, — повторял Камышин. — Так я ж тихо посижу.</p><p class="p1">— Тебе что, посидеть негде?</p><p class="p1">— Негде пока. Извини уж. Исайка (так называл он Драйберга) до того всю комнату выстудил, что у тебя прямо Африка, после нашей-то. Погреюсь да пойду. Ты работай.</p><p class="p1">Льговский умел держать себя в руках, но шумного присутствия этого крупного человека не выносил. Камышин принимался дымить, сопеть, кашлять, ругать спекулянтов, из-за которых в городе табаку не купишь, — рабочее настроение испарялось моментально. Льговский всерьез подумывал о том, чтобы сбежать из коммуны. Как ни скудно, ни выстужено было его одинокое жилье на Васильевском, как ни прекрасны были вечера с товарищами по искусству — присутствие новых насельников портило всю атмосферу. Это было тем противнее, что Камышин и Драйберг представительствовали на Крестовском от лица читателей, ради которых всё. Только теперь Льговский признался себе, что до читателей ему нет никакого дела и лучше бы их не было вообще.</p><p class="p1">Между собой Камышин и Драйберг общались мало, по крайней мере на людях. Иногда оба исчезали — уходили, видимо, за заданиями в Смольный, где сидели в ожидании переезда остатки правительства, — и возвращались с мешками крупы, которые везли на санках, с заказами на очередной плакат или просто с экземпляром газеты, где несколько строчек было подчеркнуто: их надлежало популярно изложить и проиллюстрировать. Эта система сдачи работы через посредника очень злила Корабельникова, однако товарищи (их иначе и не называли) оказались по крайней мере сносными курьерами. Все готовые агитплакаты исправно вывешивались на Бассейной, Гороховой и Морской.</p><p class="p1">Как могли дружить, да еще и работать вместе столь непохожие друг на друга персонажи, как Драйберг и Камышин, никто объяснить не мог. Как проводили они день, не участвуя в художественной работе и не умирая со скуки, — половина коммуны искренне не понимала. Лишь однажды, идя мимо их двери, Барцев случайно услышал их разговор: видимо, играли в шахматы.</p><p class="p1">— А теперь мы вас так и так, — спокойно говорил Камышин.</p><p class="p1">— А потом мы вас, — тоненько отзывался Драйберг, вероятно съедая фигуру в ответ.</p><p class="p1">— А потом все-таки мы вас. Барцев не удержался, постучал и заглянул. Товарищи встали ему навстречу.</p><p class="p1">— Вечер добрый, — прогудел Камышин. — Располагайтесь. Чайку?</p><p class="p1">— Нет, я на секунду, — ответил Барцев. — Мне показалось, что вы играете в шахматы.</p><p class="p1">— Нет… это что ж, это так… Разговоры.</p><p class="p1">Шахматной доски в комнате и впрямь не было. Для Барцева так и остался темен смысл диалога, возобновившегося сразу, чуть он вышел за дверь.</p><p class="p1">— А потом мы вас, — злорадно обещал еврей.</p><p class="p1">— А потом мы вас, на столбах, — добродушно посмеивался Камышин. Видимо, за такими проектами они и коротали время.</p><p class="empty-line"/><p class="p1">Девятнадцатого марта, на склоне серого облачного дня, каких немного было той сверкающей весной, Корабельников не выдержал наконец и пошел к Чарнолускому на квартиру.</p><p class="p1">Он демонстративно не пожелал идти в Смольный, ибо надеялся придать будущему разговору характер частный. Чарнолуский жил на Шпалерной, там же зачастую и вел прием — поток посетителей не останавливался, а после переезда правительства питерцы повалили к нему валом со всеми бедами. Комиссар принимал жалобщиков, накладывал бессмысленные резолюции, объезжал гимназии, где помаленьку возобновлялись занятия, — и нередко ловил себя на мысли, что без Совнаркома ему в городе ничуть не хуже, а то и, страшно сказать…</p><p class="p1">Добираться с Крестовского на Шпалерную стало делом долгим; Корабельников выбрал путь вдоль Большой Невки с ее набухшим, ноздревато-серым льдом. Никогда еще город не был так грязен. На Стрелке лежала отвратительно раздувшаяся дохлая лошадь. Корабельников прошел мимо, стараясь не вдыхать. Брезгливость была ему присуща в крайней степени, он вечно боялся всякой заразы, и мертвое казалось ему опасней живого. На Невском, однако, он повеселел: тут уже попадались автомобили, проходили люди, кричал мальчишка-газетчик, продававший «Наш путь». Около шести неожиданно, на один час, включилось уличное электричество. Стоя под фонарем, Корабельников развернул газету и на последней странице обнаружил фельетон Гувера «Избирательная слепота», в котором как дважды два доказывалось, что Ленин — немецкий шпион.</p><p class="p1">«Остается только дивиться на тех господ, — писал Гувер, — которые притворяются гимназистами второго класса, не желая замечать очевидного. Полноте притворяться, гг. Корабельниковы, полноте играть в добродушную наивность! Вам хватило здравого смысла, чтобы понять, где заканчиваются игры и начинается власть, с которою лучше не шутить. Но ежели вам, гг. ниспровергатели, хватило чутья, чтобы оставить ваши протесты и побежать в услужение к столь опасному противнику, у вас должно было хватить чутья и для того, чтобы разглядеть источник большевистской победы. Нельзя же, в самом деле, проявлять проницательность в тех исключительно случаях, когда эта последняя гарантирует вам дровяной паек и временную безопасность!»</p><p class="p1">Корабельников хотел выбросить газету, но передумал: пригодится. Он осторожно сложил ее вчетверо и сунул в карман брюк. Одно из самых сильных и неприятных ощущений, знакомых человеку, — это внезапное понимание того, насколько сильно его, оказывается, ненавидят и насколько серьезны намерения его врагов. К этому всегда себя готовишь, но каждый раз отчего-то изумляешься: Господи, неужели все настолько всерьез? Стало быть, ни перед чем не остановятся? Стало быть, война? И это при том, что сам я всю жизнь старался не бить ниже пояса, даром что все мои враги — люди куда более толстокожие и благополучные, чем я… (точно так же думает о себе и каждый из них). Значит, война, сказал Корабельников. И нечего миндальничать. И если Чарнолуский не хочет, чтобы над ним издевались в открытую, — он распустит елагинцев и прикроет пару листков, а от нас уберет эту пару гнедых.</p><p class="subtitle">17</p><p class="p1">Корабельников явился на Шпалерную к семи вечера. Народный комиссар пил чай в кругу семейства, прием был окончен, но футуриста впустили и даже пригласили к столу — крайне скромному как по меню, так и по сервировке. Были пареная репа, о которой нарком произнес небольшой спич («Отчего думают, что она проста? Нет, репа сложна!»), тонко порезанный черный хлеб с маргарином, селедка, а для мальчика — чашка бульону из американского кубика. По статусу нарком имел личную охрану — тихого, ненавязчивого матроса, всю жизнь прослужившего на торговом флоте. Его демократично посадили за общий стол.</p><p class="p1">Комиссар с нарочитой веселостью в голосе осведомлялся, кто над чем работает и не кажется ли жителям коммуны, что паек недостаточен. Разумеется, увеличить паек было не в его власти, но продемонстрировать заботу о художниках он любил всегда. Наконец ужин окончился, и Чарнолуский чуть более строгим голосом пригласил гостя к себе в кабинет. Кабинет был просторный, с камином, — Чарнолуский вселился в эту квартиру недавно: владелец пришел в Смольный и сам предложил сдать за копейки. Разумеется, Чарнолуский отказался бы — для себя ему почти ничего нужно не было, он и ночевать-то не всегда приезжал, — но семья… измученная жена, Боба, которому все больше нужно места для игр… Почему им хоть год не пожить по-человечески? К тому же он аккуратно платил.</p><p class="p1">— Ну-с, чем обязан? — сказал он, указывая гостю на диван. — Не делайте только вид, что зашли посмотреть, как я живу.</p><p class="p1">— И не собираюсь, — ласково пробасил Корабельников. — Я хочу попросить вас, Александр Владимирович, о небольшом подарке. У меня второго апреля день рождения, так вот нельзя ли…</p><p class="p1">— Разумеется, разумеется! — воскликнул Чарнолуский. — Чем, как говорится, смогу… Он вмиг утратил всю строгость.</p><p class="p1">— Многого не потребуется, — утешил Корабельников. — Уберите шпионов, Александр Владимирович. Обо всем, что вас заинтересует, можете спрашивать меня напрямик, да и остальные, я думаю, не для того туда съехались, чтобы от вас прятаться.</p><p class="p1">— Да почему же шпионы? — быстро заморгал Чарнолуский.</p><p class="p1">— Жаль, — сказал Корабельников и пошел к двери. — Я думал, у нас будет серьезный разговор…</p><p class="p1">— Хорошо, — сказал вдруг комиссар, наклоняясь подбросить дров в огромный камин. Лица его Корабельников не видел, но догадывался, что выражение фальшивой радости сошло с него, уступив место усталому, но все еще сосредоточенному вниманию. — Допустим, я эту вашу просьбу выполнил. И что вы, лично вы мне скажете о жизни коммуны?</p><p class="p1">— Я не докладывать пришел о жизни коммуны. Вы при желании и сами можете приехать…</p><p class="p1">— Ну а все-таки? Я приеду максимум на час, а ведь надо знать изнутри… Чего не хватает, что вас тревожит?</p><p class="p1">— Тревожит многое, — вздохнул Корабельников. — Вот, не читали? — И достал газету.</p><p class="p1">Чарнолуский бегло просмотрел фельетон.</p><p class="p1">— А, Гувер… Дельный господин; надо бы его перетянуть… Ну, и что ж тут такого? Вы должны быть готовы к нападкам, если работаете с нами. Враг сердится, значит, паникует.</p><p class="p1">— А почему надо обязательно терпеть эту клевету?</p><p class="p1">— А что же вы предлагаете? — развел руками Чарнолуский. — Расстрелять?</p><p class="p1">— Расстреливать я никогда не предлагаю, — лениво сказал Корабельников, развалившись на диване. — Я, Александр Владимирович, не понимаю только, почему эта гнусность печатается, а мы ни одной книги издать не можем.</p><p class="p1">— То есть вы предлагаете, — Чарнолуский прищурился, — изъять у них бумагу и на ней издать ваши книги?</p><p class="p1">— Почему нет? — спокойно ответил Корабельников.</p><p class="p1">— Знаете что, Александр Александрович, — улыбнулся Чарнолуский, — а ведь статья-то Гувера вас задела глубоко. Ошибочные выступления так не задевают. Кое в чем Гувер, возможно, не так далек от истины. Например, в предположении, что вам и революция-то нужна только для того, чтобы как следует пощипать собственных врагов… а? Корабельников вскочил.</p><p class="p1">— Ну, знаете… От кого-кого…</p><p class="p1">— Да сядьте вы, ради Бога! — еще ласковей улыбнулся Чарнолуский. — Посторонних тут нет, про мое отношение к вам вы знаете, так уж имейте терпение дослушать. Я высоко ценю вашу работу. Я знаю, каково вам приходится. Мне одно только не нравится: уж очень вы полюбили запрещать… Поймите, Александр Александрович: победил не футуризм. Победил пролетариат. А культура елагинцев пролетариату, может быть, еще и нужнее ваших настенных росписей…</p><p class="p1">— Да ведь это все ложь! — шепотом закричал Корабельников. Он боялся разбудить ребенка, которого повели спать. — Они врут на каждом шагу — или вы не видите? Их силком согнали во дворец, для них устроили резервацию, мы собрались в пику им… Вы и дальше хотите терпеть все это?</p><p class="p1">— Почему же терпеть. Напишите ответ, я уверен, что опубликуют…</p><p class="p1">— Мой ответ будет — оторвать Гуверу руки, чтобы больше такого не писал.</p><p class="p1">— Ну, это еще кто кому оторвет, — холодно сказал Чарнолуский. — Он тоже, говорят, детина здоровый.</p><p class="p1">— Александр Владимирович, пролетариат не для того делал революцию, чтобы ходить в Художественный театр.</p><p class="p1">— Конечно, нет, — кивнул Чарнолуский. — Пролетариат делал революцию, чтобы ходить в синематограф.</p><p class="p1">— Вы это всерьез?!</p><p class="p1">— Слушайте, товарищ Корабельников, — неожиданно жестко сказал комиссар, и в эту секунду Корабельников понял, почему этот смешной оратор и слабый критик оказался в конце концов министром большевистского правительства. — К войне пролетариата за свои права лично вы, насколько я знаю, имеете не самое прямое отношение. И пока еще нарком я, а не вы, — я не позволю вам руками победившего пролетариата сводить счеты со своими литературными противниками и вместо Пролетарской диктатуры устанавливать собственную! Мне эти претензии на то, чтобы быть единственным революционером, до поры забавны, но потом начинают и утомлять, знаете ли! В конце концов, я и сам десять лет мотался по ссылкам и заграницам не для того, чтобы мои дети учили наизусть «ахрр, ахрр, дырбурщил»! Помогаете нам — помогайте, но не ждите содействия во всех своих безумных планах вроде росписи неба в красный цвет. А когда и кого мне запретить, знаю покуда я сам. Если будет нужно, меня поправит партия. Но не вы, товарищ Корабельников, — вы хорошо меня поняли? Не вы будете указывать мне, кого и когда я должен запретить. Он перевел дух.</p><p class="p1">— Что до двух товарищей, приданных в помощь коммуне, — я решу этот вопрос, если они вам в тягость.</p><p class="p1">— Не так думал я поговорить с вами, — после долгой паузы хмуро сказал Корабельников.</p><p class="p1">— Что ж, и неожиданности бывают полезны.</p></span>
