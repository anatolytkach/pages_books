<span><p class="p1">— Да-с, от малейшего напряжения, — продолжал Трифонов совсем уже невесело. — И знаете, что самое отвратительное? Что у меня не хватит духу плюнуть в рожу этим гуннам. Так и буду таскать, повизгивая под ударами… отвратительно!</p><p class="p1">— Так и прекрасно. Вы столько раз хотели похудеть, сразу и похудеете.</p><p class="p1">— Да, тоже верно, — вдруг успокаивался Трифонов. — Ну, промучусь год, два, а потом, верно, стану как они… Но каковы мне будут эти два года?</p><p class="p1">— Вы бы готовились, гимнастикой занялись. Гири, душ ледяной… Утром вставать пораньше — и снежком, снежком…</p><p class="p1">— Нет, сам я себя не заставлю, — решительно покачал головою Трифонов. — Должен кто-то сторонний.</p><p class="p1">Ятю душно стало с этим человеком. Дело было не только в тошноватом запашке Трифонова, заглушавшемся отчасти одеколоном, не только в его полноте, вытеснявшей из комнаты воздух, — но и в неуклонной сосредоточенности на одном. Ять сам знал, что когда-нибудь придут и всё возьмут; потом придут к тем, кто придет. Всегда кто-нибудь приходит. Но на этот случай было два выхода, давно придуманных в предчувствии неизбежного краха: во-первых, можно подламываться понемногу, по чуть-чуть. Он знал людей, крепких, как старые дубы, и рушившихся в одночасье. Чтобы не лишиться сразу всего, надо было что-то отдавать ежедневно и к неизбежной развязке подойти возможно более легким. Был и второй выход, пугавший все меньше: он знал, что скорее не будет жить, нежели согласится выживать. Отказ — вот правда, другой не придумано. Трифонову трудно было понять это.</p><p class="p1">— Ладно, пойду, пойду, — начал приговаривать он, повертываясь на диване всем толстым телом, но все еще никуда не уходя. — Ну а все-таки, голубчик, как же вы думаете: скоро ли конец?</p><p class="p1">«Да какая разница?» — хотел ответить Ять, но придумал вдруг универсальное утешение:</p><p class="p1">— Как будем готовы, так и конец.</p><p class="p1">— А как мы узнаем, что готовы?</p><p class="p1">— Уж будьте покойны. Знаете же вы откуда-то, что сроки близко. Вот купите гирю, похудеете, выучитесь тасканию тяжестей — тут-то и конец. С человеком делается только то, к чему он бессознательно стремится.</p><p class="p1">Не успел он запереть за Трифоновым и вернуться к столу, как снова тренькнул звонок и за дверью раздался нетерпеливый голос Стрелкина:</p><p class="p1">— Сидите тут, ничего не знаете! Да впустите же скорей, холод адский!</p><p class="p1">Стрелкин, румяный и возбужденный, принес Ятю весть о декрете, об отмене ятей и еров, а стало быть, и об его упразднении, — и побежал дальше: опрашивать питерских литераторов, что они думают по этому поводу. Он искренне полагал, что читателей «Речи» этот вопрос живо интересует. Следом пришли еще человек пять, и со всеми надо было говорить о карточках, дровах и новой грамоте, так что в одиночестве Ять смог остаться только к семи вечера. Стемнело, жечь керосин не хотелось. Он лежал на кровати, курил и думал. Одинокое окно горело напротив: кто там живет? Верно, кто-нибудь неупраздненный… Странно: он не чувствовал зависти. Прежде совсем не переносил одиночества, а теперь притерпелся. Видимо, это и означало очередную реинкарнацию: тот Ять, который боялся одиночества, умер, а новый ничего не боялся.</p><p class="p1">Ощущать себя несуществующим было ему не внове. Ишь удивили! Все последнее время, когда знакомые суетливо выспрашивали у него, что лучше делать со сбережениями, он с радостью понимал, что и сбережений-то у него почти нет и неоткуда было взять. Исчезни он и в самом деле вслед за своей литерой, материальных следов его существования осталось бы до смешного немного. Были три книжки мелких рассказов, пять сотен газетных да две сотни журнальных статей, брошюра об охранке, пять-шесть дипломов после побед на конкурсах «Нивы» и «Нови»; несколько фотографий, на которых он всегда выходил затененным или стоял сбоку, — единственный крупный портрет, заказанный для третьей книжки, оказался до того неудачен, что он отказался от него вовсе. Если и удавалось проследить в его судьбе отчетливо звучащий мотив, это с самого начала была тема отсутствия или бегства, словно Бог специально устроил дырку в людском монолите, чтобы подглядывать сквозь нее. И только этот взгляд, который Ять чувствовал иногда на себе — сквозь себя, — давал ему ощущение смысла.</p><p class="empty-line"/><p class="p1">Ведь нельзя же было считать смыслом то занятие, с помощью которого он и сам не думал спасти душу, — сочинительство, памфлеты о думских глупостях, критику… Единственной определенной чертой, которую Ять за собой знал с гимназических лет, была ненависть к сознающей себя правоте, умение распознать ложь за добротной банальностью, самомнение — за самопожертвованием. Но ведь и эта способность, которую он одно время искренне в себе ненавидел, обозначалась только в чужом присутствии. Втайне он завидовал великим и безвкусным созидателям миров. Если бы Господь, творя мир, заботился о достоверности, вкусе и соразмерности, он едва ли пошел бы дальше прилизанного пустого пейзажа с парой облетевших кустов: чрезмерно все — море, горы, степь, из каждого живого лица торчали ошибки вкуса, как из страницы Леонида Андреева, — и это был мир, который Ять вчуже любил до страсти. Может быть, страсть к избыткам и проистекала от вечного сознания своей недостаточности — а потому он всегда любовался стихиями, бурями и неуправляемыми особями вроде Буркина.</p><p class="p1">Но что Буркин? Разве не от сосущей внутренней пустоты были все его загулы, хождения на медведя, странствия по югу России с цыганами? Никаким любопытством нельзя было объяснить его игру в харьковском театре, полет на аэроплане, службу подручным в одесской фотографии (вернувшись, показывал у себя целую выставку — обыватели со страшными застывшими рожами, еврейские семилетние вундеркинды, с необъяснимой, еще до всякой судьбы, тоской в глазах, — ни одного человеческого лица, и Буркин словно радовался, демонстрируя все это: Ять впервые тогда усомнился в его доброте). Пустота сосала всех, без нее и писать не стоило. Люди с внутренним содержанием шли в бомбисты. Изначальный порок был и в его развитии — очень рано он пришел к тому, к чему другие продираются годами. Мореплаватель отправляется в долгое странствие, попадает в бури, увязает в живых хищных водорослях, чудом спасает судно из льдов, сходится с кровожадными дикарями, до поры не замечая их людоедства, — и, проплыв вокруг света, возвращается в исходную точку, в порт, в дом, где за три года его отсутствия все осталось оскорбительно неизменным; и там, в этой точке, стоит печальный всезнайка, которому с самого начала известно, что всякий, начавший путь отсюда, вернется сюда. Так сам он мыслил свою неспособность к обольщениям и об этом написал рассказ, удостоившийся одобрения Грэма (с неизменным постскриптумом: «Я развернул бы иначе, чтобы и в доме, где его ждут, были свои дикари, льды и тигры, — вы понимаете?!»). Но свои льды и тигры Ятя не утешали — он привык считать себя и свою участь тайно ущербными. Пусть он с рождения знал, что дружелюбные дикари на самом деле людоеды, а изумрудная и синяя глубь таит в себе тысячи жадных щупалец, хищных ртов и глаз, иерархию всеобщего поедания, — но мореплаватель знал обольщения и потому был богаче; пусть он пришел в исходную точку — но ведь смысл путешествия никак не в его цели. Всякий круг замыкается, но тот, кто описал круг, — видел больше, чем тот, кто стоял на месте. Был бы он приличный человек, подписывался бы Добро или Веди.</p><p class="empty-line"/><p class="p1">Испугался он — и то ненадолго — только пятого января, когда все тот же Стрелкин ворвался к нему с новостью об упразднении всей старой орфографии. День был для Ятя неприсутственный (он относил колонку по вторникам, обзоры сдавал по четвергам), и можно было до вечера писать, а часам к восьми отправиться в карточный клуб на Английской набережной; закрыть его грозились давно, но руки не доходили. Стрелкин в доказательство (без которого поверить ему было решительно невозможно) прихватил первый в новом году номер «Правды». Публикация декрета сопровождалась небольшой статьей Чарнолуского, разъяснявшего, что отмена орфографии есть мера сугубо временная, служащая для преодоления барьера между грамотными и неграмотными жителями России. После того, как ученые-марксисты разработают новые, подлинно демократические орфографические правила, правописательная норма будет восстановлена. Чарнолуский писал также, что употребление старых орфографических правил, не говоря уж о ятях и ерах, будет трактоваться как монархическая пропаганда. Юмор положения заключался в том, что статью народного комиссара тиснули без единой правки: в двух местах Чарнолуский машинально употребил ер, в одном — ять, и почти все запятые перед «что» были у него пропущены, а кое-где, напротив, торчали лишние.</p><p class="p1">— Ну? Как вам это? — От холода и возбуждения Стрелкин так и цвел румянцем.</p><p class="p1">— Круто взялись, — покачал головой Ять. — Сначала, стало быть, отменили судебные законы, а теперь — законы природы. Начинать — так с нуля. Одобряю. По крайней мере, не зря называются радикалами.</p><p class="p1">— Вы это серьезно?</p><p class="p1">— Где уж серьезней, Коленька. По совести вам скажу: тридцать пять лет живу на свете, а зачем орфография — не знаю.</p><p class="p1">— Вы же издевались над всеми, кто писал полуграмотно! — уколол Коленька.</p><p class="p1">— Да мало ли над кем я издевался. Почему «не убий» — могу понять, «не укради» — тоже, а вот почему бледный бес через ять пишется — никак в толк не возьму. Витте сажал по три ошибки в строке, а ничего, справлялся. У меня было тайное соображение, что соблюдение орфографических законов как-то связано с уважением нравственных, — но это так же наивно, как полагать, будто человек законопослушный всегда становится образцом морали. Я столько знал отъявленных мерзавцев, никогда и ни в чем не преступивших закон… В общем, думал я, думал — и пришел только к одному: грамотность — это свидетельство покорности. Что вот, мол, готов человек к послушанию: знаете эту историю, как в каком-то знаменитом русском монастыре — чуть ли не в Оптиной — молодому монаху назначили в послушание выдергивать на огороде неспелую морковь и сажать обратно ботвой вниз?</p><p class="p1">— Чушь какая.</p><p class="p1">— То-то и оно, что чушь. Он сажает, сажает, а потом и не выдержал: святой отец, говорит настоятелю, да неужели она от этого лучше будет расти? А святой отец ему: да нет, миленький, она-то не будет, а вот ты — да. Делаю, ибо абсурдно. То есть… как бы вам сказать, Коленька. Орфография — явление религиозное, вроде соблюдения поста, но в нашей с вами штатской жизни. Бессмысленное послушание, которое я сам на себя наложил. Так что люди, пишущие грамотно, это в некотором смысле кроткие люди… даже когда держиморды. Знаете, почему я в конце концов не против этой отмены орфографий в государственном плане? Пусть это станет совсем уж добровольным делом. Хорош только тот гнет, который я сам на себя взвалил. Ведь они и религию упразднили, и этим сделали ей большое одолжение. Во всей Европе вера в упадке, а у нас она станет пламенной, пойдет в катакомбы…</p><p class="p1">— Да разве это хорошо?</p><p class="p1">— Почему нет? Все лучше, чем гимназические молебны. Хорошо бы эти марксисты подольше не разрабатывали свои новые правила, потому что я ведь знаю, чего они наработают.</p><p class="p1">— По «Правде» судя, половину существительных исключат, а остальные заставят писать с большой буквы, — хохотнул Коленька — На немецкий манер. Но я-то про другое. Это сколько же учителей останется без работы? Вам, Ять, хорошо рассуждать, а я учительский сын… И ваше Общество словесников, как я понимаю, тоже теперь должно распуститься — профессуру пошлют лед колоть, не иначе.</p><p class="p1">Ять нахмурился.</p><p class="p1">— Вот черт… Об этом я и не подумал, садовая голова…</p><p class="p1">Слова Стрелкина подтверждали его худшие опасения насчет себя: он никак не мог приучиться думать о других людях, тем более об их пропитании.</p><p class="p1">— Вообще, знаете, — сказал он после некоторого раздумья, — Чарнолуский действительно мог не сообразить. Он человек настолько пустой, что сроду не учитывает последствий. Я ведь знаю его немного.</p><p class="p1">— Вы — его? Откуда? Ять подошел к книжной полке.</p><p class="p1">— Вот, у меня даже экземпляр сохранился. Он издал в девятом году пьеску, что-то из французской королевской жизни. Прислал мне. Я вел тогда книжный отдел у Григорьева. Ну, и написал — подает, мол, надежды, все-таки лучше пьесы писать, чем прокламации… Вы не поверите, до чего он был польщен. Прислал рукопись еще одного своего шедевра, а после амнистии тринадцатого года лично посетил. Переписка у нас была нерегулярная, а встреча вышла теплая: он был тогда безобидный, большевиков ругал… Все говорил, что на Капри мог спасти судьбу России, а ему не дали и кружок разгромили.</p><p class="p1">— И с тех пор не видались?</p><p class="p1">— Да откуда же, он с тех пор опять все по заграницам… И с большевиками помирился, кстати. Никаких прочных эмоций, он бы и кровному врагу через месяц простил. Добрая душа.</p><p class="p1">— Так сходите к нему, — предложил Стрелкин. — Вас он примет. Говорят, всех принимает, а с вами еще и дружен…</p><p class="p1">— Примет, как же! Он теперь шишкой заделался. Народный комиссар всего образования, можете вообразить?</p><p class="p1">— Ять! — Стрелкин смотрел на него укоризненно. — Ять, вы можете от голодной смерти тысячи человек спасти — и сидите в норе! Ведь их теперь, как монахов, выгонят на работы!</p><p class="p1">— Да чего вы все так боитесь? — в упор воззрился на него Ять. — Лучше лед колоть, чем так преподавать, как у нас в гимназиях…</p><p class="p1">— У меня отлично преподавали! — не сдавался Стрелкин. — И потом, не забывайте: они ведь все старики! Ладно, что вы сами живете анахоретом, — но ведь там люди, у них дети, в конце концов! Пусть бы дал им работу пристойную или хоть охранную грамоту: на физических работах не использовать до особого распоряжения, пока не введены новые нормы… У вас же там в Обществе сплошь филологи, вы сами рассказывали.</p><p class="p1">— Господи, кому теперь нужны филологи? — спросил Ять не столько у Стрелкина, сколько у потолка. — Мы-то, газетчики, последние дни доживаем…</p><p class="p1">— А потом что?</p><p class="p1">— Тоже лед колоть.</p><p class="p1">— А весной?</p><p class="p1">— Камень дробить, — усмехнулся Ять.</p><p class="p1">— Ну, как знаете. Если бы у меня была возможность попасть к министру и доброе личное знакомство…</p><p class="p1">— Да пойду я, пойду, — раздраженно бросил Ять. — Знаете, как татары говорят? «Судьба такой». И ведь знаю, что бесполезно… Но если вы не продолбите мне голову окончательно, я потом сам себя загрызу.</p><p class="subtitle">6</p><p class="p1">Изо всей своей жизни именно шестое января 1918 года Ять вспоминал потом с наибольшим стыдом. Если бы не визит к Чарнолускому, ничего бы, может, и не было. Только такой пустой, прозрачный человек, как он, мог сгодиться на роль проводника неведомой воли.</p><p class="p1">Чарнолуский сидел теперь в Смольном. Ничего страннее нельзя было придумать. Восстанавливая в уме долгий пеший путь с Петроградской стороны, Ять задним числом придумывал бесконечные спасительные отвлечения: вот тут бы я оскользнулся, подвернул ногу, повернул вспять, тащился бы к дому, цепляясь за стены… тут заглянул бы к Трифонову и, не найдя его, все равно задержался хоть на три минуты, а там меня бы уже не приняли или у комиссара успело перемениться настроение… На всем его пути были раскиданы невидимые препятствия. Самый явный знак — он его даже заметил, но не захотел учесть, — был дан почти сразу по выходе из дома, на углу Большого проспекта: двое темных тискали девку, невысокую и мордатую. Все трое визгливо хихикали в унисон. Как и все, что делали темные, это было особенно, не по-людски мерзко: девку не насиловали — с ней готовились сделать что-то не в пример более гнусное, и она, понимая это, не знала, как себя вести. В самом ее визге, в непрестанном тонком хихиканье прятался ужас. Ей хотелось и сбежать, и попробовать. Темные, когда Ять проходил мимо, уставились на него, оскалившись в одинаковых ухмылках. Все трое проводили Ятя взглядами (в глазах девки мелькнула на миг надежда и мольба, — но, как и всегда бывает в безнадежных ситуациях, все они, включая Ятя, знали, что он не вмешается; да и кого это спасло бы?). Поняв, что он пройдет мимо, девка принялась хихикать еще громче, а двое темных, замершие было, вернулись к своему занятию. Тут-то и можно было остановиться и помешать неизбежному — не ради девки, в конце концов, а ради отмены губительного визита. Но нет, он тащился себе через мосты, не встречая никого из знакомых, оскальзывался (день был серый, оттепельный, вязкий), но упрямо продвигался к цели.</p><p class="p1">В те первые месяцы охрана Смольного была поставлена из рук вон худо. Только предельной усталостью всех и вся можно было объяснить то, что никто не попытался проникнуть туда с целью убийства или переворота. Два смеющихся матроса стояли у входной арки; Ять сказал, что ему назначено, и назвал магическую фамилию. То ли вид его был слишком непрезентабелен, то ли подействовало магическое слово «назначено», — тогда вообще сильно действовали слова, — но он и тут прошел беспрепятственно, не будучи ни о чем спрошен.</p><p class="p1">У Чарнолуского, при огромном кабинете в третьем этаже, была теперь своя приемная, секретарша с ремингтоном, стенографистка — Ятя еще умиляло поначалу, как, не в силах обзавестись никакими преимуществами власти, все они спешили заполучить ее невинные атрибуты. Преимуществ негде было взять — ели то же, что и все, одевались Бог знает во что, неделями не меняли белья, — но к их услугам были голодные девочки-ремингтонщицы и множество огромных пустых помещений. Позже, когда поток просителей стал увеличиваться с каждым днем, ибо упрочилась репутация Чарнолуского как главного либерала, он стал принимать и дома, где также завел секретаршу и стенографистку, потому что мысль для новой речи могла осенить его в любое время. Приемная была пуста, только блеклая девушка в розовой вязаной кофте сидела в углу за огромным, отчего-то бильярдным столом — обычных столов такого размера, видимо, не нашлось. Из одной лузы торчала кипа свернутых в тугие трубки бумаг, в другой, болтался стакан со вставками и карандашами.</p><p class="p1">— Александр Владимирович диктует, — сообщила секретарша, однако встала и пошла доложить (просителям давалось понять, что ради их нужд комиссар готов прервать даже столь исключительное занятие, как диктовка).</p><p class="p1">Ждать не пришлось. Дверь снова открылась, и девушка посторонилась, пропуская Ятя. Чарнолуский ходил по огромному голому кабинету, не прерывая диктовки. В руке у него был полупустой стакан черного остывшего чаю, — и по мере его опустошения диктующий делал все более резкие жесты, не боясь уже расплескать драгоценный стимулятор, носивший, однако, характер скорее символический. Марксист-декадент был символистом во всем. Власти он предпочитал символы власти, действиям — образы действий, и теперь он пребывал в образе революционного трибуна, не спавшего третью ночь и диктующего сотое, уже вполне бесполезное воззвание. Внизу пальба, вот-вот ворвутся, последние из вернейших едва сдерживают натиск правительственных войск. Народ, вчера еще боготворивший вождя, сегодня предал всех, изменчивый, как фортуна. Продиктовать последние строки — уже не для этих свиней, но для истории.</p><p class="p1">Однако образ немедленно развеялся: Чарнолуский сделал несколько мелких, жадных глотков, вытер усы и на миг остановился, глядя в пол. Вид у него стал добродушный и несколько хомяковатый. Впрочем, он тут же поставил стакан, левую руку сунул в карман френчика, правую вытянул вперед и опять забегал, продолжая:</p><p class="p1">— И вот тогда… тогда французская поповщина, королевская полиция, буржуа-кредиторы всей тяжестью навалились на Луазона. Все они душили умирающего, толпясь, как страшные призраки, в полумраке его спальни. Тщетно поднимал он руки, пытаясь заслониться от них. Тщетно воздевал, как красное знамя, свой пропитанный кровью платок. Сострадания не было ниоткуда. Сегодня, из нашего великого времени, мы смотрим на него, распростертого в бессилии, и кричим ему во весь голос: Луазон, слышишь ли ты нас? Слышишь ли благодарные… нет, поправьте… слышишь ли бодрые голоса тех, за кого ты отдал жизнь? Но нет, он не слышит. Он умирает двадцать пятого сентября 1785 года, один, покинутый всеми, не дожив и до сорока трех лет. И черная камарилья попов, приспешников и любовниц кровавого короля танцует менуэт на его могиле.</p><p class="p1">Чарнолуский поглядел в пол, собираясь с мыслями. Ять вообразил себе камарилью попов, танцующую менуэт с королевскими любовницами, и тоже потупился, чтобы комиссар ненароком не увидел его улыбки. Грешным делом, он понятия не имел о Луазоне. Чарнолуский поднял голову, собираясь продолжить, — и тут взгляд его упал на Ятя (впрочем, весьма возможно, что он заметил его сразу, но не спешил прерывать картинную, приносящую наслаждение диктовку). Лицо его просияло. Протянув к Ятю обе руки, он разлетелся к нему через весь необъятный кабинет, ласково назвал по имени-отчеству и потащил к столу, около которого стояли два изящных кресла, обитых голубым бархатом. Кресла явно были местные, смольнинские.</p><p class="p1">— Рад, рад, рад, — приговаривал он, усаживая Ятя и звоня в колокольчик. Тут же появилась секретарша. — Чайку! — крикнул Чарнолуский (не барственно, а по-товарищески). — Чайку товарищу Ятю! — Он жестом отослал стенографистку, не переставая потирал ручки и все улыбался, и Ятю стыдно было своих плохих мыслей о нем. — Я знал, знал: уж кто-кто, а вы придете. Свой брат литератор всегда разберется, за кем будущее. Да, гримасы, да, перехлесты. Но ведь стихия, стихия!</p><p class="p1">Ять рассеянно кивал, прикидывая, как подступиться к теме.</p><p class="p1">— Я знал, что вы будете наш, — не умолкал между тем комиссар. — Я читал вашу книгу об охранке: удивительно ярко написано! И представьте, я ведь свое дело листал. Буквально все отслежено, вплоть до подарков детям: экая мерзость! Да разве ради одного этого, чтобы все мы увидели змеиный клубок, — не стоило опрокинуть всю махину? Сколько гнили, сколько трухи разом! И ведь многие-то полагали, что здание простоит еще века. Я сам (Чарнолуский понизил голос, даром что в кабинете их было двое), я сам не допускал и мысли, что так скоро и бесповоротно. Теперь-то ясно, что и не могло не удаться, но тогда… Хорошо, что культурные работники придут к нам. Я в вас и не сомневался. Дела довольно, вам по горло хватит…</p><p class="p1">— Я, собственно, не из-за себя, — прервал его наконец Ять. — Про меня договорим еще, Александр Владимирович. Я по поводу декрета об орфографии, вчерашнего…</p><p class="p1">— А, — смущенно захихикал Чарнолуский. — Ну, батенька, это уж не я. Я — это первый декрет, от двадцать третьего. Но коллеги и ухом вести не хотят — что прикажете делать? Ну, тут, может быть, и перехлест. Мера временная. Годика на два, на три, пока не выработаются новые нормы. Просто чтобы крестьянство на первых порах не боялось излагать свои мысли. Мы ведь нуждаемся в сведениях с мест, а люди полуграмотные робеют взять перо в руки.</p><p class="p1">Очевидно, по мнению Чарнолуского, отмена орфографической нормы долженствовала внушить многомиллионному крестьянству тягу к перу: Ять представил стройные ряды крестьян, сидящих отчего-то среди заснеженных полей и старательно царапающих донесения в Смольный.</p><p class="p1">— Я не о самой реформе, — принялся объяснять он. — Целый класс интеллигенции оказался не у дел, у нее сразу отняли сферу занятий… Я к тому, что, может быть, устройство на службу… или хоть разовое вспомоществование…</p><p class="p1">— Это само собой! — оживился Чарнолуский, которому и в голову не приходило такое роскошное благодеяние, мигом позволяющее новой власти реабилитировать себя перед интеллигенцией за прошлые и будущие неудобства. — Это разумеется! Конечно, всем дело найдется. Вы ведь словесников имеете в виду?</p><p class="p1">— Не только словесников. Они как раз не будут обижены: литература же остается, ее-то не упраздняют?</p><p class="p1">Чарнолуский учтиво улыбнулся.</p><p class="p1">— Я скорей о грамматистах, о теоретиках правописания… о корректорах, наконец. Я вообще думаю, что на время огромный отряд ученых-гуманитариев останется без работы. И если бы приискать им занятие… ну, не грубый труд, не к станку, естественно, — но просто переписка, или чтение лекций, или хоть делопроизводство… — Ять тут же устыдился сказанного, представив профессора Хмелева в приемной у комиссара, за бильярдным столом.</p><p class="p1">— Да, да! — воодушевился Чарнолуский. — Огромный отряд, вы неоспоримо правы! Зачем же делать из них наших врагов? Мы пришли вовсе не за тем, чтобы облегчить жизнь пролетариату за счет уничтожения остальных классов. Вы-то не можете не видеть, что интеллигенция бедствовала от Романовых много больше, чем народ. Я имею в виду — не количественно больше, но она имела возможность сознавать… — Тут комиссар понял, что зарапортовался, но перед своим нечего было притворяться. — То есть я имею в виду, что утеснения свободного духа гораздо страшнее, чем телесные лишения. Мы взяли власть для всех, а не для одного класса! И конечно, интеллигенции всегда найдется дело. Чем заниматься мертвой наукой, охранять бездушную норму… представьте себе коммуну. Свободное сообщество интеллигентов, занятых свободной наукой. — Перед мысленным взором Чарнолуского тут же нарисовалась Телемская обитель, где раскрепощенная интеллигенция предавалась философии и музицированию. Все были в свободных, роскошно ниспадающих одеждах, несколько несообразных с климатом, но и климат будущего представлялся ему эллинским, словно только гнет самодержавия и подмораживал страну. — А сколько высвобождается роскошных зданий! — неостановимо фонтанировал комиссар. — Все правительственные учреждения, ненужные ныне дворянские собрания, особняки сбежавших от революции… да в самом скором времени и само государство отомрет — все это можно будет отдать под академии, театры, приюты! Аристократическая богема! — Он лукаво погрозил Ятю пальцем. — Та же фаланстера замученного Чернышевского, но не для ткачих, а для освобожденной интеллигенции. Коллективное творчество, синтез жанров! Небывалая в истории форма художнического сообщества, петербургский Монмартр! Какой же вы умница, что с этим ко мне пришли.</p><p class="p1">Далее Чарнолуский заговорил о возвращении слову «гимнасиум» его исконного смысла, о создании лицеев, подобных пушкинскому, но уже для городской бедноты (ведь только нищета не давала пролетарским детям достигнуть культурных высот — но теперь…). Ять вообразил того же Хмелева или даже полную ему противоположность, маленького горбатого Фельдмана, — нянчащимися с пролетарскими детьми: меняют пеленки, суют соски… Он широко улыбнулся, и Чарнолуский принял это за знак одобрения.</p><p class="p1">— А в ближайшее время их можно было бы обучать… гм! Ремеслам, — предположил он. — И, разумеется, лекции… а возможно, что и создание исторических летописей? Ведь все они — фундаментально образованные люди, а у рабочих неутолимая жажда знаний. — Он потому так ухватился за эту идею, что обнаружил наконец истинное направление своей политики. Прежде он так и не знал, с какого конца подступиться к просвещению, — теперь же все вставало на свои места. Профессура будет на него молиться.</p><p class="p1">— Я не заглядывал так далеко, — смущенно признался Ять. — Я говорил только о небольшой помощи писателям и филологам, и корректорам, если помните…</p><p class="p1">— Ненужных людей нет! — почти грозно вскричал Чарнолуский. — у нас не будет ненужных! Вы верно поступили, обратившись ко мне. И знаете что? Есть на примете превосходный дворец, он пустует который год. Елагин!</p><p class="p1">Это дикое совпадение Ять потом вспоминал как знак судьбы: он тоже в эту секунду подумал о Елагином дворце, расположенном буквально через два моста от его дома. Ять любил прогуливаться на Елагином острове и всегда любовался скромным изяществом его очертаний. Теперь так не строили: дворцы петербургских богачей последнего времени, выстроенные от дурного, стремительно нажитого богатства, отличались безвкусной роскошью без тени гармонии и особенно смущали своей принадлежностью к модерну. Упадок в сочетании с пышностью рождал ассоциацию с древним болотом, в котором гнили толстые стебли колонн и мясистые листья крыш. Елагин дворец, пусть в запустении, выглядел куда жизнеспособнее.</p><p class="p1">— Да, Елагин, — повторил он машинально. — Да, пожалуй.</p><p class="p1">Тут бы ему испугаться того, что его мысли совпали с комиссарскими, — но вместо того, чтобы испугать, это совпадение обрадовало его. Господи, чего он не дал бы, чтобы вернуть ту минуту, — полжизни, всю жизнь! — но тогда, шестого января, он сказал:</p><p class="p1">— Это хорошая мысль. Но ведь там запущено…</p><p class="p1">— Где сейчас не запущено! — вскричал комиссар. — Посмотрите, что делается в домах! Нет, мы дадим людей, мы за двое суток приведем здание в жилой вид. Каков символ! Дворец, принадлежащий императорской фамилии, заселяется тружениками петроградской профессуры! Новая власть отняла у них мертвое дело и дала живое! Я договорюсь, это наши оценят, — будут дрова, паек, всё подвезем. Это я решу, — он придвинул к себе стопу бумаги и принялся быстро писать, величественным жестом велев Ятю оставаться в кресле.</p><p class="p1">Ять попросил позволения закурить и с наслаждением зажег папиросу. Комиссар написал один за другим три документа, под каждым широко и торжественно расчеркиваясь, так что хорошее немецкое перо рвало плохую желтую бумагу. Подписав последнее распоряжение, он прихлопнул по столу пухлой ладонью.</p><p class="p1">— Вот-с! Нечего и оттягивать: у нас без бюрократии. С этим я попрошу вас подойти на второй этаж, к товарищу Андронову, — Чарнолуский был теперь сдержан и официален, но так и светился радостью. — Он решит вопрос о дровах. С этим — к товарищу Воронову, там же, буквально соседняя дверь. Он договорится об охране. И — в добрый путь, как говорится! Если и сами захотите — подумайте, право! Ордер выпишу тут же.</p><p class="subtitle">7</p><p class="p1">Новая государственная жизнь была свободна от сомнений: миры созидались на глазах, посредством слова. Ять хотел было попросить разъяснений, но тут дверь распахнулась, и секретарша, продолжая сдерживать напор невидимого буйного посетителя, крикнула:</p><p class="p1">— Александр Владимирович! Он кричит, что по сверхважному делу…</p><p class="p1">— Пустить немедленно! — только что не взвизгнул Чарнолуский. — Что у вас, товарищ?</p><p class="p1">В кабинет ворвался взъерошенный, грязный человечек в картузе и черном пальто, с красными, лихорадочно бегающими глазками и трехдневной щетиной.</p><p class="p1">— Я… это… экстренно… подать проект! — выкрикнул он. Ять идентифицировал его мгновенно — такие посетители, в массе своей безумцы, нередко осаждали его в газетах и всегда назойливо предлагали те или иные сумасшедшие проекты, иногда стихи. Чаще всего самородки происходили из мещан и быстро спивались. Ужасная вещь искусство, когда им занимается не предназначенный к нему человек: музы губят всех равно, но сколь обиднее гибнуть за всякую чушь…</p><p class="p1">— Что за проект? — участливо спросил Чарнолуский, тоже, кажется, начавший догадываться, кто перед ним.</p><p class="p1">— Об упразднении зимы! Чарнолуский глянул на Ятя и подмигнул.</p><p class="p1">— То есть как об упразднении? — спросил он с лукавой заинтересованностью.</p><p class="p1">— Человек есть двигатель природы! — выпалил посетитель. — Тварь с надеждою ожидает откровения сынов Божиих — Римлянам, восемь, девятнадцать! Попроси — и дастся, скажи — и сбудется! Декретироване вечного лета. Экономия дров — раз! Всевременное плодоношение — два! Загар на лицах, приятная смуглость.</p><p class="p1">— То есть вы предполагаете запретить зиму законодательно? — спросил Ять. Человечек не удостоил его ответом, понимая, кто тут главный.</p><p class="p1">— Дело новой власти не есть освобождение одного только производящего класса, — напористо заговорил он, цитируя, видимо, давно написанный трактат. Грязные, скрученные в трубку листки (тот самый проект) были зажаты в его маленьком жилистом кулаке, которым он жестикулировал — однообразно, механистично, но бурно, как большевистские ораторы. — Не одного только производящего класса, но всей производящей силы природы. Имея силу слов как генеральный способ учредить всякое, поскольку и первичный Создатель сотворял миры посредством словесного произнесения, то и сказать, чтобы не было зимы. И исполнится.</p><p class="p1">— Он остановился резко и неожиданно. Чарнолуский открыл было рот, но человечка так же внезапно прорвало снова.</p><p class="p1">— Новая власть полагает себя в форме разговорных слов! — крикнул он и поднял палец. — Сказав, чтобы не иметь зимы, получим отступление зимы. Необходима печать, подпись. Прошу вашего представления на подпись и печать к тому, от кого зависит. Подумать также о должности комиссара природы, декретирующего, сколько быть урожаю.</p><p class="p1">— Хорошо, — важно кивнул Чарнолуский. — Оставьте ваш проект, я передам наверх.</p><p class="p1">Маленький оратор повернулся на стертых каблуках и стремительно направился к двери. Как все сумасшедшие, он, однако, не мог уйти сразу и уже у дверей так же резко повернулся к комиссару.</p><p class="p1">— Проект раскрепощения скотства! — крикнул он. — Имею также. Корова, конь, коза. Вольность курицы. Отпущение в свободный выпас и выпряжение из упряжи. Конец принудительных яиц, несись вольно. Вспашка машинами, электричество работай, конь гуляй и хвали Бога! Подам после. — На этот раз он убежал окончательно.</p><p class="p1">Некоторое время Чарнолуский выжидал, не прибежит ли посетитель обратно, потом хлопнул себя по ляжкам и расхохотался. Сколько Ять мог наблюдать, у новых вождей принят был захлебывающийся, самозабвенный, преувеличенный смех, словно доказывающий их детскую чистоту. Смеяться надо было с наслаждением, до слез, откидываясь всем телом назад, — и так же резко прерывать хохот, как маленький оратор обрывал свои монологи: делу время, потехе час.</p><p class="p1">— А ведь знаете, батенька, — Чарнолуский взял Ятя за рукав, — в этой народной утопии есть свое зерно. Мы вернули им народного Христа, и этот Христос освобождает не только человека, но и коня, и корову — и даже (тут старый фольклорный сюжет) красавицу-весну из-под гнета жестокого ледяного деда! И потому со временем… почему бы и не отменить зиму?</p><p class="p1">Ять кивнул, улыбнулся и распрощался. Внизу его чрезвычайно любезно принял крошечный бородатый Андронов, сидящий в таком же необъятном кабинете и похожий на кроткого грамотного мужика.</p><p class="p1">— И как мне теперь действовать? — спросил его Ять.</p><p class="p1">— Не беспокойтесь, всё сделаем, — заверил его Андронов, и Ять отправился к товарищу Воронову, за соседнюю дверь.</p><p class="p1">У того кабинет как раз был маленький, словно подсобный, весь продымленный отвратительным зловонным табаком. Воронов некоторое время сверлил посетителя пронзительными недоверчивыми глазками, после чего в упор спросил:</p><p class="p1">— Вы лично могли бы назвать кого-то из профессуры? Кого-то, кто более всего нуждается в немедленной помощи?</p><p class="p1">Самым неприятным в товарище Воронове было то что он производил впечатление человека образованного, более того — казалось, принадлежал по рождению к более высокому сословию, нежели сам Ять. Странно было, что он курил такую мерзость. Лицо у Воронова было холодное, холеное, брезгливое, и первая мысль Ятя была о том, что перед ним — внедренный в большевистскую верхушку монархист, который теперь с откровенным презрением смотрит на интеллигенцию, пришедшую на поклон.</p><p class="p1">— Я мало общаюсь с профессурой, — не очень уверенно сказал Ять. — Думаю, что без работы сегодня практически все классические факультеты, все языковеды, большая часть учителей…</p><p class="p1">— Составьте список известных вам интеллигентов, которые бедствуют больше остальных. Старых, заслуженных, лишенных постоянной работы. Если задним числом вспомните кого-то еще — свяжитесь со мной. Три — шестнадцать — восемь — ноль.</p><p class="p1">Он придвинул Ятю лист бумаги и кивком указал на стул. Ять присел к столу и, макая перо в лиловые чернила, принялся составлять список. В эту секунду еще не поздно было бежать, но под парализующим взглядом товарища Воронова и пером-то водить было непросто, а уж о резких движениях не могло быть и речи. Ять подолгу задумывался над каждой фамилией. В конце концов, он ни с кем из Общества любителей словесности не посоветовался о визите в Смольный: может быть, никто из них вовсе не желал благодеяний от новой власти, более того — изначально речь шла о лекциях, школах или денежных выдачах, но вовсе не об отселении в какую-то коммуну, пусть и отапливаемую. Чувство было мерзкое, словно он доносил на кого-то. Поразмыслив, Ять перечислил имена, известные всякому образованному человеку в России, указывая в основном старых и одиноких. У семейных был шанс продержаться, а каково одиночке, он знал по себе. Сляжешь — никто воды не подаст. Когда Ять вышел из Смольного, на душе у него было смутно. Все было и смешно, и мило, и на первый взгляд гуманно, и притом так невозможно глупо и самодовольно, что никак нельзя было ждать ничего хорошего. Оставалось надеяться на то, что дальше утопических прожектов вроде создания Телемской обители на Елагином острове или упразднения зимы дело не пойдет. Но Ять плохо знал социалистов нового поколения, у которых от зарождения утопии до ее немедленного осуществления редко проходило больше суток.</p><p class="subtitle">8</p><p class="p1">Елагин остров, самый малый и болотистый из островов Невы, в первые семьдесят лет существования Петербурга был безымянен и с 1717 года принадлежал Шафирову, Петрову любимцу из жидов; Шафиров, как и все его племя, к землеустроению имел вкуса менее, чем к интригам, и в 1724 году передал узкую полоску земли длиною в десять верст генерал-прокурору Ягужинскому. Тот отдал ее, по-прежнему безымянную, в полное владение сыну, а сын переуступил князю Мельгунову, в чью честь остров и прозывался в последующие двадцать лет; после купил его Потемкин, но у него были дела в Крыму, и до благоустройства островка все не доходили руки. Ивы, лопухи и болотная трава разрастались на глинистой почве, в зарослях бегали зайцы, случался лось. Во время наводнений вода покрывала Мельгунов остров чуть не целиком, оставляя по себе следы бедствия — бревна и водоросли. Наконец во владение неухоженным, но живописным куском земли вступил обер-гофмейстер Екатерины, директор придворных театров Иван Порфирьевич Елагин — и остров по справедливости получил его имя.</p><p class="p1">В 1817 году Александр Павлович выкупил остров у потомков Елагина за изрядную сумму и на месте деревянного дворца замыслил строить каменный. Остров надобен был ему для того, чтобы разместить на нем летнюю резиденцию возлюбленной матушки Марии Федоровны. Дорога до Павловска занимала часа три, от езды Мария Федоровна скоро уставала — остров же был близко, в трех верстах от Зимнего дворца. Любящий сын пригласил знаменитого итальянца Росси и лично наметил, чему где надлежит быть в трехэтажном каменном дворце. До пятидесяти человек могло разместиться в просторном и светлом здании; особо государь распорядился, чтобы при разрушении деревянного дворца и постройке нового не тронули подземных ходов. Шел слух, что затейник Елагин изрыл подземными ходами весь остров и из дворца можно было извилистыми путями добраться до самых неожиданных мест — то выйти на дикий брег, то вдруг очутиться в дубовой роще, а то и под самым мостом, соединявшим Елагин с Петербургскою стороной. Но это, скорей всего, врали.</p><p class="p1">К началу нового столетия остров и дворец пришли в запустение. Елагин являл собою дивный естественный сад на краю Петербурга, нечто вроде искусно воссозданной руины среди регулярного парка. Луг перед дворцом зарос, беседка среди пруда грозила обрушиться, столбы ее позеленели; храбрым мальчишкам случалось доплывать туда на доске. Пруды покрывались ряской, медленно разрушался и сам дворец, населенный одними призраками великолепных времен. Странно было думать, что теперь дворец оживят. Впрочем, ежели вдуматься, более достойных жильцов, чем старомодные одинокие профессора, было для него не найти. Никто иной с тамошними призраками попросту не столковался бы.</p><p class="empty-line"/><p class="p1">Утром восьмого января матросы с броненосца «Стремительный», стоявшего у Английской набережной и всем экипажем перешедшего на сторону Советов еще в августе, по приказу комиссара просвещения принялись обходить петроградских филологов по списку. В списке после краткого совещания с товарищем Вороновым оставлены были люди одинокие и пожилые да небольшое количество творческой молодежи — для придания коммуне видимости организации молодой и жизнеспособной.</p><p class="p1">Процедура спасения выглядела своеобразно: обезумевший от страха, но старающийся держаться с достоинством профессор открывал дверь на грубый матросский стук и получал предписание в двадцатичетырехчасовой срок переселиться в хорошо отапливаемую санаторию, где ему будет предложен специальный академический паек и работа на благо победившего пролетариата. Уклонение от этого благодеяния будет расцениваться как саботаж, ибо новая власть не желает, чтобы научные кадры вымирали в холоде и безвестности. Был обещан медицинский уход, разрешалось взять с собою произвольное количество книг и личных вещей, гарантировались же все эти льготы и пайки личной подписью народного комиссара просвещения под ремингтонированным обращением к петроградским ученым.</p><p class="p1">Большинство облагодетельствованных восприняли новую меру народной власти как давно ожидаемый арест: варвары не склонны были терпеть представителей старой культуры и решили свести с ними счеты. Профессура собрала необходимое и приготовилась к худшему.</p><p class="p1">Дивное зрелище являли собой эти сутулые, угрюмые люди, еле ползущие по родному городу под охраной! С Васильевского, из Университетских казарм, с набережной Пряжки, с Невского, с Морской и Преображенской вели их в обитель совершенного счастья. Иные шли прямо, упрямо, с вызовом глядя в снежную тьму; иные оглядывались по сторонам в твердой уверенности, что в последний раз видят свой город.</p><p class="p1">К одиннадцатому января в коммуну заселились первые двадцать человек. Уже десятого, по приказанию комиссара просвещения, была разобрана на дрова гауптвахта, стоявшая на краю острова и исторической ценности не представлявшая; гостевые комнаты на втором этаже были распределены — и многие еще остались свободными. Из давно пустовавшей гостиницы «Приют рыбака», что на Лодейной, перетащили кровати, одеяла, белье: матросы, жалея старичков, работали споро. Едва ли было в Петрограде в январе восемнадцатого года помещение более благоустроенное, нежели Елагинская коммуна, — разве что инвалидный дом на Таврическом, где обитали раненые борцы за мировую революцию. Но от раненых бойцов толку не было, они знай себе пили (где только доставали?) да горланили непристойности; а жителям Елагиной коммуны надлежало создавать культуру для нового времени и примирять вековую традицию с бурлящей, кипучей современностью, как поведал собравшимся лично нарком вечером одиннадцатого января.</p><p class="p1">Чарнолуский долго выбирал обращение («товарищи» было неуместно, «господа» — откровенное заискиванье). Наконец он остановился на невинном «коллеги!». Прежде всего он посулил полную свободу и совершенное благоприятствование, почтение к былым заслугам и регулярное питание («Вот здесь, в этой пленительной овальной столовой, где прежде наслаждались незаслуженным изяществом и роскошью цари и их прихвостни, — теперь сможете собираться вы, подлинная гордость нации!»). На вопрос, дозволяется ли покидать коммуну, был дан безоговорочно положительный ответ. Комиссар покаялся даже, что новая власть, на знамени которой начертано не только слово «свобода», но и священное слово «гуманность», не сразу смогла заняться насущнейшим вопросом прокорма и обогрева интеллигенции, — «но, как вы понимаете, столь полное переустройство жизни предполагает внимание ко всем сферам бытия, и не всегда поймешь, с чего начать».</p><p class="p1">— Позвольте вопрос, — поднялся автор популярного толкового словаря Долгушов. Он говорил медленно, с отступлениями, как люди недавнего века, еще уверенные, что у них много времени. — Вы утверждаете, что ваша главная задача — сохранение культуры, если я верно мог понять ваш тезис. Но как тогда объяснить ваше решение поместить всех нас в Елагин дворец, — памятник старого времени?</p><p class="p1">— Я понял, понял вас, — торопливо прервал его Чарнолуский. Он уже на середине долгушовской речи успел сообразить, как ответить на эту подковырку. Отвечать старику надо было медленно и пространно, в его духе. — Вы совершенно точно заметили, что именно культурными людьми и должен быть заселен дворец-памятник. Тут метафора всей нашей культурной политики, если угодно. Что лучше: постепенное разрушение и запустение дворца, находящегося в распоряжении правящей фамилии, — или передача его в собственность культурному учреждению, занятому выработкой новой языковой нормы?</p><p class="p1">— И то сказать, — шепнул Долгушову фонетист Кривицкий, — лучше мы, чем хамы! Долгушов промолчал.</p><p class="p1">— Но уж посудой извольте озаботиться! — крикнул с места Хмелев. — Я с музейного фарфора не ем!</p><p class="p1">— Завтра же будут привезены оловянные солдатские миски, — успокоил его Чарнолуский. — Я полагаю, это не унизит вашего достоинства? Ведь речь идет о сохранении музейного сервиза!</p><p class="p1">Он не мог не съязвить: старик уж очень явно не желал ценить благодеяния. А ведь, между прочим, хотя дрова ничего и не стоили новой власти, но гауптвахту разобрать, да еще и на холоде, — тоже работа. В Чарнолуском вспыхнула внезапная ненависть ко всем этим людям, которые, занимаясь всю жизнь десятистепенными вещами, ни секунды не бедствовали, прекрасно уживались с царизмом, а теперь воротят нос от попытки дать им дружный, творческий быт!</p><p class="p1">— Одного не пойму, — выпрямившись во весь свой немалый рост, ядовито спросил профессор Алексеев. — Чем вам помешал ять — догадываюсь: все неучи на него роптали. О другом скажите: неужели вы впрямь верите в письмо без правил? Весь мир блюдет законы орфографии, без нее люди разучатся понимать друг друга..</p><p class="p1">— Вы же понимаете, что это временная мера, — сдержанно произнес Чарнолуский. — Я и сам считаю, что некоторая чрезмерность… Вам известно, что первый проект реформы — мой — дружно был проигнорирован… Сегодня, чтобы тебя услышали, надо стрелять из пушки. Невозможно сомневаться, что орфографическая норма будет создана заново. Это ваше дело, ничье более. Я верю, что мы выработаем общий язык!</p><p class="p1">Чарнолуский хихикнул, но его никто не поддержал. Он поклонился и уехал, утешая себя тем, что до открытой конфронтации дело не дошло, а приручение интеллигента, в конце концов, — вопрос времени.</p></span>
