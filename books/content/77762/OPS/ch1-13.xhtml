<span id="id4"><div class="title1">
<p class="p">Действие второе. Беглый гласный</p>
</div><div class="epigraph">
<p class="p1">«Пляшет перед звездами звезда,</p>
<p class="p1">Пляшет колокольчиком вода,</p>
<p class="p1">Пляшет шмель и в дудочку дудит,</p>
<p class="p1">Пляшет перед скинией Давид».</p>
<p class="text-author">Арсений Тарковский</p>
</div><div class="epigraph">
<p class="empty-line"/>
<p class="p1">«Колебания, которым подвержено множество многих доблестных людей, объясняется тем, что смерть по-разному предстает их воображению. Единственное, что в силах разума, — это посоветовать от нее взоры и сосредоточить их на чем-нибудь другом. Не так давно некий лакей удовольствовался тем, что пустился в пляс на том самом эшафоте, на котором его должны были колесовать».</p>
<p class="text-author">Ларошфуко</p>
</div><div class="epigraph">
<p class="empty-line"/>
<p class="p1">«Я так озлобился, что сегодня толкнул маленького мальчишку. Прости мне, Господи».</p>
<p class="text-author">Александр Блок. Из дневников</p>
</div><p class="subtitle">1</p><p class="p1">Многие и тогда, и потом задавались вопросом: отчего в 1918 году так много было случайных встреч, романных совпадений, отчего все герои тогдашней прозы постоянно сталкивались на необъятном российском пространстве, словно вся грандиозная катавасия для того только и затевалась, чтобы какой-нибудь Иван встретился с Катей и продолжал с маниакальным упорством обнаруживать ее везде, куда бы ни сунулся, — так что под конец потрясенному читателю начинало казаться, что в России, кроме Ивана с Катей, никого особенно не было? Сидят они, положим, в своем Петрограде или на даче в 1916 году, и разыгрываются между ними обычные для того времени комнатные страдания: у него сомнения, у нее запросы, и вообще ей больше нравятся военные. В семнадцатом году она отправилась к тетке на юг, он остался в городе и шляется по улицам, как помешанный, присоединяясь то к одной, то к другой толпе, — но и толпы шатаются так же, не зная, куда бы влиться. Рано или поздно при таких делах начинают постреливать, и Иван, не желая уезжать на юг, где есть шанс увидеться с Катей, успевает завербоваться в экспедицию какого-нибудь Чулюкина, исхитрившегося убедить Временное правительство в необходимости срочного изучения быта северных народностей.</p><p class="p1">Но не успели они доехать еще до ближайшей северной народности, как в Архангельске настигает их весть о петроградском перевороте. В экспедиции, естественно, раскол. Одни, как Чулюкин, уверены в необходимости далее следовать намеченным маршрутом: какая бы ни была в России власть, а истинным интересам страны служит прежде всего честный ученый. Другие разворачиваются и — в Петроград, в водоворот событий. Кому какое дело до ваших северных народностей! Иван мучительно колеблется, но тут встречает Катю. Катя, что с тобой, как ты попала в Архангельск из Мучкапа? Ах, видишь ли, тетя больна, дела наши совсем расстроены, и ее новый муж, адвокат Красновский, так на меня смотрел… а как раз на соседней улице остановился вернувшийся с фронта поручик Черенцов, у него там сестра. И… но ты понимаешь, конечно, ничего серьезного… он уехал сюда в британскую миссию — куда мне было бежать? И вот я здесь. Познакомься, Алексей. Черенцов щелкает каблуками, зубами, глазами. Разрешите откланяться. Катрин, не задерживайся, я буду ждать.</p><p class="p1">Ну тебя к черту, Катя, сердито бросает Иван. Не сердись, глупый, говорит она ему со снисходительностью взрослой женщины (ну как же, с поручиком!..). Мы еще увидимся, когда будем достойны друг друга… а пока нас несет, как сухие листья, нет у нас родины, нет нам изгнания.</p><p class="p1">Ивану теперь совершенно не до народов Севера. Ах так, отлично, говорит Чулюкин, играя желваками. С ним осталось всего пять человек, но ничто не остановит исследователя. С горсткой вернейших выходит он из Архангельска и пропадает из поля зрения повествователя, затертый где-то во льдах, в «Ниве», во «Всемирном следопыте». Обратно в Питер Ивану не хочется — он едет на Украину, намереваясь оттуда пробраться за границу. В бесконечных, битком набитых, непредсказуемо останавливающихся и трогающихся поездах, с пересадками, спотычками и провалами беспамятства добирается он до Харькова, и первая, кого он там видит, — Катя! Черенцов бежал со своими англичанами, она уехала со Злотником (Авраам, это Ваня, я вам рассказывала, наши матери дружили когда-то). Ах, матери. Больше нас, значит, ничего не связывает. Ну что ты дуешься, глупый, — зачем ему знать о нас больше? Авраам ездит по югу, скупает продукты, собирается обменять в Петрограде… вообще человек темный, но с задатками. Хорошо же, Катя. Вот до чего ты докатилась. Кстати, знаешь, Ваня, где я тут остановилась? Нам (о, проклятье!), нам сдала комнаты местная учительница, двоюродная сестра твоего Чурю… Чири… Чулюкина, черт бы тебя побрал! Не сердись, милый.</p><p class="p1">Я не сержусь, милая, сквозь зубы отвечает Иван и тут же вступает в Добровольческую армию, которая как раз случилась тут неподалеку. Жестоко разочаровавшись в архаичном, напыщенном, далеком от народа «Белом Деле», не веря в любовь, не видя будущего для России, он дезертирует и с отчаяния пополняет собою банду местного батьки, романического типа по прозвищу Шаравый. Он сожительствует с цыганкой, устраивает по ее капризу показательные расстрелы и питается кокаином. Однажды Ивана вызывают в штаб Шаравого: нужно допросить странного человека, побиравшегося по селам. Может быть, он шпион? Во всяком случае, выдает себя за англичанина. Иван приходит в штаб и видит Черенцова. Глаза их встречаются. Черенцов понимает, что ему конец. Иван понимает, что благородство в нем сильнее жажды мести. Да, этот человек действительно англичанин, я узнаю его лондонское произношение. Отпустите его. Отпустить, говоришь? Нет, пущай с нами остается, воюет, по-своему нас учит. Мы ведь рано или поздно до самой его Англичании дойдем. Улучив момент, поручик сквозь зубы по-английски говорит Ване: «I shall remember you for it!» В голосе его слышится не столько благодарность, сколько угроза. В первом же бою Черенцов перебегает к красным. В этом бою тяжело ранят и Ваню. Подбирают его уже красные, и первая, кого он видит, — медсестра по имени Катя. Конечно, Злотник оказался мерзавцем (как будто он мог оказаться кем-то другим!). Мгновенно перекрасившийся Черенцов клевещет на Ваню, объявляя его злейшим контрреволюционером и правой рукой Шаравого. Но красный командир, бывший ученик Чулюкина (в те еще времена, когда тот преподавал географию в московской гимназии), с помощью Кати восстанавливает историческую справедливость. Черенцова уводят в расход (он оглушительно щелкает зубами), а Иван оказывается в штабе. Нам грамотные нужны.</p><p class="p1">Рассказывать ли, как, убоявшись красных жестокостей и долгих, нудных, бессмысленных дискуссий с учеником Чулюкина, Иван дезертирует и оттуда? Как пробирается в красный Петроград и устраивается в новую экспедицию, идущую на поиски предыдущей? Как в конце концов по легендам северных народностей он находит странного белого человека, прошедшего тут три года назад, и наконец обретает Чулюкина — совершенно очукчившегося, женатого на северной девушке, которую туземцы называют Сон О Полете Пчелы Вокруг Оленя. И добавлять ли, что в этой девушке он скоро узнает Катю, которая и говорит ему наконец: вот час и настал, теперь ты не мальчик, но муж?</p><p class="p1">Ах, оставь, Катя. Какой я теперь муж? Вечно мы называем мужем того, у кого не осталось надежды… Прощай, Катя, я никогда не мог застать тебя одну, но и никогда не мог избавиться от тебя вполне. Всюду, куда я ни ткнусь, ты будешь торчать на моем пути, — и я готов поспорить, что первая, кого увижу на американском берегу, сбежав в Америку, будешь ты, в обществе двоюродной сестры Чулюкина. Но слышишь ты это оглушительное щелканье бича за порогом чума? Ах нет, милый, ничего страшного, это пастух ведет оленей… Нет, Катя. Так щелкать может только Черенцов, чудесно спасшийся, навеки завязанный с нами в единый узел. Нам никуда не деться друг от друга. Прощай, Катя.</p><p class="empty-line"/><p class="p1">…А между тем прибыли на темный симферопольский вокзал, удивительно людный для двух часов ночи: представители Таврической республики суетились у поезда, выгружая консервы, музыкальные инструменты и кумач. Товарищ Рыленко, сразу ставший необыкновенно начальственным, беседовал возле штабного вагона с председателем крымского Совнаркома. Ятю, Грэму и Маринелли он неопределенно махнул куда-то в конец платформы — там должна была их ждать крымская комиссарша просвещения; самому Рыленко было не до попутчиков. Из тихого, секретного разговора предсовнаркома Крыма с московским гостем Ять уловил только испуганный вопрос крымчанина о немцах и решительное уверение Рыленко: «Сюда — не войдут». Грэм, поманив за собой Маринелли с Ятем, сделал шагов пять в указанном направлении, после чего стремительно юркнул в щель между станционными постройками и оттуда шипящим шепотом позвал:</p><p class="p1">— Да сюда же, черт…</p><p class="p1">— Вы что, не пойдете к комиссарше?</p><p class="p1">— Только затем я и тащился полторы тыщи верст, чтобы увидеться с комиссаршей… За мной! Ять покорился.</p><p class="subtitle">2</p><p class="p1">Теперь во влажной, непроглядной крымской ночи, еще холодной, но уже явственно пахнущей кипарисами и пробуждающейся землей, Ять и Маринелли шли за Грэмом, всецело доверившись его сверхъестественной памяти. По долгим скитаниям он знал в Крыму каждый куст и уж точно каждый кабак — все дальше отходя от вокзала, они проплутали с четверть часа по узким и запутанным улочкам, пока не вышли к дукану, распространявшему вокруг себя дивный аромат жареного мяса и кофе. Видимо, Грэм, гордившийся тонкостью обоняния, с самого начала шел на этот запах. Дверь дукана была прикрыта, занавески задернуты — сквозь них сочился багроватый свет. Грэм решительно толкнул дверь.</p><p class="p1">— Здесь друзья, — сказал он, обернувшись, — и здесь нам будут рады.</p><p class="p1">Они вошли в тесное, душное помещение, где с трудом помещались восемь крепких деревянных столов с деревянными же черными скамьями; в углу шипел мангал, кидая на стены кровавые отсветы. Более средневекового трактира Ять не видывал сроду. За столами, на которых плавали в плошках коптящие фитили, сидело человек пять посетителей — публика самого разбойничьего вида; один, обхватив голову руками, угрюмо раскачивался из стороны в сторону и по временам коротко подвывал, словно от зубной боли, еще трое неподвижно сидели над массивными глиняными кружками, иногда одновременно приподнимая их, содвигая в воздухе, отхлебывая и вновь погружаясь в неподвижность, — один, самый худой и длинный, спал на спине, прямо на лавке, и его чудовищно длинные ноги свисали на пол, а лицо было закрыто шапкой. У мангала в такой же фундаментальной неподвижности стоял темнолицый усатый кавказец, время от времени снимавший с огня готовую порцию мяса. Вельзевул, поворачивающий грешника над пламенем, не мог бы держать себя с большим достоинством, чем владелец ночного дукана.</p><p class="p1">— Это «Адова жаровня», — шепнул Грэм Ятю. — Лучший из подпольных кабаков в этой части полуострова. Хозяин промышляет скупкой контрабанды, и говорят, на его совести многое.</p><p class="p1">— Жарит-то хоть не человечину? — так же, шепотом, поинтересовался Ять.</p><p class="p1">Грэм посмотрел на него с тягостным недоумением и ничего не сказал. В его сказку подобные детали не вписывались. Он решительно подошел к дуканщику и тихо, но со значением сказал:</p><p class="p1">— Добрая ночь и скорое известие.</p><p class="p1">Вельзевул и бровью не повел в ответ на этот явный пароль. Выдержав паузу, — вероятно, служившую отзывом, — он повернул к Грэму тяжелую голову и негостеприимно спросил:</p><p class="p1">— Что хочешь?</p><p class="p1">— Со мной — двое, — быстро сказал Грэм. — Эти люди знают. Дай пищи, вина — что сможешь; кто дает путнику — дает Богу.</p><p class="p1">— Деньги есть? — прямо спросил дуканщик, не желая ничего давать Богу.</p><p class="p1">— Отплата придет, и Совет знает, — без прежней уверенности в голосе произнес Грэм; Ять чувствовал, что он начинает юлить. Сочинитель явно увлекся проживанием новой новеллы — таинственная таверна, ночь, пароль, — но прозаическому кавказцу не было до новелл никакого дела. Мясо тут подавали за деньги.</p><p class="p1">Как ни странно, первым об этом догадался Маринелли. Он извлек из кармана горсть мятых керенок и помахал перед дуканщиком. Тот, совсем уж негостеприимно смотревший на Грэма, сменил гнев на милость:</p><p class="p1">— Садитесь, сейчас…</p><p class="p1">Они уселись за стол, казалось навеки пропитавшийся жиром. Грэм снял тяжелое черное пальто, Маринелли только расстегнулся — житель благословенной Италии вечно мерз.</p><p class="p1">— Есть люди, — сказал после паузы Грэм, — подобные грецкому ореху. Вы видите скорлупу — и вам странна сама мысль, что под нею может быть что-нибудь, кроме грубой и складчатой древесины; но вы раскрываете ее…</p><p class="p1">Он замолк, переполненный благодарностью. Хозяин хмуро поставил перед каждым из них глиняную кружку, в которой плескалось темное, кисло пахнущее вино, — и железную тарелку горячего пряного мяса.</p><p class="p1">— Нас разорят тут, — предупредил Ять.</p><p class="p1">— Я рассчитываю выбраться отсюда на ближайшем корабле, — беспечно ответил Маринелли. — Надо потратить русские деньги — уже через три дня они сгодятся мне только для коллекции.</p><p class="p1">Маринелли ел быстро, жадно, не стараясь растянуть удовольствие, Грэм — осторожно, деликатно, как аристократы в кинодрамах; Ять научился в последние полгода извлекать из еды максимум наслаждения, разжевывая каждый кусок, и почти забыл о счастье стремительного насыщения. Теперь, в «Адовой жаровне» — если Грэм не выдумал этого названия, — он физически чувствовал, как расправляется, оживает мозг, как радуются обоняние, зрение, вкус, дорвавшись наконец до подлинной пищи: глаз — до своей, вкус — до своей. После первой кружки Ять ощутил счастье. Грэм между тем, покончив с бараниной, оглядывался по сторонам в поисках сюжетного развития — и тут же обнаружил героя: несчастный посетитель, раскачивавшийся с подвываниями над своей кружкой, был для него недостаточно романтичен, а три оперных злодея — слишком опасны, чтобы вовлекать их в орбиту фабулы. Лучше всего для общения годился спящий. Грэм склонился над ним, тормоша и тряся.</p><p class="p1">— Корнелиус! — воскликнул он с таким восторгом, что оглянулся даже дуканщик. — Корнелиус, друг мой! Сколько лет мы не виделись с тобою, мудрец и бродяга!</p><p class="p1">Предполагаемый Корнелиус приподнял голову с лавки и тут же бессильно уронил ее опять, стукнувшись затылком.</p><p class="p1">— Корнелиус! — не отставал Грэм. — Помнишь ли ты Балаклаву?!</p><p class="p1">— Балаклаву помню, тебя нет, — раздраженно проворчал Корнелиус.</p><p class="p1">— А наши странствия? А твою любовь к таинственной дачнице? Есть, есть у тебя теплый угол за пазухой, люблю тебя, странник!</p><p class="p1">— Оставь ты меня, Бога ради, — пробурчал странник, пытаясь привстать и бессильно падая на лавку плашмя.</p><p class="p1">— Оставьте его, Грэм, — вмешался Ять. — Не видите разве — он пьян?</p><p class="p1">Грэм не удостоил его и словом: он всецело переключился на Корнелиуса.</p><p class="p1">— Помнишь дом с хрустальным шаром? Помнишь, как говорил ты, бывало: небольшое жульничество — не обман, но перераспределение…</p><p class="p1">— Да ты кто такой?! — пронзительно заверещал Корнелиус. — Отойди от меня, сделай милость! Чего тебе надо?</p><p class="p1">Грэм, мечтательно улыбаясь, вернулся за стол.</p><p class="p1">— Ни за что не признает при чужих, — покачал он головой. — Задумчивая душа, спутник юности…</p><p class="p1">Лихорадка прибытия, ночного бегства и незнакомых мест сменилась умиротворенностью и теплом, медленно разливавшимся по телу. Ять задремал, дремота одолевала и Грэма. Рядом похрапывал Маринелли, привалившись к стене. Ять, однако, спал чутко — и заметил, как Корнелиус, так и не заснувший после внезапного пробуждения, тянется к карману Грэма.</p><p class="p1">— Грэм! — закричал Ять, одновременно перегибаясь через стол и хватая бродягу за руку. — Грэм, ваш друг вас грабит!</p><p class="p1">Грэм, как выяснилось, и не думал спать. Он смотрел на Ятя с горьким укором.</p><p class="p1">— Зачем вы вмешались! — вымолвил он. — Вы испортили лучший из моих рассказов!</p><p class="p1">— Рассказ рассказом, но вас тут собирались обчистить…</p><p class="p1">— Пусть бы обчистили, за такой поворот не жалко! Ах, черт, что за люди… Корнелиус, друг мой, сколько тебе нужно? Вот, возьми. Маринелли, дайте ему. Give him some money… Маринелли невозмутимо посапывал, не открывая глаз.</p><p class="p1">— Разбудите его, Ять! У меня нет денег, только табак.</p><p class="p1">Ять отчетливо увидел, как Маринелли приоткрыл один глаз и многозначительно мигнул.</p><p class="p1">— Его теперь из пушки не разбудишь, — мгновенно среагировал Ять. — Не думаю, что он будет вам благодарен за решение поделиться с вашим другом его деньгами.</p><p class="p1">— Но Корнелиусу нужно выпить, — жалобно сказал Корнелиус, очевидно свыкшийся со своим новым именем.</p><p class="p1">— Корнелиус потерпит, — увещевающе произнес Ять. — Не огорчайтесь, Грэм, вы напишете другой рассказ.</p><p class="empty-line"/><p class="p1">На рассвете, расплатившись с дуканщиком и оставив всех посетителей «Адовой жаровни» точно в том же виде, как они их застали, три наших путешественника вышли на свет Божий. Голубело небо, и тонкий туманец полз по улицам спящего Симферополя. Сухие листья прошлой осени лежали на узких каменистых улицах. Ять разглядел вывеску над входом — «Покушай»; пожалуй, это посмешней Грэмовой «Жаровни»… Вдалеке прогрохотала татарская арба, по соседней улице прошмыгнула согбенная старуха в черном. Кошка, выгнув спину, внимательно смотрела на Ятя, Грэма и Маринелли; насмотревшись и что-то себе уяснив, юркнула под забор. За ним виднелись деревянный дом и беседка, оплетенная сухими плетьми дикого винограда.</p><p class="p1">— Ну что ж, — сказал Грэм, — кто куда. Я, пожалуй, налево, а вам, Ять, — прямо. Там дорога к Ялте, до Гурзуфа сорок верст. Найдете мажару, доберетесь к вечеру.</p><p class="p1">— А где Маринелли лучше всего искать серьезных людей, чтоб переправиться? — спросил Ять.</p><p class="p1">— Пусть идет направо, там базар. Ну, прощайте, увидимся, — Грэм коротко пожал им руки и решительно, словно зная цель, зашагал налево.</p><p class="p1">— Прощайте, Маринелли, — сказал Ять. — Будете в Петрограде — милости прошу.</p><p class="p1">— Будете в Европе — найдете, — улыбнулся Маринелли, и Ять утонул в его великанских объятиях. Итальянец двинулся направо, и лицо у него мигом стало деловитое — с таким лицом он, бывало, брал полуминутную паузу перед очередной арией, вспоминая текст.</p><p class="p1">А Ять пошел прямо. Хорошо было идти одному, самому по себе. Он распахнул пальто, закурил последнюю папиросу и скоро вышел из города. За плечами у него был мешок с бельем, бритвой и книгой, подаренной Клингенмайером, — может, хоть тут он поймет наконец, о чем она.</p><p class="subtitle">3</p><p class="p1">Для экспериментов по отъему и захвату власти Крым представлялся идеальной площадкой: более кроткой и вольной местности не найти было во всей бывшей империи. Всякая власть тут была номинальной, ибо положение тихого приморского края зависело исключительно от погоды, дачников и улова. Татары возделывали огороды, рыбаки забрасывали сети, морское побережье сплошь было застроено дачами и санаториями, вся жизнь небольших приморских городов протекала на набережных, и небогатая российская интеллигенция, снимавшая или покупавшая тут скромные жилища, знать не знала о том, как живет и кем управляется Крым. Буркин, знаменитый своими балаклавскими пиршествами, во время одного из набегов на южное побережье Крыма после особенно удачного выхода в море с рыбаками основательно закутил; ему пришла фантазия дать императору телеграмму с просьбой о даровании Балаклаве статуса вольного города, и самое удивительное, что получил он будто бы и ответ с пожеланием непременно закусывать, — последнее, впрочем, относилось к области легенд.</p><p class="p1">До середины семнадцатого года Крым жил, словно не замечая войны и революции: по-прежнему был полон движения и шума ялтинский порт, по-прежнему заходили в него корабли союзников — но уже полные слухов о войне на море; до шестнадцатого года война велась еще по рыцарским правилам, и старая Европа оставалась собою, — но немцы, почувствовав близость поражения, потопили несколько мирных торговых кораблей, и этим ознаменовался новый этап бойни. Все реже приходили в Ялту и Феодосию французские и британские суда, груженные кофе и апельсинами, тканями и колониальным товаром; все чаще появлялись военные корабли — входили в бухты, зловеще маячили на горизонте, неслышно проходили мимо, и хотя в городах прекрасно знали, что суда эти союзнические, охранные, что немецких кораблей нет и не будет вблизи побережья, но и эти тихие гости воспринимались как вестники беды. Осенью семнадцатого торговое сообщение Крыма с миром почти прекратилось — в ноябре в Ялту пришел вдруг, Бог весть с чего, американский корабль «The Glory» с грузом сигар, и все южное побережье курило сигары; с тех пор торговых судов в Ялте не видели.</p><p class="p1">Политической жизни, как и промышленности, в Крыму не было сроду — единственным заводом оставался севастопольский судоремонтный. Не мудрено, что революция ничего в нем не изменила и не посеяла даже вражды меж праздными и трудящимися классами, ибо трудящиеся только и жили за счет праздных, приезжавших на курорты и дачи. Да вдобавок и владельцы крупных поместий, коих вдоль побережья насчитывалось около двадцати, редко проводили зиму в Крыму; одна фрейлина фон Кирстенхардт, родственница вдовствующей императрицы, безвыездно жила в своей небольшой усадьбе при въезде в Ялту и пользовалась общей любовью. Прочих имений старались пока не грабить, ибо неизвестно было, как оно обернется.</p><p class="p1">Все тут было иным — в особенности краски. Коричневые, пологие крымские горы, зелено-бурый плюш лесов, пестрая галька, которой засыпана была дорога на Ялту, желтая глина обочин, безлистые еще груша и миндаль в белом и розовом цвету — но чем выше восходил взгляд, тем менее различимы были оттенки: все сливалось в голубом блеске. Ять давно снял пальто и нес, перекинув через руку. По сторонам дороги тянулись молчаливые татарские деревни, где даже петухи подавали голос как бы нехотя. Иногда во дворе видна была согнутая в три погибели старуха, ковыряющая землю мотыгой, или желто-смуглый старик на крыльце; время от времени принималась лаять коротконогая собачонка — но тут же замолкала. Все молчало и ждало, но Ять и не хотел шума.</p><p class="p1">Ять бывал в Крыму почти ежегодно, хоть по неделе; как все петербургские репортеры, привозил отсюда курортные зарисовки и записи местных легенд, ездил смотреть дом Чехова, видел издали его строгую некрасивую сестру, в которую, говорили, влюбился Буркин — перенеся на нее избыток чувств, направленных на брата. Ять живал в Мисхоре, Ялте, дважды в Феодосии, ходил на Ай-Петри, один сезон провел в экспедиции Бородина, — привез в подарок Клингенмайеру генуэзскую монету. Он мечтал, разумеется, и о более далеких путешествиях — но с годами рассудил, что с помощью Крыма и воображения увидит и поймет больше, чем в десяти трудных и дорогостоящих поездках. Лучше было под крымскими мохнатыми звездами, стоявшими над черными веретенами кипарисов, домыслить узорчатое небо пустыни, чем пробираться по пустыне настоящей, раскаленной и бесконечной; лучше было на ялтинском берегу воображать неаполитанскую ночь — тем более что неаполитанская при ближайшем рассмотрении могла оттолкнуть и разочаровать, как разочаровал его когда-то Париж. Крым с избытком заменил ему Ниццу и Левант, океанские пляжи, Цейлон и Африку — в этом они с Таней были едины: лучше вообразить… Только ее вообразить было нельзя — и поэтому сейчас он шел к ней, не чувствуя усталости, легко одолевая подъем.</p><p class="p1">Смуглая молодайка подала ему напиться колючей известковой воды. Он пил долго, жадно, с полузабытым ощущением свежести и полноты бытия. В одиннадцать утра он был уже на перевале, с которого начинался долгий, петляющий, пологий спуск к морю. Тут его нагнала наконец мажара — та самая татарская телега, на которую он надеялся в Симферополе. Сухонький старик с остроконечной лысиной, дачник-инженер, побоявшийся возвращаться в Питер, да так и застрявший в Алуште с женою, ездил в город с татарином Ногаем разузнать новости. С ними Ять за три часа доехал до самой Алушты, пересказывая старику невнятные петербургские новости. После отдыха он пошел легко и быстро — сам не заметил, как добрался до подножия Медведь-горы, всегда, впрочем, напоминавшей ему не медведя, а толстую мышь. Он знал, что Гурзуф располагается в тени Аю-Дага, вдоль побережья, и поворот на него должен быть совсем рядом — он десятки раз проезжал его, направляясь в Ялту и Мисхор; пешком, однако, пришлось идти еще час. Указателя не было — только россыпь слабых огоньков внизу. Руки у него похолодели, дыхание сбилось. Наступило самое тревожное время дня, которое так коротко на юге, где ночь опускается стремительно. Но до темноты было еще двадцать, пусть сорок минут томительной, знобкой неопределенности: от земли потянуло холодом, резче запахло кипарисами и сухой травой, над морем явственно обозначилась голубая звезда, и колючий луч ее протянулся к сердцу Ятя. Он спускался в Гурзуф, все меньше веря, что здесь ждет его встреча, о которой он два года боялся мечтать. Колючий кустарник хватал его за полы пальто.</p><p class="empty-line"/><p class="p1">Ять вошел в поселок около семи. В самом начале набережной приветливо светился стеклянный куб — в десятые годы вошли в моду такие павильоны из прочного стекла, которому и морской ветер был не страшен.</p><p class="p1">— Выпью кофе, — вслух сказал Ять. — Не то прямо тут и свалюсь.</p><p class="p1">Он вошел в полутемное помещение — свечи на столах, приветливый грек за стойкой… В следующую секунду от углового стола к нему метнулась быстрая тень, и, прежде чем он успел что-то сказать, родная тяжесть повисла у него на шее. Он узнал этот запах — ни от кого больше так не пахло «Степным цветком», хотя «Степной цветок» был в моде и душились им многие. Это был ее запах, ее короткие, теплые темные волосы, захлебывающийся шепот, отчаянные глаза. Больше всего он поразился отчаянию и испугу в них.</p><p class="p1">— Господи, — шептала она, — что же делать, что теперь делать…</p><p class="p1">— Потом заплатишь, — сказал грек. — Сейчас никогда, не знаешь, есть деньги, нет денег… Может, завтра другие деньги будут… Обещали тут новые придумать, какие новые — молчат… Расскажи, что слышно.</p><p class="p1">Он налил Ятю маленькую коричневую чашку крепкого кофе с корицей («Есть кофе турский, есть персидский, а это грецкий, самый луччий») и подпер щеку рукой, приготовившись слушать.</p><p class="p1">— Это Пастилаки, Ять, — быстро говорила Таня. — Его зовут Одиссей, правда. Одиссей Пастилаки. Я думаю, фамилия такая специально, чтобы подсластить горькое имя. Он всех угощает, просто так.</p><p class="p1">— Кофе много привезли, — объяснял грек. — Кофе привезли, сигары привезли… Иногда бывает — мяса нет, кофе есть. Кофе лучше мяса. От мяса сон, от кофе крепость. Расскажи, что там.</p><p class="p1">— Да ничего там, — во второй раз за день принялся объяснять Ять. — Они сами не знают, что делать. Рады бы на попятный, но кураж не позволяет. А у вас тут кто?</p><p class="p1">— У нас Трубников, — засмеялась Таня. — Это безумно долго объяснять. Трубников дивный. Когда я в последний раз тебе о нем рассказывала — мысленно, мысленно! — поправилась она, видя, как насторожился Ять. — Так вот, в последний раз я столько смешного тебе о нем говорила… знаешь, я постоянно что-то тебе рассказываю, у меня скопилась вот такая книга этих рассказов — разумеется, в голове. Отбирала штучки посмешней, и видит Бог, я когда-нибудь напишу… но чтобы спокойней было писать, ты должен быть рядом, вот тут. Трубников — это единственный гурзуфский большевик. Он приехал из Симферополя, его прислали. Бывший дворник, но какой дворник! Он читал все. Министерская голова. Каждую неделю он говорит речь. Ять, ты должен это услышать! О, что ты сможешь обо всем этом написать!</p><p class="p1">— Мне некуда больше писать. Мироходов закрылся.</p><p class="p1">— Все равно, ты напишешь для себя, для меня… Это не может пропасть! Собственно, он и не властвует ни над кем — над кем властвовать в Гурзуфе? Но только таков и может быть идеальный правитель. Я познакомлю вас завтра же, он ко мне благоволит. Как-никак я столичная гостья.</p><p class="p1">Она говорила безостановочно, смеялась, закидывая голову, — он с мучительной нежностью и состраданием смотрел на ее напряженную белую шею, — но под всем этим, как подземные воды, клокотало отчаяние, причин которого он не понимал. Иногда она смотрела на него попросту испуганно. Ни злости, ни обиды, ни единого напоминания о прошлом — только эта лихорадочная говорливость и прорывающаяся бурная тоска; впрочем, он всегда видел Таню неунывающей в трудные времена и грустной — в счастливые.</p><p class="p1">Она прервалась на полуслове и горячими маленькими руками сжала его виски:</p><p class="p1">— Но все-таки, все-таки! Господи, что же это!</p><p class="p1">— Что такое, Таня? Говори, я боюсь.</p><p class="p1">— Нет, это я боюсь. Боже, что ты натворил! И ведь я знала с самого утра. Я знала и то, что этого быть не может, и то, что ты уже здесь. Как ты пробрался? Говорят, поезда не ходят…</p><p class="p1">— Считай, что прилетел.</p><p class="p1">— Боже мой, какое страшное счастье… Именно счастье и именно страшное.</p><p class="p1">Он видел на лице ее ту самую тоску и беспомощность, какие поражали его иногда на лицах влюбленных женщин: может быть, все его подспудное недоверие к женской природе шло отсюда. Многие смотрели на него нежно, снисходительно, победительно, — но лишь дважды или трижды видел он это испуганное, умоляющее выражение, словно возлюбленные его вмиг теряли почву под ногами; такое лицо было у Тани после их первой ночи весной тринадцатого. Ничего не было, все случилось утром — она просила его не торопиться; они заснули вместе в его зеленинской квартире, и он проснулся от ее взгляда — тревожного, вопрошающего. Она смотрела на него пристально, тоскливо и даже сердито — и когда он открыл наконец глаза, спросила звенящим шепотом: «И что теперь будет? А? Делать-то что теперь, а?» Влюбленная женщина прежде всего боится того, что с ней приключилось, она утрачивает равновесие, лишается права повелевать — и оттого испуг в ее глазах сильнее счастья; ему и теперь померещился этот же испуг, и он успокоился. Между тем женщины боятся не только любви, а успокаиваться вообще никогда не следует.</p><p class="p1">— Но где ты живешь?</p><p class="p1">— Сейчас все объясню. Есть Зуев, историк. Он местная знаменитость и светильник разума Открыл народ, от которого произошли крымчане. У него дома собственный музей. Он сдал мне мансарду, и там я живу.</p><p class="p1">— Скажи, а кто пустит меня? Может быть, ты знаешь кого-то… Она отшатнулась.</p><p class="p1">— Но ведь ты приехал ко мне?</p><p class="p1">— Да, конечно, но…</p><p class="p1">— Ять, что с тобой? Ты хочешь поселиться отдельно?</p><p class="p1">— Ты знаешь, чего я хочу. Но если ты не одна…</p><p class="p1">— Идиот. Ненавижу. Уезжай немедленно. Взбредет же в голову! — Она смеялась и плакала — Хотя бы я была замужем, хотя бы я была с кем угодно — неужели ты не понимаешь, что я уйду к тебе от любого, по первому зову? Это рок надо мной, я давно уже примирилась, а ты, я вижу, все ерепенишься…</p><p class="p1">— Но не скажешь же ты, что ждала меня все эти два года?</p><p class="p1">— Нет, конечно. Ждешь ты осени или весны? Ты просто знаешь, что они будут, — и я знала. Кстати, как ты меня нашел?</p><p class="p1">— Неважно, после. Да ведь ты и не скрывала.</p><p class="p1">— Конечно. В Питере все знают, где я. Я думала, ты написал маме.</p><p class="p1">— Ты отлично знаешь, что я никогда не стал бы ей писать.</p><p class="p1">— Любовь зла, вдруг тебе стало невмоготу… Но идем же. Ты выпил свой кофе?</p><p class="p1">Все это время Пастилаки смотрел на них с флегматичным умилением. Это был высокий, полный грек в темно-красной феске и вязаной жилетке, небритый, с большой бородавкой под правым глазом. Из-под фески выбивались седеющие кудри. Ему могло быть и сорок пять, и шестьдесят — кто определит возраст Одиссея? В скитаниях год идет за два, особенно если боги не помогают.</p><p class="subtitle">4</p><p class="p1">Ну нет, понял Ять, этот — не соперник. Кто угодно: пусть Трубников, пусть даже Одиссей Пастилаки с его стеклянной кофейней и красной феской. Но Зуев и в самом деле данник одной, но пламенной страсти: он знал таких сутулых, длиннолицых, вислоусых людей, страшно упрямых, поглощенных единственной идеей. Женщины, случается, любят мономанов — но на взаимность рассчитывать не могут; а Таня, если не может рассчитывать на взаимность, чар расточать не станет.</p><p class="p1">— Очень рад, — в нос повторял Зуев, — очень рад. Татьяна Константиновна говорила…</p><p class="p1">— Зуев, милый, — мягко сказала Таня. — Я предложила вашу мансарду, не спросясь…</p><p class="p1">— Вы можете распоряжаться свободно, — не слишком любезно, но как будто без злости заметил Зуев; правда, призрак обиды мнительный Ять различил-таки в его голосе. — Поднимитесь, посмотрите…</p><p class="p1">— Завтра ты непременно должен посмотреть его экспонаты, — с преувеличенной живостью говорила Таня. — Там, в мансарде, висят гравюры… но сейчас темно, ты ничего не разглядишь. Поднимайся, идем!</p><p class="p1">Дом Зуева стоял на самом въезде в Гурзуф. Это был хороший каменный дом с деревянной мансардой-надстройкой, в которую с первого этажа вела узкая скрипучая лестница. Изначально он принадлежал зуевской чахоточной тетке, выбравшей Гурзуф из-за благодатного климата: она проводила тут зимы. Тридцатилетний Зуев интерном Московского университета приехал вступать в права наследника — и остался, полюбив море, туфовые скалы, а более всего альмеков. Исследованием этой безвременно рассеявшейся цивилизации он думал сделать себе имя и очень скоро стал центром Крымского исторического кружка.</p><p class="p1">Тогдашний Гурзуф (тысяча жителей, большей частью татар) состоял из набережной и сотни домишек, чудом держащихся на склоне; их крыши ступенчато спускались к морю. В начале набережной сияла кофейня Пастилаки, в конце возвышался дукан Кавалеридзе. Были, разумеется, в городе и другие питейные заведения — например, корчма «У Селима», где подавали баранью шурпу и дешевое черно-красное сладкое вино, — однако главная конкуренция разворачивалась между греком и кавказцем, поскольку посетители чаще всего проникали в Гурзуф с той стороны, которую облюбовал Пастилаки. До дукана доходили только те, кому действительно хотелось шашлыка. Гурзуф был славен санаторией «Суук-Су» — почти домашний стол, умеренные цены, кислый источник, — романтически торчащими из воды скалами Адаларами, что значит по-татарски «близнецы», дешевым базаром и старинным парком, где по-паучьи раскинул толстые ветки помнящий Пушкина платан.</p><p class="p1">Однако главной городской достопримечательностью были Голицынские винные склады. Почти вся верхняя часть Гурзуфа росла за счет работников прославленного виноградника, разбитого на пологом склоне князем Голицыным, потомком одного из екатерининских фаворитов. Голицынские виноградники простирались до самой Никиты, в которой повелением Александра Благословенного учрежден был лучший ботанический сад во всей империи. Ближайшее участие в учреждении Никитского сада принимал Голицын-старший, открывший в себе непреодолимую тягу к ботанике; в поисках драгоценных растений отплыл он в Испанию, где вдруг женился на семнадцатилетней местной аристократке по имени Лаура. Он перевез ее в Тавриду, и в 1823 году родился Голицын-младший (о котором поговаривали, впрочем, что смуглый курчавый отрок зачат не без помощи поэта, гостившего тут как раз за девять месяцев до того). Кто говорит так, не знает испанских нравов: Лауру поэт впоследствии увековечил, но пусть будет плохо тому, кто стыдно об этом подумает.</p><p class="p1">Душа у Голицына-младшего была самая поэтическая: за свои 80 с лишним лет (он скончался в девятьсот четвертом) потомок фаворита и испанки превратил дикий брег в один из лучших виноградников мира, где выращивались редкие сорта. О винной коллекции его ходили легенды. Говорили, что единственная в мире бутылка малаги шестнадцатого века хранится именно у него — всякое вино трижды выбродит за такой срок в уксус, но малага была с секретом, над которым старик тщетно бился в последние годы. Деятельность винного завода к лету семнадцатого прекратилась почти полностью, но склады охранялись по-прежнему, и какие бы революции ни сотрясали Гурзуф — ни одна живая душа не пыталась прорваться на их территорию. Сторож держал гигантского волкодава, но ни волкодаву, ни сторожу не приходилось исполнять свою должность, давно уже сделавшуюся символической — впрочем, как и все в Крыму весной восемнадцатого года.</p><p class="empty-line"/><p class="p1">— Тут дивные, дивные люди, — приговаривала Таня, ведя Ятя наверх. — Но что у тебя с руками? Ледяные! Ты замерз? Ты отвык от меня? Ты чего-то боишься? Говори!</p><p class="p1">В мансарде у Зуева пахло совершенно по-дачному: старое дерево, сухая лаванда, книги. Если бы не море за окном, легко было вообразить себя в небольшой усадьбе в средней России.</p><p class="p1">— Скажите честно — я не стесню вас, Виктор Николаевич? — церемонно спросил Ять.</p><p class="p1">— Я сплю внизу, — флегматично ответил историк и, пожелав доброй ночи, спустился к себе.</p><p class="p1">Окно выходило на крыши и море — этот вид долго еще стоял перед глазами Ятя, хотя засыпал он напротив этого окна всего две недели. По стенам и впрямь висело несколько темных гравюр — в темноте не разглядеть было, что на них.</p><p class="p1">Часто, часто думал он в последние два года о том, как это будет. Чаще, может быть, чем о другом, вечно занимавшем его мысли и по-прежнему непонятном… То, что происходило между ним и Таней, тоже было немного смертью, полным растворением границ между ним и жизнью, единственным достоверным мистическим опытом, который перепал на его агностическую долю. Быть с ней казалось таким естественным и понятным, что он и сам теперь не ответил бы — что делал в эти два года, как позволил себя так обокрасть? Она вернулась, разделась, легла.</p><p class="empty-line"/><p class="p1">Трубников оказался маленьким хитроватым мужичком, по лицу которого все время блуждала застенчивая улыбка. О планах гурзуфского переустройства он высказывался туманно. Планов, собственно, и не было. Установление советской власти в Крыму было актом совершившимся и нетрудным, — оставалось решить, что теперь делать; Ять подвернулся Трубникову как нельзя более кстати.</p><p class="p1">— Вы ведь газетчик? — ласково спрашивал он. — Добре. Вернетесь в Петроград — напишите, что у нас тепло, сытно. Что курорты ждут. Может, трудящий класс теперь отдыхать поедет. У нас недорого. Оно конечно, отдыхать рано, сначала надо мировую революцию залудить… Ну, да уж до нее недолго. Вот, говорят, немецкие товарищи зашевелились… Нам главное — публику привлечь, а если привлечем — то и живы будем. И которые из бывших, тоже пущай едут. Мы и дачи пока не отбираем, потому понятие имеем. Если дачи отобрать, кто приедет? Непорядок получится…</p><p class="p1">Ять медленно приходил в себя. Они сидели с Таней и Трубниковым в дукане Кавалеридзе. Трубников угощал. Кавалеридзе — длинный, фантастически носатый — уважительно наблюдал издали. Все утро Ять пытался понять, как жил без нее все это время, и никак не мог привыкнуть к себе прежнему, двухлетней давности: нужно было заново приноровиться к этой остроте восприятия, к значению каждою слова, к запахам, бликам, вернувшемуся счастью жизни и страху смерти.</p><p class="p1">— Да, да, — рассеянно кивал он Трубникову. — Разумеется, непременно…</p><p class="p1">И неотступный, тревожный, восторженный взгляд жег ему щеку.</p><p class="subtitle">5</p><p class="p1">В последнее время Оскольцеву — узнику семнадцатой камеры, откуда накануне забрали Бельчевского, — отчего-то казалось, что бессмертие вообще есть вопрос личного выбора: душа может либо зажмуриться в последнюю секунду, испугавшись ослепительного блеска, — и тогда темнота станет ее уделом навеки, — либо, напротив, расправиться, до предела раскрыть глаза, если возможно говорить о глазах души; ну, скажем, — напрячь все способности к восприятию и взглянуть смерти в лицо. Тогда вместо смерти можно увидеть то, что за нею следует, — но и эта версия была несправедлива, по отношению хотя бы к тем, кто умирал в бессознательном состоянии. Одно время он думал даже о преимуществах смертной казни под хлороформом: в последнее время, он слышал, наркотизаторы нашли способ усыплять человека на сколь угодно долгое время одним, почти мгновенно действующим уколом; тогда момент смерти фактически подменялся моментом впадения в наркотический сон, — но этот наркоз как раз и лишал права жить вечно. Ему вспомнился рассказ одной из его недолгих подруг, некоей Тани, девушки умной, но ветреной, — об ее подруге, отказавшейся от хлороформа во время долгих и болезненных родов: «Как я могу пропустить такое интересное страдание?» Для него интересных страданий не было — за эту мелочность, трусость души он и расплачивался сейчас.</p><p class="p1">И все-таки, все-таки. Стоит сказать себе, что ничего нет, поставить на этом крест, вообразить себе, как хорошо было бы посвятить жизнь разоблачению поповской лжи и корысти, — как сразу за этой решительной констатацией открывается неразрешимый вопрос, почва немедленно оказывается зыбкой, предательской, и способ заменить страх ненавистью — единственно надежным лекарством — вновь рушится. Ибо и сжав веки до боли в глазных яблоках — видишь все-таки вспышку света, иного, не дневного; допустив на миг, что ничего нет, — тут же угадываешь за этим «ничего» неучтенное нечто. Избыточность человека была столь наглядна, что жизнь казалась бесконечно больше смерти, — но тут выплывал убийственный аргумент: смерть равна жизни, не станем от этого прятаться. Трагедия бесследного исчезновения человека соизмерима с величием самого феномена человека, и ни одна другая не достойна нас. Исчезнуть отсюда, но сохраниться где-то — в этом была половинчатость; человек же велик во всем, и существование его должно увенчаться великим отчаянием.</p><p class="p1">Эта мысль о величии участи ненадолго согревала, дарила еще один гипноз — но и он вскоре рассеивался, поскольку в том, чтобы терпеливо ждать бессмысленной гибели, не было никакого величия. Нельзя от человека требовать мужества; и если будут пытать… Если будут пытать, в этом будет то единственное преимущество, что смерть станет мыслиться как избавление. Мысль же о пытке неотступно присутствовала в его сознании потому, что непрерывную муку претерпевало его сознание, — сама собой являлась мысль о физическом выражении этого насилия; все-таки страшней заключения человечество не придумало ничего. Нет никакой свободы речи и мысли, а есть свобода толкнуть дверь и выйти из помещения; лишение этой свободы, естественной, как дыхание, не могло быть оправдано ничем. Пока Оскольцев в тысячный раз пытался помыслить себя вне тела, просачивался сквозь омерзительные, шершавые серые стены, удалялся по коридору навстречу сиянию дня, — спорщики дошли уже до пресловутого еврейского вопроса, обсуждавшегося в семнадцатой камере, впрочем, весьма мирно.</p><p class="p1">— Удивительное вообще дело еврейчики, — размышлял Ватагин. — Заметьте, какова двойственность их морали. Ведь они Новый Завет только для того написали, чтобы всех неевреев сбивать с панталыку! Посмотрите, что они разрешают остальным и что запрещают себе, — и увидите полное совпадение сих двух списков! Еврейские корчмари споили Русь — но часто ли вы видели пьяного еврея? Евреи настаивают на космополитизме — но часто ли вы видели еврея, женившегося на русской, или, того паче, жидовку, выданную за Ваню? Евреи призывают забыть о национальности, отменить ее — но ни один еврей не откажется от того, что он еврей!</p><p class="p1">— Вы скажете, что Америка или Европа погублены евреями? — язвил Гуденброк. — Дай Бог нам такой гибели!</p><p class="p1">— Погублены, и очень просто! Вы не видели, а я в Берлине два года жил. Вырождение и есть вырождение.</p><p class="p1">— А в России, значит, нет вырождения.</p><p class="p1">— И в России есть, но нам Господь дал такое православие, что оно бесконечно далеко от Христа. Мы Христа не восприняли, оставшись во многом язычниками, а потому он нам не так страшен. Вот это-то и чувствуют жидки, а потому Россия для них — главная кость в горле… была, покуда они с революцией народ не надурили. Да ничего, этот народ и их сожрет — дайте только время. Кроме нас, на них другой силы нет… Оскольцев молчал. Все это опять было мимо темы.</p><p class="subtitle">6</p><p class="p1">Крайний слева что-то делал, склонившись к огромному камню, обтесанному криво и грубо; небольшая группа справа стояла на коленях у костра, еще трое трубили в рога, четвертый неподвижно лежал рядом на спине, и на груди у него, молитвенно сложив руки, сидел пятый. Шесть фигурок в левом углу картины кружились в сложном и нерегулярном движении: двое плясали с поднятыми руками, еще двое скакали на одной ноге, пятый шел гусиным шагом, шестой упер руки в бока.</p><p class="p1">— Это встреча солнца в Барабулинских степях, — уважительно сказал Зуев. — Последние остатки альмеков празднуют свой ежеутренний праздник. Их согнали с насиженных мест году в триста двадцатом. Потомки рассеялись. Но я нашел памятники — вот эти камни. Рисунок выполнен местным художником Михеевым по моим указаниям. Он же и гравировал.</p><p class="p1">Пожалуй, местному художнику Михееву лучше всего удалась последняя сцена из долгой альмекской истории в картинках: в ней чувствовались тревога и свежесть, какие бывают утром после бессонной ночи. Полтора десятка человечков, кружась в бессмысленных, но строго регламентированных танцах, были явно обречены и стремительно приближали собственную гибель, не желая отказаться даже от самого невинного из своих правил; но солнце, встающее над ними, давало их игрищам оправдание, а им — надежду. Ясно было, что никто не выживает, ставка — на оправдание в вечности.</p><p class="p1">— Я намерен, — с достоинством заметил Зуев, — выступить в Императорском географическом обществе. Собственно, я бы и раньше… но интриги…</p><p class="p1">— Императора нет, но Общество цело, — обнадежил его Ять. — Теперь оно будет, конечно, преобразовано… Может быть, переименуют в марксистское.</p><p class="p1">— Но марксизм пасует перед альмеками, — с легким удивлением проговорил археолог. — Он так же не объясняет их цивилизации, как дарвиновская теория — по-своему, нет слов, стройная, — не объясняет бесконечного богатства природы. Столько расцветок, форм, хитростей, и все ради выживания? Увольте. Альмеки — первая цивилизация, у которой вовсе не было базиса в марксистском понятии, и уж поверьте, эта цивилизация не была единственной. Мы просто знаем не всё, история — вообще наименее изученная из наук… Но скульпторы острова Пасхи или строители Стоунхенджа — вы слышали о нем, конечно, — представляли именно этот тип общества. Уверяю вас, со временем будет прочитана и письменность майя, чья жизнь тоже состояла из бесчисленных сложностей. Взять календарь…</p></span>
