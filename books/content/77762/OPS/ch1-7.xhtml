<span><p class="p1">Благоустройство дворца пошло полным ходом: как все старинные постройки, он был лишен простейших удобств, — в бывшей людской поспешно соорудили нужник, отрядили матроса почистить дымоходы, проверить печи, которых не топили лет пятьдесят, — хорошо, что Росси, хоть и выполнял заказ на постройку летнего дворца, помнил про северное лето, остающееся карикатурою южных зим. В обеих гостиных были большие камины, в гостевых комнатах зодчий предусмотрел голландки. Для кабинетов, где голландок не было вовсе, двенадцатого января были доставлены ржавые печки на четырех коротких лапах, — они раскалялись мгновенно, но страшно дымили, даром что матросики вывели все трубы в форточки. Дворец, обросший этими трубами, приобрел вид уютный и гротескный. Горбунов, специалист по русским говорам, не устававший повторять, что он пешком обошел всю Россию, и вдобавок сильно окавший (правда, в волнении окать забывал и переходил на обычный петербургский манер), долго потешался над профессурой, не умевшей печи растопить и лучины нащепать, — но собственная его печь как раз и дымила больше всех, а топить умел один лексикограф Соломин, прирожденный барин, сын волжского помещика. Трудно было вообразить манеры более широкие, руки более холеные, — однако он этими холеными руками починил в своей комнате замок, с первой спички растапливал печурку, исправил в овальном зале гигантские древние часы, которые радостно принялись бить… Его постоянно зазывали в гости — устранить мелкие неисправности. Эти баре откуда-то все умели, хотя сроду ни в чем не нуждались.</p><p class="p1">На следующий день профессора вычертили график кухонного дежурства, и Горбунова, больше всех кичившегося привычкой к ручному труду, поставили первым. В его обязанности входило нарезать хлеб (Чарнолуский выбил для профессуры богатый паек — почти в полтора раза больше, нежели приходилось по карточке), но главное — сварить моржевятину. Моржевятиной этой прежде кормили кошек, которых держали в половине петербургских домов. Чарнолускому о ней рассказал новоназначенный комиссар продовольствия. Странное мясо никто не хотел есть, попытка выдавать его в пайках вместо селедки провалилась. Чарнолуский распорядился отвезти продукт на Елагин остров: в конце концов, профессора были люди без предрассудков и понимали, что перед ними питательный продукт.</p><p class="p1">Матрос Елисеев выдал Горбунову несколько брусков серого, в прожилках мяса, отмерил крупы и помог отнести буханки. Отсыпал и чаю, и даже сахару. В кухне стояла древняя дровяная плита, Горбунов возился около нее полчаса, Елисеев наблюдал, посмеиваясь в усы. Завтрак назначили на половину одиннадцатого — интеллигенция привыкла вставать поздно. В одиннадцать в кухню прислали фонетиста Кривицкого и поинтересовались, скоро ли. Горбунов прогнал его с ругательствами. В половине двенадцатого к Горбунову прикомандировали Соломина. Через час Соломин и Горбунов, на ходу дружелюбно переругиваясь, втащили котел и подволокли его к т-образно расставленным столам. Их встретили аплодисментами. Следом матрос Елисеев в одиночку тащил гигантский чайник кипятку. Каша пахла отвратительно и пригорела.</p><p class="p1">— А вы не смейтесь, — огрызался Горбунов. — Я по Заонежью ходил, в Кижах, в Архангельске был… Я в одиннадцатом году до бурятов дошел…</p><p class="subtitle">9</p><p class="p1">В семнадцатой камере Трубецкого бастиона сидели в тесноте и тревоге одиннадцать человек, взятых в разное время с октября по декабрь. Большинство знали друг друга по правительству и Думе. В любой европейской стране такое сборище министров и депутатов считалось бы блестящим, но в России, где министры вместе с товарищами в последние месяцы сменялись чуть ли не ежедневно, это было растерянное и озлобленное собрание людей, давно не сознающих собственного значения. Тем обиднее было сидеть, в сущности, ни за что. Всех взяли просто потому, что революционная смена власти традиционно обозначалась арестом предыдущего правительства. Если б не аресты, то и видимости революции не было бы. Участие в бессмысленном спектакле, умирать в котором, однако, приходилось по-настоящему, не устраивало обитателей семнадцатой камеры.</p><p class="p1">В этой же камере сидел товарищ министра иностранных дел переводчик Оскольцев — невысокий, изящный, нервный человек, всегда успевавший очень много. Он вечно был в движении, с жадностью первопроходца объездил свет, говорил на французском, английском, итальянском, немецком, португальском, учил японский, переводил готические романы, печатал работы по сравнительной истории, толмачил Верхарну и Маринетти, когда их, смущенных и недоумевающих, таскали по питерским богемным сборищам. К тридцати семи он успел немыслимо много в самых разных сферах — и без лихорадочной, всегда спешной работы не мыслил себя. За ним пришли двадцать седьмого октября, и то по глупости — он был арестован вместе с редакцией невиннейшей географической газеты «Весь свет». Причиной ареста был ложный донос, и прочих сотрудников немедленно выпустили — но Оскольцев был уличен в причастности к правительству и переведен в Трубецкой бастион.</p><p class="p1">— Вас-то за что? — изумился министр исповеданий Серапионов.</p><p class="p1">— За что и вас, — усмехнулся Оскольцев. Он еще держался, но никто не знал, чего ему стоила бодрость в первые дни беззаконного ареста.</p><p class="p1">Теперь все мысли Оскольцева были неотступно сосредоточены на смерти, скорой и неизбежной. Во время бурной и, в сущности, бессмысленной работы он ни на секунду не забывал, что все катится в бездну. Теперь бездна придвинулась к самым глазам, но отвлечься уже было нечем. Кипение его жизни, непрерывные разъезды, вереница экзотических впечатлений и знакомств — все было следствием отроческого, так и не преодоленного ужаса перед самой идеей внезапного и бесследного исчезновения, приговора, вынесенного ни за что. В ранней юности он мог еще утешаться тем, что умрет пресыщенным, усталым, вкусив от всех пороков и соблазнов; выяснилось, однако, что к иным порокам — вроде пьянства или курения опиума — он не имеет склонности, другими же соблазнами — вроде женской любви и других чувственных впечатлений — пресытиться никак не может.</p><p class="p1">Кто чего боится, то с тем и случится, любила повторять одна из его возлюбленных (песни, пословицы, узорный плат, тихие разговоры о странницах и монастырях — у девочек, взращенных на всем французском, была одно время эта мода на все русское, то есть билибинское, конечно). Вечно боявшийся замкнутости и неподвижности, трех дней не способный высидеть в одном городе, Оскольцев был теперь остановлен на бегу и лишен пищи, в которой больше всего нуждался, — пищи для острых глаз и неутомимого ума. Привыкнув удерживать в голове множество тем и взаимоисключающих мнений, он томился во время монотонных и бессмысленных споров, путался в ненужных деталях и раздражался на собеседников. Его раздражала даже болезнь Шергина — что уж говорить о лени Ватагина, ограниченности Бельчинского, злобе и барственных замашках Гротова, флегматичности Гуденброка; главное же, на чем он часто и удивленно ловил себя, — ему с первого же дня стало казаться, что по-настоящему обречен он один, а все эти люди, в сущности, ничем не рискуют.</p><p class="p1">Ему казалось, что и матрос Фокин — начальник охраны — относится к нему грубее, нежели к остальным; и на единственном допросе, который снимал полуграмотный мальчишка лет восемнадцати, ему — судя по тому, что рассказывали о своих допросах другие, — задавали самые пустые вопросы, лишь бы как-то закамуфлировать произвол. Оскольцев не получал передач, избегал разговоров (ибо говорить мог только об одном — о предстоящей ему смерти) и к декабрю ни о чем другом думать не мог. На воле у него остался старик-отец и младшая сестра. Отец был крепок и вынослив, но думать о нынешнем его положении Оскольцев боялся. Вспоминать о доме вообще было нельзя — тут же накатывала постыдная слабость и подступали слезы. Инстинктом узника он дошел до вечного арестантского правила: дома как бы не было, он запретил себе мысль о нем.</p><p class="subtitle">10</p><p class="p1">В семнадцатой камере, как всегда, спорили — на этот раз о странном корниловском походе. Ватагин с Гротовым не сомневались, что сам же Керенский и спровоцировал выступление; Баранов, товарищ министра внутренних дел, с вечной детской улыбкой на пухлых устах доказывал, что в теории заговора верить смешно. Спор был прерван грохотом сапог в коридоре, тут же раздался скрежет замка, и грозный усач Фокин просунулся в дверь.</p><p class="p1">— Баранов! — крикнул он. Баранов вскинулся и побелел.</p><p class="p1">— Я Баранов, — отозвался он сразу севшим голосом.</p><p class="p1">— Сюда иди, — позвал моряк. Баранов принялся дрожащими руками собирать вещи.</p><p class="p1">— Брось, без вещей покуда, — добродушно сказал моряк. — Успеешь с вещами-то.</p><p class="p1">Это Баранова не успокоило. Он зачем-то вынул вещи из мешка и стал раскладывать, словно видел в этом свое спасение.</p><p class="p1">— Живо! — прикрикнул Фокин уже без всякого добродушия. — Возиться мне тут с вами…</p><p class="p1">Баранов с трудом выпустил мешок, оглядел камеру, и устремленные на него взгляды, в которых не было теперь ничего, кроме ужаса и сочувствия, вернули ему силы. Он кивнул всем сразу и быстро прошел к дверям. Фокин выпустил его и снова заскрежетал ключом. Прозвучали удаляющиеся шаги. Некоторое время все молчали.</p><p class="p1">— На допрос, вероятно, — подал голос товарищ министра транспорта Головин.</p><p class="p1">— Фокин — на допрос? — возразил Гротов. — Этот не допросчик, этот — мясник…</p><p class="p1">— Что ж, пытать? — спросил Оскольцев, испугавшись собственного вопроса.</p><p class="p1">— Чушь не порите, — одернул его Ватагин. — Возможно, свидание…</p><p class="p1">— С чего бы ему дали свидание?</p><p class="p1">— С того, что денег сунули кому нужно. В России за деньги всегда можно было что угодно. Я когда в четвертом году за карикатуру в «Пути» сел на трое суток, так ко мне друзья девицу в камеру прислали. Мне не до игр было, отослал.</p><p class="p1">— Другое время было, — вздохнул Карамышев.</p><p class="p1">— Чушь не порите, — повторил Ватагин. — Не было и не будет другого времени.</p><p class="p1">Тут Фокин снова открыл дверь и втолкнул Баранова, еле державшегося на ногах. Баранов сиял, по лицу его блуждал особенный свет внезапно обрушившегося счастья.</p><p class="p1">— Что, выпускают? — спросил Ватагин.</p><p class="p1">— Нет, нет… Он… он денег попросил.</p><p class="p1">— Как денег, каких денег? — заговорили все разом.</p><p class="p1">— Спросил, нет ли со мной денег… Ему надо зачем-то…</p><p class="p1">— Так ведь обыскивали всех при аресте, неужто он не знает?</p><p class="p1">— Он же и обыскивал! — крикнул Карамышев.</p><p class="p1">— Ну, не знаю… Может, решил, что я утаил что-то… или передали… Словом, спрашивал о деньгах. Я сказал, что нет.</p><p class="p1">— Тьфу, ослы! — выругался Ватагин. — Как тогда надзирать ставили ослов, так и теперь… Переполошил только зря, хамская рожа.</p><p class="p1">Баранов, продолжая сиять, прошел к своей лавке и долго еще сидел молча, не участвуя в общем разговоре. На самом деле, разумеется, ни о каких деньгах речи не шло. Фокин вручил ему записку от матери, французскую, чтобы матрос ничего не понял, если бы даже и захотел прочесть. В записке говорилось, что подателю ее можно доверять абсолютно и что вскоре он выведет Баранова на свободу, в чем поклялся и уже получил задаток. Подделка была исключена — Баранов узнал почерк матери и известное им двоим обращение «Mon petit renard» — лисенок, — столь жалкое и дикое в подобной записке. Ясно было, что мать сделала это не в избытке чувств, но имея в виду пароль. Баранов потом только вспомнил, что Фокин не предложил ему написать ответ — а через час он был уже убежден, что против него готовится многоходовая провокация и что теперь он будет убит при попытке к бегству.</p><p class="subtitle">11</p><p class="p1">Едва Фокин ушел, пообещав выпустить сына по поддельному ордеру, не помнящая себя от безумной надежды мать Баранова кинулась к публицистке Евдокии Сокольниковой, в чьем политическом салоне ее petit renard был одной из ярчайших звезд; Сокольникова, для которой составление и разоблачение заговоров было, как говорила она сама, хлебом и солью жизни — то есть источником заработка и острейшим наслаждением, — тут же увидела за матросским визитом подвох. Мгновенно сплетена была история о том, что против нее, Сокольниковой, духовного и умственного центра оппозиции, готовится серьезная провокация, первой жертвой которой должен стать Баранов; шантажируя его попыткой к бегству, «они» вытянут из него сведения про всех, а возможно, что и заставят кого-то оболгать (не возражайте, не возражайте, вы не знаете, что они делают с людьми, после этого можно продать отца родного!), и тогда… о, тогда! Что делать, говорите вы? Делать надо было прежде, когда к вам пришел этот провокатор. Теперь я и сама не знаю, что делать, кроме разве что… Разве что только одного: надо немедленно его сдать, сдать его собственному начальству! Ирода можно только переиродить: он назвался вам? Нет? О, конечно, нет! Может быть, показал какие-то документы? Нет? Естественно: этого следовало ждать. Но вы хорошо его запомнили? Слава Богу, и на том спасибо, хотя мордатых и усатых там полно, они все мордатые и усатые. Мы немедленно, немедленно должны идти к Ворониной, она знает путь к Аренскому, а Аренский, председатель следственного комитета, может доложить на самую их верхушку. Пошли к Ворониной, не застали, ждали (все это время мать Баранова думала, что не выдержит, — но выдержала, только не могла потом без содрогания смотреть на дом Ворониной на углу Большой Морской, где им пришлось провести в ожидании два чудовищных часа); с Ворониной — уже в девятом часу вечера — ринулись пешком к Аренскому; тот не хотел ничего слышать, весь день мотался по холоду, лег спать, но Воронина настояла, чтобы их приняли — да, да, в последний раз, вы не знаете, о чем идет речь, готовится такое, что и вас может задеть… Аренский выслушал, выбежал, стремительно переоделся, позвонил куда-то, вызвал автомобиль, и автомобиль через полчаса примчался. «Не думаю, чтобы… — повторял Аренский. — Скорее простая алчность… не думаю, чтобы… главное, чтобы ни одна душа не знала, что вы были здесь!» Он подвел ее к автомобилю, впихнул на заднее сиденье, сам молча сел рядом с шофером, и машина понеслась по ледяной улице.</p><p class="p1">Остановились у трехэтажного здания на Шпалерной; Аренский предупредительно открыл, перед Барановой дверь.</p><p class="p1">— К Бродскому, — небрежно бросил он матросу, дежурившему на первом этаже.</p><p class="p1">Поднялись по затоптанной мраморной лестнице. Маленький остробородый председатель ЧК горбился за столом в продымленной, жарко натопленной комнате.</p><p class="p1">— Вот, изволите видеть! — с порога заговорил Аренский. — Матери арестованных оказываются сознательнее, честнее их охранников! Мне только что доложили, что к ней приходил матрос и обещал за золотую брошь освобождение сына!</p><p class="p1">— Кто такой сын? — раздраженно спросил Бродский. В этом человеке было воспалено все глаза, горло, интонации. Баранова окончательно поняла, что погубила своего Сашу.</p><p class="p1">— Баранов, член Думы, — пренебрежительно сказал Аренский. — Не в сыне дело, а в ваших людях, которые элементарно воруют при первой возможности…</p><p class="p1">— До разбирательства никто не смеет обвинять моих людей! — крикнул Бродский. — Где ее сын?</p><p class="p1">— В Трубецком, — еле слышно пролепетала Баранова, и Бродский впервые внимательно посмотрел на нее.</p><p class="p1">— Сядьте! — крикнул он голосом, каким привык произносить угрожающее «встать!». Только обмороков ему не хватало. Она опустилась на стул и принялась непослушными пальцами расстегивать воротник. — Что за матрос? — спросил он, обращаясь уже к ней. Аренский был ему противен давно, а теперь, когда тот мог ткнуть ему под нос историю с продавшимся матросом, Бродский вдвойне ненавидел его.</p><p class="p1">— Высокий, полный… Усатый… Красное лицо…</p><p class="p1">— Знаки различия?</p><p class="p1">— Я не понимаю в знаках различия…</p><p class="p1">— Почему вы пришли доложить о нем? Вы что, не хотели спасти сына?</p><p class="p1">Тут только Баранова поняла всю меру своей ошибки: поведение ее в самом деле выглядело необъяснимым. Но судьба сына, висевшая теперь на волоске, зависела исключительно от ее ума и самообладания, а потому она собралась с духом и нашла единственно возможный ответ.</p><p class="p1">— Я… я знаю, что мой сын ни в чем не виноват, — сказала она, задыхаясь, — и потому он выйдет на свободу сам, законным путем, как только в его деле разберутся.</p><p class="p1">Возразить было нечего. Бродский хмыкнул, буркнул, записал ее адрес и пообещал принять меры.</p><p class="p1">— Но вы понимаете, что если такое творится в охране крепости, то полагаться на остальных тем более нельзя? — в упор, словно продолжая давний спор, спросил Аренский.</p><p class="p1">Баранова каким-то чутьем понимала, что ее история необходима Аренскому в собственных, не совсем чистых целях, что он ведет двойную игру и хочет свалить Бродского. И она была рада, когда Бродский — видимо, наделенный немалой властью — грубо ответил:</p><p class="p1">— Я сказал уже, что обо всем доложу в Смольный. Вы можете сейчас идти.</p><p class="p1">— Если не доложите вы, доложу я, — желая оставить за собой последнее слово, сказал Аренский и быстро вышел.</p><p class="p1">Баранова попыталась встать, чтобы идти за ним, но поняла, что подняться со стула не может. Она хотела крикнуть, чтобы Аренский подождал ее, но ему было не до нее — она свое дело сделала.</p><p class="subtitle">12</p><p class="p1">Бродский, как и обещал, разобрался во всем. В охране Трубецкого бастиона был только один краснолицый и усатый матрос — заслуженный боец революции Фокин, которого нельзя было наказывать слишком сурово, поскольку товарищи его любили и в Смольном он был лично известен. А потому Бродский тихо убрал Фокина с должности начальника караула, переведя его в свою личную охрану для испытания. Сам он три дня спустя посетил семнадцатую камеру, допросил Баранова (перепуганного до потери сознания), пообещал в ответ на его мольбы, что матери его никто ничего не сделает, и спросил заключенных о жалобах. Жалоба оказалась одна: Кошкарев и Шергин были больны и просили перевести их в больницу, пусть под надзором. Вся камера присоединялась к этой просьбе, потому что надсадный кашель одного и тихое, сосредоточенное, кроткое умирание другого были непереносимы. Бродский немедленно распорядился перевести обоих в Лазаревскую больницу, а остальным пообещал, что дела их будут в срок рассмотрены и никто не пострадает напрасно.</p><p class="p1">— А сейчас мы не напрасно тут страдаем? — крикнул Гротов.</p><p class="p1">— Никто не страдает напрасно, — почти библейски ответил Бродский.</p><p class="p1">— А почему ваш цербер каждый день орет, что на нас только хлеб переводить?</p><p class="p1">— Надзиратель сменен, — с ненавистью сказал Бродский. Ему тошно было от мысли, что классово чуждые опять умудрились взять верх над классово своим.</p><p class="subtitle">13</p><p class="p1">Жизнь в Елагинской коммуне в первую неделю после перемещения была горька, весела и беспорядочна. Филологи и ежедневно пополнявшие коммуну писатели радовались перемене в своем быту, восхищались абсурдностью происходящего и беззлобно издевались над собственной беспомощностью. Давно не собиралось в городе столь блистательного филологического общества. Лингвисты и палеографы, представители разных течений и школ, философы и сочинители, модернисты и реалисты, никогда не умевшие преодолеть разногласий, были наконец объединены по общему признаку ненужности, которая добавляла им веселья.</p><p class="p1">Слух о том, что в Елагином дворце собирают и кормят интеллигенцию, разнесся по городу мгновенно. К двадцати его обитателям уже в первые три дня прибавилось еще двадцать, да множество народу заходило в гости.</p><p class="p1">С идеей обучения ремеслам все как-то застопорилось, и Чарнолуский остановился на варианте создания истории петербургской промышленности. Его эмиссар Бунтиков, прибывший в Елагин дворец девятнадцатого января, предложил каждому взять на выбор любой завод, находившийся ближе к первому жилью или симпатичный будущему хронисту по иным причинам. Петербургские фабрики были разобраны без особенного энтузиазма; Долгушов предложил лучше писать историю университетов («потому что истории всех промышленников сходны — убил, ограбил, купил завод», — добавил он), но поскольку пролетариат в университетах не обучался, он не мог нуждаться и в их истории. Разумеется, со временем… но пока актуальнее были заводы. На следующий день добровольцы взялись за дело.</p><p class="p1">Отношение к новой работе было в коммуне самое благожелательное, и диктовалось оно, как ни странно, врожденным чувством вины. Победивший пролетариат не только не отнял у профессуры права на жизнь, но и попытался вручить ей новое орудие заработка. К тому же действовала столовая, к чаю бывал желтый тростниковый сахар (откуда он брался — никто представить не мог; на самом деле запасы его были реквизированы еще в конце декабря у купца Голубкина — он задешево взял его на Кубе и думал, что в Петрограде расхватают, но подозрительность в городе была сильнее голода, желтого сахара никто не брал, говорили, что народ хотят выморить, отчаявшись спасти). Исправно подвозились дрова. Хмелев, пожелтевший от злости, за столом ни с кем не разговаривал, на приветствия отвечал сквозь зубы и чай демонстративно пил без тростникового сахара. Но Стежкин искренне не понимал, почему бы не поработать, и Фельдман также не имел предубеждения против нового занятия.</p><p class="p1">— Ведь вы подумайте, — с милой, утрированной интонацией, словно труня над своей слишком типичной внешностью, говорил он за ужином пятнадцатого января. — Мы, люди книжные, никогда не имели возможности понять, как все работает. Я, например, на заводе сроду не был, станка в глаза не видел, от политической экономии зевота брала. Теперь же мы получили как бы другую жизнь, потому что человек, умственно организованный, из всего извлечет урок…</p><p class="p1">— Вот вы и извлекайте! — прошипел Алексеев, правая рука Хмелева и большой доброжелатель Союза русского народа. — Идите на службу, и пусть вам заводская пьянь диктует про свою жизнь! И я бы еще понял, — продолжал он, все больше распаляясь, — я бы еще понял, ежели бы вас поставили выправлять грамоту: они ведь «пролетарий» напишут через ща! Но теперь, когда грамоты нет и стерта всякая граница между вами и любым сукиным сыном, — теперь-то вы им на что нужны? Придавать литературного лоску? Я, пролетарий Тютькин, рожден во граде святаго Петра от бедных, но благородных родителей Ионы и Евлампии, влачивших скорбное свое существование под гнетом неусыпного капитала, — так, что ли? Все грохнули, улыбнулся и Фельдман.</p><p class="p1">— Я бы не стал презирать Тютькина, — заговорил он уже без всякой местечковости, тем прекрасным, исконным русским языком, глубоким и низким голосом, который так странно сочетался с его карикатурной внешностью. — Как хотите, но всю жизнь нас кормил Тютькин. Сами мы и поля не засеяли, и гайки не завернули…</p><p class="p1">— Вот, вот она! Вот толстовская зараза! — загрохотал Алексеев. — От него все и вышло! Я сытый, я праздный — пусть я иду теперь пахать, а дочь моя пусть босиком глину месит. Да ведь он для того и хотел пахать, чтобы заглушить мозг. Умственная деятельность требует комфорта, специальных условий…</p><p class="p1">— Праздности, если угодно, — поддержал его профессор Долгушов. — Душевного равновесия, если угодно…</p><p class="p1">— Но вам пока и не предлагают физического труда, сколько я понимаю, — вступил молодой Борисов, фонетист и большой друг футуриста Мельникова. Он был высок, толст, сказочно силен, обладал при этом мягкими манерами и сочным басом; богатырский облик довершала светло-русая борода. — Предлагают записать рассказы рабочих, просмотреть архив — это же не снег чистить, в конце концов? Они пока проявляют уважение к науке — другое дело, что уважение внешнее, присущее людям малокультурным. Они уважают тело культуры, а не дух ее. Дворцы, музеи…</p><p class="p1">— Гадят они в музеях! — взвизгнула диалектолог Седова. — Они везде гадят, их единственная цель — гадить…</p><p class="p1">— Положим, это не они, — благодушно продолжал Борисов. — Есть элемент темный, неразвитый, не спорю с этим, но сознательный рабочий не таков. Больше того: маляр, который постоянно у меня работал, — я его на все работы звал, кухарки нашей родственник, — был один из интеллигентнейших людей, которых я вообще видел. Он копейки лишней не взял, а работал так, что загляденье. Он делал свое, а я свое, и не понимаю, почему он хуже…</p><p class="p1">— Так по нынешней мерке вы хуже! — вскинулся Алексеев. — Вы только на то и годны, чтобы писать историю заводов! Ваше дело речь изучать, а не историю заводов…</p><p class="p1">— Господа, а я так запросто, — желая вернуть беседу в мирное русло, заметил очеркист Ловецкий. — Я тоже, смею сказать, человек не без образования, филолог, всё чин чином. Но как-то оно пошло: раз написал в газету по заказу, два — согласился дать рецензию, три — обзор театральный… а уж кто с газетой связался, тот пропал с головой. Сами понимаете — в «Беседе» много не намолотишь. Пишешь невозможный рассказ из жизни маркиз и баронов, бежишь к Тарновскому в «Газету для всех» или в «Дорожный журнал» — помните, он на любом вокзале лоток имел, как раз до Петергофа всего журнала хватало, — «Константин Петрович, вот-с, не угодно ли?». Что ж вы думаете, господа, если я про маркизу Рене писал, как она яду выпила, увидевши, что барон Лаваль ее дочь целует в беседке, — что ж, я про завод не напишу? Я про марсианскую жизнь напишу!</p><p class="p1">— Вам, Илья Васильевич, хорошо, вы газетчик, — вздохнул Долгушов. — Нашему-то брату книжнику каково? У нас если кто и сливается, то «не» с причастием, если кто и беглый, то гласный…</p><p class="p1">— Образованный человек, Владимир Николаевич, — назидательно сказал Ловецкий, — про все может написать. Гимназист — и тот в идеале должен связную новеллу составить «Как я подглядывал за купанием сестры». И я поспорю с любым, — он с веселым вызовом оглядел компанию, чувствуя, что ненадолго предотвратил назревавший скандал, — что напишу такую историю заводов — никто не оторвется. Назначьте экспертов, и клянусь — будет лучше Дюма.</p><p class="p1">Через неделю Ловецкий обязался представить свой вариант «Истории заводов». Расходились после ужина повеселевшими, и педант Комаров, лучший петербургский словесник по прозвищу Пемза, с гордой радостью думал о том, что вот ведь — дров еле хватает, холод, сырость, гнусная моржевятина, а образованные люди находят предметы для спора и спорят не о трудном быте, а о материях высоких, вполне абстрактных. В этом и было отличие его клана, единственное, если вдуматься. Можно было поместить пролетариев во дворцы, кормить четырежды в день и купать в ваннах с розовыми лепестками, — и все равно темой их бесед оставалось бы пьянство, бабы и собственные телесные недомогания. Но можно ввергнуть интеллигента хоть в геенну — он и там немедленно поссорился бы с другим интеллигентом из-за толкования строчки Гегеля. Эта способность воспарять из любой бездны, в узилище дискутировать о грамматике, на смертном одре хохотать над опечаткой казалась ему едва ли не свидетельством бессмертия души.</p><p class="subtitle">14</p><p class="p1">Ах ты Господи, а ведь это первый раз, что я побываю во дворце, думал Ять, еще с моста пытаясь углядеть в силуэте летней резиденции признаки перемен. Прежде всего он заметил трубы, торчавшие из окон и странным образом придававшие зданию промышленный вид.</p><p class="p1">Отчего-то он чувствовал перед любителями русской словесности подобие вины. Впрочем, едва ли в собственных вымерзших квартирах они чувствовали бы себя в большей безопасности. Он не сразу решился на посещение коммуны — прошла почти неделя со дня ее открытия, о котором он и не знал. Телефоны давно уже работали непредсказуемо — когда два, когда три часа в день, подчас ночью; один раз его разбудил странный ночной звонок доселе молчавшего телефона — рыдающий старушечий голос все повторял: «Папочка! Папочка!» Верно, какая-нибудь старуха сошла с ума от голода и страха. Ять пытался разузнать, кто она и что ей нужно, — но старуха только звала папочку, и он, не выдержав этого причитания, ударил по рычагам. Телефон тут же умер, через минуту Ять поднял трубку — связь исчезла бесповоротно. Этот случай он на следующий день рассказал Грэму, встретившись с ним в хлебной очереди.</p><p class="p1">— Это хорошо, — растирая нос и щеки голой красной рукой (никогда не имел перчаток), сказал Грэм. — В квартире ночью телефон — это хорошо. Знаете ли, что они обладают собственной волей?</p><p class="p1">— Конечно, — машинально сказал Ять.</p><p class="p1">— Не «конечно», а так и есть, — обиделся Грэм. — Человек, создав машину, — Ять узнал его излюбленный прием, — придал вещам разумное начало. Пример: дерево. Дерево живет собственной стихийной волей, тянется к солнцу и только и думает, как бы высосать больше соков из земли. Но приходит человек, придает ему благородный изгиб и делает кресло. Кресло — материя организованная, она мыслит. Ей уже не до соков, но она может совпадать с человеком, приняв форму его тела, и оттого перенимает его мысли. Возьмите теперь телефон: эта материя не в пример сложней. Она может выбирать, когда ей прийти в движение и с кем вас соединить. Телефон своей волей соединил вас с безумной старухой.</p><p class="p1">— К сожалению, — сказал Ять, — я ничем не мог помочь ей.</p><p class="p1">— Об этом судить не вам, — Грэм поднял длинный извилистый палец. — Иной раз и человеческий голос целителен бывает для жизни. Я говорю это не потому, что одинок: вы писатель, как и я писатель, и я знаю, что вы подумали. «Вот, он одинок». Не так: есть существо. Но оно теперь, а было время, когда, действительно, и человеческий голос мог быть мне соломинкой. Возможно, что на Страшном суде уничтожатся все ваши заслуги и только этот ответ на ночной звонок зачтется. Кстати, — вдруг, без всякого перехода, заговорил он буднично и просто. — Вы не знаете, как попасть в Елагинскую коммуну? Хочется, потому что туда обещали дрова и табаку. И чаю.</p><p class="p1">— А что, уже есть коммуна? — в недоумении пробормотал Ять. — Я думал, это прожекты, дело будущего…</p><p class="p1">— На Елагином, — с вечной шутливо-серьезной назидательностью объяснил Грэм, — делают новое объединение писателей для прокорма. Им хотят дать тему и бумаги много, чтобы они писали для детей, рабочих и детей рабочих. Все эти три категории суть одна, — он громко засмеялся. — Я могу писать для рабочих, могу делать сказки из чего угодно. Хочу пойти. Говорят, дрова, — повторил он.</p><p class="p1">— Однако как быстро это сделалось, — скорей себе, чем ему, сказал Ять. — Только появилась идея — и вот…</p><p class="p1">— Это сделалось быстро и будет недолговечно, — кивнул Грэм. — Они скоро поймут, что писателей нельзя селить вместе, особенно если кормить. Недостаток корма мог бы еще сплотить на первое время, но кормленые писатели рассорятся за неделю. А идея совместного писательства хуже, чем совокупление вшестером. Надо успеть, пока не перегрызлись и не разбежались, потому что тогда уже не будут давать дров.</p><p class="p1">Однако Ять и после этого медлил: страшно сказать, он трусил. Только утром семнадцатого января он решительно вышел из дома и направился в новое жилище членов Общества любителей словесности. День был холодный и серый, настроение отвратительное. Ять загадал про себя: кого первым встречу, тот и определит конечный успех или неуспех всей затеи. В Обществе преобладали люди приятные, так он втайне утешал себя, — но первый человек, встреченный им, был Казарин.</p><p class="p1">Поэт и критик Казарин в Обществе не состоял, раз только делал доклад о ритме у Державина. Откуда он тут взялся — было решительно непонятно: не стар, лет сорока или около, женат — правда, для чего он женился, Ять никогда не понимал. Супруга его, Ираида Васильевна (Василий Васильевич Розанов всегда обращался к ней «Иродиада», без всякого смысла, просто чтобы позлить), приходилась двоюродной сестрой московскому символисту, путанику и выдумщику, но в общем беззлобному малому. Он в пятнадцатом году ушел куда-то проповедовать, да так и пропал. Сама Ираида, как и брат, была высока ростом, басовита, и ее серые, навыкате глаза смотрели на собеседника прямо, с вызовом, точно в чем-то его обвиняя. Говорила она важно, загадочно и почти всегда неуместно. Рядом с ней худой, желчный Казарин выглядел особенно хрупким. Кажется, он никогда не любил ее. Теперь Казарин чистил снег у входа во дворец, неумело орудуя огромной деревянной лопатой. Рядом, прислонясь к колонне, посмеивался усатый матрос. Он и не думал помогать поэту: в его обязанности входила охрана да выдача продуктов. Казарин, впрочем, и не принял бы помощи.</p><p class="p1">— Здравствуйте, Вячеслав Андреевич, — приветствовал его Ять. — Вы как здесь? Казарин поднял глаза и поправил очки.</p><p class="p1">— А, Ять! — воскликнул он весело. — И вы к нам?</p><p class="p1">— Да нет, я вроде как на инспекцию.</p><p class="p1">— Что, на службу поступили?</p><p class="p1">— Какое, сроду не служил. Чистое любопытство.</p><p class="p1">— А что, переселяйтесь! — улыбнулся Казарин. — И безопасно, — он кивнул на матроса, — и паек, и святые стены. Нас пока сорок человек, но идут, знаете; идут! Идея подхвачена. Я сам тут четвертый день, вчера пришел ко мне друг физик — как бы, говорит, и нам такую богадельню? Нет, говорю, любезнейший, вы люди пользы, всю жизнь нас этим корили, — в вас всякая власть нуждается. Вот и ступайте строить электрические машины, а богадельни будут для сынов гармонии.</p><p class="p1">— Но ведь идея была селить филологов? — спросил Ять. — Тех, кто не нужен стал после реформы?</p><p class="p1">— Ну, кто же из нас не филолог? — засмеялся Казарин. — Все писали грамотно, кое-как правила помнили, а стало быть, от всех теперь никакого проку. Я как про это узнал, тут же к Чарнолускому побежал. Мы с ним, знаете, знакомы немножко — он, когда затевал «Вперед», направил письма к литераторам понезаметнее, таким, знаете, обиженным на невнимание критики: вас замалчивают, вы талант, мы издаем по-настоящему свободную газету… Ну, независимость-то их вся была мне очень понятна: эсдековское изданьице, только с уклоном в Господа Бога. Стихов попросил. Я и послал ему — не из честолюбия, а чтобы поиздеваться; что вы думаете — напечатал и благодарил! Я даже деньги какие-то получил. Загнулись на девятом номере. Но он меня запомнил — как же, как же, очень рады. Направил сюда немедленно. С таким наслаждением расписывается на этих ордерах — я на первой книжке так широко не расписывался! А мне, — продолжал Казарин, понижая голос почти до шепота, — комната сейчас совершенно необходима. Я с ума сходил с августа прошлого года, ища жилье. Нигде ничего нет, приличные комнаты страшно вздорожали, я совершенно без средств — книга у меня не вышла, вы знаете? Кому сейчас нужны книги… Вы газетчик, вам платят, а у меня ниоткуда ничего. И тут с неба падает такая возможность! Я подумал даже, что это все для меня и затеялось: ну, можно ли упускать?</p><p class="p1">— Вы с женой тут? — спросил Ять.</p><p class="p1">— Пожалуй, что и с женой, — лукаво отвечал Казарин, — можно сказать, что и с женой… Не с Иродиадой, конечно. С Саломеей скорее. Гибну, гибну! — продолжал он весело. — Совсем гибну. Мне все теперь можно.</p><p class="p1">Пожалуй, так, подумал Ять. Похоже, действительно гибнет и все себе разрешил. Чтобы пропадать с полной уже безоглядностью, он мог выпросить у народного комиссара ордер на проживание, который ему не полагался, предать, ограбить, а то и убить: не мешайте гибнуть!</p><p class="p1">— Судьба невероятная, — все тем же хриплым шепотом говорил Казарин. — Девочка, ведьма, ребенок, колдунья, все вместе. Не знаю, за что мне это. Вероятно, надо зачем-нибудь, чтобы я погиб, вот и подсластили финал. Мы сколько с вами не виделись, с октября? В октябре я, кажется, еще помнил себя… Но теперь всё. Когда рушится империя, странные происходят вещи. (Словно в подтверждение его слов, с ветки в парке тяжело снялась ворона и, каркая, пролетела в глубь острова.) Тут все как карточный домик — и сознание, и устои. А может быть, вся империя для того и рухнула, чтобы я оказался с ней. Я пишу теперь… О, как я теперь пишу! Теперь, когда это все никому не нужно. Как она пришла ко мне, почему я? Не понимаю. Никогда не думал, что молодежь вообще знает мои книги. Но она пришла, и читала меня наизусть, и когда я услышал эти стихи — ее голосом, с ее молодым дыханием… тогда я понял, что написал! И понял, что ничего еще не написал… Я только для нее теперь пишу. Не думаете же вы, что я должен был остаться дома, с Иродиадой? Но у нее родители, а в меблирашки она не пойдет сама… Это Бог, Бог нам послал эту комнату. Или не Бог. Я боюсь думать, кто. Вы знаете, у нас, католиков, даже имя упоминать считается грехом. — Казарин принял католичество еще году в десятом и много писал об этом. — Не знаю, ничего не знаю. Но впервые за тридцать восемь лет чувствую, что живу.</p><p class="p1">— Рад за вас, — сказал Ять. — А кто еще тут из наших, я имею в виду — из Общества? Хмелев тут? Долгущов, Фельдман?</p><p class="p1">— Все, все здесь, и молодежь есть. Барцев, Льговский… Кто совсем переехал, кто так приходит — столоваться, греться. Некоторые ночевать по домам уходят — скоро мест не хватит, и так уж по двое стали селить, — а сюда идут хоть строчку в тепле написать. Клуб, и только. Идемте к нам, я вам покажу, как тут все…</p><p class="p1">— Слушайте, я ведь некоторым боком причастен, — не удержался Ять и, терзаемый чувством вины, рассказал Казарину о своем невольном участии в создании филологической богадельни нового типа. — Ей-Богу, я не думал ни о какой коммуне. Это они так решили, и я полагаю даже, что вариант не худший… Но как-то, знаете, страшно. Получается, что всё от меня.</p><p class="p1">— Да ничего не от вас, — махнул рукой Казарин и воткнул лопату в снег. — Все равно вечером снова навалит. Все бы хорошо тут, кабы не дежурства. Вы не думайте, идея коммуны не ваша, эдак вы и переворот себе припишете. Они давно начали собирать в такие дома — инвалидов отдельно, сифилитиков отдельно… Чем мы все не инвалиды? Нормальные люди такой двор за пять минут разгребут, а я второй час маюсь, одышка… Нет, с инвалидным домом — благое дело. Они у нас отняли последний хлеб, вот пусть и дают. Россию хотели спасать? Валяйте, начинайте с хранителей языка.</p><p class="p1">Он изобретательно оправдывал коммуну, поскольку сам был больше остальных заинтересован в ее существовании — она дала хлеб и кров ему и новой возлюбленной, — и Ятю должны были льстить эти оправдания. По крайней мере, можно было перестать терзаться. Он никому не повредил, составив свой список; Шельменко жив, и братья Шулаковы постыдно мной не ввержены в оковы… Но именно то, что вся эта история была на руку именно Казарину, раздражало Ятя особенно; вряд ли дело, выгодное Казарину, могло обернуться добром.</p><p class="p1">— А кто «она»? — спросил он небрежно, стыдясь собственного любопытства. Ять и сам не жаловался на отсутствие женского внимания, но Казарину доставались женщины, на которых нельзя было смотреть без тайного восхищения, отравленного завистью к недостойному счастливцу. Вероятно, этих особенных петербургских женщин одиннадцатого года, ледяных и пылких, привлекала казаринская способность всякий раз гибнуть и все-таки никогда не погибать, — способность по сути женская и женщинами ценимая.</p><p class="p1">— Она, она… — бормотал под нос Казарин, входя во дворец первым и обметая веником Бог весть где добытые валенки. — Она, луна, полна… дана… Вечно бормочешь какую-нибудь чушь, а в ней-то весь и смысл. А вы знаете, что мы тут живем без ключей? Истинная коммуна. Ключи от комнат есть только у коменданта, он же матрос. Но у нас и украсть нечего… Некоторые попытались соорудить засовы, а в общем — к чему засовы? Ну, идемте. Мы квартируем в первом этаже. Между прочим, вы очень кстати. Нынче у нас читка.</p><p class="p1">— Какая читка? — спросил Ять, осматриваясь. В высокие стрельчатые окна второго этажа лился серый мягкий снежный свет. Отчего-то именно в таком свете всегда рисовалось Ятю Средневековье. Муж уехал — в крестовый поход, положим; она ждет… Откуда бы во Франции настоящий снег? Но уход рыцаря в крестовый поход всегда представлялся ему в странных, здешних и вместе нездешних декорациях: в снегу, лежащем на еще зеленой траве. Серый, словно затканный паутиной зал; по стенам гобелены с охотой; в зале — она, словно уже погрузившаяся в трехлетний сон… Он знал, что подлинное Средневековье не имело с его видениями ничего общего; знал и то, что не он один творил себе такую легенду. Этими легендами, тайным знанием о них и пленил его с первой своей книги поэт, о котором он избегал теперь думать. Ходят тучи, да алеют зори, да летают журавли…</p><p class="p1">— Обыкновенная читка, — бормотал между тем Казарин, идя чуть впереди. — Нашли нам дело. Сочинять историю промышленности. Ловецкий — знаете Ловецкого? тоже, кстати, довольно иллюзорные права на звание филолога, — так вот, Ловецкий поклялся, что за три дня выработает себе слог, доступный пролетариату. Сегодня читает первую главу — историю чихачевской мануфактуры. Ему и рабочего придали, хорошего, сознательного рабочего — звать Викентием. Видели когда-нибудь живого Викентия? Ловецкий утверждает, что с его помощью будет делать настоящую пролетарскую литературу. Непременно останьтесь, послушайте, это стоит того. Чарнолуский лично обещал быть, и представители пролетариата.</p><p class="p1">По полу, выложенному черными ромбами (похожий пол, страшно убегающий как бы под откос, был на картине любимого художника Ятя, где грозный, с кошачьими усами Петр бешено косился на затравленного сына), они прошли через просторную, матово освещенную залу в темный коридор. Казарину досталась угловая комната с окнами в заснеженный парк.</p><p class="p1">— Прошу, — и он торжественно распахнул дверь.</p><p class="subtitle">15</p><p class="p1">— Ну и вот, — сказал Казарин. — И ушел.</p><p class="p1">— Напомните, это было в тринадцатом? — переспросил Ять.</p><p class="p1">— В четырнадцатом. И ни слова больше от него. Представляете? Я всегда, впрочем, догадывался, — Казарин зажег очередную папиросу, и Ашхарумова посмотрела на него с нежным укором, — всегда знал, что Ираида и сама немного не в себе. А дядя ее, от которого Георгий-то Васильич, — вовсе проводил в желтом доме по полгода, в Швейцарию его возили, в Италию… Вот Георгий Васильич и сорвался — сразу. Так всегда и бывает: упала последняя капля — и конец. Получил он письмо без обратного адреса. И конверт, и листок уничтожил потом. Но как я успел понять, — у нас был перед самым его уходом путаный разговор, вы же знаете, как он объяснялся, — писал незнакомец. Просто следили за ним эти люди и вдруг решили: ты наш. Он еще Толстого упоминал, каким-то боком был ко всему этому причастен Толстой.</p><p class="p1">— Никогда его не любил, — признался Ять.</p><p class="p1">— Ну, он-то за них не ответчик…</p><p class="p1">— А по-моему, ответчик. — Ять не стал бы распространяться на эту тему, она была слишком сложна для светского разговора, и сам он не все себе уяснил, но Ашхарумова смотрела на него с любопытством, и он почти против воли распустил перед ней хвост. — Если вдуматься, из его учения только такую секту и можно было вывести. Он специально такое учение придумал, чтобы на него клевали одни убогие. С пристойными людьми ему нечего было делать — пошли бы споры, сомнения, неуважение к летам и гению… Если снять все покровы, все это смирение, мужиковство и упразднение судов, то и осталось бы одно беспредельное самоуважение, которое все время надо чем-то питать. Пока писал, оно само питалось. А как все написал, так и захотелось глину месить: вот, мол, каков я… Это все кашка для тех, кому себя уважать не за что. Он только упустил, что не все они графы. Некоторым и в самом деле прямой резон был попахать… (Он вспомнил Трифонова.)</p><p class="p1">— Ну, не знаю. — Казарин избегал поддерживать такие разговоры, хотя бы и в узком кругу. Тут требовались убеждения, а он высказывался лишь тогда, когда имел наготове неуязвимое, безупречно защищенное мнение. О Толстом такого мнения быть не могло: для глумления фигура была слишком крупна, для преклонения — смешна.</p><p class="p1">Ять слушал Казарина вполуха. Он только сейчас понял, сколь многого лишен в своей аскетически-замкнутой жизни, и настроение его резко ухудшилось.</p><p class="p1">Прелесть Ашхарумовой была неотразима, но открывалась не сразу. Это походило на постепенное узнавание: поначалу оставалась смутная надежда, что гармония ее облика чем-нибудь да нарушится. Ять все ждал, что обнаружит себя резкая черта, которая сразу развеет очарование и позволит не томиться по недостижимому. Однако чем дольше он сидел в хорошо протопленной, крошечной комнате Казарина (с единственной и довольно узкой постелью, предполагавшей тесное объятие), тем яснее понимал, что никакого облегчения ему не будет, что она именно то, что есть: образ цельный, выточенный из единого куска. Красота? Но красота — еще легкий, переносимый случай по сравнению с этим: бывают красавицы, в которых все разнородно, раздрызганно, и именно эта дробность облика позволяет надеяться, что так же раздергано их сознание. Эти легко прощают вину, забывают, уходят и возвращаются. Ашхарумова была иной породы: такая женщина уходит раз навсегда, бежит из дому с первым встречным, если находит в нем свое (и находит безошибочно, никогда не обольщаясь ничтожествами); любит долго, терпит безропотно, прощает измены (не прощая лишь измены предназначению) — и остается с избранником до тех пор, покуда сам он не надломится. Около надломленного она не задержится и секунды — жалость ей незнакома; жалость оскорбила бы и его, и любовь. Такие женщины вечно устремлены вперед, как фигуры на корабельном бушприте, — и безошибочно чувствуют, какой корабль понесет их вперед быстрее всего. Это могло бы, на взгляд недоброжелателя, сойти за карьеризм — ненасытная жажда не просто любить, но любить победителя; но не было сомнения в том, что Ашхарумова с тем же пылом устремится и на гибель, лишь бы катастрофа соответствовала ее представлениям о совершенстве. Все это Ять понял почти сразу, но признаться себе боялся и потому постепенно убеждался в убийственной точности первоначальной догадки. У нее было крепкое, точно мраморное тело, на котором ни время, ни лишения, ни объятия не должны были оставлять следов: он представил всю ее сразу и ясно, с несомненностью опыта и вожделения. Рослая, тонкая, с длинными, сильными пальцами аккомпаниаторши, с круглыми черными глазами на худом лице (тут было все, что он любил, — вздернутый нос, высокие скулы), она была еще в том прелестном возрасте, когда в походке и жесте женщины сквозит подростковая скованность. Впрочем, во многих двадцатилетних женщинах тех времен Ять замечал эту намеренную угловатость, как бы в пику торжествующему маньеризму эпохи упадка.</p><p class="p1">Что поделать: если Ашхарумова была теперь с Казариным, стало быть, и Казарин был фигура незаурядная. Во всей его непоследовательности, в привычном аморализме была все та же цельность, чистота порядка, — та «стильность» (трижды проклятое словечко тринадцатого года), которую женщины вроде Ашхарумовой ценили превыше всего.</p></span>
