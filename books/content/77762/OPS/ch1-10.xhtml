<span><p class="p1">Дома он первым делом усадил сонного, покорного мальчика на диван (ребенок, кажется, был в таком шоке от всего случившегося, что новым поворотам в своей судьбе уже не удивлялся), зажег «летучую мышь» — электричества, конечно, опять не было — и кинулся растапливать печь. Тут он обнаружил, что дров почти нету: запастись ими он думал с утра, заночевать собирался в гостях, а уходя от Зайки, о дровах думал меньше всего. Надо было что-то делать — квартиру сильно выстудило. Ять пробежался глазами по книжным полкам и принялся решительно снимать с нижней тяжелые, толстые тома, к которым прикасался редко: тут были собрания сочинений восьмидесятых годов, журнальные приложения, только занимавшие место. Это был первый раз, когда ему пришлось топить книгами, — но, видно, ничего не поделаешь. Да и как могли бы окончить свой путь эти книги, проникнутые такой многословной любовью к человечеству? Единственный способ не то что жечь, а хоть греть людей тяжелым восьмидесятническим глаголом был именно пустить эти тома на растопку. Все эти мысли вихрем пронеслись у Ятя в голове, пока он вырывал отсыревшие страницы и совал их в печь; дальше дело пошло веселее — переплетные нитки сгнили, страницы вырывались целыми блоками, их можно было укладывать, как дрова. Отсыревшая, скользкая бумага занялась не сразу, пополз тонкий едкий дым, но минут через пять все уже шипело и потрескивало, и змейки пламени тут и там замелькали в бумажной груде.</p><p class="p1">Убедившись, что книги занялись (да и три полена у него все-таки еще были — часа на два согреемся), Ять принялся стаскивать с мальчика сапожки и пальтецо, трясти его, тормошить — самым опасным ему казалось именно сонное оцепенение, в которое ребенок был погружен все это время. Он уже не плакал и равнодушно позволял себя раздевать. Под пальто у него оказался праздничный бархатный костюмчик. Печь разгоралась, от нагретого кафеля плыли волны блаженного тепла.</p><p class="p1">— Сейчас уложу тебя спать, — громко говорил Ять на кухне, раздувая самовар. Он не хотел, чтобы мальчик испугался, оставшись в комнате один. — Выспишься, а завтра, пораньше, пойдем домой. Ты голодный? Сейчас дам хлебца. — Ах, дурак я, дурак, оставил у них все конфеты… Но кто ж и знал… Он вернулся в кабинет.</p><p class="p1">— Как тебя зовут?</p><p class="p1">— Петечка, — тихо ответил мальчик.</p><p class="p1">— Петечка. Чудесно. Меня зовут Ять. — Он подумал, что представиться так будет веселее. Сейчас надо было как-то его развлечь, вывести из одури.</p><p class="p1">— Ять? — переспросил Петечка и впервые улыбнулся. — Как букву?</p><p class="p1">— Ну да, как букву. Я и есть буква. Ты в гостях у буквы. Буква никому не делает зла, она безвредная. Она опасна только для гимназистов. Но ты ведь еще не гимназист?</p><p class="p1">— Нет, я пойду в гимназию только через два года, — сказал мальчик почти важно. В его речи иногда появлялась эта обаятельная кроткая важность, как бы сама подтрунивающая над собой. Так говорили только дети особого круга, привыкшие, что все умиляются каждой их фразе, и снисходительно принимавшие это умиление.</p><p class="p1">— Ну вот, а пока тебе не следует бояться буквы Ять.</p><p class="p1">— А разве буквы живут в домах?</p><p class="p1">— Ну а как же, — стремительно импровизировал Ять, доставая из буфета хлеб, картошку и воблу. — Ты думал, они живут только в книгах? В книгах, милый ты мой, живут только наши изображения. Сами мы ходим среди вас, но вы нас не замечаете. А тебе повезло, ты в новогоднюю ночь оказался в гостях у буквы. Буква может исполнить многие желания, но только особого рода. Сам понимаешь, если ты сейчас захочешь арбуз, я тебе этого устроить не смогу. Петечка снова засмеялся — тихо и застенчиво. Вот и ладно, подумал Ять. Приходит в себя.</p><p class="p1">— Но если ты захочешь всегда писать грамотно, много читать, хорошо запоминать прочитанное — это очень просто. Скажу заклинание — и все исполнится. Вот, поешь.</p><p class="p1">— А буквы тоже едят? — спросил Петечка.</p><p class="p1">— Ну что ты. Мы никогда не едим, мы питаемся бумагой. Даже топим бумагой. Но для гостей, умных мальчиков вроде тебя, мы обязательно держим немного еды. К сожалению, я не запас конфет. Видишь ли, я ждал сегодня в гости другого мальчика. Он очень любит воблу.</p><p class="p1">— Больше конфет? — не поверил мальчик.</p><p class="p1">— Гораздо! — воскликнул Ять. — Гораздо больше конфет. Есть мальчики, которые конфет не едят вообще, потому что от этого портятся зубы. А рыба, между прочим, прибавляет ума. И если ты будешь есть много рыбы, тебе будет гораздо легче запомнить, где пишется Ять, а где не пишется. Теперь это не требуется, но это ведь временно. Через год-два, когда ты пойдешь в гимназию, потребуется обязательно. Мальчик неуверенно отщипнул кусок хлеба и надкусил картофелину.</p><p class="p1">— А яблочка у вас нет? — спросил он робко.</p><p class="p1">— Яблочка? Яблочко будет завтра. Пойдем к тебе домой и по дороге где-нибудь достанем яблочко. Мы сможем зайти по дороге к букве «я», с которой начинается яблочко, и взять у нее.</p><p class="p1">— А у вас только то, что начинается с ятя? — догадался мальчик. — А елка? Почему у вас нет елки? Он даже с буквой не мог перейти на ты.</p><p class="p1">— Зачем же мне елка? — возмутился Ять. — Ель пишется через «е». Ель и елка — слова родственные, а где появляется буква «ё» — туда я не хожу, потому что мы враждуем.</p><p class="p1">— Вы поссорились? — уточнил Петечка.</p><p class="p1">— Да, и очень сильно. Она считает себя самой бедной и обиженной, потому что ее вечно пропускают и изображают без точек. Точки, видишь ли, ее главное украшение. — Ять поневоле усмехнулся. Петечка улыбнулся в ответ: действительно, как смешно считать какие-то точки главной доблестью! — А я считаю, что я гораздо более несчастная буква. Меня все норовят запретить.</p><p class="p1">— Почему?</p><p class="p1">— Да говорят, что толку от меня никакого. Ты ешь, ешь, а я буду тебе рассказывать. Говорят, что звучу я так же, как и «е», что от меня одна путаница… Но мы ведь даже выглядим совершенно по-разному! Это все равно, что запрещать одного из близнецов: они ведь похожи, зачем нам двое одинаковых? У тебя нет братьев?</p><p class="p1">— Только двоюродный, — ответил Петечка с набитым ртом. Ему понравилось ночью есть холодную картошку с маслом, да еще в гостях у буквы.</p><p class="p1">— Но ведь ты видел близнецов?</p><p class="p1">— Конечно. У нашего дворника мальчики-близнецы.</p><p class="p1">— Ну вот. Представляешь, как обиделся бы дворник, если бы одного из них запретили?</p><p class="p1">— Дворник бы не позволил, — уверенно сказал Петечка.</p><p class="p1">— Вот и я не позволю, — твердо сказал Ять. — Впрочем, даже если меня запретят, я все равно никуда не денусь. Я только спрячусь. Есть же такие специальные беглые гласные, которые пропадают. Например: дурачок — дурачка. Было «о», и нет его. Спряталось. Вот и я так могу.</p><p class="p1">— А куда вы спрячетесь? — спросил заинтригованный гость.</p><p class="p1">— Буду жить, где жил, только никто меня не будет видеть. Было в этом доме тринадцать квартир, а станет двенадцать. Эта будет невидимая. На месте двери стена. Только тот, кто меня помнит, сможет ко мне прийти. Ты вот, например.</p><p class="p1">— Как же я пройду сквозь стену? — не понял Петечка.</p><p class="p1">— Это для других будет стена. Для всяких дураков. А для тебя будет дверь. Ты сможешь позвонить в колокольчик и войти. И пока ты будешь у меня, никто не будет знать, где ты. Только никому не рассказывай, а то не увидишь дверь.</p><p class="p1">— А мы пойдем к другим буквам?</p><p class="p1">— Обязательно пойдем! У буквы «з» весь дом полон зайцев, — фантазировал Ять. — Они скачут прямо по квартире. Некоторые из них з-зеленые.</p><p class="p1">— Да, — подумав, сказал мальчик. — Вам не повезло. У вас очень мало всего.</p><p class="p1">— Ну что ты! — замахал руками Ять. — Что за глупости! Я есть во множестве слов, и все эти прекрасные вещи могут у меня появиться, стоит мне захотеть. И вообще, все буквы, кроме нас с «ё», очень дружат между собой и часто ходят друг к другу в гости. Если захочу, я всегда могу взять у «з» одного зайчика.</p><p class="p1">— И он тогда будет писаться через ять? — с ужасом спросил Петечка.</p><p class="p1">— Никогда в жизни, — уверил его Ять. — Если написать его через ять, у него тут же отвалятся ушки.</p><p class="p1">— Отвалятся! — выдохнул потрясенный Петечка.</p><p class="p1">— Да, да, отвалятся. Именно поэтому каждое слово надо писать правильно. Напишешь хлеб через «е» — и он будет черствый, невкусный. Напишешь печку через «е» — она будет холодная. Понял, как валено писать грамотно? Петечка уважительно кивнул.</p><p class="p1">— Ну, вот и славно. Теперь я сделаю так, что ты всегда будешь писать грамотно. Смотри! — Ять полез на дальнюю полку, где лежала у него ароматическая соль, странный подарок Клингенмайера. — Одна щепотка этой соли, кинутая в пламя, — и ты никогда, никогда уже не сделаешь ни одной ошибки!</p><p class="p1">Он подошел к печке и, не переставая мысленно благодарить антиквара, бросил щепотку в открытую дверцу. Пламя на миг изменило цвет — стало синим, почти фиолетовым; в комнате резко запахло какой-то пряностью. Запах был сладковатый, вроде коричного, но гуще и таинственнее.</p><p class="p1">— Ну вот, — торжественно проговорил Ять. — Теперь ты всегда будешь писать правильно и всегда будешь помнить, как меня найти.</p><p class="p1">После кружки горячего чаю, нескольких кусков хлеба и картошки мальчик осоловел и размяк. Сонные глазки его глядели прямо, ни на чем не фокусируясь. Он даже начал слегка заваливаться набок. Ять поспешил подложить ему под голову подушку и укрыть своим пальто.</p><p class="p1">— А завтра мы поиграем, — сказал Петечка, принимая весь этот неуклюжий уход с усталой снисходительностью юного принца. — Вы ведь знаете игры? Я знаю много игр, я больше всего люблю фанты и знаю также «Море волнуется»…</p><p class="p1">Вдруг он вздрогнул и сел на диване. То ли эти игры напомнили ему дом, то ли, как все засыпающие дети, он на секунду очнулся, словно от толчка, перед тем как окончательно погрузиться в сон.</p><p class="p1">— Но вы не уйдете? — спросил он Ятя, хватая его за руку.</p><p class="p1">— Нет, нет, что ты, — Ять замотал головой. — Ни за что. Как: же ты мне не веришь? Вера пишется через меня, мне все обязаны верить.</p><p class="p1">Это соображение успокоило Петечку, а может, усталость взяла наконец свое — его сморило окончательно, и, даже не дослушав ответа, он снова завалился набок. Ять укрыл его, подбросил в печь предпоследнее полено и подошел к окну. Ни звука не доносилось оттуда, и единственное окно, как всегда, светилось напротив: что делалось там? Этого Ять, как ни старался, разглядеть не мог. Свет пробивался сквозь тонкую кисейную занавеску. Иногда мелькала тень — силуэт был так нечеток, что Ять не понимал даже, мужчина обитает там или женщина. Ничего не было проще, чем зайти однажды в дом напротив и узнать, кто там не ложится до утра; но по вечной своей склонности к тайнам, по давнему нежеланию слишком приближаться к реальности и давать себе отчет в ней он предпочитал пока угадывать, что может делаться за этим окном. Это делало жизнь куда богаче.</p><p class="p1">Внизу смутно белел снег, девственно-чистый, какого никогда прежде не бывало в Петербурге. Ять, как в детстве, прижался лбом к ледяному стеклу. От его дыхания тотчас расползлось мутное радужное пятно. Но и холод стекла не мог отогнать страшной, тяжкой усталости, вдруг навалившейся на него. Виноват ли был хмель, вновь догнавший его в тепле, или дело было в ароматической соли Клингенмайера, только держаться на ногах не стало вдруг никакой возможности. На него напала та же одурь, что и на мальчика, но на дне сознания тлела, как жар под золой, раскаленная точка: нельзя спать, нельзя, нельзя. Меж тем проскрипело четыре, он восемнадцать часов провел на ногах, намерзся, переволновался, и наконец лег ближе к печке, положив голову на руки. Он знал, что бывают минуты, когда отогнать сон можно лишь титаническим усилием, но именно этого-то усилия никто и не хочет делать, — и тогда происходит ужасное, ужасное. Горе городу, если страж не станет бодрствовать… как это было? Вот такая же сонливость и слабость овладела всеми с самого сентября, и так же вдруг опускаются руки у всех, кто долго пытается спасти почти безнадежного больного… когда остается единственное, спасительное, может быть, усилие. Этих усилий было уже слишком много, и все они ни к чему не привели. Та же одурь… но этой мысли он уже не додумал до конца.</p><p class="p1">Ему снились пестрые, беспорядочные обрывки — дворцы, визири, темные витые минареты на фоне темно-синего неба с чужими звездами. Дважды он проснулся, вскинулся: мальчик тихо спал на его диване. Печь медленно остывала, в первое из пробуждений он подложил последнее полено, во второе закрыл заслонку, сберегая тепло, — после этого уже не просыпался до позднего утра. Небо очистилось, комнату заливал янтарный свет. Диван был пуст. Мальчик ушел незаметно, тихо одевшись, не оставив в комнате никакого следа своего пребывания. Ять вскочил, кинулся в соседнюю комнату, заглянул в шкафы, под стол (вдруг прятки?) — нет, странный ночной гость исчез, не желая будить хозяина. Верно, сам отправился на поиски дома. Как он дойдет до своей Третьей Рождественской? Ять набросил пальто, выбежал на улицу — никого, только прошла мимо старуха, таща за собой санки с какими-то обгорелыми досками; разбирала, верно, пожарище на Арсенальной. Мальчика не было нигде. Многие потом видели этого мальчика.</p><p class="subtitle">24</p><p class="p1">Во второй раз Ять появился в Елагинской коммуне только через три дня после Зайкиного дня рождения. Он опасался встречаться с Казариным, чтобы избежать его укоров или холодноватого высокомерия, боялся застать там Стечина, с которым пришлось бы объясняться, — а вместе с тем хотелось посмотреть на Ашхарумову, в чем он и сам себе не особенно признавался. Вдобавок он чувствовал род ответственности за всю эту странную затею и не мог оставить дело без присмотра.</p><p class="p1">Последние три дня он провел в полубреду: система его координат так безнадежно рухнула, критерии так расшатались, что жить сколько-нибудь сознательной и активной жизнью не стало никакой возможности. Может, он и на Елагин шел главным образом затем, чтобы побыть среди людей, знакомых по былому времени. Как главное его качество — безошибочное чувство фальши — могло проявляться только в присутствии этой фальши, так и оценку происходящего он мог вырабатывать только в споре, только рядом с людьми своего круга, которых никогда не бывало много, но теперь не стало совсем. Что он делал? Сходил на Третью Рождественскую, поискал четырнадцатый дом — это оказался трехэтажный пустой, запертый особняк «Лионского кредита»; мальчик что-то напутал — то ли номер улицы, то ли номер строения. Ять для очистки совести поспрашивал немногочисленных прохожих, не видали ли они ребенка восьми лет, в черном пальтишке и коричневых кожаных сапожках, — никто никого не видел, да Ять и сам понимал, что проморгал ночного гостя. Хотя как было не надеяться, что мальчик нашел-таки свой дом? Зрительная память у детей всегда лучше словесной.</p><p class="p1">В прочие дни Ять что-то писал, что-то читал, к кому-то ходил, соблюдал ежедневный урок по работе над никому не нужной книжкой, покупал у газетчиков «Знамя труда» и «Волю народа», удивлялся тому, что ничего не происходит, что немцы стоят в сотне верст от города и не делают никаких попыток его взять… хотя удивляться этому, в сущности, не следовало: ну, возьмут, и что делать? Ять ловил себя на том, что с интересом ждет любого продолжения: все было лучше, чем эта пауза. Вместе с тем ему казалось иногда, что нечто уже начало происходить, только он утратил чутье. Веяния воздуха, намеки, знаки были теперь слишком тонки, чтобы он мог уловить их. Что-то делалось, тихо и незаметно; темные с какими-то свертками сновали по городу все наглее. Заговор плелся, но цель его оставалась неясна.</p><p class="p1">Накануне прошел обильный, долгий снегопад, теперь было морозно и ясно. Ять перешел горбатый мостик и по заснеженной аллее, оставляя глубокие следы, двинулся ко дворцу. Охраны уже не было, документов никто не спрашивал. Казарин оказался дома и писал за столом, придвинутым к окну. Ашхарумова сидела в глубоком кресле с вязаньем и, когда Ять вошел, подняла на него черные круглые глаза. Против ожидания разговора о празднике на Васильевском не вышло. В Елагинской коммуне было не до того.</p><p class="p1">— Здравствуйте, Ять, — рассеянно приветствовал его Казарин. — Слышали, дела-то у нас какие? Раскол, сударь, раскол…</p><p class="p1">— Как раскол?</p><p class="p1">— Да садитесь, раздевайтесь. Маша, осталось у нас печенье? (Ятя опять кольнула их семейная идиллия, он все-таки завидовал, хоть и прятался от этой мысли.) Да, голубчик, стоит пятьдесят интеллигентов поместить в замкнутое пространство, где к тому же топят и хлеб есть, — на другой же день разобьются на двадцать фракций. Чем лучше топят, тем больше фракций.</p><p class="p1">— И сколько у вас пока?</p><p class="p1">— Пока две. Десятеро отселились, скоро и остальные уйдут. Да это только начало: потом и десятеро расколются… Нельзя же тут жить и не повторять всю общественную структуру. В себе свои болезни носим.</p><p class="p1">Рассказ Казарина поразил Ятя, но не внезапностью происшедшего, а именно глубокой органичностью, полной и удручающей предсказуемостью его. Началось, как всегда, с еврейского вопроса, с которого теперь начиналось в России все. Заспорили о мере допустимого сотрудничества с властями. Ловецкий, естественно, доказывал, что без службы себя уважать невозможно, что и Батюшков сошел с ума, покинув должность, что в согласии с государством нет ничего зазорного и прочее в таком духе. Фельдман, на беду, заговорил о том, что ежели бы интеллигенция считала для себя более приемлемым взаимодействие с властью, так и власть давно приобрела бы человеческий облик, — а заодно скептически отозвался о бомбистах и прочей крайней оппозиции, наиболее виноватой. Тут, неожиданно для всех, вскочил с места Хмелев и принялся доказывать, что кому-кому, а Фельдману не следовало бы поносить бомбистов, потому что все сделали именно фельдмановские братья, а выходило, что и сам Фельдман.</p><p class="p1">— Вы о чем изволите говорить? — кротко осведомился карлик.</p><p class="p1">— Не делайте невинных глаз, не делайте! Я помню, что такое было называться русским в пятом году! Скажи, что любишь монархию или Отечество, — и с тобою никто не захочет разговаривать! Общественное мнение, пружина чести! Кружки грязных, полуобразованных ничтожеств, грязные волосы, грязные ногти! Это вы будете теперь ругать русских за то, что они допустили крайность? Это вы смеете теперь упрекнуть их в том, что они предали государя? Сперва вы растлили страну, а теперь она вам виновата?! — и прочие совершенно, ежели вдуматься, абсурдные инвективы, не имевшие к Фельдману никакого касательства: все знали, что он стоит вне политики и в немногих своих публицистических статьях призывал интеллигенцию прежде заняться собственным образованием, а уж потом — общественным переустройством. К чести маленького Фельдмана, он пытался погасить скандал.</p><p class="p1">— Вы раздражены теперь, Николай Алексеевич, — спокойно сказал он Хмелеву. — Успокойтесь, лично вас никто не обвиняет ни в чем. Хотя бы среди нас вы могли бы не искать врагов.</p><p class="p1">Последнее «мы» взорвало Хмелева окончательно. Это «мы» посмел употребить человек, которого он никак не мог считать своим — вся хмелевская кровь бунтовала против этого. Он совершенно потерял власть над собою и открыто, никого уже не стесняясь, заявил, что жиды не смеют ему ничего указывать, что они довольно уже указывали всем и что вследствие этих-то указаний Россия и погибла.</p><p class="p1">Ответить на такое обвинение Фельдман был не в силах. Ять хорошо знал его, всегда любил, но понимал, став на его место, что в эту секунду он почувствовал себя не только жертвой чудовищного оскорбления, равного пощечине или даже худшего, — но и победителем. Как ни смотри на предмет спора, а противник, позволивший себе такой выпад, уничтожал себя даже в глазах единомышленников. Казарин очень достоверно изобразил, как Фельдман в первый момент испуганно заморгал, но тут же понял преимущества своего нового положения, встал из-за стола и молча принялся отряхивать сюртучок от крошек (всегда обсыпался и обливался). Тишина была общая, даже Хмелев не мог продолжать и только хватал ртом воздух. Он весь трясся (Казарин показал как).</p><p class="p1">— Ну а вы что ж? — спросил Ять.</p><p class="p1">— А я сижу, смотрю, что будет. Легче всего вскочить и сказать: «Николай Алексеевич, извинитесь сию секунду!» Вы меня с молодости знаете, Ять, я никогда в еврея не брошу камень, а все-таки, воля ваша, Хмелев порядочный человек. Я бы его предал, если б осадил. Но Борисов-то не таков, он скорее даст бороду себе сбрить, чем допустит, чтоб его заподозрили в консерватизме. Он вскочил и твердым протодиаконским басом возглашает: «Я полагаю, Николай Алексеевич, что вы обязаны немедленно прекратить эту безобразную сцену и принести при всех извинения Осипу Михайловичу, в противном случае пребывание мое в одном помещении с вами сделается невозможным». Испугал, а?</p><p class="p1">Хмелев и сам понял, что перегнул палку, — но за последние годы он так устал сдерживаться, так возненавидел либеральный диктат, казавшийся ему куда опасней монархического, что не дал волю секундной слабости и обрушился теперь на Борисова. «Вязать Борисова-щенка!» — возгласил Казарин, и Ашхарумова звонко засмеялась.</p><p class="p1">— Тут вам и все: и па-а-апрашу не указывать, и сомнительные авторитеты, и антинаучный подход, и мальчишка, смеющий советовать тому, кому он в сыновья годится, ежели бы у приличного человека мог вырасти такой сын… Всем интересно, но и противно, и, главное, старика жалко: роет старик себе могилу, донеси кто — не то что из дворца, а из города выкинут. Ну — прорвало. Когда сделал паузу, Борисов ему очень спокойно говорит: «Николай Алексеевич, станете ли вы доводить дело до суда чести или сами поймете, что высказанные вами вещи несовместимы со званием русского ученого?» Напирает, разумеется, на слово «русский», тем более что и сам типичный богатырь, бородища надвое. Хмелев бы, может, и раскаялся, но после разговора про суд чести понял, что дело нешуточное. Долгушов тоже встрял: как вы — это он Борисову, — как вы смеете вашего же учителя, вашего же благодетеля… Он вас и при факультете оставил… Тут Борисов ему: я чту в Николае Алексеевиче своего учителя, но ежели мой учитель под действием таких ничтожных причин, как голод и холод, теряет человеческий облик и превращается в пещерного дикаря — мой долг сказать ему об этом, пока не сказали другие. Ну, после пещерного дикаря, сударь, я уж не знаю, как старик удержался от того, чтобы в него чашку не швырнуть. Тут, я думал, его и удар хватит. Весь побагровел, челюсть трясется — варвар, кричит, варвар! Вар, вар, где мои легионы! Ах, жаль, Марья не видела, она как раз в тот день мать навещала. Ну вот. Тут, естественно, Барцев вскакивает и говорит, что не позволит, что не даст…</p><p class="p1">— Сколько я знаю Барцева, — вставил Ять, — он должен был бы выступить совершенно мимо темы. Что-нибудь вроде: «Не смейте оскорблять дикарей, это гордыня белого человека»…</p><p class="p1">— Что вы, — неожиданно вступилась Ашхарумова, — он не такой. Он иногда только, чтобы посмеяться… но на самом деле вовсе не дурак!</p><p class="p1">— Да, он малый острый, — небрежно заметил Казарин. — После вашего ухода неплохие стихи читал. Ну так вот: Барцев кричит, что не позволит, Седова визжит, что не позволит Барцеву, Льговский заявляет, что он тоже еврей, Кривицкий ему отвечает, что гордиться, к сожалению, нечем, — тут к Хмелеву возвращается дар речи, и он заявляет, что секунды не останется в этом притоне и что лучше сдохнуть под забором, чем провести остаток дней среди предателей и кретинов. Отшвыривает стул — прошлого, между прочим, века — и направляется к дверям, но на полпути разворачивается и вопит, что и страну в свое время не покинул, хотя звали и в Гейдельберг, и куда хотите, — и потому не понимает, почему должен уйти он, когда он здесь из тех немногих, кто получает еду и тепло по праву. Его город, его остров и чуть ли не его дворец. «Да, да, — бормочет очнувшийся Фельдман, — уйду я, должен уйти я, потому что из-за меня, как всегда, началось, уж такая наша доля — изгнание». Говорит он это без тени игры, не лукавя, не педалируя — видно, что солоно; а куда пойдет? Одни кричат: уйдете вы, другие: нет, уйдете вы! Под конец Фельдман плетется к себе укладываться, его поддерживает Борисов, идя на полусогнутых, а с другой стороны Барцев, тоже согнувшись колесом; Хмелева отпаивают чаем, Льговский говорит, что ноги его тут не будет, — в общем, амуры, черти, змеи.</p><p class="p1">— А вы-то что? — снова поинтересовался Ять.</p><p class="p1">— А что я? Я смотрю, и все смотрят… Коротко сказать, откололись десять человек. Поначалу хотели отвести Фельдмана домой и обеспечить уход, но потом придумали другое. «С какой стати мы будем оставлять ЭТИМ звание академической коммуны? Мы сами академическая коммуна, с не меньшим правом!» Порешили на том, что будет второе общество. Помните анекдот, как русские подрядились строить тоннель под Ла-Маншем? «А ну как не встретитесь? — А как не встретимся, то у вас будет два тоннеля». Ашхарумова засмеялась, влюбленно глядя на него.</p><p class="p1">— И что, ушли?</p><p class="p1">— Завтра хотят уйти. Льговский придумал на Крестовском поселиться, там тоже дворец. Паек хотят забрать, Барцев к Чарнолускому пошел с утра — просить, чтобы дворец отдали. Все равно пустой стоит. Да и дач там полно, селись в любую… Переедут, заживут отдельно.</p><p class="p1">В эту секунду дверь распахнулась, и на пороге показался Горбунов — с белым, искаженным лицом, с вытаращенными глазами.</p><p class="p1">— Вы не знаете? — крикнул он. — Вы слышали?</p><p class="p1">— Что, что такое? — вскочил Казарин.</p><p class="p1">— Кошкарев и Шергин… этой ночью… убиты… в Лазаревской! Он хлопнул дверью и помчался оповещать дальше.</p><p class="subtitle">25</p><p class="p1">Вся Елагинская коммуна стремительно собралась в Овальном зале. В первый момент на лицах обитателей дворца читался только испуг, почти ужас. Большинство из них ничего толком не знали о Кошкареве и Шергине, в лучшем случае слышали имена, — но ежели дошло до убийства арестованных, да еще и в больнице, это могло означать только одно: дело действительно серьезно, началось нечто еще небывалое. Убийц уже взяли, больше они никого тронуть не успели; узнав об этом, Ять вздохнул свободнее. У него были свои причины беспокоиться о Лазаревской больнице.</p><p class="p1">Горбунов рассказывал чудовищные подробности. Убийство совершилось поздним вечером — Шергин уже спал, Кошкарев читал в постели. Вломились те самые матросы, которые неделю назад отконвоировали их в больницу. Все были пьяны. Сторожу приказали открыть (сейчас выясняли, не был ли и он в сговоре), протопали на третий этаж, Шергин проснулся, закричал — ему выстрелили в рот; пуля выбила передний зуб, задела корень языка, он захлебнулся собственной кровью. В Кошкарева выпустили три пули, все попали в грудь и живот, но он жил еще полтора часа и смог назвать убийц. К нему-то и вызвали хирурга — тот сразу понял, что дело безнадежное и надо только облегчить страдания, но от инъекции морфина Кошкарев отказался. В последние минуты он плакал, жалел, что не вырастит детей (которых вчера только к нему приводили — он впервые после трех месяцев заключения увидел их), и все удивлялся: ведь матросы были к ним вполне доброжелательны… Хотели послать за женой — он попросил не делать этого, через час потерял сознание и еще через полчаса умер.</p><p class="p1">— Я знал, — тихо и твердо повторял Алексеев. — Я знал и всем вам говорил. Эта власть и нас собрала единственно для того, чтобы уничтожить одним махом. Что вы теперь скажете? А? Что вы теперь скажете?! — и тыкал пальцем в Борисова.</p><p class="p1">— Скажу, что сначала надо узнать все обстоятельства, — так же тихо и твердо отвечал Борисов. — Я допускаю и то, что это провокация…</p><p class="p1">— Чья провокация?! — забывая окать, кричал Горбунов. — Моя провокация?</p><p class="p1">— Да вы-то при чем? — отмахивался Борисов. — Может быть чья угодно, вплоть до немцев. Если выяснится, что убийство произошло по приказу властей, — это исключает всякое сотрудничество. Если окажется, что пьяные матросы разбуянились, — надо посмотреть, будут ли они примерно наказаны…</p><p class="p1">— Наказаны! — шипел Долгушов. — Чтобы своя своих не познаша? Им происхождение служит индульгенцией, они всех нас могут перебить — и ничего не заслужат, кроме поощрения…</p><p class="p1">— Вы-то что думаете, Ять? — спросил Казарин.</p><p class="p1">— Я Кошкарева знал немного, — Ять все пытался представить его умирающим, с тремя пулями в груди, плачущим — и не мог: он помнил его сначала молодым земцем, идеалистом, народолюбцем, потом посредственным, хоть и горячим публицистом, потом членом кабинета, министром здравоохранения, — доброжелательным, мягким, умеренным… — Мы в последний раз виделись, кажется, в августе, меня Мироходов попросил с ним побеседовать. Одного в толк не возьму: если кого из правительства и был резон арестовывать или казнить, то уж этого в последнюю очередь. Никакой закономерности не вижу, никакого смысла…</p><p class="p1">Он лгал, конечно, и лгал прежде всего себе. Смысл был именно в том, чтобы погибли Кошкарев и Шергин, двое кротких, неразлучных, всю жизнь бывших на «вы», но всегда сводимых судьбой в роковые часы истории. Оставалось непонятным, как поступит новое правительство: оставит убийство безнаказанным (но тогда, пожалуй, и комиссаров сметут по одному — они такие же пролетарии, как мы крестьяне) либо попытается примерно наказать, вплоть до публичной казни… последнее вряд ли. Ясно было одно — революция выходит из-под контроля и скоро пожрет собственных детей; трудно было поверить, чтобы комиссары вроде Чарнолуского или даже Воронова смогли удержать этот поток в каком-никаком русле. Эти соображения Ять и начал излагать Казарину, когда вдали послышался треск автомобиля. Проехать к дворцу из-за снежных заносов машина не могла и остановилась, едва съехав с моста. Все кинулись к окнам. Утопая в снегу и оскользаясь, ко входу во дворец брели Чарнолуский и Барцев; за Чарнолуским поспешал дюжий матрос — видимо, комиссар не ездил теперь без охраны. Лиц было толком не разглядеть, сверкало только комиссарское пенсне.</p><p class="p1">— Арестовывать приехал, — спокойно сказал Хмелев.</p><p class="p1">— Этот-то? — презрительно усмехнулся Алексеев. — Не поверю. Агитировать идет. Сейчас будет говорить про уродливые гримасы.</p><p class="p1">Чарнолуский с утра знал об убийстве Кошкарева и Шергина и долго сидел в кабинете, не решаясь ничего предпринять. Он знал, что убийцы и не думали скрываться — завалились спать в казарме; что даже утром, с похмелья, они считали свой поступок подвигом и не склонны были раскаиваться — «Они ж все равно были не жильцы»; Бродский, конечно, был теперь обречен, но и не в Бродском было дело. Непонятно было, имеет ли он сам право уйти, или следует остаться до выяснения всех обстоятельств. Он однажды уже подавал в отставку и писал даже негодующее письмо, которое собирался передать в газеты, — о том, что он не может отвечать за состояние культуры, которую разрушают так называемые герои революции; Бронштейн тогда высмеял его, и многие присоединились. Получилось очень гадко. Он и теперь начал было писать прошение об отставке, но, написав первые строки, застопорился. Следовало все же понять, как пойдут события, — но тут доложили о приходе Барцева, и вошел этот милый, рыжий, застенчивый, ни о чем не подозревающий футурист, с которым Чарнолуский никогда прежде не виделся, футурист стал сбивчиво рассказывать о том, что филологи и литераторы, собранные в коммуне, разошлись по вопросу об отношении к власти, что разделил их также национальный вопрос, но суть не в этом… Словом, часть деятелей литературы настроена более радикально и хотела бы создать собственную коммуну… и Чарнолуский чуть не расцеловал рыжего: перед ним была та новая интеллигенция, о которой он мечтал, которую пестовал! Только ради этого стоило затевать всю историю: интеллигенцию достаточно было собрать в приличных условиях на неделю, чтобы из ее среды выделился передовой отряд! В этих условиях бросать пост было никак невозможно. Надо было немедленно отправляться во дворец и говорить что угодно, лишь бы успокоить елагинцев. Там наверняка уже знали, а если не знали — пусть лучше узнают от него.</p><p class="p1">Выигрывая время, он долго отряхивался на крыльце, оббивал ботинки (грубые, старые), долго пропускал Барцева впереди себя, наконец вошел, скинул пальто… Некоторое время молчали все — и комиссар, и коммунары. Наконец Чарнолуский поднял глаза и заговорил.</p><p class="p1">— Вы знаете, зачем я здесь, — начал он на этот раз без всякого обращения. — Все мы скорбим по поводу гибели честнейших, вернейших деятелей России, ее, посмею сказать, совести. Не стану говорить о том, что значили для страны имена Шергина и Кошкарева. Мой долг — лишь рассказать о том, что произошло на самом деле…</p><p class="p1">— Из первых рук, — сказал Алексеев очень тихо, но Чарнолуский услышал. Он выдержал паузу, в упор посмотрел на профессора, потом потупился, словно пытаясь справиться с чудовищной, незаслуженной обидой, — пересилил себя и продолжил.</p><p class="p1">— Революция в опасности, — заговорил он медленно и скорбно. — И никто не угрожает ей так явно, так нагло, как силы, которые она сама разбудила. Пока лучшая часть народа жертвует собой, терпя нечеловеческие лишения, — худшая его часть пользуется свободой для грабежа и убийства. Гибнут не только представители аристократии — гибнут и честные работники, и сознательные пролетарии; и лучшие из крестьян, и ни в чем не повинные герои, которые могли бы рассчитывать на благодарность масс, а получают от них пьяный дебош… Кошкарев и Шергин больше других сделали для своих убийц, но их убийцы не знали, на кого поднимали руку…</p><p class="p1">— Если бы вы их не взяли, — сипло возразил Хмелев, — эти матросы и не знали бы, кто перед ними! Вы сами указали им мишень.</p><p class="p1">— А кто указывает мишень десяткам людей, нападающим на первого встречного?! — оскалился Чарнолуский. — Кто натравливал уличных бандитов на любого прохожего в пенсне? И началось это, прошу заметить, задолго до нас! Мы первые, кто попытался остановить разгул преступности, развал фронтов, квартирные грабежи! И создание вашей коммуны, господа, — он сам не заметил, как эти «господа» соскочили у него с языка, — в конце концов, часть той же политики: попытка защитить гордость страны от голода и беззакония! И я знаю, что многие из вас ценят это, но страшатся сотрудничества с властью! Сначала царизм, а потом и правительство Керенского все сделали для того, чтобы скомпрометировать саму идею власти. Но если мы все любим Россию — нам никогда не удастся спасти ее поврозь! И потому вчерашние выстрелы — это выстрелы в нас…</p><p class="p1">— Может, их не матросы убили? — язвительно вопросил Казарин. — Может, переодетые немцы или кто из кадетов? Чтобы на вас, так сказать, пала кровавая тень? Овальный зал одобрительно загудел. Чарнолуский, к чести его, уловил иронию.</p><p class="p1">— Я не могу вам сейчас сказать, кто это сделал и какова будет участь преступников, — заговорил он, снова уставившись в пол. — Я знаю одно: они поплатятся, и жестоко. Вашей коммуне будет придана дополнительная охрана. Вы по-прежнему вольны покинуть ее в любой момент. Я слышал о явлениях раскола в вашей среде и сожалею о них, потому что именно расколы не раз уже губили страну. Сейчас, после невинно пролитой крови, надлежит сплотиться, и тогда гибель двух честных работников будет хотя бы не напрасной. Пусть подтолкнет нас она к объединению, потому что иначе нам не спасти родину…</p><p class="p1">— Да ведь это вы, вы развязали злодеям руки! — не выдержал Хмелев. — Как вы смеете отмежевываться от убийц? Ведь это вы им дали оружие, поставили охранять арестованных, дали чувство безнаказанности! И у вас хватает наглости говорить теперь, что вы не причастны?</p><p class="p1">— Вы не смеете говорить мне этого! — загремел Чарнолуский. Все-таки и у его терпения был предел. — Вы не понимаете, чего нам стоит удерживать порядок в городе! На улицах, в лесах, в городах убивали и при царской власти — и невинных расстреливали, как девятого января, сотнями! Я знал, знал, что теперь любое уличное хулиганство будут ставить нам в вину, — но никогда не предполагал, что услышу такой упрек от образованного человека!</p><p class="p1">Хмелев, непривычный к отпору, несколько сник. Чарнолуский понял, что бой остался за ним и что надо ковать железо, пока горячо.</p><p class="p1">— Я прошу, я умоляю вас, — заговорил он, задыхаясь, словно этот порыв отнял у него последние силы. — Я прошу верить, что наша скорбь, наше отчаяние не меньше ваших. Трагедия должна всех нас научить беречь и щадить, а не истреблять друг друга. Подло, бесчеловечно использовать ее в политике, размахивать ею, превращать акт вандализма в акт политический! Это недостойно памяти борцов, недостойно имени интеллигентов… русских, наконец! Я клянусь вам всем, что есть у меня святого: никто из убийц не уйдет от возмездия! Если случится иначе — чего я не допускаю ни на секунду, — я немедленно выйду из правительства.</p><p class="p1">Это было сильное заявление. Похоже, Чарнолуский достиг цели. Возможно, теперь ему удалось бы остановить даже раскол в коммуне, — но тут заговорил Казарин.</p><p class="p1">Никто не тянул его за язык, и, вспоминая ту речь, Ять думал, что никто больше его не сделал для окончательного раскола. Он говорил сдержанно и тихо, но с таким зарядом ненависти, что все выкрики Хмелева меркли перед этим непробиваемым презрением. Для начала он елейно заметил, что глубоко благодарен представителю большевистского правительства за исключительную заботу о филологической науке; ясно было, сколь горяча его благодарность. Он придал переселению профессуры в Елагин дворец характер изгнания из города чуть ли не в резервацию. Он хотел бы, конечно, надеяться, что их квартиры не будут за это время реквизированы; когда Чарнолуский открыл рот, чтобы пылко уверить в неприкосновенности профессорского имущества, Казарин, не повышая ледяного голоса, сказал, что лично он господина комиссара не прерывал. Далее, заметил Казарин, все попытки приписать убийство двух честнейших деятелей только пьяным бандитам не будут иметь никакого успеха, ибо именно на пьяных бандитов и опирается новая власть, и именно им — или таким, как они, — поручена охрана прочих арестованных. Никакою нервозностью — естественной, конечно, при исполнении такой трудной должности (тут последовала змеиная улыбка) — нельзя объяснить зверского убийства беззащитных и больных людей. Пока новая власть не освободит всех арестованных и не даст гарантий свободной печати, ни один интеллигентный человек не сможет поручиться не только за свою жизнь, но и — что всего важнее — за свою честь. И до этого ни о каком сотрудничестве с этой властью речи быть не может. Ибо даже самое жестокое наказание убийц не означает еще, что подобные зверства не повторятся, что они не происходят сейчас, в эту самую минуту… Но в эту самую минуту распахнулась дверь и вошел Льговский — бледный, небритый и необыкновенно сосредоточенный. Таким Ять видел его впервые.</p><p class="p1">— Я сейчас от Воронова, — сказал он, глядя в пустоту и обращаясь ко всем сразу. — Убийцы арестованы и будут осуждены. Бродский смещен. Семьям выделены средства, у Шергиной был Балашов.</p><p class="p1">Все названные фамилии никому ничего не говорили, но в лице Льговского столько было серьезности и сознания значительности происходящего, что никто не пристал с расспросами. Не раздеваясь, размотав только шарф, Льговский молча прошел на второй этаж.</p><p class="p1">— Вы видите теперь, — торжественно произнес после паузы Чарнолуский, — что власть делает все, чтобы искупить свою вину, пусть и невольную. Мы надеемся, что вы поможете нам обуздать стихию.</p><p class="p1">Чарнолуский пообещал лично быть на похоронах выдающихся деятелей и с достоинством вышел. Барцев побежал было за ним, но махнул рукой и остался: решать вопрос о расколе было теперь не время.</p><p class="p1">— Ну что? — Казарин подошел к Ятю и слегка толкнул его в бок. — Ловко?</p><p class="p1">— Что ловко?</p><p class="p1">— Ловко я этого трепача?</p><p class="p1">Ять с трудом одолел злость. Казарин пользовался благодеянием тех, кому не хотел подавать руки, — и именно от него исходила самая непримиримая отповедь мягчайшему и несчастнейшему Чарнолускому, заложнику происходящего.</p><p class="p1">— Что сделал вам этот трепач? — спросил он почти резко.</p><p class="p1">— Мне — ничего, — бодро ответил Казарин. — А пусть хамы знают, что не купили никого своей моржевятиной.</p><p class="p1">— Да ведь вы сами сюда пришли!</p><p class="p1">— Потому и пришел, что все это по праву мое, а могло достаться им. Я и в Мариинку вселился бы, будь такая возможность. Вы что же, Ять, — с ними?! — И он взглянул на него уже отстраненно, даже чуть откинув голову, словно смотрел теперь с позиций безупречной духовной элиты, из которой Ять трусливо дезертировал.</p><p class="p1">— Знаете, — сказал Ять, чувствуя тот же прилив бешенства, что и на дне рождения Зайки, — в ту минуту, когда вы принялись уничтожать этого несчастного, — самого приличного из них, можете поверить, — я был скорее на его стороне. Его, а не каких-то «их». Их я не знаю. Но отчего вы всегда хотите быть так неуязвимы?</p><p class="p1">Он бы и еще много чего ему наговорил, упомянув, возможно, и седину в бороду, и беса в ребро, — но тут подлетел громогласный, длинноносый Корнейчук и спас положение. Он перемещался по всему залу, вступал в разговоры, ужасался, надеялся, ахал, все запоминал — вот у кого память была абсолютная, хранившая залежи нужного и ненужного, — и теперь дошла очередь до них.</p><p class="p1">— А! Что! — по-репетиловски восклицал он. — Но Льговский каков! Откуда у него доступ во все эти круги!</p><p class="p1">— Да он и не скрывает вовсе, что еще на фронте разагитирован. Они у него все в дружках. — Для Казарина уже не было ничего неясного.</p><p class="p1">— Вы куда сейчас? — спросил Ять у Корнейчука, желая прекратить тяжелый разговор.</p><p class="p1">— Домой, домой, — тут же засобирался тот. — Уж третий час, мне писать… ночами не сплю, совершенно голова не работает.</p><p class="p1">— Для кого вы все пишете? — язвительно спросил Казарин. — Газеты закрыты, журналов нет, книги не издаются…</p><p class="p1">— У меня Булыгин обещал сказку купить, — объяснил Корнейчук, — и я думаю издать новонайденный отрывок Слепцова…</p><p class="p1">— Да кому теперь нужен Слепцов!</p><p class="p1">— Может, никому и не нужен, а работать надо. Дети, дети… Да и не в детях же дело. «Человека такого усталого не держи — пусть идет», — процитировал он своего любимца и, взяв Ятя под руку, пошел с ним к дверям. Ять полагал, что, едва они окажутся на улице, наедине, Корнейчук заговорит о Шергине и Кошкареве; он знал их и наверняка имел особое мнение о степени виновности властей, — но Корнейчук, против ожидания, принялся рассказывать ему о том, как он не мог заснуть и всю ночь читал Boswell'a (Ять узнал его книжный язык, верный признак самоучки)… Поначалу он думал, что Корнейчук опасается подслушивания, но вот они вышли на мост — а тот все не умолкал.</p><p class="p1">— Послушайте, — сказал Ять, остановившись посреди моста. — Вы в самом деле можете сейчас говорить о Босвелле?</p><p class="p1">— Но о чем же еще говорить?! — изумился Корнейчук. — Разве можно говорить о чем-то другом? Язык нам дан, чтобы скрывать свои мысли, каждый в одиночку переживает ужас.</p><p class="p1">— Да, да, — сказал Ять. — Я вас понимаю. Помните ответ Августина: а если бы во время игры в мяч вам сказали, что через четверть часа рухнет мир?</p><p class="p1">— Продолжал бы играть в мяч! — пылко подхватил Корнейчук. Он обожал игру в цитаты, это было для него слаще обмена паролями. — Продолжал бы играть в мяч!</p><p class="subtitle">26</p><p class="p1">Поздним вечером 25 января, после похорон Шергина и Кошкарева, в Елагином дворце долго не расходились, сидели при двух лампах за столами (керосин кончался, нового за треволнениями последних дней, не подвезли) и изредка прерывали тягостное молчание воспоминаниями об убитых. Что-то главное оставалось несказанным, и разойтись было невозможно. Вместо того чтобы объединиться в общем горе, елагинцы все отчетливее чувствовали рознь, и любые попытки общей скорбью заслонить надвигающийся разрыв выглядели непростительным фарисейством. Ужаснее всего было состояние тоскливой неопределенности, владевшее всеми не только в Елагином дворце, — но только в Елагином дворце, пожалуй, уже догадывались, что эта-то неопределенность, вечная спутница русской смуты, и убила ни в чем не повинных, никому не мешавших людей. И потому пятьдесят человек, сидевших за столом на первом этаже и тихо, с долгими паузами переговаривавшихся в полумраке, понимали, что определяться так или иначе придется — чем скорее, тем лучше. Было холодно, пальто никто не снимал. Иногда дежурный — на сей раз это был Казарин — подбрасывал дров в две печки, стоявшие по углам залы. За окнами было серо, потом черно.</p><p class="p1">Первым не выдержал Хмелев — впоследствии, вспоминая тот вечер, почти все были ему благодарны за это.</p><p class="p1">— Вы, вероятно, ждете, — заговорил он медленно и угрюмо, — что старый мракобес примется сейчас брюзжать и валить все на наших благодетелей. Велик соблазн обмануть эти ожидания, но делать нечего. Как хотите, с самого начала я был прав. Убийцы сидят в Смольном, и разговоры о наказании не стоят ломаного гроша. Вы скажете, конечно, что оружие направляли не они… все это мы сегодня слышали, покорно благодарю. Они три года растлевали и расшатывали страну — этого довольно. Они агитировали на фронтах — это тоже общеизвестно. Они отняли у нас профессию, упразднили то, чем во все времена приличный человек отличался от неприличного, согнали нас, как скот, в эту резервацию… Мы и это терпим, и это глотаем! Чего еще надо, чтобы понять: эта власть преступна, она ни перед чем не остановится! Раз уж мы собрались вместе, раз уж они по малоумию своему дали нам этот единственный и последний, вероятно, шанс — не воспользоваться им было бы и вовсе позорно! Нам нужно сейчас не отношения выяснять, не друг с другом спорить, а понять, понять, пока не поздно: вот кто правит теперь Россией! И мы, горстка людей, это понимающих, в силах хотя бы напоследок плюнуть в хамские рожи!</p><p class="p1">— Вы самосожжение предлагаете? — спросил Томилин, сорокалетний театральный обозреватель, напросившийся в коммуну неделю назад.</p><p class="p1">— Оставьте, — махнул рукой Хмелев. — Я предлагаю не искать с ними компромисса, а выработать формы борьбы… сформулировать требования…</p><p class="p1">— Николай Алексеич! — медленно, тоном долго сомневавшегося и наконец решившегося человека заговорил Борисов. — Сделаем вид, что не было известного инцидента неделю назад. Но ведь я хорошо помню нашу беседу в июле прошлого года, когда вы с тем же пылом называли «этой шайкой» правительство Керенского. В этой шайке были и Шергин с Кошкаревым, просто теперь они мертвы и вас вполне устраивают…</p></span>
