<span><p class="p1">— Если по совести, — сказал вдруг Мельников, почти никогда не открывавший рта на общих собраниях, — то равенство есть равенство. Ты, Саша, неправ. Когда бьются двое и сломался меч, то и другой брось меч, чтобы видели горы, как надо — честно. Надо бросить меч, я разумею — паек. Мы таковичи, и пусть видят.</p><p class="p1">— Но с какой стати? — взорвался Корабельников. — Прости, но тут — прямое юродство! Ты, может быть, и не пишешь плакатов, тут твое право, один может агитировать, другой работает с языком. И то и другое — работа. Но чтобы мне картошки не испечь, чтобы девчонкам, которые по трафарету раскрашивают сотню плакатов, каши себе не сварить, — это, извини меня, черт-те что! Ради красивого жеста разбрасываться… решать за всех…</p><p class="p1">— Саша, тебе и мертвому эту картошку еще будут в спину кидать, — тихо сказал Мельников. — Ты не знаешь, а я знаю. Надо отказаться, мы заработаем. Я никогда не зарабатывал, а тут заработаю. Остается не то, что ты сделал, а то, что про тебя сказали дураки, потому что дураков больше. Откажись от пайка, Корабель, и мы найдем, чем заработать денег. Я продам самописьма: если их покупают на Сенной, значит, они нужны. Митурин продаст живописьма. Соколова, я знаю, распишет ткани на заказ. Мы найдем себе на жизнь, Саша, но не будем есть то, что отняли у других.</p><p class="p1">— Вот видите! — воскликнул Фельдман. — Даже он понимает! (Этого «даже» он тут же устыдился, но Мельников не обращал внимания на подобные мелочи.) Поймите: сегодня они, но завтра мы!</p><p class="p1">— Черт! — не выдержал Корабельников. — Но ведь когда мимо вас ведут преступника в тюрьму, вы же не думаете, что сегодня он, а завтра вы?</p><p class="p1">— Обязательно думаю, — тихо сказал Мельников. — И когда есть гривенник, всегда ему дам, а нет гривенника, то дам сухарь. Я ли прав перед ханом? Преступнее меня нет преступника, я по случайности до сих пор не взят в колодки. И ты, Саша, тоже, — потому что ты хоть и злой мальчишка, а художник, совершенно незаконный сын Бога.</p><p class="p1">— А что? — прогудел Митурин. — Мельничек говорит дело. Я бы продал два холста, у Крагина есть работы, Лотейкин рисует такое… знаешь, в билибинском духе… Приличная могла бы получиться выставка, с аукционом. И уж если где устраивать, то… — Он с таинственным видом огляделся по сторонам и предложил нечто, заставившее даже угрюмого Корабельникова широко улыбнуться.</p><p class="p1">— А что! — сказал он прежним молодым голосом, каким когда-то на первых своих выступлениях читал знаменитое «Тьфу». — Это будет, я понимаю, скандал. Это будет хар-роший скандал!</p><p class="subtitle">30</p><p class="p1">Нелепо было бы думать, что Чарнолуский не знал о предстоящем собрании: добровольных осведомителей хватало и у него. Беллетрист Ягодкин, заметив ремингтонированное воззвание на Васильевском, аккуратнейшим образом отодрал его от столба и доставил наркому. Тот прочитал и задумался.</p><p class="p1">С одной стороны, конечно, придавать избыточное значение самодеятельному митингу не следовало: организаторы из них никакие, бояться нечего. С другой — игнорировать сборище тоже не хотелось: быть может, он должен именно сейчас действовать решительно, чтобы не дать болезни зайти слишком далеко… Было и еще одно важное соображение — Чарнолуский терпеть не мог Апфельбаума, нынешнего хозяина Питера но от Апфельбаума теперь зависело многое. Тот спал и видел, как бы оправдаться за свою несчастную глупость 23 октября, когда, пойдя против Ильича, он с Розенфельдом тиснул в дрянной эсеровской газетке бессмысленный votum separatum. Конечно, никакого предательства он не замышлял, да и кто читал ту газетку? Выступление в последних числах октября было секретом полишинеля; однако Ильич, чьи нервы были напряжены до предела, увидел тут именно предательство — или, напротив, отлично владея собой, решил пугнуть оппонентов этим жупелом. Так или иначе, клеймо предателей на Розенфельде и Апфельбауме стояло прочно, и, несмотря на прощение Ильича (он умел прощать — то есть якобы забывать), Апфельбаум, став хозяином города, из кожи вон лез, чтобы выслужиться. С него запросто бы сталось разогнать демонстрацию. И Чарнолуский, чуть не скрипя зубами, спустился со своего четвертого на второй этаж Смольного, где сидел теперь глава городского совета.</p><p class="p1">Даже узнав каким-нибудь чудом о его будущей мученической судьбе, Чарнолуский все равно должен был бы признаться, что ничего не может сделать со своим отвращением к этому человеку. В нем было все, за что ненавидимо еврейское племя, — и ни одной черты, за которую оно ценимо даже противниками. В нем была иудейская трусость — без ума, настойчивость — без таланта, самолюбование — без страдания; он был уродлив уже сейчас — и страшно было подумать, каков будет в старости. Чутье на силу у него было безупречное: посновав между Ильичем и Бронштейном, он безошибочно выбрал Ильича. Он был из тех, кто идет в революцию с единственной надеждой взять реванш за бесчисленные унижения скудного детства и убогой юности; в нем и близко не было ничего поэтического. Чарнолуский никогда не мог понять, что заставило Ильича оставить город на такого человека; иногда, впрочем, мелькало у него юмористическое подозрение (как-никак он знал Ильичев юмор), что город в самом деле решено сдать немцам. Лучшего способа избавиться от Апфельбаума, отомстив ему за все, в природе не существовало.</p><p class="p1">— Гриша, — сказал Чарнолуский. — Тут намечается митинг один — так ты не реагируй пока, ладно?</p><p class="p1">— Профессоров своих покрываешь? — нехорошо посмотрел на него Апфельбаум.</p><p class="p1">— Там будут не только профессора. Там и мои художники, — не моргнув глазом, соврал Чарнолуский. — У них что-то вроде диспута, понимаешь? Не мешай.</p><p class="p1">— А если вооруженные люди? Если начнется стрельба? — юлил градоначальник.</p><p class="p1">— Ты отлично знаешь, что никакой стрельбы не будет. И потом, я пойду туда сам.</p><p class="p1">— Но учти, Александр: это последний раз! — погрозил пальцем Апфельбаум. — И под твою ответственность! Я все равно, конечно, пошлю своих людей…</p><p class="p1">— Да ради Бога, — сказал Чарнолуский.</p><p class="p1">«А все-таки неплохой я актер», — подумал он.</p><p class="empty-line"/><p class="p1">Хмелев не верил, что соберется хоть сорок человек — столько, сколько было в коммуне. Но двадцать девятого погода выдалась прекрасная, работы у большей части столичного населения по-прежнему не было, и на острова потянулись любопытные, да почти все жители улиц, выходящих на Невку, да мальчишки, да старушки — и к двенадцати часам дня на лужайке перед Елагиным дворцом, среди роскошного парка, разбитого когда-то к вящему удовольствию Екатерины Великой, стояла немаленькая толпа. Вероятно, Извольский тоже постарался — едва очистившаяся от снега подъездная дорожка ко дворцу и Елагин мост были запружены народом. Люди Извольского — все те же крепкие, немногословные, желтолицые и тем похожие на азиатов, — соорудили из досок трибуну, похожую на гроб (доски остались от разобранной еще в январе караульной будки). Покрасить ее не успели — не то она была бы похожа на гроб повапленный; впрочем, на некоторых досках сохранились черные и белые полосы — в старину красили крепко.</p><p class="p1">— Начну я, — тихо сказал Извольский. — Нужно с самого начала выйти на верный тон — а там посмотрим.</p><p class="p1">Он возлез на трибуну — невысокий, с длинной головой и коротким туловищем, с бородавкой на носу, оседланном вдобавок круглыми очками, — и понес такое, что даже готовый ко всему Хмелев в первый момент испугался.</p><p class="p1">— Господа! — кричал Извольский. — Сегодня, когда большевистская диктатура удушает все живое… на наших с вами глазах… уничтожается последний оплот свободной мысли! Не ограничившись закрытием лучших газет и убийством достойнейших слуг народа… наши доморощенные Мараты и Робеспьеры… удушают костлявой рукой голода заслуженных стариков, сливки петроградской профессуры! (Вообразив себе удушаемые сливки, Ловецкий не выдержал и хихикнул; прочие елагинцы, стоявшие позади трибуны, яростно на него зашикали). Это только начало — в самом скором времени арестованы будут все жители Петрограда, получившие высшее образование! (Эта была одна из его излюбленных баек, вроде обобществления жен. В толпе глухо зароптали, даром что высшего образования, судя по виду собравшихся, у большинства не было). Нас могут спросить — на что мы надеемся? Мы надеемся, что с подвига участников Елагинского общества, которое пытаются разогнать голодом и холодом, начнется духовное возрождение России! Эта горстка седых подвижников, эти борцы, закаленные в научных спорах, обремененные годами, согбенные скорбями… вот достойнейший пример для всех нас, трясущихся по своим щелям! Если сегодня мы не защитим наших ученых, завтра придут за каждым из нас! Помните величайший закон социального развития: если ты молчишь, когда ведут на казнь твоего брата, — завтра на казнь поведут тебя, и некому будет крикнуть «Долой»!</p><p class="p1">Весь этот бред был тем удивительнее, что большая часть обитателей и гостей Елагинской коммуны сроду не чувствовала себя подвижниками; сам Хмелев, хоть и находил некоторое удовольствие в новом статусе борца с большевизмом, никак не замахивался на столь масштабные цели, как восстание. Выстоять, доказать право независимой мысли на существование, не дать провести хамскую реформу с отменой орфографии — да; возможно, вернуть ять, возможно, спровоцировать большевиков на отказ от диктатуры и даже на созыв Учредительного собрания; но мысль о народном восстании и в голову ему не приходила, поскольку умом историка он прекрасно понимал, что ни одно народное возмущение еще не послужило торжеству разума и приличий. Ему даже показалось на миг, что Извольский, столько успевший наплести про Елагинскую коммуну, использует ее лишь как предлог для устройства собственных тайных дел — ничем иным объяснить его рвение он не мог; впрочем, объяснение пришло само собой.</p><p class="p1">— Я сам — профессорский внук! — голосил Извольский, с легкостью покрывая все пространство Елагина острова — Мой дед — профессор биологии Петербургского университета, и я знаю, скольким простым крестьянам, самородным талантам, бес-плат-но помогал мой дед подготовиться к поступлению! (Хмелев попытался припомнить биолога Извольского… или Изборского? Но он почти никого не знал на биологическом…) Новая власть согнала профессоров в заброшенное, холодное здание… кинула в лицо тухлую рыбу… заперла в резервации… а теперь пытается лишить и этого последнего прибежища! Какова же страна, позволяющая хамской власти так издеваться над почетной, заслуженной, беспомощной старостью!</p><p class="p1">— А ведь, чего доброго, нас теперь точно пересажают, — шепнул Хмелеву Казарин. — Помните, Николай Алексеич, у Тэффи рассказ про модного адвоката? Так защищал, что вместо штрафа повешение присудили!</p><p class="p1">— Так вас никто не держит, Вячеслав Андреевич, — спокойно отвечал Хмелев. — Не поздно и уйти…</p><p class="p1">Казарин в ответ промолчал, справедливо заключив, что свободы мнений в осажденной крепости требовать не приходится. Алексеев одобрительно кивал, подняв воротник пальто. Ашхарумова слушала речь Извольского с непроницаемым лицом, по которому время от времени пробегала дрожь. Казарину казалось, что то была дрожь брезгливости, но Ашхарумова вся тряслась от еле сдерживаемого смеха.</p><p class="p1">— Помните: сегодня они, завтра вы! — взвизгнул Извольский и слез с трибуны, сделав в сторону елагинцев широкий приглашающий жест, не относившийся, впрочем, ни к кому лично. По логике вещей, говорить следовало Хмелеву, но его неожиданно опередил Ловецкий, и старик мысленно возблагодарил судьбу. Он решительно не знал, что можно было сказать после такого громкого вступления.</p><p class="p1">— Дамы и господа, — весело и как будто небрежно сказал Ловецкий, словно выступал на пикнике. — Выступавший передо мною господин… Изборский (он придерживался этой транскрипции) несколько сгустил краски. Вы можете, чего доброго, подумать, будто мы сидим тут с заколоченными окнами и забитыми дверьми, выставили пики и приготовились к смерти. Поймите нас правильно: мы не хотим никого свергать, мы исходили из возможности честного сотрудничества…</p><p class="p1">— Все дело портит! — сквозь зубы простонал Извольский.</p><p class="p1">— Но, к сожалению, власти приняли решение о том, чтобы нас распустить. Мы, однако, думаем, что при отсутствии культурных учреждений в новом Петрограде наше общество могло бы сослужить вам всем неплохую службу, — Ловецкий поправил пенсне. — И нам не очень приятно, что собравший нас нарком образования теперь своими же руками отбирает у нас то немногое, что три месяца назад — без всякой нашей просьбы — дал.</p><p class="p1">Чарнолуский, этаким гарун-аль-рашидом стоящий в толпе (низко надвинутая шляпа, затемненные очки), выругался про себя. Ловецкий не нравился ему еще с того вечера, на котором читал историю чихачевской мануфактуры. Этот человек из всего норовил сделать клоунаду, а между тем явно имел серьезные намерения…</p><p class="p1">— Мы, конечно, не ведем речи о восстаниях и прочих крайностях, — продолжал Ловецкий. — Много уже было восстаний, пора отдохнуть. Мы хотим только, чтобы вы знали о нашем положении и не питали иллюзий относительно власти, а также помогли нам, если можно, завершить наш главный труд — издание народной библиотеки. Мы не просим денежной или продовольственной помощи, мы просим только вашей защиты в случае, если нас разгонят или, наоборот, запрут.</p><p class="p1">— Вы должны сказать! — страшным шепотом убеждал Хмелева Извольский. — Вы должны сказать, что это капитулянтские настроения, что этот человек вообще взялся неизвестно откуда… Кстати, он что, тоже профессор?</p><p class="p1">— Нет, — покачал головой Хмелев. — Он фельетонист.</p><p class="p1">— Я чувствовал, — сплюнул Извольский.</p><p class="p1">Выступление Ловецкого, как ни странно, толпе понравилось. Приятен был его улыбчивый вид и мягкие манеры. Но Ловецкого на трибуне сменил Хмелев, и публика подобралась: этот, сразу видно, был профессор, из благородных, старой закалки.</p><p class="p1">— Господа! — начал Хмелев, как начинал он обычно свои лекции. — Я прошу вас не обращать особенного внимания на то, что вам только что сказали. Помогать нам — это хорошо, сотрудничать с властями — тоже, наверное, хорошо, но лично я ни с какими властями сотрудничать не собирался. Меня привезли сюда силой, против моей воли. (Ай да профессор, подумал в толпе Чарнолуский, ай да совесть мыслящей России! Надо, надо было всех вас оставить подыхать по пустым квартирам, без пайка…) Мне дали сырых дров и невыносимо дымящую железную печь — такие, знаете, еще называют душегубками (он вовремя щегольнул знанием новой речи). Все это пытались выдать за великое благодеяние новой власти, начисто забыв о том, что эта власть отняла у меня мою работу, моих студентов и предмет моей сорокалетней заботы — грамотность русского народа. Впрочем, это не только у меня — это у всех нас отняли, сделав невежду героем эпохи. Да, это власть невежд, — возвысил голос Хмелев, — и она будет уничтожать всех, кто хоть на мизинец выше установленного ею ранжира! Да, это власть ничтожеств, и всякий, кто знает, и любит свое дело, ей ненавистен в принципе! Такая власть никогда и ни над кем не одержит победы. Сколько крови пролито, сколько напрасных обещаний дано! Народ наш, умный и ядовитый народ, уже спрашивает: чем же вы так хвалились? Не хвались, едучи на рать, — дальше вы знаете.</p><p class="p1">В толпе одобрительно засмеялись. Усмехнулся для конспирации и Чарнолуский, хотя что там дальше — не знал. Вероятно, какая-нибудь грубость.</p><p class="p1">— И вот, не в силах одержать ни одной победы, подписав постыднейший мир, сбежав из славной столицы, эти вожди народа решили победить хотя бы нас, раз уж больше никого не удается. Они хотели сыграть на ненависти невежд к образованию! Но тут-то и вышел у них главный просчет: никогда, никогда русский народ не был врагом образованности! Он и Петру простил все его кровавые злодейства за то, что тот насадил на Руси образование! Нынешние Петры начали с упразднения наук, думая тем купить себе славу; вместо того чтобы учить грамоте — они вовсе упразднили грамоту! Подлый этот замысел не удался: сотни молодых людей приходили на Елагин остров, чтобы принять от нас эстафету знания. Но большевикам не нужно, чтобы этот священный факел передавался из рук в руки: им нужна тьма!</p><p class="p1">— Так вот, — возвысил голос Хмелев перед решающим штурмом. — Мы, над которыми думали они одержать легкую победу, станем тем камнем, на котором они споткнутся. Можно запретить печатать грамотные книги, но нельзя заставить меня писать «еще» с пятью ошибками — «истчо»! Можно разрушить русское государство, но разрушить русскую культуру нельзя, пока жив хоть один ее носитель. И даже если они тайно перебьют всех нас — нами, к счастью, культура эта не ограничивается! Есть вы, вы, оплот культурной России!</p><p class="p1">Он сделал широкий жест в сторону собравшихся мещан, лавочников и патрулей Петроградской стороны; впрочем, было в толпе и несколько интеллигентных лиц, болезненно кривившихся на протяжении хмелевской речи.</p><p class="p1">— Да, они споткнутся на нас! — закончил он, уже начиная сипнуть. — И то, что сюда пришло сегодня столько людей, для которых культура не пустой звук, — верный знак, что Россию не удастся превратить в тупое стадо! Имеющий уши да слышит! — тут он чуть не пустил петуха, надеясь, видимо, что расслышат его и в Москве, — и под одобрительные крики сошел с трибуны.</p><p class="p1">— Крой, дедушка! — выкрикнул матрос из задних рядов. Ему очень нравились митинги и жаль было, что в последнее время их стало так мало. Правда, недавно, он слушал похожего старика в «Паризиане», куда часто заходил, — но тот оказался клоуном.</p><p class="p1">Извольский одобрительно кивнул Хмелеву. Тут, однако, произошло непредвиденное: из первых рядов на трибуну вышла худая, оборванная баба в сером платке и пронзительным голосом зачастила:</p><p class="p1">— Правильно, все как есть правильно! Ить до чего довели Расею: мясо, мясо стало по пятьсот рублев! Корова стоила десять рублев, а теперь мясо по пятьсот!</p><p class="p1">— Это жисть теперь ничего не стоит, а мясо вона как! — весело крикнули из толпы.</p><p class="p1">— По улице стало не пройти! — верещала старуха. — И грабют, и насильничают как хошь!</p><p class="p1">— Да тебе-то, мать, бояться нечего! — еще веселее крикнул другой голос. — С тебя-то что взять?</p><p class="p1">— Теперь на лицо не смотрят! — отозвался какой-то матрос. В толпе захохотали.</p><p class="p1">Тут выскочил замухрышка в кепке, вертлявый, с безумными глазами, и встал перед трибуной:</p><p class="p1">— Граждане! Позвольте вам прочесть политические куплеты, напечатать которые трусят газеты! Я шел навстречу патруля, в себе имея три рубля! Когда мне встретился патруль, он мне оставил ровно нуль! Еще, дальше: за сотню керенских рублей купить ты можешь фунт соплей, а по карточной разверстке не дадут тебе и горстки! Еще: видать, прогневала ты Бога, страна несчастная моя: начальства стало очень много, а хлеба нету вообще!</p><p class="p1">Носители русской культуры бешено зааплодировали.</p><p class="p1">Митинг на глазах становился неуправляем. У народа накопилось множество претензий к миропорядку, и все высказывались хором, без соблюдения очереди и даже не выходя к трибуне. Про елагинцев никто не вспоминал. Кого-то уже били, и зрители, радуясь забаве, с удовольствием расчистили круг. Еврейчик в студенческой фуражке кинулся выручать избиваемого, так что теперь били и его.</p><p class="p1">— Жиды! — с удовольствием кричал сочным басом огромный детина, на котором петроградский голод никак не сказался. — Всё от жидов! Колоти жидов!</p><p class="p1">— Его, его держите, братцы, я его видал, он салом спекулировал! — указывая на детину, взъярился тощий, непомерно длинный мужик с щеткой седеющих усов. — Подожди с жидами, жидов успеем…</p><p class="p1">Все это легко могло перерасти в массовое побоище; Чарнолуский стремительно соображал, что ему делать. Сейчас еще они бьют друг друга, но завтра легко могут подняться на нас…</p><p class="p1">В эту самую минуту в толпу разноцветным клином врезалось карнавальное шествие. Больше всего это было похоже на внезапное появление бродячих артистов, но в подозрительно большом количестве: словно цыганский табор в полном составе откуда-то с юга ворвался в весенний Петроград. Крестовцы подготовились к шествию серьезно: всю ночь писали картины, шили костюмы и расписывали роли. Впереди в красных, желтых и зеленых юбках, в старых гимнастических костюмах, обшитых бантиками, двигалась группа эвритмического танца. Следом Митурин с компанией тащили свои холсты, плакаты и листы фанеры, на которых наскоро были намалеваны супрематические композиции, а также вещи, более доступные пониманию обывателя: женщины, сплошь из пышных розовых округлостей, те же самые женщины, но уже в кубическом варианте, то есть состоящие из розовых кубов, прихотливо поставленных друг на друга; была пара пейзажей и даже одна церковь, изображенная в подчеркнуто лирической манере. В центре процессии важно вышагивал Корабельников, наряженный Вельзевулом, за ним маршировали черти, вооруженные отчего-то классическими атрибутами трудящихся — огромным серпом, молотом, швейной иглой и земным шаром, по которому расползалась гигантская красная клякса. Чертей навербовали из мальчиков и девочек, бегавших на Крестовский слушать футуристов. В добровольцах недостатка не было: молодежь скучала без карнавалов.</p><p class="p1">— Человечество! — зычно кричал Корабельников; его спутники дудели в дудки и били в детские барабанчики, которые натащили из дому. Толпа разом прекратила драку. — Расступись! Тут будет показ нового искусства! Отдельные дубоголовые граждане утверждают, что мы, футуристы, художники пролетариата, кормимся с рук новой власти. Мы сами себе зарабатываем, граждане товарищи зрители! Сейчас состоится выставка-продажа и лотерея-аллегри нового, единственно революционного искусства! Потеснитесь, старорежимная публика, — он небрежно отпихнул куплетиста, продолжавшего что-то орать, и опрокинул трибуну.</p><p class="p1">— Убирайтесь вон! — крикнул Хмелев и тут же закашлялся.</p><p class="p1">— А это мы посмотрим, кто уберется, — спокойно пробасил Корабельников. — Граждане, чего хотим: этих старообразных слушать или новое искусство посмотреть?!</p><p class="p1">— Валяй! — отозвалось несколько голосов; разумеется, полуголые девки, которые, невзирая на мартовскую погоду, знай себе скакали вокруг наглого верзилы в бумажной короне, были гораздо интереснее, чем всякая говорильня.</p><p class="p1">— Свободные мастера зарабатывают на хлеб, холсты и краски! — возгласил Корабельников. — Художник, товарищи, такой же пролетарий, как вы. Художнику жрать надо, понятно? Покупаем первую картину, изображающую голую бабу в том виде, в каком нам ее рисовали последние пятьсот лет! Работа пролетарского художника Теремных!</p><p class="p1">Высокий, пышноусый Теремных, усмехаясь, встал рядом с Корабельниковым. В руках у него была черная клеенка, на которой, за неимением холста, он подробно изобразил рубенсовскую красавицу с розой на причинном месте.</p><p class="p1">— Начальная цена голой бабы в натуральном виде — сто рублей! Баба удивительных свойств, при правильном пользовании способна заменить настоящую! Сто рублей — раз!</p><p class="p1">— Давай ее сюды! — крикнул с места обтерханный мещанин без пальто, в куцем пиджачке, зато чуть не до глаз замотанный шарфом.</p><p class="p1">— Настоящая теперь дешевле! — осадил его кто-то. — Хлеба дай — все твои!</p><p class="p1">— Такую сейчас не найдешь, — пояснил мещанин, пробираясь к Теремных. — Теперь все кожа да кости… На тебе сотню, отдавай бабу!</p><p class="p1">Обрадовавшись быстрой удаче, Корабельников не стал торговаться дальше. Елагинцы с брезгливым ужасом наблюдали, как он королевственным жестом подозвал Митурина.</p><p class="p1">— Теперь, товарищи граждане, мы увидим с вами ту же бабу, но уже исполненную в технике современной! — сообщил он, без напряжения перекрывая шум толпы. — Теперь эта баба гораздо лучше, потому что настоящих и так полно, а такую вы не увидите нигде, кроме как у себя в доме! Начальная цена бабы, волшебно преображенной футуризмом, повышается на пятьдесят рублей!</p><p class="p1">— На что она такая, у ей сиси как кирпичи! — крикнул матросик, любивший ходить в «Паризиану».</p><p class="p1">— Дурак ты, — осадил его другой остряк. — Это новая баба, большевицкая. Это для Ленина баба, потому что ему обычная не дасть…</p><p class="p1">— Сто пятьдесят старорежимных керенских рублей! — кричал Корабельников. — В вашем доме поселится произведение новейшей живописи!</p><p class="p1">— Давай ее! — отозвался угрюмый мужик лет сорока. — Покажу своей, какие теперь бабы бывают…</p><p class="p1">Как ни странно, у собравшихся водились деньги. Мельников порывался продать самописьма — рукописную книгу стихов, — но его никто не слушал. Корабельников могучим голосом нахваливал церковь, намалеванную Митуриным за двадцать минут, и его же супрематическую композицию, отнявшую два часа (три круга, два квадрата, пересекающиеся плоскости). Продажа пяти картин обогатила крестовцев на восемьсот рублей, которые, впрочем, ничего не стоили. Елагинцы дружно вернулись во дворец. Впереди шел негодующий Хмелев. Досматривать Крестовское представление остались Казарин с Ашхарумовой и — вероятно, в порядке обогащения собственного митингового опыта — Извольский. Разумеется, митинг нового образца мог иметь успех только в виде карнавала с плясками. Это стоило учесть.</p><p class="p1">— А теперь! — трубно объявил Корабельников. — Разыграно будет героическое, патетическое и черт-те какое изображение нашей эпохи, которым новые артисты и футуристические поэты встречают шестой месяц нашей революции! Для дураков краткое содержание: черти под предводительством Вельзевула влезают на небеса и свергают окопавшегося в облаках Бога, который и отправляется на Землю в видах перевоспитания! Он, конечно, на Землю не хочет и говорит, что он весь из себя культурный — а ему говорят, что хоть ты и культурный, а поди-ка к станку! Нашему времени нужна новая драма, ее место на площади. Сейчас вы ее увидите! Написано мною и вот товарищами Краминовым и Мельниковым, а сыграно творческой молодежью революционного Петрограда!</p><p class="p1">Тут же, без всякого перехода, он начал роль Вельзевула. По пьесе, первой взбунтовалась чертова мать (ее прелестно играла высокая, почти в корабельниковский рост, горбоносая девятнадцатилетняя армянка Маркарян, безответно влюбленная в своего Вельзевула). Вдохновленные чертовой матерью, пролетарские, черти строили гигантскую пирамиду (уроки эвритмистов не прошли даром). Саваофа изображал Барцев, срочно приклеивший ватную бороду и вещавший почему-то по-старославянски. Саваоф не мог ничего сказать в свое оправдание, кроме того, что он — культура. Под конец он понес полную околесицу, потому что его главный монолог писал Мельников. Черти не стали его дослушивать и всыпали по первое число. Низвергнутый Саваоф отправлялся к станку и даже начинал находить в работе своеобразное удовлетворение, а черти рассаживались на небесах и первым декретом освобождали труд. В заключение они исполняли «Интернационал» с новым, корабельниковским текстом, от которого Чарнолуский — при всей прелести и свежести исполнения — невольно поеживался: там дважды упоминался «мерзавец бородатый». Корабельников, несомненно, имел в виду Творца, но не учел Маркса, да и про Ильича наверняка не подумал.</p><p class="p1">Кое-что почитав из корабельниковской лирики хотя бы и двухлетней давности, Чарнолуский представить себе не мог, что этот мальчик с надорванным голосом с такой легкостью переключится на площадную драму: видимо, мир действительно начинался с чистого листа. Драма была так себе, на уровне аудитории, — но все полчаса, на протяжении которого адские жители штурмовали небо, толпа не расходилась. Чарнолуский от души раскаялся в том, что был резок с крестовцами. Нынче же приехать и объясниться. То-то будет смеху, когда я расскажу, как смотрел их инкогнито…</p><p class="p1">— А теперь, граждане публика, соберем на обед артистам у кого что есть! Мы ж не просто так тут глотку драли! — сказал осипший Корабельников, снял вельзевульскую корону (оказалось, она наклеена на обычную шляпу, которую пожертвовал Драйберг) и пустил ее по толпе. Скоро она приплыла к нему, наполненная мятыми бумажками, поверх которых лежала одинокая вобла.</p><p class="p1">— Благодарю, товарищи! — крикнул футурист. — Приходите к нам на Крестовский, там живут художники, они покажут вам новое искусство и новый быт!</p><p class="p1">— А когда?! — крикнуло несколько молодых голосов.</p><p class="p1">— Да хоть сейчас, — великодушно разрешил Корабельников. — Айда с нами. У кого есть спирт — приносите, артисты замерзли.</p><p class="p1">Но артисты не замерзли. Черти и чертовки были чертовски счастливы. Казарин мельком оглянулся на Марью — и ощутил жестокую ревность: она смотрела на крестовцев, чуть приоткрыв рот от счастья и удивления, и лицо ее было таким светлым, каким он видел его только в самом начале знакомства.</p><p class="p1">«Что я сделал с девочкой, — подумал он. — Что я сделал…»</p><p class="p1">— Кстати! — уже собравшись идти на Крестовский во главе своей армии, к которой присоединилось несколько любопытствующих зрителей, Корабельников обернулся и безошибочно узнал Казарина. — Гражданин товарищ Казарин! Вы же как будто из бывших будете. Не желаете часть выручки? Как-никак зрителей-то ваши собирали! Вот, не хотите? — он потряс шляпу и помахал воблой.</p><p class="p1">Казарин, ни слова не говоря, отвернулся и побрел во дворец. Крестовцы победили — он не стал бы с этим спорить, — но не умели соблюсти меру в стремлении унизить побежденных. Ашхарумова пошла рядом с ним, заглянула ему в лицо, увидела страдальческую гримасу:</p><p class="p1">— Тебе плохо? Слава! Да Слава же!</p><p class="p1">Да, ему было плохо. Хуже всего оттого, что, прежде чем пойти за ним, она секунду помедлила в нерешительности. Этого Казарин не забыл — может быть, потому, что предчувствовал.</p><p class="subtitle">31</p><p class="p1">Оскольцеву снилось, что сошлись его друзья: явились прощаться и знали это. Каждый принес скромное подношение — цветок, платок, экзотическую бутылку. Ужасно было то, что приходящие веселые посетители (веселые искренне, а не натужно) ничего не могли сделать с тем, что ему предстояло; общая атмосфера веселого заговора царила в комнате. Ужасно было и то, что первая его возлюбленная была коротко стрижена, и он все время шутил по этому поводу. Тот, с кем она пришла, вдруг решительным жестом оборвал общее веселье; все встали по углам. Оказалось, он был тут главный. Между тем Оскольцев видел его впервые. Спутник первой возлюбленной был торжественно и сдержанно благожелателен, как все палачи. Он был тут распорядитель. Странно, что Оскольцев во сне так много знал о палачах, и это служило лишним, теперь уже нежеланным доказательством того, что душа есть и знает больше, чем надо. Высшей точкой отчаяния была подспудно пришедшая мысль о смертности души: есть, но конечна.</p><p class="p1">Казнь заключалась в разделении Оскольцева на составные части — не грубом и кровавом, подлинно топорном расчленении, а в разложении на то, что одушевлялось и собиралось вместе некоей магической светящейся точкой, которую следовало очистить от всех наслоений и торжественно погасить. Вот отделяется зрение, вот голос, вот слух, вот те странные сущности, которые вечно друг другу противоречили и спорили в нем, — он может наконец увидеть их в лицо. Почему-то их звали Ацем, Коцем и Децим. Смысл был только в имени Децима — а впрочем, и смыслов уже не было. Вот отделились смыслы, вот ушло все, — принесли маленький деревянный ящик со множеством отделений (зрения уже нет, но он как-то видит ящик): в одно отделение кладут пузырек с голосом, в другое — пузырек со слухом… Он с высоты увидел собственное недвижное, кротко лежащее тело в черном сюртуке, собственное лицо с выражением доверия и покорности и чуть не заплакал от жалости к этому бывшему ребенку, доверчиво подставлявшему себя манипуляциям бесчисленных врачей и палачей, сколько их было в его жизни. В конце концов ему надлежало лежать закрытому белой полупрозрачной тканью, а голос немыслимой чистоты и силы пел над ним, и он понимал, что это уж точно последнее. Ящичек был уже закрыт, запечатан сургучом и убран до лучших времен (он запомнил это выражение — «до лучших времен»); друзья затеплили свечи, лицемерно потупившись. Но голос был подлинным, голос летел над ним и отпевал его, и все страдание, вся мука, весь бесплодный протест были в этом голосе: погляди, погляди, что с ним сделали! Оскольцев с невыразимой ясностью осознал, что сейчас его не будет. Возможно, что и не стало бы, — но тут он проснулся. Было темно, и громко храпел Ватагин.</p><p class="p1">— Меня не будет, — сказал Оскольцев вслух. — Нет, не может быть.</p><p class="p1">Тем не менее могло, и он окончательно понял, что никаких пыток не надо. Он не выдержит, он готов, согласен на что угодно. Только бы жить, жить, только бы жить.</p><p class="subtitle">32</p><div class="poem">
<div class="stanza">
<p class="v">Раскинулось море широко,</p>
<p class="v">И волны бушуют вдали!</p>
<p class="v">Товарищ, мы едем дале-о-око,</p>
<p class="v">Подальше от этой земли!</p>
</div>
</div><p class="p1">Ять знал эту песню. Ее с большим чувством исполнял на Варшавском вокзале нищий, наряженный матросом; он знатно подыгрывал себе на аккордеоне. Маринелли пел без малейшего акцента, а кто-то из моряков художественно аккомпанировал ему — опять же на аккордеоне. Ять и не предполагал, что итальянец так изучил русскийматросский репертуар. Не иначе, сказывалось чудесное действие Голицынских винных складов.</p><div class="poem">
<div class="stanza">
<p class="v">На палубу вышел — сознанья уж нет,</p>
<p class="v">В глазах у него помутилось… —</p>
</div>
</div><p class="p1">страдальчески выводил Маринелли. Ять подошел поближе.</p><p class="p1">— Fine job, Marinelli! — сказал он сквозь крики одобрения.</p><p class="p1">— Частушки знаешь? — спросил басом толстый матрос.</p><p class="p1">— Как не знать! — отозвался итальянец на чистейшем русском. — Эх, кончилась монархия, наливай да пей! Мама нам анархия, папа нам портвей! Обождите, братишечки, все спою, только тут дружок ко мне подошел, поговорить надо.</p><p class="p1">— Наливай и дружку, — разрешил матрос. Около его ног стояла огромная бутылка, в каких прежде продавали шампанское; бутылка была грязная, явно исхищенная из чьего-то чулана. В ней плескалось красное вино.</p><p class="p1">— Пей, товарищ, — сказал матрос, наливая Ятю кружку. — Самолучшее, со складов.</p><p class="p1">Ять выпил, не почувствовав вкуса. Это была малага 1586 года. Маринелли отвел его в сторону.</p><p class="p1">— Если вы еще раз, — сказал он сквозь зубы, — обратитесь ко мне по-английски, вы погубите всё.</p><p class="p1">— Так вы — русский? — в ужасе спросил Ять.</p><p class="p1">— А какой же я? — бешеным шепотом отвечал Маринелли. — Или вы только прикидываетесь идиотом?!</p><p class="p1">— Господи, — Ять вытер лоб. — Опять я ничего не понял. Когда уже кончатся мои обольщения… Почему же вы Могришвили не сказали, когда он собирался вас кастрировать?! Маринелли посмотрел на него в крайнем недоумении.</p><p class="p1">— Вы что, вообще ничего не понимаете? Это была моя единственная надежда. Иностранца, может, он еще побоялся бы тронуть. Как русский я для него не представлял ценности, а иностранцев у нас всегда берегут.</p><p class="p1">— Что ж вы перед этими не стали притворяться? — снова не понял Ять.</p><p class="p1">— Слушайте, как вы вообще до тридцати пяти лет дожили?! Надо же чувствовать хоть что-то! Когда в России есть власть — надо быть иностранцем, потому что власть бережет иностранцев для своих целей. Когда в России нет власти — надо быть русским, потому что всех нерусских немедленно начинают бить! Вы еще не поняли? Ладно, хватит философии. В случае чего — я вас не знаю, вы меня не знаете. Решайтесь. Через два, много три дня здесь будут немцы, и от всего этого веселья не останется мокрого места.</p><p class="p1">— Какие немцы? Откуда?</p><p class="p1">— Мир подписан, баранья вы голова! — Маринелли стукнул себя по лбу. — По этому миру вся Украина и Крым отошли к Германии, в благодарность за содействие.</p><p class="p1">— Подождите, подождите… Но ведь когда нас отправляли сюда поддерживать советскую власть, мир был уже подписан?</p><p class="p1">— Это же большевики, мамма миа! — Маринелли схватился за голову. — От кого вы ждете логики?! У них левая рука не знает, что делает правая! Крым был в секретном протоколе, и те, кто нас сюда отправлял, понятия не имели, что Крым уже не русский! Лично я ехал сюда только в надежде унести ноги, потому что в Гельсингфорс из Питера сейчас не попадешь — выпускать перестали сразу же. Я думал уйти на любом корабле, но тут начались эти смены властей, аресты, концерты… От России мы теперь отрезаны. Завтра сюда придет последний французский корабль…</p><p class="p1">— Я знаю, — сказал Ять.</p><p class="p1">— Откуда? — поразился Маринелли.</p><p class="p1">— Неважно.</p><p class="p1">— Однако! Этак на него будет рваться весь Крым. Никому не говорите, умоляю. Так вот, я уговорил Бурлака. Из города никого не выпускают, сделали заставы, но морем вполне можно… Я все придумал. У него пристойная лодка, на море спокойно. Ночью отчалим, через три часа будем в Ялте. Решайтесь. С вами девушка, ей в России делать больше нечего.</p><p class="p1">— Она уже не со мной, — покачал головой Ять.</p><p class="p1">— Да не время же заниматься всей этой чушью! — снова застучал себя по лбу Маринелли. — Вы что, опять ничего не понимаете? В Париже сразу расстанетесь, словно и не виделись никогда!</p><p class="p1">— Я не поеду, — покачал головой Ять. — Уезжайте сами. На корабле вас ожидает сюрприз — думаю, скорее приятный…</p><p class="p1">— Она тоже едет? — немедленно догадался Маринелли.</p><p class="p1">— Скорее всего.</p><p class="p1">— Она что, изменила вам? Какая кошка между вами пробежала?</p><p class="p1">— Никто мне не изменял. Я ухожу отсюда.</p><p class="p1">— Куда вы, к черту, уйдете? К немацам в пасть?</p><p class="p1">— Ничего, буду пробиваться в Петроград. В самом деле, порезвился, и будет. Чем кончится здесь, я уже понял. Надо посмотреть, чем кончится там. Спасибо, артист. Кстати, скажите уж напоследок, кто вы такой?</p><p class="p1">— Идиотский вопрос, — хмыкнул Маринелли. — Раб Божий, артист императорских театров, репортер, карманный вор, какая разница? Кончились времена, когда каждый был — кто-то. Сегодня, если жить хочешь, утром надо быть одним, вечером другим, а ночью чтоб вообще тебя не видно… Вы что, серьезно думаете, что в России перед войной жили одни кадеты, эсдеки, поэты, репортеры? В России были и серьезные люди. Если б она нас слушала, приличная была бы страна, в первый ряд могла выйти… Но сырая, пресная, сообразительности никакой. Немного авантюризма — и тут можно найти Клондайки! Если бы я да мой друг Извольский, о котором, я верю, вы еще услышите, успели провернуть одно дельце — никакого октябрьского бунта тут не было бы, к чертям собачьим, и никакого Керенского тоже! Вот вы — что вы умеете? Писать? Хорошее дело для мужчины в тридцать пять лет! Поедем со мной, я сделаю из вас человека!</p><p class="p1">— А вы что умеете? — спросил Ять, все больше забавляясь этим разговором.</p><p class="p1">— Я?! — взвился Маринелли. — Я говорю на пяти европейских языках, пою на прекрасном любительском уровне, показываю фокусы, рисую валюту десяти главных стран мира, открываю предприятия, знаю рынок угля, мыла и граммофонных пластинок! Я понимаю в оружии, технике и пиротехнике! У меня друзья во всех столицах! За тридцать восемь лет жизни я объездил шестьдесят государств! Аудиенция у государя у меня сорвалась единственно из-за Февраля!</p><p class="p1">— Вот видите, — ласково сказал Ять. — Сама судьба против того, чтобы вы спасли Россию. Спасибо, Маринелли. Меня восхищает ваш моторчик. Но предоставьте нас нашей судьбе.</p><p class="p1">— Жаль, — сказал Маринелли и сплюнул. — Если будете-таки за границей, найдите в Париже, на Севастопольском бульваре, кафе «Три голубя». Хозяин скажет вам, как связаться со мной. Он мой агент в этой части Европы.</p><p class="p1">— «Три голубя», — повторил Ять. — Непременно, непременно. Невозможно было представить, что бывает какой-то Париж.</p><p class="p1">— Слышь, кучерявый! — позвали Маринелли. — Поди сюда, спой чувствительное!</p><p class="p1">— Лечу! — отозвался Маринелли.</p><p class="p1">— Постойте, постойте, — Ять взял его за рукав. — Одна, последняя просьба. Надо похоронить Свинецкого. Нельзя же, чтобы он там… так лежал…</p><p class="p1">— Оставьте мертвым хоронить своих мертвецов! — прошипел Маринелли. — Где вы хотите его похоронить?</p><p class="p1">— Где угодно, хоть в Пушкинском парке. Там земля мягкая, лопаты есть — Могришвили устраивал общественные работы, инвентарь так и валяется…</p><p class="p1">— Чертова сентиментальность! — ругнулся Маринелли. — Они сами его потом зароют, не звери же…</p><p class="p1">— Нет, нет. Это должен сделать я. Но я не смогу его дотащить один. Могилу я сам выкопаю. Прошу вас, помогите только донести!</p><p class="p1">— А, ч-черт с вами, подождите. Друзья мои! — крикнул он матросам. — Я вернусь буквально, буквально через минуту! Ждите, я спою вам любимый романс императора!</p><p class="p1">— В первый раз я увидел его в тюремной больнице, — задумчиво сказал Ять. — Это было почти пятнадцать лет назад. А в последний раз вижу в полицейском участке.</p><p class="p1">— Когда человек ни черта не умеет делать, — ругался Маринелли, зачем-то снимая чехол с матраса, — он всегда занимается ерундой…</p><p class="p1">— Зачем вы снимаете чехол?</p><p class="p1">— Да не лезьте вы с вопросами, помогите лучше. Что вы, так собирались его тащить? В простыне? Появиться в пирующем городе с трупом — это вполне в вашем духе… Пихайте его туда!</p><p class="p1">— Как — в чехол?!</p><p class="p1">— А, безрукий, — махнул рукой Маринелли и сам принялся натягивать грязный чехол на уже закоченевшего Свинецкого. Сначала он просунул туда его тощие босые ноги, потом, приподняв тело, потянул дальше; Ять преодолел себя и стал помогать. Свинецкий был невелик ростом — он целиком поместился в чехле.</p><p class="p1">— Допустим, я помогаю вам вынести на свалку какой-нибудь мусор или старый матрас, понятно? — шипел Маринелли. — Ну, я возьму его, а вы идите следом.</p><p class="p1">Певец легко взвалил Свинецкого на плечо и поднялся наверх. Ять как потерянный шел за ним. Против всех ожидании, от участка Маринелли направился не налево, а направо.</p><p class="p1">— А как же мы пройдем в парк?</p><p class="p1">— Какой, к черту, парк? Вы думаете, я действительно собираюсь копать ему могилу? Нашли могильщика! Он найдет могилу в волнах, как и хотел бы, наверное. Вы знаете Генуэзскую скалу?</p><p class="p1">— Да, конечно.</p><p class="p1">— Там есть отвесный обрыв, сразу под ним глубина. Он мирно пролежит на дне до второго пришествия, и никто ничего не заметит.</p><p class="p1">— Мне все-таки кажется… — неуверенно сказал Ять.</p><p class="p1">— Тысячи моряков похоронили в море, и никому ничего не казалось! Учтите, там высокий подъем, вам придется мне помогать. Ну, живо! Маринелли с гибкостью толстого кота взобрался на выступ скалы и уселся на него верхом:</p><p class="p1">— Подавайте!</p><p class="p1">Ять опять поднял Свинецкого на руки, Маринелли ухватил его, как мешок, и втянул наверх. Он еще подал руку Ятю, но тот взобрался сам: кое-что умел на свете и он. За огрызком башни, торчащей на скале, — еще различалась заросшая, мшистая кладка — открывалось нечто вроде смотровой площадки, длиною не больше сажени. Внизу поплескивало море да торчали два больших плоских камня, на которых любили загорать гурзуфские мальчишки.</p><p class="p1">— На камень бы не попасть, — озабоченно пробормотал Маринелли. — Булыжников положите, всплывет! — И сам принялся собирать вокруг крупные и мелкие обломки. Их запихали в мешок к Свинецкому. Ворочая камни, Ять — как всегда, несвоевременно, — вспомнил, что в Риме отцеубийц сбрасывали в Тибр, завязав в мешок с петухом, змеей и крысой. Крыса олицетворяла жадность, змея — коварство… Он не помнил только, что олицетворял петух. Но если посмотреть с этой точки зрения — в мешок Свинецкому и впрямь можно было бы положить только камень, вечную тяжесть его судьбы…</p><p class="p1">— Ну, хватит, — сказал Маринелли и затянул тесемки матрасного чехла. — Раскачиваем! И сами не улетите — с вас станется! Раз-два!</p><p class="p1">По его команде Ять взял Свинецкого за ноги, Маринелли поднял чехол за края — и, когда певец выдохнул «три!», полосатый мешок полетел в воду. Всплеск был несильный, и через минуту только этот белый след напоминал о присутствии в мире эсера Свинецкого.</p><p class="p1">— Ну, царство небесное, вечный покой, — сказал Маринелли и широко перекрестился. — Славный был малый, но не сумел собой распорядиться. In расе requiscat. Пойдемте со мной.</p><p class="p1">— Я останусь пока, если можно, — просительно произнес Ять.</p><p class="p1">— Ладно, — ответил певец. — Помните про Париж.</p><p class="p1">Ять просидел на скале, пока не начала сгущаться бледная синева. Он сам изумлялся потом, что у него не возникло и мысли прыгнуть вслед за Свинецким. Он никогда всерьез не думал о самоубийстве, рассматривая его как величайшую метафизическую невоспитанность — демонстративный акт, настойчиво требующий жалости к тому, кто в ней уже не нуждается. Он был уверен также, что почти всякий самоубийца в последний момент жалеет о своем решении. Самоубийство оправдано только тогда, когда жить дальше в самом деле нельзя — нельзя по определению: непрерывная пытка, позор, слабоумие. Он просто сидел на скале, глядя в море и зная, что нескоро теперь увидит его опять. Надо было понять что-то главное — о себе, Маринелли, Свинецком, море, — но мыслей не было. Была блаженная пустота: ни на что другое нельзя смотреть так долго — только на море, которое само себе смысл. На самом деле море одно — Тирренское, Эгейское, Адриатическое, Эвксинский Понт, море Лаптевых… Океан объемлет шар земной, и хорошо там, где нет ничего, кроме воды и неба. Почему так хороши эти две пустоты в своих бесконечных разнообразиях, в немыслимых оттенках? Видимо, дело именно в абсолютной бесцельности, в полной взаимной достаточности: ты освещаешь меня, я отражаю тебя.</p><p class="p1">Далеко далеко, на горизонте, виднелись жемчужно-серые облачные купола, угадывались верхушки минаретов, чалмы, островерхие колпаки, — там бурлил небесный базар, там путник входил в крикливый восточный город, стража искала смутьянов на улицах, кричали ишаки; призрачный, райский край ежеминутно менял очертания, и все оттенки серого строили в небесах дивный пейзаж. Там страдали — но так, как страдают в раю. С набережной донеслось бесконечно печальное пение Маринелли — это он исполнял для анархистов, впавших в сладостную грусть, любимый романс бывшего императора. Непонятно было, с чего он взял, что это любимый романс, — но император и вправду любил Плевицкую, все знали. Ять тоже любил эту песню, жалкие слова которой так мало вязались с мелодией:</p><div class="poem">
<div class="stanza">
<p class="v">В лу-унном сия-анье… снег серебри-ится,</p>
<p class="v">Там, по дороге… троечка мчится…</p>
<p class="v">Динь-динь-динь, динь-динь-динь,</p>
<p class="v">Колокольчик звенит,</p>
<p class="v">Этот звон, этот звон</p>
<p class="v">О любви говорит.</p>
</div>
</div><p class="p1">Полно, какая любовь, на что надежда?! Вот Свинецкий — никогда ни на что не надеялся, потому и умер героем, защищая святыню… Впрочем, какая это святыня — Голицынские склады? А вот я — всю жизнь просил себе немного жизни, крошку счастья, теплый угол, молил, умолял, вился ужом, добывал, выгрызал, вцеплялся мертвой хваткой, потом от всего отказался — и все же надеялся… И вот он мертв, а я жив; и есть ли тут выбор, если все кончается матрасным чехлом в одном случае и пустотой в другом?</p><p class="p1">Но и теперь он в душе знал, что живому лучше. Живой хоть песню слышит.</p><p class="empty-line"/></span>
