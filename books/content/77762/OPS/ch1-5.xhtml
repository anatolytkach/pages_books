<span id="id3"><div class="title1">
<p class="p">Действие первое. Жолтый чорт</p>
</div><div class="epigraph">
<p class="p1">Бело-серый бледный бес</p>
<p class="p1">Убежал поспешно в лес</p>
<p class="p1">Белкой по лесу он бегал,</p>
<p class="p1">Редькой с хреном пообедал</p>
<p class="p1">И за бедный сей обед</p>
<p class="p1">Дал обет не далать бед</p>
<p class="text-author">Запоминалка на «ять»</p>
</div><div class="epigraph">
<p class="p1">Оказалось, что надо построить огромный дворец на берегу моря или хотя бы Москва-реки… м-м-даа… дворец из стекла и мрррмора… и а-л-л-люми-иния… м-м-мда… и чтобы все комнаты и красивые одежды… эдакие хитоны, — и как его? Коммунальное питание. И чтобы тут же были художники. Художники пишут картины, музыканты играют на инструментах, а кроме того, замечательнейшая тут же библиотека, вроде Публичной, и хорошее купание. И тогда рабоче-крестьянскому пр-р-равительству нужна трагедия или — как ее там? — опера… И в каждой комнате обязательно умывальник с эмалированным тазом.</p>
<p class="text-author">Вячеслав Ходасевич</p>
</div><div class="epigraph">
<p class="p1">Он снял с пальца старинное дорогое кольцо, не без основания размышляя, что может быть, этим подсказывает жизни нечто существенное, подобное орфографии.</p>
<p class="text-author">Александр Грин</p>
</div><p class="subtitle">1</p><p class="p1">Ранней осенью 1916 года в Петрограде появились странные люди. Им всегда было холодно. Никто не знал, откуда они взялись. Матросы ходили в черном, солдаты в сером, а эти не пойми в чем. И странно: когда очевидцы тех событий, обитатели Питера в самые темные его дни, сходились повспоминать (чтобы скудная пища и уязвимый уют любого другого времени показались им райскими на фоне той поры), странных людей помнили все, а вот как они были одеты — сказать не мог никто. Тогда стало понятно, откуда Смутное время, получило свое название: не в безвластии было дело, а в размытости зрения, внезапно постигшей всех. Словно пелена опустилась на мир, чтобы главное и страшное свершилось втайне. Весною девятнадцатого, в светлый и мокрый день, встретив Грэма на Разъезжей (как оказалось — в последний раз), Ять спросил его: помните вы темных?</p><p class="p1">— Да, конечно, — с готовностью подтвердил Грэм. Он говорил о них запросто, словно будучи накоротке с силами, их породившими, и умея в случае чего эти силы заклясть.</p><p class="p1">— Я все думаю: куда они делись? Не может же такого быть, чтобы их использовали только как исполнителей, а потом в один день перестреляли всех.</p><p class="p1">— Не может, — снова кивнул Грэм. — Зачем же стрелять исполнителей?</p><p class="p1">— Чтобы не увлеклись. Мало ли, не остановятся вовремя, повернут штыки против власти…</p><p class="p1">— Исключено. Им нужна живая власть. Будет власть — будет и еда, а значит, их и не сожрут.</p><p class="p1">Этого Ять не понял, но уточнять не стал. Расспрашивать Грэма было бесполезно.</p><p class="p1">— И куда они пропали?</p><p class="p1">— Как — куда? — Грэм даже развел руками, словно изумляясь, что его спрашивают о таких очевидных вещах. — Развоплотились обратно, и вся тайна. Миновала опасность, они и превратились.</p><p class="p1">— Превратились? — переспросил Ять. — И в кого, интересно?</p><p class="p1">— В крыс, в кого же еще. Так не бывает, чтобы воплотился из одного, а развоплотился в другое. Если из неживой природы, тогда еще были случаи, Тиволиус описывал. Из ведра, допустим, в свинью, а из свиньи в скамейку. Но чтобы из крысы в человека, а потом, скажем, в рыбу — это совершенно, совершенно исключено.</p><p class="p1">Он говорил об этом деловито, как о заурядных технических подробностях, и Ять в который раз подивился способности этого невероятного человека сочинять себе сказку по любому поводу. Неправы были те, кто считал Грэма неприспособленным чудаком. Из всех чудаков, населявших город, этот был самым приспособленным, поскольку стена прихотливой изобретательности защищала его от любой правды. Не зря настоящая фамилия его была Кремнев (первый рассказ он напечатал еще под псевдонимом Крем, но это ему не понравилось; он стал Грэмом — звучало экзотически, капитански). Теперь Грэм проживал очередной рассказ — в манере, к которой Ять никак не мог привыкнуть. Стало интересно.</p><p class="p1">— А воплотились почему? — спросил он.</p><p class="p1">— Чтобы не съели, — убежденно сказал Грэм. — Еще бы чуть, всех переловили бы. А так не тронули. Крысу съесть проще, чем человека. Противно, но можно. Я в Одессе ел.</p><p class="p1">— А я нет, — признался Ять. — Кстати, я тут стал вспоминать… впервые за год, можете представить? Многое помню, а одного никак не могу уяснить: как они были одеты-то? Ведь мы их опознавали сразу!</p><p class="p1">— Они были одеты никак, — в своей манере выделяя нейтральнейшее слово (он и на письме любил эту внезапную разрядку), отвечал Грэм. — Вы видели на них одежду, которая наиболее соответствовала вашему представлению, и это был морок, наводимый ими без труда, по врожденному свойству.</p><p class="p1">Так Ять ничего и не выпытал. Про себя он продолжал называть странных людей темными, но не черный цвет ассоциировался с ними прежде всего, а смугло-желтый. Это был цвет их лиц — одутловатых, опухших, какие в прежние времена можно было увидеть только у самых безнадежных нищих. Всех нищих Ять для себя делил на тех, кого еще можно было спасти, и тех, кто ни на что уже не годен. Эти последние, кстати, вовсе не обязательно были больны, изуродованы или одеты в рубище: очень часто они выглядели чуть ли не ухоженными. Только шафранно-желтые лица и черные неподвижные глаза ясно доказывали, что тут уже не сделаешь ничего: перед тобой не жертва обстоятельств, но член тайного союза нелюдей, ни к чему, кроме подпольного существования, не пригодных. И, вспоминая потом цвет их лиц, белков, рук, Ять понимал, почему самый любимый и ненавидимый им поэт в иных случаях, не дожидаясь орфографической реформы, пишет «желтый» через «о»: жолтый. В этом «о» была бездна, дупло, зияние, завывание, страшная, желтая в черном дыра.</p><p class="p1">Они не говорили ни слова, просто протягивали руки и никогда не благодарили за милостыню. Немыслимо было услышать от них «Спаси Господи». Ять сразу догадался, что подаяния они просят только до поры, используя это занятие не ради прокорма, а для маскировки, как требующее наименьших усилий. Смешны были разговоры о том, что темные наняты большевиками или эсерами, — это было мелко, скучно, мимо сути. Темные не желали никакого переворота. Они ждали только удобного момента, чтобы покинуть подвалы и захватить город — не ради переустройства, дележки или иных жестоких, но понятных целей, а просто в силу своей природы, которую вряд ли сознавали сами. Никто их не пестовал, не растил, не собирал. Они завелись сами, как черви в трупе. Настанет день — и они выйдут из подполья, возьмут власть и обрушат все; и тщетно будет ждать снисхождения тот, кто подавал больше других.</p><p class="p1">Об их делах Ять был наслышан — как-никак газетчик, крутился среди репортеров (и, кстати, склонен был уважать эту чернорабочую среду — их, а не его усилиями газета прибавляла тиражей и славы, он был приправой к основному блюду). Репортеры, молодые и впечатлительные, невзирая на показной цинизм бывалых путешественников по питерскому дну, рассказывали о вещах столь ужасных, что их не вмещало воображение. Ять, слава Богу, достаточно читал о преступлениях прошлого, — но те злодейства получали объяснение, иногда даже слишком рациональное, почти иезуитское. В Питере же с шестнадцатого года стали случаться преступления именно необъяснимые — словно убийца имел единственной целью уяснить себе, что у жертвы внутри. И, пытаясь потом вспомнить, что таилось в черных глазах на шафранных одутловатых лицах, Ять понимал, что главным в них было любопытство. Такое выражение он видел однажды на лице ребенка, который, склонив голову набок, улыбчиво наблюдал за тем, как кошка расправляется с мышью.</p><p class="p1">Темные не жили поодиночке — они собирались в подвалах и на пустырях, варили там жуткое варево, там же и спали вповалку, делили одежду жертв, сдавали деньги в общую кассу или вожаку (должен быть вожак, чудовищный, вроде муравьиной матки, не приведи Бог никому увидеть его), — и были в городе места, куда лучше не соваться. Когда на окраине в очередной раз нашли изувеченный труп — голова отрезана, вся кровь выпущена, — репортеры снова загомонили о ритуальных убийствах: начиная с дела вотяков, во всяком бессмысленном злодействе искали ритуал.</p><p class="p1">— Не там ищете, — сказал тогда Ять молодому Стрелкину, славному, расторопному малому, который от назойливой семейной опеки то и дело сбегал в трущобы, заводил агентуру среди извозчиков и вообще по-детски пинкертонствовал. — Секту ему подавай. Нет никакой секты, все страшнее и проще. Нищих замечали?</p><p class="p1">— Что значит — замечал? На каждом углу торчат…</p><p class="p1">— Я не про обычных. У этих темно-желтые лица.</p><p class="p1">— Ять, ничего вы не знаете, книжный человек. Это обычное следствие алкоголизма, в почках что-то начинает вырабатываться — или, наоборот, перестает. Побегали бы по питерским трактирам, сколько я, — и не то бы увидели.</p><p class="p1">Это умилило Ятя. Он поглядел на Стрелкина ласково:</p><p class="p1">— Коленька, сколько вам лет?</p><p class="p1">— Девятнадцать, но это ничего не значит.</p><p class="p1">— Да конечно, не значит. Побегал он. Вы бы к ним присмотрелись. Сдается мне, что они не совсем люди.</p><p class="p1">— Конечно, не совсем. Отбросы, придонный слои.</p><p class="p1">— Ах, милый друг, — вздохнул Ять, — ничего вы не понимаете. Что с того, что придонный слой? В нем-то, может быть, и водятся особые существа. Я раз в Ялте видел, как морского змея поймали. Плаваешь, а ведь и подумать не можешь, что на дне такая тварь водится. Люди давно уже разделились — поверху одни, на глубине другие.</p><p class="p1">— И что? Вы хотите сказать, что это нищие убили?</p><p class="p1">— Ничего не хочу сказать, Коленька, только допускаю. Вы сектантов не знаете, а я ими лет пять занимался, доныне плююсь. Они публика нервная, кошку убить не решаются. Во глубине России, может, и иначе, но тут-то наши, питерские. Нет, тут убийство хладнокровное, без совести, без колебаний, — из чистого любопытства. Впрочем, мы сами виноваты: вытеснили столько народу на дно — они и расчеловечились естественным порядком.</p><p class="p1">— Да вы тайный эсдек.</p><p class="p1">— Боже упаси. Я за неравенство, только в пределах. Иначе те, что на самом верху, и те, что в самом низу, — теряют человеческий облик, не находите? Посмотрите на Мудрова (Мудров был купец, фантастический богач; считалось общим местом, что он помогает террористам, хотя никто этого не доказал. Зато хорошо было известно, — он и не скрывал этого особенно, — что он живет, как с женой, с пятнадцатилетней племянницей, и это не мешало ему жертвовать огромные деньги на монастыри, а монастырям — с благодарностью принимать). Такой почти богом себя чувствует, вот и дурит, испытывает Божье терпение. А другие — это, как вы изволите выражаться, дно. Наших дураков послушать — на дне знай Ницше читают да о вере спорят. А они давно уже не люди, и разговоры у них не человеческие. Только и ждут, когда мы совсем ополоумеем, тут и выйдут потрошить встречных. И никакая это будет не социальная революция, а в чистом виде биология.</p><p class="p1">Разговор этот имел интересное продолжение. Ять давно забыл о нем, — он легко разбрасывал сюжеты, — когда месяца три спустя в редакции его остановил встрепанный Стрелкин.</p><p class="p1">— Ять, заняты?</p><p class="p1">— Только что обзор дописал.</p><p class="p1">— Выйдем, я не могу тут говорить.</p><p class="p1">Они зашли в чайную на Среднем проспекте — знаменитую, давно облюбованную газетчиками, запросто привечавшую и «биржевика», и «нововременца», — уселись в углу, спросили глинтвейну, и Стрелкин долго молчал, разглядывая Ятя.</p><p class="p1">— Интересный вы болтун, Ять, — сказал он наконец. — Врете, врете, а вдруг и правду соврете.</p><p class="p1">— Так всегда бывает.</p><p class="p1">— Я вчера от приятеля шел — в университете со мной учился, на юридическом. Я курса не кончил, заскучал, а он остался. Иногда захожу к нему, сестра больно хороша… Они на Преображенском живут, чудесное семейство, засиделся до неприличия. Час, помню, уже третий. Иду я пешком, благо близко, — ночь холодная, мороз щиплется, луна, как блин… навстречу никого… Страх меня какой-то взял, черт его знает. Тени своей пугаюсь. Ну, кое-как дошел. И вижу (дом-то мой уже в двух шагах): в соседнем дворе фигуры мелькают. Что такое? Любопытство, сами знаете… Зашел в подворотню, гляжу — и глазам не верю: Ять, дети! В глухую пору, в три часа… черт разберет! Маленькие, в тряпье, в лоскутьях, — играют без единого звука. Обычные-то шумят, галдят, — а эти бесшумно, как звери. Хотя ведь и звери визжат… И с такой злобой толкаются, ставят друг другу подножки, разбегаются и опять сбегаются, кто кого собьет… ужас! А следит за ними взрослый, тоже в тряпье, треух нахлобучен, — зябнет, приплясывает. Иногда, если плохо дерутся, показывает им — как бить побольней.</p><p class="p1">— Дети? — задумчиво переспросил Ять.</p><p class="p1">— Говорю вам, дети. Лет по семь, по девять… Пятнадцатый сон видеть должны в такое время, да еще зимой! И знаете — этот-то, с ними, из ваших… я ведь их тоже узнаю, только значения не придавал.</p><p class="p1">— Из темных?</p><p class="p1">— Да. Я, конечно, лица не разглядел, но повадку их знаю: они двигаются… как бы сказать? — не совсем по-людски. Будто недавно выучились и не уверены, так ли выходит. Ну скажите на милость, для чего взрослому человеку глухой ночью детей во двор выводить?</p><p class="p1">— И зачем, по-вашему?</p><p class="p1">— Похоже, будто учит чему-то. Я у одного лицо разглядел — он ударился сильно, но не плакал. Я люблю детей, когда под ногами не путаются. Но тут… никогда такого ребенка не видел. Ведь в ребенке… всегда невинность, что ли. Этому же было лет восемь, — но лицо этакое… взрослое, все повидавшее, только черты миниатюрней. Он в мою сторону поглядел — так и не знаю, заметил ли.</p><p class="p1">— Так, может, они и не дети? Уродцы, карлики, которых ночью вывели, чтобы днем не смущать прохожих?</p><p class="p1">— Нет, то-то и оно. Я по страху понял: у меня такой страх, только когда вижу действительно иноприродное. Нищих этих ваших я никогда не боялся, но тут… ночью… в пустом дворе — дети… зверство какое-то. Я уж бочком-бочком из подворотни, чтоб шагов не слышали, — юрк к себе! Утром дворника спрашиваю — скажи, Антон, никогда не видел ты тут ночью, чтобы дети играли под надзором бродяги? Что вы, говорит, какие дети, откуда… примстилось выпивши… Но я у Дворкиных не пью. Я вообще мало пью, вы знаете.</p><p class="p1">— Ну что ж, — Ять допил чай. — Молодцом, Коленька. Очень убедительно отдарились за мою идею.</p><p class="p1">— Да ведь я всерьез, — тихо и обиженно проговорил Стрелкин, и Ять устыдился сомнений.</p><p class="p1">— Сколько детей было?</p><p class="p1">— Человек семь, может, восемь.</p><p class="p1">— Не знаю, — сказал Ять после долгой паузы. — Может, и впрямь ночная школа нелюдей, а может, просто какой-нибудь сумасшедший решил, что ночью гулять благотворнее. Вот и собрал кружок последователей, гуляет по ночам с их детьми — нынче знаете сколько идиотов?</p><p class="p1">— Нет, нет, — убежденно ответил Коленька. — Все не то. Это школа, школа маленьких убийц. Ничего не боятся, никого не жаль.</p><p class="p1">— Хотите, сегодня вместе сходим посмотреть? — предложил Ять.</p><p class="p1">— Ну уж нет, — твердо отказался Коленька. Это было на него не похоже — в иное время он зубами ухватился бы за такую тему. — Я и днем туда больше не зайду.</p><p class="p1">Ять так и не узнал, был ли это талантливый розыгрыш, случилась ли у Стрелкина от холода и от любви галлюцинация, или и в самом деле темные начали воспитывать армию маленьких солдат. Но только весной семнадцатого шафранных нищих становилось все больше, и вели они себя все свободнее, — когда-то едва решались днем ходить по улицам, жались по углам, робели, втягивали голову в плечи, словно ожидая удара, а теперь внаглую расхаживали по Невскому. Подаяния почти не просили — только стояли у домов, подпирали стены и выжидательно приглядывались. Со Стрелкиным Ять о них больше не заговаривал.</p><p class="subtitle">2</p><p class="p1">О всяком человеке можно сказать мало определенного, о Яте — еще меньше. Лет ему от роду было тридцать пять, он был высок ростом, худ, женат, но с женой не жил десять лет. Ему нравились путешествия, таинственные истории, компании стариков и молодежи. Ровесники всегда казались ему взрослыми, а потому неинтересными людьми. Он часто смеялся во сне, смеялся бы и наяву, но был для этого слишком хорошо воспитан.</p><p class="p1">Подписываться Ятем он стал с двадцати лет — с тех пор, как начал публиковать в «Пути», «Глашатае» и «Веке» корреспонденции и мелкие рассказы. На досуге изучал труды нескольких полузабытых литераторов и потому состоял в Обществе любителей словесности, на заседания которого регулярно являлся. Ему, возросшему в среде разночинной, всегда на грани бедности, — мила была атмосфера академических собраний и профессорских семей, где утонченность, почти изнеженность так странно сочеталась с душевным здоровьем. Он играл немного в карты, симпатизировал кадетам, был одно время корреспондентом во второй Думе и на фронте, а потому давно понимал, что скоро все кончится. Однако понимал он и то, что хорошо кончиться не может: одна пошлость сменяет другую, зло побеждается только еще большим злом, и нет никаких оснований полагать, что когда-нибудь выйдет иначе.</p><p class="p1">У него имелись, как положено, имя, отчество, паспорт — причем квартира, снимаемая в шестиэтажном доме на Большой Зелениной, была записана по договору с домовладельцем на обыкновенную, хоть и не распространенную русскую фамилию. Фамилия эта, в свою очередь, была псевдонимом его отца, рано умершего врача и притом еврея-выкреста. Однако сам Ять давно называл себя Ятем, и по этому псевдониму знала его небольшая, но преданная аудитория. Псевдоним он взял не из трусости, не потому, что не любил отцовскую фамилию: она была не хуже, чему прочих. Ему нравилась буква. Ять и себя считал условностью, которая только по бесконечному терпению Божию не упраздняется. Но он знал, что без него нечто неуловимое сдвинется и перестанет существовать.</p><p class="p1">Врожденная грамотность давала ему единственное преимущество перед одноклассниками: он не был ни сильнее, ни красивее, ни богаче прочих — хотя тонкое его лицо и серьезные серые глаза нравились женщинам, — но то ли от детской привычки к непрерывному, даже за едой, чтению, то ли в силу особого таланта он всегда точно знал — когда в слове ять пишется, а когда нет. Он считался в классе экспертом по вопросам правописания. Со временем Ять все чаще задумывался о том, что правописание, в сущности, лишний ритуал, — но в мире только то и прекрасно, что не нужно. Насущных вещей Ять терпеть не мог.</p><p class="p1">Впрочем, нужно ему было немногое. После горьких и благотворных событий, случившихся в его биографии за два года до осени семнадцатого, он в полной мере оценил прелесть добровольного, с опережением, отказа. Главное было — остаться в одиночестве, без надежд и с минимумом вещей. Но вот что было страшно: усыхая, отказываясь от излишеств, привыкая обходиться ничтожной малостью, он все отчетливей чувствовал, что не приближается к смерти, а только удаляется от нее. Мир вокруг него рушился, уже осыпались дома и срывали вывески — сам же он чувствовал себя все более крепким и живучим. Ничего не желая, никого не жалея, почти ни о чем не помня, он стал вдвойне стоек, как дерево без листьев, — и в этой-то неубиваемой жизни, лишенной всего, для чего жизнь дана, была особенная тоска.</p><p class="p1">Тело его иссохло, натянулось, как струна. И он порадовался, когда наступила зима, начисто лишенная надежд и красок. Словно падал, падал и достиг наконец дна бездны; знать бы тогда, как далеко было дно.</p><p class="p1">Как он прежде любил зиму! С давних, детских времен в ней было что-то волшебное. За месяц до Рождества начиналось преображение витрин, их ликующее изобилие, в котором и благодушный окорок, и тающий от счастья сыр обретали особую одухотворенность. И осетры с приколотыми к ним раками, и угри, и сиги сияли кроткой жертвенной любовью, готовясь украсить семейное пиршество. Это были уже не отрады, чревоугодника, но равноправные участники мистерии, в которой само сложное, продуманное устройство быта перестает служить комфорту и становится формой служения божеству. Ять не знал ничего трогательнее, чем приготовления к елке, и не подарки нравились ему, а то, что их заботливо заворачивали и изобретательно прятали. Все служили друг другу. Жалок и умилителен тот, кто с благодарной улыбкой принимает угощение, но умилительней тот, кто в предвкушении чужого счастья готовит тонкое блюдо, раскладывает сложные и прекрасные вещи в осиянной электричеством стеклянной витрине, заворачивает подарки и заботливо прячет сюрпризы. Если Ять ребенком и мог помыслить Бога, он мыслил его таким — приготовившим бесчисленные сюрпризы для вечного праздника.</p><p class="p1">Теперь витрины были мертвенно-пусты, кое-где заклеены газетами, где-то и вовсе разбиты. Смерть больше не превращалась в сказку, с нее навеки слетел романтический флер, кончились декадентские игры — и она стояла над городом, во всей своей чудовищной скуке. Праздник гибели кончился, начались ее будни. Но чем скучней и безвыходней были эти будни, тем большую силу жизни ощущал в себе Ять, — слепую силу растения, которому все равно, есть еще электричество или его не было никогда.</p><p class="subtitle">3</p><p class="p1">Последняя веселая ночь Ятя случилась с двадцать пятого на двадцать шестое октября, когда редактор его газеты «Наша речь» Мироходов откомандировал его в штаб обороны города. Слухи о выступлении носились по Питеру, кто выступает — никто не ведал. Штаб обороны города находился в левом крыле желтого здания Генерального штаба. Пропусков не спрашивали. В здании с клетчатыми затоптанными полами, грязной лестницей и душным запахом сырого шинельного сукна сновали люди, которым решительно некуда было спешить: все чувствовали смутное возбуждение и не знали, что с ним делать. Так больной незадолго перед концом приходит в себя и начинает беспокойно шарить по одеялу, озираться, мычать — но обманываться этим возбуждением не станет и самый жизнерадостный лекарь.</p><p class="p1">Ять попросил дежурного провести его к кому-нибудь из руководителей штаба, ему указали дальнюю дверь, и он вошел в прокуренную комнату, где над картой склонялось несколько белозубых, смеющихся офицеров. Ять не понимал, над чем смеялись, но отчего-то легко разделил общее лихорадочное веселье. Он представился и поинтересовался, кто возглавляет штаб обороны. Ему назвали фамилию, которую он записал и тут же забыл.</p><p class="p1">— Можно ли его видеть?</p><p class="p1">— Естественно, можно. Но он теперь занят.</p><p class="p1">— Я понимаю. Правда ли, что ночью город будет взят?</p><p class="p1">— Неправда, конечно. Кому он нужен?</p><p class="p1">Все снова расхохотались. Входили и выходили замерзшие, возбужденные люди, задавали бессмысленные вопросы, и сам Ять чувствовал себя на нервном подъеме, какой всегда переживаешь в эпицентре больших событий. Долгое ожидание наконец разрешалось не пойми чем. История взяла дело в свои руки, можно не суетиться — отсюда происходило и странное облегчение, которое чувствовали все. Никаких больше обязанностей, только смотри.</p><p class="p1">Он еще дважды спрашивал сновавших мимо людей, иногда даже кивавших ему, как знакомому, — кто руководит обороной. Называли все время разные фамилии; в память ему врезался отчего-то генерал Каковский, ужасно смешная фамилия. В третьем часу вдруг грянул взрыв — стекла задребезжали, кто-то ясно сказал: «Это с Невы», на площади внизу протрещали и затихли выстрелы. Люди в коридорах задвигались быстрее. Ять бродил из комнаты в комнату, как пьяный. Никто ничего не понимал.</p><p class="p1">— Скажите, но город обороняется? — спросил он усатого краснолицего полковника, все время сморкавшегося в огромный пестрый платок.</p><p class="p1">— А как же, — серьезно ответил полковник. — Обязательно обороняется, все в наших руках.</p><p class="p1">— А где генерал Каковский? — тоном знатока поинтересовался Ять.</p><p class="p1">— Каковский? — переспросил полковник. — Вероятно, на укреплениях.</p><p class="p1">— Каких?</p><p class="p1">— Каковских, — еще серьезнее ответил полковник. — На каких же еще.</p><p class="p1">— А, — кивнул Ять. — А кто руководит обороной?</p><p class="p1">— Генерал Чхеидзе, — с ласковой улыбкой ответил полковник. — Усач, красавец. Гроза женского полу. Не пропускал ни одной юбки, страстно любил кахетинское.</p><p class="p1">— Но главное, что все в наших руках, — уточнил Ять.</p><p class="p1">— Разумеется, — пожал плечами полковник. — В чьих же еще. Красавец, усы — вот! (Он руками показал усы.) Тифлис от него стонал.</p><p class="p1">Все было похоже на опасную, щекочущую игру. Игра называлась «Оборона города». Правила заключались в том, чтобы ничего не оборонять, но старательно делать вид — ходить, нервничать. Когда забелел рассвет и клочья ночи, живописно располагаясь по окоему, принялись выцветать, Ять снова увидел давешнего полковника.</p><p class="p1">— А все-таки кто руководит обороной, mon colonel? — спросил он, почему-то переходя на французский.</p><p class="p1">— Генерал Огурчиков, — серьезно отвечал полковник.</p><p class="p1">— Не слыхал о таком, — столь же серьезно произнес Ять. — Любят ли его в войсках?</p><p class="p1">— Видите ли, — приблизив к нему лицо, выпучив глаза и переходя на ужасный шепот, сказал полковник. — Я никому об этом не говорю, вам первому. Разумеется, это не для печати. Запишите и немедленно опубликуйте. Дело в том, что огурчики, находящиеся под его командой, — страшные фанатики, не останавливающиеся ни перед чем. Генерал и сам не всегда способен остановить их. Поэтому город вне опасности, совершенно вне опасности…</p><p class="p1">— А как же поручики? — спросил почему-то Ять.</p><p class="p1">— Ни поручики, ни голубчики не остановят огурчиков! — воскликнул полковник, и на этих словах Ять проснулся. Разумеется, никто не послал бы его в штаб обороны города, он сроду не писал ни о чем подобном. Но трудно было сомневаться, что в штабе царило именно такое бессмысленное возбуждение, а о беспрерывной смене начальников штаба он прочел два дня спустя в корреспонденции Арбузьева, нового автора «Пути». Этот веселый сон Ять вспоминал потом часто.</p><p class="subtitle">4</p><p class="p1">Тридцатипятилетие Ять решил праздновать в одиночку — кому было до праздников пятнадцатого декабря семнадцатого года? Он уже за месяц знал, чем побалует себя. В десять утра он встал, побрился, подстриг усы, надел все лучшее и пешком отправился к Клингенмайеру. Надо было зайти еще в Лазаревскую больницу — его кое-кто ждал, хотя праздник его там ровно ничего не значил. Но это можно и позже — сначала в гости. Ять никогда не мог понять, на что живет Клингенмайер. Продавал он мало, прикладного значения его товар не имел, а историческими разысканиями и в более благополучные времена нельзя было заработать. Деньги его были такого же таинственного происхождения, что и вещи в лавке, — и, право, окажись Ять перед выбором: узнать о Клингенмайере что-нибудь определенное или остаться в неведении, — он замкнул бы слух.</p><p class="p1">Таинственный собиратель владел лавкой на углу Большого проспекта и Лахтинской, в крошечном полуподвале. «Д-р Фридрих Клингенмайер. Раритеты и древности» — гласила желтая вывеска. Завсегдатаи полуподвала были немногочисленны, но даже и среди этой избранной публики немногим удавалось запомнить, по каким дням и в какие часы открывает свою сокровищницу прихотливый доктор. Только единицы, избранные среди избранных, знали, что лавка открывается, когда ему заблагорассудится. Ятю повезло — замка на двери не было; он вошел, и зеленый от старости колокольчик известил о посетителе копавшегося в запасниках хозяина. Клингенмайер в линялом рабочем халате (который выглядел на нем словно расшитый звездами) появился из глубины своей лавки, соткавшись из полумрака и пыли. У этого немца (а впрочем, кто знал наверное, что он немец?) была внешность не то персидского звездочета, не то иудейского мудреца: темно-смуглое пергаментное лицо, тонкий, с горбинкой нос, мягкие морщины.</p><p class="p1">Не все догадывались о принципе, по которому Клингенмайер отбирал свои вещицы, и уж вовсе никто не делился догадками; в «клубе Клингенмайера» публика была немногословная. Иногда хозяин, подразумевая в посетителе знатока (хотя заглянуть к нему мог и случайный прохожий, привлеченный вывеской), любовно показывал вполне заурядный предмет: «Поглядите, что я раздобыл. Удивительная вещица, не правда ли?» — и гость послушно изображал восхищенное внимание, пристально разглядывая крышечку от чернильницы, кукольный ботинок или лорнет на черепаховой ручке, какой можно было увидеть у любого инспектора провинциальной гимназии: «Да, редкая вещь». «Не то слово, милостивый государь, не то слово», — кивал Клингенмайер и возвращался к своим запасникам.</p><p class="p1">Ять тоже не был уверен, что разгадал тайну этого хаотического отбора, но — и это лишнее доказательство того, что чужие тайны мы склонны подменять собственными, — в душе полагал, что Клингенмайер ценит лишь причудливые ухищрения без особого практического смысла. Положим, лорнет зачем-нибудь еще нужен, хотя большинству такие штуки служат только для украшения; но вон та чашечка слишком хороша, да и маловата, чтобы из нее пить, а эта пуговица ничего не стоит без сюртука, а музыкальная шкатулка давно не играет, а толстенная свеча прямоугольного сечения попросту не будет гореть, ибо некуда стечь воску и пламя захлебнется через три минуты; но именно триумф красивой бессмыслицы, избыточных, отягощающих условностей был Ятю мил в подвальной лавке. Словно все вещи мира, изгнанные из него за бесполезность, сошлись тут, чтобы послужить оправданием пренебрегшему ими человеческому роду.</p><p class="empty-line"/><p class="p1">Впервые Ятя привел сюда Грэм, сам неутомимый собиратель чудаков и чудачеств. Мальчик, выросший на фантазиях Верна и Купера (но на чем же и было расти ребенку конца столетия, если русская словесность, как истеричная барыня, предоставила детей западным гувернерам), Ять обожал вещи, приплывшие издалека. Тут были корабельные компасы, словно спасенные с роскошных затонувших кораблей начала века — самонадеянных трансатлантических великанов; и талисманы, не иначе как найденные в карманах полярных исследователей, замерзших в трех милях от спасительного лагеря, на возвратном пути от полюса, пятью месяцами ранее открытого удачливым, скучным норвежцем; и дедушкины табакерки, и бабушкины веера, сами собой ложившиеся в четырехстопные ямбы. Тут был бледно светящийся фосфорный цветок со старого бального платья, коробка французской пудры тридцатых годов безвозвратного века, серебряная с чернью стопочка, отбившаяся от пяти сестер, желтый мужской перстень слоновой кости с кружевным, ажурной сложности узором и почти в цвет ему женская перчатка с неизвестного, скорей всего несчастного венчанья. Но больше всего Ять любил американские сигарные коробки — иные с кубинскими сигарами, иные уже без всяких сигар; он любил их густой, кирпичный, темно-красный цвет фабричной стены в час заката. Его плотная, винная, насыщенная густота была для него цветом скитаний, великих пространств и кровавых стычек. Впрочем, любил он и тусклые золотые цепочки, соседствовавшие с безвкусной, грошовой бижутерией, которая среди запасов Клингенмайера отнюдь не казалась бедной родственницей, а чувствовала себя на месте и гордо поглядывала на посетителя: здесь оценивают не так, как у вас, словно говорили все эти стеклянные бусы и перламутровые крымские брошки.</p><p class="p1">Был тут и разряд вещей, особенно любимых Ятем и не продававшихся: Клингенмайер держал их, как говорил, для обзора. Это были талисманы, доставшиеся ему от прежних владельцев в подарок, в оплату таинственных услуг или попросту на хранение, когда они уже потеряли силу, а то и начали источать зло, как бывает с перебродившими эликсирами. Талисманы были прекрасны неприметностью, бедностью — огарок, муаровый бант, кукольный глаз, башмак, монета, бусина, четвертка бумаги с обрывком счета, записанного порыжевшими чернилами, одинокий валет из старой колоды (все еще франт — подкрученные усики, выцветший румянец на девически-чистых щечках), витой шелковый шнурок, плоский и ломкий засушенный цветок из гимназического гербария, задачник Магницкого с вписанными карандашными ответами, игральная кость, коготь неизвестного дракона (а при ближайшем рассмотрении, скорей всего, куриный), бархатная подушечка с запахом пряной, сухой, мелко крошенной травы, — все это было разложено на шести полках высокого, загнанного в темный угол шкафа красного дерева с резьбой.</p><p class="p1">Собирался в лавке небольшой кружок чудаков, сходившихся нечасто, в последнюю пятницу четного месяца; бывал чай с неведомыми травами в крошечной круглой комнате, где священнодействовал сам Клингенмайер без прислуги и родни; бывали экзотические гости, большей частью путешественники, рассказывавшие о бурях и островах; спириты, эзотерики, теософы и знатоки масонской символики; был даже один кельтолог, после доклада о Бэде-проповеднике спокойно сообщивший, что Дума наводнена масонами и многие из них имеют доступ к государю. Клингенмайер редко участвовал в беседах, иногда только сыпал ароматическую соль на тонкое медное блюдце, поддерживаемое бронзовым негритенком. На коленях у негритенка стояла свеча, блюдце нагревалось, и кристаллы распространяли сладкий, тягучий запах. От него хотелось и спать, и бодрствовать — слушать и слушать, плыть по ленивым, знойным волнам; Ять мечтал выпросить себе щепоть этой соли. После собрания Клингенмайер обыкновенно вручал докладчику, а то и гостям (некоторым, всегда избирательно) прелестные мелочи, бесценные и не стоящие ни гроша. Так Ять получил от него фарфоровых котят в корзинке, гимназическую чернильницу-непроливайку и с особенным значением врученную соломенную шляпу («Вещь непростая, и вы еще не знаете, как она вам пригодится»; пока не пригодилась никак, ждала своего часа). Клингенмайер явно заранее отбирал подарки, заботливо упаковывал их — разворачивать разрешал только дома, по возвращении с пятничного сборища — и порой сопровождал странными стишками, вроде: «Вот ключ от истины. Внимательно смотри: четвертый нужен там, где соберутся три». Этой запиской он напутствовал Грэма, вручив ему старинный ключ неизвестно от чего. Разумеется, антиквар дурачил гостей, но они относились к его запискам с исключительной серьезностью — возможно, впрочем, наигранной, в духе всего этого клуба чудаков.</p><p class="p1">Удивительно было, как уцелел и полуподвал, и вывеска с немецкой фамилией во дни, когда — сперва с благословения жандармерии, а затем и в июле, уже при Керенском, — в Питере громили немецкие магазины, пекарни и кофейни. Как только начали бить стекла, Ять кинулся в лавку Клингенмайера, но там на дверях висел замок, тоже не нашенский, древний, пудовый, — на такие запирались немецкие амбары времен Реформации. Никто не тронул Клингенмайерова жилища — то ли народ на Петербургской стороне был тише, чем на других окраинах, то ли вывеска была больно убога, то ли наличествовало высокое покровительство, незримая опека законспирированных правителей России, бывавших на таинственных пятницах с историческими и географическими докладами. Впрочем, никакая охранная грамота не остановила бы толпу; Грэм в своей манере замечал, что вывеска Клингенмайера не всякому видима.</p><p class="empty-line"/><p class="p1">Итак, Ять вошел, колокольчик приветствовал его, и Клингенмайер из глубины лавки выплыл, словно по воздуху, навстречу посетителю.</p><p class="p1">— Ждал вас, — обратился он к Ятю по имени-отчеству, — ждал и знал. Из господ завсегдатаев самый стали неаккуратный. Могли бы почаще наведываться. Голос у него тоже был сухой, шелестящий, по-немецки приглушающий звонкие согласные.</p><p class="p1">— Докучать боюсь, — признался Ять.</p><p class="p1">Клингенмайер ничего не ответил, только улыбнулся тонкими губами, словно желая показать, что оценил учтивость, излишнюю между своими.</p><p class="p1">— Что скажете? — спросил он, пожимая Ятю руку и подводя его к старинному книжному шкафу, на полках которого так естественно выглядели бы колдовские фолианты с рецептами любовных зелий, но на самом деле теснились на равных правах подшивки «Нивы», разрозненные тома из немецких и французских «Сочинений» забытых авторов, брошюры о русском сыщике Кобылкине, пособия по кораблестроению, морские уставы и лубочные книжки. — Посмотрите приобретения, есть и для вас кое-что, но это после.</p><p class="p1">Никогда не было понятно, что следует отвечать на приглашающее «Что скажете?» — спрашивал ли Клингенмайер о своих последних приобретениях или о последних новостях гостя. Ятю, однако, хотелось поговорить о творящемся вокруг, ибо собственные догадки были слишком страшны, но он не знал хорошенько, с чего начать.</p><p class="p1">— А у вас все по-старому, — сказал он, осматриваясь.</p><p class="p1">— Что ж в последний раз не были?</p><p class="p1">— А кто приходил?</p><p class="p1">— Все свои, я гостей не звал, — отвечал Клингенмайер, протирая бархоткой старинный деревянный глобус с приблизительными, давно уточненными очертаниями континентов и без Антарктиды. — Говорили об алеутских способах обогрева жилищ.</p><p class="p1">— Вовремя, — заметил Ять, подивившись, однако, постоянству хозяина и завсегдатаев: последняя пятница четного месяца случилась двадцать седьмого октября. — И как вам все это? Клингенмайер пожал плечами.</p><p class="p1">— Историка чем же удивишь, — произнес он так, словно тысячу раз уже переживал подобные перевороты, и не во сне, а наяву, в своих агасферских странствиях. — Ждите реставрации.</p><p class="p1">— Что ж, и Романовы? — не поверил Ять.</p><p class="p1">— Какая разница, Романовы, Обмановы. Если Романовы, это еще не худший случай. У них на настоящую месть уже сил нет. Хуже, если свои вырастут, эти такого натворят, что девяносто третий год пикником покажется. Никогда нельзя казнить царя: если бы вернули Луи Капета, он бы стольких не выморил. Простил бы на радостях.</p><p class="p1">— А Керенского никак уже не вернешь? Клингенмайер покачал головой.</p><p class="p1">— Вы что же, хотите Керенского?</p><p class="p1">— Не его, а…</p><p class="p1">— А его и не было, — твердо сказал Клингенмайер. — Все идет своим ходом, и чтобы построить новую империю, надо до конца развалить эту. Тогда все с восторгом встретят царя: батюшка, как хочешь лютуй, лишь бы ты! Собственно, еще Луазон… Ну да Бог с ним. Что у вас-то?</p><p class="p1">— Да пишу, покуда есть газета. Ну и для себя по мелочи. Я начал тут одну вещь, но не думаю, что доведу до ума. Либо растеряю интерес, либо станет не до писаний.</p><p class="p1">— Никогда так не станет, — значительно произнес Клингенмайер.</p><p class="p1">— Да какой же смысл?</p><p class="p1">— За слово «смысл» я скоро буду брать штраф, как в оны времена, при наполеоновском нашествии, брали за французский язык. Вы говорите, смысл, — он безошибочно вытащил из шкафа небольшую книгу в желтом кожаном переплете. — Полистайте-ка, а потом говорите о смысле. Ять внимательно просмотрел книгу, но не понял хода клингенмайеровской мысли и честно признался в этом.</p><p class="p1">— Вот и весь смысл, — улыбнулся Клингенмайер. — Он заключен в ней, и вы же не скажете, что его нет?</p><p class="p1">— Вероятно, есть.</p><p class="p1">— Уверяю, настанет день, когда он станет для вас яснее ясного. А пока и не спрашивайте никого. Лучше вообще не показывайте кому попало.</p><p class="p1">В этот миг снова зазвонил дверной колокольчик, и в дверях возникла тощая долговязая фигура в башлыке. Этого посетителя Ять, сколько можно было разобрать в полумраке, не знал.</p><p class="p1">— Фридрих Иванович, — негромко позвал вошедший.</p><p class="p1">— А, здравствуйте, здравствуйте, — Клингенмайер пошел навстречу новому гостю.</p><p class="p1">— Я решился, Фридрих Иванович, — твердо сказал вошедший. Клингенмайер помолчал.</p><p class="p1">— Что ж, — сказал он после паузы. — Решившихся не отговаривают, это было бы неуважением к их решимости. Не стану приводить вам аргументов, прошу только еще раз взвесить… Вы всегда можете забрать, если передумаете.</p><p class="p1">— Вряд ли, — длинный криво усмехнулся. — Я знаю, что делаю.</p><p class="p1">— Да пройдите же сюда, что в дверях стоять…</p><p class="p1">— Нет, нет, я на секунду… Вот, — гость порылся в карманах и извлек небольшой круглый предмет, завернутый в газету; Ять пригляделся — это был эсеровский листок «Знамя труда», газетенка гнусней некуда. Клингенмайер бережно, как драгоценность, принял сверток и, не поблагодарив, не заплатив, направился обратно к Ятю.</p><p class="p1">— Я могу надеяться? — спросил долговязый.</p><p class="p1">— Можете быть совершенно уверены.</p><p class="p1">— Ну, прощайте.</p><p class="p1">— В любом случае до свидания, — строго сказал Клингенмайер. — Помните, этот дом теперь ваш дом.</p><p class="p1">— Хорошо, кабы так, — долговязый еще раз усмехнулся, постоял в дверях и торопливо вышел. Колокольчик жалобно тенькнул ему вслед.</p><p class="p1">— Кто это? — спросил Ять.</p><p class="p1">— Покупатель, из постоянных, — уклончиво и, как показалось Ятю, с неохотой отвечал антиквар. Он осторожно развернул круглый предмет, и в руках его оказался стеклянный шар с домиком и снежным бураном внутри. Клингенмайер несколько раз встряхнул игрушку, и бумажный снег взвился над крышей домика, а потом снова устлал ее и бархатную зеленую лужайку вокруг. Славная вещица, но ничего особенного — такие продавались накануне Нового года в каждом игрушечном магазине. Клингенмайер рассматривал шар задумчиво, с видом истинного знатока.</p><p class="p1">— Жаль, — произнес он наконец. — Очень жаль. Да что ж поделаешь, вольному воля.</p><p class="p1">Он поместил шар на верхнюю полку шкафа с талисманами, из кармана халата извлек карандаш и сделал запись в старой конторской книге, лежавшей на той же верхней полке. Ять видел эту книгу впервые.</p><p class="p1">— Реестр? — спросил он.</p><p class="p1">— Кто бы знал, какой это реестр, — вздохнул Клингенмайер. — Ну, как вам книжка?</p><p class="p1">— Занятно, — улыбнулся Ять.</p><p class="p1">— Она ваша. Да, да, это я вам дарю. Возьмите, и никаких денег, все равно она стоит больше, чем у вас есть.</p><p class="p1">— Спасибо, — сказал Ять. — И откуда вы все знаете?</p><p class="p1">— Что знаю?</p><p class="p1">— День рождения у меня нынче, — сказал Ять. — Тридцать пять лет как одна копеечка.</p><p class="p1">— Поздравляю, — кивнул Клингенмайер. — Не знал, ей-Богу. Выбирайте подарок.</p><p class="p1">— Так ведь уже…</p><p class="p1">— Нет, это я приготовил заранее, не догадываясь, что у вас праздник.</p><p class="p1">— Я бы попросил у вас ароматической соли, той, что вы поджигали на собраниях. Если, конечно, это не тайна, не раритет…</p><p class="p1">— Раритет, — кивнул Клингенмайер, — но для вас найдется. Пойдемте, попьем чаю, там и отсыплю.</p><p class="p1">Они прошли в заднюю комнатку, где проходили собрания. Клингенмайер поставил на спиртовку небольшой медный чайник, в котором заваривал свои травы, отравы, отвары, — отпер шкатулку и вынул из нее бумажный пакетик.</p><p class="p1">— Но учтите, на обычных свечах порошок не действует, так что придется дать и свечу. Впрочем, праздник есть праздник. Я вам все это вручу с открыткой.</p><p class="p1">Ять впервые удостаивался послания от Клингенмайера. Антиквар присел к столу, обмакнул вставочку и задумался. Лицо его было меланхолично и мечтательно. Наконец он решительно начертал несколько слов, подул и протянул Ятю открытку — немецкую, рождественскую, с маленькими пятнистыми оленятами, умильно заглядывавшими в окно идиллического домика.</p><p class="p1">Ять прочел:</p><p class="p1">«Вот напоследок для тебя подарок — свечи огарок. Храни его и не давай в обиду другому виду».</p><p class="p1">Подпись была витиевата и размашиста, почерк округл, но изящен. Ниже с немецким педантизмом проставлена была дата.</p><p class="p1">С этой даты и начался для Ятя отсчет главных пяти месяцев в его жизни.</p><p class="subtitle">5</p><p class="p1">День своего упразднения, 23 декабря, Ять помнил в подробностях. Вероятно, и впрямь существует всечеловеческий беспроволочный телеграф, потому что с утра в его квартиру на Зелениной потянулись посетители — люди по большей части совершенно ненужные. Больше всего это было похоже на отдание последнего долга Разумеется, с утра Ять, как и бессознательно валившие к нему гости, ни о чем таком не подозревал. Первым принесло Трифонова. Кого не хотелось видеть, так это Трифонова. Вообще хотелось сочинять, впервые за несколько недель пришел настрой, — вдобавок накануне Ять вымылся, что в последний месяц никак не удавалось. Ритуал мытья был теперь тяжел, сложен, заниматься им надлежало с раннего утра, на свежую голову. Чистый, довольный, с непросохшими еще волосами, закутавшись в оба халата, сел он к столу — и тут скрежетнул звонок; чертыхаясь, Ять пошел к двери.</p><p class="p1">— Здравствуйте, здравствуйте, — сопя, отдуваясь, повторяясь, не давая вставить слова, в нос говорил Трифонов. — Простуда, простуда, никак не пройдет, нет, не пройдет. Теперь ничего не проходит. Недостаток жиров, недостаток жиров. А я к вам, к вам. Сколько можно, сижу один, как сыч, вот-вот с ума сойду. А у вас потеплее, потеплее.</p><p class="p1">Ну, подумал Ять, ежели у меня потеплее, то у него и впрямь хуже некуда. Вытерпим Трифонова. Тем более что его непрестанная, забалтывающаяся скороговорка выдавала привычку к долгому одиночеству, к разговорам с самим собой — бессмысленным, только бы нарушить давящее молчание пустой квартиры и не забыть людскую речь. Жена ушла от Трифонова три года назад, брак был недолог — и двух лет не прожила хохлацкая красавица с угрюмым, сосредоточенным на себе профессором, которого вечно мучили навязчивые страхи и апокалипсические предчувствия. Ять ее не осуждал — у нее были огромные, прелестные карие глаза, грудной голос, и никто больше нее не жалел покидаемого мужа; Трифонов, кстати, и не удерживал. Уехала она к давнему поклоннику в Киев, Трифонов умолил Ятя пойти на вокзал вместе с ним, проводить (Ять долго отнекивался, не желая участвовать в чужой драме, да и к чему в таких делах свидетели?). Наталья Александровна уезжала почти без вещей, долго прижимала голову Трифонова к груди, называла его «доню» и улыбалась сквозь слезы. Он держался молодцом, только все взглядывал на часы; когда осталось пять минут, вдруг засопел, беспокойно задвигался и тоже расплакался.</p><p class="p1">— Ну, верно, так надо, — сказал он. — Прощай, прощай. И, не дожидаясь, пока поезд тронется, потянул Ятя за рукав и пошел вдоль поезда назад, в здание вокзала.</p><p class="p1">— Нельзя, нельзя, — повторял он. — Самой минуты видеть нельзя. Как тронется — не выдержу, пусть уж без меня. Идемте, голубчик, водочки выпьем…</p><p class="p1">В вокзальном буфете Трифонов приободрился, лихо пил водку, говорил даже о каком-то новом браке, который возможен, вполне возможен, — но отъезд жены запустил в нем механизм саморазрушения: он все меньше следил за собой, писал темно, на лекциях забалтывался. В последнее время он был одержим страхом, что его профессия лингвиста никому больше не нужна, что за ним скоро придут и поволокут на общественные работы. Такое уже бывало в истории — приходили варвары и упраздняли весь уклад сложной, разветвленной жизни, которую веками строили до них.</p><p class="p1">— Вот вообразите, — говорил он, все еще как будто шутя, но за шуткой Ять чувствовал неподдельный страх. — Вообразите, придут, и что ж я буду?</p><p class="p1">— Ничего не будете, — машинально отвечал Ять, погруженный в собственные труды. Он давно привык не особенно церемониться с Трифоновым (тот пугался, если к нему были внимательны: значит, все действительно совсем страшно и он обречен. Равнодушие Ятя его успокаивало: прийти-то придут, но, значит, еще не завтра).</p><p class="p1">— Именно, именно что ничего! Что я умею, кроме этого никому не нужного дела?! — Трифонов с ненавистью пнул стопку словарей на полу. — Придут и заставят тяжести таскать. А как я могу? Я, тысяча извинений, газы пускаю.</p><p class="p1">Ять хотел было ответить, что в таком случае он незаменим был бы на фронте, но убоялся ранить трифоновскую пухлую душу.</p></span>
