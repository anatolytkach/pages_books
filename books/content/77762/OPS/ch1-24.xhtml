<span><p class="p1">Ни одна лодка, по условиям нового вольного времени, не имела права покинуть гурзуфский берег: праздновать велено было всем, до упора. Только ради мистериального пения, которое пообещал продемонстрировать Маринелли, сделано было исключение. Бурлак уже сидел на веслах. К восходу луны на гурзуфской набережной стояло почти все население города: рыбаки, дуканщики, дачники, уцелевшие от расправы татары и босяки из бывшей свиты Свинецкого.</p><p class="p1">Ровно в одиннадцать вечера туман вдруг исчез, и небо очистилось. Луна вышла из-за Генуэзской скалы, и над морем разлилось ровное серебристо-голубое сияние. Маринелли в античной тоге (под которой, однако, угадывалось несколько слоев толстой шерстяной одежды), под громовые аплодисменты взошел на борт. Бурлак взялся за весла.</p><p class="p1">Ять стоял у самого парапета набережной, мучительно чувствуя, что Таня рядом — но теперь уже навеки и окончательно отдельно; он боялся оглядываться по сторонам. Все было отвратительно, хуже некуда, и вместе с тем в этом-то «хуже некуда» и был самый сладкий сок — последний и полный разрыв (он знал, что самого последнего и полного не будет никогда), еще одна перевернутая страница бессмысленной и непонятной жизни… Туманное, зыбко-серебристое море как нельзя лучше соответствовало его прохладной тоске. В руке Маринелли трепетал огромный смоляной факел — он зажег его, едва лодка отошла от берега. Вдруг над лодкой взвилась и с треском рассыпалась огромная красная ракета, следом — зеленая и голубая: Маринелли понимал-таки в пиротехнике. Больше трех ракет он выпускать не стал — остальные могли пригодиться в открытом море, при встрече с европейским кораблем. Толпа на набережной восторженно взвыла, но Маринелли легко покрыл этот вой могучей песнью: для прощания он выбрал «Лоэнгрина».</p><div class="poem">
<div class="stanza">
<p class="v">— Mein li-i-eber Schwan!</p>
<p class="v">Ach, diese letzte, traur'ge Fahrt,</p>
<p class="v">Wie gern hätt' ich sie dir erspart!</p>
</div>
</div><p class="p1">Рыбак Бурлак, выступавший в функции любимого Лебедя, приналег на весла, словно говоря: да ладно, хозяин…</p><div class="poem">
<div class="stanza">
<p class="v">— In einem Jahr, wenn deine Zeit</p>
<p class="v">Im Dienst zu Ende sollte gehn…</p>
</div>
</div><p class="p1">«Хорошо он предваряет приход немцев», — подумал Ять.</p><div class="poem">
<div class="stanza">
<p class="v">— Dann durch des Grales Macht befreit,</p>
<p class="v">Woll't ich dich anders wieder sein…</p>
</div>
</div><p class="p1">«Как же, вернешься ты…»</p><p class="p1">Маринелли был великолепен. Его драматический тенор дивно сочетался с серебристо-голубой гладью, смиренно внимавшей ему. Несколько не хватало оркестра, но, пожалуй, это было бы уже чересчур. Лучшим аккомпанементом к божественной арии служили тихий плеск весел да потрескивание смоляного факела. Никто не шевелился. Матросы, солдаты, татары и гурзуфские обыватели смотрели как зачарованные на лодку, тихо скрывавшуюся за мысом.</p><p class="p1">— Андел, — сказала какая-то баба. — Чистый андел поплыл.</p><p class="p1">Ять еще некоторое время смотрел на удаляющийся факел, потом повернулся и, раздвигая загипнотизированную толпу, вышел в Пушкинский парк. Тут было пусто, кедровые иглы мягко пружинили под ногами. После дождя сильно, терпко пахло хвоей. Миновав пьяную заставу, он выбрался на верхнюю дорогу и вышел из пределов Гурзуфа.</p><p class="p1">Двадцать пять лет тому назад они с матерью уезжали из Мисхора. Он бросил тогда в сияющую синюю воду теплый желтый медяк, и странно было думать: вот, сейчас я держу его в кулаке, пока еще держу, а в следующий миг он полетит в воду, и никто не возьмет его уже никогда… но вот он решился, и медяк с веселым всплеском, не жалея о своей участи, стал медленно опускаться и отсвечивать зеленым. Где-то и теперь лежит на дне близ Мисхора этот медяк. Всякий раз, уезжая из Крыма, он бросал монету — и всякий раз возвращался. Но теперь у него не было монеты — и меньше всего на свете он хотел сюда вернуться. Впрочем, когда-нибудь, стариком… когда все здесь будет другим, кроме воды и неба, и развалится зуевский дом со скрипучей лестницей, и немцы понастроят лечебниц, санаториев, купален… Или все вовсе обезлюдеет, зарастет, запустеет — да, так бы лучше всего. Вот тогда бы вернуться сюда — просто вспомнить, что жил.</p><p class="subtitle">33</p><p class="p1">Поезд, переваливаясь, тащился по степям вторые сутки — его штурмовали на долгих, двух — и трехчасовых остановках, и все набивались и набивались новые люди, хотя, казалось, дальше-то некуда Это был последний поезд, уходивший из Крыма перед немецким вторжением: никто до конца не верил, что придут немцы, но слух, все более упорный, наконец подтвердили симферопольские газеты — и с этого дня бегство из Крыма приняло панический характер.</p><p class="p1">От роскошного вагона, в котором Ять прибыл в Крым, нынешний отличался примерно так же, как сам Ять, полный надежд, смущенный внезапным подарком судьбы, — от теперешнего, еле живого, опустошенного. На попутной мажаре — догнал в Алуште — добрался он до Симферополя. На вокзале штурмовали поезд, идущий в Петроград. Это была судьба — последний, может быть, шанс; и он не упустил его.</p><p class="p1">В Симферополе в нем проснулась настоящая, глухая злоба, он почувствовал в себе способность если не убить, то сильно поуродовать человека. Почему, в конце концов, он должен терпеть? Почему всякий строй начинает с того, что лишает его крыши или запрещает передвижения, отнимает его ремесло — единственное ремесло, от которого что-то останется будущему? В конце концов, если Бог дал ему жизнь — он что-то имел в виду, и не всяким кретинам отбирать ее. Хватит, попраздновали! Полгода он честно мирится с тем, что никому не нужен и только уступает дорогу ликующему хамью: прав был Свинецкий — всем нам, проклятой интеллигенции, еще только предстоит стать людьми. Нет, баста. «Баста», — повторял он сам себе. Преимущество Ятя было в том, что он ехал без вещей, голый человек на голой земле, — только узелок с книгой Клингенмайера — и вдобавок был в отчаянии, а это не всегда плохо. Сил его хватило не только на то, чтобы по головам татар, дачников и горожан пробиться в вагон, но и на то, чтобы помочь молодой матери с ребенком — хохлушке, совсем простой бабе. Принимая из ее рук младенца, Ять в проеме вагонной двери в последний раз увидел симферопольский вокзал: чуть поодаль, в стороне от толпы, приступом берущей вагон, он заметил невысокого бровастого старика. Старик был бритый, сухонький, в теплом картузе. Он стоял, заложив пальцы за пояс, и серыми злыми глазками внимательно смотрел на столпотворение. Ять не успел вспомнить, где видел старика, да и не было времени приглядываться — надо было локтями прокладывать путь из тамбура. Ему достался вагон второго класса. Он втянулся на верхнюю полку и оттуда смотрел на кишащие в проходе тела. Все тащили какие-то мешки. Воля ваша, этого он совсем не понимал. Мешки-то куда? Что делать с мешками? Эти люди, даже зная, что едут на смерть, захватили бы с собой никому не нужный, вшивый скарб. Книгу, однако, он берег.</p><p class="p1">Поезд тронулся, но с него еще опадали последние уцепившиеся, — ясно было, что уже не втиснуться ни в один тамбур, а они все лезли. Странное дело — Ятю было решительно плевать на всех. Он никого больше не жалел и ни о чьей судьбе не заботился: то ли потому, что от его жалости и заботы ничего не зависело, то ли по причине спасительного отупения. Вагон стонал, голосил, плакал, кто-то надрывно, тягуче звал неведомого Олёшу, зловоние стояло невыносимое, и Ять время от времени утыкался лицом в ладони — чтобы почувствовать какой-никакой, а свой запах. Больше ничего своего в этом поезде не было. До полуночи вагон гомонил, потом стал храпеть… Внизу, под Ятем, украинец переговаривался с украинкой — многословно, пустословно, тонким, нитяным голосом, и эта нитка все лезла Ятю в ухо, все щекотала его: заснуть было решительно невозможно. Украинец рассказывал бабе всю свою жизнь. Жизнь была такая, что лучше бы не родиться. Посреди повествования оба делали друг другу куртуазные сельские комплименты:</p><p class="p1">— Ой, — говорила она, — я же ж вижу, что вы такой человек, что вас же ж всякий может, простите меня, обмануть или провести, потому что честного же ж человека видно…</p><p class="p1">Этот честный человек, штурмуя вагон, только что не грыз стоявших впереди, и рожа у него была при этом самая зверская, — Ять его запомнил. Впрочем, он и сам был хорош.</p><p class="p1">— А вот скажите, — в свою очередь обращался хохол к собеседнице, — ведь я же ж вижу по глазам, что вы часто верили людям и много раз в них обманывались…</p><p class="p1">Этот письмовник в лицах продолжался до утра, когда две ангельские души, обретя гармонию, утомились наконец взаимными излияниями. Ять нарочно не сказал им ни слова, не желая прерывать столь идиллическую беседу, а главное, вновь не чувствуя за собой права никому ничего навязывать. Впрочем, был у него и некий экспериментальный интерес — проверить, проснется ли у них совесть; он ворочался наверху, свешивал голову — но никто не обращал на него внимания. Да и кто бы разглядел его кудлатую башку в темном вагоне.</p><p class="p1">«Вот в этом-то вся и разница, — рассуждал он в полубреду, когда эти двое в конце концов смолкли. — Я могу думать о чужом неудобстве, а они — нет; и никаким происхождением, никаким воспитанием, ни даже возрастом этого не объяснишь. Просто одни могут все, а другие — не все, и больше между людьми нет никаких различий; теоретические дискуссии надо запретить, а вот поездить всем вместе такими поездами — это могло бы быть полезно, честное слово… Сразу стало бы ясно, кто мне единомышленник, а кто враг…»</p><p class="p1">Помочиться он пробрался в тамбур между вагонами и еле влез обратно; днем вагон нагрелся, невыносимо хотелось пить, хохлушка внизу достала огромную бутыль чего-то красного — «компот», называла она эту жидкость, — и предлагала соседу. Ять не решался попросить — сейчас и так не хватает всего; хохлы пили и кушали с большим аппетитом. Наконец какой-то солдат протянул Ятю медный чайник — в Джанкое набрали воды. Ять сделал несколько глотков, чувствуя, как внезапные, необъяснимые слезы сжимают ему горло. Впрочем, этот же солдат с легкостью отпихнул бы его от дверей, атакуя поезд, или проорал бы до утра пьяную песню, все одну и ту же, — нимало не смущаясь тем, что мешает кому-то спать. Вторая ночь путешествия — они давно уже должны были выехать из Крыма, а все тянулась за окном сухая желтая степь, — была тошней первой. Снова духота, вонь, храп, внезапные остановки, паровозные искры и копоть, идиотские слухи — то о немецком, то о жидовском происхождении Ленина, то о том, будто в Питере всех баб пустили по рукам, а браки больше не регистрируются и каждый может каждую, то, наконец, о том, что столица обратно перенесена в Москву (это был предел апокалиптсических ожиданий — главное, кому это было надо?!). Много спорили о немцах, еще больше — о своих бандитах, которые уже вовсю берут власть в городах; упоминались и обнаглевшие татары. Татары испуганно молчали — в этом поезде они были в меньшинстве.</p><p class="p1">Вдруг поезд резко дернулся и встал. Ять едва не свалился с полки. Заголосили и тут же испуганно замолчали женщины. В наступившей тишине послышался стук копыт вдоль насыпи. В соседнем вагоне зазвенело разбитое стекло.</p><p class="p1">— Грабят, — в ужасе прошептала хохлушка внизу. — Мамынько, грабят… Треснула пара выстрелов.</p><p class="p1">— Выходи-и! — протяжно крикнул мужской голос из тамбура. — Выходи, т-твою… Стоп машина.</p><p class="p1">Ежась от ночного холода, Ять спрыгнул с подножки вагона. Его тут же ощупали две пары чрезвычайно проворных рук.</p><p class="p1">— Вещи е? — спросил веселый конопатый хлопец.</p><p class="p1">— Портянки, — Ять показал узелок.</p><p class="p1">— Э, тут не одни портянки… Бритва, га? — Конопатый взял бритву и сунул в себе в карман. — Еще шо есть? Сам говори лучше.</p><p class="p1">— Книга.</p><p class="p1">— Добре. Тикай, дядя, — сказал хлопец и принялся досматривать следующего. Все сколько-нибудь ценное изымалось немедля: иная баба принималась было голосить, но на нее тотчас цыкали. Удивительно, какой тихий и организованный получался грабеж.</p><p class="p1">— А вы чьи будете? — спросил Ять у конопатого, все еще не отходя от поезда.</p><p class="p1">— Да батьки Щаравого, — ответил тот. — Кого увидишь — всем расскажи: батька Щаравый — одна теперь сила на Украине. Прочие все — так, один запах…</p><p class="p1">— А где батька? — поинтересовался Ять.</p><p class="p1">— Ты шо, побалакать с ним надумал? — мрачно спросил второй хлопец, не переставая рыться в корзине хохлушки. Хохлушка стояла зажмурившись, чтобы не видеть, как утекает ее добро. — Лучше тебе с ним не встречаться, я так скажу. Конопатый жизнерадостно захохотал.</p><p class="p1">— А поезд-то пойдет еще?</p><p class="p1">— Тикай в степь, дядя, — отозвался конопатый, — тикай и забудь про поезд. Машиниста чпокнули, стопиться не хотел… А у нас, сам знаешь, нема тут машинистов…</p><p class="p1">— Есть тут город поблизости? — спросил Ять.</p><p class="p1">— Та полно. Туда — Симферополь, — конопатый махнул рукой назад, — туда — Питер. Тебе шо больше нравится?</p><p class="p1">Погрузив мешки на огромную подводу, банда лениво ускакала. Люди сидели у вагонов, не зная, куда податься. Некоторые тихо плакали, другие уходили в степь.</p><p class="p1">— Где мы? — спросил Ять у куртуазного хохла.</p><p class="p1">— Та, може, й Харькив близко, — неуверенно ответил он. — А може, ще не близко…</p><p class="p1">Так встретили они рассвет. Ять посмотрел в бледнеющее небо, потом хлопнул себя по коленям и встал.</p><p class="p1">— Надо идти, — сказал он.</p><p class="p1">— Идите, идите, — еле слышно проговорила хохлушка. Она все не могла уняться — плакала об украденном.</p><p class="p1">— А вы как же?</p><p class="p1">— Шо мы? Зараз усе. — она не договорила. Видимо, путешествие потеряло для нее всякий смысл.</p><p class="p1">Ять зашагал вдоль поезда, благословляя свои сапоги — еще вполне прочные сапоги. Были бы поновей с виду — веселая банда батьки Щаравого непременно бы стащила. Вот и все, что у него осталось, — сапоги да книга. Мы-то думаем — вот он, предел, а предела нет. Почему-то ему казалось, что надо идти. Сидеть просто так, на путях, и ждать неизвестно чего — было уж совсем невыносимо. Из двери паровоза свешивалась окровавленная голова машиниста.</p><p class="empty-line"/><p class="p1">Ять шел вдоль рельсов весь день, пока не стемнело. Несколько раз ему попадались разбитые полустанки. Один раз встретился колодец — можно было напиться, вода оказалась чистой. Есть было нечего, во всем теле чувствовалась небывалая легкость. Ему мерещилось, что он идет очень быстро. Между тем он едва делал версту в час, голова кружилась.</p><p class="p1">Ночью на горизонте появилось красное зарево — видимо, там горела деревня. На зарево Ять не пошел — боялся отклоняться от рельсов. Степь была кругом, голая скифская степь. Он шел весь день и всю ночь. Поначалу разговаривал сам с собой, принимался читать стихи, доканчивал старые споры… После говорить не стало сил, и он шел молча, сомнамбулически, ничего не понимая и ни о чем не думая, — и не поручился бы, что не идет на месте. Несколько раз мелькали обрывки мыслей — о Тане, о том, что она сейчас точно так же плывет по бесконечной ровной воде; совпадения были ужасны. Надо наконец распараллелиться. Ближе к ночи он понял, что идти больше не может. У железной дороги росли три дерева, до нижних веток Ять смог дотянуться, надергал сухой травы и запалил маленький костер. Ветра не было, трава занялась легко. Можно было обогреться. Он уже задремывал, глядя в огонь, когда вдали замаячило размытое бледное пятно. Пятно приближалось, и Ять вскочил, охваченный безумной надеждой: к нему шел человек.</p><p class="p1">Это был сутулый, длиннорукий — кисти болтались на уровне колен, — неопределенного возраста мужик с треугольным желтым лицом. Глаза на этом лице смотрели беспокойно, рот был полуоткрыт, как у слабоумного, — и точно так же, как у этих несчастных выродков, клочьями росла у него черная борода: так, пух на остром подбородке и на огромном, выступающем кадыке.</p><p class="p1">— Ты кто?! — закричал Ять. — Откуда ты? Где я?!</p><p class="p1">— Этово тово, земляк, — промычал мужик. — Как оно тово…</p><p class="p1">— Да говори ты! Где мы?</p><p class="p1">— Тово, земляк, тово, — мотал головой мужик.</p><p class="p1">Ять понял. Это был идиот из сгоревшей деревни — или из любой другой деревни, — бродящий в поисках пропитания. Когда самим голодно, кто будет кормить идиота? Черные всклокоченные волосы дыбом стояли у него на голове, словно он чего-то раз навсегда испугался и так с тех пор не пришел в себя.</p><p class="p1">— К огоньку бы, земляк, — сказал странный гость. — К огоньку бы…</p><p class="p1">Верно, «земляк» было единственным известным ему обращением.</p><p class="p1">— Ну, садись, — разрешил Ять.</p><p class="p1">Все попытки разговорить мужика остались тщетны — он молчал, из открытого рта у него текли слюни. Ять и сам не сказал бы, как ему страшней — с таким попутчиком или одному в степи, однако задремал, а когда проснулся — было уже светло, мужик исчез. В этот день ему повезло — он попал на поле, засаженное подсолнухами; поле было большое — птицы расклевали не всё. Подсолнухи перестояли зиму, некоторые легли, — Ять срывал головки, с измочаленных бледно-желтых стеблей, да готов был грызть и стебли. Удивительно, сколько было сил в его истощенном, с декабря голодавшем теле. Отъелся в Крыму — да разве так отъедаются? Он зубами раздирал головки подсолнухов, с кожурой глотал безвкусные семена. Потом он, кажется, потерял сознание, потому что очнулся уже ночью; снова кое-как нарвал травы, стащил несколько подсолнуховых стеблей в кучу, попытался поджечь — горело еле-еле; так, тлело. Он опять не заметил, как из темноты снова появилось мутное пятно. Оно приближалось, обретало контуры, и скоро к едва тлеющему огню подошел вчерашний попутчик.</p><p class="p1">— Этово тово, земляк, — протянул он. Ять вскочил, от резкого движения закружилась голова.</p><p class="p1">— Кто ты?! — заорал он.</p><p class="p1">Мужик не отвечал. Уже не спрашивая разрешения, он присел к костру — и Ять уловил еле слышный запах тления, исходивший от ночного гостя.</p><p class="p1">— Да кто ты, наконец?! Какого черта таскаешься за мной?!</p><p class="p1">Попутчик мычал, молчал, грыз стебель подсолнуха. Ять повалился на землю. Очнулся он оттого, что идиот, пошатываясь, пытался вытащить у него из рук узелок с книгой и портянками. Ять поднялся и резко ударил его в желтое треугольное лицо. Сил на настоящий удар уже не было — попутчик покачнулся, но устоял.</p><p class="p1">— Тово, земляк, — умоляюще протянул он.</p><p class="p1">Ять, не помня себя, стал изо всех сил колотить в мотающийся перед ним треугольник. Мужик упал, не смог подняться и, оставляя цепочку кровавых капель, пополз прочь. Уже светало. Обессилевший Ять сел на землю и сидел так долго. Потом встал, подхватил отвоеванный узел и, шатаясь, побрел. Все спасение было в том, чтобы брести. Тут рельсы внезапно кончились — они просто обрывались посреди степи, и неясно было, куда идти дальше. Вышло бледное солнце. Ять прошел еще шагов триста, стараясь не терять направления, — и увидел впереди большую воду.</p><p class="p1">Он не знал, море это или озеро. Серая ровная вода простиралась до горизонта Степь переходила в нее незаметно. Уже виднелся глинистый берег и на нем полусгнившие серые мостки. Дальше пути не было.</p><p class="p1">Ять все понял и лег на спину. Это была смерть. Он сам не заметил, когда она пришла, но, видно, после смерти все так и есть. На земле не бывает таких больших пустых пространств. Небо над ним темнело и клубилось. Черно-серебряные тучи бродили и сталкивались в нем. Подул ветер. Вот, оказывается, что надо было делать. Пока он шел, ветра не было. Надо было с самого начала лечь, смириться — и тут же что-то началось, задвигалось. Зашелестела трава Скифская степь медленно оживала. О! — вот и птица. Прежде птиц не было. Ять испугался, что птица выклюет ему глаза, — но она не снижалась, так и кружила над ним. Потом ее снесло ветром. Он приподнял голову — издалека к нему шли люди.</p><p class="p1">Они шли, растянувшись по всему горизонту, широкой цепью, как идут солдаты: он видел это на фронте. Вот приблизились, вот отдалились. Они словно делали несколько шагов вперед — и тут же отступали назад. Встречают, подумал Ять, ритуал встречи. И счастливая догадка пронзила его: Барабулинские степи! Вот где я — в степях, которых не бывает; сюда ушли последние альмеки. Теперь они пришли за мной. Птица кружила, кружила над ним, потом спустилась и подала кружку молока.</p><p class="p1">— Пей, пей, — сказала она ласково. — Выпьешь, еще дадим.</p><p class="empty-line"/><p class="p1">Цыганский табор, подобравший его в степи, шел на север, к столице. Цыгане отпоили его молоком, и через три дня он мог уже внятно отвечать на вопросы.</p><p class="p1">— Куда шел? — ласково говорила молодая цыганка, давая ему напиться. — Степь одна, до города верст двести было. Зачем шел?</p><p class="p1">— Слушай, — сказал Ять. — Я странного мужика встретил. Он ко мне ночью выходил, на огонь. Смуглый такой, желтый. Этот не из ваших? Кругом засмеялись.</p><p class="p1">— Колю видел, — объяснила старая цыганка, сидевшая рядом.</p><p class="p1">— Какого Колю?</p><p class="p1">— Степной человек такой, Коля. Он не страшный, навроде комара-только кровь не пьет. А так комар и есть, руки-ноги длинные, сам тощий.</p><p class="p1">— Он что, живет тут? — не понял Ять.</p><p class="p1">— Он везде живет, — засмеялась цыганка — Он к тому приходит, кто в степи ночью гуляет. Вреда нет от Коли. Бродит, вроде как мы.</p><p class="p1">— Все с места сорвались, — удовлетворенно сказал старый цыган Миша — Все бегут, все едут… Скоро мы на одном месте жить станем, а все побегут. Гадать будут, коней у нас красть… И он усмехнулся.</p><p class="p1">— Как прозвище твое? — спросила старая цыганка.</p><p class="p1">— Ять, — ответил Ять.</p><p class="p1">— Ну, ладно, — кивнула она, не удивившись. — Всякие имена есть. Я Марья, она Соня..</p><p class="p1">«Хорошо, — успокоенно думал Ять. — Вот тебе и бродячий цирк… Буду водить медведя..»</p><p class="p1">Водить медведя, однако, ему не пришлось. Цыгане промышляли воровством и гаданием. От него ничего не требовали — он был пришлый. В благодарность за спасение он выучил было одного цыганенка грамоте, но Марья его отняла: сказала, что незачем. Незачем так незачем — навязываться он не стал. Никому здесь не было до него дела — это оседлым людям есть дело друг до друга, а странникам никогда. Через неделю, обходя города и передвигаясь в основном по ночам, они дошли до Луги. В Луге жил какой-то важный цыган, с которым предстояло совещаться. Как понял Ять, все цыгане вокруг Петрограда и в самом городе слушались его. Совещаться с ним пошел Миша.</p><p class="p1">— Сказал на Урал идти, сытно на Урале, — сказал он.</p><p class="p1">— Не пойду на Урал, — сказал молодой цыган Ян.</p><p class="p1">— Не ходи на Урал, — легко согласился Миша.</p><p class="p1">— В Польшу пойду, — решил Ян.</p><p class="p1">— В Польшу иди, — разрешил Миша.</p><p class="p1">И вправду альмеки, понял Ять. Разговор с главным цыганом был чистой условностью — кто куда хотел, тот туда и шел.</p><p class="p1">— Ну что, мил человек, — сказал Миша и ударил Ятя по плечу. — Тебе тут близко. Одним налево, другим направо, а тебе туда, — и показал рукой куда-то на север. Там был Петроград.</p><p class="p1">— Спасибо, — сказал Ять.</p><p class="p1">— Будь здоров, — равнодушно сказала Марья.</p><p class="p1">— Колю больше не видай, — засмеялась Соня.</p><p class="p1">И, не споря, не ища правых и виноватых, не прощаясь, они поделились: кто хотел, пошел направо, кто хотел — налево, а Ять — прямо.</p><p class="empty-line"/><p class="p1">Он вернулся в Петроград пятнадцатого апреля — полуседые космы, борода, узелок с книгой в руке.</p></span>
