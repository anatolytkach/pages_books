<span><p class="p1">— Ну, ничего случайного тут нет, — задумчиво проговорил Ловецкий, подвигаясь на нарах, хотя места было более чем достаточно. Краминов добрался до него и уселся рядом. — Думаю, за вами следили и арестовали на улице, просто чтобы не вызывать подозрений…</p><p class="p1">— Какое! Если бы следили, я бы заметил.</p><p class="p1">— Донесли, скорее всего, эти ваши двое…</p><p class="p1">— Да ничего подобного, никто не доносил! Это чистый случай…</p><p class="p1">— Ну, тогда у них выдающаяся интуиция, — покачал головой Ловецкий. — Это надо же так постараться, чтобы взять именно Гувера с Арбузьевым… Краминов закурил и угостил Ловецкого:</p><p class="p1">— И кончат они, как я и предполагал, — у одной стенки.</p><p class="p1">— Не каркайте, не каркайте.</p><p class="p1">— О да! Вы ведь этих считаете большими гуманистами!</p><p class="p1">— Не гуманистами, а прагматиками, — поправил Ловецкий. — И убивать нас по меньшей мере непрагматично…</p><p class="p1">— А сажать? Сажать — прагматично?</p><p class="p1">— Не знаю, — задумчиво сказал Ловецкий. — Но вот посадить и выпустить, по-моему, чрезвычайно прагматично…</p><p class="p1">— Вы, Илья, как все люди десятых годов, полагаете, что этика — вещь выгодная. А этика как раз в том и заключается, чтобы действовать поперек прагматизма…</p><p class="p1">— Друг мой! — воскликнул Ловецкий. — Я вас обожаю! Знаете почему? Потому что вам двадцать пять, я на двадцать лет старше, а мы с вами и тут спорим! Это же не зависит от возраста, от обстоятельств, от эпохи, наконец! Как я счастлив, что в вашем поколении есть такие люди. Ведь это чу… чу… чудо! — И он засмеялся. Оба в самом деле были вполне счастливы.</p><p class="empty-line"/><p class="p1">После спора утомленный Ловецкий задремал, Краминов докуривал последнюю папиросу, в узкое окошко полз рассвет, — и тут Оскольцев закашлялся: он отвык от дыма.</p><p class="p1">— Простите, господа, что я напоминаю о себе… Краминов вздрогнул.</p><p class="p1">— Ах да, — Ловецкий очнулся от забытья, — я ведь вас не представил. Виктор Александрович Оскольцев, товарищ министра иностранных дел, — Павел Краминов, публицист консервативного направления, ныне житель Крестовской коммуны, волею судеб разоблачающий большевизм изнутри…</p><p class="p1">— Да в Крестовской коммуне никому дела нет до большевизма, — буркнул Краминов. — Простите, ради Бога, что я вас не заметил.</p><p class="p1">— Это значит, что я близок к совершенству, — печально улыбнулся Оскольцев. — Когда я его достигну, меня станет совсем не видно.</p><p class="p1">— И вы сможете выйти незамеченным? — поинтересовался Ловецкий.</p><p class="p1">— Думаю, мне это уже не будет нужно. Я только одно хотел бы вам сказать… Я советовал бы вам успокоиться. Просто успокоиться и ждать, ничего не планируя и ни о чем не беспокоясь. Мне кажется, что это единственный совет, который я на правах старого постояльца этой камеры мог бы вам дать… и больше я в ваши споры вмешиваться не стану, хотя бы потому, что не совсем их понимаю.</p><p class="p1">— Чего тут не понять? — Ловецкий пересел к Оскольцеву. — Мы, Виктор Александрович, собственно, ни о чем и не спорим. Какая теперь разница — получал Ленин деньги от немцев или не получал?</p><p class="p1">— А он получал? — поинтересовался Оскольцев.</p><p class="p1">— Ну, наверное, получал… но если б и нет — все было бы точно так же. И даже без всякого Ленина. Вопрос в одном: одобрять ли выбор, который сделала история, или бунтовать против этого выбора?</p><p class="p1">— Да, это только вопрос темперамента, — кивнул Оскольцев. — Правоты быть не может…</p><p class="p1">— Разумеется, не может! — просиял Ловецкий.</p><p class="p1">— Важно было высказывать вслух то, о чем молчат, — согласился Краминов. — Интеллектуальные спекуляции, знаете… Но иногда я и сам очень увлекался.</p><p class="p1">— Так и я увлекался! И мне было очень интересно…</p><p class="empty-line"/><p class="p1">Через три часа товарищ Бродский вошел в семнадцатую камеру.</p><p class="p1">— Краминов, Ловецкий! — гортанно крикнул он.</p><p class="p1">Краминов, Ловецкий и Оскольцев были заняты игрой в угадывание мелодий: игра эта была широко распространена в дворянских и чиновничьих семьях начала века. Игроки боролись за право угадать классическое музыкальное произведение с первых нот: побеждал тот, кому требовалось меньшее количество нот. Оскольцев брался угадать с семи, Краминов — с пяти; Ловецкий просвистал два первых такта увертюры к «Лоэнгрину», и Краминов почти угадал.</p><p class="p1">— Что-то знакомое, — бормотал он, — ну наверняка же знакомое… Немец, да?</p><p class="p1">Бродский прервал их игру на самом интересном месте и огляделся в недоумении:</p><p class="p1">— Почему трое?!</p><p class="p1">— Один уже был, — спокойно ответил Ловецкий.</p><p class="p1">— Кто именно?! — крикнул бывший сапожник.</p><p class="p1">— Я, — спокойно сказал Оскольцев.</p><p class="p1">— Фамилия! — рявкнул Бродский.</p><p class="p1">— Оскольцев, товарищ министра.</p><p class="p1">— Почему вы все еще здесь?</p><p class="p1">— Не знаю, — пожал плечами товарищ министра.</p><p class="p1">«Это плохо, — подумал Бродский. — Он мог черт-те что им порассказать… Ну, в любом случае надо решать с ними; с этим разберемся».</p><p class="p1">— Краминов и Ловецкий, за мной, а вы пока сидите, — будничным голосом сказал он.</p><p class="p1">— Одну минуточку, — вежливо сказал Ловецкий. — Виктор Александрович, что от вас передать?</p><p class="p1">— Кому? — усмехнулся Оскольцев.</p><p class="p1">— К кому попадем, тому и передадим, — пообещал Краминов.</p><p class="p1">— Если действительно выйдете, — не очень уверенно сказал Оскольцев, — мой отец живет на Съезжинской, 25, во втором этаже, шестая квартира… Скажите ему, что я жив. Но не знаю, будет ли это правдой к тому времени…</p><p class="p1">Он не сомневался, что Ловецкий и Краминов отправляются к совсем другому отцу.</p><p class="p1">Бродский пропустил заключенных перед собою и вышел, и Оскольцев снова остался один. Впрочем, впечатлений ему хватило надолго. Он успел полюбить этих славных людей — молодого угрюмого и немолодого веселого. Ему нравилась их рискованная затея. И то, что они насочиняли про две коммуны, чтобы его развлечь, тоже было очень весело. Конечно, он разгадал их невинный трюк. Никаких коммун не было и быть не могло.</p><p class="empty-line"/><p class="p1">— Да-с, да-с, — приговаривал Чарнолуский, организовывая чаек и потирая ручки. — А что ж вы думали? На патруль кричать никому не дозволяется! И вы, товарищ Ловецкий, тоже хороши.</p><p class="p1">— А как вы узнали, что мы арестованы? — поинтересовался Ловецкий.</p><p class="p1">— А как бы я не узнал? Я все-таки народный комиссар, не забывайте об этом.</p><p class="p1">— А разве они, когда берут, с вами, согласовывают?</p><p class="p1">— Ну конечно… то есть задним числом! — поспешно поправился Чарнолуский. — И я немедленно распорядился: если ничего противозаконного нет — отпустить! За вами же и в самом деле нет ничего противозаконного, если я верно понял? Кроме, конечно, того, что сторонник советской власти живет на Елагином, а противник ее — на Крестовском… но и это, если хотите, не криминально.</p><p class="p1">— Криминально будет, если Корабельников узнает про мой псевдоним и про все эти дела, — вздохнул Краминов.</p><p class="p1">— Ну, это мы как-нибудь устроим, — пообещал нарком. — Я вот о чем хотел с вами побеседовать… Впрочем, для начала один вопрос: вы, господин Ловецкий, вероятно, мне писали?</p><p class="p1">— Нет, — удивился разоблаченный Арбузьев. — Никогда в жизни… Зачем же мне было вам писать?</p><p class="p1">— Да видите ли, некто из числа елагинцев регулярно извещает меня о творящихся там безобразиях… требует разгона, арестов…</p><p class="p1">— Неужели вы думаете, что я стал бы доносить? — простодушно спросил Ловецкий.</p><p class="p1">— Нет, конечно! — смутился нарком. — Но ведь это и не донос… Это так — информация. Но я не об этом хотел говорить. Вы, господа, сами видите, что конфронтация ваша стала довольно забавна. Елагинская коммуна — мой неудавшийся опыт, согласен, да и вы понимаете, что она свою задачу уже выполнила. Скоро университет возобновит работу, начнется реформа орфографии, профессуре дадут места, писатели пойдут в газету или там… в общем, найдется дело и писателям. Зиму перезимовали, пора и честь знать. Очаг сопротивления тоже получился никакой — одна спекуляция, не так ли? Ловецкий слушал молча, но не кивал; Краминов нахмурился.</p><p class="p1">— И вот о чем я подумал, дорогие друзья: не угодно ли вам посодействовать мне в примирении ваших враждующих станов и мирном их возвращении, так сказать, в исходное состояние? Разумеется, нас можно не любить, но теперь лучше это делать поодиночке. О пайках для престарелых коммунаров мы могли бы договориться отдельно…</p><p class="p1">— Об этом можно поговорить, — после долгого молчания произнес Краминов.</p><p class="p1">— Попробуйте, попробуйте. Я слышал, что и так уже значительная часть крестовцев и елагинцев ходит туда-сюда…</p><p class="p1">— Ну, не очень значительная часть, — поморщился Краминов.</p><p class="p1">— Но это начало. Я вас серьезно прошу… И тогда наша общая маленькая тайна насчет истинного имени господина Гувера не выйдет за пределы этой комнаты…</p><p class="p1">— Это непременное условие? — бывший Гувер вскинул голову и сверкнул очами.</p><p class="p1">— Да, это грубый, грубый шантаж, — сказал Чарнолуский и расхохотался. — Нет, а вы чего хотели: надо отвечать за свои действия — или это прерогатива только власть имущих? Скажите лучше, по-человечески, без чинов, — что вы делали в этой коммуне, если так не любите большевиков?</p><p class="p1">— Я делал там свободное новое искусство, — упрямо сказал Краминов.</p><p class="p1">— Ну, Бог с вами. Скажите, могу я на вас рассчитывать? Думать надо быстро, потому что, пока вы будете думать, другие тоже не станут терять времени. И тогда вместо примирения, которое придумаете вы, могут случиться совсем другие меры, которых не хотели бы ни вы, ни я.</p><p class="p1">Краминов присвистнул.</p><p class="p1">— С пяти, — неожиданно сказал Ловецкий. Краминов просвистал пять нот знаменитой темы Судьбы.</p><p class="p1">— Ну, это просто, — разочарованно протянул Ловецкий.</p><p class="p1">— О чем вы? — удивленно спросил нарком.</p><p class="p1">— Мы полагаем, что вы правы, Александр Владимирович, — кивнул Краминов. — Но есть ли у нас гарантии, что разгон не произойдет раньше?</p><p class="p1">— Никаких гарантий, — печально сказал Чарнолуский, — нет ни у вас, ни у меня.</p><p class="p1">— Ну что ж, — помолчав, сказал Ловецкий. — По крайней мере честно.</p><p class="subtitle">12</p><p class="p1">Разумеется, в районном совете никто не собирался заниматься Ятем; размещалась управа в доме оперного тенора Ладыженского, сбежавшего почти одновременно с Кшесинской. Теперь в его роскошном, капитально пограбленном особняке размещался таинственный районный совет Петроградской стороны, описанный впоследствии во множестве историко-революционных сочинений. С дрожащей руки авторов, писавших в тридцатые годы, укоренилось представление, будто в советских учреждениях ранней революционной поры без умолку стрекотали машинки, отдавались решительные распоряжения и вообще кипела административная жизнь; это не так. Совет Петроградской стороны беспрерывно заседал, обсуждая мировые вопросы и ничего не решая. На время заседаний в жилотделе оставлялся дежурный, молодой слесарь Пажитнов, который во время дискуссий о новом облике города всегда страшно храпел. Теперь он один-одинешенек сидел в огромной, ободранной гостиной Лодыженского и лениво тыкал пальцами в расстроенный белый рояль. Инструмент был объявлен собственностью государства, председатель районного совета лично запретил в него гадить — хотя попытки, что скрывать, были; Пажитнов обладал блестящими способностями и как раз к визиту Ятя подобрал наконец «Яблочко».</p><p class="p1">— Я в жилотдел, — сказал Ять, поднявшись на второй этаж.</p><p class="p1">— До-о, — вместо ответа произнес Пажитнов и ткнул в клавишу. Послышался басовый звук; Пажитнов выжал педаль и удовлетворенно улыбнулся. Рояль исправно служил не только эксплаутаторам, но и пролетариату.</p><p class="p1">— Я по поводу квартиры, — еще раз попытался отвлечь его Ять.</p><p class="p1">— Все насчет квартиры, — миролюбиво пояснил Пажитнов, словно снисходительно укоряя сограждан: ну что за люди, непременно хотят где-нибудь жить! Он двумя пальцами изобразил тремоло — долженствующее, очевидно, выражать робость посетителя.</p><p class="p1">— Председатель домкома направил меня к вам, — громко, как глухому, объяснил Ять.</p><p class="p1">— Я слы-шу! — оперным голосом пропел Пажитнов и с силой ударил по двум крайним клавишам. — Я слы-ы-ышу вас! Вас я слышу! Я вас, я вас, я вас — слы-ыышу! А? Не хуже мы, чай, тенора-то!</p><p class="p1">Все это было так нереально, что Ять распахнул пальтецо, гордо выпятил грудь и с оперным пафосом затянул:</p><p class="p1">— Мне жи-ить, мне жи-ить, мне жи-ить — не-егде! Снимал кварти-иру! Теперь товарищ Матухин! Мату-хин! Матухин! От-се-ли-ил… ммменя. — И демонически расхохотался: — Ха-ха-ха-ха-ха!</p><p class="p1">Пажитнов взял фантастический, истинно вагнеровский аккорд.</p><p class="p1">— Так и что? и что? и что? — задребезжал он тенорком.</p><p class="p1">— Спа-си-те! — проорал Ять; из залы заседаний, некогда служившей Ладыженскому спальней, вывалились один за другим члены районного совета и ошеломленно встали полукругом, слушая пролетарскую оперу «Посещение жилотдела».</p><p class="p1">— А я… что ж… могу… — на одной ноте ответил Пажитнов.</p><p class="p1">— О-о-ордер! О дайте, дайте о-ордер! Вселить меня хоть в ку… хоть в ку… хоть в кухоньку мою, — лирическим баритоном закончил Ять.</p><p class="p1">— Приходи-ите! В понеде-ельник! В понеде-е-е-ель-ник! — сорвался Пажитнов на фальцет и сбацал нечто невообразимое, ударяя тяжелыми лапищами по нескольким клавишам сразу. У него уже немного получался собачий вальс.</p><p class="p1">— Так ведь сегодня и есть понедельник! — вспомнил Ять.</p><p class="p1">— Ну! — не растерялся слесарь. — Я и говорю: вот в другой понедельник и приходи.</p><p class="p1">Пажитнов встал от рояля и уважительно, как дирижер первой скрипке, пожал Ятю руку. Ять раскланялся и вышел на солнечную, благоухающую улицу.</p><p class="empty-line"/><p class="p1">А в общем, все это соответствовало его представлениям о конце времен: всеобщая необязательность, леность и даже коллективное безумие, согласитесь, как-то оправдывают нас в наших собственных глазах. Учитель болен или сбежал, все резвятся, — как я в детстве мечтал, чтобы все гимназические наши учителя вдруг не пришли! И не то чтобы я не любил учиться — нет, мне всегда нравилась атмосфера необязательности, атмосфера, в сущности, апокалипсическая. Конец света, а я играю в мяч — помнится, именно на этом перекрестке я говорил об этом с Корнейчуком… Как я мыслю себе конец света? Да именно так: сидит пролетарий за роялем, и всем уже все равно. Ничто ничего не весит. Мечта релятивиста. И как я смею негодовать, если сам всю жизнь мечтал о чем-то подобном? Мир окончательно сошел с ума, избавился от пут рассудка и именно поэтому так пышно расцвел: глядите, какие листочки! А навстречу ковыляет монстр с бревном на плече — кто бы это был? Впрочем, какая теперь разница: если все сошли с ума, так и этот наверняка тоже…</p><p class="p1">Относительно встречного монстра с бревном он, однако, был прав: навстречу ему, тяжело переваливаясь, с трудом балансируя и задыхаясь, шел исхудавший, косолапый Трифонов в теплом зимнем пальто, истрепанном до последней возможности, и в засаленной пролетарской кепке.</p><p class="p1">— Истинные были слова ваши, — проговорил он, задыхаясь и ничуть не удивляясь встрече с Ятем. — Истинные, истинные слова… Благодарю и преклоняюсь. Прошу со мною.</p><p class="p1">И Ять, тоже ничему не удивляясь в этом рехнувшемся мире, последовал за ним в сторону Невы, туда, где одиноко жил Трифонов в последние годы. Он попытался было помочь с бревном — какое!</p><p class="p1">— Нельзя, нельзя, — одышливо возразил Трифонов. — Каждый сам несет, не пристраивайтесь… Хотите — найдите и несите, а мое не замайте. Я, ежели хотите знать, неделю его пилил… это был клен здоровенный! Ветки обрубили, растащили, а бревна никто не унес. Там еще осталось, если хотите.</p><p class="p1">Ять со значением кивнул, как будто что-то понял. Жилище, говорят, зеркало души; в иных царит живописный беспорядок, старательный, искусственный, для придания богемности скромной буржуазной обстановке. В иных соблюдается строжайший минимализм — лист бумаги на столе, остро заточенный карандаш, пять книг, нужных для работы… В третьих повсюду плюшевые глупости, вазончики, букетики, статуэтки — и поди пойми, безвкусный добряк перед тобою или мелкий хищник, маскирующий таким образом подлую и лживую душонку. Как бы то ни было, во внутреннем мире Трифонова громоздились булыжники, поленья и груды хлама; там почти не было места делам рук человеческих — все дикая природа, причем в самых грубых образцах. Книги были свалены по углам, а большую часть обеих комнат занимали серые валуны, грязные глыбы и сырые дрова. Все это он стаскивал к себе без всякой видимой цели — просто для упражнения мышц; случайная мысль, которую Ять, не желая безумцу зла, заронил в его больное сознание, укоренилась и принесла плоды.</p><p class="p1">— Вот-с, — гордо отдуваясь, доложил Трифонов. Бревно он прислонил у входа в дом — оно не влезло бы на лестницу. — Так с тех самых пор и ношу, и можно сказать, что уже готов, уже готов.</p><p class="p1">Ять узнал его манеру повторять слова; теперь он повторял почти все, словно и в речи положил за правило совершать как можно больше усилий — произносить фразу по два и три раза, упражняя даже язык.</p><p class="p1">— Надо тренироваться, надо тренироваться, — бормотал он, — ведь непременно придут, непременно… Они скажут: таскай, таскай, — а я уже и таскаю, таскаю…</p><p class="p1">Ять не помнил разговора, в котором навел Трифонова на губительную мысль готовиться к приходу грядущих гуннов и упражнять мышцы ввиду предстоящего перехода всей интеллигенции к грубому физическому труду. Тем не менее в этом безумии была своя логика: он давно чувствовал что-то подобное — коль скоро мир упростился, в нем не остается места квалифицированной работе, и Трифонов был по-своему глубоко прав, закаляясь и упражняясь для будущих трудов.</p><p class="p1">— Умереть хотел, но умереть нельзя, — бубнил Трифонов, — должна исполниться мера, исполниться мера… Тогда только. До этого — терпеть, терпеть, таскать, таскать… Одно только: ведь камнями не ограничится. Больше всего знаете чего боюсь? Боюсь, что ведь рано или поздно они возьмут. Ну, сейчас, положим, таскаю, — они увидят, что таскаю, и подумают: вот хитрый, должны были мы тебя заставить, а ты сам себя заставил. Самоуправство, самоуправство! — и он хитро погрозил пальцем. — Тогда возьмут. Положим, готов: ем мало, мыться забыл, вот ношу пальто, чтобы тоже худеть… От пота очень худеешь, сильно худеешь. И вот я думаю: возьмут, но у меня кольцо! — Он поднял руку, и Ять увидел на толстом безымянном пальце золотое кольцо. — Еще обручальное, теперь не снимешь. Вросло, вросло… Кто-то из уголовных непременно потребует снять, а я снять не смогу. Что делать? Отрубят палец. Но, положим, один найдется, всегда один найдется, который защитит, скажет: не руби палец, я сниму. Он будет думать, что если он меня чем выручит, так и я его потом чем выручу. Вдруг у меня не только кольцо, а еще есть золотые зубы. Но тогда я рано или поздно перед ним обнаружусь во всей своей ничтожности, и его-то разочарование будет всего ужасней… всего ужасней… да… Я думаю, всегда есть один такой, который помогает; он помогает не от любви, конечно, не от хорошей души, а от надежды на какую-то с нашей стороны отдачу, подачку; и вот он будет мне помогать, даже служить, ведь барин, барин, — а потом поймет, что я ничего, ничего не могу; и вот его-то презрение мне будет хуже всех. Лучше, чтобы сразу все возненавидели, всегда лучше, когда сразу; и палец пусть тоже отрубят сразу… Ять в ужасе попятился к двери.</p><p class="p1">— Погодите, — просительно пробормотал Трифонов, — скажите, а можно ли умереть прежде, чем возьмут? Отпустил бы меня кто, и я бы умер. Но сам себя я не могу отпустить, я должен ходить и таскать, ходить и таскать, пока мне не исполнится мера…</p><p class="p1">Ять выскользнул из логова и побежал вниз по грязной лестнице.</p><p class="p1">— Ходить и таскать! — вслед ему кричал Трифонов. — Ходить и таскать!</p><p class="subtitle">13</p><p class="p1">И он ходил.</p><p class="p1">Двадцать шестого апреля он вернулся на Крестовский, там царила паника — шумно обсуждали краминовский арест. Двадцать седьмого Краминова выпустили, а Ять опять повздорил с Корабельниковым и ушел на Елагин. На Елагином вовсю готовились к первомайской демонстрации — «чтобы хамы не думали, будто у них праздник»; идея принадлежала Хмелеву, и Извольский со скрипом согласился.</p><p class="p1">— Мы выйдем на улицу, — жестко сказал Хмелев. — И мы покажем хамам, что думаем о них.</p><p class="p1">Он по-прежнему мечтал о разгоне коммуны, но видел, что никакая политическая борьба в голодном городе немыслима, что до них попросту никому нет дела; демонстрация была его последним шансом напомнить о себе и привлечь сочувствующих. Новая власть делалась все омерзительнее. Не встречая никакого сопротивления, Ульянов-Ленин, фигура пустая и совершенно дутая, заполнял все российское пространство. Он даже начал Хмелеву сниться: самое ужасное, что и во сне он был непонятен.</p><p class="p1">На Елагином рисовали транспаранты, но делали это неумело — более-менее прилично рисовал один Стежкин. Вернувшийся Ловецкий, который на все вопросы о причинах ареста бормотал что-то об ошибке и бюрократической неразберихе, пытался Хмелева отговорить, но это ни к чему не вело. Алексеев с Горбуновым старательно рисовали на круглом куске фанеры, который по их требованию приволок Шраер, подобие двуглавого орла, — но орел вышел такой кривой, что его решили не брать. Казарин, почувствовав себя лучше, выполз из комнаты и бродил между банок с краской и кумачовых полотнищ, разложенных на полу залы первого этажа; Хмелев, разумеется, взбесился, узнав, что достать удалось только кумач (другие ткани словно испарились), но потом смирился: не все ли равно, на чем писать?</p><p class="p1">— А-а, господин Ять, — язвительно протянул Казарин. — Позлорадствовать зашли?</p><p class="p1">— Отчего же, — сухо сказал Ять.</p><p class="p1">— Да оттого, что вы, я знаю, нашего образа действий в последнее время не одобряете…</p><p class="p1">Как во всякой осажденной крепости, в Елагинской коммуне циркулировали слухи, многократно преувеличенные. Разумеется, Казарин уже знал о разговоре старших елагинцев с возвращенцами; Горбунов доложил ему все в подробностях и с особенным значением повторял слова Ятя о мертвом деле елагинцев и о предполагаемом светлом будущем большевистской России.</p><p class="p1">— Вы бы еще статейку где-нибудь тиснули. Нас теперь покритиковать — самое время… заодно и в лояльности распишетесь…</p><p class="p1">— Знаете, господин Казарин, — Ять смотрел на него, сунув руки в карманы, покачиваясь с пятки на носок (остро чувствуя трещину на подметке) и склонив голову набок. — Марксистов в свое время тоже нельзя было критиковать — ведь по тюрьмам сидят… Вот они и выросли такие большие…</p><p class="p1">— Ну, нам-то это не грозит. А в общем, и правильно: заключенного критиковать — последнее дело. Выйдет — так и ругайте сколько влезет, а к арестантам и бабы русские добры: то кренделька вынесут, то калачика…</p><p class="p1">— Вам уж нанесли… калачиков-то, — Ять показал глазами на толпу торговцев у входа: роспись транспарантов их несколько потеснила, но закрывать лавочку Извольский не собирался.</p><p class="p1">— А что ж, лучше кушать из рук мерзавцев, как ваши друзья крестовцы?</p><p class="p1">— А что ж, и друзья. Хоть язв своих не расчесывают. А у вас печки вывезли — вы и орете: убивают! Душат! И вот вы стоите среди России, нищей, кровавой, доведенной до точки любезным вам государем… и орете: у нас вывезли печки! У нас вывезли печки! Караул! Убили! Сатрапство! Печки! Печки наши! — проорал он наконец и с тоски побежал к крестовцам, но там застал такую же картину: на полу был разложен кумач, Корабельников, жуя папиросу, расхаживал между банками с краской и диктовал двустишия, а поп, воротившийся из странствий, собирался возглавить крестный ход по случаю дня солидарности трудящихся; Корабельников сказал, что это будет без него, и поп обиженно дулся в углу. Барцев помогал Мельникову и Митурину сколачивать супрематическую композицию. Ашхарумова смотрела на Ятя сострадательно.</p><p class="p1">Вскоре приехал Хламида, успевший пересмотреть свое отношение к новой власти до такой степени, что елагинские интеллигенты вызывали у него почти ненависть. В самом деле, они посмели не оценить его усилий по спасению коммуны и заподозрили в соглашательстве — этакое сектантство! Он привез Корабельникову несколько банок золотой и серебряной краски, добытых, как он утверждал, у знакомых рабочих, которым для их скромных плакатов все равно столько не нужно. Хламида бродил по первому этажу, склонялся над транспарантами, читал, искусственно хохотал до фальшивых слез, приговаривая «Черти лиловые! Черти драповые!» — и лиловые драповые черти, выкроенные из старого пальто, казалось Ятю, так и скачут по его сутулым плечам.</p><p class="p1">— А это что? — спросил Хламида.</p><p class="p1">— Это буржуй, — лаконично произнес Корабельников.</p><p class="p1">— А делает что?</p><p class="p1">— Прикуривает от земного шара.</p><p class="p1">— Ай, как хорошо! — залился Хламида. — А земной шар-то почему же с ножками?</p><p class="p1">— Убегает от буржуя, — сдержанно сказал Корабельников.</p><p class="p1">Тут на Ятя напал один из тех припадков неостановимого смеха, которые вечно мешали ему сохранять пристойный вид в обществе, где обсуждались мировые вопросы. Не в силах сдерживаться, он выбежал из прилукинской дачи.</p><p class="p1">Поодаль, как бы наглядно демонстрируя, во что превратится праздный, расслабленный дачник через каких-то сорок лет, — кверху задом ковырялся в земле русский барин Соломин: он одним из первых смекнул, что в голодные времена огородничество выручит горожан. Питер зарастал огородами, во дворах рыхлили землю, по окраинам высаживали картошку, пресловутую Диоклетианову капусту — но умели это немногие; из всей бывшей Елагинской коммуны и уж тем более из всех футуристов копать, рыхлить и полоть мог один Соломин — и как всякий человек, умеющий заниматься несвойственным ему делом, он окинул Ятя взором столь презрительным, что у того снова заклокотал в горле смех. Вероятно, это была уже истерика, — и то сказать, как не быть истерике у человека, которому до такой степени некуда деваться?! Лучше уж смех, чем слезы. Но так монументален, так символичен был Соломин с задранным задом, так смешно и вместе самодовольно было его огородничество и неизменное гордое презрение к праздности, что сдержаться не было никаких сил; хохоча, Ять пошел к мосту, ведущему прочь от ненавистных крайностей, на глухую и одинокую Выборгскую сторону.</p><p class="p1">Куда идти теперь, ему было решительно все равно.</p><p class="subtitle">14</p><p class="p1">— Демонстрация, — мечтательно произнесла Ашхарумова. — В Эгейском море есть темная, туманная область, где торчит из моря скалистый остров Траций. На нем обитают чудовищные существа, порождения людского безумия. Ими всеми управляет Демон, который иногда прилетает к людям и устраивает кровавые оргии. «О, демон с Трация!» — в ужасе кричат обыватели, разбегаясь по своим норам…</p><p class="p1">Барцев шепотом засмеялся.</p><p class="p1">Они лежали в комнате Зайки, тесно обнявшись. Засиделись у нее, заночевали, — возвращаться на Крестовский не хотелось: и потому, что лютовали патрули, отчего-то особенно яростные в ночь с субботы на воскресенье (хватали всех без разбору, и поди объясни им, что такое Крестовская коммуна), и потому, что тесная койка в барцевской комнате им надоела, как надоели и беспрерывные вечерние визиты коммунаров. Иногда хотелось удрать от всех — и Барцев с Ашхарумовой все чаще сбегали куда попало, не признаваясь даже друг другу в желании хоть неделю пожить отдельно. Это пахло мещанством, — однако что же поделать. Вдруг Барцев перевернулся на спину и зашелся в припадке совсем уж неудержимого хохота.</p><p class="p1">— Паша! Пашка же! Да что с тобой такое?!</p><p class="p1">— А еще, — захлебываясь, пробормотал он, — там живет существо столь страшное, столь жуткое, что полного его имени назвать нельзя… Ее называют по первой букве — госпожа Ка…</p><p class="p1">Да, это было весело. Отсмеявшись, Ашхарумова уткнулась ему в плечо. Паша был ужасно, ужасно забавен и мил. И ведь она знала это с самого начала — не зря они сразу приметили друг друга во время того первого чтения у Зайки. И Заика была ужасно мила — так радовалась их любви, без тени зависти. Паша все понимал, и ничего не боялся, и ничем, кроме нее, особенно не дорожил, и в стихах его все предметы точно так же ничего не весили; он жонглировал лужами, домами, трамваями, свободно громоздя их друг на друга. То, что Славе казалось гибелью, было, оказывается, жизнью. Она уже все себе придумала и этой версии держалась.</p><p class="p1">Позавчера она зашла к Казарину — узнать, как и что; лучше было, конечно, не заходить. До поры до времени он соблюдал нейтралитет и вел себя прилично, но потом не выдержал — уж очень она была хороша и знала это; он с самого начала не сомневался, что она ходит сюда красоваться. Какое сочувствие? — если женщина полюбила другого, для нее сочувствия нет. Если бы она сострадала, она бы не ушла. Нет, она пришла к его одру с явной целью нанести последний удар — показать, что она счастлива; не сдержавшись, он наговорил гнусностей сначала о крестовцах (продажность, глумление, заказы из Смольного), а потом понес чушь насчет молодого любовника, который, конечно, сильнее его, старика (самое ужасное, что все это время он отвратительно усмехался, демонстрируя хладнокровие). Надо было вовсе ничего в ней не понять, чтобы заговорить о молодом сильном любовнике: она умела подстраиваться под любого и прекрасно себя чувствовать с каждым, кто ей понравился. Сила… слабость… что знают мужчины вообще о силе или слабости?</p><p class="p1">— Слушай, — заговорил Барцев после некоторого молчания, как всегда угадав ее мысли. — Ты, конечно, везде будешь на месте… но объясни мне такую вещь. Как ты умудрялась жить там, со стариками? Они не угнетали тебя?</p><p class="p1">— Что ты, они меня любили. Я была там такая… Белоснежка, если хочешь. Белоснежка и двадцать старых гномов. Они называли меня «наша барышня». Ты не забывай, они очень хорошие старики. У них есть, конечно, свои закидонцы, — она поразительно легко перенимала жаргон крестовцев. — Алексеев, скажем, не любит евреев, а Пемза терпеть не может беспорядка, все время моет руки, а Долгушов ругает баб, от них все зло… но они столько знают! И они рассказывали чудесные вещи — о французской революции, о фольклорных экспедициях, о каких-то удивительных деревнях… Долгушов, например, искал Китеж — очень хорошо рассказывал… Они в самом деле хорошие люди, и Мельников, например, там был бы очень на месте. То, что он вчера рассказывал про «Слово о полку», — это почти как Хмелев говорил, только другими словами.</p><p class="p1">— Да я знаю. Пока не доходит до политики, все могут разговаривать по-человечески…</p><p class="p1">— И даже когда доходит. Очень много сходств, только у них — такая старательная академическая тишина, а у вас (она до сих пор не могла приучиться говорить «у нас») очень все лихорадочно, шум, веселье… довольно искусственное, ты знаешь. Хотя у Корабельникова такое веселье — хоть святых выноси. У него, мне кажется, внутри все время зубчатые колеса крутятся и клещи щелкают, оттого и стихи такие… с шестеренками…</p><p class="p1">— Да, да. Сан Саныч — совсем невеселый человек. — Мельников гораздо нормальней.</p><p class="p1">— Да конечно, нормальней. Просто Мельников не совсем человек. Он нормален, как… ну, хоть конь. Конь — это же апофеоз нормальности, просто он не человек, и спрашивать с него надо не как с человека. А Сан Саныч — это промежуточное такое существо, он кентавр, да еще недоделанный. У него человеческая половина угнетает конскую, а конская лягает человеческую — никакой гармонии. Хорошо бы кто-нибудь уж победил.</p><p class="p1">— И кроме того, — она приподнялась на локте, — я совсем не могу понять Соломина. Что он у вас делает? Со всеми этими разговорами про красного царя…</p><p class="p1">— Ну и Пуришкевич был чистый монархист, а между тем его выпустили по-тихому. Ты не знала? Льговский его третьего дня встретил. Соломину с Сан Санычем до поры очень даже по дороге: Сан Саныч вовсе не хочет больше ничего разрушать. Он созидать хочет, скуку всякую хочет… конструкции… Да, вот еще: два острова, вроде Сциллы и Харибды. Тракций и Трукций. Они жестоко враждуют, на одном живет страшный Аб с Тракция, а на другом — добрый Конь с Трукция. Они иногда налетают друг на друга в небе, схватываются, борются…</p><p class="p1">— Пашка! Ну Пашка же!</p><p class="p1">— Схватываются… И борются… И схватываются… И борются…</p><p class="p1">— А знаешь что? — сказала Ашхарумова. — Ты ведь слыхал про подземные ходы?</p><p class="p1">— Да, конечно. — Барцев был уже благостный и сонный.</p><p class="p1">— А ты знаешь, куда ведет ход из елагинской кладовки? Он самый длинный…</p><p class="p1">— Нет, не знаю. Ты спускалась?</p><p class="p1">— Ну конечно. Как же это — подземный ход, а я не спущусь. Так вот, он ведет… — она прошептала что-то в самое его ухо.</p><p class="p1">Барцев мигом стряхнул сон.</p><p class="p1">— Нет, честно? Она торжествующе кивнула.</p><p class="p1">— Слушай, Аш… (Он никогда не называл ее ни Машей, ни Марьей, словно задавшись целью придумать имя, которым ее не звал никто другой.) — Но ведь это… может, нам как-то…</p><p class="p1">— Можно будет подумать, — загадочно ответила она.</p><p class="p1">— А впрочем… — Он даже сел в кровати; на стене села смешная вихрастая тень. — Есть замысел не хуже. И тогда можно будет все раскрыть.</p><p class="p1">— И?</p><p class="p1">— Нет, я тебе сразу не скажу. Ты ни за что не согласишься.</p><p class="p1">— Говори быстро, несчастный!</p><p class="p1">— Нет, нет, нет! — Барцев гримасничал, хихикал, тряс головой. — Ты не согласишься, не захочешь, обидишься… и вообще я робею. Я страшно робок, застенчив, угрюм… оскорблен непониманием… люди так часто осмеивали меня… плевали в мою чистую душу… ай, не бей меня! Не бей меня хоть ты, прекрасная белая женщина с армянской фамилией… Ааа! — шепотом взвизгнул он.</p><p class="p1">— Быстро выкладывай, что ты там изобрел.</p><p class="p1">— Ну, в общем… — он притянул ее к себе и зашептал на ухо. Ашхарумова рассмеялась.</p><p class="p1">— Знаешь, — сказала она, тряхнув головой. — Мне вообще-то уже делали предложение, но никогда… видит Бог, никогда еще не подкрепляли его разговорами о целостности русской культуры!</p><p class="p1">— Свадьба, — назидательно сказал Барцев, — всегда сопряжена с нарушением целостности. И только наша свадьба будет сопряжена с ее восстановлением…</p><p class="p1">— Пашка, ты абсолютный мерзавец.</p><p class="p1">— Разумеется, — согласился Барцев. — Это шантаж.</p><p class="p1">— Я подумаю, — серьезно сказала она.</p><p class="subtitle">15</p><p class="p1">Ять вышел из прилукинской дачи, все еще хохоча, и смеялся, пока не дошел до моста. Здесь, на середине его, он подошел к перилам, оперся локтями о парапет и задумался. В сущности, вся моя жизнь прошла на мосту: метался туда-сюда… там плохо, здесь отвратительно… Сколько может продолжаться это гротескное, полосатое существование: бьют одних — перешел к ним, бьют других — перебежал к тем… Хорошо еще, что писем со мной не передают.</p><p class="p1">Стояла божественная темно-зеленая апрельская ночь, от воды пахло гнилью, от берегов — пробудившейся, жадно дышащей землей. В бесчисленных прудах Елагина острова заливались лягушки — брекекекс их любовного томления был так же безобразен, как и они сами, и в этом Ятю мерещилась странная гармония. Внизу, в антрацитно-блестящей темноте, под кистями его рук, свесившимися с моста, проплывал весенний мусор — доски, гнилые бревна, пучки белесоватой травы; так по поверхности сумеречного сознания плывут случайные мысли, не задевая глубин, и страшно было заглядывать в эту черную глубину. Свирель запела на мосту, и яблони в цвету. Господи, как замираю я до сих пор от этих стихов! И стало страшно на мосту смотреть в такую глубину, в такую высоту. Вот я стою на мосту, и мне страшно — хотя чего я страшусь? Собственной ли пустоты?</p><p class="p1">Да, я не знаю, что такое добро и что — зло, но всю жизнь так никому и не осмелился в этом признаться. Я ценю лишь последовательность, лишь способность действовать вопреки самосохранению и прямой выгоде, лишь ритуал, альмекскую пляску на восходе. И чем он сложней, тем для меня лучше — ибо тот, кто откажется подчиняться сложному, обречен подчиняться простому. Я хотел бы полной свободы, но она нужна мне лишь для того, чтобы с максимальной изобретательностью и упорством принуждать к чему-либо самого себя. Я хотел бы измысливать себе новые и новые трудности — но так, чтобы никто не ограничивал меня в моем изощренном самомучительстве. Главное же — теперь, побывав в обоих враждующих лагерях и в обоих не ужившись, я решительно перестаю понимать, в чем между ними разница. Ни один из них не смог бы жить в государстве, построенном по их законам; им до объединения остался один шаг.</p><p class="p1">Что же нужно для этого объединения? Неужели только договориться об орфографии? Но, Боже мой, если все из-за меня, я готов уйти, устраниться, признать мои правила слишком сложными, — вы же видите, что я не уживаюсь ни с теми, ни с этими, и отменять меня, в конце концов, надумала еще особа царской крови Константин Александрович! Если вся эта катавасия из-за одной буквы, то черта ли в ней?</p><p class="p1">В конце концов, есть и третьи. Есть Льговский, Стенин и вся их веселая компания. Может быть, с ними, разрешающими себе все, я как-нибудь договорюсь; мне всегда казалось, что мое место на свалке, — и свалка, кажется, сейчас именно там. Скажем больше — эта свалка сейчас едва ли не самое уютное место. И он отправился на Васильевский.</p><p class="p1">Свирель запела на мосту, и яблони в цвету… Скоро Елагин и Крестовский станут окончательно неотличимы — оба зарастут зеленью, и на обоих наступит недолгий северный рай. Только-то и разницы, что на Елагином стоят зеленые статуи, а на Крестовском — супрематические композиции. Боже, как прекрасны летние острова! Комариный зуд в воздухе, прыгающие, точно на ниточках подвешенные рои; долгие розовые закаты, запах воды — гладкой, серой; упоительное запустение, кущи, пущи, сонные травы… Как легко мне представить Аркадию! Почему-то Аркадия в моем воображении — всегда заброшена, пустынна, всегда подсвечена закатом. Я не могу себе представить цветущий, ухоженный край — непременно руины, усталость, грань между прекрасным увяданием и окончательным запустением. О, как я люблю, когда что-нибудь кончается, и как ненавижу, когда начинается! Как я не люблю просыпаться. Как я любил конец века, как пугало меня самодовольное начало века следующего, несущего в своих аэропланах, пароходах и усовершенствованных телефонных аппаратах собственную гибель!</p><p class="p1">Он прошел и мимо собственного дома, но почти ничего не почувствовал: дом был чужой, а Ять никогда не желал чужого. Разве что жалость кольнула ему сердце — но не к себе, а к дому, в стенах которого прежде велись разговоры, смеялись прелестные женщины, обитали призраки, порожденные его воображением, — а теперь кипят свары, сохнет белье, сапоги стучат по паркету… Ком словно глянул на него всеми окнами, послав мимолетную мольбу о спасении, — помоги, не я ли давал тебе некогда приют?! — но Ять покачал головой: что же я могу? Наверное, я был лучшим жильцом, чем новые; но прости меня, я бессилен. Пусть тебя строили не для таких, как они, — но ведь еще неизвестно, кто кого переделает. Что с них спрашивать, они затопчут, изуродуют, исковыряют тебя наскальной живописью, захаркают подъезды, исщербят лестницу, по которой столько раз поднималась ко мне лучшая из лучших, а до и после — множество ее предвестниц и заместительниц; но и ты не будешь стоять памятником. Исподволь, незаметно, самим ритмом своих лестниц, закопченных лепнин и затоптанных паркетов, и тускнеющей мозаичной картиной на стене, и тайным благородством контуров, вплоть до ржавой башенки на крыше, ты проникнешь в их кровь и плоть, заставишь иначе двигаться и говорить, растворишься в них и победишь в конце концов, заставив их детей оттирать и заново белить твои высокие потолки, восстанавливать мозаику, замазывать ругань на стенах. Ты станешь им не домом, но миром, выполнив главную задачу прямых и ясных питерских улиц: ты выпрямишь кого угодно. В голосах захватчиков зазвучит неведомая прежде скромная гордость, в склоках появится страсть высокой трагедии. Дружелюбные призраки, созданные мной, войдут в их сны. Ты победишь, ибо сделан из камня, и потому у тебя есть время.</p><p class="p1">Ять вдруг подумал о старости этого режима, его бессильной и жалкой старости. Тогда что-то человеческое впервые проступит в нем, как проступает подобие души в осенней растительности. И, представив это будущее, почти примирился с ними, потому что пожалел их. Все они будут честнее к старости, и все одинаково будут чувствовать приближение много более страшной силы, еще более простой, чем они.</p><p class="p1">Что надумает эта сила! Чем переиродит она их отмену орфографии? Отменит даже такой простой закон, как «око за око», которым наверняка будет руководствоваться их юриспруденция? Упразднит ритуал приветствия? Придумает какой-нибудь упрощенный вариант половой потребности? Отменит размножение как таковое и все связанные с ним условности, ибо найдет способ размножаться без соития? Этого он не знал, но, как знает инженер, что внутри механизма действует еще более сложная и неочевидная схема, так и он за первой волной простоты видел бессчетное множество других, ни одна из которых не была ниже. Он боялся думать о конечном результате — но понимал, что эволюция эта не может быть бесконечна и что обратный путь только начат.</p><p class="subtitle">16</p><p class="p1">Кружок Льговского «Левей» был весной восемнадцатого года одним из самых посещаемых в Петрограде. Все наследники, последователи и последыши кратковременного ренессанса, вся молодежь, возросшая в околобогемных кругах и с пятнадцати лет пресытившаяся самым острым, что только было в литературе, все анемичные эстеты, не открывавшие Толстого, но наизусть цитировавшие Рембо, аполитичные апологеты разрушения, гурманы гнили, презиравшие жизнь в любых ее проявлениях, от реализма до деторождения, — все собирались в квартире сестер Калашниковых на Седьмой линии Васильевского острова. Трапезу обеспечивал Склярский, в прошлом владелец ресторана и по совместительству издатель журнала «Пространство», на всем пространстве которого преобладали его собственные сочинения и критика на них. Весной восемнадцатого года он умудрялся добывать вино, сыр и деревенскую сметану, не говоря уж о белом хлебе и сардинах; действие его графоманских романов происходило частично в далеком будущем, в захваченной Китаем России, а частично на Венере, где все страдали особым венерическим насморком. В кружке Льговского, где оценочные категории были начисто исключены из разговоров о литературе, его сочинения обсуждались всерьез, наравне с поэзией Клейнмихеля. Клейнмихель, в отличие от Склярского, не мог достать ни сардин, ни кокаина, но слушать его было очень смешно. Он писал без рифм, ритмов и оглядки на здравый смысл — главным образом о своих необузданных желаниях, числом два. Первое объяснялось возрастом поэта, второе — положением Петрограда в восемнадцатом году. Любовь и голод правили Клейнмихелем; иногда они сливались, и тогда объектом фаллического культа становилась колбаса. Льговский обожал его слушать — не только потому, что вообще любил курьезы, уродства, шуточки природы, но и потому, что Неудовлетворенный (под этим псевдонимом Клейнмихель единственный раз напечатался, еще в семнадцатом году, в альманахе «Электричество») наглядно подтверждал его теорию об эволюции жанров. Лирики больше не было. Лирика была теперь — вот такая. После символистов немыслимы были стихи в их классическом виде — слово утратило вес; акмеисты захотели было его нагрузить — но получалась либо приключенческая проза, либо несвязное, хоть и ангельское бормотание, либо, наконец, паразитирование на усадебном романе. Новую поэзию дал Клейнмихель: в ней говорилось о любви к пище, и тем самым порабощающий, потребительский смысл любви выступал нагляднее. Слово воскрешалось за счет низких жанров; высокого и низкого-больше не было. Пафос не работал; работали ирония или полный наив. Гликберг говорила об этом подробнее, Льговскому было скучно развивать собственные теории. Он их раздаривал. Крошка Зильбер смотрел ему в рот и все записывал, чтобы потом писать о Льговском гадости.</p><p class="p1">Все это Ять знал, и тем страннее была его надежда утешиться у Льговского. Он немало понаписал в шестнадцатом году (поразительно, на какую мелюзгу тратились последние мгновения перед крахом) об удивительной способности новых релятивистов подвергать сомнению все, кроме себя, быть терпимыми ко всему, кроме правды.</p><p class="p1">— Автор умер! — надрывался маленький очкастый Прошляков, автор книги путевых очерков о том, как его побил Д'Аннунцио и спустил с лестницы. Метерлинк. Мало тебе Бога, которого столько раз до тебя схоронили, току тебя и автор умер, подумал Ять: все умерли, экий жестокий мир… Прошляков был основным докладчиком вечера: схоронив последовательно Европу, роман, Россию и вот теперь автора, он яростно утверждал себя — поскольку только после смерти всего сколько-нибудь жизнеспособного его творения могли рассматриваться всерьез.</p><p class="p1">— В мое последнее посещение Венеции… — заходился докладчик, как будто не вылезал из Венеции. В последнее посещение мистического города докладчик открыл для себя скромную поэзию макарон и постиг, что это выше всякой лирики; стоило ездить в Венецию! Лучшим чтением Прошлякову представлялась поваренная книга.</p><p class="p1">Отчего-то особенно мерзка была эта борьба литературных амбиций во времена поистине роковые — хотя не он ли умилялся игрою в мяч накануне конца света? Дело было скорее в том, что для него эта игра в мяч была странной, но честной формой божественного служения, религией, если угодно, — тогда как в кружке Льговского и в большинстве петроградских левых кружков всячески старались, чтобы игра в мяч шла без правил, а по возможности и без мяча. Это-то Ять и рассматривал как посягательство на свою собственность.</p><p class="p1">Он, разумеется, опять не удержался и влез в длинный, нудный спор, снова оскорбив несчастного Валю Стенина, с которым вовсе не хотел ссориться; черт дернул Валю сказать, что ничего нового написать уже невозможно, а потому надо комбинировать цитаты. В той башне, высокой и тесной, царица Тамара жила, прекрасна, как ангел небесный, как демон, коварна и зла. Идет, по деревьям шагает, трещит по замерзшей воде, и яркое солнце играет в косматой ее бороде… Ять кинулся доказывать, что лишь полное бесплодие толкает их на все эти игры, включая самую серьезную из них — игру в литературную иерархию. «Ведь вы всего-навсего играете в бунт, и бунту вашему грош цена — потому что истинная революция делается не ради захвата власти; вам же нужна только власть, ибо литература представляет собой сравнительно удобную площадку — никто ни в чем не уверен… как в России два года назад!» — кричал он, и идиот Склярский, глядя на него бараньими глазами из-под бараньих завитков шевелюры, немедленно сообщил, что и России никакой нет; и Ять, сам ловивший себя на подобных мыслях, взвился на дыбы, когда их высказал Склярский. Более же всего его бесили бутерброды с красной икрой — несчастный графоман и бывший ресторатор купил где-то по дешевке огромную партию жестоко пересоленной красной икры; странным образом это неуместное и вдобавок испорченное лакомство гармонировало с духом салона сестер Калашниковых, где портили все, к чему прикасались. Невыносимы были и сами сестры, постоянно влезавшие в разговор с нелепыми репликами и жеманным хохотом.</p></span>
