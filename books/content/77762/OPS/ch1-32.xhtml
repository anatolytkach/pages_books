<span><p class="p1">— Ведь это черт знает что! — говорил он, воздевая руки. Яроцкий был писатель старого закала, живописный, с длинными седыми космами, раздвоенной бородой, в длинном пальто, похожем на рясу. — Ну хорошо, я все понимаю, товарищ Лабазников — руководящий, ответственный элемент. Но кресло, кресло мое зачем ему? На что ему три кресла?</p><p class="p1">— А вам зачем?</p><p class="p1">— Я пишу в нем!</p><p class="p1">— На стуле будете писать…</p><p class="p1">— Ну хорошо, хорошо! Но зачем ему канапе?</p><p class="p1">— Что?</p><p class="p1">— Канапе — это… это, если хотите, диванчик…</p><p class="p1">— Мы — ничего не хотим, — как младенцу, объяснял ему широкоплечий юноша с усталым и надменным видом — пролетарский Байрон, уставший от людского ничтожества. — Это вы хотите, а нам — ничего не надо…</p><p class="p1">Они все теперь были Байроны, презирающие ничтожных противников. Говорили — гидра… а тут несколько сотен больных запуганных людей, цепляющихся за свою рухлядь. Презрение победителей к побежденным было характернейшей особенностью первых лет русской революции — все получилось слишком легко, без должного сопротивления, вдобавок побежденные готовно и с опережением оправдывали любые действия победителей — и оттого победители, робкие поначалу, все больше наглели, глумились и красовались. В Карташевке, ребенком, Ять видел раз мальчика-ровесника, оторвавшего мухе крылья и упрекавшего ее в слабости духа: «Что, не летаешь? Не летаешь?!»</p><p class="p1">— Так зачем ему диванчик?!</p><p class="p1">— А вам зачем?</p><p class="p1">— Я могу прилечь на него… после того, как попишу…</p><p class="p1">Желая выказать себя полезным членом общества, Яроцкий упирал на процесс письма, старался привязать к нему всю свою мебель, — даже бамбуковая ширма была ему нужна, чтобы отгородиться от бездны, которую он все время ощущает рядом с собой во время писания… Какой бездны? — бездны горя народного, разумеется! Беллетриста отпустили со справкой об ограниченной полезности, так что на канапе он еще мог надеяться, но с ширмой, видимо, стоило проститься. Теперь ею будет отгораживаться от бездны товарищ Лабазников — если, конечно, товарищу Лабазникову зияют бездны.</p><p class="p1">Но и справка о бесполезности, наглядно удостоверявшая принадлежность Ятя к племени лишних людей, была получена, и народная милиция выдала свидетельство, что Ять с 1917 года не арестовывался и в розыске не появлялся. Добродушный архивист с Миллионной подтвердил, что Чека Ятем не интересовалась. Даже из архива охранки пришлось извлечь справку о том, что и там на Ятя нет ни единого дела, — и нашего героя немало повеселил тот факт, что Чека интересуется благонадежностью горожан в глазах охранки и считает именно это серьезным критерием. Тут открывалась замечательная перспектива — разумеется, переняв все методы ненавистного самодержавия, от цензуры до запрета на публичные сборища, новая власть обязана была прислушиваться к мнению охранки относительно благонамеренности тех или иных лиц; Ять еще не знал того, что писатель Яроцкий был добровольным осведомителем при обоих режимах, в первом случае надеясь приобрести обстановку, а во втором — вернуть. Не знал он, однако, и того, что обобщение его было хоть и верно, а преждевременно: далеко не со всякого выезжающего требовали справку из архивов охранки, а просто в коридорах власти, как всегда, шла подспудная борьба — и если бы отъезд Ятя никем не тормозился, он уехал бы уже через неделю, как и выезжали обычно протеже народных комиссаров; однако дело происходило в Петрограде, где Чарнолуского с некоторых пор терпеть не могли. Апфельбаум считал его личным врагом. Дело Ятя тормозили изо всех сил, и чиновник, который им ведал, получил указание измысливать любые предлоги, чтобы задержать наркомовского прихвостня. Ятю еще повезло, что мучитель оказался недостаточно изобретателен. Так иногда тайные векторы истории совпадают с силовыми линиями подковерной борьбы, и весь вопрос в точке зрения историка; одному, как Ятю, свойственно думать, что большевизм окончательно смыкается с царизмом, а другому — что Апфельбаум окончательно ссорится с Чарнолуским. Все наши споры и есть, в сущности, вопрос о точке зрения на очевидные факты — в этом залог полной бессмысленности всякой полемики, но только бессмысленное и интересно. Вот почему люди по-прежнему делятся на тех, кто повсюду отыскивает Божий вектор, и тех, кто копается в фальшивых авизо, полагая, что приближается таким образом к истине. Любопытно, что выводы, к которым приходят обе группы, часто одинаковы, но это почему-то их не примиряет. Вероятно, для обеих слишком огорчительна мысль о том, что Божественная воля может осуществляться через фальшивые авизо.</p><p class="p1">Но и вся эта мельтешня теперь не угнетала Ятя, он покорно наматывал круги по весеннему Петрограду, радуясь солнцу и блеску, — и лишь изредка задумывался: почему в прежней России его с ума свела бы подобная волокита, а в нынешней только забавляет? Вскоре ему явился простой ответ: прежнюю Россию он худо-бедно воспринимал как свою страну, мучился ее муками и болел ее бедами; ему обидны были ее военные поражения и внутренние глупости. Нынешняя — особенно в перспективе отъезда — была уже вовсе не его, свершилась предсказанная Льговским эмансипация от родины, и хорошо бы поговорить об этом с Льговским, когда он наконец вернется с фронта… не может же быть, чтобы Чарнолуский так спокойно солгал!</p><p class="p1">Отделение от родины позволило рассматривать ее без прежней ненависти, с ироническим состраданием, с каким в лучших британских газетах писали о превращениях Московского Кремля, ставшего резиденцией Ленина. Живя в этой новой и совершенно чужой стране (прежняя, видать, окончательно исчезла невыносимой зимой девятнадцатого), Ять с любопытством туриста присматривался к пресловутой вобле, к тухлой селедке, которую давали в пайках вместе с полутухлой, к детям с их звероватыми играми, к суконным рыцарям в шишаках… Так, верно, смотрел бы на нас марсианин; жить без родины оказалось очень приятно. Впрочем, не сказать, чтобы он жил вовсе без родины; просто ею оказалась не Россия, и он сам дивился ложному отождествлению, в которое слепо верил все свои первые тридцать пять лет. Бедный Стечин, зачем было спорить с ним — ведь он с самого начала был прав, и пришел к этому всего-то в двадцать лет! Почему мы ненавидим людей только за то, что они страдали меньше нашего? Ведь мои страдания на пути к этому блаженному освобождению отнюдь еще не значат, что мой путь лучший… Бывают счастливцы, рождающиеся без Родины вообще. Интересно, есть ли дети у ходунов?</p><p class="empty-line"/><p class="p1">Наконец ему осталась последняя инстанция — на этот раз настоящая, через которую проходили все отъезжающие за границу: это был отдел по выдаче виз, размещенный в бывшей торсуновской гимназии, где преподавал когда-то Комаров-Пемза. Ять тут же вспомнил это — и словно облако наползло на его душу; как назло, и швейцар у входа был древний, старой закалки — наверняка еще из тех, что караулили тут гимназический гардероб. Прежде швейцар, вероятно, был строг, — а ныне жалок и кроток и на всякого человека из гимназического прошлого смотрел с собачьей преданностью, как Захар на Штольца; по правде сказать, старше немного выжил из ума Ять заподозрил это, но на всякий случай все равно спросил — нет ли каких сведений о словеснике Комарове?</p><p class="p1">— Как же, были-с, — закивал старик, — вот только позавчера и были-с…</p><p class="p1">— Как, когда?! — вскричал Ять.</p><p class="p1">Старик, ответивший машинально, не задумываясь, испугался, что ляпнул что-то не то, и принялся извиняться: не помню-с, толком ничего теперь не помню-с, но заходили, были… бы-ва-ли… Конечно, он не помнил никакого Комарова; показали бы портрет — узнал бы, а так — нет. Но для Ятя все было утешением: стало быть, Пемза жив — значит, и все живы…</p><p class="p1">Он поднялся на второй этаж; в пустом и гулком гимназическом здании, в рекреациях, насквозь просвеченных весенним солнцем, в желтых стенах, в желтом паркете — во всем была радость, та грустная радость, с каким выпускник гимназии осматривается в ней двадцать лет спустя. Ять, впрочем, заканчивал не торсунов-скую, а пятнадцатую, что на Литейном. Заходить он туда избегал. Все визы в Петрограде девятнадцатого года выдавались централизованно — новая власть старалась не допускать прямых контактов между иностранными дипломатами и рядовыми гражданами; выездной паспорт Ятю уже изготовили — требовалось сдать его в кабинет тридцать шестой. Было тринадцатое апреля, Ять пришел к одиннадцати, постучал — и еще до того, как услышать «Войдите!», знал, кого увидит в бывшем кабинете словесности. Он таинственно знал об этом еще с утра, а потому в душе его, вместо обычного иронического благодушия, билось тревожное счастье; счастье прежде всего — даже после всего, что было. Он убеждал себя, разумеется, что предчувствия — вздор, что этак можно поверить чему угодно — но лишний раз понял, что предчувствию надо верить тем сильней, чем оно на первый взгляд невероятней. Таня вскочила, увидев его, и замерла у доски, как гимназистка.</p><p class="p1">Класс был пуст, на стенах еще красовались Пушкин и Лермонтов, Грибоедов и Достоевский, а над доской висел лично изготовленный Пемзой плакатик с аккуратно выписанными исключениями на «ять». На время диктанта табличка переворачивалась. Звезда, гнездо, седло, брести, цвести, приобрести… Ночная крымская дорога: шары омелы в ветках, похожие на гнезда; над нами звезды, под нами седла… Я брел долго, цвел недолго и бессмысленно, и вот что я приобрел.</p><p class="p1">— Здравствуй, Таня, — севшим голосом сказал он.</p><p class="empty-line"/><p class="p1">Она не бросилась его обнимать, — чай, не Гурзуф; он был теперь никто, а она как-никак уполномоченная по связям с иностранными представительствами, с благодарностью от самого наркоминдела. Главное же — она не ждала его; он давно уже должен был исчезнуть, как и вся прежняя жизнь, — оказаться за границей, в ссылке, Бог весть где еще… Странно было думать, что когда-то он столько для нее значил, чудной, ничего вокруг не желавший понимать… Теперь ей было уже двадцать три года. Она любила взрослого человека.</p><p class="p1">— Ять! Откуда? — выдохнула она.</p><p class="p1">— Это ты мне скажи откуда. Я-то не уезжал… Разрешите присесть, товарищ Поленова?</p><p class="p1">— Лосева, — поправила она.</p><p class="p1">— О, — протянул он. — Но хорошо хоть не Зуева.</p><p class="p1">— Ять, Господи! — она не выдержала, закрыла лицо руками и всхлипнула.</p><p class="p1">— Оставь, пожалуйста. Все, что связано с тобой, я прекрасно помню. Ну, расскажи мне, как ты не попала в Париж.</p><p class="p1">— Да самым обыкновенным образом. — Она отняла руки, и он увидел, что глаза ее сухи. — Передумала в Ялте, посмотрела как следует на Зуева, поговорила с Маринелли и осталась… При немцах там появилось даже что-то вроде порядка, а когда их выбили — пошли поезда; я и вернулась.</p><p class="p1">— Минуту, минуту! — Ять наморщил лоб, силясь что-то припомнить. — Скажи, а настоящая фамилия Маринелли, часом, не Лосев? Честное слово, будь он твоим новым мужем, я бы не ревновал.</p><p class="p1">— Лосев, — сухо сказала Таня, — оформлял тебе паспорт. Ять вспомнил сухощавого, желчного очкастого коммуниста, выписывавшего ему документы, и подумал, что неуловимое сходство с Зуевым, пожалуй, все-таки есть.</p><p class="p1">— Должно быть, человек надежный, — серьезно кивнул он.</p><p class="p1">— Надежный, — с вызовом ответила Таня.</p><p class="p1">— Я ненадежный человек, Таня, и почти не существую, — снова кивнул Ять. — Вот справки о том, что я не представляю никакой ценности, вот паспорт, вот разрешение на выезд — прошу тебя, не затягивай с решением.</p><p class="p1">— Но где ты был все это время? Я думала, ты давно…</p><p class="p1">— Жив, жив, — успокоительно сказал он.</p><p class="p1">— Я не о том! Ять, — у нее жалобно скривился рот, — Ять, почему мы встретились как враги? Что случилось? Ведь я та же самая, я всегда была такой, и если ты приписывал мне что-то другое — разве это моя вина, Ять?</p><p class="p1">Она и в самом деле не изменилась — та же стройность, легкость, живость, разве что на все это словно лег тончайший слой пыли — тут же ложившийся, впрочем, на все, становившееся советским; конечно, и товарищ Лосев недолго удержит ее в этсм поле, а может, и сам что-нибудь поймет, он человек неглупый.</p><p class="p1">— Ты ни в чем не виновата, Боже упаси. Слушай, миллион мужчин до меня говорили женщине эту роковую фразу — «Ты ни в чем не виновата», и всегда с одной и той же интонацией. Все любовные диалоги множество раз уже проговорены, и всегда с одной и той же интонацией: «Чем я виновата?» — «Ты ни в чем не виновата». Каждый мужчина старается сказать женщине то, что она хочет услышать, а каждая женщина хочет услышать только то, что она ни в чем не виновата… опера, одно слово! — При слове «опера» он отчего-то почувствовал во рту жирный, мыльный вкус.</p><p class="p1">— Ты так говоришь, словно это я оставила тебя в Гурзуфе.</p><p class="p1">Удивительно, как она умела все обернуть — и как теперь это умиляло, а не раздражало его.</p><p class="p1">— Да, конечно, — подтвердил он. — Но ведь обида твоя не столь сильна, чтобы отказать мне в выезде?</p><p class="p1">— Резолюция есть, паспорт тебе выдан — значит, я сделаю, что должна сделать. У нас произвола нет.</p><p class="p1">Он отметил это «у нас».</p><p class="p1">— Но скажи — ведь спросить тебя я имею право? — почему ты едешь и почему именно сейчас? Я поняла бы тебя, допустим, в восемнадцатом — но сейчас, когда погнали Деникина, когда скоро раздавят Колчака?</p><p class="p1">— Знаешь, мне почти ничего не говорят эти фамилии. Я знаю, что есть какие-то Деникин и Колчак и что они хотели взять Питер и чуть было не взяли его, — но, веришь ли, мое решение никак с ними не связано.</p><p class="p1">— А с чем же, позволь узнать, оно связано?</p><p class="p1">— Оно связано с тем, что я устал выбирать из двух, а в России это единственный вариант. Поверь, Таня, я хорошо подумал. И позволь заметить, что я старше тебя на тринадцать лет.</p><p class="p1">— Это-то и плохо, — натянуто усмехнулась она — Это-то и мешает тебе увидеть нашу правду.</p><p class="p1">— Таня, я уже видел вашу правду во всех ее вариантах. В том числе и в Гурзуфе. Разумеется, все вы чудные, чудные люди, как ты любила говорить о товарище Трубникове, — но места себе я тут не нахожу, а потому позволь мне связать остаток жизни с другой страной. Ведь и я тебе не нужен больше?</p><p class="p1">— Ты мне всегда будешь нужен, — почти беззвучно проговорила она, не глядя на него. — Это проклятие, и я ненавидеть тебя готова.</p><p class="p1">— Я тоже очень люблю тебя, — честно сказал Ять.</p><p class="p1">— Но почему, почему, Ять? Почему ты не хочешь остаться?</p><p class="p1">— А почему ты удерживаешь меня?</p><p class="p1">— Не знаю, — она опустила глаза. — Честно, Ять, не знаю. Ты вправе, конечно, подумать, что мне выдают отдельный паек за то, что я уговариваю отъезжающих.</p><p class="p1">— Ну, этого-то я не подумаю никогда. Я не Казарин.</p><p class="p1">— Казарин, кто это?</p><p class="p1">— Он умер. Очень любил про людей гадости выдумывать. А кстати, паек-то действительно дают? — Он только теперь обратил внимание на то, как она одета: товарищ Лосев не жалел средств. Строгое, до колен платье зеленого бархата, явно пошитое недавно и сидящее на ней идеально; никаких украшений, но часики на серебряном браслете. Впрочем, ей шли и сапоги. Он легко мог представить ее комиссаршей на фронте — и солдаты пошли бы за ней куда угодно, пусть движимые желаниями совсем иного рода, нежели жажда расправы с Деникиным. Удивительно, как из этих хрупких девочек получались большевистские амазонки; впрочем, должно быть, им всегда хотелось чего-то подобного. Не Казарин же, в самом деле, должен был жить с Ашхарумогой, — она могла бы на руках его носить, убаюкивая; нет, только слоноподобный Паша, и Паша ведь далеко еще не худший вариант!</p><p class="p1">— Паек мне дают. — Она зло сощурилась. — Это все, что тебя интересует?</p><p class="p1">— Почему, интересует многое, — но ведь мы теперь не об этом говорим. Я пытаюсь понять, почему ты не хочешь меня отпустить.</p><p class="p1">— Я не могу отпускать или не отпускать. Мое дело — получить для тебя визу. Но пойми, — она снова вскочила, — я сама не все себе объясняю. Я только чувствую, что с твоим отъездом что-то кончится, теперь уже насовсем.</p><p class="p1">— Все давно кончилось, Таня, — удивляясь собственному спокойствию, сказал он. — Говоря театрально, доигрывается эпилог. Уже и сейчас нельзя ничего изменить — нас, может, для того и свели, чтобы мы ясно увидели, как далеко разлетелись. Я смотрю на тебя — и впервые в жизни не могу тебя обнять.</p><p class="p1">— Ну, это просто, — она улыбнулась совсем прежней улыбкой и подошла к нему вплотную, однако, секунду постояв рядом, отшатнулась в ужасе.</p><p class="p1">— Вот видишь, — виновато сказал он.</p><p class="p1">— Ты совсем другой, — прошептала Таня. — Совсем, совсем другой…</p><p class="p1">— Ах, Таня, ну к чему это? Это так мелодраматично… Просто вокруг все другое до неузнаваемости, вот и мы с тобой ничего теперь не можем понять друг в друге. Понимаешь ли ты теперь, какая эфемерная штука человек? Он думает, что решает, — а ведь мы с тобой ничего не в силах решить. В одно время мы одни, в другое — другие, и разные токи идут через нас. В общем, чтобы это понять, уже стоило увидеться.</p><p class="p1">— Ять, — она и впрямь никогда не видела его таким, — неужели тебе не…</p><p class="p1">— Неужели тебе не хочется остаться со мной? — закончил он. — Нет, Таня, не хочется. Чем дальше от тебя, тем ближе к себе — по крайней мере пока; хватит переваливать себя на кого попало. Ты, конечно, не кто попало, но слава Богу, что я вовремя тебя освободил от своей пустоты. Она есть и в тебе, конечно, — но у тебя впереди больше времени, успеешь наполниться. Впрочем, тебе тоже здесь надоест, но на этом посту проще устроить себе выезд.</p><p class="p1">— Но что ты будешь там делать?! Ты никому там не нужен, а здесь будешь нужен всем! Революция кончилась, Ять, начинается другая жизнь, в которой надо будет учить детей, писать книги, делать стихи! (Он мельком отметил конструкционистское «делать стихи»; что ж, Корабельников так говорил еще в пятнадцатом) Ты не представляешь себе этих людей, Ять, ты никогда не знал их! Нельзя же обо всех судить по одному сумасшедшему эсеру. Среди наших есть люди европейского, мирового уровня, они мир перевернут, ты через два года не узнаешь Россию.</p><p class="p1">— Да я ее давно не узнаю. Всё, Таня. Скажи, когда прийти.</p><p class="p1">— Тебя пригласят, — сухо сказала она.</p><p class="p1">Он пошел к дверям; она смотрела ему вслед — он обернулся и поймал этот взгляд, не любовный и не страдальческий, на который он смел рассчитывать, а снисходительный, почти высокомерный: женщина, сделавшая правильный выбор, смотрела вслед заблудившемуся подростку, никак не желавшему двинуться по единственному пути. Удивительно, как влияет на человека Правильный Выбор! Боже, да ведь, оставаясь тут, она жалеет его! — и в этот миг он пожалел ее, как никогда в жизни.</p><p class="p1">— А знаешь, Таня, — сказал он бодро, — ты, может быть, и права. И придут в эту школу другие дети, и во время очередного диктанта — уже, слава Богу, без всяких ятей — будут так же, как мы, смотреть в окно, чувствовать всю эту весеннюю вольницу, с наслаждением предвкушать звонок. И, разумеется, все гимназисты будет влюблены в девочек из соседней женской гимназии — многие еще будут влюблены и после нас.</p><p class="p1">— Мы за совместное обучение, — сказала она наставительно. Это было последнее, что он от нее услышал.</p><p class="empty-line"/><p class="p1">Есть и в этом особенный смысл, думал Ять, жадно закуривая и останавливаясь посмотреть на воробьев, купавшихся в лужах. Да, совместное обучение — великая вещь; мы с нею всегда жили врозь, а потому всему учились раздельно. Как знать, живи мы вместе, я мог бы научиться у нее жизнеприятию, а она у меня — недоверию; как знать, живи мы вместе… Но зачем, ведь все кончилось — а я не заметил как. Вот что значит — вторая половина жизни: все совсем по-другому, и я не люблю ее больше, словно тот я действительно кончился… Его еще можно, наверное, извлечь из-под завалов памяти, из-под пластов ненависти к себе, — но, очнувшись, этот бледный покойник только захлопает полупрозрачными веками: где я? зачем вы меня разбудили? Я давно уже — собственная загробная жизнь, не вторая и, может быть, даже не третья; Бог весть, сколько их еще будет. Какое было дело воскресшему Лазарю до сестры и матери? Почему я так спокойно выношу то, что еще два года назад взорвало бы мой мир? — да потому, что я другой и мир другой, и, Господи, как же разумно ты все устроил! Кроме этого доверия к тебе, доверия подмастерья к мастеру, ничего не уцелело во мне. Мимо промчались, держась за руки, мальчик и девочка, — и он снова спокойно и радостно подумал, что уже совсем скоро в торсуновской гимназии будут учиться дети; он представил их ранцы, фуражечки, башлычки, их гогот и гвалт, невыносимый для запуганного гимназистика-слабака, но умилительный для взрослого слуха; наконец, кажется, я повзрослел и могу умиляться всему — ибо ничто здесь уже ко мне не относится; это и есть единственное преимущество возраста. Скольких я боялся, скольких незаслуженно ненавидел или понапрасну любил — а все потому, что был слишком живым; теперь я жив ровно настолько, чтобы ничего не принимать всерьез…</p><p class="p1">Был прелестный, лучший час весеннего дня — перелом к вечеру; глубокая небесная синева, какой не бывает больше в году — разве только в августе, когда умирает лето, — куполом стояла над Литовским проспектом. Лучились невыбитые стекла верхних этажей, пищали воробьи, кричали дети в соседнем дворе; такого умиротворения он не испытывал давно.</p><p class="p1">А все-таки, живи или умри, главное в нас не меняется: предсказывать он не умел. Предчувствовать — сколько угодно, а предсказывать — никогда. Никакой школы в здании торсуновской гимназии больше не было. С двадцать первого там размещалось фабрично-заводское училище, в двадцать пятом отличное здание забрал себе Петроградский институт истории Октябрьской революции, а после его разгона вселилась редакция журнала «Наши достижения». Когда, в свою очередь, разогнали журнал, вселился проектный институт, который под разными названиями и существовал тут до тех пор, пока здания не попросило британское консульство, прежде ютившееся в особнячке на Староневском. В этом особнячке теперь детский музыкальный театр «Колобок».</p><p class="subtitle">30</p><p class="p1">Два дня спустя, возвращаясь с постылой службы, Ять вдруг встретил на Разъезжей Грэма.</p><p class="p1">— Грэм, дружище! — воскликнул он. — Сколько же не виделись?</p><p class="p1">Грэм никогда и ничему не удивлялся, как всякий человек, живущий в мире слишком удивительных происшествий, чтобы еще обращать внимание на всякие земные чудеса.</p><p class="p1">— Здравствуйте, — с обычной важностью сказал он. — Вы не знаете, как платит «Парус»?</p><p class="p1">«Парус» был новое издательство Хламиды, куда Ять обращаться не хотел, зная о полном и внезапном переходе Хламиды на сторону властей. Возможно, безнаказанная фронда была бы еще отвратительней, — но в этом, как хотите, ему виделось явное лицемерие: так долго и убежденно ругаться, так безоговорочно переметнуться..</p><p class="p1">— Я в «Парусе» не бывал, — ответил Ять. — Но где вы были?</p><p class="p1">— Я бродил, — с достоинством ответил Грэм, — и видел сюжеты. Я сделал теперь вещь — помните, ту, о которой говорил вам в Крыму; вышла феерия. Феерию написать непросто — и я думаю, ее оценят.</p><p class="p1">— А я уезжаю, — сказал Ять.</p><p class="p1">— Куда?</p><p class="p1">— Пока — в Финляндию. И думаю, что насовсем.</p><p class="p1">— Да, вернее всего, насовсем, — кивнул Грэм — Я думаю издать феерию и купить дом в Крыму — там теперь дешево. Если будете, найдете.</p><p class="p1">Трудно было представить, каким ветром Ятя занесет из Финляндии в Крым, но для Грэма не существовало географии.</p><p class="p1">Было темное пятнышко, которое следовало выскрести, выскоблить с новой жизни Ятя; этим пятнышком было сомнение — что такого Грэм предчувствовал тогда, в ночь на шестнадцатое мая, на мосту между островами?</p><p class="p1">— А почему вы тогда, на Елагином, предлагали мне уйти? — решился наконец Ять на прямой вопрос.</p><p class="p1">Грэм посмотрел на него исподлобья. Шрам на его правой щеке побелел.</p><p class="p1">— Никогда не задавайте вопросов, ответы на которые вам известны, — сказал он глухо, поправив капитанскую фуражку. Он говорил тем же тоном, что и год назад, на Елагином, когда посоветовал Мельникову никогда не жечь бумаги, «чтобы было хорошо». — До свидания.</p><p class="p1">— Нет, постойте! — перепутанный Ять схватил его за рукав. — Грэм, прошу вас, пожалуйста!</p><p class="p1">— Не спрашивайте, когда знаете, — повторил Грэм. — Не спрашивайте.</p><p class="subtitle">31</p><p class="p1">В день, когда все документы были выданы Ятю на руки, когда после звонка (телефоны заработали с марта) он явился в знакомое здание на Миллионной и получил все, включая билет в Гельсингфорс на двадцать четвертое мая, — он нанес необходимый визит, побывал у своего спасителя Клингенмайера Ять знал, что ближе к отъезду им овладеет неизбежная дорожная лихорадка, от которой он мучился во всяком возрасте, и потому увидеться со странным антикваром, ничуть не ставшим понятнее после двух месяцев жизни в его лавке, надо было сейчас. Как ни странно, лавка была закрыта; Ять еще дважды заходил — но никого не заставал. Звонил, стучал — все тщетно. Опасаясь, что после такого звонка не выпустят, он все же попросил соединить его с приемной здания на Миллионной, дал записать свое имя и спросил, не числится ли Клингенмайер среди задержанных, — не числился. Он звонил и на Гороховую, где занимались теперь уголовными делами, — молчание. Наконец тридцатого апреля немец оказался в лавке и встретил его со всегдашним дружелюбием — в котором Ять, однако, заподозрил скрытый холодок. Он уезжал и потому чувствовал себя виноватым перед всеми, кто оставался.</p><p class="p1">— Где вас носило? — спросил он. — С третьего раза застал…</p><p class="p1">— Дела, дела, — расплывчато отвечал Клингенмайер. — Раньше, знаете, каждый мог ко мне добраться, а теперь самому приходится ко многим заходить. Этого Ять не понял.</p><p class="p1">— Что же, на дому оцениваете древности?</p><p class="p1">— Можно и так сказать. Ну, проходите же, выпьем чаю. И отчего вас не было видно в последний месяц?</p><p class="p1">— Я уезжаю, — прямо сказал Ять.</p><p class="p1">— Я так и думал, — кивнул Клингенмайер. Он заваривал бомбейский чай, но ароматическую соль уже не извлекал из ларчика — то ли кончилась, то ли считал ненужным сопровождать последнюю встречу детскими церемониями.</p><p class="p1">— Вы не одобряете моего отъезда?</p><p class="p1">— Почему же. Я одобряю всякий решительный поступок, кроме убийства — которое тоже, вы знаете, в исключительных случаях может быть понято… Я думаю, что для вас это самое лучшее — ведь вы далеко не все сделали, что могли. А здесь теперь работа есть только для меня. Этого Ять тоже не понял.</p><p class="p1">— Видите ли, Фридрих Иванович, — сказал он, делая маленький глоток божественного чая, пахнущего джунглями. — В конце концов, я вам жизнью обязан, и не знаю, стоит ли об этом говорить…</p><p class="p1">— Не стоит, — с улыбкой кивнул антиквар.</p><p class="p1">— Все это время я не решался вас спросить: по какому принципу отбираете вы вещи для своей лавки? Но теперь, когда, скорей всего, больше не увидимся…</p><p class="p1">— Не зарекайтесь.</p><p class="p1">— Был бы счастлив, но… некоторый дар предвидения…</p><p class="p1">— И что же вам подсказывает ваш дар предвидения относительно моей лавки?</p><p class="p1">С Клингенмайером удивительно просто и удобно было разговаривать — с ним никто не чувствовал себя лишним.</p><p class="p1">— Мне казалось, — признался Ять, — что вы собираете вещи, не имеющие никакого прагматического смысла, или окончательно потерявшие его… Думаю, только этим и можно их объединить.</p><p class="p1">— Пожалуй, — снова кивнул Клингенмайер, ловко пропуская между пальцев каучуковую змейку. — Пожалуй, что и так, — или, верней, тут вещи, которые в известных комбинациях могут еще пригодиться: скажем, пуговица вместо шахматного коня… хотя и пуговица, и неполный шахматный набор сами по себе ущербны. Это забавная мысль — может, у меня и в самом деле клуб взаимопомощи поврежденных вещей; ах, Ять, вы слишком писатель! Вы настолько писатель, что всюду вычитываете сюжет; и это ваше свойство мне всего милее, да еще чистая ваша душа.</p><p class="p1">— Благодарю вас, — но, значит, я ошибся?</p><p class="p1">— Это высокая ошибка. Простое объяснение, Ять, огорчит вас. Это кладбище.</p><p class="p1">Слова эти были сказаны так буднично и вместе с тем так неожиданно, что в первое время Ять, естественно, решил, будто ослышался; однако Клингенмайер смотрел на него все с той же спокойной улыбкой, словно подтверждая: да, да, именно так. Он соединил кончики пальцев и откинулся в кресле.</p><p class="p1">— Что вы хотите сказать?</p><p class="p1">— Историк, Ять, собирает свидетельства. В нынешнем мире от человека может вовсе ничего не остаться. Вот эту змейку занес мне Мигунов, уходя на войну.</p><p class="p1">— Но ведь Мигунов жив! — Мигунов был известный поэт и путешественник, после войны оставшийся за границей.</p><p class="p1">— Он жив, но памятник себе обеспечил уже при жизни. Знаете, как участки на кладбище покупают. Иногда приходят решившиеся самоубийцы — помните, при вас однажды пришел некто Солнцев, принес снежный буран? Разумеется, я храню не только эти памятники — у меня есть и подлинные древности, которые вы сами видели. Но главная моя миссия, о которой в Петербурге хорошо знают, — он демонстративно избегал говорить «Петроград», — заключается в том, чтобы увековечивать каждого из живых, чтобы в конце концов от них что-нибудь осталось; такой хранитель необходим, ибо это больше всякого архива. Многие верят, что в заветную вещь вселяется душа; многие — что с человеком ничего не случится, покуда его талисман хранится у меня. Но таких все же меньшинство: обычно посетитель оставляет мне пуговицу, или ручку, или итальянскую бутылку с кораблем — когда идет на гибель. Ему легче уйти, зная, что он — в моем реестре. Так что лавка моя неприкосновенна — по крайней мере, пока хозяева города тоже боятся смерти.</p><p class="p1">— А мою книгу, — с усилием спросил Ять, — вы тоже у кого-то взяли на хранение?</p><p class="p1">— Нет, это из разряда диковин, — небрежно отвечал Клингенмайер. — Купил в Египте. Ять помолчал.</p><p class="p1">— Я уезжаю навсегда, — заговорил он наконец, — а это всегда немного похоже на смерть. Не думаю, что от меня останется многое. Позвольте, и я вам оставлю что-нибудь.</p><p class="p1">— Это ваше право, — кивнул Клингенмайер.</p><p class="p1">— Что же мне оставить вам? — вслух задумался Ять. — Ведь у меня почти ничего нет… по крайней мере, с собой…</p><p class="p1">— Заходите еще раз.</p><p class="p1">— Возможно, но я чувствую, что надо сейчас сейчас. Знаете что? Ведь вы возьмете записку?</p><p class="p1">— Конечно, — кивнул Клингенмайер. — Прошу.</p><p class="p1">Он принес лист желтой бумаги, похожей на пергамент, и гимназическую чернильницу-непроливайку с железной вставочкой. Пока Ять писал, он достал из ящика такой же пергаментный конверт и аккуратно вывел на нем фамилию, имя и отчество Ятя, изобразил в скобках большой ять, чтобы не забыть о приросшем псевдониме, и стал ждать.</p><p class="empty-line"/><p class="p1">Ять колебался недолго. Он взял перо и аккуратно написал:</p><div class="poem">
<div class="stanza">
<p class="v">«Бђло-сђрый блђдный бђс</p>
<p class="v">Убђжал поспђшно в лђс.</p>
<p class="v">Бђлкой по лђсу он бђгал,</p>
<p class="v">Рђдькой с хрђном пообђдал</p>
<p class="v">И за бђдный сђй обђд</p>
<p class="v">Дал обђт не дђлать бђд».</p>
</div>
</div><p class="p1">— Вот и всё, — сказал он, дуя на листок.</p><p class="p1">— Вы позволите? — спросил Клингенмайер.</p><p class="p1">— Конечно, прочтите. Антиквар просмотрел записку, кивнул, словно догадывался об ее содержании, и упрятал в конверт.</p><p class="p1">— Что, жалкий итог? — криво улыбаясь, спросил Ять.</p><p class="p1">— Ничего не жалкий, — ласково утешил Клингенмайер. — Очень многие и этого не смогут о себе сказать.</p><p class="subtitle">32</p><p class="p1">Почти весь май прошел в прощальных визитах. Ять отважился зайти и на Елагин остров, где ничто уже не напоминало о филологической коммуне. Дворец объявили памятником, да так и оставили забитым, словно и не было тут никакой коммуны; и Ять уже почти верил в это. Было, однако, одно посещение, которое он долго откладывал — но которое было отчего-то ему особенно необходимо. Этот последний его визит, за день до отъезда, был на Васильевский остров, к Зайке. Ять не вполне понимал, почему он хочет ее увидеть. Вероятно, причина была в том, что к весне девятнадцатого года странная девочка-женщина Зайка, в которой не было ничего женского — только милые беспомощные глаза, пухлые губы, домашние запахи, — была единственным существом, которое он по-настоящему жалел. Ее внутренняя тишина словно уравновешивала весь шум и лязг семнадцатого, весь подспудный гул восемнадцатого. Правда, не слышала она и музыки… но была ли музыка?</p><p class="p1">Она была дома и сама открыла; увидев Ятя, улыбнулась прелестной щербатой улыбкой и, поправляя очки, попросила зайти. За подол ее серого шерстяного платья держался кривоногий рахитичный младенец. Удивительно было, что она не похудела: в ее круглом, очень белом лице, во всем теле под зеленой вязаной кофточкой (явно собственного производства) угадывалась та же детская полнота, что и два года назад, во времена сравнительно благополучные. Жизнь ее не брала. Ведь худеешь не тогда, когда голодаешь, а тогда, когда иссыхаешь; невозможно было представить жар, который иссушил бы этот родник органического, неразборчивого доброжелательства, это инстинктивное желание греть, жалеть, утешать.</p><p class="p1">— Зайка, — улыбаясь как можно бодрее, сказал Ять. — Я уезжаю отсюда. Она сразу поняла и опустила глаза.</p><p class="p1">— Что ж, дай вам Бог. Я, знаете, все боялась, что вы сердитесь… еще за тот раз…</p><p class="p1">— Господи, Зайка, что вы ерунду городите! Вы-то при чем были? И Валя Стечин — милейший человек…</p><p class="p1">— Да, Валя очень умный! — уважительно сказала Зайка. — Он в Пскове сейчас, у друга. Но, знаете, посылает денег семье своего приятеля, который на фронте. Так что это разговоры только, что он никого не любит…</p><p class="p1">— Да я знаю, хватит вам всех защищать. Я, по-вашему, пришел ругать Стечина? Нет, конечно!</p><p class="p1">Ребенок отвратительно заголосил; точней, пронзительный этот писк нельзя было назвать голошеньем, но лицо его покраснело и исказилось так, словно он ревел паровозом.</p><p class="p1">— Ну что это?! — беспомощно утешала его Зайка, подняв на руки. — Ну что это мы плачем? Мы же только что целый сухарь ухомячили… Это жильцов наших сын, — пояснила она Ятю, — они оба ответственные и все время на Гороховой, а Марк со мной…</p><p class="p1">— Его зовут Марк? — переспросил Ять.</p><p class="p1">— Маркс вообще-то, — улыбнулась Зайка, — но так привычнее. Хотите подержать?</p><p class="p1">— Нет, нет, увольте. Я Маркса в любом виде боюсь… Зайка посмотрела на него неодобрительно:</p><p class="p1">— Он же маленький!</p><p class="p1">— Да они, знаете, и не заметишь, как вырастут… Так я вот о чем, Зайка. Я вам хочу сказать, что вы будете очень счастливы. Верьте моим предсказаниям, они сбываются. Зайка порозовела.</p><p class="p1">— Наследство получу от французской тетушки? — И, не удержавшись, прыснула.</p><p class="p1">— Нет, нет. Гораздо проще. Вы просто скоро будете счастливы, вот и всё; и это будет сопровождать вас всю жизнь. Говорю вам это совершенно серьезно, потому что знаю. Не сомневайтесь, просто возьмите на веру. Так и будет.</p><p class="p1">— Вам, — сказала она смущенно, — надо внушением заниматься. Вы не пробовали?</p><p class="p1">— Пробовал — безуспешно, — сказал Ять. — Людям можно внушить только то, что они сами хотят услышать. А вы не верите в свое счастье, и потому вас разубедит только жизнь. Так вот, я клянусь вам чем хотите, что жизнь ваша будет счастливая, прекрасная, вы будете всеми любимы… Подождите, не перебивайте. Сейчас дурные времена, и никто ни в чем не уверен. Но когда-нибудь они кончатся, и тогда окажется, что я был прав и вы тоже. Никогда не сомневайтесь в своей правоте, слышите — ни минуты! Вам нет нужды искать правду, потому что она вам дана с самого начала. Вам все дано, вам ничего делать не надо. Понимаете, мы все ищем доказательства бытия Божия, и найти их очень трудно, потому что… это как если бы сыщику пришлось искать самого себя. Я не знаю, верите ли вы в Бога…</p><p class="p1">— Я тоже не знаю, — серьезно кивнула Зайка.</p><p class="p1">— Ну, и хорошо — меньше будет соблазнов собой гордиться. Вот говорят: как Бог терпит всякое зло? Так ведь он не терпит, зло истребляется… и не в последнюю очередь вашими руками.</p><p class="p1">— Да что же я могу? — окончательно смутилась Зайка. — Вы из меня Жанну д'Арк сделали, а я ужасная трусиха…</p><p class="p1">— Все великие подвиги совершаются трусами, от страха перед собственной совестью. Но вы продолжайте себя терзать, это очень полезно. — Он размахивал руками в темной прихожей; юный Маркс положил палец в рот и затих, глядя на него. — Живите как Бог на душу положит, слушайтесь только себя, любите кого хотите, страдайте из-за кого хотите (страдать вы будете, без этого какое же счастье), — но только не сомневайтесь в себе. Я считал долгом вам это сказать, потому что вы сомневаетесь. Знаете сказку про яблоню? Кажется, кто-то из немцев. Я в детстве все плакал над ней, — Ять почувствовал, что близок к этому и сейчас, впервые за долгое время: удивительно действовала на него эта квартира, все еще уютная, пахнущая домом, несмотря на вселение ответственных товарищей с Гороховой. — Там мальчик любил яблоню, и яблоня была счастлива. Он играл в ее ветвях и ел ее яблоки, и она была счастлива. Потом он вырос здоровым таким балдой и ушел из дома, а когда вернулся, то яблоню эту при каких-то там обстоятельствах срубил, она окно ему, что ли, застила, — и она опять-таки была счастлива, хотя не совсем. Мне очень понравилась там эта трогательная сноска насчет того, что не совсем. Ну вот, а потом он состарился, так? — и присел отдохнуть на пень, и сказал: «Боже, какой прекрасный, удобный пень, а я и не замечал его!»</p><p class="p1">— И яблоня была счастлива, — закончила Зайка.</p><p class="p1">Он сбежал вниз по лестнице, все еще несомый волной; то, что он чувствовал при виде этой девочки, для которой Абсолютное Благо было еще естественней, чем для него — изгойство, было несравненно больше любви и куда ближе к религиозному поклонению. Это добро, без каратаевской инертности и мученической жертвенности, простое, домашнее, жалкое, еще ясней доказывало Бога, чем лишняя буква ять. Пока все искали Россию, Россия переселилась сюда, в эту квартиру на Васильевском острове, в близорукую девочку с неловкими руками.</p><p class="p1">И Зайка поверила странному предсказанию Ятя, как верила всему непонятному, — и всегда была уверена, что ей везло.</p><p class="p1">Похоронив обоих родителей в середине двадцатых и оставшись одна, она вырастила Маркса, чей отец спился и попал под трамвай вскоре после гибели жены от тифа; и вырастила его человеком. Сама она замуж не вышла, да и любви большой не знала, если не считать увлечения полярным летчиком, в тридцатых годах часто бывавшим у ее соседей по квартире. Она с Марксом жила теперь в своей детской, а прочие комнаты их большой квартиры отдали другим жильцам. Летчик пару раз сводил ее в ресторан, пытался приставать и сам недоумевал, почему с ней не получается, как с другими. Он обещал забрать ее в Мурманск, где теперь такие дела, ууу! — но никуда не забрал, конечно. Она учительствовала в тридцать пятой ленинградской школе, той самой, с физическим уклоном, которую разгромили в тридцать седьмом, когда врагом оказался директор; она преподавала там литературу и к физическому антинаучному кружку не имела отношения, но уволили всех, и она пошла корректором в детское издательство. Разогнали и издательство, но Маркс — инженер — уже работал, на жизнь хватало. У его отца оставались могущественные друзья, так что их не трогали и даже приносили кой-какие продукты; эти же друзья предупредили ее в июле сорок первого года, чтоб не слушала никого и уезжала при первой возможности. Ее всегда предупреждали, чтоб она никого не слушала, потому что она всему верила.</p><p class="p1">Маркс пошел на войну и погиб, она узнала об этом в Ташкенте и полгода пролежала больная; но выходили, вернулась, снова устроилась в школу и преподавала до шестидесятых годов; мальчик, сын новых соседей, был ей за внука, и она многое успела ему рассказать, многому выучить, — но, когда ему исполнилось пятнадцать, соседи переехали то ли в тайгу, то ли на целину. Тогда все время переезжали, страна находилась в беспрерывном движении, превратившись в одну громадную секту ходунов: когда человек боится двигаться вглубь, опасаясь увидеть там, чем он стал, — он начинает безудержную экспансию вширь. Она доживала на пенсию, ходила иногда в Малый драматический, смотрела телевизор, а в семьдесят втором слегла в больницу и оттуда уже не вышла; к ней некому было приходить, коллеги давно про нее забыли, и она не претендовала на их память, — а вот к соседке иногда приходила неприятная, злая невестка, а с ней сын, мальчик лет восьми, страшно боявшийся больницы, тихий и зажатый; и чтобы он не так боялся, Зайка рассказывала ему что попало. Она отлично импровизировала сказки. Мальчик однажды дал ей яблоко. Мальчик этот впоследствии вырос, и из него тоже получился человек; это и было, вероятно, самым ценным результатом всего, о чем здесь рассказано.</p><p class="subtitle">33</p><p class="p1">В день отъезда Ятя пошел трамвай.</p><p class="p1">Это был намек столь явный, что уже почти неприличный: убирайся, мол, со всеми удобствами! гладкий тебе путь! Ять проснулся от характерного дребезжания: когда трамвай шел — весь дом вздрагивал. Ощущение было и привычное, и незнакомое — из позапрошлой жизни. Раньше, однако, эти дребезжания повторялись с интервалом в полчаса, но теперь прошло часа два, прежде чем прополз второй.</p><p class="p1">Внизу двое худосочных мужиков со звоном долбили ломами мостовую — без всякой видимой цели, однако имели такой вид, какой, помнится, однажды напустили на себя родители: Ятю было лет пять, он капризничал, и его не взяли гулять на острова. Отец и мать преувеличенно радовались, подчеркнуто не обращали на него внимания, громко и с удовольствием обсуждали предстоящую поездку — миленькая, возьмем лимонаду? — да, и непременно груш… Мать ненавидела груши, а он обожал, разговор велся специально для него — чтобы он раскаялся по-настоящему, увидев краешек прекрасной жизни, в которую его не пустили. Так и тут — все с преувеличенной сосредоточенностью занимались строительством, восстановлением, перераспределением, хотя результата, по чести сказать, пока не было; город продолжал разрушаться, трескаться, сыпаться, и не в силах новой власти было ему помочь, — однако она бешено суетилась на руинах, словно процесс распада никак не должен без нее обойтись. И он послушно ускорялся. Ять с тихой радостью ждал последнего своего петербургского дня, боясь его торопить (прежний Ять все опасался бы, что не выпустят, — новый, однако, ни в чем не сомневался, знал, что уедет). Поезд отправлялся в час дня. Ять встал, оделся, неспешно собрал немногочисленные, как всегда, пожитки, взял денег, тщательно упрятал записную книжку с гельсингфорсскими адресами (у всех там, оказывается, было множество знакомых — рекомендовали ему даже русскую газету, выходившую уже полгода), прошел на кухню, где доедали картошку дворничихины дети… Дворник теперь по утрам был дома — чай, не царское время, когда полагалось мести с рассвета. Ять налил себе кипятку из общего большого медного чайника, заварил брусничного листа, которым в девятнадцатом году заменяли чай, и сел к столу.</p><p class="p1">— Уезжаю я сегодня, — сообщил он детям.</p><p class="p1">— В Америку? — готовясь за него обрадоваться, спросил младший. Ять как раз недавно рассказывал им о Колумбе.</p><p class="p1">— Поближе. На север.</p><p class="p1">— В Лапландию? — понимающе уточнил старший.</p><p class="p1">— Вроде того.</p><p class="p1">— На когда? — деловито поинтересовался младший. Ять неопределенно улыбнулся. Что такое «насовсем», детям долго было объяснять.</p><p class="p1">— Ага, — сказал младший и утратил к Ятю всякий интерес.</p><p class="p1">Со столяром он прощаться не стал, но столяр поджидал его за дверью. Рожа его не обещала ничего хорошего — он пил третий день, но хитрая интуиция всех пьяных и сумасшедших подсказала ему, что Ять исчезнет именно сегодня. Он его караулил.</p><p class="p1">— Ах ты, — сказал столяр, но тут встретился с Ятем глазами.</p><p class="p1">— Ну? — спросил Ять. — Что сказать хотим али так стоим?</p><p class="p1">— Ехай, ехай, — вяло буркнул столяр и повалился на ступеньки, заснув еще в падении.</p><p class="p1">Видно, я и точно призрак, подумал Ять.</p><p class="empty-line"/><p class="p1">Он вышел из дому в одиннадцать, с хорошим запасом, думая напоследок взять извозчика, — но тут как раз подошел третий за день трамвай, и Ять вскочил в него. На лице вагоновожатого (так отчего-то называли водителя трамвая, словно вагон был отрядом, а он вожаком) проступило явное неудовольствие оттого, что Ять успел. Прежде на лицах вагоновожатых читалось гордое и доброжелательное сознание своей значимости (вот, господа, у нас есть электрическая конка, и мы вместе служим прогрессу, осваивая ее). Да и трамвай был не тот — коричневый, лаковый, — а обшарпанный, словно решительно приобщившийся к новой жизни, в которой не было никаких излишеств вроде внешней опрятности. Пассажиров было двое — матрос да баба с огромным мешком в бурых пятнах; от мешка разило гнилым мясом. Вскоре оба сошли. То ли везли человечину — прятать, то ли конину — жрать.</p><p class="p1">Трамвай полз медленно, церемониальным маршем, и у Ятя было время взглянуть на все в последний раз — вовсе без той надрывной жалости, которую он иногда пугливо предполагал в себе, представляя этот последний день. Да, я оставляю эти дома, которые видел столько раз, что перестал замечать; вот мозаика — дымы, трубы… Вот окно, вечно горевшее напротив: все собирался зайти перед отъездом, но так и не зашел — слава Богу! Мне все мечталось, что там девушка грезит над книгой или отрок слагает стихи, а там небось сидел один из тех могильных воров, которых давеча, если верить «Красной», расстреляли: сидел и переплавлял золотые коронки… (А между тем за окном, горевшим напротив, жила прекрасная семья — с веселыми детьми, множеством приятелей, с домашними концертами и альбомами сказок в картинках — пять томов домашнего фольклора; в трудные времена тут сохраняли бодрость и гордость и были бы рады ему.) Я оставляю все это — и, как ни странно, без тени сострадания. Участь свою они выбрали сами. Трубы проголосовали, дома не возражали, азбука покорно сдалась на растерзание, книги прыгнули в огонь, люди встали на четвереньки. Я жил в этом городе, и город был моим — но никогда вполне; земля тряслась у меня под ногами, как этот трамвай… Вагон дернулся, остановился, и в него ворвался вопль небритого красноглазого мужичонки, ораторствовавшего с фонарной тумбы:</p><p class="p1">— Ребенок говори: хочу, взрослый говори: на! Не допускать, чтобы большой начальствовал. У малого свои права: хочу так, пойду здесь! Домашний зверь не раб, коза не слуга, конь не швейцар, — так и дитя тебе не машина: поди сюда, скажи то! Дитя само знает; тянет каку в рот — дай каку, в каке полезный элемент!</p></span>
