<span><p class="p1">— Но, может быть, поначалу все было иначе? — спросил Ять, рассматривая витрину с предметами таинственного назначения. Больше всего она напоминала клингенмайеровский шкафчик с талисманами, но те талисманы, при всей их обшарпанности, обладали по крайней мере понятным происхождением: каблук, огарок, спичечный коробок… Здесь же ничего было не понять: костяная трубка с отверстиями, вроде флейты, но изогнутая в форме буквы Z; деревянный шарик с вытравленными пятнами — глобус небывалой планеты… — Почему вы не допускаете, что поначалу ваши альмеки были грубыми и неотесанными существами, потом вступили в период расцвета, изнеженности, стали, как римляне, позволять себе все больше бессмысленных изделий и празднеств… а потом надстройка попросту задушила базис, как оно всегда и бывает?</p><p class="p1">— Все это марксизм, — поморщился Зуев. — Мы разрыли все побережье и чуть ли не весь Аю-Даг, но не нашли ни единого свидетельства в пользу вашей, версии. Альмеки с самого начала были цивилизацией предельно усложненной, но отчего-то в первые пятьсот лет ее существования всему населению хотелось соблюдать ритуалы, а потом это стало уделом жрецов… пока и жрецы не бежали в степи от скифских завоевателей. Их задушила сложность, но последние были верны закону так же, как и тысячу лет назад. Этих-то последних и встретил Луазон в таврическом путешествии, когда по приглашению Екатерины посещал Гурзуф. Ять вздрогнул. Луазон преследовал его.</p><p class="p1">— Это тот Луазон, который синергетик? — спросил он, не желая изобличать собственное невежество.</p><p class="p1">— Ну да, — небрежно кивнул Зуев, — он и теорию свою бредовую вывел отсюда. Конечно, это не были уже собственно альмеки — так, кто-то из потомков… Они вышли потом из степей, стали жениться на дочерях местных пастухов, рассказывали легенды о былом богатстве и величии — я записал их, вот свод, — он показал пухлую рукопись. — Луазон сидел на берегу, когда к нему подошел оборванный старик и протянул для продажи сложную конструкцию из ракушек и веток — один из знаменитых альмекских силков, хотя никакими силками это, конечно, не было. Ни одна птица не поймается в такую сеть. Для чего они служили — мы до сих пор не знаем. Луазон заговорил со стариком. Тот рассказал ему о великом государстве, жившем на этом берегу и погибшем от скифского нашествия, а Луазон изложил историю в «Началах». От него и пошло это сообщение, как Атлантида от Платона. Он, кстати, уверял, что альмеки и есть потомки атлантов, которых весь мир тщетно искал в Америке. Но это уж полный бред.</p><p class="p1">— А письменность их расшифрована? — спросил Ять. Зуев усмехнулся наивности собеседника.</p><p class="p1">— Понимаю ваше любопытство. У альмеков не было письменности. Мир собственных представлений казался им слишком сложным, чтобы его описать. Они не верили в письменность. Цифры были — очень простые, похожие на римские. А описания они считали делом излишним: все, что порядочный человек должен знать, может поместиться в его памяти.</p><p class="p1">— Но откуда тогда знание обо всех их ритуалах, да еще в таких тонкостях?!</p><p class="p1">— Ну, милый друг, — развел руками Зуев, — существует же огромная литература! Просто ее никто не принимал всерьез — альмеков считали вымышленным племенем, сатирой на клерикалов, на жрецов… Зачем письменность тому, кто и так навеки запомнится? Описания их ритуалов сохранились во множестве рукописей, есть целый трактат Авзония, римского поэта времен упадка, «О благонравии»: его долго считали сатирой, пока я не доказал, что Авзоний бывал в Гурзуфе! Приезжие так поражались обычаям альмеков, что записали практически всё. Да и у Овидия в «Ex Ponto» находим важные свидетельства — многое, конечно, по слухам, но кое-что воспроизвел точно.</p><p class="p1">Ять перешел к противоположной стене: там висели две гравюры, на которых маленькие бородатые человечки с мрачным и сосредоточенным видом кружились вокруг приземистой пушечки.</p><p class="p1">— Ритуал заряжания альмекской пушки. Я мог бы воспроизвести полное ее название, но в нем двадцать один слог, — пояснил Зуев, заметив его интерес. — Здесь Михеев сильно упростил — они бегали вокруг нее не по кругу, но по довольно сложной фигуре, больше всего похожей на правильный двенадцатиугольник. Самое любопытное, что огнестрельное оружие они знали уже во втором-третьем веках до нашей эры, хотя порох у них был не чета нашему, совсем другой состав. У меня своя версия, но сосед мой — он химик — утверждал, что такая смесь не взорвалась бы. Нет специалистов, не с кем обсудить… Войны свои они проигрывали одну за другой — поначалу, конечно, спасали вот эти пушечки, но первые-то их противники соблюдали какие-никакие правила, а следующие уже ничего не хотели знать. Пока альмеки брались за оружие — а это сложнейшая была процедура, из двадцати трех примерно стадий, — те уже успевали ринуться в атаку. А ни один альмек без ритуала за меч не хватался, да и мечи у них были так себе. Пока кузнец выполнял все нужные приседания да бормотал заклинания, железо успевало остыть. Ну вот, они, бедняжки, только начнут выкликать свои клики, а тут уже конница… куда было деваться? Пару раз их пограбили, а потом выгнали. И никакого бы следа не осталось, если б не Луазон да не вот эти предметы… — Он кивнул на витрину.</p><p class="p1">Следы альмеков были в самом деле немногочисленны. Больше всего свидетельств осталось в Гурзуфе, ныне жалком поселке, а в конце дохристианской эры — мощном центре альмекской цивилизации. Без многоступенчатого ритуала альмеки не делали ничего, однако странней всего было то, что их изощренная, напряженная религиозная жизнь никак не коррелировала с бытом, домашними обязанностями и сельскохозяйственными работами. Кажется, ни в одной другой религий мира культ не был так слабо увязан со сбором винограда, посевом пшеницы и наступлением холодов. По счастью, на побережье изобильно произрастали оливы, виноград, на тучных горных пастбищах паслись козы и овцы — земля плодоносила при минимуме человеческих усилий, а потому все остальное время можно было спокойно предаваться отправлению культа.</p><p class="p1">…Горько было думать о последних днях альмекской цивилизации, с фанатичным упорством сохранявшей себя даже тогда, когда насущнейшим вопросом для альмеков было уже не сбережение традиций, но выживание как таковое. Не каждый день находя пищу, ютясь в жалких степных жилищах, неумело построенных из камыша и глины, они каждое утро встречали рассвет бесконечно длинным ритуалом — и, не успев толком выспаться, провожали солнце. И если бы Ять задумался когда-нибудь о проекте памятника человечеству — истребившему себя или истребленному катастрофой вроде нового ледникового периода, — он ничего не придумал бы лучше, чем изображение двенадцати альмеков, встречающих степной рассвет. В конце концов, если солнцу и стоило зачем-то взойти во времена позднеальмекской цивилизации, то исключительно ради танца в бескрайних Барабулинских степях.</p><p class="subtitle">7</p><p class="p1">Скучен был год 1917-от Рождества Христова, но март 1918 года был еще скучнее. И если был в этом году унылый город, то это был Петроград. Гибель его не определилась, а потому кое-кто еще надеялся; в мире нет ничего более жалкого и менее творческого, чем надежда, а уж надежда на милосердие и расцвет принадлежит к числу самых бездарных, так называемых общественных. Надежда парализует. Человек надеющийся живет, как иные сидят в приемной у дантиста. Он боится пошевелиться и сам не скажет, на что, собственно, уповает. Больно будет все равно. В надежде есть что-то умоляющее.</p><p class="p1">Но еще более омерзительны люди, не способные обольщаться и на заре каждой новой эпохи мрачно предрекающие новое падение нравов; искренний скептик вызывает сострадание, но большинство скептиков заботится лишь о собственной правоте. Это самодовольные, любящие покушать существа, чей скепсис, распространяемый на все человечество вкупе с его прошлым и будущим, обычно испаряется, когда заходит речь о карьере и рационе самого мыслителя. Правда, аппетит некоторых мыслителей есть лишь следствие глобального пессимизма, желание жрать у них вызывается причинами метафизическими — все дрянь, так хоть нажремся. Слово «жрать» Хламида произносил с особенным чувством. Он говорил уже сорок минут. Первое заседание «Всеобщей культуры» проходило в голубой гостиной. Редеют, редеют наши ряды, думал Казарин. Правда, Хламида привел человек семь новых — как он уверял, из очень, очень талантливой молодежи; рекомендациям его, как всегда, можно было верить ровно до тех пор, пока талантливая молодежь не перерастет хвалителя. Молодые были заносчивы, бледны, с некоторым вызовом оглядывали присутствующих, вертя гладко причёсанными, однако явно давно не мытыми головенками.</p><p class="p1">— Я — знаю пессимистов, это — легко, — покашливая чаще обычного, говорил Хламида. — Проще всего сказать: мы бережем белизну одежд своих и от грубой жизни держимся подальше, политикой же не занимаемся вовсе. Но культура никогда не служила политике, хотя марксисты и трактуют ее как всеобщую наложницу, которая с кем делит кров, тому и принадлежит. Должны ли мы, презирая власть, отказываться от кровного дела своего — созидания всемирной культуры? «Никак», любил отвечать один публицист, более известный под именем Павла. Прислуживаем ли мы власти, занимаясь делом жизни своей? Никак: мы служим детям нашим и детям детей наших.</p><p class="p1">Глава издательской коллегии, как называли теперь елагинцев, все говорил и говорил, не забывая влажнеть глазами в трогательных местах. Наконец он сделал особенно долгую паузу, закурил и закашлялся.</p><p class="p1">— Простите назойливость мою, — сказал он глуше обычного, — говорить — не с кем, а писать — не все напишешь. Я болтать люблю, а слушателей — нет у меня.</p><p class="p1">— Переселяйтесь к нам, — нелюбезно пригласил Алексеев.</p><p class="p1">— Рад бы в рай — грехи не пускают, — виновато улыбнулся Хламида. — В доме приживальцев и гостей полно, я сам-девят, да и… суетлив я очень для академической жизни. Бегать надо то в редакцию, то в издательства, а от вас — далеко будет. Впрочем, если сбудутся прогнозы скептиков и всем нам рано или поздно дорога за Можай, то там заживем все вместе — надеюсь, дружно. Я — сидел, это — нетрудно» а впрочем, не будем уподобляться глупой птице, которая все хочет накликать бурю на голову свою.</p><p class="p1">Елагинцы переглянулись. Столь явного отречения бывшего романтика от собственных ранних иллюзий не ожидал никто.</p><p class="p1">— Да-с, много ерунды пустил в свет, а потому прошу: когда будем составлять том современной поэзии, меня не включайте… нет — не включайте. Молодые несмело заулыбались. Для них Хламида был мэтром.</p><p class="p1">— Что ж, приступим. Каковы, господа, будут предложения ваши по составу первых тридцати томов?</p><p class="p1">К заседанию готовились тщательно: вся питерская профессура была дружна, а потому в коллегию был приглашен известный античник Локтев. Он переселился бы в коммуну охотно, ибо давно уже вдовел и сильно страдал от одиночества и недостатка ухода, — однако боялся оставить коллекцию и библиотеку, которые, впрочем, мало кому были нужны в Петрограде 1918 года.</p><p class="p1">— Я полагаю, — звучным лекторским голосом, который непонятно как умещался в тщедушном, скрюченном тельце, заговорил Локтев, — что архаическим литературам следует уделить как можно более места. Народу всегда ближе эпос, и собственный мой опыт показывает, что представители любого народа, даже самой необразованной его части, восторженно воспринимают эпические поэмы, относящиеся к временам, так сказать, детства человечества. Начать библиотеку всемирной словесности должен, по моему разумению, Гомер, чьи права неоспоримы…</p><p class="p1">— Отчего же не Библия?! — с горячностью встрял Корнейчук. — Простите меня, Виктор Васильевич, но если говорить о древности, то древнее Книги Бытия вряд ли есть литературный памятник…</p><p class="p1">— Вы позволите? — вступил в разговор Ловецкий. — Мне кажется, что, начав библиотеку с Библии, простите за тавтологию, мы думаем не столько об интересах литературы, сколько о манифестации…</p><p class="p1">— Я думаю, сегодня такая манифестация весьма уместна, — твердо сказал Долгушов. — Это с самого начала заявляет нашу позицию…</p><p class="p1">— Господа, Библия есть в каждом доме, часто во множестве экземпляров, — не соглашался Локтев, любивший Грецию и не любивший попов. — Самый необразованный крестьянин знает, за сколько дней Бог сотворил мир, и понятия не имеет, сколько лет продолжалась осада Трои. Между тем насчет творения мира за семь дней все довольно спорно, а насчет осады Трои Шлиман доказал неопровержимо, что…</p><p class="p1">— Виктор Васильевич, голубчик! — простонал Корнейчук. — С гимназических времен помню все про осаду Трои и не знаю, сделала ли меня эта история хоть на йоту человечнее. Кроме плача Приама и Ахилла, не нахожу там трогательного эпизода. Библейские же легенды — разумеется, с тщательным научным комментарием — способны напомнить о фундаментальных ценностях человеческого сообщества…</p><p class="p1">— Вы имеете в виду комментарий разоблачительный? — точно выбрав момент, подал голос Казарин. — Так сказать, утверждение литературной ценности с попутным разоблачением культа?</p><p class="p1">— Я не давал вам повода, Вячеслав Андреевич! — взвился Корнейчук.</p><p class="p1">— Я только предположил, — пожал плечами Казарин. — Мне кажется, что Совкомпом… или как это в точности называется… не будет приветствовать издание религиозной литературы, хотя бы и в научных целях.</p><p class="p1">— Я полагаю, господа, — оборвал полемику Хламида, окая сильнее обычного, — что издание одной только Библии было бы несправедливым в стране многих верований, как Россия. Я полагаю, что Библия с кратким научным комментарием должна быть издана вместе с Кораном и Ведами на правах дополнительных томов, не в самой библиотеке, а как бы при ней (он нажал на «при»). Воля ваша, я в церковь не хожу, но воспринимать эти сочинения как чисто литературные, кто бы их ни продиктовал, мне не удается. Значение их иное, а потому, уважая предложение Николая Ивановича, я предложил бы начать уж с Гомера… ибо по нему не крестят, не женят и не отпевают.</p><p class="p1">По Средневековью прошлись галопом. Видно было, что никто его особенно не любил. К семнадцатому веку, однако, набралось уже двадцать томов из тридцати задуманных; почти невозможно было вообразить пролетария, который после рабочего дня, хотя бы и восьмичасового, и проведенного в статусе хозяина жизни, взялся за Сервантеса. Некоторое время поспорили о том, включать Рабле в полном виде или адаптировать, — Хламида заметил, что убирать непристойности «никак невозможно», ибо они и сыграют роль главной приманки для пролетариата, тем самым приблизив к нему глубокое гуманистическое содержание. О Рабле Казарин помнил только — и то из университетских лекций, — что там подтираются гусенятами. Это было по-пролетарски.</p><p class="p1">— Зато Шекспира, — предположил Долгушов, — я включил бы почти полностью, ибо самая логика его пути есть увлекательнейшая драма и главный аргумент против гипотез о коллективном авторстве.</p><p class="p1">— Об актере Шекспире, — насупился Хламида, — спорят весьма много и, смею сказать, бесплодно. Народный наш комиссар Чарнолуский, которого честь имею знать и любить с пор уже незапамятных, по склонности своей к авантюризму популяризует сюжет о графе Рэтленде. Любит он этого графа, как иная простая девушка любит почитать о виконтах. (Казарин не преминул заметить про себя, что в самой слабой из пьес Хламиды про виконтов читала проститутка; хорошо же он думает о наркоме, — рассказать к случаю.) Главное доказательство рэтлендианцев — некие Розенкранц и Гильденстерн в списке однокашников оного графа. Я хоть и признаю это убедительным, а — не верю: ну, может, рассказал он Шекспиру, а? Или, может, всех датчан звали они в те времена Розенкранцами и Гильденстернами, как в Италии иной простолюдин зовет всех русских Иванами?</p><p class="p1">— И потом, — развязно заговорил кто-то из молодых, — я не верю, чтобы заветную вещь можно было напечатать под псевдонимом. В любом, кто пишет под чужим именем, легко заметить неискренность. Не случайно большинство революционеров, и Ленин в частности… непременная кличка, чаще всего со значением…</p><p class="p1">Повисла неловкая пауза. Юноша и сам понял свою ошибку — конечно, это была случайная бестактность, а не сознательная попытка уязвить Хламиду, ни строки не напечатавшего под собственным именем.</p><p class="p1">— Бывает такой псевдоним, что прирастает, — заметил Казарин. Он почел для себя более выгодным защитить в этой ситуации Хламиду — трудного противника, но полезного союзника. — «Ленин» — гораздо точней его природной фамилии, которой я и не припомню; если бы не умственная лень русского народа, кто поверил бы ему?</p><p class="p1">— С Лениным иначе, — Хламида успел кинуть на Казарина быстрый благодарный взгляд. — Он, я думаю, сознательно выбирал. Лишний он тут, и сам понимает, что лишний. Посмотрите, какой ряд выстраивается: Онегин — Печорин — Волгин (ежели вы «Пролог» читали, скучнейшая, кстати, книга) — Ленин. Он — один такой среди них, практик еще небывалый, и — тяжко ему среди демагогов и спекулянтов марксистских…</p><p class="p1">Казарин представил себе Ленина в онегинском боливаре, потом в уединенном кабинете за полировкой ногтей и, наконец, у постели дяди: дядя был отчего-то с плехановской бородкой. Ленин сидел на стуле у постели родственника, не доставая до полу короткими ножками. На его круглом лице читалось низкое коварство.</p><p class="p1">— Нельзя не ценить стремлений Уайльда к прекрасному, — настаивал между тем Хламида, — ибо любовь его к красоте, пусть извращенная, есть уже протест против свинцовой мерзости жизни, как писал у нас ровесник его… Странно, оба прожили по сорок четыре года — и оба были, в сущности, эстеты. А ведь и в пьесах их есть сходство, бесплодные разговоры вымирающих, но умных и прелестных дворян, людей легких, учтивых… (Как все люди внешней, книжной культуры, он высоко ценил учтивость и родовитость.) Я читаю и — горжусь человеком: понимает, что вымирает, а — острит! И обоих ругали циниками, и даже, — Хламида увлекся собственной мыслью, — оба почти в одно время в каторжной тюрьме побывали, только один за содомию, а другой добровольно! И чеховский «Сахалин» — чем не «Баллада Рэдингской тюрьмы», только русская?! Уайльд ведь тюрьмы — искал, на тюрьму — напрашивался, ибо устал от ее величества королевы Виктории. А Чехов… кто знает, зачем он поехал туда? Я — спрашивал, он — отшучивался… Думаю, все от того же, от мелочности жизни нашей. А может, пострадать хотел, а — в революцию не мог идти: народнической пошлости боялся, террора не любил… Чехов же, если задуматься, — единственный русский писатель, которого посадить было не за что! — И он громко расхохотался.</p><p class="p1">«Ну, новые-то нашли бы», — подумал Казарин.</p><p class="p1">— А — не сделать ли нам и впрямь общего тома для них? — все больше распалялся Хламида. — Таких параллельных изданий — не было еще, а сходства ведь бывают разительные! Взять, скажем, Надсона и Рембо, двух гениальных юношей, кои…</p><p class="p1">Про двух гениальных юношей Казарин слушать не стал из понятной неловкости и привычно замкнул слух, переключившись на собственные мысли. Он представил встречу Надсона и Рембо где-нибудь в Париже. Они пили абсент. Надсон все время кашлял, сплевывая в платок, и Рембо смотрел на него со смесью омерзения и восторга. Отчего-то в пару русскому писателю Хламида непременно находил содомита, словно компенсируя недостаток любви, от которого так страдали лучшие из наших певцов.</p><p class="p1">— Позволю себе подвести итог, — тонким голосом заметил один из молодых, самый длинный и важный. Он оказался секретарем коллегии — как-то вдруг, не будучи даже никому представлен; Хламида его, в сущности, кооптировал, втайне не доверяя демократическим процедурам на русской почве, где все обязательно вырождалось в бесплодный спор о формальностях. — Гомер — один том, Лукреций, Вергилий и Овидий — один том, архаические эпосы малых народов — один том…</p><p class="p1">Хламида слушал внимательно, не забывая делать бумажные кораблики. Вдруг он коротко засмеялся:</p><p class="p1">— Это, знаете… напомнило мне, как сидел я однажды в Нижнем в гостях у Мудрова, старовера. Очень скучал богатством своим и любил поговорить об культурном, а — не с кем было. Я ему, понятно, талдычу про издание книг для народа, а он — мне: что издавать-то? Список набросайте… А дел у меня, кроме того списка, было по горло: семью кормить, писать; у него просить — не решался я… он дал бы, да что за охота? Но — не должно упускать случая сделать добро. И вот — ночь, жена — спит, а я — список ему кропаю: Толстой — два тома, Тургенев — один, Достоевский — один (хоть и не люблю я его, а — надо)… День жду, два жду, когда он за мной пришлет, — нет от него ничего! Наконец сам еду. Обычно-то меня прямо к нему самому проводили, а здесь — ждите, доложим; ну, жду, а себя уж проклинаю да и список свой заодно. Наконец перепуганный лакей возвращается: пожалуйте на второй этаж. Во втором этаже вхожу я в мудровский кабинет — батюшки! Сидит Мудров в одном белье, а с ним белошвейки, он фабрику учредил для девочек-сирот, благотворитель… Девочки лет по тринадцати-четырнадцати, голенькие, так вокруг него и вьются, — самое-то страшное, что визжат от удовольствия! Да… В углу, в кадке, розги мокнут… А он сидит среди них, как сатир, — видно, что ничего еще не делает, только распаляется… И мне кричит: ай, писатель, вовремя! Айда к нам! Вишь, какое веселье! А я-то ему — со списочком… вообразите!</p><p class="p1">Таких историй, о странных, извращенных мерзостях, Хламида знал множество, и почти все они были с, голыми девочками. Именно их рассказыванием он и составил себе репутацию знатока жизни, хотя знал о ней почему-то лишь вещи определенного свойства. Все поднялись расходиться. Хламида покашливал, стоя в кружке молодых. Казарину хотелось пару слов сказать Корнейчуку, ставшему вдруг необычайно жалким в своем потертом пальто.</p><p class="p1">— Николай Иванович, — мягко сказал Казарин, — не хочу вас обидеть, но неужели вы можете во все это верить всерьез?</p><p class="p1">— Всерьез? В это? Нет, конечно! — засмеялся Корнейчук даже несколько громче, чем нужно.</p><p class="p1">— Но тогда зачем же?</p><p class="p1">— Зачем же? Почем я знаю! А зачем все? Неужели в литературе больше смысла? Или в революции, от которой только прибавилось запрещений и беспорядка? Вот вы, Вячеслав Андреевич, — неужели не перестали бы писать на необитаемом острове?</p><p class="p1">— Только там я и писал бы по-настоящему, — вздохнул Казарин. — Не мешает никто…</p><p class="p1">— И сейчас никто не мешает! — вдохновенно воскликнул Корнейчук. — Создавать план книгоиздательства — и не издавать книг! Не держать корректур, не вылавливать опечаток, не заботиться о реализации! Это же наивысшее блаженство, литература в чистом виде… Да еще и чай горячий. Какого другого рая надо литератору? Мне обещали крупы для детей…</p><p class="p1">— Да ведь время-то тратится ни на что…</p><p class="p1">— Почему ни на что?! — возмутился Корнейчук. — Мы коллегиально выбрали сегодня лучших представителей мировой литературы, построили и опровергли оригинальную теорию о Чехове и Уайльде, в течение трех часов смотрели на человеческие лица и слушали человеческие слова… Или вам мало, Вячеслав Андреевич?</p><p class="p1">— Мало, — сказал Казарин и отошел. Пламень, сжигавший его, ни в чем не находил выхода.</p><p class="empty-line"/><p class="p1">Побеседовав с молодыми и пообещав им просмотреть рукописи будущего альманаха «Тысяча вторая ночь», Хламида спускался на первый этаж Елагина дворца. Его почтительно сопровождал длинный секретарь.</p><p class="p1">— А вы не думали пригласить в коллегию — он смущенно назвал имя поэта, о котором Хламида и сам давно думал — чаще, чем хотелось бы.</p><p class="p1">У них никак не складывалось даже самых поверхностных отношений, какие связывают иногда литераторов. Хламида, если уж начистоту, боялся приближаться к нему. В этом человеке, не похожем на прочую литераторскую братию, была почти невыносимая правда, и Хламида боялся ее тем сильней, что в болезненной, патологической честности самого поэта усомниться не мог никак. Всего ужасней было то, что поэт с радостной готовностью встречал гибель культуры — той культуры, в которой Хламида видел панацею. Оно и понятно: поэт был сам — культура, да еще многовековая, от профессорского корня, потому и мог себе такое позволить. Хламида сознавал эту разницу и потому втайне его сторонился, а презирать — не мог. Он выучился презирать почти всех, с кем разошелся, всех, кого считал ниже себя по таланту или значению, но с поэтом все было не так просто. Только вчера они встретились у Чарнолуского, был короткий разговор — и оба снова не смогли сказать друг другу ничего существенного.</p><p class="p1">— Он — болен, — глухо ответил Хламида секретарю. — Душевно болен. Я — виделся с ним вчера. Он рассказывает странное. Говорил, что озлобился. Шел вчера по улице и увидел мальчика, маленького мальчика, просто стоявшего у стены. И — вдруг, без всякой причины, сильно толкнул его… После очень раскаивался, кинулся искать, но мальчика, конечно, уже и след простыл. Нет, ему — не до работы теперь.</p><p class="p1">— А читали вы… — секретарь назвал недавнюю поэму в «Знамени труда».</p><p class="p1">— Читал, читал. Это — плохо, это — нерусское у него. Тоже болезнь, если хотите.</p><p class="p1">К себе Хламида возвращался пешком. Мальчик, мальчик… Что за странную историю, в самом деле, выдумал поэт с этим мальчиком, зачем вчера, в приемной, рассказал ее? Был хмурый оттепельный вечер, небо, напитанное влагой, висело над самыми домами Петроградской стороны. Вокруг шуршало, капало, хлюпало. С чего же ему так злобиться? Впрочем, он и всегда был злой. Честные люди не бывают добры, они вечно помешаны на своей правде — что в ней толку? Поневоле начнешь бить детей… Хламида вздрогнул: в высокой арке, ведущей во двор, мелькнул в тумане силуэт ребенка, съежившегося у стены.</p><p class="p1">— С ума я схожу, что ли, — сказал он вслух, по инерции сделал еще несколько шагов, развернулся и побежал назад.</p><p class="p1">В арке было пусто. Да и пойди пойми в таком тумане, был ли мальчик.</p><p class="subtitle">8</p><p class="p1">Между тем декрет от 5 января об отмене орфографии, из-за которого и произошли все описываемые события, исполнялся из рук вон плохо, то есть не исполнялся вовсе. В «Нашем пути» от 17 марта появилась заметка следующего содержания:</p><p class="p1">«Труб самодержавия еще смердит. Целлесообразно, кажеться, наконец сделать все, штоб у антенародново элемента вырвали жало. Омирзительные враги пятнают наш стяк и гризнят его, но мы идины и непобедимы. Много еще затрад придстоит нам, мосштаб битв неописуем. Но жызнь возьмет свое!»</p><p class="p1">Краткое редакционное послесловие просило снисходительно отнестись к произведению полуграмотного, но искреннего бойца революции, матроса Убытко, лично принесшего в редакцию свой первый опус.</p><p class="p1">«Надеемся, что читатель наш не станет по-гимназически подчеркивать красным карандашом ошибки начинаюшего публициста», — лукавил в заключение безымянный комментатор.</p><p class="p1">— Что-ж, подчеркнем, — прищурился Комаров-Пемза.</p><p class="p1">Неверное пламя пятнадцати свечей трепетало в сыром подземелье. Глубоко в катакомбах, в подземных ходах Елагина острова вернейшие ученики, навещавшие строгого, но любимого преподавателя даже после упразднения его должности, продолжали изучать русскую орфографию. Разумеется, никто не мешал бы им заниматься этим и в его аскетически строгой комнатке на втором этаже дворца, но самая подпольность и таинственность служили лучшим стимулом к запоминанию правил, сделавшихся вдруг необъяснимо привлекательными. О подземном ходе, ведущем из кухни неизвестно куда, Пемзе рассказала Ашхарумова.</p><p class="p1">— Подчеркнем, — предложил Пемза Коле Соловцову, славному, веселому мальчику, только что от души хохотавшему над матросской публицистикой.</p><p class="p1">— Труб, — уверенно начал Коля. — Следовательно, подчеркиваем Б. Сомодержавие… О. Целлесообразно… здесь, по-моему, ненужное удвоение? Л…</p><p class="p1">Через пять минут у Коли, к общему восторгу, получилась фраза «Большевики идиоты».</p><p class="p1">Тени метались, вытягивались, чудовищно длинными руками норовили схватить друг друга. Только здесь, в катакомбах, и стоило учить, только отсюда и мог разлиться по миру свет истины. Пемза придумал и конспиративные клички — Стеклянный, Оловянный, Деревянный, Звезда, Гнездо, Седло, Белка, Лес, Бес… Все они были теперь исключениями из правил, так что и имена следовало подобрать соответствующие.</p><p class="empty-line"/><p class="p1">— Бес человечный, — хихикнула Таня. — Бес честный. Бес путный.</p><p class="p1">Они лежали, тесно обнявшись, укрывшись всем, что удалось найти в зуевской мансарде. Ночами было все еще так холодно, как бывает только на юге, близ моря. И это была отдельная игра — укутываться, греться, устраивать нору; потом остывать, сбрасывая с себя все эти пальто, платки, шали; потом снова сооружать гнездо…</p><p class="p1">— И что, теперь можно писать «без» через «с»?</p><p class="p1">— Вероятно. Теперь все можно.</p><p class="p1">— Послушай, но это прелесть! Представь себе только этот легион! Бес толковый. Вдумчивый, солидный бес, им одержимы серьезные люди…</p><p class="p1">— Бес платный. Он соглашается одержать — одерживать? — только за деньги, долго пишет договор, шуршит купюрами…</p><p class="p1">— Бес совестный. Им одержимы мыслители вроде графа Толстого.</p><p class="p1">— Бес кровный, отвечающий за кровную месть. Бес телесный, бес плотный — эти понятно чем заняты… Скоро их будет у нас больше, чем божеств у альмеков!</p><p class="p1">— О-о, мне кажется, проснулся бес телесный! — Она куснула Ятя за ухо. — Жил-был Ять, у него был ер…</p><p class="p1">Да, твердый знак — идеальный эвфемизм, если вдуматься. Как естественно и ясно было с ней все, что так мучило его с другими, — и как сладко и болезненно было это воссоединение с собой, мгновенное пробуждение к жизни, новое привыкание к себе самому.</p><p class="p1">— Ты ничего не можешь рассказать — что там, как там…</p><p class="p1">— Да откуда же мне знать, Таня? Что я должен помнить? Вот я лежу сейчас, здесь, — и слышу море, и хрип зуевских часов, и нас с тобой, и все это так ясно, что буду помнить и через десять, двадцать лет… Вот на чердаке у него что-то шуршит…</p><p class="p1">— Там летучие мыши. Правда, я видела! Днем висят вниз головой, а ночью шуршат.</p><p class="p1">— Ну, пусть будут мыши. Видишь, теперь я всегда буду помнить мышей. А там… ну представь, что ты на все смотрела одним глазом, да еще полуприкрытым.</p><p class="p1">— Да, знаешь, странно. — Она села в кровати и укуталась в шаль. — Без тебя я как будто замечала любую мелочь, а появился ты — и все это смыло. Никогда не могла понять. То ли вправду не было ничего интересного, то ли у меня от счастья помрачение ума.</p><p class="p1">— Не от счастья, а со страху. Ты боишься, что я начну выпытывать про все, что с тобой было. Про всех, я имею в виду.</p><p class="p1">— Во-первых, ты не начнешь, а во-вторых, Ять, — святой истинный крест! — она перекрестилась, шаль распахнулась на груди, — я правда не помню никого! Если постараюсь, вспомню имена, может, род занятий… но вот как это было? Ять, ничего не было!</p><p class="p1">— А у меня было, — сказал он гордо. — Да. Да, мы нужны не только вам, мы всегда найдем какую-нибудь убогонькую…</p><p class="p1">— Бес честный, — засмеялась она.</p><p class="p1">— Так-таки никого не помнишь?</p><p class="p1">— Только одного, он был этнограф, путешественник. Вечно куда-то уезжал, а потом появлялся. А фамилии не помню… что-то связанное с частью, с неполнотой… Обрывков? Осколков?</p><p class="p1">— А меня ты помнила?</p><p class="p1">— Да я жила тобой все это время, неужели ты не чувствовал? Я только ждала, когда замолчит твое дурацкое самолюбие, из-за которого мы столько ссорились. Ты-то уязвил меня сильнее всех и знаешь это. Душа тобой уязвлена.</p><p class="p1">— Между прочим, ты тоже могла объявиться…</p><p class="p1">— Но разве я не объявлялась? Ты садишься в трамвай и видишь сгорбленную старушонку: это моя душа, уязвленная и брошенная тобой… скорчившись в углу… несчастная, жалкая…</p><p class="p1">— Танька! Дрянь! Где твоя совесть!</p><p class="p1">— Совесть? Моя совесть?! Ты смеешь мне говорить о совести?! — Она гладила, трясла, тормошила его, ее волосы падали на его лицо. Сколько раз за эти два года, разрешая себе подумать, да какое там, допуская, да какое, зная, что рано или поздно они сойдутся снова, — он предвкушал не только блаженство, но и ужас, с которым будет замечать в ней чужое: новые привычки, слова, ту Таню, которой она была с другими. Но в ней ничто не оставляло следа, словно малейшая перемена разрушила бы всю гармонию чудесно сложившегося облика. Ни к кому другому не мог бы он тянуться с такой радостью и жаждой, — может быть, судьба их и впрямь была сходиться и расходиться до конца дней, всякий раз заново ощутив всю полноту счастья и всякий раз не выдержав ее. Их встречи и разлуки похожи были на биение тайного ритма, и как знать — не билось ли сердце мира в эту дочь в зуевской мансарде? Так он думал, когда она заснула.</p><p class="p1">Или только казалось, что она спит? Ять поразился легкости, с которой она вдруг приподнялась и широко открытыми круглыми глазами уставилась на него. Был четвертый час ночи.</p><p class="p1">— И знаешь, — быстро зашептала она, словно в комнате был еще кто-то, — только с тобой можно говорить о том, что я вижу, например, за морем. Как только тут темнеет, и на набережной начинают ходить с фонариками — видел ты эти стеклянные, старинные, со свечками, — и как только звезды, я сразу вижу почему-то «Тысячу и одну ночь», витые башни, синее небо, и на одной из башен, в узком четырехугольном просвете, сидит старик в чалме, и перед ним ковер… Я прекрасно знаю, что ничего не было, что все было не так, — но вижу эту Турцию или Персию, в которой никогда не была и не буду. И обязательно ходят сторожа. Всю ночь обходят город. Но это я еще могу выразить, а знаешь, когда серое, или нет, такое желто-серое небо, старый гобеленный шелк, и все это над морем, — облака по горизонту, как паутина, — и вдруг какая-то воронка, как будто горловина огромной печи: там золотится и тлеет, и все это закручивается… нет, не могу; но ведь ты видел?</p><p class="p1">— Да, да, часа в четыре. Когда еще светло. Там будто какая-то мистерия, я в детстве всегда себе представлял эту небесную борьбу добра со злом, но мистерия… как тебе объяснить? Ведь это такой детский жанр, а дети так безразличны к настоящему добру и злу, что добро и зло в этих сказках всегда одной природы, как облака. То есть они борются, но это борьба сродных сил, показательная, что ли, — борьба-зрелище, за которой можно наблюдать, никому особенно не сочувствуя. Наблюдаем же мы за природой, никому не сочувствуя? Вот растет трава, вот осыпаются камни, и кто-то даже гибнет — но никто не гибнет насовсем. Вот если бы мне так научиться смотреть на мир, — понимаешь, просто любуясь, не беря ничьей стороны… Ять счастливо вздохнул.</p><p class="p1">— Теперь мы будем играть. Мы переиграем во все. Завтра ты будешь местная помещица, а я — знатный иностранец (на самом деле, естественно, беглый авантюрист), который скрывается в вашей глуши от кредиторов и морочит тебе голову, но сам не замечает, как влюбляется по-настоящему…</p><p class="p1">— Да, да. — Она снова легла и начала устраиваться уютнее — прижималась к нему то животом, то спиной, сворачивалась, разворачивалась, крутилась, щекотала, тормошила. — А потом ты будешь судья, а я разбойница… или нет, ты будешь богач, а я циркачка. Ты покинешь дом и уйдешь странствовать с нами, атлет будет тебя ненавидеть, потому что он любит меня…</p><p class="p1">— Я забыл тебе сказать, что познакомился с Машей Ашхарумовой.</p><p class="p1">— Маша? — обрадовалась она. — С кем теперь Маша? У вас был роман?</p><p class="p1">— Нет, что ты. У нее роман с Казариным, которого я терпеть не могу. Но она напоминала мне о тебе — отдаленно, конечно, отраженным светом, — и я избегал их обоих. Вероятно, это была зависть.</p><p class="p1">— Бес честный, — повторила она. — Ну и что, она счастлива?</p><p class="p1">— Не знаю. Кроме нас с тобой, никто не счастлив.</p><p class="p1">— Врешь, врешь. Если бы ты ничего не писал и весь был только мой, тебе надоело бы на другой день.</p><p class="p1">— А тебе еще раньше.</p><p class="p1">— Не знаю, Ять, честно… — Она сладко зевнула. — Господи, как все чудно, чудно, чудно…</p><p class="p1">Она еще что-то пробормотала, засыпая, и наконец затихла; от нее шло ровное сонное тепло, абсолютный покой спящего ребенка, готовый, впрочем, мгновенно смениться лихорадочным жаром нового пробуждения и новой игры.</p><p class="p1">Ять осторожно встал, с наслаждением закурил и подошел к холодному окну. До рассвета было еще далеко, но луна сместилась вправо, к мысу, и по ровной воде пролегла золотая, расширяющаяся к берегу дорога. За плоскими ступенчатыми крышами начиналось фосфорическое, бледно-голубое свечение моря. Страшно было даже представить себе холод этой спокойной воды. Интересно, если бы мне сказали, что для спасения ее жизни я должен проплыть до тех скал? или до мыса? Я поплыл бы, конечно. Отчего-то при ней мне так легко расстаться с жизнью, жизнь так мало стоит в ее присутствии. Скажи мне кто-нибудь: умри сейчас. Да сейчас и лучше было бы. Я никогда не найду этому объяснения.</p><p class="p1">Да, думал Ять: очень может быть, что я для того и встретился с ней, чтобы поиграть во все. Когда она рядом, какая мне разница — кто прав, кто виноват? Теперь по крайней мере понятно, почему Казарин теперь так безразличен ко всем елагинским спорам. Может быть, я для того здесь и случился, чтобы вместе с ней переиграть все возможные роли: счастливого любовника, отвергнутого воздыхателя, богача, ушедшего за циркачкой, судьи, простившего разбойницу… Быть ее рабом, господином, врагом, тайным другом, мужем, соблазнителем — может быть, я только потому и люблю ее, что могу с ней в один день пережить все, чего с другой не пережил бы за полвека мирного брака. Может быть, смысл только в том и заключается, чтобы перепробовать правоту, неправоту, власть, отверженность — все, что можно?</p><p class="p1">Она всхлипнула во сне, и он вернулся в постель.</p><p class="p1">— Что с тобой? Приснилось что-нибудь?</p><p class="p1">— Нет, нет, ерунда, мне показалось… Какой ты холодный. Бес трепетный. Какое сегодня число?</p><p class="p1">— Наступило шестнадцатое марта. А что?</p><p class="p1">— Нет, ничего… Пятнадцатого был счастливый день, шестнадцатого тоже будет счастливый день… Не уходи больше.</p><p class="subtitle">9</p><p class="p1">Эсер Владимир Свинецкий со своим отрядом вошел в Гурзуф ранним утром шестнадцатого марта. Отряд состоял из убежденных боевиков, в основном босяцкого происхождения, какими всегда кишел плодоносный и привольный юг России. Свинецкий был членом Боевой организации с пятого года, побывал на каторге, вернулся, попал в ссылку, бежал и до февраля семнадцатого жил за границей. Вернувшись, он нашел партию деградировавшей, а Боевую организацию — упраздненной. О терроре никто не вспоминал. С июля разочарованный Свинецкий лечился в Ялте от туберкулеза, нажитого, как ни странно, не в Сибири (там никакая хворь не брала), а в благополучнейшем Давосе. Поистине, тихая жизнь была для него смертельна.</p><p class="p1">В Ялте он и узнал о победе большевиков в Петрограде. С ноября по март он собирал дружину и разрабатывал план действий. Естественно, захватить большой курортный город вроде Ялты им пока не по плечу, но создать опорную базу в Гурзуфе и начать там вербовать добровольцев из татар и крестьян — наиболее реальный путь к превращению Крыма в оплот подлинно революционных сил. Собственно, где был Свинецкий — там и оплот; повезло на этот раз Крыму.</p><p class="p1">Конечно, победить в России должны были именно большевики — наиболее циничная партия, прибежавшая на готовое. Февраль был делом рук лучших товарищей, он оплачен кровью святых борцов — но вот вам цена соглашательства! Победила самая ползучая братия, гад, повторявший рельеф местности и почти невидимый на ней. Свинецкий прощупал ялтинскую публику — рыхло, зыбко; понимание он нашел только в порту. На всякий случай он провел среди своих портовых единомышленников пару занятий по обращению с оружием — и был изумлен, насколько лучше гвардейцы осведомлены в этих делах, нежели он сам. Любой портовый босяк с поразительной ловкостью метал нож, отменно стрелял и не испытывал страха перед возможным кровопролитием. Чувствовалась обширная практика, к политике, впрочем, отношения не имевшая. Теперь с верным отрядом из пятнадцати человек, с пятью винтовками, двенадцатью нагайками и шестью самодельными пиками они входили в Гурзуф, мирно спавший под властью Коммунистической Таврической республики. Пора было возвращать смысл слову «коммунизм». Свежий утренний воздух бодрил Свинецкого. Погода стояла великолепная — сама природа приветствовала истинных рыцарей свободы. Тысячи бликов дробились и зыбились на серо-золотом море. Отряд мерно приближался к городу со стороны Ялты. Ехали молча, ничем себя не обнаруживая: внезапность — половина победы.</p><p class="p1">Небо голубело над каменистой дорогой, петлявшей среди сухого кустарника; рыжеватые глинистые осыпи спускались к диким пляжам в окрестностях Гурзуфа. На одном из этих пляжей умывался холодной утренней водой комиссар Трубников. Маленький, худой, волосатый, он приседал и подпрыгивал, скакал по гальке, высоко поднимая колени, быстро окунался, выскакивал на берег и разогревался снова. В порыве счастья он принялся кружиться на одном месте, и тут взгляд его упал на дорогу: по ней в город неслышно, почти не бряцая оружием и сбруей, двигались шестнадцать всадников. Комиссар Трубников давно ожидал чего-то подобного, а потому стремительно оделся и побежал берегом прочь от города. У него была надежда добраться до рыбацкого поселка, ленившегося к подножию Аю-Дага. Предупреждать в Гурзуфе ему было некого — он правил единолично и успел порадоваться, что так и не собрался осуществить принцип коллегиального руководства.</p><p class="p1">Свинецкий равнодушно посмотрел на местного жителя, обливавшегося морской водой на берегу и вдруг резво припустившего куда-то вдоль берега. Мало ли кто купается по утрам: в Сибири он знал крестьян, окунавшихся в ледяную воду ежедневно до глубокой осени.</p><p class="empty-line"/><p class="p1">— Граждане Гурзуфа! — кричал он два часа спустя перед двумя сотнями обитателей поселка, согнанных на площадь его людьми. — Для вас настало царство истинной свободы, равенства и благоденствия!</p><p class="p1">Граждане Гурзуфа переминались с ноги на ногу и смотрели главным образом на окрестные горы. По лицам их блуждали неопределенные ухмылки. Все это они слушали в пятый раз — сначала в феврале прошлого года, потом два раза в ноябре, потом в январе.</p><p class="p1">— Но свободу надо уметь защищать! — загремел Свинецкий. — И потому первое, о чем мы должны подумать, — это создание революционного ополчения!</p><p class="p1">— Так ведь мир заключен, господин командующий, — заметил рыбак по фамилии Бурлак, ражий детина с пудовыми кулаками и младенческим добродушием на щекастом лице.</p><p class="p1">— Мир заключен с немцами, а с нашими, российскими захватчиками у нас нет и не может быть никакого мира! — Свинецкий пронзил Бурлака презрительным взглядом. — То, что ваши прежние трусы градоначальники называли свободой, не имеет с ней ничего общего! Большевики позорно предали дело революции, и никто из вас не дезертирует к мирным занятиям, пока из Крыма… а потом и из России… не будет изгнан последний большевик!</p><p class="p1">— Быть не может, — выдохнул Ять. — Это же Свинецкий! Черт меня побери совсем…</p><p class="empty-line"/><p class="p1">С самого начала пламенной речи нового вождя он мучительно припоминал: тот или не тот? Был ли это герой первого его нашумевшего очерка — двадцатипятилетний тогда террорист, участник неудавшегося покушения на прокурора Сырищева? Выходило, что сейчас Свинецкому должно подходить к сорока; Ять слышал, что он отбыл три года каторги, бежал с поселения, далее следы, его терялись. Разговаривали они всего дважды: редактору «Глашатая», бульварнейшего листка, где Ять числился репортером в начале пятого года, удалось добиться разрешения на встречу с террористом в тюрьме и публикацию очерка — естественно, для предупреждения культа отважного мученика среди молодежи. Ятю он поставил иную задачу: пишите так, чтобы все содрогнулись.</p><p class="p1">В первый раз они увиделись еще в тюремной больнице, где эсер приходил в себя после перелома двух ребер и многочисленных осколочных ранений левой руки. Свинецкий имел вид мексиканского бандита — черноволосый, маленький и хмурый. На священный огонь и ангельскую чистоту в его чертах не было и намека. Клочковатая борода, сбивчивая речь, каша во рту — и эта дикая, птичья манера вскидывать голову после особенно эффектной трели: зрелища более жалкого нельзя было вообразить. Ять сердечно пытался убедить его не то что покаяться — об этом и речи не было, — но по крайней мере обратиться к друзьям с призывом к ненасильственному разрешению противоречий. Ни о чем подобном Свинецкий и слышать не хотел, да он и вообще был глух после контузии. Из разветвленной системы аргументов, которые Ять приготовил, до него доходила едва треть, но и ту он неспособен был воспринять. Когда же Ять, не выдержав, закричал, что новой фазой борьбы неизбежно станет истребление рода человеческого, — Свинецкий, впервые посмотрев на него с любопытством, серьезно заметил, что таков и был завет Христа — окончательное переселение сынов человеческих в царство Божие. Ять оставил возражения и расспросы и только слушал. Ему открылось в разговорах со Свинецким нечто важное, и этим важным была выявившаяся наконец-то ущербность всякого человека, готового теоретические вопросы разрешать практическими действиями, убийствами же в особенности.</p><p class="p1">Прежде для Ятя именно собственная тяга к недеянию, невмешательству в жизнь (какое уж там насилие!) была признаком тайной ущербности; в несчастных счастливцев, способных метнуть в ближнего бомбу во имя высшей цели или перерезать ему глотку для цели низменной, он вглядывался с напряжением естествоиспытателя, но ничего, кроме твердой, плоской простоты, не обнаруживал. Душа его колотилась о Свинецкого, как волна о камень. Свинецкий был досадно, обезоруживающе прост, — и Ять честно написал об этом, в неприкосновенности донеся до читателя все его монологи. Герой лично отцензурировал очерк и нашел его недостаточно героичным, — писал человечишко мелкий, хоть и честный; презрительным кивком он дал согласие на публикацию без существенных исправлений, заменил только пару раз «прекрасную» на «божественно чудную». Речь шла об атмосфере в БО.</p><p class="p1">«Да, это Свинецкий, — понял Ять, когда оратор вскинул голову и повернулся в профиль к нему, широким жестом обводя горы. — Его жест и его нос. Вот где привелось свидеться. Ну, ежели так, мы с Таней в безопасности. Такого диктатора опасаться нечего». И в пятом, и в восемнадцатом он был одинаково жалким пророком.</p><p class="subtitle">10</p></span>
