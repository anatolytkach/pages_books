<span><p class="p1">Ять сидел у них уже два часа, на четыре назначили читку. Казарин, казалось, и сам не хотел отпускать его: разумеется, лучшее общество для него было теперь общество возлюбленной, но, позер до кончиков ногтей, он не мог испытывать истинное счастье без свидетелей, и самая зависть Ятя, которой он не мог скрыть, была для него бальзамом. Он сейчас даже любил Ятя — за то, что тот дает ему возможность показаться в блеске торжества. Разговаривали не без взаимного интереса; Ашхарумова вставляла замечания редко, не заботясь о производимом впечатлении — или не сомневаясь в нем.</p><p class="p1">— А я ведь вас знаю, — сказала она, и Ять смутился.</p><p class="p1">— Не припомню…</p><p class="p1">— Нет, не лично. Мне Таня Поленова рассказывала.</p><p class="p1">Черт, все они были знакомы, все в заговоре. Ять давно подозревал это. А Фельдман еще спрашивал, отчего он такой «метафизический женоненавистник» — вроде метафизического антисемита Розанова, ненавидящего евреев в теории и льнущего к ним на практике.</p><p class="p1">— Вряд ли она вам говорила обо мне что-нибудь хорошее.</p><p class="p1">— Почему? Она вообще мало о вас говорила, потому что, по-моему, вы были для нее очень важны. И теперь важны. Правда, я давно с ней не виделась…</p><p class="p1">— Я тоже.</p><p class="p1">— А знаете, где она теперь? В Крыму. Говорят, там безопасно. Она отдыхала в августе у друзей или дальней родни — и не захотела возвращаться. Прислала одно письмо, звала туда. Пишет, что виноград и рыба и до ноября купанье, — я ей ответила, чтобы она сюда не торопилась.</p><p class="p1">— А матушка ее где же?</p><p class="p1">— Матушка как была в Париже, так, думаю, и осталась. Новый супруг пока не разорился, что ж ей беспокоиться.</p><p class="p1">— Виноград, купанье, — протянул Ять. — Ну, теперь-то ничего этого нет… Где она, вы говорите?</p><p class="p1">— Близ Ялты, в Гурзуфе.</p><p class="p1">Ятя во всей этой истории больше всего интересовало, одна ли там Таня Поленова, — но, поскольку Таня нигде не бывала одна, вопрос отпадал сам собою. Он хотел перевести разговор, ибо не был уверен, что удержится от резкости, которая сразу его выдаст.</p><p class="p1">— Не знаю, не знаю, — сказал он. — Я Крым люблю, но сейчас Питера не променял бы ни на что. Призвали всеблагие. Вячеслав Андреич, вы-то что теперь пишете?</p><p class="p1">Казарин, не заставив долго себя просить, прочитал два новых стихотворения — действительно мало похожих на прежние: одно длинное, белым стихом, о встрече со странным ребенком, который стоял на улице и укоризненно смотрел на него в упор, — а второе короткое, о первом снеге. Слово «легкость» повторялось в нем часто, как в заклинании, — и в самом стихотворении было что-то гипнотическое, чтобы не сказать кокаиновое. Ять хорошо знал, что частые упоминания ледяных сфер, белых кристаллов, горечи и ясности означают именно пристрастие к кокаину; кто-то — чуть ли не Буркин, считавший своим долгом попробовать все, — говорил ему, что после кокаина легко понять, что чувствует душа, вылетев из тела. Полная ясность, ледяной покой, — и почти нестерпимая гармония в каждой линии.</p><p class="p1">— А ребенка видел действительно, — сразу заговорил Казарин. — Ребенок был, стоял на углу Большого и смотрел пристально, с осуждением. Впрочем, мне теперь во всех взглядах мерещится осуждение. Мальчик лет восьми — откуда ему знать про меня? Но хотя бы меня осудили все, даже дети, — я от своей жизни ни для кого не отрекусь.</p><p class="p1">То, что Казарин при Ашхарумовой так свободно заговаривал о бывшей жене и ее родне, о прежней жизни и об отсутствии у него всякого раскаяния, доказывало: между ними нет ни тайн, ни умолчаний.</p><p class="p1">— Ну, а о коммуне как вы думаете? — спросил Ять наконец, боясь услышать что-нибудь едкое, ядовитое и совершенно верное.</p><p class="p1">— Да как же, — Казарин развел руками. — Сколько продержимся, столько и ладно. С паршивой овцы хоть шерсти клок.</p><p class="p1">— Вы про Чарнолуского? В смысле овцы?</p><p class="p1">— Про них про всех. Тут ведь два варианта, вы сами понимаете, — Казарин доверительно наклонился к Ятю, но не забывал поглядывать и на Ашхарумову. — Либо они продержатся еще два месяца, пока хватит продовольствия, и их опрокинет село или сами эти… пролетарии сделают голодный бунт. В общем, гибель от естественных причин. И второй вариант: они поймут, что долго миндальничать нельзя, забудут про всякую свободу и устроят нам тут железный кулак. Тогда, сами понимаете, начнется с нас — вступаться некому, толку от интеллигенции никакого, а без террора, это sine qua non, они не удержатся. Они ведь как устроены: их можно выбрать только от безысходности. Надо, чтобы все были еще хуже. Отсюда эрго: постоянно нужен враг. Это, по-моему, очень видно, а других возможностей, как ни приглядываюсь, не различаю. Доживем два месяца в условиях наименьшего зла, а там и до свидания в лучшем мире.</p><p class="p1">Вместе с тем что-то подсказывало Ятю, что при всей логике Казарина, отказавшегося от иллюзий, как раз в этих его словах таилась ложь: людям отчаявшимся, устремленным навстречу гибели, гибель как раз грозила меньше, чем прочим, домашним и робким. В его безупречных, на первый взгляд, рассуждениях была обманчивая, соблазнительная простота — в действительности все, как всегда, было тысячекратно сложнее и зависело от множества условий. Ошибкой было сводить все к воцарению татарских нравов — это значило игнорировать здоровую и свежую силу, которая иногда угадывалась даже за простотой матросиков и их вождей-агитаторов; не все были темные, и Ять знал это. Кроме того, апокалипсические пророчества (которые Ять слышал от Казарина во все время знакомства) никак не гармонировали с его заботой об устройстве, выживании, реноме и деньгах, которые он добывал иногда откровенным шарлатанством.</p><p class="p1">— Вы все и всех норовите похоронить, — сказал Ять, — а между тем многое и от нас зависит. В частности, их перерождение в ханов…</p><p class="p1">— Хамы в ханов, это вы хорошо, — усмехнулся Казарин, приглашая усмехнуться и подругу.</p><p class="p1">— Не в каламбурах дело. — Ять не мог уже скрыть раздражения; особенно его бесили эти их постоянные перемигивания, выглядевшие ужасно высокомерно. — Вы все еще живете по принципу «чем хуже, тем лучше», — но худшее уже случилось, даже и в стихах ваших сквозит теперь реальность почти загробная. Что же не попробовать все заново?</p><p class="p1">— Да пробуют, — Казарин пожал плечами. — Раньше одного забирали — и демонстрации, и в прессе переполох, а теперь десятками берут — и ничего, в порядке вещей.</p><p class="p1">— Не только же в этом суть! — Ять поморщился, поняв бесперспективность спора. — Я к тому, что гибнуть и гибнуть — это прекрасно, конечно, но это остается вашим выбором. А стране надо когда-нибудь и пожить.</p><p class="p1">— Пожить — да, но как, какой ценой? Вы, Ять, человек девятнадцатого века, — снисходительно сказал Казарин. — Хороший был век, но кончился. Затонул. После краха Европы настало другое время. Если бы не техника, проскрипели бы еще лет пятьдесят, но телефоны и автомобили ускорили дело. Какое пожить, когда целые нации с песнями идут на убой? Заметьте, что эта бойня ничем не разрешилась, не очистила воздуха, — умирающему кровопускания не впрок. Убивать шли от безвыходности, и сейчас та же безвыходность. Вам все уют подавай, семью, цель жизни… а цель сейчас одна — перед смертью не опозориться. Вот скажите, — он подмигнул Ашхарумовой, — мы тут с Марьей давеча обсуждали животрепещущий вопрос. По нему легко отличать своих от чужих. Вы-то свой, чего бы ни говорили, только никак не проснетесь. Скажите, кто лучший христианин — Уайльд или Мастертон?</p><p class="p1">Мастертон был миссионер, публицист и проповедник, автор нескольких комических романов из жизни доброго британского семейства. Юмор его был натужен, многословен, но трогательная сентиментальность, сквозившая в пряничных писаниях, искупала многое. Он умер через год после Уайльда, ненадолго вернувшись в Лондон из Южной Африки. Ять одно время для хлеба насущного переводил два его романа для «Современного мира», и работу эту ему спроворил как раз Казарин.</p><p class="p1">— Славный вопрос, — задумчиво произнес Ять. — По логике вещей, я должен сказать: Мастертон. Да, вероятно, так и скажу — из чувства противоречия.</p><p class="p1">— Вот видишь! — Казарин победоносно глянул на Ашхарумову. — Он весь в прошлом веке, когда уже выйдет оттуда?!</p><p class="p1">Ять терпеть не мог, когда о нем говорили в третьем лице.</p><p class="p1">— Идти в ногу с этаким веком — невелика заслуга.</p><p class="p1">— Этот век, хорош он или плох, открыл новое в человеке, — снисходительно сказала Ашхарумова. — Мастертон от этого нового прятался в уют, в простоту, потому что убоялся сложности. А трусость никогда еще не была христианской добродетелью.</p><p class="p1">Эти слова она явно повторяла с чужого голоса, и нетрудно было понять, с чьего.</p><p class="p1">— Вот, вот, — против воли горячась, заговорил Ять. — Мастертон всю жизнь боролся против того, чтобы христианство перестало отождествляться с мятежом и уничтожением. Самый отважный мятежник, писал он, сегодня тот, кто посмеет защитить простую истину…</p><p class="p1">— Сказать можно что угодно, — улыбнулся Казарин. — Не всяк Бога славит, но Бог себя явит. Мастертон умер в своей постели, а Уайльд — от последствий удара в ухо, нанесенного тюремным надзирателем. Мастертон прожил шестьдесят с лишним, а Уайльд не дожил до сорока пяти. Мастертон умирал в достатке и почете, а Уайльд — в нищете и поношении. Какую кончину вы назовете христианской?</p><p class="p1">— Критерием христианской кончины никогда не были нищета и поношение, — лихорадочно заговорил Ять. — Уайльд умер от водянки, вызванной излишествами, а Мастертон — от последствий тропической лихорадки, подхваченной, когда он лечил дикарей… Уайльд умер прославленным, хоть и скандально прославленным, а Мастертон — презираемым и осмеиваемым, героем карикатур в модных журналах, где его изображали в виде индюка, проповедующего на скотном дворе. Все христианство Уайльда, все его любование красотой страдания были от его уранизма, и распятый Христос вызывал у него, страшно сказать, чуть ли не похоть… Уайльд привнес перверсию во все, пусть и невинную перверсию…</p><p class="p1">— Он не понимает, — улыбнулся Казарин Ашхарумовой, и она кивнула в ответ. — Не дай Бог, поймет — ведь с ума сойдет. Ничего, Ять, я вас постарше на три года, все у вас впереди. Впрочем, Марья вас помладше лет на… В отцы сгодились бы, если бы поторопились. Но и она понимает — потому что умная. Не обижайтесь, не обижайтесь. Мы вас все равно любим.</p><p class="p1">Ять непременно взорвался бы и в ответ на это «мы», и на уверение, что девятнадцатилетняя Марья (отвратительное обращение, какое-то домашнее и вместе вульгарное) умнее его, если бы по коридору вдруг не раскатился звон колокольчика и высокий, смеющийся голос Ловецкого не пропел:</p><p class="p1">— Прошу-у, прошу-у! Все к месту сбо-о-ора! Чтение первой главы-ы-ы!</p><p class="subtitle">16</p><p class="p1">На читку, долженствовавшую обозначить начало созидательной работы интеллигенции на благо пролетариата, прибыл и Чарнолуский, и пролетарий Викентий, приданный Ловецкому для консультаций по истории чихачевской мануфактуры. Чарнолуского изумила истинно журналистская скорость, с которой Ловецкий сработал первую главу, но он утешался мыслью о том, что ведь и величайшая революция в истории человечества произошла за два часа. Теперь все получалось прямо-таки триумфально, и стремительность разрешения всех задач была главным доказательством их насущности. В зале на первом этаже матросы-охранники вместе с первыми собравшимися коммунарами разбирали т-образный стол и рядами расставляли стулья. Ять здоровался с обитателями дворца — все были ему рады. Здесь, в хорошо протопленном и ярко освещенном помещении (каждый пришел со своей лампой, и в зале было светло, почти как в бальные вечера), среди давно знакомых людей, думавших и говоривших на его языке, он устыдился собственных дурных предчувствий. Родная среда была прежней, умудрявшейся во всяком положении найти смешную и трогательную сторону.</p><p class="p1">— Ну что вы, Ять, как? — любовно улыбаясь всем морщинистым, милым лицом, спрашивал его Алексеев. Его русофильство никогда не мешало Ятю любить в нем честного, славного человека, который в горячую минуту мог так приложить родную Русь, как никогда не отважился бы и самый желчный иудей. — Мироходов-то, старый болван, не разогнал еще вашу лавочку?</p><p class="p1">— Ять! — закричал с лестницы Борисов. — И вы теперь с нами?</p><p class="p1">— Нет, я в гости пока. Ну что, как вам этот симпосион?</p><p class="p1">— Отличная идея, всегда о чем-то подобном мечтал. Поспорим, бывало, за ужином, — Борисов дружески кивнул Алексееву, — и пишу потом чуть не всю ночь с огромным воодушевлением! Нашему брату филологу трудней, чем технику: техник творит один, сидит, придумывает… А мы высекаем искру только из обмена мнениями, правду я говерю?</p><p class="p1">— Когда ерунды не говорите, вас и послушать приятно, — кивнул Алексеев. — Только чуши больно много, я бы вам иногда звук выключал. В патефоне, знаете, есть такой рычажок, — он себе играет, а нам не слышно.</p><p class="p1">Ять узнал среди обитателей дворца и молодого, но уже прогремевшего Льговского — не будучи членом Общества, он впервые выступил там два года назад с оригинальной работой о статистическом методе в стиховедении; работа была странная — сама теория без божества, без вдохновенья, но в том, как он читал иллюстрирующие ее стихи, как: спорил и соглашался, артистизм так и сверкал. Льговский, как всегда, был со свитой из молодежи. Чарнолуский запаздывал. Лишь в половине пятого зарокотал, приблизился и увяз автомобиль — и скоро из мягкого снегопада, отряхиваясь, вошел главный гость. Рабочий Викентий с двумя товарищами — такими же кроткими, вислоусыми и бледными мужчинами лет сорока пяти — при его появлении встали. Чарнолуский оглядел собрание и сделал общий поклон.</p><p class="p1">— Рад приветствовать, господа, — сказал он, изо всех сил стараясь не впасть ни в заискивание, ни в снисходительность. — Простите великодушно, задержался. Ну-с, вы, я вижу, уже приступили?</p><p class="p1">— Как же без вас, — проскрежетал из угла Хмелев.</p><p class="p1">— Главный критик не я, — улыбнулся комиссар. — Главные критики — вот, если позволите! — И он торжественно ткнул пальцем, в товарища Викентия со спутниками. Викентий смутился еще более.</p><p class="p1">— Так я приступаю, если все в сборе? — ни к кому в особенности не обращаясь, спросил Ловецкий.</p><p class="p1">Он выкрутил посильнее фитилек стоявшей перед ним на столе керосиновой лампы, поднес к близоруким глазам крупно исписанную тетрадь и звучно провозгласил:</p><p class="p1">— «История петроградской промышленности. Том первый. Чихачевская мануфактура. Глава первая. Чихачевский род. Братья-разбойники. Роковая Маланья. Кровавое царствование. Логово хищника. Отравленная лилия». — Он обвел собрание взглядом и в более будничной манере пояснил: — В заголовке каждой главы я даю конспект — прием известный.</p><p class="p1">Ять решительно ничего не знал о чихачевской мануфактуре, кроме того, что прославилась она тончайшим постельным бельем, на котором — как и на гербе ее — красовалась лилия. С первых строк «Истории петроградской промышленности» стало ясно, что скандал неизбежен. Трудно было понять, сознательно Ловецкий доводит до абсурда идею производственной хроники или искренне пытается сделать ее увлекательной для пролетариата, однако получившийся продукт с самого начала выходил за рамки добра и зла. Это была причудливая смесь всех стилей площадной литературы, от милорда глупого до житий. Начиналось эпически — с описания дальней деревни Лыткарино, затерянной середь лесов темных да лугов тучных; народ в Лыткарине был сметлив, да буен, текст — по-лесковски узорчат и олеографически цветист. Лыткаринский уроженец Митька Чихачев устроился в Питер на ткацкую мануфактуру, тогда еще, понятное дело, не чихачевскую, рос, умнел и скоро обольстил хозяйку (сцена обольщения выдержана была в архаически-сказовой манере, поскольку возвышение Чихачева-старшего относилось к пятидесятым годам). Но в шестидесятых дело Митрия Чихачева едва не рухнуло, ибо чуть не переубивали друг друга его сыновья. Предметом раздора стала ткачиха Маланья, чьи огневые очи и соболиные брови Ловецкий описывал уже в стилистике гоголевской — сниженной сообразно с умственным горизонтом предполагаемого читателя. Она успешно довела до белой горячки старшего брата и теперь вместе с младшим строила на его костях свое счастье.</p><p class="p1">В рукописи было несколько фраз о расширении производства, о знаменитых чихачевских простынях и платьях, но с этой темой Ловецкий торопился скорее разделаться, дабы не утомлять читателя, и с облегчением плюхался в родную стихию инцестов, измен и шантажа; Эти сцены были уже писаны широким, развязным слогом бульварного листка; Ловецкий читал их залихватски-бодро, подмигивая аудитории, гнусно ухмыляясь и иногда вдруг виляя всем телом, словно в избытке чувств. В публике уже пересмеивались. Безоговорочно серьезен был один народный комиссар, который до последнего момента надеялся, что диалектика производительных сил и производственных отношений вот-вот прорвется наконец на страницы романа сквозь сомкнутый строй роковых маланий и полнокровных, брутальных промышленников — типов истинно-русских и выписанных не без любования.</p><p class="p1">— И, яро ухнув… — басил Ловецкий, даже, кажется, слегка окая. Речь шла о богатыре Григории Чихачеве, высасывавшем на пари корец водки. Масштаб производства и прибыли странным образом воплотился у автора в чисто физическом масштабе самой фигуры капиталиста; промелькнула фраза о том, что все это был не квас, не водка, не уха, а кровь народная, но и кровь народную Григорий Чихачев уписывал так аппетитно, что волей-неволей хотелось к нему присоединиться.</p><p class="p1">В конце концов Чарнолуский дождался пролетарского элемента. Сознательный рабочий Валежников приходил к марксизму, желая отомстить за поруганную ткачиху, которую полюбил. Заседание рабочего кружка, описанное в смешанной технике Достоевского и Тетерникова, имело отчетливо инфернальный вид. Однако неутомимый в похоти Андрей Чихачев, представитель третьего и самого растленного поколения мануфактурщиков, соблазнил красавицу Дарью (в описании ее Ять с веселым ужасом узнал Ашхарумову: Ловецкий, апеллирует к архаическому народному сознанию, сам впал в детство литературы — что видел, то и воспевал). Тут в повествовании возник отчетливо мистический, декадентский элемент. После серии кутежей и оргий Дарья внезапно взбунтовалась, Чихачев в приступе пьяного гнева запер ее в своем кабинете, а сам уехал пить; из кабинета она таинственным образом исчезла, и больше ее никто никогда не видел. Повествование было доведено до третьего года, с которого, как оповестил Ловецкий под конец уже своим голосом, начинался новый, пролетарский этап российской истории.</p><p class="p1">— Разумеется, будут и цифры, — как бы заранее оправдываясь, среди наступившего молчания проговорил размякший и вспотевший автор. — Цифры вынесены будут в специальное приложение — таблицы роста производства и все это, э… тут, я полагаю, возможна будет уже консультация экономистов, когда создастся соответствующая коммуна.</p><p class="p1">— А математиков, значит, тоже соберут? — поинтересовался кто-то из свиты Льговского.</p><p class="p1">— Полагаю, это неизбежно, — сдержанно заметил Комаров. Ять знал его как лучшего петербургского словесника, непременного секретаря на большинстве заседаний Общества. — Реформа правил сложения, исправление логарифмических таблиц, упразднение тригонометрии как недоступной народу…</p><p class="p1">— Не скажите, — очень серьезно сказал высокий и очень рыжий молодой человек. — Без тригонометрии невозможно даже и на строительстве.</p><p class="empty-line"/><p class="p1">Обсуждение явно уходило не в то русло. Хмелев наблюдал за происходящим с мрачным удовлетворением. Ять не знал, смеяться ему или ужасаться: Ловецкий, конечно, повеселил всех, но ведь от готовности коммунаров идти на сотрудничество зависели в конечном итоге и дрова, и пресловутая моржевятина. Хорошо было издеваться над Чарнолуским, пользуясь его благодеяниями, и фрондировать в полной уверенности, что никого не посмеют тронуть, — но если начнется настоящее обучение ремеслам или, не приведи Господь, расчистка рельсов (к которой, по слухам, большевики в Павловске привлекли монахов), о ненаписанной «Истории заводов» придется горько пожалеть. Впрочем, Ять до конца не был уверен в том, что Ловецкий издевается. Возможно, поразмышляв, он естественным путем пришел к тому, что писать для народа в эпоху величайшего смешения стилей и языков только так и возможно — в конце концов, и серьезная литература давно уже была воплощением эклектики.</p><p class="p1">— Ну что ж, — невинно начал Чарнолуский. — Спросим-ка товарищей чихачевцев: что нам ответят, так сказать, непосредственные адресаты? Как вам, товарищ Викентий, — вы стали бы читать такую книгу? Викентий встал и помялся.</p><p class="p1">— Что сказать, товарищ комиссар, — произнес он смущенно, — жеребятины много, но для ребят завлекательно. Маловато, конечно, про станок. Ведь станок — он опять же, как ни крути, основа ткацкого дела. Но ежели он и на фабрике, положим, круглый день видит станок, то что ж ему про него еще и в книжке читать. Ему в книжке желательно про всякое… про жизню чужую, одним словом говоря. Так что я считаю, сработал товарищ на совесть, в интересах класса… раньше образованный класс про всякую любовь читал, а теперь такого нет… теперь для всех…</p><p class="p1">Спутники Викентия на протяжении этой речи переглядывались и не слишком уверенно кивали.</p><p class="p1">— Итак, — бодро сказал Чарнолуский и потер ручки, — вы сами убедились, что товарищ Ловецкий, — прошу прощения, господин Ловецкий, — блистательно справился с предложенной задачей. Его упражнение в этом жанре можно считать, я бы сказал, эталонным для всех литераторов, которым в разное время еще придется, — а я не сомневаюсь, что придется, потому что куда же они денутся, — заниматься чем-нибудь подобным. Вы только несколько переоценили меня, полагая, что перед вами законченный идиот. Но я пока еще не вполне соответствую этому званию. Мне представлялось, признаюсь вам честно, что самоуважение ваше и без того вполне достаточно, то есть вам, чтобы себя ценить, не надо лишний раз делать дурака из расположенного к вам человека. Вероятно, я заблуждался и тем еще раз доказал вашу проницательность. Я особенно благодарен товарищу Викентию. Господин… как же вас… господин Ловецкий (эта заминка была просто великолепна, Ять мысленно аплодировал комиссару), вы точно угадали чаяния пролетариата, но еще точнее выразили собственные чаяния. А сводятся они, как и можно было догадываться, к тому, чтобы пролетариат навсегда оставался в нынешнем своем состоянии, когда пределом его эстетических вкусов остаются кинодрама «Отравленный поцалуй» и похождения барона Прохвостова, в пяти частях с иллюстрациями. Горячо благодарю за высокое наслаждение. Не вполне ясно, правда, чем именно вам не угодил товарищ Викентий, на котором вы так… поупражнялись. Но он, как истинный христианин — виноват, я хотел сказать марксист, — простит вашу невинную шутку.</p><p class="p1">Если бы после этого комиссар оделся и вышел, более эффектного финала читки нельзя было бы и придумать; вся Елагинская коммуна осталась бы в твердой уверенности, что назавтра всех разгонят, а некоторых, чего доброго, еще и возьмут. Ять никогда еще не видел Чарнолуского ехидным, — ехидство прибавляло ему ума и обаяния. Но он не ушел. Он по обыкновению уставился в пол, хомяковато надув щеки, после чего шумно выдохнул и расхохотался.</p><p class="p1">— Да, господа, — произнес он дружелюбно, — хороший урок мы дали друг другу. Я, конечно, сам виноват. Меа кульпа. Не следовало и ставить перед вами подобной задачи. Я все забываю, что ежели литератора нашего времени, кроме разве «знаньевского» круга, попросить пересказать «Колобка», так у них и «Колобок» выйдет альковный, в адском колорите, а у лисы будет лицо Милюкова. Виноват. Бессмысленны общественные заказы, когда нет заказа личного. И потому я думаю, — тут он выдержал эффектную паузу, — я думаю, что лучшим делом для вас будет коллегиальный отбор классической литературы для народного чтения. Этим и Лев Толстой не брезговал, вы ведь не станете отрицать, что «Посредник» многих просветил? Я и шел сюда с мыслью предложить вам это. Пролетарская культура не создается директивами, ее можно лишь бережно, тщательно вырастить, используя лучшие достижения прошлого. Вот таким книгоизданием мы в ближайшее время и займемся. Полагаю, перспектива подобного отбора не вызывает у вас возражений?</p><p class="p1">Не сказать, чтобы это выступление сломило лед, но конфронтацию несколько ослабило. Чарнолуского уговаривали остаться на чаепитие, и он в самом деле отведал чаю и каши (на сей раз гречневой). Он торжественно обещал улучшить пищевой рацион, еще раз попросил прощения за попытку диктовать Музам и направился к выходу. Вскоре откланялся и Ять. На душе у него было смутно. Одно он знал точно: в этой истории Чарнолуский был единственным, кого он жалел по-настоящему. Впрочем, жалко ему было и Викентия, который весь вечер хмурился. Но еще грустнее было думать об идее хорошего издательства всемирной литературы. Идея была в самом деле великолепна — полной своей несвоевременностью, абсолютной неуместностью и совершенной неосуществимостью.</p><p class="p1">— Знаете, — сказала вдруг Ашхарумова, подавая ему руку на прощание, — вы обязательно должны завтра пойти с нами на именины к Зайке.</p><p class="p1">— В лес? — усмехнулся Ять.</p><p class="p1">— Зайка — это Зойка, подружка моя. Она чудесная девочка, правда. Вам очень понравится.</p><p class="p1">— Спасибо, Маша. Я, верно, и впрямь так выгляжу, что сразу хочется подобрать мне чудесную девочку для домашнего хозяйства… Не беспокойтесь, я справляюсь пока.</p><p class="p1">— Я вовсе не за этим, — смутилась Ашхарумова. — Что вы глупости выдумываете… Просто — будут молодые поэты, будем мы со Славой… Приходите, правда. Рождества почти не заметили, Нового года толком никто не праздновал — вот и устроим всё сразу…</p><p class="p1">Он, конечно, никуда не собирался. Вот новое амплуа — соглядатай чужого счастья! Но в пустой квартире навалилась вдруг такая тоска, что, засыпая, он решился: пойду.</p><p class="subtitle">17</p><p class="p1">…но поскольку размах веток не позволял говорить о мгновенной деривации, то и вывод отсюда был тот, что мы никуда не уйдем, если, конечно, попробовать хлюмсы… он расхохотался, и она в ответ. Так, смеясь, и проснулся. Обрывки фраз еще ветвились в голове и, как всегда после яркого сна, казались исполнены глубокого смысла, но земная логика брала свое и вытесняла небесную.</p><p class="p1">Постой, постой, но, значит, все было? Да, и глупо теперь от этого прятаться. Таня была, он любил ее и знал, что всегда будет любить. Внешне все кончилось два года назад, грязно и стыдно, а все-таки до конца дней он был на нее обречен и знал, что это обоюдно, с кем бы рядом она ни просыпалась. С кем она сейчас, интересно? Последний слух был о бородатом, угрюмом неудачнике — впрочем, на беспристрастный взгляд мы все неудачники. Если действительно угрюм, то это у них ненадолго: она бы терпела, да он не вытерпит рядом с собой этого вечного праздника. Первое время после разрыва Ять бесился: ведь вот, мне она не прощала ничего, а другим наверняка сходит с рук что угодно. Но потом понял, что именно эта способность вытерпеть все от других и была знаком окончательного к ним безразличия.</p><p class="p1">Встретятся они еще или нет, Бог весть, но ведь бывают любовные истории, которые и без встреч длятся годами. Только во сне прежнее настигало, хотя все реже, — но и одной такой ночи было достаточно, чтобы из пыльной комнаты, в которую превратился теперь его мир, выглянуть в сияющее окно и понять, что за ним все по-прежнему. Даже отчаяние, связанное с ней, было волшебно-раскрашено.</p><p class="p1">Ведь откуда, собственно, наше желание слиться с красотой? Я разумею сейчас примитивное соитие, для которого не зря приспособлено слово «обладать». Опустим телесную грубость, так называемый зов плоти, неотступно тревожащий разве что гимназиста. Стремление соединиться с ней было того же корня, что детское желание положить на музыку любимые стихи, разыграть по ролям диалог из читаемой на ночь книги, — присоединиться, присоседиться с краю к чужому триумфу. Вероятно, она не была красива в общепринятом смысле, и есть ли общепринятый смысл? Но на ней лежал отсвет, быть может, даже для нее незаметный, — который делал каждое ее слово, каждый поворот головы доказательством иной жизни, и желанием проникнуть в эту жизнь, прилепиться к ней и была на самом деле жажда обнимать, гладить, сливаться.</p><p class="p1">И всякий раз, как его одолевало сомнение в ее подлинности, он вспоминал ее манеру слушать — склонив голову, щурясь, — или привычку хмуриться, когда при ней заговаривали о деньгах, или позу во сне — всегда на животе, правая нога согнута в колене, руки обнимают подушку; или выгиб ступни, белой, тонкой, почти детской. Чем интимнее, голее, запретнее было воспоминание о ней, тем отчетливее в нем сквозила неразрывность ее души и оболочки: как мог бы он представить, что эту душу влили в иной сосуд? Если есть будущая жизнь и мы удостоимся в ней зримого воплощения, яснее выражающего нашу заветную суть, — все воскреснут другими, потому что у каждого в земном образе был зазор меж замыслом и результатом, а Таня будет все та же, потому что полнее воплотиться нельзя.</p><p class="p1">Моветон, о да, в ней действительно был, но он так же не резал глаз, как никого не смущает избыточное здоровье. У нее всегда можно было узнать последнюю новость о последней знаменитости. И все это не жажда признания и не погоня за новизной, а все та же ненасытимая жадность. Она всегда зябла Может быть, попросту его собственный огонь был слаб, чтобы обогревать хрупкое, зябкое… но хрупкость обманчива. Она никогда ничем не болела, знать не знала, что такое хандра, и, может быть, впечатление дурновкусия возникало лишь потому, что существу столь полнокровному и жадному не пристала обманчивая бледность, что декадентские игры со смертью никак не сочетались с ее неутолимым, жадным весельем. Но почему бы жизни не поиграть со смертью, кошке — с мышью? Когда он был с ней, смерть казалась нормальным условием контракта: если бывает такая полнота счастья — почему бы, в конце концов, и не умереть когда-нибудь?</p><p class="p1">Ять знал, отчего именно теперь так ясно вспомнил Таню Поленову. Всему виной был вчерашний визит к Казарину, знакомство с Машей Ашхарумовой и боль, пробужденная им. Казарину-то пришлось хуже: если Ять к своей идее отказа пришел после, пережив всю полноту счастья и несчастья, — Казарин отказался заранее, из врожденного страха, и потому все его аккуратные, гладкие, совершенно как надо сделанные стихи всегда что-то обещали и опять обманывали. При всей его корректности и подчеркнутой холодности манер натура его была страстная, даже порочная, — отсюда же неизлечимое картежничество, способность играть несколько ночей кряду, иногда со значительными выигрышами, которые он тратил загадочно. Говорили, что были эксперименты с морфием — алкоголь не брал его совершенно, да и не то было у него самолюбие, чтобы экспериментировать с алкоголем, доступным всякому подмастерью. Тайная тяга за пределы, к угадываемой подлинности, жгла его изнутри и не находила выхода, и перейти последнюю грань он всякий раз страшился — потому, быть может, что знал за собой способность к безоглядному саморазрушению. Решившись раз, он погиб бы весь — и потому в стихах останавливался за шаг до единственно точного слова, а в собраниях предпочитал маску знающего, но не говорящего. Теперь панцирь его давал одну трещину за другой, и слова «Я совсем, совсем иначе теперь пишу!» обещали многое. И странное дело — Ять почти завидовал ему.</p><p class="p1">Однако пора было выбираться из-под груды наваленных на постели пальто, заново растапливать печь, приводить себя в порядок, отправляться к Мироходову и посещать Сенной, чтобы не являться в гости с пустыми руками. Ять давно уже спал одетым, снимая только носки — ноги не отдыхают, если спать в носках. Белья он тоже не стелил уже месяца два — какое белье, когда не разденешься. Печка выстыла, он выгреб золу и приступил к растопке. Дров положил немного: тепло требовалось часа на два, чтобы успеть дописать «Листки» — еженедельную рубрику, которую он вел у Мироходова на вольную тему. В последнее время все писали на вольную тему, потому что разобраться в реальности не было уже никакой возможности.</p><p class="p1">Он поднес зеленоватое пламя спички к кому старых газет — благо этого добра было всегда в избытке, — минут пять посидел у печки, глядя, как разгорается, протянув к ней ладони, потом встал и направился к столу. Бумаги у него хватало, самой отборной — Мироходов в прошлый раз подарил прекрасную пачку. Идея появилась у Ятя давно, но оформилась утром, и это было как-то связано со сном. «Памяти Гаршина», — написал он сверху и подчеркнул по обыкновению волнистой чертой. Попробовал ради шутки написать первую фразу по-новому, без ятей и еров: возникало досадное чувство незаконченности и почему-то бедности. Слово без ятя слепло, утрачивало нюанс, а без ера в конце глядело странно незащищенным, будто твердый знак в конце ограждал его от белого бумажного холода. Он усмехнулся и принялся писать, как привык.</p><p class="subtitle">18</p><p class="p1">«Обыкновенно, собираясь говорить о ком-либо из покойных наших писателей, мы ищем юбилейного повода. Считается, что обязанность журналиста — извещать читателя о новостях. Но признаемся себе, что никаких новостей давно нет — или что они вышли из сферы нашего понимания, — а потому поговорим об одном из рано погибших литераторов, которого современники считали сумасшедшим, а потомки то называли гением, то прочно забывали. Впрочем, если нужен юбилейный повод, то у Гаршина и точно юбилей: через два месяца исполнится ровно тридцать лет с того дня, как он в бреду прыгнул в лестничный пролет.</p><p class="p1">Но заговорить о нем мы решились не из-за грустного юбилея (до которого, Бог весть, доживем ли еще). Нам вспомнилась одна из его сказок, из описанных им смертей — «Attalea Princeps», произведение, прославившее его после смерти, но при жизни вызвавшее даже некоторое затруднение при публикации. Недовольство выказала цензура — но не государственная, а либеральная, в основе своей много страшнейшая, ибо действует не от лица государства, а от имени самого Абсолюта. Крупный сатирик, от которого не ускользнуло, кажется, ничто в нашем прошлом и будущем, не желал помещать в своем журнале произведение столь пессимистическое, — пусть, мол, ваша пальма прошибет теплицу и увидит за ее пределами солнце… пусть замерзнет, пусть хотя бы и умрет, но хоть на миг вздохнет всею кроною! Однако тут уж мягкий и уступчивый Гаршин решительно отказался от переделок. Слава Богу! Чего доброго, вместо истинно поэтического творения на свет явилась бы еще одна грубая аллегория, какими наводнялась наша печать и в гаршинские, и особенно в недавние времена (всем памятны бесчисленные гордые птицы, мерзкие змеи и даже, кажется, грибы, отважно пробивающие головами дорогу к свету сквозь косную почву). Бели читатель помнит, в гаршинской сказке не одно действующее лицо на фоне чахлых и трусливых оранжерейных растений, но два: пальма и травка. Травка эта не имеет никакого собственного значения и служит для придания естественного вида искусственным оранжерейным грядкам. Но именно она, слабая и забитая, с мелкими пухлыми листьями, сочувствует гордой пальме, которой надоел тепличный потолок и негаснущий бледный свет. Можно сказать, что пальма все и затеяла во имя травки — дабы она увидела наконец свободу; прочим обитателям оранжереи это совершенно не нужно. В этой истории мне видится аналогия не с тогдашним радикальным движением, а скорее с участью всей нашей интеллигенции в последний век. Полагаю, если б я хоть полгода назад высказал мысль о том, что российская государственность была, в сущности, теплицей для нашей либеральной мысли, — та самая либеральная цензура, от которой бедствовал Таршин, подняла бы в ответ привычный, хорошо срепетированный вой.</p><p class="p1">Пальме нельзя не расти, в этом ее предназначение. Теплице нельзя не ограничивать ее роста: не будь в ней так тесно — не было бы и так тепло, и пальма бы ниоткуда в ней не выросла. Травке нельзя не тянуться за пальмой, — но приписывать этой травке какую-либо собственную волю и тягу к свободе могли лишь очень недалекие, люди, не чувствующие собственной истории. Даже неловко сегодня спорить с ними после того, как жизнь сама им все объяснила — я не люблю брать сторону жизни.</p><p class="p1">Сегодня дыра пробита, в теплице сквозит, стены ее шатаются. Дивиться ли, что формы русской государственности, какими они сложились в общих чертах еще при Петре, не выдержали напора! Возможно, теплицу стоило реформировать десять, двадцать, сто лет назад — но кто же в самом деле думал, что какая-то пальма пробьет потолок, казавшийся незыблемым! Великое пророчество нашего национального гения, лишь недавно открывшееся нам в подлинном своем виде, сбывается на глазах — одно только слово следовало бы в нем заменить: «Оковы тяжкие падут, теплицы рухнут, и свобода вас примет радостно у входа…» Что ж — приняла. Вокруг описанный Гаршиным хмурый пейзаж петербургского утра: снежок просеивается на улицы, словно сквозь сито, и пьяный мастеровой с гармоникой бредет, не помня — откуда, не зная — куда. В Европе, на которую мы привыкли оглядываться, потому и не будет никогда ничего подобного, ее история потому и не знает бурных катаклизмов вот уже сто лет, со времени изгнания Наполеона, что демократия есть поистине безупречный механизм выращивания травки до уровня средней пальмы и принижения пальмы до роста крупной травки. Оттого лучшая европейская литература так напоминает в последнее время непомерно разросшуюся траву: но трава — все трава, хотя бы она и вымахала выше человеческого роста. Поразительно чутье Европы, которая уловила опасность революции, идущую от нового, умного поколения, — и тотчас бросила это поколение в войну, откуда оно выйдет и выбитым, и огрубелым. Люди, три года проведшие в окопах, далеко не способны к тем открытиям, прозрениям и бунтам, что люди, тридцать лет воспитываемые в теплице.</p><p class="p1">Что ж, спросит иной читатель, установление нового строя обережет нас от грядущих катаклизмов? Ведь пальмы будут вырублены под корень — после краха теплицы они никому не нужны? Осмелюсь успокоить этих мрачных пророков: демократия, пожалуй, и впрямь уберегла бы нас от возникновения новых национальных гениев, которым для роста потребны праздность, и неравенство. Но поскольку на воцарение демократии ничто в нынешней России не указывает, вся ее будущая история предстает нам таким же чередованием болезненно-бурных расцветов и нежданно-жданных катастроф: пусть расцветы будут потусклее — зато и катастрофы помельче.</p><p class="p1">Ничего удивительного, что новое государство (если о нем вообще позволительно говорить) начало с упрощений, а по сути, отмен — от Учредительного собрания до правил правописания. Обозначилась эта тенденция задолго до октябрьских событий — когда вместо утонченных, в Бердслеевом духе картин наши художники стали выставлять круги и квадраты. Иногда казалось, что иные наши пальмы и сами хотят уже стать травкой, чувствуя, что несколько занеслись в своем росте… да поздно.</p><p class="p1">А травка — что ж травка. Поживет еще и забудет пальму. Теплицу, конечно, восстановят, только будет она теперь попроще, поскудней. Никакого искусственного света — только дневной. Никакого круглосуточного обогрева — чтобы всякого рода Attalea Princeps не вымахивали выше среднего роста. В таком виде эта теплица может просуществовать еще многие десятилетия — единственное требование к нам, чтобы мы не вырастали выше положенного. Полагаю, в новых обстоятельствах, да еще с памятью о судьбе гордой соседки, нам нетрудно будет выполнить это условие. Но все теплицы и все пальмы кончают одинаково — вне зависимости от того, стоит ли теплица в Императорском ботаническом саду или делается собственностью восставшего народа».</p><p class="p1">Как и после сна, требовалось минут пять, чтобы прийти в обычное состояние, спокойно перечесть написанное, убрать повторы. Истина, казавшаяся новой и несомненной во время писания, выглядела теперь удручающей банальностью. Однако в целом он остался доволен — кое-какие случайные проговорки, когда пришлось отвлечься в сторону, обещали интересные варианты. Ять уложил листки в портфель и вышел из дому. Завтрака он себе давно не позволял.</p><p class="subtitle">19</p><p class="p1">Мироходов сидел все так же в своем крошечном, тесно заставленном кабинетике, в четвертом этаже высокого серого здания на Среднем проспекте, напротив давно закрытой пекарни, где, помнится, выпекали прелестные розанчики с разнообразными вареньями. Ять всегда улыбался, думая о «Нашем пути». В конце концов, не так много было на свете мест, где он не чувствовал себя чужаком.</p><p class="p1">«Наш путь» (бывшая «Воля народа», а еще до того «Наша речь») размещался в одной квартире, состоявшей из пяти комнат и просторной гостиной, где собирали сотрудников или угощали гостей по случаям юбилеев. Юбилей успели отпраздновать единожды — пятилетие в марте, — но отмечали тут и дни рождения любимых авторов, и попросту выпивали без повода, когда было настроение. В прихожей обычно сидел чрезвычайно представительный дядя Лева, открывавший посетителям и охранявший редакцию на случай погрома (однажды действительно пытались ворваться какие-то мелкие драчуны, после статьи самого Ятя против Пуришкевича, но дальше перебранки дело не пошло, расколотили только с улицы пару окон). Теперь многое изменилось. В ноябре пришлось поменять название (тогда единым махом позакрывали двадцать пять, кажется, газет, но все через неделю разрешили после переименования). Дяди Левы не было — уехал из Петрограда к родне в Харьков, где казалось ему сытнее, — и Мироходов сам открывал посетителям. Он жил в том же доме этажом выше, с женой и двумя дочерьми (одна на выданье, вторая развелась, вернулась к отцу и снабжала газету переводами). Ять любил и семью с ее безалаберным, но любовным бытом, и бородатого, бровастого, подвижного ее главу, умудрявшегося шестой год делать пристойную газету среди всеобщего визга и торгашества.</p><p class="p1">— Читали нового Арбузьева? — сразу спросил Мироходов, и приятно было уже то, что спрашивает он не о новом постановлении правительства, не об отсутствии электричества и не об урезании пайка. — Удивительно! Все, что он пишет, мне чуждо, и однако, сама искренность…</p><p class="p1">— Да, очень интересно, — с порога отозвался Ять. — Кто он такой — вы так и не узнали?</p><p class="p1">— Говорят, историк.</p><p class="p1">— Ну, нет, — Ять махнул рукой. — Не обманете. Я своего брата газетчика учую за версту. Ежели хотите, расскажу в деталях, что за человек. Есть вещи, которые всякий может написать, а тут голос так и слышишь. Я даже думал, не псевдоним ли, — но не пойму, с какой бы стати сильную вещь печатать под чужим именем. Гувер рядом с ним бледноват, а ведь Гувер серьезный малый.</p><p class="p1">— А что ж, в этом споре я за Гувера. Он дело говорит.</p><p class="p1">Публицист Гувер утверждал только самоочевидные вещи, соглашался с авторитетами и спорил исключительно с теми, кто не представлял для него опасности. Он и теперь стоял на позициях столь правоверных, что даже Ять, считавшийся консерватором, испытывал некоторую брезгливость при чтении гуверовских слюнобрызжущих инвектив. Будь воля Гувера, он вернул бы в Россию домострой, ввел полуустав и упразднил табак. Арбузьев наскакивал на него озорно и безжалостно, заносясь, впрочем, в противоположную крайность — у него получалось, что лучше большевики, чем охранители; Ять, как всегда, не соглашался с обоими, но арбузьевский молодой задор привлекал его. Только ради многомесячной полемики этих двоих стоило иногда покупать «Путь».</p><p class="p1">— Так разве в этом вопрос, Всеволод Ростиславович? — Ятю нравилось прокатывать во рту самое имя Мироходова, столь вызывающе русское и неподходящее, казалось бы, к его образу мыслей, но точно к нему прилаженное, ибо даже при малом росте он производил впечатление силы и укорененности в мире. — Разве вопрос в правоте? Нет сегодня никакой правоты, и завтра не будет. Я давеча про то и написал, что не осталось незамаранных, и те хороши, и эти, а стало быть, придут третьи. Теперь уж не о правоте речь, а о честности. И Арбузьев мне, как хотите, приятней: он подставляется, а Гувер кругом прав. Неувлекательно.</p><p class="p1">— Все бы вам увлекательности, а между тем гибель — вот она.</p><p class="p1">— Я правоты боюсь, Всеволод Ростиславович, — твердо проговорил Ять. — Правота всего страшней. Гувер знает, а Арбузьев сомневается. Потому-то Гувер и большевик побольше Арбузьева. Вот помяните мое слово, Арбузьеву скоро руки не будут подавать. Паче всего мы боимся не угодить своему брату либеральному интеллигенту. Воплощенной укоризною и все прочее.</p><p class="p1">— Вы свое-то принесли?</p><p class="p1">— Принес, — Ять расстегнул старый портфель, служивший ему талисманом, и извлек пять утренних листков.</p><p class="p1">— Что же это вам Гаршин вспомнился? — глянув на название, спросил Мироходов. — Свежих впечатлений нет?</p><p class="p1">— Это самые свежие, свежей некуда.</p><p class="p1">Почитать, однако, Мироходову не пришлось. У него была обаятельная манера не прятать статью в ящик и даже не отдавать в набор сразу (что было лестно, а все-таки немного неприятно); он всегда прочитывал приносимое, пусть бегло, мигом выделял эффектную фразу, иронически или одобрительно произнося ее вслух; он и теперь поправил очки и пробежал уже начало, когда в редакционную дверь сначала позвонили, а потом, не довольствуясь звонком, принялись колотить.</p><p class="p1">— Обыск? — тихо спросил Ять.</p><p class="p1">— Не извольте беспокоиться, не извольте, — прокряхтел Мироходов, с удивительной невозмутимостью выбираясь из-за стола. — Дело самое привычное, это меня закрывать пришли.</p><p class="p1">— Так ведь уже закрывали.</p><p class="p1">— Да много ли газет осталось в Питере? Закрывать-то надо кого-то, вот и прилетел, голубок, по второму кругу…</p><p class="p1">Прилетевший голубок оказался высоким и страшно худым мужчиной с журавлиными, вывернутыми в стороны ногами, с черной бородой и огненными глазами, над которыми угрюмо нависал козырек картуза, отдаленно напоминавшего английское армейское кепи. С ним явились двое матросов и третий — явно темный, из самых настоящих, с желтым одутловатым лицом, замотанный в засаленное тряпье.</p><p class="p1">— Редактор «Нашего пути» Мироходов? — спросил голубок пронзительно-высоким голосом и гулко закашлялся. В кашле этом Ятю почувствовалось нечто картинное — привет, мол, из каземата.</p><p class="p1">— Точно так-с, — любезно сказал Мироходов, широко улыбаясь.</p><p class="p1">— Комиссар Минкин. От Единой комиссии по делам печати.</p></span>
