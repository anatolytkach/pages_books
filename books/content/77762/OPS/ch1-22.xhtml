<span><p class="p1">— Кстати, — начал он, — особенность нашего времени в том, что про вас можно с равной убедительностью наговорить противоположностей. Какой-нибудь человек восьмидесятых и даже десятых годов — о Вячеславе Андреевиче я не говорю, конечно, — весь на ладони: он определяется одной чертой. Сам себе ее выбрал в гимназии и нипочем не отступится. Знаете, я читал где-то, что художник кончается, как только он определился: вот это несчастное «свое лицо», которого все требуют критики, — это конец, верно? Застыл — и погнал повторы… Мне страшно иногда думать про эти толпы людей, которые жили себе чинной, размеренной жизнью, читали «Вестник Европы» и «Русское богатство», на двадцатилетие деятельности давали обеды, на тридцатилетие — издавали сборники… Журналисты, адвокаты, чиновники, и все такие либералы — с готовым набором взглядов, способностью поддержать любой разговор… страшно ограниченная публика, но притом — хорошие люди, порядочные, с надушенными бородами… Корабельников — он неправ, когда говорит, что все они сволочи.</p><p class="p1">— Корабельников — неприятный, — твердо сказала Ашхарумова.</p><p class="p1">— Да, конечно, мне и Борисов говорил. Александр Александрович, конечно, настоящий поэт и все подобное, но… он кровожадный какой-то, и потом, надоедают все эти гиперболы. Но и он ведь, в сущности, человек десятых годов, только опоздавший. Он пришел, а всё уже съели. И он: ну, тогда я хоть тарелки побью… Ашхарумова прыснула.</p><p class="p1">— Ну вот, — продолжал ободренный Барцев, — а вы не такая, и я, страшно сказать, не такой. И Альтер, честное слово. Но Альтер — это, конечно, крайний случай, он любит гадости. А про вас можно напридумывать что угодно, потому что вы могли получиться и в такой семье, и в другой, и вот в этакой. Новый век принес главный кошмар: что правда не одна. Этого надушенные бороды никогда бы не вынесли. Отсюда вся эта борьба, странные расколы между своими… до бесконечности можно дробиться. Не могут люди понять, что — и ты прав, и ты прав, и Альтер прав… Хорошо хоть, это теперь математически объясняется: математике больше верят.</p><p class="p1">— Э, нет, — сказала Ашхарумова, — так можно далеко зайти. Скоро у вас получится, что правды вообще нет, а потому и Славины стихи, и стишки Альтера равноправны.</p><p class="p1">— Конечно, — удивился Барцев. — И «Лориган Коти» — искусство, и обертку от него еще в музее выставят, вот увидите.</p><p class="p1">— Но вы не учитываете одного, — погрозила она варежкой. — «Лориган» — «Лориганом», но прошлое у меня все-таки было одно. И если вы не можете его угадать, то и вольно вам доказывать, что могло быть то, а могло — другое… Так же и в стихах: Слава может угадать и поэтому пишет мучительно и мало, а ваш Альтер…</p><p class="p1">— Да какой же он мой?</p><p class="p1">— Хорошо: наш Альтер ничего угадать не может и потому без усилия пишет о том, как он не может угадать. Разницу видите?</p><p class="p1">— Вы опять хотите сказать, что Мерка одна!</p><p class="p1">— Почему, она может быть разной. Просто теория ваша… извините, но в ней Крестовский дух. Революция, все можно. Пойду и напишу: «Корова здорова», и будет лучше Пушкина.</p><p class="p1">— Понял! — торжествующе воскликнул Барцев. — Теперь понял. Извините, иногда нужны вопросы и даже прямая провокация. Наконец все вижу. В общем, вы невероятно самолюбивы. Но это у вас идет не оттого, что — вот, я хороша, — а от причастности к чему-то, что вам дорого. Если вас оскорбляют или просто не любят, то это в вашем лице не любят само искусство, саму жизнь, если хотите. Гликберг называет это переносом: вы за другого обижаетесь, а не за себя. Дальше: вы страшно здоровы. Вы здоровы так заразительно, что даже бедненький Альтер немного стал мужчиной. Я поражаюсь вашей двужильности — а ведь я сам… — Он быстро и неожиданно подхватил ее на руки, немного покружил и поставил. — Это был не жест, как говорит Гликберг, а демонстрация, как говорит она же.</p><p class="p1">— Положим, — задумчиво сказала Ашхарумова. — Насчет переноса вы с ней правы — я действительно всякий раз обижаюсь не за себя… Насчет здоровья — ну, это нетрудно.</p><p class="p1">— Подождите, это ведь не всё. Вы падки на лесть, по той же причине, по которой обидчивы. У вас плохая память на стихи, вы запоминаете только то, что вас сильно задело. Почерк у вас прямой — заметьте, я ведь его не видел! В детстве вы дружили только с мальчиками. У вас мог быть старший брат… да, старший брат, скорее всего, есть.</p><p class="p1">— Есть, — она внимательно посмотрела на Барцева. — Вы знакомы?</p><p class="p1">— Нет, — поморщился он. — Вы хотите, чтобы всё совсем просто… Потом: вы легко помогаете, и чем труднее требуемая помощь — тем больше вас это захватывает. У вас нет такого, что — вот, моя жизнь, мои дела, почему я должна все это бросать и на другого тратить… Для вас нет разницы — что писать стихи (которых вы, я думаю, с гимназии не пишете), что кормить какого-нибудь, например, кота или спасать его с крыши, — так?</p><p class="p1">— Кота даже интереснее.</p><p class="p1">— Вы легко засыпаете, — перечислял он все быстрее, — вы любите есть, вам нравится Шопен, вам никогда не давалось фортепиано, вы терпеть не можете бездельничать, вам нравится чувство опасности, вы хорошо вяжете, у вас в детстве была птица, вы знаете немецкий, у вас никогда не было собаки, левым глазом вы видите чуть хуже, вы охотно поехали бы в ресторан с Распутиным, вы уверены в своем бессмертии, я вам все еще не надоел?</p><p class="p1">— Всё правильно, — засмеялась она. — И с Распутиным бы поехала, обязательно. Из всех исторических злодеев не поехала бы только с Иудой. Они оба нарочно замедляли шаг, им не хотелось расставаться так скоро.</p><p class="p1">— Но заметьте, в половине случаев вы говорили первое, что в голову взбредет.</p><p class="p1">— Совсем нет. Вы недооцениваете метод. Я ставлю себя на ваше место, полностью перевоплощаюсь — и вот… Что и требовалось доказать! Когда-нибудь я напишу этим методом целый роман. Все романы написаны неправильно, но мой будет правильный. Когда революция, роман должен взрываться изнутри. В него придет масса. Каждый герой появляется и исчезает, недолго помаячив перед камерой — как, знаете, в съемках. Главного нет.</p><p class="p1">Но тут Барцев, разрезвившийся и утративший всякую солидность, вдруг резко замолчал и инстинктивно попытался заслонить собою Ашхарумову: навстречу им по набережной медленно, тяжело шел сутулый человек с огромным камнем в руках. Он тащил его из последних сил, надрываясь, — хотя и человек был большой, под стать камню; он остановился передохнуть — остановились и Барцев с Ашхарумовой.</p><p class="p1">— Проходите, — сказал он издали слабым, тонким голосом. — Проходите, на меня не смотрите. Я передохну и дальше понесу.</p><p class="p1">— Вам помощь не нужна? — с облегчением спросил Барцев.</p><p class="p1">— Нет, это я могу только один. Только сам.</p><p class="p1">Он постоял немного и снова поднял свой камень и, кряхтя, прижимая его к груди, потащился дальше. Камень тянул его вперед и вниз, и несчастный переносчик тяжестей словно на каждом шагу падал, в последний момент успевая восстановить равновесие; слышно было его сиплое дыхание.</p><p class="p1">— Я мог бы еще понять, — сказал Барцев, когда они отошли достаточно далеко от странного прохожего, — тащи он бревно. Но камень… он что, на растопку его понес?</p><p class="p1">— На утопку, — усмехнулась Ашхарумова. — Топить Муму.</p><p class="p1">— Черт, а вдруг самоубийство такое экзотическое? Прыгнет с камнем, чего доброго… Надо было его остановить!</p><p class="p1">— Эх, Паша. В душах читаете, а прохожего распознать не можете. Я самоубийц всегда чувствую. Он простой сумасшедший, без всяких самоубийственных вымыслов. Неужели самоубийца будет на другой конец города тащить себе камень, каких на мостовых множество? Тут что-то серьезное, заранее обдуманное и явно рассчитанное на жизнь…</p><p class="p1">— Да, пожалуй, — успокоился Барцев. — Тащить, когда тут можно с любого места прыгнуть… это я того.</p><p class="p1">— А вот это в вас как раз от тех, с надушенными бородами. Вам все кажется, что все должны с мостов прыгать. А очень многие счастливы, счастливее, чем были… Он сам не ожидал, что с ней будет так легко.</p><p class="p1">— Стойте! — вдруг резко остановилась она и подняла руку.</p><p class="p1">— Что такое?</p><p class="p1">— Тише… Прошла минута.</p><p class="p1">— Мне показалось, что сейчас действительно придется спасать кота. Или плачет кто-то?</p><p class="p1">Недалеко от Елагина моста в сырой зеленой ночи едва можно было различить маленький сгорбленный силуэт.</p><p class="p1">— Я его вижу, — сказал Барцев. — Бежим туда.</p><p class="p1">Они подбежали к мальчику.</p><p class="p1">— Откуда он тут ночью? — спросила Ашхарумова. — Ты что тут делаешь, маленький? Ты потерялся?</p><p class="p1">Мальчик поднял на них огромные испуганные глаза, но едва Ашхарумова попыталась подойти ближе — обнять, погладить, утешить, — как он стремительно отбежал на несколько шагов и снова замер, испуганно на них глядя.</p><p class="p1">— Не бойся! — упрашивала она. — Ну же! Мы никакого зла тебе не сделаем!</p><p class="p1">Барцев боялся сказать слово: его ребенок испугался бы скорее. Но и Ашхарумовой никак не удавалось приблизиться к нему.</p><p class="p1">— Ну что ты?! Не бойся!</p><p class="p1">Мальчик громко всхлипнул и опрометью кинулся в темные улицы. Казалось, от страха он забыл все слова.</p><p class="p1">Ашхарумова растерянно оглянулась на Барцева.</p><p class="p1">— Что вы стоите? Бегите за ним!</p><p class="p1">— Мне его не догнать. Да его уже и не видно…</p><p class="p1">— Толку от нас с вами никому и никакого, — сказала она зло.</p><p class="p1">— Я найду его, — сказал Барцев. — Хотите?</p><p class="p1">— Да конечно! Бегите скорей!</p><p class="p1">Он тяжело побежал в ту сторону, где меж домами скрылся мальчик. Ашхарумова некоторое время смотрела ему вслед, невольно улыбаясь. Ей не очень нравилось, что Барцев сам не кинулся вслед, — но зато нравилось, что по первому ее слову он отправился на ночные опасные поиски. А все-таки было бы интересней, если бы он ее проводил. Вероятно, он захотел бы ее поцеловать. И она не была уверена, что не позволит ему этого. Завтра он, наверное, зайдет рассказать — нашел мальчика или нет.</p><p class="p1">Но он не зашел, потому что никого не нашел.</p><p class="subtitle">28</p><p class="p1">— Что, — сказал Свинецкий, — понимаете ли вы теперь?</p><p class="p1">Они сидели в кофейне Пастилаки, и вокруг пламенел неописуемый, красно-лиловый закат. Виноградные кисти туч лежали на горизонте. Только у Рериха видел Ять подобные краски. Вся верхушка Аю-Дага была в дымке, что обещало пасмурный день; о, как страшно, должно быть, сейчас в пустынной роще на вершине! А здесь было счастье и бродили люди — те самые, которые три часа назад казались Ятю исчадиями ада. Теперь они были милы, просты и домашни, и каждый испытывал ту смесь разочарования и облегчения, которую всегда приносит с собой избавление от соблазна. Ять возвращался однажды ночью на извозчике с большой скучной литературной попойки, дремал и проснулся, только когда извозчик поворотил на Разъезжую (в то время он еще снимал квартиру там):</p><p class="p1">— Эй, слышь! Тебе где тут?</p><p class="p1">Это был неприятный, фамильярный малый — Ять терпеть не мог, когда извозчики ему тыкали, но в тринадцатом году это было уже нормой.</p><p class="p1">— Через три дома, — вялым голосом отозвался он. Во рту было отвратительно, голова гудела.</p><p class="p1">— Чуть не облегчил я тебя, — говорил извозчик со странной смесью восторга и разочарования. — Ты спишь, пальта расстегнутая, я и гляжу: бумажник. Из кармана торчит. Я бы взял — ты бы нипочем не заметил! Что, много ведь там у тебя?</p><p class="p1">— Почти пусто, — сказал Ять. — Заплачу тебе — будет совсем пусто.</p><p class="p1">— Чего ж такой бедный? — неодобрительно спросил лихач.</p><p class="p1">— Да так, с собой не ношу, — разочаровал его Ять. Малый, однако, был безутешен: сообщением о том, что кража была бы лишена всякого смысла, Ять окончательно уничтожил его подвиг. Примерно в таком настроении прогуливались сейчас по набережной жители Гурзуфа: оно, конечно, хорошо, что пронесло, что не взяли на душу греха… а все-таки как было соблазнительно! Еще чуть — и Могришвили сделал бы из Гурзуфа столицу Крыма; а что данью обложил торгующих на базаре да пару домов потребовал отдать — ну, что ж, бывает, может, потом бы и погром небольшой… но что делать, если иначе не понимают?</p><p class="p1">Дукан Кавалеризде был закрыт. Интересно, где теперь Кавалеризде? Приходилось сидеть у Пастилаки, но Ять всегда больше любил Пастилаки; а что у него не было еды — так после этого безумного дня ему и не хотелось есть.</p><p class="p1">Неотвратимо темнело. Среди лиловых, округлых, громоздящихся друг на друга облачных глыб все меньше было розово-алых просветов; море, густо-лиловое вдали, у берега было темно-синим — потому что над городом сгущалась синева и только на закате что-то еще буйствовало, боролось. Там клубился дым вокруг невидимого жерла, словно ядро только что вылетело в сторону берега.</p><p class="p1">— Вы поняли теперь? — повторял Свинецкий. — Вы поняли, что нельзя отделываться иронией, желать мира, отсиживаться в кустах? Вы поняли, чего стоит человек без ежеминутной готовности к смерти?</p><p class="p1">— Да, да, — умиленно кивал Ять. Со стыдом и восторгом смотрел он на своего спасителя, сохранившего Зуеву — дом, Маринелли — пол, а Ятю — остатки самоуважения. Бескорыстный, чистый диктатор Свинецкий провел первую в жизни удачную боевую операцию — спасибо, конечно, анархистам: они не рискнули подходить к Гурзуфу на крейсере, да и стоит ли стрелять из пушки по воробьям, — но отправили с эсером конный отряд. К нему присоединились раскаявшиеся черножупанники гетмана, желавшего загладить свою вину.</p><p class="p1">Могришвили бежал со всей своей охраной, не приняв боя. Конница анархистов преследовала их до самых непроходимых мест — грузин хорошо знал окрестности Гурзуфа; в трех километрах от города начинались пещеры. Завербованные им босяки частично сдались, частично последовали за ним в горы.</p><p class="p1">— Но теперь вы понимаете, — упорствовал Свинецкий, — что счастье — в постоянной борьбе, прежде всего с собой? Что надо ежесекундно себя закалять для возможной битвы? Найдись один человек, который воодушевил бы массу, — и этого крошку-диктатора погнали бы в три шеи без нашей помощи!</p><p class="p1">— Не знаю, — задумался Ять, — не знаю… Я знаю только, что вы недооцениваете его. Да, дурак, да, трус, да, мелкий диктатор… но он не остановился бы ни перед чем, я уверен. Я чувствовал за ним страшную волю — говорю это не в оправдание своей трусости, но чтобы вы не успокаивались. Я еще не встречал таких людей, хотя много писал о городских низах. Говорю вам — это что-то новое.</p><p class="p1">— Ничего нового, — покачал головой Свинецкий. — Не демонизируйте зло, в нем нет ничего интересного. Главное — что вы поняли теперь, в какого моллюска превращает человека неверие. Ведь поняли?</p><p class="p1">— Я и не сомневался в этом. Отсюда вся моя ненависть к себе… хотя, что скрывать, и гордость иногда.</p><p class="p1">— Вам ясно, что вы должны вернуться в участок? — просто спросил Свинецкий.</p><p class="p1">— Да, да, конечно! — горячо ответил Ять. — Я виноват перед вами…</p><p class="p1">— Ненадолго, — успокоил Свинецкий. — Еще два-три разговора — и вы поймете всё. Но без этого символического пребывания там вы не прочувствуете, что такое ненависть.</p><p class="p1">— Я не буду ненавидеть вас, — покачал головой Ять.</p><p class="p1">— Речь не обо мне. Как бы то ни было, на сегодняшний вечер и на всю ночь вы свободны. А утром пожалуйте в участок — денька на два, на три. Там подумаем, что с вами делать. Может быть, поработаем вместе в управе. Грэма я тоже звал, но он хочет уйти с утра. Говорит, что вернется к Рыленко — хочет писать какую-то мистерию…</p><p class="p1">— Последний вопрос, — сказал Ять. — Что вы думаете делать с орфографией?</p><p class="p1">— С орфографией? — изумился Свинецкий. — Об этом я, признаться, не думал… Вы и займитесь, когда выйдете. Есть у вас идея реформы?</p><p class="p1">— В последнее время мне кажется, что надо изъять только меня. Все остальное пусть будет как будет. И твердый знак после слов пусть остается. А то у нас слишком мало еров, понимаете?</p><p class="p1">— Ну уж нет, — твердо сказал Свинецкий. — Изымать себя я вам не дам ни при каких обстоятельствах. Нужно только ввести твердые правила, как вас употреблять, — и почаще менять их, чтобы умы не коснели. Но обо всем этом надо подумать серьезно, когда я решу вопросы с продовольствием и армией. Ладно, идите к невесте. Ждет, наверное.</p><p class="p1">— Спасибо, — сказал Ять, чувствуя, как к горлу его подступают слезы — сладкие слезы прощенного.</p><p class="empty-line"/><p class="p1">— Господи, как я тебя люблю, — плакала Таня. — Как я тебя люблю.</p><p class="p1">— Не плачь, маленькая, — повторял Ять, гладя ее волосы, плечи, руки. — Что ты? Все же кончилось. Мы скоро с тобой уедем.</p><p class="p1">— Ах, ты не представляешь, как я боялась все это время. Стоило тебе приехать, и они как с ума посходили…</p><p class="p1">— Ну конечно. Так всегда бывает. Любовь устраивает вокруг себя бурю.</p><p class="p1">— Нет, я знаю, знаю: ты опять уйдешь… Все это у нас всегда ненадолго. Мы не можем быть вместе долго: слишком горячо.</p><p class="p1">— Мы уже расходились, Танька, — кому было лучше?</p><p class="p1">— Никому, но это, наверное, неизбежно. Обними меня, мне холодно. Что он все ходит и ходит?</p><p class="p1">Внизу по диагонали мерял комнату Зуев — не мог заснуть: видимо, от переживаний этого дня. Маринелли так и не пришел — праздновал счастливое избавление с новыми победителями.</p><p class="p1">— Я не могу без тебя, но всегда есть что-то… Все дело в этой аналогии, по которой не может установиться никакая власть. Все бездарны, все смешны, ни одна не удержится. Так и у нас с тобой не может быть семьи — постоянной семьи. Ты понимаешь? Всегда будет полная радуга, все испытания, все страсти, все виды тоски — и опять разрыв, и до новой вспышки, пока кто-то не выдержит…</p><p class="p1">— Танька, хотя бы накануне возвращения в участок можно и не говорить мне таких вещей.</p><p class="p1">— Он же сказал — два дня, и ты в городской управе.</p><p class="p1">— Все равно. Я буду бояться, что ты сбежишь.</p><p class="p1">— Я никуда не сбегу, сбегаешь ты, всегда ты… Вдали грохнул выстрел.</p><p class="p1">— Что это? — вскочила она.</p><p class="p1">— Не бойся, анархисты пьянствуют, в воздух палят.</p><p class="p1">— Где они взяли столько вина? — сонно протянула Таня. — Неужели склады?</p><p class="p1">— Вряд ли. Они люди сторонние, про них не знают. Не обращай на них внимания.</p><p class="p1">— Да, не обратишь тут…</p><p class="p1">— Ну, вспомни садовника. Ничто так не успокаивает, как мысль о счастливо миновавшей опасности.</p><p class="p1">— Не знаю, Ять. У меня не так. Я принимаюсь тысячу раз все перебирать в уме и бояться заново…</p><p class="p1">— Не бойся. Всегда придет какой-нибудь Свинецкий и спасет.</p><p class="p1">Она теснее прижалась к нему, заворочалась, смешно заворчала — «костлявый, костлявый», — и скоро заснула; он чувствовал плечом сонное ровное тепло. Ну вот, подумал он, все и позади.</p><p class="empty-line"/><p class="p1">Вроде бы с самого начала все шло по предугаданной им схеме — удержать распадающийся мир можно было только ценой упрощения, выбора самой простой и надежной власти; чем больше у власти было ограничений — тем быстрей она падала. Гетман оказался проще большевиков, ибо в фундамент главного разделения положил самый простой, изначальный признак; и его, и татар скинули анархисты, разрешившие себе вообще все… Осталось понять, кто будет проще анархистов. В новую победу Свинецкого верилось с трудом — отсюда была и тревога; Ять знал, что вне теплицы пальме не жить, а Гурзуф, даром что весенний, на теплицу не походил. Может быть, все проще? Может быть, все решается готовностью к смерти и кто больше всего к ней готов — тот и победит? Может быть, потому христианство и одолело всех варваров своей сложностью, что варвару жить хочется, — а христианин швыряет жизнь в лицо врагу, и с этой армией смертников ничего уже не поделаешь? О, тогда у Свинецкого было большое будущее, — но где ему набрать такую армию? Он же, Ять, — не боец вовсе: вот почему так страшна была ему мысль о завтрашней осаде. Если бы не любовь, как было бы легко умирать. Но как жаль оставить… Надо любить то, чего не бывает, — как Свинецкий. Господи, как глубоко сидит во мне Ветхий Завет — семейственность, очаг, проклятое наследство отца… Бродит сын, потерявший отца, бродит отец, потерявший сына, — и все никак не сойдутся. Не верю, что Христос вернулся к Отцу. После всего, что он тут нашел, — как вернуться, как сказать «Твой мир хорош»?! Но с любовью ничего не поделаешь, и вот они ищут один другого, не понимая еще, что разошлись навеки; и все мы мучаемся, пытаясь их свести, — но никак не поймем, что свести нельзя: либо один, либо другой… Господи, зачем ты не сделал меня человеком одной крови… одной крови хоть с кем-нибудь…</p><p class="p1">Мысли путались, и он заснул, как всегда по утрам, недолгим, прозрачным сном без снов. Он так и не научился ничего предсказывать, но предчувствовать умел всегда. Это действительно была их последняя ночь.</p><p class="empty-line"/><p class="p1">Двадцать шестое марта было тихим, теплым, пасмурным днем. Аю-Даг не обманул — с него на Гурзуф, на имение Кавкасидзе, на Ялту наползли серенькие тучи. Иногда брызгал и тут же прекращался мелкий дождь. Ять, бодрый и радостный, несмотря на предстоящее пребывание в застенке, бродил вдоль полок, выбирая книгу. Смену белья он брать отказался — Свинецкий не станет врать, выпустит скоро. Важно было соблюсти условность, и это радовало Ятя, как всякий бесполезный символ.</p><p class="p1">— Ну, жди меня, — сказал он напоследок и крепко поцеловал Таню. У той глаза были на мокром месте — не сравнить с первым его заключением, когда, веселая и деятельная, она выкупала его на ночь у стражи. И лицо у нее было обреченное — как в тот день, когда он обнял ее на набережной около кофейни, в первый его день в Крыму, в котором, казалось, он живет уже многие годы.</p><p class="p1">— Ять, — тихо и грустно повторяла она, — Ять, прости меня, ладно? Прости меня, Ять…</p><p class="p1">— Да за что же, глупенькая? За то, что не идешь туда со мной?</p><p class="p1">— О, это было бы хорошо! — оживилась она. — Этого у нас еще не было… Но теперь ты не узник, а будущий почетный гражданин. Хорошо, иди, иди. А то я правда разревусь, и у меня отвратительно распухнет нос. Ты должен запомнить меня бойкой, чтобы укрепить дух перед узилищем.</p><p class="p1">— На ночь отпустят, может быть…</p><p class="p1">— Ну, может быть, и отпустят. Ступай, ступай, я правда сейчас запла́чу…</p><p class="p1">Он спустился на улицу. После ночного веселья было пустынно — жители либо отсыпались, либо побаивались казать нос на улицы, по которым бродят новые хозяева. Наискосок краснела лужа рвоты — кто-то хорошо попил у Селима его любимого красного вина. Анархисты анархистами, а пить не умеют. Как ни странно, около участка не было никакой стражи. Замок сбили еще вчера, выпуская грека и итальянца. Дверь, однако, была заперта на кипарисную ветку — только пьяному могла прийти в голову столь иллюзорная защита. Ять дернул дверь и вошел.</p><p class="p1">Внизу было темно, свет едва проникал в полуподвальное окошко, и Ять не сразу разглядел человека, лежавшего на матрасе. Человек был бос, невелик ростом и с головой закрыт простыней. Кто мог улечься тут на ночлег? Разве что кому-то из анархистов захотелось такого странного постоя, не дошел ни до какого другого дома? Но вчера вечером гурзуфские женщины были очень не прочь пустить к себе матросиков… Он подошел к лежащему и откинул простыню.</p><p class="p1">На полосатом матрасе лежал Свинецкий. Бороденка его жалобно торчала вверх, словно выражая небу последнее несогласие. Кулаки были судорожно сжаты. Его убили выстрелом в грудь, крови на рубахе почти не было. Свинецкий уже остыл.</p><p class="p1">Ять в ужасе отшвырнул простыню и, отряхивая почему-то руки, выбежал наверх. Улица была по-прежнему пуста. Он побежал на площадь — топот его сапог далеко разносился во влажном, мягком воздухе и казался оглушительным ему самому. На площади никого не было. С другого конца Гурзуфа донесся вдруг тяжкий, протяжный вой — выла собака, охранявшая Голицынские склады. Она и лаяла, и выла басом. Вой ее то судорожно прерывался, как захлебывающееся рыдание, то снова поднимался к низким небесам. На пути от площади к базару лежал матрос в черном бушлате — Ять сначала испугался, что он мертв, но он был всего лишь смертельно пьян.</p><p class="p1">— Эй! — Ять схватил его за ворот. — Эй! Да проснись же!</p><p class="p1">— А-а-э, — невразумительно простонал матрос. От него разило чудовищным перегаром, рожа была красная и мятая, изо рта выходили пузыри. Ять бросил его — матрос глухо стукнулся головой о брусчатку, но боли, похоже, не почувствовал; оставалось бежать к Пастилаки — тот всегда знал все.</p><p class="p1">Кофейня была разгромлена, знаменитые стекла, которыми так гордился хозяин, зияли звездообразными трещинами. Пастилаки со своей носогрейкой неподвижно сидел на стуле, глядя в серое туманное море. Ять подбежал к нему и тронул за плечо.</p><p class="p1">— Пастилаки! Одиссей, голубчик! Что тут было?</p><p class="p1">— Кофейню разбили, — тихо сказал Пастилаки. Он по-прежнему смотрел на море, и глаза его словно напитывались морской влагой. На самом деле он плакал, но слез было мало, и они не проливались.</p><p class="p1">— Господи, — сказал Ять. — Что было-то? Ты знаешь, что Свинецкого убили? Освободителя твоего?</p><p class="p1">— Знаю, — ответил Пастилаки.</p><p class="p1">— Да кто убил-то? Говори наконец!</p><p class="p1">— Спишь крепко, — серым, как море, голосом ответил грек. — Склады взяли. Нет больше складов. Три дня пить будут, пока не выпьют. Он не давал — говорил, не надо грабежа, мы не воры… Кто-то из матросов его застрелил. Там много было, кто — не поймешь.</p><p class="p1">— Господи! — выдохнул Ять. — Как же они… Ведь он их привел!</p><p class="p1">— Это он думал, что привел, — сказал грек. — А они думали, что пришли вино пить. Собаку камнем оглушили, а его убили. Собаку пожалели, а его не пожалели. Сразу сапоги сняли, себе взяли…</p><p class="p1">— А почему он… в участке?</p><p class="p1">— Мы с певцом отнесли. Не там же бросать. А куда еще положишь?</p><p class="p1">— Где певец-то?</p><p class="p1">— Не знаю. К ним вернулся. Я в кофейню пошел, а к утру разбили кофейню.</p><p class="p1">Да, да, в этом и была самая страшная правда. Свинецкий не мог победить. Они пришли брать винные склады и попутно освободили нас. Господи, как: все просто! Как все страшно просто! Это проще, чем даже Могришвили. Может быть, лучше было оставить у власти садовника?</p><p class="p1">— Что же ты теперь будешь делать?</p><p class="p1">— Греция поеду, — тихо сказал Пастилаки. — Греция близко, там тоже море. Надо же вернуться когда-нибудь.</p><p class="p1">Он всхлипнул и затрясся.</p><p class="p1">— Хороший город был, — проговорил он, глядя на Ятя сквозь слезы. — Хороший город…</p><p class="p1">Ять без сил опустился на камень у его ног. Он не знал, сколько они так просидели вместе. Солнца не было, с гор продолжала ползти серая сонная дымка. Ни единый корабль не показывался вдали.</p><p class="empty-line"/><p class="p1">На первом этаже было пусто. Ять увидел только, что Зуев всю ночь рвал и жег бумаги. На втором этаже на кровати сидела Таня, перед ней на коленях стоял Зуев, и она гладила его по голове с тем же выражением обреченности и тоски, с каким обнимала Ятя на набережной три недели тому назад. Ять замер на пороге. Она подняла на него глаза, в которых, как и у Пастилаки, стояли непролитые слезы, и сказала:</p><p class="p1">— Да. Вот так. Зуев не обернулся. Может быть, он и в самом деле от блаженства потерял слух.</p><p class="p1">— Я вернулся, Таня, — сказал Ять, ничего еще не понимая. — Свинецкий убит. Зуев обернулся и встал.</p><p class="p1">— Как — убит?</p><p class="p1">— Ночью взяли Голицынские склады. Они за этим и прибыли.</p><p class="p1">— Ну что ж, — сказала Таня. — И за чем бы им еще прибывать?</p><p class="p1">— Свинецкого убили, — повторил Ять. — Он пытался их остановить, и…</p><p class="p1">— Ну, убили, — тускло сказала Таня. — Его все равно бы убили. Свинецкий был не жилецкий.</p><p class="p1">— И ты можешь так спокойно об этом говорить?</p><p class="p1">— А как мне еще об этом говорить, Ять? — протянула она. — Как мне еще говорить, когда тут убили меня?</p><p class="p1">— Не плачь, не плачь, ради Бога. — Зуев кинулся к ней, снова встал на колени, обнял. — Ять, я вам сейчас все объясню, — обернулся он. — Сейчас, сейчас… Может быть, водички?</p><p class="p1">— Я бы спирту выпила, — сказала Таня.</p><p class="p1">— Сейчас, — Зуев метнулся к столу, на котором еще стояла та самая бутыль, выменянная у татар для ночной трапезы. Он налил ей в стакан мутной виноградной водки, Таня залпом выпила и поморщилась. Ять знал, что от слез всякий едкий вкус усиливается — даже теперь, начиная догадываться обо всем, он чувствовал все, что должна была чувствовать она, и тоже скривился.</p><p class="p1">— Прости меня, Ять, — сказала она хрипло. — Прости. Я думала сказать тебе, когда ты выйдешь. Я сейчас скажу тебе все, сейчас… — Она глубоко вздохнула. — Ну, слушай: я во всем виновата сама. Никто не мог подумать, что ты окажешься тут. Я давно с ним, давно… с того времени, как приехала, то есть с августа, что ли? — Она всхлипнула. — Ты же не приехал ко мне тогда, ты не виделся со мной два года… Господи, что я делала в эти два года! Но я думала, все время думала о тебе! — Чем дальше она говорила, тем неудержимее плакала, но и сквозь слезы продолжала, давясь и всхлипывая: — Что я могла, Ять? Куда мне было деваться? Он здешний, он хороший человек… он, можно сказать, спас меня! Здесь такие страшные зимы… Я жила у него, тут приехал ты… ну, Ять! Что ты так смотришь? Витя добрый, он понял… он все простил… Но пойми, тут нельзя больше быть! Мы с самого начала думали, как уехать. Наконец в феврале он узнал, что в конце марта в Ялту зайдет французский торговый корабль… Это последний корабль — они заберут из Крыма всех иностранцев… Нам сказали в порту, это страшный секрет… За большие деньги туда можно попасть. Витя решил продать дом, его хотел купить этот дуканщик… Мы сговорились, что двадцать седьмого уйдем, а он въедет, еще в феврале сговорились! Ты понимаешь теперь, что наделал этот садовник? Ять! Ять! Не молчи, Ять!</p><p class="p1">Но Ять молчал, потому что понял теперь, за что собирался рисковать жизнью в осажденном доме. О несчастный идиот, когда ты станешь человеком? Он собирался умирать за неприкосновенность чужого жилища, а умер бы за то, чтобы дом не задаром достался дуканщику; за то, чтобы Таня могла уехать с другим!</p><p class="p1">— Вчера вечером, пока ты сидел со Свинецким в кофейне, — все так же навзрыд рассказывала она, — пришел этот Кавалеридзе… Черт бы его побрал совсем! — вдруг закричала она сквозь слезы. — Я думала, все сорвется, я останусь с тобой, я умру с тобой! Но он принес золото, все, что копил… все свои мерзкие кольца! Этого хватит, чтобы уехать…</p><p class="p1">«То-то дукан был закрыт», — понял Ять.</p><p class="p1">— Ночью я уничтожил архив, — сказал Зуев непонятно зачем: то ли чтобы утешить Ятя — мол, не тебе одному несладко, — то ли чтобы успокоить насчет судьбы архива: никому не достанется. — Жег редчайшие изыскания, рисунки, легенды… Осталось только несколько альмекских вещиц. Не возьмете на память? — И он протянул Ятю костяную дудочку, изогнутую буквой Z.</p><p class="p1">Ять машинально взял альмекский предмет и сунул в карман.</p><p class="p1">— Ну что ты молчишь?! — закричала Таня. — Что такого я сделала, в конце концов?! Ведь не возненавидела же я тебя, когда ты два года не вспоминал обо мне! Ты помнишь сам, как я тебя встретила! Я за все это время не сказала о тебе ни одного плохого слова. Витя, говори же хоть что-нибудь, почему я оправдываюсь одна! — Она упала на кровать, уткнула лицо в подушку и принялась молотить ее кулачками.</p><p class="p1">Ять умер бы за каждый из этих кулачков, за каждую жилку на них, — но все это не мешало ему понимать главное, самое страшное, чего не понимала она. Он с трудом разлепил губы; было больно говорить, больно набирать воздух — словно его ударили, но не извне, а изнутри; словно что-то разорвалось в нем и ударило в ребра, в легкие, в горло.</p><p class="p1">— Таня, не в этом дело. Но скажи: ты полгода прожила с ним… и после этого… в его доме… со мной, у него на глазах… Как ты могла, Таня? Неужели я бы не понял? Зуев, — он перевел взгляд на Зуева, — почему вы не убили меня?</p><p class="p1">— Но как же… — забормотал историк. — Таня столько рассказывала о вас… о вашей жизни с ней… Я все понимаю, я не имею права на ее жизнь до встречи со мною…</p><p class="p1">— Вы не убили меня, — повторил Ять. — Вы не убили меня, потому что мало любили ее. Я, наверное, тоже мало ее люблю, если не убиваю вас.</p><p class="p1">— Ять, да что ты говоришь! — закричала Таня. — Что за средние века, почему он должен убивать кого-то? Не хватало вам дуэль сейчас устроить! Он знал о тебе, да и что мне было делать? Ты ради меня проехал две тысячи верст, приехал в Крым, и мне — оттолкнуть тебя? Опомнись, я ведь люблю тебя!</p><p class="p1">— А его? — спросил Ять.</p><p class="p1">— И его, — заревела она совсем по-девчоночьи. — И его… Что вы оба делаете со мной, я ничего уже не знаю! Я хочу уехать отсюда! Я пыталась объяснить тебе ночью, но ты не хочешь понимать: нам все равно не жить вместе! Ты всегда будешь уходить, как только я не так что-нибудь скажу или не так повернусь! Я должна уехать, там мама! Ты никогда, никогда не думал… Ять! — оборвала она сама себя и подбежала к нему. Он никогда так не любил ее, как сейчас, — измученную, с красным, мокрым лицом. — Ять! Прости меня! Прости, но что же делать! Когда ты уходил в Ялту, ничего не было! Слышишь ты, ничего!</p><p class="p1">— Не было, — кивнул от стола Зуев.</p><p class="p1">— Да-да, — сказал Ять. — Я верю. Это, в общем, не так важно… Прости и ты меня. Я должен был знать. Танька, скажи мне одно: ты любила меня когда-нибудь?</p><p class="p1">— Я буду любить тебя всегда, всегда, всегда! — тихо сказала она. — Понимаешь, Ять? Всегда, всегда, всегда!</p><p class="p1">«Вот и конец, — подумал он. — А я еще думал — почему это мне так кажется? У жизни всегда есть изнанка, и как бы я ни старался о ней забыть — душу-то не обманешь. Все эти две недели она спала со мной, а он метался внизу, и все это время она знала, что уедет с ним…»</p><p class="p1">— Я знала, что ты не поедешь, — сказала она, как всегда, угадав его мысли. — Ты же сам говорил мне… здесь, ночью…</p><p class="p1">— Останься со мной, Таня, — вдруг просто сказал он. — Ничего никому не объясняй, просто останься.</p><p class="p1">Но по тому, как она отвела глаза, он понял: она уже в Париже.</p><p class="subtitle">29</p><p class="p1">Сначала прислали веселых матросиков выносить печи, потом перестали завозить продукты — и хотя трехдневный запас, по словам Елисеева, еще оставался, но обреченность Елагинской коммуны стала к двадцать шестому марта ясна и тем, кто привык надеяться до последнего. У Хмелева все чаще случались припадки сомнений и слабости: он был все-таки немолод, шестьдесят восемь лет, — в такие годы не становятся вождями оппозиции, особенно когда шансы ее ничтожны. Хмелев своей бескомпромиссностью добился худшего из возможных результатов: он заставил Чарнолуского действовать — и действовать не по приказу свыше, а по зову оскорбленного самолюбия. Ни один елагинец даже после закрытия «Всеобщей культуры» не верил, что нарком пришлет матросов за печами; но и после этого у всех оставался шанс мирно разойтись по домам. Однако расходиться после такой крайней, унизительной и низменной меры, как вывоз печей и отказ в продовольствии, было вовсе уж неприлично, — так Чарнолуский, сам того не желая, исключил мирную развязку.</p><p class="p1">Во всякой весне бывает точка перелома, когда зима с ее геометрической ясностью окончательно сдает свои бастионы; ее имперский мрамор принимается плавиться, оседать, и ясно уже, что дальнейшее непредсказуемо. Есть две-три ночи в году, когда мир замирает на пике равновесия — с тем чтобы низринуться в бездну перемен. Эти ночи обещают многое. В них есть томительное счастье — для тех, кто ждет весны, любви, благотворной перемены, — но и невыносимая тоска: для тех, кто решился и торопит приход неизбежного. Скорей, скорей! Выбор сделан, и будь что будет. Март восемнадцатого года был такою точкой перелома и для елагинской коммуны, и для Крестовского ее двойника, и для всей переехавшей власти, от которой требовалось наконец определиться; и если до двадцать шестого — дня, когда братишки-матросы, подмигивая и пошучивая, вывезли из коммуны последние печки, — можно еще было отыграть назад, то после холодной и душной ночи на двадцать седьмое пути назад не было ни у кого из участников нашей истории, неизменной русской истории. В эту ночь не спалось никому, однако в конце концов уснули почти все — кто раньше, кто позже. Не спали двое — Хмелев и Ашхарумова.</p><p class="p1">Хмелев долго читал, потом пробовал писать, потом на керосинке вскипятил себе чаю (керосинка была собственная). Сон не шел. Тревога была в воздухе, душный холод — так искони называли в Питере пору ледохода. Словно весь воздух был выпит невским льдом — и вернуться мог лишь тогда, когда лед расколется и поплывет. Звезды сухо горели над Елагиным, над антрацитно-черной Малой Невкой, над улицей Большой Зелениной, получившей название от пороховой фабрики, заложенной тут при Петре (весь район был артиллерийский, арсенальный, — зельем именовался порох); порох был в воздухе, и каждая звезда могла поджечь его. Одной искорки хватило бы Петрограду, чтобы взлететь на воздух, — но искорки не было, холоден звездный огонь, — и длилось безмолвие.</p><p class="p1">И при всем при том, не в силах спать, Хмелев не сказал бы, что он бодрствует: какая там бодрость, ясность ума — когда все его члены были словно скованы. Он боялся пошевелиться, как если бы кто наблюдал за ним сквозь глазок двери, а может — чего стесняться, — уже и проник в его комнату. Он встал на молитву — зная, что никакой страх не может его смутить во время беседы с Богом, — но и молитва не шла на ум: слаб был Хмелев со своей патриархальной верой перед накатом неотвратимых событий. Он упал на кровать в шестом часу, и сон его больше походил на беспамятство. Не могла заснуть и Ашхарумова. Она вставала, пила воду, смотрела в узкое окно — потом наконец не выдержала, накинула пальто поверх халата и вышла из комнаты. Maтрос Елисеев похрапывал в зале первого этажа, сидя на стуле, разбросав длинные ноги. Лицо его имело выражение суровой нежности. Похоже, он переживал во сне прекрасные моменты своей биографии. На самом деле ему снились пироги с разнообразной начинкой.</p><p class="p1">— Елисеев, — тронула его за плечо Ашхарумова.</p><p class="p1">— А, что! — вскочил матрос. — Стреляю!</p><p class="p1">— Не стреляйте, это я. Простите, что разбудила.</p><p class="p1">— Здорово, товарищ барышня, — успокаиваясь, пробормотал Елисеев. — Что не спим, ходим? — Это обращение во множественном числе, как говорят с детьми, было отчего-то очень распространено у патрулей, матросов и пролетариев: что ходим, почему врем… Вероятно, мы все и впрямь перед ними дети.</p><p class="p1">— Тяжелая ночь, Елисеев. Спать не могу, — ответила она, присаживаясь на холодный дворцовый стул. На ночь их придвигали к общему столу, и казалось, что за столом чинно сидят призраки, решая по ночам судьбу новых обитателей дворца.</p><p class="p1">— Плохо тебя твой хахаль баюкает, — усмехнулся матрос. — Курить будешь?</p><p class="p1">— В помещении нельзя, Елисеев.</p><p class="p1">— Мне тут ночью все можно. — Елисеев скрутил цигарку и задымил отвратительно кислым табаком.</p><p class="p1">— Что, уходите от нас завтра? — спросила Ашхарумова.</p><p class="p1">— Дак мы люди подневольные. Скажут — охраняем, скажут — уйдем. Я и сам не знаю, чего вас тут караулил: кому вас грабить-то?</p><p class="p1">— Ну, а продукты?</p><p class="p1">— Продукты сами бы охранять могли, в очередь. Да теперь и продуктов не будет, вам теперь охрана совсем без надобности.</p><p class="p1">— А если придет кто нас всех поубивать? — улыбнулась Марья.</p><p class="p1">— С чего это? Может, вы мешаете кому? Богодулы и есть богодулы, и не знаю я, чего ты с ними делаешь…</p><p class="p1">— Муж у меня тут, — важно сказала Ашхарумова, не уставая дивиться странному слову «муж».</p><p class="p1">— Э, милка, у тебя таких мужей еще будет — до Москвы раком не переставишь, — хохотнул Елисеев, и она не обиделась. В конце концов, это было даже лестно.</p><p class="p1">— Ну, а сам ты куда потом?</p><p class="p1">— Да куда прикажут. Я есть матрос Петроградского отдельного особого столичного боевого гарнизона, куда пошлют — туда и пойду. А может, вообще отпустят. Говорили, что мир теперь, только я не верю. Немцу сейчас какой же мир. У него по всем фронтам швах, обязательно на нас отыграется. Очень просто.</p><p class="p1">— А дома-то кто у тебя?</p><p class="p1">— Дома? Мать с сестрой, батя помер давно. Тульский я. — Он заплевал цигарку и метко кинул ее в угол, в корзину для бумаг. Матрос Елисеев был человек культурный и понимал, в каком особенном месте находится.</p><p class="p1">— И не жалко тебе будет? Уходить-то? Мы вон к тебе и привыкли будто…</p><p class="p1">— Аа, привыкнете вы, — хмыкнул матрос Елисеев. — Вашему брату до нашего брата — как мне, извиняюсь, до вши. Так оно ж и правильно. Каждому свое занятие. Пусти тебя, к примеру, на корабль, — тоже ют от носа не отличишь.</p><p class="p1">— И что, даже не вспомнишь нас?</p><p class="p1">— Почему, вспомню, — зевнул Елисеев. — Очень вспомню. Как этот ваш… Горбушка-то… плиту дровами в первый день растапливал, а? Очень было завлекательно. Еще и братишкам расскажу.</p><p class="p1">— Ну спи, Елисеев, — сказала Ашхарумова. — Спи. Извини, что разбудила.</p><p class="p1">«И ведь в самом деле, — подумала она, — что он вспомнит про всех нас? Богадельня и есть богадельня. Уходить, надо уходить. Но самое страшное, что теперь-то и нельзя уйти».</p><p class="empty-line"/><p class="p1">Утром матрос Елисеев постучался к Хмелеву.</p><p class="p1">— Да-да, — слабым голосом ответил тот.</p><p class="p1">— Пойду я, товарищ профессор, — произнес Елисеев, стоя на пороге. Форма его была в образцовом порядке, ременная пряжка начищена, усы расчесаны, на лоб молодцевато свисал чуб.</p><p class="p1">— Ступай, ступай… Как это у вас? Благодарю вас за службу.</p><p class="p1">— Не хворайте тут, — весело сказал матрос.</p><p class="p1">— Да уж постараемся. Будь и ты здоров. Если пошлют тебя в нас стрелять — может, хоть подумаешь, прежде чем палить-то.</p><p class="p1">— Да что ж вы такое говорите-то! — весело воскликнул матрос. — Я тогда к вам на защиту, по старой памяти. Ну, бывайте здоровеньки.</p><p class="p1">— Прощай, прощай.</p><p class="p1">Хмелев не подал ему руки, да Елисеев и не ждал этого. Он четко повернулся на каблуках и с нарастающим чувством радостного облегчения сбежал с лестницы. Двадцать седьмое марта было ослепительным и гулким, дельта Невы, полнилась хрустом и треском, под Елагиным мостом дробились искры. Серая, ноздреватая Невка вскрылась. На невских мостах стояли едва выползшие из своих щелей, зеленоликие, истощенные петроградские жители. Треск и трение, шорох и скрежет слышались с реки. Далеко еще было до ладожского льда, последнего на Неве, — но панцирь ее уже треснул и, разбитый на неправильные многоугольники, медленно сплавлялся вдоль Университетской, Петропавловки, Дворцовой. И весело было Елисееву.</p><p class="empty-line"/><p class="p1">— Вот, — гордо сказал Извольский. — И таких воззваний — по всей Петроградской, по всему Васильевскому — расклеено больше сотни. Ремингтонщицы всю ночь не спали.</p><p class="p1">Хмелев прочел воззвание, машинально подчеркивая ошибки. Их было немало — Извольский не отличался грамотностью. Жители столицы извещались, что варварская власть уничтожает последний оплот петроградской профессуры, моря голодом и холодом пятьдесят заслуженных филологов. По этому случаю все, кому надоел произвол, приглашались на мирный митинг, с тем чтобы выразить свое отношение к зверствам большевизма.</p><p class="p1">— Не боитесь? — спросил Хмелев. — Резкое воззваньице…</p><p class="p1">— Сейчас надо действовать, — пожал плечами Извольский. — Арестовать вас — они пока не посмеют, а чтобы и впредь не посмели — надо стать известными всему городу. Пусть знают, что тут не большевистская ученая коммуна, а цитадель противобольшевистских сил. Люди не поднимутся, если не почувствуют нашей решимости…</p><p class="p1">— Это я понимаю. А все-таки нет ли перебора?</p><p class="p1">— Вы увидите, какая придет толпа, — убедительно сказал Извольский. — Мои люди агитируют во всех районах, лично я гарантирую не меньше ста участников. А скольких привлечет афишка — предсказать не берусь. Все-таки надо бы попробовать позвать Хламиду — на него пойдут…</p><p class="p1">— Только не этого, — твердо сказал Хмелев. — Этот все сведет на примирение. Их прихвостней привлекать к делу бесполезно: да, да, а как дойдет до дела — не могу, болен… Даже не пробуйте. Если сам заявится — другое дело.</p><p class="p1">Извольский развил деятельность бешеную. На следующий день взамен унесенных железных печек «его люди» — крепкие немногословные ребята — привезли пятнадцать других, более ржавых, однако вполне исправных. Никто особенно не расспрашивал, откуда взялись печки, — ясно же, что у Извольского вообще неограниченные способности по добыванию ценных предметов. Да и чувствовать себя последним оплотом петроградской интеллигенции было приятнее, нежели разбредаться по выстуженным домам и доживать в одиночестве.</p><p class="empty-line"/><p class="p1">— И все-таки, — сказал Фельдман, — это возмутительное свинство. Нет, нет, и не уговаривайте. Ведь вы понимаете, как после этого выглядим мы… ну, все мы?</p><p class="p1">Корабельников мрачно вышагивал по своей комнате. Уход Льговского сильно его озлобил. Это было прямое предательство, бегство с передовых позиций. И тут еще это безобразие в Елагинском. Вот представьте: вы воюете. И узнаете, что врагу в этот день не подвезли каши. На войне, может быть, все средства хороши, и добить голодного врага тем легче. Но наши войны другие, они пушками не выигрываются. И кто отнимает пайки? Своя же власть, те, кому он так искренне намеревался помогать в святом деле мирового переустройства. Какое же это переустройство? Закрыть — да, он сам предлагал разогнать Елагинскую коммуну. Но осаждать… морить голодом… вывозить печи… Чего доброго, пересажают еще.</p><p class="p1">— И что? — зло спросил Корабельников. — Вы вернуться хотите?</p><p class="p1">— Вернуться, к сожалению, нельзя. Но, может, вы с Чарнолуским поговорите? Объясните ему, что это самоубийство, что это дискредитирует его же…</p><p class="p1">— Нет у него выбора, понимаете? — останавливаясь прямо напротив Фельдмана, сказал Корабельников. — Нету. Они сами все сделали. Они хотят рыбку съесть и на елку влезть: вы нас кормите, а мы вас будем помоями поливать и заговорчики плести. Ну, а в Смольном тоже решили драться всерьез. Лично я их понять могу. А то ваш брат интеллигент все думает: можно гусей дразнить до бесконечности. Гуси начнут щипаться — он тут же: свобода, свобода! Много свободы было под Романовыми?</p><p class="p1">— Знаете, об этом можно уже спорить, — быстро заговорил Фельдман, — это уже предмет для спора, но спор надо вести… И нужно обеспечивать необходимым, чтобы он мог идти… Ведь это наше, понимаете, наше дело спорить с ними — административно же это не решается! Культура — ведь это такая вещь… это же не политика, тут не может быть правых. В политике спор, вероятно, вреден, но в науке это единственное условие… Мы для того и должны все время друг с другом воевать, чтобы лились чернила, а не кровь, это наша жертва миру, если хотите…</p><p class="p1">— Елагинские не спорить хотят, — мрачно сказал Митурин. — Они воевать хотят. Только так, чтоб у Чарнолуского руки были связаны. Ну, понятно — старые, больные, голодные… Мне можно все, а тебе во, — он показал огромную грозную фигу.</p><p class="p1">— Но вы понимаете, что мы не можем просто так… Что это с нашей стороны уже неприлично — смолчать после таких мер? Знаете слова Вольтера: я ненавижу ваши убеждения, но готов умереть за ваше право их высказать?</p><p class="p1">— Вольтеру хорошо было, — усмехнулся Краминов из своего угла. — Сидел себе в эмиграции и в ус не дул. А я не готов умирать за их право, потому что им чихать на мое право!</p><p class="p1">— Это один Бог рассудит, кто из вас прав, — торопливо повторял Фельдман, — вы не можете брать его полномочия…</p><p class="p1">— Про Бога — это к товарищу попу. — Корабельников кивнул на дверь. Алексей Галицкий часто приходил в Крестовскую коммуну, один раз даже приехал на автомобиле, — но на постоянное жительство не перебирался. Соломин, который в последнее время не ладил с Фельдманом, тоже не пришел на собрание.</p></span>
