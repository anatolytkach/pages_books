<span><p class="p1">— Просим, просим! — тощий секретарь Хламиды несколько раз иронически хлопнул в ладошки.</p><p class="p1">Грэм смерил его уничтожающим взглядом и заговорил, обращаясь исключительно к новобрачным.</p><p class="p1">— Все мы помним, — хрипло сказал он, — как Бог, создав мир, нашел, что это хорошо. Часто мы задаем себе вопрос — что нашел он хорошего? Мы судим его творения с решительностью муравья, попавшего в театр: зачем все это? Но иногда мы чувствуем, что Божий мир хорош; это слово произносим мы редко, но раз уж сам Бог начал с него — повторим его сегодня. Да, здесь хорошо, и нужно мужество, чтобы вспоминать об этом. Я хочу выпить за ваше хорошо — и за то, чтобы вы и тогда помнили его, когда по ошибке или слабости готовы будете согласиться с трусами. Он осушил алюминиевую кружку и под дружные хлопки вернулся к Ятю.</p><p class="p1">— Позвольте и мне вручить мой скромный дар! — выкрикнул Ять, подражая тону балаганного зазывалы. Он подбежал к Барцеву и Ашхарумовой, развернул сверток и высоко поднял в вытянутой руке альмекскую флейту. — Господа и товарищи, дорогие друзья по искусству и бесполезности, обратите ваше высокое внимание на этот удивительный предмет! Он остался от древней цивилизации, все наследие которой состоит из нескольких крымских легенд и вещей таинственного назначения. Это предмет в высшей степени символический — альмекская флейта; состоит она из двух частей, и те, в чьих руках находятся эти части, должны всегда быть вместе. Надеюсь, вы исполните этот завет и не дадите погибнуть миру — да, да, ибо все наши неприятности от того только и произошли, что флейта была разъединена! От этого и мы все перессорились, и Россия вон, видите, никак сама с собою не разберется. Все засмеялись.</p><p class="p1">— Но заметьте! — продолжал Ять. — Заметьте, что в разъединенном виде флейта не звучит! — Он осторожно разъединил половинки и подул в каждую; потом соединил, подул — и над островами проплыл низкий чистый звук. — Теперь волей-неволей я соединил вас на веки вечные. Хотите вы того или нет, а судьба мира зависит от вас одних!</p><p class="p1">Барцев бережно взял флейту и молча разобрал ее: Ашхарумова получила Z-образный ствол, себе он взял дырчатый мундштук.</p><p class="p1">— Лучше бы соединить, — напомнил Ять.</p><p class="p1">— Соединятся, — хохотнул секретарь Хламиды, и веселье возобновилось.</p><p class="p1">Хламида долго и скучно, со всхлипами, говорил о трудящейся и творческой силе природы, которая тоже вот вся женится, — но в середине особенно длинного и выспреннего пассажа махнул рукой и пустился в пляс, присвистывая и похлопывая себя по ляжкам. Ему похлопали, и вскоре он ушел, сославшись на то, что сырость вредна для легких. Об его уходе никто особенно не сожалел — вино-то осталось.</p><p class="empty-line"/><p class="p1">— А знаете ли, Осип Михайлович, по ком я более всего скучал в эту зиму? — кряхтя, спрашивал Алексеев. Он уселся рядом с исхудавшим, полупрозрачным Фельдманом к скатерти-самобранке и положил на черный вязкий хлеб кусок отличнейшего копченого сала. — Сальца не желаете ли? Ох, простите, Бога ради…</p><p class="p1">— Отчего же? — усмехнулся Фельдман и взял кусок сала. — Я так давно паразитирую на русской культуре, что от собственных предрассудков теперь далек… Вы же знаете, как мы действуем, — он перешел на быстрый, утрированный одесский говорок, — мы внедряемся ко всем и таки от всех берем лучшее… Мы внедрились к русским и таки научились у них выпить и закусить и еще попросить…</p><p class="p1">— Так знаете ли, по ком я сильнее всего скучал? По вам, Осип Михаилович, и ежели бы у Хмелева было чуть побольше такта и мягкости — он непременно лично попросил бы у вас прощения…</p><p class="p1">— Не нужно, — махнул рукой Фельдман. — Я не держу зла.</p><p class="p1">— А вы не будьте этаким ангелом, не будьте. Русский человек злопамятен, ему иначе нельзя. Вот и вы помните, коли хотите быть русским…</p><p class="p1">— Я не хочу, так вышло, — прежним утрированным голоском отвечал горбун.</p><p class="p1">— А знаете вы, почему мы, теоретические юдофобы, на практике сплошь такие юдофилы? Вот, позвольте вам предложить… ведь вы не побрезгуете выпить со мною?</p><p class="p1">— Обижаете, Владимир Александрович, — покачал головой Фельдман и с готовностью подставил кружку.</p><p class="p1">— Да-с, так оно и обстоит. Розанов Василий Васильевич, хорошо вам известный… кстати, сведений не имеете ли — где он, что?</p><p class="p1">— Последнее письмо было в ноябре, с тех пор не видались, да я на квартире и не был… Вдруг почта… Хотя какая теперь почта.</p><p class="p1">— Ну, дай ему Бог, вы ведь друг ему. За него и выпьем. Вот так! — хорошо, хорошо… Так вот, Василий Васильевич говорит мне как-то: за то мы, брат Володя, так евреев любим, что не с кем больше во всей России толком поговорить, как они ее губят! — И Алексеев рассмеялся дребезжащим смешком.</p><p class="p1">— Конечно, — Фельдман предложил ему папиросу и сам закурил, быстро и жадно всасывая дым. — Конечно, Владимир Александрович! Да и о русских безобразиях тоже ни с кем, кроме вас, толком не поговорить…</p><p class="p1">— А потому не сердитесь, не сердитесь… Или нет — сердитесь, конечно: ведь если вы утратите иудейскую вашу злость, соль и впрямь перестанет быть соленою. Наше дело спорить, так ли я говорю?</p><p class="p1">— Только не до погромов.</p><p class="p1">— Будет вам поминать погромы. Во время них и русским достается, ежели очки на носу. Да Россия и всегда сама себя громит…</p><p class="p1">— Громит себя, только бьет нас…</p><p class="p1">— Да и себя она бьет, оставьте, пожалуйста.</p><p class="p1">— Да что мне с вами спорить, Владимир Александрович? У меня вот какая есть догадка, не знаю, согласитесь ли. Ведь ваши активисты, союзнички Михаила Архангела, и наши активисты-жаботинцы, что все хотят после дождичка в Иерусалим, — каждый уверен, что была у Господа некая цель: одни думают — чтобы вы победили, другие — чтобы мы… Но тут я думаю: а вдруг у него цель была другая? Чтобы мы друг друга — тюк да тюк, а победили бы тем временем никем не замеченные третьи, а то и вовсе никто?</p><p class="p1">— Разумно, — кивнул Алексеев. — Так ведь я вам про то и толкую (позвольте кружечку): оно так и задумано, чтобы сначала мы вас, а потом вы нас…</p><p class="p1">— Благодарю, — Фельдман выпил и закусил черным хлебом. — Я даже знаете, о чем думаю, Владимир Александрович? Ведь ни мы, пришлые, ни вы, местные, отчего-то России не подходим… а?</p><p class="p1">— Да, пожалуй.</p><p class="p1">— Россия, — воодушевлялся Фельдман, — это какая-то… Христова невеста, если позволите. Земного ей мало. Потому-то она и берет все чужое, заемное, чтобы тем верней довести до абсурда и тем доказать: и так нельзя, и этак нельзя! Надо как-то, как еще никогда, нигде не было… а как придет это небывалое, так и опять окажется что-нибудь вроде Пугачева. Ждем-то Христа, а приходит то хлыст, то хлюст… то прохвост…</p><p class="p1">— Снова русофобствуете? — подмигнул Алексеев.</p><p class="p1">— Но согласитесь же, что это так!</p><p class="p1">— Да, верно, — снова рассмеялся Алексеев. — И то сказать: ваши победят — вам жизни не будет, мои победят — меня первого покончат…</p><p class="p1">— Очень, очень верно, — кивал Фельдман.</p><p class="p1">— Ваши победят — пойдет торговля, златой телец… — Алексеев заметно хмелел; он был в том драгоценном состоянии, когда еще чуть-чуть — и начнет заплетаться язык, но пока мысль идет легко и высказывается ясно. — Дышать нечем! Наши побелят — пойдет квасной дух, слова поперек не скажи… Да, похоже, никому мы не нужны: нас на то и придумали, чтобы — то мы вас, то вы нас… Ну, что ж вы не закусываете? Берите сала, в самом деле отличное…</p><p class="p1">— Жалко, нету мацы, я предложил бы, — улыбнулся Фельдман.</p><p class="p1">— Ай поел бы! И поел бы! С вами-то — все поел бы!</p><p class="empty-line"/><p class="p1">Странно, подумал Льговский, услышав обрывок их разговора. А где Драйберг с Камышиным? Куда делись? Наверняка угощение готовилось не без их участия. И Барцев рассказывал, что они никуда не уходили: куда же сейчас-то сбежали? Не может быть, чтобы такое сборище происходило без шпионов. С чего бы это они в этакий момент оставили нас в покое?</p><p class="p1">Но он уже выпил слишком много, чтобы додумывать всякую мысль до конца; да и на мосту затевалось что-то интересное.</p><p class="subtitle">22</p><p class="p1">Как всякий русский интеллигент в подпитии, елагинцы и крестовцы уже читали стихи — мастеровые в таком состоянии принимаются петь и плакать; и стихи, которые читали они, все по очереди, от переодетых танцовщиц Акоповой до пятнадцатилетней Веры Головиной, от старого Горбунова до старого Фельдмана, — Ять узнал Мгновенно.</p><p class="p1">Разумеется, это был он, единственный поэт их времени, которого каждый из них имел основание за что-нибудь ненавидеть: за недостаточный радикализм, за избыточный радикализм, за предательство, непоследовательность, душевную болезнь, проповедь распада, — но на дружеских сборищах, в застольях и на свиданиях все они читали его стихи, давно отделившиеся от личности, замкнутой, болезненной и странной. Как мучительно было Ятю еще в ноябре припоминать эти стихи — словно прикасаться к ране, не зажившей, а засохшей, запекшейся, словно ворошить дорогое пепелище… Но сейчас, на краткий миг, когда вернулось что-то важное — Господи, не напоследок ли, не на прощание ли?! — теперь он снова мог их слышать и слышал, как тогда…</p><div class="poem">
<div class="stanza">
<p class="v">Не было и нет во всей подлунной</p>
<p class="v">Белоснежней плеч.</p>
<p class="v">Голос нежный, голос многострунный,</p>
<p class="v">Льстивая, смеющаяся речь, —</p>
</div>
</div><p class="p1">запрокинув голову, читала Маркарян. Длинная ее шея смутно белела в сумраке.</p><p class="p1">— Господи! — заговорил Ять громко, дождавшись конца чтения. — Какие вы все милые, чудесные, бесконечно славные люди! Как трогательны ваши сборы, на которых пьют, только чтобы преодолеть смущение, столь свойственное высоким, чистым душам, стесняющимся слишком патетических разговоров! Как я люблю вас всех, право, и как я счастлив, что все вы снова вместе, что Бог сделал меня вашим современником, что он кладет краски так густо…</p><p class="p1">Он заметил вдруг, что его никто не слушает. На концах моста по-прежнему читали стихи, молодежь чокалась и хохотала — застолье было уже неуправляемо. Однако в этом невнимании померещился ему не только апогей общего веселья, когда уже не до тостов, но и, знак подчеркнутого отчуждения: он не был с ними в самое трудное время, не участвовал в противостоянии и не заслужил нынешнего праздника — и пьяное его умиление было сродни беззаконной радости инвалида, получившего пулю в колено в первом же бою и теперь празднующего победу вместе с теми, кто ее завоевал.</p><p class="p1">— Не говорите глупостей, — услышав его мысли, как если бы они были произнесены вслух, строго сказал Грэм. — Считать себя лишним всегда соблазнительно, особенно когда каждый человек на счету. Все, что было сказано, — услышано; сказанное — хорошо.</p><p class="p1">Тут встал Працкевич; он улыбался дрожащей, судорожной улыбкой, словно боясь, что в любую секунду может утратить власть над собою — и заранее извинялся за припадок безумия; обычно он старался пережидать приступы у себя в царскосельском доме, вдали от всех, но иногда сумасшествие настигало внезапно, и он не успевал спрятаться. Теперь он слишком нервничал: любое напряжение — будь то напряжение счастья или отчаяния — опасно было для его больного мозга; и чтобы не провалиться в трясину, он хватался за стихи с их безупречной кристаллической структурой.</p><div class="poem">
<div class="stanza">
<p class="v">Холодный ветер от лагуны, —</p>
</div>
</div><p class="p1">читал он, не переставая криво улыбаться, —</p><div class="poem">
<div class="stanza">
<p class="v">Гондол безмолвные гроба.</p>
<p class="v">Я в эту ночь — больной и юный —</p>
<p class="v">Простерт у львиного столба.</p>
</div>
<div class="stanza">
<p class="v">На башне, с песнею чугунной,</p>
<p class="v">Гиганты бьют полночный час.</p>
<p class="v">Марк утопил в лагуне лунной</p>
<p class="v">Узорный свой иконостас</p>
</div>
<div class="stanza">
<p class="v">В тени дворцовой галлереи,</p>
<p class="v">Чуть озаренная луной,</p>
<p class="v">Таясь, проходит Саломея</p>
<p class="v">С моей кровавой головой!</p>
</div>
</div><p class="p1">Здесь голос его взлетел и оборвался; разумеется, стихи были выбраны не просто так. Каждый вчитывал свое в их всеобщую, странноприимную музыку, насыщал ее собственным смыслом, — и несчастный граф, со своей больной головой, уж, конечно, представлял эту голову окровавленной, отделенной от неуклюжего квадратного тела, несомой сквозь мрак, сквозь ужасные средневековые видения.</p><div class="poem">
<div class="stanza">
<p class="v">Все спит: дворцы, каналы, люди,</p>
<p class="v">Лишь призрака скользящий шаг,</p>
<p class="v">Лишь голова на черном блюде</p>
<p class="v">Глядит с тоской в окрестный мрак, —</p>
</div>
</div><p class="p1">почти шепотом закончил Працкевич и медленно, механически опустился на мост; широко раскрытые глаза его меркли. По спине у Ятя прошел холод. С другой стороны моста послышался ровный, бледный голос Казарина:</p><div class="poem">
<div class="stanza">
<p class="v">Я не предал белое знамя,</p>
<p class="v">Окруженный криком врагов.</p>
<p class="v">Ты пришла ночными путями.</p>
<p class="v">Мы с тобой — одни у валов.</p>
</div>
</div><p class="p1">Ять еще не знал этих стихов.</p><div class="poem">
<div class="stanza">
<p class="v">А вблизи — все пусто и немо,</p>
<p class="v">В смертном сне — враги и друзья,</p>
<p class="v">И горит звезда Вифлеема</p>
<p class="v">Так светло, как любовь моя.</p>
</div>
</div><p class="p1">Воцарилось недолгое молчание, нарушенное Стечиным:</p><div class="poem">
<div class="stanza">
<p class="v">Свирель запела на мосту,</p>
<p class="v">И яблони в цвету…</p>
<p class="v">И ангел поднял в высоту</p>
<p class="v">Звезду зеленую одну,</p>
<p class="v">И стало страшно на мосту</p>
<p class="v">Смотреть в такую глубину,</p>
<p class="v">В такую высоту.</p>
</div>
</div><p class="p1">Золотился восток, и так же ровно, бледно светился запад, и впервые в жизни Ять не ревновал, услышав свое заветное из уст недруга, почти врага; только теперь, в небывалое время дня между днем и ночью, на мосту между островами, в потустороннем городе, — он понимал, что фамилия поэта, всегда казавшаяся ему олицетворением предела, запрета, на самом деле звучит вовсе не так; она и в этом, втором своем значении была замарана, захватана, обозначая бессмысленный союз каких-нибудь думских кадетов и октябристов, — но на деле ею обозначалась нерасторжимая связь всех этих никому не нужных людей, празднующих свадьбу двух беспомощных детей.</p><p class="p1">Между тем молодежь читала уже вовсе не известные Ятю стихи, которые, мнилось, написаны были в самое последнее время — новой поэзии он не знал совсем. Слава Богу, это не были ничевошки, — то был классический русский стих, прошедший суровую возгонку, обретший новые интонации и смыслы, стих горький и точный, хотя и помнящий о преемственности:</p><div class="poem">
<div class="stanza">
<p class="v">В море гудят паруса, флот уплывает во вторник,</p>
<p class="v">Даже поэта берут, чтобы украсить войну, —</p>
<p class="v">Видя широкую кровь, пусть вдохновится затворник.</p>
<p class="v">Вся она ходит за ним, плавную стелет волну…</p>
<p class="v">Вся она ходит за ним, пряча улыбку возмездья.</p>
<p class="v">Весь он на месте стоит, в свой путешествуя ад.</p>
<p class="v">Странствует только душа, все остальное — на месте,</p>
<p class="v">В чем убедится с лихвой, кто возвратится назад.</p>
</div>
</div><p class="p1">Ашхарумова договорила эти стихи, опустила голову, — но тут же с другого конца моста послышался голос Зайки:</p><div class="poem">
<div class="stanza">
<p class="v">И стыдно стало мне, как будто я сама</p>
<p class="v">Так улицу свою нелепо искривила,</p>
<p class="v">И так составила невзрачные дома,</p>
<p class="v">И так закатный луч на них остановила, —</p>
<p class="v">И стыдно стало мне за улицу, район,</p>
<p class="v">За город, за страну, за все мое жилище,</p>
<p class="v">Где жизнь любви, — да что?! — любви последний стон</p>
<p class="v">Обставлен быть не мог красивее и чище.</p>
</div>
</div><p class="p1">И, венчая собою дивертисмент, зазвучали с середины моста под гитару голоса льговцев — на мотив детской песенки о кузнечике:</p><div class="poem">
<div class="stanza">
<p class="v">Не спи, не спи, художник,</p>
<p class="v">Не предавайся сну:</p>
<p class="v">Ты вечности заложник</p>
<p class="v">У времени в плену.</p>
<p class="v">Представьте себе, представьте себе,</p>
<p class="v">Ты вечности заложник,</p>
<p class="v">Представьте себе, представьте себе,</p>
<p class="v">У времени в плену!</p>
</div>
</div><p class="p1">Но уже расходились, прощались, и все как-то двоилось, троилось, слоилось; вот прошла Маркарян в обнимку с сромным Чашкиным, — ступай, не жалко, будьте, конечно, счастливы, — вот удалился Льговский, вот Стечин подошел поздравить Ашхарумову: их с Барцевым провожали на квартиру Соломина, кто-то вызвался уже идти с ними, на случай столкновения с патрулем, кто-то обещал непременно привести к ним завтра самого настоящего попа («но нашего, нового! — ведь его звали, только он почему-то не пришел»); под гитару грянули «Налейте, налейте бокалы!» — Грэм, пошатываясь, дирижировал с серьезным и неподвижным лицом. Прошла Зайка — одна, как всегда, и за ней хотел пойти Ять — сказать ей, какая она славная; но слишком много было выпито и слишком не хотелось шевелиться. Он сидел на середине моста, привалившись к ограде, глядя в темно-синее небо, отыскивая в нем знакомые звезды: почти такие же были в Крыму — но наши бледней. Пусть другие идут — куда ему торопиться? Сейчас останутся те, кто должен остаться. Ашхарумовой и Барцеву крикнули последнее «Горько!», но они уже уходили, сопровождаемые свитой; Казарин, спустившись с моста на берег, долго смотрел им вслед.</p><p class="p1">— А мы тут разведем костерок да помелем языками вволю, — приговаривал Алексеев, возясь с хворостом. — Завтра-то еще получится ли?</p><p class="p1">— Кстати, а что завтра? — улыбаясь, спросил Фельдман. — Опять, что ли, по дворцам?</p><p class="p1">— Да нет, думаю, по домам, — потянулся Соломин. — Давайте я, Владимир Александрович. Вы-то совсем не умеете.</p><p class="p1">— Не умею, не умею, — легко покаялся Алексеев. — Да вы и помоложе — ну-ка, давайте-ка.</p><p class="p1">К костру, как тень, прошмыгнул Мельников с кипой мятых бумажных страниц — и принялся по одной подкладывать их в огонь. Ять взглянул на мельниковские бумажки — и узнал в них разрозненные страницы «Универсологии» Борисоглебского.</p><p class="p1">— Зачем вы их жжете? — спросил Ять.</p><p class="p1">— Чтобы подольше было хорошо, — не отводя глаз от огня, ответил Мельников.</p><p class="p1">— Вы не должны этого делать, — вдруг со значением сказал Грэм. — Вы не можете знать, что будет, и потому никогда не должны бросать бумагу в костер; особенно если это чужая бумага.</p><p class="p1">Мельников взглянул на него заинтересованно; Грэм кивнул, словно подавая ему сигнал, принятый между бродягами, — да, да, все это серьезно; и Мельников вручил ему пачку страниц, исписанных разноцветными чернилами.</p><p class="p1">— Сохраните, Ять, — распорядился Грэм. — Я даже свои рукописи беречь не умею… Ять кивнул.</p><p class="p1">— Только тут отсыреет… а это ведь единственное, что от старика осталось! Надо отнести в кухню. — Он встал и, пошатываясь, побрел к бывшей кухне Елагина дворца. Он не был здесь с того самого мартовского дня, когда они с Казариным и Ашхарумовой нашли подземный ход. В кухне было темно и громоздились какие-то ящики; он положил рукопись на ближайший и отправился назад. Отчего-то казалось очень важным отнести ее в сухое место. В самом деле, вдруг там вся мудрость мира! Обратно идти было все тяжелее, его неумолимо клонило в сон.</p><p class="p1">Разбудил его Грэм — казалось, он не дал Ятю проспать и пяти минут.</p><p class="p1">— Я советую вам уйти, — сказал этот выдумщик, тряся его за плечо. — Здесь будет плохо, очень плохо.</p><p class="p1">— Оставьте, Грэм, — безвольно сказал Ять. — Я спать хочу.</p><p class="p1">— Я настоятельно советую вам уйти, — повторил Грэм сухо. Он уже проживал очередной рассказ.</p><p class="p1">— Ладно вам, — Ять махнул рукой. — Попробуйте разбудить еще кого-нибудь…</p><p class="p1">— Никто ничего не хочет понимать, — сказал Грэм. — Все спят. Как всегда.</p><p class="p1">— Ну, ступайте, — сонно произнес Ять и сам не заметил, как заснул снова.</p><p class="subtitle">23</p><p class="p1">Он проснулся на сиреневом мутном рассвете, словно от толчка. Во рту было сухо и горько. Он вытер рот (в углах губ запеклась корка), оглядываясь и пытаясь припомнить, в какой момент он потерял нить разговора. Кажется, Грэм меня о чем-то предупредил… Но и без объяснений Грэма он видел, что нечто неуловимо сдвинулось; у него было чутье на такие перемены. Воздух ближе к рассвету не посвежел, а как-то вдруг остыл — или это наступило похмелье с неизменным его спутником ознобом? «Я проснулся на мглистом рассвете неизвестно которого дня», — вспомнилось ему; тут же он оборвал себя, слишком помня, что там дальше. После ясного дня наступал пасмурный, по светло-лиловому небу неслись рваные серые клочья, ночь праздника сменялась стылым, постылым утром. На мосту спали Алексеев и Ловецкий, рядом беспокойно вздрагивал озябший во сне Комаров-Пемза. На берегу, у потухшего костра, свернулся Краминов; чуть правей, вперив в пространство глаза, окруженные синей тенью, сидел по-турецки Казарин. Вид у него был сомнамбулический. Третьим около них, чуть раскачиваясь и блаженно улыбаясь, притулился Оскольцев. Он что-то тихонько подвывал себе под нос, ничего не слыша, никого не видя и только блаженно впивая всем изголодавшимся телом свежесть рассвета, запахи росистой травы, осторожные пересвисты первых птиц.</p><p class="p1">Неподалеку от Ятя, привалившись головой к ограде моста, с открытым ртом храпел Льговский, и у ног его свернулся крестьянский поэт Конкин. Лотейкин спал чуть подальше, на животе, иногда загребая руками, словно и во сне продолжал ползти на Крестовский. Рядом с ним, вольготно разметавшись на спине, тонко храпел Извольский-Изборский. Он улыбался во сне. Стоял и в полном смысле бодрствовал, кроме Грэма, один Працкевич — он пристально и осмысленно вглядывался в рощу на краю Елагина острова, словно ожидал кого-то.</p><p class="p1">— Пойдемте, пора, — не очень уверенно сказал ему Ять.</p><p class="p1">— Нет, мне нельзя, — не сводя глаз с елагинского берега, отвечал великан. — Я должен дождаться.</p><p class="p1">— Чего?</p><p class="p1">— Если бы я знал, — все так же не поворачиваясь к нему, сквозь зубы отвечал Працкевич. — Идите, идите, пожалуйста.</p><p class="p1">Ять принялся тормошить Льговского; тот открыл мутный глаз и посмотрел на него снизу вверх:</p><p class="p1">— А?</p><p class="p1">— Вставайте, проснитесь. Надо идти.</p><p class="p1">— Па-че-му?</p><p class="p1">— Сейчас, могут прийти.</p><p class="p1">— Кто?</p><p class="p1">— Не знаю. И вообще холодно. Идемте, вы простудитесь, не до утра же тут спать…</p><p class="p1">Льговский помотал головой и немедленно заснул опять. Ять еще некоторое время потормошил его, но тот вдруг отвел его руку с такой пьяной злобой, что Ять отошел; не хочет — как хочет. Не арестует же Льговского патруль, если придет, — и кому сюда заглядывать, кроме патруля? К пьяным стражи порядка были как раз терпимы, в пьяном было что-то классово свое. Алексеева он и вовсе не сумел разбудить, тот слишком много выпил. Рядом с ним кротко, как младенец, дремал Борисов.</p><p class="p1">Прежде всего надо было взять себя в руки. Нельзя поддаваться панике, к тому же чужой, нельзя участвовать в чужом сюжете. Грэму захотелось уйти — ну и пусть уходит на все четыре стороны. Сейчас и я пойду — не хватало еще простыть на холодной земле; секунду, где я оставил рукопись? Не бросать же ее тут; специально относил в кухню, чтобы не отсырела…</p><p class="p1">Так, где-то были спички… не мог же Мельников извести все… В бывшей дворцовой кухне было темно, и Ять поневоле поддался ужасу; нельзя же до такой степени, ей-Богу, зависеть от чужого настроения! Это уж не всемирная отзывчивость, а полное отсутствие лица: что слышу, в то и верю… Но и успокаивая себя, и нарочно злясь — ибо только злоба способна истребить страх, — он не мог не чувствовать, что в воздухе нечто неуловимо сдвинулось: он загустел, застыл, потерял прозрачность. Угроза таилась всюду — в черных силуэтах недвижных деревьев на бледно-лиловом небе, в кустах, в темно-коричневой воде. Теплая зеленая ночь сменилась томительным, холодным марганцевым рассветом; Ять проспал какой-нибудь час, — часы он заложил давно, но сейчас было шесть, никак не позже, и за этот час все переменилось, как на оперной сцене во время антракта. Только что был бал, резвились в одном порыве веселья черти и ангелы, драконы и лебеди, херувимы и демоны — все мы дети одной воздушной стихии, все мы жизнь, все готовы обняться в хороводе недолгого братания, — но минул антракт, открылся занавес, и перед нами бледный холодный полусвет, унылая увертюра пересмеивает отзвуки ночного веселья, а вот и дальние громы… Он чиркнул спичкой. Остатки растрепанной рукописи лежали на пустом ящике из-под мороженой моржевятины. Ять собрал листки, скатал в трубку и сунул во внутренний карман пальто; повинуясь внезапному толчку, выглянул в узкое окошко бывшей кухни — нет ли в самом деле какой опасности? — впрочем, все вздор; с минуту вглядывался в туман — и замер.</p><p class="p1">Окно елагинской кухни выходило на дорожку, пересекавшую весь остров — от моста до моста, от Малой до Средней Невки. Сейчас по этой дорожке в сторону Крестовского острова, к тому самому мосту, на котором в странном похмельном оцепенении раскинулись елагинцы и крестовцы, широко развернувшейся цепью двигались темные, общим числом не менее двадцати. Они были в своем обычном, засаленном, заскорузлом тряпье, в низко надвинутых кепках, — лиц Ять не видел, но он всегда угадывал то, чего не мог разглядеть. Теперь необъяснимым чутьем он знал, что на чудовищных шафрановых лицах с поджатыми губами и хищно вытянувшимися, жадно принюхивающимися носами не было даже обычных злорадных ухмылок, не было и недоверчивого любопытства нелюдей к людям — а только деловитость охотника, напавшего на след. Они шли медленно, боясь спугнуть добычу, — но явно сдерживались из последних сил, ибо единственным их желанием было потрусить, порысить, как осторожно трусит охотничий пес, подбегая к логову затаившегося зверя. Ять чувствовал и то, что в них не осталось и следа прежней робости — они шли уверенно, заведомо зная, что отпора не встретят; и в этом была их единственная ошибка, впрочем ничего уже не решавшая.</p><p class="p1">Чутко прислушивавшийся, настороженно вглядывавшийся Працкевич, казалось, только их и ждал. Медленно и уверенно на него надвигалось его безумие, его черные мысли, на глазах обретшие плоть и облик — именно для того, чтобы он мог наконец с ними покончить. Никогда еще ему не удавалось заставить их молчать, никогда не мог он уничтожить их силою своего светлого, но робкого ума; теперь был новый приступ — на приступ шли его самые темные мысли во плоти; этого шанса нельзя было упустить.</p><p class="p1">— Працкевич, куда вы? — тихо окликнул его Казарин. — Что там такое?</p><p class="p1">— Тсс, — обернувшись и приложив палец к губам, отвечал Працкевич. — Это ко мне.</p><p class="p1">Теперь Ять не видел его лица, а видел только могучий торс, наклоненную голову, вытянутые вперед руки со сжатыми кулаками. Он шел, словно желая проверить свои фантомы на подлинность, утвердиться в их телесности; расстояние между ним и темными неумолимо сокращалось. Наконец он уперся в грудь одному из них, поднял голову и взглянул в шафранное лицо.</p><p class="p1">— А-а, — прохрипел Працкевич. — Вы думали — мы жаловаться будем… плакать будем… Вы думаете — мы интеллигенты и Бог наш интеллигент… Не-ет, не-ет… — И, стремительно прянув, впился зубами в горло темного. Темный зашатался, но остальные с рычанием окружили Працкевича и скрыли его от глаз Ятя; когда через мгновение они расступились, граф ничком лежал на траве, сделавшись вдруг коротким и плоским. Казарин смотрел на это не шелохнувшись, не проронив ни звука в ту же секунду с моста послышался жалобный, заячий вопль:</p><p class="p1">— Миленькие… голубчики! Голубчики!</p><p class="p1">Этот умоляющий крик не мог, казалось, принадлежать взрослому мужчине — так могла голосить перепуганная баба; по мосту метался Извольский. Он мог еще убежать — но к нему, отбросив всякую осторожность (да и чего было теперь опасаться?), в три прыжка приблизился длинный, тощий темный; Извольский в последний раз взвизгнул и замолк.</p><p class="p1">Казарин все так же неподвижно стоял у моста, вглядываясь в свою смерть. Он один все это время ждал гибели — и, в отличие от многих ее пророков и адептов, в последний момент выбирающих жизнь, встречал последние минуты спокойно и достойно. Только тут Ять понял, до какой степени Казарину не хотелось жить, как выжгло его расставание с последней любовью, долгое противостояние, примирение, сделавшее бессмысленной всю муку последних месяцев, — теперь, когда все наконец разрешалось, он не бежал и не молил о пощаде. Чтобы хорошо умереть, надо совсем не хотеть жить — других вариантов не придумано; и тут Ять узнал, что, бездомный, безработный, одинокий, иссохший, он хочет жить.</p><p class="p1">Он почувствовал в себе слепую растительную силу, ползучую гибкость плюща, жестоковыйное упорство иудея, ужас загнанного животного; сколько раз проверял он себя на последнюю решимость — и здесь, в решительный миг его жизни, решимость изменила ему. Он один не прошел последнего испытания. Проклятое неверие ни во что, кроме как в необъяснимую ценность собственной, никому не нужной жизни, губило его всегда, — треклятая неспособность умереть хоть за что-то; ничего, кроме жалкой, бессмысленной, полуживотной жизни, теперь не оставалось ему. И, в отчаянии, в смертном ужасе, в здравом, однако же, понимании того, что еще тысячу раз проклянет он себя за эту подлую трусость, он заметался по кухне, ища выхода, натыкаясь на стены, спотыкаясь о ящики из-под моржевятины.</p><p class="p1">О, в другое время он вышел бы из убежища, кинулся к темным и погиб в неравном, заведомо проигранном бою, — но тут был тот самый ужас от столкновения с иррациональным, дочеловеческим, нелюдским, о котором говорил ему бедный Коля Стрелкин, увидевший в ночном дворе ночных детей. Этот ужас заставлял его метаться, кидаться на стены, воздвигать баррикаду из пустых, бесполезных ящиков возле хлипкой двери, — ящики вдруг обрушились, и один из темных, стоявший ближе к кухне, насторожился, повел носом и посмотрел в его сторону.</p><p class="p1">Ятя спас Оскольцев. Он вышел из своего блаженного оцепенения, встал, улыбнулся и в легком недоумении спросил:</p><p class="p1">— Что, собственно…</p><p class="p1">Докончить он не успел и упал на берег прежде, чем смог что-то понять. Ять видел, как в руке у темного тускло забелело лезвие. Оскольцев скорчился на тинистой земле, прижимая руки к животу. Все произошло слишком быстро — полгода он неотступно думал о смерти и не почувствовал ее; два последних дня прожил в твердом убеждении, что не умрет теперь никогда, — и умер на рассвете третьего дня своего бессмертия.</p><p class="p1">Ждать, покуда темный снова оглянется на здание кухни, Ять не стал. В мгновенном проблеске сознания он вспомнил о подземном ходе, рухнул на колени и принялся шарить руками по полу. Расшвыривая ящики, уже не боясь шума, он отыскивал в углу шаткую плиту, отыскал, из последних сил своротил — и узкий квадратный лаз в углу кухни открылся перед ним. Он нырнул туда, не успев задвинуть плиту, и с тараканьей скоростью пополз на четвереньках; сзади едва проникал свет. Скоро ползти стало, легче, ход расширялся, и Ять оказался в подземном зале; здесь снова пришлось жечь спички. Они гасли почти мгновенно, но в коротких дрожащих вспышках он успел разглядеть два, целых два выхода; он стремглав подбежал к тому, что был ближе. Снова пришлось встать на четвереньки и ползти; под коленями была сырость, пахло гнилью. Он все еще опасался преследования и потому полз быстро, задыхаясь от запаха плесени; ход то сужался, то расширялся, и Ять уже уверился, что так и умрет в этой каменной могиле; вечная боязнь замкнутых пространств душила его, горло сжалось, и он уже не сомневался, что за ним смыкается не только тьма, но и камень подземного хода. Обратного пути не было. Стена была везде, вот он и уперся в стену. Спички кончились. Тут, однако, можно было встать. Под ногами угадывались низкие ступеньки. Он поднялся по ним и вытянул руки вверх, упираясь в потолок; плита тяжело приподнялась. Наконец он вышел куда-то; надежда удесятерила его силы. В слабом свете, который и то показался ему ослепительным, он увидел железные скобы, вбитые в стену, — и, держась за них, вылез наружу. Так привелось ему — ровно три месяца спустя — узнать, куда вел подземный ход, открытый им вместе с Казариным и Ашхарумовой. Ашхарумова давно знала, что ход из кухни Елагина дворца ведет на прилукинскую дачу. Два враждующих лагеря были тайно соединены, хоть и не подозревали об этом.</p><p class="p1">Ять выполз на свет в бывшей комнате Барцева. Теперь здесь было пусто, голо, только висел прибитый к стене одинокий плакатик «В этой комнате особенно уважаемой личностью является Николай Лобачевский». Ничего абсурднее не придумал бы ни один футурист, никакой ничевошка Ять встал, машинально отряхнулся (брюки были в какой-то зеленой дряни, плесени, гнили) и шагнул к двери: не заперта. Во всей прилукинской даче не было ни одной живой души; прислушавшись, однако, он различил ритмическое мычание и шаги. Шаги остановились, послышались снова, ускорились, мычание стало громче, и из него прорезались слова:</p><p class="p1">— Недалеко вы… оковы…</p><p class="p1">Звуки доносились из угловой комнаты; Ять подкрался к ней. Дверь была приоткрыта. В крошечной белой комнатке не было ничего, кроме узкой кровати, грубой табуретки и тяжелого старого стола, на котором тоже не наблюдалось ничего лишнего — бумага и отлично отточенный карандаш. По комнате из угла в угол, никого и ничего не замечая, вышагивал Корабельников; он же и мычал. Наконец, найдя удовлетворительное решение, он остановился, вытянул руку вперед и продекламировал стенам:</p><div class="poem">
<div class="stanza">
<p class="v">В цепях</p>
<p class="v">не мните</p>
<p class="v">уйти далеко вы!</p>
<p class="v">Выгода прямая,</p>
<p class="v">поймет и еж:</p>
<p class="v">царской грамоты</p>
<p class="v">сбрось оковы,</p>
<p class="v">вольную грамоту</p>
<p class="v">даешь!</p>
</div>
</div><p class="p1">Он, видимо, остался доволен, подошел к столу, быстро, чуть не ломая карандаш, записал очередную агитку, — но, перечитав ее, рухнул на табурет и закрыл лицо руками.</p><p class="p1">Окончательно уверившись, что все происходит в кошмарном сне, Ять на цыпочках отошел от корабельниковской комнаты и вернулся к Барцеву. Даже в самом кошмарном кошмаре есть своя логика: пусть у него кружилась голова и от жара шумело в ушах, но он помнил, что из подземного зала было два выхода. К этому второму выходу он теперь и полз — сеть елагинских ходов оплетала весь остров, и если один ход пролегал под Малой Невкой, другой мог быть вырыт и под Средней. Ять не мог и помыслить о том, чтобы вернуться на мост. Он дополз до зала, ощупью нашел второй ход и, снова опустившись на четвереньки, медленно пополз в непроглядную черноту. Что-то пушистое ударило его по лицу и тут же в испуге отлетело: особая подземная бабочка? подземная летучая мышь? В ушах гудело и грохотало. Царской грамоты сбрось оковы, вольную грамоту даешь. Он полз долго, падал на живот, лежал, поднимался; сверху капало. Ничего, кроме этой подземной гнилой тьмы, он не заслужил: так и расплачиваются в аду за минуту трусости. Хотел жить — получай жизнь: такова будет теперь она вся. Вот она, вечная наша ошибка: мы думаем, что выторговываем себе ту же жизнь, что и раньше, — врешь, теперь будет только такая… Но кончился и этот ход; он снова уперся в стену, нащупал скобы, поднялся, толкнул руками плиту…</p><p class="p1">Это был металлический люк, вроде канализационного. Ять выполз наружу и оглянулся. Ход вывел его на Выборгскую сторону, к дерюгинскому сталелитейному заводу. Рядом поскрипывали распахнутые ворота, краснела фабричная труба с выложенными белым кирпичом цифрами 1912. Небо утратило лиловый оттенок и было теперь ровно-серым, низким и неподвижным. Ять не знал, долго ли он просидел на мостовой. Покрапал мелкий дождь. Надо было куда-то идти. Ять встал и, пошатываясь, толкнул люк на место. Потом неуверенно побрел прочь от островов, дальше и дальше. Вечером этого дня он кое-как дошел до лавки Клингенмайера, но не помнил ни того, где бродил весь день, ни того, как упал на пороге. Тиф часто начинается с беспамятства.</p><p class="subtitle">24</p><p class="p1">А Корабельников, как выяснилось, старался зря. Он сочинял всю ночь, с отвращением прислушиваясь к декламациям и песням, доносившимся с моста, под утро закончил цикл из двенадцати плакатов, прославляющих свободное правописание, и рухнул на свою жесткую, безупречно белую койку. Проснулся под вечер, по-прежнему один. Прошелся на всякий случай по этажам: пусто. Вот и сбылось предсказание Краминова: ты — последний. И впрямь последний. Все ушли, и никто не вернулся. Разумеется, все они теперь в Елагином дворце. И Чарнолуский, ренегат, тоже небось с ними. Тот, кто не любит революционного искусства, не любит и самой революции. О, конечно, теперь большевики быстро столкуются со старорежимной профессурой. Вы помиритесь с ним, по размышленьи зрелом. Споются. Повоевали, и хватит. Такие, как он, никому не нужны, потому что никто не заинтересован в честном строительстве. Для честного строительства надо работать, а теперь не время работников. Теперь время прихлебателей. Сидят там, издеваются над ним. Наверняка. Ну ничего. В Петрограде больше делать нечего. Пора в Москву. Вот только отдать плакаты… Пойду сейчас в Смольный и скажу этому интеллигенту все, что думаю. И швырну ему в рожу последний заказ. Пусть попробует говорить со мной в этом прежнем тоне. Кретин, ничтожество. Сочинитель декадентских пьесёнок. Трибун в пенснэ-э. И — немедленно в Москву… а он пусть тут устраивает заповедник имени дяди Вани!</p><p class="p1">Собрался, вышел. На мосту — красная лужа: дрались, что ли, до крови? Принюхался: рвота. Упились до блева! Корабельников ненавидел пьянство. Он широко шагал по Елагину, мельком оглянулся на дворец: тихо, вокруг никого… Перепились, спят. Не хочу видеть ни те, ни эти рожи. На Зелениной навстречу — газетчик. Купить напоследок. Развернул под редким дождем. Выцепил глазом колонку в рамке на третьей странице. «Комиссия по орфографической реформе». Тряхнул головой, вчитываясь, пытаясь усвоить. Перечитал. Сплюнул.</p><p class="p1">Вместо вольной орфографии, о которой он всю ночь писал и которую считал главным завоеванием революции, вводился новый набор правил, куда более решительно ограничивающих свободу, чем царская орфография. Окончательный свод этих правил предполагалось выработать к сентябрю. Разумеется, новое закрепощение начиналось по просьбам сознательных, грамотных рабочих, которым, видите ли, неудобно читать статьи и листовки, написанные кое-как. Дело было, конечно, не в орфографии. Он давно чувствовал, что свобода кончится. Свобода нужна ему одному, художнику. Ради нее он готов есть пшенную кашу на зеленом машинном масле, пить морковный чай и спать на чурбаке. Но рабочий класс не для того все это затевал, чтобы спать на чурбаке. Тьфу. Да мне-то черта ли во всем этом? У меня, если хотите знать, вообще врожденная грамотность.</p><p class="p1">Он ввинтил папиросу в угол рта, вытащил листки с плакатными текстами, поджег и прикурил от них.</p><p class="empty-line"/><p class="p1">23 октября 1918 года реформа орфографии была проведена в жизнь, по типографиям проехались красные матросы, лично изымая еры и яти, фиты и ижицы, чтобы исключить возможность контрреволюционного написания. С ерами переусердствовали: там, где полагался твердый знак, некоторое время ставили апостроф. Традиция эта дожила до наших дней.</p><p class="p1">Только с октября Корабельников снова смог писать — период его временных расхождений с властью закончился, он смирил и взнуздал себя, потому что противники советской власти, как всегда, были еще хуже. Между двумя враждебными, давно уравнявшимися неправдами — тупой простотой большинства и гнилостным вырождением меньшинства — всякий выбор был ложен, ибо наступало время куда более страшных оппозиций; но то ли узкий ум Корабельникова отказывался их видеть, то ли больная душа отказывалась вмещать. Все его оппоненты не без помощи государства перестали существовать или перекочевали в загробное зарубежье. Воевать стало не с кем, и он ушел их догонять — в надежде доспорить. Хочешь не хочешь, а любой житель Крестовской коммуны рано или поздно вступает на Крестовский мост.</p><p class="subtitle">25</p><p class="p1">О дальнейшей судьбе Барцева и Ашхарумовой известно вот что. Проснувшись на рассвете, сером и скучном, как всякий рассвет после праздника, они бесцельно слонялись по квартире Соломина, сданной им на месяц, и оба чувствовали странную перемену: словно самый воздух за окном стал другим. Время переломилось, и в этом новом времени оба они чувствовали себя как рыбы, вытащенные из воды. Можно было научиться ползать по суше, но на это требовались годы. Ашхарумова сказала, что зайдет к подруге — надо вернуть ей серьги, одолженные на свадебный вечер; Барцев на всякий случай спросил адрес подруги и уселся сочинять. В шесть вечера Ашхарумовой все еще не было, он забеспокоился, отправился к подруге — и узнал, что Маша ушла пять минут назад; странно, что они разминулись. Впрочем, сказала подруга, она собиралась еще зайти к матери… Адреса матери Барцев не знал и вернулся домой, но по дороге его задержал патруль — выпустили только утром, дав здоровенного пинка; на соломинской квартире Маши не было, а была отчаянная испуганная записка — «Пашка, где ты?! Иду искать». Он узнал, что она искала его у Зайки и Льговского и собиралась даже на Елагин; Барцев кинулся на Елагин — пусто, дворец забили… да и в самом деле, не исчерпана ли была вся эта история с дворцами? На следующее утро был обнародован приказ о национализации Елагина дворца, а прилукинская дача сгорела неделю спустя, и поджигателя не нашли.</p><p class="p1">Барцев искал ее у всех друзей, но оказывалось, что она вышла полчаса назад; засел в засаду на соломинской квартире — но она не появилась; раздобыл у Зашей адрес ашхарумовской матушки — и там узнал, что матушка переехала к сыну, а соседи его адреса не знали. На Барцева страшно было смотреть. Марьи нигде не было и следа — они разминулись в городе и словно существовали с этого часа в разных измерениях.</p><p class="p1">В начале девятнадцатого его мобилизовали — поймали случайно, когда он навещал отца; вернувшись в двадцать первом, он узнал, что Марья буквально вчера уехала за границу. Зайка рассказала ему, что Марья в Берлине, и он с группой советских поэтов оказался там в двадцать четвертом году, через Вогау, мигом перезнакомившегося со всей эмиграцией, разыскал ее адрес в каком-то пансионе — но за день до того, как он ворвался туда, она уехала в Париж с каким-то историком Зуевым, черт его знает, откуда тут взялся историк Зуев… Кое-как умолив Чичерина, он на следующий год ринулся в Париж — но оттуда, как передали верные люди, она уже переехала в Мексику. Сам изумляясь, он попал и в Мексику — интерес к его стране был огромен, приглашали наперебой; в Мексике он встретил почерневшего, исхудавшего Корабельникова, уже не способного обрадоваться ни кактусам, ни пустыням, — и долго они смеялись, что двум русским мир тесен, никак не разминешься. О Марье Корабельников, слава Богу, не спросил — следы ее, как сообщили в консульстве, терялись в Америке.</p><p class="p1">А три года спустя он узнал, что она вернулась на Родину с мужем, американским коммунистом, и вместе с ним почти сразу была арестована; и Барцев попал в ту же лубянскую тюрьму, в которую и ее посадили, — но через полгода после того, как ее услали на этап. По лагерям шел о ней слух — она и в тридцать семь была красавицей; брались даже переправить ей письмо, и какое отчаянное письмо он написал ей! — но, конечно, в ответ не было ни слуху ни духу. Перед самой войной его выпустили, и в июне сорокового он узнал в Москве, что и она будто бы амнистирована, только без права жительства в десяти крупнейших городах; ее видели в Казани, он бросился в Казань — но она только что переехала в Самару, он в Самару — она в Вологду… а тут и война. Все это время альмекская флейта лежала в его коммунальной квартире — комнату после ареста отдали соседке, но вещи она сохранила. Уходя на войну, он взял мундштук с собой.</p><p class="p1">Его снова призвали — в редакцию армейской газеты; там он был быстро замечен и переведен в «Красную звезду». Следы Ашхарумовой затерялись в Германии — она пошла на фронт санитаркой, как же без нее, и оказалась в плену. После плена у нее хватило здравомыслия остаться в Англии, благо освободили ее англичане, — и скоро Барцев увидел ее портрет в американской газете: она издала книгу рассказов, в том числе и о революционном Петрограде. Вскоре он добился в спецхране и самой книги. Он узнал себя — она помнила; написал в «Random House» — но литературный агент сообщил, что она уже в Париже.</p><p class="p1">В Париж его выпустили. — Он прозябал на редакторской должности в «Иностранной литературе», опубликовал крошечную статейку — воспоминания о полусумасшедших друзьях-поэтах, — но желания писать у него не было, да и чего стоили его писания? Тем не менее группу переводчиков и редакторов отвезли в Париж; через друзей он нашел адрес, дрожащей рукой нажал кнопку звонка — уже зная, впрочем, что будет… И было: открыла компаньонка, сообщила, что вот только сейчас Мари отправилась на переговоры… вы должны подождать, она вернется! Он прождал восемь невыносимых часов и вышел в четыре утра, поняв, что с этим ничего не сделаешь. Он не знал, как это называлось.</p><p class="p1">Барцев оставил ей, конечно, письмо — не рассчитывая на ответ, ничего не ожидая, просто чтобы потом не корить себя. Из газет он узнал, что она попала под машину — отделалась, конечно, ушибами, но несколько дней провела в больнице. Газету он прочитал уже в СССР. И главное, на письмо она ответила — со всей нежностью и тоской, не смягченными временем; он узнал бы в этом письме ее голос — она всегда говорила так, словно прощалась с ним навсегда и заранее жалела. Милый, милый мой, ничего, ничего не поделаешь… Но Барцев переехал, и ответ затерялся. Письмо могло бы его догнать, но у почтальонши был маленький сын, собиравший иностранные марки; ничего, напишут еще. Барцев женился на сорокалетней вдове, просиживавшей стул в крошечном издательском кабинете напротив него; пять лет они вместе выходили курить — на лестнице, у подоконника с майонезной банкой, набитой окурками, он и сделал ей предложение. У нее был десятилетний сын, которого Барцев воспитал как своего. «Отвечает ирокез: я желал бы наотрез!» — скандировал мальчик, играя во дворе. Детям нравилось. Ему и досталась после барцевской смерти альмекская флейта — точнее, ее мундштук. Он лежит теперь на чердаке барцевской дачи, среди ненужных вещей, во втором мешке справа от входа: Кратово, улица Ворошилова, дом 17.</p><p class="p1">Ашхарумова, выпустив книгу воспоминаний «Подстрочные примечания» («The References»), вернулась в Штаты, преподавала, переводила и ненадолго приехала в Россию восьмидесятисемилетней старухой. Она не нашла о Барцеве никаких сведений, да и трудно было в ее возрасте что-то искать… Разумеется, она все еще прекрасно выглядела, и провела несколько встреч с читателями, и раздавала интервью — но спрашивали ее в основном о Казарине. Больше всего расспрашивали о его таинственных последних днях — но, увы, о них-то она ничего и не знала. Она умерла в начале девяностых, а альмекская флейта пропала еще в двадцатых. К сведению интересующихся, она и теперь лежит среди всякого хлама в мексиканском историческом музее древностей, куда ее сдал в надежде на вознаграждение слуга-мексиканец, убиравший гостиничный номер после поспешного бегства Ашхарумовой в Америку. Вознаграждения, конечно, никакого не дали. Таких непонятных экспонатов было в музее пруд пруди, и ее отправили в запасники. Так; что если кому-го еще хочется спасти этот не особенно удачный мир — привожу адрес музея: Мехико, улица Лоуренсио Дебальо, 23, со двора. Она лежит в комнате номер семь, в третьей витрине сверху, под инвентарным номером 1439052, между пуговицей видного борца за независимость Эстебано Камильо и пробитым цилиндром журналиста и авантюриста Хорхе Мариньехо. Так всегда и бывает после великого сдвига, когда уже нельзя быть вместе, милый, милый мой, ничего не поделаешь. Он за ней коршуном — она от него рыбой, он за ней рыбаком — она от него кобылицей, он за ней всадником — она от него облаком, он за ней ветром — она от него дождем.</p><p class="subtitle">26</p></span>
