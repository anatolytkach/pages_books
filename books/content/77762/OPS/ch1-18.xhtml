<span><p class="p1">— Александр Владимирович… — Корабельников вдруг посмотрел прямо в глаза Чарнолускому своими огромными, широко расставленными карими глазами. — Я не в обиде на вас — в конце концов, если вам кажется, будто я свожу свои счеты, будет еще случай убедиться, что это не так. Скажите одно, мне действительно нужно знать. Для себя. Я ни с кем не буду об этом говорить, — хотите, поклянусь матерью, это на Кавказе страшная клятва. Ленин… действительно не сговаривался с немцами? А то пишут… это вранье, да? Чарнолуский не отвел взгляда.</p><p class="p1">— И вы могли допустить?</p><p class="p1">— Я не знаю, Александр Владимирович, — честно сказал Корабельников.</p><p class="p1">— Как вы говорите — клянусь матерью? Страшная клятва? Так вот, клянусь вам сыном. Думаю, эта клятва страшнее.</p><p class="p1">— Спасибо, — улыбнулся Корабельников. — Спасибо. А этих… этих вы все-таки уберите.</p><p class="p1">«Этих-то я уберу, — думал Чарнолуский, провожая его до двери и неловко подавая пальто. — Остальных куда дену?»</p><p class="p1">После ухода Корабельникова он посидел в кабинете, глядя в огонь, но вдруг поднялся и стремительно прошел в спальню. Боба, сущий ангел (в кого только?), мирно спал разметавшись. Предрассудки предрассудками, но клясться бы все-таки не надо… Чарнолуский на цыпочках вышел от сына, позвал матроса и спустился к машине, стоявшей у подъезда.</p><p class="p1">— На Елагин, — хмуро сказал он.</p><p class="empty-line"/><p class="p1">Матрос Елисеев, разбуженный звуком автомобиля, выбежал на крыльцо, вытянулся, козырнул.</p><p class="p1">— Добрый вечер, — пробормотал Чарнолуский. — Ну, как тут?</p><p class="p1">— Без происшествий, — пожал плечами Елисеев.</p><p class="p1">— Ну, ну, очень рад… Хмелев дома?</p><p class="p1">— Куда денется.</p><p class="p1">— Он на втором?</p><p class="p1">— На втором, шестая дверь.</p><p class="p1">Чарнолуский расстегнул пальто и, слегка задыхаясь (одышка, старость, черт знает что такое), взошел на второй этаж.</p><p class="p1">Он был у Хмелева впервые: удивляло малое количество книг (да и книги — все больше не по профессии, а религиозного содержания). Ничего общего с профессорским жилищем, каким его представляют: иконка, лампада, жития — схимник, да и только. Старик явно укреплялся духом в преддверии долгой борьбы.</p><p class="p1">— Простите, что я без приглашения, Николай Алексеевич.</p><p class="p1">— Вы здесь хозяин, Александр Владимирович. Прошу. Чарнолуский пропустил колкость мимо ушей.</p><p class="p1">— Я к вам приехал сообщить пренеприятное известие, — сказал он просто. — Я получил сегодня телеграмму из Москвы.</p><p class="p1">Хмелев все понял сразу.</p><p class="p1">— Прикрываете лавочку?</p><p class="p1">— Да.</p><p class="p1">— Всех под арест?</p><p class="p1">— Что вы, Господь с вами, Николай Алексеевич. Идея, кажется, в том и заключается, чтобы распустить вас по домам, а не перемещать всей компанией в камеру.</p><p class="p1">— Похвально. — Хмелев усмехнулся в усы. — Поняли, стало быть, что затея была ложная?</p><p class="p1">— Ложная, — кивнул Чарнолуский. — Нельзя облагодетельствовать того, кто избрал лозунг «Чем хуже, тем лучше».</p><p class="p1">— Лозунг-то ваш, — уточнил Хмелев.</p><p class="p1">— Был — наш.</p><p class="p1">— Вот собрали бы вас год назад в тихий пансион под Петербургом — что, не стали бы сопротивляться? Не заговорили бы о подкупе?</p><p class="p1">— Наверное, вы правы, — кивнул Чарнолуский. — Но подумайте мы ведь вас не просто так распускаем. Каждому пенсию выпишем, с осени, Бог даст, возобновятся занятия в университете — если немец не помешает… Там и академический паек… Оформлять пенсии начнем вот-вот, бедствовать не будете. А нам делить нечего. Я все равно сразу после роспуска коммуны в отставку подаю.</p><p class="p1">— Это, положим, вам сделать будет трудно, — снова усмехнулся Хмелев. — Начальство ваше в Москве, а мы с вами в Петрограде.</p><p class="p1">— Ничего, с этим сладим.</p><p class="p1">— Тэк-с, тэк-с… И на чем же прикажете договариваться?</p><p class="p1">— Какие приказы, полно вам. Об одном прошу: разойдитесь с миром. Не заставляйте силой разгонять.</p><p class="p1">— Сколько сроку даете? — Хмелев поглядел прямо в глаза Чарнолускому, и тот поразился его сходству с Розановым: тот же неприязненно-острый взгляд, немного брезгливый, как на известном портрете, — старческое умное лицо, словно говорящее: я столько про тебя знаю, а ты со мной вон как… Что говорить, у Розанова были причины так смотреть.</p><p class="p1">— Через неделю, думаю, мне придется докладывать об исполнении.</p><p class="p1">— Тэк-с, тэк-с… Ну, а причина? Непосредственный, ежели угодно, повод?</p><p class="p1">— Есть и причина, — понимая, что сейчас следует выдержать жанр и все договорить до конца, ответил Чарнолуский. — Есть сведения, что в вашей тихой академической коммуне занимаются отнюдь не только «Всеобщей культурой».</p><p class="p1">— Ну а как же! — просиял Хмелев. — Еще лексикологией, палеографией, морфологией… Специалистов-то собрали — по всем областям гуманитарного знания!</p><p class="p1">— Я оценил вашу шутку, — холодно сказал Чарнолуский.</p><p class="p1">— Ааа, — протянул профессор. — Стало быть, бомбу делаем? В гимназиях-то, чай, все учились прилично, химию помним… Собралась петербургская профессура да и соорудила адскую машинку. Ашхарумова Машенька будет за Перовскую, я, знамо, за Кибальчича…</p><p class="p1">— Положим, бомбу вы вряд ли соорудите. — Чарнолуский не принимал игры. — По части самоотречения, сколько могу судить, у интеллигенции не так все просто. Очень комфортом дорожим. А вот о разговорах за общим столом кое-что стало известно, причем не мне. Тут уж надо кого-то из ваших поблагодарить: есть во дворце человек, который передает содержание почти всех разговоров.</p><p class="p1">— Ну, вы-то не можете не знать этого человека, — заметил Хмелев. — Сами же и готовили…</p><p class="p1">— Перестаньте, Николай Алексеевич, — поморщился нарком. — Что бы я здесь делал, будь у меня с самого начала план вас загубить?</p><p class="p1">— Вот я и не понимаю, что вы здесь делаете, — развел руками Хмелев.</p><p class="p1">— Прошу вас разойтись добром и уж по крайней мере тщательно проверить все свои связи. Среди вас провокатор, говорю со всей ответственностью. И это не мой провокатор — поверьте, я от тайной полиции в свое время потерпел и наших чересчур ретивых пинкертонов, будь моя воля, осадил бы решительно.</p><p class="p1">— Тэк-с, тэк-с, — в третий раз проговорил профессор и вдруг преобразился. Он встал, выпрямился в полный рост, очки его блеснули в свете керосиновой лампы. Перед Чарнолуским стоял ни много ни мало Фауст, отвергающий сделку с Мефистофелем. — Вот что я скажу вам, господин нарком. Учинить тут раскол и всеобщее друг за другом шпионство вам никак не удастся. А что до разгона, то как вы намерены поступить? Пожарный расчет пришлете или патруль?</p><p class="p1">— Думаю, все будет проще, — ответил Чарнолуский, тоже поднимаясь. — Сначала прекратится снабжение, потом вывезем печурки. Они в больницах нужны. А силком никого вывозить не станем, не надейтесь. Ваш брат интеллигент только в тепле фрондирует, уж простите за резкость. Мучеников из вас никто не сотворит, не беспокойтесь. Никаких разгонов, бастионов, равелинов…</p><p class="p1">— Да уж понятно, — кивнул Хмелев. — Что ж, предупреждение ваше я принял и полагаю разговор оконченным. Время позднее, возраст мой, сами понимаете…</p><p class="p1">— Не совсем оконченным, не совсем, — прервал его Чарнолуский. — Ответьте мне, Николай Алексеевич: на откровенность не напрашиваюсь, но что вам так-то уж в нас не нравится? То, что мы правописание отменили? Так не верю я, что весь сыр-бор из-за правописания! Вот скажите по совести: разве сравнимы наши меры с тем, что творили Романовы? Разве по доброй воле мы продолжали войну? Разве не мы заключили мир, поднимаем сейчас фабрики, покончили с невыносимой эксплуатацией? Или вам незнакомы условия на питерских заводах (нет уж, минуточку, я договорю), или вы не видели толпы нищих детей на улицах? Мы за полгода больше сделали, чем все последние русские правительства. Или вам, нравилось, когда Распутин у руля стоял? Или вам Николай Кровавый кажется идеалом просвещенного монарха? Что мы сделали-то вам всем, скажите на прощание — и продолжим войну!</p><p class="p1">— А, — кивнул Хмелев, — вам во время перемирия пооткровенничать угодно… Чтобы потом, так сказать, с утроенной яростью… Что ж, извольте. Я вам короче отвечу, чем вы спросили. Любите поговорить, господин комиссар, — это вам на будущее. Лаконичней надо с нашим народом, он нетерпелив. Так вот: очень уж мне хамские рожи ваши не нравятся. Довольны ответом?</p><p class="p1">— Оченно вами довольны, барин, — невозмутимо ответил Чарнолуский. — И ведь какой ответ-то безупречный: в иное время самому ответить бы за него пришлось. А теперь-то, в дряхлой немощи, да на положении гонимого, — вполне можно положиться на благородство противника. Ежели не проявит благородства — еще и носом ткнуть: вот как вы с нами, престарелыми страдальцами… Это вам все можно — и выругать нас хамами, и заговор сплести, и пострелять, ежели до дела дойдет. Так ведь?</p><p class="p1">— Уж вы удовлетворения не хотите ли? — с убийственной иронией произнес Хмелев.</p><p class="p1">— Куда мне, кухаркину сыну. Удовлетворен сверх меры. А мне урок: впредь с врагом не переговариваться. Ну, честь имею. — Он повернулся идти.</p><p class="p1">— Сомневаюсь, — вслед ему съязвил Хмелев.</p><p class="p1">— Меньше сомневайтесь, — обернулся Чарнолуский. — Народ наш не любит сомневающихся.</p><p class="empty-line"/><p class="p1">— Он не из худших, — сказал Хмелев вслух, оставшись один. Он давно научился разговаривать сам с собой, чтобы не сойти с ума от одиночества, — привычка эта возникла лет за пять до Елагинской коммуны. — Но в том и дело, чтобы противостоять дьяволу, когда он ласков, а не когда грозен. Не люби его беленьким, а черненьким его всякий погонит… Провокатором стал пугать. Умник. Он-то знал, кто доносил в Смольный о заговоре.</p><p class="p1">— Либеральный идиот, — сквозь зубы ругал себя Чарнолуский, сбегая по лестницу. — Ну, хорошо. Неделя — после пеняйте на себя.</p><p class="p1">Он понял теперь, что Корабельников прав во всем. Ему захотелось немедленно увидеться с ним и как-то загладить сегодняшнюю резкость. В конце концов, единственной его опорой среди петроградской интеллигенции осталась Крестовская коммуна.</p><p class="p1">— Подождите, — бросил он матросу и быстро, в распахнутом пальто, пошел через мост на Крестовский остров. Машине тут было не пройти — снег еще не стаял. Огни прилукинской дачи приветливо горели среди темного Крестовского, как последний форпост города на краю неоглядной тьмы.</p><p class="p1">На первом этаже, в жарко натопленной зале, бешено вращались полуголые танцоры. Это козухинская студия под ритмичные прихлопы танцмейстера занималась эквиритмическими танцами. По стенам эквиритмично плясали фантастические тени.</p><p class="p1">— Корабельникова нету? — спросил нарком.</p><p class="p1">— Как будто не приходил! — весело блестя глазами, отозвалась прелестная девушка лет пятнадцати, одетая более чем легкомысленно. Вот где были юность, свежесть, надежда…</p><p class="p1">— Так, так… А где Драйберг и Камышин?</p><p class="p1">— У себя, — небрежно бросил Козухин. — Второй этаж, шестая дверь.</p><p class="p1">«Ну, совпадения», — подумал Чарнолуский.</p><p class="p1">— Добрый вечер, — приветливо улыбнулся он, входя в маленькую, тускло освещенную комнату. — Ну что ж, товарищи. Я пришел к вам с приятной новостью.</p><p class="p1">— От приятного человека всякая новость приятна, — с мягкой пролетарской учтивостью отвечал Камышин.</p><p class="p1">— Новость моя та, что миссию свою вы можете полагать оконченной, — сообщил Чарнолуский, пожав руки друзьям-неразлучникам. — Вы свободны, возвращайтесь по домам, присутствие ваше тут больше не нужно. Друзья переглянулись.</p><p class="p1">— Да вроде как нужно, товарищ народный комиссар, — помявшись, отвечал Камышин.</p><p class="p1">— Нужно, нужно, очень нужно, — закивал Драйберг.</p><p class="p1">— То есть как? — оторопел Чарнолуский. — Позвольте, но это решать мне!</p><p class="p1">— Да вроде как не вам, товарищ народный комиссар, — тем же сочувствующим тоном произнес Камышин. — Мы не вашего подчинения, мы другого подчинения…</p><p class="p1">— Чьего же? — резко спросил Чарнолуский.</p><p class="p1">— Да это уж позвольте нам знать, — с внезапной наглостью произнес Камышин. — А то спрашивают, спрашивают… Очень много стали спрашивать, вот и вы туда же, товарищ народный комиссар! Сказано раз, сказано два: не вашего мы подчинения. Ну так и не допытывайтесь, вам же хлопот меньше!</p><p class="p1">— Вам же меньше хлопот, конечно, — подхватил Драйберг. — Гораздо меньше вам же хлопот, товарищ народный комиссар.</p><p class="p1">— Вы пожалеете, — серьезно сказал Чарнолуский. Обычно этот переход с добродушно-иронического тона на серьезный, не оставлявший сомнений в грозности его намерений, удавался ему отлично, — но сегодня он уже не сработал с Хмелевым (который попросту опередил комиссара, переведя беседу в иной регистр), а потому обречен был сорваться и во второй раз.</p><p class="p1">— Очень, очень жалеем, товарищ народный комиссар! — воскликнул Драйберг. — Очень жалеем, но только что же можно поделать. Очень, очень вам сочувствуем, дорогой товарищ комиссар…</p><p class="p1">Чарнолуский хлопнул дверью и бегом спустился на первый этаж.</p><p class="p1">— Ну вот, — удовлетворенно сказал Камышин. — Вот как надо. Вот так вот потом и мы вас.</p><p class="p1">— А потом мы вас, — широко улыбнулся Драйберг.</p><p class="p1">Дома Чарнолуский стремительно прошел в кабинет, сел к столу, написал прошение об отставке, бросил его в камин и до утра просидел, сжимая голову руками.</p><p class="subtitle">18</p><p class="p1">А допустим еще такой вариант: происходит все-таки просмотр прежней жизни, грехов в особенности, — и тут я вижу, что все мои грехи были не чем иным, как следствием одной небольшой ошибки, дефекта души вроде близорукости или леворукости. И вот это извлечено на свет и показано мне — то, что всю жизнь стояло на моих путях, закрывало перспективу, ссорило с людьми. О, будь я в силах определить эту ускользающую материю! Но она потому и задумана столь неуловимой, что при жизни ничего угадать нельзя — таково условие. «Господи, если бы я увидел себя — я бы увидел Тебя», любимая фраза из Августина, но если бы я увидел себя, Господа можно было бы понять разве что от противного. Оскольцев с каждым днем все больше ненавидел себя. Прежде у него бывали минуты истинного упоения своим даром, почти самолюбования, — но как было любить эту дрожащую тварь, со дня на день ожидающую гибели? Он месяц не мылся, последняя баня была в начале марта; отец передал ему две смены белья, и больше у него не было ничего. Без ремня, в спадающих штанах (как будто тут было где повеситься), полубезумный, отчаянно сосредоточенный на ежедневном, ежеминутном переживании собственной гибели, — он был так себе мерзок, что, ей-Богу, заранее оправдывал своих убийц.</p><p class="p1">Итак, итак. Не будем отвлекаться. Он увидит наконец то, что ему подспудно мешало на каждом шагу, то, что раздражало еще гимназических товарищей, превращая его в вечного чужака, бросалось в глаза соученикам в университетскую пору, когда он всей кожей ощущал недоверие, подозрительность, нежелание пускать его дальше определенного предела; сколько раз он вынужден был превращать в шутку разговор, дошедший до этой точки! Его не приближали, не любили, не желали делить с ним какую-то общую тайну. Поездки, наука, лихорадочные метания из одной экзотической области знаний в другую — все было из-за этого, только книги не могли выставить против него роковой заслон и нехотя, с презрением открывались. Там, по всей вероятности, тайну ему раскроют, и все незаметные, но главные узлы его жизни будут перевязаны. Все будет прожито заново, но уже без врожденного вывиха: судьбу вправят. И, с ужасом и облегчением оглядываясь на тот путь, ошибочный, черновой, — он заплачет сладкими слезами прощенного.</p><p class="p1">Допустим теперь самое страшное. Сознание сохраняется и в могиле… но ведь это страшней, чем проснуться в гробу? Параллельно с разрушением тела идет разрушение сознания — гниение, зловоние, забвение слов; медленная деградация, на которую он обречен уже сегодня. Не может же быть, чтобы все сразу гасло? Страшнее всего бред, полусон; допустим даже, что будет Страшный суд — но не в этом ли полусне придется пребывать до Страшного суда? Пройдут годы, поколения, сама земля, быть может, исчезнет, — а я все буду ждать своей участи, без конца пересматривая все один и тот же сон о своих тридцати пяти годах… нет, нет, немыслимо, я не могу и представить этого изощреннейшего мучения. Но и вечное мучение было не так страшно, как вечное отсутствие, с которым не могла примириться его все еще живая, все еще жаждущая душа.</p><p class="empty-line"/><p class="p1">Гуденброк мучился тоже. У его мучений была куда более земная причина: у Гуденброка болел зуб. Бродский вдруг разрешил продовольственные передачи, и жена Гуденброка принесла в Петропавловскую крепость кусок сала. Сало это она выменяла на Сенном, отдав за него прекрасный пуховый платок, подаренный мужем во время поездки по русскому Северу. Поделили кое-как, откусывать пришлось зубами — нож не полагался; на фоне гнилой капусты и мерзлое желтое сало было деликатесом: Гуденброк принялся жевать шкурку, что-то в зубе мудрости хрустнуло, а через сутки он уже на стену лез от боли. Полоскал вечерним кипятком — тщетно; утром следующего дня едва задремавший Оскольцев проснулся оттого, что бывший товарищ министра по делам национальностей бьется головой о стену. Безумные глаза его были широко открыты, на щеке явственно дулся флюс. Тут с Оскольцевым случилось странное: приказ держать их взаперти, пока сами не передохнут, возник в его сознании и утвердился там мгновенно. Он все понял — их попросту морят унижением, страхом, неопределенностью, а чтобы продлить мучения — разрешили проклятое сало; он подбежал к двери и заколотился об нее всем телом.</p><p class="p1">— Караул! — орал он. — Ка-ра-ул!!!</p><p class="p1">В дверь просунулся Крюков. Он в недоумении уставился на Оскольцева, прежде не замеченного ни в каких непорядках. В том же недоумении смотрели на него проснувшиеся четверо — Ватагин, Головин, Соловьев и Карамышев.</p><p class="p1">— Вы не смеете мучить людей! — завизжал Оскольцев, не узнавая собственного голоса. — Во врачебной помощи не отказывали и в Бастилии! Немедленно врача!</p><p class="p1">— Чего с тобой? — откровенно забавляясь, спросил Крюков.</p><p class="p1">— Человек третий день мучается зубной болью, у него кость воспалилась!</p><p class="p1">— Оставьте их, — простонал Гуденброк. — Им же это в радость…</p><p class="p1">— У кого кость? — переспросил Крюков. — Кто тут больной?</p><p class="p1">Оскольцеву отчего-то казалось предательством показать на Гуденброка, но он понимал, что неподвижно стоять — еще хуже. И он показал на него.</p><p class="p1">— Щас, — со злорадным предвкушением проговорил Крюков. Он положил вонючую грубую пятерню Оскольцеву на лицо и с силой толкнул его. Оскольцев не удержался и рухнул на пол.</p><p class="p1">— Господи, зачем вы, — страдальчески посмотрел на него Гуденброк. — К чему…</p><p class="p1">Все молчали. Через четверть часа по коридору протопал Крюков.</p><p class="p1">— Больной, с вещами на выход! — радостно проорал он. — Ступай, враз вылечим!</p><p class="p1">Вечером этого дня Оскольцев впервые потерял сознание. Он очнулся от того, что Соловьев бил его по щекам и дул в лицо.</p><p class="p1">— Слава Богу, жив, — произнес он. — Милый, не убивайтесь вы… Вас никто не винит!</p><p class="p1">— Он не вернулся? — прошептал Оскольцев. Соловьев покачал головой.</p><p class="subtitle">19</p><p class="p1">— После вашего столь внезапного бегства, — непрестанно жестикулируя и бросая на Таню восхищенные взгляды, рассказывал Маринелли в корчме «У Селима», — после вашего столь объяснимого теперь бегства мы с Ростиславом тоже не виделись. В отличие от вас пленная прелестница не ожидала нас в Крыму. (Он так и выразился — «captured beauty»; Таня хихикнула. Она смотрела на Маринелли с таким обожанием, что, не будь итальянец так комичен, Ять не на шутку взревновал бы.) Утром я отправился нанимать повозку до Ялты. Благослови Бог Ростислава, уведшего нас от комиссаров! О каком вообще насаждении искусств можно тут говорить, когда у них в руках одно здание в центре города? Никто не знает, чья власть, крестьяне скептичны… о, ни в одной стране мира нет таких скептичных крестьян! Никто не хочет везти в Ялту. Наконец, в одном дворе вижу рыдающего ребенка, показываю ему все, что умею, влюбляю в себя pauvre enfant и с помощью пяти русских слов, которые знаю, умудряюсь растопить лед. Его мать, огромная русская ba-ba, запрягает чахлую лошаденку — и везет меня в телеге; как несчастное животное сдвинуло с места телегу, в которой нас было двое, — не постигаю. От перевала она предлагает мне следовать пешком, ибо уже недалеко; к следующему утру я и впрямь в Алуште. Там полный разброд, все попытки заработать тщетны, постоя нет, гостиница разграблена. Если бы не благородный юноша — о, благороднейший юноша, — если бы не юноша, участь несчастного тенора была бы поистине ужасна. Но есть, есть еще чуткие души! Он определил Маринелли на постой к the tartarians, нет, не говорите мне, что их подлинное имя другое, — они сущие дьяволы, несмотря на кроткий вид. Посмотрите только, как они скалятся. Татары обещали отвезти его в Ялту. Однако вчера утром прискакал на пузатой лошадке какой-то человек из Гурзуфа и поднял все татарское население Алушты отбивать город от ужасного захватчика, запретившего торговлю. Я все это узнал от благородного юноши. Мои tartarians рванулись в Гурзуф, а так как это по дороге в Ялту, я отправился с ними. Мне дали крошечную лошадь, за жизнь которой я не поручусь теперь, — хотя настоящий наездник, друзья мои, всегда облегчает путь коню. Одно дело — поднять балерину, которая весит шестьдесят фунтов, и совсем другое — куль муки того же веса. Маринелли — прекрасные наездники, это у нас в роду. И вот я здесь и не теряю надежды покинуть Россию морем, ибо в Ялте наверняка есть иностранные суда: не убивайте меня сразу, не говорите, что это не так!</p><p class="p1">— Я еще не был в Ялте, — улыбнулся Ять.</p><p class="p1">— Но как?! Как вы могли?! Впрочем, я понимаю вас. Я тоже шагу не сделал бы от the beauty, особенно в такое время. Но кто такой этот захватчик, упразднивший рынки?</p><p class="p1">— Ах, все это вовсе не так серьезно. Кукольный переворот. Я немного знал его по Петербургу.</p><p class="p1">— В Петербурге все друг друга знают! Удивительная страна Россия: образованный слой так мал, что все знай ударяются друг о друга. Впрочем, Италия и того меньше… Как он умудрился завоевать город?</p><p class="p1">— Боже мой, он никого не завоевывал. Здесь сейчас царствует тот, кто войдет и прикажет. Я с наслаждением наблюдаю весь местный калейдоскоп: мы уже видели большевиков, это не страшно, видели Город Солнца в духе вашего Кампанеллы, теперь увидим национальное татарское правление. Еще не было только республики и анархии, но все впереди.</p><p class="p1">— Свобода не благоприятствует искусствам, — назидательно произнес Маринелли. — Боюсь, я не заработаю в Ялте… И что делать, если меня не возьмут на корабль? Прикажете наниматься матросом? Ять, не заняться ли нам развитием татарской культуры? Ведь нас, в конце концов, за этим прислали: развивать культуру победителей. Кто же знал, что победителями окажутся именно татары; но ведь на всякого гунна найдется варвар, а на всякого barbarian — tartarian! Татар победит только тот, кто проще татар, то есть тот, у кого нет даже и нации. Кто это будет, на ваш вкус? Море? Растительность?</p><p class="p1">— Русские, — рассмеялась Таня. Маринелли просиял и поцеловал ей руку.</p><p class="p1">— В самом деле, у русских нет десятой доли тех ограничений, которые соблюдают татары! Они недоверчивы к чужим, их дочери целомудренны, их вера строга — русские же вбирают в себя все и не слушаются никакого закона! Жаль только, что русские так неоднородны. Есть верхний слой, чья жизнь состоит из сплошных табу; есть нижний слой, которому можно все. Держу пари, что этот ваш запретитель рынков (bazaar-banner) из вашей интеллигентской породы!</p><p class="p1">— Во всяком случае, не из народа. А вы хитрый малый, Маринелли!</p><p class="p1">— Друг мой, я слишком долго пел арии мудрецов и злодеев. Доверяйте музыкантам, они всегда умеют расслышать главную тему в оркестровом хаосе! Ваша главная тема — поиск победителя; им будет тот, кто ограничен наименьшим числом условностей. Право, с русскими низами в этом смысле могут посоперничать только немцы — они жадней. Вы не боитесь, что вас покорят немцы? Вся Европа дала им по шапке, и только Россия собирается подписывать мир…</p><p class="p1">— В России все увязнут, — твердо сказал Ять. — Но ешьте, ешьте! У нас тут относительно сытно — опять же благодаря татарам и грекам.</p><p class="p1">— Я не могу испытывать два наслаждения разом, а здесь их целых три: красавица, каких я давно не видел, беседа, которой был лишен почти неделю, и жареное мясо, которого не ел с той самой ночи в Симферополе! Теперь, конечно, они пируют (и впрямь в обеих татарских корчмах — на въезде и выезде из Гурзуфа — жарилась баранина и распивалось вино), но статус наш непрочен. Подумайте о том, что я сказал, Ять!</p><p class="empty-line"/><p class="p1">Поздним вечером они, захватив Зуева, гуляли по набережной. В кромешной тьме едва серебрилась пена прибоя, как полоска белка из-под ресниц. К вечеру с гор наползли тучи, луны не было видно, и, кроме белой мерцающей полосы, поначалу на море нельзя было разглядеть ничего. Лишь потом, приглядевшись, Ять различил в невероятной дали крошечный пароходик, Бог весть как сюда забредший: два дрожащих огонька на самом горизонте. В корчмах и кофейнях горланили татары.</p><p class="p1">— Всегда такие тихие, — недоумевал Зуев, которого едва уговорили погулять. — И не видно их, и не слышно…</p><p class="p1">— А что, их в Крыму ведь больше всех прочих, — вспомнил Ять. — К тому же они коренное население и потому в своем праве…</p><p class="p1">— Коренное население — альмеки, — упрямо сказал Зуев. — Татары — вырождение, запустение, минимум духовной жизни…</p><p class="p1">Маринелли шел под руку с Таней (Ять намеренно не препятствовал и начинал уже понемногу беситься).</p><p class="p1">— Довольно вам спорить, русские! — возгласил тенор. — Я предпочел бы сейчас послушать хорошее пение, но поскольку вы в отличие от итальянцев прелестным вечером вроде нынешнего не хотите петь, а хотите только спорить, — я подозреваю даже, что это и есть ваше национальное пение, — показать свое искусство придется мне. Увы… я не смогу продемонстрировать вам мой полный голос: нетатарские песни тут долго будут под запретом.</p><p class="p1">Он отошел к парапету, встал в концертную позу — голова закинута, левая рука отведена, — и крымская ночь огласилась звуками ночи итальянской: понеслась баркаролла, и волна услужливо вторила ей тихим плеском. Словно кобра из мешка укротителя, на голос Маринелли вышла из-за облака тяжелая дынно-желтая луна и прочертила дрожащую дорожку по масляной зыби.</p><p class="p1">— Divino! — воскликнула Таня. — Брависсимо!</p><p class="p1">Однако намека на ревность довольно было Ятю, чтобы вспомнить все сумасшествие давних дней. Ять видел тогда, что они с Таней не выдерживают близости, что в их стычках все больше желания, а в соитиях — вражды; нужно было бежать, подсунув ей другого, доброго, простого, надежного, — и был этот ласковый и простой, с крупными руками, напоминавшими отчего-то лапы породистой собаки; была его мягкость, сила, его двадцать два года, — и Ять прекрасно знал, что Таня клюнет на эти приманки; он подводил к этому как мог, но одного не учел: ее радости. Он ожидал увидеть все что угодно — раскаяние, стыд, метания между ним и новым возлюбленным, — но увидел только открытое, бессовестное счастье. И то, как легко, без малейших колебаний она попросила у Ятя денег на подарок новому возлюбленному, подкосило его окончательно. Ятю она редко дарила подарки. Он не удержался и сказал ей об этом.</p><p class="p1">— Ты — другое, — совершенно искренне изумилась она. — Ты ведь — почти я… во всяком случае, не отдельно. Зачем я стану самой себе подбирать подарки? Я так счастлива, так ужасно счастлива с ним. Ведь быть с тобой — это быть с собой, а быть с ним — это отвлечься на другого. Ну, Ять, ну, не будь жадиной…</p><p class="p1">И он не пожадничал, а потом и вовсе устранился, отдав ее окончательно и бесповоротно. Три месяца ненависти к ней сменились двумя годами старательно культивируемого равнодушия. И только в последнюю неделю жизнь вернулась — но вместе с ней вернулись ревность, боль, страх, смутное беспокойство, вина — все, что проникло в его сны. С ней было божественно бодрствовать, но спать с ней было невыносимо: во сне приходило раскаяние, словно с Таней он каждую ночь изменял кому-то.</p><p class="empty-line"/><p class="p1">— А ведь он тебе нравится, — полушутя, полувсерьез кольнул он ее, когда они поднимались к зуевскому дому. Зуев тащился где-то сзади.</p><p class="p1">— Как Маринелли может не нравиться? — рассмеялась она — Ты привозишь дивных, дивных людей, вокруг нас все дивно… — Она обняла его. Они остановились, Ять гладил Таню по волосам и видел, как далеко внизу, низко опустив голову, пьяноватый Зуев одолевает подъем. Вид у него был потерянный и жалкий.</p><p class="p1">— Послушай… Ты не думала о том, чтобы в самом деле куда-нибудь податься? — вдруг спросил Ять, нарушая самому себе данный зарок — не касаться будущего.</p><p class="p1">— За границу, с ним? Ты не поверишь, но он завел сегодня речь об этом. Разумеется, имея в виду нас обоих, — никаких вольностей, он, кажется, действительно тебя полюбил.</p><p class="p1">— Ну, актерам тут веры нет…</p><p class="p1">— Пойдем, поговорим наверху. Нечего перед Зуевым… Она открыла дверь своим ключом.</p><p class="p1">— Так вот, — говорила она на втором этаже, раздеваясь бесстыдно и просто, как всегда, но зная, как она хороша, и потому бессознательно кокетничая, улыбаясь, медля. — Он говорил, что мы оба могли бы уехать с ним, что он удивляется, как ты до сих пор не озаботился этим…</p><p class="p1">— Что ж мне заботиться. Я не думаю об отъезде. Почему мне здесь плохо, а там будет хорошо?</p><p class="p1">— Я примерно так ему и ответила. Что ты не сможешь без языка и все прочее. Да и потом, здесь сейчас самая жизнь… Но знаешь, я думаю иногда — ведь я за границей не была три года. Хоть маму увижу.</p><p class="p1">— Я все-таки думаю, что она сама вернется.</p><p class="p1">— Ты совсем не знаешь ее. Иногда понимаешь все, а иногда вовсе ничего. Что ты уставился в окно, ныряй же ко мне.</p><p class="p1">— Да, да… — Ять понимал, что разговор идет важный, а нырнув к ней, он долго еще ни о чем не сможет думать, и они снова не определят своего будущего. — Скажи мне одно: ты действительно хочешь остаться со мной?</p><p class="p1">— Ты знаешь, что я не перестаю быть с тобой. Куда же мне деться? Это все равно что спросить — не хочешь ли ты, милая, оторвать себе уши?</p><p class="p1">— Спасибо, мой ангел. И все-таки: пока нам обоим чего-нибудь не оторвали — может быть, действительно есть смысл подумать о каком-то обустройстве? Я не верю, что Крым вечно будет таким межеумочным. Морской фон с дыркой — суй голову и снимайся.</p><p class="p1">— А как бы хорошо так и дальше! — Таня лежала, закинув руки за голову, и мечтательно улыбалась ему; на столике у кровати горела лампа. — Сегодня то, завтра это, и все новые, новые, новые люди… Ты уже был узником, завтра, глядишь, станешь муфтием… но ты еще не был царем, рабом, надсмотрщиком! Ни разу не допросил меня, шпионку соседней державы! Каким счастьем было бы оставить в стране такой полуостров, на котором разыгрывается вся мировая история! Посылать сюда студентов, устраивать игры, менять власть…</p><p class="p1">— И ссылать сюда всех радикалов. Чтобы каждый попробовал, как Свинецкий: всероссийская опытная площадка! И России какая выгода, каких катаклизмов она избежит… На казни, естественно, в Крыму вводится запрет: разве что понарошку. Падай, ты убит. Да, в таком Крыму я бы остался. Но ведь этого не будет.</p><p class="p1">— Не будет, — согласилась Таня. — А впрочем, что мы все о будущем? Тебе уже не нравится настоящее?</p><p class="p1">— Хочется определенности, какой-никакой. Я бы что-нибудь сочинил…</p><p class="p1">— Сочиняй, кто тебе помешает? Разве татары?</p><p class="p1">— Все правильно. И все-таки тебя зацепила эта идея, согласись. Я же кое-что чувствую…</p><p class="p1">— Только чтобы попробовать. Ты сам говорил, что тут есть что-то странное, располагающее к отъезду. Как будто все сползает в море. Если уж ехать, то из Крыма, — разве нет?</p><p class="p1">— Может быть. Да и морем — как-то лучше, чем сушей. Я только не хочу сейчас. Мне бы досмотреть.</p><p class="p1">— Конечно, — кивнула она. — Конечно, досмотрим. И потом, мы попробовали далеко не всё…</p><p class="subtitle">20</p><p class="p1">Ять сидел в кофейне Пастилаки на набережной, когда бородатый странник с детски-ясными глазами и кротким бледным лицом спустился по главной улице Гурзуфа и остановился как бы в раздумье. Задерживаться странник не собирался. Он надеялся разжиться тут парой лепешек да, может, четвертушкой круглого овечьего сыра, делать который татары были первейшие мастера. Постоявши на площади перед управой, над которой реял зеленый флаг татарского правительства, он отправился к морю: там, на берегу, аппетитно курился над крышей дымок.</p><p class="p1">— Здравствуйте, оседлые люди, — сказал странник, переступая порог кофейни, кланяясь и широко крестясь.</p><p class="p1">— Будь здоров, будь здоров, — словоохотливо отозвался Пастилаки. — Кофе турский, кофе грецкий, кофе арабский?</p><p class="p1">— Кофию я не пью, — виновато сказал странник. — Кофий — баловство одно, не в обиду тебе, хозяин. Я бы водички испил да лепешечки кусок съел, одна беда — заплатить мне нечем. Ежели не побрезгуешь, я тебе отработаю.</p><p class="p1">— Э! — Грек махнул рукой. — Какие теперь деньги? Каждый приходит, придумывает свои деньги. Садись, пей свою воду, вот тебе хлеб. Будет власть, будут деньги, вернешься сюда на купания, разочтемся.</p><p class="p1">— Не вернусь, — вежливо, но твердо сказал странник. — Я лучше сейчас тебе крыльцо починю или, если надо, крышу перекрою. Возвращаться нам никак нельзя.</p><p class="p1">— Что, примета плохая? — спросил из угла Зуев. Он играл в нарды с маленьким круглым татарином, хозяином скобяной лавки на выезде из города.</p><p class="p1">— Не примета, оседлый человек, — ласково отвечал странник. — Не примета, а вера. Ходим по свету, дважды в одно место не заглядываем. А ты что, оседлый человек, на меня так смотришь? Ай встречались где?</p><p class="p1">Последние слова относились уже к Ятю, который с самого появления нового гостя не сводил с него глаз и морщился, то ли силясь припомнить обстоятельства их прошлых встреч, то ли уже припомнив и ужасаясь переменам в знакомце.</p><p class="p1">— Встречались, — тихо сказал Ять. — И у Ираиды Васильевны, сестры вашей, и у Бугаева на Арбате.</p><p class="p1">Пастилаки изумился, увидев, как странник резко вскочил с места, подбежал к столу Ятя и склонился к самому его лицу.</p><p class="p1">— Без очков-то и не разглядеть, — бормотал он, — треснули очки-то, где и взять новых… Ах ты, Боже мой, ведь я людей из той жизни почти не встречал с той самой поры, как братья меня позвали! Как, как вы здесь? Неужели тоже теперь ходите?! — Он гладил Ятя по плечу, тормошил его, называл по имени-отчеству, в речи его замелькали московские и питерские литературные фамилии, и обороты, появившиеся в ней, никак уже не напоминали речь странствующего богомольца.</p><p class="p1">— Ну, говорите же: что Ираида, что Вячеслав Андреевич? Как они, обеспечены, ли?</p><p class="p1">— Все благополучно — Ять не собирался вдаваться в перипетии отношений Казарина с бывшей женой. — Конечно, насколько это вообще теперь возможно… Я сам из Питера две недели как, жизнь меняется быстро.</p><p class="p1">— А я-то уж три с половиной года не был! — простонал странник. — Что город, цел ли?</p><p class="p1">— Да что городу сделается, стоит. Вы про себя расскажите, Георгий Васильевич.</p><p class="p1">Четыре года странничества сильно изменили московского анарходекадента: черты, прежде мягкие, полудетские, обрели завершенность и строгость, плоть словно отлилась в форму — он похудел, ссутулился, тощая бородка придала ему сходство с нестеровскими старцами.</p><p class="p1">— Про себя мне особенно говорить нечего, — потупился он, — и едва ли уместно простому страннику смущать оседлого жителя. Довольно будет сказать, что братья нашли меня достойным и явили мне откровение учителя нашего Льва Николаевича Толстого, гладкий ему путь.</p><p class="p1">«Гладкий ему путь», вероятно, в терминологии поздних толстовцев означал своеобразный эквивалент «Царства небесного».</p><p class="p1">— С тех самых пор, как я узнал вас, — продолжал Георгий Васильевич, — я верил, что душа ваша ищет истины. Может быть, и теперь мы встретились не случайно, и вы уже готовы к странствию. Если так, я мог бы рассказать вам в подробности, что такое наш путь к спасению.</p><p class="p1">Обманывать Ираидиного кузена было последним делом, но Ятя слишком интересовала тайна его ухода.</p><p class="p1">— Не знаю, готов ли я воспринять ваше учение, но обещаю конфиденциальность…</p><p class="p1">— Конфиденциальности не нужно, — покачал головой анархо-декадент. — Рано или поздно тот, кто должен к нам присоединиться, и сам постигнет истину. Об этом Лев Николаевич сказал в последнем письме. Иногда довольно лишь толчка, и я готов его дать вам…</p><p class="p1">— Я ничего не знаю о последнем письме, — признался Ять. — Оно за границей напечатано?</p><p class="p1">— Оно нигде не может быть напечатано, — улыбнулся странник, — и вам неоткуда знать его. Оно отправлено всего три месяца назад.</p><p class="p1">Вот так. Нечего ждать откровений от душевнобольных.</p><p class="p1">— Удивление ваше мне понятно, — без тени снисходительности, но с тихим ликованием благовестника произнес Георгий Васильевич. — Лев Николаевич вот уже семь лет ходит по России, подав всем истинным сторонникам своим великий пример Ухода. Те, кто веровал Льву Николаевичу и поклонялся его прозрениям, поняли призыв великого старца и последовали за ним. Сегодня по всей России не осталось истинных толстовцев, кроме ходунов. Те, что живут в коммунах и смеют именовать себя толстовцами, — оседлые люди, убоявшиеся света правды. Уход — вот главное, что провозгласил Лев Николаевич, и чудесное его бегство — залог истинности Пути.</p><p class="p1">— Что же, он не умер в Астапове?</p><p class="p1">— Вернейшие помогли ему скрыться, он ушел стараниями Александры Львовны и Душана Петровича, — радостно кивнул странник. — Скульптор Меркулов изваял гипсовый портрет великого старца в полный рост, статуя и похоронена в Ясной Поляне. Лев Николаевич знал, что ему не будет покоя, пока вся страна следит за его бегством. В Астапове он понял, что иного пути обмануть погоню нет.</p><p class="p1">— Но ему должно быть уже…</p><p class="p1">— В августе девяносто лет. Странствие чудесно укрепило дух великого старца. Новые его творения обличают второе рождение гения, Владимир Григорьевич передал, что закончен первый том романа о Федоре Кузьмиче.</p><p class="p1">Под Владимиром Григорьевичем, несомненно, подразумевался Чертков, а под Федором Кузьмичом — первый русский-ходун Александр I.</p><p class="p1">— Вы видели его?</p><p class="p1">— Не имел этого счастия, — грустно потупился Георгий Васильевич. — Но письма собственноручные читал и для себя копировал, некоторые имею при себе.</p><p class="p1">— Их можно увидеть? — так и подпрыгнул Ять. Он готов был поверить сумасшедшему и сам корил себя за это, но ситуация была совершенно в духе графа и его поклонников.</p><p class="p1">— Не ранее, чем вы уясните себе смысл Пути, — предостерегающе поднял палец Ираидин кузен. — Лев Николаевич пишет для тех, кто уже проникся Истиной. Ему нет нужды разъяснять вернейшим, в чем она состоит. Но вам, еще стоящему на пороге, должно знать все обстоятельства.</p><p class="p1">Анархо-декадент забыл о голоде и, лишь изредка прихлебывая воду из глиняной кружки, принялся излагать историю движения ходунов. Как всегда, рупором графа выступил Чертков, в декабре десятого года распространивший «Письмо к моим последователям» — первый документ нового толстовства. После долгих размышлений граф пришел к выводу, что избегнуть порочных и ложных связей можно единственным путем — а именно кочевым, цыганским образом жизни. Странник не платит налогов и не содержит армию, полицию, суды; он живет подаянием и тем смиряет гордыню; он не заводит семьи, не вступает в блудный грех и не отягощает, совесть ненужными обязательствами перед детьми. Можно, конечно, возразить: а ежели все начнут странствовать? Но все, утверждал граф, точно так же никогда не начнут странствовать, как никогда не откажутся от роскоши, блудодейства, разврата, праздности и армейской службы. Те же немногие избранные, кто находит в себе силу отказаться от оседлости и всей связанной с нею лжи, повторяют подвиг апостолов — с тою только разницей, что ходят за незримым Христом.</p><p class="p1">«И за вьюгой невидим», — вспомнилось Ятю.</p><p class="p1">Из сбивчивого и не в меру восторженного рассказа Ираидиного брата Ять заключил, что граф после ухода встречался с последователями редко. Пастырские послания он направлял верным людям, в чьих домах ходуны могли остановиться. Общее число ходунов давно превысило количество толстовцев, до сих пор продолжавших жить коммунами, месить глину и изготавливать бочки. По России, если верить анархо-декаденту, их насчитывалось до десяти тысяч.</p><p class="p1">— Скажите, — спросил Ять, замирая, — а не могу ли я краем глаза увидеть… послание?</p><p class="p1">Он ожидал чего угодно — кичливости посвященного, масонской строгости, — но не той кроткой ласковости, с которой Георгий Васильевич запустил руку в пыльный холщовый мешок и вытащил несколько обтерханных страниц с полустершимися письменами.</p><p class="p1">— Лев Николаевич не только не запрещал распространять его сочинения, — улыбнулся странник, — но уподобил сокрытие их утаиванию воды от жаждущего (и здесь его физиологические сравнения, с радостным чувством узнавания заметил Ять). Иное дело, что жаждущий должен сам попросить о воде, — Лев Николаевич считает теперь, что навязывать путь свой всем есть величайшая ошибка спасающегося…</p><p class="p1">Ять сам удивился трепету, с которым протянул руку к истершимся страничкам. Всего печальнее было бы обнаружить скучную сектантскую подделку, унылую стилизацию, какая по силам сатириконскому пародисту. Странное дело: в душе он прекрасно понимал, что граф умер в октябре десятого года, — но легенда так вязалась со всем его обликом и с собственной толстовской верой в невозможность своей смерти (слишком велик, слишком сложен, слишком повязан со всеми, чтобы вот так взять и исчезнуть целиком), что ему не хотелось с этой легендой расставаться. Пусть бы он, в самом деле, так и ходил.</p><p class="p1">— Кстати, — произнес Ять, намеренно оттягивая неизбежное разочарование. — А что он думает обо всем… ну, обо всем этом?</p><p class="p1">— Что именно имеете вы в виду? — с ласковой готовностью катехизатора спросил Георгий Васильевич.</p><p class="p1">— Октябрь… февраль… — Ять в самом деле не знал, как еще назвать происшедшее.</p><p class="p1">— У Льва Николаевича нет упоминаний об этих событиях, — пожал плечами странник. — События, происходящие в оседлом мире, не затрагивают его души и не должны отвлекать ходящего от заботы о совершенстве.</p><p class="p1">В эту секунду Ять уверовал.</p><p class="p1">Нельзя было нарочно придумать ничего подобного. Все без исключения публицисты, в том числе и в родной «Venu», задавались вопросом: что сказал бы граф о русской революции? Никому не приходило в голову, что граф бы ее не заметил.</p><p class="p1">Ять протянул руку к листкам. «Письмо двадцать пятое; об оседлости духовной». Почерк был женский, гимназический, благоговеющий: наверняка творения великого старца размножали и рассылали теперь именно такие аккуратные, беззаветные поклонницы. Но сквозь гимназический почерк явственно проступала иная рука (он так и видел эту руку — старческую, жилистую, до сих пор крепкую). Ять не решился бы уверенно сказать, что это писал ОН. Но мог писать и ОН — ветхозаветный пророк, поверивший Новому Завету и погибший от него. Он начинал с отчета о семилетнем странствии: был на Кавказе, в Сибири, на Волге, пришел теперь в Крым, и думает переждать в нем зиму. Дальнейшее содержало предостережение против страшнейшего вида оседлости — укоренения духа в одном из учений: общего для всех учения нет, вера в любую правду рано или поздно приводит к розни и крови, а путь человека в мире — не спасение мира, но спасение собственной души. Если каждый займется самоспасением, то и некого будет спасать насильственно. Крайняя вера в собственную правоту привела уже к волнениям в Твери и Казани (Господи, почему там?). Спасение мира есть дело не человеческое, но Божеское, — человек же должен помогать Богу единственно заботой о собственной духовной и телесной чистоте да невмешательством в дела Божий. Так, так, это логично, это вполне вытекает из прежнего, — дай как ему было не отчаяться после сорока лет бесплодной борьбы? Он узнал этот ритмический прибой, упорное, безостановочное повторение мысли — повтор, призванный заменить собою доказательство, ибо нельзя было доказывать то, что явилось как аксиома. Никто не знает правды, и никто не смеет учить. Ни одна вера не лучше другой, и признать абсолютную правоту одной веры — значит присвоить себе право убить иноверца; это так же ясно, как то, что человек, признающий какую-либо вещь своею, присваивает то, что на деле ему не принадлежит. Удел странника — ходить среди людей, останавливая их от крайних проявлений нетерпимости, признавая над собою единственную власть Бога, но не бесчисленных пророков и переводчиков его. Это специфически русское странствие и было, по графу, спасительной миссией его родины…</p><p class="p1">Наверное, в этом был резон. Наверное, единственный способ всегда быть правым действительно заключался в том, чтобы не признавать никакой правды, а единственный выход в бесчисленных русских противостояниях — в том, чтобы не брать ничьей стороны. Но Боже, как это было скучно — и как через год приелась бы даже Пушкину его собственная мечта: по прихоти судьбы скитаться здесь и там, дивясь божественным природы красотам…</p><p class="p1">Он не успел додумать — коричневый татарчонок вбежал в кофейню и подал ему английскую записку от Маринелли.</p><p class="p1">«Приходите сейчас же в дом местного губернатора (видимо, так он называл управу). Я не могу выйти. Вам нужно немедленно идти в Ялту».</p><p class="p1">Отовсюду-то мне нужно немедленно идти. Так хорошо было сидеть здесь, пить кофе, слушать море, смотреть в ласковые глаза Георгия Васильевича…</p><p class="p1">— Георгий Васильевич, вы подождете меня здесь? — спросил Ять. Тот покачал головой:</p><p class="p1">— Мне надолго нигде нельзя. Я подожду вас там, — махнул рукою куда-то вдаль. И ведь самое ужасное, подумал Ять, что дождется.</p><p class="empty-line"/><p class="p1">У входа в управу стояли двое караульных — оба русские, одного Ять знал даже в лицо. Это был бродяга с базара, один из тех грязных и хищных типов, в которых Хламида в оны дни предполагал задатки байронизма.</p><p class="p1">— Что, брат, и тебя дернули? — сочувственно спросил другой — белокурый, пухлый, лет двадцати с небольшим. — На допрос, что ли?</p><p class="p1">Ять изумился тому, что незнакомый мужик обращается к нему так запросто, — но тут же сообразил, что различия между русскими в условиях татарского владычества были упразднены. К сожалению, славянское единение всегда покупалось именно ценой коллективного попадания в рабство.</p><p class="p1">— Я по делу, к Маринелли, певцу-итальянцу, — отвечал он уклончиво. — Ты-то чего тут делаешь?</p><p class="p1">— А к татаровьям нанялся, — просто ответил белокурый. — К ним если на службу не пойдешь — так и на базаре ничего не продадут. Слыхал?</p><p class="p1">— Нет, не слыхал. — Сидя в кофейне и беседуя о графе, Ять, оказывается, пропустил самое главное.</p><p class="p1">— Ну как же! Страшное дело, ты что. Ты зайди потом на базар-то, ежели выпустят, — буднично посоветовал мужик.</p><p class="p1">— А что, могут и… того? — Ять изобразил пальцами решетку.</p><p class="p1">— Шагай, шагай, — с внезапной злобой поглядел на него хищный и темный. — По тебе там пузырь твой, чай, соскучился.</p></span>
