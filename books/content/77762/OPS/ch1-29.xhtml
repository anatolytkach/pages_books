<span><p class="p1">— А и в самом деле, Ять, — вмешался Льговский, одобрительно слушавший своих щенков; он после ухода из Крестовской коммуны и частичного перехода на склярские хлеба пополнел, заважничал, залоснился. — Вы ведь человек неглупый, как бы ни притворялись. Так какое вам дело, в сущности, до России? Это на Елагином или на Крестовском думают, будто ей до нас есть дело. А может быть, ее и нет давно, Петр добил. Много вы видели от нее добра? Била да обирала. Скажу вам больше, — ученики притихли, ловя откровение наставника, — в новом веке достоинство человека определяется его способностью абстрагироваться от всех этих великих и мертвых вещей. Будут завоевывать Россию — гори она огнем, будут громить Америку — туда и дорога. Ни одно слово не лучше другого, ни одна правда не права, ткни она мне под нос хоть двадцать мандатов. Есть сила — я уважаю и чувствую силу; но правда? увольте, это вымысел.</p><p class="p1">— Ага! — наконец поймал его Ять. — Значит, силу вы все-таки уважаете?</p><p class="p1">— Конечно, потому что я сам сила, — спокойно ответил Льговский.</p><p class="p1">— А правды, стало быть, нет.</p><p class="p1">— Мне было никогда. Есть литературные стратегии…</p><p class="p1">— Да, да, — кивнул Ять. — Узнаю, как же иначе. Давайте спорить о литературных стратегиях, о прибылях, о тиражах, о журналах, о том, что синематографы вытесняют литературу… Только о самой литературе спорить нельзя — верно? Ведь нас интересует не качество сочинения, а первенство… Тьфу! Еще немного, и я начну доказывать вам бытие Божье.</p><p class="p1">— Или преимущества советской власти, — подхватил Льговский. — Это примерно одно и то же.</p><p class="p1">— Ну, вряд ли…</p><p class="p1">— Да именно так. Приверженность всякой правде рано или поздно приведет к крови, к делению на своих и чужих, всякая вера есть уже инквизиция… Лично я верю только в то, что нельзя никому ничего навязывать.</p><p class="p1">— Отчего-то я чувствую, что как только вы это внушите всем — тут же и навяжете собственную иерархию. Так всегда делается. Именно ваш релятивизм и торит дорогу еще не виданному тирану…</p><p class="p1">— Вовсе нет, — обиделся Льговский, стараясь, однако, говорить снисходительно и высокомерно. — Для меня нет иерархии, какой же тут тиран? Для меня и шляпная картонка — факт искусства, и банка сардин — предмет анализа. Либерализм, может быть, и плох, но ничего лучше не придумано. Безопасней верить в брюхо, как солнышко наше Клейнмихель (челядь хохотнула), нежели в великие абстракции. Всякое величие — это такая же безвкусица, как Библия. Перечитывал недавно — очень плохо написано. Так плохо в самом деле может писать только Бог, заранее уверенный, что его никто не осмелится критиковать. — Льговский был убежден, что завтра же эта его сентенция будет у всех на устах; такие парадоксы он готов был испекать по дюжине в день.</p><p class="p1">— Да что ты ему объясняешь! — подобострастно выкрикнул Прошляков. — Бисер еще метать, в самом деле…</p><p class="p1">— И действительно, — поднялся Ять, — не тратьте бисера. После елагинцев и крестовцев к вам еще можно забрести, отдохнуть пару часов… но после вас так и хочется, честное слово, пойти на какую-нибудь демонстрацию и по возможности погибнуть на баррикадах.</p><p class="p1">Он ушел и во втором часу осторожно открыл своим ключом дверь Клингенмайеровой лавки. Льговский после его ухода вздохнул с облегчением. Таким людям нельзя доверять делание литературы. Они отгородились от реальности системой предрассудков и полагают, что предрассудки заменяют им мораль. А что им вообще известно про мораль? Трусость — и больше ничего; в половине пятого он ушел спать с Милой Калашниковой. Но на демонстрацию Ять не пошел. Как ни мерзостен релятивизм, это еще не повод в знак протеста кидаться в любой из враждующих станов. Холодный день первого мая Ять провел над своей рукописью, теперь уж точно никому не нужной; но никому не нужная рукопись в любом случае лучше, чем никому не нужная демонстрация.</p><p class="subtitle">17</p><p class="p1">Первомайская демонстрация, к которой так долго готовились обитатели Елагина и Крестовского островов, а также вся петроградская народная милиция, прошла не совсем так, как ожидали жители бывшей столицы (впрочем, и социалистическая революция, о которой так долго говорили большевики, произошла не так, как они говорили). Начать с того, что конец апреля восемнадцатого года выдался неожиданно холодным, идиллически ясные дни сменились беспросветными, а тридцатого апреля сыпанул мелкий снег, окончательно уверивший петроградцев, что новая власть не может обеспечить даже и того тепла, которое раньше изливалось на землю само собою. Шутили уже, что солнечная энергия переключена на Москву, куда уехало правительство, и что при большевиках дров не хватает даже Господу; шуточки эти, однако, не поднимали настроения. Город, красно украшенный к празднику, обрел вид жалкий и нелепый, как прифрантившаяся пожилая Мими, тщетно расхваливающая свои прелести. Тем не менее готовились вовсю. Апфельбаум приказал вывесить по всему Невскому транспаранты (большую часть их нарисовали крестовцы по особому заданию из Смольного). Новый градоначальник не учел длины Невского, приказав натянуть кумач через каждые двести метров и заказав всего восемь лозунгов; пришлось срочно дорисовывать еще двенадцать — в ночь с тридцатого на первое вся коммуна, ползая на карачках, писала серебряной краской (белая кончилась) спешно выдумываемые девизы и призывы: «Слушай, небо, слушай, Земля, нашу команду лево руля!» (из недавнего корабельниковского стихотворения «Матросам»), «Чтоб свобода не сдохла с голоду, хлеба дай, деревня, городу!» и что-то еще про пулю в пуп Антанте.</p><p class="p1">Одновременно елагинцы всю ночь обсуждали роковой вопрос: как выйти на демонстрацию, не проходя при этом мимо прилукинской дачи, чтобы не тратить запал на локальную стычку? Столкновение двух демонстраций (или по крайней мере их демонстративное презрение друг к другу) должны были увидеть в городе — что толку воевать на островах; Извольский предложил перейти на Выборгскую сторону и оттуда по набережной дойти до Петроградской, а потом двинуться к Невскому, — но Хмелев возразил, что по Выборгской сплошным потоком двинется пролетариат (район заводской, пусть даже ни один завод не работает). Решили идти через Каменный остров, скрытно.</p><p class="p1">Апфельбаум больше всего боялся вооруженного столкновения или иной провокации; в душе он скорее желал чего-то подобного, чтобы при первых же беспорядках перейти к самому безжалостному террору, — но команды насчет террора не было, а сам он не чувствовал себя вправе проявлять инициативу: в случае чего его легко можно было сделать крайним. Он ограничился приказом к народной милиции встать вдоль Невского сплошной цепью и сдерживать толпу, — но сдерживать было некого, обыватели сидели дома. Сыпался мелкий мокрый снежок, налетал порывами отвратительный ветер, трудящиеся вышли на улицы без всякой охоты — демонстрация не задавалась с самого начала. Чарнолуский собирался говорить речь у братских могил на Марсовом поле, после чего, отдав последний долг пролетарскому элементу, погибшему за свободу всего человечества, колонны должны были двинуться по Невскому на Дворцовую площадь; там планировался второй, более оптимистический митинг и народное гулянье с песнями. Петь мобилизовали солистов Мариинского театра — фрагменты из революционной оперы «Дон Карлос» и несколько новых песен на стихи пролетарских поэтов. В заключение празднества предполагалось под открытым небом разыграть народную драму зверски замученного испанского революционера Лопе де Веги «Овечий источник» (Корабельников только что лбом не бился о стены Смольного, чтобы разыграли его мистерию, клялся один исполнить все роли, включая бабушку Вельзевула, — но утвержден был замученный де Вега как более понятный массам). На Марсово поле пришло человек триста — агитаторы умудрились-таки сбить из питерского пролетариата несколько колонн. Чарнолуский сказал получасовую речь (как всегда, в процессе словоизвержения он холода не чувствовал). По ходу речи он осип, в голосе его появилась скорбная глуховатость, и сам нарком под конец чуть не плакал, призывая превосходную будущую жизнь, которой не увидят павшие борцы; он сочно, с подробностями, как Собакевич своих мертвых крепостных, расписал борцов, которые, павши, расцвели всеми возможными добродетелями; все это было тем более печально, что в могилах на Марсовом поле лежали в основном люди, убитые случайно и никакого отношения к пролетариату не имевшие. Договорив, Чарнолуский уехал на автомобиле — его ждали неотложные дела, и прежде всего горячий чай. Надо было беречь голос, главное оружие революционного оратора.</p><p class="p1">Крестовцы между тем, шатаясь от бессонной ночи, небольшой колонной двинулись по Петроградской стороне, миновали Васильевский и вышли на Университетскую набережную. Они тащили с собой две супрематические конструкции, а Корабельников в последнюю ночь в одиночку намалевал гигантский лозунг «Кто поет не с нами, тот поет плохо». Здесь их остановил патруль, резонно заметив, что празднует сегодня пролетарский элемент, а хулиганствующий элемент должен сидеть дома. Корабельников показал мандат, но подпись Чарнолуского на патруль не подействовала. Поспорили, покричали и повернули; Барцев утверждал, что он знает другой путь. Долго плутали по Васильевскому и перешли наконец через Неву, но добираться до Невского проспекта пришлось вдвое дольше. Колонна крестовцев подошла к перекрытому проспекту лишь к двум часам пополудни, когда бледное солнце чуть показалось в оловянных тучах и снова исчезло. Как раз в это время по проспекту чинно шла колонна попов-обновленцев с Алексеем Галицким во главе. Галицкий исполнял вперемешку «Вы жертвою пали в борьбе роковой» и фрагменты пасхального богослужения, а Соломин — единственный крестовец, попавший на Невский, ибо он пошел с обновленцами, — гордо нес плакат «Красной России — красную Пасху».</p><p class="p1">Елагинцы тихо прошли в десятом часу утра через Каменный мост и пристроились к хвосту пролетарской колонны, двигавшейся по набережной; они шли вдоль молчащих рыжих заводов и осыпающихся зданий (и многие тайно подумали, что пересидеть зиму во дворце было еще подарком судьбы); наконец, час спустя, колонна вышла к Марсову полю. Слушать Чарнолуского елагинцы не стали и двинулись на оцепленный Невский, куда в тот момент выходила колонна дерюгинского завода, опоздавшая на митинг. Во главе дерюгинской колонны шел военный оркестр, выдававший «Интернационал». Под эти гордые звуки елагинцы, морщась, прошествовали на проспект и тут думали отделиться от заводчан, но сзади их уже нагоняла — в силу вечной петроградской путаницы — колонна чихачевской мануфактуры. Пришлось пристроиться к дерюгинцам и развернуть свои плакаты; так они и пошли в едином строю — впереди металлурги под лозунгом «Пролетарии всех стран, соединяйтесь!», а следом профессура под транспарантами «Позор невежеству!», «Долой бесчеловечный гнет!» и «Да здравствует свободная наука!». Как и требовал Извольский, никаких оскорбительных выпадов в адрес Ленина или Бронштейна не было: глава елагинцев не возражал против ареста одного-двух профессоров, но вовсе не желал разгона всей «Лавки искусств», начавшей приносить серьезный доход. Таким образом, лозунги елагинцев органично смотрелись в заводской колонне, а требование покрыть позором бесчеловечный гнет воспринималось как проклятие в адрес кровавой буржуазии; разумеется, все их плакаты писаны были по старой орфографии, но и лозунг насчет пролетариев всех стран, изготовленный старыми грамотными рабочими, был оформлен так же, со всеми причитающимися ерами и гордым ятем в середине «всех».</p><p class="p1">Оркестр исчерпал запасы революционной музыки и играл все марши подряд, начиная с «Прощания славянки» и кончая несколько осуровленным для пролетарской серьезности маршем-буфф из гала-представления борцовского клуба Ивана Заикина. Немногочисленные зеваки из-за спин народной милиции глядели на потешное шествие. Колонны дерюгинцев, елагинцев, чихачевцев, путиловцев и березинцев вышли на Дворцовую площадь, где на импровизированную трибуну восходил все тот же нарком Чарнолуский: приехав в Смольный, он узнал, что певцы из Мариинки боятся застудить горло, исполняя «Дон Карлоса» при такой погоде; нарком кинулся в автомобиль и понесся произносить очередную речь, чтобы пролетариат не топтался в недоумении перед пустой трибуной. Поняв, что от наркома никуда не деться, а концерт с гулянием отменяется, пролетариат хотел было разойтись — но тут среди речи Чарнолуского о предсмертных судорогах буржуазии оркестранты грянули «Марсельезу», и оркестр двинулся по Невскому в обратном направлении; вся демонстрация продефилировала за ним, как крысы за дудочкой. Нарком слез с трибуны и поехал в Смольный.</p><p class="p1">После «Марсельезы» оркестранты совершенно распоясались и заиграли марш из оперетты «Поцелуй тигрессы». На бравую музыку сбежался деклассированный элемент, и, пока крестовцы во главе с Корабельниковым тщетно пытались прорваться на Невский сквозь оцепление, с другой стороны проспекта на мостовую беспрепятственно сыпалась темная публика, с утра успевшая надраться. Вслед за пролетарскими колоннами двинулось карнавальное шествие: толстые краснорожие бабы, угрюмые желтолицые нищие в отрепьях, уроды, инвалиды, странно приплясывающие на ходу; весь этот парад прокаженных сопровождался пением похабнейших частушек, среди которых с неправильной периодичностью возникал один и тот же припев — его навзрыд визжала самая толстая баба:</p><div class="poem">
<div class="stanza">
<p class="v">— Эх, титеся!</p>
<p class="v">Да раскатитеся!</p>
<p class="v">Я дала вам три раза́ —</p>
<p class="v">Расплатитеся!</p>
</div>
</div><p class="p1">Это «Эх, титеся!» долго еще стояло в ушах у Елагинской коммуны. Дважды пройдясь туда-сюда по Невскому и не встретив противников, елагинцы в четвертом часу дня отправились восвояси. Хмелев приказал при возвращении на Елагин транспаранты не сворачивать — и удостоился похвалы от шагавших навстречу матросов: правильно, дедушка, долой гнет! Крестовцев же, главных сторонников новой власти, так никуда и не выпустили. Корабельников с командой дождались пяти, когда оцепление было снято, и под мокрым снегом, всем назло, промаршировали-таки по безлюдному Невскому со своими плакатами, кругами и квадратами. Девушки поголовно простудились, Корабельников был мрачен как никогда, и только крестьянский поэт Конкин пребывал в эйфории — город явно рехнулся, и скоро Россия станет сплошь деревенской. Так закончилась петроградская майская демонстрация 1918 года.</p><p class="subtitle">18</p><p class="p1">В ночь на девятое мая Оскольцеву был сон.</p><p class="p1">Ему снились Гротов, Кошкарев, Шергин, Ватагин, Гуденброк, Бельчевский — все, кого он помнил и во сне почему-то очень любил. В них появилась какая-то удивительная кротость, не свойственная живым, В Ватагине больше не было ничего от хрипло ревущего быка, влекомого на бойню; глазки его лучились добротой. Гуденброк показывал свой наконец-то извлеченный зуб.</p><p class="p1">— Не больно, ни чуточки не больно! — приговаривал он.</p><p class="p1">— Не больно, — кивали Кошкарев и Шергин. — Non dolet!</p><p class="p1">— Я зайчик, я зайчик! — весело вскрикивал Бельчевский, прыгая по огромному зеленому лугу.</p><p class="p1">— Если бы все знали, никто бы не боялся, — печально сказал Гротов. — Так ведь всегда. И если бы никто не боялся, как было бы хорошо.</p><p class="p1">— Такая была бы жизнь, — кивнул Гуденброк.</p><p class="p1">— Уж это будьте уверены, — басил Ватагин. На ладони у него почему-то было яйцо.</p><p class="p1">Наверное, Пасха, подумал Оскольцев.</p><p class="empty-line"/><p class="p1">Он проснулся в слезах и лежал так некоторое время, думая о том, что вот наконец и прорвался к истинному себе — мозг за отсутствием другой пищи полгода жрал сам себя и проел наконец дыру в той стене, которая отделяла Оскольцева живого от Оскольцева настоящего. Надо было всего только умереть, потому что живое слишком многим отягощено, а мертвое ничего не боится, сохраняя при этом все лучшее, что было в живом. Это надо было продумать, и он снова закрыл глаза.</p><p class="p1">Каждый режим можно было принять только в его смерти, в его смертности, потому что ни в чем другом человеческое не проявляется. Сама идея бессмертия была нечеловеческой, потому что происходила из природы. Движение по бесконечной прямой есть то же движение по кругу. Человеческой была только обреченность, сама идея конечности. И потому со всякой надеждой на бессмертие приходилось проститься.</p><p class="p1">Именно Божественная мудрость мироустройства наводила на мысль о полной взаимной отчужденности Бога и человека, потому что помыслить вечное Божество в детстве или юности казалось немыслимо. Оно всегда с самого начала знало все, и начала, и концы, и устройство тополиного семени, и секрет вечного воспроизводства злака, дерева, плода. Но такое Божество никогда не поняло бы Оскольцева и не простило его. Ему чужда была сама идея прощения — то ли дело проращение, воспроизводство, прирост. И за этим Богом Оскольцеву всегда рисовался другой — справедливейший, человечнейший, — и даже в самый миг единственной своей (он верил, что туда на прием попадаешь единожды) встречи с верховным Божеством он был бы уверен, что, если божество это его осудит, за ним есть какой-то другой, его собственный Бог, который все поймет и простит.</p><p class="p1">Но поскольку такой всепрощающий Бог рисовался всякому, даже и последнему злодею, даже и Бродскому, который не верил ни в какого Бога, — примирить все эти одинаково страстные и одинаково обреченные хотения могла только немота, пустота, окончательное небытие, в котором все оказались бы наконец равны. И надо же было чем-нибудь отличаться от природы! Чтобы отличаться, надо было умереть.</p><p class="p1">Он только теперь понял, что смысл грехопадения, самая суть отпадения человека от Бога в том и заключалась, что человек выбрал смерть, выйдя из бесконечного райского полдня. Ведь в раю не было ночи. В раю стоял вечный блаженный день, а верней, особое время без ночи и дня, какое рисовалось ему по гравюрам Доре к Мильтону в старом издании «Потерянного рая». Там клубились какие-то бесконечные дымные облака, а расширяющиеся, косо расходящиеся лучи света боролись с довременной тьмой, но борьба эта больше всего напоминала игру двух равных, невозможных друг без друга начал. То, играючи, одолевал свет, то, дружелюбно пугая, наступала тьма. Между дымными тучами и дымными лучами была лишь иллюзорная, несущественная разница. И только человек сошел с этого черно-белого, а по сути, одноцветного поля, не пожелав вечности. В его особости и заключался грех, который нельзя было поправить никаким Новым Заветом: Новый Завет как раз и был отчаянной попыткой противопоставить этой вечной жизни вечную смерть, против круга выставить крест, но ничего, кроме одинокой гордости отверженного, этот выбор не сулил человеку. Но уж при такой гордости всякую надежду следовало оставить.</p><p class="subtitle">19</p><p class="p1">Грэм появился неожиданно, как всегда, и первым делом направил стопы в лавку Клингенмайера, где в задней комнате сидел над рукописью Ять. Грэм вошел просто и буднично, но так необъяснимо было все в нем, что расспрашивать о будничных делах не хотелось. Какой смысл спрашивать человека, прилетевшего с Луны, как он сюда попал и хороша ли была дорога?</p><p class="p1">— А что немцы? — все-таки спросил Ять.</p><p class="p1">— Немцы как немцы, — пожал плечами Грэм. — До того, чтобы убивать местное население, пока не снисходят.</p><p class="p1">— Как вы выбрались оттуда?</p><p class="p1">— Частью пешком, частью верхом. Скажите, а можно ли сейчас в Петрограде иметь комнату? Есть ли еще Елагинская коммуна?</p><p class="p1">— Коммуна есть, но публика там совсем с ума посходила, — махнул рукой Ять. — Приходите, живите… если пустят. Я попробовал, но очень быстро стал задыхаться.</p><p class="p1">— Главное для меня — немного пропитания и покоя, чтобы написать феерию, — пояснил Грэм. — В голове она готова совершенно, вся.</p><p class="p1">— Ну, попробуйте. Я туда больше не ходок.</p><p class="p1">Остановить Грэма, однако, не удавалось еще никому. Он сходил на Елагин и вернулся в превосходном настроении.</p><p class="p1">— Знаете ли вы, что там свадьба? — спросил он Ятя.</p><p class="p1">— Не знаю, я неделю там не был.</p><p class="p1">— Очень напрасно, — со значением сказал Грэм. — Там двое с двух островов полюбили друг друга…</p><p class="p1">— Про это я знаю, — вставил Ять.</p><p class="p1">— И организуется свадьба, — важно продолжал Грэм. — Так будет хорошо, думаю. Так будет феерично. Нашлись еще двое, которые хотят сделать из этой свадьбы великое перемирие. И даже если оно будет ненадолго, то в ночь на пятнадцатое мая в любом случае будет хорошо.</p><p class="p1">— Неужели на эту свадьбу пойдут елагинцы? — не поверил Ять.</p><p class="p1">— Не все, конечно, — кивнул Грэм, — но есть среди них публицист Ловецкий, человек недурной и давно мне известный. Он делает — и сделает, я думаю, славно. Вы пойдете?</p><p class="p1">— Разумеется — просто чтобы убедиться, что такое возможно.</p><p class="p1">— Я — верю, — Грэм поднял палец — Такие вещи проще, чем кажется.</p><p class="p1">— Что же вы им подарите? — задумчиво произнес Клингенмайер вечером, когда они, все трое, сидели в задней комнате его лавки и пили кофе по-арабски.</p><p class="p1">— Не знаю, право. Я об этом не думал. Знаете, это все так неожиданно вышло…</p><p class="p1">— То-то и оно, что неожиданно. И я даже знаю, как все это вышло. Но вы, несомненно, поймете потом: объяснять вам сейчас — только портить дело. Надо бы осмотреть шкафы — на свадьбу без талисмана ходить не принято, а у меня, несомненно, есть кое-что для молодых… Знаете вы, что самый драгоценный талисман — тот, что удерживает людей вместе? Впрочем, иные рады бы от таких избавиться любой ценой, но это та порода талисманов, которая, раз привязавшись, никогда уже вас не оставит. Боюсь, и вас с вашей Таней связывает нечто подобное.</p><p class="p1">— Я ничего волшебного не дарил ей.</p><p class="p1">— Откуда же вам знать? На вещи не написано… Ну-с, приступим, — поправив очки, собиратель подошел к заветному шкафу, который на памяти Ятя не открывался никогда. Для начала он отпер шкаф — там было пусто; затем нажал на потайную дощечку, и в задней стене открылся тайник. Там лежало не больше десятка пакетов и свертков; один из них Клингенмайер решительно извлек, после чего так же тщательно запер сокровищницу. — Полагаю, — задумчиво произнес он, — что этой вещи пора снова выйти в мир. Довольно уже я держал ее у себя — прячь не прячь, в тайнике она теряет силу. Жаль выпускать, но не выпустишь — потеряешь. Отнесите им это, Ять. И скажите, что теперь они спаяны навеки — как те германские полушария, на которые давила вся сила мира. Ять взял сверток. В руках у него была альмекская флейта.</p><p class="subtitle">20</p><p class="p1">Утром десятого мая Оскольцеву дали сахар. Это был конец. Он не видел сахара с Нового года, с большой праздничной передачи от отца. Ясно было, что так решили подсахарить пулю, последнюю свинцовую пилюлю. Мысль о гибели так прочно соединилась в его сознании с сахаром, что он решил: есть не буду. И сунул кусок в карман истрепанного пиджачишки.</p><p class="p1">Восьмого мая Оскольцева вызвали на последний допрос. Следователь опять тянул, мялся, предлагал папиросы и несколько растерялся от того, что последний заключенный семнадцатой камеры ни на что в этот раз не жаловался, ничего не требовал.</p><p class="p1">— У вас нет пожеланий? — спросил он, в очередной раз потянувшись.</p><p class="p1">— Если вы намерены меня расстрелять, — спокойно ответил Оскольцев, — поторопитесь, потому что иначе я могу умереть и сам. Меня в самом деле тут больше ничто не держит. Следователь улыбнулся.</p><p class="p1">— Ну, это вы торопитесь, с расстрелом-то… Дело ваше окончено. Больше не увидимся.</p><p class="p1">Оскольцев с радостью почувствовал, что не боится. Кивнул, и всё. Увели. В усмешках конвоиров ему почудилось на сей раз скрытое одобрение. Молодцом. Теперь, стало быть, ему придумали последнее утешение (или последнюю пытку — поешь, мол, сахарку, чтоб пожальше было расставаться с прекрасным миром, в котором бывает так сладко). Обеда не было — послышались шаги, стальной скрежет ключа и ожидаемое «Оскольцев, на выход!».</p><p class="p1">Это было совершенно так, как он и предполагал, — и тем не менее собственные ноги казались ему ватными, движения — суетливыми, лицо — дрожащим. Смысл жизни — в смерти. Иди, ты должен наконец сделать то, для чего родился. Ничего другого тебе не остается — умри как человек. Но это все слова, а тело есть тело, и оно не хочет умирать. Тело ропщет, и ему страшно. Он едва нашел в себе силы встать и выйти.</p><p class="p1">Коридор; к следователю водили налево — теперь направо. Что, если тут и шлепнут, как они это называют? Он слышал, что могут шлепнуть прямо в коридоре, без всякого зачтения приговора, без всякой стенки… Остановились перед дверью; за ней в ярко освещенном кабинете сидел незнакомый в штатском. Свет был почему-то зеленый. Вероятно, перед смертью всех заводят в эту камеру с зеленым светом. Последняя фотография или еще какая-то формальность? Секунду спустя Оскольцев разглядел, что никакого света в кабинете нет — это зелень за окном, от которой он совершенно отвык; прогулки были в каменном дворе, где не росло ни деревца. Окно было зарешеченное, но большое, живое, стеклянное, — он давно, очень давно не видел такого.</p><p class="p1">— Ознакомьтесь, гражданин Оскольцев, — сказал гражданский сухо.</p><p class="p1">Убивать надо без сантиментов. Оскольцев попробовал сделать шаг к его столу — ноги приросли к полу; штатский встал, подошел и вручил ему бумагу. Не дрожать! Оскольцев взял, но читать не мог.</p><p class="p1">— Прочтите сами, — сказал он еле слышно. Штатский махнул рукой: а, формальность.</p><p class="p1">— Следствие по вашему делу закончено, — сказал он, — вы можете быть свободны. Распишитесь об ознакомлении.</p><p class="p1">Оскольцев подошел к столу, расписался и умер. Когда он воскрес, над ним с грязным мокрым полотенцем стоял штатский, а сам он лежал на полу, не чувствуя боли от разбитого затылка.</p><p class="p1">— Ну что вы как барышня, — брезгливо сказал штатский. — Можно подумать, вас мучили здесь.</p><p class="p1">— Нет, нет, — блаженно улыбаясь, произнес Оскольцев, — что вы.</p><p class="p1">— Вещи с вами? — грубо спросил штатский.</p><p class="p1">— Да, да… были со мной.</p><p class="p1">— Вы можете идти по месту своего жительства, — торжественно произнес вершитель судеб.</p><p class="p1">— Разрешите спросить, — пролепетал Оскольцев. Штатский кивнул.</p><p class="p1">— Могу я знать, какова судьба… моих друзей? — Он забыл слово «сокамерники».</p><p class="p1">— Откуда же я могу знать о судьбе ваших друзей. Я отвечаю только за арестованных.</p><p class="p1">— Я о них и спрашиваю… Ватагин, Гротов…</p><p class="p1">— Их дела закончены раньше, поскольку они активно сотрудничали со следствием, в отличие от вас, — назидательно пояснил штатский. — Относительно вас нам все пришлось узнавать самим. Вы не участвовали в преступлениях царского режима и можете быть свободны. Советская власть карает только врагов. Надеюсь, когда-нибудь вы поймете этот гуманизм.</p><p class="p1">— О да, — прошептал Оскольцев, с трудом сдерживая слезы. — О да…</p><p class="empty-line"/><p class="p1">Пока его выводили за ворота, пока шел мимо пушек, мимо высоких каменных стен — еще не верил и не позволял себе думать; если не закончить ни одной мысли — есть шанс в самом деле выйти живым. Его толкнули в спину, он вышел, ворота захлопнулись. Некоторое время он шел вперед по инерции движения — как можно дальше от крепости, не видеть, уйти из поля зрения, чтобы не могли передумать. По Кронверкскому мосту, по набережной, вглубь, какие-то дома, зелень. В тихом дворе, среди чириканья и щебета, теней и травы, он замер и в первый раз вдохнул всей грудью. Нет, меня все-таки убили. Этого не может быть.</p><p class="p1">Однако все это было, и он, час тому назад приговоренный, стоял теперь в одном из двориков Васильевского острова, свободный, помилованный и, вероятно, теперь бессмертный. Был божественно ясный, непредставимо теплый день, и тысяча забытых звуков и запахов лезли отовсюду в страшно сузившийся мир Оскольцева, лезли и рвали его на куски. Оболочка трещала по швам. Мир раздвигался, надвигался отовсюду, оглушал звуками — шлепало на ветру мокрое белье, вынесенное во двор, продребезжал вдали автомобиль, ни на миг не смолкали птицы, певшие ему, только ему — проснись, очнись, поверь, что все это с тобою! Он щурился, жмурился, крутился на каблуках. Мимо пробегал мальчик, он оглянулся на Оскольцева, замедлил бег и подошел полюбоваться смешным сумасшедшим. Можно подразнить его или еще как-нибудь развлечься. Смешной сумасшедший вынул из кармана пиджачка кусок серого сахара и протянул мальчику. Мальчик схватил сахар и убежал, не поблагодарив. Оскольцев расхохотался: я освободил сахар! Сахар вышел со мной на свободу!</p><p class="p1">Хотелось сесть на землю, и он сел на землю, но тут же вскочил: вдруг нельзя? Мысль о повторном аресте обожгла его, как глоток кислоты; но тут же этот страх утонул в море всепоглощающего счастья, в океане блаженства. Нет, нет, никогда. И как я смел думать, что умру весь? Бессмертие шумело, хлопало и плескалось вокруг; милосердный прохладный ветер дунул ему в лицо, принес гниловатый запах воды и пыли, запах Невы. Как я мог, как смел допустить свою смертность на этом пиршестве вечной жизни? О, когда мы больны и испуганы, с какой позорной легкостью отрекаемся мы от Тебя, — забыв, что Ты на любой случай предуготовил спасение, о любой вероятности подумал и для каждого разбил спасительный парк с листьями и тенями! Как мог я усомниться в Тебе. Следующая мысль его была об отце; да, да, разумеется! Как я смел не подумать об отце сразу же, в первое мгновение, как мерзок эгоизм тела, выпущенного из тисков страха! И он, шатаясь, спотыкаясь, не разбирая пути, побрел (а ему казалось — побежал) туда, в глубину сквера, к арке, затем — по незнакомой узкой улице, куда-то вверх, вверх… Надо было на Съезжинскую. Ах, ведь и совсем нет денег, не подзовешь извозчика… Путь до Съезжинской занял у него два часа — он отвык ходить, то и дело останавливался и до боли в груди дышал. Зеленое вещество петроградской весны наполняло его, разрывало легкие, проникало в кровь; и с каждым шагом он обретал силу. То снимал, то надевал очки, ничего не видел от слез. Было бы бесчеловечно, немыслимо, неслыханно, если бы отец не дождался его!</p><p class="p1">И отец дождался; каждую ступеньку одолевая по минуте, на каждой задерживаясь, боясь, молясь, Оскольцев влез на второй этаж. Брякнул звонок. Послышались шаркающие шаги.</p><p class="p1">— Отец, я вернулся, — прошептал Оскольцев.</p><p class="p1">Дверь открылась. Он никогда еще не видел отца таким жалким — Более мой, что осталось от него! Он, бывший когда-то воплощением спокойной силы, твердости и самодостаточности, теперь едва ходил, порыв ветра сбил бы его с ног, он постоянно щурился и, кажется, не сразу узнал сына в этом бородатом, отощавшем госте с огромными кругами под глазами.</p><p class="p1">— Ви… теч… ка, — выговорил он наконец.</p><p class="subtitle">21</p><p class="p1">Казарин извлек из запасников коричневый, прожженный в нескольких местах бант — тот самый, в котором его как-то увидел Фельдман и заметил: «Да вы совсем франтом!» Хламида был в черной хламиде неизвестного происхождения, придававшей ему чрезвычайно торжественный вид. Да и случай был подходящий — свадьба случается не каждый день.</p><p class="p1">Наотрез отказались прийти только Хмелев и Корабельников — два последних оплота враждующих коммун. Краминов и Ловецкий, наслаждаясь легальным общением, хлопотали у скатерти, расстеленной посреди моста. Погода в свадебный вечер выдалась на диво: после внезапного снегопада по случаю демонстрации, после промозглых холодов первой майской недели пришло настоящее тепло, начала расправляться и оживать побитая снегом трава, — и хотя на липах вокруг яхт-клуба молодые листья висели бледно-зелеными тряпочками, дубы на Масляном лугу выпустили крепкую, свежую листву. Ночи уже почти не было — темная синева удерживалась на небе только в самое глухое время с двух до трех, и уже в четыре бледно золотился восток. Вечер четырнадцатого мая был теплый, бледно-сиреневый и словно застывший: недвижно сиял бледный свет над стрелкой Елагина острова, и недвижно стоял лес на Крестовском; все замерло в блаженстве и томлении.</p><p class="p1">Они почти одновременно, попарно спускались к воде и располагались на мосту, соединявшем острова: Алексеев и Конкин, Борисов и Долгушов, Фельдман и Горбунов, Комаров и Соломин… Хламида прикатил на извозчике с неизменным ящиком вина. Ять явился, когда на скатерти было уже расставлено царское, по меркам восемнадцатого года, угощение: соленые огурцы, сало, небольшой кусок ветчины, сыр (который на складе у Шраера заплесневел, и торговец теперь выдавал его за рокфор); елагинские спекулянты расщедрились, умилившись событию, и извлекли из запасов изюм и даже окаменевший рахат-лукум. Молодых еще не было — они, по замыслу организаторов церемонии, совпадавшему с их собственным желанием, должны были появиться не сразу, дабы возможная все-таки перепалка между враждующими лагерями не омрачила им праздника. Никакой перепалки, однако, не возникало: все сидели молча по разным сторонам моста. Молчание уже становилось неловким, когда его басовито нарушил Борисов:</p><div class="poem">
<div class="stanza">
<p class="v">Из чресл враждебных, под звездой злосчастной,</p>
<p class="v">Любовников чета произошла…</p>
<p class="v">Смирившись пред судьбою их ужасной,</p>
<p class="v">Вражда отцов с их смертью умерла, —</p>
</div>
</div><p class="p1">подхватил Ловецкий.</p><p class="p1">— А что, господа, ежели бы Карамзин был не седой историограф, а прелестная женщина в расцвете сил? — обращаясь как будто к одним крестовцам, но на деле ожидая встречной елагинской реплики, предположил Краминов. — Ведь, пожалуй, Шишков не устоял бы, и гуляла бы «Беседа» на свадьбе с «Арзамасом»! Елагинцы молчали.</p><p class="p1">— Да что уж! — внезапно сказал Горбунов. — Дело молодое. Не думайте, что уж насовсем мир… но на один вечер по такому случаю можно и сойтись.</p><p class="p1">— Да зачем же мир насовсем! — горячо заговорил Борисов, переходя на елагинскую сторону моста и усаживаясь рядом с Горбуновым. — Вечный мир в гробу, а живым можно и должно спорить.</p><p class="p1">— Ежели соль перестанет быть соленою, — солидарно прогудел Соломин, — так ее останется выбросить вон на попранье людям!</p><p class="p1">— Если мы перестанем спорить, — продолжал Борисов, — нас ведь тут же передавят. Либо мы против вас, либо какой-нибудь Иван Грозный против всех!</p><p class="p1">— Так что ж вы этому Грозному пятки-то лижете?! — не выдержал Алексеев. — Если всё понимаете, что ж вы с ним заодно — вот я чего в толк не возьму! Это была уже почти победа — начинался жестокий, но живой спор, который всегда предпочтительнее отчуждения.</p><p class="p1">— Да ведь мы не с ним заодно, это он случайно согласен с нами, — присоединился к Борисову Краминов. — Вы же видите — нам от них никакой выгоды, и хватают они всех без разбору — что наших, что ваших. Мы для них неотличимы. Сегодня глаза друг другу выцарапываем, а завтра рядом болтаемся.</p><p class="p1">— Стало быть, ежели нас завтра разгонят или пересажают — вы в оппозицию уйдете? — не унимался Алексеев.</p><p class="p1">— Куда нам уходить, мы и так… — махнул рукой Борисов, не уточняя, что именно «и так».</p><p class="p1">В этот момент спор прервался, ибо со стороны Елагина острова к мосту приближалась Ашхарумова в белом платье под руку с Барцевым в широком даже для него сюртуке, который где-то раздобыл всемогущий Извольский. Сам Извольский, в безупречном костюме, сияя улыбкой, шел чуть поодаль.</p><p class="p1">— И он тут! — ахнул Алексеев. — Неужели и его уломали?</p><p class="p1">— Что ж было и уламывать, — скромно улыбнулся Соломин. — Человек деловой, понимает… Я, господа, так вам скажу: наши с вами споры — одно дело, а судьба России — Другое дело. И сейчас, когда судьба России решается на наших глазах…</p><p class="p1">— На наших глазах сейчас решается совершенно другая судьба! — поспешно перебил его Ловецкий. — Мы здесь собрались не Россию спасать, а выпить за здоровье молодых.</p><p class="p1">— От которых, надеюсь, Россия прирастет россиянами, — поддержал Краминов. — Посему предлагаю разлить и встретить нашу пару стоя!</p><p class="p1">Льговский вытащил бумажную пробку из гулко бултыхающей бутыли спирта и принялся наливать в алюминиевые кружки, которые четыре месяца назад в изобилии завезли в Елагин дворец по приказу наркома. Бутыль он реквизировал у Кугельмана, заглянув в «Паризиану» за час до торжества.</p><p class="p1">— Поднимем бокалы, содвинем их разом! — возгласил Горбунов.</p><p class="p1">— Лошадку ведет под уздцы мужичок! — подмигнул Ловецкий, указывая на приближающуюся пару.</p><p class="p1">— Да здравствуют музы, да здравствует разум, в больших рукавицах, а сам с ноготок! — захохотал Краминов.</p><p class="p1">— Виват молодым! — закричал Конкин. — Исполать!</p><p class="p1">Барцев раскланялся. Ашхарумова сияла черными глазами.</p><p class="p1">Ять мельком посмотрел на все еще молчащего Казарина — тот не сводил с нее глаз, но во взгляде этом Ять не мог прочесть ни восхищения, ни ненависти, а только жадную тоску. Так, должно быть, путник в пустыне смотрит на прозрачный ключ, не зная еще, впрямь он играет у ног или кажется. Казарин словно напитывался от нее жизнью и силой, но и жизнь, и сила были чужие, а потому не утоляли его.</p><p class="p1">— Горько, — негромко сказал он, и Ашхарумова одарила его сияющим благодарным взором.</p><p class="p1">— Горько! — крикнул чей-то высокий голос, почти фальцет, из глубины Елагина острова: к мосту быстро, спотыкаясь и оскальзываясь с непривычки, шел Оскольцев.</p><p class="p1">— Виктор Александрыч! — радостно приветствовал его Краминов. — Вот ведь, как чувствовал. Сюда, сюда скорей!</p><p class="p1">— Да успеете поздороваться, — осадил его Соломин. — Паша, или вы оглохли от радости? Говорю вам, нам всем горько!</p><p class="p1">Барцев не заставил себя долго просить. Казарин надеялся, что поцелуй выйдет холодным, дежурным, — но молодые, похоже, искренне радовались всякой возможности слить уста. Толстый Барцев с закрытыми глазами и выражением умиленной нежности на лице был трогателен, как поросенок.</p><p class="p1">— Да я никак на свадьбу попал! — восклицал Оскольцев.</p><p class="p1">— Когда вы вышли? — Ловецкий кинулся обнимать его.</p><p class="p1">— На днях. Вы представить себе не можете…</p><p class="p1">— Но я говорил, говорил вам! — хлопал его по плечу Краминов.</p><p class="p1">— Вы говорили, а я уже не чаял вас увидеть живыми. На другой день после вас мне сахару дали, — хохотал Оскольцев, — сахару, да… И я, конечно, решил, что это конец Напоследок, значит, побаловали… Что ж — через час приходят: Оскольцев, с вещами! Шел и все думал: что бы вспомнить такого главного? Ужасный калейдоскоп в голове, и ноги подгибаются, и… тут вводят меня в какой-то кабинет — и говорят: вы свободны! Вообразите, а? И вот я тут — первым делом решил навестить вас.</p><p class="p1">— Как отец? — поинтересовался Ловецкий.</p><p class="p1">— Слава Богу, слава Богу… Вы представить, представить себе не можете! Неужели все мы думаем, что умрем, а на самом деле там — такой же сад, и сирень, и такая ночь прекрасная, и такая девушка удивительная… Это она выходит замуж? Ах, какое несчастье! — Оскольцев говорил и говорил без умолку, и обитатели обеих коммун в изумлении слушали его.</p><p class="p1">— Господа, это наш сокамерник, — пояснил Ловецкий, — мы вместе сидели тогда, только нас через день, как вы знаете, выпустили, а он пробыл там полгода.</p><p class="p1">— Позвольте, позвольте… Господин Оскольцев, если не ошибаюсь? Товарищ министра иностранных дел? — навел на него пенсне Горбунов.</p><p class="p1">— Бывший, бывший товарищ министра! — радостно поправил Оскольцев. — Да-с, я.</p><p class="p1">— Отчего же вас продержали так долго? Ведь почти весь кабинет освобожден еще в марте, — вспомнил Пемза, следивший по газетам за судьбой правительства.</p><p class="p1">— Забыли, — смеялся Оскольцев, — Фирса забыли… Благодарение Богу, ваши друзья напомнили. Если б не они, вероятно, и теперь бы там оставался…</p><p class="p1">— И что? — мрачно спросил Долгушов, не адресуясь ни к кому конкретно. — И это — не зверство?</p><p class="p1">— Что вы, отчего же зверство! — замахал руками Оскольцев. — Такие ли вещи творились… что мне с моими шестью месяцами…</p><p class="p1">— Но ведь ни за что ни про что! — настаивал Долгушов.</p><p class="p1">— За ту минуту, в которую я снова увидел свет Божий… и зелень, и мостовую, и небо, и ребенка… всё, всё! — за эту минуту я готов был бы и дольше, много дольше… от чего, конечно, Боже упаси! — испуганно перебил сам себя новый гость. — Я прошел свой квадрильон, он, знаете, оказался недлинен… а рай все длится и длится, и я каждого из вас расцеловать готов!</p><p class="p1">Ловецкий гордо улыбался, словно освобождение Оскольцева было его личной заслугой — а главное, будто и сам Оскольцев оказался так мил именно благодаря ему, Ловецкому; в самом деле, появление этого узника, не устававшего восхищаться вновь дарованным ему миром, сообщило празднеству особую умилительность.</p><p class="p1">— Выпейте, Виктор Александрыч! — предложил Краминов. — Господа, налейте же ему! Ведь вы, почитай, все эти полгода хмельного в рот не брали?</p><p class="p1">— Я у отца уже немножко приложился, — застенчиво признался Оскольцев. — Он берег к моему возвращению, ждал… надеялся… Ах, господа! — Он всхлипнул было, но сдержался.</p><p class="p1">«Оскольцев, Оскольцев… что-то я о нем слышал, — думал Ять. — Не помню от кого… может, от Маринелли? В Гурзуфе, что ли? Нет, раньше… Ничего не помню. Вот что значит мало сахару. Да начнут они когда-нибудь закусывать или нет?»</p><p class="p1">— Вот теперь — слово молодым, — громогласно распорядился Извольский. — Благоволите налить, друзья!</p><p class="p1">— Дорогие товарищи, — сказал Барцев в вечной своей стеснительной и несколько косноязычной манере; такое обращение сегодня простили бы ему одному. — Я не шучу и никого не хочу обидеть, потому что все мы товарищи… по искусству, по нашему ремеслу и по вечной нашей способности спорить о правописании… а не, допустим, о ценах на еду. Я хочу сказать, что я вас всех очень люблю, да… просто очень… и прошу у вас прощения, в чем виноват. А я виноват, потому что вот устроил тут… непредвиденный вечер. Я вас всех еще раз благодарю, что вы пришли, и еще раз прошу меня простить, и, в общем, если бы вы не захотели, то было бы очень…</p><p class="p1">— Горько, — закончил за него Льговский.</p><p class="p1">— Ну да, — беспомощно засмеялся Барцев и развел руками. Ашхарумова встала на цыпочки и сама поцеловала его.</p><p class="p1">В этот миг от прилукинской дачи донеслись страстные цыганские напевы: студия Марьям-нагой, пританцовывая, голося и гремя бубнами, начинала свое представление. Концерт в честь новобрачных был задуман с размахом: свадьба архаистки и новатора была серьезным событием для литературного Петрограда, весть о нем облетела все кружки. Молодежь была в восторге: в последний год в Петрограде почти не играли свадеб, сыскался отменный повод повеселиться, и Ашхарумова заслужила умиленную благодарность подруг.</p><p class="p1">Одновременно с бледными и светловолосыми, но чрезвычайно жизнерадостными цыганами Марьям-нагой со стороны набережной приближалась другая компания — там тоже звенели гитары, но пелось нечто иное. Мотив был знакомый, романсовый, но слова, сколько мог различить Ять, представляли собою фантастическую контаминацию нескольких шедевров сразу.</p><div class="poem">
<div class="stanza">
<p class="v">— Выхожу… один я-, на доро-о-огу! —</p>
</div>
</div><p class="p1">высоким, ломким голосом выводил бледный юноша лет шестнадцати, терзая гитару с огромным коричневым бантом.</p><div class="poem">
<div class="stanza">
<p class="v">Под луной… кремнистый путь блестит!</p>
<p class="v">Ночь тиха, пустыня внемлет Бо-о-огу,</p>
<p class="v">И звезда… с звездою говорит!</p>
<p class="v">Выхожу я в путь, открытый взорам, —</p>
</div>
</div><p class="p1">басом отвечал ему верзила, в котором Ять издали узнал Чашкина.</p><div class="poem">
<div class="stanza">
<p class="v">Ветер гнет упругие кусты.</p>
<p class="v">Битый камень лег по косого-о-орам,</p>
<p class="v">Желтой глины скудные пласты!</p>
<p class="v">— Вот иду-у я по большой доро-оге, —</p>
</div>
</div><p class="p1">подхватил эстафету художник Назарьян, обладатель хриплого баритона, с которым только и было выходить на большую дорогу.</p><div class="poem">
<div class="stanza">
<p class="v">— В тихом свете гаснущего дня! —</p>
</div>
</div><p class="p1">радостно поддержал хор.</p><div class="poem">
<div class="stanza">
<p class="v">— Тяжело мне, замирают но-оги!</p>
<p class="v">Ангел мой, ты видишь ли меня?!</p>
<p class="v">Я и сам ведь не такой, не пре-ежний,</p>
<p class="v">Недоступный, гордый, чистый, злой.</p>
<p class="v">Я смотрю мрачней и безнаде-е-ежней</p>
<p class="v">На простой! И скучный! Путь земно-о-ой!</p>
<p class="v">Акоповские цыганки затрясли плечами.</p>
<p class="v">Буду ждать — в погоду, в непого-о-оду!</p>
<p class="v">Не дождусь — с баштана разочтусь! —</p>
<p class="v">мрачно подвела итог Лика Гликберг.</p>
<p class="v">— Выйду к морю, брошу перстень в воду</p>
<p class="v">И косою черной удавлюсь! —</p>
</div>
</div><p class="p1">грянула вся команда Стечина. Сам он, автор центона, скромно шел позади.</p><p class="p1">Барцев хохотал. Стечин торжественно преподнес скульптурную группу — последний шедевр Назарьяна, раскрашенная глина: тоненькая Ашхарумова под руку с Бариевым, исполненным в виде шара с бородой и носом-бульбочкой. Назарьяна хотели качать, Барцев долго тискал его в объятиях. Настал черед подношений: все они были скромны и почти жалки. Алексеев извлек из своих запасов прижизненного Фета, Горбунов преподнес чернильницу «для будущих трудов», Прошляков приволок «Подарок молодым хозяйкам» — для чтения вслух в обеденное время; на некоторое время церемония дарения прервалась — все наперебой зачитывали рецепты: «Господа, вообразите, седло дикой козы с каперсами, под соусом из базилика… Мне, мне козы! Суп из спаржи с добавлением сливок… Отжимки отдать людям. Мы люди, Прошляков, отдавай отжимки! Господа, кто ел когда-нибудь суфле из омара? Барцев, я буду брать у вас эту книгу раз в неделю для праздничного обеда!»</p><p class="p1">— Удивительно милая молодежь, — тихо и умиленно сказал Комаров-Пемза, подойдя к Ятю. — Эти не пропали: они умеют веселиться, умеют сделать себе праздник из ничего…</p><p class="p1">— Да, да! — горячо закивал Ять. — А из ваших будет кто-нибудь?</p><p class="p1">— Если родители выпустят, — вздохнул Пемза. — Поздно, патрули… Но они сказали, что все равно вырвутся.</p><p class="p1">И точно — в разгар парада приношений прибежал, запыхавшись, Коля Соловцов, а следом за ним и небольшая компания во главе с Игорем и Верой Головиными. Они принесли кукол, наряженных женихом и невестой. Куклы были фарфоровые, с волосами и закрывающимися глазами. Последней, уже в двенадцатом часу, появилась Зайка — маленькая, встрепанная, растерянно хлопающая глазами: «Ой, я совсем, совсем опоздала? Машенька, милая, поздравляю! Поздравляю, Паша! — Она мокро поцеловала обоих в щеки. — Все боялась, не успею. Вот!» — и развернула только что довязанную кофточку белой козьей шерсти, сберегаемой в семье еще с четырнадцатого года, когда вечно хворавшую Зайку возили на Кавказ. Там и купили эту шерсть, но никто в семье вязать не умел — выучилась в последний год одна Зайка; она всерьез надеялась этим зарабатывать. Барцев поднял ее на руки и закружил.</p><p class="p1">— Паша, — тихо спросила она, когда рыжий богатырь бережно поставил ее наземлю, — а Кораблик не пришел?</p><p class="p1">Так ласково могла называть Корабельникова только она.</p><p class="p1">— Сашка уперся, — сухо ответил Барцев.</p><p class="p1">— Ой, как же ему сейчас, наверное, одному… Он ведь там, да? И слышит все ваше веселье? На набережной и то слышно. Паш, может, сбегать, позвать его?</p><p class="p1">— Не надо, Зайка, — очень серьезно попросил Барцев.</p><p class="p1">— Ну хорошо, хорошо… Она отошла.</p><p class="empty-line"/><p class="p1">Ять все основательней нагружался, чокаясь в основном с Грэмом; Грэм молчал, угрюмо поглядывая то на Барцева с Ащхарумовой, то на компанию Льговского.</p><p class="p1">— Вам грустно? — спросил Ять.</p><p class="p1">— Когда Грэму грустно, он уходит сюда, — медленно проговорил тот, указывая себе на лоб длинным желтым пальцем. — Смею вас уверить, там — хорошо. Хорошо, — повторил он еще раз и вдруг с полной кружкой решительно вышел на середину моста. — Я скажу, если позволите, — произнес он пьяным, но твердым голосом, разве, что чуть громче обычного, как говорят с глухими.</p></span>
