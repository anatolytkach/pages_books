<p class="p">ПРОЛОГ</p>
</div><p class="p1">Реформа русской орфографии 1917–1918 годов проходила в три этапа. Наметилась она почти сразу после петровской (1709) переделки алфавита и вызывалась соображениями, какими с начала времен руководствуются все упростители. Прежде всего из алфавита следовало изъять буквы, у которых не осталось звукового аналога: после того как Петр бестрепетно выкинул из азбуки омегу и пси (введя «я» и «э»), на очереди двести лет стояли ер и ять.</p><p class="p1">Ять до четырнадцатого века (когда в летописях стали встречаться первые ошибки по его употреблению) обозначал нечто среднее между «е» и «и», но фонетической роли давно лишился. Без ера в своих писаниях уже в начале XIX века обходились многие вольнодумцы. Перечисляя в «Бесах» темы русского спора при начале очередной оттепели, Достоевский упоминает «уничтожение цензуры и буквы ъ, заменение русских букв латинскими, вчерашнюю ссылку такого-то, какой-то скандал в Пассаже, полезность раздробления России по народностям с вольною федеративною связью, уничтожение армии и флота, восстановление Польши по Днепр, крестьянскую реформу, уничтожение наследства, семейства, детей и священников, права женщины…».</p><p class="empty-line"/><p class="p1">Легко видеть, что из этого перечня со временем осуществилось почти все, кроме уничтожения детей, хотя и в этом направлении предпринимались определенные усилия. Алданов в «Истоках», опираясь на цитированный фрагмент, заставляет Достоевского предсказывать, что отменят букву ять — и все пойдет к черту. Ситуация осложнялась отсутствием смысловых правил к употреблению ятя.</p><p class="p1">Подготовительный этап реформы начался в 1899 году, когда собралась Первая орфографическая комиссия при Московском университете. Вторая комиссия функционировала в 1901 году, тоже при университете, но уже Казанском; почти одновременно с ней возникла третья, при Новороссийском. Предложения комиссий широко обсуждались учеными и учителями (главным аргументом в пользу реформы правописания была именно трудность и кажущаяся бессмысленность усвоения русской орфографии, ее недоступность простонародью, низкая успеваемость гимназистов). В 1904 году подкомиссией Академии наук под председательством Ф.Фортунатова было разработано «Предварительное сообщение» о готовящейся реформе.</p><p class="p1">Академию наук тогда возглавлял либеральный великий князь Константин Романов, более известный как слабый поэт и драматург K.P. Он лично стал во главе комиссии по реформе правописания, которую собрал впервые в достопамятный день 12 апреля (ст. ст.). На следующий день собралась подкомиссия, сформированная для разработки конкретных предложений по реформе. Ее центром были А.Шахматов и Ф.Фортунатов — крупнейшие специалисты по истории русского языка. Как всякие историки, они обращали внимание прежде всего на тенденцию: письменная речь во всем мире год от года теснее смыкается с устной, лишние буквы и тяжеловесные обороты отпадают, а торжествует здоровая простота.</p><p class="p1">Предложения были радикальны. Первое: никакого ятя. Второе: долой ер, причем не только после согласной в — конце слова, но и после приставки, где вполне можно обходиться мягким знаком («въехал», «съел»). Третье: в словах типа «рожь», «мышь», «точь-в-точь» — а равно и в инфинитивах «лечь», «мочь», «влечь» — мягкий знак давно не нужен: «ч» и «щ» и так всегда мягкие, а что мышь женского рода — знает, слава Богу, вся мыслящая Россия. Безударные окончания прилагательных в родительном падеже единственного числа («-аго», «-яго») должны приблизиться к ударным: рослОго, лишнЕго. Унифицируются окончания прилагательных во множественном числе (прежде, согласно правилам, в женском роде писалось «-ия», «-ыя»: веселыя ежихи, но веселые ежи). Наконец, приставка «без» перед глухой согласной должна писаться как слышится («бесполезный», «беспомощный»). И, конечно, везде, где после шипящих под ударением слышится «о», следует так и писать: шопот жолтого чорта.</p><p class="p1">Авторы реформы были поражены силой сопротивления, с которым столкнулась подкомиссия после публикации своих предложений; заметим, что в нее входили авторитетнейшие люди — в частности, Бодуэн де Куртенэ и несколько представителей духовенства. Первым резко высказался Александр Суворин, издатель и редактор «Нового времени». Следом некий Тиляров-Платонов оперативно написал целую брошюру, в которой перегнул палку уже в другую сторону: он так испугался новшеств, что предложил восстановить оба юса — большой и малый, — исчезнувшие еще в XV веке. Свое предложение он мотивировал тем, что юсы делают русский язык более усвояемым для поляков и белорусов. Поляков и белорусов никто не спросил. Громче всех против реформы возражал обер-прокурор Синода Победоносцев. Неожиданно подключился враг условностей Толстой: десятки русских газет перепечатали интервью, в котором он неубедительно, но горячо излагал аргументы против нового правописания. Главный заключался в том, что он привык читать быстро, ухватывая взглядом все слово, а тут меняется этого слова портрет, его знак. Он сам понимал, что аргумент слабый: привыкнуть недолго. Во время беседы с корреспондентом подошел его сын Сергей, добавивший собственные, тоже не слишком рациональные соображения, — Толстой обрадованно поддержал: «Да, прекрасно!» Комиссия, смущенная размахом противодействия, отступила. Ей напомнили, что в том же 1904 году министр внутренних дел Сипягин издал специальный циркуляр, в котором запрещал издание книг без еров, приравняв их к революционной пропаганде. Как знать: если бы министерство внутренних дел в 1904 году уделяло меньше внимания орфографии, избрав иные приоритеты, — судьба русского правописания впоследствии могла быть иной.</p><p class="p1">В 1910-е годы Шахматова занимали сугубо научные проблемы, Фортунатов умер перед Первой мировой войной, — но реформа правописания, уйдя с повестки дня, оставалась мечтой гимназистов и приобрела в их сознании неизбежную революционную окраску. В канун революции, 10 февраля 1917 года, когда в столице собрался Первый Всероссийский съезд учителей русского языка, первым обсуждавшимся вопросом оказалась, естественно, орфография. Многие гимназисты вспоминают, что учителя в это время перед ними заискивали. Съезд единогласно проголосовал за реформу, но ввиду бурных событий конца февраля, когда по всему городу впервые за двести лет его существования выстроились хлебные очереди, реализация ее снова отодвинулась на неопределенное время.</p><p class="p1">Второй этап реформы русской орфографии начался 23 декабря 1917 года. Декрет за подписью Луначарского отменял «лишние» буквы (ять, фиту, ижицу, и десятеричное), оставляя за ером только разделительные функции — видимо, по причине актуальности любых разделений. Луначарского и в большевистской верхушке всерьез воспринимали немногие, так что все газеты, кроме большевистских, продолжали печататься по-старому. «Никто даже ухом не повел», — обиженно вспоминал наркомпрос. После этого он пришел к выводу (не такому уж абсурдному), что половинчатые меры в эпоху столь масштабных преобразований перестали восприниматься массовым сознанием. 5 января 1918 года появился декрет Совнаркома, упразднявший орфографию как таковую по причине ее дискриминационной сущности. Отмена правил правописания и пунктуации воспринималась не только народом, но даже радикальной частью интеллигенции как уничтожение барьеров, искусственно воздвигнутых на пути «низового элемента» к просвещению. Отстаивание правописания представлялось радикалам «попыткой протащить угнетение под видом правил» («Правда», 9 января 1918). Яростная дискуссия по этому формальному, казалось бы, поводу, особенно трогательная в голодном и осажденном городе, привела к образованию 12 января 1918 года Елагинской коммуны — одного из самых причудливых явлений русской жизни даже на фоне тогдашней экзотики.</p><p class="p1">История Елагинской коммуны, изучена слабо: после событий в ночь на 15 мая 1918 года о ней предпочитали не вспоминать как сторонники, так и противники. Советская историография вовсе обходила ее стороной, эмигрантские круги мало что знали, а поскольку из самой этой группы почти никто не уцелел, достоверных источников не осталось. Краткое и половинчатое мемуарное свидетельство в белградском сборнике 1927 года «Катакомбы», вышедшем в количестве трехсот экземпляров, да неопубликованная переписка историка Льва Покровского с Марией Ашхарумовой — все, чем мы располагаем. Архивные разыскания позволили присоединить к скудному списку лишь несколько мемуарных очерков и косвенных упоминаний — подневольных, как бы сквозь зубы. Отголоски елагинской истории можно найти в романе «серапиона» Всеволода Иванова «Кремль», написанном в начале тридцатых, но опубликованном только в 1990 году. Важные штрихи к смутной картине добавляет неоконченный фантастический роман беллетриста Ростислава Грэма «Желтый город», сохранившийся в его гурзуфском архиве.</p><p class="p1">15 мая 1918 года распоряжением ЦИК «Об упорядочении» начался третий этап реформы русской орфографии, совпавший с первой волной террора и призванный обслужить ее на идеологическом уровне. Такой период неизбежен в развитии любой революции, начинающей с отмены всех условностей и заканчивающей воцарением одной, самой иезуитской и нелепой, а потому наиболее соответствующей образу абсолютной власти. Этот период закончился в октябре, когда после принудительного изъятия из типографий всех еров, ятей, фит и ижиц русская орфография приобрела нынешний вид. Отдельные попытки ее реформирования в конце пятидесятых — начале шестидесятых годов захлебнулись на стадии печатного обсуждения; хочется верить, что захлебнутся и нынешние.</p><p class="p1">Автор благодарит Вадима Эрлихмана (Москва), Льва Мочалова (Санкт-Петербург) и Андрея Давыдова (Гурзуф) за неоценимую помощь в работе над книгой, которую посвящает памяти беллетриста Грэма (Кремнева). Именно Грэм должен был написать этот роман — и непременно закончил бы его, если бы не у мер от истощения в оккупированной Ялте 26 января 1942 года.</p></span>
