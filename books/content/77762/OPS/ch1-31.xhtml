<span><p class="p1">Зачем буквы? Зачем вообще писать? Я прозревшая буква, постигшая наконец свою подлую роль — прикрывать вопль, обозначать звук удара, подло маскировать хруст костей; я буква, проклявшая азбуку, весь ее подлый порядок, прозванный алфавитным, раз и навсегда отведший место каждой из нас. И на пятый день его бред принял форму прощания с буквами: оно длилось три дня. Клингенмайер готовил отвар, слушал его бред и молчал: он никогда еще не слышал такого странного монолога и не чаял, что Ять выкарабкается.</p><p class="p1">Прощай, аз, я никогда не любил тебя. Я никогда не любил тебя уже за то, что с тебя все начинается: ааааа! — вот первый звук, с которым мы приходим сюда, крик боли, крик протеста, которому все равно никто не поверит. Акушерка от души радуется младенческому воплю, ибо этот вопль есть признак жизни; но этот же крик, обезумев от страха, издает падающий с крыши, со скалы — крик последнего напоминания «Аз есмь», но кому же какое дело. Был аз и нет — сюжет, к которому сводятся все прочие. И еще ты не нравился мне потому, что я слышал в тебе нечто ползучее, змеиное, что-то с раздвоенным жалом, с затаенной, звенящей злобой в полузакрытых изумрудных глазах: аззз… Прощай, аз, я не любил тебя, ибо все, начинающееся тобой, обмануло меня. Я не любил вас, буки и веди, неразлучная пара — Бог весть, отчего я вас объединил, но оба вы казались мне персонажами страшной, языческой русской сказки. Буки и веди, черный и белый охранники гурзуфской управы, Драйберг и Камышин, вечные русские двое из ларца: буки пугают, показывают буку, веди ухмыляются, словно ведая нечто сверхважное. Признайтесь, веди, вы ничего не знаете; признайтесь, буки, вы ничего не можете. Прощайте, буки и веди, прощайте, вехи и веды, веды, вини, вици… В «Вене» две девицы. Кто это написал? Измайлов, кажется. Прощай и ты, Измайлов.</p><p class="p1">Глаголь, глаголь — о, как я не любил тебя! Виселица, длинношеий гусь, мрачная, длинная, прямая фигура, половина распятия, указующий перст — указующий на что? — на смерть, естественно: иди туда! Но зачем ты стараешься: я и так туда иду, и какое счастье, что я там тебя не увижу… За одного только Грэма я простил бы тебя — за мечтателя Грэма, такого же длинного и узкого, как ты.</p><p class="p1">Добро; дошла очередь и до добра. Есть ли на свете что-нибудь, от чего я вытерпел больше? Ненавижу тебя, самозваное наглое добро, ненавижу тебя, самодовольство, воплощенное высокомерие, общественное служение, публичную благотворительность! А, вот и ваша очередь, живете и мыслете, — вам только кажется, что вы живете и мыслите; и как же вы ошибаетесь, бедные мои! Бежать из этого алфавита. Я не любил в нем даже своих, ненужных: ни фиту, ни ижицу. Мне никогда не нравились свои, но беда в том, что еще меньше нравились чужие. Мне не нравилась сознательная, гордая и вызывающая обреченность этих и гордая, наглая победительность тех. А в общем, я не любил буквы. Я любил чистые листы. Что делать, я вытеснен из этой азбуки. Вы-то все останетесь, но с вами случится худшее. Вам никто не будет верить, вас никто не будет принимать всерьез, и все, что будет написано вами, не будет уже иметь никакого смысла. И потому, в конце концов, мне еще повезло: я ухожу, не успев обесцениться. Из жизни исчезает то, что не образует звука. Я так живо, так ясно слышу обозначаемый мною пронзительный звук, звук альмекской флейты! Но больше его не услышит никто и никогда.</p><p class="p1">Иногда он принимался бунтовать. Да, убили, убили всех, — но чем виноват я? Неужели мне следовало разделить с ними смерть, как нехотя и напрасно я делил с ними жизнь? Ведь я не чувствую ни малейшего родства с ними, я не разделяю их взглядов, я чувствую мир тысячекратно тоньше, чем они, — кто гнал меня умирать, почему я должен непременно подтвердить свое право на жизнь своей смертью? Почему здесь правы только мертвые? Почему любой живой тут — предатель? Но тут к нему пришла Таня.</p><p class="subtitle">27</p><p class="p1">Он не удивился. В этом алфавите должна была найтись буква Таня. Если есть буква Ять — должна быть и буква Таня, как же без нее. Она вошла из дождливого июньского дня, вся в жемчуге дождя, в жемчужно-сером плаще, присела к нему на кровать, положила на лоб холодную руку и заплакала, но заплакала легко.</p><p class="p1">— Вот и живой, вот и слава тебе, Господи, — приговаривала она сквозь слезы и смотрела на его ввалившиеся щеки, отросшие усы и бритую голову.</p><p class="p1">— Как ты… откуда ты? — еле выговорил он.</p><p class="p1">— Я всегда, где ты; видишь, я и сейчас с тобой. Ты хотел сбежать, да я догнала.</p><p class="p1">— Ох, Таня, не будем сейчас спорить, кто сбежал… В дверь просунулась голова Клингенмайера:</p><p class="p1">— Ять, что вы стонете? Воды?</p><p class="p1">— Нет, нет, у меня сейчас Таня..</p><p class="p1">— Да уж я знаю, — хитро ответил Клингенмайер и втянулся за дверь. Вероятно, он тоже привиделся.</p><p class="p1">— Ять, Ять, — улыбаясь сквозь слезы, повторяла она — Этот Фридрих Иванович дивный, дивный… Если бы не он, я никогда не нашла бы тебя. И, конечно, Грэм. Зря ты не послушался его.</p><p class="p1">— Когда? Ах, да… Ты знаешь, Таня, ведь всех убили. Всех, всех!</p><p class="p1">— Не говори глупостей, несчастный. Как это может быть, чтобы убили всех? Никого не убили, все спокойно разошлись по домам, а ты заболел…</p><p class="p1">— Ах, не надо, я знаю, ты утешаешь меня. То есть какое — ты ведь теперь в Париже, и я сам утешаю себя…</p><p class="p1">— Какой Париж? Конечно, я не поехала с Зуевым. Неужели ты мог усомниться в этом? Маринелли все устроил, я уехала в Симферополь, но тебя уже нигде не было… Я только что вернулась и сразу нашла тебя. Разве нам можно друг без друга? Мы всегда вместе…</p><p class="p1">— Нет, нет, не надо… Я уже снова привык без тебя. И я знаю, что так честнее. Быть с тобой — значит быть с жизнью, а мне нельзя теперь быть с жизнью… Один раз я уже выбрал ее — и хуже этого предательства не могу вообразить. Проклятая кровь… а впрочем, и не в крови дело. Я нарочно переваливаю на предков, а ведь трусость была моя и подлость — моя… Но если ты пришла, значит, действительно конец, и, странно, я не боюсь. Все потому, что жар. Когда жар — не страшно. Если бы у меня всегда был жар!</p><p class="p1">— Ять, Ять! Ты все придумал, глупый, тебе привиделось, ты поправишься, и мы вместе пойдем на Елагин…</p><p class="p1">— Никогда, о, никогда. Я никогда больше не пойду на Елагин. Разве что после смерти слетаю туда ненадолго, для последнего прощания, — чтобы еще раз проклясть спасшую меня деревянную будку.</p><p class="p1">— Ты бредишь, я ничего не понимаю! — Она смотрела жалобно и растерянно. — Почему ты гонишь меня, Ять? Разве со мной тебе не было хорошо, так хорошо, как и должно быть всем в мире? Ведь и Бог сказал, что это хорошо! Разве со мной ты не благословлял мир и Бога?</p><p class="p1">— Благословлял, Таня, — с трудом выговорил Ять. — Но в том-то и ужас, что, благословляя Бога, я был дальше от него, чем когда-либо. Сын разошелся с отцом, Таня, сын никогда не найдет отца…</p><p class="p1">— Ты бредишь, — повторила она. — Но ты выздоровеешь, выздоровеешь… И мы увидимся, Ять, клянусь тебе, я еще приду…</p><p class="p1">— Не надо, Таня. Ты жизнь, а любить жизнь — последнее дело. Прощай, Таня.</p><p class="p1">Он не помнил, как она вышла, и на несколько часов провалился в забытье; когда очнулся, была уже ночь, и Клингенмайер отпаивал его кислым мексиканским чаем.</p><p class="p1">— Кризис как будто миновал, — говорил он важно, — и теперь я уж не сомневаюсь — вы по эту сторону.</p><p class="p1">— То-то и жаль. Скажите, приходила она?</p><p class="p1">— Даже если она за вами и приходила, — по-своему понял его Клингенмайер, — то на этот раз ушла без добычи. Как говорится, жизнь опять победила смерть неизвестным науке способом! Впрочем, наши травы и соли тоже кое-чего стоят, и этот волшебный чай… Пейте волшебный чай! Он так и не узнал никогда, приходила она или нет.</p><p class="subtitle">28</p><p class="p1">И тем не менее, словно действительно сама жизнь пришла к нему, чтобы против его воли вытащить с того света, — с июля он начал поправляться. Ять понимал теперь, что такое настоящее истощение и подлинная потеря рассудка. Он смутно помнил последний месяц перед тем, как слечь, — только чернело огромное пятно в памяти, и он сам предпочитал до поры не трогать его. Милосердный Клингенмайер упорно прерывал любые разговоры на эту тему: не знаю, помилуйте, о чем вы? Ять читал газеты — и не находил в них ничего; да и газеты были такие, что читать их он почти не мог. «Путь» закрыли, «Речь» не возобновляли, «Знамя труда» уничтожили после таинственных событий в Кронштадте, о которых он знал мало — да и никто не знал достоверно. Собственно, он и не жил в то холодное лето. Жило его тело, словно радовавшееся тому, что разум спит. Оно могло теперь вдоволь наслаждаться скупым теплом, лиственным шумом, чахлой зеленью, каждым куском черного хлеба с вкраплениями жмыха, — и если прежде солнце, еда, запах мокрой пыли будили его мысль и питали ее, то теперь, напротив, все поспешно восстанавливаемые силы уходили только на то, чтобы не помнить, не думать, замкнуть слух.</p><p class="p1">Теперь он вглядывался в дома, в узор ветвей, трещины коры, в блеклые городские левкои, в медленно разрушающуюся Петроградскую сторону, в ржавые трамваи, так и стоявшие без движения в своих тупиках; люди редко занимали его. Он ходил по городу, как тень, и чувствовал себя почти незаметным. И на него в самом деле никто не смотрел, а кто замечал — принимал за солдата. Едва отросшие волосы, обвисшие усы, черное пальто, явно слишком широкое для него, словно только что по возвращении с фронта купленное на Сенном, а то и снятое с позднего прохожего, — так; выглядели многие в Петрограде восемнадцатого года; и его не трогали потому, что все самое главное с ним было уже сделано. Так он чувствовал. Что-то, составлявшее собственно Ятя, что-то, отличавшее его от прочих и делавшее повсюду изгоем, во время болезни умерло. Есть одно, что в ней скончалось безвозвратно. Эти строчки он помнил, но о чем там речь — толком не понимал.</p><p class="p1">Дело было еще и в том, что он давно не писал, а сознавал себя, только когда исчезал мир вокруг и оставалось лишь его сознание, ничем не стесненное, хранящее в себе память обо всем, что было и будет; а быть может, это и не было его умом, ограниченным и робким, а неким вселенским разумом, приобщение к которому всякий раз наполняло его силой и счастьем. Но теперь писать было незачем, — а в самой темной глубине рассудка жила уверенность в том, что писать ему теперь почему-то нельзя, он лишился этого права и должен его заслужить заново.</p><p class="p1">Как все люди ограниченного ума, он сделался в эти летние месяцы необыкновенно хитер; эта хитрость подсказала ему, что надо пойти в свой прежний дом и попытаться устроиться на жительство, — теперь, когда что-то главное погибло в нем или по крайней мере затаилось, его могли и принять. И темная, подспудная догадка его не подвела: товарища Матухина сместили; Матухин поселил в третью квартиру толпу своей родни, без всяких оснований уплотнив хозяйку скромного притона мадам Чальскую. К Чальской хаживали не только матросы, но и кое-какие совслужащие и даже первый заместитель руководителя секретариата Смольного. Обо всем этом Ять узнал со слов дворничихи, вселившись в свою квартиру и поделив бывший кабинет с одиноким столяром. В самом деле, стеснять Клингенмайера он не имел больше никакого права — тот и так выхаживал его два месяца, как ребенка. Сам собой решился и вопрос о работе — в городе возникло бесчисленное количество канцелярий; Мироходов прислал за Ятем младшую дочь (слава Богу, он знал его адрес) и пристроил его в странную контору по учету свободного жилья. Таких контор возникало и лопалось бессчетное количество, и каждая умудрялась убедить Апфельбаума или его многочисленных замов в своей насущной необходимости; одна учитывала всех бродячих собак города, другая — бездомных питерцев, третья — больных. У истоков всех этих контор стояли безработные петроградские интеллигенты, торговавшие единственным своим товаром — умением пустить пыль в глаза, имитировать деятельность на пустом месте и составить наукообразный документ даже о состоянии городских мостовых.</p><p class="p1">В сентябре приват-доцент Зудов прислал к нему сестру милосердия с запиской, в которой содержалась просьба явиться для важного разговора, — речь идет не о здоровье матери, добавлял заботливый Зудов, но возможны некоторые перемены в судьбе Лазаревской больницы. Ять пошел, впервые с момента выздоровления всерьез занервничав; Зудов у себя в кабинете сообщил ему, что гельсингфорсская клиника, в благодарность за независимость, дарованную чухонцам, готова принять у себя несколько десятков лазаревских больных, да и ему обещана ординатура. Поскольку в Петрограде с продовольствием в любой момент может стать хуже, да и война подступает, целесообразнее перевезти больных туда, где наверняка сытнее и спокойнее; требовалось письменное согласие Ятя как единственного родственника, и он после недолгого колебания это согласие дал. А уже через неделю он на Финляндском вокзале провожал странный поезд, отправлявшийся в Гельсингфорс.</p><p class="p1">Это был единственный поезд, вышедший из Петрограда в Гельсингфорс осенью восемнадцатого года: дачный, с сидячими местами — желтыми деревянными скамейками, изрезанными вдоль и поперек: кто бранился, кто оставлял по себе единственную память, начертав имя, — но имена звучали как ругательства, а ругательства выглядели как имена. Кучка сумасшедших под дождем пугливо жалась на перроне, толстуху-жену провожал иссохший до прозрачности муж, который все встречался Ятю в коридорах, прочие уезжали без провожающих. Почти никто не понимал, зачем везут, куда везут, — только одна старуха вскрикивала по временам: «Маменька! Маменька!» Эта понурая толпа, не чувствовавшая перемены своей участи и потому не сопротивлявшаяся ей, что-то напомнила Ятю — но душа тотчас отдернулась, словно от ожога. Мать встретила Ятя равнодушно, спросила, как дела в «Глашатае», и лишь перед тем, как войти в вагон, обняла с неожиданной силой.</p><p class="p1">— Витечка, — прошептала она.</p><p class="p1">Но и после этого, проведя бессонную ночь, мучительно пытаясь вспомнить, в чем причина его нынешнего равнодушия и этой ледяной заторможенности, — Ять не приблизился к разгадке. Память вернулась к нему странным образом, в ноябре, когда отгремела и отгуляла демонстрация по случаю первой годовщины революции. Смотреть шествие на Невском он не пошел, а дворничихины дети рассказывали, что какие-то танцоры кружились, кружились — ажно голова кругом, — а потом еще какие-то плясали почти голыми, один срам, но завлекательно. Даром что холодрыга. Ять любил дворничихиных детей, рассказывал им о кораблях, о путешествиях — он кое-что помнил, да многое и перечитал, не без опаски беря книги из собственной библиотеки, словно и они давно были чужими. Эти-то дворничихины дети принесли однажды с улицы голодного котенка — Ять налил ему в блюдце кипятку, пробовал накормить хлебом, но тут явился столяр и заорал, что котов не потерпит, утопит в ведре сию же минуту, только котов ему и не хватало. Он и так непрерывно притеснял Ятя, отвратительно храпел, хамил, однако именно скандал из-за котенка оказался последней каплей: Ять, вместе с памятью утративший и всю интеллигентскую робость, взял столяра за грудки и пригрозил как следует отмутузить. Тот не поверил, и обещание пришлось сдержать: столяр оказался хлипкий, истощенный, а Ять, хоть и не силач, все-таки до тридцати трех лет питался прилично. С этого дня столяр притих, и через три дня котенок подох сам, без постороннего вмешательства.</p><p class="p1">Отчего-то это крошечное горе, вполне ничтожное на фоне революционных бурь и утрат, произвело на Ятя впечатление необычайно тяжелое: даже убив в себе что-то, отличавшее его от других, он так и не превратился в человека, с которым можно жить. Это касалось всех — женщин, детей, котов; все происходило из-за него — и смехотворная, выдуманная вина (плохо кормил, плохо обогревал) разбудила большую, настоящую. Он так перепугался, что даже закурил в кухне — раньше курил у себя дома, где хотел, но теперь приходилось выходить на лестницу: новые жильцы обожали порядок. Он понял, что с самого начала помнил все, — только не называл вслух, не решался признать; и прежний ужас накатил на него с новой силой. Он сжал свою несчастную голову, пытаясь снова заглушить память, — но теперь заглушить ее не смог бы никакой тиф, ни жар, ни самая бездарная работа, ни многочасовые шатания по опустевшему Питеру. Он был Иуда, предатель, отправивший мать к чужим людям, за границу, куда ему самому никогда не будет ходу; упустивший любимую, отдавший свой дом захватчикам, без боя сдавший страну… До утра он не сомкнул глаз, а утром, под ледяным дождем отправившись на службу в тайном намерении истязать себя до последнего, узнал, что контора их разогнана, — словно, вспомнив все и вернувшись к себе прежнему, он снова выпал из жизни и лишился места. Впрочем, в Питере уже образовался кружок интеллигентской взаимопомощи; если бы эти люди знали, какая он мерзкая тварь, никто не подал бы ему не то что руки помощи, но и просто руки. И потому он заплакал, когда к нему явился Коля Стрелкин и предложил вместе с ним поработать в очередном призрачном комитете.</p><p class="p1">— Что вы, Ять… Ну что вы, право, — донельзя смутился Коленька.</p><p class="p1">— Ах, Коля, не знаете вы, что я такое. Вы чистый, славный, вы так ко мне добры незаслуженно… Я всю жизнь презирал людей, делающих добро, а сейчас удерживаюсь на свете их милостью. Ведь они погибли, все погибли из-за меня — Алексеев, Горбунов, Долгушов, Лытаский… все Общество любителей словесности, черт бы ее побрал!</p><p class="p1">— Да что вы, что вы, Ять! — повторял Коленька.</p><p class="p1">— Казарин… Борисов… Один Хмелев уцелел, потому что не пошел…</p><p class="p1">— Про Хмелева ничего не знаю, а Борисова давеча видел, — со всей уверенностью, на какую был способен, сказал Стрелкин. — Шел по Невскому с барышней, рассказывал что-то занимательное…</p><p class="p1">Ять с последней надеждой поднял на него глаза, но тут же понял, что Коля врет.</p><p class="p1">— Ладно, не берите греха на душу. Меня утешать бессмысленно.</p><p class="p1">Но как ни ужасна была жизнь, на которую он себя обрек, надо было доживать, домаиваться бледным бесом; он попробовал поискать Хмелева — но Хмелев уехал из города. Показаться на глаза Ираиде, жене Казарина, было ему невыносимо стыдно — однако он пошел и услышал, что она о муже никаких сведений с декабря семнадцатого года не имеет и иметь не хочет. Алексеев жил один — Ять несколько раз бывал у него; теперь там развешивали бесконечное белье какие-то очередные дворничихи, знать не знавшие о бывшем жильце. Раз только показалось Ятю, что он видит в дальнем конце Караванной сгорбленную фигуру Фельдмана — но догонять было далеко… да и с чего он взял, что это Фельдман?</p><p class="empty-line"/><p class="p1">То, что в исторической литературе получило впоследствии название красного террора и гражданской войны, было никак не борьбой за власть, но отчаянным самоистреблением страны, испробовавшей самый радикальный вариант спасения империи и разочаровавшейся в нем. И когда не осталось ни белых, ни красных, а только выжившие, — страна готова была начинать с нуля.</p><p class="p1">Не сказать, чтобы в этой новой стране вовсе не было темных. Они были, но затаились, снова выжидая своего часа. Это время наступило нескоро, но спустя семьдесят лет пришло и оно.</p><p class="empty-line"/><p class="p1">Ничего хуже наступившей зимы не было в жизни Ятя: он по-прежнему ютился приживалом в собственной квартире, а на службе состоял в комиссии по учету беспризорных детей; первый приют для них в Петрограде организовали в трехэтажном доме фабриканта Зотикова. Ять сидел в канцелярии и записывал данные привозимых патрулями детей, втайне надеясь увидеть Петечку, — но дети все были чужие, незнакомые. В них не было почти ничего человеческого, они жестоко издевались над слабейшими — но и слабейшие не менее жестоко издевались над новичками. Почти все они сразу сбегали. Скоро приют в зотиковском доме закрылся, но с Ятем за это время успело произойти нечто важное: он перестал себя обвинять и начал оправдывать.</p><p class="p1">Это с неизбежностью должно было произойти — когда вокруг слишком отвратительно, всегда начинаешь искать в себе единственного убежища. В чем его вина, в конце концов? Он никого не убил, не ограбил, не предал. Он только не вышел умирать, когда все умирали, — но, может, в этом и был знак чудесного спасения? Может, его сохранили для чего-то — не случайно же он побрел ночью прятать рукопись несчастного Борисоглебского? Может, все дело в рукописи (хранившейся теперь у Клингенмайера), а может, в самом Яте? Ведь его присутствие никого бы не остановило. В душе он понимал, что этим самооправданиям грош цена, — однако рана его заживала.</p><p class="p1">Но тайный всезнающий голос все шептал ему, что места здесь ему теперь нет — все будет напоминать о предательстве; он тут же принимался возражать — с чего это я должен был умирать за то, что мне стало ненавистно?! — и тот же голос шептал: ни за что другое умереть нельзя, ибо того, что мы любим, здесь нет. И потому мы обязаны умирать за ненавистное нам — потому, что иначе умрем просто так, ни за что, смертью крысы и таракана, смертью, недостойной человека. Чем яснее видел Ять этот выбор, тем омерзительней он ему казался, — и тем ясней становилось, что другого не бывает. Так мысль о гибели начала вытесняться из его сознания мыслью о побеге. Выпускали неохотно, но щель оставалась; в городе становилось все голоднее, арестовывали кого ни попадя (выпускали редко), доходили страшные слухи о взятии заложников, о зверствах провинциальной Чеки, о расстрелах сотни гимназисток за одного большевика, раненного эсеровской бомбой (все это было, разумеется, преувеличено, а небольшевистских газет не осталось — но многому стоило верить, Ять чувствовал это). Каждый день казалось, что хуже быть не может — но могло, и надеяться, что эта жизнь когда-нибудь войдет в колею, он уже был неспособен. Точней, ему даже несложно было себе представить эту колею — но от одной мысли о ней хотелось зажмуриться и затрясти головой. Он мог приспособиться ко многому, но и его возможности были небесконечны.</p><p class="p1">Как-то ближе к марту, когда дикие морозы начала февраля девятнадцатого сменились короткой оттепелью, он встретил на улице Корнейчука. Корнейчук, как всегда, преувеличенно ему обрадовался, долго тряс руку, вспоминал какие-то древние его публикации, которых сам Ять не помнил, — и было ясно, что и встреча, и необходимость бурно радоваться ему в тягость, а обязанность эту он взвалил на себя по тем же соображениям, по каким Трифонов таскал камни.</p><p class="p1">— Ну, а вы как? — спросил Ять, когда корнейчуковские восторги иссякли.</p><p class="p1">Корнейчук принялся перечислят!): сейчас он бежит с лекции о Слепцове, которую читал матросам, на лекцию о Панаевой, которую будет читать солдатам; вечером у него лекция перед работниками пищевого цеха. — именно так, пищевого цеха! «А послезавтра я должен быть на открытии памятника Белинскому. Специально Чарнолуский приезжает. Хотите, поговорим с ним, и он вам что-нибудь подберет?»</p><p class="p1">— Чарнолуский приезжает? — в задумчивости переспросил Ять. — Где, вы говорите, открывается этот памятник?</p><p class="p1">— На Широкой. Белинский там сроду не жил — почему решили именно там? Видимо, как раз поэтому… Я должен буду говорить о его роли в формировании Герцена — представляете? Не знаю, кто будет слушать… Хорошо, если два-три обывателя остановятся… Но Чарнолуский готовит митинг, будет оркестр…</p><p class="p1">— Да-да, спасибо, — кивнул Ять. — Я обязательно буду.</p><p class="empty-line"/><p class="p1">Двадцатого февраля Ять отпросился с очередной своей службы (заключавшейся в переводе статей из английской и немецкой прессы для перепечатки в городских газетах — разумеется, никто их не перепечатывал. Начальница — бровастая и усатая сорокалетняя Залкинд — отпустила его с неохотой. Ять поюлил, поумолял и в результате успел на Широкую только к половине первого, когда Чарнолуский уже заканчивал свою речь. Он изменился мало — все та же добродушная хомяковатость, многословие советского трибуна, фанфарная пышность трагикомических метафор. Гипсовый бюст Белинского был водружен в распиленной ограде сквера: тут, вероятно, тоже не обошлось без метафоры — неистовый Виссарион как бы проламывал собою решетку, устремляясь к торжеству натуральной школы, этой повивальной бабки большевизма. Ять попал как раз на повивальную бабку — Чарнолуский обожал подобные сравнения. На нем была черная шапочка пирожком и вполне приличное пальто с енотовым воротником. Чуть поодаль — видимо, охраняя его, — стоял красноармеец в недавно введенном обмундировании: серая шинель и ужасный островерхий суконный шлем — рыцарь, но в посконном, суконном варианте.</p><p class="p1">— И вот сегодня, — говорил Чарнолуский с любимым ораторским жестом — словно выхватывая что-то из воздуха и резко прижимая к груди, снова отбрасывая и снова прижимая, — мы кричим тебе из нашего прекрасного далека: неистовый Виссарион, слышишь ли ты нас? Но нет, он нас не слышит! Он умирает от чахотки, этого бича русской мысли, и взрывная сила его имени такова, что еще двадцать лет о нем упоминают не иначе как шепотом. Мы тянем к нему руки, чтобы пожать его холодеющую руку, и говорим: Белинский, мы слышим, мы видим тебя! Твое дело не пропало! Ликующий народ-победитель называет твое имя одним из первых в пантеоне своих друзей, и сегодня твои памятник осенит собою город, каменные плиты которого сдавливали твою больную грудь!</p><p class="p1">Ликующий народ-победитель, состоявший из двух девок недвусмысленной наружности, трех толстых баб и стайки мальчишек, с любопытством рассматривавших военный оркестр, жидко похлопал. Проходили и останавливались вислоусые мужчины с внешностью мастеровых, вглядывались в гипсовый памятник и двигались дальше.</p><p class="p1">— Недолго простоит, — заметил один другому.</p><p class="p1">— Так то ж временный. Потом медный поставят.</p><p class="p1">— От ведь делать нечего, — покачал головой первый и плюнул.</p><p class="p1">Чарнолуский отступил в сторону, оркестр сыграл «Марсельезу», к памятнику вышел Корнейчук. Ять подошел к наркому и робко потянул его за рукав. Красноармеец тут же шагнул к ним; Чарнолуский повернулся к Ятю — и отшатнулся, словно перед ним стоял призрак.</p><p class="p1">— Вы? — в ужасе спросил он, белея.</p><p class="p1">Значит, он знает, промелькнуло в голове Ятя; значит, он знает все — и считает меня погибшим вместе с ними.</p><p class="p1">— Я, Александр Владимирович. Если можно, я просил бы вас… о короткой встрече, минут десять всего…</p><p class="p1">— Конечно, конечно, пожалуйста! — Чарнолуский постепенно приходил в себя. — Умоляю вас, без этих церемоний. То, что у меня пост, — это же не отменяет старой дружбы… Но что с вами? От вас половина осталась…</p><p class="p1">— Четверть, — усмехнулся Ять. — Дело мое несложное, я много времени не отниму.</p><p class="p1">— Да, но когда же? Завтра вечером я отбываю в Москву…</p><p class="p1">— Завтра днем я пришел бы, куда вы скажете.</p><p class="p1">— Ах, досада, — завтра я как раз принимаю депутацию от совета петроградских учащихся… Но ничего, ничего. — Тут важно было подчеркнуть свою занятость и при этом не переусердствовать: Чарнолуский ничего не жалел для друзей и не уставал напоминать об этом. — Завтра в три… да, пожалуй, в три. Только там теперь таких церберов выставили — вам, пожалуй что, просто так и не пройти… Я пришлю за вами автомобиль со своим шофером. Нет, нет, не возражайте — так будет удобнее и вам, и мне. Что ж машине простаивать. Куда за вами приехать? Ять назвал адрес.</p><p class="p1">— Завтра в три, — повторил Чарнолуский, и Ять вежливо отошел. Он еще немного послушал Корнейчука, а потом незаметно ретировался.</p><p class="empty-line"/><p class="p1">Он не верил, что автомобиль будет прислан, — но в половине третьего под окнами его дома на Зелениной зарычал черный лаковый красавец «студебеккер», такой же, какой ровно год назад увозил его на Николаевский вокзал. Водитель живо напомнил ему товарища Викентия — очевидно, большевистское начальство питало слабость к этому типу сознательного рабочего, напоминавшего о том, для кого закрутилась вся эта чехарда с террором, отменой азбуки и расстрелами гимназисток До Смольного домчались лихо; водитель молчал, и Ять не лез к нему с расспросами. Два красноармейца в своих шишаках пропустили машину во двор, в самом Смольном на вахте лежал пропуск, выписанный по всем правилам. В качестве удостоверения личности Ять предъявил билет обозревателя несуществующей «Речи», однако новая большевистская бюрократия бумажкам не верила; красноармеец по внутренней связи потребовал товарища Чарнолуского, объяснил, что к нему на прием явился товарищ без надлежащего удостоверения, и получил разрешение товарища пропустить.</p><p class="p1">— Четвертый этаж, — с неудовольствием буркнул охранник. В Смольном, во время недолгих наездов в Петербург, Чарнолуский занимал теперь скромный кабинет, в котором прежде обитал товарищ Воронов. Ять сразу узнал это жалкое квадратное помещение; секретаршу Чарнолуский немедленно услал. Он гостеприимно встал навстречу Ятю, однако нельзя было не заметить, что в его движениях и интонациях сильно прибавилось сановитости.</p><p class="p1">— Добрый день, добрый день. Ну что, где вы? Отчего так давно не обращались? — Прежде, конечно, он сказал бы «не заходили».</p><p class="p1">— Александр Владимирович, — стараясь не смотреть на него, сказал Ять. — Я пришел просить вас… о содействии. Не можете ли вы мне устроить… я понимаю, конечно, что не имею никакого права вас обременять, и все-таки — нельзя ли похлопотать о моем отъезде?</p><p class="p1">— Куда вы хотите выехать? — с готовностью поинтересовался Чарнолуский.</p><p class="p1">— Я хотел бы выехать за границу, — отважился наконец Ять и только после этого поднял глаза на наркома; пришел черед Чарнолуского отворачиваться и избегать прямого взгляда.</p><p class="p1">— Но почему же так сразу? Я понимаю, конечно, — Чарнолуский ткнул в окно, — что там много чего делается… не так, как хотелось бы. Вам бы в Москву перебраться, честное слово. Тут товарищ Апфельбуам… несколько переусердствовал в закрытии газет и раскрытии заговоров. — Он и тут не мог освободиться от привычки каламбурить в манере провинциального фельетониста. — Но нельзя же за гримасами не замечать… сегодня уже вполне очевидно, что большая часть интеллигенции работает с нами, что рано или поздно, как вот Ильич сказал недавно, — он не мог не подчеркнуть знакомства с Ильичём, — всех Архимедов перетянем и землю сдвинем… Подождите, вы где служите сейчас? Мы подыщем вам нормальную работу, я лично… в аппарате… нуждаюсь в пишущих людях… Надо заново ставить на крыло газетное дело, нам нужны публицисты старого закала, но свободные от предубеждений, — вы подходите идеально!</p><p class="p1">Чарнолуский собрался уже развернуть перед Ятем сверкающие перспективы нового газетно-журнального дела, однако Ять прервал его:</p><p class="p1">— Я хочу вам сразу сказать, Александр Владимирович, что воспевать новую жизнь не смогу. Я ни в чем не обвиняю вас лично и всю вашу власть, Боже упаси… но для меня эта новая жизнь началась с убийства двух десятков моих друзей и единомышленников. Это было сделано, конечно, не по чьему-либо приказу, но безнаказанность убийцам гарантировала именно та самая новая жизнь. — Он знал теперь, что надо сказать все; трусости в этом разговоре он уже никогда себе не простил бы. Чарнолуский уставился на него в крайнем изумлении.</p><p class="p1">— Виноват, вы о каком убийстве говорите? Если Кронштадт, то ведь там не мы стрелять начали…</p><p class="p1">— Вы прекрасно знаете, что Кронштадт тут совершенно ни при чем. Я говорю об убийстве двадцати человек из Елагинской коммуны, последних, кто там оставался пятнадцатого мая.</p><p class="p1">— Виноват, виноват, — забормотал Чарнолуский. — Какое убийство? Какой Елагинской коммуны? Елагинская коммуна, сколько помню, благополучно разошлась после неудачной демонстрации и этой… как же ее… свадьбы! Мне об этой свадьбе в свое время Хламида все уши прожужжал — вот, мол, прообраз будущего союза всех писателей, единение во имя культуры… Вы кого имеете в виду?</p><p class="p1">— Я имею в виду Казарина, — раздельно произнес Ять. — Я имею в виду Борисова, Алексеева, Льговского, Извольского, Краминова, Ловецкого, Горбунова, Долгушова… всех, кто там оставался к утру. Пришли вооруженные люди и положили всех. В коммуне ждали этих людей, но не ждали, что они придут с ножами. Думали — будет обыкновенный разгон.</p><p class="p1">— Какой разгон?! О каком разгоне вы говорите?! — Чарнолуский вскочил и забегал по кабинету. — Казарин, по моим сведениям, умер в июле от воспаления желчных протоков, в Семеновской больнице… я лично деньги на памятник выделял, не помню только, где именно похоронили. Льговский на фронте, Борисов в Гельсингфорсе, о Краминове сведений не имею, но смею вас уверить, что он целехонек. И потом, почему разгон?! С чего вы вообще взяли? Я не понимаю, как с вашим умом, верить всем этим домыслам! Никто никого не собирался разгонять! А вы знаете, кто вообще писал все эти доносы на Елагинскую коммуну? — Он хитро подмигнул Ятю. — Это умора, ни за что не поверите. Я ведь регулярно получал сообщения от некоего доброжелателя. Прямые доносы: что там вертеп и чуть ли не штаб восстания. А потом, вообразите, в августе месяце умирает профессор Хмелев, и все оставшиеся от него бумаги — в том числе проект нового курса русского языка, над которым он все работал перед революцией, — попадают ко мне же, в комиссариат образования. Специально из Питера доставили. Смотрю — и что же вижу?! Знакомые все лица! Он даже почерка не менял! Вообразите, каков иезуитский расчет: нарочно на своих же доносил, чтобы мы из берегов вышли!</p><p class="p1">— А Оскольцев? — спросил ошарашенный Ять. — А Працкевич?</p><p class="p1">— Какой Оскольцев? — переспросил Чарнолуский. — В коммуне не было никакого Оскольцева…</p><p class="p1">— Верно, не было. Это товарищ министра иностранных дел во Временном правительстве, он пришел на свадьбу.</p><p class="p1">— Всех министров и товарищей министров освободили в мае.</p><p class="p1">— Я знаю, но его там зарезали на моих глазах!</p><p class="p1">— Опомнитесь, голубчик! — Чарнолуский комически воздел к потолку короткие ручки. — Кто его там зарезал? Борисов?</p><p class="p1">— Пришли вооруженные люди, — упрямо повторял Ять. — Никаких сомнений относительно их намерений быть не могло. Они пришли, чтобы убить всех.</p><p class="p1">— Ну, не знаю, кого они там убили, только Працкевича я никакого не знаю и об Оскольцеве ничего не слышал. А вот господин Ловецкий подвизается теперь в газете «Воля России», которую издают при штабе генерала Краснова. Мне экземпляр прислали, в Москве имеется. Покажу, коли заинтересуетесь. Даже псевдонима не поменял — Арбузьев и Арбузьев. Все-таки двуличие неистребимо, не находите?</p><p class="p1">— Как же он туда попал?</p><p class="p1">— Ну, как уж он туда попал — не знаю. Однако вы видите теперь, что все эти разговоры о разгоне, о гибели. Хмелев — так и вовсе прямой провокатор… Ну что, раздумали вы уезжать?</p><p class="p1">— Нет, — помолчав, ответил Ять. — Я видел своими глазами… я не сошел еще с ума. Но если даже убитых было только двое, а остальные каким-то чудом и уцелели, — не знаю, я все-таки привык верить вам, — места в новой России я себе не вижу. Писать мне не для кого и не о чем, и вы сами убедились, что я плохой союзник. Я трус. Я не понимаю, зачем вы брали власть, никогда не полюблю Маркса и никогда не научусь говорить с вашими новыми людьми. Александр Владимирович! Ей-Богу, отпустите меня!</p><p class="p1">— Я вижу, вас теперь не уговоришь, — Чарнолуский подобрался и заговорил жестче. — Если человек так себя накрутил, его никакие аргументы не возьмут. Что же, если не хотите ко мне в Москву — все-таки подумайте еще недельку, потом известите меня письмом о своем окончательном решении, — не беспокойтесь, ко мне вся почта попадает сразу, — и если не передумаете, я дам вашему делу ход. Полного успеха не обещаю, но слово замолвлю. Тогда явитесь в министерство иностранных дел Северной коммуны — это на Миллионной, — и вам будет оформлен заграничный паспорт. Вы куда хотите ехать?</p><p class="p1">— Мне все равно куда.</p><p class="p1">— Ну, решим. Нас признают через пень-колоду, пока проще всего выехать в Гельсингфорс, а уж через Финляндию попадете, куда надумаете. Но все-таки неделю я вас прошу поразмыслить… согласны?</p><p class="p1">— Согласен, — встал Ять. — Только, прошу вас, помните обещание.</p><p class="p1">— Я обещаний не забываю, — сухо сказал Чарнолуский, однако руку на прощание подал. Потом он выставил лихую закорючку на изнанке пропуска и демонстративно погрузился в чтение толстой папки, лежавшей у него на столе.</p><p class="p1">Ять вышел из кабинета. Домой он шел пешком, его пошатывало. Оттепельный воздух распирал легкие. Никогда еще такой, камень не падал с его души. Никто не погиб. Погибли Оскольцев и Працкевич, но все остальные живы, Казарин умер своей смертью, Хмелев доносил на елагинцев и провоцировал раскол… Он, Ять, ни в чем не был виноват! Это не отменяло и не извиняло, конечно, его позорной трусости. Но темные никого не убивали, а может, и темных не было?</p><p class="p1">Но если так, то с чего мне убегать? Может быть, мне действительно остаться? Он шел к себе на Петроградскую, влюбленными глазами оглядывая полупустые дома, забитые двери, размокшие ветки, редких прохожих, попадавшихся навстречу… Один из них остановился и внимательно поглядел ему в лицо. Ять выдержал этот взгляд, но радость его мгновенно погасла. Жить с этими людьми он не мог. Убили елагинских или не убили, а ехать надо. В конце концов, жизнь не кончена в тридцать шесть лет. Еще не поздно попробовать заново, эмигрировав в другую азбуку.</p><p class="empty-line"/><p class="p1">Сразу после того, как он вышел от Чарнолуского, нарком отложил толстую папку. Некоторое время он просидел в задумчивости, потом вскочил и бегом спустился к Апфельбауму на третий этаж. Чарнолуский вошел к нему без разрешения, испуганная секретарша вбежала следом. Председатель Петросовета обедал, к нему в это время никого не велено было пускать.</p><p class="p1">— Оставьте нас, — резко сказал Чарнолуский. Секретаршу сдуло.</p><p class="p1">— А ты, Григорий, послушай меня. Что тут было в ночь на пятнадцатое мая? А?! Апфельбаум доложил куриную ногу на тарелку.</p><p class="p1">— А-а, — сказал он нагло. — Начинается сеанс пролетарского гуманизма.</p><p class="p1">— Дилетантизм во всем хорош, — почти ласково сказал Чарнолуский. — Только вот палач-дилетант — это худо. Мучиться дольше.</p><p class="p1">— Не забывай, с кем разговариваешь! — прикрикнул Апфельбаум.</p><p class="p1">— Я знаю, с кем разговариваю, — усмехнулся Чарнолуский. — Говори: ты вооружал людей?</p><p class="p1">— Что значит — вооружал? Люди и так были вооружены, бесхозного оружия в городе тьма…</p><p class="p1">— Ты натравливал своих бандитов на Елагинскую коммуну?</p><p class="p1">— Что значит — натравливал?! Пролетарский праведный гаев привел людей к очагу контрреволюции…</p><p class="p1">— А свидетелей они зачем оставляли, твои праведные люди?!</p><p class="p1">— Какие свидетели? — насторожился Апфельбаум. — Ты можешь предъявить свидетелей?</p><p class="p1">— Надо будет — предъявлю. А теперь говори: за каким чертом ты мне врал, что они сами разошлись?</p><p class="p1">— Кто, старцы твои? Так они и разошлись! Мои люди взяли только тех, кто там ночью пьянствовал. Подержали немного в кутузке и отпустили на все четыре стороны.</p><p class="p1">Чарнолуский посмотрел в непроницаемо наглые глаза Апфельбаума и понял все. Он понял, куда делись обитатели Елагина дворца, о которых он только что вдохновенно врал Ятю. Понял, кто приказал громить небольшевистские издания и стрелять без предупреждения при попытке сопротивления; и догадался, кроме того, почему его восемнадцатого мая вызвали наконец в Москву. Вероятно, там считали, что елагинскую проблему помогал решать и он. Некоторое время он еще постоял, глядя на председателя Петросовета, потом вышел и больше никогда не заговорил с ним. При редких встречах они не здоровались. Попав в опалу восемь лет спустя, Апфельбаум умолял Чарнолуского о заступничестве, но тот не принял его. Впрочем, не сказать, чтобы в двадцать седьмом году для этого требовалось большое мужество.</p><p class="p1">Хотя не в Апфельбауме было дело: Апфельбаум никак не мог принять такое в одиночку. Судьбу елагинцев решила директива товарища Воронова, отправленная из Москвы еще до всякого примирения, — разумеется, в обход либерального наркома. От Апфельбаума требовалось только отвести подозрения от власти и для этой цели привлечь к решению задачи не солдат или матросов, но массы; и в выборе исполнителя он в самом деле не ошибся. Этим исполнителям не надо было платить: они получали удовольствие от процесса. Два месяца низовой элемент расчищал город, после чего вернулся в обычное деклассированное состояние. Возможно, Апфельбаум опирался при этом на Луазона, утверждавшего, что уголовный, или так называемый «придонный», элемент в условиях разгула свободы установит железный порядок быстрее всякой реакции, после чего по обыкновению самоистребится. Однако едва ли самонадеянный сын провинциального сапожника, вдобавок упивавшийся властью, находил время для чтения Луазона. А вороновская резолюция о расчистке Елагина острова была опубликована еще при жизни Чарнолуского — в сборнике документов «ВЧК и памятники культуры» (серия «Десять лет Чрезвычайной комиссии»). Товарищ Воронов поморщился, и составители сборника, так ничего и не поняв, в свой срок за публикацию поплатились, — читатели же, ничего не знавшие о елагинских событиях, не обратили на резолюцию никакого внимания. Чарнолуский, писавший восторженную вступительную статью к этому сборнику, сопоставил даты и схватился за голову, но писать прошение об отставке уже не стал. Он завязал с этим делом после переезда в Москву.</p><p class="p1">Однако чего у него было не отнять, так это честности. Он если что обещал, то делал. В Москве Чарнолуский первым делом пошел в секретариат министерства иностранных дел и добился для Ятя иностранного паспорта. Очень ему был нужен в Петрограде свидетель уничтожения Елагинской коммуны. Черт его знает, как еще все повернется. За границей пусть врет, что хочет, — всем эмигрантским бредням одна цена.</p><p class="subtitle">29</p><p class="p1">Ять отправил прошение о выезде, как приказали, через неделю и еще раз, внятно и по пунктам, изложил в нем свои аргументы: пользы Советской республике принести не могу, к физическому труду стал после болезни малопригоден, заниматься умственным не вижу возможности, в Гельсингфорсе на лечении находится моя мать (он сходил даже в Лазаревскую, добыл справку), прошу дать мне возможность выехать за границу, обещаю ни в какие антироссийские организации не вступать и к антисоветским организациям не примыкать. Но в письме необходимости не было — все и так уже крутилось, и пятого апреля 1919 года на его адрес пришла повестка:</p><p class="p1">«Назначено вам 7 апреля сево года пребыть в заявительный отдел Министерства иностранных дел Северной комуны к 13 часам дня».</p><p class="p1">Безграмотность этой повестки странным образом успокаивала; стало быть, новая орфография, уже общеобязательная, насаждалась пока не под угрозой расстрела. В частном письме безграмотность выглядит отталкивающе, но в государственном документе она даже трогательна. Министерство иностранных дел, оно же и управление внутренних, оно же и здание Петроградской Чеки, вплотную примыкало к зданию Генерального штаба, которое снилось Ятю в ночь переворота. Вот о чем думал Ять, входя в желтое здание, а никак не об убийстве Урицкого, которого в этом самом здании уложили восемь месяцев назад. Об отчаянном поступке Каннегисера Ять, конечно, знал и считал его образцом бессмысленного злодейства: за убийство одного малоприятного, но далеко не самого зверского чекиста расстреляли, по слухам, всех, кто к этому моменту сидел. Впрочем, в августе восемнадцатого Ять еще плохо понимал, что происходит вокруг, — а в сентябре, по обыкновению, слишком был поглощен самоуничижением. На входе его долго проверяли, досматривали, ощупывали на предмет оружия; оружия не оказалось, и началось странствие по кругам бюрократического ада, в раннесоветскую эпоху для многих еще нового. Тот факт, что за Ятя просил лично нарком Чарнолуский, придал делу некоторое ускорение, но по пути из Москвы в Петроград оно почти уничтожилось — так что выезду предшествовала долгая карусель, к которой Ять, впрочем, отнесся весьма благодушно. Он ко всему теперь относился благодушно — грех с его души был снят, разрешение на выезд получено, и впереди было еще тридцать пять лет жизни. Малую часть их можно было потратить и на хождения.</p><p class="p1">Все это время, вспоминавшееся ему потом как блаженное, весна решительно брала свое, даром что подзадержалась: в марте было, пожалуй, еще и похолодней, чем в январе, — но в апреле все принялось блистать и таять, и Ятю виделся в этом добрый знак. Он ходил на работу, где Залкинд терзала его все яростней, изумляясь, почему его ничто не берет, — рассеянно улыбался в ответ: давай, давай, милая, скоро я буду далеко. Нет ничего слаще тайного ехидства беглеца, который еще ТУТ и не знает пока толком, как ТАМ, — хотя, что скрывать, Ять с пристрастным интересом читал теперь немецкие и французские газеты; пресса, впрочем, была все больше красная или розовая, тошнотворно-скучная, — однако попадались и мнения врагов, прелестные, писанные живым человеческим языком; в них не было русского злорадства, с каким иные враги режима встречали новости о голоде, разрухе и самоубийствах. Англичане умудрялись даже и сострадать бывшим союзникам, ввергшим себя в этакую выгребную яму. Отвратительны, пожалуй, были одни американцы, умудрявшиеся с энтузиазмом приветствовать новую свободную Россию; не сказать, чтоб они лицемерили и на деле радовались упадку конкурента, — скорей им приятно было любое масштабное зрелище, и не может же в самом деле быть плохо людям, которые на наших глазах так красиво взлетают на воздух! С непробиваемой жизнерадостностью этой публики ничего нельзя было сделать, и утешало только то, что американский пролетариат точно так же здоров и жизнерадостен: нет в его среде ни отважных самопожертвователей, ни героических одиночек, а есть простые и честные тред-юнионисты, более всего озабоченные своим кошельком.</p><p class="p1">А впрочем, Ять и не задумывался особенно, как он будет ТАМ. Он радовался только, что не будет больше ЗДЕСЬ; Чарнолуский, великодушно подаривший ему право на жизнь и снявший грех с души, представлялся ангелом-избавителем. Он прошел в петроградскую службу учета трудящихся, где ему должны были выдать абсурдную справку о том, что он не является ценным работником (там над ним долго смеялись — обычно приходили вымаливать справку ровно противоположного содержания, чтобы избавиться от уплотнения или спасти хоть часть мебели). Как раз перед ним за такой справкой явился престарелый беллетрист Яроцкий, автор бесчисленных и неотличимых романов из купеческого быта.</p></span>
