<span><p class="p1">— Шутите? — Казарин посмотрел на него с неприязнью. — Нет-с, я из осажденной крепости не побегу. Нас ведь разогнать хотели, вы слышали?</p><p class="p1">— Ничего не слышал, потому и пришел…</p><p class="p1">— Чарнолускому кто-то донес, — со вздохом, словно его тяготил долгий и бессмысленный пересказ, начал Казарин. — Написали ему, что тут контрреволюция… А может, и не ему, может, и выше, — но закрыть приказали ему как изобретателю всей этой… затеи. — У Ятя застучало в висках. — Ну, тут мы сами, конечно… Есть тут один — организатор, он и мешочников привел. Публицист такой, Извольский, — не слышали?</p><p class="p1">— Где-то определенно слышал, — сказал Ять. — Сейчас не припомню.</p><p class="p1">— А я не слышал. Но я никогда публицистики не читал… Такой, знаете… живчик. Мечется, бегает, ведет разговоры… Пошляк, словом. Я поначалу к Хмелеву сунулся — Николай Алексеевич, голубчик, что вы делаете, ведь он и не филолог никакой, и не писатель подавно… Но он тогда хорошо меня осадил: сколько, говорит, можно прятаться от жизни в тетрадь да под юбку. Я обиделся сперва, но потом много думал… Знаете, трещина между нами — между мной и Марьей, я хочу сказать, — обозначилась почти сразу. Для нее все это было развлечение: вот, молодая девчонка, много читала, конечно… кружилась в полубогемной компании… тут — или живут, или чай пить приходят — все ее кумиры… да и я человек не последний… В общем, лестно, конечно, и я вполне могу ее понять. Но ведь она, видите ли, никогда и ничем за это не платила. Есть люди, которые всю жизнь — около искусства, они пьют его мед, но не знают его яда.</p><p class="p1">Э, подумал Ять, ты все-таки злишься, и сильно. Впрочем, все правда.</p><p class="p1">— Ей игры, а мне гибель, — продолжал Казарин, приподнимаясь на локте. — И я сам сказал: уходи. А она… только того и ждала.</p><p class="p1">— Как хотите, Вячеслав Андреевич, — глядя в пол, сказал Ять, — мне все же казалось, что вы шли сюда за квартирой и ничем более.</p><p class="p1">— Да я и не скрывал! — с досадой ответил больной. — Что вы меня разоблачаете, когда я сам себя давно приговорил! Виноват, кругом виноват: захотелось счастья на старости лет. Закат печальный и тому подобное. Пришел искать убежища в горящий дом: люди кричат, из окон прыгают, а я знай в спальне резвлюсь…</p><p class="p1">— А у меня, — вдруг сказал Ять, — пока я в Крыму был, квартиру отняли.</p><p class="p1">— То есть как?</p><p class="p1">— Ей-Богу. Приезжаю — уплотнили. Если, говорят, хотите — живите в кухне. Он почему-то улыбался, рассказывая об этом.</p><p class="p1">— Да, да, я слыхал про такое, — закивал Казарин. — Но чтобы без вас… Они что же, дверь взломали? Ять кивнул.</p><p class="p1">— И кто у вас там?</p><p class="p1">— Прелестные люди. Дворник наш с семьей — из деревни приехали, — фабричный какой-то, с женой и тремя детьми… Я и думать не думал, что у меня там столько места. Замечательное решение проблемы города и деревни: помните, все говорили — пропасть между крестьянином и горожанином… Вот и всё, и никакой пропасти. Если в каждую питерскую квартиру поселить по пятнадцать человек, где раньше жили трое, — скоро в деревне никого не останется.</p><p class="p1">— А хлеб кто будет растить? — слабо улыбнулся Казарин.</p><p class="p1">— Понятия не имею. Покупать будем. Теперь же свобода — зачем работать-то?</p><p class="p1">— И где же вы теперь?</p><p class="p1">— Пока — у Клингенмайера, это друг мой, историк и собиратель. У него, конечно, надолго нельзя — неловко, знаете… Так что в конце концов, может, и к вам подамся.</p><p class="p1">— Ну, к нам не зову, — неожиданно сухо возразил Казарин. — Кто же своею волей в пекло полезет…</p><p class="p1">— Ночевать негде — так и в пекло полезешь, — Ять попытался свести все на шутку. — Новую квартиру теперь не снимешь. И не хочу вам напоминать, но ведь и вы сюда пришли не за орфографию бороться…</p><p class="p1">— Да какая теперь орфография, — махнул рукой страдалец. — Про нее и не помнит никто. Теперь или они нас, или мы их-то есть мы их, конечно, никогда не опрокинем, но по крайней мере покажем миру, что тут такое делается в действительности. Не советую лезть в эту передрягу.</p><p class="p1">Ага, разозлился Ять. Мало того, что этот герой не имел никаких прав на вселение сюда, — он мне, действительному члену Общества любителей словесности, черт бы ее драл совсем, запрещает преклонить голову во дворце, который я же для них приискал! Ах, Казарин, Казарин, отвергнутый любовник, — нашел себе правду, и прислонился, и отпихивает теперь от нее всех, кто еще не втиснулся в нишку! Выплыл среди обломков корабля, ухватился за доску и ногами, ногами расшвыривает остальных: моя доска, на ней буду героически гибнуть! Прочие могут гибнуть негероически, коли уж у них так сложилось… Ах, Казарин, Казарин, какая ты все-таки дрянь — поделом от тебя ушла красивая девушка со смородинными глазами…</p><p class="p1">— Кстати, — не удержался Ять и ударил под дых. — К кому ушла ваша Марья?</p><p class="p1">— К Барцеву, — спокойно ответил Казарин. Он снова лег, вытянулся и закрыл глаза, всем своим видом показывая, что до предела утомлен разговором — а может, и вправду устал? — Помните, рыжий… бородатый?</p><p class="p1">— Боже мой, но ведь он идиот!</p><p class="p1">— Не такой уж идиот, как оказалось. Мне даже кое-что нравилось у него… Она хотела его сюда привести, но тут уж я встал горой. — Немыслимо было себе представить, чтобы Казарин, лежащий тряпкой, встал горой. — Никто из них сюда не войдет, пока тут мы… хватит уже осквернений. А ваша к кому ушла?</p><p class="p1">— К очень славному типу. Скучноват, правда… но надежен. Историк. Они вместе уехали, он ради этого продал дом. Может, все действительно правильно: я бы дома не продал.</p><p class="p1">— Удивительный вы человек, Ять, — желчно проговорил Казарин. — Как это вы умудряетесь так безопасно жить, ни в чем не замараться? Из квартиры вас выгнали прелестные люди, невеста ушла к очень славному типу… Нельзя же, в самом деле, вот так проскользить, надо же когда-нибудь и возненавидеть кого-нибудь до смерти… и подставить себя под настоящий удар… Дивлюсь вам, право.</p><p class="p1">Он сам не замечал, как почти дословно повторяет обращенные к нему хмелевские упреки месячной давности, — но теперь у него было на это право.</p><p class="empty-line"/><p class="p1">Конечно, думал Ять, переходя по мосту на Крестовский остров. Конечно, мне нечего там делать. Выдумали себе обреченность и купили за нее правоту. Очень просто. Я в детстве, бывало, прятался от всех в чулане: сначала мне очень нравилось, как я сейчас всех напугаю… потом начинал досадовать, что никто меня до сих пор не хватился, и наконец уже ненавидел их за то, что они так легко обо мне забыли; может быть, именно в чулане, среди собственных старых игрушек я и понял впервые, что смерть — это примерно так же: вычли меня, и никто не вспомнит… И я выходил злой, зареванный, и мать долго, долго не могла успокоить меня… Заперлись в чулане со старыми игрушками — твердый знак, государь, профессорский статус — и ждут, пока за ними придут; да никто за вами не придет! Права была девочка, что сбежала оттуда.</p><p class="subtitle">4</p><p class="p1">На прилукинской даче тоже переменилось многое: на березах и соснах, подступивших к покосившимся заборам, красовались красные треугольники и черные крути, а на самой даче вывешен был транспарант с четырьмя крупно намалеванными буквами ЕПБХ — трудно было вообразить большее неприличие. Подле каждой из букв виднелась жирная точка, словно подтверждавшая: да, за каждой буквой стоит вполне конкретное слово. Наверняка тут был вызов общественной морали — не могли же они не понимать, что у них получилось? Ять заулыбался было, но тут ему навстречу прямо из дверей ЕПБХ выпал moi-футурист Лотейкин. Он явно был не на шутку перепуган, хоть и старался соблюдать респектабельность — вот, спешу на прогулку прекрасным апрельским днем… Вслед ему неслись громовые проклятия.</p><p class="p1">— И чтобы духу твоего тут не было! — ревел Корабельников. — Сунешься — в Невке утоплю!</p><p class="p1">— Но Саша! — заячьим голосом взывал Лотейкин. — Уверяю тебя, что все…</p><p class="p1">— Спекулянтов уверяй, мародер! — пробасил глава футуристов. Из дверей вылетел и шмякнулся в грязь возле Лотейкина узелок с вещами.</p><p class="p1">— Лик-ви-дирую! — пообещал напоследок Корабельников. Из окон прилукинской дачи выглядывали хохочущие лица Краминова, Барцева и — да, в этом не могло быть сомнения — Ашхарумовой. На крыше прилаживал к трубе что-то футуристическое художник Черемных: оторвавшись от работы, он одобрительно наблюдал за изгнанием бывшего собрата.</p><p class="p1">— Вы все скоро побежите туда! — провизжал Лотейкин. — И нечего тут играть в чистоту! Я прекрасно знаю, кто еще… — тут он осекся.</p><p class="p1">На крыльцо вышел огромный, голый по пояс Корабельников, мрачно жуя папиросу. Руки его были скрещены на груди, а за спиной так и угадывались крылья пролетарского демона: одно черное, другое красное.</p><p class="p1">— Пошел вон, гнида! — заорал демон, и Лотейкин, подобрав узелок и оскальзываясь в жидкой грязи, поспешил к мосту. Поравнявшись с Ятем, он жалобно улыбнулся:</p><p class="p1">— Теоретические споры. Саша совершенно невыносим. Никаких несогласий не переносит…</p><p class="p1">— Ять, Ять! — закричала Ашхарумова, распахнув окно. — Где вы были все это время? Идите сюда!</p><p class="p1">— Не слушайте его, он врет! — вторя ей, высунулся из окна ликующий Барцев. — Он к елагинцам жрать ходил! Небось к ним теперь. Ну, они его не очень-то и примут, перебежчика.</p><p class="empty-line"/><p class="p1">— Если бы по идейным соображениям, никто бы слова не сказал, — захлебываясь, рассказывал Краминов. — Вот Маша к Казаринову ходит — все же знают, что он болен. Мы не звери, верно?</p><p class="p1">Маша слушала, невозмутимо стоя в углу и по-корабельниковски скрестив руки. Ять украдкой взглядывал на нее: нет, не переменилась. На ней в самом деле ничто не оставляло следа: те же круглые смородинные глаза, тот же румянец и чистый, открытый лоб. Барцев по временам перехватывал эти взгляды, словно говоря: что, хороша, да? Хороша Маша, и теперь наша.</p><p class="p1">— И чем вы тут заняты? — поинтересовался Ять.</p><p class="p1">— Да кто чем, полная свобода. Давайте и вы к нам, дело найдется. Сейчас вот к Первому мая готовимся, впервые будет в Питере демонстрация без полиции и ограничений. Думаем весь город превратить в эстраду.</p><p class="p1">— А что такое ЕПБХ?</p><p class="p1">— Единое Петроградское братство художников, — серьезно ответил Краминов. — Мы живем в эпоху сокращений, когда каждое слово сводится к букве, к знаку. В будущем сокращения должны вытеснить обычную фразу. Например, вместо «Который час?» будет сначала «КЧ», а потом какой-нибудь особенный звук…</p><p class="p1">— В будущем у всех будут свои часы, — серьезно поправил Барцев.</p><p class="p1">— А вам не приходило в голову, что это… довольно двусмысленно? — все еще полагая, что его разыгрывают, спросил Ять.</p><p class="p1">— Что двусмысленно?</p><p class="p1">— Да вот это ваше ЕПБХ. Это же можно расшифровать и… не знаю… Ежи против бешеных хомяков… Ашхарумова захлопала в ладоши:</p><p class="p1">— Браво, Ять! Да вы совсем наш! Переходите к нам, честное слово.</p><p class="p1">— А что, очень может быть. Меня уплотнили, вы знаете?</p><p class="p1">— Меня тоже, — небрежно кивнул Краминов. — Я теперь домой и не захожу. Всё — тут. Правда, Ять, давайте! Рук не хватает. Будете кубы клеить, плакаты писать…</p><p class="p1">— Да не слушайте вы его, Ять! — перебил Барцев. — Тут каждый делает что хочет. Корабельников, конечно, немножко диктатор, но иногда слушается. Мельникова, например. А Мельников вообще ничего не делает, он будущее вычисляет. У нас поголодней, конечно, чем у елагинцев. Спекулянтов не пускаем. Паек сохранился кое-какой, потом платят за «Окна»…</p><p class="p1">— Какие окна?</p><p class="p1">— Да так, пишем, — уклончиво улыбнулся Барцев. — Самописьма продаем, то есть автографы. На Сенном книжный рынок, зайдите посмотреть. Вы где были-то?</p><p class="p1">— В Крыму.</p><p class="p1">— А Таню видели? — оживилась Ашхарумова.</p><p class="p1">Ять хотел соврать — не нашел, разминулись, — но тут же разозлился на себя и на нее: какого черта ему юлить перед девчонкой?</p><p class="p1">— Да, видел. — Он посмотрел на нее в упор. — Я ведь за этим и поехал.</p><p class="p1">— Ну что, как она?</p><p class="p1">— Почти как вы, — сказал он чуть жестче, чем хотел.</p><p class="p1">Ашхарумова отвела глаза. Барцев быстро посмотрел на нее, потом на Ятя, но промолчал.</p><p class="p1">— Нет, серьезно, переселяйтесь! — спас их от неловкости Краминов. — У нас тут, правда, двое противных типов — то ли для охраны, то ли для связи с правительством… Но они в общем безобидные. Мы притерпелись.</p><p class="p1">— А Льговский что же, ушел?</p><p class="p1">— Ему поп наш не понравился. У нас же теперь и поп свой, обновленец. Говорит, что благословляет революцию. Хитрит, конечно, но рисковый: ездит по церквам, проповеди говорит… На митингах выступает. Мистерию Сашкину благословил… Ах, это все так долго рассказывать! Если вкратце, Соломин считает, что большевики должны построить красную империю. Они с Сашей чуть не задрались, но я помирил. По-моему, сейчас надо сообща, а разберемся потом…</p><p class="p1">Все это слишком напоминало разговоры в подвале Амалии фон Кирстенхардт, и Ять поднялся уходить.</p><p class="p1">— Где же вы живете? — спросила Ашхарумова.</p><p class="p1">— Пока — у приятеля… Кое-какие сбережения у меня остались, уплотнители не тронули, — но газета закрыта, работать негде… В крайнем случае приду клеить кубы.</p><p class="p1">С ним простились дружески. Ять уже вступил на мост, когда его догнала Ашхарумова.</p><p class="p1">— Простите, — запыхавшись, сказала она. — Простите, я не хотела, чтобы вы… не так поняли. Вы были у Славы, да?</p><p class="p1">— Был, — просто ответил Ять. Он не хотел помогать ей в этом разговоре и выжидательно замолк.</p><p class="p1">— Вы, конечно, осуждаете меня?</p><p class="p1">— Да за что же. Ведь вы не за пайком ушли.</p><p class="p1">— Никто не уходит за пайком, — она тряхнула головой, взмах черных волос еще живее напомнил Таню. — Даже Лотейкин ходил к спекулянтам потому, что ему противно стало с Корабельниковым.</p><p class="p1">— Но передо мной-то чем же вы виноваты? Я, кажется, в осуждение ваше слова не сказал…</p><p class="p1">— Иногда не надо говорить. По вам все видно.</p><p class="p1">— Если чувствовать себя виноватым, то увидишь, что и солнце отворачивается. Вы, Маша, кругом правы. Вы ушли потому, что полюбили одного и разлюбили другого, а это такая штука… неуправляемая. Виноватых нет.</p><p class="p1">Ашхарумова опять замотала головой.</p><p class="p1">— Вы все сводите на одно — полюбила, разлюбила… Я не Таня. Меня в Тане всегда отпугивала эта зависимость — от своего хотения. Смешно, что вы мне говорите о правоте — вы, который прав всегда и перед всеми… потому что вы — никогда и ни с кем! Я не знаю, что сделала вам Таня, я не хочу только, чтобы все вам теперь казались на одно лицо… на ее лицо. Я не к Барцеву ушла, хотя Барцев и все они — бесконечно великодушнее Славы, и им гораздо труднее. Если на то пошло — умирать в гордом сознании своего мученичества в тысячу раз легче, чем жить… по-новому, впервые! Я ушла… просто потому, что в этом есть ложь — во всей этой осажденной крепости со спекуляцией салом! И ведь он честный, он умный человек — как он может этого не понимать!</p><p class="p1">— Да все он прекрасно понимает, — поморщился Ять. — И зря вы про Таню — будто она слушается своих прихотей, а вы сознательно выбираете жизнь. Просто Таня не оправдывается, — добавил он мягко. — Я уж не помню, у какого это китайца сказано: кто не любит смерти, тот не любит жизни… Я — не люблю, за это меня из алфавита выгнали. И вовсе вам не надо одобрения от такой полуживой буквы, как я…</p><p class="p1">Она покачала головой, повернулась и медленно пошла к прилукинской даче. Ятю было стыдно: пусть хоть самую малость, но он лукавил. Какой вообще может быть выбор между жизнью и смертью, если обе неизбежны? Дайте мне хоть раз в жизни право не выбирать из двух, будь то жизнь и смерть, большевики и Романовы, Елагин и Крестовский… Предложите мне что-нибудь третье, ибо жизнь и смерть, как они есть, стоят друг друга — и не стоят меня. А все-таки она была очень хороша. Бедняга Казарин.</p><p class="empty-line"/><p class="p1">Как ни странно, в апреле керенки подросли в цене: деньги не были уже бросовыми бумажками, ибо стало ясно, что все надолго. Ятю случилось однажды беседовать с авиатором Гороховым, который на своем «фармане» падал с трехсотметровой высоты и умудрился не разбиться: было ли время о чем-то думать в машине, несущейся к земле? «Очень было, — ответил Горохов, парень простой и дружелюбный. — Падаешь, падаешь, даже привыкаешь».</p><p class="p1">Петроградская торговля начала входить в колею: будущий строй ни по одному параметру не определился, действия новой власти были хаотичны и выборочны, однако эта неопределенность превратилась в динамическое равновесие, в киселеобразное ни то, ни се. Ни у кого не было сомнения, что огромный, тяжелый самолет России падает, — но он падал уже десять лет, то принимаясь бодро чихать мотором, то покорно замолкая, и в этой падающей машине началась своя жизнь, с расколами, товарообменом и книгоизданием. На Сенном рынке тоже многое переменилось. Деньги вновь потеснили расцветший было натуральный обмен; за триста рублей можно было купить буханку, за пятьсот — пачку папирос, и все это где-то выпекалось, набивалось, хранилось… Словом, весна восемнадцатого года внушала поначалу надежды — и иногда казалось даже, что никакой революции не было, а так только, власть поменяли да грамоту отменили.</p><p class="p1">Отмена грамоты сказывалась уже на размывании речи: многого Ять попросту не понимал. Речь елагинцев и крестовцев, в силу их относительной изоляции, оставалась прежней — но на рынке было множество новых слов и понятий. Червонец назывался чириком, сало — балаласом, спирт — бимбером; вдоль рядов похаживали патрульные Апфельбаума, которых, неприязненно глядя вслед, называли почему-то шуринами. Вместо привычного «почем?» все чаще раздавалось отдающее южным базаром «в какую цену?», деньги назывались башлями, семечки — оглодышами, проплевышами; рослого, здорового торговца именовали «шпенд», «штымп», ружье — плеткой или большой. Тюремный жаргон, о котором Ять имел представление благодаря общению с уголовными хроникерами, щедро мешался с суржиком и цыганским арго: баранку именовали коралькой, девчонку — сикарашкой, секельдявкой, но так же обозначали и селедку; нередко поминался таинственный екарный бабай. В этой новой речи было что-то дурашливое и вместе грубое — каждое слово было по-своему забавно, чем посильно преодолевалась омерзительность называемого, но это не скрадывало хамоватой простоты называющего — шутки его были шутками висельника, коротающего время за карточной игрой на этапе. Верно, таков был язык темных — если при дележе краденого случалось прибегать к языку.</p><p class="p1">Темных, кстати, от лотков никто не гонял. Они подходили, наклонялись, принюхивались, униженно-нагло улыбаясь и грязными пальцами перещупывая товар; тут брали лоскут, там кусок сахару — и уходили не то что не заплатив, но не отблагодарив даже кивком, словно все давно уже принадлежало им. По лицу торговца, к которому со странной инспекцией подходил темный, бродила брезгливая гримаса: он возводил очи горе, переминался с ноги на ногу и перепуганным взглядом молил соседа о помощи, но тот нарочно отворачивался, делая вид, что ничего не происходит. Иногда темный брал торговца за пуговицу, заглядывал ему в лицо и спрашивал: «Га?» — и дыхание его, видимо, было столь зловонно, что несчастный продавец переставал дышать и застывал, сморщившись. Повторив «Га?», темный двигался дальше, пальцем вытирая под носом и наводя ужас на встречных широкой ухмылкой.</p><p class="p1">Ять шел на Сенной не за провизией: с трудом сломив сопротивление Клингенмайера, он сразу отдал ему половину своих денег и потому делил с ним скромную трапезу без особенных угрызений; он хотел купить чего-нибудь из новых книг, да и слух о торговле самописьмами заинтересовал его. Самописьмами, сколько можно было судить, торговали в основном графоманы и городские сумасшедшие; внимание его привлекли несколько книг, изданных типографским способом — все под фамилией Вогау, — названий которых он не понял, как ни силился; продавал их бледный, веснушчатый верзила в очках — вероятно, сам Вогау. Надо было изучать новый язык, и Ять не пожалел двухсот рублей на самую тонкую из его книжечек, напечатанную вдобавок на обоях — текст располагался только на одной стороне, по другой раскиданы были голубые цветы на красном «Иллюстрации», — сдержанно пояснил Вогау, изъяснявшийся по-русски вполне правильно; брошюра его, однако, называлась «Глумкая плешть» и написана была, если автор не врал, на подлинном диалекте Брянской губернии. Ять не стал даже пролистывать новое приобретение, отложив наслаждение до вечера. Взгляд его скользнул по синим обложкам «Французской библиотеки» в издании Миронова — в пятнадцатом году все принялись издавать союзников: Вольтер, Дидро, Марат… Вдруг он вздрогнул: последним в этом славном ряду лежал толстый том Луазона.</p><p class="p1">— Сколько? — спросил Ять, указывая на книгу загадочного мыслителя.</p><p class="p1">— Две тысячи за все, — твердо потребовал старик.</p><p class="p1">— Мне все не нужно, только это…</p><p class="p1">— Вразброс не продаю.</p><p class="p1">— Пятьсот за одного Луазона, — предложил Ять безумную сумму. Ему казалось, что в томе Луазона ждет его разгадка всех тайн, в том числе и собственной судьбы; таинственный философ, словно лейтмотив, сопровождал его жизнь с того самого дня, как он впервые явился к Чарнолускому с проклятой идеей вспомоществования профессуре.</p><p class="p1">— Семьсот, — высокомерно отозвался старик.</p><p class="p1">Ять не стал спорить, отвернулся и пошел прочь; как всегда, отказ от борьбы сработал верней борьбы.</p><p class="p1">— Шестьсот, — крикнул старик вслед.</p><p class="p1">— Пятьсот, последнее слово, — ответил Ять, не оборачиваясь.</p><p class="p1">— Черт с тобой, — донеслось до него.</p><p class="empty-line"/><p class="p1">Открыть Луазона он боялся: полторы пачки папирос вполне могли уйти ни на что. Лежа на узком диване, под легким, тонким пледом, который выдал ему Клингенмайер, Ять раскрыл сначала «Глумкую плешть» — но тут же ударился, словно с разбегу, о стену неузнаваемых слов. Так пытался он некогда просматривать научный труд, который должна была штудировать одна из его мимолетных подруг: будучи твердо уверен, что книга, доступная ей, уж ему-то как-нибудь будет понятна, он раскрыл фолиант и немедленно убедился, что, кроме конструкций «отсюда следует» и «легко видеть», не понимает ни единого слова. В «Плешти», однако, не было и этих зацепок, а из знакомых слов наличествовали только союзы с предлогами: служебные части речи поистине бессмертны — господ погонят, слуги останутся… ибо должен же кто-то служить… Он пробовал поначалу ориентироваться по фонетике, резонно предполагая, что хорошую вещь ужорой не назовут, — но и этот принцип не приближает его к смыслу, поскольку на одной странице ужору загнобляли, а на другой убарахтывали, не упуская случая возлизнуть. Вскоре Ять отказался от намерения что-либо понять и бездумно заскользил глазами по строчкам новейшей литературы.</p><p class="subtitle">5</p><p class="p1">«Тарабумкая, глумкая, глубкая плешть, и — вразсос, в забулдон, в забурдык, раскосясь, ухремучилась, кокнулась, трехнулась, взбуркла, урочится малко. По плешти — окалинки, буркалы, зуйки, митьки, ухороны, козюли, в козюлях — укрывища, в чапких укрывищах — зюзи: юзятся, угрозятся, тяпают, чушко сумнятся…»</p><p class="empty-line"/><p class="p1">Это, положим, можно еще было понять — описывалась некая первобытная плазма (она же плешть), в которой поначалу бугрились и зыбились протоформы да ютилась в утлых жилищах чудь белоглазая.</p><p class="p1">Вскоре появлялся герой — как всегда, неназванный.</p><p class="empty-line"/><p class="p1">«Взметнулся, возлапился, выбуркнул:</p><p class="p1">— Бздысь!</p><p class="p1">Оборянилась, скоржилась. Чухнулся:</p><p class="p1">— Грумко мне в грызде! Устроплюсь!</p><p class="p1">Возгрянула вытно:</p><p class="p1">— Устропься! Устропься, бажаный!</p><p class="p1">Обшушился вялко, коршу догребавши:</p><p class="p1">— Пожежники луют… Не взбрыкну.</p><p class="p1">И — чельник расхряпив, надвижник отбукнув, раскрошник застрокнув, узлякался в пуржную томь».</p><p class="empty-line"/><p class="p1">Вероятно, герой, наскучив семейным бытом (судя по звуку — все-таки сельским), дохлебал лапшу, оттолкнул стол и, одобряемый испуганной женою, вывалился в снежную ночь искать лучшей участи.</p><p class="empty-line"/><p class="p1">«Зюзится, стылит по плешти, узорится, шарится, щелится бацька-зузор телебряный, ухмяный, калганый. Мотылится ухверть. С забросом угромится бдыщь. И по угрешной взбеси, топытами чамкая, гружно ковылит товарищ Гурфинкель.</p><p class="p1">— Шо, барно докукишь?</p><p class="p1">— Атожно!</p><p class="p1">— Заваживай с глузду».</p><p class="empty-line"/><p class="p1">Здесь легко было предположить, что герой, выбежав из постылой избы на зимнюю плешть, по которой змеями скользит поземка и гуляет с воем ледяной ветер, встретил путеводного товарища Гурфинкеля, поинтересовавшегося у него, как дела; дела были не блестящи, и товарищ Гурфинкель позвал его за собой.</p><p class="p1">В самом деле, я идеальный читатель — сделаю смысл из чего хочешь; впрочем, нужен ли тут смысл? Не так ли мы перетолковываем своевольно Божьи знамения, не понимая, что лишь обедняем их? Нет, только глумкая плешть — истинная литература будущего; главное — никаких полемик, всякий читатель прав в собственной трактовке… Положительно, Вогау далеко пойдет! Ять улыбался, но вскоре перестал улыбаться, поняв, что уже не шутит сам с собою и серьезно допускает возникновение словесности, никому ни о чем не сообщающей. В конце концов, футуристы уже давно… нужен был последний толчок, и вот… Он тряхнул головой, прогоняя морок, отложил Вогау и раскрыл синий том Луазона.</p><p class="empty-line"/><p class="p1">Его он отложил лишь три часа спустя, когда уже заголубел рассвет в единственном узеньком окошке. Спать не хотелось. Все было до того определенно, что мыслей не осталось — не с чем спорить, не за что уцепиться в поисках опровержения. Это была самая страшная правда — та, о которой догадываешься; синий том окончательно прояснил картину. Безусловно, Луазон заслужил памятник: большевики следовали ему точнее, чем Марксу. Да Маркс, в сущности, и нужен был только для маскировки. Ять всегда подозревал, что на одном этом скучнейшем экономисте нельзя было закрутить всесветную бучу. Возможно, впрочем, что большевики следовали Луазону бессознательно… но разве комиссар по делам образования стал бы попусту тревожить память забытого мыслителя, умершего за пять лет до того, как пророчества его начали сбываться на его же родине? С портрета, приложенного к однотомнику, близко посаженными черными глазами взирал на Ятя длиннолицый фанатик явно чахоточного вида; в нем тлел нехороший огонек. Луазон, сумасшедшим он был или гением, понял главный закон самоорганизации мыслящей материи, изложенный в центральном его трактате «Оправдание» с тем же лихорадочным блеском, каким горели его глаза. Идея была ошеломляюще проста, и Ять давно догадывался именно об этом механизме русской революции: чтобы общество оправдало любой террор, ему достаточно нескольких месяцев бесконтрольной свободы — и всякий, кто дает эту свободу, сознательно или бессознательно желает именно окончательного закрепощения.</p><p class="p1">Целью революции никогда не было народное благо. В лучшем случае оно рассматривалось как одно из десятка побочных следствий, тогда как в основе всякой революции лежало гениальное самосохранение системы, иногда вынужденной прибегнуть к показному саморазрушению, чтобы тем верней воспрянуть из праха, когда необходимость ее вновь окажется подтверждена.</p><p class="p1">Главной задачей власти, по Луазону, было возбудить в массах желание крутых мер и тоску по сильному правителю; правитель этот будет тем сильней, чем безоглядней окажется разрушение. Триумфальное возвращение монархии без Романовых — вот была конечная цель русской революции; большевики, придя к власти, отменили все прежние законы (включая законы природы, регулировавшие брак, старение и смену времен года) лишь затем, чтобы тут же насадить такую систему ограничений, по сравнению с которой прежние казались образцом милосердия. Разумеется, у них не было такого намерения, — тем трагичнее должен был оказаться их собственный внутренний разлад, самыми чуткими из них ощущаемый уже и теперь. Реставраторы нелюбимы толпой, а за борцами стоит правда борьбы — им-то и будет позволено навести тут полный порядок; всякая революция для того только и нужна, чтобы дать смутьянам полномочия диктаторов и их руками сделать то, что не удавалось их врагам. Не пройдет и пяти лет, как последние романтики перестреляют друг друга, дробясь на фракции, яростно борясь, взаимно уничтожаясь и торя дорогу истинному властителю, которого предчувствуют так же ясно, как люди десятых годов предвидели грядущего гунна. Революция есть высшая форма передачи власти: о, Давид и Голиаф! Лучшие наследники подрастают среди ниспровергателей… Все наконец укладывалось в систему. Поистине, эта книга стоила и двух пачек папирос.</p><p class="p1">Впрочем, стоила она и больше — ибо Луазон не останавливался. В «Посрамленной богине», дополнении к главному трактату, он — уже на пороге смерти — задавался вопросом о конечной цели всех этих послаблений и закрепощений: что в царстве абсолютной свободы первой жертвой разгула становилась культура, вечно свободы взыскующая и от нее же гибнущая. Ять в священном трепете узнал в последних заметках Луазона свою январскую статью о пальме и травке. Новое закрепощение возвращает власть не к статусу-кво, но к варварскому миру, лишенному единственного, ради чего стоило ломать прежний уклад.</p><p class="p1">Этот вывод Луазона был тем страшней, что в конце пути с неизбежностью возникал призрак государства, после череды упрощений превратившегося в гигантский зоосад, государства, чьи правители при первых признаках переусложнения сознательно, бессознательно ли ослабляли скрепы — и после короткого и кровавого пиршества свободного взаимоуничтожения возводили на руинах зоосада террариум, в котором только рептилии пировали на костях. Следом, однако, наступал черед мира рептилий, у которых возникали свои иерархии и разделения, — и скоро на остатках их мира в первичном бульоне, в глумкой плешти кипели простейшие, на ходу разделяясь на простоватых и сложноватых… Дарвинова и Марксова теории представали на фоне луазоновской догадки розовыми фантазиями невинных гимназистов. Триумфальное сошествие во тьму — вот чем была история по Луазону, и трудно было найти лучшее чтение весной восемнадцатого года.</p><p class="p1">Голубело, окно, и ясней ясного было будущее: те единственные, кто нуждался в свободе, падали первыми ее жертвами. Уничтожив всех несогласных, ужесточенная власть возвращалась на покинутый престол. Только в краткий миг равновесия стоило жить. О, если бы нашлась сила, способная внушить двум коммунам на питерских островах, что они, лицом к лицу сошедшиеся в бою, — те самые потомки титанов, уничтожающие друг друга, чтобы на почве, унавоженной их телами, процвели поколения рептилий! Но такой силы не было, и не было средства остановить войну изничтожающих друг друга армий, единоприродных, единокровных, в равной степени не готовых оставить свои острова.</p><p class="empty-line"/><p class="p1">Мироходов словно не уходил из своей конторы: тот же был на нем сюртук — разве что теперь чересчур просторный, — и так же он хмурился и дымил, читая газету — теперь уж, правда, чужую, на этот раз «Путь»; знакомым жестом он указал на кожаное кресло перед собою, в котором, бывало, Ять часами просиживал, споря с ним о тонкостях будущего направления — и часто умудряясь переубедить, а впрочем, всегда наслаждаясь спором как таковым.</p><p class="p1">— Кстати, вы-то где сейчас?</p><p class="p1">— Куда ж я пойду после «Речи». Другого редактора не мыслю — только вы.</p><p class="p1">— Нет, батенька, я свое отработал. Вы где были-то, собственно говоря?</p><p class="p1">— В Крыму.</p><p class="p1">— Что, немцы пришли?</p><p class="p1">— Я успел до немцев.</p><p class="p1">— А что ж за границу не уплыли? Морем, говорят, еще можно…</p><p class="p1">— Кому я там нужен, — покачал головой Ять. — Чем вы сами живете?</p><p class="p1">— Да чем — жена шьет, Маша нанялась к распорядителю из Народного банка, дочку его музыке учит. Удивительно, говорит, приятные люди, столько деликатности… жалованье только задерживают второй месяц, а так ничего… иной раз кофеем напоят… Сам мемуары пишу — на что еще гожусь? Тут ведь у нас пол-России перебывало, каких людей печатали, скандалы поднимали! И о вас, между прочим, будет.</p><p class="p1">— Ладно вам… А что, помещение не отобрали пока?</p><p class="p1">— Со дня на день грозятся. Я сдать хотел — не велят: ждите распоряжений. Ко мне тут, не поверите, — Мироходов усмехнулся, — чуть не каждый день знаете кто ходит? Минкин, комиссар. Сомнения у него зародились. Что-то, говорит, не то получается… Каждый день собеседуем, все правды у меня ищет. Вот погодите, я его скоро совсем разагитирую.</p><p class="p1">— Среди них есть сомневающиеся? — не поверил Ять.</p><p class="p1">— Больше, чем вы думаете, — со значением произнес Мироходов. — Да толку-то что? Они все спрашивают: что мы не так сделали? Милые, хочу я ответить, да ведь не вы, а вами сделали. Что ж казниться теперь. Сейчас пройдем ко мне наверх, я вас угощу. Тут, знаете, забегает ко мне Коля Стрелкин — помните, конечно? Из репортеров… Может, и сегодня будет.</p><p class="p1">…Жена Мироходова посматривала на них с тревогой — пить ему было совсем, совсем не нужно. Из закуски имелись грибы — их крепко пахнущую сухую связку принесла с уроков Маша; грибы сварили, получился крепкий коричневый отвар с запахом лесной прели.</p><p class="p1">Младшая дочь Мироходовых, Елена, к столу не вышла — она страдала мигренью из-за проклятого бисера: целыми днями плела украшения на продажу. Покупали плохо, всё больше предлагали знакомство. С Сенного она перешла на Обводной, где теперь тоже раскинулся базар, с Обводного — на Сенатскую, но и там бисера не покупали, а приглашали кататься в автомобиле. Советские служащие уже присматривали девушек из образованного класса и знали, где искать их, — пока пролетарии сидели в синематографах, образованный класс обживал базары. Прибежал обещанный Стрелкин, — радостно расцеловались. Говорили о прежних газетных бурях, о способах обхода цензуры, о том, кто где — многие подались на юг (Ять, как всегда, первым туда успел и первым вернулся), иные сидели по случайному обвинению, иные уже вышли. Брать и выпускать продолжали, ибо более дешевого способа имитировать государственную деятельность до сих пор не было изобретено. Мироходов помнил великое множество ухищрений — как бы напечатать это, поддеть того… Как ни странно, на фоне катаклизмов последних пяти лет их тогдашние хитрости не казались мелочью — более того, они и теперь не потеряли шарма, как не теряет шарма статуэтка, найденная в развалинах. Вспоминали эпиграммы Юрятина, редакционный фольклор, гомерическую опечатку, проскочившую у Ятя в думском репортаже о триумфальной речи Пуришкевича («Прижопывая правой ногой…»). Газета живет день, иногда полдня, — но, словно в компенсацию, память о ней живет долго, и дух редакционного братства, сплоченного эфемерностью результатов, как бы добавочным соседством смерти, помнится и тогда, когда от разгромленной газеты не остается ничего, кроме мертвой желтой подшивки.</p><p class="p1">— Не хотел бы я себя перечитывать, — признался Ять. — Ни одно предсказание не сбылось, слов много, толку чуть…</p><p class="p1">— Это-то и ценно! — утешил Мироходов. — Наши ошибки будут историку дороже всех прозрений: как было, он и сам знает, а вот как думали…</p><p class="p1">— А вы где, Коля? — после первой спросил Ять.</p><p class="p1">— Я в Лазаревской больнице, провизором. Грамотных нет, а выписывать надо… Без русской грамоты можно, а рецепт да диагноз без латыни — никак; видите, вот и юридический мне пригодился…</p><p class="p1">— В Лазаревской? — переспросил Ять. — И что там?</p><p class="p1">— Душевнобольных выпустили, — уплетая грибной отвар, улыбнулся Коля.</p><p class="p1">— То есть… то есть как? — уставился на него Ять.</p><p class="p1">— Да очень просто. Пришел какой-то — мелкий, краснолицый. Назвался помощником комиссара здравоохранения. Предъявил мандат. Довольно, говорит, держать в застенках наших братьев. Конец принудительному лечению. Свобода — так для всех.</p><p class="p1">— И куда они делись?</p><p class="p1">— Да что вы так волнуетесь, Ять? Вы что, рассчитывали лечь туда?</p><p class="p1">— Говорите, Коля, черт бы вас побрал!</p><p class="p1">— Ничего страшного, будет вам! — Коля испугался, он никогда прежде не видел Ятя в таком волнении. — Стали выпускать, а они не идут. Все больше старики немощные. Мелкий этот говорит, что помещение нужно для раненых бойцов революции, а начальник отделения — Зудов, приват-доцент, тоже кремень, — уперся и отвечает: выгонять больных на улицу не дам! Тот — ах так! Тогда я к комиссару, еще куда-то… ногами затопал и убежал. Так и нет его до сих пор.</p><p class="p1">— То есть все по-прежнему?</p><p class="p1">— Да по-прежнему, Ять, успокойтесь. Что вы так за сумасшедших-то переживаете? Или сюжет понравился?</p><p class="p1">— Сюжет, — с облегчением повторил Ять, — сюжет…</p><p class="subtitle">6</p><p class="p1">Не было человека, которому Ять рассказал бы правду о своем сюжете, потому что в психиатрическом отделении Лазаревской больницы вот уже восемь лет находилась его мать, безнадежная пациентка приват-доцента Зудова, — а это факт не из тех, в которых признаются. Он потому и не скопил сколько-нибудь значительных средств, что львиная доля всех его заработков уходила на содержание матери на полном пансионе: забрать ее домой и обеспечить уход он не мог, она нуждалась в круглосуточном присмотре и давно никого не узнавала. Он был единственным, кто еще мог вызвать у нее подобие осмысленной эмоции — но при виде его она всегда только плакала, словно знала нечто, о чем не догадывались прочие, и в первую очередь он сам.</p><p class="p1">…Болезнь ее была странного свойства — как объяснило седоусое немецкое светило, во время краткой гастроли освидетельствовавшее русских больных с новейшей европейской точки зрения, что-то случилось с височными долями, отвечающими будто бы за чувство времени. Для матери Ятя не существовало ни завтра, ни вчера. Каждый день она начисто забывала все, что делалось накануне. Ятю в ее воображении всегда было двадцать пять, он работал еще в «Глашатае», отец по обыкновению был в конторе, сама же она изо дня в день переводила один и тот же немецкий отрывок, который Ять выучил наизусть. Он не жил дома с двадцати, с тех самых пор, как начал зарабатывать достаточно, чтобы снять квартиру; неладное заметила прислуга. Ять долго не мог смириться с тем, что безумие бесповоротно. В душе он и теперь верил, что мать не безумна — нужно лишь столкнуть ее с точки, на которой застряло сознание; однако прошло десять лет, и ни война, ни революция, ни убийство Кошкарева и Шергина в соседнем корпусе, ни отсутствие электричества ничего не изменило в ее положении. Он был убежден, что и на руинах Лазаревской больницы — если бы, упаси Господь, ее разрушили погромщики — она встретила бы его расспросами о «Глашатае» и сетованиями на то, что отец работает слишком много; в этом безумии был героизм, высшее презрение к условиям быта — и в этом смысле он был истинным ее сыном.</p><p class="p1">Теперь он быстро шел к Лазаревской, не встречая по пути ни одного извозчика; нес банку французского яблочного повидла, которую Клингенмайер, не слушая возражений, вытащил из запасов и всучил ему. Охрану, выставленную у ворот больницы после убийства Кошкарева и Шергина, сняли неделю спустя: проход на территорию был снова свободен. В парке, пошатываясь от слабости, бродило несколько больных в линялых коричневых халатах; флигель душевнобольных — в глубине парка, темно-бурый, под восьмым номером, — хорошо был виден: обычно его скрывала листва. Старенькая сиделка Анна Ильинична укоризненно покачала головой — Ятя давно не было.</p><p class="p1">— Спрашивала? — ответ, впрочем, был ему известен. Сиделка покачала головой.</p><p class="p1">— Вы придете — оне и рады, — уныло сказала она, — а уйдете — и помину нет…</p><p class="p1">Он пошел по желто-коричневому коридору; навстречу страшно исхудавший, давно ему знакомый посетитель — они встречались иногда — вел все такую же огромную, разбухшую жену. Сумасшедших ничто не брало. Водянистая толстуха подняла на Ятя такие же водянистые, бесцветные глаза и проскрипела обычное «Вашей светлости кадетской матрафанский матрафет» — смысла этого приветствия не понимал никто. Муж, как всегда, неприятно осклабился.</p><p class="p1">Плата за отдельную палату была, по счастью, внесена еще в декабре; Ять помедлил на пороге, потом решительно, без стука, вошел.</p><p class="p1">Мать сидела к нему спиной, за столом, прилежно водя пером; чернильницы на столе не было, и пера она не обмакивала. Ять молча смотрел на ее худую спину и совершенно седые короткие волосы — она всегда стриглась коротко и так же требовала стричь ее в Лазаревской. Она не слышала, как он вошел, и он не сразу решился подать голос.</p><p class="p1">— Мама, — позвал он наконец. Она обернулась.</p><p class="p1">— О! Погоди, милый, секундочку. Я доканчиваю. Завтра, ты знаешь, срок, а у меня шесть страниц еще. Присядь, сейчас будем обедать.</p><p class="p1">Это был ее голос, ее интонация, так она всякий раз встречала его, еще когда не превратилась в машину, — и то, как ясно и радостно звучала ее речь, было для него неоспоримым свидетельством того, что мать прежняя, что рассудок ее цел, только помрачен.</p><p class="p1">Он знал все, что будет: мать дернет звонок, войдет сестра милосердия, внесет миску картофеля с ломтем хлеба, пойдут расспросы — все в одних и тех же словах; так было сначала в их доме, потом в Лазаревской, еще респектабельной и мирной; потом в той же Лазаревской, битком набитой ранеными, — к душевнобольным, впрочем, жертвы войны почти не попадали. Угодил туда с фронта только один офицер, которому взбрело в голову, что если целью войны является взаимное истребление, то покончить с войной можно быстрей, истребив своих; он убил пару своих солдат, но застрелиться не успел. Вскоре он впал в слабоумие и был перевезен в интернат для буйных.</p><p class="p1">В середине ритуала (он открыл повидло, она попробовала, похвалила, но, кажется, не почувствовала вкуса) и случилось то, чего он так ждал десять лет: между вопросом о том, что он намерен делать летом, и разговором о том, что жениться ему еще рано, мать вдруг прижала палец к губам, глазами показала на стены и, сложив пальцы щепотью, изобразила, что хочет что-то написать; он обшарил стол — чернильницы нигде не было, только в кармане пиджака был огрызок карандаша, подобранный недавно на улице: вдруг сгодится. Сгодился. Он сунул ей тетрадный листок, на котором она только что незримыми чернилами записывала воображаемый перевод.</p><p class="p1">— Италия, конечно, хорошо, но мне лучше, чем в Карташевке, нигде не бывало, — проговорила она, словно в расчете на шпиона, притаившегося за дверью, — сама же вывела на листе кривыми быстрыми буквами: «В городе нехорошо».</p><p class="p1">Ять кинулся к ней, схватил за руку — но она, гневно нахмурившись, вырвала руку и властным движением вернула его на место. Для кого-то они должны были и дальше разыгрывать свой спектакль.</p><p class="p1">«Сиди», — прочел он.</p><p class="p1">— А все-таки за границей чувствуешь жизнь, — подал он свою реплику. — Здесь — словно и не уезжал никуда…</p><p class="p1">Она кивнула; тут, перед переходом на женитьбу, была пауза, и мать с лихорадочной быстротой написала: «Повторяй все».</p><p class="p1">Он посмотрел на нее вопросительно.</p><p class="p1">«Каждый день повторяй все, ничего не меняя», — написала она. Буквы были крупные, листок закончился.</p><p class="p1">— Это глупости, мама, — засмеялся он. Надо было любой ценой разговорить ее: она впервые за десять лет вырвалась из замкнутого круга повторений. Если вышибить ее из колеи безумия можно было только ценой революции — пусть будет революция. Теперь он по крайней мере мог проникнуть в причины ее помешательства, а значит, найти и выход.</p><p class="p1">— Глупости не глупости, а отец твой сделал мне предложение, только получив место, — говоря это, она не переставала писать на другой стороне листа, прорывая бумагу. «Если повторять, можно удержаться», — прочел он.</p><p class="p1">— Я давно обеспечил себя.</p><p class="p1">«Ежедн.», — написала она.</p><p class="p1">— Ну, посиди еще, а я допишу, — сказала она наконец, и в это время он обычно уходил, но теперь уйти просто так было немыслимо. Он подошел к матери, умоляюще заглянул ей в глаза и стиснул руку.</p><p class="p1">— Витечка, Витечка, — повторила она вдруг почти беззвучно и, обхватив его голову, заплакала. Больше он не добился ни одного осмысленного слова, — она сидела на своем стуле, уронив руки, и тупо смотрела на дверь.</p><p class="p1">— Но ведь я не Виктор, вы-то знаете, — больше всего боясь сорваться, повторял он Зудову.</p><p class="p1">— Конечно, нет, — спокойно кивал тот.</p><p class="p1">— Тогда что же это такое?</p><p class="p1">— Это довольно редкий случай, — Зудов уже накапал ему успокоительных капель, предложил чаю, утешил как мог, — но Ять все не желал смиряться, что никакого прорыва нет. — Я давно догадывался, а в прошлом году это стало очевидно.</p><p class="p1">— Как вы могли не сказать мне?</p><p class="p1">— Видите ли, вы могли изменить свое поведение… это встревожило бы ее… Я знал, что рано или поздно она вам скажет. В этом безумии своя логика если каждый день делать все одно и то же — можно удержать мир в неизменном положении. Видимо, она что-то чувствует… догадывается… может быть, слышит наши разговоры… И сами подумайте: когда столько раненых в парке…</p><p class="p1">— Но ведь это началось десять лет назад!</p><p class="p1">— Значит, десять лет назад ей по каким-то причинам показалось, что скоро все рухнет.</p><p class="p1">— А почему она сказала мне только сейчас?</p><p class="p1">— С этим сложнее. Может быть, устала хранить тайну. А еще вероятнее, что-то заметила в вас… и позвольте вам заметить, вы в самом деле переменились. Вид истощенный, явное малокровие.</p><p class="p1">— Наверное, я тоже схожу с ума, — кивнул Ять. — И она чувствует — ведь я не чужой ей.</p><p class="p1">— Это вряд ли. Мне она тоже намекала… впрочем, врач для душевнобольного — почти родственник. Хотела предупредить…</p><p class="p1">— Но, значит, все это время в ней идет напряженная душевная жизнь! Значит, она доступна убеждению… контакту… понимает свое положение, что всего ужаснее… Зудов покачал головой.</p><p class="p1">— Жизнь — идет… но ведь и лошадь ходит по кругу. Это замкнутый круг, без выхода. И движется она по нему в самом деле очень интенсивно — но тем меньше шансов, что кто-то будет услышан. Не беспокойтесь, при малейших признаках беспокойства я назначу новое лечение — может быть, снотворное, может, душ…</p><p class="p1">— Больницу не закрывают?</p><p class="p1">— Пока нет. Ходят слухи, что переформируют… но больных в любом случае не выкинут на улицу. Это ведь совсем с ума сойти надо. — Как все психиатры со стажем, Зудов относился к безумию в высшей степени иронично и понимал, что каждый давно рехнулся по-своему.</p><p class="p1">Он не успел договорить, как в кабинет его ворвался маленький небритый человечек с воспаленными глазами. Ять узнал его тут же.</p><p class="p1">— Не смеете, доктор! — кричал он, издевательски подчеркивая слово «доктор». — Не выйдет! Вы можете так и этак, но против мандата вы никаким макаром не можете! Революция — это не тити-мити! Революция имеет себя полагать через раскрепощение всех, всего! Вы не можете больше держать за ужасными дверями того, кто имеет проекты! Я пришел с одним полномочием, а приду с двумя полномочиями!</p><p class="p1">— Этот вот, — спокойно продолжал Зудов, не обращая внимания на вопящего гостя, — давний пациент Семеновской больницы, доктор Калинин публиковал в «Психиатрическом вестнике» лет пять назад его проект переустройства городской архитектуры. Пишет примерно по проекту в месяц. Теперь у него идея — освобождение душевнобольных. Достал где-то мандат, подделал подпись кого-то из комиссаров, является каждый день…</p><p class="p1">Красноглазый оратор затих и не прерывал журчания зудовской речи. Долгой тренировкой Зудов выработал особый стиль разговора с душевнобольными — они не противоречили ему и гипнотически слушали, после чего часто засыпали, обессиленные.</p></span>
