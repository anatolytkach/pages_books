<span><p class="p1">Он спустился вниз. Дверь участка была заперта снаружи на гигантский висячий замок. Караул был теперь не нужен. Ять забарабанил в дверь. В ответ донесся град ругательств на незнакомом гортанном языке. Голос, однако, с несомненностью принадлежал Маринелли.</p><p class="p1">— Маринелли, это я! — крикнул Ять. — Откуда замок — вы не знаете?.</p><p class="p1">— Он замок с собой принес, — отозвался печальный голос Пастилаки. — Это с его склада замок, он там лопаты хранит. Ключ всегда при себе носит. Ясно, безнадежно подумал Ять. Каждый входит со своим символом государственной власти; этот пришел с замком.</p><p class="p1">— А на каком это языке вы сейчас ругались? — не удержался он. Любопытство было в нем едва ли не сильней сострадания.</p><p class="p1">— Меня научил владелец кофейни! — отвечал Маринелли. — Он утверждает, что это кавказские ругательства.</p><p class="p1">— Вы что, подумали, будто диктатор явился за вами?</p><p class="p1">— Да. Учтите, я дорого продам свою жизнь!</p><p class="p1">— Хотите вина? Я попробую передать вам через окно.</p><p class="p1">— Лучше сбейте замок!</p><p class="p1">— Э, не балуй, не балуй! — раздался голос позади Ятя.</p><p class="p1">Он оглянулся. Наискосок, в тенечке, сидел его давешний охранник — человек из отряда Свинецкого.</p><p class="p1">— Я и не приметил тебя, — удивился Ять.</p><p class="p1">— Слона-то он и не приметил, — процедил образованный босяк. — Там на базаре отряд набирают — дай, думаю, послужу. Скушный город Гурзуф, грабить некого. На две дачи слазил — тошшишша!</p><p class="p1">— Слышь, — сказал Ять. — Я ему бутылку передам — ничего?</p><p class="p1">— Бутылку можно, — зевнул босяк. — Бутылку — милое дело…</p><p class="p1">Ять подошел к нему поближе и шепотом проговорил:</p><p class="p1">— А чтобы выпустить этих — сколько возьмешь? Босяк посмотрел на него как на недоумка.</p><p class="p1">— Ты чего? — сказал он наконец. — Ты с кем шутки шутишь?</p><p class="p1">— Но меня же ты… или забыл?</p><p class="p1">— Так то ж на ночь, — искренне недоумевая, как можно не понимать таких простых вещей, пояснил босяк. — И куда ты сбежишь, ежели у тебя баба тут? И начальство тогда в город уплыло, к тому же было больное на всю голову. А теперь такое начальство, что — ух! Ты мне хучь бочку выкати, хучь баб роту приведи — не, я с этим шутковать не стану… И тебе скажу — не пхуткуй. На Руси до трех считают, на Кавказе до одного…</p><p class="p1">— И многих он там навербовал, на базаре?</p><p class="p1">— Да человек, считай, до ста наберет, — уверенно сказал босяк. — А потом и больше. Делать в городе нечего, а он хучь порядок наведет…</p><p class="p1">— Что ж, он вам и оружие дал?</p><p class="p1">— Оружие у нас вот, — босяк молниеносно извлек и покрутил в пальцах перед Ятем превосходную стальную бритву. — Да от эсерчика кой-что осталось… В общем, хлюпа вроде тебя порешим, да и толстячка, если сунется куда, не упустим…</p><p class="p1">— Ять! Эй, Ять! — донесся снизу счастливый голос Грэма. — Я нашел, слышите? Все нашел!</p><p class="empty-line"/><p class="p1">Если подумать в тишине и при настоящей музыке, все сразу находится, — говорил Грэм, слегка задыхаясь. — У меня никогда не было кабинета: к чему? В кабинете ничего не высидишь. В ходьбе можно найти ритм, а у моря можно найти тему. И вот тема: старый моряк живет в поселке с маленькой дочерью…</p><p class="p1">Наивность Ятя была такова, что он посчитал это невинной болтовней, которой Грэм надеется отвлечь внимание босяка, чтобы сообщить нечто важное. Решив, что вино для Маринелли подождет, он вернулся с Грэмом в дом и вслед за ним поднялся к себе.</p><p class="p1">— Живет моряк с дочкой, — продолжал Грэм. — Он списался на берег, но делать береговую работу не умеет, как птица не умеет ходить. Город сплошь состоит из ужасных, приплюснутых жизнью особей…</p><p class="p1">— Да что вы нашли-то? — спросил наконец Ять. — Тут можно, все свои.</p><p class="p1">— Как — что? — не понял Грэм. — Это и нашел! Но послушайте сюжет: это будет феерия!</p><p class="p1">— Грэм… — Ять сардонически улыбнулся, поняв, что есть в городе люди, понимающие в жизни еще меньше, чем он. — Вы знаете, что в Гурзуфе переворот?</p><p class="p1">— Знаю, конечно, татар погнали. И что?</p><p class="p1">— Татар погнали вчера, — еще ехиднее улыбнулся Ять. — А переворот случился сегодня. И я сильно подозреваю, что он последний.</p><p class="p1">— Кто теперь? — по-прежнему радостно спросил Грэм. — Рыбацкое временное правительство?</p><p class="p1">— Если бы. Теперь диктатура. Сторож из соседнего имения.</p><p class="p1">— Садовник, — мрачно поправил Зуев.</p><p class="p1">— Так прогнать его к чертовой матери, и дело с концом, — беспечно рассмеялся Грэм. — Татары — это я еще понимаю: татар много, и у них есть опыт ига. Но садовник…</p><p class="p1">— У садовника гораздо больший опыт ига, — передразнил его Ять. — У Зуева отбирают дом, нам с Татьяной предписано покинуть город, а в участке сидит певец Маринелли, которого хотят кастрировать.</p><p class="p1">— Ловко, — уже серьезнее заметил Грэм, взглянув на стенные часы. — И это все к трем часам дня? Ловко.</p><p class="p1">— Это не все. Он ввел новую орфографию, построенную на фонетическом принципе. Пишите, как слышится, но не так, как слышится вам, а как ему. Ему все слышится с кавказским акцентом: тарэлька, но — сол. Понимаете? Русский язык облагорожен клекотом горного орла.</p><p class="p1">— Его еще не растерзали? — деловито спросил Грэм.</p><p class="p1">— Напротив. Он пользуется в городе полной поддержкой. Наконец-то порядок и все прочее. Кроме того, за него все босяки и дуканщик.</p><p class="p1">— Так я пойду ему уши оторву, — беззаботно предложил Грэм. — Или, если хотите, вместе.</p><p class="p1">— Будет вам! — не выдержал Зуев. — Разве об этом сейчас надо думать, Господи! Надо понять, как организовать оборону…</p><p class="p1">— Тут мы, видите ли, решили не отдавать дом, — пояснил Ять. — Они завтра придут выселять Зуева и вселять дуканщика, а мы не пустим. Может, постреляем, может, восстание подымем… Короче, есть план забаррикадироваться. Айда с нами?</p><p class="p1">— Что ж, — сказал Грэм. — Побывать в осаде — я всегда с удовольствием. Я как раз хотел писать об осаде, но не давалась развязка. Есть повести, которые без пули не окончишь.</p><p class="p1">Словно в подтверждение его слов, послышались одиночные выстрелы, щелкавшие в горах и отдававшиеся многократным эхом.</p><p class="p1">— Атакуют, — с досадой прошептал Грэм. — А мы не готовы… ничего не сделали, черт!</p><p class="p1">— Почему ж они с той стороны заходят? — не поверил Ять. — Нет, это не садовник…</p><p class="p1">И впрямь, это был не садовник. В Гурзуф входил сводный анархо-черножупанный отряд под командованием эсера Свинецкого. Во главе его, рядом со Свинецким, разбойно высвистывала дикий степной мотив видная балаклавская анархистка Татьяна Ястребова по кличке Птича. Вслед за нею поспешали три ее телохранителя — бывший поручик Опалинский, беглый монах Жигунов и толстый матрос Сидоренко, лихо горланивший на мотив «Яблочка»:</p><div class="poem">
<div class="stanza">
<p class="v">— Эх, Родина,</p>
<p class="v">Да ты уродина!</p>
<p class="v">Вам уродина,</p>
<p class="v">А нам смородина!</p>
</div>
</div><p class="subtitle">25</p><p class="p1">Барич пришел в маске лешего, Пемза оделся звездочетом (халат, колпак), даже бледный секретарь нацепил смешные заячьи уши, выклеенные из цветной бумаги. Аламида был в черной хламиде неизвестного происхождения, придававшей ему чрезвычайно торжественный вид. Да и случай был подходящий — последнее заседание «Всеобщей культуры», просуществовавшей ровным счетом две с половиной недели.</p><p class="p1">Удивительно, как они за эти шестнадцать дней притерлись друг к другу — тридцать человек, сплоченные полной изоляцией от прочего мира. А возможно, ничто так не сплачивает, как обреченность, — все с самого начала понимали, что делают мертвое дело. В «Культуре» были не одни елагинцы, но и добрый десяток приблудных персонажей, осколков бурной и тоже обреченной питерской литературной жизни тринадцатого года. Не было задачи более абсурдной, чем приобщение эстетов к народному просвещению, — но самая ее абсурдность и заведомая неосуществимость задачи были как-то сродни болезненному эстетизму Грабского, Працкевича, Тулина, Савина и оформителя предполагавшейся серии художника Хорошевского, прелестного, легкого человека, все делавшего шутя, щеголя, который и работает легко, щегольски, и так же голодает, и так же когда-нибудь умрет. Казарин им любовался.</p><p class="p1">За две недели они успели создать целую культуру «Культуры» — Корнейчук завел альбом, куда во время заседаний по очереди писали всякую чушь, приходящую в голову; Грабский сочинил драму в стихах «Противоестественный отбор» — о спорах при составлении проспектов; Барич испек цикл пародий — на Хламиду, Корнейчука, Казарина; все были узнаваемы, над каждой смеялись. Восемь заседаний (Корнейчук сетовал, отчего их не сделали ежедневными) сдружили всех — и не зря сказал Хламида в прощальной речи, что для одного этого уже стоило затевать революцию, прости Господи. Хламида полагал, что узнал о разгоне первым: ему протелефонил Чарнолуский и, пресекая расспросы, сообщил, что сделать ничего нельзя. «Им не нужно быть вместе. Кому-то наверху кажется, что это контрреволюция. Они стерпят инакомыслие, но заговора не стерпят», — сказал он, не дав возразить. Поразмыслив, Хламида признал соображение здравым.</p><p class="p1">— А издательство? — на всякий случай спросил он.</p><p class="p1">— Не знаю, — честно ответил Чарнолуский. — Вероятно, книги для чтения победившего класса будет теперь отбирать сам победивший класс.</p><p class="p1">— Но он понятия не имеет, из чего выбирать!</p><p class="p1">— Тем лучше для него. А впрочем, я не сказал последнего «нет». Может быть, потом, со временем… или их привлекут к составлению новой орфографии — нельзя же вечно без правил? Но сейчас несвоевременно, объясните им, как сможете…</p><p class="p1">Хламида не мог; и, придя на Елагин, был рад обнаружить, что во дворце все уже знают.</p><p class="p1">Итак, Хламида был в хламиде, Барич — в маске, Казарин — в банте, Корнейчук — с носом («Я всегда с носом», — шутил он) и даже Працкевич — в уродливой черной полумаске, очевидно, выкроенной из старого сюртука (ничего не умел делать руками). Этот Працкевич вообще был явный безумец — только в десятые годы такой безумец мог считаться поэтом, — но в стихах его на двадцать мусорных строчек попадалась одна алмазная; бывали и чистые восьмистрочные шедевры, пронизанные тоской такого невыносимого одиночества, что Казарин не смел смеяться над ним; говорят, такая тоска бывает перед припадком — сердечным или эпилептическим, а Працкевич жил от припадка до припадка.</p><p class="p1">Сходились, рассаживались; Хламида, просивший не опаздывать, по-прежнему строго посматривал на пустые стулья. Хмелев очень быстро перестал ходить на заседания, остальные являлись исправно. Последним влетел Корнейчук с тяжелым альбомом под мышкой.</p><p class="p1">— Что ж, все в сборе! — покашливая, встал со своего места Хламида. — Приветствую вас, господа, на далеко не последнем заседании редакции «Всеобщей культуры». Говорю так не с намерением вас утешить, ибо не люблю утешителей — они для того только заговаривают чужую боль, чтобы их ею не тревожили. Не стану говорить также, что полюбил вас — ибо двух недель мало для таких словно в наше время день идет за месяц, а потому знаю вас больше года и люблю, чертей лиловых! — воскликнул он, улыбаясь сквозь слезы, глаза его сияли густой синевой. — Люблю и верю, что не в последний раз мы собрались, потому что, рано или поздно, неизбежность нашей работы станет ясна всякому. Проспекты, нами составленные, я сохраню, и когда мы в скором времени встретимся — то начнем работу не с пустого места, а с этого вот фундамента, — он прихлопнул ладонью стопку листков, исписанных его мелким, прямым полууставом; буквы стояли отдельно друг от друга — так, читал Казарин в доморощенном пособии по графологии, пишут люди, которым никак не удается осознать связь между собой и другими. — Не падайте духом, будьте тверды и — не озлобляйтесь: те, кто разгоняет нас теперь, — не народ и даже не исполнители воли его. Народ — те, для кого мы трудимся; он, будет час, — и поймет, и оценит. Будет и наша библиотека — в сто, нет, в двести томов! Главное — не озлиться, не окаменеть в сердце своем: окаменеть — просто. Сколько я видел в жизни такого, что страшно казалось перо в руки взять: ну — чего ради! А — брал: без этого — уж совсем страшно.</p><p class="p1">А теперь, — закончил Хламида, снова улыбаясь прелестной застенчивой улыбкой, так удававшейся ему, — возьмем от жизни то единственное впечатление, которое брать от нее безболезненно и даже приятно вельми. Сие есть граппа, сиречь италианский самогон, из личных моих искитанских запасов. — Он жестом фокусника извлек из-под полы огромную оплетенную бутыль. — Берег сие для спрыскивания первой нашей книжки, но для будущей серии найдется у меня кое-что и потом, а теперь хочу предложить вам сию усладу рыбарей искитанских. Кисловатая, но чистая, и проистекает от нее, как писал преподобный Филофей-книжник, сила духовная и веселие сердечное, без примеси злобства и похоти. Виночерпий, prego! — и подвинул бутылку к ушастому секретарю. Тот уже расставлял перед собою заранее приготовленные стаканы, из которых на заседаниях «Всеобщей» пили обычно бледный чай с желтым сахаром. Сегодня чаю уже не было — но не сказать, чтобы замена огорчила елагинцев.</p><p class="p1">— Первую — за «Всеобщую»! — возгласил Хламида.</p><p class="p1">— Не чокаясь, — тихо добавил Горбунов.</p><p class="p1">— Чокаясь! — громко и властно настоял председатель. — Хоронить меня — рано, говаривал мой дед: я еще на твоих похоронах простужусь!</p><p class="p1">Несмело посмеялись, выпили по первой; народу было много, и при всей огромности бутыли больше чем на три глотка на каждого в ней не набиралось.</p><p class="p1">— А как вы полагаете, — спросил Горбунов, который за последнее время проникся к Хламиде если не полным доверием (никогда не любил его литературы), то неким подобием солидарности: оба окали, оба постранствовали. — Как вы полагаете: если мы откажемся расходиться — это их отрезвит? Хламида сразу помрачнел. Вопрос был неприятный — еще и потому, что правильного ответа не существовало.</p><p class="p1">— Видите ли, — сказал он, помолчав. — Я могу ведь с вами говорить откровенно — не так ли?</p><p class="p1">— Конечно, конечно, — зашумели за столом.</p><p class="p1">— Так вот, — покашляв, как всегда в начале долгой речи, заговорил Хламида. — Сект — боюсь я, с тех еще пор боюсь, как Малинин свой скит сгубил. Не слыхали? Ну — как же, громкая была история. Мужичок невзрачный, а — страшный: силу имел редкую, морок такой наводил, что, помню, чуть живой от него ушел. Последователей у него было, не совру, до трех тыщ человек; он, конечно, не всех учениками признавал, в ближнем кругу числил ровно сотню. У него это дело очень четко было поставлено: тридцать три — ад, это оглашенные; тридцать три — рай, это ближние; ну, и еще тридцать три — междуцарствие, как он называл. Сам он, сотый, был Петр — с ключами от рая; хорошо, что Господом он себя не провозгласил, это тонко было, умно. Я еще, помню, умилился. Что он в раю вытворял — вы уж, верно, догадались (Казарин догадался сразу — все истории Хламиды рано или поздно сворачивали на свальный грех). Любопытно, что в рай к нему очень все стремились; одна только, кого любил он по-настоящему, Галей звали, — все просилась в ад; интересная была девушка, некрасивая, но из тех, что — поглядишь в глаза и пропал. Ну вот: слава его была велика, «круги» по всей России пошли — извините за каламбур, кругами называл он общины, устроенные по его образцу. Церковь терпела, терпела да и не вытерпела: о свальном грехе в городе стало известно, он на свои радения райские и писателей приглашал, обещал «сладость малинову» и малиновый звон — я не пошел, мне — хватило впечатления от разговоров его. Собирались они на радения в лесу — выстроили себе там терем, почти дворец с виду, в этаком, знаете, русском стиле. Из города выслали полицию, войска — уговаривали сдаться. Он в ответ: кто нас тронет — зажжемся! И они кричат, кружане-то его (так они себя называли): голодом морите, пулями стреляйте — не вылезем! Что делать? Ждали три дня, а на четвертый штурмом пошли. Думали — он и впрямь запалиться хочет; ни-ни! У них у всех бритвы были припасены, да дурманом каким-то он обкормил их: как только солдаты на приступ — тут же все в скиту, и мужики, и девки, себе вены взрезали. Дом, говорят, весь в кровище был — потолки забрызгало. Правда, себя-то он тронуть не решился, — и тогда Галя, та, которую любил он, вся уже в крови, сама к нему кинулась и райский-то ключ под самый корень отхватила. Историю сию знать — следует: очень она остерегает от того, чтобы считать себя, знаете, орденом обреченных. Кончается тем, что — все вены режут, а главный боится; хорошо, коли найдется кто — нечто ему отхватить…</p><p class="p1">— Можно, конечно, и так сказать… — прервал молчание Казарин. Он не хотел вступать в спор, ибо сам еще не определился: оставаться было все тошней, уходить — все стыдней. Однако и сдерживаться было уже нельзя: он выговаривал наконец то, о чем давно думал бессонными ночами, рядом с тихой и тоже неспящей Марьей. — Можно сказать: не доводите их до зверств — и зверств не будет. Не запирайтесь, не протестуйте, не выходите на митинги — и вас не посадят, не поведут пытать… Но это и значит попустительствовать — ведь тогда они еще верней перебьют всех, кто не они! Пусть не изжарят живьем, пусть только повывернут суставы да и повесят из милости, — но чего ждать, помилуйте? Неужели по всему, что они делают, не видно: правда теперь будет одна, и она у них? Он задохнулся и умолк.</p><p class="p1">— Не могу я с вами больше спорить, Вячеслав Андреевич, — грустно отозвался Хламида, — ибо в словах ваших уже слышу голос осажденных в крепости. Разойтись и бороться или уж боевым отрядом взять Смольный — это я могу понять; но запираться в скиту…</p><p class="p1">— Что мы можем взять?! — подал голос Горбунов. — Какой боевой отряд, если у нас тут один человек моложе сорока, и та девушка?.</p><p class="p1">— Я вас в отряд не зову, — пожал плечами Хламида. — Я вообще думаю, что — хватит отрядов-то, не в отрядах истина…</p><p class="p1">— А сами бы в отряд пошли? — Граппа окончательно развязала язык Казарину; мало надо голодному человеку, чтобы охмелеть!</p><p class="p1">— Теперь — не пошел бы, — задумчиво проговорил Хламида, — а как повернется — не знаю… Никогда ведь не скажешь.</p><p class="p1">— Что же должно произойти? — не отставал Казарин.</p><p class="p1">— Вот ежели вы запретесь да запалитесь, тут бы я уж подлинно в отряд пошел — вас вытаскивать. — Хламида посуровел и принялся нервно теребить усы. — А насчет другого… я — не солдат, то есть другого полка солдат. Были, знаете, солдаты Преображенского полка: так вот, я — Преображенского. Мое дело — мир преображать, а штыком его не преобразишь… нет! И остановиться трудно… Посему — позвольте об одном только просить вас: воздержитесь от боевых, действий. Сам же я не премину еще не раз зайти к вам — не для работы уже, а для одного только удовольствия говорить с вами. Пустите?</p><p class="p1">— Конечно, конечно, — зашумели за столом.</p><p class="p1">— Вот и добре, — снова улыбнулся Хламида. — Хотя предпочел бы я заходить в гости к каждому из вас по отдельности — а?</p><p class="p1">Несколько виноватых улыбок было ему ответом.</p><p class="empty-line"/><p class="p1">Последним сюрпризом Хламиды был Наппельбаум, обвешанный своей техникой. Он долго регулировал магниевую вспышку — лишь у лучших фотографов Петербурга было это приспособление, позволявшее снимать в темноте без электричества; например, на природе. Наконец установил, поджег, щелкнул — группа запечатлелась на века. Это первое и последнее фото «Всеобщей культуры» — пятнадцать человек на втором этаже Елагина дворца; кто-то не захотел фотографироваться, кто-то ушел к себе. В центре — Хламида с бумажным корабликом в руке; у его ног картинно лежат Працкевич в полумаске и Корнейчук с длинным приклеенным носом. Секретарь на всякий случай сдернул бумажные уши — часто ли доведется сниматься в таком обществе? Казарин стоит крайним справа — у него понурый, виноватый вид. Пемза приобнимает хорошенькую Веру Головину, — она пришла сказать, что кружок уже собрался на очередной урок. Так Вера Головина осталась в вечности — обычно под этой фотографией ее обозначают как «Неизвестную», других материальных следов ее существования нет — год спустя она умерла от тифа.</p><p class="subtitle">26</p><p class="p1">Пока Казарин сидел на прощальном заседании «Всеобщей культуры», Ашхарумова быстрым и широким, почти мужским шагом шла на Сенной рынок, где с началом весны открылся писательский книжный ряд.</p><p class="p1">У Ашхарумовой было несколько походок (и возрастов, и голосов): эта текучая протеичность ей самой казалась залогом если не вечной жизни, то по крайней мере долгой молодости. Люди вокруг начинали коснеть поразительно быстро. Некоторые так и умудрялись в двадцать лет застыть, при этом еще гордясь своей неизменностью, — и в пятьдесят рушились в одночасье, как стены. Смешно в Петрограде восемнадцатого года думать, что в мире остались принципы. Мир давно уже текуч, — а может быть, и в другое время, в каких-нибудь брадатых семидесятых тоже было так, но не было Ашхарумовой, чтобы понимать это.</p><p class="p1">Мир летел, и она летела в текучем мартовском мире, в разрушающемся городе; двадцать минут назад она была женой, сейчас — свободной странницей, кем будет через десять минут — Бог весть. Вокруг ослепительно плавился лед. Оплавлялся и город, избавлявшийся от твердых форм: осыпались здания, смягчались контуры, размывались границы улиц. Текучий мир сверкал. Ашхарумова таяла в его блеске: ей было девятнадцать лет или тысяча лет, а в общем, и не было никакой Ашхарумовой. Умрем — перейдем в эти камни или почву, перетечем в иные формы, ручьями хлынем по улицам, сольемся с облаками, вплетем голоса в единый хор бытия. Она пролетела по Зелениной, протекла по Дворцовому, проросла в Сенную, и лучистый, тающий след тянулся за ней.</p><p class="p1">Писательский ряд на Сенной являл собою зрелище гротескное — как почти все тогдашние зрелища: нищета и жалкость дошли до такого абсурда, что перестали вызывать слезы, а только дряхлый, мудрый смех, каким, должно быть, последние римляне смеялись над собою и галлами. Где-то в тайных, полулегендарных питерских подвалах еще выменивались драгоценные рукописи на такие же сказочные, недостоверные вещи — фунт масла, окорок; но на Сенном торговали в основном литературой русского золотого века, наивными альманахами, где шла площадная литературная борьба, где ловили оппонентов на опечатках и с витиеватым многословием намекали на их тайные грешки — проигрался, донес, жил на содержании… Публика была самая живописная и разношерстная: тут было начало распада петербургской школы — заумники, «ушкуйники», пустоглоты, ничевошники, метафористы, аквилеги, людоходы и вовсе уж загадочные квазеры. Тут тихо стоял похожий на гнома седобородый Труфанов с пачкой узорчато переписанных «Северных старин», якобы собранных во время радений под Архангельском, — на деле же взятых из сборника былин и обработанных до полной невнятицы; был замечен со своей кодлой распевавший похабщину Несеин («А прозванье-то мое — от того, что крестьяне мы не простые: не сеем, не жнем; крестьяне не по труду, а по нутру»). Пару раз пришел Мельников — повидаться с товарищами своих загадочных странствий; он раздавал местным полусумасшедшим крестовские пайковые папиросы и расспрашивал о знакомых бродягах, сведения о которых приходили по всероссийскому беспроволочному телеграфу. Что Константин? что Филимон? цел ли Рыжий Полковник? Все были живы, слава Богу; болышшство подались на хлебный юг. Одна беда — крестьяне уж очень озверели. Из темного разговора заумников, впрочем, немногое можно было понять. Барцев забегал сюда при первой возможности. Он еще оставался на Крестовском, не видя разницы между уходом и неуходом. И Льговский был прав, и Корабельников мил, а горячая каша — не последнее дело. Стечин, Аронсон и маленький, бледный Альтергейм (с пятнадцатого года в силу известных причин вся его семья писалась Альтеровыми) рылись в книжных развалах под равнодушным, отсутствующим взглядом букиниста, который, кажется, и не стал бы преследовать вора, — но в книжных рядах не воровали. Там их и увидела Ашхарумова: трудно было не узнать рыжего, широколицего, смешного малого, читавшего бессмысленные стишки у Зайки. Прав он был: при всей несвязности стишков она до сих пор помнила пару строчек. «Отвечает ирокез: я желал бы наотрез». Она поймала взгляд Стечина, помахала ему и подошла.</p><p class="p1">— Видите, Маша, Альтергейма в действующую армию провожаем, — сказал Стечин с непонятной интонацией — то ли гордясь, то ли, как всегда, насмехаясь. — Это поразительно: знаете, что я недавно слышал от одного сумасшедшего математика? Чем меньше для события предпосылок, тем больше вероятность, что оно случится. Ей-Богу, начинаю думать, что история движется по этому закону. Не говорю уже про всю прошлогоднюю заваруху, но призвать Альтергейма… Можно жарить соловья, но жарить морского конька…</p><p class="p1">— Ничего не понимаете вы со своим математиком, — ровным, бледным, бумажным голосом сказал Альтергейм, не переставая листать тонкими пальчиками французскую книжечку in octavo. — Надо же посмотреть, в чем там дело. Я открыл способ соединять далекие слова, способ вытолкнул меня к соединению с далеким материалом.</p><p class="p1">— Это надо Льговскому рассказать, — кивнул Барцев. — Он тоже все: материал, материал…</p><p class="p1">— Нет, это, право, удивительно, — продолжал Стечин. — Что б им, кажется, призвать меня? Ну, хоть Павла? Одень его в шинель — и готов Кузьма Крючков. Но Альтер, Господи! Отец старик, мать, сестренка четырнадцати лет, студент университета, все детство проболел… Лотерея там у них, что ли? У меня в квартиру напротив вселилось пролетарское семейство: здоровяк на здоровяке, два брата с женами. Ни одного дня их трезвыми не видел. Напьются — бьют детей, топором перила рубят, соседи боятся нос высунуть… Отчего их никто не призовет? Или они теперь хозяева, а мы работники? Но при таких работниках недолго им кормиться…</p><p class="p1">— Надо же посмотреть, в чем там дело, — ровно повторил Альтергейм.</p><p class="p1">— А что, не являться никак нельзя? — спросила Ашхарумова.</p><p class="p1">— Можно, вероятно — Альтергейм пожал плечами. — Но скучно… Допустим, я уйду из дома; перееду к тетке… тетка с сыном живет, как с мужем. Очень мне интересны их игрища. Если все равно из дому, так лучше хоть подальше от города…</p><p class="p1">Он сказал о теткином сожительстве с сыном, не повышая голоса, не меняя интонации, и Ашхарумова подумала было, что ослышалась, — но тут он оторвал взгляд от страниц и взглянул на нее прямо; в его взгляде не было и тени восхищения ее красотой, здоровьем и силой, она не привыкла, чтобы на нее смотрели так тускло.</p><p class="p1">— Вырождение, — сказал Альтергейм, — что же вы хотите.</p><p class="p1">Ашхарумовой нравилось, когда люди не боялись смерти и даже искали ее. Но этот бумажный солдатик был как-то изначально мертв, и она его испугалась. Как все мертвецы, он знал о людях одно худшее и сейчас, глядя прямо в ее круглые счастливые глаза, что-то понял о ней; она вся выцвела под его взглядом. Ей стало понятно, чего он ищет на фронте, — и чем быстрее найдет, тем лучше для всех.</p><p class="p1">— Какая вы свежая, — сказал Альтергейм бесцветным фальцетом. Комплимент был сомнительный, от него припахивало мертвецкой: свежий труп, богатый материал. Видя, как она поморщилась, Стечин на правах друга поспешил спасти положение:</p><p class="p1">— Ну что там, среди ваших ископаемых? Царя не выбрали еще?</p><p class="p1">— Там сегодня последнее заседание «Всеобщей». Слава с ними остался. Что дальше будет — неизвестно; разгонят, по всей видимости.</p><p class="p1">— Разгонять не надо, — сказал Барцев. — Надо богадельню. Прямо сразу, только вывеску сменить. Как вы с ними выдерживаете, не пойму, честное слово. Приходите к нам!</p><p class="p1">— Знаешь, Паша, — усмехнулся Стечин, — наивно думать, что вид молодого дурака внушает больший оптимизм, нежели вид дурака старого. Старый дурак по крайней мере скоро излечится навсегда, а молодому еще лет сорок мучиться… Впрочем, по нынешним временам не поручусь.</p><p class="p1">— Сам дурак, — беззлобно отозвался Барцев. — Нет, Маша, я всерьез: не хотите на Крестовский — я понимаю. Старцы заклюют. Но не на Крестовском же свет клином, приходите в «Левей»!</p><p class="p1">— Где это? — удивилась Ашхарумова. Она никогда не слышала ни про какой «Левей».</p><p class="p1">— Это кружок, который левей Корабельникова, — пояснил Барцев. — Туда Льговский сейчас перешел и мигом всех подмял. Честное слово, приходите. Они на квартире у Калашниковых собираются — знаете сестер Калашниковых? Надя, Мила и Люба. Очень славные девушки, глупые такие. Ашхарумова рассмеялась, хотя и понимала, что это нехорошо.</p><p class="p1">— Приходите, правда, — уговаривал Барцев. — Вы там в своем дворце совсем скиснете. У вас даже танцев не бывает.</p><p class="p1">— А у вас бывают?</p><p class="p1">— На Крестовском? Да у нас, можно сказать, одни танцы! Про кружок Акоповой слышали?</p><p class="p1">— А, Марьям-нагая…</p><p class="p1">— Точно. В последнее время еще эквиритмическая студия открылась. Козухин, не слыхали? Говорит, что надо вращаться, вращаться и попасть в ритм земли, и тогда начнешь видеть будущее.</p><p class="p1">— Стало быть, земля видит будущее?</p><p class="p1">— Ну, это он так думает. Крутился, крутился и Корабельникову сказал: вы, говорит, последний. Корабельников даже побледнел весь. Он-то думает, что он первый. Стал допытываться, что Козухин имеет в виду. Козухин сказал, что лучше ему этого не знать. Значит, точно по стихам последний. Корабельников плюнул и сказал, что с шаманами пусть Мельников разговаривает, ему ближе. В общем, у нас своя ерунда, у вас своя.</p><p class="p1">— Что же вы не уйдете? — улыбнулась Ашхарумова.</p><p class="p1">— Но ведь и вы не уходите.</p><p class="p1">— Мне есть для кого там оставаться.</p><p class="p1">— Ну и мне есть, — сказал Барцев. — Там каша прекрасная. Я вот знаю, что сейчас Валя про принципы скажет. Но ведь я за кашу не убивал никого. И они пока, — Барцев кивнул на стоящего неподалеку рослого матроса, — никого особенно не убили… Что, лучше было и дальше гнить?</p><p class="p1">— Да ничего я не скажу, — протянул Стечин и махнул рукой. — Я тебя с трех лет знаю, что мне с тобой спорить? Я не люблю, когда ходят с таким видом, будто им истина известна. Я гниль и знаю, что я гниль. И пусть не лезут со своими правилами. Ты любишь кашу, ну и люби кашу. Что мне за дело. Не хватало еще о политике спорить… Следующая стадия — гусарские анекдоты.</p><p class="p1">— Я знаю гусарский анекдот, — ровно проговорил Альтергейм, внезапно отрываясь от книги. — Его долго рассказывать, но история того стоит. Думаю, для дам в нем особенная пикантность…</p><p class="p1">— Я сейчас отойду, и вы расскажете, хорошо? — краснея и стыдясь этого, проговорила Ашхарумова. Менее всего ей хотелось бы выглядеть кисейной барышней, но она могла себе представить, каковы должны быть гусарские анекдоты от Альтергейма.</p><p class="p1">— Не стану, не стану, — успокоил Альтергейм. — Но тогда и вы сделайте мне одно одолжение. Других не понадобится. Приходите, в самом деле, завтра на проводы. Это не в «Левей», а у меня дома. Мне кажется, вам будет приятно на меня смотреть и думать, что больше вы не увидите меня никогда.</p><p class="p1">— Не нужно так говорить, — с усилием произнесла Ашхарумова.</p><p class="p1">— Никогда не говорите другому, что ему нужно. Просто приходите, будет весело. Свежо, — добавил он, улыбаясь тонкими серыми губами.</p><p class="p1">— В пять, — добавил Барцев. — Будут мальчики замечательные, из Петершуле.</p><p class="p1">— Вячеслава Андреевича захватите, — присоединился Стечин.</p><p class="p1">— Я не обещаю. Постараюсь, но не обещаю.</p><p class="p1">— И правильно, никогда ничего не обещайте, — сказал Альтергейм. — Просто приходите, и всё. Это Восьмая линия, двадцать пятый дом, на четвертом этаже. А квартиру вы и так угадаете.</p><p class="empty-line"/><p class="p1">Ашхарумова вовсе не была уверена, что явится на приглашение живого трупа, как она тут же про себя окрестила Альтергейма. Но Казарин весь следующий день мучился разлитием желчи, да и после прощального заседания «Всеобщей» он проникся настроением общей гордой обреченности: как ни иронизируй над собой, а даже самые здравые люди в их поколении были бессильны перед гипнозом общих мест и благородных собраний. Он знал, что смешон, и злился на себя за это. Ашхарумовой доставалось вдвое. «Нельзя же над всем смеяться! — выкрикнул он вдруг, ни с того ни с сего. — Нужно хоть к чему-то относиться серьезно, иначе к черту всё!»</p><p class="p1">— Ведь я здесь, я с тобой, — со всей мягкостью, на какую была способна, ответила Ашхарумова. — Я не ухожу никуда…</p><p class="p1">— Ради Бога, не нужно одолжений! Я прекрасно вижу, что тебя это тяготит…</p><p class="p1">— Это тяготит только тебя, Слава, ты снова придумываешь невесть что…</p><p class="p1">— Нет, я все понимаю! Тебе девятнадцать лет, тебе должно быть скучно в стариковском обществе… Но пойми ты, что сегодня эти старики — последние, кто спасает честь города! Если не всей страны…</p><p class="p1">— Ты сам мне говорил, что в осажденном городе нельзя сохранять здравомыслие. Тебе не кажется, что ты заразился от них?</p><p class="p1">— Но город-то вправду осажден!. — взорвался он. — Ты не видишь этого?</p><p class="p1">На самом деле он злился еще и потому, что боялся. Всю ночь после закрытия «Всеобщей» ему снились ночные дети.</p><p class="p1">— Осажденных городов не бывает, — улыбнулась Ашхарумова, пытаясь его обнять (он уклонился). — Это горожане придумывают, когда приходит зима. Они прячутся от холодов и вьюги, растапливают камины и ждут конца света. А можно выйти и поиграть в снежки…</p><p class="p1">Она произнесла это с той родной интонацией, с какой всегда рассказывала ему на ночь свои смешные сказки, их общие сказки, — и от того, что этот родной голос говорил бесконечно чужие ему слова, Казарин почувствовал себя еще более чужим ей, чем когда-либо прежде.</p><p class="p1">— Маша, — сказал он вдруг с такой живой болью, что она вздрогнула: нельзя же было, в самом деле, из-за этого искусственно вызванного осадного положения так серьезно растравлять себя! — Маша, кончится тем, что тебе придется уйти. Я вижу это. Я не дам тебе гибнуть за чужое дело, в этом будет страшная ложь. Чему поглумишься, тому поклонишься: я пришел сюда с тобой, чтобы найти угол, а нашел гибель. Я понимаю теперь, что ее-то и искал с самого начала — просто я видел ее… (он хотел закончить, в тебе, но вовремя поправился) не там.</p><p class="p1">— Слава, — серьезно сказала Ашхарумова, — я буду, где ты.</p><p class="p1">— Хорошо, хорошо! — Он все не успокаивался. — Но ты видишь, какой я сейчас. Сходи к матери, что ли… или что хочешь… но сейчас я могу тебе наговорить Бог знает чего, и сам потом с ума сойду от раскаяния. Иди, я отлежусь. Сам бы ушел, но видишь… — Он развел руками. Укрытый клетчатым пледом, желтый, высохший — он казался еще более невесомым, чем всегда. Ей стыдно стало своего здорового, сильного тела.</p><p class="p1">— Я приду вечером, — сказала она. — Но лучше бы мне посидеть с тобой, честное слово. (Вот ведь привязалось это барцевское «честное слово»!) Вдруг тебе что нужно, а никого нет…</p><p class="p1">«Мне сейчас и нужно, чтобы никого не было», — хотел он сказать, но сдержался. И Ашхарумова отправилась на Васильевский остров.</p><p class="subtitle">27</p><p class="p1">Крайний слева что-то делал, склонившись к столетнему, наверняка зольмановскому дивану, основательному, сделанному крепко и грубо; небольшая группа справа стояла на коленях у погасшего камина, еще трое дули в детские дудки, четвертый неподвижно лежал рядом на спине, и на груди у него, молитвенно сложив руки, сидел пятый. Шестеро в левом углу комнаты кружились в сложном и нерегулярном движении: двое с поднятыми руками, еще двое скакали на одной ноге, пятый шел гусиным шагом, шестой упер руки в бока.</p><p class="p1">— Что это? — шепнула Ашхарумова на ухо Барцеву.</p><p class="p1">— Композиция номер пять, — вполголоса ответил он. — Или пятнадцать, не важно. Опыт соединения разных ритмов в одном объеме.</p><p class="p1">— А-а, — кивнула Ашхарумова. Барцев посмотрел на нее и понимающе усмехнулся.</p><p class="p1">— Я сам понимаю, что шарлатанство. А все-таки идея в этом есть.</p><p class="p1">— Да я что же, — обиделась Ашхарумова, — я разве против. Им нравится, ну и ладно.</p><p class="p1">Зрители стояли в дверях, расчистив центр комнаты, из которой вынесли ради представления все стулья. Композиция номер пять или пятнадцать продолжалась уже минут десять; Ашхарумова появилась в разгар действа. Дверь в девятую квартиру была открыта, так что она сразу поняла, куда ей. Она постучала — никто не отозвался: как выяснилось, все уже смотрели представление. Квартира Альтергеймов была большая, да и семья немаленькая; в последний гражданский день родители не мешали сыну праздновать печальный праздник, как ему хотелось, — но уйти им было некуда, и они сидели в своей спальне. Видно было, что семья старательно налаживала быт — но он разлезался; сестра была с дурным характером, тетушка со странностями, отец — с вечными драмами на службе; в комнате сына устроен был род гимнастического станка, с множеством лестниц и перекладин, личной отцовской конструкции, — но трудно было представить себе, что можно упражнять в этой паутине кое-как скрепленных железок и деревяшек; юный Альтер, презиравший семью за смену фамилии, за государственную службу отца, чиновника в полицейском управлении, за экономию, за отчаянные и жалкие попытки скрепить расползающийся уклад, — с первых сознательных лет упражнялся единственно в презрении и скоро стал писать стихи, очень воздушные и музыкальные, но лишенные и намека на смысл. У него был круг поклонников и единомышленников, писавших очень похоже, — все мальчики из таких же небогатых, большей частью немецких или еврейских семей, тщетно пытавшихся стать русее русских. Обособленный кружок Альтера, неохотно принимавший новых участников, стал известен Стечину — и Стечин, увидев тут долгожданную новизну, ввел на Альтера подобие моды.</p><p class="p1">Композиция окончилась внезапно: дудевшие перестали несвязно дудеть, пляшущие — неритмично плясать. Зрители молча расселись по диванам и стульям, снова расставив их вдоль стен. Обсуждать увиденное тут было явно не принято.</p><p class="p1">— Я вам сейчас покажу всех, — начал Барцев, но вмешался Альтер:</p><p class="p1">— Благодарю, Паша, но позволь мне. Как-никак это мои проводы, и уговорил ее тоже я. Справа налево: это Чашкин, писатель. У него четыре романа, а если считать так называемый ненаписанный роман, то пять. Ненаписанный считается вершиной жанра, поскольку каждый наполняет его своим содержанием. Вот Даниил, поэт. Это Катя, его кузина, она ничего не пишет, и потому считается, что как поэт она выше Даниила. Это Руфь Масарская, режиссер того, что вы только что видели. Рядом Лика Гликберг, вы о ней еще услышите. Она может подобрать формальное основание под все, что делают остальные. Назарьян, живописец…</p><p class="p1">Ашхарумова кое-кого помнила по январским посиделкам у Зайки. Она с ровным, доброжелательным любопытством оглядывала огромного Чашкина, чьи красные худые руки торчали из рукавов короткого пиджачка, приземистого Даниила, казавшегося еще ниже от того, что на голове у него был высокий цилиндр, его длиннолицую кузину Катю, нервную мужеподобную Руфь, непрерывно курившую самокрутки. Угощение было супрематическое, то есть заурядно-нищее, как; в большинстве петроградских квартир в марте восемнадцатого года: водка, вобла. Говорили о том, можно ли остаться чистым, поселившись на Елагине или Крестовском, продавшись за репутацию или паек. В разгар торжества, все больше напоминавшего средневековый диспут обо всем сразу, Ашхарумова подсела к Лике Гликберг, одиноко сидевшей на диване. Ножки ее не доставали до полу.</p><p class="p1">— Вы тоже думаете, что на Елагине и Крестовском всех интересуют только дрова и каша? — спросила Ашхарумова. Гликберг поморщилась:</p><p class="p1">— При чем тут дрова, каша… Люди реализуют себя. В политике это по понятным причинам стало невозможно, в литературе — еще меньше…</p><p class="p1">Она говорила книжно, гладко, ровным голосом, который Ашхарумова никогда не приняла бы за голос хорошенькой ровесницы.</p><p class="p1">— Но на Крестовском все-таки занимаются политикой? — не сдавалась Марья.</p><p class="p1">— Это другое, это трансформация, — небрежно пояснила Гликберг. — Наш термин: приложение формального анализа к явлениям жизни. Крестовцы — трансформированное стремление к первенству: замена «лучших» на «единственных». Добиться эстетического превосходства уже невозможно, поскольку традиционная шкала рухнула. Борьба переносится во внеэстетические сферы, в том числе и в политику, это просто.</p><p class="p1">Все это она говорила как бы между прочим, словно была поглощена тайной думой, от которой ее отвлекают ненужными разговорами. Ашхарумова никогда не отличалась робостью и прямо спросила Лику, что за тайная мысль ее терзает.</p><p class="p1">— Я трансформирую Пашу, — сказала Лика доверительно, глазами показав на Барцева. — Я прилагаю к нему наши способы, пытаясь прочесть его как текст… Но это текст без подтекста… Вы заметили, что единицей ожидания становится не день или неделя, а паек? Два пайка назад Паша был у меня и обещал приходить. Это была чистая фигура речи — «Приду» вместо «До свидания», — но этикетность ее снималась формулой «Приду, если не рехнусь». Момент обязательности встречи вводится мотивом сомнительного условия…</p><p class="p1">Несчастная девочка Гликберг была очень умна. И однако — Ашхарумова боялась трансформировать это ощущение с помощью формального метода, — было немного приятно думать, что Барцев был у Гликберг всего единожды, и то два пайка назад. Она, Марья, не открыла никакого метода и не умеет говорить, как Гликберг, и все-таки Барцев не сводит с нее глаз.</p><p class="empty-line"/><p class="p1">В восьмом часу она вышла в кухню — подышать у открытого окна, покурить в одиночестве. На кухне, в полумраке весеннего вечера, слышались однотонные всхлипывания. Ашхарумова всмотрелась. В углу стоял Альтергейм и, закрыв лицо руками, плакал жалобно и как-то механически, шмыгая носом и подвывая через равные промежутки времени.</p><p class="p1">Не допуская и мысли, что ему неприятно быть обнаруженным тут, в слезах, в кухне, она кинулась к нему и принялась отнимать от лица его мокрые слабые руки, нагнувшись, как над ребенком:</p><p class="p1">— Что с вами, Альтер? Не плачьте, Бога ради! Ну, хотите, я спрячу вас на Елагином, и вы не пойдете в эту проклятую армию? Они нас пока не досматривают, и кроме того, я знаю прекрасный подземный ход! (О чем говорить, она не думала; сейчас важно было говорить.)</p><p class="p1">— Меня Котя зовут, — тоже по-детски ответил Альтер до предела истончившимся фальцетом.</p><p class="p1">— Ну вот видите, вас — Котя, меня — Маша, будем знакомы, очень приятно. Не надо только плакать. Не будем больше плакать? — Всю ее усталость как рукой сняло, она была нужна и чувствовала в себе неисчерпаемую силу. Она могла утешить всех плачущих детей мира, спрятать всех перетрусивших призывников, примирить враждующие армии и в простых словах, а может, и вовсе без слов объяснить им бессмысленность всякой войны. — Сами посудите, зачем вам на войну? Вы молодой, красивый, у вас будет еще миллион случаев применить вашу теорию!</p><p class="p1">— Меня не любит никто, — сказал успокоившийся Альтер. Он говорил теперь ровно, тонко, бумажно. — Я противен всем. Я онанизмом занимаюсь.</p><p class="p1">Сказавши это, он взглянул на Ашхарумову с некоторым лукавством — или ей померещилось в сумраке? Что ответить на такое ошеломляющее признание, она не придумала. В принципе новая культура не признавала табу, и Ашхарумову трудно было смутить — особенно после того, как сама она в шестнадцать лет пришла к Доронину, твердо решившись потерять с ним невинность, а он был с нею груб, как извозчик, и на следующее свидание отвел в меблирашки, сказав на прощание, что на профурсетках не женятся; в теле не было ничего, чего стоило бы стыдиться, и в некоторых вещах не признаются только потому, что они предназначены для разговора с единственным.</p><p class="p1">— Ну и что, — пробормотала она, — в этом нет ничего такого…</p><p class="p1">— А потом собираю и пожираю, — просто сказал Альтергейм. На его лице заиграла блаженная улыбка. — Я совершенно, я идеально одинок. Сделайте со мной, что хотите. Я ваш на всю ночь. Отдайтесь мне, меня убьют завтра. Я до фронта не доеду, меня солдаты изнасилуют. Он улыбался все шире.</p><p class="p1">— А в стихах у вас лучше получается, — сказала Ашхарумова и закурила. — Ну-ка, еще что-нибудь.</p><p class="p1">— Не курите, мне дым вреден, — скулящим голосом попросил Альтер.</p><p class="p1">— Ничего, вас все равно скоро солдаты изнасилуют. Меньше будете мучаться. Почитайте лучше стихи.</p><p class="p1">— Вы свежая, — снова сказал Альтер. — Вы быстро приноравливаетесь, и с вами легко. Простите, что я вас обидел.</p><p class="p1">— Я не обиделась.</p><p class="p1">— Простите. Ведь меня правда убьют, я чувствую. Оно и хочется, и вроде обидно иногда. Все живы будут, а я нет. И все потому, что я пишу такие стихи. Другие ужасную дрянь пишут, и ничего.</p><p class="p1">— Ладно, ладно, не жалуйтесь, — весело сказала Ашхарумова. — Я теперь не поддамся.</p><p class="p1">— И не надо. Я сейчас без задней мысли. Одна передняя… — Он не удержался и хихикнул. — Никогда они нас не поймут. Где они плачут, мы уже даже не смеемся. Ашхарумова поняла, что речь идет о старших; эта мысль приходила и ей.</p><p class="p1">— Вы мне будете писать? — спросил он.</p><p class="p1">— О, конечно. Если захотите. Я люблю писать письма.</p><p class="p1">— А по письмам вы меня полюбите, я вернусь, вы выйдете за меня замуж, мы родим детей, в нашей кухне отвратительно запахнет капустой…</p><p class="p1">— Кухни не будет, — покачала головой Ашхарумова, мечтательно улыбаясь. — Каждый будет жить в одной комнате — тут и плита, и тюфяки на полу, и ведро. Но ведь вас изнасилуют солдаты. Вас будет тяготить мое общество. Каждый вечер вы будете уходить на улицу, искать солдат, возвращаться под утро, добавляя к капусте и ведру запах махорки, пороха и ружейной смазки…</p><p class="p1">— Я вас обожаю, — сказал Альтергейм. — Пойдемте к гостям.</p><p class="empty-line"/><p class="p1">— Ну, как вам? — спрашивал Барцев, когда полчаса спустя они вышли на восьмую линию.</p><p class="p1">— Интересно, — сказала Ашхарумова. — Я рада, что пришла. Но, конечно, одно это не может быть новым искусством…</p><p class="p1">— Разумеется, — пожал плечами Барцев. — В новом искусстве должно быть все.</p><p class="p1">— Я тоже так думаю. Чашкин же, мне кажется, просто болен…</p><p class="p1">— Ну, а кто из больших писателей здоров? Мне стыдно иногда своего здоровья.</p><p class="p1">— Не стыдитесь, — улыбнулась Ашхарумова. — Болезнь не может быть источником искусства.</p><p class="p1">— Я бы поспорил.</p><p class="p1">— Ну, поспорьте. Я не буду.</p><p class="p1">— Правильно, — сказал Барцев. — Вы мне лучше расскажите про себя. Я так мало про вас знаю.</p><p class="p1">— Зачем вам?</p><p class="p1">— Интересно, правильно ли я угадал.</p><p class="p1">— Расскажите, что угадали, — я вам скажу, где неправильно.</p><p class="p1">— Что ж, это можно, — сказал Барцев и откашлялся.</p><p class="p1">Все было превосходно. Темнело уже по-весеннему поздно, большая звезда висела над прозрачной перспективой пустых улиц. На западе лиловый и багровый сменялись темной зеленью петербургской ночи. Под ногами чуть слышно похрустывал тонкий, слабый лед. Барцев чувствовал себя беспричинно и совершенно счастливым — в это сложное ощущение не совсем законного счастья входили и близость веселой, прекрасной девушки, и уход Альтергейма, и спор с Чашкиным, с которым, несмотря на разногласия, он ощущал кровное родство, обещавшее долгую дружбу; все это было заключено в раму пустого города, сделавшегося чистым произведением искусства, без всякой функциональности. Собственно, только ради этого вечера город и был построен.</p></span>
