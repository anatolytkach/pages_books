<span><p class="p1">Казарин узнал маленького человечка, шедшего перед гробом и почти скрытого гигантской супрематической композицией, сколоченной из фанерных кругов и квадратов. Во главе процессии шел Мельников — живая легенда нового искусства, странник, редко случавшийся в Петрограде, не вылезавший из таинственных азиатских степей и пустынь. Гроб несли Льговский, Борисов, Корабельников и Соломин. Последний за время жизни на Крестовском приобрел особый начальственный лоск, странную сановитость — словно он-то и выиграл от раскола больше всех. Последним, тяжело опираясь на палку, ковылял Фельдман, закутанный не по погоде в слишком длинную для него шубу. Он постоянно теперь мерз.</p><p class="p1">Елагинцы, цепочкой пробиравшиеся к выходу с кладбища, остановились, глядя на крестовцев. Те старались не обращать внимания на идейных противников. Надгробное слово произнес Корабельников: он, наслаждаясь бархатным звуком собственного баса, сжато и властно сказал о заслугах лучших представителей старшего поколения, которые не испугались нового искусства и нового строя. Говорил он так, словно лично решал, кого из представителей старшего поколения следует простить и оставить в живых. Следом говорил Льговский. Он был бледнее обычного, и вид у него был подавленный. В долгих паузах между своими фразами-абзацами он опускал глаза.</p><p class="p1">— Говорили, что отмена правописания превращает знакомое слово в незнакомое, — начал он. — Говорили, что над каждым словом придется думать. Мы отвыкли думать над словами. Нас отучили от этого гладкие размеры, символистские штампы и правописательные нормы. Григорий Борисоглебский вернул слову непредсказуемость. Он вернул нам медленное чтение. Он сделал авторский почерк видимым сквозь печатную строку. Устойчивые ошибки автора, прихоть его правописания говорят мне о нем больше, чем любое сочинение. Борисоглебский вернул свободу букве. Его идея осуществилась, и это единственное пока деяние новой власти, которое имеет прямое отношение к свободе. Но и этого деяния нам довольно, чтобы увидеть направление пути.</p><p class="p1">— Нам тоже, — сквозь зубы сказал Долгушов. Крестовцы не расслышали его замечания.</p><p class="p1">После читал Мельников, не имевший о Борисоглебском ни малейшего понятия; читал, как всегда, непонятно и длинно, в руках у него дрожали листки разного цвета и даже формы — был один ровный круг, вырезанный из ученической тетради, и слова на нем шли по кругу, приходилось вертеть; где кончалась одна вещь и начиналась другая, уловить было невозможно. Из всего содержания Казарин уловил только, что мертвецы приветствовали нового товарища, но потом приползала откуда-то русалка, выходил говорящий дуб, произвольно чередовались ямб, хорей и проза; сколько можно было судить, сочинение было выдержано в жанре мистерии, из которого, впрочем, Мельников и не вылезал. Главный герой, воскресающий среди освобожденных вещей и трав, носил фамилию Такович. Через десять минут Мельников запутался, махнул рукой и отошел к Барцеву. Гроб заколотили и опустили, четверо оборванцев с одутловатыми желтыми лицами забросали его землей, смешанной с грязным мартовским снегом, и на вершине холмика Краминов установил вместо памятника красно-черные круги и квадраты, сколоченные в невнятное подобие разрушенного города, над которым опускается солнце. Корабельников сказал, что смерти не будет. Пошли к выходу. Две процессии двигались параллельно. Иногда Борисов, не сказавший о Борисоглебском ни слова, вскидывал глаза на Хмелева, но тут же отводил взгляд; Барцев пристально смотрел на Ашхарумову; Казарин искоса поглядывал на Корабельникова — он терпеть его не мог, а все-таки чувствовал в самом плоском и громыхающем из своих противников некую опасную мощь, потому и пытался разгадать его секрет. Никто не нарушал молчания, но Алексеев, еще во время мельниковского чтения бормотавший что-то о небывалом кощунстве, все-таки не выдержал.</p><p class="p1">— Что, господа, — окликнул он крестовцев, — дружба с новыми хозяевами еще не дает бессмертия?</p><p class="p1">Хмелев дернул его за рукав, но Корабельников, стремительно ввязывавшийся в драку и мигом находивший плоский, но меткий ответ, уже прогудел:</p><p class="p1">— Кто сгнил при жизни, всегда завидует покойникам…</p><p class="p1">— Завидую, нет слов, — немедленно отозвался Алексеев. — Привел Бог видеть, как недавние коллеги и ученики лижут руки убийцам.</p><p class="p1">Этого упрека бросать не стоило. Второе подряд упоминание о продажности могло взорвать хоть кого, а Корабельникова в первую голову: те, кто не мог свести с ним счеты литературно, пытались мелко, по-мышиному отомстить разговорами о большевистских подачках, о поэте на службе, о трусливом хулигане, испугавшемся настоящей силы…</p><p class="p1">— Это кто там прохрюкал насчет убийц? — проревел он. — Друзья охранки?</p><p class="p1">Этого тоже говорить никак не следовало: среди университетской профессуры доносчиков не водилось. Но отождествление с охранкой давно уже сделалось в полемике таким же штампом, как и разговоры о продажности.</p><p class="p1">— Как вы смеете! — не выдержал Хмелев. — Из нас половина допрашивалась по делу о студенческой демонстрации пятого года, а вы и плетки жандармской не нюхали!</p><p class="p1">— Это вы мне? — спокойно спросил Корабельников. — Я год просидел и вас не видел.</p><p class="p1">— Вы с бандитьем сидели, среди уголовных! Вас до вашей хамской победы к приличным людям на порог не пускали! — стремительно распалялся Хмелев.</p><p class="p1">— Я сам избегал ходить к приличным людям, чья родня гордится правом выносить царские горшки! — шарахнул в ответ Корабельников, и это был беззастенчивый удар ниже пояса: двоюродный брат Хмелева был одним из врачей, регулярно приглашавшихся на консилиум по поводу здоровья цесаревича.</p><p class="p1">— Вы… вы… — задохнулся Хмелев и начал лавировать между могилами, пробираясь в параллельную аллею. Он оскользался, падал, цеплялся полами шубы за ограды, спотыкался и хватался за памятники. — Я вас…</p><p class="p1">— Господа! — хрипло закричал наконец Фельдман. — Господа! Опомнитесь же, вы на кладбище!</p><p class="p1">Хмелев замер, Корабельников опустил голову. Скорее всего, их отрезвил не смысл сказанного, но сам вид крошечного, горбатого Фельдмана, воздевшего трость и тут же утратившего точку опоры; он рухнул в грязь, но, и пытаясь подняться, повторял: «Опомнитесь… опомнитесь, господа».</p><p class="p1">Хмелев вернулся назад и быстро пошел к выходу. За ним брели елагинцы. Крестовцы бросились поднимать Фельдмана — успокаивать карлика и отчищать его шубу. Он смотрел на Корабельникова с такой горькой укоризной, что тот отошел; старика повел под руку Барцев.</p><p class="p1">— Нельзя же уравниваться, — тихо говорил Фельдман. — Нельзя же терять человеческий облик, для чего же всё, если изживать из себя человеческое…</p><p class="p1">— Это не мы начали, — сказал Барцев.</p><p class="p1">— А какая же разница, кто начал? Борьбу добра и зла тоже начали не мы, но выбор делаем мы… Что бы ни делали наши противники, это нас не оправдывает… Неужели цель борьбы — истребить врага? Цель борьбы — превзойти врага высотою духа и тем показать ему путь…</p><p class="p1">Он говорил скорей сам с собой, нежели с Бариевым. Да и не было у него надежды, что Барцев услышит его. Поднимая и отчищая Фельдмана, крестовцы отстали, и елагинцы смогли беспрепятственно покинуть кладбище, не столкнувшись с ними в воротах: на кладбище был только один вход, он же выход.</p><p class="empty-line"/><p class="p1">Восемнадцатого марта товарищ Воронов попросил Чарнолуского зайти. Чарнолуский оскорбился — кто такой был Воронов, чтобы вызывать… ну, пусть приглашать к себе — комиссара правительства? И однако, сам Воронов не заходил почти ни к кому, разве что изредка к Бронштейну, — а являться по его приглашению рекомендовалось без промедления. Чарнолуский слышал это от многих.</p><p class="p1">— Присаживайтесь, товарищ Чарнолуский, — ровным голосом сказал Воронов. Гладкое лицо его было непроницаемо. — Есть сведения, что организованная вами академическая коммуна на Елагином острове превращается в очаг контрреволюции.</p><p class="p1">— Откуда у вас эти сведения? — спросил Чарнолуский предательски севшим голосом.</p><p class="p1">— Вас никто не обвиняет, — продолжал Воронов, игнорируя вопрос. — Перед переездом нам следует закончить в городе все текущие дела. Оставлять коммуну на снабжении первой категории, отапливать ее и занимать издательским делом признано нецелесообразным.</p><p class="p1">— Кем признано? — перебил Чарнолуский.</p><p class="p1">— Поэтому, — так же ровно произнес товарищ Воронов, — вам лично рекомендовано произвести разъяснительную беседу в Елагином дворце и предложить профессуре разойтись добровольно.</p><p class="p1">— Вы можете, конечно, игнорировать мнение народного комиссара, — артистически попадая в ровный тон Воронова, заговорил Чарнолуский, — но я лучше осведомлен о ситуации, причем не прибегаю для этого к услугам добровольных информаторов. Вам известно, что коммуна раскололась? На Крестовском острове живут молодые революционные художники, наши активные сторонники, мастера агитации. Закрыть одну коммуну — значит скомпрометировать другую, вы не можете этого не понимать!</p><p class="p1">— Скомпрометировать перед кем? — спокойно спросил Воронов.</p><p class="p1">— Перед всей петроградской культурой, — уверенно сказал Чарнолуский. Воронов помолчал, глядя на него без всякого выражения.</p><p class="p1">— Мы вернемся к этому разговору, — сказал он так же тускло.</p><p class="p1">Чарнолуский вышел из его кабинета, прошел к себе (жаль будет оставлять бильярдный стол, подумал он мельком), достал чистый лист серой бумаги и, окуная вставочку в лиловые чернила, написал прошение об отставке — второе за пять месяцев своей работы. После этого он поднялся в приемную Ильича и с важностью вручил бумагу Лидии Александровне.</p><p class="p1">— Александр Владимирович! — ахнула та. Чарнолуский кивнул.</p><p class="p1">— Если не можешь чего-то остановить — надо по крайней мере не участвовать, — сказал он негромко. — Если отдельные стражи революции хотят удушить ее в объятиях, я в этом не участник.</p><p class="p1">— Я передам, — кивнула Лидия Александровна.</p><p class="p1">Чарнолуский пошел к себе и в дверях столкнулся с Хламидой, несшим в руках мелко исписанные листки.</p><p class="p1">— Профессора Гольцева взяли, — сказал он хмуро. — Физика, европейскую величину. Выдумали бред, будто он динамит готовит. По доносу соседа — каковы?! Вот, несу прошение, я лично старика знаю…</p><p class="p1">Чарнолуский долгим понимающим взглядом посмотрел ему в глаза и вышел. Хламида молча протянул бумагу секретарше, и так же молча она положила ее в папку, где уже лежало прошение Чарнолуского об отставке и еще штук тридцать писем о заступничестве, в том числе и его собственных, никем не прочитанных. Хламида это знал, и секретарша знала, что он знает.</p><p class="p1">— Благодарю вас, — сказал он сурово и пошел к дверям.</p><p class="p1">— Ильич спрашивал, как ваше здоровье, — робко сказала ему вслед Лидия Александровна. Непонятно было, чего больше в ее голосе, — сочувствия к Хламиде или уважения к заботливости Ильича.</p><p class="p1">— Благодарю вас, — повторил Хламида, не оборачиваясь.</p><p class="subtitle">13</p><p class="p1">— Что же, — говорил Свинецкий, сжимая и разжимая кулаки, отступая в глубь кабинета начальника гурзуфской управы и кивая с выражением крайней неловкости. — Что же, прошу вас, прошу. Очень рад.</p><p class="p1">Со стены еще не был снят портрет Ленина, на другой красовался приколоченный гвоздями красный флаг. На столе царил фарфоровый письменный прибор, уцелевший от прежних времен. У двери, с античной небрежностью опираясь на самодельные пики, стояли двое — стража нового градоначальника.</p><p class="p1">— Садитесь, без церемоний. Что же, вы давно оттуда? — спрашивал эсер, не вполне еще выбрав интонацию: величественная снисходительность, горячая радость при встрече с давним, хоть и заблуждающимся приятелем, жадный интерес политика к последним известиям? — Что делается, какие настроения в городе?</p><p class="p1">— Чужих настроений я не знаю, а мое неважное, — ответил Ять, улыбаясь. — Они, по-моему, не очень себе представляют, что делать с властью, а потому занимаются всякой ерундой. Орфографию вот отменили.</p><p class="p1">Свинецкий кивнул, словно подтверждались давние его догадки.</p><p class="p1">— Каково положение столицы? Немцы близко?</p><p class="p1">— Этого не знает никто. Но судя по тому, что они могли уже несколько раз взять Питер и ни разу не захотели, — им он тоже не нужен.</p><p class="p1">Все это время неуместная улыбка так и не сходила с лица Ятя: он очень рад был видеть Свинецкого. Во-первых, это была встреча с собственной юностью, с наивными временами, когда он всерьез полагал, что эпидемия террора охватит всю Россию; во-вторых, приятно было видеть, что эсер жив и невредим. Все-таки Ять чувствовал перед ним подобие вины. Да и Свинецкий, кажется, обрадовался знакомцу: не так уж много осталось людей — и не в Ялте, а на свете, — помнящих начало его славных дел.</p><p class="p1">— Что вы думаете о большевиках?</p><p class="p1">— Сказать по правде, я мало о них знаю, — ответил Ять. — Ясно, что это не революция, а контрреволюция, но мне так не понравился февраль…</p><p class="p1">— Чем же именно?</p><p class="p1">— Да всем… — Ять пожал плечами. — Повылезла всякая мразь и объявила себя победительницей. Свобода, свобода. Неразбериха, истерика… толпа. Правительство не может ни черта. Ликуют одни либералы, а их я не любил никогда Это им кажется, будто была какая-то свобода, а народ ее не уберег. Никакой не было свободы. С самого начала ждали, когда у кого-нибудь достанет сил ударить кулаком по столу. Ну и дождались.</p><p class="p1">— А мне казалось, вы и сами были либерал. — Свинецкий побарабанил по столу пальцами и поглядел в окно, за которым качалось море. Ять предпочел бы сейчас пройтись с ним по берегу, а не сидеть в этом кабинете, где смешались реалии трех властей.</p><p class="p1">— Мало ли кем я был. Я щенок был, да и вы тогда недалеко ушли. Либерализм труслив, мелок. Либерал разрешает вам многое, но себе — еще больше. Либерал ненавидит все великое, потому что в нем ему мерещится насилие. Лучше всего, когда власть либеральная, а интеллигенция консервативная. Но у нас всю жизнь наизнанку. Рай — это когда любовница-француженка и жена-немка, а ад — когда наоборот.</p><p class="p1">— Так, так… — Свинецкий покивал, то ли соглашаясь, то ли получив очередное подтверждение своим догадкам — на этот раз о Яте. — Ну, а что вы сами делали… все это время?</p><p class="p1">— Работал в газетах… издал несколько книг.</p><p class="p1">— В партиях состояли?</p><p class="p1">— Какие партии, о чем вы… Состоял в Обществе любителей российской словесности, но теперь и оно расколото. Одни за старую орфографию, другие против всякой.</p><p class="p1">— А вы?</p><p class="p1">— А я свою позицию объяснить затрудняюсь. С одной стороны — я не против реформы правописания, с другой — мне очень не нравятся те, кто ее проводит.</p><p class="p1">— Но вы считаете, что правописание нужно?</p><p class="p1">— Да, конечно. Я только до сих пор не знаю, зачем оно нужно. Скажем, какие-то главные правила пусть останутся, их необходимость видят все. Но вот почему надо писать «ни в чем не повинный» непременно раздельно — я понять не могу. Знаю только, что грамотный человек мне приятней неграмотного. Он все-таки признаёт над собой законы.</p><p class="p1">— Ну, не в орфографии дело, — перевел разговор Свинецкий. — Меня интересуют ваши взгляды вообще… как таковые. В конце концов, я нуждаюсь в соратниках. Мне в правительстве нужен будет министр внешних сношений. Брать же вас просто так, не расспросив про убеждения, — согласитесь, легкомысленно.</p><p class="p1">— Я мало гожусь в министры, — усмехнулся Ять. — Но рассказать… я не знаю, что именно вас интересует? Политическое мое кредо с двадцати трех лет не изменилось: нет лучшего средства отдалить цель, чем борьба за нее. Большевики двадцать лет боролись за свободу, чтобы в конце концов от этой свободы отказаться. Вы боролись за нравственность — и власть, истребляя вас, стала символом безнравственности. Начиная борьбу, вы автоматически перенимаете черты людей, которые вам ненавистны, и очень скоро перестаете отличаться от них, Первым гибнет то, за что вы боретесь, а без него ничто не имеет смысла.</p><p class="p1">— Любопытно. И что же, терпеть?</p><p class="p1">— Я не знаю. Если бы знал, я был бы, вероятно, в Петрограде. Но мне там делать больше нечего: скучно, газеты закрываются, работы нет.</p><p class="p1">— Вы здесь один?</p><p class="p1">— Здесь с прошлого лета гостит моя невеста.</p><p class="p1">— Невеста? — переспросил Свинецкий. — Вы не женаты?</p><p class="p1">— С первой женой разошелся.</p><p class="p1">— И все-таки… — Эсер никак не мог слезть с раз избранной темы. — Я никак не уясню себе, есть ли у вас политические воззрения?</p><p class="p1">— Да конечно, есть! — воскликнул Ять. — Я люблю никому не нужные вещи, интересуюсь одинокими чудаками, мне дороже всего то, что не имеет отношения к выживанию. Мне нравится зазор между человеком и… как бы это сказать? В человеке есть избыток… что-то сверх его нужд, а может, даже и вопреки его нуждам. Вот этот излишек я и люблю, а больше меня ничего не интересует. Мне симпатично то, что делается вопреки жизни, а сама жизнь представляется мне довольно скучным местом. Если ее вообще можно назвать местом. Как по-вашему, это политический взгляд?</p><p class="p1">— А религиозные убеждения у вас есть? — не отвечая, продолжал допрашивать Свинецкий.</p><p class="p1">— Есть, конечно. В нас слишком много необязательного, чтобы мы могли быть результатами эволюции. По-моему, это так понятно… Я и вами интересовался в основном потому, что меня восхищает способность человека легко отказываться от жизни. Но ведь это не для всех. Если вы хотите управлять городом, вам надо руководствоваться Ветхим Заветом, иначе город развалится сразу же. А я стараюсь руководствоваться Новым и потому не гожусь вам в советники.</p><p class="p1">— Однако, как я понимаю, — Свинецкий в упор рассматривал его, — бороться с моим режимом вы тоже не собираетесь?</p><p class="p1">— Я еще не знаю, что за режим. Вас, эсеров, всегда так занимала борьба, что не было времени подумать о власти. Как вы собираетесь ею распорядиться?</p><p class="p1">— Мои взгляды изменились мало, — сказал Свинецкий. — Я по-прежнему считаю, что человек стоит столько, сколько он готов пожертвовать.</p><p class="p1">— Это очень симпатично, но жертва — дело добровольное. Нельзя ее требовать от обывателя.</p><p class="p1">— Обывателя больше не будет, — твердо сказал эсер. В мыслях он уже распространил свою власть от пламенной Тавриды до хладных финских скал. — Нельзя требовать жертвы, но можно создать условия, в которых жертва станет естественной для каждого. Люди трусливы и ленивы, и не у каждого достанет сил сделать шаг к высшему состоянию. Дело власти — дать им эту возможность. Как я могу заключить из ваших слов, все двенадцать лет, что мы не виделись, ваша душа проспала таким же непробудным сном, что и эти несчастные рыбаки. — Свинецкий вскинул голову, носом указав в сторону берега. — Мой долг разбудить и их, и вас. Вы арестованы.</p><p class="p1">— Очень приятно, — сказал Ять. — Нет, в самом деле. Царизм меня хотел арестовать за антивоенную газету, но воздержался. Теперь пришли вы и начинаете с того, что арестовываете меня. Хороша свобода.</p><p class="p1">— Оставьте, — махнул рукой Свинецкий. — Вам ли говорить о свободе? Жертвовали ли вы собой? Прощались ли с товарищем, идущим на смерть? Может быть, вы караулили на ледяной улице, ожидая, когда проедет карета, везущая вашу Цель, вашу смерть? Если вы ничего не знаете о смерти — что знаете вы о свободе?</p><p class="p1">— То есть для Гурзуфа, если я верно вас понял, настал период смертных казней, — кивнул Ять. — Поголовный переход в царство небесное с последующей рассортировкой. Ладно, все это очень интересно, но мне пора.</p><p class="p1">— Сидеть! — рявкнул Свинецкий, и двое с пиками лениво подошли к Ятю. Они встали по сторонам его кресла, и тот, что справа, с нехорошей улыбочкой положил тяжелую руку ему на плечо.</p><p class="p1">«Шутки кончились, — подумал Ять. — А я-то перед ним так распространился. Когда уже пройдет этот подростковый идеализм, заставляющий предполагать в дураках высшие человеческие начала!»</p><p class="p1">— Вы достойный ученик большевиков, — пустил он в ход последний козырь. — Они тоже первым делом стали бороться с газетчиками…</p><p class="p1">— Я и не собираюсь бороться с газетчиками, — гордо ответил Свинецкий. — Я дам вам все необходимое — перо, бумагу. Вы сможете писать и печататься, как могли в свое время мы. Больше того — я приду к вам в узилище, как вы когда-то приходили ко мне, и там мы продолжим нашу беседу. В истории есть благородная симметрия, вы не находите?</p><p class="p1">— Я нахожу, что вы слишком много читали Достоевского, — сказал Ять.</p><p class="empty-line"/><p class="p1">«Попробовать все, — повторял он, лежа в подвале гурзуфского полицейского участка на жестком тюфяке. — Что ж, в этом есть смысл. Что ни придумаю — сбывается дословно; надо бы перестать придумывать».</p><p class="p1">Замок с дверей гурзуфского участка был торжественно сбит в день, когда установилась большевистская власть. Это было своего рода разрушение Бастилии в местном масштабе. Нового замка никто навесить не удосужился, тем более что за скобяным товаром надо было ездить в Ялту. Дверь поэтому не закрывалась, и Ятя посменно караулили люди из отряда Свинецкого.</p><p class="p1">Разумеется, была особая ирония в том, чтобы за полторы тысячи верст добраться к Тане, встретиться с ней после двухлетней разлуки, чтобы после двух ночей, проведенных вместе, снова оказаться в одиночестве, и где? — в трех шагах от нее! Именно эта близость была всего невыносимей. В доме напротив она спала, ходила по комнате, писала ему (записку передал стражник)… Хорошо еще, что Свинецкий, до конца решивший играть в просвещенного властителя, тут же известил ее об аресте жениха, да не через курьера, а лично. Впрочем, возможно, у него просто не было курьера.</p><p class="p1">«Он полный урод, — писала Таня, — и если это прочтет, то пусть знает. Видишь, вот мы и начали с тобой пробовать все. Ты теперь узник, а я невеста борца. Будь спокоен, не пройдет и двух дней, как окажешься на свободе. Не думай, пожалуйста, что я выкуплю тебя ценою своей добродетели. Ты не стоишь моей добродетели».</p><p class="p1">Отсюда, из подвала двухэтажного здания, были слышны звуки местной жизни: ранним утром к морю спускались рыбаки, чуть позже шли на базар торговки, и с девяти утра (часы Ятю оставили) доносились крики веселого южного торга; к десяти открывал кофейню Пастилаки. Как всякий приморский город, Гурзуф жил лениво и беспорядочно: кто зависит от переменчивой стихии моря, тому смешна деловитость. Прилежно работали одни татары: ковыряли глинистую землю виноградников, доили коз, латали крыши. Татары жили в верхней части города обособленно. Рыбаки их втайне презирали за неистребимую сухопутность, скучную домовитость и еще за то, что жены их и дочери были строгих правил. В подвале было оконце, выходящее на улицу, — располагалось оно слишком высоко, чтобы Ять мог до него дотянуться. Сквозь него проникал слабый свет, позволявший, однако, догадываться, что на улице прелестно. Как и обещал Свинецкий, Ятю принесли керосиновую лампу (вероятно, в надежде на самосожжение), бумагу, чернильницу и стальное перо.</p><p class="p1">«Свинецкий — свинья», — написал Ять и нарисовал свинью с бородой.</p><p class="p1">О политической жизни Гурзуфа на протяжении двух дней правления Свинецкого он не знал ничего, а между тем такой бурной политической жизни, как в эти два дня, у Гурзуфа не было ни до, ни после. Первым же декретом Свинецкий упразднил шестидневную рабочую неделю и сократил ее до трехдневной, поскольку физический труд казался ему проклятием человечества. Он ввел несколько новых праздников — около пятидесяти дней рождения павших борцов; сооружение памятников было провозглашено важнейшей задачей дня. Какого бы культа предков ни придерживались альмеки, в сравнении с культом павших, который установил Свинецкий, их религия была апофеозом жизнеутверждения. Пятьдесят дней в году Гурзуфу предстояло одеваться в траур. Культ героической смерти исключал всякую заботу о нуждах низкой жизни. Свинецкий ввел беспрецедентно жесткую регламентацию повседневных занятий и собирался менять эту регламентацию ежедневно, чтобы не давать жителям поселка зажиревать: рутина опаснее всего. Год он собирался властвовать лично, а потом, когда свобода проникла бы в плоть и кровь подданных, намеревался инициировать заговор против себя и погибнуть в результате безукоризненно спланированного акта. Власть развращает, а потому все надо успеть за год: и раскрепостить народ, и вырастить смену. Ять казался ему достаточно храбрым человеком, чтобы стать этой сменой, но за год его предстояло провести через многие испытания — подстроить побег, поймать, подвергнуть пытке, научить подбирать соратников и готовить покушения. Главное — не останавливаться, ибо Свинецкий давно уже знал, что революция не имеет никакой конечной цели, кроме себя самой.</p><p class="p1">Рынок он не закрыл, но ввел карточную систему. Татарам, торговавшим молоком, козьим сыром и сушеным виноградом, отныне вменялось в обязанность раздавать свой товар бесплатно — прежде всего семьям, где были дети. Татары не поняли. Свинецкий объяснил, но, кажется, у них остались сомнения. Рыбачить он разрешил два дня в неделю, в прочее время обязав рыбаков отрабатывать по шесть часов на строительстве памятников павшим борцам. Три часа своего времени ежедневно отвел на преподавание в гурзуфской школе (в поселке насчитывалось тридцать детей разного возраста — от двух до шестнадцати лет; всех он намеревался обучать вместе по методике Штайнера, о которой услышал в Швейцарии). Портрет Ленина сжег. Семью комиссара Трубникова, на которую ему тут же указали услужливые доносчики из числа гурзуфских обывателей, осыпал милостями и просил передать, что Трубников может вернуться. Троих вернейших из своей гвардии Свинецкий отправил в Ялту — агитировать обывателей для последующего захвата Ялты; ночью, возможно, он под парусом лично выедет туда и выяснит ситуацию. Большевики там слабы, серьезного сопротивления не будет.</p><p class="subtitle">14</p><p class="p1">Ятя разбудил в одиннадцатом часу вечера вдребезги пьяный стражник; эту рожу Ять видел впервые — видимо, сменился караул. В камере горела керосиновая лампа, по стенам плясала чудовищная тень.</p><p class="p1">— Слышь, малый, — кряхтел и возился над ним усатый толстяк. — Вставай, слышь. Хватит дрыхнуть-то, работать пора. Баба твоя тебя ждет, слыхал, нет?</p><p class="p1">— Какая баба? — не понял Ять.</p><p class="p1">— А их што, много у тебя? — захохотал страж. — Знала бы, не выкупала бы… Только смотри, время у тебя до утра. Утром марш назад, как положено. Ну, я покараулю — домик-то напротив, не сбежишь… Мне без разницы, где караулить…</p><p class="p1">— Как — выкупила? — все еще не соображал Ять.</p><p class="p1">— Вот так! — Страж показал ему немалых размеров бутыль, оплетенную соломкой. — Самый первейший самогон, татаре гонят. Где взяла, это уж ты у нее спроси. Ничего девка, и сама пить здорова. Тяжело тебе с ней, худосочному, — босяк зычно расхохотался.</p><p class="p1">— А что, если ко мне ночью этот нагрянет… главный-то ваш? — на всякий случай поинтересовался Ять. — Он, я знаю, любитель ночные разговоры разговаривать…</p><p class="p1">— Не нагрянет, — успокоил страж. — Он в Ялту уехал, лодку взял… Хочет там растрясти кой-кого. Вставай давай, ждут тебя. На, хлебни для бодрости.</p><p class="empty-line"/><p class="p1">Пошатываясь, Ять вышел из подвала в синюю, влажную, тяжелую гурзуфскую ночь. Над горбатой улочкой стояла огромная желтая луна, вдалеке золотилось море. Ять плотней закутался в зуевское пальто и несколько раз глубоко, с наслаждением вдохнул. По всей чаше Гурзуфа, по темным лесистым склонам, по рыбацкому поселку и татарским дворам перелаивались собаки: начинала всегда одна, самая маленькая и злая, высоким, пронзительным тявканьем словно устыжая остальных: проснитесь, проснитесь, какой сон в такую тревожную ночь! «Что?! Что?!» — тут же хрипло, отрывисто подхватывала вторая откуда-то снизу, ничего еще не понимая, но уже угрожая невидимому противнику; в ответ вступал целый хор сверху — не дадим! не пустим! — после чего слева лениво, снисходительно гавкал басовитый пес — сторож Голицынских винных складов: да ладно! да кто посмеет! Наступала короткая тишина, в которой отчетливо было слышно змеиное шуршание гальки внизу; оно-то и бесило ту самую маленькую собаку, с которой все начиналось, — потому что этот звук нельзя было отпугнуть и избыть: оставалось только заглушить его. И бессонная маленькая собака снова и снова поднимала переполох: не спите! не спите! крадется! — и снова вступала свора, и снова снисходительный бас с винных складов водворял короткую тишину. Вся эта история, как всякая история, двигалась слева направо и не имела ни конца, ни смысла.</p><p class="p1">Ять выслушал две серии этих шакальих воплей (интересно, как лает настоящий шакал?) и вошел в незапертую дверь зуевского дома. Он старался оттянуть миг встречи — не только потому, что вообще имел привычку отдалять блаженство, но и потому, что до сих пор не пришел в себя. А перед Таней, как бы он ее ни любил, надо было появиться во всеоружии — смятения она не прощала.</p><p class="p1">И точно: на ощупь поднявшись по темной лестнице, он застал картину почти идиллическую. Таня, спокойная и умиротворенная, штопала одну из его рубашек, сидя за столом, на котором вокруг керосиновой лампы были расставлены фантастические яства. Была тут и еще одна оплетенная бутылка, и сыр, и маслины домашней засолки, и холодное жареное мясо, и несколько пресных лепешек, и даже тарелка жидкого желтого меду, который, Ять знал, на гурзуфском базаре можно было только выменять — никаких денег за него не брали, ибо мед в восемнадцатом году был валютой более надежной. Ять стоял в дверях их комнатки и не сводил глаз с убогого пиршественного стола, с Таниного полуосвещенного, сосредоточенного лица со сдвинутыми густыми бровями, с лампы, вокруг которой плясал, стукаясь иногда о стекло, одинокий длинноногий комар карамора. Таня молчала, давая Ятю проникнуться всем очарованием этого хрупкого уюта и ее собственного облика — на этот раз домашнего и необычайно естественного; он редко видел ее такой и никогда не мог представить женой — в ней было слишком много огня, и движения, и неумения долго оставаться на одном месте, — а она могла быть и решительной, спокойной хозяйкой, в отсутствие мужа починяющей его пожитки и раздобывающей жалкие деликатесы к его возвращению. Он не знал, сколько обличий осталось у нее в запасе и какие чудеса ему еще покажет эта девочка, естественная во всякой среде, своя на любом базаре, мечта каждого мужчины, доставшаяся отчего-то Ятю.</p><p class="p1">— Спасибо, Таня, — тихо сказал Ять.</p><p class="p1">— Ах, этот охранник такой славный, — ответила она, не отрываясь от шитья. — Бродяжничал по всему югу, рассказывал удивительные вещи об Астрахани. Скажи, там очень холодно — в подвале?</p><p class="p1">— Не особенно. Я даже выспался.</p><p class="p1">— Бедный, я не даю тебе спать. Садись же скорей, ешь и рассказывай. Я думаю, они тебя и не кормили там?</p><p class="p1">— Почему, Свинецкий распорядился. С утра принесли печеной картошки и даже сыру кусок.</p><p class="p1">— Говорят, он тебя навестил? О чем говорили?</p><p class="p1">— Ерунду какую-то нес, я заснул. Мне гораздо важней знать, о чем вы с ним говорили. Он тебя хвалил, говорил — образцовая невеста.</p><p class="p1">— Да, знаешь, я сыграла ему такую монашку! Я уверена, что он назавтра выпустит тебя. Сколько я успела понять, у него принцип — ни один закон не должен действовать дольше суток, иначе население привыкает. Очень возможно, что завтра ты уже будешь премьером.</p><p class="p1">— Или он повесит меня на базарной площади, чтобы народ не успел закоснеть.</p><p class="p1">— Ты отлично знаешь, что он этого не сделает. А если и попробует — я ему не позволю: у Зуева есть ружье, только никому ни слова.</p><p class="p1">— Ты стрелять-то умеешь? Она перекусила нитку.</p><p class="p1">— Дай Бог тебе так стрелять.</p><p class="p1">— Где выучилась?</p><p class="p1">— Этому, Ять, не учат, это, Ять, врожденный талант. Ешь, пожалуйста. Зря, что ли, я обольщала татар?</p><p class="p1">Ять отломил кусок лепешки, обмакнул в мед и жадно проглотил. Голод проснулся мгновенно. За лепешкой с медом последовал кусок мяса, горсть маслин, два куска сухого соленого сыра («Ты слышала, что греки делали паштет из такого сыра, меда и чеснока?» — «Ах, радость моя, чеснока-то я и не купила!»), все это он запил стаканом ледяной воды, налил полстакана самогона («Тоже татары?» — «Нет, это уж из запасов Пастилаки, но не думай, пожалуйста, он совершенно бескорыстен, взял только гитару»), залпом выпил и мгновенно осоловел.</p><p class="p1">— Танька, Господи… как же ты теперь без гитары?</p><p class="p1">— Уверяю тебя, гитара вернется.</p><p class="p1">— Но почему ты ничего не ешь?</p><p class="p1">— Только самоубийцы да узники едят по ночам. Ты же не хочешь, чтобы к тридцати я стала похожа на матрешку? Не волнуйся, мы утром чудесно позавтракаем вместе.</p><p class="p1">— Странно, — сказал Ять. — Странно все. Он встал и подошел к окну.</p><p class="p1">— Странно, но ведь хорошо? — спросила она с новой, тревожно-заботливой интонацией.</p><p class="p1">— Конечно, хорошо, — уверенно ответил он. — Лучше, чем может быть. Это и странно. Понимаешь, совсем вне времени…</p><p class="p1">— Да, да. Серьезно. Как на маяке. Серое море, и маяк… и на нем мы.</p><p class="p1">— У Тютчева я больше всего люблю одну строку: «Как океан объемлет шар земной…» Мне, собственно, дальше и не надо ничего знать, наверняка какое-то умозрение, — совсем не помню. Но вот одна строчка — причем, заметь, обязательно неправильная — у него всегда волшебна. Ведь так нельзя сказать, что океан объемлет шар земной. Он объемлет куски суши, но благодаря неправильности получается прямо картина звездного океана, который окружает землю со всех сторон. И океан делается какой-то предвечный, — знаешь, я о таком и мечтал всегда: в нем нет людей, земля еще необитаема, — так, водоросли и какие-то страшные первообразы, морские гады…</p><p class="p1">— Но люди должны быть. Так что это уже не предвечный океан, а то, что будет после всего. Нас двое осталось, и мы на маяке: иногда я выхожу приманивать этих гадов морских, и ты с ужасом смотришь, как они повинуются мне…</p><p class="p1">— Выносят тебе жемчуг.</p><p class="p1">— Да, да, конечно! И ты дико меня к ним ревнуешь.</p><p class="p1">— Нет, после всего — это слишком грустно. Мне именно нравится, что этот океан — водный, звездный — еще и обещание всего. В нем и так есть уже все…</p><p class="p1">— В феврале я чувствовала себя тут, как в конце времен, — сказала она, откладывая шитье. — Посмотри, почти незаметно: художественная работа! Просто удивительно, до чего я все умею. С вас, барин, полтинник. В феврале тут хуже всего: кажется, любой питерский холод не так тяжело перенести, как здешний ветер. Чувство, будто никогда уже не остановится — так и будет дуть, дуть, выть, выть…</p><p class="p1">— Почему ты не уехала в Питер, Таня? — Он впервые спрашивал ее об этом и боялся услышать невыносимое, мучительное, с чем нельзя будет жить. Таня вздохнула.</p><p class="p1">— Сначала думала пересидеть до ноября, — скучным голосом сказала она. — Тепло и почти сытно. Потом пришли новости про эти дела, которые все вдобавок называли по-разному: я и теперь не очень понимаю, что там произошло.</p><p class="p1">— Утешься, никто не понимает.</p><p class="p1">— Вот, а там декабрь — пошли перебои с поездами, ужасные слухи о голоде, о том, что царь убит… И потом, я знала, что будет какой-то толчок и вытолкнет меня отсюда. Может быть, ты приедешь.</p><p class="p1">— Не говори только, что ты этого ждала.</p><p class="p1">— Конечно, ждала. Чего же еще мне было ждать.</p><p class="p1">— Таня, я ведь все равно спрошу, с кем ты была тут.</p><p class="p1">— Конечно, спросишь. Ты ужасно одинаковый. Тебе всегда будет недостаточно того, что сейчас я с тобой. И всего этого тебе будет мало, — она обвела взглядом комнату, — и этой ночи мало…</p><p class="p1">— Ах, да Бог с ним со всем, — сказал он, чтобы успокоить ее. — Но ты поедешь со мной обратно?.</p><p class="p1">— Конечно, поеду. — Она словно удивлялась, как об этом можно было спрашивать вообще, но эта-то пылкость и показалась ему наигранной.</p><p class="p1">— Не поедешь, я знаю, — подначил он.</p><p class="p1">— Ну не здесь же оставаться. — Таня пожала плечами. — Конечно, уедем. Я уехала бы к тебе и раньше, если бы только была уверена, что ты не оттолкнешь меня.</p><p class="p1">— Честно тебе сказать, я и сам бы не уехал, — произнес Ять, закуривая и всматриваясь в темноту за окном. Собаки снова подняли перебрех по всему Гурзуфу. — Что там делать? Здесь действительно дырка в другой мир, ни пространства, ни времени, и все нищи, и у всех все есть — еда берется ниоткуда, уж подлинно Господь посылает… Бегают какие-то милые чудаки вроде Зуева или Свинецкого… Возвращаться не хочется, право. Там такая скука теперь и настолько невозможно разговаривать с людьми — все упирается в керосин, в карточки и в несчастный вопрос, за кого я. А за кого быть, когда там петля, тут удавка… Остались, пожалуй, два человека, ради которых стоило бы вернуться, — старый да малый, и обоих ты, кажется, не знаешь.</p><p class="p1">— Может быть, и знаю. А кто?</p><p class="p1">— Один — Клингенмайер, собиратель древностей, а в сущности, старьевщик. С ним я любил разговаривать, потому что он кое-что понимал… А про второго даже я почти ничего не знаю, знаю только, что я перед ним ужасно виноват. И он рассказал ей про мальчика.</p><p class="p1">— Ять! Мы найдем его, непременно найдем и возьмем к себе!</p><p class="p1">— У него есть родители.</p><p class="p1">— Если есть — отведем к родителям. Но скажи на милость, чем же ты виноват? Привел к себе, накормил…</p><p class="p1">— Мало накормить, надо было уследить. Впрочем, вряд ли тебе все это интересно.</p><p class="p1">— Ять! — Она вскочила, подошла и спрятала лицо у него на груди. — Отчего ты злишься? Что я не так сделала?</p><p class="p1">— Все так, я просто понимаю иногда, что нам опять придется куда-то деваться друг от друга. Это ветер.</p><p class="p1">— Господи! — Она подняла на него сердитые круглые глаза. — Нет такой идиллии, среди которой тебе вдруг не стало бы тошно.</p><p class="p1">— Это точно, — кивнул он. — За это-то меня все и упраздняют. Кто ни придет, тот и гонит из азбуки. Вся надежда на Свинецкого: его бы воля — он ввел бы двадцать ятей и за ошибки арестовывал, чтобы вырастить когорту настоящих борцов. Одна беда — когда эти борцы победят, они вообще отменят письменность.</p><p class="p1">— Да выпустит он тебя, что ты все о нем думаешь!</p><p class="p1">— Нет, знаешь, его я совсем не боюсь. Как ни странно. — Ять сел на диван, Таня легла и положила голову ему на колени. — На опасность у меня чутье с рождения, а он не опасен. Могу на него злиться, могу смеяться — но чувствую, что он не сила. Такая же лишняя буква, как и я.</p><p class="p1">— А кого боишься?</p><p class="p1">— Здесь — никого. — Он гладил ее теплые темные волосы, зарывался в них руками и готов был сидеть так бесконечно. — А в Питере есть кого бояться, и именно поэтому так смешны мне все эти споры — в сущности, между своими. Ведь и среди большевиков полно своих, с которыми вполне можно разговаривать; и среди интеллигенции довольно хамья… Один такой барин жил и на Елагином до раскола — действительно барин, белый, холеный, но удивительно ловкий на всякую работу и страшно приверженный сильной власти.</p><p class="p1">— Я тоже ловка на всякую работу.</p><p class="p1">— Ты другая. А впрочем, и в тебе кое-что пугает меня. Ты была бы своей при всех, со всеми.</p><p class="p1">— Да, но при этом ничьей. Не забывай, пожалуйста.</p><p class="p1">— Это-то меня и утешает. Так вот, они ссорятся, выясняют отношения, марают друг друга, как только могут, — а те, кого действительно надо бояться, выжидают только момента, когда им можно будет вылезти наружу. Этих я действительно боюсь — потому что для нас еще есть запреты, а для них нет.</p><p class="p1">— Да разве в запретах все дело? Ты их сам ненавидишь.</p><p class="p1">— Не в запретах, Боже мой, а… как бы сказать? В бессмысленных условностях, по которым только и узнаешь своего. Без этих условностей, этих своих — я сам уже иногда не знаю, есть ли я на свете или меня вправду упразднили вместе с буквой… Дело даже не в пресловутой вежливости или обращениях на «вы»: простонародье как раз очень вежливо, соблюдает этикет, салфет вашей милости… Я знаю, как извозчики в своей среде презирают того, кто грязнее прочих, или того, кто не выучился господской речи… Как же-с, оченно понимают! Нет, мы скорее как те зуевские альмеки, которые и сами не скажут, зачем все это проделывают. Просто их жизнь оплетена паутиной сложнейших взаимодействий с миром. Не знаю даже, как сказать…</p><p class="p1">— Ах, что ты объясняешь так долго! Я все это знаю тысячу лет. Почему в детстве иногда кажется, что надо сейчас же открыть окно, или прикоснуться к столу, или переставить стул?</p><p class="p1">— Да, вроде этого. Некоторые всю религию выводят из таких предчувствий. И знаешь, я помню день, когда тебя встретил: ведь я мог не пойти туда, не хотел — но был какой-то уголек, тлел, тлел и не давал сидеть дома…</p><p class="p1">— Да. И еще, знаешь, меня очень утешила история, когда некто собирался ехать к другу, но вдруг почему-то, уже в трамвае, почувствовал сильнейшее желание вернуться домой и поменять местами две книги на полке. Зачем, с какой стати? Но он вернулся, пешком пошел домой, переставил эти книги — и тут узнал, что в доме друга внезапно обрушился потолок, как раз в столовой, где они наверняка были бы в эту минуту!</p><p class="p1">— Ну, это совпадение: может, ему каждый день хотелось вернуться и переставить книги, а один раз это спасло…</p><p class="p1">— Скорее всего. Но я точно знаю, что слышу какие-то струны. Они словно проходят через меня.</p><p class="p1">— И грамотность, кстати, той же природы. Я сам чувствую, что, ставя «а» вместо «о», нарушаю что-то в самой ткани мира…</p><p class="p1">— Ты засыпаешь?</p><p class="p1">— Нет, просто успокоился. Я всегда успокаиваюсь, когда ты у меня в руках.</p><p class="p1">— Господи, как мало тебе нужно. Я сошью себе поводок. Надеюсь, в уборную ты меня отпустишь?</p><p class="p1">— Да, но ненадолго. И спать, скорее спать.</p><p class="empty-line"/><p class="p1">Как ни ужасно в этом признаться, но сны, которые снились ему во всякую ночь с Таней, были не похожи на обычные, заставлявшие Ятя смеяться. Он бывал удивительно счастлив во сне, но только не с ней. С ней все было слишком прекрасно наяву — и потому ночами его не покидало ощущение свершившегося предательства, рокового упущения. Может быть, дело было именно в том, что он не привык к счастью и все время чувствовал себя смутно виноватым за него, — но почти каждую ночь, когда они были вместе, короткий обморочный сон нес ему тоску и тревогу, и Ять просыпался, не чувствуя ни облегчения, ни отдыха. Так и теперь, едва она затихла рядом, спиной к нему, поджав колени почти к подбородку, свернувшись, как зародыш, — он оборвался в такой же тревожный сон.</p><p class="p1">Во сне он жил здесь, в Крыму, в Гурзуфе, со своим мальчиком, неуловимо похожим на Петечку: это был их собственный сын, сын от Тани, но Таня, как почти всегда в его снах, отсутствовала. Она никогда не снилась ему, и в этом было особенное, деликатное милосердие, за которое он в годы разрыва был благодарен и ей, и силам, ее пославшим. Тани не было, но мальчик был ее, с теми же мягкими черными волосами и круглыми глазами, — мальчик ласковый, нежный, любящий его бесконечно. Ему было лет восемь. Они шли в горный хвойный лес, вроде того, через который он проходил на перевале, — только не в пример более густой и рыжий, осенний. То ли по грибы (он помнил, что в Крыму грибной сезон начинается осенью), то ли попросту гулять, дышать хвоей, — и, как всегда (не только во сне), из самого его страха родилось несчастье. Он знал, что заблудится, что до сих пор плохо знаком с этими местами, — и точно, еще минуту назад за деревьями виднелся поселок, а сейчас вокруг во все стороны был рыжий хвойный лес, и в самой рыжине его было что-то болезненное: не могла теплая, ранняя еще осень так густо выстлать землю сосновыми иглами, так побить холодом кедры. Это был больной лес и больное пространство, из которого надо было любой ценой вернуться в прежнюю, уютную жизнь, — но он и сам не помнил, где и как пересек границу. Задыхаясь, он бормотал какую-то ерунду, чтобы мальчик не почувствовал его страха. Это был пугливый, домашний мальчик, ему мгновенно передавались все чувства Ятя, но он еще не плакал, крепился. Во все стороны было одно и то же — гора, хвоя; спуститься к морю, подумал Ять, там-то уж вдоль берега вернемся, — но и вниз пути не было, ибо склон вдруг обрывался. От обрыва Ять торопливо пошел вверх, таща за собой мальчика, — но вдруг испугался его молчания: он не жаловался, не спрашивал, когда же они наконец выйдут, вообще был подозрительно тих; Ять присел перед ним на корточки, заглянул ему в лицо — и понял, что случилось самое худшее, то, чего он боялся с самого начала. Это все еще был его сын, но уже начавший неуловимо меняться: глаза его прямо глядели в глаза Ятя, но в лице, во всем облике проступало что-то звериное, зверье, и всего ужасней было то, что с самого его рождения Ять об этом подспудно догадывался. В самой его тихой ласковости, кротости, понятливости было обещание грядущих перемен и бед, ловушка, обман доверия; теперь, выждав час, когда Ятю неоткуда ждать помощи, он на глазах развоплощался. Зверь — это было бы еще не так страшно; он оставался человеком, но из него уже торчал нелюдь, одновременно жалобный и безжалостный. Черты его лица словно обтекали, плавились, приобретали жалкое, просительное выражение, но все это была ложь — он готовился к прыжку, собирался укусить, вцепиться в глотку, и все это с тоской и страхом в круглых черных глазах; кожа его становилась желтой, шафрановой. Он скривил рот, чтобы заплакать (может быть, так плакала подлинная, еще живая его сущность, неотвратимо побеждаемая зверем), — но вместо тихого, скулящего плача Ять услышал гортанный пронзительный крик — визг затравленной, долго скрываемой радости; в следующую секунду маленькое визжащее существо прыгнуло прямо на него, и он очнулся, вскочив на кровати и задыхаясь. С улицы доносился тот же гортанный крик. Таня стояла у окна, накинув его пальто. Было уже довольно светло. Ять натянул кальсоны и подошел к окну.</p><p class="p1">— Что такое? — спросил он, еле ворочая языком.</p><p class="p1">— Кажется, татары пришли, — весело улыбаясь, ответила она.</p><p class="p1">Вниз по улочке удалялся верхом на коне кудрявый толстяк, во все горло распевавший отлично поставленным тенором хищную татарскую песню. Он с удивительным искусством, словно вырос в степях, клекотал, заливался, выделывал горлом замысловатые коленца; песня его полнилась звериным, степным восторгом бытия. Ять узнал его черные кудри и распахнул окно.</p><p class="p1">— Маринелли! — крикнул он во весь голос.</p><p class="p1">Толстяк подпрыгнул на лошади и остановился, потом развернул свою кобылу и устремился назад.</p><p class="p1">— Друг мой! — кричал он на всех европейских языках. — Единственный друг мой! Я знал, что увижу вас! Как вы здесь очутились? Я расспрашивал, я расспрашивал всех!</p><p class="p1">— Я арестован, — по-английски объяснил ему Ять.</p><p class="p1">— Недурная охранница! — заметил Маринелли, оглядывая Таню.</p><p class="p1">— Отпустили к невесте только на ночь. Сейчас я должен вернуться, потому что поклялся.</p><p class="p1">— Вы никуда не должны возвращаться, вы совершенно свободны! — кричал Маринелли. — Власть взята татарами, the tartars, tartarians, barbarians from the hell! Ваш диктатор бежал. Город принадлежит татарскому правительству, я песнями поднимаю дух войска. Спускайтесь ко мне, захватите прелестную спутницу! Сейчас на базаре будет пир.</p><p class="p1">— Тут внизу был мой охранник, guard, — вспомнил Ять. — Он жив, надеюсь?</p><p class="p1">— Он заботится о своем guard! — захохотал Маринелли. — Все оборванцы и авантюристы бежали, город принадлежит нам. Спускайтесь же быстрей, я расскажу вам мою удивительную историю!</p></span>
