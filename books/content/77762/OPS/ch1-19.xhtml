<span><p class="p1">Ять не стал спрашивать у караульных, где искать несчастного итальянца, — в расспросах не было нужды, поскольку ровно в полдень с балкона управы разнесся по всему Гурзуфу голос, который нельзя было спутать ни с одним другим. В нем звенела поистине стихийная мощь. Маринелли исполнял суру Корана: Ять мгновенно узнал муэдзинский распев — во время своего единственного путешествия в Египет, в одиннадцатом году, он с наслаждением прислушивался к этим тоскливым воплям, смысла которых не понимал (и только потому наслаждался). Правда, на сей раз в них звучал не столько животный восторг, смешанный с отчаянием, сколько хорошо рассчитанный оперный пафос. Тенор почти не запинался — когда только успел изучить новый репертуар?! Ять задрал голову. Небо сияло. Рядом с Маринелли на балкончике стоял смуглый мулла в головном уборе, напоминающем высокую чалму, и одобрительно кивал.</p><p class="p1">— Ишь чешет! — восхищенно сказал белокурый. — Как всю жизнь пел по ихнему-то. Ай, грех.</p><p class="p1">— Много не разговаривай, — с той же непонятной злобой отозвался темный.</p><p class="p1">Маринелли в последний раз протяжно выкрикнул что-то умоляющее и вместе наглое: сура в его исполнении звучала как попытка вальяжного делового человека договориться с тем, кто бесконечно сильнее и проще его, — договориться, не теряя лица и не роняя достоинства. Мулла кивнул, и оба ушли с балкона. Ять по широкой мраморной лестнице взлетел на второй этаж.</p><p class="p1">— О, друг мой! — возопил Маринелли. — Благодарю, что вы поспешили! Какое счастье. Объясните этому жрецу, что вы мой помощник и я должен с вами говорить!</p><p class="p1">— Я его друг, — сказал Ять мулле. — Нам надо поговорить.</p><p class="p1">— Хочешь — говори, — пожал плечами мулла. — Я жду.</p><p class="p1">— Он не отходит от вас? — по-английски осведомился Ять у Маринелли.</p><p class="p1">— Я больше себе не принадлежу! — воздевая руки, кричал толстяк. — Случилось худшее: они сделали меня своим священником! Им понравился мой голос, и теперь я должен трижды в день исполнять их песнопения, которые они переписывают для меня русскими буквами. Хвала богам, что я по афишам знаю ваш алфавит — и что я атеист! Иначе на том свете меня припекли бы каленым железом за измену папе. Они не отпускают меня ни на секунду, я нужен им для примера! Им кажется, что теперь им покорятся все иноверцы. На завтра назначено мое обрезание… Вы должны спасти меня, Ять. Сделайте что угодно, я этого не перенесу!</p><p class="p1">— Уверяю вас, в обрезании нет ничего ужасного, — попытался Ять утешить итальянца.</p><p class="p1">— Я знаю, но какого черта! Грязный татарин насильственно обращает меня в свою веру варварским способом… Поспешите, ведь это может коснуться и вас! Они сделают это со всеми, вот увидите!</p><p class="p1">— Но что я могу сделать? Поднять восстание?</p><p class="p1">— Идите в Ялту, умоляю! В Ялте наверняка есть полиция, или красные, или черт, или дьявол, — не может быть, чтобы они захватили весь Крым! Пригоните этого вашего террориста, пусть хоть он с ними сладит… Идите и уводите Таню, вам все равно бессмысленно здесь оставаться — русским они ничего не продают на базаре. Вы должны это знать…</p><p class="p1">— Я еще не был на базаре! Я не начинаю свой день с базара…</p><p class="p1">— А напрасно! Главные события теперь происходят именно там. Ять, бросайте все и идите в Ялту. Быть может, вы найдете там итальянское судно, французов, англичан… Должны же там быть корабли! Бегите, прошу вас, иначе будет поздно — с заходом солнца, я знаю, они и кошку не выпустят из города! Я здесь никого не знаю, кроме вас. Мулла многозначительно кашлянул.</p><p class="p1">— Боже мой, они меня торопят! Сейчас опять поведут кормить этой ужасной вареной бараниной! Кажется, только полдень, а кормили уже трижды! Если так пойдет дальше, я не доживу до обрезания. Ять, бегите, умоляю…</p><p class="p1">Он безнадежно махнул рукой и кивнул мулле. Вместе они проследовали в одно из помещений второго этажа, откуда доносился бешеный треск пишущей машинки. Ять не выдержал и заглянул в кабинет: откуда бы татары так бойко выучились ремингтонировать воззвания? Посредине комнаты стоял казан с остывшим вареным мясом, сверху его покрывал ровный слой белого жира. У стола сидел молодой татарин и со счастливой улыбкой колотил по клавишам, даже не заправив листа в каретку. Татарин подмигнул Ятю, мулла оглянулся, и лицо его скривилось в брезгливой гримасе. Ять никогда не видел столь чистого примера азиатского правления. Он поспешно захлопнул дверь и быстро спустился по лестнице.</p><p class="p1">— Ну, видишь — не взяли, — приободрил его белокурый.</p><p class="p1">На базаре было людно, пыльно и пестро от халатов. Русских лиц почти не наблюдалось — Ять узнал только нескольких местных бродяг, которые с обычным угрюмым и презрительным видом сидели у входа; им перемена власти ничем не грозила. Для начала Ять подошел к смуглой морщинистой татарке, у которой в первый свой гурзуфский день угощался вином.</p><p class="p1">— Домашнего-то не нальете? — спросил он, старательно изображая небрежность. Татарка покачала головой.</p><p class="p1">— Кто ж у вас теперь покупать будет, если не русские? — попробовал Ять урезонить ее. — Тут же русских — две трети города, да еще летом, может быть, приедут…</p><p class="p1">Она не удостоила его ответом. Что-то от каменной бабы вдруг проступило в ее чертах и позе: она сидела неподвижно, поджав ноги, словно не предлагала вино покупателю, а демонстрировала плоды трудов своих неведомому богу.</p><p class="p1">— А, черт с тобой, — сказал он, разом перестав бояться последствий. — Черт с вами со всеми, властители.</p><p class="empty-line"/><p class="p1">Таня стряпала на зуевской кухоньке: на дровяной плите стояла сковородка, в ней плавилось баранье сало, Зуев на правах подмастерья промывал рис. Замышлялся плов.</p><p class="p1">— Слава Богу, — выдохнул Ять. — Они не лезли? Не угрожали?</p><p class="p1">— Да Бог с тобою, — в удивлении обернулась Таня. Сильные, уже посмуглевшие на мартовском солнце руки ее были обнажены до локтя, лицо раскраснелось, черные пряди спадали на лоб. Она чистила увядшую прошлогоднюю морковь для плова. Надо признать, ей шел и этот декор — кухня, сковорода, готовка, засученные рукава, хотя сочетание моркови и ножа вновь наводило на тягостную мысль об ожидающем всех обряде. — Они все дивные… Один — Ильдар — на базаре мне лишний фунт баранины положил… Черт знает, как она умудрялась устраиваться в непрерывно меняющихся обстоятельствах!</p><p class="p1">— И что потребовал взамен? Свидания?</p><p class="p1">— Знаешь что, Ять! — Таня вспыхнула. — Если бы я не боялась тебя убить по неосторожности, я бы влепила тебе великолепную плюху! Послушать тебя, меня домогается каждый кипарис…</p><p class="p1">— Если бы каждый кипарис давал тебе лишний фунт мяса, я волей-неволей предположил бы это. Таня — да и вы, Зуев, — предлагаю вам сегодня со мной уйти. Оставаться опасно.</p><p class="p1">— А куда идти? — поднял на него Зуев вечно обиженные глаза. — Тут по крайней мере дом…</p><p class="p1">— Да выгонят из дома-то! — Ятя начала злить его непонятливость. — Отберут под мечеть, он у вас как раз в мавританском стиле… Пойдемте, пока можно уйти. В Ялте хоть спокойнее…</p><p class="p1">— До Ялты пятнадцать верст, — сосредоточенно перемывая рис, отвечал Зуев.</p><p class="p1">— Что такое пятнадцать верст, если вечером начнется погром?!</p><p class="p1">— В вас, Ять, наследственный страх погрома, — не глядя на него, произнес Зуев. — Вы не должны обижаться, зная мою национальную теорию. Против крови-то не пойдешь. Я понимаю, что с вашей, ненамеренно юдаистской точки зрения национальный вопрос обязательно разрешается погромом. Но поверьте мне как русскому, с татарином всегда можно договориться…</p><p class="p1">— Давайте в другой раз обсудим национальный вопрос! — взбеленился Ять. — Я польщен, конечно, вашей попыткой свести все на евреев, но напрасно вы думаете, что русским ничто не угрожает. Сейчас не важно, что вы русский, а важно, что не татарин…</p><p class="p1">— Да почем вы знаете? — повышая голос и оторвавшись наконец от риса, возразил Зуев. — Род наш восходит к татарам, я это запросто докажу… У меня летописные свидетельства есть о татарском хане Зуе, давно подобраны — интересовался, знаете…</p><p class="p1">— Ага, — кивнул Ять. — Вы, стало быть, тоже с ними? А что же альмеки?</p><p class="p1">— Не бойтесь, не бойтесь за альмеков! — раздраженно огрызнулся Зуев. — Я ученый, меня политические пертурбации не касаются. Мне важно свое дело делать, а не вдаваться в тонкости…</p><p class="p1">— Знаете, Зуев… — Ять чувствовал, что еле сдерживается. — Для меня национальный вопрос всю жизнь стоял на восемьдесят первом месте. Но когда мой город захватят татары, я — полужидок, урод в русской семье — прежде всего вспомню о том, что я русский, черт бы меня задрал совсем…</p><p class="p1">— Ять, это же смешно! — воскликнула Таня, шинкуя морковь. — Ну с чего, в самом деле, ты взял, что будет погром?</p><p class="p1">— Маринелли предупредил. Он у них вроде муллы.</p><p class="p1">— А, значит, ему-то можно, — язвительно протянул Зуев.</p><p class="p1">— Что — можно?! Они удерживают его насильственно. Он-то и умолял меня бежать за подмогой.</p><p class="p1">— Нет, Ять. — Таня убрала со лба прилипшую прядь. — Я никуда не пойду. На базаре мне по-прежнему рады, громить никого, я надеюсь, не будут, — а если ты их боишься… Нет, я допускаю, конечно… Но если ты и вправду считаешь нужным помочь Маринелли — хотя он, по-моему, неплохо устроился, — сходи на один день в Ялту, заодно успокоишься… Может быть, там в самом деле есть иностранные суда… Сам подумай: что мы там будем делать втроем?</p><p class="p1">— Понятно, — сказал Ять. — Понятно.</p><p class="p1">Он знал, что через пять минут остынет и начнет укорять себя за то, что оставил в Гурзуфе беззащитную женщину под сомнительной защитой слабого, непрактичного ученого, — а потому, чтобы не терзаться весь день, пересилил себя и предпринял последнюю попытку:</p><p class="p1">— Я, может быть, глуп и напуган, простите меня. В конце концов, вы оба здесь гораздо дольше. Но подумайте серьезно: они в самом деле хотят отомстить русским, они только попробовали власти, последствия могут быть любые…</p><p class="p1">— Но ведь ты вернешься завтра? — спросила Таня. — Ты правда вернешься? Ты же не бросишь меня тут?</p><p class="p1">— До завтра в любом случае ничего не изменится, — миролюбиво поддержал ее Зуев.</p><p class="p1">— У вас ружье-то в порядке?</p><p class="p1">— Да, я проверял еще при Свинецком.</p><p class="p1">— Ну что ж, — кивнул Ять. — Тогда мне надо спешить…</p><p class="p1">— Постой, куда ты? Дождись хоть плова!</p><p class="p1">— Нельзя, идти надо на голодный желудок. Танька, Танька, ради Бога… впрочем, ты все знаешь сама.</p><p class="p1">— За меня не бойся, — засмеялась она. — Если я выкупила тебя у террориста, то с татарами договорюсь подавно. Если надо будет, я Вельзевулу голову заморочу, только бы вынуть тебя из ада, куда ты вечно умудряешься вляпаться…</p><p class="p1">Он поцеловал ее — пожалуй, несколько длительней, чем нужно было для скромного и прилюдного прощания, — и не заметил, как, сжав зубы, отвернулся Зуев.</p><p class="p1">— Ну, полно, — выдохнул Ять, оторвавшись от нее наконец. — Иначе я никогда не уйду.</p><p class="subtitle">21</p><p class="p1">«Уйду, уйду», — думал Льговский, но думать — одно дело, в этом есть тайная услада вечно оттягиваемого окончательного решения, а уйти — совсем другое: что прощается уходящему, у которого есть еще июне передумать, того не простят ушедшему, обрубившему все концы. Как Чарнолуский, в надежде оправдать себя, писал и писал бессмысленные заявления об отставке, — так и Льговский примеривался к разным вариантам ухода, отлично зная, что не уйдет ни сегодня, ни завтра. Не в пайке было дело, хотя желающих попрекнуть их пайком прибавлялось с каждым часом; не в социальном статусе, который давало членство в Крестовской коммуне. Статуса, ежели вдуматься, никакого не было: идея с лекциями провалилась, писать рифмованные сводки и рисовать плакаты он неумел, а от кружка, в который исправно ходила молодежь, проку не было, — он чувствовал даже смутную вину перед этой молодежью, которая смотрела на него как на мудреца, а мудрец понятия не имел, куда движется. Не утешила его и статья Арбузьева, появившаяся на следующий день после отвратительной клеветы Гувера.</p><p class="empty-line"/><p class="p1">«Не будем лгать друг другу, господа, и перестанем лгать себе, а бросим лучше ретроспективный взгляд на всю историю русской революции: почему победили большевики, именно и только большевики? — вопрошал Арбузьев. — У эсеров было больше сторонников, у кадетов — умных вождей, у Союза Михаила Архангела — больше денег; но ни один из этих критериев не имеет отношения к выбору победителя. Победителя мы назначаем себе сами — и сами же отвечаем за собственных врагов, ибо сами и создаем их; большевики были зеркалом русского самодержавия, единственной партией, которая вполне уравнялась с ним. Зло никогда не побеждается добром — оно лишь формирует другое зло по своей мерке; это закон не нравственный, но физический, и потому стенать бессмысленно. И уж вовсе смешно видеть в торжестве физического закона нечто вроде результата мирового заговора.</p><p class="p1">Сегодня русская оппозиционная интеллигенция, привыкшая к тому, что только ненависть к правительству и Отечеству дает ей статус святой великомученицы, продолжает розыски незримого врага. В сознании этих людей единственной достойной задачей является разрушение, единственным оправданием собственного бытия — враждебность к властям, каковы бы они ни были. Любой, кто поддерживает власть, хотя бы и в борьбе с холерою, — является уже пособником антихриста, подручным палача и вдобавок агентом Германии. Именно об этом свидетельствует и вчерашнее выступление моего всегдашнего противника г. Гувера, увидевшего в русской революции железную руку германского генерального штаба, а в поселении на Крестовском острове — хорошо оплаченную большевиками провокацию одних художников против других. Неужели ключевым пунктом для оценки русской революции является именно содействие (активное или пассивное) германского генштаба в проезде г. Ленина и его веселых товарищей на Родину? Неужели в характере русской революции меняется что-то от того, что она совершилась при участии германского генштаба? И неужели она не совершилась бы БЕЗ этого участия? У вы, при той старательно культивируемой ненависти к Отечеству, которая сжигала и вместе ласкала сердца русских оппозиционеров, едва ли можно было избежать ее.</p><p class="p1">Нет, не г. Ленин со товарищи уничтожил русское самодержавие. И не пора ли за честнейшим из наших поэтов повторить горькую правду: сами мы подкладывали щепки в костер, а после забегали вокруг него с криком «Горим». Иное дело, что в борьбе, которую усиленно вело с самодержавием русское общество, деградация самодержавия и общества шла параллельно и в конечном итоге, как бывает во всякой борьбе, непримиримые враги уничтожили друг друга. Единственным исходом всякой борьбы является взаимное уничтожение борющихся. Лучшим примером этой закономерности служит французская история: на руинах монархического правления и якобинской диктатуры, пожравших друг друга, вознесся неожиданный победитель — Наполеон, не принадлежавший ни к тому, ни к другому лагерю. Во всякой борьбе побеждает третий, возрастая на почве, обильно удобренной кровью борцов. Так в борьбе русского самодержавия и русского общества, свидетельством крайней деградации которого было появление большевизма, — возросло нечто третье, чему все мы сегодня свидетели. Каким станет это третье — зависит исключительно от нас.</p><p class="p1">Русский большевизм погиб в самую минуту победы, исполнив единственную свою миссию — заключенную в доведении до абсурда всех родовых признаков русской общественной мысли. Посмотрите сами, много ли общего у сегодняшней российской власти с тем большевизмом, который провозгласил когда-то свободу печати, мир, хлеб и прочие превосходные вещи. Все эти лозунги отброшены за ненадобностью, а на лицах г. Ленина и его сподвижников читается страшная растерянность людей, которых использовал и выбросил на свалку таинственный дух истории. Все замерло в ожидании новой силы, которая возрастет на руинах русского самодержавия (выродившегося в Николая Романова) и русской революции (дошедшей до большевистской неразборчивости в средствах). Приметы этой третьей силы я вижу, с одной стороны, в цензуре и почти тотальной мобилизации, в разговорах о «пролетарской» диктатуре, с другой же — в сообществе свободных художников, которым, безусловно, нет резона, покупать себе расположение новой власти. Скорей уж власть должна привлечь их на свою сторону, — и то, что она заботится о прокормлении художника, само по себе способно внушить надежду.</p><p class="p1">Те, кто берется сегодня действовать в союзе с новой властью, пока не сознающей себя, — идут на немалый риск, ибо власть эта вполне может оказаться людоедской. Но чтобы она не оказалась таковой — нужно внушать ей человеческие законы, обучать ее уважению к искусству и предостерегать от ошибок прежних российских правителей. Пусть отряд доблестных героев, объединившихся под знаменем «Мы говорили!», не раз еще бросит нам в лицо упрек за все неудачи и погрешности этой власти. Пусть! Они всегда будут правы — и всегда мертвы, ибо ошибается только живущий. Это и есть главная его примета».</p><p class="empty-line"/><p class="p1">Арбузьев как будто говорил дело, более того — многие его мысли были словно подслушаны у Льговского, однако еще Хламида заметил, что ничто нас так не уязвляет, как солидарный с нами пошляк. Самое ужасное заключалось в том, что Крестовский вождь Корабельников был не прочь воспользоваться ситуацией: всякий поэт желает быть единственным, но не с государственной же помощью! В искусстве для него существовали чистые и нечистые, свои и чужие, — и отчаянная тоска этого разделения не давала Льговскому спать. Они ушли из Елагина дворца не потому, что хотели бороться, а потому, что их выгнали, — Корабельников же, которого никто не звал, сам заявился сюда делать из них боевой отряд. В искусстве не бывает боевых отрядов, победы одерживаются без помощи запретов. Уйду, уйду.</p><p class="empty-line"/><p class="p1">Но окончательно он решился уйти в день, когда Соломин привел попа.</p><p class="p1">Поп явился в три часа пополудни. Льговский только что вернулся из нетопленой Публичной библиотеки с грудой ценных выписок, все по восемнадцатому веку (к едва освоенному опыту которого, без сомнения, должна была теперь обратиться русская поэзия). Все фантастические тезисы, весело и напряженно обдумываемые по пути на Крестовский, остались у него в голове: сесть за письменный стол ему пришлось только в половине шестого, и не для работы. Он вошел, как выяснилось, через минуту после попа.</p><p class="p1">Поп раздевался на первом этаже, снимал длинное пальто с меховой оторочкой, сбрасывал его на руки подобострастному Соломину, долго расчесывал редеющую шевелюру и густую рыжую бороду. Вид у него был хитрый. Во всех движениях попа была сладкая плавность. Он продул расческу и спрятал ее куда-то под рясу, долго смотрелся в волнистое зеркало, подмигнул отражению и обратился к Соломину:</p><p class="p1">— Ну-с, Николай Константинович, я готов.</p><p class="p1">— Так пойдемте, пойдемте, — засуетился Соломин. Такое подобострастие было вовсе не в его духе — он был человек уверенный, не без барства, которое всегда раздражало Льговского. Поп явно был зачем-то нужен барину, но что попу делать у крестовцев?</p><p class="p1">Соломин обходил комнаты: он специально приурочил явление попа к обеду. Обедали на Крестовском в три. Выходили в столовую не все — в коммуне художники преобладали над учеными, а потому предпочитали есть у себя, в одиночестве. Впрочем, сегодня Соломин настоятельно просил собраться всех: первым пришел заинтересованный Корабельников, за ним тихой тенью просеменил Мельников, неуклюже протиснулся Барцев, спустился Краминов, явились неразлучные Кульбин и Митурин, внеся с собой стойкий запах краски, — следом анархо-крестьянствующий Конкин, конструкционист Ладыгин и поэт-речитативист Лотейкин, Бог весть с чего причислявший себя к футуристам, но гордо приделавший приставку moi. Разумеется, ни одно сборище по-прежнему не обходилось без Драйберга и Камышина.</p><p class="p1">— Что ж, други, — это было любимое обращение Соломина, оказавшегося большим славянолюбом. — Я вам представлю сегодня человека, в котором, не шутя, вижу для Родины большую надежду. Здесь, что греха таить, мы много говорим о новой России, России без попов. Но представьте — есть и в церкви у нас единомышленники! Позвольте представить: отец Алексей Галицкий, священник Троицкого собора, большой мой друг и, смею сказать, учитель. Думаю, что и вам послушать его душеполезно, как говорят люди церковные.</p><p class="p1">«Фи, мерзость, — подумал Льговский. — Раскаявшийся батюшка. Сейчас начнет говорить, как устроены плачущие иконы. Предложит свои услуги в агитации. Все это под варево из мороженой картошки… Нет, уйду, уйду».</p><p class="p1">— Любезные братья по вере! — густо проговорил поп. — Знаю, что не всем понравятся слова мои, но вера у нас одна, на том стою. Все мы с вами посильные труженики великого обновления России, и как русский священник, чающий этого обновления, — я благословляю вас и силу, вас породившую. Патриот моего Отечества, я благословляю Ленина. Ибо великой Россия станет только с большевиками: силу за ними чувствую былинную, решимость мученическую. Христианство давно призывало богатых одуматься, бедных — выпрямить спину. Вместе мы построим новую церковь — Великую красную церковь единой обновленной России!</p><p class="p1">Ах вот как, догадался Льговский. Ему приходилось читать про обновленцев (почти всегда что-нибудь брезгливое), но живого попа обновляющейся церкви он видел впервые.</p><p class="p1">— Из всех сил, присутствующих сегодня в жизни нашей, — басил поп, — одним большевикам под силу удержать Россию от разрухи, распада, отрешения окраин… Россия создана быть империей — или не быть вовсе. Империей ей и быть — под большевиками или нет. Сказано: откроюсь не искавшим Меня. Сбывается на глазах: большевики отвергли Христа — чтобы тем верней следовать Его путем! Отряхнув вековую патину… вместе с молодой властью… нести сжигающую весть… и та-та-та…</p><p class="p1">Льговский уже не слушал. Он давно ждал чего-то подобного. Там, где ему рисовалось вольное содружество художников, мир веселой свободы и творческой молодости, — возрождалась прежняя империя, только безмерно поглупевшая, и точно так же пели над ней сановитые, хитрые попы: пели они какую-то скучь, вроде «Интернационала». Впереди шагал Христос. Вот что, оказывается, имелось в виду: сказать бы автору…</p><p class="p1">— В Ленине есть дух великих русских пророков, — опершись о стол, солидно продолжал поп. — Отсечь все лишнее… разрушить храм старого… библейский Самсон…</p><p class="p1">Тут Льговский хихикнул. Ленин был лыс, как колено. Страшно подумать, во что ушла сила у этого Самсона.</p><p class="p1">— Стихийная избяная Русь… — гнусил поп.</p><p class="p1">— Правильно! — крикнул Конкин. Отличительной особенностью этого крестьянского анархиста было то, что на фаянсовый унитаз в роскошном прилукинском клозете он забирался с ногами и устраивался орлом. Он вполне мог бы сидеть на нем в менее горделивой позе, но шел на неудобства ради сохранения глубинной подлинности, которой Льговскому было не постичь.</p><p class="p1">— Это все хорошо, — с ядовитой, бархатной учтивостью вступил Корабельников; его медный бас с легкостью перекрыл поповское блеяние. — Но скажите вы нам, любезный: при чем тут Бог, которого, по моим наблюдениям, нет и неизвестно?</p><p class="p1">Он готовился к очередному бою, который собирался выиграть одним из своих грязнейших кощунств: надо было сразу показать гостю, кто тут главный. Поп, однако, был малый не промах — он явно готовился к беседе.</p><p class="p1">— Не вы ли, Александр Александрович, написали «Апостола»? — вкрадчиво спросил он.</p><p class="p1">— «Апостола» моего ваш Синод под нож пустил, — буркнул польщенный Корабельников.</p><p class="p1">— Всякий поэт с великим даром вроде вашего свидетельствует о Господе, — не давая ему вставить слова, заторопился поп. — Поэзии нет без Господа, хотя бы она и не искала, и не сознавала его. Россия не примет революции без Бога, нельзя разрушить храм, не создав нового…</p><p class="p1">— Мы вместо храма предложим машину! — пискнул конструкционист Ладыгин.</p><p class="p1">— Однако и машина свидетельствует о Господе своей соразмерностью, — не терялся поп.</p><p class="p1">— Бездушной вашей машине молитесь сами! — провыл Конкин. — Мы будем молиться ослезенным глазам кобылиц!</p><p class="p1">— Революция — стихийное явление народной веры, — поддержал Алексей Галицкий. — Вера народа — не книжная вера интеллигенции, а подлинный Христов огонь, который очистит… закалит… выжжет… переплавит…</p><p class="p1">Вот и всё, понял Льговский. Они прекрасно договорятся между собой. Самое мерзкое, что было в тех временах, и самое угрожающее, что есть в этих. Они сольются и построят свой дивный новый мир. Я, которому только и нужна свобода, опять остаюсь не у дел. Палач и жертва обнялись, над ними молнии взвились. Когда я наконец привыкну, что вся их борьба — чистая видимость? Попользовались нами, хлюпиками, да и амба. Мы помогли им раскачать лодку только для того, чтобы они имели шанс пересесть на дредноут.</p><p class="p1">— Мы с товарищем попом еще поспорим, — гудел между тем Корабельников. — Я об заклад побьюсь, что товарища попа вдрызг разагитирую. Но сейчас такой веселый товарищ поп — нужный нам союзник. В борьбе союзниками не бросаются. Вашу руку, товарищ богоносец!</p><p class="p1">Товарищ рогоносец пожал руку товарищу богоносцу. Плохой, вредный я человек, бессовестный человек.</p><p class="p1">— Ну-с, други, — засуетился Соломин, — для такого дела… Товарищ Камышин, неси припас!</p><p class="p1">Камышин, подчиняясь барскому приказу, стремглав вылетел из прилукинской столовой и через полминуты вернулся с тремя подозрительными бутылями, в которых бултыхалась мутная жидкость.</p><p class="p1">— Свекольный, не побрезгуйте, — приговаривал Соломин. — За встречу, по-русски…</p><p class="p1">Выпить хотелось, но Льговский пересилил себя. Он встал и бочком, бочком выбрался в коридор. За ним выскользнул Драйберг.</p><p class="p1">— Что же ты не пьешь, товарищ? — спросил он умильно. — Все, понимаешь, пьют, а ты не хочешь.</p><p class="p1">Льговский остановился, некоторое время постоял спиной к Драйбергу, потом повернулся к нему, взял за пуговицу и раздельно сказал:</p><p class="p1">— Если ты, тварь, еще раз подойдешь ко мне, я мозги тебе вышибу.</p><p class="p1">— Ой, страшно, страшно, — засмеялся Драйберг. — Брат, не шуми. А то я не знаю за твои дела с Телятниковым, ой, я умоляю вас…</p><p class="p1">Льговский вздрогнул. Про дела с Телятниковым мог знать только тот, кто следил за ним давно и пристрастно: во время войны, в начале шестнадцатого… сущий пустяк… поучаствовал сдуру в благотворительной подписке, получил свой процент, потом слышал, что издатель и меценат Телятников скрылся со всеми деньгами, собранными в пользу раненых… Даже из врагов никто не попрекал его той историей: он не знал, что тут мошенничество, и как было знать? Теперь он понял, что значит быть под колпаком; ловушка захлопнулась. Под наблюдением были все, их повязывали нагло, без стеснения. Вякни слово — в ответ вытащат из рукава безотказный козырь, ошибку юности, позор детства. Теперь, возможно, и бежать уже поздно. Он замахнулся, сдержался, скрипнул зубами. Драйберг спокойно улыбался.</p><p class="p1">— Таки не зря мы хлеб кушаем? — спросил он. Льговский резко повернулся и прошел к себе.</p><p class="p1">«Дорогой Саша, — написал он. — Я ухожу.</p><p class="p1">Прости.</p><p class="p1">Была надежда сделать выбор, не запачкавшись.</p><p class="p1">Хватит утопий.</p><p class="p1">Всякий раскол — не последний.</p><p class="p1">В литературе победителей не бывает, а побежденных не судят.</p><p class="p1">Я ушел плясать».</p><p class="p1">Он собрал книги и выписки в единственный чемодан, с которым пришел сюда, туда же побросал немногие свои пожитки, сунул записку под дверь Корабельникова и вышел через боковой вход. Было шесть часов вечера, и нежно-алый закат сиял над Малой Невкой. В небе угадывались силуэты кораблей, клочья парусов, язычки флагов. Чувствовалось, что город стоит у моря.</p><p class="p1">Есть восторг разрыва, дающий почувствовать, что мы живы. Всякий уход — всегда к себе, и у себя всегда лучше. Через десять минут он уже не думал о Корабельникове. Не забыть передать ребятам, что собираемся теперь у меня.</p><p class="p1">С этого дня он подписывался Давидом.</p><p class="subtitle">22</p><p class="p1">С верхней дороги два коричневых камешка Адалар казались висящими в воздухе. Граница между морем и небом не просматривалась отсюда — слева открывалась сплошная хрустальная бездна той голубизны, какая бывает на юге только в конце марта, на еле заметном переломе от дня к вечеру. Ять шел уже час, но не устал ничуть. Было три пополудни. Дорога оказалась на удивление безлюдной — только на повороте к Никитскому саду встретился ему перепуганный дачник с вязанкой серых корявых поленьев. Ничего пугающего в облике Ятя как будто не было — видимо, старик боялся всего.</p><p class="p1">По обыкновению, чтобы не скучать наедине с собой, Ять принялся придумывать историю. Представим приморский город, в котором — в мирное, разумеется, время, без всяких революций, — сошлись, не сговариваясь, приятели старинных лет, прежде любившие съезжаться на недорогих русских курортах. Ни один не признается, что погнало его сюда: измысливаются фантастические причины, делаются многозначительные намеки… Ну, вот ты, положим, что здесь делаешь? Да так, подлечиться: ты же знаешь местные воды. О, прекрасно знаю: купец Железников разливает их в большие мутные бутылки (якобы дневной свет вредит целебным свойствам воды из пещерного источника): самая мутность бутылок негласно предупреждает о том, что дело нечисто. Ну хорошо, а ты зачем приехал? Показать жене места моей юности. А давно ли ты женился? Недавно, меньше года… И приехал сюда с женой в марте? Да, ведь все гораздо дешевле! Но где жена? Ах, она простудилась и уехала. А я остался.</p><p class="p1">Итак они обмениваются этими глупостями, и каждый прекрасно понимает другого, — все скрывают истинную причину, — но вот незадача: причины, похоже, никто не знает. Каждый делает вид, что ему есть что скрывать, — но наедине с собой признается: я не знаю, что здесь делаю. День идет за днем, и сам я прошел полверсты, разрабатывая завязку, — но что же было дальше?</p><p class="p1">Сейчас, сейчас. Никогда нельзя обманывать читателя, обещая ему развязку, сервируя закуски в предвкушении главного блюда — и оставляя голодным: иное дело, что двинуться все должно в небывалом направлении, которого он сам еще не видит. Вот тоже был занятный, если вдуматься, сюжет: одно время… когда же это было? Да, точно, тринадцатый год: «Биржевка» стала вдруг на последней странице публиковать — в пунктирной рамке, чтобы желающие могли вырезать, — список, о котором никто не мог сообщить ничего достоверного. Просто — «Списокъ», без всякого уточнения. Там было тридцать девять фамилий, довольно нейтральных, часть из них он знал — Мизеров, Фоскин, но с другими инициалами. Что, если бы он обнаружил там собственную? Был ли это список членов тайной организации (несомненно, для террористов определенного толка особый шик заключался в том, чтобы опубликовать его под носом у правительства, по принципу «прячь лист в лесу») или невинный перечень учредителей акционерного общества, у которого не хватило денег на публикацию своего слишком длинного названия, — Ять так никогда и не придумал; как-то раз он обсудил эту историю с Грэмом.</p><p class="p1">— Это был список действователей, — сказал Грэм, как обычно вразрядку, не потратив и трех секунд на выдумывание новой сказки.</p><p class="p1">— Ну-ка, ну-ка, — подбодрил Ять.</p><p class="p1">— Действователей, то есть людей, предназначенных к изменению мира. В этом составе они способны действовать с максимальным результатом, как пуля, посланная в цель под верным углом.</p><p class="p1">— Но кто определяет этот максимум?</p><p class="p1">— Не «Биржевка», конечно. Раз в неделю приходит таинственный человек в рыжем пальто, непременно в рыжем. Он передает список, а при нем конверт с деньгами. Метранпаж набирает, но каждый раз заменяет одну фамилию, думая, что этим срывает дьявольский замысел. В один прекрасный день метранпажа находят мертвым. Но уже поздно — все пошло не так, и в результате мы живем в том именно мире, в котором живем. Это хорошо бы, знаете, жечь с двух концов: сначала таинственный список, потом убийство метранпажа.</p><p class="p1">— А вы не хотите вместе со мной разобраться, что за список?</p><p class="p1">— Нет, конечно! — с ужасом воззрился на него Грэм. — Зачем мне знать, как есть, если я знаю, как надо?</p><p class="p1">Вот, однако, и Ялта. И понятия не имея о том, что его здесь ожидает, он с предчувствием счастья узнал белый амфитеатр, спускающийся к морю: ажурный летний театр, ресторан «На горе» со знаменитой террасой, белые плоские крыши, черные кипарисы и золотой купол церкви святого Николая — покровителя рыбаков, хранителя плавающих и путешествующих. Храни меня, святой Николай.</p><p class="empty-line"/><p class="p1">Ялта начиналась с пригородных дач — чем ближе к центру, тем больше и богаче они становились, — с заколоченных магазинов, пустых кофеен и безлюдных белых дворцов. Город словно вымер. Около бежевого особняка, смутно знакомого по прежним одиноким прогулкам, Ять остановился: вдали послышался топот целой кавалькады. На узких улочках пешему трудно разминуться с конным отрядом; Ять поднялся на крыльцо роскошного двухэтажного особняка и прислушался. Внезапно дверь распахнулась, сильные руки сгребли его в охапку и втащили внутрь. Ять так обалдел от неожиданности, что, увидев перед собой Грэма, уже не удивился: реальность окончательно утратила смысл.</p><p class="p1">— Грэм, откуда? — только и спросил он.</p><p class="p1">— Вы что, самоубийца? — запыхавшись, спросил, в свою очередь, Грэм. — Кто ходит по городу в эту пору?!</p><p class="p1">— Но до темноты еще долго…</p><p class="p1">— При чем темнота? Гетман объявил комендантский час с трех!</p><p class="p1">— Какой гетман?</p><p class="p1">— Вы ничего не знаете? — округлив глаза, спросил Грэм.</p><p class="p1">— Откуда мне знать, я только из Гурзуфа!</p><p class="p1">— А разве в Гурзуфе не то же самое?</p><p class="p1">— Нет, там татары.</p><p class="p1">— Я мог ожидать, — кивнул Грэм. — Ну, идемте.</p><p class="p1">— Погодите, вы-то как здесь оказались?</p><p class="p1">— Идемте, идемте — Грэм потянул его за рукав. — Сейчас чем дальше от дверей, тем безопаснее.</p><p class="p1">И точно — где-то неподалеку, чуть не напротив, бренькнуло разбитое стекло. Вскоре кавалькада зацокала совсем близко, но всадников Ять не видел: все окна были забраны ставнями и в доме царил полумрак.</p><p class="p1">— Я вас увидел в глазок, — гордо заметил Грэм. — Еще немного — и я не поручился бы за вашу будущность…</p><p class="p1">Сухо треснул выстрел.</p><p class="p1">— О, дум керл! — послышался из соседней залы ворчливый старушечий голос. Ять различил шарканье туфель, открылась дверь, и перед ним предстала невысокая старуха в сером платье и теплой шали. Судя по всему, это была хозяйка дома.</p><p class="empty-line"/><p class="p1">Большевики в Ялте не удержалась — уже в декабре местный градоначальник Терновский предпринял попытку реванша; в ответ из Севастополя явился крейсер «Верный» и учинил небольшую расправу. Власть в Ялте на короткое время вновь получила Таврическая республика, а Терновский спасался в подвале дома, который, словно по молчаливому сговору, избегали разорять все власти.</p><p class="p1">Впрочем, в середине марта Бог весть откуда явился гетман Чернорудько, пообещавший для начала разобраться с жидами, а потом перевешать и остальных большевиков; тут-то градоначальник и попытался активизироваться, но Чернорудько его не принял, передав на словах, что по-хорошему за сдачу города голодранцам он заслуживает повешения, — а впрочем, пусть убирается: Ялта теперь часть Вольной Сечи, которую гетман намеревался восстановить в границах семнадцатого века. В перспективе он подумывал и о завоевании Туретчины.</p><p class="p1">Утратив надежду на гетмана, градоначальник Терновский вернулся в спасительный подвал, где уже пережидал внезапную беду глава большевистского правительства Ялты Кропачев. Большевик Кропачев и градоначальник Терновский вынужденно уживались под общим кровом — и, надо заметить, не враждовали. Оба мечтали скинуть гетмана. После бескровного захвата Гурзуфа босяцкой армией эсера Свинецкого к ним присоединился бывший глава гурзуфского большевистского правительства Трубников, который хотел попросить у Кропачева подмоги, но в результате разделил с ним подвал.</p><p class="empty-line"/><p class="p1">А Грэма привел в подвал Свинецкий, давний товарищ по ссылке. Свинецкий как раз приехал в Ялту из Гурзуфа на предмет небольшого экса — и обалдел от множества неожиданностей сразу: во-первых, в городе уже хозяйничал гетман, во-вторых, в нем невесть откуда появился старый приятель Кремнев! Являться на прежнюю квартиру Свинецкому было опасно — его хорошо знали в городе и могли запросто сдать молодцам гетмана; возвращаться в Гурзуф ночью было рискованно. Чутьем опытного конспиратора эсер нащупал в Ялте безопасное место, где все в итоге и встретились — градоначальник, большевик, несостоявшийся диктатор Гурзуфа и беллетрист. В эту-то компанию и попал неожиданно Ять, которому в силу его иудейской внешности — черная шевелюра, нос с горбинкой, — могло капитально не поздоровиться при встрече с гетманским патрулем.</p><p class="empty-line"/><p class="p1">Все это Грэм тут же бегло изложил ему.</p><p class="p1">— Ночью возможны облавы, — со значением шепнул он. — Обыск тут едва ли будет, но в подвале надежней. Завтра днем попытаемся уйти.</p><p class="p1">Он представил Ятя хозяйке («Мой друг, известный писатель из Петербурга»).</p><p class="p1">— Как много едет в этот сезон писателей, — прокряхтела старуха. — Ялта стала модное место, да…</p><p class="p1">— Ну, идемте в гостиную, — гостеприимно пригласил Грэм. — Я вас сейчас со всеми познакомлю.</p><p class="p1">Больше всего сборище напоминало пятерку приятелей из только что придуманного рассказа, неведомой силой собранных в приморском городе после долгих лет разлуки. В гостиной при свечах мрачно сидели по углам осунувшийся Свинецкий, толстый и благодушный градоначальник Терновский, никогда не терявший бодрости духа большевик Кропачев, сам рыбак, из бывших матросов, и до смерти перепуганный Трубников; он был уже не рад, что ввязался в большую политику. Свинецкий грыз спичку: табак был на исходе, приходилось экономить. Появление Ятя явно прервало затяжной спор.</p><p class="p1">— Вы? — вскинулся Свинецкий. — Но ведь я арестовал вас. Побег?</p><p class="p1">Это «я арестовал вас» выглядело так трогательно в его положении, что Ять почувствовал к нему теплую симпатию.</p><p class="p1">— Видите ли, — осторожно попытался он объяснить эсеру особенности текущего момента, — история несколько ускорилась. Власть переменилась.</p><p class="p1">— Значит, вы не бежали, — зажимая бороду в кулаке, мрачно констатировал Свинецкий. — Как были тряпкой, так и остались.</p><p class="p1">Даже в этой ситуации его больше всего заботил вопрос о воспитании из Ятя истинного революционера.</p><p class="p1">— Не успел, — виновато признался Ять. — Татары освободили.</p><p class="p1">— Татары? — вскинулся Терновский. — Восстание? Что вы говорите!</p><p class="p1">— Да, восстание. Обиделись на закрытие рынка и ночью захватили Гурзуф.</p><p class="p1">— На Ялту идти не собираются? — с надеждой спросил Кропачев. — Они бы эту суку гетманскую в один укус…</p><p class="p1">— Не знаю. Пока устанавливают в Гурзуфе свои порядки. Русским на рынке ничего не продают, готовится всеобщее обрезание…</p><p class="p1">— Кто бы мог подумать! — всплеснул пухлыми руками Терновский. — Такие смирные…</p><p class="p1">— Революция электризует массы, — важно заметил Свинецкий. — Я рад, что возрождаются национальные движения. Российская империя была тюрьмой для всех народов, кроме русского…</p><p class="p1">— Вот вам национальные движения! — Терновский мотнул головой в сторону наглухо закрытого окна. — Пришел неведомый хохол и прогнал всех.</p><p class="p1">— Пролетарии все братья! — стукнул кулаком по колену Кропачев. — Что ж мы, для того русского царя скинули, чтобы у нас гетман сидел? Или, того хуже, мулла? Спасибо вам широкое от рабочего классу, сменяли гуся на порося!</p><p class="p1">— Сейчас не спорить надо, товарищи, — робко заметил Трубников. — Сейчас думать надо, как татар погнать да гетмана скинуть, а уж там договоримся…</p><p class="p1">— Нет, не договоримся! — вскинул голову Свинецкий. — С вашими товарищами пытались договориться — они украли революцию, как цыгане крадут ребенка! Мы должны выяснить все между собою сейчас, и только сейчас!</p><p class="p1">Эта уверенность, что в полутемной ялтинской гостиной решается судьба России, окончательно развеселила Ятя. Он уселся в свободное кресло и приготовился слушать.</p><p class="p1">— А как вы попали в Крым? — подозрительно спросил Терновский. — С большевистским поездом?</p><p class="p1">— Это не был большевистский поезд, — веско пояснил Грэм. — Не верьте слухам. Я тоже прибыл этим поездом, но с особой миссией.</p><p class="p1">— Позвольте узнать, какой?</p><p class="p1">— Терпение, терпение, — усмехнулся Грэм, и Ять поразился его уверенности: не было в России другого писателя, который бы так уверенно претворял вымысел в явь.</p><p class="p1">— О, как это будет прекрасно! — не слушая никого, увлеченно фантазировал Свинецкий. — Могучая центробежная сила революции… страна, подхваченная ею, распадается на множество автономий! Гибнет удушающая центральная власть, в каждом вольном городе расцветают свои таланты… своя письменность… Потом можно объединиться, но вначале, когда падают скрепы… Гигантская махина, лежавшая тяжелой тушей на пути человечества к будущему, превращается в цветущий сад национальных государств, свободных, новых…</p><p class="p1">В эту торжественную минуту послышался резкий стук в дверь, и мимо гостиной прошаркала хозяйка, сквозь зубы ругающаяся по-датски.</p><p class="p1">— Кто это? — трясущимися губами прошептал Трубников.</p><p class="p1">— Господи, да успокойтесь! — отмахнулся Грэм. — Это Егор, дворник, пришел с базара…</p><p class="p1">Послышались стук отодвигаемой щеколды и тяжелые шаги. Дворник басовито отчитывался о приобретенном и потраченном.</p><p class="p1">— А почему она всех пускает? — полюбопытствовал Ять. — Что за старуха?</p><p class="p1">— Это фрейлина двора, Анна Густавовна фон Кирстенхардт, дальняя родственница императрицы Марии Федоровны, — уважительно пояснил Терновский. — Но пускает не всех — не то бы тут уже было, знаете… Мы с ней старые друзья, а новая власть, — он кивнул на Кропачева, — к ней еще в декабре ездила представляться. Слава Богу, хватило ума не трогать старушку.</p><p class="p1">— Со старушками не воюем! — огрызнулся Кропачев.</p><p class="p1">— Она бабушка известная, — подтвердил Трубников. — Ее на всем побережье знают. Помогала много, на бедных давала…</p><p class="p1">— А вы и брали, — презрительно заметил Свинецкий. — Вот — рабство…</p><p class="p1">— Однако вы тоже здесь, — тяжело, всем телом повернулся к нему Терновский.</p><p class="p1">— Здесь… потому что здесь пока безопасно. А все-таки я презираю и этого так называемого монарха, и его семью. Она надеется купить себе жизнь, когда кто-то из нас вернет власть, — вот ее расчет. Ведь все мы здесь — представители власти, вопрос только — кто раньше ее получит. Ять тихо рассмеялся.</p><p class="p1">— Простите, — говорил он сквозь смех, — простите, господин диктатор, а все-таки это уж очень смешно. Сидят в одном убежище четыре властителя… прелесть что такое! Это, знаете, пасьянс такой был — четыре короля… Секунду, сейчас вспомню. Значит, четыре короля пошли к четырем дамам, выпили, расшумелись, пришлось, значит, соседям вызвать полицию… Полиция — это валеты. Потом все смешалось, а потом это как-то так раскладывалось, что…</p><p class="p1">— Вы всегда иронизируете, — недовольно заметил Свинецкий. — Это позиция труса, но вы сами себе не желаете отдать в этом отчет. Когда-нибудь придется платить за все… решаться на что-то… Боюсь, из вас так никогда и не сделаешь человека.</p><p class="p1">— Не имею чести вас знать, — обиженно заметил Терновский, — вы, может быть, с особой миссией из Петербурга, но позволю себе заметить, что градоначальник Ялты — должность не пустая, я в должности седьмой год, и город в его современном виде…</p><p class="p1">— Да я не подвергаю сомнению ваши заслуги! — миролюбиво остановил его Ять. — Но как вам в этом, с позволения сказать, убежище не ясна тщета всех ваших разногласий? Ей-Богу, только русские могут сидеть в подвале и еще спорить, спорить, спорить…</p><p class="p1">— А что делать?! — вскинулся Свинецкий. — Лапки кверху — так, по-вашему, благороднее?</p><p class="p1">— О душе думать, — вздохнул Ять. — Или хоть сообразить, как гетмана сбросить…</p><p class="p1">— Мы об этом и спорим! — развел руками Терновский. — Нельзя же действовать, не договорившись об основах…</p><p class="p1">— Да вы для того только и спорите об основах, чтобы не переходить к делу. Вот вы, Владимир Васильич, — отнесся Ять к Свинецкому, — хоть бы акт организовали! Не насмерть, конечно, но так, чтоб оглушить. У вас получится, я думаю… — Ять изо всех сил пытался загнать внутрь неудержимый смех, но он лез наружу, как пена из бутылки.</p><p class="p1">— Акт? — с невыразимым презрением отозвался Свинецкий. — Чтобы власть досталась господину Терновскому или вашим друзьям большевикам? Ять понятия не имел, с чего большевики вдруг стали его друзьями, но доискиваться причин не стал.</p><p class="p1">— Все мы тут временно, — продолжал Свинецкий. — Я пересижу комендантский час, утром выйду и продолжу работу… Но союзничков среди большевиков или царских прихвостней искать не намерен — если мы и победим, то сами!</p><p class="p1">— Вот оттого-то вы, товарищ эсер, никогда и не победите, — ласково заметил Кропачев. — Большевистская тактика борьбы — она какая? Она такая, что хоть с чертом лысым, хоть вот с товарищем Терновским на врага идти, — а потом и разбираться, чья возьмет.</p><p class="p1">— Эта тактика нам слишком известна, — поджал губы Свинецкий. Воцарилось тягостное молчание.</p><p class="p1">— А табачку у вас, товарищ, нету? — нарушил его Трубников, искательно глядя в лицо Ятю.</p><p class="p1">— Есть немного.</p><p class="p1">— Спустимтесь в подвал, перекурим? Тут нельзя, у хозяйки грудь слабая…</p><p class="p1">— Пойдемте, — кивнул Ять.</p><p class="p1">— Я с вами, пожалуй, — встал со стула Грэм. Видно было, что курить очень хочется и Свинецкому, но он не мог себе позволить брать табак у идейного противника.</p><p class="p1">— Вы не будете? — спросил его Ять.</p><p class="p1">— После, — с усилием ответил эсер.</p><p class="p1">Спуск в подвал находился в кухне — внизу хранились припасы и вина, которые старухе поставляли с Голицынских складов. До молодого красного вина она была великая охотница. Трое — Грэм со свечой впереди, Ять и Трубников сзади, — спустились в небольшое помещение, тесно уставленное деревянными ящиками. Пол в подвале был земляной, холодный, пахло сыростью.</p><p class="p1">— И вы тут всю ночь просидели? — поежился Ять.</p><p class="p1">— А что ж делать. Гетману-то закон не писан — нагрянет с обыском, не посмотрит, что старуха… Одна надежда — сюда не полезут. Правда, у Свинецкого пистолет, но что мы с одним пистолетом… Я его давно знаю, по ссылке, — человек хороший, но везения не знает ни в чем.</p><p class="p1">— Вы его тоже знаете? Вот мир тесен…</p><p class="p1">— Не так мир тесен, как нас мало, — угрюмо улыбнулся Грэм.</p><p class="p1">Трубников молчал и с собачьей преданностью заглядывал в лицо то одному, то другому. Грэм прилепил свечу к ящику и присел на другой.</p><p class="p1">— Знаете, Грэм, — сказал Ять после первых жадных затяжек, — я историю выдумал. Как раз в вашем вкусе. Встречаются у моря пятеро друзей, которые прежде тут бывали, влюблялись, веселились — но после жизнь их раскидала. Скрывают друг от друга, зачем приехали, выдумывают дурацкие предлоги, — но потом выясняется, что они и сами не знают, зачем собрались. Так, внезапный толчок. Дальше не придумал. Как по-вашему, что дальше?</p><p class="p1">— Это может быть любопытно, — кивнул Грэм и ненадолго задумался. — Я думаю, что они — один человек, действие внутри человека.</p><p class="p1">— То есть?</p></span>
