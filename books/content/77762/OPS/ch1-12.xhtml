<span><p class="p1">— Все не то, все не то! — горячо заговорил он, вставая. — Вспомним богов языческих: количество их в разных религиях достигало нескольких сотен. Число их неуклонно сокращалось, и жертвы становились все более формальными. Не следует умножать, ибо закон витализма — убывание. Таким образом, мы видим, что в основе мира всегда лежало выявление единого закона там, где прежде соблюдалось двадцать. Упрощение и единство — вот закон мира, и вы неправы, дробя свое сообщество, отделяясь, переселяясь и прочая. Упразднение орфографии — первый шаг, а вы не хотите сделать второго. Вы говорили: искусство. Но где искусство? Я вижу ваши картины и плакаты, где вы иероглиф предлагаете. Но букв тридцать семь, а иероглифов три тысячи. Я не за отказ от письменности, нет. Есть идиоты, которые так меня интерпретируют. Но я за единое знание, которое постигнет все законы и сведет в одну науку, и созданию этой единой науки должны себя посвятить мы все. Я об этом хотел говорить, а вовсе не о ваших разделениях. Город полон хамов, хамы толкаются, не желают элементарно выслушать, — старик гневно потрясал кулаками и понес полную чушь, и, если бы Льговский не успел вклиниться в паузу (Борисоглебский закашлялся), собрание завершилось бы фарсом. Но он усадил старика, поблагодарил его за присутствие на открытии коммуны и пригласил Барцева прочесть несколько стихотворений. Следом за Барцевым читал Мельников — что-то о степях, и столь же невыносимо нудное, как сами эти степи. Футуризм на поверку оказывался еще скучней архаизма.</p><p class="p1">Положение спас Корабельников. Говорил он просто и несколько даже дурашливо, а читал великолепно, без всякого актерства, но с куда большим, чем у лучшего актера, богатством интонаций и смыслов. Эти стихи хотелось произносить вслух — так естественна и заразительна была их интонация, — и никаких непонятностей, неловкостей, режущих глаз, при авторском чтении не замечалось. Тихие мальчики и девочки, заполнившие столовую, смотрели на Корабельникова влюбленно. Чарнолуский подался вперед и слушал, не забывая картинно протирать пенсне: прослезиться иногда тоже было принято в большевистской среде. Последним припасенным блюдом был слабый чай, но зато с настоящими конфетами, которые как раз и таились в таинственных комиссарских ящиках. Где они реквизированы — Ять старался не думать. Конфеты были прежние, подлинные, того незабвенного вкуса, который внушал счастье и будил мысль.</p><p class="empty-line"/><p class="p1">«Скучной книгой была бы моя жизнь, — думал Ять, возвращаясь по мосту. — Скучной и двухцветной, как этот пейзаж: всё разговоры и разговоры… Но я, может быть, затем и послан, чтобы проследить, когда и почему разговоры оборачиваются делами. Я не скучал, нет».</p><p class="p1">Очень может быть, что они правы, думал он далее. И правы не в абсурдных своих тезисах, которые у каждого свои, — правы они в своей молодости, в азарте, в желании строить, менять и просвещать… Но что мешает мне принять их и быть с ними? Неужели я большую симпатию чувствую к Хмелеву? Да Боже упаси: умный, но вздорный, потерявший себя старик. Или мне нравится Алексеев? Не настолько, чтобы забыть о его жидоборстве, пусть и вполне метафизического свойства. Нет, по всем статьям крестовцы милей, но одно в них непереносимо — вот эти заискиванья: «Александр Владимирович, скажите им… Александр Владимирович, опирайтесь на нас…» Все было бы хорошо, кабы они при этом расходились с властью, — и ведь рано или поздно непременно разойдутся, но сначала успеют победить. И этого я боюсь больше всего.</p><p class="p1">Проходя мимо Елагина острова, он заметил свет в окнах дворца, и его потянуло зайти. Дело было не в Ашхарумовой — он тотчас же с пристрастием допросил себя, не к ней ли направляется, и ответил, что не к ней.</p><p class="subtitle">32</p><p class="p1">— А, Ять, — с равнодушной любезностью встретил его Ловецкий. — Рады, рады. У нас тут знаете что?</p><p class="p1">— Неужели опять раскол?</p><p class="p1">— Да нет, — Ловецкий махнул рукой. — Хватит. Мы теперь о другом думаем: бред это, насчет издательства, — или стоит попробовать? Все-таки дело, может, хоть молодежь почитает… переводчикам работы дадут…</p><p class="p1">— Ну, и что решили?</p><p class="p1">— Хламиду позвали. Я думал, вы на него и пришли.</p><p class="p1">— Нет, я ничего не знал, — Ять избегал пока рассказывать, откуда он пришел сюда, но подивился собственной способности попадать прямо в водоворот событий.</p><p class="p1">— Вон вы как. Будто на заказ. Ну, останьтесь, послушайте.</p><p class="p1">— А что ж он так поздно-то? Одиннадцатый час!</p><p class="p1">— Заняты-с, — шепнул Ловецкий. — Весь день из Смольного в «Новую жизнь» бегает и обратно. Показывает: не очень я храбро-то? Годится? Ну, тогда я и дальше в том же Духе…</p><p class="p1">— Не любите вы его, — констатировал Ять.</p><p class="p1">— Надоел он мне хуже горькой редьки, — признался Ловецкий. — Моя бы воля — никогда бы его не позвал. Но Долгушов с ним хорош — Хламида в позапрошлом году словарь затевал, ничего, конечно, не вышло, но планы были вселенские. Он говорит, что человек приличный и, как все интеллигенты в первом поколении, ужасно в культуру влюблен.</p><p class="p1">Ять дал себе слово не заходить к Казарину, но Ашхарумова — в простом сером платье и вязаной толстой шали — сама подошла к нему, появившись откуда-то из тени:</p><p class="p1">— Слушайте, вам обязательно будет интересно! Мы тут новых людей не видим, а здесь я всем уже рассказала. Я нашла подземный ход. Ять слышал легенду о подземных ходах из дворца, но никогда не принимал ее всерьез.</p><p class="p1">— Откуда и куда?</p><p class="p1">— Из кухни, а куда — сама еще не знаю. В книжках все подземные ходы обязательно из кухонь или винных погребов. Потянешь за одну, самую древнюю бутылку — и открывается лаз. А тут никакого лаза. Я дежурила и нашла в углу треснувшую плиту. Отковыряла кусок, а внизу темень, подвал… Только первую ступеньку видно. Из наших никто не хочет идти смотреть, у них другие дела — всё насчет издательства. А по-моему, подземный ход гораздо интереснее.</p><p class="p1">— Если хотите, — не удержался Ять, — я вам эту плиту сворочу, но лезть вниз не советую. Сырость, да и обвалиться может в любой момент…</p><p class="p1">— Но хоть посмотрим, — умоляюще сказала она. — Я никак не могу уговорить Славу, а с вами он пойдет.</p><p class="p1">Да, подумал Ять, только Славы мне и недоставало.</p><p class="p1">— Вы пришли Хламиду послушать? — спросила Ашхарумова.</p><p class="p1">— Да я случайно зашел, дался вам всем этот Хламида… Что он вам нового скажет? Я от крестовцев иду, от раскольников ваших.</p><p class="p1">— Ой, как интересно! — Она засмеялась и потащила его за собой. — Пойдемте, расскажете Славе. Он что-то хандрит.</p><p class="p1">— Не буду я ничего рассказывать, — уперся Ять. — Я сам ничего еще не понял.</p><p class="p1">— Но они очень на нас злы? На тебя-то им чего злиться, подумал он.</p><p class="p1">— Нет, мне кажется, они просто отбросили все прежнее. Их гораздо больше интересует будущее.</p><p class="p1">— Много их?</p><p class="p1">— Пока пятнадцать человек, но будет больше. Молодежи много. Мне кажется, вам там было бы сейчас интереснее…</p><p class="p1">— Я всегда любила людей старше себя, — просто ответила она. — Ровесники — скука, не знают ничего… В человеке должна быть настойка. Мне кажется, больше всего я могла бы полюбить великого и галантного развратника, Казанову на склоне лет, когда он уже — библиотекарь из милости, за то, что кормят. Он бы мне рассказывал свою жизнь, я бы его слушала и руку ему целовала.</p><p class="p1">О да, подумал Ять. Чтобы ты с ним могла сделать все, что угодно, а он с тобой — уже ничего. Боже, какая пошлость невыносимая… Впрочем, что не пошлость? Жизнь и есть пошлость, а все-таки она очень хороша.</p><p class="empty-line"/><p class="p1">Главный гость опоздал. Как и комиссар просвещения, иногда он делал это нарочно, иногда нечаянно.</p><p class="p1">Ять не любил Хламиду, хотя и признавал за ним талант, выражавшийся в подмечании за всеми (и, вероятно, за собою) самых постыдных и мерзких черт. Ежели бы когда-нибудь тот нашел в себе силы написать всю правду, а точней, то, что казалось правдой ему, — нет сомнения, получилась бы гнусная книга, приговор роду человеческому. Чтобы уравновесить это жестокое зрение, он постоянно впадал в экзальтацию и пафос; видя всю грязь и мерзость конкретного человека — без устали воспевал человека абстрактного, никем не виданного, небывалого. К тому же, как любой литератор, испорченный ранним успехом, он способен был делать только то, что нравилось публике, и от мнения ее зависел больше, чем от любых собственных настроений. Он желал нравиться даже не по-женски, а по-детски, готов был врать про себя что угодно, говорить взаимоисключающие вещи, — все искренние порывы давно заместились у него желанием соответствовать читательским чаяниям; надо было, понятно, выбирать между разными читателями, и в начале семнадцатого Хламида быстро понял, что главной-то его аудиторией с самого начала была интеллигенция. Тогда началась его трескучая и фальшивая антибольшевистская риторика — ничуть не превосходившая в эстетическом отношении риторику самих большевиков. Между тем мнение Хламиды давно уже было мнением не самой умной части интеллигенции, образованной посредственности, читающего и думающего большинства; диктат этого большинства был для Ятя всего невыносимее… хотя снобизм Стечиных был, пожалуй, еще хуже. Да ведь и была же у Хламиды пара вещей великолепных — одна пьеса, хоть и несколько куцая, о мстительном старике, считавшем, что перенесенные страдания дают ему право судить всех (явно вывел себя и с собственной гордыней боролся), да вполне живой провинциальный цикл… Как ни кинь, а в таланте ему отказать было невозможно.</p><p class="p1">Хламида и теперь вел себя так, как будто глаза всех присутствующих устремлены на него одного. Он словно подкидывал пищу будущим мемуаристам: оправлял пиджак, раскладывал папиросы, дорогую зажигалку, стопку исписанных листков (мелкий, мелочный, мстительный почерк), перекладывал все в ему одному понятном порядке, закуривал, посмеиваясь в усы… Он знал, что на него смотрят, и старался, чтобы смотрели не зря, — одолжение столичного гастролера, милостиво согласившегося на один спектакль с провинциальной труппой. Долгушов долго, помня вкусы гостя, расхваливал его перед собравшимися.</p><p class="p1">— И вот теперь мы все, представители русской академической науки, — обратился он к Хламиде, — хотим спросить вас, писателя, с которым мы часто не соглашались, но чей талант несомненно признаем: стоит ли нам принять предложение властей о создании литературного издательства — или лучше сразу, ни на какое сотрудничество не надеясь, уйти в оппозицию к режиму? Конечно, в издательском деле мы более компетентны, чем в оппозиционном, — но есть люди, сотрудничество с которыми недопустимо ни при каких обстоятельствах. Вы нынешнюю власть знаете лучше нас — вашего ответа мы ждем.</p><p class="p1">Некоторое время Хламида молчал, супя брови. Наконец встал — и улыбнулся присутствующим самой очаровательной из своих улыбок, располагавшей к нему и закоренелых недоброжелателей.</p><p class="p1">— Тут прозвучало много лестных слов обо мне, я — не стою их, мне все казалось, что говорят о моем брате, даже — о двоюродном, — глуховато заговорил он, не забывая покашливать. Оканье его было менее заметным, чем у Горбунова. Тире в устной речи он расставлял так же часто, как в письменной: Ять так и видел их. Так же говорили и все его герои, даже в мемуарах. — Но — не стану тратить время на опровержение сих чрезмерных похвал, ибо не для того мы столь поздно собрались тут. Вопрос, который задали вы, и меня тревожит, ибо — все мы люди литературные — чувствуете вы в моих несвоевременных писаниях некую неполноту, и — есть она. Иные большевики, что понеразумней, думают, что я в глухой оппозиции, а я, по правде сказать, и сам не знаю, ибо — для оппозиции надобно видеть позицию, как говорил французский социалист Лафарг. А я позиции еще не вижу, нет, не вижу. Он помолчал, прошелся перед притихшими елагинцами, сел на стул.</p><p class="p1">— Я — многих из них знаю, они — разные, и — большую я вижу за ними силу. Но — как бы этой силе не загубить дело, за которое тысячи лучших людей, интеллигентов, ваших друзей и братьев, отдавали жизни свои. Есть ли опасность, что вместо революции будет бунт, в котором голос интеллигенции попросту захлебнется? Есть, и — уже осуществляется. Так что решить нам всем предстоит — одно: что делать, если дело безнадежно? Стоит ли лапки поднять — или попытаемся хоть помереть достойно?</p><p class="p1">— А вы полагаете, что с режимом ничего уже сделать нельзя? — Ять узнал голос Алексеева. Хламида прищурился.</p><p class="p1">— Не подойдете ли ближе, не вижу лица вашего, так — отвечать трудно…</p><p class="p1">— А мне трудно встать, — насмешливо отвечал Алексеев из темноты. — Я буду постарше, не взыщите.</p><p class="p1">— Гм… ну что ж, — Хламида своевременно закашлялся. — Не буду скрывать: в случае перехода вашего в оппозицию шансы на победу представляются мне не просто иллюзорными, а и — прямо сказать — не существующими вовсе. Сами же они еще не выбрали, по какому пути идти, и я не для того пишу, чтобы им помешать, а напротив — чтобы путь, по которому они пойдут, был не вовсе смертелен… для нас с вами. Ошибиться — можно, больше того, не ошибиться — почти нельзя. Однако ежели теперь им помочь, их направить — есть шанс еще увидеть Россию достойной.</p><p class="p1">Определение «достойная» применительно к русской жизни, как заметил Ять, заменяло либеральным публицистам все конкретные слова — «сытая», «свободная», «просвещенная» и пр.</p><p class="p1">— Ведь они, — тут Хламида подпустил мечтательности, — они — в большинстве своем — люди удивительные! Удивительные, да. Лучших — нет, уморили лучших, самодержавие российское само виновато, что у него теперь такие враги. Приходится с теми иметь дело, кто до сего дня остался. Но — есть мечта в душах их, и любят они людей, со всем их окаянством. Зверье любят… да. С ними много сейчас нечестных, временных: вот — я знаю — Корабельников. Я — не верю ему, прежде верил, теперь знаю, что ему, кроме славы и гонораров, ничего особенного не нужно! Он хочет их руками — для себя место расчистить, я — видел таких, их недолго потом помнят. Но из тех, что с ними пошли, есть — честные (он назвал несколько никому не ведомых фамилий, ибо уважал только тех литераторов, которым мог покровительствовать: едва они начинали составлять ему конкуренцию, благотворительность кончалась и автор объявлялся продавшимся или зазнавшимся). Это — люди сильные, самобытные, жизнь видели и могут рассказать о ней. Если хотите знать мое мнение, без большевиков — не выбраться России из ямы. Но и с теми большевиками, которые есть, — не выбраться. А потому, по скромному моему разумению, раз уж вы спросили меня, — долг наш понятен: в меру сил делать из них тех людей, на которых не стыдно оставить судьбу Родины. Так что предложение об издательстве, думаю я, следует вам принять… и если нужна вам помощь моя, то — вот она.</p><p class="p1">Этого никто не ожидал: даже согласие Хламиды на встречу с радикальной оппозицией было чудом — а тут он сам предлагал сотрудничество! Тронуть его никто не решился бы, большевики, хоть и кривясь, терпели его «новожизненскую» публицистику, — стало быть, и издательство с ним во главе могло просуществовать как минимум несколько месяцев.</p><p class="p1">— Так я поговорю с Чарнолуским, — говорил Хламида, собирая свои бумаги, так и не понадобившиеся ему во время беседы. — Я давно его знаю, человек милый, и странности у него милые. Пишет пьесы, не умеет этого скрыть — ну, куда годится? — Теперь главное было решено, и Хламида позволил себе предаться обаятельным воспоминаниям. — В Италии часто встречались с ним, год он там прожил… да! Много врут про него, этому — не верьте: местные рыбаки с первого взгляда отличают, кто — человек. Его — любили они, говорили: вот идет легкий синьор! Он, знаете, и в самом деле пухлый, а легкий: в лодку, бывало, садился — почти не чувствовалось. Не погружается лодка, а? Какой удивительный…</p><p class="empty-line"/><p class="p1">— А черт его знает, — говорил Казарин, идя с Ятем и Ашхарумовой через заснеженный сад к дворцовой кухне. — Может, они ему за то и платят, чтобы он всю оппозицию гасил в зародыше. К нему идут за поддержкой, а он и говорит: ну какая оппозиция, дорогие мои? Плетью обуха не перешибешь, давайте улучшать, просвещать… В жизни не встречал человека, который бы так врал — и, главное, сам бы так верил! Как всегда, Казарин предполагал в человеке худшее и с редкой убедительностью обосновывал свои предположения.</p><p class="p1">— По-моему, они глуповаты для такого дальнего прицела, — отозвался Ять. — И они, и он…</p><p class="p1">— За что вы его так не любите? — спросила Ашхарумова у обоих.</p><p class="p1">— А тебе что, понравился? — Казарин даже остановился.</p><p class="p1">— Не понравился, но он добрый, это же видно…</p><p class="p1">— Толку от его доброты, — сказал Казарин. — Добрых людей ненавижу, злые хоть не врут… Ну, где твой подземный ход?</p><p class="p1">Матрос Елисеев спал. Разбудить его и объяснить, что никакой еды они брать не станут, а интересуются только древним лазом, оказалось непросто. Он долго тер глаза, мотал головой и ругался, и пахло от него прекрасным, не до конца еще перегоревшим в организме самогоном. Поняв, что никто не собирается разграблять вверенные ему запасы, он разрешил им наконец засветить кухонную керосиновую лампу и обследовать треснувшую плиту.</p><p class="p1">— Вот ведь дамочка, — приговаривал он уже добродушно, — отовсюду ход найдет…</p><p class="p1">Вместе они приподняли и оттащили в сторону тяжелую мокрую плиту. Под ней и впрямь открывался квадратный лаз.</p><p class="p1">— Ну, полезли? — спросила Ашхарумова.</p><p class="p1">— Да ты что! — решительно воспротивился Казарин. — В такое время, ночью…</p><p class="p1">— А когда же?</p><p class="p1">— Вот потеплеет, подсохнет, и полезем. Не торопись, успеется.</p><p class="p1">— Ять, да скажите же вы ему!</p><p class="p1">— Скажу, что он совершенно прав, — заявил Ять. — Ночью лезть в какой-то подпол… сырость, мокрицы… безумие! Вы ведь даже не знаете, куда он ведет.</p><p class="p1">— То-то и интересно!</p><p class="p1">Ашхарумова была разочарована и на обратном пути к дворцу дулась. Казарин же, наоборот, хотел поговорить, шел уже медленнее, а возле древнего дуба, торчавшего посреди Масляного луга, остановился вовсе.</p><p class="p1">— Ведь слов никаких нет, Ять, как я люблю все это! — заговорил он, обводя рукой смутное пространство снежной ночи, — Ни в каком другом городе нет такой гибельности. Вы скажете — Венеция (Ять не сказал бы ничего подобного, потому что в Венеции так и не побывал, а теперь уж и не надеялся). — Но Венеция по сравнению с Питером — курорт, кишащий здоровяками, прямо-таки пляж! Питер — последний форпост этой цивилизации, далеко выдвинутый в северное болото. Дальше — только полярные области. Посмотрите на все это, — он указал на заснеженные беседки. — Какому эллину, какому римлянину приснились бы античные постройки, рассчитанные на левантийский климат, — среди снежных полян? И какой это был бы грозный, прекрасный сон! Каждый получает, чего втайне хочет, и я всегда хотел втайне именно такой судьбы. Поздний Рим, крах империи, земля из-под ног…</p><p class="p1">— Жаль только, — не удержался Ять, — что для осуществления вашего тайного желания не пожалели страну.</p><p class="p1">— А что страна? — с неожиданной страстью заговорил Казарин. — Для чего и была нужна вся эта страна, как не для осуществления моих желаний?! Да, может быть, весь этот луг с дворцом были сделаны для того, чтобы я с предназначенной мне женщиной бродил тут зимней ночью! Весь крах империи задуман для того, чтобы я стал его свидетелем и написал четыре строчки о снеге или бабочке, — никак не о крахе, — но такие четыре строчки, которые только в гибнущем мире и возможны!</p><p class="p1">— «Быть может, все в мире лишь средство», — усмехнулся Ять.</p><p class="p1">— Да, да, да! Почему нет? Он гнусный тип, но кое о чем догадывается, иначе я и руки бы ему не подал (критерий у Казарина мог быть один — подал бы он руку или нет; увесистым подаянием была его рука!). Только он никогда не дойдет до настоящей гибели, он хочет гибнуть так, чтобы оставаться вождем направления… Ему весь этот ледяной эфир ничего не скажет…</p><p class="p1">Зачем ему эфир, у него есть морфий, хотел сказать Ять, но промолчал.</p><p class="p1">— Да ведь и вы как-то говорили: призвали всеблагие, — продолжал Казарин. — Неужели и вы не гордитесь таким призванием?</p><p class="p1">— Я гордился бы, — медленно ответил Ять, — но гибель империи не кажется мне лучшим временем для жизни… Хотя, бы потому, что в эти времена невозможно сделать верный выбор. Черт, холодно, иначе я объяснил бы подробнее…</p><p class="p1">— Так пойдемте к нам!</p><p class="p1">— Вот к вам-то я и не пойду. Не из-за вас, поймите, а из-за самого дворца, где мне бывать все тягостнее. Я понимаю: все, что защищает Хмелев, — мертво. И в каком-то смысле эта мертвечина заслужила то, что с ней происходит. Но противостоит ей варварство — молодое, веселое, здоровое варварство, нет слов, даже талантливое, — а я обречен сочувствовать слабейшим.</p><p class="p1">— Господи, да кто же вас обрек?! — искренне изумился Казарин. — Я всегда вас считал человеком трезвым, без предрассудков…</p><p class="p1">— Это не предрассудок, — сказал Ять. — Это в крови.</p><p class="p1">Он проводил их до дворца и быстро пошел к мосту.</p><p class="p1">Уже у самого дома на него из-за угла вывернул Бог весть откуда взявшийся патруль: трое с винтовками, — один в черной матросской шинели, другой в коже, третий в белом тулупе и таких же белых валенках. Сроду на Петроградской в это время не было патрулей, — Ять, конечно, видел их шагающими неизвестно куда по утренним и вечерним улицам, но на ночной дозор наталкивался впервые.</p><p class="p1">— Чего шляешься?! — весело спросил белый.</p><p class="p1">— Документы, — буркнул матрос.</p><p class="p1">Эта внезапная встреча была так забавна, что Ять не успел испугаться. Ему сразу стало весело. В городе грабили, стреляли, насиловали — а патруль ходил по самой тихой и пустынной улице и приставал к одинокому журналисту; это был абсурд столь откровенный, что почти безобидный. Действуя в духе этого абсурда, Ять вынул из кармана пальто мандат, выписанный Мироходовым, и сунул белому — он выглядел главным и самым веселым. Белый некоторое время изучал мандат.</p><p class="p1">— Знатно! — выговорил он. — Сам товарищ Павлинов, а? Это как же вы с ним знакомы?</p><p class="p1">— Работали вместе, — небрежно сказал Ять.</p><p class="p1">— Где ж это? — не поверил кожаный.</p><p class="p1">— За границей, — пояснил Ять. — В седьмом году. Он скрывался, а меня выслали за прокламации.</p><p class="p1">— Домой следуете? — поинтересовался матрос.</p><p class="p1">— Домой, — кивнул Ять. — Тут близко.</p><p class="p1">— А откуда?</p><p class="p1">— Откуда ночью бегают, — хмыкнул белый. — Известно, от бабы. Ступай, гражданин, мы тебе не препятствуем.</p><p class="p1">Ять кивнул, подавил в себе стыдное чувство благодарности и умиления и устремился к дому. За его спиной похохатывали, сворачивали цигарки, обсуждали интеллигузию.</p><p class="p1">Удивительно, как на них действуют такие мандаты, думал Ять. А все-таки неприятно. Ну, с какой стати мне нельзя ходить по собственной улице? Надо было лезть в подземный ход… Вдруг он вывел бы в город?</p><p class="p1">Куда вел ход, он узнал два с половиной месяца спустя, и подземный ход романа мог бы вывести нас прямо к этому дню. Но подземных ходов под Елагиным дворцом множество, и один из них ведет в холодный, очень холодный день третьего марта.</p><p class="subtitle">33</p><p class="p1">В этот холодный день Ять не удержался и развернул газету прямо на улице; и первое, что бросилось ему в глаза на развороте, было то самое, ради чего он купил этот мерзкий листок у мальчишки-разносчика. Ужасно было, что первый поэт России, не перестававший быть первым и во время своего двухлетнего фактического молчания, печатал там статьи — и какие статьи! Во всем-то он был прав: в предощущении конца, в ненависти к России, которая, верно, мыслилась ему курной избой или, паче того, огромной квашней, в которой вечно что-то преет, бродит, кряхтит, но одного Ять не мог принять в нем — злорадства; оно-то и было решающей частностью, каплей, переполняющей чашу. Можно было прощать безвкусицу, невнятность, музыку в ущерб смыслу, иногда и полное отсутствие смысла — но нельзя было простить злорадства, которое выдавало в нем не вполне человека или, по крайней мере, безнадежно больного человека.</p><p class="p1">Что он болен — говорили давно; Ять от многих слышал о его безумии, причем наследственном. Кто-то знал его отца — страшного варшавского профессора, с медленными движениями и сомнамбулическим взглядом. Сын унаследовал болезнь, ибо только больному, утратившему здравый рассудок — вечную помеху на пути к постижению мира, — доступны были тончайшие движения воздуха, которые улавливал его слух. Именно любовь ко всякой болотной нечисти, безобидным на первый взгляд, но гнусно хихикающим, что-то такое знающим созданиям была предтечей будущей злобной радости, с которой он смотрел на разрушение ненавистной ему цивилизации. Всей своею болезнью, всею причастностью к миру чащоб и топей он ненавидел условности и пленительные усложнения жизни, которые только и любил Ять; комфорт был ему мерзок, уют всегда казался хрупок и оттого не вызывал ничего, кроме раздражения. Носящему в себе трещину ненавистен любой монолит — и оттого он с такой радостью обнаруживал вокруг себя приметы упадка; страшно было думать, что небесная гармония покупается этой ценой.</p><p class="p1">Все это Ять мгновенно припомнил, стремительно, на холодном ветру, проглядывая газету. Поэма помещалась на последней странице, набранная узко и тесно. Голос узнавался с первой строки, и, как всегда, речь шла о главном, о том, что станет единственным знаком времени. Он начал с ветра, и точно — был ветер; он дул, конечно, не сильней, чем в прошлые зимы, но странным образом усиливался в воображении пешехода, идущего по пустынной улице. Никогда в городе не было так пусто — а потому и так страшно под этими налетающими порывами. Были мотающиеся плакаты, бессмысленные, как старые афиши; было страшное количество девок, уродливых, растолстевших от накрученного на них тряпья. И метель, которую он всегда писал как мятель — второе отклонение его личной орфографии от общепринятой: первым был жолтый. Впрочем, он был в своем праве, производя мергель не от скучного дворницкого «мести», но от сминающего душу смятения.</p><p class="p1">Ять и сам ненавидел потерянных людей, из которых словно разом выпустили воздух, — людей, стоявших на трамвайных путях, в подворотнях, попросту остановившихся среди улицы в тупой трагической задумчивости: да я ли это? и что тут делаю? Он знал, что сами эти люди сроду никого не пожалели, прячась в уюте своих квартир, за их картонными, как оказалось, стенами; но эти же люди имели право на сострадание, на свою жалкую, грошовую жизнь, наивное и неумелое хищничество, смешные и болезненные привязанности — и грешно было радоваться их жалобным глазам, согбенно-вопросительным позам… Мерзко было все — и то, что гибло, и то, что шло на смену, — что же заставило его видеть во всем этом волшебную перспективу, которая, бывает, открывается вдруг на ночной улице после снежной ночи? Ять видел такой внезапно улегшийся снегопад, когда шел от Зайки — и в черно-белой перспективе, в бледном свете внезапно включившегося электричества разглядел своего мальчика, странного гостя, исчезнувшего, словно его и не было. Там, в этой же перспективе, можно было, оказывается, увидеть и того, кому совершенно нечего делать в городе, стираемом с лица земли.</p><p class="p1">Ять мог еще представить Его ходящим по домам, подающим кружку воды или ломоть хлеба умирающему от голода старику; он мог представить Его утешающим ребенка, гладящим бездомную собаку, — одного он не мог себе представить: Христа во главе патруля, в котором было отчего-то двенадцать человек (беспардонная, бессмысленная натяжка — ходили по трое, пятеро, семеро, всегда нечетными группами, словно в расчете на случай, когда вопрос об аресте и расстреле придется решать простым голосованием, — так вот, чтоб без споров). Ему надо было, чтобы ходили двенадцать, и он ничтоже сумняшеся их придумал, подогнал под число апостолов, кощунственно (и как неумело, по-детски!) приклеил евангельские имена…</p><p class="p1">И страшно было подумать, что, если Христос действительно может прийти только в вымерший, вымерзший город, в котором выморожено, запугано, загнано в клетку все человеческое, — Ять знать не хотел такого Христа.</p><p class="empty-line"/><p class="p1">Наутро он с очередными «Листками» отправился к Мироходову и застал там Грэма, славившегося умением выбивать авансы. Однажды он просто улегся на диван в приемной Аверченко и не уходил, пока ему не вынесли пять рублей. Теперь он уговаривал Мироходова, но тот, похоже, сопротивлялся больше для порядку.</p><p class="p1">— Но учтите, — сказал он наконец, вытаскивая мятую пятирублевку, — рассказа вашего я все равно печатать не буду.</p><p class="p1">— Почему? — изумился Ять. — Простите, что вторгся в ваш спор, но…</p><p class="p1">— Прекратилась газета. Пришел Минкин и прекратил. Никакие птички не спасли. Вот, возьмите гонорар.</p><p class="p1">— Но позвольте, позвольте! Какой же гонорар, если не печатаете?</p><p class="p1">— Да какая разница, напечатано или нет? — Мироходов поднял на него кроткие, часто моргающие глаза. — Он делает свое дело, а мы свое. Он газету закрывает, а мы рукописи собираем. И платим, пока есть чем. Деньги уж тоже ничего не стоят… Меняем бумагу на бумагу, но в том-то и смысл! Если бы жизнь свести к реальности, чем бы она стала? Минкин закрывает — хотя резона в этом нет никакого; я со своей стороны принимаю авторов — не закрывать же лавочку?</p><p class="p1">— Но есть надежда, что откроют?</p><p class="p1">— Надежда всегда есть, да только не в этом дело. Ну не все ли вам равно, Ять, — двадцать человек прочли ваше сочинение или двести? Вы написали, и будьте довольны. Главное, чтобы вещь явилась, а когда до нее дойдет черед — один Бог ведает. Что должно увидеть свет — увидит. Напишите нам еще что-нибудь, рубрика ваша очень нравится читателю. Вы заметили, что мы, газетчики, всегда говорим «читатель»? Будто он один? Вот он и стал один, и гораздо почетнее писать для одного, нежели для сотни. Во мне можете не сомневаться.</p><p class="p1">— Это мысль благородная, — сказал Грэм. — Ваш должник. Ну, благодарствуйте.</p><p class="p1">На лестнице Грэм шел чуть впереди и бурчал себе под нос: «Благородно… не откажешь, благородно… Прост, но с понятием…»</p><p class="p1">— Бежать надо, — вслух сказал Ять, адресуясь, собственно, не к Грэму, а к себе самому. — Если и газеты не будет, я не выживу.</p><p class="p1">Внезапно Грэм остановился посреди лестничного пролета и обернулся к нему.</p><p class="p1">— А вы готовы бежать? — спросил он в упор.</p><p class="p1">— Смотря куда, — пожал Ять плечами. — Проситься к елагинцам мне стыдно, проситься к крестовцам не позволяет образ мыслей, а без добавочного пайка я долго не протяну.</p><p class="p1">На улице буйствовал ветер, обоим не хотелось выходить. Грэм закурил.</p><p class="p1">— Если вы надежны, — сказал он тихо, — и если вы готовы, я мог бы предложить вам уехать. Я как раз ищу спутника. Вы из тех людей, о которых сразу не вспоминаешь, но потом изумляешься: как же я о нем не подумал сразу? Это вам много вредит, но много и помогает, — добавил он, подняв палец.</p><p class="p1">— За границу? — еще тише спросил Ять.</p><p class="p1">— Не совсем, хотя в некотором смысле и за границу, — кивнул Грэм. — Я еду в Крым.</p><p class="p1">— Каким образом? Поезда не ходят…</p><p class="p1">— Поезда не ходят, но поезд нынче пойдет, — загадочно ответил беллетрист. — Будет контроль, но контроль мы пройдем. Есть другой контроль, но если не будет препятствий со стороны известных сил, мы минуем и его. Поезд уходит завтра, в половине первого ночи. Вы успеете собраться?</p><p class="p1">— Мне собираться не надо. Крым, сказали вы?</p><p class="p1">Таких совпадений не бывает, подумал он. Ведь если я и думал об отъезде куда-то, то исключительно к ней, туда, где мы уже были счастливы однажды. Крым, конечно, теперь не тот, но он сытнее, теплее, он, наконец, бесконечно далек от этого замороженного города. Это спасение, отпуск, бегство, что угодно, — но возможность хотя бы неделю не выбирать между черным, и белым, допустить и другие краски спектра… Здесь мне оставлять некого, там есть надежда…</p><p class="p1">— В Крыму теперь тоже республика, — важно пояснил Грэм, — и на помощь ей отправляется один поезд. Попасть в него можно, надо только доказать, что вы там нужны. Мне сказал знакомый матрос, у него есть связи, и меня там будут ждать в штабном вагоне. Я буду рад, если вы согласны.</p><p class="p1">— А что там сейчас? — спросил Ять.</p><p class="p1">— Там сейчас цветет миндаль, — пояснил Грэм, — и есть татары. У татар есть скот, и они гостеприимны, — если вы, конечно, приходите как друг.</p><p class="p1">— Хорошо, — с удивившей его бестрепетностью произнес Ять. — Завтра. Прийти на вокзал?</p><p class="p1">— Ни в коем случае. Вас никто не должен видеть. Я приеду за вами, назовите адрес.</p><p class="p1">Ять назвал адрес и отправился домой без всякой надежды, что за ним завтра приедут. Грэм со своей конспирацией, тайнами, замаскированными поездами и прочим Густавом Эмаром был ему приятен, но доверия не вызывал. Тем не менее он собрал в узел то немногое, что было нужно, и с пяти вечера четвертого марта не находил себе места: выкурил весь неприкосновенный запас папирос, не мог читать, писать, метался, как тигр в клетке, — и не поверил своим ушам, заслышав в четверть одиннадцатого дребезжанье звонка.</p><p class="p1">— Спускаемся, — сказал ему Грэм. На нем было обычное черное пальто, потертое до крайней степени, но голову вместо ушанки украшала капитанская фуражка.</p><p class="p1">— Уши отмерзнут, — предупредил Ять.</p><p class="p1">— Неважно. Я еду к морю, а к морю надо ехать так.</p><p class="p1">Внизу в самом деле ждала машина — черная, лаковая (Ять никогда ничего не понимал в их марках). В машине было тепло. Шофер, одетый в кожу, не обернулся в сторону Ятя. Грэм решительно полез на переднее сиденье. Ять, больше всего испугавшись, что сейчас уедут без него, рванул заднюю дверцу. Почти все пространство салона занимал огромный, широкий, буйно-кудрявый человек, приветствовавший Ятя по-итальянски. Итальянского Ять не знал и ничего, кроме приветствия, не понял; толстяк продолжал жестикулировать и клокотать, так что Ять еле втиснулся в машину и постоянно получал толчки и тычки.</p><p class="p1">— Это тенор Маринелли, — пояснил Грэм. — Он едет туда налаживать культурную политику. Его предложил я, потому что здесь он оставаться больше не может. Его позвали на гастроли в октябре, а в ноябре он уже не смог выехать. Славный малый, но совершенно беспомощный.</p><p class="p1">Услышав свою фамилию, Маринелли заклокотал еще громче. Голосу его было тесно в кабине.</p><p class="p1">— Он не говорит по-русски, а я не знаю ни одного языка, но понимаю его, — вставил Грэм.</p><p class="p1">Ять по-английски спросил тенора, откуда он, — тот, обалдев от счастья, что нашелся вменяемый собеседник, принялся на невозможном, но стремительном английском рассказывать свою жизнь, прибавляя фантастические подробности. Он прибыл из Милана. Он пел в Париже, в Нью-Йорке, в Лондоне ему подарили дом, в Неаполе он выступал на Везувии — один из всех, один из всех! Он прибыл в Петербург по приглашению Караванова. Где теперь Караванов? Он вынужден был искать пропитания где попало, в посольстве никто ничего не знает, ему выдавали какие-то деньги и приглашали обедать, но половина посольских сбежала еще летом, а вторая половина сама не может ничего решить. Поездов нет. Ему советовали ехать в Москву. Он воздержался, ибо Москва — варварская столица и там вовсе нет ценителей прекрасного. Он пел перед солдатами, это прекрасная, благодарная публика, ему дали хлеба, но в Петрограде нет настоящей оперы. Он предлагал себя в три театра, но во всех трех нет вакансий, нет спектаклей, эти невежды не слышали его имени! И какие могут быть спектакли в городе, где нет топлива и электричества… Он жил в гостинице, жил в посольстве, жил у нового друга, но новый друг не понимает ни одного языка.</p><p class="p1">Итальянец болтал темпераментно и неостановимо и был, в сущности, добрая душа. Ять разомлел в тепле, он давно не ездил в автомобиле. Есть все-таки своя прелесть в том, чтобы быть народным комиссаром. Они катили по пустому городу, слегка юзя на обледенелых мостовых, заносясь на поворотах, — шофер не произносил ни слова, молчал и Грэм. Итальянец перестал рассказывать и принялся петь — и тут в перспективе пустынной улицы, уже на подъезде к Неве, Ять заметил детскую фигурку.</p><p class="p1">— Остановите! — закричал он не своим голосом, перекрывая тенора. — Остановите, черт бы вас побрал!</p><p class="p1">Шофер тормознул, и машина резко встала, вильнув задом.</p><p class="p1">— В чем дело? — обернулся Грэм.</p><p class="p1">— Подождите секунду, я видел там ребенка, — задыхаясь, объяснил Ять. — Я знаю этого мальчика, он потерялся, переночевал у меня и сбежал… Ради Бога, я только посмотрю…</p><p class="p1">— Но вы не можете взять его с собой, — сказал Грэм.</p><p class="p1">— Да черт с ним, с Крымом, — если это он, я останусь. Не бросать же. А может, уладим как-нибудь, — Ять уже выбирался из машины. — Только не уезжайте без меня, я сейчас!</p><p class="p1">Он пробежал метров двадцать, скользя по льду, прятавшемуся под мокрым снегом, повернул налево — никого.</p><p class="p1">— Петечка! — кричал Ять среди пустой улицы. — Пе-теч-ка!</p><p class="p1">Ответа не было. Ять пробежал метров пятьдесят, заглянул в пару подворотен — пусто. Чье-то бледное остренькое личико, больше похожее на морду хорька, прильнуло к окну второго этажа и скрылось. Света в квартирах не было — то ли берегли керосин, то ли привыкли рано ложиться. У пещерного человека не бывает вечерних досугов.</p><p class="p1">Ять бежал, и звал, и вглядывался в темноту, — но мальчик мелькнул и исчез, и снова нельзя было сказать, был он или померещился.</p><p class="p1">Искушать терпение шофера Ять боялся. Поезд ждать не станет. Он еще раз отчаянно крикнул: «Пе-теч-ка!», подождал (не было и эха, звуки отвесно падали в сырую, вязкую ночь) и побежал назад к машине. Шофер тронул ее с места, когда Ять еще только захлопывал дверь.</p><p class="p1">— Мы успеем, — успокоил всех Грэм. — Теперь близко. Вы не нашли его?</p><p class="p1">— Нет, — сокрушенно ответил Ять, задыхаясь от бега.</p><p class="p1">— А что за мальчик? Вы расскажете?</p><p class="p1">— После.</p><p class="p1">Это был знаменитый впоследствии, единственный поезд, отправившийся из Петрограда в Крым за всю зиму и весну восемнадцатого года. Состав из шести вагонов 4 марта 1918 года отправился на помощь молодой Таврической республике, провозглашенной в феврале и запросившей у петроградских товарищей помощи и совета. Крым мог дать продовольствие, был ценен и как форпост на Черном море, и потому в Смольном на просьбу откликнулись немедленно. Пять вагонов были забиты оружием, реквизированным имуществом, агитационной литературой, кумачом, без которого не может обходиться молодая революция, и краской, без которой она не напишет на кумаче ни единого лозунга. В штабном вагоне ехали военные, призванные организовать крымских матросов на защиту их завоеваний, комиссар Рыленко, отвечавший за сохранность имущества, и несколько полуслучайных людей, напросившихся в попутчики. Помимо Грэма, Ятя и Маринелли, тут была пожилая учительница, откомандированная в Крым по настоянию Чарнолуского для налаживания в республике системы просвещения, и два художника — Марягин и Колосов, которых Чарнолускому порекомендовали из Крестовской коммуны.</p><p class="p1">В вагоне было тепло. Это был прекрасный, чудом сохранившийся вагон — из тех, в которых ездило высшее офицерство. Он был по-прежнему украшен двуглавым орлом. Комиссар Рыленко, обитавший в первом из пяти купе, встал навстречу Грэму:</p><p class="p1">— Здравия желаю, товарищ писатель.</p><p class="p1">— Со мной друг, который наладит крымскую печать, и знаменитый певец, о котором я вам говорил, — деловито, попадая в обычный комиссарский тон, произнес Грэм. Ять никогда не видел его таким — сдержанно возбужденным, строгим: вероятно, таков должен быть капитан на мостике. — Люди проверенные, я давно знаю обоих.</p><p class="p1">— Присаживайтесь, товарищи, — Рыленко указал на полки. — Сейчас перекусим. Путь неблизкий, не самый простой, не исключены нападения, но думаю, доедем исправно.</p><p class="p1">Он был явно из простых, но в нем обозначался уже правительственный лоск, штабная грация. Но Ятя теперь ничто не раздражало: благодаря чудесной перемене он уезжал из города, который сделался ему невыносим, с ним случилось то, что он больше всего любил, — чудесное приключение, не имевшее объяснения, — и он, привыкший ожидать только оскудений жизни, радостно впитывал новизну. Душа его, истомившаяся без надежды, оживала и расправлялась, как смятый листок — или, точней, как стрекоза, вытащенная из воды. Маринелли намурлыкивал что-то итальянское. Комиссар проявлял к нему как к иностранцу особенное уважение и предупредительность. Ординарец, стройный юноша в кожаном пальто, тонко нарезал сало. Комиссар достал фляжку и разлил по серебряным стопочкам коньяк.</p><p class="p1">— За успешное путешествие! — провозгласил он.</p><p class="p1">Черт знает что, думал Ять. Столица едва не взята, хлеба нет, а они отправляют в Крым пять вагонов. Странный назревает режим: на необходимое у него никогда ничего нет, а на излишнее всегда найдется. Еще немного, и я готов буду их признать своими. Удивительные вещи делают с людьми сало и коньяк!</p><p class="p1">Маринелли, проникшийся симпатией к единственному за много дней собеседнику, подмигивал ему, сидя напротив. В половине первого ночи поезд тронулся. Комиссар опустил красные плюшевые шторы, и вид проносящихся за окном ледяных пространств перестал отвлекать Ятя от трапезы. Разговоров почти не было. Разлили по третьей. Вот и бродячий артист, подумал Ять. Огромное лицо Маринелли широко улыбалось ему, певец встряхивал черной курчавой шевелюрой и то и дело принимался петь новую арию, словно провозглашая радостный переход от утомительных холодов и разговоров первого действия к приморской буффонаде второго.</p></span>
