<span id="id5"><div class="title1">
<p class="p">Действие третье. Бледный бес</p>
</div><div class="epigraph">
<p class="p1">«Плачет птица об одном крыле,</p>
<p class="p1">Плачет погорелец на золе,</p>
<p class="p1">Плачет мать над люлькою пустой,</p>
<p class="p1">Плачет крепкий камень под пятой».</p>
<p class="text-author">Арсений Тарковский</p>
</div><div class="epigraph">
<p class="empty-line"/>
<p class="p1">Собака собаку ешь, а последнюю черт съест.</p>
<p class="text-author">Пословица</p>
</div><div class="epigraph">
<p class="empty-line"/>
<p class="p1">«У него все герои гибнут — потому что невесомы и умеют только гибнуть».</p>
<p class="text-author">Юрий Тынянов</p>
</div><p class="subtitle">1</p><p class="p1">Опера есть самое бесполезное музыкальное действо, торжество чистой условности. Вот увертюра, в ней слышатся отзвуки будущей бури, в ней лес шумит и ветер воет, а молодой герой в виде своего будущего лейтмотива знай себе резвится на лужайке, ничего не желая предчувствовать. Но все грозней и грозней порывы, ветра, все слышней и отчетливей поступь рока — и когда откроется занавес, ясный утренний свет никого уже не обманет.</p><p class="p1">Перед нами площадь в Севилье, а не то в Гранаде. Вот молодой пастух, кичащийся своей силою; он выделывает ножками так и так, распевая о прелестях юной удали и отваги. Молодой пастух влюблен в озорную прелестницу, здесь же и прелестница со своей ариэткой. Общее ликование. Тут едет граф сиятельный, знак восклицательный. Он обращает внимание на юное лирическое сопрано, похищает его и запирает в ужасном черном замке. Юный пастух в смятении. Он бегает по сцене и напрягает свой драматический тенор. Духовые и ударные, час настал! Силуэт черного замка виднеется на заднике, на фоне темно-зеленого неба, из которого проклевывается носик зачаточной молнии. Все было бы вовсе ужасно, кабы не обязательный комический персонаж, отвлекающий зрительское внимание от поступи рока. Он ловкач, хитрец, мастер на все руки, беззлобный оборотень, сельский шут, он тоже влюблен, но счастливо, — ибо цельные, светлые люди всегда любят счастливо: его зовут Аристид, ее — Алкмена, они вечно ссорятся, а потом целуются, ссорятся — и опять целуются; дуэтами их хорошая опера прослоена, как пражский сыр — ветчиной. Сыр — ветчина, сыр — ветчина, сыр — ветчина-а-а! Смета-а-ана!</p><p class="p1">Как вкусно, как жирно все, связанное с оперой. Сейчас будет антракт, взбитые сливки, возможность обежать весь театр, от самой сцены до самого верха, и вволю попрятаться за красными плюшевыми портьерами. Как все избыточно — золото, пурпур, бархат, плюш; какие тяжелые имперские складки! В них можно затаиться и переждать любые бури; пыльно, а сладко! Но бьет третий звонок, и центральное второе действие захватывает нас с первой ноты.</p><p class="p1">Молодой пастух поднимает народное восстание. Для автора, творившего в мрачную эпоху да еще в условиях жесточайшей цензуры, это был только повод представить зрителю несколько блестящих оркестровых номеров с народными песнями, танцами и площадными шуточками; либреттист позднейших времен, эпохи расцвета стиля неовампир, раскопал в авторском архиве несколько мощных хоров, содержащих проклятия угнетателям. Бывший акмеист, трижды в год ритуально, отрекающийся от заблуждений молодости, дрожа за чудом сохраненную ему жизнь, затаясь в одной из имперских складок, поспешно кропает для них русский текст, пронизанный ненавистью к угнетателям: эй, режь, ешь, жри, жги, рви, дуй, плюй, взвей, взбей, рушь, жарь, — добрая половина второго действия занята подготовкой к народному восстанию, словно начать его никак невозможно без получаса яростных плясок, призванных взвинтить сознание масс до нужного градуса. Тут же являются несколько вождей, плавно сменяющих друг друга: один предлагает отложить поход до лучших времен, другой вообще не советует связываться с графом, потому что не стоит глупая баба наших жизней; третий предлагает позвать на помощь ужасных лесных разбойников, которые, случившись тут же, исполняют арию с танцами. Трудно сквозному действию удержать на себе весь этот концерт: мясо вставных номеров тяжело виснет на тоненьких ребрах фабулы. Но тут, руководствуясь безошибочным классовым инстинктом, вступает молодой пастух — и графа идут жечь, жрать, рвать, отказавшись от помощи сомнительных в этическом отношении разбойников.</p><p class="p1">Акт второй, картина третья: буря в разгаре, замковый ров полон водой, однако отважные освободители вплавь подбираются к черным скользким стенам. Дуй, ветер, дуй! Плюй, ливень, плюй! Режь, пастух, рушь! Замковая охрана по воле либреттиста переходит на сторону восставших. Черные чары рассеиваются. Грохот ударных. Занавес. Но это еще не конец? Нет, не конец.</p><p class="p1">Как описать это странное смятение перед третьим актом? Все мы как будто знаем, чего от него ждать, — триумф над злом, единение влюбленных, народный дивертисмент в декорациях первой картины, — но все уже как-то не то и не так, и не радуют взбитые сливки, и в красных портьерах все больше пыли, все меньше плюшевости… Опера не была бы оперой без метафизического прорыва, без того, чтобы теза и антитеза первого и второго действий не увели нас в итоге бесконечно далеко от первоначального замысла. Не зря же эти грозовые порывы духовых, ритмическая поступь струнных, дробный грохот ударных — грохот будущего обвала! Сейчас будет что-то куда более страшное, чем борьба добра со злом, ибо добро и зло давно уравнялись в правах и нечто третье мерцает со сцены.</p><p class="p1">Что же он думал? Неужели он думал, что она и впрямь будет его? Или кто-нибудь может похитить женщину без ее воли? Нет, она давно и страстно жаждала похищения. Зачем ты пришел, глупый пастух, зачем ты разрушил чары? Это лучшая ария во всей опере. Даже несчастный акмеист дрожащими руками подневольного прелагателя не сумел загубить первозданной мощи текста, а уж музыка, музыка, стон поруганной и тоскующей души! Прочь, прочь, пастух, со своим народным восстанием! Когда, в какой опере народное восстание могло что-нибудь решить?! Прочь, прочь, пастух! Ах так?! Режь, ешь, жги, рушь — я ведь тоже не прежний-аркадский пастушок, я штурмом брал замок, убил графа, и я не из тех, кто сносит оскорбления. Умри.</p><p class="p1">Но не тут-то было. Он за ней, она от него. Он прыгает, она взлетает. Он коршуном, она зайцем; он волком, она рыбкой; он рыбаком, она птичкой. Проходя весь круг оборотничества, он носится за ней в безвыходном отчаянии, но тщетно: всякий раз в цепи превращений она опережает его на шаг. Будь моей или умри! Умру, а твоей не буду. В ужасе смотрят зал, хор, простак со своей простушкой, как на наших глазах классический оперный герой превращается в коршуна, волка, кита, мечась по сцене за ускользающей героиней, — но никогда, никогда уже им не совпасть, не простить, не догнать друг друга. Не спеть ли нам для душевного успокоения народный дивертисмент? Ну, давайте: я начну, а вы подпевайте. Но и песня не поется, и пляска не пляшется: мы в ином времени и пространстве, и музыка не та, и концы не сходятся с концами. Что ж, простимся, хоть под конец соблюдя видимость чистоты жанра: опера — искусство условное, и негоже кончать представление без мощного апофеоза. Выйдем на авансцену и назло жестокому миру, отвергающему наше помпезное и избыточное искусство, споем бессмысленную застольную, даром что нет ни столов, ни кубков. Запевает комический простак, тоже волшебно преобразившийся: оборотничество так оборотничество, и в пении его все громче звучат трагические обертоны, тектонические диссонансы. Мир сдвинулся, господа присяжные заседатели! Комический простак знал это с самого начала, и его ликующей застольной на руинах традиционной фабулы заканчивается представление. Таково либретто; хоть поздно, а вступленье есть.</p><p class="subtitle">2</p><p class="p1">Больше всего поражало количество темных: полтора месяца назад Ять и предположить не мог, что их столько расплодится.</p><p class="p1">Он не узнавал города, и город не узнавал его. Разумеется, дело было не в одних грабежах, не только в разрушении, которое исподволь подтачивало столицу и теперь вырвалось наружу: всему причиной была дружная и стремительная весна восемнадцатого года. Город был охвачен яростным и бурным разложением, и земля, придавленная его камнями, страстно мстила ему, почуяв долгожданную слабость царственного противника. Все живое, растущее, прущее, ползучее, цепляющееся и оплетающее жадно рвалось сквозь камень, и пророки, с наслаждением рисовавшие картины гибели цивилизации вследствие реванша природы, не нашли бы лучшего примера. Странным образом и темные вписывались в картину отмщения: их вынесло на поверхность земли, словно слизней, которых можно весной в изобилии обнаружить под старыми досками. Весна, разумеется, приходит не ради них — но они из тех, кто раньше прочих успевает ею воспользоваться.</p><p class="p1">Большинство вывесок было сорвано, окна разбиты, витрины заколочены. Некто наивный приклеил над витриной модного магазина трогательную записку «Охраняется государствомъ» — за размашистой и, видать, старательно имитированной подписью, — но бумажки, срабатывавшие в январе, в марте уже никого не останавливали: витрина щерилась осколками стекла, и из всего былого великолепия валялось в ней одинокое примерочное тулово-обрубок — последняя жертва на поле боя. Ять никогда не обращал особенного внимания на одежду встречных, но теперь, когда и сам он был похож на огородное пугало в грязном, болтавшемся на нем пальто, — ему на каждом шагу бросались в глаза свидетельства распада: столичные жители перестали следить за собой. Если еще в январе девушки старались прихорашиваться, гранд-дамы соблюдали подобие стиля, а мужчины брились — весной, да еще после утраты столичного статуса, из города словно вынули душу и позвоночник. Попадалась и молодежь — веселая, с ярко-розовыми от ветра лицами, — но преобладали унылые фигуры неопределенного возраста, большей частью в обносках: вся сколько-нибудь приличная одежда была уже выменяна на продукты. Ять почти не выделялся на фоне прочего питерского населения, даром что был страшно слаб и неухожен: казалось, прочие в эти полтора месяца пережили все то же, что и он. Он не обладал уже исключительным правом на сострадание — более того: тем, кто дожил в Петрограде до середины апреля восемнадцатого года, пришлось, быть может, и посолоней.</p><p class="p1">Доехать до Петроградской было не на чем — на извозчика не хватало, ибо Ять вернулся в город в буквальном смысле без гроша; цыгане сунули ему с собой пять мятых бумажек — еще в Луге он купил на них хлеба и твердого, как камень, копченого мяса, которого никогда прежде не ел и которое больше всего напоминало конину. Этот черный кусок пряного мяса он грыз и сосал полдня. Только теперь начинал он понимать всю сложность и многозначность процесса насыщения. В прикосновении языка к шершавой, ноздреватой поверхности хлеба, в самой его грубой фактуре было блаженство; как всякое дело, совершавшееся механически в эпоху относительного изобилия, еда стала теперь многосоставным, осмысленным ритуалом, сулившим открытия. Соленое наводило на фантазии, острое подстегивало мысль и заставляло изобретать извилистые концепции прошлого и будущего; еще в Гурзуфе он заметил стимулирующую роль козьего сыра, необычайно приятного на вкус, запах и на медленное раздавливание упругих комочков во рту. Сладкое расслабляло, лишало воли к сопротивлению, зато внушало странное умиление. Он стал пьянеть от еды, как прежде — от водки: появлялось то же горячее возбуждение, говорливость и доброжелательность к собеседнику, та же сонливость потом. Ему не много было нужно теперь, чтобы насытиться. Он понял, что есть милосердие природы или истории, по чьему попущению голод всегда сопутствует великим катаклизмам: голодный воспринимает мир как во сне, он слишком сосредоточен на мысли о пище и не успевает задуматься об ужасе происходящего. Если б не голод — очевидцы Столетней войны или нашего Смутного времени попросту сошли бы с ума, глядя на дело рук своих, — но совесть их молчала, ум спал. Может быть, привычный уже голод не давал Ятю заново ощутить всю боль от расставания с Таней, всю ненависть к тому, с кем она сейчас, — но тогда лучше было и не есть вовсе. Он вспомнил старуху, одно время служившую у них в доме кухаркой, — году в пятнадцатом он решил ее навестить, помочь, если что (случались у него такие, смешные и жалкие припадки филантропии — когда очень уж остро чувствовал свою бесполезность на свете): старуха незадолго перед тем похоронила мужа и теперь почти ничего не ела. «И не надо мне, — говорила она. — Что ж я тоску свою кормить стану?»</p><p class="p1">К четырем часам пополудни Ять добрел наконец до своего жилища на Зелениной. Никаких эмоций не вызвал у него даже дом, в котором он жил последние пять лет: видимо, сентиментальность тоже требовала подпитки. Единственным чувством было облегчение: дом был какой-никакой пристанью, тут в ящике стола лежали деньги — пусть почти ничего не стоившие, а все-таки словно удостоверявшие, что и он, Ять, полноправный гражданин; в восемнадцатом году деньги были лучшим документом. Тут была постель, книги, оставался даже кое-какой запас сахару — все, все он бросил перед стремительным бегством… о котором, пожалуй, не жалел.</p><p class="p1">Он медленно поднялся на шестой этаж. Жаль, если ограбили… хотя окна, он видел это с улицы, были целы. Поразительна была эта способность бояться чего ни попадя — и не замечать опасности очевидной: разумеется, никто его не грабил. Той зимой было что поразорять, кроме частных квартир. Формой грабежа, применявшейся к частным жилищам, было так называемое уплотнение — вселение малоимущих по распоряжению домового комитета; а если не было в наличии владельца — так и тем лучше: сбежал, убоявшись. Ну и получи.</p><p class="empty-line"/><p class="p1">— Они все целеньки, все целеньки, — робко приговаривала дворничиха, показывая ему его собственный ящик стола, довольно грубо взломанный, однако до сих пор хранивший его деньги и бумаги. — Мы ничего не трогали, все как было…</p><p class="p1">Видимо, в глубине души они все-таки побаивались его возвращения и еще не чувствовали себя хозяевами в этих хоромах. Только столяр, ютившийся прежде в полуподвале дома напротив, косился на него мрачно и с тайной угрозой; столяр, к слову сказать, был плохой — на него вечно жаловались. Ять давно уже знал, что чем хуже мастеровой — тем меньше он доволен своей участью: логика ясно подсказывает, что, ежели его не слушается рубанок и валится из рук молоток, стало быть, он рожден для занятий более высоких и жизни более утонченной, которая лишь по гнусной случайности досталась другим. Квартира, и без того не слишком просторная, поражала теперь неописуемой теснотой: страшно было представить, сколько накопилось вещей у этих бедных людей. На плите кипела кастрюля с бельем, и все жилище Ятя пропахло бельевой сыростью, прогорклым маслом, капустой. В кабинете разместился дворник с женой и тремя мальчиками пяти, семи и одиннадцати лет; в гостиной жил столяр, урвавший наконец от судьбы хоть часть подло утаенных благ. В спальне устроились две сестры-работницы, ткачихи, с синеватыми, испитыми лицами, похожие на тени. Ять толком не разглядел их — заметил только, что обе очень уродливы. Он избегал вглядываться. Жилье было не его — занятое, опоганенное; он только теперь понял, как хорошо иметь мало вещей. Тут же, в коридоре, висело белье, шлепавшее по лицу всякого, кто шел из комнаты в кухню.</p><p class="p1">— А мы уже думали, вы не вернетеся, — ласково, угодливо говорила дворничиха. — Не видно и не видно: ну, думаем, совсем ушел… А сами мы не вселялися, нет, домовой комитет вселил… — Она произносила «домовой», с ударением на последнем слоге, словно комитет состоял из мелких домашних божеств в духе Ремизова: входите, мол, гости дорогие, располагайтеся… Угодливость и ласка в ее голосе тоже казались влажными и словно облепляли лицо, как белье в коридоре; дворничиха явно боялась, что их теперь выселят.</p><p class="p1">Она предложила ему вареной картошки с постным маслом и куском вязкого хлеба (он жадно съел все это, отметив, что его любимые тарелки давно не мыты; видимо, водопровод так и не работал с зимы). Налили ему и стакан слабого чаю и даже дали к нему кусок серого сахару, который он с наслаждением разгрыз. Пока он ел, дворничиха стояла рядом, не сводя с него глаз и вытирая сухие красные руки о передник. Ему было неловко, что она так волнуется.</p><p class="p1">— Это все, положим, понятно, — сказал Ять по возможности беззлобно. — Но мне-то где же теперь жить? Я ведь заплатил за полгода вперед, квартира-то моя…</p><p class="p1">— А вы спросите в домовом комитете, они и скажут! — Дворничиха от души обрадовалась, что можно на кого-то перевалить решение. — Вы к ним ступайте, и они всё скажут!</p><p class="p1">— А ежели ночевать, так вот в кухне пока, — с неприкрытым злорадством добавил из коридора столяр; дворничиха усердно закивала.</p><p class="p1">— И где этот ваш комитет?</p><p class="p1">— Председатель комитета в седьмой квартире, Матухин Николай, с бондаревского завода, — частила она — Он вам все и обскажет, как и что…</p><p class="p1">— Мы ж не своей волей, — пробасил дворник из угла. Он ужасно смущался и вступил в разговор, только когда Ять собрался уходить. — Я ж разве своей волей полез бы… нешто мы без понимания… Но видят — пусто, а с дитями как?</p><p class="p1">Дети с визгом носились по коридору, но вышел столяр и влепил одному здоровую затрещину. Младшие притихли, а старший так и сидел в своем углу с книжкой — то был «Географический атлас» в издании Миронова, Ять дорого за него дал, — и внимательно изучал политическую карту Европы на цветной вкладке. Ять подумал было, что мальчика интересует исключительно качество бумаги — змей или мало ли что, — но ребенок вдумчиво водил пальцем по границам и шевелил губами, вслух проговаривая названия столиц. И в самом деле, ему нужней. Вдруг самородок, Ломоносов, и тогда вся моя жизнь оправдана покупкой этого атласа. Кто сказал, что на свете есть что-нибудь мое?</p><p class="p1">— Постойте, — уже в дверях сказал Ять. — Но ведь в седьмой квартире не было никакого Матухина. Там жил профессор Чечельницкий, историк, я хорошо знал его…</p><p class="p1">— Профессор уехали, — закивала дворничиха, — они к дочери переехали еще зимой, так и сказал мне: прощай, Клавдечка, и прости, пятнадцать лет тут я прожил, а теперь еду, потому старость и не могу себя обслуживать. И теперь Матухины вселилися, он сам и детки, и там он ведет прием…</p><p class="p1">— Да-да, — рассеянно ответил Ять. «Черт те что, — подумал он, — до чего мне безразличны люди… Профессор съехал, а я и не заметил… Положительно, я и революции не заметил бы, если б не прикрыли газету».</p><p class="empty-line"/><p class="p1">Звонок в седьмой квартире скрежетал громко и пронзительно, но никто не открыл; Ять решил напоследок постучать — и дверь тут же распахнулась. Видимо, на звонки тут не отвечали принципиально, считая их буржуазным пережитком, — тогда как на стук сразу же вышла огромная суровая баба, уперла руки в бока и смерила Ятя враждебным взглядом. За спиной у нее клубился тот же пар, что дворниково семейство развело в квартире Ятя: то ли от кипящего белья, то ли от дворниковых самокруток, а всего верней — от тумана в их головах.</p><p class="p1">— Ну? — только и спросила она. Вид Ятя, впрочем, и в самом деле не внушал доверия.</p><p class="p1">— Матухина бы мне, — сказал он, стараясь говорить небрежно.</p><p class="p1">— Нету его. Всем вам Матухина. Ушел Матухин.</p><p class="p1">— А когда вернется?</p><p class="p1">— Когда придет, тогда и вернется. Он мне не докладывает.</p><p class="p1">— А где его сейчас можно найти?</p><p class="p1">— Почем я знаю. Может, в пятом доме, а может, в одиннадцатом. Он за весь участок тут ответственный, где ж мне знать, куда его позовут.</p><p class="p1">— Дело в том, — сказал Ять зло и твердо, — что он меня из дома выселил.</p><p class="p1">— Выселил — значит правильно, — сказала баба. — Взяли моду по одному в троех комнатах жить, — она так и сказала: в троех. — Он тебя выселил, а надо было тебя, сволочь такую, к ногтю.</p><p class="p1">— Э, э, — Ять сам изумлялся собственному спокойствию. — Ты язык-то не распускай.</p><p class="p1">— Чаво?! — закричала баба. — Иди отсюда, морда пархатая! Через вас все и вышло, через гнусавых! Пшел, покуда я с лестницы тебя не спустила!</p><p class="p1">Матухина он нашел почти сразу — в одиннадцатом доме по Большой Зелениной; баба не соврала — тот стоял посреди двора, опустив голову и глядя на свои сапоги. Матухин был рослый малый лет тридцати пяти — Ять, однако, никогда не заподозрил бы в нем ровесника: надо полагать, тяготы труда и нездоровый образ жизни состарили его прежде времени. Во всем его облике чувствовалась не сила, но тяжесть, не достоинство, но злость. Иногда он ковырял сапогом мартовскую грязь. Вокруг главы домового комитета стояло пять потрепанных и тоже преждевременно состарившихся женщин с детьми, и все наперебой кричали ему, что воды нет, и дров нет, и постановка на паек задерживается, а дополнительный паек вообще удерживается, а он молча, даже не кивая, выслушивал атот крик; создавалось впечатление, что обе стороны играют свои роли без всякой надежды на взаимопонимание. Одни кричат, потому что так положено, другой слушает, потому что таков его крест; и впрямь, выкричавшись, женщины успокоились и по одной разошлись.</p><p class="p1">Ять сразу понял, что перед ним именно председатель домового комитета. Да и к кому другому стали бы тут обращать жалобы?</p><p class="p1">— Вы Николай Матухин? — спросил он.</p><p class="p1">— Я, — ответил Матухин, подняв на него желтые глаза и неприятно щурясь.</p><p class="p1">— Председатель домового комитета?</p><p class="p1">— Участковый председатель, — поправил он. — Слушаю, товарищ.</p><p class="p1">— Пока я был в отъезде, мою квартиру заняли, — сказал Ять.</p><p class="p1">Матухин молчал. Вероятно, любая речь только роняла его в собственных глазах: власти подобала важность.</p><p class="p1">— И где мне теперь жить? — спросил Ять.</p><p class="p1">— Какая квартира? — после паузы спросил Матухин.</p><p class="p1">— Тринадцатая, в седьмом доме.</p><p class="p1">— А я почем знаю, — выждав еще около минуты, проговорил Матухин. — Не я ж решаю, верно? Есть решение: иди, товарищ Матухин, и уплотняй. Товарищ Матухин идет и уплотняет.</p><p class="p1">Именно тут Ять заметил главную речевую особенность всего нового начальства: получив самомалейшую власть, эти люди немедленно начинали говорить о себе в третьем лице, словно председатель домкома не был уже прежним Матухиным, а мгновенно объективировался от него. Был некий Николай, бондаревский рабочий, токарь или слесарь, — и отдельно от него, как огромная тень, молчал, двигался и разрешал мировые проблемы товарищ Матухин, та душа, которая в древних языческих культах проделывала самые опасные дела за своего носителя, пока он валялся в трансе у ног колдуна.</p><p class="p1">— Товарищу Матухину сказали, — продолжал товарищ Матухин, — он и сделал. Потому решение, так? Решение уплотнять. Которые не живут, тех целиком. Которые живут, тем комнату. Вы не живете — вас целиком.</p><p class="p1">— Но я выехал всего на месяц, по работе…</p><p class="p1">— Откуда же мне знать, куда выехал? Я вижу, что отсутствуют, я и вселяю. Если бы я видел, что присутствуют, я бы не вселил, верно? Или если бы предупреждение. Могли подойтить, предупредить: так и так, товарищ Матухин. Товарищ Матухин не вселил бы. Или вселил бы не целиком. Но если нету никого, так я и вселяю. Это ж не я решил, верно? Есть решение уплотнить… Ять понял, что по этому кругу товарищ Матухин может ходить бесконечно.</p><p class="p1">— А мне где жить? — снова спросил он.</p><p class="p1">— А я знаю? — отвечал товарищ Матухин. — Если мне будет распоряжение, то я вселю. Если не будет распоряжения, то не вселю, так?</p><p class="p1">— Чье расноряжение?</p><p class="p1">— От Петроградского совета распоряжение, — охотно ответил Матухин. Вероятно, это была цель заведомо недостижимая, и потому к ней он переадресовывал Ятя с такой же радостью, с какой дворничиха отправила его к главе домового комитета. — Петроградский совет должен распорядиться в районный совет, оттуда должны дать направление в участковый комитет, а там я на заседании участкового комитета рассмотрю и вселю. Если распоряжение, я сразу вселю, верно? Когда распоряжение, то как же… Ять почувствовал, что Матухин заходит на новый круг, и поспешил прервать его:</p><p class="p1">— Но есть договор, есть расписка об оплате. Эта квартира — на весь год моя.</p><p class="p1">— А что договор? Все договора не действуют, вон даже с Францией не действуют. Что мне договор? Мне нужно распоряжение от Петроградского совета, чтобы районный совет дал в участковый совет, а я потом на домовом комитете могу рассмотреть.</p><p class="p1">Вся эта цепочка, начиная с недосягаемого Петроградского совета, которому только и дела было до вселения Ятя, напоминала нечто сказочное, чуть ли не из Афанасьева: поразителен был мгновенный перенос фольклорных представлений на государственную жизнь. Изначальная установка была загадочна: пойди туда — не знаю куда, принеси то — не знаю что. Все выходило по грэмовскому рассказу: не успел Ять прийти в родной город после долгих странствий, как должен снова уйти, двинуться по кругу, найти волшебный клубок, по нему прийти в Петроградский совет, там усыпить дракона, умилостивить пса, расположить к себе стальной замок, добраться до Председателя (Кашей Бессменный: скелет, корона), от него получить перо лебединое, куда поплывет — туда пойти; поплывет в совет районный, где надо дунуть, плюнуть, подковать блоху, грянуться оземь, обернуться кисою, доказав тем самым столь ценимую новой властью способность к превращениям, — тогда председатель районного совета обернется мышью; председателя Петроградского совета изловить, тут он прямо в кошачьих лапах закычет зегзицею, а ты должен обратиться в коршуна, после чего, уже в твоих когтях, он сделается орехом, а ты белкою, и тогда, утомленный цепочкой превращений, довольно отдуваясь, выдаст он тебе предписание, а такожде лук со стрелами. Стрела упадет во дворе дома одиннадцать по Петроградской стороне, а там уже стоит товарищ Матухин в кожаном картузе; как стрела попадет ему в картуз, так он обернется серым волком, и ты на нем въедешь в квартиру тринадцать, дом семь, — после чего нынешние ее обитатели тотчас скатаются пыльными шариками, вернувшись в привычное свое состояние, только столяр, сопротивляясь дольше других, убежит огромным тараканом, рыжими усищами шевеля.</p><p class="p1">— Ну? — грозно спросил Матухин. — Что смешного нашел?</p><p class="p1">— Тебя, — беззлобно сказал Ять, повернулся спиной к представителю власти и, пошатываясь от смеха и слабости, пошел со двора. Темнело, и в густеющей синеве все ясней, становилась сказочность происходящего. Разумеется, ничего подобного нет и быть не может. И конечно, я не пойду ни в какой Петроградский совет. Я обожаю преодолевать препятствия, но лишь тогда, когда воздвигаю их себе сам, — я готов грянуться оземь и обернуться кем угодно, но не по твоему мановению, товарищ Матухин. Слава Богу, мне есть еще куда пойти, — и разрази меня гром, если я хоть на миг допускаю, что над этим моим прибежищем властна хоть какая-нибудь из властей.</p><p class="empty-line"/><p class="p1">— Давно поджидаю, — сказал Клингенмайер. — Присесть прошу. Представьте, сегодня гадал по книге Тиволиуса, и смотрите, какой катрен открылся: я предпочитаю соловьевский перевод, хотя орловский, говорят, точней: «Гвоздь, молоток, кремень, сова, дворовый волк попрал права, вернулся друг, глава как снег, готовы пища и ночлег». Нет, что вы ни говорите, а Тиволиус превосходит Нострадамуса настолько же, насколько гадатель превосходит историка. Я только не совсем понимаю, что бы значило «дворовый волк попрал права»…</p><p class="p1">— Это самое точное, — кивнул Ять. — Я потом расскажу вам.</p><p class="p1">— Конечно, конечно.</p><p class="p1">— Мне, напротив, непонятно про «гвоздь, молоток, кремень, сову»…</p><p class="p1">— Это просто. Первая строка каждого катрена определяет не события, а, если угодно, главные элементы, духовную атмосферу происходящего. Кремень — вероятно, вы, сова — я в своем затворничестве, а гвоздь с молотком… ну, это вещь очевидная.</p><p class="p1">— Очевидная.</p><p class="p1">Ять блаженствовал в кресле за хрупким деревянным столиком. Клингенмайер священнодействовал с отварами и настоями, горели свечи, потрескивало пламя в маленьком камине. Какое счастье, что Клингенмайер был в лавке, а не на квартире! Как вовремя всегда был открыт его таинственный магазин! Собачьим чутьем Ять нашел место, где будет ему ночлег, где будут ему рады, — и сразу лишился сил, словно достиг наконец цели долгого пути.</p><p class="p1">— Расскажите, Фридрих Иванович, что тут без меня делалось.</p><p class="p1">— Ничего не делалось, Ять, в том-то и страх. Все выжидают, а первым никто не бросится; но чем дольше ожидание, тем ужасней может получиться потом.</p><p class="p1">— А про Елагинскую коммуну что-нибудь слышали?</p><p class="p1">— Как не слышать, ее тут закрыть хотели, но пока не вышло. К ним многие ходят, там чуть не клуб… Ну, раскол — это еще при вас.</p><p class="p1">— При мне.</p><p class="p1">— Пейте чай, это бомбейский, мне позавчера прислали.</p><p class="p1">— Так почта действует?</p><p class="p1">— Не всякая, — уклончиво ответил Клингенмайер. — Правительство переехало, столица теперь в Москве — к этому, впрочем, триста лет уже шло. К чему азиатской стране европейская столица? Наилучшим вариантом было бы разделение, и до этого еще может дойти: когда не могут поделить власть, надо делить страну. Подобный путь предложил Грозный — возьмите опричнину; но у этих вряд ли хватит ума… Петроград теперь ничей, совершенно ничей. Но так ведь, согласитесь, и интересней — только в паузах стоит жить; перелома я ожидаю не раньше мая. Скажите лучше, где были вы.</p><p class="p1">— Я — в Крыму, там интересно… было, — добавил Ять, с наслаждением отпивая большой глоток крепчайшего чая, слабо пахнущего таинственными пряностями, цветами, джунглями. — Теперь немцы, и вряд ли что-то осталось от всего этого двухмесячного карнавала. Четыре власти поменялись, потом началась кровь… а теперь, вероятно, орднунг.</p><p class="p1">— На юге всегда все быстрей, — подтвердил Клингенмайер.</p><p class="p1">— Кстати! — Ять порылся в кармане и извлек альмекский сувенир от Зуева. — Вот ведь: так и протаскал с собой все время. Не хотите в коллекцию? Клингенмайер хищно схватил дудочку.</p><p class="p1">— Откуда это у вас?</p><p class="p1">— Подарил один специалист по древней истории Крыма. Что, редкость? Клингенмайер поднял глаза на Ятя.</p><p class="p1">— Думаю, вы не представляете истинной ценности этой вещи.</p><p class="p1">— Очень может быть, — легкомысленно кивнул Ять. — Но обмен в любом случае получился равноценный.</p><p class="p1">— Что вы дали за это? Собиратель был подозрительно серьезен.</p><p class="p1">— Случилось так, что моя невеста уехала с ним.</p><p class="p1">— Вы наверное знаете, что она уехала?</p><p class="p1">— Лично не провожал, но имею все основания думать так.</p><p class="p1">— Надо было, конечно, удостовериться лично, — Клингенмайер нахмурился. — Хотя… Как давно она у вас?</p><p class="p1">— Дудка? Недели две..</p><p class="p1">— Гм. Предвестие странное, чтобы не сказать более… Посмотрите-ка на это. — Клингенмайер распахнул шкаф, где лежали у него самые бесполезные и необъяснимые древности, и извлек еще одну дудочку из сухого белого дерева, похожего на кость; он легко соединил их и с осторожной нежностью подул. Звук получился неожиданно богатым, низким, едва ли не виолончельным.</p><p class="p1">— Что это? — заинтересовался Ять.</p><p class="p1">— По-хорошему, — с тою же серьезностью проговорил Клингенмайер, — того, кто дал вам эту вещь, надо из историков разжаловать… не знаю даже куда. Одна надежда, что невеста ваша быстро превратит его в карманного вора. Видывал я невежество, но такое… Это альмекская флейта второго века, один из пяти описанных экземпляров. Судя по тому, что об остальных четырех вот уже лет сто ни слуху ни духу, — у вас последняя.</p><p class="p1">— Вы знаете об альмеках? Клингенмайер презрительно фыркнул.</p><p class="p1">— А вы грамоту знаете?</p><p class="p1">— Простите, я не думал, что это так… фундаментально.</p><p class="p1">— Фундаментально… История, Ять, не одна, и покуда все эти ваши коллеги, начитавшись Пинкертона, ищут мировой заговор — заговор вот он, под носом, только никто не хочет его видеть. Есть две истории — одну знают все, другую пишут избранные. Мы осведомлены о таких вещах, какие ни одному университету не снились, но ведь их публиковать — бессмысленно: загрызут тут же. Кто поверит в альмеков, ежели альмеки не вписываются ни в какую теорию? Однако они были, и свидетельства раскиданы по всему миру. Беда, если драгоценная вещь попадет в руки профана: сколько раз я писал — строже, строже блюдите тайну!</p><p class="p1">Если даже Клингенмайер фантазировал — это было милосердно: он сумел блистательно отвлечь Ятя от его забот. Но, скорее всего, он, как и Грэм, верил в легенду, творимую на глазах собеседника. Впрочем, чем черт не шутит — сегодня Ять не поручился бы ни за какую истину.</p><p class="p1">— Трагедия альмеков, — продолжал собиратель древностей, — случилась из-за того, что один из жрецов — полное его имя долго произносить, а краткое оскорбит его память, — приказал разъединить флейты. О точном их числе сведения расходятся: по одним источникам — двадцатьшесть, по другим — тридцать одна, — но разъединение их, по альмекским меркам, было… с чем бы сравнить?</p><p class="p1">— Отмена орфографии, — кивнул Ять.</p><p class="p1">— Что вы! Жрецу в голову бы не пришло ничего подобного. Дело в ином: он хотел многократно усложнить ритуал встречи восхода… но это усложнение, видимо, оказалось критическим. А может быть, он просто нарушил древнее табу, смысл которого забылся: нельзя разъединять флейты! И вот вам: с четвертого века пошла неуклонная деградация. К восьмому-девятому от могущественной страны в благодатном краю уцелели жалкие поселения…</p><p class="p1">— Так вы полагаете, эта дудка в самом деле драгоценна? — как можно небрежнее спросил Ять.</p><p class="p1">— Думаю, что любой музей — разумеется, в стране, где еще действуют музеи, — дал бы за этот экспонат больше, чем за всю мою коллекцию. Но я не знаю коллекционера, у которого хватило бы сил выпустить альмекскую флейту из рук. Со временем я вам дам книгу… но не теперь, конечно.</p><p class="p1">Очень возможно, что все это Клингенмайер выдумал. Несомненно было одно: зуевская белая буква зет и клингенмайеровская сухая дудка идеально подходили друг к другу и издавали странный, дивный, тревожный звук.</p><p class="p1">— Знаете, Фридрих Иванович, — робко улыбнулся Ять, все еще чувствующий себя слабым и подавленным. — Если я в силах хоть как-то отплатить вам за все, то считал бы за счастье подарить вам эту вторую половину… хотя и совершенно убежден, что всю эту прелестную новеллу вы сплели единственно для того, чтобы я не чувствовал себя только докучным посетителем.</p><p class="p1">Клингенмайер исподлобья, внимательно посмотрел на него.</p><p class="p1">— Разубеждать вас не стану, — сказал он мягко. — Не стану и благодарить, ибо есть вещи, за которые не благодарят. Живите здесь, сколько нужно, и помните, что тремя веками жизни в моей лавке на полном пансионе не уравновесили бы вы этого дара. Вы когда-нибудь сами поймете всё, а пока милости прошу закусить.</p><p class="subtitle">3</p><p class="p1">Странно было после двухмесячного отсутствия, в которое вместилось пять смен власти, два безумных путешествия, разрыв, снова прийти на Елагин остров. Поразительна была отходчивость природы: только что все спало мертвым сном, лежало покорной серой пустыней, но едва отпустило — началась бешеная подспудная работа, зароились тайные силы, повылезли жуки, червяки, ростки, обиды, надежды и желания. Жизнь перла отовсюду как бешеная. Вся поверхность Масляного луга, обратившаяся весной в царство черной жижи с подмытыми глинистыми краями и замшелыми статуями, разбросанными тут и там, готова была покрыться ядовитой ранней зеленью, похожей на плесень, и кое-где уже зазеленела.</p><p class="p1">Внутри, на первом этаже Елагина дворца, кипела столь же бурная жизнь, как и за его стенами, — и точно так же, как на Масляном лугу, все это выглядело довольно гнило. Ощущение плодородной грязи и цветущей плесени только усиливалось в главной зале с ее клетчатым полом и строгим некогда обликом: теперь тут во множестве торговали сомнительные личности, привлеченные Извольским. Во дворце развернулся, по сути, филиал Сенного рынка — и многие жители Петроградской отоваривались здесь. Извольский изменил бы себе, не воспользуйся он дворцом в коммерческих целях, — и хотя главной его коммерцией стала теперь политика, он положительно не в силах был отказаться и от сиюминутной выгоды, как тот анекдотический портной из рассказа Буркина, который, захватив трон, еще бы немножечко — и шил. Предоставив мешочникам помещения для складов и сделок, он брал с них скромную дань — своего рода паек для обитателей коммуны, взамен отнятого Чарнолуским. Чарнолуский прекрасно знал о дворцовой лавочке Извольского, но не имел еще полномочий ее прикрыть: в конце концов, так называемый публицист не делал ничего незаконного; правда, неизвестный доброжелатель уже направил в Смольный подробное письмо — со старательными, явно нарочитыми вкраплениями грамматических ошибок — о том, что предполагаемый очаг культуры, последний якобы оплот духовного сопротивления, превратился в центр спекуляции.</p><p class="p1">Нарком просвещения давно догадывался, что в Москву его отзовут только после того, как будет решен вопрос с елагинцами и, коль уж так получилось, с крестовцами. Ни о каком общественном мнении Чарнолуский, само собой, давно не думал — общественное мнение вместе с правительством переехало в Москву; он просто не знал, с какого конца взяться за это безнадежное дело. Интуиция драматурга, пусть плохонького, подсказывала ему, что елагинская оппозиция развалится тем скорее, чем меньше станут обращать на нее внимания, — но появление Извольского в профессорском стане путало все карты. Этот не собирался сидеть во дворце и пассивно сопротивляться: он таскал на Елагин иностранцев, вон и американский консул десятого апреля был приглашен туда для демонстрации бедственного положения национальной элиты, — в доносе промелькнуло даже темное сообщение об оружейном складе, устроенном в подвале кухни… Казалось бы, чего проще — объявить дворец памятником культуры, а стариков развести по квартирам, в крайнем случае свезти в богадельню на Обводном канале; но момент был безнадежно упущен. Извольский устроил во дворце склад, он проводил митинги, наводнял оставшиеся газеты гневными очерками о произволе властей и вообще вел дело к серьезной стычке, которая скомпрометировала бы новую власть капитально и надолго. Пора было решаться — а все-таки решиться Чарнолуский не мог. Ища способ избежать большой крови, он подумывал даже о поджоге дворца, но тут же встряхивал головой и пытался отвлечься. Отвлечься, однако, было нечем Похоже, решение елагинской проблемы стало в глазах товарищей чем-то вроде инициации: только разобравшись с последствиями собственной сомнительной затеи, мог он на равных войти в правительство. Впрочем, была у Чарнолуского одна идея; над ее-то осуществлением он и размышлял в то самое время, как Ять входил во дворец.</p><p class="empty-line"/><p class="p1">Ять, конечно, всего этого не знал. Он видел только бурно развернувшуюся торговлю на первом этаже дворца. Вот кому достаются дворцы, захваченные восставшим народом! — тут был жестокий, но ясный символ. Да и кто, кроме Чарнолуского, мог вообразить, что в чужом доме после изгнания хозяев возможны занятия искусствами и коллективный поиск истины? Подобное могло еще получиться в добровольно оставленном жилище вроде прилукинской дачи, но в принудительно отчужденном дворце мог разместиться только блошиный рынок. Ни об отнятии пайка, ни об угрозе разгона коммуны Ять еще не слышал, — он принял разгул предпринимательства за признание большевиками собственного бессилия. Снабдить стариков крупой, хлебом и чаем они могли теперь, видимо, только при помощи спекулянтов.</p><p class="p1">Спекулянты были не простые, а с понятием: каждый знал, что на острове образовался своего рода культурный заповедник, где столовались и отоваривались почти все оставшиеся в городе писатели. Заходили сюда и артисты — в этой среде у Извольского были особенно обширные знакомства; артистам полагались скидки. Никогда еще не было у петроградских спекулянтов столь блистательной клиентуры: певцы из Мариинки, красавицы из бывшей студии Комиссаржевской, завсегдатаи богемных кабаков — все шли на Елагин остров. Извольский скромно называл свою торговлишку «Лавкой искусств».</p><p class="p1">Каждый, кто приторговывал в Елагином дворце, обзавелся собственным альбомом, где постоянные клиенты оставляли автографы, стихи и приятные пожелания. Самый толстый альбом, еще прошлого века, с картонными сиреневыми страницами — в каждом углу по виньеточке, — Имелся у Шраера, торговца дровами. Где брал он дрова — для всех оставалось тайной. Шраер был человек могущественный: толстый (что в Петрограде восемнадцатого года уже служило знаком власти), и не водянисто-дряблый, как иные, опухшие от кипятка и глинистого хлеба, а тугой, плотный. Он имел вечно сонное, умильное выражение лица и огромную бородавку под левым глазом, тоже отчего-то усиливавшую впечатление достоинства и силы. Он лениво записывал в огромную засаленную тетрадь имя и адрес заказчика, и на другой день к тому приезжала требуемая порция прекрасных березовых дров. На восхищенные, робкие вопросы об источнике этой главной петроградской валюты образца 1918 года (апрельские ночи были холодны) Шраер скромно потуплялся и замечал, что надо же ж вертеться. Алексеев его ненавидел. Перед ним был не просто жид, но воплощение, идея жида, — и от этого жида зависел теперь и Алексеев, и все. Он не мог отказаться от услуг Шраера, отапливал комнату его дровами, добытыми Бог весть где, способствовал Шраерову обогащению — он, именно и предсказавший такое развитие событий десять лет назад! Они для того и расшатали всю русскую государственность — под предлогом защиты своих прав, которые никто не ущемлял, и отмены оседлости, которую никто не соблюдал, — чтобы теперь свободно торговать и рассказывать свои анекдоты, а русская интеллигенция чтоб была у них на посылках, — ясно же, что жиду отроду не была нужна никакая свобода и культура, а только торговля и анекдот!</p><p class="p1">«Лавка искусств» поражала изобилием; Ять горячо пожалел об отсутствии денег. Нечего было растравлять душу зрелищем этого великолепия, и он решительно прошел к Казарину.</p><p class="p1">Казарин был дома, один, — лежал на постели, укрывшись пледом; у него было холодно — ржавую печь он сегодня не топил. В комнате пахло гнилью, болезнью — даром что было по-монашески голо и чисто.</p><p class="p1">— А, Ять, — сказал он без всякого выражения, словно они виделись вчера. — Заходите, рассказывайте, что нового.</p><p class="p1">— Рассказывать долго. — Ять присел на кровать. — Что, нездоровы?</p><p class="p1">— Да, знаете… впрочем, это давно. Где вас носило, что не заходили? Пошел слух, будто вы за границу подались… Чаю хотите? Есть чай, настоящий.</p><p class="p1">Казарин всегда был несколько томен и вял, но сейчас в его слабости не было и тени притворства: лицо приобрело зеленоватый оттенок, щеки ввалились, он едва шевелился, а когда протянул руку — указать на расписную чашку, в которой заваривал чай, — Ять поразился худобе этой руки и неуверенности всех его движений. Отрастил он, кроме того, огромные ногти — желтые и кривые, хищного вида, никак не сочетавшиеся с хрупкостью, почти бесплотностью самого Казарина.</p><p class="p1">— Благодарю вас, я пил сегодня. Как вы, как Марья?</p><p class="p1">— Марья ушла, — спокойно сказал Казарин. — Она, кажется, на Крестовском теперь.</p><p class="p1">— Простите, ради Бога, — проговорил после паузы опешивший Ять. Казарин прикрыл глаза.</p><p class="p1">— Ничего, ничего. Что тут такого. Вы же не могли знать… Это давно уже случилось.</p><p class="p1">Ять ощутил при этом известии толчок счастья, которого немедленно устыдился: выходит, не только у него случается такое. Вид идиллической пары, счастливая и цветущая Ашхарумова — все это сильно уязвило бы его; он опять позавидовал бы Казарину — даже больному.</p><p class="p1">— Ушла, ушла, — повторил Казарин, не открывая глаз и не шевелясь. — И я думаю, правильно. Это должно было быть, и лучше, что так. Вы решите, вероятно, что я зол на нее, — нет. О, если бы я мог быть на нее зол… Но иногда я думаю, что и сам бы хотел… не сразу, конечно, не с начала, но чем дольше, тем сильней я подталкивал ее. Знаете, есть сюжеты… их власть велика; полюбил молодую, привязал к себе, мучил — ясно же, что уйдет, должна уйти. Бывают такие молодые, что остаются по доброй воле, и не ради тебя, а потому, что видят в этом служение. Согласитесь, так хуже. Есть тут какое-то вранье. Если хотите курить — курите, у нас теперь много всякого… добра.</p><p class="p1">Он лежал вытянувшись, говорил медленно и едва слышно.</p><p class="p1">— Вам не до меня теперь, — сказал Ять. — Я зайду еще. — И он поднялся уходить.</p><p class="p1">— Посидите, — просительно выговорил Казарин. — Посидите, вам я могу сказать… я же знаю, у вас было подобное. Мне надо говорить, я привык, что в комнате кто-то есть, и одному трудно… До сих пор ошибаюсь — доплетаюсь до этих, с лотками, и говорю: дайте нам… нам нужно… А между тем нам ничего не нужно, и я почти труп. С ней было бы хуже, но без нее… — Он неожиданно всхлипнул, из угла закрытого глаза скатилась маленькая слеза.</p><p class="p1">— Но мне казалось, она любила вас, — после паузы заговорил Ять. Казарин открыл глаза — огромные, черные.</p><p class="p1">— Она и теперь любит, — с жаром сказал он. — Конечно, любит. Это самое страшное. Она приходит иногда — вы знаете? Не может сразу уйти, и я это терплю. Что прикажете делать, ведь ей тоже трудно. Привычка, и потом, я всего третий. Первого стараются забыть, со вторым долго мучаются, с третьим впервые узнают счастье и помнят долго… В том-то вся и беда, что любит. Если б она ушла из-за того, что разлюбила, — я не мучился бы, я был бы теперь здоров… Это другой уход. Если б не давняя ненависть к этому слову, я сказал бы, что это уход идейный. Но и это не совсем то. Ей, видите ли, показалось, что там — жизнь, а здесь — только я, который боится выйти этой жизни навстречу. Опасно любить жизнь, вы не находите? Она всегда уходит.</p><p class="p1">— Я думал об этом, — кивнул Ять. — У меня, в сущности, то же самое.</p><p class="p1">— В самом деле? Расскажите! — потребовал Казарин. — Мне нужно теперь.</p><p class="p1">— Это надо рассказывать или очень долго, — улыбнулся Ять, — или не рассказывать вовсе. Я за этот месяц пережил, считай, всю российскую историю — бывшую и будущую. Там только и стало понятно, за что я ее люблю. С ней, понимаете ли, в короткое время можно успеть очень много — все ускоряется вдесятеро. Ну, а в конце, естественно, — все как всегда. Она теперь за границей, а я тут. И боюсь, что теперь это уже последний разрыв. Во всяком случае, она не вернется, да и я вряд ли уеду — я вовсе там себя не мыслю… Казарин кивнул.</p><p class="p1">— Да, там тоже жизнь… а вы выбрали смерть, и правильно сделали. Всегда надо выбирать смерть. Я у какого-то японца читал: живи так, словно ты уже умер. Это нетрудно.</p><p class="p1">— Ну, зачем же так? Бог даст, и вы поправитесь…</p><p class="p1">— Что — я? — громко и страстно проговорил Казарин. — Я теперь скелет, голая кость, и надо хоть сдохнуть с пользой, раз я жить никогда не умел. Знаете — «ты взвешен и найден очень легким»; но хотя бы это перо надо кинуть на правильную чашу. Мне теперь отсюда дороги нет, я человек конченый, — но ведь с самого начала к этому шло. Я и говорил вам, помните?</p><p class="p1">— Но почему вам не вернуться домой?</p></span>
