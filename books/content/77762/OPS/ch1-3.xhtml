<p class="p">Предисловие к первому изданию</p>
</div><p class="p1">Принадлежность «Орфографии» к жанру оперы предполагает ряд особенностей: вставные номера, дивертисменты, длинные арии, театральные совпадения, условности и пр. Классические оперы давно изданы на компакт-дисках в облегченном виде — увертюра, пять-шесть лучших арий, кульминация, финал. К сожалению, у автора нет возможности издать свою прозаическую оперу в двух вариантах, — к тому же ему видится в этом априорное неуважение к читателю. Поэтому, стараясь сделать сочинение удобным для широкой аудитории, он выделил курсивом места, которые можно пропускать без большого ущерба для фабулы, а полужирным шрифтом — те, которые сам он относит к «хитовым».</p><p class="p1">На естественный вопрос, почему бы всю оперу не сделать хитовой, а заодно не убрать заранее фрагменты, выделенные курсивом, — автор вправе отметить, что, во-первых, ни одна опера не может состоять из концертных номеров, а во-вторых, без курсивных отрывков сочинение лишилось бы смысла. Даже тот, кто почувствует скуку при первом знакомстве с ними, впоследствии сможет вернуться к этим главам и перечесть их в свободное время, уже зная, чем все закончилось. Для читателя, которому интересна описываемая эпоха, «Орфография» не представляет никаких затруднений, а потому он попросту проигнорирует игры со шрифтами, прочитав книгу от начала и до конца, как она написана. Нелепо было бы сочинять роман о самом избыточном и условном в человеческой жизни, освобождая этот роман от всего избыточного и условного — в котором автор и протагонист только и видят Божественное присутствие.</p><p class="p1">Дмитрий Быков,</p><p class="p1">Москва, май 2002 года</p></span>
