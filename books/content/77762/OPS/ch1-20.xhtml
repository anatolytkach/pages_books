<span><p class="p1">— Меня всегда тянуло написать детектив, где бы все убили одного, потому что этот один стал им мешать. Но он не вне, а внутри героя. Допустим, вы встречаетесь с девушкой и вы влюблены, как только умеете быть влюблены. Само собою, от этой любви вы становитесь другим — добрей, умягченней, чище. Но прочие части вашей души остаются теми же: вы ходите на службу, бегаете к надоевшей любовнице, читаете газеты, играете в клубе, и все это разный вы — в разном кругу… Из этой пятерки, составляющей подлинный ваш облик, есть еще один, которого никто не знает, — это вы наедине с собой, и только вы повелеваете остальными. Теперь представьте: она разлюбила вас. Кому нужен этот чистый, этот глупый?! Он только тревожит остальных, и они замышляют убить его. И здесь, у моря, — он уже увлекся и импровизировал, глядя в темноту, не чувствуя, как окурок жжет ему пальцы, — здесь, у моря, где она когда-то бросила вас, вы убили его, вытравив из себя. Но убийцу тянет на место преступления, и они, все пятеро ваших «я», толкают вас приезжать сюда снова и снова — так бы я это развернул.</p><p class="p1">— А дальше?</p><p class="p1">— Ничего не надо. Стоят у моря, и каждый видит его не так, как другой. А вас, их сумму, дать в конце глазами девушки, хорошей девушки, спешащей мимо: она видит, как одинокий нервный человек, потирая лоб, стоит у моря и говорит сам с собою. Ей страшно, что он прыгнет сейчас. Она подходит. Ну, и дальнейшее — на воображение читателя.</p><p class="p1">— И убитый воскреснет?</p><p class="p1">— Может быть, и да, а может быть, родится другой, — твердо сказал Грэм, очень довольный собой. — Так — вам нравится? Вина не хотите?</p><p class="p1">— Так ведь чужое…</p><p class="p1">— Глупости, куда старухе столько вина. Мы в прошлую ночь вон тот ящик почти опорожнили, но одна бутылка еще есть.</p><p class="p1">— Не могу, — отказался Ять. — Я гость…</p><p class="p1">— Я тоже гость, но мы художники, — возразил Грэм. — Мы никогда не возьмем вещей или денег, но все вино мира принадлежит нам. — Он взял из дальнего ящика последнюю пыльную бутылку, ловко вышиб пробку и принялся жадно пить, запрокинув голову.</p><p class="p1">— Оставьте, товарищ, — робко попросил Трубников. — По-братски…</p><p class="p1">Грэм неодобрительно хмыкнул, но пару глотков непрошеному братцу оставил.</p><p class="empty-line"/><p class="p1">Старухино вино оказалось превосходно, еды она не предложила, и после третьей бутылки терпкого веселого напитка он-таки охмелел. Все события последних дней — встреча с Таней, эсер, арест, ходуны, татары, — смешались у него в голове. Ни одно из них — кроме, конечно, возвращения к Тане, на котором тоже с самого начала лежала печать странной обреченности, — больше не имело веса. Все это могло быть, могло не быть, а больше всего похоже было на тяжелый, отрывистый сон; и если сам он, опытный сновидец, мог так существовать весьма долго, — для страны, хотя бы и такой дикой, прелестной и печальной, как Крым, все это было куда как неблаготворно. Сказывались бессонные ночи, и Ять задремал, привалившись спиной к неподвижно сидящему Грэму. Когда он просыпался, ему казалось, в подвал набились какие-то новые люди, прячущиеся от очередной власти. Ять тряхнул головой, отгоняя морок. Голоса были прежние: властители опять спорили. Отчего русские так много спорят, и всегда в подвале? На воле, знать, времени не хватает, или слишком боятся попасть в подвал, тогда как в подвале бояться уже нечего… Кто-то тяжело, гулко — так, что слышно было в подвале, — колотил в дверь.</p><p class="p1">— Господи! — взвизгнул Трубников.</p><p class="p1">— Облава, — сквозь зубы прошипел Свинецкий. — Всем молчать! Кто посмеет пикнуть — пристрелю!</p><p class="p1">Некоторое время сверху доносились только невнятные ругательства старухи да мягкий басовитый говор вошедшего. Наконец крышка тайного хода откинулась, и по деревянным ступеням заскрипели тяжелые шаги.</p><p class="p1">— Не лякайтесь, не лякайтесь, шановны панове, — проговорил незнакомец. — Це ж я, ваш хетьман.</p><p class="p1">Ять расслышал, как Свинецкий взвел курок.</p><p class="p1">— Не стреляйте, ради Бога! — умоляюще проговорил гетман на чистом русском языке, почти без акцента. — Господа, я ровно в том же положении, что и вы… Умоляю… Позвольте мне объясниться…</p><p class="p1">— Ни с места, наглая рожа! — заорал Терновский, чувствуя себя хозяином положения. — Дошел, значит, и до тебя черед! Что, солдаты в городе? Скинули-таки тебя, тварь чубатая?!</p><p class="p1">— Сядьте, Терновский, — брезгливо сказал эсер, зажег свечу и закурил. — Рассказывайте, гетман, в чем дело.</p><p class="p1">— Ночью… ночью пришел крейсер «Верный», — уныло забасил гетман. — На нем бунт, матросы отказались слушаться большевиков…</p><p class="p1">— Молодцы! — восхитился Свинецкий. — Я знал!</p><p class="p1">— Да, да… Говорят, не для того царя скинули, чтобы теперь нас свои же угнетали… Они ушли из Севастополя, пришли в Ялту и хотят тут установить анархию. Черный флаг, наших всех погнали…</p><p class="p1">— A как же твои черножупаннички?! — торжествующе воскликнул градоначальник. — Армия твоя голоштанная как?</p><p class="p1">— Да какая же армия, — оправдывался гетман. — Я ж не военачальник, панове! Я хотел только, шоб вильна Украина… Вижу, шо большевики не особо много чего могут, ну и собрал горстку хлопцев…</p><p class="p1">— Горстку! — усмехнулся Кропачев. — От горстки мы б не побежали. Ты штыков триста набрал!</p><p class="p1">— И ста не было, вот те крест! — поклялся гетман. — Я ж не командир, панове. Я ж бухгалтер из санатории Крошева, под Мисхором. Чернодурко моя фамилия. Но вижу — все, кому не лень, власть берут, так шо ж я, хуже грузчика? Две буквы переставил, ну и…</p><p class="p1">— Ты грузчиков не трогай! — крикнул из угла Кропачев. — Грузчик, ежели он сознательный, землю двинет!</p><p class="p1">— Та шо нам теперь делить, панове! — понурил голову Чернодурко. — Ну, напужал я вас трохи… Думаете, я не знал, где ты, Кропачев, сидишь? Негде тебе больше было, Кропачев, сидеть, кроме тут! Не стал бы вас брать, вот те крест! — Он размашисто перекрестился. — Теперь-то шо я могу, теперь матросы в городе… Анархыя! Хлопцы мои разбежались, сам я сюда еле добег — стреляют вовсю… Ух, хорошие ребята! — непоследовательно восхитился он. — Черный флаг и это… Ленты пулеметные крест-накрест, бескозырочки… Ну, дадут теперь жару! Хорошо, если старушку нашу не тронут. Да шо вы регочете, панове? Шо я смешного сказал? Но Ять уже не мог остановиться. Появление гетмана было последней каплей.</p><p class="p1">— Может, истерика? — озабоченно спросил Терновский.</p><p class="p1">— Ка… ка… какая истерика! — задыхаясь, слабым счастливым голосом выговорил Ять. — О… о… опомнитесь… Боже, какой восторг! Терновский тяжело повернулся на своем пустом ящике, тот треснул, и скоро хохотали все семеро, включая гетмана.</p><p class="subtitle">23</p><p class="p1">— Ну ладно, мне пора. Благодарю вас, нижайше благодарю, — сказал Ять, стоя на крыльце особняка Анны Густавовны. Старуха смотрела на него неодобрительно. Было шесть часов вечера — до сумерек они проспали после тревожной ночи.</p><p class="p1">— Но куда вы пойдете, в городе бандиты, — ворчала она.</p><p class="p1">— Мне они не страшны. Пусть гетман боится. Я попробую с ними поговорить насчет Гурзуфа — может, они и татар выкинут…</p><p class="p1">— Ага, выкинут, — кивнул Грэм, стоявший рядом. — И разграбят Гурзуф до фундаментов.</p><p class="p1">— Нет, я пойду. Спасибо за приют, но я долго в подполье не вынесу.</p><p class="p1">— Да я с ним пойду, — словно уговаривая мать гимназического приятеля отпустить его с собою на дикий пляж, вступил Грэм. — Мне тут тоже не опасно, я сам анархист… Благодарствуйте, Анна Густавовна! Не надо ли чего? Может, дров наколоть?</p><p class="p1">— Егор все сделает. Но объясните, отчего эти перемены?</p><p class="p1">— В революцию играют. Свинецкий, а вы куда?</p><p class="p1">— У меня свои дела, — вскинул бородку Свинецкий.</p><p class="p1">— Что ж, гетман один останется?</p><p class="p1">— Почему ж. С Кропачевым. Трубников еще. А вам, Ять, я советую прямиком направляться в Гурзуф. С анархистами разговаривать — это не с гетманом нашим картонным. Они матросы, тут настоящий агитатор нужен. Я и пойду.</p><p class="p1">— Владимир Васильич, вас первого убьют, — попытался остановить его Ять. — Они агитаторами сыты по горло…</p><p class="p1">— Ладно, ладно. Не вам судить, какой я агитатор. Ступайте в Гурзуф и готовьте почву, я войду в город с отрядом не позже послезавтрашнего утра.</p><p class="p1">— Бог в помощь, — сдался Ять. Останавливать эсера было бесполезно, он знал это.</p><p class="p1">Не удостоив Анну Густавовну благодарности, Свинецкий сбежал по ступенькам и быстро зашагал вниз по тенистой улице, среди белых дач — к центру Ялты. Скоро он скрылся за поворотом.</p><p class="p1">— Что ж, — вздохнул Ять. — А я назад. Грэм, вы со мной?</p><p class="p1">— С вами. Благодарю вас, Анна Густавовна. — Грэм еще раз низко поклонился.</p><p class="p1">— Не на чем, не на чем… — Старуха закрыла дверь и долго возилась с засовом, ругаясь по-датски.</p><p class="p1">— Чудесная старушенция, — сказал Ять. — Может, в самом деле имеет смысл остаться, постеречь дом? Матросы, кто их знает…</p><p class="p1">— Я знаю, — решительно сказал Грэм. — Матросы не станут разорять домов. Анархия — это не то, что вы думаете. Это лучше, чем гетман.</p><p class="p1">Они спускались по узкой каменистой улочке. Пахло прелью от прошлогодних листьев, свежестью — от земли, морской солью и гнилью — от приближающегося моря.</p><p class="p1">— Знаете, Грэм, я, кажется, придумал конец истории с этими пятью. Но совсем не так, как у вас.</p><p class="p1">— Значит, хуже, — уверенно сказал Грэм.</p><p class="p1">— Возможно, возможно! Но мне кажется, что они все умерли. Просто в их жизни не было ничего лучшего, чем эти молодые поездки к морю, — вот они после смерти и полетели сюда. Но они еще не знают, что умерли, и ходят среди живущих, ни о чем не догадываясь. И встреча их, и посиделки в кофейнях, и разговоры, кто зачем прибыл, — все происходит после смерти. Что я здесь делаю? Может, меня действительно больше нет? Вот вы — живы?</p><p class="p1">— Нет, — сказал Грэм.</p><p class="p1">— То есть как — нет?!</p><p class="p1">— Нет, — повторил он. — У меня было лучше.</p><p class="p1">Ять расхохотался. Беллетрист был приятным спутником, особенно если подвигнуть его на одну из блестящих и темных импровизаций, смысл которых всегда ускользал, но детали были ослепительны.</p><p class="empty-line"/><p class="p1">Было уже темно, когда Ять с Грэмом вышли на последний, прямой участок засыпной дороги, ведущей к Гурзуфу. Идти оставалось не более часа. Дымка по-прежнему висела над горами, но над Аю-Дагом небо расчистилось: там, словно шары на ниточках, висели в густо-синем небе три крупные звезды. От божественной их чистоты и хрупкости на душе становилось еще более смутно, и с каждым шагом Ять ощущал нарастание тревоги: его не было тут сорок часов, За это время при нынешних темпах могло случиться что угодно… Он не боялся застать Таню униженной, оскорбленной, порабощенной, арестованной или, не дай Бог, пущенной по рукам. Ничего подобного, чувствовал он, с ней случиться не могло. Он ожидал другого — вдруг ее вовсе нет в городе? Вот это было вполне в ее характере — внезапное исчезновение, бегство с другим, необъяснимая блажь…</p><p class="p1">— Все-таки, — вдруг сказал Грэм, — я ее не люблю.</p><p class="p1">Ять остановился, пораженный совпадением его слов со своими тайными опасениями. Человек вроде Грэма вполне мог читать мысли.</p><p class="p1">— Кого не любите? — спросил он на всякий случай.</p><p class="p1">— Россию. Не понимаю, как можно любить страну, в которой все время нужно прятаться в складках, а не то бьют ногами. Не одни, так другие.</p><p class="p1">— Но что делать-то, Грэм? — Ять перевел дух. — Вообще ее выжечь, что ли?</p><p class="p1">— А зачем что-то делать, — буркнул Грэм. — Сделать вообще ничего нельзя, родился — так живи. А она ест и не давится, ест и не давится…</p><p class="p1">— Это тоже слишком легко, — покачал головой Ять. — Верно, но легко. Вот это меня и останавливает.</p><p class="p1">Внезапно заслышался приближающийся конский топот; земля задрожала. Грэм отпрыгнул с дороги и потянул Ятя за рукав в колючие кусты. Мимо них на малорослых, коротконогих татарских лошадях промчался отряд человек в тридцать — не оглянувшись на путников, они стремглав пронеслись мимо. Ять, однако, успел разглядеть халаты и островерхие шапки.</p><p class="p1">— Татары уходят из города, — все еще шепотом сказал он Грэму, когда они снова выбрались на дорогу, словно татары могли расслышать и вернуться.</p><p class="p1">— Может, анархисты пришли раньше нас? — предположил Грэм.</p><p class="p1">— Все может быть… Черт, я ноги стер… Но все равно — надо быстрее!</p><p class="p1">Первое, что они услышали на набережной, была ария Эскамильо в исполнении Маринелли. Его голос без труда покрывал полуверстное расстояние: до набережной было еще идти и идти, а Ять уже узнал любимый напев; правда, голос у Маринелли был тонковат для тореадора, но недостаток густоты покрывался избытком темперамента. Маринелли пел по-французски.</p><p class="p1">— Французы в городе, — шепнул Ять и улыбнулся. Отчего-то он сразу успокоился. Если пел Маринелли — все было в порядке.</p><p class="p1">Странная мысль пришла ему в голову, и он запомнил ее как лишнее подтверждение собственной же старой догадки: на самом деле мы все про себя знаем, но не все позволяем себе сказать. Ничто не предвещает разрыва, никогда любовь наша не была такой идиллической, — но две недели назад я входил в город с другой стороны… а теперь вхожу со стороны Ялты, словно совершив за эти две недели кругосветное путешествие. И опять набережная, и опять вечер, и наверняка она там — и ждет меня. И все хорошо, как никогда, — но все кончается… все кончается. Впрочем, пять минут спустя, когда он подошел к дукану Кавалеридзе, он не думал уже ни о чем подобном: Таня, непостижимым чутьем снова угадав его приближение, выбежала на крыльцо. В ее раскрасневшемся лице, раскрытом объятии, во всей стремительной и напряженной фигуре было ликование, она даже привстала на носки.</p><p class="p1">— Ять! Ять! Я знала! Свобода, свобода!</p><p class="p1">Никаких мыслей не осталось в его голове. Он бешено прижимал ее к себе и вдыхал родной запах волос. Грэм стоял чуть поодаль, улыбаясь умильно: он обожал наблюдать и описывать чужое счастье.</p><p class="p1">— Свобода! — вырвалась она. — Ты знаешь? Татар погнали!</p><p class="p1">— Кто погнал?</p><p class="p1">— Собственно, они сами себя погнали… но идем же, я все тебе расскажу!</p><p class="p1">В дукане, за дальним столом, сидел одинокий Зуев, закрыв лицо руками.</p><p class="empty-line"/><p class="p1">В отсутствие Ятя гурзуфская татарская республика стремительно прошла свой отмеренный судьбой, не слишком длинный путь. В первый же день в городе вспыхнул конфликт между церковной и светской властью, а поскольку базар обезлюдел и продать почти ничего не удалось — остро встал и вопрос о механизмах экономического выживания Гурзуфа; вдобавок внутритатарские разногласия по вопросу о государственном устройстве — республика или монархия — обострились в восьмом часу вечера: почти все непроданное вино было к тому времени выпито победителями, и в городской управе разгорелся многочасовой спор.</p><p class="p1">Вопрос о притязаниях духовной власти на единоличное управление Гурзуфом был решен немедленно: мулле Омару деликатно объяснили, что в Крыму всегда чтут аллаха, однако муллы не сеют и не пашут, а потому не могут досконально знать нужды простого народа. Истинной же причиной недоверия к церкви стало неодобрительное отношение консервативного муллы к употреблению спиртного. Мулла Омар, недовольно ворча, ушел выводить Маринелли на балкончик. Вопрос об отделении церкви от государства стал, таким образом, единственным, который успела решить крымско-татарская автономия.</p><p class="p1">Около девяти уже обозначился первый враг народа — грамотный татарин Ногай, зажиточный крестьянин из-под Алушты, считавший, что в совет, который будет управлять Гурзуфом, надо ради справедливости ввести хоть одного русского. Татарин Керим, пьяный в доску, в ответ заорал, что русские всех споят, — и Ногая, за подрыв национального духа, препроводили в бывший гурзуфский участок, где еще недавно сидел Ять. Следующий спор разгорелся из-за того, какой государственный строй следует установить в Гурзуфе: Керим настаивал на монархии, Селим — на республике с выборной властью; естественно, формулировалось все несколько иначе, поскольку слов «монархия» и «республика» никто из вожаков татарских отрядов не знал. Парадокс, однако, заключался в том, что республиканец Селим предлагал решить вопрос монархически, то есть послушаться его, Селима, — а монархист Керим требовал решения республиканского, то есть желал опросить присутствующих на предмет выявления большинства. Присутствующие имели свое мнение и предложили Кериму схватиться с Селимом; победил Селим, поскольку Керим не слишком твердо стоял на ногах. Сторонники монархии покинули зал заседаний и разлеглись на втором этаже.</p><p class="p1">Следующим обсуждался вопрос о захвате русских домов. Честный татарин Марат, в прошлом мясник, заявил, что грабежи во время установления правильного строя — это удел русских, а они, татары, всегда были известны своей честностью; Марата немного побили и легли спать. Утром, проснувшись с головной болью, наиболее авторитетные татары обнаружили, что ни один из главных вопросов государственного устройства не решен, а государственная деятельность сводится покуда к аресту Ногая. Ногаю отправили миску плова и бутыль домашнего вина, а сами приступили к решению главного вопроса — о письменности; Керим настаивал на русской грамоте, поскольку немного ее знал, Селим предлагал латиницу, поскольку собирался торговать с Европой, а Марат предложил писать по-арабски, так как рядом Турция и торговать в основном все равно придется с ней, а кроме того, так завещал пророк. Вопрос о письменности вызвал самые бурные споры — грамотных среди крымских татар почти не было, а потому собственное мнение об орфографии имел каждый. Все это время каждые три часа Маринелли добросовестно пел суры с балкончика. Русские с изумлением наблюдали за междоусобной дракой доселе кротких и мирных татар. В здании управы не осталось ни одного целого стекла, из комнат постоянно доносилось грозное «шайтан!», и к восьмому часу вечера старшины татарских отрядов заснули беспокойным сном лидеров национальной автономии.</p><p class="p1">В это самое время молодой рыбак Бурлак с товарищами подошли к управе, около которой несла стражу очередная смена русского караула, и быстро этот караул уложили внезапными и сильными ударами в живот (Бурлак для верности еще и оглушил каждого здоровым пинком по башке). После этого половина рыбаков поднялись на второй и третий этажи, где аккуратно повязали спящее руководство гурзуфской республики. Прочие рыбаки и способное к драке русское население под водительством Бурлака тихо двинулись в верхнюю часть Гурзуфа, где лепились к горе татарские жилища. На щекастом лице Бурлака играла детская улыбка. Погром был краток и убедителен: пришлые татары разбежались кто куда, а коренное население раскаялось и долго еще не понимало, что это на него нашло, финал гурзуфской национальной автономии был отмечен дружной попойкой на берегу. Связанные старейшины скрежетали на втором этаже управы. В карауле стояли темный, хищного вида бродяга и белокурый рыбак — те самые, которые несли стражу еще накануне. Этой службой им предложено было загладить коллаборационизм. За каждого из связанных они отвечали головами.</p><p class="p1">— Так-то, брат, — вздыхал белокурый.</p><p class="p1">— Рот закрой, — шипел темный.</p><p class="empty-line"/><p class="p1">Снов в эту ночь не было. Не было и близости. Ять устал: все ночи для любви и споров, а субботняя — Гипносу, богу твоему. Эллинизм в иудейской редакции. Он заснул, едва коснувшись головой подушки; Таня выстирала его белье и тоже легла.</p><p class="p1">— Здесь пора наводить порядок, — мрачно сказал дуканщик, когда в пятом часу утра в дукане остался один Зуев. — Торговли нэт, гостей нэт. Скоро сезон, никто не приедет. Как жить будем? Есть адын человек, который может навести порядок. Я его знаю, я его приведу.</p><p class="subtitle">24</p><p class="p1">Как и следовало ожидать, наведение порядка по плану Кавалеридзе началось с того, что пришли за Пастилаки.</p><p class="p1">Ять по обыкновению встречал утро в кофейне у грека. Было двадцать пятое марта, воздух уже потеплел, миндаль отцвел, зато распустились маленькие белые цветочки, очень душистые — грек называл их снежниками. Сам Пастилаки дремал на стуле, выставив его на солнышко. На нем была все та же лоскутная фуфайка, во рту торчала погасшая носогрейка, а Керим все так же играл сам с собою в нарды, словно и не было никакого татарского правления. Ять пил свой кофе, прихлебывал ледяную чистую воду, читал книжку из библиотеки Зуева и ждал, пока придет Таня: ей захотелось прибраться у Зуева в благодарность за прибежище, и Ять не возражал. Таня зашла за ним вместе с Маринелли, намеренным искупаться. «Я совершенно не чувствую холода, полнота имеет свои преимущества». Ять встал, захлопнул книжку, радостно потянулся и, кивнув дремлющему греку, посмотрел в светло-голубую, сияющую даль. Все было хрустально и обещало волшебный день.</p><p class="p1">Они отправились в сторону диких пляжей, туда, где на кончике мыса — белый на белесом — еле виднелся гурзуфский маяк.</p><p class="p1">Словно только того и дожидаясь, им навстречу по набережной в сторону кофейни вихляющей походкой — руки в карманы — двинулась давешняя парочка: темный бродяга, словно выдуманный Хламидой для раннего романтического рассказа, и его светловолосый спутник. Ять хорошо их запомнил — три дня назад они охраняли захваченную татарами управу. Темный нехорошо посмотрел на Таню. Разминулись. Ять с облегчением вздохнул. Между тем двое дошли до кофейни и приблизились к дремлющему Пастилаки.</p><p class="p1">— Э, Одиссей, — сказал один. — Пошли. Пастилаки проснулся.</p><p class="p1">— Ты чего? — воззрился он на гостей. — Пошли вон, я вчера вам наливал. Хватит. Пришедшие переглянулись и неприятно усмехнулись.</p><p class="p1">— Пойдем, пойдем, — сказал другой. Речь их как-то странно изменилась: у обоих появился явственный кавказский акцент.</p><p class="p1">— Да куда мне идти? — спросил грек, и татарин Керим, оторвавшись от нард, уловил в его голосе панические нотки. Это было уже странно — двое бродяг вряд ли могли всерьез испугать толстого Пастилаки.</p><p class="p1">— Куда надо пошли, — сказал первый. — Сам знаешь.</p><p class="p1">— Не пойду никуда! — взвизгнул Пастилаки, но двое подхватили его под руки и бесцеремонно потащили вверх по дороге в город. Он тут же обмяк у них в руках и перестал сопротивляться, словно поняв, что раз тащат — значит, имеют право, протестовать бесполезно.</p><p class="p1">— Кому платить? — спросил Керим в крайнем недоумении.</p><p class="empty-line"/><p class="p1">Грузин неопределенного возраста Акакий Могришвили, до того сторож и фактически единственный хозяин покинутого имения Кавкасидзе, а ныне столь же единоличный правитель Гурзуфа, вошел в город ранним утром, по традиции правителей последнего месяца. Идти ему было недалеко — сторожка находилась у самого въезда в Гурзуф. В этой сторожке он обычно и сидел целыми днями, курил самосад, покашливал да смотрел сквозь кипарисы на море, синевшее внизу. Выражение, с каким он смотрел на все это, определить было сложно: он словно одобрял незыблемый порядок вещей, однако знал и иной, более совершенный порядок. Все можно устроить правильнее, но его пока никто не спросил.</p><p class="empty-line"/><p class="p1">О том, что Могришвили получил власть, в городе узнали мгновенно. Как ни странно, все были давно готовы именно к такому развитию событий. Сами понимаете, когда в городе давно нет порядка, обязан найтись кто-то, кто возьмет на себя ответственность. Так ли уж важно, что доселе он был сторожем в имении? В конце концов, имение по размеру превосходит весь Гурзуф. Как знать, может быть, при нем мы действительно заживем наконец как люди… Такие или подобные разговоры шли на базаре с утра. Общее настроение одним словом определить трудно: в нем деятельная бодрость сочеталась с расслабленной вялостью. Что-то вроде: «Итак, мы наконец выходим в решительный бой — но не столько мы идем, сколько нас идут, а потому оставьте усилия».</p><p class="p1">Могришвили был прагматик в высшем смысле слова — из тех, которые даже не знают, что такое прагматик; и это в самом деле совершенно не обязательно. Мало того: Могришвили был садовник, а это решает все. Из всех правителей Гурзуфа он был единственный, кто обладал народным, природным инстинктом власти — умел, когда нужно, подчиниться обстоятельствам, а когда можно — подчинить их себе. Есть вещи, которых не имитируешь, — они чувствуются; у народа и Могришвили было, если можно так выразиться, чутье друг на друга.</p><p class="p1">Как всякий истинный садовник, Могришвили знал, что программа действий не нужна и даже вредна — другие выдумают ее за тебя, прослеживая извилистый ход твоих интуитивно угадываемых действий, а в крайнем случае, изобретут задним числом в поисках оправдания для самих себя. Такое было время, — а какое было время, они выдумают, когда им надо будет оправдаться. Обо всем этом Могришвили много говорил с деревьями, населявшими его парк; он привык выступать перед ними с краткими успокоительными речами, когда обрезал или рубил. Говорить с деревом надо так, чтобы оно понимало, а понимает оно повторы, ибо привыкло к смене зимы и лета, зимы и лета — и так каждый год. Никого не надо поощрять к труду — это инстинкт труженика; так и дерево не надо поощрять к росту, ибо у дерева есть инстинкт роста. Надо только внушить дереву, что если оно принесет плоды и даст новые ветки — его не срубят, обрежут сушняк, удобрят и дадут тем самым веру в то, что оно трудилось не зря. Дороже всего в мире заведенный порядок — стоит завести его, как все начинает крутиться само собой.</p><p class="p1">Он вошел в загаженную управу и быстро объяснил страже, охранявшей управу, кого ей теперь нужно слушаться, — и они не возразили, как не возражали ему юные кипарисы, когда он садовыми ножницами придавал им благородную круглую форму. Он не стал говорить речи с балкона, а просто предупредил знакомых, чтобы те предупредили знакомых, а те — своих знакомых: все будет теперь правильно, то есть как по-старому, но лучше, чем по-старому. Чтобы сад рос, много усилий не надо — нужно не мешать естественному порядку вещей и мешать противоестественному; так я говорю?</p><p class="p1">Они сказали: так.</p><p class="p1">Он велел прислать к себе старшину рыбаков. Нельзя, чтобы у рыбаков не было старшины. Быть может, они еще не знали об этом, но теперь, когда он приказал позвать старшину, его немедленно выберут — хотя бы от страха; а тот, кого выбирают от страха, и есть самый законный старшина. В каждой оливковой роще, в каждой кипарисовой аллее Могришвили безошибочно выбирал главное дерево и, объясняя свои действия, обращался главным образом к нему. Наибольшим авторитетом среди рыбаков пользовался молодой Бурлак, победитель татар. Бурлак пришел к Могришвили. Молодой, это хорошо. Но он считал себя очень сильным, нехорошо. Могришвили объяснил Бурлаку, что теперь опять надо ловить рыбу, а больше ничего не надо. Платить четверть от выручки надо ему, Могришвили, потому что его люди стерегут базар. Раньше так не было — но раньше и порядка на базаре не было. Теперь на базаре будет чистота, он позаботится. Выстроят новые ряды, об этом он тоже позаботится. За все это надо платить, а кто не будет платить — не будет торговать на базаре. Другого базара не будет. Это говорит он, Могришвили, и говорит по-доброму, дружески. Есть закон, а как без закона — мы все уже видели. Ты понял меня, рыбак? Иди, рыбак.</p><p class="p1">Он не против, чтобы на базаре торговали татары. Но татары уже устроили один беспорядок, и городу не нужен другой беспорядок. Пусть татары платят городу треть, а не четверть, потому что их надо защищать от гнева русских. Русские делают вид, что простили бунт, но они ничего не забывают. И если татары хотят торговать на этом базаре, пусть платят треть. А другого базара не будет. Ты понял меня, татарин? Иди, татарин. И запомни: если ты хочешь говорить по-татарски — ищи другой город. Я грузин, но смотри — я говорю по-русски. Ведь ты понимаешь, когда я говорю? Я тоже хочу понимать, когда говоришь ты. Я так уважаю тебя, что хочу понимать все, что ты говоришь. Иди, татарин, и скажи татарам: скажи по-татарски, в последний раз.</p><p class="p1">В городе есть дома, которые занимают люди, ничего не сделавшие для города. Может быть, это хорошие люди, но нет закона, чтобы хорошие люди жили в хороших домах. Есть закон, чтобы в хороших домах жили полезные люди. Иногда хорошее дерево растет не на своем месте: в дубовой аллее не должен расти кипарис. Кипарис должен расти в кипарисовой аллее, верно я говорю, историк? Зачем тебе двухэтажный дом, тебе не нужен двухэтажный дом. Ты понял меня, историк? Дуканщик Кавалеридзе кормит мясом весь город, и ему нужнее двухэтажный дом. Он имеет дочь. Иди, историк.</p><p class="p1">— У меня гости, — робко сказал Зуев.</p><p class="p1">— Нам не нужны гости, — спокойно сказал Могришвили. — У нас самих не так много пищи. Иди, историк, и скажи, чтобы твои гости ехали туда, где их дом. Я даю им время до завтра, но завтра хочу, чтобы было, как я сказал.</p><p class="p1">И еще Могришвили мечтал об опере. Он всю жизнь мечтал об опере, потому что знал, что в настоящем городе должна быть опера, и еще потому, что музыка благородно действует на деревья. Они меньше раскидываются, растут стройней — словно дисциплина, которой подчиняются звуки, волшебным образом распространяется и на ветки. Люди должны слышать благородную музыку, а не грубые песни. В Тифлисе Могришвили однажды был в опере. В опере все сидят чинно, одетые по-праздничному. Гурзуфцам нечего шататься по вечерам — они должны сидеть в дукане у друга Кавалеридзе и потом идти в оперу, а впоследствии он совместит дукан с оперой, чтобы люди могли слушать музыку и кушать в перерыве. Опера делает жизнь красивой и благородной, в опере любят красиво и убивают красиво. Я слышал, что у татар был певец. Пускай позовут певца.</p><p class="empty-line"/><p class="p1">Маринелли нашли на пляже. Он стоял у воды в полосатом купальном костюме чудовищного размера — Ять и не предполагал, что такие бывают; впрочем, тело итальянца отнюдь не производило впечатления рыхлости. Он был толст, но мускулист, и Таня невольно залюбовалась им.</p><p class="p1">— Я мечтаю искупаться с тех пор, как сюда приехал! — торжествующе объяснял он по-английски. — С этими вечными сменами власти никогда не дадут выкупаться! Я понимаю теперь, почему у русских есть настоящие певцы, но нет настоящих пловцов: певцов воспитывает каждая власть, а поплавать некогда. Но ничего, теперь я вам всем покажу, как плавает итальянец. Вода, конечно, не та, что в Неаполе, — о, mare Tirrena, мое лиловое счастье! Но я и в Неаполе купался во всякую погоду, и холод меня не остановит. Отойдите, я разбегусь…</p><p class="p1">Однако разбежаться он не успел. Решительно ему не судьба была купаться в этот сезон, по крайней мере в Гурзуфе.</p><p class="p1">— Слышь, пошли, — сказал темный, спускаясь на пляж. — Ты, питерский! Усатый! Объясни ему.</p><p class="p1">— Что-то ты раскомандовался, — миролюбиво ответил Ять.</p><p class="p1">— Слышь! — крикнул темный. — Рассуждаешь много! Оторвись от бабы своей и валяй толмачь!</p><p class="p1">— Чего они хотят? — спросил насторожившийся Маринелли.</p><p class="p1">— В морду они хотят, — ответил Ять и без особенных колебаний ударил темного в глаз. Он не любил драк, но был предел и его терпению. Кое-чему он в молодости учился. Темный полетел на гальку, но сзади на Ятя наскочил белокурый и с силой выкрутил ему левую руку. Ять согнулся, крякнул, попытался лягнуть его ногой по колену — не вышло; тут поднялся и темный, подбежал к Ятю и врезал ему по носу. Ять рванулся, вырвался — не тут-то было: оба уже крепко держали его. Таня набросилась на них с кулачками, темный хотел отпихнуть ее, но сдержался.</p><p class="p1">— Слышь, ты не ссорься с нами, — сквозь зубы проговорил он. — Не то хуже будет. Власть теперь наша, понял? Толмачь кучерявому, и пошли.</p><p class="p1">— Они требуют, чтобы вы пошли с ними, — задыхаясь, перевел Ять.</p><p class="p1">— Пусть дадут мне одеться, — пожал плечами Маринелли. Он старался держаться невозмутимо, но крупно дрожал и явно перепугался не на шутку.</p><p class="p1">Поразительна была скорость, с которой черный и белый признали новую власть своей, хотя она и обременила их множеством дополнительных обязанностей; вероятно, дело было в том, что она была своей по духу, — а еще вероятней, в том, что наряду с обязанностями снабдила их небывалыми полномочиями. Маринелли надел штаны и красную рубаху, в которой щеголял с утра. Таня стояла поодаль, сжимая и разжимая кулаки.</p><p class="p1">— Отпустят их, отпустят, — жалостливо, несколько по-бабьи утешал ее белокурый, оборачиваясь. Все это время он не выпускал запястий Ятя; хватка была железная. — Я твоему и давеча говорил: глядишь, и отпустили.</p><p class="p1">— К управе топай, — сквозь зубы сказал Ятю темный. — Лишний раз шевельнешься — убьем, время не прежнее.</p><p class="p1">Это Ять и сам понимал.</p><p class="empty-line"/><p class="p1">— Почему двое? — равнодушно спросил Могришвили.</p><p class="p1">— Пересказывает он ему, — пояснил белокурый.</p><p class="p1">— Противился, сука, — сплюнул темный.</p><p class="p1">— Это ничего, что противился, — все так же спокойно сказал Могришвили, взглянув на заплывающий глаз босяка. — Если ты стража, тебе всегда противятся, если ты хорошая стража — возьмешь верх. Если ты плохая стража — будет новая стража. Хорошо, что ты пришел, — кивнул он Ятю, как будто тот пришел сам. Ятя поразила надменная царственность его скупых жестов. — Я объявил городу и теперь объявляю тебе, что нам не надо гостей. Сейчас не такое время, чтобы принимать гостей. Будет курортный сезон, мы подготовимся и тогда примем гостей. — Его речь с ритмическими повторами гипнотизировала, как суры Корана, но в ней не было той пронзительной, пустынной тоски, искупавшей многое. — С тобой девушка, забери девушку. А ты, — обратился он к Маринелли, — будешь петь в опере. Мы построим оперу, и ты будешь петь в нашей опере.</p><p class="p1">— Он требует, чтобы мы с Таней уехали, а вас заставит петь в опере, — перевел Ять.</p><p class="p1">— Все заставляют меня петь! — взорвался Маринелли. — Скажите ему, чтобы он пошел к черту! Я сорвал себе голос на этих сурах и не намерен больше выступать бесплатно! Я еду с вами! Я уезжаю на родину! Мы вместе едем в Ялту, находим корабль и сматываемся отсюда к чертовой матери! Не может быть, чтобы при анархистах в Ялту перестали заходить иностранные корабли!</p><p class="p1">— Хорошо кричишь, — невозмутимо сказал Могришвили. — Сильно кричишь. Я хочу послушать теперь, как ты поешь.</p><p class="p1">— Он просит, чтобы вы спели сейчас, — перевел Ять.</p><p class="p1">— Скажите ему, чтобы он пошел к черту, — заорал певец.</p><p class="p1">— Так и сказать? — уточнил Ять.</p><p class="p1">— Черт, черт, черт! Черт понес меня в эту страну! Чего доброго, они начнут меня бить. Этот хуже татар, я его насквозь вижу… Что я должен петь? Кто он такой?</p><p class="p1">— Грузин, судя по акценту. Житель Кавказских гор.</p><p class="p1">— Что такое «грузин»? Я не знаю кавказского репертуара!</p><p class="p1">— Пойте что хотите. Могришвили спокойно слушал их перебранку.</p><p class="p1">— Хорошо кричишь, — одобрительно приговаривал он, — громко кричишь. Можно сделать так, что будешь совсем громко кричать.</p><p class="p1">— Что любят грузины? — быстро спросил Маринелли.</p><p class="p1">— Женщин, — не очень уверенно ответил Ять.</p><p class="p1">— Женщин любят все! Что еще?</p><p class="p1">— Вино.</p><p class="p1">— Вино, вино… Черт с ним, я спою ему про вино!</p><p class="p1">Маринелли встал в позу, и управа огласилась звуками застольной из «Травиаты» в оригинале. Ни о чем не подозревавший Грэм, который с утра ушел бродить по городу и сейчас добрел до базара, задрал голову и прислушался. Он обожал эту музыку. Под такую музыку должен был прибывать в город флот триумфаторов, на головном корабле — оркестр; оркестр на море — это следовало обдумать.</p><p class="p1">— Хорошо поешь, — кивнул Могришвили. — Но в одном месте не так: тата-а-а-та, тата-а-ата!</p><p class="p1">Он пел фальшиво, негромким дребезжащим голосом. Он слишком долго вполголоса пел деревьям, боясь, как бы его не услышал кто-нибудь из Кавкасидзе и не поднял на смех.</p><p class="p1">— Повтори! — кивнул Могришвили.</p><p class="p1">— Спойте за ним, — перевел Ять.</p><p class="p1">— Но он фальшивит!</p><p class="p1">— Слышу!</p><p class="p1">— Что мне делать?</p><p class="p1">— Спойте, как надо. Может, не заметит. Маринелли повторил первую фразу арии.</p><p class="p1">— Хорошо поешь, — кивнул Могришвили. — Но надо не так. Ми люди не гордые, ми повторим. — акцент его от раздражения усилился, лицо слегка побледнело, но больше он ничем себя не выдал. — Та-та-а-а-та, тата-а-а-та! Слышишь, нет? Макарони любишь? Макарони ти любишь?!</p><p class="p1">— Он спрашивает, любите ли вы макароны, — тревожно перевел Ять.</p><p class="p1">— Скажите, чтобы он поцеловал меня в задницу! — заорал Маринелли и тут же точно скопировал фальшивое пение Могришвили.</p><p class="p1">— Во-от, — удовлетворенно сказал диктатор. — Теперь вижу, что не только макарони любишь, но и музыку любишь. У нас будет опера, настоящая опера. Но ты поешь грубо, ты поешь низко. В настоящей опере должен быть кастрат, и у нас будет кастрат.</p><p class="p1">— Wha-at?! — взвился Маринелли, узнав слово, примерно одинаково звучащее на всех европейских языках. — What the hell is he saying?!</p><p class="p1">— Вероятно, — Ять едва сдерживал неудержимое и вовсе неуместное желание расхохотаться, — вероятно, он перепутал вашу фамилию. Помните, был некто Фаринелли?!</p><p class="p1">— Откуда этот кретин знает мою фамилию?! Прекратите ржать, разрази вас гром!</p><p class="p1">— О Господи, простите меня, Маринелли. Он не знает вашей фамилии. Он просто слышал, что в опере поют кастраты.</p><p class="p1">— Да черт вас всех подери! Почему каждая революция в этом городе начинает с того, что бритвой тянется к моим гениталиям?!</p><p class="p1">— Это не революция, — пояснил Ять. — Это контрреволюция. Она всегда начинает с этого.</p><p class="p1">Он до сих пор не верил, что все происходит всерьез.</p><p class="p1">— Скажите ему, что я иностранный подданный! — фальцетом закричал Маринелли.</p><p class="p1">— Он итальянец, — пояснил Ять диктатору и страже.</p><p class="p1">— Я вижу, — кивнул Могришвили. — Итальянцы хороший народ, макарони любят. Если Италия захочет повоевать, мы повоюем с Италией. Ять перевел.</p><p class="p1">— Может быть, ему надо денег? — тоскливо спросил Маринелли.</p><p class="p1">— Боюсь, такое предложение только ухудшит наши дела.</p><p class="p1">— Ну, хватит, — сказал Могришвили. — Я послушал, как ты говоришь. Ты хорошо говоришь. Этого в участок, — кивнул он на Маринелли, — а ты останься.</p><p class="p1">— Но за что его в участок?! — не выдержал Ять. — Что он вам сделал? Вы просили спеть, он спел…</p><p class="p1">— Хорошо спрашиваешь, — кивнул Могришвили, — но тут ми спрашиваем. Ми! — неожиданно взвизгнул он. — Завтра вечером он будет петь на базаре, — добавил диктатор после паузы, демонстрируя подданным недюжинное владение собой. — Чтобы никуда не делся, будет сидеть в участке, репетировать. А ты садись, с тобой разговор будет…</p><p class="p1">Ять опустился в кресло, в которое так недавно его судорожно-величественным жестом усаживал Свинецкий. Все повторялось — не было только стражи. Ну ничего, сейчас поговорим, и, может быть, все окажется ерундой. Он добродушный малый, наверняка все это шутки. Всегда можно договориться.</p><p class="p1">— Теперь слушай, что я скажу, — спокойно сказал диктатор, останавливаясь прямо перед ним. — Знаешь, кто я?</p><p class="p1">— Нет, — честно ответил Ять.</p><p class="p1">— Я Акакий Могришвили, садовник. Был садовник там, — он показал куда-то себе за плечо, — теперь садовник тут. Ты хорошо слышишь?</p><p class="p1">— Да.</p><p class="p1">— Встать! Ять встал.</p><p class="p1">— Сесть, — спокойно сказал диктатор. Ять исполнил и это.</p><p class="p1">— Встать. Сесть. Встать. Вот так, — удовлетворенно сказал Могришвили. — Хорошо стоишь, теперь сесть. Слушай еще, что скажу. Он сделал паузу.</p><p class="p1">— Какое твое занятие?</p><p class="p1">Ять понял, что назвать себя журналистом — значит подписать себе приговор. Не исключено, что новый хозяин города захочет издавать в Гурзуфе газету.</p><p class="p1">— Я филолог, — ответил он.</p><p class="p1">— Встать, — невозмутимо приказал Могришвили. — По-русски скажи.</p><p class="p1">— Специалист по языку.</p><p class="p1">— Зачем специалист по языку, когда каждый знает язык? Ты всю жизнь чужой хлеб кушал, теперь понимаешь? Что ты еще можешь?</p><p class="p1">Могу удавить тебя, подумал Ять. Но тут же понял: не может. Эти желто-зеленые глаза парализовали его.</p><p class="p1">— Могу переводить, — глухо сказал он.</p><p class="p1">— Нам не надо переводить. Пусть они наш язык учат, правильно? — дружелюбно спросил Могришвили. — Русский язык — красивый язык, богатый язык. Сейчас скажи мне: правда, что в России отменили грамоту? (Об этом Могришвили услышал, когда в январе ездил в Ялту.)</p><p class="p1">— Правда.</p><p class="p1">— Хорошо, — кивнул Могришвили. — Вот бумага, пиши. — Он придвинул к Ятю чернильницу. — Пиши разборчиво, печатно и так, как я говорю. Дикрет номер адын. Дик-рет, ти слышишь? Номер адын. С э-та-ва дня — сегодня какой дэнь?</p><p class="p1">— Двадцать пятое, — еще тише ответил Ять.</p><p class="p1">— С э-та-ва дня, двадцать пятое цифрой, каждый пишит, как слышит. Это а-би-за-тэл-на. Записал? Хорошо пишешь быстро пишешь. Но не так пишешь! — Могришвили выхватил у Ятя листок. — Это какая буква?</p><p class="p1">— Мягкий знак.</p><p class="p1">— Какой звук он делает?</p><p class="p1">— Он не делает звука, — объяснил Ять. — Он смягчает согласные.</p><p class="p1">— Согласные и так согласны, зачем их смягчать? — Невозможно было понять, шутит Могришвили или говорит серьезно. — Нам не нужны мягкие согласные, нам нужны твердые согласные. Какая это буква? Вот эта, в начале слова.</p><p class="p1">Его желтый, очень твердый ноготь упирался в слово «Обязательно».</p><p class="p1">— «О», — сказал Ять.</p><p class="p1">— Зачем «о»? Ты говоришь, ты знаешь язык. Как ты знаешь язык, если «о» и «а» не различаешь? А-би-за-тэл-на.</p><p class="p1">— Но вы сказали — писать, как слышу, — возразил Ять.</p><p class="p1">— Ты ТАК слышишь? О-бя-за-тел — мягкий знак — но? Нэт, ты слышишь а-би-за-тэл-на!</p><p class="p1">— Так слышите вы, — упрямо ответил Ять, чувствуя, что есть предел и его унижению — дальше он попросту не сможет о самом себе думать без отвращения. — Но откуда вам знать, как слышу я?</p><p class="p1">— Все будут слышать, как слышу я, — ровным голосом сказал Могришвили. — Потом словарь сдэлаим. На еще листок. Пиши: Дикрет номер адын. Дальше должен помнить. Дата, подпись. Подпись будет моя. Теперь ступай. И завтра тебя нэт. В девять проверю. Историку сказки — сам приду.</p><p class="p1">Ять вышел пошатываясь. Могришвили любовно посмотрел на декрет — первый документ гурзуфской государственности, с которого начнется отсчет новой эры. Но с введением нового летосчисления он решил подождать. Не нужно слишком много реформ сразу.</p><p class="p1">Вернулась стража, отводившая Маринелли в участок.</p><p class="p1">— Ты наберешь охрану к управе, — сказал Могришвили темному, безошибочно почувствовав, кто из двоих главный. — Будешь начальник этой охраны. Ты пойдешь со мной, — обратился он к белокурому. — Я пойду осматривать парк, ты будешь охранять меня в парке. Да, и вот еще что, носатый. — Он шутливо, но больно ухватил темного за хищный клюв. — На базаре повесишь вот это. Хватит им писать безграмотно, пусть пишут грамотно.</p><p class="p1">Он вручил темному декрет и вышел в сопровождении белокурого охранника, страшно гордого новой ролью личного стража.</p><p class="empty-line"/><p class="p1">Против воли Ять все ускорял и ускорял шаг, так что вниз, к дому Зуева, летел пулей. Отчего-то ему казалось, что стоит вернуться туда, на второй этаж, к которому он так привык и где был так счастлив, и все станет по-прежнему: он снова будет тот, утренний, счастливый Ять, никем еще не униженный, не предавший несчастного Маринелли (ведь это явное предательство — то, что он дал его увести), не исполнявший дурацкой гимнастики перед садовником — сесть-встать, сесть-встать, — там, в доме, безопасность и покой; и, может быть, перед лицом Тани развеются, как всегда, все химеры. Дом был пуст. Ни Тани, ни историка нигде не было. Взять не могли, нет, взять не могли — ведь убираться сказали ему с Таней, а к Зуеву диктатор назавтра собирается с визитом — не иначе диктовать «дикрет номер два», о том, что предки гурзуфцев альмеки были грузинами… Хлопнула входная дверь.</p><p class="p1">— Ять, ты здесь?! — кричала Таня. — Охрана мне сказала, что ты здесь!</p><p class="p1">— Ты была там? — в отчаянии крикнул Ять.</p><p class="p1">— Да, конечно! Я не могла больше ждать. Они сказали, что тебя выпустили. Что они там с тобой делали? Где Маринелли?!</p><p class="p1">— Со мной не делали ничего. (Он скорее оторвал бы себе голову, чем рассказал ей о гимнастике и декрете.) Он продиктовал мне идиотский декрет о том, чтобы все писали, как слышит он. У него нет другой заботы, кроме грамоты. Маринелли увели и хотят сделать оперным певцом, но сначала обещают кастрировать. Думаю, угроза пустая, но чем черт не шутит.</p><p class="p1">Снова хлопнула дверь, и на второй этаж взлетел Зуев. Ять никогда не видел его таким: смуглое лицо стало зеленым, пенсне болталось на нитке.</p><p class="p1">— Вы здесь? Вы уже знаете?</p><p class="p1">— Смотря что, — отозвался Ять.</p><p class="p1">— Меня выгоняют из дома!</p><p class="p1">— Только этого не хватало. — Ять окончательно уверился, что спит. — Когда он столько успел?</p><p class="p1">— За мной пришли с утра… эти двое ублюдков… Он сказал, что теперь здесь будет жить дуканщик.</p><p class="p1">— А Маринелли арестован, — сказала Таня.</p><p class="p1">— Да черт с ним, с вашим Маринелли! Я прожил в этом доме полжизни, куда мне теперь деваться?! Здесь библиотека, архивы, рукописи… здесь всё!</p><p class="p1">— Может, можно как-то скинуть этого урода? Кто он вообще такой?</p><p class="p1">— Он местный садовник, — махнул рукой Зуев. — Никто не обращал на него внимания. Я всегда думал, что он сумасшедший. Ходил по саду, разговаривал сам с собой…</p><p class="p1">— Неужели в Гурзуфе не осталось нормальных людей?</p><p class="p1">— Откуда?! Их тут никогда не было много… Историческое общество частью разъехалось, частью запугано… Муравлев не пустил меня на порог, Самохвалов на рынке отвернулся, как от зачумленного… Откуда все так быстро становится известно?</p><p class="p1">— Знаете, — раздумчиво проговорил Ять. — Я был у него сегодня и знаю, что, если еще раз его послушаюсь, — дальше жить не смогу. Мне дышать будет стыдно. Вы не должны завтра уходить из дома.</p><p class="p1">— А что мне делать?</p><p class="p1">— Мы запремся тут. Таня, конечно, уйдет. Мы ее отправим в Ялту за подмогой.</p><p class="p1">Таня, все это время сидевшая на плетеном стуле молча, с низко опущенной головой и холодными руками, зажатыми между колен, — вскочила и топнула ногой:</p><p class="p1">— Я никуда не уеду! Как ты смеешь отправлять куда-то меня одну?</p><p class="p1">— Ну, не сидеть же тебе в осажденном доме…</p><p class="p1">— Идиот! Я никогда еще не сидела в осажденном доме! Мы же договорились попробовать всё!</p><p class="p1">— Таня, это не шутки! — крикнул Ять. — Шутки кончились!</p><p class="p1">— Шутки только начинаются. — Она тряхнула головой, внезапно развеселившись. — Что у нас есть, кроме ружья?</p><p class="p1">— Ружье есть у Самохвалова, — тихо сказал Зуев. — Ружье он, конечно, даст, но может и донести. Я его знаю, гниловат…</p><p class="p1">— А сколько человек сможет мобилизовать садовник?</p><p class="p1">— Сколько угодно, — пожал плечами Зуев. — Если он прикажет громить дачи… или грабить дома, что поприличнее… или откроет Голицынские склады…</p><p class="p1">— Кстати! Почему их не разграбили до сих пор?</p><p class="p1">— Это последнее табу, — покачал головой Зуев. — Не забывайте, гурзуфцы — потомки альмеков. Есть запреты, через которые и они не могут переступить. Но если этот заставит… тогда последние табу полетят к черту. В городе восемьдесят лет не было ни одного убийства! — Он вскочил со стула и бешено заметался по комнатке.</p><p class="p1">— Главное — первым выстрелом положить его, — твердо сказал Ять. — Без него толпа немедленно отрезвеет.</p><p class="p1">— Да? — скривился Зуев. — Вы хотите, чтобы толпу повели на штурм эти бандиты — черный с белым?</p><p class="p1">Ять замолчал. В словах историка был резон. Неожиданно снизу, с улицы, донеслась «Марсельеза», исполняемая на языке оригинала.</p><p class="p1">— Что это?! — встрепенулся Зуев.</p><p class="p1">— Это Маринелли. Ах, черт! Что же можно для него сделать, пока эти не пошли нас штурмовать?</p><p class="p1">— Передайте ему вина! — воскликнула Таня. — Я сейчас же куплю на базаре.</p><p class="p1">— Но, может, попытаемся насчет побега? — предложил Ять. — Как-то подговорить… стойте, я сейчас.</p></span>
