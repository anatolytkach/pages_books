<p class="p">Глава пятая</p>
</div><p class="subtitle">1</p><p class="p1">Дом 25 по улице Красных Зорь, где гнездился Райский — а может, и Адский, как повернется, — был вино-красен, как и сами зори. Остромов любил этот цвет, цвет удачи, червонной масти. Лестница была узкая, давно не мытая, дверь четырнадцатой квартиры — строгая, черная, с четырьмя шурупными дырками по краям отвинченной таблички. Верно, жил тут кто-нибудь из профессуры, собирал друзей, они расчесывали бороды, шумно раздевались, носы у них слезились с морозу, они обсуждали последние новости и выслушивали рассуждения друг друга, после чего деликатно, но язвительно спорили, и опять влезали в шубы, и ехали домой по темному Каменноостровскому, на котором не было тогда никаких Красных Зорь, и даже тогда, ночью, под мягкий стук копыт по свежевыпавшему снегу, не приходило им в голову — разве самым умным, — что скоро их споры не будут иметь никакого смысла, как и все местные споры за последнюю тысячу лет; что прислушиваться надо теперь не к возражению другого профессора, а к лепету младенца, голосу глины, к этому вот мягкому перестуку, хотя для нового времени и он будет слишком размерен. Табличку свинтят, а внутри будет располагаться товарищ Райский, и то не постоянно, а в приемные часы.</p><p class="p1">Остромов мало чего на свете боялся, но квартира 14 его испугала — полным отсутствием внешних признаков, по которым можно было гадать о бывшем или нынешнем хозяине. Тут не жили, и более того — не работали: тут присматривались, и вся обстановка была такова, чтобы не мешала рассмотреть гостя. В прихожей не было плащей, пиджаков, обои были везде одинаковы — идеально ровны, светлы, безлики. Окна были вымыты, прозрачны и пусты, звуки улицы странно глохли, словно опасаясь попадать в это стерильное пространство. Мебель словно казенная, под белыми чехлами. Похоже было, что тут оперировали, но операция предполагалась, как бы выразиться, не физиологического свойства. Тут что-то такое вынимали из людей, после чего они становились достойными сотрудничества с товарищем Райским. Вот и в райской операционной будет так же стерильно. Еще и день-то какой — серенький, неопределенный, когда все могло повернуться так, а могло этак, — и у Остромова, полагавшегося обычно на импровизацию, заготовлены были варианты.</p><p class="p1">Отворил мальчик в костюме — тут уж не френч; Остромов пригляделся, но и возраста внятно определить не смог. Двадцать? Двадцать пять? Волосенки прилизанные, носик вострый. Явно не товарищ Райский. Товарищ дружелюбно вышел из недр квартиры: а, так вот наш знаток. Но и по знатоку ничего нельзя было сказать наверняка. Жители Одессы жовиальны, остроумны, поверхностны, легко схватывают, быстро забывают. Есть среди них глубокие знатоки, но глубокое знание требует сосредоточенности, а откуда она возьмется в южанине, в масленых его глазках, пухлых губках? Пристрелить кого-нибудь — милое дело, а глубоко задуматься — некогда. Остромов решил действовать по первому плану и сделал шейный знак.</p><p class="p1">Это была ошибка, но лучше ошибиться раньше, чтобы вовремя включить второй план.</p><p class="p1">— Этого мы, виноват, не держим, — широко улыбнулся Райский, душа-человек.</p><p class="p1">— Кстати, знаете историю этого знака? — непринужденно спросил Остромов. — Курфюрст Саксонский наградил Петра Великого орденом Белого Орла с шейным знаком, и нескольких солдат также — за отличие при Полтаве. Указом Петра все, кто с ним отличился против шведов, получали право бесплатного угощенья в кабаках, отсюда и щелчок по шее в знак кавалерства. Я же делаю вам не этот знак, но масонское приветствие посвященного, означающее, что скорее дам перерезать себе горло, нежели предам.</p><p class="p1">— Очень любопытно, — оживленно сказал Райский, указывая Остромову на белый диван близ кафельной голландской печи. — Прошу присесть, товарищ.</p><p class="p1">— Вам товарищ Осипов рассказал о моем вопросе? — спросил Остромов, все еще колеблясь, какой тон принять, и оставаясь в рамках прохладной нейтральности.</p><p class="p1">— Он рассказал, да, — Райский сел за стол, чем сразу поставил себя в положение начальственное. — Если я правильно понял, вам желательно нечто вроде легальной ложи?</p><p class="p1">Остромов вглядывался в него и стремительно соображал. Ясно было, что Райский не знает ничего, — неясно было другое: хочет ли знать. Огранов тоже был, что называется, дум-дум-цеппелин, но по загоревшимся его глазам Остромов немедленно понял, что масонская ложа ему интересней любого осведомительства, что ему хочется игры, подполья, авантюры, а страха перед бывшими он не чувствует никакого. Огранов был человек не без полета. Они не для того брали власть, чтоб подслушивать шепотки и читать доносы: им хотелось быть вместо, хотелось делать то же, что делали бывшие, и если у бывших были свои игры в Египет и тамплиеров, этим теперь тоже было завлекательно. И если товарищ Райский хоть немного соответствует фамилии, ему надо дать игру, а не грубую простоту; но что, если мстительность в нем сильней любопытства? Остромов скомбинировал в уме скудость обстановки, серость дня, матовую белизну безликого петербургского неба; если бы ему сейчас раскинуть карты! Но прочь проклятую неуверенность, и он, солидно помедлив, сказал:</p><p class="p1">— Видите ли, я с вами буду прям. Дело совершенно ясное. Есть люди, себя, так сказать, не находящие в новой действительности. Я бы полагал гуманным и правильным — и совершенно в духе основополагающих учений — давать каждому члену общества то, что он может взять. Рассудите: не станете же вы ставить пролетарию, допустим, Брамса? Он должен вначале послушать более простое, чтобы, так сказать, духовно возрасти постепенно. Но если пролетарий должен получать то, что интересно ему, если он, так сказать, трудом и страданиями заслужил Брамса, то нельзя же отрицать и право старой интеллигенции на свой духовный кусок?</p><p class="p1">— Никто и не отрицает, — шире прежнего улыбнулся Райский. — Мы даже, видите, оперу ставим.</p><p class="p1">— Это верно, — сказал Остромов. — Это совершенно верно.</p><p class="p1">Он никак не мог нащупать верный тон и злился на себя за это. Видно было, что Райский страшно самовлюблен, но чем польстить ему — он пока не знал.</p><p class="p1">— Но верно и то, — заговорил он осторожно, — что одной культуры недостаточно. Пролетарий верит, что его труд потребен и сливается в общую реку, и что в этом труде его бессмертие. Но во что верить интеллигенции, чьи слова обесценились, споры прекратились, чей смысл совершенно исчерпан? Она не может, так сказать, только ходить в оперу. А что вся она способна принять вот так сразу классовую идею — вы же понимаете…</p><p class="p1">И он слегка развел руками.</p><p class="p1">— Очень, очень любопытно, — заинтересовался Райский. — Значит, у кого нет зубов — тому кашку?</p><p class="p1">Остромов горячо закивал.</p><p class="p1">— Вы уловили совершенно верно, — сказал он. — Именно так, и под полным наблюдением. Я не возражал бы против присутствия людей из ОГПУ, и им, так сказать, было бы не менее познавательно… если бы, разумеется, возникло желание…</p><p class="p1">— Очень возможно, — сказал Райский деловито. — Это, конечно, надежней, чем кружок политграмоты. Лично в вас я не сомневаюсь, тем более, что и телеграмма товарища Огранова того… не оставляет сомнений. Но что вы станете делать, если на таких собраниях возникнет политический вопрос?</p><p class="p1">Эге, подумал Остромов. Этого я просчитал верно.</p><p class="p1">— Я удивляюсь, — сказал он. — Неужели это не ясно? Немедленно осведомлю.</p><p class="p1">— Я не о том, — отмахнулся Райский, словно это и впрямь предполагалось само собою. — Я о вашей линии: как вы станете действовать, если туда придет явный враг и воспользуется вашей… назовем это структурой… для организации, ну, вы понимаете?</p><p class="p1">— В моей власти, — сказал Остромов строго, даже несколько басовито, — придать кружку исключительно философский характер и отсечь любые попытки его политизации. Да вы ведь и сами знаете, что масонство никогда политикой не интересовалось.</p><p class="p1">— Ну уж, ну уж.</p><p class="p1">— Нам приписывают многое, — еще суровей сказал Остромов. — Но ведь и евреям приписывалось употребление крови христианских младенцев.</p><p class="p1">Лицо Райского не дрогнуло, но Остромов понял, что попал.</p><p class="p1">— Я, видите ли, читал рукописи, — сказал Райский со старательной небрежностью. — Конфисковывали тут у одного, вы его, может быть, знаете…</p><p class="p1">Он замолчал, глядя на Остромова испытующе.</p><p class="p1">— Я знаю многих, — сказал Остромов, — но никогда не одобрял конфискации рукописей, содержащих тайнознание. Они нужны только тем, кто поймет, и отбирать их я считаю не столько преступным, сколько ненужным.</p><p class="p1">Это опять было правильно: он ставил себя.</p><p class="p1">— Да мы вернули, — быстро сказал Райский. — Действительно филькина грамота. Стал просматривать — ничего не понял.</p><p class="p1">— Ха-ха! — воскликнул Остромов. — Как у вас все быстро! Вы хотите уж с первого раза понимать седьмую ступень!</p><p class="p1">— А вы почему знаете, что седьмую ступень?</p><p class="p1">— Кроме брата Абельсаара, никто не подвергался конфискации тайнописей в последнее время, — пожал плечами Остромов.</p><p class="p1">— Это какого же Абельсаара?</p><p class="p1">— Это брат библиотекарь, мирского его имени я не знаю.</p><p class="p1">— Что же, по кличкам общаетесь?</p><p class="p1">— Это не кличка, — оскорбился Остромов, — это нечто вроде специальности. Каждый брат берет имя покровительствующего ему духа, все равно как вы назвались бы братом Торквемадой.</p><p class="p1">Остромов пригляделся к реакции: Торквемаду Райский знал.</p><p class="p1">— А вы со всеми масонами России находитесь в переписке? — поинтересовался Райский.</p><p class="p1">— С главными братьями — нахожусь, но ведь мы объявили полный «Гранд силанум», — пожал плечами Остромов.</p><p class="p1">— Это что же такое? — остро блеснул глазами Райский.</p><p class="p1">— Вы сами знаете, — прикрыл веки Остромов, словно утомившись притворяться перед своим.</p><p class="p1">— Положим, знаю, — осторожно сказал Райский. — Но не значит ли это…</p><p class="p1">Он не знал, что спросить, как скрыть невежество. Остромов взорлил.</p><p class="p1">— Не значит! — воскликнул он твердо. — Ах, не пытайтесь принять вид неофита, я вижу, с кем имею дело. Не пытайтесь предстать новичком, притворяться перед своими не велит кодекс Парацельса. Вам отлично известно с первого моего шага, с шейного знака, кто перед вами. Вы не могли не заметить, что знак сделан с намеренной ошибкой. Вы намекнули, я принял. После этого уже можно было сбрасывать маски, но вы не верите. Дело ваше. Может быть, вы полагаете, что возможно скрыть знакомство с кодексом? Что человек, стоящий хотя бы на третьей ступени, не разберет повадок? Что в каждом взгляде, в каждом жесте Блаженнейшего не видна, как печать, его высшая причастность? Что же, если угодно, я виноват. Я слишком долго играл перед вами комедию. Но поймите и меня. Идя сюда, я менее всего ожидал увидеть столь высокое посвящение и столь сдержанный прием. Но если братья уже проникли повсюду, я вообще отказываюсь понимать, что вас останавливает. Возможно, вам известны высшие соображения. — Он встал и, что называется, нервно заходил по комнате. — Возможно, что известны: да. Я не все могу понять в моей «Астрее», которая в рамках Гранд Силанума — или, как вы еще называете, Великого Молчания (ненавязчиво перевел он), — обречена сейчас на бездействие и полузнание. Но курс, который я хочу вести, очень ведь прост. Он совершенно элементарен, он с ваших высот вообще не представляет важности. Положим, они освоят у меня простую экстериориацию, так называемый выход. Я сам это делаю одним щелчком пальца, но у свежего человека такое занимает год; но больше года и не нужно. Допустим, левитация — один-два случая, в зависимости от таланта учеников, хотя вряд ли будет и один; разумеется, в строгой тайне. Но уж не думаете ли вы, что я намерен допустить их к тайне бессмертия? — Остромов сделал долгую паузу, уставился в широко открытые глаза Райского и, помолчав, постучал себя длинным пальцем по длинному черепу. — Как вам на мысль могло прийти такое? Obseratio immortale<a href="ch2.xhtml#id28" class="a">[9]</a>, ключ бенедиктинцев… да, да, воображаю это посреди Ленинграда! — Он картинно расхохотался; Райский расслышал «обсирацию» и скупо улыбнулся. — Но на этот счет можете быть уверены: я не настолько желаю чужого бессмертия, чтобы поступаться собственным.</p><p class="p1">Он помолчал и радостно отметил, что Райский не перебивает, а следовательно, на крючке.</p><p class="p1">— Вы можете спросить — вы как высший вправе требовать от меня отчета, и для меня блаженство отвечать вам, служить вам, вообще хочу сказать, чтобы вы располагали мною, как угодно: встреча с посвященным вашей ступени для каждого из нас честь особенная, раз в жизни, может быть… Вы вправе спросить: но тогда зачем? Отвечу вам предельно честно, как велит кодекс: только предписанная нам помощь малым сим. Паства брошена без пастыря. Целое сословие болтается, не нужное никому. Коммунизм не для них, оставьте, постичь коммунизм во всей глубине способны только люди вашего рода, но их мало; я сам чувствую за ним величие, но проникаю едва-едва за колонны входа. Чьей же добычей они станут? Добычей демонов, подстерегающих всякого, кто отстал от своих и не пристал к новым. Можем ли мы бросить тех, кого зовем бывшими? Нет. Через кого может пролечь их путь в коммунизм? Только через нас. Да и вспомните же, наконец, Эвмена Милетского…</p><p class="p1">Остромова понесло, как не нашивало давно. Он знал это прелестное состояние, когда выдумывал толпы мыслителей и гроздья школ под влиянием минуты. Он сыпал именами, не забывая любезно осклабляться, как бы говоря — вы, разумеется, знаете все это лучше меня, но позвольте же и мне продемонстрировать эрудицию! Он уверял Райского в его богоизбранности и своей почтительной покорности; перечислял десятки оттенков в каждом жесте Райского, в каждом наклоне его мерлушковой головы. Монолог длился не менее четверти часа. Райский слушал с непроницаемым лицом, но одно то, что не перебивал, выдавало его с головой. Наконец Остромов сделал выжидательную паузу.</p><p class="p1">— Все это очень интересно, — как бы в раздумье, опустив глаза и чертя нечто на желтом листе остро заточенным карандашом, выговорил Райский. — Вы явно переплачиваете мне, но кто же поймет все эти ваши масонские хитрости… а?</p><p class="p1">— Воля ваша, — пожал плечами Остромов. — Если вам угодно мне внушить, что возможен гений, с абсолютной точностью имитирующий приемы великого посвященного, не будучи им в действительности, — материализм заставляет меня поверить и в это.</p><p class="p1">— А скажите, — все так же медленно проговорил Райский, — если бы я захотел присутствовать на заседаниях вашего кружка — вы ведь не стали бы мне препятствовать в этом?</p><p class="p1">— Если бы Бонапарт захотел покомандовать ротой, никто из ротных командиров ему бы не помешал, — с кислой гримасой — внутренне ликуя — произнес Остромов.</p><p class="p1">— Так, так. А теперь скажите мне, товарищ Остромов, — и Райский поглядел на него в упор, — ваша-то какая во всем этом выгода? Чего хотелось бы лично вам, дорогой товарищ посвященный?</p><p class="p1">— Кроули, Кроули, — пробормотал Остромов. В такие минуты он соображал быстро и линию импровизировал безотказно.</p><p class="p1">— Не слышу? — переспросил Райский.</p><p class="p1">— Должен ли я доказать вам, — скорбно сказал Остромов, — что читал и Кроули? «Поведение особи управляется выгодой, и чем выше особь, тем в большей степени». Выгода есть, и она весьма проста. Вы лучше меня знаете, что опыты третьего цикла невозможно закончить в одиночку. Нужны помощники, нужна защита, наконец… Не хотите же вы, чтобы я делал экстериориацию один, без посредника, посреди города, с такой силой заряженного лярвами?</p><p class="p1">Нет, Райский этого не хотел. Он покачал головой.</p><p class="p1">— А опыты с этим вашим… как бишь… иммортале вы продолжать намерены?</p><p class="p1">— Если это не входит в противоречие с вашими собственными разработками, я хотел бы, — осторожно произнес Остромов.</p><p class="p1">— Отчего же, не входит. Мы сами активно ищем в этом направлении. Товарищ Богданов, в частности…</p><p class="p1">Остромов завел глаза, словно говоря: кто же не знает! Но нам ли, с нашим уровнем…</p><p class="p1">— Я, как вы знаете, ищу в иной области, — скромно сказал он.</p><p class="p1">— Ну, никогда не знаешь, в какой области найдешь, — усмехнулся Райский. — Вы где квартируете, товарищ?</p><p class="p1">— Вопрос довольно острый, — заметил Остромов еще деликатней. — В настоящее время я живу у дальней родни, где для сборов нет ровно никаких условий…</p><p class="p1">— Это мы рассмотрим, — кивнул Райский, не переставая чертить. — Надо же, чтоб и собрание было где провести, верно? И вам, представляясь человеком не простым, негоже водить куда попало… в вертеп какой-нибудь. Где бы вы хотели… или у вас уже намечено?</p><p class="p1">Ого, подумал Остромов. Ловко же они распоряжаются жильем.</p><p class="p1">— Я не возражал бы против Кронверкского, — сказал он осторожно, — либо же меня устроил бы Большой проспект Петроградской стороны. Есть соображения геомагнетические, вы понимаете их лучше моего, а есть ностальгические. Зная ваши принципы, предположу, что геомагнетические важней (Райский сдержанно улыбнулся). В принципе же… вы позволите?</p><p class="p1">Райский важно кивнул, уже уверовав в свое сверхвысокое посвящение.</p><p class="p1">— Вот вы — и все ваши, я не знаю, сколько сейчас в России магистров, — говорите: выгода, выгода… эссенциале прагматик… (Это надо запомнить, подумал он). Я спорить не могу, не с моей ступени спорить… но ведь и ваше знание не абсолютно, что многажды подчеркивал тот же Кроули. Так?</p><p class="p1">Он прямо уставился на Райского.</p><p class="p1">— И Маркс, — спокойно сказал Райский.</p><p class="p1">— Как! — воскликнул Остромов. — Вы хотите сказать, что и Маркс…</p><p class="p1">Райский значительно кивнул.</p><p class="p1">— Впрочем, на это многое указывает, — скорбно сказал Остромов. — Однако выгода — понятие широкое, не станем запирать его в рамки материи. Что, если я одинок?</p><p class="p1">Райский не ожидал такого поворота; из опыта Остромов знал, что переход на личные обстоятельства почти всегда закрепляет инициативу атакующего собеседника, и чем исповедальней заговоришь, тем лучше.</p><p class="p1">— Что, если мне не с кем говорить? Что, если… впрочем, вы ведь лучше меня понимаете, что продвижение в масонстве невозможно без братьев. Есть вещи, которые не понять без обсуждения. Есть ошибки, видимые только со стороны. Наконец, — он понизил голос, — не хотите же вы, чтобы я — чтобы мы…</p><p class="p1">Он выждал; Райский выжидал тоже.</p><p class="p1">— Одним словом, — закончил Остромов, — начиная с пятой ступени, контакт немыслим ни с кем, кроме сестры, а обходиться без контакта, тысяча извинений, я смогу не раньше девятой.</p><p class="p1">Райский усмехнулся.</p><p class="p1">— Квартиры-то есть, — сказал он загадочно. — И еще будут. В сентябре, думаю, как раз прибавится, тогда еще поищем… Что же, я со своей стороны не возражаю, в таком духе и выскажусь. Вы мне телефончик оставьте или же сами позвоните в понедельник. Думаю, тогда и поселитесь… как?</p><p class="p1">— Одно слово, — сказал Остромов и поднял палец. — Вы знаете, но я напомню. Может быть, не все так щепетильны, но я да. Я да. — Он покашлял. — Одним словом, в квартиру казненного я не могу, это запрещено, не принято и прочая. Дух, мстительность, возможные вторжения на тонком плане… зачем мне все это? Я там собираюсь, может быть, экстериоризироваться, а он вдруг караулит: не думаете же вы, что я в этом состоянии смогу…</p><p class="p1">— Да не бойтесь, — улыбнулся Райский, снова душа-человек. — Какие казненные? Высланные.</p><p class="p1">— Это пускай, — выказал облегчение Остромов. — В конце концов, по Лемюелю, все мы высланные в этот мир — любопытно бы посмотреть, кто сейчас квартирует там, на наших местах… а?!</p><p class="p1">И он, внезапно повысив голос, подался в сторону Райского, словно ожидая ответа.</p><p class="p1">— Кто там сейчас, в том саду, где был я? Кто в моем шестнадцатом эоне? Я давно, давно-о разбудил в себе дородовую память, я вижу и сад, и льва, и левкои, и слышу далекую музыку… Иногда будто и слова слышу — эвента, эвента… Иногда и хочешь спросить — за что выслали? — а потом вдруг уясняется: нет вопроса «за что». Вы понимаете теперь, почему масонство не против революции? Впрочем, — он сделал вид, что зажимает себе рот, — кого я спрашиваю…</p><p class="p1">— До понедельника, — деловито сказал товарищ Райский.</p><p class="p1">«И этот мой», деловито подумал Остромов.</p><p class="subtitle">2</p><p class="p1">Этот и точно был его, но не потому, что поддался на безудержную остромовскую лесть, а потому, что в потоке словоблудия уловил слово «иммортале».</p><p class="p1">Райский бредил бессмертием с тех самых пор, как вообразил себя смертным. Не понял, что смертен, а именно вообразил — он так и полагал с детства, что, если б ему не сказали о смерти, он бы сам никогда не умер. То, что умирают не все люди, было для него азбукой. Человечество давно вымерло бы, будь это так. Лет восьми прочитал он в «Ниве», что каждую минуту в мире рождаются пятьдесят и умирает сорок человек; математически ясно, что десять остаются. С определенного момента они не знают старения, достигают плато и остаются на нем; одного такого человека он видел — это был вечный странник Лазарь Иоселевич, четырежды покидавший Могилев в поисках счастья и в четвертый раз не вернувшийся. Очевидно, он нашел счастье, потому что ничего другого с ним случиться не могло. Он не менялся вовсе, высох и выдубился до древесной текстуры, на буроватом его лице жили одни глаза, и неизменным было его длинное черное пальто, без которого Райский никогда его не видел — вероятно, потому, что летом Иоселевич вообще не выходил на улицу. Он был в Америке и не нашел счастья; был в Палестине и никому не советовал ехать туда; ездил в Сибирь смотреть землю для переселения, но сказал, что лучше уж в Америку; наконец собрался в Китай — и не вернулся. Райский даже не знал, доехал ли он до Китая.</p><p class="p1">Есть люди, достигшие неизменности и получившие бессмертие, ибо всем остальным оно ни к чему — зачем бесконечный распад и впадение в детство? Что после смерти возможна иная жизнь — он не верил, ибо вменяемый человек, к тому же видевший смерть, в это верить не может. А Райский видел смерть, и для того, чтобы видеть ее совсем близко, пошел в ЧК. Он был в партии с тринадцатого года, со своих двадцати, с тех пор, как работал в Петербурге типографом. В семнадцатом он агитировал в войсках, в восемнадцатом работал в аппарате Урицкого, в девятнадцатом лично допросил не менее тысячи человек, подозревавшихся в терроре, заговорах, явном или скрытом саботаже; приходилось ему и стрелять. Кому же тогда не приходилось? Были командировки в среднюю Россию, Ярославль, Вятку. Были разговоры с монахами. Никто из монахов ничего дельного не сказал — ни на допросе, ни за чаем, ни за чаем на допросе. Тех, кто врал о бессмертии на небесах, следовало убирать беспощадно. Это была даже не месть, но социальная гигиена. Бессмертие было здесь, и достижение его иногда казалось Райскому вопросом двух-трех душевных усилий; иногда, когда здравомыслие изменяло ему и накатывал особенно тяжелый сон — без расстрелов, это бы ладно, а вот что-нибудь про собственную вечную вверженность в безвыходный каменный мешок, и до конца времен, — он понимал, что боится не столько небытия, сколько бытия. Вдруг да что-нибудь есть, этого мы знать не можем, а там могут посмотреть по-разному. Райскому ни в коем случае нельзя было попадать туда.</p><p class="p1">Страх смерти начал терзать его задолго до дел, в которых принято раскаиваться. Врут, что тираны каются: это в геометрической прогрессии, вместе с их величием возрастает тот самый ужас, который и сделал их тиранами. Или Грозный стал бы выжигать дальних, а затем и ближних, кабы не вечный страх за собственную жизнь? Истоки его темны: правду сказать, в мире нет ничего особенно хорошего, ничего, с чем невыносимо было бы расстаться. Но есть особые — те, кто отмечен миссией; и уйти, пока она не свершена, страшно. Райский был из таких. Он должен был здесь что-то сделать. С первых лет его не прельщали детские игры, юношей он презирал развлечения. Отец хотел сделать его талмудистом, но талмудическая мудрость давно прокисла — Райский не выказал прилежания. Медицина тоже подходила к жизни не с того конца. Надо было создать всенауку, объясняющую все. Сам Райский не чувствовал сил для вселенского открытия. Его дело было — почуять того, кто может, и закрепиться при нем. Теперь это счастье само шло в руки.</p><p class="p1">Путей к земному бессмертию указывалось множество; грех сказать, Райский и в партию пошел отчасти потому, что после такого радикального переворота, как задуманный ими, со смертью непременно должно было что-нибудь случиться. Коль скоро они меняли все законы природы, сам собой должен был отмениться и главный. И в самом деле, года до двадцать первого Райский не знал физической усталости, ничем не болел и не замечал у себя ни единого седого волоса. В двадцать первом у него начались внезапные обмороки, он лечился в Кисловодске, прошло. Но по достижении тридцати резко, словно ручку повернули, начались ночные сердечные перебои, утренняя тяжесть в груди с похмелья, легкое дрожанье рук, зимой забеспокоили суставы, летом одышка, — врач третьего управления Ярыгин не нашел ничего, лишь заметил подобострастно: «Возраст, работа, напряжение сверхчеловеческое… Косит людей, что же вы хотите…». Райский хотел, чтобы его не косило.</p><p class="p1">Он знал, в общем, как это просто. Человек всю жизнь боится секунды, редко минуты. Щелчок пальцами длится дольше. Переход осуществлялся мгновенно, и сразу делалось неинтересно. Однако именно эта простота бесила больше всего: значит, человек был настолько ничем, настолько пушинкой. Ничего не было легче, как выключить его, Райского, и нужно было торопиться, чтоб законсервировать себя в еще пригодном, жизненном состоянии. Стариком он и сам себе не был нужен. Требовалось что-то одно, внешне столь же легкое и незначительное, как смерть: щелк! — и он другой. Интуитивно он чувствовал, что задним числом этот щелчок будет представляться легчайшим, самоочевиднейшим, — но отсюда, снизу, никак было не нащупать рычажка. Физическая подготовка была не то: на его глазах атлеты рушились, как дубы, тогда как больные и хилые, всю жизнь загнивавшие помаленьку, гибко и ползуче приспосабливались к любым обстоятельствам. Ни при чем была и мораль — морали, впрочем, не было, она классова. Требовалось что-то иное, третье после духа и тела, — может быть, особое состояние ума, управляющего в конечном счете и тем, и другим. Ключ к этому состоянию был у немногих, но был. Странный чекист Артемьев, ушедший потом в дацан, как многие, — просто знали про них немногие, — рассказывал про ламу, ушедшего в нирвану. Он собрал вернейших монахов за неделю до ликвидации монастыря и, распевая молитвы вместе со всеми, незаметно снизил собственный пульс сначала до 20, потом до 5, а потом до одного удара в час. Три, и четыре, и пять дней просидел он без признаков тления, иногда только открывая глаза и приняв комнатную температуру. На шестой день монахи поместили его в деревянный сундук, засыпали солью и спрятали так, что никто не нашел до сих пор, — но кто-то знает, и верные люди раз в десятилетие будут извлекать живую мумию, дабы удостовериться, что высшее состояние ума длится. Теперь ламе было бы уже девяносто. Иногда засоленный старик являлся Райскому, открывал глаза и смотрел без выражения. Хотел ли Райский такого бессмертия? Это было лучше небытия, и главное, в любой момент можно было вернуться, как мог он усилием воли проснуться.</p><p class="p1">Вводить себя в это состояние, учил Артемьев, дано немногим, а лишь тем, кто полностью умер для мира. Иные монахи умели становиться невидимыми и даже переноситься по воздуху на значительное расстояние. Потом, есть йога, но о йоге Артемьев знал мало. Он знал буддизм, которым заразился в Сибири и ушел в конце концов, потому что перед зовом Востока устоять невозможно, но Райский не хотел на Восток. Он хотел на Запад, ибо Восток не знал и не берег личности, а собственная личность была Райскому дорога. И вот свет с Запада блеснул перед ним, и теперь Райский был спасен. Он не пожалел бы и двух квартир под кружок этого говоруна. Говорун сразу определил в нем нечто, самому Райскому еще неясное, разглядел миссию, которую Райский нес в себе, как драгоценность, не умея назвать. Надо только чаще ходить к нему, или, может быть, заниматься отдельно — и тогда…</p><p class="p1">— Осипов, — сказал Райский в трубку. — Я послушал твоего масона, пусть работает. Вреда не будет. Я его лично поведу.</p><p class="subtitle">3</p><p class="p1">Денег не было, вот что гадко. Остромов чувствовал, что будут скоро, и много, но сейчас надо было перебиться три недели, в крайнем случае месяц. Он знал способы, но все они были утомительны, долгосрочны, а то и рискованны. Им овладела особая леность, которую он хорошо знал — такая бывает весной, в марте, в самой сладкой дремоте перед пробуждением: близка большая удача, незачем размениваться на малые. Что суетиться? Сейчас пускай подбросится малый, без усилий выигрыш, достаточный, чтобы досуществовать до серьезной ставки. В таких случаях верней всего было раскинуть карты либо уж положиться на судьбу, прислушавшись к разговору в верном месте. Верное место он избирал безошибочно.</p><p class="p1">Карты сказали глупость: вертеп разврата и малая сумма. Он бросил заново: вышел дворец Князя и малая сумма. Недоумевая, а втайне надеясь изменить сумму, он разложил большой круг, и вышел разврат во дворце с полезным человеком, со слезами; сумма оказалась та же самая, ошибки быть не могло. Чтобы не усугубить прогноза и не злить судьбу излишними вопрошаниями, Остромов решил довериться случаю и бесцельно прошелся по улице Марата, бывшего Николая — любопытно вообразить дальнего потомка, для которого сто лет разницы пустяк; вот он читает об одной и той же улице — и полагает, что Николай с Маратом были одно лицо, Николай Марат, русский царь из французских революционеров. Во Франции его пытались убить, проклял революцию и бежал, в снежной России поклялся задушить бунт в зародыше… В доме 17 по улице Николая Марата была прелестная, тихая пивная, в которую Остромова потянуло неудержимо. Он вошел.</p><p class="p1">В сравнительно ранний этот час в пивной сидел единственный посетитель, мужчина лет сорока с небольшим со следами крупно прожитой жизни. Он был вислоус, длиннолиц, необыкновенно уныл и взглядом напоминал породистого пса, вышвырнутого из господского дома за нечто старческое, непростительное. Остромов знал в одной московской семье дряхлого пса, испустившего ветры во время хозяйской помолвки. У нас, положим, за это ничего не было, но в Британии могли убить, даром что порода. Посетитель мочил усы в пиве и смотрел на стены взглядом старого пса, который пукнул. Место было для него неподобающее, советская пивная, и он старался сохранять в ней жалкое достоинство, какое выброшенный аристократ лелеет на свалке.</p><p class="p1">Между тем Остромову тут нравилось. Стены были покрыты изумительными плакатами — он еще их не видел, до Кавказа не добрались; по плакатам проницательный человек мог сказать многое. Прежний потребитель рекламируемого продукта был жовиальный тридцатилетний брюнет с усиками, сильный самец, не без естественных запахов, вынужденный глушить их разнообразной парфюмерией. Женская потребительница была графиня, томная, развратная. Граф на охоте, а в это время к ней шнырь-шнырь брюнет, и давай вместе пить воду «Гуннияди-янос». Теперь в лицо Остромову три краснолицых бабы разного возраста — советские Парки — кричали визгливым хором: «Женщины! Везде и всюду требуйте бельевую соду!». Остромов не позавидовал бы человеку, отказавшему им в бельевой соде — еще чего, самому, мол, нужна. Чуть далее рабочий и крестьянин крепили смычку. Рабочий тянул вправо, указывая свободной левой рукой на кривые красные фабричные трубы и ржавую пасть завода, выплевывавшего на мостовую прожеванных, изможденных строителей нового. Крестьянин в ответ невидимо стонал (зритель видел лишь его напряженную, костистую спину): да это што ж, ты посмотри, каково у нас страшно! — и свободною левой указывал на бескрайние скирды, расставленные отчего-то в шахматном порядке по осеннему пасмурному полю. И так нехорошо, и так худо. Под ними крестьянке предлагалось, чем бить деток-то, купить им лучше книжек. Остромов так и слышал назидательный голос: ты, матушка, книжки им купи, да тогда и побей! Они, ежели книжек начитаются, тебе и сдачи не дадут. Над самой стойкой висел портрет женщины с чугунно-сизым твердым лицом, в красной косынке, в синем комбинезоне на лямках. Выражение ее лица не обещало ничего хорошего. «Свободная женщина, строй социализм!» — умоляли рдяные буквы, но вот беда, ей неинтересно было строить. В тупом ее взгляде не читалось ничего, кроме застарелой мести: кто-то страшно обидел ее, когда ей было тринадцать, снасильничал или, наоборот, пренебрег, и теперь, пользуясь случаем, она высматривала супостата среди боязливо замерших посетителей. Ты? ты? До социализма ей не было дела, при социализме она лишь могла безнаказанно мстить кому попало, утверждая, граждане судьи, что он-то и снасильничал, все как есть нутрё разворотил, а ведь я была цельная, нетронутая. И теперь за это за самое я намотаю на свой кулак всю его как есть кишечность, сколько там осталось в наличии после военного коммунизма. Тщетно пытался умаслить ее с противоположной стены умильный, хорошо потрепанный последними десятью годами коммивояжер, предлагающий бессмертное мыло «Букет моей бабушки». Где-то тебя носило в эти десять лет, где твоя вакса «Salton», твой шоколад «Эйнем», твое средство для лечения половаго безсилия «Укус страсти»? По каким фронтам, каким полям и рельсам тебя протащило, бедный брат, молодцеватый герой шестнадцатого года? Все продал, как есть спустил, кроме бабушкина букета. Все персонажи производили впечатление дорвавшихся, но в силу врожденной тупости неспособных насладиться: все вожделенные дары лежали у их ног, а они не умели толком воспользоваться даже папиросами «Леда». К их услугам был балет, Гарри Пиль, пудра «Истома», многое переживший, но еще живой брюнет с бабушкиным букетом — графиня в Париже, а я не успел, и вот, к вашим услугам, — но они всегда и всюду требовали питьевую соду, ибо ничего другого не в состоянии были воспринять. За что боролись, граждане? Тот, кто научит их теперь пользоваться хотя бы фокстротом, станет истинным хозяином положения. Социализм не учел главного, а именно — посредника: если пролетарий получил, допустим, велосипед, это само по себе достижение, но кто-то должен выучить его тонкому искусству балансировки. Если не получится задуманное, можно будет освоить хоть это — если НЭП продлится, а он продлится не в этой, так в иной форме, им непременно захочется манер. Конечно, не всем: чугунной мстительнице не захочется, и более того, она удавит всякого, кто посмеет при ней высморкаться в платок. Но, может быть, удастся приманить ее тонким развратом, чем-нибудь с перчиком, во дворце, со слезами, с ответственным работником?</p><p class="p1">Тонко улыбаясь, он тянул свое пиво, вспоминая, что осталось у него двенадцать копеек, прелестное число, — и вдруг остановил на вислоусом свой особенный, проницающий взгляд; в обычное время такой взгляд беспокоил, но вислоусому было и без того тревожно, а в смутные минуты чужое настороженное внимание имеет эффект целительный, резонируя с нашей тревогой. Он посмотрел Остромову прямо в глаза, и Остромов прочел в его взоре беспомощность.</p><p class="p1">— Позвольте, — сказал Остромов вежливо, но твердо. — Позвольте, но этого не может быть.</p><p class="p1">Вислоусый встряхнул головой, словно торопясь изгнать чужую мысль.</p><p class="p1">— Чего именно? — спросил он испуганно.</p><p class="p1">— Вот именно того, о чем вы сейчас подумали, — любезно осклабился Остромов. — Этого быть ни в каком случае не может, и это вам отлично известно.</p><p class="p1">— Но вам-то откуда может быть известно?! — воскликнул единственный посетитель. Буфетчик лениво на него покосился и продолжил листать «Красный перец».</p><p class="p1">— В этом нет ничего странного, вы думали почти вслух, — пожал плечами Остромов. — Всякая мысль, как мы знаем из Бергсона, имеет три степени оформления: так называемая мысль помысленная, предсловная и изреченная. Там подробней, но мы запутаемся. Прочесть предсловную не составляет труда. Позвольте мне не переводить ее в слова, но сказанное сказано, и я в нем вижу неправду.</p><p class="p1">Вислоусый поставил кружку и внимательно слушал.</p><p class="p1">— Исходя из этого, — невозмутимо продолжал Остромов, — я вам не советую исполнять своего намерения и предлагаю отложить его до того времени, когда исполнится ваше первое условие.</p><p class="p1">— Какое? — пролепетал посетитель.</p><p class="p1">— Вы знаете, какое, — твердо сказал Остромов и взглянул на него поработительным взглядом, из под которого слабый человек, вдобавок в печали, не выскользнул бы никогда. Слова были давней его разработкой, они подбирались так, чтобы любой собеседник мог их наложить на личную ситуацию, ибо у всякого есть намерение, условие и мысль, в которую не хочется верить.</p><p class="p1">Вислоусый подумал немного и сделал приглашающий жест. Остромов пересел за его столик.</p><p class="p1">— Он это сделает, — мрачно сказал вислоусый. — Я чувствую.</p><p class="p1">Через пять минут Остромов знал все, а через четверть часа у него было чувство, что он прожил в обществе этого тяжелого, хмурого человека тяжелый, хмурый год. Если бы он был начальником финансового отдела завода «Красный дизель», он уволил бы его сразу или вовсе не взял на работу, но сам начальник финансового отдела был, вероятно, таким же сырым, вечно испуганным хмурнем, ежесекундно опасавшимся разоблачения. Что они все натворили? Они провинились тем, что жизнь их была скучна, что они не умели пить, не знали хорошеньких женщин, не могли толком развернуться. И потому Филиппов — так звали главного бухгалтера — уволил Степанова, так звали вислоусого, за участие в съемках исторической драмы «Актерка и сатрап».</p><p class="p1">У Степанова было пять человек детей, удивительно, как сумел он наплодить их — верно, не знал других развлечений в угрюмой жизни; до революции он служил в банке Арского, потом немного в Красной армии, тоже по финчасти, и наконец осел на «Дизеле», но денег вечно не хватало. По объявлению в «Ленинградской правде» он отправился на киносъемки ленфабрики «Роскино», где режиссер Мстиславский отбирал типажи для историко-революционной ленты. За день съемок в толпе платили рубль, за крупный план — три. Всю зиму Степанов по выходным героически мерз на съемках, изображая по очереди дворника в «Смерти святого черта», егеря в «Царской охоте» и марсианского мужика в «Путешествии на Марс»; вся его фигура выражала такую угнетенность, что лучшего типажа не требовалось, и младшеньким, близнецам, смогли даже купить коньки, но тут Филиппова угораздило пойти на «Декабристов», и что же он увидел?! Он увидел подчиненного ему бухгалтера «Красного дизеля» в роли караульного солдата, гонящего декабристов на каторгу, и устроил Степанову разнос, какого тот не получал и в 1923 году за недостачу пятнадцати казенных рублей, пропавших совершенно бесследно. Вероятно, сам же Филиппов и украл их, а недостачу свалил на подчиненного.</p><p class="p1">— Он кричал и топал, — сказал Степанов. — Он сказал, что на нашей должности совершенно непозволительно и позорно… потому что, во-первых, могут увидеть враги, а во-вторых, если сам декабрист, то это бы еще туда-сюда. Но если представитель режима, то это скрытая симпатия, и я скрытно тоскую… Он написал директору, и тут уж как директор. С одной стороны, конечно, я спец, но с другой… вы понимаете. Тогда я просто не знаю, тогда просто в Неву. Ведь пятеро, поймите.</p><p class="p1">— Я удивляюсь! — воскликнул Остромов. — Но ведь даже у детей, когда они играют в войну, кто-то должен изображать неприятеля.</p><p class="p1">— Я бы объяснил, — кивал Степанов. — Завтра вот понедельник, и я не знаю… поймите, если я приду, и они скажут, что все…</p><p class="p1">— Они ничего не скажут, — властно успокоил его Остромов. — В конце концов вы можете взять справку на кинофабрике.</p><p class="p1">— Я взял бы, но они сказали, что могут выдать только артисту… что массовка не принадлежит, как это… я не помню сейчас, но, в общем, отказали.</p><p class="p1">— Бред! — решительно воскликнул Остромов. — Я завтра сам туда пойду.</p><p class="p1">Он умел быть очень убедительным, когда хотел того.</p><p class="p1">— И что, им постоянно нужна эта толпа?</p><p class="p1">— Сейчас нужны аристократы, — понижая голос, словно буфетчик составлял конкуренцию, поведал Степанов. — Мстиславский снимает «Месть трущоб». Там толпятся такие, что, знаете, в прежнее время… меня бы дальше прихожей не пустили. Я сейчас не снимаюсь, не мой типаж.</p><p class="p1">— А забавно, — протянул Остромов, усмехаясь.</p><p class="p1">— Вот вы бы им подошли, — еще тише шепнул Степанов. — Горбинка, и взгляд у вас, знаете, особенный…</p><p class="p1">— Я знаю, — высокомерно сказал Остромов. — Но людей моих занятий, — он улыбнулся краем рта, — действительно нельзя визуализировать слишком широко. Если я и пойду туда, то исключительно хлопотать о вашем деле. Вы же, — он повысил голос, — должны забыть о своем постыдном намерении с Невой. Зрелый мужчина, отец семейства, стыдно-с! Завтра, ничего не опасаясь, отправляйтесь на ваш «Дизель» со всей уверенностью ни в чем не виноватого человека. Он просто ищет вас унизить, вот вся причина. Тут зависть, другого объяснения не ищите. Все видно. Он думает, что вы хотите его подсидеть. Против этого есть простая защита. Когда будете говорить с ним, представьте себе аметистовую, непременно аметистовую стену.</p><p class="p1">— Аметист… лиловый камень? — спросил потрясенный Степанов.</p><p class="p1">— Ярко-лиловый и совершенно прозрачный. Представьте себя защищенным ею и смотрите прямо ему в глаза, вот как я сейчас смотрю на вас. И перед разговором непременно повторите: «Ave, Lumen, Protectione Recepta»<a href="ch2.xhtml#id17" class="a">[10]</a>.</p><p class="p1">— Аве… Позвольте, я запишу.</p><p class="p1">— Нет! — вскрикнул Остромов, словно ущипнутый. — Ни слова! Вы хотите погубить все? О результатах доложите мне лично, в этом самом месте, — он избегал слова «пивная», ибо оно теперь прозвучало бы диссонансом, а на ресторан заведение не тянуло никак. — Во вторник, в восемь вечера, займите угловой стол. Никаких благодарностей.</p><p class="p1">— Аве, Люмен, протектионе рецепта, — сомнамбулически проговорил Степанов.</p><p class="p1">— Во сколько они отбирают массовку? — небрежно поинтересовался Остромов.</p><p class="p1">— С семи утра. Надо успеть к началу светового дня, чтобы отснять все до четырех.</p><p class="p1">— Это на Каменноостровском, — произнес Остромов, то ли предполагая, то ли уточняя, то ли, чем черт не шутит, приказывая кинофабрике переехать туда.</p><p class="p1">— На Каменноостровском, — поддакнул Степанов.</p><p class="p1">— Ну что ж, — сказал Остромов. — Иной раз и к сатрапу в вертеп сходишь ради истины.</p><p class="subtitle">4</p><p class="p1">В семь утра следующего дня, едва начало светать, он стоял в толпе лишенцев перед ажурными воротами прелестного особняка 1778 года, где проживал когда-то барон Дризен, владелец одного из лучших домашних театров в Петербурге. Теперь здесь размещалась кинофабрика — для удобства натурных съемок, проходивших все больше во дворцах. Снимали истории в духе двенадцатого года — о жестоком графе, соблазняющем невинную белошвейку, с тою только разницей, что ежели прежде белошвейка бежала топиться на мост, где ее либо перехватывал, либо провожал мечтательным взглядом чахоточный студент, — теперь же она поднимала небольшое народное восстание и врывалась в замок графа, в одной руке держа трепещущий факел, другой придерживая на груди разорванную в схватке блузу. Мстиславский, седоусый дряблолицый полуполяк, весь составной и половинчатый, как эти слова, с самого начала карьеры, тоже разделенной семнадцатым на две части, балансировал на гранях: он был глуп, но сообразителен, одарен, но вульгарен, успешен, но неудачлив. Последнее требует разъяснения. Картины его, начиная с «Проклятия Изабеллы» (1912), делали кассу, но на Мстиславском не было того особого отблеска, который отмечает гениев и приподнимает над общей массой все, что бы они ни делали, даже если лень и распущенность заставляют их снимать по единственной картине в год. Мстиславский делал по три, но никак не мог выбиться в первый ряд, хотя Ханжонков его похваливал, а Маслицын сулил собственную студию. Если бы Маслицын не уехал в апреле семнадцатого, все сообразив раньше многих, — чем черт не шутит, было бы свое ателье.</p><p class="p1">Со временем Мстиславский отчаялся превратить синематограф в искусство, оставил изыски, перестал выписывать «Variety»<a href="ch2.xhtml#id16" class="a">[11]</a> и «Nouvelles de technique»<a href="ch2.xhtml#id15" class="a">[12]</a> и принялся молотить что попало, благо пролетариям требовался репертуар, а на это денег не жалели. Конечно, его теснили юные выскочки, которые, будь их воля, снимали бы одни черные и красные квадраты. Они монтировали любовные сцены с заводской штамповкой, бегущие массы — с лавинами, и Мстиславского воротило от этой претенциозной похабщины. У него в руках была профессия. Об идейности он не думал — для этого был сценарист, два года как вернувшийся из эмиграции драмодел Саврасов, с упоением разоблачавший буржуазные утехи, аристократические оргии, а в последний год и эмигрантское разложение. Сейчас они в темпе лудили «Месть трущоб» — сынок владельца мануфактуры невовремя соблазнял работницу, а тут как раз и февраль, — но для сцен разложения потребны были аристократы, а их на кинофабрике остро недоставало. Снималась молодежь, звезды фабричной самодеятельности, синеблузники, правдами и неправдами сбегавшие с репетиций актеры театра Голубева и даже юные авангардисты из студии Гутмана — но во всех этих добровольцах не было и малой толики аристократизма, так что задуманный Мстиславским контраст никак не реализовывался.</p><p class="p1">Дело в том, что на этот раз он придумал штуку. Пролетариям разонравились бесхитростные мелодрамы с революциями в конце — сколько ни штампуй, в конце концов надоест. Пролетарии еще долго терпели — им, как детям, мила была узнаваемость, их умиляла предсказуемость, они уважали себя за предугадывание концов, — но приедается все, и на экран хлынула комедия. На собрании в марте двадцать пятого замдиректора Любинский и завлитчастью Пиотровский сказали прямо: нам нужна советская комедия, но, товарищи, на историческом материале и, товарищи, с правильно расставленным акцентом. А что еще было снимать, кроме исторического материала? Вся реквизированная царская одежда пошла на Севзапкино — в костюмерную; куда же еще, не распродавать же? Актрисы поначалу отказывались играть в платьях царицы и царевен, страшась проклятия, повторения судьбы, — но их убедили: половина была новенькая, ненадеванная.</p></span></span>
