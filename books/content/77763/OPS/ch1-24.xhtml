<p class="p">Глава девятая</p>
</div><p class="subtitle">1</p><p class="p1">— Сегодня, — начал Остромов, когда все расселись, — пришло время рассказать вам о Страже порога.</p><p class="p1">Даня бегло оглядел собравшихся: Левыкин, по обыкновению, записывал, страшно вдавливая лиловый грифель в желтые клетчатые листы. Мурзина выпрямилась на стуле так, чтобы о ней можно было сказать «вся превратилась в слух», и бросала по сторонам взоры — замечают ли прочие, насколько превратилась. Варга осматривалась, ерзала, потом принялась чертить пальцем на скатерти. Поленов отсутствующим взором смотрел в окно, Ломов был спокоен и ясен, изредка кивал, словно учитель излагал его собственные тайные мысли. Пестерева рассеянно протирала очки, потом взялась за вязание, будто оказалась тут случайно и лекция ее не касалась. Мартынов в легком возбуждении постукивал пальцами по столу. Альтергейм близоруко улыбался, глядя не на учителя, а чуть вверх и влево, как бы пытаясь разглядеть, кто ему диктует. Савельева слушала смиренно, она была, видимо, в монашеском периоде. Тамаркина потирала большие красные руки, не зная, чем их занять. Даня покусывал карандаш, собираясь записывать главное, но, по обыкновению, заслушался. Он и так все запоминал.</p><p class="p1">— Со Стражем порога встретится каждый из вас, и потому описывать его нет нужды, — говорил учитель с великолепной небрежностью, словно приуготовляя собравшихся к походу в лавку: возьмете три пучка укропу, огурцов, не забудьте квасу. — Появление Стража означает, что вы достигли третьего уровня медитации и должны отвергнуть все, что знали до сих пор. (Левыкин крякнул от восхищения; остромовская бровь брезгливо дрогнула). О природе Стража говорили разное: Птоломей, называвший его????? или благоговейным страхом, полагал, что это собственный наш ужас перед неведомым воплощается в образе грозного, однако доступного увещаниям чудовища. Трисмегист, напротив, именует его Custos, или охраняющий, то есть видит в нем принадлежность не нашего существа, но тонкого мира. Лютер, которому Страж часто встречался в его экстериоризациях — они подтверждены у многих, в частности, у Эргана, — именовал его Schranke, что значит «заграждающий», — видимо, справедливо замечание доктора Штайнера о том, что Лютеру его греховными страстями (как то: гневом и чревоугодием) заграждался выход в тонкие миры, а потому многое в его космогонии гадательно. Наконец, Вольтер, упражняясь в медитации во времена дружбы с прусским путешественником Аудингеном, побывавшим в Индии и кое-что, несомненно, знавшим, был так напуган встретившейся ее сущностью, что раз навсегда прекратил опыты, но написал трактат «Homélie sur l'athéisme» — то есть против атеизма. Его более всего поразило то, что Страж явился ему в облике клоуна, пересмеивавшего его собственные ужимки.</p><p class="p1">Как всегда во время лекций Остромова, мир вокруг стремительно расширялся. Вскипал и вспухал потолок, отодвигались стены, протягивались нити бесчисленных тонких связей; звучали имена, о которых Даня понятия не имел. Вольтер, Лютер — да, но откуда он знает всех этих Эрганов, оставивших, оказывается, след, что-то знавших, куда-то странствовавших?! Остромов движением брови приветствовал тех, с кем соглашался, усмешкой опровергал безумца, осмелившегося сказать, что у какого-то двадцать раз забытого Пирамидальтиуса недоставало пятой, метемпсихической чакры, с легкостью цитировал целые фразы на языках, которые и во времена их расцвета были ведомы избранным, а теперь, когда племена мудрецов и тайнознатцев стерты с лица земли, во Вселенной едва ли нашлись бы трое, чтобы составить коллегию и обсудить значение темной строки из трактата «О пяти способах извлечь наслаждение из троекратного приседания в прохладную воду». Он мог отвлечься и полчаса рассказывать о забытой ереси брата Сульпина, полагавшего — о, simplicissimus! — что ртуть возможно перегнать из пятой сразу же в седьмую фракцию, минуя долгий путь так называемого transitus aeneus — бронзового перехода; разумеется, с точки зрения алхимической науки это было совершенно, совершенно безграмотно — но навело брата Альпинуса на мысль, что в достижении седьмого уровня при левитации возможно миновать шестой, и опыт блестяще подтвердился, так что ни одна ересь не пропадает; вопрос лишь в том, к какой области тайнознания применить догадку. Дане живо представились братья Сульпин и Альпинус — словно на гравюре из назидательного трактата; Сульпин в припадке отчаяния разбивал колбу, сраженный нежеланием ртути перегоняться в седьмую фракцию, — но рядом торжественно и хитро улыбался Альпинус: не огорчайся, брат, открытая тобою закономерность приложима к иному делу, вот так, вот так! — и слегка приподнимался над полом кельи. Даня так увлекся воображаемым диалогом францисканцев, что прослушал, как называли своих Стражей — разумеется, на родных языках, — Беме, Киркегард и Сведенборг, — и очнулся лишь на Чюрленисе, назвавшем стража Tvaikus, что значит «прощай», «прощание», «предел». В этот момент птичьим смехом залился Альтергейм.</p><p class="p1">— Что вас рассмешило? — с улыбкой, без малейшего раздражения поинтересовался Остромов.</p><p class="p1">— Я, видите ли, ах-ха-ха, — не мог успокоиться Альтер, — я немного знаю литовский, да, было дело… И как раз Tvaikus значит вонючий, тысяча извинений, да, да… Именно и исключительно вонючий, применительно к самым низким предметам. Потому что иначе было бы Kvapus — пахучий, что можно сказать, например, о цветке…</p><p class="p1">Остромов продолжал улыбаться. Единственное ведомое ему литовское слово tvaikus он услышал в 1916 году от горничной в псковской гостинице Болховитинова и запомнил — она выкрикнула его на прощание, и оно показалось ему очень литовским, пригодится блеснуть; горничная была по-балтийски строптива. Вспоминать литовку, однако, было не время.</p><p class="p1">— Позвольте, — проговорил он, как бы озадаченный. — Но ведь это совершенно меняет дело.</p><p class="p1">— Совершенно, — хихикал Альтер, — совершенно…</p><p class="p1">Начинали понемногу улыбаться и другие; следовало действовать быстро.</p><p class="p1">— Это значит, — продолжал Остромов, — что Чюрленис получил посвящение от Миколаса Тракайского, больше не от кого! Во всей Литве один Миколас Тракайский обладал трансфизическим обонянием и чувствовал запахи невидимых сущностей.</p><p class="p1">— Подумайте! — воскликнула Мурзина. — Должно быть, настолько неземные запахи…</p><p class="p1">— Разумеется, неземные, — кивнул Остромов, — но если Чюрленис ощутил зловоние… это объясняет все, включая болезнь! Благодарю вас, брат Альтергейм, вы открыли мне тайну гибели литовского брата. Вы знаете, должно быть, что он погиб во внезапном приступе безумия?</p><p class="p1">— Слышал, — кивнул Альтергейм.</p><p class="p1">— Значит, его все-таки не пустили туда, — скорбно сказал Остромов. — Если бы он был допущен… о, какой божественный аромат встретил бы его. Те из вас, кто случайно наделены от рождения трансфизическим обонянием, почувствуют запах, рядом с которым нежнейший из земных ароматов — не более чем запах гнилого болота. Но Чюрленис, вероятно, ощутил серу… и смрад его грехов оказался сильней благодати. Отсюда безумие, бегство… и тайна. Молчите об этом, чтобы не омрачить его памяти.</p><p class="p1">Все потупились и умолкли, как бы чтя память мало кому ведомого Чюрлениса. Неловкость была преодолена.</p><p class="p1">— Приступим теперь к рассказу об истинной природе Стража, — продолжал Остромов, благополучно выпутавшись из преамбулы. — Это древний дух, отказавшийся когда-то шагнуть дальше и теперь предостерегающий всех, чтобы вы также не осмелились ступить за грань; непременным атрибутом Стража служит обширная емкость, для земного глаза как бы чемодан, в которой пребывают оробевшие души. Вы тоже после смерти окажетесь в этом чемодане, если в последнюю минуту повернете назад. Помните: тому, кто не осмелился прямо взглянуть в глаза Стражу порога, — пути назад нет: только в мешок. Когда вы увидите Стража — поворачивать поздно.</p><p class="p1">Он вперился потемневшими круглыми глазами прямо в широко раскрытые данины. «Я не выдержу, — подумал Даня, — я испугаюсь».</p><p class="p1">— Что сказать Стражу порога? — усмехнулся Остромов. — От первых слов зависит, пропустит ли он вас или попытается задержать, нагоняя ужасные видения. Для начала дайте понять, что за плечами у вас уже немалый умственный и метафизический опыт, что вы многое знаете и не дадите запугать себя просто так. Это первое сообщение из трех, которые нужно передать при переходе. Второе: попросите его допустить вас к сокровищам. Не будет греха потребовать, пусть и в сдержанной форме: отдай, о, отдай мне свои сокровища! Не пробуйте угрожать ему, ибо один удар его эго размозжит ваш мозг, как лев расплющивает антилопу, — но твердо дайте ему понять, что за вами стоит могущественная сила. Наша ложа ведет преемство от древнейших французских орденов, вы приходите не с улицы, за вами авторитет людей, чьи истинные имена гремят по Вселенной, — ни на миг не забывайте об этом. Дайте понять, что вы не одни, что с вами лучшие умы, подталкивающие вас здесь, — тут он скромно кивнул, дескать, да, вы поняли правильно, — и ожидающие там, в пространстве вечного освобождения. После этого Страж распахнет перед вами сокровища, которые даже на физическом плане ослепят вас золотым блеском; помните, что сразу после того, как поднимутся завесы, вам следует помедлить перед входом и благоговейно приветствовать братьев, которые уже находятся там, словами, принятыми в нашей ложе: «Я пойду дальше, — об этом вы должны предупредить со всей смелостью, в сколь бы грозном виде ни показался Страж. Это ясно?»</p><p class="p1">— Ясно, — выдохнула Мурзина, — но не могли бы, так сказать, заранее… хоть бегло… В каком виде он принимает обычно?</p><p class="p1">Принимает! Она еще спросила бы про его приемные часы!</p><p class="p1">— Это только ваше, — отвечал Остромов с любезной снисходительностью. — Он может явиться в облике того, кого вы боитесь, или прикинуться тем, кого вожделеете, — это слово он подчеркнул, прямо глядя в выпуклые глаза Мурзиной. — Все зависит от того, что в вас будет сильней — страх или вожделение. Никогда не знаешь, в каком виде он выйдет тебе навстречу. Может явиться хоть в образе трамвайного кондуктора. Говоря о meditatia perpetua<a href="ch2.xhtml#id10" class="a">[17]</a>, я ведь уже имел честь вам объяснить, что при непрерывном напряжении ума вы можете вызвать явление стража в любой момент — хотя бы и по дороге на службу. Первый, кто после начала утренней медитации обратится к вам и попросит назваться, — будет Стражем порога. Помните лишь о трех главных его приметах: во-первых, он неизменно мужского пола. Во-вторых, при нем будет мешок или иная емкость, сопоставимая с ним. В-третьих, у него непременно есть шрам — след поединка с Ахриманом. Страж не пропустил его к истинному знанию, и потому Ахриман остается повелителем сугубо земной материи.</p><p class="p1">— Ахриман? — переспросил Левыкин.</p><p class="p1">— Об этом позже, — со значением пообещал Остромов. Он толком не помнил, что такое Ахриман, помнил только, что плохой.</p><p class="p1">Вообще же он знал, что делает. Если вся его ложа начнет свой день с медитации и предыдущим голоданием в сочетании с бессонницей введет себя в состояние особой легкости, да еще и подышит как надо не менее десяти минут, — любой прохожий, интересующийся, как пройти в какой-нибудь главхрумхряп, будет принят за Стража порога, и вечером все в деталях отчитаются, как преодолели первую ступень. Проблема, конечно, с блеском сокровищ, — но при удачной погоде что же не блестит?</p><p class="p1">Кого это я видел недавно со шрамом, задумался Даня. Господи Боже, да ведь это мой Карасев с Защемиловской. Мужчина, шрам, чемодан… Неужели я настолько продвинулся? Впрочем, каков порог, таков, верно, и страж.</p><p class="subtitle">2</p><p class="p1">Ранним воскресным утром, проголодав всю субботу в буквальном соответствии с указаниями, Левыкин приступил к медитации. Грех сказать, он не очень-то верил в Стража и хотел чистого эксперимента. На улице много народу — каждый полезет с вопросами, пойти отличи, где страж. Кроме того, если речь о сокровищах, которые могут ведь явиться в произвольной форме, вплоть до еды, — что нам за нужда делиться с кем ни попадя? День был превосходный, безветренный, синий и ясный. Чувствуя себя необыкновенно легким, Левыкин уселся посреди комнаты в позу, казавшуюся ему пресловутым «Лотосом», руками дотянул непослушные ноги до отдаленного подобия требуемого узла, и принялся медитировать по остромовской методе.</p><p class="p1">Поначалу ему, как обычно, не представлялось ничего, то есть он видел серую колеблющуюся тьму и полагал, что это занавес, отделяющий его от тонкого мира. Потом под веками стали расплываться вибрирующие круги, и Левыкин понял, что это знак. Далее ему открылся золотистый коридор, то есть это Левыкин так думал, что он открылся. В действительности солнце вышло из-за облака, и под веками Левыкина, сидевшего лицом к окну, стало оранжево. Периодически задерживая дыхание, а потом принимаясь дышать усиленно и глубоко, чтобы окончательно расчистить чакры, ученик увидел, как в глухой золотистой стене отворяется дверь и оттуда выходит некто в чалме. Мысленному взору Левыкина представился слуга из толстой книги арабских сказок, читанных им в одиннадцатом году, на одиннадцатом году жизни. С поклоном он предложил Левыкину бессмертие, после чего исчез. Все это было не то. Не открывая глаз, Левыкин расплел и снова заплел ноги. По нижнему краю черного квадрата забегало что-то вроде кролика, но бессмертия не предложило. Левыкин сосредоточился и принялся считать от ста пятидесяти задом наперед. Явилась мысль о сыре, о большом, ржаном бутерброде. Левыкин отогнал ее. Явилась мысль об окороке. Окорок помахал хвостом перед Левыкиным, но ничего не предложил. Прибегая к последнему средству, Левыкин произнес первую из формул окончательного вызова. Явился небольшой пушистый осел, почему-то розовый. «Я молю тебя оставить твоё убежище и связаться со мной, — обратился к нему Левыкин согласно формуле. — Я приказываю и заклинаю тебя именем Предвечно Всетворящего явиться без шума и зловония, чтобы ответить ясно и понятно, слово за словом, на все вопросы, которые я задам тебе, а если откажешься, тебя принудит повиноваться Власть божественного ADONAY, ELOIM, ARIEL, JEHOVAM, TAGLA, MATRON и целая иерархия высших сущностей, которые заставят исполнить всё против твоей воли. Venitu, Venitu<a href="ch2.xhtml#id9" class="a">[18]</a>, или ты испытаешь вечные муки с помощью Прута Уничтожения». Осел исчез, убоявшись прута. Левыкин задышал глубже. Явился латинист Арсений Степанович и сказал: Левыкин, но ведь все это чушь! Левыкин прогнал его. Страж порога не мог быть латинистом. Дух задерживался. Пора было произносить второе заклинание, но Левыкин не мог решиться, ибо после него оставалось только третье, а в третьем на карту ставилось слишком многое. «Ты упорствуешь, но я не дам воли моему гневу, — начал про себя Левыкин. — Ты непокорен, но я знаю, как смирить тебя. О великий дух, без шума и злоречия явись передо мною, чтобы в понятных и учтивых выражениях отвечать на вопросы, которые волнуют меня, ибо я стремлюсь» — и тут он начал ощущать приближение чего-то, что было страшно и необыкновенно приятно; подобное чувство бывает в подростковом сне перед извержением, — но здесь оно было как бы мозговым, и Левыкин почти не удивился, когда раздался резкий звонок и к двери по коридору прошаркала соседка Самсонова: кого-то она сейчас увидит?</p><p class="p1">Он услышал самсоновское пи-пи-пи и чужое страшное бу-бу-бу. Он не открывал глаз, страстно надеясь, что теперь пронесет, что это все-таки не страж порога, что не мог же всеведущий дух нажать звонок и явиться через дверь, — но тут к нему постучали, и он, в полном соответствии с уроком, повторил: «Venitu, Venitu! In subitum!», столь властно звучавшее в устах Остромова.</p><p class="p1">Дверь отворилась. Левыкин в панике открыл сначала один глаз, потом другой. В иное время он сам бы расхохотался над этим парадоксом, но теперь ему было не до смеха. Перед ним стоял управдом Михаил Ступкин.</p><p class="p1">Трудно было сказать, кто из них больше удивился. Ступкин увидел жильца в одном трико, с полузакрытыми глазами и заплетенными ногами; Левыкин увидел человека, в чью связь с тонкими мирами не поверил бы и в кошмарном сне.</p><p class="p1">Почти не разжимая губ, стараясь передавать мысль телепатически, Левыкин вдумчиво посмотрел на управдома, топтавшегося в дверях, и повторял латинское приветствие, сводившееся к благодарности за визит. Ступкин заговорил первым.</p><p class="p1">— Я все, конечно, понимаю, но меня вызвали, — сказал он, что было сущей правдой. — А вызвали меня, гражданин Левыкин, ваши жильцы, потому что вы ночью свет жжете, нарушая режим экономии, а также курите на кухне, что препятствует…</p><p class="p1">Левыкин окончательно уверился, что перед ним дух. Никто, кроме духа, не мог знать, что он курил в кухне.</p><p class="p1">— Дай мне имеющееся у тебя, — ровным трансовым голосом заговорил Левыкин. — О великий дух, если ты пришел, дай мне то, что ты скрываешь!</p><p class="p1">Видимо, дух не ожидал от Левыкина такой подготовленности, потому что явственно смешался и побледнел.</p><p class="p1">— Что вы говорите? — переспросил он подобострастно.</p><p class="p1">— Я говорю, приказываю и заклинаю: дай мне то, что у тебя в избытке, дабы я смог вернуть это людям. Дай мне свое сокровище, и тогда я не стану мучить тебя.</p><p class="p1">— Какое сокровище, что вы говорите, какое сокровище, — испуганно шептал Ступкин, ретируясь.</p><p class="p1">— Стой, или власть над тобой перейдет ко мне навеки, — предупредил Левыкин. — Ты знаешь, какая власть мне дана, и потому откроешь мне свои тайны еще прежде, чем я прибегну к заслуженным тобою мерам…</p><p class="p1">— Отчего же меры? — тупо спросил Ступкин.</p><p class="p1">— Я тебе говорю, сокровища твои мне давай! — развивал успех Левыкин. — Или я не знаю, что ты скрываешь? Я все знаю, что и где у тебя, в нижнем мире и верхнем! Я давно слежу!</p><p class="p1">— Я минуточку, минуточку, — повторял Ступкин, — я только к себе сбегаю и все вам… Прошу вас пока не сообщать…</p><p class="p1">— Amor, amor, baralamensis, paumachie, apoloresedes, Genio, Liachide! Voco vos! — На всякий случай Левыкин повторил это трижды, чтобы дух далеко не ушел. И действительно, не успел он произнести так называемый Малый магический круг, как Ступкин уже вырос на пороге.</p><p class="p1">— Вот, принес кое-что, — говорил он со сладкой улыбкой. — Со своей стороны могу ли я надеяться…</p><p class="p1">— Если ты дашь мне то, чего я ищу, я не буду делать, чего ты не хочешь, — Левыкин сам поражался гладкости и звучности собственных слов, ему словно диктовали их. Остромовские практики действовали, включались резервы. — Моему слову ты можешь верить, как я поверю твоим знаниям. Откройся же мне!</p><p class="p1">— Вы поймите, — бормотал управдом, — никакого злого умысла… Возьмите в расчет. Наша работа какая? Я никогда ни взяток, ничего. Но тут говорят: пропиши, и я вписал. Вижу, человек порядочный. А что из Луги, так что же из Луги, в Луге тоже люди…</p><p class="p1">Он сбивчиво излагал историю какой-то своей бесчестной прописки, внес кого-то в книгу против правил, разрешил проживание, но не просто же так, люди пристойные…</p><p class="p1">— А она мне: на. Я дома развернул — и вот. На что мне? Вот, возьмите. Там уж на усмотрение. Но только, пожалуйста…</p><p class="p1">Ступкину было что скрывать. У него под паркетом хранилось много чего интересного, и в диване лежало не меньше, так что, жертвуя свертком, он отдавал в малом. Ах ведь, сволочь, подкупила и рассказала. Ничего, он покажет ей теперь племянника из Луги.</p><p class="p1">— А сами, конечно, если заниматься или что, — бормотал он, кланяясь, — если занятия, то без света, конечно, тягостно… Так вы пожалуйста. И если вообще какие обращения, то милости прошу…</p><p class="p1">Он ретировался, не спуская глаз с Левыкина. Счетовод был так потрясен, что словно утратил дар к мимике — на лице его застыло повелительно-грозное выражение. Он мог улыбнуться, сказать — да ладно, чего там, — и тут же испортить все дело; но, к счастью, он сам до того перепугался, что, не расплетая ног, проводил Ступкина гневным взглядом и только через десять минут решился развернуть сверток.</p><p class="p1">Перед ним, скромно посверкивая, лежали пять серебряных ложечек.</p><p class="p1">С этого дня авторитет Остромова в кружке стал непререкаем.</p><p class="subtitle">3</p><p class="p1">Даня, увы, не мог похвастаться успехами вроде левыкинских. Духовная наука не давалась ему. Он мгновенно, со слуха запоминал теорию — истории открытий, имена демонов, — но едва доходило до практики, оказывался бессилен, как перед гимнастическим снарядом. На силу он не жаловался, но подтягивался с трудом, да и по деревьям лазал без особенной ловкости. Духовная наука оказалась сродни гимнастике: тут требовалась не столько ловкость, сколько уверенность в себе. А ее-то у Дани не было.</p><p class="p1">С истинным именем не получилось вовсе ничего: все в кружке уже щеголяли звучными кличками — Абельсаар, Элохим, Люминофор, — а он был и оставался Даниилом. Остромов утешал — что ж, неплохо, знаменитейший из пророков, — но эти утешения лишь растравляли рану. Несколько лучше обстояло с чтением мыслей. Большинство верило не чужой мысли, а собственной догадке, и приписывали собеседнику личные неприличности, раскрываясь чересчур откровенно. Ни одно упражнение так не заставляло выдать свои тайные мысли, как чтение чужих (Остромов знал это давно, использовал без стеснения). Даня честно пытался вслушаться, или, как советовал учитель, всмотреться — «Вам не надо напрягать слух, чужая мысль возникнет в вашем уме как собственная. Может быть, в виде букв, а может, просто как образ. Не гонитесь за словами, ловите смысл. Вот сейчас я отправил вам предельно внятный посыл!» — как же, как же. Даня тряс головой, виновато улыбался и разводил руками: ничего. Учитель ставил его в разные пары — к Мурзиной, к Поленову, — и только однажды, с Савельевой, что-то забрезжило, смутное, как переводная картинка: кот и кошка на задних лапах, вдвоем, бредут по вечерней улице… почему-то им некуда идти… «Но это из моей детской сказки! — вскрикнула Савельева. — Это в детстве я выдумала про кота и кошку, бродячих… Я сейчас совсем не думала об этом!» — «А о чем думали?» — спросил Даня. — «Это теперь неважно. Но как же вы так… почти медиумически!».</p><p class="p1">С тех пор случаи ясновидения не повторялись. Даня жаловался учителю на полную свою бесполезность и больше всего боялся услышать: да, пожалуй, от вас действительно мало толку. Однако учитель лишь кивал добродушно и приговаривал: штука не в том, чтобы найти занятие по нраву, а в том, чтобы наставник вовремя дал толчок. «Уж я почувствую. Или вы во мне сомневаетесь?»</p><p class="p1">Нет, разумеется! И от чтения мыслей Даня переходил к поискам спрятанного.</p><p class="p1">Это был любимый урок Остромова, позволявший ему не только развлечься, имитируя обучение тайнознанию, но и понять об учениках кое-что главное. Разумеется, все они были полулюди, ударенные по голове чувством полной собственной невостребованности, не просто бывшие, а смирившиеся с бывшестью, — но кой-какие качества у них оставались. Они не могли уже сопротивляться, управлять ими было одно удовольствие, и вообще они напоминали срезанный цветок, а Остромов был, стало быть, ваза с водою. Вот они там цвели обреченным, вянущим цветом, но, как у цветка остается запах, у них оставалась память, знание языков, навыки счета. Любопытно было проследить, что отмирало. Первым пропадало чувство правоты, raison d’etre, право быть, — и вместе с ним, вот странность, интуиция. Верно, она тесно связана с землей, хтоникой, а когда нет земли — нет и догадки, и предчувствия.</p><p class="p1">Сам Остромов находил спрятанный предмет с необычайной легкостью, с детства, но это была не интуиция, о нет. Связи с почвой у него никогда не было, он в почве не нуждался, как не нуждается в ней прекрасный цветок омела, вечноюный, вечнозеленый. Омелу любят звать паразитом; пусть так думают дураки и ничтожества, глубоко укорененные в почве, имеющие дело с грязной, сырой землей. О нет! Омела — существо иного, высшего порядка, растущее на других деревьях, только для того и годных, чтобы на них росла омела. В зимние дни, всегда столь невыносимые на юге, когда сыро, тускло и тухло все, от гор до кипарисов, — на одном отдыхает глаз: на вечнозеленом, глянцевом шаре омелы! Словно гнезда неведомых птиц, круглятся на ветках скучных тополей, безлистых платанов эти веселые сплетения, полные жизни, сока, очарования. Они не зря целебны. Они лечат от всего, прежде же всего от половой слабости. Георгий Иваныч употреблял профилактически этот горький ароматный сок, ядовитый в больших количествах, целебный в малых. Еще хорошо с вином. А про паразитизм — ах, оставьте. Дубы и липы что же, работают? Точно так же сосут из почвы, ну, а омела сосет из дубов — так разве есть у дуба иная цель, кроме как служить проводником вещества для омелы, лучшего из растений, не зря получившего совершеннейшую шаровидную форму? И семена ее переносят не скучные ветра, а веселые птицы.</p><p class="p1">Так вот, как благородная омела, не нуждающаяся в корнях, Остромов для интуиции не нуждался в привязке к почве, городу, классу. Он презирал родной город и не помнил его. О родителях он мог бы сказать только, что они были. Каждый сам себя сделай, а от данностей не завись. Весь кружок жил воспоминаниями, а у Остромова их не было — каждый день он выдумывал себе новые и до вечера верил. Чтобы найти спрятанное, ему нужна была не интуиция, не пошлые подземные токи и смутные догадки, а та мгновенная способность связать и сообразить, которая и есть вдохновение. Кто прячет? N и M. Мы обоих знаем. N натура более сильная, а потому победит его решение. Он сторонник глупой теории, что лист надо прятать в лесу; умные знают, что спрятанный лист не чета обычному. Он положит на видное место, но в последний момент, не доверяя себе, стыдливо замаскирует. Где у нас тут видное место? Отчего-то глаза всех прячущих всегда обращаются на светильник как на самое яркое пятно: вот у нас лампа в виде сидящего амура, а вот и бронзовая брошь, прислоненная к бронзовому же подножью амура, чтоб сливалось. Пошлость, убожество! Пошлей было бы только засунуть брошь в карман одного из висящих за дверью макинтошей.</p><p class="p1">Даня, как ни удивительно, рассуждал сходно, — да и любой бы так, тоже мне тайны, — но, в отличие от Остромова, никогда не умел остановиться. Он видел слишком много вариантов, слышал десятки перекрикивающих друг друга голосов и не знал, к какому прислушаться: самому наглому? Самому тихому? Вроде бы ясно, что брошь должна лежать на видном месте; но это мысль плоская, наверняка сыграют на очевидности и положат подальше, скажем, в диван. Но поскольку сама мысль копаться в диване — очевидная пошлость, и тот, кто копается, будет смешон… А что, если кто-то из них хочет видеть меня именно смешным? Нет, не верю; учитель ко мне сегодня особенно ласков, и, может, брошь — с намеком — в книгах? Он всегда корит меня книжностью, так, может быть, там? Иногда вся эта сложная цепочка приводила его к истине, и он находил брошь, блокнот или бумажник (Остромов утверждал, что чутье на деньги — особый род интуиции, презирать их глупо, деньги — кровь мира); но чаще он при общем хохоте усложнял элементарное, обшаривая то карнизы штор, то плинтусы. А брошь лежала в его кармане — подкладывать Остромов был мастер.</p><p class="p1">Однажды, в полном отчаянии после неудавшейся встречи со стражем, Даня спросил учителя напрямую:</p><p class="p1">— Если у меня нет мистических способностей, может, мне не стоит… я имею в виду…</p><p class="p1">Остромов наслаждался его смущением и не собирался помогать.</p><p class="p1">— Может, мне покинуть кружок и не занимать чужое место? — выговорил он наконец.</p><p class="p1">— Какое вы еще дитя, Даня, — усмехнулся учитель. — Чужого места нет. Если вы здесь, у меня, — значит, это и есть ваше место.</p><p class="p1">Даня просиял, и Остромова передернуло. Он терпеть не мог этой детской радости. Двадцать лет человеку, а он, как щенок, повизгивает от восторга всякий раз, как его не прибили.</p><p class="p1">— Кроме того, — продолжал он важно, — мистические способности… Это так часто бывает обольщением. Вальтасар Мадридский предупреждает: бойтесь бесовских подсказок. Инесса Гентская о том же: опасайтесь снов и видений. Что, если ваши способности глубже, если вы историограф духовной науки, хроникер хотя бы и нашего кружка? Ведь вы пишете?</p><p class="p1">— Еще нет, — признался Даня.</p><p class="p1">— Ну и отлично, нужно время. Однако когда я почувствую, что вы не нужны, — или, точней, что вам все это больше не нужно… Я сам вам скажу.</p><p class="p1">— Хорошо, — сказал Даня. — Спасибо. Я хотел еще попросить… нам заплатят только в четверг, там какая-то задержка… я сегодня без взноса, но в пятницу, честное слово…</p><p class="p1">— Экая чушь, — снисходительно сказал Остромов. — Вы знаете, что для себя мне ничего не нужно. Я хотел только закупить нитрата серы, совершенно необходимого для одной гадательной акции. В пятницу малое затмение, и я ожидаю я в л е н и я…</p><p class="p1">Но того явления, которое явилось, он, разумеется, не ожидал.</p><p class="subtitle">4</p><p class="p1">Впрочем, до пятницы бывает четверг, а в четверг у него назначен был отчет у Райского — как договорились, раз в две недели.</p><p class="p1">Чтобы сразу снять вопрос, ответим: нет. В этом не было ровно ничего постыдного. Если бы среди них встретился хоть один человек с полетом, с огнем, без постылых ограничений, без червоточины, — он бы задумался, выделил, поставил, может быть, за себя; но все они были на одно лицо — безнадежно привязанные к дому, уязвленные мещане, скорбевшие не о крахе России, не о потере денег даже, это бы он понял и уважал, — но ведь у них сроду не было денег. Они утратили иное, о чем и жалеть не стоило, — привязь, сознание того, что и завтра, и послезавтра жизнь пойдет привычнейшим, невыносимым для живого человека путем. Одни тосковали от утраты службы, другие — по безопасности; жизнь их была поездом, следовавшим по расписанию, но черта ли в такой жизни? И потому Остромов легко смотрел на этих насекомых и того легче — на рутинную, почти гигиеническую процедуру, которую осуществлял на улице Красных Зорь, в стерильной комнате, где товарищ Райский под его началом в личном порядке обучался бессмертию.</p><p class="p1">Первая половина их встречи проходила при полном преимуществе Райского. Остромов докладывал спокойно, деловито, без подобострастия. Потом все перевертывалось, как карта. В первой половине, в приемной, Остромов был валет. Во второй, в комнате с опущенными шторами, король.</p><p class="p1">— Здравствуйте, здравствуйте, — бодро говорил Райский. — Что же, приступим.</p><p class="p1">— Велембовский, военная академия, — говорил Остромов, суховато поздоровавшись. — Сочувствие объединенной оппозиции. Высказывался в том смысле, что давно пора было в первую очередь развивать тяжелую промышленность, а также надавить наконец на деревню. Положительные отзывы о Пилсудском, утверждение, что в двадцатом году Пилсудский хорошо показал выскочкам вроде Тухачевского.</p><p class="p1">Райский бегло конспектировал.</p><p class="p1">— Мосолова, секретарь на заводе Козицкого, — продолжал Остромов, почти не глядя в свои записи, демонстрируя мощь свободного, правильно устроенного мозга. — Разговоры о бытовом разложении заводского руководства с примерами, подтверждающими, надо сказать, эти слова… Безобразное пьянство, факты приставания. Правда, считает при этом, что человек без образования иначе себя вести не может, а сейчас все так. В трамваях тоже безобразно, и в кино не пойти. Вообще озабочена половым вопросом, ищет партнера, но все не по ней.</p><p class="p1">— Фамилии разложенцев называла? — деловито спрашивал Райский.</p><p class="p1">— Нет, но можно понять, что речь о директоре и о руководителе, я это не знаю, человек, проводящий собрания…</p><p class="p1">— Это называется парторг, — пояснял Райский назидательно.</p><p class="p1">— Что же, — говорил Остромов, — я изучил каббалу, изучу и это… Далее: Бражников. Преподаватель начертательной геометрии на математическом факультете. Этот осторожен, но брюзжит, что человеку со способностями невозможно поступить. Принимают черт-те по каким принципам. На лекции невозможно смотреть в зал. Высказывался, что преподаватели массово недовольны.</p><p class="p1">— Фамилии? — быстро осведомлялся Райский.</p><p class="p1">— Ну, какие же фамилии… Я говорю, он крайне осторожен.</p><p class="p1">— А вы бы расспросили!</p><p class="p1">— Я еще более осторожен, — тонко улыбался Остромов, и в ответ улыбался Райский. Почерк у него был мелкий, записи он вел по системе вроде стенографической, личного изобретения, и ею гордился.</p><p class="p1">— Ну-с, Мартынов, — продолжал Остромов. — Тут, пожалуй, ничего особенного, кроме легкого ворчания, что в науке сейчас больше карьеристов, что критерий утрачен…</p><p class="p1">— Вы должны быть со мной абсолютно откровенны, — напоминал Райский.</p><p class="p1">— Ну, критикует, конечно, руководство университета — но не по политической линии.</p><p class="p1">— Сейчас ничего неполитического нет.</p><p class="p1">— Я это учту. Чупрунов, киномеханик Севзапкино. Герой гражданской войны и все время говорит, что не за то боролись и все продали.</p><p class="p1">— Что именно продали? — уточнял Райский.</p><p class="p1">— Искусство несвободно, а человек труда беден.</p><p class="p1">— Очень любопытно, — кивал чекист. Дело пахло заговором и повышением, но пока заговор не вытанцовывался. Говорили о том же, о чем и в очередях. Правда, в очередях собирались не за этим, а здесь налицо была организация. Настораживало Райского только то, что сам же он эту организацию и создал, как минимум благословил, — но если сам и разоблачит, это соображение можно будет не брать в расчет.</p><p class="p1">— Блинов, типография имени Радищева, — вспоминал Остромов. — Жалобы на бытовые условия, живет с женой, тремя детьми и престарелой матерью в одной комнате, говорит, что десять лет назад не выдержал бы в этой комнате и часа… Львов-Тараненко, счетовод в коммуне «Севкустарь»: с неодобрением отзывался о переносе столицы в Москву. Говорит, что Петербург может быть либо столицей, либо ничем, и почти уже ничто.</p><p class="p1">— Москва, значит, нехороша ему? — понимающе улыбался Райский. Остромов только кивал.</p><p class="p1">— Сколько же этих недобитков! — говорил Райский.</p><p class="p1">— Я удивляюсь, — пожимал плечами Остромов. — Как вы хотите, чтобы их не было? Только мы, масоны, да некоторые поэты — всегда чувствовали, что переворот неизбежен, а прочим надо еще привыкать к новой жизни… Все непросто для узкой души. Потому-то я и осмелился предложить кружок под вашим наблюдением, что это наилучший способ держать на виду и, так сказать, в узде…</p><p class="p1">— Что же, я не возражаю, — кивал Райский.</p><p class="p1">Остромов перечислял всех. Называл он и Надежду Жуковскую.</p><p class="p1">— Эта мне пока непонятна, — говорил он. — Слишком молода и, кажется, простовата, но надо присматриваться. Там могут, знаете, водиться черти.</p><p class="p1">— Студентка?</p><p class="p1">— Да, медицинского факультета. Пока ничего, кроме замечаний о том, что преподаватели особо придирчивы к бывшему классу и, наоборот, снисходительны с рабфаком.</p><p class="p1">— А она чего бы хотела? — усмехался Райский. — Чтобы наоборот? Было уже наоборот… Ну, благодарю, товарищ Остромов. Теперь — к занятиям?</p><p class="p1">Он откладывал папку, и они шли в соседнюю комнату, где вновь усаживались для беседы — только за столом на этот раз был Остромов, а у стола — Райский. Остромов сразу понял, что инициация Райского для обретения бессмертия возможна только в форме допроса — других разговоров он не понимал; но теперь допрашивал Остромов.</p><p class="p1">— Вы должны быть со мною совершенно откровенны, — говорил он.</p><p class="p1">Райский сокрушенно кивал, как ребенок, укравший сливу. Остромов поражался стремительности происходившей с ним перемены: вместо недавнего повелителя миров перед ним сидел покорный ученик, сжавшийся, опустивший глаза.</p><p class="p1">— Мы пойдем сегодня глубже в детство, — говорил Остромов. — Остановились мы, кажется, на вашем бегстве из дому? Скажите, чем вас притягивал Петроград?</p><p class="p1">— Я ненавидел Могилев, — признавался Райский. — Видеть не мог родителей. Мысль, что там жизнь пройдет… знаете…</p><p class="p1">— Я это вижу, — требовательно говорил Остромов. — Глубже. Вспомните.</p><p class="p1">— Глубже… — говорил Райский озадаченно и закрывал глаза. — Вижу… знаете… вижу почему-то себя на коне, и за мной конница.</p><p class="p1">— Мундиры? — требовательно спрашивал Остромов. — Цвет мундиров, покрой?</p><p class="p1">— Синие, — кряхтя от усилий, воображал Райский. — Кажется, синие…</p><p class="p1">— Не задумывайтесь, говорите первое, что пришло в голову. Мозг знает, что ему вспомнить. Знаете вы историю взятия Могилева французами весной 1812 года?</p><p class="p1">— Только слышал, — настороженно признавался Райский.</p><p class="p1">— Маршал Даву был легко ранен, — небрежно пояснял Остромов. — Он первым въехал в город во главе конницы, получил ранение и с тех пор ненавидел эти места. Вы поняли теперь, почему ненавидели Могилев?!</p><p class="p1">— Понял, — бормотал Райский. — Значит… Значит, Даву?</p><p class="p1">— Я догадывался давно, — торжественно говорил Остромов. — Этот рост, эту посадку головы ни с чем невозможно спутать. Князь Экмюльский, железный маршал, ни одного проигранного сражения! Понимаете ли вы сейчас, откуда в вас этот дар, эта способность повелевать людьми?</p><p class="p1">— Чувствую, — лепетал Райский.</p><p class="p1">— Эти приступы кашля? Эти припадки слабости? Ведь Даву умер от туберкулеза.</p><p class="p1">Райский закашливался.</p><p class="p1">— Теперь напрягите все силы вашей прапамяти! Я обращаюсь к вам, маршал, на языке вашей Родины! Экуте, марешаль, вотр дивизион э гран тралала буатэ резон па ревеню буазье кретейе! Курье, сотье, марье! Репонде-муа!<a href="ch2.xhtml#id8" class="a">[19]</a></p><p class="p1">Остромов помнил гимназический курс, но слабо. До того ль, голубчик, было.</p><p class="p1">Райский мучительно допрашивал прапамять.</p><p class="p1">— Трампе, — отвечал он наконец. — Артикль де Франс, савон де Марсей, ланжери де Лион, тетер вотр нез! Ан пти кадо пур ву!<a href="ch2.xhtml#id27" class="a">[20]</a></p><p class="p1">Это была невозможная смесь могилевских вывесок, слышанных в детстве французских слов и собственных представлений о том, как говорят французы.</p><p class="p1">— Знаете ли вы, понимаете ли вы сами, что вы сейчас сказали?! — торжественно провозглашал Остромов.</p><p class="p1">— Нет, я… я не понимаю…</p><p class="p1">— Я удивляюсь! — восклицал Остромов. — Я удивляюсь! Еще бы вы понимали! Это говорит самая глубина вашей памяти, та, куда не досягнуть рассудку. Вы сказали: «Солдаты! Франция ожидает от вас львиной отваги и лошадиной быстроты!»</p><p class="p1">— Аллон, аллюр, — бормотал Райский.</p><p class="p1">— Довольно. Откройте глаза, — требовал Остромов. — Слишком долгое пребывание в тонких мирах может оказаться фатально. Теперь мне нужно знать то, чего вы не говорили еще никому. Я интересуюсь вашим первым разом.</p><p class="p1">Райский уставился на Остромова в упор. Он не понимал, как относиться к этому человеку.</p><p class="p1">— Есть вопросы, которых чекисту не вправе задавать никто, — сказал он решительно.</p><p class="p1">— Ах, Господи, какие мы нежные! — воскликнул Остромов с учительской фамильярностью. — Хорошо, не рассказывайте. Я расскажу вам сам. Она была из магазина напротив, так?</p><p class="p1">— Не она, а он, — решительно поправил Райский.</p><p class="p1">Черт-те что, подумал Остромов. Мир сошел с ума. Вот кого надо было к Неретинскому.</p><p class="p1">— Я никогда не стрелял в женщин, — с достоинством пояснил Райский. — А он был в заговоре, это было доказано, он все признал. Он обозвал меня тварью. Он сказал, что у него бы рука не дрогнула.</p><p class="p1">Однако, подумал Остромов. Я и забыл, что у этих совсем иное представление о первом разе.</p><p class="p1">— Разумеется! — воскликнул он. — Разумеется, у Марка Красса не дрогнула бы рука! Всмотритесь глубже! Слышите этот рев?</p><p class="p1">— Не слышу, — отвечал потрясенный Райский.</p><p class="p1">— Антоний, Клеопатра приветствует тебя! — завопил Остромов. Он понятия не имел, с какой стати Клеопатра ревет и какое отношение имеет ко всему этому Красс, но действовать надо было быстро.</p><p class="p1">К пятому занятию Остромов назвал всех, подробно указав грехи каждого, истинные и мнимые, а Райский в своей регрессии дошел до Авраама и воочию убедился, что смерти нет.</p><p class="subtitle">5</p><p class="p1">В пятницу, после явления и пророчеств Вальтасара Мадридского, чертившего знаки по бумаге при помощи сульфата натрия и чего там еще полагалось, жарким и светлым июльским вечером Даня провожал Мартынова, и тот предложил зайти. Мало с кем было Дане так легко и весело, и он согласился, впервые не боясь, что кому-то навязывается. Видно было, что Мартынов делает только то, что хочет, — и если с кем скучает, того не позовет.</p><p class="p1">Он жил в удивительном здании, и в каком еще здании мог жить Мартынов? Это была круглая башня, нечто вроде обсерватории; тем странней казалось, что она расположена в ботаническом саду на Аптекарском острове.</p><p class="p1">— Тут была лаборатория Валевского, — пояснил Мартынов небрежно, словно имя Валевского известно было всей мыслящей России.</p><p class="p1">— А я и не слышал про него совсем, — честно сказал Даня.</p><p class="p1">— А, про него мало кто слышал. Он проращивал вавилонскую пшеницу. Удивительный был человек. Меня позвал надписи читать. Кольдевей ему прислал кувшин, найденный в раскопках, и три таблички. Одна в плохой сохранности, а две в отличной.</p><p class="p1">— И что там было?</p><p class="p1">— Да как обычно: я, Ашшурам-аппи, насадил эту пшеницу в особенном месте, огороженном тремя глиняными стенами и двумя деревянными, облитыми медными пластинами, и далее три заклятия, чтобы никто не вошел без спросу. Кто-то из местных магов — у них же знаете как было, в Вавилоне? Свои селекционеры, как положено, только они ничего ни с чем не скрещивали. Была теория, что растение реагирует на среду, и считалось, что пшеница особенно пуглива. Надо защищать, стены ставить… Этот Ашшурам-аппи считал, что если поставить две стены, а не три, получится другой сорт.</p><p class="p1">— А Валевский?</p><p class="p1">— Валевский тоже так считал. То есть он допускал, что может быть реакция на внешние факторы. Пел, патефон заводил. Установил якобы, что рододендрон быстрее растет под Вяльцеву. Ну и позвал меня, чтобы я перевел, сколько там стен и какие заклинания.</p><p class="p1">— И что, выросла? — замирая, спросил Даня.</p><p class="p1">— Проросла, — кивнул Мартынов. — Ничего особенного. Не от стен же зависит, в самом деле… Правда, он говорил, что раньше — без стен — не всходило. А я думаю, он просто поливал плохо… Ну вот, а потом он уехал, выпустили лечиться. Не вернулся, конечно. А меня сюда записал смотрителем — я теперь и живу, удобно.</p><p class="p1">— А пшеница? — спросил Даня, надеясь увидеть всходы древних зерен. Он был уверен, что заметит в них нечто особенное, хотя не отличал пшеницу от ржи.</p><p class="p1">— Он в теплицу передал. Говорит, что в моем присутствии она как-то лучше росла — может, узнавала специалиста, — Мартынов хохотнул и принялся заваривать чай в глиняном чайнике, тоже, вероятно, повышенной древности.</p><p class="p1">— Я давно хотел спросить, — начал Даня, смущаясь, — какая, собственно, ваша тема, потому что знал одного ассиролога, и вы, может быть, тоже его встречали…</p><p class="p1">— Шилейку? — немедленно угадал Мартынов.</p><p class="p1">— Как вы поняли?</p><p class="p1">— А он как-то получился единственный, которого знают все. Плод — яблоко, поэт — Пушкин, ассиролог — Шилейко. Знаю, конечно, кто же не знает. Бывают такие люди — их в Вавилоне называли «тянущими». Вошел — и все на него перетянулось, на других не смотрит никто. Но он действительно универсал — где мне. Моя тема узкая.</p><p class="p1">— А какая?</p><p class="p1">— Я занимаюсь тремя пунктами законов Хаммураппи, с двадцать первого по двадцать третий, — с милой важностью сказал Мартынов, разливая черный чай.</p><p class="p1">— И давно? — полюбопытствовал Даня.</p><p class="p1">— Шесть лет, с третьего курса.</p><p class="p1">— Господи, что же там такого сложного? Это же, наверное, пять строчек…</p><p class="p1">— Семь, — уточнил Мартынов. — В русском переводе семь, в клинописи три. Там запись короткая, без гласных.</p><p class="p1">— И в них вся мудрость?</p><p class="p1">— В них про миктума. Пункт двадцать первый — за убийство миктума взимается пятьдесят сиклей серебра (за убийство раба, кстати, владельцу платили один, за рабыню два, за вольного гражданина двадцать). Пункт двадцать второй: миктума нельзя удерживать, когда он уходит, его нельзя отобрать, но можно дать. Пункт двадцать третий: после того, как дело сделано, миктума можно уступить, но нельзя награждать.</p><p class="p1">— Замечательно, — сказал Даня в задумчивости. — Очень таинственно.</p><p class="p1">— Вот и я про то.</p><p class="p1">— И кто такой миктум?</p><p class="p1">— А как вы думаете?</p><p class="p1">— Вероятней всего, это какой-то особо умелый рабочий, — предположил Даня, страшась ляпнуть чушь.</p><p class="p1">— Умелый? — усмехнулся Мартынов. — Близко… Почему же, вы думаете, его нельзя отобрать?</p><p class="p1">— Ну, потому, что он только сам может принять решение…</p><p class="p1">— А дать почему можно?</p><p class="p1">— Не знаю, — сдался Даня. — Вы догадались?</p><p class="p1">— Я не догадался, а вычислил. Все-таки наука. Хотя половину и приходится восстанавливать гадательно.</p><p class="p1">— Подождите, — попросил Даня. — Может быть, я додумаюсь. А где-то еще этот миктум упоминается?</p><p class="p1">— Есть немного. Это только запутывает дело. Есть, скажем, проклятие врагу — чтобы в делах его ему никогда не встретился миктум. Но есть и благопожелание другу — чтобы в опасных замыслах врага его всегда был миктум.</p><p class="p1">— Я, кажется, догадываюсь, — сказал Даня через пару минут сосредоточенного прихлебыванья деготно-черного мартыновского чая. — Чур, не издеваться, если мимо.</p><p class="p1">— Да тут двести лет голову ломают, — усмехнулся Мартынов. — Валяйте. Все на поверхности, просто они ведь все были марксисты — что у нас, что там. Искали экономическую нишу: наемный рабочий, особая категория свободных, раб, отпущенный за спасение… А это вещь не экономическая — что, угадали теперь? Я уж все подсказал, кажется.</p><p class="p1">— Да, да. Я сразу понял, что не экономическая. Это, мне кажется, знаете что? Это даже и не работник, — Даня говорил все быстрее, как всегда, когда подыскивал формулировку. — Это вот у нас до революции был в Судаке работник, его потом убили. И любая семья, куда он приходил, начинала развиваться быстрей обычного. Иногда это кончалось разводом, а иногда, наоборот, дети и все такое… То есть не то чтобы дети от него, — быстро опомнился он, увидев улыбку Мартынова. — Получается черт-те что, я не то имел в виду. Но просто это такой человек, который все ускоряет, и работа при нем идет…</p><p class="p1">— Ну, ну, Даня! Почти в яблочко.</p><p class="p1">— То есть… — медленно заговорил Даня, изумляясь тому, как за минуту, хоть и с подсказкой, нашел то, над чем другие бились десятилетиями. — То есть это такой человек, при котором все идет лучше?</p><p class="p1">— Да, конечно. Почти то самое. Человек, который катализирует любой процесс. Это как в химии, вы же химию знаете?</p><p class="p1">— Очень слабо, — признался Даня. — Но катализатор — да, знаю.</p></span></span>
