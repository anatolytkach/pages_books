<span><span><p class="p1">— Это? Нет, я это на Измайловском, 14, иногда читаю, у меня там второе место постоянное. На углу. Уже и любители образовались, целый кружок. Слушайте, я знаю теперь, как делается искусство, то есть я всегда знал. Я еще когда проклятых переводил — ведь вы понимаете, чтобы переводить проклятых, надо быть проклятым! И я стал. Говорили, я французского не знаю. Верно, не знаю. Я знаю универсальный язык падали! Они у меня все, все заговорили настоящим языком! Но «Я пал в навоз и обосрался» — Бодлер не сказал бы, нет. Вы околели, собаки несчастные, я же дышу и хожу! Крышки над вами забиты тяжелые, я же на небо гляжу! Вы так можете сказать? Не можете, потому что вы тоже сволочь, с вас надо шкуру содрать, а бить меня нельзя, вы не смеете бить старика, припадочного инвалида…</p><p class="p1">— Да какое бить, — сказал Льговский. — Это вы, что ли, шкуру сдирать будете?</p><p class="p1">— Я, и еще у нас есть двое! — орал Одинокий. — Меня сейчас будут печатать знаете как? Меня никогда не посадят! Всех посадят, меня не посадят, я им нужен. Стоит интеллигентный человек и руку протягивает, поди плохо? Купи книгу, сволочь! — отвлекся он на прохожего, в ужасе отшатнувшегося чуть не к самому парапету.</p><p class="p1">— Ладно, — сказал Льговский. — Вот вам, — он бросил в шапку лиловую пятирублевку.</p><p class="p1">— Что так мало? Продался, сволочь, зажрался… — беззлобно выругался Одинокий, пряча купюру в карман черного бесформенного пальто. — В хозяева попал… Я тебя помню в ботах дырявых в коммуне вашей, вы все за пайком побежали… Сейчас я один поэт, в «Вечерней красной» всех утопчу в навоз, я напишу, сколько ты дал поэту…</p><p class="p1">Почему-то после этой встречи Льговскому полегчало, хоть он и обозлился сначала, увидев Одинокого. Он вспомнил, как лучший из братства, съездив в Питер ради трех триумфальных вечеров, рассказывал о нем в ужасе, с гримасой испуганной брезгливости на округлом смуглом лице: «Только не это… Что угодно, но не Одинокий!». Льговский тогда тоже испугался — неужели это грозит? Но теперь понял, что не грозит: с этим надо родиться.</p><p class="p1">Страшней было другое — что Одинокого в самом деле никогда не тронут: посадят всех, в том числе вернейших, — а этот, как памятник бессмертной, неприкосновенной низости, образцовый минус, от которого станут отсчитывать все, будет стоять у себя на Измайловском, 14, или где он еще там стоит в центре своего кружка… Он переживет всех и останется, может быть, последним, округлый, нечесаный, страшный, пахнущий сырым мясом. Время благоприятствовало теперь ему, ибо все остальное не вышло, а Одинокому была самая пора. Льговский пролистнул книжку. «И Ленин недвижно лежит в мавзолее, и чувствует Рыков веревку на шее». Это можно, за это ничего не будет — что такое Рыков? Он понял наконец, в чем корень тоски, больной зуб, и в этом было облегчение: да, девятнадцатый год был не ахти мирен и человечен, но девятнадцатый год был временем для человека в полном значении, вытянувшегося в полный рост, и в девятнадцатом можно было дышать. Двадцать шестой был временем Одинокого, и не было оснований надеяться, что это изменится.</p><p class="p1">Он думал выбросить книжку, но сунул в карман пальто, тоже черного, тоже бесформенного. Потом подумал и швырнул в грязную Фонтанку пальто вместе с книгой. Способность к жесту — великая вещь; и он повеселел еще больше.</p><p class="subtitle">4</p><p class="p1">В «Красной» Льговского ждали Стечин, Барцев, Женя, Лика Гликберг, еще трое буквалистов и прилепившийся Альтергейм. Льговский любил их. Он знал, что все значительное делается в братствах и цехах, не потому, что братства и цехи сами по себе гарантируют литературу, а потому, что значительны причины, их порождающие. Литература появляется там, где у студентов есть потребность собраться и говорить. Она умирает там, где такая потребность появляется у стариков. Молодые собираются от силы, старики — от слабости. Будущее было за бубуинами — обществом будущего буквального искусства, сокращенно обубуи. Они были те буи, за которые надо заплыть, и то буйство, без которого ничего не начинается.</p><p class="p1">Даня сидел в комнате запаздывающего Кугельского и с удивлением наблюдал, как сходятся интересные люди: высокий, толстый молодой человек в клетчатых штанах, еще более высокий, но менее толстый в очках и с медно-рыжей головой, один маленький, остроносый и бледный, один джентльмен, строгий и брезгливый, франтоватый, но с нарисованной на щеке нотой «ля». Слева к ней было приписано маленькое «о». Вероятно, франтоватому нравилась Оля. Девушка была среди них только одна, крошечная и страшно сосредоточенная. Она сидела на стуле, переплетя ножки в белых носках и темно-синих сандалиях, и слегка этими ножками покачивала. При ней была французская книжка. Автора Даня не знал.</p><p class="p1">Льговский вошел стремительно, как человек, бегущий откуда-то, а не куда-то. Такого впечатления он не хотел. Он хотел, чтобы его стремительность воспринималась как устремленность.</p><p class="p1">На бубуинов это не действовало. Бубуины уже знали, что спешить некуда. Льговский этого не понимал. Люди тринадцатого года всю жизнь бегали, уверенные, что где-то происходит главное. Бубуины никогда не бегали. Стечин говорил, что уже греки поняли высший смысл лежания и преимущество его перед сидением, сидения — перед стоянием, а стояния — перед ходьбой.</p><p class="p1">Он не сразу заметил Зильбера, единственного серапиона, пришедшего его приветствовать. Зильбер был ему неприятен, но хорош. Он был порядочный мальчик из порядочной семьи, женатый на сестре Юрия: вошел в круг дуриком, но вел себя достойно. Было видно, что из него вырастет дюжинный, но честный писатель с репутацией. Льговский знал, что у него самого есть талант и будет слава, но никогда не будет репутации. Он не любил за это Зильбера, хотя следовало не любить себя, — но если не любить себя, что же напишешь? Приходится вымещать.</p><p class="p1">Льговский не поздоровался. Он бегло кивнул всем сразу и заговорил.</p><p class="p1">— Я прочел, — сказал он. — Интересно. Разговор должен быть в вашем жанре: вы свое, я свое. Вы правы, что прямой диалог закончился. Это давно, но стало острее. Нет единого языка. Раньше были общие слова, я помню, они были на всех, и на них можно было говорить. В седьмом году они брались из воздуха, в двенадцатом — из журналов, а в восемнадцатом — из газет. Сначала это могло быть слово «туман», потом слово «балаган», потом «вы-со-бу», а потом «экспроприация». Но сегодня слова нет, хотя его вдувают в уши. Сегодня говорят «индустриализация», но это слово не для всех, потому что тот, кто его говорит, — не верит. Сегодня говорят те, кому нечего сказать, а остальные молчат, потому что говорить не на чем. Собственно, это было понятно уже во время «вы-со-бу», но тогда надеялись, что будет «экспроприация», а после нее на вы-со-бу заговорят все. Вместо этого стало слово «лориган».</p><p class="p1">— И хулиган, — лениво добавил Барцев.</p><p class="p1">— Сегодня слов нет, есть интонация, — осторожно сказал Альтергейм. — Она у всех общая, сказал и оглядывается, поняли ли. Все кивают или моргают.</p><p class="p1">— Есть и слова, но такие, что специально не значат, — пояснила формалистка Гликберг. — Все говорят «фактически», «буквально». Общие слова остались, но принадлежат к служебным частям речи, как если бы рабочих нет, а остались служащие.</p><p class="p1">Льговский улыбнулся. Гликберг была лучшей ученицей.</p><p class="p1">— Нам сейчас платят за то, чтобы мы не работали, — сказала она, — то есть занимались не своим делом. Паша делает тут детское приложение, будет два журнала, и пишет хронику. Валя пишет про европейские забастовки. Пишут они глупости, но почему-то надо, чтобы они не писали свое. Я не понимаю, почему.</p><p class="p1">— В общих чертах понятно, — сказал Стечин. — Мы должны были умереть, но не умерли. А после смерти заниматься своим делом нельзя, там вам подберут другое занятие.</p><p class="p1">Льговский это понимал, но говорить это вслух казалось ему предательством. На самом деле предательством было то, что все уже понимал не он один. Он привык говорить первым. Многие не понимали, почему он молчал и даже писал сценарии. Но умирать Льговский не планировал, это не входило в его картину мира. Еще не все было сделано. Если бы говорить вслух, пришлось бы сказать, что революция ничего не смогла предложить; что она помогла добить умирающего, но ничего нового не дала. Или, если уж договаривать, в том, что она придумала, невозможно оказалось жить. То, в чем они теперь жили, было смесью невозможного, на глазах устаревавшего и сдававшегося нового — и того худшего, что было в старом; того, что оказалось недостойно даже смерти. Долго так было нельзя. Стихи бубуинов были об этом же, и теми же средствами: футуризм ямбом, худшее из нового — в формах самого живучего старого. Он не знал, как к этому относиться. Вероятно, это не было хорошо в том смысле, в каком хорош был начинающий Корабельников или весь Мельников, но прежнее «хорошо» ни на что уже не годилось. Теперь хорошо было то, что выражало эту новую странную полужизнь, и бубуины справлялись лучше всех.</p><p class="p1">Говорить все это вслух было нельзя потому, что все это понимали, и потому, что встречались в «Красной», а другого времени у него не было. Он приехал на два дня, вечером его ждали ровесники, а утром был диспут. В шесть был обратный поезд, добирающийся в Москву к одиннадцати. В двенадцать ему надо было уже докладывать на студии заявку о летающем мужике. В замысле все было отлично, а в сценарии сразу становилось ясно, что никакой мужик никуда не летал. По сравнению с этой невозможной жизнью любой прежний вымысел был недостоверен.</p><p class="p1">— Я думаю, — сказал Барцев, совсем не изменившийся, то есть изменившийся в главном, буквально и непонятно потерявший невесту, и потому так страшны были его прежняя толщина, невыцветшая рыжина, — я думаю, что надо сейчас обратиться к детям. Не только потому, что это ниша, которая всегда, а потому, что на них надежда. Можно сделать так, что они научатся заранее смеяться.</p><p class="p1">— Дети отвратительны, — сказал толстый в клетчатых штанах. — Я запретил бы детей.</p><p class="p1">— Ну так отлично! — вскричал Барцев. — Это как раз и есть самое детское. Кто, кроме ребенка, имеет право сказать «Дети отвратительны»? Вот садись и пиши, какие они все твари.</p><p class="p1">— Я знаю только одного человека, который циничней детей, — сказал остроносый и бледный. — Это Макаров.</p><p class="p1">— Макаров да, — с одушевлением подхватил клетчатый. — Макаров страшный. Он рассказывал, что его родной отец однажды чуть не до смерти забил.</p><p class="p1">— У Макарова есть справка, что он свирепый, — добавил Барцев. — Он в сельсовете взял, у себя на Кубани. Сказал, что если не дадут справку, его не возьмут в газету.</p><p class="p1">— А Макаров пишет? — спросил Женя.</p><p class="p1">— Он мне в альбом переписал несколько стихов, — сказала Лика. — У него слово звучит. Он берет слово, например, «страсть» — и ставит в чуждый ряд, например, «котлета». И тогда звучит.</p><p class="p1">Льговскому понравилась идея с детьми.</p><p class="p1">— Это хорошо, это на опережение, — сказал он. — Всегда надо на опережение, не только в литературе, но и это и в любви работает. На этом построен «Вертер». Лотта говорит — уходи, а он умирает. Если бы он воскрес, Альберта бы отставили. Нам говорят — пишите для пролетариата, мы превышаем и пишем для детей. Это еще проще и уже совсем оптимистично.</p><p class="p1">Клетчатый кивнул — он вообще, кажется, не умел смеяться.</p><p class="p1">— Ну, это вряд ли, — сказал вдруг джентльмен с ребусом «Оля» на щеке, — а я вижу, так сказать, тенденцию.</p><p class="p1">— Шура видит тенденцию, — сказал рыжий.</p><p class="p1">— Тенденция в том, — важно продолжал Шура, — что сначала стало нужно писать плохо. Это была новая краска. Нельзя было рисовать бесконечные сады и парки, или голую, или юношу с перчаткой. Стало нужно рисовать кубическую голую, или юношу с перчаткой во рту. И это пошло дальше, до кубов, квадратов, до полного уничтожения; но дальше, как вы говорите, на опережение сыграла жизнь. И тут уже надо, мне кажется, не опережать в падении, — потому что в самом деле некуда, — а как бы давать ей урок, тянуть ее кверху. Надо ей показать какое-то абсолютное совершенство. Я не знаю еще, какое. Вот Бахарев знает. Он пишет роман и уничтожает его, и потом пишет по памяти, потому что хорошо только то, что запомнилось. Потом опять уничтожает. К пятому разу он знает то, что нужно, наизусть.</p><p class="p1">— Гоголевский метод, — сказал Льговский.</p><p class="p1">— Он бы так и сделал, если бы успел, — кивнул Шура. — Потому что тогда тоже — опережало в падении, и надо было написать что-то безоговорочно прекрасное. Потом сделали «Войну и мир».</p><p class="p1">— Не обязательно прекрасное, — сказала Гликберг. — Можно совершенное. Совершенное не обязательно прекрасно и даже чаще всего наоборот. У Макарова стихи совершенны, там есть чистота порядка.</p><p class="p1">— Ножа не всунешь, — кивнул клетчатый.</p><p class="p1">— Но они не прекрасны.</p><p class="p1">— Они совершенно ужасны, — сказал Шура.</p><p class="p1">— У вас их нет? — спросил Льговский.</p><p class="p1">— С собой нет, а наизусть я не помню, — призналась Лика. — Я помню только, что в конце каждого «все».</p><p class="p1">Льговский попросил почитать. Читали по кругу, как когда-то в коммуне, на прилукинской даче, которую он старался не вспоминать. Давно уже он не был там, где читают по кругу. Стихи у всех были похожи, не только детские. Даня ничего не понял в этих стихах, кроме того, что сам бы так никогда не смог. Странней всего было, что он так и не захотел бы: ему все это нравилось, и все это было не по нему. Вероятно, именно здесь и был путь — прочь от того бессильного подражания всему сразу, которое ненавидел Даня в собственных виршах; они сделали какой-то шаг, какого еще не сделал он, — но после этого шага он перестал бы существовать, а платить такую цену за сочинительство еще не был готов. Лучше было оставаться Даней Галицким, пишущим плохие стихи, чем превращаться в кого-нибудь стократ более достойного, хоть в них. В их стихах почему-то много было насекомых — вероятно, потому, что насекомое отвратительно и в этой отвратительности совершенно. Стихи были такие же. Иногда намечалась тема, появлялось даже чувство — но тут же, словно автор точно чувствовал читательский отзыв и смертельно его страшился, вступала какофония, и все опять растворялось в визге и грохоте. У худого, остроносого один раз будто мелькнуло — «Дуют четыре ветра, волнуются семь морей, все неизменно в мире, кроме души моей», — но тут же опять пошли какие-то сады и статуи. Льговский кивал одобрительно — непонятно, чужим ли стихам, собственным ли разбуженным мыслям. Собственно, стихи и нравились ему лишь в той степени, в какой будили мысль.</p><p class="p1">— Ну, а вы? — обратился он к Дане.</p><p class="p1">Вот был шанс — почитать свое и понравиться самому Льговскому, которого Даня, конечно, узнал, потому что читал еще в Крыму, — он никогда не понимал, что из чего следует в писаниях этого человека, но за раздробленностью предполагал систему, и какова же должна быть система, если так хороши частности! Иногда, впрочем, ему казалось, что Льговский сам ходит вокруг ядра, но вглубь проникнуть не решается; правда заключалась в том, что он и ядра не видел, хотел заменить его любовью, но не сложилось. А может, ядра и нет, и мир нарочно так устроен, чтобы оно находилось вне его.</p><p class="p1">— Я, собственно, так, — сказал Даня, стыдясь, что поучаствовал в чужом разговоре. — Я пишу тоже, но читать стыдно. Я к Кугельскому пришел, хочу работать.</p><p class="p1">Рыжий, толстый и джентльмен переглянулись и засмеялись, и даже маленькая улыбнулась улыбкой злого дитяти.</p><p class="p1">— К Кугельскому, — не переспросил, а утвердительно повторил рыжий. — Почему к Кугельскому?</p><p class="p1">— Да я, собственно, не к нему, — совершенно смешался Даня, — я хотел предложить… писать в газету… но тут был он.</p><p class="p1">— Жалко, — сказал Барцев. — Надо бы к другому, но никого другого нет. А вы детское не пишете?</p><p class="p1">— Никогда не пробовал, — честно сказал Даня.</p><p class="p1">— Дело в том, — пояснил Барцев, — что Кугельский жопа.</p><p class="p1">Он сказал это так просто, как если бы речь шла о неотменимой характеристике вроде профессии.</p><p class="p1">— Жопа, — кивнула Гликберг. — Я все думала, на что он больше всего похож.</p><p class="p1">— В общем, да, — сказал Даня со стыдноватой радостью присоединения к большинству. — Но он не показался мне, как бы сказать, злонамеренным…</p><p class="p1">— Жопа не бывает злонамеренной, она соответствует своей природе, — пожал плечами Барцев. — Жизнь забавами полна, жопа — фабрика говна, знаете азбуку? Если вы ему поклонитесь, он вас полюбит, будет печатать.</p><p class="p1">— А куда ему идти? — неприлично говоря о Дане в третьем лице, спросил клетчатый. — Куда ему писать, в «Известия»?</p><p class="p1">— Зачем писать в газету? — ответил Барцев. — Вы вот что. Дайте мне на секунду посмотреть, что вы ему написали. Есть варианты, когда можно писать сюда и делать свое, как я. А бывает, что нельзя. Я вам сразу скажу, вам можно или нет.</p><p class="p1">Даня спрятал рукопись за спину.</p><p class="p1">— Я точно понимаю, что нельзя, — сказал он. Эти люди и друг друга-то не жалели.</p><p class="p1">— Дайте, правда, — уговаривал Барцев.</p><p class="p1">В эту минуту, запыхавшись, вбежал Кугельский. Он был красен. Его вдохновляла перспектива разговора с новичком, подробного позирования перед ним. Вместо этого ему предстал незнакомый лысый человек, расхаживавший по середине его комнаты, и пятеро заклятых врагов, бездарных и безжалостных людей, которых Кугельский ненавидел.</p><p class="p1">— Здравствуйте, товарищи, — сказал он, радостно улыбаясь. — Как много-то вас.</p><p class="p1">— Не радуйтесь, Кугельский! — воскликнул Барцев. — Не радуйтесь. Мы сейчас скоро все уйдем.</p><p class="p1">— Ну почему же, я вот тут подзаймусь с товарищем… Здравствуйте, товарищ Даня! Мой автор, товарищи, — скромно сказал Кугельский.</p><p class="p1">Эта притяжательность Даню добила. Он готов был называться автором, но «моим автором» — нет.</p><p class="p1">— Я попозже, — сказал он.</p><p class="p1">— Принесли, что я заказал? — строго спросил Кугельский.</p><p class="p1">— Нет… пожалуй… понимаете… действительно не мое, — сказал Даня и быстро вышел. Неожиданно следом за ним выбежал Льговский.</p><p class="p1">— Стойте, — сказал он, нагоняя его на лестнице. — Вы забавный парень. Я таких, как вы, давно не видел.</p><p class="p1">— А я вас узнал, — радостно сказал Даня, — у нас дома есть «Записки школяров»…</p><p class="p1">— А у меня нет, — сказал Льговский. — Детская книга, ладно. Дайте мне, что вы там накарябали, я быстро читаю.</p><p class="p1">Он взял листки и стремительно, словно фотографируя, проглядел их.</p><p class="p1">— Почерк хороший, — сказал он. — Талантливый. Текст — нет, а почерк да. Идите, в общем, на филологию к Солодову. Я ему скажу. Ваша фамилия какая?</p><p class="p1">— Галицкий, — сказал Даня, стыдясь протекции.</p><p class="p1">— Придете на собеседование к нему, там, может, выйдет толк. А сюда не ходите, нечего. Лучше сапоги шить, чем в газету писать.</p><p class="p1">— А вам понравилось, что они читали? — спросил Даня.</p><p class="p1">— Не знаю, — сказал Льговский. — Мне давно ничего не нравится, и я привык. Всю жизнь привыкаешь, потом умираешь — значит, приспособился. Ладно, идите. Никогда больше не приходите сюда.</p><p class="subtitle">5</p><p class="p1">— Что же, — сказал Дане сорокалетний экзаменатор, заговорщически подмигивая. — Весьма похвально и преотлично.</p><p class="p1">— Спасибо, — сказал Даня, улыбаясь весьма преглупо и преблагодарно.</p><p class="p1">— Это означает, — продолжал экзаменатор, профессор Солодов, — что поступать сюда вам не нужно ни в каком случае и ни в каком качестве.</p><p class="p1">— Спасибо, — тупо повторил Даня, еще не понимая сказанного. В последнее время его редко хвалили.</p><p class="p1">— Если у вас есть время, — раздельно, как маленькому, объяснил ему профессор, — дождитесь меня, и мы пройдемся. Мне еще двух остолопов выслушать, — добавил он вполголоса, — а потом побеседуем.</p><p class="p1">Полчаса Даня слонялся по коридору второго этажа зеленого здания на Первой линии. Он не знал, огорчаться или радоваться: было чувство, что произошло нечто важное, что он замечен и признан людьми, к которым давно стремился, что его судьба устремилась в нужное русло, — но русло это было совсем не таким, каким он его представлял. И как это понимать — преотлично и потому не следует? Видимо, он чересчур обрадовался, что знает билет, по-детски не сумел этого скрыть, без особенной связи с вопросом разболтался о «Фаусте» и своих ритмических схемах, а университет не для младенцев. Но профессор так улыбался, и получал от разговора с ним такое явное кошачье удовольствие, и даже один раз серьезно спросил: «Вы к этому сами пришли?», и пришлось объяснить, что он и гимназии толком не кончил — «Ну да, ну да… На вашу гимназию как раз пришлось… В Судаке, вы говорите?» — «Да». — «Препохвально. Что у нас там дальше? Тургенев? Ну-с». Полчаса проговорили. Наверное, если бы ему не нравилось, прогнал бы сразу. И Даня ходил по зеленому коридору, смущенный и радостный, продолжая мысленно отвечать Солодову, который, в сущности, был первым после Валериана идеальным слушателем, но, в отличие от Валериана, не вставлял многоязычных замечаний.</p><p class="p1">Сначала из экзаменационного кабинета выбежал ликующий кретин, который во все время подготовки кидал по сторонам умоляющие взгляды, но Солодов бдил, и утопающего никто не спасал. Потом с выражением озадаченным и таинственным медленно вышел верзила, сидевший прямо за Даней, — неясно было, обнадежили его или обезнадежили. И наконец, заполнив ведомость и заперев аудиторию на ключ, бодро вышел молодой еще профессор Солодов, ученик пропавшего без вести в революционном Петрограде фольклориста и формалиста Борисова. Многие тогда пропали, революционный Петроград предоставлял для этого все возможности.</p><p class="p1">— Ну-с, юноша, — сказал он, — проводите-ка меня до Английской набережной.</p><p class="p1">Они вышли в сияющий вечер — весна была изумительная, редкая для Петрограда; Солодов вспомнил, что и в шестнадцатом была такая же весна, полная предчувствий и предвестий, а впрочем, в просторном приморском городе ранней весной всегда так кажется. И так же он, студент, шел с Борисовым, и Борисов говорил о только что описанном им фольклорном механизме — а впрочем, добавлял он, и не только фольклорном. Он понимал, что рассказывать это в кругу коллег бессмысленно — накидают мелких возражений и заболтают теорию, тем более, что она и не филологическая вовсе, — а ученик выслушает и запомнит; ведь для того нам и ученики, чтобы проговаривать с ними то главное, чего уже не впустят в ум сверстники. «Видите ли, — говорил он тогда, — заложенная в „Илиаде“ схема весьма универсальна и повторяется с тех пор вечно, сколько живет человечество. Во всяком мире — античном ли, нашем ли, — зреют две силы, различающиеся только тем, что одна чуть более гибка и способна к самоизменению, а вторая жестка и целиком построена на подчинении. В первой есть место личной воле, во второй все подавляет воля государственная, или великая абстракция, которой эта воля прикрывается. Между ними, изволите видеть, с неизбежностью возникает война, потому что вторая может существовать лишь за счет бесконечного расширения — ей обязательно надо красть жен или земли. На первом этапе этой войны почти всегда побеждает условное зло, сиречь несвобода. Посмотрите на троянцев: еще Гнедич заметил, что они запрещают своим оплакивать убитых, это якобы роняет боевой дух. Ахейцы же не опасаются падения боевого духа — в их душах, более гибких, могут одновременно существовать скорбь и месть. Ахеяне управляются советом и спорят, выслушивая то Одиссея, то Нестора, — у Шекспира в „Троиле и Крессиде“ эти споры представлены пародией на парламентские слушания, читается, словно про первую думу, — а троянцы управляются Приамом и Гектором, и любое слово поперек расценивается как подрыв. Ахилл плачет о Гекторе вместе с Приамом, и это лучшая песнь „Илиады“, — но Гектор не плакал о Патрокле, это было так и надо, врага убил. И вот девять лет побеждают троянцы, обороняя свою крепостцу, которая, между прочим, была вдесятеро меньше Петропавловской, — а на десятый Одиссей придумал коня. Есть версия, впрочем, что не конь, — тут ошибка мифа, впоследствии укоренившаяся, — что конем назывался особый мост-акведук, который они соорудили под стенами, но это так… На коротких дистанциях зло всегда эффективно и даже эффектно, но на долгих выдыхается, — вот почему есть все основания полагать, что война закончится полным разгромом Германии, и начнется „Одиссея“ — сюжет о возврашении с войны. Помяните мое слово, кто-нибудь после войны обязательно напишет новую „Одиссею“… Гораздо печальней другое, — говорил Борисов, толстый, румяный от вешнего холода и очень собой довольный, так что всю печальность этого другого Солодов понял потом. — Во всякой войне победитель успевает набраться от побежденного — слишком близкий контакт, куда денешься. Он заражается его трупным ядом и ненадолго переживает победу — Одиссей узнает у Тиресия, что Менелай умер и Агамемнона убили… Победить-то мы победим, но что с нами станется? Прежний мир кончится, и мифами о нем будут жить еще несколько веков, как тысячу лет греки жили памятью о Трое, — но мир-то будет новый, в котором Одиссею места нет. Он пойдет дальше, учить феаков мореплаванию — „Что у тебя за лопата…“. Я не знаю, каков будет мир после войны и, в частности, какова Россия, — но знаю, что это будет мир другой и что в России запахнет побежденной Германией», — знал бы он, насколько другой и насколько запахнет.</p><p class="p1">С этого Солодов и начал.</p><p class="p1">— Видите ли, Даниил Ильич, — сказал он, подробно расспросив Даню о родителях. — Боюсь, масштаб происшедших перемен вам не совсем ясен. Все, чем мы с вами занимаемся, конечно, останется, этим можно именно заниматься, но жить этим нельзя. Люди сильно переменились, прежняя Европа отошла в область предания, и надо определиться, как жить тем, кто от нее после всех пертурбаций остался.</p><p class="p1">— Это есть у Шпенглера, — с воодушевлением отозвался Даня, — новые катакомбы…</p><p class="p1">— Подождите со Шпенглером, — досадливо, осадливо отмахнулся Солодов. — Шпенглер ваш… я потом поясню, если захотите. Нельзя противоставлять вещи взаимообусловленные. Цивилизация, культура… это синонимы, а не антонимы, Шпенглер ваш втайне любит варвара и стелется под него. А варвар освоил только одну технику, и от нее-то хочу я вас предостеречь, надеясь, что вы меня поймете правильно и ни себе, ни мне не повредите.</p><p class="p1">Несколько шагов прошли молча.</p><p class="p1">— Техника эта несложна, — сказал Солодов, выбрасывая папиросу с тем же презрением, с каким отбросил бы несложную технику. — Варвар ничего не умеет. Он берет тех, кто умеет, и внушает им, что они не имеют права жить. Делается это так, — он взял за горло воображаемого умельца и пошел дальше, держа его перед собой. — Ты должен умереть, потому что не совпадаешь с эпохой, жил угнетением и много ел. В это время мы томились в пещерах и дробили камень, потому что больше ничего не можем. Теперь, когда ты побежден, мы могли бы тебя растереть в пыль и правильно бы сделали. Но поскольку мы очень чудесны и милосердны, мы сохраняем тебе твою дешевую жизнь и разрешаем работать — разумеется, бесплатно, — но только очень много и за очень черствый хлеб. Если же ты будешь работать плохо или выражать неудовольствие, тебя ожидает упомянутый нами порошок с последующим истреблением потомства. Хорошо ли ты слышал, эксплуататор? — и Солодов отшвырнул эксплуататора, как папиросу.</p><p class="p1">Даня радостно улыбнулся.</p><p class="p1">— Если вы осмотритесь беспристрастно, — продолжал Солодов после небольшого молчания, словно окончательно решал, довериться Дане или ограничиться аллегорией, — вам станет ясно, что сегодня никто не умеет ничего, кроме тех, разумеется, кто объявлен несуществующими. Их не надо даже заставлять работать — в отличие от варваров, они для этого живут. Они достигли столь уже высокой степени в развитии, что полагают работу единственным смыслом, а от прочих наслаждений вроде обжорства давно морщатся. И потому разрешение работать за черствый кусок они считают величайшей милостью, а в своем праве на существование давно не уверены, опять-таки как всякий высокоразвитый вид. «Дайте, дайте нам, пожалуйста, право все сделать за вас и накажите, если мы сделаем плохо, а сами кушайте поплотней, потому что вы камни дробили!» — жалобно заканючил он. — А камни вы дробили, потому что ни на что больше не годны, а те из вас, кто на что-то годен, имели все возможности выйти из каменоломни! Мой дед, между прочим, действительно землю пахал, в отличие от упомянутого Базарова-grandpere, — прибавил он доверительно. — Все, все будет сделано за них, руками тех людей, которых объявили несуществующими. Так всегда было. Декабристы построили Читу, другие ссыльные описали Сибирь — до них ведь она не осваивалась, да и присоединяли ее разбойники, которым либо на плаху, либо в поход, третьего нет. И сейчас — поглядите вокруг — работает один бывший класс, а когда он все построит, ему напомнят, что он бывший. Видно вам это?</p><p class="p1">Даня сомневался, но кивнул.</p><p class="p1">— Препохвально. Вывод из всего этого каков? Вывод таков, что работать на них не надо, а надо найти такую нишу, которая позволяла бы жить среди них тихо, максимум времени отдавая себе самому. Россия щеляста, слава Богу, построена не на совесть, и только это позволяет в ней жить: будь она при своих-то нравах по-германски аккуратна, давно бы вымерла. Отыщите щелку и живите, а на них не работайте, то есть работайте так, чтобы не тратить души. В тишине у вас будет шанс сделать то, к чему вы призваны. В тишине. А с ними путь один — будете благодарны, что не убили, а потом-таки убьют, и будут, пожалуй, правы. Нечего было виноватиться. Мы ни в чем перед ними не виноваты, поверьте мне.</p><p class="p1">Снова пошли молча.</p><p class="p1">— Мне ничего не стоит вас зачислить, и оценку я выставлю вам самую препохвальную, — заговорил Солодов. — Завтра же впишу ее в лист и в вашу ведомость, и отправитесь вы на факультет, и происхождение вам не помешает. Но если вы верите хоть единому моему слову, связываться вам с этой работой нельзя, потому что делать ее кое-как не имеет смысла, да и не сумеете, а делать по-человечески в нынешнее время стыдно. Все равно что писать роман варвару на подтирку. А потому не встраивайтесь, мой вам совет, и найдите должность смирную, малозаметную, лучше конторскую, и профессию получите какую угодно, но не филологическую. Лучше бы научиться вам какому-нибудь учету и контролю, про который столько сейчас шуму, или техническое что-нибудь, ремонтирующее…</p><p class="p1">— Этого я совсем не умею, — признался Даня.</p><p class="p1">— Значит, чиновником, учетчиком, составителем бумаг, — согласился Солодов. — Только, упаси Боже, никакой работы, приближающейся к сути. Ни юристом, решающим судьбы, ни словесником, ни сочинителем. Это будет больше всего похоже на каменный телефон. Стоял телефон, работал. Пришел дурак, телефон разбил, сам вытесал новый, каменный. Все как есть, тесать умеет, — только не звонит.</p><p class="p1">— Это все так, — нерешительно сказал Даня. — Но мне казалось, что какая-то свежая сила… потому что мы и в самом деле очень уж в собственном кругу, как-то в своем котле, и согласитесь, что на грани вырождения…</p><p class="p1">— Шпенглер, Шпенглер, — брезгливо сказал Солодов. — Пусть вырождение. Но это было бы наше вырождение. Положим, у нас болела голова. Мы вышли бы на свежий воздух, сделали бы физическое упражнение, приняли бы микстуру. Но рубить нам голову не значит побеждать нашу головную боль и привносить в нас свежий воздух. Вся их свежая сила… ладно, глупо мне мешать его минутному блаженству. Я вас ни к чему не понуждаю. Мое дело посоветовать, а там как угодно.</p><p class="p1">— Я понимаю, — лихорадочно заговорил Даня, страшась обидеть этого замечательного человека. — Я понимаю, но я ведь неспособен ни к какому учету… и все равно буду заниматься тем, что мне интересно, ничем другим у меня никогда не получится. Может быть, вечерний… или какие-то курсы…</p><p class="p1">— Выучитесь тихой профессии и делайте что хотите, — сказал Солодов. Внезапно его осенило. Даня так и запомнил его — на закате, посреди моста, с выражением внезапного озарения.</p><p class="p1">— Знаете что? — сказал он торжественно. — Учет и контроль!</p><p class="p1">— Простите? — сказал Даня.</p><p class="p1">— Учет и контроль. Это даже и морфологически объясняется. Смотрите. Они умеют уже почти все. — Солодов почувствовал вдохновение, всегда посещавшее его при морфологическом анализе: мир оказывался сводим к универсальным, постижимым схемам, ловился в них и укладывался бухтами, как канат. — Они помешаны на учете и контроле, и это будет единственным, что важно всегда. Пристройтесь к нему как-нибудь. Они сейчас повсеместно создают управления по учету всего. Учитываются вещи, которые в голову никому не могли прийти. Пересчитываются колонны в зданиях, трещины в асфальте. Статистика — их главная дисциплина. Им кажется, что если мир учтен, то он уже и подчиняется. Говорю вам со всей серьезностью: пристройтесь к учету и контролю. А вольнослушателем ходите куда угодно, получайте любое образование — но для человека, желающего сохранить душу, сейчас лучше всего бухгалтерское.</p><p class="p1">— Я совершенно… Я не умею, я не склонен, — залепетал Даня.</p><p class="p1">— Этого уметь не надо. Слушайте, это идеальная профессия! — Солодова было уже не остановить. — Для нее не требуется талант, и вы сохраните его в неприкосновенности. Для нее не требуется участие души, вдохновение, характер. Она требует квалификации, которой легко овладевает человек из наших, но которая им совершенно недоступна. Они панически боятся цифири, это у них в крови. Они помнят еще то время, когда запутать их навеки можно было одной бумажкой, одной цифрой. К человеку, который это умеет, у них до сих пор сакральное отношение. Сравните в сказках — заклятие каменной двери, погреба, любого замкнутого пространства осуществляется цифрой. Трижды плюнул, или начертил на дверях семерку, или положил трижды три поклона (сколько будет трижды три — рассказчик не знает). Цифрой, только цифрой! Они боятся этого, они истребят всех — даже тех, кто станет растить им хлеб, — но бухгалтера не тронут. Мой вам единственный совет: бухгалтерские курсы — и вы в пожизненной безопасности. Больше того: вы будете причастны к контролю, а ничего другого они не могут. Для себя же у вас останется время писать что угодно, слушать любые лекции, просто думать, как у колдуна, который запер дверь заклятьем, а сам лег почивать. — Солодов выдохся и сошел с моста. — В общем, как хотите, мое дело предложить. А на своих лекциях я всегда буду рад вас видеть, если найдете время. Ну, что?</p><p class="p1">— Я попробую, — неуверенно пообещал Даня. — По крайней мере узнаю, где этому учат…</p><p class="p1">— Приходите в сентябре, — сказал Солодов. — Непременно. Расскажете, как и что.</p><p class="p1">Ему понравился этот простой, чистый и начитанный, восторженный, схватывающий на лету. Но сманивать его за своей дудкой он не желал. Именно поэтому на новый курс филологического набрал он тех, кто с трудом складывал слоги, и отсеял почти всех, кого в другое время втащил бы на факультет силком. Он и сам в дальнейшем подумывал сменить занятия, и сменил — так и дожил в Закавказье печником до тех самых пор, когда «Тотемические инициации» вышли в издательстве ЛГУ тысячным тиражом с указанием на то, что автор пропал без вести. Он успел и надписать книгу одному досужему альпинисту, чьему сообщению до сих пор не верит никто.</p><p class="subtitle">6</p><p class="p1">— Учет и контроль, — пробормотал дядюшка. — Что же, это не без резона. Ты знаешь, Даня, — забормотал он в своей виноватой манере, ставящей каждое слово под вопрос, — тут определенно что-то есть. Я бы дорого дал, чтобы не быть актером, потому что есть времена, как бы это сказать…</p><p class="p1">Говоря, он кружил по кухне, хватался то за чайник, то за бутыль с постным маслом, сооружал стариковский салатик, стариковское чаепитие, а ведь был не старик, но вот избрал такую нишу. Даня это уже знал и потому особенно внимательно прислушивался к тому, что говорилось между делом, под нос, с покаянной улыбочкой.</p><p class="p1">— Есть времена, когда нельзя сказать непошлость, — продолжал дядюшка, колдуя над салатиком. — Я не знаю, что должно произойти… но, в общем, грех мой был в том, что я надеялся делать дело. Я как-то думал, что дело спасет. А есть времена, когда именно наше-то дело и не может делаться. Можно приспособиться, конечно, и нарочно делать хуже… и обманывать себя тем, что вот, лучше я, чем кто-то… Но это не так, Даня, он неглупый человек, этот твой, как его… Лучше кто-то, чем я, потому что не сделаю я ничего, так? А имя испорчу, а имя, может быть, единственное, что надо оставить… Дела не остаются, Даня, имя остается. И потому, — провозгласил он уже не под нос, поднимая чашку, — и потому, Даня, Ноговицын! Исключительно и только Ноговицын!</p><p class="p1">Он постучался ко второму соседу на следующий вечер. Ноговицын рано уходил и рано приходил, ужинал, прогуливался — строго час, хоть будильник сверяй, — выпивал стакан простокваши, подолгу держа ее во рту для лучшего впитывания, да и для десен хорошо, после чего ложился, непременно на спину, ибо на правый бок вредно для печени, а на левый — для сердца. Да и уклон, как говорилось в тогдашнем анекдоте. У того, кто наблюдал бы за его долгими приготовлениями ко сну и здоровою, очень здоровою жизнью, неизбежно возник бы вопрос: для чего, собственно, поддерживать такую жизнь? На что Ноговицын с полной честностью ответил бы: нет, не стоит, она давно уже бремя. Но, как все хилые дети, он проделывал это для кого-то, для чьего-то недоброго глаза, который все следил за ним и говорил: неправильно, ты то делаешь не так и это не этак. И Ноговицын все делал хорошо, а того, что хотелось, нарочно не делал; и даже поступал всю жизнь вопреки хотенью, и это ставил себе в заслугу. Но когда Алексей Алексеич Галицкий виновато попросил его помочь с устройством племянника куда-нибудь по счетной части, — юноша грамотный, аккуратный, вольнослушатель университета, — Ноговицын не успел даже подумать, как бы чего не вышло, а по чистой случайности вспомнил, что в управление учета жилфонда взят из их финотдела Евграф Карасев, молодой, но растущий, и будто бы ему нужны люди. Так и сказал, зайдя проведать сослуживцев: людей нет, никого нет людей… Так уж если заметите кого, милости прошу. Так он сказал.</p><p class="p1">Ничего не желая обещать, Ноговицын сказал:</p><p class="p1">— Я спрошу.</p><p class="p1">А поскольку он ничего не забывал, то на следующий день спросил, и уже двадцать пятого апреля Даня стоял перед Евграфом Карасевым, про которого никто на свете не мог сказать ничего определенного. Да и про контору на улице Защемиловской трудно было сказать что-нибудь наверняка. Когда Карасева прислали туда из ноговицынского финотдела, он долго стоял перед скуксившимся двухэтажным деревянным домом со следами многочисленных покрасок, образовавших наконец единый цвет трудно прожитой и притом бессмысленной жизни, — и буркнул наконец себе под нос:</p><p class="p1">— Отсюда улетишь, пожалуй.</p><p class="p1">Неясно было, выражает ли он тем самым скепсис относительно возможного улета или удостоверяет, что из такой обстановки только и улетать.</p><p class="p1">Карасев был круглый, крепкий, смуглый, цепкий. Он не расставался с обширным портфелем, усатое лицо его было отмечено шрамом — вероятно, еще в гражданскую, — и вообще в нем чувствовался опыт небухгалтерский: тогда много было таких — на бюрократских должностях, в чиновничьих холщовых косоворотках и даже нарукавниках, но с походкой кавалериста, с прищуром стрелка. Они исправно выполняли скучные обязанности, но по глазам их было видно, что недавно они справлялись с обязанностями совсем другими, и теперь, вернувшись в человеческое состояние, не совсем еще в нем освоились. Лучше было не возражать им слишком долго, к формальностям они относились несколько по-кавалерийски, и по глазам их было видно, что они знают кое-что посерьезней учета. Во главе чуть не каждого второго треста стоял такой человек, и Карасев на этом фоне терялся, а ему того и надо было.</p><p class="p1">Даня долго искал Защемиловскую, долго добирался до нее. Стоял первый по-настоящему жаркий апрельский день, и первая пыль летала по сухой восточной окраине города. Защемиловская казалась сельской; дома на ней были сплошь деревянные, большей частью одноэтажные. Трамвай доходил только до Железнодорожной, и дальше надо было пешком — вдоль путей, пустырей, свалок; по краям города полно было незастроенных, неосвоенных пустошей, вообще много было лишнего — избыточных людей, избыточной земли. Людей можно было выморить, распихать по щелям, а земля, с которой не знали, что делать, постепенно заболачивалась либо зарастала, либо ее заваливали ржавым хламом, сквозь который вовсю уже пробивалась непобедимая растительность. Вдруг, за углом, открылась Защемиловская — тихая, уютная и словно хранимая домом неопределенного цвета, серо-лиловым, перегораживавшим ее поперек; Даня не видел, что за ним, но сразу понял, что за ним города нет, а есть другое.</p><p class="p1">Дом этот с виду являл типичный деревянный особняк, какими в безобразовские годы сплошь застроились петербургские окраины. Но в том, как стоял он, косо перегораживая улицу, в том, как блекло, без блеска, смотрели его мертвые стекла, в одинокой герани в окошке первого этажа, с ее пыльными листьями и зловеще красным цветком, — было грозное и чужеродное, совсем не отсюда; и ясно было, что если здесь займутся учетом жилых помещений, то ни подвальной крысе, ни чердачному призраку не скрыться от учетчика.</p><p class="p1">Кабинет Карасева располагался на втором этаже. Карасев долго и непонятно смотрел на Даню. Из-за шрама под правым глазом казалось, что он подмигивает.</p><p class="p1">— Вам анкету заполнить, — сказал он с некоторым вызовом и протянул Дане два листка из серой картонной папки, лежавшей на столе справа.</p><p class="p1">Анкета была обыкновенная: фамилия, имя, отчество, социальное происхождение, место рождения, образование (до пятого класса гимназическое, а потом домашнее), трудовой стаж (нет), предыдущее место работы (легко — сплошь прочерки), родственники за границей (и тут прочерки), военная служба (удивительно, насколько пустая жизнь — решительно нечего сообщить).</p><p class="p1">Карасев изучал все эти прочерки долго, словно не веря в такую удачливость. Если бы Даня вдруг исчез, следов его не нашлось бы ни в одном отечественном архиве, потому что и родился-то он в Цюрихе, в клинике Шатля, которую рекомендовали его матери по причине сравнительно поздних родов; мы об этом молчали, потому что не было случая, а как представился, так сразу сообщили. Мы ничего не утаиваем, гражданин читатель, мы только не все сразу говорим.</p><p class="p1">— Гм, — сказал наконец Карасев. — Считаете хорошо?</p><p class="p1">— В гимназии успевал.</p><p class="p1">— В Питере давно?</p><p class="p1">— Месяц.</p><p class="p1">— Так. А вот еще, пожалуйста, заполните, — и он вынул два листка из желтой картонной папки, лежавшей слева.</p><p class="p1">Тут вопросы были посложней: продолжите цифровой ряд (счетоводу, верно, требовалась математическая смекалка), выберите лишнюю фигуру, добавьте слог, которым заканчивается одно слово и начинается другое (пал — пропуск — пот, ясно, что ка). Затруднился он только с продолжением последовательности 11-7-5-3, тут никакая логика не просматривалась, разве что сначала отняли 4, потом вдвое меньше, потом опять вдвое меньше — стало быть, дальше должны отнять единицу, и он неуверенно вписал 2. Прочее сделал быстро, но дважды проверил перед сдачей. Карасев бегло взглянул на листы и продолжительно — на Даню.</p><p class="p1">— Ну допустим, — сказал он не без вызова. — Значит, третью заполните. Убедительно вам говорю: отвечайте быстро, думать много тут не надо.</p><p class="p1">Даня приготовился к худшему — речь могла зайти о политике, а он и газет в последнее время не читал, — но вопросы этой третьей анкеты, извлеченной из верхнего ящика карасевского стола, политики не касались вовсе и были так странны, что он запомнил их надолго. Солодов, достанься ему такая анкета, очень бы ликовал и вписал кое-что интересное в главу «Инициация», но, как все морфологи, ошибся бы, потому что мир не описывается одной только морфологией.</p><p class="p1">1. Следует ли сначала повернуть направо? (Даня написал: нет).</p><p class="p1">2. Можете ли вы убрать время? (Да).</p><p class="p1">3. Пойдете ли вы дальше?</p><p class="p1">Даня поднял глаза от анкеты.</p><p class="p1">— Можно только да или нет? — спросил он.</p><p class="p1">— Если не знаете, ставьте прочерк, — бросил Карасев, не отрываясь от простынеобразной таблицы, в которую что-то заносил коротким фабером.</p><p class="p1">Даня поставил прочерк: он в самом деле не знал, пойдет ли дальше, случись что. Отвечать было необыкновенно легко, словно он всю жизнь только и делал, что быстро отвечал на непонятные вопросы. Комната расплылась, стены словно отдалились, и дом казался уже не таким безнадежным.</p><p class="p1">4. Видите ли вы углы? (Да).</p><p class="p1">5. Удерживают ли вас? (Да).</p><p class="p1">6. Ожидаете ли вы увидеть родных? (Да).</p><p class="p1">7. Допускаете ли вы многое другое? (Да).</p><p class="p1">8. Видите ли вы области? (Нет).</p><p class="p1">9. Хотите ли вы увидеть области? (Прочерк).</p><p class="p1">10. Можете ли вы рассудить? (Нет).</p><p class="p1">11. Будет ли вам жалко? (Да).</p><p class="p1">12. Расходятся ли восходящие именно в вашем случае? (Да. Этот ответ он дал в связи с тем, что чем дальше жил, чем выше, так сказать, поднимался, тем больше расходилось то, что получилось, с тем, что представлялось; и это был последний вопрос).</p><p class="p1">На эту анкету Карасев, против ожидания, едва бросил взгляд.</p><p class="p1">— Ну что же, — сказал он, — думаю, что можно… хотя, конечно… а впрочем, почему же нет. Что вы от меня-то собственно хотите? — спросил он вдруг с легким раздражением.</p><p class="p1">— Работать хотелось бы, — проговорил изумленный Даня.</p><p class="p1">— Я не вам, — строго сказал Карасев, хотя в комнате никого больше не было. Все счетоводы, безусловно, немного не в себе — еще бы, столько ответственности. — А вы приходите и работайте, с завтрашнего дня. Оформит вас Клавдия на первом этаже.</p><p class="subtitle">7</p><p class="p1">Управление по учету жилплощади являло собою одну из страннейших и потому естественнейших контор в городе. Пролетариат, наслаждаясь властью над миром, восьмой год проводил его детальную перепись.</p><p class="p1">Главной бедой предыдущей власти был не угнетательский ее характер, — эка, чего не видали, — а роковой недоучет всех возможностей, неподоткнутость одеял. Надлежало подробнейшим образом учесть вначале весь жилфонд, выселенные, полуразрушенные, опустошенные высылками квартиры, ставшие приютами для воровских хаз чердаки и подвалы, пустующие университетские лаборатории, сторожки, будки для садовничьего инвентаря. Помещения надлежало учитывать потому, что в них, во-первых, мог гнездиться враг, а во-вторых, при необходимости срочного врага таковым мог послужить недоучетчик, недоноситель о пустующей комнате, обнаглевший жилец, занявший лишнее. Когда жилфонд Ленинграда был относительно учтен, настала очередь пустырей, разрушенных зданий, участков необработанной земли — все это называлось теперь Ленкадастром. Когда же и земля в Ленинграде и вокруг него была более-менее переписана, Ленкадастр сделался Ленреестром, и помещался все там же, на Защемиловской, и учитывал вещи вовсе уж непредсказуемые.</p></span></span>
