<span><span><p class="p1">Но ведь я левитирую, возразил он себе. И что же, возразил он на возражение, и что же? Ведь это левитируешь ты, а учителя ты никогда не видел левитирующим. Если бы он в самом деле что-то мог — неужели торговал бы на базаре фальшивыми снадобьями? Ложь, сказал он себе первому, подлая ложь, ты ждешь и требуешь чуда, ты не можешь верить учителю без явных доказательств, какова же тебе цена после этого? Ведь он потому и говорит «Я вам всем лгал», что за ним тут следят в четыре глаза. Только идиот вроде тебя мог подойти к нему, ссыльному, на людях, посреди базара. Но он не назначил мне другой встречи, возразил второй, трезвый Даня. Он мог говорить со мной иначе. Но не хотел, потому что я больше не нужен ему. У меня не было даже денег.</p><p class="p1">Но чем громче роптал первый, тем ясней мыслил Даня-второй, и против этого уже не было аргументов, ибо это была та правда, которая упраздняла спор.</p><p class="p1">Ну и что же, думал он. Как бы то ни было — благо тебе, Остромов! Разве не ты говорил когда-то антропософке Савельевой, что причаститься можно и из лужи? Я, впрочем, употребил бы другую метафору. Слыхал ли ты, спрашивал он себя, про кашу из топора? — и сам себе отвечал: слыхал. Ее рассказывала мать — правда, по-своему, не так, как у Афанасьева; но ведь она все рассказывала по-своему, и всегда лучше.</p><p class="p1">Шел солдат, шел с войны, ничего не навоевал, хотя победил… Из чего ясно, что победил? А из того, что не убили. Шел, шел, захотел есть, постучался в избу, нет ли каши. Тут Даня приготовлялся уже плакать, но то, что проситель был солдатом, добавляло мужества. Ведь солдат — герой, что-нибудь придумает. Ах, солдатик, отвечала лицемерная хозяйка, ничего нетути. Как нетути? А так, вчерась последнее доели. Мать великолепно изображала комическую жадность, рот гузкой. Ах, досада, говорил солдат. Ну, если так, баушка, свари мне хоть кашу из топора. Как — топора? — спрашивала хозяйка. Да вот так: есть ли топор? Как не быть. Солдат пробовал топор на звон, потом ногтем: справный топор, наваристый. Ставь же, хозяйка, котел в печь, наливай воды да вари топор. Только, чтоб запах отбить, брось луку. Лук-то найдется? Найдется, говорит хозяйка, а сама любопытствует: как это солдат топор варит? Эх, говорит солдат, пробуя варево: теперь бы сальца пожарить, хозяйка, да туда же, в котел! Есть сальце-то? Как не быть, служивый: очень уж ей хочется каши из топора. Порезала, пожарила сальца, дух пошел страшно аппетитный (сказка рассказывалась специально к обеду, ибо Даня в детстве страдал отсутствием аппетита — ах, кабы это отсутствие теперь!). Бух туда же и сальце. Что ж, говорит солдат, осталась крупа. Есть у тебя, хозяйка, крупы три горсти? Ах, и больше есть, кричит хозяйка, давно б дала, кабы знала, что ты такую кашу сваришь! Ведь всегда из топора бы варили, — скажи только, служивый, цел ли будет топор?! Цел, говорит солдат, от него не убудет. Сварил кашу, всех угостил, сам поел, топор облизал и дальше пошел. Но только с тех пор — вот чего не было в сказке, когда он читал ее потом, — каша никогда не получалась без топора. Вроде бы кулеш, да не тот. Как ни у кого не получалось разделить семнадцать верблюдов без восемнадцатого, — и этот восемнадцатый верблюд, без которого не делилось, этот топор, без которого не варилось, был Остромов, кто бы он ни был. Он, быть может, и сам не сознавал своей роли, сам не знал, что Господь сделал из него топор, что топор этот равно годился для рубки и каши. Даня восхитился этой мыслью, хотя знал, что утром уже не найдет в ней ничего особенного, если вспомнит вообще. Но сейчас, ночью, в вагоне, куда он вошел незримо, без билета, без малейших стараний, — на багажной полке, почти сливаясь с ней, — он упивался догадкой: насколько лучше, если Остромов в действительности им лгал! Насколько все чище и прекрасней, если он не учитель, а катализатор, благодаря которому все они прыгнули выше головы! И разве годится все это пространство, тянувшееся за окном поезда, долгое, синее, пустынное, бесконечно печальное, с редкими россыпями огней на холмах и в лощинах, — на что-нибудь, кроме как для толчка, чтобы вырваться из него с небывалой силой? Где, кто еще так оттолкнул бы его? Благо тебе, Остромов, ты даже не знаешь, какое благо.</p><p class="p1">И вот еще что. Он перевернулся на спину, стараясь ухватить следующую мысль, логичное, но страшное продолжение. Допустим, что так. Положимте, что так. Он топтался на месте, не решаясь проговорить даже про себя, что — да, да. Если он лгал, морочил, попросту наживался, как уже откровенно наживается сейчас на своих темно-лиловых снадобьях, — то ведь он отбирал не просто. Он отбирал последнее, у последних. У тех, кого и так дотаптывают; у тех, у кого ничего больше нет и никогда не будет. А это совсем другое дело.</p><p class="p1">Он читал в трактате «О свойствах бесконечно малого», что свойства зависят от количеств: иное вещество, взятое в крупице, проявляло не те свойства, что в чашке. Это, в общем, элементарно, количество в качество, долбят отовсюду, — и есть в самом деле великая разница между тем, чтобы отнять миллион, но у богача, или последнюю рубаху, но у нищего. Сейчас, сейчас. Мы это обдумаем. Кто отнял миллион — только отнял миллион, и о нем мы больше не думаем, он не маг. Но тот, кто отобрал действительно последнее, дал надежду тому, у кого ничего больше нет, и отнял эту надежду, — о, тот сделал великое дело. Тот осуществил инициацию. Нищий, у которого отняли суму, — просто нищий, но если отняли рубаху — это сверхнищий и сверхчеловек. Господи, что это была за восточная легенда — хорошо мне, на все случаи у меня в голове легенда? У нищего, пока мылся, украли в бане его рубище, и он заплакал от счастья. Все решили, что он сошел с ума, а он воскликнул: «Судьбе надоело преследовать меня!». И на следующий день его узнал на улице его разбогатевший сын или кто-то там еще, и он получил дворец и новое рубище, но все это уже неважно. Корыстный мотив мы откидываем. Он получил от того банного вора высший дар — последний канат, связывавший его со всем, так сказать этим, перерезался. И он полетел. Он полетел, как дирижабль Кокини из видовой фильмы, — показывали в Ялте в девятнадцатом году. А если бы Кокини перед запуском сказали, что он никому тут больше не нужен и Кокиниха его разлюбила — это с ней, жовиальной, толстой, он прощался перед взлетом, — он, может быть, и не приземлился бы никогда.</p><p class="p1">Что у всех нас было? У нас ничего не было. Нас было не надо, нас не должно было быть. Нас это огорчало. И вот пришел Остромов, и собрал с нас деньги, и ложечки, и чашечки. А потом у нас отобрали самого Остромова, потому что он частник, а к частникам эти люди безжалостны. Если бы они отняли у нас сами… но они бы не остановились на этом, они пытали бы нас каленым железом, а после этого мы не взлетели бы никогда. Тот, кого пытают каленым железом, взлететь не может. Но тот, кому Остромов лично перерезал последнюю пуповину, связывавшую с землей… тот, кого Остромов избавил от поисков статуса, от попыток вписаться, от стыда перед новым хозяином… тот взлетит, ибо ему ничего больше не остается. И будь они все, все они… чуть тоньше, чуть меньше склонны к расправе… как знать, может быть, мы все бы взлетели, и вся Россия была бы сегодня другая. Предано-продано и все такое, почему же нам стало светло? Но они не остановились, они стали топтать, у них молоток. Его принимали за целительный скальпель, но это молоток. Скальпель — у Остромова. И если он в самом деле не маг, а шарлатан… о, тогда он маг наивысшей ступени — маг, не знающий этого.</p><p class="p1">Эта мысль наполнила его вдруг таким золотистым покоем, словно защитный купол простерся над ним: есть, есть сила, устраивающая все, как бы оно само ни расположилось. Мысли его после предельного напряжения спутались. Топор, катализатор, топоризатор. Благо тебе, Остромов. Он повернулся к стене и мягко влетел в сон. Снился ему их счастливый кружок, собравшийся, как для гимназической фотографии. Савельева улыбалась, Дробинин декламировал, Левыкин записывал. А кто это одесную учителя? А это я, ничего не умеющий, кроме летать. И над всеми южным сиянием переливалась супра — пятое время года; где все мы вместе, там и она с нами.</p></span></span>
