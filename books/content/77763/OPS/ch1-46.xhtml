<p class="p">Глава двадцать вторая</p>
</div><p class="subtitle">1</p><p class="p1">Он сошел с поезда, как сходят с ума задержавшиеся в детстве, неспособные выдержать истинный облик мира: теперь, слава Богу, им не придется иметь дело с правдой. Всю дорогу до Пензы в вагоне пели и пили. Как мало было похоже это путешествие на переезд в Ленинград, когда Даня впервые встретил учителя! Тогда все они ели, наедались, а он робел, томясь виной непонятно за что, и каждый косой взгляд, казалось, выискивает в нем приметы обреченного чужака. Теперь они орали и пили с горя, а он, уже умея быть для них невидимым, ясно видел их собственную обреченность; даже взобравшись на первую ступеньку — и чувствуя впереди бесконечный ряд других, — он отличался от них больше, чем от учителя, пусть даже стоящего на вершине. Дверь была открыта, превращение началось; ему удалось то самое, ради чего они пролили столько своей и чужой крови и пытались теперь заменить ее самогоном, как вливают в вены после кровопотери солевой раствор. И потому они больше не пугали его, а только мешали, особенно когда пели. Пели они что-то бесконечное, языческое, то ли «По Дону гуляет», то ли «Как родная меня мать», а в сущности, все это была одна и та же песня на единый сюжет: ай, били-били, ай, убили, ай, так мне и надо.</p><p class="p1">Утро было жарким, пыльным, чувствовался юг и провинция: автомобили почти не попадались, трамвай таскался по одной-единственной улице, на вокзальной площади чинно ждали два извозчика, их услугами никто не пользовался — расходились пешком. Командированный инженер из Ленинграда, прибывший на строительство арматурного завода, растерянно щурился, озираясь, — его не встретили. На лицах коренных пензенцев, вернувшихся домой, читалось странное злобное удовлетворение — здравствуй, дом родной, душная пазуха; явился, хотя запылился. И все словно гордились перед невидимым божеством — то ли начальством, то ли иностранцем, — что вернулись, хотя, в сущности, куда бы они делись? Принимай меня теперь, приволжская степь, любимая от некуда деться, берущая на себя все мои грехи; и эта тонкая смесь презрения, злобы и радости висела над вокзальной площадью, как пыль.</p><p class="p1">Савельева жила на улице Энгельса. Ссыльные — в этом было особое иезуитство — жилья не получали, должны были снимать на свои деньги; драли с них втридорога — «с этими все можно». Дом 15 по Энгельса оказался приземистым двухэтажным бараком, на котором с октября 1927 года висел изрядно выцветший транспарант «Десять лет как Бога нет». Едва Даня подошел к бараку, Савельева выбежала ему навстречу.</p><p class="p1">— В окно увидела, — прошептала она, запыхавшись, и поцеловала его в висок, чего никогда не делала прежде. В кружке между ними не было особенной близости, и Даню даже сердило, что Савельева знала мать и смела отзываться о ней, — но теперь этой ревности не было места: их было двое в чужом, степном, сухом городе, сближавшем их накрепко, как атмосфера сдавила те немецкие медные полушария. Странно было думать, что где-то есть Магдебург.</p><p class="p1">— Что же вы не предупредили? Я бы встретила!</p><p class="p1">— Да вот потому, — говорил Даня, слегка задыхаясь и сам удивляясь собственному волнению. — Я не хочу беспокоить, ничего… Мне нужно увидеть учителя. Я там занимаюсь один. И мне нужно… я уперся во что-то, понимаете? Во что-то, чего не могу преодолеть без руководства. А назад уже тоже нельзя.</p><p class="p1">— Что же, может быть, и нужно, — сказала она, отводя глаза. — Может быть, и вправду нужно увидеть…</p><p class="p1">— Он здесь? Вы ведь это не для того, чтобы утешить?</p><p class="p1">— В городе, да. Ну, пойдемте, — по-прежнему шепотом говорила Савельева. Даня помнил ее сильный, низкий, даже и властный голос, удивительный при хрупком сложении; он так же не шел к ее фигуре, как средневековые страстные стихи — к хромоте, бедности и уездному происхождению. — У меня на втором комнатка. Что вы, Даня, как вы? Рассказывайте все, только у меня.</p><p class="p1">Видно было, что ссылка приучила ее к перешептыванию, постоянной оглядке — и Даня успел заметить искусственно-веселую, почти подобострастную улыбку, которой она поприветствовала выбегавшую навстречу рыхлую, блекловолосую, хмурую на весь свет девушку. Та едва кивнула в ответ: еще не проснулась толком, а уже презирала. Все презирали всех, этим жили.</p><p class="p1">— Ира, — шепнула Савельева, словно оправдываясь за этот безответный привет. — Фельдшер будет.</p><p class="p1">Даня пожалел будущих пациентов этой фельдшерицы — а впрочем, вряд ли они будут сильно от нее отличаться. Доктор, нутро пекеть. Каломель наружно. И оба довольны, сыграли пьесу «Обращение к врачу».</p><p class="p1">И комнатка Савельевой так же отличалась от прочих, как ее маски — от собственного ее скуластого лица: представить было невозможно, чтобы внутри этого барака, как воздушный пузырь в ледяной глыбе, сухим цветком цвел такой китайский павильон. И даже в лице у Савельевой — он не заметил этого внизу, на слепящем солнце, — появилась китайская желтизна, и глаза словно сузились. На окне в желтой глиняной вазе стояли сухие цветы — приглядевшись, Даня заметил, что лепестки их были сделаны из ясеневых семян; на стенах — стилизованные гравюры с загнутыми вверх крышами, словно совсем уж смирившимися с участью, но в последний миг проявившими изящное, осторожное непокорство. Он узнал акварель Вала, в которой здесь тоже появилось нечто китайское, даром что изображалась, как всегда, степь в окрестностях Судака.</p><p class="p1">— Он прислал, — гордо сказала Савельева, перехватив его взгляд. У себя в комнате она говорила смелей, но голос потух, притих.</p><p class="p1">— Елизавета Дмитриевна, — сказал Даня решительно. — Я хочу с самого начала сказать определенно: если вы считаете меня провокатором, вас никто не обязывает говорить со мной. Я вполне отдаю…</p><p class="p1">— Господи! — изумленно улыбаясь, выдохнула Савельева. — Провокатором? Вас?</p><p class="p1">— Вы все взяты, я не взят, это может выглядеть как донос…</p><p class="p1">— Даня! — протянула она укоризненно. — Вы настолько не знаете людей? Вы стали такой взрослый, такой… я даже не знаю… и вы можете допустить, что у кого-то повернулся бы язык?</p><p class="p1">— Кое у кого повернулся, — сказал Даня, чувствуя, что в носу у него позорно щиплет от этой внезапной доброты; он все-таки страшно отвык от человеческого.</p><p class="p1">— Вот он и есть провокатор, неужели вы не поняли? — сказала Савельева с легким брезгливым изумлением. — Даня, клянусь вам — я, конечно, не всех знаю, но ни в тюрьме, ни на следствии, ни после, никто… Кем надо быть, чтобы предположить это — о вас? Мы, в конце концов, не слепые… я могла бы во многих ошибиться, но вы…</p><p class="p1">— Вам кажется, что я и на это не годен?</p><p class="p1">— Очень вы похожи на мать, — задумчиво сказала Савельева, — и все больше… Тогда я думала, что если б не это самоедство, она писала бы лучше и больше, а теперь понимаю, что без него вообще бы ничего не писала. Ах, Даня. Как я рада, что вы приехали.</p><p class="p1">— Я хочу вас спросить… может быть, все-таки…</p><p class="p1">— Нет, о ней ничего, — быстро, чуточку слишком быстро сказала Савельева. — Ведь нас раскидали. Я только слышала, что где-то в Сибири, и уже, наверное, замуж вышла. Не ищите, Даня, поверьте мне, в ваши годы уже и три месяца — много, а прошло три года. Иногда лучше, чтобы осталось так. Увидеться хуже. Вы мне поверьте, у меня — было. Я в восемнадцатом году увидела Мигулева, а лучше б не видела.</p><p class="p1">— Как вы здесь? — Он не решился сразу перейти к расспросам об учителе, это было неделикатно. Интерес к возлюбленной Савельева еще могла понять, но теперь следовало расспросить ее о том, что она пишет.</p><p class="p1">— А неплохо, Даня, — сказала она и вдруг быстро, тихо рассмеялась. — Я вдруг вспомнила… Вы ведь были, когда пробовали все это чтение мыслей?</p><p class="p1">— С Мосоловой? Помню, конечно.</p><p class="p1">— Да Мосолова что, Мосолова, конечно, ерунда… И Юргевич ерунда… Но помните — я вам передавала из моей детской сказки, как кот и кошка вместе бредут по улице, темно, холодно, их никто не пускает… Это же я в детстве придумала, как у кошки день рождения, а потом у нее домик сгорел, и никто из гостей не пускает ее к себе, только трое маленьких нищих котят, которых сама она не пустила, пригласили ее к себе в каморку… Сама сочинила и сама плакала, — она тряхнула головой и опять засмеялась. — А сейчас — не поверите — здесь молодой режиссер, такой Миронов, удивительный человек, такой странный… Он затеял тут детский театр, кукольный, силами самих детей. Оказались так талантливы, прелесть, и я для них как-то написала… и опять сама плакала… «Грустно вечером, бездомным, по дворам скитаться темным». Под своим именем, конечно, нельзя, я теперь Вайнгарт, русский немец прошлого века.</p><p class="p1">Она и тут умудрялась быть не собой, и тут, может быть, это искусство было всего нужнее — хорошо не быть хромоножкой из Воронежа, еще лучше не быть женой путейца, но лучше всего не быть ссыльной. А немец — что ж немец, не хуже, чем китаец.</p><p class="p1">— Везде можно жить, Данечка, везде жизнь, — сказала она, отвернувшись. — Это-то, может, самое гадкое. Но расскажите мне сами, что в Питере.</p><p class="p1">— В общем, ничего, — сказал он честно. — Я думаю, Елизавета Дмитриевна, что там они не поставили бы это ваше, про кошку. Там совсем уже нечем стало дышать, и там это больней — сами понимаете.</p><p class="p1">— Понимаю. И все-таки, мне кажется, если бы я была там… Мы ведь любим этот город больше уроженцев. Мы чужаки. Для нас он счастье, а для них бремя. Если бы мне туда на день, нет, день мало, это бы только душу травить, — но если бы хоть на два дня, Даня!</p><p class="p1">— Вы ведь вернетесь.</p><p class="p1">— Когда это будет… Еще год, и может быть, я вовсе не вернусь. У меня в последнее время такие странные боли, и так быстро нарастают…</p><p class="p1">Боже мой, понял он. Вот откуда эта желтизна. А я, идиот неисправимый, все списывал на Китай.</p><p class="p1">— Но это ничего, впрочем. — Она снова тряхнула головой и прикусила губу. — Я до Питера доживу. Я хочу, я должна умереть в Питере. Я могу прожить здесь два года, но мысль, чтобы всегда здесь лежать… Не могу же я так отомстить собственному телу, хоть и есть за что!</p><p class="p1">— Вы вернетесь, конечно, — сказал он твердо. — Но поверьте, что сейчас — если это может утешить — сейчас там плохо, потому что хуже всего там, где было хорошо.</p><p class="p1">— Как о поре счастливой вспоминать, — кивнула она.</p><p class="p1">— Да, да. Я тоже все время вспоминаю, и именно это место.</p><p class="p1">— Но я много пишу, — сказала она. — Я думаю даже, что напечатаю. Ведь китайское — можно? Про китайского изгнанника?</p><p class="p1">— Да, конечно, — сказал он, и тоже, кажется, слишком поспешно.</p><p class="p1">— Господи, — сказала она, — ведь вы с дороги. Надо вас покормить, Даня. У меня прекрасные лепешки, тут на базаре Матвеевна, и у нее всегда изумительная сметана и хлеб. В Питере наверняка таких нет.</p><p class="p1">— Да я не голоден, — честно сказал Даня и тут понял, что голоден. Странным образом в Пензе он хуже владел своим телом, чем в Перми, — словно человеческое тут было сильнее, а сам он моложе; Савельева тянула его назад.</p><p class="p1">— Поешьте, поешьте. Я сейчас.</p><p class="p1">Она шмыгнула за дверь, быстро и тихо что-то проговорила, послышалось басовитое, недовольное бубненье соседки, — Даня догадался, что Савельева сегодня на базаре еще не была, да, может, и вообще ходит туда редко, а лепешку просит в долг. Стыд уязвил его: он уже привык ни от кого не зависеть, а мысль о том, что Савельева унижается ради его завтрака, была вовсе невыносима — не хватало объедать ссыльную, — но когда она минут через пять вошла с закопченным чайником, лицо ее сияло таким довольством и радушием, что он укорил себя за эти колебания. Ей в радость было позаботиться хоть о ком-нибудь — вот, у нее гость, она угощает его чаем и лепешкой, у нее, представьте, есть чай и лепешка… Она внесла даже блюдечко со сметаной, даже спросила его, не подкрасить ли чай молоком — «У нас здесь изумительное. Стоило ехать, чтобы попробовать. В Питере совсем не молоко».</p><p class="p1">Сама она не ела и только смотрела родительски-умиленно, как он пьет чай — со странным древесным привкусом и обломками каких-то веток. «Не пили такого? У нас с багульником заваривают. Говорят, страшно полезно».</p><p class="p1">— Елизавета Дмитриевна, — сказал он наконец, важно, по-купечески отдуваясь после кипятка с ветками. — Уф, жарко у вас. Я хотел спросить — ну, вы знаете…</p><p class="p1">— Знаю, знаю. Конечно, увидите. Вы же за этим ехали. Что вам я.</p><p class="p1">— Не надо, пожалуйста, — умоляюще сказал Даня.</p><p class="p1">— Ничего-ничего. Да, конечно, вам надо увидеться. Но Даня… я хочу вам сказать важное.</p><p class="p1">Он напрягся — неужели ехал зря? Может быть, учителя давно нет, и она теперь боится признаться, что соврала в утешение? Или он странствует, обманув надзор — с его ли способностями сидеть на месте?</p><p class="p1">— Поймите, — сказала она, — вам не нужно… возлагать слишком больших надежд. Помните — «и усовершенствовавшись, будет каждый, как учитель его»?</p><p class="p1">— Помню, конечно.</p><p class="p1">— Есть груз, — сказала она, — груз, который не каждый вынесет… Ему в самом деле, может быть, тяжелее, чем всем. Случаются отступления, слабость, он, может быть, не хочет больше никого учить… Дело учителя — дать толчок, что же здесь такого. Все остальное — уже наше дело. Я скажу вам честно, что не думала у Бориса Васильевича научиться. Я ходила к милым людям, вот вроде вас. Мне в радость был разговор, человеческое слово. А все эти его уроки… хорошо, если что-то у вас получилось, но бойтесь беса, бойтесь ухода в другое пространство. Борис Васильевич ведь не этому учил. Он учил жить и говорить свободно, ну и что же еще… Может быть, его давит ответственность, я не знаю. Но прошу вас сейчас не ждать от него уроков, вообще ничего не просить… Поймите, он не тот, что был.</p><p class="p1">Отлично, понял Даня. Разумеется, он не тот, — т е м и остаются лишь остановившиеся! Учитель вышел на новую ступень, он сумел и из ссылки добыть урок, он продолжает расти — и потому непонятен былым ученикам. Сейчас его наконец пойму только я — я, который тоже выпрыгнул из себя прежнего.</p><p class="p1">— Я ничего не буду у него просить, Елизавета Дмитриевна, — сказал он твердо. — Мне нужно только понять…</p><p class="p1">— Как вы похудели, Даня, — сказала она грустно. — Ничего уже от юноши, совсем мужчина. У вас было такое славное круглое лицо.</p><p class="p1">— Терпеть его не мог.</p><p class="p1">— И напрасно! — горячо прошептала она. — Это, может быть, лучшее… этого уже теперь не вернешь.</p><p class="p1">— Потолстеть всегда можно.</p><p class="p1">— Будет не то… Впрочем, что я. Если вы нигде еще не остановились, то милости прошу ко мне, а если не хотите, найдем, у меня есть тут знакомые, из местных. Рады будут свежему человеку.</p><p class="p1">— Я думал до вечера всего, — сказал Даня не слишком искренне. Он надеялся, конечно, побыть с учителем подольше и отпрашивался на неделю, но допускал и то, что Остромов теперь закрыт от прежних адептов и ограничится беглыми указаниями.</p><p class="p1">— Как знаете. Но если что — я всегда вас устрою и с разговорами навязываться не буду…</p><p class="p1">— Да мне в радость. Я очень давно так ни с кем не говорил. Мне и не с кем.</p><p class="p1">— Да, да. — Савельева вдруг заторопилась. — Вы идите. Я понимаю, что вы не ко мне, а к нему. Тогда, наверное, чем скорей, тем лучше. Он на базаре, Даня. В это время обычно на базаре. Идите. Если хотите, сумку оставьте.</p><p class="p1">— Нет, нет. Я так.</p><p class="p1">— Ну, хорошо. Только помните: не удивляйтесь и не требуйте большего…</p><p class="p1">— Я не удивлюсь, Елизавета Дмитриевна, — сказал Даня слишком значительно, и она улыбнулась.</p><p class="p1">— Обедать приходите непременно. У вас деньги есть? У меня сейчас есть, пьеса ведь, давайте я вам дам, купите зелени к обеду, сварим щи…</p><p class="p1">Монахиня Амальфия варит щи, подумал он. Всему научишься в этой России.</p><p class="p1">— Да у меня есть, я ведь работаю.</p><p class="p1">— Все там же? Учет чего-то?</p><p class="p1">— Учет, — сказал он. — Ну, где у вас базар?</p><p class="p1">Она объяснила: от Энгельса направо по Московской, через три квартала налево, а дальше он увидит.</p><p class="p1">— Спасибо, Елизавета Дмитриевна.</p><p class="p1">— С Богом, — она поцеловала его в лоб, встав на цыпочки, и быстро перекрестила. — Так я жду обедать.</p><p class="p1">Он вышел, поймал на себе странно злобный взгляд старухи на лавке — вечно праздной русской старухи, регистрирующей белесым глазком всех приезжающих, умирающих, несущих в дом зелень для щей, — и зашагал по пустынной, пыльной улице Энгельса, безрадостной, как семья, частная собственность и государство.</p><p class="subtitle">2</p><p class="p1">Была суббота, базар бурлил, пахло селом — навозом, убоиной, дегтем. Дане казалось, что это и есть настоящие русские сельские запахи. Татарские села пахли иначе — дымом и особым крымским кипарисным духом, пропитывавшим на полуострове все. С высокой базарной площади открывался вид на серую, жестяную Суру, тонкую полоску леса и луга за ней. Иногда налетал резкий жаркий ветер, поднимал пыль, кружил маленькие спиралевидные вихри. С возов торговали молоком, свежим хлебом, розовым салом, босые девчонки с ногами в коросте протягивали кульки семечек и земляники. Даня слышал, как голодали тут семь лет назад, и дивился, как быстро все зарубцевалось: это был хоть и небогатый, а все же сытный и шумный рынок со всем, что положено, с огурцами и медом, и даже первыми июньскими грибами, в которых все же было что-то ненастоящее, потому что пахли они — Даня остановился, взял, понюхал, — не грибной прелью, а травой. Он шел по рядам, между палатками и возами, высматривая учителя, — и все-таки заметил его не сразу.</p><p class="p1">Да и мудрено было узнать Остромова.</p><p class="p1">С удивительной своей способностью к приспособлению он мимикрировал и здесь, хотя мимикрия его всегда была с легким диагональным сдвигом, — чтобы выглядеть не таким, как все, но ровно так, какими таинственные мудрецы должны представляться в новой среде. Здесь не нужны были ни шапочка, ни надменность, ни цитаты. В нем появились теперь черты провинциального и даже сельского чудака, знающего, однако, нечто такое, что лучше с ним не связываться. Он отпустил седоватую бородку, негустую, слегка кучерявую. Куполообразная голова даже в пустынеобразную жару была покрыта блинообразным серым картузом. Остромов странным образом пополнел — или так казалось благодаря бесформенному и тоже облезлому пальто, в которое он здесь облачился? Изменились даже круглые серые глаза — они смотрели теперь с подозрительным прищуром, с каким глядят на посторонних все сельские жители: этот чудак был себе на уме и готов был ежесекундно дать деру. Даня вовсе не признал бы его, если бы не резкий выкрик:</p><p class="p1">— Гороскопы, гадания о будущем, целебные снадобья от всякого недуга! Разрешено заммедснаба губкома Сецким, прошу, товарищи!</p><p class="p1">Остромов был нищ, это было видно. Нищета его была не та, что у Одинокого, не профессиональная, не то впадение нищего духом в органичнейшее, свободно выбранное состояние, в котором его низкая, живущая чужим подаянием душа попадала наконец в естественное положение, — но нищета унизительная, еще не ставшая бытом, нищета птицы, которой запретили летать, скудость жизни мастера, у которого отняли ремесло. Ни одно из его бесчисленных умений не годилось в этом мертвом городе, холмистом, но плоском, каковы бывают только города без будущего, укромные мучилища средней России. Здесь некого было виртуозно обмануть, ограбить так, чтобы обогатить — опытом, знанием, хотя бы новым словом, которым можно будет потом морочить других. Здесь годилось только пошлейшее, грубейшее шарлатанство, которому несложно выучиться — но, в отличие от виртуозного обиралова, оно что-то заземляющее делает с душой. Пензенские обыватели не хотели бессмертия. Их беспокоил желудок, и Остромов вынужден был снабжать их желудочными снадобьями, изготовленными по древним алхимическим рецептам. Он поднялся бы, но тут неоткуда, да и некуда было подняться. Эта яма не предполагала разбега для взлета. Отсюда можно было только выползти, и он выползал, и ненавидел себя за это. Самая плоть его огрубела и отяжелела. Он прежде любовался своей гладкой, упругой кожей, — теперь это был серый пергамент. Пенза жрала его. Но больше всего ненавидел он свое прошлое, Петербург, людей оттуда. Все-таки эти мрази знали, куда его выслать, — у таких нет ума, но есть преувеличенно развитое чутье. Если бы Кавказ, блаженный Кавказ! Там он развернулся бы, а то, как знать, и ушел бы через Батум, каналы были. Ему рисовалась даже Турция. Но его послали сюда, в глухую Россию, где спали на душных перинах, жили приплюснуто, в комнатах с тяжелыми сводами, с низкими клопиными потолками, где храпели, рыгали, крестили рот, ничему не верили, шпионили за любым чужаком, а чужак был любой, кто не прожил тут с чады и домочадцы тридцать лет и три года. Те, что поумнее, хранили в сундуке врученного в гимназии Надсона. Год он задыхался в этом городе, а через год приспособился, но нечто было утрачено невозвратимо. И всякое напоминание о своей прежней блестящей жизни он ненавидел мертвой, тупой пензенской ненавистью — это она, тяжелая, как зимняя вода, заполняла теперь его душу и тянула книзу, это она жила теперь там, где прежде обитало легкое, блескучее, окрыляющее презрение.</p><p class="p1">И он был нищ. Он забыл вкус еды. Здесь была не еда, а глина.</p><p class="p1">Даже в голосе его, прежде чеканном, — такими голосами полемизировали на конклавах кардиналы, решая вопрос о сущности чего-нибудь троичного-четвертичного, — появилась горловая сыроватость, напоминавшая, страшно сказать, Одинокого. Однако голос изменился меньше всего — не зря никогда не существовавший магистр Михель Гаагский, на которого любил ссылаться Остромов, называл его истинным портретом души.</p><p class="p1">Некоторое время Даня наблюдал издали, не решаясь подойти. Наконец он сделал шаг, как бросаются в воду.</p><p class="p1">— Учитель, — проговорил он хрипло, — вы не узнаете меня?</p><p class="p1">Остромов поднял на него глаза и, что самое удивительное, не удивился. В глазах его стремительно сменились испуг, разочарование и раздражение.</p><p class="p1">— А, ты, — сказал он, словно они расстались вчера. — Тоже сюда, что ли?</p><p class="p1">— Я приехал к вам, — торжественно и тихо сказал Даня. — Помните, вы говорили о трех встречах. Вот она, третья.</p><p class="p1">— Ничего не помню, ничего не говорил, — забубнил Остромов. — Тебя не взяли?</p><p class="p1">— Я уехал к отцу, отца сослали, — сбивчиво заговорил Даня, хотя репетировал этот разговор сотни раз. — Я могу остаться с вами, если хотите… я разделю, как вы скажете…</p><p class="p1">— Так тебя не взяли? — переспросил Остромов.</p><p class="p1">— Нет, но…</p><p class="p1">— Ну, ты приехал, и что? — перебил Остромов. — Что тебе надо?</p><p class="p1">Он постреливал глазами по сторонам, но к нему никто не подходил. Жители Пензы, в просторечии пензюки, знали свою судьбу и без гороскопов.</p><p class="p1">— Я работаю, учитель, — почти прошептал Даня. — Ваши рукописи у меня. Я далеко продвинулся, Борис Васильевич, но мне нужна ваша помощь. Мне не дается переход во второй эон, и я надеюсь…</p><p class="p1">— Чего? — переспросил Остромов с непередаваемой интонацией. Это звучало уже почти как «чаво», даже «чавой-та». Протей, он без остатка растворялся в чуждой стихии, величественно мимикрировал, каждый раз сотворяя себя заново.</p><p class="p1">— Второй эон, — повторил Даня еще конспиративней. — Мне нужно число. У меня, — он почти шептал, — были уже опыты полета, удачные, повторяемые. Я много работаю один…</p><p class="p1">— Работаешь? — переспросил Остромов. — Над чем же ты, любопытно узнать, работаешь?</p><p class="p1">— Я освоил первую ступень, — все еще гордо произнес Даня, хотя уже подозревал, что ведет себя неправильно и с самого начала взял ложный тон. — Я левитирую уже достаточно свободно. Исчезновение дается трудней, но несколько раз было… Потом — экстериориация, уже практически без усилий, хотя, вы понимаете, без руководства трудно…</p><p class="p1">— Кретин, — сказал Остромов, улыбаясь и мотая головой. — От кретин, прости, Господи, мою душу грешную.</p><p class="p1">Он не мог так говорить, это был не его голос, и тем не менее это был он — Даня узнал несомненность, ту самую, о которой читал в трактате про узнавание дурных и хороших мест. Несомненней всего то, чего не может быть, ибо здесь видим след не нашей, но божественной логики. Слишком хорошо или слишком страшно — всегда правда, и для правдивого изображения тайной действительности нужно вычислить лишь угол, под которым истина врезается в реальность; некоторые полагают, что этот угол меньше шестидесяти, но больше сорока пяти, как возраст истинной мудрости, еще не тронутой…</p><p class="p1">— Кретин, — повторял Остромов и мелко смеялся. — Вот же, Господи… Ты что, теленок, верил всему?</p><p class="p1">Даня потрясенно молчал.</p><p class="p1">— От же семь на восемь, восемь на семь, — трясся Остромов, и в нем все отчетливей проступал тот простой, славный русский мастеровой, который в славный русский весенний день, сука, убьет — не задумается. — Урод сопливый. Он изучал, он продвинулся. Ой, смерть моя. До чего ж тупая рожа. Телок. Он левитирует, он летает. Лети, дружок, с кровати на горшок. Дубина. Где тебя такого вывели? Почему ты еще жив, уродина? На себя посмотри. Что еще с вами такими делать? Вас надо доить и ноги об вас вытирать. Что тут удивляться, что с вами делают что угодно? Я не удивляюсь, нет, я не удивляюсь…</p><p class="p1">Это несомненно говорил учитель, но учитель, безнадежно разочаровавшийся в учениках, заставивший себя забыть обо всем, чему он учил их прежде. Так говорил бы Христос с апостолами, увидев, во что превратилась церковь. Остромов хохотал и все больше злился — Даня не мог понять, на кого, но чувствовал, что сам он — лишь спусковой крючок для долго копившейся ненависти.</p><p class="p1">— Учитель! — хихикал Остромов, хлопая себя по бокам. — Учитель, нассы мне в глаза, и это будет божия роса. Говнюк. Летатель. Да ведь я врал вам всем, дураки, я морочил всех вас, кретины! Остальные люди как люди, все чего-то поняли, один этот, телятина, еще… — и тут учитель употребил такой глагол, которого Даня не знал, но смысл которого постиг интуитивно. Никто лучше Остромова не стимулировал чтения мыслей. Он все хохотал, и на них уже оглядывались.</p><p class="p1">— Идиот! — взвизгивал Остромов. — Я не могу, я кончусь! Смотрите все на идиота! За числом приехал, да? Числа захотел! Я научу тебя сейчас левитации. Записывай: берешь перо, гусиное, лебединое, затачиваешь, а можешь не затачивать, и этим самым концом, который называется пенек, — ты запомнишь, потому что пенек это ты, — вставляешь себе в дупу, не перепутай, с тебя станется… И летишь, лети-и-ишь!</p><p class="p1">Оскал учителя становился страшен. Да и как еще мог бы проповедовать учитель, вернувшийся из ада.</p><p class="p1">— Лети, стоеросовый. Не-ет, правильно, правильно все они с вами делают! На что вы еще годны? Вас драть и драть, вами улицы мостить! Золотой слой. Сливки. Пшел вон, дрянь, сопля, коза безрогая! Скот. Вон, сказал! Вот же, семь на восемь, восемь на семь…</p><p class="p1">Даня почтительно кивнул и отошел как-то странно — шаг назад, шаг вбок, словно уступая дорогу чему-то истинно-величественному. Он понял. Учитель гнал его, заботясь о его безопасности, но нашел-таки способ передать ему число.</p><p class="subtitle">3</p><p class="p1">Сказать, что он торопился опробовать число, как торопится миллионерский сынок прыгнуть в подаренное папашей авто, — было бы неверно: само число неистовствовало в нем. Оно требовало взлететь, как гора сама подталкивает лыжника — ну же, один толчок, и вниз со свистом; оно настаивало на попытке, как последний кусок складной картинки умоляет поставить его на место. Число было то самое, он почувствовал это сразу — и вместе с тем никакая сила не заставила бы его открыть эту цифру своим умом. Самая форма, в которой она была дана, казалась единственно возможной — и потому никаким простым подбором не открылась бы. Ко всему прочему, это был год рождения отца.</p><p class="p1">Он почти не помнил, как ушел с базара. Улица постепенно исчезала, словно растворяясь в Суре. Он шел по бесконечно долгому склону, спускаясь все ниже, словно разгоняясь для взлета, — и, достигнув дна, взлетел. Все благоприятствовало. Окраина была пустынна, и взлет оказался непривычно легок — пыльное, душное небо с двумя-тремя штрихами перистых облаков словно притянуло его. Перо, вспомнил он, говорилось что-то о пере. Он взлетал без утомительных штопорных поворотов, не ввинчивался, а втягивался, и смотреть на него было некому.</p><p class="p1">Река сверху была тяжелой, изжелта-черной, но он уже привык к этим сменам цветов, к вспышкам красного среди мирной зелени, к разноцветным крышам домов: форма не менялась, но сквозь нее истинным цветом проступала сущность. Пенза отсюда желтела, как глина, чуть лохматясь по краям, и среди этой глины мерцали и тлели голубоватые пятна горя, плесень привычной нищеты и сдавленной мстительности. Всего этого, впрочем, было на изумление мало. Было ясно, что город без особенных изменений простоит еще не одну геологическую эпоху — как любой город, выключенный из истории и не подотчетный никакой морали.</p><p class="p1">Несколько пьяненьких бродило в эмпиреях по случаю субботнего дня, почти не различая друг друга. Некоторые из них видели Даню и принимали за пьяного. «Браток! — крикнул один. — Ты не с Саранска ли чо ли?». «С Саранска», — ответил Даня из внезапного озорства. «Ах, братишечка, — сказал стертый пьяница, — какая жизень моя вся горькая, горькая, как чертов хвост». Вероятно, чертовым хвостом называлось едкое местное растение, а может, он просто не знал, что несет. В первом эоне такое случалось сплошь и рядом.</p><p class="p1">Уходя выше, в кисейную пылевую облачность неясного происхождения, — словно душа пыли парила над душой Пензы, — Даня ждал, что у него спросят цифру, но вместо этого с небывалой прежде четкостью увидел эгрегоры. Их было, как он и угадывал прежде, два; но то, что на первой ступени представлялось безликими сущностями, обрело теперь лица и речь, и Даня не сразу, но с болезненной ясностью понял, кто перед ним.</p><p class="p1">Сущности были, как он и предполагал, мужская и женская, в отношениях странного чередующегося равноправия. Они были вариативны, то есть масочно разнообразны, но сущностно неизменны. Роли эти сменялись на глазах, как в волшебном фонаре, но в сущности она была скандальная пьяная баба, а он ее сожитель, содержанец и сутенер, спьяну ее поколачивавший. При этом она была хо-хо-хо! — хозяйка публичного дома, а он сторож и швейцар. При этом она была рябина, а он дуб, и оттого она вся была в мелких красных рябинах, а он ничего не понимал. Иногда она была секретарша, а он конвоир. Нередко она была купчиха, а он работник, и вместе они отравляли свекра со свекровью, жадных садистов, которые были они же. Из всех ролей они безошибочно выбирали худшие — те, где надо было мучить и мучиться. Они попытались заголосить — спасайте, люди добрые, забижают больных, больных! — и оскалили крупные зубы, но Даня внятно сказал: пятьдесят шесть; и это подействовало.</p><p class="p1">Тогда они прибегнули к величию. Это был их любимый аргумент, сравнительно продвинутый, если взять за точку отсчета визгливое непущание. Они встали в странную позу, сцепившись жилистыми руками и вытянув их вперед. Они представились необъятными. От них гуще запахло сырым мясом, ибо это была их единственная пища. Они ненавидели друг друга и яростно совокуплялись. Им было лень. Их пучило. Они были действительно очень большие. Пятьдесят шесть, сказал Даня и мысленно расположил семь дверей в восемь рядов — семь на восемь, восемь на семь.</p><p class="p1">Тогда они прибегли к последнему — как им казалось, безотказному. Их сделалось жалко. Особенно жалко сделалось ее, ибо если ты уедешь или просто отвернешься — представляешь, что он тут сделает с ней?! (На самом деле они были в сговоре). Они были добренькие, пьяненькие. Они были бедненькие. Они были слезливые, неяркие, у них что-то развевалось по ветру. Кротко, безответно хрустели они чьими-то, явно не своими костями — впрочем, все кости тут были их. Они умылись слизистыми слезьми. Это в самом деле было очень грустно.</p><p class="p1">Пятьдесят шесть, сказал было Даня, но почувствовал, как где-то глубоко внизу, в бесконечно отдаленной Пензе, одна раскаленная точка рыдает над ним и над собой, одна точка бесконечной любви и непрощаемой вины, ни на что не надеющийся нежности и бессмысленного раскаяния; одна жалкая, стыдящаяся привязка, перерубить которую было невозможно. Они затаились, наблюдая. Это была ловушка.</p><p class="p1">Семь на восемь, восемь на семь, сказал он с ненавистью и впустил в семь дверей семерых зверей, а восьмая распахнулась для него.</p><p class="p1">Он ожидал воя, угроз, проклятий, — но вслед ему веяло лишь крайним, непробиваемым равнодушием, которое одно и таилось под всеми этими соитиями, зверствами и вишневыми садами; равнодушием такой пустынной пустыни, что самая мысль о мысли смешна на ее грязно-белом снегу. И пылающая точка, навеки одна, затерялась в ней.</p><p class="p1">Он глубоко вздохнул и поднялся во второй эон. Немногие счастливцы приветствовали его. Лазурное небо античности распахнулось вокруг.</p><p class="p1">Он ехал в трамвае на вокзал, и вокруг было лазурное небо античности. А в Пензе больше нечего было делать, да и не было никакой Пензы. Она как-то стиралась по ходу, а когда он сошел с трамвая, стерся и трамвай.</p><p class="subtitle">4</p><p class="p1">Надя узнала его сразу. Она узнала бы его из тысячи заключенных, согнанных в страшный глинистый овраг, из тысячи бродяг, тянущихся скорбной вереницей по кругам провинциального ада, по серпантинным уличкам холмистой Пензы; из сорока тысяч любящих братьев, из миллиона принцев, явившихся за ней. В сотнях снов являлась ей эта встреча, в прекрасных, а чаще в страшных декорациях, потому что нестрашных она не заслужила. Всюду он спускался за ней в ад, и его появление означало, что она прощена. Рухнуло дерево страшное, эхо весь лес потрясло.</p><p class="p1">Всем существом ждала она этой минуты. Она знала, что прощения нет, но это значило, что прощение есть. Есть грехи несмываемые, но в чем смысл любого греха, если нет прощения? Вполне очиститься нельзя, но можно вернуться в число живых, можно разрешить себе хоть на секунду снова числить себя среди людей. Если очень долго не прощать себя, Бог простит тебя. Она понимала, что это подлая мысль, но не могла отринуть ее. Бога без милосердия для нее не было, Бог не мог не простить. И Даня был послан знаком этого прощения.</p><p class="p1">Сотни раз думала она, как это будет; как кинутся друг к другу они, сразу узнавшие друг друга при первой же встрече; как она все расскажет ему, уже все знающему. Как он не найдет греха в ее предательстве. Как он оправдает его.</p><p class="p1">Простить и разрешить мог он один — точней, Бог через него. Бог любил Даню, чудесно спас его, сделал ее предательство поправимым и, как знать, простительным. Она ждала его, как дурочка в сказке ждала своих парусов. И вот он сидел в трамвае, где она пела и просила милостыню, — в желтом дребезжащем трамвае единственного пензенского маршрута, от базара к вокзалу, базар-вокзал.</p><p class="p1">Он сидел на коричневом сиденье и смотрел мимо нее невидящими восторженными глазами, смотрел мимо нее и не видел ее. И она боялась встать прямо перед ним, ибо это значило бы нарушить условия. Она стояла поодаль, в проходе, любовалась его неземным, светящимся лицом и ждала. Несколько раз он скользнул по ее лицу золотыми невидящими глазами. И снова устремил их туда, где не было для нее места.</p><p class="p1">Она забыла петь, забыла просить и молча любовалась им. Он исхудал, исчезла добрая, прекрасная юношеская размытость черт, обозначился острый подбородок и решительные, даже вдруг татарские скулы. Неизменны остались волосы, мягкие, волнистые, которые она решилась погладить всего однажды. Он весь был не здесь, и это ясней ясного говорили, что прощения нет, — его новая высота ясней ясного обозначила ей все ее падение. Она вдруг увидела себя со стороны — пыльная, погасшая, прежде времени постаревшая Надя, сломленная непоправимо, безнадежно. До Пензы была надежда, но теперь нет. Она жила с Остромовым уже давно, не дождавшись третьего знамения, — жила потому, что жалела его, тоже старого, опустившегося. Ей надо было кого-то жалеть, не так, как жалеет большинство, желающее возвыситься этой жалостью, а так, как гусеница ползает и бабочка летает. Эта жалость была ее жизнью, другого дара ей не было дано, и отнять этот дар было так же немыслимо, как запретить воде течь, а песку сыпаться. Не будь Остромова, это направилось бы на другого, на первого ребенка во дворе, но Остромов был тут, и он дождался своего часа. Она переехала к нему не сразу, долго ждала неизвестно чего, — но через полгода стала жить с ним, и он, хмурый, вечно злобный, смягчился. Он иногда теперь даже мечтал вслух, как после ссылки увезет ее на Кавказ, и там они заживут. У него были знакомства на каком-то чайном заводе, он даже написал туда, но ответа не получил.</p><p class="p1">Она с брезгливой ясностью видела себя со стороны и молилась только об одном — чтобы Даня не узнал ее. Она робко встала за спинку его сиденья и видела теперь только затылок, мягкие волосы, которых так хотелось коснуться. Но это было нельзя. Он все-таки достиг, чего хотел, и она смотрела молча, благоговейно.</p><p class="p1">Все так же ничего не замечая вокруг себя, он сошел у вокзала, где трамвай делал круг. Надя смотрела ему вслед почти спокойно, как смотрела бы дурочка на свои паруса, оказавшиеся багровым закатным облаком. Вот они прибыли, но ведь никто не обещал, что их можно будет потрогать. Ни одно предсказание не врет — просто оно сбывается так, что лучше бы не сбывалось; ибо мы получаем только то, что заслужили, а заслужили мы только это. И потому всякая беда обжигает нас правдой, а всякое счастье выглядит ошибкой разносчика: шел в комнату, попал в другую.</p><p class="p1">Трамвай заполнился и медленно, натужно, с дребезгом пополз по Московской.</p><div class="poem">
<div class="stanza">
<p class="v">— Заря-заряница,</p>
<p class="v">Красная девица,</p>
<p class="v">Мать Пресвятая Богородица! —</p>
</div>
</div><p class="p1">запела Надя дрожащим, дребезжащим, жестяным голосом:</p><div class="poem">
<div class="stanza">
<p class="v">Детей людских жалея,</p>
<p class="v">Сказала Пресвятая:</p>
<p class="v">«Уймись, пророк Илья.</p>
<p class="v">Грешат, не разумея,</p>
<p class="v">Грешат, не понимая,</p>
<p class="v">Но всем простила я».</p>
</div>
<div class="stanza">
<p class="v">Перед Ильею стала,</p>
<p class="v">Словами не смирила,</p>
<p class="v">Да с плеч своих сняла</p>
<p class="v">Святое покрывало,</p>
<p class="v">И все село покрыла,</p>
<p class="v">И всех людей спасла, —</p>
</div>
<div class="stanza">
<p class="v">Заря-заряница,</p>
<p class="v">Красная девица,</p>
<p class="v">Мать Пресвятая Богородица!</p>
</div>
</div><p class="p1">Подавали мало, но какое-никакое подспорье. Переписывать на машинке ссыльную не брали, получить медицинский диплом она не успела. Копейки присылала мать. В трамвае Надю уже хорошо знали, нужно было чаще обновлять репертуар. Голоса, конечно, почти не было, но она пела и романсы, и новые песни, например, про конницу Буденного. Ни зимой, ни летом она не снимала бурого платка. Ее считали блаженной, старухи просили ее молиться за родню, даже милиция не гоняла — куда еще деваться сумасшедшей? Остромов хотел умаслить губначздрава Стецкого, выписать ей справку, но Стецкий шейного знака не понял и Остромова прогнал в ту самую шею.</p><p class="p1">Остромов не знал об ее предательстве. Рассказывать не было смысла, а если б и рассказала — он не удивился бы и не озлился, он просто бы ничего не понял. Как можно было не сказать? Он, не колеблясь, рассказывал Райскому все про всех, хотя никому не вредил нарочно. Было твердое чувство, что с этими можно иметь дело. Кто же знал, что друг друга они боялись больше смерти, что расправ хотели больше, нежели бессмертия, что с ними немыслимы были никакие кошки-мышки, а только собачки-косточки? В первое время он не мог себе простить этой недальновидности и сидел дома, не выходя на улицу, ни с кем не видясь, ничем не питаясь. С Надиным приходом он оживился, повеселел, стал подумывать о заработке. В Пензе, да еще в двадцать восьмом году, было, конечно, не до спиритических сеансов. Но чувство власти хоть над кем-то разгоняло его кровь и освежало ум. Надя пришла к нему не от одиночества, — одной было легче, — а от чувства, что нужна ему: ей самой ничего уже не было нужно. И он благодарил, утешал, внушал, что ссылка — чушь: что такое два года? Еще заживем…</p><p class="p1">В этот день Надя собрала рубль с полтиной — не так плохо, Остромов со своими снадобьями иной раз и этого не зарабатывал. Она медленно, тяжело пошла на Купеческую, ныне Михайловскую, в честь убитого в пятом году типографа, — вскоре переименовали и ее, поскольку старухи упорно шептались, что улица названа в честь архангела Михаила, и она сделалась Чапаевской. Здесь они снимали комнату у бывшей купчихи Сысоевой. Купца Сысоева взяли в заложники и расстреляли в числе сотни других в ноябре восемнадцатого года. У него осталась дочь Таисия, которую никто не брал замуж. Ее приняли в текстильный техникум, но не пускали в комсомол. Она считала мать виновницей всех своих бед, шпионила за ней и доносила. Купчиха Сысоева была, должно быть, в прежние годы бабой решительной и даже властной, но теперь из нее словно вынули все кости, и она дрожала и зыбилась, как студень. Она жила как бы без разрешения, опасалась лишний раз открыть рот, страшно боялась дочери и часто по вечерам скулила вполголоса, одна в своей комнатушке, сидя на бессмысленно высокой кровати, утираясь концом платка. Дочь сначала подлещивалась к постояльцам, считая их новыми людьми, но, узнав, что они ссыльные, стала их тиранить так же, как тиранила мать. На Остромова она покрикивала, Надю считала безумной и обзывала убогой. Даже дети, чувствуя что-то, не дразнили Надю, но Таисия ничего не чувствовала, кроме собственной удушающей ущербности. Она следила за матерью, записывала ее разговоры, состоявшие из стонов и охов, доносила на нее, жаловалась в ячейку, что мать прячет в шкафу портрет отца, уничтоженного как враг, и требовала принять меры вплоть до высылки. Если мать угощала Остромова или Надю картофельными оладьями, Таисья доносила, что Сысоева поддерживает высланных врагов. Она хотела взять другую фамилию, но ЗАГС не нашел оснований. В ячейке Сысоеву уже ненавидели. Она была несказанно уродлива, жирна, прыщава. Одобрял ее только комсомолец Сулин, с огромным утиным носом и вытянутыми вперед губами. Вообще лицо его было как бы схвачено за нос и вытянуто вперед, в светлое будущее. Он говорил, что из Сысоевой будет толк. Сам он пошел потом в органы.</p><p class="p1">Когда Надя вернулась, Сысоева как раз собачилась с Остромовым. Остромов сидел за липким столом и в одиночку чаевничал, а Сысоева стояла напротив, подбоченясь, и требовала, чтобы он убрал со стола.</p><p class="p1">— Вы ждете, может быть, что за вами уберет прислуга, как в старое время. Теперь прислуги нет, — говорила она, подвизгивая — светски, как ей казалось. С врагом надо было разговаривать вражески.</p><p class="p1">— Допью и уберу, — флегматично отвечал Остромов.</p><p class="p1">— Вы второй час пьете. У вас работы, может быть, нет, а мне нужен стол для раскройки на нем.</p><p class="p1">— У вас есть стол в комнате, — монотонно отвечал Остромов.</p><p class="p1">— За тем столом я занимаюсь, и это не ваше дело рассуждать, что у меня есть в комнате, а чего нет. Это мой дом, я захочу — вы завтра съедете отсудова. Я возьму ваше барахло и в улицу выставлю.</p><p class="p1">— Я вам заплатил, — скучно отвечал Остромов.</p><p class="p1">— А я не знаю, какеми деньгеми вы мне платите. Я не знаю, откудова ваши деньге. Вы ваши деньге делаете обманом трудящихся. Я вас вот выведу еще на воду. Вы мне своими деньгями рот не заткнете.</p><p class="p1">Надя вошла в кухню, Сысоева бросила на нее беглый взгляд, и в этот раз нечто дошло даже до нее. Она отшатнулась от надиного лица, как от головни.</p><p class="p1">— Ну вы не очень тута, — сказала она напоследок и вышла.</p><p class="p1">Остромов ясно чувствовал волну безысходной тоски, для которой слово «тоска» было еще непозволительно мягким, — эта тоска наплывала от Нади, и утешить, утишить ее было нечем; он напряг все свои способности, но и способностей никаких уже не было, в лучшем случае их хватило бы, чтобы утихомирить расшалившегося ребенка.</p><p class="p1">— Удивительно хорошо торговал сегодня, — сказал он бодро, хотя не продал почти ничего. — Скоро начнем откладывать, голубка, на Кавказе на первое время понадобится. А потом, вот увидишь, там я развернусь.</p><p class="p1">— Да, — сказала она, — да, я знаю.</p><p class="p1">За стеной тяжело ходила бывшая купчиха Сысоева, стонала, зевала, крестила рот, наконец сказала себе: «Ну, спать ложицца». И от мысли, что она ложилась спать в этом доме уже сорок лет, хотелось завыть в голос: на эту перину, под эти потолки, сорок лет спать ложицца… Дико забрехала соседская собака и смолкла. Пенза засыпала на своих перинах, под пыльным небом, в центре среднерусской равнины, на которую Бог, может быть, и взглянул когда-то, но тут же зевнул, перекрестил рот и решил ложицца. Может быть, кто-нибудь и радовался тут, и любил все это, и с наслаждением плескался в веселой, блескучей Суре. И когда Таисию, давно схоронившую мать, все-таки вышлют отсюда как купеческую дочь, а дом ее отдадут двум пролетарским семьям, одна из которых подожжет его, чтобы досадить второй, — Таисия в ледяном Томске будет вспоминать свою чистенькую Пензу и плакать, скулить вполголоса, как скулила сейчас по ночам ее ожиревшая, полубезумная мать. Не надо любить место, где родился, а лучше бы не рождаться ни в каком месте.</p><p class="p1">— Ну? — сказала Надя. — Пойдем?</p><p class="p1">— Пойдем, — сказал Остромов, и в его голосе ей впервые послышалось что-то похожее на нежность; и в своей комнате они прижались друг к другу, как дети, и долго еще она гладила его, утешая и шепча бессмысленные ласковые слова. Под пензенским стеганым одеялом, в уюте, в ничтожестве.</p><p class="subtitle">5</p><p class="p1">Эта ночь в поезде запомнилась Дане как последний приступ человеческого — рецидив постыдной болезни, совсем было излеченной, но вдруг вернувшейся. Ожог античной лазури был так силен, что он не мог заснуть и дободрствовался до засонья, и в этом засонье с мучительной четкостью подумал вдруг: что, если все не так и учитель не передавал ему никакого числа, и последнее вознесение было не более чем бредом? Обычно после левитаций он испытывал хрустальный покой, а теперь у него была тяжелая голова, и он не поручился бы, что парный эгрегор не привиделся ему на пензенской жаре. Главное же — злоба в голосе учителя была так неподдельна, что никакой конспирацией объяснить ее было нельзя, а ведь Даня ни в чем не был виноват. Если учитель и точно был учителем, он мог не предвидеть опасности — это бывает, — но Даню он знал и в душе его читал, а потому принять за провокатора не мог никак. Учитель кричал на него с яростью, с отвращением, и он так переменился, что объяснить это одним приспособлением к среде было невозможно. Вера — ничто без сомнения, утешал себя Даня; но это было не сомнение. Это была догадка, совсем другое чувство.</p></span></span>
