<span><span><p class="p1">— Мог! — воскликнул Дробинин. — Мог, но это было бы слово с положительным смыслом, а поэту, — он заговорил о себе в третьем лице, как все люди из низов, пробравшиеся на верхи, — поэту важно подчеркнуть негативность. Ей отвратительна собственная красота, ей хочется холодной чистоты и знания, но там, — он поднял палец, — там ничего этого не нужно. И она низринута. Но и раздавленная, усталая, она в глазах поэта летает, потому что в ее развоплощении больше смирения, больше подвига, чем было бы в случае успеха. Подчеркнем еще «безоболоченную»: слово найдено точно, ибо в нем явственно слышится «заболоченная». Это лишенное структуры и формы болото жизни, к таким словоформам прибегает на Западе модернизм. Это как если бы назвать вас «следующий», в том смысле, что вы совершаете следствие, но вместе с тем, допустим, и являетесь следующим за кем-нибудь в очереди.</p><p class="p1">— Так-так-так, — сказал Смирнов. — Это все так. Но вы, Герман Владимирович, про другое расскажите.</p><p class="p1">— Что значит — другое! — воскликнул Дробинин и даже вскочил от возмущения. — Нет, слушайте, вы обязаны слушать! Вы следователь, кому же мне еще читать! Со мной был этот, как его, молодой, его перевели. (И точно, молодой вор Грушин взмолился, чтобы его убрали от этого психического, который обчитывал его стихами, не умолкая даже ночью. В обмен он назвал подельника). Потом подселили этого ужасного, черного, который на меня вообще кидался… (Верно было и это: к нему подсадили татарина Баратова, страшной силы человека, но Дробинин был сильней, а главное — больше, кулаки у него были с баратовскую голову, он был аномально, непропорционально долговяз и кадыкаст, а если б не это — был бы демон, красавец). Слушайте теперь, кому же еще мне читать?</p><p class="p1">Дробинина некоторое время держали в камере на двоих, полагая, что он родственник Дробинину-эсеру и во всей этой компании главный человек; но теперь выяснилось, что тот Дробинин был из саратовских, а этот петербургский и никак с тем не связанный. Его можно было переводить в общую, но жаль было общую. Остановить его было нельзя. Он был, кажется, безумен. Смирнов решил рекомендовать его на экспертизу, но прервать Дробинина не мог, тот только раздухарился.</p><p class="p1">— Герман Владимирович! — прикрикнул Смирнов наконец. — Это все так, стишки и все это. Вы мне расскажите про антисоветскую деятельность Остромова, вот что мне нужно.</p><p class="p1">— Это пожалуйста! — оживился Дробинин. — Когда ты думаешь, что учишь, необожённый богослов, ты только кычешь, иль мяучишь, но ты не чувствуешь основ. Я слушаю тебя, не слыша, во мне звенят мои ключи, но вижу: над тобою крыша надулась куполом. Учи! Что я имею в виду? «Необожённый» — еще одно слово-двуглав, слово-двузнак: богослов без Бога, к тому же еще не обожженный, не готовый; основы у меня, поэта, и у меня ключи тайн, которые звенят, как ключи в лесу, в смысле, вы знаете, ручьи; но почему над ним крыша куполом? Это я и сам не до конца понимаю, но понимаю, что даже без того знания, которое он мог бы дать, в нем есть талантливость, а талантливость притягательна, даже когда кычет или мяучит, в чем, кстати, прорисовывается и «мучит»…</p><p class="p1">Смирнов поигрывал карандашом и думал о том, что дома ждет его светловолосая жена с девочкой. Он Дробинина не слушал. Но когда не слушаем — мы все-таки слышим, и многое западает в память. Вот почему, когда самого Смирнова взяли в тридцать пятом, он ко дню рождения жены написал стихи, что-то про «в разлуке» — «муки», «сижу» — «стрижу» (стрижу хотел бы уподобиться, чтобы к ней отправиться). Он подумал тогда мельком: почему этим размером? (Не знал, конечно, что трехстопным анапестом). А между тем отчетливая семантика приближения чего-то непонятного, пугающего, но, может быть, прекрасного: прозвучало над ясной рекою, прозвенело в померкшем лугу, прокатилось над рощей немою, засветилось на том берегу. Хотя, конечно, какая же надежда? Надежда может быть там, где дактиль — ТАтатам, ударили и отпустили, или амфибрахий, таТАтам, накатило, ударило и откатилось. А где татаТАМ — там все.</p><p class="subtitle">6</p><p class="p1">— Что же, — сказал Неретинский, — он малый любопытный. Вполне милый, но, конечно, совершенная Чухлома.</p><p class="p1">Они с Гольдштейном переглянулись понимающе.</p><p class="p1">— Вообще я бы его и не трогал, — заметил Неретинский на правах любимого консультанта. Длинное, обезьянье, подвижное лицо его смеялось. Он заложил ногу на ногу, курил и смеялся. — А что такого, в самом деле, иметь свой оккультный кружок, да и пусть занимает безобидных насекомых. Ведь им надо же делать что-нибудь.</p><p class="p1">Неретинский себя к бывшим не причислял. Он был скорей будущий. Он был из той высшей, последней, совершенно переродившейся аристократии, у которой нет уже никаких обязательств перед памятью предков; он был уже то павшее в землю и умершее зерно, из которого торчит зеленый нос ростка. Он был уже тот, кто все может себе позволить.</p><p class="p1">Среди последних и распоследних было много таких. В государственную службу они не шли, в армию их бы и не взяли. В большинстве они были урнинги, хотя и двуполые, обоюдные, совершенные, не брезгующие самками из числа таких же последних и распоследних, как они, — но длительные союзы между ними были редки. Например, между Ириной и Феликсом, и то говорили, что они там расстались. Они посланы были соблазнять малых сих, а не друг друга, — с друг другом могли разве для отдохновения, как два бледных ангела, уставшие от совокуплений с животными. Обычно они лишь раскланивались в толпе, лишь обменивались усталыми всепонимающими взорами. У Неретинского была в молодости такая спутница, ныне жена министра транспорта; что-то такое было сумасшедшее в белашевской усадьбе, в тринадцатилетнем возрасте. У них, как у всех особей с опережающем развитием, это рано начиналось.</p><p class="p1">Они были тонкими и сильными, гордыми и живучими. Они сочетали несочетаемое и потому сочетались с теми, кого не вмещало сознание предков: они легко выживали в трущобах Нью-Йорка и Харбина, они спали с портовыми матросами и циркачками, они состояли консультантами в чека. Им все было интересно, как энтомологам. Из всего искусства их трогало либо самое острое, либо самое простое. Зрелый русский реализм оставлял их холодными. Их до слез поражали народные рассказы Толстого и, может быть, Лотреамон. Или нет, Лотреамон безвкусен. Лучше всего — лучше всего — что же лучше всего? Уайльд — пресный моралист, Джойс — провинциал, а вот есть несколько строчек у Флейерворта, никогда не существовавшего и потому писавшего лучше всех.</p><p class="p1">Им можно было все. Если для выживания этих необыкновенных людей нужно было сдать или попросту раздавить кого-нибудь из обыкновенных, что же, в этом нет греха, как нет греха у энтомолога перед бабочкой. Они любили всех, но опять-таки как бабочек. Друг к другу они чувствовали не любовь, но нечто бесконечно более высокое и испепеляющее. Они были равно готовы к самоубийственному подвигу и величайшей низости, потому что для них все это было равно. Так писал о них принадлежащий к их числу Нейштадт, убитый в самом начале террора. Они никогда не скучали. Они не стремились к власти. Стремиться к власти не нужно, ибо совершенному все падает в руки само. Они превосходно умели презирать, но, в отличие от демонических дурней предыдущего поколения, никогда не афишировали этого. Презрение было их воздухом, его не замечали. Не презирать кого-нибудь — вот это было чудом.</p><p class="p1">Они мало ели и превосходно владели телом. Они любили сладости и фарфор. Среди них было много знатоков танца.</p><p class="p1">— Я бы сам его не трогал, — сказал Гольдштейн, страстно желавший быть как они. — Но видишь, там наверху нашли другой оккультизм, правильный.</p><p class="p1">— Это изумительно смешно, — сказал Неретинский. — Ты знаешь, что он ко мне присылал идиота?</p><p class="p1">— Vraiment?<a href="ch2.xhtml#id20" class="a">[27]</a> — старательно спросил Гольдштейн.</p><p class="p1">— Гадом буду, — старательно ответил Неретинский, и оба расхохотались. — Прислал кретина, который хотел убивать коммунистов. Самому, значит, не сгодился. Он вообще, по-моему, без политики. Ему все это было надо, чтобы драть ci-devants<a href="ch2.xhtml#id19" class="a">[28]</a>.</p><p class="p1">— Ну, пусть дерет кого хочет, — небрежно сказал Гольдштейн, — но делать масонский бордель среди революционной колыбели нельзя даже с разрешения.</p><p class="p1">— Со своей стороны, — сказал Неретинский, разводя руками, — ничего тебе, милый, посоветовать не могу. Разве что поспрашивать девочек. Он собирал с них, по-моему, дань.</p><p class="p1">— Это кое-что, — оживился Гольдштейн. — Но все ведь молчат. Он как-то им хорошо задурил голову.</p><p class="p1">— Кстати, знаешь? — оживился Неретинский. — У него состоял Мартынов, человек занятный. Я встречал его раз у Горбунова. — Горбунов держал клуб, где ленинградская элита с незначительной частью передовой аристократии вроде Неретинского играла в коммерческие игры. — Везение изумительное, но ставил мало. Так вот он рассказал, что они уже дошли до стража порога. Поспрошай Мартынова, он живет в Ботаническом саду.</p><p class="p1">— Говорить будет? — сразу сделавшись деловит, спросил Гольдштейн.</p><p class="p1">— Ну, mon frère<a href="ch2.xhtml#id18" class="a">[29]</a>, тебе ли…</p><p class="p1">А так как Мартынов был миктум, то с него у них дело-то и пошло.</p><p class="subtitle">7</p><p class="p1">— Вы вели антисоветские разговоры? — спросил Гольдштейн Когана, вызванного на допрос покамест в качестве свидетеля. Он не ходил в кружок постоянно, Остромов назвал его сам, будучи заинтересован в привлечении как можно большего числа свидетелей. Все они должны были показать, что ничего дурного он не делал, да и вообще, казалось ему, чем больше народу, тем безопасней. Не всех же хватать. Это показывает нам, что в известном смысле он был наивен до чистоты.</p><p class="p1">— Ну, можно сказать и так, а можно сказать и не так, — с горестным лукавством улыбнулся Коган. — Это зависит…</p><p class="p1">— А вы скажите как было, — просто посоветовал Гольдштейн.</p><p class="p1">— Ну, какие же антисоветские… Если сказать, что мясо дорого, так ведь это же еще не антисоветский?</p><p class="p1">— Смотря кому сказать, — подыграл Гольдштейн.</p><p class="p1">— Ну вот и я говорю… Правду сказать, товарищ Гольдштейн, мы вели несоветские разговоры. Советских разговоров мы не вели.</p><p class="p1">— Ну хорошо, — сказал Гольдштейн. Ему нравился разговор, нравился явно свой напротив, нравилось, что можно с ним тонко поулыбаться; он знал, что если не видеть в допрашиваемом врага, то и допрос результативней. Врага можно увидеть потом, если надо. А у самого Гольдштейна с Коганом было даже нечто общее, и это общее было — актуализация. В момент, которого оба не знали, срабатывала у них актуализация и начинала думать за них. Вот почему оба никому не могли принадлежать до конца, и Гольдштейн в ГПУ был то же, что Коган в кружке. Оба понимали, что это не навсегда, но пока, пожалуй, это лучшее, что может быть; а когда начнет рушиться, так надо успеть перепрыгнуть, но тогда уже решит актуализация, чей голос слышали они лишь в минуты крайнего риска.</p><p class="p1">— Хорошо, — сказал Гольдштейн. — А как по-вашему, знает он что-то или шарлатан?</p><p class="p1">— Тот, кто шарлатан, — рассудительно ответил Коган, — уже обязательно что-нибудь знает.</p><p class="p1">— Я вам хочу посоветовать, — произнес Гольдштейн с интонацией милого взаимопонимания, приватного договора между своими. — Вспомните получше, какие там были разговоры, потому что дело это политическое. Мистика, магистика — это разве советское явление?</p><p class="p1">Коган понял, что ему дается знак, и что участвовать в антисоветском явлении ему совершенно ни к чему. А разве он участвовал? Разве он сочувствовал Остромову? Напротив. Он был-то там всего три раза. И в эти три раза он успел понять, что Остромов относится к евреям без особенного почтения и даже сомневается в их способности воспринимать подлинную мистику. И что Остромов сам не знает подлинную мистику — в частности, каббалу. И что Остромов чужой, а Гольдштейн не совсем. С людьми известного рода хорошо жить, разговаривать, горестно посмеиваться, скептически кривиться, сомневаться, взаимопонимать, перемигиваться, — но попадать с ними в экстремальные ситуации нехорошо, ибо в экстремальных ситуациях включается матрица, заставляющая их думать только о личном спасении. Им это разрешено и даже предписано. В обстоятельствах чрезвычайных они станут спасать себя и своих, а все прочие связи и обязательства отпадут. Все их обязательства, привязанности и антипатии, удобные и приятные манеры, все средства приспособления к реальности, и в первую очередь дар ни на чем не настаивать и ничему не верить вполне — поблекнут и осыплются, как сухие листья с ближайшей липы, как сухие краски с морщин; и вера, страстная вера, не знающая релятивизма, явит вам не совсем человеческое лицо. Вы поймете, что сосед, еще вчера вам казавшийся беззащитным и крошечным человечком, защищен куда лучше вас; что вся его беззащитность была способом выжить, мимикрировать, маскироваться. Вы увидите такую силу, по сравнению с которой ничтожна любая власть, еще вчера вызывавшая у вашего соседа скромную усмешку терпеливой беспомощности. Куда денется насмешничество, терпение, скепсис! Перед вами на миг мелькнет принадлежность к столь древней общности, что никакие нынешние союзы и взаимные клятвы не сравнятся с ней; и тот, с которым было так приятно жить, говорить, перемигиваться, втопчет вас в пыль, ни на секунду не задумываясь, потому что так предписывает ему самый темный и самый глухой зов — зов рода, неистребимый инстинкт спасения. Зато с другими жить плохо, а попадать в предельные ситуации отлично — потому что гибель и есть их подлинное занятие, она им удается лучше всего, их для того и задумывали, чтобы гибнуть и губить, чтобы в них увяз любой Бонапарт; но они сейчас не входят в наше рассмотрение, из них тут разве что Тамаркина.</p><p class="p1">Все сходятся в том, что люди делятся на два типа, но критерий, кажется, утрачен, и наши усилия сводятся лишь к тому, чтобы его восстановить. Рискнем предположить, что искомый признак как раз и есть жажда той матрицы — или, если угодно, принадлежности, — которая нам в критический момент позволит все. Одни жаждут принадлежать к общности и всю жизнь ее ищут, чтобы однажды на нее сослаться, другим эта общность немыслима и всякая принадлежность мучительна. Но поистине забавно зрелище того, кто рушит чужие общности для укрепления своей; кто другим запрещает все, а себе — ничего; и Коган был бы забавен Гольдштейну, не будь Гольдштейн таким же Коганом.</p><p class="p1">И Коган начал вспоминать, и, представьте себе, многое вспомнил, и среди всех участников этой истории отделался самым легким испугом — сменил работу, переехал в Москву, и след его затерялся.</p><p class="subtitle">8</p><p class="p1">Но кто неистовей всех топил Остромова — так это женщины, у которых инстинкт самоспасения поставлен еще лучше, чем у мужчин известного рода. Правда, есть среди них и те, что жертвуют всем ради спасения возлюбленного, преимущественно негодяя, и это их особое чутье — гибнуть именно ради негодяев, потому что недемонические персонажи им неинтересны; но большая их часть снабжена от природы таким инстинктом самоспасения — ради очага, потомства, да чего хотите, — что будут топить кого угодно, лишь бы целы были их отсыревшие стены, пузатые мужья и золотушные дети.</p><p class="p1">Допросили и тещу, у которой он жил поначалу.</p><p class="p1">— Безнравственный человек, — сказала теща, — уморил тестя, с дочерью был груб. Он с самого начала, я знаю, погуливал. Я знаю этот тип. Никогда не понимала, что, собственно, Аня в нем… И у меня после него белье пропало. Я думала на мальчика соседского, но понимаю теперь, конечно, что он и больше некому.</p><p class="p1">О прошлом Остромова теща не знала ничего, но показала, что чутье ее никогда не обманывало, и безобманное это чутье подсказывало ей, что он и всегда был человек сомнительный.</p><p class="p1">— Уж вы поверьте, — повторяла она. — Уж это так. Я покойного мужа как увидела, так поняла, что положу его в гроб, и так это и оказалось. Он был не жилец, чистый, хрустальный человек. И вот вас я вижу, вижу, что вы скорее дадите отрезать себе руку, чем возьмете чужое. Вы на мое чутье можете сослаться, оно никогда еще…</p><p class="p1">И Осипов, смеясь, протоколировал.</p><p class="p1">Варварина, актриса, не отставала. Удивительно, как он сумел ей насолить.</p><p class="p1">— Я вообще не понимаю, — сказала она, вызванная в качестве свидетельницы по показаниям Когана, который видел ее в кружке, — как мог этот человек, эта низкая натура… почему к нему прислушивались образованные люди. Я всего дважды, ну, может, трижды… Вообще не понимаю этого мракобесия. Но мне кажется, что он и сам всерьез не принимал. Он половой психопат, мне кажется. Я бы на вашем месте назначила ему проверку. Он все это затеял только для того, чтобы иметь любовниц, доступ, полную власть. Он лечил этим, тут что-то мерзкое, что-то распутинское. Он одним говорил, что исцеляет, другим — что посвящает, а на самом деле это было все только для одного. И я быстро поняла это. У меня сейчас, я прошу заметить, совершенно другая жизнь. Я люблю, хочу строить семью. С заведующим рабочего клуба. Я хочу забыть, как стыдный кошмар… И, кстати, с появлением в моей жизни нового человека с истинно новым происхождением прошли эти чудовищные мигрени, которые он порывался исцелять я даже не могу сказать как.</p><p class="p1">Но кто особенно его топтал, так это Алчевская, с которой, собственно, ничего и не было. Для Алчевской это был бенефис. Остромов сам на нее показал, чтобы объяснить происхождение меча. Меч был не украден, а отдан добровольно.</p><p class="p1">— Это чудовище, — томно сказала Алчевская. — Вы представить себе не можете.</p><p class="p1">— А что? — заинтересовался Осипов.</p><p class="p1">— Это маниак. Я в жизни не встречала подобного. Он пришел якобы за мечом, но меч был не более как предлог, проверьте. Он и не интересовался этим мечом совершенно. Он сразу, как был, повалился на меня вот так, — и Алчевская стала показывать, как повалился. — И стал хватать, — Алчевская стала хватать.</p><p class="p1">— Почему не звали на помощь? — поинтересовался Осипов.</p><p class="p1">— Ах, но как я могла? Он сразу заткнул мне рот и…</p><p class="p1">— Достаточно, — смутился Осипов.</p><p class="p1">— Нет, главное не это! Он утверждал потом, что посвящает меня в третью степень, сразу в третью, минуя две первые. При этом он обнимал меня вот так, — и она показала Осипову, как именно Остромов ее обнимал. Осипов отпрыгнул.</p><p class="p1">— Он преступник, — томно повторяла Алчевская. — Я чувствовала себя совершенно под гипнозом, моя воля была подавлена, — и она собиралась уже показать Осипову, как именно он ее подавил, но Осипов вновь увернулся. Если был момент, когда он жалел Остромова, то вот.</p><p class="subtitle">9</p><p class="p1">— Тамаркина Катерина Ивановна, 1882 года, — скучно сказал Осипов. — Как же это вы, Катерина Ивановна, простая хорошая женщина, крестьянского происхождения, советская власть вам все дала, а вы видите что делаете?</p><p class="p1">— Чаво я делаю? — недоверчиво переспросила Тамаркина. Она не любила, когда ее попрекали крестьянским происхождением. — Мы ничаво не делали, мы все делали законно.</p><p class="p1">— Ну какое же законно, Катерина Ивановна, — тянул Осипов. — Вы собирались и разговоры вели, так? Разговоры про божественное, про мистику всякую. Разводили всякого Бога и архангелов, и способы летания без крыльев. Это все антинаука выходит и спекуляция.</p><p class="p1">— Ты давай мозги-то не дури мне, — сказала Тамаркина. — Ты там не был, ничего не слышал. Какая антинаука? Нам Борис Василич все по науке говорил. Он человек ученый, за границей учился. Про Бога вообще разговору не было.</p><p class="p1">— А про что был? — полюбопытствовал Осипов, насторожась.</p><p class="p1">— Про что надо, про то и был. Я тебе докладывать не нанималась. Ишь вылез! Нет закону, чтоб я тебе пересказывала. От нас вреда никому не было. Мы плохого ничего не делали. А ты людей держишь под замком, какое твое право? Это позору сколько! Как я сестры скажу, за что меня держали? За разговоры? Она скажет: за разговоры так просто никого! А какие у нас были разговоры? Он гимнастике учил, по здоровью учил, учил без слов разговаривать, так это что же, вред какой? Тебе вред от меня был?</p><p class="p1">— Темная ты женщина, Катерина Ивановна, и не понимаешь ничего, — раздражался Осипов. — Ты не учи меня про закон. По закону вас за сборы без санкции с коммерческой целью каждого на три года в Соловки очень спокойно, — пугал он. — Он знаешь кто? Он агент французский и итальянский. Им выгодно там, чтобы вам всякой мутью головы забивали. Сегодня без слов разговаривать, а завтра секреты воровать. Я тебе серьезно говорю, как классово близкой. Эти все бывшие, это отребье дворянское, а тебе чего с ними? Я про тебя знаю, ты в горничных жила, сладко тебе было? Теперь у тебя жизнь — живи не хочу, а ты советской власти в глаза плюешь. Это как? — увещевал он уже почти ласково.</p><p class="p1">— Кому я плюю?! — переспросила Тамаркина. — Где я плюю? Чего ты выдумал?</p><p class="p1">— Ну а как же не плюешь. С кем связалась. Ведь они враги. Они все враги и чуждые, и у них одно в голове — все сделать как было. Ну скажи: они же говорили насчет вернуть старый строй? Если ты мне это все расскажешь, ты, может, и выйдешь скоро. А так ты по самое горло с ними в болоте, и я не знаю, чего смогу сделать для тебя, — видишь?</p><p class="p1">— Ты на них не лайся, — прикрикнула Тамаркина, — я от них худого слова не слышала, а от тебя и так, и сяк, и темная, и болото. Я, может, светлей многих была, мне Борис Василич говорил, я со способностями.</p><p class="p1">— К чему способностями?! — скорбно восклицал Осипов. — В облаках летать?! Опомнись, Тамаркина, у нас двадцать пятый год! Он мертвых не вызывал? А то они тоже любят…</p><p class="p1">Тамаркина все больше заводилась от того, что он нарочно подделывал тон, говорил самые простые и темные слова. Он считал ее, видно, дурой. Борис Василич говорил уважительно и слова употреблял серьезные, она их запоминала и сама себе удивлялась. А этот с ней говорил, как с дитем, хотя у самого не обсохло.</p><p class="p1">— Дурак ты, — сказала она ему. — Тебе делать нечего, и ты людям жить мешаешь. Ты настоящих воров лови, уже на рынок не пойти — средь бела дня обирают. Вы ж не можете ничего, у вас трамвая не дождешься, я ботинки купила, на другой день порвалось. А вы людей ловите. Разговаривать нельзя, летать нельзя, ничего нельзя. Ты сделай так, чтобы у тебя трамвай ходил, а потом лови. Расскажи ему, тоже… Чего тебе рассказывать? Рожу отъел сидишь…</p><p class="p1">— Но-но! — осадил ее Осипов. — Не забывайтесь, арестованная!</p><p class="p1">— Все как есть тебе обскажу! — кричала Тамаркина, наступая на Осипова. — Все как есть в рожу кину, в самую твою рожу свиную, поганую!</p><p class="p1">— Э, бабка, тихо, бабка! — прикрикнул Осипов, поначалу еще полушутя.</p><p class="p1">— Тихомирить других будешь, а я тебе, уроду, все как есть в рыло выскажу! — кричала Тамаркина, только что не приподнимаясь над полом от внезапной силы. — Борис Василич такого, как ты, слушать бы не стал, на порог не пустил! Мы свет с ним увидали. А ты тут чего? Сидишь людям голову морочишь, а сам-то ты чего? Я тебя всего вижу, у тебя внутри ничего нет, одна пакость! И все вы такие, и я вам все обскажу, не прежнее время!</p><p class="p1">И Осипов чувствовал, что его словно пронзает шершавый луч, довольно болезненный; это ощущение трудно было назвать иначе — именно шершавый луч, жесткий, как напильник. Ему стало казаться, что Тамаркина и в самом деле что-то такое видит. Он затряс головой.</p><p class="p1">— Сядьте, Тамаркина! — крикнул он. — Я караул вызываю.</p><p class="p1">— А вызывай, я тебя не боюсь! Ишь пугальщик какой, караул он мне! Я таких, как ты, в девках шугала, нешто сейчас забоюсь? Урод ты гладкий, тебя затем нешто поставили, чтоб ты тут на старух топал? Ты только можешь на старух топать да детей пугать, а тебя бы в роты…</p><p class="p1">— Увести! — гаркнул Осипов. Он не понимал, почему боится старухи. Старуха была единственной, кто ни на что не отвечал, ни в чем не сознавался и яростно защищал Остромова. При этом она была классово чужда всему кружку, единственный представитель крестьянского элемента. И никакими угрозами нельзя было на нее подействовать — она от них только больше ярилась, и Осипов, страшно сказать, чувствовал, как Тамаркина с каждым допросом набирается силы. Надо было ее деть куда-нибудь, а лучше бы выпустить. Этого Осипов никому не говорил. У него начались кошмары. В кошмарах над ним летала Тамаркина. Никто из бывших, включая мужчин, не проявлял подобной твердости. С ними было даже скучно, так легко они надламывались. А Тамаркина, тьфу, чертова баба, демонстрировала худшие черты реакционного крестьянства, хоть и происходила из самой что ни на есть бедноты.</p><p class="p1">Происхождение, однако, не мешало ей летать над ним во сне. Он просыпался теперь в липком поту. Однажды, во время допроса, ему показалось, что она приподнимается над полом. Он не чаял, когда закончится следствие, и не понимал, зачем оно затягивается. Остальные тоже недоумевали: все ведь было понятно! Но Райский тянул, требуя подробностей, потому что сам еще не разобрался с главным своим врагом.</p></span></span>
