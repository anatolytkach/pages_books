<span><span><p class="p1">Иногда вдруг приходила директива переписать все городские статуи (женские), а иногда — все мосты; иногда — трехэтажные, а потом вдруг розовые здания. Когда директив долго не было, Карасев проявлял инициативу и предлагал переписать и свести в таблицу все голубятни, коих, запомнил Даня, было в городе ровно 43. Все это было зачем-то нужно, ложилось ромбиком в мозаику мира, составляемую неизмеримо высоко — Богом? Госстатом? Простым, прагматическим начальникам надо было знать, сколько в Ленинграде колбасных магазинов или трамваев, но сведения о потерянных собаках, собираемые в реестр по уличным и газетным объявлениям, могли понадобиться только величайшему стратегу, желающему учесть мелочи, или Богу, решившему проинспектировать все сущее. Дане полагалось упорядочивать сведения и сводить их в простыни общих таблиц на желтой бумаге, в трех экземплярах, а приносили их тихие агенты Карасева, сборщики статистики, большей частью калеки. Инвалидам непыльный заработок был в радость, и странное зрелище представляла собой очередь этих увечных — безруких, одноглазых, — приносящих сведения о числе сантехнических люков на Гороховой или арок на Международном. Но Даня давно не спрашивал, кому это нужно, а только благодарил судьбу за убежище, где досталось ему право не продавать душу. А досуга у него хватало.</p><p class="p1">Есть орудия тайных сил, не интерпретируемых в терминах добра и зла — человеческих понятий, спущенных сюда для того, чтобы люди в них путались и не посягали на главное. Пока они самоутверждаются или уничтожают друг друга при помощи добра и зла, истинные силы спокойно действуют вне этих ложных противопоставлений, оперируя истинными — например, сила и слабость, простота и сложность; эти силы не нуждаются в людских подвигах и мерзостях, но нуждаются в учете, в непрерывной инвентаризации сущего; и тот, кто попал к ним в услужение, живет не слишком весело, зато уж защищен от гибели в дешевой игре. Если у него есть занятие, ему не скучно. Тем, у кого есть занятие, лучше всего работать в Ленреестре, Главкадастре или Центрпроекте — все лучше, чем в Душторге или Госкадавре. Кое-что Солодов понимал: любой, кто был тут причастен к учету, выпадал из всех прочих реестров, ибо сам составлял их.</p><p class="p1">Карасев однажды проговорился об этом напрямую.</p><p class="p1">— Кого нельзя учесть? — спросил он Даню в легком подпитии, когда они всей своей невидной, неслышной, полупрозрачной конторой отмечали восьмое марта, одаряя увядшими прошлогодними яблоками женское большинство.</p><p class="p1">— Даже не знаю, — ответил Даня, в самом деле не догадываясь.</p><p class="p1">— Того, кто учитывает, — назидательно сказал Карасев.</p><p class="p1">С подчинением тоже было сложно, смутно, как бывает в подобных складках: иной дом спишется с одного баланса, не встанет на другой и так висит, пока не разъедутся все жильцы либо не прорвет трубы. Ленреестр подчинялся поначалу Ленстату, созданному пресловутым Ключниковым, великим теоретиком всяческого учета. Ключников, в отличие от большинства начальников своей эпохи, умер своей смертью, в дурдоме, ни на минуту не отрываясь от подсчета волос на головах сопалатников. Ленстат тихо расформировали, а подразделения его роздали — Ленреестр достался Ленстрою, да так и повис на нем ненужным довеском. Всякий начальник, принимая дела и вспоминая, что надо бы этот довесок отчикать либо уж превратить во что-нибудь полезное, ощущал вдруг прилив непобедимой сонливости и говорил себе томным шепотом: ладно, потом. И дом стоял, и Даня считал, и Карасев выдавал ему ежегодную тринадцатую зарплату.</p><p class="p1">К Защемиловской подвели трамвай, на ней выстроили новый квартал и детский сад, и светлую школу — так это называлось в «Ленправде». Все школы назывались теперь светлыми, будто в прежних учили одному мраку. Пустырь засадили тополями и липами, наставили скамеек, образовался сквер. Все менялось на Защемиловской, а дом неопределенного цвета все перегораживал ее, обозначая конец города и начало оврага, словно спрятанный в складку времени и защищенный от любых перемен. Устраивались новые люди, умирали прежние, в даниной жизни чего-чего не случилось — а дом стоял и контора писала.</p><p class="p1">И только изредка просители, робкие искатели справок, приглядываясь к Карасеву, чувствовали, что лучше бы им поскорее уйти отсюда; но разве не написано это крупными буквами на всех учреждениях нашей хмурой земли?</p></span></span>
