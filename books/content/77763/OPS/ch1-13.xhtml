<p class="p">Глава четвертая</p>
</div><p class="subtitle">1</p><p class="p1">Южанину на севере трудно. Он не понимает, отчего никто никому не рад.</p><p class="p1">Южные люди встречаются, как родня. Даже и полузнакомые, они раскланиваются. Юг словно в заговоре, все возросли под солнцем, щедро изливающимся на каждого; всего хватает на всех. Северянин встречному не рад: еще один претендент на жизненное пространство. Уходи, самому не хватает. Даня знал, что Питер суров, но не знал, что Питер жаден, мелочен, скареден, щелочен.</p><p class="p1">Сидеть на шее у дяди нельзя было. Разумеется, Алексей Алексеич не назвал бы это сиденьем на шее, и больше того — оскорбился бы. Но до экзаменов оставались два месяца, и нужно было устроиться хоть временно. Даня спрашивал себя: что наименее постыдно? Тайная мысль его была о газете.</p><p class="p1">В том, чтобы переводить, была изначальная неправильность: переводили сплошь и рядом, он знал это еще по письмам немногих материнских друзей, пожелавших остаться. Тут ощущался, во-первых, паразитизм, выплывание на чужой лодке, а во-вторых, в этом было что-то вроде бесконечно откладываемого пробуждения, когда понимаешь, что надо встать, но холодно. В Крыму бывает переломный день, когда особенно спится. Море приобретает свинцовый тон, небо склоняется над ним, как родня над тяжелобольным: все шло тихо, и думалось, обойдется, как вдруг он за ночь стал другим существом, в котором идут иные процессы. Может быть, это даже выздоровление, но мы не знаем, какой ценой оно куплено. Допустим, разбойник, только что бушевавший и бившийся в берега, дал обет переродиться и стать другим, и вот ему дарована жизнь, но платой стало осознание прежних грехов — он лежит суровый, неподвижный, погрузившись в себя, в ужасе созерцая прошлое, и небо в странном любопытстве смотрит на это новое существо. Что же, значит, и мне измениться? Изволь, я тоже стану свинцово. Этот день наступает обычно в ноябре, после буйства октябрьских штормов, и если в октябре еще тепло и, кажется, обратимо — то в ноябре уже мертвенно; былой избыток сил переродился в страшное, бело-синее, мутное на горизонте спокойствие, и потому-то так трудно разомкнуть глаза. Но разомкнуть надо, не вечно греться в убогом тепле; Даня ненавидел промежуточные состояния. Переводить — как раз и было чем-то вроде спасения под одеялом. Точнее он сам бы не объяснил. Следовало сделать шаг наружу и начать взаимодействовать с этим миром, лежащим после октябрьского буйства в свинцовом оцепенении. Газета была единственным, что позволяло быть среди всего этого и все-таки не участвовать; ниша летописца предполагает некую отдельность, о которой Даня мечтал втайне. Газета манила. Он мог бы писать о чем угодно, слог был, — и, может быть, даже как-то влиять… напоминать прежние слова… перемигиваться с теми, кто помнит… Он и помыслить не мог, что первым условием приема в газету было именно неумение писать; то, что представлялось ему при чтении «Красной» издержками стиля, было самим этим стилем.</p><p class="p1">Он выбрал «Красную», потому что других не было; потому что ее вечерний выпуск, помимо отчетов о драках и самоубийствах, публиковал погромы кинокартин и очерки о погромах к юбилею Пятого года; потому что — хоть он и не сформулировал бы этого вслух — в вечерней адресации к мещанству была человечность, из дневного выпуска вытравленная типографской соляной кислотой. Вечерняя Красная тихо, исподволь, сквозь зубы разрешала быть человеком, как если бы динозавры шептали, подмигивая: пст, пст… нам интересно то же, что вам… Даня решил действовать прямо — терять было нечего — и отправился на Фонтанку.</p><p class="p1">Для Красной не был еще выстроен длинный комбинат в новом стиле, решавшем и жилые здания в заводском, бесперебойно-производственном духе, — и она располагалась на втором этаже особняка Волынцевых, с таким грозным входом, словно строитель его, немец Ширкель, провидел передачу здания под газету и заранее желал окоротить входящего. Особнячок был так себе, стилизованная поздняя готика в два этажа, и с оградой соотносился, как Казанский со своей колоннадой, — но, Господи, ведь и вся местная жизнь так: забор — во, а войдешь — тьфу. И Даня вошел — с той решимостью, с какой пересекали порог только случайные посетители. Те, для кого работа здесь была рутиной, входили в Красную либо с понурой тоской, либо с искусственной, деловитой бодростью, какую так охотно усваивали репортеры. Прежний репортер бегал, спеша первым сообщить сенсацию, — новый передвигался деловито, думая на ходу, как соврать. У них это называлось, «как подать».</p><p class="p1">Усатый страж изобличил его мигом.</p><p class="p1">— К кому, товарищ?</p><p class="p1">— Насчет работы, — бодро отозвался Даня.</p><p class="p1">— Какой?</p><p class="p1">— Репортерской, или какая есть.</p><p class="p1">— Вас ожидают?</p><p class="p1">— Нет, конечно, — весело сказал Даня. Он почему-то был уверен, что все выгорит, и день был прелестный, нежно-весенний. — Как же они могут ожидать, если я только наниматься?</p><p class="p1">— Так вам бы позвонить, — пробурчал страж. — Они, может, заняты…</p><p class="p1">— Ничего, я лично.</p><p class="p1">— Обождите. — Страж стукнул в фанерную дверь, оттуда высунулся встрепанный востроносый подросток.</p><p class="p1">— Доложи вот товарищу Кугельскому, к нему относительно устройства.</p><p class="p1">Подросток с истинно курьерской резвостью дернул наверх по парадной лестнице Волынцевых. Через минуту он ссыпался назад:</p><p class="p1">— Пройдите, товарищ.</p><p class="p1">— Э, э, — остановил страж. — Куда «пройдите». Данные ваши сообщите мне.</p><p class="p1">— Даниил Ильич Галицкий, — солидно сказал Даня. Охранник поднял на него глаза и внимательно изучил, словно и мысли не допуская, чтобы кто-нибудь в новые времена осмелился так назваться. Пристально осмотрев Даню, он записал его фамилию в огромную бухгалтерскую книгу, перечел, покачал головой и пропустил.</p><p class="p1">— Второй этаж, комната двадцать пять, Кугельский Яков Дмитрич! — крикнул вслед курьер и вернулся в подсобку, к чтению «Всемирного следопыта».</p><p class="p1">Кугельский оказался невысоким, кругленьким и страшно сосредоточенным юношей постарше Дани года на три. Он работал в «Красной» второй год, дорос от правщика до редактора третьей полосы вечернего выпуска, на котором помещались отчеты о городских происшествиях, и гордился тем, что под его началом шныряли под городом три штатно предусмотренных репортера. Сейчас он писал обзор писем трудящихся, каковой сделался обязателен для газеты по распоряжению Губисполкома. Там полагали, что трудящийся призван стать главным автором, а потому настоятельно требовали писем. Трудящиеся писали неохотно и коряво, все больше работницы, жалующиеся на недостаток личной жизни, а в заводском клубе не устраивают ничего, чтоб обзнакомиться с мужщиной, причем опять же и в общажитиях не имеется условий для свиданий, а перспективы темны. Приходилось отправлять репортеров по питерским заводам, чтоб расспрашивали пролетариат на месте, а по отчетам составлять обзоры небывших писем. Главным инструментом Кугельского были кавычки. «Заведующий складом машстроительного завода номер 15 А. Е. Клыков отсутствовал на рабочем месте свыше 1,5 часов, вследствие чего рабочий шестого цеха К. Е. Трохин не мог заменить сточившийся резец, и образовался „простой“, — писал Кугельский. — Такому „мастеру“ надо бы „указать на дверь“. От его „прогулок“ К. Е. Трохин вынужден был 1,5 часа „дышать воздухом“ вместо того, чтобы „давать план“». Газеты двадцать пятого года так же пестрели кавычками, как газеты двадцатого — тире и восклицательными знаками. Происходило это потому, что в двадцать пятом году все вообще было «в кавычках», ибо все «прежние» слова в применении к «новым» явлениям дозволялись как бы «с зазором», немного «по диагонали»: новых слов для этого еще не было. А если говорить «совсем» «прямо», злоупотребление кавычками — первый признак графомана, застенчивого, но наглого, нагло-застенчивого</p><p class="p1">— Вы ко мне, товарищ? — дружелюбно спросил Кугельский, поднимая очкастое круглое лицо от надоевшего писанья.</p><p class="p1">— Я не знаю, мне сказали — к вам… Я хотел бы у вас работать, — сказал Даня, радуясь, что перед ним почти ровесник.</p><p class="p1">— Хм, работать, — сказал Кугельский, изображая строгость. Он был вообще-то драматург, то есть так полагал. Он писал сначала у себя в Орле длинные леонид-андреевские драмы о борьбе труда с жирным капиталом, написал даже мистерию по мотивам Маркса, но в кружке при газете «Красная Гвардия» его разделали так, что он переключился на криминальные сюжеты, а потом вообще уехал в Ленинград: в Орле разве выбьешься! Тупость, зависть. Он был сын лавочника, как все идейные люди: дети воплощают тайные мечты отцов, а какой же лавочник не мечтает об идейности! Отец Кугельского умер три года назад, робкая мать с незамужней сестрой остались в Орле на улице Карачаевской, ныне Жертв. В сущности, они и были жертвы. Публикации Янечки подклеивались в альбом. Сам Янечка вечерами писал авантюрный роман, втайне надеясь продать его на Севзапкино как основу для фильмы. По сюжету романа, американский профессор Крупп (другой иностранной фамилии Кугельский выдумать не мог) открывал способ преодолеть земное притяжение. Чудаковатого гения не оценили за границей, вдобавок он был еврей, и старик вознамерился передать изобретение Советскому Союзу. Крупп бежал в СССР, его преследовали. Погоня по крышам международного экспресса. Поздно! В Ленинграде все уже летают. Трамваи упразднены, частью превращены в детские аттракционы. Однако профессор ни при чем — независимо от «воздушного порошка» ленинградцы научились летать на чистом энтузиазме. Дочь Круппа на радостях выходила замуж за молодого газетчика. Кугельский писал его с себя. В романе он был деловит, подтянут, мило чудаковат, ходил в кожаном, не расставался с блокнотом, курил трубку, а редактора называл «босс». Получился у него, в общем, шофер, но Кугельский этого не чувствовал.</p><p class="p1">Кугельский ненавидел Петербург и то, что от него осталось. Этот город надо было завоевать, влить туда свежую силу из тухлой провинции, но не ждите логики от Растиньяка: вместо логики у него инстинкт. Он страстно хотел обладать тем, что ненавидел, и железной рукой не подпускать к городу всех последующих, жарко дышащих в затылок. Он с особенным упоением писал судебные репортажи о бывших. Он вставлял окурки меж пальцами статуй. Он вел борьбу за переделку соборов в склады — тоже выдумали, музэи. В нем боролись сейчас два чувства: классовая солидарность с провинциалом-ровесником, приехавшим покорять этот гнилой город, — вместе же легче, — и страстное начальственное желание показать молодому, сколь многого сам Кугельский достиг за каких-то три года.</p><p class="p1">— Работать… — повторил он. — Так ведь это нельзя с кондачка. Вы учились?</p><p class="p1">— Я, собственно, приехал поступать… думаю на филологию.</p><p class="p1">— А вы пишете?</p><p class="p1">— Немного, в основном стихи.</p><p class="p1">— Пьес не пишете? — спросил Кугельский на всякий случай. Конкурентов он желал отследить на подступах.</p><p class="p1">— Нет, что вы, — простодушно сказал Даня. — А надо?</p><p class="p1">— Не надо, — строго сказал Кугельский. — Откуда вы?</p><p class="p1">— Из Крыма.</p><p class="p1">— Это чертовски интересно! — воскликнул Кугельский с воодушевлением. Он старался вести себя так, чтобы молодое дарование полвека спустя могло написать в сборнике «Кугельский в воспоминаниях», — вроде недавно вышедшего «Герцена в записках современников», — что Кугельский проявил воодушевление и даже покусал карандаш. Он тут же старательно покусал его. — Да вы присаживайтесь, товарищ. Вас как зовут?</p><p class="p1">— Даниил.</p><p class="p1">— Чертовски интересно! — повторил Кугельский. — Вот, для пробы, вы написали бы, может, очерк — про то, как сейчас в Крыму? Ведь летом многие ленинградцы наверняка отправятся. Расскажите, как оздоровляется здравница, как живет новый Крым. Вы из Симферополя?</p><p class="p1">— Нет, Судак.</p><p class="p1">— И что? Напишете?</p><p class="p1">— Я попробую, — сказал Даня, пытаясь представить, что обновленного и советского можно отыскать в нынешнем Судаке. — А вообще… может быть, репортаж о чем-то… или у вас, я знаю, бывают отчеты о премьерах, разборы…</p><p class="p1">Кугельский свистнул.</p><p class="p1">— С этим, дорогой товарищ, ко мне по двадцать человек на дню приходят, — сказал он тоном тертого газетчика, до смерти уставшего от напора непрофессионалов. — Все больше девушки безработные. В детстве Тургенева прочли, ну и думают, что могут писать. Я спрашиваю: о чем вы хотите писать? И все: о культу-уре… О культуре я сам могу написать, дорогой товарищ. Я, может, и есть сама эта культура, а здесь, так сказать, осваиваю смежные территории. Я мог бы вам когда-нибудь почитать, и вы увидели бы, как и что… Но сейчас надо писать о заводчанах, вот где поэзия. Сейчас, черт побери, поразительные вещи! — Под эти слова следовало закурить, жадно затянуться, втянуть мужественные щеки, — но щеки у Кугельского были немужественные, младенчески пухлые, а от табаку кружилась голова, и он не курил. — Пролетариат прямо, черт побери, на глазах становится сам двигателем культуры, уже, так сказать, сам решает, что ему нужно, а что буза! Вот где культура, а не в опере. Если вы про оперу хотите писать, то вам не к нам. С оперой вам, товарищ, в альманахи…</p><p class="p1">— Я не хочу про оперу, — удивленно сказал Даня. — Я думал, может быть, про книги…</p><p class="p1">— Сейчас главная книга еще только пишется, товарищ Даня, — назидательно сказал Кугельский, имея в виду «Бострома». — Главную книгу даст сейчас тот, кто знает новую жизнь, ее, так сказать, фактаж, ее мясо. Сегодняшняя литература должна быть как отчет, от нее черт знает как должны волосы вставать по всей голове. Вот я вам когда-нибудь… но это неважно. Я здесь работаю уже три года, — вдвое преувеличил он, но прозвучало веско. — Это, так сказать, немного. Но я уже чувствую такой пульс, какого не знала русская литература никогда. Всякий этот Тургенев — это все умерло, считайте. Считайте, что этих всех дядей Вань не было уже вообще. Если вы можете привести станок в литературу, то это да.</p><p class="p1">— Станок я, наверное, не могу, — сказал Даня с такой простодушной улыбкой, что Кугельский к нему проникся: он был страшно одинок, говоря по совести. Будущая слава, восторг потомства — все это еще когда, а пока съемная комната, в которую некого привести, пустые светлые вечера… Ему совсем некому было почитать «Бострома». Пишбарышни над ним смеялись. Из курения трубки ничего не выходило. Эренбург был недосягаем, как какая-нибудь Аделаида. — Но репортажи с заводов я попробовал бы… только вот о чем?</p><p class="p1">— Вам надо врабатываться, товарищ Даня, — учил Кугельский. — С налету, вот так, ничего не делается. С налету можно писать для буржуя, который не знает ничего про завод, но пролетарий знает свой завод, и он с вас, так сказать, спросит. Иногда это неделя, иногда это месяц. Вы туда должны изо дня в день, и тогда вы почувствуете проблему и сможете репортаж, а со временем, это самое, и очерк. Я когда начинал… я вам покажу как-нибудь. Работа — сутки, выработка — строка. Но начинаешь понимать, и уже люди тянутся. Я вам советую: вы заглубляйтесь. Ведь вы, наверное, сталь от чугуна не отличите?</p><p class="p1">— А зачем мне отличать сталь от чугуна? — спросил Даня. — Я думаю, писать надо так, чтобы человеку было интересно и жить хотелось. А какое же отношение имеет чугун?</p><p class="p1">— Это вы оставьте, — азартно сказал Кугельский, то есть он подумал о себе этими словами. — Дать труд как игровой, как соревновательный процесс — это черт знает как интересно. Вы напишите так, чтобы читателю самому захотелось, это самое, встать вот к этой вагранке, понять эту вагранку, как, может быть, живое существо.</p><p class="p1">О Господи, подумал он, что я несу.</p><p class="p1">— Вы вообще заходите, — сказал он с отеческой мягкостью. — Этот город, он, понимаете, жрет человека иногда с потрохами. Я хотя давно уже очень здесь живу, — хвастнул он, — но и то, понимаете, привычки нет… Я вам хочу сказать: вам будет иногда казаться, что они действительно хватают через край со всем этим трудом и рабкорами и вообще. Но вы должны же понимать, что сейчас черт знает что делается! Такого поворота вообще еще не было, и поэтому, хотя они хватают, конечно, через край там и тут, но в целом это черт знает как великолепно. Поэтому вы постарайтесь смотреть без этого, так сказать, я знаю, бывает, интеллигентского этого вашего, как его, вот этого, вы постарайтесь смотреть, короче, без него. Потому что все это буза. Я сам где-то человек большой культуры, я где-то такое даже знаю, что даже и Метерлинк, и я вам когда-нибудь, если сойдемся, то я и помогу, и вы увидите еще. Если вы будете стараться, то я, конечно, всегда, и вы не пожалеете. Но если вы будете смотреть вот так, с этой вот губой, — он выпятил губу, изображая интеллигентское презрение, и добродушно посмеялся своей доброй шутке, — то это я сразу вам должен сказать, что нет. Конечно, нет. Потому что такое пришло время, что оно смело все, и сейчас надо либо делать, либо молчать. Вот так. Вы согласны, товарищ Даня?</p><p class="p1">Дане было неприятно его слушать. Он видел, что Кугельский к нему почему-то дружески расположен — потому, вероятно, что у Дани растяпистый вид и даже у этой круглолицей цыпоньки он вызывает желание покровительствовать, — но от Кугельского сильно пахло потом; человек в таких вещах не виноват, но и пот-то был особенно гнусный, не рабочий, а нервный, тщеславный. Видно было, что Кугельский оттого так торопится зачеркнуть Тургенева и прочую бузу, что в отсутствии бузы он становится кем-то, и только за этим нужна ему и революция, и все остальное. Даня повидал таких людей и легко угадывал их. Ему было неловко, что человек к нему искренне расположен и при этом так прост, так виден, так отчетливы даже фразы, которыми он вечером опишет Даню в дневнике — должен ведь быть и дневник. Мерзей всего было то, что на дне даниной души шевельнулась гнусная, немедленно изгнанная мысль — если он так прост, почему им не воспользоваться; ведь Кугельскому нужно же на чем-нибудь утверждаться, он весь рдеет от этой жажды, и притом безвреден, — почему не вскарабкаться на эту тщеславную кочку; человеку с каким-никаким чутьем нетрудно… да и все они сейчас очень просты, сколько можно судить, — почему же не… В следующую секунду Даня улыбнулся — как ему казалось, очень нагло, — и сказал:</p><p class="p1">— Про чугун, если можно, я не буду. Я уже понял, что если делаешь не свое, ничего хорошего не получится. А вот про Крым, если действительно нужно, я попробую.</p><p class="p1">Какой честный, подумал Кугельский, какой еще детский.</p><p class="p1">— Приходите, — сказал он совсем уже ласково. В этом возрасте так легко сближаются, в особенности люди честные, открытые, сходных целей. — И вообще, если что-то в городе на первых порах… я все-таки давно, всё уже знаю… мог бы, наверное, чем-то… вот, я пишу вам телефон. — Он быстро написал редакционный номер на бланке «Красной», специальном, для ответов на письма, и шлепнул заказанную им месяц назад резиновую печать: «Яков Кугельский. Отдел третьей полосы».</p><p class="p1">— Я в понедельник зайду, — сказал Даня.</p><p class="p1">— В понедельник… ммм… — Все-таки нужно было держать дистанцию. — Лучше вторник, — деловито сказал Кугельский. — Я в понедельник дежурю по номеру.</p><p class="p1">Это было ложью, к дежурству по номеру его не допускали.</p><p class="p1">— Хорошо, — согласился Даня и, вежливо кивнув, ушел.</p><p class="p1">— Поговорили? — спросил страж, куда более любезный, чем полчаса назад. Видимо, за эти полчаса они что-то такое с ним сделали, какую-то инициацию. Был бы приличный человек — вышибли бы сразу.</p><p class="p1">— Да, спасибо, — сказал Даня. — Я теперь, наверное, во вторник приду.</p><p class="p1">Вслед ему по лестнице стремительно скатывался Кугельский. Он мне чего-то не сказал, ужаснулся Даня, чего-то самого главного, я должен подписаться кровью или хоть отпечатать пальцы… но у Кугельского была иная задача.</p><p class="p1">— Курьер! — оглушительно крикнул он.</p><p class="p1">Из подсобки выглянул испуганный подросток.</p><p class="p1">— Отнести срочно в типографию! — отчеканил Кугельский. — И не как в прошлый раз, а стрем-глав! Вам ясно?</p><p class="p1">Демонстрация власти, понял Даня. Там, наверху, я недопонял. Теперь я должен увидеть, что он повелитель курьеров.</p><p class="p1">— Ясно, — вылупил глаза курьер, которого Кугельский хоть и гонял, но без этакого начдивства.</p><p class="p1">— Выполнять! — рявкнул Кугельский, милостиво кивнул Дане и поднялся наверх.</p><p class="p1">Черт знает что, подумал Даня, выходя из ворот и тихо смеясь про себя тем беззвучным внутренним смехом, который всегда так забавлял мать и сердил отца. Волосы по всей голове дыбом, тридцать пять тысяч курьеров, выполнять. Неужели я что-то напишу ему про Крым, и неужели это понравится ему? А главное — неужели все, включая Тургенева, было для того, чтобы теперь Кугельский, отдел третьей полосы, отличал чугун от стали?</p><p class="p1">Прохожие усмехались, встречаясь с ним глазами. И этот тайный обмен усмешками впервые внушил ему, что и в Ленинграде можно ощутить себя на юге. Видимо, не он один встретил в тот день безвредного начальствующего идиота — идиоты хороши уже тем, что сближают. Даже трамвай, отвозивший его на Петроградскую, звякал дружественно, с намеком: вероятно, его забрызгал встречный грузовик, презирающий всех, кто ездит не на бензине.</p><p class="subtitle">2</p><p class="p1">Даня долго решал, как написать о Крыме. Была мысль изготовить нечто двусмысленное и небезопасное, чтобы поняли те, кому надо, — но Кугельский, чего доброго, мог принять все это за чистую монету и тиснуть, и прочая масса считала бы один этот верхний слой, и Даня вошел бы в историю (ибо вхождение в историю осуществляется именно так, благодаря твоему имени, набранному типографом) как певец преображенного Крыма, и пойди потом что-нибудь докажи.</p><p class="p1">Преображение Крыма стоило жизни его матери и отняло у него родину — не в том, разумеется, смысле, что из Судака пришлось съехать, а в том, что этот новый Крым быть родиной не мог. Даня считал, что родился на острове блаженных — не райском, разумеется, ибо рай был рассчитан на безгрешных людей и не знал ни забот, ни скорби; здесь же все — скорбь, покой, мятеж — рассчитаны были в таких пропорциях, чтобы осуществлялся лучший вариант земной жизни. Валериан сравнивал Крым с музыкальным инструментом, из которого любой извлекает звук в меру способностей; но вот пришли и стали бить инструмент ногами. Наверное, он и после этого что-то пел, но Даня уже не мог слушать.</p><p class="p1">Судака почти не коснулись главные события: в Феодосии — и то было тихо. Самое жуткое творилось южней и западней. Но тем и страшна была тишина, что в ней так же, как в Ялте и Севастополе, людям пришлось умирать и перерождаться — как бы ни от чего: рок действовал в чистом виде, драму играли без вкуса, реплики произносили ровно, и тем наглядней и жутче была сама драма. Многого Даня не хотел помнить. Он не верил, что арест убил мать: в конце концов, всего три недели, да и не из тех она была, кто подвластен внешним мерзостям. Дело было в невозможности жить там дальше — это чувствовали только самые открытые, как называла мать людей, внимательных к движениям воздуха, предчувствиям и скрытым переломам. Отец в этом смысле был образчик здоровья — тем более заметного, чем чаще он хворал всякой ерундой, простужался, захрамывал от ревматизма. Валериан тоже чувствовал, что жить в Крыму больше нельзя, но был настолько крымским, что любил его всяким.</p><p class="p1">Кое в чем и теперь нельзя было признаваться себе, особенно вслух. Наконец Даня решил написать о том, что всегда его волновало, — о духе и метафизике местности: у него была давняя мысль о том, что этот дух — выраженный лишь отчасти в климате и ландшафте — превыше любых исторических обстоятельств решает судьбу страны. Крым задуман был пограничьем, перекрестком, местом встречи и гармоничного сосуществования противоположностей; самый его рельеф отвечал этому назначению. Он весь был граница — земли и моря, России и Леванта, греческой античности и генуэзского средневековья, да хоть бы жизни и смерти — не зря тут селились чахоточные; в Крыму Бог чувствовался и просвечивал, и потому Дане тяжко было в других местах, где между Богом и миром громоздились пласты препятствий. Он вспомнил сказку Грэма о Южном Сиянии. Они сидели у Вала, на огромном, диком пляже со знаменитыми сердоликами, и Грэм был в том редком, счастливом опьянении, когда голос его бывал глубок и нежен, когда вместо проклятий скучным людям и былым возлюбленным он выговаривал свои шатучие, костлявые, кренящиеся набок, а все же сильные и странные стихи. Он импровизировал в такие минуты стремительно и щедро, уставившись туда, где цвели самые небесные краски — столь же редкие даже в Судаке, как эта грэмовская нежность. Дане было пятнадцать, он сидел рядом, боясь вздохнуть.</p><p class="p1">— Говорят о зеленом луче, — начал Грэм почти брюзгливо, но в голосе его уже вибрировала басовая струна. — Что зеленый луч! — простое явление. Ты думаешь — солнце бросает луч и все зеленеет? О, тогда бы… но это обыкновенное легкое дрожание на краю диска, как бы на макушке. Это похоже на — на зеленую гусеницу посреди плеши толстяка! Красной плеши! — Он расхохотался, радуясь сравнению. — Это держится три секунды. Кто это видел, считает себя счастливцами. Глупцы! они не видели южных сияний.</p><p class="p1">Грэм замолчал, и Даня не смел торопить его. Видимо, хмель достигал нужного градуса.</p><p class="p1">— Южные сияния, в отличие от северных, — заговорил он голосом, каким, верно, вещал Андерсен в минуты одинокого вдохновения, — наблюдаются не в полярных, а в теплых широтах. О полярном, или северном, сиянии никто не знает ничего достоверного — гипотез тысячи, и все они лживы. Полярное сияние — иллюминация жестоких, ранних богов, творивших такой же ранний, жестокий, ледяной и горбатый мир. В этом мире одна была добродетель — суровость; одна правда — непримиримость. Страшные, ледяные северные боги устроили себе фейерверк. Полярное сияние вспыхивает не тогда, когда эти у м н и ц ы предполагают магнитное что-то там. Нет! — это фейерверк в честь упорной, жестокой злобы, в честь еще одной победы древних, с которыми ведь борьба не прекращается ннни ннна минннуту! — Он начинал уже растягивать согласные, что служило признаком высшего вдохновения и скорых слез. — Всякий раз, когда им удается повернуть мир вспять, к упрямству и непрощению, к бесчеловечному величию, к жертве любви в пользу никому не нужного долга… они пируют, пьют свое пиво, стучат оленьими костями по грубым столам, — сказал он с ненавистью, не чуждой, однако, любования. — И цвета северного сияния — грубые цвета древних богов, редко видные в обычном нынешнем небе: самый чистый желтый, самый страшный голубой, цвет мечевой стали, и тот чудовищный багрец, который бывает у воспаленного горла: цвет сорванной на морозе глотки и гниющей туши. Я был, я видел. Я был свидетель, как это действует. На п р о с т у ю публику, — сказал он презрительно, — да, да, неотразимо. Но мне стыдно было за весь этот балаган, грубый и древний, как Вагнер. И я тогда уже знал, что когда верх берут божества новых времен, в небе должны сиять другие цвета. Всякий раз, когда жертвуют не другим, но собой; когда ледяное величие приносится в жертву теплому состраданию; когда мать закрывает собою дитя, а дитя отдает игрушку нищему; когда женщина, выбравшая холодного и желчного сухаря, свободно и счастливо уходит с тем, кому она нужнее; когда закоснелые враги ужасаются вражде и садятся пировать, улыбаясь стеснительно и едко; когда ищущий величия в страшных, внечеловечных сферах находит его там, где только оно и есть, — и он ударил себя в тощую, но широкую, крепкую грудь, — в эти минуты, да! — небо переливается тем, тем… Смотри туда! — воскликнул Грэм повелительно. — Я люблю и этот алый, как бы пыльный, но тогда — ты не можешь представить той алости, той зелени и синевы, и все это в одном небесном озере, где, оказывается, всему можно ужиться! Нас воспитывали в неверном понимании цвета, в разделении красок на холодные и теплые. Но в едином тигле плавится все, в южном сиянии все на равных правах — нет только скучного свинца и олова, и чудовищного разлагающегося римского багреца. Южное сияние стоит в небе четыре минуты, а иногда и все пять… но какая разница, если достаточно одной? Я увидел его единственный раз, когда хотел отказаться от любви, но взглянул в одни сияющие глаза и послал к черту все обстоятельства. И тотчас же эти глаза расширились, и она вскрикнула: смотри, там, за спиной… Я подумал сначала, что у меня крылья и что она увидела, — но там было оно, и одной секунды мне совершенно хватило.</p><p class="p1">Он замолчал, и Даня почувствовал ту острую, как морской запах, тоску сумерек, какой всегда сменялась радость закатов — особенно в детстве.</p><p class="p1">— Но с годами это будет чаще, — сказал вдруг Грэм веселым и трезвым голосом. — И уж во всяком случае чаще полярного.</p><p class="p1">Вот об этом Даня написал бы охотней всего — да еще об одной материнской сказке, про ученика чародея. Эту сказку рассказывала она ему однажды три вечера подряд, всякий раз прерываясь на самом интересном месте. Он много раз просил повторить ее, но она забыла — или говорила, что забыла; ей что-то в этой сказке перестало нравиться, но Даня помнил ее почти наизусть и, прося о повторении, хотел скорее удостовериться, правильно ли понял.</p><p class="p1">— Дошло до меня, о великий царь, — начала мать нараспев, — что в некоем городе был прославленный чародей, известный своими чудесами во всех восьми концах света. («Отчего же восьми?» — хотел спросить Даня, но знал, что перебивать нельзя, да и вдобавок тут же догадался: роза ветров! Норд-ост, зюйд-вест, сопутствующие всем однозначным, правильным ветрам, как диезы и бемоли; представив же розу ветров, он тут же вообразил старинную карту, на которой одни материки были неузнаваемы, а других не было в помине. Норд-бемоль, зюйд-диез… По океанам с латинскими названиями наугад брели корабли, над ними горели звезды, счет которым вели мудрецы востока в расшитых колпаках, — все это увидел он, едва услышал о восьми концах света; а в окне медленно разливалась густая, темная арабская синева — синева звездочетовского колпака и халата, и дальнего моря с кораблями, полными пряностей).</p><p class="p1">Дальше в сказке появлялся юноша Хасан, страстно желавший стать учеником чародея. Он знал, что у чародея три особенности, по которым его может узнать всякий: он знает магию кукол, то есть умеет с помощью куклы исцелить или убить человека; он понимает язык зверей и птиц; и наконец — умеет находиться в двух местах одновременно.</p><p class="p1">Сначала Хасан входил в город, душный восточный город с масляными фонарями, и таинственный инстинкт вел его дальше и дальше, во все более темные улочки, где наконец он увидел странную лавку. Торговец, старик, предлагал грубых глиняных кукол, и Хасан понял, зачем их покупают. Они явно были нужны для колдовства и обладали чудесными свойствами. Он попросился к старику в помощники и за месяц («одна луна успела умереть, а другая народиться») достиг совершенства в лепке, но ничему волшебному так и не научился. Однажды он отважился спросить старика, когда же начнется колдовство, и торговец расхохотался ему в лицо: нет никакой магии, кричал он, никогда и никакой! Все они верят, что покупают у меня магических кукол, но магического в них только то, что за эти куски глины мне отдают последнее. Помнишь вдову, которая вчера просила куклу ребенка, чтобы исцелить больное дитя? Помнишь мужчину, который отдал последний грош, чтобы отомстить правителю, похитившему его жену? Все эти несчастные дураки думают, будто глиняная кукла может помочь им, — так почему же мне не воспользоваться их глупостью?!</p><p class="p1">— Ах, так! — воскликнул Хасан и схватил с полки фигурку чародея, китайскую, тончайшего фарфора. — Ты обираешь людей, отнимая у бедняков их жалкие гроши, и сам не веришь в свою магию? Будь ты проклят! — и швырнул фигурку на пол, и тут же в ужасе увидел, как хрипит и тянется скрюченными пальцами к его горлу мнимый чародей. Он умер и упал среди осколков, потому что сердце его лопнуло от жадности — хотя китайская фигурка стоила меньше, чем он зарабатывал за день: ни один скряга не может видеть, как гибнет его добро, а этот скряга был вдобавок стар. Так Хасан впервые применил магию куклы — разбил фигуру и убил злодея. Он не понял этого и стремительно бежал из города.</p><p class="p1">Он бежал, о великий царь, в темный лес, — рассказывала мать в другой вечер, — и бежал до тех пор, спасаясь от мнимой погони, пока не завидел впереди огонек и не пришел, задыхаясь, с расцарапанным лицом, к низкому домику с занавешенными окнами. На его стук открыл гневный старик. Он выслушал хасанову историю (о смерти торговца Хасан умолчал) и гордо ответил: «Я истинный чародей, ибо умею превращать зверей в людей и делать их моими слугами. Учись у меня и служи мне, деваться тебе все равно некуда», — и Хасан принужден был участвовать в его безжалостных опытах. Старик не был жесток, он лишь не умел чувствовать чужой боли и искренне верил, что способен улучшить творение. Около десятка связанных, прикованных к стенам животных томились в его хижине, и он пытался вылепить из них сверхчеловеческие, небывалые существа, наделенные змеиной гибкостью, ланьей быстротой и тигриной силой. К счастью, самого Хасана он к опытам не допускал, заставляя лишь кипятить воду в котелке, готовить инструменты да засыпать корм в кормушки. Но однажды ночью, когда после целого дня особенно изощренных мучительств фальшивый чародей крепко спал, Хасан вознамерился освободить пленников. Он не знал лишь, где старик хранит ключи от замков и кандалов, — и стоял посреди хижины в растерянности, слушая мерный храп мучителя. Тут в его голове раздалось вдруг нечто вроде страшного хора — змеиное шипение, крик обезьяны, ржание дикой лошади, и все они хором кричали ему: «Ларец! Ларец!». Он увидел старинный ларец на столе, ножом поддел его крышку, достал ключи и освободил животных, которые в ту же секунду вырвались из оков и растерзали старика, прежде чем он успел проснуться. А Хасану они указали выход из леса, и он устремился на поиски подлинного чародея.</p><p class="p1">Этот подлинный чародей, как казалось ему, жил в отдаленном городе, на краю мира, и Хасану долго пришлось проходить испытания, прежде чем его взяли в услужение. Но у этого чародея, заставлявшего Хасана днем делать всю домашнюю работу, а ночью предаваться бессмысленным упражнениям с мячами и мечами, была красавица дочь. Хасан очень быстро понял, что чародей снова оказался фальшив, и готов был уже поверить, что никакой магии не существует в самом деле, но дочь, красавица Фариза, удерживала его в башне. Но чародей был хитер и прознал о любви, связавшей сердца Хасана и Фаризы. Он заточил Фаризу в самой высокой комнате своей башни, а Хасану решил отомстить хитро и жестоко. Он послал ученика к своему сопернику, шарлатану, также называвшему себя чародеем, а сам написал донос, что Хасан задумал ограбить этого чародея и проговорился об этом на базаре. А потому его надлежит схватить, дабы предупредить злодеяние.</p><p class="p1">Случилось, однако, так, что Хасан по дороге к сопернику чародея в самом деле зашел на базар — он любил послушать разговоры, а торопиться ему было некуда. И там, на базаре, он увидел, как торговец бьет рабыню, и вступился за нее. Торговец заорал, что Хасан пытается похитить девушку, и позвал стражу. Стража доставила его к визирю, и тот воскликнул: «Поистине, храбрый юноша, ты способен находиться в двух местах одновременно! Ты грабил торговца на базаре и в то же самое время умудрился ограбить другого чародея на другом конце города! Вот у меня донос о том, что ты намеревался пойти туда. Чему же мне верить?». Когда же визирь узнал, что торговец солгал и у него ничего не украдено, он отпустил Хасана с миром, а чародею повелел дать палок за ложный донос. Хасан же влюбился в прекрасную рабыню, которую избивал торговец, и она, само собой, оказалась принцессой. Вдобавок, оказавшись в двух местах одновременно, он доказал наличие у себя третьей колдовской способности, и в тот же вечер ему предстал чародей, спустившись откуда-то с неба. Он был в синем халате цвета багдадского вечера, расшитого звездами, и сказал: «Прекрасный юноша! Три чародея явились тебе, и все они были шарлатанами, но сражаясь с ними, ты обрел три великих способности. Помни, что истинный чародей ничему не учит прямо, ибо он — сам мир, и тот, кто ходит в нем прямыми путями, всегда обретет волшебные свойства». Дане очень понравилась эта мораль — вот, искал одно, а нашел другое, — но ему несколько жаль было дочь, заточенную в башне. Конечно, получив палок, отец выпустил ее, поскольку Хасан больше не представлял опасности, — а все-таки жалко было девушку.</p><p class="p1">Вот об этом, о Крыме, который, как истинный чародей, учит не тому и не так, как ожидаешь, — он написал бы; но делиться этой сказкой ему ни с кем не хотелось. И он ограничился разговором о том, что на всякой границе жизнь чувствуется острей.</p><p class="subtitle">3</p><p class="p1">Льговский приехал в Ленинград на два дня, выступать в на диспуте в университете.</p><p class="p1">Диспут был никому не нужен, и ему меньше всех, но он поехал, потому что откликался в последнее время на все приглашения. Сидеть дома перед чистым листом было невыносимее.</p><p class="p1">Он ходил на заседания, бегал на студию, сочинял сценарии. Он брался за все, потому что непонятно было, что нужно. Чувствовался перелом, как в незаконченной книге, доведенной едва-едва до свадьбы, чувствуется финальное убийство. Неизвестно только, кого убьют.</p><p class="p1">Ключевых слов теперь не было, он не мог себе их даже представить. Что до красок, все было похоже на вареное мясо. Когда кладешь его в кастрюлю, оно красное, а через полминуты, на глазах, серое. Все вываривалось. Пошлостью были любые слова об этом. Одни пошляки обличали пошлость других. Слов еще не было, их не придумали, и главное, придумывать было незачем.</p><p class="p1">Так выглядит рассвет после ночи с нелюбимой, когда казалось, что будет все, а оказывалось, что опять пусто. И обидней всего было, что любимых больше не будет. Это понятие исчезло, но надо же с кем-то ругаться.</p><p class="p1">Все способности к несчастной любви, говорил он, ушли на «Письма о нелюбви», но это было софизмом, как и все, что он говорил теперь. Все способности к любви ушли на иное, когда померещилось нечто и кончилось вот чем.</p><p class="p1">В девятнадцатом году он ничего не делал и чувствовал, что движет мирами. В двадцать пятом он был постоянно занят, бегал из учреждения в учреждение, и все это было бессмысленно, унизительно и ненужно. Большую часть времени ему казалось, что он отрывает драгоценные часы от главного, а когда приходили эти свободные часы, он не знал, что делать в образовавшейся лакуне. Можно было только сидеть перед листом и чертить то, что покойный Мельников назвал «виньетки творческого ожидания».</p><p class="p1">Мельников бы делал сейчас то же самое или бродил бы где-нибудь на границе с Персией. Его бы там три раза поймали, а на четвертый убили.</p><p class="p1">Не было сил ни окончательно порвать с действительностью, ни слиться с ней. Хорошо было Юрию: Юрий стал писать исторические романы. Льговскому неинтересно было писать про то, что все и так поняли. Можно было бы писать о литературе, но ее не было. Делать же саму литературу он не умел. Для этого требовалось слишком много условностей, а он хотел говорить прямо.</p><p class="p1">Стиль его превращался в пародию на себя. Все, что легко пародируется, плохо по крайней очевидности приема. Шаржем легче прожить, и это, может быть, одна из возможностей развития, предсказанным выдвижением маргинального в центр, низкого — вверх. Интересные иронисты сидели теперь в газетах. Он кое-чего ждал от них. В «Гудке» сидели иронисты взрослые, в «Красной», по слухам, детские. Он хотел их проинспектировать. Все его выезды в Ленинград напоминали теперь инспекцию, и только он знал, что на деле ищет опоры, не находя ее больше ни в себе, ни рядом.</p><p class="p1">Иногда ему казалось, что это болезнь. Он кидался проверяться. Мозг был в порядке, сердце без перебоев. Нервы были расстроены ровно настолько, чтобы писать. Писать было не о чем и незачем. Но валить на время было постыдно. Он обвинял себя, хотя видел, что молчат все вокруг, и даже Юрий, в сущности, пишет о том, как молчит.</p><p class="p1">Вероятно, это было следствием того, что кончилось Просвещение — последняя эпоха, у которой была концепция человека. Оказалось, что единого человека нет. Однажды оно уже кончалось, и тогда это называлось Девяносто третий год. Отсюда можно было думать дальше, но Льговский не верил в аналогии. Это была пошлость пошлей прочих.</p><p class="p1">Литераторы занимались черт-те чем. Черт-те что было двух видов. Одни делали его серьезно, с полной самоотдачей, с сознанием величия, другие отдавали себе отчет во всем, но продолжали работать, чтобы не сойти с ума. Братство вело себя так, как предсказал бедный Левушка. Костя писал длинные советские романы про перековку интеллигента. Зильбер выращивал гомункулусов. Всеволод переехал в Москву, и второй МХТ ставил его партизанскую повесть, в которой разговаривали гмыканьем и хэканьем. Бывшие ученики вели себя не лучше. Гликберг писала «Красного Пинкертона» на материале всемирной литературы. Руткевич публиковал материалы о стиле вождей. Смоленский забросил разбор приемов Мельникова и подсчитывал гласные у Пушкина, справедливо полагая, что теперь его вбросят обратно на пароход современности и, как знать, поставят у руля.</p><p class="p1">Надо было что-то сделать, куда-то прыгнуть. Но он не понимал.</p><p class="p1">Между фразами было теперь огромное пустое пространство. Так писали все, особенно Зильбер. Выходило отрывисто. В паузах угадывался воздух, но его не было. Начиналась бессвязность, ломкость, одиночное плавание ничем не связанных, просторно стоящих фраз. Их носило по странице, как щепки.</p><p class="p1">Пока Одиссей плавал, Итака тоже не стояла на месте. Он вернулся, острова нет. Теперь обоих носит по морю, пересечься невозможно.</p><p class="p1">На Аничковом Льговский купил и съел отвратительный пирожок с капустой.</p><p class="p1">Навстречу шел ребенок, на лице его застыло выражение тупой и сосредоточенной злобы, постылой и утомительной, как работа. Льговский состроил ему гримасу, но ребенок ничего не заметил — он был занят. Фонтанка была мутна и грязна, солнце дробилось на мокром мусоре.</p><p class="p1">Он хотел зайти в Диск, посмотреть, что там, но испугался. Могло быть отделение ГПУ, могла лавка. Очень свободно. Он еще помнил свою комнату, тесные своды, удивительный простор, открывавшийся в них. Самое странное было вот что. Тогда была кровь, голод, на улицах стреляли просто так, и никто не был уверен, что доживет до утра. Уже была Чека. Уже брали ни за что и неохотно выпускали. Уже не всегда помогали звонки и записки истерически благодетельствующего Хламиды. И жили, и работали, и были счастливы — до той самой ночи на мосту, а может, и после. Ночь можно было считать небывшей, привидевшейся. И до самого сентября восемнадцатого года жили, не допуская и мысли, что опять ничего не получится; а кое-какой воздух оставался до самого двадцатого.</p><p class="p1">И выходило страшное. Выходило, что если ради великого переустройства, то можно было стерпеть и голод, и холод, и Чеку, а вот когда вышло, что ничего не вышло, — тут уже стали бесить и пирожки с капустой.</p><p class="p1">Это надо было обдумать, и он обдумывал. Вся беда в том, думал он, что мне не с кем говорить, а не с кем потому, что одни уехали, другие умерли, а третьи стали как я. Наше новое состояние исключает разговоры. Я думал, что Юрию трудно писать, а он несчастливо влюблен, и влюблен в такое ничтожество, которое стало моим на другой день и тут же надоело, а он почему-то обиделся. Вот так всегда. Начал с серьезного, а кончил капустой. Я не могу теперь думать долго, или додумываюсь до такого, что становится страшно, и это страшное всякий раз разное.</p><p class="p1">Часто снились покойники — не знакомые, чужие, почему-то английские. Это было, говорил Мартын Задека, к перемене погоды, а если снятся невесте — то к измене друга. Я не невеста, мне может изменить только погода, мой единственный друг.</p><p class="p1">Возможным выходом была Азия. В Азии было сейчас интересно. Там дышала другая жизнь, не загнанная в наши рамки и потому не обрушившаяся вместе с ними. Хотелось съездить в Монголию, может быть, в Китай. Китай просыпался. Они с самого начала знали про себя все и умели с этим жить, а Россия этого знания боялась, потому что опасалась увидеть Одинокого.</p><p class="p1">Почему-то Льговский с самого начала знал, что увидит эту гадину. Если был Петербург, был в нем и Одинокий, средоточие его гнили. Он стоял на Фонтанке, продавал стопку книжек без выходных данных, с названием, фамилией и псевдонимом в скобках. Он потолстел. В ногах у него стояла шапка для подаяния, зимняя, облезлая.</p><p class="p1">— Льговский! — закричал он. — Вы здесь! Купите у меня книгу последнюю!</p><p class="p1">— Вот еще, — сказал Льговский. — А почем?</p><p class="p1">— Сколько дадите. Я нищий.</p><p class="p1">— А выглядите хорошо, — нагрубил Льговский. — Гладко.</p><p class="p1">— Очень хорошая профессия! — крикнул Одинокий. — Лучше газетчины гораздо. Поэт должен пасть.</p><p class="p1">Он произнес это сочно, смачно, смрадно. От него пахнуло сырым мясом.</p><p class="p1">— Я сейчас единственный поэт, — сказал он доверительно. — Вся остальная сволочь печатается в журналах, а меня гонят, плюют. Левые ненавидят, правые, всем чужой. Обо мне в «Красной нови» упоминать запрещено, знаете?</p><p class="p1">— Не знаю, — честно сказал Льговский. — Кому вас там упоминать? Вы что, пишете?</p><p class="p1">— Я теперь пишу как Рембо! — закричал Одинокий, хватая его за руки и тряся неопрятной бородой. — Они все не поэты, а сволочи. Чтобы писать, надо быть плевком, гнилью. Надо содрать с себя кожу, как с Марсия. Я с них со всех сдеру, со сволочей. Мне обещали рубрику в «Жизни искусства», и еще в «Вечерней Красной» есть хорошая гадина. Молодой, тщеславный, прыщи по всей роже, ничего не умеет, всех ненавидит. Он меня наймет, как цепного пса, я всю эту сытую шваль перекусаю. Купите книгу. Я дальше парнасцев пошел. Эстетика безобразного, слышали?</p><p class="p1">— Даже видел, — сказал Льговский. Его тошнило.</p><p class="p1">— Искусство делается содранной кожей! — кричал Одинокий. — Кто меня на порог не пускал, все сдохли. Мне еще в пятом году Щепкина-Куперник сказала: все, все продадутся или сдохнут, а вы поэт. Я знаете как теперь пишу? Я оседлал овцу и с жаром в манду засунул свой хуек, но в жопу яростным ударом с овцы баран меня совлек. Я пал в навоз и обосрался…</p><p class="p1">— Это здесь есть? — перебил Льговский.</p></span></span>
