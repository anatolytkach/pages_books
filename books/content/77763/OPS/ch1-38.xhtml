<span><span id="id20"><div class="title4">
<p class="p">Глава шестнадцатая</p>
</div><p class="subtitle">1</p><p class="p1">— Я удивляюсь, — сказал Остромов, заложив ногу на ногу. — Скажите, вам говорит о чем-нибудь фамилия «Менжинский»?</p><p class="p1">Денисов положил перо и глянул на Остромова исподлобья.</p><p class="p1">— Говорит, — сказал он с угрозой.</p><p class="p1">— А фамилия Огранова? Вы знаете, вероятно, товарища Огранова?</p><p class="p1">— Лично не знаю, — с той же суровостью отозвался Денисов.</p><p class="p1">— Ах, вот как! Сочувствую. Это весьма интересный собеседник. И во время наших многочисленных, — подчеркнул он, — многочисленных бесед он не раз спрашивал меня о вещах, его интересующих.</p><p class="p1">— Вы беседовали с товарищем Ограновым? — переспросил Денисов, и Остромову померещилась в его голосе трещина, намек на подобострастие: магическое имя отмыкало сердца.</p><p class="p1">— Да, представьте себе, юноша, так же свободно, как с вами. Товарищ Огранов умеет ценить людей просвещенных и лойяльных. Мы говорили откровенно, и наши цели во многом оказались близки. Я даже смею рассматривать себя как исполнителя, ммм, как союзника, отчасти, быть может, как личного порученца товарища Огранова. Мы обсуждали вопросы того уровня, о котором я не могу распространиться, и он никогда не помещал меня для этой цели в дом предварительного заключения, а напротив того, просил сразу обращаться, если понадобится защита. Именно поэтому я просил бы как можно быстрее связать меня с товарищем Ограновым, чтобы я мог лично ему доложить о примененных ко мне методах…</p><p class="p1">— По какой надобности вы виделись с Ограновым? — спросил Денисов.</p><p class="p1">Ого, подумал Остромов, картинно морща лоб и держа паузу. Возможно, Огранов пал, чем черт не шутит, у них это быстро. Конечно, было бы в газетах, но возможно, падение только еще приуготовляется и я должен дать на него нечто, чего им недостает. Тут важно не переусердствовать с близостью.</p><p class="p1">— Товарищ Огранов интересовался моими историческими разысканиями, — наконец сформулировал он. — Взаимоотношениями декабристов и тайных обществ мартинического толка. Слово «декабристы» говорит вам о чем-нибудь? Декабристов есть улица.</p><p class="p1">Денисов знал, что декабристов есть улица, и вообще учился старательно, как все, кто дорвался до учебы в пятнадцать лет.</p><p class="p1">— Отвечайте на вопрос, — сказал он строго. — Встречи с товарищем Ограновым происходили по его вызову?</p><p class="p1">— Я думаю, вам проще спросить товарища Огранова, — предложил Остромов. — Это информация конфиденциальная или, иначе сказать, личная. Я не могу тут… чужие тайны… В общих же чертах могу сказать, что предложил товарищу Огранову определенное содействие, и предложение было принято.</p><p class="p1">— Содействие в какой именно области? — не отставал Денисов.</p><p class="p1">Остромов пожал плечами и закатил глаза, словно говоря: это не моя тайна.</p><p class="p1">— В любом случае, — сказал он, — я прошу дать мне возможность немедленно связаться, о чем товарищ Огранов просил меня лично.</p><p class="p1">— Не трудитесь, — сказал Денисов, — товарищ Огранов в курсе. Товарищ Огранов лично рекомендовал скорейший арест всех членов антисоветского кружка некоего Остромова-Куличенко-Уотсона во главе с самим организатором, опасным провокатором, желающим втереться в доверие соввласти. Так что вам звонить не потребуется.</p><p class="p1">Ого, подумал Остромов. Это не серебро и не Дабужская. Это одно из двух: либо они берут меня со всеми, чтобы никто не заподозрил провокации, и тогда это умно, очень умно. Либо же нет, нет, уберите немедленно, этого быть не может. Зачем бы они тогда затеяли всю игру и так далее.</p><p class="p1">— Ах так, — сказал он вслух. — Это умно, очень умно. Но вы же понимаете, что мое препровождение сюда, — он избегал слова «арест», — приобретает в этом смысле, так сказать, характер конспирации. И потому наш диалог может оказаться полезным, но имеет, как вы понимаете, характер беседы, не так ли?</p><p class="p1">— Отвечайте на вопросы, — сказал Денисов.</p><p class="p1">Это было ни да, ни нет, но все же лучше, чем нет.</p><p class="p1">— Что же, я готов, — сказал Остромов, поглаживая лысину.</p><p class="p1">— Расскажите о вашей связи с заграницей, — предложил Денисов и взялся за перо.</p><p class="p1">— Я удивляюсь, — сказал Остромов. — Заграница весьма велика. Что вас интересует конкретно? В 1904 году заграница нанесла мне контузию в русско-японской войне, в 1907 году я обучался в Италии, в 1915 выполнял особо секретное поручение в Сербии и Болгарии, впоследствии моих консультаций просили профессора из Америки и Франции, с коими я состою в регулярной научной переписке.</p><p class="p1">— Товарищу Огранову стало известно, — резко заговорил Денисов, — что вы получаете из-за границы указания по вербовке антисоветских агентов. Предлагаю вам прекратить запирательство и рассказать следствию всю правду о ваших контактах с заграничными антисоветскими центрами.</p><p class="p1">Ого, понял Остромов. Это значит второе, то есть они взяли всех и меня. В это невозможно поверить, это немыслимо, однако это так, и если бы ты не умел стремительно перестраиваться, ты не был бы Остромовым. Теперь вводится схема 1, «Первосвященник». Он погладил лысину и сел прямо, поставив ноги вместе.</p><p class="p1">— Для начала хочу подчеркнуть, — сказал он скромно, — что на всем протяжении своей деятельности был связан с борьбой рабочего класса. Исключен из университета в 1905 году за участие в стачке, несмотря на контузию в русско-японской войне. Выслан в Курскую губернию, но по причине контузии в русско-японской войне добился разрешения отправиться на лечение за границу. Мать валялась в ногах, целовала жандармские сапоги. Отправился в Турин, где изучал историю и делал исторические разыскания. Там сблизился с гарибальдийцами. Вы знаете гарибальдийцев? Борцы за освобождение итальянского рабочего класса, Спартак, все вот это… Привлек внимание полиции. Вынужден был бежать в Россию, здесь сблизился с деятелями большевистского подполья. Выполнял их задание в Сербии и Болгарии. Вы понимаете? Братушки, бравы ребятушки, все вот это… Но очень секретно! — Он поднял палец. — Особо! Мне пришлось для конспирации видеться с первым помощником министра иностранных дел Болгарии, самим Миридоновым! Я подготовил потом об этом брошюру, но царское правительство ее не выпустило. И потом, вы понимаете — соображения конспирации… В семнадцатом году я немедленно на стороне восставшего народа, не-мед-лен-но! По особому поручению отбываю в Тифлис. Контролирую финансовую помощь большевистскому подполью. После этого переведен в Ленинград — и здесь, по специальному поручению, выявляю бывшие элементы, опасные с точки зрения контрреволюции, о чем специально сообщается товарищу Огранову. Таков мой путь, путь горячо сочувствующего, не во всем, может быть, совершенного, но искренне устремленного…</p><p class="p1">— Погодите, — прервал его Денисов. — Вы утверждаете, что попали на русско-японскую войну. Как вы могли там оказаться, если учились в университете?</p><p class="p1">Ого, подумал Остромов. Простак простаком, а слушает внимательно, и поглядим еще, что напишет.</p><p class="p1">— Я удивляюсь, — сказал он. — Разве я не сказал вам? Я был отдан в солдаты за участие в студенческой демонстрации еще в 1903 году, да, перед Казанским собором, насколько помню, или чуть правее.</p><p class="p1">— По какому именно поводу была эта демонстрация?</p><p class="p1">— Не понимаю, какое это может иметь отношение, — сказал Остромов, — но ничего скрывать не намерен, это была демонстрация против отдачи двадцати студентов в солдаты.</p><p class="p1">— Почему же по поводу отдачи двадцати студентов в солдаты была демонстрация, — спросил Денисов, ни на минуту не выходя из роли туповатого писаря, — а по поводу вашей отдачи в солдаты ничего не было?</p><p class="p1">Ого, подумал Остромов. В самом деле, почему?</p><p class="p1">— Да, действительно, — сказал он, прикасаясь к лысине. — Это весьма удивительно. Но, видите ли, к тому моменту отдача студентов в солдаты была повседневной практикой, и никто уже не удивлялся. Сдавали в солдатчину целыми подразделениями, и все на японский фронт. Разумеется, в первую очередь тех, кто участвовал в демонстрациях. Бывало, что забирали прямо сразу после демонстрации, от Казанского собора, под конвоем в вагоны и — на японский фронт. Самодержавие предчувствовало скорую гибель и ярилось, вы понимаете, как раненый зверь.</p><p class="p1">— Ужас, — сочувственно сказал Денисов.</p><p class="p1">— Да, да. Не говорите. Лучшая часть студенчества, сок нации.</p><p class="p1">— И после контузии вы вернулись в университет?</p><p class="p1">— Да, разумеется, — кивнул Остромов. — Жажда знаний, желание пользы. Был восстановлен как контуженный. Контуженных, вы знаете, восстанавливали.</p><p class="p1">— И тут же отчислили, — уточнил Денисов.</p><p class="p1">— Да, да, немедленно. Я не успел еще проучиться и семестра, как уже принял участие в демонстрации.</p><p class="p1">— Против отдачи студентов в солдаты? — без улыбки спросил следователь.</p><p class="p1">— Нет, уже по другому поводу, — тоже без улыбки ответил Остромов. — Тогда, если помните, был такой девятьсот пятый год. Вот недавно двадцать лет отмечали. Лейтенант Шмидт, броненосец «Потемкин» и все это. Кстати, хочу сообщить следствию, что принимал участие в съемках художественной картины «Потемкин», и меня можно видеть в качестве трупа…</p><p class="p1">— Следствие учтет ваше добровольное признание, — кивнул Денисов, как если бы со съемок «Потемкина» по вине Остромова что-то пропало. — Продолжайте вашу автобиографию. Вы участвовали в студенческой демонстрации в 1905 году?</p><p class="p1">— Да, да. Тогда все участвовали. К тому же я был контуженный, и, сами понимаете, никакого страха, никакого самосохранения. Меня просто использовали как зачинщика. Я, бывало, кричал «Долой самодержавие!» — ну и это, конечно, не могло остаться…</p><p class="p1">— И вас выслали в Курскую губернию? — перебил Денисов.</p><p class="p1">— Да, — кивнул Остромов, — но мать целовала сапоги. И тогда Италия, Турин, чужбина, что было, как вы понимаете, еще и страшней, чем Курская губерния. Во многих отношениях, кроме, конечно, климатического.</p><p class="p1">— И там вы были завербованы в масоны, — утвердительно произнес Денисов.</p><p class="p1">— Я удивляюсь, — сказал Остромов, — я удивляюсь… В масоны не вербуют. В масоны посвящают в результате весьма сложной процедуры. Вы должны доказать, что достойны первой ступени, а у меня тридцать третья. Вы должны показать безразличие к смерти и медиумические способности. Впрочем, не знаю насчет безразличия к смерти, а известные медиумические способности у вас могут быть вполне. Это легко проверить. На одну минуту попытайтесь замкнуть свой слух для всех посторонних звуков и всеми силами души улавливайте ту мысль, которою буду вам сейчас транслировать я, не открывая рта, не произнося ни единого…</p><p class="p1">— Следствие учтет ваши способности, — сказал Денисов. — Меня интересует, почему вы вступили в ложу.</p><p class="p1">— Но общие цели! — воскликнул Остромов. — Вы наверняка знаете! Масонство и большевизм, ну хорошо, и коммунизм, потому что большевизм тогда едва народился, — ведь это общие задачи и почти все символы! Красная звезда, серп, молоток… Я желал бы работать, конечно, с большевиками, но был оторван, и тогда, чтобы как-то поставить себя на службу пролетариату, в Турине вступил… Это была весьма влиятельная ложа, весьма. Она влияла разнообразно. В частности, конечно, освобождение пролетариата… сбор пожертвований на бедных… еще многое, о чем я не могу, конечно, рассказать, будучи связан посвящением весьма высокого порядка, но уверяю вас, что это было почти как третий интернационал.</p><p class="p1">Тут он сам понял, что несколько хватил, и уселся еще прямее.</p><p class="p1">— Что же вынудило вас вернуться? — спросил Денисов после паузы.</p><p class="p1">— Исключительно тоска по Родине, — горячо сказал Остромов, — верьте слову. И, разумеется, желание быть полезным, потому что одно дело там, а другое дело тут…</p><p class="p1">Его слова повисли в тишине. Остромов заерзал.</p><p class="p1">— Чем вы можете объяснить тот факт, — сказал наконец Денисов, — что в архивах жандармского управления не сохранилось никакого дела о вашей высылке в Курск?</p><p class="p1">— Разве не сохранилось? — Остромов округлил глаза. — Я удивляюсь… Вероятно, особая секретность… они же все уничтожали, понимаете? Или надо искать в секретной части архива, где я как дважды демонстрировавший мог быть на особом учете… Ведь они понимали, что я контужен и способен на все.</p><p class="p1">Денисов усмехнулся.</p><p class="p1">— Есть сведения, что из Турина вас тоже отчислили, — сказал он. — Вы и там приняли участие в демонстрации?</p><p class="p1">Эге, подумал Остромов.</p><p class="p1">— Деньги кончились, — сказал он просто.</p><p class="p1">— И вы вернулись в Россию?</p><p class="p1">— Да, но ненадолго. В двенадцатом вернулся, в пятнадцатом уже отбыл в Болгарию и Сербию. К братушкам. Готовил брошюру, но не вышла. Царская цензура. — Он заговорил хрипло, отрывисто, как революционный матрос. — Братишечки, да. Потом — Питер. Закружился в вихре бури. Предлагал услуги. Учитывая финансовый опыт, Тифлис, деньги. Обеспечив, вернулся.</p><p class="p1">Остромов задышал тяжело, с присвистом, как человек, хорошо потрудившийся в Тифлисе.</p><p class="p1">— Остромов, — сказал следователь. — Хотя бы не путайтесь, когда лжете. Ни в какой демонстрации в 1905 году вы не участвовали. Никакого дела на вас нет и не было, все проверено. Вы уехали в Турин по собственной воле и недоучились в университете, о чем пишете в автобиографии, которая вот. — Он помахал в воздухе листком, и Остромов узнал свою автобиографию 1917 года, поданную при устройстве в банк. — Никакая мать в сапогах не валялась. И в Сербию вы уехали не по поручению большевистского подполья, а с заданием генерального штаба, о чем пишете в той же автобиографии, что и подтверждается статьями вашими в газете «Новое время». Так?</p><p class="p1">— Я удивляюсь, — сказал Остромов, — я удивляюсь… Вы так проработали, так учли…</p><p class="p1">На самом деле он не удивлялся. Он был потрясен до основания, а слова произносил для обычной своей паузы, ибо они, как он знал по опыту, давали время для отдельной заячьей петли: объяснить, как именно он удивляется, почему удивляется, а за это время набросать хоть приблизительный план защиты; вариантов не было, надо было включать схему 2, «Император».</p><p class="p1">— Но вы не учли истинного моего значения! — выпалил он. — Да, я признаюсь и разоружаюсь. Но предупреждаю вас, что никаким образом не отвечаю за дальнейшее: дальнейшее — полностью на вашей ответственности.</p><p class="p1">Денисов вздохнул и взялся за перо.</p><p class="p1">— Я личный агент министра Тимирязева, — быстро зашептал Остромов, наклоняясь вперед. — При первой встрече на выставке в Турине я сделал ему шейный знак. Он мне ответил. Я подошел. Он предложил мне кофе. Я ответил: «Только без сахара». Я понял сигнал и сказал: «Но с коньяком». Он понял сигнал и сказал: «Но с молоком». Я вовремя почувствовал ловушку и ответил: «Но платите вы». Он сделал мне ручной знак, и так я стал его агентом по особым поручениям. Этого не записывайте, постарайтесь запомнить. С этих пор Болгария. Вынуждал через товарища министра иностранных дел Миридонова вступить в войну на стороне России. Жил в Софии, гостиница «Македония», проверьте, там должны помнить. Каждое утро кофе в постель. Относились серьезно. Выезды в прочую Европу, роскошнейшие отели, ах, какие отели! Тот, кто не ездил по Европе в купе первого класса, тот не может знать, что мы все потеряли вследствие европейской войны. Старая Европа была мир изумительного комфорта, все белье было накрахмалено! Все, везде! Достаточно было позвонить, и к вам являются с чашкой шоколада. Шоколад был тогда в чашках. Должен вам сказать, на условиях совершенной конфиденциальности, но зная вас как честного человека, что в простых людях Болгарии никогда не встречал ни малейшей враждебности. Напротив, глубокое расположение к братскому народу России. В Сербии просил, умолял дать шанс участвовать в общей борьбе, причастность к делу, вы понимаете, ужасная оторванность, страдал невыносимо, окончил медицинские курсы, и вот врач, санитар, тифозный барак. Почувствовав тиф, не покинул поста и продолжал выносить за ранеными все, что только было можно. Три недели в беспамятстве, чудесное спасение. Возвращаюсь с докладом, но Тимирязев уже — увы! Я — к Львову. Делаю шейный знак. Он делает ручной. Я докладываю. Он: такие люди сейчас нужны. Но дальнейшего рассказать не могу, это была самая, самая верхушка. Все это может быть сообщено только лично товарищу Огранову, поскольку он в курсе моего дела и знает, какими связями я располагаю. Вся верхушка, все связи, все шифры мирового масонства, включая русскую эмиграцию, у меня вот здесь. — Он воздел рот-фронтовский кулак. — Но это может быть изложено только в письменном виде и только на высочайшее имя, я имею в виду товарища Огранова, а возможно, и выше. Прошу без обид, такова субординация.</p><p class="p1">Денисов подробно записал все это и некоторое время смотрел на Остромова выжидательно.</p><p class="p1">— А вот тут есть сведения, — он хлопнул ладонью по увесистой папке, — что в Сербию вы сбежали от карточного долга, без всякого задания. Я записал, конечно, потому что интересно. Вам бы, Остромов, романы сочинять. Брошюры. В последний раз предлагаю: разоружитесь перед следствием и расскажите о ваших связях с Куцем, проживающим ныне в США. Имея в виду, что у нас тут допросов про ваши художества хватит лет на пять царской каторги, но каторги, Остромов, больше нет. Теперь, Остромов, гуманность. Но мы вам советуем ею не злоупотреблять, так что я вас слушаю.</p><p class="p1">Вот как, стремительно подумал Остромов. Недооценил всех, начиная с Огранова и кончая гадиной Мебесом. Это схема 3, «Шут», без каких-либо вариантов.</p><p class="p1">— Я удивляюсь, — залепетал он, — я удивляюсь… Я подчеркиваю, что никогда никаких проявлений враждебности со стороны болгарского народа. По воскресеньям танцы, девушки в лентах бросали цветы, крепкие вкусные напитки в страшном количестве. Что до инсинуаций по женской части, объясняю исключительно чрезмерной податливостью, продиктованной моим феерическим воздействием. Это объяснимо с той точки зрения, что веду преемство непосредственно от Казановы Венецианского, оцените профиль. — Он повернулся в профиль. — Всегда без всяких усилий. Прыгали в постель, как зайчихи, успевай только ловить. Воздействие исключительное на оба пола. Моего поцелуя домогались министры… Если что, держите себя в руках. На дальнейшие вопросы отвечать не могу в силу контузии на японской войне, полученной при защите вертикального отечества. Настоятельно советую освидетельствовать, поскольку в иных ситуациях за себя не отвечаю. Не подходите, я буду кричать. Ах, ах, как я попался! Как же я ужасно попался, не трогайте меня, я ничего не знаю!</p><p class="p1">Денисов, не отрываясь, писал.</p><p class="subtitle">2</p><p class="p1">— Гражданка Пестерева, — скучным голосом произнес Денисов, — Ольга Николаевна, 1865 года рождения, беспартийная, пенсионерка третьей категории, из дворян, дочь почетного гражданина, образование домашнее, не служила, проживающая по Пятой советской, дом 15, квартира 13, имеете ли чем дополнить сказанное?</p><p class="p1">Он оторвался от опросного листа и посмотрел на Пестереву, как на вошь.</p><p class="p1">— Я дополнить-то не имею, — сказала грузная Пестерева просительным недворянским голосом, беспокойно ерзая на стуле. — А ты бы, сынок, послушал меня…</p><p class="p1">Дочь почетного гражданина, из дворян, хотя бы и пенсионерка третьей категории, не могла говорить ничего подобного. Денисов был предупрежден насчет фокусов и заподозрил неладное.</p><p class="p1">— Я не сынок вам, — сказал он грубым, старательным двадцатитрехлетним басом. — Обращайтесь как положено.</p><p class="p1">— Ну, не сынок, — легко согласилась Пестерева. — Внучок. — Так, по-домашнему, «унучок», говорила вятская бабушка Денисова, с которой Пестерева никак не могла встречаться в дореволюционной жизни. — Послушай бабушку, унучок, для тебя будет не худо. Я что скажу-то тебе. Ты слушай-ко, слушай, успеешь с писаниной своей. Бабушка плохого не скажет. Ты думаешь, уж и превзошел все? Ты скажи-ко мне: вот, собирались люди. Люди бедные, немолодые уж, многие вон какие хворые, у кого глазки не видят, у кого ножки не ходют. Ну, собирались, игралися кто как мог — кому плохо? Никого ж не трогали, на аркане-то не тянули. Говорили, пели, небывальщину рассказывали. Что ж ты нас запер, убогих, нам вить все одно помирать скоро! А раз помирать, то какая ж разница, что мы там меж себя говорим? И власть мы вашу советскую не трогали, не надо нам ничего, не убили, и спасибо. И заграницы никакой не было, все свои, самые что ни есть питерские. Никому не было худа, не вредили, не грабили — что ж ты, унучок, баушку мучишь? Баушка тебя медком кормила, молочком поила. Вон ты вырос какой красивый да белый. А ты теперь старенькую под замок, ну — хорошо ли?</p><p class="p1">Денисову стало жарко. Пестерева сидела напротив, глядя на него тревожно и жалостливо. Густой голос ее обволакивал голову Денисова, как мед.</p><p class="p1">— Если имеете жалобы, вам следует заявить согласно имеющегося, имеющихся распорядков, — пробормотал он первое, что пришло в голову. Он цеплялся за эту формулу, чтобы не утонуть в густом меду баушкиных речей, засасывавших его, как трясина, в самое глубокое детство и глубже, в уютную темноту, в утробный, дословесный покой.</p><p class="p1">— Да каки ж таки жалобы, коли привел Господь такого внучка увидеть! — ласково продолжала Пестерева. — Нам радоваться на вас, а ты — жалобы! Одна жалоба, внучек, что ты уж решил — все, я большой, я судить поставлен! А ты слушай-ко баушку, баушка худому не научит. Где тебе судить, коли ты сам ничего не знаешь? Сам ты скажи: что мы тебе сделали? Сидели, говорили, в наряды наряжались. Так ведь нам только и осталось, что помирать. По углам сидим, свету не видим, не блажим, не ропщем, деток у нас нет, иной раз хлебушка принести некому. Вот и скажи: кому плохо было, что мы сидели по углам, помирать готовились?</p><p class="p1">— Вы… Ты… — смешался Денисов. — Ты сейчас такая смирная, а раньше что было?</p><p class="p1">— А что было? — искренне удивилась баушка.</p><p class="p1">— Отец меня бил! — плачущим фальцетом воскликнул Денисов. — Мать забил, сестру забил, меня в мальчики отдал при столяре! Столяр бил, я в Америку сбежал, в Таганроге споймали! В железнодорожных мастерских два года, чуть слуха не лишился! Если б товарищ Марусин не надоумил в следственное пойти, и сейчас бы там… в копоти… А товарищ Марусин сразу сказал: ты дюже злой, с тебя следователь будет на большой палец! А ты что делала? Ты померла, когда мне восемь лет было, и взятки с тебя гладки, и защитить некому!</p><p class="p1">— Так ведь Божья воля, унучок, — смиренно сказала баушка Пестерева. — Рази бы я своей волей оставила тебя? Что ж ты меня теперь, покойницу, под замок?</p><p class="p1">— Ааа! — отчаянно закричал Денисов, на мгновенье трезвея от ужаса. — Ты, сволочь, в старое время… на балах вертела хвостом с почетными гражданинами, а меня столяр по роже! Ты трудовой пот пила, ты по заграницам, в жизни палец о палец, всяко разно разврат! Ты на хребте сидела, а сама теперь спрашиваешь, за что! Я в депо паровозном, в копоти, а ты бульон ела и шоколад в чашке! Прости, прости, Христа ради! Сам не знаю, что говорю. Забери только меня, забери, не могу я больше в чужих людях…</p><p class="p1">Коля думал, что она его пожалеет, но баушка посуровела.</p><p class="p1">— Ты что ж на старую кричишь, Коля? — спросила она густым голосом. — Или ты, Коля, судить кого поставлен? Ты штаны намочил, у тебя уши немыты. Тебя драть и драть еще, а ты стариков мучишь. Жалобиться хочешь? А нас не жалко тебе, судья праведный? Эх, соплежуй, на кого руку поднял! На Божьих людей замахиваесся? Куда глаза прячешь, на меня смотри!</p><p class="p1">Денисов поклялся бы, что вместо глаз у нее были теперь две дыры, откуда так и веяло геенским жаром.</p><p class="p1">— Твой Божий человек грабил тебя! — заорал он, злясь на собственное бессилие. — Тебя же и грабил твой Божий человек, серебро, телятина! Ты ему — Божий человек, а он — телятина!</p><p class="p1">— А и что ж! — не сдавалась покойница. — Моя телятина, хочу дам, хочу не дам. Он серебро для дела брал, а ты в ящике держишь. Отдай серебро!</p><p class="p1">— Не отдам!</p><p class="p1">— Отдашь! Все отдашь! Кто у отца табак воровал? Мало тебя бил столяр, мало! Надо тебя было так драть, чтоб до самой до Америки задал лататы, сопля таганрогская! А ну встань, отомкни да выведь меня отсюда!</p><p class="p1">Денисов с силой ущипнул себя за левую кисть и вызвал конвой. Когда Пестереву уводили, он смотрел в стол. Следующий допрос он отложил и помчался к Гольдштейну.</p><p class="p1">— Товарищ старший следователь, — сказал он. — Обвиняемая Пестерева владеет даром гипноза. Я без ущерба для ума с нее снимать показания не могу.</p><p class="p1">— Уполномоченный! — иронически протянул Гольдштейн. — Упал намоченный!</p><p class="p1">Это было ужасно, но Денисов решил вытерпеть все. Перспектива снова предстать перед Пестеревой была хуже.</p><p class="p1">— Откуда у нее дар гипноза? — презрительно продолжал старший следователь. — Гипнозу учатся годами в особых клиниках. Она у Фройда обучалась, может быть, твоя Пестерева? Женщин-гипнотизеров в Европе единицы, а советского вузовца Денисова заворожила дочь почетного гражданина! Она пассы вам делала? Руку на лоб клала, так?</p><p class="p1">— Она мне ничего не делала, — обидчиво отмел Денисов неприличные предположения начальства, — но я с точностью чувствовал гипноз и прошу хотя бы вашего присутствия…</p><p class="p1">— Учись, уполномоченный, — усмехнулся Гольдштейн и велел доставить обвиняемую.</p><p class="p1">Пестерева только успела пообедать зловонным гороховым супом с ломтем сырой буханки, как ее снова потянули на Шпалерную. На этот раз унучок сидел в углу, а за столом вольготно расположился толстый еврей, о котором она слышала от сокамерниц. Он был очень зол и явно настраивался на показательный триумф перед унучком. Случай был трудный.</p><p class="p1">— Здравствуйте, офицер, — сказала она светски.</p><p class="p1">— Не офицер, а гражданин старший следователь, — ледяным тоном отвечал Гольдштейн. — Извольте обращаться по форме.</p><p class="p1">Она отметила это «извольте».</p><p class="p1">— Как вам будет угодно.</p><p class="p1">— Это угодно не мне, таковы правила.</p><p class="p1">— Прошу простить меня, господин старший следователь.</p><p class="p1">Он не поправил, удовлетворенно подумала Пестерева. Проглотил «господина». Понятно, о чем ты мечтал у себя в хедере.</p><p class="p1">— Мне стало известно, что вы прибегаете к особым техникам, — хмуро произнес Гольдштейн. Кричать сразу не следовало, все-таки дама, чувствуется порода. — Я рекомендовал бы вам разоружиться перед следствием.</p><p class="p1">— Никаких особых техник, господин старший следователь, и никакого персонального дара, — улыбнулась Пестерева. В молодости, должно быть, многих сводила с ума такой улыбкой, да теперь уж не то, матушка. — Вам лучше других должно быть известно, что люди моего круга с каждым считают обязательным говорить на его языке, это правила хорошего тона, а вовсе не гипноз.</p><p class="p1">— Под следствием все обязаны разговаривать на одном языке, — глядя в стол, предупредил Гольдштейн.</p><p class="p1">— Вам как офицеру, следователю, но офицеру, — с нажимом повторила Пестерева, — лучше других должно быть известно, что этикет так просто не отбросишь, это не маскарадный костюм, не хлыстик… С крестьянским мальчиком принято говорить не так, как с высшим офицерством, и вы должны, слышите ли, должны извинить меня за то, что женщина, хоть бы и старуха, узнает в вас рыцаря, а не допросчика.</p><p class="p1">Грубейшей ошибкой было бы говорить с ним на местечковом диалекте его детства — но Пестерева не сделала этой ошибки. Люди ее круга с первого взгляда отделяли тех, для кого детство — омут чистой глубины, от тех, для кого оно позор и тягость, родовое проклятье изгойства и нищеты. Конечно, он был сыном портного. Конечно, он был из Петербурга. И всеконечно, он смотрел на гвардейские парады, мысленно отрекаясь от иудейства, обещая отдать все, что у него было, — отца, мать, десятки портновских поколений, — чтобы стать одним из этих сверкающих кентавров.</p><p class="p1">— Я предупреждаю вас о недопустимости, — мягко сказал Гольдштейн. Денисов из угла вскинул на него потрясенный взгляд.</p><p class="p1">— Я сделаю все, что будет в моих силах, — улыбнулась Пестерева.</p><p class="p1">— Меня интересует ваш кружок строгого восточного послушания, — улыбнулся в ответ старший следователь, и в улыбке этой Денисову померещилось нечто заговорщицкое. Пестерева слегка покраснела.</p><p class="p1">— Кружок строгого восточного послушания, — произнесла она с игривым смущением, — я собрала в 1919 году с единственной целью преодолеть разврат, царивший в это время в городе, и обеспечить новую элиту — вы понимаете, конечно, о чем я, — достойными спутницами, хранительницами традиции.</p><p class="p1">Надо было как можно чаще забрасывать эту сеть — «вы понимаете», «вы знаете, конечно», «как вы и сами догадываетесь», — всякий раз уловом была то улыбка, то смущенное пожатие плеч, а один раз ей показалось, что Гольдштейн даже подмигнул.</p><p class="p1">— Вы занимались личной жизнью участниц кружка? — спросил старший следователь.</p><p class="p1">— Только в той мере, в какой это касалось их духовного роста, — строго ответила Пестерева. — Только в этой! Ни в каком ином смысле. Люди нашей традиции не снисходят до слежки. Я сама знала все, что мне было нужно. Лично исключила двоих. Эти были безнадежны. Но они и не принадлежали к нашему кругу, это были остзейские немки без всяких правил.</p><p class="p1">Гольдштейна передернуло.</p><p class="p1">— Вы говорите о противодействии разврату, — начал он вкрадчиво. — Но мы имеем сведения, что на ваших заседаниях… повседневной практикой было обсуждение порнографической литературы…</p><p class="p1">— Господин следователь, — с достоинством произнесла Пестерева, и голос ее зазвенел, — я категорически прошу вас не употреблять этих слов. Я могу быть виновна в чем угодно, но не в разврате. Посмотрите на меня. Можете ли вы соединить хотя бы в уме понятия обо мне и порнографии?</p><p class="p1">— Речь идет не о вас лично, — буркнул Гольдштейн, — я знаю, что вы обсуждали сомнительные трактаты…</p><p class="p1">— Этим сомнительным трактатам более трех тысяч лет, — хрустальным колокольчиком рассмеялась Пестерева, — и единственной целью их изучения служит гармония, а вовсе не скотское удовольствие. И согласитесь, господин офицер, что женщина, предназначенная в жены новым рыцарям, эта жрица нового порядка, должна кое-что кое в чем понимать, — и она лукаво погрозила Гольдштейну мизинцем.</p><p class="p1">— При этом вы допускали мужчин…</p><p class="p1">— Разумеется, я допускала мужчин. Я не готовила наседок, господин старший следователь. Девушка должна знать, как вести себя с мужчиной, чтобы не хлопать глазами и не выглядеть глупой курицей в его обществе. Мы никогда не вели политических разговоров — не потому, что это неинтересно, а потому, что это неприлично. В моем кругу считалось непристойным расспрашивать о политических симпатиях и тем более рассказывать о своих.</p><p class="p1">— Если все было так невинно, как вы говорите, — заметил Гольдштейн, постукивая папиросой по крышке портсигара, но не решаясь закурить, — почему работа кружка содержалась в такой тайне?</p><p class="p1">— Исключительно из педагогических соображений, — отчеканила Пестерева. — Женщина не должна много болтать. Только отвечать на вопросы, и то не всякому. Вы сами понимаете — так, как я говорю с вами, немыслимо говорить с любым, это попросту ненужно… впрочем, зачем я вам объясняю? Девушки лучше усваивают правила хорошего тона, когда они приправлены тайной — покрывалами, посвящениями, немного Египет… мы любопытны, умные мужчины всегда играли на этом.</p><p class="p1">— Однако вы собирали взносы, — напал Гольдштейн с неожиданной стороны, но Пестерева ничуть не смутилась.</p><p class="p1">— Всякий труд должен быть оплачен, женщина должна смолоду знать это, чтобы не быть содержанкой и не брать дорогих подношений. Смею думать, я кое-чему научила этих девушек. Я не содержанка и никогда не была ею, у меня не скоплено сбережений, и думаю, свои два тогдашних миллиона я зарабатывала честно. В месяц выходило что-то около пяти килограммов картофеля, столько же репы, немного постного масла — гораздо хуже, чем я обеспечена здесь.</p><p class="p1">Она тонко улыбнулась, Гольдштейн хмыкнул.</p><p class="p1">— Расскажите о мистическом браке между Остромовым и участницами его кружка, — предложил он доверительно.</p><p class="p1">— Рассказывать нечего, — кратко отвечала Пестерева, выпрямляясь на стуле.</p><p class="p1">— Отвечайте на вопрос, — без особой строгости в голосе потребовал Гольдштейн.</p><p class="p1">— Мистический брак — не та тема, о которой могут говорить третьи лица. Спросите учениц, Остромова, если он сочтет возможным говорить… Вы лучше меня знаете, господин старший следователь, что есть вопросы, касающиеся двоих.</p><p class="p1">— Но обряд совершали вы?</p><p class="p1">— Этот обряд сводится к чтению одного итальянского текста тринадцатого века и соприкосновению кубками.</p><p class="p1">— Губками? — скаламбурил Гольдштейн, и Пестерева нашла возможным чуть заметно улыбнуться.</p><p class="p1">— После того, как связуемые мистическим браком выпивают из кубков друг друга, они не прикасаются друг к другу до следующего новолуния.</p><p class="p1">— В чем же смысл этого обряда?</p><p class="p1">— В нескольких взаимных клятвах, смысл которых слишком сложен для меня. Я могу связать мистическим браком, но не объяснить… Впрочем, если угодно — это для тех, кому неприятны церкви с толстыми попиками, но недостаточно просто записаться в книгу, как это практикуется сейчас.</p><p class="p1">— И много было желающих? — как бы невзначай поинтересовался Гольдштейн.</p><p class="p1">— Других случаев не припомню. Это сложный обряд, не все могли вытерпеть до новолуния.</p><p class="p1">— Мда, — сказал Гольдштейн. Он покусал папиросу. Старуха была не проста. Ее не о чем было спросить, до того все ясно, — но эту ясность к делу не пришьешь. Она отвечала охотно и подробно, и попробовала бы не ответить — он знал за собой эту способность расколоть любого, смотри, как она передо мной выбалтывается, учись, разиня, — но никакой ответственности за обучение правилам хорошего тона предусмотрено не было, хотя бы это обучение и проводилось в рамках культа Изиды. Конечно, профессионал его класса — вон, даже старая стерва не может скрыть раболепия, — вытащил бы из нее что угодно, но что потом с этим делать? Кажется, они действительно забрали слишком широко: Остромов — другое дело…</p><p class="p1">В эту секунду, однако, он поднял глаза на Пестереву и на мгновение увидел ее глаза — тут же принявшие прежнее выражение почтительной заинтересованности, но ему хватило и короткой вспышки истины: это был взгляд старой, трезвой, оценивающей волчицы, знать не знающей никакого раболепия. Он вгляделся. Конечно, померещилось. Перед ним была старая дама, готовая к сотрудничеству со следствием — конечно, в рамках приличия, принятых в ее кругу.</p><p class="p1">— Ну вот что, — сказал он тихо. — Об этом вашем борделе с мракобесием мы еще побеседуем. И о мистическом браке, и о древней порнографии — все расскажете, как милая. Как принято у людей вашего круга. Я не спешу. Времени у нас много.</p><p class="p1">— А у меня немного, — спокойно произнесла Пестерева.</p><p class="p1">— Это верно, — кивнул Гольдштейн. — Даже меньше, чем думаете. Поэтому затягивать тоже не советую. Я и так уже знаю достаточно, чтобы пообещать вам увлекательное путешествие на восток.</p><p class="p1">— Ах, восток, великий восток, — мечтательно сказала Пестерева. Конвой увел ее.</p><p class="p1">— Никакого гипноза, конечно, нет, — процедил Гольдштейн, оставшись наедине с Денисовым. — Но барынька хитрая, колоть нужно тонко. Следующий допрос с нее будет снимать Колтыгина.</p><p class="subtitle">3</p><p class="p1">— Альтергейм Константин Иванович, 1899 года рождения, сын полицмейстера, — ровно сказал Осипов. — Расскажите мне, гражданин Альтергейм, о ваших контрреволюционных сборищах.</p><p class="p1">— Я боюсь, вы меня не поймете, — сказал Альтер.</p><p class="p1">— Постараюсь, — ухмыльнулся Осипов. Он решил сегодня быть добродушен. В конце концов, Альтергейм был его лет, даже родились они в одном и том же апреле. Стоило попробовать мягкий тон. — Закуривайте.</p><p class="p1">— Благодарю вас, — сказал Альтер и взял «Иру». — Видите ли, вы человек не нашего круга, и потому кое-что я не смогу объяснить никогда.</p><p class="p1">Осипов обиделся, но взял себя в руки. Мысленно он скрипнул зубами, но на деле лишь слегка оскалил их.</p><p class="p1">— Это не в обиду, — добавил Альтер. — Быть человеком нашего круга не означает ничего хорошего, в особенности сейчас. Но если вы настаиваете, я вам попробую объяснить. Представьте себе ситуацию: жили люди, ели мясо, но мясо вдруг запретили. Его в стране мало, и оно полагается теперь только ответственным работникам. И тогда они стали собираться у кого-нибудь на квартире, есть пареную репу и говорить о мясе. Вот к какой метафоре я позволил бы себе прибегнуть в ответ на ваш вопрос.</p><p class="p1">Альтер затянулся и помолчал.</p><p class="p1">— Или возможна другая метафора, она наглядней. Жили некоторые люди, они любили нюхать цветы. Но цветы запретили, потому что в государстве их мало, и теперь их нюхают только ответственные работники. Тогда эти люди собираются вокруг мусорной ямы, нюхают, чем там пахнет, и говорят о цветах.</p><p class="p1">Он сделал еще одну паузу и поковырял мизинцем в ухе.</p><p class="p1">— И, наконец, третья метафора, окончательно поясняющая ситуацию. Жили какие-то там, я не знаю, с позволения сказать, люди, у них были какие-то органы чувств для осязания каких-то, я не знаю, поверхностей, или, скажем конкретнее, для различения красок. Но вот все краски упразднены, кроме двух главных, и эти органы, то есть, скажем, глаза, начинают мучительно болеть, оттого что им нечем питаться. А красок не осталось ни у чего, даже у ответственных работников, потому что ответственные работники как раз и не различают красок, это проистекает из самого понятия ответственности. Но глаза болят мучительно. И вот эти люди собираются в одном небольшом месте, из которого видно небо, очень низкое и коричневое. Но поскольку коричневое все-таки не черное и не белое, на него можно смотреть и очень понемногу, очень потихоньку насыщать глаза. Из этого уже можно было бы делать сюжет. Лунц бы сделал пьесу. Вот так я могу вам примерно объяснить характер этого сборища, но это не раскрывает понятия нашего круга. Его особенно трудно раскрыть, поскольку нашего круга почти нет, а когда в него попадаешь, все понятно без объяснений. Но чтобы вам и вашему кругу стало понятней, отмечу, что в нашем кругу о каких-то фундаментальных вещах уже договорились, и здесь нам приходится ввести понятие конвенций. Мы уже не нуждаемся в том, чтобы объяснять друг другу, почему плохо есть детей. Ну или еще какие-то утонченные правила. И потому, не нуждаясь в том, чтобы обосновывать каждый шаг в рассуждениях, мы можем просто, сразу приступить к выяснению действительно интересного. Например, почему лучшая пьеса не «Гамлет», а «Троил и Крессида»…</p><p class="p1">— Как-как? — переспросил Осипов, радуясь первой зацепке в виде имени собственного.</p><p class="p1">— «Троил и Крессида», — раздельно повторил Альтер. — Самая антисоветская пьеса Шекспира, очень рекомендую. Или, например, почему Маркион не основал церкви, хотя имел к тому, казалось бы, все основания. Или почему блондинки громче кричат в определенной позиции…</p><p class="p1">— Сволочь! — заорал Осипов и ударил кулаком по столу. — Рассказывай мне, дрянь, мразь, сейчас же, тут же все мне здесь рассказывай о ваших антисоветских сборищах!</p><p class="p1">— Вот видите, — тихо и сострадательно сказал Альтер. — Я же говорил, что вы не нашего круга.</p><p class="subtitle">4</p><p class="p1">Велембовского как особо виновного — как-никак он преподавал в военной академии, а потому его оккультные увлечения были вдвойне преступны, — сразу же поместили в уголовную камеру, где, впрочем, уголовники были особенные. Это была прослойка воров, сотрудничавших со следствием и получавших за то разнообразные послабления. Еще не настала пора ссученных, но уже вовсю процветали меченые: это были информаторы, «прессовики», помогавшие доламывать надломленных, и подсадные, как мирно, почти по-цирковому называли тех, кто помогал разговорить молчаливых.</p><p class="p1">Девяносто пятая камера на третьем этаже второго корпуса «Крестов» была заполнена именно такой фартовой публикой, отбывавшей незначительные срока за грабежи и жившей, в общем, припеваючи. Публика сменялась, а профиль камеры оставался прежним: сюда вталкивали тех, кто не хотел разговаривать, грубил следствию или не желал выдавать подельников. Велембовского перевели сюда с пятого этажа, не объяснив причин.</p><p class="p1">В камере было девятнадцать человек — по меркам 1925 года прилично, но по меркам тридцатых почти безлюдно. Здесь всем разрешались посылки и навалом было курева, а главным развлечением была обработка гостей. Гостей давно не подбрасывали, и девяносто пятая скучала. Гости были, как правило, из бывших и ломались на удивление быстро, но с некоторыми приходилось повозиться; групповые избиения не практиковались — молодая советская республика блюла молодую советскую законность. Одного лицеиста за полгода до масонского дела приложили об пол, отбили почки, был шухер.</p><p class="p1">— Здравствуйте, — с достоинством сказал Велембовский.</p><p class="p1">— Здорово, дядя, — ласково отвечал Володя Сомов, подписавшийся на сотрудничество еще в первую свою ходку. Ломать бывших было не в падлу, это почиталось делом почти благородным и авторитет Володи Сомова не роняло. — Присаживайся вечерять.</p><p class="p1">Велембовский настраивался на худшее и, увидев простую, широкую рожу этого доброго, в сущности, парня, несказанно обрадовался. Он всегда верил в свой народ и в то, что этот народ его не выдаст.</p><p class="p1">— Благодарствую, — сказал он сдержанно. — Поделиться нечем, передачи мне запрещены.</p><p class="p1">— А и что ж, дядя, — сказал Коля Панин, совсем молодой воренок с розовым, нежным, почти девическим лицом. — Нам што, дядя. Нам сказочку бы послушать, песенку попеть.</p><p class="p1">Велембовский насторожился, но присел на нары, куда указал Сомов, и взял любезно предложенный им кусок вареной курятины.</p><p class="p1">— Мы, дядя, загадки любим, — сказал Миша Славянский, рослый малый с внешностью добродушного мастерового. — Покушай, а потом заганем.</p><p class="p1">Велембовский с благодарностью кушал. Он предполагал, конечно, что его станут испытывать, что в камере надо уметь себя поставить и что ни в коем случае нельзя притворяться своим — здесь чем чужее, тем безопасней; но представления о загадках не имел, и взять его было ему неоткуда.</p><p class="p1">— Ну так вот, дядя, — сказал Боря Добрый, староста камеры, виртуозный наноситель тяжких повреждений здоровью. — Если три загадки угадаешь, то будешь прынц.</p><p class="p1">Он гастролировал однажды в Москве, смотрел спектакль «Принцесса Дураврот» или что-то навроде.</p><p class="p1">— Первая загадка, — сказал Саня Бобец, в прошлом борец, — будет тебе такая. Бочка стонет, бояре пьют. Што это такое?</p><p class="p1">Девяносто пятая камера радостно, добродушно засмеялась. Велембовский не знал ответа. Он задумался.</p><p class="p1">— Не знаю, — признался он наконец.</p><p class="p1">— Э, э, дядя, так не годится, — неодобрительно сказал Леша Муханов, успешный кавалер, любимец Лиговского района. — Такого ответа нет, дядя. Ты подумай: бочка стонет, бояре пьют.</p><p class="p1">Что стонет, лихорадочно думал Велембовский, что же стонет… Вот оно, все, чему меня учили, — ни к чему не годно, бездарно, напрасно. Что стонет? Ветер. Ветер несет дождь. Гроза, гром, как из бочки!</p><p class="p1">— Это гроза! — воскликнул он радостно.</p><p class="p1">— Ничего не гроза, — лениво протянул Коля Панин. — Это, дядя, свинья с поросятами.</p><p class="p1">Он сделал неуловимое движение, и Велембовский согнулся пополам.</p><p class="p1">— Если так будешь отвечать, дядя, — сказал Боря Добрый, — ты не будешь прынц.</p><p class="p1">— Вот тебе вторая, — начал Саня Бобец.</p><p class="p1">— С-сволочь, — сквозь зубы просипел Велембовский. — Двадцать на одного, мразь. Попадись вы мне по одному, вы поползли бы…</p><p class="p1">— Э, э, дядя! — сказал Леша Муханов. — Такого ответа нет. Ты на загадку отвечай, а не ругайся. Мы тута собралися культурные. Загадка: у тридцати воинов один командир.</p><p class="p1">Велембовский не отвечал.</p><p class="p1">— Ну, дядя! — прикрикнул Боба Сидоров, человек культурный, с тонкими пальцами. — Ты давай, што ли! Тебя ждут, понимаешь, а ты тянешь…</p><p class="p1">Велембовский молчал.</p><p class="p1">— Упорствует дядя, — сказал Коля Панин. — Это, дядя, язык, а тридцать зубов — солдаты. Но ты скажешь резонно: их ведь тридцать два! Отвечу тебе, дядя: их было тридцать два. Но стало тридцать. Смотри.</p><p class="p1">Он ударил Велембовского в челюсть, и хотя двух зубов не выбил, но один покрошил. Велембовский ощутил ужас, полузабытый с детства: он был один против всех, и намерения у них были серьезные. Никто из надзирателей не вмешался бы, даже закричи он сейчас позорным заячьим криком. Оставалось последнее.</p><p class="p1">— Что вы делаете, — почти прошептал он. — Я старый человек. Я в отцы вам гожусь. Что вы делаете со мной, посмотрите, ведь вы здесь такие же арестованные, как я…</p><p class="p1">Он ненавидел себя за эту заискивающую интонацию, но чувствовал, что требуемое сделано, что он может быть прощен, ведь главное совершилось, — и поверх этого сознания невыносимо презирал себя, и поверх презрения надеялся.</p><p class="p1">— Э, э, дядя! — сказал Леша Муханов. — Такого ответа нет. Слушай третью загадку: поднялись ворота, всему миру красота.</p><p class="p1">Велембовский разрыдался, глотая кровь.</p><p class="p1">— Радуга, — прохлюпал он.</p><p class="p1">— Э, э, дядя! — прикрикнул Жора Томилин. — Такого ответа нет! Дядя, это виселица!</p><p class="p1">Так они учили его неделю, и он все давал разные ответы, и все не мог научиться, что правильного ответа нет.</p><p class="subtitle">5</p><p class="p1">— Так-так-так, — уютно сказал Смирнов, человек плотный, уютный. — Дробинин Герман Владимирович, 1890 года рождения. Рассказывайте, Герман Владимирович.</p><p class="p1">— О человеческое, женское, — начал Дробинин, — в одежде приторной и тленной, ты переходишь во вселенское, но нас не нужно во вселенной. И возвращаешься, усталая, в безоболоченную жижу, но в гранях моего кристалла я тебя летающую вижу. А? Мне кажется, что здесь схвачено. Я поясню сейчас. Вообще есть такое, такая тенденция, что надо автокомментарий. Поэтическая материя настолько усложняется, что посторонний читатель не поймет, но нельзя же писать только для понимающих. Им и так хватает. И потому: возьмем исходную ситуацию. Этот четырехстопный ямб с добавочной дактилизацией отсылает нас, конечно, к известному «На железной дороге». Тоска дорожная, железная и так далее. Можно сказать, что вообще семантизация данного метра дает тему путешествия женщины с ничтожным результатом. Можно также вспомнить «Незнакомку». Сравните у Белокуровой, в «Изголовье»: я подхожу к тебе загадкою, я припадаю кошкой ловкою, но ты меня увидишь гадкою, корыстной девкою, дешевкою. Это отвратительно по качеству, но в плохих стихах даже нагляднее. Тот же мотив неудавшегося женского путешествия. Перейдем к содержательному плану: речь идет о неудавшемся выходе за пределы земного. Она, может быть, и прорвалась за пределы земного, — заметьте, что имени не называется, потому что это обобщенный опыт, касающийся метафизических попыток женщины вообще, — но Вселенная холодна, Вселенная не хочет. Женщина интересует ее лишь как женщина, а все ее духовные способности обречены. Почему «в одежде приторной и тленной»? Тленность указывает на телесность, приторность — на ее прекрасность, совершенство, но самой героине это отвратительно, она порывается в высшее, поэтому «приторной». Вы думаете, я не мог поставить «сладостной»? Вы обо мне плохо думаете.</p><p class="p1">— Почему, — сказал Смирнов, — почему сразу плохо…</p></span></span>
