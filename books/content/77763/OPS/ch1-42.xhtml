<p class="p">Глава девятнадцатая</p>
</div><p class="subtitle">1</p><p class="p1">В пятницу, тринадцатого апреля, та, что прежде называла себя Надей, собирала вещи и обходила друзей перед отъездом в пензенскую ссылку.</p><p class="p1">Вот и ответ, почему в последней сцене «Фауста» появляется одна из грешниц, прежде называвшая себя Гретхен. Дело, конечно, не в том, что она искупила грех и теперь прощена. Просто после детоубийства и позорной казни — как же можно называться Гретхен? Она не стоит теперь этого имени, которым звали ее любимые и любящие. И Надя была уже никакая не Надя, а существо без имени, может быть, с цифрой — девушка из двенадцатой камеры, дело № 5743/628, полтора плюс три, то есть полтора ссылки и три поражения в правах.</p><p class="p1">Поражение в правах уже наступило, и навсегда. Она не имела теперь никаких прав на комнату, в которой росла и читала, на мать, которую ни от чего не спасла, а о правах на Даню и о самом Дане лучше было не думать. Возвращаясь в трамвае с узелком грязного белья, словно средневековая грешница с гравюры с сумой прегрешений, она боялась войти в комнату, а оказалось нестрашно. Просто чужая комната, и все. Все было теперь чужое, всем с рождения она владела не по праву. Не ту учили, не ту лечили, не на ту надеялись, и страшней всего было догадываться, что и с самого начала все предназначалось не ей. Не то чтобы она сломалась и предала неделю назад — нет, она уже родилась не той, оттеснив, может быть, от метерлинковской лодки ту истинную душу, которой все предназначалось. Все было для другой — родительская любовь, книги и Даня; всем она пользовалась незаслуженно, ее изначально гнилая душа лопнула при первом нажиме, и Райский знал, знал с самого начала. Он чувствовал. Может быть, в нем действительно была правота: нужен же карающий меч, тот самый, волнистый, пламенеющий, раны от которого не заживают. Кто-то должен отделять, выбраковывать гнилые души. И что такое была ссылка рядом с сознанием незаслуженности всего, от материнского молока до вечернего кружения с Даней, который лишь чудом спасся от ее предательства! Это было первое, о чем она спросила: где Даня? Он уехал, сказала ей мать с мучительной, невыносимой лаской; впрочем, мать была единственная, перед кем она почти не виновата. Не надо лгать, все не ради нее, все от страха, от собственной гнили, — но тут была хоть зацепка.</p><p class="p1">— Мама, если ты утешаешь, это грех. Я все равно узнаю.</p><p class="p1">— Уехал, уехал! — махала руками мать. — Приходил человек. Я же писала тебе.</p><p class="p1">— Я помню. Но все-таки. От него были еще письма?</p><p class="p1">— Только одно, то, что я передала. Больше ничего.</p><p class="p1">— Мама. Я должна тебе сказать. Ничего не спрашивай. Я только прошу. Обещай, что сделаешь.</p><p class="p1">— Я не могу так обещать, Надя. Говори, ради Бога.</p><p class="p1">— Нет, обещай. Я уезжаю, ты знаешь. И право на одну просьбу у меня есть. Обещай мне, что когда он придет, ты не скажешь ему, где я.</p><p class="p1">— Хорошо, хорошо, но почему? Что он сделал?</p><p class="p1">— Он не сделал ничего. Сделала я. Нам с ним не надо быть, не надо вообще видеться. Я могу принести ему беду, я не хочу этого, обещай, что ты сделаешь…</p><p class="p1">— Нет, конечно, я не скажу ему. Я ничего не скажу, но почему…</p><p class="p1">— Когда вернусь, объясню сама. Но сейчас ни слова, как бы он ни просил.</p><p class="p1">Конечно, будь Надина воля — надо было просто сказать ему, что она умерла, в тюрьме или ссылке, сразу по прибытии. Но она знала, что мать не сможет этого выговорить никогда, а потому настаивала на меньшем.</p><p class="p1">Мать кивала, клялась, даже перекрестилась. Хотя Надя и сама не верила, что он станет разыскивать, добиваться — если связь между ними не померещилась, он должен будет понять все сам. Если она уничтожена до основания, раздавлена в пыль, если от нее ничего не осталось — он не мог не ощутить этого хоть за две, хоть за двадцать тысяч верст, хоть в Крыму, хоть на Марсе.</p><p class="p1">На прощания и сборы в те времена милостиво давали три дня. Для себя Надя все уже решила: такие люди, как она, решений не меняли. Другой мог бы надеяться на обжалование приговора, но себя она приговорила бесповоротно: той Нади, которая была, уже не существовало, она вышла из ее тела слезами, стыдными слезами подлой жалости к себе, которыми она в последний раз плакала в кабинете Райского. Новой Наде предстояло начать жизнь с нуля, искупать грех новой жизнью и, если получится, смертью. Она должна была безропотно принять все, что заслужила, и родиться заново, если когда-нибудь Бог простит ей предательство. Хорошо, что она уезжала в Пензу. В Пензе проще начать заново — на чужом месте, на сожженной земле. Здесь, в Ленинграде, она бы не выдержала. Слишком многие помнили ее прежнюю, слишком тянула бы оболочка, сначала одна преступная слабость, потом другая, сегодня разрешила себе конфету, завтра посиделки, снова лекции, там, глядишь, и мальчики (о Дане она не смела и думать), и постепенно, она знала, предательство изгладилось бы из памяти. Она внушила бы себе, что ничего не было, — умела же убеждать, что и в классе не травили, и Тамаркина не смотрела косо… Все бы стало, как было, а от этого уже не спастись. Слава Богу за все.</p><p class="p1">Взять с собой она хотела как можно меньше, потому что и на прежние свои вещи не имела права, да и не были эти вещи рассчитаны на ссылку. Практичного, полезного в доме почти не водилось — все бирюльки, украшения, глупости; холили, лелеяли — а надо было иначе, и самой себя надо было воспитывать жестоко, обливаться, может быть, водой… Ах, какая вода спасла бы от Райского, от Лосевой, от Махотки? Ни к чему нельзя подготовиться, ничему научиться: душа или есть, или нет, сколько себя ни дрессируй. Не на хрупких же и жалких этих вещицах вымещать теперь ненависть к собственной гнили: они чем согрешили? Разве носатый полишинель, разве бедный лондонский кролик был чем-нибудь виноват? Живой и сильной душе они были бы на благо, научили бы ее нежности и состраданию, а ее гнилой пустышке не помогли бы все учителя мира — только самой на руинах прежнего можно было возвести что-то новое, достойное жизни.</p><p class="p1">И потому сперва она не хотела брать Мистера Кэта, а потом взяла.</p><p class="subtitle">2</p><p class="p1">Оставалась еще одна невыносимая обязанность. Надо было обойти старцев. По ужасному совпадению, была пятница — день, когда в невообразимо отдалившейся прежней жизни она ходила по домам и смела роптать, выполняя их смешные, копеечные поручения. И она отправилась прежним маршрутом — Осмоловский, Самуилов, Громова, Буторов, супруги Матвеевы. Может, и не дожил кто? Но у Осмоловского в квартире не было телефона, а Самуилов давно не брал трубку, опасаясь подвоха. И было что-то стыдное в том, чтобы не зайти ко всем самой: даже если умерли, надо проститься. С этого начиналось — не искупление, нет, но полноценное наказание, прощание с прежней Надей.</p><p class="p1">Апрель 1926 года был удивительно жарок и томен, словно нарочно, чтобы окрестный рай подчеркивал внутренний ад. Блаженно, как ребенок, потягивающийся в постели, приходил в себя город после дикой зимы. Все зазеленело в три дня. Хрусткие стебли тянулись из пустырей, из пятен бросовой земли, еще недавно нужной, застроенной, а теперь пустынной; но природа пустоты не терпит и все заселяет нерассуждающей растительной жизнью, страстно желающей плодиться. Вылезли одуванчики, надрывались птицы, голосили сверкающие трамваи, солнце плясало во всем, что готово было его отражать, — и словно на глазах развертывались туго сжатые зародыши листьев: шло и торжествовало ежегодное чудо возобновления, из которого человек выпал раз и навсегда. Все возобновляется, а ему нет возврата. И Надя, выпав из перечня людей, ближе стала к этому растительному царству — как велик был соблазн вовсе раствориться, слиться с ним! Но этого выхода не существовало. Надо было прожить, промучаться, стать последней из людей — но из людей, а не из этих безмысленных сущностей. После смерти, может быть, — а теперь она еще не заслужила.</p><p class="p1">Осмоловский сидел на лавочке у своего трехэтажного дома, блаженно зажмурившись и подставив солнцу небритое, бледно-желтое лицо. Надя некоторое время постояла рядом, не решаясь вывести его из сладчайшей апрельской дремоты.</p><p class="p1">— Кирилл Васильевич, — робко сказала она наконец.</p><p class="p1">Осмоловский встрепенулся и раскрыл глаза. Некоторое время он промаргивался, а потом радостно заулыбался.</p><p class="p1">— Наденька, — сказал он беззубым ртом. — Какая прелесть. Как вас долго не было. Не заболели?</p><p class="p1">— Хуже, Кирилл Васильевич, — сказала она и замолчала, не в силах объяснять.</p><p class="p1">— А, да, — сказал он, поморщившись. — Я что-то такое слышал. Здесь столько всего без вас было, Наденька. Вы столько пропустили. В этом году весна такая ранняя — скворцы, представьте себе, уже были тут седьмого марта.</p><p class="p1">Что она делала седьмого марта? В Крестах не было времени. Она знала только, что мучилась, что душа ее умирала в это время, а к Осмоловскому прилетели скворцы.</p><p class="p1">— И вообще, Наденька, — продолжал он с кроткой стариковской радостью, за которой ей слышалась теперь вечная стариковская хитрость, способность отгородиться от всего скворушками и листочками, — я столько понял, столько понял этой весной… Скажем, голубь. Обыкновеннейший уличный голубь, а сколько оттенков в этом ворковании! Лучшая песенка — то, что поет голубь на солнышке: я заметил, что начинается оно с повышения тона. Люди всегда — на повышение, а он понижает…</p><p class="p1">Надя молчала, глядя в землю. Она не смела прерывать его. Он рассказывал о чудесных свойствах кленового сока, который стал собирать, — вкусней березового! — и о волшебной трели чижика, которого завел себе его сосед, маленький Вовка. Чижик, оказывается, высвистывал не одно коленце, а семь, и одним приветствовал только Вовку, как собака, узнающая хозяина. Сколько чудес и мыслей в крошечной птичке.</p><p class="p1">— Кирилл Васильевич, — сказала та, что была Надей. — Я в ссылку еду.</p><p class="p1">— А куда? — поинтересовался он, как ей показалось, живо.</p><p class="p1">— В Пензу.</p><p class="p1">— Пенза — о, чудесный край. Там удивительные ботанические возможности. Почвы там, я полагаю, сухие и кислые, и потому, Наденька, вы сможете там наблюдать татарник, какого в Ленинграде не встретите. И кроме того — зимой свиристель, летом, должно быть, ястребки… Там ведь степи? Не упускайте возможности наблюдать. Знаете, Наденька, с тех пор, как я наблюдаю природу, я перестал многое, очень многое замечать. Из того, что прежде мучило. Все беды — от того, что мы ушли из природы. Я думаю, если вы станете наблюдать, там, в Пензе, будет счастье… Вот заметьте: я вчера вечером наблюдал паучка, обычного паучка… Впрочем, вам ведь некогда? Вам всегда некогда, Наденька, мы все бежим и не хотим прислушаться…</p><p class="p1">— До свиданья, Кирилл Васильевич, — сказала она. — Если что-нибудь понадобится, звоните маме на службу, телефон вы знаете.</p><p class="p1">— Да что же мне понадобится, — сказал он благостно. — Я радуюсь теперь всему. Никогда не думал, что простой листочек может доставить столько счастья… столько чувства…</p><p class="p1">Он сидел на лавке, жмурясь, задрав лицо к солнцу, — сам уже часть древесного, травного, тварного царства, не знающего страхов и сожалений, счастливый Осмоловский. Надя постояла около него еще минуту и почувствовала, как из нее уходят силы. Их и так уже было мало. Около Осмоловского было спокойно и даже уютно, как бывает иногда в весенний день на кладбище: поют птички, и люди вокруг обухаживают родственные могилы, и все это похоже на мирный земледельческий труд, на кроткое преодоление смерти, всеобщее примирение среди просыпающейся земли. Но долго там находиться нельзя, потому что никакого преодоления не происходит, а напротив, сплошная смерть — просто весна обезболивает ее проникновение в тебя, как, говорят, вампиры обезболивают укусы. Смерть кругом, и чем дольше ты там стоишь, тем больше ты ее часть; и стоя рядом с Осмоловским, Надя так же медленно и безболезненно погружалась в природу, вот уже и врастала в асфальт, вот уже растворялась даже ее вина, и растворение это было блаженно, — и именно по тому, как притупилась грызущая ее боль, она поняла, как быстро успела расчеловечиться около этого почти уже растительного существа. С трудом, словно выдирая корни из почвы, она оторвала ноги от диабаза и отправилась к Самуилову — сначала медленно, как дерево, учащееся ходить, а потом почти бегом.</p><p class="p1">Самуилов был жив, живуч, но разговаривал уже через дверь, и так со всеми. Возможно, если бы Надя приходила пресмыкаться еще дня три или простояла на коленях под его дверью пять часов, раскаиваясь в неведомом грехе, — он бы смилостивился и открыл, и рассказал о новом заговоре соседей, вошедших в комплот с городскими властями, водопроводчиком, мировым правительством, и даже предложил бы ей сесть ближе к утру, — но у Нади не было сил проситься, да и незачем. Ей открыли соседи.</p><p class="p1">— Давно не впускает никого, в гальюн по ночам ходит, — сказал белобрысый мужик с тонким острым носом и усами щеточкой. Надя подошла к знакомой двери и спросила, не нужно ли чего.</p><p class="p1">— Вы все уже сделали, что могли, — прохлюпал из-за двери Самуилов. — Все, все, что могли, уже вы сделали. Уже вы погубили безвозвратно.</p><p class="p1">Как все сумасшедшие, он бил иногда удивительно точно.</p><p class="p1">— Простите, Василий Степанович, — сказала Надя и повернулась уходить, и он как-то почувствовал это сквозь дверь — или подсматривал в глазок? Мимо Нади ходили коммунальные соседи Самуилова, улыбались, подмигивали и крутили пальцем у виска.</p><p class="p1">— Вы погубили! — зарыдал Самуилов в голос. — Вы отобрали все! У меня вчера пропали брюки, моль съела шарф зимний! Был зимний шарф, съела! Украли шляпу, шел по улице, сшибли! Во втором классе пропала фуражка прекрасная новая! Спрашиваю — кто взял, никто не говорит. Взяли все, ничего не осталось, и тут вы приходите требовать! Вот, возьмите, входите, берите все, не осталось ничего!</p><p class="p1">Он распахнул дверь, и из занавешенной, темно-зеленой комнаты ударила физически ощутимая волна густой вони, нечистой старости, застарелой, неизлечимой неудачи — кажется, за время ее отсутствия все тут еще больше заросло сплетнями, страхами, паутиной воображаемых интриг, которые сплетал вокруг себя одинокий Самуилов; зеленые высохшие плети его мыслей висели в комнате, по углам копились их страшные гроздья. Но взглянув на нее, он словно увидел нечто не в пример более страшное — за один миг проник, понял, коснулся, ужаснулся и, тихо втянув воздух, захлопнул дверь. Страшно было Самуилову, а ей хуже.</p><p class="p1">— Уходите вон, вон! — завыл он из-за двери. — Ничего нет, никого нет дома!</p><p class="p1">И она ушла, усмехаясь в первый раз за этот день; и соседи уже не улыбались, глядя на нее.</p><p class="p1">Отсюда путь ее лежал к Громовой. Громова ее почти не заметила. У нее были серьезные проблемы — вычистили сына. Это звучало жуткой двусмысленностью — словно когда-то еще не поздно было выскрести это лишнее повсюду существо, но тогда пожалели, промедлили и наверстывали теперь. Прежняя Надя так никогда бы не подумала, но теперешняя могла. Его вычистили, и Громова мучительно переживала этот запоздалый аборт. Чистки ждали давно, и потому отсутствия Нади Громова попросту не заметила — ей было не до того; вообще, старея, старцы замечали все меньше посторонних предметов. Мысли их сосредоточивались на себе и своем. Посторонние — вредили они или старались помочь — вытеснялись собственными хворями и страхами, и выдуманными старческими фантомами — убогими, сплошь враждебными, строившими козни.</p><p class="p1">— И вы представьте! — желчно повторяла Клавдия Ивановна, вытирая красные глаза. Надя никогда не видела ее плачущей, но тут пробило. — Представьте, ни единой претензии к работе, ни одного профессионального замечания! Он даже конспектировал что-то Маркса, что-то выписывал, он вел дневник — подклеивал о стройках из газет! Они ничего не слушали, не посмотрели. Их двоих из всего отдела. И я понимаю, что Гринфельда, — Гринфельд никогда не работал, вечно бегал курить, и брат оказался в Америке, и вообще сколько можно терпеть, что везде о н и! Вы знаете, я всегда была без этих предрассудков, но когда везде! И вместе с Гринфельдом вычищать Игоря — это… я не знаю… это такое оскорбление, что не придумаешь. Мне кажется, если бы вычистили одного Игоря — это было бы не так обидно.</p><p class="p1">— Он устроится, — тускло сказала Надя. — Инженеры нужны.</p><p class="p1">— Ах, оставьте! — резко сказала Громова, вымещая на подвернувшейся Наде всю ненависть к кадровой комиссии ЛОБУТа. — Куда его возьмут после вычистки, и что вы вообще в этом понимаете?! Вы ничего не понимаете и говорите, просто чтобы сказать, машинально. Это мне обидней, чем если бы вы просто молчали. Так было бы честно, а вы равнодушно говорите что попало. Куда возьмут, и где еще сейчас в городе устроится человек его профессии? Он с нуля, с минуса создал все это производство, он знает бумажное дело. Отказывал себе в чае, в булке… И где он сейчас будет создавать? Где он возьмет такое предприятие? А в Москве его спросят: кто вас вычистил и почему? Вы лучше молчите, Надя, я не в том сейчас состоянии, когда могу выслушивать всякую ерунду…</p><p class="p1">— Клавдия Ивановна, — твердо сказала Надя, прерывая весь этот шквал обвинений и слез. — Я пришла попрощаться. Я в ссылку еду, на два года.</p><p class="p1">— В ссылку, ну и что же, в ссылку, — повторила Клавдия Ивановна. — Сейчас высылают каждый день, наконец заселят страну… У меня двух подруг выслали, они пишут, очень хорошо, люди чудесные. Одна в Томске, вторая в Нарыме. Вас там должны поселить, скоро маму сможете вызвать.</p><p class="p1">Глаза ее увлажнились, покраснели пуще прежнего, она не на шутку обижалась — надина мать могла разделить с Надей ее высылку, а вычистку Ростислава разделить не мог никто.</p><p class="p1">— И за неделю до этого почетная грамота! — восклицала Громова. — Представьте: они знали, что будут его вычищать, и наградили за неделю перед тем! Это даже не иудин поцелуй, это, я не понимаю, это вот именно низкое коварство!</p><p class="p1">— Я пойду, — сказала Надя. — До свидания, Клавдия Ивановна.</p><p class="p1">— И я еще понимаю в вашем случае, — сказала Клавдия Ивановна уже в коридоре. — Вы записались в какую-то секту, это личное ваше дело, я краем уха слышала или читала, не помню. Но как вы можете сравнивать? Пять лет беспорочной работы, без отпуска, часто без выходных, — и все это псу под хвост!</p><p class="p1">Надя уже ушла, уже спустилась по лестнице, а Клавдия Ивановна все повторяла:</p><p class="p1">— А ссылка, что же ссылка. Но как вы можете сравнивать? Насколько надо не иметь элементарного такта…</p><p class="p1">Надя шла к Буторову. Он обязан был понять — мелочный, надоедливый, но добрый. Она всегда выслушивала его истории о противоборствах с редакциями и врачами, и он ее любил — милый, домашний вариант безумного Самуилова, удержавшийся на грани безумия. Но в том и вопрос, чтобы удержаться на грани.</p><p class="p1">И точно, Буторов ей обрадовался. Больше того, он заметил ее отсутствие.</p><p class="p1">— Надежда Вячеславовна! — воскликнул он радостно. — Что же вас так долго не было!</p><p class="p1">— Я была в тюрьме, Григорий Иванович, — сказала она с покорной интонацией, которой у нее не было прежде; в самом деле, в тюрьму она попала невиновной, но теперь была виновата.</p><p class="p1">— Что же вы сделали? — спросил Буторов недоуменно. — Я никогда ни в чем на вас не мог пожаловаться…</p><p class="p1">Разумеется, если кто не виноват перед ним, так и брать не за что; возможна ли другая пружина мироздания, кроме Григория Ивановича?</p><p class="p1">«Другие пожаловались, Григорий Иванович», — хотела сказать она, но поняла, что в теперешнем своем положении дерзить старику не имеет права.</p><p class="p1">— Это была проверка, — сказала она и, в общем, не соврала.</p><p class="p1">— Что же, ничего не нашли? Выпустили?</p><p class="p1">— Нет, Григорий Иванович. Поискали и нашли. Я не прошла.</p><p class="p1">— И что же теперь? — удивленно спросил Григорий Иванович.</p><p class="p1">— Теперь в ссылку. Послезавтра поеду в Пензу.</p><p class="p1">— Нет, но как же так? — изумленно спросил Григорий Иванович, и Надя угадала разбег перед долгим монологом. — Как же так, Надежда Вячеславовна? Я решительно, так сказать, не понимаю. Вы изволите отсутствовать четыре, нет, пять месяцев. Вы занимаетесь все это время неизвестно чем. Я дважды переживаю мучительную болезнь сердца, болезнь глаз, я в состоянии полной беспомощности едва не замерзаю на улице в январе, спасибо, нашлась святая душа, довела до парадного, — и теперь я узнаю, что вы отправляетесь в ссылку? О чем вы думали, позвольте вас спросить, когда навлекали на себя и, так сказать, доигрались? Неужели нельзя было отказать себе в каких-то удовольствиях? Понимаете ли вы, что оставляете, фактически бросаете… нет, я не могу продолжать.</p><p class="p1">Надя понадеялась сначала, что он шутит. Была надежда, крошечный шанс, что это попытка смягчить ее боль, заболтать, произнести комический монолог — но Буторов был абсолютно серьезен. Он считал ссылку ее виной, возмутительным пренебрежением главной обязанностью. Ясно же, что у Нади не могло найтись других дел, кроме как опекать его беспомощную старость.</p><p class="p1">— Я не понимаю, право, — продолжал он топтаться перед ней в подтяжках, в мятой рубахе, и так же топталась на месте его речь. — Хорошо, я понимаю, вы могли увлечься. Но забыть, не подумать… как вы могли! Хорошо, я могу, конечно, если нет другого выхода, написать, как-то снестись… обратиться, может быть, к Марии Федоровне… Но как вы себе представляете мою жизнь после этого? Вы представляете, во что здесь превратится моя жизнь?!</p><p class="p1">И здесь ей стало жалко Буторова. Он был не виноват. Он ее, конечно, любил, но так, как только и мог любить Буторов, как любит вампир, чья любовь способна выразиться единственно в кровопивстве. Она была ему необходима, бедному, потерянному, и в самом деле вышибла из-под него последнюю опору; в эту секунду ей казалось, что он даже похудел без нее.</p><p class="p1">— Я не понимаю, — повторял Буторов. — Где было ваше сострадание, ваше чувство долга, наконец? Ведь вы можете не застать меня больше, я могу не дожить…</p><p class="p1">Мысль о том, что она может погибнуть там, ему не приходила.</p><p class="p1">— Ну хорошо, — говорил он, пожимая плечами. — Я напишу…</p><p class="p1">— Не надо никуда писать, Григорий Иванович, — сказала Надя, чувствуя, что не может заплакать; слезы скреблись и кололись в горле, но не проливались. — Вам, может быть, что-то нужно сейчас?</p><p class="p1">Слез давно не было; она не плакала с тех самых пор, с тех последних рыданий перед Райским. Так, говорят, перегорает в груди молоко от сильного горя. Чтобы плакать, нужно право на слезы; нужно немножко жалеть себя. Она не имела теперь права на это облегчение: есть бесслезное горе, горе стыда.</p><p class="p1">— Мне? — спросил Буторов. — Мне, собственно… Но как же… Приходите завтра, я тогда, может быть, скажу, что мне нужно. Сейчас идите, я расстроен сейчас… Идите и подумайте…</p><p class="p1">Оставались Матвеевы. К ним не хотелось совсем, но урок надо было выполнить до конца: прощаться, так со всеми. Она устала, ноги у нее болели с непривычки — она ведь толком не ходила четыре месяца, — но добрела до Матвеевых и позвонила в их дверь.</p><p class="p1">— Кто это? — спросил по обыкновению Александр Васильевич.</p><p class="p1">— Это Надя, — сказала она. — Здравствуйте.</p><p class="p1">— Здравствуйте, — задумчиво ответил Александр Васильевич, не открывая. — Сашенька! Там эта пришла.</p><p class="p1">Послышалось шарканье.</p><p class="p1">— Что значит — пришла? — ответствовала Александра Михайловна голосом той самой горгульи, в которую превращалась, верно, стоило Наде выскользнуть за дверь. — Откуда пришла? Не вздумай…</p><p class="p1">— Нет, нет, Сашенька, — успокоил Александр Васильевич. — Успокойся, ради Бога. Вы там еще? — отнесся он к Наде. — Я прошу вас уйти, немедленно уйти…</p><p class="p1">— Что значит — «прошу»? — закричала Александра Михайловна с тем расчетом, чтобы слышали соседи. — Нам не нужны каторжные, воровки, что это такое, как вы смеете в приличный дом! Как вы могли вообще, как вы посмели! Мы открывали вам дверь, мы вас… что такое! Я духу вашего чтобы тут! — неистовствовала она. — Вон сейчас же, я вызову сейчас, я уже иду вызывать, Саша, не вздумай, не открывай, не вздумай! Я иду сейчас же…</p><p class="p1">— Прощайте, — сказала Надя и спустилась по лестнице со странным облегчением. Лучше был такой прием, чем чаепитие с разговорами о ручках и ножках. Еще, чего доброго, швырнула бы чашку в стену — как-никак она тоже была теперь не прежняя Наденька.</p><p class="p1">К Михаилу Алексеевичу, подумала она. После таких теплых людей в самый раз навестить холодного.</p><p class="subtitle">3</p><p class="p1">Михаил Алексеевич сидел на оттоманке, поджав худые ножки, и Надя поразилась тому, как он мал, как жалок. За полгода, что они не виделись, он потемнел и съежился — может, всему виной то, что она впервые видела его не в собрании и не при естественном свете: широкий, оранжевый апрельский свет лился в окно. В таинственной обстановке вечеров он был другим, всегда немного наигрывающим, а оттого и малый рост, и тщедушность его казались маской: вот все уйдут — а он выпрямится, переоденется в человеческое, обретет рост и силу, нельзя же такому — в обычный мир, с простыми людьми… Но он был точно таков, только не в сюртуке, а в клетчатой мягкой рубашке и жилетке, и только сгорбился, будто ему все трудней было носить свою большую голову. Он улыбнулся ей так мягко, так горестно, что она чуть не расплакалась, еще ничего не сказав.</p><p class="p1">— Наденька, — протянул он музыкально, — милая Наденька, вот и вы, ясная душа. Спасибо вам, что вспомнили. Мы сейчас чаю, да, я сделаю чаю… Садитесь, милая моя. Как хорошо, что заглянули. Я ведь теперь один. Игорь ушел, вы знаете?</p><p class="p1">— Нет, не знаю ничего. Простите.</p><p class="p1">— Что же прощать? Да, ушел. К Ниночке Аргуновой. Он бывает у меня… да… и она бывает.</p><p class="p1">Надя не знала, что сказать. Ей говорили, что союз Михаила Алексеевича с Игорем был противоестественный и постыдный, но говорили как должное, машинально. В сущности, все давно привыкли. Ничего непристойного не было, и Ниночка не смотрелась чужой в их идиллии. Непонятно было, как все это может рухнуть: противоестественным союзам не страшны естественные обстоятельства.</p><p class="p1">— Это как с детьми, — говорил Михаил Алексеевич, доставая чашечки. — Выросли дети — и ушли, и пустое гнездо. Что ж — как удержишь? Они бывают, не забывают, — повторил он, ища Игорю оправданий. — Лучше, знаете, так, чем когда он с нею… тут, на кушетке. Я подумал даже, — может быть, она нарочно его попросила? Ей захотелось, чтобы… тут? И чтобы как раз когда я вернусь? Мне кажется, она подгадала, но я что ж? Я еще погулял…</p><p class="p1">И Надя, которую, кажется, не могло уже утешить ничто, расшевелила эта внезапная откровенность; она могла теперь сочувствовать не всякой беде, — иная беда казалась ей подарком небес, смягчающим обстоятельством, — но только чему-то стыдному, и он угадал это, рассказывая ей то, о чем не говорил никому.</p><p class="p1">— Вы когда едете?</p><p class="p1">— А вы уже знаете?</p><p class="p1">— Да, мне от Пестеревой звонили. Что ж, ничего, Пенза — славный город, я бывал в Пензе. Году в третьем. Там у отца было дело, так он послал меня. Там много было людей истинной веры, из Поволжья пришли и осели, вам с ними хорошо будет. Наши не обидят. Там Успенский собор удивительный. И вокруг города леса славные, река Сура, очень чистая. Жить, Наденька, можно. Да к тому же — что такое три года? Три года тьфу, вы заметить не успеете, и мне кажется, что они раньше простят. Что ж такого? Собирались люди, разговаривали, не враги… Они теперь за своих примутся, а вам, очень может статься, уже осенью разрешат сначала сюда в гости, а там и совсем… Помяните мое слово, простят, да и прощать нечего.</p><p class="p1">— Нет, Михаил Алексеевич, — сказала Надя и осеклась.</p><p class="p1">— Почему нет? Непременно, непременно…</p><p class="p1">— Да я не к тому. Они, может быть, и простят. Я сама не вернусь.</p><p class="p1">Он поверх очков глянул вопросительно, но, кажется, не особенно удивился.</p><p class="p1">— Так решили?</p><p class="p1">— Да, решила.</p><p class="p1">И, вызванная на откровенность его горем, она рассказала ему все.</p><p class="p1">Михаил Алексеевич слушал молча, не опуская огромных глаз в двойных очках — темные, коричневые, никогда не проходящие круги вокруг глаз и рукотворные, в стальной оправе простые очки, какие носят мастеровые.</p><p class="p1">— Да, да, — сказал он, кивая чуть вздрагивающей головой. — Все понимаю, все. Какое страдание, Наденька, милая, какое страдание! Но и какой прямой, самый прямой путь.</p><p class="p1">Она молчала, боясь его прервать, в безумной надежде, что сейчас он скажет всеобъясняющее, всепрошающее слово.</p><p class="p1">— Я всю жизнь прожил изгоем, Наденька. Только так и надо, да ведь не всем по силам. Господь дает крест, даст и силу… Вот, мой крест был — такой, и я для многих, особенно ежели кто всегда прав, виноват с самого начала. Еще не сказал ничего, а уж виноват. Так что я знаю, Наденька, что говорю, и путь ваш самый чистый, самый христианский: Христос ведь пришел не к здоровым, не к чистым. Он пришел к прокаженным, павшим, вроде таких, как я… ну, и вы. Ведь мы никому хуже не сделали. От вас никому никакого зла не случилось. Они и сами все знали, верно ведь? Ну так что же? — Он погладил ее по голове. — Вот, видите ли, я глажу вас по голове, а ведь многие от моей ласки отшатывались. Слух об ужасном разврате, о каких-то тут оргиях… ну подумайте, я — и оргия. Мне вдвоем-то с любимым всегда бывало неловко, а на людях? Я юношу не мог по плечу похлопать, просто так, одобряя стишки: все думали, что с намерением. Какое намерение? Мне во всю мою жизнь нравились трое, один утонул, другой уехал, а третий меня оставил.</p><p class="p1">Это было почти как из его стихов, и, не выдержав, она расплакалась снова.</p><p class="p1">— Да, да, — сказал он, словно только того и ждал. — Плакать, каяться, уничижаться, жалеть. Я не в утешение вам говорю. Что же вас утешать? Я, может быть, вас приветствую в нашем тайном сообществе. Наденька, больше всего на свете бойтесь правых и правоты. Правоты бойтесь и святости. Морали бойтесь, подлой их морали, для того только им нужной, чтобы холить себя. Мораль они придумали, чтоб себя любить, а ближнего унизить. Никакой нет морали. Скажешь такое при дураке — и будешь смрадный грешник, но вы-то поймете. Какая мораль у людишек, ежели все умрут и всех жалко? Мораль, — повторил он с внезапной злостью. — Все законы — чтоб мучить, все правила — чтоб собою любоваться. А кому вложено, встроено, как маятник в часовой механизм, — того нельзя, этого не надо, — тому зачем законы? Разве можете вы сделать зло, хотя бы и захотели? И тогда пришел Он, — говорил Михаил Алексеевич, все держа руку на ее голове, но глядя в окно. — Пришел Он, чтобы утешить падших и поднять затоптанных. Счастливому он зачем? У счастливого есть закон, он следует ему и доволен. Он пришел к нищему, отверженному, всеми брошенному; пришел к презренному, пришел к тому, кто один против всех… Блудница и разбойник — вот кто будет с Ним в раю; а добрые и честные, которые пиво пьют и друг дружку хвалят, пойдут не в ад даже, а на переплавку. В аду будут те, кто мучил вас — вот таких, как вы. Христос для тех, для кого больше нет нигде, никогда, ничего. Или вы не знали? Вы же с младенчества знали, еще прежде, чем прочли священную историю. Бог для тех, у кого нет ничего другого. Другим он зачем?</p><p class="p1">Надя молчала, успокаиваясь, но тут ее поразила мысль страшней прежних.</p><p class="p1">— Что же, Михаил Алексеевич, — сказала она, — у вас получается, что он пришел и к Иуде?</p><p class="p1">— Ах, это нет, — быстро сказал он, — это леонид-андреевское, и то еще не его, а Ремизова, и Ремизов не сам выдумал… Это глупость, оставьте. Разве кто-нибудь мучил Иуду? Разве кто-то пытал Иуду? Добровольное зло и добровольное добро, при чем тут они? Сам захотел и предал, и получил деньги. Впрочем, может быть, когда повесился… но и то не думаю. Пошел и удавился, какая пошлость! Я не вас отговариваю, — упредил он ее мысленную подсказку, — я знаю, что вы этой пошлости не сделаете. Если бы этот Иуда с клеймом предателя отважился жить, искупая грех, валяясь в ногах у апостолов, ночуя на улицах, чтобы его попирали ногами… если бы вынес грех до конца и принял все, что положено — такому Иуде, может быть, отверзли бы ад, ибо есть вещи хуже ада — полное исчезновение, переплавка… Но повесился… дезертир. Нет, это не по Христовой части. А вот Петр, трижды отрекшийся, — да, этот годится в основание церкви, ибо — камень. Пока не отрекся, какой же ты камень? Но закаменевший в отчаянии, сходящий с ума от раскаяния, попросивший, чтобы его распяли вниз головой — дабы не дерзнуть уподобиться даже в казни… Этого я люблю. И стоя в Риме у святого Петра — знаете, туда бы Исакий несколько раз поместился, ничего я не видел величественнее и уже не увижу, — я все думал: это тебе, Петр, это тому, что ты трижды отрекся. Вот какой бастион выстроили мы, трижды отрекшиеся. Не диво ли, что мы победили? Ах, ведь это не мы победили, это бесконечное милосердие, — но разве не на нас с вами оно показано? Мы затем и нужны… да. Но что-то я совсем заговорил вас. Вы и сами все знаете. Пейте чай.</p><p class="p1">Надя взяла его сухую лапку и поцеловала в ладонь. Михаил Алексеевич смутился.</p><p class="p1">— Давно, давно никто не целовал, — сказал он, улыбаясь неестественно. — Вы как же поедете: своим ходом?</p><p class="p1">— Да, своим. Доверяют. Там прибыть и зарегистрироваться.</p><p class="p1">— Ну, а ежели не прибудете?</p><p class="p1">— Куда же я денусь. Тогда они маму схватят.</p><p class="p1">— А если бы всем… — Михаил Алексеевич вновь мечтательно уставился в окно. — Если бы всем вдруг уйти? Как хорошо бы убежать и вот так ходить, чтобы никто не увидел, никто не нашел… Можно ведь, как вы думаете? Не всех же они прикрепили к земле. Это никому еще не удавалось.</p><p class="p1">— Я не смогу, Михаил Алексеевич. И мама как же? У нее ноги болят…</p><p class="p1">— Ах, у всех ноги, — махнул он ручкой. — Просто шагнуть, и все. Потом уж нетрудно. Ходить по деревням, рассказывать сказки — чего лучше? Разве в деревне не приютят, не накормят? Все мечтали, и никто не мог. А ведь только так и обмануть судьбу… Вы знаете, что Федор Кузьмич умер?</p><p class="p1">— Нет, не знаю. Сколько всего случилось…</p><p class="p1">— В декабре. Как и предсказывал. Очень мучился, все говорил: как бы еще побыть дома, среди своих вещей… Вещи действительно жалко. Но я раздам и, может быть, уйду. Теперь-то ничто не держит. Я в последнее время об этом много думаю, и он тоже говорил: если бы раньше уйти, может, и выжил бы… Сиднем сидел, говорит, вот и болею. Я был у него незадолго. Жаль, ах, жаль: помните — заря-заряница, красная девица, Мать Пресвятая Богородица…</p><p class="p1">Надя снова заплакала, и он не утешал ее. Все, что он говорил, было удивительно к месту: надо было отплакать последними детскими слезами, чтобы с сухим лицом, с твердыми глазами отправиться дальше.</p><div class="poem">
<div class="stanza">
<p class="v">Огонь небесный жарок.</p>
<p class="v">Высок, далек да зорок</p>
<p class="v">Илья, святой пророк, —</p>
</div>
</div><p class="p1">дребезжащим голосом напел Михаил Алексеевич, и Надя подпела ему:</p><div class="poem">
<div class="stanza">
<p class="v">Он встал, могуч и ярок,</p>
<p class="v">И грозных молний сорок</p>
<p class="v">Связал в один клубок.</p>
</div>
<div class="stanza">
<p class="v">По облачной дороге,</p>
<p class="v">На огненной телеге,</p>
<p class="v">С зарницей на дуге,</p>
<p class="v">Помчался он в тревоге, —</p>
<p class="v">У коней в бурном беге</p>
<p class="v">По грому на ноге.</p>
</div>
<div class="stanza">
<p class="v">Заря-заряница,</p>
<p class="v">Красная девица,</p>
<p class="v">Мать Пресвятая Богородица!</p>
</div>
<div class="stanza">
<p class="v">И вихри закружились,</p>
<p class="v">И дубы зашатались,</p>
<p class="v">И молнии зажглись,</p>
<p class="v">И громы разразились, —</p>
<p class="v">И люди испугались,</p>
<p class="v">Молиться принялись.</p>
</div>
<div class="stanza">
<p class="v">Напрасные рыданья,</p>
<p class="v">Напрасные моленья, —</p>
<p class="v">Гневлив пророк Илья:</p>
<p class="v">Не будет состраданья</p>
<p class="v">Для грешного селенья, —</p>
<p class="v">Конец его житья!</p>
</div>
<div class="stanza">
<p class="v">Заря-заряница,</p>
<p class="v">Красная девица,</p>
<p class="v">Мать Пресвятая Богородица!</p>
</div>
</div><p class="p1">И Федор Кузьмич, просивший оставить его среди родных вещей, но лежавший теперь в земле, и Михаил Алексеевич, покинутый Игорем, и Мать Пресвятая Богородица, которую не пустили ни в одну избу, — все приняли ее в свой союз, и никто больше не мог изгнать ее отсюда. Утешенная, она попрощалась и вышла, и на третий день, выписавшись из домовой книги виновато глядевшего Трышкина, отправилась жить на пустом месте.</p></span></span>
