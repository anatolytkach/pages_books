<span><span><p class="p1">— Вот, это миктум. Тогда все сходится. Пусть он ускоряет самоубийственные, скажем, замыслы врага — и враг быстрее скапутится, — и твои лучшие дела, и ты процветешь. Но штука не в том, чтобы это понять. Это я понял довольно быстро. Штука в том, чтобы доказать, во-первых, и понять все общественное устройство, во-вторых. А у них же не только на миктуме это держалось. Был тот, с кем дело ладится, и тот, с кем стопорится; был рожденный повелевать и рожденный воевать… Там не было профессий в нынешнем понимании. Нет профессии, есть «дело». Каждый умеет много разных дел, иначе в доантичности не выживешь. И вот при одном идет, при другом не идет, а при третьем идет хорошо, но заходит не туда. А есть еще такие, и это самая редкая категория, которые все делают неправильно, а выходит правильно. Эти чаще всего шли в мореплаватели. Плывет черт-те куда, а приплывает куда надо.</p><p class="p1">— Это про меня, — сказал Даня.</p><p class="p1">— Лестно вы про себя. Эти особенно ценились. Назывались «дордум». Я думаю о них особую статью сделать, но мало фактов… И что самое удивительное, такие действительно есть, до сих пор, везде. Возьмите Мельникова. Я недавно стал смотреть его таблицы — «Пергаменты» или как он называл. В общем, он был чистый безумец, и все эти разговоры про его предсказания… ну смешно. Вывел формулу про три в степени эн в степени эн плюс один, еще какая-то ерунда, чисто механическая… и все поверили, потому что для них эти эн плюс один вообще каббала. Он там подгонял события совершенно нагло, путал даты — короче, все, чтобы доказать, будто мир колеблется в ритме, знаете, струны. Но при всей этой белиберде октябрь семнадцатого года у него предсказан совершенно точно.</p><p class="p1">— Ну, — промычал Даня с сомнением. — Это могла быть случайность и что хотите.</p><p class="p1">— Могла, да. Но вот то, что он в своих пеших походах ни разу не сбивался, — это факт. А ведь ориентироваться не мог вообще. Полагал, что у дерева мох с южной стороны.</p><p class="p1">— Да не может быть. Ребенок знает, что с северной!</p><p class="p1">— А он был не ребенок и не знал. Или вот с языками. Однажды он забрел в цыганский табор, и там стал цыганке говорить комплименты, и тут вдруг приходят пятеро страшных бородачей с пистолетами. Его приняли за шпиона, полицейского агента, не знаю. И тут он — сроду не знавший цыганского языка — на безупречнейшем цыганском, как оказалось, залопотал первое, что в голову пришло: герасим, герасим… Ему этот мужик напомнил немого Герасима, он и повторял, а оказалось — это на одном из цыганских наречий, венгерских, кажется, «келасим» — дружба. Приняли за своего, обласкали, хотели цыганку на ночь дать, но убежал. Он вообще как-то избегал женщин, и тоже вам пример: умер сразу после того, как его какая-то крестьянка пригрела. Словно чувствовал.</p><p class="p1">У Мартынова было необыкновенно уютно, и чай был хорош, и хотя уже ночь сгущалась за окнами круглой башни, можно было не уходить и болтать так сколько угодно. Мартынов был на том самом переходе от молодости к зрелости, когда уже обретено новое знание, но еще не утрачен прежний язык.</p><p class="p1">— Одного я не понимаю, — сказал Даня. — Вавилон — ведь это… это как-то совсем дочеловечно, что ли. Я бы мог заниматься Возрождением, если уж история… или Просвещением, или хоть средневековьем — все что-то свое. Но там… мне кажется, там еще меньше человеческого, чем в Библии.</p><p class="p1">— Правильно, — одобрительно кивнул Мартынов. — И очень хорошо. Человеческое кончилось все.</p><p class="p1">— Ну, не знаю. Я в таком мире не готов жить…</p><p class="p1">— Кто же вас спросит, — улыбнулся Мартынов. — Уже живете. Понимаете, в чем трудность? Мы были такие человеческие люди, извините за тавтологию. И нам сейчас предстоит жить в совершенно нечеловеческом мире. Это понимают, может быть, трое-четверо в Европе. Ну, десять.</p><p class="p1">— Шпенглер! — радостно крикнул Даня. Мартынов снисходительно кивнул: только в молодости так радуешься этому парольному взаимному опознанию.</p><p class="p1">— Штайнер, — добавил он. — И Остромов.</p><p class="p1">Даня искренне обрадовался, обнаружив имя учителя в таком ряду. Ему все казалось, что прочие в кружке недооценивают Остромова, считают его фокусником, с которым весело. Между тем он несомненно что-то чувствовал, и пророчества его сбывались.</p><p class="p1">— Остромов, — продолжал Мартынов, расхаживая по комнатке, — давеча рассказывал про эти эоны. Там много глупостей и чего хотите, но в каком-то смысле он сам дордум. Дордумался. Были дети Бога или, во всяком случае, существа очень близко от Бога. Они что-то сделали не так, подозреваю, что слишком близко подошли — я по-человечески могу это понять; он их решил несколько отбросить. Отнял некоторые способности, дал другие, отвлек, может быть, от главного, заставив сосредоточиться на ложных вещах… Я не думаю, что прямо вот потоп. Хотя не исключено: прежде чем докопались до шумеров, вынули три метра ила и глины. И я даже подозреваю, что он отнял и что дал. Отнял цельное мировидение, а взамен — такая чудесная ловушка — противопоставил вещи, которые друг без друга не существуют. Как если бы вас все время заставили выбирать между правой и левой рукой. Или нет, радикальней, — между душой и телом, но они вам нужны одинаково! И вот вы мечетесь — свобода или порядок? Но какая же свобода без порядка! Или: культура или власть? Но какая же культура без власти, без, так сказать, иерархии? Знание или Бог, как при Просвещении; но как вы отделите Бога от знания? Мне кажется, что этот эон — назовем так — тоже кончается. Было четыре тысячи лет человеческой истории, начиная с античности, кончая нами. Ну и кончилось. Но дальше пойдет совсем не полубог, как думалось. Дальше пойдет еще глубже, в инсекты. В какие-то новые, но худшие сущности. Они, может быть, живучее, может, приспособленнее… Откуда мы знаем? Может быть, с землей вообще что-то такое сейчас сотворится, что только они смогут жить. Кислорода не станет, или реки пересохнут… Это же бывало много раз, вот он и готовит заранее. Но я не знаю пока, что это будут за люди. Я только вижу, что нам, например, уже очень трудно. Мы родились при одном эоне, а жить нам при другом. Есть масса каких-то способностей, с которыми сейчас просто нечего делать. Это знаете как? Это как если бы птица ходила пешком в мире, где нет уже возможности летать. Я не знаю, может быть, так даже лучше. Может, ползучие существа телесно сложней, может, они высшая ступень эволюции и все было ради них, а крылья — так, промежуточное… А может, что-то в воздухе сменилось, в самом его составе и плотности, что вот нельзя больше летать. Нельзя и все. Но они же не могут вымереть сразу. И Рим не сразу вымер.</p><p class="p1">— Знаете, — робко сказал Даня, — это и похоже, и как-то не так. Я не помню вообще в природе, чтобы что-нибудь упрощалось. Усложнения — да, сколько угодно, а чтобы назад…</p><p class="p1">— Но мы же не знаем! — почти умоляюще, словно уговаривая себя, воскликнул Мартынов. — Мы же не можем знать! Может быть, это усложнение, только не по той ветке, которая нам казалась главной. Может быть, эти новые гораздо лучше нас приспособлены к земле, или вообще они будут жить гораздо тише… Посмотрите, какими адскими катаклизмами был полон этот человеческий эон: сколько войн, сейчас вот первая мировая, которая, сколько могу судить, еще и недоиграна, и будут еще отголоски, уже последние… Была культура, были драмы из-за культуры, были убийства миллионов из-за веры — к чему? Мы только гадать можем о масштабах того катаклизма, который случился с шумерами и потом с Вавилоном. Александр остановился, потрясенный размером руин, — каков же был зиккурат, если его на два месяца задержали руины! Вы заметили? — большое случается с большими. А малое — с малыми, и, может, это к лучшему, что теперь народились другие, у которых вообще, в самом зародыше вынута тяга к культуре. Им это просто не вложено. И они будут совершеннее, дорастут до лучшего, потому что не будут самоуничтожаться по пустякам, — я не знаю. Всегда ведь надо чем-то жертвовать. Чтобы создать такой мир, который бы не устраивал себе оргию самоистребления раз в сто лет, — надо, наверное, действительно как-то ампутировать тягу к культуре или я не знаю уж, как это называется. Сделать таких, которым не хотелось бы смотреть на небеса. И вот они сделались — в каждом полушарии своим путем, как дордумы, разными дорогами к одному итогу… Вопрос — что делать нам, с которыми это еще не случилось? Можно, конечно, самим себе как-то отрубить эту тягу, но в общем, я еще не придумал.</p><p class="p1">— Подождите, — не выдержал Даня, — можно же иначе. Я думаю… что, если это как раз и нужно тем, которые — вот как мы — назовем их условно переходными? Может быть, это из нас должно что-то такое получиться, как из последнего монаха в чумном монастыре? Я не знаю, как вы, но я это всегда себе так представляю. Что писать надо так, как будто ты последний монах, весь монастырь вымер от чумы, и только по твоим словам будут теперь судить о том, что здесь было. Это такое письмо в никуда. Потом все равно раскопают и поймут. Но единственные слова можно найти только тогда, когда никого больше не осталось.</p><p class="p1">— Это слишком дорого за слова, — усмехнулся Мартынов. — Вы, Даня, настоящий литератор: все пусть помрут, а я напишу как надо.</p><p class="p1">— Но это только так всегда бывало, — смущенно сказал Даня. — Чтобы, например, все Болдино в карантине, а ты там пишешь один…</p><p class="p1">— Ну, как знаете. Каждый ведь себе изобретает тот мир, в котором ему легче. Что такое все эти картины мира? Это просто системы такие, при которых удобно было жить Марксу, Смиту или Пепеляеву какому-нибудь, который сидит у себя на чердаке и в самодельный телескоп на звезды смотрит… Есть ковер, в нем нитки, каждый тянет за ту, которая ему больше нравится. А на самом деле пестрота, и ноль смысла. Мне, может, приятно думать, что сейчас катастрофа, потому что я всю жизнь изучаю катастрофы и то, что остается. А вам приятней полагать, будто все это ради вас и ваших единственных слов. Я только вижу пока, что тот мир, который был, — кончился, что он уперся в стену, и что стена эта одинакова хоть у нас, хоть у французов, хоть у мексиканцев. Народовластие — тупик, власть монарха — тупик еще больший, и значит, надо вывести таких, которые могут вовсе без власти, или которым чужда сама мысль об иерархии… Так, будут ползать, каждый за себя… Я не знаю еще, там туманно. Но что все эти Рафаэли и даже Достоевские больше уже ничего не говорят — это, Данечка, точно. Даже моя душа — а я ведь не самый глухой — им совсем уже не отзывается.</p><p class="p1">— Нет, моя отзывается, — поспешно возразил Даня, чувствуя, однако, что в словах Мартынова есть правда: он читает, рассматривает и слушает все это — то, что в его детстве называлось великим и казалось вечным, — с той же скрываемой от самого себя тоской, с какой дачники зимой смотрят на летнюю веранду: было время — тут веселились, читали стихи, объяснялись в любви; а теперь снег и пусто, и неизвестно, будет ли еще что-нибудь.</p><p class="p1">— Отзывается, — кивнул Мартынов. — Как ребенок на старые игрушки. Или как Надя Жуковская на старцев.</p><p class="p1">— Кстати про Надю, — заинтересовался Даня, — что за существо? Я о ней слышу с разных сторон, и как-то меня, знаете, все это смущает. Я ужасно не люблю, когда человек делает добро, и все про это знают…</p><p class="p1">— Да какое же добро. Ходит к старцам и только. Чтобы Надя что-то делала нарочно, просто чтобы о ней хорошо говорили, — это вы забудьте, все чушь. Когда видишь Надю, о ней немедленно думаешь хорошо.</p><p class="p1">— Ну, не знаю, — смущенно сказал Даня. О нем почему-то редко думали хорошо: либо принимали за простака, либо, напротив, думали, что он себе на уме, потому что таких простаков не бывает. Так, во всяком случае, расшифровывал он взгляды окружающих, не догадываясь о том, что отчуждение и даже легкая неприязнь, которые он применительно к себе замечал так часто, диктовались совсем иными соображениями. В нынешних временах Даня был так явно не жилец или уж по крайней мере хронический неудачник, что у всякого его собеседника, кроме вовсе уж тупорылых, в первые минуты рождалось чувство вины, беспричинное и оттого вдвойне противное. Не то чтоб от него бежали, как от зачумленного, — он не мог ничем заразить, — скорей уж отворачивались, как от соседа, у которого дом сгорел, а он и не знает. Сказать? — но кому же понравится такое говорить; может, сам поймет.</p><p class="p1">— Я благодетелей сам не очень, — продолжал Мартынов. — Но Надя… Надя существо удивительное. Очень жаль, что я не могу в нее влюбиться.</p><p class="p1">— Кто же мешает?</p><p class="p1">— Природа мешает, Даня. Я так устроен, что влюбляюсь в больное, надломленное: мертвые цивилизации, дамы с драмой. Самому тошно, а куда денешься.</p><p class="p1">— Надо мне как-нибудь посмотреть на эту удивительную Надю, — сказал Даня, понимая, что ему пора. Мартынов явно дошел в разговоре до того предела откровенности, которого пересекать не хотел — не из скрытности, а из деликатности. Мы не вправе никого обременять знанием о себе — слишком откровенный рассказ есть уже бессознательная просьба о помощи, а этого он не любил.</p><p class="p1">— Ну, смотреть на Надю в любом случае надо. От этого душа веселится и кровь играет.</p><p class="p1">— Как-то мы все с ней не совпадаем.</p><p class="p1">— Значит, не пора, — уверенно сказал Мартынов. — В Вавилоне знаете как говорили? «Проси вовремя».</p><p class="subtitle">6</p><p class="p1">В этот вечер Дане впервые — только на мгновение — удалось невероятное: он выполнил упражнение на невидимость, или, говоря строже, на несуществование. Это было то самое, чему учил Остромов, хотя совсем не так, как он объяснял. Впрочем, Даня не первый раз замечал, что всякое обучение — даже гвоздь забить — действует только до определенного предела: дальше нужно делать шаг самому.</p><p class="p1">Он ехал в трамвае по набережной Карповки. На повороте с улицы Рентгена в трамвай вошел пьяный пролетарий того невыносимого типа, которого Даня опасался особенно: он был в стадии крайнего озлобления и нуждался в том, чтобы немедленно его на ком-то сорвать. Это не было легкое и веселое пьянство — нет, он и запил уже со злости, и, думая разбавить, разжег. А чё. Ммею пррво. Пр-р-рво. Каждый всю жизнь сомневался в его праве делать что-либо. Скоро и он стал смотреть на всех таким же взглядом. Чтобы понять его, услышать несколько слов из его прошлого, довольно было единственного усилия: оказалось, что для этого — но как расскажешь; все равно что впервые напрячь орган, о наличии которого не подозревал. Это было где-то в глубине мозга, в лобной доле, за глазами. Даня не знал и не чувствовал его прошлого, но видел, что в прошлом этом много было страха, и еще больше желания, чтобы боялись другие. Это было, в сущности, одно чувство, хоть выдает себя за два. Даня видел, что пролетарию желательно сорвать зло, но видел и то, как ему не подвернуться. Пролетарий имел дар подмечать малейшую отдельность, несходственность — и обрушиваться на нее; Даня был для него, конечно, идеальная мишень — да не только сорваться самому, а еще привлечь всех, ату, граждане. И то ли эта опасность была действительно страшна, а в пустом бассейне плавать не научишься, — то ли, мелькнуло в голове, Мартынов действительно всему умел придавать импульс, но Даня забыл, как это по-вавилонски называется. Как бы то ни было, он начал действовать, строго по указаниям, в два этапа.</p><p class="p1">Этапом первым он резко затормозил время, то есть, говоря строже, ускорил свое восприятие его; время так и забурлило, и в этой волне Даня, как пловец, оставался спокоен, умеренно подвижен, гибок. Трамвай взвихрился и размазался вокруг. Остались двое — Даня и пролетарий, пролетарий был разогнан спиртом и злобой, Даня — особым напряжением лобной доли. Пролетарий чувствовал — сам он рисовался теперь Дане в виде красно-синего пятна, — что цель здесь, рядом, что достаточно на ней сосредоточиться, вглядеться — и можно нападать; но Даня мельтешил перед ним, как Варга перед драконом, прыгал, уходил вправо, бросал отвлекающие блики и в результате ускользал. Со стороны оба были совершенно неподвижны, пролетарий таращил остекленелые глаза, Даня смотрел в пол, трамвай дребезжал, но граждане пассажиры чуяли легкий страх, странную вечернюю нервность, и старались не смотреть в их сторону. Был июльский ленинградский вечер, серый, из тех дней, когда зелень на серо-лиловом фоне неба, полного непролившимся дождем, бывает особенно ядовита. Именно в такие преддождевые дни Дане потом особенно удавался этот легкий, в сущности, трюк, это ускользание, прохождение невидимкой возле стража, внезапное исчезновение с внешнего плана. Пролетарий таращился туда, где должен быть враг, — он чуял, следил, водил крысиным рыльцем; но враг был быстрей и наслаждался вновь обретенной способностью — в огромных, чудесно растянувшихся промежутках между секундами он скакал, резвился, дразнил и поймал наконец ритм необходимого несовпадения. Пролетарий не успевал взглянуть, как Даня уже прыгал — больше всего, пожалуй, это было похоже на вращение двух зацепившихся шестерен, которые при этом же и карусели; и всякий раз, как шестерня щелкала, приближая Даню к обидчику, он перепрыгивал в следующую чашку. ВРАЩАЮЩИЕСЯ ЧАШКИ. Да, ведь это было в Ялте, на набережной, в парке аттракционов, разбитом там по случаю романовского трехсотлетия. Пролетарий изменил тогда свою тактику. Он напал сверху, но Даня рраз — и нырнул в очередную секунду, как в воду с пирса, и секунда сомкнулась над ним, и ничего не стало видно. Это была победа окончательная. Пролетарий понял, что эта добыча не по зубам. Он отвернулся, зевнул и спросил старика на соседней лавке:</p><p class="p1">— Дедушка, а не скажешь, который это номер?</p><p class="p1">— Номер это шестнадцатый, — проворчал дедушка. — Лазают куда не смотрют.</p><p class="p1">— Ммею пррво, — сказал пролетарий. — Гуляй, душа, суббота.</p><p class="p1">Он скользнул глазами по пустому месту, где в действительности неподвижно сидел Даня, и широко зевнул в окно. Вскоре он спал, утомясь погоней и расклячив в дремоте корытообразный, в чирьях, рот.</p><p class="p1">Даня пришел в себя только за одну остановку до дома. Он попробовал напрячь таинственную силу за глазами — нет, ничего; огляделся — напротив ласково щурился старичок, никаких следов пьяного парня не было. Сон? Но сон был невозможно, невообразимо отчетлив, память о собственном стремительном мелькании перед следящим рыльцем-жальцем наполняла все тело, и каждая жилка ныла от недавнего напряжения. Если он и забылся, то на полминуты, и в это самое время успел соскочить противник. Слишком горько было бы думать, что единственный успех достигнут во сне; и сладко болела голова — как после решенной трудной задачи.</p><p class="p1">Дома, перед сном, он снова попробовал ускориться — нет, ничего, только дрожь в мышцах; но что-то в глубине мозга отозвалось — значит, было, — и снова закружились перед глазами вертящиеся чашки.</p><p class="subtitle">7</p><p class="p1">Да, — так вот, значит, явление. Был вечер пятницы, все разошлись, Остромов ждал Ирину после спектакля, развлекаясь пасьянсом. Читать он давно не читал — все, что надо, уже знал, а что не надо, только раздражало словесной избыточностью. Для чего люди плетут завитушки вокруг главного? Когда-нибудь, в Париже или ином месте, на покое, он напишет свою «Духовную науку», сто способов счастья, и это будет полезно. Над прочими книгами он засыпал. Книги теперь пишут, как заводят визитные карточки, говорил Георгий Иваныч. На каждой книге написано: «Такой-то». И только. Неужели самонадеянные мерзавцы думают, что добавят нечто к мудрости веков?!</p><p class="p1">Пасьянс сошелся. Оно и естественно — в мужской своей состоятельности Остромов не сомневался, а на крайний случай есть омела. Разложил краткое гадание: вышло вожделение, домогательство. Кто-то к нему вожделел. Ирина, кто же еще. Из вожделения выходил союз недолгий и несчастный. Он и не собирался жить с ней долго и счастливо. Оставалось сбросить пары и посмотреть остаток, но тут в дверь позвонили.</p><p class="p1">На пороге стоял мужчина в тиковом костюме.</p><p class="p1">— Чем могу служить? — спросил Остромов. Вот тебе и вожделение, подумал он иронически, ничуть не обеспокоившись.</p><p class="p1">— Из Москвы, — веско проговорил Варченко и развернул перед его носом удостоверение старшего консультанта.</p><p class="p1">— Прошу, — гостеприимно сказал Остромов. Ирину ради такого случая можно было отложить. Фамилия Варченки была ему знакома, но смутно. Отчего-то страха не было. Интуиция подсказывала, что явился друг, союзник или проситель.</p><p class="p1">— У нас ведь есть общие знакомые, — сказал Варченко, присаживаясь. Обстановка была стертая, семисвечник, меч и портрет Вальтасара уже упрятаны в шкаф, Остромов снял жаркую мантию, оставшись в белой рубашке и парусиновых брюках, ни дать ни взять средней руки инженер на курорте.</p><p class="p1">— О, у меня почти со всеми есть общие знакомые, — сказал он. — Но фамилия ваша мне известна, конечно. Я даже, помнится, читал…</p><p class="p1">— Это все молодость, — махнул рукой Варченко. — А общий знакомый у нас с вами, например, товарищ Огранов, вы его наверняка помните.</p><p class="p1">— Кто же не помнит товарища Огранова, — осклабился Остромов. — Я совсем недавно посещал его…</p><p class="p1">— Я у него был неделю назад, — сказал гость. — Отзывался он о вас наилучшим образом.</p><p class="p1">Остромов скромно кивнул с выражением «Стараемся». Подумайте, он был у него неделю назад. Неужели оккультная иерархия будет строиться в зависимости от того, кто когда побывал у товарища Огранова? Кто это говорил из русских императоров — он читал в «Старине»: «Дворянин в России тот, с кем я говорю, и до тех пор, пока говорю…».</p><p class="p1">— Я не с инспекцией, — поспешил успокоить Варченко. — Всегда полезно знать, как идет работа.</p><p class="p1">— Мы ничего не прячем, — гостеприимно отвечал Остромов. — Все открыто.</p><p class="p1">— Я хотел бы присутствовать на нескольких собраниях.</p><p class="p1">— Я удивляюсь! — воскликнул Остромов. — Я удивляюсь, почему вы спрашиваете разрешения. Мы совершенно легальны, руководство в Ленинграде — вы знаете, о ком я — совершенно в курсе дела и одобрило план занятий…</p><p class="p1">— Дело не в том, — со значением произнес гость. — Я, собственно, сейчас ненадолго. Я зашел представиться.</p><p class="p1">— И хорошо сделали. Чаю, может быть? Есть и покрепче…</p><p class="p1">— Благодарю, ничего не нужно. Я был, собственно, у Григория Ахилловича, — сказал Варченко, вглядываясь в Остромова с особенной пристальностью, но не заметил решительно ничего, кроме любезного внимания.</p><p class="p1">— Везде-то вы были, — сказал Остромов, улыбаясь. — И у Якова Савельевича, и у Григория Ахилловича.</p><p class="p1">Это был укол, но дружеский, без яда.</p><p class="p1">— Григорий Ахиллович отходит от дел, — произнес Варченко и опять замолчал, словно ожидая вопроса.</p><p class="p1">— Так я весь внимание, — после паузы подбодрил его Остромов.</p><p class="p1">— Это означает, — продолжал гость, словно досадуя, что вынужден разъяснять очевидное, — это означает, что русский оккультизм сейчас обезглавлен.</p><p class="p1">— Отчего же вы думаете, — спросил Остромов невинно, — что русскому оккультизму необходим единый глава?</p><p class="p1">— Гм, — кашлянул Варченко и побагровел. — Я думал, что это очевидно.</p><p class="p1">— Не совсем, не совсем. Или вы думаете, что нам нужен, так сказать, Главоккульт?</p><p class="p1">Это было сказано, н-да!</p><p class="p1">— Нам — не нужен Главоккульт, — сказал Варченко, не улыбнувшись. — Но чтобы Главоккульта не сделали другие, согласитесь, мы должны быть едины.</p><p class="p1">— Как же это возможно? — любезней прежнего спросил Остромов. Отчего-то ему хотелось на фоне багрового гостя, каждое слово выталкивавшего со значением, с натугой, — выглядеть особенно легким, выступать в амплуа «И». Эта буква ассоциировалась у него именно с таким поведением: ирония, искристость, исподволь. — При таком количестве школ… вам, конечно, известных…</p><p class="p1">— Людей вообще множество, — брюзгливо заметил Варченко, словно хотел сократить их количество. — Однако они соблюдают некий порядок и действуют сообразно иерархии. Оккультные силы должны быть подчинены дисциплине вне зависимости от того, кто и как практикует… и каким антуражем пользуется. Мы, на истинных высотах, должны понимать, что люди нашего круга едины. Либо люди видят тонкий мир и работают для него, либо он им чужд, и тогда procul este, profani<a href="ch2.xhtml#id26" class="a">[21]</a>. Церковь тоже, положим, отделена — но церковь живет иерархией, и если мы хотим действовать и нечто значить… если мы имеем в виду в конце концов дать людям веру, когда, уж позвольте откровенность, они окончательно выкинут марксизм… мы должны быть организацией, а не сбродом. Место в этой иерархии можно обсуждать, тут, я думаю, мы не разойдемся… но согласитесь, что без структуры работа немыслима. Созданием этой структуры — общероссийской, как вы понимаете, — я сейчас и занимаюсь, и в этих рамках нахожусь в Ленинграде.</p><p class="p1">В рамках, нахожусь… Он сказал бы еще «являюсь». Отчего все люди из главков говорили здесь так одинаково?</p><p class="p1">— Что же, это с нашими целями никак не расходится, — пожал плечами Остромов. — Позволительно ли узнать: рассчитываете ли вы связаться с заграницей? Там ведь тоже серьезные силы, брожения, и мы могли бы…</p><p class="p1">— Непременно, — холодно сказал Варченко. — С Германией в особенности.</p><p class="p1">С Германией так с Германией, подумал Остромов. Нас выпусти за Вержболово, а там справимся.</p><p class="p1">Варченко, однако, продолжал молчать и надуваться, словно ждал особой реакции на Германию.</p><p class="p1">— Родина мирового духа, — почтительно сказал Остромов. Неожиданно глаза Варченки потеплели.</p><p class="p1">— И сейчас снова, — сказал он уже гораздо мягче.</p><p class="p1">— Конечно, конечно.</p><p class="p1">В этот момент раздался звонок, и Остромов, разведя руками в знак извинения, отправился в прихожую. Жаль было бы прогнать Ирину: тиковый толстяк был явно из бюрократов, подгребавших все под себя, и пусть бы подгребал, нам-то что, — он мог быть полезен, хоть и крайне туп с виду, однако ночи с Ириной не стоил никак.</p><p class="p1">Ирина была свежа, как всегда после спектакля, словно подпитываясь любовью зала, — она вообще не знала усталости и после самой акробатической ночи любви бывала свежа, как Эос, тогда как даже простое подметание пола состаривало ее на двадцать лет. От нее несколько пахло вином.</p><p class="p1">— Ммой ссфинкс, — сказала она Остромову. — Ммой пфе… ммой ффеникс.</p><p class="p1">Остромов поклонился Варченке:</p><p class="p1">— Это Ирина, одна из самых талантливых медиумичек, — он шутя нагнул ее голову, кланяйся, дура.</p><p class="p1">— Да уж вижу, — кряхтя, поднялся Варченко, словно желая сказать: вижу, каким медиумизмом вы тут занимаетесь.</p><p class="p1">— Я надеюсь, во вторник вы почтите нас посещением, — пригласил Остромов.</p><p class="p1">— Непременно, — пробурчал Варченко, влезая в туфли. Он был крайне недоволен: только собрались поговорить, и, кажется, о серьезном… Способности Остромова он толком не проверил, вот разве что сейчас… И, уже взявшись за ручку двери, он по извечной русской привычке задерживаться в прихожей обернулся; глазки его буравами впились в Остромова. Он молчал и дулся, изо всех сил транслируя мысль.</p><p class="p1">— Я удивляюсь, — произнес Остромов. — Я удивляюсь, как можно еще в этом сомневаться.</p><p class="p1">Он знал это выражение у дилетантов — передавать мысль тужась, словно в запоре; и мысли у них всегда были простые, предполагавшие «да-нет». Лучше было подтверждать. Опыт вновь не подвел его — Варченко в упор, раздельно спрашивал: «Уж не шарлатан ли ты, братец?».</p><p class="p1">Он спускался по лестнице, крайне недовольный. Прочел и эдак ответил, вот как хочешь, так и понимай.</p><p class="p1">— Ммой демон, — мурлыкала Ирина. — Ммой ввладыка.</p><p class="p1">Она легко опустилась на колени, и началось то, чему Остромов никогда не мог противостоять.</p></span></span>
