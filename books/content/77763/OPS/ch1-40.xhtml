<p class="p">Глава семнадцатая</p>
</div><p class="subtitle">1</p><p class="p1">Этот главный враг Райского был не Остромов, как подумал бы наивный читатель. О том, чтобы лично допросить Остромова, Райский не мог и помыслить. Он боялся его панически, до стыдных судорог. Если даже Остромов был простым шарлатаном и морочил его три месяца, это было уже непростительно, потому что теперь он знал о Райском слишком много. Райский категорически запретил допрашивать Остромова о подробностях работы кружка — «только о прошлом. Настоящее нам известно». Мысль о том, чтобы вызвать его на допрос, внушала Райскому тошноту и ужас. Можно было, конечно, наврать ему: я притворялся, ловил… Но он помнил свои трансы, своего Даву, свои двадцать предыдущих жизней вплоть до Клеопатры, — и лицо его горело, а рот пересыхал.</p><p class="p1">Он ненавидел их всех, банду спиритов, контрреволюционное отребье, вздумавшее проникнуть в ЧК. Но он не мог после своих сеансов регрессии допрашивать Остромова. Страшно было подумать, что Остромов имеет над ним власть, что снова погрузит его в транс и начнет играть его сознанием; должно быть, Райский с его тончайшей интуицией был особо восприимчив. Он сумел выбрать лестное объяснение, но не сумел преодолеть ужас. Остромовым занималась шелупонь. Сам же Райский вымещал злобу на той, которая казалась ему душой кружка: на самой радостной и здоровой. У него было чутье на такие вещи — вечное чутье больных на здоровых. Чтобы победить Остромова — и победить прежде всего в себе, — надо было сломать Надю Жуковскую; и Надей Жуковской он занимался лично.</p><p class="p1">Добро бы она была красавицей — иногда недоступная красота заставляет вечно ее преследовать, не в эротическом, а в судебном порядке. Но Райского занимало в ней нечто иное: она была здорова, и он это чувствовал. Она здорова, а он болен. Ей для существования не требовалось доказательств своих прав, а он всю жизнь должен был это право доказывать. От нее исходил ровный, доверчивый покой, она могла себе позволить эту доверчивость, потому что не видела еще от жизни ничего страшного. Надо было выбить у нее из-под ног эту веру в то, что все обойдется. Человек не имел права быть гармоничным в мире столь сложном и чудовищном; такая гармония была оскорблением для мира. Нельзя так несерьезно, без уважения, относиться к этому великому царству злодейств, борьбы, кровавых каких-то взаимодействий… Все-таки Остромов что-то знал. Например, что Райский был маршалом Даву. Никто не имеет права жить так, будто мир стоит по колено не в крови, а в теплом молоке. Мир слишком великое место, чтобы здесь можно было прожить двадцать лет Надей Жуковской. Так он накручивал себя. И в этом был резон, и насчет мира, и насчет молока, — беда, однако, в том, что резон тут дело двадцать пятое; что Сальери может сорок раз повторить, будто убивает Моцарта из желания спасти музыку, а на самом деле он просто не Моцарт, и в этом вся боль. Райский отлично понимал, что он болен, а Надя Жуковская здорова; и великий мир с великой кровью был ни при чем, потому что этому самому миру не было до Райского никакого дела, а Надя Жуковская была в нем своя, родная. И надо было выбить ее оттуда, как зуб.</p><p class="subtitle">2</p><p class="p1">Этого нельзя было добиться ни запретом на передачи, ни лишением свиданий, которые вообще-то полагались — и предоставлялись всем, включая Остромова; ни отменой бани, который он для нее ввел в индивидуальном порядке, поскольку такие девушки опрятны и чистоплотны, а собственная неопрятность для нее хуже любого голода. Все это были вещи внешние. Надя Жуковская должна была осознать недостаточность всех своих защит и ущербность опор. Должен был рухнуть ее мир, прежде столь надежный. От нее должен был отречься ее Бог, прежде столь добрый: не она от него, а он от нее.</p><p class="p1">Никакими внешними вещами это не делалось. Надя Жуковская должна была раздавить себя сама, сделав нечто, чего не сможет потом себе простить; и никто другой не вправе был отпустить ей этот будущий грех. Ее надо было заставить сдать все и всех — разумеется, не ради интересов дела, относительно которого из Москвы очень быстро дали понять, что наказать, конечно, следует, но без чрезмерного рвения. Товарищ Двубокий позвонил Райскому трижды, контролируя ход дела, и просил «не очень-то»: конечно, наши товарищи допустили ошибку, поверив шарлатану, но мы не хотим слишком компрометировать наших товарищей. Случай очевиден, надо извлечь урок, но не более. Двубокий вовсе не хотел валить Огранова явно — нужен толчок, и хватит. На самом верху одобряли конкуренцию, но терпеть не могли внутренних склок, а тем более выноса их на люди. Да и того, что наговорил Остромов и его обширная клиентура, хватало с горкой. У Райского появился личный интерес — не будет преувеличением сказать, что Надей Жуковской он жил с ноября по март; и команду закрывать дело, отправляя дела в Особое совещание, он дал не ранее, чем исполнил задуманное.</p><p class="p1">С первого допроса, на котором она глупо улыбалась и так честно ничего не понимала, что это выглядело грубым притворством, — он начал осознавать свое предназначение: поистине, нельзя, чтобы в мире существовали такие инфузории. Ее следовало провести по всем кругам, объяснив ей, что такое мир. Подобная невинность не просто непозволительна — грешно, порочно в мире, в котором столько страдают, настолько не знать, не понимать! Он поместил ее в камеру к уголовницам, воровкам, грязнейшим порождениям ленинградского дна. Он запретил ей переписку с матерью, о местоположении Нади сообщил родительнице только через неделю и наслаждался зрелищем робкой истерики. Ничего, ничего. Вызвал мать не столько для допроса, сколько для наблюдения: интересно было, откуда взялась такая Жуковская. Убедился, что не в мать: мать была тяжела, слезлива, нервна. Впрочем, откуда знать: может, тоже в свое время подломили. Все разговоры Нади о том, что у матери может случиться приступ, решительно пресек: вам нужно было раньше думать о матери, Жуковская. Вы не понимаете еще, во что вляпались, но я объясню. Ваше дело гораздо хуже, чем вам представляется. Вы бегали в кружок, очевидной целью которого было свержение строя. Всегда начинается с разговоров про веру, а кончается известно чем. Мне вы можете не лгать: я такие клубки распутывал, что эта ваша самодельная конспирация мне плюнуть и растереть. И она, кажется, не понимала. Она смела не понимать, насколько он ужасен, не допускать этой мысли; но это просто потому, что ей еще не встречались люди из настоящего мира, горячего и жестокого мира. Да, думал он, горячего и жестокого, с восклицательным знаком.</p><p class="p1">И дальше он предоставил действовать времени. Для твердой души с определенными понятиями нет ничего страшней неопределенности; и в эту неопределенность он погрузил ее с головой. Никаких газет, никакой информации, единственная записка от матери (правила есть правила, не обойдешь, он обязан был разрешить одно письмо в месяц; ответа не передал — имел право в интересах следствия). Никакой ясности с тем, в чем обвиняют. На все вопросы универсальный ответ «Спрашиваю я». Все в соответствии с лекцией психолога товарища Шнейдера о принципах давления на сознание подозреваемого. Трудность, однако, была в том, что сознаваться Жуковской приходилось в том, чего не было, — но, как подчеркнул товарищ Шнейдер, признание начинается с чувства вины. Сначала внушить, что виноват, — а в чем, потом сам выдумает. Как говорим между собой мы, психологи, — здоровых, товарищи, нет, есть, товарищи, недообследованные. Запомнил, записал.</p><p class="p1">Он вызывал ее редко. Сначала раз в неделю, потом раз в две недели. Но не забывал о ней ни на день, ни на час — следил, какова атмосфера в камере; заботился, чтобы туда проникал только специальный контингент, чтобы ни луча, ни одного так называемого интеллигентного лица. Впрочем, среди контингента тоже случались интеллигентные лица — но такие, что лучше бы вовсе никаких: это были лица опустившихся, спившихся, изломанных и сломанных, предавших себя, утративших надежду. Райский давно заметил, что чем выше изначальный уровень, тем катастрофичнее падение: какой-нибудь блатмейстер, сдав своих, этого даже не чувствовал. Какой-нибудь шулер после ресторанных кутежей привыкал к баланде с той же легкостью, как будто жрал ее с рожденья, а о фрикасе и консоме не слыхивал. Но интеллигент, а тем более дворянин в тюрьме немедленно зарастал грязью и паршой, а уж сломившись, терял всякую опору. Первый удар оземь превращал их в бескостную кашу: те, которые не ломались, встречались крайне редко, и уж таких действительно оставалось только убивать. Однако был уже не девятнадцатый год, когда Райскому случалось расходовать в день до двадцати заложников, а у других бывало и больше; Райский многое успел даже подзабыть, он был теперь культурный чекист с запросами. Никуда не делась только ненависть к тем, кто имел право на существование и не сомневался в нем; отнять это право Райский почитал священным долгом.</p><p class="p1">Он думал уже — не влюблен ли он в нее? Смешно, нет, конечно. Он просто не мог мириться с ее существованием — да, в сущности, любая любовь и есть это самое, нечего выдумывать. Райский это знал по себе. Мы встречаем нечто безоговорочно прекрасное, а поскольку в силу блестящего интеллекта мы очень знаем, каковы мы есть, то и пытаемся убить это прекрасное единственно доступным способом: сделать его своим. Ведь этого никакому врагу не пожелаешь. Сотрудник отдела по борьбе с бандитизмом Жамкин женился давеча на дочери бывшей графини Потоцкой, и это считалось хорошо — дома у сотрудника розыска должно быть культурно; но ясно же было, что никакая расправа с графиней Потоцкой не могла сравниться с превращением ее в Жамкину. Так что, если хотите, отношения Райского с Жуковской были выше и чище любви. В них не было и тени корысти. Но просто Райский не мог спать спокойно, пока Жуковская не стала одной из всех, ибо ее присутствие на свете посягало на основы его бытия. В ее присутствии он был непонятно кто. Он мог жить дальше лишь при условии, что она возненавидит себя и уверится в невозможности быть человеком.</p><p class="p1">В декабре она держалась, в январе поддавалась, но была еще крепка. Он понимал, что никакой шантаж не сработает, что угроза ареста матери не годится, потому что с этой перспективой она считалась с самого начала, а любовника у нее, насколько он мог заметить, не было. Вообще шантажировать было особенно нечем. И лишь к февралю Райский выдумал мизансцену, которая была достойна «Королевы Марго», да оттуда, собственно, и почерпнута. Он представил себе это и подпрыгнул на кровати: ай да я! Марго проснулась, испугалась: что, зая? А, да спи ты, грубо ответил он. Ай да я!</p><p class="subtitle">3</p><p class="p1">Страшнее всех была Махоточка. Наде казалось, что Махоточка знает про нее все. Стоило Наде подумать о себе худшее, как Махоточка выговаривала это вслух; а не думать Надя не могла.</p><p class="p1">Первую неделю она не понимала, что происходит. После ареста всегда наступает период «недоразумения» (разъяснится — выпустят). Самое страшное сознание — что недоразумений не бывает, что даже арестованный по ошибке попал сюда не просто так. Она столкнулась с иллюстрацией: уже в ноябре, когда она кое-что понимала, к ним в камеру впихнули Баталову, гордую, презрительную, всем видом говорившую: вас по делу, а меня так. И что же оказалось? Оказалось, что надо было Бодалову, спекулянтку, а Баталова была ни при чем; но выяснилось гораздо худшее. Баталова-то была шпионкой. Она описывала в дневнике, как строится новая верфь; для кого описывала? — естественно, для врагов. Надо успевать садиться за спекуляцию или иной нестрашный грех, потому что если у тебя вовсе нет грехов — расплачиваться придется за небывший, страшнейший, за тот, который они выдумают. Знала бы — воровала бы. Ведь они выдумают страшней, чем ты. Поэтому Баталовой, если бы она была умная, следовало согласиться, что она Бодалова, спекулянтка, и получила бы она свои два, а то и просто ссылку, но она радостно закричала: Баталова, Баталова! — и села за дневник, потому что не выпускать же.</p><p class="p1">Через неделю Надя уже знала, что просто так не выпустят, и надеялась выдумать себе вину полегче, потому что Райский не говорил ничего. По нему нельзя было понять, чем именно он так оскорблен, — а вел он себя именно как тяжело оскорбленный человек. Если верить ему, она не смела дышать одним воздухом с ним, и разрешение сидеть в его присутствии уже было фантастическим одолжением. Казалось, что вина Нади продолжает расти с каждым днем: она сидит в Крестах, в пятнадцатой камере первого корпуса, а вина растет. Иногда во сне, в полубреду, в зловонном холоде она придумывала вовсе уж страшное: что все это время Даня пытается выцарапать ее отсюда, но все его усилия пресекают, разоблачают, и отыгрываются на ней. Даня не мог сидеть сложа руки, наверняка он что-то делал, наверняка знал от матери, где она и что с ней, и теперь готовит побег или ищет связи, не знаю; но тогда она понимала, что хватит мечтать, что он скорее всего взят и, может быть, уже убит. Он был слишком хорош, чтобы терпеть то, что терпит она. Она терпит измывательства Махоточки, и разговоры о своем барстве, праздности и тунеядстве — в этом особо усердствовала Алексеева, — и гнусные расспросы Паршевой о том, как енто делается у образованных, и плевки буйной Носовой, и то, что ее передачу жрет Ахрамова. Даня ничего этого терпеть бы не стал, и его уже убили, наверное.</p><p class="p1">Не сказать, чтобы она вовсе не пыталась сопротивляться. Поначалу еще были припадки — именно припадки — гнева и даже иронии. Сначала была злость, и глупы были те, кто считал Надю Жуковскую доброй: о, они просто ее не знали. Она бывала удивительно, непримиримо зла, просто быстро остывала, но это слабость характера. А так-то она умела и драться, и ненавидеть, и помнить чужие подлости. Она никогда не могла простить Полозовой раздавленного просто так жука. Есть вещи, которые нельзя. Лучше бы Полозова ударила кого угодно, хоть Надю, но давить жука не было никакой необходимости. Полозова вообще была дрянь. Надя была страшно зла, когда Семен ругал попов, когда Илья сразу заснул, когда Стечин начал доказывать, как хорошо стало, потому что все главные русские вопросы упразднены, а от них-то и были все беды, и поэтому, товарищи, да здрявствует советская влясть! Она была зла не на то, что он это говорил, а на то, что он так не думал. Михаил Алексеевич сказал: Надя-то наша, какой умеет быть свирепой! Вас, Наденька, Македонский взял бы в авангард (он как раз писал тогда о Македонском), в гетайры. Не в гетеры — в гетайры! Знаете, как отбирались? Кто бледнеет от гнева, тот трус, кто краснеет — тот боец. И если он так говорил, значит, бойцовское в ней было; только драться она не умела совершенно. Наверное, если бы Махоточка ударила ее, она в ответ, потеряв самообладание… но они не били, не было команды. Они изводили, и не поймешь еще, чем страшней: когда приставали с разговорами к ней или когда говорили между собой. Тогда душа ее погружалась в серный ад, и по вечной ошибке нормальных людей она думала, что этот ад и есть единственная правда.</p><p class="p1">Но чтобы сохранить гнев надолго, превратить его в позвоночник, — надо было отречься от себя, похоронить надежду, а это значило бы отказаться от имени. Она так не могла. Навыка ненависти, вот беда, не было у нее совершенно. Ей почти не приходилось этого делать. Она была слишком здорова. Ненавидеть умеет Райский. Ей и хотелось возненавидеть, гордо отвечать, насмешничать, — но это была бы не она. И вдобавок страх: очень скоро ей стало казаться, что с ней можно сделать все. Многим так казалось в Крестах, особенно из числа книжников. Воображение разыгрывается, клаустрофобные ведения преследуют днем и ночью, и кажется, что ты можешь здесь остаться навеки, и тебя не вытащит никакая сила. Ведь были узники, о которых забывали. Были потерянные дела — у этих все теряется, — а были просто более важные заключенные, и потому о невиновных забывают почти сразу. Они ведь неопасны, могут подождать. Сначала надо с убийцами, с действительными, может быть, врагами, — с теми, кто реален. И взятый за булку, за случайное слово, за компанию, — седеет, сгибается, приобретает цвет и ослизлость тюремных стен; и когда его выпускают через пятьдесят лет, слепого, забывшего свое имя… Она слишком много читала, теперь это мстило. Но, как все многочитавшие, она понимала главное (в том и разница между читавшими мало и много, что малочитавшие видят плоть мира, а многочитавшие — его скелет): сидеть легче виновному. У него есть твердый камень вины, на который он может стать и отстаивать эту вину, как единственную свою правду. А невиноватому сидеть плохо, потому что он виноват во всем. Это как белый лист, в котором есть возможность всякого слова. Вор есть вор, он отвечает за свое воровство. А невиновный может стать кем угодно, от насильника до убийцы; кем захотят, тем и сделают. И особенно оглушал ее запах гнилой капусты, которым в Крестах было пропитано все. Ничего нет безнадежнее этого запаха.</p><p class="p1">Ей представлялось вечное сидение тут, в полной выключенности из мира, в медленном превращении в такую же, как полубезумная старуха Забродина, ее потом забрали, как говорили тут, на больничку. Забродина была старая воровка, вдобавок пьяница, и когда ее в последний раз выпустили, она попросту не знала, куда пойти. Пришла сдаваться добровольно, наврала на себя что-то. Она не помнила ни детства, ни молодости, имя свое понимала с трудом. Она была идеальный продукт тюрьмы, ослепший пещерный житель. Ее все любили, Забродину, Махоточка ее заботливо укутывала, звала мамочкой. Махоточка была ласковая. Махоточка звала ее также заечкой. Мамочка, заечка. Когда из нас сделают то, чем мы должны быть, — к нам будут ласковы. Но сначала мы должны дойти до кондиции. Надя знала, что человек, попавший в Кресты, как бы они ни назывались, человеком быть перестает — российская тюрьма такова и была такова во все времена: это другая сущность, особая. Если повезет, если сил хватит — ты вырастешь в тюремного бога, адское божество, готовое на все и ко всему; если нет — станешь тюремной слизью, и чтобы этого не произошло, у тебя должен быть особый тюремный бугорок, он ей однажды приснился в путаном, рваном, капустном сне. Есть бугорок любви и бугорок денег на ладони, под пальцами, ей гадала однажды цыганка, грех, но не прогонять же, стояла жалкая, с дитем. Дай погадаю. Погадала. Бывает бугорок искусства, бугорок математики. Должен быть бугорок тюрьмы: либо ты можешь превратиться в нечеловека со знаком плюс, либо никак. Страшно, страшно быть нечеловеком. Страшнее всего было по утрам. У Нади не было бугорка тюрьмы, и к декабрю у нее не стало сил. Она еще не понимала этого, но знала.</p><p class="p1">После этого приходит время слез, но слез не было долго. Она брезговала плакать, не разрешала себе этого, не плакала даже в детстве, даже когда болели уши, а хуже этого только зубы, которые у нее не болели никогда. И потому она молчала, пока в камере цеплялись ко всему — к ее профессии, фамилии, к запрету на баню («Вони-то, вони-то от тебя! Дежурная! Дежурнай-я! Убери вонючку!»), к каждому слову, к молчанию. Их было десять, она одна. Возраст был у них — от пятнадцати (проститутка Макова) до шестидесяти (убийца по неосторожности Парфентьева, огромная, толстая торговка, подралась с другой, не рассчитала сил). Они презирали ее дружно, радостно, и ничего другого не делали: на ее фоне они были чистые, справедливые, а главное — ни в чем не повинные. Ить это надо, чтобы студентка — студентка она? — завела секту, и в ней разврат. Вот я, говорила Махоточка, взять меня: судите меня, люди, судите. Нет, не хотим, не будем тебя судить, наперебой кричали все, — кто мы такие, чтоб судить тебя?! Нет, настаивала Махоточка, встряхивая патлами, судитя мене! Судитя мене все, и што хотите делайте, но разве ж я могла б? Я страдаю через сердце, через сердце свое! Я на детей голодных воровала и через то попала, а уж как попала, так пошла. Но штоб я! штоб притон! штоб это все через Бога! Да я за Бога порвать дала бы себе тут и тут! Судите меня, люди, — и она рыдала, и все они кричали Наде: видишь, что она терпит через тебя?!</p><p class="p1">Махоточка любила порассказать о своей юности. «А и маинькая ж я была! Я была — вот. И у мене ноги были маинькие. Он, Степа-то, любил меня за это. Он говорил, ты махоточка у мене. Ты, говорил, узинькая у мене». Степа погиб потом через свое благородство, как погибают все Степы, взял на себя, пошел в каторгу. И там сердце его не вынесло, как измывался конвой над другими, и он бросился на конвойного, и погиб за правду. А политицкие ни словом, ничего. Для них воры были не люди. И для всех вас мы не люди, для всей вашей белой кости. А теперь ты тута сидишь, белая кость, и от тебе больше всех воняит. Мы воровки, да, мы неученые, да. Но от нас не воняит, а от тебе воняит. И хто ты после этого? Ты Бога продала, и тебе будет за это. Ты думаешь, они тебе скостят за Бога? Да они за Бога тебе еще больше посадют. Шлюха ты Божья.</p><p class="p1">Надя молилась теперь только про себя, чтобы никто не слышал, не заподозрил. Она ненавидела себя за то, что терпит. За «шлюху Божью» надо было, конечно, броситься на Махоточку и придушить, придавить дряблую шею, но Надю останавливал не страх даже, хоть их и было десятеро против нее, а чудовищная, необоримая брезгливость: ведь придется ее коснуться. А эти навалятся, Махоточку отобьют, Надю обзовут еще и не так, и будет хуже. Между тем хуже становилось с каждым днем, и она терпела, но воспоминаний уже не хватало — они больше не поддерживали ее. В ее детстве, в отрочестве, во всей жизни не набиралось столько счастья, чтобы на его запасе вынести Махоточку.</p><p class="p1">— Я ведь все знаю, Жуковская, — сказал ей Райский в конце ноября. — Я знаю, как к вам относится, скажем так, уголовный элемент. Вам достаточно простую вещь сделать, и вы будете в нормальной камере. Я вас переведу. Не с вашими, конечно, — я по закону не имею права вас держать с подельницами, — но к интеллигентным людям. Если вы не сумели себя поставить с сокамерницами, черт с вами, я пойду на нарушение, смягчу, короче, вы будете с такими же, как вы. — Брезгливость удалась ему великолепно. — С такими, которые не умеют… содержать себя. — Он помолчал, куря. — От вас требуется совсем немного — назвать полный состав вашего кружка, который нам и так в общих чертах известен. Точный список мне нужен только затем, чтобы не оговорили невинных. Есть, знаете, такие, — среди интеллигенции особенно, — что ради личной шкуры сдадут мать родную. Навидался тут. Вам я верю, заметьте, вы мне не дали еще оснований не верить, и потому я готов… поймите, это ради людей. Ради тех, кого могли взять случайно, за компанию, как угодно. Такое бывает, такая работа. Напишите мне полный список всех, кого знаете, и я немедленно дам команду вас перевести в другую камеру, и вы сегодня будете спать не на вшивом этом матрасе, а я распоряжусь вам выдать нормальный, раз уж вы не можете себя… вообще не можете с людьми… ну?</p><p class="p1">— Вы же понимаете, что я этого не сделаю, — говорила Надя еле слышно.</p><p class="p1">— Что? Не слышу! Почему, с какой стати не сделаете?</p><p class="p1">— Со мной делайте, что хотите, а сдавать других…</p><p class="p1">— Что? Что вы под нос себе лепечете?! Я говорю вам, мы всех знаем.</p><p class="p1">— Если всех знаете, то зачем?</p><p class="p1">— Да чтобы исключить, дубовая вы голова! — Он мог обозвать ее, допустим, тупой тварью, но уже знал, что злить ее не надо, злая она сильней. — Чтобы не взять лишних, чтобы отпустить тех, кто, может быть, случайно… Ведь их послушать — они все ни в чем не виноваты. А вы себе не представляете, какую сеть плел Остромов! У него в планах было прямое вредительство, и шпионаж в придачу. Вы должны назвать тех, кого знаете из кружка, — для их же блага должны, Жуковская, потому что они прекратят отпираться. Каждый день отпирательства им добавляет срока, каждый день лишней лжи мешает нам окончательно раскрыть дело, понимаете вы это? Никто не заинтересован никого тут держать. Назовите всех, и вы завтра будете в другой камере, а послезавтра, может быть, вообще домой пойдете.</p><p class="p1">— Вы же знаете, что я ничего не делала, — говорила Надя, глядя ему прямо в лицо.</p><p class="p1">— Я ничего не знаю о вас, Жуковская, — говорил он со старательно сдерживаемой ненавистью. — Вы постоянно лжете. Вы говорите, что не было политических разговоров, а они были. Говорите, что не было разведывательной работы, а она была. Все уже признались, и некоторые, спасая себя, наговорили на других. Вы наверняка догадываетесь сами, кто.</p><p class="p1">«Даня?!» — подумала она в ужасе и встряхнула головой, избавляясь от этой мысли.</p><p class="p1">— А у вас есть шанс сказать правду и спасти невиновных, — говорил он. — Хорошо, смотрите, облегчаю задачу. Я вообще не понимаю, почему с вами так цацкаюсь. Точней, понимаю. Мать мне жалко, мать вашу. Рыдала тут, валялась в ногах.</p><p class="p1">В это Надя поверить могла. Зачем, зачем валялась?!</p><p class="p1">— Мне стыдно было. Мне, взрослому мужчине, — рубил Райский. — Из-за вас, по вашей милости. Ну ладно, по молодости лет пошла не по той дороге, бывает со всеми. В вашей прослойке особенно, прослоечка-то гниловата. Тут они правы, эти женщины, которые в камере с вами. У них все-таки есть чутье на гнилье. Но допустим, оступились, попали в секту, под прикрытием всяких божественных идей и полетов медленно разрушали государство, и готовились уже, и уже все было на грани… Хорошо. Но есть шанс, дают же возможность! Вы можете исправиться, встать, так сказать, на дорогу, у вас есть полное право! И вам всего только достаточно, — он положил перед ней список, где его железным, как он думал, прямым почерком выписаны были имена и фамилии. — Вам только поставить плюс напротив тех, кто посещал кружок. Я знаю, что половина — может, больше половины, — невиновны. Вот карандаш, одна минута — и я верю, что вы не преступница.</p><p class="p1">Надя просмотрела список. Там было двадцать два имени. И там был Даня.</p><p class="p1">— Я никого не знаю из этих людей, — сказала она твердо. — Вы же знаете сами, мы никогда все не встречались, были разные дни занятий…</p><p class="p1">Райский помолчал. Он любил неожиданные эффекты.</p><p class="p1">— Мразь. Тварь, — сказал он раздельно. — Ма-те-ре-у-бий-ца.</p><p class="p1">И гаркнул в коридор:</p><p class="p1">— Увести.</p><p class="p1">Надя и после этого еще не надломилась — надлом случился позже, в январе. Никаких внешних поводов как будто не было — копится, откладывается, наваливается. Но она помнила со страшной четкостью вечер, когда ей стало себя жалко; тут был простой физический закон. Человеку в изоляции — в тюрьме, казарме, эмигрантской каморке, — надо чем-то жить, и он проскребает дырку в стене, отделяющей его от прошлого, — стене, которую человек в обычном положении выстраивает, не замечая. Вот недавние воспоминания, они не поддержат, на них уже тень нынешнего отчаянного положения. Вот давние, детские, они укрепят, на них можно опереться, но долго их мусолить невозможно, они стираются от повторения. Да и потом — нет большего мученья, как о поре счастливой вспоминать в несчастии; твой вождь того же мненья. Тогда проламывается и пол, и под ним самое глубокое, детское, беспомощное; оно накатывает, наплывает, как пухлые тучи, обволакивает спасительными слезами. С этими слезами выходит последнее человеческое, и тогда можно вынести многое, — не все, ибо все вынести нельзя, но многое. У разных этот период длится по-разному. Начинается он, как правило, во сне.</p><p class="subtitle">4</p><p class="p1">Был январский вечер, оттепель, допросов давно — дней десять — не было. Макова рассказывала про щенка, у нее в детстве был щенок. И у Нади был, терьер, его звали Спот, так прозвал его дядя, брат отца, Николай Сергеевич. Николай Сергеевич давно умер. Он был человек романтический, долговязый, мечтательный, нудный, никому особенно не нужный. Рассказывал, что была у него нечеловеческая романтическая любовь с южной экзальтированной барыней, и даже ребенок от него был, но она была замужем и все скрыла. Об этой барышне говорил часами, слушать было невозможно, и стихи-то она писала, и сказки сказывала. Любопытно, думала Надя, посмотреть бы на этого ребенка, моего, стало быть, двоюродного брата, — наверняка ведь такой же зануда, как Николай Сергеевич, и к жизни вовсе уже неприспособлен, но вранье ведь, нет у него никакого ребенка и никакой барышни. Он все себе выдумал, бедный, бедный Николай Сергеевич. И некому ухаживать за могилой — они даже ни разу не съездили с матерью в Тверь, где его добил приступ грудной жабы, уже в восемнадцатом году. А Спот умер еще раньше, в пятнадцатом, был старый, его покусал огромный уличный пес, Спот не умел защищаться. Нельзя было брать Спота, надо было сразу выбросить его на улицу, и там бы он стал таким, как эти псы, и не умер бы. Нам нельзя держать около себя живых существ, мы губим их. Но как же можно было выбросить маленького Спота?</p><p class="p1">Есть угол зрения, которого никто не должен себе позволять: нельзя смотреть на мир глазами выброшенного щенка, глазами потерянного ребенка, одинокой матери, узнавшей, что она больна неизлечимо, или девушки, приехавшей в чужой город искать беглого любовника и узнавшей, что его в этом городе никогда не было. У отвергнутого вздыхателя есть утешение в виде гордости, у брошенной женщины есть нравственная правота, но у самого простого, чистого, непоправимого детского горя никаких утешений нет. Больше скажем — взгляд потерянного щенка или бесприютной дуры в чужом городе, взгляд одинокой матери или горькой сироты, такой взгляд на мир единственно верен — ибо под этим углом он предстает сборищем безнадежно чуждых и равнодушных лиц, стен, огней, местом, где все чужое, каков он, собственно, и есть; но чтобы жить, надо себе это запрещать. А кто так взглянул — с тем уже можно делать, что угодно.</p><p class="p1">Слезный, синий, расплывающийся в глазах мир представлялся ей, — мир, где в каждой подворотне, за каждой стеной, на любом углу умоляли о пощаде, и не было никакой пощады. Безнадежно разделенные, стонали брошенные дети, собаки, любовники, и никто из них не мог помочь другому, ибо сам лишился опоры. Бог был в этом мире, как же без него, но и он не мог никому помочь. Боль этого мира заполнила ее так стремительно, что Надя не успела придумать ни одного утешения, никакой отвлекающей мысли — на нее словно хлынула огромная соленая волна; она вспомнила себя в детстве, какой не вспоминала давно, — жалеющей брошенную газету, опавший лист, оторванную пуговицу; жалость была скрытой основой ее души, жить с обнаженной основой нельзя, как нельзя жить с открытой, торчащей костью, — но эта жалость никого не могла спасти, а значит, и все существование ее было напрасно. Проживи она в таком состоянии еще два дня, эта боль стала бы невыносимой и притупилась, и наступила бы следующая стадия — оглушенность. Но Райский не зря был следователем. Что-то он понимал, а потому утром ее, опухшую от слез и бессонной ночи, грязную, со свалявшимися волосами, повели допрашивать.</p><p class="p1">Кабинет почему-то был другой, не тот, где Райский обычно добивался от нее списка. Этот был меньше, но из него вела другая дверь — вбок. Вероятно, за этой дверью готовили ей очную ставку, или другой следователь сидел за ней, обучаясь искусству допроса, но эти мысли мелькнули и забылись. Она вообще не очень связно соображала в то утро.</p><p class="p1">— Что же, Жуковская, — сказал Райский новым голосом, уже без всяких потуг на человечность и понимание. — Я ждал долго, но бывает предел всему. Применять к вам физическое воздействие мы не будем, мы за гуманизм. Ваши нас давили, топтали, кипящим оловом заливали, но мы не будем. — Он старательно скрипнул зубами. — Вы же интеллигенция, рук марать не любите. За вас всю жизнь все делали другие. И мучиться за вас тоже будет другой человек. А я посмотрю, как вам это понравится.</p><p class="p1">Он крикнул, повернувшись к двери:</p><p class="p1">— Приступайте, Аникин.</p><p class="p1">Надя смотрела на него и не понимала, зачем ему понадобилось ее добивать. Она боялась, что в этом состоянии не вытерпит боли, — но добивать предполагалось не ее. За дверью смачно хэкнул Аникин, и послышался отчаянный женский визг, но такой визг, в котором было еще больше показухи, нежели настоящей боли; в нем было еще и преувеличение, и даже некоторое «как ты смеешь», с которого начинают все, кого бьют. После второго-третьего удара они уже не визжат, а воют, понимая, что смеют, очень смеют, что можно все. И когда Аникин ударил во второй и третий раз, за дверью послышался утробный вой, а потом беспомощный, полудетский плач.</p><p class="p1">— Хватит пока, — крикнул Райский. — Вот список, Жуковская. Ставьте плюсы. Или не ставьте, и тогда он там продолжит. Вы же политическая, вас трогать нельзя. А простых можно, простых не жалко. Будем признаваться?</p><p class="p1">— Я вам во всем призналась, — сказала она, глядя на него огромными круглыми глазами, в которых плескалось непонимание. Она в самом деле не понимала, как так можно и зачем.</p><p class="p1">— Замечательно, — сказал Райский. — Продолжаем! — крикнул он. Снова хэкнул Аникин, и за дверью послышалась сдавленная мольба: «Не на… не нады…»</p><p class="p1">— Как не надо?! — весело заорал Аникин. Голос его доносился глухо, но слышалось, что ему весело. — Как так не надо? А? Почему не надо? А так надо?</p><p class="p1">— Уыыы… — донеслось в ответ.</p><p class="p1">— А так? — радостно гаркнул Аникин.</p><p class="p1">Надя придвинула листок. Отпираться насчет Остромова было бессмысленно. Она поставила плюс против Остромова и замерла. Грех был не в том, чтобы ставить плюсы, грех был в том, чтобы взять карандаш… но, может быть, можно как-то… возможны какие-то…</p><p class="p1">— А вот так? — спросил Аникин, и ответом ему был короткий, почти сразу оборвавшийся стон.</p><p class="p1">— Воды там принесите, — крикнул в стену Райский.</p><p class="p1">— А щас, — исполнительно отвечал Аникин. — Дежурный! Воды… нервная тут попалась…</p><p class="p1">Надя понимала, прекрасно понимала, тогда и потом понимала, что с людьми, делающими так, никакой договор невозможен, что все предлагаемые ими условия надо отвергать тут же. Как это не понимала, отлично понимала! Но там, за стеной, били женщину, это меняет дело. Хорошо рассуждать, когда за стеной не бьют. Когда бьют за стеной, рассуждать трудно.</p><p class="p1">Она поставила кресты против Поленова, Мартынова, Дробинина. Райский подошел, перегнулся, посмотрел.</p><p class="p1">— Эти давно у нас, — сказал он брезгливо. — Будем дурочку играть, Жуковская? Поиграем дурочку. Аникин!</p><p class="p1">— Есть! — крикнул Аникин. Слышно было, как плеснули водой из ведра, как за стеной завозилось, зашуршало, хэкнуло и тяжело рухнуло, и завыло уже по-звериному, без надежды на милосердие, на то, что услышат и спасут, а просто чтобы выть. Это все было очень просто, на раз-два-три, но тоже, согласитесь, надо знать, как выть.</p><p class="p1">Надя поставила еще два креста. Кресты, кресты. «Аникин!» — заорал Райский. «Господи! Господи! Что это! Господи, что это! Ааа, что!».</p><p class="p1">— Объясни ей там, за что, — крикнул Райский. — Скажи, тут упрямая сидит.</p><p class="p1">— Щас, — ответил Аникин утомленно. — Опять тут поплыла…</p><p class="p1">— Ну так лей!</p><p class="p1">— Да плохо, — ответил Аникин после паузы. — Может, врача?</p><p class="p1">— Подохнет — кобыле легче, — сказал Райский. Ай, как он хорошо все придумал! Надя сидела напротив и трясла головой, трясла без перерыва, думала вытрясти из ушей крик за стеной. Когда-то же это кончится, думала она. Когда-то же должно кончиться. Если бы можно было умереть по собственной воле, одним усилием, она бы не задумавшись, с облегчением, но нельзя было умереть. И она поставила еще два креста. Райский поглядел.</p><p class="p1">— Аникин! — крикнул он. — Давай!</p><p class="p1">— Ну же ты сука! — крикнул Аникин. — Ну же ты у меня!</p><p class="p1">Ему надо было, видимо, себя подзаводить, чтобы бить лежачую и не приходящую в сознание. Просто так это не дается, хотя бы и Аникину. Не так ведь просто. «Ну же ты!» — заорал он, разбежался, судя по топоту, и ударил. Звуков не было уже. С какого-то момента только чавканье, хруст, вбивание сапога в полуживую плоть.</p><p class="p1">Надя поставила последний крест. Остальных она не знала, правда не знала.</p><p class="p1">Райский нагнулся, посмотрел. Что же, и Галицкий. Значит, этот и есть так называемый суженый, этот, ускользнувший. Но он-то, судя по всему, сбоку припека.</p><p class="p1">— Хватит, Аникин, — брезгливо крикнул Райский. Он уселся за стол и некоторое время молчал.</p><p class="p1">— Кстати, Жуковская, — сказал он небрежно. — Просмотрите вот это.</p><p class="p1">Он положил перед ней два списка — один рукописный, другой печатный. Рукописный был тот, в котором она ставила кресты. Печатный был заготовленный, из дела.</p><p class="p1">— Сличите, — сказал он. — Любопытно, не правда ли? Мы же все знали. И никаких подтверждений нам не требовалось.</p><p class="p1">Надя молчала.</p><p class="p1">— Заметьте, Жуковская, вас не били, — говорил Райский, красиво затягиваясь папиросой. — Вас не мучили, не унижали. Не подвергали ничему. Сюда можно сейчас любого француза привести, любого испанца, — он наслаждался результатом, хотелось поговорить. — Любого, кто тут за ваши права. Что будто бы мы звери. И заметьте себе, никто, ничего. На вас ни следа. На вас одежда цела. Вас трогать брезговали. А знаете почему, Жуковская?</p><p class="p1">Он сделал эффектную паузу.</p><p class="p1">— А потому что такие мрази, как вы, не стоят побоев, — бросил он триумфально. — На вас чуть надавили, без голода, без угроз, и вы — видите? Вы же всех, всех сдали, до последнего человека. Большевиков подвешивали за ребра, суставы выворачивали, — Райский был начитанный, читал «Князя Серебряного», — большевикам, как говорится, глотки оловом. А большевики — никого, никогда: большевики не сдают, понимаете? Мы не сдаем своих друзей, поэтому мы победители. А вы раскалываетесь, как орех гнилой, поэтому вы мразь, понимаете, Жуковская? Вы мразь, и для вас нет другого слова. Вы не выдержали первой, простейшей просьбы, а ваша мать тут в ногах валялась. Стала бы она валяться, если бы знала, какая дочь? Да ведь она знает, впрочем. По вам видно. Я вот сразу понял. Остальные еще хоть сколько-то подержались. А впрочем, все вы гниль.</p><p class="p1">Надя молчала.</p><p class="p1">— Аникин! — крикнул Райский. — Введите.</p><p class="p1">Коричневая дверь распахнулась, и Аникин с потным, как бы лакированным лицом балаганного Петрушки и такой же широчайшей петрушечной улыбкой вступил в помещение. Он был потный, вспотел. Следом за ним робко, с тишайшей мышьей улыбкой на невредимом лице, просеменила — ну, кто же сомневался. Кем надо быть, чтобы сомневаться. Все уже поняли, даже ты, идиот, тебе, тебе говорю, который считает себя самым умным, — даже ты уже понял. Всеменила, вплыла Махоточка — походкой, какой плавают в танце русские павы, лебедушки. Шла утица вдоль бережка, шла серая вдоль крутова. Вяла деток за сабою, и малого, и большова. Ах, ут<em>я</em>, ут<em>я</em>, а куда же мне иття? Тебе теперя, конечно, некуда.</p><p class="p1">Она была невредима, умильна, тихо счастлива. И она смотрела на Надю именно с тихой радостью, как юная актриса на экзаменатора. Верю, верю! — кричит он в восторге, а ведь кто бы подумал, простая петербургская воровка, до пятнадцати лет Сцыкуха, впоследствии Гадюка, а потом Махоточка, маинькая моя.</p><p class="p1">— Свободен, Аникин, — одобрительно, а впрочем, сдержанно, чтоб не зазнавался, сказал ему Райский. — И эту… уведите.</p><p class="p1">Аникин бойко потопал по коридору, конвоируя Махоточку.</p><p class="p1">— Что скажете, Жуковская? — спросил Райский. Ему правда было интересно.</p><p class="p1">— А что вам сказать? — ответила она неожиданно спокойно. И правда, после смерти какие же волнения.</p><p class="p1">— Ну, не знаю, — ответил он, красиво затягиваясь. — Что-нибудь про совесть, про честь, про благородство. Про что вся ваша гнилая шваль так любила поговорить на дачках, под клубничку со сливками. А?</p><p class="p1">— Я вам одно скажу, — проговорила Надя, поднимая глаза. — Вам, конечно, сейчас все можно. Но умрете вы нехорошо, плохо умрете. Вот. А больше я вам ничего не могу сказать.</p><p class="p1">И Райский почувствовал, что настроение у него испортилось. Не сильно — так, тучка набежала, — но несколько все-таки испортилось. Если бы проклинала, было бы интересней. Раздавил, как жука, вытер сапог о траву и пошел дальше, — ничего особенного. Жаль. Он думал, что будет интересней.</p><p class="p1">— Увести, — сказал он разочарованно.</p><p class="p1">В камере она сразу легла, и Махоточка подошла к ней, поправила подушку, погладила по голове.</p><p class="p1">— Поспи, заечка, — сказала она.</p><p class="p1">Теперь можно было, все можно было.</p><p class="subtitle">5</p><p class="p1">Но надо сказать, что Райский умер действительно нехорошо.</p><p class="p1">Его взяли в поезде, ехал в Москву, думал — на повышение. Вытащили из сна в Бологом, протащили по черной осенней ночи, по мокрой платформе в желтых пятнах фонарей, под игольчатой моросью, потом долго били, потом еще били, уже не шутя, а когда все признал, как следует накормили и снова побили.</p><p class="p1">Он начал признаваться сразу, потому что сам был из этой системы и знал, как бывает. Но в его случае признания не помогли — били хорошо, вымещая давнюю ненависть, били свои же, потому что Райского не любили, никто не любил. Это был тот случай, когда правильно, по справедливости; и никому не приходило в голову, что уничтожающие его хуже, чем он, что вообще все следующие тут хуже, и каждый следователь за другим тупей предыдущего.</p><p class="p1">И когда Райский умирал, то есть когда его убивали, он очень плакал, жаловался, просил его пожалеть, уверял, что может быть полезен, что он теперь новый, маленький Райский, для которого только начинается чистая и светлая жизнь, если ему, конечно, дадут; но ему не дали.</p><p class="p1">Всякий человек, умирая, видит не то что всю свою жизнь, — даже самая ничтожная жизнь не уложится в столь краткий промежуток, — но слышит нечто вроде общей оценки; не вполне понятная инстанция дает ему понять, жалеет она об его уходе или радуется, или вообще ничего не изменилось. И Райский, умирая, почувствовал, что она не жалеет, что он правильно уходит, что это, может быть, вообще его лучший поступок. Такой долетел до него общий итог. В иерархии прощальных итогов он не худший, но нехороший; иногда лучше услышать «плохо», но тут было именно «нехорошо».</p><p class="p1">А все потому, что проклятие раздавленного человека имеет силу, небольшую, но силу; и это не то что справедливость — справедливости нет, потому что исправить ничего нельзя, — но равновесие, один из фундаментальных законов. Некоторые из этих законов ужасны, похожи на хруст костей, но не нам их оценивать. Да нам и дела до них нет. Мы вряд ли сойдемся в том, что хорошо и что плохо, по крайней разности наших весовых категорий; и этой разницей многое объясняется. Но в том, что нехорошо, мы сходимся, и на этом тоже кое-что держится.</p></span></span>
