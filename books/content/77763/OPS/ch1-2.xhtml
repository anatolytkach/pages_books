<p class="p">ОТ АВТОРА</p>
</div><p class="p1">«Остромов, или Ученик чародея» — третья часть исторической трилогии, начатой романами «Оправдание» (2001) и «Орфография» (2003). Все три книги связаны второстепенными персонажами, но автономны. Читать их лучше в том порядке, в каком они написаны.</p><p class="p1">В основе сюжета — известное «дело ленинградских масонов» 1926 года, материалы которого опубликованы в составленной и прокомментированной А. Л. Никитиным книге «Эзотерическое масонство в советской России» (М., Минувшее, 2005). Личность Б. В. Астромова-Кириченко-Ватсона поныне вызывает споры: одни видят в нем романтика, другие — авантюриста и провокатора. Вне зависимости от того, кем он был в действительности, и даже от собственных его устремлений, — среди «бывших людей» второй половины двадцатых годов он играл заметную и неоднозначную роль. Она меня и занимала. Разумеется, Остромов не тождественен Астромову, и многие события, описанные в романе, сдвинуты во времени.</p><p class="p1">Второй герой романа, Даниил Галицкий, некоторыми чертами близок своим тезкам Даниилу Андрееву и Даниилу Ювачеву, называвшему себя Хармсом, но более всего — к Даниилу Жуковскому, сыну Аделаиды Герцык, расстрелянному в 1938 году. Письма, стихи и воспоминания этого феноменально одаренного юноши опубликованы в сборнике «Таинства игры. Аделаида Герцык и ее дети» (М., Эллис Лак, 2007).</p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/Astromov.jpg"/>
</div><p class="p1"><em>Б. Астромов-Кириченко-Ватсон (в романе — Борис Остромов)</em></p><p class="empty-line"/><div class="image">
<img class="z1" alt="" src="images/Zhukovskiy.jpg"/>
</div><p class="p1"><em>Д. Жуковский (в романе — Даниил Галицкий)</em></p><p class="empty-line"/><p class="p1">В работе над этой книгой мне помогали многие друзья, больше других — Александр Зотиков, Лада Панова, Евгений Марголит, Александр Гаррос, Дмитрий Ольшанский, Михаил Успенский, Лев Мочалов, а также сотрудники Дома-музея Волошина в Крыму. Но самую большую и самоотверженную помощь оказал мой друг Максим Чертанов, которого я и прошу принять благодарное посвящение.</p><p class="p1">Предупреждаю читателя, что описанные в романе способы подготовки к левитации ни в коем случае не следует практиковать в одиночку и без тщательной теоретической подготовки. Залог успеха — вдумчивость, основательность и доверие.</p><p class="p1">Названия частей книги имеют не хронологический, а особый сверхлогический смысл и обозначают не столько времена года, сколько степени познания.</p><p class="empty-line"/></span>
