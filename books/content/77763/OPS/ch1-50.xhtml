<span><span><p class="p1">Тут примечательно то, что Капитонов числился утонувшим, а на деле погиб при несколько иных обстоятельствах, которые вот-вот прояснятся. Однако уполномоченный Капитонов никуда не исчез. Еще два раза его убили в перестрелках, да еще раз он спьяну простыл, заснув весной на скамейке, но оставался, как прежде, живехонек. «Капитонов» был псевдоним, по-русски Голованов. Почему он укоренился — теперь уж не скажешь: может, раз все переулки называли в честь каких-нибудь бывших товарищей, то вот и оперативный псевдоним взяли в честь какого-то реального лица; но в ЧК вообще редко пользовались подлинными фамилиями. Все же понимали, что когда-нибудь дойдет и до них — появится изумленный потомок и спросит: как же ты мог? и главное, зачем? А что я? Я стоял и подводил клемму, или подбрасывал дрова, — вот все, что я делал; иногда, конечно, заставлял дрова признаться, что они виноваты, но это просто чтоб веселей горело. Но на всякий случай никто из них под своей фамилией не работал, и это сохранилось по сию пору: одних Петровых было больше, чем во всем остальном Ленинграде. Кто был в действительности тот Капитонов — это уж мы никогда теперь не поймем.</p><p class="p1">Даню в наручниках подняли на пятый этаж. В коридоре, буднично устланном красным паласом, ему встретился человек в форме, судя по всему — начальство немелкого ранга, в лице которого, однако, мелькнуло смутно знакомое. У Дани вообще была неважная память на лица, но это квадратное лицо он знал, такое не забывается. Фамилия мелькнула смутно, но тут же всплыла. Это был Роденс, никакого сомнения. Даня видел его единственный раз, на собрании, когда он заявил учителю, что хочет убивать коммунистов. Значит, провокатор. Впрочем, это не имело теперь никакого значения.</p><p class="p1">Между тем никаким провокатором Роденс не был. Если кто хочет убивать — неважно кого, важно само желание, — рано или поздно он непременно попадет туда, где убивают. Он был на отличном счету и делал карьеру. Что до желания убивать коммунистов, их к его услугам было теперь полно.</p><p class="p1">В желтом казенном кабинете с желтым казенным графином, сейфом и дубовым столом Даню в наручниках усадили на тяжелый стул и оставили Капитонову.</p><p class="p1">Нынешний Капитонов был рослый, розовый, мелкоглазый, молодой — старые кадры были уже к тридцать девятому большей частью перемолоты, — и ориентированный уже, как почти все они, лишь на один вид следственной работы: выбивание.</p><p class="p1">— Фамилия имя отчество, — сказал он себе под нос.</p><p class="p1">Даня представился.</p><p class="p1">— Год рождения адрес место работы.</p><p class="p1">Все это было ему изложено.</p><p class="p1">— Состояли ли под судом и следствием.</p><p class="p1">Ему ответили.</p><p class="p1">— Знач так, — сказал он буднично. — Показаниями ваших товарищей по контрреволюционной организации «Великая ложа Астреи» вы совершенно изобличаетесь в подготовке заговора, организации убийств вождей партии и правительства, террористических актов на производстве и антисоветской пропаганде. Запирательство бессмысленно, признание облегчит. Будем говорить?</p><p class="p1">— О чем? — спросил Даня.</p><p class="p1">Капитонов встал перед ним, расставив ноги, и заглянул в лицо с невыразимым презрением.</p><p class="p1">— Галицкий, — сказал он, — мы тут таких, как ты, раскалываем в два дня. Но лучше тебе до этого не доводить.</p><p class="p1">Даня молчал, глядя на Капитонова снизу вверх. Ему в самом деле было очень интересно. Да, пожалуй, если бы все это случилось с ним в двадцать пятом, он бы никогда не полетел и не освоил многого еще другого; но теперь было поздно.</p><p class="p1">— Говорить будем, Галицкий? — спросил Капитонов. Ему года двадцать два, подумал Даня.</p><p class="p1">— Спрашивайте, — ответил он.</p><p class="p1">— Чего спрашивать? — передразнил Капитонов. — У меня на тебя показаний — во. — Он кивнул на папку «Дело». — Если я грю «изобличаетесь», это значит, изобличаетесь. Рассказывай, и, может, жив будешь. А нет — как знаешь, я предупредил.</p><p class="p1">Даня смотрел на него со странным выражением, которое Капитонову не нравилось. Самому Дане оно не нравилось тоже, ибо он чувствовал, что нечто в нем принимается думать и решать самостоятельно. Он вырастил в себе это нечто, с его помощью левитировал и посещал эоны, и теперь оно было глубочайшим образом оскорблено тоном этого разговора и обстановкой кабинета. Он почувствовал, что еще немного — и он не сможет сдерживать эту внутреннюю сущность, которую всегда в себе сознавал, но в последние годы натренировал почти до всемогущества — разумеется, в земных пределах. Сам Даня Галицкий готов был терпеть многое, но это — в нем — не было готово. С таким же выражением — остановитесь, или потом не смогу остановиться я — смотрела на сильного самца Мокеева пишбарышня Ирочка, но сильные самцы никогда не могут затормозить.</p><p class="p1">— Вам не надо бы этого, — тихо сказал Даня.</p><p class="p1">— Чего?! — прикрикнул Капитонов, не веря ушам.</p><p class="p1">— Вот этого вам не надо бы, — еще тише сказал Даня, чувствуя, как воля его слабеет и как набирает мощь притаившаяся в нем буря. Эта буря ждала долго, он ни разу еще не использовал ее.</p><p class="p1">— А?! — заорал Капитонов. — Ты кому?!</p><p class="p1">И он замахнулся, потому что с самого начала понимал, что с этим иначе не получится, его надо будет ломать по полной. Но, замахнувшись, он застыл, странно вытаращив глаза, потому что ощутил внезапно сумасшедшую легкость, полную бестелесность — он не чувствовал даже собственной занесенной руки.</p><p class="p1">— Вы неправильно делаете, — сказал Даня, точнее, что-то в Дане. И, не сводя глаз с Капитонова, он начал делать правильно.</p><p class="p1">Человеку, никогда не прибегавшему к раскатке, трудно объяснить, что это такое. Имаго, проходящее эту стадию, переступает последний порог, отделяющий его от конечного превращения. Но поскольку имаго — сущность тонкая, процесс имеет вид не столько нападательный и даже не защитительный, но скорее, так сказать, познавательный: оказавшись лицом к лицу с наглым врагом, имаго смотрит, что у него внутри. Оно — он, она — до последнего старается отдалить процесс, ибо после него пути назад нет. Но ведь Капитонов, как бы он ни назывался, никогда ничего не понимает. И тогда начинается послойное считывание, в результате которого остается — да, да, та самая лужа, а в середине ее виновато морщатся никому не нужные сапоги.</p><p class="p1">Вы как вы что это прекратить, считывал Даня. Он разлагал Капитонова стремительно, сдирая слои клеток, и краем сознания успевал отметить: вы нас колете в два дня, мы вас раскатываем в четыре минуты. Он прекрасно знал, что делать, но знал теоретически. Сила, скрытая в нем, вырвалась теперь наружу. Она ничего не желала знать, ничего не боялась и не жалела. Капитонов стоял с отведенной назад рукой и быстро переставал быть Капитоновым. Бедная Лидочка Поленова, увидеть такое в двадцать лет. Вместо лица было уже месиво, но Капитонов не чувствовал боли. Собственно, и не было уже никакого Капитонова.</p><p class="p1">Неустанно крепя неудержимо вскрывая стальной каленой метлой ах ты сука кусаться кипучая могучая присутствующих здесь дам. Три кило сарделей говяжьих шесть нет семь бутылок пива семеро смелых две булки городских хранить вечно. Спрашивать вы будете в другом месте а здесь спрашиваем мы умолять будете в другом месте а здесь умолять буду я ах тварь четырнадцать принципов и десять по рогам чистосердечно с полной конфискацией родственников за границей и подозрения на гонококковый уретрит найду убью. Семенов рассказал анекдот Теруэль взят не понял сообщить играть на руку Бауэру делай здесь рукой нет здесь не надо мне здесь вы здесь не у тещи давить безжалостно более или менее готовых форм уклада тварь в пыль. Вам будет доведено отец мать Бердянск Ублюдск. Татуировка в виде пяти куполов означает сердечное расположение и цветочки а я не такая как некоторые у меня рекомендация и два года предварительного стажа. Выйди пока погуляй иди сюда стоять смирно стоять я сказал присаживайтесь вот чай бутерброды папиросы курите встать не сметь падать лежать не сметь вставать лечь встать одевайся увести куда я сказал! Я могу с вами с тобой сделать все и мне никто ничего не скажет никакой брат. Статья сорок пять трамвай тридцать шесть квартира восемнадцать пункт три со двора в подъезде не смей орать соседи. Поздравляю товарища начальника шестого отдела желаю счастья долголетия не болейте живите десять лет без права переписки и пять ссылки в районы крайнего Севера засадим окультурим цветущими садами зимостойких яблонь Мичурина. Перечислите ваши ошибочные выводы ваших сообщников ваших заграничных представителей ваши особые приметы ваши лобковые вши тринадцать рублей пятьдесят семь копеек минус десять вернуть за выбытием адресата. Что ж ты сука папа высылаешь по чуть-чуть куркуль небось уже продал черешню погоди доберемся до самых отдаленных уголков необъятной простирается политинформация завтра в восемь. Брызги шампанского загадил весь коридор утри за собой падла полюшко-поле из оперы Лоэнгрин. Выходя в большую жизнь желаем вам следовать курсом туда сюда обратно аттестат продовольственной зрелости махрового гегельянства и головокружения. Помещик Пушкин рисовые котлетки лыжный кросс ворошиловец профессор Пифагор терся иксом об забор. Румяной зарею покрылся восток в рот в зубы Варька вся голая на крыше с Гундосым. Отдай лопатку ведро поймаю убью всем скажу. Мирись мирись и больше не дерись вот тебе сука поверил сука вот тебе сука. (Душно, душно, Господи, как душно, где же у него хотя бы какой-нибудь «Зая белый куда бегал?» Неужели правы были те, утверждавшие, что они действительно антропологически… или антропологически иные были всегда и вот им наконец нашлось куда…? Где-то тут должны быть детские страхи и рождающаяся из них поэзия, но у него из всего рождается одно — одинаковое и с врагами, и с бабами. Но пойдем глубже — может быть, может быть…) Вижу горы и долины вижу письку Катерины. Вода в ботинках. Пилы тупы ноги Тани малы. Несла баба ведро воды ведро было худо. Что ж такое опять мокрый. Топ-топ по лужку, топ-топ по снежку. Мама! Мама! Мама!</p><p class="p1">Кажется, они закричали это одновременно: Капитонов — беззвучно, всей прапамятью, а Даня громко, отчаянно, потому что добрался наконец до последнего слоя и увидел, что сделал. Сделалось то, чему и следует быть при раскатке. Непонятно было, чему там кричать. Капитонов разложился, как мистер Вольдемар. Густая багровая лужа медленно растекалась по кабинету. Отвратительно пахло сырым мясом.</p><p class="p1">Голова у Дани работала исключительно четко. Прежде всего надо было избавиться от наручников. В новом его состоянии это оказалось проще всякой раскатки — запястья лишь слегка обожгло при плавлении. Даня не забыл и о деле — дело прежде всего. Папки на столе не стало совсем, как не было. Да ее и не было, Капитонов блефовал: все, что они нарыли, — три с половиной упоминания. Он применил ускорение, при котором становился незамечаем, и, двигаясь ровно, но быстро, спустился к главной проходной.</p><p class="p1">Тут он, впрочем, несколько заблудился, потому что двигаться в этом воздухе было трудно, и разбуженные раскаткой силы до сих пор еще не угомонились. Спускаясь сквозь пять этажей, распланированных с идиотской конструктивистской изобретательностью, вообще характерной для таких мест, — он упирался в тупики, с одной лестницы переходил на другую, из левого коридора в правый, и притом с него падали лишенные ремня, невидимые миру брюки. Здание проектировалось так, чтобы из него было не сбежать, но все эти хитрости были мелкие, плоские, вроде необходимости переходить по коридору с одной лестницы на другую, — и эта мелкость странно сочеталась с торжественностью гигантских дверей, с помпой налепленных повсюду гербов, с дубовой тяжеловесностью перил. Вот и все у них было так — тяжелозвонкая мелочность, твердокаменная труха, — но трудней всего было идти сквозь то, что сгустилось тут до невыносимой концентрации, и он все это слышал. Ужасна была не столько концентрация страха, — к ней он привык и даже на улицах уже почти не ощущал, — но пронизанность всего этого здания токами безумной надежды, хотя именно надежду-то и следовало оставить перво-наперво всякому сюда входящему — не потому, что нельзя выйти (выйти, как видим, очень можно), а потому, что только без надежды и возможно тут как-то себя вести. Иначе все будет ею отравлено, пропитано ее невыносимым, грязно-розовым, свиным запахом. Так же, должно быть, отвратителен умирающий, умоляющий: я еще могу… я еще пригожусь… Что ты еще можешь, на что пригодишься, когда лучшее для тебя было бы не родиться, а если уже родился — то как можно скорее и сильнее швырнуть свою жизнь в пасть шрустра и уйти вон отсюда?! Ведь желать задержаться здесь — все равно что медлить у проходной Большого дома, куда он вот уже и дошел; он видел это теперь с такой ясностью, что каждый атом его, казалось, кричал: вон отсюда! Вон отсюда!</p><p class="p1">Дежурный посмотрел сквозь него и равнодушно отвернулся.</p><p class="p1">Жаль ремня, подумал он, а впрочем, зачем теперь ремень.</p><p class="p1">Падал медленный, второй за зиму снег. Надо было куда-то идти.</p><p class="subtitle">8</p><p class="p1">Мысль продолжала работать четко, как чужая. Идти домой было ни в коем случае нельзя. Следовало идти на Защемиловскую — тело знало это и тянулось туда. Он медленно, пошатываясь от усталости, шел к трамвайной остановке и недоумевал, как это не мог понять раньше истинной природы защемиловского дома. Но в том и фокус, что точка перехода открывается только в преддверии перехода.</p><p class="p1">Я убил человека. Нет, не человека. Не человека, не убил и не я.</p><p class="p1">Впрочем, какая разница.</p><p class="p1">На него оглядывались. Видимо, заканчивалось действие ускорения. Он не мог уже проскальзывать между складками воздуха, его ступенчатыми, пластинчатыми структурами. Его уже было видно.</p><p class="p1">Брюки спадали. Невидимость можем, ремень не можем.</p><p class="p1">Возрастала разреженность.</p><p class="p1">Во взглядах было больше опасения, чем ненависти.</p><p class="p1">Дотронуться боялись.</p><p class="p1">Он чувствовал выражение собственного лица: как у Дробинина в минуты вдохновения. Ужасно, что вдохновение может быть ведомо и Дробинину. Где он теперь?</p><p class="p1">Ощущение неприятное, прав был Уэллс, невидимость болезненна. Трудней всего выходить.</p><p class="p1">Пейзаж штриховался снегом, заваливался вбок. Как быстро все.</p><p class="p1">Под снегом и Защемиловская благородна.</p><p class="p1">Его ждали, но он не предполагал, что будут двое. Почти библейская картина: у крыльца управления, на безлюдной в этот серый дневной час улице стояли в одинаково потертых пальтишках страж порога Карасев и мальчик Кретов. Карасев смотрел на приближающегося Даню слегка сочувственно, но одобрительно. Мальчик Кретов с трудом фокусировал на нем взгляд, слегка отшатывался и промаргивался.</p><p class="p1">— Что же, — сказал Карасев, — вот и все.</p><p class="p1">— Я не думал, что отсюда, — сказал Даня.</p><p class="p1">— Ну а откуда же, — буркнул Карасев. — Тут пришли к вам, попрощайтесь.</p><p class="p1">— Дядя Даня, — испуганно залепетал мальчик Кретов. — Я жду вчера, жду, вас нету… Сегодня в школу не пошел, думал, вы тут…</p><p class="p1">— Да, тут, — сказал Даня, не желая ничего объяснять. — Были, знаешь, дела.</p><p class="p1">— Я так и понял, — радостно забормотал Кретов, — бывает же, по ночам дела… Очень хорошо, что вы тут, а то я и не знал, куда бы идти.</p><p class="p1">— Лавочка закрывается, — поторопил Карасев совершенно по-клингенмайеровски.</p><p class="p1">— А эти все куда? — спросил Даня, имея в виду сослуживцев.</p><p class="p1">— Найдут, — пожал плечами Карасев. — Вам какая теперь разница?</p><p class="p1">— Но погодите, — попросил Даня. — Я не совсем… не готов…</p><p class="p1">— То есть? — переспросил Карасев. — Для чего же тогда все было?</p><p class="p1">— Нет, конечно, — испугался Даня. — Но хочется как-то понять…</p><p class="p1">— Да что же понимать. — Карасев отвернулся. — Вы там сейчас нужны. Ради вас, в конце концов, были потрачены силы. Чего бояться? Да, собственно, уже и видно…</p><p class="p1">Видно, и точно, уже было, — но совершенно не так, как раньше, когда открывались шрустры, эолики, эоны и прочие чудеса. Ясно было, что все это были декорации, наполовину придуманные самим Даней. Они домысливались по намекам и мало общего имели с реальностью, которая была теперь реальна, как никогда. Она опускалась с серых небес вместе со снегом и грозила раздавить бедную данину голову. В той реальности посверкивали багровые вспышки и доносились команды на странном лающем языке, более всего напоминающем немецкий. Слышался также шелест и хруст, заставлявший предполагать, что крутится огромное колесо, вроде подвальной электрической мельницы, которой на самом деле не было, — то есть она была, но, как выяснилось, не здесь. Этот хруст становился все отчетливей. Наверху был большой цех, и около одного из этих колес, видимо, назначалось стоять ему. Это была работа важная, из почетнейших, и его там в самом деле ждали, но ему не очень нравились отрывистые команды, и вспышки тоже несколько смущали его.</p><p class="p1">— Ну? — сказал Карасев.</p><p class="p1">— Минуту, — прошептал Даня, почти не раскрывая рта. Он попробовал увидеть Эейю или хотя бы Эолику, но вместо привычной легкости, с которой перенастраивал взгляд, ощутил лишь смутную неловкость. Все эти осмысленные картинки опадали теперь, как краска с занавеса. Сам занавес уже приоткрывался, и за ним творилось такое, что все Большие Дома по сравнению с этим были совершенно ничтожны. Большим Домам, положим, присуще было зверство, но это было человеческое зверство; в том же, что постепенно распахивалось в серых небесах, не было ни рая, ни ада, но одно сплошное и безграничное то, для чего не находится человеческих аналогий. Это было отчасти подобно окну, приоткрывшемуся при первой, самой странной экстериоризации, — но и это он тогда увидел слишком по-человечески. В действительности там не было ни борющихся сил, ни световых озер. Там была фабрика, бесконечно сложно устроенная, но не имевшая никаких иных целей, кроме как творить всю эту механику; и человеческое вечно занималось только тем, чтобы придать этой механике смысл и красоту, и даже сострадание, тогда как ничем этим там не пахло и близко. Там крутилось, хрустело и шелестело, и Дане уже мерещились гигантские ремни, приводившие в движение цепь гигантских станков, вроде ткацких; но то, что там ткалось…</p><p class="p1">Весь спектр сущего на мгновение представился ему, и в этом спектре тлела единственная узкая полоска жалкой и беспомощной человечности, намекавшей на все и обещавшей все, но, как выяснилось, ничего в действительности не знавшая. Это была плесень на точильном камне, пыль на полированном столе. Ничего человеческого не было в горнем мире, о котором люди столько грезили; сверхчеловек хотел сверхчеловечности и получил ее. Всякие розы-грезы следовало оставить. Зубчатые колеса и прочая геометрия проступали уже так отчетливо, что даже мальчик Кретов, ничего толком не видевший в снежном месиве, вздрогнул, хоть и не знал, почему.</p><p class="p1">Даня посмотрел на мальчика и поморщился. Грязный больной ребенок стоял перед ним, несчастный, смертный и одинокий; грязный больной ребенок с красными руками, спрятанными в бахромчатые рукава. Это был ребенок без особенных способностей и, пожалуй, без будущего. Он был труслив, жаден, злопамятен. Он не ладил с себе подобными. Он ничего не мог. И этот ребенок удерживал его здесь сильней, чем все, что он знал и любил; хороша участь — остановиться на пороге истинной реальности из-за грязного больного ребенка.</p><p class="p1">Разрываться меж двумя притяжениями становилось невыносимо, но команды наверху звучали уже таким откровенным лаем, что Даня поневоле тряхнул головой, словно надеясь вытрясти из памяти этот звук.</p><p class="p1">— Я не… — сказал он.</p><p class="p1">— Что такое?! — грозно переспросил Карасев. Оглядев Даню, он смягчился. — Вы это… я понимаю. Это отсюда так выглядит, пока вы здесь. А когда попадете, то все другое. Лучше гораздо.</p><p class="p1">— Я понимаю, — сказал Даня. — Но я не хочу.</p><p class="p1">— Уговаривать не буду, — сказал Карасев. — Я страж, мое дело не пускать, а тут уговаривать… Но вообще-то старались ради вас, так что нехорошо.</p><p class="p1">— Господи, разве я не понимаю! — сказал Даня. — Все я понимаю. Но, видимо, не гожусь.</p><p class="p1">— Это нам видней, кто годится, кто не годится, — пробурчал Карасев. — Мое дело предупредить: сами понимаете, если не пойдете — после этого уже никогда ничего. Ни левитаций всех этих, ни экстериори… язык сломаешь.</p><p class="p1">— А как это по-вашему? — с любопытством спросил Даня.</p><p class="p1">— А это вам знать не надо, — разозлился Карасев. — Это игрушки все. Я вот чего не пойму, — продолжил он, горячась. — Ведь все-таки у вас у всех тут сейчас такие условия. Такие, можно сказать, возможности. Самое было бы время — вырастить полноценного сверхчеловека, и мы уже, так сказать, готовили место. Но почему-то в последний момент почти все проявляют, как вы, вот это вот… тьфу, противно. Вот это вы мне объясните, а не еще что.</p><p class="p1">— А тут, понимаете, — заговорил Даня, давно никому не отвечавший на такие интересные вопросы. В его речи даже появилась прежняя детская картавость и поспешность, когда он торопился высказать еще не оформившуюся, только что пойманную мысль. — Понимаете, тут как: включился некоторый закон, такая механика. Эти обстоятельства, которые выталкивают туда — они есть, несомненно, но они же и порождают — как бы сказать? — чрезвычайное отвращение к любым проявлениям великого. И потому, понимаете, есть страх уподобиться… есть подозрение, что и там тоже такой же верховный, вы понимаете?</p><p class="p1">— А где вы видали другого верховного? — осклабился Карасев. — Чтобы тут что-нибудь крутилось, надо, сами знаете…</p><p class="p1">— Но вот я не готов, — сказал Даня. — В Эейю я бы пожалуйста.</p><p class="p1">— Куда? — не понял Карасев.</p><p class="p1">— А, неважно. Это было слишком человеческое. Ну, прощайте. Впрочем, простите. Я еще хотел… Где же мне теперь работать?</p><p class="p1">— Устроитесь, — снова пожал плечом Карасев. — Да и недолго уже. Тут, знаете, скоро будет… не до работы.</p><p class="p1">— Я чувствую, — кивнул Даня.</p><p class="p1">— Ничего вы не чувствуете, — сказал Карасев.</p><p class="p1">— А как вы думаете… — начал Даня.</p><p class="p1">— Эти уже не достанут, не бойтесь, — догадался страж, как всегда, стремительно. — Этим теперь между собой бы разобраться. Но от дальнейшего, сами понимаете, я вас охранить не могу. Мои дела тут закончены.</p><p class="p1">Он кивнул на огромный висячий замок, солидно повисший на дверях управления по учету.</p><p class="p1">— Не одобряю, — сказал он.</p><p class="p1">— Кстати, — заторопился Даня, — я еще хотел спросить… Остромов, учитель, — он действительно… или все-таки…</p><p class="p1">— Остромов? — переспросил Карасев. — Понятия не имею. Какая разница.</p><p class="p1">— Да, конечно, — сказал Даня. — Никакой. Ну, прощайте.</p><p class="p1">Карасев в последний раз оглянулся на него с выражением, для которого нет человеческих слов, — но если все-таки поискать их, это не было ни презрение, ни разочарование, ни сожаление. Это было то глубочайшее равнодушие, с каким небо смотрит на землю, — а земля-то думает, что оно ей улыбается.</p><p class="p1">Он пошел по Защемиловской прочь от истощенного идиота с падающими брюками и грязного больного ребенка с открытым ртом, и они смотрели ему вслед, пока он не исчез за густым крупным снегом, по-ленинградски мокрым, по-русски серым.</p><p class="subtitle">9</p><p class="p1">На взгляд мальчика Кретова все это выглядело так: Даниил Ильич был страшно бледен, почти прозрачен. Он шел, пошатываясь и петляя. Начальник Даниила Ильича увидел его в окно, пробормотал непонятное и вышел навстречу. Кретов побежал за ним. Перед этим он некоторое время ждал Даниила Ильича у него на службе.</p><p class="p1">— Придет, придет, — сказал его начальник, желтолицый человек со шрамом, и он пришел.</p><p class="p1">Они с начальником поговорили о чем-то, чего мальчик Кретов толком не расслышал. Речь их была похожа на птичий клекот — так клекотали ястребки, которых Даня однажды показывал мальчику. Наверное, многократно ускоренная человеческая речь в повышенном тоне была бы такова, как эти странные звуки. Впрочем, может быть, звуки были обыкновенные. Мальчик Кретов так испугался нового вида Даниила Ильича, что слушал невнимательно.</p><p class="p1">Когда начальник, недовольный, видимо, долгой отлучкой Даниила Ильича, ушел куда-то в снег и пропал из виду, Леша Кретов постоял молча, боясь напоминать о себе. Потом он потянул Даниила Ильича за ледяную руку и поразился тому, как легко она поддалась. Дядя Даня был как ватный или картонный.</p><p class="p1">— Дядя Даня! — крикнул Леша испуганно. — Дядя Даня, пойдемте!</p><p class="p1">— Погоди, — едва слышно ответил Даниил Ильич. — Мне надо отдохнуть, Леша. Нам надо присесть где-то, Леша, — и он опустился бы в снег, но мальчик Кретов отчего-то с небывалой отчетливостью понимал, что если отпустить его в снег, он так и не встанет оттуда. И он со всех невеликих сил потащил его прочь, туда, где приветно краснела вывеска диетической столовой. Леша понятия не имел, что значит диетическая и в чем ее польза, но буквы были красные, теплые, и это сулило надежду.</p><p class="p1">Даня шел за ним безвольно, едва дыша, застревая, оскользаясь. Они шли до столовой добрую четверть часа. В неожиданном тепле Даня почувствовал, что растает сейчас на глазах у мальчика или как минимум потеряет сознание, но несколько раз вдохнул и справился с собой.</p><p class="p1">Мальчик Кретов смотрел на Даню и не верил глазам. Он по-прежнему был полупрозрачен и находился словно совсем не здесь. Его оболочка как будто решала, раствориться или уплотниться, растаять или вернуть себе прежнюю осязаемость; поколебавшись — то туда, то сюда, причем временами Даня был почти невидим, — она стала наконец проступать, как фото при проявке. Леша Кретов видел этот процесс в школьном фотокружке — единственном, где ему было интересно. Даня медленно проявлялся, словно лепился из воздуха; мальчик Кретов хотел взять ему горячего чаю, но у него не было денег, а попросить у Дани он не решался.</p><p class="p1">Да, так, думал Даня, если можно было назвать мыслями эти проносящиеся перед ним тени. — Третий эон — это иметь и отдать, и другого нет. Кто это все спрашивал меня — ах да, Вал, — как воспитать человека. Вал, путь только один: стяжать и отдать, но боюсь, ты никогда не поймешь меня, потому что отдал заранее. А отдать заранее, Вал, — совсем не то, что отправиться в странствие, обойти все кругом и вернуться на прежнее место. Тот, кто не тронулся с места, достиг того же, но он совсем не то… Вот путь, другого нет, или во всяком случае другой ведет туда, где скрежет зубовный. Вот, собственно, что это было, когда Эммаус… но здесь я, кажется, впадаю в параллели недопустимые. И еще вот что — сейчас, пока я помню и понимаю: я все думал, по какому пути движется все — к упрощению или усложнению, или как-то кроме, и никогда не видел целого — но ведь целого нет. Есть одно, что бесконечно усложняется, и другое, что бесконечно упрощается, и в какой-то миг первая ветвь с бесконечной жалостью обвивается вокруг второй. Вот откуда мой бред об отце и сыне, и удаляющейся птице Рух. И вот мы стоим и смотрим вслед, среди мертвого мира; теперь он должен мне просиять, ибо что осталось?</p><p class="p1">Но он не просиял. Стоило Дане окончательно обрести видимость и застыть в прежних границах — бледный, небритый субъект без шнурков и ремня, в распахнутом пиджаке, — как суровая баба с ведром и тряпкой решительно двинулась к их столу.</p><p class="p1">— Или бярите чево, или давайте отсудова, — сказала она.</p><p class="p1">Новый страж порога, подумал Даня. Вот она и сказала все за меня.</p><p class="p1">— Мы сейчас, — робко сказал мальчик Кретов. — Мы минуточку. Пошли, дядя Даня.</p><p class="p1">— А куда? — спросил Даня, бледно улыбаясь.</p><p class="p1">— Домой, — недоуменно ответил мальчик Кретов.</p><p class="p1">— Да, да, — повторил Даня. — Домой.</p><p class="p1">Он встал и, все еще покачиваясь, побрел за мальчиком. Холодало. Воздух был прост, нельзя и помыслить, что когда-то в нем были ступени, занавеси, углы. Тяжесть, почти забывшаяся с дополетных пор, давила на позвоночник, но дышать этим воздухом было легче. Снег на улице мешался с грязью. Неба не было видно. Дрались на ходу дети, шедшие из школы. На трамвайных проводах налипли белые полосы. Пахло бензинным дымом, свежестью, смертью. Расступались деревья. Зажигались в лиловых сумерках первые окна. Черно-белый щенок кувыркался в снегу, местами сливаясь, местами выделяясь на нем.</p><p class="empty-line"/><p class="p1"><em>Москва — Артек,</em></p><p class="p1"><em>2007–2010</em></p></span></span>
