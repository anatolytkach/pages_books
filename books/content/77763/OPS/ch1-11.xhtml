<span><span><p class="p1">Как на духу, граждане, правда и ничего кроме правды! Любил это дело и практиковал, потому что, верно сказала Гертруда, при таком способе не поговоришь, не повозражаешь, не задашь глупого вопроса. Но чтобы в этот раз, в костюмерной, на голодный желудок и вот так, с бухты-барахты, — даже и в мыслях не было! Между тем она рухнула на колени, подползла, расстегнула, вцепилась — и дальнейшее, как говорится, молчание и причмокивание! Если что и воздействовало, то разве меч. Возможно, она так хотела отомстить мужу, что ей было все равно с кем. Возможно, она впервые за многие годы увидела человека своего круга. Возможно, наконец, что на нее, так сказать, была наложена рука сильнейшего духом, — но что решительно ложь, так это какие бы то ни было поползновения Остромова самого. Да никогда в жизни. Он стоял с недоумевающим и даже оскорбленным видом, опираясь на меч, до самого момента, когда не смог и не пожелал больше противиться растрате своей кундалини, — и после этого, застегнувшись, собирался уйти, не говорить с ней ни слова, просто дать прийти в себя. Но удержала и даже как бы повисла.</p><p class="p1">— Если вы в самом деле хотите познать, — проговорил Остромов, слегка задыхаясь, — я оставлю в театре записку, я приглашу вас в ложу…</p><p class="p1">— Скажите, — прошептала она, краснея, — скажите, я теперь посвящена?</p><p class="p1">— О, — сказал Остромов. — О, если бы так посвящали. Многое, еще очень многое…</p><p class="p1">— Я готова, — выдохнула она, потупившись.</p><p class="p1">Года сорок три, подумал Остромов. По доброй воле никогда, ну да уж если сама…</p><p class="p1">— Я извещу вас, — сказал он резко и вышел, унося меч.</p><p class="p1">Лучше было занести его к Лобову, дабы не пугать тещу, — там у него за неделю образовался небольшой склад полезных предметов и собранных по знакомым рукописей, — после чего намечался еще один визит, не столько полезный, сколько забавный. А впрочем, ne neglegаte, что значит — не пренебрегайте.</p><p class="p1">— Черт знает что, — весело сказал он себе, выходя на Итальянскую. — До того уже дошли, что сами кидаются.</p><p class="p1">Но в общем, чресла скорей ликовали, чем сожалели.</p><p class="subtitle">4</p><p class="p1">Пятница, когда занятий в институте не было, отводилась под старцев: Надя так про себя и называла их, не желая сюсюкать. Да и с чего бы, собственно? Она знала, что они беспомощны, обидчивы и цепляются за жизнь. Она понимала, что если она сегодня отдаст им все, что зарабатывает на машинке, а завтра опоздает на пять минут выслушивать в десятый раз никому не нужные истории их жизни, они забудут про отданный заработок и будут помнить только про опоздание. Ведь они ждали.</p><p class="p1">Почему Надя ходила по старикам, не объяснил бы никто, и меньше всех она сама. Старики думали, что это Божья помощь или общественная нагрузка. Мать Нади думала, что Наде скучно со сверстниками, и родиться ей надо было в другое время. Сама Надя не думала ничего определенного, потому что все вышло случайно: сначала надо было навещать двоюродного дядюшку, Кирилла Васильевича Осмоловского, старого гимназического учителя, потом — его подругу по петербургскому математическому обществу, Клавдию Ивановну Громову, потом прибавился приятель Михаила Алексеевича, старый артист со странной фамилией Буторов, Григорий Иваныч, совершенно не способный позаботиться о себе, но обижавшийся на любые попытки помочь: «Я еще прекрасно! Прекрасно! Владею своей головой! Я только вчера решил четыре головоломки!» (Брал он их из новой пионерской газеты). А там и супруги Матвеевы, Александр и Александра, старосветские петербургские голубки со Среднего проспекта, угощавшие Наденьку чаем из старинного фарфора и дружно, в один голос, умилявшиеся каждому ее глотку. Супруги Матвеевы были неотличимы и медоточивы, их Надя не любила и пребыванием у них тяготилась, но они так за нее цеплялись, что она не находила сил оторваться наконец от этой пары, которой было легче, как-никак двое.</p><p class="p1">Так это и отложилось у всех: Надя и старцы. Вроде Сусанны и старцев, но с обратным знаком. Все знали, что есть Надя и что если кто из бывших сляжет, можно протелефонить, передать через третьи руки, и она принесет поесть, зайдет в аптеку, попросту поговорит, когда в пустой комнате начинаешь полемизировать с клопами.</p><p class="p1">Третьего апреля с утра Надя привычным маршрутом направилась к Осмоловскому. Его просьбы были самые простые: журналы, если удастся — книги. Он был кроткий старик, благодарный за все.</p><p class="p1">— Что, Наденька, — спрашивал он, — отроки преследуют?</p><p class="p1">Для него все младше пятидесяти были отроки. Самому было семьдесят пять.</p><p class="p1">— Никому я не нужна, — отвечала Наденька радостно, зная, что ему будет приятно, но не умея скрыть, что нужна и любима, пусть не теми, а все-таки лучше, чем ничего.</p><p class="p1">— Это вы оставьте. С каждым днем расцветаете.</p><p class="p1">— Ладно, ладно. Рассказывайте ваши новости.</p><p class="p1">— Да какие новости… стариковские старости…</p><p class="p1">Кирилл Васильевич кокетничал. Уйдя от дел, он сделался наблюдателем природы. Скудную прибавку к пенсии давали ему уроки — кто сколько принесет, платы не назначал, — а в прочее время старый горожанин созерцал жизнь дрозда и скворца, клена и настенного лишайника Xanthoria parietina, и замысливал труд о сожительстве человека с природой, о городской природе как высшей ступени эволюции. Та самая травка, которую люди счищали, собравшись в одно небольшое место, а она все пробивалась и т. д. сквозь первую главу лучшего стариковского романа, представлялась ему продуктом сосуществования природы и человека, каковое сосуществование — без борьбы, с взаимным приспособлением, — считал он венцом бытия, в том числе и социального. Вот и он ведь приспособился, а сколько всех вымерло. В сущности, он наблюдал природу, оправдывая себя. С Наденькой он об этом не говорил, а она не догадывалась. Иногда ему являлась ужасная мысль о плате за приспособление — о том, как крив и грязен городской клен, как помоечна городская птица, — но не оставлять же город без жизни! Да, они таковы, зато благодаря им в сплошном камне есть что-то живое. Ему раскрывалась прелесть городской живности, которой он вовсе не замечал, спеша в частную мужскую гимназию Коробова. Каждый день расхрабрившейся весны приносил Кириллу Васильевичу немудрящие открытия: оказывается, скворец прилетает первым, а он никогда не задумывался об этом; и «Красная газета» сообщила, как о великом открытии, что первое время скворец издает звуки тропических птиц. Это он в Африке набрался, вообразите, Наденька! В Ленинграде обнаружились крокусы, цветут себе преспокойно на пустыре, на месте деревянного дома Турищина, разобранного на дрова в восемнадцатом году. Наконец, после долгих поисков Осмоловский идентифицировал птичку, чей голос часто сопровождал его весной в гимназию, но ему все было недосуг разобраться; он и биолога спрашивал, но тот по его бестолковой имитации не смог ничего определить. Теперь же по справочнику Мухина «Певчие птицы Петербургской губернии», приобретенному на развале, он определил, что это был, подумайте, Наденька, зяблик! Причем не вся его трель, а лишь первое колено, — всего же их строго три, как в сонатном построении; но Осмоловский обращал внимание лишь на радостное вешнее пи-инь, пи-инь, столь же верную примету весны, как подсыхающая мостовая. А есть ведь своя прелесть и в других двух частях, особенно в росчерке, в этом эффектном — «не слушаете, ну и как хотите!».</p><p class="p1">— Я теперь все больше благодарю, Наденька, — умиленно говорил Осмоловский. — Все больше благодарю вас, но — не обессудьте — и травку, и вот хоть зяблика. Как неблагодарно было не знать! А вот та травка, между прочим, которой все мы так радовались и которую не знали даже по имени, эти странные лапчатые листья, вылезающие чуть не первыми, собирающие росу, так сказать, в ладошку. А ведь это манжетка, лекарственная трава. Ее называют даже недужной, она от любых грудных болезней. Из самого детства помню я ее на еще черной земле, и цвета весны для меня тогда были — зеленый и черный. Потом забыл все, потому что детство близко к траве, ребенок мал ростом и все видит, а мы с вами большие, нам эти маленькие прелестные друзья не видны. Эта манжетка когда-то была в самом деле мой друг, и я радовался ее прихотливым вырезам. И сейчас вот, видите, вернулся к детскому состоянию, — и он хихикал над собой.</p><p class="p1">Наденька слушала его в ответном умилении, думая: какая чудная, кроткая старость. Вот живой урок старения, вот как надо — с тихой радостью, с благодарностью цветочкам, птичкам, — отходить от дел и возвращаться в детское состояние. Кто не вернулся домой, тот заблудился в пути. Ребенок знает природу, потому что недавно вышел из нее, — старик изучает ее перед возвращением туда, во все эти манжетки; и какая здесь твердая вера в свое продолжение! Осмоловский был наденькин любимый старик, и для себя она мечтала о такой же старости, лучше бы, конечно, в окружении внуков. Не вина Осмоловского, что единственный сын его от первого брака давным-давно отбыл со взбалмошной матерью в Харьков, к ее новому избраннику-музыканту, и знать отца не хотел, наслушавшись рассказов о скучном чудаке.</p><p class="p1">Осмоловскому почти не требовалось заботы. Надя выслушивала очередную порцию его наблюдений над городской природой, поила чаем, оживляя комнатушку женским ароматным присутствием, смахивала пыль, иногда протирала окна — и отправлялась к Самуилову, представлявшему куда менее приятный лик старости.</p><p class="p1">Самуилов был старик нервный. Больше всего он опасался, что чего-нибудь лишат и в чем-то обманут. Вот уж подлинно лишайник, как бишь, ксантория, консистория. Пенсию пересчитывал трижды, и почтальон, по самуиловской немощи навещавший его дома, ждал с выражением снисходительным и отчасти брезгливым, с каким большинство новых людей смотрели на старых. Самуилов был некогда музыкантом румянцевского оркестра, знаменитого в восьмидесятые годы, но за гобой давно не брался и за музыкой не следил, приговаривая, что теперь все один обман. Жизнь его целиком сосредоточилась на поисках обмана. Его желали обмануть торговцы, уличные папиросники, соцобеспечение и дворник, и даже Наде он верил через раз. Самуилов завелся случайно, Надя как-то спасла его от гнева вагоновожатого, с которого Самуилов тщился получить назад плату за проезд — сел не в тот трамвай по собственной неосторожности, но уверял, что его ввел в заблуждение именно вагоновожатый, не объявлявший остановок; еще немного — и старика бы прибили, но Надя отвезла его домой и утихомирила рассказом о другом вагоновожатом, который, вот гадина, недавно заставил старуху из бывших уступить место уставшему после трудового дня пролетарию. Самуилов полюбил Надю, но и ее подозревал в намерении поживиться за его счет, как подозревают соседей все люди, у которых ничего нет; вообще чем у тебя меньше, тем ты опасливей. Выбирая хлеб, он щупал его долго, придирчиво, чего опасался — неясно. Семьи у него никогда не было, была тяжелая и долгая связь, о которой он часто вспоминал, говоря, что женщина съела его жизнь, — и косился на Надю, как бы она не доела. Но он был беспомощен, и надо было вытаскивать его на краткие прогулки, выслушивать его скрип и скрежет, истории о соседском Ваньке, который сыпал табак и перец ему в карманы пальто (Самуилов сроду не курил), — в сознании Самуилова, кажется, путалось несколько Ванек, из разных годов. Надя иногда приносила ему сосательных леденцов. Самуилов встречал ее всегда хмуро — успевал за время ее отсутствия выдумать ужасное, — и оттаивал нескоро, а иногда не оттаивал вовсе.</p><p class="p1">— Ну Василий Степанович, — говорила Надя с тоской. — Ну что я на этот раз сделала?</p><p class="p1">— Каждый сам знает, в чем он виноват, — хлюпал Самуилов из угла.</p><p class="p1">— Да ладно вам. Не сердитесь. Я долго не была, потому что коллоквиум.</p><p class="p1">— Мне не надо, мне вовсе не надо, — сипел Самуилов. — Я не звал никого. А вот что вы клавир Михаловича взяли и не отдаете, так это стыдно. И, главное, вам на что? Ведь вы не играете?</p><p class="p1">— Какой клавир Михаловича? — Надя не знала, плакать или смеяться.</p><p class="p1">— Такой клавир, третий концерт. Он здесь был, — Самуилов указывал на пыльную полку, которой ничья рука не касалась давным-давно; прибираться у себя он не позволял. — Если думаете продать, что ж, вещь редкая…</p><p class="p1">Надя кидалась разубеждать, хотя Самуилов отлично знал, что никакого клавира Михаловича у него не брали, да и не было клавира, румянцевский оркестр один раз только исполнял «Геро и Леандра», — но надо же было в чем-то подозревать. И он внушил себе, что клавир был и что Надя взяла. Как жемчужница оплетает перламутром песчинку, так Самуилов всякого человека, вторгавшегося в его мир, оплетал подозрениями, и вскоре Надя была у него виновата во всех пропажах, вымышленных и мнимых, но без Нади эти подозрения вовсе не к чему было привязать, и они болтались в бездействии, причиняя неотвязное беспокойство. У Самуилова воровали все, и потому у него оставалось все меньше, не было вот уж и вовсе ничего, а главное — кто-то воровал его дни, и этого Самуилов понять не мог. Вся жизнь была одна кража. Надя выходила от него с облегчением и долго, радостно, бездумно шла по улице, где так всего было много: трамваи, лужи, люди, и ничего не убывало, все только перетекало из одного в другое.</p><p class="p1">Клавдия Ивановна Громова тоже была из математиков, с соболевских курсов, но ныне маниакально сосредоточилась на сыне и ничего другого не хотела знать. Она, кажется, одно время даже рассматривала Надю как возможную наложницу женатого Игоря, но быстро смекнула, что Надя для него простовата. Игорь на надиной памяти был у матери единственный раз, посещениями не баловал, — скучный, рыхлый, сырой мужчина, обиженный на всех, долго рассказывавший о каком-то подсиживании, хотя кому было подсиживать его с должности инженера Ленинградского обойно-бумажного треста, сокращенно Лобут, и сам Игорь был лобут, с огромным лбом, одинаково часто достающимся мыслителям и кретинам. Пил чай с отвратительным прихлебываньем (Клавдия Ивановна ласково повторяла: не хлюпай). Восторженность по поводу Игоря, уже и в детстве поражавшего всех математическим складом ума и даже именем намекавшего, что рожден для известности, — не мешала Клавдии Ивановне желчно примечать все за всеми и даже разбираться в политике: однажды, когда Надя спросила ее — дабы что-нибудь спросить — о последствиях июльского разгрома консульства в Берлине, Громова сказала: ах, оставьте, ничего не будет. Им надо с кем-нибудь торговать, а после нашего бойкота там рухнет последнее. У меня, между прочим, сестра в Берлине. Близнец, хотя совсем непохожа. Если вам интересно, Надя, добавила она, Россия и Германия ведь близнецы, между ними возможны два типа отношений — полная ненависть и совершенное слияние, и у нас с Валей бывало и так, и так. Война у нас с Германией уже была, ничего хорошего не вышло, а теперь ждите вечного союза. И как оказалась проницательна! В самом деле, уже в октябре сняли все ограничения и опять торговали как ни в чем не бывало. Проницательность ее не распространялась только на сына — тут она упорно не желала знать очевидное. Надя забежала поздравить ее под Новый год — последнее было невыполненное обязательство, а Жуковские всегда старалась тридцать первого января все доделать, завязать все узлы, — и застала одну, со скорбно поджатыми губами. Игорю надо побыть с семьей, он и так их почти не видит. «Клавдия Ивановна, и вы будете в Новый год одна? Пойдемте к нам!» Та почти оскорбилась: «Надя, не надо никаких благодеяний. Я люблю быть одна. Вы с годами это поймете. Это сейчас вам непременно нужны люди. А когда-нибудь вы увидите, что лучше вообще без людей. Пока можешь обслуживать себя — не навязывайся никому». Как, от какого страшного одиночества можно выдумать такое?! «Но Клавдия Ивановна, ей-Богу, вы никого не стесните…» — лезла со своими предложениями, как дура, в девятнадцать лет никак не научится себя вести. Громова всерьез оскорбилась: «Я?! Но это чужие люди стеснят меня… Как можно праздновать с чужими»… — еще и повторила, подчеркнула чужесть, но Надя не обиделась: добрые чужие не заменят злых своих, в этом все дело. Громова тогда поняла свою резкость и на прощание поцеловала Надю в лоб, и Надя подумала — что ж, вот еще один урок, спасибо: он не в том, конечно, чтобы не лезть с назойливым добром, лезть надо, десять раз ошибешься, а в одиннадцатый попадешь на застенчивого, кто не решался попросить, — нет, он в том, как надо стареть. Не обязательно птички с цветочками, иногда и вот такой стойкий оловянный солдатик — самый славный путь. Она отчего-то чувствовала, что все это ей со временем пригодится, и никогда не сердилась на Громову, хотя и в этот раз пришлось выслушивать, как тонко Слава выбрал ей платок ко дню именин. Именины были в январе, Надя приходила в марте, уже выслушала все про этот платок, но Клавдия Ивановна, известная памятью на цифры и даты, словно начисто забыла, как уже красовалась в нем. Цена платку была тьфу, и сам он, зеленый с красными огурцами, не шел ей ничуть, а впрочем, Надя мало в этом понимала. Есть у человека любовь, и слава Богу. Клавдия Ивановна перед остальными была счастливая старуха.</p><p class="p1">Теперь она говорила о том, как мало Лариса любит Игоря, хотя Надя полагала Ларису жертвенной героиней — выносить соседство Игоря было подвигом для всех, кроме матери. Лариса плохо готовила, не умела выслушать, утешить — «Надя, когда выйдете замуж, помните, что с мужем надо говорить. Это важней кухни, важней сорочки, — говорите, умейте выслушать, вытянуть, но не позволяйте носить в себе… Я никогда этого не умела, вся была в работе, считала себя Марией Кюри, портрет ее держала на столе. И Андрей Иванович ушел, и — что ж, я не виню. И через год умер. И хотя я должна была — нет, не радоваться, но хотя бы — но я все равно считала, что виновата. Если бы ему было хорошо со мной, он бы не ушел и не умер. Лариса совсем не умеет говорить, не умеет слушать — но она, в отличие от меня, еще и не знает, кто такая Мария Кюри».</p><p class="p1">Надя слушала и жалела никогда не виденную Ларису, и думала: если так, Боже мой, если так… Если замужество состоит из того, чтобы слушать Игоря… Она готова была выносить старцев — потому, во-первых, что видела их не ежедневно и даже не еженедельно, а во-вторых, старость способна облагородить хоть что, и фарфоровую кошечку, и трамвайный билет, и человеку придает тихую прелесть (она иногда тайно спрашивала себя: а узнай ты, что Осмоловский сломал несколько жизней, а то и убил кого-то, — стала бы ты умиляться его цветочкам и птичкам? Бывало ведь, что убийцы собирали богемский хрусталь, любовались белочками, вышивали крестиком? — и отвечала: старость сводит счеты, на твоих глазах человека стирают без остатка, как не сострадать… хотя в злодейство Осмоловского могла поверить разве что гипотетически, в сказочном сюжете, их она вечно сочиняла и бросала без дела). Даже в древних помпейских гадостях есть благородство — все-таки были под пеплом, да и сколько лет прошло. Игорь был еще не стар, сорок пять, в самом отвратительном возрасте начинающейся беспомощности, уходящей из-под лап почвы — когда уже чувствуешь полную свою никчемность, но еще не решаешься ни гордо в ней признаться, ни трогательно отвлечься. Бедная Лариса, думала Наденька, глотая жидкий громовский чай. Ей, у которой Игорь есть круглые сутки, хуже, чем тебе, Клавдия Ивановна, тебе, которая за ежеминутную близость этого гидроцефала все бы отдала.</p><p class="p1">К Буторову Надя попала уже измученной, и Буторов утомил ее окончательно — как, впрочем, всегда. Буторов всю жизнь играл комических простаков и сам стал комическим простаком, однако комизм его к старости перешел во что-то ужасное, для чего не было и слова. Если правду говорят, будто смех и страх растут из одного корня, Буторов был идеальным комиком, страшным. К вязкому его многословию, к старческому подробному изъяснению очевиднейшего, прибавлялась мания вежливости: он всех называл по имени-отчеству и столь же подробно это аргументировал — «во-первых, всякий достойный звания человека не должен стесняться родителя и знать свои корни, во-вторых, я полагаю необходимым сохранять остатки этикета, в-третьих, по соотношению имени и отчества можно многое сказать о человеке, и ваше, например, имя и отчество, дражайшая Надежда Васильевна, по сочетанию надежды и славы сулит вам множество радостей»…</p><p class="p1">Он так был сосредоточен на себе, зренье его так сузилось, что другие люди интересовали его ровно в той степени, в какой могли ему послужить или повредить. Он жадно ел, тщательно пережевывал, усердно усваивал; непрерывно проверял остроту своего ума, доказывая себе и всем, что может еще разгадать задачку для первоступенника; вообще непрерывно утверждал свое присутствие, напоминал о нем, требовал внимания у десятков случайных людей. Рассылал в газеты письма с негодованиями по любому поводу, воспоминаниями и раздумьями — не печатали никогда, но тщательно подшивал ответы; всякий ответ доказывал, что Буторов еще существует. Часами готов был зачитывать Надю дневником наблюдений, писал витиевато, в стиле худших старых репортеров, многословных, сочинявших словно после сытного обеда, за сигарой и ликерами. В прошлый раз просил достать лавровишневых капель от сердечной слабости, долго и подробно объяснял, в чем выражается сердечная слабость: «Знаете, это как если бы в ровной работе сердца наступил вдруг перерыв, но не окончательный, а как бы его потянут ровно для того, чтобы вы действительно испугаетесь; и пока действительно не испугаетесь, не заработает». Лавровишневых капель она не застала, хотя честно обошла три аптеки.</p><p class="p1">— Не поверите, Григорий Иванович, как корова языком…</p><p class="p1">Она представила себе больную жадную корову и улыбнулась.</p><p class="p1">— Но как же?! — воскликнул Григорий Иваныч и театрально развел руками. — Но что же это?! Неужели вы не понимаете, как мне это нужно?!</p><p class="p1">— Понимаю, но что же я могу…</p><p class="p1">— Нет, это положительно непонятно! — все разводил руками и шаркал ногами Григорий Иваныч, в брюках с бахромой, в серой фланелевой рубашке, подтяжках, шлепанцах. — Это непостижимо. Ведь вы знаете, что мне это нужно жизненно. Вы были у Пеля?</p><p class="p1">Раньше Григорий Иваныч жил рядом с аптекой Пеля и, как все люди ограниченного опыта, увязывал любые новости с тогдашними впечатлениями: лучшая аптека была аптека Пеля, лучшая зеленная лавка была лавка армянина Егибяна, лучшая кондитерская была кондитерская Чашкина. Вместо кондитерской давно была чайная, армянин Егибян куда-то делся, может быть, погибян, но аптека была, ныне девяносто седьмая. Надя туда заходила, лавровишни не нашла.</p><p class="p1">— Но как же, — повторял он. — Ведь вы не знаете, что это такое. Это как если бы в ровной работе сердца…</p><p class="p1">Надя выслушивала, кивала и тоже разводила руками. Она давно поняла, что защититься от Буторова можно только повторением его жестов и интонаций — как, говорят, для некоторых пауков смертелен их собственный яд. Она никогда не понимала, как это может быть, но где-то читала. Вероятно, он в хвосте, отделенный от прочего организма специальной перегородкой. Об этом она думала, пока Буторов излагал ей особенности своих сердечных пауз.</p><p class="p1">— Представьте, — говорил он, — я вызвал врача. Я сказал им, что старый человек и заслуженный и все, что в таких случаях, и что я не могу же сам! К ним протелефониться — легче удавиться, но я вызывал три часа кряду. Приходит врач, молодая, младше вас, ясно, что голова пустая, ни малейшего внимания, ничего. «Не страшно, это нервное». (Бедный врач, думала Надя, бедная врач, как правильно? Она пыталась утешить, и в самом деле есть люди, которых это утешило бы, — но не Буторова, нет, ему чем страшнее, тем лучше. Больше внимания, перспектива заботы). Я говорю — да, разумеется, но в ровной работе сердца… (Пересказал). Она отвечает, что в моем возрасте это естественно! Я говорю: да, но и умирать в моем возрасте естественно! Я ей показываю суставы. Она говорит: сухое тепло, и пройдет. Я говорю: но если сустав воспален, то никаким сухим теплом этого снять невозможно, это возможно только усугубить! Она: разрабатывайте. Я говорю: но как же! Но что это! Я не могу согнуть здесь и здесь, а вы говорите — разрабатывайте, да это немыслимо, да я напишу! И я написал им, что этот врач не может, не должен, не имеет права… Если я не получу ответа, я напишу Семашко, а если получу, то перешлю его Семашко…</p><p class="p1">И все время, пока Надя не слишком ловко чинила его единственную куртку, он излагал ей эпизод вчерашней битвы с врачом. Другую битву Буторов вел за приписку к поликлинике Союза театральных работников, но театр-буфф «Фальшивая монета», где он комически простачил до семнадцатого года, был упразднен, а в новых он не служил, и потому никто не желал, не сознавал, не удосуживался… Он писал к Андреевой, Тарасову, Чарнолускому, ответы копировал и подшивал к новым письмам, ответы копились в папках, его ответы на ответы могли бы составить книгу, и что это была бы за книга! Буторову дороги были малейшие следы его существования, и потому он, верно, не выбрасывал даже остриженных ногтей — это Надя допридумывала, спеша по вечернему городу к супругам Матвеевым.</p><p class="p1">Наде всегда представлялось, что сразу после ее ухода они принимаются друг на друга скалиться, щериться, шипеть, обращаются в фурий, горгулий или как это еще называется, — она в Венеции видела множество таких над воротами. Драконы Матвеевы. Они так умильно называли друг друга Сашеньками, так на два голоса нахваливали Наденьку, ее румянец и белизну, ручки и ножки, что Наде хотелось поскорей покинуть гостеприимное гнездо седовласых, неотличимых Матвеевых. Сашенька, Шуронька. Александр Васильевич был в прошлом инженером на канонерском судоремонтном заводе. Они с Александрой Михайловной были бездетны. Александра Михайловна была в юности кокетка, баловница. Александр Васильевич был большой шалун. Улыбки не сходили с их уст, даже седина у обоих была одинаково розоватой. Они были одного роста, оба носили желтое. Страшно было подумать, что кто-нибудь из них умрет раньше. Они были гномы, людям с гномами неловко. Наденька их посещала потому, что они просили, но не чаще раза в месяц: просьбы у них были самые простые — отнести белье в прачечную за углом, Александру Васильевичу вследствие грыжи запрещен был подъем малейших тяжестей, — но благодарности были медоточивы, велеречивы, о себе они не говорили, а все только об умнице и красавице Наденьке. Добро и уют сочились из их глазок. Все это было похоже на оперу, на музыкальную драму, и пока голубок и горлица ворковали, Надя мысленно записывала ее.</p><p class="subtitle">СУПРУГИ МАТВЕЕВЫ</p><p class="subtitle">Опера</p><p class="p1">Декорация изображает комнатку примерно эдак с мышиную норку, рассчитанную на крупную мышку. За круглым столиком на шатком стулике сидит Наденька, пьет чай из саксонского фарфора. Перед Наденькой, упорно отказываясь присесть, стоят супруги Матвеевы.</p><p class="p1">АЛЕКСАНДР ВАСИЛЬЕВИЧ. Ах, Сашенька! Взгляни, какая Наденька нынче румяная! Аная! Аная!</p><p class="p1">АЛЕКСАНДРА МИХАЙЛОВНА. Какие у Наденьки щечки.</p><p class="p1">АЛЕКСАНДР ВАСИЛЬЕВИЧ. Взгляни, какие у Наденьки ручки. Штучки.</p><p class="p1">АЛЕКСАНДРА МИХАЙЛОВНА. У Наденьки ножки.</p><p class="p1">АЛЕКСАНДР ВАСИЛЬЕВИЧ. Две, две!</p><p class="p1">АЛЕКСАНДРА МИХАЙЛОВНА. Наденька, верно, баловница.</p><p class="p1">АЛЕКСАНДР ВАСИЛЬЕВИЧ. Ах, Сашенька! И ты ведь была баловница, ица, ица!</p><p class="p1">АЛЕКСАНДРА МИХАЙЛОВНА. Шалун! Шалун!</p><p class="p1">Дивертисмент. Надя пьет чай. Это пятая чашка за день. Наденька лопается.</p><p class="empty-line"/><p class="p1">Выходило все-таки не так смешно, как в жизни. Вот Женя добавил бы какой-нибудь оглушительной, невозможной ерунды — и сразу стало бы жизнеподобно. Но чтобы придумывать, как Женя, надо было жить, как Женя, а этого Надя не хотела. Тоже вот сюжет: желая писать, как кто-нибудь, начинаешь жить, как кто-нибудь, влюбляешься в такую, как Гаянэ, портишь себе всю жизнь. А штука была не в Гаянэ, и даже не в таланте, а штука была — внимание! — в том, что каждое утро Женя наступал в одну и ту же лужу, в луже было все дело, а вы говорите, Гаянэ. Надя всегда так отключала слух, когда ей было неловко.</p><p class="p1">Парочка Матвеевых жила в мире грозных опасностей, надо было задобривать углы, окна, чтоб не дуло, всех продавцов, которым они улыбались, всех докторов, которых нахваливали, всех соседей, которым они старались услужить. Главным оружием стариков Матвеевых был мед; и хотя всем они были противны, а приемы их — ясны, их брезгливо щадили, и они доживали свой век безопасно, двое обреченных путешественников в стране каннибалов, путники, улыбающиеся направо и налево.</p><p class="p1">После Матвеевых Наде захотелось к Михаилу Алексеевичу. Она терпеть не могла Игорька, и сам Михаил Алексеевич был ей не до конца понятен — он радовался ей, приветствовал, разучивал с ней песни, читал ровным голосом непонятные, но явно хорошие стихи, словом, благоволил ей, но как благоволят ребенку. Ей иногда невыносимо было слышать его разговоры — он бывал циничен, как лорд Генри, и в самую доброту его поэтому не верилось. Для него не было правил, и она не знала, как с ним говорить, — но после липкого матвеевского меда хотелось горького чая, и у Михаила Алексеевича этим чаем угощали.</p><p class="p1">На Спасскую она ехала долго и тоскливо, и рожи в трамвае были такие, что страшно глаз поднять, — и Надя думала о том, что ходит к старикам не из милосердия и не из страха перед собственной старостью, не в надежде задобрить судьбу и вызвать неведомого будущего визитера — приходи, милый человек, не оставь меня в моем ничтожестве, скажи человеческое слово, а то уж голоса слышу… Это не было покупкой будущего, ни даже попыткой заполнить день чем попало, раз уж не дано ни творчества, ни любви: прекрасно бы она нашла, что делать, с любым кавалером отправилась бы гулять, и день чудесный, уже длинный, и новая картина в «Колизее», «Крест и маузер», с Ниной Ли, — но, видно, здесь было что-то поглавней. Темнело, и кренился трамвай, и в подворотнях, казалось, сверкали чьи-то красные глаза: вечно эти сказки, остров доктора Моро… Наш город мил и уютен, и все-таки мрачен, и скоро нас вытеснят отсюда. В другом месте, может быть, они бы так не расплодились. Здесь сырость, испаренья болот, здесь вообще не надо было ничего делать… И к старикам-то ходила единственно потому, что — старые, глупые, ничего не видящие в мире, кроме себя, — они все-таки были люди, а эти были совсем уже нелюди, и здесь, в трамвае, она могла себе в этом сознаться. И долго еще, поднимаясь по лестнице на Спасской, все оглядывалась. Как это другие любят сумерки? Сумерки — самое тревожное, самое враждебное время. Уж стемнело бы.</p><p class="p1">У Михаила Алексеевича были гости, и это значило, что опять с ним толком не поговоришь. А между тем он знал что-то такое, что Надя всегда старалась выведать в надежде найти опору, что-то, позволявшее ему спокойно смотреть вперед и не мучаться прошлым, как мучалась стыдными воспоминаниями Надя. При гостях он, конечно, ничего бы не выдал. Гости были из любителей Луны, как называл он понятно кого непонятно почему.</p><p class="p1">— На-аденька, — протянул он с обычной ласковостью. — Входите, друг милый. Ночами-то холодно еще.</p><p class="p1">— Весну, — сказал Стечин, длиннолицый молодой человек в странных клетчатых штанах, — будто в России делали: на свету еще ничего, а когда не видно, то можно кое-как.</p><p class="p1">— Нет, я чувствую, скоро уж тепло, — утешил Михаил Алексеевич. — Грудь болит, к перемене.</p><p class="p1">Игорек взглянул на него со странной, почти сыновней заботой. Близ Игорька сидела красавица, каких не бывает. Лицо ее было гордое и твердое, приспособленное к гримасам легкой брезгливости — не надо, уберите, — и тем необычней, а пожалуй, что и прелестней было выражение рабской нежности, написанное теперь на нем. Надя догадалась, что это была Псиша, Ниночка Аргунова, последняя возлюбленная Мигулева, а теперь безответная, хоть, может, и не безнадежная поклонница Игорька. У Игорька и прежде случались романы, на которые Михаил Алексеевич смотрел в самом деле как отец на шалости взрослого сына, — но Ниночка Аргунова вознамерилась, кажется, разрушить идиллию. На самом деле дурных намерений у нее не было, она вообще была не тщеславна, ибо кому от рождения дано все — тому лишний раз самоутверждаться не нужно. Просто все уже было, а такого, как Игорек, не было, — а ведь Ниночка Аргунова могла окончательно и насмерть влюбиться только в то, чего не бывает. Вот же несправедливость: Мигулев, храбрый человек и неоцененный поэт, был все же людской породы и увлечь Аргунову не мог: храбрости она не ценила, а стихов не понимала. А Игорек, существо ограниченное, самовлюбленное и вдобавок недопроявленное, был не вполне человек и потому действовал на нее магически: она должна была его добиться и никому не отдать; и по взглядам, которые кидал Михаил Алексеевич на эту пару — явно уже пару, а не соседей по столу, — ясно было, что он понял и смирился. И хотя Надя понимала, что это хорошо, она не понимала, как это возможно.</p><p class="p1">Смирился-то смирился, но был не в духе, а потому холодно говорил и холодно слушал, и только поддакивал, когда кто-то из гостей изрекал особенно тонкую гадость; по сочетанию грубости и тонкости все они были, конечно, люди галантного века и потому так любили этот век, что под всей его позолотой явственно чувствовался навозец. Поэтому Слендер писал про Казанову, Прудовский — про Екатерину, а сам Михаил Алексеевич — про Калиостро.</p><p class="p1">— Что, Наденька, опять благотворите? — тихо спросил вдруг Михаил Алексеевич, чувствуя, что публичный разговор на эту тему был бы ей неприятен.</p><p class="p1">— Ну, что-нибудь надо делать, — сказала она с вымученной улыбкой.</p><p class="p1">— Не хотел бы я долго жить, — сказал Михаил Алексеевич. — Все думаю, как хорошо сделали те, которые рано умерли.</p><p class="p1">— А стихи? — спросила она.</p><p class="p1">— Что стихи? Больше, чем можешь, не напишешь. А останется один, самый глупый.</p><p class="p1">— А дети?</p><p class="p1">— Дети, дети, лучше не имети. Хорошо делает тот, кто ничем не обременяет других и ничем не связан.</p><p class="p1">— Это вы сейчас так говорите.</p><p class="p1">— И всегда то же самое говорил. Нечего вам около старцев, идите к молодым.</p><p class="p1">— Молодые все дураки.</p><p class="p1">— Глупости. Старый-то дурак глупей молодого. У молодого жизнь впереди, глядишь, что-то получится. Или вы третесь около немощных, чтобы попасть в Царство небесное? И так попадете, вон вы какая славная.</p><p class="p1">— Нет, не для этого. Но, во-первых, это действительно нужно бывает одиноким, а во-вторых, я целый один день в неделю чувствую, что во мне есть смысл.</p><p class="p1">— Это не в вас, — сказал Михаил Алексеевич. — Это опять вне вас, а душу свою вы этим никак не улучшаете. Кто сказал вам, что вы делаете этим старикам добро?</p><p class="p1">Надя знала, что сейчас начнутся дефиниции — что есть собственно добро; она таких разговоров не поддерживала, потому что не умела. Но Михаил Алексеевич не стал мелочиться и пропустил ее лепет мимо ушей.</p><p class="p1">— Я думаю, — говорила она, — если каждый…</p><p class="p1">— В мире станет ни охнуть, ни вздохнуть. Молодые будут гибнуть, а старик — кому нужен? Нет, Наденька, живите для себя, не заботясь ни о каком смысле, пока он сам к вам не явился. А добро пусть делают те, кто больше ничего не умеет.</p><p class="p1">Прелестный человек, подумала она с неприязнью, но какой холодный человек. Он в самом деле принадлежит к особой породе. Многие ее табу для нее вовсе ничего не значили. И человека, сидевшего в гостях прямо напротив нее, Надя недолюбливала, ибо чувствовала за его вечными шутками серьезную, нешуточную гниль: дьявол знает, какую выбрать брешь. Относительность страшней всякого фанатизма. Неретинский был личность известная. То есть как собственно известная? Среди ленинградской молодежи, той, которая от одних отстала, а к другим не пристала, среди отпрысков мелкого дворянства, музыкантства, учительства, среди тех, кого перелом застал в книжном, по большей части циничном отрочестве, — он был известен и даже любим, но ведь что это была за среда? Надя ее ненавидела временами, как ненавидят только своих; лишенные почвы, они выбрали иронию, насмешку всех надо всем, и она сомневалась, что в должный миг им этого хватит. А что должный миг настанет — она знала непреложно, потому что воздух сгущался.</p><p class="p1">Она недолюбливала Альтергейма, хоть и жалела его, — и, может быть, именно за то недолюбливала, что не могла как следует пожалеть: в самый миг, когда, казалось, он становится виден, ясен и трогателен — он это чувствовал и вдруг оборачивался чем-то иным, как джокер. Ей не слишком нравился Стечин, этот, в клетчатом, говоривший, что из всей мировой литературы стоит читать две-три строчки из Чосера, одно предложение из Пруста и раннего Демьяна Бедного; у Стечина была пресерьезная теория на этот счет — он доказывал, что в искусстве главное цельность, монолитность, а все тексты, написанные до Барцева, отличаются рыхлостью и пестротой. «Правильный роман — только у Барцева. Вот где монолит — слова не всунешь». Он цитировал оттуда, но Надя ничего не запоминала; чувство было, что Барцев пишет сначала обычную фразу, потом выворачивает наизнанку ее смысл, а потом переписывает словами, максимально удаленными от первоначальных, совсем из другого пласта. Получалось что-то вроде: «Басилевс, изогнуто выхватываясь из натужных смычек с пестрообутыми, бесчинствовал драконически, изъязвляясь»… «Барцев в лепешку разбивается, чтобы слово зазвучало», говорила Лика Гликберг, чьих сентенций никто не понимал. «Как Бедный», вставлял Стечин, и Лика важно кивала.</p><p class="p1">Так вот, Неретинский. Он в этой среде был центр, если может быть центр в столь зыбкой, неоформленной субстанции; центров, впрочем, было много, но никого не цитировали с таким почтением, ни о ком не распространяли столько слухов. Верней, слухи — это о тех, чей порок скрывается, таится, а на Неретинском все было написано крупными буквами. Он был из рослых, атлетических уранистов, всем видом опровергающих мнение о вечной изнеженности людей этого сорта; тоже захлест, но в другую сторону. Квадратные плечи, пудовые кулаки, каких не бывает. Крупно было в нем все: длинное, несколько обезьянье лицо, длинные пухлые губы, всегда иронически растянутые, и ел он много, не полнея, и пил, не пьянея, и деньги водились, но никто не знал, откуда брались. Вот еще была важная черта этой среды: одним они прощали все, другим — ничего, но это потому, что они чувствовали силу, уже увидели действие этой силы и всегда теперь боялись ее. Они не прощали только слабости, вот почему Надя не любила этой среды и брала сторону презираемой немощи. Она никогда не рассказывала о походах к старикам, это стало известно помимо ее воли. Сначала вышучивали, потом, может быть, зауважали, как уважали всякую последовательность, — а что еще, к слову, уважать во времена, когда ни добра, ни зла не осталось? Им нравился Барцев, которого нельзя было читать, — но потому и нравился, что читать было нельзя СОВСЕМ; откройся в нем хоть малейший признак читабельности — он был бы уже не то. Неретинский им нравился за то, что порочность его не допускала сомнений, что человеческого слова он не находил ни для кого, что женщинами брезговал открыто — настолько, что не снисходил до враждебности. Бывают добрые педерасты, безалаберные, похожие на шумных пьяных актрис; а Неретинский был злой педераст. Про него говорили, что он зарабатывает консультациями, — и при этом со значением возводили глаза, намекая, что консультирует вплоть до ГПУ; но ему это сошло бы с рук, ибо это был последовательный порок, и от него другого не ждали. Если бы простой человек, не урнинг, остановился подтянуть штаны напротив ГПУ — его заподозрили бы в сотрудничестве и отказали от нескольких домов; но если Неретинский, как поговаривали, действительно помогал готовить агентов для заграничной разведки, обучая их этикету, манерам и умственным карточным играм, — это было совершенно в духе Неретинского и соответствовало стилю. О добре и зле в двадцать пятом году никто не мог сказать ничего определенного, а в стиле разбирались почти все.</p><p class="p1">Он презирал, конечно, людей, но этой касте прощается и даже приветствуется: люди радуются, что их презирают за нормальность, вздыхают с облегчением и снова принимаются за гадости. Ведь он нас не за гадости, а за то, что мы не (шепот). Им на откуп отдавалось все сложное, хотя на деле механическое: балет, Пруст. Человечное им, в силу странной ущербности, не давалось. Но презирать им дозволялось, потому что они не мы. Вообще в России все только и делают, что презирают: чем еще заняться-то?</p><p class="p1">Сейчас, поправляя квадратные роговые очки и смеясь собственным колкостям, вставляя свое знаменитое «изумительная мерзость» и откровенно любуясь мерзостью, он пересказывал спектакль театра рабочей молодежи «Вечер у Волконской» — пьесу о декабристах. «Но когда Рылеев — кстати, очень хорошенький, надо будет приметить этого Рылеева, недурен был бы в „Эдипе“, — когда Рылеев сказал, что царизм необходимо расплющить без китайских антимоний, а дворцы экспроприировать…». Несколько искусственный хохот покрыл его слова. Тут позвонили, и Михаил Алексеевич поднялся открывать. Вставши, он оказался чуть не ниже сидящего Неретинского.</p><p class="p1">— Оригинал пришел, угощаю сегодня оригиналом…</p><p class="p1">Надя насторожилась. Здешние оригиналы ей никогда не нравились.</p><p class="p1">Меньше всего она ожидала встретить этого человека, которого впервые увидела здесь же дней десять назад, когда заходила с Женей и пела «Зарю-заряницу», и вместе с тем подспудно знала, что это он, и ради него шла сюда. Она все время ловила на себе его взгляд, тогда, в первый раз, и взгляд этот был странен — никакого вожделения, никакой приценки, но так, словно он давно когда-то, в детстве, видел ее и теперь радуется, что она выросла как раз такая, как надо. Он одобрял ее, как старший. Именно этого одобрения она и ждала всегда, но никто не мог этого дать, и менее всего старцы.</p><p class="p1">Он вошел и обвел присутствующих спокойно-снисходительным взором круглых серых глаз; снял шапочку, обнажив куполообразную голову, узнал Надю и кратко кивнул ей, или показалось.</p><p class="p1">— Честь имею представить! — гаерски крикнул Игорек. — Алхимик Остромов!</p><p class="p1">— Кого только нет, — сказал Стечин, — вот уже и алхимики.</p><p class="p1">— Я удивляюсь, — сказал Остромов. — Я удивляюсь. Если снесен целый верхний слой, что же удивительного, что обнажается нижний. И может быть, это возможность вернуться к той самой развилке, от которой пошло не туда — к безбожному Просвещению.</p><p class="p1">— Да, деградация бывает полезна, — кивнул Стечин.</p><p class="p1">— Какая прелесть, — сказал Неретинский. Остромов поглядел на него дружелюбно, как на неопасную диковину, и улыбнулся. Кажется, он тоже подумал: «Какая прелесть!».</p><p class="p1">— Кроме того, представления наши об алхимии, — добавил он, — весьма далеки от истинных.</p><p class="p1">— Ну, откуда же нам было взять истинных! — воскликнул Стечин. — Ртуть не варили, летучих мышей не растирали…</p><p class="p1">— Это вовсе необязательно, — сказал Остромов, улыбнувшись и ему. — Не станем делать алхимиков глупей, чем они были: человечество со времен Аристотеля знало, что из одного элемента невозможно сделать другой. Наука может сделать лишь то, что происходит в природе, а в природе ни одна ящерица не становится птицей, и Дарвин, главный позитивист, такой же алхимик, как Парацельс.</p><p class="p1">Наде это понравилось: она никогда не верила в эволюцию. Только человек мог превратиться в нечто совсем иное, и никогда не знаешь, почему: иногда его не могли раздавить годы испытаний, а иногда хватало косого взгляда.</p><p class="p1">— Цель алхимии, — продолжал Остромов, в любой аудитории чувствуя себя непринужденно, — совсем иная, не химическая, но, так сказать, общественная. С этой точки зрения еще не прочитаны лучшие труды Олимпиодора, а из новейших — Бетгера. Вообразите обычный алхимический рецепт тех времен — ну, хотя бы пятнадцатого столетия, где-нибудь, скажем, во Флоренции, школы Челлини. Там в любой антикварной лавке легко найти сборник рецептов, которым многие верят просто потому, что проверить их теперь невозможно. Где вы возьмете перо голубого фазана, тем более, что голубой фазан на нынешнем языке — не птица, а рыба, а итальянский фазан с бледно-голубым пером совершенно истреблен? Где найдешь теперь перуджинскую киноварь, секрет которой утрачен еще до Леонардо? А между тем любой алхимический рецепт — не способ изготовления золота, а тонкое руководство по плетению людской сети: ведь для того, чтобы добыть ингредиенты, требовались недели. Положим, вам нужно взять кость годовалого тельца, расплавленное серебро, толченый нефритовый камень, так называемый красный спирт — лекарственное средство, исцелявшее от дурных болезней, — и лист финиковой пальмы; смесь всего этого, приготовленная в пятый день седьмой луны, даст вам мудрость змеи и кротость голубя. Как-то шутки ради — в университете шли каникулы, а ехать в Россию мне было нельзя, — пояснил Остромов многозначительно, — я решил-таки проделать все описанное, и что же? Разумеется, получившаяся смесь ни на что не годилась и отвратительно пахла, так что я заставил себя проглотить лишь малую щепоть и не обрел, как видите, ни сверхъестественной мудрости, ни особенной кротости. — Тут он улыбнулся, намекая, что приобрел, конечно, приобрел! — Однако покуда я приобретал все это, мне пришлось сойтись с мясником, историком, ювелиром, аптекарем, ботаником, и наш совместный опыт при полной луне, в чудесную итальянскую ночь, сблизил нас более, чем годы странствий. Алхимия — способ соединения не вещей, но людей, и только с этой точки зрения следует рассматривать ее.</p></span></span>
