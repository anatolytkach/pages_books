<p class="p">Глава четырнадцатая</p>
</div><p class="subtitle">1</p><p class="p1">Как часто бывает, дурной сон оказался предвестием болезни, или болезнь — причиной дурного сна, но встал Даня разбитым, проспав всего часа полтора. Нос хлюпал, глаза резало, а главное — он вовсе не чувствовал той радости, с которой заснул, радости наконец наставшего завтра. Только к полудню, заполнив добрый десяток обходных листов в отделе учета, он ухитрился убедить себя, что нынче день счастливый — словно тело его с самого начала обо всем догадывалось, пока душа летала неизвестно где, но со временем они как-то договорились.</p><p class="p1">Насморк, думал Даня, вот гадость — и несерьезно, и как при том унизительно! Можно ли целоваться с женщиной, когда у тебя полон нос слизи? Если вчера он приходил в восторг при одной мысли, что наконец они встретятся все втроем — учитель, Надя и он, — и восторг этот от повторений не убывал, то теперь ему было стыдно, неловко, словно нельзя было сводить вместе людей, которых он боготворил так по-разному. Как жить с женой в родительском доме, нечто вроде. Ему мерещилось — смутно, бездоказательно, но таковы всегда были самые верные догадки, — что учитель не одобрит того, что между ними началось и для чего не было слова: любовь — громко и общо, роман — невыносимо, о браке он и думать пока боялся. Теперь, подумает Остромов, они станут заниматься друг другом, — правда, он даже поощрял взаимный интерес Сагалова и Меркурьевой, но, во-первых, у обоих не было никаких способностей, а во-вторых, сказал же он как-то: дураки от любви умнеют, умные глупеют. Может быть, в Сагалове проснется разум, в Меркурьевой — вкус, ибо любовь, как сказал тот же учитель, хороший воспитатель и плохой кормилец; он столько говорил о любви — но едва ли желал, чтобы именно теперь, когда у Дани наметился несомненный прогресс… Впрочем, эти мысли Даня прогнал: учитель, видящий насквозь любого, не сможет не понять, насколько эта любовь — да, назовем любовью, пока другого слова нет, — стала даниным позвоночником, стержнем всего. Быть не может, чтобы он не понял; и беспокойство устремилось по другому руслу — где она, придет ли, не протрезвеет ли наутро, как бывает часто, Даня не столько слышал или читал об этом, сколько догадывался. Чаще и слаще всего вспоминалось, как она потом сразу выбежала к нему обратно — удостовериться, что он есть; это доказывало, что и она не верит до конца — и уж точно не раздумает, хотя бы в первый день. Правда, все слишком быстро. Они ни о чем толком не говорили — хотя говорили уже обо всем: о чем я буду ей рассказывать, ведь она все обо мне знает?</p><p class="p1">Он ерзал, путал цифры, Карасев взглядывал на него неодобрительно.</p><p class="p1">— Просто не узнаю, — сказал он, прихлебывая желтый чай из любимого стакана.</p><p class="p1">— Борис Григорьевич, — умоляюще сказал Даня. — Настолько голова не тем забита…</p><p class="p1">— Вижу, что не тем, — без всякого сочувствия отозвался Карасев.</p><p class="p1">Дане хотелось ему рассказать про обрушившееся на него счастье, но он держал себя в руках. Карасеву не было дела до его любви и до встречи с учителем, он занимался учетом и не знал занятий более важных. Мир держался на его цифирках, и если Даня чего-то недоучтет, не внесет положенные квадратные метры в ведомость — они могут исчезнуть, как не были, и куда деваться жильцам? Он смотрел на Даню, словно что-то знал и о данином будущем, и о том, что сделается с его любовью, — так мерещилось Дане, не слишком привычному к счастью и потому вдвойне подозрительному, когда оно наконец затопляет душу. Затопить-то затопляет, но всегда остается островок, на котором спасается проклятый соглядатай, и на этом островке он озирается затравленней прежнего.</p><p class="p1">Вдобавок голова тяжелела, и дважды Даню чуть было не сморил сон.</p><p class="p1">Дальше началось совсем необъяснимое: он задремал в двенадцатом трамвае, в котором не только не засыпал прежде, а наоборот, всегда дрожал от нервного, счастливого предвкушения. Маршрут этот, от Защемиловской до Каменноостровского, он знал наизусть, все семнадцать остановок, и только болезнью или временным помрачением можно было оправдать то, что проехал он девятнадцать и сошел уже на углу Кронверкского, напротив кооператива «Привет».</p><p class="p1">Нельзя было не отметить одной странности — а именно ранних, чрезмерно сгустившихся сумерек. Вчера, когда они гуляли с Надей, было еще почти светло — перелом к осени свершился, как всегда, неожиданно. Тут он вспомнил: осеннее солнцестояние! Но неужели это крошечное укорочение дня так губительно сказалось… Между тем в окнах уже зажигался свет, показавшийся Дане не уютным, а хищным, словно десятки желтых глаз подглядывали за ним не без тайного злорадства. Ну хорошо, вот так, а теперь что он будет делать? куда пойдет?</p><p class="p1">Что ж тут удивительного, сказал себе Даня. Мировая пассивность, о которой говорил Остромов, не хочет, чтобы они виделись с Надей. Всякую принцессу надо завоевать. Он бодро направился назад по Съезжинской, чувствуя нараставший озноб и не зная, с чем его связать: страх ли, болезнь…</p><p class="p1">По счастью, его нагнал двенадцатый, шедший в обратную сторону, и Даня вскочил в него — но тут, к вящему его изумлению, вместо того, чтобы двинуться прямо, трамвай свернул направо, по Большой Пушкарской. Даня нагнулся к ближайшему пассажиру, неопрятному старику с растрепанными седыми космами:</p><p class="p1">— Извините, это двенадцатый?</p><p class="p1">— Двеначшатый, — прошамкал старик.</p><p class="p1">— А что же он…</p><p class="p1">— Што?</p><p class="p1">— Я говорю, почему не там свернул?</p><p class="p1">— Гже надо, там и швернул. Он там шворачивает.</p><p class="p1">— Это двенадцатый по маршруту пятнадцатого, — пояснила сердобольная, многословная, крестьянского вида тетка средних лет. — Она предупредила, вагон-вожатая. Что по пятнадцатому пойдет. Вона, он тут остановку делать будет.</p><p class="p1">Выскочить? Но ведь все равно он доедет до Каменноостровского, а там уж пересядет или добредет пешком, — Даня глянул на часы, без четверти шесть, успевает, — но тут, не доезжая до проспекта, трамвай внезапно и резко свернул на узкую улицу, где Даня и не бывал сроду. «Остановите, вагоновожатый, остановите сейчас вагон!» — мелькнуло в голове, и на первой же остановке Даня спрыгнул. Название улицы было — Подковырова; он сроду не слышал о такой. Любопытно бы знать, сама по себе она Подковырова или в честь безвестного героя? В арке виднелся проход на параллельную улицу, и Даня устремился во внутренний двор — но навстречу ему ощерился бродячий пес, грозно и сосредоточенно рыча; он кинулся в соседнюю подворотню — там оказалось глухо. Вот же черт! Но старайтесь, старайтесь, ничего у вас не выйдет. Даня пробежал квартал, свернул направо и остановился разглядеть название улицы: эта была уже не Подковырова, а Подрезова. Еще не легче; он проскочил еще один двор, жутковатый, узкий, и взгляд его упал на огромную белую надпись — кто только умудрился вывести масляной краской поперек всего двора «Не ходи!». Дети, шалости. Все бред. Даня выскочил на следующей параллели — и вздрогнул: улица называлась Плуталова. Кто подобрал эти имена, с каким смыслом его сюда занесло? По Плуталовой, пытаясь насвистывать под нос для храбрости, в быстро сгущавшемся осеннем мраке пошел он вперед, полагая, что по всем законам должен будет упереться в Малый проспект, — и точно, впереди был просвет, там загорались первые фонари. На Плуталовой фонарей не было, вот уж подлинно гиблое место. Он ускорил шаг, чувствуя почти физическое сопротивление вязкой, кисельной среды — словно воздух сгущался перед ним; но если мы нашли друг друга среди такой бесконечной тоски, среди такого разнообразия чужих, враждебных или просто тупых, — неужели дадим разлучить нас теперь, хотя бы и вся гравитация мира ополчилась на нас?</p><p class="p1">Между тем прямо на Даню надвигался страшный человек. Он шел очень медленно, широко расставив ноги, а руками словно кого-то ловя. Казалось, он несет перед собой огромное стекло. Человек делал шаг, застывал, подтягивал другую ногу, вновь шагал вперед и все шарил, шарил перед собой руками. Как назло, Плуталова была пустынна. Сейчас Даня обрадовался бы и псу, но вот беда, не было пса. На звук даниных шагов страшный человек повернул голову, и Даня увидел, что ничего страшного нет — просто он слеп, черные круглые очки скрывали его глаза, а на лице читалась умоляющая беспомощность.</p><p class="p1">— Молодой гражданин! — кротким голосом позвал слепой. — Проводите, будьте так любезны, убогого… собака, собака вырвалась.</p><p class="p1">Даня подошел к слепому и готовно подставил плечо, успев, однако, усомниться: откуда он знает, что — молодой? Разве по шагам… Впрочем, кто знает — бывает компенсация, сверхчувственность.</p><p class="p1">— Куда проводить? — спросил Даня.</p><p class="p1">— А куда хотите, только прочь отсюдова, — ответил слепой, с неожиданной силой сжимая данину руку. — Нехорошо тут, место сейчас это нехорошее… Везде нехорошо, а тут совсем нехорошо. Да веди же! — прикрикнул он на Даню уже по-хозяйски.</p><p class="p1">— Я спешу, — буркнул Даня. — Могу довести до Пушкарской, а дальше кого-нибудь встретим или в трамвай вас посажу…</p><p class="p1">— Это нет, — радостно говорил слепой, — это не будет. Сам поведешь, нельзя убогого бросать, а куда ты спешишь, туда не надо, ишь, все спешат, куда не надо…</p><p class="p1">Даня вгляделся в его лицо.</p><p class="p1">— Ну?! Что уставился, веди! — потребовал слепой.</p><p class="p1">— А ты, дядя, не морочишь меня, часом? — спросил Даня и тут же пожалел о вопросе: свободной рукой слепой сорвал очки, и Даня с ужасом увидел два сморщенных века, прикрывавших пустоту.</p><p class="p1">— И родился таким, — спокойно сказал слепой. — У людей бы, мож, и духу не хватило так поуродовать, а Бог, вишь, не пожалел. Веди, молодой, я скажу, когда остановимся.</p><p class="p1">— Так, может, до Малого дойдем? — ненавидя себя за дрожь в голосе, спросил Даня. — Мне вообще-то в ту сторону…</p><p class="p1">— Смерти хочешь? — раздраженно спросил слепой. — Ну, ладно, тогда туда иди. А я не пойду, нет.</p><p class="p1">Черт его знает, подумал Даня. Остромов как-то рассказывал о сверхчувственной компенсации увечий.</p><p class="p1">— Что там делается хоть?</p><p class="p1">— Не гони ты! — крикнул слепой. — Я быстро идтить не могу.</p><p class="p1">Они поплелись по Плуталовой — вяло, по-черепашьи.</p><p class="p1">— Сказано было — не искать, — бормотал слепой, — а всякий ищет… Сказано было не роптать, а ропщет… По углам столько уж скопилось, что не разгрести. И все восьмерки, восьмерки…</p><p class="p1">Он был безумен или пьян — Даня уловил запах дешевого крепкого вина и омерзительной, зловонной закуски.</p><p class="p1">— Они, может быть, не знают, — говорил слепой, тяжело налегая на его плечо, — а у меня на чердаке лежат головы человеческие. Тоже все искали, а вот куда попали. Я одного человека сам ищу. Если найду этого человека, я тогда так ему сделаю, что не будет уже меня смущать, не будет спрашивать меня много…</p><p class="p1">Дане все страшней, все невыносимей было тащиться по темной улице с сумасшедшим. Это было как в кошмаре, как в самом бессвязном из рассказов Грэма, как в его пьяном монологе, в котором обрывки гениальных сюжетов мешались с адскими видениями, — и потому вид Пушкарской, светлой и людной, показался ему спасительным.</p><p class="p1">— До Пушкарской дошли, — сказал он слепому. — Хотите, к милиционеру подведу?</p><p class="p1">— Милиционер, — пробормотал слепой, все более пьянея. От прежней беспомощности не осталось и следа, он ухмылялся. — Я сам, может, милиционер. Я сам тебя подведу вот сейчас и сдам, ограбил, собаку увел…</p><p class="p1">Даня не знал, что с ним делать, так и торчал бы в полной растерянности среди улицы, не решаясь вырвать руку из корявой лапы пьяного идиота, — но тут в конце Пушкарской появился трамвай, уже не поддельный, а настоящий пятнадцатый. Словно угадав данино намерение, слепец сжал его руку крепче, — он по звуку и вибрации угадал приближение трамвая.</p><p class="p1">— Не пойду, не пойду туда! — заголосил он. Даня резко рванулся и побежал к трамваю.</p><p class="p1">— Не пушшу тебя! — заорал слепой. — Бросил, гадина, убогого бросил помирать! Граждане, ловите, слепого убогого обобрал бросил!</p><p class="p1">Даня вскочил на подножку. Спасен, подумал он, теперь не достанет. Остановку он проехал спокойно, только сильно кружилась голова — он все-таки здорово перепугался и теперь с трудом отходил. Трамвай подходил уже к Каменноостровскому проспекту, но на последней остановке перед поворотом Даня вгляделся в толпу — и чуть не вскрикнул. В следующую секунду он спрыгнул и помчался за женщиной, быстро уходившей назад, прочь от проспекта.</p><p class="p1">Это платье он узнал бы из тысячи, из миллиона. Толпа скрывала его, но Даня не отставал и не сводил с него глаз.</p><p class="p1">Все это был сон, конечно. Он так и чувствовал, что сон. События шли в рваном, ускоряющемся темпе сна, в котором, однако, надо жить и действовать — большинство наших ошибок от того, что мы не проживаем сны, а надо отбыть их с открытыми глазами, как Раскольников отбывает острог, — чтобы перемениться. Однако краем сознания он сомневался: он и во сне не мог увидеть тех рож, что ему встречались на каждом шагу, пока он бежал за материнским платьем, тем самым, единственным, самошивным, к празднику его пятнадцатилетия собранным из лоскутов. Мать всегда отмечала данин день рождения как свой праздник, более пышно, чем собственный, 16 февраля, — и не было шансов, что кто-то еще смог бы в Ленинграде сшить такое же платье из их старой шторы, собственной даниной детской курточки, отцовской рубашки, которая в двадцатом сделалась ему безнадежно мала, и множества других драгоценных тряпок, каждая с историей. Или. Верней. Шанс. Был — думал он, задыхаясь и успевая заметить, что задыхается даже во сне, никогда не умел бегать, слабое сердце: представим семью нашего, то есть совсем среднего достатка, новое негде взять, перекроили старое, но именно эта штора, в треугольниках? Именно эта рубашка, посеревшая от стирок? Допустить, что некто взял его из Крыма и привез сюда, — но кому же отец отдал бы? При этом он и во сне ни на секунду не допускал, что мать здесь, рядом. Он слишком долго и мучительно привыкал к мысли, что ее не будет, и второго такого привыкания не вынес бы. Нет, все обман, но кто посмел так подшутить? Надо было нагнать, наказать, и он бежал, и темнота сгущалась, и фонари высвечивали рожу одна другой страшней, словно все силы ада сорвались с цепи, чтобы остановить его. Но он расталкивал ослизлые, вялые туши и бежал сквозь темнеющий и густеющий воздух за платьем, которое не забывало подразнить, вот вроде скрылось, и вот опять. Дане почему-то всего обидней было за курточку, — штору он тоже любил, и старое платье матери, от которого был ослепительно желтый, золотистый пятиугольный клок, — но та курточка была особенная, он напяливал ее и тогда, когда безнадежно из нее вырос, в ней приходили мысли, он был уверен в ее волшебных свойствах. Обычно его трудно бывало уговорить, чтоб надел обнову, и матери приходилось сочинять сказку на любой случай: эти ботинки приведут к дому, если заблудишься, эта куртка подсказывает ответы к задачам… Избалован, сам теперь придумываю сказку вокруг всего. Но платье мелькало, уводя его все дальше, дальше. Однако идти к Наде, не отомстив обидчику, нельзя. Никто не смеет красть мою память.</p><p class="p1">Что-то, однако, для сна было слишком зябко, а для болезни он чувствовал себя слишком бодрым физически, хоть легкое головокружение и не проходило: это было, впрочем, необременительное головокружение, нечто вроде болезни, необходимой, дабы нечто понять. Есть состояния, в которых только и понимаешь иные тонкие неочевидности. Мать любила состояние после мигрени, потому что без мигрени не приходили лучшие стихи: голова, объясняла она, перестраивается на нужный лад, а значит, не может не болеть. Весь последний год он старался не вспоминать мать, чтобы не отчаиваться заново, но сейчас словно опять входил в их общий мир, так сжавшийся, так глубоко затаившийся; и чем дальше вело его платье, тем ближе становился журнал «Вести из вигвама», баллада о колдуне, игры с гербариями, камнями, конкурс на лучшее усовершенствование медузы… Победила мать, придумавшая такую медузу, которая была бы растворима: выпаришь ее на камнях — останется сеточка. Бросишь сеточку в воду, только непременно морскую, — образуется медуза.</p><p class="p1">Неточно было бы сказать, что он вспоминал это. Это всплывало в нем, проступая мгновенно, разом, как проясняется в один миг собранная наконец головоломка — секунду назад был хаос линий, а вот и собралось. Шаг за шагом, как в утреннюю опаловую морскую воду, глубже входил он в мир, о котором запретил себе помнить, и, как под властью дудочника, дальше, дальше убегал от Остромова и Нади, от квартиры на Каменноостровском; вот мелькнул Кронверкский, вот свернули направо — платье вело, вело его по Краснокурсантской, по Корпусной, по Большой Разночинной, и они кружили, кружили, не приближаясь к чему-то главному, все обходя его по касательной. Сколько ни вспоминал Даня после это кружение, он не мог понять, почему бежал за платьем и ни разу не попытался себя спросить: что я делаю?! Он чувствовал, помнил, что было уже семь, и восемь, и что он действительно страшно опоздал, а учитель этого не любил; помнил, что Надя, вероятно, волнуется, гадая, куда он делся, — но сильней всех этих мыслей был гипноз детства, гипноз, которого ничем не перешибешь: он иногда уже не поручился бы, по Петроградской кружит или по окраине Судака, на которой стоял их дом. Вдруг его как ударило: ведь мы, собственно, ходим вокруг крепости! Вот же любимый маршрут прогулок: Приморская — Морская — Рыбачья; сколько сказок выдумано о них! Не так ли ученик Чародея блуждал по окраине города, все не выходя к дому учителя, пока не понял, что дом учителя и есть этот круг? Но ведь мы ясно, ясно описываем контур генуэзских развалин, и сейчас я сверну направо; точно! Он явственно видел, что женщина в платье — другая, не мать; светлая коса, шляпка, какой мать никогда бы не надела, и однажды она полуобернулась — профиль как будто женин, вдруг Женя взяла платье и приехала… но зачем? И гораздо моложе Жени, конечно. Совершенно пустое лицо, молодое, но уже выгоревшее, лишившееся всякого выражения: такие-то пустые сущности и воруют нашу жизнь. Однако вместо того, чтобы дальше идти по кругу, сворачивать на Либкнехта, — она резко рванула на Малый, и, свернув на Лахтинскую, Даня увидел собственный дом, темно-кирпичное жилище Алексея Алексеича Галицкого. Здесь женщина обернулась и взглянула ему в лицо; и он увидел ее.</p><p class="p1">Он ожидал чего угодно, и все мы ожидаем чего угодно — черно-белых, ортогональных, человеческих чувств: нам рисуется ненависть или благожелательность, суровость или приязнь, — но удивительней всего бывает заметить, что высшим силам, которых только что мы были игрушкой, не было до нас никакого дела. Немолодая, нет, молодая, но прежде времени озабоченная, мало чему удивляющаяся и ощущающая при виде удивительного только легкий толчок разочарования — ах, вот я опять ничего не поняла, — перед ним стояла женщина небольшого, узкого ума, для которой почти все непонятно, и это непонятное вызывает уже привычное, переходящее в усталость раздражение; в ум такого человека легко внедриться, ибо он, в сущности, пуст. Там есть два-три запрета, оставшихся с детства, да три-четыре правила общей безопасности, да вечная настороженность забитого существа. Она крестьянка была, или не крестьянка, а окраинная горожанка. Такая идет по улице и сама про себя повторяет какую-нибудь глупость, пустую фразу вроде только что услышанной в очереди или всплывшее вдруг из памяти: я газетик полуцала, с издавольствием цитала. Ах, ток-ток-ток, с издавольствием моим. Наше вам почтение. Она смотрела на Даню с выражением крайнего недоумения, не зная, опасаться или сразу облаять. Платье матери опадало с нее листьями, как вот с клена, покачнувшегося рядом: упало несколько листьев, одиннадцать-семь-пять-три — и вот еще два последних, последних. Остальные удержались, и удержалось в воздухе плоское лицо чухонки с бездонными дырками ноздрей и глаз — в сущности, пуговица, — но золотистый, кленовый пятиугольник старого платья, и застиранная рубаха отца, и багряный лопушок собственной его курточки закружились и канули: серое платье, принявшее форму чухонки, стояло перед ним. Ничего не было, никакого лоскутного счастья, проклятый бред поманил — и Даня с ужасом, с ненавистью понял, что так и верил все эти два часа в немыслимое чудо. Тысячу раз запретил и верил, а вон что. Да, собственно, и все эти экстериоризации были в единственной надежде — выйти в пространство, где мать, а выйти нельзя никуда: на всех путях будет та же пуговичная чухонка в сером платье, потому что не осталось ничего другого.</p><p class="p1">— Ты цо? — спросила она без злости, скорей с испугом.</p><p class="p1">— Ничего, — ответил Даня, переводя дыхание.</p><p class="p1">— Ну и цо? — спросила она.</p><p class="p1">Он молчал.</p><p class="p1">— Цо ходишь? И ходит и ходит, — сказала она и отвернулась. Потом поглядела на него еще раз, поняла что-то безнадежное и пошла.</p><p class="p1">Даня прислонился к стене. Ничего, сейчас он переведет дух и домчится до Каменноостровского; не могли же они так быстро разойтись. Он машинально проследил путь так странно приворожившей его чухонки: удивительно бесцветная личность, настолько ничего… Она шла — ток, ток, ток, — не совсем, однако, уверенно, словно только что ее вели и вдруг бросили. А куда ей было надо? Куда-то ведь было надо. Хотя все равно, куда ни иди, одна только неудобность кругом.</p><p class="p1">Из темно-красного дома вышел Алексей Алексеевич Галицкий, человек надеющийся: кончились папиросы, так вот купить папирос. Бросил полгода назад, но такой случай…</p><p class="p1">— Даня? — удивился он. — Хорошо, что ты здесь. Идем домой скорее.</p><p class="p1">— Что? — вскинулся Даня.</p><p class="p1">— Телеграмма от папы. Очень болен. Довольно очень сильно, — забормотал Галицкий, не желая повторять «при смерти». — Надо ехать, обоим надо ехать. Поднимайся скорей.</p><p class="subtitle">2</p><p class="p1">— Что же, — начал Остромов, соединив длинные пальцы и положив на них длинный подбородок. — Как я и обещал, мы освоим сегодня вызов тех опасных, но могущественных сущностей, без помощи и охраны которых нечего даже надеяться достичь высшего знания.</p><p class="p1">Перед ним сидело на диво представительное собрание — не в смысле полноты, а просто всякой масонии по персонии, как говаривал отсутствующий почему-то геральдик Базанов. От заслуженного поколения наличествовала Пестерева, от среднего — вислоусый Степанов, от крестьянства — Тамаркина, от студенчества — Левыкин, от молодежи — Надя, освещенная странным, новым внутренним светом, в котором, на вкус Остромова, было нечто эгоистическое. Пожалуй, она была слишком румяна, а глаза слишком сияли, вплоть до масляности; он больше любил ее вдохновенной, хрупкой, а сейчас увидел до странности довольной, словно она впервые на его памяти была счастлива не за других, а за себя. Положительно, эту девушку следовало брать несчастной, — успеет нагулять радости, ищи потом свищи былую тонкую красу. Красивых-то много, поди найди особенную. Все это он сообразил мгновенно, но от Ирины не ускользнуло — он поймал ее недовольный, смутно подозрительный взгляд: все чувствовала. Он где-то читал о ясновидении влюбленных, но это неглубоко: ясновидствуют ревнивые, проницательность есть вариация подозрительности. Мнительный человек в быту и есть подозритель, которому нечего подозревать — жизнь его не приставила пока к настоящему делу. Вот Остромов всегда подозревал все вокруг себя, словно подтыкал одеяло, и потому любую опасность чуял за версту — это он так о себе думал, и покамест небезосновательно. Варвары не было. Странность, до чего в самом деле от всех по одному, — вот ведь и Варвара словно уступила Ирине право представительства от фракции «Обожающие». Хорошо, что не было главного обожающего: Остромов тяготился его беззаветной преданностью. То был не укол совести, разумеется, ибо кого же тут стыдиться, — разве не добровольны были их даяния, в конце концов, и разве не получали они, что хотели?! — но скорей неловкость художника перед заведомо бездарным подмастерьем. Взял в обучение, потому что за него, допустим, попросили, или потому, что вовсе нечем было прожить, или просто пришел и остался, — но месяцы идут, а он все так же безнадежен, как больное дитя, про которое родителям сказали, что со временем заговорит, а какое же заговорит, когда он глухой? Галицкий был именно глух, и не только не мог ничему выучиться, но и вообще не понимал, чему здесь учат, словно, как бы это сравнить, — да! словно пришел в музыкальный класс и любуется скрипачом, но думает, что здесь тренируются артистически пилить доску, а получающийся при этом звук — побочный эффект. Или что это такое гимнастическое упражнение. Раздражал Остромова и его внимательно полуоткрытый рот, и толстый нос — в самом деле, нечто дегенеративное; неужели и на него найдется своя? Впрочем, на всех находится.</p><p class="p1">Были также Велембовский, Савельева, Мурзина. Опоздав, как всегда, и прихрамывая, — плох, явно плох! — вошел задыхающийся Альтер, юноша-старец. И сидел в углу одинокий, как Иуда, Поленов, раскаявшийся, но не вполне еще прощенный, — ничего, вперед наука, будешь у меня бунтовать, — бросая тревожные взгляды то на Остромова, то на дверь, словно ища возможности сбежать. Нет, попалась, птичка, стой; еще не менее трех занятий буду то ласково, то презрительно напоминать о твоем отступничестве, доломаю, отдам на общее поругание, — пока наиболее склонный к бунту не сделается тишайшим, а прочим не будет дан достойный урок.</p><p class="p1">— Итак, — он сказал. — Итак-итак, — он сказал. Он был нынче бодр и в импровизационном ударе, и знал, что расскажет ярко, а главное, достоверно — вытащив наружу то, о чем каждый из них давно догадывался, нечто тайно-естественное, как всякое чудо. — Я должен предупредить вас о тех, без кого не может быть полно никакое познание, о сущностях, чья природа — зло, но в нашей воле обратить его в пользу. Для начала позволю себе напомнить иерархию тонкого мира по Великому Гримуару, с непременной поправкой на то, что известный нам текст составлялся уже в эпоху расцвета христианства, не без участия папы Льва III, этого великого собирателя тайнознаний, не забывавшего, однако, клеветать на источники. В его трактовке все это силы ада, рисовавшегося ему, если помните, как обыкновенное европейское правительство.</p><p class="p1">Левыкин старательно записывал, хоть схема этого правительства уже была дана кружку двумя месяцами ранее.</p><p class="p1">— Напомню, — слегка скучающим голосом продолжал Остромов, — что императором ада он назвал Люцифера, в антропософской традиции великого покровителя света и всякого познания вообще; принцем, или Великим князем, — Вельзевула, а великим герцогом — Астарота. В распоряжении сих троих находятся первый министр Люцефиуже, ведающий делами главных дворов Европы и вообще политикой; генерал Сатанахия, чьи подданные следят за ходом всех военных действий, включая гражданские; генерал Небирос, контролирующий искусства и некоторые области светского знания, и занимающий нас сегодня генерал Флерети, или Флуерти, о котором нам известно весьма мало, но который покровительствует именно нашим занятиям, а именно эзотерическому познанию.</p><p class="p1">Все эти имена, а равно иерархию, Остромов помнил наизусть; дальше начиналось вольное пространство импровизации.</p><p class="p1">— Как вы помните, во время первого восстания эонов ряд сил воздержался, надеясь, как всегда, что их угнетение не коснется. Люцифер с немногими избранными, последовавшими за ним, основал новое царство знания, где не было места угнетению, а место в иерархии определялось исключительно умом и внутренней силой. После изгнания Люцифера с вернейшими он был оклеветан и провозглашен дьяволом, а христианская мифология окончательно закрепила за ним ад. Отсюда пошли бесконечные злобные карикатуры, — Остромов презрительно усмехнулся, — рога, хвосты и прочая мерзость людей толстокожих и пошлых. Однако после его изгнания в небесных сферах воцарилась такая диктатура, такое отсутствие свободного духа, что за первыми мятежниками последовали вторые — так называемый генералитет, как трактует его Великий Гримуар. Их отпадение от Престола Сил и бегство в ряды люцифериан интеллектуально опустошило Сферу Света, и понадобилась жертва Христа, чтобы примирить враждующие пространства.</p><p class="p1">Эк я загнул, подумал он одобрительно.</p><p class="p1">— Если я правильно вас понимаю, — ровным тонким голосом заметил Альтергейм, — это означает, что так называемую моральность приписали себе сторонники твердой руки?</p><p class="p1">— Разумеется, — пожал плечами Остромов. — Рай в трактовке христианских эзотериков, ранних в особенности, рисуется чем-то вроде огромной гимназии, где не принято задавать лишних вопросов. Одно из тончайших откровений христианства — о пребывании Христа в аду — трактуется обычно как искупление или изведение оттуда раскаявшихся, но в действительности, как ясно всякому непредвзятому уму, это было заключение мира с люциферианами. Без них человек никогда не стал бы свободен. Время вертикального рая, где только молились, а мыслить считали преступлением, — истекло уже в конце Рима.</p><p class="p1">— Скорее всего так и было, — тихо, как бы себе, сказал Альтергейм.</p><p class="p1">— Вернемся, однако, к участникам второго бунта, из которых Флерети был самым юным и сильным, — продолжал Остромов. — В большинстве списков Гримуара мы находим среди его атрибутов диадему — символ мудрости, бич — символ стимуляции, и череп — символ бренности. Что означает сочетание? Ответ ясен и непосвященному: путь к мудрости лежит через стимуляцию, тогда как альтернативным путем является бренность. Если мы не будем подхлестывать себя, наш удел — падение в череп Флерети, в бездонную чашу мирового забвения.</p><p class="p1">Испугавшись этой перспективы, Мурзина уставилась на него жадней прежнего. Ирина снисходительно усмехнулась.</p><p class="p1">— На пути познания нам предстоит не только миновать Стража, — это первый этап, выход за дверь, и для большинства из вас он давно позади, — но и обратить в союзники трех спутников Флерети, охраняющих главные тайны бытия от невежества и трусости. В прямом подчинении Флерети находятся Батим, Пюрсан и Абигар.</p><p class="p1">Он прошелся вдоль стены, разминая пальцы, и по-учительски повторил:</p><p class="p1">— Ба-тим, Пюр-сан и А-би-гар.</p><p class="p1">Не записывала одна Пестерева — она, впрочем, никогда не конспектировала лекций.</p><p class="p1">— Эти сущности, или, как называют их еще, псы истины, могут до смерти загрызть неопытного вопрошателя, но могут и доставить ему любые сокровища из охраняемых ими кладовых. К сожалению, овладеть ими невозможно без бича — то есть без угрозы; но если опыт окажется удачен, вы можете дойти с ними до отношений дружеских, почти равных, как со старым слугой. Разумеется, никакой фамильярности.</p><p class="p1">Левыкин готовно закивал.</p><p class="p1">— В сумерках, но не прежде полуночи, ибо в полночь выходят на свет духи более опасные, — тихо и таинственно заговорил Остромов, — при помощи магического жезла, с изготовления которого мы с вами начали, приступайте. Вам понадобятся философский круг, семисвечье и три заклинания. В центре магического круга укрепите белую свечу и обратитесь сначала с лаской, дабы дать представление о своей изначальной благорасположенности. Даю текст по Великому Гримуару: «О великий Батим, прошу тебя покинуть твое местопребывание, в какой бы части света оно ни находилось, чтобы явиться говорить со мной, — в противном случае заставлю тебя силой великого Бога живого, его возлюбленного Сына и Святого Духа; повинуйся незамедлительно, не то будешь вечно терзаем силою могущественных слов великого Ключа Соломона, коими пользовался он, дабы вынудить мятежных духов принять его договор; так что являйся как можно скорее, не то стану беспрерывно пытать тебя силой этих могущественных слов Ключа: Agion, Tetagram, vaiycheon stimulamaton у eipares rertragrammaton oryoram irion esytion existion eryona onera brasim moym messias soler Emanuel Sabaoth Adonay, te adoro et invoco». Полный текст латинского ключа перепишите отсюда, — и он пустил по кругу тетрадь, из которой зачитывал латинскую абракадабру. Как-то он попросил знакомого латиниста перевести ее, и тот рассмеялся. В оригинале, может, и был смысл — древний, варварский, куда глупее рокочуших и воющих звуков, но тысячи невежественных переписчиков стерли его начисто. Теперь, ежели каждое слово переводить отдельно, ибо все вместе они ни к одному языку не принадлежали, — выходило: священная тетраграмма (испорченная до бессмысленной ретрограммы) железно существующие тяготы варить и жарить одинокие пророческие испражнения обожаю и поклоняюсь.</p><p class="p1">От Остромова не укрылась улыбка Альтера.</p><p class="p1">— Присутствующие здесь знатоки древних и новых языков, — сказал он с учтивой язвительностью, — увидят в этом, конечно, бессмыслицу, ежели не издевательство. Однако позволю себе напомнить, что все языки восходят к единому образцу, слова которого мы за годы неряшливого использования исказили до неузнаваемости. Следы языка атлантов первого эона можно найти в латыни, греческом, нынешнем испанском, кое-что уцелело в итальянском и даже в русском, если принять на веру, что атланты дошли до средней Волги. Ничем иным я не могу объяснить существование Пензенского чуда, которое все мы увидим, если будущим летом совершим запланированное паломничество. Это, как вы, вероятно, знаете, сколоченный из досок идол, на котором грубо вырезано «Аштарот кугла», то есть чертова кукла, в российском просторечии. Духи понимают лишь праязык, который нам кажется испорченным, — и хвала создателю, что мы с вами на нем не говорим. Иначе весь мир слушался бы нас, предметы срывались с мест, и это привело бы, как вы понимаете, к непредсказуемым последствиям. Сакральное не бывает грамотным, и наоборот, — запомните это. Великие медиумы нарочно искажали суть открывшегося, дабы оно не стало достоянием профанов; подозреваю, что атланты нарочно меняли по одной букве, обучая языку дикарские племена.</p><p class="p1">Альтер старательно переписывал, не переставая, однако, бледно улыбаться.</p><p class="p1">— Дух явится, — продолжал Остромов, следя, чтоб переписывали аккуратно и побуквенно, с должным почтением к тайне, — и спросит — разумеется, мысленно, но так, что слова его прозвучат прямо в голове: «Кто ты, призывающий и так противно мучающий меня, и с какой целью воздвигся?». Ваш ответ должен быть тверд, и непременно вслух: «Я тот, кто жаждет знания; я тот, в ком три сокровища, — воля, сила и свобода». При этом ударьте перед собою жезлом, как если бы секли провинившегося. Дух потребует крови. Осторожно возьмите кинжал, или хотя бы простой нож, тщательно протертый спиртом или хотя бы водкой, и надрежьте указательный палец левой руки. На эту кровь Батим спустится непременно, не может не спуститься, — продолжал Остромов с обычной, а сегодня и возросшей силой убеждения. — Почувствовав его присутствие по характерному запаху — смеси серы, уксуса и печной золы, от его алхимических занятий, — скажите тоном приказа, не колеблясь, в полном сознании силы: «Батим, дух охраны и знания, явись мне в силе и сопутствуй на всех путях!».</p><p class="p1">— И что будет? — тонко спросил Альтергейм.</p><p class="p1">— Это никогда нельзя предсказать. Известно, однако, что Батим не приходит с пустыми руками, и в первую же ночь вы станете обладателем какой-либо формулы, или по крайней мере ценного указания, — осклабился Остромов.</p><p class="p1">— Но не может ли он нас, так сказать, увлечь, куда-нибудь, так сказать, против воли? — торопливо и перепуганно спросила Мурзина.</p><p class="p1">— Это крайне маловероятно, ибо мы под надежным покровительством, — успокоил ее Остромов. — Разумеется, перед опытом надо сказать «Defenzia perfecta», но суть не в этом, а в люциферическом сознании. Если вы строго пребываете в люциферическом сознании и чистоте, дух почувствует родство и не сделает вам зла. Опасен он только для тех, кто убоится или усомнится в покровительстве… Однако Батим еще далеко не главный из трех духов. В сущности, описание Андерсена из «Огнива» — разумеется, автора эзотерического и весьма близко подошедшего к иным тайнам, — имеет немало общего с истиной. Вызывая второго пса правды, вы должны быть еще строже: «Пюрсан, страж всего минерального и алого, трафаретного и прагматичного, забытого и чрезвычайно умеренного! Я хочу, чтобы ты здесь, сейчас, сюда же немедленно прибыл и тут передо мной растекся».</p><p class="p1">Это заклинание Остромов уже импровизировал, ибо Гримуар ему надоел. Хотелось чего-то внезапного и многозначного: минеральное, алое…</p><p class="p1">— Вы немедленно ощутите запах весенней почвы, ибо Пюрсан есть также страж тайн плодородия, потенциальный друг садовода. Он обратится к вам еще более грозно, и вероятней всего, не вслух: «Кто ты, недостаточно угодливый паршивец, что осмеливается тут вот так меня сейчас понукать?» или что-то в этом роде. Ударьте перед собой волшебным жезлом, как бы поддевая шляпу, — есть сведения, что Пюрсан имеет форму шляпы, такого слегка приподнятого блина, — и произнесите с крайней уверенностью, но корректно: «Я тот, кого тебе знать не надо, а вот мне от тебя кое-что надо». И в ту же секунду — разумеется, если будете произносить текст с достаточной независимостью, — он положит перед вами тайну плодородия, это будет нечто из плодов земных либо как вариант заклинание.</p><p class="p1">— Я насчет плодов земных, — поинтересовалась Савельева. — Может ли это быть, например, арбуз?</p><p class="p1">— Думаю, — сказал Остромов язвительно, — что это в каждом случае личное, пропорциональное способностям. И не удивлюсь, Софья Васильевна, если в вашем случае это будет именно арбуз, но не удивитесь и вы, если это будет изюм.</p><p class="p1">Савельева улыбнулась.</p><p class="p1">— Что до третьего духа, — сурово произнес Остромов, — с ним вам потребуются особые меры предосторожности. Он знает будущее, для него нет секретов за любыми закрытыми дверями, и тому, кто чист, он служит верой и правдой, но к лукавым беспощаден, а корыстных ненавидит априори. Этот дух в телесных явлениях бесконечно разнообразен, и узнать его можно лишь по выражению бесконечной скуки на лице: все земное ему понятно и скучно, и вам трудно будет удивить его. Бросьте в пламя свечи щепоть мелкой соли и сразу вслед за тем обратитесь: «Абигар, дух дознания и расследования, для кого нет закрытого! Явись и обостри мне слух, зрение, обоняние и осязание!» Избегайте упоминать вкус, ибо на вкус там ничего хорошего. Вы почувствуете резкий гнилостный запах, всегда сопровождающий чужую тайну, и услышите омерзительное шипение, как если бы в гигантской ложке погашалась сода. Вслед за тем будет грозный клекот — что-нибудь невыносимо грубое, как он умеет. О, я некогда от него наслушался! — И Остромов изобразил ухмылку типа «Личный опыт», за которую его особенно любили. — Но это вас не остановит: скажите ему — «Ругаться всякий может, а ты предъяви мне то, что имеешь только ты». И он — тщеславный, как все демоны второго порядка, — предъявит вам заклинание, с помощью которого вы уже на следующий день сможете надолго парализовать чужую волю, ибо против этого заклинания не может устоять никто; увы, я не могу вам передать его сам, ибо действует оно, только если получено лично от демона.</p><p class="p1">— Я хотел уточнить, — снова подал голос Альтер. — Не будет ли ему трудно явиться в семь домов одновременно, если все мы его будем вызывать именно этой ночью?</p><p class="p1">— Уверяю вас, — улыбаясь наивности вопроса, отвечал Остромов, — что этой ночью его будут вызывать далеко не семь человек, и далеко не на одной планете. Силы этих сущностей бесконечны, а время отлично от нашего; каждая наша секунда дробится для него на годы. Он успеет не только явиться всем, хотя бы его и вызывало все человечество, — но и соскучиться в паузе между приглашениями. Эти духи никогда не устают, ибо от того, что они делают, устать невозможно: есть лишь два занятия, которые никогда не прискучивают, — это познание и пользование властью, а потому…</p><p class="p1">Резкий звонок прервал его объяснения.</p><p class="p1">Галицкий, подумал Остромов с неудовольствием. Мало того что опоздал, — зачем вообще его черт принес? Он заметил, что Надя с радостным нетерпением посмотрела на дверь, а на лице Поленова изобразились одновременно страх и злорадство: этому-то что?</p><p class="p1">— Да! — крикнул Остромов, но вместо обычного «Salutant benevolum!»<a href="ch2.xhtml#id21" class="a">[26]</a> услышал ленивое, с полным сознанием власти:</p><p class="p1">— Открывай давай.</p><p class="p1">— Кто это? — ничего не заподозрив, спросил он.</p><p class="p1">Ответом ему было скучающее:</p><p class="p1">— На счет три выбиваю дверь.</p><p class="p1">— Зачем же? — спокойно спросил Остромов и повернул замок.</p><p class="p1">Перед ним стояли Батим, Пюрсан и старший над ними Абигар, невысокий, щуплый, с выражением бесконечной скуки на лице.</p><p class="p1">— Знач, так, — лениво сказал Абигар и вдвинулся в прихожую. — Всем быть на местах, при попытке бегства стреляю на поражение.</p><p class="p1">Остромов услышал, как вскрикнула Ирина.</p><p class="p1">— Осмелюсь попросить, — спокойно сказал Альтер. — Предъявите, пожалуйста, то, что есть только у вас.</p><p class="p1">— Да пожалуйста, — снисходительно согласился Абигар, вынимая ордер.</p><p class="p1">— Благодарю вас, — сказал Альтер. — Похоже, работает, Борис Васильевич.</p><p class="p1">Этого замечания Остромов не понял. Ему было не до шуток совершенно.</p><p class="p1">— Поворачивайся, хозяин, — толкнул его Пюрсан, действительно приплюснутый, малорослый, с рожей комом, как первый блин. — Сдавай под опись, что имеешь заявить добровольно.</p><p class="p1">Он жрал кислое зеленое яблоко, плод земной, и другое такое же яблоко мирно топорщилось у него в кармане. Проглотил остаток яблочка, не оставляя огрызка, и сплюнул на пол, словно утверждая власть.</p><p class="p1">— Ни с места никому! — прикрикнул Батим, в самом деле припахивавший кислятиной — то ли от коричневой кожанки, то ли что-то такое ел, то ли сам состоял из кислого вещества, окиси человека. Он полушепотом ругнулся — без смысла, в порядке заклинания, — и решительно ткнул Остромова кулаком в грудь. — Иди, дядя, не маячь. Давай вона в комнатку.</p><p class="p1">— Я удивляюсь, — сказал Остромов, пытаясь стряхнуть оцепенение. — Я удивля…</p></span></span>
