<p class="p">Глава вторая</p>
</div><p class="subtitle">1</p><p class="p1">Алексей Алексеевич Галицкий был человек надеющийся. Это его и сгубило.</p><p class="p1">До восемнадцатого года он играл в частном театре Берка, но Берк бежал, а театр закрылся. Галицкому было легче, чем многим: семьей он не обзавелся, предпочитая домашним оковам холостяцкий уют и необременительные связи. В восемнадцатом ему было сорок семь лет, он был еще крепок и, как сказано, надеялся. Поиски заработка привели его в группу лекторов ПЕКУКУ — Петроградской комиссии управления культурой учащихся, созданную страстным пропагандистом устного слова Табачниковым. Табачников полагал, что устная речь усваивается прочнее письменной, а оттого все преподавание в школах для победившего пролетариата надлежит свести к устным лекциям по всем отраслям знания, прежде всего к чтению вслух, и Галицкий тут был незаменим. В любую погоду отправлялся он в школьные и университетские аудитории, а потом, когда Табачников расширил свои полномочия, — и к заводчанам; голос срывался, хрипел, но Галицкий читал.</p><p class="p1">Это было, конечно, безрадостное занятие. Алексей Алексеевич и себе не признался бы в этом, и шумно рассказывал друзьям, как заряжает его аудитория благодарностью и энергией, но читать детям, а в особенности заводчанам, в длинных холодных аудиториях с пыльными окнами, было ему трудно. Новый репертуар, состоявший в основном из виршей пролетарского поэта Кириллова, длинных и красных, как кумачовая лента, — не трогал слушателей и был противен ему самому, а старый почти целиком попал в недозволенное. Он выкраивал по строчке, набирая композиции из Бальмонта и Минского, у которых тоже в свое время хватало кумача, но умудрялся протащить и любовное — строф пять, не больше. В остальное время пролетарии были сонливо-неподвижны, словно устали раз навсегда, еще до всякой работы.</p><p class="p1">Зато каким счастьем было возвращаться домой — пешком, по спящему городу, где ему почему-то ни разу не встретился ни один из легендарных грабителей, о которых столько судачили! Алексей Алексеич шел по снежному Петрограду, сказочному городу без огней, и вслух читал сугробам то, что хотел. Только эти возвращения и сохранила благодарная память Галицкого, а чтения перед пролетариатом он напрочь забыл; они снабдили его скудным пайком, а большего от них не требовалось. Да и в глазах пролетариев иногда мерещилась ему благодарность и даже изумление, с которого всегда начинается любовь к искусству, и вскоре кто-то из благодарных пролетариев на него донес. Они не для того собирались после трудового дня, чтобы слушать старорежимное; и Табачников закатил Алексею Алексеичу долгий скандал.</p><p class="p1">Он кричал, что новаторская его теория и так встречает оголтелое сопротивление, что сейчас нужно читать рабочим не лирику про букэ-э-эты (которой Галицкий сроду не читывал), а давать им основы знаний, вот хоть из физики, а если уж актеры так бесполезны, что не могут читать из курса физики, пусть по крайней мере дают выдержанную программу, чтоб никто не смел подкопаться! Алексей Алексеич чувствовал, что главное не сказано, и потому сам, широко улыбаясь из деликатности, предложил отчислить его из штата ПЕКУКУ, что ж такого, ничего страшного, он изыщет возможности… Табачников тут же успокоился, помягчел и даже назвал голубчиком, долго жал руку и клялся вернуть Галицкого в должность, как только оппоненты устного чтения хоть немного умерят злодейский пыл и дадут, понимаете ли, дышать.</p><p class="p1">Так Алексей Алексеич остался без службы, но он, как мы знаем, был человек надеющийся, а потому не стал унывать и обратился к Виктору Петухову, директору ШКУРы номер пять, как назывались пятые Школьные Курсы Выборгской стороны. Петухов тоже был экспериментатор, да все были экспериментаторы: ничему уже нельзя было научить в простоте — все только с привлечением небывалых методик, вот и Петухову казалось, что для усвоения нужны телесные действия и что вообще память тела, как он выражался, сильней ума. На всякий физический закон находилось у него физическое упражнение. Алексей Алексеич пошел к Петухову, предложил свои услуги и с осени девятнадцатого уже вел кружок, куда потянулись со временем и товарищи шкурников: поставили они «Сказку о царе Салтане», «Блоху» и подбирались уже к Шекспиру. Конечно, действовать приходилось в рамках антимонархического репертуара, чтобы под занавес поразить социальное зло, — но Алексей Алексеич умудрялся и тут вворачивать свое, читать им Брюсова, и видеть в их глазах… что можно было увидеть, в желтых голодных глазах школьников двадцатого года? Но ему казалось, что слово его падает на добрую почву, и точно — двое затравленных, безнадежно униженных, начали как будто расцветать и даже что-то изображать, и Алексей Алексеич приглашал их домой на морковный чай и задушевный разговор, и несколько раз ему доверили провести урок, когда заболел словесник, — всего невыносимей было требование Петухова приседать при чтении «Онегина», чтобы и весь класс тоже приседал.</p><p class="p1">Но каким счастьем было возвращаться домой — пешком, в тот прелестный вешний час, когда день клонится к вечеру, но еще светло, и над Петроградом широко стоит морковная, нет, лучше абрикосовая заря! Как хорошо было читать доверчивому балбесу Анисимову что-нибудь из любимого, замечая, что он задает все более осмысленные вопросы! Во всем, решительно во всем можно было найти прелесть и смысл, если смотреть незамутненными глазами, и Алексей Алексеич Галицкий был бы счастлив и на этой службе, если бы Петухов не проштрафился чем-то перед начальством и школа его не была расформирована, причем забитые Малахов и Анисимов, только начавшие что-то понимать и запоминать, пошли работать — один в депо, другой на табачную фабрику имени Троцкого, и там им суждено было немедленно забыть все, чему выучил их чудаковатый артист.</p><p class="p1">Алексей Алексеич и тут не приуныл, тем более, что никому не было легче. Позвав на пятидесятилетие немногих друзей по театру Берка да странного соседа Поленова, в одиночку растившего дочь Лидочку, он порасспросил, кто чем занят, и услышал много безрадостного. Кто распродавал последнее, кто спекулировал, кто обучал манерам отпрысков новых хозяев — едва победив, тут же захотели изящного; в артистах удержались человек пять из бывшей труппы, и Алексей Алексеич считал себя счастливчиком. Кроме того, как мы помним, он был человек надеющийся — и отправился к брату в Крым, где близ Судака открывалась санатория для туберкулезных детей.</p><p class="p1">Письмо об открытии санатории он получил в начале двадцать второго и, передав ключ от квартиры соседу Поленову, легко отбыл в Крым, на блаженное побережье, в компанию своего вечно угрюмого брата Ильи и его доброй жены Ады. Ему пришелся по душе старший племянник, пухлогубый восторженный Даня, зачитывавший всех своими стихами и выпускавший рукописный альманах; младший, рожденный за год до войны, еще не определился, но, казалось, пошел в отца. Брат Илья жил очень бедно, долго доказывал, что в седьмом году попал в ссылку за политику, получил крошечную пенсию и страшно скупился. Если б не Ада, неистощимая на выдумки, шутки и сказки, в доме было бы совсем грустно, и Алексей Алексеич поспешил съехать в лагерь имени Луизы Мишель. Там он устроился воспитателем, не забыв про себя отметить, что все глубже скатывается в детство — сначала читал пролетариям, потом старшим школьникам, теперь вот страдающим детям от пяти до двенадцати, и правду сказать, эта работа была из самых невыносимых — на жаре читать и рассказывать больным, самый вид которых мучил Алексея Алексеича. Самое ужасное, что больные дети ссорились и обзывались, как здоровые: это мешало жалеть их. Слушая Робинзона, они ненадолго забывали вечные ссоры, прекращали кидаться камнями — которые бросали мастерски, компенсируя неподвижность меткостью, — и свистящим шепотом повторять друг другу чудовищные, непредставимые в детских устах слова; но скоро привыкли и уже ничего не слушали. Взаимное мучительство было интересней всякого Робинзона. Алексей Алексеич вообразить не мог, что неподвижные дети способны производить столько шума — и так взросло ненавидеть любого сочувствующего, не испытывая ни малейшей благодарности. Персонал, впрочем, платил им тем же, раздавая подзатыльники направо и налево. Осенью Галицкий покинул Крым и вернулся в Петроград, в квартиру, куда решением домкома вселили ему для уплотнения счетовода из финотдела, пунктуального человечка по фамилии Ноговицын.</p><p class="p1">Алексей Алексеич, напомним, был человек надеющийся. Он и тут понадеялся, что в Ноговицыне есть что-то человеческое, хотя вечный ужас сделал из соседа сверхпунктуальное существо с манией отчитываться за каждый шаг если не справкой, то свидетельством. Он и свидетельствами Галицкого старался заручиться — Бог весть на какой случай: каждый день, приходя с работы, просил подтвердить, что вернулся в шесть с половиной вечера. Галицкий завел даже журнал возвращений Ноговицына, явно подкупив его этой мерой. Расчувствовавшись, Ноговицын признался, что бояться стал после ареста коллеги по финотделу, оказавшегося, представьте, бывшим офицером! «Но ведь вы не офицер», — полувопросительно утешил его Галицкий. «Нет, как можно! Но поймите: ведь он был хороший бухгалтер. И ничего такого не делал». «Вам это не грозит», — успокаивал Галицкий. «Не скажите, теперь может быть все!» — твердил Ноговицын, но доверять начал, хоть и не сразу. Убедившись, что Галицкий никогда не был офицером и что за такую рекомендацию его никуда не заберут, новый жилец рекомендовал его в финотдел, ибо грамотные были на вес золота, а почерк у Алексея Алексеича был, как характер — ясный и круглый.</p><p class="p1">Так Алексей Алексеич простился с актерством и сменил-таки профессию, как большинство новых бывших, — к коим себя не причислял, ибо никогда не угнетал человека человеком, как шутил в письмах к сестре. Он и на новой должности, ненавидимой до тошноты, утомлявшей, как ни одна репетиция, — умудрялся вспомнить актерство и приноровить его к финотделу, создавши театральный кружок и поставивши в нем драматический лубок с элегическим названием «Как я попа разлюбил». И каким блаженством было идти домой, когда два часа кружковых репетиций наконец иссякали и крупные весенние звезды висели над плоским городом! В этой светлой перспективе не все ли равно, кем быть — чтецом, бухгалтером, вожатым? Между тем смутный голос шептал ему, что отнюдь не все равно, что по капле он уступал себя, спускаясь от Гюисманса к Кириллову, а оттуда к лубку — и что ж было удивляться, если ни горе, ни радость не переживались теперь с прежней остротой? Переживать было нечем; легко утешаться словом «возраст», но что возраст, ежели Глинский и в восемьдесят порхал по сцене в «Учителе танцев», а в Глостере рокотал так, что содрогались колосники?</p><p class="p1">Алексей Алексеич попробовал, конечно, сунуться в Большой драматический, да куда — Монахов, Юрьев, Лаврентьев, и тем, как по старому знакомству доверительно шепнул Лаврентьев, было не вздохнуть: то «Дон Карлос» нехорош — зачем в революционерах ходит королевский сын? — то в «Коварстве и любви» мало угнетения, и комик Степанов надерзил комиссару, что если надо пролетариат, так мы поставим «Разбойников», только заступничество Андреевой и спасло. Что делать, в шестнадцатом году в Петрограде было больше актеров, чем требовалось в двадцать втором; и Алексей Алексеич бухгалтерствовал, покамест в первую чистку двадцать третьего его не вычистили со свистом — как шепнул Ноговицын, именно за кружок, потому что если бы не было кружка — то еще бы, конечно, потерпели. Хотя Алексей Алексеич был, как сказано выше, человек надеющийся, эта перемена обескуражила и его. Вдобавок и Ноговицын тотчас съехал, точно боясь заразиться; и что все эти Гоголи умилялись маленьким людям? Маленький человек прежде всего трус. Тут-то Галицкий понял: для преуспеяния все теперь следовало делать как можно хуже, таков главный закон установившегося порядка. Дурная работа была не просто извинительна, но единственно праведна: много страдал, плохо кормили, рос в убожестве. Несколько таких убогих трудились и в райфинотделе, и ничего им не сделалось — Галицкий, казалось, слышал, как они злорадно посмеивались ему в спину.</p><p class="p1">Судьба переменилась в двадцать третьем году, когда вдруг оказалось, что все одинаково устали от кумача. Вдруг открылось множество вакансий: там бал, там детский праздник. У Галицкого, заведшего за пять лет выживания знакомство чуть не во всех сферах жизни, так и замелькали перед глазами былые персонажи — и как, Боже мой, причудливо тасовались! Вот пронесся Табачников, ныне распространитель целительных резиновых бандажей, вот забитый Анисимов — он был теперь в Смольном старшим автомехаником, богом местного гаража, и приглашал покататься, по старой памяти; вот комик Степанов подрабатывал куплетистом в новооткрывшейся «Вене», и непонятно, откуда что взялось, ведь только что лакомством казался хлеб со жмыхом; вот Петухов держал лавку, торговал мехами и почему-то мылом, оброс жирком, подарил брусок душистого «Аметиста», густо-лилового, фингального цвета. Все были очень ласковы с Галицким, избывая, быть может, давнюю вину, — но странное дело, эта новая ласка угнетала Алексея Алексеича больше, чем тогдашняя суровость. Как человек надеющийся, он попробовал было и тут не пропасть — в вихре бандажей, гаражей, ресторанов, где пел Степанов, и мехов, которыми торговал Петухов, вдруг оформился смутно памятный еще по театру Берка приятель, прощелыга Замойский, и присоветовал частную труппу. И Алексей Алексеич пошел по указанному адресу, где бывший декоратор ставил французские водевили, которые сам же и переводил, надо же соответствовать; и Галицкий как человек надеющийся стал играть в комедии «Ни бе, ни мэ, или Где ты, Сесиль?». Сесиль была, разумеется, в шкафу. В первый же выход Алексей Алексеич почувствовал, что стал мертвей того дуба, из которого сколочен был шкаф с Сесилью; может, если бы он чуть меньше надеялся и оттого не со всем соглашался, в нем и осталось бы чуть больше того вещества, которое помнит, воображает и изображает других, но за пять лет надежды и привыкания все это так прочно заросло хрящом, что Галицкий играл из рук вон плохо — даже декоратор, обычно скупой на восторги, похвалил его.</p><p class="p1">Так окончилась его прежняя жизнь, еще теплившаяся среди голода, но погибшая среди НЭПа; он, разумеется, еще надеялся, ибо надежда умирает последней, но уже почти не думал, не читал и не разговаривал с сугробами. Город зарастал лавками. Кумача не стало меньше, но он словно промаслился. Алексей Алексеич тосковал, но смутно, как сквозь жир. Военный коммунизм был плох, но теперь стало мертвее. Еда не имела вкуса. Он задумывался о том, что надо жениться или хоть завести собаку, — но тут получил письмо от брата о смерти жены и скором приезде племянника.</p><p class="p1">Брат писал странное: когда в Петербурге, казалось бы, настало послабление, в Крыму вдруг стали брать всех, кого могли заподозрить в связях с белогвардейщиной, вот уж четыре года как разгромленной и бежавшей. Чудовищный Фирман, командированный в Судак для окончательного выявления белого элемента, арестовывал кого попало, и Аду взяли только за то, что она ухаживала за больным Скарятинским, чей сын действительно бежал на одном из последних кораблей, но при чем же Скарятинский и тем более Ада? Старик умер, Аду выпустили через три недели, Даня страшно переживал, Валя заболел от страха, но главное — за эти три месяца с Адой случилось что-то ужасное. Словно огонь в ней погас. Она больше не рисовала с Даней журнал, не учила Валю играть, забросила огород, сидела на крыльце и плакала, и вдруг пневмония, и все. Он никогда не предполагал в ней такой слабости. В письме брата так и слышалась его вечная обиженная интонация: он продолжал сердиться на жену — как она могла уйти, не подумав о нем, о детях? Что за нежности, в конце концов, другие сидели и больше, и возвращались крепкими, здоровыми, еще и с запасом счастья, что вот, отпустили… Теперь, конечно, он не может в одиночестве заботиться о взрослом Дане и десятилетнем Вале, а потому не мог бы Алексей… Алексей Алексеич немедленно ответил, что мог бы, — Даня был прелесть и, кажется, способен был разбудить его; заодно он с тоской подумал о том, что жениться на Аде, конечно, следовали ему, а не Илье.</p><p class="p1">Отправив письмо, он зашел к соседу, инженеру Поленову.</p><p class="p1">— Вот, Константин Исаевич, — сказал он бодро, надеясь по обыкновению отвлечь Поленова от вечной скорби, в которой тот пребывал со дня таинственной гибели дочери. — Приедет ко мне Даня, удивительный мальчик. Племянник.</p><p class="p1">Поленов поднял голову — он как раз выклеивал коллаж с портретом дочери, уже, кажется, пятнадцатый, — и посмотрел на Галицкого с явным, самодовольным раздражением.</p><p class="p1">— Не пойму я вас, Алексей Алексеич, — сказал он. — Ну, приедет. А мне что за дело?</p><p class="p1">— Я думал, вас развлечет… — сказал Галицкий. Как человек надеющийся, он продолжал верить, что Поленова можно разговорить — и что сам он желает того. Это была ошибка. Поленов жил своей скорбью, как Галицкий — надеждой, и в реальности не нуждался. Так что когда Алексей Алексеич, для приличия поговорив о пустяках, отправился к себе, Поленов проводил его взглядом, какого испугался бы посторонний.</p><p class="subtitle">2</p><p class="p1">Историю Лидочки Поленовой хорошо помнили в Ленинграде, и говорили о ней гораздо больше, чем об Ирочке Абрикосовой, хотя обе исчезли, не оставив следа, с разницей менее чем в год. Ирочка улетела, и ее больше не видели; Лидочка утонула, и ее не нашли.</p><p class="p1">Она отправилась в лодке на пикник, затеянный в прозрачном майском лесу на окраине Петергофа, и на лодку всей тупой железной массой наехал пароход «Альбатрос», шедший в Кронштадт. Особенно страшно было думать, что последняя картина перед ее глазами была это рыло судьбы, рыло парохода — прямой нос идиота и глубоко посаженные зенки якорных гнезд; и капитан Укконен был похож на свой пароход. Он доказывал, что сигналил, а под конец просто кричал, но в лодке не слышали, видимо, отвлекшись на поливание перегревшегося мотора. В этом признался подонок Цветков, сманивший Лидочку на своей клятой посудине, никуда не годной, но хотелось покрасоваться! И он был живехонек, а ее не нашли, не нашли.</p><p class="p1">Как всегда в таких случаях, никто ничего не понимал. Слишком много деталей, и все, как на подбор, страшные тем особенным страхом, когда нечем связать их воедино. Там что-то произошло, в самом этом петергофском лесу: Цветков вез ее для себя. В том не было сомнений. Инспектор речной охраны, что можно охранять на реке? Какое ему дело до балета? Она хохотала: пристал, познакомился на улице, ходил следом, безвредный, безопасный, зато с лодкой. Лодкой и соблазнял. Но она пришла с Капитоновым, и куда было деться несчастному Цветкову из речной охраны? Повез как милый. С ними были Церикадзе, Тулина и Соломина, все трое теперь уехали и там остались, и Лида осталась бы, а через полгода отец получил бы вызов, такой же, как семейство Соломиной, зашедшее перед отъездом проститься. Он видел ее родителей только на траурной «Жизели» в театре и потому не заметил, как не замечал ничего, кроме белых рук Соломиной, исчезавшей в яме: это было такое решение, она все глубже проваливалась, но руки метались над сценой, пока не исчезали. Хорошо было придумано. Когда-то, не верится уже, что всего за полгода, Церикадзе, гогоча, рассказывал, что Соломину, когда она опускается, щекочут под сценой, а ей что делать, по рукам ведь дать не может! Лидочка сказала: если меня кто так защекочет, я потом убью, найду и убью. Ее Жизель была делом решенным. И вот как, значит, она ее станцевала.</p><p class="p1">Церикадзе, Тулина и Соломина выплыли легко, да и берег, уверяли они, был близко. Они заметили сломанную ветлу, и по сломанной ветле Константин Исаевич направлял водолаза. Водолаза устроили только с помощью Цветкова, тоже, казалось, обезумевшего — раздавленного тем, что лодка была его. Он уж, кажется, ничего для себя не хотел, ни на что не надеялся, и думал почему-то, что благодаря водолазу можно отыграть назад. И Константин Исаевич тоже почему-то ждал от него главного ответа, потому что если бы не нашли — не нашли окончательно, безнадежно, — оставалась бы хоть тень надежды. Но потом оказалось — ах, Господи, что потом оказалось! Разумеется, все можно было списать на безумие, на цветковское раскаяние, на запоздалую попытку снять с себя вину, — но и тогда изволь, голубчик, отвечать за слова, ведь ты говоришь с несчастным отцом, которому вдесятеро, втысячеро тяжелее! Он явился осенью, весь мокрый, словно навеки связанный с водной стихией, — хотя Константин Исаевич поклялся бы, что на улице не было дождя, — и с порога рубанул, что узнал все, что водолаз признался ему. Да уже и тогда, на борту катера, когда подняли из воды медное стекляннолицее чудище, тяжелое, неловкое в каждом движении, закупоренное, как бутылка, — ясно было, что водолаз скрывает и что там не то; но какое не то — кто же расскажет теперь? Его так и не уломали спуститься вторично, и вскоре он вовсе бросил это ремесло, и нанялся столяром, да и в этом качестве спился. Что он увидел, что он такого увидел?! — нельзя же было верить Цветкову, который нес Бог весть что!</p><p class="p1">И потом: мясная лужа. Кто придумал этот бред? Будто бы Лидочка уединилась с Капитоновым в леске; будто бы Цветков пытался увязаться следом, с неловкими шутками, с уверениями, что дал отцу клятву следить за Лидочкой и потому не может отойти ни на шаг; но она так на него глянула, что он отстал. Пошли вместе. Разговаривали тихо. Цветков вспоминал, что она была решительна, решительна. На что должна была решиться? Что такое вообще был этот Капитонов, чего от нее хотел? В Петергофе, в прозрачном лесу, должно было состояться объяснение, которого она боялась и без которого не могла; после чего вышли к лодке, сели в нее, — все заметили лидочкину бледность и сухие, но лихорадочные глаза, и бесцветная Тулина запомнила одну фразу: «Ах, я думала, это будет совсем не так…». Что — не так? Что он успел бы там сделать с нею, в прозрачном лесу, на холодной земле? Этого не могло быть, она бы не позволила, стала кричать. И только потом Церикадзе вдруг сказал: но ведь Капитонова не было. Когда отплывали от Петергофа, в лодке Капитонова не было. Подождите, переспрашивали его, вы, может, бредите? Вы забыли? Но он повторял, все отчетливей, все отчаянней: Капитонова не было в лодке. Лида просила никому об этом не говорить, но теперь все равно. Когда мы отчаливали от Петергофа, я еще спросил: может быть, подождем? Нет, ответила Лида, он доберется. Мы поссорились, он ушел, я не хочу больше его видеть. И никто, в самом деле, больше не видал Капитонова.</p><p class="p1">Прочесали и лесок, в поисках хоть каких-то зацепок, но отыскалась лишь поляна, на которой Лида сказала Цветкову: не ходите за нами, и посмотрела таким взглядом, какого он у нее не видывал, и не знал, что такой может быть. Они отошли — куда? — туда! — и показал левее, за куст краснотала. Там-то, через сто метров, на границе смешанного леса и чахлого березняка, обнаружилась мясная лужа, для которой не подобрать другого слова: как будто выжали огромную тряпку, пропитанную кровью, и хотя наутро было дождь, и почти все всосалось в землю, — кровавый след был отчетлив, и можно было даже определить группу, но капитоновской группы, вот незадача, не знал никто, и не с чем было сравнить; одежда исчезла бесследно, и никакая логика помочь не могла. Версия следствия свелась в конце концов к тому, что Капитонов после размолвки с Поленовой пошел к выходу из леса, надеясь добраться из Петергофа своим ходом, но по дороге был убит неизвестным встречным разбойником, вероятно — ради ограбления, потому и была взята одежда; местонахождение трупа установить не удалось, и в случае с Капитоновым не было бы вовсе никакой зацепки, кабы не сапоги, таинственно выплывшие полгода спустя. Нищий в Кронштадте продавал их за три целковых, и по чистой случайности сапоги были опознаны товарищем Капитонова по службе — подковку ставил отец Капитонова, сапожник, сын гордился отцовской работой и всем показывал, прибавляя «на века». Вот тебе и века. Взятый к допросу, нищий показал, что сапоги эти нашел в петергофском лесу, что они стояли ровно, в первой танцевальной позиции, словно танцор внезапно вознесся, оставив ненужную обувь; разумеется, никто не поверил, и нищего обвинили в убийстве Капитонова, случайно встреченного в лесу, хотя поверить, что этот тщедушный бродяга завалил здоровяка-чекиста, было и впрямь мудрено. Но этим ведь не нужна была истина. Им нужно было дело, раскрытое и закрытое; а больше из капитоновских вещей не нашлось ничего, кожанку нищий пропил еще раньше.</p><p class="p1">И весь этот бред с неясными мотивами, путаными показаниями, бесследными исчезновениями достиг апогея бледным осенним вечером с как бы выцветшими от ужаса, серо-лиловыми красками, когда с сентябрьского раннего холода к Константину Исаичу ввалился Цветков и, глотая слова, залопотал что-то о водолазе. Да, он ее видел. Да, он никому никогда не скажет. Я поил его три часа, прежде чем он схватил меня за рукав и, поклявшись всеми чистыми и нечистыми, прохрипел, что на дне, когда он приблизился к Лидочке, Лидочка открыла глаза.</p><p class="p1">Константин Исаевич и теперь со стыдом вспоминал дрожь в коленках, заставившую его рухнуть на стул. Ко всему этому с самого начала следовало отнестись как к белой горячке, и Цветков впрямь оказался потом в Лазаревской больнице. Но тогда, в бледно-лиловом сентябрьском свете, Константин Исаевич поверил ему, и только потом чудовищная схема преступления открылась ему во всей своей наготе.</p><p class="p1">Никакого Капитонова, разумеется, не было с самого начала. Церикадзе был подкуплен, подкуплены были все. Вызревал адский план, которым изначально руководила Красавина, уехавшая за месяц перед тем. Она-то понимала, что если бы Лидочка в самом деле уехала, тридцатилетней старухе Красавиной нечего было бы делать на немецкой сцене. Доказательств нет, допрашивать некого. Нанимается Цветков с лодкой. Плетется страшная интрига — но мир балетных в самом деле мало похож на мир людей. Бездушные виллисы с лунной кровью. Возбуждая в Цветкове то надежду, то ревность, Церикадзе, Соломина и Тулина танцевали вокруг него страшный тройной балет — то есть так это Константину Исаевичу представлялось; это они, нет спора, вложили в его руку роковой пистолет, и именно пулевую дыру обнаружил в голове у Лидочки проклятый водолаз — но, нанятый Цветковым, послушно смолчал. Цветков, и никто другой, выстрелил в Лидочку перед носом кронштадского парохода, и все выплыли, чтобы распространить убийственную ложь. Все были повязаны, Церикадзе, Соломина и Тулина были в Германии, где Красавина, конечно, с первого дня щедро покровительствовала им. Один Цветков сходил с ума от любовной тоски и мук совести, и его укрывали от мира стены Лазаревской больницы. Смыслом жизни Константина Исаевича сделалось мщение.</p><p class="p1">Обратиться ему было не к кому, надеяться не на что. Племянница Поленова, Таня, приходившаяся Лидочке кузиной, была теперь в Москве замужем за шишкой и сама шишка, но отбросила старую родню с такой же решимостью, как и старую жизнь. Константин Исаевич видел один раз ее фото в «Огоньке»: пополнела, в глазах наглость, прикрывающая затаенный стыд. Всем видом как бы говоря: а что такое? Но Танина мать давно бросила мужа, и Таня небось обиделась бы, напомни ей кто о питерском дяде. Распутывать и мстить предстояло самому, одному, в тайне.</p><p class="p1">Более, чем техникой танца и китайчатой узкоглазой красой, Лидочка Поленова славилась элевацией. Знаменитое зависание Нижинского в воздухе было не более как трюком, тогда как Лидочка летала, и знатоки с хронометрами переглядывались — две секунды! Немыслимо, сама Арцахова зависала на полторы. Поленов никому не сказал бы, что магическое зависание достигалось упражнениями особого рода, что и на кровати в головах у Лидочки был розенкрейцерский знак, что весь последний год она пропадала у Морбуса, — оттуда, возможно, тянулся еще один след, и Константин Исаевич к нему сходил, но тот нагнал на него такого страху, что сразу сделалось ясно: тут копать нельзя. Морбус принял его в огромной темной квартире на Конюшенной, в комнате, где все окна были завешены черным бархатом и горели в семисвечнике витые белые свечи; нас, конечно, таким трюком не возьмешь, но все-таки страшно.</p><p class="p1">— Я вам сочувствую, какое горе, — сказал Морбус дежурные слова, но с глубоким и мрачным значением. — Однако вы не должна отчаиваться, ибо великие способности ее души указывают на возможность встречи. Такая душа не могла исчезнуть без остатка. Вы знаете, конечно, — он чуть заикался, и выходило «уконечно», но странным образом и заикание подчеркивало важность, — что упосмертное бытие души зависит от прижизненной практики; но дочь ваша сделала серьезные успехи, и я могу уверенно уобещать вам встречу.</p><p class="p1">Константин Исаевич залепетал, что прежде будущей жизни его интересует возмездие в этой, но Морбус решительно пресек:</p><p class="p1">— О гибели ее я ничего не знаю. В нашу компетенцию не входят случайности. Вероятно, это был несчастный случай и ничего более, но благодаря нам она успела достичь нужного совершенства и переместиться в высший мир. Это требует долей секунды, все зависит от концентрации в самый момент. Полагаю, в самый момент она сконцентрировалась.</p><p class="p1">Константину Исаевичу невыносимо было это слушать. Он догадался, конечно, что Морбус вожделел. У него был такой вид — широченный лоб, густые брови, мясистые ноздри и губы. Она, возможно, попыталась вырваться и бежать, и вот настиг. Константин Исаевич с самого начала знал, что этот кружок не доведет до добра, но с Лидочкой об этом не говорил: она обижалась. Ей отчего-то казалось, что успех в элевации связан именно с Морбусом, вот как опутал! Для этого были все его странные упражнения, за которыми она проводила уже чуть ли не больше времени, чем у станка. Таких упражнений он не встречал ни в одной книге.</p><p class="p1">— Поймите, — робко сказал Константин Исаевич, только что не прижимая руку к груди, — я должен знать все. Она моя дочь, ничего другого в моей жизни не было и не будет. Если она перешла в иное состояние, должна быть возможность снестись…</p><p class="p1">— Другое состояние, — мрачно сказал Морбус, — как раз и есть то состояние, в котором нет возможности снестись. Все прочее остается как прежде, и возможно даже совершенствование в уизбранном деле. Но уснестись вы с ней не можете, даже если сами дойдете до высших степеней.</p><p class="p1">— Однако упражнения, — настаивал Константин Исаевич. — Разве не могли сами упражнения спровоцировать и, так сказать, притянуть…</p><p class="p1">— Упражнения ничего не притягивают, — отрезал Морбус. — И чего, собственно, вы хотите? Она училась самой простой вещи — элевации. Никаких побочных последствий, кроме элевации, от этого проистечь не могло.</p><p class="p1">— Позвольте мне ознакомиться… — начал Поленов.</p><p class="p1">— Вы хотите заняться балетом? — сардонически спросил Морбус.</p><p class="p1">— Я хочу понять, что это было, — упавшим голосом ответил Поленов.</p><p class="p1">— Оставьте, — сказал Морбус веско. — Оставьте думать об этом, живите для ее памяти, если хотите, или попытайтесь зачать нового ребенка, но не думайте проникнуть туда, куда вам проникать не следует. Мы дали ей, что могли, она не требовала большего, нам ничего не было от нее нужно. Если вы не хотите навлечь на себя возмущение особых сфер, идите. Ничего не было, кроме того, что было.</p><p class="p1">Эта фраза отчего-то напугала Константина Исаевича больше всего. Он с тех пор плохо спал, а когда засыпал, видел Морбуса, гнавшегося за ним по узким, ломаным улицам. Он искал выхода, а Морбус не пускал. Надо было обернуться, что-то сказать — но обернуться было еще страшнее. Сны были лиловые, с серебристым блеском по крышам, с беспрерывным дождем, все гуще лившим с неба, так что Константин Исаевич от него задыхался.</p><p class="p1">Разумеется, все было ясно, и карты говорили то же самое. Лидочка начала выскальзывать от них, Морбус вожделел и не отпускал, и драма разрешилась убийством, потому что ничем иным Морбус не удовлетворился. Весь мир вожделел Лидочку — и вот убил ее, потому что она не желала принадлежать никому, кроме искусства и отца. Но чтобы подковырнуть, разоблачить Морбуса, нужен был оккультист сильнее Морбуса — а таких в окрестностях Константина Исаевича не водилось; он устал ждать случая, но не знал, как действовать. Наконец он решил открыться Михаилу Алексеевичу — знатоку балета и другу петербургского оккультизма; интерес его к этой теме был эстетический, но кое-что он знал и, если уговорить, мог поспособствовать.</p><p class="p1">Михаил Алексеевич любил Лидочку самой чистой любовью, ибо нет ничего чище любви ураниста к противоположному полу. Он любил ее чистоту, ее элевацию. Он первым и последним написал о ней, над помещенным в «Театре и революции» некрологом его работы Константин Исаевич рыдал три дня, да и теперь, вспоминая, промакивал глаза. Михаил Алексеевич был единственным мостом между лунным миром балета и черным кругом оккультизма; он знал, не мог не знать. И Константин Исаевич, не в силах найти иной управы на Морбуса, отправился к нему.</p><p class="subtitle">3</p><p class="p1">Теща постарела и сильно испортилась. От нее пахло мышью. Собственно мышь никто не нюхал, но в пустом помещении, где выстыла жалкая жизнь, где рассыпаются по сундукам столетние шубы, — стоит именно этот запах, и Остромову нехорошо стало от мысли, что перекантовываться придется здесь. Он не любил тещу никогда. Он не любил и жену, но жена была хотя бы молодая.</p><p class="p1">— Здравствуйте, тещинька, — сказал он, брезгливо расцеловывая старуху. Ей уже было пятьдесят три, а с виду все шестьдесят, так гнулась и шаркала, торопясь шмыгнуть мимо подселенцев. Всех подселенцев было шестеро, как тут же нашептала она ему в забитой вещами, тесной от них норе: шутка ли, всё из пяти комнат стащить в одну. Старые вещи, сволочь в самом подлинном смысле — сволоченное отовсюду, кажется, что со свалки, — толпились по углам. Теща выхаживала среди них проходы, но они зарастали.</p><p class="p1">— Корытовы, — шептала она с отвращением. — Вы не представляете, Борис Васильич. Если бы мне кто-то рассказал, какой будет моя жизнь, я выпила бы стрихнину. Какое счастье, что не дожил Владимир Теофилович…</p><p class="p1">Тестюшка служил в Павловском полку. Остромов застал его в восемнадцатом при последнем издыхании — лежал в параличе, уставив на всех налитой кровью, испуганно-ненавидящий глаз. Второй едва виднелся из-под сморщенного века. Дочь боялась старика, и немудрено. Когда Остромова, спасителя семейства, подвели представиться к тестюшке, тот захрипел, словно негодуя. Что-то почуял. Остромов ненавидел военных, особенно вот этаких, погибавших вместе с Россией в твердом сознании, что ей конец. Дудки, совсем не конец, теперь-то, без вас, и начнется самое интересное. Остромов именно интересно чувствовал себя в восемнадцатом году. Чувство было такое, что долго, долго готовили стол, заслоняли его стеной, чтобы дети не увидели вкусного, — а теперь расступились и к столу допустили. Генерал Светлояров умер у него на руках, в буквальнейшем смысле, когда перестилали постель. Мужчина был огромный, тяжелый, даром что исхудал до костей. Остромов свез его на Волково.</p><p class="p1">Кроме Корытовых, наличествовали еще Козицкие. Он раньше был портной, и сейчас портной, но обшивал шишек: у него одевался кто-то из самого губисполкома. Проходя коридором, Остромов увидел мельком Козицкую, когда-то, видимо, изумительно красивую и порочную жидовку, быстро уставшую и состарившуюся, как все это жовиальное, но скоропортящееся племя: для них естественно быть старухами, в этом состоянии они могли просуществовать хоть до ста лет. Старцы они обычно с тридцати, самки так и раньше: обвисают и оттопыриваются губы, повисают зобы, оттягиваются веки. Вообще все книзу. Земля притягивает хтонических своих детей. Но когда Козицкой было шестнадцать, она, вероятно, была ослепительна. Счастье портным.</p><p class="p1">— Вы видите, — причитала теща, — что здесь совершенно негде, некуда… Анечка не пишет с прошлого ноября. Вы не знаете, как она?</p><p class="p1">— Я в феврале получил от нее письмо из Анжу, — легко солгал Остромов. — Пишет, что ездила к морю.</p><p class="p1">— Но как же, — запричитала теща, — я бывала в Анжу… Я вывозила ее… В Анжу еще холодно даже в мае, и там нет моря…</p><p class="p1">— Она ездила к морю, а потом поехала в Анжу, — пояснил Остромов. Чертова география, никогда не знал ее. В Анжу виноделие, как не быть морю? — Пишет, что здорова. Письмо у меня, но я не получал еще багажа.</p><p class="p1">— Но вы видите, — причитала теща, — у меня негде, совершенно негде… Я была бы счастлива, я помню, что вы для нас сделали, но я никак…</p><p class="p1">— Речь идет о трех, много пяти днях, — твердо сказал Остромов. — Но вы должны понять… я здесь не просто так…</p><p class="p1">Теща схватилась за грудь.</p><p class="p1">— Боже мой, — зашептала она, — но здесь невозможно…</p><p class="p1">— Все возможно, — беспечно сказал Остромов. — Кстати, я вам привез!</p><p class="p1">Он извлек шаль.</p><p class="p1">— Это прелестно, прелестно, — зашептала теща, обдавая его несвежим старческим дыханием. — Но умоляю, не сейчас. Поймите, я окружена такими, такими людьми…</p><p class="p1">— Вы не знаете, какие люди ходят по пятам за мной, — страшным голосом проскрежетал Остромов. — И если эти люди возьмут меня в клещи, поймите, я не могу гарантировать, что они не тронут вас…</p><p class="p1">Теща позеленела.</p><p class="p1">— Но что… что вы можете о нас сказать? Анечка выехала совершенно законно…</p><p class="p1">Она и теперь любила дочь больше, чем себя, и прежде испугалась за нее. Ужасно это самопожертвование, особенно в людях ничтожных, прикрывающих свое ничтожество бантиком родственной любви.</p><p class="p1">— Не в Анечке дело. Поймите. Если доищутся до меня, за мной пойдут все. Вы знаете, что я человек непростой. Я нужен им весь, целиком, со всеми способностями, связями, документами. Мне сейчас притаиться на пять суток, после этого доживайте, как вам угодно…</p><p class="p1">— Боже мой, — хрипела теща, — но если донесет кто из соседей!</p><p class="p1">— Это моя забота. Вы сами знаете, что соседи не донесут.</p><p class="p1">— Пять дней, — лепетала она.</p><p class="p1">Он кивнул. За пять дней она привыкнет — старики, которым не с кем выговорить страх и беспомощность, привыкают к любому собеседнику, даже и к мухе.</p><p class="p1">— Я вам денег дам, и у меня есть мыло, — сказал он уже буднично.</p><p class="subtitle">4</p><p class="p1">Михаил Алексеич жил на Спасской, нового имени которой Поленов не признавал. Жил он с Игорьком, которого Поленов не выносил. И самая их комнатка, с пудрой, флаконами, гримировальными карандашами, не нравилась Поленову. Что двое мужчин жили вместе, по возрасту напоминая отца и сына, по сути будучи мужем и женой, — еще вмещалось в сознание; но что они принимали, и гости запросто туда ходили, имея это в виду, — тут Константин Исаевич пасовал, и когда Игорек являлся накрашенный — пасовал тоже. Страшно было разговаривать с Михаилом Алексеевичем, представлялось неприличное; когда он брал под локоток, хотелось провалиться. Непонятно было, ласкает или так. Было, однако, тем неприятней, что на дне души, которое у неглубоких натур видней, чем у сложных, — Константин Исаевич знал отлично, что он для Михаила Алексеевича не более чем пень, деревянная колода, и никакого интереса с точки зрения ужасного порока не представляет, да и вообще вхож в этот дом лишь потому, что был причастен к рождению таинственной балерины с ее чудесным зависанием и лунной чистотой.</p><p class="p1">Михаил Алексеевич полагал, что только такие и должны танцевать — детски-невинные и детски же безумные, в прямом значении отсутствия ума. Для него Лидочка была существо иного мира, и переход ее в смерть представлялся ему столь же естественным делом, как и гибель молодого художника, не умевшего плавать. Михаил Алексеевич часто о нем говорил, чтобы утешить Поленова, и выходило, что для художника утонуть было самое лучшее, и кстати, почти на том же месте; что молочная, ровная, холодная, чуть опалесцирующая недосоленная вода как раз и есть кратчайший путь в их рай. Себя, задумчиво сказал Михаил Алексеевич, я в раю не вижу. Я нигде после смерти себя не вижу, но отчего-то вижу других. Художника — да, и Лидочку там же: оба чем-то были схожи, полной своей неукорененностью, скорее всего. «Для чего вы ее удерживаете? Ведь они совсем не могут жить, им надо рисовать, танцевать».</p><p class="p1">Наедине с Михаилом Алексеичем остро чувствовалось, как мало он человечен. Говорить такое отцу! Теперь совершенно уж дважды два было, что во всем виноват Морбус, и сон показал на Морбуса, и беспокойство Морбуса говорило само за себя. Надо было еще, конечно, выяснить механизм, благодаря которому Морбус сумел подкупить Цветкова, внушить ему свои глупости, шантажом заставил рассказывать водолазные небылицы. История эта теперь рисовалась Поленову так ясно, что он, как ни прикидывал, не мог представить, как станет опровергать ее Михаил Алексеевич. Шел же он к нему не только за разговором, но и за советом. Михаил Алексеич знал Морбуса, был своим в этом кругу, читывал даже публичную лекцию о масонстве Моцарта, — он обязан был сказать.</p><p class="p1">Бывать на пятницах Михаила Алексеича было мучительно, потому что Игорек все время чем-нибудь увлекался, и хочешь не хочешь — восхищайся. И все это была ерунда, неприличная для взрослого мужчины. Он то вырезал из цветной бумаги, то лепил из особой глины, найденной им в Царском, то составлял композиции из спичек, то принимался писать рассказы с привидениями и зачитывал их вслух, причем смеялись в непредсказуемых, непонятных Поленову местах. Что смешного, если призрак говорит по-немецки? Картинки Игорька были мало приличны, везде угадывался фаллос, в последнее время стала появляться женщина с маленькой грудью и мощными бедрами, и женщину эту Поленов узнал, она сидела между Михаилом Алексеевичем и Игорьком, неприлично хихикая. Михаил Алексеевич улыбался ее вульгарным шуткам. Считалось бонтонным говорить, что во всем, за что бы ни взялся Игорек, сквозит врожденное чувство вкуса; с самим Игорьком понятие о вкусе никак не вязалось. Он был рослый, с большими руками и ногами, с идиотически вытянутым лицом, с неприятной манерой повышать интонацию к концу фразы, словно всегда спрашивал. Это, верно, сохранилось у него с детства, как и другие детские привычки вроде лепки или вырезывания манков, потому что к Михаилу Алексеичу он попал полуребенком и с тех пор не менялся. Тошно было слушать, противно хвалить его, но Поленов кивал и похваливал, повторяя: «Изящно, изящно».</p><p class="p1">— Вот идет Поленов, — сказал Игорь, лежа животом на подоконнике и примечая гостей.</p><p class="p1">— Пускай себе, — сказал Михаил Алексеич.</p><p class="p1">— И чего ходит, — проворчал Игорек.</p><p class="p1">— Надо пожалеть, — говорил Михаил Алексеич, не отрываясь от пасьянса.</p><p class="p1">— Его чем больше жалеешь, тем он злей.</p><p class="p1">— А так всегда, — монотонно сказал Михаил Алексеич. — Скорбь, страх, все темные чувства — переходят в злобу, и в таком виде их можно перенести. Я никогда не умел и оттого подолгу страдал. А многие озляются, и ничего.</p><p class="p1">— Сегодня Ломов обещал оригинала привести, — говорил Игорек, следя с высоты шестого этажа, как Поленов заходит в подворотню. — Говорит, весьма просвещенный масон, перевоплощение не то Казановы, не то Калиостры.</p><p class="p1">Михаил Алексеич томно улыбнулся.</p><p class="p1">— Знаете, Игорь, — сказал он мечтательно, — я полюбил шарлатанов. Они мне напоминают зиму восьмого года.</p><p class="p1">Игорь слегка вздохнул: он устал слушать о зиме восьмого года.</p><p class="p1">— Я все думал, что от нас останется. И от нас вообще, и от всего этого, — продолжал Михаил Алексеевич. На нем была красная шелковая рубашка и черная жилетка. — И я понял, что от мира в конце концов останутся тараканы, и Господь будет любоваться тараканами, потому что они ему будут напоминать… Выживает всегда худшее, и вот они — последнее, что выжило. Пусть приходят шарлатаны. Двух Калиостро я уже знал, где два, там и три.</p><p class="p1">Прозвенел короткий звонок, длинный и еще два коротких — буква «Л» в телеграфной азбуке, счастливая любовная буква. Пришел Поленов и стал зудить.</p><p class="p1">Он рассказал, что Трубникова — знаете Трубникову? — после отъезда напечатала дневник, с купюрами, но по выделенным местам совершенно ясно, что речь шла о Лидочке; что Морбус имел на нее свои виды; что сошлись два стремления двух негодяев, и именно это запутало картину преступления; что поначалу он и сам дал себя увлечь на ложный путь, но теперь окончательно все выяснил, осталось уличить. Михаил Алексеевич слушал, не прерывая пасьянса.</p><p class="p1">— Константин Исаевич, — сказал он, пока Поленов переводил дух (останавливаться он не собирался, принялся бы рассказывать все по второму кругу), — вы растите в себе темные чувства. Поверьте мне, это не нужно. Ни вам не нужно, ни Лидочке.</p><p class="p1">Поленов открыл рот, но Михаил Алексеевич продолжал.</p><p class="p1">— Во всякой смерти, если поискать, отыщется чужая воля. Мы теперь так плохо живем, нам до того делать нечего, что каждый заполняет пустоту чем может. Я вас не учу, не наставляю. Но заполнить много чем можно. Вы ведь себя портите. Лучше, как Игорек, что-нибудь безвредное… Вот он печку давеча расписал. Он картинки сделал, я рассказы сочинил. Посмотреть хотите?</p><p class="p1">Поленов собирался разразиться отповедью, не пощадив на этот раз никого — ни Михаила Алексеевича с рассказами, ни Игорька с картинками и печкой, — но вновь прозвенела любовная трель, и Михаил Алексеич впустил Альтергейма, бледного поэта, писавшего непонятное. Поленов его за поэта не считал. Михаил Алексеич меж тем его жаловал и звал «Альтер», с нежною растяжкой на первой гласной. Поленов, как все мономаны, не мог допустить, чтобы непонятные ему стихи были милы и ясны другим, и оттого подозревал сначала, что Альтер содомит, почему его так и любят здесь; но у этого было другое, более страшное извращение. Можно понять того, кто любит не тех и не так, но невозможно смириться с человеком, которому это вообще не нужно.</p><p class="p1">— Я теперь все думаю, что болен, — сказал Альтер, — хотя я здоров.</p><p class="p1">Он говорил странные, отрывистые вещи, без подготовки, словно продолжал прерванную</p><p class="p1">беседу.</p><p class="p1">— Почему же? — с живейшим любопытством спросил Игорек.</p><p class="p1">— Я чувствую неправильность своего положения, — бледным ломким голосом продолжил Альтер, — и это наводит меня на мысль о неправильности телесной.</p></span></span>
