<span><span><p class="p1">И Мстиславский изобрел комэдию — так он произносил, со всем уважением к жанру. Он придумал сыграть на контрасте. Аристократы уже заряженной в производство «Мести трущоб» должны были быть не просто аристократы, а идиоты. Им надлежало жрать руками, чавкать, вытирать пальцы о платья соседок; во дворцах они должны были предаваться грязнейшему разврату, лапать дам за грудь, сморкаться в скатерти. Неверно было бы представлять всех бывших одним безразмерным монолитом: были среди них и те, кто ненавидел аристократию не меньше, а то и больше пролетариата — поскольку для пролетариев все уж точно были на одно лицо, и какого-нибудь кавалергарда-сифилитика они в глаза не видели, а Мстиславский насмотрелся, накушался. За их бессовестный, бездумный распад пострадали теперь все, включая Мстиславского, лишившегося ателье. Так бедный Евгений поплатился за решение Петра оковать Неву в гранит, хотя был, как говорится, ни сном, ни духом. В некотором смысле месть трущоб была личным актом возмездия Мстиславского, и уж он решил их не щадить, — но тут возникла загвоздка. Когда аристократию изображали синеблузники, жрать и сморкаться выходило у них на диво органично. Сняли три дубля в разных составах — что ты будешь делать, они вели себя ровно так, как на своих сборищах, и при их курносых рожах все выходило чудо как уместно. В то, что эдак неистовствует аристократия, не поверил бы и самый доверчивый пролетарий.</p><p class="p1">Мстиславский в задумчивости теребил усы, потирал по обыкновению мочки ушей, но ничего выдумать не мог. Дать в «Ленправду» или хоть в вечернюю «Красную» объявление о том, что для съемок по особому тарифу набираются бывшие дворяне, было немыслимо: никто из дворян не желал признаваться, все мимикрировали как умели. Наконец он положился на трамвайное радио, как в городе называли слухи. Он прельстил дворянство, избегавшее показываться на люди, посулом роскошного обеда в лучших традициях, на грани оргии, три часа торговли лицом за право вспомнить вкус настоящей еды. К семи утра назначенного съемочного дня аристократия толпилась у ворот Севзапкино, и Мстиславский наблюдал за установкой реквизита.</p><p class="p1">Наконец, после получаса ожидания (неизбежного и пользительного, ибо очередь всегда делает очередника пассивней и сговорчивей) Мстиславский приступил к отбору счастливцев. Выглядели они, надо признать, хоть сейчас в комедию «Дворянин во мещанстве» — и комедия эта, подумал Мстиславский, была бы недурна, уж получше оригинала, которого он, впрочем, не читал. Аристократ — тот, на ком все сидит хорошо. Остромов, например, знал за собою эту способность — носить халат, как мантию, френч — как фрак. Ничто не дается даром, все — упражнением. В очереди стояли вырожденцы, аристократов Мстиславский почти не видел и поразился тому, как быстро утрачивается осанка, когда поминутно ожидаешь пинка. Декабристы небось и во глубине сибирских руд сохраняли что-то такое, но декабристы были другое дело. Они знали, что страдают за подвиг и причислятся к святым, а эти знали, что пинаемы за дело, и пинаемы мало. Те же из них, кто этого не понимал, были вовсе безнадежными тупицами, вроде нескольких спесивых старух, которых Мстиславский повидал за последние годы; такие идиоты осанку сберегли, но на лицах у них застыла безнадежная, непроходимая дурь, всегда отличающая тех, кто многое перенес и хорошо сохранился. Другие б не выжили.</p><p class="p1">Взгляд отдыхал на одном женском лице, на котором Остромов, стоя в третьем десятке, тут же и сосредоточился, посылая теплый взгляд из разряда «Доверься, дитя». Ей было лет тридцать, а пожалуй, что и за тридцать, слегка уже увядала, но морщинки прелестно играли, когда улыбалась. Дважды она поймала его взгляд, один раз сразу отвела глаза, в другой комически возвела их горе, чуть пожав плечами: видите, что приходится… Он никак не ответил, только смотрел, почти физически чувствуя, как излетает флюид. Потом перевел глаза, но боковым зрением отметил, что украдкой взглянула. Он выделялся из толпы, запоминался. Прямо перед ним стоял широкий, квадратный мужчина его роста, с обширной лысиной сзади, — обернулся и показал стреловидные усы. Гвардионец. Он смерил Остромова снисходительным взором, пытаясь, верно, определить причастность к гвардии, мысленно отнес к шпакам и собирался уж презрительно отвернуться, но что-то его насторожило. Вероятно, он почувствовал в нем принадлежность к особой касте — вдруг сенатор? — и коротко кивнул, признавая за равного. Остромов в ответ слегка прикрыл веки, словно не желая быть узнанным. Это сработало: даже по спине квадратного теперь было видно, как зауважал.</p><p class="p1">Стояли кто в чем: общее впечатление от одежд было, как от вещей у тещи — с миру по дырке: май, а мерзнут, у всех шарфы, прикрывающие дряблые шеи. Почти не видно шляп, сделавшихся признаком чуждости: все каскеточки, кепочки, нашлепочки. На приглянувшейся был темно-синий плащ, с виду парижский, но из явно моршанского сукнеца; сама, значит? Молодежь кучковалась, перехихикивалась. Все друг друга знали, да много ли их осталось? Мстиславский осматривал массовку, как рекрутов. Отказывая, опускал глаза, и так же, опустив глаза, уходили отвергнутые. Остромов боялся за избранницу, но ей ничто не угрожало: прошла легко, да и как не пройти с эдаким шармом. Развернули квадрантного, что Остромова несказанно обрадовало.</p><p class="p1">— То есть как?! — закричал гвардионец высоким заячьим голосом.</p><p class="p1">— Я снимаю сцену во дворце, — терпеливо пояснял Мстиславский, не желая скандала. Он стыдился своей роли и несколько тяготился ею; отбраковывать аристократию оказалось трудней, чем он предполагал, ее было жалко, он не видел ее прежде в таком количестве и поражался обшарпанности. — Мне нужны типажи аристократические.</p><p class="p1">— Да вы знаете ли, кто я?! — закричал квадратный, оглядываясь на очередь и словно призывая всех в союзники. — У моего отца аннинская сабля с темляком за храбрость под Севастополем! Мы упоминаемся в Радзивилловской летописи!</p><p class="p1">Что за прелесть, подумал Остромов. Кичиться древностью рода, и где! — в Ленинграде, где принято прятать даже лавочников, затесавшихся в родню. Поистине дивное время НЭП, чего не насмотришься.</p><p class="p1">— Дегаевы-Кайсацкие очень хороший род, очень, — вступилась старушка, стоявшая сразу за Остромовым. — Они всегда были прекрасные молодые люди, братец Александра Григорьевича спас утопающего в одиннадцатом году…</p><p class="p1">— Михаил Дегаев-Кайсацкий, — негромко сказал пергаментный старец, словно не решив окончательно, положено ли это знать режиссеру, — от Елисаветы Петровны в семьсот пятьдесят третьем получил золотую табакерку за особенные заслуги.</p><p class="p1">— У моего деда, — так же негромко отвечал Остромов, — тоже была табакерка и особенные заслуги на поприще Амура, но я не задерживаю очереди…</p><p class="p1">Они с историографом понимающе переглянулись и улыбнулись.</p><p class="p1">— Вы ответите! — кричал внук фаворита, словно надеясь на загробное царское покровительство.</p><p class="p1">— Если вам не нужен князь Дегаев-Кайсацкий, кого же вы хотите? — кротко улыбаясь, спросила та самая. Милосердие, подумал Остромов, отлично.</p><p class="p1">— Я вам покажу, кто мне нужен, — любезно отозвался Мстиславский. — Вот вы, да! — Он указал на изможденного типа, в чьем лице в самом деле было что-то демоническое, тень близкой гибели и след утонченного порока, странно контрастировавший с грубыми, крупными руками. Счастливец отделился от толпы и подошел к режиссерскому столику.</p><p class="p1">— Вот этот, да! — торжествующе воскликнул Мстиславский. — Вы кто, товарищ?</p><p class="p1">— Смирнов, водопроводчик, — смиренно ответил аристократ. Остромов знал этот тип: некоторые русские мастеровые и богатыри из крестьян умудрялись к сорока годам допиться до подлинного аристократизма. Вырождение всегда одинаково, независимо от того, князь вырождается или чернь.</p><p class="p1">— Вот этого мне надо, — сказал Мстиславский. — Ассистенты, переодеть. Вы завтра приходите, — отнесся он к Дегаеву. — Ракитников завтра отбирает на сцену стачки в «Огрызке прошлого», ему нужен будет пролетариат, милости прошу.</p><p class="p1">Если бы Дегаев дал себе волю, Севзапкино лишилось бы лучшего специалиста по аристократическому разврату, но он вспомнил свое и без того шаткое положение и отошел, покраснев от ярости, в бесплодной злобе сжимая кулаки.</p><p class="p1">Остромов только глянул на Мстиславского полуприкрытыми глазами, словно разрешал ему быть, и был пропущен в кучку статистов. Из массовки туда попало не более трети — прочие, видимо, казались Мстиславскому недостаточно вырожденными. Остромов не согласился бы — он повидал всякое вырождение: иной чем выше ростом и крепче сложением, тем ясней свидетельствует об умственной деградации. Но Мстиславскому нужны были утонченные, тем комичней.</p><p class="p1">— Объясняю вам роль, — начал режиссер, обращаясь к избранникам. — По ходу фильмы герои обедают. Во время репетиций обеда не будет, реквизита у нас на один дубль. Репетируем без костюмов, потому что на чистку нет времени. Ваша задача, товарищи, кушать как можно жадней…</p><p class="p1">— За этим дело не станет, — полушепотом, как бы про себя, сказала миловидная. Остромов про себя назвал ее Людмилой, милой, и намеревался лишний раз проверить проницательность.</p><p class="p1">— Мы изображаем распад аристократизма, его последние судороги, — пояснял Мстиславский. — Вы должны будете сыграть не без утрировки, не без гротеска, так сказать. В конце сцены по моему сигналу вы должны будете спорить и драться, применяя, так сказать, реквизит. На столах будут жидкости, имитирующие вино. Всю драку в целом я смонтирую потом методом компоновки аттракционов, но в это сейчас входить не надо. Ваше дело подраться едой. Здесь вы можете импровизировать как угодно, я вашей творческой свободы не стесняю. Запомните, что кушать, то есть, грубо говоря, жрать надо как можно более скотски. В этом тематический контрапункт. Я, так сказать, не вхожу и так далее, но поскольку вы люди неслучайные…</p><p class="p1">— В скатерти сморкаться? — просто спросил юноша лет двадцати, с лицом ироническим, ласковым и серым.</p><p class="p1">— На усмотрение, — сказал Мстиславский. — А впрочем, можно. Это краска… Вообще, господа, — сказал он вдруг уже другим тоном, — что я стану прикидываться? Не будем здесь с вами делать вид, что не понимаем друг друга. Было, так сказать, всякое, и так было, и этак… Вы все читали, я думаю: почему жгут усадьбы? Потому что в усадьбах, так сказать, пороли и прочее свинство. Не будем уж так-то, все же видели, какое было, и какая грязь, и весь этот Распутин, и это самое. Конечно, были и эти, так сказать, незнакомки, и Лев Толстой, и всякое. Но было и прямое, так сказать, скотство, и я сам сколько раз был свидетелем, как самые приличные люди буквально таким развратом… впрочем, что я вам рассказываю, действительно.</p><p class="p1">— Шамовка будет? — выкрикнула сзади высокая царственная старуха в кружевной шали. Вокруг рассмеялись — сдержанно, вполголоса; освоить слово «шамовка» они еще могли, но гоготать во все горло так и не выучились.</p><p class="p1">— Пошамаете, обещаю, — отвечал Мстиславский, не в силах сдержать широкой улыбки, и Остромов подумал, что он, в сущности, милый парень.</p><p class="p1">— Структурка, структурка, — пробурчал себе под нос пергаментный старец, тот, что помнил генеалогию Кайсацкого.</p><p class="p1">— Что-с? — переспросил Остромов. Он заинтересовался.</p><p class="p1">— Конструкция, — пояснил старец. — Деменциация высокого, генеративный прием, не берите в голову.</p><p class="p1">Надо запомнить, подумал Остромов. Генеративный, деменциация, структурка…</p><p class="p1">— Мы пройдем сейчас в залу, — деловито продолжал Мстиславский. — Там репетируем без реквизита, потом будет время отдохнуть и перекурить, после чего съемка. Реквизита мало, работаем в один дубль, предупреждаю всех — если не снимем, выплат не будет.</p><p class="p1">Аристократия скептически закивала.</p><p class="p1">— С одного дубля никогда не бывает, — доверительно сказал Остромову одышливый толстяк с беспомощным выражением лица. — Три как минимум.</p><p class="p1">— Но реквизита нет…</p><p class="p1">— Найдется. Небось и еда-то — навалит каши перловой и раскрасит под икру…</p><p class="p1">Поднялись на второй этаж дризенского особняка. В огромной зале с длинными, от пола до потолка мутными окнами, на ободранном паркете были п-образно расставлены столы под тяжелыми бело-золотыми скатертями с богатой вышивкой. Скатерти были покрыты газетами, чтоб не испачкались за время репетиции. На столах красовались кастрюли с точно предсказанной перловой кашей, на медных подносах горой лежал хлеб, в глубоких мисках лежали семикопеечные французские булки.</p><p class="p1">Мстиславский принялся разводить мизансцену, попутно давая отрывистые, внятные только посвященным указания оператору — невысокому, скуластому, похожему на флегматичного монгола; такими бывали опытные путешественники, хорошие наездники — оператор в самом деле ходил несколько враскоряку, по-кавалеристски. Он был молчалив, нетороплив и основателен. Мстиславский ставил аристократию в пары.</p><p class="p1">— В первой сцене, — объяснил он, — только еда, угощение как есть. Во второй постепенно переходим к свинству. Загребаем руками икорку, рыбку, обливаемся шампанским — сначала как бы нечаянно, — словом, нужна жадность, зримое торжество инстинкта…</p><p class="p1">— Как бы голландцы! — влюблено глядя на Мстиславского, поясняла его помощница по реквизиту, коротконогая дамочка с тяжелым задом, какой в сибирских деревнях называется язухой.</p><p class="p1">— Ну да, — нехотя ронял Мстиславский. Он как-то утерял интерес к съемкам. Верно, ему жалко было аристократию — он не ждал от нее такой потрепанности.</p><p class="p1">— В восемьсот восемьдесят девятом, — сказал пергаментный историограф, — в этом зале имел быть благотворительный бал в честь девяностолетия Пушкина, с костюмированным представлением «Скупого рыцаря». Я был Альбер, графиня Махотина подарила мне розу.</p><p class="p1">— Видите, теперь здесь будет еще один костюмированный бал, — улыбнулся Остромов, тоже пергаментно и сухо. Старец посмотрел на него с неудовольствием и пожевал губами. К розе графини Махотиной надлежало отнестись серьезно.</p><p class="p1">Репетировали вяло, не могли раскрепоститься, лезть руками в ослизлую перловку охотников не было. Севзаповские костюмы постирают, а свое пачкать не хотелось. Молодежь собралась отдельно, Мстиславскому пришлось разбить компанию, чтобы равномерно заполнить кадр. Анемичного юношу он приспособил в пару к старухе, интересовавшейся насчет шамовки, — не без дальнего умысла: будет как бы птенец на содержании.</p><p class="p1">— Вы во время еды накладывайте друг другу, — посоветовал он. — Заботьтесь.</p><p class="p1">— Ах моя цыпонька, — сказала старуха. Остромов глянул на нее одобрительно: должно быть, в молодости была ого-го. Вяло отрепетировали первый эпизод с переходом в свинство. Ассистенты кинулись возвращать перловку в кастрюли. Объявили перекур. Во дворике, близ посеревшей Терпсихоры с треснувшим бубном и отбитым носом, Остромов направился к предполагаемой Людмиле.</p><p class="p1">— Вы здесь так случайны, так странны, — сказал он.</p><p class="p1">— Что же делать, — ответила она, явно польщенная. — Для главных ролей я стара.</p><p class="p1">— Ах, оставьте. Для главных ролей вы здесь так же неуместны, как графиня в трактире. Этот урод не знал бы, как вами командовать. Ему артелью бурлаков распоряжаться, а не артистами.</p><p class="p1">— Отчего же, — розовея от удовольствия и молодея, произнесла миловидная. — Он в своем деле дока, только дело больно стыдное. Мне самой неловко, есть чувство, что я кого-то предаю…</p><p class="p1">— Никого вы не предаете, — отвечал Остромов глубоким страдальческим голосом, выдающим долгий опыт странствий, бегства, может быть, от таинственных преследователей… — Неужели вы думаете, что мертвые осудили бы нас, если бы знали, как мы здесь и сейчас живем?</p><p class="p1">— Мертвые, может быть, не осудили бы. А Бог точно осудит.</p><p class="p1">— Бог простит, — поморщился Остромов. — Разве не он сделал Мстиславского и Севзапкино?</p><p class="p1">— Я ведь актриса, — доверительно сообщила она. — Мне вдвойне стыдно. Но на заработки в нашей студии туфель не купишь, не то что пальто. Все бегают по пяти местам.</p><p class="p1">— Стыд, о, стыд, — простонал Остромов.</p><p class="p1">— Что за стыд?</p><p class="p1">— Мужчине невыносимо слышать, что женщина вроде вас может нуждаться. Вас нужно носить на руках, а вы думаете о туфлях. В другое время я рта бы вам не позволил открыть, по первой просьбе у вас было бы все и более, чем вы можете вообразить…</p><p class="p1">Она глянула на него с любопытством и легкой насмешкой, которая от него не укрылась, но не сказала ничего.</p><p class="p1">— Вам кажется, что сейчас легко хвастаться, — прочел он ее мысль. — Да, в прошлом или в будущем каждый волен, это в настоящем мы бесправны, как мыши… Но поверьте, что если б я встретил женщину из вашего эона в иное время, я нашел бы, как сделать ее счастливой.</p><p class="p1">— Эона? — переспросила она. Расчет был безошибочен, крючок проглочен.</p><p class="p1">— Вы не знаете эонов? — безмерно изумляясь, спросил Остромов.</p><p class="p1">— Что-то такое слышала, — солгала она.</p><p class="p1">— В таком случае прошу простить меня, — сказал он, меняясь в лице и словно с трудом удерживая тяжкий, рвущийся наружу гнев. — Надеюсь, вы не погубите меня за эту дерзость, которая и так стоила мне слишком дорого.</p><p class="p1">— Да что такое? — расхохоталась она несколько искусственно и взяла его за рукав. — Вы прямо побледнели.</p><p class="p1">— Все это только шутка, — в самом деле бледнея, произнес Остромов голосом, исключающим всякие шутки.</p><p class="p1">— Расскажите же мне. Если начали, надо доканчивать. Мне все равно некому вас выдать, я ни с кем не вижусь, кроме сестры.</p><p class="p1">— Эоны, — стараясь говорить вежливо и светски-небрежно, пояснил Остромов, — это двенадцать древних родов особых существ, от которых так или иначе произошли все атланты… по крайней мере известные нам атланты, — поправился он. — Мне не нужно было двух попыток, чтобы угадать ваше происхождение, но коль скоро вы не хотите признать, у вас, вероятно, есть причины. Вы должны знать, что вторжение в эти сферы наказуемо, и, если захотите, можете страшно наказать меня… но если вы еще не разбужены… — Последнее слово он подчеркнул и округлил глаза.</p><p class="p1">— Что значит «не разбужена»?</p><p class="p1">— Это разговор не для дворика в Севзапкино, — едко и сладко улыбаясь, отвечал Остромов.</p><p class="p1">— Надо признать, вы меня увлекли, — сказала она с усмешкой. — «Остановил бы ваш рассказ у райских врат святого».</p><p class="p1">— Думайте так, — с деланным равнодушием сказал Остромов.</p><p class="p1">— Как вас зовут, атлант? — спросила она.</p><p class="p1">— У меня много имен, кем только не звали, — снова делаясь серьезен, ответил он.</p><p class="p1">— А меня зовут Ирина Павловна, — сказала она, не настаивая. Не угадал, подумал Остромов; впрочем, Ирина строже, в Людмиле больше чувственности…</p><p class="p1">— Тогда я буду Борисом Васильевичем, — наклонил он лысеющую голову, благородную голову римлянина, этими словами и подумал. Сказано было хорошо — словно только что выбрал имя специально для гармонии с нею. Борис Васильич, Ирина Пална.</p><p class="p1">— Что же, старая кляча, — сказала она, потянув его не за руку еще, но за рукав, — пойдем ломать своего Шекспира.</p><p class="p1">Остромов понял, что в этом случае будет все и более, чем все, как он только что посулил ей. Застоялась, одинока, давно с ней так не разговаривали.</p><p class="p1">Перерыв между тем окончился, и Мстиславский сзывал массовку наверх. Сцена совершенно переменилась: столы были уставлены яствами хоть и не первого разбора, но для двадцать шестого года они были роскошны. Газеты сняли со скатертей, и златотканый узор явил себя во всей прихотливой сложности роскошного излишества, напомнив о временах, когда за столами не только ели. На скатертях установили три серебряных, явно реквизированных из дворца миски с черной икрой, на этот раз подлинной, три блюда с грубовато нарезанной, однако несомненной севрюгой, несколько аккуратных стерлядок кольчиком, тут же коллекция прелестных фарфоровых тарелок батенинского завода с невскими видами — поверх невских видов разложена была твердая копченая колбаса с крупным жиром. Остромов редко бывал в высшем свете, хотя покрутился всюду, и не был уверен, что на балах высшего разбора подавали копченую колбасу. Ливерной, по счастью, не было. Зато по краям стола застыли два полных блюда котлет — в культурных пивных подавали именно такие, со значительной примесью хлеба и запахом прогорклого жира. Остромов вообразил такую котлету на великосветском фуршете. Она сошла бы за парижский шик — в России таких не делали, а французы чего не удумают. Пролетарский стиль особенно сказался в нарезке хлеба, накромсанного грубо, явно в расчете на изголодавшихся аристократов, которые придут с мороза и жадно намажут масло на толстые ломти. Зачем-то в центре стола высилась гигантская китайская чаша, полная леденцов «Барбарис», наверняка закупленных в кооперативе напротив; видимо, Мстиславский полагал, что аристократия любила эдак среди застолья пожевать леденца, чтобы с тем большим наслаждением наброситься на икру. На тридцать человек закуска была скромновата, правду сказать — никакова, но с тем большим свинством станут за нее бороться: все в дело. Спиртного не было вовсе: в бокалы тонкого стекла с призрачными, едва угадываемыми крылатыми фигурами на стенках налита была вода, долженствовавшая, верно, олицетворять водку. Мстиславскому представлялось, что аристократы едят и пьют помногу, не сообразуясь с тратами. Остромов заметил также несколько чайных стаканов, тоже с водой: очевидно, бывшие должны были постепенно свинеть и увеличивать емкости. Стол могли бы украсить хоть парой бутылок двадцать первой смирновки, но их-то как раз и не нашли. Сервизы оказались крепче — кто же берег пустую водочную бутыль? Поискать, так нашлось бы, — Остромов с ностальгической нежностью вообразил родную белую этикетку, скромную, как все великое, — но в реквизированных коллекциях такой посуды не было, а искать по частным коллекционерам Мстиславскому было лень.</p><p class="p1">— Серебро князей Горчаковых, вон и герб, — заметил себе под нос пергаментный историк. — Орел с горностаем. А фарфор Друцких-Любецких, ни у кого больше батенинского рострального сервиза не было. Тридцать восьмой год, на заказ три штуки, одна в Париже, одна погибла у Гагариных при пожаре. Кто бы на одном столе собрал сервировку из двух домов?</p><p class="p1">— Да никто не увидит, — заверил нежный юноша.</p><p class="p1">— А вы вообразите, — предложил Остромов, — что княжну Друцкую-Любецкую выдают за князя Горчакова, вот семейства и смешали сервировку. От жениха серебро, от невесты блюдо.</p><p class="p1">— Ну да, да, — кивнул старец. — А стекло светлейших Лопухиных, на гербе крылатый дракон с лентами, видите?</p><p class="p1">— Не Лопухиных, — вступила величавая старуха. — Это Пестеревы, и не дракон, а лебедь.</p><p class="p1">Старик посмотрел на нее высокомерно.</p><p class="p1">— Я в некотором роде геральдик, — сказал он ровно.</p><p class="p1">— Ну-с, а я в некотором роде Пестерева, — сказала старуха.</p><p class="p1">Этого крыть было нечем.</p><p class="p1">— Позвольте, позвольте, — забормотал геральдик. — Вы, стало быть, Платона Васильевича дочь, безумная Варвара, пожертвовавшая Штейнеру сорок тысяч…</p><p class="p1">— Совершенно так-с, безумная Варвара, — величественно кивнула старуха. Остромов не шутя любовался ею.</p><p class="p1">— Когда же вы вернулись? Ведь вы в Германии!</p><p class="p1">— А вот как Гетеанум сгорел, так и вернулась. В двадцать втором.</p><p class="p1">— Но для чего же… на пепелище…</p><p class="p1">— Ну, с одного пепелища на другое, — вздохнула старуха. — Это хоть свое.</p><p class="p1">— Тогда, — сказал иронический юноша, — вообразим, что Друцкую выдают за Горчакова, но другом дома будет кто-то из Пестеревых, потому что Горчаков после ранения на турецкой войне несостоятелен.</p><p class="p1">У молодежи из бывших была новая манера шутить, ни к кому не адресуясь, глядя прямо перед собою, чтобы окружающие не догадались о разговоре: нет-нет, никто не беседует, мы сами с собой… Однако юношу услышали, и сверстники прыснули.</p><p class="p1">Перед самой съемкой Остромов подошел к оператору и о чем-то пошептал ему на ухо. Оператор слушал с монгольским непроницаемым лицом. Непонятно было, как он реагирует. Дослушав, он внимательно посмотрел на Остромова.</p><p class="p1">— Рискованно, — сказал он ровно.</p><p class="p1">— Кто не рискует, не пьет шампанского, — сказал Остромов. Он не зря был физиогномист. В операторе ему почудилась доброта — скрытная, неловкая, но нередкая у молчаливых путешественников, многое повидавших.</p><p class="p1">— Ну… — неопределенно сказал оператор. Остромов понял и отошел. Настаивать в разговоре с такими людьми не следует.</p><p class="p1">Мстиславский тщательно расставил аристократическую массовку — юношу с Пестеревой, Остромова с Ириной (сила внушения, по счастью, не подвела), пергаментного геральдика с юной, невинно-порочной, язвительно улыбающейся девицей, каких много было в то время: они не вполне еще избавились от сословных предрассудков, но уже коротко стриглись, грубо мазались, неумело подражали девочкам с окраин и с вызовом предлагали себя; для знатока и ценителя все эти потомки фрейлин были бы сущим кладом, но для пролетариату не подходили, ибо казались грубой подделкой. Пролетариат — ён тоже не без чутья. Разве польстился бы граф на крестьянку? (Случалось — и льстились, но именно когда хотелось перчика, или вовсе уж никого не было). Невинно-порочная, с тайным ужасом, плескавшимся на дне глаз, распутно улыбнулась старику и окончательно стала похожа на гимназистку.</p><p class="p1">— Напоминаю! — прогремел Мстиславский. В окно щедро лилось желтое раннее солнце, в котором нежно таяли бокалы и уже слегка потела колбаса. — В первые секунды держим себя в руках. По команде переходим к свинству. После этого доснимаем крупные эпизоды. По хлопку н-начали!</p><p class="p1">Вспыхнули и зашипели две гигантские электрические лампы. Хлопнул перед глазом камеры таинственный деревянный прибор. Монгольский путешественник закрутил ручку. Аристократия неловко мялась перед яствами.</p><p class="p1">— Жрите, жрите! — завопил Мстиславский.</p><p class="p1">— А, двум смертям не бывать, — сказал водопроводчик Смирнов, положил кусок белорыбицы на толстый ломоть хлеба и жадно откусил.</p><p class="p1">— Разговаривайте, беседуйте! — орал Мстиславский. Остромов обернулся к Ирине и взглядом предложил икры. Она кивнула. В миске уже образовалась некоторая давка — аристократия сталкивалась ложками.</p><p class="p1">— Свинее, свинее! — заорал Мстиславский. Вы, в пиджаке! Да, вы, перед рыбой! Вырвите котлету у своей дамы! Да, вот так. Набросьтесь на нее! На котлету, идиот!</p><p class="p1">Высокий брюнет с гладко зализанными волосами и вытянутым идиотским лицом хищно сорвал котлету с соседской вилки и тщательно обкусал по краям.</p><p class="p1">— Теперь руки вытирайте! — орал Мстиславский. — Руки об даму свою!</p><p class="p1">Брюнет робко коснулся соседкиной спины.</p><p class="p1">— Грудь ему навстречу подайте! — требовал режиссер. Соседка, дама лет сорока, по виду скорей английская бонна, чем аристократка, попыталась выпятить плоскую грудь и задрала при этом острый подбородок. Идиот робко провел пальцами по ее плюшевому жакету.</p><p class="p1">— Сильней! — неистовствовал Мстиславский; нагромождение согласных выражает скованность, стиснутость местом, невозможность впрыгнуть в кадр и показать лично</p><p class="p1">Старец-геральдик потягивал воду из стакана. Гимназистка долго смотрела на него, а потом вдруг принялась медленно наклонять свой бокал над его желтой матовой лысиной.</p><p class="p1">— Отлично, отлично! — одобрил режиссер.</p><p class="p1">Гимназистка истерически захохотала. Пергаментный поднял голову, догадался о маневре и с неожиданной силой обнял прелестницу. Его голова приходилась точно под круглый девичий подбородок. Гимназистка застыла, округлив глаза. Геральдик ее щупал. От этих старичков галантных времен никогда не знаешь, чего ждать.</p><p class="p1">Водопроводчик Смирнов молчаливо жрал, пользуясь моментом. «Моя цыпонька», — приговаривала Пестерева, суя в рот молодому кавалеру колбасные ломти. Он чавкал с видом пресыщенного младенца. Ирина внезапно захватила тонкими пальцами горсть икры и размазала по лицу Остромова. Он схватил ее руку и принялся облизывать пальцы. Молодежь по углам стола перекидывалась котлетами.</p><p class="p1">— Общайтесь! — орал Мстиславский, очень довольный. Публика оскотинивалась на глазах, не забывая, впрочем, и кушать.</p><p class="p1">— А знаете вы, милостивый государь, — сказал сановитый бородач тщедушному соседу, — что мы с вами говно?</p><p class="p1">— Вы, однако, не обобщайте! — воскликнул тщедушный и помахал вилкой перед носом бородатого.</p><p class="p1">— Хорошо, милостивый государь, — согласился бородатый. — Вы говно, а я клубника со сливками.</p><p class="p1">Тщедушный захватил горсть леденцов и швырнул соседу в лицо.</p><p class="p1">— Я дворянин! — взревел бородатый, схватил тщедушного за грудки так, что затрещал его жалкий пиджачишко, и поднял над собою, как щенка. Видимо, все это было у них хорошо отрепетировано.</p><p class="p1">Пол усеялся леденцами. Остромов соскребал икру со щек. Ирина, закинув голову, хохотала. Вырвавшаяся из стариковских объятий гимназистка канканировала на столе, визжа от страха и удовольствия. Нежный юноша заглядывал ей под юбку, она норовила попасть ему полой по глазам. Пестерева облизывала пальцы и делала соседу козу. Бородатый отпустил тщедушного, схватил горбушку и метнул в Мстиславского: свинство так свинство. Еда закончилась, но аристократию было не остановить. Массовка ликовала, резвясь в своей среде. Остромов почувствовал, что все можно, и поцеловал Ирину в покорные губы.</p><p class="p1">— Болван! — крикнула она восторженно.</p><p class="p1">— У Николая Григорьича Вахвахова, — торжественно вещал геральдик, — на именинах сынка не то еще было! Князенька Кипиани, тифлисский предводитель, из зоологического сада привел зебру и воль-ти-жи-ти-ровал…</p><p class="p1">— Довольно! — орал Мстиславский, но разгулявшееся дворянство не унималось. Гимназистка на столе плясала уже русскую, бородатый мелодически свистал, прочие хлопали в великодержавном экстазе. Остромов подхватил Ирину на руки и кружил, распугивая стариков. Наконец гимназистка спрыгнула на руки нежному юноше, который покачнулся, но устоял.</p><p class="p1">— Вуаля! — крикнула она.</p><p class="p1">— Снято! — восторженно заорал Мстиславский.</p><p class="p1">— Не снято, — флегматично заметил оператор.</p><p class="p1">— Что значит не снято? — в негодовании уставился на него Мстиславский.</p><p class="p1">— Свету мало, дубль нужен, — кратко объяснил монгольский странник.</p><p class="p1">— Ты же замерял!</p><p class="p1">— Солнце за тучку зашло, — пояснил оператор, указывая в окно.</p><p class="p1">— Где я тебе реквизит возьму, саботажник! — выказывая знакомство с новой лексикой, завыл режиссер. Остромов тихо улыбался: выгорело. Он знал, что тридцать человек не наедятся выставленной закуской, да и сам не возражал получить два обеда вместо одного.</p><p class="p1">— Купим, — пожал плечами оператор.</p><p class="p1">— Вычту! У всех вычту! — топал ногами Мстиславский. — У тебя лично вычту всю икру!</p><p class="p1">— Вычитай, — спокойно согласился оператор. — А только я брак гнать не стану.</p><p class="p1">— Черти, поганцы, — ругался Мстиславский. — Второй раз они так не сработают!</p><p class="p1">— Лучше сработаем! — крикнула гимназистка.</p><p class="p1">— Еще, еще дубль! — орала молодежь.</p><p class="p1">— Ле-ден-цов! — ревел бородатый.</p><p class="p1">Мстиславский побушевал еще с полчаса, но вынужден был раскошелиться. Реквизитора отослали за новой порцией икры, колбасы и прогорклых котлет. Оператор, пользуясь паузой, доснимал крупные планы орущих и кусающихся для последующего монтажа аттракционов. Во внутреннем дворе дризенского особняка блевал водопроводчик Смирнов, чей организм не принял аристократической закуски. Прочие, не занятые в досъемках, жадно перекуривали у входа, надеясь успокоить только растревоженный аппетит.</p><p class="p1">— И рыбки поесть не успел, — говорил степенный, похожий на попа старик, дымивший «Ледой».</p><p class="p1">— Ничего, — утешала его бонна. — Сейчас второй дубль…</p><p class="p1">Все с наслаждением оперировали новыми терминами, ощущая причастность к синематографу.</p><p class="p1">Ирина, жмурясь на солнце, курила в стороне. Остромов сидел у ее ног прямо на ступеньках особняка, рядом со смущенным львом, которому кто-то из молодежи уже сунул папиросу в зубы.</p><p class="p1">— Вы, вероятно, считаете меня Бог знает кем, — сказала она Остромову.</p><p class="p1">— Если бы я смел… если бы я мог кем-то считать вас, — проговорил он в той же страдальчески-тягучей манере. — Иногда мужчина собой не владеет, и после этого легко, конечно, назвать его чудовищем, но…</p><p class="p1">— Ах, оставьте, — сказала она кокетливо. — Ведь мы артисты.</p><p class="p1">— Вы — может быть, но я…</p><p class="p1">— Так знайте: актрисе и не такое случается делать на сцене.</p><p class="p1">Любопытно, подумал Остромов.</p><p class="p1">— Вы, может быть, только играли, но я… — сказал он мрачно.</p><p class="p1">— Ну, это уж меня не касается.</p><p class="p1">— Разумеется, — он поднял глаза и посмотрел на нее с горьким укором. — Вас, рожденных в седьмом эоне, не касается ничто. Вы проходите среди людей, как лунный луч по саду. И вам дела нет до тех, кого он коснется.</p><p class="p1">— Красиво говорите, — усмехнулась Ирина. — Это из Пшибышевского, кажется?</p><p class="p1">— Ваш Пшибышевский дурак, — сказал Остромов и встал.</p><p class="p1">— Ну что вы, не обижайтесь. Я не скрываю, что в какой-то миг сама была захвачена… — Она наклонила голову.</p><p class="p1">— Не играйте со мной, — протянул Остромов, — вы не знаете, чем это может для меня кончиться…</p><p class="p1">— Но я, может быть, именно хочу узнать!</p><p class="p1">— Ладно, — сказал он буднично и этим выиграл окончательно. — Пойдемте, котлеты привезли.</p><p class="p1">Второй дубль прошел не в пример тише, смиренней, и Мстиславскому пришлось куда громче орать на массовку, требуя, чтобы больше было свинства. Еда, хотя бы и столь разнородная, возымела действие: Остромов чувствовал, что несколько даже опьянел от нее. Кидаться котлетами больше не хотелось, белорыбицу наконец можно было распробовать, и когда Мстиславский вовсе уж озверевшим козлетоном завопил: «Жрите, черт бы вас драл!» — розовый юноша так мастерски залепил в него котлетой, что публика зааплодировала. Одна из ассистенток прыснула, и это до того взбесило режиссера, что он вбежал в кадр и принялся пихать котлеты юноше за шиворот: почему-то именно эта сцена, попавшая в окончательный монтаж, до сих пор производит сильное впечатление на зрителя, ради профессиональных нужд смотрящего «Месть трущоб» в фильмохранилище. Первый дубль — о предвидение Остромова! — оказался и в самом деле частично запорчен, и для потомства сохранился именно этот, до поры спокойный. Странные люди сонно жуют и без охоты дерутся, потом через кадр наискось летит котлета, маленький квадратный человечек вбегает ниоткуда и принимается дубасить студента, после чего все хохочут, обнимаются и принимаются петь. Увы, пленка не сохранила нам звуков песни, хотя странные люди, разомлевшие от еды, смеха и чувства подспудного родства, исполняли, приобнявшись, «Коробейников» — которым неожиданно для себя подпел и Мстиславский. Вот только от этого эпизода чем-то и веет, а остальное, воля ваша, смотреть неловко — словно человек с умом и зачатками таланта силой заставляет себя делать хуже, еще хуже, как можно топорней — в надежде, что хоть это попадет в резонанс с эпохой; но эпоха совершенно выразилась в единственном эпизоде, которого не выдумал бы никакой драмодел Саврасов. Итак, слева направо: Пестерева — крайняя, в шали, с ней еще увидимся; ее приобнимает широко известный в будущем хирург, тогда скромный юноша Цыганов. Другой юноша, нежный, что предлагал сморкаться в скатерти, — прославленный впоследствии переводчик с древних языков Мелетинский, благополучно переживший террор и блокаду, в сорок седьмом предусмотрительно бежавший в Алма-Ату и открывший там великий эпос «Базы-Корпеш»; согласно догадке Мелетинского, нацию делают две эпических поэмы — о войне и о странствии, — и одна без другой невозможна. Так он вычислил дополнительный том «Базы-Корпеш», считавшийся утраченным. На вопрос одного из своих студентов, где же русские «Илиада» и «Одиссея», он ответил, что, значит, русские не нация — каковой ответ в 1947 году стоил бы ему свободы, но, к счастью, на дворе уже был 1973, и через год академик стал недосягаем для земных властей. Бородатый и тщедушный, с репризой про клубнику со сливками, прославились совместными детскими книгами «Как летает самолет», «Чудо-вещество» и «Приключения в молекуле». Бородатого, чья философская проза чудом уцелела в блокаду и была опубликована издательством имени Чехова в 1965 году, через 27 лет после ареста и смерти автора, звали Тихоном Семагиным, а тщедушного, убитого в 1943 году, — Борисом Вяткиным. Красавица, похожая на развратную, а в этом кадре просто сонную гимназистку — изобретательница нескольких препаратов тетрациклиновой группы Емельянова, впоследствии жена советского беллетриста Белова (Столпнера). Высокий брюнет-идиот, впоследствии основатель советской уринотерапии, — Константин Батугин (1900, Петербург — 1935, Омск); бонна — Семенова, известная в конце тридцатых доносчица, погибшая в блокаду; пергаментный геральдик — Георгий Базанов (1855–1931), справа от него известный в Ленинграде двадцатых годов налетчик и убийца Краб, настоящая фамилия — Сухов, убит в 1928 году при задержании, на досуге любил посещать кинематограф и сниматься; старик в левом углу — Николай Аверьянов, космист-самоучка (1843–1929), завещавший все свои сочинения, внутренние органы и скелет науке в лице Ленинградского университета (сочинения научной ценности не представляли и были утилизированы, а печень долго еще показывали как пример удивительного здоровья — знал бы Аверьянов, что наибольшую ценность в его наследстве, включавшем двенадцать томов труда «Обоснование Вселенной», оказалась именно она). Остромов с Ириной Варвариной, актрисой (1895–1967) стоят в центре, переглядываясь; он несколько размыт силою собственной воли, ибо не любил оставлять где попало слишком четких отпечатков. Словом, полным-полна коробушка.</p><p class="p1">Отчего эта коробушка полтора века поется с таким упоением? Видимо, оттого, что при всей скудости прочего — например, пейзажа или вариантов грядущего, — содержимое каждого отдельного российского кадра все-таки так пестро, население так перемешано, да и внутри каждого персонажа в равных пропорциях наличествует все, от зверства до подвижничества, часто неотличимых; оттого, что гордиться в коробушке больше нечем, кроме страшного разнообразия и густой наполненности, особенно если учесть, как тесно внутри, как низок потолок; и, может быть, оттого-то провести с русским человеком час так интересно, а два так скучно.</p><div class="poem">
<div class="stanza">
<p class="v">— Ра-а-асступись ты, рожь высокая,</p>
<p class="v">Тайну свято сохрани!</p>
</div>
</div><p class="p1">Смирнов оказался обладателем хрустального тенора, столь частого у беспутных мастеровых, и пестеревские бокалы долго еще отзывались ему.</p><p class="p1">На сей рас оператор Твердов остался доволен освещением. Остромов, уходя, списал его телефон и оставил ассистенту тещин: остромовский аристократический профиль запомнился Мстиславскому. «Вас вызовут», — бодро сказала ассистентка с язухой. Он ушел вместе с Ириной, вызвавшись проводить ее до Малого проспекта. Перед самым уходом из дризенского особняка он подошел к Пестеревой.</p><p class="p1">— Варвара Платоновна, — произнес он почтительно, хотя не без игривости. — Я столько слышал о вас, но увидеть сподобился впервые…</p><p class="p1">— Воображаю, что вы слышали, — царственно отмахнулась она.</p><p class="p1">— Я почел бы за счастье побеседовать с вами о докторе…</p><p class="p1">— Доктор — старый шарлатан, — отрезала Пестерева. — Стоило потратить сорок тысяч, чтобы понять это.</p><p class="p1">— Тем более, — с нажимом продолжал Остромов. — Мне кажется, нам есть что обговорить… По каким дням вы принимаете?</p><p class="p1">Пестерева усмехнулась.</p><p class="p1">— Люблю, когда чувствуют стиль, — сказала она. — Но я и до всех дел ни по каким дням не принимала. Кто хотел, тот и приходил. Пятая линия, дом 6, квартира третья, найдете со двора.</p><p class="p1">— Благодарю вас, — кивнул Остромов. Это был едва ли не более ценный улов, чем Ирина.</p></span></span>
