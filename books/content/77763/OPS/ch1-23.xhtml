<span><span><p class="p1">— Но почему же именно они? — продолжал изумляться Неретинский. — Разве в них есть что-нибудь особенное? Сколько я мог наблюдать, люди как люди…</p><p class="p1">— Ни в коем случае, — отмахнулся Роденс. — Совершенно другая порода. Разумеется, сегодня растление коснулось каждого — вот почему нельзя медлить. Но эти — эти из другого мяса. Ими надо заняться вплотную.</p><p class="p1">— Гм, — в задумчивости произнес Неретинский. Он ждал, конечно, что революция раскрепостит все формы любви, но никак не думал, чтобы подобные чаяния распространились в массах. — Но ведь для того, чтобы, так сказать, вплотную приступить к коммунистам… вы понимаете… совершенно не обязательна легальность! Зачем же на улицы?</p><p class="p1">— Понимаю, — кивнул Роденс. — Но индивидуальная тактика не срабатывала уже и двадцать лет назад. Мы можем, конечно… поодиночке. Но я верю сейчас только в групповые действия.</p><p class="p1">Этот парень был в самом деле не в себе, но чрезвычайно забавен.</p><p class="p1">— Постойте, — проговорил Неретинский. — Неужели вы не верите больше… в индивидуальную практику?</p><p class="p1">— Трата времени и лучших сил, — отмахнулся Роденс. — Все начинается с первой сотни.</p><p class="p1">— Ого! — воскликнул Неретинский.</p><p class="p1">— Меньше бессмысленно. Уверяю вас, выступление ста человек на Дворцовой сегодня перевернет все. Бояться насилия глупо. В конце концов, насилие творится ежеминутно.</p><p class="p1">Неретинский вообразил выступление ста человек на Дворцовой, с коммунистами, с насилием, и вынужден был согласиться: такая акция в самом деле перевернула бы Россию. Говорят — Европа, Европа, а у нас под красными лучами Мая и Октября вон что вызрело. Альбинос был несомненно сумасшедший, но в качестве острого блюда на сегодня годился.</p><p class="p1">— Что же, — произнес он торжественно, — пойдемте к н а ш и м, я вас представлю и уверен, что ваши идеи найдут если не поддержку, то хотя бы… ох… живейший отклик.</p><p class="p1">Он ухмыльнулся, не сдержавшись, и нежно подтолкнул Роденса к тяжелой (дуб с медью) двери в гостиную.</p><p class="p1">Роденс ожидал увидеть что угодно — кружок бомбистов, бородатых чахоточных студентов вокруг стола, солидных профессиональных убийц с герсталями в карманах чесучовых пиджаков, даже и канцелярских скромняг, хитро замаскировавших свое истинное занятие. Но полтора десятка полуувядших вечных юношей с накрашенными лицами смутили бы кого угодно. Грим, подумал он, это грим, маскировка. Но зачем эти бонбоньерки? Почему ни одной женщины — положим, понятно; но почему на коленях у пухлого гиганта в кресле развязно сидел длинный бледный подросток, по виду пятнадцатилетний?</p><p class="p1">— Господа, — возгласил Неретинский, — позвольте вам представить новообращенного. С наилучшей рекомендацией к нам пришел, так сказать, бутон.</p><p class="p1">На жаргоне ленинградских урнингов это означало дебютанта.</p><p class="p1">— Бутон, буто-о-он! — пропел бледный юноша с колен гиганта. — Бутончик!</p><p class="p1">— Располагайтесь, — гостеприимно указал Неретинский на бархатный стул. — Господа, наш новый гость предпочитает коммунистов!</p><p class="p1">Сначала в гостиной воцарилось почтительное молчание, затем грянул общий хохот. Гнуснее всех тонко хихикал бледный, длинный.</p><p class="p1">Роденс вскочил. Он начал догадываться.</p><p class="p1">— Нет, нет, теперь не уйдешь! — басом пропел огромный толстяк, в прошлом конферансье «Бродячей мыши» Суглинов. — Хоровод, господа, хоровод!</p><p class="p1">Прыгнувший откуда-то сбоку вертлявый малый завязал ему глаза. Послышался грохот сдвигаемой мебели. Роденс потянулся сорвать повязку.</p><p class="p1">— Нельзя, нельзя! — закричали несколько голосов сразу. — Бутону не полагается! Жмурки, жмурки…</p><p class="p1">Его мяли, тискали, щекотали. Кто-то уже сдирал с него толстовку. Он махал руками, попадал кулаком во что-то мягкое и вдруг воткнулся в чей-то отвратительный безвольный рот. Жертва взвизгнула. Роденс размахался кулаками направо и налево. На него навалились — и принялись уже не тормошить, а колотить самыми подлыми приемами.</p><p class="p1">— Господа! — увещевал Неретинский. — Что вы делаете, господа! Он не туда попал, со всеми бывает…</p><p class="p1">В голосе его, однако, слышалось поощрение.</p><p class="p1">— Вот тебе коммунисты, — крикнул кто-то. После чего невидимка — видимо, коммунист, — нанес упавшему Роденсу пару столь ощутимых ударов носком ботинка по ребрам, что дыхание будущего диктатора пресеклось, а сознание временно затмилось. Он очухался в подъезде. На улице сыпал мелкий серый дождь. Роденс ощупал себя. Одежда была в полном беспорядке, но самого страшного с ним, кажется, не сделали. В нагрудном кармане лежала незапечатанная записка — тетрадный лист, сложенный вчетверо. Роденс прищурился и прочел три строки бисерным почерком Неретинского:</p><p class="p1">«Любезный Остромов. Мы славно пошалили. Я оценил шутку, но дураков впредь не посылайте».</p><p class="p1">Ооо, сквозь зубы простонал Роденс. Значит, все это была проверка и я ее не прошел. Я не подошел им, о Боже. Что мне стоило вытерпеть эти идиотские жмурки? Так сломаться на первом же испытании. Вернуться нельзя. К Остромову нельзя. Что же теперь?</p><p class="p1">Он кое-как привел себя в порядок и по пустому проспекту отправился к ближайшей пивной. Больше, чем когда-либо, ему хотелось убить всех. Сначала коммунистов, а потом всех. Не может быть, чтобы никто во всем городе не разделял этого желания. Он верил, что рано или поздно найдет своих.</p><p class="p1">И нашел, но не там и не так, как думал.</p></span></span>
