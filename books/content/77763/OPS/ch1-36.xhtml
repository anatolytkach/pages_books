<p class="p">Глава пятнадцатая</p>
</div><p class="subtitle">1</p><p class="p1">Отец был жив и здоров, но то, что с ним случилось, было, пожалуй, хуже болезни: и не хочешь гневить Бога, а иначе не скажешь. Их с Валей высылали в Вятку, дав неделю на сборы, — ни за что, без повода, без вины.</p><p class="p1">Он был взвинчен, страшно суетлив и вместе беспомощен: Даня никогда еще не видел его таким. После смерти жены он был, напротив, подозрительно сдержан — Даня даже заподозрил на секунду, что он никогда не любил мать, но с бешенством, с отвращением к себе прогнал эту мысль: учись у него сдержанности, учись быть мужчиной! Столько раз терявший самообладание из-за любой ерунды, здесь, когда случилось страшнейшее, он держался героически, слезы себе не позволил! Но теперь, когда беда коснулась лично его и Вали, он дал слабину; и Даня с тоской вспомнил, что отец всегда стоически выносил именно чужие беды, а свои — даже сломавшийся зуб — выводили его из равновесия совершенно.</p><p class="p1">Его высылали вместе с сотней других обитателей судакских дач, реквизируя жилье якобы в пользу трудящихся; на деле в дом Самойловых уже вселился прокурор Судака, а давно отобранную у Дивеевых роскошную виллу «Desire» занимал начальник информотдела крымского ГПУ Лехман. Он ребенком когда-то был в Судаке, ему эта вилла понравилась, теперь была его. Отец не знал, кому достанется их дом. Он понимал только, что к ним он никогда не вернется.</p><p class="p1">Алексей Алексеич Галицкий видел, что вся жизнь Ильи дала трещину — более глубокую и непоправимую, чем после Ады, потому что с Адой еще хоть что-то можно было понять: Ада умерла от того, что у нее голова болела, от инфекции и слабости. А отчего высылали их, не сказал бы никто: они никому не мешали, старик и мальчик. Пенсия — так ведь пенсию везде придется платить, они не сэкономят, высылая его в Вятку… Возможно, им кажется, что бывшие недостойны Крыма, теперь здесь будет жить один отдыхающий пролетарий, — но ведь это не так. Из Ленинграда, из Москвы тоже высылают. И ладно бы они были когда-то богачи — но ведь он был всего только сначала адвокат, потом издатель, больших денег никогда не было… Он все это пытался объяснить, и все натыкалось на стенку, и он понял наконец, что ехать придется. Это столкновение с неумолимой волей было так болезненно, что Илья ни одного дела не мог довести до конца — он не понимал, зачем. То принимался разбирать архив, то бегал по соседям, выясняя, кого куда, то принимался распродавать остатки имущества, например, огромный старинный утюг, который уж точно никому не был нужен, и купили у него за все время только картину с изображением голой Аспазии.</p><p class="p1">Даня не был дома полгода — и ничего не узнавал: только тут он понял, как изменил его учитель. Оказывается, занятия сказывались — пусть пока вели не к улучшению координации и собранности, а наоборот. Ничего, чтобы расстроиться, прежде надо расстроиться. «Ты какой-то сам не свой», говорил отец. Он и точно был больше не свой, ибо принадлежал кружку и силе, стоявшей за ним. Он представлял учителя в этой среде. Конечно, учитель бы договорился, уладил, а если бы не уладил, то сумел бы спокойно, ясно и весело действовать, исходя из неизбежного. Но у отца не было опоры, и Даня увидел это ясней, чем прежде.</p><p class="p1">Примчалась из Феодосии Женя с дочкой Верой, но и Женя была не прежняя, и перемены, как все в последнее время, были к худшему. Случалось, Женя до последней возможности раздражала Даню, а как иногда ему казалось — и мать: у Жени все были озарения. Она жила мистической, напряженной жизнью, но мистика эта была не та бодрая и, хочется сказать, профессиональная, какой учил Остромов, а доморощенная, вся замешенная на собственной патологии. Ей вечно наговаривали голоса, она могла вбежать в комнату с заново понятой цитатой из Библии, часами готова была рассуждать о том, что первичней — слово или музыка, дух или душа, и все это было всякий раз разное. Богообщение у Жени было столь страстным и ежедневным, словно Господь забросил все прочие дела и только старался пояснить ей, как правильно понимать Откровение; этим, наверное, и объяснялись все катаклизмы последнего времени — Женя с мировой войны стала все чаще спрашивать, а он все подробней объяснять, вот и остался мир без присмотра. Теперь он как раз упорядочился, вошел в колею — но так, что лучше бы остался в прежнем раздрызге. А у Жени не было больше вопросов, она странно притихла и словно съежилась, а Вера, не стесняясь, покрикивала на нее.</p><p class="p1">Из Веры выросло черт знает что. Даня в последний раз видел ее два года назад и, когда мысленно сочинял ей шараду из поезда, обращался все еще к той девочке, к тринадцатилетней, порывистой, видевшей странные сны (некоторые он записывал даже, и только Грэм, пожимая плечами, говорил, что сны самые обыкновенные, какие и положено, а вот странно видеть во сне, например, о к р о ш к у). Нынешней Вере было пятнадцать, она была не в мать и не в покойного отца, она страстно рвалась обратно в Феодосию, где у нее были друзья, и говорить с ней было решительно невозможно. Даня заметил в ней прежнюю нервность, но ведь нервность без ума невыносима, лучше уж мыльное, сырное спокойствие деревенских баб. Вера секунды не могла оставаться наедине с собой, не выносила тишины — может, их общая нервозность, присущая всему обреченному классу, выражалась так странно, но у Веры не было ни малейшего сознания обреченности. Она не могла поддержать разговора, не умела думать, Даня, казалось, видел хвосты и обрывки крошечных мыслей в ее голове, — они носились там, не связанные, ни к чему не ведущие. Она стала непоседой, но в беспрерывном ее хлопотании не было ни ритма, ни грации. Глядя на нее, Даня снова задумался о том, что основа мира — ритм, а что не ритмично, то нежизнеспособно. Она рвалась к друзьям, потому что с ними можно было не говорить, не думать. У них в школе был какой-то клуб, они облазали все окрестные горы и степи, выходили в море на самодельной яхте, Женя страшно боялась, а Вера ненавидела Женю. Между ними никогда не было особенной близости, но до такого бешенства не доходило: Вера орала на мать, а мать съеживалась и виновато оглядывалась, словно умоляла присутствующих не принимать все это всерьез. Девочка трудная, созревание пришлось на голод… Женя с вечной своей нестеснительностью — ей все духовное и плотское казалось одинаково нестыдным и подлежащим обсуждению, — шепнула Дане, что у Веры даже не установился цикл, вот отчего, может быть, все эти срывы, — но что-то Даня усомнился в верином излечении от злости, когда установится цикл. На него Вера не смотрела вовсе. Когда она орала, все лицо у нее шло неровными пятнами, и она все время чесала ладони. Дане страшно было подумать, что с ней будет через год-два.</p><p class="p1">Один раз Женя улучила минуту поговорить с ним наедине — Вера убежала к Левшиным, у них была дочь-ровесница. Левшины тоже должны были уехать, вымолили себе Саратов, где у Никиты Андреевича жил брат; левшинской Инне было четырнадцать, она была спокойная, вялая, глупая, но Вере годились все, лишь бы не свои.</p><p class="p1">— Даня, расскажи же, — робко попросила Женя. — Ты почти не писал.</p><p class="p1">— Я писал, Женечка. Но разве все напишешь? Там совсем другая жизнь.</p><p class="p1">— Ах, я знаю. Я ведь в Петербурге жила семь лет. Ты думаешь, у тебя тетка — глупая провинциалка? Я дружила со всем философским обществом, я в «Новом пути» печаталась…</p><p class="p1">— Женечка, я знаю. Но теперь там люди, про которых ты вряд ли знаешь. Очень изменилось все.</p><p class="p1">— Назови хоть кого-то, — не отставала она.</p><p class="p1">— Ну, Савельева, — нехотя сказал Даня.</p><p class="p1">— Господи, так я ее прекрасно знаю! У нее с Валерианом был роман и потом какой-то скандал. Но мы тогда не принимали ее всерьез, она считалась третий сорт.</p><p class="p1">— Она говорила, что знает вас. Тебя и маму.</p><p class="p1">Про Женю она ничего не говорила, да уж ладно.</p><p class="p1">— Скажи, а что это за кружок, в который ты ходишь? Ты все на бегу, а ведь я хочу знать.</p><p class="p1">Он попытался рассказать, ненавидя себя за косноязычие. В его пересказе все выходило плоско. И противней всего было то, что Женя понимающе кивала, словно и в самом деле могла что-то понять.</p><p class="p1">— Да-да, — говорила она, — я помню, все это было. Была Анна Рудольфовна и все это… Ты знаешь, что она приезжала однажды даже в Судак? Она предлагала Вячеславу три пути — розенкрейцерский, египетский и христианский… он выбрал розенкрейцерский, но потом сделал оплошность, и она исчезла.</p><p class="p1">Даня смутно помнил, кто такая Анна Рудольфовна, и не желал выслушивать аналогии между антропософией и учением Остромова.</p><p class="p1">— Женя, это все другое! Он совсем иной!</p><p class="p1">— Подожди, но чем же иной? Ведь все это было, и розенкрейцеры, и алхимия. Вячеслав чуть с ума не сошел, потом женился на падчерице, и все прошло…</p><p class="p1">— Но при чем здесь Вячеслав с падчерицей! — воскликнул Даня, потеряв терпение. — Прости, Женечка, — тут же спохватился он, испугавшись, что сейчас уподобится мерзкой Вере. — Прости. Я не хочу кричать и не хочу говорить про это вообще. Но пойми, что это совсем другое. Прежде всего потому, что другой человек он сам. Нет двух одинаковых учений, потому что нет одинаковых учителей.</p><p class="p1">— Но и усовершенствовавшись, — закивала Женя, — будет всякий как учитель его. Это очень, очень хорошо, что ты его любишь. Но просто — Даня, я очень бы не хотела, чтобы ты творил кумира…</p><p class="p1">Женя, можно ли все время цитировать одну книгу, хотя бы и эту! — хотел воскликнуть он, но сдержался. Время было такое, что всякому нужна опора, хоть какая — хоть дети, хоть родители, хоть книга. Без нее человек делался киселем. Не отнимать же. Да и если голод двадцать первого года не отнял у Жени эту опору, когда — он запрещал себе это помнить — непохороненные трупы валялись по окраинам по три дня… А Женя — они все съехались тогда, вместе было легче, — растягивая на два часа единственный кусочек хлеба (второй отдавала Верке, отдала бы и этот, но без нее Верка бы погибла) с горящими глазами, с трясущейся от слабости головой повторяла: вот как оно подошло… кто бы думал, что Христос откроется с этой стороны?! Ей казалось, что в голодном бреду открывается Христос. Откровения во время изнурительных постов были, наверное, той же природы.</p><p class="p1">— Дело не в кумире, — трудно подыскивая слова, говорил Даня. С тетками было чудовищно трудно — именно потому, что они были свои и помнили его ребенком; с Марьей, кажется, даже легче, потому что она хоть не претендовала что-то знать. Женя была ближе и потому гораздо, гораздо дальше — как тот, кто остановился на полпути, странным образом дальше от цели, чем тот, кто вообще не стронулся с места. Это, вероятно, потому, что конец в начале, финиш в старте, и тот, кто не дошел, — одинаково далек от начала и от конца.</p><p class="p1">— Говори, говори, я слушаю.</p><p class="p1">— Дело в том, — нашел он наконец формулу, — что теперь другое время, что одно — предчувствовать, и совсем другое — среди этого предчувствованного жить… Что-то было вам предсказано, и вам являлось, и вы строили себе догадки — этих догадок было очень много, потому что догадок вообще всегда много, а истина одна. (Ему вспомнилась вдруг безбожная графомания Дробинина — оказывается, и в ней было зерно, даже в дурака ударяет молния: пристань, пристань, небо хоть и мглисто, а река видна до дна. Пристань, я устал от истин, истин много, истина — одна). Тогда все было как штриховой рисунок, а сейчас голая линия. И нам, которые живут среди этой голизны, — не нужна приблизительность. Мы не можем себе позволить перебирать способы, как Вячеслав, — сегодня я мистик, завтра, я не знаю, розенкрейцер, послезавтра египтянин… Сейчас нужен человек, который укажет четкий путь. И на этом пути надо обрести силу, потому что без нее сегодня немыслимо. И этот человек должен быть веселый и твердый, потому что все другое недостаточно…</p><p class="p1">— Ах, но и это было, — сказала она с недоумением. — Был Ницше, и все это веселье…</p><p class="p1">— Женя! — возопил Даня, хватаясь за голову. — Женечка, почему тебе на все надо навесить ярлыки! Вот ты скажешь — Ницше, и все понятно, скажешь — тамплиеры, и вопрос закрыт. Ярлыки ни на что уже не отвечают, то время кончилось, — он сам не замечал, как цитирует Мартынова, — то время отрубилось, как хвост! Его отбросила ящерица и побежала дальше. Теперь ничего этого нет, и каждое слово звучит по-другому. Посмотри! — Он указал на молочно-синее море, над которым еле розовела последняя закатная полоска. — Вот ты подойдешь к нему и скажешь: прощай, свободная стихия. Утром, когда все дрожит и пылает, ты это скажешь по-одному, а сейчас по-другому, а бывает оно такое, что ты это скажешь даже радостно. Что я тебе объясняю?! В общем, сейчас оно такое. Иногда его никакими красками не изобразишь, а сейчас можно было бы изобразить одной линией, или двумя красками. Это все такая пошлость, Женя! Хочешь, я тебе поясню иначе? Я все думаю, какая разница между нашим временем и тем, когда ты жила в Петербурге. Это не про разницу между нами и вами — я никогда не буду от тебя сильно отличаться, кровь есть кровь, — но про разницу Петербурга с Ленинградом, если хочешь.</p><p class="p1">Он помолчал. Ему трудно было это сказать.</p><p class="p1">— Но, в общем, вот был этот невероятный ренессанс всего. Всех искусств, всего вообще. И ты не поверишь, Женя, какой пошлостью это все глядит сейчас. А у нас — да, и плакаты, и чистки, и ужасная «Красная газета», но, Женя, этим отковывается удивительное поколение. (Он говорил теперь быстро, торопясь, чтобы Женя не вставила что-нибудь вроде «страданием очистимся» или «дробя стекло, кует булат»; говорил и за себя, и за Мартынова, и за Надю в особенности, и даже, как ни странно, за Варгу — кто же виноват, что глупая, а все-таки хорошая, дикая). У нас там совсем другие люди, и, может быть, они бы не понравились тебе. В них что угодно есть, Женя, но пошлости нет. И это потому, — страшно сказать, но так, — что та ваша свобода и тот расцвет были все-таки очень, Женечка, второсортные, как у Блока каждое второе стихотворение второсортное. А наша сегодняшняя несвобода и наш упадок — очень первосортные, первоклассные, и только это важно. Понимаешь? Только это. Россия вообще не очень ценит правильные там или неправильные взгляды. Россия ценит сорт. И вот Остромов — это не антропософия и не Анна Рудольфовна, Женечка, это первый сорт. А чему он там учит, куда ведет… важно, что он от этого уводит, — Даня широко обвел горизонт, хотя получалось, что Остромов уводит от моря; но Женя должна была понять.</p><p class="p1">— Это я все понимаю, — сказала она серьезно, — но как бы он, Даня, не увел тебя и от Христа. Потому что уйти «от всего вот этого» — это и значит очень часто уйти от Христа…</p><p class="p1">— Нет, — сказал Даня твердо. — От человека — да, тут никакого сомнения. Но от Христа никогда. Просто пойми — уж тебе ли не понять? — я только что одной девушке, — здесь он поймал себя на отвратительной многозначительности и покраснел, — доказывал как раз, хоть и не умею ничего доказывать… что прежнее христианство, в общем, недостаточно, что ему надо вернуть — нет, не магизм, конечно, и не язычество, но вот ту силу, которая изначально была. Ведь это все-таки пустыня, юг, это все-таки жестковыйное дело. И одной доброты мало.</p><p class="p1">— Но больше ничего нет, — удивленно сказала Женя.</p><p class="p1">— Вот то, что ты это говоришь, — это как раз от того, что ты не знаешь Остромова, — сказал Даня убежденно. — Я уверен, что ты бы поняла, если бы узнала его.</p><p class="p1">Женя не стала спорить, и некоторое время они молча смотрели на море, которое мы только за то и любим, что ему нет до нас никакого дела.</p><p class="subtitle">2</p><p class="p1">На пятый день, когда все чемоданы были увязаны, а все судакские знакомые посещены, Даня отправился к Валериану. Это давно надо было сделать — передать привет от Остромова, валерианова оккультного спутника в тонких мирах, и вообще проверить на нем некоторые вещи: Валериан всяко понимал больше, чем Женя.</p><p class="p1">Уже на подходе к Убежищу, как называл Вал выстроенный по собственным чертежам ракушечниковый дом с башней, Даня услышал ничуть не осипший и не притихший кириенковский рокот:</p><p class="p1">— Но чтобы пережить эпоху, надо не только выжить — надо забыть ее! Только тогда ее можно судить, и у Анри де Ренье находим…</p><p class="p1">Это был Вал, неизменный, в вечном хитоне по случаю удивительной для сентября жары. И хотя в его постоянстве было нечто скучное, плоское — но и героическое: у этого опора была, и благо такой неизменности.</p><p class="p1">— О-о, Даня, — услышал он узнающий голос матери Вала, монументальной, все еще прямой, с пышной, как у сына, и совершенно седой шевелюрой. Она приветствовала всех одинаково дружелюбно, но ей, как и морю, ни до кого не было дела — это и была главная тайна ее здоровья. Она помнила, что Даня уезжал, но не помнила, куда, когда и зачем. При этом память была отличная — она и теперь не вела расходной книги, но отлично помнила, сколько можно тратить на провизию и кто сколько должен. Дом Вала был полон — три петербургских поэта-классика, спасающихся переводами, прозаик-маринист, и как раз сегодня съезжал исторический романист с застенчивой девочкой-женой, взятой взамен тяжеловесной матроны, недавней сочинительницы дамских романов. Исторический романист долго и звучно лобзал Вала, приговаривая:</p><p class="p1">— Чудесный, чудесный ты чудак. Будешь в Питере — милости, чмок, прошу.</p><p class="p1">— Даня, обедать будешь? — окликнула мать Вала. — Щи, но от чистого сердца.</p><p class="p1">Вал был весь в нее, так же бесконечно цитировал, но она его не любила, о чем иногда проговаривалась. Он был совсем не то, что она хотела, — романтик, слабак, эгоист, то есть всегда и во всем видящий угрозу. Он вырос у моря, но не умел толком плавать. Он был толст. Его легко было презирать, и Вал даже подставлялся немного — но всех, кто покупался и начинал панибратствовать, в этом доме немедленно раскусывали и больше не звали. Вал мог быть смешон, но не менялся. Вот почему Даню несколько покоробил отзыв учителя — незлой, но снисходительный.</p><p class="p1">В застольном разговоре солировал, как всегда, Вал: классики снисходительно переглядывались и только что не пересмеивались, маринист ел жадно и сосредоточенно, а к концу обеда заглянул Грэм, старавшийся, видно, опоздать к столу и заставлявший себя тянуть с посещением, но голод взял верх. Он пришел один, без жены, — жена, пояснил он кратко, в Москве, пытается выбить авансы. Сам он не поехал, ибо с новыми издателями говорить не мог. Было время, когда в начале НЭПа его издавали щедро, но теперь враз отвернулись, и он видел в этом п р е д в е с т и е. Впрочем, почти не говорил и он — еда была для него борьбой: огромное тело требовало кормежки, огромная душа стыдилась бедности, ел он медленно, растягивая, от добавки отказывался. Щи и морковные котлеты были пресны — мать Вала полагала, что все беды от соли.</p><p class="p1">Вал говорил обо всем сразу — о барокко, отход от которого казался ему предательством самой сути искусства; об эмигрантских письмах (уезжать не стоило — ведь он всем предлагал кров, и они тут отлично бы жили коммуной, а там — там никогда не будет чувства уместности, которое всегда утешало его здесь); о московском новом журнале, для которого у него попросили стихов — впервые попросили сами, значит, нельзя отворачиваться! После обеда он повел Даню бродить по берегу, а Грэм остался беседовать с матерью Вала, которую называл самой здравомыслящей женщиной на побережье.</p><p class="p1">— Ну что, рассказывайте, — сказал он, в точности как Миша, не прекращая собственных излияний. Даня еле успел вставить в его монолог привет от учителя.</p><p class="p1">— Остромов, — задумчиво проговорил Вал. — Позвольте, когда же я его… Кажется, один раз видались в Париде да потом еще в Питере. Никогда не разговаривали толком. Что же он говорит обо мне?</p><p class="p1">— Говорит, что в первый раз вы встречались еще до начала времен, — доверительно сказал Даня.</p><p class="p1">— Ну, все в первый раз встречались до начала времен, — сказал Вал рассеянно. — Потом, знаете, стирается… Нет, я не помню, чтобы мы говорили серьезно. Был какой-то приплюснутый типчик, откуда-то из Тамбова… Он, признаться, мало что понимал.</p><p class="p1">Даня не желал выслушивать такое об учителе. Все-таки Вал никого не видел, кроме себя. Он немедленно возобновил разговор о том, что интеллигент — негатив власти, и начал цитировать огромную поэму, написанную белым стихом. Даня смотрел на море и машинально кивал. Он раньше Вала заметил приближающийся темно-зеленый катер.</p><p class="p1">— Это не к вам, Валериан Александрович? — спросил он, когда Вал сделал паузу.</p><p class="p1">— О Господи, совсем забыл! — воскликнул Вал. — Это из Феодосии, экскурсия красноармейцев. Они прислали позавчера нарочного, а я и забыл с этим Шаблиным… — Шаблин был исторический беллетрист. — Ну ничего, по своему-до дому я всегда проведу экскурсию. Расскажу про Египет, тем более, что аналогии разительны…</p><p class="p1">И, бормоча про себя будущую лекцию, он устремился к причалу, состоявшему из единственного железного мостка.</p><p class="p1">Даня решил присоединиться к экскурсии. Красноармейцы были смуглые, пыльные и преимущественно двух сортов. В одних поражала детская доверчивость, радостное любопытство от вида моря, каменистого берега, странного асимметричного дома — в других отчетливо проступало глумление, хмыкающая насмешка над всеми этими ненужными украшательствами — башнями, домами, скалами да и самим морем. В пустыню бы их, там бы им самое место. Глумление было робким, приплюснутым, с оглядкой, оно покамест еще спрашивало разрешения — потому что нельзя же, культура, положено; но вечное чутье всех приплюснутых уже подсказывало им, что Вал тут и сам как бы из милости, а потому хмыкать уже можно. И зеленые летние картузы на них смотрелись как кепки на пролетариате.</p><p class="p1">Вал решительно шагал к причалу, предвкушая аудиторию, — ужас, как истосковался он тут по общению, не с архивными же юношами было обсуждать дионисийство; пожалуй, разговора с ним и Альтер не поддержал бы, ибо Вала носило по трем тысячелетиям, как Лаэртида по эгейским зыбям. Вдруг он полуобернулся:</p><p class="p1">— Слушайте! Может, мне — кормить их?</p><p class="p1">— Но в музеях не кормят, Валериан Александрович! — взмолился Даня. — Ведь они вам не платят!</p><p class="p1">— Ничего, я мог им хоть яблок купить… Ведь красноармейцы, несладко!</p><p class="p1">Даня хотел сказать, что уж как-нибудь их там кормят получше, чем у Вала, — но вовремя прикусил язык.</p><p class="p1">— Товарищ писатель! — несколько картинно рапортовал взводный. — Прибыли согласно культурной программы, комвзвода Баранчук.</p><p class="p1">Он, кажется, оглядел своих и подмигнул: эк я прогибаюсь перед старой культурой! Пусть видит, каковы мы есть орлы.</p><p class="p1">Даня вспомнил: воскресенье! Конечно, им положен культурный отдых. Они предпочли бы кино, но откуда в Феодосии… да и начальство небось не поощряет. Вал гораздо представительней. Но Вал вдруг сделался суетлив, утратил всю монументальность, не знал, куда девать руки, и все пожимал плечами, словно повторяя: вот, больше у меня ничего нет… Всю жизнь проживши на отшибе и привыкнув этим гордиться, экзотический крымский отшельник, он страстно теперь хотел вписаться, вот и приглашением в «Новый мир» гордился, как приживал, допущенный к разговору; все дело в том, что ниши отшельника больше не было — а только отщепенца, и благородного соблазнителя больше не было — а только развратник. Красивых поз не осталось, вот в чем штука. В новом мире, в кавычках или без, нельзя уже было оставаться Валом, и Алексеем Алексеевичем Галицким, человеком надеющимся, и даже Лидочкой Поленовой, все надеющейся обойтись элевацией, а не левитацией; осталась ниша мага — который по иным меркам был почти шарлатаном, но сейчас… это надо было обдумать. Ведь алхимия вернулась не просто так. Девятнадцатый век мог позволить себе не верить в алхимию и насаждать позитивное знание, и вот оно насадилось, и победило, и вот что сделало — и алхимик с его магией тут как тут, потому что без магии уже попробовали. Все это Даня вертел в голове, пока Вал, бросив грозный взор на мать (и она с достоинством, медленно, но удалилась к себе), рассказывал красноармейцам:</p><p class="p1">— Вот, товарищи, здесь… это довольно давно уже было… здесь собирались у меня поэты и художники, которых вы, может быть, знаете или после узнаете. Здесь бывал товарищ Горький один раз по возвращении из Италии, все говорил мне, что надо создать коммуну писателей, и она уже создалась, товарищи, жалко только, что товарищ Горький опять в Италии… Тут бывал, так сказать, товарищ Корабельников, наш революционный поэт, играл в это… в городки. (Играл он, конечно, в орлянку, со всеми, по любому поводу, — как все люди, неуверенные в собственном существовании, ежесекундно ожидающие нападения, и больше играл только Казарин, — люто ненавидя друг друга, они при встречах тут же принимались играть во что попало, ибо больше было не с кем; Казарина давно теперь не было, и Вал не знал обстоятельств его исчезновения, а Корабельников, наверное, не помнил Вала и его судакской крепости: в прошлом году приезжал в Ялту — не заехал). Пройдемте на веранду. Вот здесь стоит у меня подлинный древнеегипетский, обнаруженный на раскопках бюст царицы Мутнеджмет, то есть не подлинный, конечно, но абсолютно точная копия. Оригинал находится в музее Сарнакского храма. Здесь библиотека, на 9215 томов, я точно веду каталогизацию, книгу нужно чтить, товарищи… есть тома на двадцати пяти языках, включая древнееврейский. «Что, все знаете?» — спросил взводный. «Не все, — смущенно улыбнулся Валериан, — но я же и не один пользуюсь… приезжают друзья, присылают даже запросы из Москвы за некоторыми справками…». Вот это, товарищи, моя мастерская, мой творческий метод таков, чтобы одновременно работать над несколькими акварелями, потому что схватить море в одном виде — невозможно: нужно несколько ракурсов, как при зрении насекомого, у них есть такие фасетки… Эти комнаты на втором этаже — гостевые, у меня всегда много гостей, и постановлением Крымсовета Дом поэта утвержден как общежитие литераторов, уже я передал его в собственность и сам живу, так сказать, как жилец… Сегодня вы можете тут видеть уже писателей, пока еще сезон, и если у вас будут, так сказать, вопросы…</p><p class="p1">Где было все его красноречие? Он мог быть кем угодно — живописцем, антропософом, проповедником, — но не мог быть экскурсоводом по собственному дому; для этого нужна иная мера желчности и отрешенности. Он был и не дома, и не вне, — и Даня, обернувшись, заметил, как сострадательно смотрит на все это Грэм. Вот кого время не брало — только мешки под глазами набрякли, но сенбернарского выражения собачьей грусти, столь обычного у старых пьяниц, тут не было. Обычный ястреб, только с кругами у глаз.</p><p class="p1">— Ну, собственно, вот, — закончил Вал у лестницы, задыхаясь больше обычного. — Собственно, если вопросы…</p><p class="p1">— Товарищ взводный! — спросил один приплюснутый, с узко сощуренными глазами, в которых приплясывал робкий, но уже гнусный смех: пусть не над всем, но глумиться уже можно. — Разрешите вопрос товарищу культурному писателю?</p><p class="p1">— Спрашивайте, Устименко, — холодно разрешил взводный.</p><p class="p1">— Вот… товарищ писатель, — хитренько спросил Устименко, — а расскажите, будь-любезны, о ваших идейных ошибках.</p><p class="p1">Их готовили, понял Даня. Им объяснили, что писатель старый, с идейными ошибками. Что надо, конечно, набираться культурного багажа, но отбирать только полезное, а вредное оставить. Ему мало было, что беспомощный толстяк в смешном хитоне водит его по своему дому, как по чужому. Ему надо было, чтоб он рассказал про свои ошибки.</p><p class="p1">— Разрешите, я отвечу! — внезапно вклинился Даня в это позорище. — У товарища писателя, товарищи, есть одна, но довольно существенная ошибка. Ошибка эта, товарищи, состоит в том, что товарищ писатель приглашает к себе в гости разных товарищей, но забывает им объяснить, как вести себя в гостях. А в гостях, товарищи, надо благодарить. Поблагодарим товарища Кириенко!</p><p class="p1">И приглашающее захлопал первым.</p><p class="p1">— Кстати, — подал голос Грэм, — у товарища Кириенко, как и у всех нас, довольно много ошибок. А вы, товарищ Устименко, наверное, даже пишете с ошибками — так?</p><p class="p1">— Эт верно, — усмехнулся Устименко, и по усмешке его можно было даже понадеяться, что он так себе, недурной малый, но Даня уже не покупался.</p><p class="p1">— Так вот! — назидательно сказал Грэм, воздевая длинный костлявый палец. — Чтобы разбираться в ошибках товарища Кириенко, надо знать гораздо больше, чем он. А я пока еще не встречал такого умного товарища. Разве что, может быть, вы, товарищ Устименко, когда-нибудь станете, если будете хорошо кушать и товарища взводного слушать.</p><p class="p1">Вал развел руками, словно говоря: видите, товарищи красноармейцы, с какими ядовитыми людьми приходится иметь дело. Как тут не наделать идейных ошибок.</p><p class="p1">Он пошел провожать их до причала, и с веранды отлично было видно, как он кланяется, пожимая руку взводному.</p><p class="p1">— Не было такого раньше, правда? — спросил Даня, заглядывая в каменное лицо Грэма.</p><p class="p1">— М н о г о г о раньше не было, — сказал Грэм. — Я слыхал, вашего отца высылают.</p><p class="p1">— Да. И Валю.</p><p class="p1">— Вы — с ними?</p><p class="p1">— На первое время, помогу устроиться. А потом назад в Ленинград.</p><p class="p1">— Провожу вас, — сказал Грэм, и Даня вздрогнул от радости. Горько было бы идти домой одному, хоть и вдоль любимого берега.</p><p class="subtitle">3</p><p class="p1">— Слышали ли вы о русалках воздуха? — спросил Грэм, когда они в молчании прошли по сухой глинистой дороге до первого поворота, от которого открывался вид на долгую цепь туманных мысов — черный, серый, а дальше сплошь голубые.</p><p class="p1">— Никогда, — радостно ответил Даня, предвкушая новую сказку.</p><p class="p1">— Я тоже, — серьезно сказал Грэм, и с минуту они шли молча, так что Даня успел испугаться — вдруг он еще ничего не придумал?</p><p class="p1">— Я не могу иначе назвать это явление, — начал наконец Грэм, — но контуры его следующие. В августе этого года, сообщает лионский журнал «Aero», пилот Максим Тремаль совершал обычный тренировочный полет на своем четырехмоторном «фармане» над виноградниками близ Клеро. Тремаль — опытный пилот, известный дальностью маршрутов, перелетавший Пиренеи и повидавший д о с т а т о ч н о. На высоте двух тысяч футов он почувствовал вдруг вибрацию, подобную той, что бывает при засорении бензиновой помпы, но совершенно другой природы — как если бы его самолет, увидев н е ч т о, вместе испугался и засмеялся. Так бывает, когда мы видим опасность и понимаем вдруг, что она дружелюбна. Так начинают играть с опием… но оставим опий. Ощутив эту дрожь, какая мгновенно передалась его телу, Тремаль усилил подачу топлива специальным ключом — но дрожь усилилась, и тогда он услышал рядом с собой яркий дружелюбный смех. Он был в том слое небес, который сильней всего напоминает арабскую сказку, — жемчужное клубление, купола и минареты, и тот особый пепельный тон, какой бывает на Востоке при изнеможении жаркого дня. Рядом с ним была прозрачная женщина с распущенными волосами, совершенно такая, как на изображениях русалок, и тело ее зыбилось, колыхалось. Она манила его из кабины, и он уверял потом — когда, седой, вернулся, — что легко полетел бы за ней без помощи приспособлений, естественно, как во сне. Но сила недоверия — он по сей день проклинает ее и проклинать будет вечно, — остановила его и приковала к кабине, и он долго еще видел, как прозрачная женщина удаляется, не уменьшаясь. — Это было страшней всего, Грэм здорово придумывал такое: как же он понял, что она удаляется, если не уменьшалась? — Она росла, пока не заполнила весь горизонт, и тут исчезла; и Тремаль увидел, что отклонился от маршрута на добрых три сотни миль, промчавшихся для него стремительно, как поворот головы на окрик. А повернуло его между тем далеко, унеся на море, и лишь на последних каплях горючего дотянул он до земли, мысленно простившись со всеми. Теперь скажите мне, что вы об этом думаете.</p><p class="p1">В рассказе Грэма было слишком много точных цифр и иных подробностей, чтобы принять его за правду, — и однако, он завел эту сказку не просто так.</p><p class="p1">— Если допустить, что все так, — осторожно сказал Даня, боясь обидеть рассказчика и недоверием, и легковерием, — проще всего вообразить, что на определенной высоте происходят галлюцинации, и я бы в кабине самолета не то еще увидел…</p><p class="p1">— Галлюцинаций, — отмахнулся Грэм, — не существует, и вы это прекрасно знаете. У многих ответ на все — галлюцинация, но это лишь название картин, существующих д е й с т в и т е л ь н о и облекаемых мозгом в доступную ему форму. Я спрашиваю не о том, почему это было так, а о том, что это было в действительности.</p><p class="p1">— Не знаю, — помолчав, сказал Даня.</p><p class="p1">— Я тоже не знаю, — признался Грэм, — но могу допустить, что это были имаго — в той стадии, которая неизбежно наступает после окончательного превращения.</p><p class="p1">Даня молчал, понимая, что расспрашивать нельзя. Паузы входили в сюжет рассказа.</p><p class="p1">— Имаго — та промежуточная стадия на пути некоторых человеческих превращений, которая непосредственно предшествует высшей фазе. Эта высшая фаза у каждого своя, и я знал одного п и а н и ц у, высшей стадией у которого было вечное опьянение, в обыкновенной одесской харчевне, в порту. Это может быть и полное падение, не забывайте. Высшая фаза — не что иное, как обретение своего вида, изначально вам предназначенного. Многие вовсе не начинают этого пути, но начавшие сразу видны, и я вам поэтому говорю. Я хочу сказать вам, что имаго должны, по моим догадкам, находиться в воздухе, ибо это самое промежуточное состояние. После они обретают себя и попадают кто куда, или, если таков их выбор, зависают навеки. Я полагаю, что имаго остаются в той среде, где их настигло превращение. Если это случилось в воздухе, они становятся русалками воздуха; если в воде — естественно, русалками воды; наверное, есть и русалки почвы, но их уместней будет назвать пузырями земли. И что же? — они описаны!</p><p class="p1">Новый рассказ был почти готов, а подробная авиапривязка — две тысячи футов, четыре мотора, триста миль, — требовались для того, чтобы пристроить его в «Авиатора» или «Огонек».</p><p class="p1">— Так вот я вас хочу предупредить, — сказал вдруг Грэм, — чтобы вы не пугались.</p><p class="p1">— Чего именно? Вряд ли я полечу на четырехмоторном «фармане»…</p><p class="p1">— Во-первых, никто не может знать, а во-вторых, четырехмоторный «фарман» никому не нужен, — с легким раздражением произнес Грэм. Он был вполне серьезен, и водкой от него не пахло. — Мое дело вас предупредить, а ваше запомнить. Что же, мне пора. Прощайте, хотя, может быть, и увидимся.</p><p class="p1">Даня испугался, что не так говорил с ним, но Грэм протянул ему широкую, сухую и неожиданно горячую руку, улыбнувшись скупо, но одобрительно.</p><p class="p1">— А к нам не зайдете? — уже вслед ему крикнул Даня.</p><p class="p1">— Нет, — ответил он, не оборачиваясь. — Зачем же.</p><p class="subtitle">4</p><p class="p1">Последний день перед отъездом прошел в занятиях, которые Даня откладывал, сколько мог. Он разбирал бумаги матери. Отец с Валей и Алексеем Алексеичем отправились в прощальные визиты, и никто не мешал ему.</p><p class="p1">Тогда, в феврале, осиротев, он не мог заставить себя просматривать материнские тетради. Они сделались вдруг беззащитны. На что она была с ним откровенна, а это прятала, и лезть туда теперь без спросу было выше его сил. Но оставлять их было негде, приходилось везти с собой, а паковать не глядя было как-то оскорбительно. И он стал просматривать эти записи, пока не зарыдал в голос; а потом, кое-как успокоившись, читал дальше.</p><p class="p1">Поразило его то, как много она работала — в те самые дни, когда он мог только лежать пластом, когда Валя беспрерывно хныкал, когда отец уходил на целый день, якобы искать продукты, а на деле жаловаться к Митрофанову, жившему на Рыбацкой. На ней было тогда все — толочь какие-то сушеные коренья, размалывать их в медной кофейной меленке, печь горькие лепешки, умолять Валю, чтобы ел… Из даниной попытки рыбачить ничего не выходило, попадались все собаки и зеленухи, начали в конце концов есть и зеленух, Валю рвало, отпаивали ромашкой. Говорили, что самый страшный голод их еще миновал, вот в Севастополе… — Господи, что же было в Севастополе? И в это самое время, в двадцать первом, в первые месяцы двадцать второго, — она писала неостановимо. Значит, слово не было лишним, как он боялся; значит, оно могло быть спасительно. «Тебе плохо оттого, что нет творчества» — это она сказала, когда ему было девять. Он давно жил с чувством, что никакое сочинительство никого не спасет, — но вот ее спасало в самое трудное время, потому, вероятно, что тогда слово еще значило. Не спасло оно потом, уже после подвала. Странная штука — таким, как она, да и как он, легче было вынести голод, холод, любые внешние вещи, но что их ломало, так это подвал. Все, что от стихийной силы, — ладно; но то, что от людей, заставляло усомниться в чем-то, в чем мать сомневаться не могла. Не в Боге, нет, — Бог, судя по последним стихам и запискам о подвале, оставался с ней, хотя и мог все меньше; но люди — это была преграда непереходимая. Можно было жить в мире, где все голодали, но где оплевывали — нет, этого она не могла.</p><p class="p1">Она многого о подвале не рассказывала, в записках это было, но о худшем она писала неохотно. Худшим были попытки спастись за чужой счет, оклеветать, оболгать. Поразил его разговор, о котором она тоже не рассказывала, — громче и яростней всех орал на допросах бывший столяр, часто вызывал ее ночью и то кричал, то ругался и жаловался на свою жизнь, и когда она однажды спросила, неужели не помогает коммунизм, — ответил гениально: «Коммунизм хорош днем, тетка, ночью нет коммунизма»… Оказалось, она скрыла от него историю соседки, Тани Гольцевой, девушки высокомерной, заносчивой — но заносчивые-то крепче открытых и простых: ее вербовали в осведомительницы, она отказалась, ей грозили расстрелом, она упорствовала. Потом она заболела тифом, ее перевели из подвала, и можно было думать, что она откупилась болезнью, — а ее все равно расстреляли потом, в больничном дворе. Это было так необъяснимо, недостоверно, что хотелось объявить паническим слухом — но рассказали верные люди, а вся вина ее была в том, что переписывалась с женихом-юнкером. Неизвестно, где теперь этот юнкер.</p><p class="p1">Ясно было, что после этого мать не могла писать, да вряд ли могла и жить; он вспомнил, как отнес ей однажды блины — дали свидание, и вот он понес, напекла Соня, приходившая к ним прибираться, где взяла муку — непостижимо. И как он думал обрадовать ее этими блинами, сухими, тонкими, как бумажные, — а она смотрела мертвыми глазами, и ничего, и он смел обидеться, мысленно, ненадолго, но смел. А какие уж там были блины, какие свидания — когда она на эти три недели застыла в неотступном ужасе. Он вдруг понял. У нее нашелся странный — очерк не очерк, дневник не дневник, пять листков о Полынь-горе. В них действительно был ключ, хоть и не сразу видный. Очерк выглядел странно — человек, матери не знавший, вообще не понял бы, о чем там. Это не переводилось на обыденный язык. Суть была в том, что мать всю жизнь разрывалась между величественным и домашним, обыденным и непонятным; девяносто из ста вообще не знают этого выбора, а для нее он был причиной всей душевной смуты, которой многие — в том числе, кстати, отец, — видеть не видели. Казалось бы, вот за домом гора, невысокая даже по крымским меркам, — для всех обычнейшая часть пейзажа, но для матери, которой все сообщало обо всем, она была знаком присутствия в мире неодомашниваемых, неприручаемых вещей. И когда она уходила на гору, всегда безлюдную, и долго стояла там на плоской вершине, заросшей жесткой полынью, — ей всегда страстно хотелось домой, увидеть детей, мужа, няньку Веру, но она заставляла себя там стоять, напитываясь чувством чуждого. И он понимал теперь ее смуту. Ей все время хотелось увидеть подлинное лицо мира, и она ждала, что вот-вот увидит его, — ждала до своих сорока, когда обычные люди уже не просто определяются с мировоззрением, а вообще забывают о нем, живя повседневными заботами и болячками. Она не знала, где это лицо, — на горе ли, дикой и по-своему прекрасной, почти божественной, или дома, где ее встречали Валя и Даня; и вот мир показал ей это лицо, и это лицо было подвал.</p><p class="p1">А как она ждала, как предчувствовала! Каким горячим предощущением новизны, последнего и главного опыта дышало все, написанное во время голода! Нет, там случались свои провалы слабости — «Никому не нужна ты в этой жизни проклятой, близким и дальним в тягость и жалость… Никто не поверит, все стали как звери — друг другу постылы, жадны и хилы», это было так слабо, как не писала она даже в детстве, стало быть, действительно руки опустились; но тут же, рядом, — «Теперь, среди голых окраин, я колеблема ветром трость. Господи, ты здесь хозяин, я только гость». Это было уже тверже, с сознанием силы, это была организованная речь. Она записывала все, но многое думала уничтожить, а печатать, вероятно, не стала бы ничего — слабое того не стоило, а сильное было так сильно, что не выносить же это ко всем, не превращать в торжище. «А чудеса меж Ним и нами, сверкая, стелятся как мост, и ночь, смотри, зажглась огнями падучих звезд». И все время, чуть не через страницу, — вера, что вот, откроется, через голод, через лютую зиму двадцать первого года — откроется: «Даже ветхие перила раздались, но таинственная сила тянет ввысь». А тянуло — в подвал, и в этом не было никакой выси. Это был не дом и не гора, и тем не менее именно это было подлинное лицо мира. Даня это знал, и ничто не разубедило бы его. Этим и отличались от отцов, все время чего-то ждавших, дети, ничего уже не ждущие. Тут не надо было искать ни света, ни правды. Отсюда стоило искать только выход, и величие учителя было в том, что он этот выход указывал.</p><p class="p1">Самое ужасное было в том, что мать стыдилась, считала свое поведение недостаточно твердым — раз выпустили, значит, что-то не так. Ее убивало, в сущности, чувство вины: перед ним и перед Валей, которых она привела в такой мир; перед миром, которому не сгодилась ее жертва; перед теми, кого убили, потому что ведь это она не смогла защитить. Насмарку пошло все, и стихов не было, потому что какие же стихи у виноватого перед всеми? Правда, он нашел одно, из которого даже как будто помнил два слова, часто повторявшиеся в декабре прошлого года: меньше обостренности, меньше обостренности… Всякая боль тупеет, нельзя с ней жить вечно — «Видно, это старость, и душа устала. Ближе стали дети, и врагов не стало». Чего-чего, а этого он не хотел, эта примиренность казалась ему еще убийственней вины. Он даже хотел сжечь этот листок, но понял, что не сможет.</p><p class="p1">Из записок о подвале больше всего понравился ему очерк о Павле Сергеевиче, бывшем путейце. Он был, между нами говоря, дурак. Но в подвале он вел себя превосходно — твердо, гордо, — потому что дураки и путейцы не ведают сомнений; он соблюдал все прежние ритуалы вроде целования рук знакомым дамам, с которыми там встречался, он орал на допрашивающих, и его громовой бас и красный обветренный нос действовали на всех гипнотически. Человек с таким басом и носом не мог быть неправ, он явно имел особые права и уж явно не мог быть замешан ни в чем дурном! И его выпустили, к великому огорчению подвальцев, потому что около него было спокойно, он так гаркал, так выпячивал грудь! После подвала мать встретила его на улице — и поразилась ничтожности, примитиву всего, что он говорил. А чего она ждала? Выносливы либо самые сложные, либо самые простые; несгибаема либо Таня Гольцева, либо уж путейская выправка; будь либо сверх, либо недо, а человеку в нечеловеческие времена делать нечего.</p><p class="p1">А в последней тетрадке, коричневой, с трактором на обложке, — ждала его одна из тех находок, что подтверждали неслучайность всего: не успел он подумать об учителе, как натолкнулся на попытку записать легенду об ученике чародея. Почему-то мать не стала рассказывать ему дальше, но не забыла, придумала. А с другой стороны — кому рассказывать? Даня был уже большой, а Валька еще мал.</p><p class="subtitle">5</p><p class="p1">В этой сказке говорилось о странном: Хасан живет со своей принцессой, бывшей рабыней, а теперь восстановленной в правах владычице северного острова, — и чем дольше живет, тем явственней чувствует иссякание своих волшебных возможностей. Они не то чтобы убывают, а приедаются, и простые чародейские трюки вроде воздушных путешествий или отгадки мыслей уже не радуют его. И когда на острове начинается чума, его чародейских сил уже не хватает, чтобы справиться с болезнью: несколько лет сладкой, сытой, ленивой жизни во дворце убили в нем многие способности, а обычных фокусов вроде путешествий во времени уже недостаточно. Но северная чайка, морская птица, поведала ему, что на соседнем острове живет другой чародей, поистине великий, хоть и таящийся под личиной нищего рыбака; и если Хасан выучится у рыбака главному чародейству, он изгонит чуму. Чума, однако, не дремлет и насылает на Хасана бред: ему кажется, что все люди вокруг стали похожи на его собственную жену, рабыню-принцессу. Вот она хохочет ему в лицо на вымершей улице — он толкает ее и видит, что это безумный нищий хохочет среди мертвых; вот она умоляет его остаться, он всматривается — и видит, что это визирь хватает его за полу одежды. Куда бы он ни пошел, всюду она, и на пристани она преграждает ему путь, чтобы он не посмел взойти на корабль. В ярости бросается он на нее — а когда она, убитая, лежит перед ним на песке, он в ужасе понимает, что эта-то, последняя, и была настоящей. И в ту же секунду эпидемия покидает город, и жалкий рыбак идет ему навстречу по морскому песку: зачем тебе учиться у меня, говорит он, ведь ты уже выучился. Ты и сам отдал последнее, отнял его у себя, и теперь ты подлинно великий чародей: только тот велик, кто обрубил последнюю связь.</p></span></span>
