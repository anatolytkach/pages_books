<p class="p">Глава одиннадцатая</p>
</div><p class="p1">Мосолова была некрасива. Ее привел Мартынов — вообще с его появлением дела пошли, пошли: одних гороскопов за неделю продавалось три десятка, всех же слушателей в кружке насчитывалось восемнадцать, да частных занятий набегало до шести. У Остромова не всегда теперь было время подчитать конспекты, посидеть в Публичке, выпить, наконец, водки, что было много важней. У его клиентуры хватало забот, и он совмещал в себе няньку, врача, любовника, учителя, работодателя — каждого утешь, с каждым посиди, каждому выпиши смысл жизни трижды в день по столовой ложке после невкусной еды, чтобы показалась приемлемой.</p><p class="p1">Он лечил от черной ипохондрии и желтой лихорадки, недержания мочи и бесплодия; предсказывал судьбу, толковал сны, вразумлял непослушных детей. Эти люди ничего теперь не умели делать сами. Согласившись со своей бывшестью, они утратили все навыки, позволявшие удержаться на плаву, и чем бешеней сопротивлялись, тем быстрей опускались. Старуха Ляцкая, пару раз притащившаяся на лекции по арканам, разучилась завязывать шнурки на ботинках. Она, впрочем, никогда не умела этого как следует — генеральша, ей ли снисходить, — но в девятнадцатом году помнила, а в двадцать шестом разучилась. Однажды Остромов увидел, как его Ирина с изумлением пялилась на платок: она словно забыла начисто, что это такое. Он приписывал это лекциям, уносившим слушателей в тонкие миры, и сам подчас забывался, воспаряя, — придумывалось изумительное, никогда не сочинялось с такой легкостью, — но тут дело было не в лекциях: слушатели распадались, и нужно было побыстрей забрать у них остатки, пока они еще помнили слова «подсвечник», «серебро», «взнос».</p><p class="p1">Питался он теперь хорошо. Кружок содержал его исправно, занятия приносили до пяти червонцев в хороший день, он начал прикапливать. Ирина сшила ему плащ из волшебного алого сукна, приобретенного на Сенном за сущие гроши. Но драгоценней всякого сукна, плаща, белого мяса, которое теперь почти приелось, было сознание подлинной своей необходимости: так в нем еще не нуждались. Он почти любил их всех, и как не любить — для учителя это вещь естественная; вот был бы сюжет — так отлично настроив дело, провалить его из-за мелкой жалости, сделаться одним из них… Но судьба была за него, и они были так ничтожны, так зловонны, что он и на секунду не мог себя представить в их ряду. Словно с утратой человеческого статуса, с переходом в ранг бывших утратились все их человеческие заботы, и остались самые вонючие: телесные недуги, денежные страхи, беспомощность и то особое беспокойство, когда масштаб твоей и всеобщей катастрофы превосходит возможности твоего ума. Они чувствовали, что все не так и идет все более не туда, но не в силах были понять, почему, за что это им и в каком направлении карабкаться. Я удивляюсь, думал Остромов, я удивляюсь! Он не знал, как можно этого не видеть. Разумеется, они были виновны, хотя бы в том, что, когда не поздно еще было препоручить страну сообразительным людям — каковы были люди его круга, наросший наконец в России мыслящий и деловитый слой, вроде незабвенного Извольского, блистательного Зюкина-Маринелли и многих, многих еще способнейших индивидов, — они медлили, канючили, цеплялись за закон, а то и откровенно презирали. Теперь за это они дотлевали на своем гноище, и жалобы у них были такие, что исключали всякую жалость: Остромову легко было демонстрировать надмирный, учительский хлад. Пожалеть он мог бы одну Ирину, но она-то как раз была на плаву.</p><p class="p1">Вот тоже и Мосолова. Мосоловой он побрезговал бы даже в начале, когда кружок еще не определился, когда Остромов заглядывался на встречных женщин. У нее было нечто вроде половой истерии, в форме ночных страхов, — Остромов знал этот тип и знал, что рядом с мужчиной никаких страхов бы не было; наконец он запретил ей прибегать в неурочные часы, но тут она явилась с Юргевич — в надежде подкупить его, что ли? Юргевич было двадцать восемь лет, она работала учетчицей на картонажной фабрике, но когда-то, при иных условиях, несомненно блистала бы, пусть и в полусвете. Тут тоже было не без истерии, но с этой хотелось по крайней мере иметь дело. Он назначил ей встречу; приперлись обе. Применен был гороскоп, заглядывание в прошлую жизнь, указание на влажный Меркурий, — Меркурий сработал, и Юргевич, округлив огромные глаза, полюбопытствовала, что делала в предыдущем перерождении. Она была с явной еврейской примесью, дочь медика или адвоката, экзальтированная барышня, каких множество было в тринадцатом году, и тогда он не связывался, зная их болезненную привязчивость, а теперь было бы даже любопытно. Воображение его дремало в тот день, может быть, по причине влажной августовской жары, и он попросил, чтобы она сама проникла в собственное прошлое, а дальше дело двинулось. Она оказалась в высшей степени медиумична, то есть готова воспринять все, что он подсказывал. Выяснилось, что первое ее воплощение было в Афинах, и там она была гетера; из долгого опыта путешествий по чужим перевоплощениям Остромов знал уже, что в Афинах все мужчины были философы, а женщины гетеры, отчего, надо полагать, город и пал, покоренный Спартой, где, в свою очередь, не было никого, кроме мужчин и лисят. В Афинах Юргевич содержала салон, где бывал Солон. Она трогательно зажмуривалась и страстно пыталась вызнать у памяти, что делал с нею Солон, хотя Остромов, например, воображал это без всяких усилий. Второе воплощение Юргевич было в Шотландии, и там она была, знамо, ведьма, и тоже, вероятно, держала салон, за что и поплатилась при бурном одобрении шотландских пивоваров. В третий раз ее сунуло в Париж времен термидора, где она сперва держала салон, а потом сложила голову на Гревской площади, причем ее любовник, одетый санкюлотом, то есть, видимо, sans culottes<a href="ch2.xhtml#id24" class="a">[23]</a> от садического возбуждения, рыдал в толпе, не в силах отсрочить казнь. Из мировой истории Юргевич знала только то, что касалось разврата и казней. Это был случай, близкий к идеальному. Теперь ее воплотило в Ленинграде, на картонажной фабрике, где не было ни казней, ни разврата, а только грубые приставания пролетариата, в котором она никак не могла увидеть ни санкюлотов, ни шотландских пивоваров. Я должен говорить с вами наедине, сказал Остромов. Ах нет, воскликнула Юргевич, я чувствую себя настолько в вашей власти, что не ручаюсь — За что? — спросил он властно, и Мосолову сдуло.</p><p class="p1">Он думал применить тройственную инициацию, завершавшуюся обычно по схеме «У», то есть уста; но уже на первой стадии натолкнулся на сопротивление, тем более яростное, что она сама <em>желала</em>, и он видел это, желала страстно, и не возражала против него как такового, — однако тут был внутренний барьер, посерьезней всего, с чем он сталкивался доселе. Обычно у Остромова не было повода усомниться в силе своего гипнотизма; но здесь о переходе на вторую стадию нечего было и думать. Остромов с досады посулил ей отчаяние и бессонную ночь, и отпустил со злобой; злоба исчезла, когда она примчалась на другой день с раскаянием и пыталась сама склонить его к первой стадии, но на переходе ко второй дико взвыла и выскочила из комнаты. Может быть, дело в комнате? — спросил он. Давайте попробуем у вас или где-либо еще. Но у нее было нельзя, мать, безвылазность, подозрительность. Отлично, сказал Остромов после третьей попытки, когда она вернулась через неделю в обычной еврейской истерике, не понимая сама, чего хочет. Мы никуда не сдвинемся без глубокой регрессии, какую способен предоставить только спиритический сеанс. Да, я требую, я настаиваю, закричала она, я должна понять, в чем здесь дело, и почему мучительная тяга к вашему… Эгрегору, подсказал он. Да, почему мучительная тяга к вашему эгрегору всегда так сопряжена с чувством страстного внутреннего протеста, с ощущением, что меня за это сожгут — как тогда, в Эдинбурге… Сжечь не сожгут, подумал Остромов, а выпороть не мешало бы.</p><p class="p1">У Юргевич случались озарения, она видела будущее. Разумеется, всем этим озарениям была грош цена. Она ничего не видела и не умела, ей вечно что-то являлось, она прибегала с рассказами о новых озарениях, все какие-то рынки и на них нищие, и толпы, текущие в воронку; с особенной назойливостью почему-то именно рынок, и каракулевые шубы, и бочки. В русских деревнях этот тип назывался кликушей, но откуда это было в ней, горожанке, сроду не видавшей сельской истерики? Она уверяла, будто в детстве однажды предсказала брату падение с лошади; смешно. Кто же не предскажет падения с лошади тому, кто в четырнадцать лет полезет на нее впервые? В воспоминаниях о детстве она путалась, у нее все там как-то спеклось, слежалось, как у несчастной Лизы Савельевой, начисто забывшей, Лиза ли она, Амальфия или китайский странник Ли Сян Цзы. Юргевич рассказывала о себе ужасные вещи. Она будто бы предсказывала несчастливое замужество гимназической подруге, и подруга погибла через день после свадьбы, убитая ревнивым поклонником, с которым они все вместе так весело катались на коньках за год до того; революция тоже явилась ей в каком-то из снов, и даже отцу она в приступе лунатизма сказала — не ходи по льду; но он ушел в Финляндию в двадцать первом и пропал без вести. Почему-то ее предсказания всегда были о несчастьях; что ж, умом трезвого человека Остромов мог проанализировать и это. Мрачные пророчества надежней — рано или поздно всегда будешь прав; да они же и запоминаются лучше счастливых. Несколько раз, когда она долго задерживалась на нем своим тяжелым, гнетущим взглядом — как хороши должны быть такие глаза в минуту истинной страсти, и как сладко было бы расколдовать этот кактус! — Остромов чувствовал себя в самом деле не совсем уютно, но иудеи сами были недурными ловцами душ и умели пустить пыль в глаза. Одно было неясно: если она так недвусмысленно тянется и даже льнет к нему — что мешает ей перейти последний предел?</p><p class="p1">— Я вам верю не до конца, — сказала она однажды. — Я сегодня ночью много о вас думала, и всегда почему-то вижу рынок.</p><p class="p1">— Может быть, вы видите его вне связи со мной? — пошутил Остромов. — Может быть, вам просто хочется пойти на рынок, купить себе творогу?</p><p class="p1">— Вы опять не всерьез. А ведь это нам о чем-то предупреждение. Я многое вижу, ах, многое. Меня уже жгли за это в Эдинбурге. Было очень неприятно.</p><p class="p1">— Вот видите ли, — говорил Остромов раздраженно, — все это полузнание, полуначитанность… Вы читали много, но, как многие, поверхностно. Дар предвидения не ходит один. Его надо, во-первых, стяжать, то есть молиться; во-вторых, он сопряжен почти всегда с исцелениями, а вы ведь не исцеляете? Оставьте, не занимайтесь доморощенными гаданиями, все это Синяя Блуза. Я учился этому годы, десятилетия, и между тем касаюсь лишь подножия Истины. Что вы хотите сделать, ничему не учась и не доверяя учителю?</p><p class="p1">— Я доверилась бы вам, — шептала она, и ее черносливовые глаза набухали слезами. — Но я слишком вижу… я вижу этот рынок и этот каракуль… и среди этого, в темном пятне, — вас, а себя я в этой картине вовсе не вижу…</p><p class="p1">Остромов вздыхал и принимался осушать ее слезы, но на переходе к третьему плану, когда он уже изнемогал, она с криком кидалась из комнаты, чтобы через три дня явиться снова. Он хотел было просто объяснить ей, что сейчас не тринадцатый год и обставлять простейшие вещи роковыми деталями попросту нет времени, но опасался взрыва — с женщинами ее породы прямота только портила весь расклад.</p><p class="p1">Он сам не знал, что его тянет к этой дуре, к иудейке в позднем цветении, накануне стремительного, скучного увядания, почти неизбежного зоба и неостановимой брюзгливости. Сейчас в ней еще было нечто, и он готов был потерять голову — особенно эта страстность, с которой она воображала афинские оргии, шотландские пытки, — но Остромов был не из тех, кто легко доверяется. Он предположил даже, что она подослана — может быть, Варченкой на предмет контроля, — и попробовал намекнуть, но обнаружил полное непонимание. Тем не менее он подоткнул и этот угол — пригласил его на спиритический сеанс в ближайшую пятницу на Михайловской, и тот пообещал быть.</p><p class="p1">Публику для сеанса Остромов подобрал с тщанием. В таких вещах все зависело от состава участников, как если бы сеанс был настоящий. Женскую часть кружка он пригласил без колебаний — Юргевич должна была расслабиться в обществе сестер; мужчины, по большому счету, были не нужны вовсе, но отчего-то ему легче бывало в обществе Мартынова. Без Поленова тоже было нельзя — они с Левыкиным гарантировали преданность и подогревали истерику; а вот Галицкий, молокосос, мог не оценить пряного аромата, пусть обождет. Альтергейм, пожалуй, годился — с ним было весело. Следовало только иметь в виду, что он полиглот, а потому вызывать только русских: спросит греческую гетеру какое-нибудь «айо ойо ставрокакиус?» — а гетера только заблеет в испуге, и Остромов не выручит подсказкой, ибо в древнегреческом сам был не силен. Чупрунов, оператор, был чересчур трезв для транса и мог в неподходящий момент загыгыкать. Пергаментный историк Трапезников испортил бы все дело язвительными уточнениями: и ведьма-то не так одевалась, и Фрина-то не так раздевалась.</p><p class="p1">В чем смысл спиритического сеанса и отчего именно после него так легко падают бастионы — Остромов и сам бы не ответил, хотя с младых ногтей знал бесспорную пользу этого тонкого, подчас оргиастического развлечения. Может, транс расслаблял, а может, вера в мастера заставляла сдаться ему на милость, — но Остромов знал цену спиритизму. Он волшебно преображал и не таких, как Юргевич.</p><p class="p1">В конце концов, ко всякой был свой ключ. Оккультное знание предлагало их целую связку, хоть один да подходил. Одну надо было объявить сильным медиумом и почти ровней себе, а после транса — истинного, или чаще фальшивого, — сопротивление заметно обмякает. Другой надо было рассказать о драме в предыдущем воплощении и посулить выправить карму — а выправляется она единственным способом, от которого, как знать, и впрямь ненадолго становится легче обоим. Третью стоило погнать в прошлое в поисках роковой ошибки — и как показывал опыт, в предыдущем воплощении всегда маячил Остромов, которого она тогда отвергла по слепоте душевной, а теперь каялась. Прошлое и транс — вот пароли, на которые отзовется всякая женщина, если она не законченная пролетарка с плаката «Свободная женщина, строй социализм», — да и ее можно разнежить, если объяснить ей, что в прошлой жизни она бедствовала больше нынешнего и мстит теперь полноправно, за это и за то, то, то.</p><p class="p1">Об антураже Остромов позаботился особо. Помимо круглого стола, покрытого на сей раз скатертью с пестеревской вышивкой (щит Давида в центре, пентакли по окружности), он взял ароматические свечи, шпаги, тещину шаль, занавеси Соболевой, четыре кубка, тарелку из левыкинского сервиза, но тарелку решил в ход не пускать, ибо тут велик был шанс срыва. Блюдце обычно писало всякую чушь, ибо трудно угадать истинное намерение медиума и совпасть с его мыслями; начинают в темноте крутить каждый в свою сторону, ну и выходит дурбулщыл. Иное дело непосредственный контакт. Десяти человек должно было хватить для создания атмосферы, в меру напряженной, в меру невинной. Сбор был назначен на восемь, с точным астрологическим основанием: Луна входит в Юпитер, совершается воля. Он знал, что слова «совершается воля» действуют на неокрепшие умы еще и посильней, чем «устанавливается защита».</p><p class="p1">Наибольшие сомнения внушала ему Жуковская. Он не терял надежды, и более того — знал, что рано или поздно, при давлении на жалость, при сопутствующих обстоятельствах вроде одиночества… но покамест все было тщетно, и к чисто оккультным вопросам она была непозволительно холодна, все больше напирая на солидарность и просвещение. Он не отказывал ей в этом праве, но сеанс мог сорваться от одной ее улыбки, чересчур ясной для дел, требующих напряжения сил и покрова тайны. Поколебавшись, он все же вызвал и ее — пока не начала разворачиваться схема «Жалость», была надежда на схему «Могущество».</p><p class="p1">Юргевич, веря в серьезность миссии, явилась расфранченной, надушенной и нервной, со следами слез на густо напудренном, пушистом лице. Нос у нее тоже был красен. С чего она так рыдала, в чем сомневалась и с чем боролась — Бог ведает, но, кажется, от сеанса ожидалось многое. Остромов усиленно внушал ей, что она сильный медиум и в момент высшего напряжения коллективной психической энергии непременно услышит голос, как бы диктующий ей слова. «И потом, — напоминал он, — не забудьте, будут произнесены особые сигналы и поставлены надлежащие условия — дух не сможет не явиться и непременно раскроет причины вашего разлада с собою. Доверьтесь, дитя».</p><p class="p1">Странно, но и Мосолова выглядела заплаканной; она с самого начала тайно ревновала к подруге, но кто ж тебе велел приводить ее к мужчине? На Мосоловой был потертый бархат. В таком бархате хорошо закатывать сцену, где-нибудь в антрепризе, на подмостках славного города Тамбова.</p><p class="p1">Сумерки сгустились к девяти. Перед сеансом Остромов избегал угощения и предпочитал пустой чай, изредка бокал вина. Он только начал вступительную речь, кратко доказующую обоснованность медиумических контактов, как раздался условный стук, и в комнату тихо, бочком вошла Ирина; ее он, разумеется, не звал и не ждал. Появление ее было всегда приятно, а все же несколько некстати. Остромов оправился от первого изумления, предостерег от повторения внезапных визитов («Вы могли войти во время наивысших энергийных напряжений всех присутствующих, и кто знает, что было бы с нами и с вами! Чутко натянутая струна лопается от нежнейшего касания!») и продолжил было, но не судьба была ему в тот день теоретически обосновать происходящее. Товарищ Варченко, без телохранителя и свиты, демонически влетел в квартиру.</p><p class="p1">— Я удивляюсь, — сказал Остромов. — Неужели вы все же нашли время?</p><p class="p1">— Простите за опоздание, дела, — скупо извинился Варченко.</p><p class="p1">— Ничего страшного, — улыбнулся Остромов, — что наши дела перед вашими! Итак, медиумические контакты известны человечеству с тех же первых его лет, в которые зародились культы; и способности к этим контактам искони ценились не менее, чем искусство завалить мамонта или запечатлеть этот процесс на стене пещеры. Попытки позитивной науки разоблачить великих магов направлены прежде всего против спиритизма как вроде простейшего, но вернейшего средства снестись с тонким миром. Трудность спиритизма еще и в том, что немногие готовы остаться, так сказать, в его рамках: большинство идет далее, полностью растворяясь в тонких мирах и не всегда даже возвращаясь из них. Но сегодня, друзья, перед нами медиум исключительной силы. Теперь, когда критика в адрес медиумизма раздается все реже, когда анализ слюнных телец медиума в Лондоне явственно показал присутствие чуждой силы, — возражения выглядят смешно, и опыты по контакту с духовными сущностями имеют наконец статус истинно научный. Прошу вас, в соответствии с этим, не допускать ничего, что было бы отклонением от поведения строгого и, если угодно, академического. Иногда во время опыта возможны припадки ужаса или, напротив, смеха, что есть, в сущности, выражение раздражения одной и той же чакры. Если с вами это случится — не стесняйтесь и не бойтесь, ничего тут страшного нет, всматривайтесь в пассы или выпейте воды из бокала, стоящего перед вами.</p><p class="p1">Он мельком глянул на Юргевич. Она густо покраснела и округлила влажные глаза. За окном было уже темно, как всегда в северном августе, в десятом часу. В это время, на исходе дня и лета, можно было еще почувствовать, что такое был Петербург накануне гибели, — во времена, когда Остромову не досталось собрать поздний, сладкий мед; он собирал теперь засахарившееся, подгнившее и перепревшее. В канун ночи и осени камни отдавали тепло. День был жаркий, и лето жаркое, и зима будет холодная; но сейчас все еще виснет на грани. Остромов ничего не любил, кроме промежутков — когда действительно что-то приоткрывается; нет, он не всем торговал, кое-что он видел, и если бы не верил в то, что видел, у него бы никто и не покупал… Изредка торопливые шаги доносились с улицы; мелкие, бледные звезды проступали в серо-лиловой глубине петербургских, александрийских, египетских небес. Остромов с некоторым сожалением опустил занавеси, но сеанс требовал темноты.</p><p class="p1">— Мы начнем с транса, — повелительно возгласил Остромов, — транса еще поверхностного, но позволяющего устранить важное препятствие. Елена! — Тут он повысил голос и обращался далее к одной Юргевич, трепетавшей в магистерском кресле. — В вашем прошлом есть как бы камень, лежащий на пути дальнейшей регрессии. Сегодня мы совместным напряжением психической энергии должны устранить его и спуститься в ту глубину, куда можете проникнуть только вы. Возьмемся за руки, друзья, и дружно воззовем к великим сущностям — мысленно, мысленно, вслух ни слова! Вы участвуете? — отнесся он к Варченке.</p><p class="p1">— Я понаблюдаю, — отозвался тот с дивана.</p><p class="p1">— Bene. Хотя ваша сила может оказаться нелишней.</p><p class="p1">— Я подключусь в случае надобности, — пообещал Варченко.</p><p class="p1">— Итак! — воззвал Остромов. — Мысленно, строго за мной, повторяем: Aster, oster, delet, melet!</p><p class="p1">При свечах он видел, как шевелятся губы у сидящих за столом. У всех были прикрыты глаза, один Альтергейм лукаво поглядывал на соседей, но белиберду добросовестно повторял.</p><p class="p1">— Caper, poper, asfer, belet!</p><p class="p1">Варченко кряхтел и ворочался на диване.</p><div class="poem">
<div class="stanza">
<p class="v">— Somnia, omnia, tertia, pertia!</p>
<p class="v">Clausqum, blauscam, estia, sulphur!</p>
</div>
</div><p class="p1">Юргевич тихо застонала. В стоне этом не было ничего эротического, а одна только мука. Остромов бегло пожалел о рискованном опыте — мало ли что могла выдумать эта юродивая, — но опасаться Варченки не было оснований, свой брат оккультист, а прочим он всегда смог бы объяснить неудачу сеанса посторонними влияниями вроде недоброжелателей из соседнего квартала.</p><p class="p1">— Зачем, о, зачем, — простонала Юргевич.</p><p class="p1">— Это так нужно, — властно произнес Остромов. — Если не преодолеть сейчас, то когда же?! Вы не можете больше жить с этим камнем на груди.</p><p class="p1">— Ах, какой камень, — болезненно поморщилась Юргевич и заговорила вдруг обычным голосом, чуть быстрей, чем в повседневности. — Я теперь ясно, так ясно вижу… Зачем, зачем вы вообще все это делаете? Вы не знаете, что будет, а я знаю. Вот я вас вижу в совершенной отчетливости: труп, труп ходит!</p><p class="p1">Остромова пробил холодный пот, но он справился с собой.</p><p class="p1">— Елена, — сказал он мягко, — не говорите глупостей. Говорите то, что видите.</p><p class="p1">— Я вижу… я вижу вас и ряды, ряды. Вы ходите вдоль рядов, и вам подают. Зачем вы все это сделали? Ведь у вас есть способности. А теперь, теперь… Из тех, кто здесь, ни один не может уцелеть. Это же так просто. А у некоторых дети. Зачем вы все это затеяли? Так бы могло еще обойтись…</p><p class="p1">С этим бредом пора было заканчивать, и Остромов жестом приказал расцепить руки. Он видел краем глаза, как тяжело дышала Жуковская, словно все силы отдала, чтобы ввести Юргевич в транс; видел, как водит остреньким носиком Мосолова, как теребит бородку Варченко, казавшийся в костюме особенно толстым.</p><p class="p1">— Елена! — крикнул Остромов. — Вернитесь! Сеанс окончен! Возвращайтесь, libertas conderitum est!</p><p class="p1">— Надя Жуковская песенку поет, — так же буднично сказала Юргевич. — Заря-заряница, красная девица. Одни подают, другие гонят.</p><p class="p1">Жуковская вся подалась вперед и в ужасе уставилась на Юргевич. Она никогда при ней не пела «Зарю-заряницу».</p><p class="p1">— Еще два раза потом будет, — сказала Юргевич. — Третий раз совсем плохо, никуда не спрячетесь, нет. Господи, Господи, за что все это? Ведь ничего не делали, никому не вредили. А я с вами не буду, нет, никогда. Я думала вроде сначала, что можно, но мне с вами нельзя. Я теперь все вижу, я не приду к вам больше.</p><p class="p1">— Елена! — переходя в свою очередь на будничный тон, заметил Остромов. — Хватит, сеанс закончился. Вы давно проснулись, не пугайте нас понапрасну.</p><p class="p1">Юргевич тяжело застонала, замотала головой, приподнялась в кресле, выгнулась, рухнула и забылась. Остромов подошел, похлопал ее по щекам — она вяло отмахнулась и продолжала спать.</p><p class="p1">— Слишком сильный медиум, — сказал Остромов и развел руками. — Вероятно, попала под влияние чуждой воли, или недоброжелатели…</p><p class="p1">— Отчего же, — с места сказал Варченко, — очень интересно.</p><p class="p1">В голосе его, однако, слышалось разочарование. Альтер и Мартынов бережно положили Юргевич на диван в соседней комнате и вернулись к спиритическому столу.</p><p class="p1">— Позвольте мне! — крикнула вдруг Мосолова. Она словно всю душу вложила в этот смешной порыв и по-гимназически протянула вверх руку. — Я сегодня чувствую в себе большую силу.</p><p class="p1">— Как угодно, — пожал плечами Остромов. — Если все уже собрались, почему не попробовать? У вас есть опыт месмеризации?</p><p class="p1">— Я не пробовала, но бывают видения очень яркие, — виновато призналась Мосолова. Остромов легко себе представил, какие это видения, и криво усмехнулся.</p><p class="p1">— Что же, aster, oster, delet, melet, — бегло пробормотал он, сделал несколько пассов, и головенка Мосоловой поникла.</p><p class="p1">— Господа, — воззвал Остромов, — не следует ли нам на сей раз поступить осторожней и вызвать конкретное лицо?</p><p class="p1">— Пушкина, Пушкина! — вскричал Альтергейм, подпрыгивая на стуле.</p><p class="p1">— Есть ли другие мнения? — поинтересовался Остромов.</p><p class="p1">— Пока нет, — ответил за всех уютный басок Варченки.</p><p class="p1">— Отлично, приступаем. Евгения, вы слышите меня?</p><p class="p1">— Слы… шу… — раздельно и глухо, словно из страшной трансфизической дали, отозвалась Мосолова.</p><p class="p1">— Позовите нам Пушкина, Александра Сергеевича, — приказал Остромов и сам еле сдержал пузырящийся на губах смех, ибо сильней всего это напоминало заказ телефонистке: девушка, Пушкина нам! А-99-37…</p><p class="p1">— Я здесь! — звонко и бодро воскликнула Мосолова.</p><p class="p1">Возникло некоторое замешательство. Оказалось, задать вопрос Пушкину не так-то просто.</p><p class="p1">— Великий дух, — начал Остромов, — благодарим тебя за то, что ты счел правильным откликнуться на наш призыв. Ответствуй, страдаешь ли ты.</p><p class="p1">— Я очень хорошо себя чувствую, — сказал Пушкин, — и рад вас приветствовать.</p><p class="p1">— Вы творите? — спросил Альтер.</p><p class="p1">— Я много творю, творю успешно! — признался поэт. — Хотите, я вам почитаю?</p><p class="p1">Альтергейм замер.</p><p class="p1">— Если это возможно… — сказал он.</p><p class="p1">Мосолова раскрыла невидящие глаза и напряглась в потоке вдохновения.</p><div class="poem">
<div class="stanza">
<p class="v">Пусть дождь и гром, пусть солнца луч —</p>
<p class="v">Я вспоминаю о тебе,</p>
<p class="v">Прозрачно небо, стаи туч —</p>
<p class="v">Но только взгляд твой на уме.</p>
<p class="v">Пусть пир, веселье, пусть тоска,</p>
<p class="v">Пусть смех и радость, боль и грусть —</p>
<p class="v">Моя мечта не далека,</p>
<p class="v">Вот только б руку дотянуть… —</p>
</div>
</div><p class="p1">продекламировала она с легким подвыванием, покачиваясь в кресле.</p><p class="p1">— Что-то с ним там сделали ужасное, — сказал Альтер. — Если он там наказан полным лишением дара, что сделают с нами, грешными?</p><p class="p1">— Я вам прочту еще, — не сдержался Пушкин. С уст Мосоловой срывались пылкие признания:</p><div class="poem">
<div class="stanza">
<p class="v">Ты можешь даже и не знать,</p>
<p class="v">Что я с тобой, что я везде,</p>
<p class="v">Что я могу к тебе летать,</p>
<p class="v">Где бы ты ни был на земле,</p>
<p class="v">Что воздух — я, свет — это я,</p>
<p class="v">Я — птичка, дерево, трава,</p>
<p class="v">Я — всё, что есть вокруг тебя,</p>
<p class="v">Все знаки — то мои слова.</p>
</div>
</div><p class="p1">— Его там хуже наказали, — выдохнул Мартынов. — Он стал там женщиной и испытал все муки, которым подвергал их здесь.</p><p class="p1">— Не шутите! — потребовал Остромов.</p><p class="p1">— В который раз беспомощно пьянею, — тараторила Мосолова, — в родные глядя серые глаза… Хотела бы любить тебя сильнее, да только жаль — сильней уже нельзя. Никак я не могу к тебе привыкнуть, значителен в тебе любой пустяк. «Не уходи!» — тебе хочу я крикнуть, когда ты отступаешь лишь на шаг… Пускай нас тешит и морочит случай, но волны — не помеха кораблю. Храни меня, люби, жалей и мучай, — я с каждым днем сильней тебя люблю! Все, я улетаю, меня ждут дела. У нас в пятом эоне собрание.</p><p class="p1">Эк ее растопырило, подумал Остромов. Неужели ей непременно надо было публично вякнуть все это?</p><p class="p1">— А теперь, — раздался с дивана иронический басок Барченки, — попросим Льва Толстого!</p><p class="p1">— Лев Толстой на собрании, — тонким голосом предостерег Альтергейм. — Неужели вы думаете, что если Пушкина позвали, Толстого не позовут?</p><p class="p1">— Пушкин умер христианином, а Толстой отлучен, — заметила Пестерева.</p><p class="p1">— Это не имеет значения в тонких мирах, — холодно заметил Остромов.</p><p class="p1">— Очень имеет, — настаивала Пестерева. — Ну, вызовите! Он точно стихи читать не будет.</p><p class="p1">— Господа, надо ли? — попытался отговорить их Остромов. Меньше всего ему хотелось новых признаний, а способа нейтрализовать сумасшедшую бабу, обрушившуюся на него со своей любовью, он не видел. Мосолова расслабленно откинулась на спинку кресла и, казалось, дремала. На острой, хорьковой ее морде читалось блаженство и торжество.</p><p class="p1">— Толстого, Толстого! — требовала Ирина и хлопала в ладоши. Господи, подумал Остромов, тебе-то что за радость? С кем ты думаешь конкурировать!</p><p class="p1">— Отлично, — сказал он и хлопнул в ладоши. — Ester, mester, abitus, legens! Явись, великий дух, и дай нам знать, что ты с нами!</p><p class="p1">— Я с вами, с вами! — радостно сообщил после небольшой паузы Лев Толстой.</p><p class="p1">— Отлучены ли вы от церкви? — влезла первой Пестерева.</p><p class="p1">— Для много возлюбившей души это не имеет значения, — с вызовом ответил отлученный.</p><p class="p1">— Что ждет Россию? — скрипнув диваном, спросил Варченко.</p><p class="p1">— Голгофа, — ответил Толстой после некоторого раздумья. — Но много возлюбившие спасутся.</p><p class="p1">— Конкретнее, — потребовал Варченко. — Скажите, пожалуйста, ожидает ли Европу новая война?</p><p class="p1">— И мир, — добавил Альтер чуть слышно.</p><p class="p1">— Война, — сказал Толстой после более долгого раздумья, — есть противное разуму дело.</p><p class="p1">— Это я понимаю, — досадливо повторил Варченко. — Так будет или нет?</p><p class="p1">Толстой думал еще дольше и наконец сказал:</p><p class="p1">— Весьма вероятно. Но вас это не коснется.</p><p class="p1">Почему? — обиделся Варченко.</p><p class="p1">— Нескоро, — пояснил Толстой.</p><p class="p1">— Скажите тогда, что ждет меня, — предложил Остромов. Ему любопытно было посмотреть, как она вывернется.</p><p class="p1">— Вас ждет… — смешался Толстой. Мосолова широко открыла глаза и уставилась на Остромова, словно впервые видела.</p><p class="p1">— Меня зовут Борис Васильевич, — напомнил он.</p><p class="p1">— Вас жду я, — сказал Толстой. — Вас ждет моя любовь, все счастье, которое может дать она, вся радость неземного слияния. Я люблю вас, о, как люблю. Вы истинный избранник моей души, вы тот, в ком сошлось все. И если вы не испугаетесь, вместе мы совершим то, что никому еще не удавалось…</p><p class="p1">— Ну, полно, — решительно сказал Остромов. — Евгения Николаевна, вы избрали не лучший момент.</p><p class="p1">Он резко дернул за шнурок и зажег свет. Мосолова зажмурилась, закрыла лицо руками, вскочила и выбежала.</p><p class="p1">— Что же, — сказал Остромов устало и утер лоб. — Иногда в состоянии транса медиум и в самом деле не владеет собою и начинает признаваться в том, что хотел бы скрыть… Вина моя: я не проверил совместимости членов кружка, не установил правильной цепочки, рассадил вас в произвольном порядке, и вот результат — один медиум сбился с дороги и угодил в темные пространства, где его преследовали бредовые видения, а другой утратил контроль над собою и излил на нас содержимое своей душевной жизни, прямо скажем, довольно бедной. Из этого вы видите, как важна в медиумизме каждая мелочь, а теперь, господа, давайте пить чай.</p><p class="p1">За чаем положение отчасти выправилось. Жуковская сидела около Юргевич, приводя ее в чувство. Пестерева рассказывала, как Штайнер однажды в Дорнахе месмеризировал Асю, и она точно так же признавалась ему в любви, хотя он намерен был расспросить Гете о тайне соотношения красок. Ася после этого надолго была отлучена от собраний и с досады бросила Бугаева, которому стало мерещиться, что его преследуют китайцы.</p><p class="p1">— Я никогда не считал Бориса Николаевича серьезным оккультистом, — сдержанно заметил Остромов.</p><p class="p1">— Он и писатель скучный, — заметил Альтер.</p><p class="p1">— Ну, не знаю, какой писатель, а человек он совершенно невыносимый, — сказала Пестерева и рассказала пару анекдотов о Бугаеве в Дорнахе.</p><p class="p1">Через час стали расходиться. Варченко, деловито попрощавшись с Остромовым, на лестнице нагнал Юргевич.</p><p class="p1">— У меня к вам разговор, — прошептал он.</p><p class="p1">— У меня очень голова болит, — жалобно сказала она, поднимая на него огромные растерянные глаза.</p><p class="p1">— Очень коротко. Взамен просите что угодно. Вы ведь видели, видели?</p><p class="p1">— Я не помню ничего, — сказала она, чуть не плача.</p><p class="p1">— Не надо ничего помнить, — тихо и настойчиво повторил он. — Скажите только: что вы видите обо мне?</p><p class="p1">Она вгляделась, потом отвела глаза.</p><p class="p1">— Кто вам сказал, что я умею…</p><p class="p1">— Мне не надо ничего говорить, — шептал он, — я вижу достаточно. Скажите, и я никогда больше не обеспокою вас. Я никогда ничего не потребую, не стану преследовать вас, не воспользуюсь вашими способностями. Но сегодня мне нужно знать, скажите: вы меня видите через десять лет?</p><p class="p1">Она потупилась:</p><p class="p1">— Вижу.</p><p class="p1">— Что видите? Говорите все, ничего не бойтесь.</p><p class="p1">— То же, что и у всех. Пустите! — крикнула она, поднырнула под его расставленные руки и сбежала по ступенькам.</p><p class="p1">Это худо, подумал Варченко. Это чрезвычайно худо. Впрочем, может быть, она ничего толком не видит… но этого самоутешения он не хотел. Собственных его способностей с лихвой хватало, чтобы отличить, кто видит, а кто нет.</p><p class="p1">На четвертом этаже в это самое время происходила сцена.</p><p class="p1">— Зачем вы устроили это отвратительное сборище? — говорила Ирина, усевшись в магистерское кресло и куря. — Какой вам еще власти над душами? Что вы хотели продемонстрировать мне?</p><p class="p1">— Я ничего не хотел вам демонстрировать, — нейтрально, удерживаясь в рамках, отвечал Остромов. — Я не ждал вас сегодня.</p><p class="p1">— Он не ждал! Tard piens!<a href="ch2.xhtml#id23" class="a">[24]</a> Чего же вы ждали? Вы задумывали свальную оргию тут устроить для вашего московского гостя?</p><p class="p1">— Наш московский гость не интересуется этими вещами.</p><p class="p1">— Вы откуда знаете? Мужчины интересуются этим всегда… О, теперь я знаю. И как тонко, как отвратительно все рассчитано! Именно сегодня, когда я больше, чем когда-либо, нуждаюсь в вас… когда я страдаю непереносимо, невыразимо… когда я окружена интригами, завистью, когда сеть вокруг меня уже сплетена… — Он не знал, из какой это было роли, но всегда чувствовал, когда она переходила на чужие слова. — Зачем, зачем вы все это устраиваете?! Весь этот цирк… Если вы действительно обучались, как говорите, если вы в самом деле умеете… зачем, какой смысл?! Я все могу понять и все вам прощаю, но этот порок, этот неудержимый разврат… две идиотки с манной кашей в голове… вы скоро начнете прельщаться вокзальными девками!</p><p class="p1">Остромов слушал этот монолог еще некоторое время и безошибочно уловил момент, когда надо было перейти к схеме «Р» — расстегивание. Она стремительно, с радостью, словно только этого и ждала, принялась сбрасывать одежду, повалилась на диван, увлекла Остромова с собой, обхватила руками и ногами, укусила за плечо. «Но ты по крайней мере скучал?!»</p><p class="p1">— Да, невыносимо, — проговорил он, из последних сил имитируя холодность. Досадно было, что теперь для полноценного возбуждения ей нужны были долгие попреки, а случалось, и слезы. Но досада его скоро прошла. Сегодня Ирина была, что называется, в духе. Остромов любовался ее резкими движениями, растрепанными волосами, болезненными гримасами. Обхватывала его голову, прижимала к груди, все это молча, без дешевого, ненавистного ему ора. Он любил ее такой — сильной, почти грубой.</p></span></span>
