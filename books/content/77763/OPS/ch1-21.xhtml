<p class="p">Глава седьмая</p>
</div><p class="subtitle">1</p><p class="p1">Семичасовым поездом, пасмурным утром пятнадцатого июня в город святого Ленина прибыл полный, но крепкий мужчина с короткой седеющей бородой, энергичной походкой и широкими полномочиями. На вид ему можно было дать и сорок, и пятьдесят. На нем был светло-серый тиковый костюм, на безымянном пальце левой руки тяжелый железный перстень. Ни проводник, ни попутчик не могли составить о солидном человеке сколько-нибудь ясного представления. Видно было, что пассажир непростой, — простые в купе и не ездили, — но без привычки к роскоши: ужинать не стал, свертков с закуской не имел, а в скромном потертом портфеле лежала у него газета «Известия», которую он и читал до самой Твери. На вопросы попутчика, командировочного инженера с завода «Красный треугольник», отвечал скупо: да, жарковато; нет, не расположен; теперь москвич, но так и не привык.</p><p class="p1">— Все-таки Питер, знаете, оставляет клеймо, — обрадовался инженер. — Нашенского сразу видать.</p><p class="p1">— Это да, — неопределенно заметил неопределенный мужчина, из чего нельзя было заключить, одобряет он или осуждает эту особенность клеймящего города.</p><p class="p1">Ровно в одиннадцать вечера, выпив стакан чаю, безымянный пассажир — он не поддерживал разговоров, не представился и не располагал к дорожным откровениям, — положил газету в портфель, словно она и после прочтения не утратила ценности, портфель положил под подушку и улегся на жесткое ложе. Инженер в поездах спал плохо, даром что командировок набегало до трех в месяц, — а потому недоброй завистью позавидовал спутнику: тот положил ладони себе на глаза, несколько раз глубоко вздохнул — по системе йогов, что ли? — потом повернулся носом к стене и через минуту уже похрапывал, не просыпаясь даже тогда, когда вагон основательно подбрасывало. Дорога требовала ремонта, да и состав был старый. Инженер вообразил, сколько еще предстоит научиться производить, и, сраженный гигантским размахом этой картины, наконец задремал.</p><p class="p1">По прибытии, небрежно простившись с попутчиком, гражданин в светло-сером костюме устремился на вокзальную площадь, где простоял с минуту в недоумении, приглядываясь к городу, видимо, давно оставленному и с тех пор переменившемуся. На Невском брякал трамвай, перекладывали мостовую, суетились прибывшие, покрикивали мальчишки с папиросными лотками, газетчики вякали о происках Рут Фишер. Собиралась гроза, но гражданин с бородкой знал, что климат города обманчив: накопится в воздухе электричество да и разойдется. А что парит и дышать тяжело, так дышать здесь тяжело всегда, для того и построился город, чтобы все в империи делалось медленно и вязко, и оттого история ее как бы зависла. Потому, может, то, что должно было случиться уже давно, случилось только недавно. Однако строитель чудотворный не учел другого — что в этом климате все будет гнить, плесневеть, зацветать, — а потому здоровые дела будут тормозиться, но больные и дурные, навеянные болезненным воображением, пойдут в рост бурно, неостановимо; созидание замедлится, а безумие расплодится.</p><p class="p1">Устроившись в гостинице, где ему был забронировал номер и где приезжий принял ледяной душ среди помутневших зеркал и облупившихся стен, он поспешил по хорошо известному еще из прошлой жизни адресу, к человеку, которого не любил, но чтил. Его, автора трехтомных «Лекций по основам герметизма», частью изданным, а частью списывавшимся от руки, знала вся оккультная Россия; с четырнадцати лет уникально одаренный подросток состоял в переписке с лучшими умами Европы, имел благословение от Папюса, в настоящее время обдумывал совместную книгу с Геноном и в случавшихся изредка спорах между оккультистами выступал третейским судьей. Говорили, что он давно отошел от всякой практики; говорили также, что сошел с ума, — но о ком не распускали подобной чуши? С ним можно было соглашаться или спорить, нельзя было лишь отрицать, что если Григорий Ахиллович чего-либо не знает, этого не существует.</p><p class="p1">Человек в тиковом костюме почти без одышки поднялся на четвертый этаж старого дома на Конюшенной и повернул ручку неизменного звонка.</p><p class="p1">С той стороны зашаркали, и дверь приотворилась.</p><p class="p1">— Проведите, — послышался старческий, но сильный еще голос. Григорий Ахиллович всегда был на вы с прислугой, равно и с супругой. Супруга скончалась в восемнадцатом. Прислуга, вероятно, теперь жила у него бескорыстно — откуда у старика средства? — на правах родственницы. Странно было, что его не уплотнили. Неужели и на этих действовала его тайная власть?</p><p class="p1">Морбус изменился сильно, но неуловимо. По отдельности все было то же — огромный покатый лоб, длинные волосы, все еще не сплошь выбеленные, и мясистые губы, нижняя особенно крупна и оттопырена почти уродливо. Он таял, терялся в темном кресле, казался карликом, но когда вставал — оказывался крупен, костист и сутул. Как всегда, шторы были задернуты; несмотря на влажную жару этого лета, он умудрялся вокруг себя поддерживать иллюзию прохлады. Если же рассматривать черты его в целом, становилось видно, что он утратил главное, а именно силу неотразимого влияния, ту ауру власти, которая чувствовалась даже в жилистой его руке, даже в посадке головы. Что тут было — посетитель не мог сформулировать сразу, но формулировать и не его дело — он должен чувствовать. Морбус утратил волю — сила была при нем, а желание пропало; ему и тут достался благородный вариант старости, потому что обычно случается обратный, унизительный.</p><p class="p1">Что это было когда-то! Никогда не разделяя его взглядов, имея смутное представление о целях, нынешний посетитель не мог не подпасть под обаяние главного русского мартиниста. Как все вокруг него кипело, какой наплыв был на лекциях, как он стремительно устраивал все, за что брался, не шевельнув для этого и пальцем! Все осуществлялось само, стоило кивком указать направление. Разумеется, все это были вещи прикладные: с постановкой масштабных целей всегда было туго. Морбус, напротив, не принимал всерьез геополитику и не желал тратить сил на нейтрализацию исторических врагов Отечества, вяло отбояриваясь соображениями о высших совершенствах, на которые он якобы нацелен. Вся ошибка была в ориентации на лживую, вырождающуюся Францию, которая по крайней развращенности не могла быть для небесной России ни полновесным врагом, ни серьезным союзником. Все, кто поставил на Францию, проиграли. Тот же Генон уже проклял ее. В жизни нужно избрать либо надежного друга, либо, что даже важней, серьезного врага — и враг вытянет, дотащит тебя до собственного масштаба; у Морбуса было все — талант, сила, дар привлекать сердца, — но не было цели, и оттого они никогда не могли толком понять друг друга. Теперь было самое время — теперь или никогда.</p><p class="p1">— Прошу, — сказал Морбус, указывая на резной стул. Может, на этом самом посетитель сидел в тринадцатом, будучи, в сущности, совершенным еще неофитом, недавно из провинции, неловко излагая уже великие, но толком тогда не оформленные идеи.</p><p class="p1">— Я позволю себе без предисловий, Григорий Ахиллович, — сказал посетитель. — Не время сейчас вспоминать, кто прав и что там было. Сейчас, мне кажется, все уцелевшие силы нужно объединить для решающего рывка.</p><p class="p1">Морбус молчал — не поощряюще, не заинтересованно, почти равнодушно, как если бы слушал птичек. Приятно, но сообщить дельного не могут.</p><p class="p1">— В силу разных обстоятельств, — баском продолжал посетитель, — произошло то, чего все мы чаяли. Случилось полное уничтожение прежнего порядка, и возможно построение нового. Вы прекрасно знаете, что всех их сил хватило исключительно на разрушение. На большее они не способны, да для большего и не нужны. Теперь от нас зависит — либо бросить все силы на решающий рывок, либо ждать, пока из получившейся бифуркации само собой отстроится дурное подобие прежнего. История нам не простит. Хотя, собственно, что история? Нам могут не простить другие инстанции, куда более значительные, и о них вы опять-таки осведомлены лучше меня…</p><p class="p1">Ни слова.</p><p class="p1">— О том, какая могла бы быть эта новая небесная империя, мы, думаю, можем договориться, собравшись. Если бы для начала вы привлекли наиболее влиятельные силы, которыми располагаете… Ваше слово, вы знаете, для них приказ. Я со своей стороны обязуюсь привлечь Рурига. Руриг многое постиг на Востоке. В частности, по окрестностям Тибета и даже, смею сказать, глубже. Он умеет теперь очень, очень многое, весьма серьезное… Когда-то, вы помните, он постигал славянство через варяжество, но это была как бы одна половина. Теперь он открыл другую, парадоксально сохранившуюся в Индии. Единение северного мужества с индийской мудростью поможет наконец опрокинуть женственную иудейскую религию в самом опасном ее изводе.</p><p class="p1">Про женственную религию был пассаж из самого Морбуса, посвятившего христианскому искусу отдельную лекцию. Дамы покидали ее в крайнем негодовании.</p><p class="p1">Морбус отвернулся и посмотрел в занавешенное окно, как бы прозревая Индию.</p><p class="p1">— Со своей стороны я также мог бы… есть люди в Америке, есть в Германии, — заторопился гость. — Я полагаю, что сегодня стратегический союз с Германией на американские деньги есть первостепенная, дежурная необходимость. Там поднимается исключительно плодотворная волна. Вспомните, именно Германия есть тот исторический союзник, который… о котором… Вы лучше меня знаете, — это был спасительный прием, все время позволяющий видеть в Морбусе как бы союзника, — всегда, когда у России намечалось сближение с Германией, тут влезала Англия. Она и сейчас влезет, я уверен. А между тем совместно с тевтонцами мы могли бы сейчас… то новое человечество, в котором осуществится титаническая эра… Вспомните, ведь, собственно, и Папюс… Именно сейчас… то абсолютное единение оккультных сил, о котором мечтали, начиная с Новикова, с Тутолмина, три века… Позорно будет, если именно сейчас, когда главная работа сделана за нас и, так сказать, ходом вещей… когда уже заложены основы… — Он сбивался: какие еще нужны аргументы?! — И, разумеется, Германия: сейчас — для ограниченного, конечно, круга, — возможно пробить выезды, под гарантии возвращения, возможны поездки и вообще, так сказать, полномочия. Я располагаю… вы понимаете, конечно, что только вам… но вообще я заручился поддержкой на уровнях довольно высоких. Там есть люди, понимающие, что они уперлись в предел, что им элементарно нечего делать, что никаким марксизмом это болото не высушишь и работать никого не заставишь. Нужны стимулы. И потому вполне естественно обращение к нам, в частности, покорный ваш слуга… я не могу вам назвать конкретные имена, но поверьте, что достаточно серьезно…</p><p class="p1">— С этим приезжали уже, — сказал Морбус тускло. — Мне сообщили, прибыл человек из Москвы, тоже с полномочиями.</p><p class="p1">— То все было не то, — быстро заговорил гость, — тот человек представляет совершенно не те силы, и это, словом, неважно. Я не знаю, что он такое, но знаю, что за ним никого нет, а те, кто есть, сугубо временные люди…</p><p class="p1">— А я знаю, что он такое, — тем же слегка надтреснутым голосом сказал Морбус. — Он был бы мелким бесом, будь в нем хоть что-то бесовское, но он банальный шулер, которого я выкинул, как щенка, в шестнадцатом году. И если там, в Москве, поставили на такого, — что же я могу думать про их намерения?</p><p class="p1">Он посмотрел на посетителя в упор огромными и как бы все увеличивающимися глазами. Глаза заполнили комнату. Посетитель вспомнил некоторые свои ощущения тринадцатилетней давности и поперхнулся.</p><p class="p1">— Я еще раз вам повторяю, — сказал он, смешавшись.</p><p class="p1">— Да и не в том дело, — сказал старик, отворачиваясь. Гость прокашлялся. Сразу стало легче дышать. — Не в том дело, не в том… Не в том дело.</p><p class="p1">И то, как он это повторял, показывало, как он стар. Ему было триста, пятьсот лет, может быть, и больше. Сколько бы ему ни было, он умирал.</p><p class="p1">— Случилась вещь, одна такая вещь, — проговорил он, вцепляясь в подлокотники. Пальцы его, кажется, еще удлинились за эти годы. — Как бы сделана дырка, и в нее как бы улетел воздух. Или ушла вода, в которой лежали камушки, и стало видно, что это просто камни. Какой же теперь оккультизм, помилуйте. Ведь сказано: герметизм. Отсюда, собственно, и Гермес. Гермес герметический. Разрушено, да, и очень хорошо, но тут вдруг оказалось, что только в этом разрушенном что-то и могло существовать. Теперь же, как хотите, ничего не получится. Тогда была луна — и это была Луна, а сегодня я смотрю на луну и вижу небесное тело. Этому всему можно бы обоснование, и я когда-то займусь, возможно, но сейчас трудно заставить себя написать хоть слово… Ведь мы не знаем, что такое эфир. Эфир есть безусловно материя, посредством которой осуществляется связь. Все, что я мог, а вы знаете, я мог, — все это благодаря только тому, что эту связь, этот эфир, я ощущал физически. Теперь же я ощущаю дыру, а эфир улетел. И потому никакого герметизма быть сейчас не может, а ваш план, извините, я не улавливаю, ибо все это вне сферы моих интересов… совершенно вне сферы…</p><p class="p1">— Григорий Ахиллович, — с почти нежной, искусственной укоризной проговорил человек в тиковом костюме. — Время ли сейчас разбираться, куда улетел эфир? Сейчас время величайшего тектонического сдвига. Прежний порядок рухнул, а новый только и можно выстроить на мистических основаниях. Ведь это наш единственный шанс низринуть… вы сами знаете, <em>что</em> низринуть. Иудейская религия и так отсекла человечество от хтонического знания, великие маги две тысячи лет провели в подполье, тайны запечатаны — и вот наконец, кто бы подумал, они сами ЕГО опрокинули! Неужели нам не воспользоваться, не заложить фундамент нового Египта?</p><p class="p1">Морбус молчал, но, слава Богу, и не глядел больше в упор.</p><p class="p1">— У меня ученица сплыла, — сказал он после паузы. — Сейчас многие из молодых — знаете, странно… Я все думал: что они будут делать? Но оказалось, что есть вот такой выход, и я сам бы сделал это теперь при первой возможности. Однако прав оказался Эпиктет — тут нужна девственность.</p><p class="p1">— Не понял? — не понял гость.</p><p class="p1">— Девственность, — повторил Морбус, не поворачивая головы. — Я не послушался в свое время, да и странно было жить монахом… Теперь для меня этот выход закрыт, а как бы хорошо.</p><p class="p1">— Но как то есть сплыла? — переспросил посетитель.</p><p class="p1">— При известных обстоятельствах, я говорил вам, — с легкой скукой, точно ребенку, пояснил Морбус, — возможен такой выход — разумеется, для способных… Такой выход на тонкий план, когда вы делаетесь частью избранной вами стихии. У нее, собственно, и выбора не было — она оказалась в воде. Это может быть земля, воздух, может быть, при особой удаче, эфир… Это не так трудно делается, нужно только врага убить. Причем не просто убить! — Тут в его голосе появился проблеск интереса, и ожило лицо, задвигались морщины. — Не просто убить, но как бы раскатать, размыть до уровня частиц, чтобы на внешнем плане это выглядело — ну, просто уже как месиво… Я всегда говорил ей: оставьте это до крайнего случая. Но тут, видно, припала последняя крайность. Она просто размазала его. Ну, а уж после этого — хочешь или не хочешь, но тебя втягивает стихия. Потому что это не тот уже уровень, чтобы оставаться здесь.</p><p class="p1">Он с ума сошел, понял посетитель. Совершенно и безнадежно сошел с ума. Впрочем, мало ли таких в нынешнее-то время?</p><p class="p1">— Нет, нет, — сказал Морбус. — Все не то. Но вам это, знаете, безнадежно… Вам это пересказывать — все равно что мне про козни Англии.</p><p class="p1">Посетитель опять закашлялся.</p><p class="p1">— Я теперь совсем не знаю, что делать, — беспомощно проговорил Морбус. — Вот бегает этот… соблазняет простые души, сшибает денежку по мелочи… Что же? Разве я буду останавливать его? Нет, пускай. Сейчас-то он, может быть, такой и нужен. Беда в том, что я совсем не вижу будущего. Я не понимаю уже теперь, от кого добро, от кого зло и что будет в дальнейшем. Просто серая завеса, сквозь которую можно плыть бесконечно, и никакого нет обещания, что в дальнейшем будет иное. А если кто-то примет знание через него, то и в этом нет худого. Не все ли равно, от кого принимать знание? Если за ним кто-то есть, то и пусть. За мной никого не было, а чем я лучше?</p><p class="p1">Посетитель что-то еще бормотал про исключительные способности и великий шанс, но слова проходили мимо Морбуса, не задевая. Казалось, что в дальнем углу повисла разноцветная стайка этих слов и клубится в воздухе вроде мошкары. Можно было не продолжать.</p><p class="p1">— Что ж, Григорий Ахиллович, — сказал посетитель. — Если надумаете, всегда можете со мной связаться.</p><p class="p1">Он положил на круглый стол, рядом с бронзовым семисвечником, аккуратный листок — фамилия и несколько цифр твердым почерком.</p><p class="p1">Морбус не шелохнулся. Просто встать и выйти было неловко.</p><p class="p1">— Знаете, что теперь будет? — вдруг сказал Морбус тише и печальней прежнего. — Теперь просто: каждый будет все глубже проваливаться в себя. Из тех, конечно, в ком вообще что-то есть, тех, кому есть что делать. Общения нет, и при встречах я все чаще замечаю отсутствие того же эфира: слова говорятся, но до разума не доносятся. И так — каждый: все глубже, глубже в себя, пока понимание между нами не станет невозможно вообще. Мы тогда уже не будем друг другу нужны, как рыбы, научившиеся жить без воды. Связующая нас среда уйдет, уже ушла, — и кем мы будем друг для друга? Нежелательными напоминаниями. Нет, эти новые существа не будут уже нуждаться в стае. Пришел век одиночек, еще десять лет — и мы при встречах друг друга на улице не узнаем. Вот так-то.</p><p class="p1">Он помолчал.</p><p class="p1">— А у вас ничего не выйдет, — сказал он буднично.</p><p class="p1">— Вы не верите в серьезность их намерений? — сказал посетитель, тщетно пряча волнение.</p><p class="p1">— Ну, при чем же тут серьезность намерений, — пробормотал Морбус. — Это просто зигзаг, забег назад… нет, тут надо что-то другое. Надо что-то лучше, чем ОН, если только это возможно. Я не знаю, в силах ли это человеческих и где взять другие силы. А у вас хуже, и это, конечно, не Египет. Это получится какой-нибудь Вавилон, и ненадолго.</p><p class="p1">Этого бреда посетитель дослушивать не стал.</p><p class="p1">— Все-таки, если передумаете… — начал он и осекся.</p><p class="p1">Морбус повернул тяжелую голову.</p><p class="p1">— Полярный исследователь, полярный исследователь, — сказал он. — Вот это я бы советовал, Александр Валерьевич. Они непременно будут исследовать полюс и вообще всякие крайности. Вот тут вы нашли бы себя, если, конечно, не хотите уничтожиться. Мне кажется, что иные ваши черты… Впрочем, желаю здравствовать.</p><p class="p1">На секунду гостя обдало холодом завьюженных пространств, он увидел бесконечную равнину и черные остатки палатки на ней, — в этом что-то было, идея не хуже руриговской экспедиции в Тибет… но видение тут же пропало, и в полумраке он увидел старика в кресле, всего только старика, чье время давно закончилось.</p><p class="p1">— Bonum et longaevitas<a href="ch2.xhtml#id12" class="a">[15]</a>, — сказал он, желая напомнить добрые старые времена. Морбус, не шевелясь, смотрел в занавешенное окно.</p><p class="p1">— Что же, — задумчиво сказал гость, выйдя на Конюшенную, ныне Желябова. — Теперь посмотрим, что такое этот ваш мелкий бес.</p><p class="subtitle">2</p><p class="p1">Александр Валерьевич Варченко был человек серьезный. Если бы Александр Валерьевич носил воду решетом, — а ничем другим он, в сущности, не занимался, — все вокруг думали бы, что так и надо. Особенно Александра Валерьевича любили большевики, которые и вовсе ничего не умели, но делали вид, что превзошли все и вся. Александр Валерьевич был огромен и грозен, и большевики верили, что это от ума.</p><p class="p1">Александр Валерьевич был таким не всегда. Он был сначала вятским мальчиком, сыном лавочника, но уже и тогда хмурился и супился, а на материнскую грудь смотрел так, словно настоящее дело делал тут он, который сосал, а грудь была так себе, сбоку припека. Так же смотрел он на товарищей по играм, которыми командовал, и на гимназических учителей, которым дерзил. Он много читал тогда Густава Эмара и Буссенара и видел себя вожаком, мечтал странствовать, влекла его пустыня, но перевернулась его жизнь, когда он в четвертом классе прочел Сент-Анри.</p><p class="p1">Сент-Анри, впоследствии более известный как маркиз д’Альдейбра, хотя никаким маркизом не был отроду, прославился томами о древней мудрости. Теперь уж мудрости никакой не осталось, а чем глубже в древность, тем мудрей. Додумался он даже до того, что истинные люди существовали до Адама, и память о них сохранена нам в образе Лилит; Адам был человек послушный, специально созданный, как выводят домашнюю собачку, — прежние же были перед ним волки, и сам Бог трепетал их, ибо создал слишком мудрыми, невозбранно свободными; Сент-Анри темно намекал, что, может, вовсе и не Бог лепил ту первую глину, а сам Бог наш был создан для роли служебной, вроде смотрителя райского сада, — но восстал против истинного демиурга и оттеснил великого древнего мудреца на вторые роли, а сам насадил садик и в нем какую-то мораль. Никакой нет морали, кричал маркиз несуществующего Альдейбра. Мораль выдумали евреи — истинные дети нашего нынешнего Бога; их-то он поощряет за слабость и хитрость, они его подлинные любимцы, тогда как настоящее, низринутое, томящееся в каменном заточении божество любит ариев, уцелевших первожителей мира, и если арии его освободят, настанет их истинное царство.</p><p class="p1">У Сент-Анри выходило, что бунт против демиурга совпадал с погружением Атлантиды, которая и была его резиденцией; вместе с нею затонули все тайнознания, которые нынешний бог посчитал правильным скрыть от людей, дабы не слишком его беспокоили. По сравнению с плодами, росшими там, яблоко познания было так себе финик. Немногие арии спаслись по окраинам ойкумены, Демиурга же нашего, создавшего весь этот аморальный и величественный мир в многообразии гор, водопадов, полярных льдов и прочих декораций своего величия, предатель-садовник заточил в неприступнейших скалах Тибета, откуда извлекут его тринадцать сильнейших. Тринадцать было заветным числом прежнего мира — тринадцать членов Мирового совета, тринадцать зубов, тринадцать пальцев, — и потому садовник проклял его. Время, однако, близко: на солнечных часах садовника уже лежит тень, протянувшаяся из будущего. Садовник наврал, что придет антихрист, ибо предчувствовал возвращение истинного демиурга; он-то и освободит людей, вручив им ключи от тайн, положенных им от рождения. Тогда рухнет еврейская вера с ее бледным идолом, проповедующим аскезу, а сильные, загнанные ныне в положение еврейских прислужников, получат свои права. Свет явится с буддийского Востока, но особая роль уготована будет черной Африке. Черная Африка станет исторической тюрьмой христианства, где оно и будет заперто на веки вечные вместе со всеми, кто не захочет отречься от него.</p><p class="p1">Разумеется, белое божество, запертое в Тибете, подавало оттуда сигналы — связывалось с вернейшими и открывало тайны по частям, телепатическим путем. Каждый, кто желал освободить демиурга, должен был развивать в себе искусство чтения мыслей на расстоянии — и тогда в один прекрасный миг, как радио вдруг начинает передавать слова, достаточно настроившись, он должен будет услышать в себе внятный сигнал истинного творца, радируемый из тибетских гор: на Восток, на Восток! Там истинная Родина духа; там великие учителя. Там слышнее голос Неведомого, запертого в высокой Шамбале. Тринадцать чистых откроют врата. С тринадцати лет Алексей Валерьевич настраивался на чтение мыслей и теперь, в четырежды тринадцать, читал их свободно, как бы по книге.</p><p class="p1">Сложно было ответить — пожалуй, что и ему самому, — во что серьезный человек верил в действительности: каждый из нас подгоняет картину мира под личные свойства, но мораль он да, ненавидел. Он презирал слабость во всех ее проявлениях и еврейство как стража этой слабости, устроителя той веры, что порицает всю чужую силу и тайно пестует только свою, хитрую. Он видел в себе существо без предрассудков. Его не останавливал даже тот факт, что Сент-Анри умер в больнице для умалишенных, поедая свой кал, поскольку именно садовник устроил так, чтобы самое ценное из нас извергалось безвозвратно; калоедение дало ему наконец услышать наиглавнейшую, вечно сокрытую истину, выраженную в его предсмертных словах, священных для всякого истинного искателя Шамбалы: «Аденуа, аденуа! Эскити туртс бадартс Жан Клод старая шлюха». Эти слова древнего языка, непереводимые ни на один из нынешних, содержали приветствие новым людям и ключ к истинному знанию, состоявшему также и в том, что главный врач лечебницы в Руане казался маркизу мерзостным демоном. Маркевич одно время даже полагал, что тут шифр, и пытался переставлять буквы во всех девяти последних словах посвященного, включая Jean-Claude est une vieux grue, — но за такое дело, видно, нельзя было браться, не поевши кала, а для этого серьезный человек еще не созрел.</p><p class="p1">Он верил, что рожден для великого, что свет придет с Востока, что варвары знали больше римлян, что чем дальше от человека — тем ближе к Богу; что свежая кровь — напиток титанов, а мировые льды таят истину; что разум вреден, а инстинкт велик, что жалость презренна, а ярость почетна; что душа музыки — не мелодия, а ритм, и ритмом можно ввести себя в состояние, приближенное к утраченным древним экстазам. Он презирал разум. Он верил в озарения, которые получал, как ему казалось, непосредственно, в форме дословесной: хотел взять — брал, ударить — бил. Он ненавидел животных, хотя казалось бы. Дикий человек был его идеалом, но зверя он презирал и при возможности охотился. Ему чужды были привязанности. Он поступил на медицинский факультет Казанского университета, но не окончил его. В Петербурге он был журналистом, издал два романа из жизни оккультиста, покорявшего женщин одною силой внушения, и даже имел бы успех, не будь они написаны слогом столь энергическим. Был даже процесс по обвинению в порнографии, но счастливо подоспела недолгая свобода пятого года, и на Варченко махнули рукой. Разумеется, он читал и лекции, и гадал в бархатных, всегда затемненных салонах, подробно рассказывая, что есть таро; с курсом лекций и демонстрацией чтения мысли на расстоянии объехал в тринадцатом году все Поволжье, — но это все, разумеется, был разбег. Предполагалась экспедиция из вернейших, ровно тринадцать истинных освободителей демиурга — тот, почуяв приближение героев, начал уже транслировать ритуал, который предстояло Варченке проделать в Тибете, — но случилась война, и все отложилось на неопределенное время. Варченко ездил на войну корреспондентом, самой же службы избежал, ибо негоже гибнуть тайнознатцу, да еще так близко от цели; когда грянула революция, он почувствовал, что это — то.</p><p class="p1">Это было приблизившееся царство демиурга, крах морали, которую Александр Валерьевич и так уж ниспроверг, заведя в Москве коммуну из трех жен и пяти учеников, верно ему служивших и, по сути, его содержавших. Он в этом греха не видел. Он вообще не видел греха. Москву он выбрал на жительство еще в десятом году, почувствовав, что в Петербурге слишком много оккультистов, и все они смотрят не в ту сторону. Москва с ее азиатчиной внимательней и благодарней прислушивалась к восточным его призывам. Здесь было сухо, континентально, несентиментально, азиатски-пестро. Ему нравилось. Он жил на Варварке, самое имя которой ласкало слух. Переезд правительства сказал ему, что надо действовать. Он пошел к тем из них, на кого был смысл равняться: все решали дзержинцы, тайная сеть несомненно оккультной природы. И он не ошибся — в нем с порога признали своего.</p><p class="p1">Сагитировать их за дело чтения мыслей было плевой задачей — всякий следователь чеки мечтал обладать подобными навыками; Варченко вполне овладел методикой, вычитанной у Папюса и сводившейся к тому, чтобы уметь собственную тайную мысль услышать как чужую. Для тренировок выделили ему подвал напротив Лубянки, он вычистил его, выбелил, повесил портреты вождей и маркиза. На сеансы захаживал Двубокий. Двубокому-то и принадлежала светлая мысль отправить Варченку с инспекцией по русским эзотерикам, дабы выделить тех из них, с кем стоило иметь дело.</p><p class="p1">Двубокий был восходящая звезда, вполне соответствующая фамилии: он дружил покамест с обоими кланами, яро сцепившимися в верхах. Кланы эти были, условно говоря, Троцкий и новые, которые покамест не определились, но в этих новых Варченко звериным нюхом чувствовал своих. Тип, воплощавшийся в Троцком, он ненавидел до судорог: поверхностно даровитый, хлесткий еврейский журналист, ненавистник великого и основательного. Он умел лить кровь, и это расслабило бы доверчивого наблюдателя, но лил ее без толку, ради процесса, как онанист льет семя. Он и собирал вокруг себя таких же хлестко-талантливых, бойких, поверхностных, ни на чем не способных задержаться, любующихся собой и ничего вокруг не видящих, — вечное бесплодное кипение и ненависть к традиции, во что бы она ни рядилась. Их человеком на Лубянке был Огранов — и ведь за вечным их разрушительством стояло нечто свое, что они хотели утвердить и что вызывало в Варченке ужас, смешанный с благоговением.</p><p class="p1">Он готовил уже экспедицию на Тибет, списывался с давним другом Рурегом, рисовальщиком детских картинок на славянские темы, живущим ныне у подножья Гималаев, где чтили его выше, чем в «Мире искусства». Экспедиция, однако, откладывалась, ибо Двубокий не располагал достаточными средствами. Авторитет Варченки был уже непререкаем, он пописывал даже в «Известия», подводя научный базис под свое мыслечтение и от души пиная церковь, на что был теперь неизменный спрос. Освобождение демиурга он маскировал теперь под воскрешение порабощенных народов Востока. Англия была наш главный враг. Она затем и порабощала Восток, чтоб удержать тайны запертыми в Гималаях, но русское внезапное освобождение означало начало; Варченко любил рифмы и созвучия, видел в них доказательство истины, мечтал о новом языке. В чеке им гордились. Он был последним, кто в Москве видел Мельникова перед отъездом его в Санталово, звал с собой в Тибет, но тот не захотел. «Лучше бы тебе со мной, — сказал он, — молоко сейчас первая вещь».</p><p class="p1">У Варченки было теперь много молока, хлеба с маслом, меда, яиц и денег. Он проходил в списках сотрудников как начальник психологической лаборатории. Мысли, прочитанные им, неизменно позволяли закатать подозреваемых по максимуму. Перспектива присоединения Тибета, а с ним и Китая, ласкала сердца. В ожидании отъезда он выполнял предписание Двубокия, объезжая Россию и отыскивая годных оккультистов, а на деле отбирая тринадцать верных. Пятеро у него уже было, наглых, грозных, ни перед чем не останавливающихся; теперь предстоял ему Ленинград.</p><p class="p1">В Ленинграде он не был давно, года четыре, и никогда не любил его. Здесь все было отравлено гнилым атлантическим дыханием. Революция зародилась, конечно, не здесь — здесь было слабое звено, лопнувшее, едва дернули за цепь. Варченко ехал с командировкой от Совнаркома. Осипов и Райский были предупреждены. Поселили его по-царски, в «Англетере», напротив которого — круги, круги, неслучайные лейтмотивы в жизни великого! — читал он когда-то первую в Петербурге лекцию о тайнах Шамбалы.</p></span></span>
