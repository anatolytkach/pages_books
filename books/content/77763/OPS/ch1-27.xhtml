<span><span><p class="p1">Всего гостей набралось до полутора десятков, комнату вмиг продымили, хозяин не выносил дыма, но стеснялся гнать курильщиков на лестницу. Расселись частью на диване, оставшемся от Белашевых, частью на табуретках и принесенных со двора занозистых ящиках, которые притащили репортеры под командой Сюйкина. Сам пролетарий ящиков не таскал, руководил — чай, не прежние времена. Кугельский метался, изображая хлебосольство. Стол, однако, кричал об отсутствии женской руки. Хлеб был нарезан криво, квашеная капуста ничем не заправлена, отчего отдавала тряпкой, а ливерная колбаса — особенная, яичная, комбината имени 1905 года, как бодро пояснял Кугельский, призывая угощаться, — была так похожа на свежевынутые кишки, что Даня даже с голоду ею не прельстился. Картошка была сварена в мундире, солонкой Кугельский не обзавелся и высыпал серую соль прямо на тарелку, селедка оказалась не выпотрошена, и Ларе пришлось с гримасой отвращения достать из нее внутренности, причем пролетарий Сюйкин попросил отложить ему молоку. Он полагал, что молока, помимо вкуса, имеет значение для мужских желез. Водки хватало, да еще репортеры добыли самогону — они на прошлой неделе ездили под Волхов писать о строительстве гидростанции, прихватили туда штуку кумача и выменяли в деревне на трехлитровый бидон свекловицы. Полбидона было уже оприходовано, а оставшуюся половину принесли на новоселье. Кугельского они не любили, но чувствовали, что он пойдет далеко.</p><p class="p1">— А это кто? — спросил Даня, не узнавший Перуца.</p><p class="p1">— Ну как же вы, товарищ Даня! — укоризненно воскликнул Кугельский. — Надо же осваивать передовой опыт! Это писатель, товарищ Перуц, австрийский мастер авантюрного чтения. Если кто сегодня учит дать сюжет, то именно Перуц, рекомендую.</p><p class="p1">— Пьесу-то будете читать?</p><p class="p1">Пьесы не было и близко, так, наброски, и не при коллегах же… Черт бы его, с этим интересом к словесности. Одет черт-те как, пришел с чучелом, пьесу ему…</p><p class="p1">— Очень даже, очень даже. Но соловья баснями не кормят. Вы налегайте пока, а то наши звери все схарчат, вас не спросят.</p><p class="p1">Он озорно — так подумал о себе со стороны — подмигнул Плахову и Мелентьеву, задорно махнул головенкой, и Плахов с Мелентьевым перемигнулись, и улыбочки их не укрылись от Дани: он понял, как эта репортерская зелень презирает Кугельского, и пожалел его классовой жалостью. Вот, старался человек, накупал, созывал, — так себе, конечно, экземпляр, самовлюбленный, неумный, обожающий покровительствовать, но эти-то чем лучше? Только тем, что еще глупей, что не читали и авантюрного мастера товарища Перуца, что не учились в гимназии? Все, все ухудшалось с опережением, неровен час — и Кугельского вспомнишь с ностальгической нежностью: все-таки не ел человечины, а что суетливо прятал происхождение — так хоть было что прятать. Плахов с Мелентьевым не нравились Дане: они слишком часто перемигивались и пересмеивались. Тут не было ничего удивительного — разъезжали по Ленинградской области вместе и привыкли сочинять вдвоем, да и к беспризорникам ходить парой оказалось надежней, в прошлом году банда Лаписова изувечила старика-репортера Житовкина с тридцатилетним, между прочим, стажем; он в свое время издал книгу о нравах Сенной, но нравы Октябрьского вокзала стали куда свободней. Плахов с Мелентьевым были неплохие ребята, даже писали вместе монологи для эстрадника Файкина, выступавшего в Зеленом театре на Каменном острове, и обдумывали уже музыкальную комедию. Даня, выпив немного, стал к ним приглядываться доброжелательней. Плахов, кучерявый, с очень белой кожей и широко расставленными карими глазами, заиграл на гитаре — тоже кучеряво, с перебором, — и спел кое-что из романсов, подслушанных у беспризорников; «Папиросы», «Ах, зачем я!» — надрыв выходил у него как надо, смешно и жалобно. «Кирпичики!» — попросила Варя и первая завела: «Началась война! Буржуазная! Накатился пятнадцатый год! И по винтику! По кирпичику! Разобрали мы этот завод». Лара с Ригой, обнявшись и полулежа на диване, затянули новую песню: «Я с Колей встретилась на клубной вечериночке, картину ставили тогда „Багдадский вор“…»</p><p class="p1">— Ты смотрел картину «Багдадский вор»? — прошептала Варга.</p><p class="p1">— Нет. А ты?</p><p class="p1">— С Дугласом Фербенксом, — сказала она. — Уу! Вот там бы я снялась — на Джульяну Джонстон никто бы не смотрел! Она разве танцует? Она танцует как медведь на ярмарке, у нее щиколки толстые.</p><p class="p1">— Что вы даете мне советы, точно маленькой! — басом выли девушки. — Ведь для меня уже давно решен вопрос! Скажите папеньке, что мы решили с маменькой…</p><p class="p1">— Что моим мужем будет с Балтики матрос! — угодливо хихикая, блудливо подмигивая, почему-то по-цыгански поводя плечами, подхватил Кугельский.</p><p class="p1">— Ну что это! — в нос протянул демонический пролетарий. — Что за грубое, я не понимаю, уличное! Давайте петь изящное.</p><p class="p1">— Два друга повстречалися, друг другу руки жмут! И оба улыбаются и разговор ведут! — завел Плахов, жеманно пожимаясь. — А как вы поживаете? А что вы наживаете? А как у вас — дают иль не дают?</p><p class="p1">— И так люди днями, днями все ходят истомленными тенями! — подхватил Мелентьев. — В ногах у них дрожание, в руках у них хватание, а в черепе — дают иль не дают!</p><p class="p1">— Повсюду антимония, повсюду чудеса! — козлетоном пел Плахов. — На окнах гастрономии аршином колбаса! А в каждом переулочке калачики и булочки, они тебе скакают прямо в рот.</p><p class="p1">— И так люди днями, днями! — завыл Кугельский, не знавший песни, но выучивший припев. Он обожал участвовать в коллективных действиях, всем видом говоря: великий, но простой, особенный, но с вами!</p><p class="p1">Смысла этих глумливых подвываний Даня не понял, а потому изящества не оценил, но Сюйкин кивал одобрительно: ему, видимо, нравилась «антимония». Дане представился непонятный, страшноватый и скучноватый, но по-своему романтический мир трестов и синдикатов, об устройстве и различиях которых он понятия не имел; мир разрешенных НЭПом темных сделок, ресторанных переговоров и робкой, почти стыдливой мухлевки, которой полнилась вся торговля, каждая столовая, любой поезд. В мире частников витал дух аферы, по-своему невинной, даже и честной: нэпманам она не просто разрешалась, но предписывалась. Тот, кто приворовывал, уж по крайней мере не был причастен к грехам более серьезным, вроде заговора; да и какая же, помилуйте, частная инициатива без легкого воровства? Надо было спешить и тут сделать похуже, скомпрометировать себя, чтобы пролетариату было за что их презирать; все частники старались выглядеть попрезренней, чтобы их, не дай Бог, не сочли серьезными врагами; мухлевали не ради выгоды, но для соответствия образу, как подросток матерится, чтобы сойти у бандитов за своего. «Дают иль не дают» могло означать что угодно — может, срока, а может, вздохнуть, не говоря уж о бабах, которые тоже могут дать и не дать. Уточнять Даня не стал, не желая обеднять смысл.</p><p class="p1">— Фу, — сказала Варга. Она быстро напивалась, но пока еще была на стадии прелестного возбуждения: кусала ему ухо и даже зачем-то щипала бок.</p><p class="p1">— Чего ты? — спросил Даня, подпрыгнув от особенно сильного щипка.</p><p class="p1">— Тюфяк, тюфяк! — крикнула она.</p><p class="p1">— Тише.</p><p class="p1">— А пусть все слушают, мне бояться некого.</p><p class="p1">Спевши «Бублички», окончательно перешли на изящное: «Последнее танго», с чудовищным ударением на втором слоге, «Губки алые», еще какой-то бред. Двигуб пытался вернуть гостей к пролетарскому репертуару, завел было бесконечную бодягу о том, как родная его мать провожала, но Сюйкин только поморщился, и комсорг послушно заткнулся. Лара с Ригой рыгали, нарезавшись, и бессмысленно подвывали всему. Варга пересела к Плахову и расспрашивала о поездках, Даня взревновал и с тоски пересел к сомнамбулической Татьяне.</p><p class="p1">— А вы тоже с Кугельским работаете? — спросил он, не найдя лучшей темы для знакомства.</p><p class="p1">— Я на дому работаю, — поглядев на него с испугом, сказала Татьяна. — Я из бисера плету и еще шью.</p><p class="p1">— А, — сказал Даня, не забывая коситься на Варгу. — А я учиться буду с осени.</p><p class="p1">Татьяна не ответила, ее это не касалось.</p><p class="p1">— Налить вам? — спросил Даня.</p><p class="p1">Она посмотрела испуганно.</p><p class="p1">— Ну, налейте.</p><p class="p1">Она думала, что, выполнив свое намерение, он оставит ее в покое, но Даня не терял надежды с ней разговориться. Совет Остромова насчет установления химических реакций заставлял действовать: не случайно же он попал сюда, случайностей нет.</p><p class="p1">— Вам тут скучно? — спросил он.</p><p class="p1">— Мне никогда не скучно, я занята, — ответила Татьяна вяло.</p><p class="p1">— Чем же? — Это уже было интересно.</p><p class="p1">— Я думаю, слушаю…</p><p class="p1">— Что слушаете? Разговоры? Они тут совсем неинтересные.</p><p class="p1">— Нет, я другое слушаю, — сказала она и вдруг заговорила горячо, быстро, словно разрешив себе наконец выболтаться о главном. — Я каждое утро думаю: с чего начнется? Ведь однажды я проснусь и пойму, что вот оно. Что это есть смертельная болезнь. Я определю сразу. У меня тетка однажды проснулась и сказала: все, от этого я умру. Еще никто не знал, от чего, но она уже в себе ощутила. И через неделю пожелтела, а через три месяца умерла. И я все слушаю, откуда начнется.</p><p class="p1">— Да, может быть, еще нескоро, — неуклюже утешил ее Даня.</p><p class="p1">— А может, скоро, — сказала она и впервые поглядела на него с живым интересом. — Как вы думаете, ведь это может быть скоро?</p><p class="p1">— Вообще-то, — сказал Даня, — может выйти так, что сейчас пол провалится и все мы упадем на нижний этаж. А может так быть, что все ваши атомы устремятся в одном направлении, и вы взлетите.</p><p class="p1">— Ну нет, — сказала она разочарованно. — Этого никак быть не может.</p><p class="p1">Едва проснувшийся интерес к Дане тут же угас в душе занятой Муравлевой: этот был поглощен не тем, думал о пустяках.</p><p class="p1">— Проснуться смертельно больной не более вероятно, — настаивал Даня. Муравлева ему не нравилась, но больше-то говорить было вовсе не с кем. На ней лежала хоть тень интереса к чему-то неживотному, а у прочих и этого не было.</p><p class="p1">— Обязательно с чего-то начнется, — повторяла она. — Уж я знаю.</p><p class="p1">— Но ведь тогда уже ничего нельзя будет сделать!</p><p class="p1">— Ну вот может быть, — сказала она жалобно. — Мне говорили. Что если как-то иначе перевязать узлы, то можно изменить. Я из бисера плету, так вот если, может быть, как-то по-другому… Мне учительница говорила, которая учила плести. Что с помощью бисера можно себе переплести всю судьбу.</p><p class="p1">Этих учительниц бисероплетения развелось много, и каждой надо было удерживать клиентуру. Та, к которой на беду свою попала Муравлева, придумала для бисероплетения метафизическое основание и учила переплетать навыворот всю судьбу. Даня хотел было сказать, что это примитивная практика и есть способы много лучше, но тут к ним подсел Мелентьев, оставив временно свою Варю. Мелентьев был то, что называется в простонародье ласковый, — мужчины говорят об этом с пренебрежением, женщины с упоением, но проницательные люди таких побаиваются, ибо чувствуют в них глубоко сокрытую звероватость. Даня видел давно, еще в Крыму, такого пса — он жил при харчевне грузина Кавалеридзе. Заезжая в Гурзуф к подруге матери, теософке Бойницкой, они всегда туда заходили: Бойницкая уверяла, что один Кавалеридзе на всем побережье готовит настоящий древний шашлык по урартским рецептам, и будто бы сам являлся двести девяносто седьмым перерождением личного повара урартского царя Урсу. И вот у этого перерожденца жил пес Айбар, ласковый до противности, когда надо было непрерывным лизательством и умильным повизгиваньем выпросить кусок, и зверь зверем, когда он принимался рычать над ним и терзать его. Тогда для Айбара переставало существовать все, кроме куска, и он не откликался на призывы тех, перед кем только что так визжательно плясал. Наверное, он тоже был пятисотым — собаки меньше живут — перерождением урартской, варварской собаки, жившей при царском поваре-каннибале, ибо являл собой то же сочетание медоточивости и зверства, какое всегда отвращало Даню в воинственных древних текстах, всех этих гимнах богиням и рапортах богам. Сообщаю тебе, величайший и всесильнейший, одной рукой держащий то, а другой другое, сладчайший и вкуснейший, сделавший то-то и хотящий еще, что для твоего удовольствия изрубил десять тысяч жителей страны песьеухих и всех зажарил. Мелентьев тоже был ласков именно в этом смысле, по-айбарски игрив, визгливо и ухарски зажигателен, знал множество песенок про губки алые и глазыньки зеленые, но видно было, с каким рычанием набросится он на кусок мяса, когда этот кусок легковерно склонится на его мольбы. Потом он пнет, что осталось, и пойдет ластиться к следующему куску. Даню затошнило, и он переместился к оставленной Варе. Варя сидела у стола, заложив ногу на ногу, меланхолично отхлебывала самогон из стакана и смотрела перед собой. Кажется, ей было ни до кого, потому Мелентьев и отсел, но в алкоголиках бывает иногда душа. Даня бросил взгляд на Варгу, та перехватила этот взгляд и покрутила пальцем у виска. Жест относился к Плахову — дурак, мол, не обращай внимания, — но Даня по вечной мнительности отнес его на свой счет и нагло ухватил Варю за круглое колено. Варя не посмотрела на него.</p><p class="p1">— И очень просто, — сказала она мрачно. — И очень даже запросто.</p><p class="p1">Даня понял это в смысле поощрения. Для отваги он налил себе самогону и, едва не подавившись, выпил. Для закуски пришлось употребить кусок ливерной, но он был так зловонен, что и его пришлось срочно заедать капустой.</p><p class="p1">— И очень запросто, — повторила Варя. — Или в Неву кинусь.</p><p class="p1">В первый момент Даня подумал, что на мысль о самоубийстве ее навела его наглость — в самом деле, за кого принял девушку, сразу хвать за коленки, и он в ужасе отдернул руку, но Варя этого не заметила.</p><p class="p1">— В Неву кинусь или яд приму, — сказала она, все так же глядя перед собой. — И очень даже запросто, и прощай, Варвара Некипелова.</p><p class="p1">— Да почему же? — пробормотал Даня.</p><p class="p1">— Или удавлюсь, — решительно пообещала Варя. — И никто ничего. И особо никто не озаботится.</p><p class="p1">— Да что вы, — не поверил Даня.</p><p class="p1">— Или кислоту, — предположила Варя. — Говорят, не так больно. А? Сначала больно, а потом в бессознании. И тогда уж ничего.</p><p class="p1">— Некрасиво будет, — сказал Даня, не найдя другого аргумента.</p><p class="p1">— Некрасиво, — согласилась Варя. — Но никто ничего особенно не озаботится. Прощай, Варвара Некипелова, и не озаботится.</p><p class="p1">— Да зачем же! — возмутился Даня и выпил еще, опять закусив тряпочной капустой. — Вы вон какая красивая.</p><p class="p1">— А и что ж, — сказала Варя равнодушно. — Красивая, так что ж. Никто и ничего. А так хоть в рожу всем плюнешь. Лучше в Неву, конечно.</p><p class="p1">— Раздует, — пообещал Даня. — Тоже некрасиво.</p><p class="p1">— А и что ж, что некрасиво, — повторила она, не глядя на него. — А и пусть. Красиво было — никто и ничего, а пускай теперь некрасиво. И никто особенно не озаботится.</p><p class="p1">— Сказать по правде, очень никто не озабочен, — процитировал он, не понимая толком, на что надеется: может, она поймет, что все уже было, и зарифмовано, и лучше, чем она когда-нибудь сможет, — а потому ее самоубийство ничего не добавит к миру, как он есть? Но скорей это была бессознательная надежда на то, что две стихотворные строчки, хоть самые простые, внесут в этот бесконечный бред какую-то камертонную ноту, разгонят вокруг себя хоть крошечное чистое пространство, и все одумаются, и перестанут нести свою угрюмую чушь, маскирующую всего два желания: совокупиться и тут же умереть, потому что дальше жить после такого позора нельзя.</p><p class="p1">Он процитировал, да, но Некипелову ничто не брало.</p><p class="p1">— Вот и да, — сказала она. — И никто особенно ничего.</p><p class="p1">— Это упадничество! — завыл сзади нарезавшийся Двигуб. — Это совершенное упадничество! Товарищ, вы должны… Есть же коллектив, товарищ. Если каждый в коллективе повесится, что это будет?</p><p class="p1">— Будет очень хорошо, — твердо сказал Даня.</p><p class="p1">— Ну что же вы, ну почему же, — вяло возражал Двигуб. — Это упад… упаднические… Вы должны тянуться и втянуться.</p><p class="p1">— И очень запросто, — повторила Варя. — Или можно под поезд, но некрасиво.</p><p class="p1">Двигуб тяжело вздохнул и отошел.</p><p class="p1">— Ну а цирк? — спросил Даня наобум. — А в парк пойти?</p><p class="p1">— Была в парке, скучно, — сказала она. — А в цирке что ж, лилипуты одне.</p><p class="p1">Лилипуты, видимо, были для нее женского рода, не стоили мужского.</p><p class="p1">Он вдруг понял. Ей в самом деле все было скучно, это была не ее вина. Все они ничего не могли сделать, их этому не учили, у них были в жизни всего два развлечения. Одно она уже испробовала, ничего хорошего, но оставалось еще другое, которое она откладывала на потом, когда окончательно надоест первое. Больше они ничего не могли сделать, вот в чем штука. Все занятия, придававшие жизни прелесть и смысл, упразднились как противозаконные или стоили слишком дорого, для интеллектуальных наслаждений не было ума, для путешествий были закрыты границы, а в кинематографе все только любились и травились. Любиться она попробовала, оставалось травиться. Притом на лице ее, плосковатом, с монголинкой, он читал еле видные намеки на ум, чуткость, способность к состраданию, — но все было затравлено, задавлено в зародыше, и все помыслы сводились к тому, что однажды она очень даже просто прыгнет в Неву и хоть на час сделается кому-нибудь интересна. В сущности, у Татьяны было то же самое, только она боялась, а эта хотела.</p><p class="p1">— А тоже можно вены вскрыть, — сказала Варя. — Только где же ванну взять? Когда в воде, говорят, не больно. Не слыхали?</p><p class="p1">— Не слыхал, — сказал Даня. Мутило все сильней. Он подумал, что надо выпить еще, — подобное подобным, — и с отвращением влил в себя полстакана мутного жгучего пойла. На короткий миг комната в самом деле перестала кружиться, и Даня почти трезво подумал, что надо бы уйти, но Варга была оживлена и хохотала, Кугельский завел граммофон, да и куда им было отсюда пойти?</p><p class="p1">В этот миг заскрежетал дверной звонок, Кугельский кинулся открывать и вернулся с длинным старцем, одетым не по-летнему. Это был невероятно противный старец, мысль о котором навсегда соединилась у Дани с тошнотой, — но если б Даню даже не тошнило и был он по-утреннему свеж, как сорок братьев-физкультурников, эта одутловатая рожа, неопрятная борода и наплывавший от старца необъяснимый запах сырого мяса внушили бы ему отвращение к человечеству. Это было явление с той стороны, с исподу, не из подполья даже, а из зазеркалья. Бывают люди — войдут, и хоть беги. Все в нем было нелюдским, и весь он был заряжен ненавистью к людскому, но здесь, похоже, очутился в родной среде.</p><p class="p1">Кугельский около него суетился.</p><p class="p1">— Александр Иванович, — повторял он, — как же вы, Александр Иванович… Как же вы узнали…</p><p class="p1">— Вы что же, не рады, Кугельский? — хрипло, с надсадой спрашивал старик. — Вы стесняетесь, может быть, меня? Я недостаточно, может быть, нищ и мерзок для вашего праздника?</p><p class="p1">— Что вы, что вы, Александр Иванович, — лепетал Кугельский с невыносимой смесью брезгливости и подобострастия. — Как вы могли подумать…</p><p class="p1">— Так и мог. Всякую шелупонь позвали, а меня не позвали.</p><p class="p1">Шелупонь выслушала это равнодушно, да и граммофон заглушал слова; один демонический пролетарий Сюйкин задрал подбородок и сказал свое «Пфе». Но в этот момент он терзал пальцы заплаканной блондинки, что-то напористо ей втолковывая, и скоро вернулся к этому занятию.</p><p class="p1">— Как же я мог вас позвать, — оправдывался Кугельский. — Снимите пальто…</p><p class="p1">— Ничего я снимать не буду, — говорил старик, — я в «Красной газете» не работаю, и у меня белья нету. Если я сниму пальто, ваши шлюхи не обрадуются.</p><p class="p1">— Ну, оставайтесь так… — сдался Кугельский. — А позвать вас я никак не мог, вы же являетесь сами, ни протелефонить, ничего…</p><p class="p1">— Я к вам позавчера приходил, — торжествующе сказал старец. — Я приходил, а вы не сказали. Я могу это понять. Вы человек мелкий, противный, вам всякое внимание дорого. Вы домогаетесь любви от ничтожеств, и понятное дело, что эти ничтожества со мной не совмещаются. Но я пришел все равно. Я не хочу, чтобы у вас был праздник. Если вы хотите что-то из себя представлять, у вас не должно быть праздников.</p><p class="p1">— Почему же не должно Александр Иванович… — лепетал Кугельский.</p><p class="p1">— Потому что у поэта не бывает новоселья. Поэт живет нигде, он, как я, под мостом ночует…</p><p class="p1">С этими словами старец присел к столу, налил себе стакан самогону и без тоста выпил. Варя хоть и хотела умереть, но инстинктивно отодвинулась. Смерть это да, пожалуй, а вонь нет.</p><p class="p1">— Мне Барцев сказал, что у вас тут праздник, — словоохотливо пояснял Александр Иванович. — Я решил вам сделать подарок. У вас новоселье, вам надо обзаводиться обстановкой. Вот, я принес вам. Это вы, ваш вклад в словесность.</p><p class="p1">Он вытащил из кармана грубо раскрашенного деревянного осла, такие продавались около зоосада. Кугельский взял осла и принялся вертеть в руках, угодливо хихикая.</p><p class="p1">Он, разумеется, давно вытолкал бы Одинокого в шею. То есть он думал этими словами, а на деле попросил бы его уйти, или даже прийти в другой раз, или просто ушел бы вместе с ним, извинившись перед гостями, потому что боялся Одинокого до мурашек, как боятся призраков или иной невещественной субстанции. Одинокий был такая чистая и беспримесная гадина, такая мертвая смерть, что душонка Кугельского перед ним скукоживалась. Но выгнать Одинокого было никак нельзя — он был таран, стенобитное орудие на пути к славе; его руками Кугельский надеялся передушить всех, кто мешал, включая далекого Пруста. Одинокий был его щит и мортира, танк и окоп, и вдобавок его подчиненный. Кугельский не мог без Одинокого и потому со стыдом выслушивал, как тот смачно, наслаждаясь, говорит ему все новые мерзости. Даня этого слушать не хотел и переместился к Плахову, но тот уже порядочно окосел.</p><p class="p1">— И говорит она мне, милый гражданин, — сказал он Дане, — что этого я, говорит, вынести не могу.</p><p class="p1">— Чего? — спросил Даня.</p><p class="p1">— Не могу вынести, говорит, — объяснил Плахов.</p><p class="p1">— Да чего она не может вынести? — не понял Даня.</p><p class="p1">— А чего ты пристал ко мне! — крикнул Плахов. — Что ты, допрашивать будешь меня?</p><p class="p1">— Я пристал? — переспросил Даня.</p><p class="p1">— Повсюду антимония, повсюду чудеса! — выкрикнул Плахов и уронил голову на стол.</p><p class="p1">— Я настаиваю, — повторял слева от Дани демонический пролетарий Сюйкин. — Я настаиваю, чтобы исключительно меня хотеть, желать, только обо мне думать неутомимо. Чтобы изыскивать такие способы ласки, которые были бы приятны только мне, меня, и всегда новы. Я настаиваю, чтобы меня ласкать.</p><p class="p1">— Но я… я же… — повторяла блондинка, и в голосе ее Даня уловил счастье дорвавшейся рабы, которую наконец бьют. — Я все для вас, Арчи, вы же знаете, Арчи…</p><p class="p1">Вероятно, Аркадий, подумал Даня. Они все теперь Гарри, Пьеры, Пили…</p><p class="p1">— А вы утомляете, вы соскучиваете меня своими слезами, — бешеным полушепотом продолжал Сюйкин, ломая блондинке пальцы. — Вы требуете, вы хотите рассчитывать. А вы должны понимать, что право имею я, один я, что ничего не должна сама, не можешь, не должна иметь ничего! Ничего ко мне не должна иметь! Когда я, допустим, прихожу выпимши, то не можешь ничего сказать! Изыскивать такие способы ласки, которые всегда были бы сладки, которые наслаждали бы меня, видеть во мне того идеального, единственного того, который больше никогда, никакой…</p><p class="p1">— Пустите, вы мне руку сломаете! — взвизгнула блондинка.</p><p class="p1">— Я вам все, я все сломаю вам, а ты должна, ты должна своим терпежом…</p><p class="p1">— Пусти, гад! — заорала блондинка. Киногероиня кончилась, полезла жительница общежития при фабрике «Красный ситчик», общежительница, общеситчица.</p><p class="p1">— Я ненавижу и презираю, и я ноги об тебя даже не вытру, не говоря об остальное! — страстно полушептал Сюйкин. Отказ вытереть остальное подкосил блондинку. Она разрыдалась с детским отчаянием.</p><p class="p1">— И я настаиваю, чтобы мне, меня, — страстно, в нос повторял Сюйкин. — Чтобы трогать меня, когда я скажу, и целовать, где я скажу, изыскивая путь примирения, такие способы ласки, которые бы…</p><p class="p1">Даня ощутил столь острую, животную, давно не испытанную тоску, что тут уже не было никаких способов примирения и ласки. Он не мог больше усидеть за столом и вышел в коридор бывшей белашевской квартиры. Здесь было пусто, прохладно и неожиданно тихо. Двое карапузов молча, со страшным ожесточением дрались у входа в уборную. Это были сыновья оперуполномоченного Власова, которых и отец иногда путал. Один ломал другому руку — так же, как демонический Сюйкин заплаканной блондинке, — и молча сопел, а другой часто дышал и тщился не завыть. Все только и делали, что ломали друг другу руки, а какой выбор у протоплазмы? Даня хотел пройти в ванную, но там было уже занято. Кто-то шумно плескал водой и фыркал. Наконец дверь распахнулась, и перед Даней вырос пропагандист Тишкин. В застолье Даня не обратил на него внимания — человек шумной профессии, на отдыхе он старался молчать, склубочиться понезаметней, чтоб хоть дома отдохнуть от громокипящей чепухенции, а потому его и не было видно, хотя росту он был изрядного и голос имел иерихонский. Тишкин пил много и пьянел странно — память его, скажем, всегда оставалась трезвой, он и средь ночи отбарабанил бы полное происхождение частной собственности и государства, но окружающий мир виделся ему смутно. Говорят, в опьянении осуществляются заветнейшие наши желания, — и желание Тишкина, видно, было видеть окружающий мир как можно смутней, дабы противоречие между ним и агитматериалами было не так разительно.</p><p class="p1">— Вы к кому тут? — спросил Тишкин.</p><p class="p1">— Я к Кугельскому на новоселье.</p><p class="p1">— Кугельский там, — указал Тишкин Дане за спину.</p><p class="p1">— Я знаю. Мне нужна ванная.</p><p class="p1">— Ванная, — издевательски повторил Тишкин. — А больше ничто не нужно?</p><p class="p1">— Ничто, — тупо повторил Даня.</p><p class="p1">— Ну и дуй отсюдова, — сказал Тишкин. — Тута не лупанарий.</p><p class="p1">Он выписывал «Всемирный следопыт», поэтому знал еще и не такие слова.</p><p class="p1">Даня не желал драки и поплелся на лестницу. Там было прохладней, и ясно горел долгий августовский закат в окне, и причудливо вспыхивал сине-лиловый витраж — вот были люди, они и лестницу старались изукрасить. Даня спустился на лестничную площадку и увидел, как сверху, из квартиры Кугельского, вышли, шатаясь, Плахов с Риголеттой. Они шли в обнимку, как бы танцуя вальс. Вглядевшись, наблюдатель поразился бы сложности их движений, их разнонаправленности, гармоничности, той подлинной танцевательности, которую природа, сей первый балетмейстер, закладывает в тела, лишенные всяческого соображения. Чем меньше головной, тем больше спинной, как-то так. Какая музыка могла бы аккомпанировать этому танцу? Тут было множество векторов и стремлений. Риголетта желала, но вместе с тем не желала здесь, а вместе с тем больше было негде, а вместе с тем и надо же было себя продать. Уже ее соседка по комнате была замужем, и как-то надо было думать. Уже все-таки было двадцать два. Этот был как будто не дикий и с профессией, и с виду даже не запойный, но от водки в нем проснулась такая нахрапистая уверенность, что он, может, еще и хуже запойного. И потому она боялась, а он жал и мял, но не от жестокости, а тут был свой резон. Он знал за собой особенность от этого возбуждаться больше, а сейчас был в себе недоуверен, поскольку выпивка, как мы знаем, обостряет хочу и расслабляет могу. Он расстегивал уже штаны, одной рукой придерживая ее, другой доставая, третьей отбиваясь от ее отбивающихся рук, четвертой нашаривая, пятой направляя. Ртом он продолжал впиваться. Она мотала головой. Оба они рычали и немного хрюкали, и все это время продолжали кружиться на месте, и это кружение отзывалось в Дане таким бешеным вращением, что он отвел глаза; но внутренняя свистопляска не кончилась и тогда.</p><p class="p1">Много раз потом он испытывал это чувство, но никогда с такой силой. Все случилось без всякого мысленного перевязывания левого легкого мысленной лентой, без малейшего намека на долгое путешествие по духовным артериям, без заблаговременного открытия чакры. Даня ощутил сильнейшую внутреннюю болтанку, как если бы нечто в нем не находило себе места и металось в страшной тесноте, корчась от омерзения среди склизких внутренностей, среди сплошной биомассы, — наконец подкатило к горлу, и краем сознания он успел подумать, что сейчас обеспечит Плахову и Риге достойный антураж для первого свидания, но тут он согнулся пополам, выпрямился, вновь согнулся, прижался лбом к витражному стеклу, силясь обрести равновесие, на миг потерял сознание, после чего ощутил мгновенную боль в самой середине груди, и в следующую секунду свершилась его первая экстериоризация. Смех, да и только. Его, проще сказать, вырвало собственной душой.</p><p class="p1">И, наблюдая себя уже сверху (пара все топталась в любовной игре, ничего не заметив), он подумал — или не подумал, а тут был какой-то новый глагол, обозначающий бессловесное мышление: не смогу же я каждый раз для этого напиваться — это бы ладно — и обеспечивать соседство совокупляющихся на лестнице. Если прежде каждая мысль была как бы ступенчата и оформлялась, то голой душе она являлась вся сразу, легко и летуче, и он расхохотался, вздрагивая от озноба: августовская прохлада теперь облекала его со всех сторон.</p><p class="subtitle">4</p><p class="p1">Ощущение было знакомо и ново: мы уже умели и приближались, но недоставало главного. Эта легкая знакомость, присутствующая в каждом новом опыте, подтверждает, что мы на верном пути, ибо нет ничего, что не было бы заложено в архетипе. Нагота души предполагала и безоболочность мысли: раньше слова надо было друг к другу приставлять, теперь они друг в друга перетекали, будучи клочками одной субстанции. Вращения осуществлялись легко, но в них не было нужды, ибо видно стало во все стороны сразу. Впрочем, взгляд — если это был взгляд — легко фокусировался на одном, по выбору. Даня осмотрел былое прибежище, брезгливо избегая называть его телом, употребляя новое, незвуковое имя, по смыслу ближайшее к «времянка», а фонетически — Шишков, прости. Оно не утратило сознания, не завалилось набок — как и предупреждал учитель, вело себя смирно и ничем не выдавало душеоставленности. Занятно, что связь с ним сохранялась — первый признак удачной экстериоризации, в отличие от смерти, при которой эти нити истончаются и вскоре без сожаления рвутся. Даня чувствовал прохладу витражного стекла и запах мочи, пропитавший парадное, и сознавал, что если бы кто-то, поднимаясь сейчас по лестнице, хлопнул его о плечу и сказал грубую глупость вроде «Здорово, паря», тело нашло бы, что ответить, — что-нибудь ровно настолько никакое, на уровне мычания, как надо было для попадания в тон; странно, а в общем, и нестранно, что без души ему проще было бы ответить в этом духе.</p><p class="p1">Если бы ему пришло на ум описать — хотя бы в приложении к трактату, для последователей, как к медицинскому учебнику прилагаются истории болезней, — трудность была бы в том, что полеты, кружения и сверхчувственные состояния описываются обычно неясным языком, безличными предложениями (толкнуло, рассвело, взорвалось), и получается туманно, тогда как состояние было ясным и резким, как запах нашатыря, как лимон, как нашатырь и лимон мартовского утра, явно холодного и явно весеннего. Но и это слишком красиво, мирно, а ведь экстериоризация происходила вследствие страшного ускорения души, ее бешеного вращения вокруг себя, и самая скорость вылета звала немедленно куда-то двигаться, что-то делать — будто подняли из окопа в атаку и не сказали, где враг. Теперь он висел на простреливаемом пространстве, где, слава Богу, не случилось в это время никаких чужих душ — еще перепугался бы, увидав, — но вместе со свободой предельно обострилась опасность, он был вне скорлупы, с ним можно было что угодно. Он пометался, не рассчитав толчка, пару раз неощутимо вмазался в стену, — стена не ударила, но проходить было трудно, вязко. Он поплыл вверх над лестницей, но ощутил страшную неловкость: двое все топтались, лицом к лицу не получалось, он ее развернул и нагибал, не переставая охаживать, оглаживать, — Даня инстинктивно рванулся вверх, чтобы их не задеть, и легко прошел дверь, заметив при этом, что дверь «простая» (по сравнению с чем она была простая — не понял, это было внутреннее знание, актуализованное в новом состоянии). Проскользнул в комнату Кугельского. Тут царствовал распад — высшая и предпоследняя стадия застолья, ибо последняя есть уже сон.</p><p class="p1">Одинокий с животным своим чутьем нацелился на Варгу — единственную тут ш т у ч к у; прочие были грубый, сельский помол. К таким он знал подходец. Простое хамство не подходило — нужно было суметь при ней унизить всех прочих, наговорить дряни, чтобы побоялась: ну как то же самое скажет про нее? В своей манере, по больным местам. Одинокий убежден был, что чувствует больные места у всех, а если не найдет, ударит по родне, по нежным частям. Подсев, начал с того, что среди огородного навоза ему вдруг блеснул чудесный минерал. С этим попал: сама любила повторять, что вы все со свалки, а я из игрушечного магазина, из лучшего тюля. Прошелся сперва по бабам: вот беременная медведица на цырлах, вот шлюха по-монастырски, в постели, должно быть, поскуливает, как щенная сука; вот женщина-грабли, обратите внимание, прелестница, на эту косточку на ступне, на большом пальце, признак плебса в пятнадцатом колене. Затем прошелся по мужчинам, особенно не пожалев Кугельского (вообразите, прелестница, мне отчего-то легче всего представить, как он гадит орлом, для вящей близости к народу); говорил громко, чтоб Кугельский слышал. Жертва льстиво хихикала, а в душе вскипало такое, что Одинокий убоялся бы, кабы мог на секунду вообразить бунт. Одинокий о каждом знал худшее, и жертвы старательно достраивались под это знание. А вы, прелестница, кто же будете — или, вернее, кто вы уже есть на нашу погибель?</p><p class="p1">Тут Варга ощутила беспокойство, нечто вроде озноба. Даня был близко, в шаге, — он чувствовал, что в этом новом состоянии не составит труда обратиться к тайному в ней, что только и было настоящим, — но тут была смутно ощутимая неправильность, все равно что проникать к возлюбленной со взломом. Он застыл на уровне ее головы, розового уха с розовой опаловой каплей на мочке.</p><p class="p1">— Это не ваше дело, — сказала Варга, и Даня так обрадовался, что взмыл до потолка.</p><p class="p1">— Да, теперь конечно, — засипел Одинокий. — Нищий старик, что же, только плюнуть… Ты не так говорила бы со мной в мои тридцать. Я был Байрон, меня никто не звал иначе…</p><p class="p1">Это была простая тактика — сыграть на жалость, а когда разнежится, ударить. Это привязывало намертво: они долго бегали за ним, чтоб отомстить, а потом привыкали.</p><p class="p1">— Байрон, — сказала Варга и прыснула.</p><p class="p1">— Ты аккуратней с ней, дед, — сказал Мелентьев, кратковременно активизируясь. — Она мне знаешь что сказала? У ней способность внушать мысли. Она внушит тебе сейчас пойти кого убить, и ты убьешь, и тебя оприходуют. Или она внушит тебе отделаться, и ты обделаешься.</p><p class="p1">С этим Мелентьев уснул опять, положив тяжелую курчавую голову на плечо ничего не соображающей Татьяны. Татьяна сидела прямая, как столб, напряженно прислушиваясь к смерти внутри себя. У нее была изжога, изжога была сильна, как смерть, стрелы ее — стрелы огненные.</p><p class="p1">Чертова Варга. Разумеется, она все выболтала Мелентьеву. Нельзя было ее поить.</p><p class="p1">— Где же вы научились внушать мысли? — с преувеличенным изумлением спросил Одинокий, пытаясь ухватить Варгу за руку.</p><p class="p1">— Где надо, там и научилась, — сказала она, вырываясь. — Остромова знаешь? Вот он тебе внушит, так внушит, что забудешь хватать.</p><p class="p1">— Остромов? — уже по-настоящему изумился Одинокий. — Но я прекрасно знал Остромова! Редкостная сволочь, чудеснейшая! Я думал, он совершенно пропал. Что же, он в городе?</p><p class="p1">— Где ж ему быть, — неохотно ответила Варга. Даня плясал перед ней и так, и сяк, надеясь отвлечь внимание и прервать опасный разговор, но оставался невидим; легкая тревога, впрочем, ее кольнула.</p><p class="p1">— Но он чудесный малый! — повторял Одинокий. — Я хочу его видеть. Дайте мне его адрес.</p><p class="p1">— Ничего я тебе не дам, — сказала Варга решительно и отодвинулась.</p><p class="p1">— Это ты, положим, не зарекайся, — тщась казаться вальяжным, просипел Одинокий. — Не тебе, девчонке, лезть в старые отношения дела серьезных людей. Если захочу, я сам найду Остромова.</p><p class="p1">— Вот и захоти, и найди, — сказала Варга совсем уже решительно, и Даня обрадовался: умница, умница! Но в этот миг она поискала его глазами, не нашла и обиделась. Ей досадно стало, что он так долго отсутствует и, может быть, с Травиатой, а к ней в это время пристают грязные старики.</p><p class="p1">— Эй! — крикнула она Кугельскому. — Вы Даниила не видали?</p><p class="p1">— На лестнице, наверное. Блюет, — сказал Кугельский. Он рассказывал Нонне, как его ценит редактор, и поглаживал ее круп. Нонна была в полубесчувствии и хохотала.</p><p class="p1">— Не блюет он! — обиделась Варга.</p><p class="p1">— Ну так целуется, велика разница, — игриво сказал Кугельский.</p><p class="p1">— И не целуется ни с кем! — крикнула Варга. — А ты отстань! — Одинокий вновь придвинулся и вонял.</p><p class="p1">— Ты, прелестница, как увидишь Остромова, скажи ему, что его хорошо помнит Одинокий. Было время, делывали дела, — сказал старик. — Ох-хо-хо, каков я был. Кррасавец. Но то все было еще не то. — Он налил, выпил и крякнул. — Искра была, но истинная поэзия — после. Истинная поэзия в падении. Я пал в навоз и обосрался. Да. Что Остромов, все мантию носит?</p><p class="p1">Как он смеет, негодовал Даня, как он смеет так говорить об учителе?!</p><p class="p1">— Остромов красивый, — сказала Варга.</p><p class="p1">— Ну так ты скажи ему, красивому, что Одинокий кое-что помнит и желал бы видеться. Найти меня можно на Измайловском, 14. Запомнишь?</p><p class="p1">Я запомню, подумал Даня. Я скажу ему об этом страшном человеке, намеренном его шантажировать. Учитель предупреждал о черных сущностях. Должно быть, они повздорили еще в предыдущем воплощении. Может быть, сам учитель и низринул его туда, где он сейчас пресмыкается. Как он смеет сидеть и пахнуть рядом с ней?</p><p class="p1">— Ты дурак! — крикнула Варга. — Вы все дураки! Я не стану для вас танцевать!</p><p class="p1">— Никто не просит, — буркнул Мелентьев с Татьянина плеча.</p><p class="p1">— Ты, круглый! — обратилась она к Кугельскому. — Налей мне!</p><p class="p1">Кугельский нехотя налил.</p><p class="p1">— Все дураки, — зло прошептала Варга, выпила и подошла к окну, за которым — но то, что Даня увидел за окном, перевесило все прочие его мысли. Он понял, что должен быть сейчас, немедленно там — только там, а не в этой продымленной, пьяной и сонной комнате; и, не задев стекла, он устремился туда, куда смотрела облокотившаяся о подоконник Варга.</p><p class="p1">Было еще одно ощущение, слабое, дальнее, — одна вялая, вязкая душа, топтавшаяся тут же в комнате и не знавшая, куда себя деть, порывалась за ним. Тело, кажется, почти не имело о ней понятия. Она топталась внутри, рабская, склизкая, готовая уцепиться за что угодно и предложить все, что у нее есть: себя, свою смешную нелепую преданность, свое бессилие, свою жажду пойти за сильным. Эта душа была наследием долгого рабства, она умела бы и любить, если б не привычка подобострастничать, и работать, если бы не привычка угождать, — но теперь могла только пресмыкаться; из всех чувств осталось у нее чувство силы — и если рядом с ней появлялась сила, она унюхивала ее безошибочно и готова была прилипнуть к ней ценой любых унижений. В Дане сейчас была такая подъемная сила, что не почуять ее было нельзя, — и робкая, липкая душа устремилась за ним, толкалась, вырывалась, еще бы, чего доброго, и прилипла. Даня знать не знал этого человечка. Это был Двигуб, комсорг, переживавший страстный и неодолимый порыв вырваться за окно. «Упадничество», сказал он себе, но порыв был сильнее слов, и он бы, чего доброго, ринулся следом…</p><p class="p1">— Не смей, слышишь? — брезгливо сказал ему Даня. — Это не твоего ума дело.</p><p class="p1">Ну как же, ну что же, канючила душа Двигуба, — но Даня решительно устремился прочь и пошел вверх, с чувством, будто стряхнул паутину с лица.</p><p class="subtitle">5</p><p class="p1">Пребывай он в эту минуту в телесном убежище, он ничего не ощутил бы при взгляде на этот закат, кроме страстной тоски — может, чуть сильнее обыкновенной; но сейчас он чувствовал, что должен там быть. Как знать — может быть, и вся эта тоска лишь оттого, что мы должны там быть и не можем; теперь же это было ему легко. Расстояние одолевалось со скоростью взгляда, немного превышающей, как он понял, скорость света, ибо взгляд видит и туда, куда свет досягнуть не может. «Видеть туда» была новая грамматика, осваиваемая на ходу. В алых и розовых облаках над Васильевским, ближе к Неве, образовался просвет, и к нему слетелось несколько зрителей — той же природы, что и Даня, побросавших свои тела сомнамбулически стоять близ сфинксов или на Николаевском мосту.</p><p class="p1">Представляться не нужно было. Он не узнал бы никого из зрителей, повстречав их в физических телах, и его не узнал бы никто — разве по особому блеску в глазах, по раз навсегда запечатленному в них величию зрелища.</p><p class="p1">— Окно, окно открылось, — внятно сказал некто рядом с ним, явно мужчина; возрастные различия тут стирались, но половые чувствовались остро. — Редкость, значительная редкость.</p><p class="p1">Повторы играли в речи важную роль, слов было мало.</p><p class="p1">— Кому-то подарок, у кого-то праздник, — прошептали две женские сущности почти синхронно. Хоровая речь не была дивом: если кто-то желал выразить другому симпатию, он говорил с ним хором. Мысли являлись одновременно, всем сразу: каждый высказывал ту, которую желал подчеркнуть. Даня понял вдруг, что в жизни то же самое, но там это незаметно. Разумеется, все, что может быть сказано, давно явлено, просто один выбрал произнести это вслух, а другой счел неважным или забоялся.</p><p class="p1">Даня понимал, что ему выпало редкое зрелище, что зрелище для него, что он главный на зрелище, ибо это его день, день рождения, день его рождения; мысли начали завораживаться, заворачиваться, кружить и повторяться в лад зрелищу. Это был балет, танец, но не того грязного рода, который только что развернулся перед ним на лестнице. Мистерия шла не один и не другой век, и в окне, в розовом и алом просвете, открылась ничтожная ее часть. Сражались две силы, неустанно порождая из себя третью. Ни одна из них не была добро или зло, и критерий, по которому они разделялись, был другой, человеку неведомый — как балет оценивается знатоками не по тому, хороши или плохи поступки вилисс и щелкунчиков, а по тому, как подпрыгнуто или подхвачено. Во всем этом господствовал ритм, чуть сдвинутый, не тождественный земному — пожалуй, одна Варга немного улавливала его в своем танце, строфический рисунок которого всегда чуть отличался от мелодии, смещаясь влево или вправо. Даня не сказал бы, кто боролся. Рисовались контуры, легко примеряемые на дракона и всадника, но с той же легкостью — на гору и бурю или, допустим, парус и чудовищную волну. Главный был неподвижен, ибо каждое его движение в этой многовековой мистерии растягивалось на год и недоступно было людскому глазу, — но борьба шла, неистовая, напряженная, стройная, как в балете, в котором, однако, убивали всерьез. Это было зрелище и вместе с тем правда по последнему счету, — как если бы в щель кулис видна стала истинная механика всего на свете. Эта механика была несложна — двое сталкивались, порождали третью сущность, она раздваивалась и повторяла сюжет, и как по каждому атому, помнил Даня, воссоздаваема Вселенная, так здесь по любой неподвижной на вид, бесконечно тянущейся секунде ясен был весь сюжет с его ритмическими прибоями. Вся земная борьба, мельчайшие ее перипетии были лишь бесконечно далеким отражением происходящего там. Там сражались за что-то, чему не было земного названия, а люди здесь, не умея этого понять, приписывали всему моральные интерпретации, связывали их со своими мгновенными, ничего не значащими судьбами, жалко делились по жалким признакам, лепетали об аде и рае, хотя высшим сущностям, боровшимся в небе, все эти слова не сказали бы ничего, а до людей им вовсе не было дела. Кто сказал человеку, что он тут главный? Непростительная насекомая самонадеянность, самодеятельность, самодельность. Смотрите иногда на небо, все поймется. Он не главный, просто громче всех кричит, когда у него болит; есть болезнь — сумасшедший увязывает свою участь с закатами, тенями, числом деревьев в лесу, так вот, человек и есть диагноз. Главное совершается без него. Единственное определение, имеющее смысл, — «нечеловечески прекрасно»: Даня всегда это понимал, следя за облаками, но только теперь — вот определение состоянию — понял, что понимал.</p><p class="p1">Сущности враждовали непримиримо — и вместе с тем сосуществовали, взаимно уничтожались — и вместе с тем танцевали, и земная попытка понять, в чем дело, выглядела на фоне этой стройности так же оскорбительно-мерзостно, как танец Плахова с Ригой. Вдобавок поверх основной борьбы шла другая — алого с лиловым, потом лилового с черным; особенно долго длилась малиновая нота, столь яркая, что почти звучащая — сразу делалось ясно, откуда «малиновый звон», а город Malines ни при чем, подобрали по созвучию. А вот уже ничего не видно, и закрывается окно, и пойди теперь вспомни, были те краски или привиделись. Сильней всего, однако, томило чувство, что там, за пределом, закрытым даже для участников мистерии, есть иная, высшая, вовсе уже невообразимая краска, в сравнении с которой груба даже эта, небесная; одна щель, один просвет в самой дальней точке алости как будто на это намекал… но чтобы туда проникнуть хоть взглядом, надо было миновать уровень вторых небес, а это было не в человеческих и даже не в сверхчеловеческих силах; это сияние было уже не грозным, но нежным, и проще всего было сказать, что человек додумал его, желая наделить небо хоть каким-то из своих чувств. Нет, небо до нежности не снисходило. Ночь спускалась, шла рядами, спадала сладкими складками; за ночью все продолжалось, но без нас.</p></span></span>
