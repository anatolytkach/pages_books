<p class="p">Глава шестая</p>
</div><p class="subtitle">1</p><p class="p1">Стоило Дане ступить на порог воротниковской квартиры, как он с мучительным счастьем узнал дух живого жилья: что-то варилось, что-то кроилось, сушилось, гладилось, хозяева ссорились, торопились, бешено друг друга раздражали, но были живы.</p><p class="p1">У них дома никогда не было такого духа. Не то чтобы мать не вела хозяйство — вела, и Лидочка помогала, пока не умерла, но в степном приморском доме пахнет степью и морем, а не супом и бельем. И Даня любил запах моря и степи, а краем сознания жалел, что у них не было быта, проклятого и благословенного, который до восемнадцатого года принято было ненавидеть, а потом вспоминать со слезами. Как сохранила этот быт Мария Григорьевна — один Бог ведал, но даже подселенцы не повредили ему. И во-первых, подселенцев было мало: семья большая, уплотнили всего на две комнаты, три оставили; во-вторых, Мария Григорьевна и с ними сумела оказаться на дружеской ноге, балансируя на грани меж старым барским презреньем и новым холопским заискиваньем. Удивительным образом в ней не было ничего «бывшего». Не переменилась она и внешне, слегка пополнела с годами, как водится, но ни намека на старушечью слезливую дряблость. Она суетилась, раскраснелась, командовала, из кухни пахло шкворчащим в масле хворостом, выбежала к Дане Ольга в синем с драконами халате, помахала, подразнив высоко поднятой голой рукой, и, ведьмински засмеявшись, исчезла за дверью. Из угловой, наименьшей комнаты боком выходил толстый шестнадцатилетний Миша, ни секунды не стеснявшейся неуклюжести и врожденной сердечной болезни: все Воротниковы с рожденья умели не стесняться себя, но ни Волоховым, ни Галицким этой счастливой способности не досталось. Мать рассказывала, что с детства была уверена в неграциозности всех своих движений, косолапости манер и неумении выговаривать французские слова. Из всей семьи одна Женя, пожалуй, не мучилась вечным сознанием уродства — и то потому, что рано вышла замуж; кузина Верочка, однако, с рождения получила запас неуверенности за себя и мать. Ей казалось неправильным даже, что, скосив глаза, она видит собственный нос. Даня тогда с трудом ее уверил, что это не болезнь и нос такой, как надо.</p><p class="p1">Он не слишком хотел заходить к Воротниковым: вскоре после замужества Мария Григорьевна начисто отделилась от сестер, зажила отдельным домом и его интересами, да и с детства куда больше интересовалась тем, что называют жизнью, а не тем, что было истинной жизнью Ады и Жени. При этих двух Мариях она была Марфа, наделенная столь частым у Марф сознанием правоты. Не могло быть и мысли о том, чтобы остановиться у Воротниковых после переезда в Ленинград. Но не посетить тетку тоже было неприлично — Даня и так промедлил две недели, боясь навязываться. Ничто не заменит родства, и в этом доме, таком чужом, среди людей, которых он не видел с прошлого приезда, — девять лет, ужас, — ему было свободно: какие ни чужие, а с в о и.</p><p class="p1">— Даня! — говорил Миша, расцветая улыбкой. — Пойдем же ко мне, что ты встал! Погоди, еще не кормят, ничего не готово.</p><p class="p1">— Я не голоден, что ты.</p><p class="p1">— Знаю, знаю. Пойдем, а то мать с Олькой тебя затащат и защекочут. Сколько же мы не виделись?</p><p class="p1">С точки зрения пролетарской, на которую Даня уже привык иногда становиться, чтобы с тем большим ужасом соскочить, — Миша был совершенный выродок: толст, болен, одышлив, очкаст, любил мать, не интересовался спортом по полной к нему неспособности, знал три языка, выражался витиевато — словом, любого из этих пороков хватило бы, чтобы Миша стал объектом травли, если не побоев. Но, кажется, в его случае все было представлено в такой концентрации, что переходило уже в карикатуру, а карикатура прощалась. Таким классового врага готовы терпеть и даже любить: разоружен, безопасен! Миша это чувствовал и пользовался, но не утрировал, разумеется: это оскорбило бы зрителей, подчеркнув грубость их вкусов. Нет, он был абсолютно равен себе. И все Воротниковы были себе равны: радушная мать, весело претворявшая скудость в праздник, красивая дочь со всем набором бесприданницы, — гитара, папироса, преувеличенная лихость, «где уж нам уж»… В новом обществе типажность стала великой силой: что подпадало под разряд — они терпели. Грехом стала малейшая примесь, пограничность, еле заметный выход из амплуа: это уже не прощалось. Умом Даня понимал, что в типажности есть грех, второсортность, — а все же душе его было тепло у Воротниковых, как тепло читателю Диккенса, пока из автора вдруг не полезет знание настоящих, а не святочных ночлежек.</p><p class="p1">— Ну, рассказывай. Мне пропасть всего надо показать тебе. У нас, ты знаешь, совершенное умопомраченье. Затеивается Синяя блуза, и твой покорный слуга пишет комдраму. Ты же знаешь, для остального я бесполезен. Я не могу строить летающие модели и не даю списывать по математике, потому что сам понимаю через раз. Но писать я почти научился. Я прочту тебе монолог отвратительного грека Пангалоса. Погоди, я заболтал тебя хуже Ольки. Расскажи что-нибудь про себя. Где ты работаешь? Что папа? Расскажи все по порядку, пока на тебя не налетели девчонки. Их теперь две, я положительно заклеван.</p><p class="p1">Даня понимал, что отвечать рано: монолог комического толстяка еще не кончился. Эта витиеватая манера с вкраплениями школьного жаргона спасала Мише жизнь, и вряд ли он с кем-нибудь теперь говорил иначе.</p><p class="p1">— Я не рассказал тебе про Варгу. Варга — кошмарное чудо. Именно так: кошмарное чудо. Мать ведь вам не писала? Она совсем недавно. Это сестра нашего соседа по даче, еще по шестнадцатому году. Сам он уехал, ей сейчас восемнадцать лет, я ее почти не помню. Нашла где-то адрес и приехала из Тифлиса. Она пять лет прожила в Тифлисе, они там как-то пересиживали, теперь вернулись, квартиры, разумеется, нет и вообще никого здесь нет. Мать она оставила там, а из прежних знает только нас. Олька ее полюбила, они слиплись намертво, и мне теперь никакого житья. Мы тебе ее покажем. Она танцует, как баядера, смеется, как сумасшедшая, и вообще сумасшедшая. Говорит, что ей надо было родиться в древней Персии. Не может ни работать, ничего. Но я опять завелся. Я просто не видел тебя тысячу лет. Расскажи мне, что ты пишешь и как живешь. Вообще ты зря не поселился у нас. У меня вполне поместилась бы вторая кровать. — Он знал, что не поместилась бы, и потому приглашал так щедро. — Мне было бы гораздо проще писать монолог Пангалоса. Вообще иногда не с кем слова молвить, в школе я только пересказываю книги. Рассказывай, наконец! Школа — удивительное место, ты наверняка слышал, ЗЛАК, Знаменская Ленинградская Академическая Коммуна, хотя нас дразнят СУКА — Самая Умная Коммуна Академиков. Но это зависть. Во главе Агапов, про этого ты уж точно знаешь. Он еще режиссер. Но я тебя заболтал. Рассказывай. Знаешь, на Новый год мы выступали на первом хлебозаводе…</p><p class="p1">Он и дальше произносил бы этот монолог, чередуя школьные и семейные новости с требованием рассказать хоть что-нибудь наконец, чистосердечно полагая, что облегчает Дане встречу с давно не виденным семейством, снимает неловкость и освобождает гостя от тягостной необходимости рассказывать о своей печальной судьбе, да ему, может, и рассказывать не хочется, — но ворвалась Мария Григорьевна и шумно, требовательно, как если бы кто-то норовил увильнуть, позвала к столу. Даня виновато улыбнулся — прости, мол, Миша, поговорим еще, — и узким загроможденным коридором протиснулся в кухню.</p><p class="p1">В квартире Воротниковых жили всего три семьи, а и то коридор казался мостом между мирами. Комнаты были тесны, быт выплескивался из них и развешивался по стенам, чтобы не загромождать проходы. В бывшей детской жил с семьей слесарь Тютюнников с женой и ребенком, которого купали в корыте, — корыто висело у двери, рядом с загадочным пружинным приспособлением, которое Тютюнников приобрел для растягивания тщедушной грудной клетки. Чуть выше подвешен был бесформенный мешок, набитый угловатыми, выпирающими предметами, словно несогласными с отставкой: выбросить жалко, починить невозможно, и они зависли в вечном чистилище, на балансе тютюнниковской жадности. Ко всему прочему Тютюнников был мечтатель, в жалком столярском теле жила мечта о странствиях, он сколотил однажды по чертежу в «Красной газете» крестовидное, кленовое тело буера, к которому все собирался приладить парус да и понестись по чухонскому льду, но то зима случалась сиротская, то не было подходящей ткани для паруса, то в выходной объявляли принудительную лекцию о политике в деревне, и крестовина так и висела выше мешка, обозначая бесплодность слесаревых мечтаний.</p><p class="p1">Дальше жила Тамаркина. Уй, Тамаркина была злющая! Она через свое достоинство любого могла перегрызть. Но Мария Григорьевна ее не боялась и детей научила не бояться. За скандальностью и склокой в Тамаркиной была добротная ладожская надежность, а крикливость была в ней защитная, для порядку. Ненавидела ее только Ольга, ценившая лоск и гладкость, даром что сама, чего греха таить, вставляла в речь пролетарское словцо и поигрывала в доступность; это все было, конечно, на поверхности. В душе ее коробило малейшее хамство, она могла ночь прорыдать после стычки в трамвае. Уже Тамаркиной было за сорок, а она была одинокая, бездетная. Зато тютюнниковский Илья, всегда сопливый, любил бывать в ее комнате, играл лоскутками; недавно она купила ему оловянного солдата. С Тамаркиной, если знать подход, жить можно было. Возле ее двери висела огромная граммофонная труба, Тамаркина любила слушать граммофон, имела коллекцию Плевицкой, подпевала. Выше располагался гигантский медный таз для варки варенья — Тамаркина была до него охотница, ей золовка из деревни привозила крыжовник, она варила варенье, объяденье. Рядом висел другой таз, эмалированный, для стирки. А мешка для тряпья не было — если что Тамаркиной было не нужно, так она выбрасывала, не рассусоливала.</p><p class="p1">У ольгиной двери наклонно висела на двух крюках семейная гордость — дамский велосипед. Отец купил его на вырост в шестнадцатом, ей было девять, и сам факт сохранности его был чудом — столько насущных вещей спустили, продали, а велосипед сохранился, потому, должно быть, что уж совсем никому не был нужен: на что можно было его выменять в девятнадцатом году? Никому не нужное переживет всех; Ольга и теперь иногда ездила кататься на острова. Там была целая компания, ее считали своей — она ездила неважно, но велосипед ей шел, и шло черное спортивное трико, и легкое задыхание. Даня залюбовался ею, хотя заметил, что и она удивительно вписывалась в амплуа студентки-спортсменки, нашей новой девушки, принимающей только те позы, какие уже запечатлены на бесчисленных картинах нового поколения, сменивших авангард: на них веселая и свежая наша юнь напрягала мышцы, управляя стройными яхтами, или задумчиво пережидала, покамест кавалер накачает велосипед. Вся вздох, вся порыв, ароматное сочетание томленья с бодростью. И Даня не знал, Ольга ли подражает искусству или искусство — Ольге.</p><p class="p1">Ели у Марьи Григорьевны, дабы не мешать готовке Тютюнниковых. Все было удивительно вкусно, хоть недорого. Суп из сушеных белых грибов, собранных Мишей в Карташевке прошлым летом; картошка с соленым налимом — налима доставил поклонник Ольги, втузовец Денис, любящий порыбачить на Ладоге (Миша не преминул сказать шпильку в адрес сестрина жениха, сестра не преминула схватить его за ухо); Даня ел, стараясь не торопиться, и односложно рассказывал о себе, благо большего и не требовалось. Мария Григорьевна сама отвечала на собственные расспросы, начиная ответ непременным «Воображаю»: «Воображаю, как тебя приняли в этой газете… Могу себе представить, каково тебе в этой жилконторе…». Они, может быть, оттого так и сохранили покой, быт, разыгрываемую по ролям взаимную любовь, что не впускали в свою пьесу ничего постороннего: у Дани тут тоже была роль, бедный родственник, оттеняющий чужой уют, и не дай Бог было сказать что-нибудь не по шаблону — рухнет вся декорация. Он старался не противоречить, вписываться в нишу, даже начал утрированно похваливать налима, а к Марье Григорьевне обратился «тетинька», чем привел ее в совершенный восторг: «Всегда так называй! Я это самое и есть. Была девушка, была дама, а стала тетинька».</p><p class="p1">— Нет, но что это Варга не идет к столу? — с притворным возмущением воскликнул Миша. — Я, брат, должен показать тебе это чудо морское. У нас теперь это главное блюдо. Ольга, позови ее, я боюсь один. Она подумает, что я пришел ее изнасиловать, у нее других мыслей не бывает.</p><p class="p1">Сестра дала брату нежный подзатыльник и отправилась за приживалкой.</p><p class="p1">— У нее болит голова, — сообщила она, вернувшись ни с чем.</p><p class="p1">— Черт знает какая наглость, — всплеснула руками Марья Григорьевна, всегда гордившаяся широтой нравов и словаря. — Пришел гость, так она кобенится. Это все ради тебя, Даня, сейчас увидишь.</p><p class="p1">Она резво встала и решительно направилась в ольгину комнату.</p><p class="p1">— Звон посуды, грохот мебели, — мечтательно произнес Миша, — треск разрываемой материи…</p><p class="p1">Не доносилось, однако, ни звука. Марья Григорьевна почти сразу вернулась, ведя за руку худощавую, среднего роста девушку — бледно-смуглую, черноглазую, гибкую и ленивую, пожалуй, что и некрасивую, но Даня сразу понял, зачем пришел сюда и почему два дня перед этим был счастлив, думая о предстоящем визите. Она была вся не отсюда и ниоткуда, вся вне шаблона, такая же чужая, как он. Главный кусок картинки встал на место: вот и та любовь, ради которой… Разумеется, она выглядела совсем не так, как он себе представлял. Бойся услышанных молитв! Он мечтал о гибкой, тонкой, черноволосой и нуждающейся в защите; и она была ровно такой — словно действительность лишний раз усмехнулась: вот как все выглядит на самом деле. Гибкость ее доходила до шаткости, беззащитность — до безволия, бледность — до желтизны, а черные волосы были спутаны и чересчур тонки; глаза были черны, но тусклы, рот — печальной скобкой, и нужно было не спускать с нее глаз, чтобы заметить два-три живых и внимательных, даже, пожалуй, бойких взгляда, выдававших и наблюдательность, и веселый нрав. Большую часть времени она спала или делала вид, что спала, но если бы ее разбудить — вся озарилась бы тонким внутренним пламенем. Бесспорно, она была глупа. На этот счет у Дани не было никаких иллюзий с первой минуты, но ведь он, сам того не зная, просил и об этом. Разве не хотел он, чтобы идеальная возлюбленная внимала каждому его слову, разделяла все его увлеченья и страсти — а это, хочешь не хочешь, предполагает глупость. Правда, в минуты бодрствования это была живая и резвая глупость, праздник интуиции, не омраченный рефлексией; а среди дневного сна, в который душа ее младая Бог знает чем всегда погружена, выражение лица у нее было почти дегенеративное. От Дани, однако, не укрылось, что из всех сидящих за столом он один привлекал ее быстрые и хитрые взгляды; пару раз глаза их встретились, но Варга тотчас переводила взгляд на нетронутую еду.</p><p class="p1">— Варга, что ты не ешь? Тебя с ложечки кормить? — притворно кипятилась Марья Григорьевна.</p><p class="p1">— Не работает, вот и не ест, — дерзил Миша. — На самом деле, Даня, она просто оберегает талию. Знаешь, сколько у нее талия? 48 сантиметров, я лично мерил. Могу обнять одной рукой и еще останется.</p><p class="p1">— Варга, ты станцуешь? — спросила Ольга. Даня заметил, что она смотрит на подругу без особенной любви, да и понятно: только что она единолично царила за столом, и тут эта Варга, без роду и племени, без летучего спортивного очарования, но сразу стало ясно, кто тут картонный, а кто алебастровый. Варга пленяла, ничего для этого не делая, а в очаровании Ольги слишком видна была старательность, вплоть до репетиций перед зеркалом.</p><p class="p1">— Не хочется, — лениво сказала Варга. Голос у нее был низкий, протяжный, цыганский, но без цыганской хитрости.</p><p class="p1">— Я вас очень прошу, — неожиданно подключился Даня.</p><p class="p1">— И просите, и что? — ответила она неожиданно быстро, только что не зашипев по-кошачьи. — Вам всегда делают, что вы просите?</p><p class="p1">— Очень редко, — честно сказал Даня, и она улыбнулась.</p><p class="p1">— Это же не просто так, нужны же условия, — сказала она уже мягче. — Профессионалка вам в любой момент спляшет по заказу, а мне надо много всего.</p><p class="p1">— Закат, мандолины, — перечислял Миша, — южный ветер, нет, лучше юго-восточный, несущий легкий запах кориандра…</p><p class="p1">— Дурак, — сказала Ольга. — Кориандр — огородная трава.</p><p class="p1">— Ну, я же и говорю… Все происходит в огороде… Огородники ползут к Варге на брюшках: станцуй, цветик, не стыдись! Нет, нет, у вас мало кориандра…</p><p class="p1">— Ты глупый, — спокойно сказала Варга. — Я не люблю себя, когда танцую.</p><p class="p1">— А в другое время любишь? — не отставал Миша.</p><p class="p1">— А в другое время меня вообще нет, — ответила она точно так же, как должна была, и Дане показалось, что ответ этот полусекундой раньше прозвучал в его собственной голове.</p><p class="p1">— Я тогда не настаиваю, — сказал он потухшим голосом. — Вам, наверное, трудно.</p><p class="p1">— Нет, ты должен, должен это увидеть! Просто надо поуговаривать. Что я, не знаю Варги? Варга, хочешь, я отдам тебе все мои краски и кисточки? Хочешь, я до завтра не буду говорить гадости? Ну хочешь, я поцелую олькиного ужасного Валю, который поставляет нам этого налима?</p><p class="p1">— Миша, — умоляюще сказал Даня. — Ну что ты, честное слово…</p><p class="p1">— Действительно, — поддержала его Мария Григорьевна. — Мишка ни в чем не знает меры, он и в детстве так же канючил, пока ему не покупали лимонное пирожное. Помнишь, Оля?</p><p class="p1">— Господи, да конечно. А кролика? Помнишь кролика? Ему было четыре года, и он решил, что если каждые пять минут повторять — «Кролик! Кролик!» — мама рано или поздно не выдержит. А ты никогда не умела ему отказывать и видишь, до чего раскормила.</p><p class="p1">— Да, да, конечно, — фальшиво сокрушался Миша. — Каждый может горбатого по горбу…</p><p class="p1">— Не горбатого по горбу, а пузатого по брюху. Ты давно бы мог все скинуть…</p><p class="p1">— А если опять голод? Вы все в обмороке, а я на одних запасах просуществую месяц.</p><p class="p1">— Не дай Бог, — сказала Мария Григорьевна, и наконец-то в ее голосе послышалось нечто живое. С чего я осуждаю этих людей? Они пережили тут много такого, от чего сам Бог велел заслоняться, хоть масками, хоть искусственными интонациями. И кто их обязывал быть искренними со мной? Я им никто.</p><p class="p1">В дверь коротко, сухо стукнули.</p><p class="p1">— Григорьна! — крикнул скрипучий голос.</p><p class="p1">— Что, Катя?</p><p class="p1">— Ну-к открой!</p><p class="p1">— Тамаркина, — страшным шепотом сказала Ольга.</p><p class="p1">— Небось, не притюкну, — сказала Тамаркина, прямо и по-хозяйски входя в комнату. — Вот тут вареньица. Гость все ж.</p><p class="p1">В руках у нее была глубокая белая миска, полная яблочного повидла.</p><p class="p1">— Спасибо, Катя, — Марья Григорьевна умиленно наклонила голову, отчего ясней обозначился двойной подбородок. — Чудо мое, всегда с приношением.</p><p class="p1">— Дак ведь гости, это, — сказала Тамаркина. Чувствовалось, что она хотела бы принять участие в общем разговоре, но не знает, о чем и как говорить.</p><p class="p1">— Сядь с нами, чаю выпей.</p><p class="p1">— Нет, я пила уж. Сёдни племянница была у меня.</p><p class="p1">Даня смотрел на Тамаркину с некоторым страхом. Она была крупная, костистая, вся из углов, непонятно, чего ждать от такой. Лицо у нее было коричневое, а зубы очень крепкие.</p><p class="p1">— Ну пойду я, — сказала она и быстро вышла.</p><p class="p1">— Нового человека увидела, — прошептал Миша. — Шпионит.</p><p class="p1">— Миша! — так же, шепотом, воскликнула Марья Григорьевна. — Стыдно! Она святая!</p><p class="p1">— У тебя все святые. А я знаю, что она следит. Ты думаешь, она ради варенья приходила? Она шпионит, кто к нам ходит. Погоди, Данька, она еще напишет тебе в жилконтору, что ты водишься с сомнительным элементом.</p><p class="p1">— Она не кровожадная с виду, — задумчиво сказал Даня. — То есть с виду как раз кровожадная, а это сейчас самое безопасное.</p><p class="p1">— А я какая с виду? — вдруг спросила Варга.</p><p class="p1">— Вы? — Даня не ждал вопроса и опешил. То ли она кокетлива донельзя, то ли проста до неприличия. — Вы, мне кажется, разная, потому что вам очень редко чего-то хочется по-настоящему… Вам чаще не хочется, потому что все очень уж не по вам.</p><p class="p1">— Точно, — сказала она ровно, без одобрения. — И я все время соглашаюсь, хотя все не так. И я так уже со многим успела согласиться, что меня теперь почти нет. Я вам станцую, только после, — мысль у нее прыгала, и она не старалась ее дисциплинировать, но в этих прыжках была логика.</p><p class="p1">— Варге все не по нутру, — сказала Ольга. — Ее устроили тут переписывать на машинке, а она отказалась: у них хамские глаза.</p><p class="p1">— Хамские, — кивнула Варга.</p><p class="p1">— А у кого другие?</p><p class="p1">— Вот пусть и ходят с хамскими, а я не буду там сидеть. Я из бисера плету.</p><p class="p1">— Плетет замечательно, — сказала Марья Григорьевна, не желая попрекать приживалку куском. — Большое нам подспорье.</p><p class="p1">— Я могу еще из гаруса, но гаруса настоящего нет сейчас. А из ненастоящего плести — это будет не то. Это как разговаривать трачеными словами. Есть просто слова, а есть траченые. Разговариваешь, как теплый чай пьешь, — не греет и не напьешься.</p><p class="p1">Если бы Дане было хоть двадцать пять, он бы заметил, как искусственны у нее эти смысловые прыжки и как наивна матрица, которой она первобытным лилитским инстинктом пытается следовать, соблазняя нового человека; но ему было девятнадцать, и он восхищался ее дикостью, прямотой и абсолютной естественностью среди всеобщего доброго притворства.</p><p class="p1">— Ты поищи «Гитану», а я сейчас, — сказала она Мише, легко вскочила и умчалась.</p><p class="p1">— «Гитану» ей ищи, — проворчал Миша, втайне радуясь предстоящему зрелищу. Он принялся перебирать пластинки в углу, снял с комода граммофон, приладил трубу и все это время не переставал бурчать. Наконец в комнату ворвалась босая Варга: вместо зеленой кофты, черной юбки и перекрученных бурых чулок на ней была красная блузка, цыганская длинная юбка, древняя шаль — вся она окуталась облаком пестрых шелковых тряпок. На икрах плясали дешевые медные браслеты с красными камушками. От тряпок веяло то ли цыганским табором, то ли туркестанским базаром. От нее пахло амброй. Даня сроду не нюхал амбры, но решил, что это она. Ему нравился звук: амбра, альгамбра, клад Амры, мавр, подглядывающий в амбразуру. Еще почему-то булькал Гвалдаквивир. Волосы она расчесала и распустила по плечам.</p><p class="p1">— Заводи! — крикнула она Мише. Тот смотрел на нее восторженно.</p><p class="p1">— Для тебя нарочно, — сказал он Дане. — При нас таких переодеваний еще не было…</p><p class="p1">— Все ты врешь! — возмущенно крикнула Оля, но, кажется, и она была уязвлена. Рядом с Варгой ей нечего было делать.</p><p class="p1">Миша поставил пластинку. Из граммофона полилась хриплая мексиканская мелодия, ее вели труба и аккордеон под костяной, скелетный треск кастаньет. Поначалу Варга стояла неподвижно, уперев руки в бока и воинственно поглядывая по сторонам. Ясно было, что с первым же звуком хриплой трубы комната и все, кто в ней, перестали для нее существовать. Она ожидала появления неведомого противника, одинаково уверенная и в конечной победе, и в том, что битва вымотает ее чуть не до смерти. «Ва, ва-ва-ва!» — воскликнула труба, и Варга выбросила вперед правую руку. Хищные брови ее сошлись, она прикусила нижнюю губу и вдруг бешено замахала руками, словно в последней попытке отклонить участь, — но нет, враг уже маячил на горизонте. И тогда, под медленную раскачку строгой, отчетливой гитары, — она словно поняла, что деться некуда, бой придется принимать прямо здесь, среди сухой, пустынной местности, где некому рассказать об ее победе, а о позоре тут же узнают все. Пролетела пара ворон — крылатый скрипичный всплеск. Пыль заклубилась. Гитара повторяла один и тот же ритмический ход — не подпускай слишком близко, не подходи слишком быстро, та-та-та-ТА-та-та-ТА-та, словно давала зашифрованные советы. Варга в ужасе подалась назад: так вот он какой! Сколько ни предупреждали, ни рассказывали, но когда в лицо дышит гнилостным жаром разверстого зева — это совсем, совсем другое дело. Она ощетинилась вся — волосы, даже ресницы, — и принялась стелиться по земле, мести волосами пол, откидываться назад, кланяться, размазываться по пескам: ты видишь, я только женщина, и что же я могу? Может быть, мы все-таки не воюем, ты пожалеешь меня, тебе же лучше? Но ты сама вызвала меня, взревела труба в ответ, и гитара четко выговорила: на жалость бить бесполезно, такой подход не проходит, та-та-та-ТА-та-та-ТА-та! Да, да, мы попробуем иначе. Два скрипичных всплеска, еще две вороны: чуют поживу, не чуют только, кто будет этой поживой… Хорошо, теперь она изобразила ярость. Мы, женщины пещер, тоже кое-что умеем. Пока ты бродишь ночами по своей пустыне, мы сидим в каменных норах, обдумывая, готовясь: конечно, с твоей доисторической, зверской точки зрения люди не представляют опасности. Для тебя они только пища, но смотри — мы хитрая пища! Р-раз! — и она бросилась вперед, метя в глаз; уклонился. Двас! — и в другую сторону, он еле спрятал вторую голову, самую умную, самую любимую (третья, младшенькая, была дура, от нее никакого толку, он любил ее, как любят больное дитя, но это любовь неискренняя). Трис! — стремительный пинок, зазвенел и закрутился браслет, мелькнула узкая ступня, первая голова получила в челюсть и взбесилась окончательно, но тут она пустила в ход главное свое оружие.</p><p class="p1">Страсть, конечно, страсть, — вот где сила дочерей человеческих. Неужели ты не понял, такой сильный и глупый, что все это лишь приманка, что в душе я люблю тебя с того первого дня, как услышала о тебе в страшной сказке матери? Я сразу поняла — мне не нужен спаситель, я презираю людей, меня сможешь понять только ты, чудовище. И я твоя. Смотри, какой я могу быть, — и теперь, под долгое скрипичное соло, она показала ему все, на что способны, оказывается, запуганные дети пещер. Снова волосами по полу, но уже совсем не так; бешеный, наглый вызов в глазах. Иди сюда, ты же знаешь, что в душе мы любим только драконов, и всегда, когда рыцарь борется за нас, втайне сопереживаем отнюдь не рыцарю, — но вы так беззащитны, бедные древние чудовища, так беспомощны перед новой ветвью эволюции! Вы деретесь по-старому, благородно, — ведь вы так сильны, что вам не нужны жалкие людские хитрости. Именно хитростью побеждают вас дети Евы, и вот вас почти не осталось, и ты последний, и сейчас, в этой пустыне, я исполню нашу вековечную мечту: я буду твоей. Только за этим я вызвала тебя на бой, только за этим разозлила — чтобы разбудить истинную страсть; смотри же! Это было уже совершенно бесстыдно — стоя на коленях, откидываться назад, дальше и дальше; и тут она молниеносно вскочила, и Даня понял все.</p><p class="p1">Ну конечно. Отчаявшись разжалобить и не сумев запугать его, она поставила на последнее — и он распалился, растомился, раскис, его можно было брать голыми руками, что она и сделала под ритмичные, уже спокойные советы гитары: не убивай его сразу, он заслужил эти муки, та-та-та-ТА-та-та-ТА-та! Теперь она медленно душила его по очереди, а как еще можно душить дракона: все три головы, сперва самую боевую, сильную, похотливую, потом самую маленькую, а потом любимую, умную, чтобы все произошло на ее глазах, чтобы она — одна из всех — успела понять. А как же иначе? Разве не должны мы отомстить за слезы всех матерей, за последние ночи всех принесенных тебе в жертву красавиц, за зловонное дыхание над нашей пустыней? Слышишь, как воет труба: он последний, он последний! Это значит, что таких больше не будет; а главное — никто не узнает о том, что это было, что было тут между нами, как гнусно я боялась тебя, как жалко я пугала тебя, как низко я победила тебя. И когда Варга выпрямилась над ним на широко расставленных, до судороги напряженных ногах, — она словно выкрутила в воздухе тяжелую набухшую скатерть: вот так, и еще завязать узлом. Три последних взвизга скрипки — налетели восторженные вороны: но чур, никому не рассказывать, что тут было, а будете каркать — найду и убью по одной. Вы знаете, что не шучу: теперь я умею летать.</p><p class="p1">— Здорово, да?! — восторженно заговорил Миша, пока бледная Варга еще стояла над трупом и сквозь расклевываемое чудище только проступал зеркальный шкаф, гнутые спинки стульев и тяжелый чемодан со старьем. — У нее никогда не повторяется, и это же целая история в одном танце! Ты понял? Это женская жизнь в миниатюре: вот она девочкой учится танцу, у какой-то, может быть, колдуньи, вот она сама в расцвете силы, а вот сама учит другую девочку всем этим тайнам, каково! Варга, ведь так? Ведь я понял? И кстати, если завести в другой раз, она все станцует совершенно иначе, даже под ту же самую «Гитану». Проверено опытом.</p><p class="p1">Даня молчал. Миша ничего не понимал, и объяснять было бесполезно.</p><p class="p1">Он почти не разговаривал и потом, когда пили чай с яблочным повидлом, коричневым, как сама Тамаркина; повидло, впрочем, оказалось отличным, с легкой коричинкой. В Крыму не принято было варить варенье, это русская запасливость, сладенького на зиму, — а там какая же зима? Варга молчала, переодевшись опять в кофту с юбкой; Ольга с матерью, чтобы как-нибудь занять всех разговором, пустились в долгий спор, неинтересный им самим и, видимо, много раз повторявшийся. Ольга рассказывала, что среди втузовцев попадаются удивительные, удивительные. Марья Григорьевна разводила руками и повторяла: как знаешь, но я никогда не смогу и не переступлю. Они, может быть, чудесные, но это совсем другое, и то, что было, никогда уже не вернется. Напротив, говорила Ольга, они как раз и вернут то, что было. Только в их руках это еще может ожить. Нет, как угодно, говорила Марья Григорьевна, но они же совсем другие. Напротив, говорила Ольга, они как раз только и могут, потому что у прежних не было для этого сил, а главное, прав. Обновление может прийти только снаружи. Нет, как угодно, говорила Марья Григорьевна, но снаружи может прийти только чужое, и я никогда не пойму ни этой живописи, ни этой музыки. Напротив, говорила Ольга, мама, ты же сама говорила, все это началось задолго. Нет, как угодно, говорила Марья Григорьевна, но ведь они хотят тебя съесть, как ты этого не чувствуешь! Обе понимали, что говорили не то, а главное, разговор никак не выходил светским, потому что тема его обеих касалась слишком близко, и говорить о своем новом месте с прелестной непринужденностью они еще не научились. Даня мог бы, наверное, встрять, но чувствовал, что его слова окончательно разрушат иллюзию веселого семейного обеда. Он видел, что между матерью и дочерью есть трещина, застарелая злость, что, может быть, только присутствие в доме получужой Варги еще и цементирует семью — рядом с ней, такой ниоткудашней, они были б л и з к и е. А сказать стоило бы одно: Марья Петровна, Оля, вам спорить не о чем, вы одинаково чужие, но из моих скудных наблюдений я вижу, что они скорей будут уважать тех, кто на них не похож и не готов мимикрировать. Они цельные и уважают цельность, но и это полбеды. Все-таки попробую, решил он.</p><p class="p1">— Даня, скажи же ей! — капризно потребовала Ольга, закончив очередную тираду о необходимости обновлений.</p><p class="p1">— Обновления разные, — медленно сказал Даня, — и вот это… которое сейчас… у меня есть одно соображение, но очень трудно…</p><p class="p1">— Мы поймем! — обнадежила Марья Григорьевна.</p><p class="p1">— Мне кажется, что они сами довольно временные, — медленно сказал Даня, — и к ним не надо слишком подлаживаться уже потому… что совсем скоро их не будет.</p><p class="p1">— Что же будет? — недовольно спросила Ольга.</p><p class="p1">— Этого я пока не понимаю, — признался Даня. — Мне кажется, они сами как-то чувствуют свою непрочность…</p><p class="p1">— Прежде всего давайте определимся, — влез Миша. — Кто такие «они»?</p><p class="p1">У него была манера в споре вечно уточнять то, что все и так понимали, и тем разбивать предмет дискуссии: иначе спор мог завернуть в опасную сторону, а Миша терпеть не мог думать о серьезном.</p><p class="p1">— Они… будем так называть всех, кто не мы, — сказал Даня. — Пусть они будут втузовцы, кто хотите. Пусть мы бывшие, я сейчас это отовсюду слышу, и мне это слово даже нравится. Но есть подозрение, — сам не знаю, на чем оно основано, — что очень скоро они сами будут бывшие, и еще позавидуют нам…</p><p class="p1">— Естественно! — воскликнула Марья Григорьевна. — Потому что это все на соплях! Я не отрицаю, я согласна, многое, очень многое заслуживало… ну, пусть даже и отмены, и пусть даже запрещения, и конечно, это самодержавие пора было убирать еще сто лет назад.</p><p class="p1">— Долой самодержавие! — заверещал Миша.</p><p class="p1">— Но не на это же менять! — продолжила Марья Григорьевна, погрозив Мише пухлым кулаком. — Не на эту же грязь! Ведь им ничто неинтересно, ничто не нужно…</p><p class="p1">— Да дело не в этом, — поморщился Даня. — Ну, грязь… но бывает здоровая грязь. Просто на них идет сила, которую они разбудили, которой они сами еще не знают и в сравнении с которой они — ничто. Потому что они обрушили не столько самодержавие, которое, действительно, Бог с ним… Они обрушили какие-то конвенции, старые договоры, без которых теперь с ними самими можно будет сделать что угодно. И кто-то сделает — я только не знаю, кто. Так что мы еще будем о них жалеть…</p><p class="p1">— Ну, с нами-то это твое что-то вообще не будет церемониться, — сказала Ольга. — Ноги вытрет.</p><p class="p1">— Очень может быть, что и нет, — сказала Варга, до этого открывавшая рот, только чтобы стремительно поглощать варенье. — Очень может быть, что совсем даже и нет.</p><p class="p1">Даня посмотрел на нее благодарно. Она понимала все.</p><p class="p1">— Кто же это будет? — язвительно спросила Ольга.</p><p class="p1">— Я гулять хочу, — сказала Варга, глядя прямо на Даню. — Идемте на Елагин.</p><p class="subtitle">2</p><p class="p1">— Значит, вам тоже все это не нравится? — спросила она.</p><p class="p1">— Не знаю. Так сказать легче всего. Мне не нравится по частям, а в целом нравится. Мне даже думается, что для чего-то такого я и родился.</p><p class="p1">— А я нет, — сказала она. — Я родилась, чтобы я лежала на диване и иногда танцевала, когда захочу, а меня чтобы перьями обмахивали. Это называется чудо в перьях.</p><p class="p1">Даня расхохотался.</p><p class="p1">— Это вам не здесь надо было, — сказал он.</p><p class="p1">— Говори мне «ты». Да, не здесь. У вас здесь холодно и все дураки.</p><p class="p1">— У кого — у нас?</p><p class="p1">— Это я вам говорю вы, — сказала она, и Даня опять засмеялся. С ней было прекрасно.</p><p class="p1">— И чтобы я лежала, — повторила она, — и на животе у меня был шоколад. Я бы брала и ела, потом бы вставала и он падал, и никто не кидался бы поднимать. Как по-вашему, что будет дальше?</p><p class="p1">— Дальше? — задумался Даня. — Дальше, наверное, ты танцуешь, вся в шоколаде…</p><p class="p1">— Дурак. Я спрашиваю не про это, а про здесь.</p><p class="p1">Они шли вдоль пахучей, бурой майской воды с зелеными точками в глубине. От земли шел легкий, вечерний, свежий холод. Над Невкой низко висел красный, отчетливо приплюснутый солнечный шар. Другой шар, сплющенный с боков, болтался над маленькой девочкой впереди.</p><p class="p1">— Это опять трудно определить, — сказал Даня медленно. — Я чувствую, но не могу рассказать.</p><p class="p1">— Сейчас я возьму тебя за руку, и ты сможешь, — сказала Варга. Он чуть не сошел с ума от прикосновения тонких холодных пальцев, точно костяных: в них была теперь драконья сила.</p><p class="p1">— Ну? Что ты застрял? Идем.</p><p class="p1">— Я все пытаюсь сказать. Ну, если в самом общем виде… — Он и хотел быть смешным, и боялся этого. — Мне кажется, что это — как будто убрали рельсы, и началась земля. Вот была цивилизация, как это называли, и культура, и они даже между собой спорили, как у Шпенглера.</p><p class="p1">— Шпенглера я знаю, — сказала она небрежно.</p><p class="p1">— Ну и как он вам… тебе?</p><p class="p1">— Некрасивый, — сказала Варга. — Напротив нас жил, противный, смотрел скользкими глазами.</p><p class="p1">Она была прелестна, но говорить с ней всерьез он не мог.</p><p class="p1">— Ну-ну, — сказала она, — очень интересно. Рельсы, а дальше глина. И что?</p><p class="p1">— Именно глина! — воскликнул Даня. Только с такими, как она, имело смысл говорить всерьез. Ничего не знает, но все понимает. И он заговорил уже лихорадочно, торопясь, как всегда, когда увлекался. — Было Просвещение, но оно закончилось — словно недостаточно было предупреждения во Франции, когда, помнишь, девяносто третий год, это случилось еще раз, и теперь уже окончательно. Рациональный мир приводит вот к чему. Рациональный мир кончился, и после этих рельсов началась глина. Но у нее свои законы, и штука теперь заключается в том, чтобы понять, как она устроена. Это одновременно проще и сложней, чем рельсы. Возьмем химию. Неорганическая химия очень сложна, потому что множество элементов, а органическая совсем проста — углерод и еще пять штук вокруг нее, но именно ее я никогда не мог выучить, потому что нерационально. Понимаешь? Там может быть так и сяк, а я привык к строгим конструкциям, ясным валентностям, я понимаю, как они устроены. Все сложней и гораздо проще, сложней и грубей. И сейчас наступает что-то органическое, и это примерно как ты танцуешь: с балетом это, сама понимаешь, соотносится сложно. Балет — все-таки строгое искусство, а твое искусство непредсказуемо, сегодня ты станцуешь так, завтра сяк, и во всем этом будет прелесть дикости, настоящая жизнь. Один одно увидит, другой другое, а как правильно — никто не скажет. Я и рад этой глине, и боюсь ее, потому что…</p><p class="p1">Тут он остановился, как всегда, когда в развитии мысли наступал неожиданный поворот.</p><p class="p1">— Ну, ты меня хочешь и боишься, и дальше? — подбодрила она, снова переведя все в собственный регистр.</p><p class="p1">— Не совсем, но допустим. — Это сокращало расстояние между ними, и он обрадовался. — Я про то, что мне не совсем понятно, как будет теперь с людьми рациональными, и, например, с попытками рационально обуздать эту глину. Ну хорошо, вот она развалила конструкцию и поперла отовсюду. Значит, надо для нее построить какую-то новую конструкцию, которую они и хотели сначала, с учетом всяких этих советов и прочего на местах. Но я почему-то вижу, что и советы, и прочее отстраивается в старую форму, и тогда может быть одно из двух, только одно из двух. Если не оба сразу. — Он опять остановился. — Либо глина порвет форму и будет рвать ее всегда, раз за разом, пока все-таки не установит какую-то свою, в виде, допустим, горшка… — Он засмеялся, но она смотрела строго. — Либо форма так сожмет глину, что она утратит всякую живость, всю эту свою органику, и вместо дворца мраморного, который только что был, получится дворец глиняный. То же самое, но из другого материала.</p><p class="p1">Он был уверен, что она понимает, хотя сам едва угонялся за собственной мыслью.</p><p class="p1">— Но чтобы строить новую форму, — договорил он, слегка задыхаясь (отвык от длинных монологов, давно не думал вслух, да и не с кем было), — надо по крайней мере изучить законы этой глины. Она хаотична только на первый взгляд, а там, внутри, сложная органическая жизнь. Какие-то, допустим, очень крепкие горизонтальные связи. Удивительная солидарность. Способность принимать любую форму. Легкость слепления, то есть, я имею в виду, когда ее порвали, она легко слепляется опять, и это народное тело точно так же. После войны, скажем. Сейчас уже не скажешь, что воевали, а ведь друг с другом, сами с собой, все с теми же, с кем сегодня вместе работают. Ну, и другое: почему, например, из глины нельзя сделать двигатель, но можно горшок? Все это надо изучить, потому что она существует веками, и все это время организовывает себя сама, но просто ее слишком сильно придавили, а потом этот гнет ослаб, и она вырвалась естественным путем, как, знаешь, в «Медном всаднике». Ведь про что в действительности «Медный всадник»? Про то, что не надо чересчур оковывать гранитом, а то вырвется стихия и первым съест того, кто ни в чем не виноват… Ну вот, они оковали, а потом треснуло, и теперь надо строить для глины новую форму, или хотя бы дать ей самой нащупать, как ей удобно. А из нее опять делают дворцы и набережные, и все это будет глиняное, пятого сорта, и скоро треснет, и тогда я уже не знаю… так далеко я не смотрю…</p><p class="p1">— Ну и глупо, — сказала она. — Сначала было весело, а потом скучно.</p><p class="p1">Даня устыдился.</p><p class="p1">— Со мной неинтересно, да, — сказал он зло.</p><p class="p1">— Не куксись. С тобой может быть интересно, но надо же знать, что делать. Пришел в гости — пей чай, потом ешь пирог, потом танцуй. А если все время есть пирог, будет скучно. Сейчас надо целоваться.</p><p class="p1">Даня оробел. Он чувствовал, что до этого дойдет, но целоваться не умел совершенно: было два опыта, один шуточный, другой посерьезней, но оба раза девушки были еще младше и невинней, вырывались, в конце концов все кончалось борьбой, редким касанием губ, взамен предлагались щеки, — словом, стыд, детство.</p><p class="p1">Он огляделся. Никого не было. Девочка с шаром ушла. Острова были пустынны в этот час, в это время. Варга прислонилась к дубу и смотрела с вызовом.</p><p class="p1">Даня отважно закрыл глаза, широко открыл рот и ринулся к неиспытанному, но она уперлась руками ему в грудь, тихо смеясь.</p><p class="p1">— Какой страшный. Не так. Стой смирно.</p><p class="p1">Он попытался ее обнять.</p><p class="p1">— Смирно стой. Глаза открой, я не страшная. Теперь учись.</p><p class="p1">Она осторожно, очень тихо стала целовать его в углы губ, обдавая его слабым запахом повидла и все той же амбры, несколько раз лизнула, один раз больно куснула. Он дернулся.</p><p class="p1">— Не дергаемся, стоим прямо, — проворковала она.</p><p class="p1">Даня кивнул, чувствуя себя идиотом.</p><p class="p1">— Целоваться, — приговаривала Варга воркующим шепотом, — надо не так, как будто ты ешь девушку, а так, будто сдуваешь пыльцу с бабочки. Девушка не еда, девушка — бабочка.</p><p class="p1">Сейчас она разнежит меня, понял Даня, а потом — как того дракона…</p><p class="p1">— Девушка все сделает сама, — приговаривала Варга, обнимая его за шею. Тут он утратил всякую сдержанность и принялся-таки целовать ее куда попало — в глаза, в холодный нос, в горячий рот, ускользавший и уклонявшийся.</p><p class="p1">— Ничего не умеет, совершенно дикий, — сказала Варга. — Понравилось, что ли? Хватит. Хватит, я сказала, не то больше никогда!</p><p class="p1">Он смиренно застыл.</p><p class="p1">— Глина полезла, — повторила она загадочно. — Ну а хоть бы и глина? Пошли. Никого не осталось приличных, но на два раза сгодишься. Сегодня больше ничего не будет. Я сама к тебе теперь приду. Ты где живешь?</p><p class="p1">Даня, с трудом ворочая пересохшим языком, сказал.</p><p class="p1">— Там и сиди, и жди. — Она расхохоталась. — Ладно, веди меня домой, тут скоро станет темно и страшно. Вылезут ужасные насильники, меня изнасилуют, а тебя сожрут.</p><p class="p1">— Слушай! — не выдержал Даня. — Ты чего-нибудь другого можешь ждать от людей?</p><p class="p1">— А что со мной еще можно делать? — изумилась она. — Жрать меня неинтересно, я худая.</p><p class="p1">— Ты очень милая все-таки, — сказал он.</p><p class="p1">— Что значит — «все-таки»? Два раза поцеловал и думает, все можно. Ты прах мой недостоин целовать, понял? Прах!</p><p class="p1">— Прах — это останки, — пояснил Даня.</p><p class="p1">— Вот-вот, я это и хочу сказать. Останки целовать недостоин. Пошли, я замерзла.</p><p class="p1">Он стянул с себя куртку и укутал ее.</p><p class="p1">— Теплый, — сказала она неодобрительно. Видимо, в ее лексиконе это было такое же ругательное слово, как у апостола Павла, — но куртку приняла. Все ругают теплых, и всем они нужны, когда станет холодно.</p><p class="subtitle">3</p><p class="p1">О сне, разумеется, не могло быть и речи. Ему немедленно надо было рассказать о Варге и обо всем, что было, кому угодно. Но дядя спал, в о том, чтобы сунуться к Поленову, Даня не помышлял даже в эйфории. Некоторое время он метался по кухне, выходил на лестницу, пробуя курить, кашлял и с головокружением возвращался в комнату. Дядя тяжело ворочался, всхрапывал, открывал мутные глаза и бормотал невнятное — кажется, из ролей: «Оставь, оставь… Там быть не может ничего, где может не быть ничто…» — и вдруг, осмысленно, ясно: «Нужно другое, но другого нет. Другого нет! Маленький дом среди деревьев, темных деревьев» — и оседал снова.</p><p class="p1">Тлела, зеленела, светилась дальней оранжевой полосой над городом весенняя ночь, в приоткрытое окно веяло сладкой гнилью близкой воды, и вся комната была полна вешним, исконно питерским запахом гнили и похоти, размножения и разложения. Все это плотские дела, но ничто не цветет так узорчато, как плесень. Зеленая, оранжевая висела над городом весна, ночь желания и презрения, посула и обмана, и текучая вода лгала каждым бликом. Не было никакой возможности молчать. Надо было написать какие угодно слова, хоть кому-то — и Даня вспомнил Григория, с которым никогда не сказал двух слов, Григория, говорившего «экзоистика». Он был отчаянный, беспримесный дурак, претенциозный и скучный, но что поделать, если больше написать было некому. Даня уселся к столу и, не зажигая лампы, чтобы не тревожить дядю, принялся сочинять в несвойственном ему панибратски-гусарском духе письмо о своей любви.</p></span></span>
