<p class="p">Глава первая</p>
</div><p class="subtitle">1</p><p class="p1">Есть дома, в которых никто не был счастлив.</p><p class="p1">Такой дом сам себе не рад. Стоит он на городской окраине, в конце кривой улицы, перегородив ее и означая собою тупик. За ним овраг, лопухи, зонтики дудника и сныти, ржавые остовы кроватей, разросшаяся сирень, в зарослях которой находят порою такое, что потом без дрожи не можешь вспомнить саму идею сирени. Здесь конец города, начало хаоса. Всякий, кто забрел сюда, хочет прочь отсюда.</p><p class="p1">Такой дом стоит в стороне от жизни, в складке времени, выстроенный хмурым, темным человеком, совершившим постыдную ошибку в самый миг рождения и сознающим, что исправить ее невозможно. Он строит его для своей семьи, чтобы мучить жену и тиранить отпрысков, либо для конторы, в которой намерен заниматься горьким и бессмысленным делом; а то еще бывает, что в такой дом поселяется священник, не верящий в Бога. Иногда пройдет мимо дома человек, наделенный зрением, всмотрится в серые доски, сменившие столько цветов — и веселенький голубенький, и вешний зелененький, будто можно судьбу перекрасить, — да и скажет себе: отчего не снести горбатую уродину? Вон уж всю улицу перезастроили, одно эта деревянное двухэтажное недоразумение болтается в конце улицы Защемиловской, прозванной так в честь деревни Защемиловка, в которой сорок пять дворов защемило меж двумя притоками Охты, да так и оставило навеки. Но тут как раз выясняется, что снести злосчастный дом никак нельзя, потому что размещается в нем учреждение, никому ни за чем не нужное, а стало быть, особенно важное. Обычное учреждение зачем-нибудь нужно, а потому у него есть начальство, с которым можно договориться — выждать присутственный час, подкараулить у двери, прорваться сквозь басовитое «я занят, за…», да и хлопнуться в ноги: ваше превосходительство, не велите казнить, прикажите снести чеготозаготовочный трест на Защемиловской! И в глазах начальства мелькнет осмысленный вопрос: что он там делает, этот трест? Ведь давно ничего не заготавливает! И глядишь, через полгода на месте двухэтажного позорища уже что-нибудь роют, или трамбуют, или хоть вбивают качели для детворы. Но есть учреждения, которые породила давно исчезнувшая инстанция, а потому пожаловаться на них некуда. Такое учреждение ходит прямо под Богом, да и он про него давно забыл; и справка из него непременно требуется при любом трудоустройстве, хотя зачем — не ответит и самый въедливый кадровик. И ведь улицу, улицу не переименуешь! Не то чтобы над ней летал ангел-хранитель, а просто она никому не подотчетна, выпала отовсюду, не во всяком справочнике упомянута: если бы кто о ней вспомнил — тотчас бы переименовал, как почти все улицы в городе, но тут в голову реформатора закрадется мысль — а не было ли на путиловском заводе сознательного пролетария Щемилова, погибшего в боях с царской шайкой еще в девятьсот пятом году? А ну за мной, крикнул пролетарий, и все побежали за Щемиловым, и улица с тех пор носит свое боевитое название, напоминая о подвиге героя, в следующую минуту изрубленного шашками в неопознаваемый фарш; почему-то о гибели товарища Щемилова хочется думать со злорадством, представляются даже слезы его молодой востроносой жены, но это просто день сегодня такой желчный, какие часто бывают в нашем городе. Мало ли у нас улиц, есть даже Бармалеева, хотя о героической гибели товарища Бармалеева, изрубленного в фарш царской шайкой, нам на данный момент ничего не известно.</p><p class="p1">Посещать такое учреждение хоть раз в жизни приходится всякому, и всякий норовит уйти оттуда поскорей, ибо чувствует, помимо омерзения, невероятную притягательность деревянного дома на окраине. Так притягивает другое измерение — то, в котором наши смыслы ничего не значат, а есть свои, для нас недоступные. Один совслужащий ходил, ходил за пустяковой справкой, для которой требовались еще и еще справки, — да так и пропал, и никто его не видел, поискать разве в овраге среди сирени. Иногда, выписывая наконец требуемый документ, начальник учреждения в последний момент, занесши уже печать над бланком, вдруг замирал и нехорошо глядел на просителя, как бы предлагая остаться. А может, останешься? Другой двери из этого мира нет, а через нас пожалуйста. Но овраг за домом был так пугающ, а зубы у начальника такие крупные, что проситель отводил взгляд, получал справочку и, не оглядываясь, летел по Защемиловской восвояси.</p><p class="p1">В таком-то доме располагалось в 1925 году Управление по учету жилого фонда города Ленинграда, занятое учетом пустующих помещений и аварийных зданий, ожидающих сноса.</p><p class="subtitle">2</p><p class="p1">Весной 1925 года в Ленинграде шептались о судьбе пишбарышни Ирочки, без остатка исчезнувшей среди рабочего дня при обстоятельствах невообразимых. Трудность была в том, что очевидцами ирочкиного исчезновения оказались только прямой его виновник, ирочкин начальник Мокеев, да потрясенная Лариса Шматко, девушка из Полтавы, приглашенная Мокеевым в свидетельницы крутого разговора. Желал дать полтавчанке понятие о своем могуществе, а заодно доставить радость зрелищем чужого разноса — ничего не поделаешь, таким ему представлялся характер Шматко; в другую не влюбился бы.</p><p class="p1">Говорили, будто Ирочка приглянулась Мокееву, но не ответила на притязания, — бросьте, она была вовсе не по нему. Как мужчина холостой и утомленный еще в гражданскую имел право в рамках угара НЭПа. Но мог ли Мокеев домогаться существа столь жалкого, как пишбарышня Ирочка — не бывшая даже, но бывшенькая, вшивенькая? Мокееву нравились женщины толстые, половое чувство было в нем сильно.</p><p class="p1">Мокеев вообще не понимал, зачем нужны такие, как Ирочка. Он удовольствовался бы, на худой конец, вспышкой гнева с ее стороны — все что-то живое, но проклятая водоросль не умела сердиться. Бледная, гибкая, с треугольным безвольным лицом, хлопающая прозрачными серыми глазами — она молча глотала его окрики, обещания оштрафовать, вычистить и сократить. Чем больше Мокеев орал на нее, тем сильней злился на себя за это, — но поскольку плотные, сочные натуры не могут обращать гнев на себя, он привычно ненавидел Ирочку, повинную теперь и в том, что хороший человек вынужден драть горло, утомленное уже, напомним, в гражданскую.</p><p class="p1">Ее ничто не брало. Он находил у нее выдуманные ошибки, сегодня разносил за одно, а завтра за противоположное, — она покорно кивала и переделывала, выполняя взаимоисключающие указания. Вся работа управления не могла иметь такого государственного значения, какое придавал Мокеев всякой ирочкиной опечатке. Потом, место в коллективе: она не зналась ни с кем, убегала к старухе-тетке, полупарализованной генеральше, и ни в день работника коммунхоза, ни в день памяти изобретателя телеграфа товарища Морзе не отправлялась с товарищами в культурный пивзал, хотя, казалось бы, кто ты такая. Если бы Мокеев хотел ее вычистить, он бы легко это сделал еще в прошлом году, когда первая волна сокращений покатилась по канцеляриям и трестам Ленинграда. Но всего мучительней было знать, что пишбарышня Ирочка нужна Мокееву — без нее теперь и работа была не в радость. Руководство другими подчиненными, общим числом шесть, далеко не доставляло ему тех чувств. Ирочка была враг, слабый, покорный и тем неуязвимый. Сводить счеты с ней можно было бесконечно. Мокеев изобретал все новые штрафы и в роковой день исчезновения пишбарышни придумал сделать так, чтобы вовсе оставить ее в сентябре без оклада — под предлогом якобы утраченной копии отчета, которой он ей не давал. Ирочка притом знала, что отчета не существовало на свете, но возразить мешала подлая ее природа. В тот апрельский вечер, светлый, воздушно-прозрачный, что случается иногда и на ленинградских широтах, — так что управление работало при открытых окнах, — Мокеев топтал Ирочку с особенной силой, все более заводясь, но отлично владея собою. Легче легкого было бы ему замолчать, внезапно смягчившись, — и он применил уже эту тактику, после пяти минут крика вдруг спросив вкрадчиво: «А может, дома что-нибудь, Абрикосова? Не стесняйтесь, скажите. Может быть, тетка больна?»</p><p class="p1">— Тетя умерла месяц назад, — прошелестела Ирочка, глядя перед собой птичьими, навсегда перепуганными глазами.</p><p class="p1">— Что ж вы не сказали? Или, по-вашему, тут звери сидят? Вы считаете меня кем, Абрикосова?</p><p class="p1">Все это он говорил сладко, вкрадчиво, по-товарищески. Шматко, нередко используемая им для живого примера, трепетала в углу.</p><p class="p1">— Вот Шматко, — медово продолжал он, наслаждаясь разбегом перед новым воспарением. — Недавно здесь, и не с Ленинграда, а с Полтавщины, славные боевые места. Пишмашинку, почитай, только тут увидела. А уже и часть коллектива, и гораздо производительней. Ведь я слежу, я подсчитываю. А что такое вы, Абрикосова? Почему вы считаете всех тут животными, а себя выше всех?!</p><p class="p1">— Я не считаю, — белыми губами сказала Ирочка.</p><p class="p1">— Не слышу! — закричал Мокеев. — Вы не удостаиваете мне тут, вы не даете мне прямой ответ! Вы думаете, что если ваша тетя умерла, и это надо еще выяснить, какая тетя, — вы можете саботировать! Так вы не можете тут саботировать, и я как участвовавший в гражданской войне не позволю! Я сделаю так, что вы почувствуете! Я — вас — лишаю — месячного оклада!</p><p class="p1">Эту фразу он выговорил торжественно, шалея от сознания своей власти. Лишить месячного оклада сегодня — было жесточе, нежели убить тогда. Тогда жизнь стоила меньше нынешнего оклада.</p><p class="p1">Ирочка подняла на него прозрачные глаза с непролитыми слезами и посмотрела со сложным выражением, словно говоря: умоляю вас, остановитесь, ибо далее может произойти нечто от меня не зависящее; еще немного, и я не смогу это предотвратить. Но Мокеев не обучен был считывать такие сложные послания, набрал воздуху для следующей тирады, и этого оказалось достаточно, чтобы началось непредставимое. Так в ином положении сочному самцу во время половой страсти довольно шевельнуться, чтобы все закончилось к обоюдному разочарованию; Мокееву задним числом пришло в голову именно это сравнение. Стоило ему открыть рот, как пишбарышня Ирочка приподнялась над стулом, выпрямилась в воздухе и замерла в десяти сантиметрах над полом, едва не касаясь потолка головою.</p><p class="p1">— Вы что, вы кто это, на что вы намекаете, Абрикосова! — прохрипел Мокеев, но стыдить Ирочку не было никакой надобности. Даже в ее взлете не ощущалось намека на бунт. На лице ее появилось испуганное и вместе удовлетворенное выражение, как у ребенка, которого, несмотря на просьбы, долго не сажали на горшок, и теперь он мокр, но торжествует. Она висела в воздухе, бессмысленно шевеля губами и чуть разводя руками в стороны. Мокееву пришло в голову, что это ужасная месть. Он разбудил силу, далеко превосходившую его должностные полномочия.</p><p class="p1">Как вспоминала Шматко, несомненна была беспомощность Ирочки, потрясенной собственной метаморфозой не меньше очевидцев. Она попыталась сделать в воздухе нечто вроде реверанса, беззвучно пробормотала «Au revoir» и, медленно подплыв к окну, вышла с третьего этажа.</p><p class="p1">Всего удивительней было ее кратковременное зависание на уровне той самой конторы, в которой она проработала мучительный, полный неотмщенных унижений год, — и последний взгляд, не столь покаянный, сколь недоуменный: Господи, всего-то и нужно было, чтобы прекратить это, — чего же, помилуйте, я ждала? И она снова недоразвела руками, заставив Мокеева апоплексически побагроветь всей шеей.</p><p class="p1">В следующее мгновение она кивнула — то ли укоризненно, то ли примирительно, — и свечой мышиного цвета ушла в балтийские небеса, исчерченные перистыми облаками.</p><p class="p1">Больше ее никто никогда не видел, сказали бы мы, желая ввести читателя в заблуждение, — но нам придется пожертвовать эффектной фразой, выразившись скромнее: в следующий раз ее увидели нескоро, и совсем не те, кто знал до вознесения. Мокееву пришлось-таки расплатиться за год измывательств над бывшенькой: никто ничего не доказал, не было даже и трупа, — но все-таки Мокеев был несомненно виноват, ибо человек, у которого улетают подчиненные, грешен самым страшным грехом. Он разбудил силу, которую не смог укротить, и теперь она действует в мире. Все-таки надо было остановиться. Это и говорили Мокееву понимающие люди, которым он рассказывал эту историю по культурным, а потом все менее культурным пивзалам, пока не исчез так же бесследно, как пишбарышня Ирочка. Как это вышло, никто достоверно не знал. А как всегда исчезают люди, посягнувшие на имаго — безвредное, бесплотное имаго, почти уже покинувшее мир живых? Смеем вас уверить, ничего особенного. Проходит час, или день, или два месяца — в зависимости от силы прощального взгляда, который посылает имаго своему мучителю. Потом является утром коммунальный сосед, заметивший, что Мокеев давно не выходил из комнаты. У Мокеева заперто. Идут за управдомом. Бегут за дворником. Сурово топают понятые. Милицию ничем не удивишь, и уполномоченный с мясной фамилией вроде Хрякин говорит, что не паникуйте, граждане, в последнее время участилось. Вероятно, работает с особенной жестокостью банда. Трудно объяснить, как сделано. Может быть, кислота, а может, саморазложение. Допустим, банда бывших профессоров, которые знают такой секрет сокрытия трупа, что в результате сокрытия по комнате растекается как бы лужа, в середине которой лежит обувь. Одежда, как правило, куда-то девается — наверное, тоже растворяется. Мало кто обращает внимания на два желтых камушка, сиротливо лежащих в этой луже ближе к левому краю. Как же вы говорите, что ничего не осталось? Вот, осталось.</p><p class="p1">А поскольку родственников у Макеева нет, то обувь хоронят в закрытом гробу, комнату получает преподаватель черчения Лямин, которому и дела нет, каким образом она освободилась — он материалист и не верит ни в какую банду профессоров, — а уполномоченный Хрякин закрывает дело, которое десять лет спустя мог бы повесить на вредителя-химика Локтева, надо же что-то на него повесить, но до него еще ого-го сколько, Локтев еще преподает в Ленинградском политехническом институте и знать не знает о своем вредительстве. И все они — Хрякин, Лямин и Локтев — никогда ничего не узнают и низачем тут больше не нужны. Прощайте, друзья.</p><p class="p1">А в управление учетом жилфонда прибыл начальствовать Борис Григорьевич Карасев, который и принял на место улетевшей пишбарышни Даниила Галицкого, истинного героя нашей истории.</p><p class="subtitle">3</p><p class="p1">В этот день одна улетела из Ленинграда и нашего повествования, а двое прибыли. Эти двое были двадцатилетний Даниил Галицкий, ехавший в Ленинград из Симферополя, и его высокий, бритый, лысеющий попутчик лет сорока пяти, севший на поезд в Москве. Лицо его было Даниилу смутно знакомо, но откуда — он не помнил. Длинное, значительное, с куполообразным лбом, тонким ртом, хищным носом, отмеченным благородной горбиной, и неожиданно маленькими, приподнятыми в высокомерном изумлении бровками, — оно могло принадлежать позднему римлянину, средневековому астроному, британскому натуралисту и русскому авантюристу. Попутчика одинаково легко было представить перед ордою варваров, судом инквизиторов, толпой дикарей или отрядом полицейских: всем своим видом он словно вопрошал с легкой брезгливостью — что это, братец, такое? Я дивлюсь не твоей палице, подлому потайному ножу или кривому туземному копью, а тому, что с этим жалким арсеналом ты посмел покуситься — на кого же? Уж не думаешь ли ты, что мы ровня?</p><p class="p1">Все эти картины Даниил вообразил по очереди, и больше всего понравилась ему та, что с астрономом. Словно повинуясь его фантазии, незнакомец достал из потертого коричневого несессера синюю бархатную шапочку и надел ее, погладив перед этим лысину.</p><p class="p1">— Даже остаткам волос нужно придать верное направление, — с достоинством пояснил он.</p><p class="p1">Даниил сидел напротив на длинных нарах, прибитых в два ряда вдоль всего вагона, и рассматривал лысого с неприличным любопытством. За трое суток путешествия попутчик был первым пассажиром, на котором хотелось задержать взгляд. Лица прочих были в лучшем случае скучными, в худшем опасными, но всегда плоскими. За каждым стояла долгая пустая жизнь, в которой нечего вспомнить, кроме драк, стыдных болезней и неудавшихся обманов. Даниил изо всех сил боролся с высокомерием: мать учила, что в каждом, если взглянуть глубоко, отыщешь чудо, и рассказывала древнее предание (самодельное, как все ее сказки) — о волшебнике, видевшем во встречных драгоценные камни; но сколько ни вглядывайся в лица спутников, ни вслушивайся в разговоры, странно сочетавшие жалостность и злобу, — видишь все один и тот же камень, похожий на известняк. Иногда, впрочем, ему виделся туф — коварный именно мягкостью, обрушивающийся под ногой. Мать учила бояться податливого и верить твердому, пусть и недоброму с виду.</p><p class="p1">Ночью все храпели, днем ели — то и другое с вызовом: теперь можно. У выехавших из Симферополя запас был скудный, Крым голодал. Единственное приглянувшееся Даниилу существо сошло в Харькове. Впрочем, тут рассчитывать было не на что: существо беспокойно оглядывалось, чувствуя на себе даниилов взгляд, а обнаружив источник беспокойства, презрительно дернуло плечиком. Даня знал, что внешность у него неромантическая, а что всего обидней — и не совсем простецкая: он очутился меж двух огней, никому не свой. Хорошо было дураку Григорию, который в жизни двух книг не прочел, а выглядел, как Манфред. Черные густые брови, пылающие очи, эспаньолка — как говорил он сам, «экзоистика».</p><p class="p1">Да-с, сошло в Харькове (ревниво подсмотрел — встречать пришла мать, похожая, но расползшаяся; то же будет и с ней — слегка утешился), и там же набились новые попутчики, с запасцами: лепешки, варенец, картопля, вяленая рыба, сало, мутные бутыли с бумажными затычками, цыбуля, благодушество. Даниилу не предлагали. Хлеб и рыбу он давно съел, ненавидя проклятый аппетит, и теперь только косился на чужое изобилие. Вспомнить — он и в детстве редко ел досыта, но тогдашний голод было не сравнить с нынешним, когда еды требовал не рот, не желудок, но все тело. Если бы подсесть, завязать простой, душевный разговор — но этого он не умел и за двое суток намолчался. Пробовал сочинять стихи, голод выворачивал мысли, заставлял рифмовать несообразное — «Я одинок в толпе сограждан, единство мне не по плечу. Кусок селедки мной возжаждан, я сала, сала я хочу!». Изволь тут быть лирическим поэтом. Взялся мысленно сочинять письмо тетке в Феодосию: «Дорогая Женя! Первые три часа в поезде я пытался думать о ритме, надеясь, что смогу совпасть с ритмом вагона и войти таким образом в гармонию. Сначала мне казалось, что он перескакивает с дактиля на хорей, потом — что это сочетание хорея с ямбом, и я даже пробовал экспериментировать в этом редком размере, но выходило почему-то очень глупо: „Еду — туда, знаю — куда, небо — в окне, сердце — в огне“. Почему оно в огне, когда я гораздо спокойней, чем думал? Папа плакал, и я стыдился своего равнодушия. А потом все мысли о ритме закончились, потому что напротив сидит совершенно свинообразный мужик, с первого взгляда почуявший во мне другую породу, а поскольку ему не на что отвлечься, он сверлит меня глазами, выжидая, когда я чем-нибудь себя выдам. И даже когда я, не двигаясь, лежу на деревянной полке, как саквояж, я этим себя выдаю, потому что надо сойти к нему и сказать что-нибудь, начинающееся со слова „Братишечка“. Интересно, что он будет есть? Неужели меня?! Милая Женечка, я никогда не думал, что так позорно завишу от желудка. Приходится писать это письмо в уме, иначе к обычной неразборчивости прибавится тряска, и ты уж вовсе ничего не разберешь. А так, мне кажется, все-таки разберешь».</p><p class="p1">За окном в это время тянулся серый гладкий лиман с его отвратительной вонью, соляными отмелями и редкими птицами, перепархивавшими с островка на островок. Иногда они хватали что-то из воды — неужели рыбу? Какая рыба живет в этой мертвой воде? Говорили, что мертвые сохранялись в ней нетленными, просаливаясь насквозь; в соли хранили мумии… Страшно представить эту рыбу, приноровившуюся ко всему; но неужели я сам таким не буду? Ведь за этим я еду… Разве не вся жизнь, установившаяся сейчас, похожа на это плавание выродившейся рыбы между нетленными мертвыми? Но этого он Жене писать не стал, она не любила мрачных фантазий.</p><p class="p1">Он успел сочинить за двое суток два письма Жене, одно — племяннице Вере, с шарадой, и одно отцу. Писать отцу было труднее всего, потому что не было уверенности, что он получит этот мысленный призыв не беспокоиться, и вдобавок это такое пустое слово! Даня всегда стеснялся жалости к отцу и все-таки не умел говорить с ним откровенно. Вале было проще, он — папин. Во вторую ночь заснуть оказалось труднее — в вагон набились москвичи-вузовцы, горланили песни, спорили и шумно ругали какого-то Гапова, видимо, из старых преподавателей. Все они ехали в Ленинград праздновать первомай. Даня им мучительно завидовал. К счастью, среди существ не было хорошеньких. Надо уже придумать какое-то слово: «девица» — отвратительно, это для Григория, а «девушка» — общо, старо. Угомонились они только к четырем часам, никто не смел сделать им замечания: как же, наша юнь, как писал Мельников! У Дани заболела голова, а слабость была такая, что притупились все чувства, даже голод.</p><p class="p1">Тогда, в темноте, Даня не разглядел странного попутчика. Он только услышал его торжественный голос с нижней полки:</p><p class="p1">— Благодарю вас, мне совершенно удобно.</p><p class="p1">Этот голос не просто свидетельствовал, а заявлял о чуждости — в нем была постановка на место. Дане сделалось от него спокойно, как от соседства твердыни, и он заснул.</p><p class="p1">Теперь Даня сам пялился на странного спутника с той же бесцеремонностью, с какой его до самого лимана разглядывал свинорылый. Он понимал, что это неприлично, но не мог оторваться, как невозможно отлепиться от родника после тюремной тухлой воды.</p><p class="p1">Предполагаемый астроном ничуть не смущался. Он благожелательно улыбнулся Дане и огляделся с мечтательностью путника, обозревающего горный вид.</p><p class="p1">— Этот вагон знавал лучшие времена, — произнес он негромко. — Мне кажется, сейчас он должен чувствовать себя, как желудок, набитый несвежей пищей.</p><p class="p1">— Или слишком свежей, — робко пошутил Даня.</p><p class="p1">— Нет, не обманывайтесь. Я слышу мысли этого вагона. Он ведь прежний, — спутник выделил последнее слово. — До того, как его обезобразили этими… нарами, он был вагоном второго, а может быть, и первого класса. В нем отправлялись за границу. В купэ было приготовлено хрустящее белье. При каждом купэ был душ. Все дышало комфортом. И это было не пошлое удобство тела, а забота о путешествии души. Знаете ли вы, что во время путешествия душа особенно уязвима?</p><p class="p1">— Для чего? — пролепетал Даня, потрясенный этим потоком человеческой речи среди выкриков о шамовке и жиганах.</p><p class="p1">— Решительно для всего, — твердо сказал незнакомец. — В дороге нас не охраняют духи дома, и мы открыты вечно странствующим сущностям, чье присутствие поначалу незаметно. По большей части это души, не нашедшие успокоения. — Он говорил таинственно и убедительно, словно читая по древней книге. — Вспомните, множество раз на повороте дороги вас охватывал внезапный страх, или ночью, когда поезд ускоряется на спуске, странная тоска словно сама влетала в вас. Иногда эти призраки видимы и стоят среди степи, как столбы тумана. В дороге душа беззащитна перед ними, и потому особенно важно снабдить вагон признаками дома. Ныне этот навык утрачен совершенно. Я удивляюсь, — произнес он, еще выше поднимая бровки, — я удивляюсь, как этого еще не поняли.</p><p class="p1">Даня улыбнулся. Игра захватила его.</p><p class="p1">— Замечательно, должно быть, слышать мысли вагона, — сказал он, улыбкой намекая на то, что поддерживает шутку.</p><p class="p1">— Ничего замечательного, — строго отвечал астроном. — В последнее время столько жалоб, что я чувствую себя стряпчим. Но выбора не было, я отказаться не мог.</p><p class="p1">— Что же, — все еще не веря в его серьезность, подначил Даня, — я вам тоже что-то сообщаю?</p><p class="p1">— Несомненно, — отвечал попутчик, впиваясь в Даню светлыми круглыми глазами. — Вы, разумеется, попросите меня рассказать вам все, что знаете сами, дабы проверить мои способности. Это было бы слишком просто. Для души, скитающейся второе тысячелетие, мир отвратительно прозрачен. Я расскажу то, чего вы не знаете.</p><p class="p1">— Согласитесь, однако, что этого я проверить никак не смогу, — оживленно проговорил Даня, от волнения картавя больше обычного.</p><p class="p1">— Вам не нужно ничего проверять, ибо истины нельзя не почувствовать, — назидательно произнес астроном. — Не угодно ли, однако, вот этого?</p><p class="p1">Он протянул Дане круглую солдатскую фляжечку.</p><p class="p1">— Я не пью, — смутился Даня.</p><p class="p1">— Я знаю, — кивнул попутчик. — Но плохого друзьям не предлагают, тем более в дороге.</p><p class="p1">Даня был страшно польщен и сделал крошечный глоток. Против его ожиданий, жидкость не обожгла языка и не вызвала слезы на глаза — это был травяной настой с сильным мятным привкусом.</p><p class="p1">— Крепкий чай — прекрасный и плотный завтрак, — сказал попутчик, принимая фляжечку. — Неужели вы думали, что я предложу вам с утра одурманиваться водкой? Я удивляюсь…</p><p class="p1">— Спасибо, — сказал Даня. — Меня зовут Даниил.</p><p class="p1">— Это неважно. Мое нынешнее имя вам тоже вряд ли что-то скажет, — царственно отвечал астроном, отнимая у Дани возможность хоть как-нибудь называть его мысленно. Какой, в самом деле, астроном в Ленинграде! — Скажу вам лишь, что на вашем месте я уже знал бы свое истинное имя. Для этого достаточно вслушаться — конечно, не здесь, не в этом гаме, — молча и сосредоточенно представить себе огненную точку на правой половине черепа и медленно переместить ее на левую наиболее коротким путем. Одновременно вы должны как бы с силой направить свое тонкое тело вспять по темному тоннелю, который вам вскоре откроется. Там, при входе в ваше прежнее воплощение, к вам обратятся по имени, и это будет подлинное имя, приоткрывающееся только между земными существованиями. Не слушайте ничего, кроме имени. В первый раз можно услышать лишнее.</p><p class="p1">Даниил попытался вообразить огненную точку.</p><p class="p1">— Не сейчас, — повторил попутчик. — Это требует упражнений и значительной сосредоточенности. Подробнее вы можете прочесть… впрочем, это пока не нужно.</p><p class="p1">Даниил уже не знал, верить или улыбаться. На всякий случай он робко улыбнулся и сказал:</p><p class="p1">— Не знаю, мне и это имя нравится. Даниил во рву львином — слышали? Самая любимая моя легенда.</p><p class="p1">— И видел, — невозмутимо кивнул безымянный собеседник.</p><p class="p1">— Рембрандта? — горячо подхватил Даниил. — Но мне больше нравится Рубенс. Я знаю, конечно, вы скажете, что пошлость. Про Рубенса всегда говорят. Но там львы удивительно домашние, прелестные, и разве вся штука не в том, чтобы сделать льва домашним? Мне еще нравится барельеф Вормского собора, я видел только в книге, но там замечательный львенок…</p><p class="p1">— Я видел это не на барельефе Вормского собора, — сказал попутчик со значением. — И смею вас уверить, в этих львах, даже при виде пророка, не было ничего домашнего. Лев не бывает домашним, это вы оставьте. Они его не полюбили, а просто устрашились.</p><p class="p1">Даниил улыбнулся уже без всякой робости. Если это был сумасшедший, то удивительно интересный. Посылает же Господь радость в конце скучной поездки!</p><p class="p1">— Чего же они устрашились?</p><p class="p1">— Схолического дара, — небрежно пояснил астроном. — Впрочем, вам этого еще не надо. Вам надо для начала следующее. Медленно вращая левым кулаком по часовому ходу, — он вытянул вперед левую руку, и Даня подумал, что в драке этот кулак, верно, стремителен и тверд, — правой кистью одновременно поглаживайте левое плечо в обратную сторону.</p><p class="p1">— Ну, это легко!</p><p class="p1">— Попробуйте.</p><p class="p1">Даня попробовал и убедился, что это крайне трудно, а главное, ни за чем не нужно.</p><p class="p1">— Допустим, я научусь, — сказал он, несколько уязвленный. — Что тогда?</p><p class="p1">— Тогда, — назидательно произнес незнакомец, — вам предстоит выучить еще 32 фигуры танца дервиша, и на тридцать третьей фигуре левое и правое полушария вашего мозга разорвут наконец порочную связь. Тогда мир чувственных представлений отделится от мира образов, и вы начнете видеть невидимое, а пожалуй, даже и слышать. Остальное нетрудно.</p><p class="p1">— Что-то похоже на Блаватскую, — неуверенно сказал Даня.</p><p class="p1">— Что ж, и Елена Петровна кое-что знала, — кивнул попутчик. — Но это из Георгия Ивановича. Знает он не в пример больше, а ведет себя строже.</p><p class="p1">Даня молчал, не решаясь ни о чем спросить человека, видевшего Даниила во рву, но прерывать разговор ему не хотелось.</p><p class="p1">— А если вы видите невидимое, — сказал он наконец, — то можете ли ответить мне на вопрос, который…</p><p class="p1">— Не нужно, — величественно отвечал попутчик, выставляя вперед сухую ладонь. — Не оскорбляйте мое искусство устными вопросами. Задайте их умственно, как имеете обыкновение сочинять, и повторите, глядя прямо на меня. Их должно быть не более трех. Готовы?</p><p class="p1">Даня на секунду задумался и решительно мотнул головой.</p><p class="p1">— Готов.</p><p class="p1">— Смотрите прямо на меня, — негромко приказал попутчик.</p><p class="p1">Даня вытаращил глаза и мысленно повторил три своих вопроса.</p><p class="p1">— Любопытно, — медленно произнес астроном. — В последний раз эти три вопроса, в иной последовательности, задавал мне один самоубийца при отплытии… впрочем, это неважно. Что же, ответ будет короток, но вам ведь не нужно много. Вы хотите знать — да или нет?</p><p class="p1">Даня кивнул, трепеща.</p><p class="p1">— По первому вопросу, — изрек незнакомец, напряженно вглядываясь в его карие глаза своими серыми, — несомненное и безусловное да, но подумайте, нужно ли вам это? Не лучше ли так, как было?</p><p class="p1">Даня вздрогнул.</p><p class="p1">— По второму, — задумчиво продолжал оракул, — я не был бы столь категоричен. И все же да, да, при всех оговорках, слишком понятных вам самому.</p><p class="p1">Он важно кивнул и потер виски, отчего глаза его на миг стали китайчатыми.</p><p class="p1">— Что до третьего, то я удивляюсь, — произнес он, слегка разводя руками. — Отчего вы думаете, что это важно? Почему вам не спросить меня что-нибудь о России?</p><p class="p1">— Вы же сказали — о себе, — пролепетал Даня.</p><p class="p1">— Я? Ничего подобного. Это вы сами себе сказали. Но раз вам в самом деле важно, скажу одно: это произойдет вовсе не так, как вы думаете, и не ранее, чем будете готовы, но случится с той же неизбежностью, с какой мы приближаемся к месту нашего назначения. Что, довольно?</p><p class="p1">Даня не знал, смеяться ему или пугаться. Его три вопроса были: устроится ли он на работу у дяди, стоят ли чего-нибудь его стихи и окончится ли в Ленинграде наконец его затянувшееся девство. Астроном ответил точно, хотя ответы его были приложимы к любым трем вопросам, вплоть до тревоги о возможной войне с Англией. Но про Англию Даня не спрашивал.</p><p class="p1">— Хорошо, но можно еще? — попросил он еще один шанс, надеясь задать такой вопрос, на который не может быть расплывчатого ответа.</p><p class="p1">— Я сказал: не больше трех. Это страшная трата умственной энергии, и потом — зачем вам знать будущее? Все равно узнаете.</p><p class="p1">— Я хотел не о будущем…</p><p class="p1">— Нет, нет. Да вы и сами легко научитесь. Упражнение простое: вам достаточно представить себя на чаше весов, но с абсолютной достоверностью, с буквальным видением их, с ощущением даже холода от их бронзы. И тогда вы сами почувствуете, поднимаетесь или опускаетесь. Для остроты чувств, пожалуй, полезно вот что, — и астроном неуловимым движением вынул из кармана плаща три резных китайских шарика. — Купите где угодно и катайте вот этак, — шарики так и замелькали между его длинными пальцами. — С этими движениями и вопросов не будет. Вопрос — всегда от неуверенности, а если правильно вращать — уверенность всегда с вами.</p><p class="p1">Он бережно спрятал шарики в карман, словно в них и впрямь содержалась сила.</p><p class="p1">— А! — радостно воскликнул Даниил. — Такие я видел.</p><p class="p1">Он в самом деле нередко наблюдал, как Валериан катает резные шарики в толстых пальцах — в последнее время все приметней дрожавших. Валериан рассказывал, что такие шарики нашли в египетской пирамиде — это были игрушки фараона, почившего пять тысяч лет назад. Если выучиться жонглировать ими, учил Валериан, — можно притягивать исполнение желаний.</p><p class="p1">— Где же вы могли их видеть? — высокомерно спросил незнакомец.</p><p class="p1">— У Валериана Кириенко, — гордо ответил Даня. — Я часто у него бывал, с ним дружила моя мать.</p><p class="p1">— Валериан, — произнес попутчик с легким неудовольствием, относившимся то ли к Кириенко, то ли к собственной памяти, недостаточно расторопной. — Я знал Валериана, но так давно, что многое стерлось… Между нами были споры, глубокие споры…</p><p class="p1">— В Париже? — подсказал Даня. Он знал, что Валериан прожил там три года, изучая живопись и позируя монмартрской богеме, писавшей с него бесчисленных Вакхов и клошаров.</p><p class="p1">— О нет, гораздо дальше. На месте Парижа тогда еще росли папоротники. Валериан — могущественный дух, но избыточное доверие к женскому… к материнскому… Я говорил, но он не внял. И потому, при всех дарованиях, обречен вечно путаться в низинах, тогда как мог бы… Впрочем, это и тогда уже было ясно всем в нашем кружке.</p><p class="p1">— Что же плохого в материнском? — запальчиво спросил Даня. Он обиделся за доброго Валериана — тем сильней, что в словах сумасшедшего была правда: рыжий толстяк, бог маленькой бухты, собиратель камней и корней, всеобщий спаситель и странноприимец был назойливейшим собеседником, с завыванием читал вслух длинные стихи, полные античных имен, заставлял смотреть неотличимые акварели и выражался напыщенней Квинтилиана. Что-то было в нем недовершенное, не дававшее воспарить, — то ли приземистость, то ли толщина, но Даня чувствовал, что будь Валериан строен, как кипарис — а не как три кипариса, по собственной его шутке, — это было бы даже хуже. Так, в балахоне, сандалиях, поперек себя шире, он был хотя бы ни на кого не похож. Чего-то было ему раз навсегда недодано — то ли дара, то ли умения им распорядиться; роковой изъян сказывался во всем, но более всего — в странной привязанности к матери, которая и саму ее, кажется, не радовала. Вал был женат дважды, но от обеих жен — петербургской и парижской — быстро сбегал в Судак. К Судаку он тоже был привязан накрепко, всю жизнь, как на вожжах, проходил на этих двух пуповинах, кажется, решив раз навсегда, что в Петербурге ему не быть даже вторым, а в Судаке он навеки первый. Так о нем говорили, хотя Даня никогда не верил — он всегда знал, что Вал и бухта созданы друг для друга, что в самом его имени (полным никто не звал, материнское «Вал» привязалось навеки) живет морская волна. Однажды он произнес долгий — как всегда, с цитатами на пяти языках — монолог о море и матери, о том, что от них нельзя отрываться, что для мудрых греков морское странствие было возвращением домой, в стихию, откуда вышла жизнь; он увлекся, как всегда, и дорассуждался до того, что девять лет одиссеевых странствий приравнял к девяти внутриутробным месяцам, а троянскую битву — к зачатию (Даниилу приходили в голову крамольные мысли о символике коня, и он хихикнул, но Вал, как всегда, не заметил). Он был чудак и кто хотите, но и самые скептические гости признавали его благородство; что до напыщенных речей, то, когда он с теми же цитатами нахваливал данины стихи, торжественно приняв его в кабинете, куда простые гости допускались лишь для самых сокровенных бесед, — Даня готов был слушать его бесконечно. А мать, что ж мать: со своей Даня и теперь вел нескончаемые мысленные беседы, думая, что она все слышит.</p><p class="p1">— В материнском? — переспросил спутник. — В материнском ничего дурного, но в детском… Вечные зародыши, что же в них путного? Тем обиднее, когда д а н о… — Он выделил слово в манере беллетриста Грэма, в миру Александра Степановича Кремнева, отшельником жившего под Ялтой, но трижды на даниной памяти заезжавшего к Валу; это был суровый, костистый алкоголик лет сорока пяти, принимался вдруг рассказывать таинственные истории из своих скитаний — то по голодному Петрограду, то по тропикам, — но, обведя взглядом собеседников, вдруг осекался и принимался бурчать о гонорарах, о кровопивцах, которые не печатают, о придирках квартирной хозяйки… Один раз с ним была жена, маленькая, светловолосая, с круглыми щеками; она явно стыдилась Грэма и робким поглаживанием его огромной костистой лапы пыталась остановить очередной монолог. Грэм вдруг принялся описывать картину, которую видел во сне — «Край пропасти, и в него вцепилась рука, видите, вот эдак… Вот бы вам написать, Валерьян Александрович, а не эти в и д ы. Зачем рисовать виды, когда их и так видно?».</p><p class="p1">— Но вы хотя бы согласны, что ему дано? — запальчиво спросил Даня.</p><p class="p1">— Я удивляюсь, — сказал незнакомец. — Разве я стал бы говорить с тем, кому не дано?</p><p class="p1">Даня вспыхнул от удовольствия.</p><p class="p1">— Однако вы же отрываетесь, — продолжал астроном. — Я без всякого вашего рассказа знаю, что вы едете из Крыма, который покидали перед тем весьма редко. Смею уверить, здесь вам предстоит многое из того, что там не приснилось бы.</p><p class="p1">— Вы и будущее знаете? — спросил Даня, силясь выглядеть снисходительным насмешником, но втайне боясь ответа.</p><p class="p1">— Будущее? — фыркнул незнакомец. — Что вы называете будущим? События на реальном плане мало важны, а на астральном все дано в первый миг творения. Неужели стоит принимать за реальность вот это?</p><p class="p1">Он небрежно, не оборачиваясь, указал длинным пальцем себе за спину; там, в мутном окне вагона, показался Обводный канал. Даня помнил слова матери о том, что это граница города, — девять лет назад они втроем, с мамой и Женечкой, въезжали сюда, в последний раз беспечно путешествуя вместе. Он не бывал с тех пор в Петербурге и мало что помнил: город предстал ему средневековым, темно-кирпичным, — мать знала, что он любит рыцарские сказки, и водила не по светлым и воздушным площадям, а по узким улицам, по пустым и как бы застывшим в безвременье закоулкам, мимо зданий со стрельчатыми окнами и причудливыми мозаиками. Парадного Петербурга он так и не увидел, но навеки запомнил темную громаду дома на Мойке, где мать в пятом году, за три года до его рождения, была на спиритическом сеансе и услышала предсказание от Калиостро, что сын ее получит власть над воздухом и отдаст ее за чужую жизнь. «Непременно отдам, — заверил Даня, — что мне воздух? Про воду бы еще подумал». Они много тогда смеялись. Больше всего ему понравилась Деламотова арка; на саму Новую Голландию входа не было — третий год шла война, и там, говорили, велись работы по строительству электрической корабельной пушки, передающей взрывы на расстояние. Пушка эта упразднила бы войну как таковую, ибо с Новой Голландии можно было бы сделать взрыв в старой, а из Судака зажечь люстру в Богемии.</p><p class="p1">Теперь за окном тянулись склады, бараки, заводские корпуса — все было грязно, запущено и тоже словно говорило, что теперь можно. Ни к чему было заботиться о внешних красотах — приоритет во всем отдавался деловитости, но как-то выходило, что без пристойного вида и деловитости не было. У длинного, криво сколоченного забора курили длинные, тоже скособоченные люди, всем видом напряженно выражая вальяжность и презрение к любому труду. Переваливаясь, тащился извозчик; так же переваливаясь, брел поезд, словно и на него действовала общая одурь. Пассажиры, увязав узлы, сидели молча и прямо — им давно полагалось прибыть на перрон, но поезд задерживался, и они так и застыли вытянувшись, с неподвижными лицами, как на крестьянских фотоснимках, на которых каменные бабы и стриженные в скобку мужики вечно таращатся, всем телом тужась удержать мгновение. Брызнул желтый апрельский луч из серой хмари, скользнул по масляно заблестевшим лужам и скрылся.</p><p class="p1">Даниилу неловко было спрашивать спутника, как найти его в Ленинграде, но не хотелось и терять странного астронома. Он по-детски заерзал, как всегда, когда не решался задать важный вопрос, и эта нерешительность не ускользнула от собеседника.</p><p class="p1">— Не желаю вам удачно устроиться, ибо знаю, что вас ожидают, — сказал он важно. — Относительно своего пребывания не могу сказать ничего, ибо меня не ожидает никто.</p><p class="p1">— Я остановлюсь у дяди, — торопливо сказал Даня, — и если вам ненадолго, то, может быть…</p><p class="p1">— Благодарю вас, я еду надолго, — веско сказал попутчик. — У меня не бывает трудностей с ночлегом, а только с тем, чтобы выбрать из многих в е р н ы й ночлег. Встреч я не назначаю, полагаясь на судьбу: со мною давно уже не бывает ничего случайного. Звезды ясно свидетельствуют, что встреч будет у нас с вами три; одна состоялась и, смею думать, помогла скоротать путь.</p><p class="p1">Даня горячо закивал.</p><p class="p1">— Я хотел только одно, — сказал он, страшно смущаясь. — Мне просто проверить… я в детстве часто угадывал — если кто-то придет, или что будет в журнале… Это прошло потом, но иногда получается. Если не хотите говорить, то не нужно. Но мне показалось, что вы астроном — сам не знаю, почему, глупо ужасно. Просто скажите, астроном или нет.</p><p class="p1">Он тут же раскаялся в своем порыве, ибо заметил, как бровки мнимого астронома поползли вверх, а глаза стрельнули по сторонам; казалось, услышанное неприятно изумило его. Он выдержал мучительную для Дани паузу, но вдруг усмехнулся, словно решившись на забавное признание.</p><p class="p1">— Что же, вы не без способностей. Звук услышан верно, но запомните, что прислушаться — еще не главное. Вся штука в истолковании, а это дается уже не способностями. Здесь ничего не сделаешь без посвящения.</p><p class="p1">Даня кивал, ничего не понимая.</p><p class="p1">— Впрочем, и немудрено, — снисходительно добавил попутчик. — У меня было столько имен, что я и сам не на всякое отзываюсь. Нынешнее мое имя Остромов, с начального «О». Нет ничего странного, что вам послышался астроном. Да и звезды мне не чужие. Желаю здравствовать.</p><p class="p1">Поезд подплывал к перрону, и к дверям стояла уже очередь; к окнам стягивались встречающие, высматривая родню. Астроном небрежно кивнул, легко поднялся и, не прощаясь, смиренно встал в конец очереди. Сзади шумно толкался студенческий молодняк, и кто-то с перрона уже шлепал ладонями в окна, приветствуя москвичей. Стоя на перроне во влажном апрельском тепле, в густом запахе дыма, мазута и грязи, Даня поглядел вслед попутчику: тот уходил не оборачиваясь. Что же, проверим насчет трех встреч. Даня подхватил мешок и направился в город.</p><p class="p1">За шестьдесят лет до них таким же пасмурным утром в тот же город въехали другие двое, и один из них тоже был идиот, а другой — убийца.</p><p class="subtitle">4</p><p class="p1">Город стоял, как обделавшийся старик.</p><p class="p1">Юсуповский дворец был теперь домом работников просвещения, Аничков стал музеем советских городов, дворец Белосельских-Белозерских был райкомом Центрального района, в домах Бецкого и Барятинского общежительствовал пролетариат, во дворце Брусницына открылась кожевенная фабрика имени пострадавшего за народ Радищева, во дворце великого князя Александра Владимировича — санатория для недостаточных ученых, Биржу делили матросский клуб и загадочный Совет по изучению производственных сил, в Строгановском дворце поместилась Сельхозакадемия, в Меншиковском — тоже академия, но военная, а в церкви Божией Матери Милующей тренировался перед глубоководными погружениями отряд боевых водолазов имени еще Троцкого, но год спустя уже Кирова.</p><p class="p1">Чего бы мы хотели? Разве хотели бы мы, чтобы город новым Китежем ушел в болота, из которых вырос, и не достался уже никому? Нет, пусть бы он был, бледный, сирый, в паутинном запустении, как заброшенный замок; но то, что он горячо стремился к новой жизни, поспешая, разваливаясь на ходу, напяливая кумач, за месяц готовясь к празднеству, приспосабливая академии под санатории для настрадавшегося пролетариата, было всего больнее для тех, кто помнил его прежним. Таким приезжим казалось, что к звукам весеннего Ленинграда — конскому цокоту, людскому топоту, трамвайному звону, крикам газетчиков, мявканью грязных чаек, — примешивался подспудный гул, но не грохот близкой катастрофы, сносящей нас всех с лица земли за то, что мы выжили и согласились, — а ровный белый шум бессильного бешенства.</p><p class="p1">Если бы он выбрал роль призрака, запущенного безумца, вечно бормочущего о собственном прошлом! Но он был городом и не мог быть ничем, кроме; он согласился на роль второй столицы, забыв или заставив себя забыть, что второй не бывает. Он мнил еще поспорить с этой дурой, азиаткой, отомстившей окончательно и бесповоротно; он отказывался понять, что история свернула на ее охотнорядский путь, круглый, как она сама, как гнездо, плаха, боярское пузо. Он все еще верил, что протащит в образчики тиранства не самоцельное зверство Ивана, но созидательную ярость Петра. И потому он лихорадочно одевался в кумач, сдавал дворцы беспризорникам и партийцам, со старческой стыдной поспешностью встраивался в новую жизнь, всем видом говоря: смотрите, и я тоже! Как инвалид, лепечущий о былых заслугах, он в каждом втором транспаранте именовал себя колыбелью переворота, хотя на дне души мечтал стать его могилой; из последних сил внушал себе, что лучше такая жизнь, чем распад, пустоши, проплешины одичания — ибо так он, глядишь, подспудно внушит новым память о былых титанах, облагородит не победителей, так их детей, загонит толпы ликующей простоты в пропорции Растрелли и Росси. Должно быть, осенними ночами он сам уговаривал себя — так же униженно, как все, согласившиеся выжить под игом; и как знать — может, был прав, ибо, послужив победившему скотству, он перестоял и его, — а все-таки в двадцать пятом году смотреть на него было тяжело.</p><p class="p1">Впрочем, смотревшие видели разное.</p><p class="p1">Дане бросалась в глаза запущенность, обшарпанность, грязь. Грязь оказалась непобедима. Рыцарский дух отлетел, на смену ему ничто не прилетело, дома-замки медленно осыпались, теряя лица; титаны вымерли, карлики выжили. Новых домов почти не строили, но старые, заселенные нынешними жильцами, менялись неуловимо и обвально: нищета просвечивала сквозь стены, выпирая наружу. На узорчатых балконах сушилось белье. В подворотнях лаялись. На улицах в рабочие часы было подозрительно много пьяного народу: хозяин жизни гулял. От мрачной роскоши не осталось ничего, но жалкое пребывало неприкосновенным. Он подумал: если я здесь уживусь, будет плохо.</p></span></span>
