<span><div class="epigraph">
<div class="poem">
<div class="stanza">
<p class="v">Глупцы, пускаясь в авантюру</p>
<p class="v">С одной лишь низостью в душе,</p>
<p class="v">Себе приписывают сдуру</p>
<p class="v">Всю авантюрность Бомарше.</p>
<p class="v">Естественно, у бомаршистов</p>
<p class="v">Ум изощрен, размах неистов:</p>
<p class="v">Сейчас дракона обкрадут,</p>
<p class="v">Змею вкруг пальца обведут!</p>
<p class="v">Но жертвы их корысти страстной,</p>
<p class="v">Как поглядишь со стороны,</p>
<p class="v">То беззащитны, то больны,</p>
<p class="v">То простодушны и несчастны…</p>
<p class="v">Так верят в добрую судьбу,</p>
<p class="v">Столь кротко носят на горбу</p>
<p class="v">Груз незаслуженных мучений,</p>
<p class="v">Что Бомарше — добряк и гений —</p>
<p class="v">Перевернулся бы в гробу.</p>
</div>
</div>
<p class="text-author">Новелла Матвеева</p>
</div><div class="epigraph">
<p class="p1">Люди, которые живут одиночками, которые все же немыслимы вне нашего времени и нашего пространства — занимают меня. Они — одиноки, враждебны друг другу, каждый из них живет за самого себя и ничем не обязан соседу, любовнице, брату. Они рождены одной эпохой, вскормлены другой и пытаются жить в третьей.</p>
<p class="text-author">Вениамин Каверин</p>
</div><div class="epigraph">
<p class="p1">Но какая разительная и страшная случилась с ним перемена!</p>
<p class="text-author">Дмитрий Быков. «Орфография»</p>
</div><p class="empty-line"/></span>
</body>
