<span><span><p class="p1">— Что нас рано или поздно разведет… вот это. Что у тебя получается экстериоризация и ты видишь в этом смысл, а я никогда.</p><p class="p1">— Знаешь, как это будет? Я все время буду утаскивать тебя за собой, а ты будешь цепляться за тело — нет, как можно, пол не метен, пирог не печен…</p><p class="p1">— Телега немазана…</p><p class="p1">И все темней становилось, и все тесней они сближались, сжатые сумраком.</p><p class="p1">— Я вот думаю, что мама не была добра в этом смысле — ну, о котором с начала… Это было другое. Она ведь взяла с меня слово, что я уеду, — задолго до всего, в четырнадцать лет. Она не хотела, чтобы я сидел под крылом. Валя — совсем другое. Он папин и более домашний. А она была странница, пешие походы по двадцать верст, в гости, вдоль всего побережья, и когда можно — на лодке в море. И то же странствие во всем остальном, ничего окончательного. Я нашел потом у нее стихи, которых она даже мне не показала. Обычно показывала все, лет с двенадцати, что я — раньше! И представь — там было: «Погибает народ, а душа поет». Меня как ударило, и главное, потому, что это ведь совершенно точно.</p><p class="p1">— Да. Я бы так не смогла.</p><p class="p1">— Ну, ты еще не знаешь, что смогла бы…</p><p class="p1">— Этого я не смогла бы точно.</p><p class="p1">— Подожди, мы съездим к нам. Там все иначе. Море — это особенное чувство: ты понимаешь, что есть вещь, которая просто больше всех других вещей. И на этом фоне всякие кажущиеся абсолютности… Есть просто другая шкала, вот и все.</p><p class="p1">— В том-то и дело. Море не человек, в море нет человека. А мне интересен только человек.</p><p class="p1">— Но он не один. Ты же не скажешь, что он мера всех вещей?</p><p class="p1">— Другой я не знаю.</p><p class="p1">— Нет, это тоже недостаточно. Сверхчеловек — это мера всех вещей, Богочеловек — да, конечно. А человек — это еще пока зародыш, Остромов дело говорит. Кто вырастит себе бессмертную душу, у того она и будет.</p><p class="p1">— Не хочу сверхчеловека, — сказала она горячо и требовательно, сжимая его плечо. — Сверхчеловека не хочу!</p><p class="p1">— Ты же не знаешь, какой он. Он может быть какой угодно, самый презренный, самый одинокий, последний. Ты думаешь, он на белом коне? Он может вот тут сидеть, у парапета, просто сидеть, ничего не просить, потому что в нем все… Но когда ему подают, он не отвергает, потому что даже это не может его оскорбить.</p><p class="p1">— Я ничего в этом не понимаю, — сказала она, — и понимать не хочу. Если ты станешь нечеловеком, я найду способ тебя вернуть. Или отпустить, если ты встретишь самку сверхчеловека.</p><p class="p1">Даня осмелился наконец ее поцеловать в щеку — ему очень понравилось про самку сверхчеловека.</p><p class="p1">— А еще из ее стихов — ты помнишь?</p><p class="p1">— Помню много. Вот, смотри: это тоже было мне странно сначала. «Когда-то любила я книги, в блаженные годы и миги. Они были ближе людей, в сафьяновой мягкой коже. Картины любила я тоже и много других вещей. Живее живых созданий — и вазы, и мягкие ткани, и все в этой жизни вокруг в плену меня сладком держало. Теперь предметов не стало, распался волшебный круг. Как листья, осыпались годы. Жестокое бремя свободы душа подняла и несет. Простите, ненужные ныне! Без вас в этой строгой пустыне мне легче идти вперед».</p><p class="p1">— И этого я тоже не понимаю, — сказала она, помолчав. — То есть понимаю умом, но почему надо бросить вещи? У меня в комнате ни одной дорогой вещи нет, но я к ним страшно привязана, мне в детстве было жаль на улице газету выброшенную. Как куклу на Валлен-Коски. Понимаешь?</p><p class="p1">— Понимаю, но мать поняла больше. Если всю жизнь жалеть… О Господи, как же мне сказать тебе это? Я сам знаю, что если не жалеть — тогда не нужно вообще ничего. Но это должна быть иная жалость. Надо не снисходить, а, может быть, поднимать до себя… не могу пока понять этого. А вещи она очень жалела, то есть другое слово: она писала однажды, что понимала, как это у нее названо, темную душу вещей. Им надо помогать. Вот книге скучно на одном столе — ее надо переложить на другой. Найти вещи место, как Остромов учит находить место себе. Ты, кстати, умеешь?</p><p class="p1">— Всегда умела, это он глупости говорит про особые места. Чистое самовнушение.</p><p class="p1">— Нет, не скажи. Но я не про то: я про то, что мы можем, например, вырастить бессмертную душу собаке. Как Остромов предлагает растить душу себе, так мы, в случае особой любви, можем для пса. И для камня, например, — я видел, мама однажды перенесла камень на солнечное место.</p><p class="p1">— Всерьез? Или для тебя?</p><p class="p1">— Она не разделяла. Что для меня, то и было всерьез. И вот Остромов, мне кажется, переложил меня на другое место… только и всего, но именно это и было нужно.</p><p class="p1">Он замолчал и добавил хмуро:</p><p class="p1">— Я еще опасаюсь другого…</p><p class="p1">— Я, кажется, догадываюсь.</p><p class="p1">— Конечно, догадываешься. Ты теперь обо всем будешь догадываться.</p><p class="p1">— Ты опасаешься, что из-за меня не сможешь левитировать. Я тебя буду держать. Да?</p><p class="p1">— Да, если дальше так пойдет, ты вытеснишь все и всех.</p><p class="p1">— И не станешь ты сверхчеловеком, да? Не станешь! Не станет Галицкий сверхчеловеком, какая потеря, ужас, ужас! А я слишком человек, мне нужно в уборную!</p><p class="p1">Даня беспомощно оглянулся. Как он не подумал, что ей может хотеться есть, спать, что она может замерзнуть? Таскает девушку по проспектам, а куда пойти? В культурную пивную? Теперь уборная: в Ленинграде двадцать шестого года это была проблема.</p><p class="p1">— В этом доме, — сказала она, — живет старик Хвостов, потомок того Хвостова. Я забегу. Хочешь вместе?</p><p class="p1">— Нет, я к твоим старцам боюсь. Кто я такой?</p><p class="p1">— Ну, как знаешь. Я быстро.</p><p class="p1">Убежит сейчас и исчезнет, думал он, подпирая стену. А может, ее и не было никогда, и я разговариваю сам с собой, сходя с ума от душевного голода, терзающего меня. Ведь Остромов, и кружок, и прочие — все это очень хорошо, но хлебом может стать только она, только такая, ее и мои девятнадцать лет. (Он боялся еще думать «наши»). Таких совпадений не бывает, они немыслимы. Разумеется, я потом увижу различия, страшные, разящие, и все рухнет так же стремительно, как началось. И хорош же я — куда мне с ней деться? Даже какой-нибудь Батов ведет свою крашеную дуру в сад Нардома, а куда поведу ее я? На тонкий план?</p><p class="p1">Она сбежала по лестнице, хлопнула дверью парадной.</p><p class="p1">— Я думала, ты ушел.</p><p class="p1">— А я думал, тебя не было.</p><p class="p1">— К хорошему долго привыкаешь, — сказала она очень серьезно. — Все врут, что быстро. Из меня еще долго будут лезть всякие иглы.</p><p class="p1">— Так и прекрасно, — сказал он. — А представляешь, зима? Как прекрасно будет зимой, если не совсем задубеем. Никого на улицах. Поедем в Павловск. Закат, ветки… а?</p><p class="p1">— Ты не здешний, — сказала она пренебрежительно, — зимой тут невыносимо.</p><p class="p1">— Ничего, ничего. Я уже смогу помаленьку растапливать пространство.</p><p class="p1">— А вот есть я совсем не хочу.</p><p class="p1">— Я тоже. Я хочу еще ходить.</p><p class="p1">Он удивлялся потом — как им не встретилась в этих кружениях ни одна пьяная компания, ни один отвратительный заводчанин, которому было бы в радость сказать гадость? И через пять, и через десять лет Даня помнил все, что она говорила, и все, что говорил сам, но не мог восстановить маршрутов: ноги несли сами. Выбирает же как-то верблюд такой путь в пустыне, чтобы гравитация была минимальной, — она ведь неодинакова; выбирает вода не самый прямой, но самый легкий путь, чтобы течь. Так и они выбрали маршрут счастья, но сколько Даня потом ни шатался по городу — не мог его повторить и не понимал, как они с Литейного забрели на Первую линию, как потом вдруг оказались на Садовой, как шли теперь уже по ее местам, по Пантелеймоновской. Целые куски города выпали из его памяти — он помнил только ее слова, свои слова и еще сумасшедший автомобиль, вдруг въехавший на тротуар, — скрежет, осколки… Оттуда вывалился водитель, присел рядом, около стены, блаженно вытянув ноги. Подбежал в белой форме постовой, оглушительно свистя.</p><p class="p1">— Живой, просто пьяный, — сказал Даня.</p><p class="p1">— Нет, он какой-то больной.</p><p class="p1">— Пьяный, успокойся. Нельзя же вот так сходить с ума по любому.</p><p class="p1">— Знаешь ли, милый друг, — сказала она серьезно, — я думаю, что это форма самоспасения, что ты на самом деле не нравишься мне. Но просто я предпочитаю некоторое время сходить с ума по конкретному человеку, чтобы не мучаться больше из-за всех сразу.</p><p class="p1">— Это я должен был сказать. В моем духе сентенция.</p><p class="p1">— Да какая теперь уже разница? — протянула она. — Твой, мой… глупые притяжательные…</p><p class="p1">Он кивнул.</p><p class="p1">— Еще почитай.</p><p class="p1">Даня быстро проговорил про себя любимое, опасаясь сбиться при чтении вслух: тут ни слова нельзя было испортить, а он этих стихов никому не читал, да и не знал, стихи ли это в собственном смысле. В кустарных, самодеятельных занятиях ритмом он подробно разбирал их метрическую схему и думал, что будущее стихосложение станет сплошь таким — Пушкин, привстав на цыпочки, разглядел этот самый отдаленный берег, сулящий дивные возможности, в «Песнях западных славян». Земной берег был весь исхожен, истоптан разными походками — двухстопными маршами, трехстопными вальсами, похоронными процессиями анапестов, детскими, странно-жестокими прыжками хореев, исползан многосложными, суставчатами телами пеонов, из которых особенно нравился ему четвертый, весь вкладывавшийся в последний бетховенский бросок, тататаТАМ! — а там не было еще проложено дорог, и ритмы были неочевидней, тоньше, а рифмы сквозили, как нимфы, не вылезая напоказ, мелькая матовыми телами в листве. Мать в последнее время писала только так, и говорила о чувстве странной честности, которое пришло, как только рифма перестала подсказывать мысль.</p><div class="poem">
<div class="stanza">
<p class="v">Каждое слово о Нем — обида мне,</p>
<p class="v">Каждая книга — как рана новая.</p>
<p class="v">Чем больше вещих о Нем пророчеств,</p>
<p class="v">Тем меньше знаю, где правда истинная.</p>
</div>
<div class="stanza">
<p class="v">А смолкнут речи Его взыскующие,</p>
<p class="v">И ноет сердце от скуки жизненной,</p>
<p class="v">Как будто крылья у птицы срезаны</p>
<p class="v">И дом остался без хозяина.</p>
</div>
<div class="stanza">
<p class="v">Но только свечи перед иконами,</p>
<p class="v">Мерцая, знают самое важное.</p>
<p class="v">Их безответное сгорание</p>
<p class="v">Приводит ближе к последней истине.</p>
</div>
</div><p class="p1">— Да, да, именно! Вот это — совершенно так! — И хорошо было то, что она не стала пережидать лицемерную паузу, будто «давая отзвучать», как всегда делают дилетанты, которым сказать нечего. — А это ты знаешь? Я сама не знаю, чье, но этим же стихом — я не знаю, как он называется…</p><p class="p1">— А он самый лучший, им когда-нибудь будут писать все. Рифма останется для чего-то совсем прикладного — вроде считалки.</p><p class="p1">— Наверное, так. Хотя мне жаль рифму. Но вот слушай:</p><div class="poem">
<div class="stanza">
<p class="v">Что нам делать, Раввуни, что нам делать?</p>
<p class="v">Пять тысяч взалкавших в пустыне —</p>
<p class="v">а у нас только две рыбы,</p>
<p class="v">а у нас только пять хлебов?</p>
</div>
<div class="stanza">
<p class="v">Но Ты говоришь: довольно —</p>
</div>
<div class="stanza">
<p class="v">Что нам делать, Раввуни, что нам делать?</p>
<p class="v">На Тебя выходят с мечами,</p>
<p class="v">а у нас два меча, не боле,</p>
<p class="v">и поспешное Петрово рвенье.</p>
</div>
<div class="stanza">
<p class="v">Но ты говоришь: довольно —</p>
</div>
<div class="stanza">
<p class="v">А у нас — маета, и морок,</p>
<p class="v">и порывы, никнущие втуне,</p>
<p class="v">и сознанье вины неключимой,</p>
<p class="v">и лица, что стыд занавесил,</p>
<p class="v">и немощь без меры, без предела.</p>
<p class="v">Вот что мы приносим, и дарим,</p>
<p class="v">и в Твои полагаем руки.</p>
</div>
<div class="stanza">
<p class="v">Но Ты говоришь: довольно.<a href="ch2.xhtml#id22" class="a">[25]</a></p>
</div>
</div><p class="p1">— Чудесно, — сказал Даня, улыбаясь. — И все-таки не довольно.</p><p class="p1">— Да, тебе видней, конечно…</p><p class="p1">— Не знаю. Скажи, а у тебя когда-нибудь получалось это упражнение — перевернуть дагерротип, поменять местами…</p><p class="p1">— Нет, и неинтересно. У меня как следует получалось только одно — с невидимостью. Он учил тебя?</p><p class="p1">— Не отражать лучей? Да. Я примерно понимаю, как это. Вся штука в том, чтобы выбрать ракурс…</p><p class="p1">— Нет, нет. Это невозможно. Штука в том, чтобы сказать себе: меня нет. Просто себя вычесть. Я попробовала однажды в трамвае, очень интересно. Напротив сидел малый в кепке, весь приплюснутый и промасленный, как эта кепка, и смотрел на меня, и вдруг я вижу — у него на лице странность. Не в смысле «странное лицо», а в смысле полное удивление, как будто случилась вещь, которая никак не совместима с трамваем, и с ним, и с его кепкой. А это просто я себя вычла. Хочешь, попробуем?</p><p class="p1">— Нет, не хочу, — сказал он очень серьезно. — Никогда, ни в коем случае. Пожалуйста.</p><p class="p1">— Ладно, не буду, — согласилась она. — Я тоже не хочу.</p><p class="p1">Несколько шагов прошли молча.</p><p class="p1">— Как дети, — сказала она. — Детские такие прогулки со стихами.</p><p class="p1">Ему почудилось в этом недовольство, он остановился и обнял ее, почувствовав прохладу и скрытое тепло ее щеки и тончайший домашний запах, шедший от свитера.</p><p class="p1">Ласка в это время не поощрялась, поколение стыдилось объятий. Пролетариат этого попросту не умел. Поцелуй объявлялся пережитком, негигиеничным и постыдным, а действовать предлагалось сразу, нахраписто, не тратя времени на прелюдию. То есть совокупляться было не стыдно и гигиенично, а целоваться — стыдно и заразно, потому, видимо, что могло производиться публично, а этого, конечно, пролетариат допустить не мог. Когда в двадцать шестом году на улицах целовались, тут же набегали беспризорники с воплем «Лижутся!» — или останавливался пожилой заводчанин, дабы произнести вслух краткую, отрывистую лекцию о недопустимости. В двадцать шестом поцелуй был неприличней уличного соития, случись оно вдруг, — потому что он свидетельствовал как бы о слабости: гладить, обнимать, держать за руку считалось позором, нормой было брать штурмом. И первый мужчина Нади Жуковской, давно, год назад, не признавал никаких нежностей, стыдился, считал их чем-то вроде онанизма. Надя однажды погладила его по голове, так он покраснел и буркнул «Не надо». Но что мы будем вспоминать всяких дураков?</p><p class="p1">Даня чувствовал совсем не то, что с Варгой: с Варгой был прежде всего страх сделать нечто не так, а здесь — мгновенная уверенность в том, что теперь все будет как надо, иначе невозможно. Можно было все. Он боялся сначала подбираться к ее губам, но не удержался, и все получилось удивительно легко и созвучно, и вдобавок они были одного роста. Она запустила холодную ладонь под его рубашку, и некоторое время они просто стояли молча — «влюбленные лошади», прошептала она, и он засмеялся, тоже шепотом.</p><p class="p1">— Ладно, завтра, все завтра, — сказала она наконец слегка севшим голосом.</p><p class="p1">— Ну постой еще, — сказал Даня умоляюще.</p><p class="p1">— Все завтра. Я чувствую, что нельзя сразу. Ты думаешь, мне легко отлипнуть? Ужасно не хочется, ужасно, ужасно. Но ты ведь будешь завтра?</p><p class="p1">— Приду, конечно.</p><p class="p1">— Я не собиралась, но приду. В восемь, да?</p><p class="p1">— Да, в восемь.</p><p class="p1">— Но ты придешь?</p><p class="p1">Он снова полез целоваться, она не отворачивалась.</p><p class="p1">— Завтра, завтра.</p><p class="p1">— Да, завтра.</p><p class="p1">— Ну все! Завтра.</p><p class="p1">— Завтра.</p><p class="p1">Он стоял у подъезда, ничего не понимая. Она выбежала обратно.</p><p class="p1">— Мне все кажется, что ничего не было.</p><p class="p1">— Очень хорошо, ты очень правильно сделала.</p><p class="p1">— Ну завтра, завтра.</p><p class="p1">— Да, завтра.</p><p class="subtitle">4</p><p class="p1">У себя в комнате Надя сразу легла на живот, потерлась щекой о подушку и стала разговаривать с Даней в полной уверенности, что он услышит.</p><p class="p1">— Ну вот, считай, что ты в гостях, — сказала она. — Я ведь скоро буду тебе показывать комнату. Может быть, уже завтра. Так что привыкай.</p><p class="p1">Он огляделся и что-то сказал, она не расслышала.</p><p class="p1">— Говори яснее, — сказала она обиженно. — А в общем, нет, все не то. Я буду за тебя выдумывать, это неинтересно. Лучше молчи.</p><p class="p1">Он одобрительно кивнул: другой нам затем и нужен, что мы не можем выдумать его. Все равно он не наш, а свой собственный, и это ей нравилось отдельно. Только очень все быстро, так нельзя. Но почему нельзя? Чудо должно быть сразу, в постепенные чудеса, о которых столько говорила миссис, Надя не верила.</p><p class="p1">— Я говорила с тобой неправильно, — сказала она. — Я все пыталась казаться кем-то, иногда я защищалась. Надо было просто рассказывать, показать свою жизнь, пустить в нее, как пускают в дом. Но вот смотри. Вот мистер Кэт. Его принес отец. Он сидит и смотрит с таким видом, как будто говорит: «Мир сошел с ума». На него иногда в детстве сажали плюшевую мышь, чтобы это выражение сделалось как-нибудь объяснимо. Мир сошел с ума, потому что у меня на носу сидит мышь и ничего не боится. Вот английская «Алиса», я училась по ней с миссис, мне никогда не нравилась эта книга, но она связывалась с миссис, а она была совершенно волшебная. Вот доктор, его принесли, когда я болела. Он заводился, водил рукой по столу, выписывал снадобье. Мама его заводила, когда я заболевала. А потом он сломался, и я перестала болеть навсегда. Я действительно, святой истинный крест, никогда ничем не болею. Я страшно сильна и вынослива. Женя говорит, что я девочка Зима и что он напишет пьесу про зимнюю девочку, которой никогда не холодно. Это доктор мне отдал всю свою силу и сломался. Если его починить, я немедленно слягу. А ты говоришь, что вещи держат в плену. Может быть, но тогда я просто распадусь без этого плена. Если не любить вещи, не любить уют, начнется тот холод, которого в мире и так слишком много. Все счастье в этом тонком тепле, в тончайшем его слое, оно паром ложится на ледяные окна. Нагревать, закутывать, и если угодно, даже покрывать плюшем. Ко всему привязывать бантик, на всем рисовать цветочек. Как же иначе?</p><p class="p1">Он что-то буркнул.</p><p class="p1">— Ну да, — сказала она, — естественно. Есть и это тоже, и к этому надо быть готовым. Но это не значит же — так? — что надо заранее отдавать все. Когда все отняли, конечно, можно идти по снегу босиком, и желательно при этом улыбаться, хотя ты скажешь, наверное, что лучше гнусно ухмыляться. Это менее жалко выглядит. Ты вообще очень боишься всего трогательного, как я погляжу. Но только в этом трогательном и заключается смысл, потому что только это привнес человек, все остальное без него было. Все эти горы и эти вот твои любимые пустыни.</p><p class="p1">Она нахмурилась.</p><p class="p1">— Но правда-то заключается в том, — она избегала говорить «христианство», ей это казалось дерзновенным, — чтобы какую-то вот розочку на все это, какого-то мистера Кэта… Какой-то пузырь тепла среди сплошного холода, просто надышать его вокруг себя, а зачем же еще? Ты видишь другие цели? Я никаких не вижу… Один мальчик говорит, что после снегопада воздух нагревается от того, что снежинки об него трутся. На самом деле все наоборот, это снегопад бывает от того, что как-то там нагревается. Все на свете, — сказала она голосом миссис, — имеет естественнонаучное объяснение. Кроме того, разумеется, — добавила она уже своим голосом, — что его не имеет.</p><p class="p1">Она перевернулась на спину.</p><p class="p1">— Но мне нравится думать, что воздух нагревается от трения, и я тоже иду, как снег, меня никто не спросил, а просто я пошла. И я нагревая воздух. Тебе все это не кажется сюсюканьем? Я не вижу никакого смысла, кроме сюсюканья. Ничто не способно к сюсюканью, ни пейзаж, ни даже вот, например, лиственный шелест, хотя тополь во дворе и говорит что-то подобное.</p><p class="p1">Оба замолчали. Интересно, что он на это возразит. По-моему, ему нечего. Но чего я от него требую? Он столько потерял. Он в чужом городе. Он научился, привык терять, приспособился, он так увлечен Остромовым, в котором видит мага, его постепенно втягивает космический холод, все эти созвездия, но я его перетяну. Я перетяну его, как Герда. Именно так, как придумал Женя. Он придумал, а я сделаю.</p><p class="p1">В углу кратковременно нарисовался Женя и кивнул: непременно, непременно. Он помахал рукой, рука совсем не дрожала.</p><p class="p1">— Ты бы понял, если бы был в Венеции, — сказала она, помолчав. — Я не стала уже тебе говорить, потому что — неприлично, да? Ты не мог быть в Венеции, тебя не возили туда в семь лет, как меня. Но именно там я поняла. Почему-то именно там. Это было как Рождество в самом чистом виде, хотя при чем — Венеция и Рождество? Но какая-то невероятная синева, кобальтовая, в поделках, игрушках, в стекле. Я думаю, была такая же зимняя ночь, вот с тем цветом неба. При этом я допускаю, — сказала она, забрасывая руку за голову, — что в действительности там не было ничего сказочного. Что может быть ужасней, чем зима в пустыне? Даже если днем жарко, ночью холодно. Преследование. Рожать в дороге, должно быть, очень страшно. Можно себе представить, как пахнет в хлеву. Кому-то хорошо среди животных, а кому-то не очень. Мне было бы нехорошо. Но мы видим пещеру, волхвов, сияние, сказку, вертеп, ангелов видим. Это все наросло поверх того песка и, может быть, снега, хотя там не было снега. И вот Венеция — это в чистом виде то, что наросло. Были какие-то войны, какая-то торговля, тысячу раз захватывали все это. Лангобарды, еще не помню кто… И все они воевали, и торговали, и вот — Венеция, то, что на этом наросло. Да, она гниет, и постепенно опускается в воду, и я думаю даже, что постепенно опускаться в воду — наше главное дело, постепенно и никогда совсем. Это же такой Китеж, который никогда не утонет окончательно. Но это был край солдат и потом купцов, и воров, а образовалось вот это — и мы та самая сказка, которая нарастает на ткани мира, иначе я ничего объяснить не могу…</p><p class="p1">У нее немного кружилась голова, она засыпала.</p><p class="p1">— Лишь призрака скользящий шаг, лишь голова на черном блюде глядит с тоской в окрестный мр-р-р… — сказала она мистеру Кэту.</p><p class="p1">— Завтра, завтра, — сказала она Дане. — Все завтра.</p><p class="p1">И, кружась, потекла Венеция, переплескивающийся разлив, размыв, разворот крыл, плеск голубей, утяжеляющийся, смешно набухающий круговорот синих и кобальтовых арлекинов, буран в стеклянном шаре, шорох шарящего вдоль стен снегопада, витиеватые разломы слоистого ночного языка.</p><p class="subtitle">5</p><p class="p1">Даня проснулся среди ночи от невыразимо печального и даже, пожалуй, страшного сна, и долго вглядывался в потолок, потому что, если правильно посмотреть в потолок, можно еще было что-то исправить.</p><p class="p1">Она приснилась ему другой, страшно изменившейся, омещанившейся, потолстевшей. С ней могла случиться какая угодно перемена, но не эта. Это очень было нелогично. Они встретились в странном помещении, кажется, в лекционном зале университета, куда он вернулся вдруг после долгой, необъясненной отлучки. Почему-то она была здесь, наверное, она тоже теперь училась с ним. На ней был нынешний свитер, но потрепанный, засаленный; перед этим они как-то очень плохо расстались, и, подойдя к ней, почувствовав первый удар счастья от того, что она здесь, он счел долгом сразу спросить: простила ли она его. Сам он себя не простил, потому что в нынешнем ее положении — он понимал его все глубже, с тревогой, а потом с ужасом вглядываясь в ее лицо, — виноват был он, он оставил ее, и вот.</p><p class="p1">— Нет, нет, — сказала она. Было видно, что она очень рада, что ей теперь не до гордости; самая радость эта была плохая, не такая, как у него, — корыстная. Он был ей чем-то полезен. Это не могла быть она. Волосы тоже были растрепанные, немытые.</p><p class="p1">— Где ты был? — спросил Кугельский. Кугельский почему-то теперь тоже был его однокурсник. — Тут столько, брат, без тебя было… Мы столько успели, пока ты там где-то…</p><p class="p1">Вот Кугельский был настоящий, он так именно и сказал бы — желая подчеркнуть, как много тут успели, как далеко они все ушли, какой Даня теперь всем чужой.</p><p class="p1">Он же все больше цепенел от невыносимой жалости к ней, жалости, с которой немедленно надо было что-то сделать, простейший физический жест, иначе она грозила выморозить его изнутри. Она была в нем как ледяная вода, и все поднималась.</p><p class="p1">Она что-то говорила, потом сказала — ну, пошли? Куда же мы пойдем? — спросил он. Теперь все равно, я на все согласна, ответила она. Он, словно ища ответа на потолке, уставился в низкий, коричнево-лаковый потолок аудитории, замотал головой, надеясь, что потолок исчезнет, — но он не исчезал, и в нем была такая безнадежность, что Даня проснулся и сел на матрасе.</p><p class="p1">А чего бы ты больше хотел? Чтобы она была неподатлива, сурова, чтобы она брезговала тобой? Тогда она не приснилась бы тебе беспомощной, и ты не был бы виноват? Нет, она будет теперь еще одной твоей связью с миром, самой болезненной, — так почувствовал Левин, когда у него родился ребенок: как будто еще один крючок вживили и подергивают. И это обычно, чего же ты ждал?</p><p class="p1">Но душой — истинной своей душой, еще не отошедшей от сна, — он понимал, что все не так, неправильно, не как обычно; что это был сон не о связи, а о разрыве, что ничего нельзя будет изменить. Еще можно было, впрочем, заснуть — он знал даже, с какого момента следовало длить сон: с коричневого лакового потолка. И тогда, постепенно спускаясь взглядом, он увидит амфитеатр кресел, тоже лаковых, коричневых, и ее рядом с собой, растрепанную, в засаленном свитере. Она не так, не так должна была стареть: он мог представить, что она высохнет, но не мог вообразить, что оплывет. Попала в чужую судьбу, и все потому, что он в какой-то момент бросил, не успел, поверил наговору, собственному дурацкому подозрению. Но можно ли теперь вернуться и выправить, когда она уже настолько не она? Он лег, попробовал мысленно спуститься по амфитеатру. Ничего не выходило, он не видел теперь уже и того неуловимого, что в ней изменилось, и мог представить только обычную Надю, прежнюю. Того, что с ней случилось во сне, сам он не мог бы выдумать никогда. Это было что-то за границами его возможностей, что-то из того, что знает и скрывает душа.</p><p class="p1">Ничего, подумал он. Завтра я увижу ее, и все это рассеется. Нельзя засыпать в избытке счастья — он бродит, переливается, отравляет все. Странно, так ясно слышал ее вечером. Говорила что-то об учителе, о своем детстве. Завтра все встанет на свои места.</p><p class="p1">Но сон, не ушедший еще сон, пропитавший ледяной водой всю его душу, напоминал, что ничего, никогда уже не будет как надо.</p><p class="p1">Завтра, прикрикнул на него Даня, но не заснул до рассвета.</p></span></span>
