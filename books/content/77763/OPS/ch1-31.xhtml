<span><span><p class="p1">— Ну какое же право, — еще уютней заурчал Варченко, — свои ведь люди. Я, сами знаете, не посвящен, просвещение — дело благое, мне и любопытно. Неужели вы подозреваете, что я прямо от вас, как есть, побегу в ГПУ? Смешно же. Вы не с неба свалились, товарищу Огранову лично известны. Что ж такого, если я спрошу, как вам рисуется идеальное для Отечества устройство?</p><p class="p1">— Мы, — сказал Остромов сдержанно, — не занимаемся устройством Отечества. Цель наша состоит в нравственном усовершенствовании и постепенном овладении…</p><p class="p1">— Знаю, знаю, — не слишком вежливо перебил Варченко. — Постепенном овладении способами полетов тел тяжелее воздуха. Борис Васильевич. Я ведь с вами откровенен. Отчего же вы не хотите мне сказать, каковы ваши взгляды на теперешнее положение дел?</p><p class="p1">Черт с ним, подумал Остромов. Это может быть проверкой, это может быть попыткой заговора, это может быть, наконец, заговор с целью проверки. Следовало сказать ни слишком много, ни слишком мало.</p><p class="p1">— Я полагаю, — проговорил он неспешно, — что при нынешнем положении дел Россия устраивается в правильном направлении. Ибо, во-первых, у масонства неизменен демократический принцип, и ежели большинство народа едино, то… да. А во-вторых, легко заметить, что оккультная идея постепенно просачивается и в новые времена, и что одна религия всего лишь заменяется другою. Обратите внимание на частые упоминания вечной жизни, на образ всегда живого — это уже почти признание высшего бытия, и при сотрудничестве осторожных людей из числа посвященных…</p><p class="p1">Он многозначительно умолк.</p><p class="p1">— Ну, ну? — поощрил Варченко. — Что же?</p><p class="p1">— Практически — ничего, — пожал плечами Остромов. — Теоретически же — разрешение скромных лож вроде нашей, где мы сможем совершенствоваться, не обвиняемые в мракобесии и отступлении от доктрин.</p><p class="p1">— Опять философствование, — поморщился Варченко. — Что, господин Остромов, вы очень любите философствовать?</p><p class="p1">— Я, собственно, ничего другого не делаю, — улыбнулся Остромов как мог дружелюбнее. Улыбка эта на языке посвященных означала: отстал бы ты от меня, мил человек, а если хочешь предложить себя в компаньоны, переходи к делу.</p><p class="p1">— Вы ведь демократ? — спросил Варченко, подаваясь вперед.</p><p class="p1">— Демократ в каком смысле? — с легким раздражением ответил Остромов. — Если вы о конституционных демократах, я с молодых лет вне любой партии. Если же о форме правления, то да, масонство всегда почитало для себя идеалом демократический принцип, который в предельном развитии ведет к истинному народоправству. Но это путь всеобщий…</p><p class="p1">— Всеобщий, да, да, — с досадой повторил Варченко. Остромов не мог понять, что его так бесит. — Каждая вошь голос имеет, каждая жизнь бесценна, под это дело все великое мы сейчас чик-чирик, тупому стаду наврем, что оно избирает и избирается, а сами станем обделывать дела. Правду говорят, что масонство и есть демократия, что вся демократия и есть выдумка масонства, — но об этом позже, Борис Васильевич, позже. Я пока хочу понять: вам-то самому чего надо?</p><p class="p1">Варченко не собирался давить его любой ценой. Этот сероглазый ферт был человек небесполезный, внушительный, и ежели бы привлечь его на свою сторону — на вторых, разумеется, ролях, — он мог помочь в осуществлении Плана, в строительстве той империи, которая рисовалась Варченке и на которую явно нацеливался Двубокий. Так они постепенно подобрали бы людей и сделали тут такой Великий Восток, что никаких масонов не надо.</p><p class="p1">Остромов опешил.</p><p class="p1">— Какие же цели может преследовать масон, кроме свободы и блага? — спросил он осторожно.</p><p class="p1">— Разнообразные, разнообразные, Борис Васильевич. Иной масон высоко метит, русских Англии запродать хочет. Иной попроще, дырку просверлить да и самому ушмыгнуть. А совсем простые любят деньги собирать с дураков да вещички антикварные, под предлогом реликвий. Всякие есть, у Бога всего много. Вот я и хочу понять — вы из каких же будете, Борис Васильевич?</p><p class="p1">Остромов резко поднялся.</p><p class="p1">— Милостивый государь, — сказал он спокойно, прикидывая: если драка — что ж, Варченко заплыл, но силен, во Владикавказе однажды с таким схватился по карточному делу и непременно побил бы, — сыроватость, одышка, — но тот вытащил нож, разняли. — Я не намерен выслушивать прямые оскорбления Лучезарной Дельты…</p><p class="p1">— Да сядьте вы, — сказал Варченко, махнув рукою. — Сядьте. Не надо тут устраивать… свои все. Вы же лучше меня все знаете, Борис Васильич, — а? Ну чего мы тут будем комедию ломать. Нет никакого масонства, Борис Васильич, нет и никогда не было.</p><p class="p1">Остромов сел и расхохотался.</p><p class="p1">— Что же вы сразу не сказали мне, милейший Александр Валерьевич, — проговорил он сквозь донельзя натуральный захлебывающийся смех, — что желаете испытать меня по сценарию девятой ступени? Я сразу сказал бы вам, что проходил это еще в Италии…</p><p class="p1">Варченко не принял нового тона и по-прежнему мрачным восточным божком сидел на диване, уперев кулаки в колена.</p><p class="p1">— Нет никакой девятой ступени, — тяжело дыша, словно и впрямь схватившись с Остромовым, произнес он. На лбу его выступили крупные капли. — Нет никакого сценария, никакого испытания, никакого Альпануса Гентского.</p><p class="p1">— Ну уж, ну уж, насчет Альпануса, — продолжал смеяться Остромов.</p><p class="p1">— Нет и не было! — возвысил голос Варченко. — Проспер Альпанус, Борис Васильевич, это из Гофмана, про крошку Цахеса, прозванием Циннобера. А про Альпануса Гентского вы сейчас выдумали, чтобы пыль в глаза пускать.</p><p class="p1">— Так ведь это как взглянуть, Александр Валерьевич. — Остромов отсмеялся и блаженно выдохнул. — Это с какой точки посмотреть. С вашей — его нет и никогда не было, но то, что сказал мастер, обладает перформативной силой. Скажешь — и станет.</p><p class="p1">— Да-да, — кивнул Варченко. — Большой ложкой ели. Все масонство ваше, Борис Васильевич, — это собрались несколько сотен умных, как им кажется, людей и выдумали погремушку. Они друг другу этой погремушкой гремят, что, дескать, свои, и для своих всё, а чужим вот. — Он сложил дулю. — И так оно и делается, и вся демократия. А кто не свои — тот в лепешку разбейся, будь семи пядей во лбу, все равно ходишь в ярме. И вот я думаю, Борис Васильевич: ежели вы игрок — так я с вами, извольте, поиграю и даже позову в стоящее дело. А ежели вы все это всерьез — насчет посвященных, остепененных и всякой Италии, — то я вас вот так, — и Барченко сжатым кулаком с силой ударил себя по колену.</p><p class="p1">— Эхе-хе, — сказал Остромов, потягиваясь. — Вот скажите мне на милость, Александр Валерьич, отчего русский человек, достигнув в чем-нибудь первого успеха, сразу начинает вести себя так, словно он Господа Бога за бороду ухватил? Это же и причина краха всех великих начинаний. Только что-нибудь получилось, как сразу же — да я, да вас, да всех… Не замечали? Чего-то там и та-та-та слабеет живой огонь отважных предприятий. Сожру, сожру… Уж такие жрали, Александр Валерьич!</p><p class="p1">И он прошелся по комнате, небрежными упражнениями силовой гимнастики Леннерта разминая затекшие мышцы, словно никакого Варченки тут уже не было и можно было не стесняться.</p><p class="p1">— Вы, может быть, полагаете, — сказал Варченко, оскорбленный, несмотря на все усилия казаться спокойным, — что за вами уж такие люди стоят, которых и опрокинуть невозможно?</p><p class="p1">— Я бы с вами поспорил, — все так же небрежно отвечал Остромов, — и поговорил бы с вами по душам, Александр Валерьич… про людей, которые за мной стоят, про пятитысячелетнюю традицию Египта, которая опять же за мной и за нами, — он подчеркнул это «нами», словно приглашая в свидетели все прочее масонство, — но что же говорить с человеком, который смотрит в упор и говорит «нету»? Для вас нету, для нас есть, нам больше нравится, что есть. А разговаривать, да высчитывать, да кто за кем стоит… Это уж вы увольте, Александр Валерьич. У вас и степени такой нету, чтобы я с вами про это говорил.</p><p class="p1">— Ну, какая степень у меня есть — этого вам знать не нужно… — прохрипел Варченко, поднимаясь.</p><p class="p1">— Не нужно, не нужно, Александр Валерьич. Если чем могу быть полезен, всегда обращайтесь.</p><p class="p1">Многажды потом, передумывая этот разговор, спрашивал себя Остромов, можно ли было провести его иначе, — и думал, что нет, никак. Да и кто мог ждать опасности оттуда, откуда не ждали ее в это время люди куда более осведомленные? Он думал тогда про Морбуса, а какой Морбус? А если бы это был давно ожидаемый посланник из-за границы? А если бы, чем черт не шутит, сам Брюн? Он никогда не видел Брюна, и, в сущности, не было никакого Брюна. Но он крепко уже привык, что сказанное им сбывается, — русский человек в самом деле легко обольщается первым успехом.</p><p class="p1">Нет, не мог, не мог он знать ничего; и уж конечно, не мог предполагать, что Варченко, взяв извозчика, отправится на Загородный проспект и закажет на почтамте экстренный телефонный разговор.</p><p class="p1">— Это Монгол, — сказал он, когда наконец дали кабинет Двубокия. — Этого можно брать. Да, ничего не знает. Ничего вообще. Шарлатан без способностей, пустое место.</p><p class="p1">Выслушав этот доклад, Двубокий в своем кабинете почесал переносицу, закурил и откинулся на спинку резного кресла.</p><p class="p1">Нужно было осторожно, очень осторожно. Если он окажется прямым доверенным и много знает, можно аккуратно вытрясать. Если он ничего, то и к черту. Двубокий взял трубку другого телефона и набрал номер Райского. Райского не было на месте.</p><p class="p1">— Занятой какой человек, — сказал Двубокий ласково. — Как появится, соедините.</p></span></span>
