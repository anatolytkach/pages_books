<span><span><p class="p1">Даня еще не знал, счастьем или отчаянием наполнило его это зрелище: скорей всего, оба слова не имели больше смысла. Ясно было, что главному на свете оглушительно не до него; в этом сознании было много печали, но не было мерзкой, отравляющей душу тоски — той же печали, отравленной сознанием, что положение можно изменить. Словно навеки вырвали гнилой зуб. На смену пресмыкающейся тоске явилось величие полного отчаяния, буквального отсутствия чаяний; ясно было, что все утешения и надежды спустили нам, как ребенку суют игрушку, чтоб не отвлекали нытьем. Иные утешаются сознанием, что «не могли же мы выдумать сами» — утешьтесь, не могли, это выдумали за вас те, кому мешали ваши слезы и просьбы. За тонким слоем людского открывались ослепительные, оглушительные краски, в которых не было места ни Дане, ни даже учителю, — они ничем не могли помочь и ничего не значили, но знать о них нужно было уже для того, чтобы не придавать значения себе, своей жизни и вовсе уж ничего не значащей смерти.</p><p class="p1">Даня не мог уже сказать, что «осмотрелся»: обшарил неведомым зрением ночное пространство. Прочие зрители стремглав разбегались, торопясь вернуться по телам до полной темноты. Все словно чувствовали, что сегодня окно открылось для него, в его день рождения, и торопились оставить его наедине с впечатлением. Нечеловеческое, совсем нечеловеческое. Но разве не этого нечеловеческого я ищу? Теперь хоть будет что вспомнить, когда опять усомнишься в смысле всего — например, бесконечного учета и контроля на улице Защемиловской.</p><p class="p1">Он отлично помнил, как летел обратно, как сквозь витражное стекло увидал собственные бессмысленные глаза — но никогда не мог вспомнить, как, собственно, вернулся. Момент обратного вползания в грудную клетку совершенно изгладился из его памяти. Впрочем, предупреждали и об этом: есть вещи, которых не надо знать, душа сама все сделает. Даня очнулся на лестнице, у витражного окна, за которым темнело. Страшно хотелось пить, ломило затылок. Пара наверху исчезла — то ли пошли допивать, то ли, насытившись, разбежались в порыве отвращения. Даня не знал, сколько времени отсутствовал, и весьма смутно представлял, что творило без него опустевшее тело. На расстоянии он продолжал чувствовать его и даже поддерживать вертикаль, следя, чтобы убежище не натворило лишнего, не ринулось яростно совокупляться с первыми встречными, напиваться, драться — словом, чтобы не дало себе воли. Но говорило ли оно с кем-то и дралось ли — он не знал и боялся знать. Внешне все обстояло, как было, вплоть до холщовой куртки. Он провел рукой по лицу, узнавая себя: да, это я. Вместе с телом вернулись все его хвори и жажды:</p><p class="p1">головокружение, мерзкий вкус во рту, тоска. Но он знал теперь, какая всему этому цена.</p><p class="p1">Тесно, склизко, плохо в теле тому, кто — вот глагола пока не придумано.</p><p class="subtitle">6</p><p class="p1">— Я же говорил, — радостно повторял Кугельский. — Что же вы так, товарищ Даня. Кто же будет теперь убирать. Прислуги нету.</p><p class="p1">Даня смотрел непонимающе.</p><p class="p1">— Наблевал на лестнице, — торжествовал Кугельский. — Похвастался едой, называют это. Вы бы хоть не пили, если не можете.</p><p class="p1">— Ты что, спал там? — нападала Варга.</p><p class="p1">— Не спал, — отвечал Даня. Сейчас он выглядел сомнамбуличней Татьяны, наконец стряхнувшей Мелентьева с плеча и заинтересованно наблюдавшей за сценой.</p><p class="p1">— Где ты был вообще? Тебя полчаса нет.</p><p class="p1">— Полчаса? — повторил Даня тупей прежнего.</p><p class="p1">— Что с вами? — сипло воскликнул Одинокий, почувствовав возможность кощунства. Такого он не пропускал. — Мечтал, мечтал и сблевал. Хвалю, юноша! Поэзия — тоже рвота. Рвота идет горлом, неудержимо, как песня! — И захохотал. — Спел на всю лестницу! Поздравляю вас, новый Орфей.</p><p class="p1">Так и назову сборник, догадался он. Гораздо лучше «Плевка».</p><p class="p1">— Хоть до очка добежал бы, — брезгливо сказала Рига, только что употребленная на лестнице. Сразу после того, как Плахов от нее оторвался, он почувствовал неудержимый спазм и, судорожно дергаясь, извергся вторично — на этот раз через рот; Даня этого видеть не мог, ибо смотрел в это время не туда. Рига успела полюбить Плахова, хорошо отодрал, дельно, а что сбледнул, бывает. Допустить, что он сбледнул от прихлынувшего омерзения к ней, она не могла и правильно делала. Плахов блевал исключительно от физиологических причин. Рига-то знала, кто нарыгал, но покрывала любимого, горячая, чистая душа.</p><p class="p1">Было около одиннадцати, время расходиться. Риге и Ларе предстояло еще тащиться в общежитие, после полуночи не пускали.</p><p class="p1">— Кто же будет убирать? — уже серьезней повторил Кугельский.</p><p class="p1">— Да тряпку ему в руки! — крикнул Одинокий. — Дело поэта — платить за слова. Я всю жизнь расплачиваюсь.</p><p class="p1">— Так ты и убирай, — сказала Варга. — Ты и наблевал небось, певец.</p><p class="p1">Ей невыносимо жаль было Даню, который в самом деле, кажется, перепил с непривычки. Она видала такие случаи, вообще повидала достаточно, и Даня выглядел так беспомощно, что в эту минуту она его, пожалуй, любила. Ей сила вообще не очень нравилась, такой еще побьет, чего доброго.</p><p class="p1">— Йа?! — театрально возмутился Одинокий. — Я не выходил отсюда, прелестница!</p><p class="p1">— Такой, как ты, и не выйдет, а наблюет.</p><p class="p1">От мерзкого, слишком часто повторяемого глагола запах рвоты, казалось, пропитал всю комнату. В другое время Даня непременно взял бы ведро и тряпку и поплелся убирать неведомо за кем — он в самом деле не знал, что творило тут его обездушенное тело, — но низринуться с высот, где он был только что, в лужу на лестнице… как угодно, это было выше сил.</p><p class="p1">— Где тряпка у тебя? — спросила Варга. И она в самом деле пошла бы, но тут у Плахова, честного малого, взыграла совесть.</p><p class="p1">— Ну не вам же убирать, — сказал он грубовато. — Ладно, чего там. Давай ведро, Кугельский.</p><p class="p1">Убрала в конце концов Рига, любовь творит чудеса.</p><p class="subtitle">7</p><p class="p1">— А про день рождения не вспомнили, — сказала Варга, прижимаясь к нему. Они шли по пустой набережной — она настояла пойти долгим путем и вдоль реки.</p><p class="p1">— Слава Богу, — буркнул Даня. — Еще бы не хватало.</p><p class="p1">Он чувствовал себя крайне странно и, пожалуй, неприятно, — душа не могла примириться с новым знанием, а тело отвергало эту душу, слишком много понявшую о его ничтожестве.</p><p class="p1">— А чего там было-то, на лестнице-то? — не отставала Варга. — Чего-то они там делали-то?</p><p class="p1">Она смеялась, дурачилась, надеялась его растормошить. Опьянение ей шло.</p><p class="p1">— Ты знаешь, — начал Даня и осекся, как Гамлет перед товарищами: нет в Дании ни одного злодея… — Это очень странный опыт. У меня еще не было такого.</p><p class="p1">— В Крыму жил и не пил, — смеялась она.</p><p class="p1">— Нет, какое. При чем тут — пил, не пил… Ты тоже, что ли, думаешь, что я напился?</p><p class="p1">— Что мне думать, я вижу.</p><p class="p1">— Ничего ты не видишь. Я с полустакана и в детстве не пьянел.</p><p class="p1">— Самогон их дрянь, — заметила она. — Из костей гонят.</p><p class="p1">— Каких костей?</p><p class="p1">— Животных костей, что, не знаешь? Собирают мослы коровьи и гонят.</p><p class="p1">— Не может быть, — усомнился Даня.</p><p class="p1">— Во всех очередях говорят.</p><p class="p1">— Как же ты пила?</p><p class="p1">— А что ж не пить, разве у меня кости не из того же сделаны?</p><p class="p1">— Господи, Варга, сколько у тебя всяких глупостей в голове.</p><p class="p1">— Ну и глупостей, — согласилась она ласково. — Ну и дура, а ты умный, всю лестницу им обрыгал.</p><p class="p1">— Да какое! — поморщился он. — С чего ты вообще…</p><p class="p1">— А и правильно сделал, — сказала она и поцеловала его в щеку. — Жалко, что не их, а лестницу только.</p><p class="p1">— Варга, — решился он наконец. — Питье вообще ни при чем, может, только так… черт знает, подтолкнуло. Я сегодня сделал то, чему Остромов хотел выучить Линецкого, помнишь?</p><p class="p1">— Выход? — поразилась она. — Ах, что ты все врешь! Не стыдись, миленький, что же стыдного напиться? Врать стыдней!</p><p class="p1">В материнстве ее и снисходительности была невыносимая фальшь — верно, собственная мать ее так воспитывала, мало любила и вот заставляла себя повторять игривые прописи, ни в одну из которых не верила.</p><p class="p1">— Я не вру, — почти крикнул он. — Я видел… Я все видел, что было в комнате.</p><p class="p1">— Ничего в комнате не было, — испугалась она, и он понял, что она не того боится.</p><p class="p1">— Я видел, что ты его оттолкнула. Но ты сказала ему про учителя.</p><p class="p1">— Ничего я ему не говорила, я вообще с ним не говорила, я с этой Таней говорила лошадью, — затараторила она слишком оживленно, чтобы он поверил. — У нее глистоз, она не знает, куда деваться.</p><p class="p1">— Что у нее? — переспросил Даня, чувствуя, что сейчас она опять наговорит своей дивной ерунды и он, только что экстериоризированный, опять умилится.</p><p class="p1">— Глистоз, у ней поэтому и брюхо твердое. Она вся твердая, как доска. А я вся мягкая, хоть не жирная, вот потрогай, — она схватила его руку и ткнула этой рукой меж грудей, чего бы он не отдал за это раньше! — А она твердая, это бывает, я знаю.</p><p class="p1">— Ты сказала, Варга, — повторил он. — В этом ничего нет плохого, он сам просил распространять среди надежных… но ведь этот — о чем ты, Варга!</p><p class="p1">— Ничего я не говорила! — возмутилась она, и на этот раз он почти поверил. — Я танцевала там, а ты пропустил.</p><p class="p1">— Ты же сказала, что не будешь.</p><p class="p1">— Скучно стало, кавалер ушел, вот и танцевала. Я им итальянский танцевала, с лодкой, ты не видел. Этот круглый твой по полу ползал, следы целовал. Поставьте, говорит, ножку мне на голову, я лизну. Я бы так ему лизнула, он бы из круглого квадратный стал.</p><p class="p1">Даня усомнился. Это было по-кугельски. Может, ему и впрямь все привиделось и он только потерял сознание от дрянного самогона? Нет, не может быть. Ему негде было взять те краски, которые он видел во время зрелища, зрелища: что угодно, а этого в нем не было.</p><p class="p1">— Варга, — повторил он очень серьезно. — Я тебе правду говорю. У меня была экстериоризация сегодня.</p><p class="p1">— Ой, иди к бесу, — отмахнулась она. — К бесу, к бесу. Что ж, и защиту ставил?</p><p class="p1">Даня похолодел. Он в самом деле не поставил защиты, ибо душа вырвалась с силой, как вода из крана, а потому в беззащитное тело могла проникнуть любая дрянь, вот отчего ему теперь так неловко и даже руки как будто повинуются с трудом. Но тогда бы он ощутил присутствие еще в первый миг, на лестничной клетке. А там, он помнил, было пусто, только холодно.</p><p class="p1">— Это очень ненадолго, — стал оправдываться он. — Я не очень там чувствовал время… но прошло в самом деле меньше получаса.</p><p class="p1">— Слушай, — она вдруг остановилась и прижала горячую ладонь к его губам. — Хватит. Этого не бывает ничего.</p><p class="p1">— Да ты что! — вырвался он. — Даже Тамаркина чувствует!</p><p class="p1">— Тамаркина деревенская дура и чувствует что попало. Этого ничего нет. Там весело бывает и все такое, и сам очень милый, старый, но ты мне это не говори. Это даже не думай. Ничего этого нет, ты понял? Я думала, ты играешь, а ты всерьез. Брось, глупости. Из человека душа не выходит. Из человека знаешь что выходит?</p><p class="p1">— Варга! — крикнул он. — Я видел…</p><p class="p1">— Видел он, — сказала она пренебрежительно. — Видел. Мало ли что видел. Ты был пьяный и морок видел. А тебе надо не морок видеть, а девушку. Девушка тебе сейчас подарок будет дарить.</p><p class="p1">— Какой подарок, — залепетал он, но она уже тянула его за руку в к темному скверу. — Подожди, послушай…</p><p class="p1">— После, после, — шептала она. — Иди. Видишь домик?</p><p class="p1">В глубине сада «Спартак», разбитого на месте здешнего глухого парка, в самом деле виднелся темный сарай, где садовники держали инвентарь. Это был аккуратный зеленый домик в две комнаты — в одной стояли грабли, лопаты и прочие вилы, в другой садовники попивали чаек, отдыхая.</p><p class="p1">— Ключик, ключик, — приговаривала Варга, таща его за собой. — Одна всего бутылка, и вот ключик. Можем сюда приходить, пока тепло. У тебя сегодня подарок. Будет тебе день рождения, а не то что блевать с дураками.</p><p class="p1">— Варга, — упирался он.</p><p class="p1">— Ты что?! — остановилась она и уперла руки в боки, гневно блестя глазами. — Ты девушку хочешь баснями кормить, разговоры разговаривать? Девушка исплакалась вся. Иди давай. Все плохие, а ты еще хуже, — она толкнула его в грудь, но тут же снова схватила за руку и потащила к домику.</p><p class="p1">То, о чем Даня так давно мечтал, должно было теперь случиться в садовничьем сарае — неожиданно, не ко времени и не к месту, как всякое исполнившееся желание. Бойся услышанных молений. Он получил ко дню рождения два подарка — небесную мистерию и земное грехопадение, и после первой у него не было никаких сил на второе. Варга, ругаясь сквозь зубы, ковырялась ключиком в замке, и он с ужасом думал, что сейчас должен будет повторить это движение, к которому у него нисколько не лежала так и не улегшаяся в теле душа; еле-еле душа в теле — связи, которые их скрепляют, не были еще налажены, а без этих связей какая могла быть любовь? Тело было отдельно и ничего не хотело, у души были другие заботы.</p><p class="p1">— Варга, ради Бога, в другой раз, — сказал он дрожащим шепотом, ненавидя себя, жестоко стыдясь и где-то на страшной глубине смеясь над всем этим.</p><p class="p1">— Данечка, все знаю, — шептала она, разобравшись наконец с замком. — Все знаю, первый раз, ничего, бывает. Это еще не поздно, бывают, знаешь, такие, что и в сорок только наконец… Не бойся, Данечка, самому смешно станет…</p><p class="p1">— Да уже смешно, — сказал он, но она, к счастью, не слышала. В домике хорошо пахло сухим деревом и пылью, и стоял на столике самовар. В темноте Даня не разглядел, что еще там было, а Варга, видно, была тут не впервые, готовилась, по-хозяйски раскидала по углам табуретки, расчищая место на полу, и тянула его к себе.</p><p class="p1">— Не бойся, — шептала она, — это только вообразить нельзя, а как начнешь, так сейчас и получится. Ложись сюда.</p><p class="p1">Но как в ином состоянии, если долго не пишется, не можешь и вообразить себя слагающим стихи, — так теперь Даня не мог представить, что станет делать это с чужим телом: он не мог еще разобраться со своим. Может быть, когда-нибудь, не здесь и не сейчас, — но сама мысль, чтобы… Под тряпками у нее не было никакого белья, все это надо было разматывать, она уже стонала и выгибалась, хотя он просто лежал рядом, как труп в пустыне. Как труп в пустыне я лежал. Если бы к пророку после этой операции явилась гурия и потребовала ее удоволить, он тоже ничего не смог бы сделать. Ему только что водвинули угль, пылающий огнем, и сама мысль о том, чтобы водвигать еще что-то в кого-то, представилась бы ему не кощунственной даже, а смешной, не говоря о том, что все тело ныло, обиженно пеняя душе на получасовую отлучку. Экстериоризация была болезненней самого жестокого похмелья, хоть и похожа отдаленно, — но, как сказал бы один любитель гипербол, возводила в квадрильонную степень.</p><p class="p1">От Варги пахло уже не только духами, резко и незнакомо, и она была еще горячей, чем всегда. Даня впервые в жизни скользил рукой по голому и гладкому, чужому, угадываемому столько раз и все равно неожиданному — он поражался пустынной, бедуинской сухости ее кожи, чувствовал, как эта кожа тонка, чувствовал ее хрупкие ребра и неожиданно сильные, крепкие ноги, все это гладил и ничего не хотел. Она лезла ртом к его рту, потом ниже, потом уж вовсе туда, куда он не мог помыслить, — и все это время ему было стыдно, а глубже, за стыдом, смешно, и это значило, что теперь уж точно ничего не случится. После доброй четверти часа тщетных усилий он вырвался наконец и сел на деревянном грязном полу.</p><p class="p1">— Варга, — сказал он хрипло. — Ничего не будет сегодня.</p><p class="p1">— Тюфяк, — сказала она равнодушно и принялась быстро накручивать тряпки.</p><p class="p1">— В другой раз.</p><p class="p1">— Никогда ничего не будет. Тюфяк. Лучше со стариком, лучше я не знаю с кем…</p><p class="p1">— Варга, — повторил он. — Подождем.</p><p class="p1">— Ничего не буду ждать, пошел вон отсюда.</p><p class="p1">Он встал, вышел, тупо улыбаясь, — слава Богу, в темноте ничего не видно, — и ждал, пока она запрет дверь.</p><p class="p1">— Не ходи к нам! — крикнула она, убегая, и он впервые заметил, как некрасиво она бежит, загребая ногами, развеваясь тряпками.</p><p class="p1">— Девство мое, чистота моя, — сказал он с отвращением и засмеялся. Но за стыдом и отвращением к себе было иное — компенсация, которой он еще не понимал. Вернувшись на пустую набережную — который час? два, три? — он долго вглядывался туда, где, казалось ему, было окно. Ни звезды, ни намека просвет не было там. А что он ждал увидеть? Крышку люка?</p><p class="p1">Редкость, значительная редкость, подумал он. Гораздо более во всяком случае значительная редкость.</p></span></span>
