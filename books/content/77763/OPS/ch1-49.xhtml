<p class="p">Глава двадцать третья</p>
</div><p class="subtitle">1</p><p class="p1">Мы напомним сейчас, что происходило вокруг, хотя над разъяснением этих дел бились многие умы, честно пытавшиеся смотреть на вещи с человеческой точки зрения.</p><p class="p1">Истина же заключалась в том, что, по точному слову Михаила Алексеевича, давно уже лежавшего на Волковом кладбище под кустом любимой сирени, к 1915 году вся развесистая конструкция, называвшаяся Россия, с ее самодержавной властью, темным народом, гигантским пространством и огромным разрывом между всеми без исключения классами, словно разбросанными на этом пространстве, подобно огонькам в ночи, — была нежизнеспособна, то есть мертва.</p><p class="p1">Мертвы были разговоры о ценностях и смыслах, мертвы реформы и контрреформы, мертвенно холодна была зима и мертвенно жарко лето, мертвы были пустоши и города, дворцы и трущобы, мертва была словесность, из тончайшего слоя которой высосали все соки; мертвы были солдаты, не хотевшие умирать ни за что, и генералы, не умевшие воевать; мертва была история, пять раз прошедшая один и тот же круг и смертельно уставшая от себя самой; мертвы были слова, ничего больше не значившие, и люди, ничего больше не понимавшие; мертвы были те, кто это понимал, и те, кто с этим еще не смирился. Ведь только что все еще было, и цвел на обтянутых скулах чахоточный румянец, многими принимавшийся за свежий цвет второй юности, — но от пяти таких кругов разваливалась и не такая карусель. Были, впрочем, те, кто хотел гальванизировать этот труп и заставить его пройти еще один круг — в самой сжатой и стремительной форме повторив все то, чем он обычно сопровождался: революцию с кратким периодом вертикальных перемещений, оцепенение с установлением монархии, краткий косметический ремонт с введением умеренных свобод и окончательное впадение в старческое безумие. Трупу дали сильнейший шоковый, токовый удар, и труп пошел.</p><p class="p1">Все песни его были песнями трупа, а беды и победы — горестями и радостями червей в трупе. На всем, что он делал, лежал мертвенный свет, и любимыми его героями в самом деле были павшие бойцы. Больше всего труп любил увековечивать мертвых — живым в нем было неуютно. Иногда он уставал, останавливался, кренился, — но ему давали новый разряд: так тебе! Как всякий труп, он расцветал и оживал только от новых смертей, и то ненадолго: миллион от голоду, миллион высланных, миллион выселенных!</p><p class="p1">И труп ходил.</p><p class="p1">Пять миллионов мертвецов были сорваны с мест и строили для него заводы, шесть миллионов срывали горы и выплавляли сталь, семь миллионов охраняли кладбищенский порядок и стояли под ружьем, все они мерли без числа в болотах, тайге, пустынях, угрожали друг другу и охраняли друг друга, а когда движение их замедлялось — трупу давали новый удар, и удары требовалось усиливать, так что число жертв росло неуклонно, — но, мертвые, они не замечали собственной смерти, а многие оправдывали ее.</p><p class="p1">И труп ходил.</p><p class="p1">Когда собственных сил для его гальванизации стало не хватать, его искусно втравили в новую войну, старательно вырастив достойного врага, и враг этот дал трупу такой удар, какого не выдержал бы никто из живых, — но мертвец выдержал и завалил, задушил врага миллионами трупов, и сорок лет питался памятью об этой победе; лучшие были истреблены, первое поколение живых вырублено под корень…</p><p class="p1">Но труп ходил.</p><p class="p1">Он ходил до тех пор, пока не начал гнить заживо, пока не стал распадаться, теряя пальцы, руки, окраины; пока не разложился, как месмеризированный покойник, спасенный гипнотическим сном накануне смерти и превратившийся в мясную лужу при пробуждении. Семьдесят лет ходил он по кругу, в гротескном и страшном виде повторяя его стадии, пока не рухнул и не растекся по всему бесконечному пространству, распустив над ним облако зловония. И никакой свободы не было в том, что он упал, — ибо страшен живой злодей, но хуже мертвый.</p><p class="p1">И вот мы сидим в этом трупе и ждем, что будет. Никаким током нельзя собрать воедино мясную лужу, никаким страхом нельзя сжать в единый кулак мясную жижу. Благо тем, кто успел убежать наружу. Среди тех, кто остался, живых не вижу.</p><p class="p1">Может быть, дети. Может быть, только дети.</p><p class="p1">И Даниил Ильич любил мальчика Лешу Кретова, поселившегося в их квартире вместе с одинокой изможденной матерью в тридцать первом безвоздушном году.</p><p class="subtitle">2</p><p class="p1">Даниил Ильич к этому году уже не чувствовал времени, ибо с удивительной легкостью добился того, чему учил трактат о пяти ступенях духовного совершенства. Четыре первых дались ему сразу, поскольку две он прошел еще в детстве, о чем не знал, а еще две освоил после известных событий. Но пятая — убрать время — никак не поддавалась, и только к двадцати пяти годам он достиг успеха.</p><p class="p1">Сложность была в том, что практические рекомендации отсутствовали начисто. Говорилось просто: засим надо убрать время, — и все. За разъяснениями Даня обратился к другим сочинениям Мортимера Ливерпульского, оставившего, оказывается, десятка два регулярно переиздававшихся трактатов на разные случаи жизни — от «Обоснования метода», в котором ничего не понял сам Фрэнсис Бэкон, до «Пятнадцати способов шлифовки стекла», о котором высоко отозвался Ломоносов; Даня уже прилично читал по-английски, но ни в одном из опусов Мортимера, доступных в Публичке и даже частью переводившихся на русский, не нашел сколько-нибудь ясного указания. У Тирдата Ясного с присущей ему ясностью говорилось нечто о способах сокращения и растягивания времени с помощью дыхательной гимнастики, — и Даня дышал, но это приводило лишь к головокружению. Два раза, почти против его воли, в разгар дыхательных практик Тирдата случилась экстериоризация — душа просилась вон от этих назойливых и бессмысленных потуг.</p><p class="p1">Даня прибегал к медитации по нескольким методам сразу — воображал, как учил Остромов, путешествие огненной точки из одного мозгового полушария в другое, пытался, по методу Грэма, вообразить себя мухой и даже атомом, просачивался в щели, стремительно проносился по второму эону, обозревая с непонятной, запредельной высоты простую и чудесную карту античного мира, — но вход в третий и прочие эоны был закрыт наглухо, поскольку время никак не убиралось. Определить, почему оно никуда не девается, было сложно, но Даня чувствовал его все время — тем участком мозга, который не отключался даже во время самой удачной левитации, уносившей его, бывало, в седьмые небеса, оказавшиеся, по пословице, очень приятными, но совершенно пустыми. Уходить туда хорошо было в жару, однако и там он чувствовал течение секунд, и каждая, проходя сквозь тело, как пуля, вырывала частицу жизни, уносила в никуда.</p><p class="p1">Время он чувствовал двояко, что и отражено в двусмысленности самого этого слова: есть смысл физический, есть газетный, и одно никак не убиралось без другого. Даже в левитации, поглощенный небывалыми ощущениями, он помнил, что в городе чистят и ссылают, в мире орут и маршируют, и тень небывалой глупости и злодейства наползает на всех. У него, одного на тысячу, был выход, но выход, как назло, был перекрыт. После вечеров, проводимых в Публичке, он выходил шатаясь, с безумными, отчаянными глазами. Однажды его встретил и узнал Барцев, к тому времени известный детский поэт, успевший съездить в короткую ссылку в Орел и вернуться в Детгиз. Бубуины назывались теперь долгарями, понимая искусство как долг и как дело долгое.</p><p class="p1">— А вы что тут? — спросил Барцев.</p><p class="p1">— Я? — рассеянно ответил Даня. — Я учусь убирать время.</p><p class="p1">— Как именно? — заинтересовался он.</p><p class="p1">— По большей части молча, — сказал Даня уже с раздражением. Барцев был ему никто, а лез с расспросами. Вообще люди раздражали его все сильней.</p><p class="p1">Эту фразу — «Вбегает мертвый господин и молча удаляет время» — Барцев записал тем же вечером, но использовал лишь через год.</p><p class="p1">Но как ключом к левитации оказалось когда-то подростковое, многословное проклятье (стыдно было вспоминать его — как детские грезы о разврате), здесь оказалось нужно перерубить совсем другой канатик — крепкое, живучее чувство вины. Именно оно накрепко увязано с чувством времени — отсюда убийственная мысль о том, что уже пять часов дня, а мы не встали (хотя в постели были заняты единственно осмысленным делом — мечтанием, сном), страшное воспоминание о том, что уже пятнадцать лет, а ничего не сделано для славы, и вовсе уж сомнительное соображение о вине перед эпохой, которая вона на дворе, а я тут в норе. Даня полгода бился над разными способами убрать время, но вместо этого лишь убивал его, причем его всякий раз забрызгивало, а оно всякий раз воскресало. Проблема снялась, когда, отвлекаясь от многословного трактата Григория Сковороды о том, что есть мир, Даня решил прийти в себя и открыл газету «Вечерний Ленинград». Там он прочел рецензию на новую редакцию «Веры Народной» — Соболевский не дремал и чуть не каждый год обновлял свою «Чайку». Рецензент Г. Хрумин восторженно хвалил реставрированный спектакль Госдрамы. В этой версии, сочиненной режиссером с одобрения Деденева, матрос Шкондя был уже не прежний герой, а сомнительный революционный анархист, и Вера Народная сдавала в ЧеКа обоих — и белогвардейского мужа, и слишком красного братишечку. Спекулянтка Зося исчезла из пьесы вовсе — Фанни Кручинина играла теперь в Москве, у Таирова.</p><p class="p1">Некоторое время Даня сидел, тупо уставясь в газету, а потом вдруг стремительно сделал шаг, о котором грезил полгода. Он думал, что надо убрать время так-то или так-то, по той или другой причине, а его надо было просто убрать, и все.</p><p class="subtitle">3</p><p class="p1">Весной начиналось строительство планов, выработка маршрутов — он проводил лето в путешествиях, общедоступных, а потому почти ни для кого не привлекательных. Именно с одного из таких путешествий начался главный труд его жизни — описание истинной структуры эонов и составляемого ими целого, более всего напоминающего гигантский цветок, не имеющий земного названия. Такие цвели только в пятом эоне, и то недолго.</p><p class="p1">Даня не любил Ленинградской области с ее туманами и болотами. Он странствовал по средней России — Владимиру, Талдому, Подмосковью. Одно жаркое лето сменялось другим — повинуясь общей контрастности советского бытия с его ослепительной поверхностью и черной изнанкой, климат словно становился все континентальнее. Было лето, когда Даня купил за тридцать рублей древнюю плоскодонку и странствовал по Оке, заходя в притоки, протоки, цветущие теплые заводи. Несколько раз он прошел верховья Волги, но больше всего полюбил реки подмосковного юго-востока, лесистую низменность между Рязанью и Тарусой, тугую коричневую воду, бакены, подмытые глинистые берега. Тут жили особые люди — не самой высокой ступени, но и не совсем те, что в городах; и если в городах он давно ни с кем не говорил живого слова, то здесь, в теплой лесной глубине, всякий встречный был в радость. Человек тридцатых годов мог радоваться другому, только встретив его в лесу, да и то вдали от мест, где попадались беглые.</p><p class="p1">Он отлично помнил, как впервые услышал в себе мысль о душах рек. Это было тридцатиградусным июльским днем, на глинистом берегу узкой, сильной, прихотливо вьющейся реки, названия которой он не знал, предпочитая давать рекам собственные имена. Он увековечил уже и Вала, и учителя, и Надю. Он также сделал приятное Блоку, если Блоку было теперь не все равно, и еще нескольким поэтам, чьими именами никогда ничего не называли. Эту реку он назвал просто Вьюном, потому что она сильно его закружила. Она кружилась так, словно готовила радостный сюрприз, словно откладывала веселую встречу с главным, — и точно, за одним из ее поворотов открылась непредставимой красоты картина: большое село с огромным краснокирпичным клубом, похожим на станционное здание, и стоящая чуть поодаль одинокая, высокая церковь. Видно, она была так хороша, что ее не снесли, не отдали под клуб, вообще не тронули — просто заколотили. Такую встречу стоило откладывать. Вьюн берег свою тайну, но того, кто мог ее оценить, — выводил к ней безошибочно, а других закруживал, сбивал с пути. Это было так ясно, что Даня услышал душу реки — темную, бессловесную, застенчивую душу, обладавшую единственной тайной и оберегавшую ее от чужих; и он почти заплакал от соприкосновения с этой сущностью, искавшей в нем собеседника. Многое хотело говорить с ним и найти с его помощью слова, чтобы выразить себя; к этому он и был призван. И вся его жизнь с этого дня была заполнена описанием бессловесных миров, которые разворачивались перед ним теперь непрерывно, как бутон, — словно бессловесная подмосковная река походатайствовала за него.</p><p class="p1">В самых общих чертах обстояло так (он собирался потом записать в подробностях, потому что видений было все больше, он не успевал, надо было схватить сущностные черты). Видимый мир, в котором возобладала самонадеянность, объявлявшая все невидимое тенью и призраком, — сам был убогой тенью грандиозной мистерии, разворачивавшейся в трех основных сферах. Понятия об аде, рае и чистилище были столь же блеклыми упрощениями истины, как понятия сельского фельдшера об устройстве организма. В низкой сфере обитали огромные, уродливые, подобные кальмарам сущности, раздавленные чудовищной гравитацией. Давление атмосферы и сила тяжести там были на несколько порядков выше земных, и все устремления этих сущностей были ползучими. Превыше любых способностей они ценили приспособление к среде. Единственным их развлечением было совокупление. Иногда людям света необходимо было подключаться к их энергиям, но для того лишь, чтобы преодолеть особенно гнусное препятствие или, если речь шла о художниках, описать сходные явления в людской среде. Существа нижнего слоя отличались страшной силой жизни и быстротой регенерации. Место их обитания называлось на человеческом языке шрустр.</p><p class="p1">Вторая сфера, называвшаяся эолика, была чем-то сродни античности, в которой знают счастье, но не знают света. В ней обитали гармоничные, счастливые, человекоподобные сущности, лишенные второго плана. Иногда их гармония и самодовольство казались Дане страшней приплюснутых страстей шрустра. Он помнил, как в самом начале пути провел некоторое время в эолике, усовершенствуясь и восстанавливаясь. Но с тем большим нетерпением он через несколько уогнов — так именовались единицы времени после того, как он упразднил часы и календарь, — сбежал оттуда, прорвавшись в третий, тончайший мир, для названия которого в земном языке не было слов: лишь что-нибудь вроде набора протяженных, тоскливых гласных — Эейя, Ыийя, — могло передать его певучее, но невыносимо печальное имя.</p><p class="p1">Это был мир, начисто лишенный радости, но зато полный того розового света, который Грэм, скрытый духовидец, называл южным сиянием. И этот мир в самом деле находился несколько южней прочих — понятия четырех сторон света в эонах сохранялись, но усложнялись. Следовало, однако, уточнить понятие эона. Учителя, помнится, спросили на одном из первых собраний — спросила как раз Савельева, щеголявшая оккультными познаниями, — почему хронологическое понятие «эон» употребляется в его лекциях как пространственное: обитель разных душ. Учитель, помнится, нисколько не смутился. «Я удивляюсь! — воскликнул он тогда. — Неужели, Елизавета Дмитриевна, вы не знаете диалектики пространства-времени, хотя бы в упрощеннейшем, примитивнейшем эйнштейновском пересказе! Эон — эпоха в развитии человечества, да. — Он помедлил, подбирая слова для определения тончайших сущностей, а на самом деле стремительно импровизируя, потому что понятия не имел, что такое эон, и пользовался рукописями, полученными через третьи руки. — Но все эпохи развития человечества уже существуют в тонкой реальности! Говорим же мы о закате Европы, хотя закат — понятие не географическое; называем же Африку утром мира! Эон в нашем, подлинном учении — область третьих небес, где обитает наше прошлое и будущее. И вообще, — добавил он, помолчав, — не перебивайте, когда я говорю о тончайшем».</p><p class="p1">Этот третий эон, однако, не имел отношения к будущему и вообще ко времени. В нем обитали сущности, родившиеся случайно, а то и беззаконно. Ничем в мире они не были детерминированы, ни с чем не гармонировали, ничего полезного не делали, но в них-то и заключался единственный смысл всего — они были цветком на стебле мира, главным его оправданием. В Эейе царила беспрерывная истерика: все были слишком тонки. Там обитали эмоции самого тонкого и редкого свойства: умиление, прощение, беспокойство матерей, самоотверженность и преодоленная трусость отцов, упорство бессмысленного, но увлекательного труда, радость отвергнутого влюбленного, издали следящего за незаслуженным счастьем жестокой красавицы… Все здесь было настолько нежизнеспособно, что, если бы не тепличная атмосфера, давно бы истребилось. Но только возносясь в этот мир, где никто не был счастлив, Даня чувствовал себя на месте: о шрустре он боялся и думать, хотя долг познания время от времени заносил его туда, — а в эолике был безнадежным чужаком. В Эейе все плакали. Меньше всего это было похоже на рай. Все были учтивы. Даня боялся там обозначить свое присутствие, чтобы не уязвить их всех лишний раз.</p><p class="p1">В эонических странствиях, как он сам называл это, ему встретилось множество душ — он воочию видел почти всех любимцев, — но важной особенностью эонического зрения было то, что из тонких сфер земное виделось не менее отчетливо, только иначе. Он научился видеть намерения, опасения и попытки. В Ленинграде не было ничего особенно интересного — только усиливался слегка дух насилия и дознания, но трудно было найти в России эпоху, когда бы он не пульсировал, то затухая, то разгораясь, — но была одна точка, душа, страстно пытавшаяся взлететь. Выглядело это, как будто кто-то с той стороны стучался в стену, или как если бы мы находились за простыней, шторой, а с той стороны в эту штору постукивал клювик. Штора оставалась непроницаемой, но жалкие, точечные усилия с той стороны продолжались, и Даня захотел узнать, кто это.</p><p class="subtitle">4</p><p class="p1">Это был Левыкин.</p><p class="p1">Даня решил явиться к нему прямо из левитации, чтобы он понял. Левыкин никогда не верил в его способности, ревновал учителя ко всем и особенно к Дане, чувствуя в нем настоящее обожание, и не верил, что из обожания что-то может получиться. Сам он записывал каждое слово Остромова и бесконечно упражнялся. Даня соткался перед ним на крыше, где Левыкин в полном одиночестве практиковал левитацию. Даня смотрел на эти попытки с тоской и состраданием. Нельзя было сказать, что именно Левыкин делает не так. Не так было все. Можно заставить человека — да хоть бы и лошадь, — в известном порядке нажимать клавиши и даже запомнить их расположение, но он — да хоть бы и она — никогда не сыграет «Итальянский концерт». Ужаснее всего, что Левыкин это понимал, хотя ему и казалось иногда, что он на миллиметр приподнимается. В действительности он подпрыгивал на тощем афедроне, как ребенок, просящий конфету. Пожалуйста! Ну пожааалуйста! Но конфету, сынок, просто так не дают. Напрасна и оскорбительна мысль, что конфету можно заслужить или выпросить. Конфета у тебя или есть, или нет.</p><p class="p1">Даня спустился к нему и некоторое время молчал, приходя в обычное непрозрачное состояние. Левыкин тоже молчал, потрясенный.</p><p class="p1">— Вы? — спросил он наконец.</p><p class="p1">— Вы? — улыбнулся в ответ Даня.</p><p class="p1">— Но как вы… где вы…</p><p class="p1">— В Ленинграде, где и вы.</p><p class="p1">— Я недавно в Ленинграде, — сурово сказал Левыкин. — Мне дали два года Куйбышева. Там я не поладил, один раз не пошел отмечаться… год добавили, на этот раз Омск. По возвращении — минус десять, знаете, что это такое? Еще год в Твери. Я вернулся два месяца назад.</p><p class="p1">— Ужасно, — искренне сказал Даня. — Сочувствую вам и думаю иногда, что если бы я тогда со всеми… было бы легче.</p><p class="p1">— Легче — да, — важно сказал Левыкин. — Все значительно продвинулись. Я же со многими в переписке — Боровиным, Эммендорфом… (Никого из этих людей Даня не помнил). Испытания чрезвычайно помогают сосредоточиться. К сожалению, с Борисом Викторовичем я связь утратил, он не отвечает… Но в Омске был учитель не менее, а может быть, и более уважаемый. Называть его вам, к сожалению, не могу. Он сидел еще во Франции, в двенадцатом, а до этого был в ссылке в Казани…</p><p class="p1">Вероятно, единственным критерием силы учителя для Левыкина было теперь, сколько он перестрадал вообще и сидел в частности.</p><p class="p1">— Очень серьезный учитель, — повторил он. — Дело сразу пошло. Я сейчас практически левитирую, хотя еще, как вы понимаете, не вполне, — но объяснить вам не смогу, это вещи, доступные лишь при известном опыте…</p><p class="p1">Этого Даня не вытерпел. Он сто раз потом укорял себя за мальчишество, за неуважительный и, в сущности, опасный поступок, — но не мог ничего с собой сделать: используя отлично видимые в тот день ступени воздуха, он поднялся над Левыкиным и прошел несколько кругов, восходя спиралевидно, в той простейшей технике, которую почти и не использовал теперь — как пловец, освоивший баттерфляй, с трудом вспоминает первые гребки по-собачьи.</p><p class="p1">Левыкин зажмурился и затряс головой. Он мог еще представить, что Галицкий влез к нему на крышу по пожарной лестнице, просто так, по случайной фантазии, — шел, дай, думает, влезу, а там Левыкин; статистически такое еще можно было вообразить, и это было по крайней мере достоверней, чем продвинувшийся Галицкий. Такие, как Галицкий, не продвигаются. Но сейчас перед ним было нечто, сотрясавшее все основы его мира, в котором страдание, усердие и другие невыносимые вещи были единственной мерой достоинства; и он тряс головой, отгоняя видение, но Галицкий, почти не меняясь, лишь слегка удлиняясь вследствие, может быть, дисперсии, интерференции или диверсификации, как там называл это томский учитель, поднимался перед ним без всякого усилия, а потом так же легко опустился, даже не запыхавшись.</p><p class="p1">И он спросил, в соответствии со своей логикой, — не «как вы делаете это», а «почему вы».</p><p class="p1">Даня сначала не понял вопроса. В Дане еще много было от прежнего Галицкого — например, он стыдился того, что освоил нечто, недоступное другим. Вины уже не было, как и времени, но смутная неловкость — даже перед Левыкиным — была. Он видел, что Левыкин упрям и бескорыстен, и не понимал, почему он не умеет — и никогда не сумеет — левитировать хотя бы от отчаяния, не говоря уж про счастье.</p><p class="p1">— Работал, — сказал он смущенно. — Читал… и потом, знаете… когда теряешь все, поневоле взлетишь.</p><p class="p1">— Но я потерял больше вашего, — резко ответил Левыкин. — Я потерял дом, работу, меня выписали — знаете? Управдом наш — Ступкин, страж порога, — выкинул меня сразу. Не мог простить, что я тогда подчинил его. Остромов предупреждал, что это не прощается. Я его заставил, конечно. Вернулся и заставил. Кто раз покорился — тот всегда потом ваш. Вписал, сволочь. Попробовал бы не вписать. Но ссылка… вы не были в Омске. Вы не знаете, что это такое. Я был там изгой, посмешище. Ни одной культурной души. Они понимали, конечно, насколько я выше. Я там не только левитировать — я не мог вызвать элементарного демона, Батима какого-нибудь.</p><p class="p1">В том-то и дело, хотел сказать ему Даня, в том и причина, что ты не мог использовать это как трамплин. Ты ненавидел эту враждебную среду — но недостаточно, чтобы взлететь, оттолкнувшись; тебя травили — а ты не сумел насладиться этим, как должно… Вместо этого он сказал совсем иное, неожиданное для себя самого.</p><p class="p1">— А как знать, — проговорил он задумчиво. — Может, я потому и полетел, что меня не ломали.</p><p class="p1">— Глупости, — недоверчиво сказал Левыкин.</p><p class="p1">— Нет, нет. Я не знаю, чтобы со мной было. Я, может быть, не полетел бы, пройдя через это… Знаете, про войну лучше всего пишут те, кто там не был. У того, кто был, — какая-то способность отшибается. Так что мне, скорей всего, просто повезло. Знаете, почему я не попал на последнее собрание?</p><p class="p1">— Не знаю. Вы часто пропускали, — заметил Левыкин неодобрительно.</p><p class="p1">— У меня отца высылали. Я поехал к нему. Он дал телеграмму, что при смерти. Боялся написать открыто, чтобы у меня тут не было неприятностей. Я поехал в тот же вечер. Его выслали в Вятку с братом. Брату двенадцать, маленький. Я год там с ними прожил, пока брат не устроился учиться на фельдшера, но, в общем, неважно. Год в Вятке — это тоже, сами понимаете… Но не то, что у вас. Я не знаю, как бы я на следствии… Мне хотелось потом самому явиться, но я понял, что бессмысленно… и смешно как-то… В общем, я не знаю, что на вашем месте. Я бы, наверное, тоже не взлетел.</p><p class="p1">— Что значит — тоже?! — взвился Левыкин, не поднявшись, однако, ни на миллиметр. — Что такое?! Я достиг… вы не можете знать, чего я достиг! Я первым вызвал стража, ко мне являлись все демоны, меня Ступкин обратно вписал!</p><p class="p1">Он долго еще перечислял свои достижения: удачная экстериориация в Омске, когда напали трое местных, пьяных, — вылетел из тела, наблюдал со стороны, боли не чувствовал, били как бы не его. Буквально выбили душу, хромал потом три недели.</p><p class="p1">— Ну вот видите, — сказал Даня. — Я, наверное, зря вам про все это.</p><p class="p1">— Но как, как вы… — Левыкин понял наконец, какой вопрос надо было задать.</p><p class="p1">— Не знаю, — честно сказал Даня. — Я могу вам объяснить тысячу деталей, но они имеют смысл, только когда будет первый раз. После него уже ясно, что и как. Например, поворачивать налево, потому что направо… ну, в общем, нехорошо направо. И я все-таки думаю… взлетают не от занятий, тренировка — хорошо, но я ведь почти не тренировался. Взлетают, когда входят в известное состояние, а оно не тогда, когда бьют, или по крайней мере очень слабо с этим связано. Оно — ну, что ли, ты очень сильно отталкиваешься, совершенно отпускаешь себя, но и это все следствие. В сущности, взлетаете не вы. Взлетают ваши причины, но это все так коряво! Это когда к чувству полной потери всего прибавляется состояние силы, когда как бы все уже можно… Но словами я все только порчу. Я уверен, что у вас другой путь. Я чувствую вашу силу — иначе не нашел бы вас, конечно.</p><p class="p1">Этот аргумент Левыкина успокоил. Он и в гимназии учился посредственно, хуже тех, кто работал гораздо меньше и неусидчивей. Но ведь Галицкий нашел его. Значит, он подавал о себе знак — и оккультная связь, о которой предупреждал Остромов на первых занятиях, срабатывала; кто умеет оккультную связь, тот и полетит. Говорит же Галицкий… Левыкин и сам не заметил, как произвел Галицкого в авторитеты: тот хоть и недострадал, но летал. Без авторитетов Левыкин не мог.</p><p class="p1">— Вы бы мне как-то… несколько уроков… — начал он.</p><p class="p1">— Обязательно, — соврал Даня. Он знал, что больше не увидит Левыкина никогда.</p><p class="p1">Бесплодные попытки на неделю стали настойчивей, оголтелый клювик дырявил занавеску что было мочи. Вскоре, впрочем, Левыкин растворился в общем ленинградском фоне — где все медленно понимали, что ничего не получится. Каждый вкладывал в это нечто свое, но чувство было общее.</p><p class="p1">Что касается судьбы Левыкина, то он вызвал Батима, а как приходит Батим, мы уже говорили. Впрочем, в то время он приходил уже и к тем, кто не звал. Так всегда бывает, когда слишком многие вызывают Батима, желая властвовать над миром и не зная, что с ним делать.</p><p class="subtitle">5</p><p class="p1">Алеше Кретову было десять, когда вместо Поленова в квартиру умершего Алексея Алексеича Галицкого вселили его мать, Софью Кретову по кличке Заеда, ткачиху с фабрики имени Герасимова.</p><p class="p1">Он был болезненный, молчаливый, золотушный мальчик, отличавшийся, однако, недетской дотошной памятью и назойливым любопытством. Он любил читать. У него были странные фантазии. Чаще всего ему казалось, что он уже когда-то жил и не впервые видит вещи, а узнает их. Когда он впервые увидел соседа Даниила Ильича, ему сразу показалось, что этот человек ему знаком — то ли встречался, то ли снился.</p><p class="p1">Алеша Кретов проводил в школе не больше недели подряд, после чего заболевал. Болел он часто и, пока мать отрабатывала смену, лежал дома один. Его это не тяготило. Кормила его соседка, а Даниил Ильич заходил после работы, на которую теперь ходил через день. Карасев, к его удивлению, предложил это сам: «Вы ведь книгу пишете? Вот и пишите. В случае чего отработаете сверхурочно». Он был почему-то заинтересован в книге, или так казалось? Но Даня знал, что время этой книги придет через годы, и потому не рвался показывать ее другим. В лучшем случае ее сочли бы безобидной фантазией безумца, грезами вроде эфирных. Карасев еще подмигнул ему. Если бы не сугубо будничная внешность да не бесконечное карасевское невежество, не позволявшее Дане наделить начальника романтическими чертами, — Даня бы уверовал, что Карасев наблюдает за ним с особой целью, втайне одобряя и готовя к чему-то; иногда он перехватывал его странно любующийся взгляд, но Карасев тут же отводил глаза. Как бы то ни было, у него были теперь неслужебные дни, которые он делил между трактатом и разговорами с интересным мальчиком Лешей.</p><p class="p1">Мальчик Леша был единственным, кого Даниил Ильич жалел, но не брезгливой и не расслабляющей жалостью: он узнавал в нем себя и хотел передать если не дар, то хоть что-нибудь. Трудно было сказать, что своего находил он в этом ребенке: сентиментального умиления перед любым детством у позднего Галицкого не было в помине. Вероятно, ему нравилась алешина серьезность в сочетании с постоянной готовностью к игре — но не разрушительной, не глупой. А может быть, ему нравилось то, что этот мальчик все время читал, и читал преимущественно ерунду, что-то про басмачей, про дьяволят, про следопытов — плохого красного Купера. Но верней всего, Даниила Ильича трогало то, что мальчик Кретов был, в сущности, никому не нужен — мать его жалела, но не любила. Ей не такого хотелось.</p><p class="p1">И Даниил Ильич рассказывал ему все, что знал, — не особенно даже заботясь о переводе со взрослого языка на детский. Два лета они пространствовали вместе — были на реке Вьюне, видели прекрасную церковь, собирали землянику под Тарусой, Даниил Ильич учил Лешу Кретова разводить костер, хотя сам нигде не учился этому, и беседовал с ним о преимуществах разных профессий. Леше Кретову хотелось работать так, чтобы много путешествовать и пореже видеть людей, и Даниил Ильич подсказал ему: геолог — вот то самое. Он подарил ему книжку Ферсмана и рассказал, что знал, о происхождении Земли — в частности, о том, что поиски драгоценных камней немыслимы без знакомства с обитателями шрустра; но об этом он говорил осторожно, чтобы не закрыть мальчику Кретову собственных путей к познанию. После этих поездок Леша поздоровел, выучился плавать и в школе уже почти не болел.</p><p class="p1">— Дядя Данила, — спросил Кретов однажды. — Почему вы один живете?</p><p class="p1">— Не знаю, — сказал Даня. — Вот же, я не один. Ты со мной.</p><p class="p1">— Я чужой. А почему своих нет?</p><p class="p1">— Есть, да их не видно, — загадочно ответил Даня.</p><p class="p1">— А-а, — протянул Леша и не стал лезть с расспросами. За это Даня любил его тоже. Леша, однако, много думал над этим ответом. Он понял, что у дяди Данилы есть своя шпионская сеть, но хорошая. Все ведь говорили про шпионов, иногда их ловили. Он стал бояться, что дядя Данила — шпион, и значит, его тоже возьмут.</p><p class="p1">— Дядя Данила, — спросил он недели через две, уже в Ленинграде. — А почему столько шпионов?</p><p class="p1">— Да они не шпионы, — сказал Даня полушутя. Он заканчивал важную главу, и ему было не до того. Леша Кретов играл на полу в настольную, а в его случае напольную игру «Красная конница» и дописывать не мешал.</p><p class="p1">— А кто?</p><p class="p1">— Это они говорят, что шпионы. Чтобы отстали.</p><p class="p1">— А-а, — опять протянул Леша. Он немного помолчал и задал следующий вопрос — как всегда, странный. Вот еще за что его можно было любить — Даня никогда не мог угадать его следующий вопрос.</p><p class="p1">— А если не скажут? — спросил он.</p><p class="p1">— Тогда их наградят за стойкость, — машинально ответил Даня. Он как раз писал о жаростойкости колонн в шрустре.</p><p class="p1">Больше Леша Кретов его в тот день ни о чем не спрашивал. Ему хватило.</p><p class="p1">Одноклассники не любили его, но не трогали. Он был молчалив и неопрятен, но как-то взросл, как все много болевшие дети. Он слушал равнодушно, ничем не выражая отношения к услышанному, но все запоминал. Он задавал неожиданные вопросы. Даниилу Ильичу казалось, что Леша освоит левитацию куда раньше, чем он сам.</p><p class="p1">Мальчик Кретов не знал, как относится к Даниилу Ильичу. Это не было любовью в собственном смысле, ибо вообще мало способен был к любви. Слова «аутизм» тогда еще не знали. Кретов был странным мальчиком, он все хотел привести в систему, подчеркивал в газетах одно и то же слово, если оно часто встречалось на странице, и думал, что все в мире управляется законом чисел. Если к ним присмотреться, можно будет предсказывать. Но без Даниила Ильича мир терял стройность. Даниил Ильич мог увести от людей в края, где никто никого не обижал и где занимались истинным делом. Он был вестником другого мира, в котором Алеша Кретов был гораздо более дома. И потому, когда Даниила Ильича долго не было дома или он работал, Алеша Кретов чувствовал нехватку воздуха.</p><p class="p1">Однажды Даня рассказал ему сказку про ученика чародея — всю, вплоть до убийства принцессы и спасения от чумы.</p><p class="p1">Он рассказывал ее долго, четыре вечера, но Леша Кретов все не поправлялся — он подолгу выбирался из обычной простуды, а с корью провалялся однажды три недели. И потому на пятый вечер он все еще метался, и лицо у него горело, но он шепотом требовал конец — а какой конец был у этой истории?</p><p class="p1">Хасан остался один и правил на острове, и силой его чародейства остров процветал, импровизировал Даня, понятия не имея, чем все это закончится. Рабыня оставила ему сына, которого Хасан растил, обучая волшебству. Но в один прекрасный, а на самом деле ужасный день мальчика, игравшего на берегу, похитила птица Рух. Долго искал его Хасан, но гнездо птицы Рух далеко, на черном острове, и лишь через три года приплыл он туда. Птица Рух воспитывала мальчика по своим рухским законам, которые быстро превращают человека в ее подобие. Через год он умеет летать, через два — побеждать в драке любую другую птицу, а через три свободно пересекает океан, не нуждаясь в остановке на мачте случайного корабля.</p><p class="p1">Хасан приплыл на остров, но подняться на скалу, чтобы сразиться с птицей, не мог. Ибо злой волшебник охранял этот остров, и заклятие, наложенное им, было страшно: ни один другой чародей не мог проникнуть на эту скалу. А простому смертному нечего было там делать — он не был страшен птице Рух.</p><p class="p1">И тогда, продолжал Даня, Хасан у подножия скалы отрекся от своего чародейства и выбросил в море перстень чародея, знак высшей власти. И скала пропустила его, и он прошел в пещеру, где страшным каркающим хохотом смеялась над ним птица, и так же смеялся его выросший сын.</p><p class="p1">— Сын мой, — сказал Хасан, — я был великим чародеем, отдал для этого все и отрекся от всего.</p><p class="p1">— Не слушай его, — прокаркала птица, — у него ничего не было, он нищий.</p><p class="p1">— Сын мой, — продолжал Хасан, — я потерял твою мать, чтобы спасти остров, но теперь у меня нет острова, остался только ты.</p><p class="p1">— Да и того не осталось, — каркала птица, — он уже не твой, а мой.</p><p class="p1">Алеша Кретов начал подозрительно сопеть.</p><p class="p1">— Сын мой, — сказал тогда Хасан, — вспомни это, — и показал выросшему сыну зеркальце, и сын увидел себя и ужаснулся перемене. Он увидел свой клюв, свое хищное лицо, свои сутулые птичьи плечи, увидел старого отца перед собой, зарыдал и бросился на камни перед ним. А отец присел погладить его по голове, и они забыли о птице Рух.</p><p class="p1">— Хорошо же, — прокаркала птица, — я улетаю с этого острова, который осквернен человеком. А вы остаетесь здесь вдвоем, и обратной дороги вам нет. Посмотрю я, как вы здесь выживете, два человечка на острове, где нельзя быть человеком. Прощайте, бескрылые!</p><p class="p1">И она улетела, а отец и сын, обнявшись, смотрели ей вслед без особенного сожаления.</p><p class="p1">— Ну, они выжили там? — спросил мальчик Кретов.</p><p class="p1">— Конечно, — успокоил Даня. — Ведь у них было зеркальце. Они поймали луч, развели огонь, ну и вообще, как говорится, началась цивилизация…</p><p class="p1">Сам он не очень верил в такой исход. Но придумалось так, а особо раздумывать было некогда. И мальчик Кретов в тот вечер заснул почти здоровым.</p><p class="p1">Матери Алеши Кретова не слишком нравился одинокий мужчина, который Бог знает о чем толкует с мальчиком и непонятно чему его учит. На третье лето она не отпустила Лешу с Даниилом Ильичом в Мещеру, и Леша спокойно принял это, не плакал. Может быть, в том, чтобы отдаляться от всех и ни к кому не привязываться слишком, была своя правда — и Даня с легким сердцем уехал в очередное одинокое странствие, где услышал много новых откровений. Будь с ним Леша, он бы их, конечно, не услышал.</p><p class="subtitle">6</p><p class="p1">Ранней зимой 1939 года эзотериков стали брать по второму кругу.</p><p class="p1">Было уже все равно, кого брать. Всех, кого не расстреляли за былые грехи, достреливали. Всех, кого выпустили, вылавливали снова, выковыривали из складок, куда они предусмотрительно забились, и наказывали за старое — кого смертью, кого сроком. Ссылка более не практиковалась, ибо гальванизация осмысленна тогда, когда усиливается.</p><p class="p1">Галицкий упоминался в нескольких протоколах. Левыкин вспомнил, что видел его. Остромов, взятый в Абхазии на чайной фабрике и умерший после третьего допроса от сердечной недостаточности (тогда все умирали от сердечной недостаточности, выражавшейся во множественных гематомах), успел показать, что да, такой был.</p><p class="p1">Галицкий был фигура странная, недостоверная. В прошлый раз его не тронули, ускользнул. И вот теперь он спокойно работал в отделе учета, в странном тресте, которым тоже пора попризаняться, — но это успеется: подозрительно было то, что Галицкий запомнился единицам. О нем никто не мог сказать ничего определенного. Он хитро замаскировался. Никто не помнил даже, где он живет. Его быстро нашли по фамилии. Такие — ни для кого не видные, но ни от кого не прячущиеся, — были опасней всех. Видимо, он курировал всю сеть. Сети еще не было, но на допросах ее выдумывали быстро. Допрашивать эзотериков было одно удовольствие. У них было превосходное воображение. Жаль только, что многие упоминаемые ими сущности, враждебные советской власти, были недоступны, ибо находились в тонких мирах. После кратких, но убедительных разъяснений эзотерики переставали валить все на Гермеса Трисмегиста и начинали сдавать друг друга.</p><p class="p1">На очных ставках они вели себя трогательно. Большинство давно разлетелось, почувствовав, что самое надежное — оседать по окраинам; но теперь скребли и по сусекам. Они давно не видели друг друга и радостно делились вновь обретенным опытом. Трудность заключалась в том, что они никак не желали признаваться во вредительстве. Напротив, у них получалось, что только их молитвами и радениями воздвигся, скажем, Днепрогэс. В тридцать восьмом взяли Александра Валерьевича Варченко, человека серьезного. Вместе с ним взяли Двубокого, у которого нашли семнадцать сушеных членов, по числу членов Политбюро. Аналогия была ясна. Он хотел их извести. Александр Валерьевич Варченко был человек серьезный и обещал следователю всевластие, потому что гекатомба была самое то, и страна уже почти достигла абсолютного могущества, но убирать сейчас Александра Валерьевича было никак нельзя, он один знал, зачем все это. Следователь, в отличие от Александра Валерьевича, был человек несерьезный, Сент-Анри д’Альдейбра не читал, и Александр Валерьевич отправился в гекатомбу, или в мясорубку, это как кому нравится. Ему не нравилось никак, но его не спросили.</p><p class="p1">Даня понятия не имел, что за ним придут. Он допускал это, разумеется. Знание тонких миров не предполагает знания будущего, ибо истинный маг видит пути человечества, а с личной судьбой как-нибудь разберется сам. На известном уровне личной судьбы вообще нет. Даня не знал своей степени, да и не нуждался в этом, поскольку никаких третьих, седьмых и двадцать девятых степеней, как сказано в одном трактате, иарерахия не содержит. Степеней всего три — ученик чародея, чародей и то, к чему Даня медленно, но неотвратимо приближался.</p><p class="p1">Его взяли, когда он приступил к ежедневным упражнениям и только что разогрелся. Ему не составило бы труда уйти у них из рук, исчезнуть, мгновенно перейти в состояние левитации — для этого не потребовалось бы даже особой сосредоточенности, поскольку разрешившееся долгое ожидание, хотя бы и подспудное, часто приводит к взлету, и не всегда это ожидание счастья. Но в нем с осени двадцать пятого года сидело желание искупить тогдашнее бегство. И кроме того, ему хотелось знать, как все будет.</p><p class="p1">Заеда была на службе, Алеша Кретов — в школе. О том, что его взяли, знали только управдом да дворник.</p><p class="p1">Даниила Ильича привезли во внутреннюю тюрьму Большого дома на Литейном, отобрали паспорт, кошелек, часы, ремень и шнурки, никакого допроса не сняли, а отправили, по тогдашней практике, в одну из переполненных камер, располагавшихся по обе стороны длинного коридора в ледяном подвале без окон. Летом тут умирали от жары, зимой от холода. Рассказывали, что для перемалывания трупов в конце коридора устроена электрическая мельница. Это была неправда. Ничего интересного, в том числе электрической мельницы, там не было.</p><p class="p1">Даня долго думал, как все будет, и даже обиделся, насколько все похоже. С некоторых пор совершенно нечему было удивиться.</p><p class="p1">Его мариновали в ожидании первого допроса полные сутки, и все эти сутки он прислушивался к разговорам. В его камере было шестьдесят человек, и все эти люди были уверены, что недоразумение выяснится, хотя в душе понимали, что, по всей вероятности, не выйдут отсюда никогда. Большая часть заключенных внутренней тюрьмы вскоре переводилась в Кресты — на Литейном осуществлялась так называемая активная фаза следствия. Выяснением деталей и проработкой фабулы занимались на местах. В Большом доме отыскивали место каждого дела в общей мозаике и добивались главного — признания. После него обычно шло легче.</p><p class="p1">Даня пятый час без движения сидел на так называемой шконке — деревянной полке, на которой давно спали по очереди. Днем лежать не разрешалось. Он практиковал экстериоризацию, но шла она трудно. Мешал фон — повышенная концентрация сновидного, сковывающего страха; максимум того, что ему удалось, — вогнать себя в состояние тоскливого полубодрствования. То, что было перед ним, не походило ни на шрустр, ни на Эейю, а скорее на их причудливый синтез — то ли внутренний ад высших сущностей вышел наружу, то ли внешний ад низших облагородил их наконец и вместо животной радостной злобы вызвал покорный страх. Изначально ничего подобного не было — только человеку под силу было создать такое.</p><p class="p1">— Как вы думаете, — спросил его тихий, почти невидимый человек слева, — зачем надо, чтобы признавались?</p><p class="p1">Даня сначала промолчал, подумав, что обращаются не к нему, — но робкое, почти птичье поскребывание по рукаву подтвердило: ответа ждали от него.</p><p class="p1">— Не знаю, — сказал он честно.</p><p class="p1">— Вот и я не знаю, — закивал человечек слева. — Ведь они и так могут сделать, что захотят. Признаться, не признаться — какая разница? И других сдавать необязательно. Они же все равно всех могут взять, кого им понравится.</p><p class="p1">Даня молча кивнул.</p><p class="p1">— Ну так вот я и не понимаю! — возмущенно зашептал человечек. Видимо, он многим здесь уже задавал этот вопрос и ни от кого не получал ответа, да здесь и не откровенничали. — Видимость они никакую давно не соблюдают. Всем все равно. Запад промолчит. Он теперь на все молчит. Да никому и дела нет. Одни дикари едят других дикарей, — что, кто-нибудь вступается? Если б чуть иначе повернулось, мы бы тоже ели.</p><p class="p1">Даня молчал.</p><p class="p1">— А себе вы как объясняете? — спросил шепоток слева. — Должна же быть какая-то причина. Почему они хотят, чтобы мы признались? Они же сами за нас все могут там написать.</p><p class="p1">Даня подумал, что если бы стены были гладкие, экстериоризация бы удалась. Но они были шероховатые, в виде так называемой бетонной «шубы», и этим почему-то угнетали особенно. Почему здесь устроили эту «шубу»? Вероятно, чтобы не удавалась экстериоризация. Решительно все у них было учтено.</p><p class="p1">— А я знаю, почему, — продолжал голосок чуть слышно. — Я знаю.</p><p class="p1">Даня по-прежнему не поощрял его к откровенности; однако ему стало любопытно.</p><p class="p1">— Дело в том, — сказал голосок и пресекся. — Дело в том, что это делает нас виноватыми. Ведь им нужны виноватые. С невиновными они дела иметь не могут.</p><p class="p1">Даня улыбнулся. Это смутно напоминало слова — чьи же? Университетского экзаменатора, фамилию он забыл, как большинство подробностей той жизни. Сначала сделать всех виноватыми, раздать кресты — несите! — как бы из милости. А потом заставить работать, выдав это за почетное право. Что ж, логично. Работай из благодарности за то, что не убили. Пятнадцать лет назад заставляли пахать за гроши и против всех правил, чтобы работа никак не могла быть в радость, — а сопротивляющихся пугали ссылкой или предательством классовой борьбы. Теперь гальванический удар усиливался: работай, пока жив. Жизнь — какого еще вознаграждения? Особенно жизнь, чудом не отнятая…</p><p class="p1">— Виноватыми, — продолжал голос, — мы становимся в ту секунду, когда оговариваем себя. Ведь это само по себе преступление, которое на весах Божьих будет весить не меньше любого вредительства. И только когда они склонят нас к этому преступленью, их душеньки довольны. После этого человека можно топтать как угодно.</p><p class="p1">— А если не оговорим? — задал Даня кретовский вопрос.</p><p class="p1">— Оговори-им, — уверенно повторил сосед справа. — Кто не ломался, тех плохо ломали.</p><p class="p1">Интересно, подумал Даня, как это будет. Но как это будет — он предположить не мог, ибо чародей на известном этапе ничего не решает сам.</p><p class="subtitle">7</p><p class="p1">На следующее утро — времени он не чувствовал давно и не нуждался в нем, но раздали хлеб и кипяток, — его вызвал на допрос некто Капитонов.</p></span></span>
