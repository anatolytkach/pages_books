<span><span><p class="p1">Эта точка зрения была собственное изобретение Остромова, он вообще предпочитал не заимствовать чужие теории, ибо никогда не знаешь, с кем истинный создатель успел поделиться открытием: иной раз перескажешь как свое, а давно напечатано. Эта теория и точно открылась ему посредством личного опыта, но не алхимического, а питейно-гимназического свойства: однажды в своей компании, в Вологде, они задумали сварить жженку. Для приготовления истинной жженки требовались, согласно рецепту, шампанское, ямайский ром, гаванская корица, полтавская вишневка, мускат, кокос и ананас. Собирали они все это неделю, особенно намаявшись с корицей, да и вишневки, какую пивали при Пушкине, давно не делали; но как-то, в общем, собрали, и вышел обычнейший сироп, от которого потом страшно болела голова. Однако сами сборы были до того увлекательны, что заварилась жженка из десятка вологодских юношей плюс торговец в колониальной лавке, научивший Остромова двум полезнейшим карточным фокусам.</p><p class="p1">— Очень здраво, — сказал Михаил Алексеевич. — Странно, что не приходило мне в голову. Видно, это потому, что я не занимался алхимией всерьез.</p><p class="p1">— Ах, ведь и я не всерьез, — небрежно сказал Остромов, махнувши длинной ладонью. — Есть истинные знатоки — в Соединенных Штатах, где давно уже ясен тупик позитивной науки… Любопытные есть люди в Бразилии, только пробуждающейся… Я многого ожидаю оттуда, — признался он доверительно. — Но согласитесь, что для серьезного изучения духовной науки надо же в каждой области взять хоть основы… Без понятия супры, например, не может действовать ни один кружок.</p><p class="p1">Что говорить, закинуть удочку он умел.</p><p class="p1">— Супра? — с готовностью отозвался Неретинский. — Никогда не слыхивал.</p><p class="p1">— Неудивительно, — пожал плечами Остромов. — Это один из ключевых пунктов всякой серьезной антропософии, а ею занимаются лишь на пятом градусе… Но в изложении самом общем — это тот математический эн плюс один, который порождается сам собою в правильно подобранном сообществе. У алхимиков это дополнительный элемент, возникающий при правильном подборе прочих. Скажем, никто никогда не видел aqua telentina — элемент, необходимый для производства так называемых духов Альтиуса. Вы слышали о них, конечно.</p><p class="p1">— Тоже не слышал! — горячо произнес Неретинский с азартом, с каким только просвещенные люди признаются в незнании чего-либо; полузнайка небрежно скажет — ааа, читал…</p><p class="p1">— Чтобы не входить глубоко, — пояснил Остромов, — это алхимическая жидкость, запах которой делает любого мужчину неотразимым для женщины, но только на тридцать-сорок секунд, так что действовать надо быстро.</p><p class="p1">Стечин одобрительно свистнул.</p><p class="p1">— А, да-да-да, — сказал Неретинский. — Я знаю эти духи, они бывают металлические, а бывают бумажные, а действуют так недолго потому, что за десять секунд обмениваются на тряпки.</p><p class="p1">Остромов улыбнулся обычной тонкою улыбкой, показывающей, что острота оценена, но собеседник безнадежен.</p><p class="p1">— Аква телентина, — продолжал он, мельком подумав, что название подозрительно похоже на телятину, которой сильно хотелось, — неизвестна в чистом виде и возникает лишь на доли секунды, когда собраны все правильные ингредиенты: сколько помню, это кровь варана, порошок кадмия, уголь жженого галицийского дуба и сернистая медь. И амбра, конечно, амбра. Тогда жидкость на миг становится прозрачна и слегка опалесцирует, после чего можно накалять. Это знак, что состав сложен как следует. Так и в любом кружке — где собралось шестеро истинных слушателей, незримо присутствует седьмой.</p><p class="p1">«Где трое во имя мое, там и я с ними», — подумала Надя. И для книги это, должно быть, тоже верно: четыре части, а пятая — супра, невидимая, но главная.</p><p class="p1">— В нашем кружке есть супра, — засмеялся Неретинский.</p><p class="p1">— О да! — подхватил молчаливый и робкий юноша, жавшийся к Неретинскому так откровенно, что Надя испытывала легкую брезгливость.</p><p class="p1">— Поздравляю ваш кружок, — серьезно сказал Остромов. — Мне еще только предстоит собрать мой, для изучения духовной науки.</p><p class="p1">— Я непременно к вам зайду, если позволите, — попросился Неретинский. — Все это захватывающе интересно.</p><p class="p1">— Весьма буду рад, — кивнул Остромов.</p><p class="p1">Дальше заговорили о людях, которых Надя не знала, на языке, которого почти не понимала; Остромов слушал, вставляя остроумные замечания, из которых следовало, что в кругу петербургских лунных он когда-то ориентировался, но никогда к нему не принадлежал. Неретинский ласково ему улыбался. Остромов рассказал немного о тифлисских странствиях, припомнил пару анекдотов, а ближе к одиннадцати поднялся уходить.</p><p class="p1">— Да, Михаил Алексеевич, — сказал он. — Русский человек на пороге опоминается. Я ведь за «Ребусом», простите великодушно.</p><p class="p1">— Сейчас-сейчас, конечно. Зачем вам только эта белиберда?</p><p class="p1">— Для человека внешнего круга, — сказал Остромов важно, — это, разумеется, чепуха и реникса. Но для постоянного читателя там сообщается меж строк много существенного, а мне нужно восстановить тонус…</p><p class="p1">Михаил Алексеевич извлек из кипы книг на полу пачку тонких пожелтевших журналов.</p><p class="p1">— Чувствительно вас благодарю, — сказал Остромов. — Со своей стороны готов помочь, чем смогу.</p><p class="p1">— Приходите, непременно приходите, — доброжелательно пригласил Михаил Алексеевич.</p><p class="p1">— Я тоже пойду, — сказала вдруг Наденька. Она сама не знала, какая сила заставила ее выйти вместе с алхимиком.</p><p class="p1">— Заодно и Надю проводите, — сказал Игорек.</p><p class="p1">— Почту за счастье, — ответил Остромов серьезно.</p><p class="subtitle">5</p><p class="p1">Особенно досадно, что в этот раз без луны; вот всегда так. Как разговор с никому не нужным сумасшедшим, полезным в деле, но невыносимым на личном плане, — так тебе полное сияние; а как прогулка с прелестным существом, чистым, легко обучаемым, — так одни мелкие брызги болотных звезд. Прелесть апрельской ночи не околдовывала Остромова, он сам мог околдовать кого хочешь. И этот отвратительный, гнилой зеленый цвет по краям неба, мутный, как зацветшая вода в Карповке.</p><p class="p1">— Смотрите, какое небо зеленое, — сказала Надя радостно. — Это значит, скоро все зазеленеет. Люди думают, что уже никогда, и вот им намекают.</p><p class="p1">О, он понял. Эта из тех, что за все благодарят; но как странно сочетание всех этих детских, плюшевых добродетелей с высоким ростом, здоровьем, зрелой готовностью всей, так сказать, фигуры. Вариант «Доверься, дитя» здесь, однако, не проходил, и Остромов, несколько шагов пройдя в интригующем молчании, выбрал безотказную, всегда увлекательную «Встречу в веках». За время этой игры объект успевал проболтаться, и дальше можно было применяться к обстановке.</p><p class="p1">— Прежде вы не были так восторженны, — обидчиво сказал он.</p><p class="p1">— В каком смысле? — немедленно попалась она.</p><p class="p1">— В самом прямом, — пожал плечами Остромов. — В последний раз, если помните, тоже была весна, пышней этой. А вас занимало только то, что Дювернуа десять минут говорил с вами и подарил брошь, ничего ему не стоившую.</p><p class="p1">Она засмеялась, это было интересно, и с готовностью подхватила игру.</p><p class="p1">— Но ведь брошь была в виде зайчика. А я так любила зайчиков. Эти, знаете, брильянтовые ушки…</p><p class="p1">— Смейтесь, смейтесь, — сказал он, ядовито улыбаясь. — Мы охотно вспоминаем прошлые бедствия и требуем искупления, но память о собственных грехах у нас надежно закрыта. Я это знал тогда и знаю сейчас.</p><p class="p1">— Но что же я сделала? Я помню, что на другой день мы поехали к Дювернуа и наделали ужасных глупостей, но вам-то что? Вы ведь были влюблены в девицу Ленорман.</p><p class="p1">Отлично было так идти с веселым человеком и играть с ним — после целого дня разговоров о птичках, мокроте и недоплаченных пенсиях.</p><p class="p1">— Девица Ленорман, — брюзгливо пояснил Остромов, — была шарлатанка и дура, в это время ей было пятнадцать лет, и она гадала в Алансоне, где ей и место. Но если вам не угодно вспомнить того, что было на самом деле, я помогу вам.</p><p class="p1">Город был безлюден, фонари горели через один, но было не страшно, нет. Он умел сделать так, что все участвовало в его спектакле.</p><p class="p1">— Был вечер у де Скюдери, она созывала литераторов по пятницам, вроде сегодняшней. Пятница — для нас с вами день решительный, но вы этого помнить не хотите. — Остромова подхватила и несла вдохновительная сила. — Вы были особенно хороши в этом вызывающем зеленом — Париж той весной носил золотистое всех оттенков.</p><p class="p1">— Терпеть не могу золотистое.</p><p class="p1">— Не удивляюсь, — сказал Остромов. — Ведь оно должно связываться в вашей памяти с моей погибелью, коей вы были причиной.</p><p class="p1">— Ах, вот этого не надо, — сказала Надя, опасаясь, что фраза прозвучит резко и обиженный масон прервет импровизацию. — Не люблю, когда меня виноватят. Это, знаете, брат двоюродный обижался на всех, чтоб конфету дали.</p><p class="p1">— Мне никаких конфет от вас не нужно, — кротко, едко улыбнулся Остромов. — Вы все сделаете сами. Мы обречены доигрывать прежние драмы.</p><p class="p1">— Что же была за драма? Я предпочла вам Дювернуа?</p><p class="p1">— Разумеется, вы ни в чем не виноваты, — кротче прежнего произнес Остромов, ненавязчиво придерживая ее под локоть при обходе особенно большой лужи. Проклятое болото, сухой улицы нет, ботинки пропускали воду. — Но предпочтение ваше вызвало цепь событий, в конце которой была моя гибель, только и всего.</p><p class="p1">— Ну, знаете. Эдак каждое наше слово…</p><p class="p1">— Нет, не каждое. Вы должны помнить, что сказали тогда. Меня звали Казотт.</p><p class="p1">Казотт, Казотт. Нет, она не помнила и честно призналась в невежестве. Впрочем, в эту минуту Надя уже не поручилась бы, что все так уж понарошку.</p><p class="p1">Остромов нахмурился.</p><p class="p1">— Следовательно, вы сознаете вину, — сказал он озабоченно, — иначе, конечно, знали бы это имя. В духовной науке такое искусственное забвение называется блоком. Знаете — как поэт? Вы закрыли участок памяти, потому что душа ваша болит при одном упоминании этого вечера. Я еще десять дней назад хотел сказать вам, но понадеялся на то, что мы не увидимся больше.</p><p class="p1">— Вам так не хотелось меня видеть? — спросила уязвленная Надя.</p><p class="p1">— Мне не хотелось вас мучить, — мягко сказал Остромов. — В самом деле, какая ваша вина в том, что я был обезглавлен? И вдобавок я совсем не помню этого. Тут уж милосердна моя память. Я увижу все только в последний миг этого воплощения — бесконечную анфиладу предыдущих смертей; все они были насильственными, и эта не будет исключением. — Не накликать бы, подумал он тревожно, но вдохновение диктовало свои законы и отгоняло страх. — Вспомните: была весенняя ночь 1788 года. Пели скрипки. Неожиданно я стал пророчествовать — в ответ на прямой вопрос герцогини Малерб пришлось сказать, что большинство присутствующих кончит жизнь на эшафоте, а прочие в изгнании. Вам я сказал, что вам долго придется носить маску простолюдинки, а ведь именно этого вы боялись больше всего. И тогда вы отвернулись с эдакой демонстрацией и продолжили говорить с Дювернуа, любезничать с ним, назовем вещи их именами.</p><p class="p1">— Что же? — насмешливо, но осторожно спросила она. — У вас были на меня особенные права? Я была ваша собственность?</p><p class="p1">— Я имел основание думать, — пробормотал Остромов. — Впрочем, если для вас это так легко, считайте, что это вообще не доказательство.</p><p class="p1">Она поглядела с особым женским интересом, и он понял: дальше пойдет. Она, разумеется, в глубине души понимала, что все это шутка, причем затянувшаяся и неуместно серьезная, но была и глубина глубины, в которой она почти уже представила всю коллизию: «встреча в веках» незаменима, когда объект наделен живым воображением.</p><p class="p1">Он окинул Надю взглядом — всю, от пыльных туфель до каштановых тяжелых волос. Трудность мужской нашей жизни в том, что любить хочется хороших, имеющих обыкновение привязываться; а те, с кем легко, — кому нужны?</p><p class="p1">— Если бы я даже верила именно в переселение, — сказала она мягко, не желая оскорбить чужую веру, — я все равно не допустила бы мысли, что возможна вторая встреча. Почему этот ваш Казотт и эта моя, которая влюбилась в Дювернуа…</p><p class="p1">— Анриетта, — услужливо подсказал он.</p><p class="p1">— Анриетта, Козетта… почему мы должны были опять воплотиться одновременно? Ведь никакие вероятности…</p><p class="p1">— Это как раз очень просто, — заторопился он, но тут же возвратил себе важность. — Впрочем, не знаю, интересно ли вам будет слушать об этом, если вы заведомо не верите. Для людей, хотя бы слышавших о духовной науке, все это азы…</p><p class="p1">— Почему же, говорите. Я не из вежливости, правда. Я невежливая.</p><p class="p1">Прелестна, подумал он. Именно эта прямота, говорящая либо о крайней невинности, либо о последней испорченности, равно привлекательных.</p><p class="p1">— Позвольте рассказать вам подлинный случай, — начал он, закуривая длинную «Леду». — Супружеская пара, он адвокат, наверняка вам известный, — не называю из деликатности, но человек самый порядочный, выковыривал невинных буквально с того света. Она — провинциалка, двадцати лет, в Ленинграде ищет работы, — он особо, с легкой язвительностью выделил «Ленинград», давая понять, что привык и не желает фрондировать. — Устроилась секретаршей в суде. Они знакомятся на процессе крупной группы растратчиков, адвокат являет все красноречие, спасает одних, прельщает другую, словом, несмотря на разницу в двадцать два года, свадьба устраивается за месяц. Поначалу жизнь безоблачна, каждый день она просыпается счастливая, но вот, изволите видеть, с одного пасмурного утра вдруг замечает, что прежней радости нет. Дальше — больше: она смотрит на него и чувствует, что этот красивый, полный, телесно здоровый мужчина ей противен, что вид его вызывает у нее судороги, что еще немного — и она хватит его сковородкой. О близости, сами понимаете, уже речи быть не может. Когда вечером он пытается — vous me comprenez<a href="ch2.xhtml#id1" class="a">[7]</a>, — она сжимается, отворачивается, предполагают беременность с таким патологическим вывертом, но ничего подобного, ищут других причин, ничем не обидел, не оскорбил, вообще на ровном месте. Тогда она обращается, разумеется, к врачу. Врач смотрит по женской линии — ничего не находит, по психиатрической линии смотрит ученик самого Фройда — нормальное развитие, легкое малокровие, но в общем дай Бог всякой. В полном отчаянии после двух месяцев прогрессирующего недуга, препятствующего уже и просто спать в одной постели, обращается она к регрессору — это слово вам наверняка знакомо…</p><p class="p1">— Никогда не слышала, — призналась Надя. — Прогрессистов знаю, а это…</p><p class="p1">— Что же удивительного, — как бы сам себе шепнул Остромов. — А между тем вам он тоже мог бы порассказать. Регрессором, сударыня, называется гипнотехник, способный погрузить вас в прошлую жизнь, во времена, когда душа ваша еще странствовала по прежним воплощениям. Это несложно, хотя для пациента иногда болезненно. Первый же сеанс дал блестящие результаты. Провинциалка вспомнила если не все, то многое. Технику этого дела вы знаете, конечно.</p><p class="p1">— Нет, откуда же.</p><p class="p1">— Бездны, бездны, — пробормотал Остромов, разумея бездны невежества. — Гипнотист погружает пациента не в сон, как говорят обычно, а в состояние особенной ясности сознания, несовместимое с обыденностью. В обыденности ваш ум затемнен, вы все время помните, что вам надо пойти туда-то и не наступить, положим, в лужу. — Он опять ненавязчиво взял под локоток; не вырывалась, загипнотизированная рассказом. — Это как если бы единственный выход из горящего дома загромождался кучами хлама. Гипнотист убирает этот хлам, вот и вся задача. Разумеется, пациент ничего не помнит, что он рассказывал в этом состоянии, — душа погружается в себя. И вот она рассказывает, что в предыдущем воплощении — это был девятьсот седьмой или девятый год, из рассказа врача я в точности не помню, — она была замужем точно за тем же человеком, то есть за той же душой, и они проводили медовый месяц в гостинице «Эдиллия», врач трижды переспрашивает, и она трижды повторяет, с ошибкой: да, «Эдиллия».</p><p class="p1">— Поняла, поняла! — радостно перебила Надя. — Он там убил сковородкой первую жену. И вот она опять воплотилась и пришла мстить — да? Он синяя борода, скажите же мне, что это так!</p><p class="p1">— Я предупреждал, что для вас все это будет шуткой, — пожал плечами Остромов. — Пожалуй, не стоит углубляться в дальнейшее…</p><p class="p1">— Нет, нет, умоляю! Я буду нема.</p><p class="p1">— Это, кстати, слишком было бы хорошо, ежели бы души могли являться к еще живым. Да такие случаи были, — снисходительно пояснил Остромов, — и описаны, и старый маршал Монморанси умер именно от того, что караульный у его дверей оказался лицом и голосом неотличим от товарища, погибшего за тридцать лет перед тем по его вине; могло быть совпадение, но не думаю. На этот счет любопытное есть сообщение Де Трези… но здесь, увы, иной случай. Они остановились в номере семнадцатом. И в этом номере произошло нечто такое, что память ее отказывалась следовать дальше. Как врач ни пытался, все усилия разбивались об эту стену — и она отправилась восвояси до второго сеанса.</p><p class="p1">Он сделал эффектную паузу, Надя ее не прерывала; он мог бы молчать и долее, и крепче сжимать ее локоть в этом молчании, — но сжалился и продолжил.</p><p class="p1">— Слово «Эдиллия», сами понимаете, запало в душу. Она спрашивает мужа — а муж в понятном нетерпении ожидает результатов: прискучило спать одному на диванчике. Муж ничего ни про какую эдиллию не помнит и начинает уже думать, что и этот врач шарлатан. Она же — назовем ее Ариадна, тем более, что это так и было, — отыскивает справочник «Весь Петербург» за 1908 год — и что же видит? Что на Сенной в самом деле был пансион «Эдиллия», не самый, кстати, дешевый, но уже в справочнике за следующий год его нет, и самый дом перестроен. С помощью мужа, привыкшего добывать по архивам нужные бумаги, отыскивает книгу записи постояльцев — вы знаете, вероятно, что такие книги всегда ведутся и сдаются в полицейский архив для отслеживания путей возможных террористов или мало ли. И представьте себе — в августе восьмого года в семнадцатом номере записана супружеская пара, она, допустим, Марина, он, предположим, Илья Львович или как вам будет угодно, с нынешними именами, понятно, ничего общего, — однако число совпадений, как хотите, начинает уже настораживать. Какого-то числа в конце августа они съехали, проведя в Петербурге всего две недели, — ну, это, если хотите, ничего еще не доказывает, дела потребовали или мало ли, — однако ей уже становится, мягко сказать, небезразлично: что там такого было, в семнадцатом номере? Ясно, что не убийство, тем паче не насилие — молодая супружеская пара, все полюбовно…</p><p class="p1">— Могут быть разные формы, — вмешалась Надя рассудительно. — Может быть, он принуждал ее к гадостям.</p><p class="p1">— Каким же гадостям?</p><p class="p1">— Разным, — сказала Надя с вызовом.</p><p class="p1">— Если вы имеете в виду так называемый французский сэкс, — ровно сказал Остромов, ликуя в душе, что появился предлог для такого экскурса, — то называть его разными гадостями может, простите, только совершенный ханжа, в чем я вас никак заподозрить не могу. Delictorum omnia assumptum est — любящим все позволено. — Он боялся, не переврал ли, — но эта, кажется, латыни не знала вовсе. — Французская армия, принеся в Россию этот вид ласк, — откуда, собственно, и происходит название, — была поражена тем, насколько именно этот способ был распространен в крепостной среде. От себя же добавлю, что на известном градусе посвящения обычный контакт совершенно заменяется этим как более символическим, восходящим к египетскому обряду, когда жрица припадает к гениталиям Осириса.</p><p class="p1">— Да я вовсе не о том, — сказала Надя с досадой, хотя именно о том, о том. — Что вы все про это, кого этим смутишь… Я думала, что, может быть, он принуждал ее к морфию, или мало ли с чем тогда упражнялись, с эфиром…</p><p class="p1">— О, это! — добродушно засмеялся Остромов. — Что же тут гадкого? Я не церемонясь скажу вам, что опыт регрессизма и невозможен без малой доли эфира, и в умеренных количествах это совершенно безвредно… И если когда-нибудь я добьюсь вашей доверенности, — он опять легкой иронией выделил славное старое словечко, — вы убедитесь, так сказать, непосредственно…</p><p class="p1">— Это вряд ли, — брезгливо сказала Надя.</p><p class="p1">— Как угодно… Ну-с, вторая, третья регрессия — ничего. И лишь на четвертой — представьте себе — выясняется удивительнейшая вещь. Доктор наш полагал, что адвокат в тогдашнем своем воплощении действительно учудил нечто такое, чего не изобретет и самое изощренное воображение. Что же выясняется? Между Ариадной и врачом возникает не то чтобы связь, но особая близость, какая часто случается между врачом и пациенткой. Еще Фройд, собственно… Психоанализ нередко сопровождается… Одним словом, Ариадна в какой-то миг совершенно теряет власть над собой. И уже после этого происходит четвертый сеанс, на котором регрессия достигает наконец нужной глубины. — Эту двусмысленность он подчеркнул легкой улыбкой. — В семнадцатом номере наша героиня в бытность еще Мариной изменила новобрачному с этим самым врачом! — Остромов даже остановился, сообщая пуанту истории. — Да-с! Только звали его тогда иначе, и года его были другие, но мужа в этой комнате вообще не было! Это она свою, свою вину не могла ему простить. Так всегда бывает — самым тяжелым блоком закрываем мы собственные грехи, в которых боимся признаться. И всю жизнь доигрываем старые драмы, непостижимым инстинктом находя тех, с кем когда-то сыграли их впервые.</p><p class="p1">— Хорошая сказка, — проговорила Надя после недолгого молчания, хотя сейчас, зеленой ленинградской ночью, готова была поверить и в эту тройственную эдиллию. — Признавайтесь, выдумали или вычитали?</p><p class="p1">— Если бы я мог такое выдумать, — ласково сказал Остромов, — я бы уже этим зарабатывал. А если бы это можно было вычитать, эпоха наша обогатилась бы наконец хоть одним писательским именем.</p><p class="p1">Ну, наша не наша, — а предыдущая обогатилась, да не заметила; «Эдиллию» опубликовал в начале войны беллетрист Грэм, мастер на такие выдумки, которого весь литературный Петроград презирал за умение писать интересно. Остромов немного знал Грэма, все тогдашние игроки друг друга знали; Грэм много пил и, выпив, делался интересен — минут на двадцать, пока не начинал громогласно вспоминать, кто и как его обидел. Эти счеты с прошлым — главным образом с критиками, — были скучны, как всякое русское веселье, но после первых трех рюмок он рассказывал иногда любопытное. Остромов, чья память в опьянении только обострялась, кое-что прихватывал для бесед вроде этой.</p><p class="p1">— Но чем же все кончилось?</p><p class="p1">Хм. Этого Остромов не знал, ибо у Грэма все кончилось сладострастной, ленивой улыбкой Ариадны — только что робкой девочки, не знающей, что с ней творится, и вот уже новой Лилит, сознающей свою силу; улыбкой самой природы, живущей повторами. Чем могла разрешиться эта история, кроме испуга несчастного доктора, мнившего себя верховным судьей — и вовлеченного в драму в самой жалкой роли?</p><p class="p1">— Кончилось тем, — сымпровизировал Остромов, точно угадав самую низменную и потому жизнеподобную версию, выдержанную в логике женской подлости, — что она обрела счастье, избавившись от блоков, и продолжила жить с мужем, не оставляя, впрочем, и врача, в полной свободе и довольстве, не отягченном больше никакой совестью. Они оба все сознают, мучаются, но избавиться от зависимости не могут. Так всегда бывает — чтобы исцелить одну женщину, нужно погубить двух мужчин.</p><p class="p1">Изящно, отметил он про себя; и верно, как все изящное. Вне зависимости от того, как сложится с нею, один благой итог уже есть.</p><p class="p1">— О, теперь я все поняла, — сказала Надя. — Если мы погрузились в прежнюю жизнь, и вспомнили прежний грех, и поняли, отчего я, допустим, вас тогда загубила, — я могу повторить все это уже без угрызений?</p><p class="p1">— Это зависит только от вас, — нашелся он. — Люди по-разному распоряжаются свободой. Одному она нужна, чтобы повторить грех, другому — чтобы понять и избегать его. Тогда вы отказали мне, и я погиб, написав с отчаяния «Les letters mystique»<a href="ch2.xhtml#id29" class="a">[8]</a> и попав на гильотину раньше всех, кому я ее напророчил. Теперь в вашей власти повторить этот грех, послужив причиной моей гибели, или… или спасти меня, но здесь я умолкаю, ибо не хочу направлять вашу волю.</p><p class="p1">— Вы гнусно хитрый, — сказала она с детским восхищением. — Или я должна быть вашей, или вы идете на гильотину, да? Эта тактика всегда у вас срабатывает?</p><p class="p1">— Не всегда, — ответил он, гениальным чутьем игрока догадавшись, что время мрачной серьезности кончилось и лучше попасть в тон. — Женщина только тогда может называться женщиной, если даже выйти из горящего дома соглашается только на своих условиях.</p><p class="p1">— Вы уже второй раз о горящем доме.</p><p class="p1">— Это внутренний жар, — усмехнулся он. С ним было удивительно просто, словно с ровесником, — но таких ровесников не было. Она, пожалуй, не решилась бы говорить с ним всерьез, однако рассказы его были прелестны, а шутки хоть и на грани, но никогда за.</p><p class="p1">— Вы хотите условий, — сказала она утвердительно.</p><p class="p1">— Я ни к чему вас не принуждаю.</p><p class="p1">— Что же, это интересно.</p><p class="p1">— Но помните, — сказал он, возвращаясь к многозначительной мрачности, — что слова, сказанные в Страстную неделю, имеют свойство сбываться, и сбываться в точности. Вспомните Тиберия — скорее яйцо покраснеет…</p><p class="p1">— Я помню, — сказала она, решив загадать такое, что не может сбыться ни при какой погоде. — Мое первое условие… эээ… ммм…</p><p class="p1">Она быстро припомнила формулы из самых таинственных сказок детства.</p><p class="p1">— Условий, как вы знаете, всегда три.</p><p class="p1">Он смиренно кивнул. В темноте она толком не видела его лица, но ей показалось, что он улыбается.</p><p class="p1">— Что же. Первое мое условие — пусть воскреснет мертвый, чтобы спасти живого.</p><p class="p1">Это было заклятие из сказки про замок Уэстлейк — там юный наследник прятался в склепе предка. Надя до сих пор любила читать уютную готику.</p><p class="p1">— Раз, — торжественно произнес Остромов важным медным голосом, словно часы на башне пробили час — только башни поблизости не было.</p><p class="p1">— Второе… — Она опять задумалась. — Второе — пусть взлетит бескрылый и утешится одинокий.</p><p class="p1">Это было пророчество колдуньи из сказки о мореходе — его, как Синдбада, похитила хищная птица, у нее в гнезде он повстречал другого странника, спас бедолагу, и проклятие было снято.</p><p class="p1">— Это два условия, — покачал головой Остромов.</p><p class="p1">— Но они связаны! — горячо возразила Надя.</p><p class="p1">— Будь по-вашему, — кивнул он.</p><p class="p1">— А третье… третье… Что же. Если я в самом деле стану вашей — пусть мой любимый брат не узнает меня.</p><p class="p1">Это было из Мастертона, из шотландской баллады — «Let me forget my home, my friends and bride, lo! let my brother turn his face aside»; там юноша клялся, что никогда не покинет матери, а если покинет, пусть его забудут все, и пусть отвернутся друзья и не узнает невеста; разумеется, убежал с моряками, забыл, отвернулись, раскаялся, поздно, — только обнищавшая старуха в трактире поплакала над его судьбой; это мать и была, конечно. Мастертоновского, надрывно-печального здесь было то, что он-то ее не узнал, так и ушел, счастливый и всеми прощенный, бросив ей горсть монет на прощанье. Надя в детстве ужасно плакала над этой балладой со всеми ее несообразностями. Это условие казалось не вполне честным, зато уж непрошибаемым: у нее не было никакого брата.</p><p class="p1">— Брат! — серьезно повторил Остромов. — Родной или двоюродный?</p><p class="p1">— Не скажу, — она с трудом поборола искушение высунуть язык. Двоюродных тоже не было.</p><p class="p1">— Это я узнаю и сам, — проговорил он все тем же торжественным голосом. — Вы еще не знаете его, и нескоро узнаете. Что же — пусть! Пусть брат не узнает вас. Условие названо, договор скреплен.</p><p class="p1">— Да и я почти пришла, — сказала она весело, пробуя свести все на шутку.</p><p class="p1">— Названо и скреплено, — повторил он.</p><p class="p1">— Да, да, конечно. А правда, какой холодный человек Михаил Алексеевич?</p><p class="p1">— Отчего вам так кажется?</p><p class="p1">— Очень, очень холодный человек, — произнесла Надя задумчиво. — Я люблю его стихи, мне нравится у него бывать, но, кажется, случись со мной что — он не заметит. И я никогда не рассказала бы ему ничего о себе.</p><p class="p1">— Расскажите мне, — предложил он.</p><p class="p1">— В другой раз. Мы пришли.</p><p class="p1">— Когда будет этот другой раз?</p><p class="p1">— Я не знаю, — сказала она виновато. — Вы теперь знаете адрес. Напишите мне, когда будет кружок, и я приду.</p><p class="p1">— Слово? — спросил он без улыбки.</p><p class="p1">— Названо и скреплено.</p><p class="p1">И устраиваясь в постели, она радостно подумала, что в другой раз непременно расскажет ему больше. Он был странный, но она ему понравилась, этого не скроешь, и с ним было просто, как с близким. А Михаил Алексеевич хороший, но все-таки очень, очень холодный человек.</p></span></span>
