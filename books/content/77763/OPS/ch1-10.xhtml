<p class="p">Глава третья</p>
</div><p class="subtitle">1</p><p class="p1">Семнадцатого апреля Остромов встал бодро, да и распогодилось. Как все сенситивы, он сильно зависел от погоды. Давешняя хмурость куда только делась. Подоконник был тесно заставлен всякой дрянью, но с тем большим напором хлестал в форточку лимонный луч. Теща еще похрапывала за лиловой занавеской. Иные старики вскакивают чем свет, спать хочет ленивая юность, а старость чувствует, что скоро выспится, ловит всякое мгновеньице, сидит поутру перед чайником, смотрит в окно, раскладывает пасьянс. Но у тещи не было сил, и она спала. Жена, в сущности, была такая же квашня. Как ее хватило на побег, непостижимо. Верно, опять прислонилась к чужой воле, оплела ее плющом.</p><p class="p1">Остромов поприседал на правой ноге, потом на левой, уперев руки в твердые бока, радуясь, что коленки не хрустят. Неслышно попрыгал. Для сорока пяти было прекрасно. Противны влажные, жирные люди, не могущие себя блюсти. О какой душевной чистоте говорить тому, в ком нет физической собранности? Прихватив несессер, скользнул в ванную; мимо, по коридору, с важным сопением прошагал соседский второступенник, свинячий нос, уши торчком. Те самые Корытовы. Остромов по системе Зеленского растерся ледяной водой, начав с шеи (пробуждение первой чакры), перейдя на плечи (пятая малая), наконец подставил под струю ступни (там не было чакр, одно кровообращение). Тщательно выбрил кадык и щеки, радуясь остроте золингеновского «Robert Klaas’а», счастливо приобретенного у тифлисского армянина: армянин мастерски брил барашка, оставляя потешные бачки, — Остромов во всяком деле ценил артистизм, в коммерции же особенно. Картину всякий напишет художественно, ты бритву продай так, чтобы шевельнулось эстетическое! Из зеркала смотрел свежий, бледно-розовый джентльмен, чей вид внушал почтенье и доверье в нужной пропорции: никогда не нужно слишком вызывать на откровенности, заболтают так, что не будешь знать, куда деться.</p><p class="p1">— Дитя мое, — строго сказал Остромов, — доверьтесь мне.</p><p class="p1">Сказано, однако, было так, чтобы хотелось не довериться, а прислониться, возможно, отдаться.</p><p class="p1">— Ну, ну, — отечески сказал Остромов. — Без слез. Со слезами мы теряем энергию кундалини.</p><p class="p1">Сейчас бедная девочка разинет рот, а мы небрежно, легкими касаниями покажем путь, которым энергия кундалини поднимается отсюда вот сюда.</p><p class="p1">— Я желал бы особенно подчеркнуть, — сказал Остромов внушительно, — что цели нашей, именно нашей ложи никогда не расходились с целями советской власти.</p><p class="p1">Товарищ Осипов слушал внимательно.</p><p class="p1">— И потому, — сказал Остромов, подчеркивая второстепенные слова, как всякий, кто желает запутать собеседника, — именно потому — я полагаю — сегодня советская власть могла бы использовать… разумеется, по своему усмотрению -</p><p class="p1">Осипов насторожился.</p><p class="p1">— Ту информацию, — поспешил добавить Остромов, — которую охотно предоставила бы наша ложа. При условии, разумеется, что до определенного момента…</p><p class="p1">В дверь постучали.</p><p class="p1">— Попрошу вас не отвлекать! — стальным голосом ответил Остромов. За дверью послышалось шарканье: перепуганная Корытова спешила восвояси.</p><p class="p1">— Я продолжаю, — небрежно сказал Остромов. — Ихь шпрахе вайтер. Я хотел бы, Фридрих Иванович, выкупить у вас эти канделябры.</p><p class="p1">Клингенмайер покачал головой: это не продается.</p><p class="p1">— Понимаю, — поджал губы Остромов. — В таком случае я желал бы взять у вас эти канделябры.</p><p class="p1">Клингенмайер чуть улыбнулся: это было другое дело.</p><p class="p1">— Разумеется, я их верну, если только вещь не узнает владельца, — вежливо улыбнулся Остромов. Клингенмайер приподнял бровь.</p><p class="p1">— Да, да, — кивнул Остромов. — Вы можете думать что угодно, но не можете же вы отрицать, что граф Бетгер возвращался уже трижды и всякий раз опознавал свои вещи. У меня есть основания ожидать четвертого его возвращения.</p><p class="p1">Клингенмайер не знал, свести все на шутку или поверить. Старик соскучился по интересным чудакам. Обстановка располагала, в комнате будет темнеть, мы приурочим к вечеру.</p><p class="p1">— Кстати, Филипп Алексеич, — заметил Остромов как бы между прочим, — не продадите ли мне этот портрет?</p><p class="p1">— Зачем вам эта подделка, — буркнул Филипп Алексеич, или не буркнул, или, напротив, обхватил раритет двумя руками, вскричав «Никогда». В зависимости от этого Остромов изобразил изумление знатока, пораженного пренебрежением к столь редкой вещи, и снисходительность ценителя, не понимающего, как можно цепляться за такую дрянь. Снисходительность удалась лучше.</p><p class="p1">— На это только ваша воля, — сказал он бесцветно, — но вещь эта может навлечь на своего владельца известные неприятности, и я подумал, что в месте более надежном…</p><p class="p1">Филипп Алексеич все не решался расстаться со своим сокровищем.</p><p class="p1">— Не смею задерживать, — сухо сказал Остромов. — Кстати, мой ангел, — нежно улыбнулся он, — не пройтись ли нам хоть на острова?</p><p class="p1">Филипп Алексеевич потрясенно замахал руками и распался. Вместо него лупоглазо уставилась Марья.</p><p class="p1">— А что вас так удивляет? Или вы думаете, что мы, призраки, бестелесны?</p><p class="p1">Разумеется, она так и думала.</p><p class="p1">— О нет, — зловеще сказал Остромов. — Мы слишком, слишком телесны… и конечное наше освобождение невозможно без одной крошечной условности, которая, увы, зависит только от вас.</p><p class="p1">Она уже догадалась, но еще колебалась.</p><p class="p1">— Да, да, — сказал Остромов. — Именно это. И кстати, нет ли у вас Силезиуса «Трех оснований божественной цельности»?</p><p class="p1">Ломов, кряхтя, полез на третий ярус. Остромов подхватил тяжелый баул с добычей и вышел из ванной. Репетиция окончилась, других встреч на сегодня не было.</p><p class="p1">В кухне хлопотливо хлопотала хлопотунья Соболева. Остромов потянул носом рыбный смрад и торжественно сказал «Божественно». Соболева подняла измученные глаза.</p><p class="p1">— Как почивали? — спросила она подобострастно.</p><p class="p1">— Благодарю вас, — кивнул Остромов, обдав ее свежестью лоригана. — Позвольте вручить вам это.</p><p class="p1">Он раскрыл несессер и вынул пакет сухой травки.</p><p class="p1">— С этим, — добавил он, — природный запах усилится, но лишь в приятной своей компоненте. Все, что относится до низких стихий, осядет.</p><p class="p1">Соболева робко взяла пакет и понюхала.</p><p class="p1">— Кавказские травы сунели, — небрежно сказал Остромов. — Берите, мне поставляют.</p><p class="p1">— Чайку, — искательно предложила Соболева.</p><p class="p1">— Охотно, охотно. Благодарствуйте.</p><p class="p1">Он выпил блеклого чаю, рассуждая со старухой о том, как невыносима стала в трамваях публика, как невозможно среди нее находиться тонко чувствующему человеку, — про себя посмеиваясь: так тебе, старая дура. Небось в оны времена взглядом бы не удостоила. Потрясись теперь в трамваях, и пусть тебя локтями пихают комсомолки. Остромов вообразил яблочный, с ямочкой локоток комсомолки. Прежде всего обзавестись постоянной отдушиной, без этого голод станет глядеть из глаз, и впечатление испортится.</p><p class="p1">Одевался быстро, но внимательно. Человек неопытный и недалекий для утреннего визита оделся бы официальней некуда, все эти костюмы, — но не было способа верней погубить дело, как явившись к молодому сановнику при полном параде. Мягкая серебристая куртка — вот что тут требовалось: облик посланника из дальних миров. Неизменная синяя шапочка довершала впечатление. При первых поступлениях, однако, следовало купить брюки. Гардероб его был на той грани, когда благородная скромность уступает место неявной поношенности; Остромов чувствовал эту грань и вообще улавливал переходы.</p><p class="p1">— Тещинька, — проворковал он. Колода заворочалась.</p><p class="p1">— Буду к вечеру, — предупредил Остромов.</p><p class="p1">— Не позже восьми, ради Бога, — она боялась теперь всего. Поздний визит, скандал.</p><p class="p1">— Я раньше обернусь.</p><p class="p1">Улица встретила его блеском луж, воробьиным захлебывающимся ором, трамвайным звоном. Проклятая Азия не знала трамваев — он теперь только понял, какое счастье чувствовать содрогание дома, близ которого проезжает лаковый сын цивилизации. Первым делом Осипов. Товарищ Осипов отправлял свои обязанности на бывшей Морской, ныне Герцена, в доме, против которого Остромов гащивал когда-то у изумительно страстной медички; она и в медички-то, кажется, пошла, чтобы видеть и трогать чужую наготу. Это соседство показалось ему добрым знаком. Если товарищ Осипов полюбит его так же бескорыстно, дело пойдет.</p><p class="p1">Кабинет товарища Осипова располагался на третьем этаже свежекрашенного зеленого особняка. Остромов смиренно предъявил красноармейцу паспорт и рекомендательное письмо — «Подателю сего Б. Остромову прошу содействовать. Зам. пред. СО ГПУ Огранов» — и переждал, покамест о нем доложили по внутренней связи. Особняк был телефонирован насквозь, хорошо, однако, поставлено. Ждать пришлось минуты три.</p><p class="p1">— Просят, — сказал красноармеец в лучших старорежимных традициях. Он парень был простой, и тоже что-то свинячье. Они все были теперь немного свинки: врут, что свиньи наглы. В чертах свиньи есть нечто робкое, умильное: вот, я накушалась. Им разрешили накушаться, и они робко щурятся: ведь можно? Не зарежут еще? Дурить их было просто до изумления. Остромов чувствовал себя немного свинопасом, только принцесса запаздывала. Осипов тоже был простой, понятный при первом взгляде: он выработал себе несколько жестов, призванных изображать работу мысли, внимание, глубокую задумчивость, доброжелательство к посетителю, увлеченность проэктом, — и так лубочно, что отчетлива была вся молодость, вся трехмесячность его здесь пребывания. Он так старательно и деловито исписывал тетрадный клок, что сразу делалось ясно — вставочку схватил за минуту перед тем, когда дал команду пропустить; и пишет наверняка «Эне, бене, раба».</p><p class="p1">— Присядьте, товарищ, — сказал он с беглой улыбкой. Пока он не наимитировался, Остромов осматривался. Кабинет был выгорожен из большой залы, разделенной теперь коридором. Все разгородили фанерой — в зале, должно быть, прежде танцевали, а теперь в картонных закутках писали свою абракадабру товарищи Осиповы. Так вам, не пустили когда-то приличных людей, теперь терпите свинок. Ежели бы заранее научились впускать в свой замкнутый мир хоть немного свежего воздуха — не сидели бы теперь по норам, как мыши. Стул под Осиповым был хозяйский, с вытершейся, но все еще голубой обивкой, а стол грубый, сверху клеенчатый. Посетителю предлагалась табуретка, окрашенная в тошнотворный розовый цвет. Видимо, собеседники Осипова были в основном такого толка, что следовало сразу указать им место — допрашиваемые или упрашивающие, — а потому хозяйский стул был один. Топорностью и цветом табурет был также свиноподобен. В углу стоял тяжелый коричневый сейф, огромный, достаточный, чтобы упрятать человека. Остромов поежился, вообразив: страдал клаустрофобией.</p><p class="p1">— Что же, — утомившись изображать срочные труды, поднял Осипов лазоревые глаза. Гимнастерка его была тщательно выглажена — вероятно, товарищем Осиповой. Вообще наличие товарища Осиповой чувствовалось: только у молодых мужей бывает такой сытый, молочно-белый цвет лица, такая затаенная радость. Никто не знает, что мы делаем по ночам, какие кульбиты, а как бы нам хотелось, чтобы кто-нибудь догадался! Товарищ Осипова, наверное, худа, малокровна, у нее толстые губы, слабые руки и девичий стебелек шеи, и зовет она товарища мужа лапушкой, и ласки ее робки, беззвучны.</p><p class="p1">Остромов с достоинством, без суетности, взглянул в лазоревые очи товарища Осипова.</p><p class="p1">— Я имею к вам записку товарища Огранова, — сказал он, любезно осклабясь, и протянул запечатанный конверт. Осипов вскрыл, пробежал, старательно нахмурился и потщился изобразить сосредоточенность.</p><p class="p1">— Товарищ Огранов указывает, что вы специалист в масонской области, — сказал он уважительно. — Чем же могу, так сказать…</p><p class="p1">— Я удивляюсь, — сказал Остромов. — Я удивляюсь: отчего советская власть еще не протянула нам первой братскую руку? Я подготовил краткий свод и вас не задержу, — он извлек из портфеля разделенную на два столбца желтую, твердую, словно костяную страницу. Острым его почерком были выписаны пункты. — Оставьте себе для изучения, но позволю кое-что вслух. Слева намечены мною черты к характеристике соввласти. Справа — черты масонства. Но я не назвал себя. Я инженер, немного переводчик, и не скрываю от вас, что состоял членом ложи «Великой Астреи» и поныне состою, ибо освободить от этого членства земная власть не может.</p><p class="p1">Осипов слушал, иногда ставя закорючки в своем листе.</p><p class="p1">— Имя мое в бытовой жизни Борис Васильевич Кирпичников, — сказал Остромов строго, — в ложе я называюсь Борис Остромов, потому что по ее правилам на третьей ступени посвящения — всего их, как вы знаете, тридцать три и семь тайных, — приобретается новое имя для рождения в новую жизнь. Я открываю вам все это, чтобы вы видели, насколько открыты мои карты. Моя жизнь теперь в ваших руках, ибо открывать второе имя можно только мастеру ложи не ниже седьмой ступени — вы же, полагаю я, еще этой ступени не достигли…</p><p class="p1">И он улыбнулся, выбросив свой козырь. Товарищ Осипов никак не ожидал, чтобы ему вручили чью-либо жизнь.</p><p class="p1">— Русское масонство умозрительное, — говорил Остромов, ровно, четко, без пауз: речь была уже сказана Огранову и после того отрепетирована с учетом его вопросов. — Мы никогда не занимались политикой, и братья, замеченные в политизировании, изгоняются без права возрождения, на какой бы ступени ни стояли. Но цели наши — вот, извольте: во-первых, мир без угнетения человека человеком. Заметьте, что у соввласти то же самое. Затем, полный интернационализм: то же самое. Братские чувства к любым людям без различия имущественных положений: совершенно так же. Разница одна: вы осуществляете диктатуру пролетариата. Но ведь и диктатура пролетариата станет когда-нибудь не нужна, когда останется один пролетариат. Об этом у Маркса подробней, вы знаете, конечно. Но и нам в идеале видится общество без классов, и никакого различия в целях, таким образом, нет: вы согласитесь?</p><p class="p1">Товарищ Осипов потер лоб, изображая задумчивость, но вскоре кивнул. Товарищ Огранов не стал бы присылать первого встречного.</p><p class="p1">— Bene<a href="ch2.xhtml#id3" class="a">[5]</a>, — сказал Остромов. — Тогда почему же — почему же, спрашиваю я, — соввласть не может сотрудничать с нами? Вероятно, за своими делами, действительно бесчисленными, она забыла о наших философских кружках, ничем для вас не вредных. Ведь тирания всегда бросала нас в темницы, мы, так сказать, жертвою пали — и почему бы теперь не объединить наши усилия в достижении общей цели? В девятнадцатом году председатель Петрогубчека Комаров не нашел в нас ничего недружеского, напротив. Вы знаете, конечно, товарища Комарова, Николая Павловича?</p><p class="p1">Товарищ Осипов кивнул.</p><p class="p1">— Я давно не был в городе, жил на юге, — прочувствованно сказал Остромов, — и лишен был удовольствия видеть товарища Комарова. Отношение его было выше всякой похвалы. Вы не знаете, где он теперь?</p><p class="p1">— Он секретарь сейчас этого, губисполкома, — сдержанно сказал Осипов, не вполне еще понимая, как себя вести.</p><p class="p1">— Если случится встретиться, передайте мою душевную благодарность, — поклонился Остромов, прижимая руку к груди. — Он так тогда и сказал — вижу его перед собой очень ясно: раз вы не против нас, сказал он, то и живите. И вот так махнул. И обысков у нас больше не было, он дал как бы охранную грамоту, позволившую сохранить реликвии и самое братство…</p><p class="p1">— Чем же, однако, я могу… — начал товарищ Осипов, все еще не понимая. Начиналось труднейшее: подвести его к мысли, не уронив себя.</p><p class="p1">— Предложение мое простое, — сказал он деловито. — В Ленинграде теперь много людей бывшего сословия. Эти люди готовы признать советскую власть, но быстрая их перековка невозможна. Они на другое рассчитаны, под другое, как говорится, заточены. С ними работа не ведется, и у них могут возникнуть настроения. — Он подчеркнул последнее слово и поднял брови. — Мы предлагаем для них легальную форму организации с непременным информированием вас обо всем. От вас же мы просим одного: разрешения и впредь философствовать, чтобы не утратить уже открытых братством весьма важных закономерностей. Вы можете, к примеру, присылать на наши занятия своего инструктора. Вообще способы контроля многообразны. Я обязуюсь в любой день — ну, скажем, раз в месяц, в первый вторник, называемый у нас честным вторником, хотя как вам будет угодно, — давать вам полный отчет о настроениях, взглядах, планах. Вы лучше меня знаете, — надо было все время подчеркивать, что товарищ Осипов во многих отношениях лучше, — сколь трудно контролировать людей интеллигентных, как они скрытны, и как им сейчас — о да, их можно понять. И я не удивлюсь, — он вновь поднял брови, — я не удивлюсь, если эта среда вдруг породит… словом, лучше знать заранее. Масонство, мне кажется, есть та самая форма, которая позволяет действовать организованно и притом у вас на глазах. Ведь согласитесь, они не пойдут, да их и не пустят, в собственно партию. А куда-то идти им надо?</p><p class="p1">И он проткнул Осипова волевым, стальным взором, который отработал не вчера: переход от уговоров к этой повелительности действовал неотразимо. Осипов против воли кивнул.</p><p class="p1">— Я предлагаю лишь, чтобы они шли к нам, — закончил Остромов. — И чтобы посредниками между ними и вами были мы как ближайшая к вам форма умственного союза. Что скажете?</p><p class="p1">Осипов покусал вставочку. Он начинал понимать.</p><p class="p1">— И что вам конкретно нужно? — спросил он. Это был уже деловой разговор. Тут важно было не перепросить, то есть запросить умеренно, чтобы предложили еще.</p><p class="p1">— Для начала, — осторожно, как бы соображая на ходу, сказал Остромов, — никаких специальных просьб, кроме нескольких «не». Не запрещать собрания, не отнимать реликвии, не присылать на каждое заседание нового агента, — один, как вы понимаете, может присутствовать постоянно, если вы не удовлетворитесь моими докладами и честным словом. — Он слегка поклонился. — Поймите, я не преследую целей материальных. Я хочу лишь, чтобы Великая ложа после так называемого Гранд Силанум, который мы приняли в девятнадцатом году, продолжала заседать для дальнейшего усовершенствования. Душа — или, если хотите, знание, — так же портятся в бездействии, как тело без гимнастики. Разрешите нас — и мы приведем к вам всех, а знакомства мои, будьте покойны, довольно обширны…</p><p class="p1">Он прямо взглянул на Осипова. Тот несколько заметался.</p><p class="p1">— Как вы понимаете, гражданин Кирпичников…</p><p class="p1">— Остромов, — ласково сказал Остромов, — под этим именем я известен давно. Прежняя фамилия — не более чем оболочка.</p><p class="p1">— Я, гражданин Остромов, сам таких решений принимать не могу, — сказал Осипов, смущаясь. — Это надо согласовывать. Сами видите, дело нешуточное. Вот вы говорите, великая ложа. А по-нашему это будет статьи 57, 60 и 43, то есть контрреволюционная организация с участием заграницы и с привлечением ранее состоявших.</p><p class="p1">— Я удивляюсь! — воскликнул Остромов. — Все будет производиться на ваших глазах, при полном контроле и без какой-либо организации! Бог с вами, какая организация? Собрались люди, поговорили. Исключительно о философии и реже об истории. Неужели сейчас, когда Советский Союз прочно становится на ноги, опасности больше, чем в девятнадцатом? Согласитесь, товарищ Осипов, это абсурд.</p><p class="p1">Товарищ Осипов задумался и принужден был согласиться. Если этих муссонов не тронули в девятнадцатом, сейчас и подавно не следовало чинить им препятствия, но с другой стороны — классовая борьба не затупляется, а обостряется, а в девятнадцатом не было закона, гуляй, душа. Тут надо было советоваться, сам он не решался.</p><p class="p1">— Я наберу сейчас, — сказал он вслух. — У нас есть специалист, он и по-французски, и по-всякому…</p><p class="p1">Он снял трубку. Остромов не сводил с него острого, испытующего взгляда — был у него такой, словно говорящий: и ты это мне — после всего? Я жизнь, кровь мою положил в основание, и ты брезгуешь? Женская попытка выскользнуть сразу пресекалась таким взглядом; так, верно, смотрел Калигула, допрашивая сенатора, носившего при себе набор противоядий: «Противоядие от цезаря?».</p><p class="p1">Осипов решал в этот момент трудную задачу. Он не знал, как этого, куда — выгнать неудобно, говорить при нем стыдно. Сидишь начальником, и тут униженное: товарищ Райский… Почему вообще Огранов его ко мне. Сам такое решение не могу. Конечно, если выгорит, то явиться на самый верх со списком возможной контры… но если под носом разведу гнездо, что ж это будет? Его надо шшупать, шшупать. «Товарищ Райский! — сказал он искательно, но тут же усугубил басок. — Тырщ Райский, тут у меня гражданин, по масонской части. Он имеет предложение и тырща Огранова записку. Разрешите направить». Ох, как не хотелось запрашивать Райского. Он был просвещенный тырщ, но по-одесски самоуверенный, убежденный втайне, что бледная чухна ничего не умеет. А между тем все сделала бледная чухна, и Зимний, и Деникин, все это был питерский пролетариат, а вы умеете только ездить в бронепоездах да кричать: вперед, вперед, расстрелять! Все это Остромов превосходно понимал и чувствовал лучше, чем сам Осипов, он уже вообразил Райского, дорисовал его своим неизменным быстроумием: полный, курчавый, пузырящаяся на губах речь, семитическая хлесткость, самоупоенное ораторство, знание двух-трех фактов и самого слова «розенкрейцер» — и совершенно довольно. Как все поверхностно образованные люди, Остромов немедленно различал в других родные приемы, изображавшие особую информированность. Главное, все время говорить «и так далее», а что далее — никогда не скажет. Посмотрим, посмотрим на товарища Райского.</p><p class="p1">— Вам к нему завтра нужно, — сказал Осипов, дослушав чью-то бурную речь в трубке. — Улица Красных Зорь, 25. Там со двора, квартира 14, он консультирует.</p><p class="p1">Остромову почуялась зависть — вот, Райский ценный спец, консультирует на дому…</p><p class="p1">— Это весьма важно и даже символически, — кивнул он. — В нашем учении красные зори, в отличие от лиловых, обещают начало доброго дела. Надеюсь, — это он опять подчеркнул, уже вставая, — что дело я все же буду иметь с вами. Товарищ Огранов вас характеризовал как знатока совершенно исключительного, хотя и выдающейся скромности.</p><p class="p1">Юный хряк зарозовел, зарадовался. Все они так были падки на дешевую хвалу, что чудо. Но был у Остромова прощальный трюк, в случае товарища Осипова беспроигрышный.</p><p class="p1">— Чтобы вы ясней видели, какие знания могут пропасть, — сказал он веско, — позволю себе предупредить вас: Венера ваша ненадежна.</p><p class="p1">Товарищ Осипов слегка отшатнулся.</p><p class="p1">— Венера ваша, — гипнотически продолжал Остромов, — в пятом доме, я это вижу, даже не зная даты рождения. Такая удачливость в делах любовных — не прячьте глаз — такая избыточная, даже редкая способность добиваться всегда своего не допускает иного. Не спорьте, не спорьте, — Осипов и не пытался спорить, откинулся на спинку стула, выпучив глаза. — Мускуса в кармане не спрячешь, говорят персы. Вижу, но советую особенно опасаться людей змеиного или тигрового года. Годов рождения второго, пятого, девяностого, девяносто третьего, ранее неопасно. Тех, что ранее, мы в бараний рог согнем, верно? — В голосе его появилось заговорщицкое тепло. — Знаю, знаю этот запах удачи. Сам умею ловить и чувствую в других. Вы пойдете дальше, чем все эти, — он пренебрежительно взмахнул длинной рукой, — и о них вообще не стоит. Но опасайтесь человека змеи. И та, третья — помните третью? — вас не оставит, будет шататься по следу, гнаться, терять и находить, вы нескоро избавитесь. Не верьте тому сну, который, помните, был в феврале. Февральский сон неверен. Но выход не в том. Скажу сейчас страшное: не верьте никому со стороны матери. Вокруг рождения вашего есть тайна. И чтобы оберечь тайну, они на многое пойдут, даже вопреки, казалось бы, собственной выгоде. Я мог бы детальнее, но сейчас одно: через два года не упустите блестящей удачи. Не прогоните сейчас того, кто через два года… но молчание.</p><p class="p1">Он провел рукой по глазам и тут же придал лицу изумленное, близорукое выражение.</p><p class="p1">— Простите, — проговорил он глухо. — Я был как бы в беспамятстве, но это и есть то состояние, когда узнаешь невидимое. Сам не помню, что я… какие-то апрельские сны? Но вы прислушайтесь, может проскользнуть серьезное. Честь имею.</p><p class="p1">Он вышел, искусно пошатываясь. Осипов смотрел ему вслед, широко раскрыв лазоревые буркала влюбленной свиньи.</p><p class="p1">Остромов сам не взялся бы объяснить, почему надо было сказать ему про тайну рождения. Может быть, несоответствие стула и табуретки, залы и перегородок. Он как-то вписывался в это несоответствие, и сам, возможно, с детства верил, что мать не его, и каморка не их, и происхождение его особенное, достойное большего, но вот оказался тут, и надо себе вернуть утраченное, — у нищих детей бывают такие мечтания. Или змея: почему бояться змеи? Ну, если угодно, потому, что такие прямые, полноватые, крепкотелые всегда боятся змей, подозревая в них нечто столь иноприродное, что никогда не знаешь, чего ждать; насекомых боятся так же, и можно бы добавить — опасайся Скорпиона, но созвездие было для Осипова чересчур абстракцией. Третья любовь — тут Остромов проработал теорию: у людей склада простого, прозрачного именно третья женщина всегда значима; с первой все быстро и неловко, со второй слишком серьезно, к третьей они начинают соображать и пытаются заявлять права, управлять процессом, но здесь-то и натыкаются на первое сопротивление. Он мог бы об этом написать трактат не хуже Эрнана, но пришлось бы говорить о вещах слишком тонких, а с другой стороны — прикладных. Его заклевали бы. С учеными всегда так — не верят чувственным озарениям, цепляются к словам, а ведь вся их наука стоит на том же песке, что и оккультные учения. Когда исчезла материя, ликование царило повсюду: говорили «атом, атом» — а в нем та же дырка.</p><p class="p1">На улице Остромов прекратил пошатываться и пошел быстро, легко, четко. Осипов был его, оставались сундук и меч.</p><p class="subtitle">2</p><p class="p1">Клингенмайер наверняка знал рецепт эликсира — не вечной молодости, а вечной старости, не переходящей в дряхлость. Вероятно, питался чем-то сухим, наподобие гентских хлебцев. И лавке его ничего не делалось, словно стояла вне времени, на том самом месте — угол Большого и Лахтинской, «Д-р Фридрих Клингенмайер. Раритеты и древности». Сколько же я здесь не был? Семь лет, и каких лет. Тогда Остромов оставлял рукоятку, канделябры, кое-что из рукописей — так было принято; уходя, все тут оставляли нечто. Предстоял Кавказ, а там кто знает, что будет. Оставил он и еще кое-что, пришло время собирать спрятанное.</p><p class="p1">Клингенмайер был чужим в оккультном Петербурге. У него собирался свой кружок — что-то вроде общества ревнителей старины. Была надежда, что он кое-чего не слыхал, да и какое ему дело до старой ссоры чужих, в сущности, людей?</p><p class="p1">— Давно не бывали, — суховато сказал Клингенмайер. Остромов знал эту манеру, а потому и не рассчитывал на бурную встречу. Когда человек всю жизнь с вещами, мудрено ли, что ему трудно с людьми.</p><p class="p1">— Фридрих Иванович, — прямо сказал Остромов, — дело простое. Я хочу забрать реликвии, оставленные у вас в девятнадцатом году.</p><p class="p1">— Я не могу вам их отдать без консультации, — прошелестел Клингенмайер.</p><p class="p1">— Я удивляюсь, — сказал Остромов, без прежней, однако, уверенности. Клингенмайер был одним из немногих, перед кем он себя чувствовал младшим. — Помилуйте, какая нужна консультация, если это мои вещи?</p><p class="p1">— Не только ваши, — напомнил проклятый старьевщик.</p><p class="p1">— Пусть бы и так, — покладисто согласился Остромов. — Из собственно чужих там печатка Гамалея, но я ею владею по праву. Гамалей был бездетен, печатку вручил мне его внучатый племянник, где он — мне неизвестно.</p><p class="p1">— Печатка отдельно, я вам мог бы хоть сейчас отдать печатку. — Клингенмайер темнил. — Мне стало известно, что на вас наложен определенный запрет, и в силу этого запрета…</p><p class="p1">— Ах, вот что. — Остромов избрал модель «О», то есть оскорбленную невинность, хотя, идя сюда, думал о модели «А» — атака. — Вы верите заплесневелым слухам, верите клеветникам, и тут нет, конечно, ничего удивительного… — Он хотел сказать, что дело Клингенмайера — собирание старья, но сдержался. Вопрос был не в реликвиях даже. Собирателя уважали и те, кто никого не боялся, и хотя Остромов понятия не имел, что такого было в этом вечном старике, — он верил инстинкту и не переходил черту. — Сплетни всегда сопровождают личность сколько-нибудь значительную. Про вас тоже передают, что вы некромант, — кольнул он, не удержавшись.</p><p class="p1">— Про меня, — строго посмотрел на него Клингенмайер, решившись наконец говорить начистоту, — по крайней мере не передают, что я изгнан из ложи и оставил у себя реликвии без всякого права.</p><p class="p1">— Морбус выдумал это в шестнадцатом году, — небрежно сказал Остромов. — Он раздул тогда скандал, потому что умел меньше меня и не мог этого перенести. Он не знал даже полного толкования арканов. Пустил клевету, пошли слухи, все это бред, отдайте мои вещи.</p><p class="p1">— Я не разбираюсь в ваших ссорах, — сказал Клингенмайер, — но вещи смогу вам отдать только после дополнительной консультации.</p><p class="p1">— Я удивляюсь, — повторил Остромов. — У кого же вы хотите консультироваться? Есть мое слово против его слова, и прошло десять лет…</p><p class="p1">— Его я спрашивать не буду, он, положим, лицо заинтересованное. Даю вам слово, что наведу справки у третьих лиц.</p><p class="p1">— Эти третьи лица, — сказал Остромов с раздражением, которого не мог уже сдержать, — все заинтересованы, все завистники, вы сами знаете петербургскую сплотку… Я приехал из Италии, где получил посвящение и новое имя. Они тут верят только тем, кого принимали сами, а напринимали таких, что при первых тревогах пришлось делать силанум. Сейчас никакой деятельности вообще нет. Эти люди либо вруны, либо трусы. Я вправе, наконец, требовать.</p><p class="p1">— Требовать вы не вправе, — не повышая голоса, отвечал Клингенмайер, — потому что писали расписку, и она хранится в надлежащем месте.</p><p class="p1">— Так ведь я не имел выбора! Вы помните, какое было время. Я уезжал, деваться некуда, не чемодан же рукописей везти…</p><p class="p1">— Это ваше дело, а расписку вы писали, и никто не неволил.</p><p class="p1">— Фридрих Иванович, — сказал Остромов, начиная как бы с нуля. — Вам ли не знать: вещь опознает владельца. Среди реликвий есть вещи, принадлежавшие графу Бетгеру. Граф уже возвращался трижды. Есть указания ждать четвертого возвращения…</p><p class="p1">— Какие же указания? — приподнял бровь Клингенмайер ровно так, как давеча Остромов перед зеркалом, репетируя этот поворот.</p><p class="p1">— Да период же! — радостно воскликнул Остромов. — Или вы не знаете, что Бетгер приходит, как комета, с обращением в пятьдесят лет?</p><p class="p1">— Я про Бетгера только то знаю, что он основал фарфоровую мануфактуру и грабил казну курфюрста саксонского, — сказал Клингенмайер, антропос просвещенный в сфере материальных объектов.</p><p class="p1">— Но вы не знаете, что у меня его весы, — улыбнулся Остромов. — В том же сундуке, переданы мне еще в Италии. Он ведь был пятнадцатой ступени, вы не знали?</p><p class="p1">Весы эти Остромов купил в Турине, сувенир, пустышка, но на новичков действовало; особенно хороши были черепа на чашечках — аптечный символ, — и змейка, обвивавшая стрелку.</p><p class="p1">— Опознает, тогда и поговорим, — пообещал Клингенмайер. — Клянусь, что лишнего часа не задержу ваши реликвии. Дайте мне два месяца на справки.</p><p class="p1">— Почему два? — возмутился Остромов. — С заграницей хотите сноситься?</p><p class="p1">— Посмотрим, — уклончиво отвечал Клингенмайер.</p><p class="p1">— А до той поры что ж, и знаменитого чайку не предложите? — спросил Остромов, вновь меняя тон.</p><p class="p1">— Чайку предложу, — ровно ответил старьевщик, — и можете даже, если угодно, осмотреть сундук на предмет сохранности…</p><p class="p1">— Помилуйте, как это можно. Чтобы я не доверял людям… — опять, тоньше прежнего, уколол Остромов.</p><p class="p1">— А напрасно.</p><p class="p1">— Через это только и страдаю, — вздохнул посетитель. — Кстати, если уж зашел у нас откровенный разговор. Почему вы не верите мне, а верите Морбусу?</p><p class="p1">— Пока, — строго глянул Клингенмайер, — я не верю никому. Что до Морбуса, его я знаю тридцать лет и не имел оснований усомниться…</p><p class="p1">— Да, да. Как я мог забыть. Родной Петербург, человек вашего круга…</p><p class="p1">— Он не моего круга, — веско возразил Клингенмайер. — Но в бескорыстии его я убеждался, живет он соответственно тому, что проповедует, и знания у него широкие, не только в оккультной области…</p><p class="p1">— И вы не допускаете мысли, что он позавидовал младшему коллеге, который только выехал в Италию, а уже посвятился в «Астрее»?</p><p class="p1">— Этой мысли, — сказал Клингенмайер после паузы, — я не допускаю. Я допускаю другую мысль — что он доверился лжецу или поддался чувству. Это быть могло.</p><p class="p1">В каморке, в глубине лавки, зашипел на огне медный чайник, похожий на древнюю лампу.</p><p class="p1">— Он сейчас в городе? — небрежней прежнего спросил Остромов.</p><p class="p1">— Не знаю.</p><p class="p1">— Да будет вам. Я наверное знаю, что в городе.</p><p class="p1">— Я с ним дел не веду, — пожал плечами Клингенмайер. — Если знаете, для чего и спрашивать?</p><p class="p1">— Удивительный чаек, — похвалил Остромов. Чай был невкусный, чистая солома с сандаловым запахом. — Нда-с. Вот так покинешь город, оставишь все, чем дорожил, вернешься — а имущество твое под замком, имя очернено, друзьям наговорили…</p><p class="p1">— Борис Васильевич, — с усилившимся немецким призвуком проговорил хозяин. — Вам имя Елены Валерьевны Самсоновой ни о чем не говорит?</p><p class="p1">Остромов владел собой великолепно.</p><p class="p1">— Ах, о многом, — сказал он мечтательно.</p><p class="p1">— Так вот, — заметил Клингенмайер. — Не знаю ничего о Морбусе, но она — да, в городе. — Он заговорил вовсе уж как немец-гувернер: та, ф короте. — И она здесь бывает, тоже любит сандаловый чай…</p><p class="p1">— Весьма было бы любопытно, — пробормотал Остромов.</p><p class="p1">— Не думаю, — сказал Клингенмайер зло. — Постараюсь оградить ее от этого потрясения. Но она не опровергла по крайней мере одного факта. Я, впрочем, не расспрашивал. Она открылась сама, стоило мне упомянуть…</p><p class="p1">— Женщины, женщины, — сказал Остромов. — Я никак одного не пойму, Фридрих Иванович: если женщина после всего вас ненавидит и говорит одни гадости, — да еще глупые, чересчур объяснимые, — это доказывает, что она вас любит до сих пор, или что не любила никогда?</p><p class="p1">— Женщина женщине рознь, — подумав, ответил Клингенмайер. — Но если нечто подобное говорит о вас Елена Самсонова, это означает лишь, что она тяжко и незаслуженно оскорблена.</p><p class="p1">— Э-эх, Фридрих Иванович, — сказал Остромов с интонацией «Э» — элегической, несколько э-э-снисходительной. — С вещами вы, должно быть, накоротке и разбираетесь в них, как никто. Но в женщинах, прошу поверить, понимаете очень мало, и тут уж я не знаю, сочувствовать вам или завидовать. И скорее готов позавидовать, да-с…</p><p class="p1">Относительно Бетгера у него были отдельные планы.</p><p class="subtitle">3</p><p class="p1">Из лавки древностей путь Остромова лежал в театр Госдрамы, на Итальянской, где было когда-то прелестное кабаре «Би-ба-бо», а теперь ничего интересного, но среди неинтересного был «Уриэль Акоста», а в «Акосте» был занят меч. Сведения о мече Остромов получил из рецензии в «Известиях», где высмеивалось увлечение театра старинным антуражем, какому место в музее, а не на советской сцене.</p><p class="p1">Тут годились системы «С» («Странник») и «М» («Магистр»). Оптимальна была их комбинация. Тихо по шумному городу идет странник, ничего не узнавая, сторонясь прохожих, прижимаясь к стенам; давно изгнанный, чудом уцелевший, последний рыцарь разгромленного ордена. Он никогда не вернулся бы в проклятый город, ему даром не нужен этот жестокий город, где самые стены предали его. Но остались реликвии, der Нeiligtums, роман Эльзы Вестембюрдер. Эти Реликвии, оставшись без Хозяина, могут начать собственную Игру, das Spiel, и выпустить наружу старинный Рок. Здесь исчезает странник и виден магистр, которого долго искали, да так и не нашли. Откидываются волосы со лба (жаль, нет волос, но довольно жеста). Отдайте мне этот Меч, das Schwert, или я не поручусь за будущее Горожан. Сколько лет прошло, а он помнил немецкий отрывок, хотя язык, увы, изгладился; даже латынь — непременный инструмент в предстоящем Деле, das Werk, предстояло обновлять капитально.</p><p class="p1">Войдя в театр за три часа до представления, он принял вид официальный. Госдрамой руководил Соболевский, подражавший в минувшие двадцать лет всем по очереди, от бытового театра с могутно-купеческими драмами до футуристов включительно, и носившийся теперь с идеей адаптивного театра, составлявшей, если вдуматься, истинное зерно госдрамы. Идея была еще корабельниковская, времен мистерии: ни один авторский текст не считать окончательным, а исправлять по ситуации. Соболевский ставил классику, изменяя финалы в новом духе. Гамлет у него поднимал восстание и при военной помощи Фортинбраса свергал короля, Ромео и Джульетта взаимно уничтожались, а к венцу шли Меркуцио с дуэньей, двое из городских низов; Тартюфа арестовывали слуги, дон Карлос чудесно спасался, и только невозможность усовершенствовать историю Британии удерживала Соболевского от постановки «Марии Стюарт» с финальным триумфом Шотландии над Англией и обезглавливанием Елизаветы; его вторая жена, прима Госдрамы Алчевская по прозвищу Госдама, давно мечтала о роли Марии, и Соболевский уже поддавался.</p><p class="p1">Единственным современным спектаклем Госдрамы была только что переданная лично автором революционная трагедия бывшего знаньевца Деденева «Вера Народная». Она гремела. Учительница Вера Народная встречала на базаре, в деклассированном побирающемся виде прячущегося мужа, белого офицера, и мучительно колебалась — сдать, не сдать? Корнелевский выбор осложнялся тем, что в нее влюблен был матрос Шкондя. Мужу она в конце концов давала убечь, но тут оказывалось, что Шкондя следил за ситуацией с самого начала и, не будучи в действительности влюблен, втерся в дом Веры единственно для пресечения контрреволюции. Тогда все решал моряк ex machina, — но ныне пришли другие времена, и моряка пришлось отвести на второй план, а на первый, в духе НЭПа, вывести боевитую спекулянтку Зосю. Ради mauvais mais charmante<a href="ch2.xhtml#id2" class="a">[6]</a> Фанни Кручининой из Харькова, большеглазой, большеротой, не учившейся ничему, умеющей все, Соболевский оставил Госдаму. Зосиными словечками, из которых она сама сотворила роль (в пьесе у нее было две реплики — «Кому картопли, картопли?» и «Чтоб у тебя повылазило!») разговаривал весь театральный Ленинград: паролем сезона стало «Я же ж с чувством же ж женщина!», «Не тычь мне в душу дитем, цволочь» и необъяснимое, но неотразимое «Невля, харбертрус, ракло, иди в дупу и там погибни». Теперь спекулянтка была не только ярчайшим пятном на деденевской рогоже, но и спасительницей города: именно она, а не Шкондя, выследила шпиона и сдала его органам. Частное предпринимательство знает, при чьей власти ему лучше предпринимать.</p><p class="p1">«Уриэль Акоста» шел у Соболевского в новой редакции — Акоста обращал меч не на себя, а на фарисеев-угнетателей. Меч был нужен для посвящений, без него никак. Театрам досталось много ценного реквизита, цены ему они не знали и употребляли черт-те как. У Остромова был задуман свой театр, получше Госдрамы. Сегодня шел «Гамлет». Остромов узнал это из «Вечерней Красной».</p><p class="p1">— Как мне пройти к реквизитору? — серьезно, как право имеющий, спросил он на служебном входе.</p><p class="p1">— Вы откуда, товарищ? — спросила девчонка лет двадцати, охранявшая нутро Госдрамы.</p><p class="p1">— Общество охраны памятников старины, — сказал он с полупоклоном. Был у него и кое-какой документ на всякий случай — он не терял времени, возобновил знакомства, заручился помощью Охотина, ныне лектора при музее города, — но не понадобилось.</p><p class="p1">— Реквизитор не подошел еще, — виновато сказала девчонка. Нехороша, нет, нехороша, — а могла быть легчайшая победа. Но до такой картошки мы еще не опустились.</p><p class="p1">— Тогда я переговорю с товарищем Алчевской, — почтительно, как подобает музейной крысе, предложил Остромов.</p><p class="p1">— Товарищ Алчевская у себя, вот по этой лестнице и два раза направо по коридору, — пролепетала вахтерша.</p><p class="p1">— Благодарю вас, — корректно поклонился Остромов и, прямо держа спину, взошел по лестнице. Перед гримерной товарища Алчевской он помедлил и лишь потом стукнул костяшками по гладкому дереву: двери у Соболевского были шикарны, портьеры плюшевы.</p><p class="p1">— Альбина, это вы? — томно спросило из-за двери. Вероятно, Алчевская ожидала гримершу.</p><p class="p1">— Общество охраны памятников, — представился Остромов. Немолодая, но ухоженная Госдама предстала ему в тунике, в облике Гертруды. Соболевский не гнался за достоверностью, представления об эльсинорских модах были у него гатчинские, и всех без исключения женщин в классических ролях он одевал, как дачниц-эвритмисток.</p><p class="p1">— Прежде всего, — сказал Остромов, сверкая глазами с исключительным благородством, — позвольте просить у вас прощения за визит. Но отлагательств быть не может, и вы поймете. В спектакле вашем «Уриэль Акоста» занята вещь, которая, быть может, не имеет для театра большой ценности. Но для истории ценность ее такова, что…</p><p class="p1">— Кто вы такой? — спросила Гертруда с явным интересом. Ей давно не встречались столь выразительные мужчины. Она до сих пор не могла прийти в себя от предательства Соболевского и лелеяла планы мести, но было не с кем.</p><p class="p1">— Позвольте мне ограничиться второй профессией, — сказал Остромов. — Меня зовут Борисом Васильевичем, условимся звать меня этим именем. Я служу сейчас при музее городской истории и собираю предметы, представляющие ценность особого рода. Это единственная возможность упасти святыни.</p><p class="p1">Гертруда под его взглядом отступила в глубь уборной, и он расценил это как приглашение.</p><p class="p1">— В одна тысяча триста сорок первом, — заговорил он мерно, наступая на нее, — меч героя-крестоносца Роберта Валбьерга после его смерти в битве под Псковом попал в Россию. Было замечено его чудесное действие, он исцелял и свечением предвещал вторжения. В битвах вооруженный им был непобедим. В семнадцатом веке его перевезли в собрание князя Воротынского. Затем его следы находятся в коллекции Новикова, где меч используется для посвящений. После ареста Новикова он хранится у брата Вонифатьева, а потом препоручается мастеру Великой Астреи, которого имя позвольте мне опустить. — Он поджал губы. — Известные события застали мастера за границей, вернуться было немыслимо. Имущество его разграблено, братья спасли только рукописи. Меч поступает в распоряжение Петроградского отдела исторических ценностей (Остромов не поручился бы, что такого отдела нет) и направляется в собственность театрального союза. Оттуда его получаете вы, не зная, что этим мечом посвящено в масонство не менее трехсот лучших братьев. Вы храните эту вещь в костюмерном хламе. Отдайте мне ее и просите за это все, хотя бы и жизнь.</p><p class="p1">Он замолчал и поглядел магистерски — умоляюще, но свысока.</p><p class="p1">Госдама была совершенно смята.</p><p class="p1">— Но я не знаю… я не предполагала… Вы уверены, что это именно тот меч? Он не выглядит… я хоть что бы поставила, что это реквизит, то есть чистая подделка.</p><p class="p1">— Я удивляюсь, — сказал Остромов. — Ни одна вещь не раскрывает своей истинной ценности, особенно вещь с такой историей, но если вам угодны доказательства — выйдите с нею в полнолунье в любую точку силы, каковых на этой улице не менее трех, и взмахните крестообразно; вы увидите, что будет.</p><p class="p1">Сделалась пауза.</p><p class="p1">— Впрочем, — развивая успех, продолжил Остромов, — если вещь не узнает владельца, я готов отступиться и в возмещение отнятого у вас времени открою вам бальзам от мигрени, простой, но действенный.</p><p class="p1">— Вы его увидите, — прошептала Гертруда со страстью и даже угрозой. Она схватила Остромова за руку и увлекла в реквизиторскую, прихватив попутно ключи из настенного шкафчика. Пахло гримом, пудрой, отсыревшими тряпками. Загорелась желтая лампочка на шнуре. Бедные театральные вещи в свободное от сцены время валялись черт-те как, и в углу, за грубо вырезанным деревянным щитом, крашенным серебрянкой…</p><p class="p1">Остромов гибко опустился на колени.</p><p class="p1">— Старый товарищ, — проговорил он прочувствованно, — старый Хоган Неарль! Прости меня, прости, шедшего так долго.</p><p class="p1">Голос его удачно дрогнул.</p><p class="p1">— Как вы назвали… — трепеща, пропищала Гертруда.</p><p class="p1">— Хоган Неарль, — повторил Остромов, — и о! я слышу, как он отозвался мне! Разве не слышите вы?</p><p class="p1">— Не слышу, — призналась она.</p><p class="p1">— Впрочем, я должен был знать… Подождите, в умных руках он наберет силу, и голос его станет всеслышен… Я удивляюсь! — грозно произнес Остромов. — Я удивляюсь: неужели вы… и другие… люди искусства, люди высокой чуткости… не узнали предмет, который просто показывать сотням непосвященных уже есть кощунство! Что мешало вам использовать или хоть заказать любой другой, но не этот, которого действие никто не может предсказать? Знаете ли вы, что делалось от него в зале, какие судьбы менялись — и как?! Это может наступить с отсрочкой до месяца, а то и более! Как можно, Боже, когда простейшее прикосновение бывает опасно для степени ниже третьей… Воля ваша, но видеть здесь, среди хлама, величайшую реликвию величайшего учения… Я одно могу спросить: сколько?</p><p class="p1">— Берите, берите, — почти беззвучно прошептала Алчевская.</p><p class="p1">Здесь важно было не переборщить: слишком бурная благодарность выдала бы игру, и он кивнул сухо, выговорив: «Я знал». Меч оказался холоден и тяжел, тяжелей, чем с виду. Явная подделка, реквизит по заказу; чугун?</p><p class="p1">— В руках непосвященного он все равно лишь вредит, — мягко добавил Остромов. — В руках же мастера… о, вы увидите, скоро увидят все.</p><p class="p1">Следующего порыва Алчевской никто предсказать не смог бы. Именно здесь случилось то, что впоследствии едва не погубило Остромова, попав в протоколы под именем гипнотического насилия. Сама Алчевская описывала это так: «Взглядом опустив меня на колени и положив руки на мою голову, чтобы сильней воздействовать, он вынудил меня к извращению, от которого я долго еще потом была сама не своя. Противостоять его гипнотической силе я не могла. Он говорил, что это так будет хорошо. Я не могла ничего возразить. Это повторялось еще потом много».</p></span></span>
