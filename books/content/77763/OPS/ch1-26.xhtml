<p class="p">Глава десятая</p>
</div><p class="subtitle">1</p><p class="p1">Шестого августа, в собственный день рождения, Даня неожиданно получил приглашение в гости и достиг первого серьезного успеха в обучении, и вот как это вышло.</p><p class="p1">Он направлялся в Публичную библиотеку — посмотреть журналы за последние месяца три, — и в дверях нос к носу столкнулся с Кугельским.</p><p class="p1">— Ба, ба, ба, товарищ Даня! — искусственно обрадовался Кугельский. Видимо, в журналистских кругах модно стало экзальтированно приветствовать своих, чтоб чужие завидовали. — Вы что же не заходите? Столько раз про вас вспоминал!</p><p class="p1">— Да так как-то все, — промямлил Даня. Кугельский не опознал цитаты.</p><p class="p1">— Напрасно, товарищ Даня, очень напрасно! Под лежачий камень вода не течет. Да вот кстати: я сегодня вечером собираю у себя. Люди все дельные. Давайте, давайте. Познакомлю кое с кем. Кстати, буду читать. Да. Хочу проверить вещь. Приходите. Не придете — обижусь.</p><p class="p1">Даня сроду бы не пошел к нему в обычный день, даже и без предупреждения Льговского, поскольку первым впечатлениям привык доверять, — но уж очень мало прельщала его перспектива снова набиваться к Воротниковым, да и Варгу надо было куда-то выводить, как сама она называла это — то ли по-конски, то ли по-собачьи, но в светских и конских терминах хватает общего: выезд, элита, порода…</p><p class="p1">— У меня день рождения сегодня, — зачем-то признался Даня.</p><p class="p1">— Так и отлично, заодно отметим! Или свои планы?</p><p class="p1">— Планов никаких, — честно сказал Даня. — Я только не знаю, зачем я вам там…</p><p class="p1">— Что значит — зачем?! — напыщенно воскликнул Кугельский. — Вы что же, лишний человек? Печорин? Значит, записывайте…</p><p class="p1">— Я запомню, — пообещал Даня. У него не было блокнота. Кугельский долго и с наслаждением разносил его за непрофессионализм.</p><p class="p1">— Только представьте, — говорил он с преувеличенной живостью. — Вы идете, и вдруг прелестная уличная сценка. Извозчики подрались или услышалось точное народное речение. Что, дать этому пропасть? Нет, товарищ Даня, пролетарский писатель не может разбазаривать жизнь — ни свою, ни чужую! Пойдемте, я вам куплю. Я вот, товарищ дорогой, до пяти книжек в месяц исписываю. Думаю, по-настоящему ленинградская улица заговорит только у меня. А на память не надейтесь: все вытесняется.</p><p class="p1">Он подтолкнул Даню к лотку с книгопечатной продукцией и за собственную мелочь приобрел Дане блокнот с надписью «Привет участникам общегородской партконференции!». Конференция собиралась тут полгода назад, но все блокноты так и не использовала. — образовался излишек, спущенный в розничную сеть. Теперь любой, кто желал почувствовать себя делегатом общегородской конференции, платил двадцать копеек и наслаждался.</p><p class="p1">На журналы ушло у Дани часа два. Он просмотрел «Красную новь», «Красную ниву», «Прожектор», «Новый мир» и последний «Леф». Ощущения были странные. Сотня лучших умов старательно осуществляла по всем направлениям установку на дрянь, и чем дрянней выходило, тем больше они, кажется, радовались. Почему-то это было естественно: он не мог бы предположить ничего другого. Сложней было с объяснением. Весь этот перевернутый мир, в котором бегуны бежали как можно медленней, стараясь спотыкаться, а прыгуны прыгали один другого ниже, вручая пальму первенства тому, кто вовсе переступал кривыми ногами на месте, — держался на негласном уговоре: ни в коем случае не производить ничего настоящего, ибо оно одним своим появлением обнаружило бы фальшь всех общих конвенций. Это ненастоящее постепенно обучалось уже выглядеть товарным, живым, но в силу неопытности на каждом шагу обнаруживало инвалидность. Персонажи вступали в какие угодно отношения, кроме естественных, спорили обо всем, кроме того, что волнует живых, и в любой предложенной ситуации совершали поступки, до которых нормальный человек додумался бы в последнюю очередь. Изнасилованную комсомолку оскорбляло, что маньяк не подарил ей цветов. Обманутый муж негодовал, что жена изменила ему с беспартийным. Умирающий досадовал, что не увидит пуска нового комбината, и можно было вообразить, какую антипродукцию выдавит в мир этот комбинат, насильственно, мучительно преодолевая естественное желание работать как следует. Никто не хотел уюта, счастья, взаимной любви. Женщины тяготились красотой, мужчины — силой, всякий естественный порыв вызывал стыд, а главные озарения непременно приходили в грязи, в канаве, после разрыва или под маньяком. Герой ощущал себя на месте, только загнав свою жизнь в зловонный тупик, в медвежий угол, разметав дом, выбежав под ливень, сойдясь с нелюбимой, физически омерзительной. Признаком духовного аристократизма служило хаканье, гэканье, хмыканье, харканье, шумное сморканье. Болезнь приравнивалась к преступлению, курение — к подвигу, сострадание — к предательству, ласка — к разврату. В критических отделах уже потравливали Корабельникова, под которого продолжала писать добрая половина стиходелов, — но потравливали не за громыханье, не за следование собственному шаблону, не за газетное убожество, а за то, что он был недостаточно плох, что можно и должно было хуже. Первый час Даня читал с интересом и тем труднообъяснимым наслаждением, с каким всегда читаешь дрянь, — то ли радуясь ее предсказуемости и своей догадливости, то ли избавляясь от страха собственного несовершенства на фоне этой откровенной, ничем не прикидывающейся халтуры. Потом ему стало скучно, потом страшно — как если бы сначала перед ним карлики играли во взрослые игры, например в футбол, а потом победители принялись грызть проигравших. Он поднял глаза от «Нового мира» и стал обозревать читальный зал. Вид этот был лучшим аргументом против чтения: читали либо бывшие вроде него, либо настоящие вроде соседа справа, юноши с крысиной мордочкой, раскачивавшегося на стуле и грызшего ногти от напряжения. Чтение было ему не по силам, он каждые пять минут отвлекался, ища взглядом, на чем бы отдохнуть, — но никто вокруг, как назло, не дрался, не совокуплялся и не жрал, а прочее было ему неинтересно. Все были серы, несчастны и злы: бывшие — оттого, что проиграли, настоящие — от того, что победа ничего им не дала, наелись дерьма за собственные деньги, столько назверствовали, а теперь приходится сидеть и читать; окончательное истребление прежних хозяев не случилось, а новыми хозяевами они не стали, и вообще непонятно, кто выиграл от всех этих девяти лет, раз все стало то же самое, только без прежней надежды на перемены.</p><p class="p1">Может, и все, что было в журналах, сделалось такой дрянью именно потому, что делать, как лучше, уже пробовали, а потому возобладала бессознательная установка на худшее: может, теперь, quo absurdum<a href="ch2.xhtml#id25" class="a">[22]</a>, выйдет что-нибудь дельное? А может, никто не знал, что теперь делать, и все только нащупывали правила игры, и сплошь выходили пробы да ошибки? Но страшней и верней всего выглядела догадка о том, что теперь за всю эту дрянь придется расплачиваться, и чтобы не стать крайним, все старались выглядеть как можно хуже: ясно же было, что спросят с тех, кто хоть что-то мог и понимал. В частности — с Корабельникова, который, как ни старался, не мог прикинуться окончательной бездарью. Все дрались и толкались, спеша наперегонки к животному состоянию, сливались с местностью кто во что горазд, притворялись кто елкой, кто ухабом, кто болотной мочажиной, и отчетливо понимали, что уцелеет лишь тот, кто убедительней притворится коровьей, а лучше бы человечьей лепешкой. Этот конкурс вовсю шел в любом журнале, и особенно наглядно — в критических отделах, где били только тех, кто был недостаточно плох, и признавались в этом почти прямо. Если какой-нибудь фантом умудрялся помимо авторской воли ляпнуть живое слово, пожалеть несчастного, позавидовать счастливому, проговориться о том, о чем подспудно думали все, — автора немедленно метили и делали кандидатом на уничтожение, не сейчас, а вот лет через пять, когда все окончательно перестанет получаться и придет пора заменять так и не освоенное созидание привычным, всегда удающимся истреблением.</p><p class="p1">Почему так вышло? Даня думал об этом всю дорогу к Воротниковым. Ведь так хорошо придумали, так размахнулись — и все провалилось с полной очевидностью, уже на девятом году, когда только и остается вводить новые слова: промкооперация, индустриализация, коллективизация, электрификация, и всякого рода тирлимбомбом, коопсах, драмтрахмух, страшный язык страшных людей, склеенных из обрубков. Что-то они сделали не так, и главным словом эпохи, тем самым, на отсутствие которого так сетовал Льговский, стала не электрификация и не индустриализация, а левитация. Он улыбнулся. Эта мысль стоила дня рождения. Да, может, все и затевалось только ради его левитации, если она удастся когда-нибудь; а не удастся — все больше проку, чем от коллективизации.</p><p class="p1">У Воротниковых каждый был занят собой: Мария Григорьевна шила, Ольга конспектировала, Варга клеила коллаж из пяти изрезанных журналов, Миша валялся на софе, рассеянно читая «Происхождение видов» и ничего, по собственному признанию, не понимая. Рядом с ним стояла миска сушеных абрикосов, в которую он время от времени запускал незрячую руку и нашаривал дольку.</p><p class="p1">— Совершенно не могу это читать, — преувеличенно, как всегда, пожаловался он. — Доместикация… коррелятивная вариация… Если вещь неясно написана, черт побери, то она и внутренне несостоятельна. Зачем он вводит столько слов, и неужели же ему непонятно, что ничто не может получиться само? Если бы была борьба за происхождение видов, совершенно ясно, что никакого меня не было бы. Но вот терпят же за что-то. Мне кажется, что основа — не борьба, а терпение. Что ты скажешь, Даня? Мне тьму всего надо бы тебе рассказать, но голова болит, и я весь в Дарвине.</p><p class="p1">Даня не удержался и начал было рассказывать, что если борьба и есть, то это борьба за право быть хуже, по крайней мере здесь и сейчас, — но Миша, как всегда, прицепился к слову, мешая не то что кончить, а и начать:</p><p class="p1">— Это ты совершенно мимо. Я знаю, почему это. Тебе кажется, что все в упадке, потому что у нас миропонимание последних в роде. Я читал у Ленина. Поэтому тебе кажется, что все вот-вот кончится, а между тем ничего не кончается, полный расцвет. Каждый день диспут. Мама может не понимать, но ты? Просто мне кажется, что главный механизм природы — это не борьба, не вытеснение, а вот именно пусть будет как можно больше форм. Пусть буду я, и ты, и, допустим, Тамаркина. И сейчас потому-то стало наконец по-человечески, что перестали вытеснять нежизнеспособных — за всеми гримасами это очень, знаешь, чувствуется. А гримас могло быть в сто, в тысячу раз больше, но согласись, что если кто-то сегодня что-то представляет…</p><p class="p1">Он мог развивать эту тему бесконечно, уговаривая даже не себя, а тех, кто незримо вслушивался. И потому, говоря, он постоянно оглядывался — словно проверяя, правильно ли поняли стены, все ли донесут, как нужно.</p><p class="p1">— Ты ужасно глуп, — сказала Варга и хлопнула его журналом по губам.</p><p class="p1">— Вот изволь тут быть мыслителем, — сказал Миша, силясь снисходительно улыбнуться, но видно было, что он задет.</p><p class="p1">— С днем рождения, — небрежно поздравила Варга.</p><p class="p1">— У тебя день рождения, черт! — воскликнул Миша и принялся хлопать Даню пухлой рукой по плечам и спине. — Старик, почему же ты молчал? Девятнадцать? И все еще ничего для славы? Поздравляю, старик, но надо развиваться, развиваться! Смотри на меня — я ничего не понимаю, но стараюсь! Как мы будем отмечать? Что ты нам принес в подарок? — Ему казалось, что это смешно. По Даниному лицу мелькнула тень обиды, и он стушевался. — Я шучу, Даня, шучу! Хочешь «Происхождение видов»?</p><p class="p1">— Да не надо ничего. Я не люблю этот праздник.</p><p class="p1">— Я тоже не люблю, — закивал Миша, — шестнадцать, а что я такое?!</p><p class="p1">— Именно, — сказала Варга. — Ладно. Куда мы пойдем?</p><p class="p1">— Разве ты не останешься?! — балаболил Миша. — Останься, будет селедка…</p><p class="p1">— Нет, мы уходим, — решила Варга за них обоих. — Куда сегодня?</p><p class="p1">— Вообще-то, — сказал Даня не очень уверенно, — меня звали сегодня в одни гости…</p><p class="p1">— Что, опять кто-то нудный? Вроде твоих фасонов?</p><p class="p1">Миша преувеличенно расхохотался.</p><p class="p1">— Нет, сегодня другое. Журналист знакомый, так, виделись пару раз. Но тебе, может, интересно…</p><p class="p1">— Журналист, — неопределенно протянула Варга. — Это на всю ночь?</p><p class="p1">Миша сделал огромные глаза.</p><p class="p1">— Не думаю, — сказал Даня. Ему было неловко.</p><p class="p1">— Это жаль. Впрочем, ладно. Только не заставляйте танцевать.</p><p class="p1">— Как хочешь.</p><p class="p1">— Тогда пойдем. Погоди, мне надо нарисовать лицо.</p><p class="p1">— Это на час, — скорбно сказал Миша.</p><p class="p1">— Тебе-то что, — сказала Варга и присела к столу. — Выйдите оба.</p><p class="p1">— Куда же мы выйдем? — возмутился Миша. — Я читаю!</p><p class="p1">— Ты все равно ничего не понимаешь. Идите в кухню.</p><p class="p1">— В кухне Тамаркина, — жалобно сказал Миша, но Даня не спорил: ему интересно было поговорить с Тамаркиной. Почему-то она была приятна ему, хотя он до сих пор не понимал, что она делает у Остромова.</p><p class="p1">Тамаркина в самом деле была в кухне, обваливала в муке корюшку и метала ее в кипящее масло, и над плитой висел чад. На Тамаркиной было синее холщовое платье и темный передник. Даня думал, что их погонят и отсюда, — еда давно была священнодействием, присутствие при готовке неприличием, — но она улыбнулась ему с нежданной лаской, словно их и впрямь связывала общая тайна.</p><p class="p1">— Даня пришел, — сказала она нараспев. — Рыбки хошь?</p><p class="p1">— Нет, Катерина Иванна, спасибо.</p><p class="p1">— А напрасно. Огуречинка свежая.</p><p class="p1">Корюшку называли огуречинкой за огуречный дух, будто бы исходивший от свежепойманных особей, но Даня корюшки не ловил, а в жареном виде она чадила, как всякая жареная рыба. Он ее терпеть не мог.</p><p class="p1">— Вы будете в пятницу? — спросил он.</p><p class="p1">— Буду, чего ж. Он тетрадку дал, вот занимаюся.</p><p class="p1">«Рыбой, что ли?» — хотел спросить Даня, но сдержался. В Тамаркиной было нечто, вызывающее уважение: может быть, бранчливая, сварливая ее доброта, которой Воротниковы не видели, а Даня чуял.</p><p class="p1">— Что за тетрадка? — спросил он.</p><p class="p1">— Да мысли на расстоянии, — ответила Тамаркина охотно, не смущаясь Мишиным присутствием. — С сестрой я поговорила уж.</p><p class="p1">— Далеко сестра-то?</p><p class="p1">— А под Псковом. Я в июне-то ездила.</p><p class="p1">— И что слышно?</p><p class="p1">— Да хорошо, — сказала Тамаркина, перекладывая на блюдо готовую корюшку. — Муж только плох у ей.</p><p class="p1">— Болеет?</p><p class="p1">— Болеет-то ладно, он всегда у ней больной, а вроде как мешает. Я в пятницу спросить как раз хочу. Как он меж нами встанет, так слабей слышно.</p><p class="p1">— Помехи, я читал, — авторитетно сказал Миша. — У нас кружок радиолюбителей. Радиоволны не проходят через бетон. У вашей сестры муж бетонный.</p><p class="p1">— Он бетонный, а ты балабол деревянный, — беззлобно сказала Тамаркина. Она вообще как-то смягчилась в последнее время.</p><p class="p1">— Погодите, — сказал Даня. Он не слишком верил Тамаркиной, но ему было обидно, что он до сих пор не освоил простейших вещей, а между тем Тамаркина, простая душа, запросто беседует с сестрой из Пскова. — То есть вы прямо слышите ее?</p><p class="p1">— А что ж, я и до того слышала. У ней когда первый муж помер, я так и слышу: авававава! Она девчонкой еще была, всегда так плакала: авава! Что ты, думаю, Полина, где ты? А она ничего, только авава. Потом уж узналось, что в тот самый вечер он и того.</p><p class="p1">— Но сейчас легче стало?</p><p class="p1">— Сейчас-то конечно. Там написано, как. Надо в воздухе нитку сделать и тянуть, а я прясть-то когда еще умела. Так и выпряла. Три часа до Пскова пряла, в облако попала, через облако тянула.</p><p class="p1">— Да это вы спали, Катя, — сказал Миша.</p><p class="p1">— А и спала, — легко согласилась Тамаркина. — Сплю, а пряду. Уронить нельзя, концов не найдешь.</p><p class="p1">В том-то и дело, понял Даня. Я не умею прясть, сроду не доил корову, не могу вбить гвоздя — а ведь все это штука простая, грубая. В тонком мире ровно так же потребны простые навыки: заштопать карму, связать судьбы. У Тамаркиной все должно получаться, а я не могу спрясть нить даже между собой и Варгой, хотя оба мы почти никому не нужны. Куда я сунулся к Остромову — мне бы освоить Зингер.</p><p class="p1">— Ничего я не умею, — сказал он вслух.</p><p class="p1">— Ладно, ладно, — рассеянно отвечала Тамаркина. — Жизнь всему научит.</p><p class="p1">Она переложила последнюю порцию корюшки на блюдо и прошествовала к себе.</p><p class="p1">— Слушай, — сказал Миша. — Я все понимаю, чудаки и оригиналы и все такое. Но неужели вы все это всерьез… я не знаю… Тамаркина, положим, может верить, но ты?</p><p class="p1">— Я, может, еще и гораздо хуже Тамаркиной, — грустно сказал Даня. Распространяться перед Мишей он был не склонен.</p><p class="p1">— Конечно, конечно, всё слышали. Вина интеллигента и все такое. Она народ, ты интеллигент. Но помилуй, это же бабкины сказки. Зачем тебе эти игры? Ладно, ты ходишь туда развлекаться, я все готов понять. Варге просто нечего делать. Но скажи мне, кудесник, неужели сегодня, в Ленинграде, ты можешь все это… нет, не постигаю.</p><p class="p1">— Миша, — терпеливо сказал Даня. — Ты многого не постигаешь. В частности, ты не постигаешь «Происхождения видов». Не значит же это, что виды до сих пор не произошли?</p><p class="p1">— Отговаривайся сколько угодно, — буркнул Миша, явно обидевшись. — Ты не хочешь со мной разговаривать и не принимаешь меня всерьез, да-да-да, — зададакал он, хотя никто и не думал оправдываться, — и не воображай, что это очень оригинально. Но если хочешь знать — это я тебе говорю уже всерьез, — из вас из всех, включая тебя и Варгу, и маму, и может быть, Тамаркину, — я один взрослый человек, который живет с открытыми глазами. Вы все играете каждый в свою игру и думаете что-то пережить, как-то пересидеть, закуклиться, сделать из себя спору… Я один знаю, что время дано, и надо жить во времени. Надо меняться, надо идти ему навстречу, пользоваться возможностями, которые оно дает, потому что человек — это рост, а вы все прячетесь, как от зимы. Идет зима, можно кататься на лыжах, а вы все кричите, что лыжи — компромисс, и сидите в своем убогом тепле, и ждете, пока вас раздавит снегом. А надо выйти из норы — и дышать, ты понимаешь, про что я вообще говорю?</p><p class="p1">Ему казалось, что он говорит очень важное и что его метафора объясняет все.</p><p class="p1">— Хорошо, хорошо, — сказал Даня, чувствуя, что ему хочется позлить Мишу, и не давая воли этому дурному, дурному порыву. — Ты кругом прав. Они приняли тебя в игру, лепить снежки, натирать лыжи, и ты уже думаешь, что это твой снег и твоя зима. Верно, Миша? Верно, старик? Знаешь, на кого ты похож? Пришла зима, все ежи попрятались. Ты один вылез, брюхо мерзнет, зайцы хохочут, — но ты бредешь, проваливаясь в снег, и агитируешь всех остальных: зима, товарищи! Крестьянин торжествуя! Наша русская кровь на морозе пищит!</p><p class="p1">— Смейся, смейся. Однако я серьезно, — настаивал Миша, поправляя очки. — Ты думаешь, что это зима и ее можно пересидеть, а это великое оледенение. И когда оно кончится — а оно, может быть, кончится через миллион лет, — среди грязи найдут вас, разложившихся, потому что вечной спячки не бывает.</p><p class="p1">Мишу самого слегка передернуло от этой картины.</p><p class="p1">— Да, да. Но от нас хоть что-то останется, а тебя вообще сожрут мамонты. Скажи, Миша, почему тебе обязательно надо быть лучше меня?</p><p class="p1">— Да мне как раз не надо, — обиделся Миша. — Дурак, я не хочу, чтобы ты с твоим умом… со всем, что ты можешь… почему надо торчать по углам? Ты думаешь, Варга не рассказывает мне, что у вас там за оргии?</p><p class="p1">— Варге везде будут оргии, — сказал Даня, почувствовав, однако, укол совести: нечего было таскать к учителю глупую девчонку, у которой на уме одно, и это одно заслонило ей весь свет. — Посели ее в деревню, заставь копать картошку, она вернется и расскажет, что картошка неприлично почковалась и лопата эротически втыкалась в грунт. Что ты слушаешь Варгу?</p><p class="p1">— Варга дура, но она чистая душа. Она видит как есть все это шарлатанство. Это тринадцатый век, альбигойцы с катарами. Я бы понял, если бы декадент, начитавшись графа Салиаса… Но ты…</p><p class="p1">— А что я? — ответил Даня, впервые, кажется, сам задаваясь вопросом: что я там делаю? Он был у Остромова настолько на месте, что ни разу прежде не удосужился объяснить себе, зачем дважды в неделю приходит на групповые занятия и при первой возможности бежит на индивидуальные. — Я, может быть, самый неспособный из его учеников, и ума моего хватает на десятую, тысячную часть того, что он говорит… Я понятия не имею, можно ли устанавливать умственную связь и была ли в истории хоть одна левитация. Я, может быть, отлично знаю, что левитация не имеет отношения к левитам, хотя он утверждает обратное, и не верить ему очень трудно… Я знаю одно: у вас ведь уже начали физику?</p><p class="p1">— Да, конечно. Я не такой младенец, каким кажусь.</p><p class="p1">— Ты не младенец, напротив. Очень может статься, ты действительно взрослее нас всех, и меня, и мамы, и Тамаркиной, и корюшки… Читал ты о фотоэффекте?</p><p class="p1">— Нет, я ничего в этом не понимаю, — гордо сказал Миша.</p><p class="p1">— Я и сам не понимаю, — немедленно утешил его Даня; инстинкт самоумаления срабатывал безотказно. — Я знаю только, что поток света как-то вышибает электроны из металлов. И вот Остромов — не знаю, как он это делает, и сам, должно быть, не осознает… Он именно вышибает электроны: из меня, Варги, Пестеревой — из всех. Каждый при нем становится другим, а может, наоборот, собой, — я не знаю. Что такое индуктор, ты уж наверняка слышал?</p><p class="p1">— Представь себе, слышал. Нам теперь с опережением рассказывают все, что имеет отношение к технике. — Миша карикатурно, защитительным жестом, сразу переводящим его в разряд паганелей, потер переносье. — Эта штука вызывает ток в турбине, заставляет ее, короче…</p><p class="p1">— Ну вот видишь, все ты знаешь. Это действительно штука, от которой там где-то возникает ток, понятия не имею, где. От Остромова идет ток, а Варге это не нравится, потому что она сама хочет все вышибать из всех, только и всего.</p><p class="p1">— Легка на помине, — сказал Миша, глядя, как Варга павой вплывает в кухню. — Дыша духами и туманами.</p><p class="p1">Резкий, тяжело-сладкий запах ее духов перебил даже остаточную вонь корюшки, стлавшуюся над кухонным полом.</p><p class="p1">— Где только берет, — сказал Миша, морща нос.</p><p class="p1">На Варге были, как всегда, сплошь тряпки — облако, вихрь тряпок, но ее и нельзя было представить ни в чем другом. Даня боялся всматриваться, чтобы не разглядеть, что из чего сделано. Варга могла быть сколь угодно вульгарна, капризна, даже глупа — ничего страшного, все ей шло, — но не могла надеть теннисный костюм, мимикрировать под американистую деловитость, сшить себе шапочку по журнальной выкройке. Самые пошлые ее маскарады пахли цыганской степью, а самые модные и свежекупленные летние костюмы студенток на Невском выглядели непоправимо засаленными. Эту цыганщину он и любил в ней — по меркам двадцать шестого года любая пошлость тринадцатого почти равнялась подвигу.</p><p class="p1">— Скажи, — с неожиданной томностью, с темной лаской спросила она, прижимаясь к нему на лестнице, — скажи мне вот что… Или нет, пожалуй, не говори.</p><p class="p1">— Пожалуй, не скажу, — буркнул он.</p><p class="p1">— Ты чурбан, тюфяк, — в «чурбане» она програссировала, чего прежде за ней не возилось. — Когда я только выучу тебя. Так скажи мне, там можно будет остаться на ночь?</p><p class="p1">— Не знаю… не думаю. — Даня страшно смутился и не сумел этого скрыть. — Вообще я туда впервые.</p><p class="p1">— Это неважно, — сказала она. — Если ты сегодня не будешь тюфяком, я тебе что-то подарю, а если будешь, ужасно пожалеешь.</p><p class="p1">— Считай, что уже пожалел.</p><p class="p1">— Нет, нет, — она прижалась к нему горячим боком. — Не хочу тюфяка. Куда мы идем?</p><p class="p1">— Слушать пьесу, — выпалил Даня.</p><p class="p1">— Страсть соблазнительно, — протянула она. — Как посмотрю на всех вас, а потом на себя, так прямо и жить не хочется. За что я вам всем такая… сшитая на заказ?</p><p class="p1">Да, да, привычно умиляясь каждому ее слову, подумал Даня. Всех сшили на заказ и забыли забрать, вот изволь теперь стоять на одной полке с мешками удобрений, с промасленными механизмами, на чужом складе, вдалеке от теплых домов, где нам были бы рады. А может, и не забыли, может, всех, кто мог нас забрать, просто убили. А скорей всего, мы им не подошли. Им нужны были какие-то другие, настоящие, которые никогда не согласились бы стоять с промасленными механизмами. Если бы мы были настоящие, мы сами сбежали бы со склада и разошлись по правильным домам. А впрочем…</p><p class="p1">Вот что я делаю у Остромова, понял он. Вот именно это самое я и делаю.</p><p class="subtitle">2</p><p class="p1">Кугельский праздновал вовсе не окончание пьесы, а новоселье, но странная стыдливость заставила его об этом при Дане промолчать. От других не скрывал, прямо говорил: вселяюсь. Что ж было не вселяться? В Ленинграде это была теперь частая вещь. Одни сочтены лишними и высланы, другие найдены полезными и вселены. В двадцать втором высылали дворян, подозреваемых в заговорах, в двадцать пятом — дворян, пытавшихся скрыть, что они дворяне, а в двадцать восьмом — просто дворян, и всякий раз как-то так выходило, что чем лояльней ты был, тем сильней доставалось. Сначала стали истреблять тех, кто остался из любви к Родине, потом — тех, кто пытался на нее работать, потому что, значит, примазывался; и в результате лучше всех было тем, кто с самого начала сказал — тьфу на вас. Их высылают раньше, когда все еще мягче. Вообще тут не любят примирившихся — любят явных врагов, но это вещь отдельная, до Кугельского не относящаяся. А Кугельского вселили на место Белашевых, отправленных в Среднюю Азию.</p><p class="p1">Белашевы жили на Васильевском, в Третьей линии, в квартире, от которой им оставили комнатку. В прочие комнаты вселились слесарь Хватов, пропагандист Тишкин, оперуполномоченный Власов с женой и непрерывно дерущимися близнецами, а в бывшую комнату уплотненных владельцев попал по чрезвычайному рвению Кугельский, умница. Вумный как вутка, поддразнивал его криминальный репортер хохол Сулема. Кугельский давно привлек внимание Еремеева — плотного, красного, одышливого, каков и должен быть редактор «Красной газеты» в реконструктивный период. Особенно хорошо писал он о бывших — тут все его кавычки были на месте. Собственно, писать о бывших хотели все. Тема была — не бей лежачего, или именно бей, но ведь тут не годится пролетарская грубость. Тут нужно показать, что и мы не лыком шиты. Нужна несколько витиеватая ирония, презрительная, почти добрая насмешка победителя: довольно топтать, пора пинать! И Кугельскому это удавалось — шла ли речь об опере, о хищениях или простоях: он хамил неуверенно, без замаху, что могло выглядеть снисходительностью победителя, хоть и было на деле древним, не побежденным покамест инстинктом раба. Он хорошо понимал про себя, кто они такие и где место ему самому, а потому бил покамест исподтишка.</p><p class="p1">Были заслуги, были — репортажи из суда над Макаровым, рецензии на «Садко» в оперном, на «Заговор императрицы», за которую Толстой обещал оборвать ему уши, и он три дня ходил озираясь; был фельетон об учителе Лукишине, пытавшемся протаскивать идеализм, и о шумном деле подпольной акушерки Табачниковой, все оказалось враньем, но не опровергать же! По совести, он достоин был и большего, чем комнатенка на Васильевском. Но радовался и тому, как первому этапу: три всего года в городе — и уже не чужой!</p><p class="p1">Полноценный ленинградец Кугельский начал с того, что повесил над столом портрет Еремеева и рядом Перуца. Перуц ему нравился, потому что умел закрутить и подать, — если бы Кугельский умел так закрутить, он бы уже продал свой «Остров» трем кинофирмам. Еремеев ему не нравился, но если позвать кого-нибудь из «Красной» на новоселье, те передадут, и случится заслуженный скачок в росте. В том, как висели рядом двое очкастых, толстый и тонкий, оба неприветливые, брезгливые — один от тонкости, другой от толщины, — была своя логика: Еремеев тоже все больше писал об ужасном, о кровавых врагах, в кольце которых мы… Кугельский думал также повесить Пруста. Он не читал, конечно, Пруста, но слышал от Барцева и других неприятных насмешников, что Пруст — новый столп, а Кугельский привык уважать начальство. В Барцеве, как ни странно, тоже было что-то начальственное — вероятно, потому, что он был сам себе начальник. Кугельский побаивался даже его дружков, позволявших себе ходить в коротких штанах и длинных гольфах: он никогда бы не осмелился выйти так на улицу, но им было можно. К тому же, по рассказам Барцева, Пруст всю жизнь писал о себе одном, и Кугельский тоже так хотел, вполне этого заслуживал — какая была жизнь, сколько передумано! Один день Кугельского, с точными, неизменно изящными мыслями о каждом пассажире трамвая, с убийственными наблюдениями над коллегами, с великими прозрениями о собственном назначении, — непременно перевесил бы тома Пруста о никому не нужной жизни больного француза; и если б не подлая потребность в заработке, о, какой кровью и желчью он уже написал бы всю правду, все недра своей души, от которых содрогнулись бы Нью-Йорк и Нью-Фаундленд, и почему-то Амстердам — так это ему представлялось. Но хорошо Прусту — он был смертельно болен, пиши не хочу. А тут пропадай живой и здоровый, в полуголоде и полупризнании. Не повесил.</p><p class="p1">Дальше Кугельский навел уюту. Он приобрел аристократическую кисочку, которую установил на столе, — умильно умывалась лапочкой, намывая гостей, напоминая дом. Поставил на стол фото вырезанной из «Огонька» страдающей американской безработной: не очень-то она страдала, по лицу судя. На вопросы, кто такая, можно будет загадочно вздергивать почти безволосые бровки. По дешевке — тогда многое бралось по дешевке, ссыльные распродавали имущество, — взял письменный прибор в виде озера с птичками. Повесил на стену коврик из входящей в моду, просвещаемой и орошаемой Средней Азии, должно быть, туркестанский, на него кинжал с намеком, чтобы спрашивали. Вообще на спрос было рассчитано многое. Висел же у Барцева над столом плакат с изображением кепки и подписью: «Эта кепка имеет особый сверхлогический смысл». Кугельский тоже так хотел, но не решался.</p><p class="p1">Он позвал Нонну, с которой познакомился на катке. Она все очень хохотала. Встречались только, когда хотела она: он не мог ей даже протелефонить. Какое-то общежитие, где-то ткачиха — не выдавала даже, где работает. Попытки близости, то есть тискать, кончались ничем, то есть в одиночестве, под одеялом, воображая ее полные бедра, широкий зад (возбуждал почему-то зад). Красилась грубо, почти клоун. Когда смеялась, бывала неприятна, запах изо рта луковый. В последний раз звонила неделю назад. Он спросил, когда свободна. Она сказала — а вот, в будущую пятницу. И он решился: приходите ко мне, я переехал. Она: я с подругой буду. Он, раздухарившись: хоть с двумя. Может, подруга посговорчивей. «Мадеры купите». Отчего у них вкус такой к мадере? Ведь невкусно, жжено. Он лучше купил бы водки, в крайнем случае можно разводить компотом.</p><p class="p1">Еще позвал он Мелентьева, Плахова, оба из газеты, бегуны-репортеры, на него глядели пренебрежительно, но ему казалось — завистливо. Да все завидовали, даже Пруст завидовал. Позвал Барцева — эдак небрежно: захотите — заходите. Барцев с преувеличенной учтивостью отказался, сумев и этот отказ превратить в комедию унижений. Трижды потом подходил при всех и говорил: знаете, Кугельский, мне очень хочется к вам прийти… Очень! Но я тут подумал… все-таки я никак не могу. Никак. Все-таки, как назло, именно в этот день в капелле Бах. Ладно, дружелюбно махал рукой Кугельский (погубит, погубит меня эта доброта ко всем!), ладно, не можете — в другой раз. Да, в другой раз, говорил Барцев решительно. В другой… или, может быть, никогда! Прощайте! И отбежал.</p><p class="p1">Потом прибегал снова, уже в столовке, в соседнем здании (столовались они при Ленстройтресте, невкусно, но дешево). Кугельский как раз сидел за столом с Плаховым и Рубакиным, молодежью, обучал их, как следует обрабатывать письма, чтобы слышалась живая речь пролетариата, и они от души смеялись, так убедительно, весело он говорил, — подбежал Барцев и при них стал со страшной энергией кричать: мне так, так хотелось к вам пойти, Кугельский! Но я не могу! Да, спокойно сказал Кугельский, я помню, ведь у вас Бах. Какой Бах, к черту Баха! — заорал Барцев так, что обернулась вся столовая. — Я ради вас послал бы и Баха, и Голлербаха, и святого духа. Но именины у дядюшки — этого я никак не могу, Кугельский! Вы дороги, дороги мне как брат, которого у меня нет, но дядюшка! Это поразительный оригинал, красавец, пускает шептуна так, что заслушаешься. И потому я не могу, нет. Я не приду к вам, Кугельский! Простите меня, простите, умоляю, бегу. И отпрыгнул, под хохот этих двоих. Кугельский резиновыми губами улыбнулся, ничего не понимая, но продолжать объяснение уже не мог, доел костистую рыбу с рыжей капустой и поплелся в редакцию.</p><p class="p1">В редакции случилось вовсе уже непристойное. Собирались на обычное четверговое обсуждение номера. Заместитель главного — собственно, все и решавший, правая рука в вопросах международной политики, вышедших в нынешнем году на первое место, — изучал план полосы о культурных развлечениях, подготовленной к выходным; Кугельский дал туда матерьял о театрах, сплошь ставящих заграничное, чуждое, тогда как есть свое, вон у него уж и пьеса закончена о любви американки к русскому рабочему, называется «Миллионерша», на излюбленный сюжет! — про это, конечно, не было ни слова, но в подтексте читалось, что автору есть кой-чего предложить. И в этот момент, когда Кугельский, затаив дух, ожидал благожелательной оценки, — ворвался Барцев, рыжий, растрепанный, никакого почтения, ни минимального даже приличия, и закричал с порога:</p><p class="p1">— Я не пойду к вам, Кугельский! Я не пойду!</p><p class="p1">Политический заместитель вытаращил глаза.</p><p class="p1">— Да, я помню, — ледяным тоном промолвил Кугельский, сохранявший абсолютное присутствие духа. — Я помню, у вас именины красивого дяди.</p><p class="p1">— Черта ли мне старик с его шептунами! — заорал Барцев, не стесняясь ничьим присутствием. — Но завтра пятница, Кугельский! Слышите ли вы, пятница! В любой другой день недели я пошел бы к вам — но не в эту чертову пятницу, потому что по пятницам, когда западный ветер, я категорически не могу выходить из дома! Еще в гимназические годы положил себе это идиотское правило — и вот, представьте себе, теперь не могу. Так что я не пойду к вам, сами кушайте вашего кролика! Кролик — хорошо, вы еще лучше, но честь дороже. Слышите ли, Кугельский, и вы, Макагонов, слышите? Честь!</p><p class="p1">И торжествуя убежал, сумасшедший, хам, тварь, ненавижу. Никогда больше не дам ему в долг, не говоря приглашать, и не стану давать советы, пусть гонят к чертовой матери, если не умеет ценить человеческого отношения.</p><p class="p1">Еще позвал Татьяну, пришедшую как-то в газету требовать сатисфакции — написали, что она покончила с собой, а покончила с собой другая. Татьяну больше всего огорчало, что она повесилась. «Я никогда бы не повесилась! Это так… некрасиво». Тщетно уверяли ее, что та, другая, — могла повеситься, не обязана же она была считаться с пристрастиями этой Татьяны, фамилию он которой сразу запомнил: Муравлева. Фамилия редкая, и вдобавок тезка, хоть и тремя годами старше! Той было двадцать четыре. А что бы вы сделали? — спросил Кугельский. Я выпила бы яду, гордо сказала живая Муравлева. Он как-то к ней потянулся, быстро повел в столовую Ленстройтреста, не заметил особого отталкивания, на которое обычно натыкался (разучились угадывать величие, навык утрачен, смотрят на одну только надежность и социальное происхождение — так убеждал себя он сам, глядя в зеркало на идеально круглую физиономию, круглые очечки, мелкие глазки с выражением неизъяснимой гнусности, робкой и оттого еще более гнусной). Муравлевой вообще, казалось, было не до него. Она беседовала по большей части сама с собой. Она была существо мистическое. Ее волновали совпадения — вот и это, про напечатанную в газете гибель. Неужели она обречена?! Цыганка в детстве ей нагадала, что она будет жить очень долго, если только не умрет в молодости. Муравлева не знала, кончилась ли уже молодость. Когда Кугельский порывался ее целовать (возвышалась над ним целою головою), не отстранялась, но как бы слегка отмахивалась, словно от досадной помехи. Может быть, когда опять будет в трансе, удастся и все остальное, напоим и посмотрим.</p><p class="p1">И еще кого-то позвал, всех, кого мог, в сущности, и даже пропагандиста Тишкина, но чего-то не хватало, чего-то другого, для создания объема. Чего-то, чье присутствие льстило бы. И тут встретился Галицкий, какая удача. Галицкому можно было покровительствовать, он был несчастней Кугельского, и вместе с тем явно принадлежал к лучшему миру, куда Кугельского в прежнее время не пустили бы нос просунуть. А теперь покровительствовать, пожалте. Даня был очень, очень кстати. Вечер должен был пройти на ура. У слесаря попросил гитару — репортер Плахов на ней играл с большим искусством. В кооперативе купил конфект, любил говорить «конфекты» и всех поправлял, когда говорили не так. Взял также сыру, взял ветчины — все появилось, что жалуемся, непонятно. Взял также водки.</p><p class="p1">И как всегда, в последний момент совершил ошибку, почти непоправимую. Неся домой водку, встретил Сюйкина, пролетария. У Сюйкина на «Красном треугольнике» был график через сутки, штамповщик, вредное производство, и вот он шел за ужасающим ликером шартрез, которого пил, эстет, немерено. Сюйкин был пролетарий непростой, с запросами, и Кугельского презирал. Кугельский чувствовал это презрение со страшной остротой и утешаться мог только тем, что заодно Сюйкин презирал женщин, цветы, деревья, город Ленинград, а уважал только Отто Вейнингера за книгу «Пол и характер» и Дугласа Фербенкса за кинематографическую картину «Знак Зорро». Сюйкин был демонический пролетарий. Кугельский завидовал даже ему, потому что Сюйкин умел презирать все, а Кугельский к этому только стремился. Возможен демонический пролетарий, но не может быть демонического лавочника. Взгляд Сюйкина был сонный и хищный, презрительный взгляд хищника, перед которым не мясо. Кугельский был никак не мясо. Он не умел выдержать этот взгляд, хотя уже неделю тренировался. Сюйкин был основным неудобством нового жилья: жил этажом ниже и всем видом напоминал, что Кугельский так не может, не умеет, что ему очень еще далеко до. У Сюйкина были вечно полуприкрытые глаза, сломанный в отрочестве нос, резкие скулы, бесцветные вихры из-под промасленной кепчонки. Женщины сходили от него с ума. Он был тип горьковского босяка, но чувствовал себя злодеем экрана. На босяка обиделся бы, вообще был обидчив. Демонический пролетарий Сюйкин много читал иностранной литературы, путешествий в ярких зифовских обложках, и к Кугельскому пришел знакомиться, прознав, что тот — журналист.</p><p class="p1">— Вы журналист, — сказал он презрительно, — так я хотел бы взять у вас журналы.</p><p class="p1">Не попросить, а именно взять. Привыкли уже, сволочи, что все можно.</p><p class="p1">— Я из газеты, товарищ, — искательно сказал Кугельский. Маленький, круглый, он чувствовал себя карликом перед этим костистым и жилистым. — У нас не журнал. Мы печатаем, конечно, статьи и всякое, но не журнал, нет. У меня нет журналов.</p><p class="p1">— А из жизни кинобогемы вы печатаете? — в нос протянул Сюйкин.</p><p class="p1">— Мы иногда печатаем, — невесть почему оправдываясь, признался Кугельский, — рецензии, товарищ, и афишу к выходным…</p><p class="p1">— Я буду у вас брать, — снисходительно пообещал Сюйкин с сифилитическим прононсом.</p><p class="p1">— Хорошо, спасибо, пожалуйста, — залепетал Кугельский, разодолженный этим обещанием. Теперь он шел навстречу демоническому пролетарию Сюйкину, уставясь прямо на него, стараясь не отвести глаз, так что когда поравнялись, уже неловко было не заговорить.</p><p class="p1">— Я вас пригласить ко мне милости прошу сегодня вечером, — несвязно, пересохшим языком выговорил Кугельский. — Новоселье, будет, так сказать, интересно…</p><p class="p1">— Если время найду, — бросил занятой, демонический пролетарий Сюйкин. — Поросятина будет?</p><p class="p1">Поросятиной называл он женский пол. «Я люблю поросятину, только не в смысле разговоров», — говорил он в кругу друзей, когда они собирались в арке и страшно стояли там с пивными бутылками, одних пропуская, а к другим задираясь. Кугельский пока пользовался его покровительством, потому что мог дать газеты, а надолго ли это расположение — Бог весть.</p><p class="p1">— Девушки будут, — торопливо сказал Кугельский. — Но вы тоже, конечно, приводите, веселее же…</p><p class="p1">— Приведу, — сказал Сюйкин и сплюнул. — Если приду.</p><p class="p1">Господи, хоть бы у него нашлось дело, взмолился Кугельский, хоть отлично знал, что никакого дела у Сюйкина не найдется, у демонов не бывает дел, дела бывают у смертных. И поспешил к себе, маленький, бедный. Бедный, круглый. Маленький, круглый, бедный гадкий.</p><p class="subtitle">3</p><p class="p1">Напились очень быстро, как в любой компании, где друг друга не знают и не о чем говорить. Дальше начинаются драки либо поцелуи и соответственно общие темы. В первые минуты стеснялись все, кроме демонического пролетария Сюйкина. Он явился не с одной, а сразу с двумя дамами. Одну он желал просто, вторую желал мучить.</p><p class="p1">— Ну фигура, — шепнула Варга. Сюйкин — как все малоразвитые люди, был интуит, — окинул ее презрительным взором, понял, что эта не по нему, и еще более задрал сломанный нос.</p><p class="p1">— Пфе, — громко сказал он. Даня покраснел от негодования и полез бы выяснять, что за пфе, но Варга дернула его за руку.</p><p class="p1">— Оставь, после, — шепнула она, и Даня — признаться, не без облегчения, — отвернулся.</p><p class="p1">Одна девица пролетария Сюйкина была бледная дегенеративная брюнетка, другая пышная, розовая, с заплаканными глазами блондинка. Были, кроме того, истеричка, назвавшаяся Татьяной, и явная профура, назвавшаяся Нонной. С Нонной были Лара и Рига, с удареньем на первом слоге. «Риголетта», пояснила она и недоуменно вылупилась, когда Даня не сумел спрятать усмешку.</p><p class="p1">— Вас прямо вот с детства так назвали? — спросил он. — С рождения то есть?</p><p class="p1">— Я сама так записалась, — сказала она с вызовом. — Вы оперы не знаете.</p><p class="p1">Даня хотел сказать, что как раз знает, и что опера про горбуна, — но, не желая умничать, смолчал.</p><p class="p1">Были два репортера, один с девушкой, и только в ней Дане померещилось нечто человеческое, заваленное, впрочем, таким количеством шлака, что она и сама себя не понимала. Это рождало в ней непроходящее смутное беспокойство. Ей постоянно хотелось что-нибудь сделать, но все выходило к худшему. Звали ее Варя.</p><p class="p1">За корреспондентами увязался и Двигуб — он всегда увязывался, никогда не ходил сам по себе, и даже в сортир, казалось, выдвигался не по зову природы, а потому, что кто-то авторитетный только что туда сходил. Однажды Мелентьев видел, как Двигуб шел по набережной в редакцию, просто шел ясным утром, пока другие приятственно жмурились от солнышка, — но на его печеном личике застыло озабоченное, нагоняющее выражение, словно он двигался за кем-то, кого ни в коем случае нельзя было упустить из виду — иначе можно Бог знает куда забрести! Глазками, носиком, всем телом ловил он в воздухе знаки. Двигуб в нынешнем мире составлял большинство. Результат долгого вырождения, жалкий остаток нации, заморенной войнами, голодом и русским способом управления, он не содержал в себе ничего человеческого — ни правил, ни личной воли; можно было, пожалуй, даже ему сострадать, узрев в нем Башмачкина, кабы этот Башмачкин не присоединялся тут же к толпе любых гонителей, как только в окрестностях отыскивалась шинель грязней его собственной. Немудрено, что Двигуб сделался в редакции комсоргом. Там хватало боевых ребят — взять хоть Рубина, в прошлом красного кавалериста, а ныне мастера уголовной хроники, со связями во всех милицейских отделах, или того же Плахова, душу любого общества, — но ясно же, что на комсорга нужен был не боевой, а исполнительный. Социальное его происхождение было безупречно, сын пекаря, а чего еще? Он и в газету попал по случаю, увязавшись за дружком, но дружок, полгода проработав, сбежал в кооператив, благо НЭП позволял обогащаться, а Двигуб остался, втянулся, ему тут хорошо было, инициатива не требовалась. Служил верстальщиком, должность техническая и ума не требующая, а чертить Двигуб умел, находил в аккуратном черчении то же наслаждение, что и Акакий в чистописании. Удавалась ему вообще всякая мелкая моторика — летом он, бывало, лепил из глины различных птиц, думал, не попробовать ли вязать: дело хоть и женское, а для нервов хорошо.</p><p class="p1">Двигуб не мучил комсомольцев общественной работой, быстро сворачивал собрания, аккуратно отчитывался обо всем в районном комитете, куда вызывался для указаний раз в месяц, и осуществлял тематическую пропаганду. Если надо было собраться и принять резолюцию против болгарского самодержца Бориса III или британскую гадину Чемберлена, он укладывался в пять минут: собрались, осудили — и на Невский, по пиву. Был у Двигуба подспудный страх, что он недостаточно горячо пропагандирует, — чего-чего, а этих талантов Бог не дал, — и потому он вечно цеплялся к любой компании, до поры молчал, а после второй кружки вдруг говорил:</p><p class="p1">— Все-таки, ребята… Очень это неправильно, что в Болгарии повесили товарищей. Правда же?</p><p class="p1">Никто не знал, как на это реагировать. Безвестных болгарских товарищей было жалко, послать Двигуба с несвоевременной пропагандой — боязно, а принимать его всерьез никак невозможно.</p><p class="p1">— Ты пей, пей, — говорили ему. — Не убивайся.</p><p class="p1">— А все-таки, ребята, — говорил он заплетающимся языком после пятой, — очень нам англичанка гадит… а?</p><p class="p1">— Англичанка да… — туманно отвечали столь же туманные товарищи. После пятой споры прекращались, каждый уходил в личную мечтательность.</p><p class="p1">Никто даже не знал, как его зовут, — Двигуб и Двигуб. Он и теперь прицепился к Мелентьеву с Плаховым — «Вы в гости? Ну, я с вами», и собирался вписать это в отчет перед Октябрьским райкомом как культурно-политическое мероприятие. По дороге он все больше молчал, иногда только вставляя:</p><p class="p1">— Ребята! А пить… много-то не будем, а? Ведь упадничество…</p><p class="p1">— Не будем, — успокаивал Плахов, — мы за здоровый быт.</p></span></span>
