<p class="p">Глава двенадцатая</p>
</div><p class="subtitle">1</p><p class="p1">Первая рукопись, которую Дане надлежало проштудировать за неделю, оказалась засаленным трактатом без названия и начала. Сквозь бухгалтерский почерк копииста проступала старинная, изящная и сильная рука. Дане было даже жаль, что все, о чем говорилось в трактате, он умел с рождения.</p><p class="p1">Трактат посвящался поискам хороших мест, ибо все места, по мнению автора (им, судя по слогу, был кто-то из вельможных масонов конца екатерининского века), разделялись от природы на хорошие и дурные. Почему-то Дане хотелось, чтобы автором был Бутурлин. Он понятия не имел, отчего в памяти выплыла вдруг именно эта фамилия. Может быть, читал в одном из отцовских журналов о таком масоне, а может, смутно помнил портрет; в русских лицах галантного века была радость добровольного соблюдения приятных условностей, начало вкуса. Слог был неровный, почти державинский, с неизбежными «экзерцициями» и «рефутациями», но и с уколами внезапной точности вроде: «того не может отъять никакая злоба, что чувствует субъект духовный, взирая на зеленый лист в свете фонаря».</p><p class="p1">Пожалуйста, пусть это будет Бутурлин: таким догадкам Даня привык верить с первых лет и положил себе провести разыскание в Публичке, а может, расспросить и Остромова, если наберется духу. Что до хороших мест — он чувствовал их, сколько себя помнил: Судак был край исключительной благодатности, хотя не без пятен. Дом был выстроен на пятачке, окруженном тремя такими болотинами сразу — разумеется, границы никак не обозначались, но Даня чувствовал их, словно наступал в тень. В одной такой болотине его, трехлетнего, укусила оса: защитная сила дома тут странным образом ослабевала. Можно было изучить свойства этих темных полян, и в детстве он предпринимал опасные экспедиции в их глубину, но не выдерживал дольше нескольких секунд. Первым чувством, посещавшим отважного исследователя или случайного путника, ступившего в темное пятно, была неясная тревога, подозрение о неправильном устройстве мира. В дурном месте прежде всего слегка меняются краски, словно их клали на холст в состоянии болезненном или раздраженном. Даня готов был поклясться, что песок у забора желтел ярче, словно предупреждая об опасности, как яркое ядовитое насекомое предупреждает птицу. Вслед за тревогой наступало легкое физическое недомогание, лихорадка, как бы в начале простуды, — состояние это было слишком знакомо ему, проболевшему все детство. Лихорадка, которую он научился распознавать мгновенно, была не так неприятна сама по себе, но автоматически предполагала две недели без моря, жар, мучительную боль при любом глотке, и хотя болезнь в детстве имеет свои преимущества — общее внимание, безделье, не меньше трех сказок матери, — озноб бывает ужасен, и неприятна слабость, когда выходишь после десяти дней почти непрерывного лежания, а двор за это время неуловимо изменился, не говоря уж о море, все что-то успели, а ты прозевал. Так вот, значит, лихорадка, словно дуновение болезни со всеми ее пакостями, но ужасней всего обозначавшееся вдруг соседство другого вещества и, может быть, даже мира, в который ты можешь втянуться хотя бы через дыру в заборе. В заборе, как мы знаем, три дыры. Вылезая через две, ты оказываешься всего лишь на даче Хитровых или Громеко, но через ту, где желтый песок, можешь попасть в другую вселенную, может быть, на другую планету, от которой до Судака более миллиона верст. А может ничего не произойти, но тебя пронзят таинственные лучи вроде тех, что открыл ужасный бородатый Рентген из «Современного мира», и все о тебе узнают, а может быть, снимут копию, и за миллион верст от Судака окажется твой несчастный двойник, тщетно зовущий маму. Наконец, помимо контакта с ужасным, в дурных местах чувствовалось грозное, неудержимое раздражение, словно пообещали хорошее и не сделали, надсмеявшись вдобавок. После некоторых размышлений Даня установил, что строитель дома, дед с отцовской стороны, поступил мудро: дом именно и следует ставить в окружении трех, а лучше четырех темных полей, чтобы грабитель или недобрый вестник, подходя, испугался и повернул вспять. Правда, тогда и самим обитателям будет всякий раз несладко покидать родное жилище, но, во-первых, притяжение моря так сильно, что легкий трепет испуга им побеждается, а во-вторых, это же наши поля, и мы-то уж как-нибудь.</p><p class="p1">Хорошие места наполняли прежде всего покоем, чувством достижения: вот, я пришел сюда, и мне не хочется уходить. Даня знал, что на повороте дороги из Судака в Коктебель есть именно такая лощина, зеленая складка, трава там мягче даже на вид, в нее тянуло лечь, тень дикой груши прятала лощину от жары, груша была высока и раскидиста; всякий раз, как они проезжали этот поворот, Дане хотелось остановиться. Однажды, в пятнадцать лет совершая первое паломничество к Кара-Дагу, он проверил впечатление и убедился в его верности: на него напал даже сон, не тяжелый морок, а легкая благодетельная усталость. Десять минут пролежав с закрытыми глазами, в пестрой полудреме, он встал свежим и сильным, словно проспал пять часов. Множество хороших мест было и в Ленинграде, он чувствовал их остро и благодарно, но насладиться ими мешало то, что кто-то уже обязательно наслаждался, и публика была, прямо сказать, гнусная.</p><p class="p1">Даня особенно любил сквер на Большом проспекте — всегда прохладный, разбитый на месте снесенного дома, где тоже, верно, хорошо было жить. Там соорудили для детей качели и деревянную горку с лесенкой, там сидели с собаками и книгами добродушные старухи, чувствовавшие здесь ту блаженную защищенность, какая всегда посещает в светлых полях, — но стоило скверу появиться, а детям — полюбить качели, как скамейки были сначала облюбованы, а потом изуродованы злобной гопотой, обладавшей массой свободного времени. Этого неработающего пролетариата в самом деле развелось немерено: непонятно было даже, на что он жил. Видимо, гопники кратковременно устраивались на то или другое производство, работали месяц, вылетали за пьянство или уходили сами, пропивали первую зарплату, а пропив — шли на новый завод, в порт или в сторожа. При трудоустройстве у них были все преимущества — с пролетарским происхождением брали куда угодно, принимали бы и в академики, кабы не смешные формальности вроде грамотности. Их «продергивали», конечно, они попадали в газеты, их ласково обзывали летунами — самое слово было легким, почти шутливым, не то что ужасный «аллилуйщик»; но все это не мешало им выбирать лучшие места и загаживать их, так что в данином сознании установилась связь между сквером и осквернением. Старухи немедленно покинули убежище, дети разбежались, качели были сломаны, а в песочнице круглый день пьянствовало, развалясь, наглое быдло, которому тут было очень хорошо. Что б им было собраться через улицу, напротив трамвайного депо, в точно таком же парке? — но он отчего-то и в жару казался мрачным и сырым, на лавках в нем хорошо было обговаривать преступления, дети интуитивно обходили его, а пьяницы подавно. Если Даня и другие кроткие остатки былого населения выбирали хорошие места для восстановления сил и получения новых доказательств хоть какой-то осмысленности бытия — гопники отыскивали светлые поля только для того, чтобы их заблевать; и хотя хорошее место оставалось хорошим — людям, которые действительно в нем нуждались, было к нему уже не подойти.</p><p class="p1">Этих людей Даня тоже распознавал сразу. Может, когда-то, в силе и славе, они были далеко не так хороши и даже опасны — но старость сделала их кроткими, уязвимыми, готовыми ретироваться при первом намеке. В их глазах была не то что затравленность, но робкая надежда: быть может, вы позволите мне здесь постоять? Я кое-что умею, я могу быть полезен… Если кому и защищать светлые поля, то не им.</p><p class="p1">Защита же эта — точней, маскировка от злого глаза, — осуществлялась, если верить трактату, очень легко. В особой главе рассматривались случаи демонических посягательств на хорошие места и предлагался действенный, но очень уж гадкий способ их очищения. «Не может быть без того яишница, чтобы не разбить яйца, и для того не надо опасаться дел ночных, порою и нечистых. Всякий каменщик знает, что при возведении здания руки в чистоте держать не всегда возможно». Короче, в лучшей точке лучшего места надлежало зарыть мертвую птицу, дабы силы зла убедились, что здесь не очень хорошо, и оставили посягательства.</p><p class="p1">В понедельник Даня над этим посмеивался, во вторник колебался, а в среду решился. Людям галантного века было проще — поехал на охоту да убил глухаря; где в Ленинграде взять мертвую птицу, Даня не знал, а сворачивать голову сизарю не стал бы и ради спасения сквера. Но как раз в среду — не иначе его испытывал кто-то! — он увидел мертвого воробья неподалеку от крыльца, брезгливо взял его газетой, завернул и припрятал в прихожей. Ночью, ругая себя последними словами, он спустился в сквер, недавно покинутый гопниками, вырыл посреди клумбы ямку и вытряхнул воробья из газеты, после чего птичку прикопал, а газету сжег.</p><p class="p1">Два дня ничего не менялось. На третий он заметил, что поющих пьяниц в сквере все меньше. На пятый их не стало вовсе. Неприятный сюрприз, однако, состоял в том, что дети и старухи не вернулись в оскверненное место. Не то чтобы оно утратило прелесть — Дане, например, тут по-прежнему нравилось. Но то ли воробей имел над старухами тайную власть, то ли в один сквер нельзя войти дважды. И он стоял пустой — Даня думал даже вырыть воробья, но это было вовсе уж ни на что не похоже.</p><p class="p1">Странная вещь. Бутурлин об этом не предупреждал. Правда, не об этом ли говорил он в другом месте, в странном, темном абзаце, который Даня готов был счесть ошибкой переписчика:</p><p class="p1">«Всякая вещь три жизни живет, и в первой жизни она хороша, добра, любезна всем и до других охотна. Во второй жизни зла и злом одержима, и зло в ней живет вольно; но и тогда хороша бывает, и господствует в ней еще стихия огненная. В третьей жизни зло изгнано, мертво, и самая вещь мертва. Так учит нас умудренный Британец Салисбюри, открыватель способа медь заквашивать без каления. Спросим себя: отчего третье лучше второго? Оттого, говорит Британец, что плохое живое лучше мертвого, ибо есть для него возможность перемены. Узрев злодея, рассудим, что он во второй жизни; но страшнее нам узреть того, кто уже не холоден и не горяч. Возможно такое не только с людьми, но с целыми Царствами, однако сия мысль далеко от предмета нас завести может».</p><p class="p1">Даня не понял тогда, как это было связано с царством, но со сквером, кажется, было.</p><p class="subtitle">2</p><p class="p1">Следующим был трактат о левитации, приобретенный Остромовым по случаю две недели назад. Остромов бегло просмотрел его — законченный бред, то, что нужно. Галицкому он выдал его всего на два дня, чтобы подчеркнуть важность и редкость.</p><p class="p1">Среди остромовских рукописей Дане еще не попадалось ничего подобного. Почти все они были писаны тяжелым слогом человека, старающегося не прояснить, а затемнить понятия, дабы тайное не досталось недостойным, как учил Трисмегист. Авторы предупреждали, что суть скрывается под словами, как тело под одеждой, и высшая трудность в том, чтобы смотреть сквозь слова, — но как ни напрягался Даниил, иногда до буквальной боли в глазах пытаясь рассмотреть засловное, перед ним громоздились все те же слоистые, мертвые глыбы, от которых еще в древности отлетел смысл: «Таким образом, верховный принцип разума есть начало самоутверждения духа как первообраза, а приоткрывши завесу, скажу, что и вся жизнь во всем ее целом, как процесс самоутверждения духа, лежит цыликом в гранях разума, представляющегося по отношению к ней конечным абсолютным Началом» — ах, лучше б он не приоткрывал завесу! Всякий раз торжественно суля провещать истину, автор, будь он Гермес, Плотин или загадочный Пифагор Микенский, немедленно срывался либо в похвалу ищущему разуму, либо в сетования, что относительное не в силах постичь абсолютного. Особенно же изумляли в трудах посвященных, кому были открыты все семь небес и сколько их есть элементов, бесчисленные грамматические ошибки — их можно было, конечно, свалить на переписчиков, но ведь и переписывать не доверят абы кому! Учитель дважды повторил, что ранее третьей степени посвящения нельзя и прикасаться к этим тетрадям — они попросту убьют неосторожного; но писать на третьей степени «цыликом», вдобавок путая — <em>тся</em> и — <em>ться</em>, означало в самом деле слишком пренебрегать условностями. Переписчику явно была непонятна большая часть терминов. Поначалу Даня присматривался именно к ошибкам, размышляя о метафизических преимуществах цылого перед целым, но учитель категорически присоветовал не брать в расчет случайные черты. «Вы подобны зрителю в музее, вперившемуся в трещины рамы», — сказал он с укоризной, и новая криптография осталась без развития.</p><p class="p1">Трактат о левитации отличался ясным и обиходным языком: сочинитель не только не пытался скрыть священную истину, но разъяснял ее доброжелательно, чуть не услужливо. Казалось, он искренне сожалел, что не может открыть читателю все и сразу, поскольку главное усилие полагалось сделать самому, притом бессознательно; однако в остальном готов был развесить указатели на всех опасных поворотах. Больше всего тетрадь походила на деликатное руководство по изготовлению тончайших блюд из плодов, которые предстояло еще вырастить и собрать в иссушенной пустыне, — или на путеводитель по граду Божьему.</p><p class="p1">«Все, кто начал практиковать левитацию, — предупреждал автор, — прежде всего изумляются, отчего не каждый занят столь легким и приятным делом, и почему сам счастливец так долго страдал от безуспешности попыток. К сожалению, не в моей власти подтолкнуть к первому шагу, но я сделаю все, дабы облегчить последующие.</p><p class="p1">Важно помнить, — заботливо предупреждал автор, — что всякому взлету предшествуют обычно два события, которые назовем здесь ступенями. Направлены они противоположно, и верней всего было бы сравнить их с качанием в разные стороны, посредством которого опытный хирург извлекает страдающий зуб. Ухватив его и резко качнув сперва влево, а потом вправо, он извлекает его почти вовсе без усилия. Так и перед левитацией сила высвобождения извлекает нас из обыденности посредством двух противунаправленных толчков, и по ним вы можете судить о том, что готовы. Они не замедлят явиться: первый вознесет вас, второй унизит, и так прервутся две главные связи, препятствующие взлету: страх и гордыня; или, верней, обе они перейдут в тот фазис, когда из удерживающих сил превратятся в выталкивающие. Которая из них ударит первой — в каждом случае решается особо; но не пройдет и недели после второго толчка, как левитация станет возможна и, более того, неизбежна.</p><p class="p1">Прежде всего укажем на часто встречавшуюся ошибку: после взлета, дойдя до первой развилки, многие неофиты поворачивают направо. Это кажется совершенно неважным, однако примите на веру, что в левитическом состоянии ничего неважного нет, а при первом взлете особенно. При повороте направо многое будет не только затруднено при возвращении, но первый взлет может оказаться единственным, с полным даже исчезновением главной способности в скором времени. Второй вопрос, возникающий не реже первого, касается утреннего меню перед взлетом. Для первого взлета вопрос этот представляется несущественным, ибо, как вам предстоит убедиться, утром первого левитического дня вы никогда не знаете, что взлетите. Что касается последующих состояний, я осмелюсь рекомендовать легкое, но сытное меню. Весьма наивно было бы думать, что левитации способствует малое количество пищи, чувство легкого голода и некоторый дурман во всем теле. Пишущему эти строки случалось знать весьма умных людей, изнурявших себя мучительными диэтами и даже полным голодом на протяжении месяцев, что не только не приводило к успеху, но отдаляло его, поскольку даже опытный левитатор нуждается в начальном запасе энергии, а это находится в прямой связи с потребляемой пищей. Напротив того, при левитации второго типа, отличие которой от главного способа состоит лишь в предпосылках к старту, — случались левитации после сытного обеда, превышавшего по своей обильности все требования к необходимому минимуму энергии. При этом особенно важно, чтобы было вкусно.</p><p class="p1">Для последующих взлетов я советую составлять завтрак из скромного яичного коктейля с небольшим количеством сахара, а именно из растертых с сахаром двух желтков на один стакан теплого молока, с прибавлением сверху двух белков, взбитых с двумя ложками мелкой сахарной пудры и покрывающих молоко как бы шапкой. Этот коктейль с полным правом можно назвать напитком левитаторов, ибо утренней его порции совершенно достаточно для глубокого взлета. Я не посоветую добавлять к молоку порцию коньяку, как делается иными любителями, поскольку алкоголь, сам по себе не препятствуя левитации, затрудняет ясное сознание в процессе возвращения, когда особенно важно твердо сознавать свое тело. К тому же ощущения, испытанные при первых секундах удачного опыта, значительно превосходят действие алкоголя и легко вытесняют его, оставляя лишь тяжесть в голове.</p><p class="p1">Немаловажен также вопрос о том, доступен ли левитатору, вполне овладевшему первым способом, так называемый второй тип, вызываемый подготовкой совсем иного порядка. Нет сомнений, что великие мастера прошлого в совершенстве владели обоими методами, но это возможно лишь на высочайших ступенях духовного опыта, о которых современный экспериментатор может лишь благоговейно мечтать. Во всяком случае из моих личных опытов ясно только, что при всех неизбежных начальных различиях — как то: недостача всего вплоть до полного отсутствия в первом случае и очевидный избыток во втором, — следует, что предварительное состояние в обоих случаях весьма сходно; поясню это сравнением. Влюбленный, спешащий на свидание, и охотник, преследуемый волком, бегут одинаково быстро; или, чтобы выразиться еще нагляднее, шар, брошенный вверх, и такой же шар, брошенный вниз, оба находятся в воздухе, хотя и в различном расположении духа».</p><p class="p1">Автор предупреждал, что первые левитации происходят в виде элеваций, то есть кратковременных подъемов или успешных зависаний в состоянии прыжка, но разница между элевацией и левитацией такая же, как между детской поллюцией и полноценным зачатием. «Сравнение наше неверно в том, — замечал автор с улыбкой смущения, — что поллюция чаще всего непроизвольна, зачатие же требует сознательной воли; между тем первые элевации производятся чаще всего сознательно и даже старательно, а первый взлет почти всегда непроизволен и случается не тогда, когда мы его ждем. Знаменитый левитатор Вильям Патней впервые стартовал во время публичной лекции; известный живописец Чивальди, прозванный „воздушным маляром“ за искусство росписи стен в родной Генуе, впервые полетел, заметив в своей фреске (написанной еще при помощи лесов) ошибку, которую тут же и поправил. Испанец Араваль взлетел, когда донья Эмилья Райя отказала ему от дома, и многие ожидали взлета от его удачливого соперника, Бернардо Венидаса, которому донья Эмилия отдала сердце; однако дон Бернардо лишь заколол в честь этого события трех коров, и донья Эмилия, рассказывает Хуан Мануэль, пожалела о своем выборе».</p><p class="p1">Трактат был бы совсем ясен и дружелюбен, если бы не одна страница ближе к концу, в которой нельзя было понять совсем ничего, — но именно поэтому Даня запомнил ее почти дословно.</p><p class="p1">«Теперь мы почитаем долгом предупредить читателя о немаловажном. Тот, кто овладел левитацией и регулярно практикует взлеты — вначале непроизвольно, а затем и волевыми усилиями, — вступил в стадию имаго, то есть находится на пороге окончательного перехода. Окончательный переход в совершенство, о котором нам достоверно ничего не известно, а гадание было бы оскорбительно, — происходит не сам собою, а лишь ценою диссоциации противника, что есть дело трудное и не приносящее никакого удовольствия. После диссоциации у имаго нет другого пути, кроме как выйти через порог и не вернуться уже никогда. Возвращение в обычную природу хоть и возможно, но сопряжено с такой душевной и физической тяжестью, что лучше не думать об этом постыдном выборе».</p><p class="p1">Хорошо, сказал Даня, не будем думать. Тем более, что и думать нам пока не о чем. Он закрыл глаза и снова, в сотый раз, попытался установить под черепом воображаемый двигатель, поднимающий его все выше, выше, заставляющий вскочить со стула, встать на цыпочки, приподняться хоть на полсантиметра… нет. Так и стоял на цыпочках, как дурак, улыбаясь самому себе, светлому воскресному дню, визгу детей во дворе.</p><p class="subtitle">3</p><p class="p1">Поленов понял теперь все. Он совсем окончательно все теперь понял.</p><p class="p1">Разумеется, у Остромова и Морбуса было меж собой договорено. Два сапога пара. Потому Остромов и не делал ничего, и не посылал обещанный групповой луч, и не вступал в астральные битвы. Один раз он, правда, вступил, пригласил Поленова, остальных не звал, устроил сеанс духовной борьбы с Морбусом, катался по полу и выгибался. Выгибаться каждый может. Потребовал триста рублей. На следующий день привел какого-то врача, уверявшего, что он пользует Морбуса и что Морбус плох. А Поленов позвонил, услышал голос и повесил трубку: голос был старый, но здоровый. Разумеется, все ложь. Морбус обхватил, опутал Поленова, прислал масона, с виду врага, а на деле главного морбусова защитника. У них все было обстряпано, у мерзавцев. Поленов решил уйти. И не просто уйти, — это было бы так себе, — он решил написать куда следует.</p><p class="p1">Он вслух, конечно, не сказал ничего. Только позволил себе несколько обидеться, когда Остромов его несколько обидел. Начался август, похолодало, настроение было никуда. Расходились после очередного бессмысленного сеанса. Ведь Поленов сам приводил людей, устроил все, и тут такая неблагодарность. Остромов выговорил ему при всех, как мальчишке. Интересы личной мести, Константин Исаевич, сказал он нагло, закрыли для вас все. Мститель должен быть чист, а вы духовно затмились. Вам следует серьезно заняться собой и тогда уж осуществлять, а пока вы должны удвоить утренние процедуры, я это вам говорю в последний раз.</p><p class="p1">— А я, может быть, и пришел в последний раз, — сказал тогда Поленов, тоже нагло, — и если хотите знать, я не намерен так оставлять. Вы у меня деньги брали, а воз, так-скэть, и ныне. Вы знаете, о чем я говорю, или же нет?</p><p class="p1">Этого говорить не надо было, но он сказал. Впрочем, Остромов давно понял, что несчастный сумасшедший ни на одной версии не может остановиться надолго: всякий новый встречный будет ему казаться избавителем, а потом тоже попадет в виновники лидочкиного утопления, или растворения, кому как угодно, и цепочке не будет конца. Тут как по заказу подвернулся один превосходный человек из прошлого, и Остромов имел разговор.</p><p class="p1">Человек этот был из тех, кого Остромов уважал. Дураки его боялись, но Остромов был не дурак. Человек был с чудачествами, конечно. Кажется, он всерьез верил тому, чему учил, а это последнее дело. Учащий должен быть холоден, как рыба в воде. Но для выполнения разовых поручений он годился, вообще приятно было посмотреть, как неподготовленные юноши и демонические девы в обморок валились от его шуточек. Теперь был преждевременный старик и урод, но такой урод, что виден был прошлый красавец. В чем было его преимущество, так это в способности опережать. Другие опускались, а этот падал. Другие отбивались, а этот нападал. Конечно, он блюл границу и никогда не падал ниже опасной черты: теперь он нищенствовал, но нищенствовал сытно.</p><p class="p1">В общем, Остромов с ним поговорил. Они встречались у разных общих приятелей в тринадцатом, в шестнадцатом — тогда много стало людей, годных для дела, и много удобных клиентов, чтоб обработать. Все теряли голову и кидались в гибель, и трезвому человеку хорошо было ловить рыбу. Тогда были в Петрограде недурные места — на Кронверкском, на Сенной, на Михайловской. Были планы, ходы на самый верх. К сожалению, все пошло несколько иначе. Но впечатления остались, и связи тогдашние были прочны. На филистера вроде Поленова внезапно объявившийся остромовский приятель мог подействовать сильно. Он даже на Остромова подействовал бы, но тот его знал.</p><p class="p1">— Вы прифрантились, Остромов, — сказал он нагло, словно имел право осуждать. — На вас лоск появился, скоро зажиреете.</p><p class="p1">— Да и вы приоделись, я гляжу, — сказал Остромов. Это был укол тонкий. Когда-то его нынешний собеседник слыл законодателем мод. В некотором смысле он им и оставался. Нынешнее бесформенное черное пальто, особенно в августе, было для наступившего времени таким же знаком, как для пятнадцатого года френч, в который он, помнится, переоделся сразу же из лоскутного футуристического пиджака. До того еще была крылатка, хламида. Остромов, напротив, всегда одевался как джентльмен, ибо знающий вечное не зависит от временного.</p><p class="p1">— Цена, думаю, сходная, — осторожно сказал Остромов.</p><p class="p1">— Нищий всякому даянию рад, — равнодушно ответил приятель, принимая червонцы. — Здоровьичка, прекрасный барин.</p><p class="p1">Умел сказать так, чтобы все ощутили себя мразями, — но на Остромова не действовало: он и не такое умел. Двум умельцам приятно было общество друг друга.</p><p class="p1">— Среда, — сказал Остромов. — Он из Резинотреста пойдет, Инженерный переулок.</p><p class="p1">И среда была еще как раз такой день, что впору удавиться: бывает в Ленинграде, когда среди теплого и спелого августа, уже казавшегося вечным, заморосит на неделю мелкий, растворенный в воздухе дождь, и станет ясно, что осень будет, да еще и какая. А потом зима, тоже из мерзейших. А потом умрешь, и окажется, что все вот это и было жизнью. Именно на такие мысли наводит дождливая ленинградская неделя в середине августа, а бывает такое, что словно небо открывается, и высовывается оттуда не ангел, но кукиш.</p><p class="p1">В такой-то день Поленов шел из своего Резинотреста, не замечая, что за ним в почтительном отдалении следует низкорослый растрепанный старик в черном пальто, лепится вдоль стен, словно загримировавшийся толстый мальчик сам с собою играет в сыщика. Поленов шел по лужам, злой и уставший. Грела его только мысль, что, вернувшись домой, он начерно изложит все, что знает об Остромове, а потом будет долго сладострастно перебелять. Этой работы могло хватить дней на пять, пять пустых одиноких дней, которые найдется чем наполнить, особенно ценно, что в выходные. Выходных Поленов не выносил. Он, правда, не решил еще окончательно, отказаться ли от упражнений. Все-таки они заполняли утро, и лучше было приплясывать, чем лежать. И бодрило, это верно.</p><p class="p1">Он зашел, как часто делал по четвергам, в чайную на Рыбацкой. Чайная была открыта, но электричество не горело.</p><p class="p1">— Авария, — кратко пояснил рыхлый Егор за стойкой. — Как всегда?</p><p class="p1">Поленову нравилось, что хоть где-то ему говорили «как всегда». Дома не было, по сути, так хоть где-то интересовались его вкусами. Хотел гнездо, внуков, а теперь на старости лет только и был ему рад рыхлый Егор.</p><p class="p1">«Как всегда» значило пирожок с луком и яйцом, горячего чаю стакан и немного водки. Иногда, если душа просила, то рыба жареная лещ и еще немного водки. Егор поставил перед Поленовым стопку, толстую белую ленпитовскую тарелку с пирожком (полустершийся узор на тарелке был — черные люди, красные флаги) и стакан чаю в подстаканнике. На подстаканнике было тиснение в честь первомая, успокаивающее, как всякая человеческая глупость среди нечеловеческих обстоятельств. Был сумрак и дождь, время, когда люди и обстоятельства кажутся не теми.</p><p class="p1">Поленов был один в чайной, прочие сидели по домам в такое время. Вдруг открылась дверь, и ввалился низкорослый, бородатый. Поленов только успел выпить рюмку и закусить слабую водку пирожком.</p><p class="p1">— Не возражаете? — спросил мокрый посетитель, усаживаясь напротив, хотя свободных столов было в чайной еще шесть штук, все плохо оструганные.</p><p class="p1">— Пожалуйста, — сказал Поленов, которому было не по себе, и он радовался живой душе.</p><p class="p1">— Погода превосходная, — сказал бородач. — Любезный! Водочки, селедочки, картошечки.</p><p class="p1">Егор вяло зашевелился за стойкой.</p><p class="p1">— Превосходная? — переспросил Поленов, дивясь такому вкусу.</p><p class="p1">— Для иного дела превосходная, — кивнул старик. Он явно был старик, но бодрый, моложавый. — Есть дела, которые в такую пору только и обделывать. А, товарисч?</p><p class="p1">— Не знаю, о чем вы, — сухо сказал Поленов. Все это переставало нравиться ему.</p><p class="p1">— А я вот вам расскажу, о чем я, — с готовностью ответил старик. — Например, давеча было на Выборгской стороне. Идет мужчина, впереди женщина. Даже девушка. Погода совершенно вот такая. Он видит ее только со спины. Но ему становится интересно, что делает девушка под дождем. И может быть, он одинокий, вроде вас. Естественным порядком он ее нагоняет. Заглядывает в лицо. И что же он там видит, по-вашему?</p><p class="p1">— Н-не знаю, — сухим языком пролепетал Поленов, желая исчезнуть.</p><p class="p1">— Очень напрасно не знаете, спасибо, милейший, — старик кивнул Егору и с наслаждением высосал водку из граненого стаканчика. — Теперь будете знать. Он заглядывает и что же видит? Лица нет. Лицо совершенно все, вот так, затянуто бычьим пузырем, сплошная — надутая — белая — маска, — раздельно выговорил он. — Но явственно видно, что она тем не менее на него смотрит, и что эта самая пустота сейчас его втянет. Он не помнил уж, как убежал. Сейчас многие так ходят, с пузырями, и со временем будет все больше.</p><p class="p1">Егор принес керосиновую лампу и поставил на стол. При лампе старик сделался еще ужаснее. Лицо у него было гладкое, белое, как тот бычий пузырь, и пахло от старика сырым мясом. Непонятно было, исходит этот запах изо рта или от всей его фигуры.</p><p class="p1">— А тоже еще было, — продолжал он невозмутимо. — Идут два мальчика, гуляют, допустим, около Крюкова канала. Тем более, что там они и гуляли. И вдруг один изменяется в лице и говорит: подожди меня у этого парадного, мне нужно. Что же, нужно так нужно, бывают нужды. Он ждет. Ждет пять минут, десять, полчаса. Уже это ни на что не похоже. Он заходит в это парадное, а там на лестнице, на подоконнике между первым и вторым этажом, сидит как раз этот второй мальчик, но как сидит? Он уже мертв, конечно. (Почему «конечно», успел подумать Поленов, «конечно»-то почему?). И мертв так, что совершенно непонятно, как это с ним сделали. Половина костей переломана, как будто падал с большой высоты, печени нет — вообще нет печени, — и на лице изображается такая неприятная усмешка, какая и у взрослого не всегда бывает, только у самого неприятного. Примерно вот такая, — и старик усмехнулся так, что у Поленова упало сердце. В иное время, молодой, здоровый, полный сил, он только посмеялся бы над этой гримасой, но сейчас он был уязвлен, навеки надломлен судьбой Лидочки, угнетен погодой, и никаких сил противиться ломящемуся в мир аду у него не было. Ад сидел напротив и рассказывал свои чудеса.</p><p class="p1">— Еще бывает, — невозмутимо продолжал отвратительный сосед.</p><p class="p1">— Почему, почему! — закричал Поленов. — Почему вы мне рассказываете все это!</p><p class="p1">— А чтобы вы, товарисч Поленов, знали, как бывает. Видите, товарисч Поленов, нам все известно. Вы еще только хотите нам написать, а мы уже знаем, знаем все. Вот тоже сидит один товарисч вроде вас, у него тяжело болен брат. Не знаю там, чем, мне нету дела до чужих братьев. По мне, всех братьев собрать бы да в печь, и рано или поздно они все там окажутся, а вы будете угли подгребать. Я коснусь впоследствии, почему. Вот, значит, он сидит. Это дело происходит на пятом этаже. Неважно тоже, но на всякий случай. Вдруг в дверь стучат очень громко. Он подходит, открывает. Стоит бледный изможденный человек, видимо, больной. Ты слышишь меня, сволочь?! Сюда смотри!</p><p class="p1">— По какому праву… — прошептал Поленов.</p><p class="p1">— По врожденному, — буркнул старик. — Еще чего удумал тут. Твои права все кончились. Кто меня встретил, у того теперь одно право — делай, чего я говорю. Стоит больной человек, шатаясь. Смотрит на него и говорит: прости, но твой брат умрет. Умрет твой брат, и ничего ты не сделаешь. И побежал вниз. Тот выглянул из окна — а этот молодой человек уходит, как пьяный, и ноги у него заплетаются. Идет вот так, — старик прочертил зигзаг по столу. — Надо ли говорить, что брат умер? Очень скоро? Почти в тот же день? Теперь спросим себя: что это было?</p><p class="p1">— Что? — повторил Поленов, как под гипнозом.</p><p class="p1">— Я же тебя спрашиваю, — невозмутимо сказал старик, пожирая селедку.</p><p class="p1">— Я не знаю, — прошептал Поленов.</p><p class="p1">— А я знаю, — с торжеством проговорил старик. — Я все знаю. И кому надо, все знают. Есть, например, такие некоторые отцы, которые сожительствуют со своими дочерьми.</p><p class="p1">Поленов вскочил и рухнул обратно на табуретку.</p><p class="p1">— Вы не смеете, — сказал он, задыхаясь. — Вы не имеете.</p><p class="p1">— А что такого, очень обычно, — невозмутимо говорил ужасный, все более ужасный. И ужасно темно было уже снаружи. — Сожительствуют с дочерьми, растлевают в детстве. Потом, когда дочери с другими, то, конечно, очень огорчаются. Ничего, между прочим, ужасного, считалось нормой у арабов. Но только не надо потом другим голову морочить. Сам растлил, сам сожительствовал, сам потом притопил из ревности или еще как-нибудь убил, а потом ходит людям голову морочит. Тебе спасибо надо сказать, что с тобой люди занимаются. А ты им гадишь, это как называется?</p><p class="p1">— Егор! — слабо вскрикнул Поленов. — Егор, уберите это… этого…</p><p class="p1">— А что такого?! — закричал старец, и сырым мясом запахло оглушительно. — Ты купил это, что ли, место? Ты права не имеешь! Егор, скажи, он имеет право?</p><p class="p1">Егор вяло пробурчал что-то и не пошевелился.</p><p class="p1">— Ты с дочерью жил! — крикнул старик. — Кому надо, все про тебя знают. Ты в ножки должен кланяться, что нашелся человек с тобой возиться, а ты тварь неблагодарная и дочери растлитель. Ты девочек любишь, по дворам отлавливаешь и любишь… Держите его все, он ловит девочек по дворам!</p><p class="p1">Поленов вскочил и, подхватив автоматически портфель, стремительно побежал наружу, в дождь.</p><p class="p1">— Он дочь изнасиловал, — доверительно сказал старик Егору. — Ты слыхал?</p><p class="p1">— А мне чего, — сказал Егор, — дочь не моя.</p><p class="p1">— И то правда, совершенная правда, какой ты человек разумный, — кивнул старик. — Настоящая гадина, говядина. У тебя перед носом будут резать человека — ты не чухнешься. Налей мне теперь еще стакан и дай чаю, мне все нравится.</p><p class="p1">Одинокий любил такую погоду и обстановку.</p><p class="p1">— А чего ж, — сказал Егор.</p><p class="p1">— Вот-вот. Он там сейчас побегает, а около дома ему Блументаль еще добавит. Я ему сказал в подворотне стоять, он ему предложит к девочке пройти к мертвой. Хорошо придумал, да?</p><p class="p1">Егор в знак одобрения шмыгнул носом.</p><p class="p1">— Животное ты, и все люди такие, — одобрительно сказал Одинокий. Одинокий был утешен, ему Остромов дал пятьдесят рублей. Когда-нибудь сделаем гадость и Остромову, гадине. Дал пятьдесят рублей старому приятелю, поэту, которому недостоин копчик целовать. Но сейчас и пятьдесят рублей было хорошо. Остромов оделся отлично, стал вальяжен. Теперь Одинокий кое-что про него знал, все в копилку, и это утешало его вдвойне.</p><p class="p1">— А что ж, — сказал Егор. — И то верно.</p><p class="p1">— Мертвая девочка, — сказал Одинокий мечтательно. — Хорошо, да? Сам придумал. С девочкой было, с мертвой не было. А остальное очень просто ведь делается: перескажешь человеку пару историй из того, про что в очередях говорят, — и действует! Видел, как действует? Теперь в очередях рассказывают такое, что раньше бы никакой Гофман не выдумал. — Одинокий был настроен поговорить, как всегда при удаче. — Удивительно стало много всяких этих историй, какими можно человека в правильный момент сломать пополам… А чего еще делать с человеком, правильно я говорю?</p><p class="p1">— И то, — сказал Егор.</p><p class="p1">— Гадина, гнида, и все животные, и никого больше, — сказал Одинокий. — Ломать и топтать, всех в дробилку. И ноги вытереть.</p><p class="p1">Пока он все это говорил, Поленов бежал по страшным улицам под страшным небом. Оно впереди сходилось треугольником и падало на землю, как нож гильотины. Что-то ломалось, переламывалось, что-то, после чего все пойдет вниз. Поленов никогда не растлевал дочь, вообще никогда никого, но теперь уже не был в этом уверен. Пришел знающий о нем худшее. Встреча со знающим худшее всегда невыносима. Он придет, и мы сделаем все, что он скажет. Мы никогда не поверим знающему лучшее, но всегда согласимся со знающим худшее, потому что втайне догадываемся о том же. Мы животные, нам нет прощения. И когда наихудшее животное скажет нам наихудшие слова, мы поверим ему.</p><p class="p1">А в подворотне напротив дома ждал его Блументаль. Одинокий знал, что первый удар надламывает, а второй добивает. Он не зря взял свои пятьдесят рублей и не просто так теперь утешался.</p><p class="p1">— Поленов! — мрачно сказал трясущемуся Константину Исаковичу утонченный бородатый юноша, выходя из подворотни. Он был бледен капустной бледностью кокаиниста. — Не хотите мертвую девочку? У меня есть. Будет вам как дочь.</p><p class="subtitle">4</p><p class="p1">Оставалась одна проблема, и не проблема даже, а так. У Клингенмайера томились реликвии, а также кое-какие записи, возобновить сведения было негде, запас идей у Остромова иссякал. Можно было, разумеется, и дальше врать про эоны. Но по-морбусовски не выдумаешь, а в сундуке лежали записи, которых хватило бы морочить публику еще на полгода, кабы не больше. Самому идти не хотелось. Надо было послать человека — и такого, который убедит.</p><p class="p1">Первая его мысль была: Мартынов. От этого прямо-таки волнами наплывала уверенность. Но Мартынову пришлось бы все объяснять, он был из тех, кто не принимает на веру. Иному скажешь — «Мне должны», «Мне нужно», — и он пошел. Дробинин? Зачитает стихами, замучает, озлобит Клингенмайера пуще прежнего. Наконец он решился: Галицкий. Хоть шерсти клок.</p><p class="p1">Галицкий был удивительно бездарен во всем, что касалось жизни с людьми: не умел, не понимал — что кому говорить, а что не надо. Остромов ведь не просто брал с них деньги. Он кое-чему учил, и это, может, было поважней всякой алхимии. Это была алхимия духа в высшем смысле, та, которую он все собирался записать. И кто умел бы ее воспринять, отбросив маскарад с заклинаниями и стражами порога, тот многому мог научиться — как говорить, выглядеть, располагать к себе; от Остромова многое можно было воспринять, если хотеть. Но Галицкий ничего воспринять не мог. Такие воспринимают, только если их долго бить по голове, и то еще иногда считают это за рыцарское посвящение. Главное же, что и грабить такого человека не доставляло никакого удовольствия, и за это Остромов не любил Галицкого особенно. Когда ты с женщиной, женщина должна либо стонать от наслаждения, либо плакать от стыда, либо хоть царапаться, но как-нибудь шевелиться. А когда она только смотрит влюбленными глазами, на третьей минуте становится скучно и можно даже расхотеть, приходится уже кого-нибудь вспоминать.</p><p class="p1">— Вы достигли столь значительных успехов, пророк Даниил, — сказал Остромов, — что я поручаю вам действительно серьезную вещь.</p><p class="p1">Даня радостно заулыбался.</p><p class="p1">— Вам нужно будет забрать у Одного Человека, — Остромов выделил эти слова поднятием бровей, — вещи, принадлежащие мне. Сам я приходил к нему, мы повздорили, и он взял отсрочку на два месяца. Время подходит. Я к нему являться не хочу, ибо он оскорбил меня. Посылаю вас.</p><p class="p1">— Мне точно не даст, — сказал Даня, сразу погрустнев. — Я гожусь носить тяжести, Борис Васильевич, но добывать — увольте.</p><p class="p1">— Я сам знаю, когда и от чего вас уволить, — сказал Остромов, не приняв шутки. — Это ваше поручение, и вы с ним справитесь. Забирать ничего не нужно, я на извозчике привезу. Но спросить, как и что, я доверяю вам. Отправляйтесь завтра же.</p><p class="p1">И он написал своими длинными острыми буквами адрес лавки на углу Лахтинской и Большого.</p><p class="p1">Даня был готов увидеть злобного толстяка или, напротив, Кащея, чахнущего над златом, но Клингенмайер оказался похож на джинна из сказки про ученика. Даня не хотел бы стать врагом этого серьезного человека, а другом его стать не мог — зачем он такому?</p><p class="p1">— Я пришел от Бориса Васильевича Остромова, — сказал он, смущаясь. — Он просил узнать…</p><p class="p1">— Я сказал Борису Васильевичу, что дам ему знать, — недовольно произнес Клингенмайер. Он стоял среди своих полок и стеллажей в видимой части лавки, а за его спиной колебалась, словно от дыхания, темно-багровая занавесь, уводящая, должно быть, в еще более странный мир. — Почему он присылает третьих лиц? Вы ученик его?</p><p class="p1">Даня кивнул, полный решимости не дать учителя в обиду.</p><p class="p1">Клингенмайер помолчал, разглядывая его.</p><p class="p1">— И чем вы у него занимаетесь, если позволено спросить?</p><p class="p1">— Лично я? — переспросил Даня. Этим никто еще не интересовался. — Лично я — левитацией.</p><p class="p1">Клингенмайер хмыкнул.</p><p class="p1">— И какие делаете успехи?</p><p class="p1">— Никаких, — признался Даня, улыбаясь против воли. — Но это ведь и не бывает быстро.</p><p class="p1">— Очень странно, — заметил Клингенмайер, тоже слегка улыбаясь и тоже против желания. — Я, напротив, слышал, что это происходит мгновенно.</p><p class="p1">— Но готовиться надо очень долго.</p><p class="p1">— Готовиться совсем не надо, — пожал плечами антиквар. — Не могу понять, чему он вас там учит. Человек либо левитирует, либо нет. Это как способности к языкам.</p><p class="p1">— Видите ли, — сказал Даня, искренне пытаясь разобраться в собственных ощущениях. — Я чувствую, что рано или поздно это сделается. Не знаю, как. И чувствую, что сделается даже без этих упражнений… но они зачем-то нужны, пока не понимаю, зачем.</p><p class="p1">— Чтобы их бросить, — сказал Клингенмайер. — Когда человек бросает тяжелое, он поневоле становится легче и левитирует. Другого способа не изобретено.</p><p class="p1">— Может быть, и так, — согласился Даня. — Но тогда, согласитесь, надо с них начать…</p><p class="p1">— А так во всем, — небрежно сказал Клингенмайер. — У меня тут целый шкаф таких вещей, сброшенных для взлета. Не хотите посмотреть?</p><p class="p1">Даня и хотел, и боялся зайти за темно-красную занавеску. Но любопытство было сильней, и лавка древностей была прямо из сказки, да и в Ялте он больше всего любил антикварный магазин с генуэзскими монетами и лаковыми миниатюрами пушкинских времен.</p><p class="p1">Он ожидал увидеть чуть ли не набор гирь, но на полках шкафа, стоящего в темной глубине, были в основном удивительно легкие, почти невесомые предметы. Там были фарфоровый котенок, чрезвычайно безвкусный и оттого еще более несчастный; подушка-думка, старинная гимназическая тетрадь, флакон запаха (духи давно испарились), одинокий сапог, тонкое серебряное колечко, лорнет, вышитая салфетка, медальон с детским портретом и еще что-то, столь же эфемерное. Апофеозом легкости было гусиное перо со следами чернил — сувенир, каких множество продавалось в Гурзуфе напротив пушкинского кипариса; от пера, он знал, для писанья оставляли невзрачный черенок.</p><p class="p1">— Что, нравится? — спросил Клингенмайер с коллекционерской гордостью.</p><p class="p1">— Очень странно, — медленно проговорил Даня. — Я никогда не подумал бы, что… но ведь это же не буквально?</p><p class="p1">— Самым буквальным образом, — строго сказал Клингенмайер. — Имейте в виду, человек взлетает только тогда, когда сбросит балласт, превышающий его собственный вес. Это нетрудно. Трудно потом. Всякая вещь со своей историей, но рассказывать скучно.</p><p class="p1">— Как может быть скучно рассказывать истории? — искренне изумился Даня.</p><p class="p1">— Они все похожи, — объяснил антиквар. — Знаете, сколько раз у меня просили обратно вот это колечко? Шесть раз приходил человек, и шесть раз я ему говорил: возьмите. Но здесь ведь полуподвал. И он просто не мог войти.</p><p class="p1">Сказка, понял Даня. Опять сказка. Все только и делают, что рассказывают параболы, — один учитель может предложить что-то серьезное.</p><p class="p1">— Я никогда ничего не придумываю и не шучу, — строже прежнего сказал Клингенмайер. — Вы юноша наблюдательный. Вам стоило бы, мне кажется, сюда приходить просто так, вне зависимости от сундука.</p><p class="p1">— Я бы рад, — растерянно сказал Даня. — Но у вас ведь, кажется, исторический кружок…</p><p class="p1">— У меня м о й кружок. Кого позову, тот и придет. А вы, когда пару раз сходите, спросите себя, так ли уж вам надо учиться левитации именно у Бориса Васильевича.</p><p class="p1">— С Борисом Васильевичем, — сказал Даня с достоинством, — нас свели особые обстоятельства. Это не мой выбор.</p><p class="p1">— Ну, если обстоя-ательства, — насмешливо протянул Клингенмайер. — Я просто к тому, что путь к левитации через Бориса Васильевича — не самый короткий, и приземление бывает разное. Впрочем, все на ваше усмотрение. У меня собрание через две недели.</p><p class="p1">— Да! — вспомнил Даня. — Что мне передать?</p><p class="p1">— Вот тогда и посмотрим, — сказал Клингенмайер. — Надумаете что-нибудь оставить — заходите.</p><p class="subtitle">5</p><p class="p1">— Что же, — сказал Варченко, затягиваясь ароматным, — кажется, пора нам, двум магам, поговорить с глазу на глаз, дражайший Борис Васильевич.</p><p class="p1">В тоне его звучала уютность, почти интимность. Тени плясали.</p><p class="p1">— Да уж давно бы, кажется, время открыть карты, Александр Валерьевич, — сказал Остромов, располагаясь напротив и забрасывая ногу на ногу.</p><p class="p1">Он доверял Варченке не вполне: хорошо, хорошо, а быть худу. Что-то в нем было не так, в особенности эта скрытность. И потом, Остромов не очень понимал, кто за ним стоит. Если бы Огранов, так они давно бы поговорили.</p><p class="p1">— Посмотрел я ваш кружок — занятно. Людишки, конечно, швах.</p><p class="p1">Остромов поколебался, защищать ли людишек, но счел за лучшее солидно кивнуть.</p><p class="p1">— Ну-с, положим, фокусам вы их научите. Вот этаким, — сказал Варченко и пошевелил пальцами в пламени свечи.</p><p class="p1">— Или вот этаким, — сказал Остромов и показал исчезновение монеты.</p><p class="p1">— Или таким, — сказал Варченко и вытащил монету из остромовского уха.</p><p class="p1">Остромов подумал, как хорошо бы сейчас слегка приподняться над диваном, небрежно, заложа ногу на ногу, но ограничился демонической усмешкой.</p><p class="p1">— Все это мило, — повторил Варченко, — но не будем друг другу устраивать этих, знаете, реверансов, как Проспер Альпанус с госпожой Розабельверде.</p><p class="p1">— Вы имеете в виду, — быстро спросил Остромов, — Альпануса Гентского?</p><p class="p1">— Именно, — не моргнув глазом, но мысленно очень обрадовавшись, заметил Варченко. — Именно Гентского. Так позвольте вас спросить, господин Остромов, какие взгляды вы имеете на политическое устройство России?</p><p class="p1">— Масонство, как вы знаете, лояльно к любой власти, при которой работает, — без запинки отвечал Остромов, — а впрочем, я не понимаю, по какому праву…</p></span></span>
