<p class="p">Глава восьмая</p>
</div><p class="subtitle">1</p><p class="p1">Никогда, нигде во всю двадцатилетнюю жизнь не видал Даня такого количества удивительных людей на метр жилплощади, как в кружке Остромова, собиравшемся на Михайловской, ныне Лассаля, по вторникам и пятницам в восьмом часу вечера.</p><p class="p1">Всякому молодому человеку, в особенности между шестнадцатью и двадцатью двумя годами, непременно надо, чтобы ему было куда пойти между шестнадцатью и двадцатью двумя часами, и лучше всего дважды в неделю, чтобы не остыть, не заветриться и вместе с тем не переесть и не надоесть.</p><p class="p1">У Остромова собирались те, в чье существование Даня верил с самого начала, но никогда, даже у Валериана, не видел так близко. Да и можно ли было сравнить этих волшебных людей с посетителями Валерьянова дома? Валерьян был мил, но неисправимо болтлив; много знал, но знал, в конце концов, обычные вещи, вроде языков и цитат. В гостях у него бывали антропософы в хитонах, любители повальсировать в ритме земли, художники в блузах, писавшие все один и тот же вид из окна мастерской — этими видами плотно была завешана вся столовая, — поэты, никого и ничего не замечавшие, кроме себя, и даже в море видевшие фон для собственной истерики, и десяток тунеядцев, приезжавших полюбоваться на все это, но не умевших вовсе ничего. Именно их обилие портило Дане все впечатление, а Валерьян стремился покрасоваться именно перед ними, и с ним было толком не поговорить. Все его время делилось между писанием собственных пейзажей — одновременно по два-три, по личной методике, — и пусканием пыли в глаза неофитов. У Остромова все было иначе: у него собирались люди без всяких специальных дарований, превращающих человека — чего там, будем честны, — в эгоиста, терзающего ближних, причем никаким художественным результатом это не оправдывается. У остромовской публики был дар поценней: всем им некуда было деваться, и у каждого была роковая черта, приведшая их к такому положению в Ленинграде 1925 года.</p><p class="p1">Были тут вполне свои, кому бы прямая дорога в новую жизнь, но если старая была к их уродству еще терпима, новая уже каленым железом выжгла бы эту единственную драгоценную черту, а легализоваться такой ценой они были не готовы. Так горбун цепляется за горб, так монах в японской притче попросил у исцеливших его богов вернуть ему длинный нос — в носе-то и было все дело, в остальном он был монах совершенно непримечательный.</p><p class="p1">Их хотелось перечислять по-мельниковски — о сад, сад! Сад, в котором то и в котором се. О круг, круг! И особенно было похоже про погибающие прекрасные возможности; и еще — про клятву отстоять породу, но не русскую, узкую, а какую-то иную.</p><p class="p1">Тут была Пестерева — ослепительная старуха, которой Даня с первого дня готов был рассказать о себе все; Пестерева, учившаяся у Штайнера, бывавшая у Рюрига, говорившая со Шпенглером, которого Даня боготворил; курящая, величественная, толстая Пестерева в перстнях, уверявшая, что у человека три возраста — духовный, душевный и умственный, физического же нет вовсе, и все три у нее — двадцать четыре года, наилучший возраст, чему она знала двадцать четыре доказательства.</p><p class="p1">И Мартынов, Мартынов — ассиролог, любимый ученик самого Мигулева, который не был ничьим учеником — все о древних царствах узнал с нуля, потому что сам был оттуда; Мартынов, рослый, веселый, крепкий, был противоположностью ему, и все у него ладилось, и нельзя было не улыбаться, глядя на него; а знал он столько и рассказывал так, что сам учитель охотно прерывал занятие, чтобы выслушать его дополнения. Из остромовских лекций его больше всего интересовал курс проникновения в прежние воплощения, и кое-что Мартынову уже удавалось — он дошел в Вавилоне до Нижнего базара, что в пяти гарах от садов, но у него не было денег, и его прогнали. Он рассказывал об этом так, что иные верили, и только учитель любовно усмехался.</p><p class="p1">И счетовод Левыкин — вернейший ученик, все записывавший, занудный, как сорок тысяч счетоводов, но преданный без подхалимства; Левыкин, искавший истину у всех, от розенкрейцеров до суфиев, поклонявшийся Блаватской, читавший Калиостро, экспериментировавший с опием и эфиром, неделями питавшийся одним маковым семенем. Левыкин с равным энтузиазмом упражнялся во всем, но Остромов был первый, кто оценил его таланты и тем купил пожизненную преданность. Левыкин, как положено самому прилежному и бездарному ученику, был староста. Иногда Дане казалось, что Левыкин легко нашел бы себя в чем угодно, кроме мистики, — но его тянуло именно к ней, как влюбленный сходит с ума именно по той, от которой сроду ничего не добьется. Он думал взять усердием, но это была единственная область, где от усердия не было проку.</p><p class="p1">То ли дело Измайлов, моцартианский Измайлов, вылетавший из тела с той же легкостью, с какой гимназист вылетает из класса, когда его выставят наконец за неуместное хихиканье, притом на улице весна. Измайлов был музработник, несостоявшийся пианист, — в двадцать лет сломал палец, неудачно срослось, но не озлобился. Он играл тапером в кино, на музпросвете в школах, читал лекции в филармонии — сам по себе оккультизм был не нужен ему, ибо все нужное он черпал в музыке. Ему надо было только как-нибудь разобраться с собственным телом, так невовремя его предавшим, — и потому экстериоризация давалась ему легче, нежели прочим. Он надеялся, что и левитация пойдет так же просто, хотя Остромов уверял, что она доступна лишь одному из десяти магистров, а до магистерского состояния всем им еще ого-го.</p><p class="p1">И Мурзина, самолюбивая Мурзина, глубоко несчастное существо. Маленькая кривозубая женщина, каждый месяц заново уверявшая, что выходит замуж, и уже приглашавшая на свадьбу, — хотя невооруженным глазом было видно, насколько у нее никого. Можно было бы из милосердия сказать, что хороши у нее хоть глаза, — но глаза как раз были нехороши: лиловые, выпуклые, в красной сосудистой сетке, с выражением страстной тоски и тайной мстительности. Служила она в иностранной комиссии Смольного, была тесно связана с визами, выездами, и тем странней были ее оккультные интересы, — но неудачная личная жизнь сильней общественной, и она добросовестно упражнялась в починке кармы. Даня видел, что она была бы плохой женой — хищной, безжалостной; но ничего не поделаешь — ее было жаль.</p><p class="p1">Прекрасен был Коган, и его хотелось любить — может быть, именно потому, что он выглядел слишком безопасным, уязвленным, но Даня провидел за этой уязвленностью силу и потому робел, страшился оскорбить сочувствием. Коган был так слаб, так мал, так трогателен, соглашаться с ним было так соблазнительно, — ибо подвергать все сомнению есть самая привлекательная и с виду негрозная тактика! Даня, однако, смутно подозревал, — сам себя презирая за эти подозрения, потому что нельзя же обо всех думать дурно, особенно когда сам ты настолько сомнителен, — что именно эта слабость и есть тут единственная настоящая сила, ибо сомневался Коган в чужом, а свое прятал, да, может быть, и не сознавал. Но он бывал редко, на даниной памяти — раза два, не более. Он был врач лет сорока, по женской части. Сочинял стихи из чужих строк, однажды прочел Дане, немного его провожая: «В моей душе лежит сокровище, лежит и смотрит, как живая… Ты право, пьяное чудовище, красивая и молодая». Он и тут гнул и мял чужое, как хотел, своего же не имел, и оттого его было жаль немного, но Даня чувствовал, что жалеть не следует, что Коган и сам кого хошь пожалеет. Он не смог бы объяснить, откуда это чувство. Может быть, он ревновал учителя — у Когана были с ним общие знакомые.</p><p class="p1">— А вы не знали Остапа Ибрагимовича? — спросил Коган после первого заседания, на которое был приглашен.</p><p class="p1">— Я знал Остапа Ибрагимовича, — ответил Остромов высокомерно.</p><p class="p1">— Мне кажется, что он также причастен к масонству, — любопытно бы знать ваше мнение…</p><p class="p1">— Он сам вам говорил? — осведомился Остромов.</p><p class="p1">— В общем, делал намеки, — признался Коган.</p><p class="p1">— Этот человек может нравиться или не нравиться, — брезгливо сказал Остромов, — каждый зарабатывает на хлеб как умеет… Но к масонству он не относился никогда и никак, и мне даже странно слышать, что вы себе позволяете такие параллели.</p><p class="p1">— Но Майя Лазаревна утверждает, — заторопился Коган.</p><p class="p1">— Майя Лазаревна, как большинство иудеев, совершенно глуха к метафизике, — отрезал Остромов.</p><p class="p1">И Коган это проглотил, только стал, казалось, еще сутулее; и был соблазн его пожалеть, но Даня почему-то никак не мог посочувствовать ему, хоть и корил себя за это.</p><p class="p1">А вот кто был действительно несчастлив, так это Велембовский — рыцарь разогнанного ордена, которому приходилось теперь пробавляться членством в куда менее таинственном кружке. Такие люди, как Велембовский, не могли не состоять в орденах, страшно засекреченных, лучше всего боевых. Ему следовало спасать город от захватчиков, стоять на страже, первым заметить лазутчика, подать сигнал и погибнуть; ему написано было на роду под игом глухого запрета, во мраке средневековья перекликаться с другими, слабнущими, теряющими надежду; ему мир надо было спасать — вопреки воле этого мира, — а он преподавал в военной академии, и все, что досталось ему на долю, — сугубо штатский остромовский кружок. Впрочем, он время от времени намекал на что-то такое, но страшно боялся, был уже надломлен, что-то не то говорил в девятнадцатом году. С Даней он был откровенен, но, разумеется, не до конца — и тем жесточе корил себя потом даже за эти осторожные проговорки. А что сделать? Детей нет, жена удрала, говорить с кем-нибудь надо. Оккультных способностей он имел немного, иногда только уверял, что видит ясные картины из будущего, и в этих картинах почему-то везде ему мерещилась война. Он был из тех настоящих военных, которые любят это дело, не скучную и кровавую его прозу, а почти божественную суть. Будущая война в его изображении была библейская, с летающими танками, с газами, от которых не было защиты, с бомбой такой разрушительной силы, что она уже похожа на бич Божий, а бомбоубежище — на кощунство: от кого спасаетесь, черви?! У него выходило, что война эта была бы по заслугам — всем, всем. Он носил в себе надлом, тайный грех: на прямой вопрос Дани — как вышло, что его миновала гражданская? — ответил так же прямо: тиф упас. «Белое дело было мертвое, красное — сами понимаете. Провалялся месяц, отходил полгода. Да и возраст, знаете, — сорок пять. По любым меркам отставник». И то сказать — не было еще на свете войны, достойной Велембовского: ему надо было что-то другое, последняя битва, погибель вместе с миром; и ясно было, что это не минует его. Всех, может, и минует, а его нет.</p><p class="p1">Кто был Дане непонятен — так это антропософка Савельева, человек умный, неприятный, высокомерный и на многое способный. Ее было не вписать ни в какой ряд, она была без возраста; лицо скорее некрасивое, что называется, со следами страстей — с виду она была старше своих сорока. Никак нельзя было понять, где она, а где беспрерывно сменявшиеся, тщательно продуманные маски — Валериан, хорошо ее знавший в легендарные времена первого успеха, говорил о ней иронически или сочувственно, но без любви; что-то там было, вроде сообща нарушенного запрета, — заигрались все вместе в собственный вымысел, и сочиненная ими безумная морфинистка зажила собственной жизнью, ломая чужие. Есть люди, добавлял Валериан, которые ничего не могут в обычном своем образе, но творят чудеса в чужом, — и приводил полуприличный анекдот о Кине, безумно страстном в образе Ромео или Отелло, но бессильном, когда приходилось являться к любовнице под собственным именем. Так и Савельева, говорил он, — удивительный случай отсутствия личности: чтобы писать, ей надо придумать себя. Это было изящно, как все, что говорил Валериан, но немного по-детски, — Даня уже не мог отказаться от формул учителя: видимо, в жизни и характере самой Савельевой было что-то, не дававшее ей писать. От этого приходилось избавляться любой ценой, изобретая чужую жизнь: может быть, виной была ее хромота, может быть, несчастливый брак, распавшийся во время войны, — но и сначала, еще до всякого брака, она не могла сочинить ни строки о самой себе, Елизавете Савельевой, учительской дочери из Воронежа. Проще бы всего предположить, что выдумывание другой жизни началось во время болезни, когда она чуть не все детство пролежала неподвижно, — но если б дело ограничивалось одной жизнью, Даня еще мог бы в ней разобраться. Савельева менялась непрерывно, убегая от чего-то столь страшного, что никакому учителю, никакому Валериану нельзя было про это рассказать. Она и в антропософию пошла, как призналась однажды при всех, чтобы избыть черное прошлое своей души, — прошлое, которое помнила.</p><p class="p1">— Ну, положим, ничего столь черного, — сказал Остромов. — Будь вы существом низшего эона, вы не вошли бы сюда.</p><p class="p1">— Почему вы знаете? Лису не всякий китайский монах мог распознать, а они были люди не нам с вами чета, — ответила Савельева резко, оберегая исключительную порочность предыдущего воплощения.</p><p class="p1">Остромов снисходительно улыбнулся.</p><p class="p1">— Вы теперь в китайском периоде?</p><p class="p1">— Я в китайском периоде была еще до Рождества Христова.</p><p class="p1">— Я удивляюсь, — тихо проговорил Остромов, — я удивляюсь… Как все-таки въедается Елена Петровна… Неужели вы в самом деле думаете, что грехи предыдущих воплощений искупаются здесь?</p><p class="p1">— Разве нет? — снисходительно улыбаясь, спросила Савельева. Улыбка ее была неприятна, хороша она делалась только в минуты тихой задумчивости.</p><p class="p1">— Разумеется, нет! — воскликнул Остромов с горячностью естествоиспытателя, поставившего опыт на себе самом. — Прежние грехи нельзя искупить на земле, душа избавляется от них между перерождениями. Сюда вы приходите чистой, начиная с нуля, и либо повторяете судьбу, если забываете уроки, либо меняете, если принадлежите к высшим эонам. Но идея расплаты — даже для младенцев… увольте от этой мстительности. Слишком человеческое. Может быть, вам надо думать — для каких-то своих целей, — что вы в самом деле много нагрешили в Китае…</p><p class="p1">— Не в одном Китае, — гордо сказала Савельева.</p><p class="p1">— Ну, а мне позвольте думать, что никакого проклятия на вас нет и что нет ничего вредней, как принимать за память о карме свои детские галлюцинации. Елена Петровна — не худший ключ к знанию, причаститься можно из любого источника, хоть бы из лужи…</p><p class="p1">— Не говорите так! — вспыхнула Савельева.</p><p class="p1">— Виноват-с, я говорю не о ней, а о любом источнике, — осклабился Остромов, сама любезность. — Но поверьте мне, Елизавета Дмитриевна, что масонство с его практикой древней всякой антропософии. Посему мне видно многое из того, что для вас, милостивая государыня, скрыто.</p><p class="p1">Даня был и рад, и не рад, что Савельеву с ее демонизмом несколько окоротили. В первый же вечер она подошла к Дане и сказала:</p><p class="p1">— Я знала вашу матушку. Очень вы на нее похожи.</p><p class="p1">Даня хлопал глазами.</p><p class="p1">— Писала замечательно, — продолжала Савельева. — Мы все тут очень были огорчены, когда она из Петербурга уехала в Судак, и с кем — с адвокатом! Она ведь почти не печаталась потом?</p><p class="p1">— Она все время тратила на нас, — сказал Даня с вызовом. — Ей это творчество казалось выше литературы.</p><p class="p1">— Это я понимаю… Скажите, ее арестовывали там?</p><p class="p1">— Да, ненадолго, — ответил Даня неохотно.</p><p class="p1">— Это не праздное любопытство, — сказала Савельева. — Сейчас антропософов ссылают, потом, возможно, начнут подавлять суровее — мы и так им почему-то ненавистны больше всех мистиков, и это знак отличия для понимающего. Я должна знать, к чему готовиться, а что чаша эта не минет меня — тому полно свидетельств в моей прошлой жизни. Мне надо знать, бьют ли там и вообще… к чему готовиться.</p><p class="p1">Даня хотел было сказать ей, чтобы она не обольщалась, что никаких исключительных заслуг и провинностей для высылки не надо, что мать вообще не была ни в чем виновата, по крайней мере перед судакским пролетариатом, и что приготовиться ни к чему нельзя, — но она знала мать, дружила с ней в юности, хвалила ее книжку, и Даня не мог позволить себе резкостей. Да и что-то трогательное было в этом «хочу подготовиться».</p><p class="p1">— В Судаке не били, — сказал он. Но, помолчав, добавил: — Некоторых убили, это было. Признака, по которому отбирали, расстреливали, выпускали, я сформулировать не могу. Наверное, это каждый раз другое, — в каждой чрезвычайке свое. Просто мне кажется, что сильного всегда победит жестокий, но что делать потом — он не знает, так что это победа ненадолго и с большим последующим позором. Такое, по крайней мере, у мамы было от них впечатление.</p><p class="p1">Савельева кивнула с мягкой улыбкой. Собственных ее стихов Даня не знал, если не считать пары мистификаций — два стихотворения в образе той странной монашенки и одно от лица китаянки. В обоих что-то было, но Савельевой не было.</p><p class="p1">Совсем иное дело был Дробинин. О, Дробинин, Дробинин. Глядя на него, Даня понял, что Валериан еще не был истинным маньяком поэзии, он все-таки цитировал себя не двадцать четыре часа в сутки. Он мог говорить еще о чем-то, даже о хозяйстве, и занимался им — не одна же мать всех обеспечивала завтраком и бельем; рыл какой-то колодец, торговался с татарами… Дробинин не говорил ни о чем, кроме стихов, главным образом собственных. Его привел Альтергейм, на чьей сестре Дробинин был женат. Бедная сестра. Дробинин от нее зависел маниакально — в нем все было маниакально: вероятно, она была единственный читатель, и потому Дробинин без нее не мог. Спорил, кричал, звонил, извинялся. Сколько раз было — среди заседания срывался телефонить (Остромов после третьего раза пригрозил, что если он еще раз таким образом нарушит сосредоточенность коллективной медитации — пусть лучше пропустит; но почему-то не прогонял — вероятно, ценя одержимость). «Верочка! Верочка, прости меня, я не буду больше. Но все-таки пойми: я ведь открыл, в сущности, закон. Пойми: вот это у меня в „Майской оде“ начало —</p><div class="poem">
<div class="stanza">
<p class="v">Гуляли, жили-были,</p>
<p class="v">На праздник мед варили, —</p>
</div>
</div><p class="p1">и внезапный уход от детского трехстопника сразу в Александрию —</p><div class="poem">
<div class="stanza">
<p class="v">Тяжеловесныя балтийския весны, —</p>
</div>
</div><p class="p1">ведь это совершенно с натуры, и между тем сразу Державин! И скачущая легкость сменяется тяжелозвонкостью, и в этом весь Петербург, наша легкая жизнь и тяжкая смерть в нем! Это пляшущий огонь, как ты не слышишь! Этот ритмический перебой будут еще называть дробининским! Что?! Какое молоко?! Как ты можешь о молоке! — и, в уже немую трубку: — Тварь, дура! Ничтожество! Прости, Вера, прости. Но тварь, дура и ничтожество».</p><p class="p1">Даня относился к нему сложно. Он слегка презирал Дробинина, поскольку тот был болен еще тяжелей, чем Даня, и куда безнадежней, чем Вал, — хотя той же болезнью; а вместе с тем и любил его, ибо рядом с неизлечимым Дробининым он казался почти здоровым. Есть тонкое отношение предпоследнего к последнему: ты и посмеиваешься над ним вместе со всеми, поскольку если не будешь посмеиваться — можешь стать последним (эта ниша есть во всяком кружке, хотя бы и самом дружеском); но громко посмеиваться не позволяет такт, милосердие, тот страх перед собственной сутью и стыд за нее, который и не позволил тебе стать последним (ибо первому и последнему одинаково присуща крайняя выраженность всех черт, а ты никогда не разрешал себе этого). Но поверх этой сложной диалектики есть кроткая, стыдливая благодарность — за то, что он хуже тебя и не стыдится этого. Дробинин вообще не брал Даню в расчет — его богом был Альтергейм, Даня годился лишь для выслушивания импровизаций по дороге домой. Дробинин сочинял и тут же разбирал; вообще разбор собственных стихов, как посторонних, был его основным занятием. И потому поверх упомянутой стыдливой благодарности Даня все-таки — но это уж совсем трудно сформулировать… Скажем так: гений никогда не живет своей гениальностью, она естественна, — Моцарт не стал бы говорить только о музыке, и Пушкин не стал бы писать среди подлинной чумы. Есть мера, непременное качество гения. Гений понимает, что в иное время не до него, что иногда не надо сочинять, да ему просто и не сочиняется среди чумы — Дробинин же мог бы писать во всякое время, в соседстве чужой и собственной смерти; в этом было и благородство, и вызов, и мерзость. Дробинин без малейшего чувства неловкости зачитывал бы своими стихами и мучил разборами человека, только что приговоренного, — и единственным его оправданием было то, что и сам он в ночь перед казнью спорил бы с другими смертниками о цезуре. Вероятно, именно за это Остромов его и держал. Дробинин мечтал найти такое состояние, в котором наилучшие сочетания слов являлись бы сами собой; нечто вроде наркотического транса, но такого, чтобы не переставал работать ум. Он практиковал трансперсональное дыхание и выход в так называемый третий уровень идеосферы, где находились все рифмы, включая ассонансные. Он заваливал Остромова многостраничными отчетами о своих поисках — на больших желтых листах, гигантскими буквами. Он уже почти победил Бугаева, главного своего демона; у всякого безумца есть главный демон, а то и несколько, — у Поленова это был Морбус, у Дробинина Бугаев.</p><p class="p1">Кстати Поленов. Кого не было жаль — так это Поленова, чье страдание утомляло всех, как рыданье за стеной, но некому было сказать ему «хватит», ибо кто же на такое решится? Даня видеть его не мог. Поленов не преуспевал ни в чем — ни в диафрагмическом дыхании, ни в поиске спрятанных предметов (тут интуиция изменяла почти всем, но реже других Измайлову: он объяснял, что исполнение музыки сродни этому поиску — исполнитель обязан найти все, что спрятано автором, и вот, может быть, поэтому…). Но учитель его терпел — вероятно, потому, что брезгливая неприязнь к нему и неизбежная мука вины не пойми за что скрепляли их дополнительно.</p><p class="p1">Кто неожиданно начал делать успехи, так это Тамаркина. Дома ее боялась вся квартира, а Остромов с самого начала сделался с ней особенно любезен, внимательно выслушивал ее безграмотные, но удивительно точные догадки, отмечал у нее способность к трансперсональной связи и специально для этого выдуманной дуалистической эгрегации. Он сам не знал, что это такое, но все потрясенно кивнули. Этой дуалистической эгрегацией Тамаркина обладала в совершенстве. На практике это выражалось в том, что иногда на нее находила задумчивость: «Думаешь, думаешь и вдруг весь мир увидишь. Как-то скрозь все вдруг увидишь. И видишь тогда, что у каждого внутри два камушка. То один верх возьмет, то другой. Если до этих двух камушков добраться, то он и будет весь твой». На вопрос Альтергейма, в почках эти камни или в желчном пузыре, Тамаркина беззлобно ругалась: «Шабутной ты, шабутной. Умный, а дурной».</p><p class="p1">Поначалу Даня сильно опасался за Варгу. Он приготовился уже ревновать, но Варга могла влюбиться только в то, что понимала. Многие женщины, на беду свою, насмерть влюбляются в непонятное, но это не был случай Варги, счастливо умевшей любить только то, что может ей принадлежать. На идеальное она не замахивалась. Она часто пропускала занятия и, вопреки даниным ожиданиям, с особенной злостью обрушилась на школу движения: вся гимнастика Георгия Иваныча вызвала у нее особенную злобу.</p><p class="p1">— Мертвое дело, мертвое, — сказала она убежденно. — Кто так танцует? Медведь в цирке. У меня каждый раз заново, а этот — левой ногой три раза вбок, правой два раза вверх, еще руками куда-то… Кто не умеет, тому надо, а я без него умею.</p><p class="p1">Остромов, казалось, вовсе не обращал на Варгу внимания — но не потому, что она была для него глупа и молода, как думал Даня, а потому, что от нее не было в кружке никакого толку. От всех был, а от нее нет. И он легко расстался бы с ней, как и с приведшим ее Галицким, чья туповатая восторженность начала ему надоедать на третьем занятии. Галицкий годился для мелких поручений, да и вообще не следует пренебрегать преданностью, — но он был безнадежно глуп и наивен отвратительной наивностью маменькина сынка, могущего себе это позволить. Остромов с малолетства заботился о себе и терпеть не мог так называемой чистоты. Все одно слюнтяйство. Если ты мужчина, так будь мужчина, а не теленок в двадцать лет. Галицкий смотрел на него с таким обожанием, словно со страниц какой-нибудь дрянной книжонки сошел Мерлин, дабы открыть ему тайны мира. Тайна мира состоит прежде всего в том, что не будь дурак.</p><p class="p1">Остальные в принципе годились, из них мог быть толк. Совершенно необходима была Тамаркина — единственный крестьянский элемент. В случае чего всегда можно было сказать: а у меня не только бывшие, у меня и крестьянство, и очень довольно. За Тамаркину он держался, она осаживала сомневающихся и верила всему, как и положено корове. Этому народу нельзя было, конечно, отдавать никакую власть, они шестьсот лет ходили в ярме и ходили бы дольше, и чуть им разрешили вольничать — они тут же отстроили себе хлев, ибо ничего другого не умели. После рабства им нужно было еще пятьсот лет промежуточного правления, полуправ, узды, — теперь же они были законченные скоты, которым покажи фокус — и выберут тебя скотским папой. Остромов забавлялся Тамаркиной. Никогда никто не хвалил ее столько.</p><p class="p1">Измайлов был полезен связями, привлекал сердца, знал половину Ленинграда, особенно в сфере богемной, падкой. Чем бездарней особь, тем больше друзей — какой-нибудь, скажем, двадцать пятый закон Остромова. Сломанный палец спас Измайлова, не то бы все узнали, насколько он посредственность. Пришлось бы прозревать, прерывать карьеру, доигрывать тапером по кинематографам, музпросветом по школам, — то есть все то же самое, только теперь из-за пальца, а так было бы по заслугам. Остромов не то чтобы понимал в музыке, но понимал в людях. Разве гений бывает такой, как Измайлов? Даже талант не бывает. Говорят: Моцарт, моцартианство. Моцарт был злобный карлик с гипертрофированным фаллосом, бросавшийся на женщин с вожделениями, а на мужчин с оскорблениями. А у Измайлова друзей полгорода, за то и любят, что бездарь, — но бесценен, ибо приводит новых и новых: тому гороскоп, этому предсказание, один недавно просил посвящение и за двести рублей посвятился, тут и меч пригодился. Налупил его мечом по башке и заднице, дал от широты душевной сразу третью степень. И пошел идиот третьей степени, унося диплом с печатью — треугольник, звезда, подарок одной болгарочки, должно быть, краденое.</p><p class="p1">Дробинин был нужен, потому что служил в железнодорожном ведомстве и мог обеспечить любые билеты, в поезде любой комфортности, а также быстрое бегство, если что. Он был, конечно, безумен — тем смешным унизительным безумством, в котором нет и тени благородства; можно сойти с ума на морфии, на картах, как в свое время любимый остромовский друг Арсеньев, до сих пор, вероятно, ищущий где-нибудь в Осиповской больнице секрет беспроигрышного покера; нет, на стихах! — это глупей любого крестьянства! Дробинин отчетливо дрейфовал в сторону осиповской больницы, но покамест его держали на должности, и он был еще полезен; о том, чтобы своевременно подорваться, Остромов думал нередко — это важный аспект и в самом успешном деле.</p><p class="p1">Велембовский был полезен в смысле оружия. Мог достать, если что. Военный в кружке вообще хорош. Была прямая финансовая польза — мучаясь совестью за неучастие в войне, искал забвения в любых гипнозах, особенно увлекался спуском в прежние личности, внушал себе участие в походах Македонского, обеспечивал заказы на гороскопы и гадания насчет служебного продвижения (суеверней военных — лишь артисты), платил изрядно. Удивительна вообще эта военная женственность — в обществе без женщин поневоле отрастает некая андрогинность: чувствительные старые вояки, роняющие слезу при воспоминании о штурме, во время которого небось драпали, как крысы; особая тихая нежность денщиков при высших чинах, чаек, лимончик; сантиментальные романсы, беспрерывные разговоры о смерти, повышенное внимание к форме одежды — пушинки, выпушки, петлички… Сами шьют… И к гаданиям, конечно, внимательны — он поражался, сколько было военных среди гороскопной и карточной его клиентуры.</p><p class="p1">Левыкин годился как цемент, ибо без фанатика нет кружка; все брал на веру и умел внушить себе, что далеко продвинулся. Савельева бывала превосходна для прилюдных дискуссий — есть верный способ сплачивать с у п р у спорами между двумя более посвященными, чем остальные. Ни одного имени, ни одного трактата из тех, что он называл, — она не знала, конечно, но не решалась признаться из самолюбия, главной страсти, поглощавшей ее целиком. Она и маски свои придумывала затем лишь, чтобы больше любить себя: в качестве Елизаветы Дмитриевны Савельевой она не нравилась никому, и себе первой, а в качестве китайской ссыльной или испанской монахини — ого-го. Человек все делает, чтоб любить себя, и любит только тех, с кем нравится себе; знание простейшего этого закона обеспечивало Георгию Иванычу, Остромову, Извольскому и другим у м н ы м людям пристойный доход, а то и сверх пристойного. И она нравилась себе, когда с важностью кивала на остромовские слова: «Ваши заблуждения, Елизавета Дмитна, лишь от чрезмерной образованности, от доверия к источникам вроде Фредерика Анжуйского, — но sancta Teresia!<a href="ch2.xhtml#id11" class="a">[16]</a> — кто же в наше время верит Фредерику Анжуйскому, с его теорией безгрешного пьянства, ну вы знаете, конечно», — и она кивала с полуулыбкой авгурши, хотя Фредерика Анжуйского Остромов изобрел только что и успел полюбить за безгрешное пьянство. Для подобного обмена колкостями Савельева была — ах.</p><p class="p1">Но кто действительно был клад — так это Мурзина. Она ничего не умела и никому не была нужна, но именно в силу этих качеств ей удалось подняться в новой иерархии. Она была близка к иностранному отделу сами понимаете где. Она могла сделать выезд при наличии вызова и даже без оного. Она могла помочь с паспортом. Остромов холил и лелеял Мурзину. Он рассказывал ей о перспективах замужества — разумеется, не ранее, чем через три года. Пятый закон Остромова: не делай близких предсказаний! Помни, впрочем, и о шестом, избегая слишком отдаленных. Три года. Сам он рассчитывал уйти через год, подкопивши: нельзя же с пустыми руками. И начав с майских тридцати, к августу он в неделю делал сто плюс питание, в избытке поставлявшееся Тамаркиной и все тою же Мурзиной. Мурзина готовила невкусно, с пересолом, и приношениями ее Остромов брезговал; но умудрялась прикупить осетринки, икорки — этого испортить не могла. Люди, успешные при большевиках, ничего не должны были делать руками, на вершине пирамиды располагался тот, от кого требовалось только стоять, как стоял в Вавилоне Мардук, — это Мартынов рассказывал, и так живо. Но стоял же Вавилон, и как стоял! Остромову такая конструкция — чтобы те, кто поуже, стояли над теми, кто покрупней, в строгом соответствии с пирамидальной конструкцией, — была на руку, да он и не скрывал. Кто знал что-нибудь? Морбус. Что мог теперь Морбус? Кряхтеть. Кто был теперь лучший оккультист Ленинграда? Остромов. Что знал Остромов? Двадцать слов на разных языках и четыре фокуса.</p><p class="p1">Со всех сторон подперся — этого уж никто не мог обрушить. Единственную встряску учинил Роденс. В конце концов решил и с ним, но, что таить, поначалу даже пот прошиб.</p><p class="subtitle">2</p><p class="p1">Кто бы ждал от Роденса неприятностей, но в этот раз чутье изменило Остромову. Остромов полагал Роденса человеком нужным, поскольку тот служил в правлении Госбанка; должность хоть и не первого разбора — завотделом НОТ, сиречь научной организации труда, — а все-таки при жире, как называл деньги первый учитель Остромова в карточных трюках. Свободный пролетарий работал не просто так, а сознательно; главной его задачей объявлялось непрерывное самосознание. Остромов полагал, что это бред, а впрочем, что ему за дело до пролетариев? Пусть самосознаются, как хотят. Пролетарию предписывалось не просто питаться, а умственно помогать поглощению пищи, мысленно воображать, как из нее вытягиваются соки и вливаются в мускулы, а мускулы, в свою очередь, производят еще пищу, и так без конца. Спать пролетарий тоже должен был осознанно, расслабляя тело по очереди, начиная с пальцев рук, переходя на пальцы ног и умудряясь за ночь в общежитии отдохнуть лучше, чем буржуазия за месяц на курорте, а все потому, что буржуазия бессознательна. Организовывать труд следовало в строгом соответствии с нормативами Семашки: лампа на столе у канцелярского работника должна была располагаться только слева, на высоте не более 40 сантиметров, стул канцелярского работника не должен был превышать метра, шторы должны быть нежно-зеленого цвета, скрепки медные, усовершенствованные, и вся эта система предписаний начисто упускала из виду, что прежде всего должна у канцелярского работника быть голова, а в голове извилины; если взять дубоголового примата и усадить хоть на самый выверенный стул, при самой здоровой лампе, он годен будет только на то, чтобы перекладывать усовершенствованные скрепки.</p><p class="p1">Роденс был страшно организован. В конце каждого дня он записывал сделанное и учитывал потраченное время. Остромов считал его сумасшедшим ровно настолько, чтобы ходить в кружок, и безобидным во всех отношениях, — хотя нечто его, царапало, как припоминал он задним числом: мономаны, придиры, пунктуальщики непременно окажутся с трещинкой и в решающий момент предадут, потому что единственное простейшее действие, какое от них потребуется, не будет совпадать с их тайным внутренним регламентом. Например, надо будет достать денег, а у них твердое правило не брать в долг по пятницам. И все, пиши пропало. Роденс, однако, во всем, что не касалось организации труда, был нормален, даже флегматичен — швед-альбинос, круглая крепкая голова, совиные глаза, — и потому Остромов даже откинулся на резном магистерском стуле, когда после очередного заседания попросту трепались и пили чай, и тут вдруг научный организатор труда сделал вдруг свое непростительное заявление.</p><p class="p1">Чайные, а то и винные (слегка, под контролем) посиделки с учениками сделались традицией: Остромов ничего не видел дурного в том, чтобы, не сокращая дистанции, поболтать в дружеском кругу, вспомнить старое, обменяться занятными историями о необъяснимом — как хотите, все это надо, все на пользу дела, ибо скрепляет и привязывает; сверх того, не на занятиях же было пленять женский молодняк, неуклонно прибавлявшийся и взиравший на него благоговейно. Пестерева рассказывала смешное о докторе, Велембовский — о путешествиях, сам Остромов щедро пересказывал истории из «Вестника непознаваемого», Галицкий вылезал с какими-то идиотскими ритмами и даже Тамаркина поведала об исключительной знахарке, которая у них в деревне умела зашептывать припадочных; как раз в одну прелестную июльскую пятницу Остромов собирался пронзить воображение новоприбывшей Серафимы, девушки с лучистым взором ангела-дебила и вечной юродивой улыбкой. Он знал по опыту — в любви такие ненасытны; и только было открыл рот, дабы поведать историю графа Ларивьера, подстрелившего на охоте собственную жену в виде фазана, когда Роденс сурово положил кулаки на стол и сказал:</p><p class="p1">— Господа. Я наблюдаю за нашим кружком второй месяц. Этого совершенно достаточно. Мне представляется, что дольше терпеть нельзя. Время самое подходящее. Или мы, или никто.</p><p class="p1">— Для чего именно подходящее время? — дружелюбно спросил Остромов, чуя подвох.</p><p class="p1">— Вы отлично знаете, — отмахнулся Роденс. — Мне кажется, этот состав годится. Господа, мы не можем больше терпеть этот строй и обязаны ускорить его конец.</p><p class="p1">О Господи, подумал Остромов и похолодел. Если это провокатор, я сдам его Адскому завтра же, но если нет? Тогда на следующее заседание он не придет, и кто я буду для них? Донос — вещь непростительная, все простится, кроме доноса. Узнай хоть один из них, что я хожу докладывать, — Боже. Если это не провокатор, тем более конец всему. Если бы это делалось наедине, я нашел бы слова. Но при всех я обязан отвечать так, чтобы это понравилось всем, а здесь такого ответа быть не может. Сейчас он обрушит мне всю работу, всю схему, всю…</p><p class="p1">— Правительство агонизирует, — продолжал Роденс. — Вы знаете, я занимаюсь систематикой. Эта система не устоит. Здесь не организовано ничего, вообще ничего. Раньше я ждал только раскола. Раскол у них идет полным ходом. Если мы сумеем вовлечь в гражданское неповиновение хотя бы двадцать человек, недовольство пойдет по цепи, и остановить его не удастся. Дело за тем, чтобы начать.</p><p class="p1">— Что же вы хотите делать? — спокойно спросил Велембовский. — Недовольства мало, нужен план…</p><p class="p1">— Я думал об этом, — сказал Роденс. — Открытое выступление даст сигнал. Этого замолчать они не смогут. Надо выйти на улицу — улицу обговорим, — и вы увидите, сколько прохожих окажется за нас. Пойдет по цепочке. Дальше начнется в Москве, в провинции, это не остановится. Люди просто поймут, что — можно. И тогда — хаос, а из хаоса всегда диктатура. Власть в хаосе берут те, кто готов. Я готов. И полагаю, — он поднял глаза на Остромова, — что и вы готовы, и лучшего трудно желать.</p><p class="p1">— Сомнительно, — проговорил Велембовский и потер виски. Он уже готов был обсуждать перспективы, ненавоевавшийся вояка, честный кретин, из-за таких и рушится все.</p><p class="p1">— Я удивляюсь, — начал Остромов с ядовитой улыбкой, беря паузу с помощью любимого словечка; оно всегда давало две-три секунды — сообразить ход речи. — Я удивляюсь. Вы отлично знаете, что мы собрались для духовных целей. Мы занимаемся совершенствованием тех способностей, которые выше и чище… вы понимаете. Никакие социальные условия не могут раскрепостить душу, и я полагаю…</p><p class="p1">— Ах, оставьте, — сказал Роденс. — Какая может быть душа в условиях Эс Эс Эс Эр. Пока вы будете думать о душе, она успеет измараться, как трубочист. Вы думаете, можно сидеть и заниматься погружениями и воспарениями, и не участвовать, и воздерживаться? Да вы одним неучастием уже соглашаетесь. Сажают лицеистов — а мы молчим. За что сажают? Ни за что. За то, что не теми родились. Потом начнут захватывать земли. Это непременно. Это я вам говорю как организатор труда. И что, нам все это время взлетать и погружаться? Бросьте. Сегодня подлец уже любой, кто просто живет.</p><p class="p1">Даня слушал все это с содроганием, физически чувствуя, что каждое слово ранит учителя. Можно было спорить о том, морально ли выжидать и чего в итоге дождешься, — но все в речи Роденса было аморально, ибо он хотел убивать, и только. Диктатура нужна была ему не потому, что плохо вокруг и сажают лицеистов (о деле лицеистов он наслушался достаточно, весь бывшеский Ленинград ходил на открытый процесс, как в клуб, и это тоже было отвратительно — почему, он не взялся бы объяснить). Диктатура нужна была Роденсу, чтобы убивать: он этого хотел, любил это дело, подогнал под свою страсть целую теорию, и подогнал бы марксизм, если бы родился раньше. Так и начнется, думал Даня с ужасом; кажется, только они с учителем испугались по-настоящему. Остальные смотрели заинтересованно, словно их приглашали поспорить о политике; Савельева так и вовсе оживилась, бескровные щеки порозовели. Ах, как объяснить, думал он, я никогда не могу объяснить! Ведь худшее случается не тогда, когда вооружаются теорией или появляется утопия. Худшее — когда слишком много людей, желающих убивать; а желание убивать — тот уксус, в который выбраживает вино жизни, если его оставляют томиться взаперти… Если нечего делать, всем хочется бить, ломать, терзать. Огромному большинству однажды уже стало нечего делать, оказались не нужны, восстали, опрокинули, — и вот. Сейчас снова растут убийцы из числа ненужных, и чем черт не шутит — у них все может получиться; и если получится — это будет конец. Потому что этой власти хоть чего-то нельзя — скажем, вожди не позволяют себе обогащаться; они ведь держатся на идее, и хотя эта идея позволяет им творить черт-те что, она же охраняет их от крайнего свинства. А когда ее опрокинут — хотя бы такие, как Роденс, — их не будет сдерживать ничто, даже вера, царь и Отечество, потому что за веру и царя будут мстить, а в мести нет правил. Может же быть такое, что заплачем и по нынешним! И он с надеждой уставился на Остромова, важно молчавшего, покамест Роденс нахваливал свою диктатуру.</p><p class="p1">— Все очень мило, — сказал Остромов, постукивая длинными пальцами по столу. — Мило и даже прелестно. Но людям, занятым духовным совершенствованием, разговаривать о социальных преобразованиях так же странно, как учителю вникать в ссоры первоступенников. Знатоков духовной науки преследовали при всяком строе, и ни одна власть не делала свободней то, что только и нуждается в освобождении, — умы! Вот почему я не запрещаю вам, однако и не советую развивать здесь подобные теории. Они вредны не тем, что могут дать пищу осведомителю, — я немедленно увидел бы на тонком плане, будь здесь хоть один предатель, вольный или невольный.</p><p class="p1">Остромов был прекрасен в эту минуту, и жаль, что за столом их было восемь, а не двенадцать.</p><p class="p1">— Нет, — продолжал он, дав присутствующим оценить эффект. — Все эти заговоры вредны тем, что вас, вас самого отвлекают от единственной деятельности, имеющей смысл. Если вас действительно интересуют люди, занятые политикой, я отправлю вас к тем, кто может оценить… меру вашей решимости. Они и с Европой связаны, и в принципе… Полагаю, это именно те, к кому вам нужно.</p><p class="p1">И, раскрыв блок, он бегло начертал несколько слов, обращенных к единственному человеку, который мог выручить в этой почти безвыходной ситуации. У Остромова была превосходная память на лица и сплетни. Насмешник с вытянутым, лошадиным лицом, демонический эстет, урнинг с репутацией консультанта ГПУ один мог тут справиться и либо сдать, либо… И Остромов усмехнулся, запечатывая записку перстнем с треугольником и звездой.</p><p class="p1">— Имейте в виду, — холодно сказал Роденс, — если вы пускаете меня по ложному следу или передаете на Гороховую, то ведь я ничего скрывать не буду. Ваше оккультное общество тоже вряд ли там понравится.</p><p class="p1">— Ну, уж это подло, — тихо сказал Велембовский.</p><p class="p1">— Если нет иного способа сделать людей из глины, годится все, — сказал Роденс, глядя на него в упор. Не простившись ни с кем, он вышел.</p><p class="p1">Остромов обвел собрание строгим взором. Все сидели потупившись, и лишь глупец Галицкий таращился с восторженной благодарностью — кажется, если б Остромов при нем обмочился, юноша восхитился бы не меньше.</p><p class="p1">— Кстати! — воскликнула Пестерева, прерывая неловкое молчание. — В Дорнах тоже однажды заявился один марксист, кажется, француз. И можете себе представить…</p><p class="subtitle">3</p><p class="p1">Неретинский распечатал записку и прочел пять четких остромовских строчек. Он запомнил, конечно, забавного масона ленинградского фасона и знал, что они еще пересекутся, — культурный Ленинград был теперь тесен; его несколько удивила формула «пользуясь нашей взаимной доверенностью, направляю подателя сего к вам, ибо он скорее ваш, чем мой». Он еще раз окинул Роденса требовательным взором. У Неретинского было абсолютное чутье на потенциалов, как называл он тех, кто только еще раскрывался, осознавая свою лунность; но тут не было ничего, деревянная колода, и не деревянная даже, а мыльная. Казалось, стукни костяшкой — услышишь глухой звук. Бывают, разумеется, всякие случаи. В лунном кругу вовсе не обязательно было практиковать. Приходили разные — с кем еще поговоришь о балете? Но этот, кажется, и в смысле балета был та же колода.</p><p class="p1">— Итак, — сказал Неретинский с дружеской любезностью. Он принимал Роденса в кабинете, а в гостиной в это время закусывал обычный кружок, в том числе люди с Гороховой, а что же? В э т о й среде не делали профессиональных различий, как бандиты не делают национальных. Уран уравнивает всех.</p><p class="p1">— Я надеюсь в вашем кружке найти единомышленников, — смущаясь, заговорил Роденс. — Мне описали вас как человека надежного.</p><p class="p1">— Не сомневайтесь, — широко улыбнулся Неретинский. Он знал, что к откровенности располагает вся обстановка квартиры, вызывающе неказенная. По стенам кабинета висели венецианские маски и виды, по стеклу стола скользила гондола, вместо двери колебалась бамбуковая занавесь.</p><p class="p1">— Скажу вам со всей прямотой, — заговорил Роденс, поднимая глаза. Неретинский казался ему своим, достойным доверия: он это умел на уровне флюидов. — Я давно уже… уже несколько лет. Я не могу больше видеть… этих людей. Просто людей. Я не могу жить обычной жизнью.</p><p class="p1">— Но это очень понятно, — ласково сказал Неретинский. — Мы все прошли через это.</p><p class="p1">— И таких, как я, много, — горячо продолжал Роденс. — Многие хотели бы, я знаю… Но все лгут! Себе и остальным — все лгут!</p><p class="p1">Кажется, действительно наш, подумал Неретинский. Но как странно.</p><p class="p1">— Мне кажется, сейчас надо выступить, — потребовал Роденс. — Именно сейчас, и не позже. Сейчас самое время.</p><p class="p1">— Почему выступить? — удивился Неретинский. — Разве вам недостаточно чувствовать себя… среди своих?</p><p class="p1">— Нет! — пылко воскликнул Роденс. — Нет и нет! Сейчас — уже недостаточно. Поймите, они терпят нас только пока. Но это ненадолго. Скоро начнут хватать ни за что.</p><p class="p1">— Это, положим, вряд ли, — успокоил его Неретинский. — Скажу вам честно, что среди них весьма много н а ш и х…</p><p class="p1">Кажется, это свой, подумал Роденс. И какой прямой.</p><p class="p1">— Я об этом догадывался! — восторженно крикнул он. — Я знал. Достаточно будет один раз выйти на улицу…</p><p class="p1">— Для чего же на улицу? — ласково спросил Неретинский. — По-моему, для таких дел лучше всего подходят отдельные помещения, уютные комнаты…</p><p class="p1">— Все это было, — отмахнулся Роденс. — Сегодня пора на улицы. Люди должны почувствовать, что нас много. Тогда очнется Москва, провинция, и завтра все будет наше. Вы понимаете?</p><p class="p1">Ох уж эти неофиты. Открыв дверцу для себя, хотят немедленно распространить на всех.</p><p class="p1">— Вы, мне кажется, заблуждаетесь, — сказал Неретинский мягко. — Нашей целью… нашей, так сказать, группой… никак не могут быть все.</p><p class="p1">— Все и не должны, — махнул рукой Роденс. — На первое время цель у нас одна — коммунисты.</p><p class="p1">— Коммунисты? — округлил глаза Неретинский. Такой экземпляр ему еще не попадался. — Неужели вы считаете, что мы должны… сделать э т о с коммунистами?!</p><p class="p1">— Я не вижу другого выхода, — твердо сказал Роденс. Он оценил такт подпольщика: вдруг подслушивают? Тогда, конечно, надо всячески избегать любезных ему глаголов истребления.</p></span></span>
