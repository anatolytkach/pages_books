<span><span><p class="p1">— Это мне понятно, — кивнул Михаил Алексеевич, нацеживая Альтеру чаю; тот между тем ставил на стол бутыль дешевого красного вина, купленного у армян на Сенном рынке. — Маркиз де Ферраль получил от прорицателя Десонье точное указание, что во Франции случится революция, и успел скрыться за границу. Смерти он избежал, но голова у него всю жизнь болела. Он назвал это фантомной болью. «Ее место в корзине, — говорил он, — она задержалась».</p><p class="p1">Поленов был совершенно уверен, что на свете никогда не существовало ни Десонье, ни Ферраля, ни его головы.</p><p class="p1">— Мне кажется, что я все делаю неправильно, — продолжал Альтер. — И некому сказать, что я все делаю правильно.</p><p class="p1">— Стихи вы пишете правильно, это главное, — поспешил подлизаться Игорек. Поленов знал за ним эту черту — всех нахваливать, это он покупал благосклонное отношение к своим вырезным салфеточкам, печным росписям.</p><p class="p1">— Может быть, — небрежно сказал Альтер, — неправильность в том, что я вообще их пишу. Этого не нужно делать, а что нужно — не знаю. Я даже не знаю, кто сейчас на месте. Может быть, вы, Михаил Алексеевич, потому что вы без всякого места. Но это очень трудно.</p><p class="p1">— Вы еще для такого молоды, — снисходительно улыбнулся Михаил Алексеевич, довольный оценкой.</p><p class="p1">— Моя болезнь в том, — продолжал Альтер, — что мозг мой рассчитан на вещи сложные, а занят простыми. А стихи нельзя писать двадцать четыре часа в сутки. Пока этот не занятый делом мозг простаивает, как теперь говорят, он поедает сам себя.</p><p class="p1">— У меня и это было, — кивнул Михаил Алексеевич. — Да и есть, пожалуй.</p><p class="p1">— Я не могу все время так просто жить. В девятнадцатом году все было так сложно, что, казалось, у меня голова лопнет. И даже когда я в армии был, все еще казалось сложно. А когда пришел — тут все так просто, что даже делать нечего. Я испугался.</p><p class="p1">— Вы еще можете дожить до сложности, — пообещал Михаил Алексеевич, ласково глядя на Альтера. — Лет тридцать, если ничего не случится…</p><p class="p1">— Да, но я разучусь. Я и теперь уже забываю. Вчера читал Бардесана и забыл, что значит амфилафис.</p><p class="p1">— Амфилафис значит густой, — все так же ласково подсказал Михаил Алексеевич.</p><p class="p1">— Ну вот, так за тридцать лет и забуду.</p><p class="p1">— Нет, тут знак, — Михаил Алексеевич во всем видел знаки, вся природа только и делала, что ему сообщала сокровенное. — Слово, которое забыто, и есть главное. С вами, Альтер, случится что-то густое. Сейчас у всех пусто, а у вас будет густо.</p><p class="p1">— Чувствительно вам признателен, — тонким голосом сказал Альтер. — И еще я стал ожидальщиком. Понимаете, что это такое? Все время жду, что мне кто-нибудь позвонит, или придет письмо, или просто на улице позовут по имени.</p><p class="p1">— О, это я очень понимаю! — воскликнул Игорек. — Это я понимаю как никто, только очень страшно. Я боюсь, что заберут.</p><p class="p1">— А я нет, — сказал Альтер. — Иногда я даже хочу, чтобы забрали. Хоть кто-то заинтересовался. На самом деле я хочу, чтобы кто-нибудь подошел и сказал, чего я действительно стою. Если бы забрали, это все-таки оценка…</p><p class="p1">— Это я тоже понимаю, — сказал Михаил Алексеевич. Они переговаривались о симптомах, как больные в очереди на прием. — Один слепой все время ждал телефонного звонка. В конце концов у него начались слуховые галлюцинации, и он уже не знал, звонят ему на самом деле или кажется, и пропустил тот звонок, которого ждал.</p><p class="p1">— Я думаю, ему звонил другой слепой? — не то утвердительно, не то вопросительно встрял Игорек.</p><p class="p1">— Скорей расслабленный, — резко сказал Альтер.</p><p class="p1">— Я бы очень хотел с кем-нибудь поговорить, — продолжал Михаил Алексеевич. — Я как-то сейчас не очень верю в свое бессмертие, вообще вера в Бога осталась, но не в чувстве, а в разуме. Как будто я знаю, что верю в Бога, но никак этого не чувствую, и это уже не дает силы жить. А если бы кто-нибудь со мной на розовом, хорошем закате, в теплый вечер об этом поговорил, я бы ему поверил. Странная вещь, чужое бессмертие я могу представить, а свое не могу. У меня в последний год все сны об умерших, утопленники открывают глаза…</p><p class="p1">Поленов вздрогнул.</p><p class="p1">— Они приходят все такие злые, такие неприятные. Делают вид, что рады, а на самом деле что-то замышляют. Они очень там портятся. Может, я потому не вижу своего бессмертия, что такого не хочу, а в другое теперь не верю. И боюсь, мне ни с кем уже не поговорить, потому что я забываю те слова, которыми об этом говорят. Помню какие-то другие. Как будто переехал в бедный город или на нижний этаж.</p><p class="p1">— И еще я ничем не могу заниматься долго, — сказал Альтер. — Как будто все жду, что придут и отвлекут, и втайне хочу, чтобы отвлекли, потому что я не уверен, что занимаюсь настоящим. А сказать мне никто не может, я даже вам не верю, потому что вы ведь со мной знакомы и, кажется, меня любите.</p><p class="p1">— Меня тоже теперь хватает только на короткое, — сказал Михаил Алексеевич. Это была неправда, но он хотел утешить Альтера. В действительности то, что он писал теперь, было как раз de longue haleine<a href="ch2.xhtml#id7" class="a">[1]</a>, в том новом кротком и гордом духе, который пришел, когда он отбросил всякое недовольство — ибо оно распространилось бы теперь на все, — оставил надежды на большие перемены и стал только ждать, что еще отнимут.</p><p class="p1">Стали сходиться. Пришел Захаров с моноклем, Кякшт с поклонником, Серафимов с кларнетом, Золотаревский с насморком, Беленсон с огромным подбородком. Пришел Ломов со своим приятелем, обещанным оригиналом. Оригинал показался Поленову самым тут нормальным. Поленов не любил остальных. Они перемигивались, разговаривали паролями, как-то очень уж подчеркивая, что они тут свои. Он всегда выходил не свой. Оригинал тоже был не свой и тем нравился, и человек, сразу ясно, солидный.</p><p class="p1">Он был высок ростом, худ, серые круглые глаза его глядели спокойно. Он был поленовских лет, может, чуть старше; в кости узковат, но крепок, и по сугубой невозмутимости среди общего шума чувствовалось, что всякого повидал. Поленов ощутил в нем силу — на силу имел чутье безошибочное. Все эти люди были слабы, хоть и считали себя Бог знает кем. Конечно, им было теперь плохо, а разве не сами накликали? Поленову и тогда было хорошо, инженером, и теперь было бы хорошо, если б жила и танцевала Лидочка. Эти же были несчастны без повода, вообще, а потому и несчастье их было фальшивое. Собравшись, они тотчас начинали читать плохие стихи или ругать власти. Вспоминали уехавших, обменивались данными из писем, выходило, что всем там хуже, чем здесь. Уехавшие, вероятно, так же собирались там и обменивались сведениями, как ужасна жизнь оставшихся. — Что будет? — говорил Михаил Алексеевич. — А я скажу, что будет. Они примутся теперь за своих.</p><p class="p1">— Ну, сначала-то нас, — хихикнул Золотаревский, в прошлом фельетонист.</p><p class="p1">— Нет, мы и на это не годимся. Им надо теперь укрепляться, а от нас какая же опасность? Им свои теперь опасней чужих. Термидор.</p><p class="p1">— До термидора была Вандея.</p><p class="p1">— За три месяца, кажется?</p><p class="p1">— Вандея восстала, а мы по углам шипим, — сказал Захаров, режиссер. Он только что приехал со съемок из Одессы и говорил, что будет нечто грандиозное из эпохи пятого года.</p><p class="p1">— Иногда шипеть-то пострашней…</p><p class="p1">— Знаете на что похоже? — говорил Михаил Алексеевич. — Это гальванизированный труп, ровно так, ничего больше. Все умерло еще в пятнадцатом году, я очень почувствовал, просто как отчекрыжило. И Александр Александрович говорил, что все умерло в пятнадцатом. А потом этот труп гальванизировали очень сильным током, и он пошел, только мысли у него все мертвые, слова мертвые и поет он все время о павших борцах, и ставит им памятники. И так он будет ходить еще некоторое время, даже довольно неуязвимый для всяких врагов, потому что мертвому что же станется? Но потом он начнет разлагаться, и тогда все кончится уже совсем. Я не знаю, когда именно, каким током его надо будет бить, но сам он мертвый, и весь язык его будет мертвый, и разложение его будет долго и гнойно. Если бы он павши в землю умер, то еще что-то могло быть, а так он все перезаразит и отравит, и теперь долго ничего не будет…</p><p class="p1">К нему, впрочем, никто не прислушался, и он замолчал, стыдясь пророчества, мало уместного в застольном разговоре.</p><p class="p1">— Интересней, как реставрация пойдет, — сказал Беленсон, уже пьяненький. Этот еврей пил, как русский, но когда напивался, из него вылезал именно еврей, всем напуганный, криво ухмыляющийся. — Я думаю, у них уж фигура присмотрена. Абы кому не дадут.</p><p class="p1">— Должен кто-то из-за границы приехать. Но не царской фамилии, а как бы обновленец.</p><p class="p1">— Нет, не думаю, — решительно сказал поклонник Кякшт, человек, судя по выправке, военный, поклонник-полковник. — Я думаю, сначала Наполеон, кто-то из своих, из маршалов. Буденный — идиот, а то бы годился.</p><p class="p1">— Я на Троцкого думаю, — заметил Альтер.</p><p class="p1">— Это уж вы, Альтер, хватили, — с вопросительной интонацией протянул идиот Игорек.</p><p class="p1">— Вот увидите. Он самый военный, он сейчас в полуопале, они его приберегают в тени для народной любви. Во время войны все был на виду, потом перессорился со всеми, обозвал бюрократией — по какому праву? Что ж он, сам другой? Он такой же и хуже. И когда народу надоест, они вытащат его, как туза из рукава.</p><p class="p1">— А вы что скажете, масон? — развязно спросил Золотаревский у ломовского знакомца.</p><p class="p1">— Посудите сами, можно ли предсказывать, — пожал плечами сероглазый. — Если я нечто знаю и скажу, будет одно, если не скажу — совершенно иное. Для чего же мне поддерживать в вас ненужные суеверия? Про нас больше врут, чем про покойного императора.</p><p class="p1">Ломов перекрестился, он был монархист.</p><p class="p1">— Но в общих-то чертах? — не отставал Золотаревский.</p><p class="p1">— В общих чертах дело, начатое вами позавчера, завершится благополучно, — сухо сказал масон.</p><p class="p1">— Но я не начинал вчера никакого дела! — развязно крикнул бывший журналист.</p><p class="p1">— Как угодно, — кивнул масон. Золотаревский смешался.</p><p class="p1">— То есть я начал роман… — пролепетал он.</p><p class="p1">— Как угодно, — еще суше повторил масон. — Я, господа, не представился. Меня зовут Борис Васильевич Остромов.</p><p class="p1">— Про-све-щеннейший человек! — Ломов поднял кривой палец. У него было что-то с костями: горб, неестественно длинные пальцы, огромные ступни. Уродство не обозлило его: он всегда кем-нибудь восторгался.</p><p class="p1">— Я о вас слышал, кажется, — сказал Михаил Алексеевич в наступившей паузе.</p><p class="p1">— Слышали обо мне многие, — с достоинством кивнул сероглазый, — видели единицы, а понял услышанное едва ли десятый. Вас же я приветствую и с удовольствием слушаю, но будущее — не наше дело. Мы не все еще поняли в настоящем, и для этого понимания я намерен собрать кружок.</p><p class="p1">— Теперь опасно, — буркнул кто-то.</p><p class="p1">— Уверяю вас, не опасней, чем это собрание. Мне вообще кажется, что путь сейчас один — если вовне пойти некуда, надо глубже в себя; или, если в себе наскучит, освоить ступенчатую экстериоризацию по методу Сведенборга.</p><p class="p1">Все насторожились, а Михаил Алексеевич свистнул. Он демонстрировал иногда удивительно вульгарные манеры: увидев на улице поток желтой глинистой воды, мог радостно сказать — «Как будто сотня солдат…». Вид сотни солдат, которые вынули и льют, был ему, должно быть, приятен.</p><p class="p1">— Какую именно экстериоризацию? — спросил Игорек. — Вы, верно, по методу Шарко, то есть выход наружу душевной жизни…</p><p class="p1">Непременно надо было показать, что все знает, обо всем слыхал.</p><p class="p1">— Вовсе нет, — спокойно пояснил Остромов, — Шарко нередко употреблял оккультные термины, понятия не имея об их смысле. У него наблюдался один из братьев, Ален Жофре, тоже, по счастью, знавший немногое. Вообще же он был врач по делам самым телесным, мозольный оператор, в сущности.</p><p class="p1">Золотаревский прыснул.</p><p class="p1">— Экстериоризацией называется выход астрального тела, — продолжал Остромов, волнообразно изображая этот выход. — Это упражнение требует огромной подготовки и высших степеней концентрации, но у нас оно доступно уже на третьей степени, при условии, разумеется, правильной защиты.</p><p class="p1">— Вы можете это показать? — спросил Альтергейм.</p><p class="p1">— Разумеется, нет, — улыбнулся Остромов. — Показать можно фокус, а выпускать для потехи душу из тела…</p><p class="p1">— Но тогда, согласитесь, никаких доказательств, — заметил протрезвевший от любопытства Беленсон. Пред ним сидел живой масон, и Беленсон почти решил, что это сон.</p><p class="p1">— Доказательств множество, — пожал плечами Остромов. — Экстериоризация как раз одна из немногих вещей, которые доказуются почти так же легко, как левитация. Вам известен, конечно, случай Бояно.</p><p class="p1">— Неизвестен! — крикнул Беленсон. — Вам известен? — спросил он Михаила Алексеевича, и, обводя присутствующих выкаченными глазами, искал поддержки.</p><p class="p1">— Не слышал, — признался Михаил Алексеевич.</p><p class="p1">— Я удивляюсь, — сказал Остромов. — Случай знаменитый, можно сказать, азбучный. Австрийский офицер Бояно стоял на постое в Карпатах. Год был, насколько помню, 1858, октябрь. Он заметил, что на него засматривается девка, рослая, черноволосая, очень смуглая, какие там иногда бывают. Мне случалось видеть карпатчанок, и я бы не устоял, но Бояно устоял — может быть, потому, что у нее был мрачный, тяжелый взгляд. Она преследовала его, ходила следом, наконец однажды заступила ему дорогу и сказала прямо, что хочет с ним слюбиться. Он ответил, что без любви спариваются только лошади. Она сказала, что придет к нему ночью и что он раскается. Бояно выставил у двери своей избы солдата и заперся на двойной засов. Ночью слышит царапанье о дверь, сильное, словно скреблась крупная кошка. Он спал, не раздеваясь, готовый ко всему от этой ведьмы. Вскакивает, бежит к двери: ночь холодная, ясная. Солдат стоит вытянувшись, как в столбняке, а перед ним маячит как бы пыльный столб. Бояно, недолго думая, ударил шашкой в середину столба, не вынимая ее, что важно, из ножен, — и ему показалось, будто посыпались искры.</p><p class="p1">— Крик был? — резко спросила Кякшт.</p><p class="p1">— Никакого, — отмахнулся масон. — Как вы хотите, чтобы астральное тело физически кричало? Бояно снял солдата с караула и отпустил спать, и сам улегся спокойно. Утром к нему приходит хозяйка, неся кувшин свежего молока, и приговаривает: спасибо, офицер, что ты убил ведьму. Что такое? Он бежит в крайнюю избу. Там лежит его красавица с рассеченным лбом; когда он взошел, открыла глаза, в упор посмотрела на него и испустила дух.</p><p class="p1">— И что с ним потом было? — спросил Поленов.</p><p class="p1">— Он поступил потом в монастырь, отмаливал грех, а выйдя из монастыря, занимался оккультными науками, — пояснил Остромов. — Но этот случай описан не только им, я думал, вы знаете… Любопытно, что именно последний взгляд ведьмы — так называемый ultima spiritus, дух испущенный, — не возымел на него действия. Ваш вопрос, — отнесся он к Поленову, — изобличает знание этой закономерности: тот, при ком умирает ведьма, либо принимает ее дар, либо бывает ею проклят. Мирной кончины для ведьмы нет. Как вы полагаете, господа, отчего при последнем вздохе она не смогла причинить вреда Бояно?</p><p class="p1">— Оттого что все это чушь, — сказал Беленсон, чтобы успокоить самого себя.</p><p class="p1">— Очень возможно, — вежливо кивнул Остромов. — Будут ли иные мнения?</p><p class="p1">Все посмотрели на Беленсона, как на идиота.</p><p class="p1">— Вероятно, она утратила дар от удара, — попытался Поленов развить успех.</p><p class="p1">— В высшей степени точно, — обрадовался Остромов, умевший выделить в любой компании самого несчастного и его завоевать в первую очередь, а там пойдет. — В высшей степени, но с важным добавлением: удар нанесен был в астрому, дуальное психо-духовное тело. И оттого он оказался смертелен, хотя и наносился тупым предметом. Удар, полученный в астральном состоянии, может лишить любых дарований, и вы знаете, конечно, что безумие Гельдерлина началось с выхода его из тела в астральном состоянии. На пути к той, которую он называл Диотимой, ему встретился как бы ворон, хотя сегодняшний исследователь, не колеблясь, сказал бы, что это лярва. Об этого ворона он резко ударился, потерял ощущение пространства, упал на льдистую землю и едва добрался домой, после чего рассудок начал изменять ему. Нет сомнения, что эта же лярва явилась Эдгару По. В нынешней классификации она упоминается как larva corvi, не высшая из лярв, но противнейшая.</p><p class="p1">— Лярва? — переспросил Ломов.</p><p class="p1">— Также личина, — успокоил его Остромов. — Но личина сейчас малоупотребительна. Чем далее, тем более братья переходят на универсальную добрую латынь.</p><p class="p1">— Но я никогда не слышал о лярвах, — настаивал Ломов.</p><p class="p1">— Лярвой в русских деревнях зовут кликушу, — сказал полковник. — Лярва, курва, стерва…</p><p class="p1">— Larva пришла из Рима, — опроверг Остромов. — Мы расходимся, конечно, в определении ее природы. Фергюсон полагал, что это душа злодея, тогда как Амантис — что это всего лишь неосуществленное его желание, поскольку в его системе только неосуществленное имеет материальную силу. Сбывшееся желание умирает, несбывшееся вечно. Красивый взгляд, не правда ли? Однако что бы это ни было, лярва всегда караулит астрому, собираясь занять тело. Известны случаи, когда астрома, вернувшись, находила тело занятым, и тогда ей приходилось ждать по несколько месяцев. В ночь св. Вальбургии лярва не может остаться в теле, и только тогда астрома возвращает себе принадлежащее ей по праву. Именно этим, — любезно кивнул он Игорьку, — объясняется огромное количество исцелений, отмеченное в клинике Шарко в первую декаду мая.</p><p class="p1">— Se non e vero e ben trovato!<a href="ch2.xhtml#id6" class="a">[2]</a> — воскликнул Михаил Алексеич. — И вы владеете экстериоризацией?</p><p class="p1">— В ней нет ничего сложного, нужно только соблюсти условия, оградиться формулой и проследить, чтобы рядом был не менее опытный брат. Поверьте, я не из самых низких в иерархии, но в одиночку не решился бы.</p><p class="p1">— Можно ли этому научиться? — воскликнул Беленсон. — Я, право, поучился бы! Когда меня распекает мерзавец Печенкин, как бы хорошо: тело стоит, слушает, кивает, а душа полетела в Петергоф!</p><p class="p1">— Если ваш Печенкин имеет степень ниже пятой и готов отогнать лярв, отчего бы нет? — пожал плечами Остромов.</p><p class="p1">— Он не имеет степени, он редактор в издательстве «Прибой», где я имею несчастье переводить немецкую дрянь.</p><p class="p1">— Никогда не знаешь, кто какой степени, — засмеялся полковник. В этот момент снова пробрякал звонок, и Михаил Алексеевич пошел открывать.</p><p class="p1">— Кто бы это? — спросил Золотаревский.</p><p class="p1">— На-а-аденька! — словно отвечая ему, протянул из прихожей голос Михаила Алексеича.</p><p class="subtitle">5</p><p class="p1">Вошедшая девушка была не то, не другое и не третье, но как говорить о девушке, начиная ее описание со сплошного не, когда вся она — сплошное утверждение, да, да, очень хорошо, добрый вечер! Она была не слишком красива, но прелестна, хотя и это пошлое слово уместней в жующих, бескровных устах плешивого селадонишки: «Пэ-элестно». Она вошла, и погода улучшилась: утро было хмарное, а вечер прояснел. В окно квартиры на Спасской заглянула луна. Оказалось, что надежды наши не вовсе беспочвенны и даже Беленсон, пожалуй, напишет еще «Абсолютную этику», над которой мучительно думает с двадцати лет, читая Спинозу и Федорова. Волосы у нее были русые, щеки румяные, словно вошла она с холода. Глаза ее были светлые, неопределенного цвета, и много еще было неопределенного, в том числе будущее. Непонятно было, что может случиться с такою девушкой теперь, когда никто не поет в церковном хоре, а если кто и приходит с мороза, то дворник, и говорит: «Теперь здесь буду жить я».</p><p class="p1">На ней был огромный, почти до колен доходивший мужской свитер с хомутообразным оттянутым воротником, в котором виднелась ее ровная, белая шея. Руки у нее были несколько крупноваты, нос чуть вздернут и зубы тоже крупны. Вообще она была вся такая немаленькая. Так думал про нее вошедший с нею Женя, давно пытающийся подобрать к ней слова, но все не преуспевший, потому что Женя воспринимал мир не в зримой его части, а непосредственно видел суть. Так в Наде он видел сплошной церковный воск, самый чистый, но не обретший еще формы. В Михаиле Алексеевиче он видел скарабея, в Игорьке гимназиста, а в высоком сероглазом лысом человеке, который при их появлении подозрительно замолк, виделся ему почему-то волк, но образованный, со вкусом. Относительно Поленова было непонятно. В нем было несколько предметов сразу. Если бы как-нибудь выдавить жало, может быть, остался бы порядочный человек. Существует японская рыба, в которой все вкусно, кроме печени, но штука в том, что она почти вся состоит из печени.</p><p class="p1">Женя не был влюблен в Наденьку, какое! Женя был влюблен в Гаянэ, девушку, в которую можно быть влюбленным. Гаянэ была маленькая, вздорная, черная, но она была женщина, ее можно любить. На Наденьку можно было только смотреть, разговаривать с нею, бродить. Ее хотелось от всего укутывать, хоть и ясно было, что это ей сейчас вредно, как вредно младенцу, когда его слишком пеленают. Хотелось быть мостом между нею и жизнью, вот. Чтобы жизнь касалась ее через тебя, как электричество включают через шнур, и по пути к лампочке оно успевает оставить в шнуре часть своей смертельной силы, чтобы лампочка сразу не лопнула. Наденька вошла в облаке Жениного обожания, и все посмотрели на нее Жениными глазами. Она была очень, очень хороша и не знала этого, потому что для нее все это еще была норма: и Женино обожание, и то, что она хороша. Был один человек во всем сборище, который сразу же понял, что из нее можно сделать, но этого не показал.</p><p class="p1">Надя Жуковская хотела учиться на филологическом, в университете, но в университет не попала вследствие происхождения, а потому пошла в медицинский, куда брали. Она боялась мертвецов и даже препаратов, но думала, что привыкнет. Было около десятка стариков, к которым она ходила просто пить чай и разговаривать, чтобы старики не сошли с ума в своих клетушках. С Михаилом Алексеевичем был знаком ее отец, музыкант, умерший от грудной жабы в девятнадцатом году. Надю Жуковскую обожали подруги, хотя все они были совсем не ее круга, и даже преподаватель-марксист, который был вообще не из круга, а из неведомого квадрата, где все были квадратные, как он. Надо было быть вовсе несчастным человеком, чтобы не любить Надю Жуковскую, и Поленов, видно, был не совсем еще — или уже — несчастен, если при виде ее улыбался. Конечно, потом он вспоминал, что Наденька так жива, а Лидочка так нежива, и уже так давно, но прощал Наденьке и это. К нему в каморку она тоже забегала, просто чтобы его жизнь не провалилась окончательно в ад. Непонятно было, что станет с Наденькой, за кого она выйдет замуж и на кого изольется избыток переполняющей ее жизненной силы, но до замужества ее было еще так долго. Ей было только девятнадцать лет.</p><p class="p1">С ее приходом разговоры переменились. Заговорили об учебе, о детях, о кинематографе. Михаил Алексеевич рассказывал немецкую фильму про сомнамбулу. Наденька пила чай, грела крупные руки о чашку. Женя прятал под стол ноги в грубых солдатских ботинках. Кякшт рассказала, как репетирует Шарлотту Корде в революционном балете на музыку, бывшую прежде пасторальной симфонией Бетховена. Остромов молчал, разглядывая Наденьку так прямо, упорно и требовательно, что ей даже стало неловко; но грязи в этом взгляде не было, и потому она не встревожилась. Их представили, но он все молчал. Надя впервые услышала его голос, когда он спросил Михаила Алексеевича:</p><p class="p1">— Я, собственно, не просто так напросился. У меня дело.</p><p class="p1">— Весь ваш, весь ваш, — сказал Михаил Алексеевич.</p><p class="p1">— Мне сказал Константин Васильевич, — и он кивнул на Ломова, — что у вас были подшивки «Ребуса», мне бы любых годов, но чем старее, тем лучше. После Де Бруара его совершенно читать невозможно.</p><p class="p1">«Ребус» был французский эзотерический журнал, который в Петербурге выписывали весьма многие — не столько для опытов, сколько для забавы.</p><p class="p1">— Ах, было, — вспомнил Михаил Алексеевич. — У меня его еще осенью кто-то брал, помнится, что Алексей… вы не знаете. Я ему дам знать, он вернет, конечно. Зайдите дней через десять, у нас по пятницам чай…</p><p class="p1">Это было трогательно, по-семейному — «у нас по пятницам», да и вообще угол был теплый, гостеприимный; Остромов подумал, что надо выказать почтение Игорьку, похвалить его мазню и сделаться окончательно своим. Не то чтобы Остромов понимал в живописи, но для него было все мазня. Предлог явиться через десять дней был тем более хорош — сейчас у Остромова в Ленинграде была зацепительная стадия, как называл ее он сам; нужно было пустить как можно больше корней, назначить встречи, условиться о пересечениях, и не нужен ему толком был этот «Ребус», хотя оттуда можно было почерпнуть чудесные словосочетания, неотразимые для дурака, желающего поверить во что угодно.</p><p class="p1">К десяти Михаила Алексеевича уговорили сыграть — «только если Наденька споет»; Наденька сразу согласилась, и — «Зарю-заряницу, Зарю-заряницу!» — закричала Кякшт.</p><p class="p1">Голос у нее тоже был не и не — несильный, непоставленный, но и стихи были не таковы, чтобы петь их поставленным голосом. Михаил Алексеевич играл с легким дребезгом на инструменте, безупречно настроенном, но словно уже чуть надтреснутом, с жестяным призвуком; и Наденька пела, как пели на сельских дорогах или в дребезжащих вагонах.</p><div class="poem">
<div class="stanza">
<p class="v">— Заря-заряница,</p>
<p class="v">Красная девица,</p>
<p class="v">Мать Пресвятая Богородица!</p>
</div>
<div class="stanza">
<p class="v">По всей земле ходила,</p>
<p class="v">Все грады посещала, —</p>
<p class="v">В одно село пришла,</p>
<p class="v">Все рученьки оббила,</p>
<p class="v">Под окнами стучала,</p>
<p class="v">Приюта не нашла.</p>
</div>
<div class="stanza">
<p class="v">Ее от окон гнали,</p>
<p class="v">Толкали и корили,</p>
<p class="v">Бранили и кляли,</p>
<p class="v">И бабы ей кричали:</p>
<p class="v">«Когда б мы вас кормили,</p>
<p class="v">Так что б мы сберегли?»</p>
</div>
<div class="stanza">
<p class="v">Заря-заряница,</p>
<p class="v">Красная девица,</p>
<p class="v">Мать Пресвятая Богородица!<a href="ch2.xhtml#id5" class="a">[3]</a></p>
</div>
</div><p class="p1">Когда она допела и присела обратно к столу, сразу потянувшись к чашке чаю, заботливо налитого Женей, — все некоторое время молчали, и Кякшт, утирая глаза, сказала:</p><p class="p1">— Мне обидней всего, что нас наказали не за то. Я не смогу, может быть, сказать понятно… Мы жили неправильно, и роскошно, и мало работали, хотя я работала много, но, наверное, не так. Но наказали нас не за это. Нам досталось, я хочу сказать, не наше воздаяние. Как будто мы ели слишком много сладостей, а нас поставили таскать камни. Я говорю не о несоразмерности, а как бы о другом жанре. Как будто я первый акт протанцевала в декорациях ну хотя бы галантного века, и там кого-то отравила, ну хотя бы мужа, а во втором уже не балет, а драма, и не из галантного века, а из каменного. Но я не умею сказать…</p><p class="p1">— Почему же, — отозвался Альтер, — так и есть. Но вы напрасно думаете, что это ошибка. Перемена жанра и есть наказание. Это всегда так бывает, в первом акте танцуешь, а во втором камни. Можно пьесу сделать.</p><p class="subtitle">6</p><p class="p1">На обратном пути Поленов подошел к масону и, смущаясь, сказал:</p><p class="p1">— Прошу вас… на два слова…</p><p class="p1">Масон пожал руку Ломову, с которым намеревался отправляться восвояси, и с готовностью отошел с Поленовым к старой липе на углу Рылеева и Саперного. Ночной апрельский холод, казалось, вовсе его не беспокоил. Поленов мялся, не зная, с чего начать.</p><p class="p1">— Луна сегодня исключительно предвещающая, — сказал Остромов, непринужденно заполняя паузу.</p><p class="p1">— В каком смысле? — спросил Поленов.</p><p class="p1">— В двояком, — ответил Остромов. Он всегда отвечал прямо, чем немедленно располагал к себе. — В ассирийском гадании такая луна в третьей фазе предвещает беду царству и процветание магу; в римском говорит о внутренней войне, в цыганском же сулит удачу союзу, заключаемому в эту ночь, но горе будет тому, кто обманет.</p><p class="p1">— А что, есть и цыганское? — Поленов никогда о таком не слышал.</p><p class="p1">— В некотором смысле цыгане — самый гадательный народ, — пожал плечами Остромов. — Они не знают закона и сообразуются только с гаданием. Я путешествовал с цыганами одно время, хоть и недолго. Лунное гадание мне известно, а карточного я не изучал, потому что это всего лишь испорченное таро.</p><p class="p1">— Вы человек очень знающий, — искренне сказал Поленов, — и я вам доверяю, но не знаю, с чего начать.</p><p class="p1">— Начните с имени, — сказал Остромов, — так будет всего вернее.</p><p class="p1">— Моего? — переспросил Поленов.</p><p class="p1">— Не обязательно. Можно с имени человека, занимающего ваши мысли.</p><p class="p1">— Знаете ли вы Морбуса? — произнес Поленов, замирая. Он впился глазами в лицо масона и заметил в лунном свете, что непроницаемая маска чуть дрогнула, словно за тяжелой занавеской промчался беглец.</p><p class="p1">— Ежели вы имеете в виду Григория Ахилловича, то этого человека я знаю, — медленно выговорил Остромов.</p><p class="p1">— Да, его, — выдохнул Поленов.</p><p class="p1">— Чем же я могу служить вам? — Лицо Остромова несколько переменилось, Поленов поклялся бы, что Морбус масону неприятен.</p><p class="p1">— Это мой враг, — прошептал Поленов, — он отнял у меня все.</p><p class="p1">— Должен вам сказать, — помолчав, сказал масон, — что враг у вас могущественный.</p><p class="p1">— Я это знаю, — заторопился Константин Исаевич, — и если бы не это, не решился бы… но мне теперь окончательно ясно, что всему виной он.</p><p class="p1">Остромов смерил его оценивающим взглядом. Что-нибудь женское, скорей всего жена. Сам Бог посылает этого маниака. На таких людях и созидаются новые церкви.</p><p class="p1">— Что же собственно вам угодно? — спросил Остромов участливо. — Следует знать, что в такие ночи, как эта, хорошо начинать справедливое дело, но опасно — дурное.</p><p class="p1">Он был мастер на такие формулы, подходящие к любой ночи во всякое время.</p><p class="p1">— Дать мне он не может ничего, — сбивчиво заговорил Поленов, — и я ничего не хочу, кроме справедливости. Он отнял дочь.</p><p class="p1">Все правильно, подумал Остромов.</p><p class="p1">— Дочь вернуть нельзя, но я хочу, чтобы он не смел жить. Я хочу разоблачения, не отмщения, а только чтобы он больше не смел. Ведь есть другие, он может увлечь и погубить. Она в последний год ходила к нему, повесила на постели знак. Потом захотела выйти из его власти, и тогда он решился. Если вы его знаете, вы должны знать, какой это человек.</p><p class="p1">— Это страшный человек, — раздельно произнес Остромов.</p><p class="p1">— Но вы можете, я верю. Мы вместе можем, — бормотал Поленов. Он почти не пил у Михаила Алексеевича, но был как пьяный. — Вы просто мне посланы, никто другой не верит. Если бы вы взялись, я был бы раб ваш, я взял бы на себя исполнение. Но один я не могу, он обладает защитой. У него свой круг…</p><p class="p1">— Круг легко построю и я. При вашем содействии я мог бы… Совокупными усилиями мы остановили бы их. Но поймите, — Остромов поднял палец, — внутренняя война! Братья и так разделены, и время для нее сейчас не лучшее.</p><p class="p1">Поленов молчал, понимая, что не вправе осложнять жизнь и без того гонимых братьев, но нечто подсказывало ему, что просьба Остромову приятна.</p><p class="p1">— Однако если кто из братьев употребляет тайную власть во зло, — твердо сказал Остромов, — не нужно ли со всею решимостью иссечь больной член? Вот вопрос, который я ставлю и на который я хочу ответа. Знак, я хочу знака! Ancor, amicar, amides, theodonias, anitor! In subitam!<a href="ch2.xhtml#id4" class="a">[4]</a> — и простер длинную руку вперед, указывая куда-то за спину Поленова.</p><p class="p1">В качестве знака сгодилось бы что угодно, хоть протарахтевший мимо поздний автомобиль, но улица Рылеева, как назло, была пустынна. От Михаила Алексеевича редко расходились раньше второго часа ночи. Хоть бы пьяная песня из окна, хоть бы драка в подворотне. Но город отсыпался перед рабочим днем, и на луну, которая уж могла бы расстараться для такого случая, не наползало ни облачка. Остромов закрыл глаза и пошатнулся, и грянулся бы оземь, если бы Поленов не подхватил его.</p><p class="p1">— Castor adefinitum potentiam, — сказал Остромов слабым голосом. — Мне не следовало спрашивать об этом без защиты. Благодарю вас.</p><p class="p1">— Что, что они сказали? — лепетал Поленов.</p><p class="p1">Остромов прислонился к липе.</p><p class="p1">— Они сказали, что это может стоить мне жизни, но выбора у меня нет. Я должен стать вашим союзником, и значит, нам суждено с Морбусом доигрывать драму, начатую четыреста лет назад.</p><p class="p1">Тут он соврал: десять; но что для вечности эта разница?</p><p class="p1">— Теперь мне некуда отступить, — как бы в трансе проговорил Остромов. — Но поймите, я один… против меня могущественнейшая школа Европы. Если мы не наберем своего круга, я не могу себе представить победы. Он раздавит вас, как орех.</p><p class="p1">— Есть верные люди, — забормотал Поленов, — я найду…</p><p class="p1">— Но кто-нибудь из этих? — спросил он, кивая на окно Михаила Алексеевича.</p><p class="p1">— Возможно, и среди них… но в общем, — гордясь доверием, лепетал Поленов, — народец гниловатый. Я найду, клянусь, если только вы остановите…</p><p class="p1">— У меня нет теперь выхода, — скорбно сказал Остромов. — Ведь вы видели?</p><p class="p1">Поленов видел только, как он шатался, но лихорадочно закивал.</p><p class="p1">— Я дам вам знать, когда буду готов, — пообещал Остромов. — Мне нужно теперь вооружиться — вы понимаете?</p><p class="p1">— Понимаю, все понимаю.</p><p class="p1">— Я протелефонирую вам не раньше мая. Ничего не предпринимайте. Назовите ваш номер.</p><p class="p1">— Я запишу, — Поленов принялся рыться по карманам в поисках карандаша.</p><p class="p1">— Назовите, — повелительно сказал Остромов. — Писать ничего не нужно, у меня абсолютная память.</p><p class="p1">— Б-13-28, — прошептал Поленов.</p><p class="p1">— И запомните: между нами теперь есть связь особого рода. Вы присутствовали при adefinitum potentiam, а это не шутки. Начинайте искать людей, ничего не говоря. Первая встреча должна быть в середине мая.</p><p class="p1">Остромов повернулся и величественно удалился в сторону Знаменской. Начало было определенно обещающим. Настораживало одно: никакого знака. Впрочем, разве знаком не был сам этот дурень, посланный ему в первую же ленинградскую ночь? Но легкое неудовольствие оставалось, пока он усилием воли не перевел мысли на девушку в свитере с растянутым воротником. Здесь он ясно видел: что-то будет; в таком не обманывался.</p><p class="subtitle">7</p><p class="p1">В это время Даня не спал в комнате своего дяди Алексея Алексеевича, потому что пропустил время, когда хотелось спать, и пребывал в лихорадочном состоянии между сном и бодрствованием, когда в голову приходят самые невероятные мысли, но им не удивляешься, потому что внушаешь себе, что это те же сны и во сне все можно.</p><p class="p1">Они проговорили до часу, несколько раз желая друг другу спокойной ночи и вновь возобновляя разговор. Выпито было бессчетное количество чашек крепкого чаю — дома чай почти не пили, предпочитали отвары местных трав, — рассмотрено и отвергнуто множество вариантов устройства даниной судьбы, подробно обсужден выбор факультета и шансы — дневной, разумеется, при его происхождении не предполагался, хотя рискнуть стоило, каждый год на экзаменах ожидали послаблений; ничего, вечерний не хуже, он найдет работу — например, в «Красной газете», где у Алексея Алексеевича были приятели, или в крайнем случае через Ноговицына. Ничего, не пропадет, Алексею Алексеевичу все представлялось легким, и Дане легко было в его присутствии.</p><p class="p1">Особенно хорошо с ним было потому, что он любил мать больше, чем отца, родного, казалось бы, брата, — и похож странным образом был на нее: та же легкость выдумки, та же беспричинная радость, ведь так неблагодарно бывает вечно требовать и ворчать. И это довольство малым — не от страха, но от сознания, что бывает хуже, особенно с нами, которым так многое дано.</p><p class="p1">Даня чуть не расчувствовался, но держал себя в руках, как надлежит мужчине.</p><p class="p1">Впрочем, Алексей Алексеевич был не чета отцу и не требовал мужественной сдержанности. Напротив, он всячески поощрял Даню к рассказам о матери, о Кириенко, о Судаке, о даниной ритмической теории («Знаешь, чрезвычайно любопытно, немного в духе эвритмизма, если ты слышал»), о журнале, который Даня с матерью рисовал для малолетнего Валечки, о Жене и даже о странном попутчике. «Ты сейчас и не таких оригиналов навидаешься. Откуда только повылезли. И вот что я тебе скажу: надо, казалось бы, радоваться. Но я радоваться не могу, потому что при военном коммунизме была какая-то холодная прелесть, как после эфира, Боже тебя упаси пробовать. А сейчас все это как будто гроб повапленный, все ненастоящее, словно ожили после смерти. И среди этого ходят люди, очень умеющие поживиться. Главный тип — я сказал бы, главтип, — стал сегодня авантюрист». Даня захохотал: ему представился Главтип, где выпускают типов, одних отвергают за недостаточную типичность, другим придумывают для типичности пару любимых словечек, матросское или солдатское прошлое, штемпелюют лоб — и пошел гулять по улицам и страницам. «Ты не смейся. Я устал, что все ужасное вытесняется мерзким. В четырнадцатом было плохо, но по-человечески. В восемнадцатом еще хуже, но как-то сверхчеловечески. Сейчас плохо бесчеловечески, и что самое странное, Даня, я чувствую, что будет и нечеловечески».</p><p class="p1">Они долго перебирали факультеты. Сам собою предполагался филологический, но на него отбор был особенно жесток, словно к книгам можно было теперь допускать только безграмотных — остальным они не нужны, и так начитались. Что же, может быть, история? Но история принадлежит теперь ее хозяевам, жертвам знать ее не положено — пусть считывают по шрамам на собственной шкуре. К математике душа не лежала вовсе, физика привлекала только чудесами радио, которые тут же перестанут быть чудесами, если их поймешь. География? — зачем она теперь, когда никуда не уедешь? Теперь и география стала экономическая, из всего ушел праздник. Вместо голых туземцев, беспечных Паганелей, шипастых тропических плодов были сплошные ресурсы, передел мира на последней стадии, спрутообразные тресты, оплетающие континент за континентом. От этого неудержимо клонило в сон. Юриспруденция и прочее крючкотворство были отвергнуты с порога. Счастье, что открылся психологический факультет, куда и отправляли всех, кто не определился с пристрастием: видимо, за пять лет обучения студент должен был понять наконец, чего ему хочется, и сосредоточиться на любимом предмете… да поздно, второе образование запрещено! Так в конце жизни понимаешь наконец, что надо было делать, — но рассказать об этом не успеваешь уже никому. Что ж, психология даже лучше филологии — Даню давно интересовал феномен детства, он много думал о прапамяти и легко восстанавливал в уме первый год собственной жизни; те впечатления были слишком сильны, конечно, чтобы их помнить как следует, — их могла выдержать только младенческая душа, теперешнюю они бы разорвали, — но причины нынешних радостей и страхов он отыскивал в младенчестве легко, не прибегая к снам или рассказам родителей. Все было живо, стоило убрать барьер и погрузиться в мир невыносимых страстей и величайших открытий.</p><p class="p1">— Так что, психология?</p><p class="p1">— Начнем все же с филологии, и если не выйдет…</p><p class="p1">— Вечернее отделение ничуть не хуже. Работу найдем, а после первого курса…</p><p class="p1">— Дядечка, я готов работать и после первого.</p><p class="p1">Тут в замке завозился ключ, а в коридоре послышалось шуршанье и бурчанье Поленова. Он был возбужден, ему не терпелось рассказать о масоне, но он был связан клятвой. Ничего, приятно бывает и намекнуть.</p><p class="p1">— Да-с, Алексей Алексеевич, — приговаривал он, — бывают еще такие люди, что… Я вижу, у вас свет: так я по-соседски. Бывают еще люди действия и непрестанного работающего ума, умеющие с первого взгляда все понять про первого встречного…</p><p class="p1">Алексей Алексеевич не стал расспрашивать Поленова, что за люди и где он их взял. Поленов был в трансе, и для чего же будить страдальца? Недели через две сам расскажет. Все лучше, чем мрачная сосредоточенность; глядишь, и выберется. В Поленове после странного знакомства проснулась деликатность, и он, покашляв, словно самому себе намекая, что пора и честь знать, отправился спать. Наконец улеглись — дядя на диване, Даня на матрасе в его комнате, прямо под многоэтажными книжными полками, но к этому времени он дободрствовался до полусна.</p><p class="p1">Это было лучшее состояние, но болезненное; мысли, приходящие в такое время, могли быть целительны и плодотворны, а могли завести в черный тупик, из которого долго придется пятиться. Правду говорил попутчик: в дороге душа беззащитна. Сейчас она словно вышла в открытое пространство, на котором многое видно, но увидеть можно и такое, после чего не уснешь, а то и жить не захочешь. Даня про себя называл это чувство за-бодрствованием и легко в него входил, поклевав носом, а потом заставив себя очнуться; иногда после этого являлись лучшие стихи, но чаще — особенно изощренные кошмары. Поскольку весь день он особенно много думал о матери, пытаясь смотреть на город ее глазами, то и теперь мысль его сосредоточилась на ней, вышла из-под спуда и устремилась к тому главному, без чего он больше всего тосковал. Мать была не просто мать — в ней была его связь со всем, что он любил, через нее пришло все главное, и ему не терпелось рассказать ей все, уложив наконец в единственно правильные слова. Они встречались, представлялось ему, в какой-то лечебнице вроде той, куда она попала однажды в двадцать первом году по ходатайству друзей «со связями»: все, что они смогли сделать проездом из Москвы в Ялту, остановившись в Судаке, — это выдать рекомендацию в новооткрывшуюся санаторию, куда отправляли теперь исключительно пролетариев, но для матери, у которой подозревали туберкулез, нашли на две недели отдельную комнату; это была единственная ее просьба — чтобы ни с кем, иначе все лечение даром. Лечебница была в Мисхоре, в бывшей санатории Дубина, и даже персонал собрался тот же самый, а Дубин получил охранную грамоту. По слухам, он пользовал самого Цюрупу, подбирая ему свои знаменитые травные отвары. Мать их называла тварными отравами, но пила. Даня приезжал к ней, она старалась отдать ему обед, он отказывался, смешно боролись, наконец поделили жалкую хлебную котлетку.</p><p class="p1">Теперь она будто была в лечебнице вроде прежней, и он приезжал навещать. У них было очень мало времени, надо было успеть все сказать, но говорить было нечего, потому что миры их были теперь разные, и происходящее в одном ничего не значило для другого. Надо было успеть насмотреться, напитаться друг другом, и Даня изо всех сил старался сделать вид, что все хорошо. Мать тоже доказывала, что все хорошо, но он чувствовал, что ей там не лучше, а то и хуже, чем ему, и начал уже роптать, потому что ей, столько перетерпевшей здесь, не может быть плохо там, иначе он знать не хочет никакого Бога; однако оказывалось, что и Бог может не все, и все, включая директора лечебницы, трепещут перед каким-то другим, более высоким начальством, каким-то местным Цюрупой, который пьет их отвары, но миловать не спешит. Самое же главное состояло в том, что у матери там было очень много работы и не самые приятные соседи, но почему-то ее призвали именно к этой работе и именно в этом соседстве, больше некому. Ей надо было охранять какой-то ответственный участок, и она страшно уставала на этой работе, ничего себе отдых и лечение, — но после важного задания должны были перевести наконец в более приятное место. Она изо всех сил старалась сделать вид, что не утомлена, и эта их жалкая, взаимная святая ложь была всего невыносимей. Наконец ему надо было уходить, — он хотел остаться, но не мог, и чувствовал, что ему тоже предстоит еще сделать нечто, и что от этого зависит ее пребывание там. То есть не только они влияют, но, оказывается, и мы. На прощание она ему сказала, наморщив лоб, как часто в последнее время, когда забывала прежние слова (удивительно, каким это было общим признаком — все путались, теряли часть памяти, ненужной в сократившемся мире): да, вот еще что… когда почувствуешь, что не можешь доехать до места, — пожалуйста, не удивляйся. Это я еще как-нибудь смогу. Хорошо, сказал он, не удивлюсь. Да, да, сказала она; это я смогу.</p><p class="p1">Он очнулся, увидел медленный белый рассвет и дядино небритое, мученическое лицо с открытым ртом. Во сне все переставали притворяться, и видно было, чего им стоила жизнь. Даня неудержимо и беззвучно заплакал, перестав притворяться взрослым, и с облегчением от слез пришел сон.</p></span></span>
