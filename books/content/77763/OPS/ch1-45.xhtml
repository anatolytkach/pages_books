<p class="p">Глава двадцать первая</p>
</div><p class="subtitle">1</p><p class="p1">С тех пор он не летал довольно долго — главным образом потому, что не хотел убедиться в ошибке: все могло привидеться, да и бессонница в последнее время довела его до того, что он иногда среди бела дня разговаривал с самим собой или воображал облачные города. Но странное дело — чувство вины исчезло, словно новый дар искупил все его прежние грехи и вернул ему право жить; значит, ничто не привиделось и могло повториться, и каждый шаг его сопровождало чувство тайной собственности.</p><p class="p1">Следующий полет случился в марте, ясным, почти весенним по свету, но все еще холодным и снежным днем, на розовом закате. В отличие от первого, этот второй полет сопровождался тонким чувством счастья, обволакивавшим Даню уже с утра, с рассвета. На обратном пути было так хорошо, что он несколько остановок прошел пешком, жуя рыхлый снег, с наслаждением чувствуя, как ботинки пропускают воду — признак скорого таянья. В парке с веток тяжело опадали подтаявшие снежные грозди. Даня пожевал уцелевшее кислое яблочко, промороженное насквозь, и всерьез думал некоторое время, что яблочко способствовало взлету.</p><p class="p1">Было так: он проходил мимо окна желтокирпичного дома недавней постройки и вдруг услышал, что на втором этаже играют Баха, «Итальянский концерт», вторую часть. Он сразу узнал эту музыку, и узнал не памятью, а всем существом. Он помялся немного на месте, утаптывая снег, и когда в ровное топтание вступления пробилось вдруг божественное ля-соль-ля, как вскрик счастья и узнавания, и начало кругами восходить, разворачивая гирлянду спиралевидных ступеней, — он без малейшего усилия пошел по этим ступеням, в тающем розовом свете, в мокром снегу, в легком запахе отсыревшей коры. Все постепенно становилось этой темой, то есть она пропитывала собою мартовский сквер, потому что в ней было и то, и то, и это: бралась нота — и проступал клен, снегирь, мальчик с огромным портфелем, идущий из школы, вероятно, с кружка. И как мир, подчиняясь музыке, строился из ее сцеплений, так под каждый шаг Дани сама собой подскакивала ступенька.</p><p class="p1">Воздух оказался полон углов, ступеней и поворотов. Он дивился, как прежде не замечал его структуры, но тут же поправил себя: ведь замечал. В детстве, когда перед глазами вдруг мелькало что-то вроде слоистых плоскостей, прозрачных, сланцевых стен. Тогда ему казалось, например, что в воздухе можно спрятаться, то есть войти в такую щель, откуда ты уже не виден. Просто не от кого было прятаться тогда, а то бы попробовал. И сейчас он видел эти щели и складки, некоторые из которых были ловушками, а другие — убежищами; но не было пока повода. С какого-то момента земля перестала быть видна, но музыка не переставала, хотя от окна, за которым счастливейшая женщина (он видел это) играла концерт, он был уже чрезвычайно далеко. Дело в том, что музыка была не музыка в собственном смысле, а именно указание по восхождению, чертеж спиралевидных лестниц, по которым он, прыгая с одной на другую, хроматически восходил: при шаге с лестницы на лестницу возникала как бы легкая хромота, и отсюда «хроматически». Это было теперь совершенно понятно. Музыка была описанием того, что с ним происходило, каждая ступенька была клавишей, и, восходя, он сам уже извлекал этот звук, боясь только, что анданте кончится. Но оно уже не кончалось, он мог идти сколько хотел. Ритм был такой: четыре шага вверх, потом все-таки немного вниз, чтобы перепрыгнуть на следующую восходящую, — но тут в центр полукруга просачивался луч, и дальше можно было идти вдоль него. Даня подумал вдруг, что тут не без «Болеро», не без ритмического сходства, и тут же вошел в структуру болеро, отчего воздух заметно потеплел.</p><p class="p1">Плавали дымные тучки. Он впервые видел вокруг пространство первого эона, о котором столько разговоров. Некоторым его ритмическая туманность напоминает пространство лирики, и некоторые в лирике только этим пространством и ограничиваются, но это лишь приблизительное, процентно небольшое — кожура апельсина — вступление к действительным фазам, из которых можно что-то почерпнуть. Сам же первый эон скорей идеальное место отдохновения для слабой души, утомленной давлением мира, — но, отдохнув в нем и надышавшись его снежной, туманной свежестью, надо двигаться дальше. Ошибка тех, кто раз попал туда дуриком, состоит в восприятии первого эона как окончательного: мол, все уже сделано. Для преодоления этого предбанника истины нужно по-своему не меньше усилий, чем для первого взлета вообще, но эти усилия, конечно, иного рода — как разные дарования требуются от штангиста, преодолевающего тяготение, и жонглера, работающего с ним же, но иначе. Однако Даня, наслаждаясь облачной туманностью и, по контрасту с ней, геометрической четкостью восхождения, с самого начала помнил, что тут не предел и надо будет двигаться дальше. Пока же он осматривался, впивая снежную, дивную скуку этого бесконечного, как всякая горизонталь, пространства и наслаждаясь разнообразием необязательных, калейдоскопных облачных конфигураций. Мелькало черное и зеленое, первая лапчатка на весенней земле, но в разрывах, в фонах: основное действие разворачивалось в облачности и не имело ни конца, ни начала.</p><p class="p1">Сказать, чтобы там плавало всепрощение и чтобы анданте выражало его же, было бы так же плоско, как вообще что-нибудь сказать. Но мысль работала ясно, нуждаясь в словесном оформлении все меньше, как и Даня все меньше нуждался в ступеньках, чтобы парить. Там было не прощение, конечно, и не безразличие: какие чувства испытываем мы к занавесу, когда он поднят? На нем что-то было нарисовано, на нем фигурки решали свои фигурочные дела, там что-то очень много было красного в разных модификациях от алого до охристого, орхидского, — но он поднялся, и там совсем другое. Никакого отношения, никакой связи с кривляниями этих фигурок. Разломы, если они намечались (тут же срастаясь), происходили по другим линиям — тем самым, от которых только отвлекал занавес. Многое, однако, намекало на реальные вещи — выше, во втором эоне, куда отчетливо тянуло, но еще отчетливей не пускало.</p><p class="p1">Встречавшиеся ему сущности — то есть, проще говоря, люди, дуриком залетевшие в первый эон, — сильно отличались от того, что он ожидал увидеть. Он полагал, что там будут наивные искатели вроде него, но с тихой печалью заметил, что это было умственно отсталые дети, неспособные вглядеться в сложные хитросплетения занавеса и потому проникавшие сразу за него, а также в некотором количестве пьяницы и прогульщики. Эти люди всегда пребывали в первом эоне, спускаясь на землю только за добавкой. Что вокруг — они не понимали, но понимали, что тут хорошо.</p><p class="p1">— Э, — обратился один из них к Дане на небесном, вялом языке первого эона. — Э, а? Уаык…</p><p class="p1">— Да-да, — ответил Даня мимоходом.</p><p class="p1">— Э! — возмутился пьяница, недовольный тем, что его не выслушали. — Я грю, уы… Уыа — ыаык?</p><p class="p1">— Нет, я по другому делу, — сказал Даня.</p><p class="p1">Внимание его в этот миг привлекла блеклая, тонкая фигура в облачной грозди, свисавшей, как виноградная, и в ней, среди лепной выпуклой белизны, темнел женский силуэт. Даня приблизился, уже без всякого ритма, ибо перемещения внутри эона напоминали что-то среднее между ползанием и полетом, пластунский полет в облачном пласте, — и увидел ту, которая в самом начале нашей истории освободила ему место. Мы заметили тогда, что и рады бы отпустить ее с миром, сказавши, будто никто ее с тех пор не видел, — но это была бы не правда, а мы стремимся к правде, хотя бы к той части ее, какую можем выразить. То была пишбарышня Ирочка, — но на что же она, читатель, была теперь похожа!</p><p class="p1">Вся фигура ее, как и на земле, выражала скрытое беспокойство. Она понимала, что дольше положенного задержалась на промежуточном этапе, — но не находила ни решимости, ни сил перепорхнуть на следующий. Так иной дурак случайно попадает в первый эон, понимает, что едва пересек порог, но идти дальше не отваживается, ибо все его силы ушли именно на преодоление порога, — и хотя там, дальше, открылись бы блаженства, а потом, как знать, и цель, которую он столько лет понапрасну искал в своей дурацкой жизни, на следующие шаги его уже не хватает. И он зависает в этом пространстве, то впадая в несколько экзальтированное блаженство, то изнемогая от непонятной тревоги. Ирочка большей частью пребывала в тревоге. Она залетела сюда, конечно, не по праву, не по левитаторским заслугам и способностям, а лишь по совершенной безответности, — как иногда несчастья и дурака делают умней, но это ум не высшей пробы. Избитый заяц зажигает спички, но не может зажечь бенгальский огонь, не говоря уж про сварить обед.</p><p class="p1">— Здравствуйте, — сказал Даня.</p><p class="p1">— Ах, это все совсем не так и не то, — ответила она. — Вы любите шоколад? Сегодня удивительно ветрено. У меня в детстве была такая игрушка. Я как-то странно сегодня. Вы мне кажетесь я вас детство видеть. Тогда были поля, луга, земляника, довольно много роз. Ауы, уэа.</p><p class="p1">Он понял. На первые фразы ее земного запаса еще хватало, но дальше начинался чистый распад, райский ад, смутная тревога и припадки эйфории, столь естественные для не сознающей себя души. Вот что бывает с тем, кого унесет, с тем, кто взлетит помимо воли, с тем, у кого есть дар, но нету ума. Можно было бы спасти дело, повернув при взлете налево, но она пошла направо, и поминай как звали. При этом у нее отрастали уже когти, и вообще было в облике что-то птичье. Ночевала она на чердаках, спала вниз головой. Милиция давно на нее рукой махнула.</p><p class="p1">Даня осторожно отошел и принялся спускаться широкими полукругами, не забывая, однако, всякий раз поворачивать налево; и когда очнулся, женщина на втором этаже доигрывала анданте: ля, ля, и как бы с сожалением — ре. И ботинки от долгого стояния в облачном обморочном талом снегу промокли насквозь.</p><p class="subtitle">2</p><p class="p1">Жажда новизны оказалась в эти дни почти невыносима, а в следующие невыносима вовсе. Она была тактильной, физической. Он понял наконец смысл слов «все существо»: все его существо, каждая пора кожи, жаждала прорыва, как воды. И когда вода хлынула в эту иссохшую пустыню, пустыню, в которой Варга танцевала дракона, — она показалась сначала недостоверной: он принял ее за очередной самообман, оазис. Лишь постепенное истончение всех границ — не исчезнувших, но ставших условными, как на карте, — убедило его, что обещанное свершилось.</p><p class="p1">Он летал теперь часто, хотя, разумеется, не ежедневно, используя для восхождений разное — то партиту, то застрявшую в памяти считалку, а один раз так славно было за окном, в маятном просыпающемся апреле, что взошел по ступенчатым строчкам радионовостей: на известном уровне все годится. Однако чем свободней стали эти взлеты, тем отчетливей обозначился предел: его не пускали во второй эон, и трактаты говорили об этом недвусмысленно. Решительно все, что получил он от Клингенмайера, указывало на необходимость действенной помощи. «Быть может, последнее, что может сделать учитель, — есть передача числа, без которого второй переход невозможен. Это последнее, что может сделать для вас только избранный вами руководитель; первая встреча есть выбор, последняя есть прощание. Получив число, вы навеки прощаетесь с руководителем вашего начального опыта; сам ученик так же не может постичь числа, как не может превзойти учителя. Получив оное, он более не ученик. Так следует понимать известную максиму Пифагора о том, что число есть начало и конец всего».</p><p class="p1">Не было надежды обмануть стражу, поскольку стража оберегала вход без особенного рвения и даже против воли, а просто потому, что не могла иначе. Задачей этого эгрегора — земной аналог которого был для Дани покамест загадочен, — было стоять на пути у всякого метафизического поползновения. Еще можно было попасть в помраченное, промежуточное сознание первого эона, но прорваться дальше нечего и думать было без числа. Число могло быть простое, а могло иррациональное; Даня голову сломал, подбирая его, как Безухов, по числовым значениям букв — Даниил Галицкий, Даниил Ильич Галицкий, ученик Галицкий, — но все было тщетно. Число без передачи не действовало, и даже если б он подбором нашел то самое число — все равно невидимая завеса отделяла бы его от главного; а в одних левитациях, уводивших в туманный край, не было никакого толку. Все те же графоманы, прогульщики и пьяницы. Несколько месяцев он находил в этих полетах блаженство, но острей блаженства было сознание его недостаточности. Это было похоже на неутоленные поцелуи.</p><p class="p1">Что-то странное делалось со сном: он думал сначала, что виновато невыносимо жаркое лето, но потом понял, что сам не нуждается теперь в прежних количествах сна, что довольствуется двумя-тремя беглыми полуобмороками, из которых легко возвращается к бодрствованию. Сон мог настигнуть на улице, мог — в трамвае или на службе, где Карасев смотрел без осуждения, но и без сострадания. Вообще в его взгляде появилось нечто новое, вроде тайного одобрения, смешанного с тревогой. И Даню было за что похвалить — он теперь с удивительной легкостью заполнял таблицы со сложными процентами: на что раньше уходили часы — теперь тратились минуты.</p><p class="p1">— А вы не думайте, — сказал однажды Карасев, — это все вещь непраздная. Может, ею все держится, — и показал на какой-то лиловый, через копирку, план подвала.</p><p class="p1">— Конечно, — машинально сказал Даня.</p><p class="p1">— Кто-то же должен… учитывать, — трудно, через паузу, выговорил Карасев, и щека со шрамом дернулась — то ли в усмешке, то ли в гримасе легкой брезгливости.</p><p class="p1">Отец писал редко, и понять из этих писем можно было только, что Валя хороший сын, а Даня плохой. Даня уехал, а Валя остался. Даня работал неизвестно кем, а Валя готовился на врача. Валя вступил в комсомол. Валя интересовался воздухоплаванием, строил дирижабли, а Даня, писал отец, никогда не станет воздухоплавателем. Даня улыбался, отвечал аккуратно, но скупо.</p><p class="p1">А в мае двадцать седьмого года умер от грудной жабы Алексей Алексеевич Галицкий, человек надеющийся. Он с утра чувствовал себя нехорошо, но понадеялся, что обойдется. Встал, пошел по обыкновению в театр, репетировал. Ставили чудовищный «Бронепоезд». На словах «Вышвырнула нас Россия… не нужны-ы-ы», которые полагалось ему в качестве командира бронепоезда выхрипнуть в пьяном томлении, он в очередной раз понадеялся, что отпустит, но потерял сознание и больше его не находил.</p><p class="p1">Человек всю жизнь думает, что такое смерть, а это ничего особенного. И нечего надеяться.</p><p class="p1">Так Даня остался один и даже не слишком скорбел об Алексее Алексеевиче, потому что даже в первом эоне уже знал, что — ну, словом, неважно. Отвечать на неправильно поставленный вопрос не имеет смысла, этим и так занимаются людишки на занавесе, бесконечно убивающие друг друга. Жалко было Алексея Алексеевича, но ведь это не был Алексей Алексеевич.</p><p class="p1">Вместе с тем в двадцать седьмом году в нем оставалось еще достаточно человеческого, в том числе тоска по Наде, вспоминавшейся часто и ясно. Она снилась, во сне всегда жаловалась — горько, беспомощно и безнадежно. Мать ее молчала в ответ на все расспросы, потом перестала открывать ему дверь, а потом переехала. Он не сказал бы точно, когда — время стало разреженное, он плохо ориентировался в нем. Он пошел даже к ней в институт, долго искал на жаре, заранее знал, что ничего не скажут, — и не сказали: она была словно вычеркнута отовсюду.</p><p class="p1">В скверике около медфака встретил он Зильбера. Тот толковал с молодым человеком помладше себя, больше похожим на Зильбера, чем сам нынешний Зильбер. Это был его младший брат, многообещающий вирусолог, уже на третьем курсе догадавшийся о вирусной природе шизофрении и ставивший знаменитые на весь Ленинград опыты на шимпанзе. Шимпанзе у него заражались безумием друг от друга, как люди в воодушевленной толпе; опыты были красноречивы, и скоро их прикрыли.</p><p class="p1">Даня поздоровался. Он видел Зильбера единственный раз, в «Красной газете». Почему-то Зильбер узнал его.</p><p class="p1">— Ну как вы? — спросил он. — Пишете?</p><p class="p1">— Нет, зачем же. А вы?</p><p class="p1">— Я пишу, но плохо, — сказал Зильбер с обычной для своего круга прямотой. — Надо другое, а приходится делать Вальтер Скотта.</p><p class="p1">— А вы что бы хотели? — заинтересовался Даня. Он давно не говорил с прямыми людьми.</p><p class="p1">— Я бы хотел сказку, — признался Зильбер. — Гофмановского склада.</p><p class="p1">— Так чего же проще?</p><p class="p1">— Не знаю. Хорошо было Гофману, тот мир был набит чудесами.</p><p class="p1">— Напишите о летающих людях, — предложил Даня заговорщицки. — Летают — прямо страсть.</p><p class="p1">— Интересно, — равнодушно сказал Зильбер. — От кого летают — понятно. Можно даже, знаете, — он начал увлекаться, потому что не отвык еще загораться от первой спички, — сделать страну, откуда легче улететь. Потому что в ней совершенно невыносимо находиться. Желающие летать едут туда. На этом туризм.</p><p class="p1">— Вот видите, — сказал Даня.</p><p class="p1">— Обдумаю и напишу, — без большой уверенности сказал Зильбер. Обдумывал сорок лет, но написал; разумеется, описанный им способ левитации не годится, но ряд догадок интуитивно верен и годится в качестве первой инициации.</p><p class="subtitle">3</p><p class="p1">Даня долго не решался написать Тамаркиной, ибо не знал, какой взять с нею тон. Она казалась ему почти святой — волшебная неофитка, с первых уроков продвинувшаяся дальше первых учеников, аристократов и книжников. Наконец он решился и получил от нее необыкновенно радостное, доброе письмо — он опасался подозрений с ее стороны, но какие же подозрения могли быть у Тамаркиной. Она продвинулась необычайно далеко. Сферой ее занятий было установление связей, и у нее теперь была беспроводная линия не только к сестры, но и к покойному деду, и к старику, обучавшему ее премудростям. Старик был бородатый, говорил кодами — она научилась уже считывать его телеграфные послания. Судя по всему, с нею связывался сам отец беспроволочной телеграфии Жан Бодо. Понять из пояснений Тамаркиной, как именно она это делает, Даня не мог: она сообщила лишь, что с ним пока не в состоянии связаться, и виноват в этом климат, «а себя не вини голубок», прозорливо добавляла Тамаркина. Вместе с ней в Ташкенте были Дробинин и Мартынов, Мартынов работал в сельскохозяйственном институте и чрезвычайно успешно растил хлопок, думал остаться навсегда. Дробинин спивался. А Измайлов, приехавший вместе с ними, по сердечной болезни добился перевода в Кострому, где не так жарко.</p><p class="p1">Тамаркина почти ни с кем связей не имела — исключая, конечно, деда, Бодо и мыслительных писем к сестры, — но Мартынов был дружен с Савельевой и через общих знакомых нашел ее адрес. Этот пензенский адрес Тамаркина и прислала Дане, наказав кланяться «всем нашим». Сама она работала над установлением связей с кружком, но получалось худо: все теперь по-разному, каждый особенный, писала она. Теперь уж и не собрать нас, писала она.</p><p class="p1">Даня тут же написал Савельевой с единственной просьбой: если она знает хоть что-то о Наде и об учителе, пусть ограничится хоть беглым указанием, и больше он не станет ее тревожить. Но Савельева отозвалась неожиданно радостным и длинным письмом, где много вспоминала о кружке и рассказывала о своих пензенских успехах. Она работала теперь в театре, писала детское. О Наде она не знала ничего, а Остромов, писала она, здесь, в Пензе, но собрать кружка уже, конечно, не может, поскольку видите сами, как это теперь не поощряется. В остальном же, утешала она, пензенская жизнь неплоха, не хуже петербургской, только трудно без милых лиц, и если бы Даня летом оказался в Пензе, где чудная природа, Савельева была бы очень рада. Даня повторил вопрос о Наде, и она твердо ответила: ничего. Надю словно ластиком стерли.</p><p class="p1">Что же, подумал Даня. Я знал, что меня теперь ведут, но не предполагал, что так заботливо. Разумеется, учитель не мог никуда пропасть. Учитель был не из тех, что бросают своих.</p><p class="p1">И в июне, предупредив Карасева, он плацкартой отправился в Пензу, о которой знал только, что стоит она на юге и что вернется он оттуда другим.</p></span></span>
