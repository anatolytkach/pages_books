<p class="p">Глава двадцатая</p>
</div><p class="subtitle">1</p><p class="p1">Мир распался, ибо рухнули последние скрепы, удерживавшие его. Все было теперь по отдельности, и каждый осколок впивался собственной болью.</p><p class="p1">По-своему болели утренние толпы, спешащие на службу, на заводы, в депо, на безрадостный, ненужный труд, — толпы, выдыхающие на морозе густой пар страха. И когда Даня, впервые зимующий на болотном севере, становился частью этих стад и трясся вместе с ними в трамваях, он понимал, что пришли последние времена, ибо вечно так продолжаться не могло.</p><p class="p1">Иначе болели вечерние толпы, выжатые досуха, отдавшие ненасытным хозяевам всю жидковатую, чахоточную силу. Никто не мог бы насытиться такой пищей. К вечеру словно теплело, не так резко чувствовался мозжащий ленинградский холод, словно тягловому скоту удавалось под конец угрюмого дня вызвать у пастуха брезгливо-сочувственную улыбку, и так же, с брезгливым умилением, расчищалось небо, темневшее теперь к пяти вечера, и нависало беспримесной, безоблачной чернотой. И Даня понимал тогда, что последних времен не будет, больно жирно, — конец света надо заслужить, а где нет света, нет и конца.</p><p class="p1">И все ненавидели друг друга. Каждый присматривал за другим, надеясь высмотреть изъян, порок, мерзкую привычку, к которой можно будет прицепиться и выместить накопившуюся злобу, жалкую, как плевок на мостовой. Все ненавидели друг друга, а все они вместе ненавидели его, выпавшего из всех гнезд, чужого повсюду. Единственной его связью с миром остался дом на Защемиловской, тошный дом, где никто не был счастлив. Вот и все теперь наши радости.</p><p class="p1">Не было города — была череда мест, не связанных, но коловших сердце: одни слабей, другие больней. Больней — те, где ходил с ней, и улицы, по которым шел на собрания; слабей — те, по которым блуждал один. Каким счастьем было то несчастье! Тогда он думал, что никому не нужен, и мог со стороны гордиться, любоваться, — ибо на дне этой отверженности жило знание, что может быть нужен, и станет когда-нибудь. Тогда он видел себя жертвой хоть и враждебных, а все же величавых, по-своему благородных сил, учивших его как равного: погоди, подрастешь, тогда и поборемся. Страшно сказать, он чувствовал себя воспитуемым. Теперь ему было ясно, что сила, раздавившая его мир, — безглазое, тупое чудовище, с которым не о чем договариваться и незачем биться. Он думал сразиться с драконом, а попал под свинью, хуже — под трактор. И какие одинокие прогулки могли быть теперь, когда обжигал всякий глоток жидкого воздуха, болотного пойла ленинградской зимы?</p><p class="p1">Была сила, отнимавшая все. Она была слепа, и потому иногда дозволялось отсидеться в углу, — но чутка, как все слепые, и рано или поздно нашарит в любой щели; а играет с пищей только потому, что пища больно невкусна, надо ж получить хоть убогую радость. Все давило затем, чтобы в последний момент заставить трепетать и молить: это достойную, гордую жизнь легко отдать играючи, а за жалкую как раз и будешь цепляться до последнего. Вдруг блеснет? Нельзя же допустить, чтобы вот это и было все, — и жрущая сила получала свою приправу: лепет, трепет, слезы, мольбы, пощади, сделаю все. Этой еле слышной мольбой, тонкой, зудящей, комариной, было полно все: утренние и вечерние толпы, трамваи, газеты, пивные, детсады, где немощные, но уже злобные личинки ходили по кругу с печальным революционным воем.</p><p class="p1">С того самого дня, как Даня прочел статью Кугельского, в нем крепла ненависть — и ненависть была тем страшней, что направлялась раньше всего на себя. Он просыпался и засыпал с мыслью, что должен разделить общую участь — ведь его не взяли по чистой случайности: случись с отцом в самом деле что-то необратимое, Даня по крайней мере не чувствовал бы так остро вины перед кружком. Но он сбежал, спасся, и последняя возможность быть со своими оказалась утрачена. Он должен был пойти и сдаться, но ехал проклятым маршрутом на защемленную окраину и там вписывал в бессмысленные графы никому не нужные цифры, словно заклинал вину путаной числовой каббалой. Умом он понимал, что эта сдача никого не спасет, но знал и цену уму — не зря учитель так часто говорил о рабской, склизкой природе разума, о том, что этот раб души возвышает голосишко, лишь когда она молчит. Остромов не любил ума и обращал против него пространные инвективы — и то сказать, кто в твердом уме поверил бы ему? Но он обращался к аниме, которую никто никогда не видел, — и каждое слово этих проклятий подлому рассудку впивалось теперь в Данину душу новой иглой. И он не шел сдаваться, и вздрагивал от ночных шагов по лестнице, и не знал, за что держится.</p><p class="p1">Карасев ни слова не говорил ему, только взглядывал иногда покровительственно и хитровато, и это покровительство было еще тошней. Даня знал, что начупр рискует, оставляя его на службе, и однажды спросил прямо:</p><p class="p1">— Борис Петрович, почему вам не уволить меня?</p><p class="p1">— С чего это, — буркнул Карасев, не поднимая головы.</p><p class="p1">— Вы же рискуете, я знаю. Про меня было в газете.</p><p class="p1">— Ну и что, что было. Вы пишите себе, — Карасев наконец поднял на него желтые глаза. — Пишите, и ничего не будет. А чем я рискую и зачем, это есть дело не вашего ума.</p><p class="p1">— Но там же написано — куда смотрит и все такое…</p><p class="p1">— А мало ли что написано, — сказал Карасев. Подобие улыбки сморщило его физиономию, и щека со шрамом дернулась вдруг плотоядно. — Написано… Ваше дело учитывать, и вы учитывайте. А мое дело смотреть, куда я смотрю. Поняли?</p><p class="p1">И Даня кивнул, и пошел на место.</p><p class="p1">— Без глупостев! — прикрикнул ему вслед Карасев, словно пронюхав о намерении сдаваться. — Без вас там есть кому… — и уткнулся в очередные статданные. — Всякому свое место, — пробурчал он еле слышно.</p><p class="p1">В январе двадцать седьмого случились две встречи. Если бы Даня как следует помнил левитационный трактат, он сумел бы правильно интерпретировать эти толчки, дав им приличествовавшее имя ступеней, но было ему в то время не до трактатов, а потому нам придется понимать за него. Через две недели после безрадостного новогодья, по случаю которого вечно надеющийся Алексей Алексеич сказал стариковскую, слезливую и слюнявую речь, Даня встретил на Большом проспекте спешащего Клингенмайера.</p><p class="p1">В первую минуту он не поверил себе: это был человек из прежней жизни, обреченный испариться вместе с ней. Еще странней было видеть его вне лавки, словно только там он и мог существовать. Но вот существовал, и будто совсем не мерз — там все ежился, кутался, а здесь в черном пальтишке на рыбьем меху легко шел навстречу, почти не сутулясь. Даня глазам не поверил, но Клингенмайер узнал его.</p><p class="p1">— А, вы, — сказал он, суя Дане ледяную ладошку. — Отчего же не заходите?</p><p class="p1">Даня не знал — верней, знал, но не решился бы сказать вслух, что торопится истребить приметы прежней жизни как можно бесповоротней. Лавка Клингенмайера была одна из этих примет.</p><p class="p1">— Надо, надо зайти, — повторил Клингенмайер. — Вы ведь знаете, Борис Васильевич не может теперь забрать бумаги. А вам бы я дал, что же им без дела пылиться.</p><p class="p1">— Но я… — начал Даня. — Это не моя ступень…</p><p class="p1">— Лавочка закрывается, — внушительно проговорил Клингенмайер. — Не сразу, но закрывается. Что можно раздать — тороплюсь раздать. А какая ступень — право, важно ли… Что можете, поймете, а остальное, может, и не нужно. Вот хотя бы в четверг приходите. А если каждый будет думать, какая ступень да почему, — кому же хранить?</p><p class="p1">«Всякому свое место», послышалось Дане. И даже интонация была ворчливо-доброжелательная, карасевская.</p><p class="p1">В четверг, в восьмом часу, Даня явился за сундуком, которого год назад так добивался учитель. Где и кого теперь учил учитель? Спросить было некого. Даня надеялся вызнать хотя бы, куда исчезла Надя, — это и была главная цель визита, в которой он не сознавался себе самому. Он давно пришел бы к антиквару с этим вопросом, если бы не догадывался подспудно о возможном ответе; и ответ был именно тот, которого он боялся.</p><p class="p1">— Ничего не знаю, — сокрушенно сказал Клингенмайер. — Да она и бывала редко.</p><p class="p1">— Может, спросить у них напрямую?</p><p class="p1">— Бросьте, — поморщился Клингенмайер. — Вам надо теперь их обходить за версту. Не попались — и отлично, и не напоминайте ни звуком.</p><p class="p1">— Но мне нужно ее увидеть, — беспомощно сказал Даня.</p><p class="p1">— Если захочет, она вам напишет. А против ее воли зачем же?</p><p class="p1">— Я не понимаю, почему она не писала до сих пор, — упрямо глядя поверх головы Клингенмайера, сказал Даня.</p><p class="p1">— Вы многого не понимаете, — сказал Клингенмайер мягко. — Люди меняются. Есть обстоятельства — в том числе и самая сильная любовь, — когда двоим лучше не видеться, нужно выжидать… И потом, в вашем возрасте сегодня все кажется невозможно серьезным, а завтра — фью, и нет. Это бывает, я еще помню. Если на роду написано, так ведь все равно встретитесь, вам ли не знать.</p><p class="p1">Даня не понял, почему именно ему следовало это знать, но кивнул.</p><p class="p1">— Что же, — деловито сказал Клингенмайер, — пойдемте за сундуком.</p><p class="p1">В лавке не было и намека на беспорядок, и похоже было на то, что ни к отъезду, ни к закрытию хозяин не готовился. Однако в том, каким взглядом Клингенмайер обвел стены, когда ему показалось, что Даня углубился в трактаты, — ясно было, что он прощается; что каждый взгляд и каждый шаг его был прощанием. И Даня почувствовал, что теперь — Бог весть почему — вправе спросить: быть может, такое право есть только у виноватых.</p><p class="p1">— Почему вы… — начал он, и этого было достаточно.</p><p class="p1">— Почему закрываю? — рассеянно переспросил Клингенмайер. — Но не я же закрываю. Закрывается окно.</p><p class="p1">Даня кивнул, не поняв.</p><p class="p1">— Вы прочтете тут и поймете, хотя, собственно… — не заканчивая предложений и глядя поверх его головы, продолжал маленький хозяин. — Видите ли, прежде было достаточно… Человек оставлял тут нечто, казавшееся ему случайным, оставлял за себя, как памятник своей жизни, — и переходил в другую жизнь, иногда в смерть. Есть разные возможности, разные шкафы… Но сегодня уже мало, сегодня требуется — и будет требоваться — нечто иное, не большее, но именно иное. Прежде как было хорошо: оставил слоника, гномика — и перешел на иную ступень, и дай Бог, как говорится. Но сегодня — аллес и амба, как говорил один больше не существующий матрос.</p><p class="p1">— А это все? — почти неслышно спросил Даня.</p><p class="p1">— А это все кому же теперь нужно? — строго спросил Клингенмайер. — Этого не будет ничего. Вам поэтому надо быстро, быстро…</p><p class="p1">И Даня, бегло просмотрев рукописи и даже не разворачивая тяжелый мешок с брякающими в нем предметами, сложил все в сундук, точно сокровища Клингенмайера и впрямь могли исчезнуть в полночь, и потащил его к трамвайной остановке; а когда месяц спустя все же заставил себя подойти к лавке — убедился в том, что на ее месте и впрямь не было ничего, а точней — было хуже, чем ничего. Там была теперь обувная лавка фабрики имени Калинина, с портретом самого Калинина в окне — не того, председателя цык-цык-цуцыка, как ласково звали его товарищи пролетарии, а убитого обувщика с этой самой фабрики; говорю же, кругом были изрубленные в фарш, только их унылыми именами все и прозывалось. Тот Калинин был молодой, хмурый, непримиримый — и обувь, которую он шил до марксистского прозрения, натирала, верно, мозоли.</p><p class="p1">Где были все эти волшебные, ничего не стоящие, намоленные, наласканные любящей рукой вещи, которые надо было оставить, чтобы стать чем-то иным? В пыльном подсобнике какого музея, в чьей полутораметровой каморке, на какой свалке ютились и прозябали теперь эти бутылочные корабли, детские башмаки на счастье с их мягкой потрескавшейся кожей, сто лет не ходящие, иногда вдруг среди ночи звонящие часы, охрипшие музыкальные шкатулки с замершими танцовщицами, стеклянные шарики неизвестного назначения? Кому были нужны теперь эти сброшенные личины, эти талисманы, давным-давно подаренные на счастье тому, кто никогда уже не будет счастлив? И жалость к вещам в последний раз обожгла Даню — потому что он уже ежевечерне штудировал найденное в сундуке; и пару раз ему казалось, что он продвинулся. Иногда он жалел, что не спросил Клингенмайера о будущих встречах и возможном адресе, — но тут же понимал, что это было самым правильным выбором за все их короткие встречи.</p><p class="p1">Трактаты были по-прежнему рукописные, с множеством ошибок, которые он видел теперь так ясно, словно давно помнил оригиналы. Тут было «Размышление о невидимости», странный, но бесконечно увлекательный «Опыт о гранях воздуха», дотошное руководство по вызову особенно полезных советчиков, старинный лечебник, помогавший отгонять хандру и возвратные токи ненужных беспокойств, а также ослепительно остроумная «Отповедь Эмпирику», которую он перечитывал, словно беседуя через тысячелетие с насмешливым другом. Для читателя начала века все это было, верно, глупость и мракобесие, — но двадцать лет спустя само это мракобесие было живительно и утешительно, как любая человеческая глупость среди плотной массы нечеловеческого, как пошлая любовная записка с гимназическими ошибками, вложенная в том статистических данных о забое скота в Самарской губернии.</p><p class="p1">Он начал уже находить повседневные подтверждения тому, о чем говорилось в «Гранях воздуха», — и ему даже казалось, что он буквально видит в воздухе складки, о которых упоминалось в первой части, — когда из одной такой складки неподалеку от Измайловского собора на него буквально выпал Одинокий; что поделать, второй толчок всегда противоположен первому, иначе их общий вектор не вытолкнет испытуемого вверх. Одинокий стоял у собора, перед ним лежала на земле дряхлая шапка, а голова его была замотана, как чалмой, вязаным женским шарфом. Около него стоял в черных очках слепец, показавшийся Дане смутно знакомым, но если они и виделись когда-то — узнать его в этих очках было немыслимо, и вдобавок он опустил лицо, и был уже вечер. Но Одинокого он узнал по жгучему омерзению, с каким душа отдергивается от сущностей, давно перешедших на ту сторону. Одинокий еще раздулся, и запах сырого мяса, исходивший от него, содержал уже явственный намек на разложение: так пахнет пролежавшая несколько часов на прилавке свиная голова, вполне пригодная на студень, но Господи, неужели найдутся люди, которые это съедят?</p><p class="p1">— Галицкий! — радостно захрипел Одинокий. — Провокатор! Вы куда же?</p><p class="p1">Это было так неожиданно, что Даня замер.</p><p class="p1">— Провокатор! — довольный произведенным эффектом, протянул Одинокий. — Дайте нищему поэту на хлеб, и никто не узнает, как вы сдали органам кружок Остромова. Раскошеливайся, сволочь, я никому не скажу. Кугельский, смотрите! Впрочем, какое же смотрите, — Одинокий настроился на долгий монолог, сложил руки на животе и смотрел на Даню сквозь мелкий снег с умилением, как гурман на утку. — На что же вы теперь можете смотреть. А ведь это ваш герой. Это тот самый Галицкий, который всех сдал и убежал. Всех взяли, а его нет, вот и понятно. А, Галицкий? Вспоминаете, как вы на меня смотрели, гадина? У Кугельского-то? С Кугельским вон что приключилось, а вы целехоньки. Удивляюсь, право. И ходите, и смотрите, и люди вам в глаза не плюют.</p><p class="p1">Он прекрасно знал, что Галицкий никого не сдавал, и знал также, что никто не поверил бы в предательство этого теленка. Он видел его единственный раз, но определил безошибочно. Однако пищей Одинокого, хлебом его и водой была низость, и он не мог не плодить низости, оптимизируя среду, — не осквернять святыню, не раздувать сплетню, не нищенствовать, не говорить вслух гнуснейшей гнусности; это был его путь в сверхлюди, другого он не знал, и хотя превратился лишь в гнойную язву на ненавистном, неродном городе (сам он был из-под Мценска), — он верил, что путь его верен. Есть разные способы быть нечеловеком — скажем, сделаться вибрионом, — но вибриону кажется, что он-то и есть сверхчеловек: неуязвим, и опасен, и все эти ничтожества так корчатся!</p><p class="p1">Даня так и сказал, оцепенев: он не знал, что поразило его больше, — бесцельная ли клевета Одинокого, которому он ничего не сделал, или внезапное низвержение Кугельского. Он ведь в самом деле после той статьи исчез, его имя пропало из «Красной», и Даня думал, что он ушел прямиком на повышение в ГПУ, — но нет, он кормился теперь при Одиноком, нищенствовал у Измайловского собора, ибо в артели зарабатывал скудно, да и руки у него были слабые, не годились гнуть булавки. Тайна его внезапной слепоты так и осталась нераскрытой, хотя что же особенного в том, что тайные наши пороки иногда выходят наружу — слепой слепнет, глухой глохнет, а душно-избыточный задыхается от жира?</p><p class="p1">— Вообще-то, — с мерзкой доверительностью продолжал Одинокий, полагая, что в его кривой усмешке и желтой бородке есть в эту минуту нечто мефистофельское, — я вас понимаю. Дрянь был кружок, дряни девки и дрянь божок. Я знал его. Правильно сделали, что сдали. Теперь вверх пойдете. Талантов нет, он мне сам говорил, — так вы хоть пользу извлекли.</p><p class="p1">Боль от первой клеветы была так сильна, что этого второго удара Даня почти не заметил. Он в жизни не поднял руки на человека и втайне, случалось, презирал себя за это, — но теперь шагнул к Одинокому с явным намерением вытрясти из него душу. Одинокий знал цену этому порыву и расхохотался Дане в лицо.</p><p class="p1">— Гадина! — кричал он радостно. — Провокатор бьет старика, нищего старика, при людях, на улице, в городе Ленина! Выдал учителя и обиделся на правду! Ударь меня, ударь больного старика, сволочь, и весь город узнает, как ты сдаешь людей! И слепого ударь, пусть чувствует. Он же тебе помогал, нет?</p><p class="p1">И Даня замер с занесенной рукой, и Одинокий хохотал, запрокидывая чалму.</p><p class="p1">Даня пошел прочь, и хохот Одинокого несся ему вслед:</p><p class="p1">— Всех взяли, одного не взяли! Весь город будет теперь знать, кто сдает стариков и девчонок!</p><p class="p1">Остальное, в сущности, было делом техники.</p><p class="subtitle">2</p><p class="p1">Он думал, что ниже падать некуда, — но могло; теперь на нем было клеймо. Тут есть штука: думая, что хуже быть не может, мы лишь обозначаем свой предел. Когда же мы достигаем иного предела, глубже прежнего, — это уже и не совсем мы.</p><p class="p1">Он снова стал бродить, не зная другого способа заглушить боль, от которой не спасали ни трактаты, ни руководство «О способе быть в другом месте, оставаясь тут». Февраль был снежный, густой, застилавший дома до полной незримости. И когда они пропадали — можно было еще представить те ночи и ту вьюгу, за которой мерещилось. Все, что мерещилось, вышло теперь наружу, топталось в пивных и орало в подворотнях, но он не давал этому отвлечь себя. То, что с ним делалось, переходило в новое качество, и он наблюдал за ним с почти посторонним любопытством — как прокаженный за распадом почти уже неощущаемого тела.</p><p class="p1">Если бы он знал, что с него спадает лишь уродливый покров, что с последним ошметком гниющей плоти спадут и цепи, — с какой злой радостью приветствовал бы он этот распад! Но никто ничего не знает, потому что истина так очевидна, что поверить в нее после стольких человеческих обманов, воля ваша, немыслимо. Между тем врут только люди, потому что им это всегда зачем-нибудь надо; остальные вещи, включая погоду или некоторые вдруг испытываемые состояния, правдивы. Но если с утра тебе наврал ребенок, на службе — начальник, а вечером — газета, можно ли верить тому, что говорит какой-то снег?</p><p class="p1">Новое же качество состояло в том, что к слезливому его отчаянию, за которое он сам себя презирал, прибавилась теперь сила. Ненависть, хотя бы и к себе, сообщает всякому чувству оттенок силы, разгоняет его до страсти; и в воскресенье, двенадцатого февраля, он впервые ощутил, что ему больше не жалко себя. Вообще все, что еще стоило жалеть, было утрачено. Все, что удерживает иного добряка от поступка, — страх за близкого, стыд перед любимой, тысяча жалких зависимостей от мелких пут, — наконец оборвалось; после матери и Нади только сам он привязывал себя к жизни, но теперь лопнула и эта привязь.</p><p class="p1">Внешне выглядело так: он бесцельно кружил и вдруг стал вышагивать. В это время принялось темнеть, синеть, и снежные хлопья скрыли его совершенно. Валила, кружила, лепила мороки мокрая метель; чем хуже, тем слаще. Будь проклято, думал он, будь проклято, и этот рефрен сопровождал все его мысли так же, как в бездарнейшем из рассказов Буркина мелодраматическая история о самоубийстве желтоволосого телеграфиста вытягивалась совершенно сюда не идущим «Да святится имя твое».</p><p class="p1">Будь проклят, думал он, новый гражданин, отринувший все, ради чего стоит жить; убивший тех, кто его возвеличил и выдумал себе вину перед ним, заранее оправдав все его художества. Будь проклят тупой, злобный, мелочный, мстительный, плюгавый; запретивший себе поднимать голову; ограничивший свой кругозор корытом. Будь проклято его лживое ликование и его правдивая трусливая злость, не находящая выхода, вымещаемая на бывших; и его единственная тактика — навязать кодекс всем и растоптать его самому. Никаких более снисхождений.</p><p class="p1">Будь проклят расчеловеченный ублюдок, мнящий себя освобожденным; демонический подонок, пинающий беременных в живот; ничтожество, харкающее на горб горбатого. Будь проклят, пытающийся возвеличиваться на унижениях, презирающий милость, стыдящийся жалости; и всякий любующийся собой и оглядывающийся на себя; будь проклят чернейший из человеческих грехов — презрение.</p><p class="p1">Будь проклята неспособность к созиданию, прикрытая поисками крайнего, травлей беззащитного, унижением безответного. Будь проклята похоть, притворившаяся откровением. Будь проклята личина человеческого, напяленная на все лица; и мое бессильное проклятие, отравленное неверием в силу слов. Хотя почему же личина, а не лицо? Будь проклят и сам человек, неудавшаяся попытка, несостоявшийся собеседник, сын огня и глины, пошедший не в отца, удерживаемый в неживотном состоянии лишь великими и кровавыми обманами, а в прочее время занятый кухонной грызней и стремительно скатывающийся до крысы. Будь проклят я сам, все видящий и ничего не могущий, выродок, недостойный своих и вышвырнутый чужими, все потерявший и все стерпевший; ничтожество, годное лишь на то, чтобы вытекшей слизью, раздавленной оболочкой внушить будущим — тем, кто увидит, — всю меру омерзения к нам и ко всему нашему. И будь проклято это будущее, если у него не найдется ничего, кроме омерзения, — ибо ничему другому неоткуда взяться, а омерзение омерзительнее всего.</p><p class="p1">Будь проклят мир, отнявший у меня все, и я, позволивший это сделать, и все, кто осудит меня за это, и вся безумная иерархия осуждений, которую мы выстроили мартыновским зиккуратом, сводящимся в точку. И будь проклята всякая моя попытка увидеть в мире что-то, кроме этого снега и этого, в просветах между ним, черного, беспримесно черного неба, и этого бесконечно унылого, бесконечно длинного и ненужного дома. Так думал он, всегда бодрствующим краем сознания замечая, что дом и впрямь как-то бесконечно, непривычно длинен, — и вдруг заметил, что вышагивает уже на уровне четвертого этажа.</p><p class="p1">Ни тогда, ни после — когда практика левитаций стала уже почти управляемой, но никогда гарантированной и тем более привычной, — он не находил ответа, как выглядит в этот момент со стороны; получалось всегда так, что поднимался он в безлюдных местах и возвращался никем не замеченный. Однако шли же среди этой метели какие-то люди, и не могли же они не заметить, как хмурый молодой человек стал вдруг восходить по диагонали к угловому окну, перешагивая невидимые ступеньки. Вероятно, он принимал в это время особый вид, или все атомы, чем черт не шутит, видоизменялись; а найдутся и такие, кто предпочтет объяснить все особым состоянием бреда. И нам нечего будет на это возразить. Очень нам надо возражать на бред. Так лепетал он себе, опасаясь взглянуть вниз, но чувствуя, впрочем, что никакое падение вследствие сомнения ему не грозит; что он, напротив, только крепче утвердился на ногах, и столб метели, клубясь, поддерживает его. Он чувствовал в себе силу усомниться и даже рухнуть, и много еще других сил. Его несколько смущало только, что для обрубания последней привязи сгодилась ненависть, а не благодарность; ну что ж, подумал он, не всем же левитировать по первой модели (и сразу же понял, каковы модели). Избыток и недостаток, умиление и проклятие венчаются единым венцом, — но тут он вспомнил, что не умеет еще спускаться и что общего выхода из первой левитации не существует. «Поздравляю и полагаюсь на вас», заканчивал автор эту главу. Даня заглянул в окно и вспомнил, куда его занесло. Это был дом, где жили Воротниковы и куда он не заглядывал с того самого дня, как увел Варгу к Кугельскому на новоселье. Варги он стеснялся, а с Мишей и Марьей Григорьевной ему не о чем было говорить.</p><p class="p1">Он стоял перед окном кухни, тем самым, у которого когда-то Тамаркина рассказывала ему про связь с сестрой — как она мотает, мотает эту нить и дотягивает через облака и водонапорные башни. В кухне было теперь темно и пусто, да и время было позднее. Он ногтями ухватился за раму, и она поддалась — в кухнях не запирали и не заклеивали окон, ибо задыхались от чада. Даня легко перешагнул на подоконник, и только тут, на твердой поверхности, у него закружилась голова.</p><p class="p1">Он закрыл окно и прошел длинным коридором — мимо комнаты Тамаркиной, где жила теперь портниха Индюшаева, в комнату Миши, откуда слабо сочился кислый электрический свет. Миша — похудевший, утративший вместе с детской округлостью последний намек на воротниковскую уютную праздничность, сидел над конспектом. Он поднял голову, и на лице его последовательно сменились страх, неудовольствие и кислая, как желтый свет, попытка изобразить прежнюю экзальтацию.</p><p class="p1">— Данька, — произнес он вопросительно, а потом утвердительно. — Данька! Сколько лет мы не виделись. Как ты вошел? Опять эти тютюнниковские отпрыски не закрыли дверь. Когда-нибудь вынесут все имущество, и нас заодно. Впрочем, нас не возьмут, мы никому не нужны. Мне пропасть всего надо рассказать тебе, — заладил он, хотя было отлично видно, что рассказывать ему нечего и незачем. — У нас перемены, ты знаешь? Ну, про Тамаркину ты, разумеется, в курсе. Я не знаю про эти ваши дела и точно знаю, что ты не мог быть ни в чем дурном замешан. А Варга как чувствовала. Она тогда сказала, что это все плохо кончится, и сбежала с каким-то артистом, он фокусничает, она танцует. Последнее письмо было из Владикавказа. Это, знаешь, лучшее, что с ней могло быть. Мама очень скисла и сейчас у тети Иры, с которой они друг другу жалуются на жизнь. Олька замужем, он ужасно милый, и я не знаю, чего в нем больше — ужаса или милоты. У него руки как лопаты, он бегает на лыжах и поднимает штангу, называя это «тягает». Он хотел детей, но она пошла и вычистилась. Я этого не понимаю. Меня тоже вычистили, но я зацепился на вечернем. Мне кажется, не надо делать трагедию. Мама говорит, что знала, но она это говорит всегда. Рассказывай же про себя. Я остался в коллективе, меня навещают все свои, и я по-прежнему за многих черчу, заметь, за тех, которых не вычистили. Мне кажется, тут ни к чему огорчаться. Все это чушь и буза. Но расскажи же про себя. У нас затевается постановка процесса Нарымова, ты, наверное, слышал. Будем разыгрывать в ролях, потому что суд — прообраз театра будущего. Я хотел быть обвинителем, но позволили только вредителем. По-моему, важно участвовать, а кем — неважно. Но расскажи же мне наконец про себя! Тамаркина написала одно письмо, что познакомилась там с кочегаром. Как видишь, нет худа без добра. Даже звала к себе на варенье. Она в Ташкенте. Почему-то в Ташкенте только она. Остальных — кого куда, она ни о ком не знает. Но как ты вошел? Мне пропасть всего…</p><p class="p1">Он повторял это все кислей, все безнадежней, и под конец замолчал, свесив руки между колен.</p><p class="p1">— В общем, ты был прав, старик, — сказал он. — Мне никогда не притвориться. Я думал, что если все время радоваться, можно как-то влиться. А оказывается пока… но, впрочем, знаешь…</p><p class="p1">Даня не стал дослушивать его. Он устал говорить с надеющимися людьми.</p><p class="p1">— Миша, — сказал он. — Послушай меня ровно одну минуту. Я зашел случайно, но, в общем, по делу. Дело самое простое: спроси, пожалуйста, Тамаркину… или, того проще, дай мне ее адрес. Думаю, она мне ответит. Ты же не думаешь, что это я донес?</p><p class="p1">— Что ты, что ты, — залепетал Миша, но было ясно, что эта подсказанная мысль уже стала для него родной.</p><p class="p1">— Дай мне адрес Тамаркиной, — попросил Даня. — Мне нужно.</p><p class="p1">И в нем еще было столько силы, что Миша, не говоря ни слова, протянул ему открытку с кошечкой — на обороте корявым почерком Тамаркиной было выведено несколько строк. Писать ей надо было в Ташкент, в Бешагачский район, до востребования.</p><p class="p1">— Спасибо, — сказал Даня и вышел из воротниковской квартиры, отомкнув оба замка и цепочку. Не так просты были Тютюнниковы, хоть бы и дети, чтобы не запирать дверей в Ленинграде в двадцать седьмом году.</p></span></span>
