<span><span><p class="p1">«Salut, mon vieux»<a href="ch2.xhtml#id14" class="a">[13]</a>, — начал он, хотя с чего бы ему звать Григория стариной? Они виделись считанные разы, всякий раз без приязни. Григорий Дивеев был ломака и скучнейший тип. Однажды, Дане было лет шесть, и Дивеев-старший на только что выстроенной вилле «Desire» — кажется, в честь тогдашней фаворитки, хотя для Дани Дезире был тогда только принцем из «Спящей красавицы», — давал прием по случаю гришиных именин. Грише исполнялось восемь. Он слова не говорил в простоте, манерничал, кокетничал, и на обратном пути мать, изменив правилу ни о ком не говорить за глаза плохо, сказала: «Если ты будешь таким, как Гриша, я тебя разлюблю». Угроза была страшна, но заведомо невыполнима, — она пробовала уже три раза разлюбить его, дважды за неубранные кубики и один раз за пролитую воду для акварели; в первый раз он рыдал, во второй не поверил, в третий всерьез любопытствовал, может ли это быть, и даже сам унес из ее комнаты все свои рисунки — «Ведь ты меня больше не любишь»; когда стал снимать со стены морской пейзаж — лист, горизонтально разделенный пополам, голубой снизу и серый сверху, она сама расплакалась, и теперь «разлюблю» звучало разве что шуткой. Они и расхохотались, глядя друг другу в глаза с тем абсолютным взаимопониманием, которое было у них всегда, даже в ссорах, и больше ни с кем не повторялось. Даня хохотал взахлеб, потому что вспоминал манеру Григория представляться Григорием, по-детски переиначенные умные слова — пунделябр, дренадер, — роскошь детской, по которой именинник водил гостей, как по музею, с особой гордостью демонстрируя миниатюрную железную дорогу и с милой, хорошо срепетированной наивностью объясняя взрослым, как она действует. Читать Григорий не любил, а впоследствии читал только о путешествия и приключениях, и однажды, после ссоры с очередной отцовской фавориткой, сбежал в Америку, с точным расчетом, чтобы его поймали именно в Ялте. Когда виллу отобрали, а отец, потрясенный невообразимыми переменами, из надменного богача превратился в трогательного младенца, понимавшего в этой новой крымской жизни даже меньше, чем Даня, — Григорий среагировал неожиданно быстро, уехал в Симферополь, поступил в ФЗУ, приезжал в прошлом году на каникулы с барышней, грубой, широколицей, коротконогой, — видимо, специально выбрал такую, чтоб быстрей мимикрировать под среду. Выбор у него был — Григорий стал, как писали в романах, «замечательно хорош собой» и даже «собою». Выражение у него было прежнее, напыщенно-идиотское, но это, кажется, и обеспечивало продвижение, попутно пленяя девиц: Григорий был надежен и, что называется, умел слушать, потому что ему нечего было сказать. Дане он посоветовал в Ленинград не ездить, сулил легкое поступление к ним в ФЗУ — что-то токарное, — и с таким энтузиазмом нахваливал коллектив, словно ему платили за вербовку. На всякий случай он оставил Дане адрес общежития и вот сделался адресатом любовной исповеди — потому что, верите ли, больше с нею совершенно не к кому было обратиться.</p><p class="p1">Итак. Salut, mon vieux. Как, черт побери, ты поживаешь? Мы не видались почти год, и есть что рассказать. Я пишу по-свински редко (признаться, это вообще было первое письмо), но пойми и меня — стараюсь не отрывать настоящего рабочего от настоящей работы. Я уже три месяца в Ленинграде, поступил на вечерний филфак, работаю, ты не поверишь, в конторе по учету жилплощади и получаю паек второй категории, не хухры-мухры. Здесь есть литературные и иные кружки (скромность, таинственность, лояльность, подумал Даня), есть и небезынтересные люди, а недавно я познакомился с самым интересным существом, которое видел до сей поры. Невозможно тебе описать, что это такое. Это девушка без всяких занятий, но с исключительными способностями. Ни на одной должности она не может удержаться, потому что, по совести, должностей, на которых были бы нужны люди вроде нее, не существует в природе. Я даже не сказал бы, что это красавица, потому что никто не скажет об огне «красивый». Это слишком слабо и вдобавок неверно. У нее неправильное лицо, неправильные манеры и неправильные танцы. Вчера я впервые увидел, как она танцует, и до сих пор не могу опомниться. Это либо новое слово в искусстве вообще, либо очень старое слово, совершенно забытое, из тех времен, когда танец был еще способом рассказывать историю, а не просто демонстрацией классических фигур. Каждую такую миниатюру она проживает и, думаю, импровизирует. Куда может пойти такой человек в наше время — не представляю. Кажется, я впервые в жизни столкнулся с чем-то еще более неуместным, чем я, — но, в отличие от меня, она этой неуместности совершенно не сознает и вообще в таких категориях не думает. Мысль у нее скачет. Она не похожа ни на кого. Нос у нее великоват, она чересчур смугла, брови очень густые, лицо узкое, плечи тоже. Почему-то меня умиляют в ней даже эти недостатки, и, может быть, я, сам такой неправильный — и в душе понимающий, что именно так и надо, — могу полюбить только неправильного человека. Классическая красота всегда меня отталкивала, и я не понимал, что в ней находят. Ведь любить можно только то, что немного уязвлено. А она вдобавок совсем не сознает этого. Речь у нее странная, с вкраплениями всяческой бузы и шамовки, но ее голосом все эти слова звучат ничуть не странней, чем какое-нибудь «передайте варенье», а точней, у нее все звучит странно, как у говорящей птицы, еще не привыкшей говорить. Ей все казалось, что она может выразиться гораздо яснее жестом или клекотом, а тут вдруг какие-то слова.</p><p class="p1">Откуда она взялась и что с ней будет — понятия не имею. Черт знает, как сохраняется в людях эта странность (он чувствовал перебор с чертями, но от смущения не решался заговорить просто). Наверное, надо в самом деле считать одного себя правым, а всех выродками. Она позволяет очень многое, но чувствуется, что это пока не от любви, а именно от дикости, это память о временах, когда так делали все и это было в порядке вещей. Мы с ней гуляли сегодня на островах — помнишь острова? Они очень изменились, на Елагином хотят сделать парк отдыха, но дворец сейчас запущен и вместо луга сплошное болото. Она казалась мне частью всего этого пейзажа, одновременно болотистого и классического, и вся она как напоминание о забытой, разрушенной культуре, от которой, может быть, остались сегодня только сапожники вроде айсоров или прачечники вроде китайцев. Что я пишу и зачем? Ведь представить ее все равно невозможно. На такой девушке нельзя даже жениться, потому что непонятно, кем надо быть, чтобы удержать ее рядом. Будь я проклят, если что-нибудь понимаю. Работу свою над ритмом я забросил, но теперь, наверное, возобновлю, потому что она и есть ритм, и только через музыку можно ее понять, хотя танцевать она способна под любую музыку, ей это так же безразлично, как выбор еды или слов. Боюсь, что и выбор спутника для нее дело случайное. Как бы я этого не хотел, как бы я хотел так — сам! Мы любим тех, кем хотим быть, и больше того — тех, кем быть никогда не сможем. Есть другие, те, кто во всех видит и любит только себя, но я таких людей никогда не пойму. Ты, например, такой. Могу тебе написать это радостно и прямо, поскольку все равно никогда не отправлю этого письма. Ты дурак, Григорий. Спокойной ночи.</p><p class="p1">Он счастливо улыбнулся, разорвал листок, сжег его в дядиной узорной пепельнице и сладко заснул в шестом часу утра.</p><p class="subtitle">4</p><p class="p1">— Я хочу познакомить вас с удивительнейшим человеком, — сказал Поленов за ужином неделю спустя.</p><p class="p1">Обычно Даня с дядей перекусывали в комнате, но тут Поленов предложил попировать в кухне. Брянцевы легли, территория была свободна.</p><p class="p1">Поленов в последнее время переменился. Появилась в нем торопливость, угодливость, хищноватость. Алексей Алексеич не узнавал Поленова. Прежде угрюмый, напоказ застывший в горе, он теперь словно разморозился и оживленно шевелился. Ему что-то замаячило.</p><p class="p1">Поленов переживал борения. С одной стороны, Остромов был его собственность, и весь кружок создавался, чтобы опрокинуть могущественного врага. С другой же, кружок и опрокидывание врага немыслимы были без привлечения посторонних, и чем скорей соберется супра, обещанная Остромовым на первом же заседании, тем стремительней падет Морбус. Поленов ходил теперь, присматриваясь.</p><p class="p1">— С удивительнейшим, — повторил он. — Я думаю, вы очень его оцените.</p><p class="p1">И он посмотрел на Даню со странной смесью посвященности и угодливой искательности.</p><p class="p1">Даня не понимал, что такое Поленов. С одной стороны, он несомненно страдал, с другой же — лечил свои страдания наихудшим способом, ненавидя весь мир: вариант, кто бы спорил, действенный, но, как всякое зло, лишь на коротких расстояниях. Горе нельзя вылечить самому, Даня знал это по себе, — полная самодостаточность есть уже сверхчеловечность; нет иного бальзама, кроме чужого сочувствия, однако его-то Поленов отсек, ибо все были ему должны, а кто же любит кредиторов? Инстинктом Даня чувствовал, что предложений этого соседа принимать не следует, но интересные люди… чем черт не шутит. Говорить ему было не с кем, читать некому.</p><p class="p1">— Что за человек, Константин Исаевич? — спросил он.</p><p class="p1">— Духовная наука, — лихорадочно заговорил Поленов, радуясь случаю блеснуть новыми познаниями. — Вы не слышали, наверное. (Хороший человек сказал бы: вы слышали, конечно). Он ставит цель духовного познания. Это будут лекции на дому и потом эксперименты по чтению мысли, передача мысли в другую комнату. Это целый курс лекций, берите, Алексей Алексеевич, рыбку. Угощайтесь, Даня, вы молодой, вам нужно. Еще вот лучок. Удивительные результаты. Я вам настоятельнейше, берите, Даня, картошку, я настоятельнейше. Все, разумеется, согласовано, — он понизил голос, — и разрешено, и это никак не опасно.</p><p class="p1">— Фокусы? — приподнял бровь дядюшка. Ему неприятно было угощение Поленова, он всегда брезговал подношениями с поминок, а у Поленова были как бы вечные поминки. Расстарался, приобрел сельдя, выставил даже полурыковку. Выражение у него было странное — словно он против воли рекламирует товар, нужный ему самому, но обладатель товара заставляет делиться. — Я знал гипнотизера, выступал даже в общих вечерах. Еще у Берка. У него, знаете, ассистент. Вы говорите мысль ассистенту, на другом конце зала гипнотизер. Ассистент ему говорит: думай, соображай, еще что-то такое. Он в этих словах скрывает как-то вашу мысль, и тот угадывает. Трюк эффектный, на юге многие работали.</p><p class="p1">— Нет-нет, никакого ассистента, — зачастил Поленов. — Но тут, понимаете… ведь даже вот и комиссар Семашко сказал, что каждый должен заняться совершенствованием и гигиеной. — Цитату из комиссара Семашко подсказал ему Остромов для облегчения вербовки: он понял уже, что люди сегодня шагу не ступят без начальственной цитаты. — Это своего рода духовная гигиена. Он учит, например, как очищаться от вредных мыслей. И я скажу вам, что просто… просто совершенно другая жизнь.</p><p class="p1">Глаза его нехорошо блеснули.</p><p class="p1">— Удивительная духовная сила, да берите же, Даня. Ваше здоровье, Алексей Алексеич. Кто не пьет водки, у того ум короткий. Он только что прибыл из Москвы. Его принимали на уровне — ну, вы понимаете. Я не могу даже сказать, на каком. Одно понятно — там сейчас заинтересовались серьезно. Нельзя же все отрицать, чтобы один материализм. Материализм годится при продразверстке, но сейчас-то, слава Богу… И кроме того, все имеет научное объяснение. Он просил, чтобы приходили люди, действительно интересующиеся. Особенно молодежь. Это на платной основе, разумеется. Но все совершенно официально. Он имеет разрешение.</p><p class="p1">— Сходи, Даня, — предложил Алексей Алексеич. — Любопытно. Я помню, Илюша в детстве имел способности, всегда угадывал, куда я мячик спрятал. У нас такой был мячик, — он застеснялся и не рассказал; мячик был кожаный, небольшой, набитый сыпучим, — сувенир из Берна. — Я прятал, а он всегда знал. Может быть, у тебя тоже способности. Это наследуется.</p><p class="p1">Если что и наследуется, подумал он, то от матери: в Илье никогда не было ровно ничего интуитивного, бессознательного, а за мячиком он подглядывал, — но, может быть, Ада что-то передала? Вот она по-настоящему угадывала мысли…</p><p class="p1">— Mon oncle<a href="ch2.xhtml#id13" class="a">[14]</a>, — Даня так называл его с первого дня, и оба охотно играли в эту светскость, — я в этом смысле туп как пень. Я слова чужие не всегда понимаю, а вы — мысли.</p><p class="p1">— Но это и надо развивать! — подхватил Поленов. — Это все развивается упражнениями, есть система целая. Нужно научиться сначала полностью сознавать и контролировать тело, и когда уже это достигнуто, тогда и сознание… ведь мы сейчас живем бессознательно. Мы, в общем, механизмы. Когда пробуждаешься к истинной жизни, можно сразу понимать другого, он видится как стеклянный…</p><p class="p1">— А когда вы собираетесь? — спросил Даня. Его поразила соблазнительная мысль.</p><p class="p1">— Вот в четверг, послезавтра.</p><p class="p1">— Только знаете, — сказал Даня с некоторым вызовом. — Я хотел бы с девушкой, с подругой, то есть со знакомой, то есть…</p><p class="p1">Алексей Алексеич подмигнул Поленову. Он уже знал о Варге.</p><p class="p1">— Это я должен проверить, — сухо сказал враз поскучневший Поленов. Он не любил живых девушек. И какое бескультурье, какая рассредоточенность. Ничего духовного, во всех головах один кобеляж. С этими людьми Остромов думает свалить Морбуса?</p><p class="p1">— Там совсем не то, что вы подумали, — заоправдывался Даня. — Это тоже… удивительный человек! Она-то вот как раз, не то что я… совершенно явные способности. Если уж кто владеет телом, то…</p><p class="p1">При словах «владеет телом» Поленов горько улыбнулся. Ему все стало понятно. Сам хочешь владеть, ну и таскаешь за собой по гостям. Пойти-то некуда. Ему жаль стало денег, потраченных на селедку. Он не бедствовал, не то что голота Галицкий, — ленинградский резинотрест, где служил Поленов, платил исправно, выходило по сто двадцать и с премией, селедка не разорит. Просто чувство было, что продал себя задешево.</p><p class="p1">Остромов, однако, оживился. Обозреваешь, обозреваешь окрестности — однажды обнаружишь обнаженную отроковицу.</p><p class="p1">— Пусть обязательно приведет, — сказал он убежденно. — Женских лучей Морбус страшится особенно.</p><p class="p1">— Женских? — переспросил Поленов.</p><p class="p1">— Ну разумеется. Дамы и дамы — вот его стимул. Я говорил вам, что он тратит на это большую часть своей кундалини. Это энергия личности, впрочем, неважно. Если бы не женщины — о. Думаю, он уже держал бы в руках если не мир, то Европу наверное. Но перед этой силой он — пфф.</p><p class="p1">Остромов плямкнул губами и возвел глаза.</p><p class="p1">— Так что, — добавил он, — как можно больше. Вы понимаете — для начала нужно захватить широким неводом… Чтобы совершилось таинство отбора, нужно, чтобы было из чего выбирать.</p><p class="p1">Произнося заведомые очевидности, он особенно таинственно всматривался в собеседника и даже иногда подмигивал.</p><p class="p1">Поленов, недовольный, все же сообщил Дане разрешение.</p><p class="p1">— Женские лучи, — сказал он важно. — Особенное значение для духовной науки.</p><p class="subtitle">5</p><p class="p1">Сам Поленов к духовной науке относился ревностно. Остромов надавал ему упражнений по системе Георгия Иваныча. Преследуемая им цель была самая простая: чем меньше Поленов лез и мельтешил, тем проще шла работа. Энтузиасты незаменимы на ранних стадиях, при вербовке кружка и потом, когда надо внушить первый трепет; но потом им хочется результата, соответственного энтузиазму, а поскольку в большинстве они дураки, то далеко не все способны убедить себя в успехе. У Остромова во Владикавказе уже был один энтузиаст, только что не молился ему, преследовал исповедями, но после трех недель занятий и пяти килограммов серебра, необходимых для зеркала Теофраста, сначала усомнился, а потом заявил. К счастью, творилась такая неразбериха, что Остромов успел сорваться в Боржоми, а если бы не успел? Если бы не было личной дружбы с уполномоченным Цакхиевым, дружбы мужской, истинной, кавказской, подкрепленной тремя тысячами ничего не стоивших местных денег? Зеркало Теофраста было превосходным изобретением; если бы Остромов жил в те превосходные времена, когда люди верили возвышенному и чтили прекрасное, он изобрел бы много такого, что вошло бы в пословицу. Алхимики древности были люди одаренные, но без размаха. Разумеется, были и среди них персонажи восхитительные, не просто истощавшие, но потрошившие европейские дворы, — однако всем был неведом Третий трансфизический закон Остромова (на старости не терял надежды свести воедино в универсальный учебник под давно придуманным названием «Алхимия жизни», даже, возможно, «бытия»). Согласно этому закону деньги являлись особым химическим элементом, универсальным катализатором, и количество вложенных денег увеличивало действие всякого снадобья в разы; всякий физический прибор благодаря деньгам аккумулировал особую эманацию, позволявшую ему действовать даже тогда, когда он представлял собою бессмысленную груду произвольно соединенных обломков. Зеркало Теофраста, если бы у Теофраста достало наглости изобрести его в двенадцатом веке при дворе венгерского Яноша, где он подвизался, — показывало бы все, что делается в произвольно выбранной точке королевства, и тем подробней, чем больше было бы вложено серебра. Во Владикавказе оно показывало драматичную жизнь одной Татьяны, которую Остромов и сам бы оприходовал, если бы не ревнивое безумие местного купца Доломитова. Этот Доломитов торговал по всему Кавказу тканями и мог иметь любую, но, по странному закону, который Остромов назвал бы каким-нибудь Пятым трансхимическим, потянулся именно к той, которая никому подолгу принадлежать не могла. Полки, дивизии невест, в особенности посреди голодного девятнадцатого года, жаждали удовлетворить такие прихоти Доломитова, что Селим-паша, владелец обширнейшего гарема в истории, почесал бы кое-где от изумления; но Доломитову, вынь да положь, нужна была эта дура, действительно с перчиком, но ничего сверх. Зеркало Теофраста для всякой задачи изготовляется заново, с особенными заклинаниями, и тигель должен растапливаться особенной древесиной, в случае Таньки — ореховой; три дня Остромов показывал Доломитову танькину верность и толковал всякую тень в смысле ее неутолимого влечения к фабриканту, а на четвертый энтузиаст Доломитов, в чьем доме кормили такой упоительной бараниной, узнал, с кем была Танька все это время. Случилась неприятность. Остромов бежал, унося зеркало. Он переплавил его и продал через полгода в Батуми с немалой выгодой, но насчет энтузиастов все понял. Их нужно было занимать работой отупляющей, рутинной, окончательно сводящей с ума, — и потому на Поленова была повешена, как жернов, гимнастика Георгия Ивановича, единственного человека, перед которым Остромов преклонялся.</p><p class="p1">Георгий Иванович жил теперь в Париже. От него пришло единственное письмо в августе прошлого года. Оно-то и смущало Остромова: если в Руасси дело пошло, стало быть, надо искать каналы выезда, и выезда легального. Остромов теперь не мог себе простить, что промедлил в двадцатом, да и в двадцать первом были еще лазейки, — но возможности, открывшиеся тут, были, конечно, несравнимы с Парижем. Говорил он Георгию Ивановичу: ага, — старик предпочитал это обращение, — ага, какой Париж? Здесь сейчас хлынули наверх толпы идиотов, идьётов, как элегантно произносил Остромов; здесь можно будет проникнуть к самому государственному управлению. Все эти новые господа природы будут так же нуждаться в духовной науке, как нуждались в ней фабриканты-миллионщики и полубезумные их спутницы, доведенные до истерики соитиями с жирными, сразу засыпающими людьми. Или вы думаете, что интерес к оккультному — вопрос происхождения? Дудки, это вопрос статуса: кто возлез наверх, тот немедленно желает получить ключи к тонкому миру. В толстом у него уже все есть. Оставайтесь, ага, мы будем с вами делать чудеса! Не послушался, ушел, обещал написать. Теперь написал. От текста повеяло баранинкой, перчинкой, той неведомой пряностью, которыми всегда пахло от Георгия Иваныча: адептов окормлял исключительно молочным, но сам не мыслил дня без мяса, знал толк, виртуозно мариновал. «Молодой друг! как ты знаешь здесь я благодаря тонким энергиям не пропал а совершенно напротив того можно иметь при желании хоть до полумиллиона франков но франк обращается в труху. Я упражняю Упражнениями уже значительную часть туберкулезных и сделал большие успехи в Продвижении. Чрезвычайный Успех танца безумного Дервиша и разнообразные еще Трясения совершенно преобразили мой образ и я особенно свеж. Довольно много тут и тех которые желали бы получить Посвящение через Проникновение и ты нашел бы себе тоже. Если как то получится твое Присутствие мы вспомним прекрасный Тифлис и все сопряженное желаю Тебе на Тонком плане как можно больше Проникновений помни бани Ростома и всегда Твоего ГГ».</p><p class="p1">Да, то был серьезный раскол. Люди, с которыми можно было делать дела, разделились на пессимистов, навеки разуверившихся в России, и оптимистов, полагавших, что дела можно делать везде и что к власти наконец пришли люди с деловой жилкой. Извольский уверенно повторял, что с большевиками он договорится всегда, а интеллигенция теперь и подавно станет сговорчивее; полиглот Семенов, работавший итальянского артиста императорских театров Маринелли, на трех языках называл Извольского идиотом и призывал искать любые пути бегства. Остромов, как всегда, прислушался к тайному эго, и тайное эго сказало, что удрать успеется всегда, а такой мутной воды ни в какой Европе не будет еще лет пятьдесят. Теперь, однако, тайное эго колебалось, и карты говорили разное. Мутная вода еще бурлила, но риск возрастал, и отчего-то становилось ясно, что всем без исключения осталось недолго. Это чувство временности, возникшее еще на Кавказе, стократно упрочилось в Ленинграде. Все, кто жил в России в 1925 году, должны были скоро упраздниться или переименоваться: ни одна нынешняя роль не дотянет до тридцатого, да что там — до двадцать седьмого. Это так же остро чувствовалось, как в театре, когда пьеса явно проваливается и держаться ей осталось три представленья, спешите видеть. Остромов не знал еще, как это выйдет, но знал, что НЭП нелеп: он не нравился даже тем, кому дал вздохнуть. Подлая русская природа устроена так, что скорей будет терпеть оплеухи от уважаемого тирана, нежели подачки от неуважаемого добряка; НЭП кончался, не начавшись, словно задавшись целью ежедневно доказывать, что его не надо. Все старательно делали как хуже, и Остромов со своим кружком точно угадал дух эпохи, но уйти, он чувствовал, надо было не поздней, чем через два года. Для этого требовалась командировка, или же связь, или же побег с гарантиями, и он не знал еще точного плана, но думал.</p><p class="p1">Поленова, чтобы не мешал, он загрузил гимнастикой дервиша. Это был набор упражнений Георгия Иваныча, имевший целью разбудить сознание, а на деле усыплявший его окончательно. Игра, как быстро и благодарно понял Остромов, списывая комплекс в личную книжечку, была на том, что большая часть местных людей полагала себя живущими неправильно, это касалось в особенности интеллигентов, но свойственно было и крестьянству, и кое-кому из высшего чиновничества. Поскольку за время их жизни страна никак не менялась, разве что к худшему, — они полагали, что жизнь прошла впустую. Остромов давно это понял, у него были серьезные подозрения, что впустую проходит всякая жизнь, — но в молодости такое понимание переносимо, а в старости, когда со всего вдруг сдергивается покров, надо срочно утешиться. Георгий Иваныч утверждал, что до встречи с ним жертва спала, а теперь ей выпало счастье пробудить сознание; чтобы осознать себя, учил он, надо для начала контролировать свое тело. Прежде всего рекомендовал он поднять на уровень глаз два указательных пальца, уставленных друг против друга, и левый вращать от себя, а правый к себе. Ничего не было проще, но у человека неподготовленного этот фокус вызывал ужас, головную боль, а иногда и жар. Поленов потратил сутки, прежде чем понял, в чем штука. Дальше начиналось сложное — пресловутые танцы дервишей под тягучую зурну, на которой сам Георгий Иваныч играл так, что зурну хотелось сломать, а его удавить. Больше всего это походило на рыдания одинокой души, парящей над Кавказскими горами и безумно хотящей шашлыка, но какой же шашлык в загробном положении? Вай-яй-яй, уй-юй-юй, уюй, уюй… Под это дело предлагалось сначала вытянуть левый кулак и усиленно повращать против часовой стрелки, потом правую руку согнуть в локте и защелкать в воздухе пальцами, потом правую ногу отставить вбок, а левую сгибать в колене, потом все наоборот, и так часами. Это была, так сказать, основная группа, которую ГГ тренировал по три часа без остановки, пока не падали самые выносливые; на четвертом часу, после краткого чаепития, являлся собственно дервиш. Это был любимый ассистент, натренированный заранее, и пока они все сгибали, разгибали, щелкали, клацали и выслушивали изощренные издевательства Георгия Иваныча («Знаете, как ходит холощеный баран? Он ходит быстрее, чем вы, и гра-ци-ознее, ва-а!»), он скакал вокруг всей группы в халате, пахнущем овчиной, и с силой тряс то левой, то правой рукой, а ногами вдруг принимался махать вперед и назад без внятной закономерности. В основе всего была асимметрия, вместе называлось мистерия. Остромов не знал, как такие упражнения действуют на туберкулезных, но несварение желудка проходило у всех: у организма попросту не оставалось сил на полноценный понос. Остромов ради шутки попросил однажды самого ГГ продемонстрировать хоть малую толику движений, на что ГГ с невероятным артистизмом ответил исхищением остромовского кошелька, добавив, что эта гимнастика требует много лучшей координации; Остромов лишь почтительно склонил голову. ГГ был так мил, что невозможно было на него сердиться. «Я а-ча-ра-вашечка», говорил он, огромный, толстоусый.</p><p class="p1">Утро Поленова начиналось теперь с кружения на месте — десять кругов через левое плечо, пять через правое, потом девять через левое, шесть через правое, и так далее, пока не выйдет наоборот. Потом он скакал поочередно на левой и правой ноге — 5 и 6, 6 и 7, 7 и 8 и назад, — и сознавал себя уже до такой степени, что не сбивался, надо было только не думать о Морбусе, вообще не думать. Вероятно, в это время копилась сила. В заключение гимнастики он должен был не менее трех минут ударять себя по тощим ягодицам — трижды правой рукой по правой, дважды левой по левой, а потом наоборот, и так пятнадцать раз. Это упражнение Остромов придумал сам. И нельзя сказать, чтобы утренняя мысль — а вот сейчас Поленов бьет себя по жэ! — не доставляла ему беглой, безгрешной приятности.</p><p class="subtitle">6</p><p class="p1">— Никуда она одна не пойдет, — уперлась Тамаркина.</p><p class="p1">— Да ты что, Тамаркина! — воскликнула Варга. — Я если куда захочу, то всегда пойду.</p><p class="p1">— Нечего, нечего. Какие еще тут люди. Знаю я, какие люди.</p><p class="p1">— Тамаркина, — сказала Варга тихим злым голосом. — Чего ты меня учишь, да? Я не с тобой живу, а с ними живу, — и она ткнула тонким пальцем в воротниковскую дверь. — Мне вообще шестнадцать лет давно было, да? Когда захочу, никого не спрошу, а тебя меньше всех, да?</p><p class="p1">— Ты знаешь чего, девка? — ощетинилась Тамаркина. — Ты хвостом не верти. Я знаю, какие такие твои планы и об чем мысли. Ты пойдешь и в подоле принесешь, вота. А я почем знаю, какие там люди и что. Я про Ольгу слова не скажу, а об тебе у мене голова болит. Я сама туда пойду, что за люди и как.</p><p class="p1">Нервничая, Тамаркина пропускала слова.</p><p class="p1">— Катерина Иванна, — сказал Даня. — Я же не предупреждал. Я только насчет Варги. Туда, может, и нельзя…</p><p class="p1">— Мне везде можно, — отрезала Тамаркина и ушла к себе наряжаться.</p><p class="p1">— Нет, ну ты видел?! — воскликнул Миша, наблюдавший за всем этим из кухни. — Тамаркина полюбила Варгу! Ей Варга классово своя! Она боится, как бы ты не сманил ее в притон!</p><p class="p1">— Очень на меня похоже, — хмуро сказал Даня. Он представил, как заявляется в гости с Варгой и Тамаркиной и как Тамаркина среди разговора о духовной науке начинает учить Варгу, чтоб не велась с кем попало, как вот ети, и горько пожалел о поленовском приглашении.</p><p class="p1">— Опекает ее, как просто я не знаю, — сказал Миша. — Если б ей до меня столько же было дела, я бы повесился.</p><p class="p1">Тамаркина вышла из своей комнаты, нарядившись в строгую темную блузу и шерстяную коричневую юбку. На костлявые плечи она накинула красный платок, а волосы заколола гребнем.</p><p class="p1">— Идем давай, — сказала она Дане. — И ты смотри у меня, если ты ее поведешь куда не след, я не посмотрю, что ты тут родня, а дурь-то повыколочу.</p><p class="p1">— Она ей и варенья, и печенья, — ябедничал Миша. — А Варга не смотрит, дура. Меня сроду никто так не любил.</p><p class="p1">— Ты-то в подоле не принесешь, — обернулась Тамаркина. — А у девки сейчас в городе раз-раз — и голову снесло, и она выскребаться. У брата сестра выскреблась так вот, и чуть не померла. У тебя голова умная, а ты дурак.</p><p class="p1">— Золотые ваши слова, Тамаркина, — сказал Миша и укрылся в комнате.</p><p class="p1">Интересный человек собирал кружок на Каменноостровском проспекте, в помещении, выделенном по благословению адского Райского. Даня трижды, как предупредил Поленов, позвонил и со стыдом ждал у бурой двери. Варга с Тамаркиной препирались всю дорогу, находя в этом странное удовольствие. Похоже, Тамаркина и на рынке торговалась так же увлеченно, и могла перенудить любого.</p><p class="p1">Открыл Поленов — со смешанным выражением высокомерия и услужливости.</p><p class="p1">— А это кто же? — спросил он строго, озирая Тамаркину.</p><p class="p1">— Кто надо, та и есть, — отрекомендовалась она решительно. — Давай, мил человек, показывай, что тут у тебя.</p><p class="p1">— Это с нами, няня Варги, — поспешно соврал Даня. — Это Варга, Константин Исаевич.</p><p class="p1">Поленов скользнул по Варге брезгливым взглядом и отступил в глубь квартиры.</p><p class="p1">Интересного человека Даня сначала не увидел. Он сидел в тени, одетый в длинную лиловую мантию. На столе горели семь свечей в бронзовом подсвечнике, Даня видывал такой в симферопольской синагоге, куда зашел однажды из любопытства. Рядом лежал старинный иззубренный меч. Шторы были опущены. Даня почти не видел собравшихся, заметил только крупную старуху в шали и бледного, востроносого юношу, которого мельком видел в «Красной». Он даже усомнился, тот ли, — но востроносый дружески кивнул.</p><p class="p1">— Это мой сосед Даниил, — то ли гордясь, то ли стыдясь, представил Поленов. — С подругой, а подруга с бонной.</p><p class="p1">— Что же, мы рады, — сказал странно знакомый голос, и Даня не поверил ушам. Нет, невозможно. — Устраивайтесь, друзья. Мы говорим сегодня о левитации.</p><p class="p1">— Левитация? — переспросил Даня. — Перелет тел?</p><p class="p1">— Не только тел, но главным образом человека, — торжественно пояснил голос. — Я как раз говорю о случае Артура Блеквуда, лондонского медиума и левитатора. Он посещал Петербург в августе 1867 года и, между прочим, демонстрировал левитацию. Делалось это при достаточном количестве свидетелей — подробное сообщение оставил Серебровский, и есть несколько откликов в «Факеле». Петербургские оккультисты великолепно принимали Блеквуда и постарались дать в его честь такой обед, после которого левитация была бы практически исключена. И, однако, Блеквуду ничто не помешало. Этим же вечером он провел сначала левитацию в Летнем саду, а затем, при большом числе гостей, в квартире видного медиума, адвоката Брусницына. Он поднимался трижды, в последний раз до самого потолка, держа даже на руках годовалого младенца, сына Брусницына. Этот младенец, к сожалению, не оставил воспоминаний, но я знал его, и он утверждал, что все помнил. Он отчетливо видел, например, задранные к потолку лица родителей и их гостей, и помнил, как упала в обморок нянька.</p><p class="p1">— Сама левитация очень возможна, — горячо и сбивчиво заговорил молодой человек справа от Дани, по виду студент. — Очень возможна, и я читал… теоретически… в очень сильном электрическом поле, магнит… Но предположить, чтобы человек наделялся такими экстремальными, вдруг, магнитными свойствами…</p><p class="p1">— В этом как раз не было бы ничего необычного, — пожал плечами астроном из поезда, ибо это был он, в этом Даня теперь ничуть не сомневался. — Магнитные свойства изначально свойственны человеческой природе. Множество посетителей Всемирной выставки 1891 года видели, как Реджинальд Кранц, британец немецкого происхождения, легко притягивал к себе металлические предметы, как то: гвозди, ножницы, чугунную сковороду… Феномен Кранца тогда же подвергли всестороннему изучению, и никакого естественного объяснения дано не было.</p><p class="p1">— То есть в сильном поле он…</p><p class="p1">— Да подожди ты, вот балаболка! — внезапно осадила студента Тамаркина. — А кроме железа, мог он что?</p><p class="p1">— Только железо, — подчеркнуто вежливо отнесся к ней Остромов. — Если бы еще что-то, это был бы уже случай так называемой телепортации, то есть перемещения любых предметов. Такие описания известны, хотя в большинстве недостоверны. Рискну заметить, что левитация встречается значительно чаще. Ибо левитация требует лишь предельного напряжения воли, и это вполне в силах человеческих, — но у предмета нет своей воли, и потому ему приходится как бы внушать, чтобы он полетел…</p><p class="p1">— Вы пробовали? — быстро спросил остроносый.</p><p class="p1">— Я занимался этим долго, изучал опыт йогов, но успехи мои незначительны, — слегка поклонился Остромов. — Однажды мне удалось левитировать при столкновении с вооруженными бандитами, во время командировки на Кавказ. Должен признаться, что такому риску я не подвергался ни до, ни после. Эти головорезы были пьяны, развращены безнаказанностью и, конечно, убили бы меня, если бы я не перепрыгнул через каменный забор высоток два метра. Приземление было, признаться, болезненно.</p><p class="p1">— Погодите, — влез в в разговор Даня. — Можно дать физическое объяснение почти всему, в том числе и этому как вы говорите, магнетизму. Но левитация отдельного человека… я уверен, что тут фокус, какие-то невидимые тросики или канаты.</p><p class="p1">— Физическое объяснение? — переспросил Остромов. — Но не станете же вы отрицать, что, как показывает броуново движение, все атомы находятся в беспрерывном перемещении. Если так, почему же не допустить, что под действием некоторой силы — например, вышей личной воли, при условии, конечно, подготовки, — все атомы вашего тела не устремятся вдруг в одном направлении, а именно — вверх?</p><p class="p1">— А что за подготовка? — спросила взрослая (Даня всех людей старше себя считал взрослыми), но все еще привлекательная женщина справа от астронома.</p><p class="p1">— В основном аскетическая, — суховато сказал Остромов. — И, конечно, сократить (не отменить вполне, но свести к минимуму) выступления на сцене. В них растрачивается энергия кундалили, без которой левитация — пустой звук.</p><p class="p1">Он говорил еще долго, приводя примеры из европейской, американской и даже африканской истории. У Остромова левитировало множество друзей, не меньше пяти человек, и столько же левитаций он наблюдал в Европе.</p><p class="p1">— А у нас запросто летал, — сказала вдруг Тамаркина.</p><p class="p1">— Кто? — любезно переспросил Остромов.</p><p class="p1">— А пастух, — пояснила она. — Однажды корову потерял, так мужики побили его. С тех пор летал. На спор бежать брались — никто не догонял. Как сиганет, так летит. Перескакивал деревья небольшие.</p><p class="p1">— Это не совсем левитация, конечно, — согласился Остромов, — но первая ее стадия, элевация. Наступает после сильного потрясения, чаще всего отрицательного. Скажем, в Лейдене в 1743 году случился пожар, уничтоживший мастерскую художника Шваннебаха. Там были все его полотна, известные с тех пор только в копиях. После пожара Шваннебах свободно левитировал, но, постепенно отстраиваясь, утратил эту способность.</p><p class="p1">— Прекрасная история, — горячо сказал востроносый.</p><p class="p1">— У нас говорят, — вставил сухощавый старик справа, — если бить зайца, он будет зажигать спички.</p><p class="p1">Поленов сверкнул на него глазами нехорошо. Он жадно слушал об элевации, шутки были неуместны.</p><p class="p1">— Что же, господа, — сказал Остромов, рассказав еще несколько случаев чудесных вознесений и напившись чаю. — Полагаю, мы можем перейти к заданию для следующей встречи. Запишите простейшее заклинание глубокого сосредоточения. Истинное сосредоточение проходит в два этапа. Первым следует установить защиту, дабы никакие посторонние духи не вторглись в ваше внутреннее пространство. Это делается при опущенных шторах, при отсутствии рядом тяжелых металлов, заклинанием «Defenzia perfecta», что означает «Защита установлена». После чего — при глубоком волевом усилии, направленном как бы внутрь собственного позвоночного столба, произнесите: «Colonna fractale, aestis umpra! Aqua equa!» — что вызовет ощутимую дрожь в области шеи, но опасаться этого не следует. После этого вообразите себя деревом, шумящим на ветру, причем воображение должно быть столь полно, чтобы почувствовать дождевые капли на листьях. Через двадцать минут глубокого созерцания вам откроется ваше истинное имя. Его прошу сообщить мне, дабы я мог каждому из вас подобрать не только род занятий, но и заклинание охраны.</p><p class="p1">Все почтительно записывали и кивали.</p><p class="p1">— Теперь же, — просто сказал Остромов, — прошу вас пожертвовать, сколько сможете, никак не более вашей ежедневной траты, на приобретение необходимых минералов и других веществ. Разумеется, все они будут вам представлены…</p><p class="p1">Послышался протестующий ропот.</p><p class="p1">— Верим, верим! — резким голосом сказала Тамаркина и первой достала потертый желтый кошелечек. Даня глазам не верил: она смотрела на Остромова с благоговением. Варга, напротив, хмурилась и морщилась.</p><p class="p1">— Скушный какой дядька, — шепнула она, обдав Данино ухо жарким дыханием так, что он вспыхнул.</p><p class="p1">— Он совсем не скучный. Я его видел в поезде, когда ехал сюда.</p><p class="p1">— Ну и что? Кого ты видел, тот и не скучный? Я бы за такую чушь копейки не дала, я лучше бы хоть вон в «Фантазию» пошла.</p><p class="p1">«Фантазия» — кинематограф напротив воротниковского дома — предлагала желающим фильму «Затерянный мир».</p><p class="p1">Даня, стыдясь полунищеты, вынул подаренный отцом бумажник и выложил на стол серо-лиловую пятерку с изображением гипсового пролетария в кепке. Такая щедрость означала, что завтра ему не обедать, ну да уж как-нибудь.</p><p class="p1">Остромов молча, смиренно кивая, собрал пожертвования — кое-кто из стариков отделался медью, другие выкладывали по нескольку бумажек, — и остановился возле Дани, улыбаясь сдержанно, но приветливо.</p><p class="p1">— Что ж, — сказал он, важно помедлив. — Вот и вторая встреча. Гора с горой не сходится, а человек с человеком… Как видите, мои предсказания все равно что обещания, они не лгут.</p><p class="p1">Даня энергично закивал.</p><p class="p1">— Мне очень о многом хотелось поговорить с вами!</p><p class="p1">— Поговорим непременно. Я вижу просто даже и судьбу в том, что вы здесь. Кстати, вас, кажется, заинтересовала левитация? Не хотите заняться всерьез?</p><p class="p1">— Если бы получилось…</p><p class="p1">— Не боги горшки обжигают, — сказал Остромов, и Дане показалось, что он чуть приподнялся над полом. Разумеется, это был обман зрения. — Я вам к следующему разу приготовлю трактат для первой ступени.</p><p class="p1">…На обратном пути Варга дулась, а Тамаркина повторяла:</p><p class="p1">— Человек верный. Я и сама ино думаю, что вот сейчас отлечу. Бывало, за грудь хватаешься, а то бы и дух вон. Только убогий он. Но сердце мягкое.</p><p class="p1">Дул резкий ветер — в середине мая внезапно похолодало, и лиловые облака рваными сетями летели на восток. Но Даня не мерз. Ветер нес свежесть, ясность и уверенность. Он даже сказал бы — фрегатность, надо было запомнить это слово. Ветер дул с упругой, рвущейся откуда-то из-за Невы силой. Хотелось пить его. Но главное вот что, подумал Даня. Этот лысый человек в «Красной» говорил, что для времени нет слова, что все не годится — экспроприация, индустриализация… Слово есть, но оно из другого словаря; и это слово будет — левитация.</p><p class="empty-line"/><p class="p1">Так началось лето — самое счастливое в Даниной жизни.</p></span></span>
