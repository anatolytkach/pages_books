<body class="z">
<div class="title">
<p class="p">Примечания</p>
</div>
<span id="id7"><div class="title5">
<p class="p">1</p>
</div><p class="p1">Крупная форма (о литературном произведении), букв. «большое дыхание» <em>(фр.).</em></p></span>
<span id="id6"><div class="title5">
<p class="p">2</p>
</div><p class="p1">Если это и неправда, то хорошо придумано! <em>(ит.)</em></p></span>
<span id="id5"><div class="title5">
<p class="p">3</p>
</div><p class="p1">Стихи Ф. Сологуба.</p></span>
<span id="id4"><div class="title5">
<p class="p">4</p>
</div><p class="p1">Здесь и далее без перевода остаются произвольные сочетания иностранных (преимущественно латинских) слов, стилизованных под заклинания или магические формулы.</p></span>
<span id="id3"><div class="title5">
<p class="p">5</p>
</div><p class="p1">Хорошо <em>(лат.).</em></p></span>
<span id="id2"><div class="title5">
<p class="p">6</p>
</div><p class="p1">Некрасивой, но очаровательной <em>(фр.).</em></p></span>
<span id="id1"><div class="title5">
<p class="p">7</p>
</div><p class="p1">Вы меня понимаете <em>(фр.).</em></p></span>
<span id="id29"><div class="title5">
<p class="p">8</p>
</div><p class="p1">Мистические письма <em>(фр.).</em></p></span>
<span id="id28"><div class="title5">
<p class="p">9</p>
</div><p class="p1">Заклинание о бессмертии <em>(лат.).</em></p></span>
<span id="id17"><div class="title5">
<p class="p">10</p>
</div><p class="p1">Приветствую тебя, свет, дающий защиту <em>(лат.)</em></p></span>
<span id="id16"><div class="title5">
<p class="p">11</p>
</div><p class="p1">«Смесь» <em>(англ.).</em></p></span>
<span id="id15"><div class="title5">
<p class="p">12</p>
</div><p class="p1">«Новости техники» <em>(фр.).</em></p></span>
<span id="id14"><div class="title5">
<p class="p">13</p>
</div><p class="p1">Привет, старина <em>(фр.).</em></p></span>
<span id="id13"><div class="title5">
<p class="p">14</p>
</div><p class="p1">Дядя <em>(фр.).</em></p></span>
<span id="id12"><div class="title5">
<p class="p">15</p>
</div><p class="p1">Добра и долголетия <em>(лат.).</em></p></span>
<span id="id11"><div class="title5">
<p class="p">16</p>
</div><p class="p1">Святая Тереза <em>(лат.).</em></p></span>
<span id="id10"><div class="title5">
<p class="p">17</p>
</div><p class="p1">Непрерывная медитация <em>(лат.).</em></p></span>
<span id="id9"><div class="title5">
<p class="p">18</p>
</div><p class="p1">Изыди <em>(искаж. лат.).</em></p></span>
<span id="id8"><div class="title5">
<p class="p">19</p>
</div><p class="p1">Слушайте, маршал, ваше разделение с большим переполохом хромое без причины обшитый деревом гребень! Бежать, прыгать, замуж! Отвечайте же мне! <em>(искаж. фр.)</em></p></span>
<span id="id27"><div class="title5">
<p class="p">20</p>
</div><p class="p1">Разочарован! Товары из Франции, марсельское мыло, лионское белье, сосите ваш нос! Маленький подарок вам! <em>(искаж. фр.)</em></p></span>
<span id="id26"><div class="title5">
<p class="p">21</p>
</div><p class="p1">Отойдите, непосвященные <em>(лат.).</em></p></span>
<span id="id25"><div class="title5">
<p class="p">22</p>
</div><p class="p1">От бессмысленного <em>(лат.).</em></p></span>
<span id="id24"><div class="title5">
<p class="p">23</p>
</div><p class="p1">Букв. «без штанов» <em>(фр.).</em></p></span>
<span id="id23"><div class="title5">
<p class="p">24</p>
</div><p class="p1">Тем лучше! <em>(фр.)</em></p></span>
<span id="id22"><div class="title5">
<p class="p">25</p>
</div><p class="p1">Стихи С. Аверинцева.</p></span>
<span id="id21"><div class="title5">
<p class="p">26</p>
</div><p class="p1">Привет от чистых сердцем! <em>(лат.)</em></p></span>
<span id="id20"><div class="title5">
<p class="p">27</p>
</div><p class="p1">В самом деле? <em>(фр.)</em></p></span>
<span id="id19"><div class="title5">
<p class="p">28</p>
</div><p class="p1">Бывших <em>(фр.).</em></p></span>
<span id="id18"><div class="title5">
<p class="p">29</p>
</div><p class="p1">Братец <em>(фр.).</em></p></span>
</body>
