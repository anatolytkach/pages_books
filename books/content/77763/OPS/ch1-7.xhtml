<span><span><p class="p1">Он видел однажды в Феодосии инвалида японской войны, одноногого, в остатках шинели, и Женя сказала: какой он солдат? Наверное, в детстве отрезало ногу, и вот изображает… Но солдат горланил солдатское, а когда мимо прошел белоснежный капитан с яхты местного богача Маркедонова, вытянулся перед ним во фрунт и с восторгом провожал глазами. Разумеется, военный отличил бы капитана от штабс-капитана, но это желание вытягиваться во фрунт! И дрожащая рука, тянущаяся к картузу… Город стоял, как этот солдат, и бодро отдавал честь, принимая черт знает кого за нового хозяина. Даня шел на Петроградскую, к дяде Алеше. Страшно хотелось есть. Денег было в обрез, нужно закалять… закалять…</p><p class="p1">Остромов двигался в противоположную сторону. Он направлялся к Лавре, близ которой жила престарелая матушка его второй жены. Он надеялся перекантоваться тут первое время, и все, что он видел, ему очень нравилось. Этот город пребывал в правильном состоянии. Когда-то он не оценил Остромова, и Остромову пришлось на долгих шесть лет покинуть его ради южных трущоб. Теперь пришло его время. Он видел на улицах людей, смотрящих выжидательно, и это были люди, с которыми можно иметь дело. За одними уже приходили, за другими придут завтра, за третьими не придут никогда, — но все были в и н о в а т ы; их водилось немало и среди победившего класса. Победившему классу тоже не все нравилось, и многие торопились себя убедить, что повинно их собственное зрение. С этими людьми, как с размягченной породой, было проще; из них можно было теперь кое-что извлечь. Виноватые — была лучшая, сызмальства любимая среда.</p><p class="p1">Ходило слово «бывшие». Влезши в бывшие пальто, бывшие чиновники шли по бывшей Миллионной, заходили к бывшему Абрикосову, где ныне гомонила пивная, покуривали бывшую «Вегу» и словно все чего-то ждали. Они ждали, пока кто-нибудь озаботится прекратить их межеумочное существование, но директивы покамест не было, да и много их оказалось, чтобы вот так сразу. Умирать не приказывали, жить не давали. Ни одно их умение больше не было нужно, ни одно их слово больше ничего не значило. Удивительное дело, среди них были даже герои гражданской войны. Бывшие люди выползали на солнышко и дышали беззаконной, не по чину доставшейся весной, которую принимали за последнюю.</p><p class="p1">Их можно было собрать воедино, чтобы не таились по углам, задурить любым бредом головы, готовые к тусклому фонарю потянуться, как подсолнух к солнцу; подсунуть соломинку, поманить детской небылицей, — что в конце концов даже и милосердно, раз они все равно обречены; новая власть не озаботилась, слишком решительно списав их со счетов, — но к услугам новой власти был санитар, готовый заранее обезопасить грядущего врага, лишить его питательной среды и разоблачить в зародыше. Этих людей довольно было поманить чем попало и забрать что захочешь; всучить бросовое и взамен отобрать последнее. Ничто так легко не отбирается, как последнее, — но только оно и драгоценно; по последнему Остромов был спец, как называлось это теперь.</p><p class="p1">Он помнил, как его здесь обидели когда-то.</p></span></span>
