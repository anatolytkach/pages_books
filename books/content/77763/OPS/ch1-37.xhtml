<span><span><p class="p1">Даня задумался. Он не знал, что мать способна на такое. Он, выходит, очень мало знал о тайных метаниях ее души. Может быть, она ненавидела себя за то, что у нее не хватало сил на борьбу, может быть, не могла простить себе того, что выжила в подвале и не отомстила, — но как-то странен выходил путь ее Хасана к чародейству. Он лежал через убийство двух шарлатанов, измену, чуму — и наконец через последнюю жертву, после которой, глядишь, и чародейства не надо. Но в глубине души он понимал, что истинная сила чародея — в отказах, разрывах: они и есть источник подлинной силы, которая не должна тратиться ни на людей, ни на себя. И он почувствовал в этом странную материнскую правоту — так не похожую на ее собственную жизнь. Но судить будут не по тому, как мы жили, а по тому, что мы поняли.</p><p class="p1">Дочитав, он вышел из дома и долго стоял, глядя на море, — был уже вечер, все клубилось и плавилось, и ровные валики золотистых облаков лежали косо, словно бежали от главной битвы. Морю не было до этой битвы никакого дела. Ему хватало себя.</p><p class="p1">Даня смотрел на море и пробовал медитировать — он совсем забросил занятия в эти дни, было не до того, покой и равновесие не обретались, и он, верно, сильно отстал от программы кружка. С собой у него был только трактат о трехступенном погружении, с небольшим комплексом упражнений на медитативное сознание. До какого-то момента правила были необычайно просты, издевательски подробны, потом, как всегда, происходил скачок — и начиналось непонятное, все более темное с каждым пунктом. Было легче легкого выбрать тихое и не душное место — вот как здесь, на берегу; приступить к занятиям на рассвете или на закате (как раз закат), ничего не есть за час перед медитацией (не ел с утра), защититься от комаров и москитов (явно писано в Индии — какие у нас в сентябре москиты?). Дальше надо было достичь равновесия — положим, оно и достигалось, легкая предотъездная тревога хоть не до конца, но побеждала расслабленную детскую грусть; и наконец, надо было увидеть ум, то есть не то, что мы видим обычно, а самый ум и явления, происходящие в нем. Это было уже непонятно как. Для облегчения этой практики предписывалось сосредоточенно переплести пальцы рук и держать их на уровне груди. К счастью, смотреть на него было некому: хорош, верно!</p><p class="p1">О том, какие мантры повторять или песни напевать, в руководстве не говорилось ни слова, но он постоянно напевал про себя идиотское, бессмысленное танго с одной из варгиных пластинок, она и сама иногда его намурлыкивала, нежась, как кошка, на скамейках во время прогулок:</p><div class="poem">
<div class="stanza">
<p class="v">Там, где были при тебе</p>
<p class="v">И флакончики, и склянки,</p>
<p class="v">Украшенья, обезьянки,</p>
<p class="v">Ничего уж нет давно.</p>
<p class="v">Даже зеркало как будто</p>
<p class="v">Потускнело, стало мутно,</p>
<p class="v">Словно плакало оно.</p>
<p class="v">Наша старая гитара</p>
<p class="v">С этих пор уж не звучала,</p>
<p class="v">На стене висит в углу…</p>
<p class="v">Керосиновая лампа</p>
<p class="v">Неохотно разгоняет</p>
<p class="v">Ночь печальную мою…</p>
<p class="v">Ка-а-анчита!</p>
<p class="v">Тебя я ум-моляю,</p>
<p class="v">Тебя я праккк-линаю,</p>
<p class="v">Тебя я прри-ззываю!</p>
<p class="v">Ка-а-анчита!</p>
<p class="v">Хотя б одно мгновенье</p>
<p class="v">Мне подари горенье</p>
<p class="v">Твоих бэзумных глаз.</p>
</div>
</div><p class="p1">Он сам не понимал, как эта глупость помогла ему в первой успешной медитации, — но, видно, ум легче увидеть со стороны, когда он занят глупостями; а может, выходить из ума — что и есть главная цель медитации — надо, когда в нем играет надоевшая пластинка; но как бы то ни было, он вышел из ума и перестал мыслить, а только расслышал свежую, внятную и звучную ноту, которую посылало ему море. Эта нота была — прощание; и он слышал с небывалой ясностью, что прощание последнее. Но ничего страшного, ничего особенного. Ведь море оставалось, и он оставался; оно вошло в него так полно, как никогда прежде, и он мог теперь носить с собой это чувство моря.</p><p class="p1">Оно состояло не в запахе, йодистом, предштормовом, и не в цвете — золотом, а к горизонту уже и красном; и не в огне и дыме последнего закатного сражения, а в полном безразличии, в великолепной самодостаточности, в том, что все проходило, а оно лежало тут и лежит. И смотреть на него сладко не потому, что оно нечто сулит, а потому, что с ним ничего нельзя сделать. Это чувство моря было так полно и внятно, как никогда прежде, — потому что напоследок только так и бывает. Зачем возвращаться? Он понял, что не вернется, но не огорчился и не обрадовался. Все, что нужно, он забирал с собой.</p><p class="p1">А наутро оно буйствовало и бросалось на мыс, словно коря себя за то, что отдало вчера слишком много. И он не пошел на берег прощаться, чтобы не напоминать ему о себе.</p><p class="subtitle">6</p><p class="p1">Они собрались и на можаре выехали в Симферополь, а оттуда поездом за три дня добрались до Вятки. Женя рыдала, Вера надуто смотрела в сторону, Алексей Алексеич бодрился. Он возвращался в Ленинград, счастливец. Даня сунул ему три письма Наде, написанные за эту неделю, — так дойдет быстрей, — и раз семь взял честное слово немедленно к ней пойти.</p><p class="p1">Он не предполагал оставаться в Вятке дольше недели — помочь отцу устроиться, отвести Валю в школу, да и возвращаться. В конце концов, объяснял он отцу и себе, у него там работа. Как бы хорошо ни относился к нему Карасев, а он отсутствует уже вторую неделю. Правда, дал телеграмму — СВЯЗИ БОЛЕЗНЬЮ ОТЦА СРОЧНО ВЫЕХАЛ КРЫМ — и получил скупой ответ: ОТСУТСТВУЙТЕ. В Вятке их приютила соседская родня — комнату сдали за копейки. Отец обходил конторы, искал место счетовода, корректора, учителя — наконец его взяли географом в школу, да еще пообещали место математика в ФЗУ при механическом заводе; все это дало бы рублей триста в месяц, им с Валей могло хватить, и Даня станет присылать побольше — жилье у него есть, а учитель поймет и не станет обижаться на отсутствие пожертвований; в конце концов можно в Ленинграде найти уроки… Валя не плакал, спокойно приживался в новой школе и вообще, кажется, был эмоционально ровен, он странным образом пошел в самую спокойную сестру, Машу, и по-взрослому рассудительно объяснял Дане и отцу, что Вятка даже и лучше, будет куда устроиться после школы. Удивительное дело, в десять лет он был взрослее Дани — тот бы с ума сошел, если бы его в этом возрасте насильственно переселяли от моря. А впрочем, может быть, новое время — новые дети; может, голод и страхи двадцать первого так его закалили — или надломили, — что он стал как Вера, только у него не установился другой цикл. Валя волшебно умел никому не сострадать, по крайней мере внешне, — а может, сострадал на другой глубине. С эмоциями у него творилось странное: он мог часами доказывать свою правоту в споре — поясняя, например, как решать задачу, — но ни к кому не привязывался, ни о ком не грустил, о Дане не скучал. Он мечтал быть врачом, и для врача у него было необходимейшее — способность спокойно воспринимать страдание, чужое, а может, и свое; на данин вопрос — почему врач? — уверенно отвечал, что врач будет нужен всегда. И это в нем тоже было недетское.</p><p class="p1">В Вятке было холодно, уныло, не хватало теплых вещей — кое-что подбросили хозяева. Рубленный приземистый дом стоял на Острожной, ныне МОПРа, — и был забавный символизм в том, что улицу с тюремным названием переименовали в честь общества помощи борцам революции, томящимся, стало быть, по острогам. Хозяин, гордясь улицей, пояснил Дане, что острожность не означает тюремности — здесь проходила граница города. Хозяина звали Иван Данилыч. Он был городской историограф, собиратель древностей, гимназический учитель истории, ныне трудился в «Вятской правде», вел рубрику «Край мой». Дане нравилось прежнее название улицы, он и тут усматривал символ — словно учитель, чья фамилия была созвучна острогу, прислал привет. Но вообще город был противный — и после моря, и после Ленинграда. Прямых улиц не было — Даня теперь только понял революционную роль Петра: старые русские города строились стихийно, лепились, как осиные гнезда. Петр был первым, кто строил по умозрению. Вятские улицы прокладывались, как верблюжьи тропы: в трактате о хороших и дурных местах говорилось, что верблюды чуют, где меньше сила тяготения, и потому прямых караванных троп не бывает, а все они прихотливо вьются. Так вились, горбатились, переплетались эти улицы, сплошь переименованные, а так как к новым названиям город не привык, новичка это запутывало окончательно. Почтамт стоял на Спасской — она теперь была Дрелевского. Детская поликлиника была на Копанской — она была теперь Герцена, ибо здесь жил Герцен, высланный в Вятку. Будет и МОПРовская — Галицкой, шутил Даня, утешая отца, но отец не улыбался. Он не привык еще к мысли, что Крым потерян навсегда, и строил планы возвращения: может быть, года через три… сможет вернуться, выкупить дом… ведь там могилы… Вот уж что не держало Даню, так это могилы. Он заставил себя сходить на судакское кладбище, но почти сразу сбежал оттуда. В могилах ничего нет.</p><p class="p1">Гром грянул на пятый день, когда он уже подумывал об отъезде. Даня отправился с Валькой в детскую поликлинику — его полагалось «прикреплять», вообще ничего теперь не делалось без прикрепления, и вдобавок отцу полагалось ежемесячно отмечаться в милиции, где на него сразу же наорали — отчего пришел не сразу с вокзала, а на следующий день. В поликлинике на Вальку обрушили систему педологических тестов, сказали, что у него замедленное развитие, что правое полушарие отстает от левого и нарушены социо-личностные связи, но в силу пластичности, может быть, удастся нагнать; Валька по пути домой был удивительно спокоен, хотя Даня чуть не набросился на педолога с кулаками. Это был молодой, мордастый, очкастый недоучка, его ровесник, сугубый и безнадежный позитивист, вызубривший несколько слов и приучившийся ими подавлять любого, — разновидность Кугельского, но менее робкая. При даниной попытке заметить, что негоже при ребенке говорить о его слабоумии, педолог с великолепной брезгливостью процедил: «Чтэ-э? Вы, может быть, Киркпатрика читали? Нет? Тогда кого вы учите?» — «Я не учу, но может же быть мнение…» — «Мнения, мол чээк, могут быть там, где есть знание. И если при ребенке не сказать правды, заворачивать его в буржуазную вату, он никогда, этот ребенок, не подтянется, а ты слушай, — отнесся он уже к Вальке, — и не будь мимозой»…</p><p class="p1">— Валька, — говорил Даня по пути, — ты этого дурака не слушай.</p><p class="p1">— Я не слушаю, — равнодушно отвечал брат.</p><p class="p1">— Он ни черта не понимает.</p><p class="p1">Валька кивнул.</p><p class="p1">— У тебя нет никакой отсталости.</p><p class="p1">— Может, и есть, — сказал Валька. — Просто если есть — значит, она мне нужна.</p><p class="p1">Ого, подумал Даня. Вот оно, приспособление. Нам это, увы, не дано, мы-то всегда виноваты. Надо будет проговорить с учителем — ничего, скоро…</p><p class="p1">Но дома его ждал отец с трясущимися руками. Он показал телеграмму от Алексея Алексеевича: НИКУДА НЕ ВЫЕЗЖАЙ НИ КОЕМ СЛУЧАЕ ЖДИ ПИСЬМА НАХОДИСЬ ВЯТКЕ ПОСТОЯННО — и, не считаясь с тратами, в конце: ОСТАВАЙСЯ ВЯТКЕ ВСКЛ</p><p class="p1">Даня ничего не понимал. Алексей Алексеич был, конечно, человек надеющийся, но к панике не склонный. Что могло произойти без него? Первая данина мысль была — что дядя заботится о брате и не хочет, чтобы Даня его оставлял; но как он не понимает, что там у него работа, друзья, Надя в конце концов — ведь Даня дал ему адрес, просил зайти! Следующая мысль была — что Надя передумала, разлюбила, вышла замуж (черт-те что лезет в голову: замуж? месяца не прошло!). А что, если в Ленинграде масштабная высылка, которую надо переждать? Он просмотрел газеты: ничего подобного. Когда же письмо, чертово, проклятое письмо? Оно пришло через пять дней, и мир обрушился.</p><p class="p1">Взяты были все: Надя, Поленов, Альтергейм. Алексей Алексеич узнал об этом, честно побывав у Нади дома: мать была вне себя и ничего толком не могла рассказать. Что Поленов не возвращался домой — Алексея Алексеича поначалу не удивляло: у него была сестра в Купчине, он к ней, случалось, ездил, — но тут все стало ясно. Через два дня после возвращения к Алексею Алексеичу зашел участковый. Он долго допытывался, где племянник. В Крыму, дрожащими губами прошептал Алексей Алексеич, выехал к отцу… Куда именно? Адрес? Не знаю, лепетал Алексей Алексеич, он поссорился с подругой и уехал… Черт знает, что он нес. Участковый наказал немедленно сообщить, когда племянник вернется. Про Альтергейма он услышал от надиной матери: та связалась с его семьей, ведь они с Надей когда-то дружили, — но там ничего не знали. В письме Алексея Алексеича обо всем сообщалось обиняками, с расчетом на перлюстрацию, — он обещал приехать к зиме, рассказать все, что узнает. Умоляю, повторял он, Даня, не двигайся никуда из города. Найди работу. Пережди. Приезжать тебе невозможно. О том, что дома был участковый, говорилось крайне осторожно: «Без тебя был визит, я предупредил, что ты в долгой отлучке». О причинах катастрофы Алексей Алексеич ничего не писал. Даня предположить не мог ничего подобного. Да, когда-то брали всех, да, заложники, да, подвал, — но зачем же теперь, когда все выглядело почти мирно? На следующий день он дал телеграмму Карасеву — ЗАДЕРЖИВАЮСЬ ВЯТКЕ ДЕЛАМ ОТЦА ПРОШУ ПРОДЛИТЬ ОТПУСК — на что получил ответ: РАЗРЕШАЕТЕСЬ ОТСУТСТВОВАТЬ ДО ГОДА. До года! — заорал он про себя: год в Вятке! Без Нади, без Ленинграда! Я с ума сойду, я поеду немедленно, никто не узнает! — но дома отец неожиданно схватил его за плечи дрожащими руками: Даня, если с тобой что случится, я не вынесу. Ты не знаешь, чего мне стоило все это. Я — не — вынесу! И он разревелся, чего на даниной памяти с ним не было даже при отъезде. Хорошо, хорошо, забормотал он. Будем ждать, приедет дядя, расскажет все.</p><p class="p1">Что, собственно, он мог рассказать? Он приехал на Новый год, привез пряников и огромную копченую колбасу, и апельсины, которые к празднику выдали в театре в количестве пяти штук. В газетах, сказал он, ничего нет. Поленов еще не вернулся. Он дважды передавал ему продукты и один раз Наде конфеты. Конфеты разрешены. Это давало, по его мнению, шанс. Он всюду усматривал основание для надежды — робкой, зыбкой, лживой надежды. Неужели было еще не ясно, что все кончено?</p><p class="p1">Даня рвался в Ленинград, дать показания, объяснить всем, что они ничего же плохого там не делали! — но дядя был тверд: что хочешь, но еще и этого мы не вынесем, Илья, я — оба не вынесем! Пойми, вы могли ничего не делать, просто разговаривать, да. Но лицеисты ведь вообще ничего не делали, даже не разговаривали. А впрочем, я полагаю, — и он понижал голос, дабы надежда выглядела убедительней, — что все дело в нем, а не в вас. Вероятно, он какой-то темный человек. Да, да, это бывает. Это возможно. Опросят, соберут все данные, и учеников выпустят, а он, может быть, имел связи с заграницей. Ты ничего о нем не знаешь. Она вернется, вот увидишь, все с ней будет благополучно, я клянусь тебе чем хочешь, я буду передавать ей продукты хоть каждую неделю, деньги есть. Напиши письмо, я отнесу ее матери. Передай со мной, по почте ничего не посылай. Ради Бога, Даня, сиди смирно! Ада не вынесла подвала, упокой, Господи, ее душу. Ты весь в нее, ты не знаешь, что там будут с тобой делать. Хорошо, если просто допрашивать, но если они заставят тебя кого-то оговорить?! Ты не знаешь, что они сейчас делают. Подсаживают к уголовным и там оставляют. В театре рассказывали. Вообще говорят всякое. Говорят, что в новом году огромная волна арестов по всем вообще, по офицерству, по дворянству, виноват, не виноват, — будут высылки, и может быть, это лучшее, что можно сейчас сделать. Не спорь. Россия щеляста, всех надо запропастить в эти щели. И погоди, это еще принесет плоды, интеллигенция понесет по России просвещение. Я сам перееду к вам, вот увидишь. Ты вернешься в Ленинград, клянусь, как только все закончится. Но сейчас оставайся здесь и никому в Ленинграде не пиши.</p><p class="p1">Даня писал Наде всю ночь, рвал, писал снова, опять рвал — все было не то, все было недостойно ее теперешнего мученичества. Под утро он написал ей о матери, об ее подвальных записках, переписал оттуда огромные куски — про путейца, про коммунизм, которого не бывает ночью. Он писал, что приедет в Ленинград, как только она вернется, что поедет за ней в любую ссылку, что примчится по первому ее зову, что проклинает свое спасение, что помнит каждое ее слово. Алексей Алексеич поклялся все передать и отбыл в Ленинград пятого января. Даня провожал его по ледяным, горбатым, заблеванным во время визгливых новогодних гуляний вятским улицам и в сотый раз умолял немедленно отнести письмо, чаще писать сюда, передавать любые новости. Может быть, где-то будут собирать деньги? Может быть, в оккультных кругах или просто среди бывших? Ради Бога, дядечка, все, что узнаете. Вы не понимаете. Я все понимаю, кивал Алексей Алексеич, занимайся с Валей, мальчик дичится… Это счастье, что он дичится, говорил Даня. Дичи надо дичиться.</p><p class="p1">Он вернется в наше повествование через год, которого почти не будет помнить. Он бегал по урокам, вдалбливал грамоту пролетариям, натаскивал школьников, писал в «Вятскую правду» под патронатом Ивана Данилыча, учившего: «Глупее, родной, глупее!». Слушал по ночам мирное посапывание Вали, глухие сетования отца, стук ходиков, дребезг стекла, перебрех окраинных псов. Вера в Феодосии убежала с моряком. В марте он прочел в читальном зале библиотеки имени Герцена страшную статью о процессе — из «Красной газеты». В статье было его имя. К счастью, «Красную газету» в Вятке никто не читал. В мае дядя сообщил, что все высланы и места ссылки не называются. От Нади не было ни слова, хотя он в каждом письме умолял дядю дать адрес и сам забрасывал ее мать телеграммами. В ответ пришло одно: НАДЕЖДА РЕШИТЕЛЬНО ПРОСИЛА ВАС НИКОГДА НЕ ИСКАТЬ ЕЕ ВАЛЕНТИНА ЖУКОВАСКАЯ. Он ничего не понимал. Неужели она не могла ему простить, что их всех взяли, а его нет? Но ведь он объяснил. Она не могла не понять. Другая могла, но она не могла. Летом Валя чудом удержал его от бегства.</p><p class="p1">— Не уезжай, — сказал он твердо. — Не надо.</p><p class="p1">— Ты-то что понимаешь?</p><p class="p1">— Иногда понимаю, — сказал он. — Не знаю, почему, но не надо.</p><p class="p1">Он не знал адресов Альтергейма, Дробинина, Велембовского, написал Мартынову на Ботанический сад — письмо вернулось, написал на адрес Остромова, но не отослал: в квартире наверняка другие люди, сообщат, где он… Под конец решился отправить письмо на улицу Красных Зорь, указав в обратном адресе «до востребования», — не было ни ответа, ни привета. Он сходил с ума. Девятиклассница, которой он пытался вдолбить литературу, с мая звала его вместе купаться, в октябре среди занятий полезла целоваться, он отшвырнул ее, выбежал. На другой день его избили трое ее одноклассников — она сказала, что Даня пытался изнасиловать ее. Неделю валялся со сломанным ребром, она скулила под окнами, передавала записки. Встав на ноги, он сказал отцу: хватит, я не могу здесь больше. Отец махнул рукой. Он на все теперь махнул рукой, запустил бороду, заговаривался. Валя проводил все дни у друга, они вместе строили самолетные модели.</p><p class="p1">Он шел под дождем на вокзал, в последний раз оглядывая кособокую Вятку, и впервые за весь этот год чувствовал себя человеком. Все-таки, хоть год и был мерзок и мог считаться как бы небывшим, — кое-чего он достиг. Написал сам для себя несколько очерков о матери и Крыме. Оставил их Вальке, дорастет — прочтет. Исследовал стихотворный ритм. Значительно продвинулся в медитации. Один раз ему даже показалось, что почти осуществилась экстериориация, — но пойди тут разбери, голодное головокружение или мистический опыт. Ничего. Теперь он нагонит — и по крайней мере все узнает.</p><p class="p1">Он не узнал почти ничего, и слава Богу. А мы расскажем, что же делать, такое наше занятие.</p></span></span>
