<span><span id="id16"><div class="title3">
<p class="p">Глава тринадцатая</p>
</div><p class="subtitle">1</p><p class="p1">— Входите, входите, — раздался чуть надтреснутый, но бодрый голос. Так радуются пришельцу, еще не зная, кто он, — то ли предчувствуя, то ли с самого начала не сомневаясь, что дурной человек сюда не войдет. Хозяина лавки не было видно, он прятался за стеллажами и что-то переставлял, позвякивая серебром и стеклом.</p><p class="p1">— Здравствуйте, — заторопился Даня. — Я был у вас, помните, и вы сказали — через две недели…</p><p class="p1">— Разумеется, — отозвался Клингенмайер. — Сюда, прошу.</p><p class="p1">Даня пошел на голос и оказался в тесном закутке, в полумраке. Едва виднелась высокая фигура хозяина в лиловом халате, похожем на плащ астролога. Как много, однако, еще осталось волшебных людей. Если бы не Остромов, Даня никогда не попал бы в этот мир. И вещи в нем были волшебные, старинные, каждая с историей, почти все — неясного назначения или происхождения: пустой сафьяновый переплет, оплавленная свеча, имевшая когда-то форму готической башни, страшно тяжелый с виду бронзовый ключ с обрывком цепи…</p><p class="p1">— Я принял решение отдать Борису Васильевичу реликвии, — сказал Клингенмайер. — Худа не будет. Отнесите ему и передайте, что подтверждение из Парижа получено.</p><p class="p1">— Спасибо, — кивнул Даня. Уходить не хотелось, да и неловко было так сразу — вроде посыльного…</p><p class="p1">— В конце концов, мне эти вещи не нужны, — неторопливо продолжал Клингенмайер. — В них особой ценности нет, он и сам знает. Есть вещь с прошлым, так сказать, намоленная, а есть вещь бутафорская, антураж для сомнительных действий. Иное дело, что если бы я не получил подтверждений, я бы с ним и дела иметь не стал…</p><p class="p1">Только теперь Даня уловил в его речи мягкий немецкий призвук.</p><p class="p1">— Но с вами я хочу поговорить, — сказал странный хозяин странной лавки. — Не окажете ли мне любезность?</p><p class="p1">Он указал на еле видную дверь в глубине каморки. За дверью оказалась комнатка чуть побольше, ярко освещенная. В центре ее стоял круглый стол, меньше и проще, но даже на вид неизмеримо старше того, который Остромов использовал для сеансов.</p><p class="p1">— Жду нескольких людей, — пояснил Клингенмайер. — Мы собираемся иногда… не так, как у Бориса Васильевича, а просто клуб любителей всяческой старины. Я подумал, что и вам будет любопытно, и, может, не вовсе бесполезно. У нас ведь есть общие знакомые.</p><p class="p1">— Кто же?</p><p class="p1">— Есть, есть люди, — рассеянно заметил антиквар. — Не только к Борису Васильевичу сходятся истинные ценители… Присядьте пока. Вас зовут Даниил?</p><p class="p1">Даня кивнул.</p><p class="p1">— Я хотел бы, раз уж он вас прислал… — Клингенмайер уселся в глубокое кресло, даже не скрипнувшее под его сухим, почти невесомым телом. — Каждый мечтает о лавке древностей. Нужна такая лавка, чтобы можно было туда прийти. Считайте, что у вас теперь эта лавка есть, а вы, судя по тому, что я о вас знаю, нуждаетесь в ней особенно.</p><p class="p1">— Откуда же вы про меня знаете? — спросил Даня, радостно удивляясь. — Борис Васильевич рассказывал?</p><p class="p1">— Почему же, иногда я и сам вижу, — пожал плечами Клингенмайер. — И общие знакомые есть, как уже было сказано. Я не хочу вас переманивать, Боже упаси, но пусть у вас будет по крайней мере два места, куда можно пойти. Когда нет ни одного, это худо, очень худо, но когда всего одно — тоже, знаете, соблазн… Я не скажу вам о Борисе Васильевиче ничего плохого и, больше того, ничего нового. Он человек небесполезный, и думаю даже, что для правильного развития необходимый. Но ограничиваться им вряд ли стоит, и потому, раз уж вы у меня оказались, почему вам в последнюю пятницу каждого месяца не заходить сюда? Люди у нас бывают славные, собираются не первое десятилетие. Иных, к сожалению, нет, а те далече, но сами знаете — чем круг тесней, тем прочней. Приходите — может быть, с докладом, может, просто так… Мы сегодня как раз планируем читать одно любопытное письмо от друга, проживающего теперь в Париже. Вам его нужно, мне кажется, послушать. Я для этого и вызвал вас сегодня.</p><p class="p1">Даня поразился тому, как скоро его приняли в этот тайный круг, да еще предлагают послушать письмо из эмиграции. Видимо, рекомендация Остромова дорогого стоила. Но Клингенмайер словно прочел эту мысль.</p><p class="p1">— Ко мне ведь не попадают просто так, — сказал он. — Есть такие места, совсем простые, но не всем доступные. Очень хорошо, что я сумел разместиться как раз в таком. Оно было до этого свободно, тут был какой-то склад — сплошные вещи, никаких людей. Мне показалось, что это хорошая складка — почти то же, да не то. В мире ведь есть складки, и людям иного склада лучше находиться в них, вы не находите?</p><p class="p1">— Конечно, — сказал Даня. — Я не уверен только, что смог бы выдержать вот так, в складке…</p><p class="p1">— Вы другое дело, — сказал Клингенмайер. — Мне ведь и Александр Степанович кое-что писал.</p><p class="p1">— Грэм? — обрадовался Даня. — Он чудный.</p><p class="p1">— Мы хорошо с ним были знакомы до его отъезда на ваши берега, — сказал Клингенмайер. — У него там своя с к л а д к а, — он по-грэмовски выделил слово, — и ему, может быть, хорошо. Искренне сожалею, что лишен его общества, а сюда он и носу не кажет.</p><p class="p1">— Он обещал приехать весной, когда закончит роман.</p><p class="p1">— Думаю, не приедет. Зачем ему? Здесь было когда-то удивительно интересно, а теперь кончилось. Вы не вовремя сюда попали. О тех временах можно было недурную книгу написать, а об этих если когда-то кто-то и напишет, то с величайшей скукой, преодолевая зевоту. Точно весь воздух выпустили. Только в таких складках он и задержался. Я не думаю поэтому, что Борис Васильевич опасный человек. Многие вам скажут, что опасный, а я скажу — нет, бывают гораздо хуже. Я, конечно, не все знаю… Но иногда нужны именно такие, как Борис Васильевич. Он, положим, много выдумывает — назовем это так, — но что ж, и выдумка хорошая вещь. Бывают времена, когда люди вроде него только и могут дать толчок, а больше некому. Я вам больше скажу. Только в Борисе Васильевиче да еще в немногих, в очень немногих, и уж конечно, не кристальной честности, — сохранилось то, что тогда было во всех, в воздухе, в любом закате. И поэтому я Бориса Васильевича ценю больше, чем вы думаете, и вовсе вам не предлагаю относиться к нему осторожно.</p><p class="p1">— Этому я бы и не поверил, — важно сказал Даня. — Ведь он меня к вам прислал и, значит, доверяет обоим. Разве можно было бы при таком доверии…</p><p class="p1">Он смешался и не закончил.</p><p class="p1">— Это я все понимаю, — ровно сказал Клингенмайер, кажется, не очень довольный последним замечанием. — Если вас послали к портному забрать брюки, это может быть и не знаком доверия, а просто человеку лень за брюками идти. Если он послал вас ко мне, это может быть испытанием, или желанием нас свести, или прихотью, или чем угодно. Но если он это сделал, я воспользуюсь и скажу вам: дружите с Борисом Васильевичем, учитесь у Бориса Васильевича, но верьте не всему, что говорит Борис Васильевич, и более того, не ставьте слишком много на эту карту. У него можно многому научиться, но на него не нужно полагаться. Я говорю это вам только потому, что знаю его и знал Александра Степановича, ведь мир вообще тесно устроен, нет?</p><p class="p1">Ровно на этих словах продребезжал колокольчик у входа, и Клингегмайер, кивнув Дане, ушел в лавку. Там послышались радостные приветствия и женский голос, на который Даня поначалу не обратил внимания, потому что слишком был изумлен услышанным. Можно учиться, нельзя полагаться — это требовалось увязать, соединить в сознании. А когда вошел Клингенмайер с новой гостьей, эти сомнения тотчас вылетели у него из головы, потому что он непостижимым образом понял, кто перед ним, и противоречие было так ужасно, что у него, как в детстве, пересохло в горле.</p><p class="p1">Это несомненно была Надя Жуковская, о которой он столько слышал и которая в его уме успела стать символом ханжества, пошлости и фальшивого милосердия, Надя, покупавшая самооценку добрыми делами, всеобщая благотворительница и утешительница, Надя, от знакомства с которой его так оберегал Остромов — и словно сама судьба напросилась ему в союзницы, ибо ни на одном заседании кружка, ни на одном выезде в «Жизнь по совести» им удалось не встретиться. Теперь же она стояла перед ним, в своем знаменитом свитере с оттянутым воротником, с недоуменной и приветливой улыбкой, словно тоже сразу догадавшись, кто перед ней, и ему бросилось в глаза все то же, что всегда замечали при первом знакомстве с ней люди, не разучившиеся видеть: длинная белая шея, большой рот, крупные белые зубы, крупные кисти рук, круглые ореховые глаза — и счастье, которым вся она была окружена, как цветущее дерево облаком запаха. Она ничего не могла делать для самоуважения и ничем не покупала сознания правоты, ибо это было с нею с рождения, естественное, как врожденный абсолютный слух. Если она и сознавала, что делает кому-то так называемое добро — как ничтожно и неуместно было это слово рядом с тем счастьем, которое она излучала! — то этому сознанию всегда сопутствовала горькая мысль о недостаточности, о том, что она ничем не может поделиться и никого не в силах сделать собой. Может быть, на тысячу счастливцев приходится один, у которого счастье так естественно и неоскорбительно, и при этом так щедро, что нужно постоянно им делиться, иначе оно переполнит душу и затопит ее. Даня так хорошо ее придумал, а тут было совсем другое — и надо было срочно с этим смириться; он сразу почувствовал себя безобразно виноватым — но кто же мог предполагать, что она такая! Так в Жанне д’Арк подозревали ведьму — ибо кому же могло прийти в голову, что она действительно свята!</p><p class="p1">— Это Надя Жуковская, — сказал Клингенмайер, подтверждая прекрасную и ужасную догадку. — Вы, наверное, видались у Бориса Васильевича.</p><p class="p1">— В том-то и дело, что нет! — радостно сказала Надя. Она чуть задыхалась — то ли от быстрой ходьбы, то ли от смущения. — Мы все время как-то умудряемся врозь, Борис Васильевич шутил даже про взаимоотталкивание…</p><p class="p1">— Вы и сегодня, наверное, должны быть на кружке? — спросил Даня.</p><p class="p1">— Должна, но вот видите, — она улыбнулась Клингенмайеру. — Я никогда пятницу не пропускаю.</p><p class="p1">— А то бы и сегодня не встретились, — сказал Даня.</p><p class="p1">— Ну вот видите, — повторила она. Надо было что-то делать — все так и стояли у стола, не решаясь сесть и не находя общей темы, но эта неловкость тоже была наполнена счастьем, и не хотелось ее прерывать.</p><p class="p1">— Я про вас много слышала, — сказала Надя. — Все говорят про исключительные способности.</p><p class="p1">— Это я про вас много слышал, — ответил Даня. — И про способности никто не говорит, потому что это вещь двадцать пятая.</p><p class="p1">— А про что?</p><p class="p1">— Ну, что есть такая Надя, — с трудом выговорил Даня, мучительно краснея. — Которая помогает всем.</p><p class="p1">— Глупости, какие глупости! — крикнула Надя и тоже покраснела.</p><p class="p1">— Это, Наденька, потому, что нет способностей, — ехидно заметил Клингенмайер. — Помните, в «Дяде Ване»: когда женщина некрасива, все хвалят ее глаза и волосы. Так и у вас: про способности не скажешь, зато делает добро.</p><p class="p1">Это спасло положение, все засмеялись.</p><p class="p1">— Точно, точно, — кивнула она. — У меня никаких оккультных данных. Борис Васильевич говорил, что когда он со мной занимается, все точно об стенку. У меня ни разу еще не получилась экстериоризация, а ведь это обычно удается на третьем занятии. А я с первого раза как-то сразу поняла, что не смогу. Это как в институте, знаете — у нас есть физразвитие, то есть физраз, и я сразу поняла, что никогда не прыгну в высоту.</p><p class="p1">— Как же можно заставлять человека! — возмутился Клингенмайер.</p><p class="p1">— Я только сама могу себя заставить, это ужас, — сказала она сокрушенно. — Если бы я поняла, что зачем-то надо прыгнуть в высоту, я бы прыгнула. Но у меня никакого представления, кому станет лучше, если я прыгну. Мне точно не станет.</p><p class="p1">Даня смотрел на нее во все глаза и с облегчением думал, что она некрасива, что он напрасно придумал ей образ надменной красавицы: в ней всего было слишком, и при этом многое еще по-детски. Она была как подросток-переросток, и внутренне, кажется, чувствовала себя лет на пятнадцать, как и он до последнего времени, — но красота теперь казалась ему таким же ужасным словом, как и добро. Тут снова зазвонил колокольчик, Клингенмайер вышел, и они остались вдвоем. Даня понял, что у них очень мало времени — сейчас войдет новый гость, потом еще, начнется заседание, и тогда уж точно не поговоришь. Надо было сказать что-то главное, и немедленно.</p><p class="p1">— Я виноват перед вами, — сказал он. — Еще не видел, а уже виноват.</p><p class="p1">— Господи, да чем же?</p><p class="p1">— Я думал о вас очень плохо и ругал, где мог.</p><p class="p1">— Мне никто не говорил.</p><p class="p1">— Ну да, это хорошо. Но Остромов говорит, что мысль вещественна.</p><p class="p1">— Знаете, — сказала она очень серьезно, — у меня правое ухо часто краснеет, в последнее время особенно. Я думала, что это ужасная болезнь, а это вы.</p><p class="p1">— Но не икаете?</p><p class="p1">— Нет, не икаю. Бог миловал.</p><p class="p1">— Вы для меня были, знаете… — Он не решался сказать прямо.</p><p class="p1">— Последней надеждой?</p><p class="p1">Они засмеялись.</p><p class="p1">— Они так умилялись вам, в особенности старики. Это не может не раздражать, вы же знаете.</p><p class="p1">— Ох, не говорите. — Она наконец села, сложила руки на коленях и уставилась в стол, не поднимая глаз. — Если серьезно, это невыносимо. Стоит прийти к больному, и ты святая, стоит сказать старику «Будьте здоровы», и ты мученица. Я не знаю, с кем они сравнивают. Вероятно, это — знаете что? Я только сейчас сообразила, потому что, может быть, у вас действительно способности, и до меня дошла волна ума. Просто им все молодые вообще кажутся чудовищами, а нынешние особенно. И на их фоне то, что кто-то приходит и просто с ними сидит… А я ведь делаю это не потому, что люблю стариков, и даже не по той, знаете, подлой причине, что боюсь одинокой старости. У меня не будет одинокой старости, я, мне кажется, буду в старости умолять, чтобы мне дали минуту подумать о душе, а за мной будет скакать на лошадке сопливый внук и требовать сказку. Но просто у меня есть чувство, что это надо делать, как когда вышиваешь — вы ведь вышиваете, я знаю, — оба прыснули, — вот, когда вышиваешь, всегда есть чувство, что иглой надо ткнуть туда. Или когда рисуешь: иногда просто физически — надо туда штрих. Я рисую прилично, плохо, но прилично. У меня все штрихи на месте. Непонятно только, что нарисовано, но чувство, водившее мной, — она смеялась все громче, все счастливее, — чувство передано верно. Почему мне так смешно с вами?</p><p class="p1">— Ну, вы, наверное, думали, что я страшный человек, в очках, с оккультными способностями. А я простой, нос у меня толстый…</p><p class="p1">— У вас очень смешная внешность, да, — сказала она серьезно. — Комическая, гротескная внешность. Вы так же уродливы, как я благодетельна. Есть ли лучшее общество для добродетели, чем уродство?</p><p class="p1">И так как оба они знали цитату, то засмеялись снова. С Варгой он никогда не знал, что сказать, а здесь можно было сказать все. Он испугался себя. Вдобавок умница Клингенмайер с новым гостем не шел подозрительно долго, давая им наговориться.</p><p class="p1">— Все как-то слишком быстро, — сказала она. — Хорошо, что мы там не виделись.</p><p class="p1">— Точно. Мне было бы совсем не до Остромова.</p><p class="p1">— Мне сказал Фридрих Иванович, что сегодня будет интересное письмо.</p><p class="p1">— Мне теперь и не до письма будет, — сказал он.</p><p class="p1">— Нет, надо слушать. И что это я так развеселилась, в конце концов. Вы, может быть, совсем не то, чем кажетесь.</p><p class="p1">— А чем я кажусь?</p><p class="p1">— Честно? — Она прищурилась, и Даня понял, что она близорука. — Человеком, человеком до мозга костей, со всеми слабостями, присущими этому виду.</p><p class="p1">— Вашими бы устами, — сказал он.</p><p class="p1">— Конечно, конечно, я не пошла бы за вами босиком на край света, — сказала она уверенно, точно разубеждая кого-то.</p><p class="p1">Это были все новые и новые стадии близости, которые они миновали стремительно, словно оба падая в пропасть или с той же скоростью возносясь — но не зря в трактате о левитации особенно удавшийся взлет назывался глубоким.</p><p class="p1">— Знаете, я часто думаю, что это и хорошо. Но скажите, если бы вы за кем-то — или лучше чем-то — пошли бы босиком на край света, взяли бы меня с собой?</p><p class="p1">— О, — сказала она, — это безусловно. И я попросила бы вас нести валенки, на случай, если ослабеет моя решимость.</p><p class="p1">— Что он там так долго, — тревожно сказал Даня.</p><p class="p1">— Вам скучно со мной?</p><p class="p1">— Нет, я просто боюсь, что я к вам привыкну, а потом они все-таки войдут, и будет совсем невыносимо.</p><p class="p1">— Он ушел навсегда, — сказала она страшным шепотом. — Теперь мы хранители лавки. Вы бывали у него?</p><p class="p1">— Один раз, недолго.</p><p class="p1">— А теперь все это наше. С этими вещами очень трудно управиться — вы знаете? Они выходят из повиновения, начинают ссориться. Утром проснешься — все стекла перебиты. Только Фридрих Иванович удерживает их от бесчинств. Здесь есть один кофейник, он плюется кипятком, и есть английский дверной молоток, он колотит всех, напоминая, что на свете есть несчастные люди, главным образом в голодающей Англии…</p><p class="p1">— Какое сегодня число? — вдруг спросил Даня.</p><p class="p1">— Двадцать пятое сентября.</p><p class="p1">Она не спросила, зачем ему это, и он оценил.</p><p class="p1">— Представляете, я двадцать раз уже прожил двадцать пятое сентября, — сказал он, — и понятия не имел, что это за число.</p><p class="p1">Тут вошел Клингенмайер и с ним двое — молодой человек, очкастый, сдержанный и насмешливый, и сорокалетний гражданин с бухгалтерской скучной внешностью и такой же скучной папкой; они одновременно поклонились и заняли места за столом. Надя и Даня одновременно встали, представляясь новым гостям.</p><p class="p1">— Николай, — назвался насмешливый.</p><p class="p1">— Иван, — басом сказал вылитый бухгалтер.</p><p class="p1">— Ждем еще троих, и можно начинать, — сказал Клингенмайер, и тут радостно залился звонок, словно узнав любезного посетителя.</p><p class="subtitle">2</p><p class="p1">«Милый Фридрих Иванович!</p><p class="p1">Прежде всего отвечаю на ваш вопрос: человека, о котором вы спрашиваете (тут Клингенмайер слегка замялся при чтении, маскируя эвфемизмом фамилию), я знал, но весьма бегло. История его с Морбусом мне известна в общих чертах, и она ничем не отличается от множества тогдашних историй, иногда дуэльных, иногда просто скандальных. Морбус держал салон, якобы для широкого круга (для узкого были сборища, куда попадали избранные, и я не стремился; рассказывали, конечно, об оргиях). Там он многозначительно вещал, похожий на горбуна-профессора, у которого в руках вся преступность Лондона. По-моему, все это было смешно, а мода на эти дела была так противна, что заставляла презирать даже то дельное, что могло в этом быть. Я всегда любил кружки, сборища, тайные братства — но скорей как сюжетный ход: в жизни это — как любой прием — поражает ложью и какой-то грубостью, которую трудно объяснить. Безрукость, например, хороша в мраморной Венере, домыслы и все прочее, а представьте настоящую красавицу с культяпками? Вот почему я не любил всех этих тайн и знаю только, что означенный герой прибыл из Италии, подделав диплом о их степенях, а потом, пользуясь этим дипломом, соблазнял женщин из морбусовой ложи, привлекая их трехпланным посвящением. Вспоминать обо всем этом теперь смешно, а тогда был большой скандал, но только в оккультной среде, куда я не вхож. Посвящение первого плана сводилось к беседе, второго, насколько понимаю, к объятиям, а третьим планом шло нечто такое, за что он и вылетел из всех иерархий с полным разжалованием, без права заниматься этими соблазнительными штуками. Был демон, а стал так себе домовой. История в брюсовском вкусе, и, кажется, он даже написал что-то подобное, — человек, о котором вы спрашиваете, долго пытался переломить общественное мнение, и это мне скорей импонировало. Кажется, им действительно двигало понятие о чести, пусть жульнической, странной, но это ведь лучше, больше, чем выгода. Выгода, кстати, в те времена была прямая — масонство было едва ли не модней хлыстовства, вы сами помните, сколько было всех этих лож, великих Моголов, арканов, тайных знаний, посвящений, египетских древностей и алтарных курений. Собираясь у вас, мы тоже в это поигрывали. И все-таки при встрече он не показался мне чистым жуликом — что-то в нем было, уязвленное самолюбие, может быть, или слишком глубокая вера в то, что его трехпланные посвящения в самом деле имели оккультный смысл. Не смейтесь. Я знал людей, искренне убежденных, что самая грубая похоть приближает их к богам, и Василий Васильевич, редкая, по-моему, мерзость, был из этой породы, и многие верили ему. Словом, он пришел ко мне с просьбой написать правду о Морбусе и своем незаконном разжаловании, тряс итальянскими бумагами и выглядел страшно оскорбленным — это было даже трогательно, как, знаете, иной взломщик сейфов бывает обвинен в карманной краже и пылко доказывает, что сейфов он выпотрошил сотни и готов отвечать за это хоть сейчас, но до карманной кражи не унизился бы и с голоду, а какой голод, когда у него в кармане вот сейчас — и показывает разыскиваемый всей европейской полицией брильянт. Я слышал, так арестовали Пуришкевича. У него в доме был обыск, и он так обиделся на солдата, который его не узнал, что немедленно открылся: „Дураки, Пуришкевича не знать!!!“. Он рассказывал о десятках проделок, которые на взгляд человека трезвомыслящего были чистым жульничеством — со всеми этими посвящениями, реликвиями и кассами взаимопомощи, — но от соблазнения и любой грязи по женской части отказывался так решительно, что я уж почти зауважал его. Писать статью с разоблачениями Морбуса я, понятно, отказался, потому что ничего в оккультизме не смыслю и никакого масонства всерьез не принимал, если не брать в расчет несчастных просветителей екатерининского века. Больше о вашем герое я не слышал и рад, что он жив. Все, что уцелело от тогдашнего Питера, теперь мило, — а поскольку уцелеть может прежде всего жулик, думаю, любимым героем новой прозы станет именно он. Начальству будут внушать, что разоблачают его, а втайне, само собой, полюбуются человеком из нашего блистательного времени, казавшегося тогда таким гнилым.</p><p class="p1">Что же, на вопрос я ответил, а теперь позвольте мне поговорить с вами по-прежнему, поскольку возможностей для легальной переписки мало, а вашему человеку я доверяю. На случай, если это письмо все же попало в руки шпекиных, хочу их предупредить, что ничего компрометантного не будет — я не связан с эмигрантскими финансистами и переворотов не замышляю. Как я живу, вам известно. Как живете вы, я догадываюсь. Мне трудно представить, что вы читаете это письмо в той же комнате, где мы столько раз сходились кружком любителей древностей, — но еще трудней представить, что я никогда больше не увижу ее, и оттого я предпочитаю думать, что увижу. Месяцы, которые я там прожил, были страшны, но боюсь, ничего важней в моей жизни не было и вряд ли уже будет.</p><p class="p1">Я пишу к вам без особенной надежды. Мне все чаще кажется, что услышать меня некому и незачем, и хотя я верю, что вы по-прежнему понимаете все, даже эта вера не мешает все время оглядываться: не длинно ли? не скучно ли? имею ли я вообще право? В России, со всей ее пресловутой несвободой — что при тех, что при этих, — у меня не было сомнения в собственном праве по крайней мере на писание. А здесь это сомнение не оставляет меня, и борьба с ним стала чуть ли не трудней самого писания. Меня почти уже нет — я убываю, соглашаясь со все большим количеством невыносимых вещей. Странно, я никому не говорю об этом. Но кому здесь об этом говорить?</p><p class="p1">Моя жизнь отделяется от меня, и ее уже видно.</p><p class="p1">Утренние мысли о смерти страшней вечерних. Острота их невыносима. Вечер смазывает, растушевывает, и вся моя надежда на то, что ближе к концу я тоже буду видеть вещи все более смутно — и, может быть, даже во что-нибудь поверю. Мне встречались такие старые оптимисты, для которых мысль о смерти, вопреки логике, делалась все абстрактней с приближением к ней. Некоторые из них — в юности, по их словам, сходившие с ума от ночных страхов, — к старости вовсе не верили, что умрут. Хоть в этом видится милосердие, которого я, увы, не обнаруживаю ни в чем другом. Вся моя надежда теперь, как видите, на старческое слабоумие. Но пока оно не настало — и пока голова, как всегда, ясней всего по утрам, когда я и пишу к вам, — мне тошно, Фридрих Иванович, мне страшно, и не от вечного молчания, которое меня ожидает, а от полной бесчеловечности всего, что меня окружает.</p><p class="p1">Мир ловил меня, но не поймал — это я могу сказать о себе с полным основанием: ловил, конечно, не как бабочку, а как рыбу, не полюбоваться, а сожрать, — цену этой ловле я знаю, поэтому, верьте слову, никогда не завидовал тем, кто пришелся ко времени, тем, кого он поймал действительно. Иногда, особенно в молодости, мелькнет — вот ведь, люди заняты тем, что как раз и будет впоследствии названо Zeitgeist’ом-неуловимым, неисследимым духом, даже лицом времени. Смотришь на Свинецкого — я, если помните, вам рассказывал о нем, эсер, бомбист, потом комиссар в Гурзуфе, — и думаешь: вот, он… а я… А что, собственно, он? Все равно что завидовать мыши, которую грызет кошка, — только потому, что ты не мышь, а, допустим, пирожное. Все эти герои — особенно в России, где никого не убеждает чужой пример и не останавливает чужая неудача, — в сущности, пища и ничего кроме. Я могу им сострадать, когда ими хрустят, но завидовать не могу, увольте. Мир не поймал меня, — но тут уж я сам должен у себя спросить: для чего он меня пощадил? В лучшие времена есть целый слой таких непойманных, тайное общество затаившихся в складках, как называете это вы, — и они нужны, во-первых, для того, чтобы подмигивать друг другу и внушать, что мы не одни такие (иногда нас действительно довольно много, хотя никогда не большинство), а во-вторых, чтобы делать дело, единственно важное дело. Оно разнообразно, его трудно определить, и если бы не отвращение к красотам, особенно в разговоре с вами, я сказал бы, что дело это — ткать тонкую ткань мира, то есть делать то главное, ради чего и существует в конечном счете вся эта кровь и глина, с ее периодическими революциями, бурлениями и другими чисто физическими процессами. Мир иногда — больше того, всегда — представляется мне в виде людоеда, который хоть и жрет кровавую пищу, но иногда, нажравшись, сочиняет две-три рифмы, и я та самая клетка его мозга, от которой это зависит. Это, конечно, самообольщение, или, если угодно, самооправдание — каждый ведь ладит себе ту картину мира, которая позволяет выжить при его исходных данных, при доставшемся характере и сложении. Но мне в самом деле иногда казалось, что единственный смысл мира, занятого исключительно жратвой, испражнениями и бойнями, — заключается в том, чтобы кто-то когда-то в свободное время придумал две-три метафоры, а для этого надо, чтобы мир ловил меня, но не поймал. И вот теперь, Фридрих Иванович, внимание — хотя в неослабность вашего внимания я верю больше, чем во все свои догадки; думаю даже, вы заметили это раньше меня, и подтверждение вас обрадует. Этот слой больше не может существовать; непойманные больше не нужны, и сам я догадался об этом еще тогда, когда исчезли лишние буквы.</p><p class="p1">Причины суть многи, и время вычленит единственную. Но поверьте мне — всегда надо верить жертве процесса, ибо из ее положения процесс видней: главным содержанием нашего времени — и, если угодно, всего нашего века, — стоит назвать исчезновение того слоя, который я называю непойманными (слово „интеллигенция“, выдуманное самой интеллигенцией, мне противно — сразу вижу бородатого, неопрятного человека с разрушенной половой сферой, с бородой в крошках, с журналом „Мир Божий“; да кого же и ловили чаще, чем эту интеллигенцию?!). Может быть, это происходит потому, что способы приготовления и пожирания кровавой пищи становятся все чудовищней, и клетки мозга отказываются работать в таких условиях — как, знаете, у иных толстяков мозг заплывает жиром и отказывается производить сюжеты. Может быть, стыдно быть непойманным на фоне толп, марширующих на бойню. Война показала это, а здесь, в Европе, особенно видно, что это была не последняя война. Может быть, она была первой в бесконечном ряду, ибо побежденный никогда не смирится с участью и станет вынашивать месть — не берусь судить, не люблю экстраполяций. Но как бы то ни было, лишних и непойманных в новое время больше не будет — как не может быть прежнего мозга у особи, которая жрет людей уже не тысячами, а миллионами. Отныне все будет иначе, и главный вопрос, который передо мной маячит день и ночь (не о смерти же мне думать, в самом деле), — именно к этому и сводится: время стать чем-то большим, чем лишняя буква. Чем ответим мы на радикальное обновление рациона нашего людоеда? Каков должен быть отряд, количественно все более малочисленный, морально все более уязвимый? Быть нами стало стыдно. Чем мы ответим на это?</p><p class="p1">У меня нет другого ответа, кроме святости, — особой и внецерковной ее разновидности, но это в самом деле единственное, что можно выдумать. Мир качественно ухудшился до адской, дантовской степени, — и те, кто делает в нем единственное стоящее дело, должны меняться соответственно. У меня нет пока ответа на вопрос о формах этой святости. Не думаю, что она должна сводиться только к борьбе, ибо и борьбы никакой быть не может. Можно, разумеется, приближать крах мира, вызывая разные формы рака у нашего людоеда, но рак хуже самого плохого людоеда, ибо у людоеда все-таки есть мозг и потуги творить, все более редкие, а болезнь не соображает вовсе ничего; да и гибель мира меня не прельщает. Свобода хорошая вещь, пока она не посягает на мои обязанности, мое добровольное рабство, которое мне дороже самой жизни и в некотором смысле заменяет ее. Может быть, об этом я напишу последний свой роман, вовсе уже никому не нужный — ни здесь, ни там: книгу о дикаре, которого приговорили свои и освободил Кортес, и в последний миг он принимается бороться против Кортеса — вместе со своими. Умереть в системе координат лучше, чем жить вне ее; лучше быть последней буквой в алфавите, нежели свободным гражданином в мире, где упразднена письменность. Я ни на что не променяю своего труда, своего плетения тонкой ткани, — но теперь уже этого мало. Непойманные нового века, мозговые клетки нового людоеда должны переродиться, стать новым мыслящим классом, готовым на все и ко всему, — виртуозным в поисках складок, но отважным при прямом столкновении, если нас все-таки настигнут. В восемнадцатом году мне казалось, что я отказался от всего, но если бы вы знали, как много у меня всего оставалось! Здесь я лишился доброй половины этого запаса, но половина еще со мной — живы даже остатки художнического тщеславия, и с ними распроститься трудней всего: это, казалось бы, первое, от чего надо отказаться, — но писать без этого хлыста я пока не выучился. А писание сегодня должно стать чем-то вроде алхимии — поисками чистого совершенства, которого никто не оценит. Когда-нибудь я научусь этому.</p><p class="p1">Ужас в том, что и нынче, на сорок третьем году не самой бедной событиями жизни, я не знаю, что я за человек, и вряд ли смогу точней сказать это в свой последний миг, когда, говорят, открывается все. (Но кто говорит? Кто успел бы? Чудесно помилованным, случайно спасшимся — не верю: все еще здешнее, отсюда не видно). Желая себе польстить, я сказал бы, что всю жизнь пытался самоопределиться относительно самых тонких, неформулируемых вещей — а других видно, скажем, потому, что для них действительно что-то значил выбор: Гучков или Милюков, синее надеть или розовое… Скажем проще: я прожил вроде того Левши, который умел ковать блоху, но ведь невооруженным глазом этого не видно. А вооруженных глаз было мало, и, может быть, самые вооруженные — ваши, почему я и пишу вам, и большую часть письма трачу, чтобы объяснить, почему пишу. В России такие глаза еще были, здесь их нет совсем, — а те, что чудом вывезены оттуда, мутнеют и не различают уже ничего вокруг. Страшно подумать, до чего русские здесь ничего не видят — ни страны, ни друг друга; разве что себя, и то смутных, полупрозрачных. Это первая примета предсмертия, сумеречного сознания — я заметил как-то, долго едучи в поезде, что в вагонном стекле начинаешь отражаться только под вечер. Пока светло, видишь эти мелькающие станции, поля, грачей, всякую пестроту, — а как начнет темнеть да зажгут в вагоне свет, окружающее исчезает, и видишь себя одного, прозрачное отражение. Тут-то и понимаешь: скоро, должно быть, приеду. Я еще вижу что-то вокруг, всеми силами вглядываюсь в мир, цепляюсь за него — но в нем темно, Фридрих Иванович. Я только не знаю, в моем ли мире темно или во всей Европе, и не знаю даже, что было бы для меня утешительней. Сказал бы, что все-таки первое, — но, боюсь, совру</p><p class="p1">Я все время убегаю от главного, о чем хочу попросить, потому что сама эта просьба слишком пахнет безумием. Но ничего не поделаешь, вы сами внушили мне мысль об особенной важности альмекской флейты, которую я подарил вам когда-то. Из этой просьбы вы можете заключить, до чего я дошел, но сумасшедший имеет право на снисхождение. В воздухе сгущается что-то крайне опасное, я чувствую это, как собака, а по вечной своей склонности додумывать сюжеты допускаю, что почему бы миру и не зависеть от двух половинок флейты: напишите мне, ради Бога, цела ли она. Это все, о чем я прошу. И если цела — попросите их, что ли, беречь безделицу: сегодня я не поручусь, что все дело в ней, — просто потому, что все остальное обмануло и больше ничто ни от чего не зависит!</p><p class="p1"><em>Ваш Ять».</em></p><p class="subtitle">3</p><p class="p1">Запах летней гнили уже сменился в Ленинграде запахом осенней прели, от которого так недалеко уже до запаха зимней смерти, влажного каменного холода, который сменится ароматом бурного весеннего разложения; ничто, ничто не пахнет жизнью, но это и прекрасно, ибо если, падши в землю, не умрет… Мы вырастем из этого перегноя, нам не надо лучшей среды. Они с Надей шли по набережной, слева золотились купола, справа золотели острова, и в небе, далеко в перспективе, небольшое золотое озеро затопляло серый берег. Пусто было. Никто не гулял, этот навык был утрачен. Удивительно мало гуляли в двадцать шестом году — либо шатались пьяной толпой, наводя ужас на обывателей, либо прошмыгивали по улицам, опасаясь попасть на глаза… кому? Патрулей давно не было, и милиция расставлена была редко, а все-таки на улицах было нехорошо. Только приезжие да святые не чувствовали этого.</p><p class="p1">— Я хочу тебе сказать одну вещь и не знаю, как, — сказал Даня. — Не про любовь, не бойся.</p><p class="p1">— Почему это я должна бояться?</p><p class="p1">— Потому что если вдруг невзаимность, то есть я тебе отвратителен или что-то еще, тебе трудно будет это слушать. Проклятая неловкость.</p><p class="p1">Он был свободен, как никогда в жизни.</p><p class="p1">— Да говори же.</p><p class="p1">— Я хочу тебе сказать, что христианство… о Господи, как я боюсь с тобой трогать эту тему. Как я боюсь вообще говорить — «христианство». Получается студент сороковых годов. Они все были так ужасны, такое пыщ-пыщ-пыщ. Но христианство — все-таки восточная, жестковыйная вера. Песок, пустыня. И я боюсь всей той плюшевости, которой оно теперь окутано. Я боюсь всех этих елочных игрушек, которые на него надеты. Его сводят к доброте, а оно все-таки не в доброте.</p><p class="p1">— Я понимаю, о чем ты, но не нападай на доброту. Это такое общее место у таких противных людей, что стыдно.</p><p class="p1">— Вероятно, я в душе недобр, — сказал он после небольшого молчания. — Это странно, потому что выгляжу я не так, и в этом, может быть, мое спасение. Но того, что ты называешь добротой, того, что ты делаешь, — во мне нет. Есть другое, и я не знаю, как его назвать.</p><p class="p1">До угла шли молча, Надя его не торопила.</p><p class="p1">— Наверное, вот как, — выговорил он наконец, глядя под ноги. — Наверное, доброта — одно из возможных и даже необязательных следствий чего-то гораздо большего, но я не знаю, как это пояснить. Это как если бы в земле была какая-то исключительная руда, может быть, подземный радий, от которого на лесной поляне вырастают цветы, и эти цветы принимают за главный признак радия. Но на деле все гораздо многообразней и в чем-то страшней. Эта руда излучает, над ней гибнут звери, над ней хорошо чувствуют себя люди, — или даже скажем так: одни люди заболевают, другие выздоравливают. От нее вскипает вода в ближнем ручье и обладает целебными свойствами. Но все видят цветы, потому что они ярче, и судят только по ним, хотя совершенно не в них дело. Так, мне кажется, и тут, и я боюсь доброты потому, что она чрезвычайно легко имитируется. Уж такие начинают казаться людьми, что… Ты ни при чем, конечно. Но просто они столько о тебе наговорили…</p><p class="p1">— Господи! — сказала Надя, хватая его за руку. — Но неужели ты не понимаешь, до чего я сама на самом деле… Господи! — повторила она и резко отвернулась.</p><p class="p1">— Ну вот видишь. Ты обидишься, а я совершенно…</p><p class="p1">— Нет, при чем это?! Но если бы ты знал, как я сама ненавижу все эти придыхания. «Надя Жуковская бегает и благотворит!». Два раза сходишь навестить старика, потом старик начинает чувствовать на тебя права, потом начинают говорить — и уже нельзя не пойти… Сначала все это было так просто! Есть несколько друзей, родственников, к ним ходишь просто потому, что ходишь… как в гости, чего же естественней! Но потом начинают ждать. Начинают обижаться, что не ходишь. А что они говорят — вот про всю эту святость — если бы ты знал! Я бы так хотела, как блаженная Ксения — ты знаешь про блаженную Ксению? Не думай, я себя не равняю, но это, кажется, единственный способ.</p><p class="p1">— Не знаю, я ведь провинциал. Это же петербургская святая?</p><p class="p1">— Да, юродивая. Андрей Петрович. Называла себя так в честь мужа. Я свожу тебя к ней, стоит часовня на Смоленской… Там она строила церковь. Ночью, когда никто не видел, носила на леса кирпичи. Но как можно прийти к человеку, когда никто не видит, когда не видит он сам? Это только дух святой может… И что самое дикое, — ты возненавидишь меня сейчас, конечно, но я иногда злилась на этих стариков. Просто на свою несвободу — что вот, теперь хоть мороз, хоть дождь, а я обязана ходить… Почему? Не потому же, что говорят?</p><p class="p1">— Нет, конечно. Я понимаю.</p><p class="p1">— Ты ничего не понимаешь! Как ты мог вообще думать…</p><p class="p1">— Но я же не знал тебя.</p><p class="p1">— И потом: вот ты говоришь — недостаточность. — Он не говорил ничего подобного, но думал это — и снова поразился тому, как они уже прозрачны друг для друга. — Я сама понимаю, насколько недостаточно. Но знаешь — начинается самоутешение по линии «хоть что-то»…</p><p class="p1">— Слушай, я тоже не про то. — Они снова пошли дальше, он уже не выпускал ее руки. Рука была горячая. — Я про недостаточность вообще, в смысле самом широком, — что доброты уже мало и что вообще дело не в ней. Сейчас будет нужно что-то совсем другое, и это другое есть в христианстве, но его перестали видеть. И кажется, я даже знаю, почему. — Тут он опять остановился, не решаясь высказаться до конца. — Его перестали видеть, потому что сейчас все основано на терпении, на примирении, на том, что вот как-нибудь пересидим… Сейчас не живут — я имею в виду тех, для кого все это вообще имеет смысл, потому что огромное большинство просто забыло все эти слова. Сейчас переживают, пересиживают, и в это время вообще нельзя вспоминать про христианство. Потому что если о нем помнить — нельзя ни извинить, ни оправдать того, что все мы делаем… или НЕ делаем. И потому все довольствуются его следствиями: кто-то — терпением, кто-то — весельем, кто-то — помощью ближнему… Принцип малых дел сюда же… Все это прекрасно, нет слов, но это — как краски без холста: они не держатся. Можно наложить такую и сякую, а целое утрачено. И это целое… мне кажется, что как раз Остромов может вызвать такие состояния.</p><p class="p1">Она уставилась на него круглыми глазами.</p><p class="p1">— Остромов?</p><p class="p1">— Но ведь ты сама ходишь к нему.</p><p class="p1">— Во-первых, редко, потому и не встречались. А во-вторых — ну, это совсем не христианство.</p><p class="p1">— Это он так думает. Человек же не всегда знает, что делает. Почем мы знаем? Он оживляет ту мистическую составляющую, которая совершенно исчезла; которая, может быть, даже умерла. А на нее уже можно наложить все остальное. Но он вводит в состояние, в котором — не знаю, как сказать тебе это. Он все-таки помогает понять, что такое сверхчеловечность, но не в этом ужасном, пошлом смысле, который у этих всех дураков, ну, ты знаешь. Которые думают, что если у них сифилис, то они уже Ницше.</p><p class="p1">— Да, да! — Она даже подпрыгнула. — Слушай, как отлично, что ты понимаешь!</p><p class="p1">— Как же не понимать. Я видел тут одного такого, называет себя Одинокий. Настоящую фамилию забыл, что-то на Т… Он нищенствует и в «Красной газете» пишет. Но если бы показать его Ницше, Ницше бы с ума сошел.</p><p class="p1">— Он и так сошел.</p><p class="p1">— Сошел бы раньше. Но про этих разговора нет, а вот про то, что надо куда-то перепрыгнуть, что человек не заканчивается… Я не верю, ты знаешь, в эволюцию. (Откуда бы ей это знать? Но она и впрямь знала). Я просто думаю, что в известных обстоятельствах… можно прыгнуть в известное состояние. Какой бред, да?</p><p class="p1">— Бред, да. Но увлекательно.</p><p class="p1">— Я просто к тому, что он, кажется, знает туда пути. По крайней мере после некоторых занятий — вот после экстериоризации, например… Уверяю тебя, до этого я не смог бы вот так с тобой.</p><p class="p1">— Как именно?</p><p class="p1">— Так свободно.</p><p class="p1">Они проходили мимо сквера на Большом проспекте. И тянулся, тянулся, не кончался переход из дня в вечер — золотистый, теплый, такой, каким и должен быть последним. Было чувство стиснутости смертью со всех сторон, но внутри смерти — в самой смерти — был светлый коридор, и по нему они шли.</p><p class="p1">— Он знает туда не пути, а дырки в заборе. И вот это — тут не сойдемся — это мне никогда не было интересно. Потому что тут начинается мистика, а мистики я не то чтобы не понимаю: мистики я не люблю. Мистика снимает ответственность. В мистике нет нравственности. Мистика — это когда порошком превращают воду в вино. А это делается не порошком.</p><p class="p1">— Это делается неважно чем. Может быть порошок. Важно, что оно превращается.</p><p class="p1">— Нет, нет. — Она даже топнула ногой. — Ни в коем случае.</p><p class="p1">— Не сердись, ради Бога. Но попытки очистить веру от мистики уже были. Был Толстой. Получилось — не помню, у кого я это читал, — как взгляд из деревенского окна на очень чисто выметенный двор. Очень чистый и очень квадратный.</p><p class="p1">— Пусть так. Но мистика — это оправдание всему. В ней все можно. Заклинаниями может владеть и бес, надо же отличать магию, халдейство — от чуда.</p><p class="p1">— И где граница?</p><p class="p1">— Граница в том, что чудо не делается чернокнижием. И потом, знаешь, эта его попытка представить Христа частным случаем… Это все остальное — частный случай Христа, а не Христос — частный случай каких-то там атлантов…</p><p class="p1">— Пусть так. Может быть. Он говорит ерунду. Очень много ерунды. Но ведь зачем-то ты ходишь туда?</p><p class="p1">Она задумалась.</p><p class="p1">— Хожу, да. Но, во-первых, это не всерьез…</p><p class="p1">— То есть просто интересно?</p><p class="p1">— Ну… отчасти да.</p><p class="p1">— А отчасти?</p><p class="p1">— А отчасти я ему нужна, — сказала она вдруг.</p><p class="p1">Огого, подумал Даня, ощутив укол мучительной ревности и тут же устыдившись. А впрочем, чего я хочу? Неужели я думал, что она будет ждать меня? И уж в любом случае Остромов — магнит более притягательный…</p><p class="p1">Он вновь поразился тому, как учитель к любому подбирал единственно верный ключ. Надя Жуковская не могла покориться власти, не могла прельститься лоском и подавно не стала бы цепляться за надежность. Ее могло купить другое — то, что она необходима.</p><p class="p1">— Зачем?</p><p class="p1">— Не знаю. Я чувствую, что ему как-то неспокойно внутри… а то, что он дает всем, — это ведь нужно. С ним интересно, это само собой, и он не чувствует ко мне ничего такого — Боже упаси. Но зачем-то я нужна ему, как цемент. Помнишь, он рассказывает про Супру?</p><p class="p1">— Да, конечно. Тебе тоже рассказывал?</p><p class="p1">— Обязательно. И я зачем-то нужна ему для Супры. Я только опасаюсь, что кто-нибудь примет все это всерьез…</p><p class="p1">— Что начнутся групповые исходы душ? Нет, нет. Он и не хочет этого. Я думаю, у него иная цель — инициировать, потому что дальше уже каждый пойдет сам… Ведь сейчас, когда начались индивидуальные, он с каждым разрабатывает свое. С некоторыми — вообще без магии. Все больше история.</p><p class="p1">— Я вообще пока не очень понимаю, чего он хочет, — сказала Надя. — По-моему, ему просто скучно. А магия — так… Им же всем не с кем слово сказать.</p><p class="p1">Они медленно шли в сторону Кронверкского, дошли до круглой площади с салоном мод, и тут наконец медленно стал меркнуть сентябрьский свет, полиловело небо, и они пошли дальше, соприкасаясь плечами, сближаясь все тесней, — обнять ее Даня еще не решался. Варга бы сейчас сказала — «Холодно», и стало бы проще; но эта была совсем не Варга, с Варгой было другое, с Варгой ничего не было, не было никакой Варги.</p><p class="p1">— Сейчас, — сказала она, — вообще везде так: люди вместе не потому, что действительно вместе, а потому, что деваться некуда. Ты, конечно, другое дело.</p><p class="p1">— Я теперь буду думать, что ты и со мной из жалости.</p><p class="p1">— Из жалости, да. Кому еще нужен такой дурак.</p><p class="p1">— Со мной скучно. Я человек неинтересный.</p><p class="p1">— Со мной еще хуже. Я разучилась играть, когда-то хорошо играла, сейчас даже польку не смогу. Я плохо шью.</p><p class="p1">— Мы два ничтожества. У нас нет другого выхода.</p><p class="p1">— Кстати. — Она остановилась и заглянула ему в глаза. Прохожие оглядывались на них — как казалось Дане, доброжелательно: поле истинного счастья притягивает всегда, раздражают только потуги выглядеть счастливыми. — Интересное какое место там, у Клингенмайера, да?</p><p class="p1">— Очень интересное.</p><p class="p1">— Как ты думаешь, действительно есть в городе такие точки?</p><p class="p1">— Мне Остромов давал трактат. Про хорошие и плохие места.</p><p class="p1">— Нет, это не то. Такое место, складка, как у Клингенмайера, — может быть плохим. Очень просто. И я даже думаю, что через плохое место легче уйти.</p><p class="p1">— Это я еще даже не пробовал. Я думаю, это надо быть на таком уровне…</p><p class="p1">— Но интересно, — сказала Надя. — Я бы ходила к нему чаще, но боюсь надоесть. Мне кажется, он будет всегда.</p><p class="p1">— А я вот не знаю, как мы с тобой будем выбираться из всего этого, — сказал он. — Я не смогу без тебя жить, стану везде за тобой ходить.</p><p class="p1">— Да, и потом это… Надо же будет как-то спать, — сказала она чрезвычайно просто.</p><p class="p1">— Я тоже об этом подумал.</p><p class="p1">— Но знаешь, к этому надо подходить, как к печальной необходимости.</p><p class="p1">— Да, очень печальной.</p><p class="p1">— Трагической, — сказала она, прыснув. — Это очень неловкая ситуация, да?</p><p class="p1">— Ужас. Нужен большой такт, взаимная помощь. Общество взаимной помощи увечных и недостаточных, недостаточно увечных.</p><p class="p1">— Я пробовала, очень трудно. Нужно совпадение массы условий.</p><p class="p1">Пробовала, жаль. Он в ответ не стал ни в чем признаваться.</p><p class="p1">— Но мы справимся, — сказала она. — Я только думаю, что…</p><p class="p1">— Ну, говори.</p></span></span>
