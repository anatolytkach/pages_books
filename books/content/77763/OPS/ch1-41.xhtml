<p class="p">Глава восемнадцатая</p>
</div><p class="subtitle">1</p><p class="p1">Десятого февраля, около шести вечера, когда Кугельский правил, а точней, сочинял очередную, полную бесчисленных кавычек пролетарскую филиппику насчет нерадивого мастера сборочного цеха ленинградского завода им. Козицкого, в дверях его кабинета показался Одинокий. Он стал за последнее время еще глаже, и голос у него сделался сипатее — жиром заплыли связки.</p><p class="p1">— Кугельский! — прохрипел он. — Вы тут сидите ничего не знаете. Остромова раскрыли, мне верный человек сказал.</p><p class="p1">— Остромова? — переспросил Кугельский. Он в последнее время тяготился визитами Одинокого, и Одинокий вдобавок не ценил его. Ведь он рассчитывал как? Он рассчитывал, что Одинокий всех потопчет, всех завоняет, и тогда в одиночестве, на расчищенной вершине Парнаса, воссияет Кугельский. А одинокий всех топтал, а наедине Кугельскому говорил:</p><p class="p1">— Вы писать не можете. Вы еще недостаточно гадина.</p><p class="p1">Разумеется, он завидовал, но все равно было неприятно.</p><p class="p1">— Да Остромова же! — крикнул Одинокий. — Вы что, не помните? Секту его! От них было у вас два человека, тогда, помните, девка эта плясала, а идиот на лестнице блевал!</p><p class="p1">Кугельский, разумеется, помнил. Это было на его новоселье, когда ему ничего не обломилось, а молодежь вдобавок не проявила достаточного пиетета, никто даже не попросил почитать, да и некому было. Всех дур разобрали, а он остался выслушивать полночи пьяный бред Одинокого. А единственная, на кого стоило смотреть, ушла с этим действительно идиотом Галицким, недвусмысленно к нему прижимаясь.</p><p class="p1">— Ах, это, — сказал он. — Ну, это…</p><p class="p1">— Ничего не «это»! — передразнил Одинокий. — Мы с вами сейчас напишем фельетон, мы такое запузырим, что вы проснетесь знаменитым. Он думал, сволочь, что за пятьдесят рублей купил поэта. Ходил тут в коверкотовых штанах. Мы напомним сейчас ему, кто он был. Я тогда еще понял, что он заигрался. Использовать меня хотел. Сейчас я буду его использовать, этого масона. Я знаю, какой он масон.</p><p class="p1">Кугельский порадовался, что в редакции, по причине клонящегося к закату рабочего дня, не было никого из ненавистных острословов — Барцева, Стечина. Они вошли теперь в силу, детские их сочинения печатались каждую пятницу, им собирались журнал дать. Они писали явную белиберду, злую, без тени любви к детям, но детям почему-то нравилось. Лучший способ, чтоб тебя полюбили, — не любить, презирать, а Кугельский был душа мягкая, нежная, жаждал любви, умел любить, как никто, — потому, интуитивно чувствуя эту нравственную высоту, все от него и шарахались.</p><p class="p1">Хорошо, что никто его не видел с Одиноким, и этот запах сырого мяса, которым немедленно наполнялась комната при его появлении… Но, с другой стороны, Кугельскому смертельно надоело править письма, ставить кавычки, клеймить летунов и цигарщиков-перекурщиков, он хотел развернуться, пора было дать настоящий, серьезный очерк. Большой, с фактажом. И то, на что намекал Одинокий, было ценно.</p><p class="p1">— А что за секта? — спросил он небрежно.</p><p class="p1">— Гонорар мой, имя ваше, — предупредил Одинокий. — Тогда работаем.</p><p class="p1">— Да я, собственно, что же, Александр Иванович, — сказал Кугельский и старательно зевнул. — Я не напрашиваюсь…</p><p class="p1">— Черт с вами, четверть ваша! — рявкнул Одинокий. — Из удовольствия только соглашаюсь, из того, чтобы выскочку потоптать. Он думал — Бога за бороду держит, а я буду сейчас на него хезать. Мне участковый рассказал с Измайловского, я с ним делюсь за место. Он не трогает, я ему отстегиваю. Иногда рассказывает, где чего. Они все у меня вот где. Про всех знаю. Сейчас вам расскажу. Этот урод собрал тут франкмасонский кружок.</p><p class="p1">— Франкмасонский? — недоверчиво спросил Кугельский. Он знал о масонах только то, что они таились где-то в глубине восемнадцатого века и что Павел I был масон, но это было нечто вроде безделушки, деревянного палаша.</p><p class="p1">— Самый натуральный. Посвящал баб. Радения, камлания, все один разврат. Набрал старья, безделушек, выдавал за реликвии. Напишите, а я красок подбавлю.</p><p class="p1">— Понимаете ли, — сказал Кугельский с важностью. — Это же нельзя вот так сразу, так не делается. Газета, знаете, организм. Я должен спросить Плахова. Он криминальный репортер у нас, и на его территорию я, так сказать, без согласования… да и он на мою…</p><p class="p1">Плахов, конечно, не побил бы Кугельского. Но наговорить неприятностей мог.</p><p class="p1">— Тьфу, — сказал Одинокий. — К вам в руки сенсация плывет, а вы кобенитесь. Говорил я вам, Кугельский, что вам в «Красном Бердичеве» объявления писать, и это так и есть. Без меня писать не вздумайте, у вас в слоге нет перцу. Я послезавтра приду.</p><p class="p1">Следующий день Кугельский использовал по максимуму. Вечером он почитал Брокгауза и Эфрона — в разрозненном редакционном экземпляре, по счастью, наличествовал том 36, от Финляндии до Франконии. Все-таки от Одинокого была польза. Разумеется, все надлежало проверить, выспросить у следствия, ибо Одинокий соврет — недорого возьмет, но если правда — тут была золотая жила. Кугельский сделал выписки — ему нравилось, разложив увесистый том под зеленой редакционной лампой, смотреть на себя со стороны. Сидит человек, делает выписки. Культура, тяга к знанию, не то что типичный репортер, умеющий только бегать, а не знающий, где взять главное. Франкмасоны, тамплиеры, выписывал он. Храмовники. Цифры 3, 5, 7 и 9. «Дело всечеловеческой любви». Восходит к крестовым походам, х-ха. («Х-ха!» он пометил на полях — потомство и этот листочек подошьет к полному собранию: черновики гения поучительны). Мечтательное золото. Елагинцы. (О елагинцах Кугельский нечто слышал — Елагинский дворец располагался на одноименном острове, и там будто бы тоже собирались какие-то масоны, но их в восемнадцатом годы взяли к ногтю; он не помнил, кто рассказывал про это). С наслаждением выписывал он термины: слияние божества с самим собой. Истечение энергий. Алхимия!!! — три восклицательных знака на полях, и даже взвизгнул. Если все это не ложь, не сведение темных счетов — он сделает из этого фельетон, какого в «Красной» еще не было.</p><p class="p1">Всю ночь он обдумывал, как позабористей приложить новоявленных масонов, и предполагал даже составить из этого пьесу, а если повезет, то и кино-драму. С утра он отловил Плахова, сочинявшего еженедельный обзор происшествий: два самоповешения, три самоотравления, групповое изнасилование в парке «Сан-Галли» близ завода «Кооператор». Ужасное место был этот Чубаров переулок.</p><p class="p1">— Слушайте, это, Плахов, — сказал Кугельский с американской репортерской деловитостью. — Тут у меня наклевывается дельце. Донесли информацию. Но это получается по вашей части, так что я не хотел бы влезать, понимаете? Надо же корректность. Вы как, возражать не будете?</p><p class="p1">— А что, по чубаровскому делу? — заинтересовался Плахов.</p><p class="p1">— Да нет, поважней, — многозначительно сказал Кугельский. — Дела политические. Масоны у нас в Ленинграде завелись, представляете себе?</p><p class="p1">— А, это, — сказал Плахов и несколько помрачнел. — Да чего про это писать-то. Это ж не убийство, не насилие. Собирались дураки, игрались…</p><p class="p1">— Нет, но то есть как?! — возмутился Кугельский. — Как это игрались? Вы не понимаете, это ведь политика. Они хотели установить другой строй.</p><p class="p1">— Ах, ну какой строй? — скучно сказал Плахов. — Три с половиной сумасшедших, из которых песок сыплется. Взяли и взяли, я слыхал про это, это вообще не по уголовной части. ГПУ занимается.</p><p class="p1">— Нет, но все-таки… Вдруг ваша епархия…</p><p class="p1">— Не моя, — брезгливо сказал Плахов. — Хотите — пишите. Хотя мой вам совет — не трогайте вы это дело. Если бы вы по чубаровских писали, это я понимаю. Это сволочи, мрази опаснейшие. И тунеядцы все. А эти — ну, что вы будете их… и так ведь Богом обиженные…</p><p class="p1">— Ну, это я разберусь, — высокомерно сказал Кугельский. — Вы просто не понимаете всего, так сказать, смысла…</p><p class="p1">И он отправился на Гороховую, 2.</p><p class="p1">Пропуск ему выписали на удивление быстро, но потом некоторое время гоняли с этажа на этаж, поскольку о деле ленинградских франкмасонов никто толком не был осведомлен. Отправили его сначала в шестое управление — по борьбе с церковью и сектами, как объяснил ему вежливый юноша с черными петлицами и странными на них эмблемами: гвоздь и гроб. Хотя, если вдуматься, что же странного: забиваем гвоздь нового в гроб старого. На рукаве молодого человека алел равнобедренный треугольник.</p><p class="p1">Кугельский послушно протопал на пятый этаж, в шестое управление, расположенное в комнате 5-25. Но там почти такой же строгий юноша сказал, что никакого дела франкмасонов они не ведут, а обратиться товарищу корреспонденту, скорей всего, надлежит в иностранный отдел, потому что франкмасоны — наверняка по их части. Франки же, не кто-нибудь. И он ровно усмехнулся, и Кугельский заметил, что эмблема у него была — звезда и крест, а на рукаве алели уже два треугольника, то есть он был лучше предыдущего.</p><p class="p1">Иностранный отдел располагался в другом здании, на Литейном, и Кугельский добросовестно доехал туда — было уже часа два пополудни; там пропуск выписывали куда неохотней, звонили в редакцию, проверяли, служит ли такой-то, — будто удостоверения мало, — и все затем, чтобы после получасового томления в приемной к Кугельскому вышел молодой человек, столь похожий на первых двух, что казался их третьим близнецом, только эмблема у него была — земной шар и серп, как бы серпом по шару. И треугольника было три, почти до локтя. Молодой человек смотрел на Кугельского с глубоким сочувствием и был настолько же вежливей первых двух, насколько портье в гостинице для иностранных туристов вежливей буфетчика на станции Любань. Он сказал, что весьма сожалеет, но никакого франкмасонского дела в иностранном отделе не ведут и не знают и что лучше всего товарищу Кугельскому прямиком обратиться в четвертый отдел, по борьбе с бывшими дворянами, офицерами и их террористическими группами. «Это, по видимости, к ним. Миллионная, 14».</p><p class="p1">Кугельский про себя загадал: если и там не знают — значит, Одинокий соврал. Но там внезапно улыбнулась ему удача. Пропуска там вовсе не понадобилось — позвонили наверх, и вышел к нему молодой человек хуже трех прежних, маленький, с подозрительно острыми зубами и с эмблемой в виде черепа, а под ним вместо косточек два скрещенных указующих перста. И на рукаве у него был не треугольник, а квадрат.</p><p class="p1">Молодой человек посмотрел на Кугельского и его удостоверение особенно ласково, и Кугельский робко улыбнулся ему в ответ.</p><p class="p1">— Славный вы какой, — сказал молодой человек с квадратом. — Какой мяконький.</p><p class="p1">Кугельский продолжал робко улыбаться, как идиот или даже как два идиота. Один идиот испугался, хотя бояться пока было нечего, а другой по-прежнему заискивающе глядел в глаза молодому человеку и раздвигал непослушные губы, силясь изобразить непринужденное веселье.</p><p class="p1">— Это вам не к нам, — сказал молодой человек. — Это собственная безопасность. Надо вам проехать.</p><p class="p1">— Может быть, не надо? — спросил Кугельский, поняв вдруг, что Плахов был все-таки человек опытный и, может быть, не просто так воздержался от очерка.</p><p class="p1">— Почему же не надо? — ласково спросил молодой человек с квадратом. — Непременно надо. Собственная безопасность — это очень важно. Вы сами-то как думаете?</p><p class="p1">— Я думаю, что очень, — выцветшим от ужаса голосом сказал Кугельский.</p><p class="p1">— Ну так поезжайте, товарищ Кугельский, на улицу Детскую. Знаете, где это?</p><p class="p1">— Я найду, — едва слышно пролепетал Кугельский.</p><p class="p1">— Во-во. И там вас примут, я позвоню. Полную как есть информацию выдадут. А то сделали тут, действительно. Ленинград — а они франкмасоне. Правду я говорю?</p><p class="p1">— Конечно! — горячо прошептал Кугельский. — Я про это и хочу…</p><p class="p1">— А вы сами не того? — спросил вдруг молодой человек, улыбаясь еще ласковей. — Не франкмасонин?</p><p class="p1">— Что вы, — совсем теряя голос, прошелестел Кугельский. — Как это возможно…</p><p class="p1">— Да очень просто. Если хотите заявить, то пожалуйста. Скидка будет, — доверительно прошептал молодой человек, словно предлагал какой товар.</p><p class="p1">— Я ничего, нигде, — заверил Кугельский.</p><p class="p1">— Ну, тогда на Детскую, — посоветовал молодой человек. — Поезжайте, они ждать будут.</p><p class="p1">Кугельский понял, что отступать некуда, и отправился на Детскую, что на Васильевском острове. Там, в доме 7, располагался без всякой вывески отдел собственной безопасности. Мысля логически, Кугельский ожидал увидеть там молодого человека еще меньше ростом, повышенной ласковости, с большими зубами и двумя квадратами, а что за эмблема будет на петлицах — он боялся и думать; но спустился за ним вполне заурядный и не слишком молодой сотрудник в гражданском, в обычном сером костюме и лаковых ботинках. Весь он был удивительно нейтральных тонов и такой внешности, что мог принадлежать к любому сословию или цеху. Видно было, что собственная его безопасность на высоте.</p><p class="p1">— Проходите, — пригласил он любезно. Дом 7 был небольшой, трехэтажный, тоже очень безопасный. На втором этаже был чистенький кабинет, а в нем Кугельскому предложили стул.</p><p class="p1">— Про остромовцев написать хотите? — дружелюбно спросил гражданский. — Вы знали, может, его?</p><p class="p1">— Откуда же, — даже обиделся Кугельский. — Никогда не видел.</p><p class="p1">— А почему решили?</p><p class="p1">— Мне рассказали, так, один человек, — заторопился Кугельский. — Безобразие, мне показалось — очень интересно…</p><p class="p1">— Интересно, да, — кивнул гражданский. — Вы давайте покрасочней. Потому что детали удивительные. Проделана огромная работа по установлению и выявлению. Вы пишите, я вам в общих чертах расскажу.</p><p class="p1">Кугельский вытащил блокнот и всем видом изобразил деловитость.</p><p class="p1">— Ведь там, собственно, что было-то? — сказал гражданский. Он, видно, был из крестьян — простоватый, основательный, тугодумный с виду, но сметливый; это так про него думал Кугельский, который, впрочем, никогда толком не видел крестьян, а когда встречал их еще в Орле, то боялся. Он понимал, однако, что надо любить крестьян, и потому торопился вдумать в них как можно больше хорошего; привычка вдумывать хорошее в пугающее поначалу спасительна, а в перспективе губительна, но так ведь и все гадости на свете. И этот гражданский медленно говорил, долго думал, спрашивал, а потом ждал ответа на явно риторический вопрос, словно от того, что скажет Кугельский, зависело — раскрывать ему дальнейшее или обойдется.</p><p class="p1">— Ведь там как было-то? — повторил он. — Ведь они нормальные же люди были, с виду. Вроде вот вас.</p><p class="p1">Кугельский обиделся.</p><p class="p1">— Почему же? — спросил он робко. — По-моему, никакого сходства… ничего…</p><p class="p1">— Да нет, — раздумчиво (так это назвал про себя Кугельский) протянул бывший крестьянин. — Вот такие же, как вы. (Он не сказал «как мы с вами»). И вы могли бы, очень даже запросто. И вот вопрос: почему? Почему в нашем советском, так сказать, Ленинграде такая вещь и всякая мракобесия? Почему они не пошли, например, в клуб или пива попить? Это вот такие, как вы, недоработали, недописали что-то.</p><p class="p1">Кугельский совсем смешался.</p><p class="p1">— Но есть ведь такие, как вы, — сказал он любезно. — И вы пресекаете.</p><p class="p1">— Это-то да, — согласился крестьянин в гражданском. — Но мы-то не все можем пресечь, верно? Иногда совсем молодой человек, вроде вот как вы. И успевает уехать, прежде чем мы можем что-то сделать. Такой там был Галицкий. И уехал. Куда уехал?</p><p class="p1">— Я совсем его не знал, — забормотал Кугельский, — я видел его всего два раза, он порывался писать, ни малейшего таланта, ничего, и вот поэтому секта, понимаете, потому что когда человек хочет, а ему не дано — ему прямой путь в секту…</p><p class="p1">— Это-то да, — повторил крестьянин. — Но вот возьмем других. Чего им, спрашивается, не хватало, что им хотелось всей этой мистикуляции? В общем, записывайте. По алфАвиту, — сказал он, поковыряв в зубе твердым желтым ногтем. — Велембовский…</p><p class="subtitle">2</p><p class="p1">За статью Кугельский уселся глубокой ночью, дрожа, стараясь не расплескать настроения. Настроение было — любой ценой показать, что он не то, не из тех; что фирменное крестьянское «вроде вот вас» диктовалось понятным заблуждением, потому что для крестьянина все молодые городские были на одно лицо, как японцы для европейца. Надо было каждым словом отмежеваться, что он не вроде вот их. И никогда еще не работал он с таким демоническим вдохновением — вставочка скрипела, чернила брызгались, восток синел, глаза ломило, три стакана крепчайшего чая, этого верного спутника журналиста, перекочевали в Кугельского и частично вышли с мочой, и к шести часам утра все было готово.</p><p class="p1">«Кто бы мог хоть на минуту допустить, — исподволь подбирался Кугельский, — что у нас, в нашем советском Ленинграде, среди трамваев и динамо-машин, во время усиления смычки и всеобщей ликвидации неграмотности, вивисекции и педологии, — возможно появление тайного масонского общества, высмеянного еще гениальным пером Л. Н. Толстого?! (Ему особенно понравилось ввернуть про вивисекцию. Вивисекция была — Павлов, наука; науку особенно немыслимо было совместить со всем вот этим!). Но это так, читатель. Весь древний хлам заклинаний, магических чернильниц, волшебных зеркал, всемогущих перстней и алхимических рецептов в последний раз собрался, чтобы задурить голову свободному человечеству, а если получится, то и задушить его.</p><p class="p1">Надо вам сказать, — продолжал он доверительно, — что масонские ордена уже процветали в нашем городе, но это было в гнилые времена, когда в корчах издыхало кровавое самодержавие. Тогда в его гангренозной плоти (о, я! — подумалось ему) зашевелились гнойные черви масонства и прочих оккультных шарлатанов, и даже издавался порнографический журнальчик „Изида“. Масоны вообще тяготеют к порнографии, и я не могу даже описать всех тех гнустностей (Кугельский был непоправимо безграмотен, особенно мучался над „ст“, „тся“ и „нн“), которые творились в этих закрытых собраниях. Представить нельзя, чтобы одновременно в Ленинграде происходило комсомольское и масонское собрание! Но если на комсомольском собираются люди румяные и ясноглазые, то на масонских в основном присутствовали бледно-зеленые, трупно-гнилушечные (х-ха! — подумал он).</p><p class="p1">Трудно, товарищи, — писал Кугельский. — Трудно окунаться во все это зловоние. Я не стану описывать грязные извращения, которыми под видом масонских инициаций занимались все эти люди, которые, конечно, могли найти себе полового партнера только в этой безумной и преступной среде. (У самого Кугельского вот уже месяц была половая партнерша, псковская девушка Полли, в действительности Поля, широколицая, веснушчатая, он называл ее псковитянкой, у нее таких половых партнеров было пять штук, Кугельский из них самый необременительный, она отбирала все его деньги и отдавала дворянину Бабчевскому, тонкому, беленькому, болезненному, но с огромным; он нигде не работал и вообще ее презирал). Но поверьте, что самое изощренное воображение брезгливо отвернулось бы от тех гнусностей, которыми Остромов завлекал своих партнерш под видом посвящения в „масоны“.</p><p class="p1">Все бывшие, весь прогорклый смрад старого мира, все отребье человечины сходилось (зачеркнул) сползалось на свои радения и колдовало над костями и рухлядью. Состав ордена составляли всяческие „инженеры“, „учителя“, „нотариусы“, брандмайоры, гадательницы, юродивые, алкоголики, тунеядствующие домохозяйки, кантианцы, вычищенные и другие гнилые выскребки. Во главе всего этого зловонного сброда возвышалась фигура во всех отношениях патологическая — клептоман, порнограф и половой психопат Остромов, настоящая фамилия которого звучит гораздо скучней, а именно Кирпичников. Остромов втирался в доверие к большевикам, доказывая, что масонство не секта, а почти профсоюз — ха-ха! — мыслящих людей и борцов с церковью, и будто бы масонам по пути с большевиками. Примазываться к победителям — обычная тактика опарышей. Где были эти масоны, когда большевиков ссылали по ссылкам, травили в тюрьмах и давили в казематах?! Но сейчас они с большевиками, они несут им свою гниль, чтобы „помочь“ и „просветлить“! К счастью, железная рука ГПУ сразу начала следить за деятельностью этого „ордена“ и входить в малейшие его замыслы. И теперь, когда „орден“ полностью изобличен, мы можем рассмотреть портреты этих „людей“. Хотя это трудно, читатель, а главное — омерзительно».</p><p class="p1">Он прошелся по психопатке Савельевой, выродку Велембовскому, предательски втершемуся в препсостав военной академии, и по ублюдствующему графоману Дробинину, на пути которого печатные органы Ленинграда выставили надежный заслон, так вот он пошел самоутверждаться в масоны; но особенный разгон перо его взяло там, где зашла речь о Галицком. Он сам бы не взялся объяснить ту страсть, почти ненависть, с которой описывал этого юношу, встреченного два раза в жизни; но Галицкий был перед Кугельским особенно виноват. То ли он не оценил масштаба будущих благодеяний, то ли не заблагоговел сразу перед его талантом, то ли в Кугельском оскорбительно не нуждался, а верней всего, выглядел не по рангу независимо. Ему полагалось бы, как Кугельскому в начале карьеры, демонстрировать готовность, а он полагал — он вел себя, как будто за ним нечто стоит. Теперь понятно было, что за ним стояло. Кугельский думал — воспитание, боялся даже, что талант, а оно вот что. И с этим чем-то, оказавшимся вот чем, он сводил теперь счеты.</p><p class="p1">«Но самое странное, — сводил Кугельский, стало быть, счеты, — что среди этого чуланного хлама в секте патологического маньяка Остромова оказывались молодые, которым, как говорится, жить бы да работать. Таков несостоявшийся студент, „литератор“ Галицкий, которого безумные литературные амбиции завели в остромовскую секту и там оставили. Галицкий пытался протащить в нашу „Красную газету“ свои вздохи по белогвардейскому Крыму и был, естественно, „спущен с лестницы“. Наверное, есть вина нашего прекрасного комсомола в том, что он еще не „охватывает“ своей работой всю нашу, в том числе и несоюзную, молодежь. Но гораздо небезлюбопытственней было бы узнать, куда смотрит „начальство“ товарища Галицкого, работающего, между прочим, в Ленинградском управлении учета жилплощади и продолжающего там числиться, хотя показаниями своих „товарищей“ он полностью изобличен и принимал участие решительно во всех безобразиях, творившихся в „логове“ „учителя“ „веры“».</p><p class="p1">Ффу, сказал себе Кугельский и сладостно выдохнул.</p><p class="p1">Реакция начальства на статью его, однако, изумила. Редактор городских происшествий Пряхин, во-первых, резко сократил написанное, оставив почти один фактаж. Во-вторых, он посмотрел на Кугельского едко, придирчиво, катая во рту «Леду» и прикусывая ее, как Корабельников на известном снимке:</p><p class="p1">— Надо б понаглядней, товарищ Кугельский. А?</p><p class="p1">— Куда уже наглядней! — воскликнул Кугельский, обалдевая от такой наглой зависти.</p><p class="p1">— А как жа. А вот тут. Пишете — самое извращенное воображение отворачивается. А зачем же оно отворачивается? Вы дайте полную картину. «Я не буду описывать грязные извращения». Почему же не описать извращения? И наглядность, и читателю интерес.</p><p class="p1">— Я в этой грязи, — гордо сказал Кугельский, — копаться, знаете, не намерен.</p><p class="p1">— Не намерен, — повторил Пряхин. Он бы, конечно, этого стукача одной рукой удавил, — почему-то у Кугельского еще до похода в ГПУ была репутация стукача, ни на чем, конечно, не основанная: просто интеллигентный человек в полупролетарской среде, вы понимаете. — Вы не намерен. А вот так крестьянин скажет, что не намерен навозом удобрять, что ему, видите, грязно? Какой тогда будет умолот? Наше дело тоже с грязью повозиться, а не держать чистенькими вот эти ручки…</p><p class="p1">Он хотел, конечно, почитать про грязь. Все они хотели только грязи, а главной мысли не видели. Главная мысль была в том, что всякие, которые мнят о себе, считают себя выше и все такое, непременно окажутся ниже; всех конкурентов Кугельского непременно уберет железная рука…</p><p class="p1">— И потом, — сказал Пряхин. — Вот эти всякие красотульки, эти пляски… у вас тут, например,</p><p class="p1">железная рука следит. Как это она, интересуюсь, может следить? У ней, может, глазки где? А, товарищ Кугельский?</p><p class="p1">— Если вы покрываете бывший элемент, то так и скажите, — гордо заявил Кугельский.</p><p class="p1">— Да покрывать-то нет, его уж покрыли, — медленно ответил Пряхин, жуя папиросу. — А спросить мы спросим, это да. Потому что, сами видите, дело политическое. Об деле широкого объявления не было. Вы, так сказать, сами, своею инициативой, это хорошо. Но мы со своей стороны обязаны спросить, так? Прежде чем в номер, так?</p><p class="p1">Кугельский был страшно разочарован. У него от бессонной ночи болели глаза, он торопился, а публикация откладывалась на неопределенное время. И даже главный редактор Еремеев, который Кугельскому благоволил и отечески опекал, потому что Кугельского все недолюбливали и его тоже, — долго думал, ставить или нет. Там был опасный момент. Там говорилось, что Остромов этот сначала пошел к большевикам и предлагал свои услуги, и это значить что? Это значить, что на какое-то время эти услуги его были приняты, и он функционировал целых полгода. Оно, конечно, можеть, так было и надо, и Остромов этот забрасывался в виде, так сказать, наживки. Но тогда и не следуеть разоблачать, потому что, можеть, он еще нужен и будет еще забрасываться. Конечно, тема была такая в общем привлекательная, не лишенная, что ли, читательского интересу; но без согласования Еремеев не мог. При согласовании ему сказали, чтоб он выкинул к чертям про предложение услуг, поблагодарили за бдительность, а так, в общем, сказали, что можно; и под названием «Гнилая тень» обкорнанный вдвое фельетон вышел из печати первого марта.</p><p class="p1">Кугельский сиял и не мог скрыть сияния. Он лучился. Он за руку поздоровался с вахтером, был любезен с курьером. Еремеев, зайдя в их комнату, сказал ободрительно: «Ничего, ничего». Настроение, как всегда, несколько испортил Барцев, сказав с непонятной интонацией:</p><p class="p1">— Ну вот, Кугельский, теперь вам подарят часы.</p><p class="p1">— Какие часы? — опешил счастливый Кугельский.</p><p class="p1">— Какие-какие, именные. Обычно часы дарят, пистолет потом.</p><p class="p1">— А, — разулыбался Кугельский. — Так это я же не по заданию, Барцев. Что вы. Это я сам захотел, так сказать, взять под ноготь…</p><p class="p1">— Ну, если сами, — протянул Барцев. — Если сами, тогда сразу пистолет.</p><p class="p1">Это была, конечно, шутка неприятная, но на фоне большого успеха незаметная. Барцев не находит себе места во времени, вот в чем была штука, а Кугельский нашел, он был теперь санитар общего нашего леса, и особенно было приятно, что Галицкий теперь, конечно, узнает место. Он приползет, и Кугельский, может быть, помилует. Хотя вряд ли он теперь приползет — только эта мысль и омрачала праздник.</p><p class="p1">Все уже разошлись, а Кугельский сидел в редакции, ожидая, когда можно будет идти встречать псковитянку Полли. Они договорились на ночной каток, шикарно освещенный, на ипподроме Семеновского плаца. Зима была сурова, каток в двадцать шестом не таял до середины апреля. Там играл духовой оркестр, причем в барабан ударял огромный негр, Бог весть как занесенный судьбой в Ленинград. Барабан у него как-то особенно ахал и бухал, что вы хотите, тамтамная культура. Полли назначила Кугельскому встречу в восемь вечера, у входа, а до того он сидел в редакции и перечитывал свой фельетон. Что-то победительное было в нем, какая-то поступь.</p><p class="p1">Вдруг в дверях послышался слабый шорох, и на пороге показался невысокий, крепкий желтолицый человек со шрамом. Кугельский хорошо разглядел шрам — посетитель был похож на героя гражданской, бывшего кавалериста.</p><p class="p1">— Вы к кому, товарищ? — любезно спросил Кугельский. Никакой опасности он не предчувствовал — в «Красную не пропускали» абы кого.</p><p class="p1">— А к вам, — спокойно сказал бывший кавалерист.</p><p class="p1">— По какому делу? — бодро спросил Кугельский. Наверняка из-за фельетона. Сейчас расскажут еще что-нибудь столь же фактажное, и пойдет карьера.</p><p class="p1">— Да по вашему ж запросу, — отвечал посетитель. — Вы же тут, насколько я помню, интересовались узнать, куда смотрит начальство товарища Галицкого?</p><p class="p1">— Да-да, — насторожившись, кивнул Кугельский. Столь быстрая реакция начальства товарища Галицкого не входила в его планы. — Но вам, может быть, лучше с утра… с товарищем Еремеевым?</p><p class="p1">— Отчего же, — улыбнулся кавалерист, но улыбнулся нехорошо. — Ведь это вы хотели узнать, куда оно смотрит, верно? Ну так взгляните.</p><p class="p1">Кугельский взглянул и ослеп навеки.</p><p class="subtitle">3</p><p class="p1">Приговоры по делу ленинградского масонского центра выносились без суда, Особым совещанием при коллегии ОГПУ — как и по всем иным делам, касавшимся государственной безопасности. Но выносились вяло и разочарованно, без азарта.</p><p class="p1">Если б Остромов был Учителем и кем там еще, и если бы за ним стоял реальный Запад, и если бы он в самом деле что-то умел, — ему бы, может, не вынесли вовсе никакого приговора, а взяли бы в разработку, использовали на стройках социализма или в крайнем случае для завлечения новых масонов, которых можно было бы брать за антисоветские разговоры в тайном кружке. Но Остромов обманул чаяния, оказавшись банальным жуликом с уголовным прошлым, в котором путался сам; он быстро понял, что посягательства на сакральность — неважно, партийную ли, церковную, — караются этой властью строже, чем обычное жульничество, ибо она сакральна в собственных глазах. Все пять месяцев следствия он так убедительно изображал дурака-шарлатана, что и сам уже почти верил.</p><p class="p1">Этого разочарования было бы довольно, чтобы вкатить ему по полной, но вкатывать не позволяло ленинградское чувство субординации. Если он был совсем уж жулик, и полный, так сказать, идиот, то как же мог товарищ Огранов взять его в разработку? Товарищ Огранов, правда, был теперь уж не тот, и под ним шаталось, и ползли разговоры, что его большого друга и покровителя товарища Троцкого очень просто могут попросить из Политбюро; товарищ Огранов, конечно, уже три раза отмежевался и два — отрекся, за что его на июньском пленуме уже прозвали так метко «нашим недопетром», и это привязалось, как привязывались все тогдашние клички — сначала звучавшие свойски, почти ласково, а потом, в предрасстрельных статьях, как клеймо: этот презренный недопетр… Но до июньского пленума еще было три месяца, а до предрасстрельных статей одиннадцать лет, и Огранов пока сидел крепко. Больше того — год спустя ему, нашему недопетру, дали орден Красного знамени, потому что партия не наказывает твердых работников за чужие ошибки. Ведь не мог же, товарищи, наш недопетр (смех в зале) знать в 1924 году, что товарищ Троцкий совершит грубейшие ошибки в 1926 году? (оживление в зале). Этого никто не может знать, товарищи, кроме тех, кто видит будущее, то есть, так сказать, пророков и провидцев (смех, оживление). Товарищ Огранов занимался у нас одно время пророками и провидцами и многих из них вывел на чистую воду, но пророческого дара у них, так сказать, не набрался (оживление в зале). Можем ли мы за это упрекнуть товарища Огранова, который боролся с пророками вместо того, чтобы у них учиться? Нет, товарищи! Товарищ Огранов не пророк, потому что он большевик (аплодисменты), и мы не можем поставить ему в вину отсутствие у него третьего глаза (смех, аплодисменты).</p><p class="p1">И в эту щель между падением и новым возвышением товарища Огранова проскочил Остромов со своим кружком, и наказывать его как полного шарлатана не стали, а оснований рассматривать его как оккультиста не было. И потому ОСТРОМОВА-КИРПИЧНИКОВА-УОТСОНА, без определенных занятий, 1880 г.р., дворянина, по образованию юриста, не судившегося, обвиняемого в преступлениях, предусмотренных ст. ст. 120, 169, 187 и 189, Денисов полагал бы правильным приговорить к пяти годам ссылки в Томск, а дали ему в итоге три года Пензы. ПЕСТЕРЕВУ Варвару Платоновну, 1860, дворянку, без определенных занятий, отправили на три года в Архангельск, где она и скончалась год спустя от воспаления легких. САВЕЛЬЕВУ Елизавету Дмитриевну, 1887, из дворян, поэта, приговорили к трем годам Пензы. ВЕЛЕМБОВСКОГО Григория Васильевича, 1871 г.р., дворянина, военспеца, преподавателя Ленинградской военной академии, сочли заслуживающим трех лет Нарыма, МУРЗИНУ Татьяну Васильевну — 1885, дворянку, не замужем, машинистку иностранного отдела, — приговорили к трем годам Вятки, АЛЬТЕРГЕЙМА Константина Ивановича, 1899, поэта, — к двум годам Курска, ДРОБИНИНА Германа Владимировича, 1890, МАРТЫНОВА Юрия Сергеевича, 1900, ИЗМАЙЛОВА Николая Ильича, 1887, ТАМАРКИНУ Екатерину Ивановну, 1882, мотальщицу прядильно-ткацкой фабрики «Рабочий», — к двум годам Ташкента, ПОЛЕНОВА Константина Исаевича, 1872, инженера, — к двум годам Харькова, ВАРВАРИНУ Ирину Павловну, 1895 г.р., актрису и танцовщицу, Денисов полагал бы приговорить к двум годам Владимира, но, учитывая полновесные признания и пожилую мать, ее сочли возможным отпустить, взяв подписку о сотрудничестве; а ЖУКОВСКУЮ Надежду Васильевну, 1906 г.р., студентку медицинского факультета, Денисов полагал бы возможным как раз отпустить, применив наказание условно, но товарищ Райский счел это невозможным, поскольку и в «Красной газете» указывается на недостаточность работы именно с молодежью, и Жуковская получила год и шесть месяцев высылки в город Пензу. Масонские же приборы, рукописи и предметы ритуала, изъятые у Остромова, поступили в музей при ОГПУ, что закреплено актом. Там много было интересного — замшевые ритуальные перчатки, меч, несколько печатей, порошки для курений и нижняя челюсть. Чья нижняя челюсть — теперь уж, конечно, никто не узнает. Обидно, тоже ведь жил человек, на что-то надеялся, чего-то желал. Грустна наша участь.</p></span></span>
