<span><p class="p">— Мы с вами, кажется, на брудершафт не пили, — обиженно сказал Ленин, — и я, право же, не понимаю...</p><p class="p">— Зараз поймешь, — обещал Григорьев, — как ремней из спины нарежут — все поймешь, гад. Железами калеными как почнут тебе пятки жечь — так и поймешь... Кожу с живого сдерем, брюхо взрежем и зашьем туда живую кошку...</p><p class="p">— Вам бы, гражданин Григорьев, познакомиться с товарищем Зиновьевым, — сказал Ленин с горькой печалью в голосе, — вот бы приятно провели время...</p><p class="p">— А для начала, — проговорил со злобной улыбкою Григорьев, не обращая на слова пленника никакого внимания, — тебя отдадим Марусе... Ты ей все скажешь. У нее гутарят...</p><p class="p">Владимир Ильич похолодел: он был наслышан о Марусе, кровавой любовнице кровавого атамана. Эта дьяволица в ангельском обличье обожала собственноручно пытать пленных; она молотком забивала гвозди в тела красноармейцев, белогвардейцев и махновцев; она ножом вырезала из живых куски мяса и солила... Но — выдать планы Деникина? Никогда! Лучше смерть! Но что он мог сделать?! Они оттащили его, упиравшегося, в другую хату и швырнули на земляной пол; он поднял глаза и увидал перед собою женщину ослепительной красоты, которую портила лишь жестокая складка у тонкогубого рта...</p><p class="empty-line"/><p class="p">— Плохи наши дела.</p><p class="p">— Плохи, Александр Васильевич.</p><p class="p">— Этот Чапаев! Одно утешает: Деникин со дня на день возьмет Москву. Говорят, у него недавно появился какой-то новый советник, очень дельный человек, отчаянно храбрый, офицерская косточка; вы не слышали о нем?</p><p class="p">— Non, mon Admiral.</p><p class="p">— Однако я позвал вас не за этим, monsieur Жильяр... Сегодня ночью привезли нашего юношу.</p><p class="p">«Наконец-то!» — подумал Дзержинский. Теперь, когда армия Колчака с тяжелыми потерями отступила за Урал, он не собирался гнить в сибирской тайге и тонуть на обреченном адмиральском корабле, а хотел одного: как можно скорее увидать мальчишку и — с кольцом иль без него — бежать в Москву, в свои уютные лубянские подземелья, и там пересидеть бой Деникина с большевиками, а далее, в зависимости от того, чья возьмет, примазаться к победителю и заставить его служить своим целям.</p><p class="p">Колчаковский адъютант ввел мальчика; Феликс Эдмундович впился в него глазами. Это был мальчишка лет пятнадцати-шестнадцати на вид, светловолосый, красивый, крепкий; если и было сходство с Алексеем, то лишь самое отдаленное. «Как же этот маленький негодяй собирается выкручиваться? — недоумевал Дзержинский. — Впрочем, не все ли равно!» Кольцо, кольцо на пальце правой руки, как две капли воды похожее на дягилевское, только меньше размером! (Дзержинский, в отличие от Ленина, ни разу еще не видел и не держал в руках настоящего волшебного кольца.)</p><p class="p">— Ну что, мой юный друг? — спросил Колчак, обращаясь к мальчишке. Он явно избегал называть его именем, на которое тот претендовал. — Вы узнаете этого господина?</p><p class="p">Парень, в свою очередь, внимательно посмотрел на Дзержинского. Он играл свою роль неплохо: сперва как будто оробел, потом лицо его сделалось взволнованным; наконец он ответил:</p><p class="p">— Да, я его очень хорошо помню. Я знаю его. Он подошел к Дзержинскому и схватил его руку,</p><p class="p">весьма правдоподобно изображая радость от встречи со старым знакомым; однако имени «старого знакомого» не назвал и, похоже, не мог объяснить, кем ему приходится этот «знакомый». Достаточно было задать один вопрос, чтобы разоблачить самозванца, и Колчак, похоже, собирался задать его; но Феликс Эдмундович не хотел допустить разоблачения до того, как узнает все о кольце. Он сказал поспешно:</p><p class="p">— Будьте добры, мой юный друг... Могу я взглянуть на ваше кольцо?</p><p class="p">— На что оно вам? — с искренним недоумением спросил самозванец. — Вот медальон с волосами моей матушки...</p><p class="p">— Кольцо, пожалуйста.</p><p class="p">Пожав плечами, мальчишка снял кольцо с пальца и подал Дзержинскому. Тот дрожащими руками взял его, прочел надпись на внутренней стороне; это было ОНО... «Неисповедимы пути твои, Господи!» — подумал Феликс Эдмундович.</p><p class="p">Колчак смотрел на обоих недоуменно и хмурился: он явно не понимал, почему воспитатель, знавший мальчика всю его сознательную жизнь, не может сразу сказать, тот ли это мальчик, а намеревается опознавать его по какому-то украшению... Дзержинский с быстротою молнии начал соображать, что делать дальше. «Сказать Колчаку, что это самозванец... Кольцо как будто машинально опустить к себе в карман — кому какое дело до побрякушки самозванца? Но это может показаться адмиралу странным... Он и так уже что-то заподозрил... Вдруг он прикажет своим офицерам меня арестовать?! Нет; нужно выиграть время для размышлений... Колчак сейчас должен ехать в дивизию, ему не до нас... А с парнем я разберусь наедине...» Он протянул кольцо мальчишке — тот тотчас его снова надел на палец — и произнес голосом, полным печали:</p><p class="p">— Несколько похожее кольцо было у государыни; оно вызвало во мне воспоминания... Что же касается нашего юного друга, я еще не вполне уверен...</p><p class="p">— Неужели? — удивился Колчак.</p><p class="p">— Сами понимаете, прошло много времени, а мальчики в этом возрасте меняются очень быстро; и такие ужасные потрясения... Вы позволите нам с нашим юным другом побеседовать наедине?</p><p class="p">— Как вам будет угодно, — сухо и с заметным недовольством ответил адмирал. — Сейчас мой адъютант отведет вас в офицерскую столовую, и вы сможете позавтракать, а потом вам предоставят уединенное место для беседы. Я же сию минуту уезжаю в дивизию; завтра вернусь. Буду с нетерпением ожидать результата...</p><p class="p">Завтрак прошел в молчаливой, натянутой обстановке. В присутствии нескольких офицеров Дзержинский делал вид, что ест с аппетитом, и самозванец делал вид, что ест с аппетитом; оба украдкой взглядывали друг на друга и тотчас отводили глаза. Офицеры, однако же, смотрели на мальчишку почтительно-заинтересованно. «Как можно не видеть, что он не умеет пользоваться столовыми приборами? — изумлялся Дзержинский. — Только купцы так вульгарно отставляют мизинец... Воистину слеп тот, кто желает быть ослепленным; эти глупые офицеры хотят, чтобы мальчик оказался царевичем, и ничего не замечают... Колчак умнее их; он уже, наверное, все понял. Надо скорей отобрать у маленького негодяя кольцо и — бежать, бежать в Москву!»</p><p class="p">После завтрака адъютант проводил «Жильяра» и «царевича» в один из штабных вагончиков и вышел, оставив их наедине друг с другом. Лже-Алексей спокойно плюхнулся в мягкое кресло, закинул ногу на ногу и смотрел на лже-Жильяра без тени смущения... Дзержинский выглянул в окно: адъютант не ушел далеко, а продолжал околачиваться вокруг вагона. «Не иначе — Колчак велел за нами присматривать!» — с досадой подумал Дзержинский. Повсюду слонялись вооруженные белогвардейцы; он теперь уже не был уверен, что ему легко удастся бежать. «Может, безопаснее сделать вид, что я признал в мальчишке царевича?» — размышлял он. Так и не приняв окончательного решения, он сказал самозванцу:</p><p class="p">— Дайте-ка сюда кольцо. Я его плохо рассмотрел.</p><p class="p">— Чтой-то вы к нему прицепились? Кольцо да и кольцо. Нечего в нем смотреть.</p><p class="p">— Отдайте! — повторил Дзержинский, стараясь не повышать голоса: стены вагончика были тонкие.</p><p class="p">Однако мальчишка не отдал кольца, а, напротив, сжал руку в кулак и засунул ее глубоко в карман штанов. Дзержинский, конечно, мог применить силу, но парень был росл, крепок и мог оказать сопротивление, а шум драки привлек бы внимание адъютанта и других офицеров; убить его тоже было нельзя — как потом объяснить этот поступок? И вдруг, прервав его размышления, самозванец сказал:</p><p class="p">— А ведь я вас знаю, дяденька! Вы не тот, кем прикидываетесь.</p><p class="p">— Что?!</p><p class="p">— У меня, чай, ум-то есть маленько... Я напугался страсть, как вас увидал: коли вас прислали меня опознать — стало быть, вы к царевой семье близки были, так? Я думал, вы дяденьке адмиралу тотчас скажете, что я не царевич никакой, и он меня выпнет под зад коленом... А вы чего-то мнетесь... Ну, думаю, разволновался дяденька или глазами слаб; подожду, авось обойдется. А пока вы кашу-то ковыряли, я на вас все глядел, глядел... И признал, кто вы есть. У нас в роду все глазастые, приметливые. И читать я умею. Я ваш портрет фотографический в газетах видел. Хоть вы нынче и без бородки, а глаза-то не спрячешь; глаза у вас уж больно приметные. Вы — Дзержинский, который Чекой заправляет. Вы тут шпионите за адмиралом!</p><p class="p">— Ты глупый, лживый мальчишка и больше ничего, — сказал Феликс Эдмундович. (Однако сердце его забилось так, что едва не выскочило из груди.) — Я объясню адмиралу, что ты самозванец, и он велит тебя расстрелять.</p><p class="p">— Да ладно вам, дяденька Дзержинский! Я ведь тоже молчать-то не стану, кто вы есть такой.</p><p class="p">— Почему же ты не сказал этого офицерам, когда мы завтракали?</p><p class="p">— А зачем? — возразил самозванец. — Я б сказал, что вы Дзержинский, а вы б сказали, что я не царевич. Дяденька Колчак отступает, он сердитый; он бы разбираться не стал, а нас обоих велел к стенке поставить. А так — вы меня не выдавайте, и я вас не выдам. Жить-то, чай, хочется!</p><p class="p">«Маленький жулик рассуждает верно, — подумал Феликс Эдмундович. — Не по годам хитер и наблюдателен... Ладно; я попытаюсь его разговорить, войти к нему в доверие и выманю у него кольцо, а завтра доложу адмиралу, что он — подлинный царевич Алексей. Колчаку это не понравится, но расстреливать нас он все же не рискнет. Потом я улучу момент для бегства, уеду в Москву, затаюсь и буду ловить ситуацию, максимально подходящую для вступления на престол. Жаль, конечно, что не удалось выяснить местонахождение колчаковского золота! Но теперь, когда у меня есть волшебное кольцо, я и без золота обойдусь... У меня в Москве и так кое-что накоплено... А этот гаденыш пусть остается играть роль царевича — какое мне дело?!»</p><p class="p">— Хорошо, считай, что мы договорились, — сказал он. — Ты очень умный мальчик... Кто ты таков? Откуда? Как тебя зовут?</p><p class="p">Лесть, видимо, подействовала на мальчишку, и язык его развязался:</p><p class="p">— Николаем звать, Колей. Раскулаченные мы. Сослали на Урал. Ваши и сослали. — Мальчишка теперь глядел злобно, как волчонок. — Мы раньше хорошо жили, крепко, и батракам хорошо платили, и ели они с нами за одни столом. А теперь и батраки наши, и мы — все с голоду пухнем.</p><p class="p">— Для чего ты выдаешь себя за царевича? — спросил Дзержинский. — Ты вправду надеешься, что адмирал Колчак тебя на трон посадит?</p><p class="p">— Что я — дурак? Рано ли, поздно ли, а найдется, кто меня разоблачит. Я потому надумал царевичем прикинуться, чтоб хоть не все время у мамки на шее не сидеть. Дяденька Колчак не больно-то верил, что я царевич, а все ж кормил сытно, одежу купил. Только денег мне в руки не давал. А я хочу денег — мамке отдать, семью кормить надо.</p><p class="p">— Я тебе дам денег! — с облегчением воскликнул Дзержинский. — Продай мне кольцо!</p><p class="p">— Сто царских золотых — и кольцо ваше.</p><p class="p">— Не говори вздора! Эта дрянь столько не стоит.</p><p class="p">Феликс Эдмундович, конечно, заплатил бы и в тысячу раз больше, но при себе у него не было даже ста золотых, а одни лишь бумажные деньги, которым никто не доверял. Все его богатства покоились в подземельях Лубянки...</p><p class="p">— Ежели дрянь — чего вы так за него уцепились? — резонно заметил Коля.</p><p class="p">— А ты почему за него цепляешься? — парировал Феликс Эдмундович. — Эта вещь для тебя что-то значит? — вкрадчиво осведомился он.</p><p class="p">Ужасная мысль пришла ему в голову: неужели этот юный прохвост знает о волшебных свойствах кольца?! Конечно, кольцо обретает подлинную силу лишь в руках потомка Иоанна Грозного, но...</p><p class="p">— Понятно, значит, — ответил глупый мальчишка, — оно ж золотое. Мамка у одного красноармейца на муку сменяла, когда мы еще жили хорошо. Говорю же: сто червонцев — и забирайте.</p><p class="p">Успокоившись, Феликс Эдмундович стал жестоко торговаться, но парень упрямо сжимал губы и качал головой. Феликс Эдмундович чортыхнулся про себя. «Чем больше внимания я проявляю к кольцу, тем больше мальчишке это кажется странно. Он упрямится из крестьянской врожденной хитрости, боясь прогадать. Надо идти ва-банк»,</p><p class="p">— Знаешь что, Коля? Шантажист из тебя плохой. Я скажу, что ты самозванец, и мне поверят, потому что я взрослый и у меня есть документы. А тебе никто не поверит. А если отдашь кольцо — я тебя не выдам и сразу уеду отсюда.</p><p class="p">— А хотите, я вам другое предложу?</p><p class="p">— Не хочу. Быстро дай сюда кольцо, иначе будешь разоблачен.</p><p class="p">— Я знаю, где золото Колчака! — выпалил самозванец.</p><p class="p">— Что-о?</p><p class="p">— Я ж не дурак; верно? Я пронюхал, где сундуки его. Он их всюду возит, подле себя держит, как зеницу ока бережет. Я еще в Перми их приметил, а теперь они тут, в Омске. Только я один не могу золота украсть: сундуки тяжелые и ключами заперты, и часовой их день и ночь стережет. Войдете в долю, дяденька Дзержинский? Помогите мне хоть один сундук спереть; золото пополам, и кольцо тогда берите, и разбежимся.</p><p class="p">— А сундуки большие?</p><p class="p">Коля показал руками, какие сундуки. Феликс Эдмундович задумался. Ему начинала нравиться эта идея. Самозванец тихо и без сопротивления отдает кольцо... Они крадут сундук... Он убивает самозванца... Получить кольцо и сундук золота в придачу — это неплохо.</p><p class="p">— За нами приглядывают в оба глаза, — продолжал Коля, — а мы вот что сделаем: сейчас выйдем из вагончика и перед всеми разыграем, будто вы царевича во мне признали. Расцелуемся и все такое. Они тогда подобрей к нам сделаются и смотреть за нами так строго не будут. А как стемнеет — мы сундук и слямзим. Я часового отвлеку, а вы слямзите. Идет?</p><p class="p">— Хорошо. Я — твой воспитатель, monsieur Жильяр. Запомни.</p><p class="empty-line"/><p class="p">— Альоша, о, Альоша! Мой мальчик!</p><p class="p">— Ох, мусью Жильяр, до чего ж я соскучился!</p><p class="p">Они стояли на виду у всех, обнимаясь и утирая слезы; проходившие мимо белогвардейцы украдкой бросали на них смущенно-растроганные взгляды. Мальчишка был неглуп, весьма неглуп! Адъютант, которому Колчак поручил не спускать с них глаз, тоже был смущен и растерян; деликатность и уважение к царским чувствам не позволяли ему как следует исполнять свою обязанность.</p><p class="p">И вскоре два самозванца уже шлялись по Ставке беспрепятственно, время от времени снова вскрикивая и кидаясь друг другу в объятия. (Однако Коля при этом ни разу не вынул из кармана левой руки, на которой было надето кольцо, и вообще с необычайной ловкостью избегал поворачиваться к лже-Жильяру левым боком.) Все это время Дзержинский продолжал вести с мальчишкой разговоры, пытаясь понять, не замышляет ли тот какой-нибудь каверзы, пока не убедился окончательно, что Коля, несмотря на свою житейскую смекалку, существо очень ограниченное, приземленное и примитивное: высокие материи не волновали его, честолюбия он был лишен напрочь, а энтузиазм в нем вызывали лишь мысли о том, что он купит своей «мамке» и прочим родственникам, когда разживется золотом, и как они опять заведут «крепкое хозяйство». Аристократическую душу Феликса Эдмундовича коробила эта кулацкая меркантильность, но он терпел и слушал внимательно, то и дело поддакивая мальчишке.</p><p class="p">— Вот этот вагон, — тихо проговорил Коля.</p><p class="p">Они подошли довольно близко к багажному вагону, одиноко стоявшему в тупичке. Подле вагона взад-вперед прохаживался часовой с винтовкой в руке.</p><p class="p">— Ты уверен, что золото там?</p><p class="p">— А вот пойдемте!</p><p class="p">Коля потащил Дзержинского навстречу часовому; приблизившись, он весело крикнул:</p><p class="p">— Что караулим?</p><p class="p">— Иди, иди отсюда, мальчик, — отвечал часовой.</p><p class="p">«Колчак вроде бы разумный человек, а такой либерализм развел, — с осуждением подумал Дзержинский. — За один подобный вопрос нужно стрелять без предупреждения! О, эти безалаберные русские!»</p><p class="p">— Дяденька, а дяденька... — продолжал канючить Коля. — Дай винтаря подержать, а?</p><p class="p">— Нельзя, мальчик. Я адмиральские сундуки охраняю. Адмирал никому не велят к этому вагону подходить. Самое, говорят, ценное и дорогое тут у них. Бывает, ночью сами придут, заберутся в вагон и сидят, сидят — должно, на сокровища свои любуются. Так и говорят: пришел на сокровища мои поглядеть...</p><p class="p">Дзержинский дернул Колю за рукав, и они пошли прочь. Все подтвердилось: сокровища Колчака — во всяком случае, какая-то часть их — были в вагоне! Нынче ночью адмирал в отъезде и не придет сюда... Дзержинский представил, как адмирал Колчак, подобно Скупому рыцарю, сидит ночами по колено в золоте, перебирает в горстях монеты, слитки, нити жемчуга... «Пока ограничусь одним сундуком, а потом, если красные возьмут верх в войне, экспроприирую и остальное. Колчака надо будет казнить. Я в нем ошибался. Он не способен поддерживать порядок. Бесполезный человек».</p><p class="p">Темнело; к парочке самозванцев подошел адъютант и, остановившись в некотором отдалении, деликатно кашлянул.</p><p class="p">— Ваше высочество, вам пора на ночлег. Воздух сырой. Адмирал будет огорчен, если вы простудитесь. Ведь у вас слабое здоровье.</p><p class="p">— Иду, иду, — небрежно сказал Коля. — Спокойной ночи, мусье Жильяр, душечка!</p><p class="p">И, украдкой обернувшись, он плутовски подмигнул своему сообщнику. Они расставались ненадолго: в полночь было уговорено встретиться у вагона с сокровищами.</p><p class="p">Феликс Эдмундович лег на свою походную кровать и предался сладким мечтаниям. Волшебное кольцо и власть над Россией почти в руках его!.. Но удивительное чувство овладело им: не разочарование, конечно, но какая-то опустошенность... Подчинив всю жизнь свою достижению одной цели, он не задумывался никогда о том, что путь к ней обычно бывает слаще результата; да, он читал и ценил Бернштейна и знал его лозунг «Конечная цель — ничто, движение — все», но не приспосабливал это утверждение к себе. Поэтому он отнес свое странное эмоциональное состояние на счет обычной усталости.</p><p class="p">Около полуночи он был уже на месте; новый часовой расхаживал вдоль вагона... Мальчишка запаздывал. У него были часы, Феликс Эдмундович видел их; но он не сообразил проверить, умеет ли крестьянский сын различать время. Он шепотом выругался. «Нет, конечно же, умеет. Он все-таки грамотен и не дурак». Прошло десять минут, пятнадцать... Феликс Эдмундович согнулся пополам от внезапной невыносимой боли в сердце: он понял все... Он кинулся к вагону, где ночевал лжецаревич, разбудил денщика...</p><p class="p">— Так они к вам пошли, мусье, — моргая, отвечал денщик, — соскучились, говорят, шибко... Мне не велено их выпускать по ночам, да ведь жалко! Тоскует дитя, сиротка несчастный... А рази ж они не у вас, мусье? Уж больше часу, как ушли...</p><p class="p">Денщик продолжал бормотать свой вздор; Дзержинский уже не слышал его. Все в нем оборвалось. Больше часу! Пуститься в погоню — куда?! О, почему он как следует не расспросил гаденыша о его семье! Он даже не знает, в каком селе его искать! Раскулаченных под Екатеринбургом — что нерезаных собак! Вот psya krev, холера ясна!</p><p class="p">Некоторое время он лежал на земле, кусая губы, задыхаясь от бессильной ярости. Потом, собравшись с силами, вскочил и бросился обратно к вагону с золотом; нужно было хоть чем-то вознаградить себя после столь жестокого удара судьбы. Подкравшись незаметно к часовому, он оглушил его ударом по голове и поднялся в вагон... Все было уставлено сундуками. Он выбрал самый большой и попытался открыть его, но замки были необычайно крепкие... Он встряхнул сундук. Тот был набит чуть-чуть неполно; по звуку внутри его было ясно, что там находятся слитки. Сундук весил, наверное, с полтонны, но отчаяние и гнев придали Дзержинскому силу нечеловеческую; он взвалил сундук на спину и, согнувшись в три погибели, побежал в тайгу...</p><p class="p">Ужасен был путь его; комары, мошка, гнус ели его лицо, и он не мог даже отогнать их, ибо его руки были заняты сундуком; спина и ноги болели невыносимо; но все это было ничто по сравнению с тоской и злобой, сжигавшими его душу. Останавливаясь на отдых, он снова и снова пытался взломать сундук, но ничего не выходило; и он опять взваливал его на спину и бежал, бежал, и плакал, и ненавидел всех и вся. Желание излить на кого-нибудь свой гнев было так сильно, что, пробегая мимо реки Урал и заметив на середине ее усатую голову какого-то пловца, он остановился, скинул сундук на землю и выстрелил в эту голову. Выстрел его был, как всегда, смертоносно точен. Это его немного утешило.</p><p class="p">Москву он пробежал на последнем дыхании; он даже не останавливался, чтобы отвечать на приветствия встречных большевиков. Наконец он добежал до Лубянки, заперся в самом глубоком подземном каземате и, схватив лом, приступил к сундуку с самыми решительными намерениями. Руки его тряслись от волнения и усталости, и он долго не мог справиться с замками, но вот крышка немного подалась...</p><p class="p">Минуту спустя он сидел на полу и блуждающим, бессмысленным взглядом обводил комнату. Нижняя губа его отвисла. Ему казалось, что все внутренности из него вынули и перекрутили на мясорубке, что душа его трепещет, пробитая гвоздями, что мозг его выпит... Потом он встал на четвереньки и завыл... Он был на волосок от безумия в ту ночь. К счастью, никто при сем не присутствовал, никто не был свидетелем его позора. Только минералогическая коллекция Колчака, путешественника и географа; но камни, благодарение Господу, немы и никому не могут ничего рассказать.</p><p class="empty-line"/><p class="p">Высокий светловолосый парень поддел на вилы копну сена, разогнулся, кинул сено наверх воза, утер рукавом мокрое лицо. Он так хотел купить лошадь или хотя бы корову, но... Живой остался, ноги унес, и то ладно. Он сразу понял тогда, что от начальника Чеки ждать снисхождения бесполезно. Слава богу, тот почему-то заинтересовался этим дурацким колечком! Коля мгновенно сообразил, что он жив лишь до той минуты, пока колечко при нем. Он вспомнил о булыжниках, что как-то в хорошую минуту показывал ему дяденька Колчак... «Хорошо, что Дзержинский такой жадюга оказался. А то б прирезал и глазом не моргнул. Спасибо колечку. Надо б, конечно, продать его, да ведь цена — гривенник в базарный день. Пущай лежит на память. Оно меня выручило. Будет у нас эта... фамильная реликвия. Стану взрослый, женюсь — детям передам, может, и их когда выручит. Жаль, что денег от дяденьки Колчака так и не допросился, но все ж таки штаны новые, рубаха, пальтишко, сапоги, да и ел от пуза. Ниче, не пропадем как-нибудь, выкарабкаемся. Мы, Ельцины, сметливые. Своего не упустим».</p><p class="empty-line"/><p class="subtitle">3</p><p class="p">— О, как я буду тебя мучить, белогвардейский пес! Ты мне расскажешь все планы белых! — прошипела Маруся; лицо ее исказилось судорогой, и она сразу стала похожа на ведьму.</p><p class="p">— Но, милочка, я не белогвардеец... — жалобно проговорил Ленин. — Я вообще-то на самом деле красный... то есть зеленый...</p><p class="p">— Это мне без разницы, — отвечала ужасная женщина, — я всех ненавижу одинаково. Рассказывай планы красных и зеленых. Какие знаешь, такие и рассказывай.</p><p class="p">Владимир Ильич вспомнил, как покойный Бауман говорил ему, что буйных безумцев можно иногда утихомирить ласковыми речами и вниманием к их проблемам; цепляясь за эту последнюю соломинку, он задушевным голосом спросил:</p><p class="p">— За что же вы, милочка, всех так ненавидите?</p><p class="p">— Мужчины жестокие твари, мерзавцы, подлецы; они заслуживают кары все до единого.</p><p class="p">— А, так вы ненавидите одних лишь мужчин! А ежели я докажу вам, что общение с мужчиною может быть очень даже приятно и мило? («Только бы она позволила мне ее малость потискать — глядишь, и смягчится... Уж я из кожи вон вылезу, чтобы доставить этой ведьме удовольствие, а потом авось как-нибудь да убегу...»)</p><p class="p">— Хм, — сказала Маруся, — как же ты мне это докажешь, ублюдок?</p><p class="p">— А вы развяжите меня. Не бойтесь, не убегу: там вокруг хаты слоняется десяток ваших с обрезами.</p><p class="p">— Я ничего и никого не боюсь, — надменно заявила Маруся.</p><p class="p">Она подошла к валявшемуся на полу Ленину и с размаху ударила его ногой в бок, потом наклонилась и поднесла к его лицу огромный мясницкий нож. Он употребил всю свою силу воли на то, чтобы не зажмуриться. Ужасное лезвие сверкало перед его глазами. Она приблизила нож к самому зрачку... Он сжался в ожидании непереносимой боли, но вдруг женщина резким взмахом ножа разрезала веревки, стягивающие его локти, и скомандовала:</p><p class="p">— Встать!</p><p class="p">Он поднялся, разминая ноги, и попытался улыбнуться этой адской мегере. Она была чуть не вдвое выше его ростом, широка в плечах, а в поясе тонка, как оса; ее движения были грациозны, ловки и гибки; гимнастерка и штаны обтягивали ее, как вторая кожа, выставляя напоказ высокую грудь и стройные ноги. Рукава гимнастерки были засучены выше локтя и обнажали смуглые руки, покрытые темным шелковистым пушком: для брюнеток это не редкость, и Владимиру Ильичу даже иногда нравилось, но у этой пушок был что-то уж очень густ, и форма кисти... Ленин еще раз, более внимательно окинул взглядом фигуру Маруси и вдруг ахнул...</p><p class="p">— Вы... вы гермафродит!</p><p class="p">— Да! Я с рожденья обречена на страдания и насмешки! Я изрежу тебя в куски, грязная собака! — Однако она не двигалась с места, и руки ее безвольно повисли.</p><p class="p">— Вы, милочка... вы, батенька, не отчаивайтесь, — сказал Ленин. — Это все буржуазные предрассудки. Я человек без предрассудков и считаю, что все люди более-менее равны.</p><p class="p">— Вы добрый, — сказала Маруся и вдруг, к изумлению Ленина, бросила нож и залилась слезами. — Ах, я так несчастен! Вы думаете, мне приятно жить у этого алкоголика Григорьева и изображать из себя ведьму? Ведь это все фарс; это нарочно, для устрашения, Григорьев распускает слухи, будто я пытаю пленных, чтоб они раскалывались и выдавали военные тайны, едва меня увидев... А я даже курицу зарезать не могу!</p><p class="p">— Но зачем же вы остаетесь у него?</p><p class="p">— А куда мне идти? Кому я нужна?! Я и у красных был, и у белых; все меня гнали, как только понимали, что я такое... А Григорьев оставил, потому что он алкоголик и ему все равно...</p><p class="p">— Не надо плакать, милочка, — сказал Ленин. Брезгливость и жалость к этому ужасному существу мешались в его сердце. — Помогите мне бежать. И сами бегите в Москву.</p><p class="p">— К большевикам?</p><p class="p">— Не к большевикам; дни большевиков сочтены. Просто в Москву. Там после свержения большевицкой диктатуры начнется новая экономическая политика; откроются рестораны, варьете... Творческая деятельность может заменить человеку личную жизнь, уверяю вас! (Ленин как-то слышал сие идиотское утверждение от Луначарского и решил, что здесь оно будет уместно.) Вы танцуете? Поете?</p><p class="p">И, кивнув, Маруся запела; у нее оказалось прелестное контральто... Чудную, странную песню пела она; Владимир Ильич никогда не слыхал такой песни. Она бы, наверное, очень понравилась его другу Махно. Она и грустная была, и веселая, и какая-то отчаянная. «Журавль по небу летит, — пела Маруся, — корабль по морю идет... А кто меня куда несет по белу свету... И где награда для меня, и где засада на меня — гуляй, солдатик, ищи ответу...» А потом она запела другую песню, еще лучше, от которой прямо сердце разрывалось — про коней, что хочут пить...</p><p class="p">— Браво, милочка, браво! — сказал потрясенный Владимир Ильич. — Вы с вашей красотой и вашим голосом могли бы попробовать себя в синематографе — это великое искусство! Я дам вам записочку к Ханжонкову, на киностудию.</p><p class="p">— Спасибо! — обрадовалась Маруся. — Но какое отношение мой голос может иметь к синематографу?!</p><p class="p">— Не за горами времена, когда кино перестанет быть немым! — горячо сказал Ленин. Он искренне верил, что это когда-нибудь случится — конечно, не так скоро, как полет на Марс или Венеру, но все-таки... — А теперь достаньте мне одежду, а, батенька? И надо, надо отсюда уносить ноги. Григорьев ваш долго не проживет, уж вы мне поверьте. На него у всех зуб громадный. (Он оказался прав: очень скоро Григорьева прикончил Махно.)</p><p class="empty-line"/><p class="p">И вот, едва стемнело, Маруся провела Ленина за околицу; там ждали оседланные кони... Они пустились вскачь. «Как бы мне вежливо отделаться от этой твари?» — думал Владимир Ильич. Когда гермафродит не пел, его общество снова было Ленину противно; что б он ни говорил об отсутствии предрассудков — но терпимости всякого человека есть пределы...</p><p class="p">— Извините, батенька, — сказал он, натягивая поводья, — но мне нужно направо, в Гуляй-Поле. А вы езжайте в Москву — это прямо и потом налево.</p><p class="p">— Прощайте, — тихо сказала Маруся, — и благодарю вас. Вы пожмете мне руку? — она гибким движением перегнулась к нему с седла.</p><p class="p">Ленин помедлил; потом нехотя протянул руку. Кони их стояли смирно и дружелюбно обнюхивали друг друга... И тут впереди раздались выстрелы и крики, и из зарослей на них выскочил конный отряд; знаков различия никаких не было... «Это еще кто такие? Неужели опять в плен возьмут!» — подумал Владимир Ильич; только сейчас он почувствовал, как сильно его утомили фронтовые приключения.</p><p class="p">— Бегите! — крикнула Маруся. — Я их задержу! </p><p class="p">Но он не мог бросить в беде товарища, каков бы тот ни был; он сорвал с плеча винтовку... Те открыли огонь; через миг уже тело Маруси, прошитое десятком пуль, безвольно свешивалось с седла... Ленин в очередной раз попрощался с жизнью, но вдруг услышал:</p><p class="p">— Товарищи, не стрелять! Это же наш Ильич!..</p><p class="p">То был разведотряд 14-й армии Уборевича. Командир отряда видел Ленина на митингах и узнал его; это спасло ему жизнь.</p><p class="p">Тотчас же Ленина с почетом повезли в штаб армии; он только раз оглянулся... Маруся лежала на земле, прекрасные черные глаза ее были широко раскрыты, и по лицу уж ползала муха... «И где награда для меня, и где засада на меня — гуляй, солдатик...» Он в кровь закусил губу и отвернулся.</p><p class="p">Заботясь о безопасности Председателя Совнаркома, красные не отпустили его ни в Гуляй-Поле, ни в Екатеринодар, и, какие чудеса изворотливости он ни проявлял, бежать от своих ему не удалось... Он вернулся в Москву, вернулся в свой кабинет, вернулся к привычной жизни. Большевики не поняли его, когда он стал убеждать их сдать Деникину Москву, и даже жена не поняла... Собственные министры вертели им, как вертят любые царедворцы любым государем; он не мог сопротивляться толпе... Наступление Деникина было отбито; хитрый Махно вновь перешел на сторону красных; с Колчаком вскоре было покончено; война продолжалась, но впереди маячила уже мирная жизнь и новая экономическая политика...</p><p class="p">Поначалу воспоминания Владимира Ильича о козацкой вольнице и о золотых погонах были очень ярки, но постепенно они таяли в гуще повседневности и заволакивались туманом; в конце концов ему стало казаться, что все фронтовые приключения ему приснились во сне, в том самом страшном и прекрасном сне, без которого выносить явь было бы совершенно невозможно.</p><p class="p">А может, это и был всего лишь сон, сон кремлевского мечтателя?..</p></span>
