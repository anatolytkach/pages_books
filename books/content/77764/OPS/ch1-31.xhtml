<p class="p1">ЭПИЛОГ</p>
</div><p class="p">В апреле 1928 года директор музея Ленина в Ульяновске Андрей Трофимович Дворцов сидел у себя в кабинете и смиренно обедал.</p><p class="p">Андрей Трофимович предпочитал обедать непосредственно на рабочем месте. Время было горячее — полным ходом шла реставрация мемориального кабинета Ильи Николаевича, красили лестницу, бывший купец Пронькин добровольно пожертвовал музею старенький рояль в обмен на обещание никогда не трогать самого купца и его семейство; точно на таком же рояле, по утверждениям Анны Ильиничны Елизаровой, играла Мария Александровна Ульянова, а маленький Володя слушал «Аппассионату», плакал и повторял: «Другим путем... другим путем...» Сам Володя очень мечтал играть на рояле, но делал это редко, не желая расслабляться. (Здесь составители его биографии были правы — на рояле он играл всего раз в жизни, и то в преферанс.)</p><p class="p">Андрей Трофимович жевал вкусный пирожок с мясом, который испекла ему супруга, и размышлял об очередных задачах музейного руководства: завести живой уголок (Володя любил животных), побелить потолки в гостиной, надергать перьев из местных ворон и собрать из них головной убор предводителя индейцев, в котором маленький Володя впервые примерял на себя роль вождя...</p><p class="p">Неожиданно Андрея Трофимовича вызвали вниз. Наконец приехала первая делегация московских школьников — победителей исторической викторины «Ленин жил, Ленин жив, Ленин будет жить». Они отлично ответили на пять вопросов из жизни Владимира Ильича Ульянова-Ленина и подготовили прекрасные подарки семье вождя — скворечник для дома-музея, красные галстуки для принятия родственников вождя в почетные пионеры, портрет Ильича в виде берестяной аппликации... Чистенькие, строгие дети, перед которыми Андрей Трофимович сам почему-то почувствовал себя ребенком, чинно стояли у крыльца. С ними был молодой учитель в круглых очках, наголо бритый и очень решительный.</p><p class="p">— Здравствуйте, товарищ, — сказал он. — Прибыли для прохождения экскурсии.</p><p class="p">— Уже устроились? — гостеприимно спросил Андрей Трофимович.</p><p class="p">— Да, и город посмотрели, — сказала строгая девочка лет пятнадцати. — Так красиво! Сразу начинаешь понимать, почему товарищ Ленин так любил свой уютный город.</p><p class="p">— А самодержавие ненавидел, — добавил десятилетний бутуз в коротких штанах.</p><p class="p">«Вот за что жил и умер товарищ Ленин», — подумал Дворцов и чуть не прослезился. Он провел детей по обоим этажам дома-музея, лично рассказал им историю семьи Ульяновых, показал сундучок, на котором спала няня, кроватку маленького Володи, его похвальный лист и сочинение «Зима» (изъятое из архива местной гимназии — его написал Керенский, отличник и большой любитель поразмышлять устно или письменно; подпись отрезали, а сочинение положили под стекло). В завершение экскурсии Андрей Трофимович лично сел за новообретенный рояль и довольно сносно изобразил первые такты «Аппассионаты». Дальше он пока не научился.</p><p class="p">Восторженные дети ушли, боясь даже обмениваться впечатлениями — каждый думал свою таинственную думу. О чем-то молчал и строгий учитель в круглых очках. Андрей Трофимович вернулся к себе в кабинет, чтобы спокойно, с сознанием выполненного долга доесть пирожок с мясом.</p><p class="p">За столом, на его директорском месте, сидел невысокий лысый человек с рыжей бородкой и невозмутимо уплетал пирог.</p><p class="p">Дворцов замер на пороге.</p><p class="p">— Во тьме ночной пропал пирог мясной, — весело проговорил человечек. — Пропал бесследно, безвозвратно, куда девался — непонятно. Здравствуйте, батенька, очень рад.</p><p class="p">Дворцов ущипнул себя и прислонился к косяку.</p><p class="p">— Дай, думаю, зайду, — невозмутимо продолжал человечек. — Все же люди не чужие, родной дом товарища Ульянова-Ленина. Скучно жил Ульянов-Ленин, ну да ничего. Вырос большой и такое веселье устроил — никому мало не было. Очень мило, очень мило. Польщен-с. Пирожок, кстати, объяденье. Привет супруге. Я чего зашел-то, почтеннейший: не богаты ли вы сейчас небольшой суммой? Скажем, рублей шестьдесят-семьдесят? Вышлю при первой оказии, а когда почувствую приближение старости — готов завещать музею уникальный экспонат. Так сказать, три источника и три составные части. Ключи счастья, ежели хотите.</p><p class="p">Он вытащил из нагрудного кармана потертого пиджачка три серебряных наперстка и резной костяной шарик.</p><p class="p">— Вот-с, не угодно ли? Если не хотите ссудить, можем сыграть. Хотя, конечно, руки уже стали не те.</p><p class="p">— Това... Това... — лепетал директор.</p><p class="p">— Ну а что тут удивительного, дорогой друг? Сами все время повторяете: Ленин жил, Ленин жив, Ленин будет жить. А как увидели вечно живого — так сразу же и полные штаны. Вы уж давайте определяйтесь: или живой, или нет. А если решили, что живой, — так и нечего бояться, давайте денежку. Вы тут благодаря мне ежемесячное жалованье получаете, а я, значит, ходи побирайся? Архиневежливо, товарищ Дворцов!</p><p class="p">— Това... — повторял Дворцов, дрожащими руками доставая бумажник. — Все, все что угодно... И больше...</p><p class="p">— Благодарю-с, — весело сказал Ленин. — А вы как думали? В Мавзолее лежу? Дудки-с. Должен быть в России один правитель, который ходит по стране инкогнито и смотрит, как живет возлюбленное Отечество. А как оно живет? Посредственно, но все-таки. Живее всех живых. Только городишко у вас, скажу откровенно, архидыра. В карты не с кем перекинуться. Веселых домов нет. Публика скучная. Это такая же родина Ленина, как я Ульянов. А вы славный малый, я вам верну, когда разбогатею. Теперь, наверное, скоро уж. Товарищи большевики говорят — скоро совсем хорошо станет. Вот тогда, товарищ Дворцов, я вам и пришлю семьдесят рублей — ладно? Потерпим до коммунизма?</p><p class="p">— Това... Това... — шептал Дворцов.</p><p class="p">— Ну, не поминайте лихом. Да, кстати! — Ленин взял с полки новое издание «Государства и революции». — Я тут пролистал... Дельно, очень дельно! Гриша и Наденька — отличные ребята. На их месте я бы тоже уже ушел, а то, неровен час, станет совсем хорошо... Автограф не желаете?</p><p class="p">Книга эта — «Государство и революция», 1928 год, издательство «Земля и Фабрика», с надписью «Музею Ленина в Ульяновске с полным коммунистическим приветом! Ульянов-Ленин, литератор», — и поныне хранится в запасниках Института марксизма-ленинизма в одном фонде с мемуарами Дворцова и крошками от мясного пирога, которые директор заботливо собрал со своего стола.</p><p class="p">— Однако заболтался я с вами, — сказал Ленин. — Время не ждет.</p><p class="p">Дворцов смотрел на него влюбленными глазами. Он все бы отдал за этого человека. Скажи ему Ленин — и он оставил бы пост, музей, Ульяновск, обулся бы в лапти и пошел за ним странствовать по Руси, ночуя у добрых баб и играя по маленькой. Ленин пожал ему руку. Рука у Ленина была пухлая и теплая, а глаза добрые-добрые.</p><p class="p">— Не грустите, товарищ Дворцов, — сказал Ленин. — Глядишь, свидимся. У настоящего большевика главное что?</p><p class="p">Директор хлопал глазами.</p><p class="p">— Главное — хвост пистолетом, — сказал Ленин, изображая на пальцах хвост пистолетом.</p><p class="p">И, посвистывая сквозь зубы, вышел на Стрелецкую улицу, одним концом упиравшуюся в берег Волги, а другим — в Большую Коммунистическую. По Большой Коммунистической если налево, то будет улица Люксембург, от которой, по улице «1-го Интернационала» можно выйти в широкую, цветущую летнюю степь; а если направо, то через три квартала будет Партизанская, упирающаяся в Пролетарскую, по которой идешь, идешь и доходишь до синего, манящего прохладой леса... Велика Россия, просторно поле, ласков стозвонный бор: есть, есть куда деться приличному человеку.</p><p class="empty-line"/><p class="p"><em>2005</em></p><p class="empty-line"/></span>
