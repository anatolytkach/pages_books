<span id="id14"><div class="title">
<p class="p1">ГЛАВА 13</p>
</div><p class="subtitle">Важнейшие искусства. Смерть на Кавказе. Старые друзья встречаются вновь. Призрак Кремля.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">— Не ве-рю.</p><p class="p">— Но, Владимир Ильич...</p><p class="p">— Не верю, товарищ Вертов! — отрезал Ленин. («Господи, что за имечко — Дзига! Что за мода пошла на имена такие дурацкие!») — Вот когда я смотрю на Мэри Пикфорд в этой, как его... — Он досадливо прищелкнул пальцами, пытаясь вспомнить название фильмы, которую смотрел в прошлый четверг в «Первом показательном» — бывшем «Арсе», — где блондиночка Мэри танцевала на столе среди бутылок с шампанским так зажигательно. — Короче говоря, ей я верю: такие ножки лгать не могут. И Дугласу Фэрбенксу верю; а вашей «Киноправде», дорогой мой Дзига, не верю...</p><p class="p">— Но почему?! — удивлялся режиссер.</p><p class="p">— Потому что ваша правда скучная и никому не нужна. «Агитпоезд Троцкого!» «Выступление Рыкова на съезде профсоюзов!» Неужто вы думаете, что хоть один человек в здравом уме пойдет это смотреть? А со мной что вы делаете? Ну, кому это надо — смотреть, как я бегаю из угла в угол экрана с картонным бревном наперевес?!</p><p class="p">— Вам, Ильич, никто не возбранял бегать с настоящим бревном, — сухо ответил Вертов, донельзя разобиженный.</p><p class="p">— Да, двадцать дублей подряд! Вы бы хоть сняли меня верхом на белом коне, что ли... На кой чорт я вам отдал ателье Ханжонкова?! Народу нужен «Тарзан»; народу нужен «Мститель Зорро»; народу нужна «Дама с камелиями»... А это... — Ленин не стал договаривать и лишь махнул рукой. Он уже отчаялся справиться со своим придворным синематографистом.</p><p class="p">Досада его, впрочем, была неглубока. Куда печальней было другое. Товарищи, за годы военного коммунизма безнадежно развращенные талонами и карточками, сопротивлялись новшествам что было сил, крутили пальцем у виска, в пылу споров обзывали его толстопузым буржуем и ревизионистом; он бы не выдержал, наверное, этого противостояния, если б умница Бухарин не поддержал его. Может, удастся вернуться к старому, только без прежних глупостей вроде самодержавия и цензуры. Откроем казино, коммерческие магазины, кафешантаны... назовем «Новая экономическая политика»... и постепенно, постепенно... Одно угнетало его: Инесса не увидит всей этой красоты и благополучия. Никогда он не войдет под руку с нею в модную лавку, никогда не скажет угодливому официанту принести устриц и шампанского во льду, никогда не сожмет ее маленькой ручки в полутьме кинозала, никогда, никогда!</p><p class="p">Осенью двадцатого года у Инессы обострилась почечная болезнь, и Ленин уговорил ее поехать на курорт. Путь в Европу был закрыт — после скандалов и восстаний, устроенных большевицкими эмиссарами, любой приезжий из красной Москвы неизбежно оказался бы в тюрьме. Оставался Кавказ: хотя там и бесчинствовали чеченские абреки, но воздух и минеральные воды были по-прежнему целебны. Ильич с товарищами долго думали, кого отправить с Инессой для ее безопасности. Дзержинский предлагал Кобу — тот ужасно раздражал его тем, что всюду ходил за ним и вслушивался в каждое слово, словно стараясь запомнить. Ленин не хотел оставлять любимую женщину на попечение рябого идиота, у которого неизвестно что на уме. Если бы приставить к Кобе кого-нибудь поумнее...</p><p class="p">Тут под окнами Кремля раздался веселый голос:</p><p class="p">— А вот камо петрушка, укроп, кинза! Лючший зэлэнь, налетай, покупай!</p><p class="p">— Камо! — закричали все хором и бросились на улицу. У кремлевской стены с лотком зелени и правда стоял давно потерянный Камо-Тер-Петросян, отважный исполнитель эксов. Оказалось, он долго маялся в немецкой лечебнице, потом сумел бежать, добрался до родной Армении, но не поладил там со взявшими власть дашнаками и опять побежал в Москву. Без лишних слов ему доверили охрану Инессы, вручив заодно чемодан с золотом для установления на всем Кавказе советской власти. На всякий случай — мало ли как годы скитаний повлияли на человека? — Кобе велели следить за ним. Усердно кланяясь, дурачок согласился.</p><p class="p">Под перестук колес Инесса сладко заснула. Ей снилось, что они с Ильичом снова в Женеве, им хорошо вместе, и тут же Надя, Луначарский, Шурочка Коллонтай, и все такие добрые и веселые, даже страшный Феликс улыбается, и все пьют шампанское и говорят: «Давайте не поедем в эту холодную Россию, пусть она живет спокойно, без всяких революций!» Разбудил ее робкий стук в дверь. Инесса не желала расставаться с приятным сновидением, но стук раздался снова, уже громче.</p><p class="p">— Да-да, войдите! — отозвалась она. В дверь купе просунулась голова Кобы, почему-то в фуражке проводника.</p><p class="p">— Таварыщ Инэсса, нэ жэлай ли чай, чурчхела, мандарин?</p><p class="p">— Спасибо, товарищ Коба. Если можно, принесите чаю.</p><p class="p">Коба принес вместо одного стакана чаю два и по-хозяйски расселся напротив, шумно отхлебывая и исподлобья поглядывая на нее желтыми волчьими глазами. Инессе стало неуютно, и, чтобы рассеять напряженность, она спросила:</p><p class="p">— А у вас, товарищ Коба, остались на Кавказе родные?</p><p class="p">— Мамка старый, — сказал Коба, наморщив низкий лоб и словно что-то припоминая. — Гори жывет.</p><p class="p">Инесса не знала, что это название города, и решила, что мамка, мол, живет в горе — и немудрено, с таким-то сыном.</p><p class="p">— Жэна помер, сын Яшка, — продолжал дурачок. — Нарком нужен другой жэна, красивый.</p><p class="p">— Конечно, вы мужчина видный и при должности. За вас любая пойдет, — она по привычке пыталась кокетничать, чтобы обратить разговор в шутку. Но желтые глаза Кобы оставались серьезными.</p><p class="p">— Любая нэ нужэн. Баба глупый, жадный. Таварыщ Фэликс вэрно гаварыт: «Плох тот революционер, который отдает себя семье. Партия — это орден меченосцев, и в ней нет места личным привязанностям». — К изумлению Инессы, эти слова были сказаны безо всякого акцента... вернее, со слегка шипящим польским акцентом Дзержинского. — Удывылась? — Коба вновь заговорил своим привычным голосом. — Думала, Коба дурак, да? Всэ думают, и пускай. Коба еще им пакажэт. Ильич старый, скоро Ильич нэт — а Коба есть. Таварыщ Инэсса будэт новый муж.</p><p class="p">— Да что вы себе позволяете? — не выдержала Инесса. — Еще слово — и я позову товарища Камо. Тогда все узнают, какие гнусные предложения вы мне делаете!</p><p class="p">— Нэ надо, нэ надо, — забормотал Коба и выскочил из купе, не допив чай. Инесса поскорее заперла задвижку и села смотреть в окно, за которым тянулись бесконечные южнорусские степи. После Ростова она уснула и увидела продолжение того же сна, где ее окружали добрые большевики в чистых сорочках. Среди них был и Коба, одетый в костюм опереточного горца и держащий в руках блюдо с мандаринами. Он не говорил гнусностей, а только улыбался и повторял «Харош, харош».</p><p class="p">— ...Харош, харош. Не крычи. Харош баба. — Это был уже не сон. В купе было темно, а на нее навалилось мужское тяжелое тело, от которого несло козлиным запахом. Инесса заметалась, пыталась крикнуть, но Коба — это, без сомнения, был он — умело зажал ей рот какой-то тряпкой, другой рукой залезая под одежду. Раздался треск разрываемой нижней юбки, и только тут Инесса ощутила настоящий гнев. Скотина, да знает ли он, как трудно достать в Совдепии настоящий французский шелк? Она завела руку за голову, словно пытаясь обнять насильника, выдернула из тяжелой копны волос острую шпильку и изо всех сил вонзила ее в шею Кобы.</p><p class="p">— Ай, шайтан! Квакала, квакала! — завопил тот, но вместо того, чтобы отпустить женщину, обеими руками сдавил ей горло. Перед гаснущим взором Инессы закружились разноцветные звезды, складывающиеся в ненавистную усатую рожу идиота, которая вдруг превратилась в любимое лицо Ильича с лукаво прищуренными глазами. «Какой странный сон!» — успела подумать Инесса перед смертью.</p><p class="p">— Камо плохо? Почему крик? — в купе зажегся свет. Коба, желтые глаза которого горели по-тигриному, отпрянул от своей жертвы и увидел на пороге заспанного Камо. Зарычав, он выхватил из полуспущенных штанов кинжал и замахнулся им:</p><p class="p">— Убью, армянский морда!</p><p class="p">Камо никак не ожидал такого от старого друга, к тому же револьвер его остался в купе. Крикнув по-заячьи, он развернулся и бросился по узкому коридору прочь. Коба неслышными мягкими прыжками метнулся за ним и почти нагнал у дверей тамбура. Уже замахнулся кинжалом, но Камо вывернулся, распахнул дверь и сиганул куда-то в темноту. Коба долго стоял там, вглядываясь в темноту и вдыхая родной горный воздух — поезд приближался к Кисловодску. Свежий ветерок остудил его ярость, в голове заворочались мысли, плоские и тяжелые, как камни. Армянин далеко не убежит. На Кавказе много людей, для которых Коба — диди каци, большой человек. Скоро они будут не только на Кавказе. Скоро все, кто когда-нибудь его обижал, сильно удивятся — если успеют, конечно. Ему ни к чему дурацкое кольцо, о котором толковали Ильич и товарищ Феликс (Коба хорошо слышит, у него слух горца), Умение управлять людьми вполне заменит это кольцо, а у него, Кобы, это умение есть...</p><p class="p">На Кисловодском вокзале к кучке встречающих большевиков вышел невысокий усатый человек в военном френче, с перевязанной бинтом шеей.</p><p class="p">— Я нарком Сталин, — отрывисто проговорил он, не подавая никому руки. — В поэзде холэра. Таварыщ Инэсса умер, таварыщ Камо тоже. Приказ нэмэдленно объявить карантын, а поезд атправыть назад в Москву. За промэдление — расстрэл.</p><p class="empty-line"/><p class="p">Узнав о смерти Инессы, Ленин впал в прострацию. Уже давно меж ними не было той любви, что в Лонжюмо, он забывал о ней, увлекался молоденькими девчонками, а вот поди ж ты — с ее уходом вся жизнь вытекла из его сердца... Зачем, зачем он на ней не женился! Какое теперь имело значение, была она с Дзержинским или не была; все это был вздор, не стоящий одного ее взгляда, одного слова... За гробом он едва шел; его поддерживали под руки, как немощного старика; впервые с тех пор, как ему исполнилось семь лет, он плакал при людях и не стеснялся этого... Потом сидел угрюмо в кабинете, запершись, не отвечая на стук и звонки, и пил в одиночку, по-черному, неделями напролет; то, надеясь отвлечься, пускался во все тяжкие, и друзья не раз вытаскивали Председателя Совнаркома, избитого и пьяного, из самых гнусных притонов. Его ничуть не интересовало, кто в тот год управлял государством, он не помнил об этом треклятом государстве, не помнил ни о троне, ни о волшебном кольце. Как ни пытался он утопить свое отчаяние на дне бутылки, а все видел ее, ее одну, ее — во всем победительном блеске молодости и красоты, ее — с разметавшимися по подушке золотыми кудрями; и когда кто-нибудь произносил при нем слово «Париж», у него сдавливало горло, и он не мог ничего отвечать.</p><p class="p">Он катился в пропасть, ничто не могло удержать его, жена считала его погибшим человеком. Но человеческая душа — странная штука: просмотрев хроники Вертова, он бросил пить, собрался, посуровел. Клин вышибло клином. То, во что большевизаны ввергли страну, не лезло ни в какие ворота. Гражданская война, которая казалась Ленину в стане Махно увеселительной прогулкой, дошла до форменного всенародного самоистребления. Разруха и голод триумфально шествовали по стране, прикидываясь Советской Властью. А может, это она и была. Со страной творилось что-то не то. Вместо того чтобы радостно ходить на работу, все убивали друг друга самыми изощренными способами, и больше всего доставалось евреям, которые, словно ополоумев, лезли и лезли на все посты, пока их родню в местечках вырезали красноармейцы. Никто не рвался созидать. Все убивали, словно только и ждали повода.</p><p class="p">Ленин взял себя в руки и вернулся к управлению государством — стал позировать для хроники, подписывать декреты и осторожно проводить на Совнаркоме мысль о том, чтобы сделать все как было.</p><p class="p">— ...Так что, Владимир Ильич? — нетерпеливо спросил Вертов. — Пускать в прокат?</p><p class="p">— Пускайте. Чего уж там. Ежели ничего другого снимать вы не умеете... А что там у нас со звуком, товарищ Дзига? — Хотя бы в этом вопросе режиссер понимал его.</p><p class="p">— Будем стараться, Ильич. Непременно в первую же звуковую фильму вставим ту вашу песенку. (Он записал по памяти песни про журавля и про коней и отдал киношникам — авось пригодится.) Но пока ничего не получается. Нужны большие средства, а наркомат финансов не дает денег.</p><p class="p">— Будут вам деньги! — Ленин сердитым жестом придвинул к себе лист бумаги, написал размашисто: «Наркому финансов: запомните, что важнейшим из искусств для нас является...»</p><p class="p">В это время дверь просмотровой комнаты отворилась, и, скрипя кожаной курткой, вошел Дзержинский. Он искал Ленина, чтобы тот поставил утвердительную резолюцию под летним расписанием пригородных поездов (неугомонный Феликс Эдмундович хапнул себе наркомат железнодорожного транспорта и имел неплохой барыш на штрафах и фальшивых билетах).</p><p class="p">«...является кино», — дописал Ленин и поднял глаза на вошедшего. Бледное лицо Феликса Эдмундовича было непроницаемо, но тонкие губы скривились в какой-то малопонятной гримасе. Ленин, удивленный, спросил:</p><p class="p">— Вы, Эдмундович, с чем-то не согласны? По-вашему, кино не самое важное из искусств?</p><p class="p">Все советские руководители обожали кино, и Дзержинский не был тут исключением: он смотрел фильмы «Путешествие на Луну» и «Граф Монте-Кристо» с Дугласом Фэрбенксом двадцать четыре и тридцать два раза соответственно (этот рекорд побил один лишь Богданов, ходивший на «Носферату» с Максом Шреком сто сорок семь раз), после чего в дополнение к своим бесчисленным обязанностям взвалил на себя посты председателей Общества изучения межпланетных сообщений и Общества друзей советского кино.</p><p class="p">— Согласен, согласен, — буркнул Дзержинский. Однако у него имелось свое частное мнение по поводу того, что же все-таки является важнейшим из искусств и страшнейшим из оружий...</p><p class="empty-line"/><p class="p">Это было темным, холодным вечером апреля двадцать первого года. Феликс Эдмундович пребывал в ту пору в прескверном расположении духа: след волшебного кольца был безнадежно утерян, глава государства ушел в запой, и никто не давал денег на содержание «Черного Креста», да еще Польша — о, Польша, эта вечно ноющая, незаживающая рана в сердце! С девятнадцатого года она, эта маленькая, упрямая, прекрасная страна, бешено сопротивлялась красным войскам; казалось бы, он должен был всеми силами биться за ее свободу, но... Перейди он на сторону поляков, забудь о русском престоле — как смог бы он выполнить условие проклятья Марины? Холодный рассудок, как всегда, остужал пламя его сердца: пока он не нашел кольца и не стал законным властителем, он должен был желать победы тому проклятому государству, в котором занимал свой высокий пост и которое финансировало его опричнину. И, наступая ногой себе на горло, он делал все для поражения его милой родины и громче других требовал казни Пилсудского... А Польша не сдавалась, она билась отчаянно, и в марте двадцать первого — ушла-таки, ускользнула из загребущих рук Совдепии! И теперь душа его разрывалась на части: как польский патриот, он должен был радоваться обретенной ею свободе, но как советский государственный деятель — оплакивал потерю.</p><p class="p">Желая хоть как-то развеяться, он поехал в Петроград с деловой командировкой, в ходе которой знакомил любознательного Зиновьева с некоторыми особо прогрессивными методами ведения допроса. Оба они устали и, чтобы расслабиться и снять напряжение, после финской бани выпили изрядное количество спирта, занюхав его уже известным белым порошочком; Зиновьев, чей организм был ослаблен неумеренным обжорством и сексуальными излишествами, свалился под стол и заснул, а более крепкий Феликс Эдмундович отправился на съемную квартиру. Он не выносил советских гостиниц, персонал которых по его собственному распоряжению круглосуточно шпионил за постояльцами и где по постелям бегали жирные клопы.</p><p class="p">Кокаин жег его кровь. Он искал встречи; он стоял на мосту, глядел в черную маслянистую воду; он шел, стуча каблуками по деревянным мостовым, ныряя в подворотни и переулки, кружа и петляя; отчаявшись найти то, что ему было нужно, он подходил уже совсем близко к своей квартире, когда в одной из подворотен ему послышалось детское хныканье... Он обернулся и увидел у стены большой темный ком тряпья. Из-под платка, которым была укутана фигурка, выбилась густая прядь волос, шелковистых и отливавших золотом при тусклом свете фонаря. Беспризорная девочка! Он подошел ближе, всмотрелся (в глазах его все слегка двоилось и расплывалось): девчонка была, пожалуй, постарше, чем нужно; глаза ее были не черносмородинные, а голубые; но грубый башмак на маленькой ножке, выглядывавшей из-под рваной юбки, был точь-в-точь как тот обожаемый башмачок Ванды... Это решило дело. Он наклонился к девочке, потянул ее за руку, поднял. Девочка была рослая, всего лишь на полголовы ниже его, но по очертаниям фигурки, плохо скрадываемой тряпьем, было все ж очевидно, что это ребенок, а не взрослая девушка: хрупкая угловатость, узкие бедра, ни малейшего намека на грудь...</p><p class="p">— Как тебя зовут? — спросил он.</p><p class="p">— Станислава... — пробормотала девочка и закашлялась. В голосе ее звучала волнующая хрипотца.</p><p class="p">— Ты полька!</p><p class="p">— Да...</p><p class="p">— О, милая... — Растроганный, он обнял девочку за плечи. — Пойдем ко мне домой. Я добрый, я тебя не обижу. Я накормлю тебя, подарю тебе платьев, живого котенка...</p><p class="p">Она покорно шла рядом с ним, не пытаясь вырваться. Он все крепче прижимал ее к себе; кровь его пылала, и он едва удерживался, чтобы не наброситься на бедняжку прямо на улице. Наконец они вошли в квартиру. Девчонка быстро, исподлобья оглядела роскошную обстановку; похоже, ее особенно поразил висящий на стене телефонный аппарат... Феликс Эдмундович все-таки нашел в себе силы соблюсти ритуал как полагалось: усадил девчонку в кресло, поставил чайник на плиту, сам сел напротив чудесной гостьи. Она не подымала глаз; ресницы ее были удивительно длинные и загибались кверху. Дрожащими пальцами он погладил ее колено: оно было довольно костлявое, как у всех подростков. В горле у него сразу пересохло: он не выносил круглых и мягких женских коленок. Он придвинулся ближе и попытался раздеть ее, но она отталкивала его руки и боязливо куталась в свой огромный платок. Он без труда мог бы сломить это жалкое сопротивление, но такое поведение не было ему свойственно. Никогда он не бывал груб с детьми.</p><p class="p">— Дяденька, я есть хочу, — проговорила она своим низким голоском, — дайте мне, пожалуйста, супу...</p><p class="p">— Сейчас, сейчас!</p><p class="p">Он засуетился, встал, вышел на кухню, стал шарить на столе: уходя поутру в Смольный, он не подумал о предстоящей ночи, и теперь ему нечем было накормить несчастного ребенка, кроме чайной колбасы с хлебом. Он сделал несколько бутербродов и красиво разложил их на тарелочке. Сердце его колотилось так, что он ощущал его удары в пальцах рук, в висках; глаза застил красноватый туман... Это было чистое, прекрасное вожделение, ничего общего не имевшее с той темной и извращенной страстью, что когда-то влекла его к подлой суке Спиридоновой. Чайник уже пускал пар; нагрузившись тарелками и чашками, он вошел в комнату... Посуда со звоном обрушилась на пол.</p><p class="p">Милая гостья сидела в кресле в наглой, развязной позе, закинув ногу на ногу, покачивая носком башмачка; рука ее крепко сжимала рукоять револьвера, и ствол был нацелен Феликсу Эдмундовичу прямо между глаз.</p><p class="p">— Руки за голову, — скомандовала она. </p><p class="p">«Налетчица, воровка!» Шокированный, он повиновался; а в следующую секунду глаза его от изумления едва не вылезли из орбит: девчонка сорвала с себя платок, быстрым движением сбросила лохмотья, и взору его предстал насмешливо улыбающийся, невозмутимый и так хорошо знакомый молодой князь Юсупов... Феликс Эдмундович потерял дар речи; ему казалось, что он сходит с ума. Не выпуская из правой руки револьвера, Юсупов другой рукой ловко распустил закатанные до колен брюки, отряхнулся и сказал:</p><p class="p">— А теперь будьте так любезны, встаньте лицом к стене. Заранее приношу свои извинения, но я вынужден вас обыскать. Нагнитесь, пожалуйста... Нет, не возражайте и не делайте резких движений: я ведь со страху и выстрелить могу. Ноги чуть шире... Да не дрожите вы так, я вас не укушу, и не виляйте бедрами, пожалуйста: это можно истолковать превратно...</p><p class="p">Револьвер упирался в спину Дзержинского; он почти физически ощутил, как пуля вырывается из ствола и проделывает дыру в его внутренностях, и не пытался сопротивляться; скрипя зубами, умирая от бессильной ярости, стоял он в унизительной позе, пока ловкая рука обшаривала его карманы, извлекая из них поочередно маузер, наган, два кольта, хирургический скальпель, пассатижи, удавку, плеть и маникюрные щипчики.</p><p class="p">— Ого, какой арсенал! — с усмешкой проговорил Юсупов. — Благодарю вас, теперь вы можете повернуться. Как поживаете, дорогой Станислав... ах, mille pardonnez, дорогой Фелек?..</p><p class="p">— Я тебя убью, — угрюмо ответил Дзержинский.</p><p class="p">— Ну-ну, друг мой, не горячитесь. Вспомните о фотографиях. Негатив я давно отдал одному репортеру из «Times»; он опубликует снимки, ежели я в назначенное время не свяжусь с ним.</p><p class="p">— Чего вам нужно?</p><p class="p">— Видите ли, тезка, — нахально отвечал молодой князь, — я в Париже малость поиздержался... Сами понимаете: жена — красавица, да и сам я привык жить на широкую ногу. Вы скоммуниздили почти все мое имущество: теперь будьте любезны вернуть мне хотя бы тысяч на сто золотишка и всяких там драгоценностей.</p><p class="p">— Как вы проникли в Россию?!</p><p class="p">— А вот это вас, Фелек, душенька, совершенно не касается.</p><p class="p">— Часть ваших ценностей хранится в подвалах вашего же дворца... вашего бывшего дворца, — сказал Дзержинский. — Ключи не у меня, а у товарища Зиновьева. Он с ними не расстается.</p><p class="p">Он говорил правду: Зиновьев всегда был с ног до головы увешан ключами — ему нравилось, как они позвякивают при ходьбе и разных других движениях. Произнося эти слова, Дзержинский опустил глаза, чтоб Юсупов не заметил их злобного блеска: он уже соображал, как вдвоем с Зиновьевым будет в подвале тянуть жилы из князя до тех пор, пока тот не расскажет, какому именно английскому газетчику отдал негативы. Дыба, клещи, лязг раскаленного железа, шипение горящей плоти...</p><p class="p">— Наслышан, наслышан о товарище Зиновьеве! — сказал Юсупов. — Гришка Второй — так, кажется, прозвали его в народе? Бедный мой Петербург — то ль он собирает всякую мразь, то ли сам, своими испарениями, ее производит... Гришка Кровавый... Я тут со скуки, пока сидел в подворотне, вас дожидаючись, стишок об нем сочинил — хотите послушать?</p><p class="p">— Не хочу.</p><p class="p">— Нет уж, вы все-таки послушайте...</p><p class="p">И Юуспов, продолжая нагло во весь рот улыбаться, прочитал свой стишок — Гришка Зиновьев там сравнивался с Гришкой Распутиным — препохабнейший пасквиль, и такой злобный, какого Феликсу Эдмундовичу слышать еще не приходилось, хотя подобного рода стишки о Зиновьеве ходили по всему Питеру.</p><p class="p">— Грубо и вульгарно, — сказал Дзержинский: окончательно убедившись, что шантажист не собирается его сразу убивать, он воспрял духом. — Не ожидал от вас, князь...</p><p class="p">— Каков предмет, такова и поэзия...</p><p class="p">— Так что же — проводить вас в Смольный?</p><p class="p">— Нет, друг мой, извините: нужно быть круглым болваном, чтобы не понять ваших намерений... Позвоните по телефону и вызовите г-на Зиновьева сюда.</p><p class="p">— Вы возьмете у него ключи, а потом убьете нас обоих!</p><p class="p">— Вряд ли, — подумав, отвечал Юсупов. — Поймите, Фелек, я не гожусь на роль идеального героя, и корчить из себя идейного врага советской власти не собираюсь... Мне нужны деньги — вот и все. Тогда, в шестнадцатом, я был моложе и лучше: полагал, что убийством одной скотины можно что-то исправить. Теперь поумнел. Ну, убью я вас — а завтра на ваше место сядет другая сволочь... Вы, по крайней мере, человек почти моего круга: руки моете перед едой и говорите по-французски. Да что скрывать, вы всегда мне нравились: никто так не умеет носить дамского платья; мне до вас далеко, не говоря уж о бедняге Керенском...</p><p class="p">— Довольно пустой болтовни! — вспыхнул Дзержинский.</p><p class="p">— Хорошо, хорошо, не сердитесь. Так что насчет моей маленькой просьбы? — И Юсупов выразительно качнул револьвером в сторону телефонного аппарата.</p><p class="p">«Я разрежу тебя на куски и сердце твое скормлю собакам, — подумал Дзержинский. — О, только бы Зиновьев был на ногах и в более-менее здравом рассудке!» Всевышний услышал его молитву: после томительно долгого ожидания в трубке раздался заспанный голосок питерского градоначальника.</p><p class="p">— Григорий Евсеевич, будьте добры сейчас приехать ко мне, — сказал Дзержинский. — Со мной здесь один товарищ, старый политкаторжанин. Вы уж подготовьтесь к встрече...</p><p class="p">Зиновьев обрадованно замычал в ответ. «Старый политкаторжанин» было принятое меж ними кодовое словечко, обозначавшее жертву, предназначенную для пыток с последущим списанием в расход, и одного этого слова достаточно было, чтобы понять, каким образом нужно подготовиться к встрече и какого рода предметы взять с собою. Однако он был удивлен тем, что Дзержинский зовет его на квартиру: обычно подобные мероприятия проводились в специально оборудованном подвальчике Смольного, где стены были увешаны железными крючьями, цепями, клещами и всякими шипастыми штуковинами, о предназначении которых человек непосвященный мог только гадать, а в углу круглосуточно пылал огонь.</p><p class="p">— Приезжайте, приезжайте! — настаивал Дзержинский. — Обещаю, что вы останетесь довольны. — Повесив трубку на рычаг, он обернулся к Юсупову и сказал, что питерский градоначальник будет с минуты на минуту.</p><p class="p">— Я, с вашего позволения, позаимствую из вашего гардероба какую-нибудь человеческую одежду и обувь, — сказал Юсупов, — мне бы не хотелось произвести на товарища Зиновьева дурное впечатление... У вас нога такая же маленькая, как у меня, я еще тогда это заметил... да-да, вот эти красивые сапоги мне подойдут. А, знаете, в этой вашей моде на кожаные куртки определенно что-то есть...</p><p class="p">Дзержинский молча, под дулом револьвера снял сапоги и куртку. (Благодарение Господу, на исподнее и брюки шантажист не покушался.) Утешая себя, он уже обдумывал программу допроса с пристрастием, как гурман обдумывает меню званого обеда. «Этот негодяй думает, что я у него в руках, и не боится; но он не знает, как мы умеем допрашивать... Конечно, сперва он попытается юлить, всячески вводить меня в заблуждение — но не на того напал... Если надо — буду и месяц, и год держать его на цепи, каждый день отрезая от него по кусочку, пока он не согласится вызвать своего репортера с негативами в какое-нибудь такое место, где я смогу его схватить...»</p><p class="p">Никогда, ни к одному человеку в мире он не чувствовал такой ненависти. Но он умел из всякой неприятности извлекать для себя пользу: уже несколько лет он обучался фотографическому искусству и надеялся дожить до тех времен, когда фотографический аппарат сделается размерами с мыльницу и им можно будет снимать тайно: ах, какую власть приобретет он тогда над своими товарищами! Шантаж — великая сила...</p><p class="p">— Вы бы, князь, опустили револьвер, — сказал он вкрадчиво, — рука устанет... — «Ах, если б негодяй попытался меня связать! Одной рукою он бы не управился; я ударил бы его локтем в живот и обезоружил... Но он, похоже, это понимает... Жаль!»</p><p class="p">— Ничего, не устанет. Я спортсмен. «Самодовольный глупец воображает, что легко</p><p class="p">справится с нами обоими, — подумал Дзержинский, — и напрасно... Он знает о Зиновьеве лишь то, что болтают все: дебелая купчиха, кастрированный боров, еле таскающий брюхо; все это, конечно, так и есть, но в юности Гришка был заядлым охотником — они с Лениным всех ворон в Париже перебили! — и до сих пор не расстается с маузером и не упускает случая потренироваться... Иной раз он даже ловчей меня попадал жертве в назначенное место... Только б он сразу с порога его не пристрелил!»</p><p class="p">Через некоторое время послышался шум мотора; Юсупов, выглянув в окно и увидев, как рыхлая туша питерского градоначальника вываливается из автомобиля, приказал Дзержинскому снова заложить руки за голову и встать в углу комнаты; он не спускал его с прицела. (Входную дверь он предусмотрительно отпер заранее.) Слышно было, как пыхтит Зиновьев, взбираясь по крутой лесенке. Потом он толкнул дверь, шумно протопал через прихожую и остановился на пороге, отдуваясь и сопя. В пухлой наманикюренной ручке он держал маузер, на шее у него болтались две пары наручных кандалов, сапоги скрипели, карманы галифе топырились от металлических инструментов. Иссиня-бледное, жабье лицо его лоснилось, изрядно поредевшие кудреватые волосы стояли торчком, заплывшие жиром глазки в немом изумлении шарили по комнате...</p><p class="p">— Григорий Евсеевич, этот человек — английский шпион, — ровным голосом проговорил Дзержинский. — Прострелите ему коленную чашечку. Не бойтесь: он не может одновременно держать на мушке нас обоих; если даже он выстрелит в вас — я успею броситься на него и отнять оружие.</p><p class="p">— Не думаю, чтобы Григория Евсеевича это очень успокоило, — хладнокровно возразил Юсупов.</p><p class="p">И действительно, градоначальник не поднимал маузера и не двигался с места; вообще никто из троих мужчин не решался пошевелиться, боясь неосторожным движением спровоцировать перестрелку. Юсупов продолжал целиться Дзержинскому в лоб, Дзержинский, стоя с поднятыми руками, задыхался от ярости и нетерпения; а Зиновьев меж тем не сводил глазок с князя. Свиное рыльце его приняло какое-то странное, почти жалобное выражение, нижняя губа отвисла, по подбородку текла слюна...</p><p class="p">— Сейчас же делайте, что вам говорят, остолоп! — закричал Дзержинский, в гневе топая ногами.</p><p class="p">А Юсупов, искоса глядя на высокого гостя, проговорил задушевным голосом:</p><p class="p">— Ах, Григорий Евсеевич! Так вот вы какой! Вы еще красивее, чем мне говорили... Я столько слышал о вас, так мечтал с вами познакомиться! Я специально приехал нелегально из-за границы, рискуя свободой и жизнью, чтоб увидеть вас... Я — князь Юсупов...</p><p class="p">— Не слушайте его! — вскричал Дзержинский. — Это гнусный провокатор! Стреляйте по ногам, идиот!</p><p class="p">Но Зиновьев продолжал стоять столбом. Он непроизвольно облизнул губы... Потом он с грохотом уронил маузер и даже не заметил этого... Дзержинский в ужасе глядел на него. Ошибка, роковая ошибка! Наблюдая Зиновьева исключительно за допросами и пытками, Феликс Эдмундович не подумал о том, что даже у такого ублюдка некоторые объекты могут вызвать чувства, далекие от насилия и жестокости; и нельзя, ах, никак нельзя было ставить Юсупова — лукавую тварь, видавшую всякие виды, — на одну доску с наивным простачком Каннегиссером! Обаянию этой улыбки, простодушному доброжелательству этих голубых глаз ошалевший градоначальник не мог сопротивляться. Щетинистая морда его расплылась в гримасе, и он пролепетал:</p><p class="p">— Очень приятно, князь... Я так рад... Я счастлив... А что же тут у вас такое происходит? Почему товарищ Дзержинский стоит в углу?</p><p class="p">— Он наказан.</p><p class="p">— А-а...</p><p class="p">— Да стреляй же ты, сволочь жирная! — выкрикнул Дзержинский.</p><p class="p">— Мы с товарищем Дзержинским старые друзья, — продолжал свои пояснения Юсупов, — очень старые — с шестнадцатого года... Мы просто играли: ну, вы-то знаете эти милые игры...</p><p class="p">— Да-да, конечно... Но я думал, что...</p><p class="p">— Товарищ Дзержинский не решался обнажить пред вами свою истинную сущность; но я убедил его, что он не прав, и он со мной согласился... Теперь он хочет, чтоб вы подошли к нему и надели на него наручники.</p><p class="p">— Ничего подобного я не хочу! — воскликнул Дзержинский в ярости. — Стреляйте, болван!</p><p class="p">— Конечно же, он хочет; это просто ритуал... Он кричит и спорит, чтобы доставить нам больше удовольствия.</p><p class="p">— Вы полагаете, князь? — нерешительно спросил Зиновьев.</p><p class="p">— Ах, боже мой! Вам ли не знать, каковы правила игры! И ударьте его посильней, как он любит...</p><p class="p">— А как он любит?</p><p class="p">Юсупов жестом показал, как именно следует ударить Дзержинского, чтобы доставить ему максимум удовольствия. Глаза Феликса Эдмундовича расширились от ужаса, и он пригрозил Зиновьеву:</p><p class="p">— Только попробуй сделать это, скотина, и я тебя самого сгною на Лубянке!</p><p class="p">Однако объяснения князя, по-видимому, показались Зиновьеву более убедительными, или, быть может, он обиделся за «свинью» и «скотину»; подрагивая студенистыми ляжками, он подошел к Феликсу Эдмундовичу, что было сил пнул его сапогом в самое уязвимое место и, воспользовавшись его временной беспомощностью, навалился всей свой тушей, заломил ему руки за спину и защелкнул на его запястьях оковы, после чего посмотрел на Юсупова вопросительно. Тот опустил револьвер и сказал:</p><p class="p">— Уф-ф!.. Итак, сейчас мы еще немножко повеселимся, а потом поедем в мой дворец... ах, pardonnez-moi, в мой бывший дворец... Там нам будет еще веселее. Кстати дайте-ка, пожалуйста, ключи от дворца, а то я потом забуду...</p><p class="p">— Не давайте, вы, ублюдок! — прошипел Дзержинский, корчась от боли. — Он же вас вокруг пальца обведет! Что вы ему верите! Ну, поглядите на себя в зеркало, старая свинья: на кого вы похожи?!</p><p class="p">— Не надо так со мной разговаривать, — обиженно сказал Зиновьев. — Я, между прочим, тоже человек и люблю ласку и доброе, вежливое обращение. Вот, пожалуйста, князь: ключи...</p><p class="p">— Благодарю, — с усмешкой сказал Юсупов. — Теперь будьте добры встать спиной к товарищу Дзержинскому и взять его за руки... Как вы мило это делаете! — Он мимоходом потрепал Зиновьева по щеке. — Ага, вот так хорошо.</p><p class="p">Зиновьев, как загипнотизированный кролик, выполнял все, чего требовал князь; а тот с усилием застегнул вторую пару кандалов на жирных ручках градоначальника, перекрестив цепочки так, что обе жертвы оказались накрепко прицеплены друг к другу, потом небрежно сунул в карман кожаной куртки ключи, взял со стола бутерброд и шагнул к двери...</p><p class="p">— ...Как, князь?! Вы уходите? — жалобно взвизгнул Зиновьев.</p><p class="p">Но Юсупов даже не счел нужным ответить; его каблуки уже стучали по лестнице...</p><p class="p">— Я тебе это припомню, гнида! — сказал Дзержинский Зиновьеву и лягнул его ногой. Но тот ничего не ответил и как будто даже не почувствовал удара: оскорбленный, он рыдал, и слезы, мутные и крупные, как горох, катились по его рыхлым щечкам...</p><p class="p">Феликс Эдмундович пытался освободиться: он бешено извивался и дергал локтями, время от времени набрасываясь на своего товарища по несчастью с новыми ругательствами. Но все его усилия оказались тщетны: кандалы были новые, усовершенствованные, и даже Гудини ничего бы не сумел с ними сделать. Шофер и охранник Зиновьева были отлично вышколены и ждали терпеливо; они осмелились подняться в квартиру лишь на другой день... С этого момента дружба питерского градоначальника и председателя ВЧК пошла на убыль так же стремительно и загадочно для большинства окружающих, как и началась.</p><p class="empty-line"/><p class="p">— ...Кино — это прекрасно, — сказал он Ленину, — а о фотографии забывать не следует. Вы бы, Ильич, дали указание наркому промышленности построить заводик по производству фотографических принадлежностей.</p><p class="p">— Обязательно, батенька, — ответил Ленин. Он был рад, что Железный в кои-то веки увлекся чем-то созидательным, а не разрушительным. — Мы даже назовем этот завод в вашу честь — ФЭД.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">— Ну как, являлась нынче эта странность? — спрашивал Рыков.</p><p class="p">— Пока не видел, — отвечал Пятаков.</p><p class="p">Они говорили о призраке, что взял обыкновение прогуливаться меж зубцами кремлевской стены; верней всего его можно было увидеть в годовщину революции, но иногда он являлся и просто в полнолуние. Относительно личности призрака мнения советских руководителей расходились: так, Луначарский был убежден, что это дух Леонида Андреева, Дзержинский подозревал в призрачной фигуре своего старого знакомца Распутина, а Надежда Константиновна уверяла, что это просто безобидный кремлевский, т. е. аналог домового или банного, и даже оставляла ему иной раз мисочку с кашей. Владимир Ильич — стойкий, неколебимый матерьялист — ни в каких призраков не верил и жестоко высмеивал каждого, кто докучал ему этими дурацкими россказнями, делая, впрочем, исключение для жены.</p><p class="p">Как-то осенней ночью двадцать второго года Ленина терзала бессонница. Дело в том, что у Айседоры Дункан — утонченной, изящной женщины — был один малюсенький недостаток: она храпела во сне, как двадцать грузчиков. Владимир Ильич не винил ее за это, но уснуть рядом с храпящим человеком не умел; он долго ворочался, потом, отчаявшись, встал, оделся и решил выйти прогуляться по Красной площади. Ночь была холодная, ясная, лунная. Он брел бесцельно, заложив руки за спину, шаги его отчетливо звучали по брусчатке; тень, плавно бежавшая сбоку от него, была худая и длиннорукая, как будто чужая.</p><p class="p">И вдруг он словно бы почувствовал на себе чей-то взгляд. Это ощущение было очень упорным. Он оглянулся — никого. Он вскинул голову — и увидел, что меж зубцов стены неподвижно стоит высокая фигура... Он не испугался, а просто удивился, и крикнул:</p><p class="p">— Эй, товарищ! Вы что тут делаете? Спускайтесь, а то упадете.</p><p class="p">Человек на стене не отвечал и не двигался. Он был очень, очень высок, наверное больше двух метров ростом; потом он шагнул, с нечеловеческой легкостью перепрыгнув через зубец... Ленин охнул: тот, другой — НЕ ОТБРАСЫВАЛ ТЕНИ!</p><p class="p">— Вы... вы кто такой?</p><p class="p">Тот стоял, повернувшись к нему лицом, — он понимал это по очертанию темной фигуры, — но лица у него не было; не было глаз, а лишь какая-то зыбкая, клубящаяся темь... Наконец он заговорил, и голос его был страшен — словно ветер застонал в деревьях; и речь его была темна и смутна — живые так не говорят...</p><div class="poem">
<div class="stanza">
<p class="v">Троцкий я.</p>
<p class="v">Я — призрак коммунизма; </p>
<p class="v">я — часть той силы, что </p>
<p class="v">как лучше хочет, </p>
<p class="v">а совершает как всегда.</p>
</div>
</div><p class="p">— Товарищ, говорите прозой, пожалуйста, — попросил Ленин: у него и от хороших стихов порою голова побаливала, а уж от таких гнусных завываний без рифмы и размера и подавно могла начаться мигрень. И вдруг до него дошел смысл слов, сказанных призраком... — Троцкий?! Вы... Ты — Троцкий?!</p><p class="p">Тень в ответ наклонила свою ужасную голову без лица. Она стояла сейчас вполоборота, и в лунном свете видно было, что из спины у нее торчит какой-то предмет, очертанием напоминающий топор или, может быть, ледоруб. Глухой, стонущий голос раздался снова:</p><div class="poem">
<div class="stanza">
<p class="v">Что, не спится </p>
<p class="v">тебе, товарищ?</p>
</div>
</div><p class="p">— Не спится, верно, — отвечал Владимир Ильич, против воли подделываясь под дурацкий ритм призраковой речи.</p><div class="poem">
<div class="stanza">
<p class="v">Не спится! Что ж: </p>
<p class="v">знать, кровь поэта </p>
<p class="v">тебя тревожит.</p>
</div>
</div><p class="p">— Какого еще поэта?! Какая кровь?</p><p class="p">Призрак ему попался малоразвитый, неосведомленный — «несознательный», как говорили теперь в России; впрочем, откуда адским сущностям все знать про земные дела? Единственный поэт, чья кровь могла быть на совести у Ленина, — Гумилев, которого он пообещал Горькому спасти в августе 1921 года, — был успешно спасен по личному ленинскому распоряжению. Операцию осуществил огромный матрос сибирского происхождения с двойной фамилией — словно одной было недостаточно для его толстого тела, могучего роста и кучерявой бороды. Матроса звали Успенский-Лазарчук. Он на руках вынес Гумилева из застенка и переправил от греха подальше за границу. В России никто этого не знал, и многие считали, что на большевиках кровь невинного поэта, — Ленину очень хотелось очиститься от этого обвинения, но он опасался за жизнь Гумилева и Успенского-Лазарчука, а потому ограничивался тем, что распускал осторожные слухи: Гумилев жив, сбежал, и некоторые его даже видели. Но большинство верить не желало — Ленин вообще все чаще ловил себя на том, что ему не верят, и очень от этого грустил.</p><div class="poem">
<div class="stanza">
<p class="v">Ужо тебе!</p>
<p class="v">Не спал бы ты и вовсе, </p>
<p class="v">когда бы знал, что будет </p>
<p class="v">у нас еще...</p>
</div>
</div><p class="p">— Ну что, что еще у нас будет? — вздохнул Владимир Ильич. — Валяйте, говорите!</p><div class="poem">
<div class="stanza">
<p class="v">Товарищ Сталин, </p>
<p class="v">исчадье ада, </p>
<p class="v">гиена гнусная, </p>
<p class="v">взойдет на трон.</p>
</div>
</div><p class="p">— Что?! — Ленин решил, что призрак свихнулся. Далекий от мистики, он как-то не задумывался о том, могут ли призраки быть не в своем уме, но раз могут живые, то чем, собственно, покойники лучше? — Товарищ Троцкий, вы очумели! Коба! На трон! Идиот Коба, который ни разу в жизни не мыл рук добровольно!</p><div class="poem">
<div class="stanza">
<p class="v">Взойдет; и мрак такой настанет,</p>
<p class="v">что содрогнутся</p>
<p class="v">в аду все черти.</p>
<p class="v">Увидеть хочешь</p>
<p class="v">кусочек ада?</p>
<p class="v">Я покажу...</p>
</div>
</div><p class="p">— Не надо! — взмолился Ленин. — Не надо мне, пожалуйста, ничего показывать!</p><p class="p">Но тень повела страшной своей рукой — пальцев на ней было примерно семь или восемь, — и стена кремлевская вдруг стала таять, бледнеть, заволакиваться туманом, очертания ее расплылись, и, колеблясь, словно от нестерпимого жара, из молочного тумана стали появляться фигуры, фигуры... Это было похоже на синематограф, только экран был во много раз больше и очертания размытые, нечеткие. И, в отличие от кино, люди на белой стене — говорили! Только слов было не разобрать — все сливалось в какой-то глухой гул. Ленин смотрел, моргая от напряжения, глаза его слезились. Он не понимал и сотой доли того, что происходило на экране. Какие-то строения, обнесенные рядами колючей проволоки,— война, что ли? Конвоиры, овчарки, рвущиеся с поводков... И мертвые, раздетые тела — горы, горы тел, как попало сваленных одно на другое... И другие люди, идущие по улице, несущие на палках плакаты с изображением благообразного усатого лица, в котором с большим трудом можно было уловить сходство с крокодильей мордочкою Кобы... Потом туман сгустился, а когда изображение прояснилось снова, он увидел тюремную камеру и на полу ее — тучного человека в одном белье, ползающего на четвереньках и рвущего на себе волосы. Человек этот обливался слезами, скулил и выл, как собака, и похож был не на человека, а на измочаленный кусок мяса, и этот человек был Зиновьев, а пол камеры был весь усеян скомканными исписанными листами бумаги — как тогда, в Разливе!</p><p class="p">Дверь камеры отворилась, и охранники за волосы выволокли тушу Зиновьева в коридор; они, видимо, хотели, чтоб он шел, но он не шел, а бился, и падал им в ноги, и целовал их пыльные сапоги, и тогда его взвалили на носилки, прикрутив ремнями... Во дворе тюрьмы его сгрузили и поставили, прислонив к стене, как шкаф или какую-то другую мебель; жирные ноги его подкашивались... Командир взвода что-то сказал, и дула винтовок нацелились на приговоренного. И вдруг тот выпрямился и громко закричал: кажется, он пел что-то... Точно, пел: «Шалом Исраэль!» Он пел и орал что-то наглое, отчаянное, невозможное, что-то про каких-то «кровавых сатрапов», и тогда командир взвода махнул рукою, приказывая стрелять, и рыхлая туша, подпрыгнув нелепо, рухнула в багряную пыль... Экран замельтешил — совсем как в кино, когда рвется пленка, — и все закончилось: Ленин снова видел пред собою стену из красного камня и гигантскую черную фигуру, стоящую на ней. Жуткий глухой голос снова загудел:</p><div class="poem">
<div class="stanza">
<p class="v">Зиновьев</p>
<p class="v">с ума сошел пред смертью. </p>
<p class="v">Вообразил </p>
<p class="v">себя евреем... </p>
<p class="v">Жалеешь?</p>
</div>
</div><p class="p">— Н-не знаю, — ответил Ленин. Он из всех сил старался не показать, что у него стучат зубы. Жалеть было нельзя, но и злорадствовать — невозможно. — А... а за что его?</p><div class="poem">
<div class="stanza">
<p class="v">Со мною</p>
<p class="v">состоял он в связи </p>
<p class="v">политической...</p>
</div>
</div><p class="p">Тут наконец Владимир Ильич встряхнулся, расправил плечи, не отдавая себе отчета в том, как похож этот жест на предсмертное движение Зиновьева, и сказал призраку:</p><p class="p">— Довольно. Примерно понял я, о чем сказать ты хочешь. Сегодня же ублюдка Кобу отправлю я туда, где ему место, — сортиры драить.</p><p class="p">— Ты сам одной ногой в гробу, — возразил призрак.</p><p class="p">— Что?! Я крепок и здоров!</p><div class="poem">
<div class="stanza">
<p class="v">Дзержинский хочет </p>
<p class="v">тебя убить. </p>
<p class="v">Сегодня ночью </p>
<p class="v">за тобой придут. </p>
<p class="v">Явился я специально </p>
<p class="v">Предупредить тебя.</p>
</div>
</div><p class="p">— Глупо, почтеннейший! Архиглупо! — сказал Ленин. — С какой стати ему вдруг меня убивать? Я ему нужен. Я его поганый «Черный Крест» финансирую...</p><p class="p">Однако колени его задрожали, и холодок прошел по позвоночнику. А призрак снова заговорил... И чем дольше слушал его Ленин, тем сильней верил его словам. «Железный воображает себя потомком Ивашки Грозного! Рюриковичем! О господи! С ума сойти можно! А я-то все не понимал, к чему ему революция, зачем он вызвался помочь мне искать волшебное кольцо! Но ведь, чтобы снять с России проклятье Марины Мнишек, нужно выполнить кучу условий — как же это все...»</p><p class="p">— Товарищ Троцкий, а как же Романовы? — спросил он растерянно.</p><div class="poem">
<div class="stanza">
<p class="v">Романов будет</p>
<p class="v">в Петрограде править...</p>
</div>
</div><p class="p">«Буду править! И престол снова перенесут в Санкт-Петербург!» Эта новость настолько ободрила Владимира Ильича, что он пропустил мимо ушей последовавшее за ними высказывание призрака относительно этого Романова («Гришкой Третьим назовут его — проклятое для Петрограда имя...») и задал другой вопрос:</p><p class="p">— А Михаил? Михаил обязательно должен отречься, чтоб уж все как следует...</p><div class="poem">
<div class="stanza">
<p class="v">Отречется. </p>
<p class="v">В Форосе...</p>
</div>
</div><p class="p">Ни о каком Форосе Владимир Ильич понятия не имел, но это было несущественно. Он слушал дальше, как призрак рассказывает об ужасных планах Дзержинского, и все становилось ему ясно... «Он сперва намеревался меня убить лишь после того, как завладеет кольцом, а теперь, озлившись и видя, что со мною иногда трудно поладить, решил, что лучше обойтись вовсе без меня... Он хочет, чтобы страной временно правила какая-нибудь совсем нелепая, беспомощная марионетка, вроде слабоумного Кобы... Но он не догадывается, сколько злобы, годами таимой, вырвется из этого недоноска... Он погубит и меня, и себя, и всех... Но что же делать, что?!»</p><p class="p">Он поднял голову, чтобы задать этот вопрос призраку. Но на стене никого не было. Только светила тревожная луна.</p><p class="p">«Привидится же такой вздор! Не надо было за ужином коньяк пивом запивать, и на грибы налегать тем более не следовало. А только Кобу я все-таки отправлю в ассенизаторы. Нечего ему в Кремле ошиваться. Все равно никто из приличных людей его шашлыки не ест: всем известно, что он их делает из кошачьего и крысьего мяса. (Коба держал на Красной площади мангал и пивную палатку.) А сейчас пойду разбужу Айседору, и разопьем шампанского бутылку, иль перечтем, на худой конец, „Капитал“: совсем замучила бессонница проклятая».</p><p class="p">Но вместо Айседоры в его спальне были трое молодчиков в кожаных куртках; один из них показал ему какую-то бумажку с печатями и важно проговорил:</p><p class="p">— Гражданин Ульянов, вы арестованы... Ой, мамочки родные, что это с ним?</p><p class="p">Они стояли и глядели растерянно, как Председатель Совнаркома, обмякнув всем телом, точно мешок, повалился на пол. Глаза его закатились: он почти не дышал.</p><p class="empty-line"/><p class="subtitle">3</p><p class="p">— Надя, не уходи, посиди со мной... — пробормотал он невнятно.</p></span>
