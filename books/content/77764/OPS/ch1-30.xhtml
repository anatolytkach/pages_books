<span id="id15"><div class="title">
<p class="p1">ГЛАВА 14</p>
</div><p class="subtitle">Ленин жил, Ленин жив, Ленин будет жить.</p><p class="empty-line"/><p class="p">— Если он поднимет восстание, — робко сказал Зиновьев, — за ним пойдут миллионы.</p><p class="p">— Пойдут, пойдут, обязательно пойдут! — кивнул Каменев.</p><p class="p">— Молчать, предатели! — прошипел Феликс. — Трусы, ничтожества! Кто за ним пойдет? Кто поверит, что это он?</p><p class="p">— Других таких нет, — хором сказали Каменев и Зиновьев.</p><p class="p">— И не будет! — рявкнул Дзержинский. Он уже знал, что делать. Скульптору Збарскому в ночь на 22 января был заказан гипсовый Ленин в натуральную величину. Его планировалось выставить на Красной площади, дабы все желающие могли убедиться: Ленин мертв и любой живой Ленин — фальсификация. С 24 января гипсовый труп лежал в центре деревянного Мавзолея, привлекая толпы пролетариев. Стражи в буденновках едва удерживали толпу, пытавшуюся урвать от кумира хоть клок волос, хоть лоскут пиджака. С этой языческой страной ничего нельзя было сделать. Даже если бы некий циклоп-людоед пожрал все ее население, оставив на развод единственную пару крестьянских детишек, а после помер бы в страшных судорогах от объядения, уцелевшие двое долго боялись бы приблизиться к его трупу, а потом и от людоедовой бороды оторвали бы прядь, чтобы и им было в жизни такое счастье — раз в жизни досыта нажраться и околеть посреди бескрайнего болота. Над искусственным Лениным планировали установить стеклянную витрину. Збарский еженедельно осматривал гипс во избежание порчи. Массы требовали правды о Ленине, в ЦК приходили слезные письма от сельских учителей: крестьяне интересовались биографией вождя и секретами его успехов, словно пытались заменить только что утраченного вождя материализованной памятью о нем — биографиями, портретами, книжками-раскрасками. Взамен живого и бесследно исчезнувшего Ленина срочно требовался муляж — но муляж правильный, в лучших революционных традициях, такой, чтобы на нем воспиталось не одно поколение безупречно одинаковых жителей нового мира. История с куклой, однако, стала известна Юрию Олеше и легла в основу его антисоветского романа «Три толстяка».</p><p class="p">Единственным вопросом, вынесенным на Политбюро 30 января, была канонизация Ленина.</p><p class="p">— Что будем делать, товарищи? — скорбно спросил Калинин.</p><p class="p">— Известно чего, — рубанул Рыков. — Вооружившись единственно верным учением Маркса, Ильич наш с раннего детства любил простой народ...</p><p class="p">И хотя собранием владела глубокая скорбь (все скучали по Ленину, без которого на заседаниях Совнаркома воцарилась угрюмая скука, ни анекдотца, ни тебе каламбурца), народные комиссары прыснули, вообразив, как именно любил Ильич простой народ; представить, что он это делал с томом Маркса в руках, было еще забавнее.</p><p class="p">— Ленин открыл Маркса единственный раз, — подал голос Луначарский. — Он мне сам рассказывал. В шестнадцать лет какой-то студент ему наврал, что есть, мол, книга, которая учит наживать капитал. Он ее и так, и сяк вертел, и задом наперед пытался читать, и по диагонали — все думал, что шифр какой-то... А не найдя, сначала обозлился, а потом восхищался: вот человек придумал — написал вот эдакий том ерунды да и впарил его читателю, назвав «Капитал»! Он даже думал сам написать брошюру «Двадцать способов сделаться счастливым и богатым», всю состоящую из советов насчет обливания холодной водой...</p><p class="p">Наркомы снова прыснули. Нельзя было вспомнить Ленина без ласковой усмешки. Уж он сейчас придумал бы себе настоящую революционную биографию — то-то все хохотали бы, то-то умилялись неуемной фантазии вождя!</p><p class="p">— Семью бы надо ему подобрать правильную, — вздохнул Каменев. Зиновьев бросил на него испепеляющий взгляд. В некоторых отношениях Лева был неисправимым мещанином, его вечно тянуло в семью!</p><p class="p">— Это верно, это очень верно, — согласился Бухарин. — Нам нужны семейные ценности. Революции кончились, пора входить в русло...</p><p class="p">— Товарищи! — робко, прерывающимся голосом заговорила Мария Ульянова, секретарша на заседаниях СНК, отличавшаяся грамотностью и расторопностью. — Вы, может быть, сочтете это кощунственным... Тогда забудьте мое предложение, пожалуйста! Но мой покойный папа... был очень похож на дорогого товарища Ленина...</p><p class="p">Она всхлипнула. Дзержинский впервые за все время совещания оторвался от полировки ногтей и взглянул на нее с любопытством.</p><p class="p">— Кем, вы говорите, был ваш батюшка? — спросил Железный.</p><p class="p">— Он был инспектором народных училищ, в Симбирске... И знаете — тот же огромный лоб, те же добрые глаза... бородка...</p><p class="p">— Когда он умер? — поинтересовался Луначарский.</p><p class="p">— В восемьдесят втором, я его почти не помню. Он был еще не старый, просто работал очень много... С ним случился удар.</p><p class="p">— А каких взглядов был покойный? — смущенно спросил Рыков.</p><p class="p">— О, самых демократических! Я помню, у нас была тетрадка, в которую он переписывал революционные стихотворения — целиком, без купюр. Там были всякие... фривольности, конечно, но были и Некрасова два стихотворения! Вообще вся наша семья, товарищи, была очень революционная: брат мой Саша... вы, наверное, знаете...</p><p class="p">Никто из присутствующих не знал брата Сашу, но на всякий случай все почтительно замолчали.</p><p class="p">— Каторга? — с пониманием спросил Бухарин.</p><p class="p">— Нет, виселица в Шлиссельбурге, — ответил за Ульянову всезнающий Феликс. — Попался на пустяках: делал с другими такими же студентами бомбу на Александра III. Ничего не вышло, конечно, всех накрыли. Я помню это дело. Одна из самых позорных глупостей позорно-глупого царствования. Соболезную вам, Мария...</p><p class="p">— Николаевна, — подсказала Ульянова.</p><p class="p">— Николаевна. Но ежели мы думаем о том, чтобы сделать Ильича вашим, так сказать, братом... вы понимаете, что вы должны будете стать Ильиничной?</p><p class="p">Об этом Мария Ульянова, кажется, не подумала. Ей только сейчас представился весь ужас внезапной замены ее добропорядочного, хоть и вольнолюбивого отца Николая Николаевича на столь же добропорядочного Илью. Согласитесь, быть дочерью Ильи совсем не то же, что дочерью Николая, — ощущение это сопоставимо с шоком, который испытал бы робкий читатель, узнав, что «Дон Кихот» написан не испанским одноруким бродягой, а утонченным французским филологом.</p><p class="p">— Если так нужно для дела... — выдавила она наконец.</p><p class="p">— Нужно, нужно. Сколько всего деток имел Николай — то есть Илья — Николаевич?</p><p class="p">— Всех нас было пятеро, — зачастила Ульянова, — живы все, кроме Саши и Оли. Саша погиб, а Оля умерла от тифа совсем молоденькой.</p><p class="p">Дзержинский посмотрел на Ульянову с живым интересом.</p><p class="p">— Каких лет она была?</p><p class="p">— Всего двадцати, родилась в семьдесят третьем...</p><p class="p">— Интересно, — задумчиво произнес Феликс. В жизни Ильича таинственным образом возникла мертвая сестра — положительно, судьба делала все, чтобы подчеркнуть предопределенность их встречи и зловещую параллельность биографий!</p><p class="p">— Прочие ваши родственники не будут возражать против появления в семье нового брата? — деликатно поинтересовался Луначарский.</p><p class="p">— Помилуйте, это для нас огромная, огромная честь! Я сегодня же напишу Анне.</p><p class="p">— Она в Симбирске?</p><p class="p">— Нет, она в Питере, с мужем Марком Елизаровым. А Митенька, наш младший, в Симбирске. Он тоже похож на дорогого Ильича, только в очках...</p><p class="p">— Надеюсь, на стороне белых никто из семьи не воевал? — строго спросил круглолицый Молотов, так точно прозванный каменной жопой с легкой, игривой руки Ильича.</p><p class="p">— Что вы! — воскликнула Ульянова, отлично знавшая, как важны в молодой советской республике безупречные родственники. — Митенька даже сидел при царе за пропаганду, но его отпустили, снисходя к маминым просьбам. Решили, что на одну семью хватит... — Она вновь разрыдалась.</p><p class="p">— Восхитительная наивность! — холодно произнес Феликс. — Эти зажиревшие сатрапы полагали, что достаточно запугать семью казнью одного несчастного юноши. Им и в голову не могло прийти, что вместо одного несчастного юноши так можно получить целое гнездо непримиримых мстителей! Нет, если мы будем брать, то только семьями. Оставлять кого-то на воле — значит вечно плодить себе врагов!</p><p class="p">— Полно, Феликс, — осмелился возразить Зиновьев, — ведь в России почти все — родственники! Этак мы рискуем пересажать всех...</p><p class="p">— И прекрасно сделаем! — жестко оборвал его Феликс. — На свободе должны остаться только те, кто полезен для нового мира, орден меченосцев, готовый на все ради дела. Прочие пополнят трудармию, ибо ни на что другое не годятся. Те, кто у власти, родственников иметь не должны. Пусть Ленин будет последним, у кого была настоящая семья. Кстати же получим и прекрасный мотив для его ухода в революцию — месть за несчастного брата.</p><p class="p">В Симбирск отрядили Луначарского — именно на его покатенькие плечи легла задача написания канонической биографии. Как всякий графоман, он был рад социальной востребованности. Спецпоезд довез его до Симбирска, и нарком просвещения понуро побрел вдоль длинной, полого шедшей под уклон Стрелецкой улицы, на которой проживала родня Марии Ульяновой.</p><p class="p">Город Симбирск способен был нагнать скуки и ненависти к самодержавию даже и на менее эмоциональную натуру, чем Ильич. Улицы были горбаты, грязны и запущены тою особенно отвратительной запущенностью, которая всегда отличает места, где не то чтобы не могут, а не хотят наводить порядок, считая это делом заранее безнадежным. Все здесь дышало нелюбовью — к городу, друг другу и недальновидному гостю, которому случится сюда забрести. Ильич, объездивший всю Россию, в Симбирске, кажется, ни разу не бывал — да и что ему было тут делать? Золота не намоешь, светской жизни ноль, карты — между священником, земским врачом и местным учителем по копейке вист... Луначарский все знал про этот город, едва ступив на его сухую землю, потрескавшуюся от засухи. Козы и собаки смотрели на него с подозрением, а приземистые купеческие дома, в которых рядом с уплотненным купечеством жил теперь нечистоплотный симбирский пролетариат, щурились как-то особенно гнусно, словно говоря: да, потеснили, да, поубивали, попили кровушки, пограбили вдоволь... а с русской жизнью ничего не сделали, и так и будет, и отлично! А виноваты будете вы, большевики: нам ведь дай только повод позверствовать, мы порежем немного друг друга и вернемся в прежнее русло, и в домах этих будут те же купцы, а в трущобах — те же пролетарии, и все они будут проклинать ваши имена — за то, что кровь вы развязали, а моря не зажгли... Возможно, все дело было в больном воображении: Луначарский в последние годы часто корил себя за то, что вообще ввязался в революцию. Нечего было самоутверждаться за счет политики. Положим, теперь его пьесы идут в Малом, а без революции едва ли добрались бы и до Зеленого театра в Киеве, — но цена, заплаченная за их сценический успех, была явно несообразна.</p><p class="p">Да, да, думал Луначарский, шагая по Стрелецкой: если бы ребенок вырос здесь, да лишился брата, да каждый день видел кривую усмешку этих непрошибаемо приземистых, непобедимо тупых, как плечистые слободские парни, домов, да ходил бы мимо этих коз и собак — ведь это, в сущности, две разновидности одного провинциального животного, оно лает, когда боится, и блеет, когда ластится, а уж как рычит, когда бодается... да, если бы ребенок вырос тут, с той судьбой, какую мы ему придумали, он возненавидел бы Россию и все русское мертвящей, глухой ненавистью, которую не победит никакая жалость. Беда в одном: как мне, как всем нам писать его биографию, ежели в ней понадобится совместить несовместимое? Ведь Ленин был добрый, вот что самое главное. Он никогда не работал, не открывал зануду Маркса и считал его шарлатаном, любил деньги — но исключительно потому, что ему нравилось их проедать и пропивать; ему нравились дети, потому что и сам он был толстое лысое дитя, всегда готовое на шутку и розыгрыш, в разгар заседания Совнаркома вдруг срывающееся обучать кота прыгать через стул... Дитя, шутник, авантюрист, пожелавший шутки ради взять власть в России и избавить ее наконец от гнетущей скуки и взаимного мучительства — но уткнувшийся в это самое взаимное мучительство, потому что легких людей тут нету в помине... За что мы все так его любили? За легкомыслие, за неистребимую веселость, за то, что с ним ничего не было страшно! Все российские власти преследовали единственную цель — умучить как можно больше народу, — а этот, кажется, был единственным, кто видел цель жизни в удовольствиях и искренне пытался наставить на этот путь всех остальных! Да, жулик, да, картежник, да, наперсточник, — но с каким азартом он брался за всякое новое дело, как любил делать что-нибудь артельно, всем Совнаркомом, как заразительно хохотал, когда на экране грошового парижского синематографа Бастер Китон с размаху шлепался в лужу... Во главе России никогда еще не было такого человека, и как все хорошо шло поначалу! Казалось, достаточно избрать на царство единственного мужчину в России, которого интересовали только деньги, женщины и шустовский коньяк, — чтобы и всему остальному народу расхотелось угрюмо мучить самого себя... Шиш, дудки! И Ленин ходит теперь по бескрайнему российскому простору, а я мучительно пытаюсь примирить его светлый образ со скучной и тупой догмой, которую этот народ опять взвалил себе на шею... Господи, ведь нам же никто не поверит! Кто способен будет вообразить, что в одном лысом человечке способны сочетаться такая любовь и такая ненависть? Мне придется написать, что человек, всю Россию заковавший в железо и заливший кровью, искренне любил детей, а над Бетховеном плакал не потому, что проигрался в пух под «Аппассионату», а потому, что ненавидел насилие... Что за жуткий фантом, что за двуликий Янус! Нет, я, конечно, большой писатель (эта мысль несколько утешила Луначарского), но эта фигура и мне не по перу...</p><p class="p">Извещенные правительственной телеграммой Ульяновы — старшая сестра Марии Анна, ее сутулый скучный муж Марк Елизаров и очкастенький, лысеющий Митя, предполагаемый брат вождя, — навели в своем и без того чистеньком жилище совершенно хирургическую стерильность, отскребли полы и лестницы, выложили на видные места революционные книги — Надсона и Некрасова. Это была семья, каких в России тысячи, если не миллионы, — унылая, несчастная, забитая, честная и находящая в этой честности свое единственное утешение. Отец их был из тех, на чьей могиле обязательно говорят: «Служил ты недолго, но честно»; в столе у такого человека непременно лежит тетрадка, в которую он в горячие студенческие годы от руки переписывал фривольные стишки, перемежаемые песнями Беранже в переводах Курочкина. Луначарский перелистал толстую серую тетрадь, в которой «Гусарская азбука» соседствовала с «Поэтом и гражданином» без цензурных изъятий; осмотрел книгу, выданную в гимназии отличнице Анне, — легенды народов Севера, господи боже мой, что может быть скучнее, бессолнечнее, монотоннее, чем легенды народов Севера... Откуда бы в этой семье взяться Ильичу, пылкому, игристому, как шампанское? Как представить его заливистый хохот в этой цитадели серьезности и безнадежности?</p><p class="p">— Кстати, — сказал Луначарский за жидким чаем. — Уведомила ли вас Мария Николаевна, что вашего батюшку зовут теперь Илья?</p><p class="p">— Ка... каким образом? — поперхнулась Анна Николаевна. — Весь город помнит его как Николая!</p><p class="p">— Анна Николаевна, — медленно и печально произнес Луначарский. — Ну какой там «весь город», голубушка? Кто сейчас, после такой крови, вообще помнит, что там было в семидесятые годы? Никто не покушается на память вашего отца, более того — он станет самым известным в России инспектором реальных училищ! Честный труженик на ниве народного просвещения... Но вместо Николая Николаевича Ульянова будет Илья Николаевич Ульянов, только и всего! Согласитесь, проще убедить десяток симбирских старожилов в том, что Николая звали Ильей, — чем внушить всей России, что ее вождя звали Николаичем!</p><p class="p">— Скажите... а каково было истинное происхождение товарища Ленина? — робко спросил Дмитрий Николаевич, в чьих чертах не было ни малейшего сходства с его новым братом.</p><p class="p">— Товарищ Ленин, — строго сказал Луначарский, — вел строгую жизнь революционера. О его происхождении ничего не знали даже его ближайшие товарищи, даже товарищ Крупская. Мне ли рассказывать вам, как зверствовала царская охранка? Владимир Ильич никогда при жизни не рассказывал о своей семье. Но массам необходим воспитательный пример. И мы пришли к выводу, что наилучшим воспитательным примером будет именно история семьи Ульяновых...</p><p class="p">— Но как же вы объясните, что настоящая фамилия товарища Ленина была Ульянов? — скучно спросил скучный Марк, способный задавать только такие дотошные вопросы. Вероятно, в его профессии земского статистика подобная дотошность была уместна, но десять минут в обществе этого человека способны были навеки отвратить от статистики, земства и служения народу в целом.</p><p class="p">— Ну, это несложно, — отмахнулся Луначарский. — У всякого революционера есть псевдоним, партийная кличка, подпись для публикаций в правительственных изданиях... Товарищ Ленин в Париже использовал псевдонимы Тулин, Надин, Инин... Я сам несколько раз ставил свои драмы под чужим именем, потому что мое собственное находилось в России под запретом, — приосанился он.</p><p class="p">— А может быть, я знаю какие-нибудь ваши сочинения? — робко спросила Анна Николаевна.</p><p class="p">— Возможно, — загадочно ответил Луначарский. («Юрий Милославский», — хихикнул он про себя.) Анна поняла, что расспросы неуместны, и отстала.</p><p class="p">— И все-таки, — гнул свое Марк, — я, знаете, воспитан в том духе, что категорически отвергаю любую ложь, пусть во благо революционного дела. Нельзя строить на фундаменте лжи, вот что я не устаю повторять. И отец Анны Николаевны был честнейший человек, Мария его почти не помнит, но Анна-то помнит отлично... Простите, что я учу государственному мышлению вас, человека государственного, но вы должны понять мои сомнения...</p><p class="p">— Скажите, Марк, — разозлился Луначарский, — когда революционер-подпольщик приклеивает бороду — это ложь? Когда он отказывается выдать зверям из охранки своих товарищей — запирательство? А когда создатель нового государства выигрывает в наперстки сумму, необходимую для революции, — это надувательство, так по вашей логике? Это контрреволюционная логика, товарищ Елизаров! (Сам Луначарский терпеть не мог репрессивной демагогии, но ничем другим заткнуть Марка было нельзя.)</p><p class="p">Семья Ульяновых испуганно замолчала. Только Николай Николаевич с портрета подмигнул как-то заговорщически — не зря у него в тетрадке была «Гусарская азбука». И в лице его, в самом деле имевшем некое сходство с подвижкой и улыбчивой физией Ленина, — в самом деле была какая-то веселая сумасшедшинка. Мало кто знал, что у тихого инспектора реальных училищ была любимая привычка — иногда во время зануднейшей беседы с учителями или кислого чаепития с директором гимназии вдруг подмигнуть вот этак, словно говоря: «Ну я же все понимаю, братцы», — и жизнь провинциальной гимназии начинала казаться переносимее.</p><p class="empty-line"/><p class="p">Луначарский заночевал в двухэтажной симбирской гостинице «Бристоль», ныне «Красный Бристоль» — никто в городе не знал, в чем смысл названия, и полагал, что если это какой-то заграничный город, то вследствие мировой революции рано или поздно покраснеет и он. Луначарскому было очень скучно. Он раздал членам семьи Ульяновых первые распоряжения, выдал деньги на закупку экспонатов (следовало купить новому братцу детскую кроватку, любимые книжки, папку для нот, учебники, курточку, которую неугомонный маленький Ильич пропорол о сучок, играя в индейцев, — после чего добрая матушка мягко пожурила его, и Ильич никогда, никогда уж больше не попадал на сучки, а вместо индейцев играл исключительно в хижину дяди Тома!) — и делать в городе было больше нечего. Несмотря на НЭП, здесь все еще пахло военным коммунизмом. Луначарский вообще-то не пил, но тут ему захотелось выпить. У толстого мужика, выдававшего ключи и следившего за порядком в «Красном Бристоле», наркомпрос решительно спросил:</p><p class="p">— Где, братец, у вас тут какое-нибудь этакое заведение?</p><p class="p">— Могу позвать, — засуетился мужик, неправильно поняв Луначарского. — Вам какую желательно — в теле или покультурней?</p><p class="p">— Вы не поняли, товарищ, — сурово сказал Луначарский. — Не забывайте, с кем говорите.</p><p class="p">— Так я что ж, — перепугался ночной портье и вытянулся в струнку.</p><p class="p">«Вот чорт, — подумал Луначарский. — Стоило огород городить, чтобы получилось все то же самое, только хуже».</p><p class="p">— Я выпить хочу, — грубо сказал Луначарский. — У нас в стране НЭП или что?</p><p class="p">— А! — с облегчением выдохнул мужик. — Так вам к изобретателю. Он такой самогонный аппарат изобрел, что чудо. Был учитель гимназии, химик, а потом стал изобретать. Чудесный самогон, прошу, прошу. Второй переулочек налево, пятый дом от угла.</p><p class="p">В доме химика тускло светилось единственное окошко. Луначарский постучал в калитку. Толстая собака, похожая на свинью, лениво приподнялась, гулко, как в бочку, гавкнула и улеглась обратно. На пороге покосившегося деревянного дома показалась длинная фигура.</p><p class="p">— Кого бог несет? — спросил дребезжащий тенор.</p><p class="p">— Самогону нет ли? — деликатно спросил нарком.</p><p class="p">— Заходите, — пригласил химик.</p><p class="p">Комната, куда вошел Луначарский, была загормождена всеми непременными атрибутами изобретательского жилища: колбы, реторты, змеевики, комплекты немецких химических журналов и портрет Менделеева на стене. Вид у Менделеева был хитрый, словно вся его периодическая таблица была нужна только для прикрытия, а основным его занятием был поиск оптимального соотношения между водою и спиртом.</p><p class="p">— Народный комиссар просвещения, если не ошибаюсь? — дружелюбно спросил химик, приподняв очки и запросто рассматривая высокого гостя.</p><p class="p">— Он самый, — удивленно признался Луначарский. — Как вы меня узнали?</p><p class="p">— Да кто ж в Симбирске ночью за самогоном-то придет, — лукаво усмехнулся химик. — Город смирный. А о вашем приезде наслышаны... Ну, думаю, беспременно вечером зайдет ко мне Анатолий Васильевич! Да не беспокойтесь, — поспешно прибавил он, — я шучу. Я и в лицо вас знаю, газеты читаем, люди не дикие, слава тебе господи...</p><p class="p">— У вас лицензия есть? — на всякий случай спросил Луначарский.</p><p class="p">— Как не быть, — кивнул химик. — Даже мандат. Продукт чистый, не беспокойтесь.</p><p class="p">— А кафе... или ресторана... никто не держит?</p><p class="p">— Помилуйте, откуда? Но, может быть, я сгожусь — для компании? Редко случается поговорить со столичным гостем, порасспросить о текущем моменте... С интеллигентными людьми, знаете, тут не разговоришься — кто и был, вымер. Один я, почитай, остался — потому что умею пополнять запасы энергии без приема пищи, непосредственно за счет чтения. Собственное изобретение. Думаю подарить миру и тем осчастливить. Ведь что такое спиритус? — приговаривал учитель, наливая мутной жидкости из огромной подозрительной бутыли. — Не более как средство раскрепощения внутренней энергии. Значит, возможно высвободить ее из клеток мозга, как англичане, слышал я, собираются раскрепостить из атома? Ну-с, ваше здоровье, товарищ нарком, и пусть все у вас получится.</p><p class="p">Напиток химика удивительно помогал раскрепостить энергию. Впервые за последнее время Луначарский почувствовал себя нестесненно и весело.</p><p class="p">— А по каким делам в наши края? — спросил изобретатель.</p><p class="p">— Государственная необходимость... Но, знаете, ведь товарищ Ленин был отсюда родом — вот и думаем организовать музей.</p><p class="p">Луначарскому интересно было проверить новую версию ленинской биографии на местном интеллигенте, который, сам того не думая, оказался вдруг земляком величайшего революционера в мировой истории.</p><p class="p">— Товарищ Ленин? — поднял брови учитель. — Никогда не слышал, что он с Волги...</p><p class="p">— Да, да. Товарищу Ленину приходилось скрывать свое происхождение, не то царское правительство схватило бы его семью. Он ведь был сыном местного инспектора реальных училищ, Ильи Ульянова.</p><p class="p">— Вы хотите сказать — Николая? — переспросил химик. — Николая Николаевича я помню с гимназических своих лет, он был человек безусловно порядочный, но дома у него я никогда не бывал и с семьей его не знаком... Так вы хотите сказать, что Владимир Ильич — его сынок?</p><p class="p">— Именно, — важно кивнул Луначарский. — Просто Николай Николаевич вынужден был всю жизнь скрывать, что настоящее его имя было Илья. Он ненавидел это имя, данное ему при крещении, и потому называл себя Николаем — в знак протеста против поповского произвола.</p><p class="p">— А, — кивнул химик. — Ну что ж, и такое бывало. Моя сестра при крещении получила имя Перепетуя, что по латыни означает «вечная», то есть perpetua... Однако ей так не нравилось это имя, что она всю жизнь называла себя Варварой.</p><p class="p">Кажется, легенда не вызывала особых возражений — Луначарский мог смело внедрять в массы новую биографию Ильича.</p><p class="p">— Я ведь химик, — продолжал хозяин, разливая по третьей. — Для химиков названия вещей не играют особенной роли. Совнарком, компомпом... Ульянов, Ленин... Стрижено, брито... Я вообще не думаю, что в России имеет смысл преподавать историю.</p><p class="p">— Вы хотите сказать, что она никого ничему не учит? — с пониманием спросил Луначарский.</p><p class="p">— Да вот еще... Почему она вообще должна учить? Я совершенно о другом, ваше здоровье... Я о том, что пресловутая так называемая роль личности в истории — она возможна, видите ли, там, где эта личность играет какую-нибудь роль в обществе. А в России, простите-с, она не более, чем моя собственная роль в химической реакции. Вот, изволите ли видеть, у меня аш два эс о четыре, сиречь серная кислота. Не бойтесь, не бойтесь, слабая. Вот вливаю я туда, — уютно приговаривал химик, тут же все это и проделывая, — натрий о аш, сиречь так называемое основание, или щелочь, или сволочь, как говаривали мои балбесы. Поврозь это вещества ужасные, способные вызвать химический ожог большой силы... Но вот я их соединил — и случилась, как мы это зовем, нейтрализация: пошипело-пошипело, выпал, стало быть, сульфат натрия, а прочее все стало водичка. Во-дич-ка! И какова же моя роль в этой химической реакции, моя, Льва Троцкого? Да никакой решительно, рядом стоял и наблюдал.</p><p class="p">— Троцкого? — переспросил нарком.</p><p class="p">— Тро-иц-ко-го, — по слогам повторил учитель. — Праздник знаете, Троицын день?</p><p class="p">— Понятно, — сказал Луначарский, вытирая холодный пот.</p><p class="p">— Так, стало быть, и в России, — продолжал учитель, усаживаясь напротив. — У христианских стран, или европейских, если угодно, есть история христианская, или европейская. Российская же история — естественная, движущаяся сама собой, ибо в развитии ее народ не принимает ни малейшего участия. Уяснив себе это, я, готовившийся в историки, порешил заниматься естественными науками — ибо в России только они и способны объяснить все происходящее, все решительно! История наша есть процесс неразрывный, циклический, и все, простите меня, революционеры помогают ему не более, чем мужик, разводящий костер на льду, помогает весне. Лед сам собою стает в нужное время, а великим революционером назовут того, кто разведет костер на льду в марте месяце. Совпадение, не более. Вот сейчас, например, с вашим НЭПом — славная, конечно, придумка, да только не выйдет никакого НЭПа, и вы, товарищ Анатолий, лучше меня это знаете. У нас теперь другая стадия — лед становится, все смерзается, — а потому НЭП у вас получится только лет через сорок. Когда ростепель настанет.</p><p class="p">— Подождите, — перебил Луначарский. Его умственная энергия страшно раскрепостилась. — Что же, вы отрицаете всякое личное начало?</p><p class="p">— Так ведь и Маркс ваш его отрицал, только у него как получилось? У него получилось, что мир сам собою, путем развития производительных сил, придет ко благу. А с чего ему куда-то приходить, ежели он по кругу ходит? В других, может, местах оно и не так, а у нас тут Россия, самая марксистская страна. У нас его будут читать даже тогда, когда во всем мире забудут к чортовой бабушке. Эка придумал — что история движется благодаря эволюции производительных сил! Это, значит, придумал я новый двигатель — и тут же история подвинулась? Чушь собачья, любой студент вам докажет обратное. Но для России оно, пожалуй, и так, ибо силы, которая бы тащила историю вверх, у нас тут в силу разных причин быть не может. Их я вам освещать не стану, а может, вы и сами догадываетесь. Вы же с товарищем Лениным — виноват, Ульяновым, а по мне, хоть и Надиным, — вздумали тут утопию построить, а что вышло?</p><p class="p">— Что вышло? — с подозрением спросил Луначарский.</p><p class="p">— Да то же самое и вышло, — ответил учитель. — Теперь опять по кругу, подморозить все это дело, потом подтеплить слегка, чтоб не все перемерли, потом вроде как в сон вогнать — потому что для подмораживания силы уж не те, — а потом опять, не взыщите, революция. И снова по кругу — лето-зима-осень-весна, сто лет с поправками. Паровоз этот ездит сам, без всякого вашего участия, и кто такой есть товарищ Ленин — в свете этого всепобеждающего учения совершенно неважно.</p><p class="p">— Минуту, — попросил Луначарский. Мысль его не поспевала за учительской. Он чувствовал себя как на уроке химии в гимназии, где тоже никогда не усваивал точные науки с первого раза. — Вы хотите сказать, что история в России... движется раз навсегда предписанным путем? Как поезд по кругу?</p><p class="p">— Ну так и Маркс писал, что революция — локомотив истории, — подтвердил Троицкий. — Ускорить — может, пожалуйста, а в сторону свернуть — это ни-ни.</p><p class="p">— И это навсегда? — уточнил Луначарский.</p><p class="p">— Почему я знаю, — пожал плечами учитель. — Может случиться и так, что до народа рано или поздно дойдет главное — он захочет соблюдать законы, следовать им, творить историю сознательно... Но думаю, что выбор свой он уже сделал. Всякий путь ведь куда ведет? — в тупик, к обрыву рельсов, и всякая цивилизация неизбежно кончится. Кроме русской! — воскликнул Троицкий и поднял палец, весь покрытый желтыми химическими ожогами. — Русской конца нет и не предвидится. У кольца нет конца! Весь мир упрется в стену и разобьет об нее голову, вон уж и Европа без пяти минут себя истребила — войну-то видели, бойню-то? А мы знай себе по кругу, по кругу... и потому всех переживем. Где теперь Македонский? Где Цезарь? Где Карл Великий? А Россия — вот она, стоит, и нет такого ежа, который бы в нашем желудке не перепрел. Кто из наших правителей был великий человек, ну кто? Петр Великий — сумасшедший, который для прогресса бороды рубил? Иван Грозный — маниак? Александр Благословенный, отцеубийца? А поставь ты того же Петра двадцатью годами раньше, ежели б родился он году в шестьсот пятидесятом, — и что, и какая б революция с него началась? Сонное царство было бы, как при батюшке... Или возьмите Павла Первого, с его темпераментом, понимаете ли, бойца, с идеями революционными, великими! Но выпало ему время упадка и сонливости, конец круга, — и ничего, кроме смеха, он со своими идеями не вызвал. Так и товарищ Ленин: посмотрите вы на его внешность! Милый человек, чистый буржуа. Ему б в другое время в банке сидеть, бумажки писать. Или на бирже играть, если был талант. А он мирами тряс, миллионы рабочих с его именем на смерть пошли! А при чем тут товарищ Ленин? Если бы, скажу вам, только не в обиду, товарищ нарком, — если бы товарищ Ленин был женщина, все было бы ровно то же самое.</p><p class="p">— Вы думаете? — прищурился Луначарский.</p><p class="p">— Ну а как же.</p><p class="p">— Закурить у вас нет ли? — спросил нарком. Он курил редко, все больше в молодости и только когда выпивал, — но разговор был слишком трудный, чтобы обойтись без стимула. Наркому трудно было осознать, что Ленин мог быть женщиной. Он представил Ильича в платочке и расхохотался. Ильич, кажется, подмигнул ему.</p><p class="p">— Есть особая такая трава, сам ращу, — весело сказал химик. — Говорят, от нее вред, а я нахожу, что одна польза. Настроение — сами увидите. А между тем обычный каннабис, сиречь конопля.</p><p class="p">Луначарский неумело скрутил самокрутку и закурил. Дым был сладковатый, довольно приятный.</p><p class="p">— В военный-то коммунизм табачку не было, так и спасался, — хохотнул учитель.</p><p class="p">— Но жизнь улучшилась? — серьезно спросил Луначарский.</p><p class="p">— Значительно, зна-чи-тель-но! </p><p class="p">Они выпили.</p><p class="p">— Так-то, — подвел итог Троицкий.</p><p class="p">— Погодите, — все еще не желал смириться с цикличностью русской истории наркомпрос. — Стало быть, если бы даже и не было никаких большевиков... и самого товарища Ленина... и никакого партийного подполья за границей... значит, революция свершилась бы сама собою?</p><p class="p">— Конечно, — подтвердил учитель. — Выдумаете, Николашка с Распутиным долго бы еще удержались? А в войну почему влезли? Этого же никто не может здраво объяснить. Есть логика истории, а человека не спрашивают. Знаете, какой самый модный жанр будет в России лет через сто, когда дорастут до понимания русского круга? Будут писать не ту историю, какая была, а та, какая могла быть. Потому что это же совершенно все равно. Можно что угодно придумать. Я вам в два счета докажу, что Иоанн Грозный был поляк и именно поэтому истребил столько русских. А хотите, докажу, что никакого вашего Ульянова-Ленина вообще не было?</p><p class="p">— Как не было, — вяло сопротивлялся Луначарский. — Он мне руку жал! На дуэли со мной хотел стреляться! Правда!</p><p class="p">— Правда, — повторял учитель, все быстрее, все лихорадочней. — Правда, правда... — Он отвратительно хихикал, раскачивался и двоился. — Правда бывает там, товарищ нарком, где хоть для кого-нибудь хоть что-нибудь значит человеческое слово. А где не хотят жить по человеческим законам — там живут по природным-с! У нас человек что? Тьфу, понюшка! А правда у нас что? Тьфу, подстилка! У нас, товарищ нарком, все правда, потому и газета ваша называется «Правда», а пишут там все подряд, все подряд, все подряд! — Учитель пустился в пляс, и комната заплясала вместе с ним; образовался маленький вихрь, в центре которого крутился Ленин. Он сорвал с головы платочек и весело размахивал им, притопывая и гикая. Потом выбросил платочек, заложил пальцы в проймы жилета и пошел плясать по кругу, высоко выбрасывая ножки; зазвучало что-то еврейское, перешедшее почему-то в «Марсельезу»... Завыли цыгане, таившиеся, вероятно, под полом. Высокий дребезжащий тенорок взвивался над всем этим, выкрикивая:</p><p class="p">— Нет человека — нет правды! Нет человека — нет правды!</p><p class="p">— А у нас нет человека? — из последних сил спросил нарком.</p><p class="p">— Откуда! Откуда! — завыл учитель, и все исчезло. </p><p class="p">Очнулся Луначарский в «Красном Бристоле». Он лежал на своей постели, заботливо раздетый и прикрытый одеялом, которое было даже подоткнуто. Над ним склонялся давешний мужик, охранявший гостиницу.</p><p class="p">— Где я? — пролепетал Луначарский.</p><p class="p">— В «Бристоле», товарищ нарком! Вчера ночью пришли веселые такие, изволили петь... а потом слышу — кричите, кричите...</p><p class="p">— Где учитель химии? — быстро спросил Луначарский, вспомнив все. — Этот, Троицкий?</p><p class="p">— Где ж ему быть, — хихикнул портье. — У себя, должно, дома... Да вы не беспокойтесь, товарищ нарком, он чокнутый, весь Симбирск знает.</p><p class="p">— Чокнутый, чокнутый, — проговорил Луначарский, морщась от головной боли. — Вызовите ко мне, пожалуйста, начальника местной ЧеКа...</p><p class="empty-line"/><p class="p">В двадцать седьмом году институт изучения марксизма-ленинизма (несчастному Энгельсу и тут не повезло) выпустил первое издание сочинений Ленина. Написали их втроем Луначарский, Бухарин и Кржижановский под общей редакцией Дзержинского. Там были сочинения на все случаи жизни — об искусстве, о рабочем классе и даже о пожарной безопасности. Поскольку товарищ Ленин писал практически все время, огромная часть его наследия оставалась несобранной и пополняла новые и новые издания его сочинений; дописывали их уже другие люди. А тех, кто сочинял первое, «Черный Крест» осторожно убирал по одному. Всякий раз, как надо было устраивать в стране очередную кампанию, в сочинения Ленина дописывалась соответствующая статья или письмо. Ленин оказался автором трудов о коллективизации, индустриализации, о пользе массовых расстрелов и целесообразности реалистического искусства. На свете не осталось почти ничего, о чем бы не высказался Ленин, — если не считать тех предметов, которые интересовали его по-настоящему: во всех пятидесяти пяти томах последнего издания его сочинений было очень мало упоминаний о любви, всего два — о синематографе и вовсе ни одного — о картах. Если не считать аутентичной, бережно сохранявшейся в Институте марксизма-ленинизма записки «Будущее русской революции поставлено на карту».</p><p class="p">Луначарский выступал на торжественном заседании, посвященном выходу первого собрания сочинений. Марк Елизаров сидел в первом ряду, важно кивал и, кажется, всему уже верил. Мария Ильинична плакала, Анна Ильинична утешала ее, Дмитрий Ильич мечтательно пропускал через кулак специально отпущенную бородку.</p><p class="p">Нарком просвещения отбарабанил положенное и уселся на место. Он говорил хорошо, зажигательно, но как-то машинально, словно и впрямь ходил по кругу. Вдруг ему с необыкновенной яркостью представился Ленин. Где-то сейчас Ленин? Он идет, должно быть, по бескрайнему простору России в своих лапотках... или вечных потрепанных штиблетах... идет под дождем, неся узелок с небогатым обедом, ищет ночлега, а сам себе повторяет для бодрости: «Ленин жил, Ленин жив, Ленин будет жить»... Или едет куда-нибудь в тряском поезде, бесконечно тащащемся по серому русскому простору, такому родному, такому пронзительно-грустному, такому вечному — сожравшему с кротким печальным выражением всех, кто когда-либо по нему блуждал, и готовому сожрать мириады будущих обитателей... поезд трясется, спотыкается, качается — а Ленин, давно уже забывший про всякую конспирацию и отрастивший рыжеватую бородку, знай себе играет с мужиками в карты и вспоминает с улыбкой, как он был когда-то российским диктатором.</p><p class="p">— Здоров врать, Николаич! — говорят ему мужики с восхищением, а какая-нибудь баба, повинуясь непобедимому обаянию, уже рассказывает ему всю свою жизнь... Луначарскому страшно захотелось обнять этого простого и веселого человека — единственного человека на российском троне за всю его шестивековую историю. Ему захотелось припасть усталой головой к ленинскому плечу и услышать его вечное «Архичушь, батенька!» — чтобы снова на секунду почувствовать, что все мы преодолеем и все у нас получится. Он все готов был отдать в эту минуту за светлое и надежное чувство: на троне — человек, которому вовсе не хочется никого мучить, человек, не одержимый маниями величия и преследования, простой любитель пива, женщин и детей...</p><p class="p">— Здоров, здоров врать! — смеются мужики.</p><p class="p">— А и правда, — говорит Ленин. — Может, и не было ничего. Налейте, братцы!</p><p class="empty-line"/><p class="p">«Всех докторов бы — на кол! О Matka Boska, до чего ж тяжело и скучно, и как мне это надоело!» Так думал Феликс Эдмундович, лежа в гробу и слушая длинные, цветистые речи. Говорили о нем хорошо, как о всяком покойнике: то были его похороны...</p><p class="p">Летом 1926-го Богданову, ставшему директором первого в мире Института переливания крови, наконец удалось вновь синтезировать некоторое количество живой и мертвой воды, но они по своим свойствам несколько отличались от первой партии: так, после приема мертвой воды у человека полностью сохранялось сознание. Сам Богданов, которому никогда не приходилось обитать в гробу, считал это шагом вперед, но Дзержинский, уже совершавший в 1906-м подобное путешествие, придерживался на этот счет иного мнения: быть недвижным и беспомощным, но при этом все слышать и сознавать — было мучительно. Однако это было, конечно, лучше, чем ничего. Подлец Богданов всячески пытался скрыть свое чудесное изобретение, но от всевидящего взора Дзержинского невозможно было укрыться. При помощи страшных угроз он вынудил доктора снабдить его волшебными зельями; к сожалению, самого доктора пришлось оставить в живых, поскольку именно он должен был, прокравшись к гробу ночью после похорон, оживить своего пациента. Феликс Эдмундович не допускал мысли о том, что Богданов посмеет его обмануть: во-первых, научная любознательность вынудит доктора довести до конца свой эксперимент, а во-вторых, месть Председателя ВЧК может быть страшна и на том свете...</p><p class="p">Изобретение пришлось как нельзя более кстати: когда 20 июля, выступая на пленарном заседании ЦК партии, он почувствовал боль и понял, что отравлен, то смог слабеющей рукою поднести к посинелым губам заветный пузырек; мертвая вода нейтрализовала действие яда, и две минуты спустя он уже мог наблюдать несколько ошалело, как коварные «товарищи» суетятся над ним, пытаясь нащупать пульс. «Кто?! — думал он. — Кто отравил меня?» Глаза его были открыты, но глазные яблоки не ворочались, и он мог видеть только тех, кто заглядывал ему прямо в лицо. Старинное поверье гласило, что убийца, приблизившись к убитому, непременно выдаст себя каким-нибудь движением или возгласом; но все партийные соратники, насколько он мог судить по выражениям их лиц, были искренне озадачены случившимся с вождем «сердечным приступом», хотя и не слишком огорчены.</p><p class="p">Ступая мягко в своих сапожках, к нему подошел Коба и протянул свою руку с черными от грязи ногтями; рябое лицо было бессмысленно и тупо, как всегда. Но в этот миг он вспомнил, вспомнил, как на днях застал дурачка сидящим на полу своей конурки и наблюдающим с холодным любопытством за предсмертной агонией черной крысы! «Мышьяк, мышьяк! Он практиковался! Неблагодарная, мерзкая тварь!» <strong>А </strong>нынче утром Коба подавал ему кофе! В душе Феликса Эдмундовича забурлил бессильный гнев; он напряг все мускулы, но не мог пошевелиться... Корявая рука протянулась к самому его лицу и закрыла ему глаза. Больше он ничего не увидит до того момента, когда Богданов освободит его. Он мог только слышать и думать.</p><p class="p">Дух его, на время освобожденный волшебным зельем от оков плоти, воспарил высоко; он ощущал себя ангелом; мысли были чисты и грустны. «Ванда, Ванда, прости — еще не пришло время нам встретиться. Придется тебе подождать, любимая, родная». Сквозь гул разных голосов он услышал, как женский голос тихо сказал «бедолага» или что-то в этом роде. Мария Спиридонова пришла на его похороны. Это было ему неожиданно приятно и наполнило его сердце тихой печалью. Он хотел, чтоб этот голос произнес еще что-нибудь. Но ее, по-видимому, оттеснили от гроба. Он простил ее.</p><p class="p">«Богданов клялся, что никому до меня не давал своего снадобья и никому не даст после; но я ему не верю! Надеюсь, этот болван и разиня не сумеет отыскать кольца прежде меня! Я найду ЕГО и не повторю прежних ошибок. Все вышло наперекосяк, потому что условия проклятья Марины не были соблюдены в точности. Михаил не царствовал, и вообще все было не так, как должно. Я все исправлю. — При этой мысли к нему вернулось его обычное самообладание. — Игра продолжается... Да здравствует революция — перезагрузка!»</p><p class="p">Когда стали опускать крышку гроба, он улыбался. Но никто не видел этой улыбки.</p><p class="p">Так он и лежит до сих пор, потому что Богданов — умный, печальный доктор Богданов! — давно уже все понял про этого человека и, конечно, не пришел его оживлять. Но кремлевская стена — надежное укрытие, да и живой воды можно синтезировать сколько угодно, если у какой-нибудь из русских властей дойдут руки до расшифровки богдановского архива. Феликс подождет. Времени у него много. Тление над ним не властно, планов придумано достаточно, а круг на то и круг, чтобы вечное возвращение, предсказанное сумасшедшим немцем, свершалось из века в век. Так он и ждет — мертвее всех мертвых, живее всех живых. Он-то знает, что у кольца нет конца.</p></span>
