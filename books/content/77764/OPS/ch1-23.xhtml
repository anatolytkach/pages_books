<span id="id12"><div class="title">
<p class="p1">ГЛАВА 11</p>
</div><p class="subtitle">1918: «Черный Крест» ищет волшебное кольцо и мстит за обиды. Влюбленный лев, конец Мирбаха и призрак Троцкого.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">...Черный вечер, белый снег; ветер, ветер — на всем божьем свете! Скользко, тяжко, всякий ходок скользит... Ленин споткнулся, едва не потерял равновесие, выругался — где дворники?! Он, конечно, редко теперь ходил пешком. Знаменитый «Горный дух» — тот самый шикарный «роллс-ройс» Михаила Романова — возил Председателя Совнаркома на службу, со службы и по всяким государственным делам. Но иногда хотелось ускользнуть от шоферского надзора, чтобы навестить какую-нибудь хорошенькую даму. Теперь он, кутая нос в воротник, как раз возвращался от одной из них. Он опять оступился, глянул по сторонам: какая-то старушка мотнулась через сугроб... Попик, барынька в каракуле... Лихач с электрическим фонариком на оглоблях везет разодетую парочку... Плакат «Вся власть Учредительному Собранию!» бросился ему в глаза. Но и мысль об Учредительном Собрании не радовала его. От холода и постоянной грязи и разрухи у него было прескверное настроение. Даже красотка в черных чулках не смогла его развлечь как следует. «Как замечательно мне жилось раньше, в Швейцарии! И как же здесь в этом моем свинячьем государстве гадко!»</p><p class="p">Навстречу ему шел какой-то длинноволосый, закутанный в белое, с белою же повязкой на голове — то ли раненый, то ли сбежавший из дурки псих, то ли опять же поп, то ли баба, то ли поэт, то ли индус, не разобрать... «Батюшки, да он босой!» Но в январе восемнадцатого года никого нельзя было ничем особенно удивить. «Снег кружит — ой, вьюга! На четыре шага ничего не видать...» А за босым человеком следом шагал отряд красноармейцев с цигарками в зубах. «Расстреливать ведут, не иначе». Владимир Ильич еще сильней закутался в воротник. Красноармейцев все боялись. Они могли сперва пальнуть, а потом уж разобраться, в кого пальнули. Пожалуй, красноармейцы были еще хуже революционных матросов: те хоть песни веселые пели, а эти тоже пели песни, но идеологически выдержанные, которых Владимир Ильич терпеть не мог. И он решительно юркнул в переулок.</p><p class="p">Ему и в голову не пришло, конечно, сосчитать красноармейцев. И он так никогда и не узнал, что босой человек в белых одеждах был сам грозный лев революции, Председатель ЧК Дзержинский. У него сперли одежду и сапоги, когда он мылся в бане, и теперь он шел босиком, в простыне и тюрбане из белоснежного полотенца. «До чего же тут паршиво, — думал Феликс Эдмундович: это был тот редкий момент, когда их с Владимиром Ильичом мысли совпадали почти полностью. — Дурак Ленин с дураком Свердловым все развалили... Впрочем, этакой премерзкой страною невозможно управлять...» Ноги его ужасно мерзли. Вообще ему было так плохо, что он даже не замечал, что какие-то красноармейцы за ним идут. Не будь он потомком Иоанна Грозного — лег бы, наверное, в сугроб и умер.</p><p class="p">Двенадцать красноармейцев, в свою очередь, никакого интереса не проявляли к психу в простыне. Они просто шли себе своей дорогою и говорили о своем:</p><p class="p">— А Ванька с Катькой — в кабаке... — тоскливо произнес красноармеец Петруха — высокий, кудрявый — и сплюнул сквозь щель в зубах. Его красивая подруга Катя изменила ему с бывшим его товарищем — замухрышкой Ванькой Жуковым, который разжился деньгами при штурме Зимнего дворца.</p><p class="p">— Ванюшка сам теперь богат, — сказал другой красноармеец, Андрюха.</p><p class="p">Петр ничего на это не ответил. «Катя, моя Катя, толстоморденькая...» — с тоскою и нежностью думал он и представлял, как скажет ей при встрече: «Помнишь, Катя, офицера — не ушел он от ножа... Аль не вспомнила, холера? Гетры серые носила, шоколад Миньон жрала, с юнкерьем гулять ходила...» И вдруг, под светом чудом уцелевшего фонаря у аптеки, в разряженной фифочке, в обнимку с кавалером ехавшей навстречу в экипаже, он узнал ее! Она была, конечно же, с Ванькой...</p><p class="p">— Андрюха, помогай! — заорал Петр. — Еще разок! Взводи курок!..</p><p class="p">— Утек, подлец! У, жопа, стой!</p><p class="p">— А Катька где? — И тут он увидел ее, с простреленной головою лежащую на снегу...</p><p class="p">Он остановился, замер. Свет померк в глазах. Безучастно смотрел он, как его товарищи стаскивают с мертвой девушки шубку, полусапожки, серьги, колечки... Несколько колец было хорошеньких, с камушками, а одно — просто какая-то дрянь, которой цена полтинник в базарный день... Но красноармеец Андрюха и его сунул себе в карман — авось пригодится в хозяйстве. А Петр все стоял... «Загубил я, бестолковый, загубил я сгоряча... ах!»</p><p class="p">Потом товарищи позвали его, и он покорно, ничего не соображая, пошел за ними. Они уже гоготали и показывали пальцами на полоумного в простыне и белом тюрбане, что влачился впереди. Но он скоро свернул, и они его не тронули. Он, как и его соперник Ленин, никогда не узнал, что был в ту ночь совсем рядом с волшебным кольцом... А стоявший и куривший папиросу под фонарем у аптеки поэт Блок попросту описал всю эту сцену так, как он ее видел, без всякого символизма, хотя и с небольшими поэтическими преувеличениями, но ведь на то он и поэт. Так что зря Зинаида Гиппиус не подала ему руки в трамвае.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">— Владимир Ильич, денег нету.</p><p class="p">— Что, совсем нету?</p><p class="p">— Совсем, — сказал Свердлов и вздохнул тяжко. — Вот и матрос Железняков от голода так ослабел и устал, что распустил Учредительное собрание.</p><p class="p">— Как скверно! — огорчился Ленин. Учредительное собрание было его любимым детищем; он мечтал о том, как будет выступать в нем с зажигательными речами. На заседаниях Совнаркома, ВЦИК и других советских органов зажигательные речи не поощрялись, и вообще было очень скучно. — А нельзя ли выписать матросу Железнякову дополнительный паек, и пусть он постоит в карауле еще немножко? — Ленин подозревал, конечно, что слабость матроса вызвана не голодом, а неумеренным потреблением горячительных напитков, но доказать это теперь было вряд ли возможно.</p><p class="p">— Да ведь Учредительное собрание уже разбежалось. Другой раз не соберешь.</p><p class="p">— Скверно, архискверно, Яков Михайлович! — Ленин больше не звал Свердлова Яшей: как-то неловко было называть Яшей такого высокопоставленного чиновника. — А куда же деваются деньги И ценности, экспроприированные у буржуазии и помещиков?</p><p class="p">— Они оседают в подвалах ВЧК. Феликс Эдмундович говорит, что там сохранней будут. Он, конечно, выдает нам кое-что на булавки, то есть на содержание госаппарата. Но у нас очень большие накладные расходы. Например, секретарше Троцкого в прошлом месяце был выплачен двойной оклад.</p><p class="p">— За что?!</p><p class="p">— У нее была сверхурочная работа, — ответил Свердлов.</p><p class="p">— Какая у секретарши Троцкого может быть сверхурочная работа, ежели никакого Троцкого нет?</p><p class="p">— Возможно, Троцкого и нет, — после некоторого колебания согласился Свердлов, — но секретарша-то у него определенно есть. Такая сухощавая брюнетка в оранжевой кофточке и с родинкой на щеке. И в ведомости отдела кадров написано, что у нее была в прошлом месяце сверхурочная работа. А ведомость — это факт. Мы не можем спорить с фактами.</p><p class="p">— М-да, — сказал Владимир Ильич. Он все чаще произносил это междометие, выражавшее крайнюю степень усталого недоумения. — Так где же нам взять денег? Где их берут другие государства?</p><p class="p">— Ума не приложу, Владимир Ильич. А что до других государств — так они у нас их берут. Царское правительство назанимало прорву денег, и теперь приходится их возвращать.</p><p class="p">— Так давайте не будем возвращать! — сказал Ленин. «С какой стати я должен расплачиваться за дурака Николая!» — Объявите, что мы аннулируем обязательства по царским займам.</p><p class="p">Но денег все равно не хватало катастрофически... По-видимому, другие государства знали какой-то хитрый секрет.</p><p class="empty-line"/><p class="subtitle">3</p><p class="p">В начале марта один из агентов самого секретного подразделения ВЧК, которое занималось поисками волшебного кольца, сообщил Дзержинскому, что след искомого предмета, похоже, обнаружился в Москве. Агент, как и его коллеги, знал, что это кольцо очень важно для Советской власти. Больше ничего он знать не мог. Но на всякий случай, вытянув из агента информацию, Дзержинский его ликвидировал. Теперь нужно было самому перебраться поближе к кольцу. К тому же он помнил, что статуя его должна стоять на Лубянке; значит, и штаб ВЧК следует разместить именно там.</p><p class="p">— Владимир Ильич, я намерен перевести руководство Черного Креста в Москву. А здесь оставлю Урицкого.</p><p class="p">— Зачем это, Феликс Эдмундович? — подозрительно спросил Ленин. С одной стороны, он был бы счастлив избавиться от Железного Феликса, но с другой — выпускать его из поля зрения было опасно. «Уж не знаю зачем — но он определенно хочет удрать от меня, сволочь... Ну нет, не дождешься!»</p><p class="p">— Там много контрреволюционных элементов, — ответил Дзержинский.</p><p class="p">— С каких это пор вас интересуют контрреволюционные элементы? — усмехнулся Ленин. — Уж мы-то с вами знаем, чем на самом деле занимается ваша контора.</p><p class="p">— Да, конечно, — кивнул Дзержинский. Вообще-то он (как и Ленин, кстати сказать) порою стал забывать о том, что вся так называемая революция и вся так называемая советская власть существуют исключительно для прикрытия поисков волшебного кольца: государственная машина потихоньку пережевывала их обоих, и они уже не всегда различали сами, где реальность, а где спектакль, в котором они играют свои роли. — Но ежели контрреволюционные элементы нас свергнут — у нас не будет денег, необходимых для розысков кольца. А то и вовсе на каторге окажемся. Вы этого хотите?</p><p class="p">При слове «каторга» Ленин поежился. Он этого совсем не хотел. Но он уже придумал, как обвести Железного вокруг пальца.</p><p class="p">— Дорогой друг, — сказал он, — Советское правительство не может бросить вас одного там, где много контрреволюционных элементов. Они могут вас обидеть. Мы все поедем в Москву вместе с вами. Там и будет столица. — Он вздохнул: любил Петербург, а Москву терпеть не мог. «Но ведь это все временно, понарошку...»</p><p class="p">— Да зачем же вам утруждаться? Я и один справлюсь.</p><p class="p">— Нет-нет, Эдмундович, дорогой...</p><p class="p">И Советское правительство начало паковать чемоданы, готовясь к переезду в другую столицу. Дзержинский, впрочем, быстро смирился с этим. Он-то, напротив, ненавидел Петербург — столицу Романовых. При Рюриковичах никакого Петербурга и в помине не было.</p><p class="p">Да и все советские руководители были довольны, потому что в Москве было получше со снабжением. (Им не приходило в голову, что в Москве было лучше со снабжением потому, что их там не было.) Недоволен был один Зиновьев; он был в отчаянии, ломал руки и умолял не бросать его одного. Но постепенно и он успокоился, подумав, что теперь сможет завести в Петрограде любые порядки, какие ему вздумается, и если утирал слезы, прощаясь на вокзале с отъезжающими товарищами, то не от чистого сердца, а просто для приличия.</p><p class="empty-line"/><p class="p">За несколько дней до переезда Дзержинский наконец решился осуществить одно мероприятие, с которым по самому ему неясным причинам тянул достаточно долго. Речь шла о великом князе Михаиле, так подло обманувшем его доверие. И вообще с Романовыми нужно было что-то делать. Но он не хотел торопиться...</p><p class="p">— Надо бы, Ильич, ваших родственничков в какое-нибудь более безопасное место перевезти.</p><p class="p">— Я тоже об этом все время думаю, — сказал Ленин. — Пожалуй, в Европе им было бы неплохо... Или в Австралии... — И он поглядел на Железного Феликса почти просительно.</p><p class="p">Романовы были в его сердце страшной занозой. Он так и не видался с ними — не мог найти в себе сил, и как-то это выглядело бы неприлично... Нет, ежели б они сидели под арестом где-нибудь поблизости — тогда, конечно... Но Керенский еще в августе услал их в Тобольск. А Тобольск так далеко! И, по имевшейся информации, жилось им в этом Тобольске не так уже скверно. Ах, разумеется, все это были отговорки! Можно было уж как-нибудь выкроить время съездить в Тобольск. Но он не представлял себе, о чем и как с ними говорить. Ведь матушка Марья Федоровна — единственный человек, который понял и признал бы его, — жила за границей. А Николай, пожалуй, только разозлился бы и стал требовать, чтобы сводный брат вернул ему трон. А как можно вернуть трон человеку, который устроил Ходынку и сделал все, чтобы развалить вверенную ему страну? Паршивый человек был Николай, и царь он был прескверный. А уж сумасшедшая жена его! Нет, решительно Владимиру Ильичу не хотелось с ними знакомиться. «Вот только Алешка... Ну, потом как-нибудь».</p><p class="p">Михаил был, по слухам, симпатичным человеком и жил близко, в Гатчине, но на него Владимир Ильич был зол за его дурацкий, несвоевременный отказ от короны. «И что, что сказать ему при встрече? Что я езжу на его автомашине и мой шофер Гиль о ней безупречно заботится? Нет, надо отложить знакомство с родней до тех пор, пока не будет найдено кольцо и в России начнется наконец нормальная жизнь. А что нужно перевезти их всех в более безопасное место — это правильно. Хотя с какой стати Дзержинский вдруг озаботился их безопасностью? Ведь он их терпеть не может».</p><p class="p">— Вы не беспокойтесь, Эдмундович, — сказал он. — Я поручу это Свердлову. — Свердлов был хороший, исполнительный служака, он почитай что один тянул на себе всю повседневную работу по управлению государством, и Ленин просто не представлял, что бы делал без него.</p><p class="p">И, выпроводив Дзержинского под тем предлогом, что ему нужно укладывать чемоданы, он сел писать записку Свердлову. «Уважаемый Яков Михайлович! Пожалуйста, перевезите Романовых в какое-нибудь тихое, безопасное место. Например, в Е...» Он собирался написать «в Европу», но тут в кабинет к нему ворвался старый приятель Кржижановский с новыми увлекательными планами электрификации и с порога начал взахлеб тараторить; проект его был так интересен, что Ленин позабыл докончить записку и запечатал и отослал ее в таком виде, как она была.</p><p class="p">Получив записку, Свердлов крепко задумался. Ему не хотелось беспокоить Ленина по пустякам и спрашивать, что тот имел в виду. Он вышел из своего кабинета, чтобы покурить и подумать над этой загадочной запискою, и наткнулся на Дзержинского, случайно (так думал Свердлов) проходившего мимо. На самом же деле Феликс Эдмундович нарочно слонялся возле кабинета Свердлова, изнывая от желания узнать, что Ленин написал тому относительно своих родственничков.</p><p class="p">— Вы чем-то озабочены, Яков Михайлович? — спросил он, услужливо поднося Свердлову зажженную спичку.</p><p class="p">— Благодарю... Да вот, понимаете, Владимир Ильич прислал мне такое странное распоряжение... — И доверчивый Свердлов протянул Дзержинскому записку.</p><p class="p">— А! — радостно сказал Дзержинский, пробежав ее глазами. («Право же, мне несказанно везет, — подумал он, — судьба, как всегда, на моей стороне».) — Я уверен, он хотел написать «Екатеринбург». Но к нему ворвался Кржижановский, и он отвлекся. Вы уж его не тревожьте. Он очень занят этой своей электрификацией.</p><p class="p">— Екатеринбург? Вы так думаете?</p><p class="p">— Да, он при мне говорил неоднократно, что Урал — самое подходящее для них место. Там красивейшая природа и умеренный климат. Кстати, и Михаила Романова надо бы отправить на Урал, поближе к брату, чтоб они могли навещать друг друга. Например, в Пермь.</p><p class="p">— Спасибо за совет, — обрадовался Свердлов. — Я так и сделаю.</p><p class="empty-line"/><p class="p">Когда Ленин узнал, куда Свердлов отправил его родственников, он сперва разозлился ужасно и едва не прогнал Свердлова с должности председателя ВЦИК. Но потом подумал, что <strong>в </strong>этом была и его вина. Надо было докончить записку и вообще быть внимательнее в государственных делах. В конце концов, пусть Романовы покамест поживут на Урале, а потом... И он опять закрутился в вихре предотъездных дел.</p><p class="p">А дел было много; у него, непривычного к государственному управлению, просто голова пухла от них. Нужно было принимать послов, печников и прочие делегации, издавать декреты, проводить совещания и заседания, разбирать бесконечные жалобы и кляузы своих подчиненных друг на друга и при этом успевать как-то заботиться о подданных. Но он пока не успевал, утешая себя опять же тем, что все трудности — временные, происходящие от неопытности. Вообще роль председателя Совнаркома, так радовавшая поначалу, теперь угнетала его все больше. «Что ж, такова участь всех начинающих правителей. Тяжела ты, шапка Мономаха!» — думал он. Одна лишь электрификация радовала его. Там, на чертежах и схемах, все было красиво, чисто и ясно. А в жизни все было грязно и неуютно. Авось в Москве будет лучше.</p><p class="p">Поздним вечером накануне отъезда он сидел он в своем кабинете. Только что от него ушла большая делегация пензенских крестьян. Они принесли ему самогону, сала и яиц, и были очень дружелюбны и почтительны — он с трудом уговорил их не валиться на колени всякий раз, как он глядел на них, — но от них дурно пахло, и лаптями они нанесли огромные комья грязи и навоза. «На новом месте надо будет и порядки завести новые. Должны же соблюдаться какие-то приличия. Николай небось никого в лаптях к себе не пускал, и даже Петр Великий не пускал». Владимир Ильич отворил окно, чтобы проветрить. Мартовский воздух был холоден. Тогда он вышел из кабинета и стал бродить по коридорам — ему было грустно и хотелось поговорить с каким-нибудь прилично одетым и хорошо пахнущим человеком. Он ткнулся было к Свердлову, но тот сидел с молодым талантливым Бухариным, и оба они были по уши заняты какими-то чрезвычайно сложными экономическими выкладками. Бухарин был милейший парень, и они с Владимиром Ильичом бухали не раз, но сейчас Бухарину было не до Председателя Совнаркома. И Ленин побрел дальше...</p><p class="p">У кабинета с табличкой «Троцкий» он остановился. Странно, но ему иногда казалось, что если подкрасться к этому пустому кабинету незаметно и резко распахнуть дверь, то обнаружится, что за столом кто-то сидит... Он не решился заглянуть туда. Он только отвинтил табличку и положил ее в карман. Ведь в Москве у Троцкого тоже должен быть кабинет. Зачем же тратиться на новую табличку?</p><p class="p">Печальный и неприкаянный, он спустился в подвал, но там Дзержинский и Зиновьев, оба затянутые с ног до головы в черную кожу, в высоких сапогах, с хлыстами в руках допрашивали какого-то буржуя, подвешенного за руки и ноги к потолку. Ленин поморщился и скорей ушел прочь. Он не мог этого видеть, хотя понимал, что буржуи ему враги и с ними надо как-то бороться. Тяжела, ой как тяжела была шапка Мономаха!</p><p class="p">На новом месте все шло ничуть не лучше — в немалой степени из-за евреев. Ильич давно знал, что дела с ними можно делать только до определенного момента, и теперь этот момент, казалось, настал. Со всех окраин в Москву полезли молодые и не очень молодые аборигены местечек, стремясь занять хоть какой-нибудь пост при большевиках. Их мало волновало, что их оставшихся в местечках родичей беспорядочно и беспощадно резали всяческие атаманы; чем больше резали, тем больше они лезли, и чем больше лезли, тем больше резали. В столице все устраивались в разных учреждениях, которые что-то контролировали и распределяли, и чем меньше оставалось вещей, поддающихся контролю и распределению, тем больше объявлялось таких учреждений. Даже к Каменеву с Зиновьевым потянулись какие-то родственники из местечек, и те устраивали их, не в силах отказать — всякий знает, какими навязчивыми бывают еврейские родственники... Бывалые большевизаны, с которыми столько было выпито в цюрихских пивных, как-то сразу отдалились от своих русских товарищей, и у них завелись свои тайны. Теперь какой-нибудь Ларин, он же Лурье, запросто мог захлопнуть дверь перед носом зашедшего на огонек Ленина, оправдываясь через цепочку:</p><p class="p">— Уж извините, Ильич... Товарищ из провинции... особая секретность...</p><p class="p">Из под контроля начал выходить даже придуманный Троцкий. Уже многие говорили Ленину, что видели его на митингах:</p><p class="p">— Чернявый такой, с бородкой, в пенсне... Говорит как пишет, толпу с двух слов заговаривает так, что она в колонны строится и идет, куда он скажет... Просто волшебник... И решительный такой — через слово у него «расстрелять».</p><p class="p">Ленин удивился. У большевиков было немало ораторов, которые быстро убеждали построенных в колонны людей рассыпаться в толпу и кинуться грабить. С обратной реакцией он сталкивался впервые. Кем же был этот загадочный Троцкий? Сопоставив приметы, он понял наконец, о ком идет речь, и однажды после заседания Совнаркома припер Свердлова к стенке. Тот запирался недолго:</p><p class="p">— Да, Ильич, я взял на себя эту роль, — с достоинством признался он, сняв пенсне и протирая его бархоткой. — Моя фамилия ничего не значит для масс, а за Троцким могут пойти многие.</p><p class="p">— И куда же, батенька, вы хотите их вести? — осведомился Ленин, глядя на своего тихого, безотказного секретаря, за которым никогда раньше не замечалось ораторских талантов. Свердлов как-то изменился и даже, казалось, стал выше ростом; лицо его пылало вдохновением, черные глаза отливали сталью. На нем была кожаная куртка авиатора, входившая в моду — под Гатчиной чекисты нашли склад с большим запасом курток и тут же в них поголовно оделись. Авиаторам они все равно были ни к чему, поскольку революционные массы растащили все самолеты на дрова.</p><p class="p">— К победе социализма во всем мире, разумеется, — хладнокровно ответил Яков Михайлович.</p><p class="p">— Да бросьте! Мир от этого социализма побежит, как чорт от ладана, когда получше разглядит, что у нас творится. Война, разруха, людям жрать нечего.</p><p class="p">— А вас так волнует, что эти люди будут жрать? — Свердлов чуть понизил голос, в котором появились заговорщические нотки. — Слушайте, Ильич, вы же умный человек. Я вас всегда держал за одного из наших. Если бы возле вас не терлись эти личности... Луначарский, Богданов, этот ужасный Дзержинский...</p><p class="p">— Простите, Яша, кого это «наших»? Евреев, что ли?</p><p class="p">— Я долго присматривался к вам, — воскликнул Свердлов, и Ленин опять удивился: чего это его прорвало? Похоже, опять виновато то неизъяснимое доверие, какое он внушал людям. — Ваша деловая сметка, ум, чувство юмора... Я не мог ошибиться. Вы принадлежите к избранному народу!</p><p class="p">— Ну, положим... — осторожно проговорил Ильич. Он еще не знал, какие последствия может иметь этот разговор. Дела оборачивались так паршиво, что впереди вновь маячила эмиграция, а в ней поддержка вездесущего еврейства была бы весьма как кстати.</p><p class="p">— Я так и знал! — Свердлов даже слегка подпрыгнул, и Ильичу показалось, что он готов тут же на кремлевском паркете сплясать «семь сорок». — Вы будете с нами в той великой борьбе, что идет сейчас!</p><p class="p">— Конечно, с вами, — Ильич продолжал осторожничать. — Диктатура пролетариата и все такое...</p><p class="p">— Ай, оставьте эти сказочки для дураков, — Свердлов лукаво усмехнулся. — Мы-то знаем, чья это будет диктатура. Поклянитесь, что будете молчать до поры до времени, и я открою вам величайшую тайну. О ней знают только наши, — он сделал упор на последнем слове, и Ильичу стало любопытно, хотя весь поворот беседы ему решительно не нравился.</p><p class="p">— Клянусь, натурально, — сказал он как можно небрежнее. — Так что у вас за тайна?</p><p class="p">— Эта история восходит к одному древнему пророчеству, — теперь голос Свердлова стал торжественным и даже слегка напевным. — Возможно, вы помните из гимназического курса о хазарах?</p><p class="p">— Как же, как же! Неразумные хазары! Позвольте, они, кажется, были иудеями?</p><p class="p">На губах Свердлова появилась горькая усмешка:</p><p class="p">— Сколь многие из нас в погоне за золотым тельцом забывают о славном прошлом своего народа! Да, хазары — те десять колен Израиля, что рассеялись после гибели храма. Они пришли на эту землю раньше русских и раньше дикарей-татар, с которыми их почему-то роднят гойские историки. С собой они принесли бесценный дар — золотой перстень царя Соломона, тот самый, что умел укрощать духов зла. Тот, кто владел им, владел и землей, на которой жил. Много веков перстень был вделан в спинку трона хазарских каганов-священников, и никто не мог противиться их власти. Закон Моисея правил тогда на берегах Волги, а дикие русские племена в страхе глядели из своих лесов на сияющие хазарские города. Но сказал Господь: «Отниму Я силу у народа Моего, чтобы испытать любовь его ко Мне». Так и случилось: орды русских варваров ворвались в хазарскую столицу Итиль, и князь Святослав своей рукой убил последнего когена и вырвал из его трона драгоценный перстень. И оказался перстень Соломона у русских князей, — скорбно продолжал Свердлов, напомнив в эту минуту потрясенному Ильичу старую Алену Родионовну. Он сразу понял, о каком кольце идет речь, и нетерпеливо ждал продолжения. — Как никчемная безделушка, он пылился в их сокровищнице и хранил их власть. Совет мудрейших не раз посылал на Русь верных людей, чтобы они похитили перстень, но все они гибли от рук гоев. Один из них, не выдержав пыток, открыл Иоанну Грозному тайну перстня, и тот извлек его из сокровищницы, и хранил как зеницу ока, и переправил на нем надпись еврейским письмом на русскую. А когда почуял близость смерти, отдал перстень любимому сыну Дмитрию. Того не убили в Угличе, как пишут дурацкие русские учебники, — он увез с собой перстень в Польшу, где его увидел великий рабби Лёв, создавший глиняного Голема на страх гоям. Он сразу узнал перстень и рассказал о нем Дмитрию, поскольку увидел в нем человека полезного. Отпуская его в Россию, рабби Лёв отправил с ним любимого своего ученика Менделя, которого за остроту ума поляки прозвали «Свердло» — по-русски, стало быть, «сверло». И стал Дмитрий царем в Москве, а Мендель помогал ему советами и надзирал за перстнем, чтобы дождался он законного владельца из народа Израиля. Но Дмитрия предательски убили, а перстень, что он носил на шее, забрали, и он снова стал бесполезной игрушкой в царском дворце. И все эти годы потомки Менделя Свердла были рядом и ждали возможности завладеть реликвией...</p><p class="p">Так вот оно что — и этот хочет на трон! Ленин ни минуты не сомневался, что рабби Лёва, или как там его, отправил на Русь будущего иудейского царя, который должен был увести колечко у доверчивого Дмитрия. Быть может, он и прикончил сыночка Грозного, да по еврейской привычке поторопился и не смог довести дело до конца. И теперь его потомок решил поправить промашку...</p><p class="p">Безошибочным чутьем Ильич понял, что ходит по лезвию ножа, и решил не давать вида, что столь многое понял.</p><p class="p">— А вы, как я понимаю, из этих потомков? — осторожно спросил он. — И теперь хотите получить назад перстень?</p><p class="p">— Не только перстень, Ильич, но и власть над Россией! Эта страна должна принадлежать не тупым и ленивым славянам, а тем, кто когда-то ее основал. Известно ли вам, что Русь названа именем иудейского князя Роша, а Москва — его сына Мешеха?</p><p class="p">Ленин пожал плечами. В гимназии он учил историю не слишком усердно (были занятия повеселее), и вся эта древняя белиберда порядком ему наскучила. Он знал только одно: всякий раз, когда евреи, русские, немцы или кто угодно еще начинали рассуждать о величии своего народа и исконных правах на какие-либо земли, следовало ждать большой крови. Однако нужно было выяснить планы этого кандидата в цари.</p><p class="p">— Но что же делать с русскими и прочими пролетариями? — осведомился он.</p><p class="p">Свердлов опять подпрыгнул на месте, будто ждал именно этого вопроса:</p><p class="p">— Господь сказал: «Пасите их жезлом железным». Тех, кто взбунтуется, ждет кара, а остальные будут работать, как прежде. Работать на избранный народ. Открою вам еще одну тайну: рабби Лёв передал моему предку великий секрет изготовления Голема. Наши ученые уже делают глиняных воинов, которые бесстрашно идут в атаку на белые отряды. На лбу у них шапка с пентаграммой, что дает им силу, и такие же шапки для конспирации выданы всем бойцам Красной Армии. Хотя они, конечно, не големы... пока.</p><p class="p">— А перстень? Перстень вы нашли? — Ленин, как ни берегся, не смог удержаться от главного вопроса.</p><p class="p">— Пока еще нет, — Свердлов извиняюще развел руками. — Мы ищем его с первого дня переворота, перерыли все сейфы, все тайники... Но в этом свинском русском хаосе может пропасть все что угодно. Какая ирония — при царях ему ничто не угрожало, а теперь, когда наша власть так близка...</p><p class="p">— Постойте, батенька, — перебил его Ленин, — а мне вы какую роль отводите при вашей власти?</p><p class="p">Свердлов замялся:</p><p class="p">— Н-ну, вы, как человек деловой и знающий эту страну, могли бы быть очень полезны. Внешняя торговля... отношения с другими странами. Далеко не все примут с восторгом возрожденный Израиль — нас особенно беспокоит Германия... Вы могли бы оставить за собой пост премьер-министра.</p><p class="p">— А если я откажусь? — лукаво прищурясь, спросил Ленин.</p><p class="p">— Будет очень жаль, — черные как угли глаза Свердлова смотрели так же искренне. — Тогда можете взять сколько угодно ценностей из царской казны — они в полном моем распоряжении — и уехать за границу. Боюсь, Россия в ближайшие годы будет не слишком приятным местом... для тех, кто не с нами.</p><p class="p">«Ага, уеду, — подумал Ленин, — в первую речку с камнем на шее. Это не Романовы, чикаться не будут. Но как неожиданно! Я-то думал, они хотят только гешефт сделать. А они уже везде — и здесь, и у Эдмундыча в ЧеКа».</p><p class="p">В «Черном Кресте» и правда появилось немало евреев — в основном дружки Урицкого из одесских бандитов, но были и хилые юнцы, вышедшие явно прямиком из хедера. Стреляли они кто в лес, кто по дрова, поэтому под Москвой для них открыли специальные курсы «Выстрел». По слухам, тренировались они на живых мишенях, но в палачестве не усердствовали, а все больше ездили по дворцам и усадьбам, оставшимся без хозяев, и что-то искали. Теперь Ленин понял, что именно, и его всегдашнее расположение к евреям сильно убавилось. Каковы гуси, а? Знал бы этот местечковый Наполеон, что в нем нет еврейской крови, — пожалуй, отправил бы в распыл вместе со всеми. Нет, недаром Коба их не любит...</p><p class="p">Впервые в жизни проникшись общим чувством с кровожадным идиотом, Ленин ужаснулся сам себе.</p><p class="p">— А за границей, — спросил он, — там тоже ваши люди?</p><p class="p">— Конечно! — не задумываясь, воскликнул Свердлов. — Россия — слабое звено в цепи гойских империй, потому именно с нее начнется восстановление Великого Израиля. Но за ней последуют другие. Недавно я побывал в Америке — не скрою, под именем Троцкого, — и встретил там полное понимание. Сейчас там мой брат Беня, очень способный мальчик. Но не все готовы бороться за общее дело. Другой мой брат, Зиновий, связался с вашим Горьким, и тот забил ему голову своим русофильским бредом. Потом увлекся какой-то кокоткой и отрекся ради нее от веры отцов — и это Свердлов, какой позор! Его предали проклятью, старинному и страшному, от которого нет спасения. Так будет со всеми, кто встанет на нашем пути, — последние слова прозвучали почти угрожающе.</p><p class="p">Ленин кое-как свернул разговор, надавал Свердлову неопределенных авансов и с облегчением отбыл домой. Социализм уже сам по себе был достаточно гадок, но возможное царство этих фанатиков внушало настоящий ужас. Не нравилось ему и то, что они уже начали подбивать одуревшие от водки и кокаина революционные массы на разорение церквей. К религии Ленин был равнодушен, но ему нравились тепло-золотое нутро храмов и жарко горящие свечки, вызывавшие в памяти что-то детское и праздничное. А как хорошо было в пасхальную ночь расцеловать какую-нибудь симпатичную мещаночку или под шумок позволить себе еще большие вольности! Ему не хотелось отказываться от этого привычного и родного Бога ради непонятного и жестокого Бога еврейского.</p><p class="p">Но хуже всего было появление нового претендента на трон. Где же, чорт побери, проклятое кольцо? Того и гляди, полезут татары и сарты с преданием об утерянном перстне хана Батыя, а за ними и другие не замедлят... Так и вовсе державу по кускам растащат — и какая тогда коммерция, какая свобода торговли?</p><p class="empty-line"/><p class="subtitle">4</p><p class="p">В чудесном месяце мае по Москве ходил человек в красных гетрах. Это был известный террорист Борис Савинков, ненавидевший большевиков. Дзержинский в свою бытность эсером отлично знал Савинкова. Он был опасный человек, совершенно бесстрашный и неуловимый. О нем ходили легенды: то его кто-то видел загримированным стариком, то он шел без грима среди бела дня по людной улице с папиросой в зубах. Савинков готовил вооруженное восстание и намеревался убивать советских руководителей, но это было не главное. Главное было то, что именно Савинков в данный момент владел волшебным кольцом.</p><p class="p">Об этом Дзержинский услыхал несколько дней тому назад, когда к его заместителю Петерсу пришла некая девица — сестра милосердия из госпиталя Покровской общины — и рассказала, что находившийся там на излечении и влюбленный в нее юнкер Иванов под секретом сообщил ей, что в Москве существует тайная антикоммунистическая организация под названием «Союз защиты родины и свободы», что скоро будет ее выступление, которое начнется восстанием и расправой с латышскими стрелками и чекистскими отрядами, и что он, влюбленный юнкер Иванов, не просит, а умоляет ее на это время уехать из Москвы. Дзержинский заинтересовался этим делом — кольцо кольцом, а заговоры, тем более направленные непосредственно против «Черного Креста», его тоже не могли не беспокоить — и, отодвинув Петерса, затребовал милосердную сестричку к себе.</p><p class="p">— Расскажите мне, что еще вам говорил этот юнкер.</p><p class="p">— Ах, он такой гадкий. — Девушка кокетливо поправила косынку. — Он ко мне приставал. Вообразите, товарищ Дзержинский, он меня...</p><p class="p">— ВЧК это не интересует, — прервал ее Феликс Эдмундович. «О женщины, мерзкие, гнусные твари, предательницы! И как из прелестных невинных малышек вырастают такие гадины?» — Что он вам говорил о тайной организации?</p><p class="p">— Они хотят вас убить. А вы симпатичный...</p><p class="p">— Польщен. — Он наклонил голову. — Но продолжайте же. Кто ими руководит? Называл вам юнкер Иванов имя и приметы этого человека?</p><p class="p">— Какой-то мужчина. Юнкер Иванов не знает, как его зовут. И не знает, как он выглядит — он все время выглядит по-разному. Но он носит красные гетры.</p><p class="p">«Савинков», — понял Феликс Эдмундович. Больше во всей России красных гетр никто не носил.</p><p class="p">— И у него на руке кольцо.</p><p class="p">— Милая моя, это не примета. Кольцо можно снять.</p><p class="p">— Да, но этот человек никогда его не снимает. Это не простое кольцо. Говорят, оно волшебное. Оно помогает ему прятаться от вас Оно досталось ему от какого-то убитого матроса.</p><p class="p">— Значит, матросу оно не помогло, — с усмешкой сказал Дзержинский.</p><p class="p">«Неужели — ОНО? И неужели оно дает какую-то часть своей силы любому, кто наденет его, а не только потомку Иоанна Грозного? Ведь Савинков и вправду неуловим. Какую же силу даст оно МНЕ!» И он, поблагодарив медсестру и расстреляв ее, приказал Петерсу установить слежку за не в меру болтливым юнкером Ивановым.</p><p class="empty-line"/><p class="p">Когда-то давно, во времена незабвенного Азефа, Савинков был Дзержинскому по душе: Железный Феликс любил террористов. Но Савинков был человек путаный и непредсказуемый: то он за революцию, то против... И книжки он писал слезливые: персонажи их все мучились сомнениями да рассуждали, можно ли убивать, нельзя ли... Дзержинского это удивляло. Убивать было можно во всех случаях, когда это было нужно. Только глупец может терзаться по таким ничтожным поводам. Так, у Феликса Эдмундовича были целых две причины ликвидировать Савинкова: антисоветский заговор и волшебное кольцо. Какие могут быть сомненья? Дзержинский допускал, конечно, что кольцо Савинкова может оказаться совсем не тем кольцом, но заговор-то уж наверняка был настоящий.</p><p class="p">Однако была еще и третья причина, по которой нужно было казнить Савинкова: Феликс Эдмундович был в чудесном месяце мае очень зол и в дурном настроении, и ему безумно хотелось казнить хоть кого-нибудь. Причиной же этого дурного настроения был состоявшийся первого мая допрос Пуришкевича...</p><p class="p">— Вот мы и свиделись, Владимир Митрофанович!</p><p class="p">С этими словами Дзержинский взял в руки скальпель и посмотрел на Пуришкевича очень выразительно. Пуришкевич был посажен в тюрьму еще Керенским, но у Феликса Эдмундовича в революционной суматохе все руки не доходили им заняться. Расправу же над ненавистным Юсуповым он сознательно откладывал на потом, когда удастся протащить через Совнарком или ВЦИК распоряжение о публичной порке кнутом и сажании на кол. (Зиновьев давно был «за», но другие противились из буржуазного чистоплюйства.)</p><p class="p">— Да, князь Юсупов оказался прав, — сказал Пуришкевич, не обнаруживая никаких признаков волнения. — Вы сделали неплохую карьеру, пан Станислав... то бишь пан Феликс.</p><p class="p">— Надеюсь, вы понимаете, что находитесь в полной моей власти?</p><p class="p">— Отнюдь, — усмехнулся Пуришкевич. — Вспомните о фотоснимках! Лев революции, председатель ВЧК, самый мужественный человек в России — переодетый девкою, в объятиях лысого старика! Вы сделаетесь посмешищем, в сто раз хуже Керенского! — И он сардонически расхохотался.</p><p class="p">— Ни один человек не может выдержать пыток, — прошипел Дзержинский, побелев от гнева. — Вам будут загонять иголки под ногти, избивать дубинками до тех пор, пока вы не скажете, где находятся фотографии. — Он блефовал: в либеральной Москве, где заправляли буржуазный Ленин и мягкотелый Каменев, пытки считались не comme il faut. Но Пуришкевич-то мог об этом и не знать.</p><p class="p">— Сказать-то я, может, и скажу, — отвечал невозмутимый Пуришкевич, — плоть слаба... Но, право же, вы нас недооценили. Негативы давно переправлены в Лондон.</p><p class="p">— В Лондон! — вскричал Дзержинский. Лондон был тем проклятым, ненавистным городом, убежищем дьявола, над которым большевики никогда не имели власти.</p><p class="p">— А князь Юсупов, пока вы тут занимались обустройством на новом месте, тайно уехал из Питера в Париж, — добил его Пуришкевич. — У нас с ним уговор: если со мной что-нибудь случится — он тотчас через своего поверенного распорядится опубликовать эти снимки во всех газетах. Так что уж отпустите меня по-хорошему. В этом случае я останусь верен слову и в мемуарах не упомяну о вашей роли в <em>том дельце. </em>И о снимках, конечно, — прибавил он. — Да, и еще одна мелочь... Вы уж, будьте так любезны, скажите там вашему петербургскому наместнику, чтобы не допускал во дворце Юсуповых беспорядка. Чтоб ни одной занавесочки не пропало. Феликс Феликсович может рассердиться.</p><p class="p">И несчастный Феликс Эдмундович был вынужден не только смириться с побегом Феликса Феликсовича и просить Зиновьева, чтоб юсуповский дворец не ломали и не грабили, но и освободить Пуришкевича. Петерсу он велел говорить, что Пуришкевич при допросах показал себя очень интересным и симпатичным человеком, заслужившим свободу. Никто не верил в это, и все страшно удивлялись. А Пуришкевич уехал в Ростов-на-Дону и там, обнаглев от безнаказанности, стал издавать антибольшевицкую газету, а также написал мемуары о Распутине и заработал на них массу денег. Дзержинский, обмирая от ненависти, тем не менее делал все, чтобы ни единый волосок не упал с его лысой головы. (Когда Пуришкевич умер естественной смертью, Феликс Эдмундович некоторое время в ужасе ожидал, что князь Юсупов выполнит свою угрозу и опубликует снимки, но тот почему-то этого не сделал... во всяком случае, пока.) Так что вполне понятно, отчего у Феликса Эдмундовича в мае восемнадцатого года было плохое настроение и он торопил Петерса с делом «Союза».</p><p class="p">Вскоре Петерс обнаружил, что юнкер Иванов часто заходит в дом № 3, в кв. 9, в Малом Левшинском переулке, где собирается много неизвестного народу. Там была конспиративная квартира «Союза Защиты Родины и Свободы» — резиденция одного из заговорщиков, полковника Жданова. Судя по тому, что все эти люди ходили с ног до головы увешанные револьверами и бомбами, это были террористы. Так Петерс и доложил своему шефу.</p><p class="p">— <em>Международные</em> террористы, — с нажимом сказал Феликс Эдмундович.</p><p class="p">— Почему это?</p><p class="p">— Все они финансируются английской, французской, американской, немецкой и японской разведками. Это политика, друг мой.</p><p class="p">Петерс был тугодум и ни о какой политике не имел понятия. Но он просмотрел список людей, посещавших тайную квартиру. Среди них были и поляк Ильвовский, и латышский стрелок Ян Бредис, и еврейский адвокат Виленкин, ставший офицером, и два татарина, и даже некий безымянный негр (как потом выяснилось, это был трубочист-чухонец, приходивший прочистить камин). Поистине организация была международная и очень страшная.</p><p class="p">И 29 мая, около двух часов дня, отряд чекистов во главе с Петерсом на грузовиках выехал в Малый Левшинский. Петерс постучал условным стуком, который узнал от медсестры. А в это время разномастные члены «Союза» играли в шахматы. Бедняги, они не подозревали, что их партия уже проиграна. Как легкомысленны они были, как доверялись кому ни попадя! Они держали секретную переписку и адреса всех квартир и явок прямо в столах, а из-под кровати чекисты извлекли нитроглицерин. Заговорщики даже не оказали сопротивления. И простодушный юнкер Иванов так и не понял, кто их выдал. Быть может, он постепенно догадался бы об этом, если б ему дали пожить еще хоть немножко.</p><p class="p">Прочтя секретные бумаги заговорщиков, Петерс доложил Дзержинскому, что их главный штаб находится в Молочном переулке, под видом лечебницы; там-то и живет или, по крайней мере, бывает главарь заговора — неуловимый Савинков. Нужно было брать его не откладывая, пока он не знает об аресте своих товарищей. Дзержинский, конечно, предпочел бы сделать это самолично, но случилась загвоздка: ему необходимо было делать доклад на коллегии Совнаркома, так что он вынужден был отправить на операцию Петерса. Впрочем, это было не страшно: ведь он объяснил Петерсу, как выглядит Савинков. Он предусмотрел все. Он не мог только предвидеть, что в час, назначенный для захвата Савинкова, у того будет посетитель...</p><p class="p">— Ах, Борис Викторович, вы не представляете, как приятно поговорить с интеллигентным человеком!</p><p class="p">— Н-да... — сквозь зубы процедил Савинков: похоже, он не склонен был считать своего гостя интеллигентным человеком. Во время беседы он расхаживал по комнате, как запертый в клетку тигр, то и дело поглядывая в окно.</p><p class="p">— Я всегда восторгался вашими произведениями.</p><p class="p">— Послушайте, как вас там...</p><p class="p">— Анатолий Васильевич.</p><p class="p">— А, да... Г-н Луначарский, а как вы, собственно, узнали, что я тут живу?</p><p class="p">— Так ведь у вашего подъезда круглыми сутками дежурят толпы курсисток и держат в руках ваши книги. Они мечтают об автографе.</p><p class="p">— Что вы говорите! — удивился Савинков. Он еще раз выглянул в окно: действительно, курсистки стояли толпой, кричали «Борис, Борис!» и махали букетами. «Пожалуй, придется сменить квартиру», — подумал он. — Ну хорошо, а вам чего от меня нужно?</p><p class="p">— Так вот же. — Луначарский протянул ему экземпляр «Коня бледного» на французском языке. — Я собираю автографы. И еще я хотел просить... быть может, вы согласитесь послушать мою новую революционную пьесу?</p><p class="p">— А вы что — пишете?</p><p class="p">— Да, мараю бумагу понемножку, — смущенно отвечал Луначарский, — пробую свои силы, знаете, то в одном, то в другом жанре... А вы разве меня не читали?</p><p class="p">— Не читал, — буркнул Савинков. — И не собираюсь. — Он опять посмотрел через занавеску на улицу. К подъезду приближались несколько угрюмых латышей в кожаных куртках. «А это меня арестовывать идут», — догадался он. И в мозгу его в мгновение ока родился план.</p><p class="p">— Уважаемый Анатолий Васильевич, — произнес он, приближаясь к гостю и приставляя к его виску револьвер, — будьте любезны сейчас сделать то, что я вам скажу...</p><p class="empty-line"/><p class="p">Люди в кожаных куртках, рассредоточившись, оцепили подъезд; они уже готовы были ворваться внутрь, когда дверь распахнулась и из нее быстрым упругим шагом вышел стройный мужчина с русой бородкой несколько козлиного фасона и револьвером в руке.</p><p class="p">— Скорей идите туда! — крикнул он. — Я его уже обезоружил.</p><p class="p">— Слушаюсь, Феликс Эдмундович, — отвечал Петерс.</p><p class="p">И латыши бросились вверх по лестнице. А стройный человек, замешавшись в толпу курсисток, уже стащил с себя козлиную бородку и пару секунд спустя, облаченный в дамскую юбку и жакетку, держа под мышкой томик своих произведений, все тем же ладным упругим шагом шел по улице...</p><p class="p">— Вы арестованы! — закричал Петерс, набросившись на человека в красных гетрах и с кольцом на пальце и заламывая ему руки...</p><p class="empty-line"/><p class="p">— Вы кретин, — говорил Дзержинский два часа спустя. — Я вас расстреляю.</p><p class="p">— Но, Феликс Эдмундович, он же был в красных гетрах... И кольцо...</p><p class="p">— К чорту кольцо! — Дзержинский в сердцах швырнул на пол массивную позолоченную побрякушку. Он был в отчаянии — не столько из-за того, что Савинков опять ускользнул, но из-за того, что след оказался ложным. «Где же, где же ОНО? Быть может, уж и не в Москве...» Одно лишь грело душу: болвана Луначарского успели избить так основательно, что в течение нескольких ближайших недель он не будет ни к кому приставать со своими революционными пьесами. «А с Савинковым я рано или поздно еще встречусь, и тогда мы поквитаемся...» — Так и быть, — мрачно сказал он Петерсу, — пока я вас пощажу.</p><p class="p">Но он, конечно же, не пощадил тех, других. Они все умерли: латыш Бредис, расстрелянный латышскими стрелками; жид Виленкин, русский корнет Лопухин и остальные международные террористы. Отчаянный Савинков дважды пытался освободить их, и один раз дело почти удалось: на черном воронке, с подложным ордером на выдачу арестованных он подъехал к воротам Таганской тюрьмы, и их уже вывели из камер, но в последний миг начальник тюрьмы что-то заподозрил, и все сорвалось: они умерли, умерли все, и Савинкова столкнут с тюремной лестницы в назначенный час: лев революции не прощает обид.</p><p class="empty-line"/><p class="p">Но пока что, летом восемнадцатого, все складывалось прескверно: и Пуришкевич пописывал свои гадкие статейки и дразнился, и Савинков был жив-здоров и чуть не каждую неделю организовывал в каком-нибудь городе или стране новый заговор, и висела над Феликсом Эдмундовичем еще одна страшная угроза... А все Брестский мир, будь он неладен!</p></span>
