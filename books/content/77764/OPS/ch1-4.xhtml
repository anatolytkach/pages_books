<span><p class="p">Пусть недуги, раздоры и смерть неотступно преследуют их; пусть не ведают они процветанья в делах, пусть гибнут в полях их посевы и скот их подыхает от бескормицы и жажды; пусть ураган срывает кровли с их домов, пусть громы, молнии и ливни врываются в их жилища; пусть солнце не дарует им тепла, а только иссушает их и опаляет зноем; пусть луна не дарует им благостного покоя, а только глумится над ними и отнимает последние крохи рассудка! Пусть режут, и колют, и рубят, и травят они друг друга, не ведая пощады; пусть брат идет на брата, жена убивает мужа, а сын отца; пусть предательство друзей лишает их силы и власти, золота и серебра; пусть враги сокрушают их! Заклинаю: да позабудут их уста сладость человеческой речи, пусть языки их окостенеют, и пусть воцарится на их земле запустение, пусть веками свирепствуют мор и смерть!</p><p class="p">Как пала кара на голову вора Шуйского, что заточен ныне, как и я, в темницу своими же сообщниками и насильно пострижен, так падет кара и на род воровских царей Романовых; с Михаила началось — Михаилом кончится; а когда падет последний в роду — на том кончится и подлая эта страна, и рассыплется в руины, и никогда не подымется. Да будет так!»</p><p class="p">«Нет ли какого способа избежать твоего проклятья?» — спросил посол. Страх и насмешка мешались в его голосе: брань и угрозы безумной женщины не должны были тронуть его сердца, но в народе ходили слухи, будто Марина владеет черным колдовством и ночами, обернувшись сорокой, покидает темницу и летает над Москвой, и в доме, на чью крышу она присядет, начинаются мор, и смерть, и пожар, и другие несчастья.</p><p class="p">«Один есть способ, песий сын, — отвечала Марина, — вернуть кольцо и трон законным владельцам. Пусть тот Михаил, что последним должен будет взойти на престол, доброю волей от него откажется и передаст власть потомку моего сына, законного царя Иоанна Дмитриевича. А уж тому решать — очистить от проклятья всю вашу страну или еще пуще ввергнуть ее в пучину несчастий». «Не бывать по-твоему, — возразил полуцарский посол, — не быть больше Москве под ляшьей властью. Колечко надежно спрятано в палатах царских. А пащенка твоего намедни удавили веревкой».</p><p class="p">Но это была ложь. Марина смолчала, сжав губы: она-то знала, что, как когда-то отец его Димитрий, младенец Иоанн избежал смерти. Ей ли не знать, когда она сама еще в Астрахани тайно препоручила свое дитя заботам одного из приближенных — бедного, но честного польского шляхтича Дзержинского, — а с собою, зная жестокость московитов, нарочно всюду возила чужого ребенка!.. Спас Иоанна благородный шляхтич, и воспитал, и дал ему свое имя, и женил на дочери другого благородного шляхтича. Продолжил Иоанн-Януш род Дзержинских, в чьих жилах теперь мешалась кровь ясновельможных польских дворян с кровью последнего Рюриковича.</p><p class="p">Марину задушили, а проклятье осталось. Авантюристы, сыноубийцы, развратницы, мужеубийцы, отцеубийцы сменяли один другого на троне с завидным постоянством, а грубую, дикую и холодную их страну продолжали раздирать мор, глад и ненависть. Петр пытался избавиться от проклятия: построил на гнилом болоте желтый липкий город и престол туда перенес, думая, что таким образом избавит державу от бед, но проклятие последовало за ним. Тюрьма народов, грязь, вонь, жестокость... А постоянные браки с немцами (еще одна холодная, наглая и тупая нация, этим двум народам дай только волю — камня на камне б от Европы не оставили; Феликса и из гимназии-то исключили именно за то, что прилюдно дал пощечину учителю-немцу, позволившему себе оскорбительное высказывание в адрес польского дворянства) лишь добавляли правящей династии омерзительной вульгарности и ненависти ко всему свободному, смелому и здоровому. Все больше жестоких и неправедных войн вели они, и все росло ленивое, немытое, прожорливое, завистливое чудовище с рабскою, липкой, женской душой; не орел — курица жирная о двух головах!</p><p class="p">Теперь долг Феликса — сделать все, чтобы проклятье Марины исполнилось до конца. Нужно, угрожая революцией, заставить великого князя Михаила отказаться от престола (которого, впрочем, тому еще никто и не предлагает) и успеть взять из рук последнего Романова не только державу и скипетр, но и самое главное — волшебное кольцо, что хранится в императорском дворце, передаваясь тайно от одного вора-самодержца к другому. Жаль, неизвестно, как это кольцо выглядит; зато достоверно известна надпись, что сделана на его внутренней стороне...</p><p class="p">Пусть дураки, которых Феликс пока находит нужным использовать, до поры до времени верят в диктатуру пролетариата, пусть стараются... Впрочем, социал-демократы были всего лишь запасным вариантом — на случай, если почему-либо вдруг провалится первый, более радикальный и быстрый... В любом случае промежуточный итог один: Михаил окажется на троне. (Ведь Николай Романов, благодарение Господу, неспособен породить наследника.) А потом уж, разобравшись так или иначе с Мишей, новый правитель позаботится об этой стране. Да-да, позаботится, восстановит справедливость: навек отдаст грязную Московию под власть Речи Посполитой! Огнем и мечом очистит ее, огнем и мечом, как его великий предок, грозный сын Елены Глинской! (Лишь дети спасутся, невинные дети...) Недаром мать Феликса тоже зовут Еленой... Это — знак. Он на верном пути.</p><p class="empty-line"/><p class="p">Однако пора было начинать новый день. Из соображений безопасности Дзержинский не держал домашней прислуги; он сам тщательно застелил постель, облачился в халат, отправился в ванную. Конечно, ванной революционеру-подпольщику, недавно бежавшему с царской каторги, не полагалось, как, впрочем, и комфортабельной квартиры; но правила существуют для всех, кроме того, кто эти правила устанавливает. В беседах с «товарищами» он всегда отзывался о буржуазных удобствах с презрением и был в этом почти искренен: что такое был этот умеренный, робкий комфорт по сравнению с роскошью царских палат, которая ждала его впереди?</p><p class="p">Его утренний туалет, как правило, совершался не менее часа: с детских лет был по-кошачьи чистоплотен, а с годами страсть к чистоте сделалась несколько маниакальной. Во всем должна быть чистота, чтоб ни капли крови, ни пятнышка. Чистые руки, горячее сердце, холодная голова... Мыло на умывальнике было бледно-лиловое, пахнущее фиалкой. Щетки для волос — из серебра. С наслаждением он погрузился в наполненную ванну. Лежал в воде, размышляя о делах предстоящего дня, и горячий пар обволакивал его. Он был в восторге от формы пальцев на руках и ногах — их изящное совершенство лишний раз свидетельствовало об аристократизме и знатности происхождения, — но в общем вид собственного обнаженного тела не вызывал в нем ни удовольствия, ни неудовольствия. Это было удобное тело — выносливое, мало нуждающееся в пище, умевшее сдерживать свои желания и, что было наиболее ценно, — благодаря своей сухощавой стройности и гибкости идеально пригодное для того, чтобы с легкостью принимать чужие обличья. С помощью грима, накладных бородок и париков он в считанные минуты мог превратиться в кого угодно: этого требовала жизнь нелегала, которую он вел, но это также отвечало его глубокой внутренней потребности в лицедействе.</p><p class="p">Приняв ванну, он побрился, оделся, сбрызнул себя французской душистой водой, застегнул на все пуговицы сюртук. С брезгливым презрением вспомнил о наглом, рыжем, картавом человечке. «Принимает ли тот когда-нибудь ванну? А эти манеры — шут, ярмарочный зазывала! Да, и с такими кадрами приходится работать... Что ж, плевать на его манеры. Лишь бы этот бойкий коммерсант оказался удачлив в добывании денег для партии. Перефразируя Лойолу: каждый революционер должен быть подобен трупу в руках вышестоящего начальника...»</p><p class="p">Первая половина дня прошла как обычно: встречи с партийными товарищами, споры, разговоры... Дзержинский не любил этих бесплодных дискуссий, предпочитая появляться молча и приказывать тайно, но — иногда приходится делать то, чего от него ждут. Еще одно правило иезуита: улыбайся... Обед в дешевой кофейне, заседания, совещания... Обычно его улыбка больше напоминала удар кинжалом, но в этот день он улыбался мягче обычного, терпеливо-снисходительно выслушивая вздор, что несли его соратники, поскольку предвкушал два небольших удовольствия, которые позволит себе нынче вечером...</p><p class="p">Около полуночи он, завернувшись в широкий плащ, стоял у ворот небольшого особняка, куда приходил регулярно в последние несколько лет. На стук молоточка вышел лысый пожилой лакей, с поклоном проводил его в гостиную. Граммофон играл похоронный марш Шопена. Медиум и собратья уже ждали его. Их было немного: Лондон кишел спиритическими кружками, но он не нуждался в большом обществе и не желал, чтоб его общение с бесплотным миром становилось предметом обсуждения досужих сплетников. Его партнеры — пожилой немецкий банкир, сумасшедшая старая дева-англичанка и остальные в том же духе — были молчаливы и нелюбопытны.</p><p class="p">Горничная обнесла гостей жиденьким сладким чаем. Угощения к чаю не полагалось. Вошла хозяйка дома — медиум, худая мрачная женщина в черном шелковом платье. Она называла себя m-lle Лия; Дзержинский знал отлично, что она вдова лондонского мясника по фамилии Джонс, но все это не имело значения: двери в тонкий мир открываются лишь избранным, и не важно, чье тело и чьи голосовые связки послужат проводником и отмычкой. Он и сам обладал неплохими медиумическими способностями, это проявилось еще в отрочестве — вся его напряженная, наэлектризованная душа была словно создана для бесстрашного проникновения в иные миры — но медиуму, к сожалению, не дано слышать и помнить того, что в трансе произносят его губы; медиум — глухое и слепое орудие, а Дзержинский не любил быть орудием в чужих руках, предпочитая использовать других людей — всех, кто попадался на пути.</p><p class="p">В этот вечер у него было к духам несколько практических вопросов. В частности, ему хотелось услышать какую-либо информацию относительно Ленина: можно ли хоть немного доверять этому балаганному буржуа, или же следует остеречься. Нет, он, разумеется, в решениях руководствовался собственным интеллектом, но не отрицал, что и духи могут дать неплохой совет. Нужно только знать — кого и о чем спрашивать. Хотя в революционных кругах над спиритизмом было принято смеяться, Дзержинский знал (благодаря разветвленной агентурной сети он знал все), что многие «товарищи» пробовали общаться с душами умерших революционеров прошлого, надеясь, что те укажут им правильный путь и остерегут от ошибок. Но они были неумны и, как правило, вызывали тень Маркса — вот уж у кого бы Дзержинский в последнюю очередь стал просить помощи! Ведь духа невозможно принудить говорить о предметах, которые его не волнуют. «Старый болтливый еврей не способен толковать ни о чем, кроме своих семейных делишек, его даже из „Капитала“ не упросишь процитировать — да и что проку в этом „Капитале“! Эта масонская книга еще глупей, чем Библия. А манифест, от которого поросячьим визгом заходились три поколения русских подпольщиков? „Призрак бродит по Европе“ — ах, какое глубокомыслие! Масоны вообще глупы — надо ж так извратить и опошлить идею тайного рыцарского союза!»</p><p class="p">Опустили портьеры, погасили почти все свечи, в комнате воцарились тишина и полумрак. M-lle Лия села, закрыла глаза, ее грудь сильно вздымалась, лицо было приторно-вдохновенное. Напряженным голосом она потребовала, чтобы все взялись за руки. Дзержинский поморщился: прикосновения чужих людей были ему неприятны. Рука соседа слева была теплой и липкой, соседа справа — влажной и холодной как лед. Что-то заскрипело, что-то словно пронеслось в нагретом воздухе комнаты... M-lle Лия задышала шумно, с присвистом; раздался печальный вздох, и скрипучий старческий голос прошелестел по-английски: «Не мучьте меня, прошу...» Старая дева громко всхлипнула — это был голос ее покойной сестры. Сеанс начинался удачно.</p><p class="p">С терпеливой скукой в сердце Дзержинский выслушал нежную перебранку двух старух, затем — советы, которые давал банкиру его тесть, бывший при жизни удачливым биржевым игроком. Иногда из этих чужих излияний удавалось почерпнуть ценные сведения, но на сей раз ничего заслуживавшего внимания сказано не было. Сестра-старушка передала, впрочем, привет от почившей королевы Виктории, но Дзержинский не видел, какую практическую пользу можно было из этого извлечь. Виктория ли, Эдуард ли, — все это слишком далеко от российских дел. Биржа его тоже мало интересовала: в финансовых вопросах он был слаб. Добывать деньги — удел таких, как Ленин... Кто явится сегодня? К большому огорчению Дзержинского, ему ни разу не удалось установить связь с кем-либо из своих царственных предков. О, как хотел бы он услышать голос Марины или Димитрия! Но, по-видимому, слишком велика была толща времен, отделявшая его от них.</p><p class="p">Говорливый дух биржевика наконец покинул комнату, и после непродолжительной паузы из уст медиума полилась округлая, ясная французская речь. (Никто из присутствующих не понимал по-французски, это было очень удобно.) Дзержинский с радостью узнал этот мужской голос: Огюст Бланки. Он приходил на зов часто, был немногословен и точен в ответах, и Дзержинский его очень ценил: человек, первым провозгласивший идею партии как рыцарского ордена профессиональных революционеров, заслуживал того, чтобы к его мнению прислушались.</p><p class="p">— Я приветствую моего друга, — сказал Бланки. — Сегодня моего друга ждет хорошая ночь. Да здравствует свобода, равенство и братство!</p><p class="p">Дзержинский вздрогнул: эти слова подтверждали, что медиум не притворяется (m-lle Лия, она же миссис Джонс, определенно была глупа, но все ж он никогда до конца не верил ей, как никому вообще не верил) и в комнате действительно находится выходец с того света: никто из живущих не мог знать о том, что еще он намерен предпринять нынче ночью после завершения спиритического сеанса.</p><p class="p">— Что хотел бы знать мой друг? </p><p class="p">Дзержинского несколько смущало, что великий революционер постоянно говорил о нем в третьем лице — звучало лакейски, но, в конце концов, у духов могут быть свои представления об этикете. Он сказал, стараясь тщательно выговаривать слова и употреблять простейшие грамматические конструкции — почему-то с духами принято было разговаривать, как с детьми или слабоумными:</p><p class="p">— Вчера в нашу организацию пришел новый человек. Огюст, ваш друг хочет знать — можно ли доверять ему?</p><p class="p">— Друг никому не доверяет, — откликнулся Бланки, — друг умен. Друг прав. Революционер не доверяет никому, кроме себя.</p><p class="p">— Да, разумеется, — нетерпеливо сказал Дзержинский. — Но друг хочет знать — опасен ли тот человек?</p><p class="p">— Рыжий человек опасен. Друг должен остерегаться. Все рыжие опасны. Возможно, рыжий человек происходит из знатного семейства.</p><p class="p">— Что за вздор! — вспыхнул Дзержинский. — Простите, Огюст...</p><p class="p">— Пусть друг спросит рыжего человека — кто была его мать?</p><p class="p">— А кто была его мать? — вкрадчиво поинтересовался Дзержинский.</p><p class="p">— Пусть друг спросит рыжего человека, кто был его отец...</p><p class="p">— Друг понимает, что вы, Огюст, сегодня не в настроении, — сказал Дзержинский. Он был разочарован. — Скажите о будущем друга, Огюст. Что вы видите?</p><p class="p">— Друга ждет великое будущее, — сказал Бланки. Он всегда говорил это. — Вижу статую друга.</p><p class="p">— В Санкт-Петербурге?</p><p class="p">— Нет. Другой город. Моска... Мос...ква, — с запинкой выговорил француз.</p><p class="p">— Огюст, вы ничего не путаете?</p><p class="p">— Нет. Лу... Лубианка. Прекрасная статуя из бронзы. Горожане приносят цветы к подножью статуи.</p><p class="p">— А дети? — жадно спросил Дзержинский. — Дети приносят цветы?</p><p class="p">— О да. Дети. Много, много детей. Темно, темно... — забормотал призрак. — Темно... меч карающий... чистые руки, чистые ноги, чистая голова... Темно, темно... Придет человек без двух пальцев на руке... Вижу! Чернь собралась на площади... чернь хочет свалить статую друга... Друг упал... Чернь ликует...</p><p class="p">— Вот как?</p><p class="p">— Друга поставят обратно, — успокоил призрак. — Человек без пальцев уйдет, придет меч карающий, и друг будет снова стоять на площади, и дети будут приносить цветы к ногам друга. Ныне и присно и во веки веков. Однако друг должен простить меня — я должен идти. Другой друг призывает меня. Друзья не дают мне ни минуты покоя, — сказал он довольно сварливым тоном.</p><p class="p">— Кто? — ревниво нахмурился Дзержинский. — Кто призывает вас, Огюст? Уж не рыжий ли человек?</p><p class="p">— Женщина. Русская женщина. Вера.</p><p class="p">— Засулич? И эта карга туда же? — усмехнулся Дзержинский. — Что ж, Огюст, друг благодарит вас...</p><p class="p">— Свобода, равенство и братство, — отозвался призрак слабым, тающим голосом. M-lle Лия в изнеможении откинулась на спинку стула. Банкир жалобно залепетал:</p><p class="p">— Герр Феликс, ну хватит же, хватит, вы сломаете мне пальцы...</p><p class="p">— Прошу прощения, — сказал Дзержинский. Он хотел еще побеседовать с Робеспьером или Бонапартом, но видел, что медиумистка слишком устала. В другой раз. Сейчас его ждет хорошая ночь, если верить другу Огюсту.</p><p class="p">Распрощавшись со спиритами, он вышел за ворота. Пробило час. Дул холодный, пронизывающий ветер. Кутаясь в плащ, он шагал по освещенным улицам Ист-Энда. Из подворотен женщины провожали его зазывными взглядами. Он быстро, презрительно, исподлобья оглядывал их и, не замедляя шага, летел дальше. Все было не то.</p><p class="p">На углу Уайтчепл-роуд и Осборн-стрит он увидел то, что нужно. Она была тоненькая, хрупкая; головою едва доставала ему до груди. Личико круглое, совершенно детское... Когда она привела его в свою жалкую каморку, он объяснил ей, что от нее требуется. Обычно они скоро понимали его желания и, как умели, старались угодить. (В душе они, конечно, смеялись над его причудами, но ему это было безразлично.) Эта же оказалась на редкость тупа — видимо, только что из деревни.</p><p class="p">— Как вы говорите? Я должна плакать и ругать мою мать? Но за что?</p><p class="p">— Что ты делаешь? — он поморщился. — Я не просил тебя раздеваться. Не трогай меня. Отойди от биде. Сядь на пол и плачь.</p><p class="p">— Но вы же меня не бьете, не щиплете. У вас красивая борода, и от вас хорошо пахнет. Почему нужно плакать? Я не умею.</p><p class="p">— Ты — маленькая девочка, неужели не понятно? Мать выгнала тебя на панель. Ты не хочешь заниматься проституцией.</p><p class="p">— Никто меня не выгнал... — проворчала она, но все же попыталась сделать то, чего он добивался: села, скорчившись, в углу комнаты и стала тереть кулаками сухие глаза.</p><p class="p">— Что ты здесь делаешь, детка? Тебе холодно?</p><p class="p">— Угу... Моя мать...</p><p class="p">— Она больше никогда не заставит тебя. Не бойся меня.</p><p class="p">— Я не боюсь.</p><p class="p">— Тебе холодно? — он нагнулся, поднял ее на руки — волна безумной нежности затопила его сердце, — положил на постель. — Не бойся, Банда, милая! Я не сделаю тебе больно, не сделаю тебе плохо, не сделаю ничего, что ты не хочешь. Я хочу построить дом, большой дом, где будут жить такие, как ты, беспризорные девочки... ну, и мальчики, наверное, тоже...</p><p class="p">— Работный дом? Но я не хочу в работный дом. Я мечтаю устроиться в хороший бордель, чтоб не надо было стоять на улице и мерзнуть.</p><p class="p">— Идиотка... — Он едва сдержался, чтоб не придушить ее. — Это будет детский дом. Тебе не нужно будет торговать своим телом, поняла? Никто не посмеет тебя мучить. Сейчас ты будешь спать, а я буду оберегать твой сон. А завтра мы пойдем в кухмистерскую. Я куплю тебе пирожных, платьев, живого котенка...</p><p class="p">— Терпеть не могу кошек. Они царапаются. Лучше купите мне шелковые чулки. И шляпку. Ведь вы же добрый, правда? Вы дадите мне еще два фунта на чулки и шляпку?</p><p class="p">— Хорошо, хорошо! — простонал он в отчаянии. — Чулки и шляпку. Я тебе все куплю. Ты будешь жить в большом светлом доме, тебя научат читать и писать, ты будешь ходить в школу.</p><p class="p">— Фу, как скучно... — Улыбаясь, она протянула к нему руки. — Мистер, может, хватит дурачиться? Я уже достаточно ругала мою мать... Да у меня и матери-то отродясь не было... И ни в какую школу я не хочу.</p><p class="p">Отчаявшись чего-нибудь добиться от нее, он со вздохом предоставил ей совершать с его телом все те грубые и бестолковые действия, которым она была обучена. Даже миг последнего содрогания оставил его абсолютно равнодушным: все свелось к гигиенической процедуре. Что за мерзкий суррогат — эта раскормленная английская телка вместо хрупкой славянской русалочки с глазами черными, будто смородина... Друг Огюст обманул его — ночь вышла отвратительная. А значит, друг Огюст и в остальном мог ошибиться. Рыжего человека, конечно, следует опасаться, как следует опасаться всех и каждого, но полагать, будто тот знатного происхождения... ничего глупей придумать невозможно.</p><p class="p">Когда он вновь вышел на улицу, то уже не чувствовал к маленькой проститутке злобы. Бедный ребенок. Она не будет смеяться над ним и никому не расскажет. Она была очень даже мила, когда лежала, прижав колени к животу, с ножом под левой грудью. Он укрыл ее одеялом, чтоб было теплей, поцеловал в лоб. Если б она позволила ему заботиться о себе, все завершилось бы иначе. Никому не нужно было это липкое соитие, и кровь на лезвии никому не нужна. Он бы оберегал ее сон несколько часов, а потом ушел, как обычно, оставив щедрое вознаграждение. Да, досадный инцидент. Зевая, он медленно шел медленно по направлению к своему дому, и ему рисовались огромные хрустальные дворцы, где дети сидят за партами и учат таблицу умножения.</p></span>
