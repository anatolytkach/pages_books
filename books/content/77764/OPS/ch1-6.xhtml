<span><p class="p">Он выругался: идти куда-либо в таком виде было невозможно. И Гришка Зиновьев, сапожничий сын, с помощью обычных гвоздей и молотка ловко и споро устранил неприятность, сопроводив благодеяние словами «Дохряпаешь в лучшем виде, Володя». Обычно Ленин даже самым близким друзьям мужского полу не позволял называть себя иначе как Ильичом, но из чувства признательности и сословного родства стерпел это амикошонство. Так завязалась дружба, впоследствии удивлявшая многих; так вышло, что Зиновьев оказался единственным из партийных товарищей, кто звал Владимира Ильича по имени и на «ты».</p><p class="empty-line"/><p class="p">Несколькими днями позднее Ленин, засунув руки глубоко в карманы любимых фланелевых штанов и насвистывая, брел без всякого дела по Пикадилли. По-прежнему стояла удушливая, липкая жара, и он решил, что сыт Лондоном по горло. «Туманный Альбион называется — где хоть один туман или дождик?!» И вообще он больше любил Париж.</p><p class="p">Визгливая женская перебранка привлекла его внимание; он остановился — всегда был не прочь поглазеть — и увидел, как громадная толстая цветочница, оставив тележку, уставленную пышными букетами роз и хризантем, таскает и треплет что-то маленькое, отчаянно визжащее; он пригляделся и разобрал, что это девчонка, соплюшка лет десяти. Под ногами толстой бабищи валялись измочаленные и растерзанные цветочки: астры и тому подобное, и Ленин догадался о причине конфликта: очевидно, девчонка пыталась торговать без патента и покусилась на толстухино местечко. Равнодушные британцы проходили мимо, делая вид, что ничего не замечают; Ленин засучил рукава и решительно кинулся в гущу схватки, но его на долю секунды опередил подскочивший с другой стороны худой человек в крылатке... Обмениваться рукопожатьями и другими буржуазными реверансами было некогда; оба дружно набросились на толстуху и с немалым трудом вырвали из ее рук девочку. Та размазывала по лицу грязные слезы пополам с юшкой, шмыгала носом и подвывала как звереныш. Ноги ее ниже колен были голы, покрыты синяками и ссадинами, башмаки совсем разбиты.</p><p class="p">Ленин сносно знал английский и болтал весьма бойко, напрочь игнорируя произношение и грамматику; он присел перед девчонкой на корточки, вытер ей нос, потрепал по голове и спросил, как ее зовут. Девочка насморочным голоском отвечала, что ее звать Долли, и заревела еще пуще, и оба растроганных джентльмена пустились ее утешать («Don't cry, Dolly, don't cry, baby, don't worry, be happy, take it easy» etc.); наконец она перестала реветь, еще раз высморкалась в подол и уставилась на спасителей большими глазами, черными, как смородина.</p><p class="p">— На, возьми и не реви больше, — сказал Владимир Ильич и высыпал в карман девчонкиной юбки всю мелочь, какая нашлась в его бумажнике. — Купи себе поесть и новые башмаки, поняла?</p><p class="p">— Успокойся, дитя мое, — медоточивым голосом произнес Феликс Эдмундович и вложил в лапку девочки две сложенных фунтовых бумажки. — Купи себе платье.</p><p class="p">«Однако! Он и вправду детолюб. Что ж я-то, как буржуазный жмот какой-нибудь?» — Ленин сердито засопел и дал соплюхе еще три фунта. Он был уверен, что теперь-то перещеголял соперника в щедрости, но тот, наклонившись к Долли, поднял ее на руки, поцеловал в замурзанную щеку и сказал, что если она придет к нему по адресу такому-то, то получит еще пять фунтов, которых у него сейчас с собой нету, а также суп, башмаки и кучу других подарков. Владимир Ильич не желал отступать: он сказал девчонке, что сейчас отведет ее в самый что ни на есть шикарный ресторан и накормит до отвала. Но та, отчаянно замотав головой, сообщила, что ее ждет злая мачеха, и, воспользовавшись тем, что Феликс Эдмундович отпустил ее, умчалась прочь так, что пятки сверкали. «Может, и впрямь нужна какая-нибудь революция, — подумал Ленин, глядя ей вслед, — сил нет глядеть на эту вечно голодную малышню... Вот когда я стану царем — велю всей мелюзге каждый день раздавать бесплатный суп и пряники». Он бы и сам предложил Дашке прийти к нему и угостил супом и конфетами, но в дешевый пансион, где он жил, посторонних не пускали. Ему было совестно, что он дал девчонке меньше, чем полунищий польский шляхтич, который ест только один раз в неделю, и вдвойне совестно, что он думал об этом шляхтиче так нехорошо.</p><p class="p">— Раз уж мы встретились — позвольте, батенька, пригласить вас на обед, — сказал он Дзержинскому. — Я угощаю.</p><p class="p">Феликс Эдмундович милостиво принял приглашение, и революционеры направились в ближайший ресторанчик. (А крошка Долли, ликуя и подпрыгивая на бегу, стискивала в кармане грязной ручкой купюры и мелочь и <em>кое-что еще...</em>)</p><p class="empty-line"/><p class="p">— Скажите, Эдмундович, зачем вам эта революция? — Ленин отложил вилку и духом осушил стакан красного. — Лично вам какая от нее выгода?</p><p class="p">— Я забочусь о счастии народном, — отвечал Дзержинский. Лицо его было строго. Он отказался от вина, заявив, что не пьет ничего, кроме воды. Это не вполне соответствовало истине: спиртного он не пил только на людях, остерегаясь ненароком выдать свои многочисленные тайны неосторожным словечком, а наедине с собой изредка напивался по-черному, хотя вообще-то предпочитал кокаин.</p><p class="p">Ленина коробили трезвенники, но сейчас он искренне старался находить в собеседнике хорошие стороны, сколь бы тяжело это ни было. «Ну, аскет. С кем они его сравнивали? Ахмет... рахмат... Монах, в общем. — Но монахов Ленин терпеть не мог. — Нет, не монах, а этот, как бишь его... Спартанец! Да. Они были крепкие ребята».</p><p class="p">— Приберегите эти благоглупости для вашей бабушки, — весело сказал Ленин. — Вы же разумный человек!</p><p class="p">— Вы заблуждаетесь, — хладнокровно отвечал Дзержинский. — Даю вам честное благородное слово, что личной выгоды я от революции не ищу и не жду. А отчего вы спрашиваете? У вас, стало быть, имеется корыстная причина участвовать в нашем святом деле?</p><p class="p">— Да нет же, нет, конечно, — поспешил оправдаться Владимир Ильич. — Просто я с детства горячо сочувствую угнетенным и всякому там пролетариату.</p><p class="p">— С детства? — переспросил Дзержинский, радуясь, что Ленин сам вывел разговор в нужное направление. — У вас было тяжелое детство?</p><p class="p">— Почему тяжелое? Детство как детство. Золотая пора! Вот, помню, как-то мы с хозяйским Сашкою... — И Владимир Ильич, уже изрядно захмелевший, пустился в рассказы о своих детских и отроческих шалостях, из коих живая жаба, засунутая под рясу преподавателю закона Божьего, была самой невинной. Феликс Эдмундович весь этот пьяный вздор терпеливо выслушал и спросил:</p><p class="p">— Кто была ваша мать?</p><p class="p">— Кухарка, — спокойно отвечал Ленин: он, разумеется, не собирался выкладывать Дзержинскому или кому бы то ни было тайну своего царственного происхождения.</p><p class="p">— Ах, кухарка... — Феликс Эдмундович сдержал вздох облегчения. «Ну, разумеется, кухарка; неужели по его манерам этого не видно? Огюст все напутал». Он почти успокоился, но на всякий случай спросил Ленина, кто был его отец.</p><p class="p">— Шут его знает. Я незаконнорожденный. А вы из каких же будете? Из дворян, небось? Шляхта?</p><p class="p">— Ах, какие там дворяне! — отвечал Дзержинский. — Одно название. Мой отец был школьным учителем. Многодетная семья, нищета, захудалый, ничтожный род.</p><p class="p">Ленин впервые видел шляхтича, который бы честно признавался в том, что его род — захудалый и ничтожный; он почти зауважал Железного. Он подумал, что подарить Дзержинскому Польшу — будет, пожалуй, скуповато. «Ну что такое Польша? Не государство, а тьфу. Сделаю-ка я его военным министром или министром железных дорог: если взяться с умом, там можно класть в карман неплохие барыши».</p><p class="p">В свою очередь Феликс Эдмундович, убедившийся, что боровик не представляет для него серьезной опасности, смягчился сердцем и сказал ему:</p><p class="p">— Товарищ Ленин, я вас хотел бы предупредить... Вас уже дважды видели пьющим пиво в обществе товарища Зиновьева. Мне не кажется, что товарищ Зиновьев — подходящая компания для такого приличного человека, как вы.</p><p class="p">Дзержинский сделал это предостережение с наилучшими намерениями, но просчитался. Ленина взбесило беспардонное вмешательство постороннего в его дела; кроме того, он сразу понял, что Дзержинский намекает на сапожничье происхождение Гришки, и еще пуще оскорбился. Он не мог стерпеть, чтобы задрипанный шляхтич оскорблял русского пролетария, и сказал в довольно напыщенной манере, что бывало с ним не часто:</p><p class="p">— А я считаю, что за это мы должны относиться к товарищу Зиновьеву с еще большим уважением.</p><p class="p">Дзержинский взглянул на него изумленно и заговорил о другом. (Пару дней спустя из товарищеской болтовни Ленин узнал, что вождь подразумевал совсем иное: оказывается, неразлучные Зиновьев и Каменев были содомитами. Впрочем, это не произвело на Ленина впечатления: его собственная половая жизнь была так здорова, обильна и богата, что на чужую ему было решительно начхать.) Однако надо отдать должное проницательности Дзержинского: он ни на миг не заподозрил Ленина в принадлежности к той же категории людей, что и товарищ Зиновьев, а просто счел его законченным болваном.</p><p class="p">— Довольно пустяков. Поговорим о главном, — сказал он. — В каком объеме и каким образом вы намереваетесь вкладывать средства в революционный процесс?</p><p class="p">Ленин тяжело вздохнул: ему совсем не хотелось обсуждать эту тему. Дела его в последнее время шли неважно: почти все проекты, начавшись блистательно, по капризу судьбы и глупости компаньонов завершались крахом. Но он понимал, что невозможно выиграть рубль, не рискнув хотя бы копейкой.</p><p class="p">— Сколько вы хотите? — спросил он.</p><p class="p">— А сколько у вас есть?</p><p class="p">— Э... Видите ли, почтеннейший, я на данном историческом отрезке испытываю небольшие временные затруднения...</p><p class="p">— Понимаю, понимаю, — усмехнулся Дзержинский. Он к этому времени уже навел о Ленине кой-какие справки и знал, что тот никакой не крупный капиталист, а обычный <em>жучила. </em>Но его и это устраивало. — В таком случае у меня к вам деловое предложение. Вы будете получать небольшие средства из партийной кассы и оборачивать их. Годится?</p><p class="p">— Прибыли пополам? — быстро спросил Владимир Ильич.</p><p class="p">Дзержинский задумался. Он был широко образованным человеком: изучил Овидия, Плавта, Цицерона, Бабефа, Макиавелли, Блаватскую; но экономика не интересовала его — он считал ее чем-то вторичным. О прибылях, рентабельностях и прочем он имел слабое представление. Но все же несколько классов гимназии он окончил, и не нужно было штудировать «Капитал», чтобы понять, что человек-гриб обнаглел.</p><p class="p">— Двадцать пять процентов, — ответил он.</p><p class="p">— Вам?</p><p class="p">— Вам, разумеется.</p><p class="p">— Гм... Ладно, по рукам, — сказал Владимир Ильич. Он видел, что в финансовых вопросах Феликса Эдмундовича нетрудно будет обдурить. (Дальнейшее сотрудничество показало, что он был в этом не совсем прав: уж очень чуткий нос был у Феликса Эдмундовича.)</p><p class="p">Когда пришла пора рассчитываться, Владимир Ильич не без смущения обнаружил отсутствие бумажника.</p><p class="p">— М-да, батенька, — сказал он в смущении. — Во тьме ночной пропал пирог мясной, пропал бесследно, безвозвратно, куда девался — непонятно. (Это была его любимая присказка.)</p><p class="p">Он обшарил карманы, заглянул даже в ботинки (в одном кармане была дыра, и бумажник мог сквозь брюки провалиться туда), — но деньги пропали бесследно, безвозвратно. Феликс Эдмундович, поморщившись («Как это характерно для русских! Пригласить на обед, нажраться как свинья, а после прикинуться, что потерял деньги!»), полез в свой карман — но и его бумажника не оказалось; более того, пропали часы. Пришлось оставлять в залог часы Владимира Ильича. (А крошка Долли с толстухою сидят в обжорке. Болтают ногами, уписывают рыбу с жареной картошкой и хлещут портер. Порою любовь к детям обходится нам недешево.)</p><p class="empty-line"/><p class="subtitle">3</p><p class="p">...Пятнадцатого июля следующего года какой-то полупомешанный бездельник укокошил Плеве. А тридцатого императрица разрешилась от бремени мальчиком, которому дали несчастливое имя Алексей.</p><p class="p">«Ну что ж, — сказал себе Дзержинский, узнав об этом, — цареубийство отменяется. Попробуем иначе».</p><p class="p">И он написал угрожающее письмо Азефу, требуя вернуть деньги. Но душка Азеф не мог бы их вернуть, даже если б у него возникло столь нелепое желание. Деньги он давным-давно прокутил с девицами и проиграл разным людям, в том числе и Ленину. Естественно, он не возвратил ни копейки и на встречу не явился. После этого Феликс Эдмундович, движимый чувством мести, предпринял следующие действия: во-первых, через своих агентов в царской полиции распространил слух о том, что убийство Плеве организовал Азеф; а во-вторых, поведал старому знакомому Володе Бурцеву, что Азеф является провокатором и двойным агентом. Бедняге так никогда и не удалось отмыться от этих обвинений — слишком уж провокаторской была у него внешность.</p><p class="p">Теперь Феликс Эдмундович перестал заниматься партией эсеров, пустив их дело на самотек, и сосредоточился преимущественно на социал-демократическом движении. Впрочем, у него к тому времени уже имелось по всей Европе великое множество доверенных лиц и тайных агентов, ни к какой партии не принадлежащих вовсе. Они-то и были самыми надежными. (Четырнадцатый год докажет это...) И, наконец, он принял железное решение: никогда больше не иметь дел с евреями. Ни общественных, ни личных — никаких.</p></span>
