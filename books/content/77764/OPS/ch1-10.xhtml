<span><p class="p">— И я могу быть повешен? — все еще не верил Мирбах.</p><p class="p">— По приговору военного трибунала, — вдохновенно врал Ленин. — Без всякого суда, без вмешательства общества...</p><p class="p">— Но я германский подданный!</p><p class="p">— Господи, кого в России это волнует? Ваш кайзер — родственник нашего Ники. Неужели они не договорятся?! Если начать протестовать, может получиться так, что вашу новейшую венскую школу запретят и в Германии. Помяните мое слово, этим кончится.</p><p class="p">— Никогда! — замахал ручками Бауман.</p><p class="p">— Ну вот видите. Если не хотите, чтобы великий метод психоанализа оказался запрещен и в Германии, бегите бронировать место в вагоне. Послезавтра вас не должно здесь быть.</p><p class="p">Ленин все рассчитал с исключительной точностью — все-таки он лучше всех в партии умел убалтывать людей, сам доктор Фрейд позавидовал бы ему. «Надо будет при случае подзаработать психоанализом, — думал Ильич не без удовольствия. — Слов-то нахватался, комплексов... Нешто Бауман разбирается в людях лучше меня?» Через два дня Бауман-Мирбах благополучно покинул Москву, а Ленин приступил к реализации главной части своего плана.</p><p class="p">Забегая немного вперед, скажем, что вовсе отказаться от такого ценного материала, как русские биографии, психоаналитик не смог. Он сделал доклад «Об удивительном случае раскаяния полицейского агента», вызвавший форменный переполох на июньском (1906) заседании венского кружка. Сам Фрейд с чувством пожал руку любимому последователю. Опасаясь политических последствий, Бауман-Мирбах опубликовал работу под литерами В.М., которые и вошли в историю психоанализа. Под этим же загадочным псевдонимом напечатал он и прославленную статью «Об одном случае некрофилии с тенденцией к неудержимому прогрессу», которую Фромм называл драгоценнейшим перлом в сокровищнице мирового психоанализа. Бауман, однако, не удержался от того, чтобы при первой возможности вернуться в Россию. В восемнадцатом году он приехал в молодую советскую республику в качестве посла, чего делать ни в коем случае не следовало. Но об этом — в свое время.</p><p class="p">Ленин все продумал до мелочей. Организовать публикацию сообщения о внезапном исчезновении доктора Баумана было для него ерундовым делом — он выпил с газетчиками не один стакан пива и знал, что до сенсаций такого рода сотрудники «Биржевки» весьма охочи. Дзержинский прочел сообщение и посетил Ленина вечером того же дня.</p><p class="p">— Где он?</p><p class="p">— Вы думаете, я лично его убирал? Я, батенька, не мясник. Мое дело организация.</p><p class="p">— Вы уверены, что он мертв?</p><p class="p">— Безусловно. Люди надежные. От вас теперь, Феликс, одно зависит — распузырить как можно громче слух о том, что это все дело рук кровавого режима.</p><p class="p">— За это не беспокойтесь, — надменно сказал Феликс. — Листовки будут готовы завтра же. Где и когда его найдут?</p><p class="p">— Найдут избитым, на улице. Я попросил, чтобы от души поработали — вам ведь нужно покровавей?</p><p class="p">— Однако вы вошли во вкус, — улыбнулся Дзержинский.</p><p class="p">— Да, в последнее время как-то, знаете, стал понимать, что без крови дела не делаются. Ну-с, найдут его неподалеку от Разгулял. Освидетельствование, то, се. Вас прошу не вмешиваться — у меня свой человек в анатомическом театре, он газетчикам расскажет про ужасные увечья и жестокую расправу. Понесут его из морга при больнице святых Фрола и Лавра, толпу я организую, но много народу не обещаю. Тут, впрочем, все еще и от листовочек ваших зависит... Лично-то будете присутствовать в колонне — или как?</p><p class="p">Ленин предвидел ответ на этот вопрос и спрашивал только для очистки совести. Нет сомнений, что в толпе будут агенты Железного, отряженные специально для того, чтобы убедиться в бесповоротном уничтожении Баумана; они будут пристально вглядываться в его лицо, ища черты сходства, — но сам Дзержинский никогда не появлялся там, где можно было ожидать большого скопления народа. То ли он опасался беспорядков, во время которых его случайно могли арестовать вместе с другими, то ли не переносил толпы как таковой.</p><p class="p">— Разумеется, нет, — холодно произнес Железный. — Я не могу рисковать нашим делом. Если демонстрантов арестуют, всех выпустят через три часа, а мне наденут пеньковый галстук. Вы отлично знаете, что у меня три смертных приговора.</p><p class="p">Про три смертных приговора Ленин ничего не знал, но от души порадовался подтверждению своих догадок. Все-таки в присутствии Железного он чувствовал себя не слишком уверенно, даром что поддельный Бауман был изготовлен по лучшим правилам театрального дела. Дружить с актерами и гримерами коммерсанту вообще полезно — вот почему все крупные убийцы, притворяющиеся деловыми людьми, так любят поиграть в меценатов. На роль покойного Баумана Ленин давно уже присмотрел завсегдатая «Счастливого домика», огромного толстяка Балабухина, комического простака из труппы Корша. Балабухин согласился за скромную сумму полежать в гробу, тем более что демонстрация вряд ли заняла бы больше часа. Ленин не верил, что большевистский митинг соберет много народу: потом, конечно, можно раздуть скандал, поговорить о жестокостях царизма, — но Железному, как видим, никакого скандала не нужно, а нужно тихо убрать опасного свидетеля; что ж, сыграем в его игру. На кладбище вся толпа, конечно, не попрется, там над гробом будет сказано несколько речей, а далее Ленин попросит митингующих разойтись и оставить у гроба только родственников. Родственников он озаботился нанять все в том же «Счастливом домике», в их тесной толпе Балабухин быстро выберется из гроба, и трагифарс будет окончен к общему удовольствию.</p><p class="p">— Только выпить бы мне для храбрости, — смиренно попросил Балабухин, человек кроткий и робкий, как многие люди его комплекции.</p><p class="p">— Нельзя, — покачал головой Ленин. — Ты выпьешь и храпеть будешь. Храпящий покойник — это, сам понимаешь, всему делу крышка.</p><p class="p">— А долго лежать-то? — застенчиво спросил Балабухин. — Мало ли, вдруг надобность какая...</p><p class="p">— Успеешь с надобностью, больше двух часов не потребуется. — И Ленин передал ему аванс.</p><p class="p">— Но у меня особенность такая, — улыбнулся Балабухин. — Все вещества в организме от полноты жизненных сил обмениваются немного скорее. Мне нужно каждые три часа...</p><p class="p">— Всем что-нибудь нужно, одному мне ничего не нужно, — сурово сказал Ленин. — Терплю же я жестокие неудобства ради освобождения трудящихся? Можно как-нибудь и тебе потерпеть с твоим стремительным обменом...</p><p class="p">Утром 18 октября скромная толпа артистов понесла тяжелого Балабухина от морга больницы Фрола и Лавра, что неподалеку от Разгуляя, в сторону Ваганьковского кладбища. Лицо Балабухина было разукрашено лучшим гримером Корша до полной неузнаваемости — синяки, ссадины и окладистая черная борода. Вдобавок он все-таки надрался и заснул. К счастью, его тихое похрапывание заглушалось уличным шумом. Вскоре к толпе присоединилась скромная большевистская делегация. Зиновьев на правах друга сунул Ленину желтый листок, из которого казначей партии узнал о великой роли товарища Баумана в русском освободительном движении. Под маской скромного врача скрывался опытный и умелый помощник русских марксистов, осуществлявший их связь с германскими товарищами. Героический борец, не делавший, кстати, ничего противозаконного, был выслежен и убит подлыми наймитами режима Николая Кровавого, но напрасно думают сатрапы, что смогут остановить вал народного гнева... последняя мысль развивалась строках в двадцати.</p><p class="p">Толпа, против ленинских ожиданий, росла.</p><p class="p">— Кого несут-то? — спрашивали прохожие.</p><p class="p">— Революционера. Говорят, самый ихний герой был.</p><p class="p">— И что ж, убили его?</p><p class="p">— Подчистую изувечили. На улице. Шел, шел — и на тебе.</p><p class="p">— Ах, подлые! По улице нельзя пройти! Их поставили порядок охранять, а они на тебе, средь бела дня, на улице!</p><p class="p">— И ведь ни за что ни про что. Никого не трогал.</p><p class="p">— Ах, ироды! — И новый ремесленник или сердобольная торговка вливались в толпу.</p><p class="p">— За простой народ-то они только и стараются, — скорбно говорил пожилой мужик крестьянского вида. — Остальные все об себе.</p><p class="p">— А их вона как. Идешь, и убили. Пора один конец сделать кровопивцам. Мало Николашке было в Питере кровавого воскресенья.</p><p class="p">— Ничаво, будет им еще... кровавый понедельник...</p><p class="p">— Люцинеры — они за што?</p><p class="p">— Они за то, чтоб у тебя, дуры, жизень была, а не каторга...</p><p class="p">— Ахти! И убили?</p><p class="p">— Совсем Бога не боятся, ироды.</p><p class="p">Студенты, инженеры, гимназисты, зеваки, случайные прохожие увязывались за демонстрацией. Большевистская верхушка затянула «Вы жертвою пали в борьбе роковой» — песню, которая ужасно раздражала Ленина своим заунывным мотивом. Он вообще не любил похорон, и мысли о смерти были ему противны. Сам он вечно утешался русской пословицей «Пока я есть — смерти нет, а смерть придет — меня не будет». Туг была истинно народная мудрость и то горькое веселье, за которое он так уважал свой народ. Торжественная же скорбь была настолько чужда его натуре, что собственные похороны он представлял скорее праздником. Надо будет завещать, думал он, чтобы выпили как следует и вспомнили добрым словом. А вообще-то я помирать не собираюсь. «Ленин жил, Ленин жив, Ленин будет жить» — такая у него была поговорка на все случаи жизни: как никто не уложит на пол Ваньку-Встаньку, так и его, Ленина, сжить со свету будет непросто. Большевизаны, однако, обожали грустные, надрывные песни о борьбе роковой и несчастной участи борцов. Азартное и веселое дело революции представало в этих песнях тяжкой каторгой, тоскливым и однообразным подвижничеством — потому-то во всех этих песнях было так много про тюрьмы и ссылки. Ленин два раза сидел недолго по ерундовым делам (первый раз попался на афере с чудодейственным слабительным, второй был вообще дурацкий — подрался на Нижегородской выставке, а пострадавший купец, ругавший жидов и байстрюков, оказался личным другом местного градоначальника), но любые соприкосновения с карательной машиной государства вызывали у него тоску и изжогу; большевизаны же не могли без того, чтобы в конце каждого собрания спеть про тюрьмы и пожаловаться на горькую участь революционера — хотя какая горькая участь? Веселье, авантюры, никакой тебе постоянной и утомительной работы, к которой даже самые прилежные из них чувствовали непреодолимое омерзение... Они и теперь ныли свои грустные песнопения, от которых у Ленина болели зубы, — но странное дело: толпа росла и росла. Власти не смели задерживать демонстрацию — они вообще очень оробели в последнее время. Городовые почтительно сторонились.</p><p class="p">Луначарский неожиданно вынырнул из толпы рядом с Лениным, возглавлявшим шествие.</p><p class="p">— Видите, сколько народу? — хвастливо сказал он.</p><p class="p">Ленин, признаться, никак не ожидал такого количества желающих проститься с Бауманом. Никто в толпе, разумеется, и понятия не имел о психоанализе. Знали только, что несут хоронить революционера, борца за народное дело. Революционеры были в большой моде. Сочувствующих развелось больше, чем надо: лжепокойный Бауман, увидев эту огромную толпу, явно уверовал бы в то, что Тзарь с Отечеством скоро окажутся в разводе. «И чего им всем надо? — подумал Ленин. — Ладно Феликс, он маньяк, ладно я — я наследник престола, — но этим чего не живется?»</p><p class="p">— Товарищи! — крикнул в толпе молодой звонкий голос, явно студенческий. — Закидаем грязью смердящий труп самодержавия!</p><p class="p">— Замучен тяжелой неволей! — грянули Луначарский с Кржижановским. Толпа подхватила. Откуда-то все знали слова. «Чорт, — подумал Ленин, — да мы популярны!»</p><p class="p">— Надо их водить как можно дольше, — шепнул Каменев. — Вливаются новые люди, демонстрация охватит всю Москву...</p><p class="p">Балабухин храпел все громче. К счастью, никто ничего не замечал. Ленин оглянулся: за гробом мнимого врача шло не менее тридцати тысяч человек, толпа петляла по улицам, извозчики испуганно сворачивали, дворники глазели, разинув рот.</p><p class="p">— Служил ты недолго, но че-е-естно! — выли студенты.</p><p class="p">Ленин захихикал было, но сдержал себя.</p><p class="p">— И хто ж он был? — спрашивали за спиной.</p><p class="p">— Да говорят, дохтур...</p><p class="p">— Дохтура не пожалели, сволочи!</p><p class="p">— Говорят, простой народ лечил. Денег не брал.</p><p class="p">— От чего лечил-то?</p><p class="p">— А от всякого пользовал. Говорят, и роды принять, и от горячки, и всякую дурную болесть.</p><p class="p">— Иди ты! — не поверил кто-то.</p><p class="p">— Верно тебе говорю. По самым этим делам.</p><p class="p">— Да говорят, он немец!</p><p class="p">— И что ж, что немец? Немцы — они знаешь какие бывают? Иогансон сапожник немец, на Варварке, — что ж, он когда обманул кого?</p><p class="p">— И немца не пожалели, нехристи!</p><p class="p">Ленин оглянулся в некотором ужасе. Если б сегодня был праздник, он бы еще что-то понял; но был обычный трудовой день, притом самый его разгар. Ради похорон никому не известного врача, который если и пользовал от дурных болезней, то лишь самых богатых и знаменитых, — тридцать тысяч ремесленников, студентов и писак бросили свою работу и составили грандиозную демонстрацию! Положительно, никто в этом городе — и, шире, во всей стране — не хотел работать, и нежелание это было столь сильно, что массы изыскивали любой предлог для прогулки с песнями. Стоило сказать, что убитый был люцинером, — а в другое время пустить слух, что он был против жидов-ростовщиков, — и можно было, собрав толпу, вести ее куда угодно. Наверное, тут была какая-то причина, но Бауман уехал, и спросить было некого. Допустить, что всем этим людям хочется <em>туда,</em>и вот они, как некий могучий ОН, вливаются всей толпой в узкое лоно извилистой московской улицы, было никак невозможно. Надо было взять шире, — Ленин не зря чувствовал, что он умнее доктора Фрейда. Все русские не любили себя, потому что инстинктивно становились на точку зрения начальства, а начальство ненавидело их. Всем им надо было найти повод и причину любить себя чуть больше, а для этого годилось что угодно. Сейчас, шествуя за гробом люцинера, они нравились себе больше, чем когда работали или просто жили; да и никто тут не мог просто жить — надо было все время кого-нибудь преследовать или благословлять, причем лучше бы мертвого, для безопасности. В России очень любили похоронные шествия. Когда я приду к власти, думал Ленин, у меня будут так же радостно ходить на работу. С песнями, строем. Или по отдельности, но все равно с песнями. Труд может и должен быть праздником (он искренне верил в это, потому что сам не проработал ни дня).</p><p class="p">После трех часов хождений с песнями приблизились наконец к Ваганькову кладбищу, где Лепешкин заблаговременно купил на ленинские деньги скромный участок с краю. Лепешкин вообще оказался кладом — расторопен и доверчив. Он и теперь вынырнул из толпы рядом с Лениным, восторженно частя:</p><p class="p">— Владимир Ильич! Товарищ Ленин! Это надо же, какой человек-то был! Я и не знал, что он важный такой... Как это его угораздило, на улице-то? Хорошо, что вас хоть с ним не было, а то б вместе и накрыли...</p><p class="p">— Вместе отбились бы, — уверенно сказал Ленин.</p><p class="p">— Как же это, я не знаю... Я же вас к нему всего дней десять как водил! Он же совсем живой был! — Лепешкин, как большинство детей, никак не мог поверить, что мертвый еще недавно был совсем живым. Детям почему-то кажется, что превращение живого в мертвого должно совершаться долго, со вкусом. — Как же не уберегли-то мы его, а?</p><p class="p">— Ничего, — утешил Ленин. — Его дело продолжат миллионы.</p><p class="p">Толпа петляла между могилами, сметала посетителей, заполняла кладбище, нимало не смущаясь близостью покойников: здесь собирались митинговать, как на площади.</p><p class="p">— Товарищи! — закричал молодой человек, взобравшись на кучу свежевырытой земли. Ленин видел этого юношу впервые. — Товарищи, я лично знал товарища Баумана! Это был благороднейший, отважнейший человек, из тех, кто больше всего ненавистен этой прогнившей, позорной власти! Товарищ Бауман начал мое лечение, но не довел его до конца! И теперь я клянусь... клянусь над твоим гробом, товарищ Бауман... что сам вылечу себя по твоему методу! Я перестану... перестану думать о том, о чем ты не хотел, чтобы я думал! Перестану делать то, чего ты не хотел, чтобы я делал! Руки себе оторву, а перестану! И клянусь всего себя... без остатка... отдать делу освобождения трудящихся масс!</p><p class="p">Да, подумал Ленин, у Баумана тут в самом деле богатая клиентура. Всем, кто помешан на русском освободительном движении, надо в лошадиных дозах прописывать эрос. Но где развернуться при таком глупом правительстве? — варьете приличного нет во всей Москве, вот молодежь и идет в революцию...</p><p class="p">А над гробом фальшивого Баумана говорили все новые и новые речи, и Ленин с тревогой заметил, что лицо Балабухина синеет по-настоящему — не май месяц. Ленин наклонился к нему на правах близкого соратника и шепнул в волосатое ухо:</p><p class="p">— Добавлю!</p><p class="p">Балабухин не пошевелился. «Чорт, не помер бы в самом деле... Когда они закончат?!» Но заканчивать никто не собирался; более того — просить о том, чтобы толпа разошлась и оставила родственников проститься с доктором, было совершенно бесполезно. Каждый считал своим долгом высказать несколько светлых мыслей об ужасном самодержавии и прекрасном борце; ни о каком манифесте никто не вспоминал — люди наслаждались свободой на кладбище и думать не думали о каких-то вялых послаблениях, которые им предоставила власть. Они и так уже могли безнаказанно нести что в голову взбредет. Ленин видел в толпе даже одного городового, которого то ли нечаянно смели и поволокли с собой, то ли привлекли лозунгом освобождения рабочего класса. До рабочего класса, конечно, никому не было дела — людей привлекала сама возможность поораторствовать над трупом. Труп был сильным аргументом, он как бы подкреплял любую ерунду, которую над ним говорили. Ленин прослушал десяток речей, из которых явствовало, что Бауман погиб за упразднение черты оседлости, за равноправие женщин, за восьмичасовой рабочий день, бесплатное лечение, отмену паспортов и в особенности за то, чтобы оказалась отомщена гибель некоего Гриши Мееровича, о котором он наверняка не имел никакого понятия. Каждая речь покрывалась овацией. Ленин понял, что после очередного пылкого выступления Балабухина придется хоронить по-настоящему. Дело пора было брать в свои руки.</p><p class="p">— Товарищи! — закричал он, взгромоздившись на кучу глины. — Позвольте в заключение нашей траурной церемонии, за участие в которой мы всех вас искренне благодарим, пожелать вам всем скорейшей эмансипации, восьмичасового рабочего дня и равноправия женщин, а нам позвольте, товарищи, в узком кругу революционеров-подпольщиков попрощаться с нашим любимым товарищем, которого злодейская смерть так по-свински вырвала из наших рядов...</p><p class="p">— Он не умер! — закричал высокий студенческий голос в толпе. — Не смейте называть его мертвым! Погибший за правое дело обретает бессмертие!</p><p class="p">При этих словах Балабухин сел в гробу, оглянулся в недоумении и затряс головой. Он в жизни не собирал столько публики и совершенно не понимал, почему играет под открытым небом. После пьяного сна он обычно не сразу обретал память. Артист встал, вышагнул из какого-то ящика, в котором неизвестно почему заснул, и, прихрамывая, стал удаляться от толпы, по которой прокатилось громкое потрясенное «а-ах!». Балабухина мучала жажда и ряд других желаний.</p><p class="p">В другое время Ленин от души полюбовался бы комизмом положения, но теперь ему было совершенно не до смеха. Балабухин, чуть хромая, шел прочь от собственной могилы, а московские мастеровые, ремесленники и передовая интеллигенция смотрели ему вслед, понимая, что на их глазах только что совершилось величайшее чудо современности. Затесавшемуся в толпу городовому следовало бы задержать воскресшего, но и он стоял, вытянув руки по швам, не в силах поверить собственному зрению. Если перед бойцами за освобождение рабочего класса была бессильна сама смерть, ничто не могло остановить такую партию. Провожавшие Баумана в последний путь больше не сомневались, что самодержавие обречено.</p><p class="p">Именно с октября 1905 года начался массовый приток новых членов в партию большевиков. Дело борьбы за освобождение рабочего класса представлялось обывателям гарантией бессмертия, и ничего поделать с этим было уже нельзя. Большевики, стоя на материалистических позициях, предпринимали разные попытки объяснить чудо — утверждали, например, что Бауман пребывал в состоянии летаргического сна и чудом очнулся или что присутствующие испытали массовый обман чувств, вызванный сильным нервным потрясением. Могила Баумана на Ваганьковском, впопыхах засыпанная обалдевшими рабочими под командованием Ленина, сделалась местом массового паломничества; на ней совершались исцеления. Бауман стал впоследствии одним из самых популярных большевиков, в его честь назвали улицу и станцию метро. Даже те, кто понятия не имеет о его жизни и деятельности, помнят, что смерть его вызвала в Москве какие-то массовые беспорядки, правду о которых, однако, знал только Ленин — потому что Ленин знал все.</p><p class="empty-line"/><p class="p">— Вы солгали мне, — железным голосом сказал Железный. — Он жив.</p><p class="p">— Ну, батенька, — невозмутимо протянул Левин. — Я думал, хоть у вас нервы в порядке... Как можно верить в этот бред? Вы что, плотник? Прачка? Я же был там и видел: он лежал в гробу мертвее всех мертвых.</p><p class="p">— Однако вся Москва шепчется, что мертвец выскочил из гроба... На Ваганьковском выставлен пост, чтобы не разрыли могилу...</p><p class="p">— Чудеса ораторского искусства, — объяснил Ильич. — Сильный оратор, по-настоящему убежденный, может заставить толпу поверить во что угодно. Да и кто видел-то? Первые ряды. Остальные напирали сзади и распространяют слухи.</p><p class="p">— Но вы — видели? — страшным шепотом спросил Дзержинский.</p><p class="p">— Что то есть я должен был видеть? Чудесное воскресение? Не смешите людей, Эдмундыч, вы глава революционной партии и должны понимать, что чудес не бывает.</p><p class="p">— Но вся Москва...</p><p class="p">— Успокойте ваши нервы, — с нажимом сказал Ленин. — Вся Москва и не такому верила. А когда блестящий оратор убеждает вас, что борьба за ваше дело приносит бессмертие...</p><p class="p">— Кто, кстати, был этот блестящий оратор? — подозрительно спросил Дзержинский. — Не Луначарский ли?</p><p class="p">— Да этот ваш... — Ленин сделал вид, что с усилием вспоминает фамилию. — Как его... Троцкий!</p><p class="p">Дзержинский быстро овладел собой, но Ильич успел заметить звериный ужас, плеснувшийся в его зеленоватых глазах. Еще немного — и Феликс признался бы, что никакого Троцкого не существует в природе, но решиться на такое признание — значило окончательно разоблачиться перед этим авантюристом, умудрившимся привлечь в партию тысячи новых адептов.</p><p class="p">— И как он выглядит? — язвительно спросил Дзержинский.</p><p class="p">— Вы что, не видели его никогда?</p><p class="p">— Видел, но особенных ораторских способностей за ним не замечал.</p><p class="p">— Напрасно, очень напрасно, батенька! Таких людей надо ценить... Молодой, в пенсне, с бородкой. Глаза-угольки. Говорит страстно, срываясь на визг. Немножко такой, знаете... в мефистофельском духе. — Ленин подмигнул Дзержинскому и громко, фальшиво пропел:</p><div class="poem">
<div class="stanza">
<p class="v">Са-та-на там пра-а-вит бал! </p>
<p class="v">Там правит бал! Там правит бал! </p>
<p class="v">Та-а-ам пра-а-авит ба-а-ал!</p>
</div>
</div><p class="p">Он помахал в воздухе шляпой и раскланялся.</p><p class="empty-line"/><p class="subtitle">3</p><p class="p">Слух о бауманском чуде потряс Москву, но декабрьское восстание все равно провалилось. Шли беспорядочные бои, трещали пулеметы, а толку не было. Неуспех революции объяснялся как объективными, так и субъективными причинами. Объективных причин было две. Во-первых, Михаил не сидел еще на троне и, соответственно, не мог исполнить условие проклятья Марины Мнишек, передав волшебное кольцо кому полагается. Во-вторых, в 1905-м в России еще не сложилась революционная ситуация: низы чего-то еще изредка хотели, верхи разок в неделю могли, и, соответственно, меж ними царила относительная гармония. Субъективных же причин было полным-полно: маловато опыта, маловато денег, да и сам Дзержинский сплоховал: тогда он еще не додумался снабжать революционные массы кокаином и спиртом.</p><p class="p">Ленин пытался как мог помочь восстанию: бегал по баррикадам, учил народ, как использовать против полиции гвозди и тряпки, смоченные бензином, но все это была чепуха. Потом Николай прислал из столицы Семеновский полк, и восстание захлебнулось. Всех его участников, кроме самых изворотливых, пересажали в тюрьмы. Революционеры возложили ответственность — как за организацию восстания, так и за его провал, — на Троцкого. Царская бюрократическая машина сработала безотказно, и несуществующий Троцкий был тоже посажен в тюрьму: во всяком случае, на его содержание там регулярно выделялись такие же деньги, как и на любого заключенного, а уж куда эти деньги шли на самом деле — вопрос открытый...</p><p class="p">Оставшиеся на свободе революционеры уехали в прелестный чухонский городок Куоккала и поселились всем скопом на вилле «Ваза». Там они целыми днями пили молоко (весь морозовский страховой полис был угрохан в революцию, купить более крепких напитков было не на что) и совещались. Тема всех совещаний и заседаний была одна: где брать новые деньги на революцию и на прокорм. Всем наконец стало ясно, что денег нужно в сотни раз больше, чем способны заработать Ленин — карточной игрой, а Андреева — передком. Нужно было содержать огромную партию, издавать всякие убыточные газеты, да и Феликс Эдмундович на свои представительские расходы тащил из кассы денег без счету.</p><p class="p">— Одной Машеньке, конечно, революцию не потянуть, — сказал Ленин. — Но ведь можно найти еще других красоток. — Он не стал рассказывать товарищам о том, что его жена могла бы подделывать деньги или, к примеру, картины старых мастеров и таким образом обеспечивать партию, потому что не хотел, чтобы бедняжку снова поймали и швырнули на каторгу: партия этого не стоила.</p><p class="p">— И получится бордель, — сказал Богданов.</p><p class="p">— А что такого?</p><p class="p">— Да ничего такого. Я просто констатирую факт.</p><p class="p">— Давайте лучше ограбим какой-нибудь банк, — предложил Красин.</p><p class="p">Это был коллега Кржижановского, инженер-электрик (электричество и социализм как-то всё тянулись друг к другу), милый, интеллигентный человек, недавно примкнувший к компании революционеров. Красин был одним из немногих, от кого в декабрьском восстании был хоть какой-то прок: он вывертывал лампочки, перерезал провода и вообще был дока по части саботажа и вредительства. Дзержинский ценил его за предприимчивость, а Ленин вообще симпатизировал всяким там ученым. Он любил фокусы.</p><p class="p">Предложение Красина всем пришлось по душе, но слово «грабеж» отталкивало. Хотелось назвать это как-нибудь поприличнее. Долго думали и сошлись на предложенной выдумщиком Кржижановским «экспроприации». Слово было очень элегантное, но трудно выговаривалось. Владимир Ильич, у которого со звуком «р» всегда были некоторые проблемы, не сумел произнести новый термин, как ни бился...</p><p class="p">— Экс! — наконец выпалил он торжествуя. — Эксы! Так можно это называть. И не нужно попусту ломать язык.</p><p class="p">Новое ленинское bon mot сразу всем чрезвычайно понравилось. Дзержинский поморщился, но возражать не стал: он был выше этого. Эксы так эксы. Однако когда Феликс Эдмундович предложил Владимиру Ильичу лично заняться организацией этих самых эксов, тот смутился и, сославшись на отсутствие опыта, отказался наотрез. (Он попросту отчаянно трусил.) Феликс Эдмундович тоже не желал грабить банки самолично, и вообще никто не желал вызваться — даже отчаянный смельчак Орджоникидзе, даже автор идеи Красин.</p><p class="p">Казалось, дело зашло в тупик, толком не начавшись. Но тут кто-то вспомнил об одном парне — армянине, бывшем типографском рабочем, уволенном не то за пьянство, не то за ссору с начальником: он теперь вынужден торговать на куоккальском вокзале семечками и постоянно жалуется на нехватку денег — малый отчаянный и достаточно безмозглый, чтоб заниматься грабежами в пользу кого-нибудь другого, довольствуясь малой толикою. Почти все революционеры покупали у него семечки. Семечки были отличные, и сам парень был действительно хороший: простодушный, энергичный и без особых запросов. Настоящая фамилия его была Тер-Петросян, но поскольку заниматься революционными делами под собственной фамилией считалось не comme il faut, а он, стоя на Бокзальной площади, всегда кричал «А вот камо, камо семячек!», то ему заочно решили дать революционную кличку Камо-семячек, а для краткости просто Камо. Побеседовать с Камо, объяснить ему все про царизм и большевизм и вовлечь в революционное движение, а также руководить его дальнейшей деятельностью было поручено Красину с Богдановым.</p><p class="p">— Оч-чень, оч-чень хорошо, — быстро сказал Ленин и радостно потер руки. — А я уж, так и быть, возьму на себя самое сложное: прием, учет и распределение эксп... экспр... короче говоря, коммунизированных средств.</p><p class="p">— Я буду помогать товарищу Ленину, — так же поспешно сказал Зиновьев. Он всегда любил отираться там, где пахло деньгами, даже если ему перепадали лишь крошки.</p><p class="p">— На кой хрен ты мне нужен?! — возмутился Ленин. — Обойдусь без помощничков.</p><p class="p">Но Зиновьев глядел с собачьей мольбою и корчил жалобную рожу... Несмотря на то что Каменев и Зиновьев были одного поля ягоды, относились к ним по-разному: Леву Каменева в партии все любили, и даже Феликс Эдмундович его терпел; Гришу же воспринимали прохладно (и поделом, потому что человек он был пустой и вздорный) и считали его разве чуть поумней глухонемого дурачка Кобы. Владимир Ильич подумал, что, в конце концов, Гришка был сыном сапожника и, стало быть, его собственная вина в том, что он вырос болваном, не так уж велика. Ленин вообще жалел тех, кого травили. Он слишком хорошо знал, как это бывает, — так что согласился, чтобы Зиновьев помогал ему вместе с Крупской: чинил перья, отвечал на телефонные звонки и поливал цветочки в конторе. Таким образом, всем революционерам нашлось какое-нибудь занятие.</p><p class="p">Красин с Богдановым побеседовали с Камо и, заручившись его согласием, выдали ему револьвер и кинжал. У Ленина завалялась нераспроданная партия фильдекосовых чулок; из них Крупская сделала маску. Для разминки Камо было велено ограбить булочную в Куоккале. Он справился с этим поручением удовлетворительно. Правда, поднялся ужасный шум: в тихой Куоккале еще никто никого не грабил. Трусливые меньшевики назвали эксы анархизмом, бланкизмом (лучшего комплимента для Дзержинского они и придумать не могли), терроризмом и босячеством. Большевики в ответ обозвали меньшевиков либералами. Отчаянным же эсерам пример большевиков понравился, и они ограбили кондитерскую лавку. Больше в Куоккале грабить было нечего, и Красин с Богдановым решили отправить Камо в Петербург, чтобы он там экспроприировал или, по выражению Ленина, скоммуниздил деньги из банка Купеческого общества взаимного кредита. Этот банк выбрали потому, что он принадлежал купцам, а купцов никто не любил, даже меньшевики.</p><p class="empty-line"/><p class="p">— Что ж, товарищи, он один поедет? — волновался Красин. — Ведь он и по-русски толком не говорит.</p><p class="p">— А зачем ему говорить? — возражал Богданов. — Он и по-фински не говорит, а взял же булочную. Покажет револьвер — все и без слов поймут, чего он хочет.</p><p class="p">— Хорошо, я согласен. Но булочная маленькая. А банк большой. Денег много, нести тяжело. Камо нужен напарник. Может быть, вы, уважаемый Александр Александрович?</p><p class="p">— А может быть, вы, уважаемый Леонид Борисович?..</p><p class="p">Но никто из большевиков по-прежнему не хотел ехать грабить банк, даже с напарником, ибо в глубине души все они были насквозь буржуазны и страшно боялись сесть в тюрьму. Феликс Эдмундович, которому надоели эти проволочки, послал грабить Купеческий кредит своих тайных агентов из партии максималистов, которые осуществили это мероприятие легко и изящно, и положил выручку на свой тайный счет в Цюрихе, поскольку считал — и совершенно справедливо, — что партия большевиков этих денег не заслужила. Большевики же сильно загрустили: им вовсе не улыбалось до конца своих дней сидеть на одном молоке.</p><p class="p">— Доктор, эдак можно ноги протянуть, — сказал Ленин Богданову, когда они прогуливались как-то поздним вечером по окраине Куоккалы. Он почти не лукавил: азартные игры в Финляндии были строжайше запрещены, а в Париж Дзержинский его пока что не отпускал, и они с Надеждой Константиновной жили исключительно на выручку от продажи чулок. — Вы же ученый. Придумайте какую-нибудь медицинскую аферу.</p><p class="p">— Право, Ильич, не знаю, что и придумать... — Богданов оглянулся. — Послушайте, вам не действует па нервы, что он все время за нами плетется?</p><p class="p">— Кто? Шпик?</p><p class="p">— Да Коба же. — Глухонемой, действительно, в часы, свободные от основного занятия — ловли крыс и выкалывания им глаз, — имел привычку ходить по пятам за каким-нибудь революционером; когда к нему поворачивались, он смущенно улыбался и мычал.</p><p class="p">— Противно, конечно. Но пусть себе плетется. Дурачок — что с него возьмешь?</p><p class="p">— Даже папирос купить не на что, — вздохнул Богданов. — А курить хочется — сил нет. Хоть бы прохожий какой встретился — стрельнуть папиросочку...</p><p class="p">И пару минут спустя, словно прочтя мысли доктора, из-за угла показался прохожий. Это был здоровенный чухонец; он шел медленно и курил папиросу. Когда он приблизился к революционерам, Богданов жестами — финского языка никто толком не знал — попросил у него закурить. Но чухонец никак не мог понять, что от него хотят; хуже того, он, по-видимому, наслушавшись рассказов о грабежах, вообразил, что иностранцы намереваются отнять у него кошелек, и толкнул Богданова в грудь так, что тот не удержался и сел на землю. Ленин хотел было вступиться за товарища, но внезапно — о ужас! — кто-то, как кошка, выпрыгнув из темноты, ударил финна сзади чем-то острым... Тот упал, обливаясь кровью, и Владимир Ильич увидел, как над поверженным телом, держа в руке окровавленный кинжал, с блуждающей, бессмысленной улыбкою стоит глухонемой...</p><p class="p">— Что ты сделал, дурак! — закричал Ленин, позабыв о том, что Коба глух как пень. И вдруг дурачок вместо обычного мычания раскрыл рот и пробормотал — с ужасным акцентом, но все же членораздельно:</p><p class="p">— Есть челавэк — есть праблэм. Нэт челавэк — нэт праблэм...</p><p class="p">— Что?! — опешил Владимир Ильич.</p><p class="p">— Отлэзь, шакал... — проворчал тот. Владимир Ильич, однако, удержался и не съездил его по физиономии — во-первых, бить такое ущербное существо рука не поднималась, а во-вторых, он был слишком потрясен тем, что Коба обрел дар речи, чтобы оскорбиться. Впрочем, Ленину тут же стало ясно, что дурачок не собирался его оскорблять, а просто мелет языком без всякого смысла, как попугай: — Коба хар-роший... В очэрэдь, жыдовский морда, в очэрэдь... Квакала, квакала!.. — И опять, как заезженная пластинка: — Коба хар-роший... — В темноте, подле залитого кровью трупа, эта белиберда звучала довольно жутко.</p><p class="p">Жертва меж тем пришла в себя — кинжал лишь скользнул по круглому боку чухонца. С ужасом отвергнув предложение доктора Богданова насчет медицинской помощи, куоккальский житель поднялся и побежал прочь. Он держался за бок и слегка прихрамывал, но бежал очень проворно, а бранился и кричал при этом так громко и энергично, что революционеры с облегчением поняли — угрозы для жизни чухонца нет никакой. Тогда они накинулись на Кобу с расспросами, увещеваниями и ругательствами; но тот снова замолчал и, как Ленин с Богдановым ни бились, не произнес больше ни словечка, а только приплясывал на месте и мычал, высовывая кончик нечистого, желтого языка. Потом он съежился, попятился и тоже куда-то удрал, мгновенно растворившись в ночной тьме.</p><p class="p">— Где он? Во тьме ночной пропал пирог мясной... Доктор, доктор, как вы это объясняете?!</p><p class="p">— Да как вам сказать, Ильич... Я слыхал изредка о подобных явлениях, когда немые — но не глухие, заметьте, — внезапно после потрясения обретают дар речи... Потом он может снова пропасть... Но чтобы глухонемой... Хотя, конечно, медицинская наука еще находится в зачаточном состоянии. Все может случиться. Надо б его обследовать.</p><p class="p">— Откуда он вообще взялся? — спросил Ленин.</p><p class="p">— Кажется, Феликс Эдмундович его где-то подобрал. Ведь он так благороден и гуманен по отношению к слабым.</p><p class="p">О да, подумал Ленин.</p><p class="p">— А вы не допускаете, доктор, что он все это время притворялся?</p><p class="p">— Феликс Эдмундович?!!</p><p class="p">— Нет, конечно, как вы могли подумать! Я говорю о Кобе. Мог он прикидываться глухонемым?</p><p class="p">— Теоретически — наверное, — подумав, сказал Богданов. — Но только чисто теоретически. Во-первых — с какой целью? А во-вторых — он же слабоумный. Хотя ежели он страдает аутизмом... Жаль, жаль, что я не психиатр...</p><p class="empty-line"/><p class="p">Даже небезызвестная Валаамова ослица, наверное, не наделала в свое время такого фурору, как заговоривший Коба. Поначалу революционеры и просто жители Куоккалы толпами бегали поглазеть на чудо, наперебой кормили несчастного пряниками и приставали к нему, требуя что-нибудь сказать; но, убедившись, что кроме «Коба хочэт кушать», «Коба хочэт жэньщину» и загадочной «квакалы», которую лучшим умам социал-демократического движения так и не удалось расшифровать, от него ничего не добьешься, постепенно теряли к нему интерес.</p><p class="p">Приходил полюбоваться на бывшего глухонемого и Дзержинский. Действительно, именно он когда-то подобрал и пригрел Кобу, хотя, конечно, не из любви к отверженным, как полагал наивный Богданов, а исключительно потому, что ему льстило наличие молчаливо преданного и беспрекословно повинующегося раба, хотя бы и недоумка. (Феликс Эдмундович не знал о несчастных крысах, иначе б, конечно, тотчас прогнал Кобу прочь — он обожал животных.) Он долго сверлил Кобу взглядом... «Лжет, — наконец решил он, — никогда он не был глухонемым. Все слышал. Но понимал ли что-нибудь? Нет, такое притворство невозможно. Иначе б это был не человек, а исчадие адское. Нет, нет, он ничего не соображает. Это тупое орудие будет служить мне верой и правдою». И он подарил Кобе большую плитку шоколада и коробку папирос и спросил, не желает ли тот взять какую-нибудь революционную фамилию, как все порядочные люди. Коба немного подумал и сказал робко — надо полагать, ориентируясь на пример Гриши Зиновьева, — что хочет называться Тюльпановым или, на худой конец, Рабиновичем. От этого Феликс Эдмундович весь перекосился и предложил ему простую и скромную фамилию Сталин, на что Коба после кратких уговоров дал согласие.</p><p class="p">Дзержинского всегда отличала от простых смертных дерзость и смелость мышления. Он распорядился помыть Кобу, обстричь ему ногти, одеть в приличный костюм и отправил его вместе с Камо в Тифлис — грабить банки. Никто не верил в успех этого предприятия. Но Феликс Эдмундович оказался, как обычно, прав: эта странная пара отлично справлялась с делом. Деньги полились рекою. Одна беда: Камо и Коба не умели читать, не различали достоинства банкнот и поэтому тащили исключительно крупные купюры, номера которых были переписаны, так что на размене многие большевизаны едва не погорели. Взяли и Камо, причем в Гамбурге, где он по наивности пытался расплатиться в борделе русской сторублевкой. Многое вынеся из общения с Кобой, армянин так убедительно изображал глухонемого идиота, что его не выдали российской полиции, а отправили в лечебницу, где несколько профессоров с интересом обследовали его — особенно всех интересовала загадочная «квакала». Остальным большевикам пришлось перебазироваться в Женеву... Эксы, конечно, все равно продолжались, но ими все чаще занимались простые безыдейные грабители, а революционерам ничего не доставалось. Нужно было искать другие способы заработка.</p><p class="p">— Ильич, а давай игорный дом откроем!</p><p class="p">— Надюша, в Швейцарии это тоже запрещено, — сказал Владимир Ильич.</p><p class="p">Сердцем, однако, он понимал, что жена права. Нужно было устроить подпольный игорный дом и найти для этой деятельности хорошее прикрытие. И, посовещавшись с Богдановым, он кое-что придумал: помимо денежных доходов, выдумка его позволяла еще и транспортировать нелегальную литературу...</p><p class="p">Через пару недель на одном из домиков в тихой женевской улице появилась вывеска: «Международное бюро похоронных услуг „Willkommen“. Бальзамирование. Лучшие парижские гробы. Экспресс-доставка покойников». Полицейский, заглянув туда, увидел ряды дубовых гробов; один из них раскрытым стоял на столе, и в нем лежал мертвый человек с белым лицом, подле которого суетились некрасивая дама с кисточкою в руках и чернобородый мужчина. Полицейский понял, что они заняты подготовкой усопшего к погребению, и, сняв головной убор, почтительно ретировался.</p><p class="p">— Как настоящий, — с гордостью сказал Богданов и отступил на шаг, любуясь своей работой. — Верно, Надежда Константиновна?</p><p class="p">— Красавец. — Крупская поправила ленту в венке. — Хоть на выставку.</p><p class="p">— Отлично, отлично, — сказал Ленин, входя и потирая руки. — Экие вы чудеса творите из обычного папье-маше! Газеты и прокламации уже упаковали?</p><p class="p">— Они под трупом.</p><p class="p">— Надя, ты сопроводительные документы подготовила?</p><p class="p">— А то как же. Вот, на трех языках.</p><p class="p">— Ну и славно. Отправляйте покойного в Москву. А по вечерам на втором этаже похоронного бюро</p><p class="p">горел свет, и двигались в окнах тени, и добропорядочные швейцарцы крестились, взглядывая на них. Там, внутри, уютно шелестели карты по зеленому сукну, и слышался звон монет, и хорошо одетые люди разговаривали тихими голосами. Впрочем, они могли не опасаться полиции. Вид покойников, уложенных в гробы, отбивал у блюстителей порядка всякую охоту любопытствовать. Когда же скорбящие родственники женевских умерших, привлеченные вывеской, заглядывали в «Willkommen», то их огорошивали такими бессовестными и ни с чем не сообразными ценами, что они тут же уходили восвояси. (Богданов, правда, желал заниматься настоящими трупами, но его отговорили: хлопотно и негигиенично.)</p><p class="p">Казалось бы, золото должно рекой политься, но вот беда: едва ли не самыми рьяными посетителями подпольного вертепа сделались большевики. Они брали деньги взаймы в партийной кассе и потом проигрывали их друг другу, и в результате партийная касса не только не росла, но даже убывала, потому что иногда большевики проигрывали партийные средства совершенно посторонним людям, а какой-то швейцарец ухитрился трижды сорвать банк при игре в покер.</p><p class="p">— Зачем же вы, Владимир Ильич, даете взаймы всякому? — негодовал Дзержинский.</p><p class="p">— Не всякому, а товарищам по партии, — огрызнулся Ленин. Но в данном случае он вынужден был признать правоту Железного. Касса съеживалась, как снеговик по весне.</p><p class="p">— Леонид Борисович, одних карт недостаточно; я рулетку хочу устроить, — сказал он Красину.</p><p class="p">— Замечательная мысль, — отвечал тот, — но чем я могу быть вам тут полезен? Я в азартных играх ничего не смыслю.</p><p class="p">— Вы же инженер!</p><p class="p">— Да, но какое...</p><p class="p">— Сделайте такую рулетку, чтобы можно было управлять шариком.</p><p class="p">— Гм... партия ставит передо мной интересную задачу, — сказал Красин. — Пожалуй, я посоветуюсь с Кржижановским.</p><p class="p">И он посоветовался с Кржижановским, и они сделали такую рулетку и запретили своим играть в нее, и деньги наконец-то повалили валом. Никогда прежде у революционеров не было столько денег. Теперь все они одевались у лучших портных и пили исключительно шампанское «Вдова Клико». Пожалуй, они уже могли бы предпринять новую попытку свержения Романовых. Но Феликс Эдмундович решил не спешить. «Неуспех переворота — это предостережение мне свыше. Провидение хочет мне сказать, что, покуда Михаил не взойдет на трон — ничего у меня не выйдет. Стало быть, я должен возвести его туда. Но как? Ума не приложу. Буду надеяться, что Провидение снова даст мне какой-нибудь знак».</p><p class="p">Феликс Эдмундович терпеть не мог русских и русский фольклор; тем не менее жил он в полном соответствии с русскою поговоркой «на Бога надейся, а сам не плошай». В ожидании знака от Провидения он вовсе не собирался сидеть сложа руки и купаясь в роскоши. Имелась масса всяких дел, которые необходимо было уладить. Первоочередным из них ему представлялась ликвидация потенциального конкурента — того самого мебельщика Шмидта, морозовского родственничка. Шмидт активно участвовал в попытке революции и пытался уже претендовать на первые роли. Этого допустить было нельзя.</p><p class="p">В деле имелись две трудности: во-первых, Шмидт после разгрома восстания сидел в Бутырках, а во-вторых, строгости в России в тот момент царили такие, что Феликсу Эдмундовичу никак невозможно было туда приехать нормальным образом, даже с фальшивыми документами и в какой-нибудь эксцентричной бороде. Но он привык решать проблемы по мере их поступления; не задумываясь покамест о проникновении внутрь тюремных стен, он нашел остроумный способ переправиться в Москву. И вскоре между ним и некоторыми товарищами состоялся разговор, который мог показаться постороннему слушателю довольно странным.</p><p class="p">— Женский труп лучше; в нем меньше весу.</p><p class="p">— Да они все у меня одного весу.</p><p class="p">— Все-таки с дамским трупом лежать приятнее.</p><p class="p">— Кому как.</p><p class="p">— Гриша, привяжи свой дурацкий язык на веревочку. А может быть, детский?..</p><p class="p">— Довольно споров, дети мои, — сказал Феликс Эдмундович, — на какой легче сделать документы, такой и кладите.</p><p class="p">Он лежал на дне глубокого гроба, скрестив на груди руки, и глаза его со спокойной кротостью глядели в потолок. Гроб был с дырочками для проникновения воздуха, с двойным дном; поверх Дзержинского укладывали покойника. Надежда Константиновна все мялась, не решаясь задать какой-то вопрос; наконец не выдержала и спросила, смущаясь:</p><p class="p">— Товарищ Железный! А ежели вам чего-нибудь... Дорога-то долгая.</p><p class="p">— О чем вы, товарищ Минога?</p><p class="p">— Об удовлетворении естественных потребностей, — пояснил Богданов: он тоже вспомнил о Баумане.</p><p class="p">— Настоящий революционер может целый месяц не иметь никаких потребностей, — отрезал гневно Феликс Эдмундович, — а ежели они возникают, их должно уметь обуздывать силою духа.</p><p class="p">— Дело хозяйское, — сказал Ленин. Но инженеры Красин и Кржижановский все-таки решили не полагаться на силу духа и снабдили гроб специальными устройствами...</p><p class="empty-line"/><p class="p">Путешествие было ужасно; но все когда-нибудь заканчивается. В начале февраля 1907-го Дзержинский восстал из гроба уже на конспиративной квартире одного из сочувствующих большевикам москвичей, по чьему адресу был направлен труп, принадлежавший, ежели верить документам, семнадцатилетней племяннице адресата, расставшейся с жизнью в Женеве в результате несчастного случая. («Что-то они в этой Женеве как мухи мрут», — замечал один таможенный служащий другому, впрочем, без особого любопытства.) Освобожденный из дубового плена Феликс Эдмундович и сам был похож на труп: иссиня-бледный, с ввалившимися ребрами и щеками, обросший щетиною. Он съел за один присест целого поросенка и бараний бок с гречневого кашей; ванной же комнатою хозяева квартиры не решались пользоваться в течение полугода после получения страшной посылки. Но все это были пустяки, не стоящие упоминания.</p></span>
