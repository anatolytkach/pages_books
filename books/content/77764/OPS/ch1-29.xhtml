<span><p class="p">Приподнявшись на подушках, он взял жену за руку. Ему страшно совестно было, что он и перед нею играет роль; но уж очень высоки были ставки в этой игре. Она могла неосторожно выдать свою радость, узнав, что он на самом деле здоров как бык. Лишь благодаря «болезни» Дзержинский пощадил его, а точнее, просто решил, что незачем убивать человека, и без того находящегося на краю могилы; быть может, он даже наслаждался сознанием того, что его соперник, слабый и немощный, вынужден из заточения смотреть бессильно на то, какую силу набрал Черный Крест. Да, последнее предположение ближе всего было к истине. Здесь, в Горках, Владимир Ильич номинально оставался руководителем страны; но его не тревожили, с ним не советовались, его игнорировали, к нему почти никого не пускали, а если и пускали, то лишь с такими новостями, которые должны были его расстраивать и бесить: товарищ Сталин делал доклад на Политбюро... выступление товарища Сталина пятьдесят пять раз прерывалось бурными, продолжительными аплодисментами... Товарищ Сталин, немытая гнида, ничего, кроме «квакалы» и «рэжь руски шакал и жыдов», сказать не умеющий! Понятно, кто дергает за ниточки! Понятно-то понятно; но слушать весь этот бред было невмоготу...</p><p class="p">Несколько раз к нему пытался прорваться верный шофер Гиль, но охранники-тюремщики его не пускали. Да что шофер! Охрана заворачивала и Бухарина, и Луначарского, и Глебушку Кржижановского. Спасибо, что хоть жену оставили! Уже полгода длилось его заточение; он все надеялся, что Дзержинский, убедившись в его бессилии, распорядится ослабить или вовсе снять охрану, но, похоже, надежда была напрасной.</p><p class="p">— Ильич, почитать тебе вслух? «Гамлета» — хочешь?</p><p class="p">— Нет, Надюша. — Он бы с удовольствием послушал что-нибудь легкое, Дюма, к примеру, или Арцыбашева, но ему казалось, что это как-то не вяжется с обликом тяжелобольного, почти умирающего человека. — Ты иди, рыбка. Я посплю.</p><p class="p">Когда жена, поправив одеяло, вышла из комнаты, он перевернулся на другой бок и стал размышлять о том же самом, о чем думал уже много месяцев. «Ну, выиграл я время; ну, избежал расстрела; и что? Лежу здесь бревно бревном, ничего сделать не могу. Одно хорошо: кольцо до сих пор не найдено, иначе б Железный уже провозгласил себя императором. Бежать нужно! Бежать из-под ареста и, переодевшись простым человеком, продолжать поиски волшебного кольца. Только так можно спасти и себя, и страну от Железного и его чудовищной куклы».</p><p class="p">Вся трудность заключалась в том, что, сбежав, он подставил бы под удар жену. Он уже слыхал — нет, не от нее, она молчала, не желая его огорчить, а от Каменева — о том, что говнюк Коба, повстречав ее как-то на улице, дернул ее сальной лапой за подол и прошипел, что, ежели она не перестанет вякать, они-де найдут «таварищу Ленину», когда тот наконец окочурится, другую вдову... Нет; он должен исчезнуть как-нибудь так, чтобы комар носу не подточил... Но как?! «Я изощряюсь в жалких восклицаньях и весь раскис, как уличная тварь, как судомойка! Тьфу, чорт! Проснись, мой мозг!» Однако он опять не смог ничего придумать и совсем расстроился.</p><p class="p">Ближе к вечеру жена сказала, что к нему гость; вид у нее был заговорщический, почти веселый, и он чуточку воспрял духом: гость, видимо, был неплохой. И действительно, это оказался симпатичный, милый человек, хотя и совершенно бесполезный: доктор Богданов... Ленин позволил жене взбить подушки, попросил ее организовать чайку, но запротестовал, когда она хотела перестелить постель: дело в том, что под одеялом у него была припрятана фляжка с коньяком. Богданов вошел; он принес торт и какое-то диетическое угощение. Надежда Константиновна организовала чаек и удалилась: идеальная супруга, она старалась не присутствовать при мужских разговорах.</p><p class="p">— Как же вас пропустили, батенька? — спросил Ленин.</p><p class="p">— Начальник охраны мне кое-что должен. Я его дочке абортец организовал — так, чтобы все шито-крыто...</p><p class="p">— Шито-крыто! — фыркнул Ленин. — Буржуазные предрассудки...</p><p class="p">— Да, никак их не изжить, — согласился Богданов; видно было, что он думает совсем о другом. Он вдруг нервно огляделся по сторонам, наклонился ближе к Ленину и прошептал еле слышно, одними губами:</p><p class="p">— Ильич, скажите честно: ведь вы не больны?</p><p class="p">— Нет, — ответил Ленин. Он и сам не мог бы объяснить, почему вдруг решился открыться Богданову.</p><p class="p">— Отлично! — обрадовался тот. — Я ведь, Ильич, все понимаю... Многие понимают.</p><p class="p">— Помогите мне бежать, доктор!</p><p class="p">— Легче легкого. — Богданов пожал плечами. — Мы подкупим того же начальника охраны...</p><p class="p">— Нет, нельзя! Ежели бы все было так просто, я бы давно удрал, — сердито отвечал Ленин. — Они схватят Надю, начнут ее трясти... А с собой я взять ее не могу — она уже немолода, здоровья слабого; она не выдержит на нелегальном положении и недели. Надо что-то выдумать эдакое...</p><p class="empty-line"/><p class="p">В тот вечер ничего «эдакого» они не выдумали; но пару недель спустя Богданов пришел снова и с порога заявил, что нашел способ. Глаза его горели, как у безумца; Ленин вспомнил, что большинство окружающих давно уже предполагали, что у доктора не все дома, и испустил вздох разочарования. «Какую-нибудь завиральную чепуху сейчас расскажет... Ну, пусть... Будет хоть над чем посмеяться...» Он спросил Богданова, что же это за способ.</p><p class="p">— Слушайте, Ильич, я... я уже больше двух лет работал над одним изобретением медицинского характера... Это изобретение должно было перевернуть всю науку! И я наконец добился результата! Это грандиозно, немыслимо! Но это — есть!</p><p class="p">— Да о чем вы, батенька?</p><p class="p">Богданов сделал строгое лицо, нагнулся к самому уху мнимого больного и прошептал:</p><p class="p">— Ильич, я изобрел живую и мертвую воду! Это препараты, полученные на основе человеческой крови...</p><p class="p">— Ну-ну... Доктор, я давно вышел из того возраста, когда верят в сказки.</p><p class="p">Но Богданов, горячась и брызгая слюною, принялся уверять, что это вовсе не сказка, а современнейшее научное достижение; можно называть изобретенные им снадобья как угодно, но суть их действия заключается в следующем: «мертвая вода», если ее выпить, замедляет все реакции в организме до такой степени, что человек внешне выглядит как труп и не испытывает абсолютно никаких физиологических ощущений, но при этом остается жив, хотя и без сознания.</p><p class="p">— Жаль, что я не сделал этого изобретения раньше, — прибавил он. — Тогда бы с Бауманом не получилось такого конфуза.</p><p class="p">— Да уж...</p><p class="p">— Кроме того, — сказал радостно Богданов, — «мертвая вода» оказывает эффект омоложения и оздоровления.</p><p class="p">— Угу, — буркнул Ленин. — Много радости от вашего омоложения, ежели так и будешь лежать бесчувственной колодой.</p><p class="p">— Вы меня не дослушали. Вы выпьете «мертвую воду», вас похоронят...</p><p class="p">— Спасибочки!</p><p class="p">— Да перестаньте же меня перебивать, невежа вы этакий! — воскликнул выведенный из терпения ученый. — Врачи констатируют смерть, вас похоронят, произнесут речи... А я потом вытащу вас из гроба и дам выпить «живой воды». Вы сразу очухаетесь и будете как новенький — на двадцать или даже двадцать пять лет здоровей и моложе прежнего. И пойдете себе спокойно, куда вам вздумается. Между прочим, не исключено, что вы сделаетесь бессмертным; этого я пока проверить не мог, ибо всего несколько месяцев тому назад сделал свое открытие.</p><p class="p">— Так вы... вы уже проверяли ваши зелья?</p><p class="p">— Да; на кошках, — ответил доктор.</p><p class="p">— На кошках!</p><p class="p">— Старая, дряхлая, двенадцатилетняя кошка, которую я едва живою вырвал из рук Кобы, превращается в резвого котенка! Бегает и играет! У нее даже заново вырос хвост!</p><p class="p">— Хвост — это, конечно, впечатляет... — пробормотал Ленин. — Но, доктор, я-то не кошка...</p><p class="p">— Физиологические реакции всех млекопитающих однотипны. Вы же верите в теорию Дарвина?</p><p class="p">— Да чорт ее знает, — отвечал Ленин. После того, как ему явился призрак Троцкого, он из материалиста превратился в убежденного агностика и сомневался во всем — иногда даже в собственном существовании. — Знаете что, Богданыч? Я пока не готов. Давайте как-нибудь по-простому. Воду свою на ком другом опробуете, а уж я найду способ уйти...</p><p class="empty-line"/><p class="p">— Я рабочий, — повторял рабочий. — Я кузнец. Кузнец, Ильич!</p><p class="p">Вероятно, им сказали, что Ленин глух. Идиоты! Рабочую делегацию допустили к нему только для того, чтобы рассеять слухи о его болезни и пресечь панику. Поговаривали, что Ленин неизлечимо болен, утратил рассудок, а без него все покатится в тартарары! Рабочие всегда полагали, что пока Ленин жив — им ничего не угрожает. Первая такая паника прокатилась по России, когда в него стрельнула бедная глупышка Фанни — дай бог ей здоровья и счастья в личной жизни... Рабочие тогда настолько перепугались, что ему, еще бледному от ранения, пришлось, дабы их успокоить, вторично выступить у Михельсона и рассказать анекдот с того самого места, когда его прервал выстрел.</p><p class="p">— Я кузнец, — повторял кузнец. — Мы скуем все, намеченное тобой.</p><p class="p">Ленин пристально вгляделся в рабочего и чуть не отшатнулся. Это был Лепешкин, чистый юноша Лепешкин, с которым они когда-то так отлично провернули бауманское чудесное воскрешение!</p><p class="p">Он крепко обнял Лепешкина и прошептал ему в самое ухо:</p><p class="p">— Стоять смирно, Яшка! Ты давно в кузнецах?</p><p class="p">— С десятого, — так же шепотом ответил потрясенный Яшка. — Ты что, помнишь меня, Ильич?</p><p class="p">— Не дергайся, идиот! Слушай, что ты сейчас сделаешь. Сейчас ты спокойно уйдешь и приготовишь мне жилье на первое время, а через месяц заберешь меня отсюда. Я потребую, чтобы тебя пустили в Горки. Сам вызову. У меня кое-какие дела остались. А потом я уйду, потому что здесь оставаться нет никакой возможности. Понял?</p><p class="p">— Понял, — энергически закивал Лепешкин.</p><p class="p">— Я тебя вызову, повезешь меня на прогулку. Подготовишь дыру в заборе. Я скажу, чтобы тебя отрядили чинить. Понял? И чтобы чисто у меня! Иначе я такое с тобой сделаю! Я все теперь могу!</p><p class="p">— Я... Ильич... все намеченное тобой...</p><p class="p">— Ступай, — громко и по слогам сказал Ленин, имитировавший в последнее время затруднения с речью. — Эта... эта... кузнец!</p><p class="p">Все зааплодировали.</p><p class="p">— Эта... эта... пусть кует!</p><p class="p">— Что, что, Ильич?! — волновалась Надя.</p><p class="p">— Забор... дыры там... зайцы... ходют... Ходют, ходют. Топ-топ. Ме-ша-ют мыс-лить.</p><p class="p">— Всех расстрелять! — крикнул комендант Горок, бывший матрос Кулигин.</p><p class="p">— Нель-зя, выстрелы мешают мыслить, — с усилием проговорил Ленин. Забор заделать. Эта, кузнец. Дать работать. Я знаю кузнеца.</p><p class="p">Надя Крупская прочла много книг и знала, что иногда зрелище сильного, простого человека из народа помогает тяжелобольным. Лепешкина пустили работать на территорию Горок. Через две недели все было готово.</p><p class="p">В октябре 1923 года Ленин потребовал отвезти себя в Кремль. Задачи, собственно, у него там были простые и всего две. Первая — положить кое-что в ящик стола в его кремлевском кабинете. Вторая — забрать кое-что из этого ящика.</p><p class="p">«Дорогие товарищи! — написал он на фирменном совнаркомском бланке, которыми его продолжали снабжать и в Горках. — Заехали мы с вами куда-то совсем не туда. Я думал, что можно сделать революцию, а вместо революции у нас сплошная кровь и разруха. Гражданская война меня добила, а ЧК вообще превратилась в главную государственную службу. Это хрень, архихрень, товарищи, я этого не хотел, товарищи. Я думал повеселиться, а получилось чорт-те что. В другой стране все могло быть иначе, но тут у нас только и ждут повода поубивать друг друга. А главное — очень все скучно, и могу предчувствовать, что скоро начнут веселиться нашим обычным способом. Всем товарищам большевизанам от души советую уйти, как сделаю это сейчас я. Искать меня вам не рекомендую, потому что все равно не найдете. Мы, большевизаны, отлично умеем прятаться. Если даже мы все уйдем, революция в России уже все равно не остановится, но советую вам на всякий случай ввести новую экономическую политику, то есть постепенно вернуться ко временам, когда можно было хоть покушать. И давайте в Женеву, а не то в Цюрих, явки я все помню и, если что, помогу. Проживем, сделаем второй „Интернационал“. А здесь добра не будет, я вам точно говорю. Здесь одна половина народа валит другую половину, и так по очереди. А счастья нет. Поэтому я пошел, и вы давайте тоже. А на хозяйстве можно пока подержать Кобу, этот уж точно ничего не испортит. Он, правда, слишком глуп (потом это слово прочитали как „груб“), поэтому для контроля можно поставить Бухарина и Пятакова. Ваш Ленин».</p><p class="p">Написал сверху размашистое «Письмо к съезду», перечитал и сделал приписку:</p><p class="p">«А Феликсу я не верю, и вы не верьте. Феликс хочет власти. Доказывать я это сейчас не буду, а просто говорю, что я тебе, Феликс, не верю, и не люблю тебя, Феликс. И в партию тебя больше не возьму. Товарищи, не слушайте Феликса! Он не железный, железных не бывает. Он деревянный, а это неинтересно».</p><p class="p">Подумал еще чуть-чуть и приписал для бодрости:</p><p class="p">«Главное — хвост пистолетом! В. Л.»</p><p class="p">Он еще раз перечел письмо. Вроде бы все там было, но чего-то не хватало. Чего? Он никак не мог сообразить; он стал думать обо всем подряд. Мысли разбегались. «Если письмецо от Алешки придет — хранили чтоб до моего возвращения...» (Он все ждал ответа на свое письмо племяннику в Австралию.)</p><p class="p">Вечером 20 октября Ленин неожиданно приехал в своей кремлевский кабинет. Старательно имитируя дряхлость и усталость, поднялся по знакомой лестнице, открыл дверь, выдвинул ящик стола, положил туда письмо к съезду, пошарил, выгреб то, за чем ездил... Три источника и три составные части, так и лежавшие все это время в столе, никуда, слава богу, не делись. Наперстки еще могли пригодиться в новой жизни, которую он намеревался начать.</p><p class="p">Он ушел бы уже тогда, но возникли непредвиденные сложности — за работой Лепешкина следили в три глаза, и только к январю наконец готова была тайная дверь в ограде, замаскированная под секцию забора.</p><p class="p">Утром 21 января Ленин чувствовал страх и радость. Все должно было получиться, не могло не получиться.</p><p class="p">«Кузнеца», — написал он левой рукой на бланке Совнаркома. Лепешкин впрягся в санки и повез Ленина кататься. Ленин смеялся тонким идиотическим смехом.</p><p class="p">Как только они свернули за первый поворот, Ильич ткнул Лепешкина тростью в спину:</p><p class="p">— Гони, мать твою! К забору!</p><p class="p">Лепешкин припустил рысью. Охрана отстала.</p><p class="p">— Там... кони ждут, — обернувшись, выпалил Лепешкин. — Я приготовил все...</p><p class="p">— Молодца. Самому-то есть потом куда деться?</p><p class="p">— А то! — закричал Лепешкин и поскользнулся. Сани опрокинулись, Ленин выпал в снег. Сзади догоняла охрана.</p><p class="p">— Беги, идиот! — заорал Ленин.</p><p class="p">Грянул выстрел. Лепешкин бежал ровно, как конь, бросив ненужные сани. Ильич, путаясь в тулупе, поспешал следом. Забор был уже близко. Около него топтался высокий мужик, в котором Ленин с удивлением узнал Железняка. Матрос давно скрывался, разочаровавшись в большевизме, и считался убитым.</p><p class="p">— Я уж устал тут, — сказал Железняк. — Быстрей, быстрей...</p><p class="p">Ленин и Лепешкин выбили фальшивую секцию ограды и плюхнулись в сани.</p><p class="p">— Гони! — заорали они хором.</p><p class="p">— Стоять! — кричали из Горок.</p><p class="p">— Выкуси! — ответил Ленин. — Поздно! Во тьме ночной пропал пирог мясной!</p></span>
