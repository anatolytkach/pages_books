<body class="z">
<span><div class="epigraph">
<p class="p">Во тьме ночной </p>
<p class="p">Пропал пирог мясной. </p>
<p class="p">Пропал бесследно, безвозвратно, </p>
<p class="p">Куда и как девался — непонятно.</p>
<p class="text-author">Н. Ленин</p>
</div><div class="epigraph">
<p class="p">Прост. Прост, как правда.</p>
<p class="text-author">М. Горький</p>
</div><div class="epigraph">
<p class="p">Вот лежит газета «Правда». </p>
<p class="p">В ней написана неправда.</p>
<p class="text-author">Народное</p>
</div><p class="empty-line"/></span>
