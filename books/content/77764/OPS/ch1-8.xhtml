<span><p class="p">— Стало быть, я угадала верно! Я хочу просить, чтоб вы хранили молчание и не выдавали меня. Я искренне люблю Алешу, а он считает меня честным, благородным человеком. Он может меня разлюбить, ежели узнает.</p><p class="p">— Зачем по двадцать раз просить об одном и том же? — рассердился Ленин. — Я вам уже обещал сделать все, чтобы утаить вашу неприглядную роль в этом деле.</p><p class="p">— Благодарю вас... А я за это могла бы доставать для партии... и для вас лично еще денег...</p><p class="p">— Как это?!</p><p class="p">— На свете есть и другие богатые люди, кроме Морозова. Я могла бы их пощипать немножко...</p><p class="p">— Вы, Каренина моя, ненормальная, — сказал Владимир Ильич. — Во-первых, я и так вас не выдам, и не нужно мне никаких ответных одолжений. Во-вторых, как это предложение вяжется с тем, что вы «искренне любите Алешу»?</p><p class="p">— Ах, я так тоскую по временам, когда была агентом товарища Железного! Мне безумно хочется опять участвовать в борьбе! Пароли, явки, тайные встречи... Жизнь так скучна! Риск придает ей остроту! Я буду соблазнять миллионеров по всему миру и отдавать партии...</p><p class="p">— Двадцать пять процентов?</p><p class="p">— Двадцать, — быстро сказала Андреева. </p><p class="p">«Только чорт может понять женщину, — подумал Ленин. — А эта, видимо, без сутенера жить не способна... Железный, сам того не зная, развратил ее вконец. Ну да пусть делает что хочет. Бедняга Горький! Теленок!»</p><p class="empty-line"/><p class="p">Погода в Канне была чудесная; Дзержинский, Ленин и Морозов прогуливались по набережной и вели чинную беседу...</p><p class="p">— ...сейчас, например, я сижу в Варшавской тюрьме, — говорил Дзержинский: ему хотелось произвести на миллионера впечатление.</p><p class="p">Он ничем не рисковал, делая Морозову такие признания: ведь тот не знал ни его настоящего имени, ни подлинной наружности. Он был одет и загримирован под калмыка и весь обложен подушками под халатом, так что казался по меньшей мере втрое толще обычного.</p><p class="p">— Как то есть в тюрьме? — не понял Морозов.</p><p class="p">— Так думает царская охранка. (Тюремное заключение отбывал в настоящий момент один из многочисленных двойников Феликса Эдмундовича.) На самом деле я вездесущ.</p><p class="p">— Скажите пожалуйста!</p><p class="p">— Вездесущ и всемогущ, — небрежно бросил Дзержинский. — Вы не пожалеете, что связались со мной и моей партией.</p><p class="p">— Я вам сейчас объясню причины, побудившие меня к этому...</p><p class="p">— Вообще-то мне все равно, — сказал Дзержинский и поправил на голове тюбетейку. — Вы можете не называть этих причин. Мы и так согласны принять вашу бескорыстную помощь.</p><p class="p">— Нет-нет, г-н... товарищ Железный! Я непременно должен их назвать, ибо моя помощь не вполне бескорыстна...</p><p class="p">— Вот как?!</p><p class="p">— Видите ли, я желаю быть монархом, — спокойно сказал Морозов.</p><p class="p">— Кем вы желаете быть?! — переспросил Ленин, думая, что ослышался.</p><p class="p">— Царем. Императором всероссийским. Ведь вы намереваетесь свергнуть Николая?</p><p class="p">— Да, но...</p><p class="p">— И правильно делаете, — сказал Морозов. — Николай никуда не годный монарх. Я был бы гораздо более эффективным, прогрессивным и конституционным. У меня огромный опыт в обустройстве предприятий; я и Россию сумею обустроить, ручаюсь вам. У меня рабочие, крестьяне, купцы, актеры, писатели — все будут жить достойно. Бедных — не будет. Ведь к этому стремится ваша партия?</p><p class="p">— Гм-гм, — сказал Ленин.</p><p class="p">Он был честный человек и не мог не признать, что из предприимчивого Морозова вышел бы лучший монарх не только по сравнению с Николаем — как минимум каждый второй житель России, включая женщин и несовершеннолетних, мог бы править лучше Николая, — но, пожалуй, и в сравнении с ним самим. «Но как же Савва может надеяться стать царем? Неужто он тоже с Романовыми в родстве?! И о кольце знает? Или это у него блажь?» — лихорадочно соображал Владимир Ильич. Он так увлекся своими мыслями, что не обратил внимания на изменившееся лицо Дзержинского... А Морозов глядел на них обоих ясными глазами и улыбался.</p><p class="p">— Верно ли я вас понял, — медленно проговорил Дзержинский, — что вы рассчитываете в результате переворота или революции взойти на трон? И деньги даете нам именно в расчете на это?</p><p class="p">— Куда уж верней. Вы умный человек и должны признать, что это будет справедливо и разумно.</p><p class="p">— А вы что же, царских кровей? — спросил Дзержинский. «Впрочем, это не имеет уже значения, — думал он, — в любом случае конкурент опасный...»</p><p class="p">— Нет, конечно! — воскликнул Морозов и рассмеялся. — Кровь — чепуха, предрассудки. Наиболее прогрессивными царями российскими были Годунов, Отрепьев и Екатерина. Царей должно избирать не по крови, а по уму. Я бы вообще предпочел республиканскую форму правления, но народ наш к этому еще не готов.</p><p class="p">— Однако, — медленно сказал Дзержинский. — Бы же не можете не знать, что мы ставим своей целью именно народовластие... и никакой монарх при новом строе немыслим...</p><p class="p">— Ах, да хоть горшком кличьте, только в печь не ставьте, — снисходительно улыбнулся Морозов. — Я думаю, среди своих можно и не прибегать к эвфемизмам. Назовите «Благодетель», или «Старший пролетарий», или «Первый среди равных» — вы ведь, я полагаю, выдвигаете равенство как непременный лозунг? Но мы-то с вами знаем, что никакого равенства нет. Может, вы с ним равны? — и он кивнул на элегантного, типично европейского нищего, со скромным достоинством протягивавшего им соломенную шляпу. — Пшел, пшел, милейший, allez venez, travalle!<a href="ch2.xhtml#id1" class="a">[2]</a> И даже мы с вами неравны, — продолжал Морозов невозмутимо. — Вы, господин Ленин, обладаете прекрасными задатками агента, вербовщика, связного, вы потерлись среди людей, это видно... но какой же из вас верховный правитель или даже, простите, коммерсант? Ваш потолок — пятисотрублевая сделка, вы больше тысячи рублей сроду в руках не держали, и я это не в обиду, не в обиду вам говорю! Всякому свое... Я, напротив, ущербен в отношениях с людьми, нет во мне этой счастливой способности располагать к себе с первого взгляда, и женщинам всегда нужно было от меня только одного — денег... Но как раз с деньгами у меня никогда затруднений не было — они меня без слов понимают, куда надо, туда и текут. Или взять вас, — отнесся он к Феликсу. — Вы человек разумный и хладнокровный, но посмотрите, друг мой, на себя. Может ли так выглядеть российский монарх? В лучшем случае вождь евразийской партии, буде такая появится в наших палестинах... Не хочу вас обидеть, господа, но лучшей кандидатуры, чем я, вы не найдете. Управление сильное, разумное, европейское, но не без русского стержня, не без вот этого! — он поднес к носу Ленина крупный белый кулак. — Наш народ рохля, тютя, ему надобно показывать силу. Для декору заведите парламент, раду, вече — как угодно. Но трон — это, извините, вынь да положь. На этом условии готов предоставить в ваше распоряжение такие суммы, по сравнению с которыми эти — так, тьфу...</p><p class="p">— Гм-гм, — повторил Ленин. «Пусть он будет царем, а я премьером, так тоже неплохо, и ответственности поменьше... Что это, я уж и готов отказаться от престола?!» — Но для чего же вы оформили в нашу пользу еще и страховку? Ведь если вы умрете, то никак не сможете быть царем.</p><p class="p">— Это мне и хотелось с вами обговорить. Возможны разные обстоятельства. Купечество наше меня не любит, родня давно желает моей смерти, пытается объявить сумасшедшим... Все рассчитывают, что если я умру — им достанется наследство. Фигу! — Морозов сложил фигу и расхохотался, рассматривая ее. — У меня есть родственник. Николай Петрович Шмидт. Совсем еще молодой человек, но очень способный. Организовал лучшую в России мебельную фабрику. Он тоже может быть прекрасным правителем России. Я уверен, что вы, как благородные и честные люди, возведете на престол его, если я не доживу до победы нашего дела.</p><p class="p">— О, доживете, уверяю вас, — сказал Дзержинский.</p><p class="empty-line"/><p class="p">На следующий день в отель к Морозову явился посетитель; то был стройный, худощавый, гладко выбритый человек европейской наружности, одетый в прекрасную пиджачную пару. Он в чрезвычайно учтивой форме осведомился, имеет ли дело с «тем самым» Морозовым, текстильщиком и миллионером; получив утвердительный ответ, он проговорил со строгим и печальным выражением лица:</p><p class="p">— Боюсь, Савва Тимофеевич, что вы попали в крайне затруднительное положение.</p><p class="p">— А вы, собственно, кто такой?</p><p class="p">— Я представляю Третье отделение, — сказал гость.</p><p class="p">— Охранку!</p><p class="p">— Можете и так называть. Я пришел сообщить вам, уважаемый Савва Тимофеевич, что нам все известно о ваших тайных делишках с бандитами, которые хотят свергнуть законную власть...</p><p class="p">— Никаких тайных делишек ни с какими бандитами у меня нет, — ответил Морозов. — И я прошу вас сейчас же оставить этот дом.</p><p class="p">— Ах, Савва Тимофеич! — воскликнул гость и поглядел на Морозова со странным выражением насмешки и жалости. — Вы так неопытны в конспирации! Мы следили за вами... Вы оказали нам огромную услугу: вы сами привели нас к гнезду этих подлых, безбожных и бессовестных бандитов. Теперь мы без труда схватим их главаря — этого гадкого жирного калмыка по кличке Железный — и повесим его. И вас тоже.</p><p class="p">— Все это чушь собачья, — сказал Морозов, — и я не понимаю, для чего вы говорите мне это.</p><p class="p">— Хотите, я воспроизведу весь ваш вчерашний разговор с Железным? Вы говорили ему, что надеетесь на государственный переворот и желаете стать царем... Этот Железный — гнусный провокатор. И тот рыжий, лысый — тоже. Я слежу за ним второй год. Вы доверились мерзавцам... Мне продолжать? — спросил гость, когда Морозов тяжело опустился на диван, словно ноги не держали его.</p><p class="p">— Нет, не продолжайте... Но зачем же...</p><p class="p">— Видите ли, я втайне сочувствую вашему делу, — сказал гость. Светлые глаза его были серьезны, но тонкие губы кривились в бесовской улыбке. — Я решился вас предупредить, жестоко рискуя.</p><p class="p">— Я сейчас же уеду, — заволновался Морозов.</p><p class="p">— Поздно, дорогой друг... Поздно! Вы уже погубили всю организацию. А в ней состоят не одни только мужчины. Там сотни женщин, детей...</p><p class="p">— Как — детей?!</p><p class="p">— Да, да, детей, невинных детей: они разносят листовки, прокламации и всякое такое... — теперь в голосе посетителя звучали слезы. — Из-за вашей неосторожности они должны погибнуть. Вы-то, может быть, еще откупитесь или останетесь в эмиграции и так спасете свою жизнь, а эти женщины и дети — нет...</p><p class="p">— Я обесчещен навсегда! — простонал Морозов, хватаясь за голову.</p><p class="p">— И еще хуже, — продолжал гость, словно вколачивая гвозди в крышку гроба, — ваши фабрики, как имущество государственного преступника, будут конфискованы в казну... Да-да, — прикрикнул он, видя, что Морозов глядит недоверчиво, — сейчас, когда раскрывается такой ужасный заговор, царь не будет соблюдать обычных порядков! Ваши рабочие, о которых вы так печетесь, достанутся какому-нибудь жестокому, подлому эксплоататору; или, быть может, их всех тоже повесят — ведь вы, наверное, и их успели уже втянуть в революцию?</p><p class="p">— Что же мне делать?!</p><p class="p">— Есть способ... Но только очень смелый человек может решиться прибегнуть к нему. Если вы... ах, право, мне тяжело произносить эти слова.</p><p class="p">— Говорите же, — настаивал Морозов и вдруг отшатнулся в ужасе: он понял.</p><p class="p">— Да, да... Если вы сейчас, пока заговор еще не раскрыт окончательно, покинете этот мир — ваше имущество достанется законным наследникам. Да и организацию, быть может, еще удастся спасти...</p><p class="p">— Как?!</p><p class="p">— Возьмите всю вину на себя. Скажите, что это вы единолично готовили государственный переворот.</p><p class="p">Теперь прозрачно-зеленые глаза гостя не отрывались от глаз Морозова; похоже было, что он гипнотизирует его... Савва Тимофеевич, парализованный этим змеиным взором, даже не пытался сопротивляться. Он вздохнул беспомощно, по-детски, и проговорил прерывающимся голосом:</p><p class="p">— Я... я должен написать записку?</p><p class="p">Гость молча кивнул и подал Морозову бумагу и перо. «Я, Савва Морозов, — твердо и повелительно диктовал он, нагнувшись над плечом Морозова и следя за каждой буквой, которую тот выводил дрожащей от волнения рукою, — я, Морозов, объявляю, что...»</p><p class="p">— Ага, хорошо, — сказал гость, закончив диктовать признание. — Теперь, пожалуйста, начните новый абзац. «Убиваю же сам себя сегодня из револьвера не потому, что раскаиваюсь и вас боюсь, а потому, что имел в России намерение прекратить свою жизнь». Число, подпись свою поставьте... теперь еще подпишите «Vive l'emperieur», и довольно.</p><p class="p">— Зачем же «Vive l'emperieur»? — спросил Морозов, поднимая полный муки взгляд на гостя.</p><p class="p">— Да уж так надобно. — Гость выхватил из трясущейся руки Морозова лист бумаги и помахал им в воздухе, просушивая чернила.</p><p class="p">Морозов был страшно бледен, губы его прыгали, лицо кривилось; он вскочил с дивана, быстрым жестом схватил с окна револьвер, выбежал с ним в спальную комнату и плотно притворил за собою дверь. Дзержинский постоял с минуту в раздумье, глядя на дверь. «Если сейчас, так, пожалуй, и выстрелит, а начнет думать — ничего не будет». Он каждый миг с мучительным беспокойством прислушивался и — вдруг озлился. Из всей силы он толкнул ногой дверь; но ни выстрела, ни крика... В спальне никого не было. «Неужто в окно убежал?» В самом деле, в одном окне отворена была форточка. «Нелепость, не мог он убежать через форточку». Феликс Эдмундович прошел через всю комнату прямо к окну. «Никак не мог». Он стремительно обернулся.</p><p class="p">В углу, образованном стеною и шкафом, стоял Морозов, и стоял ужасно странно — неподвижно, вытянувшись, протянув руки по швам, приподняв голову и плотно прижавшись затылком к стене, в самом углу, казалось желая слиться с обоями, спрятаться. Сердце Дзержинского стало сильно биться... И вдруг им овладело совершенное бешенство: он сорвался с места, закричал и, топая ногами, яростно бросился к страшной фигуре. Но, дойдя вплоть, он остановился как вкопанный: фигура не двинулась, не шевельнулась — точно окаменевшая или восковая. Дзержинский задрожал и, не помня себя, крепко схватил Морозова за плечо; но тот нагнул голову, и в то же мгновение Дзержинский почувствовал ужасную боль в мизинце своей левой руки. Он закричал и бросился вон из комнаты, а вслед ему летели ужасные крики:</p><p class="p">— Сейчас, сейчас, сейчас, сейчас...</p><p class="p">И наконец раздался грохот выстрела... Дзержинский воротился и глянул в спальню. Морозов с простреленной грудью лежал на постели. Дзержинский усмехнулся немного нервно, снова взял записку, аккуратно оторвал ту часть, где было написано признание, и сжег ее в пепельнице. Остались только последняя фраза, число, подпись да дурацкий лозунг «Vive l'emperieur». «Отлично, — подумал Дзержинский, — все решат, что он был не в своем уме. Еще остался его родственничек, как бишь его... Шмидт. Ну, не все сразу».</p><p class="empty-line"/><p class="p">Известие о самоубийстве Саввы Морозова очень опечалило Ленина. Он ничего не понимал. «Наверно, он все-таки врал мне, что не жил с Андреевой и не любит се. Как это глупо — покончить с собою из-за несчастной любви! Впрочем, говорят, что он был малость не в себе — записку оставил какую-то странную...»</p><p class="p">— Очень, очень жаль, Владимир Ильич. Болтают, будто у него с головою не все было в порядке. Вы ничего такого не замечали, общаясь с ним?</p><p class="p">— Нет. Напротив, он производил впечатление очень умного человека, — сказал Ленин. — И царь из него вышел бы хороший... Вы согласны?</p><p class="p">— Да, разумеется. Я ужасно расстроен этой смертью.</p><p class="p">— А что это у вас с пальцем, Феликс Эдмундович? — Мизинец левой руки Дзержинского был забинтован.</p><p class="p">— Так. Собака укусила.</p><p class="p">— Укольчики сделать не забудьте. Не то кончите, как Морозов...</p><p class="p">Ленину и в голову не пришло, что у Дзержинского могла быть причина резать курицу, несущую золотые яйца. Страховой полис, оформленный на Горького? Но живой Савва дал бы больше. Владимир Ильич так и не сумел разгадать этой загадки и всякий раз, вспоминая Савву, испытывал грусть и недоумение.</p></span>
