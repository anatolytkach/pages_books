<span><p class="p">Между тем партия росла, ибо нет лучшей рекламы, чем тайна. Загадочные заграничные вожди, случаи чудесных воскресений, сказочные богатства, слухи о которых доходили до России, — все это привлекало рабочих к партии освободителей, но что делать с этими рабочими большевизаны понятия не имели. В Париже круглосуточно кипели бесполезные дискуссии о тактике, в которых Ленин с Дзержинским, разумеется, не участвовали. Оба понимали, что главное — деньги, а там вороти что хочешь.</p><p class="p">Только здесь Ленин догадался, что газета — действительно универсальный способ протянуть ближайшие года три, а если дело сладится — то и шикануть. Иногда он просматривал русские газеты: писали в них такую чушь, что он, окажись у него избыток свободного времени, мог бы стать ведущим журналистом в любой. Переводили французские заметки о путешествиях и изобретениях, долго и подробно, с мучительным русским занудством ругались с английскими или шведскими публицистами, доказывавшими, что самодержавие изжило себя; выясняли причины экономических неудач, ругали жидов, обвиняя их в убийстве Столыпина... как будто убийство Столыпина могло иметь хоть какое-то значение для страны, в которой все и так летит в задницу! Больше всего эти долгие газетные полемики были похожи на вялую, скучную ссору, разыгравшуюся на тонущем корабле, причем и сам корабль тонул как-то неуверенно, медленно, унизительно, словно говоря всем своим видом: «Простите, господа, что приходится гибнуть без настоящего эффекта; жили смешно и тонем смешно... буль!» После чтения русских газет Россию становилось невыносимо жалко: страна была хорошая, Ленин имел об этом полное представление, и люди в ней были талантливые, и запасы неистощимые, — но по странной прихоти судьбы наверху оказывались только худшие люди, и в газеты писали они же. Все настоящее в России жило подспудно, все истинно талантливое было запрещено... Взять хоть его: с того самого проклятого пятого года, когда он мелькнул на нескольких баррикадах, въезд в страну для него опасен. Что ж теперь, вечно за границей пропадать? А ведь доведись ему управлять страной, он дал бы простор творческой инициативе! У него каждый мужик крутил бы рулетку или спекулировал акциями, а деньги, как следует из новейших экономических теорий, делались бы сами собою, брались из ниоткуда... как оно и бывает в правильно устроенных обществах... Очень скоро Ленин сообразил, как организовать правильную газету — такую, чтобы вся Россия читала ее с неослабевающим интересом. Конечно, цензура... но ведь можно и обойти цензуру!</p><p class="p">К счастью, Ленин успел в Париже завести ряд полезных знакомств — задружился, например, с издателем Прянишниковым, тоже вечно сетовавшим на бездарность русской прессы, из которой совершенно нельзя было понять, что и как делается в России.</p><p class="p">— А я, Максим Иваныч, думаю запузырить газетенку — не этим чета, — сказал Ленин радостно. — Почитал я тут, как у французов это дело поставлено... Такое, батенька, фрикасэ и консомэ! Принцесса Монакская разрешилась от бремени. Придворный астролог английской династии предрекает извержения в тропиках. Актриса Сара Бернар сменила любовника. На любовницу. Как думаете, что, ежели у нас завести что-нибудь этакое... со светской жизнью, со всяким, понимаете ли, перчиком? И название такое, поэффектнее: «Вся правда»! Или даже просто «Правда»!</p><p class="p">— Любопытно, — кисло сказал Прянишников. — Но не дадут — цензура нынче кидается на вещи куда более невинные. Скажут, что мы способствуем растлению нравов. У нас там знаете какая теперь вдет борьба за нравы? Ежели бы журнал... С журналами мягче. Но у нас там теперь все помешались на декадентах, и в журнальном деле уже до таких пакостей дошло, что вы своим перчиком никого не удивите. Там уж и про содомитов пишут, прошу прощения.</p><p class="p">— Что-то их многовато стало, — нахмурился Ленин. — Этак Россия совсем размножаться перестанет... Ну, ежели рынок диктует — так давайте мы про содомитов, а? Так сказать, вся правда.</p><p class="p">— Запретят, — брезгливо заметил издатель. — И аморально, и потом, сами знаете... одно дело — когда в литературе, а другое — когда газета. Прямая пропаганда.</p><p class="p">— Хорошо, хорошо! Ну, а моды? Как одеваться, что читать, в какой синематограф ходить?</p><p class="p">— Э, батенька, совсем вы Россию забыли. Это во Франции газетчики диктуют моду. А в России модно становится все самое отвратительное: низкая литература пошлейшего разбора, вызывающие тряпки... Я слышал, там теперь на гашиш мода. Копируют Европу не во всем, а только в том, до чего могут дотянуться. Если бы иначе было — неужели я бы из России убежал? Но мне дома жить хороший вкус не позволяет...</p><p class="p">— Так, может, давайте деловую газетку затеем? Будем излагать всякие полезные советы, как разбогатеть, как нажиться...</p><p class="p">— И это глупости. Извините меня, Ильич, но я никогда не думал, что вы настолько наивны в вопросах печати. Чистая душа, ей-Богу! Или вы не знаете лучше меня, что такое делать дела по-русски?</p><p class="p">— Очень знаю, — сказал Ленин. — Не подмажешь — не поедешь.</p><p class="p">— Ну вот! И еще десяток таких же правил: дружи с губернатором, подноси полицмейстеру, заручись поддержкой в верхах, слабого грабь, сильному кланяйся... Зачем в России советы, как делать дела? Это уместно в стране, где хоть один закон работает, — а у нас всю Россию пройди, честного купца не сыщешь. Это они на словах только клянутся: наше честное купецкое слово — никаких бумаг не надо... Знаю я их честное купецкое: мелочатся и мухлюют так, что отца родного в солдаты сдадут, собственное дитя ограбят на дороге... Я не знаю, что в России должно сделаться, чтобы нынешние российские деловые люди стали кому-то казаться честными промышленниками. Надо, наверное, полстраны выжечь, а другую по миру пустить... и не сомневайтесь, дойдет до этого! Нельзя вечно издеваться над здравым смыслом!</p><p class="p">Прянишников страдал геморроем, а потому любил на досуге поругать страну происхождения.</p><p class="p">— А если политика? — выложил Ленин последний козырь. Уж очень ему нравилось название «Правда».</p><p class="p">— Знаете что, Ильич? — сказал ему издатель. С Лениным даже малознакомые люди бывали неожиданно откровенны, а Прянишников ценил в нем превосходного партнера по бриджу и потому разговаривал вовсе уж по-приятельски. — Я вам открою одну издательскую тайну, только вы уж меня не выдавайте.</p><p class="p">— Глух и нем, — привычно поклялся Ильич.</p><p class="p">— Ни одна газета в России не может быть прибыльна. Нет у нас столько грамотных, чтобы обеспечить настоящий тираж, а главное — никому не интересно читать про чужую жизнь. Любителей чтения наберется тысяч пять, им вполне хватает всяких «Весов», про декадентскую жизнь и про то, как в воскресный день в саду Шабли пажи графиню развлекли. Ленин хохотнул.</p><p class="p">— А прочие?</p><p class="p">— А прочие газет не читают и правильно делают. Так что живет газета за счет двух вещей. Первая — понятно, реклама. Удивительное слабительное гуннияди-янос, синематограф с духовой музыкой, лечение от половой слабости за три сеанса и подобное. В иных листках и места свободного уже не осталось — все торговые объявления заняли. А второе... — Прянишников понизил голос. — Слышали вы что-нибудь про то, как деньги моют?</p><p class="p">— Разумеется, — быстро кивнул Ленин. — Но я думал, что это делается на больницах... на прочей благотворительности...</p><p class="p">— Заблуждаетесь, друг мой, заблуждаетесь. Газеты сейчас самое модное вложение. Политика, борьба и прочая. Жертвуют на них охотно, покупают в полную собственность почем зря — это и престиж, и мода, и что хотите. Допустим, сделали вы на каких-нибудь поставках гнилого мяса или червивого зерна хорошую прибыль. Ну и вложили в газету — как человек благородный, большой друг искусств и просветитель народа. Формально в вашей газете все чин чинарем — сотрудники получают приличные суммы, вы обновляете типографию, покупаете лучшую бумагу, Соколов вон говорит, что верже из самой Норвегии возит... Что же в действительности? А в действительности, дорогой, вы покупаете бумагу в Конотопе, типография у вас от старости разваливается, сотрудники получают три копейки и пишут то, что только и можно писать за три копейки, то есть бред собачий, — так?</p><p class="p">— Так, — кивнул Ленин. Он понял наконец, почему все русские газеты были забиты такой дрянью, читать которую можно было только за границей, от страшной тоски по Родине.</p><p class="p">— Вы думаете, хоть одному этому корреспонденту возможно доверять? — продолжал Прянишников. — У них у всех образования три с половиной класса, и врут они, как проклятые. Кто самый грязный, самый невежественный, самый подлый человек в России? — репортер. Кто больше всего врет? Выражение знаете? — «Врет, как очевидец»! И ежели во всем мире пресса служит как-никак выяснению истины, у нас она нужна только для одного: чтобы какой-нибудь купчик или так называемый деловой человек потратил на газету пять тысяч в год, а в бумагах чтобы стояла сумма в двадцать, а то и в пятьдесят тысяч, и чтобы денежки эти у него подпольно крутились, а может, шли на взятки...</p><p class="p">— Или можно бордель, — прошептал потрясенный Ленин. — Или игорный дом, если договориться... В участок дать, еще кой-кому дать... и чем не жизнь?</p><p class="p">— Ну что, Ильич? — усмехнулся Прянишников. — Не пропало у вас желание сеять разумное, доброе, вечное?</p><p class="p">— Напротив, — отвечал Ленин. — Совершенно напротив. Век живи — век учись.</p><p class="empty-line"/><p class="p">Первым делом, конечно, минимизировать расходы: зачем платить корреспондентам? Чего проще: найми рабочих. Брось по всей России клич, благо партия для этого уже достаточно велика: пишите, мол, во всех подробностях про свою жизнь. Первая русская рабочая газета. Правда, в самом начале славных дел, рассказывал душа-Кржижановский, освободители труда затеяли было какую-то «Искру», но кто же так ведет дела, милостивые государи? Толку от этой «Искры» было чуть, рассказывала она про какое-то кровавое самодержавие, про которое и так все знали, и печатали ее прямо в России, так что в один прекрасный день всю редакцию просто погромили к чертям собачьим, и газета прекратила свое существование. Ничего, теперь-то мы понимаем, что в издании газеты самое главное — не газета! Мы организуем настоящий сбор средств. У нас все рабочие хоть по копейке, да скинутся. Сильно грабить не будем, а вот меценатов пощиплем. Пообещаем в случае революции не тронуть тех, кто даст на газетку. Пущай себе скидываются. Дальше мы делаем что? Дальше мы под видом редакции устраиваем хорошенький дом свиданий — раз. Там же открываем большую игру по методу Красина — два. Музей интересных эротических приспособлений, вроде того, что я видел на пляс Пигаль, — три. Опять же недурно бы и варьете, и с девочками, и все это на почве освобождения рабочего класса. Если даже у них в Париже эротический театр называется «Красная мельница» — неужели мы у себя не построим настоящее большевизанское кабаре «Красный помидор»?! Пусть попробует кто-нибудь придраться! Скажем, что это всё сотрудники газеты веселятся на редакционных собраниях. Кто нам запретит пить шампанское и танцевать канкан на столах? У нас будет лучшая русская газета!</p><p class="p">И дело завертелось, причем программа Ленина стала осуществляться с поразительной быстротой. Оказалось, что вся Россия только и ждала ежедневной рабочей газеты. Рабочие с готовностью скидывались на свою прессу, поскольку еще в романе Максимыча про сумасшедшую рабочую мать, ходившую вместе с сыном на демонстрации, было написано про необходимость газеты-копейки. Можно было подумать, что само чтение статей про невыносимую пролетарскую жизнь уже способно эту самую жизнь отчасти облегчить. На рабочую газету охотно жертвовали крупнейшие промышленники — они искренне верили, что сознательный и читающий рабочий менее склонен к бунту и уж наверняка не пойдет громить собственную фабрику. Декаденты изъявляли готовность писать революционные вирши. Курьеры Ленина и Дзержинского, горячо одобрившего план, не успевали собирать деньги и переводить их в Париж. Туда же отправлялись из России чудовищные рабочие корреспонденции. Некоторые из них Ленин зачитывал жене вслух: «Жывем мы хорошо жаловатца неча спасиба што хоть живы. Оно конешно и всякая работа и утомительно. Но все ж таки не ночлежный дом и мастер не забижает и то полза а хочу особо прописать про свою доч Марию которая имеет такой дар што не всякий человек может. Она имея на голове стакан полный воды может ечо на одной стоять ноге и притом поет песнь ах валенки валенки. А всего девке семь годов вот кака шустра. Я хочу штоб вы пропечатали про это а то у нас кака же радость пропадет весь талан и будь здоров. И штоб прописано было Мария Калюжная а не так просто кто». Рабочие не желали писать в свою газету про жестокое угнетение. Вероятно, они не надеялись изменить ситуацию — и в этом смысле, пожалуй, понимали все правильно. Они писали о своих мелких заботах и радостях — вот кто-то выучился петь, стоя на одной ноге, а у кого-то деревенская родня сообщает о рождении чрезвычайно разумного теленка, а кто-то открыл секрет мироздания и доказывает, что земля имеет не совсем шаровидную, а несколько как бы сплюснутую форму, это наблюдение рабочий сделал, катая по столу хлебный мякиш... В общем, на пролетарскую газету все это не тянуло. Письма Ленин высылал Горькому, а тот в ответ вместе с каприйскими друзьями присылал мрачные, по-горьковски скучные вариации на тему тяжелой трудовой жизни. Горький любил разбойников, босяков, а работу и рабочих не любил; ему вообще, сколько можно было судить, нравилась жизнь вольная, итальянская, вдали от угрюмых российских реалий. С отвращением описывал он российские морозы, дожди, скудость пейзажа и жестокость населения. Рядом с ним на Капри сидела дюжина таких же коллег-борзописцев и за очень скромные суммы заполняла «Правду» стенаниями. Впрочем, Ленин был верен своему принципу и часто печатал бесплатные рабочие корреспонденции — они придавали газете свежесть и прелесть, а заодно позволяли здорово экономить. Редакцию пролетарской газеты «Правда», которую испуганно разрешили при условии ее сугубо экономической направленности, разместили в Петербурге, на Знаменской, и скоро эта редакция превратилась в шикарное место. Ленин искренне жалел, что не может там побывать. Все петербургские декаденты, все кокаинисты и морфинисты города, все эротоманы и любители рискованных легкомысленных связей отлично знали, что среди ночи в «Правде» можно найти любые сильнодействующие средства, отличных девочек и веселое общество. Полиции хорошо платили, а впрочем, некоторая часть полиции искренне верила, что сотрудники редакции от души веселятся после трудного рабочего дня и так любят свое дело, что не расходятся даже на ночь. В редакции стоял, что называется, дым коромыслом, и вполне естественно, что ни один официальный сотрудник не тратил и часа в день на заполнение газеты всякой ерундой. Ерунду эту писали тут же, на коленке, и Ленин иногда ради смеха участвовал в этой забаве под разными псевдонимами. Иногда он подписывался Ильин, потому что отчество его было Ильич. Иногда — Тулин, потому что в Туле жила одна удивительная мещанка, чьи стати он припоминал до сих пор. Пару раз — Надин, а один раз даже Инин (Инессе было приятно).</p><p class="p">«Правда» стала популярным в Петербурге местом. Если среди ночи какой-нибудь пьяный, шатаясь, брел по улицам и искал добавки, — про него говорили, что он идет «Правду» искать, потому что в «Правде» можно было достать выпивку во всякое время. Скоро и всех блаженных стали называть «правдоискателями». Однажды городовой (или, как тогда говорили, «фараон»), получавший регулярные взятки со Знаменской, зашел-таки прервать особенно громкую оргию по требованию жильцов соседнего дома — и удостоился обидной поговорки «Хлеб-соль ешь, а „Правду“ режь», что намекало на откровенное взяточничество распоясавшегося стража порядка. Впрочем, получив очередную взятку, — на это дело в газете не скупились, — он смиренно ретировался; на вопрос, почему притон до сих пор не закрыт, в Питере пожимали плечами: «Бог „Правду“ видит, да не скоро скажет». Однажды студенты решили написать в пролетарскую газету что-нибудь прогрессивное и зашли в редакцию; на вопрос, где тут секретарь, синеватый человек в одном белье с достоинством отвечал, что он и есть секретарь, а сейчас придет еще и секретарша, прошу любить и жаловать; в отделе промышленности пили, в отделе сельской жизни пели, а в отделе экономического развития России творилось такое, что студенты в ужасе бежали на улицу и приступили к городовому с вопросом, нет ли поблизости какой-нибудь другой «Правды».</p><p class="p">— «Правда» всегда одна, — грустно ответил фараон.</p><p class="p">Первое время, надо признаться, Ильич все-таки не верил, что писать в газету так уж просто. Он думал, что Прянишников его дурит и что должна найтись какая-то инстанция, которая наконец откажется публиковать его литературную продукцию. Никто, однако, не возражал — более того, «Правда» пользовалась у рабочих бешеной популярностью, потому что всякому сознательному пролетарию было очень приятно узнать, как его там пропечатали. Русский пролетариат вообще отличался потрясающей почтительностью к печатному слову: это касалось даже типографских рабочих, которые, уж казалось бы, могли знать, как оно все делается. Но и они, прекрасно сознавая, что всякое печатное слово есть только оттиск буковок из наборной кассы, вредное отражение паров свинца, — почему-то питали необъяснимое уважение ко всему, что красовалось на бумаге, под круглыми, красивыми буквами «Правда». Никакого цензурного террора не было — пару номеров, конечно, запретили к продаже за очень уж рискованные ленинские корреспонденции из Парижа (он иногда давал волю своему перу), но в целом препятствий не чинили и даже поощряли такой выпуск пара. Рабочий, который читает и пишет, все-таки не склонен к погрому.</p><p class="p">Обычный номер «Правды» выглядел так. Почти всю первую страницу — или, по-газетному говоря, полосу — занимала теоретическая статья, которую писал за копейки какой-нибудь студент, совершенно счастливый от возможности увидеть свою фамилию набранной большими буквами (Ленин очень скоро смекнул, что польстить авторскому тщеславию — лучше всякого гонорара). Писали там любую ерунду, иногда даже антиправительственную, — но Ленин отлично усвоил, что русский публицист больше всего на свете любит солидность и наукообразие, а потому истинных его намерений не поймет ни один цензор, будь он хоть семи пядей во лбу. «Исходя из текущего состояния экономической мысли в родных палестинах, всякий сколько-нибудь мыслящий индивид не может не признать того слишком очевидного факта, что насквозь гнилая и безнадежно отсталая действительность находится перед лицом тех давно предсказанных и совершенно неотвратимых катаклизмов, которые одни в состоянии помочь перевести болезнь из запущенной формы в ту острую, которая, хотя бы даже и будучи несколько мучительней для и без того ослабленного организма, по крайней мере позволяет избежать затягивания того невыносимого положения, в котором все сегодня находится и будет продолжать находиться до того самого времени, когда контрреформация и реформация, слившись в одном созидательном вихре, превратят возлюбленное Отечество в пример для мыслящих пролетариев всего мира» — Ленин трижды перечитал эту фразу и нашел ее превосходной. Сам он таких пузырей пускать не умел. Дальше следовал набор пролетарских писем с мест, пара декадентских стихотворений про каменщика с лопатой (хотя даже Ленин, никогда никем не работавший и не державший в руках лопаты, знал, что каменщику эта вещь совершенно без надобности, — каменщик камни кладет, при чем тут лопата?!), на третьей полосе помещалась заграничная информация, а на четвертой литературные экзерсисы товарищей по партии, оказавшихся тайными сочинителями не хуже Горького: каждый что-нибудь кропал в рифму или без, в столбик или в строчку, не особенно заботясь о складности, но горячо оплакивая рабочую долю. Иногда помещались там стихотворения в прозе самого Ильича, которые он скромно подписывал «Н. Ленин» — чтобы потомство все-таки понимало, что это пишет Не Ленин. Сочиняя эти произведения, он от души радовался. «Вчера вот качался на качелях, — писал он. — Экое бессмысленное развлечение! Вперед и назад, вперед и назад... А надо только вперед, всегда и везде вперед!»</p><p class="p">Удивительно, но находились люди, относившиеся к ленинской публицистике всерьез. Среди рабочих прошел даже слух, что далеко за границей живет некий Ленин, который один умеет говорить с пролетариатом на правильном пролетарском языке. По крайней мере, он не употреблял мудреных терминов. Иногда ему приходила в голову странная фантазия — тиснуть статью к чьему-нибудь юбилею, как, он знал, делают в настоящих газетах. Фигуры он выбирал все больше забытые, чтобы никто не мог его поймать на незнании общеизвестного (Ленин, правду сказать, из всего Пушкина помнил только строчки про дядю да про ножки). Однажды ему пришла мысль написать статью к столетию Герцена, фотографию которого он увидел в календаре. Чего-чего не написал там Ленин — сам после удивлялся, перечитывая. Чаще же всего, читая свою «Правду», он от души хохотал, ударяя себя по коленке и приговаривая: </p><p class="p">— Архихуйня!</p><p class="p">Дзержинский, кажется, «Правды» вообще не читал. Он вполне удовлетворялся скромными поступлениями со Знаменской и только удивлялся иногда, какие сказочные идиоты сидят теперь в цензурном ведомстве. Один раз, для пробы, он и сам поместил в «Правде» статью за подписью «Ferrum»: из первых букв каждого абзаца складывался диагноз «Николашка кретин». Цензор ничего не заметил, только в одном месте поправил «реальность» на «действительность» да вычеркнул слишком частое повторение слова «неистребимый». Дзержинский пошел дальше и тиснул в пролетарской газете следующий акростих:</p><div class="poem">
<div class="stanza">
<p class="v">Еще и солнце не взошло. </p>
<p class="v">Белеет снег по косогорам, </p>
<p class="v">А уж приятно и тепло. </p>
<p class="v">Люблю, когда все птички хором </p>
<p class="v">Январским утром запоют! </p>
<p class="v">Вокруг лежит простор холодный, </p>
<p class="v">А дома чисто и уют. </p>
<p class="v">Сторонник чтения свободный, </p>
<p class="v">Возьму какой-нибудь журнал, </p>
<p class="v">Смотрю в страницы, как обычно... </p>
<p class="v">Еще, еще! Но прочитал — </p>
<p class="v">Хочу уж спать, и сплю отлично.</p>
</div>
</div><p class="p">Ему даже пришло письмо от сознательной работницы, уверявшей, что она разгадала тайный замысел автора, намекающего на необходимость свободного чтения, а то цензура совершенно уже задушила все живое. Дзержинский никогда не смеялся и потому только улыбнулся, читая письмо проницательной труженицы. «Правда» вообще была веселая газета. Жаль, что настоящую ее подшивку теперь можно увидеть только в запасниках музея Ленина на улице Мари-Роз, а то, что нам предлагают в российских библиотеках, не имеет к настоящей «Правде» никакого отношения. Вся эта «Правда» напечатана, по понятным соображениям, в двадцатые годы в типографии «Известий», а настоящую «Правду», как всегда, скрывают от народа. Ему хотят внушить, что «Правда» — это скучно. Неправда. «Правда» — это смешно.</p></span>
