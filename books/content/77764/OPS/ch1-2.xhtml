<span id="id1"><div class="title">
<p class="p1">ПРОЛОГ</p>
</div><p class="p">М. ГАНАПОЛЬСКИЙ: Вы слушаете радио «Эхо Москвы», у микрофона Матвей Ганапольский, и я представляю вам наших гостей: первый и последний президент СССР Михаил Горбачев, историк Эдвард Радзинский, психолог Мария Арбатова, депутат Госдумы Алексей Митрофанов, режиссер Роман Виктюк и писатель Виктор Ерофеев.</p><p class="p">ГОСТИ <em>(хором, вразброд)</em>: Добрый день.</p><p class="p">М. ГАНАПОЛЬСКИЙ: Вот уж месяц, как первые полосы всех газет, эфиры телеканалов и радиостанций отданы одной теме: наконец-то состоявшемуся захоронению тела Владимира Ильича Ленина в соответствии с канонами православной религии и сенсационной находке: хранившейся в головах покойного шокирующей рукописи под названием «Правда», которая проливает совершенно новый свет на то, как и какими руками делалась революция в России. Памятуя, чем завершился последний эфир «Культурной революции», мы сегодня не будем...</p><p class="p">А. МИТРОФАНОВ: Только не надо, ребята! Лимонов сам первый ни с того ни с сего набросился на Владимира Вольфовича и сломал ему нос, ногу и три ребра.</p><p class="p">М. ГАНАПОЛЬСКИЙ: ...не будем в тысячный раз обращаться к вопросу о том, сколько правды и сколько неправды содержится в «Правде». Наш сегодняшний разговор посвящен узкому вопросу: кто мог быть автором этой рукописи? Напоминаю, что эксперты — как отечественные, так и зарубежные — единодушно исключают вероятность того, что рукопись является современной подделкой. Текст был написан не позднее 1930 года и, по-видимому, в Мавзолей попал тогда же...</p><p class="p">А. МИТРОФАНОВ: Коммунисты все эти годы прекрасно знали о существовании рукописи. Они же регулярно пылесосили Ильича. Они нарочно скрывали «Правду», чтобы народ не знал, кто такие были их вожди. Потому они и не давали тело хоронить.</p><p class="p">М. ГОРБАЧЕВ: Ну вот не надо вот, пожалуйста, все грехи валить на коммунистов. Да, у коммунистов были ошибки. Но когда Горбачев начал перестройку...</p><p class="p">М. ГАНАПОЛЬСКИЙ <em>(бодро)</em>: Итак, наша тема — авторство «Правды».</p><p class="p">Э. РАДЗИНСКИЙ: Что тут можно сказать? Эпоха рассказывает о себе. Эпоха считала Владимира Ильича и Феликса Эдмундовича героями. Для меня они исторические персонажи, я делал большую передачу о них. Я постараюсь объяснить, кто были эти люди. Они не были монстрами. Они были «людьми родом из революции». Я уже неоднократно объяснял это. Они развязали кровь! Как революция меняет людей, как меняются человеческие судьбы? Я дам ответ па этот вопрос в своей новой кни...</p><p class="p">М. ГОРБАЧЕВ: ...не все были согласны с Горбачевым. Многие не понимали...</p><p class="p">Р. ВИКТЮК: Позвольте мне, если можно! Прежде всего я хочу сказать, что случай управляет миром, если мир непостигаем. Да, Булгаков сказал, что кирпич который упадет, так он упадет все равно. Второе: что хаос — это норма, которая входит в наше существование, и ужасаться нельзя. И ученые сказали, что хаос, наоборот, это какие-то энергетические выбросы, которые дают прогресс и движение наше в мироздании...</p><p class="p">В. ЕРОФЕЕВ: Вы отчасти правы, но я не совсем...</p><p class="p">А. МИТРОФАНОВ: Книжка плохая. Скверная и глупая. Но полезная, потому что она развенчивает старые мифы, которыми коммунисты нас кормили семьдесят лет.</p><p class="p">М. ГАНАПОЛЬСКИЙ <em>(кротко)</em>: Хочу напомнить уважаемым гостям тему нашего разговора.</p><p class="p">М. ГОРБАЧЕВ: Горбачев думает, что эта рукопись — очередная провокация Сорокина или кого-нибудь в подобном роде.</p><p class="p">М. ГАНАПОЛЬСКИЙ: Напоминаю, что эксперты подтвердили...</p><p class="p">А. МИТРОФАНОВ: Чушь собачья! Кто эти эксперты? Давайте разберемся! Вы, ребята, посмотрите на их фамилии! Да, давайте, ребята, называть вещи своими именами: Сорокин — дерьмо, но если он написал «Правду», то надо пожать ему руку.</p><p class="p">М. ГОРБАЧЕВ: ...и если бы не вмешался Ельцин, то мы сейчас жили бы...</p><p class="p">А. МИТРОФАНОВ: Да! Ельцин и оплатил Сорокину эту книжку. Через американцев.</p><p class="p">М. ГАНАПОЛЬСКИЙ <em>(по-прежнему кротко)</em>: Давайте оставим Ельцина и коммунистов в покое и вернемся к вопросу об авторстве «Правды». Эдвард Станиславович, хотелось бы услышать вашу точку зрения.</p><p class="p">Э. РАДЗИНСКИЙ: В истории все взаимосвязано. Кто были эти люди? Одной рукой они делают революцию — но что же они делают другой рукой? Они пишут! Пишут пьесы, пишут стихи... И они пишут... романы! Практически каждый революционный деятель того времени мнит себя литератором. Например, Александр Богданов: он автор множества научно-фантастических романов и повестей. В своей «Красной звезде» он...</p><p class="p">М. ГАНАПОЛЬСКИЙ: Значит, Богданов?</p><p class="p">Э. РАДЗИНСКИЙ: Я этого не утверждаю; я лишь хочу объяснить, кто был Богданов... Богданов — это маньяк, его волновала кровь. <em>(Страстно.) </em>Вкус крови, запах крови... Его странные! дикие! пугающие! ужасные! бредовые и восхитительные идеи о переливании крови!.. А возьмите Луначарского! Дошедшие до нас литературные опыты Анатолия Васильевича дают основания предположить, что именно он...</p><p class="p">В. ЕРОФЕЕВ: Нет, я не могу согласиться. Луначарский... э... один из самых непривлекательных персонажей этой книги. Он не мог сам о себе так...</p><p class="p">М. АРБАТОВА <em>(многозначительно)</em>: Луначарский был типичным мужчиной той эпохи.</p><p class="p">Р. ВИКТЮК: Кольцо! Главная музыкальная тема «Правды» — кольцо, волшебное... Россия, круг, змея, пожирающая свой хвост... Потеряла я колечко... <em>(Поет) </em>Потеряла я колечко... Любовь — кольцо, а у кольца... нет конца...</p><p class="p">М. ГОРБАЧЕВ: Кольцо — это, кажется, Толкин написал.</p><p class="p">А. МИТРОФАНОВ: Я и говорю: все, все содрал у Толкина, до последнего слова. Можно подумать, в нашей стране не нашел у кого содрать!</p><p class="p">Э. РАДЗИНСКИЙ: Кроме того, очевидно, что у автора «Правды» были причины ненавидеть Польшу. Вообще отношения России и Польши — это тема моей будущей...</p><p class="p">А. МИТРОФАНОВ: Прикиньте, ребята, сколько Сорокин опять положит себе в карман! За десятимиллионный тиражик-то!</p><p class="p">В. ЕРОФЕЕВ: Так ведь Генеральная прокуратура арестовала весь тираж еще в типографии.</p><p class="p">А. МИТРОФАНОВ: Ничего, он от американцев свое получил уже. Не обеднеет.</p><p class="p">М. ГАНАПОЛЬСКИЙ <em>(шипит)</em>: Еще раз напоминаю, что «Правда» была написана не позднее 1930 года... Виктор, а какова твоя версия?</p><p class="p">В. ЕРОФЕЕВ: Мне кажется, что любой прочитавший «Правду» увидит явные параллели с более поздними и зрелыми произведениями Ильфа и Петрова. Отдельные сюжетные линии они впоследствии развили в «Двенадцати стульях» и «Золотом теленке».</p><p class="p">М. ГОРБАЧЕВ: Нет, ну не надо... «Двенадцать стульев» — прекрасная, умная книга, которой зачитывались многие поколения пионеров и комсомольцев... А это... это какая-то, знаете, порнократия...</p><p class="p">М. АРБАТОВА: Параллели есть, но качество текста не идет ни в какое сравнение.</p><p class="p">В. ЕРОФЕЕВ: Я же и говорю, что это очень ранняя, незрелая, еще совсем слабая вещь.</p><p class="p">А. МИТРОФАНОВ: Ребята, это же ясно как дважды два пять: весь этот идиотский бред написала ба... женщина.</p><p class="p">М. АРБАТОВА: Исходя из чего вы сделали подобный вывод? И какая именно женщина?</p><p class="p">А. МИТРОФАНОВ: Да вы, Маша, и написали. Дурак догадается. Все мужчины облиты грязью и помоями, из революционеров сделали неврастеников.</p><p class="p">Э. РАДЗИНСКИЙ: Если мы вспомним литературные опыты Александры Коллонтай...</p><p class="p">В. ЕРОФЕЕВ: Да, да, я тоже сейчас подумал о Коллонтай с ее...</p><p class="p">А. МИТРОФАНОВ: ...опилками в головке.</p><p class="p">М. АРБАТОВА: Да, только в нашем обществе с его дикой, звериной патриархальностью, в обществе, где каждые пять минут насилуют или избивают женщину...</p><p class="p">М. ГОРБАЧЕВ: ...урезают пенсии пенсионерам...</p><p class="p">А. МИТРОФАНОВ: ...разваливают армию и капитулируют перед Штатами...</p><p class="p">М. АРБАТОВА: ...возможен такой тон по отношению к первой российской феминистке. На самом же деле, господа, совершенно очевидно, что автор обсуждаемого текста — мужчина, раздираемый типичнейшими мужскими комплексами, боящийся и ненавидящий женщину, в борьбе которой за свои права ему видится угроза. Перечтите внимательно все эротические, точнее, квазиэротические сцены «Правды». Комплекс кастрации налицо.</p><p class="p">А. МИТРОФАНОВ, Э. РАДЗИНСКИЙ, М. ГАНАПОЛЬСКИЙ, Р. ВИКТЮК, В. ЕРОФЕЕВ <em>протестуют.</em></p><p class="p">М. АРБАТОВА <em>(снисходительно улыбается)</em>: Ваша неадекватная реакция лишний раз подтверждает мои слова.</p><p class="p">В. ЕРОФЕЕВ: Маша, так вы полагаете, автор не обладал... э... нормальной мужской потенцией?</p><p class="p">М. АРБАТОВА: Разумеется, он не состоялся как личность и как мужчина. Кстати, обратите внимание на садомазохистскую составляющую его бреда.</p><p class="p">А. МИТРОФАНОВ, Э. РАДЗИНСКИЙ, М. ГАНАПОЛЬСКИЙ, Р. ВИКТЮК, В. ЕРОФЕЕВ: Обратим непременно.</p><p class="p">Р. ВИКТЮК: Я вспомнил! Как же мы не увидели этого сразу! Долли! Дол-ли! Ло-ли-та!</p><p class="p">М. АРБАТОВА,А. МИТРОФАНОВ,Э. РАДЗИНСКИЙ, М. ГАНАПОЛЬСКИЙ, В. ЕРОФЕЕВ: Что-что?!</p><p class="p">Р. ВИКТЮК: Метки. Метки! Девочка во второй главе! Долли! Ло-ли-та! И тот юноша — это же... Да! Это типичнейшие набоковские метки!</p><p class="p">М. АРБАТОВА: Ну, уж это вы загнули, Роман Григорьевич! Сравнивать великого мастера слова с этим... этими... <em>(Задумывается.) </em>Впрочем, Набоков был мужчина, а все мужчины, в сущности, одинаковы.</p><p class="p">В. ЕРОФЕЕВ: Владимир Владимирович, как известно, был весьма склонен к мистификациям. Мне вспоминается в этой связи знаменитая мистификация вокруг загадочного «Романа с кокаином» некоего Агеева, то бишь Марка Леви: авторство многие тоже пытались приписывать Набокову, хотя, на мой взгляд, разница в стиле видна невооруженным глазом.</p><p class="p">М. ГАНАПОЛЬСКИЙ: Может быть, и «Правду» Леви написал? Тут тоже нюхают кокаин.</p><p class="p">Р. ВИКТЮК: Одумайтесь, господа, что мы делаем! Мы пытаемся раскрыть завесу тайны. Но самое главное — это метафизика. Постижение непонятного. Не загадки в мире нужны, а тайна. Потому что это внутренние факторы. Это потому что Я — это дух прежде всего, тогда душа и этот наш дьявольский двойник закрывается и кричит: «Нет, нет!» Я в мире, я в согласии. Я не буду конфликтовать с душой. Это человеческая самость, это вселенское... Да! Абсолютно очевидно, что «Правду» написал Максим Горький.</p><p class="p">М. ГАНАПОЛЬСКИЙ: К сожалению, наше время истекло. Последний вопрос Эдварду Станиславовичу: так где же теперь волшебное кольцо?</p><p class="p">Э. РАДЗИНСКИЙ: А колечко катится, катится, катится... <em>(Угрожающе.) </em>Катится! — и покатилось! покатилось — красное — колесо!</p><p class="p">А. МИТРОФАНОВ: Не волнуйтесь, ребята: наша партия это колечко отыщет в два счета. Уж тогда мало никому не покажется.</p><p class="p">М. ГАНАПОЛЬСКИЙ: Типун вам на язык. <em>(Выключает микрофоны.)</em></p></span>
