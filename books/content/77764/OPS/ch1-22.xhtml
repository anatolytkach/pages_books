<span><p class="p">После этого заявления все успокоились и довольно быстро, хотя и не без препирательств, распределили остальные должности. Луначарский, естественно, был назначен наркомом просвещения. Шурочка Коллонтай сама вызвалась быть наркомом социального обеспечения (никто из мужчин не знал, что это такое, но, зная Шурочку, можно было приблизительно догадаться, чем, как и кого она будет социально обеспечивать); в наркомат военных и морских дел записали предложенную Свердловым кандидатуру Антонова-Овсеенко; раздали портфели наркомов труда, финансов, электричества и почты с телеграфом; Владимир Ильич, выполняя давешнее обещание, назначил Зиновьева генерал-губернатором Петербургским, то бишь председателем Петросовета... Каменев уже хотел зачитывать итоговый протокол, как вдруг Луначарский закричал отчаянным голосом:</p><p class="p">— Троцкий, товарищи! Мы забыли Троцкого!</p><p class="p">— Да на что он нам теперь нужен?</p><p class="p">— Нет-нет, Лева, ты неправ, — быстро возразил Ленин. — Троцкий нам еще очень даже пригодится. Должен же кто-то объясняться перед мировой общественностью за те ошибки и глупости, что мы тут наворотим.</p><p class="p">— Но, быть может, у нас не будет ошибок и глупостей?</p><p class="p">— Будут, — мрачно отрезал Владимир Ильич. — Это я вам гарантирую...</p><p class="p">Тут они с Дзержинским переглянулись понимающе, как два вора, и даже на миг почувствовали нечто вроде симпатии друг к другу: похоже, средь присутствующих они одни, хоть и нанюхались кокаину, были трезвыми людьми...</p><p class="p">Троцкого единогласно утвердили наркомом иностранных дел. Каменев опять собрался зачитывать протокол, когда вдруг откуда-то из угла послышался жалобный скулеж и хныканье... Все растерянно обернулись на звук и увидели, что в углу сидит Коба, трет грязными кулачками глаза и причитает, как плакальщица на похоронах:</p><p class="p">— Злые, злые... Противные, не дали таварищу Сталину партфеля... Коба тоже хочэт партфель... Зарэжу, суки, зарэжу...</p><p class="p">— Он, наверное, понял слово «портфель» в буквальном смысле, — догадался Каменев. Он показал Кобе свой портфель — желтый, дерматиновый, туго набитый бумагами — и спросил:</p><p class="p">— Такой портфель ты хочешь?</p><p class="p">Но дурачок отрицательно затряс своей большой головою; потом вскинул бессмысленный взор к потолку и завыл горько и злобно.</p><p class="p">— Ну, Лев Борисович, запишите же за ним какую-нибудь наркомовскую должность, — раздраженно сказал Дзержинский, — а то он нам работать не даст.</p><p class="p">— Но, Феликс Эдмундович, он же идиот.</p><p class="p">— Ну и что?</p><p class="p">— Да нет, ничего. А с какой, по-вашему, должностью он мог бы справиться?</p><p class="p">— О Matka Boska, как вы, русские, любите все усложнять! Напишите там что-нибудь, и пускай он поставит против своей фамилии крестик.</p><p class="p">Каменев пожал плечами и подписал в самом низу страницы: «Тов. Сталин — народный комиссар по делам национальностей». Он полагал, что у национальностей никаких дел быть не может, а в интернациональном государстве, которое они собирались строить, не будет и самих национальностей.</p><p class="p">— Коба теперь нарком, — сказал он тем обычным тоном, каким все привыкли говорить с бывшим глухонемым. — Коба хороший. Коба будет заведовать национальным вопросом.</p><p class="p">— Жыд шакал рэзать? — уточнил дурачок.</p><p class="p">В воздухе повисла неловкая пауза. Даже Коба, видимо, сообразил, что ляпнул не то, и поправился:</p><p class="p">— Руски шакал рэзать?</p><p class="p">Ответом было гробовое молчание. Даже Феликс Эдмундович как-то растерялся. Ленин спохватился, что он теперь главный над всеми этими людьми, и сердито прикрикнул:</p><p class="p">— Хватит рассусоливать! Ставь свой крестик и убирайся.</p><p class="p">«Надя его почему-то боится, — опять подумал он, — но почему? Моя бесстрашная, отчаянная Надя, бой-баба, которая самого Железного Феликса без всякого пиетета огрела ухватом по загривку! Она людей вообще не боится — только пауков, крыс да гадюк...» Коба, наморщив низкий лобик, подошел к столу, лизнул перо, старательно начертил крест и попятился обратно. Теперь корявое лицо его ничего не выражало; глазки были холодные и немигающие, как всегда. «Не понимает он ни черта! Бабьи глупости», — решил Ленин. И он прибавил уже мягко:</p><p class="p">— Ступай отсюда, Коба. Пожрать принеси.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">— ...Владимир Ильич, приехала делегация путиловских рабочих!</p><p class="p">— ...Владимир Ильич, нужно срочно дать отпор меньшевикам и бундовцам!</p><p class="p">— ...Владимир Ильич, Горький опять нас изругал во всех газетах!</p><p class="p">— ...Владимир Ильич, на какое число назначать созыв Учредительного собрания?</p><p class="p">— ...Владимир Ильич, товарищ Сталин опять гонялся за кошками и учинил потоп в дамской уборной.</p><p class="p">— ...Владимир Ильич, как нам реорганизовать Рабкрин?</p><p class="p">— ...Владимир Ильич, где брать швабры?!</p><p class="p">И он вынужден был отвечать на все эти дурацкие вопросы, всех мирить, разнимать, думать, где достать швабр и канцелярских кнопок... Все это было так бесконечно далеко от того, как он себе представлял управление государством: золотая корона, держава, скипетр, военные смотры, белый конь, красавицы фрейлины... Ему теперь не то что заняться организацией собственной киностудии — просто сходить с женою в синематограф было некогда. Ежеминутно ему приносили на подпись или просто на ознакомление кипы всевозможных бумаг; вот и сейчас опять...</p><p class="p">«В своей деятельности ВЧК совершенно самостоятельна, производя обыски, аресты, расстрелы, давая после отчет Совнаркому и ВЦИК».</p><p class="p">— Согласитесь, Эдмундович, эта ваша директива звучит несколько странно, — сказал Ленин.</p><p class="p">— Что вы в ней находите странного?</p><p class="p">— Вот это «после». Сперва расстрелять, а после отчитываться?</p><p class="p">— Но как же я могу отчитываться о том, что я кого-то расстрелял, до того, как это случилось?</p><p class="p">— Да зачем вам вообще кого-то расстреливать? — удивился Ленин. — Пусть ваша ЧеКа ищет себе потихоньку кольцо, и этого вполне достаточно.</p><p class="p">— Не понимаете вы, Ильич, специфики этого дела! — воскликнул Дзержинский. — Мы должны применить сейчас все меры террора, отдать ему все силы! Не думайте, что я ищу формы революционной юстиции, юстиция нам не к лицу! У нас не должно быть долгих разговоров! Сейчас борьба грудь с грудью, не на жизнь, а на смерть — чья возьмет?! И я требую одного — организации революционной расправы!</p><p class="p">— Не понимаю и понимать не хочу этой вашей трескотни, — сказал Ленин. — Вы не на заседании; со мною, кажется, могли бы говорить нормальным языком.</p><p class="p">Но он слишком устал, чтобы спорить с Дзержинским: обученный иезуитами искусству вести длиннейшие прения и запутывать противника сетью высосанных из пальца посылок и аргументов, тот был в спорах практически неуязвим.</p><p class="p">— Да, кстати, Владимир Ильич, — сказал Дзержинский, — я бы желал возглавить еще одно направленьице... — Он произнес эти слова как-то уж очень преувеличенно небрежно, и Ленин насторожился:</p><p class="p">— Какое такое направленьице?</p><p class="p">— Дети. Маленькие беспризорные дети, цветы жизни... Я буду спасать их.</p><p class="p">Владимир Ильич слегка поморщился. «Знаю я, как ты будешь их спасать... Но я теперь почти что император и, следовательно, должен быть не моралистом, а реалистом. Если девчонка попадет в твою постель — вряд ли это намного хуже, чем попрошайничать на вокзале и попадать в постель к сотне разного народу. Ты, по крайней мере, накормишь ее как следует». (От проституток и от нескольких настоящих малолеток — от тех, что хорошо себя вели и оставались живы, естественно, — Ленин знал, что Феликс Эдмундович весьма обходительный и щедрый субъект, хотя и с причудами; в распятия, бичи и железные гвозди он играл исключительно со взрослыми мужчинами, и к сексу это у него не имело никакого отношения — просто отголосок отроческих мечтаний о монашестве, невинное хобби или, быть может, призвание.)</p><p class="p">Ленин уже начал помаленьку привыкать к мысли о том, что компромиссы с Дзержинским впредь будут неизбежны.</p><p class="p">— Спасайте, — сказал он сухо. — Смотрите только, не переутомитесь, железный вы наш.</p><p class="empty-line"/><p class="p">— Лева, как ты смотришь на то, чтобы сделаться московским генерал-губер... градоначальником, короче говоря? — спрашивал он следующего посетителя.</p><p class="p">— А разве я не справляюсь с руководством ВЦИК? — обиделся Каменев.</p><p class="p">— Великолепно справляешься, — тотчас ответил Ленин: он быстро обучился быть гибким. — Во ВЦИКе полный порядок — теперь даже Свердлов справится. А ты будешь рулить Москвой. Это гораздо ответственней и почетней.</p><p class="p">— Ладно, — сказал Каменев. — Поеду в Москву. Страшно мне только Гришу здесь бросать. Дзержинский его съест. Ты ведь знаешь, Ильич, что он его на дух не переносит.</p><p class="p">— Уверен, Лева, что ты ошибаешься, — сказал Ленин. — Не съест.</p><p class="p">Он до недавнего времени и сам думал, что Дзержинский с Зиновьевым будут в ужасных контрах, и побаивался последствий, к которым могло привести это взрывоопасное соседство; но пару дней тому назад, спустившись в подвал Смольного в поисках швабр, он услышал доносящиеся из-за двери одного из подвальных помещений голоса... Любопытствуя, он подошел ближе и, к своему удивлению, узнал в собеседниках председателя ВЧК и питерского градоначальника. Разговор они вели довольно странный.</p><p class="p">— ...В розгах есть что-то вульгарное. Хороший кнут из сыромятной кожи гораздо лучше. В старые времена палач мог одним ударом такого кнута убить человека. Но это, конечно, ни к чему. Смерть не должна быть быстрой.</p><p class="p">— Как это верно, Феликс Эдмундович!</p><p class="p">— А на голову жертвы следует надевать мешок, чтоб она была полностью деморализована и не могла сопротивляться.</p><p class="p">— Вот с этим я не согласиться не могу. Меня очень возбуждает, когда он... она сопротивляется.</p><p class="p">— Нет-нет, друг мой, вы не правы. Во всяком случае, без кандалов и цепей я не мыслю себе хорошего допроса.</p><p class="p">Ленин рванул на себя дверь, с ужасом ожидая увидеть... он уж и сам не знал что. Но зрелище его малость успокоило. Дзержинский и Зиновьев сидели за столом друг против друга, пили чай из китайского сервиза, дымили «Зефиром» и беседовали. Никого, кроме них, в подвале не было. Кожаные куртки на обоих были одинакового фасона, сапоги сверкали, а лица выражали крайнюю степень учтивой благожелательности по отношению к собеседнику. Зиновьев, правда, беспрестанно ерзал и крутился на стуле, словно что-то мешало ему сидеть. Но в общем все было пристойно, чинно, по-советски.</p><p class="p">— О чем это вы тут толкуете? — спросил Ленин. </p><p class="p">Зиновьев под его взглядом весь сжался, опустил ресницы и даже перестал ерзать. Но Дзержинский невозмутимо ответил:</p><p class="p">— Я рассказываю уважаемому Григорию Евсеевичу о том, каким зверским издевательствам царская власть подвергала революционеров.</p><p class="p">— А! Очевидно, эти методы вам знакомы не понаслышке. — И Ленин вышел, раздраженно хлопнув дверью</p><p class="p">«Чорт-те что», — думал он. Впрочем, он был скорее доволен тем, что эти двое наконец поладили друг с другом. Если б они продолжали цапаться — это сделало бы жизнь молодого советского правительства совершенно невыносимой.</p></span>
