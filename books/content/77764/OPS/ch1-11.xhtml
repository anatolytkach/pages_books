<span><p class="p">Переехав на отдельную квартиру, приведя себя в божеский вид и обзаведшись гардеробом, Дзержинский начал делать круги вокруг Бутырской тюрьмы. «Надо будет посидеть тут как-нибудь», — думал он, глядя на эти мрачные стены. Он был убежден, что тюрьма полезна: она очищает душу, закаляет волю и успокаивает страсти; частенько он, наскучив волею, садился в какую-нибудь тюрьму или отправлялся в каторгу вместо своих двойников (тем самым лишая их причитавшегося жалованья), хотя, конечно, совокупный срок его пребывания в заключении не составлял и двадцатой доли того, что приписывала ему молва. Можно было, конечно, сесть в Бутырки и там спокойно разделаться со Шмидтом. Но нашелся иной способ, менее трудоемкий. «Провидение, как всегда, на моей стороне, судьба моя ведет меня!» — сказал себе Дзержинский, когда навел справки о людях, составлявших в ту пору тюремное начальство.</p><p class="empty-line"/><p class="p">— Скажите, дорогой господин Шелыгин, часто ли гости посещают вашу тюрьму?</p><p class="p">— Очень редко, — отвечал Шелыгин (то был не комендант Бутырок, но один из его заместителей, чиновник, обладающий достаточными полномочиями.)</p><p class="p">— Даже если говорить о людях вашего общества?</p><p class="p">— А что вы называете моим обществом? Моих узников?</p><p class="p">— О нет! Я зову вашим обществом, дорогой господин Шелыгин, общество, членом которого вы состоите.</p><p class="p">— Состою, — пробормотал Шелыгин, — я состою в обществе?</p><p class="p">— Ну конечно, я говорю об обществе, в котором вы состоите, — повторил Дзержинский с полным бесстрастием. — Разве вы не состоите членом одного тайного общества, мой дорогой?</p><p class="p">— Тайного?</p><p class="p">— Тайного или, если угодно, таинственного... Так вот, в этом обществе существует обязательство, налагаемое на всех комендантов и начальников крепостей, являющихся членами ордена.</p><p class="p">— Но я не комендант! — сказал Шелыгин, побледнев.</p><p class="p">— Не до тонкостей, — отмахнулся Дзержинский. — Короче говоря, я — духовник ордена.</p><p class="p">И он продемонстрировал изумленному Шелыгину тайный знак ордена иезуитов. Разумеется, Феликс Эдмундович не только не был высокопоставленным лицом ордена, но и никогда к нему не принадлежал в строгом смысле этого слова, а знак выдумал только что. Но он — тонкий психолог, знаток и ловец человечьих душ, — предполагал, что Шелыгин, который в далекой юности, ведомый романтизмом, вступил в орден, но давным-давно позабыл о нем и, наверное, надеялся никогда больше об иезуитах не услышать, будет так ошеломлен, что подчинится не рассуждая. И он не ошибся. На лице Шелыгина была написана испуганная покорность.</p><p class="p">— Живо проведите меня к заключенному Шмидту! — приказал Дзержинский.</p><p class="p">— Вы намереваетесь устроить ему побег? Но ведь его и так на днях должны выпустить на поруки...</p><p class="p">— Повинуйтесь не рассуждая, сын мой.</p><p class="p">С этими словами Дзержинский опустил руку в карман сюртука; пальцы его сжимали скальпель. А меж тем юный Николай Шмидт никогда и в мыслях не держал намеренья становиться царем; он с неодобрением относился к этой эксцентричной идее Саввы Тимофеевича и свято верил в диктатуру пролетариата...</p><p class="empty-line"/><p class="subtitle">4</p><p class="p">— Катюша, я так счастлива!</p><p class="p">— Ах, Лиза, и не говори! Как это чудесно, что мы с тобой одновременно встретили таких прекрасных и благородных мужчин! И что это случилось именно теперь, когда мы так горюем по брату и нуждаемся в поддержке и участии...</p><p class="p">Тут сестры и наследницы покойного Николая Шмидта — Екатерина и Елизавета — кинулись друг дружке в объятия; они целовались, плакали и смеялись одновременно. Потом Екатерина (старшая) проговорила:</p><p class="p">— Он у меня такой... такой... это самое благородное и любящее сердце.</p><p class="p">— И мой.</p><p class="p">— Добр, красив, умен; души во мне не чает.</p><p class="p">— И мой тоже. Заметь, Катя: в наше время, когда мужчины так развратны, он не пытается домогаться близости, а благоговейно ждет дня свадьбы. Он даже не поцеловал меня ни разу... а я, признаюсь тебе по секрету, была бы не против...</p><p class="p">— Нехорошо так говорить, — укорила Екатерина. Она и сама была бы не против того, чтоб ее возлюбленный проявлял меньше уважения и больше необузданной пылкости, но не хотела говорить об этом. — Свадьбы непременно сыграем в один день?</p><p class="p">— О, непременно!</p><p class="p">— Жаль только, что у него такая нелепая фамилия, — сказала Екатерина с легким вздохом.</p><p class="p">— Что ты, милая! — возразила младшая сестра. — Ничего не вижу нелепого в фамилии Андриканис. Мне с моим возлюбленным повезло куда меньше. Ну что за фамилия — Таратута?</p><p class="p">— Ничего не поделаешь, — сказала Екатерина. — Но когда же я наконец увижу твоего Виктора, а ты — моего Колю? И мы познакомим их друг с другом? (Всякий раз, как сестры намеревались это сделать, то у г-на Таратуты, то у г-на Андриканиса оказывались чрезвычайно важные и неотложные дела.) Может быть, завтра?</p><p class="p">— Отлично. Завтра. Однако мне пора; он ждет меня.</p><p class="p">И, надевши шляпку, Елизавета помчалась на свидание со своим женихом Виктором Таратутой. Екатерина осталась дома: ее жених Николай Андриканис был нынче в отъезде по важному делу, но к завтрему обещал вернуться.</p><p class="empty-line"/><p class="p">— Виктор, дорогой... сестра умирает от желания познакомиться с вами.</p><p class="p">— Я сам испытываю такое же желание, — ответил г-н Таратута и поцеловал руку Елизаветы. Поцелуй был легок и целомудренен — едва заметное касание сухих губ. — Я в отчаянии, что незнаком с вашей сестрой, Елизавета Павловна, и с ее женихом.</p><p class="p">— Так давайте встретимся все вместе завтра! — обрадовалась девушка.</p><p class="p">— Мне страшно жаль, но завтра я никак не могу. Уезжаю в Петербург, — с грустью проговорил г-н Таратута.</p><p class="p">— Виктор, мы хотим сыграть свадьбы в один день, в одной церкви. Надеюсь, вы не против?</p><p class="p">— Увы, Лиза, — отвечал г-н Таратута, — я православный, а жених вашей сестры, насколько я слышал, — католик? Как же мы можем венчаться в одной церкви?</p><p class="p">— Ну и что же? Мы с Катей и вовсе лютеранки... Неужели ради любви ко мне вы не можете поступиться этими предрассудками!</p><p class="p">— Д-да... там видно будет, — отвечал г-н Таратута. В тоне его звучал едва заметный оттенок недовольства. Но влюбленная девушка ничего не заметила.</p><p class="p">Аналогичный разговор состоялся на следующий день между Екатериной и г-ном Андриканисом... Сестры были разочарованы, но утешали себя тем, что уж после свадьбы-то их женихи непременно встретятся, и все они заживут одной дружной семьей без различия национальностей и вероисповеданий. И девушки вновь засмеялись и заплакали. Они были очень, очень счастливы. Они не подозревали о том, что появлению в их жизни столь прекрасных женихов предшествовал целый ряд взаимосвязанных событий...</p><p class="empty-line"/><p class="p">— Да что ж такое с этими Морозовыми! — в сердцах говорил Владимир Ильич.</p><p class="p">— Это ужасная утрата для социал-демократического движения, — соглашался Феликс Эдмундович. — Подумайте, сколько еще средств мог бы Шмидт вложить в наше дело, останься он в живых! Создается впечатление, что их род преследуют несчастья. Я, право, беспокоюсь о судьбе бедных девочек, Кати и Лизы.</p><p class="p">Ленин никогда прежде не замечал, чтобы Железного Феликса беспокоила судьба каких-нибудь девочек, перешагнувших порог двенадцати лет. А значит — есть у него к этим сестрам некий специальный интерес... Какой? Догадаться было нетрудно. Ленин посмотрел на своего собеседника с хитрым прищуром и спросил:</p><p class="p">— Они наследуют брату?</p><p class="p">— Да, — сказал Дзержинский. Он видел ясно, что у Ленина не возникло ни малейшего подозрения относительно смерти Николая Шмидта. Дальше можно было не лицемерить, а говорить откровенно. — Их деньги должны достаться партии. Во-первых, этого желали и Савва Тимофеевич, и Николай Павлович... Во-вторых, девушкам так будет спокойнее. Ведь их сейчас осаждают толпы бессовестных прохиндеев, охочих до богатых наследниц.</p><p class="p">— И мы должны замешаться в эту толпу? — усмехнулся Владимир Ильич. — Найти двух большевиков, что женятся на сестрах? Дело хорошее, но... Как-то гаденько.</p><p class="p">— Бросьте буржуазные предрассудки. Все, что способствует победе революции, — хорошо и целесообразно.</p><p class="p">— Но ведь мы не собираемся обирать девиц до нитки, надеюсь?</p><p class="p">— Нет, конечно, — сказал Дзержинский, желая сломить дурацкую щепетильность собеседника. — Ведь суммы-то какие! Сразу же после свадьбы мужья переведут большую часть наследства на счета партии, а на оставшуюся долю соломенные вдовушки вполне смогут существовать без особых проблем. Сами подумайте, на кой чорт женщине много денег?!</p><p class="p">— Да, верно. Женщину все равно облапошат: не один, так другой, — согласился Ленин. — Но почему вы говорите о соломенном вдовстве? Разве мужья не станут жить с этими девицами?</p><p class="p">— Вы как хотите, — ответил Дзержинский, — а я не собираюсь.</p><p class="p">— Что?!</p><p class="p">— Да, да, Владимир Ильич. Совершенно не к чему в такое деликатное и тонкое дело впутывать еще кого-то из наших товарищей. Мы с вами сами справимся.</p><p class="p">— Но я женат! — воскликнул Ленин.</p><p class="p">— Мы женимся по чужим, подложным документам.</p><p class="p">— Нет, Эдмундович, увольте! Может, вы и способны за деньги пойти на содержание к богатой купчихе, а я не смогу себя пересилить.</p><p class="p">— Кто говорит о содержании?! — возмутился Дзержинский. — Мы не возьмем на личные нужды ни копейки. Все пойдет партии.</p><p class="p">— В гробу не поеду, — быстро сказал Ленин.</p><p class="p">— Вы — изнеженный буржуа, — укорил его Дзержинский. — Не бойтесь, строгости на границе уже улеглись. Поедем поездом, в первом классе.</p><p class="p">— Ну так и быть, — угрюмо сказал Ленин. — Я согласен...</p><p class="p">— Пусть товарищ Минога срочно изготовит документы. На имя, скажем... Петра Ивановича Иванова и Ивана Петровича Петрова.</p><p class="p">— Нельзя. Документы должны быть подлинные. Ведь речь пойдет о больших деньгах.</p><p class="p">— А какие подлинные документы у вас сейчас имеются в наличии?</p><p class="p">— Таратуты и Андриканиса...</p><p class="p">— Это кто такие?</p><p class="p">— Представления не имею. Какие пачпорты Камо с Кобой экспроприировали, такие и имеются.</p><p class="p">— Что за идиотские фамилии! — поморщился Дзержинский.</p><p class="p">— Так даже лучше, — сказал Ленин. — Когда в газетах напишут, что некий Иванов женился на богатой наследнице, — к нему валом повалят жулики-однофамильцы под видом дальних родственников.</p><p class="p">— Касательно жуликов вам, конечно, видней, — сказал Дзержинский с ехидством. — Ну да все равно. Пусть она впишет туда наши приметы.</p><p class="empty-line"/><p class="p">Надежда Константиновна выполнила очередное партийное поручение безукоризненно и не задала ни единого вопроса; но на душе у Владимира Ильича было как-то смутно. Карточное шулерство, краденые пачпорты, жульническая рулетка, поддельные чулки, — это все было одно, но соблазнить и бессовестно обмануть молоденькую девушку, брата которой при странных обстоятельствах зарезали в тюрьме, — совершенно другое. Он брел бесцельно по улице и думал, думал... «Как же я после такого себя уважать буду? Обобрать и бросить дуру-девчонку... А я вот как поступлю: оставлю ей не малую часть, а ровнехонько половину. И пусть Железный потом ворчит, наплевать. А ежели девчонка хорошенькая — так, может, я и не брошу ее, а поживу по-настоящему. Надя поймет».</p><p class="p">Успокоив себя этой мыслью, он уже гораздо бодрее зашагал по направлению к дому, где располагалось похоронное бюро. Он насвистывал на ходу, улыбался и, переходя улицу, не обратил внимания на приближавшийся справа экипаж...</p><p class="p">— Бедный мой Ильич... бедная твоя головушка... — приговаривала пришедшая навестить его в больнице Надежда Константиновна.</p><p class="p">— Головушке-то ничего не сделалось, она у меня крепкая. А вот нога нескоро срастется. Что там Железный? Ругается?</p><p class="p">— Ну! Рвет и мечет.</p><p class="p">— Пускай себе бесится, — пробормотал Владимир Ильич. В глубине души он был едва ли не рад такому обороту дел.</p><p class="p">Ближе к вечеру его посетил и сам Феликс Эдмундович. Против ожидания Ленина, он был с ним очень мягок и участлив, хотя и не принес цветочков, как это сделал Гриша Зиновьев. Дзержинский действительно сперва рвал и метал, узнав о произошедшем с Лениным несчастном случае, но уже овладел собою: что толку сожалеть о том, чего невозможно поправить. Нужно было не сокрушаться и не браниться, а искать выход из положения. И они с Лениным стали перебирать кандидатуры на роль соблазнителя второй сестры, обсуждая, как две кумушки, достоинства и недостатки потенциальных женихов. Но все кандидаты в ходе обсуждения отпадали по той или иной причине.</p><p class="p">— Серго влюбчив, горяч: может позабыть, для какой цели ему надобно жениться... Красину отлучаться ни на день нельзя: обслуживает рулетку. Богданов занят с трупами. Луначарский слишком болтлив и экспансивен: он не справится... Зиновьев тоже не годится.</p><p class="p">— Какой из Зиновьева жених! — возмущенно сказал Дзержинский.</p><p class="p">— Я и говорю: глуп. Он все переврет и перепутает. А вот Леву Каменева можно послать. Он обаятельный.</p><p class="p">— Но...</p><p class="p">— Можно, можно. Ведь ему необязательно жить с женою. Впрочем... — Владимир Ильич вспомнил о Шурочке Коллонтай, которая и Каменева и Зиновьева почем зря таскала в заднюю комнатку, не делая никакой разницы между ними и всеми другими революционерами: по-видимому, их недуг не был вовсе уж непреодолим. — Да, конечно, Эдмундовкч! Посылайте Леву.</p><p class="p">— Вы меня опять неверно поняли, Ильич. Я хотел сказать другое: вчера я отправил товарища Каменева в Париж по издательским делам... Ладно, забудьте об этом и выздоравливайте, — вдруг сказал Дзержинский, вставая со стула и поправляя подушку больного. — Я, пожалуй, нашел выход.</p><p class="p">— Какой? — спросил Ленин.</p><p class="p">Но Феликс Эдмундович лишь загадочно сверкнул очами, затем нахмурил брови и, ничего не ответя, вышел из больничной палаты.</p><p class="empty-line"/><p class="p">Вскоре у Екатерины и Елизаветы Шмидт появились женихи. Оба они были стройны, худощавы, зеленоглазы; г-н Таратута — блондин с вислыми пшеничными усами, Андриканис же был брюнет и усики имел черные, маленькие, в виде двух запятых. Сестры были уверены, что будущие их мужья отлично поладят друг с другом. Досадно, право, что какие-то обстоятельства все не позволяли свести их лицом к лицу.</p><p class="p">«Будь оно все проклято, — не раз думал Феликс Эдмундович, в изнеможении валяясь на турецком диване (изнеможение его было, разумеется, не физического свойства, а исключительно морального), — кто выдумал, что нужно ухаживать, прежде чем жениться! Эти ужасные, громоздкие человечьи самки с арбузными грудями, эти омерзительные чудища, старые ехидны... ах!.. Все ради моей заветной мечты, моей святой миссии... Ради нее я пролежал месяц в гробу; я должен стерпеть и это — но как гадко, как гадко!» Он корчился от муки, из глаз его лились слезы; разогнувшись пружиною, он соскакивал с дивана и быстрым шагом ходил взад-вперед по комнате, набираясь сил перед вечерним свиданием с какою-нибудь из сестер, и снова падал как мертвый. «Ванда, о, Ванда! Утешь меня, помоги!» — и, корчась от наслажденья и муки, он о детскую туфельку, уж пятнадцать лет всюду возимую с собой, раздавливал последнее содрогание самого длительного восторга, когда-либо испытанного существом человеческим или бесовским... А потом — свидание, и бессмысленные разговоры, и чудеса ловкости, предпринимаемые, чтоб увильнуть от постылых ласк, к которым сестры все настойчивей пытались склонить целомудренных женихов... Но в конечном счете все эти испытания были полезны, они закаляли его, как сталь; и он лишь изредка позволял себе суррогатную, жалкую награду: приводил в дом продажную женщину, которая, быть может, была старше обеих сестер, но умела двигаться с угловатой детской грацией, задумчиво сосала пальчик и была одета в матроску. А впереди еще были венчания, кольца, клятвы, брачные ночи — целый ряд страшных испытаний предстояло ему пройти, прежде чем он получит возможность распоряжаться состоянием своих жен... А сестры Шмидт уже, кажется, начали подозревать, что за его холодной скромностью таится что-то неладное — как бы мероприятие вообще не сорвалось!</p><p class="empty-line"/><p class="p">В одно прекрасное утро молодой человек приятной наружности сидел за столом в своей бедной квартирке, пил кофе и просматривал газеты; и вдруг он хлопнул себя по коленке, подскочил, схватил шляпу и выбежал на улицу. Он был обрусевший грек, помощник присяжного поверенного, и звали его Николай Андриканис. Он только что прочел в газете извещение о свадьбе богатой наследницы Екатерины Шмидт с каким-то господином, которого звали точно так же, как его самого. Андриканис был далек от мысли, что мужем богачки стал проходимец, год назад укравший его документы; он просто-напросто подумал, что было бы очень неплохо свести знакомство с соплеменником и тезкою: быть может, даже попытаться выдать себя за дальнего родственника, а ежели не получится, то, взывая к национальным чувствам, разжиться вспомоществованием. (Он был добрым, но не особенно щепетильным человеком, если не сказать более, и в данный момент сидел, что называется, на мели.)</p><p class="p">Он узнал, по какому адресу новобрачные сняли квартиру, и полетел туда. Тезку он не застал дома; однако новобрачная к нему вышла. Девушка была бледна, грустна, весь ее вид выражал жестокое разочарование. Неожиданный визитер развлек ее; он был учтив, мил, жизнерадостен. А тот, видя, что девушка проявляет к нему симпатию, решил, что было бы неплохо добиться расположения жены своего тезки — на случай, ежели тот окажется скупым и неприветливым человеком. И вскоре Екатерина уже плакалась ему в жилетку и жаловалась на свою горькую судьбу.</p><p class="p">— Кем, вы говорите, мой муж вам приходится? — спрашивала она сквозь слезы.</p><p class="p">— Э... кузеном.</p><p class="p">— Вообще-то он, конечно, человек благородный, — сказала она, всхлипывая, — он решил отдать все наше состояние на нужды трудового народа, чтобы продолжить дело моего покойного брата... Но он такой... такой холодный! Он сбежал от меня, сбежал в брачную ночь! Сразу после венчания сел в пролетку и уехал, как Хлестаков...</p><p class="p">— Вы, наверное, хотели сказать — как Чичиков?</p><p class="p">— Да, то есть Подколесин... Ах, я так расстроена, что все на свете перезабыла...</p><p class="p">— Отписать состояние неизвестно кому! Екатерина Павловна, он сумасшедший и прохвост. Он у нас в семье всегда был паршивой овцою, — с жаром сказал Андриканис: в мозгу его забрезжила ослепительная, безумная идея...</p><p class="p">— Что вы говорите! — девушка всплеснула руками.</p><p class="p">— И он женат. У него уже три жены. Он негодяй, страшный человек; он вас погубит.</p><p class="p">— Что же мне делать?</p><p class="p">— Ах, Екатерина Павловна, умоляю, выслушайте меня и обещайте не сердиться! — сказал Андриканис, опускаясь на колени и держа девушку за руку...</p><p class="empty-line"/><p class="p">Когда вечером — после венчания с младшей сестрою — Феликс Эдмундович явился на квартиру, снятую им для старшей, чтобы уговориться с нею о завтрашнем походе в банк, к юристам и нотариусам, швейцар внизу сообщил ему, что «барыня уехали».</p><p class="p">— Что?! Как то есть уехали?!</p><p class="p">— Да уж так уехали, ваше благородие. Вещички взяли и уехали с супругом и с горничною на вокзал. Я им вызывал извозчика.</p><p class="p">— Вы не в своем уме! С каким супругом?! Я — супруг!</p><p class="p">— Не могу знать, вашбродь, — тупо отвечал швейцар. — А только они, барыня то есть, велели вашему благородию передать, что уезжают с законным супругом своим г-ном Андриканисом в путешествие. И что денежек ихних вашему благородию не видать как своих ушей.</p><p class="p">Еще никогда в жизни Феликс Эдмундович не был так жестоко обманут в своих лучших чувствах. Он поднял на ноги всю свою агентуру и узнал, кто был подлец, похитивший его жену... Он кусал руки, он бился головою о стены. «Уплыли денежки! Такой труд — псу под хвост! Воистину женщины — подлые, гнусные твари, сосуды диавольские!» И он понесся, пылая гневом, обратно к младшей сестре. Нужно было скорей распорядиться ее долей наследства, пока не явился еще какой-нибудь негодяй и не наложил свою грязную лапу на чужие деньги. Половина все-таки была лучше, чем ничего.</p><p class="p">Но на этом история с наследством сестер Шмидт не закончилась... По стечению обстоятельств, подлинный Виктор Таратута тоже находился в Москве, тоже имел некоторые жульнические наклонности и был падок до легких денег; мысль его работала точно так же, как у Андриканиса; однако он опоздал и заявился с визитом к плачущей, брошенной Елизавете, когда ее капитал уже покоился на счетах большевиков. Он не мог с этим смириться; он решил во что бы то ни стало выцыганить хоть что-нибудь, разузнал все о большевиках, вступил в их партию и до конца своих дней продолжал рука об руку с Елизаветой гоняться за этим — уже призрачным — наследством...</p><p class="p">— Сутенер, жалкая, ничтожная личность, — сказал Феликс Эдмундович, узнав об этом. — Жить с богатой купчихой ради денег... Не понимаю!</p></span>
