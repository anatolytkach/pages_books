<span id="id7"><div class="title">
<p class="p1">ГЛАВА 6</p>
</div><p class="subtitle">Лонжюмо, 1911: любовь, секс, ревность, измены, оргии и дуэли в революционной среде.</p><p class="empty-line"/><p class="p">Вопреки укоренившемуся заблуждению, Владимир Ильич никогда не читал Льва Толстого, поскольку находил его книги чересчур толстыми; глыбой и человечищем он как-то назвал его по недоразумению, спутав с другим Толстым — «американцем», одним из первых русских преферансистов. Он не знал фразы о семьях, которые несчастливы по-своему, и у него не было доброго камердинера, который утешал бы его тем, что все образуется. И тем не менее...</p><p class="p">Все смешалось в доме Лениных. Жена узнала, что муж был в связи с француженкой-гувернанткой, и объявила мужу, что не может жить с ним в одном доме. Положение это продолжалось уже третий день. Кушанье было не готово, шифровки не отправлялись, статьи в газету не сочинялись, за покер приходилось садиться без партнера, по всей квартире валялись демонстративно нечиненые рубахи и носки.</p><p class="p">Владимир Ильич был человек правдивый по отношению к себе самому. Он не мог обманывать себя и уверять себя в том, что он раскаивается в своем поступке. Может быть, и даже наверняка, он сумел бы скрыть свои грехи от жены, если б ожидал, что это известие так на нее подействует. Но он никак этого ожидать не мог, поскольку жена его даже не была, строго говоря, женой, а всего лишь деловым партнером и товарищем. «И как хорошо все было до этого, и как мы хорошо жили!»</p><p class="p">— Надюша, рыбка, перестань сейчас же дуться и поговори со мной.</p><p class="p">Надежда Константиновна подняла голову от книги. Она читала «Пол и характер» Вейнингера в подлиннике. Глаза ее ослабли от постоянного чтения и шифровок, и она теперь носила очки; в них она совершенно могла сойти за интеллигентную даму. «И эту женщину — темную, неграмотную, мелкую мошенницу—я вытащил из свиного хлева! — подумал Ленин. — Кто поверит этому?» Он сделал вдох, мысленно счел до десяти и сказал:</p><p class="p">— Дорогая, позволь мне объяснить...</p><p class="p">— Оставьте меня. Уйдите.</p><p class="p">«Уже и на „вы“! — поморщился Ленин. — Как она усвоила привычки так называемых порядочных женщин! Чуть что — сразу „вы“ и этот холодный тон... Поневоле чувствуешь себя виноватым».</p><p class="p">— Дорогая, позволь обратить твое внимание на следующее обстоятельство: наш брак изначально был и остается фиктивным. О какой верности может идти речь?! Я вообще не обязан пред тобою отчитываться в своей частной жизни и сейчас делаю это лишь из уважения, которое питаю к тебе как... как...</p><p class="p">— Обеды-то я вам не фиктивные стряпала. — От волнения к ней вернулась уже почти забытая простонародная манера выражаться. — И деньги для вас покером зарабатывала не фиктивные. А верности вашей мне не нужно, я вообще девушка, ежели вы забыли. Да только не желаю я, чтоб вы к своей прошмандовке шлялись в рубашечках, что я нагла... награ... нагадила. — Губы ее дрожали. — Хватит, надоело на вас зазря спину гнуть. Вы эксплоататор! Дайте мне развод. Я не старая еще. Может, на мне какой честный мужчина женится. По-настоящему, а не ради карт. Я ему деток рожу.</p><p class="p">— Надя, какие детки?! Какой развод?! — Он схватился за голову. — Ты белены объелась, что ли?</p><p class="p">— Не дадите развода?</p><p class="p">— Не дам, — отрезал он. — Мы в церкви венчались. Ты пред Богом клялась, что будешь со мной в болезни и здравии.</p><p class="p">— Вы мне сами все уши прожужжали, что Бога нет, а теперь вон как запели! Ренегат! Лицемер! Фарисей! Оппортунист! А не дадите развода — так я сама к курве этой пойду!</p><p class="p">— Дура! — вспылил Владимир Ильич. И тут, как последний аргумент, ему в голову полетела чугунная сковорода — он едва успел увернуться.</p><p class="p">— Я глазенки-то ей бесстыжие повыцарапаю!</p><p class="p">— Дура, — еще раз сказал он, но уже мягче: в доме было еще много тяжелой посуды. И, хлопнув дверью, выскочил из дому.</p><p class="p">«До чего я дожил — Надька Минога мне условия ставит! Дай бабе волю — мигом на шею усядется!» Он шагал быстро и сердито размахивал руками. Это была его первая серьезная ссора с женой за все прошедшие годы. Он и подумать не мог, что кроткая и услужливая Надежда — верный друг, отличный товарищ — когда-нибудь осмелится кричать на него и устраивать ему сцены, а тем более требовать развода и швыряться сковородками, как какая-нибудь мещанка. На развод согласиться он решительно не мог: так привык к ней, привык к нехитрому уюту, что она повсюду создавала для него, к ее неусыпной заботе, даже к разговорам с ней... А карты?! А шифровки, а конспекты? Дзержинский не мог знать, кто пишет за него статьи, но он-то знал!</p><p class="p">Владимир Ильич остановился посреди тихой улицы, обсаженной платанами и вязами. Всего несколько двориков отделяли его дом от дома, где поселились Зиновьев с Каменевым и Инесса Арманд. Лонжюмо — крошечная деревушка, все обо всех болтают; неудивительно, что Надежде Константиновне донесли об Инессе... Хотя, возможно, никто и не доносил, а он сам был неосторожен. Но что же теперь делать? Он посмотрел на часы — у Инессы сейчас по расписанию лекция по макраме. Куда пойти? Он вылетел из дому без велосипеда — в Лонжюмо принято было передвигаться на велосипедах — и в одном пиджачке, а день был прохладный. Он решил вернуться — быть может, Надежда Константиновна уже поостыла, — и попытаться еще раз поговорить с нею. Но, подходя к калитке, столкнулся с женой — она, в накинутом на плечи платке, пронеслась мимо, делая вид, что не замечает его. Губы ее были сжаты, глаза, выкаченные, как у рыбы, казались еще больше обычного.</p><p class="p">Он проводил жену взглядом и вынужден был признать, что со спины она выглядит вовсе не так уж плохо. До сих пор ему никогда не приходило в голову, что она может найти себе другого мужчину. «А может быть, уже нашла? И моя связь с Инессой — только предлог, чтобы просить развода? Ну нет, этого я не допущу!»</p><p class="p">Он решил дождаться, когда у Инессы закончится лекция, и тогда пойти к ней и предупредить, чтоб не высовывала носа из дому, пока Надежда Константиновна не откажется от своих кровожадных намерений. Нужно было куда-то убить два часа времени. Он немного посидел у себя, но одному было тоскливо. Он оседлал велосипед и покатил снова к дому Инессы. Поднялся на второй этаж, который занимали два товарища, постучался и вошел. Зиновьев был один и ползал по полу, раскладывая гигантский пасьянс. Под глазом у него был свежий синяк. Но это уже давно никого не удивляло.</p><p class="p">Зиновьев предложил Ленину кофе, но Ленин кофе не хотел; он спросил пива, но пива не было. Тогда они прибегли к обычному компромиссу, то есть выпили водки. Выпив, некоторое время они сидели молча, потом выпили еще. Зиновьев чесал в кудрявом затылке, зевал и все поглядывал на Ленина, не решаясь задавать вопросы: он ясно видел, что старый друг чем-то удручен. Наконец, не выдержав молчания, он спросил:</p><p class="p">— Володя, ты в порядке?</p><p class="p">— Запутался я, Гриша.</p><p class="p">— Что такое?</p><p class="p">— Надя требует развода.</p><p class="p">— Из-за Инессочки? </p><p class="p">— Ну да.</p><p class="p">— Странный ты человек, Voldemare. Ну что тебе не жилось с Надюшей? Она так вкусно стряпает. Чего еще можно желать от женщины?</p><p class="p">— От женщины можно желать очень многого, друг мой. Тебе этого не понять. Представь, что... Нет, ладно, ничего не представляй. Ты мне лучше скажи, Гриша... Ты ведь все сплетни собираешь...</p><p class="p">— Никаких я сплетен не собираю, — обиженно возразил Зиновьев. — А какие именно сплетни тебя интересуют?</p><p class="p">— Ты ничего не слыхал о моей Наде? Зиновьев — этот распутный сапожничий сын,</p><p class="p">шельма, вертопрах и обжора — все понимал с полуслова, за то Ленин всю жизнь и ценил его. Он ухмыльнулся и сказал:</p><p class="p">— Ты хочешь знать, не таскается ли она с другими революционерами? Да вроде бы нет. Лева, правда, как-то видел ее с Анатолем... Они разговаривали весьма интимно.</p><p class="p">— С Луначарским?! Не верю. Этого не может быть, потому что этого не может быть никогда... Брось-ка ты, Гриша, свой пасьянс. Давай лучше в подкидного перекинемся.</p><p class="p">Невинная детская игра, как всегда, отвлекла Владимира Ильича от грустных мыслей и успокоила его нервы. Часа через полтора, когда нос Зиновьева уже совсем распух, — они играли, как всегда, на щелбаны, — тот начал хныкать и просить пощады. Ленин отложил карты, потянулся и проговорил уже весело:</p><p class="p">— Дураком родился, дураком помрешь... Такая уж твоя планида, Гриша.</p><p class="p">— Ты просто передергиваешь, — с легким укором сказал Зиновьев, разглядывая свое лицо в карманное зеркальце. Даже с красным носом и лиловым синяком он был по-прежнему смазлив — одни ресницы чего стоили — и, сознавая это, самодовольно улыбнулся своему отражению.</p><p class="p">Владимир Ильич подозревал иногда, что от этих болезненных щелчков по носу его бессменный карточный партнер получает какое-то особое, непонятное здравомыслящему человеку наслаждение, но, в конце концов, это было его личное дело. Среди революционеров попадались люди с куда более удивительными привычками — например, Богданов с его постоянными разговорами о кровопусканиях и кровопереливаниях... «Да взять хоть того же Феликса: после парижских приключений он без скальпеля и из дому-то не выходит. А уж когда ему приходит охота посидеть в тюрьме — его сокамерники потом такое рассказывают о его затеях, что даже у меня язык не повернется повторить... Бичевания, распятия, терновые веночки, и чтоб гвозди непременно были железные... (Все это было злопыхательское вранье. Ничего подобного Феликс Эдмундович никогда не совершал, и уж во всяком случае не железными гвоздями.) Но что делать? Социальная революция невозможна без сексуальной. Я буду просвещенным монархом и не собираюсь вставать на пути прогресса». Чтобы проверить свою гипотезу, Ленин снова взял колоду карт и хотел было еще раз стукнуть Зиновьева по носу, но тот отстранился с недовольным видом. Тогда Ленин сказал примирительно:</p><p class="p">— Никогда я в дурака не передергиваю, просто мне карта прет... Я вот иногда думаю: сбежать бы от них от всех на недельку... Засели бы с тобой в каком-нибудь шалашике и сутками напролет играли... Ох, Гриша, заболтался я тут с тобой. Мне пора. Инесса, наверное, уже давно вернулась с лекции.</p><p class="p">Попрощавшись с Зиновьевым, Владимир Ильич сбежал по ступенькам на первый этаж, насвистывая сквозь зубы. Он уже собрался постучаться к любовнице и даже улыбку заготовил, но внезапно — о ужас! — до его слуха донесся пронзительный голос жены... Он замер, прислушиваясь: дверь была толстая, и он не мог разобрать ни слова. Потом Инесса что-то отвечала своим певучим низким голоском... Кажется, драки нет... Он тихо, ступая на цыпочках, вышел во двор. Пригнувшись, подобрался к окошку — ставни были открыты, кружевная занавеска колыхалась от ветра, — и осторожно глянул внутрь.</p><p class="p">К его удивлению и облегчению, обе женщины сидели друг против друга за столом и беседовали довольно мирно, во всяком случае, в волосы никто никому не вцеплялся. В руках у Инессы было вышиванье; Надежда Константиновна суетливо щелкала замочком своего ридикюля.</p><p class="p">— ...Хорошо также добавлять смородинный лист и укроп.</p><p class="p">— Я непременно попробую сделать, как вы говорите, Надя.</p><p class="p">— Жаль, что здесь нет хорошей рыбы. Эта Иветт по сравнению с нашим Енисеем и даже Сеной — просто лужа. Когда мы жили в Париже, я каждый день ходила на рынок и покупала свежую рыбу. Ильич очень любит уху.</p><p class="p">— Надя, я так виновата перед вами...</p><p class="p">— Ах, бросьте, милочка. Мы с вами цивилизованные, передовые женщины, и нам не пристало... Но расскажите мне про ваших деток... Вы, должно быть, страшно скучаете по ним.</p><p class="p">— Да, очень. Но у меня здесь так много работы...</p><p class="p">— Анатолий Васильевич прекрасно отзывался о вашей последней лекции.</p><p class="p">— Вы очень добры...</p><p class="p">Ленин крякнул, покрутил головой. Однако! Но он был доволен, что все обернулось так. Он, как всегда, недооценил свою жену. Надька Минога осталась далеко в прошлом. Он решил не мешать дамской беседе и воротился наверх, к Зиновьеву. Вскоре пришел Лева, и они сели играть уже втроем. На сей раз Ленин продулся вчистую и честно заплатил по счету — фальшивыми франками. Он терпеть не мог, чтоб его били по носу.</p><p class="empty-line"/><p class="p">— Надя, ты не починишь мне рубашку? — спросил он на следующее утро, всем своим видом демонстрируя готовность к примирению.</p><p class="p">— Починю. — Она скупо улыбнулась. В глазах ее он с радостью увидел прежнее доброе выражение. — Ты знаешь, Ильич... Я познакомилась с твоей Инессой.</p><p class="p">— Да?</p><p class="p">— Она очень милая и производит впечатление порядочной женщины. Никогда и не подумаешь, что француженка. Я совсем не так ее себе представляла.</p><p class="p">— Я рад, что она тебе понравилась.</p><p class="p">— Вот и прекрасно, — спокойно ответила Крупская. — Давай разведемся. Ты женишься на ней. Нельзя так компрометировать ее. Это неблагородно с твоей стороны, Ильич.</p><p class="p">— Надя, опять ты за свое! — Он снова подумал, что у жены, наверное, есть любовник. Иначе б она так легко не примирилась с Инессой. Он сдержал себя и проговорил так кротко, как только мог: — Давай, дружок, немного подождем... Ты прости меня, если я тебя обидел.</p><p class="p">— Бог простит... — машинально отозвалась она и, вдруг оживляясь, сказала: — Ильич, вообрази: Анатолий Васильевич в своей лекции говорил, что мы должны построить нового Бога взамен старого...</p><p class="p">— Богостроитель хренов! — Ленин фыркнул насмешливо и сердито. Ему начали не нравиться эти постоянные ссылки на авторитет Анатолия Васильевича. И он вспомнил глупую сплетню Зиновьева...</p><p class="p">«Нет, не может быть! Балда Луначарский, этот расфранченный светский хлыщ, этот изнеженный декаденток, пьеро с зеленой гвоздичкой в петлице, дешевый стихоплет, — и моя клуша! Да я скорей уж поверю, что Лева Каменев по пьяни с ней переспал: всем известно, как они друг к дружке расположены... Вдобавок Луначарский, помнится, женат на богатой купчихе, и у них шестеро детей... Бред, бред! А насчет Боженьки я с ним еще потолкую. Это все сумасшедший Богданов его сбивает с панталыку. Вот тоже фрукт! Философская сволочь! Воображает себя вампиром... Все они тут от безделья с ума посходили».</p><p class="empty-line"/><p class="p">— Ильич, когда же мы поженимся? Надя сказала мне, что она не только не против развода, но даже сама предлагает тебе это. Ах, она такая чудная, прекрасная женщина! Сразу видно светскую даму.</p><p class="p">— Видишь ли, дорогая...</p><p class="p">Ленин обожал Инессу; он изменял ей с другими женщинами не чаще раза в месяц и, изменяя, думал о ней же. Но жениться на ком бы то ни было ему хотелось еще менее, нежели разводиться с Крупской. Дети? Он, пожалуй, хотел детей; но у Инессы их и так уже было пятеро — придется всю эту ораву содержать... Нет, нет. Его вполне устраивало существующее положение вещей. Он притянул Инессу к себе и шепнул, целуя ее в розовое ушко:</p><p class="p">— Куда торопиться? Разве тебе плохо со мной? Зачем этот буржуазный брак с его буржуазными...</p><p class="p">— Я бы сшила к свадьбе новое платье.</p><p class="p">— Я куплю тебе десять платьев. Послушай, а Надя тебе ничего такого о себе не говорила?</p><p class="p">— Какого такого?</p><p class="p">— Может, она признавалась тебе, что любит какого-нибудь мужчину...</p><p class="p">— Нет, Ильич. Она любит тебя. Но она благородная женщина и не хочет мешать твоему счастью. — «Вот хитрая стерва», — подумал Ленин.</p><p class="p">— Ну иди же ко мне, мой маленький лектор...</p><p class="empty-line"/><p class="p">По уикендам в Лонжюмо устраивались на чьей-нибудь квартире небольшие вечеринки для своих: танцульки, карты, скромный ужин, салонные игры, иногда даже небольшие капустники. Разумеется, это происходило лишь в отсутствие Дзержинского, который не одобрял веселья и праздности. Но Феликс Эдмундович — во всяком случае, так считалось, — отсиживал очередную каторгу или, что более вероятно, путешествовал инкогнито по земному шару, плетя конспиративные сети и устраивая заговоры, и никто не мешал революционерам расслабиться: кот из дому — мыши в пляс... Жить в Лонжюмо было веселей и дешевле, чем в Париже, и идея выехать из столицы в деревню на все лето восхищала русских эмигрантов. Ленин целыми днями купался и загорал, Луначарский писал драматические поэмы, и даже Каменев с Зиновьевым, кажется, переживали второй медовый месяц.</p><p class="p">Так было и в эту субботу. Все были очень веселы: Ленин показывал фокусы, Арманд за роялем пела романсы, Надежда Константиновна — «Мурку», Луначарский читал стишки, Зиновьев пародировал Луначарского, Орджоникидзе плясал лезгинку; потом Каменев с Лениным, заложив большие пальцы рук за жилетки, выдали «семь сорок»... Инесса смеялась, хлопала в ладошки... Наконец все устали и, утирая пот, вновь уселись за стол. Вечер за окном был теплый, томный... Хотелось чего-то романтического. Ленин предложил расписать пульку, Зиновьев поддержал его, но остальные не согласились:</p><p class="p">— Ильич, вы с Гришей, ей-богу, как помешались на своих картах... Давайте лучше сыграем во что-нибудь другое.</p><p class="p">Луначарский, как обычно, предложил буриме. Но и буриме всем надоело. Тогда он вызвался прочесть вслух свою новую пьесу, отчего все застонали в ужасе: своей графоманской продукцией, которую он производил чуть не тоннами, Анатолий Васильевич в полчаса мог свести с ума любого. Положение спас Орджоникидзе, сказав:</p><p class="p">— В бутылочку, а, господа? Давненько мы в нее, родимую, не играли.</p><p class="p">— Ну, вот еще! — Дамы притворно запротестовали. Но энергичный Серго уже расчищал поверхность круглого стола.</p><p class="p">Он первым и крутил бутылочку — темную, пузатую бутылку из-под «Вдовы Клико». Совершив несколько оборотов, бутылка указала на Надежду Константиновну. Она, жеманясь, подставила губы... Ленин пристально следил за нею. Красавец Серго был, конечно, опасный мужчина. Но жена не выказала никакого особенного волнения. Да и поцелуй был короткий, прохладный.</p><p class="p">— Крути — с кем! — смеясь, хором закричали революционеры. — Крути — с кем!</p><p class="p">Крупская, утерев рот салфеткой, аккуратно раскрутила бутылку. Теперь ей выпало целоваться с Каменевым. Лева приобнял ее очень нежно, но это было не в счет. Бутылка продолжала свои странствия: Каменев, ловко смухлевав, раскрутил на Зиновьева, тот — на Луначарского, Луначарский — на Инессу, Инесса — на Ленина; Ленин, целясь в Инессу, промахнулся и угодил в Зиновьева, Зиновьев попал в Орджоникидзе, но тот увильнул под предлогом внезапно заболевшего зуба... Игра продолжалась довольно долго и с переменным успехом. После очередного круга бутылочка в руках Надежды Константиновны указала на Луначарского. Они смотрели друг на друга... Что-то кольнуло Ленина в самое сердце. Он мысленно обругал себя собакой на сене. Нет, конечно, он не ревновал. Но позволить творению его собственных рук, его Галатее, удрать от него и задарма ублажать этого пустого виршеплетика, который все равно не подумает на ней жениться, а поматросит и бросит! Да и слыть рогоносцем было очень неприятно: кто теперь поверит, что он никогда не жил с женой как с женой?</p><p class="p">Однако поцелуй выглядел вполне целомудренно. Ленин решил, что многозначительный взгляд, которым обменялись жена и ее предполагаемый любовник, просто пригрезился ему. Однообразная игра ему надоела; он потихоньку выманил Инессу в темный коридорчик...</p><p class="p">— Совет да любовь, — сказал Зиновьев, выглянув из дверей. — А там пулечку расписывают...</p><p class="p">— Ах, Гриша, подожди. Не начинайте без меня. Сейчас, сейчас... сейчас...</p><p class="empty-line"/><p class="p">Но подозрения уже глубоко засели в его сердце. Ему теперь все казалось странно: и дурное настроение жены, и хорошее; он подозревал ее, когда она начинала опять клянчить развода, и подозревал еще сильней, когда она на время оставляла свое нытье. Он измучился; он хотел знать правду.</p><p class="p">Как всякому порядочному революционеру, ему первым делом пришла мысль о слежке с переодеваниями: опыт у него уже был богатый. К тому же он любил музыкальную фильму, водевили и оперетки, а там, чтобы застукать неверную жену, постоянно кто-нибудь в кого-нибудь переодевался и приходил на свидание вместо другого человека. Сюжеты «Фигаро» и «Летучей мыши» замелькали в его воображении. Но там, помнится, всегда была какая-нибудь субретка-горничная. В Лонжюмо горничных никто не имел. «Самому одеться субреткой? Комплекция, увы, не та, да и навыка нет».</p><p class="p">— Гриша, ты когда-нибудь одеваешься в женское платье?</p><p class="p">— Нет. Зачем? — искренне удивился Зиновьев.</p><p class="p">— А Лева?</p><p class="p">— С какого перепугу, Voldemare?! Ты нас за кого принимаешь? Уж Лева-то тем более...</p><p class="p">Ленин не совсем понял, почему «тем более», но понял, что изображать горничную никто из приятелей не сумеет. Пришлось отказаться от этой затеи. «В конце концов, мы не в оперетке. Люди все серьезные. Мы пойдем другим путем». Он решил поговорить с женой — тонко, деликатно, тактично:</p><p class="p">— Надя, у тебя есть любовник?</p><p class="p">— Да что ты такое говоришь, Ильич! Любовник! — Однако она покраснела.</p><p class="p">А на следующий день — жены не было дома — он, выдвинув ящик ее письменного стола — искал ножницы, чтоб обстричь ноготь на мизинце, — обнаружил там сложенную вчетверо, надушенную записочку... Не раздумывая, он развернул ее. Там были стихи, он сразу узнал почерк...</p><p class="p">«Так вот уже куда у них зашло! Мадригалы ей посвящает! Сволочь! Архисволочь! Иудушка! Декадент! — Ленин вспомнил некоторые строки из прочтенного стихотворения и весь передернулся: о качестве поэзии судить он не мог, но содержание было весьма эротическое, хотя и туманное. — Я его прибью. Я прибью эту тварь. К чорту сексуальную революцию, к чорту передовые взгляды; я не желаю разгуливать по всему Лонжюмо с рогами на голове. Честь моей жены — моя честь. Так отделаю, что он к чужой бабе на пушечный выстрел больше не подойдет. Царевич я иль хрен с горы?!»</p><p class="p">И он решительным шагом отправился на квартиру к Луначарскому, сознавая, впрочем, что ведет себя глупо и даже архиглупо, но не в силах уже остановиться... А в это время Луначарский и в самом деле принимал у себя Надежду Константиновну. Это бывало в последнее время весьма часто.</p><p class="p">— Вам нравится? Да? Да? Скажите же, что вам это нравится!</p><p class="p">— Это было божественно, — отвечала Крупская. — Восхитительно.</p><p class="p">— Я счастлив, что сумел доставить вам это удовольствие.</p><p class="p">— Мне только кажется, что рифма «розы-слезы» несколько банальна... — осторожно заметила Крупская.</p><p class="p">Стихи Анатолия Васильевича казались ей страшно милыми; пусть они не были так душевны, как «Дубинушка» или «Мурка», но в них была иная, утонченная красота. Она не считала себя достойной компетентно судить о качестве прозы и тем более поэзии, но предположила — ошибочно, конечно, — что автору могли надоесть ее однообразные дифирамбы и он будет рад услышать малюсенькое критическое замечание, показывающее, что она вдумчиво относится к представленным на ее суд произведениям. Луначарского ее робкая критика хлестнула словно плетью, и он проговорил довольно холодно:</p><p class="p">— Важны не рифмы, а идея и подтекст.</p><p class="p">Крупская поспешно согласилась; она была чутка и осознала свою ошибку. Она попросила, чтобы Луначарский прочел что-нибудь еще. Он растаял и стал читать. Она слушала как завороженная... Любила ли она его? Она сама не понимала, что с нею происходит. Надежда Константиновна была прежде всего женщина, о чем ее муж давно позабыл; ее влекло к мужчинам, но трезвый ум, как и в юности, не позволял делать из-за них глупости. Ей нравился горячий красавец Серго, но она понимала, что недостаточно молода и белокура; ей нравился уютный Лева Каменев, но она смутно догадывалась, что с Гришей ей не тягаться, и порой сожалела, что не родилась мужчиною; демонический и безумный Богданов волновал ее воображение, но он был замкнут и недоступен; лишь утонченно-ледяная краса Дзержинского, тревожа глаз, все ж не задевала сердца, ибо Надежда твердо усвоила от мужа, что Феликс Эдмундович никакой не рыцарь, а сутенер, аферист, растлитель малолетних, проститутка и железный болван.</p><p class="p">К Луначарскому же она сперва относилась, как и к мужу, с материнской нежностью — он был так неприспособлен к жизни, бедняжка! — но постепенно жалость перерастала в иное, более страстное чувство. Никогда еще никто не читал и уж тем более не посвящал ей стихов. А он, измученный постоянными насмешками и издевательствами со стороны товарищей по партии, был счастлив, что наконец нашелся слушатель столь благодарный и способный оценить его гений. Общение с Крупской действовало на него как вода на растение; он уже почти не обращал внимания на ее малопривлекательную наружность, за которой видел нежную и тонкую душу. Отношения их пребывали еще на платоническом уровне, но все потихоньку шло к естественному завершению.</p><p class="p">— Nadine, о чем вы думаете?</p><p class="p">Крупская ничего не успела ответить: незапертая дверь широко распахнулась от пинка, и разъяренный Владимир Ильич предстал перед влюбленными. При всех своих подозрениях он все же не ожидал, что так сразу застукает их на месте преступления. Убежденный материалист, он не верил, что бывает платоническая любовь, и по-своему истолковал невинную сцену: «Уже перепихнулись и стишки почитывают. Сволочи, ренегаты!» Не долго думая он подскочил к диванчику, в разных концах которого сидели жена и ее хахаль; он пару раз съездил Луначарского по физиономии и схватил жену за косу, намереваясь оттаскать ее как следует, но она вырвалась и завизжала на всю улицу:</p><p class="p">— Помогите! Люди добрые, спасите! Убивают!</p><p class="p">— Что ты кричишь! — сердито сказал Ленин, сразу же со смущенным видом отпустив жену: он не любил громких скандалов и вовсе не желал огласки. — Никто никого не убивает. Идем домой. Я тебе не позволю таскаться по мужикам. Нашла с кем, дура! Этот бездарный...</p><p class="p">— Не смейте оскорблять искусство! — выкрикнул Луначарский, прячась за диванчиком. — Я не позволю.</p><p class="p">— А-а, так тебе еще мало? — сказал Ленин и приблизился к нему с угрожающим выражением на лице. Впрочем, он уже утолил свой гнев и не хотел больше бить это ничтожество. — Ты, Анатолий Васильевич, графоман и дундук. Чтоб я твоих паршивых стишат больше не видел. — Он отвернулся и, не обращая внимания на поверженного соперника, пошел к выходу. Но тот крикнул вслед ему:</p><p class="p">— Я... я этого так не оставлю! Я вас вызываю!</p><p class="p">— Куда? — не понял Ленин.</p><p class="p">— На дуэль, — гордо пискнул Анатолий Васильевич.</p><p class="p">— Вот болван, — сказал Ленин почти добродушно. — Ну, какая еще дуэль? К чему эти буржуазные... А-а, чорт вас раздери... — Он бросил взгляд в сторону окна и увидел, что все соседские ставни распахнуты и из них по пояс высунулись революционеры, привлеченные криками Надежды Константиновны, а теперь с живейшим любопытством прислушивающиеся к скандалу. Отказ от вызова при стольких свидетелях означал несмываемый позор. Ведь дело происходило во Франции.</p><p class="p">«...Кто же должен выбирать оружие — я или он? Не знаю я этих дурацких реверансов, будь они неладны... А надо бы — император должен разбираться в таких вещах... Как считать — он меня оскорбил или я его? И из-за чего, собственно, мы будем драться — из-за жены или из-за того, что я назвал его бездарью? Но я и так выразился очень мягко: слышал бы он, как его другие за глаза поносят... Наверное, все-таки я должен выбирать... Положим, стреляю-то я порядочно: даром, что ли, мы с Гришей всех ворон в Фонтенбло перебили... А! Нужно взять секундантов. Они пусть разбираются во всей этой мерзкой чепухе».</p><p class="p">— Я пришлю вам секундантов, — сказал он холодно. Царственное достоинство было на его лице. Он очень себе нравился в эту минуту.</p><p class="p">И смертоносный механизм дуэли начал раскручиваться. Ничего поправить было уже нельзя.</p><p class="p">Секунданты — Зиновьев с Каменевым и приехавший погостить Богданов с Орджоникидзе — часами сидели в пивной и торговались об условиях; дуэлянты писали письма, рвали их в клочки и писали снова; дамы щипали корпию, с ужасом думая о ранах. Надежда Константиновна трепетала от страха за жизнь обоих противников — каждый был ей по-своему дорог, — но и от счастья тоже: никогда еще мужчины не дрались из-за нее на дуэли. Об этом ли не мечтает в глубине души всякая женщина? Даже красивая Инесса Арманд, наверное, завидовала ей.</p><p class="empty-line"/><p class="p">«Вот уже и светает... Дурак я, дурак, дурак! Зачем согласился на эту глупость? Что теперь делать? Укокошишь его — в тюрьму посадят, чего доброго. — Ленин очень боялся тюрьмы и каторги. — Можно, конечно, перейти на нелегальное положение. — Ильич вздохнул: жить на нелегальном положении, в отличие от Дзержинского, он терпеть не мог. — Я не кровожаден... Это Железный Феликс чуть что — убить, убить... Напугаю его и ладно. А потом? Может, надо было попросту потихоньку поучить жену вожжами? Опять же нехорошо — будущую императрицу... Хотя какая из нее императрица?! Да и с престолом что-то пока ничего не выходит... А ну как он по случайности меня уконтрапупит?! Гриша говорит, он с пяти шагов в корову не попадет, но ведь пуля — дура...»</p><p class="p">— Пошли, Володя.</p><p class="p">— А? — он растерянно обернулся. — Уже пора?</p><p class="p">— Пора, пора, — весело сказал Зиновьев. Он был искренне привязан к Ленину, но обожал кровавые зрелища и не мог скрыть своего восторга от предстоящего поединка.</p><p class="p">Утро было серое, тусклое, противное; накрапывал мелкий дождик. Берег речки Иветт весь размок, осклиз. Гадко... Луначарский со своими секундантами был уже на месте: он дрожал как осиновый лист, но хорохорился.</p><p class="p">Пройдя немного вверх по реке, все остановились. Секунданты собрались в кучку и яростно заспорили о формальностях: кто ссылался на авторитет Лермонтова, кто — Тургенева, кто — Дюма-pere... Большинство секундантов — в отличие от самих противников — было настроено довольно-таки кровожадно: Серго — в силу национальной воинственности, Зиновьев — в силу врожденной порочности натуры; Богданов, считающий себя вампиром, просто любил смотреть, как льется кровь; лишь добродушный Каменев попытался было предложить дуэлянтам помириться, но был осмеян. Богданов стал отмерять шаги. Орджоникидзе достал из мешка охотничьи ружья: пистолетов в Лонжюмо ни у кого не было. Противники, ступая на подкашивающихся ногах, заняли свои места. Оба были бледны и вид имели жалкий.</p><p class="p">Ленин поднял тяжелое ружье к плечу, потом опустил. Он смотрел на Луначарского и пытался вызвать в себе ненависть, но получалось плохо. Ему хотелось сказать: «Давайте бросим это к чортовой бабушке и пойдем пить пиво». По всей видимости, Луначарскому хотелось того же. Но они не могли обмануть ожидания своих злобных секундантов.</p><p class="p">Наконец Луначарский, не в силах выносить эмоционального напряжения, вскинул ружье — оно ходуном ходило в его трясущихся руках — и выстрелил. Пуля просвистела и ушла в непонятном направлении. Ленин глубоко вздохнул. «Надо бы тоже в воздух пальнуть... Но ведь он не прекратит увиваться за Надей... Она бросит меня, уйдет к нему... Как я буду жить без нее? Кто сварит мне уху? Инессочка моя, кроме изящных рукоделий, ничего не умеет... А покер? А статьи в партийные газетки?!» Он снова поднял ружье и стал целиться. «Я его сейчас укокошу, — думал он, прицеливаясь в лоб. — Да, конечно, укокошу...»</p><p class="p">— Он убьет его! — послышался отчаянный крик где-то очень близко.</p><p class="p">Тотчас же раздался выстрел. Увидев, что Луначарский стоит на месте, а не упал, все посмотрели в ту сторону, откуда послышался крик, и увидели рослую фигуру в широкополой шляпе. В руках фигура держала восемь или девять чемоданов, оклеенных пестрыми ярлычками.</p><p class="p">«Как виртуозно жизнь подражает искусству», — подумал Луначарский, утирая холодный пот со лба: он знал всего Чехова наизусть. Ленин Чехова не читал и подумал просто: «Вот принесла нелегкая! Орет под руку! Сидел бы на своем Капри! О, теленок!» А Горький улыбался и плакал, и махал мокрой шляпой. И все пошли пить пиво.</p><p class="empty-line"/><p class="p">— Алексей Максимович, ты дурак. Твое богостроительство отличается от богоискательства не больше, чем желтый чорт отличается от чорта синего, — сказал Ленин и стукнул кулаком по столу. Он так напился, что ему кругом мерещились синие, желтые и зеленые черти.</p><p class="p">— Да я так... — смутился Горький. — Сам не знаю, как это у меня выскочило. — Он наклонился к Ленину, обнял его, расцеловал в обе щеки и сказал: — Бог с ним, с этим Богом. Ты мне лучше объясни, Володенька, из-за чего вы стрелялись.</p><p class="p">И Ленин во внезапном приступе откровенности все ему рассказал...</p><p class="p">— Ах, какие глупости, — сказал Горький, выслушав его исповедь. — Все можно легко устроить ко всеобщему удовольствию. Дай Наде развод и женись на Инессе. А Надя пускай выходит за Анатоля.</p><p class="p">— Да, но как же...</p><p class="p">— Понимаю, понимаю, — кивнул Горький: он знал, что в быту Ленин беспомощен, как младенец. — Вы можете в складчину купить дом где-нибудь в Ницце и до конца дней жить там все вместе. И Надя будет помогать тебе, как раньше. Она добрая женщина и не бросит тебя в беде. — Он растрогался и утер слезу.</p><p class="p">«Действительно, — подумал Ленин, — пуркуа па? И как мне самому это не пришло в голову? Совсем необязательно мне разлучаться с Надей. И домик в Ницце иметь неплохо. Поближе к игорным домам». Он с благодарностью обнял Горького и пожал ему руку.</p><p class="empty-line"/><p class="p">Кажется, все устраивалось ко всеобщему благополучию. Ленин помирился с Луначарским и согласился дать жене развод. Инесса была на седьмом небе от счастья. Ей наскучила революция и вся эта плохо организованная бивуачная жизнь; она мечтала о домике в Ницце и надеялась, что Крупская будет помогать ей советами по хозяйству. Надежда Константиновна тоже была довольна: ей было жаль Ильича, и она вовсе не хотела бросать его совсем. Обе женщины сдружились и привязались друг к другу. Ленин был доволен этим. Луначарский был чуть менее доволен, потому что у него уже была в России жена, но он молчал об этом, боясь новой дуэли и надеясь, что ситуация как-нибудь постепенно рассосется. В Лонжюмо воцарилась идиллия. И лекций никто никаких больше не читал, чему французские пролетарии были очень рады.</p><p class="p">— Ильич, дорогой... — Инесса разогнулась от шитья, белыми зубками перекусила нитку: она готовила подвенечный наряд. — Тебе не хочется закончить с этой революцией? Мы могли бы, например, содержать небольшой отель. Или я бы открыла белошвейную мастерскую, а ты — колбасную лавку. — Несмотря на влияние своих русских возлюбленных, Инесса была француженка до мозга костей.</p><p class="p">— Может быть, ты и права, — задумчиво сказал Ленин.</p><p class="p">Он устал от революционных делишек. «Суеты много, результата ноль. И Железный Феликс все время над душой торчит. Почему я должен делиться своими выигрышами с партией? Никогда мне не заполучить этого треклятого кольца и короны. Николаша не думает никуда уходить. На Мишу надежды никакой. И ведь свобода моя закончится в тот день, когда я эту корону заполучу. Каждый день с утра до вечера нужно будет принимать каких-нибудь послов, слушать длинные и скучные речи. А Железный никогда не оставит меня в покое, уж я его знаю, он не мытьем так катаньем пролезет в министры или, чего доброго, захочет сделаться архиепископом. А содержать отель совсем не трудно. И можно прямо у себя в отеле организовать игру по крупной, с полицией уж как-нибудь договорюсь. И Наде легче будет — никаких статей не писать. Они с Луначарским будут жить на его гонорары. Ей на булавки хватит. И не таких дураков печатают. А мы с Инессой будем очень дешево, со скидкой, сдавать им комнаты в нашем отеле».</p><p class="p">— Ты умница, chérie, — сказал Ленин и поцеловал Инессу. Он совсем размяк и благодушествовал.</p><p class="p">Все, все в Лонжюмо были счастливы и как будто заново влюблены друг в друга, и у Гриши Зиновьева больше не появлялось синяков. Однажды теплым летним вечером все революционные парочки, обнявшись, гуляли по берегу Иветт, с добротой и нежностью поглядывая одна на другую, и каждый был уверен, что его чувство самое большое и светлое, но и за товарищей тоже можно порадоваться. Они не знали, бедные, что из-за кустов ракитника вот уже полчаса наблюдают за ними зеленые, пронзительные, гневные и презрительные глаза, и ни одно ласковое и непристойное словечко не укрылось от волчьих ушей.</p><p class="p">«Так, так, — в ледяном бешенстве думал Дзержинский, нагрянувший, как всегда, внезапно и мгновенно оценивший ситуацию, — полнейшее разложение налицо! Любовь-морковь! Этот рыжий ублюдок хочет содержать отель! Я всегда знал, что он жид пархатый! Отель! А революцию побоку?! Ну нет, шалишь! Я вас заставлю работать, psya krev! Вы у меня мигом позабудете про разврат!» Он сплюнул и растер плевок ногой в изящном ботинке. Всякая любовь, кроме любви к детям, была ему глубоко противна.</p><p class="p">Кусты поблизости затрещали, и Зиновьев проговорил задыхающимся голоском: «Ах, нет». Дзержинский зажал руками уши. Его трясло. В другой стороне на ветке повисла, качаясь, сброшенная кем-то из дам нижняя юбка. Он зажмурился. От омерзения он перестал даже дышать. Но он уже придумал основной коварный план и с десяток запасных. Мысль его всегда была быстрей молнии и острей шпаги, и никто из смертных не мог ему противостоять.</p><p class="empty-line"/><p class="p">Первым делом он обработал труса Луначарского и взял с него слово, что тот ни при каких обстоятельствах не женится на Крупской и недвусмысленно даст ей это понять. Но полагаться на этого шатающегося интеллигентика, конечно, было нельзя; Феликс Эдмундович взялся за Надежду Константиновну и принялся убеждать ее, что Луначарский — импотент, а Инесса Арманд больна дурной болезнью и погубит Ильича. Однако Крупская отнеслась к его словам без всякого доверия, а потом и вовсе обругала его грязным сплетником и вытолкала из дому, ударив по спине ухватом. Это не смутило Дзержинского: мелкие неудачи лишь придавали игре остроту. Он сосредоточил свое внимание на Инессе.</p><p class="p">— Неужели вам не жаль Надежду Константиновну? — вкрадчиво спрашивал он.</p><p class="p">— Но почему? — удивлялась простодушная Инесса. — Ведь она выходит за Анатолия Васильевича. Она сама хочет развода. Она счастлива. Мы с нею очень дружны.</p><p class="p">— И вы поверили, что она по доброй воле соглашается отдать вам Ильича! Вы не знаете, как она любит мужа. Она благороднейший человек. Она уступает вам дорогу, но сердце ее разбито. Между прочим, я позавчера встретил ее в аптеке. Она покупала мышьяк. И я видел, как она выходила от нотариуса. Убежден, она написала завещание. Она не хочет жить.</p><p class="p">— О Господи... — прошептала Инесса. — Я... я не знаю, что мне делать.</p><p class="p">— Откажитесь от него. Будьте благородны. Бог вас вознаградит.</p><p class="p">— Я подумаю, — сказала Инесса жалобно. Она едва сдерживала слезы.</p><p class="p">Феликс Эдмундович уже ликовал; но оказалось, напрасно. Инесса передала их разговор Ленину и Крупской, а те в ответ расхохотались и объяснили ей, что все это чепуха и Дзержинский просто завидует нормальному человеческому счастью. Тогда Феликс Эдмундович решил подойти к Инессе по-другому. Он задумал соблазнить ее.</p><p class="p">Поначалу казалось, что мероприятие удается. Он умел быть галантным; он умел быть обольстительным; он умел быть несчастным, интересным, байроническим; наконец, у него были деньги, и он делал ей подарки. Но дальше рукопожатия дело не двигалось. Проблема была не только в том, что Инесса любила Ленина, но и в том, что она представляла собою тип не той женщины, которой мог понравиться Дзержинский. Его мрачная бледность и горящие глаза, его женственная хищность, делавшая его похожим на пантеру, приводили в трепет юных девочек, которым он казался полумонахом, полудемоном, или пресыщенных львиц, угадывавших в нем склонность к особо пряным утехам; но Инесса, домовитая, практичная и уютная, как истая француженка, тянулась к мужчинам веселым и добрым, без затей.</p><p class="p">Дзержинский не унывал: в конце концов, ему нужно было не овладеть Инессой, к которой в силу ее престарелого возраста он испытывал влечения не больше, чем к табуретке, а убедить Ленина в том, что это случилось. Он устремился к этой конечной цели, минуя промежуточные. Он сделал все необходимые приготовления. И настал роковой вечер.</p><p class="p">— Как вы жестоко мучите меня, m-me Арманд. Или, быть может, я должен уже сказать — m-me Ленина?</p><p class="p">— Право, Феликс, зря вы все это... — тихо сказала Инесса. Ей было жаль его — он так красиво страдал! — но не более того. — Забудьте меня. Вы еще непременно встретите хорошую, милую девушку, которая полюбит вас.</p><p class="p">— Лучше бы мне умереть. — Он как будто машинально вынул из кармана скальпель и стал играть им. В зеленых его глазах сверкали слезы. Он абсолютно вошел в роль.</p><p class="p">— Совсем не лучше, — возразила Инесса. Она была испугана. — Пожалуйста, милый Феликс, дайте мне честное слово, что вы не сделаете какого-нибудь ужасного поступка.</p><p class="p">— Прощайте. Мы больше не увидимся. Но, прошу вас, поцелуйте же меня — в первый и в последний раз. — Он украдкой бросил взгляд на часы — стрелка приближалась к часу «X». Владимир Ильич, получивший анонимную записку, уже вот-вот покажется в дверях.</p><p class="p">— Нет-нет, этого не нужно...</p><p class="p">— Один поцелуй, молю! Один — холодный, мирный... — Он придвинулся к ней.</p><p class="p">Взволнованная, в порыве жалости она склонилась к нему. Мгновенным движением он разорвал на себе рубаху, рванул брючный ремень. Его обнаженная грудь была заранее, еще дома артистично исчерчена губной помадою того самого оттенка, каким пользовалась Инесса; левый сосок потемнел и кровоточил (последствия ношения бельевой прищепки, ненароком доставившей коварному негодяю много сладких минут); он издал длительный стон...</p><p class="p">Ленин несколько секунд стоял на пороге. Потом молча повернулся и вышел.</p><p class="p">Трое суток он жил у Зиновьева и пил беспробудно. Он был русский мужик, он был прирожденный царь, он был горд; он хотел простить, но не мог. Так Петр простил измену Екатерине, но не простил возлюбленной Анне Монс.</p><p class="p">Она приходила к нему, плакала, клялась, говорила, что все объяснит. И он не прогонял ее. Они даже ездили еще вместе в Краков. Но о браке и маленьком отеле в Ницце больше не было сказано ни слова. Самое главное между ними порвалось навсегда. Любовь — хрупкое чувство, а мужское сердце тверже камня: слезы льются, добродетель унижена, зеленоглазый демон торжествует. И хрупкая темноволосая женщина стареет и все чаще кашляет кровью.</p></span>
