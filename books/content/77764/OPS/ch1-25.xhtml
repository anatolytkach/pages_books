<span><p class="p">— А теперь поговорим о поэте Каннегиссере...</p><p class="p">— О ком?</p><p class="p">— Вы знаете о ком. — Феликс Эдмундович сверлил своим изумрудным взором лоснящуюся зиновьевскую морду, и тот, не выдержав, опустил глаза. — Каннегиссер убьет Урицкого. — «А ежели что не так пойдет — можно будет все списать на жидовские междоусобные разборки...» — Это я беру на себя. А далее он ваш.</p><p class="p">— Годится, — с маслянистой улыбочкой повторил Зиновьев. — Ну, что? Теперь пройдемте в подвальчик? Там сегодня приготовлено много народу. А то ведь у вас в Москве особо не разгуляешься...</p><p class="p">— Да, ваш бывший друг Каменев любит миндальничать, — сказал Дзержинский. — И его приятельница Крупская всюду сует свой нос... Пойдемте, Григорий Ефи... Евсеевич. Я вам еще привез новые тисочки для рук. Очень рекомендую.</p><p class="empty-line"/><p class="p">Он долго думал, в каком обличье нанести визит молодому поэту и с какого боку к нему подъехать. И принял парадоксальное, невероятно смелое решение. Он пришел к Каннегиссеру без грима и парика, наклеив лишь свою обычную острую бородку, с которой его знала вся страна, и представился... своим собственным именем.</p><p class="p">— Я... мне не о чем с вами разговаривать, — сказал Каннегиссер. — Прошу вас уйти. Иначе я за себя не ручаюсь.</p><p class="p">Губы его были крепко сжаты, глаза смотрели спокойно и холодно. Сейчас этот красивый юноша казался много старше, чем на фотоснимке, хотя прошло всего полтора года. При виде его Дзержинскому сразу вспомнился молодой князь Юсупов, и кровожадная злоба вспыхнула в нем. «Да, не удалось, не удалось... Удрал, проклятый. Ну так этому не сносить же головы!»</p><p class="p">— Умоляю, выслушайте меня, г-н Каннегиссер!</p><p class="p">— Вы б еще назвали меня товарищем! — усмехнулся тот, не разжимая губ. — Что вы можете сказать мне такого, что изменит мое отношение к вам и вашей банде?</p><p class="p">— А вы смелый человек.</p><p class="p">— Мне просто уже все равно.</p><p class="p">— Да, Виктора уже не вернешь. Но...</p><p class="p">— Не смейте произносить этого имени.</p><p class="p">— А если я помогу вам отомстить его убийцам? — спросил Дзержинский.</p><p class="p">— Вы?!</p><p class="p">— Г-н Каннегиссер, вы многого не знаете... Власть — страшное испытание... Не буду притворяться пред вами, что я не хотел революции. Но то, что я увидел после победы, навсегда отвратило меня от большевиков. Это — дикие звери, негодяи. Я сам бывший эсер и всю жизнь сотрудничал с эсерами, вы можете навести справки, вам любой подтвердит. Полгода я обдумывал, как свергнуть власть большевиков. И теперь у меня есть план, есть множество честных людей, которые доверили мне возглавить заговор...</p><p class="p">— Лжете.</p><p class="p">— Что ж, вы можете прогнать меня, можете на меня донести. Я в ваших руках. Можете убить меня прямо сейчас, здесь. Хотите? — Дзержинский протянул Каннегиссеру револьвер рукоятью вперед, медленно расстегнул на груди кожаную куртку, рубаху. — Вот мое сердце. Прицелиться, право, нетрудно. — Револьвер, конечно, был не заряжен: Феликс Эдмундович всегда играл наверняка.</p><p class="p">— Не верю я вам... — слабо сопротивлялся бедный поэт. Но его романтическое воображение уже было захвачено.</p><p class="p">— ...Итак, я обеспечу вам отход после убийства Урицкого, — заканчивал наставления Феликс Эдмундович. — А потом мы с вами ликвидируем ублюдка Зиновьева. — Он искоса взглянул на поэта, но тот ни одним движением брови не показал, что имел уже удовольствие познакомиться с товарищем Зиновьевым. — А в это время в Москве... Но я не имею права раскрывать вам всего заговора. Вы же понимаете...</p><p class="empty-line"/><p class="p">И вот утром 30 августа из квартиры на Саперном вышел, одетый в кожаную куртку, молодой поэт; он сел на велосипед и поехал к Дворцовой площади. От Дзержинского он знал, к какому подъезду и в котором часу приедет Урицкий. Он вошел в подъезд, осведомился у швейцара, принимает ли Урицкий, и, получив отрицательный ответ, уселся на подоконник — один бог знает, о чем он думал в эти минуты, — и стал ждать... Наконец автомобиль подъехал. Урицкий вошел в подъезд и направился к лифту. Выстрел был сделан с шести шагов. Ах, если б у него достало хладнокровия, не полагаясь на своего сообщника, спокойно выйти и свернуть налево — он, быть может, ушел бы через Морскую на Невский и там затерялся бы в толпе... Однако автомобиль Дзержинского должен был ждать его за углом справа... Но никакого автомобиля не было, а на велосипеде далеко не уйдешь. Его схватили на Миллионной, у самых дверей Английского клуба. И спустя полчаса лицемер Зиновьев, рыдая в трубку, умолял Ленина прислать Феликса Эдмундовича для расследования...</p><p class="empty-line"/><p class="p">— ...Урицкого убили. Я сожалею, — сквозь зубы сказал Ленин.</p><p class="p">— Какой кошмар! — вскричал Дзержинский. — Это террор! Вот видите, что у вас творится!</p><p class="p">— Да, и еще... — Ленин помедлил — так тошно было признавать свою ошибку. Потом он глубоко вздохнул и сказал: — Эдмундович, вы уж вернитесь обратно на должность, что ли... А, батенька?</p><p class="p">— Что, не тянет Петерс?</p><p class="p">— Не тянет. — Ленин уже раскрыл рот, чтобы добавить: «Да и вы не больно-то тянули, почтеннейший», но усилием воли сдержал себя. Да, власть приносила покамест в основном унижения. «Неужели все будет так же, когда я стану настоящим монархом?! Нет, не может быть. Это все оттого, что государство у нас фиктивное».</p><p class="p">— Хорошо, я еду. Здесь Свердлов остается делами заправлять?</p><p class="p">— Кто ж еще? — угрюмо ответил Ленин.</p><p class="p">— Вы все еще гневаетесь на него за то, что он по ошибке отослал вашу родню на Урал? Но ведь он исправил свою ошибку... с моей помощью, конечно.</p><p class="p">— Ни на кого я не гневаюсь. Даже на вас, — соврал на всякий случай Владимир Ильич. — Устал я, дружище Феликс. Послать бы все к чортовой бабушке. Может, ну его, это кольцо?</p><p class="p">— Никогда не нужно падать духом, — наставительно сказал Дзержинский. И уехал в Питер. Далее все зависело от его счастливой звезды.</p><p class="empty-line"/><p class="p">— ...Дзержинский на проводе. Кто говорит? — Был поздний вечер; Феликс Эдмундович сидел в кабинете покойного Моськи Урицкого и разбирал его бумаги, уничтожая все, что могло бы когда-нибудь его скомпрометировать хоть в малейшей степени.</p><p class="p">— Свердлов на проводе... — Голос у Якова Михайловича дрожал. — Товарищ Дзержинский, на Ильича покушались! После митинга на заводе Михельсона!</p><p class="p">— Что вы говорите?! Ну вот, стоило мне на полдня уехать из Москвы... Он жив?</p><p class="p">— Да, жив, слава бо... слава революции! Она промахнулась. Немножко задела плечо.</p><p class="p">— Она?!</p><p class="p">— Женщина. Некая Фаня Каплан. Кажется, бывшая анархистка не то эсерка. Ее родители — американцы. Товарищ Дзержинский, что же делать?</p><p class="p">— Обратитесь с воззванием к народу, — посоветовал Дзержинский.</p><p class="p">— Что, мол, международные террористы распоясались и всякое такое?</p><p class="p">— Вы поразительно догадливы, дражайший Яков Михайлович, — язвительно сказал Дзержинский.</p><p class="empty-line"/><p class="p">«Несколько часов тому назад совершено злодейское покушение на товарища Ленина. По выходе с митинга тов. Ленин был ранен. Двое стрелявших задержаны. Их личности выясняются. Мы не сомневаемся в том, что и здесь будут найдены следы правых эсеров, наймитов англичан и французов», — написал Свердлов. Потом подумал, что это звучит как-то сухо. И написал еще статью и разослал во все газеты: «За смерть нашего борца должны поплатиться тысячи врагов. Довольно миндальничать... Зададим кровавый урок буржуазии... К террору живых... смерть буржуазии — пусть станет лозунгом дня. Сотнями будем мы убивать врагов. Пусть будут это тысячи, пусть они захлебнутся в собственной крови. За кровь Ленина и Урицкого пусть прольются потоки крови — больше крови, столько, сколько возможно...» Он не был кровожаден. Он просто хотел соответствовать эстетике революции.</p><p class="p">Закончив с этим, Свердлов позавтракал и пошел допрашивать Каплан. Он все любил делать по порядку. Но то, что Фанни сказала на допросе, повергло его в смятение. Он не знал, что предпринять, и решил посоветоваться с Дзержинским. Ведь тот уже однажды оказался прав с Романовыми. Наверное, он и теперь дурного не посоветует.</p><p class="p">— ...Что за вздор! — воскликнул Феликс Эдмундович, выслушав по телефону рассказ Свердлова.</p><p class="p">— Вздор, конечно. Не может она быть дочерью Владимира Ильича. В ней еврейку за километр видно. Но она-то, похоже, в это верит. Как вы считаете, Феликс Эдмундович, — должен я сказать об этом Владимиру Ильичу?</p><p class="p">— Ни в коем случае, друг мой. Это его расстроит. А он еще слаб после ранения. (На самом деле у Ленина лишь чуть-чуть побаливало плечо.)</p><p class="p">— Что же делать?</p><p class="p">— Выведите ее в расход. И чем скорее, тем лучше. Нельзя огорчать Владимира Ильича. Пусть он думает, что она политическая.</p><p class="p">— Да, но тут вышла одна закавыка... — горестно вздохнул Свердлов.</p><p class="p">— Какая опять?! — Тут Дзержинский рассердился уже непритворно. — Вечно у вас, Яков Михайлович, какие-то закавыки выходят...</p><p class="p">— Надежда Константиновна говорила с этой Фанни...</p><p class="p">— О Matka Boska! — простонал Дзержинский в отчаянии и гневе. — Зачем же вы, идиот, допустили ее к арестованной?!</p><p class="p">— Да, понимаете, пока я завтракал... Вы же знаете Надежду Константиновну. Она прорвалась к ней в камеру, и охранники не посмели ее не пустить. Она сперва накинулась на эту Каплан с кулаками и выдрала ей чуть не все волосы, а потом они разговорились и обе сидели обнявшись и хныкали...</p><p class="p">— Проклятое бабье! А Крупская уже передала эту информацию мужу?</p><p class="p">— Нет, не думаю, — отвечал Свердлов. — У него сейчас врачи.</p><p class="p">— Задержите ее любым способом! И быстренько расстреляйте эту сумасшедшую. А тело сожгите, чтоб чего не вышло.</p><p class="p">— Вы думаете, так будет лучше? Не получится как с Екатеринбургом?</p><p class="p">— Уверен, друг мой.</p><p class="p">— А как там у вас с убийцей Урицкого? — поинтересовался Свердлов, вспомнив о вежливости.</p><p class="p">— С ним все ясно, — небрежно ответил Дзержинский. — Мы с Григорием Евсеевичем мгновенно во всем разобрались. Каннегиссер — типичный террорист. Мы его уже расстреляли. — Феликс Эдмундович не стал распространяться о том, каким невообразимым пыткам и надругательствам, коих он сам был свидетелем, подвергли несчастного поэта по приказу Зиновьева перед расстрелом, справедливо полагая, что сухаря и зануду Свердлова это вряд ли могло заинтересовать. — Можете порадовать товарища Ленина, когда он очухается...</p><p class="empty-line"/><p class="p">«Задержать, задержать... — волнуясь, думал Свердлов. — Легко сказать — задержать Крупскую! Она кому хочешь глаза выцарапает и хай подымет на весь Кремль... Кто с этим справится?» И тут его осенило...</p><p class="p">— Коба, дружок... Товарищ Сталин!</p><p class="p">— Таварищ Сталин слюшает.</p><p class="p">— Коба, ты знаешь Надю? — Никогда нельзя было до конца быть уверенным, что Коба понимает, о чем или о ком идет речь.</p><p class="p">— Коба знает Надю, да. Старый дура, жена Ленин, рыбий глаз.</p><p class="p">— Коба, найди Надю и задержи ее, чтоб она не ходила к Ленину и не беспокоила его. Долго, долго держи, понял?</p><p class="p">— Коба понял, да. Коба сдэлает. Коба хороший?</p><p class="p">— Хороший, хороший... — пробормотал Свердлов, с отвращением глядя вслед удалявшемуся идиоту.</p><p class="p">«С полоумного и взятки гладки. Если он кому-нибудь скажет, что я приказал ему силой удерживать жену Владимира Ильича, никто не поверит в этот бред». Свердлов предпочел перед самим собою притвориться, что не заметил промелькнувшей на бугристом лице Кобы садистской ухмылочки, ибо не знал, вызвана ли сия гримаса какими-то мыслями или же ее надобно отнести на счет бессознательных инстинктов маленького крокодила.</p><p class="empty-line"/><p class="p">Однако когда Дзержинский вернулся в Москву, то узнал, что Фанни Каплан уже выпущена на свободу: оказывается, Надежда Константиновна, которую Коба пытался запереть в чулан со швабрами, огрела его по голове, вырвалась и, прямиком помчавшись к мужу, все ему рассказала, а тот, расхохотавшись, велел накормить «террористку» хорошим завтраком и отпустить на все четыре стороны... «Вздор, у Малечки не могло быть никакой дочери от меня — надо знать Малечку... — подумал тогда Владимир Ильич. — Глупенькая девчонка, но прехорошенькая, чорт побери! А кретина Кобу нужно гнать взашей...» Конечно, Феликс Эдмундович мог бы разыскать и снова схватить Фанни. Но зачем? Пост председателя ЧК ему и так уже вернули. Это была бы бесполезная трата драгоценного времени.</p><p class="empty-line"/><p class="subtitle">7</p><p class="p">1919 год начался тоскливо. Поначалу Ленин радовался переселению в кремлевские палаты — казалось, что это приближает его к заветному царскому трону. Но теперь средневековый лабиринт узких переходов и изрядно обветшавших дворцов не вызывал ничего, кроме глухого раздражения. От скуки он попробовал отыскать библиотеку Ивана Грозного, о которой ему рассказал Луначарский, но непривычка к физическому труду сделала свое дело, — углубившись примерно на метр в дворцовом подвале, он наткнулся на чьи-то давным-давно закопанные кости, ужаснулся и постановил поиски прекратить. Почти все большевики разъехались — одни на фронт, другие за границу, якобы затем, чтобы разжечь там пожар мировой революции. На самом деле они со вкусом проводили время в казино и ресторанах, тратя то, что было отобрано у буржуев. В лучших отелях Европы швейцарам была дана команда: едва завидев человека в черной кожанке, широко распахивать перед ним двери. Эти «новые русские», как их называли, делали сбор парижским увеселительным заведениям, воскресшим после Мировой войны.</p><p class="p">Ленин и сам бы с удовольствием присоединился к ним, но слишком много дел требовали его ежедневного присутствия. Свердлов раз за разом отказывался отпустить его хотя бы на недельку в Монте-Карло, проявляя несвойственную ему прежде твердость. Яков вообще сильно изменился — голос его, когда-то тихий и словно извиняющийся, погромыхивал теперь стальными митинговыми обертонами, манеры стали резкими и бесцеремонными. Отчасти в этом виновато было тесное общение с Дзержинским, с которым Свердлова накрепко связала история с расстрелом Романовых. Отчасти — сама власть, которая особенно сильно бьет в голову непривычным к ней евреям. Из-под пера Свердлова выходили резолюции одна кровожаднее другой. Он требовал «беспощадно истребить» то попов, то бывших офицеров, то всех до одного казаков. Правда, в стране царил такой бардак, что эти требования выполнялись через пень-колоду, но кровь все равно лилась рекой.</p><p class="p">Терпение Ленина переполнилось, когда на стол к нему легла бумага с предложением расстрелять Горького, который якобы «проводил контрреволюционную линию» в Петрограде. Судя по грамматическим ошибкам, бумажку написал Гриша Зиновьев, у которого с «буревестником» были застарелые контры. Ходили слухи, что Горький приватно обозвал питерского наместника «мешком говна», чего самолюбивый Гриша простить не мог. Правда, Горький не лучше отзывался и об остальных большевиках, не исключая своего бывшего друга Ильича, но Ленин зла на него не держал. Хитроватый и вместе с тем по-детски наивный писатель был ему симпатичен. Но как его спасти? Без сомнения, Дзержинский ухватится за шанс избавиться от Горького — тот слишком много знал о его делишках. А Свердлов уже поставил на бумаге свою резолюцию — «раздавить гадину немедленно». В конце подписи стояла жирная клякса — без сомнения, знак радости от предстоящего уничтожения очередного русского таланта. Ленину уже не раз казалось, что Свердлов готов завершить свою деятельность циркуляром о беспощадном истреблении вообще всех, кто не принадлежит к его любимому «избранному народу».</p><p class="p">И тогда у Ленина созрел хитрый план. В один из дней, когда робкие лучи мартовского солнца заглядывали в кремлевские окна, он постучался в комнату-келью Железного Феликса. Ее хозяин редко бывал дома, проводя дни и ночи в пыточных подвалах ЧеКа, но сегодня Ильичу улыбнулась удача.</p><p class="p">— Ну что, Эдмундыч, колечко-то нашли? — спросил он с деланным равнодушием, осторожно присаживаясь в жесткое кресло, больше напоминавшее очередное орудие пыток.</p><p class="p">— Ищем, Ильич, ищем, — отозвался Дзержинский, лицо которого от недосыпа и передоза выглядело совсем уж вампирским. На губах его блуждала странная улыбка, при виде которой Ленина чуть не передернуло от отвращения. Он вспомнил, что в подмосковном Болшево открыли колонию для беспризорных и Железный лично занимается отбором для нее перспективных девочек-сироток.</p><p class="p">— Смотрите, как бы вас не опередили. Тут еще один претендент в цари выискался, — и Ленин кратко передал содержание давнего своего разговора со Свердловым, не без радости наблюдая, как лицо его собеседника от злости пошло накось. Феликс был вне себя. Евреи, которых он считал своим послушным орудием, сплели за его спиной целый заговор! И во главе заговора — Яшка, это ничтожество, который только и умеет, что драть глотку на митингах под видом Троцкого. Как он мог согласиться на его избрание президентом? Теперь дело поправить трудно... но можно. Поправить можно все.</p><p class="p">— Как вы думаете, кто еще в заговоре? — отрывисто спросил он.</p><p class="p">— Шут его знает, — Ленин развел руками. — Яков говорил, у них большие связи за границей. Должно быть, Ротшильды...</p><p class="p">— Ну, Ротшильдов нам пока не достать, а вот с этим талмудистом мы разберемся. Но помните, Ильич, — что бы ни случилось, вы ничего не знаете. Только так я смогу поручиться за вашу безопасность. — И Дзержинский, круто повернувшись, вышел из комнаты.</p><p class="p">Через несколько дней на московском заводе «Серп и молот», бывшем Гужона, намечался митинг, где должен был выступать товарищ Троцкий. Большинство рабочих от голода разбежались по деревням, а оставшиеся вместо работы ходили на митинги, получая за это паек, состоявший из кислого полусырого хлеба и ржавой селедки. Митинги были единственным их развлечением — некоторые ораторы неплохо пели, другие показывали фокусы, а третьи после выступления бросали в толпу бублики или конфеты, крича при этом: «Приходите еще! В следующий четверг, всего одно выступление!» Троцкий не творил ничего подобного, но его выступления вызывали самый большой ажиотаж. Он так убедительно описывал страдания пролетариата при старом режиме и несказанное счастье, ждущее его в будущем, что на глаза у слушателей наворачивались слезы, а руки сами начинали шарить вокруг, ища схватить булыжник, ружье или лопату — все, что прикажет оратор.</p><p class="p">Перед заводским управлением собралась толпа, в которой стоял и Дзержинский, морщась от запахов махорки и немытых тел. В тот день он в искусстве маскировки превзошел самого себя — нарядился в немыслимые отрепья, нацепил клочковатый парик и измазался сажей до такой степени, что выглядел настоящим революционным негром. Соседи лузгали семечки и беседовали о своих жалких заботах, не обращая на ряженого никакого внимания. Наконец на трибуну взлетел человек в пенсне с густой черной шевелюрой, в котором Феликс сразу признал Свердлова.</p><p class="p">— Товарищи! — картаво начал он. — Гидра буржуазии еще извивается, недобитая молодецкими ударами революционных штыков...</p><p class="p">Дзержинский терпеливо слушал эту ахинею, пока оратор не дошел до страданий, которые терпели пролетарии в царских тюрьмах. Он так ярко описывал боль от ударов плетью и тяжесть кандалов, тисками сжимающих руки, что Феликс ощутил сладкую дрожь во всем теле. Тряхнув головой, чтобы избавиться от наваждения, он привстал на цыпочках и крикнул:</p><p class="p">— А ты-то откуда это знаешь?</p><p class="p">— Я был узником царизма! — сбить Свердлова было не так-то легко. — Каторга, застенки, эмиграция — все пришлось перенести ради свободы трудящихся!</p><p class="p">Толпа одобрительно зашумела.</p><p class="p">— Да неужели? — Дзержинский попытался придать голосу насмешливость. — А ты не врешь ли? — Он повернулся лицом к толпе. — Товарищи, этот тип сам служил надзирателем в Виленской тюрьме. Спросите тех, кто там сидел, — все скажут, что такого зверя, как Троцкий, нигде не было. Поглядите, что он со мной сделал!</p><p class="p">Он скинул с плеч отрепья, и все увидели на спине его багровые шрамы — следы давних упражнений с плеткой, к которым он накануне, не щадя себя, добавил несколько новых. По рядам рабочих пронесся ропот.</p><p class="p">— Товарищи, все это непра... — начал было побледневший Свердлов-Троцкий, но ряженый перебил его:</p><p class="p">— А еще он буржуйский сынок, товарищи! Папа его на Полтавщине имением владел, с мужиков три шкуры драл, а сам он по балам разъезжал да наших девок портил. Ну ничего, сволочь, не все коту масленица. — Предыдущим вечером он специально выучил несколько выразительных русских пословиц. — В тюрьме над рабочими издевался и теперь продолжает. Ишь, очки одел, антилегент хренов! Вы гляньте на него, товарищи, это ж жид! Жидовская морда! Всю кровь из нас выпили, проклятые!</p><p class="p">Толпа оживилась — прозвучавшие слова явно были ей знакомы и пробудили какие-то стремления в ее коллективной душе. Самые сообразительные уже нагнулись за камнями.</p><p class="p">— Людям жрать нечего! — продолжал голосить Дзержинский, заглушая слабые попытки Свердлова оправдаться. — Всё жиды прячут! Ветчину, сыры голландские, сайки с повидлом... Вы загляните ему под трибуну — у него же там цельная бутыль самогона!</p><p class="p">Эти слова стали последней каплей — рабочие, сбивая друг друга с ног, кинулись к трибуне. Дзержинский запустил им вдогонку ударную реплику: «Бей жидов, спасай Россию!» — и, усиленно работая локтями, начал выбираться из толпы. Укрывшись за углом, он осторожно выглянул оттуда. Над местом, где была трибуна, сгрудились люди, оттуда рвался тонкий поросячий визг и временами вылетали какие-то темно-багровые ошметки. С облегчением скидывая лохмотья и сдирая мерзкий парик, Феликс Эдмундович накинул на плечи спрятанную заранее шинель и поспешил на Лубянку.</p><p class="p">На другой день газеты напечатали известие о скоропостижной смерти товарища Свердлова от тифа. То немногое, что от него осталось, похоронили в Кремлевской стене. Президентом вместо него сделали безобидного пьяницу, бывшего слесаря Калинина, который имел большой успех на митингах, распевая матерные частушки. От Троцкого тоже решили не отказываться — под его именем теперь выступал некий литератор из Шклова по прозвищу Шкловский. Говорил он так же хорошо, как покойный Свердлов, причем так запутывал слушателей непонятными словами, что они готовы были верить чему угодно. Правда, он был лыс как коленка, но Дзержинский быстро решил эту проблему, снабдив златоуста львиным париком и эспаньолкой. Это было вдвойне удобно — в парике Шкловский мог изображать Троцкого, а без него Ленина.</p><p class="p">Сам Ильич на время перестал выступать вовсе. Он жалел бедного Свердлова, но еще больше жалел себя, снова и снова мечтая бросить все и уехать куда-нибудь подальше.</p><p class="p">Но ехать было некуда — Советскую республику окружало кольцо фронтов.</p></span>
