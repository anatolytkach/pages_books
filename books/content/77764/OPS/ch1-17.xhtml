<p class="p1">ГЛАВА 8</p>
</div><p class="subtitle">Два Феликса. Убийство фаворита.</p><p class="empty-line"/><p class="p">217-й привычно считал шаги: раз-два, раз-два... От одного конца прогулочного дворика до другого было девять с половиной шагов. Величина шага определялась длиной цепи, соединявшей кольца ножных кандалов. 217-й брел горбясь, еле переставляя ноги; он был худ как щепка, лицо изможденное, бледное, зрачки прозрачно-зеленых глаз неестественно расширены; он то и дело останавливался, переводя дух, и тяжело кашлял, сплевывая кровь. Надзиратель полагал, что этот чахоточный заключенный долго не протянет и, несмотря на свою дурную репутацию, вряд ли может в таком состоянии быть опасен; 217-й же пускал в ход всю свою врожденную и приобретенную артистичность, чтобы поддерживать это заблуждение надзирателя: шаркал подошвами, испускал трагические вздохи и демонстративно плевал кровью, заранее нацеженной из пореза на руке в маленький мешочек, который был спрятан у него за щекой. Кандалы были тяжелые и больно резали щиколотки (недавно он, наскучив одиночкой, пожаловался тюремному начальству, что на левой ноге у него из-за кандалов вот-вот начнется гангрена, и доверчивое начальство позволило ему с месяц отлежаться в больнице), но боль была привычна, и он, поглощенный в свои мысли и расчеты, почти не чувствовал ее. Надо бежать. Из Бутырской тюрьмы еще никто никогда не бежал. Это обстоятельство не смущало 217-го. Он нередко делал вещи, которых никто никогда еще не делал.</p><p class="p">Дзержинский — а именно он под 217-м нумером содержался в одиночке внутренней тюрьмы, называвшейся «Сахалин», — первоначально намеревался покинуть ее легальным путем, под аплодисменты, цветы и бросание в воздух красных чепчиков, поскольку знал достаточно, чтобы быть уверенным в скорой победе революции. Это было бы в меру романтично, в меру пристойно, окружало его дополнительным ореолом страдальца, а заодно — на случай, если с революцией что-нибудь выйдет не так, — снимало с него подозрения в том, что он эту революцию организовал. Находясь в госпитале, он даже позволил себе рискованную шалость: заключил пари с одним эсером, утверждая, что революция победит не позднее, чем в начале будущего года. По условиям пари проигравший навечно становился рабом победителя. Эсер был упрям и глуп как пробка, но честен, и Дзержинский не сомневался, что приобрел неплохого раба. Сам он никогда бы не стал заключать пари, в исходе которого не был уверен хотя бы на девяносто девять процентов.</p><p class="p">Но теперь, в двадцатых числах ноября шестнадцатого года, у 217-го появилась весомая причина оставить гостеприимные Бутырки несколько ранее. Дело в том, что вчера он получил письмо...</p><p class="p">«Дорогой, милый мой Феликс! Трудно найти слова, чтобы выразить, как мы были счастливы получить от тебя весточку. Но это ужасно, что твоей ноге становится хуже. Умоляю тебя: попытайся еще раз походатайствовать перед начальством...»</p><p class="p">Это было письмо от жены — Софьи Мушкат. Находясь в местах заключения, Дзержинский всегда вел с нею нежную переписку. Софья беспокоилась о его здоровье, сообщала милые и трогательные подробности о сыне Ясике, передавала приветы от многочисленных родственников. «Марынька, Стефан и Янек-шалун тебе кланяются...»</p><p class="p">Дочтя письмо, Дзержинский поднес его к пламени свечи. И между строк, написанных обычными чернилами, стали проступать совсем другие слова...</p><p class="p">«Ваше высокопревосходительство, товарищ Феликс Эдмундович! Имею честь доложить Вашему Высокопревосходительству, что г-н Пуришкевич...»</p><p class="p">Любовь Дзержинского к жене и сыну была общеизвестна. Как все были б удивлены — и революционеры, и жандармы, — если б узнали, кто на самом деле является его корреспондентом! «Софья Мушкат» был пожилой усатый филер из охранки, завербованный Дзержинским еще в 1904-м году; тогда же и была придумана страстно любящая супруга, которую позднее наградили ребенком. Со временем Дзержинский почти полюбил это призрачное дитя; он несколько сожалел о том, что они с агентом придумали сына вместо дочери, но все же питал к несуществующему малышу неподдельную нежность, позволявшую ему быть вполне искренним в своих ответных письмах «супруге».</p><p class="p">Все эти годы агент служил Дзержинскому верой и правдой, получая более чем щедрое вознаграждение. Одной из главных его обязанностей было регулярно сообщать хозяину о всех столичных и московских политических новостях, когда тот по одному ему известным соображениям изволил пребывать в тюрьме или на каторге. Агент подробнейшим образом пересказывал Дзержинскому сплетни и слухи: царь, царица, фрейлины, Дума, война, шпионские скандалы, кайзер, Ллойд-Джордж, Родзянко, Протопопов, Трепов, Гучков... Во вчерашнем письме агента на первый взгляд не содержалось ничего нового: Николай был все так же безволен и глуп, Александра так же развратна, Дума так же болтлива. Дзержинского это ничуть не удивляло: трудно было ожидать иного поведения от представителей самозваной династии Романовых.</p><p class="p">Дзержинский бегло просмотрел отчет о выступлении Пуришкевича. «Гришка Отрепьев снова воскрес теперь в образе Гришки Распутина, но этот Гришка, живущий в условиях двадцатого века, гораздо опаснее своего пращура... Да не будет впредь Гришка руководителем русской внутренней и общественной жизни...» Далее агент сообщал, что речь Пуришкевича неоднократно прерывалась овациями и криками «браво». Читая эти строки, Дзержинский усмехнулся, потом неодобрительно нахмурился. Какой идиот Пуришкевич! Самого просвещенного, самого благородного правителя, сына Ивана Грозного, назвать Гришкой Отрепьевым, да еще сравнивать его с мелким жуликом Распутиным! К самому Распутину, впрочем, Дзержинский относился с тем прохладным уважением, какое коллеги-аферисты обычно питают друг к другу, когда их интересы не сталкиваются напрямую; Распутин же своей деятельностью способствовал погибели дома Романовых и приближал государственный переворот, а стало быть, представлял полезное явление.</p><p class="p">К сожалению, невероятное самомнение, хвастливость и жадность Григория не позволяли привлечь его к сотрудничеству. У Дзержинского были все основания утверждать это, ибо много лет тому назад он имел удовольствие встречаться с Распутиным лично; Григорий Ефимович, вероятно, об этом факте давно забыл, но Феликс Эдмундович был из тех людей, что не забывают ничего, ни единой мелочи. Это произошло на необъятных просторах сибирской тайги летом 1902-го...</p><p class="p">Бурный был год, суматошный. Это теперь Дзержинский научился использовать пребывание в камере для расслабления и полноценного отдыха, но тогда он был моложе, и энергичная, деятельная его натура с большим трудом переносила однообразие тюремного заключения. В мае, в Александровской пересылке, скука и комары замучили его до такой степени, что он, дабы не терять квалификации, организовал небольшое восстание; до сих пор он не мог без улыбки вспомнить об этом развлечении. Он тогда подбил заключенных требовать, чтоб их немедленно отправляли по ссылкам; его земляк — начальник тюрьмы Лятоскевич, с которым он находился в приятельских отношениях, — принимал в заварушке самое деятельное участие, поскольку ему отчаянно надоели стада слоняющихся по тюрьме узников, и он только и желал побыстрей отделаться от них...</p><p class="p">Дзержинский тогда вышел вперед, разорвал на себе рубаху (была у него такая привычка, которую злопыхатели объясняли наклонностью к эксгибиционизму), произнес пламенную речь, была провозглашена республика; у надзирателей отобрали ключи, ворота забаррикадировали и вывесили красный флаг; впоследствии, из мещанской стыдливости, ссыльные и тюремное начальство утверждали, будто надпись на флаге гласила «Свобода», и Дзержинский никого в этом не разубеждал, хотя отлично помнил, что на флаге было написано «Пошли все в...!»</p><p class="p">У ворот собралась толпа; вскоре тюрьму окружила рота солдат. А жизнь молодой республики шла своим чередом: Лятоскевич, которому было приказано мирным путем урезонить заключенных, болтал с ними через щелку в заборе и рассказывал свежие анекдоты; узники бродили по двору, загорали, сняв рубахи, лузгали семечки и резались в карты... Лятоскевич передал им водки; смеясь, как дети, Урицкий со Скрыпником писали какую-то петицию генерал-губернатору... Ах, молодость, молодость!.. (Дзержинский мечтательно вздохнул; хмурое лицо его на миг разгладилось.) Ну-с, потом, натурально, приехал на тройке с бубенцами вице-губернатор, лысый и жирный, как боров, стал требовать, чтоб его впустили внутрь, угрожал, что прикажет открыть огонь. Заключенные хихикали: через Лятоскевича Дзержинский отлично знал, что генерал-губернатор, опасаясь скандала, не велел применять оружия. Собственно, на это и был весь расчет.</p><p class="p">Так и вышло: вечером того же дня генерал-губернатор сдался, и заключенных начали развозить по разным ссылкам к обоюдному удовольствию их и Лятоскевича. Однако тут Дзержинскому не повезло: его запихнули в Вилюйск — гиблое место, по сравнению с которым Александровский централ мог показаться Парижем. Обозлившись, он решил бежать до прибытия на место и, когда партия сделала привал у деревни Качуг на Лене, стал готовить побег. Бежать одному, без компаньона, было как-то несолидно; он звал с собой Урицкого, но тот отказался, потому что потерял очки, звал еще кого-то, но все жались да кряхтели; пришлось взять в компаньоны террориста Сладкопевцева. Прикинувшись больными, они остались в Верхоленске. Как хорошо было, как тихо! Ходили отмечаться в полицию, принимали микстурки от кашля, читали, удили рыбу, в самую жару спали на сеновале, стреляли ворон, играли с крестьянскими детьми, пили жирное деревенское молоко...</p><p class="p">— Феликс, а Феликс... — Сладкопевцев развалился, отложив удочку, сдвинул соломенную шляпу на нос. — Может, ну ее, революцию? Скажи, для чего нам бежать? Здесь так красиво — жил бы и жил... Рыба, сено, молоко! Давай останемся? Сольемся с природой, хозяйство заведем, корову купим...</p><p class="p">— Эх, Миша... — со вздохом отозвался Дзержинский, скосив глаза влево: двенадцатилетняя Оля, дочь хозяина избы, где они жили — русая, черноглазая, прелестная, — сидела на берегу неподалеку от них и плела венок из одуванчиков.</p><p class="p">Сказать по правде, ему тоже не хотелось никуда бежать. Лениво катящая свои воды Лена странным образом напоминала ему родную Усу. Даже его каменное сердце размягчилось от созерцания этой тихой, идиотической красоты, и он в первый (и, наверное, в последний) раз в жизни подумал, что можно прожить без престола и короны и что Россия не такая уж плохая страна. Здесь на него снизошел покой, и даже тень Ванды не тревожила его снов. Остаться? Завести корову? Или открыть приют для бездомных детей, где строгие, но ласковые мужчины будут обучать девочек шитью и астрономии?</p><p class="p">Однако другие черные глаза — глаза Марины, глаза Елены Глинской, — смотрели на него с гневным укором, и он, напомнив себе о миссии, что ему предстояло выполнить, с несвойственной ему мягкостью сказал своему товарищу:</p><p class="p">— Надо, Миша, надо. В нашей жизни еще много будет молока и сена. Но сейчас нужно бежать, а то о нас дурно подумают. Революционеры мы или нет?</p><p class="p">И в одну из июньских безлунных ночей, едва полночь пробила на церковной башне, они погасили огонь в своей избе и вылезли через окно на двор, сожалея о том, что приходится навсегда попрощаться с этими прекрасными местами. Как злодеи прокрадывались они возле хижин, внимательно присматриваясь, нет ли кого вблизи, не следят ли за ними. Кругом было тихо, деревня спала. Спала и Оля; Дзержинский с грустной улыбкой подумал о том, как она обрадуется, проснувшись утром и обнаружив нарядное зеркальце, что он тайком положил ей под подушку. (О поцелуе в лоб не узнает, ну и пусть.) У реки они нашли лодку и поплыли вниз по течению.</p><p class="p">Без приключений и тут не обошлось: в тумане лодка наткнулась на дерево, Дзержинский от удара свалился в реку, схватился за борт, перевернул лодку... Сладкопевцев, хохоча, выскочил на берег, вытащил приятеля из воды. Они оказались на каком-то острове, разожгли костер, потом долго бегали, прыгали и играли в салки, чтобы просушить одежду. Поутру появились какие-то мужики; беглецы разыграли перед аборигенами целый спектакль, заявив, что они ученые-натуралисгы, нечаянно утопившие лодку со скарбом, и едут искать сибирского мамонта... С мужиками пили водку на брудершафт и опять играли в сажи, чехарду, лапту и городки... Они дали мужикам пять целковых, а те им — подводу. Потом их снова останавливали какие-то пейзане, и было так же весело. К сожалению, вскоре они со Сладкопевцевым поругались — чорт дернул Феликса отозваться не вполне лестно о Бакунине — и вынуждены были расстаться.</p><p class="p">Свой путь по Сибири Дзержинский продолжал уже один; к несчастью, географию этой бескрайней, дикой страны он знал слабо и долго плутал, не находя нигде железной дороги. Пробегая Тобольской губернией, он остановился на отдых в селе Покровском. Село было богатое, обильное; изба, куда он попросился на постой, — чистая и опрятная. Хозяйка избы — видная, еще не старая бездетная вдова — даже не пыталась делать жильцу авансы: его бледное, серьезное лицо, печальный умный взгляд и манеры, полные сдержанного достоинства, вызывали в ней уважение, граничившее со страхом.</p><p class="p">— Вы, извиняюсь, не из духовного ли сословия будете?</p><p class="p">— Вы совершенно правы, — учтиво отвечал Дзержинский. — Замужнюю женщину с чужим мужем повенчал, за то и расстрижен. — Он решил, что эта романтическая история придется красивой вдовушке по вкусу, и не ошибся. — А вы, Глафира... впрочем, нет, ничего.</p><p class="p">Хозяйка не интересовала его как эротический объект, но ее образ жизни не мог не вызвать некоторого любопытства: по вечерам она, принарядившись, куда-то убегала и возвращалась лишь на рассвете с глубокими тенями в подглазьях и блуждающей, рассеянной улыбкой, после чего долго перед зеркалом вычесывала из волос репьи и солому и пыталась заводить с жильцом робкие беседы о спасении души.</p><p class="p">Несколько дней спустя Глафира сказала ему, понизив голос и озираясь, хотя они были в избе одни и никто не мог их слышать:</p><p class="p">— Тут намедни исправник приезжал...</p><p class="p">— Почему вы решили, Глаша, что меня это может интересовать? — лениво спросил Дзержинский. Он весь подобрался, словно пружина, но не подавал виду, что встревожен.</p><p class="p">— Каторжный, говорит, бежал. По всей Сибири ищут.</p><p class="p">— Ну и что?</p><p class="p">— Что-что... — проворчала Глафира. Благоговения ее пред ним изрядно поубавилось. — Приметы обсказывал. Точь-в-точь ваши. Я вас, понятное дело, не выдала, но все ж нехорошо. Зачем вы меня обманули, будто из духовного сословия?</p><p class="p">— Я действительно был расстрижен и сослан в каторгу, — сказал Дзержинский: он мгновенно просчитал варианты и решил, что выгоднее будет сказать женщине полуправду. — За веру в Господа пострадал.</p><p class="p">— Так вы из раскольников? — спросила Глафира без осуждения, но и без сочувствия. — Строгая вера у них, еще строже церковной...</p><p class="p">— Нет, не совсем, — сказал Дзержинский: он не имел ни малейшего представления о том, как должен вести себя русский старообрядец, и не хотел попасть впросак. — Я особую веру исповедовал. Хотел, чтобы люди друг дружку больше любили. В любви нет греха. — Он говорил первое, что в голову взбредет, но по тому, как переменилось и просветлело лицо женщины, мгновенно сообразил, что выбил яблочко.</p><p class="p">— Ах, у нас в селе тоже есть, кто особую веру исповедуют — про любовь земную... Не согрешишь, говорят, — не покаешься... Да я вас к ним сведу, ежели хотите. Там у них в подполе — молельня. Никакой исправник вас там не найдет. Бежать-то вам сейчас не с руки. По всей тайге рыщут.</p><p class="p">— Спасибо, милая. — Он перекрестил ее, придав своему лицу ласковое, умильное выражение. — Бог тебя наградит.</p><p class="p">Как стемнело, Глафира отвела его на другой край села, где стояла большая полуразрушенная изба, из которой доносились громкие радостные вскрики и смех. Из ее сбивчивых объяснений Дзержинский понял, что здесь собираются сектанты, называемые в народе хлыстами, а предводительствует ими местный мужик — самозваный пастырь по имени Григорий Распутин; по словам вдовушки, это был человек замечательный.</p><p class="p">На Дзержинского, однако, он впечатления не произвел. Этот высоченный, тощий, сутулый мужичина был отчаянно неряшлив: космы сальные, борода свалявшаяся, руки корявые, грязные. Несколько сглаживали впечатление разве что глаза «старца» — маленькие, глубоко посаженные, светившиеся хитростью и умом. К появлению нового богомольца Григорий отнесся без особого интереса — возможно, потому, что был уже, как и большинство радеющих, изрядно пьян. Он только обнял вновь прибывшего и сочно поцеловал в губы (Дзержинскому стоило неимоверного усилия не сплюнуть: от запаха перегара его едва не стошнило) — как выяснилось, это была принятая у хлыстов форма приветствия, ибо все люди на земле — братья и сестры. Григорий тотчас позабыл о нем.</p><p class="p">У хлыстов Дзержинский пробыл около недели. Сперва он с трудом подавлял отвращение, потом привык и постепенно начал входить во вкус; он даже готов был признать, что в диких, грубых языческих плясках есть своеобразная красота. Обряд флагелляции привлекал его с детства; свальный грех — особенно некоторые его проявления — был ему крайне неприятен, но когда попадались совсем юные, детски-хрупкие богомолицы... (К сожалению, потом пришлось лечиться, после чего он принял решение больше никогда не снисходить до плотской любви и по сей день неукоснительно — то есть с редкими исключениями, в которых после каялся, — выполнял этот обет.) С Распутиным он практически не общался: днем, когда Феликс сидел в подполе и от нечего делать мусолил одолженный у Глафиры комплект «Нивы» за позапрошлый год, хозяин отсыпался на печи, а по ночам внимание старца было всецело обращено на самых красивых и толстых грешниц, из которых он по оригинальной методе изгонял нечистую силу. Прямой разговор меж ними состоялся лишь однажды. Да и разговором это трудно было назвать — так, обмен косыми взглядами и уклончиво-бессмысленными репликами... Маясь похмельем, Григорий Ефимович забрел посреди дня в подпольную молельню, чтобы нацедить рассолу из бочки с капустой, и был, по-видимому, удивлен, обнаружив там постороннего, чисто одетого мужчину.</p><p class="p">— Ты хто... — начал было он, но тут же, припомнив что-то, сказал Дзержинскому: — Знаю, знаю, мил-человек... По тайге ходишь-бродишь. Правды ищешь...</p><p class="p">— Ищу, — сдержанно подтвердил Дзержинский, откладывая журнал.</p><p class="p">— Не там ищешь. — Распутин хитро прищурился. — В книжках правды нет.</p><p class="p">— А где она есть, правда-то? — спросил Дзержинский, подделываясь под тон собеседника.</p><p class="p">— Правда — в любви. — Распутин впился глазами в лицо Дзержинского, и тот с изумлением ощутил, что взгляд мужика обладает гипнотической силой, пожалуй не уступавшей его собственной. — Ты, мил-человек... как звать-то тебя, запамятовал...</p><p class="p">— Феликс, — вырвалось у Дзержинского неожиданно для него самого. (В Покровском его знали как Дмитрия.) Он тотчас проклял себя за идиотскую оплошность, но было уже поздно.</p><p class="p">— Ты, Феликс, не умствуй, а человека-то полюби. Человека-то трудней полюбить, чем книжку. Книжка чистенькая, беленькая, а человек грешен, тяжел. А ты, гляжу, все умствуешь. Вон и ручку мне не цаловал, когда все цаловали. Аль брезгуешь? Вошку увидал — сразу брезговать? А вошка ведь тоже тварь Божия, ее уважать нужно. А ты ведь не только вошкою — человеком брезгуешь! Народом брезгуешь, да?! Р-русским нар-родом брезгуешь?! — Казалось, что Григорий начал всерьез заводиться, но Дзержинский отчетливо видел, что это всего лишь игра.</p><p class="p">— Ручки я целую только дамам, — развязно ответил Дзержинский: он понял, что прикидываться кротким простаком бессмысленно. — Или ты за кого другого меня принял? (Во время радений некоторые богомольцы, не найдя пары противоположного пола, вели себя так, что им позавидовали бы Зиновьев с Каменевым. Григорий взирал на эти действа не без любопытства, как успел заметить Дзержинский, в котором подобные сцены вызывали лишь одно желание — пристрелить мерзких скотов тут же на месте.)</p><p class="p">— Вот это хорошо, — мгновенно смягчившись, отозвался Распутин. — Бабы — хорошо, а дамы-то слаще. Ничего, погоди, дай время — все наши будут...</p><p class="p">— У Маньки плечи хороши, — сказал Дзержинский тоном знатока (в действительности жирная дебелая Манька — одна из богомолиц, к которой Григорий был явно неравнодушен, — вызывала в нем омерзение).</p><p class="p">— Хороши-то хороши, да бес в ней сидит, — сказал Распутин совсем уже дружелюбно. — А не выпить ли нам, брат Феликс, водочки? Эх, глазы-то у тебя...</p><p class="p">— Что? — хмуро спросил Дзержинский.</p><p class="p">— Неверные у тебя глазы — лукавые, бабьи, чисто у русалки... Селедки — хошь? А то кофию? У меня, брат, все есть. Но первым делом выпьем на брудер-шахт. Где водочка — там любовь, а где любовь — там и правда...</p><p class="p">— In vino veritas, — пробормотал Дзержинский.</p><p class="p">— Чаво?</p><p class="p">— Выпьем, брат Гриша. — Усилием воли он подавил желание заехать кулаком в рябую распутинскую морду. — Только без брудершафта.</p><p class="p">Той же ночью, в самый разгар плясок, Дзержинский бежал в тайгу. Он долго еще не мог себе простить, что, поддавшись гипнозу, назвал распутному жулику свое настоящее имя.</p><p class="empty-line"/><p class="p">...Да, бурный был год, наполненный событиями... А что, если по восшествии на престол сделать хлыстовство официальной религией? Скотам — скотское... Усмехнувшись воспоминаниям, Дзержинский продолжил чтение отчета.</p><p class="p">«...а также докладываю Вашему Высокопревосходительству, что г-н Распутин третьего дня кутил с цыганами у „Яра“ и, будучи в сильном подпитии, всем и каждому рассказывал, что государь император у него „вот где“ (и показывал кулак), и также говорил о том, что будто бы он, г-н Распутин, вот-вот окончательно излечит наследника от болезни, за что государыня императрица якобы обещала его, г-на Распутина, осыпать всяческими благодеяниями и, в частности, подарить ему некий заветный перстень, что хранится в дворцовых сокровищницах...»</p><p class="p">О, нет! Сердце Дзержинского забилось так сильно, что он вынужден был отложить письмо. Заветный перстень! Это могло означать только одно. Подлый временщик, омерзительная тварь! Конкурент! Излечит наследника! Уж кому-кому, а Дзержинскому-то через надежных осведомителей был давно известен рецепт зелья, которое Распутин через дуру и интриганку Вырубову подсыпал в пищу царевичу Алексею, чтобы кровотечения усиливались, а потом, на краткое время прекращая травить несчастного ребенка (Феликс Эдмундович презирал и ненавидел Романовых, но не мог ненавидеть невинное дитя), объявляет об «излечении»!</p><p class="p">Теперь и сравнение Распутина с Отрепьевым, то бишь царем Дмитрием, представилось в новом свете. Вообразив себе жулика Гришку на престоле, Дзержинский стиснул зубы от гнева. Распутина следует немедленно ликвидировать, пока сумасшедшая немка не додумалась отдать в руки проходимца волшебное кольцо. Доверить такое деликатное дело нельзя никому. А значит — бежать как можно скорее!</p><p class="p">Однако внешне все должно было выглядеть как обычно; было бы странно, если б любящий муж не ответил на письмо любящей жены, и Дзержинский терпеливо писал: «...папа не может сам приехать к дорогому Ясику, поцеловать любимого сыночка и рассказать сказки, которые Ясик так любит. Поэтому папа пишет Ясику письмо с картинкой и в письме целует Ясика крепко-крепко и благодарит за письма. Пусть Ясик будет хорошим, здоровым и послушным и поцелует дорогую мамочку от Фелека и обнимет ее... и скажет, что Фелек здоров и вернется». Агенту же он написал молочными «чернилами» (чахотка была придумана еще и для того, чтобы получать молоко) между строк, что вскорости намерен покинуть Бутырки, поэтому тот должен прекратить присылку секретных донесений, но продолжить отправлять в тюрьму обычные письма от «супруги», которая, разумеется, ничего не может знать о побеге мужа.</p><p class="p">Теперь — как бежать? К сожалению, добрый друг NN уже оставил службу и не может помочь... Кандалы — чепуха, Феликс Эдмундович мог бы в одну минуту освободиться от кандалов, если б захотел: иллюзионист Гудини, с которым он встречался в Европе, обучил его кое-каким приемам. А дальше? Подкоп — долго. Подкуп тоже требует некоторого времени. Оглушить на прогулке надзирателя и выбраться на крышу — рискованно. Но Дзержинский был уверен, что уже к вечеру придумает способ. И, сидя за швейной машинкой, он придумал его. Он всего лишь выворотит наизнанку один эпизод десятилетней давности...</p><p class="p">Тюремное начальство было сперва несколько удивлено тем, что безбожник-революционер просит прислать к нему священника, желая исповедаться; но, с другой стороны, если заключенный, находящийся чуть ли не при смерти, решил обратиться к вере предков, ничего из ряда вон выходящего в этом нет. И уже на следующий день в «Сахалине» появился ксендз. Дзержинский обрадовался, увидев, что священник примерно одного с ним роста и сложения: это упрощало дело.</p><p class="p">— Ниспошлите мне прощение, отец мой, ибо я согрешил.</p><p class="p">— Поведайте же открыто и без утайки, сын мой, в чем вы грешны.</p><p class="p">— Я лгал, убивал, лжесвидетельствовал, подделывал документы...</p><p class="p">— Милость Господня безгранична, сын мой.</p><p class="p">— Я потерял веру, — сказал Дзержинский, несколько уязвленный тем, что священник столь легкомысленно отнесся к его ужасным прегрешениям.</p><p class="p">— Откройте свое сердце Господу, и Господь вернет Вас в лоно свое.</p><p class="p">— Я прелюбодействовал.</p><p class="p">— А вот с этого места поподробней, пожалуйста... Оглушить похотливого служителя культа особым</p><p class="p">тайным ударом, которому Феликс научился у японских ниндзя (или якудза, он их все время путал, поскольку не был силен в восточной культуре), связать его четками и затолкать в рот кляп из бархатной шапочки было делом нескольких секунд. Кандалы также слетели с ног в мгновение ока. Немного дольше Дзержинский провозился с бритьем: ведь у патера не было усов и бороды. Наконец, выбрившись настолько гладко, насколько это возможно было сделать при помощи заточенной ложки, — без тонзуры он решил обойтись: во-первых, это затруднило бы последующие метаморфозы, а во-вторых, ему все равно придется глубоко надвинуть капюшон, чтобы выйти из стен тюрьмы, — он скинул куртку и штаны и облачился в сутану.</p><p class="p">Священнослужитель так и не пришел в себя. Дзержинский переодел его в свою тюремную одежду, втащил на койку, уложил лицом к стене и прикрыл одеялом так, чтобы не были видны связанные руки. Шутливо перекрестив лежащее тело, Дзержинский сделал глубокий вдох, подошел к двери и постучал, вызывая надзирателя. Изменив голос, он объяснил, что узник пребывает в глубочайшем религиозном экстазе и беспокоить его не следует. Полчаса спустя он уже шагал по Серпуховскому валу, а еще несколькими часами позднее, одетый в цивильное платье, с приклеенными усами и бородой, ничуть не похожими на его прежние, выехал первым классом в Петроград.</p><p class="p">По прибытии в столицу он прежде всего встретился с некоторыми из доверенных лиц и поручил им как можно тоньше и деликатнее внедрить в умы революционеров убеждение в том, что известие о его очередном побеге является злобной провокацией царской охранки, а на самом деле он продолжает гнить в застенках, ожидая революции. «Товарищи» ничего не должны были знать: дело, которое ему предстояло выполнить, касалось его одного.</p><p class="p">Он в очередной раз изменил внешность, обзавелся новыми документами, снял значительную сумму денег с тайного банковского счета, нанял хорошую, спокойную квартиру и начал прощупывать подходы к конкуренту. Действовать надлежало с максимальной осторожностью, не приближаясь к объекту. Крайне маловероятно, что зазнавшийся проходимец при встрече узнает случайного знакомого пятнадцатилетней давности, тем более тщательно загримированного, но Феликс Эдмундович предпочитал ничего не оставлять на волю случая.</p><p class="p">Между тем весь Петроград только и говорил что о Распутине. Одни полагали, что Гришка немецкий шпион и склоняет государя к сепаратному миру с немцами, другие — что он продался британской короне, третьи клялись, что он жидомасон, агент международного еврейства; четвертые утверждали, что Григорий Ефимович самый что ни на есть подлинный патриот и святой — достаточно поглядеть на его лицо, чтобы понять это... Все эти домыслы мало занимали Дзержинского: он должен был уничтожить Распутина по своим личным причинам, не имевшим ничего общего с сиюминутными политическими интересами. Кроме того, благодаря собственной агентурной сети он отлично знал, что Распутин никакой не шпион, а самый обыкновенный мужик, то есть бездельник, шарлатан и пройдоха, дорвавшийся до сладкой халявы, за что, учитывая идиотизм русской жизни вообще и низкое происхождение Григория в частности, вряд ли можно было его всерьез осуждать; Дзержинский, разумеется, не мог питать к конкуренту симпатии, но и личной неприязни к Распутину у него не было. Может ли человек ненавидеть вошку, тварь Божью?</p><p class="p">Важно было другое: где и с кем Распутин проводит время и как к нему подобраться, не рискуя быть схваченным. Очень скоро Дзержинский с огорчением выяснил, что это практически невозможно: отчаянно боявшегося покушений Гришку и Гришкину квартиру на Гороховой день и ночь охраняют человек двадцать специальных агентов в серых тужурках. Страшно тяжело работать без помощников. Но довериться никому нельзя: на кон поставлено кольцо, а с ним — и корона. Как дурной сон, повторялась история с охотой на Дягилева, но на сей раз это не могло быть недоразумением... А время идет! Взбалмошность императрицы всем известна: поди угадай, когда ей взбредет в голову подарить фавориту заветное колечко! Феликс Эдмундович уже несколько раз стрелял в Распутина издали из бесшумного револьвера, но не попал, да и сам Вильгельм Телль промахнулся бы с такого расстояния. Так что он вынужден был ограничиться тем, что каждую полночь звонил Распутину по телефону и говорил загробным голосом: «Покайся, ублюдок, свинячий сын...» Но это приносило лишь небольшое моральное удовлетворение.</p><p class="p">Только однажды за эти дни он подошел к объекту совсем близко: переодевшись рассыльным из французской кондитерской (настоящего рассыльного пришлось ликвидировать), доставил на дом Распутину корзину с пирожными и огромный праздничный торт. К сожалению, возможность подвернулась так внезапно, что Феликс Эдмундович не успел добавить в кондитерские изделия яду; впрочем, яд он всегда считал средством ненадежным, да и кто мог знать, жрет ли Гришка сласти самолично, или они предназначаются для его гостей? (Дзержинскому, конечно, не было жаль распутинских гостей, но он не любил совершать бесполезные действия.) Он был готов умертвить Распутина с помощью кинжала, но понял, что ничего не получится, едва ему открыли дверь: квартира на Гороховой была полна людей — просители, визитеры, приживалы и приживалки, слуги, — и все они ежеминутно толпами шныряли туда-сюда, а сам хозяин был с дамой. Убить Распутина в таких условиях было еще кое-как можно, но скрыться незамеченным — едва ли.</p><p class="p">Дзержинский даже не надеялся увидеть Григория, но безалаберная прислуга пропустила его с корзиной В комнату, где расположился Григорий Ефимович с гостьей. На секунду Дзержинский задержался на пороге, разглядывая объект. Распутин выглядел благообразно: волосы и борода расчесаны, напомажены, грубые кривые ногти почти чисты; сапоги на нем были лаковые, рубашка шелковая, подвязанная пояском. Дзержинский впился взглядом в его руки — слава богу, средь множества аляповатых перстней, усеивавших Гришкины костлявые пальцы, пока еще не было того, заветного!</p><p class="p">Распутин сидел на мягком диване, закинув ногу на ногу, и с детским восторгом слушал, как дама — судя по костюму и осанке, какая-то из фрейлин, — читает ему вслух роман Захер-Мазоха. Время от времени он произносил какую-нибудь фразу, коверкая свою речь так, как он не коверкал ее и в селе Покровском, будучи неграмотным крестьянином. Дзержинский не мог не чувствовать некоторого восхищения этим талантливым лицедеем. Под ногами у Григория вились разноцветные, сытые, толстые кошки... Да, если б не кольцо, Дзержинский определенно не стал бы убивать этого безобидного и даже небесполезного субъекта, то бишь объекта: сам он любил животных почти так же сильно, как детей. Махнув рукой, Распутин отослал чтицу, показал посыльному, куда поставить корзину, и тут же, разорвав шелестящую бумагу, стал с обезьяньей ловкостью рыться в груде пирожных. Наконец он выбрал пирожное, целиком запихнул его в рот и начал хлопать себя по карманам, отыскивая мелочь.</p><p class="p">— Благодарю покорно, — сказал Дзержинский, принимая гривенник и кланяясь. Из этого, казалось бы, бесполезного эпизода он почерпнул информацию, которая могла оказаться ценной: из множества роскошнейших пирожных Распутин выбрал птифур с розовым кремом.</p><p class="p">...Покидая комнату, Дзержинский обернулся с порога и увидел, как Распутин радостно пнул кошку сапогом в брюхо. Нет, он все-таки заслуживает смерти!</p><p class="p">По возвращении домой Феликс Эдмундович крепко задумался. Все-таки отравление? Подсыпать Распутину яду в одном из ресторанов, по которым тот шляется? Или удавить полотенцем в банях, ошпарить кипятком? Но и в ресторанах, и в банях вокруг Григория толпа народу: агенты, дружки, женщины, цыгане... Все не то. Хотелось бы совершить идеальное убийство, то есть такое, ответственность за которое возьмет на себя кто-то другой. А еще проще — если бы этот кто-то сам и прикончил Григория. Но кто? О своем желании расправиться с Распутиным болтали многие; по Петрограду давно гулял слух о заговоре великих князей... Однако время шло, а Распутин гулял жив-живехонек. Кишка тонка была у «великих» князьков, да и цель их заговора Дзержинского не устраивала: они хотели, уничтожив Распутина и свергнув Николая, возвести на престол отрока Алексея, а вовсе не Михаила, который был нужен, чтоб исполнилось проклятие Марины Мнишек. Да, на князей Романовых надежды нет, все нужно делать своими руками. Похоже, придется бомбу... Дзержинский досадливо поморщился: до сих пор он только приказывал специалистам изготавливать бомбы и не имел ни малейшего представления о том, как это делается. Купить разве учебник по химии?</p><p class="p">Но учебника покупать не пришлось: благосклонная фортуна послала ему нужную встречу. Поздним вечером в начале декабря Дзержинский, уставший после очередного дня бесплодной слежки, сидел в общей зале ресторана «Прага». Укрытый тенью пальмы от посторонних глаз, он мрачно щурился, пуская кольца папиросного дымка, и медленно прихлебывал белое вино. Одет и загримирован он был с той продуманной эклектичностью, что позволяла принять его за кого угодно: светского хлыща, купчика-нувориша, биржевого маклера, удачливого налетчика. Такой маскарад был удобен в случаях, когда не знаешь заранее, какую роль предстоит играть.</p><p class="p">Ресторан был переполнен; метрдотель с поклоном спросил позволения посадить за столик еще одного господина. Дзержинский неохотно кивнул. Гладкий, благообразный, бледный господинчик оказался англичанином — еще один тупой, самоуверенный народишко! Британец болтал без умолку. Если верить его словам, он был литератором, пишущим какую-то книжку о России. Дзержинскому его имя ни о чем не говорило. Сперва он рассеянно-учтиво отвечал британцу, стараясь отделываться междометиями, но вскоре беллетрист так надоел ему, что он начал озираться, ища свободного места. Но мест не было... Взгляд Дзержинского задержался на соседнем столике...</p><p class="p">Там сидели трое. Дзержинский отлично знал в лицо их всех: его тезка — князь Юсупов, граф Сумароков-Эльстон, — с интимным дружком, великим князем Дмитрием Павловичем (хороши «великие», нечего сказать!), и с этими светскими красавчиками — довольно странная компания! — лысый Пуришкевич. Какие интересы могли объединить эту троицу за одним столом? Они пили коньяк и говорили тихо, но возбужденно; особенно горячился Пуришкевич, так и брызгавший слюной. Слух у Дзержинского был необычайно тонкий, волчий, что уже не раз сослужило ему хорошую службу, он опустил глаза в тарелку, чтобы не отвечать англичанину на его дурацкие вопросы, и стал внимательно прислушиваться к разговору.</p><p class="p">— Неужели, — спросил Дмитрий Романов, — нельзя найти очень хорошего убийцу, вполне надежного и благородного человека?</p><p class="p">— Простите, князь, но я никогда не держал бюро по найму убийц, — сказал Пуришкевич и залпом выпил очередную рюмку.</p><p class="p">— Дима, я бы взялся сам, — сказал Феликс Юсупов, отщипывая виноградину с веточки, — но как-то все-таки... своими руками убить человека... не эстетично...</p><p class="p">— Это не человек, а скотина.</p><p class="p">— Тем более.</p><p class="p">— Да, понимаю... Что же нам делать? Владимир Митрофанович, может, вы возьметесь?</p><p class="p">— Ну, знаете ли... — поморщился Пуришкевич. — А вы-то сами?</p><p class="p">— Не может же особа царской крови марать руки об эту собаку!</p><p class="p">— Да и как его убьешь? — вздохнул Пуришкевич. — Он повсюду с охраной...</p><p class="p">— Заманить его ко мне во дворец труда не составит, — спокойно сказал Юсупов, — ублюдок давно хочет познакомиться с моею женой... Но для самого акта желателен профессионал. Во всяком деле профессионал справится лучше.</p><p class="p">Сердце Дзержинского забилось быстрее: он понял, о ком говорят эти трое. Удача, неслыханная, невиданная удача сама идет в руки! Он вспомнил ловкача Азефа... План дальнейших действий мгновенно сложился в его мозгу... И тут он с изумлением отметил, что англичанин как будто тоже прислушивается к беседе за соседним столом. (Беседа шла по-русски.) Так вот оно что! Британец — секретный агент! Безмозглые англичане поверили в байку о том, что Распутин является немецким шпионом и подталкивает царя к сепаратному миру с Германией! Что ж — тем лучше! Чем больше разнонаправленных сил будет замешано в эту историю, тем больше возникнет версий, тем выше вероятность того, что ему удастся скрыть свое участие в деле...</p><p class="p">— Желателен-то желателен, да где ж его взять? Разве в газету дать объявление?</p><p class="p">— Вы бы в Думе кого поспрашивали!</p><p class="p">— Толку от Думы! — раздраженно сказал Пуришкевич. — Трусы, бездарные болтуны, готовые лизать сапоги Протопопова...</p><p class="p">— Но убить его необходимо как можно скорей, — сказал Дмитрий, — иначе произойдет революция и хам усядется на трон. («Сам ты хам, педераст, мурло великокняжеское», — злобно подумал Дзержинский.)</p><p class="p">— Придется давать объявление, — сказал Юсупов.</p><p class="p">— Пожалуй, придется, — согласились его компаньоны.</p><p class="p">— Не придется! — сказал Дзержинский, подсаживаясь к ним за стол. — Прошу прощения, господа, что позволил себе вмешаться в ваш приватный разговор...</p><p class="p">— О чем это вы, сударь? — Юсупов вскинул темные брови, довольно правдоподобно изображая недоумение.</p><p class="p">— Я — тот человек, которого вы ищете.</p><p class="p">— Ах, я знал, что не перевелись еще в России решительные мужчины! — взволнованно сказал князь Дмитрий.</p><p class="p">— Ваша забота о благе России заслуживает всяческого уважения, — строго сказал Пуришкевич. — Но...</p><p class="p">— До блага России мне дела нет, — перебил его Дзержинский. — Я — профессионал, выполняю свою работу за деньги. Заплатите мне сто тысяч, и я ликвидирую любого, на кого вы укажете.</p><p class="p">— Какой отвратительный тип! — по-французски шепнул Дмитрий своему приятелю.</p><p class="p">— Не будь чистоплюем, Дима, — шепотком же отвечал ему Юсупов, — нам именно такой и нужен... Скажите, друг мой, — по-русски обратился он к Дзержинскому, — у вас большой опыт в подобных делах?</p><p class="p">— Да уж не маленький, — усмехнулся Дзержинский. — Не беспокойтесь, сделаю в лучшем виде. От меня не уйдет. В ватерклозете спрячется — и там замочу. Только, пожалуйста, половину денег — авансом.</p><p class="p">— Хорошо. — Юсупов твердым, холодным взглядом посмотрел в глаза Дзержинскому. — Вашей целью будет... Григорий Распутин. Вам известно, кто мы?</p><p class="p">— Это меня не интересует, — ответил Дзержинский. — Называйте себя как хотите. Для меня вы — заказчики. Кстати, имейте в виду, что тип за соседним столиком — английский шпион.</p><p class="p">— Это же Сомерсет Моэм, беллетрист! И он ни бельмеса не понимает по-русски.</p><p class="p">— Вы думаете? — усмехнулся Дзержинский.</p><p class="p">— Так, может, вы и его возьметесь ликвидировать? — деловито спросил Пуришкевич. Он не любил англичан и считал, что антирусский штаб заседает именно в Лондоне.</p><p class="p">— Ни в коем случае, — возразил Юсупов. — Во-первых, выйдет международный скандал, во-вторых, я против убийства деятелей искусства... («Ну и дурак», — подумал Дзержинский.) ...А в-третьих, я люблю англичан. Прекрасная нация. («Дерьмо, а не нация», — подумал Дзержинский, который обо всех нациях, кроме собственной, был примерно одинакового мнения — хотя русские, пожалуй, были все-таки хуже остальных. Хуже русских были только евреи и цыгане.)</p><p class="p">— Тогда взять его в долю? — предложил деятельный Пуришкевич. — В случае чего можно будет все свалить на англичан.</p><p class="p">«А вот это умно», — подумал Дзержинский и сказал:</p><p class="p">— Это дело ваше, берите этого англичанина, если хотите, но делиться я с ним не собираюсь. Итак, вы согласны предоставить для мероприятия ваш дом? — спросил он сиятельного тезку.</p><p class="p">— А где-нибудь в другом месте вы не можете это осуществить? — поморщился Юсупов.</p><p class="p">— Это займет слишком много времени. Вы сами знаете, как его охраняют.</p><p class="p">— Что ж, я согласен. У меня внизу неплохой подвал. Повар хранит там картошку, но я попрошу его освободить помещение.</p><p class="p">— Отлично. Однако не продолжить ли разговор в более уединенном месте?..</p><p class="p">Расплатившись, все четверо заговорщиков вышли в снежную, сырую ночь. Англичанин следовал за ними на некотором отдалении, старательно изображая пьяного... «Театр», — брезгливо подумал Дзержинский. «Бремя страстей человеческих», — думал Моэм. Луна, отдаленно напоминающая шестипенсовик, сквозь тучи мрачные желтела.</p><p class="empty-line"/><p class="p">Ликвидацию назначили на шестнадцатое декабря и принялись продумывать детали. Дзержинский успел двадцать раз проклясть себя за то, что связался с этой компанией. Заказчики были люди деятельные, нервные, суматошные, противоречивые — настоящие русские! — и никак не желали предоставить все на усмотрение killer’а. По любому вопросу у каждого имелось собственное мнение, они постоянно спорили, мучились сомнениями, пытались все усложнить; чорт дернул Дзержинского сказать им о пристрастии объекта к розовым птифурам — они тотчас за эту ерунду уцепились и настояли на том, чтоб отравить Распутина пирожными вместо того, чтобы попросту его пристрелить, как делают все порядочные люди. Дзержинский долго убеждал их, что яды ненадежны, но в конце концов был вынужден уступить.</p><p class="p">И хлопотливая подготовка продолжалась: покупали гири, цепи, кастеты, веревки (такое разнообразие орудий нужно было, чтобы запутать следствие, да и потом заставить историков хорошенько поломать головы); по ночам изнеженными аристократическими руками красили, белили, крепили электропроводку, переоборудуя юсуповский подвал под чайную гостиную, хорошенькую, как бонбоньерка...</p><p class="p">— Князь, вы неправильно его держите. Это мастерок, а не револьвер и не бильярдный кий.</p><p class="p">— Боже, как воняет эта краска! Неужели нельзя было купить получше?..</p><p class="p">— Господа, я натер мозоль. Это ужасно.</p><p class="p">— Пан Станислав, а вы неплохо справляетесь!</p><p class="p">— Стараюсь, — буркнул Дзержинский. Он назвался Станиславом, потому что чуткий, как кошка, Юсупов сразу угадал в нем поляка.</p><p class="p">— Однако я вижу, что вы не из рабочего класса, — сказал Юсупов и улыбнулся, сияя белоснежными зубами. — Кто вы? Признайтесь.</p><p class="p">«Знал бы ты, что перед тобою потомок Иоанна Грозного, — небось, не был бы так высокомерен, англоман паршивый, татарская рожа!» — подумал Дзержинский. Он с первых минут общения возненавидел этого холеного, надменного молодчика непонятной национальности, имевшего наглость носить одно с ним имя. Но вслух сказал лишь, пожимая плечами:</p><p class="p">— Что за разница? Вы наняли меня для выполнения работы. Я ее выполню. Более ничего вам знать обо мне не нужно.</p><p class="p">— Что вы ощущаете, убивая человека?</p><p class="p">— Ничего.</p><p class="p">— У меня есть предчувствие, что мы о вас еще услышим, — задумчиво сказал Юсупов.</p><p class="p">— Я предчувствиям не верю и вам не советую.</p><p class="p">— Феликс, Слава, перестаньте болтать чепуху! — воззвал великий князь Дмитрий. — Идите лучше сюда и подержите стремянку.</p><p class="p">Наконец долгожданный день настал. С утра спешно заканчивали последние приготовления. Дзержинский впервые перед сообщниками примерил специальный костюм (благодаря навыкам, полученным в Бутырках, он сшил его собственноручно). Это произвело на всех сильное впечатление: Дмитрий ахнул, Юсупов крепко выругался, а Пуришкевич перекрестился и сплюнул через левое плечо. После обеда разбежались каждый по своим делам: Пуришкевич отправился с женой на рынок за продуктами, Юсупов ушел — по его словам — в Пажеский корпус, князь Дмитрий поехал в Царское, а Дзержинский, проследив на всякий случай за своим тезкой и обнаружив, что тот пошел вовсе не в корпус, а в Казанский собор, — вернулся к себе на квартиру, чтобы расслабиться и отдохнуть перед мероприятием.</p><p class="p">Несмотря на свои железные нервы, он волновался, что все может пойти наперекосяк: трудно не волноваться, когда у сообщников семь пятниц на неделе... Он так никогда и не мог до конца понять этих русских, и ему не нравилось, что Юсупов поперся в церковь: вдруг ему будет какое-нибудь видение, и он заявит, что вообще не нужно убивать Распутина, а нужно всем расцеловаться, пасть на колени и молиться или делать еще какую-нибудь глупость... Неврастеники, бездельники, белоручки! Даже убить сами не могут. И такой бесполезный народ заселяет шестую часть суши!</p><p class="p">В девять он начал приводить себя в надлежащий вид и гримироваться. Обычно это занимало немного времени, но на сей раз грим был сложный, в каком ему в последние годы весьма редко приходилось появляться на людях. Закончив туалет и одевшись так же, как утром во дворце, Дзержинский остался доволен результатом. Можно было не опасаться, что Распутин узнает его. А если и узнает — будет уже поздно. Шаловливое настроение вдруг овладело им: он снял телефонную трубку, вызвал квартиру Распутина и, когда хозяин подошел к аппарату, пискливым женским голоском поинтересовался, не знает ли тот, где и когда состоится отпевание тела покойного Григория Ефимовича. Услыхав в ответ злобные ругательства, он демонически расхохотался и швырнул трубку на рычаг. Пора!</p></span>
