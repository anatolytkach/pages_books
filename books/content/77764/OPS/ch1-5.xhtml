<span id="id3"><div class="title">
<p class="p1">ГЛАВА 2</p>
</div><p class="subtitle">Тайна происхождения Ленина. Ленинский план. Новые тайны Дзержинского. Революционный эрос.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">Ленин проснулся в архипревосходнейшем настроении. Лежащая рядом женщина — белая, сдобная, как булка, — мурлыкала и лениво потягивалась. Он не помнил, как ее звать, да это было и не важно. Во сне он играл довольно удачно, и там еще были какие-то девицы, трефовые и бубновые, которые танцевали на столах очень завлекательно и пели тоненькими голосами, высоко вскидывая ноги в черных чулках.</p><p class="p">Избавившись от дамы, он со вкусом позавтракал в крохотном кафе на первом этаже своей гостиницы. Предстояло провернуть массу делишек. Эх, как он потреплет этих революционеров! Вспомнив о Железном Феликсе, он пожал плечами, насмешливо фыркнул: «Напыщенный тип, опереточный рыцарь плаща и кинжала! Впрочем, полячишки все такие, гонор у них в крови... Но — пройда первостатейная, этого у Феликса не отнимешь. Бородка-то — сразу видать — приклеенная...»</p><p class="p">Справедливости ради заметим, что Владимир Ильич и сам нередко прибегал к маскараду: мужья-рогоносцы гонялись за ним по всей Европе, и, чтобы сохранить свободу передвижения, ему приходилось держать в чемодане коллекцию париков, усов и бород. Вчерашний cocu был очень, очень зол и сложением напоминал гориллу; подумав о нем, Ленин вновь поднялся к себе в номер и украсился окладистой извозчичьей бородой, а шляпу нахлобучил на самые брови. Теперь можно было выйти в город и заняться повседневными делами, не подвергая себя опасности. Прежде всего нужно было исполнить то, что Владимир Ильич делал всякий раз, когда образовывался маленький излишек наличности (увы, это случалось нечасто): отправить деньжат единственной женщине, которую он по-настоящему любил. Это была русская женщина, старая, толстая, уютная, — та, что дала ему имя и заменила мать, когда его орущим, завернутым в кружевной куль младенцем подкинули ей, а потом тянула его на свои гроши, из сил выбивалась. Она же вписала ему в документы и отчество, в честь своего любимого брата-сапожника, Ильи Родионыча. Так он и стал Ильичом — и очень ему шло это простоватое и вместе с тем лукавое прозвание! Кухарка Лена, баба Лена, Алена Родионовна! Добрейшая душа! А что за булочки стряпала... А какие сказки рассказывала ему вечерами... Вот уж, наверное, не думала баба Лена, не гадала, что тридцать лет спустя одна из этих сказок внезапно станет для Володи путеводной звездочкой, назначенной освещать его неугомонную жизнь...</p><p class="p">Ему вспоминается: он лежит уже в кроватке, а баба Лена, присев у изголовья, вяжет чулок — быстро-быстро шевелятся блестящие спицы в пухлых руках — и рассказывает, по своему обыкновению перевирая и путая все, что ей доводилось слышать, мешая города и столетья...</p><p class="p">— В стародавние времена это было; на море-окияне, на острове Буяне стоял чудный светлый город и звался Китеж-град.</p><p class="p">— Баб Лена, а где это — остров Буян?</p><p class="p">— Говорят же тебе, неслух: на море, на окияне... Не было на земле русской града краше Китежа: текли там молочные реки с кисельными берегами, а дома все были из золота, в каждой лавке продавали орехи и семечки, а ели китежане одни французские булки да монпансье, и что ни день, то была у них ярманка с каруселями. Был во граде том дуб зеленый, а вкруг того дуба ходил ученый кот на златой цепи и песни пел женским голосом.</p><p class="p">— Баб Лена, это же Пушкин...</p><p class="p">— Ну уж я не знаю — Пушкин, Кукушкин... Ты с барынею букварь читал, тебе лучше знать. Ах, хорош был град Китеж: дворцы белокаменные, церкви златоверхие, княжески терема узорчатые; а люди там жили все добрые и веселые: с утра Богу молилися, а вечерами на ярманку плясать ходили. Да. И во всем им удача была, за что ни возьмутся — то в руках и спорится. А удача китежанам от того была, что сыздавна володели они кольцом волшебным. Было то кольцо из себя невзрачное: железное, черное, кто чужой на него взглянет — подумает, что красная цена ему гривенник в базарный день. Да только сила великая в том кольце была.</p><p class="p">— Да ну?! — в возбуждении он садится, подтянув колени к подбородку. Баба Лена поправляет сползшее одеяло, говорит дальше:</p><p class="p">— Большая была в кольце сила, большая... Написаны в ем были снутри слова тайные... (Понизив голос, она шепчет заветные слова.) А хранилось то кольцо за стенами монастырскими... Вот прознал лютый ворог про то кольцо и пришел на землю русскую, чтоб кольцо украсть... Стал ворог под стенами светлого града Китежа.</p><p class="p">— А кто это — ворог?</p><p class="p">— Иноземец, разбойник, худой человек... Швед, поляк да татарин... Осадил ворог град Китеж, и не стало там булок сладких, и монпансье не стало, ели китежане один черный хлеб, но духом не падали, потому как знали — защитит их кольцо волшебное, что в монастыре спрятано. А только был в том монастыре один монах, по имени Гришка Отрепьев — ах, дурной человек, беспокойный!</p><p class="p">— Монахи бывают дурные?</p><p class="p">— Все, все дурные бывают, кто в пристенок режется и старших не слушает. Не перебивай. На-ко вот, возьми лучше пряничка... Шибко дурной был тот Гришка — чернокнижник и на девок заглядывался.</p><p class="p">— А когда на девок заглядываются — от этого дети берутся? Да, баб Лена? — опять прерывает он ее. Она в отчаяньи всплескивает руками, роняя клубок:</p><p class="p">— Да что ж это, Господи Исусе! Не ребенок, а наказанье Божие! Рано тебе про такие дела спрашивать — вот уши-то надеру... Дети берутся, когда люди в церкви венчаются.</p><p class="p">— Да? А откуда ж у тетки Феклы ребеночек? Она в церкви не венчалась.</p><p class="p">— Ты почем знаешь? Венчалась, да тебе не докладывалась... Ну, слушай дальше. Была во вражьем войске девка одна — полячка, колдунья, Маринкою звали. Вот и подослали они Маринку во град Китеж, чтоб разузнать, как к кольцу волшебному подобраться. Маринка и давай перед Гришкою хвостом вертеть...</p><p class="p">— Хвостом?! — он в изумлении широко раскрывает глаза. — У девок бывает хвост?!</p><p class="p">— Может, у кого и бывает, да я не про то говорю. Подолом она вертела туда-сюда. Гришке-то голову вскружила. Что хошь, Гришка ей говорит, для тебя сделаю. А она и говорит: укради для меня кольцо волшебное, тогда повенчаюсь с тобою.</p><p class="p">— И он украл кольцо?</p><p class="p">— Украл, украл, разбойник... — вздыхает баба Лена. — Темной ночкою взял да украл. И отдал Маринке. Да только Маринка хитрей самого чорта была — не захотела она своим дружкам, татарам да полякам, отдать кольцо, а захотела им сама-одна володеть.</p><p class="p">— Ну и правильно. Я б тоже не отдал.</p><p class="p">— И убежали Маринка с Гришкой тайком из града Китежа. А как не стало во граде том кольца — тут и пали стены крепостные, и поляк с татарином как побегут, как бросятся! Но раздался звон колокольный, да тотчас же под взорами прилюдными стал сей град врагам невидим. И ушел град Китеж под воду, и стало на его месте озеро.</p><p class="p">— Ух ты!..</p><p class="p">— Веками сокрыт и убережен под водою славный Китеж, град чудотворный... А кто находит его по сей день, да ступает в него, да вкушает яства и питие его, обретает силу великую и думы верные. Вот будешь слушаться, букварь учить, Богу прилежно молиться, перестанешь с мальчишками в пристенок да в орлянку играть — может, и тебе откроется тот град.</p><p class="p">— Да ну его, скучно... — он пренебрежительно машет рукой. — Ты лучше про кольцо дальше говори. Куда они убежали?</p><p class="p">— Ишь, любопытный... Ну, что дальше? В лес они убежали. И стали там жить в избушке с серыми волками. Скиталися там много-премного годов.</p><p class="p">— А что они ели?</p><p class="p">— Да кто ж их знает. Ягоды да орехи, должно быть. Скиталися-скиталися, а потом порешили на престол русский взойти. Пошли к полякам и говорят: хотим на престол. А поляки им говорят: это можно. А тут как раз на Руси смута великая была. Царь Иван Васильич помер. А у царя Ивана Васильича дите было малое, Димитрием звали. А царь Бориска-разбойник велел того дитя кинжалом заколоть... А поляки говорят: вот наш царь Димитрий, живой он. И показывают беглого монаха Гришку Отрепьева — вот, мол, это царь Димитрий.</p><p class="p">— А Бориска-разбойник что?</p><p class="p">— Испужался и помер с перепугу-то. А Гришка на престол взошел и с Маринкой повенчался. И стала подлая девка Маринка заместо царицы русской во дворце сидеть — видано ли, позор какой!</p><p class="p">— Во дворце-то, чай, веселей сидеть, чем в избе с серыми волками, — глубокомысленно замечает он. Я б тоже лучше во дворце сидел.</p><p class="p">— Да уж веселей, поди, — соглашается баба Лена. — Ну и стали они править — Гришка да Маринка. Известно, разворовали все закромы царские и Расею продали...</p><p class="p">— Кому продали?</p><p class="p">— А всем. Полячишкам, жидам, хранцузам и этим... мериканьцам.</p><p class="p">— Американцам?</p><p class="p">— Ну как бишь их там. А уж ели — столы трещали от серебра и злата, а брюха от пирогов да саек. Были у их колесницы да сани, серебром окованные, бархатом да соболями обитые. А на конях ихних узды, седлы и стремена сияли изумрудами и яхонтами... А сковороды у их во дворце были тож золотые и такие тяжелые, что двадцать человек народу одну сковороду нести не могли...</p><p class="p">— Хочу во дворец...</p><p class="p">— У, пострел... — баба Лена шутливо замахивается на него полотенцем. — Сказал тоже — во дворец! Чего тебе там делать, во дворце-то?</p><p class="p">— Сама ж говоришь — подкинули меня богатые люди. — Он мечтательно вздыхает. — Может, я сын царицын. Может, она пошла гулять да потеряла меня.</p><p class="p">— Царица уж старая у нас. Царицын не царицын, а графский, должно, сынок ты был, — говорит баба Лена. Она подпирает рукой щеку, глядит на него с грустью и любовью. — Вон, шустрый какой да вострый. И букварю в два счета обучился.</p><p class="p">— Ну и что Гришка с Маринкой?</p><p class="p">— Сидели, правили, воровали да на счетах считали. Да уж больно надоели они русским людям. Русскому человеку не надобно царев, что на счетах считают.</p><p class="p">— А каких царев нам надобно?</p><p class="p">— Чтоб себя блюли, Богу молилися и об народе радели. Вот и собрались русские люди — Козьма Минин их предводил — и отобрали у Маринки кольцо. Гришку с престола погнали в толчки. А Маринку засадили в башню, ту самую, где царевна Кутафья жила — та, что царя Гороха дочка, помнишь, я сказывала?</p><p class="p">— Помню.</p><p class="p">— А только Маринка колдунья была. Как ночь — она сорокой обернется, в окошко — фр-р-р! И летает, летает над Москвой. На какой дом присядет — там поутру горшков да полотна недосчитываются. У, ведьма!</p><p class="p">— И что?!</p><p class="p">— Да ничего. Козьма Минин поймал сороку и хвост ей ощипал. И стал на Руси править наш, русский царь-государь. Михайла Романов его фамилье было. Он был нашему государю анпиратору, храни его Господь, пра... пра... — баба Лена загибает пальцы, шевелит губами, в раздумьи качает головой, — ну, какой-то там прадедушка.</p><p class="p">— А кольцо?</p><p class="p">— А вот слушай. Маринка-то, ведьма, еще раньше кольцо тайно кровью помазала. Собрала свои женские кровя да... — ох, не то говорю! — спохватывается баба Лена. — Это... палец иголкой уколола да помазала своей кровью черной. И стало то кольцо дурное. А только наши про то не знали.</p><p class="p">— А ты б им сказала.</p><p class="p">— Не родилась я тогда ишшо... Ну так вот, повели Маринку-сороку на плаху, голову рубить. А она хитрая была. Взошла на плаху, в пояс поклонилася всему честному народу и говорит: простите меня. А сама глядит насупясь, глаз черный, и шепчет слова страшные...</p><p class="p">— Какие слова?</p><p class="p">— Да разное про то сказывают. Прокляну, говорит, Расею. Подует, говорит, ветер южный — и от жары все поля ваши высохнут. Подует, говорит, ветер северный — и померзнете все насмерть. Подует, говорит, ветер западный — и пойдете брат на брата резать да убивать. Подует, говорит, ветер восточный — и дети у вас все дураки родятся.</p><p class="p">— Какая злая...</p><p class="p">— Станешь злая, когда твоего дитя отняли да в печку живьем, — с неожиданным состраданием произносит баба Лена, непоследовательная, как все женщины.</p><p class="p">— Так у Маринки было дитя?</p><p class="p">— Ну да, она ж венчалася. А наши его в печку. Это мы умеем. Это мы завсегда пожалуйста — с дитями воевать.</p><p class="p">— Ну а потом?!</p><p class="p">— А наши бабы напужались, заплакали да говорят: пожалей ты нас, смилуйся. Тоже ж ведь детки у нас малые. Неужто, говорят, во веки вечные нам твою проклятию терпеть?</p><p class="p">— А Маринка?</p><p class="p">— Сжалилась маненько. Ладно, говорит. Вот ежели, говорит, пройдет много годов, и сызнова воссядет на престол царь-государь прозваньем Михайла Романов, и сам своею царскою волей от престола откажется и отдаст престол и волшебное кольцо в руки человеку, что пришел неведомо откуда и звать его неведомо как, а сам тот человек царских кровей будет, да знать про то не ведает, а тот человек кольцо в море-окияне искупает и на палец себе оденет — и тогда сыму я свою проклятию, и град Китеж пресветлый из воды обратно подымется, и станете обратно жить-поживать да пряники есть.</p><p class="p">— И что?</p><p class="p">— Не было ишшо у нас царя Михайлы. Петры, Николаи да Лександры все. А Михайлы не было. Да и кто ж по своей воле от престола царского откажется и отдаст в руки неведомо кому? Дураков таких не бывает.</p><p class="p">— А кольцо где?</p><p class="p">— Кольцо-то? Во дворце хранится, под семью замками. Да только проку нет от того кольца. Дурное оно, испортила его Маринка.</p><p class="p">— Баб Лена, я хочу быть царем.</p><p class="p">— Кто ж не хочет. Ты учись давай. Выучишься на анжинера, большой человек станешь. Будешь мне на старости лет утеха и забота. Не забудешь бабу Лену-то?</p><p class="p">— Не забуду. — Он обнимает ее за шею. — Я тебе, баб Лена, буду каждый день пряников присылать. И денег. Как в пристенок выиграю, так пришлю денег. Сто целковых.</p><p class="p">— А то тяжело мне будет на старости-то в кухарках. Ладно теперь, я еще крепкая. А только от жару кухонного слепнут да болеют.</p><p class="p">— Вот если б я был царем, то...</p><p class="p">— Что?</p><p class="p">— Я б добрым был царем. У меня каждая кухарка могла бы во дворце сидеть...</p><p class="p">— Ах ты, голова моя садовая...</p><p class="p">Алена Родионовна обнимает его, целует, крестит. Оба плачут, растроганные. Убаюканный, он засыпает и видит во сне: в золотом дворце сидит царь-царевич, король-королевич и кормит пряниками ученого кота, серого в яблоках, и стремена и седла сияют изумрудами и яхонтами...</p><p class="empty-line"/><p class="p">К денежному переводу прилагалось письмецо. Алена Родионовна, хоть и была неграмотна — барыня прочтет ей письмо, как обычно, — радовалась этим весточкам от своего Володи больше, чем деньгам. Он расписывал ей свою жизнь, не жалея красок. Она, она одна вырастила его! Хотя нельзя не признать, что барин с барыней содействовали немало: они не только за свой счет отправили кухаркина сына учиться в университет, но и, когда юный Володя за учет фальшивых векселей должен был попасть под суд, помогли выправить фальшивую метрику, в соответствии с которой восемнадцатилетний юноша был превращен в отрока шестнадцати годочков, вследствие чего всю жизнь и считалось, будто Владимир Ильич (кстати, отчество мальчик получил в честь сапожника Ильи Родионыча, брата Алены Родионовны) появился на свет в 1870-м, а не в 1868-м, как было на самом деле.</p><p class="p">«Неплохие были господа. А баба Лена моя совсем слаба стала — и на глаза, и на ноги...» Владимир Ильич вздохнул. Ничего, теперь все переменится. Он еще введет ее во дворец. Напрасно она, не желая попусту будоражить впечатлительного ребенка, всю жизнь скрывала от него тайну его происхождения: языки у людей длинные, и на каждый роток не накинешь платок. Владимир все узнал, когда ему было лет тринадцать или около того. Соседский кучер Никита — человек весьма культурный, хоть и горький пьяница, — забрел к бабе Лене поправиться крепким чайком, хозяйки не застал и в ожидании точил лясы с ее приемным сыном; тогда-то он впервые и назвал Володю «прынцем датским».</p><p class="p">— Почему датский, дядь Никита?</p><p class="p">— Да как не датский. Датский и есть. Коль датская прынцесса тебя родила.</p><p class="p">— Какая такая датская принцесса?!</p><p class="p">— Да супруга же цесаревича Александра Александрыча! Марья Федоровна!</p><p class="p">Володя вытаращился на гостя в полном изумлении:</p><p class="p">— Баба Лена мне ничего такого не говорила...</p><p class="p">— Да ну?! Что ж, ей виднее: должно, не хочет, чтоб ты знал. А я, дурак, разболтался, — Никита покрутил головой, по-видимому сокрушаясь о своей несдержанности. — Так ты уж, Володька, ей ничо не говори. Побожись, что не выдашь меня.</p><p class="p">— Не выдам, дядь Никита, провалиться на этом месте! Лопни мои глаза! Валяйте, рассказывайте!</p><p class="p">Однако струсивший Никита уже пошел на попятный:</p><p class="p">— Да я толком-то ничо и не знаю... А только болтали много, когда тебя нашли. Мужики ходили по дрова... Карета мчалась трактом, вдруг дверца отворилась — и сверток какой-то полетел чуть не под колеса... Мужики глянь — а сверток-то пищит! Развернули — а там дите. Да все в кружевах, в атласе... Куда ж девать живую душу? Отнесли Алене Родиновне, она тебя и взяла.</p><p class="p">— Да это я уж сто раз слыхал, — разочарованно протянул Володя. — Это и барин с барыней знают.</p><p class="p">— А ты дальше слушай... Там по кабакам такое болтали — аж волоса на голове дыбом становятся! Будто, значит, Марья-то Федоровна, когда еще совсем была молоденькою, согрешила со старшим сыночком нашего государя императора. Любовь промеж ним шибко большая была, вот и не утерпели до венчания. Цари ведь тоже живые люди... Робеночек родился... А тут же отец робеночка — цесаревич-то Николай — взял да и помер в одночасье. Вот цесаревич Александр грехи братца-то и покрыл, женился на прынцессе Дагмаре... А робенка куда? Отвезли в Питербурх и фрялине какой-то отдали на тайное воспитанье.</p><p class="p">— Фрейлине, — машинально поправил Володя. Дух у него занялся от этого рассказа, глаза заблестели; он едва мог владеть собой.</p><p class="p">— Я и говорю: фрялине... А только цесаревич Александр не хотел, чтоб племяш его вырос да начал, чего доброго, воду баламутить... И задумал он страшное дело. Погубить решился невинного дитя. А только супруга его Марья Федоровна про то узнала. И велела фрялине увезти сыночка из Питербурха далеко-далеко, чтоб никто не сыскал. Села фрялина в карету и поскакала в Симбирск — тут у ней двоюродная бабка жила... А цесаревич Александр погоню пустил. Фрялина напугалась и выкинула робенка из кареты — вдруг добрый человек подберет... Так и вышло.</p><p class="p">— Да откуда ж вы, дядь Никита, можете это знать?!</p><p class="p">— А бабка-то фрялины! От ейной горнишной слух и пошел.</p><p class="p">— Скажите мне, где она живет. Я должен поговорить с ней.</p><p class="p">— Померла уж давно. И горнишная, и сама бабка померла. Старые были. А то, может, потому и померли, что болтали лишнего.</p><p class="p">— А фрейлина?</p><p class="p">— И та померла. Тоже, знать, лишнего болтала. Бабы — язык без костей...</p><p class="p">— Врете вы все, дядь Никита, — сказал Володя: он был уже не маленький ребенок, чтобы верить в сказки. — Ерунду какую-то городите. Пили б поменьше!</p><p class="p">А на следующий день дядю Никиту переехала ломовая телега и он скончался, не приходя в сознание. Говорили, был пьян...</p><p class="empty-line"/><p class="p">Володя тогда, конечно, не поверил бредням горького пьяницы, хотя подсознательную обиду на цесаревича Александра, ставшего впоследствии императором, в душе все равно затаил, равно как и туманную, неопределенную нежность к Марии Федоровне; когда революционеры хотели злого императора убить, как убили его доброго отца, — Володя им тайно, но горячо сочувствовал. Однако же у него и в мыслях не было самому пытаться сделать какую-нибудь пакость императору. Ведь кучер Никита просто болтал что в голову взбредет. И Володя забыл причудливую сказку, как и ту, другую, что рассказывала ему Алена Родионовна.</p><p class="p">Он вспомнил о них значительно позже, когда, выгнанный с позором из университета, болтался в Петербурге и только начинал самостоятельно осваивать тонкости коммерции. Несмотря на бедность, в любовницах у него уже тогда не было недостатка, хотя бурные эти романы обычно бывали непродолжительны; так и своенравная Матильда Кшесинская тогда, в далеком девяносто втором, лишь на пару вечеров стала подругой юного Володи — его жизнерадостный характер привлек ее, как привлекал многих женщин, — но, убедившись, что ценных приношений от него ждать нечего, с такой же легкостью оборвала эту связь. Однако она успела сказать ему кое-что весьма интересное...</p><p class="p">— Как забавно, Voldemare...</p><p class="p">— Что, дорогая? — Он приподнялся в постели, опершись на локоть, посмотрел на нее с недоумением. — Что ты меня так разглядываешь?</p><p class="p">— Ах, Володя, у тебя на бедре вот эта родинка точь-в-точь как...</p><p class="p">— Как что? — с досадой спросил Владимир. Он был тогда еще молод и немного стеснялся родимого пятна, похожего то ли на аппеннинский сапожок, то ли просто на замысловатую кляксу.</p><p class="p">— Точь-в-точь как у Nicolas...</p><p class="p">— У твоего великого князюшки?</p><p class="p">— Да, у цесаревича... — Она наклонилась к нему, близоруко вглядываясь в очертания пятна. — Чрезвычайно похоже! Я могла бы подумать, — прибавила она смеясь, — что ты внебрачный сын государя, если бы...</p><p class="p">— Если бы что?</p><p class="p">— Nicolas говорил мне, что это родимое пятно он унаследовал вовсе не от отца, а от матушки... Жаль, я не могу рассказать об этом забавном совпадении Nicolas: в отличие от тебя, он дико ревнив.</p><p class="p">— Перестань. Неужто нам не о чем больше поговорить, как о твоем болване? — И он закрыл ей рот поцелуем.</p><p class="empty-line"/><p class="p">А назавтра он кинулся в публичную библиотеку — изучать газетные подшивки середины шестидесятых. Все, все сходилось! Нынешняя императрица, бывшая датская принцесса Дагмара действительно была в юности помолвлена с цесаревичем Николаем Александровичем, и он приезжал к ней; вполне возможно, что была связь и был ребенок — цари ведь тоже люди... Тут ему весьма кстати вспомнилась сказка Алены Родионовны о волшебном кольце; одна деталь в ней его поразила... «Воссядет на престол царь-государь прозваньем Михаила Романов, и сам своею царскою волей от престола откажется и отдаст престол и волшебное кольцо в руки человеку, что пришел неведомо откуда и звать его неведомо как, а сам тот человек царских кровей будет, да знать про то не ведает...»</p><p class="p">Знать не ведает — да, он много лет не ведал, не знал! «И у императрицы (он все же и в мыслях не смел назвать ее матушкой) есть законный сынок Миша... Малечка говорила — именно его, а вовсе не болвана Николашу, мой злобный дядя Саша прочит в наследники... Почему бы младшему брату Мише не поделиться со старшим братом Володей?»</p><p class="p">Вспоминает ли Мария Федоровна о несчастном брошенном малыше? Она, верно, считает его погибшим. «Бедная, бедная женщина! Эх, жаль, что не укокошили в свое время бородатого урода дядю Сашу! Чорт возьми, разве я не должен отомстить за свое потерянное детство? Только мы пойдем другим путем...» Владимир, разумеется, имел в виду громкий, скандальный судебный процесс, либо — еще умнее — хорошенький шантаж.</p><p class="p">Но, поразмыслив трезво, никаким путем он тогда так и не пошел. Во-первых, отсутствовала доказательная база. Во-вторых, чтоб затевать скандал, равно как и шантаж на столь высоком уровне, нужен был начальный капиталец. В-третьих, он бы все равно ничего не добился. В-четвертых, ему было лень.</p><p class="p">А потом, когда на трон вместо Михаила взгромоздился идиот Николаша, Ленин и думать забыл об этой истории. Так прошли годы... И вот теперь, когда он услышал о существовании целой организации — пусть болтливой и чванной, но все ж обладающей средствами и связями, — которая ставит своею целью свержение Николая Романова... о, теперь он наконец решил, что пора действовать. Второй такой шанс может и не представиться. В отличие от Феликса Эдмундовича, Владимир Ильич — все-таки юрист, хоть и недоучка, — всегда отдавал себе отчет в том, что у него нет и быть не может <em>законных</em> притязаний на престол. Предполагаемый отец его никогда не царствовал. Внебрачный сын царицы, а не царя, — какие права он мог заявлять?</p><p class="p">«Но — как насчет морального права? Неужели б я не был во сто крат лучшим царем, нежели мой безмозглый сводный братец?! Что ж, раз я не могу наследовать трон по закону — мы пойдем другим путем! Только неплохо бы заполучить волшебное колечко заранее. Миша-то, может, и отдал бы его добровольно, но от Николашки чорта с два дождешься». (Владимир Ильич всегда терпеть не мог Николая — из-за Малечки и вообще — и впоследствии ужасно злился, когда ему напоминали об их общем увлечении: стрельбе по воронам.) «Примажусь к этим большевизанам. Надутый полячок поможет. Большой пройдоха. Пусть подготавливает свержение Николаши. А там уж как-нибудь. Взойду на трон — отдам ему Польшу. Я не жадный».</p><p class="empty-line"/><p class="p">После банка Ленин направился в очередную пивнушку, где у него была назначена встреча с полезным человечком — их связывал интерес в торговле поддельными фильдекосовыми чулками; далее перекочевал в дешевый ресторанчик, где ждал знакомый биржевой «заяц», порою сообщавший ценные сведения; затем, переместившись в ресторан классом повыше, обсудил с доверчивым меценатом размер пожертвований в фонд помощи одиноким падшим матерям. Подобные занятия заполняли дни Ленина независимо от того, в какую страну забрасывала его судьба.</p><p class="p">Около шести часов пополудни, когда прихотливый бизнес-маршрут Владимира Ильича пролегал по четной стороне Черч-стрит, он приметил невдалеке черную, крылатую, гибкую фигуру... Закрываясь плащом, в сопровождении еще каких-то черных людей, Феликс Эдмундович вошел в «Мешок шерсти». «Съездец-то у них... то есть у нас... позавчера завершился, — подумал Ленин. — Какого же чорта он опять сюда пришел? Неужели можно по доброй воле пить такое скверное пиво?» Владимир Ильич был любопытен; сообразив, что в извозчичьей бороде Железный Феликс вряд ли сможет узнать его, он подошел к дверям паба и объяснил простодушному британскому полисмену, что, участвуя третьего дня в тайной сходке, позабыл на стуле свой бумажник. Британцы вообще были сущие телята. Ленина беспрепятственно впустили.</p><p class="p">Стульев и народу было на сей раз меньше; чаще попадались славянские рожи, заговорщики называли себя не социал-демократами, а социалистами-революционерами, и бородка товарища Феликса была другого фасона и масти, — в остальном собрание мало чем отличалось от позавчерашнего: трескотня, и лозунги, и фразерство («...история выдвинула нас на передовую линию огня, наша воля зовет нас бороться и смотреть открытыми глазами на всю опасность грозного положения и самим быть беспощадными, чтобы растерзать наших врагов...» и проч., и проч.), и яростные организационно-финансовые интриги. Даже песни пелись те же самые. Но лица были все новые, за исключением Эдмундыча и еще одного господина — кругленького, тугого, жовиального, румяного, с торчащими, как у кота, нафабренными усами, которого Ленин несколько раз встречал в рулеточных домах Ниццы и Монте-Карло. «Уж если этот селадон ударился в революцию — видать, самодержавию и впрямь скоро конец», — подумал Владимир Ильич.</p><p class="p">Прослушав несколько выступлений, он наконец сумел уловить идеологическую разницу: эсеры придерживались более радикальных взглядов на революционную борьбу по сравнению с эсдеками. «У этих-то, пожалуй, скорее что-нибудь получится, — думал он, — может, я дурака свалял, что записался в большевизаны? С другой стороны, уж больно трескучие и кровожадные». Как всякий коммерсант, Ленин был человеком мирным: не одобрял убийства, ужасно боялся террора и грабежей. «Этак к любому подойдут на улице и — ножик к горлу... Эсдеки как-то поспокойнее». У кровожадных эсеров ему сделалось неуютно, жутковато и скучно; он вынул из жилетного кармашка три изящных серебряных наперсточка и стал рассеянно играть ими. Это была глубоко укоренившаяся, бессознательная привычка; заметив, что котоусый живчик повернул голову и плотоядно уставился на наперстки круглыми глазами, Владимир Ильич смутился, убрал любимую игрушку обратно в карман и вытащил часы. Пожалуй, пора было на вечеринку к Кржижановскому. Через пару минут Ленин потихоньку выскользнул из зала, не дождавшись окончания сходки и не услышав, как Феликс Эдмундович говорит котоусому:</p><p class="p">— А вас, товарищ Азеф, я попрошу остаться...</p><p class="empty-line"/><p class="p">Дзержинский не играл в азартные игры; его азарт не нуждался в искусственных подпорках, вся жизнь его и так была игрой. Он ни разу не подходил близко к рулетке и даже не знал названия карточных мастей; он также не интересовался бизнесом, — и, возможно, зря, ибо он мог бы стать хорошим игроком или дельцом, разумным и осмотрительным. Он принадлежал к людям, никогда не складывающим все яйца в одну корзину. Нынче он делил свои ставки между занудливыми, медленно раскачивающимися социал-демократами и эсерами, — последние были ненадежны, но в случае удачи выигрыш мог оказаться крупней. (Прежде были еще анархисты, но из их компании он вышел, поняв, что они не простят ему восшествия на трон и тут же повернут оружие против недавнего вождя.) Азеф, с чьей помощью он три месяца назад избавился от надоедливого дурака Гершуни, был джокером в его колоде.</p><p class="p">— ...Только уж пожалуйста, денежки вперед. Вы же понимаете, каких расходов потребует это дельце.</p><p class="p">— Погодите о деньгах, господин Азеф. (Не было необходимости в беседах tête-à-tête кривляться и называть умницу Азефа «товарищем».) Сколько времени вам потребуется на подготовку?</p><p class="p">— Год.</p><p class="p">— Вы с ума сошли, — холодно сказал Дзержинский.</p><p class="p">— Попробуйте сами, — обиженно возразил Азеф, — а я посмотрю, что у вас получится. И я должен сперва потренироваться на ком-нибудь пониже рангом...</p><p class="p">— Упражняйтесь на ком хотите, — радушно позволил Дзержинский. — Но год — это несерьезно. За год Алиса может еще раз родить.</p><p class="p">— Да что хорошего она может родить? — усмехнулся Азеф. — Мышонка? Лягушку? В лучшем случае еще одну девку.</p><p class="p">— А если сына? — спросил Дзержинский. (Убийство Николая Романова имело для него смысл, разумеется, лишь в том случае, если тому будет наследовать брат Михаил.)</p><p class="p">— Почему, собственно, вас это так беспокоит, господин Глинский? (Феликс Эдмундович любил из озорства называться девичьей фамилией одной из своих царственных прародительниц — Елены Глинской или Марины Мнишек.) Не все ли вам равно, кто сменит Николашу на троне?</p><p class="p">«Эта гиена что-то заподозрила, — подумал Дзержинский, — нехорошо. Но ведь даже если родится мальчик, они могут назвать его Мишей... И Азеф прав: крайне маловероятно, что истеричная немочка произведет на свет наследника...»</p><p class="p">— В конце концов, — продолжал циничный Азеф, — даже если у него родится сын — кто мешает ликвидировать и ребенка?</p><p class="p">«Да, но придется ждать, когда этот чортов ребенок вырастет», — со злобой подумал Дзержинский: он был органически не способен допустить убийства невинного дитяти. Чтобы рассеять подозрения Азефа, он сказал ему:</p><p class="p">— Просто я опасаюсь, что, став отцом, Николай будет вести себя осторожнее, и его будет трудней ликвидировать.</p><p class="p">— Ничего, справлюсь, — хвастливо отмахнулся тот. — Так вернемся к вопросу о денежном довольствии... Вот, пожалуйста: я составил смету. Как можете видеть, речь идет о весьма умеренных средствах.</p><p class="p">— Вернемся, — вздохнул Дзержинский: он достаточно знал Азефа, чтобы не надеяться обойтись умеренными средствами. — Но два условия. Во-первых, даю вам сроку не год, а девять месяцев. Во-вторых, вы сейчас напишете мне расписку, в которой обязуетесь всю сумму до копейки вернуть, если по прошествии срока дело не будет сделано.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">Владимир Ильич отнюдь не был профессиональным игроком; для этого он чересчур разбрасывался. Передергивал он нечисто и несколько раз бывал бит. Жадная душа его разрывалась между биржей, рулеткой, ломберным столом и прелестями честного предпринимательства; удачу он ловил за хвост где придется — по дешевке скупал у пьяных старателей изумруды, участвовал в армейских табачных поставках, открывал в Сибири купальни с кавказскими целебными водами, торговал чулками и даже однажды содержал рыбную лавку.</p><p class="p">Голубой мечтою его — с тех пор, как в 95-м он в обществе одной кафешантанной певички побывал на первом представлении в «Аквариуме» и сердце его перевернулось, — был синематограф; при мысли о собственной студии он приходил в состояние тихого, мечтательного экстаза, близкого к нирване. Но до сих пор все его попытки сунуться в синема-бизнес оканчивались ничем. «Ничего, ничего: стану императором — будет у меня студия! Я весь Петербург заставлю в кино сниматься». Из доступного же, пожалуй, карты были всего милей его сердцу: еще в детстве, когда он играл с Аленой Родионовной в дурачки, ему казалось, что трефовые и бубновые короли и дамы подмигивают ему как-то особенно.</p><p class="p">Сделавшись взрослым, он не раз поправлял свои дела с помощью экарте, ландскнехта или макао; неплохой блефер, он был удачлив в канасте и покере; вдумчивые хитросплетения бриджа или преферанса до того его завораживали, что он нередко соглашался играть ради одного лишь умственного наслаждения, со ставками чисто символическими. Любимой же его игрою остались дурачки, в чем он, конечно, никому и никогда не признавался. (На случай экстренной необходимости он всегда носил в кармашке три вышеупомянутых серебряных наперстка.) Но Ленин не был корыстен: коротать вечер к Глебу Максимилиановичу он отправился не столько затем, чтобы улучшить свое материальное положение (хотя и это бы неплохо), сколько желая узнать побольше о будущих собратьях по борьбе и, быть может, отдохнуть в веселой компании.</p><p class="p">«Не может же быть, чтоб на вечеринке совсем не было женщин. И электрик мой говорил о половом вопросе так разумно». Подумав о женщинах, Ильич даже не стал прихватывать с собой собственную, старательно наколотую колоду карт, решив играть по возможности честно, а если окажется, что какая-нибудь большевизаночка достойна внимания, то, быть может, и вовсе не играть.</p><p class="p">Он не пожалел о том, что пришел: собралась легкомысленная молодежь, революционных речей за столом не произносили, меньшевизаны с большевизанами в отсутствие вождя ладили вполне удовлетворительно, вино и закуски были дешевые, но сносные, и даже наличествовала весьма привлекательная молодая дама, хотя и не большевизанка, а меньшевизанка. Это была блондинка с дерзким ртом и холодными глазами, и звали ее по-товарищески Шурочкой; она курила крепкие папироски и время от времени в сопровождении то одного, то другого гостя исчезала в задней комнате, по-видимому служившей Кржижановскому спальней. Воротившись, блондинка залпом выпивала стакан воды и как ни в чем не бывало продолжала участвовать в общей дискуссии, а пару минут спустя появлялся и ее партнер. Однако же особенной радости мужчины не выказывали: Кржижановский улыбался смущенно и разводил руками, у доктора Богданова кровоточила нижняя губа, Зиновьев и Каменев были мрачны и не глядели друг на друга, и один лишь Анатоль Луначарский, судя по экстатическому выражению его хомячьего личика, вдохновенно шевелил губами, по-видимому придумывая стихи.</p><p class="p">Увидав новое лицо, красивая блондинка очень обрадовалась и сразу же сосредоточила на Ленине свое внимание. Натиск ее был таким бурным, что Ильич немного струсил. Он ничего не имел против курящих и развязных женщин и даже, пожалуй, предпочитал их скромницам, потому что не любил долгих ухаживаний. Но эта его пугала: выражение ее светлых глаз было уж очень хищно, и на каждого мужчину она глядела так, будто собиралась одним махом измерить, взвесить, ощупать, проглотить, разжевать и выплюнуть, оставив от несчастного одни скорлупки.</p><p class="p">— Скажите мне, Voldemare... Что вы думаете о положении женщины?</p><p class="p">— О каком именно?</p><p class="p">— Считаете ли вы справедливой ее половую пассивность?</p><p class="p">— М-м... — (Ленин не был застенчив, но сейчас был позорно близок к тому, чтобы зардеться.) — Ну, видите ли, существуют такие положения, в которых она вполне может проявлять половую активность. Лично мне даже по вкусу, когда...</p><p class="p">— Ах, вы меня не поняли. Одобряете ли вы общественный порядок, при котором мужчине принадлежит исключительное право выбора полового партнера?</p><p class="p">— Д-да... Н-нет... Не знаю... А у вас такой миленький носик, Шурочка... И такие миленькие...</p><p class="p">— Поймите же: социальная революция невозможна без сексуальной. («Шикарная фраза, — подумал Ленин, — надо запомнить и ввернуть при случае».) Я, товарищ Ильич, глубоко убеждена, что право выбора должно перейти к женщине. Появилось половое влечение к мужчине — иди и бери его.</p><p class="p">Тут Ленин поежился: мысль о том, что любой — даже кривобокой и уродливой! — бабенке будет дано право, когда ей вздумается, пойти и взять его, была сверхъестественным абсурдом. Будь перед ним обычная мещаночка, он бы в два счета растолковал ей, кто, кого и как должен выбирать, но фанатизм, ледяным огнем пылающий в глазах блондинки, приводил его в замешательство.</p><p class="p">— А ежели мужчина не хочет? — спросил он наконец.</p><p class="p">— Современную женщину ни секунды не должно интересовать, чего он там хочет или не хочет.</p><p class="p">— Да, но как вы себе представляете...</p><p class="p">— Так вы что же — за половой аскетизм? — перебила она его, презрительно кривя губы.</p><p class="p">Такого ужасного обвинения Ленин стерпеть не мог и, стараясь выглядеть молодцом, ответил:</p><p class="p">— Ну вот еще!</p><p class="p">— Тогда идемте. Вы узнаете, что такое современная женщина... — Шурочка взяла Владимира Ильича за руку. Ее маленькая ручка с розовыми коготками была так же нежна и вкрадчива, как у всех нормальных женщин, девическая грудь высока, коленки круглы, и он наконец ощутил знакомое волнение.</p><p class="p">...Четверть часа спустя он вылетел из спальни как пробка. Еще никогда с ним не обращались так бесцеремонно и властно. «Это просто акула какая-то... Нет, увольте». Темная изощренность m-me Коллонтай не пришлась ему по душе; он любил, в сущности, простые и здоровые утехи, хотя понимал, что император должен быть порочным и тонким. «Впрочем, ерунда: Петр Великий не был порочным и тонким, он был просто ходок и молодец». Из всей династии Романовых Ленин уважал троих: Петра, его веселую дочь Елизавету и свою матушку Марью Федоровну. «А ведь я наполовину датчанин», — вдруг подумал он, вспомнив о матушке: до сих пор это почему-то ни разу не приходило ему в голову. Ему даже на мгновение почудилось, будто он ощущает в жилах ток датской крови — холодной, тяжкой и медлительной. «Да ну их к чорту. Уж лучше быть евреем». Нет, он ни капельки не ощущал себя датчанином и вообще о датчанах имел представление самое смутное. «Кажется, бывает датский сыр. И сардины. Быть или не быть, чорт побери, — вот в чем вопрос!» Он задумался: можно ли в случае неудачи с российским престолом претендовать на датский? — и решил, что игра не стоит свеч.</p><p class="p">Мысль его, описав причудливую параболу, вернулась к m-me Коллонтай. «Хотя... Кое-что она умеет здорово... Помню, была у меня одна шпагоглотательница... Но зачем было рвать воротничок? Нет, определенно так не годится! Если у фифочки есть муж, он должен бы задать ей добрую буржуазную трепку; а если нет — ей надо найти себе какого-нибудь простого парня, этакого здоровенного матроса: он ей мозги-то вправит».</p><p class="empty-line"/><p class="p">— M-me Коллонтай — новая женщина, — объяснял Ленину Луначарский. (Предмет их обсуждения уже вновь уединился с очередным гостем.) — Пожирательница сердец, амазонка, Казанова в юбке, социал-демократическая Венера, Красная Лилит, Эрос торжествующий...</p><p class="p">— Она замужем? — хмуро спросил Ленин. — С кем она вообще живет?</p><p class="p">— Да вроде бы есть какой-то муж в России... Но Шурочка не признает этих условностей, этих буржуазных собственнических...</p><p class="p">— Сейчас она живет с Плехановым и его женой, — сообщил Гриша Зиновьев. У него был вид человека, всегда достоверно знающего, кто, где и с кем, и Владимир Ильич сразу понял, что этому человеку можно верить.</p><p class="p">— Да вы, Ильич, не тушуйтесь, — сказал добрейший Глеб Максимилианович. — Все революционеры прошли через это.</p><p class="p">— Так-таки все?</p><p class="p">— За исключением Феликса Эдмундовича, разумеется.</p><p class="p">— Почему «разумеется»? — удивился Ленин. Он искренне недоумевал: Железный, если посмотреть объективно, был недурен собою, хвастлив, демоничен, и от него за версту несло жуликом последнего разбора, — сочетание, неотразимо действующее на женщин. — Он что же, страдает половым бессилием?</p><p class="p">— Что вы, Ильич! — возмутился Луначарский. — Вождь не может растрачивать потенциал на пустячки. Революция — ревнивейшая и требовательнейшая из любовниц; она не терпит соперничества.</p><p class="p">— Не в этом дело, — сказал Богданов. — Просто он аскет, вроде Рахметова. Умерщвляет плоть, живет в спартанских условиях, спит на гвоздях, принимает пищу раз в неделю. Одно слово — Железный. Не человек, а монумент.</p><p class="p">— И что же, у него нет совсем никаких слабостей? — поинтересовался Ленин. Ему плохо верилось в аскетизм Железного Феликса. «Сказать этим прекраснодушным дурачкам, что Железный бесстыдно наставляет им рога с эсерами? Нет, не стану: сплетником прослыть неохота, да и не мое это, в сущности, дело. Может, я еще сам в эсеры подамся. Я еще не решил». — И коль уж речь зашла о нем, позвольте спросить, чем он заслужил такое рабское почтение?</p><p class="p">— Да как вам сказать, — смешался Кржижановский, — как-то так сразу и не... Он очень, знаете, энергичный. Чуть что — сразу: «Расстрелять!» Некоторым интеллигентам это весьма импонирует.</p><p class="p">— А вам?</p><p class="p">Но Глеб Максимилианович уклонился от прямого ответа. Он подумал немного и сказал:</p><p class="p">— А вот насчет слабостей... Вообразите — он безумно любит детей.</p><p class="p">— Он необыкновенно добр, — подхватил Луначарский. — Под суровой маской скрывается пылкое, золотое сердце. Бескорыстный рыцарь революции. Защитник униженных, оскорбленных и отверженных.</p><p class="p">Владимир Ильич не мог спрятать недоверчивой гримасы, но все прочие подтвердили, что Феликс Эдмундович необычайно добр к детям:</p><p class="p">— Как увидит беспризорного ребенка, особенно девочку, — не может удержаться, чтоб не обласкать, не взять на руки. Никогда не пройдет мимо. Поразительный человек.</p><p class="p">«Неужто я в нем ошибся?» — подумал Ленин. Он сам очень любил детей: скармливал им тонны конфет, играл с ними в лапту и прятки, возил на закорках, помогал лепить снеговиков, соревновался в стрельбе из рогатки и даже иногда сожалел, что его несколько специфический брак, о котором он никогда не распространялся, не позволяет обзавестись парочкой веселых, чумазых озорников и дочкой, которую он одевал бы как барышню и всячески баловал.</p><p class="p">— Однако не пора ли перейти к картишкам? А, господа? — Гости одобрительно закивали. — Пикет? Безик? Двадцать одно? — осведомился любезный хозяин. — Или господа предпочитают польский банчок?</p><p class="p">— Владимир Ильич, а вы винтите? — спросил доктор Богданов и, услышав утвердительный ответ, радостно потер руки.</p><p class="p">По его лицу Ленин понял, что перед ним сильный и опасный игрок. «Надо с ним в пару сесть — глядишь, и разживусь деньжатами». Впрочем, ставки были крошечные. Никто из революционеров, по-видимому, не располагал средствами. «Да это и понятно: иначе на кой чорт им было ввязываться в эту революцию? А в мутной воде всегда можно ухватить министерский портфельчик или другую синекуру».</p><p class="p">Однако в пару с доктором Владимиру Ильичу попасть не удалось: им уже завладел хозяин дома. Ленину достался Гриша Зиновьев. (Каменев и Луначарский не играли, а торчали за спинами игроков, подсказывая ходы и всячески мешая: по-видимому, это было их любимое занятие.) Как новому и оттого почетному гостю, Ленину предложили сдавать. Не удержавшись, он без всякой надобности, просто по привычке вольтанул колоду; ему тотчас стало совестно, но он ничего не мог с собою поделать.</p><p class="p">Зиновьев был неплохой игрок, хотя трусливый, но этот недостаток компенсировался, с другой стороны, излишней рисковостью Кржижановского, так что поначалу Ленин с партнером были в выигрыше. Но пришла пора и им продуться. Владимир Ильич спокойно достал из бумажника деньги и выложил на стол свою долю. Однако Зиновьев, пряча глаза, с унынием объявил, что денег у него нету.</p><p class="p">— Как нету?! — возмущался Богданов. — Вы только что выиграли... Эх, Гриша, Гриша! Что, как обычно? — И он взял в руки колоду.</p><p class="p">— Хватит позориться, — сердито сказал Каменев и полез за своим тощеньким бумажником. — Я за него заплачу.</p><p class="p">— Что такое «как обычно»? — шепотом спросил Ленин у Луначарского.</p><p class="p">— Товарищ Зиновьев у нас малость скуповат — сами понимаете, сын сапожника... Обычно, когда он отказывается платить, его лупят колодой по носу. Ну, или товарищ Каменев за него расплачивается, когда при деньгах.</p><p class="p">«Да что они все заладили — сын сапожника, сын сапожника...» — с досадой подумал Ленин: он был хоть и царевич, но вскормленный кухаркою и оттого демократ; вдобавок брат его приемной матери был тоже сапожником. «Остальные-то все как на подбор — буржуйские или профессорские сынки. А еще революционерами себя называют! Эх, не любите вы народа...» Но досаду свою он скоро подавил, потому что в общем и целом социал-демократы были милейшие люди. Он уже прикидывал в уме, какими постами осчастливит их, когда сделается монархом: «Максимилианычу, понятное дело, поручу электричество... Разные там иллюминации к празднествам... Фейерверки... Нет, фейерверки, кажется, не имеют отношения к электричеству... Жаль! — Ленин очень любил фейерверки и громкую пальбу из орудий. — Электричество, электричество — для чего оно? Хотя в синематографе, наверное, есть... И вообще наука... Доктору подарю самую шикарную лечебницу с минеральными водами. От Луначарского, сразу видать, никакого проку: совершенно бесполезный человечек. Стало быть — займется культурой и народным просвещением... Зиновьев... гм... разве можно сапожничьему сыну поручить какое-нибудь дело? Нет, так рассуждать нельзя. Сапожник такой же человек, как и кухарка... На златом крыльце сидели: царь, царевич, король, королевич и сапожник. А дам-ка я ему, пожалуй, пост какого-нибудь градоначальника! И Леве тоже. Ей-богу! Для этого много ума не надо: взять хоть нашего великого князюшку Сергея Алексаныча... Ах, чорт! Если я сейчас куплю пикового короля — у меня большой шлем!»</p><p class="p">И, сделав poker-face, он хладнокровно объявил: «Прикупаю». Но короля в прикупе не оказалось, хотя Ленин твердо знал, что он там должен быть. «Размечтался, разнюнился, совершенно потерял квалификацию, — корил он себя, — пора спускаться с небес и браться за ум». Игра дальше пошла ровно, с переменным успехом, никого не обогащая и не разоряя. Потом снова пили вино и пели романсы под гитару. Короче говоря, было очень мило; вот только когда стали уже расходиться, Владимир Ильич внезапно зацепился ногою за косяк, споткнулся и встал как вкопанный: у его башмака — старого, но идеально вычищенного — отскочила подметка...</p></span>
