<p class="p1">ГЛАВА 4</p>
</div><p class="subtitle">Загадка Баумана. Во всем виноват Троцкий. 1905-1909, Куоккала-Лондон-Женева-Париж-Тифлис: 100 способов отъема денег у населения.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">Ленину снилось макао, которое в то же самое время было и какао. Игра происходила в ровной, приятно жаркой степи, дышавшей сладко и пряно. В паре с Лениным, грациозно присев напротив, играл молодой мулат, лукаво подмигивавший. Это был партнер надежный и опытный, невзирая на юность. В другой паре играли два злодея, у каждого кинжал. Злодеи были опереточные, не особенно опасные и плотоядно скалились. Во сне Ленин ушел подумать, что именно такая жизнь и нравится ему больше всего — чтобы игра, и притом азартная, но не на жизнь или смерть, а всегда на грани; ничего ужасного с ним случиться не могло. Злодеи тоже были втайне дружелюбны. Игра шла за девушку цвета какао и, должно быть, такого же вкуса. Она стояла за плечом у левого злодея (они были одинаковые, усатые, в моноклях) и посылала Ленину воздушные поцелуи. Молодой мулат vis-a-vis был ее брат. Он желал, чтобы красавица сестра попала в хорошие руки. Наилучшим кандидатом, разумеется, был богатый русский путешественник, тайный потомок царей. А забавно, подумал Ленин, привезти в Россию на царство мулатку. Коронация вызовет а-жи-о-таж! За место в первом ряду можно брать пятиалтынный, во втором ряду — гривенник. Карточка была, однако, неважнец, средней паршивости; с такой карточкой не стоило блефовать... Он выждал; со своей руки зашел мулат. Правый злодей подрезал, левый спасовал. Тут только Ленин сообразил, что это не Россия, а потому играть тут надо совсем особенным образом: карты, которые ему сданы, не имеют никакого значения. Это, так сказать, наличный капитал. Но если хорошо, молодцевато сходить, то карта превращается в нужную. Мулатка захлопала в ладоши, прочитав его мысль и обрадовавшись сообразительности. Ленин зашел очень молодцевато и подкрутил ус. Тотчас пиковая шестерка сделалась бубновым тузом. Злодеи расхохотались и растаяли в воздухе, а мулатка бросилась к Ленину на шею и обдала его густым запахом шоколада. «Как твое имя?» — спросил Ленин сдержанно, как и надлежало потомку русских царей приветствовать равноблагородную невесту. «Мое имя великая тайна, я называюсь Эйнем!» — воскликнула она и растаяла сначала у него во рту, а потом и в руках. Позвонили в дверь. «Это, верно, Эйнем везет замену, — догадался Ленин, — такую, которая бы не таяла. Иначе как же я буду с нею...» — но звонок повторился, и Владимир Ильич проснулся.</p><p class="p">«Кого чогт несет в такую гань!» — картаво подумал он. В окно лился желтоватый свет осеннего утра. Разносчик на улице нахваливал моченые яблоки. Ленин накинул халат.</p><p class="p">— Да иду же! — крикнул он настойчивому посетителю. Он никого не ждал, но с тех пор, как жизнь его оказалась связанной с большевиками, неурочные посетители сделались непременной частью его быта. Большевики вваливались к нему вечером и ночью, по делу, а чаще без дела — просто посудачить о делах амурных или денежных; Ленин к этому привык. Не было никакой необходимости врываться к главному казначею партии в столь ранний или поздний час — просто большевикам нравилось делать вид, что работа у них ужасно срочная, а партия ужасно секретная. Так что раннему гостю Ленин не удивился. Удивительно было другое — личным визитом его удостоил Железный Феликс.</p><p class="p">— А конспирация-то, батенька? — изумился Ленин. — Что ж вы этак в открытую?</p><p class="p">— Дело безотлагательное, — холодно сказал Феликс Эдмундович. — Позвольте, я войду.</p><p class="p">— Да милости прошу... только у меня, сами изволите видеть, неприбрано. Я был в объятиях Морфеуса. Такой, знаете, затейливый сон...</p><p class="p">— О чем же? — сухо полюбопытствовал Феликс Эдмундович.</p><p class="p">— Да так, знаете. Вооруженное восстание, вы впереди на белом коне... я, натурально, рядом, чуть позади... потом вы оборачиваетесь — и мне эдак шепчете: «Вольдемар! А что у нас козыри?» Я в ужасе думаю: скажу, что пики, — попадем на пики. Скажу, что черви, — нас съедят черви. Трефы — казенный дом. «Бубны!» — говорю. Вынули вы бубен, ударили, — и будто вы уж не вы, а цыган, и ходите с этим бубном да медведем по базарной площади, а народ кругом — «Любо! Любо!»</p><p class="p">Владимир Ильич, потирая руки, засмеялся, довольный. Ему понравилось, как он срезал чересчур серьезного вождя.</p><p class="p">— Занятный сон, — кивнул Железный. — Скоро вы, как Германн, картами бредить станете. Надо меньше играть, товарищ Ленин.</p><p class="p">— Только для партии! — прочувствованно сказал Владимир Ильич. — Верьте слову, давно бы бросил... («Поучи, поучи меня манерам», — злобно подумал он.) Чайку, Феликс Эдмундович?</p><p class="p">— Не откажусь. Холодно, чорт бы побрал...</p><p class="p">— Сейчас сообразим. Надюша! Раздуй там самоварчик, друг мой!</p><p class="p">— Если выйдет, как они задумали, — хмуро сказал Дзержинский, — может статься, что дело наше погибнет в зародыше. Мы можем упустить главный шанс. («Они» всегда были кровавая династия самозванцев Романовых.)</p><p class="p">— А что они задумали?</p><p class="p">— Сядем, — предложил Феликс Эдмундович.</p><p class="p">— Позвольте, почему сядем? За что сядем? Что мы такого сделали?</p><p class="p">— Ах, бросьте! — разозлился гость. — Я говорю, присаживайтесь... («Как все-таки тяжело иметь дело с полууголовным элементом! Но кто, кроме него, так умеет все организовать?») Слушайте... Мне стало доподлинно известно... от МОИХ источников (он и здесь не мог не подчеркнуть своей значимости), что семнадцатого октября будет дан манифест. Даруются конституция, свободы и бесцензурная печать.</p><p class="p">— Отлично! — воскликнул Ленин. — Это как же мы поставим дело! Это мы, батенька, сейчас же газетку... А не знаете, разрешат они игорные дома? В Европе это давно дело легальное, мы бы тогда поставили себя на широкую ногу...</p><p class="p">— Очнитесь вы! — сорвался Дзержинский. — После манифеста дело революции становится бессмысленным. Все, ради чего гибли люди в январе, все стачки, все летние выступления — пшик! Народ проглотит конституцию и успокоится, и мы никого уже не поднимем на последний штурм!</p><p class="p">— Да зачем же нам прямо сейчас последний штурм? — не понял Ленин. — Мы за три года нормальной коммерции так поставим партию, что всем прочим настанет полный акатуй! Газету... Я вам в Павловске сделаю такое Монте-Карло, что Ротшильд удавится! А потом, как подкопим сил, можно и последний штурм...</p><p class="p">— Никакого штурма не будет, — тяжело и раздельно произнес Феликс Эдмундович. — Если народ не восстанет сейчас, он не восстанет никогда. Они рассредоточат революционную энергию масс, все уйдет в песок...</p><p class="p">— Что же вы предлагаете?</p><p class="p">— Надо сорвать манифест.</p><p class="p">Ленин по-детски расхохотался. Надюша внесла самовар, потом появилась с двумя стаканами и связкой баранок. Она посмотрела на Феликса, потом на Ильича и залилась еще краской.</p><p class="p">— Нечего на мужчин глазеть, страмница! — с деланной грозностью прикрикнул Ленин. — Ступай книжки читать, грамоту забудешь!</p><p class="p">Он ущипнул жену ниже спины. Минога взвизгнула и выбежала. Ленин тотчас принял серьезный вид.</p><p class="p">— Как же вы думаете его сорвать? — вежливо спросил он. — Цареубийство? Но до семнадцатого всего две недели...</p><p class="p">— Глупости, — бросил Феликс Эдмундович. — Нас спасет только одно. Надо ответить на манифест серьезной народной демонстрацией, более масштабной, чем все предыдущие.</p><p class="p">— Сколько надо? — деловито спросил Ленин.</p><p class="p">— Тысяч десять, не менее.</p><p class="p">— Ну, батенька! — развел руками Ленин. Он уважал масштаб, но не терпел праздной мечтательности. — Где же я вам возьму такую прорву?</p><p class="p">— Ничего брать не надо. Сами придут.</p><p class="p">— Ходынку хотите? — прищурился Ленин. — Пряников раздать?</p><p class="p">— Что за чушь, — поморщился Дзержинский. — Это будет не просто демонстрация, а траурное шествие.</p><p class="p">— Шествие? — переспросил Ленин. — Это кого же пойдет хоронить такая толпа народу? Разве что Марусю Шаталову! (Маруся Шаталова была модная московская певица, по которой весь город сходил с ума; со всех граммофонов доносился ее низкий, страстный голос — «Всю душу вымотал, злоде-е-ей!».)</p><p class="p">— Маруся нам ни к чему. Нам нужны похороны революционера, героя, — сквозь зубы сказал Дзержинский. Этому идиоту ничего нельзя было объяснить. Надо было ставить ему задачу, и только.</p><p class="p">— А, — протянул Ленин. — Тогда понял.</p><p class="p">На самом деле он не понял ничего, но самолюбие его противилось такому признанию. Видимо, Феликс придумал более тонкую комбинацию, чем он. Круглые глаза Ленина приняли задумчивое выражение, как всегда, когда он сталкивался с чужой непонятной логикой. Надо было выгадать время. Он налил гостю чаю, потом и себе — гостю покрепче, себе послаще, — и с хрустом разломил баранку.</p><p class="p">— Дело прочно, когда под ним струится кровь, — раздельно проговорил Феликс Эдмундович. — Это-то вы знаете?</p><p class="p">— Надсон? — спросил Ленин.</p><p class="p">— Некрасов, — раздраженно ответил Дзержинский.</p><p class="p">— Этого я уважаю, — быстро сказал Ленин. — Это был человек серьезный.</p><p class="p">(Он никогда толком не читал Некрасова, но в Петербурге до сих пор поговаривали о его сенсационных выигрышах. Никто лучше него не умел поставить новичку паровоз на мизере, — он, собственно, и ввел термин «паровоз», ибо любил железную дорогу.)</p><p class="p">— Струится кровь, — повторил Железный Феликс. — Понимаете, зачем это надо?</p><p class="p">— Конечно, понимаю, — кивнул Ленин. — Продолжайте.</p><p class="p">«Ничего ты не понимаешь, рыжий фигляр», — подумал с досадой Дзержинский.</p><p class="p">— Нам нужно отнять у царизма всякое подобие моральной правоты, — медленно, как ребенку, объяснил он. — Чтобы было видно: одной рукой они дают манифест, а другой — убивают борца! Это вам понятно?</p><p class="p">— Это понятно. Это совершенно понятно. — До Ленина начало доходить; план был рискованный, но не лишенный той иезуитской рациональности, которая прослеживалась иногда в проектах Дзержинского. — Но как вы организуете убийство бойца, именно их руками и именно семнадцатого октября?</p><p class="p">— А это не я, — усмехнулся Дзержинский, обнажая острые зубы. — Это вы организуете, Владимир Ильич.</p><p class="p">— Я? Гм, — сказал Ленин и кашлянул. — Мы так не договаривались, батенька. Мы договаривались о коммерческой помощи, это да. Но это, понимаете, не моя специальность. У меня нет связей наверху, чорт побери. Я не могу им заказать, чтоб они семнадцатого, в такой-то час, убили революционера.</p><p class="p">— А зачем же заказывать? — тихо спросил Феликс Эдмундович, и изумрудные глаза его нехорошо блеснули. — Я дам вам людей...</p><p class="p">— То есть... — Глаза Ленина округлились окончательно, он чуть не подавился баранкой. — Вы что... мы должны... сами?!</p><p class="p">— Старым нечаевским способом, — сказал Дзержинский. — Убит революционер. На кого подумает толпа? Разумеется, на самодержавие. Кто вообще вспомнит о манифесте, если борцы понесут хоронить своего товарища? Какие манифесты, какая свобода и конституция, когда в центре Москвы... безнаказанно... убивают честного пролетария? — Он говорил медленно, шепотом, с наслаждением. (Мысль об убийстве честного пролетария была ему необыкновенно приятна.)</p><p class="p">— Не могу этого допустить, — тоже шепотом ответил Ленин. — Не могу представить. Опомнитесь, батенька. Вы что же, хотите быть хуже самодержавия?</p><p class="p">— Мы должны быть хуже самодержавия, чтобы победить, — согласился гость. — Вы начинаете кое-что понимать, товарищ Ленин.</p><p class="p">— Мы должны быть лучше, — возразил Ленин. — Мне в детстве приемная мать говорила: ты, Володя, должен быть лучше всех. Иначе съедят.</p><p class="p">— Не все, что говорила вам ваша приемная мать, годится как руководство в революционной борьбе, — сдержанно заметил Дзержинский. — Допускаю, что она была женщина мудрая, — тактично добавил он, зная главную слабость Ильича (чорт бы подрал этих сентиментальничающих жуликов!). — Но к революции она вас не готовила. Поймите! — возвысил он свой голос. — Героическая смерть одного — и спасенные жизни миллионов! В том числе миллионов детей! Товарищ Ленин, — произнес он твердо. — Если семнадцатого октября в Москве не будет траурного шествия, революция захлебнется и погибнет, говорю вам с полным сознанием положения.</p><p class="p">— Но это не мое дело! — вскипел Ленин. — Я могу вам организовать демонстрацию, если вы настаиваете. Я могу выгнать людей на улицы, если каждому пообещать денег или немедленное царствие небесное, я могу, если хотите, с помощью МОИХ связей, — не упустил он случая подколоть Железного, — набрать до десяти тысяч человек за три дня. Это по моей части, согласен. Но убивать ваших... наших товарищей по партии, выдавая себя за самодержавие, — простите-с, я этому не обучен, и так революции не делаются! Если только... — Внезапная мысль ударила ему в голову; возможно, он думал о Феликсе слишком плохо. — Если только вы не думаете принести в жертву себя, — решительно закончил он.</p><p class="p">Дзержинский смотрел на него с неопределенным выражением. Впрочем, по его глазам никогда нельзя было сказать, что у него на уме.</p><p class="p">— Или меня, — добавил Ленин после паузы, пристальнее вглядевшись в эти непроницаемые зеленые глаза.</p><p class="p">— Возможно, я и принесу себя в жертву, — тихо сказал Феликс Эдмундович и медленным жестом разорвал на своей впалой груди рубаху — он любил этот театральный жест. — И более того — почти наверняка, ибо без главной жертвы свобода вряд ли будет искуплена. Но я сделаю это лишь в последнем и решительном бою. А пока... придется пожертвовать другим товарищем.</p><p class="p">— Aгa, — сказал Ленин. Подтверждались его худшие предположения. Надо было как можно скорее избавиться от этого субъекта. Прямо сейчас, конечно, Железный убивать его не станет, — чай, не семнадцатое, — но выбор его сомнений не вызывал. — Значит, искупительная жертва буду я, так?</p><p class="p">— Отчего же, — холодно заметил Феликс Эдмундович. — Вы тоже слишком полезный человек. Боюсь, нам еще нужно пожить. Нет, у меня на примете другой человек. Безусловный провокатор, но товарищи еще не знают об этом. Таким образом, вы убьете двух зайцев вместо одного. — Он нехорошо усмехнулся. — Мы избавимся от предателя, а толпа получит легенду о павшем борце, которого подлый царизм из-за угла убил в разгар так называемого освобождения.</p><p class="p">— Вы убеждены, что он провокатор?</p><p class="p">— Абсолютно. Сам он пока и не подозревает о том, что разоблачен. Будьте очень осторожны — он хитер, как чорт. Имя его я назову вам завтра. И учтите: если до завтра вы сбежите — я позабочусь о том, чтобы все наши скромные совместные предприятия стали известны... там, где ими заинтересуются.</p><p class="p">— Что-то вы слишком хорошо обо мне думаете, — прищурился Ленин.</p><p class="p">— Не лучше, чем вы обо мне, — парировал Дзержинский. — Пока я не свяжу вас кровью... пока вы не пройдете последнего, кровавого крещения — я не могу доверять вам вполне. Простите.</p><p class="p">— А что, все остальные... уже повязаны? — спросил Ленин, представляя себе Луначарского со стилетом в пухлой руке или Кржижановского, поражающего провокатора электрическим разрядом.</p><p class="p">— Мне не нужно повязывать всех, — жестко сказал Феликс Эдмундович. — Меня интересуете вы. Как человек, выходящий на первые роли в партии.</p><p class="p">— То есть все затевается ради меня? — с издевкой спросил Ленин.</p><p class="p">— Если угодно. Так что, поручая дело вам, я убиваю не двух, а целых трех зайцев, — сказал Феликс Эдмундович и посмотрел на Ленина с таким недвусмысленным намеком, что Владимир Ильич почувствовал себя зайцем, причем третьим. Третьим — это было особенно унизительно. Если он провалит операцию, Железный Феликс его немедленно сдаст и ничего не потеряет. Лишится, правда, казначея — ну да ничего, он, кажется, и без денег сделает свою революцию. А если все получится... что ж, тогда Ленин окажется в полной его власти. Всегда можно будет обвинить его в убийстве, тогда как у самого Ленина не будет против Дзержинского ни единой улики. Разговор шел без свидетелей, да и кто поверит в такой бред...</p><p class="p">— Надеюсь, мне не придется марать руки лично? — спросил Ленин.</p><p class="p">— Марать руки? — переспросил Дзержинский. — Вы не считаете уничтожение предателя святым делом? Подвигом чести?</p><p class="p">— Полно, полно, — дрогнувшим голосом проговорил Ленин. — В нашей среде, знаете... в среде коммерсантов... убийство традиционно вызывает сильнейшее отвращение. Мы признаем, конечно, легкие нарушения закона... тем более что правительство само есть первейший жулик в России... но убийство отвратительно даже тем, кто проиграл в притонах последнее.</p><p class="p">«Экая у него воровская гордость», — усмехнулся Феликс. На каторге он видывал воров, похвалявшихся тем, что они сроду не пролили крови — работали на чистой сообразительности да на ловкости рук.</p><p class="p">— Разумеется, я дам вам человека, — кивнул он. — И помните, завтра в это же время... вы получите от меня записку. Ее принесет тот самый, кого я направлю в ваше распоряжение. В записке будет фамилия и адрес пациента. Остальное организуете вы. Это партийное поручение, — добавил он с особенным ударением. Ленин уже знал, что такое «партийное поручение» в лексиконе Дзержинского. Так называлось предложение, от которого нельзя отказаться: отказ карался смертью, куда бы ни укрылся отступник. До сих пор Ленин не получал партийных поручений — вся его работа строилась на полудобровольных началах. Но, видимо, кандидатский его стаж и впрямь кончился.</p><p class="p">Можно было, конечно, послать к чорту всю эту партию и ее сумасшедшего вождя. Да, но как без них завладеть кольцом и престолом? И в этот момент Ленина осенила великолепная, без преувеличения, мысль. Мысль эта была столь очевидна и в то же время забавна, что оставалось только дивиться — как это она не явилась ему сразу; он хитро прищурился и испытующе посмотрел на Дзержинского — вдруг прочтет? Но тот, похоже, ни о чем не догадывался.</p><p class="p">— Хорошо, Эдмундович. Я знаю, что такое партийное поручение.</p><p class="p">— Вот и отлично, — сказал Дзержинский и быстрой тенью вышагнул из комнаты, не допив чаю. Эта его манера стремительно исчезать ужасно раздражала Ленина — сам он, по русскому обычаю, любил поговорить на пороге, а то и махнуть последнюю на посошок.</p><p class="p">— Недурно, — вслух сказал Ленин, разгрызая баранку. — Очень недурно. Можно будет раскрутить неплохую комбинашку... Будем немножко смотреть, дружок, какой ты есть железный.</p><p class="p">Он сделал несколько визитов, два телефонных звонка, а обедать отправился на Петровку, в «Уютный домик». Это был любимый трактир Московского художественного театра и бесчисленных артистов-любителей, заходивших сюда поглазеть, как будут накачиваться водкой их раскатисто хохочущие кумиры.</p><p class="empty-line"/><p class="p">Ранним утром четвертого октября в его дверь осторожно постучали. Ленин был уже одет, набрызгался одеколоном и выпил первый стакан чаю. Он желал встретить посетителя во всеоружии. С утра его слегка лихорадило, но это была приятная лихорадка азарта. Разумеется, в помощь ему Дзержинский пришлет отвратительного громилу из числа тех, какие охраняют его иногда на сходках, — вообще озаботится приставить к Ленину человека, который бы все о нем докладывал и при этом был максимально неудобен в совместной работе; что ж, дело привычное. Ленин выдумал уже и тактику на случай такого подлого подвоха, он вообще замечательно ладил с грубыми и простыми парнями, умея мгновенно располагать их к себе, — но, когда он открыл, в дверь вошел невысокий юноша в кургузом пальтеце, совсем мальчишка, с чистыми телячьими глазами.</p><p class="p">— От товарища Железного Феликса, — сказал он ломающимся голосом, глядя на Ленина с немым обожанием. — Здравствуйте, товарищ Ленин. Я товарищ Яков. Записочка вам.</p><p class="p">Ленин развернул записку. Там было единственное слово: «Грач». Ни обещанного адреса, ни пояснений.</p><p class="p">В первый момент Ленин ничего не понял.</p><p class="p">— Твоя как фамилия? — спросил он строго.</p><p class="p">— Лепешкин, — застеснялся товарищ Яков.</p><p class="p">— А Грач кто?</p><p class="p">— Товарищ Грач? — переспросил новый знакомый. — Это наш, это знаменитый... Вы не знаете разве? Да слыхали наверняка, его еще Послом кличут!</p><p class="p">О После Ленин был наслышан изрядно. Грач был лучшим из курьеров Дзержинского, привозившим из-за границы и нелегальные материалы, и достаточно серьезные деньги. Репутация у него была безупречная, и Ленин в первый момент не поверил, что Феликс Эдмундович собирается пожертвовать любимым агентом. Впрочем, вероятно, тут не без подвоха — Железный явно заподозрил его; очень может быть, что беспрецедентная удачливость Грача действительно объяснялась, как бы сказать, его двойной игрой, — но это многократно осложняло задачу. Не просто убить, но и вычислить агента с таким опытом было непросто.</p><p class="p">— Как его найти — знаешь?</p><p class="p">— А как же! — радостно шмыгнул носом товарищ Яков. — Товарищ Феликс все как есть обсказал. Бауман его фамилия. Ох и хитер, говорят, — страсть! В гриме. Никогда не узнаешь, каков он из себя есть.</p><p class="p">— Надо бы мне с ним поговорить, — задумчиво произнес Ленин. — Кстати, тебе товарищ Железный объяснил, зачем ты ко мне прикомандирован?</p><p class="p">— Никак нет, он сказал, что в полное ваше распоряжение на две недели. Товарищ Железный мне заместо отца родного, я не то что ослушаться, я и переспросить никогда...</p><p class="p">— Стало быть, лично с товарищем Грачем сможешь меня свести?</p><p class="p">— Как возвернется, так тут же и сведу. Он завтра возвернется, с грузом, — Лепешкин счастливо улыбнулся собственной причастности к тайне. — Тогда и разыщу его, в лучшем виде. Я знаю, где его завсегда найти можно... кабинет егойный... с утра лучше.</p><p class="p">«Мальчик непрост, — понял Владимир Ильич. — Совсем непрост. Ну, так ведь и я не лыком шит...»</p><p class="p">— Иди-ка ты, товарищ Лепешкин, в лавку напротив и принеси мне портеру. Две бутылки, по две гривны. Понял? — и Ленин отсыпал ему мелочи.</p><p class="p">— Письмо писать будете? — догадался товарищ Лепешкин. — Для конспирации?</p><p class="p">— Какое письмо? — не понял Ленин.</p><p class="p">— Ну а как жа! — радостно осклабился Лепешкин. — Товарищ Железный завсегда... Ежели портером написать, да потом смочить и зубным порошком «Дункан» засыпать, — сразу проступит!</p><p class="p">— Смотри ты, — удивился Ленин. — Открою тебе, Лепешкин, ужасную тайну. Никому не выдашь?</p><p class="p">— Как Бог свят, честное партийное! — перекрестился Яша.</p><p class="p">— Портер, Яша, для того, чтобы его пить, — веско сказал Владимир Ильич. — Дуй, душа моя. Одна нога здесь, другая в лавке.</p><p class="empty-line"/><p class="p">За стаканом портера Ленин крепко задумался. Портер всегда будил мысль. Товарища Яшу Владимир Ильич послал с запиской к репортеру «Московских ведомостей» Пронькину, а сам принялся продумывать комбинацию. Собственно, главное было ему ясно. Ему нужен был конкретный человек из числа постоянных посетителей «Уютного домика», требовалась небольшая сумма денег — в пределах двадцати пяти рублей, больше такая операция не стоила, нечего развращать статистов, — плюс желательны два репортера, из которых один бы собирал, а второй распускал слухи; подобные люди были у него на примете в любом из крупных городов России. Как провернуть дельце и не замараться — он уже представлял абсолютно четко; неясно было одно.</p><p class="p">— Почему Грач? — спросил Ленин вслух и сделал большой глоток.</p><p class="p">Ленинский стиль всегда был прост и эффектен — Ильич привык разрубать любые узлы; самым надежным было бы, конечно, явиться к Грачу и открыться ему, но тут возможна была самая подлая обманка: Феликс в сговоре со своим любимцем (Грач считался его фаворитом номер один: образцовый конспиратор!). Ленин приходит к Грачу, излагает ситуацию — а тот бежит к Феликсу и... Тогда Грач, несомненно, предупрежден и о попытке убийства, и вся эта грандиозная мистерия ставится только для того, чтобы Ленина в момент убийства поймать за руку. Ленин готов был ждать от Феликса чего угодно, тут пределов не было, — люди представлялись Железному пешками, а с пешками не церемонятся. Но если даже предположить, что Железный ни в чем не врал, — говорить с провокатором напрямую было опасно. Никогда не знаешь, на что способны двойные игроки.</p><p class="p">Так ничего и не придумав, на следующий день Ленин пинком разбудил Лепешкина, спавшего в прихожей на Надином сундучке (саму Надю в порядке исключения пришлось уложить с собою — она всю ночь, не шелохнувшись, пролежала спиной к Ильичу, ужасно смущенная).</p><p class="p">— Валяй, веди меня к своему Грачу.</p><p class="p">— Сей минут, — торопливо сказал Лепешкин, быстро ополоснулся, пригладил вихры и повел Ленина к Бауману.</p><p class="p">На восемнадцатой квартире в шестом доме по Варварке была укреплена начищенная дощечка:</p><p class="p">«Д-р Бауман-Мирбах, психические эпидемии и параличи. Половые расстройства. Новейшая венская школа. Прием с 10 до 12 каждодневно».</p><p class="p">— Э-хе-хе, — задумчиво сказал Ленин. — Бауман-Мирбах, стало быть?</p><p class="p">— Aгa. Они немцы.</p><p class="p">Ленин достал любимые часы-луковицу. Была половина одиннадцатого, самый приемный часу доктора Баумана. Кажется, сама судьба подталкивала его к тому, чтобы немедленно напроситься на прием и по крайней мере определиться, кто таков Грач.</p><p class="p">— Ты, Лепешкин, свободен до семи вечера, — сказал Ленин. — К семи жду. До того погуляй, что ли... к девкам там или мало ли...</p><p class="p">— Я человек сурьезный, — нахмурился Лепешкин. — Чего вы меня к девкам отсылаете? Я лучше пошел бы листовки разбросал. Нет у вас листовок?</p><p class="p">— Откуда у меня листовки, дурень? — прошипел Ленин. — Я с таким товаром не связываюсь... Пшел гулять, сказано! — и отсыпал помощнику два рубля мелочью. Лепешкин, обиженно шмыгая, ссыпался вниз. Ленин решительно повернул рукоятку звонка.</p><p class="p">Дверь приоткрылась. Взору Ленина предстала пухлая, дородная немка — за границей такие служили в дорогах санаториях, возили паралитиков в креслах на колесах.</p><p class="p">— Фы к токтору Пауману? — спросила она подозрительно.</p><p class="p">— Точно так-с. Дело, не терпящее никаких отлагательств.</p><p class="p">— Но вам назнатшено?</p><p class="p">— Голубушка, откуда мне может быть назнатшено?! — взмолился Ленин. — Это же случилось только что! И если не принять срочных мер, дойдет до греха! Их бин кранк, зупер кранк! — добавил он для пущей убедительности.</p><p class="p">— Кхарашо, я толожу, — нехотя согласилась толстуха. — Прохотите, но знайте, тшто токтор Пауман не принимает без предварительной токоворенности...</p><p class="p">«Вот чорт, — подумал Ленин. — Важная шишка. Где только Железный его подцепил? И что за интерес такому врачу работать с нашими? Разве из профессионального любопытства — компания-то в самом деле психиатру на радость, один Богданов с его идейками чего стоит... Но какова наглость! Еще договариваться с ним о приеме... Когда приду к власти, первым делом заставлю всех врачей работать без предварительной договоренности. Помилуйте, у человека, может быть, геморрой...» Ленин не страдал геморроем, но много о нем слышал. Говорили, что при сидячем образе жизни он почти неизбежен — и тогда приятнейшее из наших отправлений превращается в сущую пытку, исключающую и чтение, и размышление о прекрасном...</p><p class="p">— Фелено просить, — сказала толстуха. Ленин оставил в прихожей трость и потертый цилиндр. Кабинет Баумана был роскошен — диван с зеленой шелковой обивкой, тяжелый дубовый стол, голубые бархатные портьеры... На стене висел портрет бородатого еврея средних лет, но явно не Маркса и даже не Энгельса. О Марксе и Энгельсе Ленин знал только, что один из них был еврей, выдумавший хитрый коммерческий трюк: он написал книжку якобы о том, как зарабатывать капитал, — набив ее на самом деле всякой ерундой, буквально первым, что пришло на ум. Идея была очень еврейская, выгодная — все покупали загадочное сочинение, натыкались на долгие рассуждения о рабовладении и какой-то прибавке к стоимости, честно вчитывались, но рано или поздно догадывались, что их провели. В России эту обманную книжку давно запретили и правильно сделали. Находились, однако, идиоты — их называли «марксистами», — которые утверждали, что во всей этой абракадабре, написанной хитрым автором для заполнения бумаги, можно отыскать сокровенный смысл и скопить-таки капитал; для этого надо читать то по диагонали, то через строку, то задом наперед, — иные прибегали даже к каббале, но пока никаких новых способов обогащения не открыли. Ленин-то сразу смекнул, что ничего такого Маркс не знал и просто нажился на людской доверчивости, — а если бы ему был ведом таинственный способ наживания капитала, он бы уж как-нибудь обеспечил себя; поговаривали, однако, что умер он богачом и все свои деньги завещал Энгельсу для расширения книжного бизнеса, и уже Энгельс написал будто бы два других тома «Капитала» и еще брошюру о том, как захватить власть сначала в семье, а потом и в государстве, — но то ли у него не было марксовой ловкости, то ли аферу наконец раскусили, и никаких «энгельсистов» уже не появилось. Слухи о тайном марксовом богатстве наверняка распускали сами марксисты, надеясь подпольно распространить как можно больше экземпляров якобы шифрованной книжки. Ее переписывали от руки и прятали по чердакам, хотя правительство честно делало все возможное для пресечения наглой аферы. Ильич над всем этим только посмеивался. Надо будет со временем написать книжку о том, как все устроено, или даже газету. Назвать ее «Правда» или «Вся правда». То-то будут раскупать!</p><p class="p">— Здравствуйте, — мягко сказал хозяин, огромный, полный брюнет с широкой лопатообразной бородой. — У вас срочное?</p><p class="p">— Очень срочное, — кивнул Ленин. — Совершенно безотлагательное. Благодарю, что приняли, не то могла бы пролиться кровь. («Экий боров! С таким не то что одному, но и при помощи Лепешкина не управиться... Задавил бы как есть; впрочем, никто никого убивать не будет».)</p><p class="p">— Очень интересно, — доброжелательно сказал Бауман-Мирбах. — Вы страдаете явлениями психического паралича, имеете симптомы нервной эпидемии или же полового расстройства?</p><p class="p">— Полового, — быстро сказал Ленин. Он сообразил, что в этой сфере понимает все же больше, чем в параличах.</p><p class="p">— И что же, вас тревожит бессилие? — сочувственно спросил доктор.</p><p class="p">— Совершенно наоборот, — горячо сказал Ленин и на всякий случай трижды постучал по деревянному столу. — Абсолютно противное тому, что вы только что сказали. Напротив, меня тревожит исключительное, совершенно исключительное желание.</p><p class="p">— Благоволите присесть, — широко улыбнулся Бауман. — Случай крайне интересный. Какого же рода желание вас тревожит?</p><p class="p">— Я желаю полового наслаждения, — признался Ленин.</p><p class="p">— Что же, это желание многим свойственно. В нем нет ничего болезненного...</p><p class="p">— Многие — это многие, — отмахнулся Ленин. — А я желаю постоянно. Просто, знаете, ни о чем другом думать не могу.</p><p class="p">— Что же, и сейчас? — не на шутку заинтересовался врач.</p><p class="p">— Сейчас — нет, — признался Ленин. — То есть это возникает только в женском обществе.</p><p class="p">Бауман, казалось, разочаровался. Вероятно, он — как большинство заграничных психиатров — был так уверен в своей неотразимости, что уже приготовился отбивать атаки ленинских домогательств.</p><p class="p">— Но с такой силой, — горячо продолжал Ленин, — что это уже начинает привлекать внимание. Я еле сдерживаюсь, и женщины, ощущая своеобразный магнетизм, тянутся ко мне, забывая всякие приличия.</p><p class="p">— Это весьма любопытно, — задумчиво сказал Бауман. — Прежде чем мы, однако, приступим к лечению, я должен вас предупреждайт... Вы имеете дело с представителем новейшей венской школы. Я имею честь к ней принадлежайт уже более восьми лет. Основатель нашего направления — профессор Фрейд, широко известный в лучших семействах Европы. Наше учение дает блистательные результаты...</p><p class="p">— Я понял, — быстро сказал Ленин. Упоминание о лучших семействах Европы быстро навело его на мысль, что перед ним опытный и умелый шарлатан, который сейчас примется выколачивать из него деньги, а после пяти ни к чему не ведущих бесед по три рубля каждая пропишет ему брому и оподельдоку. — В настоящее время я не располагаю средствами, но...</p><p class="p">— О, это пустое, — отмахнулся Бауман. — Если случай может меня заинтересовайт, я работаю часто из одного научного интереса. Новейшая венская школа имеет в России богатейший материал... Но я должен вас предупреждайт о другом: в процессе психоаналитического исследования вы можете узнать о себе много таких вещей, которые подействуют на вашу психику значительно тяжелее, чем вы можете представляйт сейчас.</p><p class="p">— Из какой именно области? — заинтересовался Ленин.</p><p class="p">— О, разнообразно... Но в основном из области раннего детства, из времен, когда вы бессознательно желали весьма странного. Если вы готовы со мной совершает путешествие по темным лабиринтам вашего прошлого, я со своей стороны приложу все усилия для выявления первичной травмы.</p><p class="p">— Никакой травмы не было, — поспешно сказал Ленин. — Я рос здоровым, крепким мальтшиком. — По удивительной своей способности немедленно находить общий язык с любым собеседником он иногда бессознательно копировал его манеры: с заикой — заикался, с немцем переходил на немецкий акцент. Впрочем, выговор Баумана был правильный, почти московский, — немца в нем выдавали только глагольные окончания да несколько толстые «ч» и «ш».</p><p class="p">— Это все так говорят, — ласково улыбнулся Бауман. — Утштите, что я требую абсолютной тшестности — без этого не может быть психо-анализирования. Скажите, кто была ваша добрая матушка?</p><p class="p">«В конце концов, чем я рискую? — подумал Ленин. — Он меня никогда не видел и вряд ли еще увидит...»</p><p class="p">— Представления не имею, — сказал он бодро. — Я воспитывался в чужой семье.</p><p class="p">— О, так это уже многое объясняет! Вы никогда не знали своих родителей?</p><p class="p">— Никогда. Моя приемная мать была женщина в высшей степени достойная, но она никогда от меня не скрывала, что я подкидыш.</p><p class="p">— Это хорошо. Я за полную откровенность. Так видите ли, тшто лежит в основе новейшей венской школы: всякий ребенок в детстве желал вступить в половую близость со своей матушкой. Это звучит странно, но разве вы не слышали, как дети предлагают жениться на своих матерях, когда умрет папотшка? Мы предпочитаем называйт это комплекс Эдипа.</p><p class="p">Ленин от души расхохотался.</p><p class="p">— Многие реагируют так, — кивнул Бауман. — Но если вы пройдете со мной весь лабиринт своего бессознательного, вы вспомните и большее. Большинство детей всегда боятся, что отец будет отрезайт им вивимахер, вы понимайте, о чем я...</p><p class="p">— Но почему?! — возмутился Ленин.</p><p class="p">— Потому именно, — увлеченно излагал психоаналитик, — что отец должен подсознательно ревновайт. Вы желаете вступайт в связь с матушкой, но добрый батюшка уже наготове со своим тшик-тшик! Мы называем это отец-кастратор. Кстати, именно в России я получил удивительный материал, — чувствовалось, что внимательный собеседник был в жизни Баумана-Мирбаха редкостью, и он торопился поделиться наблюдениями с благодарным слушателем. — Видите ли вы, в России Родина и Государство — это понятия отшень разные, отшень. Можно даже сказайт, что Родина и Государство совершенно отдельно. В Германии не так, в Австро-Венгрии далеко не так, — в России же между Тзарем и Отечеством как бы заключается мистический брак, и потому у каждого русского есть два родителя — Тзарь и Родина. Русский желал бы любить Родину, но это греховно, противозаконно, так как ее уже любит Тзарь. И всякий русский опасается, что Тзарь кастрирует его за любовь к Родине. Кстати, так оно чаще всего и происходит.</p><p class="p">— О да! — воскликнул Ленин. — Героические борцы... в застенках... и всякое такое.</p><p class="p">— Именно, — кивнул Бауман. — Каждый русский хочет любить, но его останавливайт страх. Исключительное право любить матушку-Родину имеет государственный человек. У русского к матушке отшень, отшень большой Эдип-комплекс. И от этого брака могли бы стать удивительные плоды... Но наготове с чик-чик стоит Государство, и тот, кто сильнее всего любит, получает и самый большой тшик-тшик! — Бауман сладострастно закатил глаза. — Впротшем, те, кто вырос без папотшки, не испытывают столь сильный страх и потому храбрее любят Родину. А ваш случай особенно увлекателен: вы не знали также и мамотшки, а потому все время бессознательно ищете ее вокруг себя. В детстве вы не успели реализовать ваш Эдип-комплекс и ищете мамотшку в каждой женщине. Замечали ли вы... простите такой вопрос... замечали ли вы, что вас особенно привлекают некие тшасти женского тела?</p><p class="p">— Грудь, — ляпнул Ленин первое, что пришло ему в голову. Кстати, он не лукавил. В молодости ему нравились небольшие и упругие, с годами он начал ценить крупные и мягкие.</p><p class="p">— Отлитшно! — воскликнул Бауман-Мирбах. — Видите ли вы теперь сами, что всегда бессознательно тянетесь к материнской груди?</p><p class="p">— Но это совершенно другое! — защищался Ленин. — Младенец жрать хочет, а я вовсе нет...</p><p class="p">— Это тшутки бессознательного, — улыбнулся психоаналитик. — Вы хотите к мамотшке, а потому хватаетесь за грудь, как за спасательный круг в жестоком мире. И пока вы не найдете настоящую мамотшку, вы не успокоитесь и будете желать еще и еще...</p><p class="p">— Где же я ее возьму?! — возмутился Ленин. — Мне что, так и мучаться, пока я не...</p><p class="p">— Может быть, это будет Родина, — поднял палец Бауман. — Русские не зря называют ее не Фатерлянд — земля Отцов, — но Родина-мать, Русь-матушка... Если вы по-настоящему полюбите Родину, вам будет уже не так сильно хотеться другую женщину...</p><p class="p">— Не думаю, — усомнился Ленин. — Но неужели это неукротимое желание — лишь следствие воспитания в приемной семье?</p><p class="p">— Конетшно! Вы и не знаете, какие бывают странные случаи. Я пользую тут одного тшеловека, удивительной души и больших способностей... Он обратился ко мне с жалобой на странные, отшень странные желания. Он долго сдерживался. Этот тшеловек сильный, из тех, которые не жалуются никогда... Но тут он, видимо, испугался себя самого. Он спросил, что будет с ним дальтше. Дело в том, тшто еще ребенком он любил свою сестру... Но она погибла, слутшайно, без его вины. С тех пор он во всех детях видит ее тшерты, отшень любит детей, но особенно — мертвых детей. Вы можете понимайт, как это ужасно?</p><p class="p">Ленин почувствовал некое дуновение в воздухе, вроде тихого шевеления портьер; ничто, конечно, не шелохнулось, — просто игроцкое чутье именно так подсказывало ему, что здесь надо насторожиться. Бауман рассказывал очень странную историю, и она не могла, конечно, иметь к Ленину никакого отношения... а все-таки здесь надо было держать ухо востро, и он подобрался.</p><p class="p">— Вы хотите сказать, — осторожно уточнил он, — что он хочет... делать детей мертвыми?</p><p class="p">— Да, — грустно кивнул Бауман. — И не только детей, а и всех людей он со временем захотшет привести к этому состоянию, ибо оно кажется ему идеальным. Господин Фрейд, — Бауман почтительно кивнул на портрет еврея, — как основатель новейшей венской школы уделяет много внимания случаям некрофильства. Начинается невинно, а кончается всегда полным разрушением личности. Тшеловеку хочется убивать, только убивать. Эта страсть овладевает... она не оставляет... Этот странный, отшень талантливый тшеловек уже приговорен. А все из-за травмы в детстве. Я вынужден был сказайт ему это. Он героитшески выслушал меня. Отшень, отшень сильный тип, он и сам мог быть неплохой психоаналитик... Такой пронзительный взгляд...</p><p class="p">Ленин отчего-то всегда вызывал у собеседников желание выговориться, отлично знал эту свою способность и внимательно слушал каждого встречного — так выговорились перед ним когда-то шушенские золотоискатели, так откровенничали с ним теперь большевики... Он знал, что лишних сведений не бывает — все зачем-нибудь нужно; Бауман-Мир-бах явно говорил о важном. Оставалось понять, как именно все это связано с заданием Дзержинского убить его.</p><p class="p">— И вы сказали пациенту, что надежды нет?</p><p class="p">— Ни малейшей. Я пообещал ему, что, конетшно, никому не сообщу о его скором превращении в убийцу... Если, конетшно, он еще не начал.</p><p class="p">— Интересно, а самого психоаналитика такой клиент убить не может? — осторожно спросил Ленин. — Все-таки вы ему сказали довольно ужасные вещи. Как с этим жить?</p><p class="p">— О, не беспокойтесь, — уютно заколыхался Бауман. — Психоаналитик умеет распознавать опасность... Для всякого пациента он немного Бог, и литшно посягнуть на него для больной психики непосильно. Главное же, тшто этот тшеловек неспособен убивать тех, кто сильнее его. Его некрофилические желания направлены только на малых и слабых — жентщин и в особенности детушек. Я не могу вызывайт у него таких тшуств, меня он только боится.</p><p class="p">— Интересно, — протянул Ленин. — Во тьме ночной пропал пирог мясной... А как он выглядел? На случай, если встретится, — чтобы хоть держаться подальше...</p><p class="p">— Это вратшебная тайна, — строго сказал доктор Бауман. — Но он легко меняет внетшность, сам сказал мне об этом. Так тшто на всякий слутшай держитесь подальше от мужчин, которые любят детей.</p><p class="p">В эту секунду Ленин с небывалой ясностью понял все. Железный, конечно, не ожидал, что Ильич вот так прямо и попрется на прием к Грачу, — ведь если готовится убийство, опасно заранее знакомиться с будущей жертвой... Но Ленин оказался хитрей и поперся — а теперь стал обладателем главной тайны Феликса. В том, что Железный — душевнобольной, если не окончательный маньяк, он почти не сомневался и прежде. Теперь все встало на свои места. Бауман, конечно, не был никаким курьером. Не был он и Грачом — Дзержинский элементарно солгал Лепешкину. Грач возил себе деньги из-за границы и не представлял для Железного никакой опасности, а Бауман влип в переделку единственно потому, что Феликс явился к нему лечиться и ненароком выдал себя. Профессор, сам того не желая, оказался посвящен в главную тайну русского революционного движения. Маньяк во главе революционной партии — лучшего подарка для охранки нельзя было желать. Революция окажется скомпрометирована навеки. Вот почему Феликс приказал убить психоаналитика... пристрелить его своими руками у него попросту не хватает духу. Конечно, Ленин не поверил, что вся любовь Дзержинского к детям проистекает от желания убить их. Эта новейшая венская школа что-то слишком сильно заморочилась на связи любви и смерти. Но что Феликс болен, в том нет сомнения... и что теперь делать?!</p><p class="p">— Разговор с вами, — сказал Ленин, — открыл мне глаза на многое. Сколько с меня за сеанс?</p><p class="p">— Обытшно я беру пять рублей, — застенчиво сказал Бауман. — Это немало, но помощь отшень отшевидна...</p><p class="p">— Я зайду еще, — пообещал Ленин, вынимая ассигнацию. — Чрезвычайно, чрезвычайно познавательно.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">Ленин наведался к Бауману еще три раза. Расход был небольшой, хоть и досадный, — а польза несомненная: он выспросил кое-какие подробности Феликсовой биографии, узнал о его детской травме и недетском опыте, а главное, понял причину его нараставшей нервности. Конечно, скоро Железный перестанет владеть собой... Кроме того, Ильич узнал много интересного об учении Фрейда.</p><p class="p">— Современная наутшная мысль, — объяснял Бауман, — пришла к новому пониманию тайны пола. В основе наших стремлений к чему бы то ни было лежит именно стремление <em>туда. </em>— Он изобразил большим и указательным пальцем левой руки кольцо, а средним пальцем правой решительно устремился <em>туда. </em>Именно с помощью подобных жестов семилетнему Ленину объяснили во дворе тайну пола, но Ленин посмеялся и забыл до лучших времен, а доктор Фрейд, как видим, оказался внимательнее и сделал капиталец.</p><p class="p">— И вы хотите сказать, — не поверил Ленин, — что в основе всего...</p><p class="p">— Именно, — важно кивнул Бауман. — Все в мире проникает и шевелится, проникает и шевелится... Взгляните в окно, — он откинул тяжелую портьеру. — Господин садится в экипаж — это ОН проникает в НЕЕ...</p><p class="p">— А если дама садится в экипаж? — срезал его Ленин.</p><p class="p">— Это все равно, — невозмутимо отвечал Бауман, которого не так-то легко было сбить с новейшего венского учения. — Дама тоже стремится туда, ибо все мы хотим вернуться в утробу, где можно было питаться, не работая. Но у дамы нечем туда проникнуть, поэтому всякая женщина мучительно завидует мужчине. Ведь у мужчины есть ОН!</p><p class="p">— Это очень точно, — задумчиво произнес Ленин. — Я, знаете, и сам наблюдал, что они с тайной завистью поглядывают на... Они как-то хотят его присвоить.</p><p class="p">— Даже откусить, — со значением произнес Бауман.</p><p class="p">— А-а! — догадался Ленин.</p><p class="p">— Ну конетшно, — пожал плечами психоаналитик, словно весь мир давно уже должен был об этом догадаться.</p><p class="p">...Близилось, однако, время решительных действий. Во время четвертого визита Ленин, успевший, по обыкновению, сдружиться с новым человеком, сказал Бауману-Мирбаху со всей откровенностью:</p><p class="p">— Видите ли, Отто. — Он давно уже обращался к психоаналитику по имени, без церемоний. — Я понимаю, конечно, что в России у вас большая практика и увлекательные возможности. Но должен самым серьезным образом попросить вас вернуться в Германию хотя бы на год.</p><p class="p">— Потшему? — изумился Бауман.</p><p class="p">— Потому, — внушительно сказал Ленин, — что ваши эксперименты сделались широко известны. Наше правительство, как вы знаете, ожидает революции и зверствует. Сами же мне тут рассказывали про Тзаря и Отечество. Так вот, их мистический брак в опасности. Тзаря хотят развести с Отечеством. Наверху боятся даже куста, а уж такое опасное учение, как ваше, наделает огромного шума. Мне доподлинно известно, что вас ожидает худшее.</p><p class="p">— Не хотите же вы сказайт, — заерзал Бауман, — тшто они могут меня арестовайт?!</p><p class="p">— И больше того, — сказал Ленин, округляя и без того круглые глаза. — Повесить.</p><p class="p">— Этого не может быть, — сказал толстяк, вжимаясь в кресло.</p><p class="p">— Очень может, — спокойно сказал Ленин. — И знаете ли, кто должен был вас разоблачить?</p><p class="p">— Не имею понятия, у меня обширная клиентура...</p><p class="p">— Я, — скромно сказал Ильич. Бауман взглянул на него с ужасом.</p><p class="p">— Да, да, — сказал Ленин. — Именно ваш покорный слуга. А знаете ли, почему я не смогу этого сделать?</p><p class="p">Толстяк был так потрясен, что утратил всякую сообразительность.</p><p class="p">— Меня спас ваш психоанализ, — с чувством признался Ленин. — Вы прошли вместе со мной по темным лабиринтам моей души. И теперь я обязан сказать вам со всею честностью и прямотой, на какую способен: я давно был агентом охранного отделения, на моей совести не одна загубленная жизнь, но я надеюсь искупить этот грех, спасая истинного ученого. Вы несете миру свет психоанализа, — добавил он с нажимом, отлично понимая, что Бауман-Мирбах любит своего доктора Фрейда и его метод больше всего на свете. — Можете рассказать Фрейду, что его метод сделал тшудо. Когда буду в Европе, я непременно зайду поклониться ему и поцеловать его ручку, если даст. Он вернул России еще одного честного человека. Что до вас, вы должны уезжать немедленно. На сборы у вас есть три дня.</p><p class="p">— Это совершенно невозможно, — пролепетал Бауман.</p><p class="p">— Это не только возможно, но и необходимо. У вас нет другого выхода, иначе случится странное и чудовищное. Вещей много не берите — лучше меньше, да лучше.</p><p class="p">— Мой главный багаж — книги, — сказал доктор.</p><p class="p">— Только главные. Остальное я озабочусь выслать вам почтой. Уезжайте, у нас здесь сейчас одна суетня. Зряшная суетня. Вот случится революция, и вернетесь. А пока — умоляю, скорей. Иначе мое самопожертвование ни к чему, и мир не узнает еще об одном величайшем триумфе психоанализа.</p></span>
