<p class="p1">ГЛАВА 9</p>
</div><p class="subtitle">1917: Февральская революция и апрельские тезисы. Автомобиль как роскошь и средство передвижения. Дзержинский и духи. Ленин и шалаш. Государство и эрос.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">— Ильич, к десерту сыр бри подавать или рокфор? </p><p class="p">— Угу...</p><p class="p">— А ликер — шартрез или лучше кюрасо?</p><p class="p">— На твое усмотрение, рыбка.</p><p class="p">Ленин сладко зевнул, отложил газетку «Neue Züricher Zeitung» — читал, потешаясь, рубрику брачных объявлений, — благодушно улыбнулся жене. Ах, как хороша, комфортна, прекрасна была жизнь в Цюрихе, размеренная, словно швейцарские часы; а какие перспективы впереди открывались!</p><p class="p">От знакомых — как большевизанов, так и приличных людей — он знал, что в Петрограде скверно: хлеба нет, бензина нет, игорные дома закрыты. Все это предсказывал Железный Феликс: Ленин не очень-то верил в его провидческие способности, но вынужден был признать, что пока все идет в соответствии с хитроумным планом. Скоро, скоро — через полгодика, как уверял Феликс Эдмундович, — под Николаем зашатается трон!</p><p class="p">А далее вступал в действие хитроумный план самого Владимира Ильича: эффектно появившись во дворце в тот самый миг, когда деморализованный Ники будет отрекаться от престола в пользу Михаила, Ленин намеревался по всей форме представиться сводным братьям, продемонстрировать родимое пятно для доказательства родства и объяснить им, что шапку Мономаха, волшебное колечко и прочие атрибуты власти было бы разумнее передать ему, поскольку он лично знаком со всеми большевизанскими вожаками и может оказать братишкам неплохую протекцию; в противном случае за их безопасность и покой никто не поручится. А ежели братья заартачатся — уж матушка-то все поймет правильно, умнейшая ведь женщина... Дзержинский же в это время будет ужасно занят своей пролетарской революцией (Ленин был уверен, что вся эта катавасия займет массу времени) и не сможет помешать. Владимир Ильич, конечно, изрядно побаивался реакции Феликса Эдмундовича на известие о том, что в России появился новый, никому не известный император, но надеялся на русский авось — авось пронесет. В конце концов, он же не оставит Железного побираться на улице; как ни тошно, а предоставит ему какое-нибудь теплое местечко...</p><p class="p">Крупская подобрала брошенную газету, пробежала глазами заголовки:</p><p class="p">— Ильич! — вдруг воскликнула она. — Батюшки-светы! Революция!</p><p class="p">— Что?! А, мать-перемать...</p><p class="p">Когда Ленин — руки его тряслись, глаза прыгали со строчки на строчку, — прочел, что в России произошла революция, Михаил отказался от престола и страною уже вовсю рулят какие-то там Львовы да Керенские с Милюковыми, он был ошарашен. Мысли его заметались лихорадочно. «Железная сволочь таки обдурила меня! Еще полгода спокойной жизни обещал! Архинегодяй! Или же... Но если б Железный совершил эту дурацкую революцию — он сам бы и возглавил новую власть... Выходит, его тоже надули? Ну, Львов еще куда ни шло — все-таки князь. Но Керенский, Керенский... Он мне как-то двести рублей продул в канасту... Неужто Сашка Керенский, болтун, лгунишка, пустомеля, бездельник, ничтожный адвокатишка, — тоже Романов?! Иначе как он мог уломать Мишку отказаться от короны?! Нет, это уж чересчур! Я не могу дальше лежать здесь вдали от событий. Может быть, еще можно что-то исправить. Монархия должна быть восстановлена во что бы то ни стало. Да, но как?! Поздно! Или все-таки это козни Железного?! Чорт, чорт, распрочорт: война, просто так в Россию не проехать, англичане не пустят... Ах, как нехорошо!..» И он, так и не доевши десерта и забыв надеть шляпу, помчался к своим немецким приятелям — клянчить бронированный вагон до Петрограда.</p><p class="empty-line"/><p class="p">А меж тем Феликс Эдмундович был изумлен не менее Владимира Ильича. Сперва-то, казалось, все идет как надо, и корона в его руках... 27 февраля в Бутырки приехали на грузовиках члены «Комитета помощи политзаключенным» — в основном экзальтированные девицы, охраняемые гимназистами, — освобождать арестантов... Начальник тюрьмы пытался отказать, но, убежденный телеграммами о произошедших событиях, наконец согласился и предоставил комитету в тюрьме полную свободу действий. Тогда растерялся комитет: как отличить политических от уголовных? Но выход был найден: по предложению одного из членов комитета, знавшего, кто скрыт под номером 217, решили прежде всего освободить этого заключенного, чтобы он распоряжался дальше. Толпа двинулась к «Сахалину»; в коридоре поднялся небывалый шум и девичий визг; когда дверь камеры № 217 отворили, Феликс Эдмундович, спокойный, скромный, невозмутимый, предстал перед своими будущими подданными... Он специально ничего не ел две недели, и теперь девицы и гимназисты были поражены его исхудалым лицом и огромными глазами. Усмехаясь, он продолжил игру:</p><p class="p">— Кто вы? Что случилось? Что вам нужно?</p><p class="p">— Революция, товарищ Дзержинский! Вы — свободны!</p><p class="p">— Благодарю. — Он учтиво наклонил голову, поцеловал руку одной из девиц.</p><p class="p">— Как вы измождены, бедненький!</p><p class="p">— Ерунда. Я счастлив. — И он привычным жестом распахнул на груди серый арестантский халат и прижал ладонь к сердцу, демонстрируя свое счастье.</p><p class="p">— Вы уж нам, пожалуйста, покажите, где кто сидит: политических надо освободить, а уголовники пусть сидят дальше.</p><p class="p">— С удовольствием. — И он сделал это, разумеется, с точностью до наоборот: политических на воле и так было предостаточно, а вот благодарный фальшивомонетчик или вор-медвежатник всегда пригодится.</p><p class="p">Ночь вместе с освобожденными жуликами он провел в Московской Городской Думе, а наутро, еще в арестантском халате, произносил уже первую речь перед народом. («Слушайте! Слушайте! Говорит каторжанин Дзержинский!») Погода была чудесная, солнце сияло... И дальше все было по плану: 2 марта, в 15 часов 3 минуты, Николай подписал отречение от престола в пользу Михаила...</p><p class="empty-line"/><p class="p">...Они встретились еще в 1912-м, накануне женитьбы великого князя Михаила на разведенной Наталье Вулферт: событие, которое, казалось бы, должно было выбить почву из-под ног Феликса Эдмундовича, ибо Михаил терял титул регента и права на корону, — но Дзержинский к тому времени уже отлично понимал, что, когда империя будет рушиться, Николай и все другие думать позабудут об этих тонкостях. Разумеется, встреча не была случайной!</p><p class="p">В те времена Михаил Александрович с будущей женой жили в захолустном Орле и состояли под негласным надзором полиции; им это наскучило, они решили тайком бежать за границу и там обвенчаться. Николай был этому, скорее всего, только рад; но они все ж опасались, что он пустил за ними погоню, и метались по Германии, как зайцы, под именем супругов Брасовых, из одного города в другой; все встречные казались им жандармскими агентами... В Киссенегене они сидели, запершись, в номере гостиницы, пили коньяк и раздумывали, что делать дальше; вдруг к ним постучались. Михаил взял свой «бульдог» и подошел к двери. На пороге стоял высокий, стройный человек в кожаном пальто, в крагах, в шоферских очках...</p><p class="p">— Ваше высочество, — сказал он, — за вами погоня.</p><p class="p">— Вы меня с кем-то путаете. Я — граф Брасов.</p><p class="p">Дзержинский — а человек в кожаном пальто, конечно же, был он — сквозь очки жадно всматривался в стоявшего перед ним великого князя. Странно, но он не чувствовал к этому рано облысевшему, одутловатому, но все же бравому кутиле и вояке той испепеляющей ненависти, смешанной с презрением, как к остальным Романовым. Включенный в магическую формулу Марининого проклятия, Михаил и сам стал частью сказки, и на него ложился волшебный отблеск кольца.</p><p class="p">— Ваше высочество, — тихо, но твердо сказал Дзержинский, — сейчас не время для пререканий. Вас ищут; с минуты на минуту генерал Герасимов и его люди будут здесь. Они заточат вас в Петропавловскую крепость, в железной маске, как несчастного Людовика... А вашу спутницу, — Дзержинский учтиво поклонился в сторону Натальи, — собираются насильно постричь в монахини...</p><p class="p">— Да вы кто такой?</p><p class="p">— Друг, — отвечал Дзержинский. — Скорее же, идемте! Мой автомобиль ждет вас. Я уже обо всем позаботился. Сейчас мы перевалим через Альпы и к утру будем в Вене. Там они вас не достанут — руки коротки.</p><p class="p">— Автомобиль? — обрадовался великий князь. Он больше всего на свете любил автомобили, но коньяк любил тоже и как раз накануне, не вписавшись в крутой вираж, расколотил вдребезги свой великолепный «роллс-ройс». — А какой марки? А мотор — сколько лошадей? А порулить дадите?</p><p class="p">— Как будет угодно Вашему высочеству. — Дзержинский тоже обрадовался: он совсем недавно выучился водить машину, и мастерство его оставляло желать много лучшего.</p><p class="p">И беглецы пустились в путь... Великий князь, отняв у Дзержинского очки и краги, правил «бенцем» так, словно родился за рулем, и не переставая болтал, сокрушаясь о собственной покалеченной машине, а спутники утешали его тем, что немцы — народ порядочный (о войне тогда еще и речи не было), непременно отремонтируют «роллс» и возвратят владельцу, где бы тот ни находился (так и вышло). Часом позже они увидели за собой огни фар: это ехала машина с агентами, но, конечно, не Николая, а Феликса Эдмундовича.</p><p class="p">— Видите? — сказал он. — Это генерал Герасимов. Прибавьте газу, Ваше высочество...</p><p class="p">— Эх, пальнуть бы им по колесам! — сказала графиня Наталья: она была женщиной не робкого десятка.</p><p class="p">Дзержинский искоса взглянул на нее. Прекрасные пепельные волосы, бархатные глаза, жемчужное ожерелье на гордой шее, грациозные движения... Впервые в жизни зрелая женщина заставила что-то слабо шевельнуться в его сердце — прекрасна, как ангел небесный, как демон, коварна и зла... Но он тотчас подавил неуместные эмоции. Он достал револьвер, высунулся из окна, прицелился и выстрелил несколько раз подряд; одна фара погасла.</p><p class="p">— Дайте же пальнуть, чорт вас побери!</p><p class="p">— Прошу вас, графиня. — Он подал ей револьвер. На мгновение руки их встретились.</p><p class="p">— Какая холодная у вас рука, — сказала она. — Кстати, вы нам так и не открылись... А-а, чорт, промазала! Сейчас, сейчас... — Она ловко перезарядила револьвер. — Так кто же вы, таинственный рыцарь плаща и кинжала? Что побуждает вас принимать... Ур-ра, прямо в морду! (Автомобиль с преследователями потерял управление и обрушился в пропасть; Феликс Эдмундович был доволен — не любил оставлять в живых отработанный материал.) ...принимать столь горячее участие в нашей судьбе?</p><p class="p">— Я — бедный польский дворянин. Я не могу сочувствовать императору Николаю — поработителю Польши.</p><p class="p">— Ага, понятно. — Графиня явно была разочарована. «Надо было назваться итальянским разбойником, — подумал Дзержинский, — это б ей больше пришлось по вкусу. Но что со мною?! Она же старуха... Однако эта ручка с револьвером... Я, должно быть, схожу с ума... Ванда, Ванда! Одна ты можешь меня уберечь от наваждения».</p><p class="empty-line"/><p class="p">Светало; они въехали в Вену. Великий князь тепло поблагодарил спасителя и предложил выпить коньяку в неформальной обстановке. Феликс Эдмундович охотно согласился: собственно, весь спектакль с «погоней» он затеял именно ради того, чтобы втереться в доверие и быть приглашенным на приватную беседу. Там, над пропастью, черные глаза вовремя пришли ему на помощь: ведь был миг, когда он уже хотел, пристрелив великого князя, на коленях умолять графиню бежать с ним... Теперь, к счастью, все прошло... почти. Он был рад, что графиня не пожелала долго сидеть с ними и, выпив всего бутылку пива и полбутылки «Наполеона», раззевалась и ушла спать.</p><p class="p">— Чем я могу вас отблагодарить? — спросил великий князь.</p><p class="p">— Если Ваше высочество позволит принять совет от друга...</p><p class="p">— Позволит, позволит. Валяйте, старина. И перестаньте, пожалуйста, называть меня высочеством. Я на все эти мишурные титулы плевать хотел, тем более теперь: ведь я женюсь на Наташе.</p><p class="p">Еще накануне Дзержинский был намерен сделать попытку отговорить великого князя от морганатического брака; но теперь, когда он увидал графиню, то с грустью понял, что все его уговоры будут бесполезными. «Ладно! Никуда Николай не денется: когда я развяжу мировую войну, он простит брата и призовет его к себе». И Феликс Эдмундович, сделав серьезное лицо, сказал:</p><p class="p">— Михаил Александрович, я хочу поговорить с вами о российском престоле.</p><p class="p">— А что о нем говорить? В гробу я его видал.</p><p class="p">— Вам нравится, как ваш брат правит страною?</p><p class="p">— Кому это может нравиться? — усмехнулся великий князь и выпил залпом очередной стакан. — Понятно, не нравится. Ну и что? К чему вы клоните? Я не могу ни наследовать брату — у него есть сын, — ни быть регентом: из-за Наташи.</p><p class="p">— Значит, ежели брат ваш отречется в вашу пользу — вы откажетесь?</p><p class="p">— С чего вы взяли, что он отречется, да еще и в мою пользу?! Ему жена никогда не позволит.</p><p class="p">— А если все же?..</p><p class="p">— Дорогой друг, если мне не нравится правление моего брата, это вовсе не означает, что я хочу совать голову в ту же петлю. Я люблю простую, спокойную жизнь.</p><p class="p">— Князь, вы когда-нибудь слышали о кольце, которое хранится в семье со времен казни Отрепьева? — спросил Дзержинский. Ему всякий раз было невыносимо тяжело называть царя Димитрия этим мерзким именем.</p><p class="p">— Кажется, слыхал что-то... Да, точно! Этакая железная дура с какими-то там дурацкими письменами, я ее даже как-то видел — Алешка с ней игрался... А почему вы о нем спрашиваете?</p><p class="p">И Дзержинский рассказал великому князю о проклятии Марины Мнишек... Рассказ длился почти час; за это время были опустошены еще три коньячных бутылки. (Пил в основном один Михаил: когда он отворачивался, Феликс Эдмундович выплескивал свою порцию в горшок с пальмою.) Дослушав, великий князь почесал в затылке и сказал:</p><p class="p">— Н-да... Так вы думаете, старина, что для спасения России от проклятья мне следует отдать это паршивое кольцо и престол потомку Марины Мнишек?</p><p class="p">— Это решать вам, князь.</p><p class="p">— Угу, угу... — Михаил задумался. — А меня тогда наконец оставят в покое?</p><p class="p">— Разумеется.</p><p class="p">— Ну ладно, пожалуйста. Отдам. Ни чуточки не жалко. Я против поляков ничего особенно не имею. Да ведь он и не совсем поляк — раз он, как вы утверждаете, Рюрикович... И Марина была — шикарный бабец... Только дело за малым: Николай в мою пользу не отречется.</p><p class="p">— Отречется. Я вам это обещаю.</p><p class="p">— Вы раздаете престолы, как Санта-Клаус... Кто вы такой?</p><p class="p">— Я стою выше владык... земных, — ответил Дзержинский. Ему всегда безумно нравились эти слова шевалье д'Эрбле, сказанные Людовику в Бастилии, и он не мог удержаться, чтоб не произнести их, хотя они не совсем подходили к ситуации. Но эффект был смазан. Великий князь не задрожал всем телом и не побледнел, а лишь осведомился равнодушно и без тени почтения:</p><p class="p">— Вы что — масон?</p><p class="p">— Вроде того, — сухо ответил Дзержинский. — Но это не суть важно. Именно я — потомок Марины и Димитрия; я — наследник Иоанна Грозного...</p><p class="p">— Серьезно? — удивился великий князь. — А, пожалуй, чем-то вы смахиваете на него в молодости... Ну так ладно, я готов. Возведите меня на престол, только побыстрей, если можно, потому что мне нужно жениться, и я вам все это хозяйство передам.</p><p class="p">Дзержинский терпеливо объяснил князю — на это ушла еще бутылка, — что «побыстрее» не получится: нужно несколько лет подготавливать почву. (Попутно он на всякий случай подробнее расспросил его о волшебном кольце и теперь знал точно, в какой из комнат Зимнего и в каком шкапчике оно лежит.) Михаил был разочарован, но потом успокоился и сказал покладисто:</p><p class="p">— В семнадцатом так в семнадцатом. Мне в общем-то все равно. А я должен буду официально отречься в вашу пользу или можно как-нибудь в неформальной обстановке?</p><p class="p">— Ваше высочество! — вскричал Дзержинский. — Разумеется, официально! Ведь меня должны будут признать императором... И сперва вы хотя бы с месяц поцарствуете, чтобы к вам привыкли, а потом мы все с вами торжественно оформим.</p><p class="p">— Эх... Ну ладно, ладно. Сделаем, раз уж так надо. Не беспокойтесь, старина.</p><p class="p">— Вы обещаете? </p><p class="p">— Ну! Слово чести. — И отяжелевшая голова великого князя склонилась на руки; он уснул.</p><p class="empty-line"/><p class="p">И вот теперь вдруг — как обухом по голове — Михаил отказался принять корону из рук Николая! И тут же, как мухи, налетели все эти подлые Керенские! А «товарищи» лезут с поздравлениями, спрашивают заискивающе: «Товарищ Дзержинский, вас радует Февраль?», и приходится отвечать: «Февраль меня радует, но не удовлетворяет...» Радует! О господи! «Мишка — негодяй, подлец! — бешено думал Дзержинский. — Psya krev! Русская свинья! Я убью эту сволочь! Все рухнуло! О, Matka Boska, что же делать, что же делать?!»</p><p class="p">...Злую шутку с ним сыграло то обстоятельство, что он переоценил приписываемую русским способность пить без ущерба здоровью и рассудку. Великий князь сидел за столом так ровно, лицо его было так невозмутимо, он не опрокидывал посуды, язык его не заплетался, — из этого Дзержинский сделал вывод, что его собеседник абсолютно вменяем. На самом же деле, проспавшись, великий князь не помнил ни единого слова из состоявшегося разговора. («Кажется, был какой-то поляк... А здоровы пить эти поляки...» И со спокойным сердцем и чистою совестью князь потащил графиню в церковь — венчаться.)</p><p class="p">Однако Феликс Эдмундович был не из тех людей, кто подолгу предается бесплодным сожалениям. Он заперся в одной из своих петроградских конспиративных квартир, улегся на мягкий диван, взял с зеркальца понюшку кокаина на зубочистке и стал думать, как исправить ситуацию. Монархия в России должна быть восстановлена, это ясно. Но как? И стоит ли теперь заново возводить Михаила на престол? Все равно естественный ход событий уже нарушен.</p><p class="p">Комната медленно поворачивалась вокруг него, нежный лед затопил горло. «Умный человек всегда должен двигаться не назад, а вперед. К чорту Романовых. Если уж на то пошло, Михаил все-таки отрекся добровольно, хотя и в пользу непонятно кого и чего, и тем самым формально выполнил условие проклятья Мнишек; местонахождение волшебного кольца известно...» Дзержинский подумал, как бы поступил на его месте Наполеон Бонапарт — один из его кумиров. Ясно было, что Наполеон бы не растерялся. «Да! Нужно силами большевиков осуществить новый государственный переворот, свергнуть Временное правительство, взять волшебное кольцо, почту и телеграф и сразу объявить себя императором. Не до законности уж теперь. Вот Екатерина: ни малейших прав на престол она не имела, а попросту захватила его, и русские все проглотили преспокойненько. Итак — курс на вооруженное восстание!» Через тонкую стеклянную трубочку он втянул ноздрями еще одну щепотку. Ясность мыслей была необыкновенная.</p><p class="p">Гордая радость трепетала в нем; ему захотелось бросить судьбе очередной дерзкий вызов, доказать, что дух его не сломлен... Он нюхнул еще кокаину, запил неразбавленным спиртом, выкурил две папиросы, взял ванну, побрился, наклеил бороду, оделся, положил в карман скальпель и револьвер и вышел из дому. Повсюду шныряли подозрительные личности, и вообще на улицах Петрограда творилось бог знает что: митинги, пьяные матросы, дезертиры на угнанных броневиках, мародеры, шлюхи, «Марсельеза», очереди за хлебом, выстрелы, казаки, красные флаги, разбитые витрины, стащенные с рельс трамвайные вагоны... Вот она — Россия! Мерзость!</p><p class="p">Наконец он принял решение. В трезвом виде он, конечно, не сделал бы того, что сейчас собирался делать, и не из трусости, а просто потому, что это было ребячество. Но белый порошок, мешаясь со спиртом, жег его кровь... С большим трудом он нашел извозчика и велел ехать в Парголово... На пустыре он остановился, озираясь и принюхиваясь; потом нагнулся и собрал в носовой платок горсть земли, перемешанной с пеплом.</p><p class="p">Вернувшись в город, он отпустил извозчика и некоторое время бесцельно бродил по улицам, любуясь чудовищными разрушениями... Потом решительно двинулся прочь. Он был брезглив и не хотел делать это у себя на квартире.</p><p class="p">Путь его лежал на Петроградскую сторону, к одной из самых дальних и глухих улочек; не раз его останавливали налетчики, покушаясь на роскошный черный кожан, но, услыхав секретные воровские словечки, которым он научился от товарищей по Бутыркам, отступали с поклонами, снимая картузы... Ближе к ночи, у низкого, покосившегося домишки он постучал в калитку и вошел... Канарейки в сенях встретили его нескладным пением, на стене мирно, мерно постукивал маятник пузатых часов; а дальше — жарко натопленная, задрапированная черным комната, два стоящих друг против друга высоких, узких зеркала в черных рамах, похожие на гробы, запах амбры, серы и ладана... Хозяин дома — кладбищенский сторож — задал всего лишь один вопрос:</p><p class="p">— Кого прикажете?</p><p class="p">— Уйди, — сказал Дзержинский. — Я сам... — Вот уж пару лет, как он узнал тайные способы обходиться без медиума. Там, в тонком мире, все дороги перекрещиваются в одной точке, в одном луче...</p><p class="p">Он сел к зеркалу, зажег две свечи в медных канделябрах, поставил на подзеркальник. Развернул платок с горстью праха и положил рядом с подсвечниками. Затянулся очередной порцией белого порошка: сердце прыгает в виски, огонь и лед в мгновенном касании, восторг, блаженство, небесный хор ангельских детских голосов... В глубине узкого стекла виделось завораживающее глаз изображение моста с бесконечным рядом горящих свечей. Темный, неясный силуэт метнулся и пропал за краем рамы. Высокое, острое, ровное пламя свечи вздрогнуло и затрепетало так сильно, что, казалось, сейчас слетит с фитиля...</p><p class="p">— Ну, что? — спросил Дзержинский, усмехаясь вызывающе.</p><p class="p">— Фе... Феликс... — захрипел сдавленный голос. Огонь свечи забился, задергался, извиваясь, как сумасшедший.</p><p class="p">— Феликс, Феликс, — быстро и небрежно отозвался Дзержинский. — А что, Григорий Ефимович, скажи-ка: буду ль я царствовать? На Москве, на площади на Лубянской — видишь ли меня? — Он знал, что дух, при всей его ненависти, не может сознательно солгать, отвечая на прямо поставленный вопрос: таковы законы надземного царства.</p><p class="p">— Ну, вижу... — угрюмо отозвался дух. — Вижу... потом не вижу... потом сызнова вижу.</p><p class="p">— Ага!</p><p class="p">— Подумаешь! — Распутин злобно фыркнул. — Дураков у нас мало ли... А Петр-то выше тебя ростом стоит, да и покрасивше — эдакая загогулина...</p><p class="p">— Да пусть себе стоит. — Дзержинский терпеть не мог Петра, но ему не хотелось сейчас вдаваться в дискуссию.</p><p class="p">— А меня зато к лику святых причислят, — похвастался дух.</p><p class="p">Дзержинский хотел сказать «Врешь, скотина!», но вспомнил, что призраки не врут: они могут только перепутать что-нибудь.</p><p class="p">— Когда это тебя к нему причислят, Григорий Ефимович?</p><p class="p">— А вот как всех жидов перевешают и Русью русские люди править будут — они-то разберутся, кто святой, а кто хрен моржовый... Еще будем с тобою, Феликс, рядышком заместо икон у начальничков в кабинетиках висеть.</p><p class="p">— Пошел к чорту!</p><p class="p">— И то, — согласился дух. — Недосуг мне с тобой: лучше навещу свово миленка Протопопова. Скушно ему, поди, в тюрьме-то... А заодно сволочь Пуришкевича попугаю малость... </p><p class="p">Призрак исчез, но чье-то присутствие в черной комнате по-прежнему ощущалось, оно даже стало еще сильней... Язык свечи взвился, вытянулся высокой и узкой стрелой и вновь затрепетал быстро-быстро. Сердце Дзержинского забилось в предвкушении небывалого, баснословного восторга.</p><p class="p">— Это ты... — прошептал он. Пламя металось как живое. — Это ты...</p><p class="p">Огонь качнулся из стороны в сторону. Теперь он подергивался совсем слабо.</p><p class="p">— Ванда, Ванда! Скажи, что это ты! Скажи, что любишь меня!</p><p class="p">Но внезапно отворилась с хлопаньем форточка; застонали деревья за окном; порыв острого февральского ветра задул свечу... Проклятье! Они опять украли ее! «Так ладно же! Революции захотели — будет вам революция! Никому мало не покажется!» — и он оглушительно чихнул: кокаин делал свое дело.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">— Честь имею, — сказал Ленин и сдержанно поклонился. — Неужели так-таки из самого Генштаба?</p><p class="p">Офицер напротив — напыщенный, сорокапятилетний, полный самоуважения — снисходительно кивнул.</p><p class="p">— Никогда не выпивал с германским офицерством, — честно признался Ленин.</p><p class="p">— Германское офицерство редко выпивает, — солидно поддакнул его визави. Это был плотный, тугой и твердый на вид, темнолицый мужчина с выражением непреклонной решимости на широкой усатой роже и с гладко выбритой, идеально круглой головой. — Мы блюдем тевтонские, рыцарские традиции. Но сегодня у нас праздник.</p><p class="p">— Что изволите праздновать?</p><p class="p">— Распад Антанты, — коротко сказал бритый. — После русской революции союзники не устоят и дня.</p><p class="p">Они сидели в небольшой пивнушке «Воскресная утеха». Ленин пил светлое пиво, а сосед — темное, но закусывали оба прославленной местной рулькой.</p><p class="p">— Почему вы думаете? — обиженно спросил Ленин. — После революции Россия может утроить свои силы... Знаете, почему там плохо воевали? Вы уж мне поверьте, я русский революционер и очень хорошо все про это понимаю.</p><p class="p">Визави глянул на него с острым любопытством.</p><p class="p">— Революционер? Вы здесь в эмиграции?</p><p class="p">— Ну а то. У нас вся жизнь так, вдали от Родины. Влачил, так сказать, жалкое существование, а душа вся там, изболелась за родные осины.</p><p class="p">— Я тоже очень скучаю по Родине, — с достоинством признался немец.</p><p class="p">— Тоже в эмиграции тут? — посочувствовал Ленин.</p><p class="p">— Нет, — оскорбился офицер. — Я здесь занимаюсь закупками продовольствия. Немецкий офицер не эмигрирует, nein! Немецкий офицер может покончить с собой, если его не устраивает приказ... или если он больше не нужен своему командованию... Но в Германии революция невозможна, нет. Только в русском свинарнике. Полагаю, если вы революционер, то и сами должны понимать, какой это свинарник.</p><p class="p">— Это положим! — запальчиво возразил Ленин. Пиво действовало на него стремительно. — Революция везде может быть, и это вы не зарекайтесь. Это мы еще очень-очень будем посмотреть, варум нихт? Я революционер, конечно, но я патриот. Да! Когда мы придем к власти, Германия будет драпать из России так, что никакой Антанты не понадобится!</p><p class="p">Германский штабист усмехнулся снисходительней прежнего. Ему стало стыдно спорить с недочеловеком.</p><p class="p">— За кружкой пива все русские очень храбрые, — вежливо сказал он.</p><p class="p">— Вы не верите в русскую храбрость?! — возмутился Ленин. — Да русские, если хотите знать, потому только и воевали так... посредственно, что солдата не уважают, что офицерство, наученное на ваших же германских приемчиках, не умеет командовать, а знает одну муштру! Русский солдат, когда над ним нет начальства, способен на чудеса!</p><p class="p">— То-то ваши чудо-храбрецы уже побежали со всех фронтов, — усмехнулся немец.</p><p class="p">— А ваши не побежали? У вас, наоборот, все рвутся в окопы? Когда мы придем к власти, мы будем до победного конца... до победного!</p><p class="p">— Извините мое замечание, — сказал немец, наклоняясь к Ленину и обдавая его запахом рульки. — Мы в Швейцарии, это нейтральная страна, и я не хотел бы играть на межнациональных разногласиях и тем более обижать революционера. Но я не всегда занимался продовольствием, я бывал и на фронтах... и позвольте честно вам сказать, что бездарнее русского солдата и офицера я не видывал еще никого.</p><p class="p">Он откинулся на стуле и расхохотался. Ленин ненавидел этого человека.</p><p class="p">— Стало быть, вы считаете русских недоумками?</p><p class="p">— Я вообще считаю русских неполноценной нацией, — почти ласково сказал мерзавец-штабист. — Русские не имеют принципов. Русские не знали института рыцарства. Русские мужчины и русские женщины почти ничем не отличаются друг от друга. Русская армия — пфуй, нуль. Я горячо сочувствую русским революционерам: у них получится разрушение России, и это дело прекрасное, давно назревшее. Но выстроить на этом месте что-то новое они не смогут, нихтц! Русская революция завершит то, что начали наши доблестные солдаты.</p><p class="p">— Вы говорите, — спокойно спросил Ленин, — что русские бездарны как нация?</p><p class="p">— Я именно это и говорю, — радостно подтвердил немец.</p><p class="p">— Не угодно ли вам попробовать одну русскую национальную забаву? — осторожно начал Ленин. — У нас в это умеют играть даже дети. Посмотрим, что нам сейчас покажет офицер германского генштаба, лучшего из генштабов! Видите вы эти три наперстка?</p><p class="p">— Вижу, — признался немец. — И что?</p><p class="p">— Шарик видите?</p><p class="p">— Конечно. У меня хорошее зрение.</p><p class="p">— Раз хорошее, сумеете угадать, под каким наперстком я спрячу шарик?</p><p class="p">— Что тут угадывать, — пожал плечами немец.</p><p class="p">— Ничего, конечно, ничего... сущий пустяк... Ну-с, кручу-верчу, обмануть хочу... — Руки Ленина замелькали с необыкновенной скоростью. — Где шарик?</p><p class="p">— Вот, — немецкий толстый палец уверенно ткнул в центральный наперсток.</p><p class="p">— Посмотрим, посмотрим... Ах ты, какая досада! Ошибся сверхчеловек, а? Повторить не желаете?</p><p class="p">— Желаю, — засопел немец.</p><p class="p">— Только уж за деньги. Извините, но мы, русские, без денег не играем.</p><p class="p">— Мы, немцы, тоже не играем без денег, — обиделся штабист.</p><p class="p">— Так уговор: если не отгадаете — десять марок. Идет?</p><p class="p">— Идет. — Немец впился глазами в короткопалые, пухлые ленинские ручки.</p><p class="p">— Кручу-верчу, обмануть хочу... Ну, где?</p><p class="p">— Что это вы там шепчете? — подозрительно нахмурился немец.</p><p class="p">— Русское заклинание. Внимания не обращайте, ваши успехи не от заклинания зависят. Где шарик?</p><p class="p">— Вот, — твердо сказал офицер. Как все офицеры, в особенности штабные, он был человек упрямый и последовательный.</p><p class="p">— Вот и нет. Десять марок позвольте. Еще не угодно ли?</p><p class="p">Штабисту жаль было десяти марок. Рулька стоила двадцать.</p><p class="p">— Угодно, — брякнул он.</p><p class="empty-line"/><p class="p">— Ну, будет, — сказал Ленин через час, отдуваясь и вытирая пот со лба. — Поняли ли вы, герр Штромель, что русские народные забавы не так просты, как кажется немецкому офицерству?</p><p class="p">— Нет, еще, — пыхтел немец. — Я разгадаю, я должен... Вы врете, что это умеют мальчишки. Вы фокусник!</p><p class="p">— Я же вам и с засученными рукавами показывал! — возмутился Ленин. — Какой фокусник так может? Это просто вы не наблюдательны, потому что самонадеянны.</p><p class="p">— Вы не можете так уйти! — крикнул Штромель. — Я требую еще!</p><p class="p">— Последний раз, — сказал Ленин. — Вы и так мне передали почти тысячу марок, это по военному времени немалые средства.</p><p class="p">— Я свободно располагаю средствами, герр Ленин! — возмутился Штромель (в процессе игры они друг другу представились, и Штромель даже поинтересовался у Ленина, не еврей ли он, — на что Ленин ответил, что нет, а если бы и был евреем, то считал бы это за честь; Штромель криво усмехнулся и сказал, что честь сомнительная и даже русским быть лучше). </p><p class="p">— Я готов сейчас сыграть на всю эту сумму!</p><p class="p">— Готовы? — спросил Ленин, лукаво блеснув карими глазками. — Смотрите, герр Штромель, у нас, русских, слов назад не берут и долги платят вовремя!</p><p class="p">— Вы на что намекаете?! — взревел штабист.</p><p class="p">— Ни на что, — мягко сказал Ленин, — я просто имею честь вам объяснить правила игры!</p><p class="p">— На все! — заорал Штромель. Ручки Ленина стремительно заметались по столу.</p><p class="p">— Ну, где?</p><p class="p">Штромель тяжело задумался.</p><p class="p">— Здесь, — решился он наконец.</p><p class="p">— Посмотрим, — пожал плечами Ленин. — Ах ты, обида какая... — Он с садической медлительностью приподнимал наперсток. — Ну... ну... ну?! Алле-оп! — и он с торжествующей улыбкой показал офицеру абсолютно пустую поверхность стола.</p><p class="p">Некоторое время Штромель потрясенно молчал.</p><p class="p">— Я должен осмотреть ваши... приспособления, — сказал он наконец. — Вы сами понимаете, что речь идет о сумме серьезной...</p><p class="p">— Так я предупреждал! — воскликнул Ленин. — Или вы скажете, что я силой у вас выманил эти средства?</p><p class="p">— Я ничего не отрицаю, — тихо сказал Штромель. — Я требую только показать мне наперстки.</p><p class="p">— Да ради бога, — согласился Ленин. — Только отдайте потом. Мы, русские, всегда отдаем чужое...</p><p class="p">— Герр Ленин! — заревел офицер. — Ваш выигрыш... (Он хотел сказать «сомнительный выигрыш», но остерегся — у русских революционеров были странные, радикальные представления о чести, они могли и на дуэль вызвать.) — Ваш выигрыш не дает еще вам права делать неприличные намеки!</p><p class="p">«Ишь его разобрало, — удовлетворенно подумал Ленин. — Жалко марок-то. Надо было на франки играть, хотя и так, прямо скажем, недурно...»</p><p class="p">Он протянул Штромелю шарик и три серебряных наперстка. Офицер долго нюхал их на предмет тайного клея, проверял на магнитные свойства (вдруг в шарике железные опилки, и наперсток притягивает его), искал в наперстках второе дно, попросил Ленина показать руки и с досадой подумал, что эти пухлые ручонки, наверняка совершенно бесполезные в бою, только что вытащили из него почти все его месячное содержание; ненависть его к русским возросла до небывалых пределов, и на фронте он сейчас, вероятно, сотворил бы чудеса, — но рыцарь-тевтонец обязан платить долги.</p><p class="p">— Вы мне еще заплатите, — прошипел он, доставая банкноты. — Так заплатите!</p><p class="p">— Настоящий мужчина легко расстается с деньгами, — пошутил Ленин. — Нету в вас этой французской легкости...</p><p class="p">— Французы — еще одна неполноценная нация! — рявкнул Штромель.</p><p class="p">— Да, да, конечно. Может, вы и им в брик-а-брак проигрывали?</p><p class="p">— Герр Ленин! Еще слово, и я вас вызову!</p><p class="p">— Полно, полно. — Ленин терпеть не мог дуэли, с него вполне хватило эксперимента в Лонжюмо. — Я вам еще пивка поставлю — у нас, русских, принято, чтобы выигравший ставил проигравшему...</p><p class="p">«Этим ты не отделаешься», — подумал Штромель, но пиво принял.</p><p class="p">Ленин ушел, унося две тысячи немецких марок, а офицер германского генштаба выпил еще литр пива и окончательно разъярился.</p><p class="p">— Кто он такой! — вслух буянил немец. — Неполноценная нация! У меня, офицера германского генштаба! Тевтонского рыцаря!</p><p class="p">— Герр чем-то недоволен? — спросил его кельнер с мягким цюрихским акцентом. Нейтралитет совершенно разложил эту страну — даже немецкая, лучшая ее часть отличалась непозволительной, бабьей деликатностью. Штромель (прибывший в Цюрих, разумеется, с куда более деликатной миссией, нежели закупка провианта) ненавидел Швейцарию за подчеркнутый нейтралитет. Это было предательство рыцарского духа, ибо воинственность есть главная добродетель германца. Нейтральных рыцарей не бывает.</p><p class="p">— Русский революционер только что получил от меня две тысячи марок! — орал он. — От меня, офицера германского генштаба!</p><p class="p">Кельнер отлично знал этот тип редко напивающихся служак. В их опьянении есть одна чрезвычайно опасная стадия — точнее говоря, доза: между двумя и тремя литрами пива или первой и второй бутылками шнапса. В Швейцарии даже в военное время не было ограничений на продажу спиртного, тогда как в воюющей Германии люди давно отвыкли от солидных доз; стремясь нейтрализовать посетителя, он поспешно принес ему новую кружку пива. Скандалящий немец не сделал бы чести заведению.</p><p class="p">— Вы видели этого господина? — спросил немец кельнера. — Этот плотный, картавый!</p><p class="p">— Да, видел. Вы казались дружески беседующими, потом он показывал вам фокусы.</p><p class="p">— Фокусы! Он оскорблял немецкий дух чертовой русской азартной игрой. Он гипнотизировал меня. Он украл у меня две тысячи марок!</p><p class="p">— Это серьезная сумма, герр офицер, — поклонился кельнер. — Если угодно, я вызову полицию.</p><p class="p">— Да, да! Немедленно полицию! Чортов русский революционер, он, может быть, опасен для швейцарского строя...</p><p class="p">Кельнер прекрасно знал русского революционера Ленина и понимал, что если кто и опасен для швейцарского строя, то уж никак не этот круглый человечек с патологической страстью к болтовне и мелкому надувательству. Ленин часто бывал в «Воскресной утехе» и никогда не буянил, потому что от выпитого только добрел. Обращаться в полицию, разумеется, он не собирался, да и офицер при слове «полиция» насторожился. Миссия его была слишком деликатна, чтобы светиться в участке. В нейтральной Швейцарии он принимал донесения своего французского агента.</p><p class="p">— Не надо в полицию, — сказал он, отдуваясь. — Будет немецкий офицер беспокоиться из-за каких-то двух тысяч марок... Меня раздражает сама наглость этих русских!</p><p class="p">— Вы совершенно правы, герр офицер, — сказал кельнер. Вечером он, смеясь, рассказал эту историю жене, жена — подруге (в Швейцарии терпеть не могли немецких офицеров), а через неделю уже весь Цюрих знал, что Ленин взял у германского генштаба очень много денег — должно быть, на революцию в России. Да он и сам не делал из этого тайны — таких удачных выигрышей в его швейцарской жизни было немного.</p><p class="p">Штромель, однако, был памятлив. Ленин наверняка пересмотрел бы свое отношение к цюрихскому выигрышу, если бы знал, что через год из-за этих двух тысяч немецких марок придется отдать почти всю Украину.</p><p class="empty-line"/><p class="subtitle">3</p><p class="p">С проездом до Петрограда в конце концов устроилось как нельзя лучше: за небольшую взятку Ленин купил у своего приятеля Платтена вагон — немного подержанный, но в отличном состоянии. Дорога была веселой: от желающих на халяву проехаться в первом классе с экскурсией по Германии, Швеции и Финляндии отбою не было. И настроение у Владимира Ильича опять было превосходнейшее: он свято верил в свой авось и дурачился напропалую.</p><p class="p">— Эх, — говорил он, сладострастно жмурясь и потягиваясь, как рыжий кот на печи. — Первейшим делом, батенька, к Сомонову. На третью линию. Не бывали? Очень напрасно. Шикарнейшее место. Господи, это сколько же я не был у Сомонова? Пять лет, чорт меня побери совсем! Сначала, само собой, анисовой. Мрр! Но где одна, там и две — разве не так?</p><p class="p">Богданов сглотнул и отвернулся к окну. Ленин был сильным оратором — возможно, лучшим в партии. Правда, настоящее вдохновение посещало его только во время разговоров о выпивке, закуске и женщинах, а потому к публичным выступлениям его старались не допускать — разве что уж очень нужно было зажечь толпу. Старик чертовски аппетитно рассказывал о простых радостях. Богданов ничего не ел вторые сутки. Большевистская верхушка издержалась, готовясь к возвращению. В Питере, правда, товарищи готовили встречу, но у партии почти не было средств — вся надежда, что Ильич исхитрится. До города оставалось верст сорок. Под чахлыми чухонскими елями смутно белели островки талого снега. Весна семнадцатого была холодна. Чтобы отвлечься от голода и тревоги, Богданов стал считать столбы. Он загадал, что если до ближайшего полустанка их будет четное число, то они доедут благополучно.</p><p class="p">— Хороша из белорыбицы, — невозмутимо продолжал Ленин, — но также и карп — вполне, вполне достойно. Засим, как вы понимаете, третья. Что до второго блюда, то у Сомонова дивно запекали цыплят. В сметане, и с какой-то особенной травкой. А какой там вечером кордебалет! Пятнадцать девочек, одна другой краше, танец эдакий замысловатый — шаг вперед, два шага назад...</p><p class="p">Инесса покраснела и потупилась. Надежда Константиновна резко встала и вышла из купе.</p><p class="p">— Ну что это она? — искренне огорчился Ленин. — Как подменили в последнее время, честное слово...</p><p class="p">— Володя, но пойми: она жена тебе...</p><p class="p">— Какая жена! — вспылил Ленин. — Сколько раз я говорил тебе: Надежда — партнер! Я не затем ее вывез из Шушенского, чтобы она теперь делала сцены... Теперь с этим свободно, в Питере разведусь немедленно. И поженимся. А, Инесса?</p><p class="p">— Посмотрим, — сдержанно ответила она.</p><p class="p">— Ну ладно. — Владимир Ильич не умел долго злиться. — Александр Александрович, может быть, в картишки? Скоротать время до приезда? Я думаю, через час уж будем на Финляндском...</p><p class="p">— Что-то не хочется, — кисло сказал Богданов. Он слишком хорошо помнил, как позавчера, при проезде через Стокгольм, последовательно проиграл Ленину шляпу, черепаховый гребень и часы.</p><p class="p">— А вы не нервничайте, не нервничайте! Революционер не имеет права нервничать, когда играет в покер! Знаете ли что? Я вам этого еще не показывал!</p><p class="p">Жестом фокусника он извлек из кармана три серебряных наперстка.</p><p class="p">— Что это? — не понял Богданов.</p><p class="p">— Ключи счастья, — радостно сказал Ленин. — Знаете роман такой — «Ключи счастья»? Так вот, они самые и есть. Если б не они, не видать бы нам вспомоществования от генштаба, как своей поясницы. Не угодно ли? Кстати, как думаете, наши-то в Питере при деньгах? — спрашивал Ленин, явно пытаясь отвлечь приятеля от наблюдений за манипуляциями.</p><p class="p">— Не знаю, — сухо отвечал Богданов. — Думаю, там сейчас неразбериха почище, чем в пятом.</p><p class="p">— Эге, эге... Гм-гм... Ну-с, на то и мутная вода, чтобы умные люди ловили скромный гешефт...</p><p class="p">Через полчаса Богданов был должен Ленину уже двадцать франков сверх своих наличных пятнадцати. Ильич заботливо хлопал его по плечу:</p><p class="p">— Ничего, ничего, батенька! Мне из Питера телеграфировали, что готовят встречу. Как думаете, что устроят? Я думаю, расстараются. Можно не к Сомонову, можно сразу в «Вену». Вы для закуски что предпочитаете?</p><p class="p">— Да с чего вы взяли, что они готовят закуску?! — Настроение у Богданова испортилось окончательно. — Революция, до банкетов ли там!</p><p class="p">— Ну а кто приближал-то? — хихикал Ленин. — Пять лет в изгнании! Мы жертва кровавого режима или кто? Каторжане возвращаются, солдатики с фронта бегут... Да мы, по-хорошему, должны на белом коне в Питер въехать! Пари, что Железный Феликс уже в городе. Чорт, живот подвело... Интересно, они знают, в каком мы бедственном положении? Если прямо сей же час, на перроне, не будет хотя бы рюмки да хлеб-соли... Еще, знаете, малосольный огурец: сначала хруст, потом и-зу-мительное ощущение...</p><p class="p">— Да прекратите же, Владимир Ильич! — взмолился Богданов.</p><p class="p">— Ничего, ничего! Скоро уж, — Ленин достал знаменитые часы-луковицу. — Ну, если они там приготовили не то, что я люблю... к чорту бросаю весь этот большевизм и иду во Временное правительство! Министром экономики, а? Как вы думаете? Обедать буду у Грешникова. Каждый день. Скачала гусиную печенку с луком...</p><p class="p">Богданов вскочил и выбежал из купе. Вслед ему несся заливистый ленинский хохоток. Так смеяться мог только честный человек.</p><p class="p">«А интересно все-таки, что они готовят», — думал он, нервно куря в тамбуре.</p><p class="empty-line"/><p class="p">К сожалению, они готовили совсем не то, чего хотелось Ленину, и даже не то, о чем мечтал более скромный Богданов. Площадь перед Финляндским была запружена народом. Рабочий патруль не пускал на платформу восторженных депутатов от балтийских матросов. Они никогда не видели Ленина, но слухи о его грандиозных предприятиях будоражили Петроград все пять лет его отсутствия.</p><p class="p">— Ильич — самый из них наш! — говаривали флотские агитаторы.</p><p class="p">— Сурьезный мужик, — кивали усатые балтийцы. — Ентот за словом в карман не полезет...</p><p class="p">Поезд замедлил ход, скрежетнул и встал. Высокий человек в шинели, бледный, с узкой бородкой и непреклонным выражением испитого лица, прошагал прямо к шестому вагону.</p><p class="p">— Эдмундович! — радостно крикнул Ленин, выглядывая в окно. Вся его давняя неприязнь к Железному испарилась — он и вообще был отходчив, да вдобавок с последней встречи прошло слишком много времени. Как знать, вдруг революция смягчила и это стальное сердце?</p><p class="p">— Рад, рад, — сдержанно говорил Дзержинский, пожимая руку Ленину. — Отлично выглядите.</p><p class="p">— Какое отлично, батенька! Третьи сутки не жрамши. Женщины в обморок падают. Один чай да гнусные скандинавские сушки. Пойдемте же скорей, я вне себя от нетерпения!</p><p class="p">— Ждут, ждут, — скупо улыбаясь, кивал Феликс Эдмундович.</p><p class="p">— Где? У Сомонова? Пари, что у Сомонова!</p><p class="p">— Прямо на площади.</p><p class="p">— Что, столы накрыты? Я говорил вам! — Ленин Пихнул Богданова в плечо. Тот кисло улыбнулся. Из вагона, пошатываясь от усталости, выходили бледные большевики. Зиновьев с жадностью вдыхал родной, влажный питерский воздух. Инесса вытирала глаза.</p><p class="p">В следующую секунду Ленин остолбенел. Вместо накрытых столов на площади бушевала ликующая толпа. В воздух взлетали бескозырки.</p><p class="p">— Это что такое? — спросил он с недобрым предчувствием.</p><p class="p">— Готовились, товарищ Ленин! — радостно доложил круглолицый усач лет двадцати пяти, суетившийся вокруг Феликса Эдмундовича. — Я же вам телеграфировал, что готовимся!</p><p class="p">— Митинг, — доложил Дзержинский. — Надо будет сказать.</p><p class="p">— Кому? Мне?! С какой стати! Ищите какого-нибудь теоретика! Я жрать хочу!</p><p class="p">— Товарищ Ленин, — мягко, но с нажимом поддержал Феликса Эдмундовича представитель Балтфлота. — Братишки ждут.</p><p class="p">— Это вы так готовились? — с горечью произнес Ленин. — Это так вы встречаете душу партии? К чертям собачьим! Я к Керенскому уйду!</p><p class="p">Но морячки уже подсаживали его на странную железную машину, стоявшую в центре площади. Ленин никогда не видел таких машин. Вероятно, это был танк — он читал, что англичане применяли их на фронте.</p><p class="p">— К чорту, к чорту! — отбивался он. — Я не готовился! Я не ел три дня!</p><p class="p">— Просим, просим! — визжали хорошенькие курсистки, обступившие машину. На площади, помимо матросов и солдат, толпилось полно случайных людей, обрадовавшихся очередному митингу: в Питере теперь митинговали каждый день и по любому поводу.</p><p class="p">— Это кто — Ленин? — спрашивала молодая женщина декадентского вида у пожилого бритого господина с лицом вальяжного адвоката. — Какой миленький...</p><p class="p">— Да пустите вы, чорт! — злился Ленин. — Вот пристали, дураки...</p><p class="p">Но толпа уже встречала его громовым ревом. В лицо ему ударил прожектор. Ленин оглядел толпу и провел рукой по лбу. Он решил положиться на свою удачу. В конце концов, говорить с простым народом из всех большевиков умел он один.</p><p class="p">— Ильич! Ильич наш! — басом ревел огромный матрос, знавший о Ленине только то, что он за простой народ. — Режь, Ильич! Жарь! По-нашему, по-простому!</p><p class="p">— Товарищи! — картаво крикнул Ленин, и площадь замерла. — Товарищи! Все мы любим пиво!</p><p class="p">После трехсекундного молчания площадь ответила ему такой овацией, какой не слыхивал и Керенский в свои лучшие дни. Ленин переждал вопль народного восторга и энергически махнул пухлой ручкой.</p><p class="p">— А после пива хорошо и беленькой! — рявкнул он. — Холодненькой, товарищи! Я подчеркиваю, анисовой! В за-по-тев-шей рюмочке! После чего немедленно огурец!</p><p class="p">— Точно! Жарь! Язви их в самую душу! — орали солдаты. Тем, что сзади, ничего не было слышно, и они поддерживали Ленина кто во что горазд: «Долой Керенского!», «Обобществление баб!», «Попили нашей кровушки!»</p><p class="p">— А икра? — как бы самого себя спросил Ленин. — Икра в хрустальной розетке! Ростбиф, умеренно прожаренный! Тут же вторую, и сейчас же требуйте уху. Требуйте ка-те-го-рически!</p><p class="p">— Уху! Уху! — вопила площадь. Те, что сзади, опять не дослышали и решили, что Ленин призывает показать Керенскому ху-ху, и начали от энтузиазма постреливать в воздух. Ильич почувствовал себя в своей стихии. Он купался в народной любви.</p><p class="p">— Ну-с, а после первого блюда лично я люблю поросенка с гречневой кашей! С хрустящей корочкой, товарищи! Режешь, а жир течет, течет...</p><p class="p">— Режь жирных! — стонал от наслаждения огромный матрос. Его трубный бас покрывал все прочие звуки.</p><p class="p">— Что он несет? — спросил Дзержинский, склонясь к уху Кржижановского.</p><p class="p">— Чорт его знает. Народу нравится, — пожал плечами Глеб Максимилианович.</p></span>
