<span><p class="p">Мирный договор, в соответствии с которым Германия аннексировала Польшу, разумеется, был Дзержинскому неприятен; но он был разумным человеком и, как и все главные большевики, понимал, что воевать дальше с Германией невозможно, поскольку все солдаты и матросы были заняты другими делами. В конце концов, Польша в течение последних двухсот лет все время была кем-нибудь порабощена, и Феликс Эдмундович полагал, что она сможет еще немного подождать, хотя сердце его и обливалось при этой мысли кровью. Если бы Дзержинский знал, что неуступчивость Германии на переговорах напрямую связана с личной обидой руководителя немецкой делегации Штромеля на руководителя советского государства Ленина, — он быстро сместил бы Ленина и смягчил противника! Но Штромель слишком хорошо помнил тот вечер в Цюрихе и не желал уступать ни пяди. Ленин знал, что просьбы бесполезны, а потому требовал соглашаться на все. ЦК привыкло его слушаться и махнуло рукой. Тягчайший, унизительнейший мир был подписан.</p><p class="p">Но у Брестского мира было еще одно дурное последствие: немцы посадили в Москве своего посла, и послом этим оказался не кто иной, как Бауман-Мирбах, старый недруг Феликса Эдмундовича! Поистине от немцев исходили одни пакости и неприятности.</p><p class="p">Мирбаха, естественно, нужно было убирать. Он знал многое. Исчезновение его должно было пройти тихо, не вызвав ни малейших подозрений: лист, как известно, прячут в лесу, а труп — под горами трупов, и оставалось лишь решить, из чьих тел соорудить эту гору... Да, нужна была тонкая игра. И в эту игру Дзержинский решил сыграть со своими старыми друзьями эсерами, только уже не правыми, к которым принадлежал Савинков, а левыми. Эти левые эсеры, в отличие от правых, были люди умеренные, добропорядочные и кроткие: они не готовили террористических актов, не организовывали заговоров, а только выступали на съездах и писали вежливые статьи в газеты, где ругали большевиков, осуждали Брестский мир и будоражили крестьянство. «Действительно какие-то левые», — недоумевал Зиновьев.</p><p class="p">Но если они не устраивали заговора — это вовсе не означало, что их заговор нельзя разоблачить. Нужно было всего лишь организовать и возглавить его, а потом свалить на этих безответных эсеров убийство Мирбаха и заодно преподнести советской власти на блюдечке с голубой каемочкой еще один разоблаченный мятеж, что позволило бы Дзержинскому требовать для себя новых неограниченных полномочий. И Феликс Эдмундович начал действовать: он тайно повстречался с разными левоэсеровскими деятелями и, пользуясь старой дружбой, внушил им мысль о необходимости составить заговор для свержения большевиков. Он дал им в помощь целый летучий отряд ВЧК, вооруженный до зубов.</p><p class="p">Доверчивые эсеры согласились. Они только очень долго не могли взять в толк, почему для свержения большевиков нужно убить не Ленина, к примеру, а немецкого посла Мирбаха.</p><p class="p">— Как же вы не понимаете? — ласково втолковывал им Дзержинский. — Убийство посла повлечет за собой немедленное возобновление войны с немцами. А во время войны гораздо легче совершить переворот. Прецедент уже существует.</p><p class="p">Наконец эсеры поняли и согласились ликвидировать Мирбаха. Феликс Эдмундович вздохнул спокойно: далее все должно было идти как по маслу. Эсеры убивают Мирбаха, Дзержинский с триумфом арестовывает эсеров. Это была простейшая двухходовая комбинация — даже скучно объяснять. Дзержинский от нечего делать оттачивал ее до блеска: запустил в немецкое посольство слух о том, что со стороны эсеров готовится покушение на Мирбаха, а также на Ленина и Дзержинского. Это должно было убедить всех — и немцев, и русских — в том, что заговор реально существует. Озабоченные немцы через заместителя наркоминдела Барахана жаловались ВЧК, что в их распоряжении имеются данные о готовящемся покушении на графа Мирбаха. Расследование этих сведений вел, разумеется, лично Дзержинский. Но они не выводили на след, и Дзержинский отвечал посольству, что кто-то, вероятно, умышленно дает им ложные сведения, не то шантажируя, не то из каких-то иных, более сложных соображений. В общем, все шло как задумано.</p><p class="p">Но все, все внезапно перевернулось с ног на голову, когда Феликсу Эдмундовичу пришлось повидаться с одним из эсеровских главарей, с которым он первоначально общаться не желал по одной простой причине: это была женщина, а женщину в политике Феликс Эдмундович, как любой нормальный мужчина, полагал недоразумением. Однако эсеры отказывались договариваться с Дзержинским окончательно, пока он не переговорит лично с их королевой — Марией Спиридоновой...</p><p class="p">Он встречал Спиридонову в 1905-м: это была самая обыкновенная двадцатилетняя брюнетка, на которую он не обращал никакого внимания, потому что такие старые девушки его не интересовали. А вскоре Спиридонова по заданию Тамбовского комитета эсеров совершила террористический акт — убийство жандарма Луженовского, усмирителя крестьянских волнений. Как и все революционеры, Дзержинский, конечно, знал о том, что в полицейском участке Спиридонову раздели донага и в течение нескольких суток проделывали с нею все, на что способна мужская фантазия, а после приговорили к повешению, в последний миг заменив казнь бессрочной каторгой. Но это были естественные издержки революционной деятельности. Спиридонова так и сгинула бы в Нерчинской каторге, но Керенский освободил ее, и она стала жить в Чите, по старой памяти занявшись партийной работой, а недавно приехала в Москву и возглавила левых эсеров.</p><p class="p">— Вы великолепно выглядите, Марья Александровна. Ничуть не изменились, — сказал ей Дзержинский. Как-никак она была дама, и с ней нельзя было с бухты-барахты подходить к делу, как с мужчиною, а следовало для начала сказать комплимент. Но Спиридонова не проявила ответной вежливости.</p><p class="p">— А вы постарели, товарищ Дзержинский, — сказала она с насмешливой улыбкой. Удивительно, но после десяти лет каторги зубы ее были ровны и белы как снег. — И эта козлиная бородка вам совершенно не идет. С нею у вас глупый вид... А вот кожанчик у вас неплохой. — Она, протянув через стол руку, деловито пощупала лацкан кожаной куртки Дзержинского. — Почем брали?</p><p class="p">— Мне недосуг заботиться о своей наружности, — проворчал Феликс Эдмундович.</p><p class="p">Его задели ее слова. «Но не могу же я ей объяснить, что эта проклятая бородка — фальшивая и я ношу ее нарочно, чтобы никто не смог меня узнать, если я ее не надену!» И он кинул строгий взгляд на Спиридонову... Перед ним сидела в вольной позе довольно крупная, свежая тридцатилетняя женщина с пышным узлом черных волос; асболютно ничего интересного и привлекательного для него в этом зрелище быть не могло. И все же... Легкая, смутная тоска и нежность шевельнулись в его сердце. Он не мог отвести от Спиридоновой взгляда... Ни единой черточкой она не была похожа на графиню Брасову, но... О, если б он в 13 году прислушался к тревожному звоночку, если б тогда же, при первых признаках болезни, раскаленным железом выжег ее из души!..</p><p class="p">Возможно, причина была в том, что, взяв под свое крыло беспризорных детей и получив таким образом к малышкам доступ, ограниченный лишь собственной потенцией (увы, не слишком большой!), он попросту пресытился; возможно, в его психике вдруг случился какой-то минутный сдвиг, как произошло, например, с Каменевым, когда тот женился, или, наоборот, с Пятаковым, когда тот ни с того ни с сего начал блокироваться с Каменевым; возможно, мысль о пытках и унижениях, которым подверглась эта женщина, щекотала ему нервы; возможно, ее черные, как смородина, глаза слишком живо напомнили ему то, что он хотел и боялся забыть, — так или иначе, но она волновала его... С этим надо было бороться. Но впервые в жизни он не находил в себе сил для борьбы.</p><p class="p">— Да что вы так на меня уставились, товарищ Дзержинский? — удивилась Спиридонова. — Или у меня кофточка не застегнута?</p><p class="p">— Нет, ваша кофточка... ваша кофточка прекрасна, — вдруг вырвалось у него. — Простите, Марья Александровна... Я... я плохо себя чувствую. Пожалуй, я зайду в другой раз. — И он стремительно вскочил, свалив два цветочных горшка, и выбежал из комнаты. А Спиридонова недоуменно пожала плечами и вновь подвинула к себе бумаги, над которыми работала до его прихода.</p><p class="p">Остаток дня и всю ночь он, сорвав дурацкую бородку, бегал по городу и рыдал от ужаса и отчаяния. Вернувшись на рассвете домой, он схватил плеть-семихвостку и принялся истязать себя. Он пытался уйти от любви; он брал острую бритву... но у него не хватило решимости довести задуманное до конца. Неужели единственное спасение — вновь подвергнуться психоанализу?! Кстати, и Мирбах тут... Или... жениться?!! Возвести Марию на престол...</p><p class="p">Как она улыбалась, как глядела! О нет, не грубое вожделение владело им, но — нежность почти смертельная... Пасть к ногам этой женщины, носить ее на руках, сделаться ее коленопреклоненным рабом, прильнуть к ее оскверненному лону, неслыханными ласками загладить оскорбление, что нанесли ей мужчины... Он подумал о том, какие надругательства она перенесла, и вновь залился слезами. «К чорту большевиков, — думал он, не утирая слез, — да здравствуют левые эсеры! Они такие прекрасные!» Он подумал о знакомом эсере Блюмкине и опять заплакал от умиления. (Он уже обожал все, что хоть как-то было связано с Марией.) Он воздел руки к небу, моля судьбу дать ему утешение и подарить любовь Марии. За один ее ласковый взгляд он готов был, как собака, служить ей до скончания веков. Если бы сейчас в его руках оказались ее кофточка, брошка, подвязка от чулка или, на худой конец, эсер Блюмкин — он был бы счастливейшим из смертных.</p><p class="p">К утру он принял твердое решение: ни к какому психоаналитику не ходить, а просить руки Марии Спиридоновой. Ведь он был мужчина хоть куда и к тому же — будущий император.</p><p class="p">Когда он пришел на Лубянку, охрана его не впустила, потому что он ужасно опух от слез и забыл надеть бородку, а также брюки. Это немного отрезвило его. Он опустился на скамеечку и сжал голову руками, пытаясь навести в своих мыслях какое-нибудь подобие порядка. «А как же мне теперь быть с Мирбахом и левоэсеровским заговором? — думал он. — И волшебное кольцо нужно искать...» Но что такое был Мирбах, и что такое был заговор, и что такое были ВЧК, и вся советская власть, и даже кольцо и корона, когда в душе его страсть бурлила, и все соловьи в мире пели в то утро для него одного...</p><p class="p">В таком обалделом состоянии председатель ВЧК провел целую неделю. Ежедневно он приходил к Спиридоновой с намерением просить ее руки и сердца и каждый раз робел так, что не мог произнести ни слова. Удивленные эсеры, волнуясь, спрашивали Спиридонову:</p><p class="p">— Мария Александровна, ну что? Что он говорит насчет Мирбаха?</p><p class="p">— Да ничего не говорит, — отвечала Спиридонова, тоже несколько удивленная. — Придет, сядет и сидит как пень... Потом вдруг вскочит и убежит, точно его собака укусила. Должно быть, у него расстроен желудок.</p><p class="p">— А почему он все время сморкается и утирает глаза платочком?</p><p class="p">— Сенная лихорадка, должно быть, — говорила прозаическая Спиридонова, выглядывая из раскрытого окна, — липы, вишь, цветут... Да и кошек тут у нас видимо-невидимо.</p><p class="p">За эту неделю Дзержинский не арестовал и не расстрелял ни одного человека, и бедный Петерс был вынужден делать все это за него, не получая никакой прибавки к жалованью. На совещаниях и коллегиях он рассеянно улыбался и всем отвечал невпопад. Большевики стали посматривать на него лукаво и даже осмеливались прыскать в кулак, когда он поворачивался к ним спиной. Однажды во время заседания какого-то важного государственного органа он, когда его спросили, почему до сих пор не пойман Савинков, машинально ответил: «Потому что Машенька не хо...», осекся и под взрывы смеха выскочил вон.</p><p class="p">В тот день он наконец решился. Большими шагами, взъерошенный и бледный как смерть, он вошел к Спиридоновой. Он был, конечно, уверен в том, что она ответит на его чувство, как только он откроется ей, — ведь она с таким участием всегда осведомлялась о его здоровье... Но робость, робость... Он долго молчал и смотрел на нее в упор, как обычно, надеясь, что она догадается о его чувствах. Но она не догадывалась. Тогда он проговорил тихим голосом — ему казалось при этом, что он падает с крутого обрыва:</p><p class="p">— Marie... Марья Александровна... Машенька, друг мой! — И с этими словами он по своей обычной привычке разорвал на груди рубаху. — Вот мое сердце; мне больше нечего вам предложить... пока. Но я сделаю вас королевой, клянусь!</p><p class="p">— Что-о? — Спиридонова в изумлении уронила книгу, которую держала в руках.</p><p class="p">— Машенька, Машенька... — бормотал он.</p><p class="p">«Наверное, болен», — подумала Спиридонова. Она подошла к нему, усадила его на стул и налила ему воды. Но он не мог пить: рука его ходуном ходила, и зубы выбивали дробь по краю стакана. Из глаз его брызнули слезы. Но это были не те притворные слезы, что он проливал перед несчастной Инессой Арманд. Они лились прямо из глубины его измученного сердца.</p><p class="p">— Вы, наверное, хотите мне что-то сказать? — спросила Спиридонова, желая помочь ему преодолеть смущение.</p><p class="p">— Хотите, я помогу вам свалить большевиков? — выпалил он не думая: поистине какой-то бес порою дергал его за язык...</p><p class="p">— Ну наконец-то! — обрадовалась Спиридонова. — Говорят, у вас есть уже конкретный план. Расскажите мне о нем... Угостить вас папиросой? Вы какой-то бледный.</p><p class="p">Он молчал и смотрел на нее; страшная борьба происходила в его душе. «В самом деле поставить на эсеров? Свергнуть большевичков к чортовой матери? Рука об руку с Марией мы отыщем кольцо и взойдем на трон... Да, но эти эсеры такие легкомысленные и прекраснодушные пустозвоны; они всерьез хотят воевать с Германией... И дождутся на свою голову: немцы простят нам убийство Мирбаха лишь в том случае, если будет тотчас установлено, что это сделали заговорщики, которых Советская власть разоблачит и накажет; иначе они и впрямь опять объявят войну... А мне сейчас совершенно ни к чему война с Германией: я начну ее, когда найду кольцо и стану настоящим императором, а нынче она лишь все осложнит... Так что ежели ставить на эсеров — тогда Мирбаха ни в коем случае убивать нельзя, ибо это полнейший идиотизм, только эсеры могут не понимать таких элементарных вещей...</p><p class="p">Но Мирбах опасен; теперь, когда я женюсь на Марии, он опасен вдвойне: она и смотреть на меня не захочет, если услышит что-нибудь этакое... Но ежели эсеры убьют Мирбаха и я разгромлю их партию — она тоже не захочет на меня смотреть... Круто же я попал, psya krev!</p><p class="p">Один выход — устроить все так, чтобы Мирбаха убили и заговор раскрыли, но раскрыл как будто не я... Выступлю в роли не гонителя Машеньки, но — спасителя ее... И притом останусь чист и перед большевиками, и перед немцами. Да, это сложно; требуется тончайшая психологическая игра. Но разве я не проходил уже многократно по лезвию бритвы?»</p><p class="p">— Слушайте же, — произнес он сдавленным голосом. — Мы должны начать с графа Мирбаха... Потом я дам вам для восстания целый отряд летучих чекистов... то есть летучий отряд чекистов... Ах, Marie!</p><p class="empty-line"/><p class="p">А немцы тем временем продолжали волноваться; они писали Дзержинскому все новые и новые жалобные записочки и целыми днями названивали ему по телефону, умоляя разобраться с готовящимся покушением; наконец Мирбах, не выдержав, потребовал личной встречи с председателем ВЧК. (Надо заметить, что Мирбах не догадывался о том, что председатель ВЧК Дзержинский, одетый в кожаную куртку и носящий козлиную бородку, и безбородый Железный Феликс, одетый в крылатку, с которым он сталкивался много лет тому назад, — одно и то же лицо. Ведь немцы различают славян исключительно по мундирам и бородам. Так что разоблачение с его стороны Феликсу Эдмундовичу, казалось бы, не грозило; но ведь он намеревался, женившись и взойдя на престол, от мерзкой бородки отказаться, и тогда...)</p><p class="p">— Герр Дзержинский, мне начинает казаться, что вы умышленно смотрите сквозь пальцы на мое убийство.</p><p class="p">— Это клевета; я вообще никак не могу смотреть на ваше убийство, герр Мирбах, — хладнокровно отвечал Дзержинский, — поскольку вы живы и сидите передо мной. Надо сказать, вы весьма живучи, — колко заметил он. (Мирбах не понял этой колкости.) — О каком убийстве вы говорите? Или это вы желаете кого-нибудь убить? В таком случае вам ничего не грозит: ведь вы — лицо неприкосновенное. Убивайте на здоровье.</p><p class="p">— Герр Дзержинский, я настаиваю, чтобы вы поскорей разобрались с этими вашими левыми эсерами.</p><p class="p">— Разберусь, не переживайте, — успокоил его Феликс Эдмундович. — А вот скажите мне, герр Мирбах, верно ли я слышал, что вы большой специалист в области психоанализа? — Он подумал, что неплохо было бы все-таки получить у Мирбаха бесплатную консультацию, пока тот еще жив: вдруг окажется, что любовь к Марии — это просто болезнь и наваждение?</p><p class="p">— Да, я был любимым учеником д-ра Фрейда, — гордо ответил Мирбах.</p><p class="p">— А вы не могли бы меня немножечко проанализировать?</p><p class="p">— Вообще-то я давно уж не практикую.</p><p class="p">— Если вы меня проанализируете, я обрету душевное равновесие и скорей раскрою ваше уби... покушение на вас.</p><p class="p">— О, в таком случае я согласен. Ложитесь на кушетку, пожалуйста... Нет, не нужно разрывать вашу рубаху, все движения вашей души и так от меня не ускользнут. А теперь расскажите мне, что вы сегодня видели во сне.</p><p class="p">— Мою мать, — правдиво отвечал Феликс Эдмундович.</p><p class="p">— О, превосходно! — обрадовался Мирбах. — Можете не рассказывать дальше, я и так все понял: вы видели, как ваш отец вошел в спальню к вашей матери, и это вызывало у вас гнев и жела...</p><p class="p">— Ничего подобного, — оборвал его Дзержинский. — Мне снилось, как моя мать купила нам с сестрой котенка, серого в полосочку.</p><p class="p">— Да, да... А к вашей сестре ваш отец входил в спальню?</p><p class="p">— Не помню. Он умер, когда мне было пять лет.</p><p class="p">— Но, стало быть, он мог входить в спальню вашей сестры?</p><p class="p">— Понятия не имею.</p><p class="p">— Но спальня-то хоть у вас в доме была?</p><p class="p">— Была, конечно. И не одна.</p><p class="p">— Ну вот видите!</p><p class="p">Дзержинский ничего не видел. Тогда Мирбах решил зайти с другой стороны. Он показал пациенту палец и спросил:</p><p class="p">— Что вы видите перед собой?</p><p class="p">— Палец.</p><p class="p">— Но он вам что-нибудь напоминает? Нет? Странно... — Мирбах огорчился. «Совсем потерял квалификацию, — подумал он, — конечно, без регулярной практики...» Он схватил зонтик и помахал им перед носом пациента. — А зонтик вам что-нибудь напоминает? А сигара? А карандаш?</p><p class="p">Добившись в конце концов от пациента признания, что демонстрируемый предмет отдаленно напоминает ему фаллос, Мирбах обрадовался, застегнул брюки и сказал, что пациент совершенно здоров. «Издевается, сволочь», — подумал Дзержинский. В самом деле, пора было его убирать.</p><p class="empty-line"/><p class="p">6 июля около трех часов дня к дому № 5 по Денежному переулку, занимаемому германским посольством, на автомобиле подъехали два человека. Один был смуглый брюнет с бородой и усами, другой — рыжий и в косоворотке. Оба были с портфелями. Они прошли в здание посольства. Войдя, брюнет сказал дежурному чиновнику, что они члены ВЧК и прибыли по поручению Дзержинского переговорить с графом Мирбахом. О пришедших доложили первому советнику посольства доктору Рицлеру. В сопровождении переводчика доктор Рицлер вышел к посетителям, и те отрекомендовались ему членом ВЧК Блюмкиным и членом революционного трибунала Андреевым, при чем предъявили мандат за подписью Дзержинского: «Всероссийская Чрезвычайная Комиссия уполномочивает члена ее Якова Блюмкина и представителя Революционного трибунала Николая Андреева войти в переговоры с господином германским послом в Российской республике по поводу дела, имеющего непосредственное отношение к господину послу».</p><p class="p">Но как ни уверял их доктор Рицлер, что он в качестве первого советника посольства уполномочен вести все переговоры, как ни предлагал изложить сущность дела ему, Блюмкин настаивал на распоряжении Дзержинского, чтобы они переговорили непосредственно с послом, которого лично касается это дело. И через пять минут в зале посольства, демонстрируя изготовленные Дзержинским документы, Блюмкин говорил послу о судьбе арестованного чекистами брата графа, австрийского офицера Роберта Мирбаха, в судьбе которого якобы посол должен был быть заинтересован.</p><p class="p">— Но этот граф Роберт Мирбах мне вовсе не брат, — сказал Мирбах.</p><p class="p">— Уверяю вас, ваше сиятельство, вы ошибаетесь, — возразил Блюмкин. — У ВЧК имеются абсолютно достоверные сведения о том, что он ваш родной брат. Я могу показать вам документы.</p><p class="p">Это был условный сигнал. Вместо документов Блюмкин выхватил из портфеля револьвер и, словно в тире, перестрелял всех немцев, начиная с посла. Затем он извлек из портфеля небольшую бомбу и швырнул ее в дверной проем. Посыпались оконные стекла, все окуталось дымом, и в этом дыму террористы спокойно скрылись на ожидавшем их автомобиле, за рулем которого сидел Дзержинский: он к тому времени уже порядочно выучился водить.</p><p class="p">Отвезши Блюмкина с Андреевым в штаб-квартиру левых эсеров, Феликс Эдмундович вернулся в свой кабинет на Лубянке и стал ждать звонка от Ленина. Теперь начинался самый сложный этап игры...</p><p class="p">Звонок раздался через полчаса.</p><p class="p">— Феликс Эдмундович, Мирбаха убили! — сказал Ленин. — Это не вы, случайно?</p><p class="p">— Нет, не я.</p><p class="p">— А ведь больше-то некому, — подозрительно сказал Ленин.</p><p class="p">— Это сделал не я, — спокойно отвечал Дзержинский, — и я вам это докажу. Я сейчас же поеду и арестую убийц.</p><p class="p">И, отдав кой-какие распоряжения Петерсу, он выложил из карманов кожаной куртки револьвер и скальпель, подзарядился для храбрости кокаином и, один и безоружный, поехал опять к эсерам.</p><p class="p">— Друзья мои, мне только что стало известно, что Петерс раскрыл наш заговор! — объявил он им. — Большевики ищут Блюмкина.</p><p class="p">Взволнованные эсеры зашумели; потом кто-то из них сказал:</p><p class="p">— Мы вам не верим. Вы нас обманули. Вы — провокатор! Вы, должно быть, привели с собой отряд чекистов. Но и мы не лыком шиты. Мы сами чекисты. — Это была правда: за то время, которое летучий отряд чекистов по поручению Дзержинского болтался в штаб-квартире эсеров и пил с эсерами коньяк, он весь проникся эсеровскими идеями.</p><p class="p">— Я пришел к вам один и безоружный, — ответил Дзержинский. В голосе его были гнев и страдание. Можете обыскать меня.</p><p class="p">Он расстегнул куртку и разорвал на груди рубаху. Но он забыл, что находится среди эсеров, которые к этому были привычны. Вперед выступил эсер Саблин; он тоже аккуратно разорвал на себе рубаху с кружевным воротничком и сказал:</p><p class="p">— Мы вам не верим. Мы вас сейчас арестуем.</p><p class="p">— Но я приехал, чтобы спасти вас! — уверял Дзержинский. — Я увезу Блюмкина и Спиридонову и спрячу их в надежном месте! — Он, конечно же, намеревался спасти одну лишь Спиридонову, а Блюмкина с триумфом поднести большевикам.</p><p class="p">— Врете, — отвечали эсеры. А матрос Протопопов разорвал свою тельняшку и сказал Дзержинскому:</p><p class="p">— Попробуй только рыпнуться, шкура, — убью! </p><p class="p">Причина столь странного эсеровского поведения заключалась в том, что летучие чекисты и их командир Попов давно признались Спиридоновой, что Дзержинский подослал их нарочно, с целью провокации, чистосердечно раскаялись и перешли на сторону эсеров по-настоящему. И эсеры могли бы, пожалуй, реально свалить большевиков, если бы были хоть немного последовательней, решительней и разумней; но тогда они уже не были бы эсерами, а были бы большевиками... Вместо того чтобы пристрелить Дзержинского, эсеры ограничились тем, что арестовали его и, плачущего от унижения, заперли в задней комнатке; а вместо того чтобы немедленно совершить вооруженный переворот, они принялись бегать по городу и шуметь...</p><p class="empty-line"/><p class="p">— Ну что, товарищ Дзержинский? — насмешливо спросила Спиридонова, входя в комнатку к арестованному. — Не удалась ваша провокация?</p><p class="p">Кусая в кровь губы, охваченный тоскою, он угрюмо смотрел на нее.</p><p class="p">— Мария, мы могли бы... — произнес он горько. — Мария, вы совершаете ужасную, непоправимую ошибку... Машенька...</p><p class="p">— Вы подлый и нехороший человек.</p><p class="p">— Это неправда.</p><p class="p">— Но ведь вы специально подослали к нам своих чекистов!</p><p class="p">— Я... я был уверен, что они перейдут на вашу сторону, — вывернулся он. — Ах, Мария, напрасно я так и не сказал вам самого главного... — Он соскочил со стола, на котором сидел, и бросился перед нею на колени. — У вас ничего не выйдет! Петерс вас разгромит! Вы такие легкомысленные! Бежим со мною сейчас же! Уедем в Лондон, там нас не достанут ни ваши, ни наши! Я... я люблю вас, Маша! А вы, вы любите меня?!</p><p class="p">Несколько секунд Спиридонова в изумлении разглядывала его. Потом сказала:</p><p class="p">— Ой, товарищ Дзержинский, уморили... Да вы не стойте на коленках-то. Еще простудитесь.</p><p class="p">И, не прибавив более ни слова, она повернулась и вышла — только подол черной юбки метнулся... Дзержинский, рыдая, упал ничком на пол и стал биться в конвульсиях. Он грыз зубами свои пальцы. Человек больших страстей, он теперь ненавидел Спиридонову так же безумно, как еще минуту назад — любил. О, зачем он не взял с собой револьвера!</p><p class="empty-line"/><p class="p">Но он по большому счету оказался прав: у бедных эсеров ничего не получилось. Они бегали и шумели до тех пор, пока Петерс не переловил их всех поодиночке. Он также освободил из плена Дзержинского.</p><p class="p">На Феликса Эдмундовича было страшно смотреть: он был белее мела, челюсть его тряслась, руки были искусаны, от рубахи не осталось ни клочка; он жаждал мщения.</p><p class="p">— Я требую расстрела Спиридоновой, — сказал он Ленину.</p><p class="p">— Батенька, вы с ума сошли. Такая заслуженная революционерка... И ей и так в жизни несладко пришлось. Дадим ей год условно. Я б ее вовсе отпустил, но, к сожалению, товарищи не поймут, — сказал Ленин и вздохнул. Его бесило и мучило, что, согласившись руководить этим игрушечным государством, он мгновенно стал заложником собственных министров. «Но ведь это же все временно, это же все так...» — утешал он себя.</p><p class="p">— Но ведь она на допросах призналась, что сама, лично организовала убийство Мирбаха и восстание эсеров!</p><p class="p">— Вот видите? Честный человек, сама призналась, не в пример вам... А Блюмкин-то каков молодец! Уж его я точно отпущу. Вообразите, он бесстрашно носился по Москве с револьвером в руках и кричал: «За Машеньку — пол-Кремля, пол-Лубянки снесу!» Вот это человечище! Вот это мужик!</p><p class="p">— Так у них... у него с ней что-то было?! — прошептал Дзержинский. Ему казалось, что земля уходит из-под его ног.</p><p class="p">— Я, в отличие от вас, не имею привычки совать свой нос в чужие постели.</p><p class="p">— Их необходимо расстрелять! Вы — идиот!</p><p class="p">— Знаете что, Эдмундович? Вы бы вообще сидели и помалкивали. Хорош председатель ВЧК, которого арестовывают собственные бойцы! Вот, кстати, приказ о вашей отставке — ознакомьтесь...</p><p class="p">— Вы пожалеете об этом, — прошипел Дзержинский. — Кто будет искать ваше кольцо?</p><p class="p">— Сам найду.</p><p class="p">— Не найдете.</p><p class="p">Ленин тоже понимал, что навряд ли у него самого будет возможность заниматься поисками кольца; но ему так осточертел Железный, и так осточертело все время притворяться и наступать себе на горло, и мономахова шапка так давила на него, что он махнул рукой и сказал:</p><p class="p">— Все равно. Вы уволены.</p><p class="p">— Вы пожалеете, — повторил Дзержинский и, шатаясь, вышел из кабинета. Он не сомневался, что отставка будет недолгой.</p><p class="empty-line"/><p class="subtitle">5</p><p class="p">— Лева, ты бы повлиял как-то на Гришу. Он совсем зарвался. Творит там в Питере чорт знает что — волосы дыбом становятся... И еще эта крыса Урицкий...</p><p class="p">— Ильич, навряд ли я смогу на Гришу повлиять, — ответил Каменев. — Мы в последнее время практически не общаемся.</p><p class="p">— Ах да, ты ведь женился.</p><p class="p">— Да не в том дело... Просто как-то, знаешь... — Каменев несколько смутился. — Причин масса. Во-первых, я все-таки работаю — хлеб там для населения, керосин, канцелярские кнопки... И у меня появились другие интересы... А Гриша когда не пытает людей и не тискает статейки в «Известия», то знай лежит бревном на диване и жрет икру.</p><p class="p">— Н-да.</p><p class="p">— Во-вторых, он безобразно растолстел. А в-третьих, до меня дошли слухи, что он блокируется с Троцким.</p><p class="p">— Как блокируется с Троцким?! — вскричал ошарашенный Ленин. — Лева, что ты несешь, опомнись! Никакого Троцкого нет и никогда не было. Тебе это известно не хуже меня.</p><p class="p">Но Лева молчал и смотрел ясным взором, и Ленин понял, что теперь уже никто, кроме него и Железного, не поверит, что Троцкого не существует. Ему стало жутко... О Эльсинор, высоки твои стены!</p><p class="empty-line"/><p class="p">А на квартире бывшего председателя ВЧК происходил в это время совсем другой разговор.</p><p class="p">— Прямо не знаю, что и делать, — жаловался Свердлов. — Вот пришел посоветоваться.</p><p class="p">— Со мной? — усмехнулся Дзержинский. Он лежал на турецком диване, облаченный в халат, и курил кальян: ему требовался отдых, прежде чем он начнет строить новые интриги. — Ведь я нынче не в фаворе.</p><p class="p">— Да ведь не с кем больше. У нас осталось два умных человека: Бухарин и Кржижановский, но один все время пьян, а другой занят только своим электричеством. В деликатные вопросы им вникать недосуг. Короче говоря, Феликс Эдмундович, вся надежда на вас!</p><p class="p">— Ну так и быть, — лениво произнес Дзержинский, — выкладывайте, что там у вас опять стряслось... Хотите кальян?</p><p class="p">— Нет, благодарю... Ильич опять насчет Романовых говорил. Нехорошо, дескать, им быть в России, опасно. И что он так о них печется — ума на приложу.</p><p class="p">— Вы, Яков Михайлович, не умеете угадывать желаний Ильича.</p><p class="p">— Не умею, — признал Свердлов. — Увы, я лишен интуиции. Мне подавай факты, логику...</p><p class="p">— Так вот вам логика, друг мой: неужели вы хоть на миг допускаете, что наш Ильич, наш революционный вождь, всерьез может заботиться о безопасности кровавых тиранов?</p><p class="p">— И в самом деле, — согласился Свердлов. — Нет, конечно, не допускаю.</p><p class="p">— Или, может быть, — Дзержинский посмотрел на Свердлова очень строго, — вы подозреваете, что у него может быть какой-то личный интерес к этой семейке?</p><p class="p">— Боже упаси, Феликс Эдмундович!</p><p class="p">— Или вы думаете, что он желает, чтоб они уехали в Лондон и оттуда будоражили народ и иностранные правительства?!</p><p class="p">— Да что вы такое говорите... — Свердлов поежился. — Нет, конечно.</p><p class="p">— Тогда делайте вывод. Он хочет, чтоб вы их ликвидировали. Ведь логика железная?</p><p class="p">— Железная-то железная, — согласился Свердлов, — но почему он так прямо мне об этом не скажет?</p><p class="p">— Он ведет себя как настоящий вождь, — твердо сказал Дзержинский. — Ждет, что вы сам обо всем догадаетесь и решите эту небольшую проблему без его письменного указания.</p><p class="p">— Вы имеете в виду, — глаза Свердлова за стеклами пенсне заблестели, — ликвидировать?</p><p class="p">— Вот видите, Ильич не зря считает вас очень умным. Он знал, кому поручить разобраться с его ро... то есть с Романовыми.</p><p class="p">— Что ж, это полезно для нашего дела, — неопределенно заметил Свердлов. — Но как же быть с детьми?</p><p class="p">— Вы не поняли, Яков Михайлович, — усмехнулся Дзержинский. — Ильич считает, что в живых не следует оставлять никого.</p><p class="p">Свердлов побледнел и опустил голову, но снова вскинул ее с решительным видом:</p><p class="p">— Великое дело — великие жертвы. Господь, истребивший когда-то всех первенцев в земле Египта, простит нас. Вы с Ильичом совершенно правы, и я сегодня же отдам распоряжение.</p><p class="p">— Нет уж, позвольте, я сам все устрою, — с той же усмешкой сказал Дзержинский, хорошо знавший полную беспомощность Якова в практических делах.</p><p class="empty-line"/><p class="p">...Одно, лишь одно сомнение было у него: ребенок. Невинное дитя... С другой стороны, дитя было не такое уж и маленькое и к тому же не того пола. И разве сам Господь не принес агнца в жертву для того, чтоб спасти человечество?! Так что когда Свердлов позвонил Дзержинскому и сказал, что для вывоза Романовых все готово, тот отвечал, что беспокоиться не о чем: Юровский превосходно справился с делом и уже все в порядке. Свердлов был удивлен; он рассыпался в благодарностях и, в свою очередь, доложил Ленину, что все в порядке. Гром, конечно, грянул очень скоро; но у Феликса Эдмундовича был заготовлен громоотвод...</p><p class="p">— Вы... это вы сделали... Что вы сделали?!</p><p class="p">— О чем вы, Владимир Ильич? — недоуменным тоном спросил Дзержинский.</p><p class="p">— Заткнись, мразь. Иль ты думаешь, что я читать не умею?! — И Ленин швырнул через стол пачку иностранных газет, где сообщалось о казни Романовых. Дзержинский спокойно подобрал газеты и положил обратно на стол.</p><p class="p">— Владимир Ильич, успокойтесь...</p><p class="p">— Я больше не желаю быть председателем этого подлого Совнаркома. Ничего я больше не хочу. Все кончено. Я ухожу. Но перед этим сделаю хоть одно доброе дело...</p><p class="p">И с этими словами Ленин вынул из кармана револьвер. Дзержинский в первый раз видел в его руках такое оружие. Курок был взведен, и черное дуло смотрело прямо на него. По глазам Ленина Дзержинский отлично видел, что рвать на груди рубаху бесполезно. Но он был готов и к такому повороту событий. Он демонстративно вынул портсигар и заложил ногу за ногу, всем своим видом показывая, что не боится. Рука Ленина задрожала: он никогда еще не убивал человека.</p><p class="p">— Вы, конечно, можете пристрелить меня, — сказал Дзержинский с деланным равнодушием, — я не дорожу жизнью, и мне плевать... Но в таком случае, боюсь, вы никогда не узнаете адреса...</p><p class="p">— Какого еще адреса?! Не заговаривайте мне зубы.</p><p class="p">— А им было бы приятно получить от вас письмецо...</p><p class="p">— Что вы несете? Какое письмецо?</p><p class="p">— Вы сможете написать вашим племянникам, как только они устроятся на новом месте. Разумеется, не открытой почтой — вы же понимаете...</p><p class="p">Владимир Ильич задрожал еще сильнее и опустил револьвер. Боже, как ему хотелось в это поверить! Он всеми силами цеплялся за мысль о том, что Дзержинский — пусть по-своему, болезненно и странно, но все же любит детей...</p><p class="p">— Так дети живы? — слабым голосом спросил он.</p><p class="p">— Почему же только дети? Все живы-здоровы. Пароход уже прибыл в Австралию.</p><p class="p">— А как же газе...</p><p class="p">— Владимир Ильич, неужели вы считаете меня дураком?! Разумеется, ваша родня вывезена инкогнито, в глубочайшей тайне. Мы со Свердловым нарочно распустили слух об их гибели. Это же азы конспирации. Там для них куплена хорошенькая ферма. Зелень, овцы, бабочки, чудесный климат.</p><p class="p">— Это ложь... — прошептал Ленин.</p><p class="p">— Отнюдь. Вы — будущий император российский, и мне это отлично известно. Неужто я стал бы делать такую страшную и бесполезную гадость своему императору, при котором я рассчитываю сытно кормиться до конца моих дней? — Этот цинизм был тщательно продуман. — Сами-то раскиньте мозгами. Ну, для чего бы мне убивать ваших родственников? Николай, конечно, гнида та еще, вы это и сами знаете, но это не причина... Лично мне они ничего не сделали. Как взойдете на трон — может вернуть их ко двору, это ваше дело, хотя я бы не советовал.</p><p class="p">Ленин ничего на это не ответил. Он молча смотрел куда-то в стену. Подбородок его вздрагивал. «Австралия, Австралия... Зелень... Ферма... Это Peugeot... А я не скажу про Пелагею... Конечно, ему незачем было убивать их... Ведь он надеется, что я снова приближу его к себе, если он поможет мне взойти на престол... Я не флейта, нет... Это Peugeot... Австралия, зеленая... Бабочки... Если не верить в это — то и жить не хочется... Уснуть — и видеть сны, быть может... Австралия... Почти как Атлантида...»</p><p class="p">— Уйдите, — сказал он Дзержинскому. Он не хотел, чтобы кто-нибудь видел, как он плачет.</p><p class="p">— Вы бы вернули мне мою должность. Я столько трудился ради вас.</p><p class="p">— Нет. Вы слишком любите кровь. Нет... Не знаю... Может быть, потом... Уйдите же, прошу вас. — И столько тихого и грустного достоинства было в жесте, каким он приложил к груди руку, что Дзержинский не посмел настаивать и вышел, очень мягко притворив за собою дверь.</p><p class="empty-line"/><p class="p">Через пару дней Ленин был по делам в Петрограде. Он уже убедил себя в том, что его родные уехали в Австралию. Ведь человек всегда верит в то, во что ему хочется верить. Почти убедил...</p><p class="p">Он зашел к Зиновьеву и внимательным взором окинул кабинет. Никаких следов блокирования с Троцким не было. «Слава богу, — подумал он, — если б оказалось, что Троцкий все-таки существует, я бы, наверное, застрелился».</p><p class="p">— Сыграем? — предложил Зиновьев, протягивая на ладони колоду карт.</p><p class="p">Ленин посмотрел на него. «И вправду растолстел, — мелькнуло у него в голове, — он похож на жирную бабу... Где тот мальчик резвый, кудрявый? Где она — наша беззаботная молодость? Неужели все хорошее ушло навсегда?»</p><p class="p">— Нет, Гриша, — сказал он. — Что-то не хочется.</p><p class="empty-line"/><p class="subtitle">6</p><p class="p">Обнаженный, он лежал на полу — навзничь, руки раскинуты в стороны, словно распятый на кресте. Пульс его почти не бился, грудь вздымалась едва-едва. Со стороны можно было принять его за мертвого или умирающего. Но демон поверженный еще не раз расправит крылья...</p><p class="p">Пролежав таким образом чуть более трех суток, Феликс Эдмундович поднялся — ослабевший и шатающийся от голода, но неутомимый и грозный, как всегда. За время лежания у него в голове созрел план, превосходящий по изощренности и коварству все прежние. Он придумал, как одним ударом — нет, двумя, ежели быть точным, — решить сразу все стоявшие перед ним задачи: вернуть себе пост председателя ЧК и получить для этой организации максимальные полномочия, вновь завоевать доверие Ленина и до смерти запугать его, чтобы пикнуть не смел.</p><p class="p">Он привел себя в боевое состояние: принял ванну и отправился наводить справки об одной особе. Его память хранила подробнейший каталог людей, с которыми ему когда-либо приходилось сталкиваться хотя бы на пару секунд. Эту миловидную подслеповатую жидовочку он повстречал лет десять тому назад, зайдя с визитом в дом к одному зажиточному анархисту: она была чем-то средним между гувернанткой и обыкновенной прислугою. Сам Феликс Эдмундович не обмолвился с ней ни словом, но хозяин, помнится, почему-то заговорил о ней — по его словам, это была несчастная, экзальтированная, почти что полоумная девушка, словно сошедшая со страниц романа Достоевского, более всего на свете мечтавшая выйти замуж за князя и разъезжать в собственном экипаже, но из-за своего низкого происхождения и истеричного характера обреченная до конца дней мыкаться по чужим домам.</p><p class="p">Теперь, пустив в ход своих информаторов, Дзержинский узнал, что m-lle Каплан, благодарение Господу, жива и снимает комнатушку в Москве, кой-как зарабатывая на жизнь починкой белья; что она слепа как крот и стала еще более полоумною, чем прежде. Он узнал также, что родители девушки давно эмигрировали в Америку. Это было очень хорошо. Дзержинский сопоставил новую информацию с тем, что знал о прошлом Ленина и его частной жизни. Да, это придавало плану законченность и отточенное изящество... Воодушевленный, Феликс Эдмундович прикупил по дороге букет цветов и всякой снеди и пошел навестить бедняжку.</p><p class="p">— Господин... ой, простите, товарищ Глинский... Вы страшно добры, что пришли навестить меня. Я так одинока! Только я вас не помню, как жаль... Да и зрение у меня совсем расстроилось.</p><p class="p">— А я вас отлично помню. Ведь я вас маленькой на руках носил. Вы тогда еще пешком под стол ходили, дитя мое.</p><p class="p">— Как поживают мама и папа? (Феликс Эдмундович сказал бедной Фанни, что приехал из Америки и привез привет от родителей, с которыми был знаком давным-давно.)</p><p class="p">— Эти добрые люди, что вас приютили и вырастили? Они стары, больны... Но в общем поживают.</p><p class="p">— Что вы такое говорите, товарищ Глинский? Я не поняла.</p><p class="p">— О, Фанни, милая... Ведь эти прекрасные старики евреи совсем не ваши настоящие родители. Они вас удочерили в младенчестве. Вы не еврейка.</p><p class="p">— Как это?!</p><p class="p">— Ваша мать — полька. Прекрасная женщина. Ее имя Матильда... А ваш отец... но мне тяжело говорить о нем после того, как ужасно он поступил с вами и вашей матушкою.</p><p class="p">— Расскажите, расскажите, умоляю вас!</p><p class="p">И, сделав вид, что с неохотою уступает просьбам несчастной девицы, Феликс Эдмундович с запинками и экивоками поведал ей — пока что с недомолвками — историю ее рождения... Фанни только моргала от изумления. Оказывается, она была дочерью знаменитой балерины Матильды Кшесинской! Любовник Матильды, которого та любила больше жизни, бежал и бросил несчастную; Матильде пришлось родить ребенка тайно и отдать на воспитание чужим людям. Всю жизнь несчастная балерина безумно страдала от разлуки с дочерью.</p><p class="p">— Кто он, кто? — жадно спрашивала Фанни. — Кто мой отец? Кто этот негодяй?</p><p class="p">— Для чего вам знать это?</p><p class="p">— Я... я бы его убила, — с силой произнесла она. — Он загубил жизнь матушки и мою...</p><p class="p">— Ах, Фанни, Фанни... — Он подсел к ней ближе, взял ее руку, ласково погладил (внутри у него все переворачивалось от отвращения), проникновенно заглянул в подслеповатые глаза. — Он занимает очень, очень высокий пост. Он сумел этого добиться благодаря своей подлости. Это человек, который ходит по трупам и смеется. Он не только вам принес много горя. Это дьявол.</p><p class="p">— Клянусь Богом, я его убью! — закричала Фанни. — Имя! Скажите мне имя!</p><p class="p">— Ленин...</p><p class="p">— Как?! Тот самый? Главный революционер? Председатель Совнаркома?</p><p class="p">— А вы знаете еще какого-нибудь Ленина, дитя мое? — грустно усмехнулся Феликс Эдмундович.</p><p class="p">— Я убью его. Помогите мне, пожалуйста!</p><p class="p">— Ну, ежели вы так настаиваете...</p><p class="p">Ужасная близорукость Фанни была важнейшим звеном в цепи событий. Да и позицию для стрельбы девушке было велено занять такую, что, будь у нее хоть одна извилина в голове, она поняла бы, что убийство вряд ли удастся. Ведь Феликс Эдмундович, несмотря на свою ненависть к рыжему болвану, отнюдь не собирался ликвидировать его. Ленин был удобной ширмой — до той минуты, пока не будет найдено волшебное кольцо. «Это слепое — ха-ха, каламбур получился — орудие никогда не выдаст меня. И в самом худшем случае — что она сможет сказать на следствии? Что к ней приходил некий человек с рыжей бородой до колен и синими волосами».</p><p class="empty-line"/><p class="p">Утром 30 августа в кабинете Ленина раздался телефонный звонок. Владимир Ильич снял трубку. Настроение у него было хорошее. Оно почти всегда было хорошим с того дня, как он избавился от Железного. Но едва он услыхал истеричные вопли Зиновьева, как на душе у него вновь стало уныло.</p><p class="p">— Гриша, ну что ты визжишь как резаный? Кого убили? Ах, Урицкого... — Ленину хотелось сказать «туда ему и дорога», но он не посмел. Взвалив на себя должность руководителя государства, он не мог, как прежде, ляпать что в голову взбредет. Стыдно признаться, но он теперь опасался даже Гришки. — Хорошо, хорошо, не хнычь. Я пришлю кого-нибудь разобраться... Нет, только не его, и не проси! Вы там вдвоем такого натворите...</p><p class="p">Но, положив трубку, Ленин с досадой понял, что послать в Питер, кроме Железного Феликса, и впрямь некого. Уголовник и проходимец Петерс был ничем не лучше, а вдобавок глуп. При Дзержинском, по крайней мере, хоть карманных воришек иногда ловили. «Похоже, придется вернуть его на должность председателя ЧеКи... Ох, как не хочется...» Но тем и отличается правитель от обычного человека, что ежедневно вынужден делать то, чего не хочется, и не делать того, что хочется.</p><p class="p">— Феликс Эдмундович, поезжайте немедленно в Питер. Товарищ Свердлов уже взял для вас билет в первом классе.</p><p class="p">— А что случилось? — спросил Дзержинский, дьявольски усмехаясь про себя.</p><p class="p">Разумеется, убийство коллеги тоже организовал он сам. Это было частью плана...</p><p class="empty-line"/><p class="p">Возможно, он и без плана уничтожил бы его, так надоел ему Урицкий — это ничтожество, по-утиному переваливающееся на кривых ножках, этот гнусный блатарь, к тому же знающий слишком много, а стало быть, потенциальный шантажист. Но так, в один день, — это было просто великолепно. И здесь большую роль сыграл петербургский градоначальник Гришка Зиновьев...</p><p class="p">Однажды, когда Дзержинский приехал погостить в Питер к Зиновьеву (любовь к кожаной одежде и высоким сапогам сроднила этих людей, ранее не переносивших друг друга), он обнаружил градоначальника с подбитым глазом, расквашенною мордой и в унынии; даже новая шикарная плетка с рукоятью, инкрустированной изумрудами, которую Феликс Эдмундович привез в подарок новому другу, не развлекла его... На все расспросы Зиновьев отмалчивался или нес какую-то чепуху; но Феликс Эдмундович не был бы Железным Феликсом, если б не заинтересовался этим обстоятельством. Поднажав на Гришкиных ганимедов-секретарей, он уже к вечеру был в курсе того, что в морду господин градоначальник схлопотал от некоего красавца юнкера, с презрением отвергшего его домогательства.</p><p class="p">Тогда Дзержинский — ни одной мелочи он никогда не упускал — навел об этом юнкере справки и узнал, что звать его Леней Каннегиссером. Осведомители подробно рассказали о его характере и привычках: Леонид был прекраснодушный романтик, эсер по убеждениям, человек необыкновенной личной отваги и дерзости, но, в сущности, совершенный еще ребенок; талантливый поэт, дружил с другим поэтом — входящим в моду Сережей Есениным, а другого, куда как более близкого его друга — какого-то там Виктора Перельцвейга, что ли, — мстительный и ревнивый Зиновьев после того, как подвергся мордобитию, велел расстрелять по обвинению в одном из бесчисленных заговоров, и теперь Каннегиссер пребывал в страшном отчаянии... Дзержинскому даже показали фотокарточку, где были сняты Каннегиссер с этим самым Перельцвейгом. Оба — и вправду совсем еще мальчишки — были хороши собой необычайно.</p><p class="p">«Лицо как у благородного шляхтича, — думал Дзержинский, — даже жаль... Да и второй тоже... Понятно, почему разжиревший Гриша (товарищ Зиновьев, сделавшись градоначальником, моментально так разожрался на казенных харчах, что стал похож на перезрелую купчиху с тремя подбородками, и всю его юношескую томную смазливость как рукой сняло) не имел успеха у этого юнкера... Впрочем, ежели они все того же поля ягодки, то, стало быть, жалеть нечего. Да и какая, в сущности, разница?..» Феликс Здмундович прекрасно отдавал себе отчет в том, что ради главной своей цели не задумываясь уничтожил бы и настоящего польского дворянина безупречной морали. Ведь иезуиты учили, что благая цель всегда оправдывает средства, а он остался верен их заветам на всю жизнь. Он великолепно разбирался в людях; он решил, что в этом эпизоде с Зиновьевым можно сыграть в открытую — и не ошибся.</p><p class="p">— Григорий Евсеевич («Григорий Ефимович, — мелькнуло в мыслях Дзержинского, — они, ей-богу, чем-то весьма похожи...»), как вы ладите с Урицким?</p><p class="p">— Скверно, — буркнул Зиновьев. — Осточертел он мне — сил нет. Всюду лезет, лезет... И потом, у него такие кривые ноги, что у меня от одного его вида изжога делается.</p><p class="p">— Не ешьте, друг мой, столько ананасов — вот и не будет изжоги, — легким дружеским тоном посоветовал Дзержинский. И тут же, посуровев лицом, сказал:</p><p class="p">— Хотите, я помогу вам от него избавиться?</p><p class="p">— Вы же мне сами его навязали! — удивился Зиновьев.</p><p class="p">— Никого другого под рукой не было. А теперь я хочу его убрать</p><p class="p">— Годится.</p></span>
