<p class="p1">ГЛАВА 3</p>
</div><p class="subtitle">1904-1905: Ленин разгадывает загадки и считает чужие деньги. Ленин и Горький. Ленин и Бог. Тайна женитьбы Ленина. Правда о жизни и смерти Саввы Морозова.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">— Ваша «Песнь о старухе Гризли» — это что-то! А этот, как бишь его... Макар Челкаш — что за человечище! Что за характер!</p><p class="p">Так говорил Владимир Ильич и тряс руку высокого, как каланча, сутулого, скуластого человека. Он специально приехал с фальшивым паспортом в Петербург, чтобы познакомиться с ним. Железный Феликс, объясняя Ленину необходимость знакомства, начал издалека:</p><p class="p">— Владимир Ильич, вы слышали о богаче Морозове, текстильном фабриканте?</p><p class="p">— Обижаете, почтеннейший. — Ленин усмехнулся. — Я как-никак коммерсант. Кто ж о нем не слышал!</p><p class="p">— А об актрисе Андреевой?</p><p class="p">— Которая с ним живет? Слыхал, слыхал.</p><p class="p">— Так вот, — сказал Дзержинский, — она с ним больше не живет. И это обстоятельство меня очень удручает.</p><p class="p">— Вас-то, батенька, с какой стати? — удивился Ленин. — Сами ни с кем не живете и другим не даете; вы бы радоваться должны...</p><p class="p">— Андреева на протяжении пяти лет была одним из лучших моих агентов, — сказал Дзержинский, сделав вид, что не замечает издевательства. — Морозов давал ей деньга, она отдавала их мне... то есть партии.</p><p class="p">— По-моему, это называется не «агентура», а «проституция», — мягко заметил Ленин. — А мужчина, который отнимает у проститутки ее заработок, называется...</p><p class="p">— Неважно, как это называется, — отрезал Дзержинский. — Важно то, что у революционеров были средства.</p><p class="p">— А Морозов-то знал, что его деньги идут на содержание сутенер-революционеров?</p><p class="p">— Нет, конечно! Он же купчина, эксплоататор; естественно, он ненавидит революцию. Он думал, что она покупает себе наряды, драгоценности и всякое такое женское. — Феликс Эдмундович неопределенно повертел вокруг себя рукою. — А потом Андреева сошлась с одним модным литератором.</p><p class="p">— А, с Андреевым! — сообразил Владимир Ильич. Он практически не читал книг — у него не было на это времени, — но газеты пролистывал регулярно и немножко знал о модных литераторах. — А он ей, случайно, не брат?!</p><p class="p">— Понятия не имею, — ответил Дзержинский. — И меня это абсолютно не интересует. Она сошлась с Максимом Горьким... Это такой пролетарский писатель из купцов, — пояснил он, видя, что Ленину это имя ни о чем не говорит, — его прозвали Горьким за то, чтo, будучи не в силах выносить страданий народа, он запирается в нумерах, горько плачет и пьет горькую... (Феликс Эдмундович был не лишен тяжеловесного юмора, хотя его попытки острить всегда производили странное впечатление — как если б Эйфелева башня вдруг пустилась отплясывать фокстрот.) И Андреева перестала брать деньги у Морозова.</p><p class="p">— Почему же?</p><p class="p">— По-видимому, Горький из ревности запретил ей делать это. Партия поручает вам познакомиться с обоими и убедить Горького, что его любовница должна опять жить с Морозовым и брать от него деньги. А заодно завербуете Горького в нашу партию. Литератор нам всегда пригодится.</p><p class="p">— Что ж ваша... агентэсса-то его не завербовала?</p><p class="p">— Она пыталась. Но ничего не вышло. На женщину не во всем можно положиться... Надеюсь, вы справитесь с партийным поручением лучше.</p><p class="p">Владимир Ильич поморщился: партийное поручение ему не слишком нравилось. Он терпеть не мог мешаться в чужие любовные дела, да и в вербовке не имел опыта. Но деньги революционерам были действительно нужны: ведь Железный Феликс намеревался в ближайшем будущем свергнуть Николая Романова, а это, как надеялся Ленин, открывало ему самому дорогу к престолу. (И Дзержинский и Ленин понимали, конечно, что это будет не совсем правильная дорога, ибо участие Михаила тут никак не предусматривалось; но Феликс Эдмундович уповал на Провидение, а Владимир Ильич — на русский авось.) Просмотрев по диагонали несколько книжек Горького, которыми снабдил его Железный, и заучив наизусть их дурацкие названия, Владимир Ильич отправился в Петербург. В поездке его сопровождала дама... но о ней после.</p><p class="p">«От Саввиных несметных богатств не убудет, — думал он, — пускай еще немножко с нами поделится... А как стану императором — я ему все возвращу... половину-то уж точно».</p><p class="p">И вот теперь он стоял перед Горьким, тряс его руку и не понимал, почему литератор в ответ на комплименты как-то странно молчит.</p><p class="p">— Рад, рад, что вам понравились мои книги, — наконец прогудел Горький, по-видимому решив не поправлять нерадивого читателя: он был застенчив.</p><p class="p">Владимир Ильич решил не продолжать разговора о книгах, в котором мог непоправимо увязнуть, и с места в карьер пригласил нового знакомого в пивную; тот не чинясь согласился. Через пару дней они уже были в приятельских отношениях. Горький оказался милейшим человеком, хотя играл настолько скверно, что даже обыгрывать его было скучно и совестно: он не помнил ни одной карты, что уже вышла, и по двадцать раз за игру интересовался, какая масть нынче козыри. Но он так мило и заразительно хохотал всякий раз, когда проигрывал! Игра же с тремя серебряными наперсточками привела писателя в совершенный восторг, и даже после того, как Ленин объяснил, каким образом обманывает его, прижимая горошину большим пальцем к краешку стакана, Горький все равно требовал демонстрировать фокус снова и снова.</p><p class="p">Вскоре Горький представил нового друга Машеньке Андреевой, и они втроем чудно проводили время в ресторациях. Особенно им нравился трактир Симонова на Васильевском — дымный, прокуренный, с необычайно вкусной и дешевой кухней. Горький смущенно покашливал и рассказывал о своих странствиях. Скитался он главным образом по югу России, и встречались ему в этих скитаниях благороднейшие люди — Ленин отроду не встречал таких среди босяков, хотя поездил достаточно и хлебнул всякого.</p><p class="p">— Что-то они у вас все на разорившихся баронов похожи, — сказал он однажды.</p><p class="p">— Разорившиеся бароны... Это мысль! — задумчиво сказал Горький.</p><p class="p">— Так запишите, дарю! Пригодится!</p><p class="p">— Я ничего не записываю, — смущенно сказал Горький. — Все запоминаю. Память, слава богу, лошадиная. Иное и рад бы забыть, да никак. Словно некто начертал на голове моей: «Здесь — свалка мусора». А многое, многое хотел бы забыть...</p><p class="p">Ленин посмотрел на него сочувственно. У него была отличная память на цифры, а вот о неприятностях он забывал мгновенно.</p><p class="p">Однажды их занесло на острова. Горький с удовольствием слушал ленинские рассказы о Сибири. Неожиданно пьяный пианист расчувствовался и вместо очередной вариации на тему «Голубого Дуная» заиграл «Апассионату». Ленин не знал, как это называется, но ударил кулаком по столу и подпрыгнул на стуле от злости.</p><p class="p">— Что с вами, Володимир Ильич? — картинно окая, спросил Горький.</p><p class="p">— Чорт бы побрал эту музыку! Нечеловеческая музыка... Не могу слышать.</p><p class="p">— Вот ведь странность, — задумчиво промолвил Горький. — Никогда бы не подумал, что на вас так действует искусство.</p><p class="p">— Да какое искусство, к чертям свинячьим? Архиглупость и больше ничего! Я однажды в Харькове под эту музыку проигрался только что не до белья... Играл в интеллигентном доме, все чин-чинарем, хозяйка музицирует. Как раз вот эту самую гнуснятину. И супруг вроде приличный человек, инженер... Что же вы думаете? Никогда в жизни у меня не было такой полосы невезения. Вернейшие комбинации срывались. Я и так, я и сяк — и, главное, смотрю: не мухлюет ли? Дело обычное... Нет, чисто! Ах же ты, думаю, музыкант этакой; что-то здесь не так. Сослался на головную боль и попросил сыграть что-нибудь потише, этакое комнатное... Что же вы думаете? Почти отыграл свое, только уж не стал испытывать удачу, рад еще был, что цел... Нет, как хотите, а есть вещи мистические.</p><p class="p">Андреева смотрела на него с любопытством и явной симпатией. «Огонь баба, — думал Ленин, — жалко Максимыча. Заездит она его, как пить дать». Он знал одну такую в Париже: малорослая и худощавая, она истощила трех здоровых мужчин и не спеша обхаживала четвертого.</p><p class="p">Так прошла неделя, другая... Ленин решительно не представлял себе, как будет убеждать Горького, что тот должен вернуть Морозову свою прелестную подругу, тем более что та присутствовала теперь неотлучно на всех разговорах и встречах. Но Дзержинский слал злобные шифровки и требовал результатов. И в один из дней Владимир Ильич скрепя сердце решил приступить к этому скользкому делу. Он пришел в гости к Горькому не один...</p><p class="p">— Вот, Алексей Максимович, супруга моя и товарищ, Надежда Константиновна, — сказал он с принужденной улыбкой. — Прошу любить и жаловать.</p><p class="p">Женщина, робко выглядывавшая из-за его плеча, протянула руку дощечкой. От приметливого Горького не ускользнуло то, как она предварительно быстрым движением обтерла ладонь о мятую синюю юбку, сидевшую на ее квадратной фигуре мешком и криво. Он осторожно взял эту мягкую, словно бескостную ручку; хотел было поцеловать, да не решился.</p><p class="p">— Очень, очень приятно, — прогудел Алексей Максимович. Пальцы его при пожатии ощутили еще не сошедшие подушечки мозолей на ладошке женщины, что повергло его в еще большее недоумение. Красавица Андреева смотрела на жену Ленина широко раскрыв глаза, не в силах скрыть своего изумления.</p><p class="p">Надежда Константиновна пролепетала что-то в ответ и вновь спряталась за спину мужа. Лицо Лениной было угловатое, с тяжелыми чертами, большие светлые глаза глядели с застенчивой хитрецой. Она все суетилась: обдергивала на себе то кофточку, то шарфик. Ленин приобнял Горького за плечи:</p><p class="p">— Имею надобность с вами о делишках потолковать, Алексей Максимович. Да пройдемте в кабинет. Дамы тут как-нибудь...</p><p class="p">Андреева поджала губы, но возразить ничего не успела. Надежда Константиновна вздрогнула всем телом: было видно, что ей ничуть не больше, чем Андреевой, улыбается мысль о том, чтобы остаться вдвоем. Элегантная дама пугала ее чуть не до обморока. Мужчины прошли в кабинет Горького, закрыли за собой дверь. И тут Горький не удержался от вопроса:</p><p class="p">— Господи, Владимир Ильич! Где вы приглядели эту... эту красавицу? Не скрою: зная ваши вкусы, я более чем удивлен...</p><p class="p">— Жена как жена, не хуже всякой другой.</p><p class="p">— Но это же простая баба, мещанка или крестьянка!</p><p class="p">— Да? — Ленин, прищурившись, бросил на Горького хитрый взгляд. — А еще пролетарский писатель! — Он укоризненно покачал головой.</p><p class="p">— Женщина из народа, без сомнения, заслуживает всяческого уваженья, — согласился Горький, пойманный на слове. — Но жениться! Она что же — шантажировала вас? Заставила венчаться с нею?</p><p class="p">— Заставила? — переспросил Владимир Ильич. — Что ж, можно и так сказать... Но к делу, к делу.</p><p class="empty-line"/><p class="p">Тайна его женитьбы была такова, что он и под страхом смерти никому не рассказал бы о ней. Все началось в один из тоскливых, тягомотных вечеров, когда он, надеясь провернуть кое-какое дельце со старателями, поселился поближе к золотым приискам — в Шушенском, будь оно неладно, в этом сибирском Клондайке, на который столько русских авантюристов возлагали напрасные надежды.</p><p class="p">Он тогда только что нанял отдельную избу, рассорившись из-за карточного выигрыша с жадюгой Зыряновым — хозяином избы, где до этого жил на постое, — и быт его оставлял желать много лучшего. В избе было грязно, из незаконопаченных щелей дуло, повсюду сновали тараканы, печка дымила — он так и не научился управляться с нею, — обеда никто не стряпал, по двору, забираясь через дыры в заборе, бродили соседские куры и свиньи, а его любимец сеттер скулил, некормленный... Идиотизм деревенской жизни всегда угнетал его, но у Зыряновых он по крайней мере за свои восемь рублей имел всегда чистую комнату, кормежку, стирку и чинку. А какие котлеты были, какие шаньги, какой самогон — чистый, что слеза!.. Он уже начал раскаиваться, что удрал от Зыряновых. С другой стороны, на отдельной квартире никто не лез с глупыми разговорами, не выспрашивал, чего он тут ищет, и можно было не опасаться за сохранность бумажника. Однако необходима была прислуга.</p><p class="p">Он потолковал с деревенскими — те уважали его, потому что он несколько раз по-соломоновски мудро рассудил их идиотские споры из-за козы и дров, — и ему обещали приискать хорошую, работящую бабу. Но дни шли, а бабы не находилось: крестьяне, несмотря на свое в общем хорошее отношение, опасались посылать к нему в услуженье своих жен и дочерей, потому что дура Зыряниха всем разболтала о некоем невинном инциденте на сеновале. Вдовы же все, как на подбор, были избалованные и жадные и запрашивали такую плату, что он за голову хватался. А изба меж тем приходила во все большее запустение. Он обносился, изголодался и был близок к отчаянию. Самое же обидное, что золотишко в проклятой Шуше оказалось дрянное, водилось его там до смешного мало, и легенды о вот эдаких самородках, которыми его сманили в Шушу словоохотливые старатели, вызывали у него теперь лишь горький смех. Или он неправильно определил место? Но ведь карта, которую он купил у них за пятнадцать рублей («Только потому, Ильич, что господин вы понимающий и имеете сочувствие, а мы уж себе намыли — внукам хватит!»), была подробной и точной; он допускал, конечно, что его вульгарно нагрели, но консультировался со знакомым студентом-почвоведом: тот клялся, что земля вокруг Красноярска была набита бесценными ископаемыми! Настроение у Ленина портилось. Поэтому, когда однажды к нему зашел знакомый мужик Федот и сказал, что есть на примете баба, согласная идти к нему в прислуги и готовая взять за труды недорого, он очень обрадовался.</p><p class="p">— Превосходно! — воскликнул он, потирая руки. — Ты скажи ей, братец, пусть завтра же и приходит.</p><p class="p">— Вот только, барин, она это... — Федот замялся.</p><p class="p">— Что «это»? Не мямли, братец. На передок легка, что ли? Так это ничего. Я чужд буржуазным предрассудкам.</p><p class="p">— Каторжница она была, Надька-то, — хмуро сказал мужик. — Теперь на поселении.</p><p class="p">— Каторжница? — испугался Ленин. Кроме политических — за небольшим исключением милейших людей, с которыми можно было сыграть в карты и побеседовать о парижской жизни, — в Шушенском жило полным-полно уголовных. — Нет, братец, мне каторжницы не надобно. Лучше другую поищу.</p><p class="p">Но еще через пару дней, после того как при попытке сварить себе щей опрокинул кипящий чугунок и едва не поджег избу, измученный горожанин был вынужден сдаться.</p><p class="p">— Ладно, — сказал он Федоту, — присылай свою каторжницу.</p><p class="p">— Да она, барин, ничего, — успокаивал его добрый Федот. — Хучь и воровка, да не городская фря. Сама из деревни родом, а после в прислугах жила. Всякую работу по дому знает и за скотиной ходить не разучилась.</p><p class="p">На следующее утро, ни свет ни заря, лай сеттера разбудил его. В двери кто-то стучался — робко, но настойчиво. Чертыхаясь, Ленин слез с печи, сунул ноги в обрезанные валенки (ах, что бы сказали его парижские подруги — m-lle Жанетта и m-lle Жоржетта!) и поплелся открывать. Отодвинув засов, он увидал низенькую, квадратную женщину, стоявшую на крыльце и теребившую концы платка. Она была довольно молода, широколица, бледна картофельной бледностью, шмыгала носом, и глаза у нее нехорошо бегали. Но деваться было некуда, и он пригласил ее входить. Она прошла в комнаты, сбросила потертую шубейку, потрепала по голове собаку — к удивлению Ленина, сеттер не отпрянул, а стал ластиться к ней. Уперев руки в крутые бока, она деловито огляделась кругом.</p><p class="p">— Сперва тут надо полы помыть, — сказала она наконец и стала засучивать рукава. — Вы, барин, подите погуляйте пока с собачкой. Или на печь залазьте, чтоб под ногами не путаться.</p><p class="p">— Я лучше на печи полежу, если не возражаешь, — сказал он, не желая оставлять чужого человека — воровку! — в доме без присмотра. — Да ты скажи, голубушка, как тебя зовут?</p><p class="p">— Надей кличут.</p><p class="p">— Вот и прекрасно, — сказал он мягко, как всегда разговаривал с женщинами, какого бы происхождения они ни были. — А я Владимир Ильич. Я тебя, голубушка, не обижу. Работай себе спокойно и на меня не обращай внимания.</p><p class="p">Она, дернув плечом, что-то проворчала, чего он не разобрал. Постепенно, наблюдая за ней, он успокоился: баба все делала проворно, аккуратно, тряпки и метлы так и летали в ее руках. Она действительно не обращала на него ни малейшего внимания. Высоко подоткнув юбку, шлепала по полу босыми ногами, белыми и крепкими, как тумбочки. Походкою она напоминала упрямую деревенскую лошадку. Озабоченное лицо ее разгладилось, она казалась вполне довольной. Страшна как смертный грех, бедняжка... Против низшего сословия он, воспитанный кухаркою, никаких предрассудков не имел, но одно дело — томная, затянутая, смазливая горничная, и совсем другое — мужичка с красными руками. А она усердно скребла, чистила, мела, вытрясала, выколачивала; увлекшись работою, даже начала мурлыкать под нос какую-то сентиментальную городскую песенку. «Ну, какая же это воровка, — подумал он, — просто бедная заблудшая душа, сбитая с пути, надо думать, завитым бараном-приказчиком».</p><p class="p">Покончив с уборкой, Надежда так же ловко и споро перемыла посуду, истопила печь, наколола лучину для самовара, сбегала к соседям за курицей и сварила щей. Шутки ради он пригласил ее с ним отобедать и не мог сдержать улыбки, когда она отказалась с таким ужасом, словно он предложил что-то непристойное.</p><p class="p">— Бельишко давайте, барин, — сказала она и смущенно переступила с ноги на ногу. — Постираю.</p><p class="p">— Да ты сядь, Надюша, отдохни малость. Уморилась ведь. Целый день на ногах.</p><p class="p">— Ничего, барин, я крепкая.</p><p class="p">— Не называй меня барином, не люблю. Сказано тебе — Владимир Ильич.</p><p class="p">— Ильич, — повторила она и робко улыбнулась. </p><p class="p">«Что за милая, простодушная улыбка», — подумал он.</p><p class="p">— А скажи мне, Надежда... За что ты здесь? Что ты сделала?</p><p class="p">— Ах, барин... Ильич... — она наконец присела на стул, на самый краешек, готовая в любую секунду вскочить, — на что вам это знать? Вы не бойтесь, я у вас ничего не украду.</p><p class="p">— А я и не боюсь.</p><p class="p">— Я и не убийца какая, не подумайте!</p><p class="p">— Да за что ж тебя судили? Я от тебя не отстану, пока не скажешь, — шутливо пригрозил он. — Страсть какой любопытный я человек.</p><p class="p">— Ох... — она потупилась, потом вскинула на него свои большие водянистые глаза — его поразило их осмысленное и печальное выражение — и заговорила нехотя, но покорно: — В прислугах я была, у купца...</p><p class="p">— Я уж догадался. И тебя, разумеется, совратил приказчик из лавки? Он тебя заставил обокрасть хозяев?</p><p class="p">— А вот и не угадали, — обиженно возразила она. — Никакой приказчик меня не своротил. Я, ежели хотите знать, девушка.</p><p class="p">— Н-да? — он внимательным взглядом окинул ее с ног до головы. — Пожалуй, верю. Ну так что ты натворила?</p><p class="p">— Началось-то все с хозяйского сыночка...</p><p class="p">— А! Так все-таки был мужчина?</p><p class="p">— Какой мужчина — восемь годочков! Это я про младшенького сынка говорю... Как-то убиралась я в комнатах и вижу: сидит дите, в ручонках карандаш и бумагу держит и плачет, прям заливается слезами... Что, спрашиваю, вы плачете, барчук, обидел кто? А он мне: Надя, учитель велел вон ту вазу с яблоками к завтрему нарисовать, чтоб была точь-в-точь живая, а у меня ничегошеньки не получается... Глянула я: точно, на буфете ваза стоит хрустальная. А барчук показывает мне бумагу-то: каляки какие-то кривые, на вазу не боле похоже, чем на яичницу... Руки-то, чай, не из того места растут. Я б и то лучше нарисовала. Что трудного — смотри да рисуй, где круглое — рисуй круглое, где длинное — длинное, чтоб было похоже. А учитель у него строгий был, сердитый. И уж так мне жаль стало барчука! А давайте, говорю, барчук, я попробую. Он и дал мне в руки карандаш-то, показал, как держать. Я и нарисовала ему вазу энтую, с яблоками. На другой день приходит — спасибо тебе, Надя, говорит, учитель шибко хвалил, теперь велит нарисовать петуха... Я и петуха ему нарисовала. Это потрудней маленько. Вроде сызмальства — я ж деревенская — петуха видала, а как рисовать — не помню, какой он из себя. Пошла тогда на птичий двор, поглядела да нарисовала петуха. И стала я за барчука картинки рисовать всякие, а учитель его все пуще хвалил. А у меня эдак ловко стало получаться — сама диву давалась. Надо бюст гипсовый — рисую бюст гипсовый, надо лошадь — рисую лошадь...</p><p class="p">— Как ты длинно рассказываешь! Петух, лошадь... Этак ты никогда до сути не доберешься.</p><p class="p">— Сами спрашивать изволили... А как-то раз старший сынок — студент он был — увидал, как я самовар рисую. Усмехнулся и спрашивает: что, Надя, с натуры пишешь? Я говорю: нет, самовар рисую. Он: зачем? Я: для своих надобностев. Только он не поверил, студент-то, и выпытал у меня, что я за младшего его брата урок делаю. Потом спросил меня, знаю ли грамоте. Не знаю, говорю, да для этого грамоты не нужно, чтоб похоже нарисовать. Задумался старший барчук о чем-то и ушел. А после позвал меня к себе в комнату. Показывает бумагу гербовую, а внизу бумаги закорючка стоит. Можешь, спрашивает, нарисовать точно такую закорючку, чтоб никто не отличил? А что тут хитрого? Я ему мигом срисовала закорючку-то. Сперва на простую бумажку, потом на гербовую... Рази ж я тогда знала, что это вексель?</p><p class="p">— Так ты квалифицированная мошенница! — с невольным уважением произнес Владимир Ильич. Ему живо вспомнился собственный горький опыт.</p><p class="p">— Не понимала я тогда этого ничего. Много я для барчука закорючек рисовала, и все было шито-крыто. Потом уж помаленьку стала понимать. Чай, не дура. Но куда ж денешься?</p><p class="p">— И вас разоблачили?</p><p class="p">— Не тогда. Сбежал барчук-то, как набрал бумажек гербовых. Отца почитай что разорил. А на меня все одно никто не подумал. Служила, как раньше. И вот иду как-то из лавки, и кто-то меня за рукав хватает... Он это был, барчук-то, только переодетый и с усами приклеенными. Молчи, говорит. И повел меня в один дом. А там дружки его сидели — разбойники. Он ведь по дурной дорожке пошел... Он им говорит: вот эта девушка какую хошь бумажку нарисовать может, да так, что никто не отличит. А они давай над ним смеяться — да рази, говорят, эта дура темная может ассигнации рисовать? А он меня усадил, карандаш, краски дал, велел рисовать... Они поглядели и говорят: ладно, мол, годится, будем ее учить нашему делу фальшивомонецкому. Уж так я испужалась — слов нет! А только заставил он меня. Откажешься, говорит, — расскажу в полиции, кто векселя фальшивые рисовал... Ушла я с места, стала у них на тайной квартире жить и учиться ихнему ремеслу. Ассигнации, пачпорта фальшивые правила, другие бумажки... Кличку они мне дали: Надька Минога... Так я и сбилась с пути-то. Но сколь веревочке не виться — а концу быть... — Она прерывисто вздохнула. — Накрыли нашу малину.</p><p class="p">— Жаль, жаль... То есть хорошо, хорошо...</p><p class="p">— Главари-то наши все убежать успели. Схватили нас только двоих — меня и еще мужика одного. А он — добрая душа, дай Бог ему здоровья, — пожалел меня. Она, говорит, только подручная была, квартиру убирала да стряпала. Вы, говорит, поглядите на нее — рази этакая деревенщина может фальшивые бумажки делать? Век буду за него Богу молиться... — Она истово перекрестилась, глядя на засиженный мухами образ. — Присудили мне совсем немного годков... Вот, Владимир Ильич, и вся моя история.</p><p class="p">— Ладно, Надежда. Всякий может оступиться. Мне до этого дела нет. Будешь хорошо работать — я тебя не обижу.</p><p class="p">— Глаза-то у вас, барин, — добрые-добрые...</p><p class="p">— Ах, брось. Не пора ли самовар ставить?..</p><p class="p">И они зажили душа в душу. В доме воцарились чистота и уют. Надежда все перестирала, перештопала, законопатила щели, наладила печку, хитрым способом извела тараканов, привела мужиков починить забор; она была аккуратна, расторопна, превосходно стряпала. Несколько недель спустя он устроил ей проверку: оставил под столом десятирублевую ассигнацию и ушел из дому. Когда он вернулся, изба была тщательно прибрана, а бумажка, аккуратно сложенная, лежала на столе.</p><p class="p">Ленин давно уже придерживался мнения, что всякий талант должен быть поставлен на службу делу. Он просил Надю рисовать различные предметы — кухонную утварь, животных, деревья; убедившись, что она не солгала и действительно умеет добиваться стопроцентного сходства с натурой (ни фантазии, ни художественного вкуса в ней не было ни на грош, но копиистом она оказалась превосходным), он перешел к подписям и почеркам — и тут было, бесспорно, большое дарование. Уже тогда он стал подумывать о том, чтобы забрать Надю с собой, когда будет уезжать из Шушенского. А вскоре обнаружилось, что девушка обладает еще одним талантом...</p><p class="p">Как-то вечером — она скипятила самовар, подала на стол и уже собиралась уходить — он от нечего делать предложил ей сыграть в дурачки. Поломавшись для приличия, она согласилась. Они сыграли раз, другой, третий — он все оставался в дураках. На четвертом круге, подняв глаза от карт, он с удивлением заметил, что Надя не отрывает пристального взгляда от рубашек.</p><p class="p">— Что ты так смотришь? Она смутилась:</p><p class="p">— Ох, Ильич, вы уже простите меня Христа ради! Не на интерес ведь играем, а так, для души... Привычка дурная. Я ведь с первого разу-то все рубашки запомнила: где пятнышко какое, где уголочек погнут... Разбойники-то мои все, бывало, вечерами в карты режутся. Ну и меня обучили. Говорили, я к этому способная. И запоминать, и передергивать, и ходы подсказывать, ежели игра парная. И в покер могу, и в штос, и в винт, и даже в этот, как его... в бридж.</p><p class="p">— Ах, Надюша, дорогой ты мой, матерый человечище! Сколько ж в тебе таланта, а?! Ну-ка, ну-ка, продемонстрируй мне...</p><p class="p">За всю жизнь ему никогда еще не попадался такой партнер — чуткий, послушный, все угадывающий с полуслова. Разумеется, тонкостям шулерского ремесла ей еще нужно было учиться, учиться и учиться.</p><p class="p">И она училась — охотно и с удовольствием. «Нельзя, никак нельзя бросить ее здесь, — думал он, — это все равно что драгоценную жемчужину оставить валяться в навозе». Однако чтобы выводить Надежду в свет, необходимо было проделать огромную работу по шлифовке этого бриллианта: привить ей хорошие манеры, научить разговаривать с приличными людьми, одеваться, вести себя за столом и все в таком духе. Тут у них дела шли туже, и новоявленный Пигмалион едва удерживался, чтобы не выругать бестолковую Галатею. У него подчас в голове не укладывалось: почему человек, в два урока освоивший правила баккара, не в состоянии запомнить, как обращаться со столовыми приборами?</p><p class="p">— Надя! Сколько раз тебе говорить?! Не подставляй хлеб под ложку.</p><p class="p">— Так пролить же можно.</p><p class="p">— А ты не проливай. Зачем черпаешь с верхом? Боишься, голодной оставлю? Лучше меньше, да лучше. Все в рот.</p><p class="p">— Не умею я по-господски есть. Никогда у меня ничего не получится.</p><p class="p">— Это что за пораженческие настроения?! — возмутился он. — Все у тебя получится. Только рот не утирай передником. И не чавкай. У меня от твоего вида аппетит пропадает.</p><p class="p">— Я не чавкаю.</p><p class="p">— Надюша, милая, вилка существует не для того, чтоб ею в зубах ковырять.</p><p class="p">— Ах, да пропади она пропадом, ваша вилка... — Она швырнула вилку на стол, уткнулась лицом в руки и громко всхлипнула.</p><p class="p">— Ну-ну, не падай духом. — Он погладил ее по спине, вздохнул. — Во тьме ночной пропал пирог мясной... Ладно, на сегодня довольно благородных манер. Что там у нас дальше по расписанию?</p><p class="p">— Этот... алфавит.</p><p class="p">— Да, верно. Оставь посуду, после уберешь... Вот гляди — это какая буква?</p><p class="p">— Добро.</p><p class="p">— Правильно, молодец! Как все-таки наше общество недооценивает способности женщины! А теперь нарисуй-ка мне «ять».</p><p class="p">— Пжалста. — Почерк у нее был щегольский, округлый.</p><p class="p">Грамота давалась ей в общем неплохо — правда, в силу специфической направленности ума писать она обучилась прежде, чем читать, — а успехи в счете и вовсе поразили Ленина. Он даже стал подумывать о том, чтобы научить ее иностранным языкам...</p><p class="p">К лету Надежду было не узнать. Она превосходно читала, писала, считала на счетах, назубок знала таблицу умножения, была тверда в географии и с энтузиазмом предвкушала день, когда возьмется за латынь и греческий. Архиполезный человечек, однако! Память и внимательность были развиты превосходно. По-прежнему скверно было только с этикетом, но тут без практики трудно. Может, когда он оденет ее по-городскому и она снова увидит модные лавки — жила же она когда-то в городе! — в ней наконец заговорит голос пола, проснется вкус к изящному, и она инстинктом почувствует, как держать себя. Не так уж все безнадежно. В руку она давно уже не сморкается.</p><p class="p">С золотом так ничего и не вышло. Пора было уезжать. Несмотря на наладившийся быт, Шушенское осточортело ему хуже горькой редьки. Он истосковался по цивилизации. Париж, Париж! Суета и гуща настоящей жизни! Уличные кафешки, кабаре, рулетка, биржа, девочки в черных чулках!</p><p class="p">— Надюша, присядь-ка. Мне с тобой серьезно поговорить нужно.</p><p class="p">— Слушаю вас, Владимир Ильич.</p><p class="p">Она села на табурет, поерзав, оправила юбку, сложила руки на животе — благодаря миндальному мылу и отрубям они были уже не так красны — и попыталась придать себе вид благовоспитанной дамы. Он поморщился, вздохнул: хоть сейчас в цирк...</p><p class="p">— В город я собираюсь.</p><p class="p">— За покупками? — обрадовалась она.</p><p class="p">— Нет, милая. Насовсем. Не век же в деревне сидеть.</p><p class="p">Он с ужасом увидел, как она побледнела и закусила губу; из светлых глаз покатились крупные слезы.</p><p class="p">— Что ж... дело хорошее... — с трудом выговорила она. — Конечно, что вам тут... Оно конечно...</p><p class="p">Уж не питает ли она в отношении него несбыточных иллюзий? До сих пор эта мысль не приходила ему в голову. Но тотчас он с облегчением понял, что ошибся.</p><p class="p">— Только вот... — продолжала она, — как же вы-то будете? Ведь вы, Ильич, как дите малое — не можете за собой ходить... Кто ж вам постирает, кто обед приготовит, как вы любите? Вон у вас клифт опять порвался под мышкой — кто ж зашьет?</p><p class="p">— Забудь ты свой жаргон! Пиджак, а не клифт...</p><p class="p">— Прямо сердце у меня разрывается, как подумаю...</p><p class="p">— Надежда, да ты никак вообразила, что я тебя здесь брошу? Поедешь со мной.</p><p class="p">— Ох, Ильич! — Она порывисто вскочила, попыталась поцеловать ему руку — он едва успел ее отдернуть.</p><p class="p">— Ты эти рабские замашки брось! — сказал он сердито.</p><p class="p">— Извиняюсь. — Она уселась обратно. По лицу ее блуждала недоверчиво-восторженная улыбка.</p><p class="p">— Не «извиняюсь», а «извините», — машинально поправил он ее. — Короче говоря, Надежда, собирайся. Дел у нас еще много. Надо паспорт тебе выправить.</p><p class="p">— А куда мы поедем? В Питер?</p><p class="p">— Бери выше. В Европу поедем. Париж... Капри...</p><p class="p">— Ах, как же в Париж? — испугалась она. — Я ведь по-ихнему, кроме «мерси», ничего еще не знаю.</p><p class="p">— Это дело наживное.</p><p class="p">Однако после нескольких недель, убитых на организационные хлопоты, выяснилось, что повезти ссыльную уголовницу Надьку Миногу с собой в Европу будет не так-то легко, даже если подмазать чиновников. Был один способ обойтись без взятки, но... Хотя — почему бы и нет?..</p><p class="p">— Ильич, о чем вы задумались?</p><p class="p">— О тебе, Надюша... Похоже, придется нам с тобой пожениться.</p><p class="p">— Как это?!</p><p class="p">— Да ты не переживай. Понарошку. Чтобы тебя в мой заграничный паспорт записали.</p><p class="p">— А... а нас повенчают?</p><p class="p">— Не говори чепухи. Не собираюсь я с тобой венчаться. Запишемся у пристава. — И, взяв гитару, он шутя спел ей свой любимый романс: «Нас венчали не в церкви, не в венцах со свечами...»</p><p class="p">— Поете вы, Ильич, хорошо, жалостно, как на клиросе... Да только лучше бы повенчаться, — сказала она, упрямо поджав губы. — Что ж мы, как собаки какие — распишемся, и все?</p><p class="p">— Как ты глупа, Nadine! Ведь мы не будем жить как муж и жена. У нас будет фиктивный брак. Деловой союз, поняла?</p><p class="p">— Это все равно. Я девушка честная.</p><p class="p">И как он ни бился, как ни пытался ее переупрямить — все впустую! В этом вопросе Надя была тверда, как скала, и он вынужден был согласиться на эту комедию. Один из соседей — политический ссыльный Энберг — сделал им обручальные кольца из двух медных пятаков (даже на кольца жених не намыл золота!), и двадцать второго июля Владимира Ильича Ленина и Надежду Константиновну Крупскую обвенчали в Петропавловской церкви. С того дня в целях конспирации она стала говорить ему «ты».</p><p class="p">Он не пожалел о женитьбе. Четыре года Надежда помогала ему в его коммерческих прожектах; а уж когда он сошелся с большевизанами — оказалось, что она просто незаменимый человек для иных революционных делишек. Шифровки, поддельные документы — на все руки жена его была дока...</p><p class="empty-line"/><p class="p">Но ничего этого, конечно, Ленин Горькому не рассказал. Вместо этого он спросил задушевно, заложив руки в жилетные карманы:</p><p class="p">— Батенька, вы любите народ?</p><p class="p">— До безумия, страстно. Не мыслю без народа своей жизни, — ответил Горький. На глазах его выступили слезы.</p><p class="p">— А вам бы не хотелось сделать для народа что-нибудь полезное?</p><p class="p">— Но я пишу о нем, — сказал Горький. Он был так удивлен, что слезы его сразу высохли. — Разве этого мало?</p><p class="p">Владимир Ильич решил, что экивоков было уже достаточно, и задал прямой вопрос:</p><p class="p">— А в революционную партию не желаете вступить?</p><p class="p">— Ах, вы совсем как Савва Морозов! — сказал Горький, оживляясь. — Тот мне все уши прожужжал — надо, мол, идти в революционную партию... Вообразите, он каждый день приходит ко мне и предлагает денег, чтоб я отдал их революционерам. Он даже хочет оформить в мою пользу страховой полис на сто тысяч! Но я, конечно, отказываюсь: во-первых, неприлично, а во-вторых, я не знаком ни с одним революционером... У Марьи Федоровны, правда, был один такой знакомый, но о нем уже давно ни слуху ни духу. А я бы так хотел с ним встретиться! Я мечтаю об этом дни и ночи.</p><p class="p">Сведения эти настолько противоречили утверждениям Дзержинского, что Владимир Ильич растерялся. «Морозов сам хочет содержать революционеров... А революционная агентэсса Машенька Андреева говорит, будто не знает никаких революционеров, и Железный Феликс сам перестал привлекать ее к работе... Кто кого водит за нос: Железный — меня, или Андреева — всех нас?»</p><p class="p">— Но для чего Морозов хочет дать денег партии? — спросил он.</p><p class="p">— Ума не приложу, — ответил Горький, разводя руками. — Должно быть, сочувствует их идеям. Ведь он ужасно передовой человек.</p><p class="p">— А скажите мне, Максимыч... В каких отношениях Марья Федоровна с Морозовым?</p><p class="p">— В отличных! Машенька, Савва и я — мы все в превосходнейших отношениях.</p><p class="p">«В превосходнейших! Вам еще только Шурочки Коллонтай недостает для полного Эдема», — подумал Ленин. Вообще во всем этом было столько загадок, что он решил не форсировать события и провести самостоятельное расследование. Начинать, как он догадывался, следовало с Машеньки.</p><p class="empty-line"/><p class="p">— Ух, как это было!.. У меня такое чувство, словно я, как Каренина, побывала под поездом... — проговорила Андреева, в изнеможении откидываясь на подушки.</p><p class="p">Историю этой Анны Карениной Ленину пересказывала Надежда Константиновна: выучившись грамоте, она глотала всевозможные толстенные книги запоем, одну за другой, и частенько, вернувшись домой, он заставал ее над раскрытой книгой в слезах и задумчивости.</p><p class="p">«Хитрая баба», — подумал Ленин. Удивительно, но красивая, страстная и изобретательная г-жа Андреева была ему совершенно не симпатична. «Ложится в постель с первым встречным! — думал он, проявляя обычную мужскую непоследовательность. — Бессовестно изменяет такому хорошему человеку, великому (так говорят знающие люди) писателю земли русской, своему любовнику, гражданскому мужу, можно сказать; хуже того — изменяет МОЕМУ другу!» Он прищурился и сказал:</p><p class="p">— А теперь объясните мне, милочка...</p><p class="p">— Что, Ильич?</p><p class="p">— Куда вы девали деньги, которые Савва Морозов вам отдавал специально для передачи революционерам? Во тьме ночной пропал пирог мясной! А?.. Ну-ка, лежать смирно! — с напускной свирепостью прикрикнул он, когда перепуганная актриса торопливо потянулась за сорочкой, по-видимому рассчитывая быстренько одеться и удрать.</p><p class="p">— Откуда вы знаете про деньги? — пролепетала она.</p><p class="p">— Я все знаю, Каренина ты моя.</p><p class="p">— Но я... я же отдавала их товарищу Железному...</p><p class="p">— Но ведь не все, так? Далеко не все? Львиную долю Саввиных подношений вы оставляли себе на булавки? Партия получала от силы процентов двадцать?</p><p class="p">— Двадцать пять, — с обидой сказала Андреева.</p><p class="p">— Да, да, — проворчал Ленин, окончательно разочарованный в человечестве. — Половина — это я бы еще, пожалуй, понял. Но три четверти — это, как говорится, высшая и последняя стадия...</p><p class="p">— Но, mon cher, мне же нужно как-то жить!</p><p class="p">— А почему, позвольте спросить, вы перестали заниматься этим делом? Ведь Савва, насколько я понимаю, отнюдь не утратил желания финансировать революцию.</p><p class="p">— Он... он стал настаивать, чтоб я свела его с товарищем Железным напрямую, — ответила Андреева. — А я не могла этого сделать, вы же понимаете...</p><p class="p">— Понять не трудно. При их встрече сразу бы выяснилось, что три четверти денежных сумм сгинули без следа.</p><p class="p">— И мне пришлось сказать ему, что товарищ Железный больше не выходит со мной на связь... Тогда он перестал давать деньги... Да и Алеша ревнует. А Савва теперь пристает к Алеше со своими деньгами! Он думает, что Алеша должен знать каких-нибудь революционеров, раз он такие книги пишет... Но Алеша их не знает, я ему ничего не говорю про товарища Железного: ведь ежели Алеша с ним познакомится и станет передавать Саввины деньги — рано или поздно обнаружится, что я... Ужасное положение, просто ужасное!</p><p class="p">— Вы, похоже, ждете, что я вам посочувствую? — усмехнулся Ленин.</p><p class="p">— Да. Жду. Пожалейте меня, Ильич... — Она положила руку ему на грудь. — Ведь вы меня не выдадите?</p><p class="p">Взор ее из-под длинных ресниц был лукавый, томный... Пришлось пожалеть.</p><p class="empty-line"/><p class="p">Он решил: совершенно незачем докладывать Дзержинскому о том, как Андреева распоряжалась Саввиными подношениями. В конце концов, он вывел ее на чистую воду, но промолчит об этом из рыцарства.</p><p class="p">Воротившись к себе в гостиницу, он продиктовал Надежде Константиновне шифровку: «ЖЕЛЕЗНОМУ — СТАРИК (это была его кличка, которую он находил забавной — Ленин любил трунить над собственной ранней лысиной, признаком мудрости и чувственности): результате продолжительных утомительных разорительных переговоров Купец согласен давать деньги зпт Писатель согласен вступить партию тчк». Через два дня жена прочла ему лапидарную ответную шифровку: «ЖЕЛЕЗНЫЙ — СТАРИКУ: жду деньги».</p><p class="p">— Он, кажется, мог бы написать «благодарствуйте» или «поздравляю», — сказала Надежда Константиновна. — Невежа какой.</p><p class="p">— Да уж... Нет чтобы компенсировать мне затраты на вербовку! — в сердцах сказал Ленин: он искренне позабыл в ту минуту, что никаких затрат не было, как и вербовки. — Зато ты у меня умница... Прочла б ты, Надюша, какую-нибудь книжку Горького да рассказала мне. А то неудобно: вдруг он что-нибудь спросит.</p><p class="p">— Ох, Ильич, как на духу тебе скажу: скучные его книжки, непонятные. У Толстого и Эжена Сю куда как лучше. А человек-то он хороший, душевный, дай ему Бог крепкого здоровья... А полюбовница его — актриска-то — стерва, Бог ее накажет...</p><p class="p">— Надюша, перестань тыкать мне в нос своего боженьку. Я тебе сто пятьдесят раз объяснял, что никакого бога нету. Это медицинский факт. Мы с тобой состоим в передовой партии и должны быть атеистами.</p><p class="p">— А как же товарищ Железный? Он же, говорят, монахом был. И теперь чуть что — адские муки поминает и геенну огненную.</p><p class="p">— Его в детстве ксендзы охмурили и сбили с панталыку, — сказал Ленин. — Поэтому он такой... железноголовый.</p><p class="p">До восьми лет Ленин, как все дети, верил в Бога и молился ему. Но о чем бы он ни попросил Бога — Бог никаких его просьб никогда не исполнял. Даже когда Алена Родионовна сломала ногу, Бог не захотел исцелить ее. Нога срослась плохо, и Алена Родионовна, самый добрый человек на свете, навсегда осталась хромою. Тогда Ленин решил, что Бог злой, и стал писать его с маленькой буквы. Учитель закона Божьего отругал Ленина и обещал, что Бог его накажет. Но Бог и тут никак не проявил себя. Ленин понял, что Бога нет, и никогда бы больше к этому скучному вопросу не возвращался, если б окружающие не заводили с ним споров. (Что же касается Дзержинского — конечно, его считали атеистом, и он поддерживал в окружающих это убеждение. Но в глубине души он навсегда остался истово верующим человеком, и Бог его был под стать ему самому — суров и справедлив, с горячим сердцем и холодной головою.)</p><p class="p">— Все талдычат про грехи да царствие небесное, — горько сказал Ленин, — а сами втихую водочку жрут и девок щиплют. Знал бы Иисус Христос, кто от его имени делами заправляет, — в гробу бы перевернулся. Он-то был неплохой человечище. Людей кормил и баб жалел.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">— Максимыч, дело в шляпе. Я вас сейчас приму в ряды революционеров.</p><p class="p">— Так вы...</p><p class="p">— Да. Я — лицо уполномоченное.</p><p class="p">— Я чувствовал, я знал! — обрадовался Горький.</p><p class="p">— Отныне у вас будет кличка, как у всех порядочных людей. Мы предлагаем вам кличку «Вкусный».</p><p class="p">— Польщен чрезвычайно.</p><p class="p">— Так что смело берите у вашего Саввы денежки. Только берите напрямую, без посредничества Марьи Федоровны, ладно? Незачем обременять даму этими скучными материями... Кстати, познакомьте и меня с ним.</p><p class="p">И Владимир Ильич был честь по чести представлен Морозову. Савва ему понравился. Он был абсолютно не похож на карикатурного купчину-эксплоататора: одет по-европейски, лицо умное, но не хитрое, а какое-то задумчивое. Ленин отчаянно ему завидовал, но не черной завистью, а белой, продуктивной. Он и сам хотел бы быть крупным предпринимателем. «Ничего, стану императором — дам Савве развернуться. Пусть поднимает промышленность и развивает коммерцию. Окупит свои вложения с лихвой».</p><p class="p">— Наконец-то я вижу перед собой настоящего революционера, — говорил Морозов. — Очень, очень рад.</p><p class="p">— А почему вы так сочувствуете революционерам? — спросил Ленин.</p><p class="p">— У меня имеются на то веские причины, — ответил Морозов.</p><p class="p">— Можно полюбопытствовать, какие именно?</p><p class="p">— При всем уважении к вам — не могу их назвать. Я объясню это только первому лицу в вашей партии. Ведь вы — не первое лицо?</p><p class="p">Владимир Ильич скрепя сердце вынужден был признаться, что покамест не первое.</p><p class="p">— Вы сведете меня с первым лицом?</p><p class="p">— Сведу, сведу, — буркнул Ленин. Ему почему-то не хотелось знакомить Морозова с Дзержинским. Он сам не мог себе объяснить, отчего сама мысль об этом рождает в его душе дурные предчувствия. «Чортова конспирация, — подумал он, — того и гляди с ума сойдешь: намеки, суеверия...»</p><p class="p">— У г-жи Андреевой был один знакомый революционер, но, как только я захотел с ним встретиться, он куда-то подевался...</p><p class="p">— Успокойтесь, Савва Тимофеевич. Теперь он от вас никуда не денется.</p><p class="p">— Вообще-то у меня есть подозрение, что она меня обманывает, — сказал Морозов. Лицо его сделалось так печально, что Ленин не выдержал и, хотя не любил соваться в чужие делишки, сказал:</p><p class="p">— Да любит она вас, любит. Не расстраивайтесь. Просто Вкусный ее ревнует очень.</p><p class="p">— Что? Любит?! — Морозов неожиданно расхохотался. — Милый мой, я никогда в жизни не был с этой дамой близок, и мне в высшей степени безразлично, кого она там любит... Она пыталась, конечно, соблазнить меня, но не имела успеха.</p><p class="p">— То есть как? — опешил Ленин. — Всякая собака знает, что Андреева была у вас на содержании, вы ее безумно любили, а Горький увел ее от вас.</p><p class="p">— Чушь и чепуха, — отрезал Морозов. — Мои контакты с нею имели исключительно деловой характер. Она вызвалась передавать революционерам деньги — я согласился. Теперь жалею: мне кажется, она присваивала половину этих сумм. (Ленин не стал его разочаровывать: пусть думает, что только половину.) Не ее я содержал, а Художественный театр и революцию.</p><p class="p">— Нич-чего не понимаю, — сказал Ленин, который и в самом деле ничего не понимал.</p><p class="p">— Когда вы занимаете в обществе определенное положение, — пояснил Морозов, — про вас непременно распускают идиотские сплетни, не имеющие ничего общего с действительностью. Вот ежели вы в будущем займете высокое положение — а я убежден, что займете, — сами убедитесь.</p><p class="p">— Вы полагаете?</p><p class="p">— Про вас начнут говорить и писать чорт знает что; все поступки выворотят наизнанку; черное назовут белым... Припишут вам мысли и дела, коих за вами сроду не водилось... Ваше рожденье, смерть вашу — все, все оболгут и исказят до неузнаваемости; правды о вас не будет знать никто и никогда.</p><p class="p">«Не может быть, — подумал Ленин. — Наверное, он все-таки преувеличивает». Ему была неприятна мысль о том, что какие-то сплетники и писаки начнут выдумывать о его жизни небылицы, когда он станет императором. «Нет, нет, не верю: он, должно быть, просто хочет отпереться от унизительного треугольника романа...»</p><p class="p">— Мария Федоровна сама говорила, что Горький ревнует ее к вам, — сказал он Морозову.</p><p class="p">— Разумеется, ей выгодно, чтоб ее считали моей любовницей, — сухо ответил Морозов. — В действительности общение с г-жой Андреевой всегда было мне неприятно до крайности.</p><p class="p">— А Горький-то хоть знает, что вы никогда не жили с Андреевой?</p><p class="p">— Он, как и все, попался на удочку сплетен. Да и ему лестно думать, будто он отнял ее у меня. Я же Горького искренне уважаю и пожелал бы ему не такой жены, а более порядочной и умной...</p><p class="empty-line"/><p class="p">Итак, поступления в кассу возобновились; более того, Морозов все-таки оформил страховой полис в пользу Горького, как Ленин ни отговаривал его от этого опрометчивого поступка. Ленин целыми днями ломал голову над тем, что побуждает Савву так отчаянно любить революционеров, но ни до чего не додумался; он подъезжал к Морозову так и эдак, но упрямый миллионер знай себе твердил, что объяснит это лишь первому лицу в партии, и требовал, чтоб его представили этому лицу как можно скорее. Ленин списался с Дзержинским, и тот предложил организовать встречу в мае, в каком-нибудь приятном местечке — в Канне, например. Морозов согласился.</p><p class="p">Накануне отъезда в Канн Владимир Ильич сидел в своем гостиничном нумере, разбирая бумаги и счета, когда к нему пришла посетительница под вуалью... Он отослал жену в спальню (вообще-то Надежда Константиновна спала в гостиной на диванчике); та повиновалась, но при этом фыркнула демонстративно громко — Андреева ей уж очень не нравилась.</p><p class="p">— Какая надобность привела вас ко мне, милочка? Я ведь человек женатый; вряд ли мы можем прямо здесь... Может, поедем в другое место? — Несмотря на то что Андреева врала на каждом шагу, он все же был бы не против. Ведь она не нравилась ему как личность, а не как женщина.</p><p class="p">— О, вы гигант, вы — монстр...</p><p class="p">— Так едемте! — сказал Ленин, ерзая.</p><p class="p">— Но я не за этим пришла, — ответила Андреева, откидывая с лица вуаль. — Я хочу просить вас...</p><p class="p">— О чем? — осведомился Владимир Ильич, постаравшись скрыть разочарование.</p><p class="p">— Вы едете в Канн с Саввой Тимофеевичем... Алеша сказал мне, что там вы будете встречаться с первым лицом в партии. Ведь это товарищ Железный, правда?</p><p class="p">— К чему вам это знать?</p></span>
