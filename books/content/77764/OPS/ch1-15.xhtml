<p class="p1">ГЛАВА 7</p>
</div><p class="subtitle">1914-1916: Ленин в Цюрихе. Август четырнадцатого. «Интернационал». Ленин становится патриотом, пробует себя в психоанализе и совершает подвиг. Танатос, Эрос и технигеский прогресс. Братство Кольца.</p><p class="empty-line"/><p class="p">Удачно провернув дело с Арманд и восстановив таким образом в партии боевой дух, деловой настрой и железную дисциплину, Феликс Эдмундович воспрянул духом и решил, что пора вплотную заняться подготовкой крушения династии Романовых. Ему было ясно, что для этого необходима какая-нибудь крупная заварушка, и он пробовал разные варианты, но они не давали того результата, на который он рассчитывал. (Он даже готов был признать, что с «Титаником» получилось не совсем хорошо: шуму много, а большинство все-таки выплыло. Правда, жалко было детей. Он не думал, что будет столько детей.)</p><p class="p">Наконец, просчитав все вероятности, он пришел к выводу, что оптимальный способ — организовать в Европе хорошую, затяжную, широкомасштабную войну. (Для него не имело значения, кто победит — в любом случае трон Романовых будет расшатан. Немцы и русские, на пару порабощавшие милую Польшу, были ему противны одинаково.) На этот случай у него был запасен человечек — молодой серб по прозвищу Принцип, которого он по случаю похитил из одной психиатрической лечебницы. Дзержинский вручил ему браунинг и отправил в Сараево, куда в скором времени должен был прибыть австрийский наследник престола. Все было продумано, ошибки исключались.</p><p class="empty-line"/><p class="p">— Леонид Борисович, война идет! — говорил Ленин Красину. — Мы должны принять в ней участие!</p><p class="p">— Н-да... — отозвался Красин и зевнул так широко, что едва не проглотил вместе с лимоном и серебряную вилочку (они с Лениным завтракали в скучном цюрихском ресторанчике). — А на чьей стороне вы желаете в войне участвовать?</p><p class="p">— То есть как это? — опешил Ленин. — Естественно, на нашей. Наших бьют! Сербов! Братушек-славян! Вы читали в газетах, какие демонстрации проходят в Петербурге у германского посольства? Наша партия, чорт ее дери, не может оставаться в стороне!</p><p class="p">— Для партии «наши» — это не славяне, а мировой пролетариат, — лениво возразил Красин и снова зевнул.</p><p class="p">Владимир Ильич был раздосадован: взыгравший в нем патриотизм не находил поддержки ни у кого из партийных товарищей. Да и товарищи-то чуть не все куда-нибудь разъехались. Дзержинский — во всяком случае, такова была официальная информация — знай себе томился на каторге; Лева Каменев со Свердловым, у которых вышли небольшие неприятности с полицией, отсиживались в ссылке; Кржижановский жил в Москве и занимался электричеством; Горький пребывал в России по своим литературным делишкам. От тех же, кто оставался с ним в Цюрихе, понимания ждать не приходилось. Балда Луначарский продолжал как ни в чем не бывало кропать скверные стишки, Зиновьев, оплакивая разлуку с Каменевым, с утра до вечера таскался по пивнушкам, Серго Орджоникидзе, которому славяне не были братьями, войной тоже не интересовался. О дамах и говорить нечего. Ленину же отчаянно хотелось послужить родине — но как? Пример доктора Богданова, ушедшего военврачом на фронт, не слишком вдохновлял его: он был человеком сугубо штатским и не представлял себя в окопах. Если говорить совсем честно, патриотизм его был вполне мелкобуржуазного свойства, и, если б у него имелись собеседники, с которыми можно было бы ежедневно за обедом ругать немцев и кричать о своей любви к многострадальной родине и славянским братушкам, он бы этим вполне удовольствовался; но собеседников не было, и он ощущал неудовлетворенность.</p><p class="p">А ведь из-за своих патриотических чувств он уже пострадал: начало войны застало его в Вене (он был там по делам чисто коммерческим, подвернулась партия презервативов), и Ленин, начитавшись газет и пылая праведным гневом, усугубленным двадцатью кружками пива, на улице нарочно толкнул какого-то бюргера, да еще и крикнул «Бей австрияков!», за что был арестован и доставлен в участок; вероятно, ему пришлось бы всю войну просидеть в тюрьме, если б за него не поручился старинный знакомый — Бауман-Мирбах, который как раз приехал в Вену на очередной конгресс. Освобожденный, Владимир Ильич тотчас вернулся в безопасную Швейцарию. Там ему было очень скучно. Душа его жаждала подвига — какого-нибудь такого подвига, который можно совершить в цивильном костюме и желательно не вставая из-за стола. От этого желания он весь извелся, плохо ел и начал худеть; и, что самое противное, ему начал постоянно сниться один и тот же навязчивый кошмар.</p><p class="p">Во сне его преследовал Дзержинский: то он просто гнался за ним по улицам с револьвером или алебардой, то сталкивал с крутого обрыва, то пытался надеть ему на шею веревочную петлю, то сбрасывал с крыши кирпич на голову; иногда злодей превращался в разных противных животных или сверхъестественных существ; порою он бывал тюремным надзирателем и отнимал у Ленина-узника его любимого ручного паучка, а иной раз, обернувшись профессором, заваливал Ленина на экзамене, задавая вопрос про отвратительный косинус. Тут же находился и косинус, похожий почему-то на личинку майского жука — белую, жирную, хрусткую при раздавливании. Владимир Ильич не привык к кошмарам: всю жизнь он видел, как правило, веселые и увлекательные сны. Эта непрекращающаяся погоня вымотала ему все нервы. Он не понимал, почему и для чего ему снится эта гадость.</p><p class="p">Как-то утром чорт дернул его рассказать про свой ужасный сон жене. Надежда Константиновна, которая в самых дальних глубинах души так и осталась простою бабой, отнеслась к этому очень серьезно: засыпала мужа вопросами о том, какие конкретно предметы ему снились, и, вооружившись сонником, растолковывала ему значение каждого из них. Однако ее пояснения мало что прояснили. Так, например, он узнал, что сон, приснившийся 11-го числа, исполняется в течение 11-ти дней и приносит радость, а приснившийся 16-го — не сбывается и никакого значения не имеет; но он видел один и тот же кошмар и 16-го, и 11-го! К тому же сонник толковал вещи разрозненно, лишая сон общего смысла; немного проку было в том, что видеть во сне палку означает беречь свои права, а петуха — попасть под подозрение; что ножницы сулят денежную прибыль, а нос — покровительство и богатство... И он продолжал по ночам вертеться в постели, вскрикивать и худеть; похоже, у него начиналась бессонница. Тогда встревоженная Надежда Константиновна сказала ему:</p><p class="p">— Ильич, ты бы к доктору сходил. Глядеть невмоготу, как ты маешься.</p><p class="p">Ленин терпеть не мог ходить по докторам. Он ответил жене сердито:</p><p class="p">— Еще чего!</p><p class="p">— Сходи, сходи! — настаивала Крупская. — К нервному доктору сходи. Как раз тут у нас практикует один нервный, я о нем в прошлом году в журнале читала. Он сны разгадывает. (Она имела в виду д-ра Карла Густава Юнга.) Может быть, он разгадает твой сон и заодно пропишет тебе порошочки какие-нибудь.</p><p class="p">— Знаю я ихние порошочки, — сказал Владимир Ильич.</p><p class="p">От Баумана он был наслышан, что д-р Фрейд — заядлый кокаинист — своим пациентам рекомендует кокаин как панацею от всех болезней. Но все же он задумался над советом жены. Конечно, живи он в этот период в каком-нибудь более приятном месте, чем Цюрих, он бы предпринял хороший вояж по веселым домам, и кошмары с бессонницей как рукой сняло бы; но в Цюрихе с его асфальтовой душою веселых домов не имелось, и тамошние проститутки были деловиты и серьезны, как банковские клерки. Был еще один проверенный способ борьбы с душевными травмами — умеренная выпивка. Но у этого способа имелся серьезный недостаток: начавшись умеренно, выпивка быстро превращалась в банальный запой, что только усугубляло дискомфорт. Промучившись еще пару недель, Ленин всерьез озаботился состоянием своего здоровья и написал Бауману письмо, в котором просил того высказать свое мнение относительно д-ра Юнга. Ответное письмо было полно замысловатых ругательств, из которых Ленин ничего не понял, кроме того, что ужасный д-р Юнг лечит совсем не так, как прекрасный д-р Фрейд. (Два этих светила, бывших когда-то в тесной дружбе, вот уж больше года как рассорились, чем и объяснялся столь нелестный отзыв.) «Не так» означало, по-видимому, что д-р Юнг не пичкает пациентов кокаином и не заставляет рассказывать всякие гадости о своих родителях. Тогда Ленин решился записаться на прием и отправился в знаменитую клинику Бургхельцли; но там ему сказали, что д-р Юнг в клинике больше не появляется, так как у него депрессия и запой, и принимает частным образом, в собственном доме на берегу Цюрихского озера.</p><p class="p">Ленин хотел было плюнуть на это дело, но ему было очень худо с перепою, и он уже почти месяц толком не спал; а когда ему все-таки удавалось отключиться, то ему тотчас являлся Железный Феликс с мясницким ножом в руке; поэтому, собрав остатки сил, он пошел по указанному адресу и увидел на берегу озера огромный дом, похожий на дворец. «Однако недурно эти психиатры заколачивают!» — подумал Ленин: он не знал, что у д-ра Юнга была очень богатая жена.</p><p class="p">У причала стояла роскошная яхта. На досках сидел здоровенный широкоплечий мужчина в тирольской шляпе и кидал в воду камешки. Ленин вежливо его поприветствовал (он знал немецкий язык почти как родной) и спросил, где тут можно найти д-ра Юнга.</p><p class="p">— Это я, — ответил мужчина, не оборачиваясь. — Чего вам угодно?</p><p class="p">— Вот хотел проконсультироваться.</p><p class="p">— Я нынче не принимаю, — сказал тот, — у меня депрессия.</p><p class="p">— Ну и что, у меня тоже.</p><p class="p">Д-р Юнг промолчал; Ленин подошел ближе, сел с ним рядом на доски и тоже стал кидать камушки. Так они сидели некоторое время в молчании, рассеянно наблюдая за расходящимися по воде кругами. Потом Ленин не выдержал молчания и спросил:</p><p class="p">— А отчего, доктор, у вас депрессия?</p><p class="p">— Я все время вижу сон, — сказал д-р Юнг печально, — один и тот же сон...</p><p class="p">— Какой? — из вежливости поинтересовался Ленин.</p><p class="p">— Мне снится наша кухарка, Фрицци. Она такая... такая большая и пышная женщина. Она стоит у кухонного стола спиной ко мне и чистит картошку; потом она роняет миску, нагибается, и я вижу ее ноги — такие белые, белые... Это ужасно. Я не могу понять, что все это значит, не могу осмыслить, что говорит мне мое бессознательное. Кого персонифицирует Фрицци — Цирцею, Еву или Елену Прекрасную? И эти две ноги, что они символизируют: врата рая или, быть может, Сциллу и Харибду? А миска — чаша Грааля или жертвенный сосуд? Я бы обратился к психоаналитику, но профессиональная гордость не позволяет мне сделать это...</p><p class="p">— Возможно, вам хочется ее... того, — робея, предположил Владимир Ильич.</p><p class="p">— Чего того? — не понял психиатр.</p><p class="p">— Ну, того... приласкать.</p><p class="p">— Чепуха, упрощенчество! Я не свожу либидо к сексу, как некоторые! — сказал д-р Юнг сердито. — Либидо есть психическая энергия вообще. А сны — всего лишь мифологемы, через которые с нами говорит коллективное бессознательное; их ни в коем случае нельзя трактовать буквально.</p><p class="p">Ленин ровно ничего из этой тарабарщины не понял, но по тому, как вспыхнули щеки доктора, сообразил, что попал в точку. Он повторил мягко, но настойчиво:</p><p class="p">— А вы, почтеннейший, все-таки попробуйте... Обнимите ее этак нежно, но решительно.</p><p class="p">— Вы думаете?</p><p class="p">— Уверен. А там уж ваше либидо само разберется, чего ему нужно.</p><p class="p">— Гм... — сказал психиатр. — А вы знаете, не исключено, что в этом вашем объяснении что-то есть... Я не совсем уловил, какой ассоциативный ряд привел вас к такой гипотезе, но... У вас оригинальное мышление. Вы не хотите всерьез заняться психоанализом?</p><p class="p">— Что вы, что вы, доктор! — засмущался Владимир Ильич. — Я со своим-то сном не могу разобраться.</p><p class="p">— Ах да, вы же пришли как пациент! — спохватился д-р Юнг. — Ну-с, рассказывайте! Попробуем поработать с вашим бессознательным.</p><p class="p">Ленин с готовностью принялся излагать содержание своего кошмара. Великий психоаналитик слушал его очень внимательно, время от времени задавая уточняющие вопросы, и хмурился; по его лицу Ленин понял, что его случай представляется светилу науки чрезвычайно сложным, и несколько пал духом. И, действительно, по окончании шестого часа беседы д-р Юнг сказал:</p><p class="p">— Вынужден признаться, что пока мне не ясна картина. Чрезвычайно богатая символика, но расплывчатая. Скажите, этот человек, в котором у вас персонифицируется некая сила, мне пока неясная... он кем вам в жизни приходится?</p><p class="p">— Он мне не отец и не мать, доктор, — поспешно ответил Ленин. — Мы не родственники, не земляки и даже не однофамильцы.</p><p class="p">— Жаль, жаль... Вас к нему влечет? </p><p class="p">Владимир Ильич вовремя вспомнил, что имеет дело с психиатром, и, вместо того, чтобы дать собеседнику кулаком в зубы, ответил кротко:</p><p class="p">— Ни в малейшей степени.</p><p class="p">— Гм... Ну, давайте повторим еще раз... Итак, этот человек стреляет в вас, замахивается на вас дубинкой, толкает в горящий очаг, скидывает в пропасть, ставит вам неудовлетворительные отметки, пытается вас арестовать...</p><p class="p">— Совершенно верно, доктор.</p><p class="p">— Очень расплывчатая символика, очень... Говорите, он бросил кирпич вам на голову? Разбиваемая голова... раскалывающийся череп... — бормотал психиатр. — Что же это? Рождение Афины? Нет, вряд ли... Кирпич... камень... Сизифов труд? А тот эпизод, когда он подлил вам в чай касторку, — тут, вероятно, преломилась история Ясона и Медеи...</p><p class="p">— В компот, доктор, а не в чай.</p><p class="p">— В компот! Расскажите мне подробней об этом компоте. Из каких плодов он был приготовлен?</p><p class="p">— Из яблок, доктор.</p><p class="p">— Ну конечно! — радостно вскричал д-р Юнг. — Яблоко! Змей! История грехопадения! Или... яблоко Париса?! — и он вновь посмотрел на пациента растерянно.</p><p class="p">— Доктор, я вспомнил еще один эпизод, — спохватился Ленин. — Как-то раз он превратился в козла с большими и острыми рогами. Это, наверное, потому, что у него козлиная бородка, — прибавил он, уже немного поднаторев в символике. — Козел бежал за мной и хотел меня боднуть, а я увертывался. Это происходило в избе. Я увидел на столе оставленное женою вязанье, схватил его и ткнул спицей ему в морду. Он отстал.</p><p class="p">— О боже! — сказал д-р Юнг. На лице его проступило несказанное облегчение. — Ну, наконец-то! Кажется, я начинаю понимать. Козел, козел... Агнец... телец... Бык! Тесей и Минотавр! Изба — лабиринт! Вязанье — нить Ариадны! Эрос противостоит Танатосу! Да, теперь все стало на свои места!</p><p class="p">— А... что это значит?</p><p class="p">— Как бы вам попроще объяснить... Минотавр символизирует зло... Это приблизительно то же самое противостояние, что было между Бальдуром и Локи, Гором и Сетом, Каином и Авелем, Мордредом и королем Артуром, Кецалькоатлем и Тескатлипокой, Персеем и горгоной Медузой, Калевалой и Беовульфом... Короче говоря, этот человек вам не самый близкий друг. Вы ему не особенно доверяете.</p><p class="p">Ленин не мог скрыть своего восхищения. Конечно, он уже много лет — в сущности, с первой минуты знакомства, — не особенно доверял Железному, считал его прохвостом и недолюбливал его, а уж после случая с Инессой и вовсе был на него страшно зол. Но как мог доктор, ничего об их отношениях не знавший, на основании какого-то сна догадаться об этом?! «Наука — великая сила», — благоговейно подумал он.</p><p class="p">— Сколько я вам должен, доктор?</p><p class="p">— О, нисколько! Ваш случай представляет собой огромную научную ценность... Скажите, вы раньше подвергались психоанализу?</p><p class="p">— Нет; но у меня есть один знакомый психиатр. Он работал с Фрейдом.</p><p class="p">— С Фрейдом! — презрительно фыркнул д-р Юнг. — Вся венская школа сплошь состоит из сексуально озабоченных шарлатанов. Вообразите, они до сих пор поливают пациентов холодной водой... А порядка соблюсти не умеют: у них средь бела дня из-под самого носа украли больного, и этот больной приехал в Сараево и укокошил эрцгерцога. Они, конечно, никому не сознались, что это их больной, но я-то знаю!</p><p class="p">— Что вы говорите! — изумился Ленин. — А кто его украл?</p><p class="p">— Да, говорят, какой-то тип с козлиной боро... Ох, простите! — вдруг воскликнул д-р Юнг, взглянув в сторону дома. — Я вынужден расстаться с вами. Милости прошу захаживать. Буду очень счастлив. — И он, вскочив на ноги, улетучился с быстротою, удивительной для человека такого могучего сложения.</p><p class="p">Ленин посмотрел ему вслед. На крыльце стояла рослая женщина в переднике. Д-р Юнг подошел к ней и решительно обнял за то место посередине туловища, где обычно бывает талия. По-видимому, эта женщина была кухарка Фрицци. «А ноги и впрямь ничего себе», — подумал Ленин, и тут же сложный ассоциативный ряд увел его к одной знакомой кондитерше; он так никогда и не вспомнил больше о загадочном человеке, укравшем пациента, из-за которого началась мировая война.</p><p class="empty-line"/><p class="p">Теперь, когда Ленин был вооружен научным знанием, он больше не страшился своего бессознательного. Первое время после сеанса кошмар продолжал ему сниться, но он занимал в этом кошмаре все более и более активную позицию: толкал и бил Дзержинского, обращая того в бегство, и постепенно сон сошел на нет. Время текло, месяцы летели; Ленин вновь обрел аппетит и душевное равновесие: он даже о воинском подвиге перестал думать, а занимался спокойно мелкой коммерцией. В Швейцарии это было несложно — народ разбалованный, доверчивый... Он не знал, что пути, ведущие к подвигу, бывают причудливы, и скучный Цюрих может стать полем битвы — тайной битвы не на жизнь, а на смерть, что ведут между собой невидимые силы...</p><p class="p">— Ильич, полиция тебя ищет! — такими словами встретила его как-то раз взволнованная Крупская.</p><p class="p">— Политическая?!</p><p class="p">— Нет, обыкновенная. По делу «1-го Интернационала». Я ведь тебя предупреждала: сколько веревочке ни виться...</p><p class="p">— Типун тебе на язык, — сердито сказал Владимир Ильич.</p><p class="p">«1-й Интернационал» была организованная им чуть больше года тому назад финансовая компания, головной офис которой находился в Женеве, а филиалы были разбросаны по всей Европе. Суть ее деятельности была проста: гражданам предлагалось вложить небольшую денежную сумму с тем, чтобы через некоторое время получить в десять раз большую. Никакого собственного капитала у компании не было, и никакой коммерческой деятельностью она не занималась, ибо весь ее штат состоял из нескольких клерков, секретарш и швейцаров в нарядных ливреях; а между тем клиенты, сделавшие взносы одними из первых, загадочным образом получали громаднейшие выплаты и, желая удружить знакомым и родственникам, приводили их в «Интернационал» десятками и сотнями. Однако уже через месяц, ко всеобщему изумлению, выплаты прекратились; а когда недоумевающие вкладчики, прождав еще с полгода, отправлялись за разъяснениями в контору, куда они внесли деньги, то обнаруживали, что «Интернационал» давным-давно съехал (как объяснял швейцар, по соображениям конспиративным: полиция заинтересовалась революционным прошлым одного из его вождей, и вот теперь из-за проклятых угнетателей лопнуло вернейшее дело). Вкладчики дружно ненавидели полицию и свято верили, что в случае мировой революции их деньги немедленно вернутся. Чрезвычайно популярен был гимн «Интернационала», написанный по личному ленинскому заказу двумя французскими шарманщиками; для пущей революционности Ильич распустил слух, что это песня времен Парижской коммуны, хотя любой образованный человек знал, что в Коммуне было не до песен — она продержалась всего 72 дня и едва успела разграбить город. Гимн компании перевели на все европейские языки; он был полон недвусмысленных угроз со стороны вкладчиков, страстно желавших «отвоевать свое добро». Все они искренне верили, что их средства конфискованы реакционными европейскими правительствами, паразитирующими на трудовом народе. «Кто был ни с чем, тот вставит всем!» — грозно предупреждала боевая песня оскорбленных масс.</p><p class="p">Швейцарская полиция была туповата, но славилась злобностью и неподкупностью; если уж она напала на след — пощады ждать не приходилось. Ситуация становилась опасной. Не будь войны, Ленин бы просто уехал в какую-нибудь другую страну; но летом пятнадцатого года на границах были ужасные строгости. Нужно было где-то отсидеться, но где? И он подумал о добром докторе Юнге...</p><p class="p">— Хорошо, — сказал психиатр, выслушав его жалобы на мигрени, — я понял, что вам нужно какое-то безопасное местечко. Нет-нет, причины меня не касаются. Я вам очень обязан. (Пиджак д-ра Юнга пропах кухней, на воротничке рубашки был виден след от дешевой губной помады, и Ленин не стал спрашивать, чем именно доктор обязан ему.) Я вас устрою в клинику Бургхельцли. У них сухой закон, потому я, собственно, и ушел оттуда, но кормежка неплохая. Походите на безобидные процедуры, отдохнете... Главный врач там профессор Плейшнер, он зануда, трезвенник и фрейдист, но это ничего, я договорюсь, чтобы вас не мучили.</p><p class="empty-line"/><p class="p">Увидев человека, с которым ему предстояло в течение как минимум нескольких недель делить больничную палату, Владимир Ильич ужаснулся: лицо его было закрыто плотной маской из черной ткани, в прорезях которой блестели пронзительные глаза. Но д-р Плейшнер объяснил ему, что сосед совершенно не опасен.</p><p class="p">— Буйных в этом отделении вообще нет... Это милый, безобидный, услужливый человечек. Он воображает себя величайшим изобретателем всех времен и народов, что-то вроде Эдисона. Его фамилия Моторолли, он итальянец.</p><p class="p">— А вдруг он и в самом деле что-то изобрел? — спросил Ленин. Он относился к изобретателям с уважением, как и ко всем ученым людям.</p><p class="p">— Нет, что вы! — д-р Плейшнер замахал руками. — Он рассказывает какие-то невероятные дикости. Да вы сами убедитесь, когда послушаете его... Ну-с, а теперь займемся вами. — И он принялся бить Ленина молоточком, щупать ему пульс, разглядывать его язык и проделывать всю ту ерунду, которую сам Ленин, случись ему перейти в доктора, осуществлял бы куда ловчее.</p><p class="p">Через несколько дней Владимир Ильич убедился, что доктор во всем был прав: Моторолли — милейший человек, но совершенно чокнутый. Он болтал о каких-то космических «челноках», о машинах, которые умеют думать, о пересадке почки из одного живого человека в другого, о железных банках, из которых деньги сами выскакивают...</p><p class="p">— Позвольте, позвольте, батенька! Я, конечно, понимаю, что напихать в банку монет и банкнот нетрудно...</p><p class="p">— Не в банку, а в банку-матку, — поправил его изобретатель. — Я так назвал ее потому, что она будет, как родная мать, заботиться о клиентах.</p><p class="p">— ...и рычажок такой можно приделать, чтоб они оттуда сыпались, когда дернешь; но ведь первый же клиент этой вашей банки заберет их все! Или просто утащит с банкой вместе.</p><p class="p">— Не заберет; во-первых, моя банка-матка будет большая, и ее просто так с места не сдвинешь, а во-вторых, она знает, у кого сколько есть на счете, и не даст ни франка сверх положенного.</p><p class="p">— Банка знает, сколько у кого на счете!</p><p class="p">— Да; в банке-матке будет дырочка, а в дырочку вставляется специальная бумажка, на которой все написано.</p><p class="p">— А, так ваша банка умеет читать! — расхохотался Владимир Ильич. — Ладно, сеньор мечтатель, идемте-ка лучше на ужин.</p><p class="p">И они отправились в столовую, продолжая дружелюбно болтать. Ленин любил занятных типов и был в восторге от соседа, тем более что одну полезную вещь тот для него таки изготовил: большую, красивую шляпу из плотных листов бумаги, которая во время прогулок отлично защищала лысину от палящего солнца. Вообще ему понравилось жить в сумасшедшем доме. Там, за его стенами, нужно было быть таким, как все; тебя постоянно одергивали, ставили в рамки. А здесь можно было быть кем и чем угодно: Наполеоном, царицей Савской, чайником, собакой, — и никто за это не ругал, а, напротив, выслушивали вежливо и заинтересованно; так, когда он намекнул д-ру Плейшнеру, что является принцем, тот не зафыркал насмешливо, а принялся цитировать «Гамлета», и они провели время в весьма милой беседе. Вообще персонал клиники был чрезвычайно дружелюбен. (Исключение составлял разве что один из санитаров, глухонемой Шикльгрубер, злобный плюгавенький человечек с лицом идиота: всякий раз, как Ленин на него глядел, ему казалось, что он видит родного брата полоумного Кобы.) И больничные порядки были необременительны — если, конечно, не считать сухого закона. Кормили хорошо, а все таблетки, которые давали Ленину, он не спускал в ватерклозет, как это делали другие, а складывал в спичечный коробок, который прятал под матрасом. Он сам не знал, для чего это делает. Просто на всякий случай: война как-никак.</p><p class="p">Пациенты тоже были как на подбор вежливые и симпатичные люди: большинство из них никакими серьезными душевными недугами не страдали, а только неврозами и тому подобной чепухой. Контингент был самый что ни на есть интернациональный: французы, немцы, поляки, американцы, китайцы и еще бог знает кто, и поэтому в клинике всегда стоял многоязыкий гомон, как на строительстве Вавилонской башни. С одним из больных Ленин подружился почти так же близко, как со своим соседом. То был долговязый молодой англичанин, младший лейтенант: нервы его слегка расшатались после тифа и контузии, полученной на фронте, но при этом он оставался бравым английским воякой до мозга костей. Владимир Ильич имел все основания гордиться этой дружбой, так как английский пациент до сих пор никого ею не удостоивал, будучи замкнутым и холодным, как положено представителю британской нации. Он сперва и Ленина знать не хотел, но потом произошел один случай... Был полдень, жара ужасная; Владимир Ильич сидел развалясь на скамеечке в больничном саду и в изнеможении обмахивался бумажной шляпой. Неподалеку от него на другой скамеечке сидел английский лейтенант и читал книгу. Ленин посматривал на него с завистью: англичанин был застегнут на все пуговицы, но, казалось, ему ничуть не жарко. По саду фланировали больные, доктора и санитары. Скучая, Ленин и их рассматривал с любопытством, а чопорный англичанин ни разу не поднял глаз от книги. И вдруг Ленин заметил, что англичанин уже не читает, а только делает вид: закрываясь книжкой, смотрит на кого-то очень пристально. Ленин поглядел в ту же сторону и не увидел ничего особенного. Просто один из врачей, д-р Гортхауэр, стоял и негромко о чем-то разговаривал с пожилой пациенткой из женского отделения. Что так заинтересовало английского лейтенанта — доктор или старушка? От нечего делать Ленин тоже стал таращиться на эту пару... Д-р Гортхауэр был красавец, мужчина хоть куда: высокий, прекрасно сложенный брюнет, на тонком смуглом лице — стальные глаза, собольи брови вразлет, подбородок с ямочкой... Женщины бегали за ним толпами. Ленин инстинктивно недолюбливал слишком красивых мужчин: ему в них чудилось что-то подозрительное, а уж типы с ямочкой на подбородке все как один были прохвостами. Но д-р Гортхауэр, по отзывам больных, был прекрасным врачом, терпеливым и внимательным, и никогда служебным положением не злоупотреблял.</p><p class="p">Закончив беседу с пожилой дамой, д-р Гортхауэр подошел к английскому лейтенанту и приветливо заговорил с ним. Из его реплик Ленин понял, что он является лечащим врачом англичанина, так что ничего не было удивительного в том, что тот пристально пялился на доктора. Но почему-то на лице пациента была явная неприязнь. Он все не сводил глаз с левой руки д-ра Гортхауэра; и тут Владимир Ильич наконец обратил внимание на то, что на безымянном пальце доктора надето толстое, грубое золотое кольцо, очень похожее на то, что когда-то красовалось на руке Дягилева, только поменьше размером... Это, конечно, не могло быть волшебное кольцо, которого домогался Ленин: еще раньше у него состоялась одна знаменательная встреча, после которой он убедился, что волшебное кольцо находится там, где ему до поры до времени и положено быть — во дворце императора Николая Романова...</p><p class="empty-line"/><p class="p">Это было летом 13-го года; он тогда получил телеграмму о смерти Алены Родионовны и был убит совершенно... Дзержинский, после Лонжюмо не спускавший с него глаз, не отпускал его в Россию, и он вынужден был совершить поездку тайно — никто никогда так и не узнал о ней... Из-за этой треклятой конспирации он к похоронам на сутки опоздал; тоска и раскаяние его грызли, настроение было прескверное... Единственный человек, которого он по-настоящему любил и который бесконечно любил его! «Что ей были мои деньги! Зачем, зачем я не приезжал так долго, зачем так редко писал?»</p><p class="p">Сперва он хотел не задерживаясь проследовать в Париж, но потом подумал, что надо бы навестить брата Алены Родионовны, с которым он разминулся из-за своего опоздания на похороны. Он знал, что бывший сапожник Илья Родионович удачно в третий раз женился и сейчас проживал в местечке Тярлево близ Царского Села, сдавая дачникам квартиры на лето. У него кроме взрослых детей — ровесников Владимира — было трое не то четверо мелких. Владимир Ильич накупил им гору подарков и в том числе — велосипед (тридцать рублей, не шутка); заночевал в Петербурге, а наутро поехал в Тярлево. Он был там впервые. Он не любил деревни, но дачное местечко, где летом жили состоятельные петербуржцы, — совсем другой коленкор. Селение, расположенное на небольшом пригорке, показалось ему прелестно: средь зелени пестрели желтенькие домишки, кругом было по-чухонски чисто... В семье Ильи Родионовича его встретили с восторгом, который, возможно, в большей степени относился к велосипеду. Он долго пил крепкий вкусный чай с плюшками и разговаривал с Ильей Родионовичем и его супругой — приветливой чухонкою с несколько лошадиным лицом. Блаженная истома разливалась по его телу. Покой, уют, тихая, нежная грусть об усопшей... Хорошо он сделал, что приехал сюда.</p><p class="p">— Не скучно вам, дядя Илья, без дела сидеть? — спрашивал он.</p><p class="p">— Не все ж работать, надо и досуг иметь. Все супружница моя, дай Бог ей долгой жизни... А что скучно — это ты, Володька, зря. Дачники — народ шебутной, с ними не заскучаешь. А то еще цесаревич к нам зачастили — чуть не кажинный день на шикарной авто прогуливается... Все чухны и дачники сбегаются на авто поглазеть...</p><p class="p">— Алексей Николаевич?</p><p class="p">— Ну да. Со швейцаром своим ездют.</p><p class="p">— Швейцаром? — несколько удивился Ленин. — Может, с шофером?</p><p class="p">— Нет, швейцаром — это нация такая навроде французов. И уж такой мальчик-то славный — весь из себя беленький... А говорят важно, как взрослый, и пряниками угощают... Только они никому не признаются, что наследники. Ездют кого-ни то.</p><p class="p">— Инкогнито?</p><p class="p">— Угу. Смешные — думают, никто не догадается. А наши и рады вид делать, будто не поняли, кто это кого-ни то на авто катается...</p><p class="p">Владимир Ильич был не прочь продолжить мирную беседу, но тут дети Ильи Родионовича, не выдержав, начали дергать его за рукава, требуя, чтобы он сейчас же, сию минуту учил их ездить на велосипеде. Ребятишки были сытые, умытые, избалованные. «Да, удачно женился дядя Илья! Эта зеленая веранда, кузнецовский сервиз... И на детей никто не орет, не одергивает... Тишина, покой и воля...» И царь-царевич, король-королевич, принц датский остро позавидовал сапожнику...</p><p class="p">Окруженный детьми, он вывел велосипед на главную улицу Тярлева. Улица была проезжая, широкая, ровная — дорога из Царского Села. Они покатили по этой дороге в противоположную сторону, к соседней деревеньке Глазово. По мере того как процессия удалялась от Царского, дорога, как водится в России, становилась все хуже: колдобины, ухабы, ямы со стоявшей в них после ночного ливня водою. Дети хохотали, визжали, валились с велосипеда...</p><p class="p">— А что, вправду к вам царевич на авто приезжает? — спросил Владимир Ильич. Он никогда еще не видел вблизи предполагаемого племянника, как, впрочем, и остальную родню, и ему стало любопытно.</p><p class="p">— Ага... Ой, дядь Володя! Да вон же, вон они пылят! Ленин глянул из-под руки, щурясь от солнца: от</p><p class="p">Глазова к ним навстречу летела изящная открытая вуатюретка ярко-красного цвета; плавная стремительность ее линий выдавала гоночную модель. «Сейчас промчатся мимо... Остановились бы хоть, что ли, — поглядеть на парнишку...» И тут, словно откликнувшись на его мысли, крохотный «Пежо-бэбэ», подняв тучу грязных брызг, въехал правым передним колесом в глубокую канаву и, накренившись, стал как вкопанный... Из машины вылез плотный бритый мужчина и, озабоченно качая головою, стал оглядываться кругом.</p><p class="p">— Эй, сударь... monsieur! — с сильным швейцарским акцентом крикнул он, заметив Ленина. — Прошу вас, будьте любезны, подите сюда! Помогите мне вытащить авто!</p><p class="p">Ленин приблизился. С сиденья соскользнул девятилетний мальчишка — светловолосый, круглолицый, в матросском костюмчике; прихрамывая, он подошел к Ленину, доверчиво улыбаясь, протянул ему руку.</p><p class="p">— Уж пожалуйста, помогите monsieur Жильяру, — сказал он. — Я бы сам ее вытолкал, но мне не разрешают, потому что у меня болит нога... А она красивая, правда?</p><p class="p">— Твоя нога?</p><p class="p">— Это Peugeot. Мне на именины подарили. Ее имя — Baby. Но я не baby, я уже большой. Я и рулить умею, только maman об этом не знает.</p><p class="p">— Красивая. — Ленин с улыбкой смотрел на племянника. «Славный постреленок. У такого скверного папаши и сумасшедшей мамаши... Удивительно».</p><p class="p">— Вы не смотрите, что она такая маленькая. У ней мотор четырехцилиндровый, в десять лошадей.</p><p class="p">— Да ну?!</p><p class="p">— Честное слово! Ну ладно. Не буду вам мешать. Владимир Ильич засучил рукава. Вдвоем со мсье</p><p class="p">Жильяром они легко извлекли «Пежо» из канавы и уселись на обочине, чтоб отдышаться и почистить одежду. Благодарный швейцарец протянул спасителю портсигар, но себе папиросы не взял.</p><p class="p">— Курите, monsieur Жильяр, курите, — со звонким смешком сказал мальчик. — Я maman ничего не скажу. А вы за это не говорите ей, что я на траве сидел.</p><p class="p">— Хорошо, ваше вы... — швейцарец осекся и бросил быстрый взгляд на Ленина, но тот сделал вид, что не расслышал. — Хорошо, Альоша...</p><p class="p">Мальчик уселся рядом с мужчинами, сорвал травинку и стал грызть ее. Сапожниковы дети стояли чуть поодаль, не решаясь приблизиться; он приветливо махнул им рукой, они подошли и стали глазеть на машину.</p><p class="p">— И не говорите, что я курточку снял. — На его тонкой шейке в раскрытом вороте рубашки болтался крестильный крест и еще — подвешенное на цепочке толстое, грубое кольцо. — А я за это не скажу, что у вас в кармане фляжка коньяку.</p><p class="p">— Ах, Альоша, Альоша! — застонал воспитатель. — Умоляю вас, наденьте сейчас же курточку. Вы простудитесь.</p><p class="p">— Вот еще! — с негодованием возразил маленький принц. — Разве я девчонка?</p><p class="p">— А что это у тебя такое? — вкрадчиво спросил Владимир Ильич, указывая на кольцо. Ему было отчаянно стыдно, что он обманом выспрашивает мальчишку, но удержаться он не мог... «Да это, конечно же, совсем не то кольцо. Я уж с Дягилевым так обманулся... Мало ли таких уродливых колец на свете».</p><p class="p">— А, это так. Какая-то старинная штучка. Взял у maman из туалетного столика — поиграть... Я у нее иногда беру без разрешения разные штучки. Я знаю, знаю: это не хорошо. Но я не виноват, что она мне не разрешает. Я один раз с разрешения papa помаду взял и покрасил себе лицо помадой, a maman очень рассердилась и почему-то сказала, что я вырасту как покойный дядя Сергей Александрович... Ой! — Принц зажал рот ладошкой, сообразив, что проговорился и выдал свою принадлежность к императорскому дому, но Ленин опять прикинулся, что ничего не заметил. — Так что я теперь потихоньку все беру. А потом потихоньку возвращаю на место... Monsieur Жильяр, и про это тоже maman не говорите, идет? А я за это не скажу про Пелагею... (Измученный шантажом воспитатель воздел руки к небу, но промолчал.)</p><p class="p">— Можно поглядеть? — спросил Ленин.</p><p class="p">— А, пожалуйста, глядите. — Мальчик снял через голову цепочку, протянул ее Ленину. Тот с бьющимся сердцем взял кольцо. По внутренней стороне шла надпись витиеватой старославянской вязью... Это было ОНО.</p><p class="p">— Забавная штуковина, — сказал он, возвращая мальчику его игрушечное сокровище. Нет, мысль о том, чтобы силой или какой-нибудь хитростью завладеть сейчас кольцом, ни на секунду не пришла ему в голову. (Неправда: на секунду все-таки пришла, но... во-первых, останавливал стыд, а во-вторых, без Михаила на троне от кольца все равно не было бы никакой пользы.) — Только непременно положи его на место.</p><p class="empty-line"/><p class="p">Итак, кольцо доктора не могло быть тем, волшебным. Но почему англичанин так им заинтересовался? Этого Владимир Ильич понять не мог.</p><p class="p">Минут через пять д-ра Гортхауэра позвала медицинская сестра, и он ушел. Англичанин проводил его долгим сосредоточенным взором. Потом он вдруг повернулся к Ленину и сказал:</p><p class="p">— The weather is fine, isn't it?</p><p class="p">— O, yes! — ответил Владимир Ильич. Но он стеснялся своего дурного английского произношения и спросил лейтенанта, владеет ли тот немецким. Лейтенант совершенно неожиданно ответил ему по-русски:</p><p class="p">— Я знать немецкий хорошо, но я не любить этого языка. Я любить ваша русский языка, велик и могуч. Я хотеть учить его хорошо.</p><p class="p">— Как вы догадались, что я русский?</p><p class="p">— Акцент, — лаконично ответил англичанин.</p><p class="p">— Хотите, я буду давать вам уроки? — предложил Ленин. — Мне совершенно нечем заняться, а я не люблю сидеть без дела.</p><p class="p">Так они сошлись и вскоре уже называли друг друга по имени. Англичанин оказался способным учеником и через пару недель уже болтал по-русски весьма бойко. Он обожал Россию и все русское, а Германию, немцев и особенно австрияков терпеть не мог, что, впрочем, было для английского офицера в те годы вполне естественно. Так, Вену — прелестную столицу вальсов и пирожных — он называл вместилищем зла и ругал ее почему-то «Мордором» — явно от французского Merde. Но особенно неприязненно он относился к своему лечащему врачу.</p><p class="p">— Что вы против него имеете, Джон? — удивлялся Ленин.</p><p class="p">— Он — враг, — тихо сказал англичанин, оглядываясь по сторонам. — Все австрийцы — враги. Вена — это...</p><p class="p">— Знаю, знаю: Мордор. Нельзя быть таким националистом, Джон. Д-р Гортхауэр не виноват, что родился австрийцем. Он же не воюет в австрийской армии! Здесь, в Швейцарии, все мы нейтралы поневоле.</p><p class="p">— О, Владимир, вы не есть прав. Вы не знаете этого человека так, как знаю его я. Это страшный человек, темный человек; в нем — сила ночи... Гортхауэр — лишь одно из многих его имен...</p><p class="p">«Эка невидаль! — подумал Владимир Ильич: почти у всех его знакомых — революционеров и жуликов — было по несколько имен. — Однако мой друг Джон все-таки сумасшедший, а казался нормальным человеком... Жаль». И он заговорил с лейтенантом о погоде: он давно заметил, что эта тема успокаивает беднягу лучше, чем какая-либо другая. Но английский пациент никак не успокаивался; от волнения он снова стал говорить с ужасными ошибками.</p><p class="p">— Он (д-р Гортхауэр, по-видимому) иметь какой-то темный дела с тот гадкая немоглухая санитар, его со... как это вы говорили? Со-пельменник?</p><p class="p">— Соплеменник, Джон. Ведь вы имеете в виду Шикльгрубера?</p><p class="p">— Да, это так есть. Я видеть, они в полночь рыть яма около пруд. Эта Шикльгрубер очень гадкий человек. Он душить моя собака Фродо.</p><p class="p">Никаких собак, разумеется, ни у кого в клинике не было и быть не могло; это еще больше убедило Ленина в том, что психика лейтенанта до сих пор не пришла в порядок. Но для поддержания беседы он все же поинтересовался:</p><p class="p">— Какую яму они рыли, Джон? Для чего доктору копать ямы?</p><p class="p">— Наверное, они зарывать труп.</p><p class="p">— Ох, Джон, Джон! Во тьме ночной пропал пирог мясной...</p><p class="p">— Что? Кто мясной?</p><p class="p">— Это наша русская присказка. Посмотрите лучше на небо: погоды нынче стоят необычайные...</p><p class="p">Кроме англичанина и Моторолли, был в клинике еще человек, очень приятный Ленину. Как-то на прогулке он познакомился с одной больной из женского отделения. Это была прехорошенькая брюнетка, голландка по имени Маргарет, она воображала себя великой танцовщицей; Ленина, в свое время жившего с Кшесинской, забавляли неуклюжие прыжки этой молодой дамы, но иногда во время этих прыжков приоткрывались такие чудные, такие восхитительные коленки... (Он было огорчился, узнав от д-ра Плейшнера, что Маргарет далеко не так юна, как кажется — ей было уже тридцать восемь лет, а то и все тридцать девять, — но, с другой стороны, женщинам всегда столько лет, на сколько они выглядят, и пачпорты им, если разобраться, вообще ни к чему.) Своей изменой Инесса нанесла ему страшную рану, и рану эта могла залечить только женщина, причем желательно темноволосая.</p><p class="p">Маргарет была с Лениным очень мила, и поначалу все вроде бы шло куда следует; однако постепенно он стал замечать, что она уж очень часто вьется вокруг его соседа Моторолли. «Понятно — таинственность, романтизм! Человек в Тряпичной Маске! Я-то видал его без маски (Моторолли снимал ее на ночь; когда Ленин в один из первых дней знакомства спросил его, для чего нужна маска, тот отвечал, что она защищает от микробов и радиации) — на роже словно горох молотили, и вообще он весь какой-то кургузый» (Моторолли был приблизительно такого же роста и сложения, как сам Ильич).</p><p class="p">Также Ленин несколько раз видел Маргарет за приватной беседой с Гортхауэром: этот австрийский красавчик — к тому же доктор, а не больной, — был, конечно, еще более серьезным соперником, чем простодушный итальянский изобретатель. Но Владимир Ильич не сдавался, а, напротив, усилил свои ухаживания за прелестной голландкой. Соперничество всегда его раззадоривало, и он готов был сражаться на два фронта. А Маргарет, окруженная мужским вниманием, становилась с каждым днем все соблазнительнее. Лишь английский лейтенант оставался равнодушен к ее чарам.</p><p class="p">— Неужто, Джон, вам совсем не нравится наша Маргошенька? — спрашивал его Ленин. Они сидели на берегу маленького, заросшего тиной пруда — того самого, у которого, по словам несчастного англичанина, два австрийца закапывали труп, — и мимо них, шелестя кружевной юбкой, проплыла голландская танцовщица.</p><p class="p">— The Dark Lady? Ничуть не нравится. Она постоянно бывать с доктор Гортхауэр. (Это обстоятельство Владимиру Ильичу тоже не нравилось, и он досадливо крякнул.) Я думаю, они составлять шпионский заговор.</p><p class="p">— Кто «они», Джон?</p><p class="p">— Темные Силы. Австрияки. Доктор Гортхауэр, санитар Шикльгрубер и мадемуазель Маргарет Зелле.</p><p class="p">— Марго — нидерландская подданная, а не австрийская. Нидерланды держат нейтралитет, — заметил Ленин. — Послушайте, Джон, вам нужно пойти к Плейшнеру и попросить, чтобы он назначил вам другого лечащего врача. Нехорошо, когда пациент не доверяет доктору.</p><p class="p">— Это нельзя, — ответил англичанин. В голосе его звучало страдание. — Хотите, Владимир, я открою вам страшную тайну?</p><p class="p">— Ну, валяйте...</p><p class="p">— Я не сумасшедший.</p><p class="p">— Да я, откровенно говоря, тоже, — сказал Ленин. Но английский лейтенант не обратил на его ответное признание ни малейшего внимания и продолжал:</p><p class="p">— Я нарочно пришел в эту госпиталь. Из-за доктора Гортхауэра. Вы видели кольцо, что он носит на палец? Я должен завладеть этим кольцом и уничтожить его. Это волшебное кольцо, кольцо всевластия...</p><p class="p">Пульс Владимира Ильича сбился и зачастил, дыхание стало прерывистым. «Волшебное кольцо! Но как же оно могло попасть к этому австрийскому психиатру, когда два года тому назад совершенно точно находилось в России?! Или Жильяр украл? Но откуда английскому невротику знать о нем?!» Он ничего не понимал, но одно теперь знал точно: пока он не убедится своими глазами, что англичанин ошибся и это совсем не то кольцо, — покоя ему не будет. Нужно было искать подходы к д-ру Гортхауэру, искать срочно!</p><p class="p">— А вы, Джон, как узнали, что кольцо Гортхауэра волшебное? — спросил он.</p><p class="p">— Мне об этом сказали эльфы.</p><p class="p">«Что я слушаю сумасшедшего? — подумал Владимир Ильич. — Эльфы! Феи!»</p><p class="p">— Почему вы решили доверить мне вашу тайну, Джон?</p><p class="p">— Вы — светлый. Вы — хороший человек.</p><p class="p">— Гм... — Ленин закашлялся. — А можно узнать, батенька, каким образом вы пришли к этому лестному для меня выводу?</p><p class="p">— По цвету ваших волос и форме ушей.</p><p class="p">Уши у Ленина были, разумеется, самые обыкновенные, и он чертыхнулся про себя: «Вот тоже связался с психом! Но что делать? Лучше такой союзник, чем никакого». И они с англичанином дали друг другу торжественную клятву приложить все свои умственные, физические и моральные силы к тому, чтобы вынудить австрийского доктора расстаться с кольцом. «Мне б только одним глазком на него взглянуть! Если это ОНО — я не допущу, чтоб оно попало в руки к этому умалишенному бедняге, а просто заберу его и смоюсь отсюда; а если нет — пускай Джон делает с ним что хочет».</p><p class="p">— А какого вы мнения о моем соседе Моторолли? — спросил он лейтенанта. — Он тоже участвует в заговоре этих ваших темных? (Италия в пятнадцатом году уже присоединилась к Антанте, но, с другой стороны, Моторолли был жгучий брюнет.)</p><p class="p">Англичанин равнодушно пожал плечами. Его совершенно не интересовал итальянский изобретатель; едва ли он вообще замечал его существование.</p><p class="p">Вернувшись после прогулки к себе в палату, Владимир Ильич снял башмаки и бумажную шляпу, улегся на кровать и стал глядеть в белый потолок. Он был один: Моторолли где-то разгуливал. Было тихо, никто не мешал ему думать. «Как этот бедный Джон все запутал! Кольцо, шпионаж... Но почему бы и нет? Идет война; шпионы повсюду. Сумасшедший дом — отличное место для человека, проживающего нелегально и занимающегося темными... да, темными! — делишками. Австрийцев тут полно... Отчего б им и не быть шпионами? А главврач, профессор Плейшнер! Пусть он швейцарец, но фрейдист, а стало быть, связан с Веной! Все связано со всем! Заговор кругом! Вся эта шайка выкрала из Петербурга волшебное кольцо, а теперь они занимаются шпионажем, чтобы окончательно погубить Россию и ее союзников... И мы с Джоном одни-одинешеньки против всей этой банды темных! Да! А руководят ими сионские мудрецы! Вена, Вена! Д-р Фрейд — еврей! Д-р Юнг вообще неизвестно кто... Бауман — немец! А прикидывался другом! Немецкий язык похож на идиш! А голландский — еще больше похож... Марго! И у всех у них темные волосы! Все, все со всем связано! Боже правый! Они нарочно сговорились и упрятали меня в эту больницу... Они подослали ко мне в дом полицейских, зная, что я обращусь за помощью к д-ру Юнгу... Или не было никаких полицейских?! Они и жену мою завербовали! О-о-о! А теперь они хотят свести меня с ума... Д-р Юнг насылает на меня коллективное бессознательное!» И он в ужасе заметался на смятой постели.</p></span>
