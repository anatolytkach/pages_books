<span><p class="p">Около полуночи — как уговаривались — он был уже на Мойке. У железных ворот юсуповского дворца топталась темная фигура, в которой он без всякого удивления узнал британского шпиона-литератора: все эти дни бестолковый англичанин всюду таскался за заговорщиками по пятам, полагая, что очень убедительно играет русского забулдыгу-пьянчужку. Дзержинский задержался, насмешливо любуясь тем, как бедняга разведчик, непривычный к русским морозам, припрыгивает и бьет в ладоши, потом спокойно прошел мимо. Он уже совершенно овладел собой. Автомобиль Пуришкевича стоял во дворе — значит, все в сборе...</p><p class="p">Поднявшись в кабинет Юсупова, он застал всю компанию, которая к тому времени увеличилась еще на одного человека — доктора-садиста Павлова, знаменитого бесчеловечными опытами на собаках. Он был принят в дело за умение щупать пульс и доставать цианистый калий в неограниченных количествах. Дзержинский не противился этому из тех соображений, что большое число участников позволяло лучше скрыть его собственный вклад в дело.</p><p class="p">— Vous voila! — сказал Юсупов. — Отлично выглядите, пан Станислав. Однако вы не пунктуальны. Мы вас уж пять минут как ждем.</p><p class="p">— Я наблюдал за нашим шпионом, — ответил Дзержинский. Он вообще-то любил, чтоб его ждали, и старался нигде не появляться без пятиминутного опоздания.</p><p class="p">— Как он там? — участливо осведомился Дмитрий Павлович.</p><p class="p">— Мерзнет.</p><p class="p">— Может, распорядиться, чтоб ему выслали чаю?</p><p class="p">— Тогда уж лучше пригласить его прямо сюда, — сказал Пуришкевич. — Я давно предлагал вам, господа, втянуть его поглубже в наше дело.</p><p class="p">— Why not? — меланхолично отозвался Юсупов.</p><p class="p">— Как, князь? Вам уже не жаль, что Британия окажется замешанной в международный скандал?</p><p class="p">— Жаль. Бедная Британия... Но Россию жаль больше... («Казань тебе жаль, Чингисхан крашеный, — насмешливо подумал Дзержинский, — эх, недорезал вас Иоанн Васильевич...») И потом, все равно каждый дворник в Петрограде знает, кто такой Моэм и зачем он сюда приехал.</p><p class="p">— Нет, — сказал Дзержинский. — Я категорически возражаю. Это может погубить все дело. — В действительности ему просто хотелось, чтобы дурак англичанин хорошенько промерз и, быть может, скончался, подхватив инфлуэнцу.</p><p class="p">Заговорщики нехотя согласились с его доводами. Все встали с кресел и, пройдя через тамбур, спустились по витой лестнице в подвал и не без удовольствия оглядели творение своих натруженных рук. Сводчатая комната выглядела соблазнительно и уютно. В большом камине, украшенном прелестными безделушками, ярко пылал огонь. Круглый чайный столик был уставлен аппетитной снедью. В задней половине комнаты размещались мягкие кресла и диван, на полу лежала громадная шкура белого медведя. На другом столике стояли бутылки с винами и несколько рюмок. Рюмки были темного, непрозрачного стекла, поскольку в них предполагалось заранее налить раствор яда. В общем, все было великолепно. Правда, картофельный запах не удалось вывести до конца, но это пустяк. Григорию могло почудиться в нем что-то родное.</p><p class="p">— Марсала, мадера, херес, портвейн... Из ваших крымских виноградников, князь?</p><p class="p">— Совершенно верно. Пользуясь случаем — позвольте пригласить вас всех ко мне в Крым, — сказал Юсупов. — Разумеется, если все завершится благополучно... — добавил он с бледной улыбкой.</p><p class="p">— Непременно воспользуемся.</p><p class="p">— Пан Станислав, приглашение распространяется и на вас.</p><p class="p">— Благодарю. — Дзержинский чуть наклонил голову. Он в тот же миг решил, что, «когда все завершится благополучно» — правда, слова эти имели для него иной смысл, нежели для князя, — частенько будет отдыхать в юсуповском крымском дворце. (Впоследствии так и вышло.)</p><p class="p">— Выпьемте чаю, господа. Время еще есть. — Все уселись за стол; Юсупов разлил чай по стаканам. — А вы почему не пьете, пан Станислав? Боитесь, что вода отравлена?</p><p class="p">— Я на работе не ем, — сухо ответил Дзержинский. Он был зол на тезку за то, что тот угадал его опасения. Ведь от этих русских — особенно если они татары — можно всегда ожидать какой угодно пакости.</p><p class="p">— Чувствуется профессионал, — уважительно произнес Пуришкевич. — Вам бы, пане, в правительстве работать...</p><p class="p">— Я подумаю об этом, — кротко отвечал Дзержинский.</p><p class="p">Когда безумное чаепитие завершилось, принялись наводить художественный беспорядок: надо было сделать вид, будто из-за стола только что вспорхнула целая стайка светских дам, гостивших у Ирины Юсуповой. На тарелочки накрошили пирожных, салфетки помяли и испачкали губной помадой. Приведя стол в должный вид, приступили к главному. Юсупов передал Дзержинскому цианистый калий (ядом желал заняться доктор Павлов, но Феликс Эдмундович пресек эти поползновения, ибо никому не доверял); надев перчатки, Дзержинский стал аккуратно резать пополам розовые птифурчики и наполнять их сердцевину смертоносной отравой. Остальные заговорщики, вытянув шеи, столпились вкруг него.</p><p class="p">— Отойдите, господа. Не застите свет. Вы мне мешаете.</p><p class="p">— А вдруг он захочет не розовое, а шоколадное? — жалобно спросил великий князь Дмитрий. — Может быть, положить во все?</p><p class="p">— А я вам двадцать раз говорил, что яд вообще — глупость, — огрызнулся Дзержинский. — Он может и не подействовать. Этот человек в молодости каждый день выпивал по три литра самогону зараз, что ему ваш цианистый калий?</p><p class="p">— Как?! Вы знавали его в молодости?</p><p class="p">— Нет, разумеется. — Он чертыхнулся про себя: совсем потерял осторожность, так нельзя... «Неужто опять волнуюсь?» — Слыхал от людей.</p><p class="p">— Вы не наливаете яд в вино?</p><p class="p">— После. Выдохнется, — кратко отвечал Дзержинский.</p><p class="p">Закончив заниматься пирожными, он снял перчатки. Доктор услужливо подхватил их и бросил в камин.</p><p class="p">— Вы что делаете?! — Дзержинский схватился за голову. — Мало вам, что картошкой воняет? Это уж слишком! И вы хотите, чтоб объект поверил, будто здесь сидели дамы и распивали чай? Вот что, господа: или вы наконец начнете меня слушаться, или ищите себе другого assassin’а...</p><p class="p">С проветриванием комнаты провозились битых полчаса. Наконец, когда воздух стал достаточно свеж, поднялись обратно в кабинет Юсупова, где все по дурацкому русскому обычаю присели «на дорожку», провожая молодого князя, которому предстояло ехать за Распутиным. Все молчали. Юсупов был бледней обычного. «Боится, сволочь, psya krev!» — с удовлетворением отметил Дзержинский.</p><p class="p">— Ну, Феликс Феликсович, с Богом! — Пуришкевич встал, растроганно обнял Юсупова и перекрестил его.</p><p class="p">— К чорту, — нервно огрызнулся Юсупов.</p><p class="p">Две минуты спустя шум автомобиля дал знать, что Юсупов уехал. Другим оставалось только ждать. Великий князь Дмитрий сидел неподвижно, стиснув голову руками; доктор Павлов нервно дымил сигарой; Пуришкевич метался по кабинету, как обезьяна в клетке.</p><p class="p">— Что вы бегаете туда-сюда? — поморщился Дзержинский. — Сядьте. А вы, доктор, потушите сигару. — Сам он курил тонкую, длинную, душистую дамскую папироску. — Распутин должен думать, что в доме нет мужчин...</p><p class="p">— Кроме хозяина.</p><p class="p">— Я и говорю: что в доме нет мужчин, — не удержался от колкости Дзержинский.</p><p class="p">— Я все-таки не понимаю, — сказал доктор, послушно выбросив сигару — угроза главного исполнителя выйти из дела теперь, когда решительный миг близился, возымела действие. — Неужели Распутин поверит, что князь собирается подложить ему свою жену-красавицу?</p><p class="p">— Выбирайте выражения, доктор, — укоризненно сказал Пуришкевич. — Мне это тоже кажется несколько странным, — сознался он, — но, наверное, князю лучше знать: ведь он довольно близко общался с Распутиным.</p><p class="p">— Насколько близко? — спросил любознательный медик.</p><p class="p">— Все это вздор... — пробормотал Дмитрий, не поднимая головы.</p><p class="p">— Все объясняется очень просто, — сказал Дзержинский. — Распутин не дурак и отлично понимает, что князю по большому счету наплевать на честь супруги.</p><p class="p">— Я бы попросил не оскорблять хозяина дома, — с думской важностью сказал Пуришкевич, — тем более в его отсутствие...</p><p class="p">«На убийство собрался, а сам мораль читает, — с усмешкой подумал Дзержинский, — как это по-русски! Тоже Раскольников! Нация совестливых убийц-неумех! Однако что, если мы все, включая самого Юсупова, ошибаемся в наших предположениях и красавица Ирина интересует Распутина не более, чем прошлогодний снег?! Впрочем, не все ли равно — жить Гришке осталось около получаса...» Не надеясь слишком на яд, он спрятал в складках костюма небольшой дамасский кинжал и дамский револьверчик. По уговору стрелять воспрещалось, ибо рядом со дворцом был полицейский участок, где могли услыхать шум; но Дзержинский, в отличие от неопытных товарищей, знал, что шума можно избежать, если стрелять через сырую картофелину, которую он предусмотрительно припас, когда освобождали подвал.</p><p class="p">Доктор кинулся к граммофону, и через несколько секунд раздался звук американского марша «Янки-дудль», от которого у Дзержинского, ненавидевшего американцев почти так же сильно, как русских, начиналась мигрень и колики в животе. Внизу хлопнула дверца автомобиля. Послышались быстрые шаги. Голос Распутина произнес громко: «Куда, Маленький?»</p><p class="p">Заговорщики переглянулись... Шаги уже на винтовой лестнице... И вот хозяин с гостем сошли в чайный будуарчик... Далее по плану Юсупов должен был, оставив гостя у камина, тоже подняться в кабинет, чтобы предоставить поле боя главному участнику. Но минуты шли, а хозяин не появлялся. Занервничавшие компаньоны на цыпочках выбрались в тамбур и, встав у перил лестницы, стали напряженно прислушиваться к шорохам и голосам.</p><p class="p">— Я сейчас приглашу к тебе Ирину, Григорий Ефимович.</p><p class="p">— Да погоди ты со своей Ириной... Посиди, поговори со мной. Али ты меня не уважаешь?</p><p class="p">— Уважаю, Григорий Ефимович.</p><p class="p">— Сядь, не мельтеши... Ты мне ишшо про маркиза не дорассказал книжку... А веселый человек был твой маркиз!..</p><p class="p">— Хорошо, Григорий Ефимович... И вот маркиз де Сад вошел в комнату и увидал...</p><p class="p">Пуришкевич брезгливо фыркнул. Доктор Павлов весь обратился в слух. Тут вдруг входная дверь громко хлопнула, и остолбеневшие заговорщики услыхали, как кто-то, сопя и задыхаясь, по другой лестнице поднимается наверх... Они кинулись обратно; там их взорам представилась огромная, дрожащая обледенелая сосулька в башлыке, в которой с трудом можно было угадать доблестного британского разведчика...</p><p class="p">— Достопочтимые сэры, сжальтесь... — лепетал несчастный, едва держась на ногах. — Я не могу более там на улице...</p><p class="p">— Чорт вас принес! Сидели бы в своей Англии... Ах, господа, да он, бедный, в обмороке...</p><p class="p">Позабыв о Распутине, жалостливые и безалаберные русские — Феликс Эдмундович только диву давался! — втащили шпиона в натопленный юсуповский кабинет, сняли с него башлык, усадили на диван, пощупали пульс и дали выпить спирту, после чего Моэм начал понемногу приходить в себя.</p><p class="p">— Ах, сэры... — бормотал он. — Я благодарить... Но, сэры... Я много думал... я читал Достоевского... я понял, что вы не есть правы... Нельзя убивать человека, даже такого shit, как ваш Рас... путин... Человеческий жизнь есть величайший ценность... Бог... Всепокайтеся... — он сделал слабое движение, пытаясь приподняться.</p><p class="p">— Лежать! — строго сказал доктор Павлов.</p><p class="p">— Дорогой Моэм, ваши чувства делают вам честь, — сказал великий князь Дмитрий. — Но, поймите, мы должны это сделать. Если мы не уничтожим Распутина, в России произойдет революция.</p><p class="p">— Революция у вас в любом случай произойдет, — парировал разведчик. — Такой уж есть ваш исторический путь. Crazy Russians, народ-богоносец. Up не могут, down не хотят.</p><p class="p">— Господа, прекратите дискуссию, — оборвал их Дзержинский. — Кажется, князь идет.</p><p class="p">Подтверждая его слова, тут же, действительно, влетел хозяин дома, растрепанный и бледный: он был так взбешен, что даже не обратил внимания на англичанина, лежащего в его кабинете и пьющего спирт.</p><p class="p">— Еле вырвался от этого психа, — простонал он, — с меня хватит, увольте! Ирина, идите вниз!</p><p class="p">И, опустив на глаза дымчатую вуалетку, шелестя юбками, постукивая каблучками, Дзержинский стал спускаться по винтовой лестнице...</p><p class="empty-line"/><p class="p">— Да вы угощайтесь, Григорий Ефимович! Прекрасные пирожные.</p><p class="p">— Не хочу. Живот болит, — угрюмо отвечал старец. Он был одет с мужицким шиком: в прекрасных сапогах, в бархатных навыпуск брюках, в шелковой богато расшитой шелками голубой (а вовсе не «цвета крем», как утверждал впоследствии дальтоник Пуришкевич) рубахе, подпоясанной толстым шелковым шнурком.</p><p class="p">— Хересу выпейте со мной, — игриво сказал Дзержинский. — На брудершафт.</p><p class="p">— Не хочу. Башка трешшит... А ты почто, Иришка, в трауре? (Полутраурный костюм был выбран для того, чтобы не было необходимости чрезмерно обнажаться, а также объяснить наличие вуали.) Помер кто?</p><p class="p">— Эрцгерцог Фердинанд.</p><p class="p">— А-а... Да ты сядь, Иришка, не вертись. Что скачешь козой? Подь сюды. Гитарку-то возьми да спой...</p><p class="p">«Скотина словно в театр приперлась — не пьет, не жрет, все спой да спой, — в бешенстве подумал Дзержинский, — придется резать или стрелять...» Однако сделать это было не так-то просто. Распутин обладал огромной физической силой и, несмотря на свои жалобы на живот, очевидно находился в прекрасном здравии. Дзержинский же от природы отличался хрупким и деликатным телосложением: изображать женщину это, конечно, помогало, но драться — не очень. Коварный японский удар, которым он привел в бессознательное состояние развратника-ксендза, тут тоже не годился: Распутин не ксендз, так просто не свалишь... Вдобавок женский костюм сильно стеснял движения. Придется подождать, пока старец проголодается...</p><p class="p">И Дзержинский, покорно взяв гитару с голубым бантом на грифе, замурлыкал «Варшавянку». Это была славная песенка о молодой красавице-полячке, собирающейся бежать с любовником; Кржижановский перевел ее со второго куплета — там, где про враждебный ураган и угнетающие темные силы, то есть про злого мужа; в его бездарном переводе эти мотивы совершенно улетучились, и песня оказалась направленной против царизма — тоже неплохо. Русских дураков очень умиляла братская готовность товарищей-поляков вместе с ними наброситься на гидру реакции, они и жидов любили за это же — не понимая, что сразу после гидры примутся за самих русачков; жидов в революции было покамест больше, и потому они могли перехватить инициативу, — но все они были похожи на болтуна и распутника Ленина, а потому в должный срок свалить их не составит труда... кто помешает в этом полякам — не кавказцы же? «И мы убежим, и ты гордо поднимешь скипетр своей любви, скипетр великой борьбы всех любовников за свободу, — пел Дзержинский, упиваясь родным языком. — На славную, древнюю любовную битву — вперед и назад! Вперед и назад!» Дурак Кржижановский, оставил только «вперед», — там же даже по мелодии ясно, о чем речь... Нет, польская тактика в России — это именно вперед и назад. Потому-то маленькая Польша и будет делать это с большой Россией, а не наоборот. «Вперед и назад, вперед и назад...»</p><p class="p">Распутин слушал с видимым удовольствием, хмурое лицо его просветлело. Он потянулся, рыгнул и сказал:</p><p class="p">— Ладно. Душевно поешь. Так и быть — наливай свово хересу...</p><p class="p">Недрогнувшей рукой Феликс Эдмундович налил херес в рюмки, незаметно добавив в одну из них цианистого калия. Разумеется, правила хорошего тона не рекомендовали даме разливать спиртные напитки в присутствии мужчины, но заговорщики справедливо полагали, что Распутин проигнорирует эти тонкости, и не ошиблись. Дзержинский подал гостю отравленное вино. Но привередливый гость не спешил пить.</p><p class="p">— Хорошая ты баба, фигуристая... Вуалешку-то сняла б... В глазы тебе поглядеть хочу.</p><p class="p">— Ах, нет, — жеманясь, ответил Дзержинский.</p><p class="p">— Иди, поцалуй меня...</p><p class="p">— Я бы с удовольствием, — сказал Дзержинский, — но, боюсь, моему мужу это не понравится... «Если он силой схватит меня — ударю в бок кинжалом!»</p><p class="p">— Муж объелся груш, — хихикнул старец. — А скажи-ка мне, Иришка... муж-от твой... он как про меня думает? Што говорит?</p><p class="p">— Феликс очень к вам расположен, — отвечал Дзержинский, ни разу не слыхавший, чтобы тезка отозвался о Распутине иначе как о «поганой скотине».</p><p class="p">— Да ну? А почто ж он от меня удрал?</p><p class="p">«Поди разбери эту чортову сволочь — какой она ориентации... — тоскливо подумал Дзержинский. — Звать тезку обратно? Хотя теперь уж неважно... Он взял рюмку... Поставил обратно... Издевается он над нами, что ли...»</p><p class="p">— А вот еще примета есть такая, — продолжал болтать Распутин, — хошь узнать, што человек себе думает — испей из евонного стакана... Давай-ка, душа Иришка, из мово стаканчика выпей... Узнаешь, про што мысли мои... А я твои мысли узнаю...</p><p class="p">«Этого еще не хватало! — Дзержинский похолодел. — Неужто он предчувствует что-то?» Он нашел в себе силы произнести кокетливо:</p><p class="p">— Но я боюсь знать ваши мысли, Григорий Ефимович: они у вас, наверное, неприличные...</p><p class="p">— Ништо! Не боись... На, пей! — Распутин, привстав с дивана, сунул свою рюмку прямо в лицо Дзержинскому. Тот с усилием отстранил его руку.</p><p class="p">— Чтой-то хватка у тебя больно крепкая, Иришка... Не приведи Бог тебе под горячую руку попасться... Да это ничаво, мне такие нравятся — суровые... А нет ли тут у тебя, Иришка, плетки какой али кандалов железных?</p><p class="p">«Час от часу не легче... Наслушался пакостных книжек... Кандалов ему! А впрочем — why not, как выражается мой тезка... Закую его в кандалы и спокойно зарежу. Доктора Павлова бы на него напустить...»</p><p class="p">— Все эти вещи у меня наверху, в спальне, — сказал Дзержинский. — Я сейчас принесу.</p><p class="p">— А, ладно, не ходи... Это я так... — И, мотнув нечесаной головой, капризный старец вдруг залпом выпил отравленное вино и начал одно за другим заталкивать в рот пирожные. Дзержинский хищным взором глядел на него сквозь вуаль, ожидая конвульсий. Но ничего не происходило.</p><p class="p">«И вправду одни розовенькие птифурчики жрет... И — ничего... Я так и знал — организм весь насквозь проспиртован... Но такая лошадиная доза... Или дурак доктор принес поддельного яду?» В отчаянии Дзержинский предложил гостю выпить еще вина; тот согласился, но вновь начал требовать, чтобы «Ирина» отпила из его рюмки:</p><p class="p">— Так не хошь мыслей моих узнать?</p><p class="p">— Да я и так угадаю, Григорий Ефимович. Ваши мысли — о нас, женщинах.</p><p class="p">— О России все мои мысли, — строго поправил старец.</p><p class="p">— О России? И что вы о ней думаете?</p><p class="p">— Спасать Россию надобно, вот што я думаю. Перво-наперво порядок в ней навести... Нехорошо мы живем, неправильно. У простых людей, таких как я, — куска хлеба нет, а у твово муженька палаты краше царских.</p><p class="p">«Как это верно! — с горечью подумал Дзержинский. — Действительно, почему у моего тезки с колыбели денег куры не клюют, а я — потомок Иоанна Грозного! — вынужден добывать себе пропитание, посылая неотесанных кавказских бандитов на эксы?!» Феликса Эдмундовича вдруг охватило сочувствие к Григорию, стало жаль убивать его, как он ни старался подавить в себе эту неуместную жалость. «Я мог бы привлечь его к сотрудничеству... Ах нет, что за вздор я несу!.. Кольцо, я чуть не позабыл о нем... Похоже, я сделался таким же противоречивым и непостоянным, как эти слюнявые русские... Не нужно было читать Достоевского... Достоевский опасен — дурака англичанина вон до чего довел... Того гляди — начну деньги в печи жечь. Или это женское платье на меня так действует?»</p><p class="p">— Отнять бы да поделить по справедливости... — бубнил тем временем Григорий. — Наворовали...</p><p class="p">«Юсупов — вот кого бы убить! Да, настанет и его черед! На кол посажу, а друга Димочку — рядом, на другой... Сам буду есть компот ананасовый и на их мучения любоваться... Ах, хорошо! И в презрении быть хорошо... И мальчики кровавые в глазах... О, птица-тройка! Oh, those Russians! Подымите мне веки... Да никак я с ума схожу?!» — и Дзержинский огляделся, дико ворочая глазами. Вся кровь отхлынула от его лица.</p><p class="p">— Иришка, да ты заснула, что ль? — с обидой сказал Распутин и больно ткнул его узловатым пальцем в бок. «Царевич я, — строго сказал себе Дзержинский, — довольно, стыдно...» И, мгновенно взяв себя в руки, произнес умильно-ласково:</p><p class="p">— Прошу прощения, Григорий Ефимович, — задумалась... Так что вы говорите?</p><p class="p">— Ничаво, говорю, вот царицка мне колечко волшебное подарит — и я Россию спасу...</p><p class="p">Сердце Дзержинского тяжело екнуло.</p><p class="p">— Что за колечко такое? — небрежным тоном осведомился он.</p><p class="p">— Ох, хитрое колечко: кто им володеет — тот и Россией правит...</p><p class="p">«Правит Россией! Ишь чего захотел! Умри, проходимец!» Праведный гнев, который Дзержинский долго старался в себе разжечь, наконец запылал в его груди, и он, молниеносным движением выхватив из рукава крошечный револьвер с насаженной на дуло картофелиной, выстрелил Григорию прямо в сердце. Тот подпрыгнул, схватился за грудь и упал на белоснежную медвежью шкуру... В тот же миг по лестнице застучали шаги, дверь распахнулась, и в комнату, Натыкаясь друг на друга, влетели остальные заговорщики, вооруженные до зубов: кто держал кастет, кто Велосипедную цепь, кто — гирю... «Свалились на готовенькое, трусы!» — тяжело дыша, подумал Дзержинский.</p><p class="p">Распутин не был еще мертв: он дышал, он агонизировал. Правой рукою своею прикрывал он оба глаза и длинный пористый нос, левая рука его была вытянута вдоль тела; грудь его изредка высоко подымалась, и тело подергивали судороги. Доктор деловито пощупал его пульс. Остальные русские, как бараны, стояли над телом в молчаливом оцепенении. Британский шпион, опустившись на колени, поцеловал распятие и стал истово молиться...</p><p class="p">— Ну что, доктор? — спросил наконец Пуришкевич.</p><p class="p">— Мне кажется, мы его теряем, — деловито сказал Павлов.</p><p class="p">— Шкура запачкается, — заметил Дмитрий Павлович (он был бледней всех, и глаза его растерянно блуждали). — Убрать бы надо...</p><p class="p">— Так убирайте, — холодно сказал Дзержинский. Ему было несказанно приятно командовать слабонервным отпрыском лжецарского рода. — Я сделал свое дело. Где мои деньги?</p><p class="p">— Дело еще не закончено, — сказал Юсупов. — Вы получите деньги после того, как мы все вместе избавимся от трупа.</p><p class="p">— Я не нанимался помогать вам избавляться от трупа!</p><p class="p">— Ради бога, не ссорьтесь! — проговорил Пуришкевич, примирительным жестом обнимая обоих за плечи. — Пан Станислав, друг мой, мы должны все вместе выпить за успех нашего дела! Господа, идемте же наверх... Сэр Соммерсет, прошу вас, встаньте! Вы окончательно простудитесь...</p><p class="p">— Я пошутил, пан Станислав, — сказал Юсупов, обворожительно улыбаясь тезке, — разумеется, я заплачу вам немедленно... Деньги у меня в кабинете. Идемте. Я приготовил вам небольшой сюрприз.</p><p class="p">Оставив наконец застывшее тело на полу, все вновь поднялись в кабинет. Пуришкевич разлил коньяк. Русские выпили не чокаясь и с жалостью поглядели на Моэма, который сидел в углу, подтянув колени к подбородку, прижимая к груди икону, и, стуча зубами, шептал: «Охти, пресвятые угодники...» Доктор подошел к нему, пощупал пульс, оттянул веко кверху и, пожав плечами, воротился на место. Был уже четвертый час ночи...</p><p class="p">Дзержинский стащил с себя осточортевшую шляпку вместе с вуалью и париком, аккуратно спрятал их в сумку: он не собирался ни оставлять реквизит ненадежным товарищам, ни жечь его в камине. От грима кожу на лице стянуло; он взял протянутую доктором салфетку и стал вытираться. От коньяку отказался: ему не понравились слова тезки о каком-то «сюрпризе».</p><p class="p">— Давайте же деньги, — нетерпеливо сказал он. Возможно, разумней было исчезнуть, не дожидаясь оплаты, но пятьдесят тысяч были для него в его нынешнем положении значительной суммой, да и заказчикам показалось бы подозрительно, если б assassin забыл про свой гонорар.</p><p class="p">— Сейчас, сейчас. — Юсупов стоял спиной к нему, роясь в ящиках бюро.</p><p class="p">«Что он так долго возится?» — подумал Дзержинский. Насторожившись, он стал пристально следить за движениями тезки. А тот, с недовольною миной шарахнув ящиком, зашел за ширмы, стоявшие в углу кабинета, и оттуда донеслись какие-то позвякивания... «Они хотят меня убить!» — пронеслось в голове у Дзержинского.</p><p class="p">Он не успел метнуться к дверям — Пуришкевич приблизился к нему и, положив руку на плечо, сказал проникновенным голосом:</p><p class="p">— Вы совершили настоящий подвиг, пан Станислав. Вы — герой. Позвольте же мне обнять и облобызать вас!</p><p class="p">«Нет, они просто обычные жулики и не хотят мне платить, — успокаиваясь, подумал Дзержинский. — И что за отвратительная привычка у русских все время лизаться!» Он попытался отстраниться, но Пуришкевич уже держал его в объятиях. Хватка у него была железная, медвежья. «Почему только он отворачивает голову?» И в этот момент Юсупов, появляясь из-за ширм со штативом в руках, сказал с адской улыбочкой:</p><p class="p">— А сейчас отсюда вылетит птичка... </p><p class="p">Вспышка ослепила Дзержинского; он заморгал, пытаясь вырваться, но бесполезно: Пуришкевич не давал ему даже шевельнуться. «Он отвернулся, чтоб лица его на фото не было видно... А я — без грима, но в женском платье! Какие негодяи!»</p><p class="p">Когда снимки были сделаны, Пуришкевич выпустил свою жертву. Дзержинский отряхнулся и сказал, стараясь сдерживать бешенство:</p><p class="p">— Так вы — шантажисты! Вы меня обманули!</p><p class="p">— Извините нас, пан Станислав, — оправдывался Пуришкевич. — Мы всего лишь желаем немного обезопасить себя. Со своей стороны мы обещаем вам, что в наших мемуарах ни единым словом не упомянем о вашем участии в деле.</p><p class="p">— И о моем, — встрепенулся доктор Павлов.</p><p class="p">— Me too... — слабо прошептал английский шпион.</p><p class="p">— Да, да, конечно... Так вот, пан Станислав: если вдруг у вас когда-нибудь возникнет желание с кем-либо пооткровенничать — вспомните о фотографиях...</p><p class="p">— А с чего вы, собственно, взяли, что эти фотографии могут мне навредить? Я — человек маленький и даже не женат. Кого заинтересует компромат на мою скромную персону?</p><p class="p">— Я говорил вам, дорогой Станислав, о своем предчувствии, — ответил Юсупов. — Мне по-прежнему сдается, что вы не такой уж маленький человек, каким хотите казаться. Возможно, вы сделаете большую карьеру — как знать?</p><p class="p">— Чорт с вами, — сказал Дзержинский почти добродушно: лестное предсказание князя было приятно ему. «Знал бы ты, татарская рожа, насколько большую карьеру я сделаю!» — Так что насчет моего гонорара?</p><p class="p">— Как уговаривались: когда избавимся от трупа.</p><p class="p">— Ну, так давайте скорей избавляться, psya krev!.. Что вы тут расселись?!</p><p class="p">Пристыженные заговорщики засуетились. Напялили на доктора распутинскую шубу и отправили его вместе с князем Дмитрием на вокзал, к санитарному поезду Пуришкевича, чтобы там уничтожить одежду бедняги Григория. Другие остались сидеть в креслах, куря сигары, потягивая коньяк и изредка перебрасываясь незначительными словами. Англичанин лежал на диване, укрытый теплым пледом, и тихо всхлипывал. Дзержинский делал вид, что не таит злобы против своих мучителей. «Они от меня так просто не отделаются... Фотографии я как-нибудь попытаюсь у них выкрасть или выманить хитростью...» Они о чем-то спрашивали, он машинально отвечал, продолжая думать, как обвести их вокруг пальца</p><p class="p">И вдруг у него холодок прополз по шее: он испытал странное чувство, будто что толкнуло его в спину... Этот психический толчок был необычайно силен... Черные глаза Ванды проплыли перед его внутренним взором, она вскрикнула: «Стреляй, стреляй!» В ужасе он вскочил и бросился к двери.</p><p class="p">— Куда вы, Станислав?</p><p class="p">— Мне дурно...</p><p class="p">Скатившись вниз по лестнице — проклятые юбки страшно мешали ему, — он рванул дверь и увидал безобразную, омерзительную картину: Распутин, извиваясь всем своим громадным телом, полз к дивану... Дзержинский застыл на месте, не зная, что делать: кинжал остался в кабинете князя, а о револьвере, по-прежнему спрятанном в рукаве, он, шокированный, даже не вспомнил... А Распутин обернул голову; серые пронзительные глазки в изумлении уставились на убийцу.</p><p class="p">— Фе... Феликс... — прохрипел он.</p><p class="p">Дзержинский закрыл лицо руками, но было поздно: сделав отчаянное усилие, Распутин поднялся на ноги.</p><p class="p">— Феликс, это ты, Феликс... Узнал я глазы-то твои... Повесят тебя... Феликс, Феликс! Все царицке расскажу...</p><p class="p">Дзержинский был растерян, ошеломлен, дух его сломлен; никогда еще он не чувствовал себя таким слабым.</p><p class="p">— Это не я... — жалко залепетал он, сам не понимая, что говорит. — Я не Феликс... То есть Феликс не я... Это все он... Я не хотел...</p><p class="p">— Кровавыми слезами умоешься, Феликс, сволочь... На виселицу пойдешь... Все, все расскажу царицке!</p><p class="p">С этими словами Распутин кинулся на Дзержинского; завязалась борьба... Слабеющим голосом Дзержинский крикнул:</p><p class="p">— Пуришкевич, сюда! Помогите! — и на краткий миг лишился сознания. Это была самая ужасная и постыдная минута в его жизни.</p><p class="empty-line"/><p class="p">Придя в себя — руки Распутина уже не сжимали его горло — он встал и, шатаясь, побрел к двери. То, что он увидал, выглянув на улицу, могло показаться сном: Распутин, которому он собственноручно час тому назад выстрелил в сердце, рысью несся по двору, проваливаясь в снег, не переставая издавать свои ужасные крики: «Феликс, Феликс!»; Пуришкевич гнался за ним с револьвером и тоже что-то кричал... Выстрел — промах! Другой — опять промах!</p><p class="p">Дзержинский зажмурился. Григорий уже у самых ворот — уйдет, спасется... Кольцо, эта тварь будет владеть кольцом... И тут он наконец вспомнил о револьвере. В одно мгновение он собрался, тщательно прицелился и выстрелил. Даже в таком безумном состоянии его рука оказалась тверже и глаз верней, чем у Пуришкевича.</p><p class="empty-line"/><p class="p">Эти декабрьские дни он всегда вспоминал как дикий и мрачный кошмар. Тогда, наутро, уже у себя дома, он бессильно повалился на постель; ему было невыносимо плохо. Он вспоминал, передергиваясь от омерзения, как снова и снова бил Распутина гирей... Как глупо, бестолково, по-русски все вышло! Сперва они с Пуришкевичем подбежали к мертвецу; тот лежал с далеко вытянутыми вперед руками, скребя снег и будто желая ползти вперед на брюхе; но продвигаться он уже не мог и только лязгал и скрежетал зубами... Во двор высыпались Юсупов с англичанином... тут же подъехал автомобиль, из него выскочили доктор и великий князь... Образовалась толпа... Под ногами крутилась и лаяла рыжая лохматая дворняга... Из-за забора, вытягивая шеи, глазели какие-то солдаты...</p><p class="p">— Что же делать? — спросил князь Дмитрий. — Они слышали выстрелы!</p><p class="p">— А вот что! — сказал доктор Павлов, кровожадно вращая глазами, и выстрелил в собаку.</p><p class="p">— Это же Бози, моя любимая собака! — вскричал Юсупов, хватаясь за голову. — Доктор, вы — зверь!</p><p class="p">Бедное животное завизжало и издохло; британский шпион упал в обморок... Затем, кое-как собравшись с духом, втащили тело Распутина в переднюю... Дзержинский заскрипел зубами от унижения, припомнив, как стоял истуканом, весь дрожа, и шептал: «Феликс... Феликс... Феликс...», а Юсупов нежно обнимал его за талию и успокаивал, как ребенка... Потом, кажется, его рвало в клозете... Все смешалось тогда в его голове: он смутно помнил, что в какой-то момент Пуришкевич позвал солдата и стал произносить речь...</p><p class="p">— ...Ответь мне по совести, служивый: ты любишь батюшку Царя и мать Россию; ты хочешь победы русскому оружию над немцем? А знаешь ли ты, кто злейший враг Царя и России, кто мешает нам воевать, кто нам сажает Штюрмеров и всяких немцев в правители, кто Царицу в руки забрал и через нее расправляется с Россией?!</p><p class="p">— Чаво?..</p><p class="p">...Потом, кажется, Пуришкевич целовался с этим солдатом и еще с какими-то прохожими и городовыми, и все поздравляли друг друга, прямо на улице пили шампанское и жгли деньги... Дзержинский вырвался из рук Юсупова, схватил гирю и стал наносить мертвому Распутину один удар за другим... Он весь был с ног до головы покрыт кровью, как мясник... Его оттащили; он плакал... Лицо его конвульсивно подергивалось, и он продолжал бессмысленно повторять: «Феликс, Феликс... Повесят...»</p><p class="p">— Пан Станислав, я необычайно тронут тем, что вы так переживаете из-за моей участи, — сказал наконец Юсупов с легким недоумением в голосе, — но почему вы решили, что меня повесят?</p><p class="p">— Ах, Феликс, Феликс!.. — простонал Дзержинский и, зарыдав, уткнулся лицом в колени князя. Он уже совершенно обезумел и не отдавал себе отчета в том, что говорит. (Впоследствии причина его лихорадочного состояния выяснилась: он в ту ночь заразился от проклятого англичанина инфлуэнцей.)</p><p class="p">— Ну, будет, будет, голубчик... Поплакали, и будет... — Юсупов ласково погладил его по голове. — Успокойтесь, дорогой. Я всегда говорил, что поляки — очень чувствительный народ.</p><p class="p">Уже светало; надо было заканчивать дело. Основной отряд заговорщиков поехал топить тело Распутина в Мойке, а Юсупов отвез Дзержинского, беспомощного, как дитя, на его конспиративную квартиру.</p><p class="p">— Не волнуйтесь, пан Станислав. Клянусь, я никому не расскажу о вашей минутной слабости. Со всяким бывает.</p><p class="p">— Благодарю вас, князь, — сквозь зубы процедил Дзержинский, стаскивая с себя залитые кровью дамские тряпки. Он уже начал понемногу приходить в чувство.</p><p class="p">— Солдаты и городовые видели, что нас во дворе было шестеро, — вслух соображал Юсупов, — но это поправимо... Если что, вместо вас мы назовем кого-нибудь другого... Впрочем, ведь вы выскочили в женском платье... Да, толков об участии дамы не избежать... Кстати, давайте я помогу вам расстегнуть корсет... А еще ведь Моэм и доктор... Ладно, придумаем вместо них какого-нибудь поручика Киже...</p><p class="p">— Уберите руки.</p><p class="p">— Чорт, пан Станислав! Мы с вами совсем забыли про ваш гонорар. Я вам завтра через Пуришкевича передам деньги.</p><p class="empty-line"/><p class="p">— Но почему он все время кричал «Феликс, Феликс»? — задумчиво спросил Пуришкевич, попыхивая сигарой.</p><p class="p">— Он был зол на князя за то, что тот заманил его в ловушку, — резонно ответил Дзержинский.</p><p class="p">Разговор происходил двумя днями позднее. Пуришкевич и Дзержинский сидели в отдельном кабинете «Праги». Феликс Эдмундович пересчитывал радужные кредитки. Шум после убийства еще не улегся, но было ясно, что для его участников все закончилось благополучно, как они и надеялись, не предполагая, впрочем, сколь недолгим — для некоторых! — окажется это благополучие.</p><p class="p">— Да, но почему не «Ирина»? Ведь это вы были с ним рядом, когда он очнулся.</p><p class="p">— Я был уже без парика и вуалетки. Какая, к чорту, Ирина?</p><p class="p">— М-да... Вообразите, пан Станислав: когда мы стали спускать труп под лед, он вдруг открыл глаза и прошептал: «I'll be back»... Моэм снова хлопнулся в обморок. Доктору Павлову пришлось забрать его к себе в клинику.</p><p class="p">— Но теперь-то он мертв?</p><p class="p">— Нет, не думаю... Доктор только начал им заниматься.</p><p class="p">— Я не об англичанине вас спрашиваю, а о Распутине!</p><p class="p">— После вскрытия — надеюсь, что да. Много, очень много в этой истории странного, — сказал Пуришкевич.</p><p class="p">— Уверен, в своих мемуарах вы сделаете из нее конфетку.</p><p class="p">— Прощайте, пан Станислав. — Пуришкевич поднялся из-за стола. — Полагаю, мы больше не увидимся.</p><p class="p">— Человек предполагает, а Бог располагает, — нравоучительно ответил Дзержинский. — До свидания...</p><p class="empty-line"/><p class="p">Эту мерзость он так и не смог забыть до конца своих дней. В минуты дурного настроения, болезни или слабости воспоминания возвращались, и снова и снова видел он: камин с горящими поленьями, гитара С бантом, окровавленные гири, маленькие глазки Распутина, белый медведь... все кружилось в безумном вихре и тонуло в дымных кольцах, стекавших с кончика юсуповской папиросы...</p><p class="p">Феликс Эдмундович сделал несколько безрезультатных попыток выкрасть у князя компрометирующие фотоснимки, но в конце концов вынужден был махнуть на это рукой — до поры до времени, как он надеялся. Оставаться далее на свободе было незачем, да и опасно; на следующий день он, подойдя на улице к городовому, крикнул ему прямо в ухо: «Долой самодержавие!» и был доставлен в участок. Спустя несколько дней он снова сидел в «Сахалине» под 217-м нумером и, выходя в двойных кандалах на прогулку, привычно считал шаги: раз-два, раз-два...</p></span>
