<span id="id11"><div class="title">
<p class="p1">ГЛАВА 10</p>
</div><p class="subtitle">Будущее революции поставлено на карту. Смольный и Зимний. Где кольцо? Дзержинский и Ленин заключают соглашение. ЧК. Дележ портфелей.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">Между тем настроение у Ленина в Выборге стало портиться: он никак не мог решить — пытаться еще раз реставрировать монархию в России путем вооруженного переворота или же действовать как-нибудь потихоньку, парламентскими методами. Жена и друг — оба были за мирное решение проблемы и уже однажды оказались правы, но Дзержинский в злобных цидулях настаивал на перевороте, и Владимир Ильич не мог хотя бы отчасти не признавать и его правоту.</p><p class="p">Душа его разрывалась; он метался... «Быть иль не быть? Орел или решка? Красное или черное?» Он уже подумывал о том, чтобы притвориться сумасшедшим и таким образом снять с себя ужасную ответственность. Но в конце концов — все-таки он был не чистокровный датский принц, а наполовину русский, — Ленин принял решение, как подобает мужчине. Он сел и написал письмо ко всем петроградским революционерам. «БУДУЩЕЕ РЕВОЛЮЦИИ ПОСТАВЛЕНО НА КАРТУ», — сообщал он им. Потом он позвал жену.</p><p class="p">— Сними-ка. — Он очень волновался, протягивая ей колоду. Даже руки его слегка дрожали.</p><p class="p">Ни о чем не подозревавшая Крупская спокойно сдвинула несколько карт и протянула колоду обратно. Он медлил; сердце его страшно билось, в горле пересохло. Он несколько раз трогал колоду и отдергивал руку; наконец, зажмурясь, вытянул карту из середины и медленно открыл глаза...</p><p class="p">Карта была ЧЕРНАЯ — туз пик.</p><p class="p">Это означало вооруженное восстание.</p><p class="empty-line"/><p class="p">Он вернулся в Петроград в первых числах октября (Крупская и Зиновьев, обозлившись, что он не послушал их советов, сбежали раньше); погода была серая, скучная, и моросил мелкий дождик. На душе у него по-прежнему было пасмурно, но он бодрился. Меж тем подготовка к перевороту шла полным ходом: Дзержинский запасал кокаин и спирт, Коллонтай будоражила матросов. «Ох, до чего ж мне не нравятся эти матросы, — с тоскою думал Ленин, — они хуже всякого пролетариата... Вдруг Железный Феликс и Красная Лилит их так возбудят, что они не пустят меня к трону? Нанюхавшись, они и зарезать могут... Мало ли у нас было цареубийств? И Железного нельзя недооценивать... Я так до сих пор и не возьму в толк, на кой чорт ему революция... Не может быть, чтоб он не преследовал какой-нибудь своей выгоды. Однако ж я не должен кукситься!» И он сел сочинять «Советы постороннего» — настойчиво подчеркивая, что в случае силового разрешения всероссийской смуты остается как бы ни при чем:</p><p class="p">«1. Восстание, как и мюзик-холл, есть искусство. Считать, что восстание не есть искусство, — так же глупо и обывательски-пошло, как утверждать, что мюзик-холл — не искусство. Мюзик-холл несет массам счастье, то же и восстание. Кто скажет, что восстание не искусство, тот не революционер.</p><p class="p">2. Три главные силы — матросы, курсистки и пролетариат — должны занять и ценой каких угодно потерь удержать телефон, телеграф, железнодорожные станции, синематограф и казино в первую голову.</p><p class="p">3. Смелость, смелость и еще раз смелость, господа большевизаны! Держите хвост пистолетом!»</p><p class="p">Отдав статью Крупской на правку, он повеселел. «Главное — добраться до кольца; как только я возьму его в руки — оно придаст мне силы действовать-Прибавим сюда авось и как-нибудь — вот дельце и выгорит».</p><p class="p">Десятого октября за чаем на квартире гостеприимного меньшевизана Суханова-Гиммера прошло последнее заседание штаба большевиков. Кроме Ленина, Дзержинского и призрака Троцкого, присутствовали: Зиновьев и Каменев (они помирились, как-то, по-видимому, решив вопрос о сапогах), деловитый и подающий надежды Свердлов (он единственный из всех большевиков, кроме Кржижановского, твердо знал таблицу умножения), Коба Сталин, Шурочка Коллонтай, протеже Дзержинского молодой налетчик Урицкий и еще несколько малозначительных лиц. приглашенных просто для компании. (Надежда Константиновна прийти отказалась, сославшись на мигрень.) Все они были в разноцветных париках, усах, бородках, бакенбардах, в сложном гриме — и с трудом узнавали друг друга... Ленин был не в духе, у него болели зубы, приходилось постоянно полоскать рот водкой, а выплевывать было жаль, — так что к концу вечера он уже смутно понимал происходящее.</p><p class="p">Все долго спорили и ругались. Зиновьев, дико возомнивший о себе после написания «Государства и эроса», опять твердил, что провинция не поддержит большевиков, а при поддержке Учредительного собрания, которое вот-вот должны были созвать, можно добиться большего, нежели военным переворотом. Лева Каменев поддерживал своего товарища.</p><p class="p">— С Керенским вполне можно договориться, — уверял он.</p><p class="p">— Конечно, можно, — согласился Зиновьев. — Он очень даже ничего.</p><p class="p">— Урод, — возразил Каменев и посмотрел на Гришу очень сердито. — Костюма носить не умеет. Ему женское платье носить — таз широкий. Но договориться можно.</p><p class="p">— С фраерами только фраера договариваются, — сквозь зубы произнес Урицкий и, сияя новенькой фиксой, сплюнул на пол.</p><p class="p">— Решили ведь делать переворот, — угрюмо сказал Ленин, не желавший показаться колеблющимся и безвольным человеком, — так чего уж теперь?</p><p class="p">— Простите, а вы, собственно, кто такой? — спросил Свердлов, глядя на Ленина очень подозрительно. Ильича и вправду трудно было признать в повязке, с двумя трогательными заячьими ушами над лысиной. Вдобавок он для конспирации сбрил бородку.</p><p class="p">— А мои матросы! — кричала Шурочка Коллонтай. — Они так возбуждены! Нельзя обмануть их ожиданий!</p><p class="p">— Зарэзать, и дело с концом, — пробурчал Сталин.</p><p class="p">— Кого, Коба?</p><p class="p">— Да всэх.</p><p class="p">— Ах, Коба, ну тебя, надоел, — отмахнулся Зиновьев. — Поди лучше принеси фруктов... (Ах, если б он мог увидеть, каким взглядом посмотрел на него Сталин, выходя из комнаты!..)</p><p class="p">— Довольно пререканий, — холодно сказал Дзержинский. — Все решено. Временное правительство вот-вот откроет фронт и сдаст немцам Петроград. Немцы — подлецы, они удушат революцию в колыбели. — «Как только русские болваны могут слушать всю эту чушь?» — удивлялся он и по примеру Ленина продолжал нести что в голову взбредет: — Зато как только мы возьмем власть в свои руки — на Западе тоже наступит социализм. Короче говоря, спирт роздан — отступать некуда.</p><p class="p">— Если разлили, надо пить, — кивнул Урицкий. — Вынул нож — режь.</p><p class="p">— Если яйцо разбито, надо делать яичницу, — вставил Ленин. Он где-то вычитал эту французскую фразу и считал ее довольно эффектной.</p><p class="p">— Впрочем, можете проголосовать, если хотите... — презрительно усмехнулся Железный. — Но учтите, другого такого бардака при нашей жизни может не случиться. Ставлю на голосование резолюцию товарища Ленина. Кто «за»? Товарищ Свердлов?</p><p class="p">— Угу... — Свердлов вздохнул и поправил очки, всегда сидевшие на нем немного криво.</p><p class="p">— Товарищ Урицкий?</p><p class="p">— Ну! В натуре.</p><p class="p">— Товарищ Сталин?</p><p class="p">— Таварищ Сталин за все.</p><p class="p">— Товарищ Каменев?</p><p class="p">— Я... Я... — На лице Левы отразились мучительные колебания. — Я, вообще-то, против... Но голосую «за»... Короче, запишите, что я воздержался. Потому что товарищи...</p><p class="p">Ленин ожидал, что Зиновьев вскочит и вцепится Леве в волосы, но тот, поняв, что дело проиграно, лишь пролепетал, что он хотя и против, но тоже «за», ибо товарищи...</p><p class="p">— Вот и превосходно, — подытожил Дзержинский. — Товарищ Троцкий, разумеется, «за»... Так что ставить на голосование резолюцию товарища Зиновьева нет никакой необходимости.</p><p class="p">И резолюция о вооруженном перевороте была принята. Зиновьеву за его постоянное штрейкбрехерство отомстили, не включив в состав тайной пятерки под леденящим душу названием Политбюро, которая должна была руководить переворотом. В нее вошли Ленин (его обязанностью было произнесение речей), Дзержинский (снабжение кокаином и общее руководство), Сталин (шашлык, фрукты и семечки), чистосердечно раскаявшийся Каменев (ведение протоколов) и, разумеется, безответный Троцкий, чтобы в случае неудачи было кого выдать Временному правительству. Впрочем, за оставшиеся до переворота дни неугомонный Феликс Эдмундович успел насоздавать еще штук двадцать различных секретных и сверхсекретных пятерок, троек и других органов. Он делал это специально, чтобы среди революционеров был хаос и никто не помнил, когда и за какую резолюцию голосовал, и не понимал, какой орган главный и кто кому и в каких вопросах должен подчиняться.</p><p class="empty-line"/><p class="p">— Ильич, не по душе мне все это. Подумай об Инессе! Ей бы тоже не понравилось.</p><p class="p">— Молчи. Без тебя тошно. — «Много воли ей даю; совершенно на шею садится, — думал Ленин. — Да, распустили мы бабье не в меру. Еще Коллонтай с ее матросами, чтоб им пусто было...»</p><p class="p">— Ох, Ильич, не к добру вы это затеяли... Один ваш Сталин полоумный чего стоит... Как зыркнет своими глазищами — так меня в дрожь кидает, ей-богу. Я его боюсь.</p><p class="p">— Глупости, Nadine. Коба безобидный идиот.</p><p class="p">— И где это видано, чтобы пьяные матросы государством верховодили!</p><p class="p">«Может, пришла наконец пора сказать ей? — размышлял Владимир Ильич. — Сказать, что скоро она будет императрицею, что матросов я отправлю обратно на корабли — чтоб духу их в городе не было! — что все будет хорошо... Град Китеж из воды подымется, и все будут с утра до вечера есть пряники и ходить в казино и синематограф... Нет, нельзя — сглазишь! — Он был суеверен, как все игроки. — Будет ей зато приятный сюрприз».</p><p class="p">— Пьяный проспится, — сказал он.</p><p class="p">— Вот-вот. А дурак — никогда. Это я о тебе, Ильич. </p><p class="p">И, шарахнув дверью, Надежда Константиновна ушла в гости к Каменеву. Они в последнее время очень сблизились. Но Ленину было не до ревности, и он не удерживал жену. А зря, ибо пару недель спустя грянул гром: штрейкбрехеры Зиновьев и Каменев опубликовали во всех газетах секретный план переворота...</p><p class="p">— Ты знала!</p><p class="p">— Знала, — ответила Крупская спокойно и холодно.</p><p class="p">— Надя, это уже архисвинство и сволочизм чистейшей воды. Вот так, из-за спины... Это подло, по-бабьи. И переворота они не хотят не из благородства, как ты, может быть, себе вообразила, а из трусости и еще потому, что желают в парламенте покрасоваться.</p><p class="p">— Пусть так. Все равно вы с Дзержинским туфту задумали. — Она говорила так, лишь когда сильно волновалась или сердилась. — Кстати, Ильич, с каких это пор ты сделался с ним так дружен, а? Еще недавно он у тебя был и болван, и сволочь, и архипроститутка, а теперь — ишь ты! — не разлей вода... Знать, развел он тебя как фраерка последнего... Самому-то не совестно? В глаза мне смотри, не прячь буркалы-то!</p><p class="p">Но Владимир Ильич не мог поднять на жену взгляда... Он видел ясно, что эта уродливая женщина с лучистым взглядом вытаращенных буркал кругом права; хуже того — ежели бы он мог сознавать свое чувство, то он нашел бы, что она умней, и смелей, и лучше его. Но он все-таки был не граф Ростов, а она была не княжною, а всего лишь Надькой Миногой, бывшим уголовным элементом. И он сказал ей:</p><p class="p">— Хватит ворчать. Поди приготовь обед. Не бабьего ума это дело.</p><p class="empty-line"/><p class="p">Исправить положение было уже невозможно. Штрейкбрехеров вызвали на заседание и стали песочить.</p><p class="p">— За такое предательство товарища Зиновьева следовало бы распять, — сказал Дзержинский: он весь кипел от негодования.</p><p class="p">— Да хоть шесть, — нагло огрызнулся Зиновьев. — Ничего у вас с вашим переворотом не выйдет. А Керенский — душка.</p><p class="p">— Ты, Гриша, сволочь, проститутка и ренегат. Мужики так не поступают, — сказал Ленин. Он был сердит так же сильно, как и Дзержинский. — И еще: ты у меня на прошлой неделе занял сто пятьдесят рублей. Верни сейчас же, скотина ты этакая.</p><p class="p">Произнося эти слова, он не глядел на Гришку, так сильно сердился; взор его блуждал, он совершенно случайно взглянул в глаза Кобе, и легкая дрожь пробежала по его позвоночнику. У него было такое чувство, что из-под этого низкого лба, изрытого оспой, напоминавшей чешую, выглядывают глаза не человека, а крокодила, гадюки или еще какой-нибудь рептилии. «Нет, нет, не может быть. Обман зрения. Иллюзия».</p><p class="p">— Зарэзать их? — поигрывая кинжалом, спросил Коба у Дзержинского. Но тот подумал: «Не нужно поддаваться эмоциям; просто, грубо взять и зарезать — это очень скучно. Есть куда более утонченные способы лишить человека жизни». И он ответил Сталину:</p><p class="p">— Нет. Потом. — Ему тоже порой казалось, что Сталин что-то соображает. Но он любил проворных, гибких рептилий и не боялся их: ребенком, попадая в зоопарк, он первым делом бежал в террариум. И он прибавил мягко: — Погоди, Коба. Это мы с тобой еще успеем. Не теперь.</p><p class="p">Ограничившись покуда тем, что пару раз дали предателям по шее и вытолкали вон с заседания, дабы они не узнали еще каких-нибудь секретов, верные заговорщики приступили к главному вопросу: какого числа и в котором часу делать переворот.</p><p class="p">— Давайте вечерком седьмого ноября, — предложил Ленин. (Седьмого ноября были именины покойной Алены Родионовны.) — Хорошая дата. И рифмуется шикарно, вот, послушайте: седьмое ноября — красный день календаря...</p><p class="p">— Седьмого так седьмого, — согласились остальные. — Хорошая дата.</p><p class="p">Но вышло все несколько иначе. Ранним утром 24 октября, когда почти все главные большевики, меньшевики и эсеры сидели в бывшем здании разгромленной «Правды» и пили кофе, раздался телефонный звонок... Трубку снял Свердлов. Лицо его вытянулось... Положив трубку на рычаг, он некоторое время молчал и ошарашенно хлопал глазами. Потом сказал:</p><p class="p">— Товарищи, нас предупреждают об опасности: Керенский ввел войска с фронта.</p><p class="p">— А кто это звонил? — спросил Ленин: он сидел на краешке стола, болтая ногою, и обмакивал круассанчик в чашку с кофе, как привык делать в Париже. — Может, номером ошиблись?</p><p class="p">— Это звонил Троцкий...</p><p class="p">— Кто?!</p><p class="p">— Троцкий. Он так представился.</p><p class="p">— Яша, вы чокнулись. Троцкого не существует; как же он мог звонить по телефону?</p><p class="p">— Ну уж я не знаю, — обиженно отвечал Свердлов, — существует Троцкий, не существует ли... А только он звонил. Это факт. Он сказал, что отдан приказ о нашем аресте, и велел всем немедленно ехать в Смольный и там забаррикадироваться.</p><p class="p">— Чушь собачья! — яростно фыркнул Ленин. — Буду я еще подчиняться какому-то несуществующему Троцкому! — Но тут он выглянул из окна и увидел, что по улице идут войска... «Бывают же какие-то там потусторонние голоса, которые предупреждают людей о разных вещах. Как-то, помню, баба Лена слышала голос своей покойной матушки, которая велела ей из дому не выходить; а назавтра она пошла в мясную лавку и сломала ногу... Есть многое на свете, что недоступно уму...» — Товарищи, Троцкий прав: забаррикадироваться надо бы... Только зачем ехать в Смольный? — Ленин поморщился: зуб болел все сильней.</p><p class="p">— Там институтки, наверное... Никто не подумает, что у большевиков штаб в институте благородных девиц.</p><p class="p">— Не знаю. Вы езжайте, а я потом.</p><p class="p">— Слушайте, Ленин! — взорвался маленький алкаш с бородкой, прозванный за роковую склонность Бухариным; выпив, он начинал неудержимо рассуждать о пользе спиртного, за что получил добавочное прозвище «главного теоретика партии». — Все рискуют, а вы будете тут сидеть, круассанчик кушать?</p><p class="p">— Я болен, говорят вам! — простонал Ленин. — У меня зубы болят, дубина!</p><p class="p">— И что? Теперь из-за ваших зубов всем пропадать?</p><p class="p">— А вы без меня уже не можете до Смольного доехать?</p><p class="p">— Мочь-то можем, — подал голос Богданов, — однако, Ильич, вы главный оратор партии. Если придется говорить с солдатами, никто, кроме вас, их не заболтает... Не Кобу же выставлять против штыков!</p><p class="p">— Ну я приеду, приеду! — поморщился Ленин. — Только не сейчас!</p><p class="p">Ему до смерти не хотелось ехать в Смольный со всей этой компанией. Забаррикадироваться на подпольной квартире было бы, конечно, верней. Сейчас они выйдут на улицу, попадутся первому же патрулю—и прощай, наследник российского престола...</p><p class="p">Призрак Троцкого был ни при чем. По телефону звонил и разговаривал измененным голосом Феликс Эдмундович. Он решил не дожидаться седьмого ноября, потому что у него закончились запасы морфия, необходимого, чтобы до поры до времени держать революционных матросов в состоянии сонной одури. Большевиков же Дзержинский отправил в Смольный затем, чтобы во время переворота они все были заперты вместе и не могли подойти к Зимнему. Он один будет там и вместе с революционными матросами — чтоб им провалиться! — войдет во дворец и наденет на палец волшебное кольцо.</p><p class="empty-line"/><p class="p">Надев парики, революционеры короткими перебежками направились в Смольный. Парика не было только у Кобы — он обходился огромной кепкой; да, по совести говоря, кому нужен идиот? Ленин досидел на конспиративной квартире до вечера, а вечером зуб разболелся так, что, пометавшись по комнате, он отправился в Смольный. У большевиков всегда можно было достать морфий, так он, глядишь, дотерпит до утра — а утром к врачу. Только не врачу из товарищей, вроде Богданова, — а настоящему врачу, по зубной части. Слово «товарищ», понял Ленин, способно обесценить все: врачи-товарищи не умели лечить, журналисты-товарищи — писать, а уж женщина-товарищ...</p><p class="p">Вечером он покрепче завязал повязку и, спрятав под кепку белые уши платка, отправился в Смольный.</p><p class="p">«Может, и институтки там, — думал он с надеждой. — Забаррикадировались, на улицу-то боятся... Эдакие, в азарте, в легкой панике...». Он даже забыл ненадолго о зубе.</p><p class="p">А на улицах и без правительственных войск было неспокойно. Повсюду, предводительствуемые Шурочкой Коллонтай и девушками-символистками вроде Ларисы Рейснер, слонялись огромные толпы революционных матросов вперемешку с революционными солдатами: они пели песни, грабили магазины, расстреливали встречных и поперечных... «С этим надо что-то делать... — думал Ленин, крадясь как можно незаметнее вдоль домов. — Например, объявить войну какой-нибудь морской державе и отправить туда этих растреклятых матросов... Как бы им не взбрендило поджечь или взорвать Зимний... Потом поди ищи там кольцо! И где Железный?! Вторые сутки уж как он не появляется... Неразбериха полнейшая... Неужто он и впрямь нас всех обдурить решился? Но я не дудка и играть на себе не позволю...»</p><p class="empty-line"/><p class="p">В то время как Владимир Ильич рефлексировал, Феликс Здмундович действовал. Переодевшись Троцким, он бросал отряды в бой; изменив почерк, от имени Ленина писал и разбрасывал воззвания («Временное правительство низложено; власть перешла в руки Петроградского совета...»), — эта ложь нужна была ему для того, чтобы поднять боевой дух в рядах матросов; к утру 25-го он навел обратно разведенные Керенским мосты и хладнокровно занял почту, телеграф, Николаевский и Балтийский вокзалы, центральную электростанцию (не без помощи земляка Кржижановского), Государственный банк, крейсер «Аврора», «Яр», «Стрельну», «Донон», «Прагу», «Аквариум» и много других стратегических объектов.</p><p class="p">«Час настал. Теперь иль ни... иль как-нибудь в другой раз, — мысленно поправился Дзержинский: он был предусмотрительным человеком. Он еще раз прокрутил пред собою план дальнейших действий. — Беру Зимний, арестовываю Временное правительство, вешаю Керенского (Феликс Эдмундович не знал, что Керенский, переодевшись в соответствии с рекомендациями предателя Зиновьева, уже бежал из Петрограда), нахожу и надеваю заветное кольцо, объявляю себя императором, отдаю матросам приказ о взятии Смольного, арестовываю большевичков, меньшевичков и эсеров, вешаю Ленина, Свердлова и Каменева, отдаю матросам Крупскую, Зиновьева и Коллонтай, издаю указ о присоединении России к Польше, разбиваю немцев наголову, а потом...» Он жадно втянул в себя щепотку белого порошка. Он вспомнил о Наполеоне, представил покорную Европу пред собой, и на душе его взыграла радость почти непереносимая...</p><p class="empty-line"/><p class="p">А в это время в Смольном царил хаос полнейший. В тогдашней фразеологии такой полный хаос назывался «Съездом Советов» — в честь неудачнейшей попытки Временного правительства собрать в столице рабочих, солдатских и крестьянских депутатов. Первый Съезд Советов прошел в августе, запомнился всем полнейшей неразберихой и на второй день закрылся из-за того, что все передрались. С тех пор, увидев беспорядок в доме, муж запросто мог сказать жене: «Катя, ну что это за Съезд Советов на моем столе!», а классицист Бунин обзывал поэзию футуристов «полнейшим Съездом Советов в голове». По коридорам бродили большевики, эсеры, институтки, солдаты и матросы. В октябре семнадцатого в Петрограде мало кто спал ночами. В комнате с табличкой «Классная дама» Ленин и Свердлов обсуждали положение.</p><p class="p">— Как вы думаете, Яша, что там сейчас делается? — Владимир Ильич, не в силах усидеть на месте, вскочил и стал ходить взад-вперед по комнате.</p><p class="p">— Не знаю, Ильич. Я же здесь, а не там, — резонно ответил Свердлов.</p><p class="p">— Эх, Яша, Яша... Послушай, Коба, дружок, — обратился Ленин к сидевшему в углу Сталину, — сходил бы ты, что ли, принес нам чего-нибудь горячего поесть... Этот сыр у меня уже в зубах навяз.</p><p class="p">На самом деле Ленин вовсе не был голоден; он искал предлога отослать Кобу, потому что его раздражал этот постоянно обращенный на него крокодилий взор... Коба с легким ворчанием поднялся и ушел. Ленин задумчиво посмотрел ему вслед.</p><p class="p">— Яша, вам никогда не казалось, что...</p><p class="p">— Что?</p><p class="p">— Нет, ничего. Вы ведь, Яша, имели удовольствие наблюдать Кобу в Туруханске... Как он там себя вел?</p><p class="p">— А разве Лева Каменев вам не рассказывал? Ведь Коба был у него чем-то вроде денщика.</p><p class="p">— Рассказывал, но так, чепуху всякую: Коба не моет посуду, Коба не моет руки, Коба не моет ноги...</p><p class="p">— Это верно, — сказал Свердлов. — Он ведь сперва в моей избе жил, но я не мог больше выносить этой нечистоты и отдал его Леве. А с Левою они, по-моему, в общем и целом прекрасно уживались. Ведь Лева любит грузинскую кухню, а Коба стряпал очень даже неплохо... Если, конечно, не обращать внимания на то, что он грязным подолом миски вытирал.</p><p class="p">— А чем он еще занимался?</p><p class="p">— Лева-то? В основном, по-моему, растлением деревенских.</p><p class="p">— Нет, Коба.</p><p class="p">— Да и Коба тоже. Только девочек. Там даже был скандал с отцом какой-то соплюшки...</p><p class="p">«То-то Железный к нему благоволит, — подумал Ленин. — А Яша умен и наблюдателен». Ленин, как и все в партии, как-то мало знал Свердлова и никогда не обращал на него особого внимания. Но теперь он подумал, что такого рассудительного и спокойного человека было бы неплохо использовать в будущем правительстве. «Ведь остальные только болтать горазды; а работать кто будет? Яша и Глеб Кржижановский, больше некому».</p><p class="p">— Кушать пажалуста, — угрюмо объявил вошедший с подносом Коба. Где он реквизировал колбасу — никто не знал. Ни у Свердлова, ни у Ленина не было аппетита...</p><p class="empty-line"/><p class="p">В девятнадцать ноль ноль Дзержинский объявил ультиматум Зимнему. Он не был каким-нибудь сумасшедшим торопыгою; он весь пылал от нетерпения, но умел холодной рукою обуздывать порывы своего горячего сердца. Он дал оборонявшимся двенадцать часов — до семи утра. В двадцать один час сорок минут он, чтобы напугать их, приказал пару раз стрельнуть по дворцу холостыми — из Петропавловской крепости и с «Авроры». Охранявшие дворец юнкера в свою очередь открыли по осаждавшим пулеметный и ружейный огонь. Завязалась сильная перестрелка. Дзержинский велел прекратить ее. Он вовсе не желал потасовок и штурма: беспорядок ему претил, и он мирился с ним лишь вынужденно. В двадцать два ноль ноль, убедившись, что его приказание выполнено, он ушел на одну из конспиративных квартир, выходившую окнами на Дворцовую площадь. Там он вколол себе морфий, чтобы нейтрализовать действие кокаина, и лег, намереваясь немного поспать.</p><p class="empty-line"/><p class="p">— Яша, Яша, что это было?!</p><p class="p">— Стреляли, однако, — невозмутимо отвечал Свердлов. Ленину все больше нравилось его хладнокровие. — Из пушки стреляли. Пари держу — из Петропавловки.</p><p class="p">— А что это, по-вашему, может означать? — спросил Ленин, стоя у окна и вглядываясь в зарево. — Уж не революция ли?! — воскликнул он, мгновенно похолодев от отчаяния. «А я тут прячусь, как крыса! Бежать в Зимний, скорей бежать...»</p><p class="p">— Старайтесь, Ильич, рассуждать логично. Откуда там может взяться революция, ежели все революционное руководство сидит здесь?</p><p class="p">«Да, в самом деле, — с облегчением подумал Ленин. — А он, ей-богу, прирожденный министр или управляющий делами. Как мог я раньше не оценить этого типа?» И он спросил Свердлова:</p><p class="p">— Скажите, Яша... Как вы относитесь к семье Романовых? Вы лично? — «Пожалуй, ему можно будет поручить аккуратно и без шума вывезти всю мою треклятую родню за границу...»</p><p class="p">— Лично? Да никак не отношусь. А что? — осведомился Свердлов с некоторым любопытством. «И Феликс Эдмундович почему-то спрашивал меня об этом, — подумал он, — как странно, что такая маловажная чепуха интересует наших вождей...»</p><p class="p">Но он не успел получить ответа на свой вопрос, ибо в этот миг дверь кабинета отворилась и взволнованные революционеры стали умолять Ленина выступить перед ошалевшими от болтовни и безделья делегатами съезда, которые в противном случае собирались прямо в актовом зале открыть стрельбу.</p><p class="p">— Да погодите вы с вашим съездом! Там, на улице, кажется, что-то происходит... Ну, объявите в работе съезда перерыв, что ли! — И Ленин вновь прильнул к оконному стеклу, пытаясь понять, куда клонятся события. — И давайте же наконец выпьем водки, господа. Сил нет больше так сидеть.</p><p class="empty-line"/><p class="p">Меж тем события, которым надлежало спокойно развиваться по плану Феликса Эдмундовича, ближе к полуночи внезапно вышли из-под контроля... Причиной тому были два особенно пьяных и сердитых матроса — Антонов и Овсеенко, — которым осточортело бесплодное стояние на Дворцовой площади, и они, пользуясь отсутствием какого бы то ни было начальства, начали подбивать своих товарищей по-быстрому вломиться в Зимний: оба они были хоть и пьяны, но отнюдь не дураки и догадывались, что там найдется чем поживиться.</p><p class="p">— Да погодите вы, ребята, — возражали им некоторые, более спокойные и добрые матросы, которым не хватило спирта и кокаина. (Вполне вероятно, что по природе своей революционный матрос добр...) — Куда торопиться? Пущай энти министры всласть позаседают напоследок. Чего уж там.</p><p class="p">— Плевать на министров... Бабы там... — сказал Антонов и гнусно облизнулся. — Цельный батальон баб, ребятушки... — Он имел в виду женский ударный батальон, который, по слухам, вместе с юнкерами нес охрану Зимнего. (Он заблуждался: женщин давно уж отправили по домам.) Но Овсеенко подтвердил его слова.</p><p class="p">И по Дворцовой площади понеслось победное «ура»; людской поток перехлестнул баррикады; юнкера без шапок, без ремней, с бледными лицами, с поднятыми руками толпой сгрудились среди развалин; короткая схватка на ступенях лестницы — и Зимний взят! Брильянтов на всех не хватает — тем хуже для обоев! Женщин во дворце не оказалось — тем хуже для юнкеров!..</p><p class="p">Набив полные карманы добра, Антонов с Овсеенко, уже не такие сердитые, пошли арестовывать Временное правительство, а остальные матросы разбежались по дворцу и продолжали — а кто б на их месте вел себя иначе? — тащить все, что попадало под руку. И вот уже молодой солдатик Ванька Жуков, забравшись в будуар бывшей императрицы, тянет на себя ящичек трюмо и горстями выгребает оттуда жемчужные и брильянтовые цацки... (А Дзержинский спит, и спит Ленин...) А Ванька уже отбивается от собственных товарищей; он телом хил и слаб, и ему из всей добычи удается удержать лишь пару изумрудных брошек да паршивенькое колечко, цена которому — полтинник в базарный день...</p><p class="p">«Брошки продам, — решил он, сидя на полу и утирая кровавые сопли. — А перстенек Катьке подарю. У ней и такого сроду не было». Он очень любил знакомую девушку Катю, но она на него и глядеть не хотела, а ходила с его другом Петькой, который был выше ростом и кудрявый. Он надеялся, что теперь все переменится.</p><p class="p">Антонов и Овсеенко подошли к двери, за которой заседали министры. Дверь охраняли несколько совсем молоденьких, безусых юнкеров, окаменевших от страха.</p><p class="p">— Здесь Временное правительство? — спросили Антонов и Овсеенко.</p><p class="p">— Здесь, здесь! — заюлил юнкер и, заглядывая Антонову и Овсеенко в глаза, видимо, неожиданно для самого себя шепнул, глупо улыбаясь: «Я ваш».</p><p class="p">— Нет, спасибо, — вежливо отвечал Овсеенко, а Антонов, усмехнувшись, распахнул двери... Дрожащие от ужаса министры сбились в кучку...</p><p class="p">— Именем Военно-революционного комитета объявляю вас низложенными на х...! — гордо произнес он и рыгнул.</p><p class="empty-line"/><p class="p">Яков Михайлович Свердлов мирно спал на расстеленных газетах, когда в кабинет ворвался какой-то растрепанный солдат в кожаной куртке, растолкал его и закричал прямо в ухо:</p><p class="p">— Товарищ Ленин, Зимний дворец взят!</p><p class="p">— Что ж ты, братец, так орешь... — сказал ему невозмутимый Свердлов. — Во-первых, я не Ленин. Ленин там, на диване. А во-вторых, как это Зимний может быть взят?</p><p class="p">— Да уж взят. Ей-богу!</p><p class="p">— Ну хорошо, хорошо... — сказал Свердлов, пожимая плечами: он не привык спорить с фактами. — А кем он взят? По чьему приказу? Кто руководил штурмом? Что я должен доложить товарищу Ленину, когда он проснется?</p><p class="p">— Да чорт его знает, товарищ... Оно ведь как все вышло? Антонов с Овсеенко заорали и побежали... И все за ними заорали и побежали... Как-то так все и вышло...</p><p class="p">«Штурмом Зимнего дворца руководил Антонов-Овсеенко», — записал Свердлов на листочке бумаги, чтоб не позабыть. Он не хотел будить Ленина, полагая, что нет никакой разницы, узнает ли тот о взятии Зимнего сию минуту или утром. Но Ленин и сам проснулся.</p><p class="p">— Зимний взят? Как то есть взят?! — вскричал он.</p><p class="p">— Да чорт его знает, товарищ Ленин. Оно ведь как все вышло?.. Короче, Временное правительство арестовано и отвезено в Петропавловку. А Керенский смылся, лахудра!</p><p class="p">Услышав это, все революционеры закричали «ура»; через несколько мгновений весь Смольный знал великую новость, и своды института дрожали от победного клича. Не кричал вместе со всеми один лишь человек: скатившись кубарем с лестницы, не попадая в рукава, ругаясь как последний сапожник, Владимир Ильич мчался в Зимний...</p><p class="empty-line"/><p class="p">Дзержинский проснулся от шума и криков за окном; он поднял тяжелую голову с подушки, и ужас захлестнул его... Они нарушили приказ! Опоздал! Полуодетый, в сапогах на босу ногу, он, потрясая револьвером, кинулся во дворец. Оттолкнув самозваного коменданта Зимнего дворца Чудновского — тот не узнал его без грима и наклеенной бороды, — он бросился наверх... О, где она, где она, волшебная комнатка!.. Острый взгляд его на бегу отмечал сорванные портьеры, поломанную мебель, загаженные коридоры... Он рванул на себя заветную дверь...</p><p class="p">— Вы... вы что здесь делаете? — срывающимся голосом спросил он.</p><p class="p">— А вы? — спросил Ленин, сердито пыхтя: он уже минут десять ползал на четвереньках по разгромленному будуару и был настолько близок к отчаянию, насколько это позволял жизнерадостный склад его характера.</p><p class="p">— Так, — чудовищным усилием воли овладев собою, сказал Дзержинский. — Зашел проверить, как тут все.</p><p class="p">— Ну вот и я зашел.</p><p class="p">— Вы почему не в Смольном? — гневно спросил Дзержинский. — Там у вас, между прочим, полный Съезд Советов! А вы шляетесь неизвестно где и зачем!</p><p class="p">— А вы почему не дождались седьмого ноября, как было условлено? Надуть нас всех хотели? И почему вас чорт принес именно в эту комнату? Что, других мало?</p><p class="p">— А вас?</p><p class="p">Вместо ответа Ленин устало махнул рукою и сел на пол. «Все, все пропало. Все растащили матросы проклятые. Ищи-свищи теперь». Дзержинский — у него была ломка, и ноги не держали его — сел рядом. Некоторое время они сидели в молчании, тяжело дыша, убитые горем и разочарованием. «Все пропало, — думал и Дзержинский. — Но нет, нет, не все! Я еще молод... Я найду ЕГО... Но как? И что же теперь делать со всеми этими ужасными матросами? И кто будет править Россией, пока я ищу кольцо?» Он достал из кармана пакетик с порошком, зеркальце, зубочистку. С жадностью вдохнул пару дорожек. Голова его сразу очистилась, руки похолодели, сердце забилось горячо; мысль заработала с хрустальной, ледяной ясностью. И в уме его мгновенно сложился новый изощренный план...</p><p class="p">— Хотите? — предложил он Ленину.</p><p class="p">— Благодарю. Ешьте сами, — буркнул Владимир Ильич и, в свою очередь, извлек из кармана штанов небольшую, но поместительную плоскую фляжку с шустовским коньяком, которую, как и три серебряных наперстка, всегда носил при себе. — Налить вам?</p><p class="p">— Наливайте, — совершенно неожиданно для Ленина залихватским тоном ответил Дзержинский.</p><p class="p">— Серьезно? Не закосеете?</p><p class="p">— Я никогда не косею, — ответил Дзержинский надменно. Ленин этого шляхетского превосходства стерпеть не смог и сказал:</p><p class="p">— Вот как? Ну, тогда дайте и мне вашей тараканьей отравы.</p><p class="p">Во времена бурной и веселой юности Владимир Ильич пару раз по настоянию развращенных подруг побаловался этой дурью. Она показалась ему скучна и противна, от нее был насморк и схватывало живот, но ничего особенно ужасного с ним не случилось, и он был уверен, что обойдется и на сей раз. Он одним духом выпил полфляжки коньяку и, морщась, втянул в себя порцию порошка, что поднес ему Дзержинский. В носу противно защекотало, язык на мгновение онемел. Но больше ничего не происходило. «Дурь на меня абсолютно не действует», — подумал он с гордостью. От этой мысли настроение у него сразу поднялось, мысли запорхали как яркие бабочки, все преграды сделались по колено, горести отступили куда-то за горизонт.</p><p class="p">Увы, Владимир Ильич в таких штуках не особо разбирался и не обратил внимания на то, что порция была несколько великовата. Он также не знал, что кокаин Дзержинского — в отличие от того, что он пробовал в молодые годы, — колумбийский и наивысшей пробы. Да и коньяк был крепок. К тому же сказались усталость и нервное возбуждение. Короче говоря, он окосел.</p><p class="p">— Так что вы здесь искали? — спрашивал Дзержинский. — Скажите, друг мой. Я никому не разболтаю.</p><p class="p">— Честное бал... благородное слово? — спросил Ленин. В бешено кружащейся голове его хрустальные колокольчики пели «Мы венчались не в церкви...».</p><p class="p">— Могила.</p><p class="p">— А, ерунда... Я хотел взять одну вещь. — Комната описала круг и стала на свое место.</p><p class="p">— Уж не кругленькую ли такую?</p><p class="p">Вместо ответа Ленин хитро посмотрел на Дзержинского, поднес к губам палец и замотал головою. Потом он игриво улыбнулся и запел: «Потеряла я колечко...» Дзержинский молча глядел на него. Самые страшные подозрения подтвердились. «Но зачем этому рыжему бездельнику кольцо?! Какое он может к нему иметь отношение?!» И вдруг Феликс Эдмундович вспомнил о предостережении, что сделал четырнадцать лет назад дух Огюста Бланки...</p><p class="p">— Кто была ваша мать? — спросил он. И на сей раз Ленин ответил честно — а почему бы и не рассказать правду такому приятному и развеселому собеседнику, тем более когда в уме царит восхитительная легкость?</p><p class="p">— Моя мать — императрица. Марья Федоровна. О, мама, мамочка... Я так и не обнял ее ни разу.</p><p class="p">— Так вы — Романов? Вы царской крови? — спросил Дзержинский. Нельзя сказать, что эта новость так уж сильно поразила его воображение: во-первых, он тоже был слегка под кайфом, а во-вторых, считал семейство Романовых таким ничтожным, что к нему вполне мог принадлежать какой угодно проходимец.</p><p class="p">— А что, по мне не видно?</p><p class="p">— О да, — сказал Дзержинский льстивым тоном.</p><p class="p">«Чушь какая-то, — думал он. — Ведь кольцо может иметь силу лишь в руках потомка Марины и Димитрия. Узурпаторы и самозванцы Романовы тут вообще ни при чем. И совершенно неважно, взаправду ли рыжий болван их родственник или просто возомнил о себе по какому-то недоразумению. Но он определенно воображает, что... Ну так использую же его в моей игре!» И он продолжил сыпать комплиментами, на все лады расхваливая ораторские способности Ленина, его взор и осанку, его могучий интеллект и благородные манеры.</p><p class="p">— Да, я такой, — отвечал Ленин скромно.</p><p class="p">— А эта вещь — заметьте, я не спрашиваю вас, что это за вещь! — которую вы тут в будуаре искали — она, видимо, должна была помочь вам царствовать? Вы намеревались взойти на трон, не правда ли?</p><p class="p">— Ах, дорогой мой Эдмундович, что уж теперь! Эту вещь сперли революционные матросы, будь они неладны.</p><p class="p">— Да уж наверное, не министры...</p><p class="p">— Архивредный народ эти матросы.</p><p class="p">— Совершенно с вами согласен. Послушайте, Ильич! Хотите, я помогу вам разыскать эту вашу вещь? И еще... — Дзержинский взглянул в глаза Ленину с притворным смущением и фальшивым раскаянием. — Простите меня за m-me Арманд. Если можете — простите. Я всего лишь мужчина и не мог устоять пред нею. Она так прекрасна! У вас отличный вкус.</p><p class="p">«Значит, все-таки было, — подумал с горечью Владимир Ильич, — а она лгала мне... Но какой же он благородный человечище, хоть и скотина! А я думал о нем так скверно!» И он сказал:</p><p class="p">— Мне, батенька, неловко вас утруждать поисками моей пустяковой вещицы.</p><p class="p">— Ничего, ничего, — небрежно ответил Дзержинский. — Вот послушайте меня...</p><p class="p">И он развернул перед ошеломленным Лениным перспективу дальнейших действий. Поскольку вещь похищена — реставрировать монархию прямо сейчас не получится. Не Николая же сажать обратно на трон, и не бездельника Михаила, который уже куда-то смылся. Стало быть — придется на время объявить республику. Ленин встанет во главе нового государства. В сущности, это почти то же самое, что быть царем. А Феликс Эдмундович скромно удовлетворится должностью министра внутренних дел или чего-нибудь в этом роде. В этой должности он сосредоточит все свои силы на том, чтоб отыскать вещь, вручить ее законному правителю и возвести его на престол.</p><p class="p">Дзержинский, конечно, мог бы обойтись без Ленина и сам встать во главе Советской республики. Но в таком случае у него бы массу времени отнимали всякие управленческие и представительские обязанности, отвлекая от главной задачи. Роль шефа полиции была куда удобней. Ленин, естественно, не пожалеет финансов на эту организацию... А как только волшебное кольцо отыщется — в том, что рано или поздно это произойдет, Феликс Эдмундович не сомневался, — тогда уж он разгонит эту картонную республику, восстановит монархию, сядет на трон и заточит Ленина в Петропавловскую крепость или просто велит повесить.</p><p class="p">— Как вам мой план? — спросил он Ленина, естественно, имея в виду лишь ту часть плана, о которой счел нужным ему рассказать.</p><p class="p">— Гм... — сказал Владимир Ильич. Мысли его уже чуточку начали проясняться.</p><p class="p">«Чорт, сколько я ему лишнего наговорил... Нехорошо... Он какой-то от меня выгоды хочет... Ну да какая разница? Я ему подарю миллион рублей и любую должность — пусть только поможет мне найти кольцо. Он, разумеется, понял, о какой вещи я говорю, раз не спрашивает, что это за вещь. Да, но если он понял — стало быть, знает о волшебных свойствах кольца? И он тоже в будуарчике что-то хотел найти... Неужели — кольцо?! Но на кой чорт оно ему?! Ведь он даже не русский! — Ленин был не настолько высокообразован и ум его был не настолько изощрен, чтобы предположить тянущуюся сквозь столетия связь между русским царем Иоанном Грозным и каким-то современным полячишкой. — Нет, он, наверное, просто приперся за мной проследить — он же вечно с меня глаз не спускал...»</p><p class="p">— А как же диктатура пролетариата? — спросил он Дзержинского. — Как же социал-демократические идеалы?</p><p class="p">— Чепуха, вздор, игрушки для слабоумных. И вы сами это отлично понимаете, раз собрались быть царем.</p><p class="p">— А почему вы сами не хотите возглавить эту нашу временную республику?</p><p class="p">— Но ведь именно вы — будущий монарх...</p><p class="p">— Эдмундович, не забивайте мне баки!</p><p class="p">Дзержинский понял, что Ленин уже немного протрезвел, и дал ему ответ, довольно близкий к истине и понятный приземленному уму собеседника:</p><p class="p">— Мне нравится быть шефом тайной полиции. Меня от этого плющит и колбасит. (Разумеется, революционеры могли разговаривать таким языком, лишь будучи под кайфом.)</p><p class="p">— А-а, въезжаю. — Ленин отчасти успокоился. — Это на вас похоже. Помню, Гриша Зиновьев как-то сказал, что мундир шел бы вам необычайно. Кстати, вы не против, если я сделаю Гришу генерал-губернатором московским? — Отходчивый Владимир Ильич давно уже простил Гришке его штрейкбрехерство; Зиновьев же, чья наглость и жадность были беспредельны, не только не возвратил ему долга, но тут же выклянчил взаймы еще пятьдесят рублей.</p><p class="p">— Да хоть столичным, — сказал Дзержинский: он не выносил Зиновьева, но ему не хотелось сейчас препираться из-за дураков, пошляков и пустяков. Кроме того, он и сам считал, что мундир с эполетами ему пойдет. — Только учтите: ведь мы с вами должны перед всеми продолжать ломать комедию и делать вид, что мы большевики и всякое такое. Так что никаких генерал-губернаторов. Советский градоначальник так называться не может.</p><p class="p">— Вы правы. Пусть будет Председатель Петросовета. Но тогда и вам не следует называться шефом жандармов. Придумайте себе и своей организации какое-нибудь хорошенькое названьице.</p><p class="p">— Вы тоже правы. — Дзержинский решил потакать Ленину во всех мелочах, чтоб усыпить его бдительность. Он глотнул коньяку и задумался на секунду. Кайф усилился, и в голову полезли всякие романтические красивости. «Ведь это будет по сути рыцарский орден... Опричники... Тамплиеры...» — Вот, пожалуйста: «Роза и Крест».</p><p class="p">— Тьфу! — сказал Ленин.</p><p class="p">— Не нравится? Тогда... Ну, например... «Черный Крест».</p><p class="p">— Еще хуже, — поморщился Ленин. — Уж больно мрачно. Хоть бы красный, а то — черный!</p><p class="p">— Организация под названием «Красный Крест» уже существует, — заметил Дзержинский. — А у меня будет черный. Не зеленый же, сами подумайте!</p><p class="p">— И что вы все заладили: крест, крест... Я ведь вам пятьдесят раз объяснял, почтеннейший: медицина доказала, что Бога нет. — Но потом Ленин, в свою очередь, подумал, что надо бы уступать Дзержинскому по пустячкам, чтобы тот не обозлился и не сделал раньше времени какой-нибудь гадости. — Впрочем, называйте как хотите. Черный крест, черный крест... Че-Ка. ЧеКа... Очень даже ничего. Луначарский оценит.</p><p class="p">— Вот и договорились, — кивнул Феликс Эдмундович. — А теперь пойдемте обратно в Смольный. Выступите перед институтками и объявите, что у нас произошла революция. Вообще начинайте руководить. Издайте там какой-нибудь декрет.</p><p class="p">— О чем?</p><p class="p">— О чем хотите, — отмахнулся Дзержинский. Его совершенно не интересовало, что будет происходить в этом временном, игрушечном государстве.</p><p class="p">— Я, пожалуй, издам декреты о... о синематографе, о покере и о многоженстве.</p><p class="p">— Вы хотите ввести в России многоженство? — несколько удивился Дзержинский.</p><p class="p">— Нет, не то что бы ввести... («А почему бы и нет? — быстро подумал Владимир Ильич. — Непременно введу, только не сразу, а немного погодя».) Но чтобы за многоженство не преследовали в уголовном порядке. А, кстати, я и Грише обещал, что отменю в кодексе одну статейку...</p><p class="p">— Ильич, зачем мелочиться? Отменяйте весь Кодекс к чортовой матери. — Дзержинский не желал, чтобы его тайная полиция была связана каким-нибудь кодексом. Ведь он был из тех людей, что сами устанавливают правила игры.</p><p class="empty-line"/><p class="p">— ...Революция, о которой столько лет талдычили большевики, свершилась — о-бал-деть, товарищи!!! А теперь — гулять, гулять и гулять!</p><p class="p">Закончив свою речь, проходившую под грохот аплодисментов и выстрелов в потолок, под «Интернационал» и похоронные марши, Владимир Ильич сошел с трибуны. Он был в общем и целом доволен своим выступлением, хотя и сожалел немного, что Свердлов, к чьему мнению он все более склонен был прислушиваться, уговорил его огласить совсем не те декреты, которые ему хотелось, а другие — о мире, о земле и о новом правительстве. Конечно, это были хорошие и правильные декреты, но суховатые. Вот и эсеры с меньшевиками, видно, сочли их скучными, раз ушли из Смольного. Это было обидно.</p><p class="p">Председательствующий Каменев объявил о закрытии заседания, и делегаты с радостными криками разбежались; оставшиеся в зале большевицкие вожди сидели и смотрели друг на друга несколько ошарашенно. Им все не верилось, что произошла революция. Уж очень она как-то быстро и нелепо произошла. И что теперь делать? Никто из них не имел ни малейшего практического опыта в управлении государством, да еще к тому же таким большим и бестолковым, как Россия, с которой и цари-то управляться толком никогда не умели.</p><p class="p">— Ну что ж, — сказал наконец Каменев, — если сделали глупость и взяли власть, то надо составлять министерство...</p><p class="p">— Не министерство, а Совет Народных Комиссаров, — поправил его Свердлов.</p><p class="p">— Один хрен.</p><p class="p">— Это не хрен, а понятийный аппарат.</p><p class="p">— Что вы спорите из-за всякой ерунды? — нетерпеливо сказал Дзержинский. — Совет, министерство, хрен, аппарат — хоть горшком назови! Главное — персоналии. Я предлагаю избрать на пост председателя Совнаркома товарища Ленина.</p><p class="p">Большевики круглыми от изумления глазами уставились на Дзержинского. Никому и в голову не могло прийти, что не он возглавит новое государство.</p><p class="p">— А... а вы как же, Феликс Эдмундович? — робко спросил Луначарский.</p><p class="p">— Я полагаю, что товарищ Ленин справится с этим делом лучше, — сказал Дзержинский.</p><p class="p">Каменев недовольно надул губы: по-видимому, он считал, что тоже мог бы справиться с этим делом. Владимир Ильич — кайф от коньяка и кокаина еще не полностью выветрился, и ему хотелось всем делать какие-нибудь добрые дела — сказал поспешно:</p><p class="p">— Лева, не переживай: ты тоже будешь главным. Ну, что такое Совнарком? Скучная, рутинная работа. А ты можешь быть председателем ВЦИК. Будешь выполнять представительские функции. Ведь никто, кроме тебя, так не умеет завязывать галстук.</p><p class="p">Каменев расцвел; но тут Владимир Ильич поймал обращенный на него взгляд Свердлова, полный горького упрека, и понял, что тому тоже хотелось занять этот пост, и, хотя галстука завязывать он абсолютно не умел, все же оснований назначить его туда было, конечно, гораздо больше... Вот так, не прошло и двух минут, Ленин встал во главе государства — и сразу же столкнулся с проблемой управленческого характера. И до него стало доходить — а доходило до него всегда весьма быстро, — что руководить страною будет не очень-то легко и шипов на этом пути может оказаться куда более, нежели роз...</p><p class="p">— Все это очень мило, конечно, но куда же вы, Феликс Эдмундович? — заволновались остальные большевики. — Неужто вы хотите снова уйти в монастырь?!</p><p class="p">Они тайно надеялись, что он подтвердит это предположение: к семнадцатому году он всем уже порядком надоел своей кровожадностью, интригами, проповедями и истериками.</p><p class="p">— Не бойтесь, дети мои, я никуда не ухожу, — разочаровал их Феликс Эдмундович. — Я возглавлю организацию, которая будет охранять завоевания революции и безжалостным мечом карать ее врагов. Я применю против врагов тактику революционного террора.</p><p class="p">— А разве у нас есть враги? — снова удивились большевики. — Буржуазных министров мы арестовали. А народ за нас.</p><p class="p">— Враги появятся, — сказал Дзержинский. — Это я вам гарантирую.</p></span>
