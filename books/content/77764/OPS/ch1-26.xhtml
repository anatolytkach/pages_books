<span id="id13"><div class="title">
<p class="p1">ГЛАВА 12</p>
</div><p class="subtitle">Хождение Ленина по мукам. Самозванцы. Сон в летнюю ночь.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">— Ну что, Лева, как там наш батяня? — спросил Ленин вошедшего к нему в кабинет Каменева.</p><p class="p">Было начало мая 1919-го; Каменев только что вернулся из Гуляй-Поля. Как все, кто ездил в гости к Нестору Ивановичу Махно, он был бледен от беспробудного пьянства и еле дышал от сытости.</p><p class="p">— Все тип-топ, Ильич. Батька обещал бить Григорьева в хвост и в гриву.</p><p class="p">(Григорьев был мятежный атаман.)</p><p class="p">— Весело небось было, — проворчал Ленин с плохо скрываемой завистью и снова уткнулся в бумаги, от которых его оторвало появление Каменева.</p><p class="p">— А то! Батька у Деникина обоз с вином отбил. Коньяк, натурально, французский, бургундское, шамбертен... Омары, паштет из гусиной печенки... — Каменев облизнулся и закатил глаза к потолку. — Ананасы в шампанском...</p><p class="p">— Замолчи; я из-за тебя статью испортил, — оборвал его Ленин.</p><p class="p">В Москве было голодно; который месяц большевики пили один неразбавленный спирт, и слушать этот гастрономический бред было выше сил человеческих. А ведь Лева Каменев никогда не был чревоугодником; если уж его так проняло...</p><p class="p">— А повара у батьки! — соблазнительным шепотком продолжал Каменев. — Масло как слезы, начинка жирная, сочная, с яйцами, с потрохами, с луком... Два куска съел, а третий к щам приберег...</p><p class="p">— Неужели верно говорят, что у батьки гарем из красавиц? — угрюмо спросил Владимир Ильич. С кончика пера стекла безобразная жирная клякса; он порвал очередной лист, швырнул в корзину для бумаг.</p><p class="p">— Прекрасные девушки, — вздохнув, сказал Каменев. — Маникюр умеют и шьют как в Париже. Вот, гляди, какую они мне штучку подарили... — На нем был необыкновенной красоты шейный платок — муарово-серый, в вышитых розовых бутончиках. — И пляшут, и поют, и на гитарах играют...</p><p class="p">Обессилев, Владимир Ильич внимал пению этой сирены, и лицо его жалобно кривилось; и вдруг он вскочил, отшвырнул перо и схватился за свою кепку.</p><p class="p">— Еду! — сказал он Каменеву. — Еду в Гуляй-Поле. В конце концов, мне положен отпуск! — Он не брал отпуска ни в семнадцатом, ни в восемнадцатом; а ведь право человека на оплачиваемый отпуск было провозглашено еще на Втором съезде РСДРП.</p><p class="p">— А кто ж будет управлять государством? — растерялся Каменев.</p><p class="p">Свердлова к тому времени уже не было в живых; коллеги наивно полагали, что он умер, простудившись на митинге.</p><p class="p">— Ты и будешь, — сказал Ленин и, видя, что Каменев трусит, прибавил для его успокоения: — Ежели что — советуйся с Троцким.</p><p class="empty-line"/><p class="p">Поезд подъезжал уже к Гуляй-Полю; виднелись крепкие, хорошие избы, крытые железом, сады, ометы соломы... Погода стояла великолепная; Владимир Ильич, облокотясь о раму спущенного окна, жадно вдыхал свежий воздух и вспоминал обстоятельства своего знакомства с Махно. Сколько он с тех пор ни слушал аппетитные рассказы большевиков, навещавших батьку, ему все не верилось в эти гаремы и оргии: ведь Нестор Иванович поначалу был совсем, совсем другой человек...</p><p class="p">Их встреча состоялась больше года тому назад в Кремле; у Ленина только что выдалась редкая минута спокойной работы в одиночестве, но Фотиева, его секретарь, вошла в кабинет и доложила, что к нему пришел посетитель. Владимир Ильич проворно убрал в нижний ящик стола фляжку с коньяком, стакан, две колоды карт, складную шахматную доску, пилочку для ногтей, связку старых любовных писем, завернутый в бумажку шмат сала, журнал «Дом и усадьба», стопку пикантных парижских открыток, початую банку с консервированными персиками и сказал:</p><p class="p">— Просите.</p><p class="p">Фотиева повернулась и вышла, всем своим видом демонстрируя неодобрение. Она была для Ленина постоянным источником раздражения и досады: он мечтал о секретарше стройненькой и вместе с тем пухленькой, большеглазой и разбитной, с пикантной родинкою на щеке, как у Троцкого, но Дзержинский со Свердловым навязали ему эту каракатицу, утверждая, что она прекрасный работник и всякое такое; со всех сторон окруженный некрасивыми женщинами, Ленин задыхался... Он услыхал через закрытую дверь, как Фотиева кому-то что-то говорит своим противным занудливым голосом; затем послышался звук робких, шаркающих шагов, дверь приотворилась, и на пороге возник посетитель.</p><p class="p">Это был низкорослый человечек в потертом синем костюме, ничем внешне не примечательный; более всего он был похож на провинциального учителя гимназии. Манеры его были робки, почти жеманны, и двигался он скованно, как будто его ручки и ножки были привинчены к туловищу сильно заржавевшими шарнирами. Ленин подумал, что маленький человечек станет просить о какой-нибудь должности или материальном вспомоществовании, и уже прикидывал, сколько можно будет ему дать, не вызвав гнева кремлевской бухгалтерии. Он учтивым жестом пригласил посетителя садиться; тот опустился осторожно на самый краешек стула в позе, создающей впечатление, что, ежели хозяин кабинета сделает хоть одно резкое движение, — гость сразу вскочит и упорхнет, как напуганная птичка. Владимир Ильич улыбнулся ему ободряюще-ласково и спросил:</p><p class="p">— Чем могу быть вам полезен, милостивый госуда... товарищ?</p><p class="p">— Видите ли, я... я пришел сказать вам, что желаю уничтожить вас и ваше государство...</p><p class="p">— Что-о?! — Ленин расширившимися от изумления глазами оглядел посетителя. Бомбы при нем явно не имелось. Тогда Ленин немножко успокоился и спросил:</p><p class="p">— Что же дурного, почтеннейший, вам сделали я и мое государство?</p><p class="p">— Ничего; просто я считаю государство преступным аппаратом и полагаю, что его следует уничтожить, — отвечал посетитель. — Ликвидировать власть, капитал, банки, школы, фабрики, заводы, возвратить людям природное состояние свободы... Я надеялся, что большевицкая революция даст народу свободу, но вы меня жестоко разочаровали. Я по своим убеждениям анархист, за это и в тюрьме сидел...</p><p class="p">— А, вот оно что! — сказал Владимир Ильич, не слишком, впрочем, удивленный. Он знавал нескольких анархистов, и все они были похожи на этого: тщедушные, в очочках, интеллигентные люди, хотя некоторые из них и бывали с ног до головы увешаны револьверами; мужчин здоровых, разбитных и крепких анархические идеи почему-то мало привлекали. — Ну хорошо, а я-то вам чем могу помочь?</p><p class="p">— Вот ежели б вы дали мне какой-нибудь мандат... и средства выделили...</p><p class="p">— На то, чтоб вы меня укокошили?</p><p class="p">— Нет, что вы, — смутился посетитель, — об этом покамест речь не идет... Для начала я бы желал создать этакую, знаете, народную армию, вольницу, наподобие Запорожской Сечи... Где-нибудь на юге, в черноземных районах... Я бы стал вождем, народным трибуном, как Пугачев... Атаманом... Потом я с моей армией вас свергну... Вы производите впечатление умного человека; вы должны признать, что это будет справедливо и разумно...</p><p class="p">Владимир Ильич смотрел на сидевшее перед ним крохотное, тщедушное существо в потертом костюмчике и положительно недоумевал: как оно может рассчитывать сделаться народным героем и атаманом? Потом он вспомнил, как покойный Бауман рассказывал ему о «комплексе Наполеона», коим нередко страдают мужчины маленького роста. Тут ему стало неприятно: он и сам был росточку небольшого. «Ну, я — другое дело, — решил он, — а у этого с головою не все ладно».</p><p class="p">— Так-так, — сказал он, — разумеется, по большому счету я с вами не могу не согласиться. (Тот же Бауман говорил, что с сумасшедшими спорить ни в коем случае не следует.) Однако, милостивый государь, вы же видите, что у нас сейчас делается: если вы свалите меня, то к власти тотчас придут генерал Корнилов или Колчак.</p><p class="p">— А чем они хуже вас?</p><p class="p">— Ничем, — признал Владимир Ильич. (Он не лукавил.) — Но их-то вам потрудней будет свалить. Они кадровые вояки.</p><p class="p">— И что вы предлагаете?</p><p class="p">— Для начала помогите нам разбить белых. Бейте их, пока не покраснеют. А потом уж поступайте, как вам ваша совесть подскажет.</p><p class="p">— Пожалуй, вы правы, — сказал маленький человек.</p><p class="p">Владимир Ильич вызвал к себе Свердлова, и военный союз Нестора Ивановича Махно с красными был закреплен документально и официально. Правда, Нестор Иванович честно предупредил Ленина и Свердлова, что как только разобьет белых, то немедленно примется за красных. Но Ленин и Свердлов не очень испугались этой угрозы: во-первых, Нестор Иванович был просто безобидный чокнутый, а во-вторых, в восемнадцатом году абсолютно все были уверены, что белых не разбить никому и никогда, а дни красных сочтены. (Ленин тоже был уверен в этом, но надеялся, что успеет до победы белых надеть на палец волшебное кольцо и стать законным императором, и ничуть не сомневался, что белые и красные сразу же после этого прекратят вести эту никому не нужную братоубийственную войну и все вместе радостно припадут к подножию его трона.)</p><p class="p">Получив желанный мандат, Нестор Иванович ушел восвояси, и Ленин тотчас забыл о нем: он принимал на дню до сотни посетителей, и каждый второй был не в своем уме. Однако через несколько месяцев до Кремля начали доходить сведения — пока что обрывочные и противоречивые — о том, что «батька Махно» твердой рукою правит в Гуляй-Поле; «батька Махно» разбил немцев; «батька Махно» разбил гетмана; «батька Махно» разбил петлюровцев... Ленин и Свердлов ушам своим не верили; они послали одного надежного сотрудника с командировочным предписанием в Гуляй-Поле, и тот, вернувшись, сообщил, что все чистая правда: Нестор Иванович носит каракулевую папаху, смазные сапоги и штаны с казачьими лампасами, ездит верхом, говорит с ужасным малороссийским акцентом, с утра до вечера пьет водку и руководит огромной, прекрасно вооруженной армией бандитов, которая бесстрашно бьет всякого, кто попадается ей на пути; закрома его ломятся от награбленного добра, а все окружающие пред ним трепещут и зовут батькою.</p><p class="p">— Как же это может быть? — удивлялся Ленин.</p><p class="p">— Сдается мне, — отвечал командировочный, — что всем этим г-н Махно обязан своему комиссару.</p><p class="p">— А кто его комиссар?</p><p class="p">— Писатель какой-то. Говорят, он имеет на Махно большое влияние.</p><p class="p">— Ладно, — сказал Ленин, — все это нам покамест на руку. Напишите батьке, пусть бьет Корнилова и Деникина, но не очень сильно. (Владимир Ильич втайне от своих подчиненных обожал Деникина и рассчитывал, взойдя на трон, сделать его военным министром.)</p><p class="p">С тех пор многие большевики посещали Гуляй-Поле, рассказывая Ленину все более и более удивительные вещи: батька позабыл русский язык... у батьки все бойцы целыми днями едят омаров и черную икру... батька завел гарем... Ленину страшно хотелось посмотреть на эти чудеса своими глазами, но все недосуг было. И вот наконец он ехал в Гуляй-Поле и с наслаждением предвкушал, как ему протопят баньку, накормят до отвала, нальют прозрачного самогону, а, быть может, и французского коньячку.</p><p class="p">Поезд остановился; Владимир Ильич вылез и, держа в руках чемоданы, стал искать глазами встречающих. Странно, но ни автомобиля, ни пролетки не было; только конный отряд, окутанный клубами пыли, несся к платформе. Было жарко; Ленин опустил тяжелые чемоданы на землю и утер лицо платком. Конники стремительно приближались, и уж видно было, что передний из них машет кривою шашкой, а замыкающий ведет еще одного оседланного коня в поводу. Владимир Ильич приветливо заулыбался им и крикнул:</p><p class="p">— Товарищи! Я Ленин! Не подскажете, как пройти в штаб к Нестору Иванычу?</p><p class="p">Тут серый в яблоках конь едва не сшиб его грудью; Владимир Ильич поспешно отпрыгнул в сторону, всадник натянул поводья, и конь нервно затоптался на месте. Замыкающий спешился и подвел к Ленину другого коня — вороного, с белыми бабками.</p><p class="p">— Вам от Нестора Иваныча, — сказал он, любовно похлопывая коня, — из-под Врангеля взяли... Хорош, а? Ну, ты, окаянный, не балуй! — прикрикнул он, когда конь нагнул голову и попытался зубами стянуть кепку с Владимира Ильича.</p><p class="p">Ленин смотрел на коня ошарашенно. Как подобает царскому отпрыску, он обожал лошадей, но только теоретически; еще никогда в жизни он не находился до такой степени близко к этому животному и был поражен тем, насколько оно большое и какие страшные у него зубы. И запах его, и фырканье казались пугающими. «Как же я на него залезу? — недоумевал он. — Ведь тут лестница нужна...» Он взял поводья из рук махновца и попытался вставить ногу в штуковину, висевшую у коня сбоку, но конь, словно дразня его, переступил копытами и отодвинулся; когда же он после нескольких безуспешных попыток наконец ухитрился засунуть в стремя свой ботинок, проклятый зверь дернулся так сильно, что едва не оторвал Владимиру Ильичу ногу, и вдобавок хлестнул его по лицу своим довольно жестким хвостом.</p><p class="p">— Э... Давненько я не ездил верхами... — пробормотал Владимир Ильич. — Отвык...</p><p class="p">Махновцы поняли намек и совместными усилиями взгромоздили Ленина на спину коня. Ленину показалось, что его разрывают надвое; спина была ужасно широкая, но, несмотря на это, какая-то неустойчивая; стремена давили на ноги, а раскачивающаяся и пляшущая земля была так отчаянно далеко! И конь все оборачивал свое злое лицо и скалился, словно хотел седока сожрать... «И что мне не сиделось в Кремле!» Теперь уже мрачная, неприветливая Москва и казенные кремлевские кабинеты, от которых он с такой радостью бежал, представлялись ему раем: жидкий чаек в стеклянных стаканах, баранки, сахар вприкуску, заседания, совещания, телефонный трезвон... И даже некрасивое лицо Фотиевой вспоминалось ему как что-то до бесконечности уютное и родное.</p><p class="p">Слава богу, путь был недалекий, и тактичные махновцы не пытались пуститься вскачь, а ехали шагом, прижимаясь боками своих лошадей как можно ближе к вороному коню и подхватывая Ленина всякий раз, когда он начинал уж очень сильно крениться вправо или влево; полчаса спустя они сняли его, обессилевшего и дрожащего, и осторожно поставили на землю. Сильно хромая, с кружащейся головой и прыгающим желудком, он поплелся за своими проводниками...</p><p class="p">Штаб Махно располагался в большой, нарядной, беленой хате, обсаженной подсолнухами и мальвами. Посередине хаты стоял дощатый стол, на котором были разложены карты — увы, не те, в которых Владимир Ильич был специалистом, а топографические, с помощью которых, по-видимому, воевали и в которых он никогда не понимал ни бельмеса и не был сейчас уверен, что сможет правильно показать на них хотя бы Москву, ежели от него потребуют этого. Ему вновь сделалось как-то неуютно.</p><p class="p">— Здоровеньки булы, — сказал ему Махно, — ласкаво просымо...</p><p class="p">Он не встал навстречу высокому гостю, а продолжал сидеть развалясь, закинув ноги на стол и похлопывая нагайкой по голенищу сапога. На голове его была нахлобучена огромная косматая папаха, а выражение лица было до такой степени воинственное и наглое, что Владимир Ильич в первую минуту усомнился — да тот ли самый Нестор Иванович перед ним или его подменили на какую-то другую личность? Махно как будто даже сделался выше ростом...</p><p class="p">— Здравствуйте, батенька! — сказал Ленин, оглядываясь в поисках какого-нибудь сиденья. Угрюмый казак ногой подпихнул к нему какую-то грязную колченогую табуретку. Ленин сел осторожно и повторил: — Здравствуйте, Нестор Иваныч. Вот приехал поглядеть, как вы тут живете.</p><p class="p">— Гарно, — отвечал батька, — гарнесенько живем... А вот, Ильич, знакомься: мой комиссар. — Он указал на высокого, плотного, бритого человека в европейском костюме, сидевшего сбоку стола и что-то все время черкавшего в блокнотике. — Граф Толстой. Биографию мою пишет.</p><p class="p">«Так вот он какой! — пронеслось в голове у Владимира Ильича: он не читал произведений этого писателя, но слышал о нем чрезвычайно много. — Что за глыба, что за матерый человечище! Конечно, теперь я все понимаю: такой великий талант мог превратить жалкого замухрышку Махно в героического атамана...» Он протянул руку бритому человеку и сказал очень почтительно:</p><p class="p">— Здравствуйте, Лев Николаевич!</p><p class="empty-line"/><p class="p">— Маруся...</p><p class="p">— Оксана...</p><p class="p">— Гюльчатай...</p><p class="p">— Очень, очень приятно, девочки.</p><p class="p">Ленин едва успевал целовать ручки батькиному гарему. Недоразумение с графом Толстым было разъяснено, прощено и забыто; мужчины уже побывали в баньке, отобедали, сыграли партию в безик, и теперь Нестор Иванович, хвалясь, демонстрировал гостю своих красавиц. Гарем был велик, обилен: у Владимира Ильича уже в глазах рябило, и он почти не вглядывался в фигуры и лица, а машинально отпускал всем одинаковые комплименты.</p><p class="p">— Катя...</p><p class="p">— Очень, очень приятно, милочка. Ленин.</p><p class="p">— Даша...</p><p class="p">— Ленин. Очень приятно.</p><p class="p">— Телегин...</p><p class="p">— Рощин...</p><p class="p">— Очень при... Как, Нестор Иванович?.. — оторопел Ленин.</p><p class="p">— Товарищ Телегин — портной, — со снисходительной улыбкой пояснил ему граф Толстой, — закройщик высшего класса; а товарищ Рощин — наладчик швейных машинок... Ведь наши девушки не какие-нибудь; они шьют, и как шьют! Наши модели в стиле «ля рюсс», «ля казак» и «ля мужик» в Париже с руками отрывают.</p><p class="p">— Как же вы их переправляете в Париж? — удивился Ленин. — Ведь война!</p><p class="p">— Через одного офицера из деникинского штаба; разумный человек и процент за посредничество берет небольшой... Да что швейки! У нас и сапожники, и шорники, и гончары, и кузнецы, и колбасники, и кондитеры, — вся соль земли русской! А наши фермеры, Ильич, вы сметанку-то пробовали...</p><p class="p">«Разумеется, — думал Ленин, готовый прослезиться от умиления, — только мелкий частный предприниматель спасет Россию... Большевики, погрязшие в мечтаниях об огромных заводах и электростанциях, не понимают этого... Какой дурак придумал этот военный коммунизм и грабительские продразверстки?! Троцкий — не иначе! Нужна новая экономическая политика, ой как нужна!»</p><p class="p">— Гарно у вас тут, — сказал он батьке и графу. — Я, пожалуй, у вас поживу подольше, ежели не возражаете.</p><p class="empty-line"/><p class="p">— ...Носки на себя тяни, мать твою! И не заваливайся — сидишь как собака на заборе...</p><p class="p">— Ох, граф, не ругайтесь, мне и так тошно...</p><p class="p">Ленин не только брал уроки верховой езды; он переплывал Днепр, рубил шашкою лозу, правил тачанкой, ходил босиком; он сбрил городскую бородку и отращивал вислые козацькие усы; он говорил «жинка», «чоловик», «дякую» и «шо»; он пел «Чому я нэ сокил, чому нэ литаю»; он ночевал на сеновале с черноокой красавицей Оксаной. Он влюбился в Малороссию с ее мордастыми подсолнухами, ее жирной землей, ее бархатными ночами, ее мягким юмором, ее ленью, томностью и негой, с ее манерой обильно закусывать, когда пьешь... Он забыл Москву и Кремль, забыл советскую власть, забыл волшебное кольцо; он забыл жену и друзей, да и они вряд ли признали бы Председателя Совнаркома в этом подтянутом, дочерна загорелом, молодцеватом человеке с мозолистыми руками, одетом в шаровары и выгоревшую гимнастерку, которому лишь кудрявого чуба недоставало, чтобы быть совсем похожим на вольного козака.</p><p class="p">Как-то черным, звездным южным вечером, когда Ленин с графом Толстым лежали на покрытой ковром тачанке, заложив руки за голову и лениво сплевывая через губу шелуху от семечек, Владимир Ильич задал давно интересовавший его вопрос:</p><p class="p">— Скажите, граф... Каким образом Нестор Иванович — такой тихий, деликатный человечек — превратился в грозного батьку?</p><p class="p">— Я его раскрутил, — отвечал граф, — я ему придумал этот образ, а потом помог стать тем, кого я придумал... А неплохо придумал, верно?</p><p class="p">— Отлично придумали. Но ведь были же у Махно, наверное, какие-то задатки?</p><p class="p">— Он целеустремлен, старателен, трудолюбив и способен обучаться новому. Любого человека, обладающего этими качествами, можно раскрутить. Хотите, Ильич, я и вас раскручу?</p><p class="p">— Хм, — сказал Ленин. — Мысль соблазнительная... А в какую сторону вы собираетесь меня крутить?</p><p class="p">— А вот послушайте...</p><p class="empty-line"/><p class="p">Вскоре до Кремля начали доходить сведения о том, что на юге объявился новый батька, еще более грозный и отчаянный, нежели Махно. Звали его батька Вольдемар, был он, по слухам, двухметрового росту, одноглаз и однорук; белые трепетали от одного звука его имени. Только и слышалось: батька Вольдемар разбил Кутепова... Батька Вольдемар разбил Дроздова... Батька Вольдемар едва не разбил атамана Григорьева...</p><p class="p">В Кремле недоумевали. Каменев отправил в штаб Махно телефонограмму: «Гуляй-Поле, Ленину: знакомы ли вы, Ильич, с батькой Вольдемаром? Верно ли, что у него только одна рука? И, кстати, как вам отдыхается? Не пора ли вернуться к повседневным трудам? Отдел кадров волнуется». Ответ был получен следующий: «Кремль, Каменеву: Лева, напомни отделу кадров, что у меня за один только ноябрь семнадцатого тридцать неиспользованных отгулов. И цидулок мне боле не шли: недосуг мне их читать. А зараз мэни трэба идты до батьки Вольдемара».</p><p class="p">Каменев покачал головой и понес телефонограмму Дзержинскому.</p><p class="p">— Смотрите, Феликс Эдмундович, что хохлы сделали с нашим Ильичом! Вас это не беспокоит?</p><p class="p">— Пусть себе развлекается, — небрежно отвечал Дзержинский. — Кстати и я ухожу в отпуск и уезжаю из Москвы.</p><p class="p">— Как?! — вскричал Каменев, притворившись огорченным. — Куда вы уезжаете?</p><p class="p">— В Сибирь. Но вы, Лев Борисович, не волнуйтесь, я ненадолго. А вы, ежели что, советуйтесь с Троцким.</p><p class="p">— Непременно, — ответил Каменев. Он не собирался ни с кем советоваться: уже привык руководить государством, и если звал Ленина скорей вернуться, то просто потому, что соскучился. — Вы, Феликс Эдмундович, не торопитесь. Отдохните там по полной программе.</p><p class="p">«Кой чорт его несет в Сибирь? — подумал Каменев. — Ну да не все ли равно; может, попадется в лапы Колчаку и там сгинет, и слава богу: надоел он всем хуже горькой редьки».</p><p class="p">А меж тем именно к Колчаку и собирался ехать Феликс Эдмундович; намерение это объяснялось тем, что до него дошла информация, будто в штабе у адмирала объявился некий отрок, выдающий себя за царевича Алексея Николаевича, и, более того, демонстрирует некие предметы, подтверждающие его царское происхождение. Дзержинский жестоко корил себя за то, что не присутствовал лично при расстреле: не надо, не надо было полагаться на слова Юровского! Тот уверял, что всю царскую семейку тщательно обыскали и все имевшиеся при Романовых кольца и другие украшения сдали по описи в екатеринбургскую ЧеКа; но мало ли что могло быть на самом деле! Царские дети живучи как кошки; тогда, в Угличе, тоже все думали, что отрок погиб...</p><p class="p">«Почему, собственно, мы с Лениным были так уверены, что к моменту штурма Зимнего волшебное кольцо все еще находилось во дворце? Может быть, мальчишка Романов все это время таскал его при себе! Как бы то ни было, я должен все проверить: царевич этот парень или обыкновенный аферист и что за такие загадочные при нем предметы». (Семья Романовых, при всем презрении к ним потомка Иоанна Грозного, все ж его занимала, и он отлично знал, как выглядит Алексей.) «А заодно разберусь, существует ли это пресловутое золото Колчака, о котором все говорят и которого никто не видел; в любом случае для моих планов золото не будет помехою...» И Феликс Эдмундович поспешно засобирался в дальний путь. Экспедиция его сильно облегчалась тем обстоятельством, что Колчак для проверки личности царевича тайно затребовал его воспитателя Жильяра; разумеется, Дзержинский узнал об этом, перехватил Жильяра и посадил в тюрьму, а сам решил выдать себя за этого швейцарского болвана: загримировался под него и обучился говорить по-русски и по-французски с швейцарским акцентом.</p><p class="p">Отсутствие в Москве Ленина было ему тоже на руку: меньше вопросов. «Да хоть бы он и вовсе сгинул там, в Хохландии, — без него обойдусь. Каменев или Троцкий точно так же могут сидеть в Кремле, управлять игрушечным государством и финансировать Черный Крест».</p><p class="empty-line"/><p class="p">— Гарно, Нестор Иваныч, мы вчера в атаку сходили... — говорил Ленин. Он осушил чарку горилки с перцем, утер усы ладонью, кончиком шашки подцепил омара из раскрытой банки... Чья-то слонявшаяся поблизости лошадь подошла к нему; он достал кусок сахару их кармана грязных шаровар, поцеловал лошадь в замшевую морду, оттолкнул, с притворной строгостью прикрикнув: — Н-но, не балуй, окаянный!.. Какие планы на завтра?</p><p class="p">— Даже не знаю, — хмурясь, отвечал Махно, — кого могли по мелочи, мы всех разбили, а со всей Добровольческой нам покамест не совладать.</p><p class="p">— Неужто не совладать? Подумаешь, Деникин! — горячился Владимир Ильич; как всякий неофит, он желал перещеголять в рвении своих учителей.</p><p class="p">— Будьте реалистом, Voldemare, — сказал Махно. — А вот я другое думаю: что, ежели нам начать бить красных? Они-то послабже Деникина будут.</p><p class="p">— Как же мы можем бить красных, когда мы сами красные?</p><p class="p">— Это вы красный, — заметил Махно, — а я, если помните, анархист. Мне что белые, что красные — один чорт. И что такого хорошего, Ильич, вы находите в своих большевиках? Паскуды, клейма ставить негде. Враги трудящего народа.</p><p class="p">— Батенька, вы преувеличиваете.</p><p class="p">— Нисколько, — отрезал Махно. — Один ваш Дзержинский и его проклятая ЧеКа чего стоят!</p><p class="p">— Да, неприятный субъект, — сказал Ленин.</p><p class="p">— То-то и оно... А знаете, что он в Бутырках больного, беспомощного человека хладнокровно зарезал, причем тоже вашего соратника?</p><p class="p">— Какого человека?</p><p class="p">— Был такой Николай Шмит, мебельщик... Я ведь тоже в то время в Бутырках сидел. Информация-то в тюрьме моментально расходится. Конечно, фабрикант был этот Шмит и кровосос, но человек-то, говорят, хороший.</p><p class="p">«Железный убил Шмита! Мне такое никогда и в голову не приходило... Но зачем, за что?! Не понимаю...» Ленин налил себе еще горилки. Потом еще... Махно все подливал ему и говорил, говорил о том, какие большевики сволочи и подлецы... Далее все мешалось, заволакивалось какой-то пеленою. Кажется, они, позвав графа, все вместе писали кому-то какое-то письмо и дико хохотали при этом...</p><p class="empty-line"/><p class="p">«Кремль, большевикам: почтеннейшие, все вы мудаки и поганцы. В вашей ЧеКа сидят одни вонючки, а ваш Ленин прохвост, и мы его повесим на осине кверх ногами. Сим доводим до вашего сведения, что с этого дня будем бить красных, пока не побелеют». Далее следовали пять с половиной страниц непечатной брани и подпись: «Батька Махно, батька Вольдемар».</p><p class="p">Прочтя это послание, Каменев задрожал и схватился за голову. «Ильич наш там, у этих бандитов! — в отчаянии думал он. — Они, наверное, удерживают его как заложника... И посоветоваться-то не с кем! И военачальников никаких у нас не осталось!»</p><p class="p">Теперь красных теснили со всех сторон; Деникин взял Харьков и подступал уже к Царицыну. И все продолжали поступать ужасные новости: батька Махно и батька Вольдемар разбили Шелеста... Батька Махно и батька Вольдемар разбили Егорова... Батька Махно и батька Вольдемар хотят объявить себя гетманами и провозгласить независимость Украины... Конечно, за годы Гражданской войны независимость Украины провозглашалась разными силами уже раз пятьдесят, но, услыхав, что все улицы Екатеринослава увешаны плакатами с изображениями батьки Махно и батьки Вольдемара, а на киевском центральном майдане толпы народу с зелеными флагами стоят круглыми сутками и скандируют: «Чорвоних та билих — геть! Батька Вольдемар — так!», Каменев не выдержал и отправил в Гуляй-Поле бронепоезд во главе со слесарем Ворошиловым: тот отлично чинил трубы в кремлевских уборных, а стало быть, мог справиться и с любой другой работой.</p><p class="empty-line"/><p class="p">Когда Ленин проспался и узнал о том, что объявил войну Кремлю и большевикам, он сперва пришел в ужас, а потом подумал: «Ну, ничего уж теперь не поделаешь. Все к лучшему. Надя, Инесса, Лева, Глебушка Кржижановский, Бухарин и Богданов меня потом поймут, а на остальных плевать». И они с батькой Махно стали бить и белых, и красных в хвост и в гриву и отняли у слесаря Ворошилова его бронепоезд, а самому слесарю нашли в Екатеринославе хорошо оплачиваемую работу по специальности. Круто завернула на повороте жизнь! И неизвестно, кто победил бы в Гражданской войне, если б однажды июньским вечером Владимир Ильич в пылу преследования не оказался со своей тачанкою в глубоком тылу одного из врангелевских отрядов...</p><p class="p">Он натянул поводья, огляделся; он был совершенно один в степи... Он не знал, куда ехать: кобыла Ласточка была молодая, бестолковая и тоже не умела ориентироваться. (Его любимца — умницу вороного с белыми бабками — в тачанку никогда не запрягали; он был предназначен для верховых атак и парадных выездов.) Темнело стремительно; похоже, собиралась гроза. Нечего делать: придется заночевать в степи. Он распряг Ласточку, напоил ее из ведра, только потом напился сам. Лег, обняв пулемет, укрылся попоной и заснул быстро и крепко, как подобает козаку.</p><p class="p">На рассвете пробудили его топот чужих копыт и звуки выстрелов; запрягать было уже некогда: птицею взлетел он на лошадь, прильнул к ее шее, привычным движением опустил шашку и помчался прочь... С десяток золотопогонных всадников преследовали его; тонко и резко свистали над головой пули, плотно прижатые уши Ласточки вздрагивали, на кончиках их бисером проступил пот; Ленин слышал только воющий свист посылаемых ему в угон пуль да короткое и резкое дыхание лошади. Впереди был овраг; Ласточка перелетела его, как птица; но в это самое время Ленин, к ужасу своему, почувствовал, что, не поспев за движением лошади, он, сам не понимая как, сделал скверное, непростительное движение, опустившись ей на спину. Он не мог еще дать себе отчета в том, что случилось, как уже мелькнули подле самого его ноги белогвардейского жеребца... Ленин касался одной ногой земли, и его лошадь валилась на эту ногу. Он едва успел выпростать ногу, как она упала на один бок, тяжело хрипя, и, делая, чтобы подняться, тщетные усилия своей тонкою, потной шеей, она затрепыхалась на земле у его ног, как подстреленная птица... Неловкое движение, сделанное Лениным, сломало ей спину.</p><p class="p">Он не пытался бежать, да и как убежать пешему от конных; он бросил шашку; он стоял подле умирающей Ласточки на коленях, склонив голову, тихо покачиваясь... «Что я сделал! И эта несчастная, милая, погубленная лошадь! А-а!» Весь дрожа, он поднял голову и увидел над собой черное небо и ослепительно сияющий черный диск солнца...</p><p class="p">— А ну, встать! — сказал белогвардеец и толкнул его в спину прикладом.</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">— Вы — тот самый monsieur Жильяр?</p><p class="p">— Oui, monsieur Колчак, — ответил Дзержинский с ужасным швейцарским выговором. — Вот мои бумаги... Умоляю вас, покажите мне скорей моего воспитанника... или того, кто себя за него выдает.</p><p class="p">— Ах, какая незадача! — огорчился Колчак. — Он сейчас в Екатеринбурге, я оставил его там... Вы видите, как Омск переполнен.</p><p class="p">— Да, вижу. Обстановка не для ребенка. Уж если ваша Ставка располагается в жалком вагончике... Но как же нам быть?</p><p class="p">— Его привезут, — сказал Колчак; лицо его было довольно кислое... («Он вовсе не хочет, чтоб этот мальчишка оказался подлинным царевичем, — понял Дзержинский, — он сам метит на трон!») — А вы пока поживите у нас.</p><p class="p">— Хорошо. А как он вам показался, этот мальчик?</p><p class="p">— Мальчик как мальчик, — сказал Колчак, пожимая плечами, — блондин, хорошо сложен, есть сходство с фотографиями Алексея, довольно бойко рассказывает о придворной жизни. Правда, царевич — вы это знаете лучше меня — был болезненным ребенком; а этот здоров и крепок, во всяком случае с виду... И он не говорит на иностранных языках; утверждает, что забыл их от потрясений и переживаний.</p><p class="p">— А что за предметы он демонстрировал? На нем были кольца?</p><p class="p">— Да, было какое-то... Толстое золотое кольцо. Но он показывал в качестве доказательства своего царского происхождения вовсе не его, а медальон с прядью волос, утверждая, что это локон императрицы... Сами понимаете — это проверить невозможно.</p><p class="p">Тон Колчака, когда тот говорил о мальчике, окончательно убедил Дзержинского в том, что Верховный Правитель вовсе не желает делиться властью с каким-то отроком, даже если тот окажется царевичем; однако он почему-то не расстрелял парня, а вызвал Жильяра... (Дзержинскому не пришло в голову, что Колчак — ученый и исследователь — просто хотел разгадать сию загадку из любознательности и научной честности.) Дзержинский смотрел на Колчака, пытаясь понять, что за человек перед ним. Александр Васильевич казался нервным, порывистым; взгляд его был остр и туманен одновременно; в губах что-то горькое и странное... «Говорят, он пьет запоями... Или — кокаин? Похоже, похоже... Однако дела у него идут неплохо. (Это происходило в начале лета 1919-го, когда у Колчака дела шли действительно еще неплохо.) Не прогадал ли я, поставив на красное? Колчак точно так же может служить моим тайным целям, как и Ленин. Открыться ему? Предложить союз против большевиков? Не сразу; подожду, осмотрюсь». И он ждал, осматривался, беседовал с Колчаком; взгляды их во многом сходились; меж ними даже возникла холодноватая приязнь...</p><p class="p">— Будем называть вещи своими именами, — говорил Колчак, — ведь в основе гуманности, пасифизма, братства рас лежит простейшая животная трусость... Что такое демократия? Это развращенная народная масса, желающая власти.</p><p class="p">— Власть не может принадлежать массам в силу закона глупости числа, — соглашался Дзержинский-Жильяр, — каждый практический политический деятель, если он не шарлатан, знает, что решение двух людей всегда хуже решения одного. А уж двадцать-тридцать человек не могут вынести никаких решений, кроме глупостей.</p><p class="p">— Россия — страна патерналистская; русские всегда ищут строгого отца, что держал бы их железной рукою.</p><p class="p">— Как это верно! Именно железной.</p><p class="p">И они, взявши деликатно по дорожке с одного зеркальца, поглядели друг на друга с пониманием. «Я вотрусь к тебе в доверие, — думал Дзержинский почти нежно, — если кольцо мальчишки окажется тем самым — ты поможешь мне свалить большевиков и взойти на трон, а если нет — что ж, я буду продолжать поиски под прикрытием силы твоей армии; ты — тот, кто мне нужен; ну, а потом, естественно, я тебя использую и убью!»</p><p class="p">— Александр Васильевич, я не хочу в ожидании приезда этого Алексея или лже-Алексея попусту терять время, — сказал он. — Желаю служить Белому движению.</p><p class="p">— Что ж, monsieur Жильяр, нам нужны образованные люди. Я найду для вас должность при штабе. Вы согласны?</p><p class="p">— Oui, mon General!.. Pardonnez-moi, mon Admiral!..</p><p class="empty-line"/><p class="p">Когда связанного Ленина привели на допрос к какому-то белому полковнику и спросили его имя, он как мог приосанился и сказал важно:</p><p class="p">— Я буду гутарить только с генералом Деникиным.</p><p class="p">— Что-о? — расхохотался полковник и наотмашь ударил его по лицу рукою в белой перчатке. — А вот я тебя сейчас в расход выведу — не хочешь? Ты кто такой?! Мерзавец!</p><p class="p">— Я бачу, господин полковник, у вас хватает гражданского мужества на то, чтобы оскорблять пленного, — сказал Ленин, сплевывая кровь.</p><p class="p">— Итак, вы отказываетесь отвечать на вопросы?</p><p class="p">— Да пошел ты... — пробормотал Ленин и отвернулся.</p><p class="p">— Я прикажу вас выпороть шомполами, и тогда вы заговорите!</p><p class="p">— Шиш тебе.</p><p class="p">— На выбор: или ты, собака, сейчас же развяжешь язык, или через десять минут будешь поставлен к стенке! Ну?!</p><p class="p">Владимир Ильич стоял молча; вся жизнь его в эту минуту проходила пред ним, и он мысленно прощался со всем, что любил и что ненавидел. «Уснуть — и видеть сны, быть может... Какие сны в том смертном сне приснятся? Маруся... Инесса...» И почему-то с особенной болью подумал он о жене, которой никогда не любил...</p><p class="p">Но тут вдруг один из офицеров сказал:</p><p class="p">— Нет, господа; я чувствую по его речи и осанке, что это человек не простой. Это какая-то важная птица, быть может атаман... Нужно доложить о нем Главнокомандующему: возможно, он заинтересуется.</p><p class="p">И Деникин, как ни странно, заинтересовался... Путь до Екатеринодара, где располагался штаб командующего Добровольческой армией, не был для Владимира Ильича слишком тяжел: его бодрость, веселые шутки и карточное мастерство вызвали уважение в конвоирах; ему, в свою очередь, приятно было для разнообразия пообщаться не с малограмотными казаками, а с интеллигентными людьми, знающими толк в довоенных парижских борделях; так что они в общем весьма неплохо проводили время. Вот только Ласточка, бедная, милая Ласточка все стояла у него пред глазами; он вспоминал, как лежала она на земле и, перегнув к нему голову, смотрела на него своим говорящим взглядом, и слезы наворачивались ему на глаза...</p><p class="p">Доставив Ленина в Екатеринодар, его умыли, дали ему чистую одежду и повели под конвоем в штаб генерала Деникина. В штабных коридорах царили чистота и порядок, совершенно немыслимые для красных или зеленых; и, хотя белые были враги Ленину, ему против воли были приятны эти порядок, спокойствие и чистота. «Все-таки кадровые вояки — это не то что наши раздолбаи!» Его ввели в кабинет, большой и светлый; в кабинете было два человека: один надменный, высокий, осанистый красавец (это был начштаба Романовский), а в другом — толстом и низеньком, с небольшой бородкой и черными с проседью усами — Владимир Ильич узнал Деникина, которого прежде видел на фотографиях. Ему всегда нравился этот человек, и он не мог сейчас, как ни старался, вызвать в себе хоть каплю ненависти к нему.</p><p class="p">— Садитесь, — вежливо сказал Деникин и поглядел на Ленина с любопытством. — У меня такое ощущение, что я вас где-то видел... (Он, конечно же, знал, как выглядит Председатель Совнаркома; но этот оборванный, загорелый, вислоусый казак был так мало похож на него!)</p><p class="p">Ленин молчал; Романовский надменно прищурил холодные глаза и постучал папиросой о серебряный портсигар.</p><p class="p">— Антон Иванович, мне кажется, мы зря теряем время, — сказал он. — Это же простой мужик.</p><p class="p">— На простых мужиках, дорогой мой Иван Павлович, земля русская держится, — ответил ему Деникин. — А все-таки сдается мне, что этот товарищ... или господин, а? — не из простых. Прищур его глаз мне напоминает...</p><p class="p">Владимир Ильич понял по лицу Деникина, что тот вот-вот сообразит, кто он такой, и решил не продолжать бессмысленного запирательства.</p><p class="p">— Я Ленин, — сказал он спокойно и с достоинством. Совершенно не к чему было Деникину знать, что перед ним сидит грозный батька Вольдемар, да Деникин и не поверил бы этому: ведь все знали, что батька Вольдемар — однорукий великан.</p><p class="p">— Как?! — вскричал Романовский.</p><p class="p">— Ленин! — обрадовался Деникин. — А я-то ломаю голову, на кого вы похожи! Вы как любите чай, Владимир Ильич: со сливками или с лимончиком?</p><p class="p">— Того и другого, и покрепче, — ответил Ленин, — и от папирос и коньячку не откажусь.</p><p class="p">Романовский протянул ему портсигар опасливым движением, точно полагал, что Ленин может его укусить. Владимир Ильич с удовольствием взял душистую, дорогую папиросу... До приезда в Гуляй-Поле он никогда не курил, но у Махно начал курить люльку (козацкую трубку); после люльки городская папироса показалась ему слабой, но все же дым ее был приятен... Подтянутый, щеголеватый адъютант принес поднос, на котором были изящные фарфоровые чашечки, сухари в плетеной вазочке, масло, серебряные ложечки и ножи, стопки, французский коньяк — и это тоже было приятно, и приятно было сидеть на удобном стуле, а не по-турецки на голой земле. Пожалуй, Владимир Ильич поторопился, решив несколько недель тому назад, что не желает иметь с цивилизацией ничего общего.</p><p class="p">— Как же вы, Владимир Ильич, оказались здесь? — спрашивал Деникин.</p><p class="p">— Приезжал с инспекцией, Антон Иванович.</p><p class="p">— Да, но мне доложили, что вас взяли в степи, верхом, с шашкою наголо!</p><p class="p">— Я просто прогуливался, — ответил Ленин.</p><p class="p">— Вы удивительный человек.</p><p class="p">— Вы тоже, Антон Иванович. Я вас очень уважаю. Вы молодец. Я давно искал случая вам это сказать.</p><p class="p">— Тогда как же, г-н Ленин, нам понимать это? — неприязненно спросил Романовский и показал Ленину какую-то листовку. — Ваша статья. Совсем свеженькая. Называется «Все на борьбу с Деникиным».</p><p class="p">— Так ведь война же, — сказал Ленин добродушно. «Это Лева-балбес написал... Мог бы и собственной фамилией подписаться, а не сваливать на меня...»</p><p class="p">— Как это нехорошо, что русские люди поднимают оружие друг против друга, — сказал Деникин с печальным вздохом.</p><p class="p">— Совершенно с вами согласен, — ответил Ленин.</p><p class="p">— Но ведь вы первые начали! — сказал Романовский.</p><p class="p">— Ну, положим, первые начали воевать вообще не мы, а немцы, — заметил Ленин, — вот оно с четырнадцатого года как-то и тянется...</p><p class="p">— Так, может быть, пришла пора замириться?</p><p class="p">— Это было бы великолепно, — сказал Ленин, — но, боюсь, большевики не захотят.</p><p class="p">— А разве вы сами не большевик?!</p><p class="p">— Да я уж и не знаю теперь, кто я такой, — сказал Ленин грустно. — А коньяк у вас гарный, Антон Иванович, дорогуша...</p><p class="p">Деникин, поняв намек, велел адъютанту принести еще коньяку и всяческих закусок; Ленин пил и ел с охотой. Давно уж он не чувствовал себя так хорошо. Все его умиляло: красивая форма с золотыми погонами, телефонные аппараты, изящный письменный прибор, вышколенный адъютант... «Мне бы таких адъютантов и таких генералов — я б горы свернул!» И они так сидели и тихо, интеллигентно выпивали, болтая о политике, до самой ночи, и даже высокомерный Романовский в конце концов оказался отличным мужиком; и они пели «Боже, царя храни!» и «Яблочко», и обнимались, и пили на брудершафт, и пачками жгли в камине керенки.</p><p class="p">— Так, значит, Владимир Ильич, вы согласны? — спрашивал Деникин, с нежностию глядя на Ленина.</p><p class="p">— А? — встрепенулся Ленин. От еды, питья и уютной обстановки его развезло, и он то и дело задремывал, едва не падая со стула. — С чем согласен, батенька вы мой?</p><p class="p">— С тем, что мы должны нынче летом взять Москву и освободить Россию от большевицкой заразы.</p><p class="p">— А! Само собой, — ответил Ленин и тут же уснул. Сквозь сон он чувствовал, как какие-то офицеры бережно и деликатно поднимают его, несут на руках и укладывают в чистую, мягкую, хорошо пахнущую постель.</p><p class="empty-line"/><p class="p">— Антон Иванович, прежде чем мы начнем наступление на Москву, я должен съездить к Махно, — сказал Ленин и щелчком стряхнул пушинку с золотого погона.</p><p class="p">Он еще не привык к форме и радовался ей как ребенок... Только что закончилось совещание, где он вместе с деникинскими генералами планировал разгром красных и взятие Москвы. Всем казалось, что победа не за горами и дни советской власти сочтены. К сожалению, комдив Чапаев отбросил Колчака от Екатеринбурга, но Деникин с Лениным надеялись на свои силы. Они никогда всерьез не полагались на Колчака, окружавшего себя шарлатанами и некомпетентными людьми, о глупости которых ходили анекдоты: так, один из его штабных — какой-то швейцарец, — получив из дивизии депешу с просьбою прислать пятьсот лимонов, отправил туда вагон бумажных денег вместо требуемых бомб и гранат. Колчак был идеалист с манией величия, оторвавшийся от реальности. Совершенно не к чему ученым лезть в политику.</p><p class="p">— Зачем, Владимир Ильич, вам ездить к Махно? — спросил Деникин. — Ведь он бандит.</p><p class="p">— Бандит или не бандит, а он был моим другом. Возможно, я сумею убедить его перейти на сторону Добрармии. Ведь он ненавидит большевиков так же сильно, как мы с вами. И еще конь там у меня остался, добрый коник, трэба проведать...</p><p class="p">— Что ж, не могу вас удерживать, — вздохнул Деникин. — Я поручу барону Врангелю выделить вам отряд для сопровождения.</p><p class="p">— Нет, генерал, благодарю вас; не стоит отвлекать барона от нашей главной задачи, — отвечал Ленин. — Да и Махно станет со мною разговаривать лишь в том случае, если я приеду к нему один.</p><p class="p">— Ну что ж, с Богом! — сказал Деникин. Он крепко обнял Ленина и перекрестил его. — Возвращайтесь скорее, дорогой вы мой человек. Я к вам ужасно привязался.</p><p class="p">— Взаимно, мой генерал! — сказал растроганный Ленин и кинулся на шею Главнокомандующему. О, если б он знал, что видит этого прекрасного человека в последний раз!..</p><p class="empty-line"/><p class="p">Ошибкою его было то, что он под крестьянский армяк надел свой златопогонный китель; причина этого на первый взгляд нелепого поступка заключалась не только в том, что он этот китель любил и не желал ни на минуту с ним расстаться, но в том, что он, зная Махно и в особенности графа Толстого, был уверен, что как только даст им этот нарядный китель примерить — они тотчас согласятся примкнуть к белому движению. Ему казалось, что он ничем не рискует: белые его знали и любили, красные и зеленые, не подозревая о его измене, тоже по старой памяти любили его. Но он забыл о четвертой силе — злобном и всех ненавидящем атамане Григорьеве...</p><p class="p">Григорьевцы схватили его, когда до Гуляя-Поля было совсем уже недалеко. Они сперва просто хотели зарубить его и снять с него сапоги и одежду; но, когда под армяком обнаружились золотые погоны, намерение их переменилось. Они грубо заломили ему руки за спину, несколько раз пнули в живот и, швырнув вниз лицом поперек седла, как куль с сеном, поскакали в свою ставку.</p><p class="p">Вечер и ночь Ленин пролежал в овине связанный; ему страшно хотелось есть и пить, из разбитого носа текла кровь, гуси щипали его, корова на него наступила... В щель меж досок светила луна, и чей-то черный силуэт двигался взад-вперед; Ленин подкатился поближе, прильнул лицом к самой щели и слабым голосом крикнул:</p><p class="p">— Эй, товарищ, послушайте!</p><p class="p">— Гусь свинье не товарищ, — басом отвечал часовой.</p><p class="p">— Господин... сударь...</p><p class="p">— За сударя щас ответишь, шкура! — сказал часовой злобно. — Выведу и — в расход.</p><p class="p">После этого Ленин замолчал и больше не пытался говорить с часовым. На рассвете дверь со скрипом отворилась. Часовой, подойдя к пленнику, схватил его очень грубо за шиворот, поставил на ослабевшие ноги, пребольно ткнул в спину прикладом винтовки и велел идти. Они зашагали по улице, прошли мимо церкви...</p><p class="p">— Куда вы меня ведете? — волновался Владимир Ильич.</p><p class="p">Но часовой не отвечал и все тыкал его в спину. «Никак на расстрел», — обмер Ленин; ноги его сделались совсем ватными. Однако в душе его вдруг поднялась какая-то отчаянная решимость; он стал торопливо придумывать смелые и гордые слова, которые скажет своему убийце, и так увлекся, что не заметил, как его впихнули в хату, где располагался так называемый штаб Григорьева. Хата была грязная, мерзкая, и повсюду сновали тараканы. Махно и граф Толстой такого бы не потерпели, и даже большевики не потерпели бы... Босой, в одних подштанниках, с подбитым глазом и кровавой ссадиной на скуле, стоял Ленин и исподлобья глядел на Григорьева. (Он сразу узнал атамана, поскольку уже имел удовольствие столкнуться с ним в кавалерийской атаке, но тот не узнал его, ибо как тогда, так и сейчас был мертвецки пьян.) Руки Ленина были связаны за спиной, и все, что мог он противопоставить своим мучителям, — это свое царское, и мужицкое, и белогвардейское, и коммунистическое, и атаманское достоинство и самообладание.</p><p class="p">— Шкура, сволочь золотопогонная! — процедил Григорьев и кровожадно облизнулся. — Тебя-то мне и надобно, а то все думаю — кого бы запытать до смерти? Ну, рассказывай планы Деникина!</p><p class="p">— И не подумаю.</p><p class="p">— Расскажешь, паскуда!</p></span>
