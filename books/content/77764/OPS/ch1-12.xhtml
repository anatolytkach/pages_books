<p class="p1">ГЛАВА 5</p>
</div><p class="subtitle">Париж, 1909: Ленин и Дзержинский в области балета. Европа свербит. Инесса Арманд. Что такое «Правда».</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">Куда стремился весь Париж весной 1909-го? Разумеется, на русский балет Дягилева! Все газеты писали только об этом, улицы были оклеены афишами и портретами танцовщиц. Однако обитателям небольшой квартирки в доме номер 4 на тихой улочке Мари-Роз было не до балета. У Владимира Ильича в ту пору шла полоса везения — как говорится, перло; финансовые операции, биржевые спекуляции и картежная игра поглотили все его внимание, и у него практически не оставалось времени даже на общение с очаровательными парижанками.</p><p class="p">Надежда, его верная спутница и друг, по-прежнему вечерами делила с ним все перипетии карточного стола, а днем, когда муж был занят другими делами, хозяйничала дома, бегала по рынкам и распродажам, занималась чтением и рукодельем или писала прелестные акварельки — словом, вела обычную жизнь добропорядочной жены, скучноватую, но уютную. Париж, поначалу рисовавшийся ее неискушенному воображению как средоточие бесконечных развлечений и утонченного порока, оказался, в сущности, самым обыкновенным городом, мало отличавшимся от Красноярска или Томска. По-прежнему пугали ее лишь французские женщины, которые, по слухам, носили ажурные чулки, имели любовников и танцевали канкан.</p><p class="p">Изредка супруги посещали синематограф или проводили тихий вечерок дома, и тогда к ним на огонек, как правило, залетали вечно голодные Зиновьев с Каменевым, чтобы составить компанию для преферанса и отдать должное кулинарному мастерству Надежды Константиновны. Суетливые, щебечущие приятели давно привыкли к ней и не замечали ее безобразия; Крупская же всегда с радостью привечала эту парочку, поскольку можно было не опасаться, что они потащат Ильича к женщинам. Она не ревновала, но до смерти боялась, как бы ее Ильич не угодил в лапы к какой-нибудь вертихвостке-француженке, которая обдерет его как липку и будет обижать.</p><p class="p">В один из таких вечеров она — присутствие гостей придавало ей храбрости — с легким упреком сказала ему:</p><p class="p">— Ильич, мы так долго уже живем в Париже, а я ничего до сих пор толком не видала, кроме магазинов да казино...</p><p class="p">— Сходи в Лувр, дружок, — добродушно посоветовал Ленин. — Полюбуешься шедеврами.</p><p class="p">— Не хочется, — слабо возразила Надежда. Ей было неловко признаться мужу, что она уже побывала в Лувре, но обилие статуй и картин с обнаженными мужчинами и женщинами смутило ее, и она поспешно ретировалась.</p><p class="p">— Ну так в cinema сходи, — сказал Ленин. Он обожал синематограф и ходил бы туда каждый день, если бы время ему позволяло. Но у жены, оказывается, было на уме другое:</p><p class="p">— Ильич, а вот Гриша и Лева говорят, что приезжает наш русский балет... Они слыхали, как там замечательно пляшут... А еще Федор Иваныч будет петь... — Она прерывисто вздохнула. (Как-то Ленин подарил ей граммофонную пластинку с записями Шаляпина, и она плакала всякий раз, слушая «Дубинушку», а Владимир Ильич недоуменно косился на нее и пожимал плечами: сам он плакал только над «Апассионатой», под звуки которой в молодости жестоко проигрался в Харькове.) — Не взять ли и нам билеты?</p><p class="p">— Рассказывают, что Нижинский бесподобен, — сказал Зиновьев и томно закатил глаза к небу.</p><p class="p">— Magnifique! Delicious! — поддержал его Каменев. — Фокин... Модернизм...</p><p class="p">— Magnifique, magnifique... — хмуро проворчал Ленин. Он любил балет — во всяком случае, балерин, — но модернистское искусство казалось ему невыносимо скучным. — Знаю я ваш magnifique... А из баб там кто будет?</p><p class="p">— Ах, этого добра полным-полно. Карсавина, Павлова, Кшесинская, Идочка Рубинштейн...</p><p class="p">«...Повидать, что ли, Малечку? — лениво подумал Ленин. Ему и в голову не пришло, что Зиновьев с Каменевым ошибаются, и Кшесинская, вдребезги разругавшаяся с Дягилевым, в русских сезонах участвовать не будет. — Она. конечно, постарела, бедняга, с тех пор как Николаша увел ее у меня... Или это я у него увел? Уж и не упомню».</p><p class="p">Сказать по совести, Ленин даже не был уверен, что знаменитая прима вспомнит его при встрече. При этой мысли мужское самолюбие взыграло в нем, и он сказал решительно:</p><p class="p">— Ладно, Надюша. — И попросил проныру Зиновьева достать билеты — хорошие, но дешевые.</p><p class="p">Позднее, когда супруги уже лежали мирно под пуховыми одеялами в своих узких кроватях, разделенных абажуром на длинной железной ноге, Ленин сказал жене:</p><p class="p">— Надюша, рыбка... Наверное, скучно тебе со мной?</p><p class="p">— Что ты, Ильич! — испуганно прошептала она. — Я совершенно счастлива. Я о тебе забочусь, а больше мне ничего и не надо. И бог с ним, с этим балетом: если тебе жалко денег, то и не пойдем.</p><p class="p">— Не выдумывай глупостей! — сердито сказал он: как всякому мужчине, ему было обидно, когда женщина говорила, будто ему жаль денег. — Надя, а в деревню не хочется? Свиньи, куры, гуси...</p><p class="p">— Нисколечки.</p><p class="p">— Ну, спи. — И он, отвернувшись к стене, закрыл глаза.</p><p class="p">— Спокойной ночи, Ильич... — чуть слышно донеслось с соседней кровати.</p><p class="empty-line"/><p class="p">«Шатле» был полон. Давали «Павильон Армиды». Ленин уже знал, что Матильды Кшесинской не будет, но это не особо его огорчило. К чему ворошить прошлое? «Когда-то юная Малечка была великолепна в постели, но теперь... Да ну ее к чорту. Говорят, эта молодая Карсавина тоже очень мила. И Надя так радуется, бедняжка...» Он искоса глянул на сидевшую подле него подругу жизни: обмахиваясь кружевным веером, она живо стреляла по сторонам своими выпученными глазами. Модный туалет по-прежнему сидел на ней как на пугале, но в остальном она держалась уже вполне светски. Ленин тоже огляделся по сторонам. В зале было полным-полно богатых русских: можно завести полезные знакомства... «Эти набитые кошельки так и просятся, чтоб их облегчили... Да, надо сказать Надюше спасибо, что притащила меня на этот дурацкий балет!»</p><p class="p">В другом ряду партера, наискось от их с женою мест, сидела очень изящная женщина с каштаново-рыжими кудрями. Ленин безошибочно, с ходу, определил в ней француженку: никто больше не умеет так одеваться. «Очень даже ничего... Тощевата немного, но глазки, глазки, шейка! Надо будет познакомиться...»</p><p class="p">Так Владимир Ильич впервые увидел Инессу Арманд.</p><p class="p">Но он тотчас позабыл о ней, потому что его взору представилось нечто куда более занимательное.</p><p class="p">В одной из дорогих лож, развязно облокотясь на перила, сидели несколько разодетых вертопрахов, щебеча по-французски; что-то в осанке и движениях одного из них показалось Ленину смутно знакомым. Он попросил у жены бинокль, пригляделся: определенно этот франт б безупречном фраке, с моноклем в глазу, с выкрашенными в смоль волосами и тонкими черными усиками, подкрученными кверху, был Дзержинский! Настроение у Ленина сразу испортилось. «Нигде от этого распросукина сына спасения нет; а говорил, что в Варшаве сидит на нелегальном положении... Небось, специально притащился следить за мной, не трачу ли я на себя и жену партийные деньги... Нако-ся, выкуси! — И он сложил в кармане фигу. — Я и партия едины, как близнецы-братья: куда хочу, туда и трачу». Но загримированный Дзержинский не обращал на Ленина никакого внимания и вроде бы даже не заметил его. «Вот уж никогда б не подумал, что эта снулая рыба балетом интересуется... А кто эти крашеные уродцы с ним в ложе?» Перегнувшись через колени жены, он задал этот вопрос Зиновьеву — тот знал всех и вся.</p><p class="p">— Ах. какой же ты некультурный, Voldemare... Это Марсель Пруст и Жан Кокто. А третьего я не знаю, — со вздохом признался Зиновьев. — Но он очень симпатичный.</p><p class="p">«Господи, что за идиот! — подумал Ленин. — Однако же Надюша тоже не узнала Дзержинского... Что он тут делает, если не присматривает за мною?! Неплохо бы это выяснить...»</p><p class="p">Дирижер встал за пульт, раздался мощный раскат литавр, медленно поднялся занавес, и представление началось. «Пресвятые угодники, красота-то какая... — благоговейно прошептала Надежда Константиновна: она впервые в жизни была в театре. — А это все из золота?!» Ленин недовольно покосился на фыркнувшего Зиновьева — не любил, когда чужие над Надей смеялись — и терпеливо объяснил ей, что такое декорации.</p><p class="p">Гигантские часы с амурами пробили полночь; из их раскрывшихся дверец высыпались двенадцать кордебалетных девочек и начали танец. «Вот чего он приперся, — догадался Ленин, — он же известный спец по малолеткам... (Ленин уж несколько лет знал об этом: он слыхал об эротических причудах Дзержинского от петербургских, парижских, лондонских, брюссельских и даже финских проституток.) М-да, ловко он провел меня тогда с той цветочницей... И что хорошего можно в этих детишках найти? Им бы еще в куклы играть... У меня такая дочка могла бы быть... А может, и растет где-нибудь...» Однако же Дзержинский вовсе не глядел на сцену, а болтал о чем-то со своими нелепыми спутниками. «Ну, может, он вербует этих типов в партию. Что за неугомонный человек!»</p><p class="p">— Nadine, — зашептал Зиновьев Крупской, — сейчас обратите внимание на это pas-des-trois...</p><p class="p">«Если она спросит „чаво?“ — придется провести с ней воспитательную работу», — подумал Ленин. Но Надежда только кивнула: она прекрасно понимала и говорила по-французски, хотя и с выговором, характерным для простонародных кварталов Парижа. Ленин с облегчением вздохнул и стал внимательно глядеть на Карсавину и еще одну хорошенькую балерину «В варьете, конечно, ногами интересней выделывают... Но и эти ничего...»</p><p class="p">Началось соло Нижинского; Ленину стало скучно, и он, сунув в рот карамельку, вновь принялся украдкой разглядывать публику. Полюбовался обнаженными плечами Инессы Арманд: «В этой черненькой определенно что-то есть... С виду скромница — знаем мы этих скромниц! — Он перевел взгляд с Инессы на Дзержинского и чуть не подавился: Феликс Эдмундович, как завороженный, впился глазами в расфуфыренного полуголого танцовщика и даже, кажется, что-то шептал в такт его прыжкам и оборотам. — Ну, совсем рехнулся наш железный Феликс. Я всегда говорил, что его пристрастие к маленьким девочкам ничем хорошим не кончится. Надо обрадовать Гришу с Левой, что их полку прибыло».</p><p class="empty-line"/><p class="p">Ленин, разумеется, заблуждался насчет Феликса Эдмундовича. На самом деле того ничуть не занимали ни балетное искусство вообще, ни танцовщики в частности; пристально наблюдая за движениями рук и ног Нижинского, он отнюдь не наслаждался зрелищем, а деловито считал пируэты, кабриоли, батманы и антраша: таким образом танцовщик сообщал ему зашифрованную по типу азбуки Морзе информацию о состоянии революционного процесса в различных европейских государствах.</p><p class="p">Дзержинский завербовал Нижинского (как, кстати, и отсутствующую в Париже Кшесинскую) еще в Петербурге, объяснив, что государственный переворот в России, к которому он готовится, прежде всего пойдет на пользу любимой Польше. Импульсивный и доверчивый соплеменник сразу согласился на сотрудничество. Он был, конечно, слишком глуп и не от мира сего, чтобы самостоятельно добывать секретные сведения: в его обязанности входило лишь во время гастрольных поездок получать эти сведения от других агентов Дзержинского, рассеянных по всей Европе, а после своим танцем передавать их своему шефу, которого он искренне почитал величайшим человеком в мире после Фокина и всеми силами старался ему угодить.</p><p class="p">Шеф, однако, был постоянно недоволен агентом и злился на него. И дело тут было вовсе не в частной жизни бедного Вацы. Конечно, Дзержинский, как всякий приличный человек, ненавидел педерастов, но жизнь ежечасно сталкивала его с ними; он воспринимал это как одно из ряда бесчисленных испытаний, ниспосланных ему судьбой, и не роптал, ибо настоящий мужчина не ропщет на испытания, а стремится к ним; исходя из этой посылки, он, повстречав педераста, не бежал от него, а, напротив, спешил как можно скорей с ним познакомиться, чем, собственно, и объяснялось столь странное соседство в ложе. Причина же его злобы на Нижинского заключалась в низкой эффективности работы агента: увлекшись идиотскими танцульками, бестолковый Ваца постоянно забывал шифры и все путал; в результате изумленный Дзержинский читал в его соло, к примеру, следующую информацию: «...монах уморил зпт европа свербит тчк панталоны среду» и вынужден был мучительно догадываться, что некий монарх умер, Европа скорбит, а в среду состоятся, по-видимому, похороны. (Бесполезность сообщения была очевидна, но это уже была вина не танцора, а других агентов, которые сочли нужным шифровать подобный вздор, воображая, по-видимому, что их шеф не в состоянии прочесть газету.) Бывали у Вацлава сообщения и вовсе не поддающиеся расшифровке, как, в частности, и получилось на премьере «Павильона Армиды».</p><p class="p">«Умница Матильда — даром что пьет как лошадь — никогда ничего не путает и не забывает, а этот... Придется лично встретиться и спросить, что все это значит, а затем в последний раз сделать ему внушение, а если не поможет — послать его к чортовой матери», — подумал Дзержинский. Соло завершилось, Нижинский исчез за кулисами, начался танец шутов; Феликс Эдмундович расслабился и, лицемерно обменявшись парой восторженных реплик с Кокто и Прустом, скользнул притворно рассеянным взглядом по партеру: естественно, Ленин заблуждался и относительно того, что Дзержинский его не замечает. «Рыжий шут опять просаживает партийную кассу на развлечения... У Крупской новая шляпка... Matka Boska, как можно жить с такой старой, жирной, грудастой, рыхлой бабищей! И эти два пакостных жиденка тут как тут... Чем они все вчетвером занимаются?!»</p><p class="p">В свою очередь, Дзержинский, уверенный в безупречности своей маскировки, полагал, что Ленин не узнал его. Они так и провели остаток представления — исподтишка наблюдая друг за другом и совершенно безосновательно подозревая один другого в самых невероятных пороках и безумствах.</p><p class="p">После спектакля, однако, им пришлось столкнуться нос к носу: на ужин в ресторане «Ле Дуайен», который давала в честь артистов герцогиня де Грамон, Феликс Эдмундович отправился за компанию с Кокто и Прустом, чтобы под видом поздравлений Нижинскому с помощью тайных знаков условиться с ним о конспиративной встрече, Ленина же потащил туда вездесущий Зиновьев — знакомиться с Дягилевым, на что Владимир Ильич охотно согласился, поскольку никогда не упускал случая свести знакомство с любым человечком, у которого — как он предполагал — водятся деньжата. Да и с артистками пообщаться было бы неплохо. «А только лучше бы с той черненькой... Чем она меня так зацепила, зараза?» — недоумевал он.</p><p class="p">— Надюша, ты, наверное, устала. Поезжай домой, ma chérie. Лева тебя отвезет. — Хотя Крупская и не была его женой по-настоящему, он все же не хотел флиртовать с другими женщинами прямо у нее на глазах — как-то неловко было.</p><p class="p">— Да, но как же... Я тоже хочу на ужин... — залепетал Каменев.</p><p class="p">— Отвези, Левочка, отвези, — обрадованно подхватил Зиновьев, который, при всей его привязанности к другу, всегда был не прочь на время обрести свободу. — Надя с Володей к нам так добры. Нужно оказать им услугу.</p><p class="p">— Сам бы и оказывал, услужливый, — надувшись, проворчал Каменев.</p><p class="p">И они с Надеждой Константиновной уехали, предварительно получив от Зиновьева торжественное обещание приглядывать за Лениным, а с Ленина — приглядывать за Зиновьевым. Освободившись от своих половин, Ленин и Зиновьев обменялись понимающими взглядами: уж конечно, старые друзья не собирались мешать друг другу веселиться.</p><p class="p">В ресторане была толпа народу. Долго не могли рассесться по местам: бродили, жали друг другу руки, обнимались, шумели, галдели и восклицали все разом; беспорядок усугублял Пруст, который беспрестанно бегал туда-сюда по спинкам диванчиков и пытался подать кому-нибудь пальто. Дзержинский не подал виду, что знаком с Лениным, и тот ответно притворился, будто не распознал коллегу с наклеенными усиками. «Горе-конспиратор», — подумал Ленин. «Все русские идиоты, — подумал Дзержинский, — особенно жиды». Он всегда подозревал, что Ленин еврей.</p><p class="p">— ...Так, говорите, на какао-бобах можно заработать?</p><p class="p">— Заработать всегда можно, было бы желание...</p><p class="p">Ленин стоя разговаривал со знакомым биржевиком — интерес его к Дягилеву уже испарился, поскольку он понял из разговоров, что, несмотря на блистательный успех, с финансами у того худо, сам ищет, у кого выцыганить, — и вдруг увидел, как в ресторанную залу входит та милая рыжеволосая француженка... Сердце у него забилось; проявив чудеса ловкости, он мгновенно растолкал гостей, первым предложив красавице руку, провел ее к столу — на удачу, слева от Дягилева оказались два свободных места, — и, счастливый, плюхнулся рядом с ней... К его изумлению, она превосходно знала русский.</p><p class="p">— Я был абсолютно уверен, что вы француженка. И ваша фамилия звучит по-французски.</p><p class="p">— Да, вы правы. И тем не менее моя фамилия русского происхождения. Я долго жила в России, была гувернанткой. И там вышла замуж за русского по фамилии Арманд.</p><p class="p">— Так вы замужем...</p><p class="p">— Я разведена.</p><p class="p">— А, так вы свободны!</p><p class="p">— Но потом я вышла за его брата, тоже русского. «Было бы странно, если б у русского был брат</p><p class="p">француз или китаец, — подумал Ленин, — она не особенно умна...» Но он не ума искал в женщинах.</p><p class="p">— Так вы, стало быть, замужем? — спросил он снова.</p><p class="p">— Мой второй русский муж Арманд умер. — Женщина вздохнула. В ее прекрасных темных глазах было выражение искренней печали. — Я вдова.</p><p class="p">Низкий звук ее голоса был прелестен... «Да что я волнуюсь как мальчишка? — злился на себя Ленин. — Зацепила, зацепила, зацепила... Уж не втюрился ли я?! Вздор, все вздор!» — и он старался быть небрежным и развязным, как обычно, но получалось плохо, и он злился и досадовал еще больше.</p><p class="p">— ...Все мы околдованы волшебными садами Армиды...</p><p class="p">— ...А контрактец-то переменить придется...</p><p class="p">— ...Дорогая, вы были просто великолепны... Проходивший мимо официант нечаянно толкнул</p><p class="p">Ленина, и тот выронил на пол тарталетку с черной икрой, от которой еще не было откушено ни кусочка. Машинально — проклятое кухарочье воспитание! — он нагнулся подобрать ее и увидел, как под завесой длинной скатерти Дзержинский несколько раз подряд наступил Нижинскому на ногу. Это зрелище окончательно убедило его в том, что Железный Феликс свихнулся. В действительности же Феликс Эдмундович, нажимая носком туфли на ногу агента, морзянкой давал ему понять, что крайне недоволен качеством его донесений.</p><p class="p">— Вацлав, отчего у тебя такое грустное лицо? — озабоченно спросил Дягилев своего друга. Но бедный танцовщик, до глубины души огорченный разносом, который учинял ему Дзержинский, никому не мог объяснить причины своей печали и лишь пролепетал:</p><p class="p">— Мне кажется, я танцевал плохо...</p><p class="p">— Ах, что вы, что вы такое говорите?! — раздался хор изумленных голосов. И продолжалось (а Дзержинский все пинал и пинал несчастного под столом):</p><p class="p">— ...О, это было бесподобно...</p><p class="p">— ...C'est joli, ces danses...</p><p class="p">— ...Сергей Павлович, вы сотворили чудо. Покорили Париж и утерли нос императору.</p><p class="p">— Да, Николай Александрович еще пожалеет, что не дал мне денег, — заносчиво сказал Дягилев. На радостях он изрядно выпил и теперь бурно жестикулировал, был румяней обычного и чаще, чем нужно, встряхивал головой, демонстрируя знаменитую белую прядь в волосах. — Да что мне император? Император — тьфу! Все прекрасно знают, что я не уступаю ему в знатности происхождения. Мой предок Петр Великий...</p><p class="p">«Ну вот, еще один царский потомок обнаружился, — подумали одновременно Дзержинский и Ленин, — конечно, самозванец и выжига...» И Ленин вновь обратил все свое внимание на милочку Инессу. Он никак не мог понять, что в ней было особенного, но определенно что-то было. «Страстная натура, два раза была замужем, наверняка и любовников имела... Это хорошо... Вдова — это опасно. Всякая вдова хочет снова выскочить замуж. Но не все ли равно! Сдохну, а добьюсь ее».</p><p class="p">— M-me Арманд, расскажите мне о вашем муже.</p><p class="p">— О котором?</p><p class="p">— Об обоих, — терпеливо пояснил Владимир Ильич. Все в Инессе умиляло его, даже глупость.</p><p class="p">— Мой первый русский муж был превосходный, замечательный человек. Я его очень любила. У меня от него четверо детей... — Ленин взглянул на нее недоверчиво: на мать четверых детей эта изящная парижаночка менее всего походила. — Мой второй русский муж тоже был замечательный, великолепный мужчина...</p><p class="p">— И вы его очень любили.</p><p class="p">— Разумеется... И у меня от него тоже есть сын... Но он хотел делать в России революцию. И его отправили в ссылку. Я последовала за ним, как Полина Гебль...</p><p class="p">— Как кто?</p><p class="p">— Жена декабриста Анненкова. Она тоже была француженка.</p><p class="p">— Я уж догадался.</p><p class="p">— Я очень, очень его любила. — На ее темных ресницах повисла бриллиантовая слезинка. Она промокнула глаза платочком — белоснежным, в кружевах. — ...Ах, я уронила платок...</p><p class="p">— Сию минуту-с! — Ленин снова нырнул под стол, чтобы поднять беленький платочек, и обнаружил, что странный танец ботинок продолжается. (Феликс Эдмундович, уже понявший, что перевоспитать агента невозможно, уговаривался с ним о новом шифре.)</p><p class="p">И тут глаза Ленина под столом встретились с парой еще чьих-то сверкающих, вытаращенных глаз: галантный Дягилев, одновременно с ним кинувшийся поднять платок, оброненный дамой, увидел зрелище, которое, не будучи знаком с азбукою Морзе, истолковал так же превратно, как и Ленин. Лицо его налилось кровью, кудри встали дыбом, он тяжело засопел... Владимир Ильич поспешно разогнулся, подал Инессе платочек и сделал невозмутимое лицо. «Ну все, допрыгался Железный Феликс, не сносить ему своей холодной головы. Дягилев его укокошит. Так ему, сукину коту, и надо», — удовлетворенно подумал он.</p><p class="p">— Скажите, m-me Арманд... А у этих ваших русских мужей есть еще братья?</p><p class="p">— О да. Есть еще один.</p><p class="p">— И теперь вы выйдете за него замуж?</p><p class="p">— Н-не знаю... — Она смотрела растерянно, почти с испугом. — Я еще не думала об этом. Наверное, нет, потому что у него уже есть жена. Вообще-то я не одобряю буржуазный брак, но... Нет, нет. Хотя я совсем без средств...</p><p class="p">— Значит, вы снова станете гувернанткой?</p><p class="p">— Я бы лучше занялась чем-нибудь, знаете, революционным. Вы не могли бы мне это устроить, monsieur Ленин?</p><p class="p">— Я?! С чего вы взяли, ma petit, что я имею отношение к революционным делам?</p><p class="p">— У вас вид человека, который имеет отношение ко всему на свете. («А она не так уж и глупа», — подумал Ленин.)</p><p class="p">— И как вы себе представляете революционную работу, chérie? — спросил он смеясь.</p><p class="p">— Ну, например, переписывать какие-нибудь бумаги...</p><p class="p">«Как мило и задорно она морщит носик, когда улыбается! И эти глаза косули...» Ленин всегда уверял окружающих, что ему нравятся женщины пышные, веселые, непритязательные и развязные, как матросы; он даже сам себя в этом убедил. Он действительно предпочитал их, потому что с ними все было просто: не нужно тратить время на долгие обольщения, бессмысленные и утомительные выяснения отношений; степень нежности и привязанности таких женщин можно было безошибочно регулировать с помощью подарков. Но хрупкая красота француженки невыразимо трогала его душу; едва ли не впервые в жизни ему не хотелось тотчас лечь с нею в постель, а желательно было сидеть где-нибудь в парке, на скамеечке, под луной, держать ее за руку и даже, быть может, читать ей стихи. «Нет, к чорту буржуазные сантиментишки! Хватать в охапку и везти в отель. С ней, конечно, будут сложности. Уж очень влюбчива. Потом не развяжешься. Пятеро детей — с ума сойти... Ну да наплевать! Сегодня же она будет моя!» И он, махнув рукой на предосторожности, обещал Инессе, что непременно устроит ей любую работу, какую она только пожелает, и с головою погрузился в глупейший, но сладостный процесс ухаживания. А тем временем общий разговор за столом свернул на драгоценности, которыми были с ног до головы увешаны артисты и дамы:</p><p class="p">— ...Ожерелье совершенно волшебное...</p><p class="p">— ...Неужели все бриллианты в диадеме подлинные?!</p><p class="p">— ...Как прекрасен ваш изумруд, Serge! — восхищенно проговорил Кокто.</p><p class="p">— Это старинный фамильный перстень, очень неплохой, — отвечал Дягилев, отставляя унизанную кольцами руку и любуясь игрой электрического света в гранях камней. Он, казалось, уже овладел собой и лишь изредка кидал на Дзержинского свирепые косые взгляды, которые тот, не подозревавший, что его переговоры с агентом замечены, принял, в свою очередь, за извращенные знаки внимания и отвечал на них испепеляющим презрением.</p><p class="p">— Да, monsieur Дягилев, вы знаете толк в камнях... — подхватил Пруст. — А это что за уродец? — Один из дягилевских перстней, действительно, смотрелся вопиющим диссонансом: это было толстое, низкой пробы кольцо без камня, потемневшее то ли от времени, то ли от небрежного ухода.</p><p class="p">— А этого «уродца» сам Петр презентовал моей прапрапрабабке, — сказал Дягилев. — Уникальная вещь, реликвия. На его внутренней стороне какие-то загадочные письмена... Я с отроческих лет всегда ношу его как талисман.</p><p class="p">Тут Дзержинский и Ленин подобрались и навострили уши, но, поскольку необходимо было ревностно охранять тайну кольца как друг от друга, так и от любого постороннего человека, ни жестом, ни вздохом не выдали обостренного интереса.</p><p class="p">— А что за письмена? — заинтересовался Пруст. — Нельзя ли на них посмотреть? Я обожаю реликвии.</p><p class="p">— С удовольствием показал бы их вам, — со смущенной улыбкой ответил Дягилев, — но проклятое кольцо сидит ужасно туго... Его удается снять лишь основательно намылив. К сожалению, мои габариты несколько увеличились со времен отрочества. — И он горько вздохнул.</p><p class="p">— Monsieur Ленин, вы меня не слушаете...</p><p class="p">— Да-да, вы совершенно правы, m-me Арманд, — невпопад отозвался Владимир Ильич.</p><p class="p">Не только красотка Инесса, но весь сонм райских гурий теперь не мог бы отвлечь Ленина от захвативших его практических соображений. Он так занервничал, что даже начал ерзать на сиденьи. «Чем чорт не шутит — вдруг дягилевская прапрапрапрабабка и вправду согрешила с любвеобильным Петром, и заветное кольцо давным-давно уплыло из императорского дворца... Болван Дягилев, конечно, не подозревает о волшебных свойствах кольца, иначе б не болтал о нем всякому встречному... Говорит, будто не может сиять — притворяется? Да вроде бы нет — пальцы и вправду толстые, как сосиски... Правда, чтобы все было тип-топ, кольцо я должен получить из рук Михаила или, по крайней мере, после его отречения, а он, бездельник, еще и не думал на престол всходить... Но все же пускай оно лучше у меня полежит до поры до времени — целей будет. Да, может, это вовсе и не то кольцо?</p><p class="p">Итак, необходимо как можно скорее подкараулить дражайшего Сергея Палыча в каком-нибудь тихом темном переулке и взглянуть на кольцо, а если окажется, что это ОНО, — завладеть им, не останавливаясь ни перед какими препятствиями. Однако какой здоровенный мужичина! С ним не всякий справится. Допустим, оглушить ударом сзади по голове... А как же стащить с него колечко? Намылить, намылить... Но в баню он, наверное, не ходит, а если и ходит, то не один, а в такой компании, где мне делать уж совершенно нечего. Что ж, придется носить с собой кусок мыла, вот и все». Примерно те же мысли проносились в голове и у Дзержинского, с той лишь разницей, что Феликс Эдмундович намеревался для осмотра надписи на внутренней стороне кольца воспользоваться не мылом, а скальпелем, предварительно, разумеется, умертвив обладателя толстого пальца.</p><p class="p">— ...Monsieur Ленин! Да что с вами такое? Вам нехорошо? — участливо спросила Инесса.</p><p class="p">— Мне хорошо, camarade... То есть chérie... — рассеянно пробормотал Владимир Ильич. — Давно мне не было так хорошо.</p><p class="p">— Ах, уже так поздно... Мне нужно ехать домой... </p><p class="p">«Уехать с ней? Уехать — и на несколько часов забыть о кольце? Но железо нужно ковать, пока оно горячо...» Ленин разрывался между желанием насладиться обществом Инессы и необходимостью немедля приступить к слежке за Дягилевым, поскольку того, по всей видимости, весьма трудно будет застать одного, без толпы приятелей и прихлебателей. «А ну как — неровен час — с Дягилевым что-нибудь случится, и драгоценность достанется чорт знает кому? Начать слежку сегодня же... Но Инесса... Разве послать к чортям собачьим кольцо, и престол, и корону? Что такое корона по сравнению с этой грудью, осиной талией и ножками?! (Лазая под столом, он успел заметить, что ножки m-me Арманд, обтянутые ажурными чулками и обутые в крохотные ботиночки, были и впрямь хоть куда.) С другой стороны — что такое Инесса? К чертям Инессу... Милая, удивительная Инесса... Ах, да что Инесса! Делу — время, потехе — час. Гувернантка... Если это окажется то самое кольцо — все принцессы и герцогини будут к моим услугам».</p><p class="p">— Ma chérie, — сказал он, целуя ей руку, — мне и в самом деле нехорошо...</p><p class="p">Выбор был сделан. M-me Арманд — разочарованная, плохо скрывающая обиду, — уехала с вечера в сопровождении какого-то облезлого барона. Ленин проводил ее взглядом исподлобья; ревность, досада, раскаяние кусали его; была минута, когда он уже было привскочил с места, чтобы бежать за ней, но... Какой мужчина на его месте выбрал бы иное? Времена трубадуров давно миновали.</p><p class="p">...Больше в тот вечер ничего заслуживавшего упоминания не произошло. Только ни в чем не повинный Вацлав получил увесистую затрещину от Дягилева.</p><p class="empty-line"/><p class="p">Следующие несколько суток прошли в наблюдениях. Переодетый французским матросом, с золотой серьгою в ухе, Ленин провожал Дягилева до дверей отеля, таскался за ним по улицам, исправно посещал спектакли и репетиции — безрезультатно! Сергей Павлович ни на минуту не оставался один и даже бань не посещал, по-видимому предпочитая принимать ванну у себя в номере, куда вломиться было никак невозможно, потому что и там постоянно толокся всякий сброд, да еще Шаляпин спал на кушетке — легендарный бас так мандражировал перед выступлениями, что не мог оставаться в своих апартаментах, жался туда, где было побольше народу, — и храпел ужасно громко.</p><p class="p">Много раз за эти дни Ленин вспоминал о прелестной француженке. «Она обиделась... Дуреха, знала б, какая ставка на кону! Если стану царем — я ее не оставлю милостями... А если вытяну пустышку — никогда не поздно принести извинения. Объясню, что у меня в тот вечер отчаянно расстроился желудок... Нет, нужна более романтическая причина. Ну да уж совру что-нибудь... И какого чорта Дягилеву на месте не сидится? Ладно, рано или поздно я его подкараулю... Но что же дальше? Он ведь не станет послушно ждать, пока я буду намыливать его палец и стаскивать колечко, а прихлопнет меня своей ручищей как муху. Разыграть сценку? Но какую?! А, ладно! Главное — ввязаться в драку, а там посмотрим». Так думал Владимир Ильич, когда в очередной раз, прячась в тени каштанов, издали сопровождал Дягилева и его спутников на promenade.</p><p class="p">И тут ему в глаза бросилась осторожно шагающая по противоположной стороне тротуара худая высокая фигура рыжебородого слепца в темных очках и с палочкой. Этот слепец уже несколько раз попадался ему. Он всегда выбирал для своих прогулок те же маршруты, что и Дягилев. Это показалось Ленину подозрительным. Он на некоторое время переключил внимание с Дягилева на слепого и вскоре заметил, что «слепой» украдкой глянул на свои наручные часы. «Все ясно, — решил Ленин, — перед нами полицейский агент. Этого еще недоставало!»</p><p class="p">Но человек, притворяющийся слепым, был, конечно, не полицейский агент: на сей раз Дзержинский загримировался столь тщательно, что Ленин не опознал его. Без устали, как и Ленин, великий мастер перевоплощений повсюду следовал за Дягилевым. Как и предупреждал Бауман, болезнь Дзержинского прогрессировала, и жажда убийства клокотала в нем; четыре года назад он побоялся лично убить психоаналитика, но теперь вполне готов был на убийство даже такого кабана, как Дягилев. Он предполагал остановить Дягилева, попросить его перевести несчастного калеку через улицу — и сделать сквозь штанину укол, вызывающий мгновенный паралич дыхания; а уж отрезать палец было делом секунд — пока полиция и врачи набегут, кольцо и его новый обладатель будут уже далеко... «Matka Boska, как у этого человека хватает терпения все время быть окруженным другими людьми? — недоумевал Дзержинский, обожавший уединение. — ...Ну вот, теперь еще Кокто присоединился к этой развеселой компании... Что за толстозадый матросик постоянно семенит за ними? Проклятые педерасты...»</p><p class="p">А Дягилев, чей мнительный глаз был не менее остер, чем у революционеров, терзался недоумением: кто эти двое опереточных сумасшедших, что уже неделю преследуют его, куда б он ни направлялся? Но в конце концов он пришел к выводу, что преследователи подосланы кредиторами, и успокоился. Кредиторы были противным, но естественным и привычным явлением, как дождик или дурная погода, и давно уж не смущали его. И прогулки продолжались...</p><p class="p">Однажды поздним вечером, когда Дзержинский и Ленин, как обычно, сидели притаившись за колоннами по разные стороны от входа в Hotel d'Olande, их взорам представилось долгожданное зрелище: двери отеля с грохотом распахнулись и, сшибая все на своем пути, как пушечное ядро, громко бранясь на трех языках, в расстегнутом пальто, в цилиндре набекрень, на улицу вылетел Дягилев. «Наконец-то поскандалили голубки, — решили оба преследователя, — вот и славно!» Они, впрочем, не угадали: Дягилев поругался на сей раз вовсе не с Нижинским, а с Шаляпиным, который раздражал его своим храпом, — но это не суть важно. Было темно, лишь газовые фонари освещали безлюдные улицы; Дягилев мчался не останавливаясь, продолжая злобно сопеть и ворчать себе под нос, и размахивал палкой с набалдашником — очень тяжелой на вид — так энергично, что ни один из преследователей никак не решался догнать его.</p><p class="p">Однако постепенно свежий ночной воздух и грустный аромат цветущих каштанов успокоили Сергея Павловича — он был вспыльчив, но отходчив, — и он несколько замедлил бег, перейдя на рысцу, а потом и вовсе на неспешный прогулочный шаг. Всякий человек чего-нибудь да боится, но никто не боится всего сразу: Дягилев, всю жизнь трепетавший перед малейшей простудой, приходивший в панический ужас от несварения желудка, ничуть не опасался разгуливать по ночным улицам в совершенном одиночестве. Он был уверен, что, если даже какие-нибудь апаши нападут на него, он сумеет от них отделаться с помощью безукоризненных манер или, на худой конец, увесистых кулаков. Ему только было неловко показаться смешным — вдруг кто-нибудь наблюдал, как он бежит и с идиотским видом машет палкою, — и он оглянулся по сторонам. Каково же было его бешенство, когда он обнаружил, что за ним по-прежнему, как и при свете дня, черными тенями влачатся подосланные кредиторами агенты! Еще не вполне остывшая ярость вновь ударила ему в голову; он развернулся так резко, что «слепой» налетел на него, и, схватив мнимого калеку за воротник, начал трясти его и кричать:</p><p class="p">— Оставьте меня в покое! Lassez-moi! Не смейте ходить за мной!</p><p class="p">— Que désire monsieur?..</p><p class="p">— Merde! Пшел вон, с-скотина! Голову проломлю! </p><p class="p">«Слепой», слабо пытаясь отбиваться — атака со стороны дичи была так стремительна и неожиданна, что охотник не мог даже вытащить скальпель, — что-то нелепо бормотал в свое оправдание... Очки с него слетели, усы и борода отклеились, парик сбился на сторону; Дягилев на мгновение чуть отстранил свою жертву от себя, собираясь нанести сокрушительный удар кулаком в глаз, и вдруг — схватка происходила под самым фонарем — с изумлением узнал в своем назойливом преследователе того премерзкого субъекта, что на ужине у герцогини де Грамон осмелился приставать к его молодому другу! И шпионил он все эти дни за Сергеем Павловичем для того, чтобы узнать, в какие часы тот разлучается с Вацлавом! А матрос — его сообщник! Знаем мы этих матросов и их гадкие нравы! Бешенство Дягилева достигло апогея; он повалил негодяя наземь и принялся избивать его, рыча как зверь...</p><p class="p">Ленин, с началом потасовки фазу же укрывшийся за деревом неподалеку — вопреки предварительному намерению, всякое желание ввязываться в драку у него пропало, когда он услышал, как кряхтит Дзержинский под тяжкими ударами, — в замешательстве наблюдал эту сцену: когда парик и борода свалились, он тоже узнал Дзержинского. «Мало того что Железный Феликс за маленьким танцором ухлестывает, он еще и за этим бугаем таскается! А мне Зиновьев объяснял, что у них вкусы более определенные... Ну да чорт их разберет... А почему же тогда Дягилев колотит его? Хотя, наверное, у них так принято... Зиновьев с Каменевым тоже как-то подрались и морды друг другу в кровь разнесли, а когда я спросил, что случилось, они сказали, что все в порядке, и ушли вместе пить пиво... Насколько все-таки с женщиною проще и безопасней! Максимум, что она может, — рожу расцарапать... Хотя была у меня одна цирковая штангистка... Однако как зверски он его мутузит! Если б за мною повсюду бегала какая-нибудь дамочка — разве б я стал лупить ее по мордасам? А у этих все шиворот-навыворот. Надо будет спросить у Гриши, что это означает...»</p><p class="p">Наблюдая за избиением, Владимир Ильич решил, что вынудить Дягилева расстаться с кольцом возможно все-таки лишь в бане, и уже начал обдумывать, как привести этот план в исполнение; но секундой спустя изворачивавшийся как уж, хрипевший, задыхающийся Дзержинский исхитрился укусить своего противника за палец... Вскрикнув от боли, Дягилев выпустил его и отчаянно затряс рукою; он тряс так сильно, что все перстни свалились и, звеня и подпрыгивая, покатились по асфальту... Ленин кинулся за ними вдогонку и успел наступить ногой на толстое, грубое кольцо прежде, чем оно докатилось до канализационной решетки. Дрожащими руками он подобрал его...</p><p class="p">Одного беглого взгляда на надпись — дурацкие латинские вензеля под целующимися голубками — было достаточно, чтобы понять: он поставил не на тот номер. С поклоном вернуть фальшивую bijou владельцу? А, к чорту эти буржуазные реверансы! Он отшвырнул кольцо и, насвистывая, засунув руки в карманы, развалистой моряцкой походкою зашагал прочь. «Адресочек брюнеточки-то я, слава богу, записал». Он был не из тех, кто унывает долго. «А ежели б я сделался царем — забыл бы про нее, как пить дать, забыл... Да и Надежда моя еще слишком неотесанна для царицы. И Михаил не чешется. Да, что ни делается — все к лучшему».</p><p class="p">А Дягилев все еще тряс окровавленной рукой и морщился: весь гнев его иссяк, едва он подумал о возможном заражении крови. Сепсис! Гангрена! О-о! А вдруг этот человек бешеный?! Желудок его мучительно сжался, к глазам подступили слезы; он уже видел в черной рамке свой некролог... Охваченный ужасом, он опрометью бросился прочь; он вовсе не подумал о своих кольцах и более не обращал внимания на Дзержинского. А тот, слабо постанывая, поднялся на ноги и, шатаясь, полузадушенный, полуослепленный, побрел по направлению к тому месту, куда — по счастью, он видел это, — дурак матрос бросил кольцо, по-видимому сочтя его недостаточно ценным.</p><p class="p">«Неудача... Судьба испытывает меня... Что ж!» Кольцо представляло собою зауряднейшую, только что не детскую безделушку, таскать которую на пальце можно было только из глупой детской сантиментальности. Он побрел прочь. Все тело его болело от побоев, из носа сочилась кровь, глаз заплыл. Но он привык мужественно переносить страдания.</p><p class="empty-line"/><p class="p">— Ильич, ты опять не ночевал дома... Исхудал-то как...</p><p class="p">Надежда Константиновна не смела спрашивать мужа о причинах его постоянных отлучек, но переживала глубоко и мучительно. Она все же надеялась, что похождения Ленина связаны с картами, бизнесом или революцией, а не с хищными французскими женщинами. Он усмехнулся, ласково потрепал ее по руке:</p><p class="p">— Все хорошо, ma chérie. Сейчас налей-ка мне щец... Проголодался я как собака. А завтра пойдем слушать Шаляпина.</p><p class="p">Весь день Ленин отсыпался, а вечером, наконец-то одевшись по-человечески, нанес визит m-me Арманд. Он принес огромный букет цветов, конфеты и галантнейшим образом просил прощенья. Но Инесса приняла его сухо: обида ее не прошла. Он удвоил старания — она только холодней становилась. Он был близок к отчаянию, чего с ним не случалось еще ни разу в жизни. Он мило шутил, рассказывал анекдоты, отпускал цветистые комплименты, читал стишки, но видел, что все напрасно. Вдруг она, перебив его на полуслове, спросила:</p><p class="p">— А почему у вас в ухе серьга?</p><p class="p">— А, это... — Он смутился; рука инстинктивно дернулась к мочке уха. «Забыл серьгу снять, идиот! Не иначе — втюрился». — Это, видите ли, chérie... Я... я был на корабле юнгой. То есть шкипером. Точнее, я был цыганом.</p><p class="p">— Как, неужели цыганом? — В изумлении Инесса широко распахнула свои темные глаза; тон ее заметно смягчился.</p><p class="p">— Да, то есть меня в детстве украли цыгане. И я жил в таборе. А потом поступил на корабль шкипером. У меня был любимый конь... («Чорт, совсем заврался: откуда на корабле может быть конь? А она знай слушает, развесила свои прелестные ушки... Романтическая натура! Дурочка моя ненаглядная...») Цыгане, ma petit, это такой поэтичный, гордый и свободолюбивый народ...</p><p class="p">— Ах, неужели?</p><p class="p">— Дорогая, у вас на ушке очаровательная родинка.</p><p class="p">— Скажите, monsieur Ленин...</p><p class="p">— Ильич, дорогая. Зовите меня просто — Ильич.</p><p class="p">— Monsieur Ильич, вы женаты?</p><p class="p">— Какое это имеет значение, друг мой? Что такое этот буржуазный брак без любви, с его буржуазными условностями?</p><p class="p">— Да, вы правы... Мимолетная связь лучше и чище, чем брак без любви.</p><p class="p">— Вы необыкновенная умница, chérie. — Ленину очень понравились слова Инессы о мимолетной связи. Он все еще рассчитывал именно на мимолетную. — Я найду вам революционную работу, как вы хотели.</p><p class="p">— Правда?</p><p class="p">— Правда. — Он решил, что так и назовет эту дурацкую газету, с изданием которой к нему уже давно приставал Дзержинский. — Ну, дайте же мне вашу милую маленькую ручку!..</p><p class="p">— Нет, нет... — Но она совсем не сопротивлялась.</p><p class="empty-line"/><p class="p">Почти столь же идиллически прошел вечер и у Феликса Эдмундовича. Он провел его с премиленькой двенадцатилетней проституткой (на самом деле ей было 23 года, но она благоразумно скрыла это от привередливого клиента). Она была умна и очень старалась. Наслаждение было необыкновенно острым. Пускать в ход скальпель не было никакой причины. Феликс Эдмундович был строг, но справедлив. Он дал ей много денег, очень много, и отослал с ласковыми словами. Что же касается разочарования, связанного с кольцом, он довольно легко снес его, ибо, как и Ленин, не очень хорошо представлял, что с ним делать, покуда разгильдяй Михаил не усядется на трон, и еще не до конца продумал, как его туда усадить.</p><p class="p">Вернувшись домой, он принял ванну. Пора было идти на конспиративную встречу с танцором. «Надеюсь, этот болван хотя бы не перепутает время и место свидания...» Встреча была назначена в маленьком кафе на бульваре Распай. Против обыкновения, агент ничего не спутал и явился на нее вовремя. В этот ранний час в крохотном полутемном зальчике никого не было, кроме них двоих.</p><p class="p">— Bon matinee, camarade Нижинский, — сказал Феликс Эдмундович сухо, но приветливо.</p><p class="p">— Bon matinee, camarade Глинский, — отвечал агент. — Camarade, я знаю, я ужасно провинился... Но я исправлюсь, честное слово! Я вчера целый день репетировал азбуку Морзе, хотя Фокин и ругал меня, что я все не так делаю. Меня всегда все ругают. Сергей Павлович тоже сердится на меня уже несколько дней — я не понимаю, за что. Все, все ругают. Один Федор Иванович всегда со мною ласков, но он так храпит... Camarade Глинский, я все сделаю, как вы велите. Я так надеюсь, что наша дорогая Польша будет свободна и счастлива...</p><p class="p">— Скажите, camarade... Что вы собираетесь делать после освобождения Польши?</p><p class="p">— Я? Не знаю, право... Я поставлю балет...</p><p class="p">«И для чего живут на свете такие дураки? — думал Дзержинский, снисходительно слушая бессмысленный лепет агента. — Ладно, к чорту, это все чепуха! Надо повидаться с Лениным и заставить этого олуха заниматься газетой, а не играть с Зиновьевым в карты. Зиновьева тоже в тюрьму... Ну и Ленина, само собой... И Горького, и шлюху Андрееву... Пусть они все там играют во что хотят. А Дягилева я, когда приду к власти, велю каждый день избивать палкой».</p><p class="p">Как опытный конспиратор, Дзержинский всегда выбирал столик и место за ним так, чтобы оттуда, во-первых, хорошо просматривались дверь и окна, а во-вторых, можно было быстро убежать. Но на этот раз он, разнеженный после удачного общения с умной и услужливой девушкой, не подумал о предосторожностях. Он не был даже вооружен; будучи уверен, что Дягилев накануне набросился на него просто из беспричинной злобы, он ничуть его не опасался и не предполагал, что тот имеет основания выслеживать своего приятеля. Через окошко он увидел, конечно, подлетающую к дверям огромную фигуру в цилиндре и с палкою, но было уже поздно...</p><p class="p">Ненависть распирала Дягилева так, что он едва не лопался. Каков наглец! Одной трепки ему мало! Скотина! И эти усики! Вацлава по лицу не бить... Но уж этого надо отделать так, чтобы он надолго забыл дорогу в приличное общество!</p><p class="p">— А-а-а-а!!! — заревел он, врываясь в залу и с грохотом опрокидывая столик...</p><p class="p">В постели Феликс Эдмундович провел почти месяц. Впрочем, он отделался сравнительно дешево: Нижинский, увидав разъяренного Дягилева, попросту сошел с ума и никогда уже не оправился вполне. «К чорту всех этих агентов, — думал Феликс, скучая в госпитале святой Женевьевы. — Да и все эти кольца... Глупости. Будем делать революцию. Прежде всего газета».</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">Как ни странно, Ленин думал о том же самом. Биржевая удача переменчива, а Инесса оказалась ненасытна. Делать деньги можно на чем угодно, была бы сметка, — но хотелось чего-то постоянного. Коба с Тер-Петросяном попались на крупном эксе и уехали в сибирскую ссылку, в далекий Туруханск — от каторги обоих спасло слабоумие. В довершение неприятностей раскрыли швейцарскую рулетку — Красину пришлось стремительно бежать из Швейцарии и финансовые поступления прекратились окончательно. Временами Ленин подумывал уже о том, чтобы вернуться к наперсткам: «Хоть сейчас садись в Люксембургском саду да начинай шарик гонять!» К счастью, неплохо продавались Надины акварели — да много ли возьмешь за акварель?</p></span>
