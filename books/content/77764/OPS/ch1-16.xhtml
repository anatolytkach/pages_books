<span><p class="p">После часа подобных размышлений, когда теория всемирного заговора против него и России окончательно утвердилась в его мозгу, он поднялся с кровати; дрожь прошла по его телу, руки похолодели... Он глянул на себя в зеркало: на него глядел человек с выпученными от ужаса глазами и перекошенным ртом. Рыжеватые волосы вокруг лысины стояли дыбом, подобно нимбу... «Однако! Я похож на психа. Ежели человек проводит недели средь сумасшедших и докторов — его собственный рассудок вполне может пошатнуться. Никак не могло волшебное кольцо оказаться в этой дурацкой больнице, и шпионов никаких тут нет». И он решительно выкинул из головы банду темных и стал думать о красотке Маргарет. Она в последнее время прямо-таки преследовала Моторолли; это было обидно. И тут же он услыхал под окнами ее милый голос... Она опять болтала с итальянцем. «Да что ж такое! Она уже открыто предлагает себя, напрашивается на тайное свидание, а этот болван, интересующийся лишь наукой и техникой, отнекивается... А что, если...» Ленину пришла в голову одна авантюра — не очень-то порядочного свойства, но, говорят, в любви и на войне все средства хороши.</p><p class="p">Около полуночи, когда итальянец крепко спал, Ленин поднялся и тихо подошел к его кровати. Черная маска, как обычно, лежала на ночном столике. Ленин надел ее и завязал на затылке тесемочки. Входная дверь на ночь запиралась, и он вылез в сад через окно. Маргарет звала итальянца прийти в полночь к пруду, а он отказался; но, возможно, она будет ждать там, надеясь, что тот передумает.</p><p class="p">На берегу под кустами он заметил темную скрюченную фигуру. Это никак не могла быть Маргарет. Человек копал какую-то яму... Потом он вытащил оттуда что-то тяжелое — мешок! — и стал снова засыпать яму землей... Наконец он разогнулся, и луна осветила его одутловатое, корявое лицо. Это был санитар Шикльгрубер! Взвалив на себя мешок, он побежал к корпусу, где ночевали доктора. Ленин, прячась за деревьями, следил за ним. Шикльгрубер постучался в одно из окон, рама бесшумно распахнулась, наружу по пояс высунулся доктор Гортхауэр... Санитар замычал, бурно жестикулируя, и протянул доктору свою ношу; тот принял ее, и окно захлопнулось. Ленин хотел было проследить дальше за санитаром, но тот растворился в темноте. Тогда он кинулся к яме. Но там, у пруда, уже стояла, кутаясь в шаль, прекрасная Маргарет Зелле и ждала... Ленин подошел к ней и кашлянул. Она обернулась.</p><p class="p">— Наконец-то, сеньор Моторолли!</p><p class="p">— Я здесь, — сказал Ленин по-немецки, стараясь коверкать этот язык так, как это делал Моторолли.</p><p class="p">Он протянул руки и обнял Маргарет за талию. И вдруг почувствовал, что ему в бок упирается что-то холодное и твердое... револьвер!</p><p class="p">— Не двигайтесь и не вздумайте кричать, — прошипела голландка. — Вы в моих руках.</p><p class="p">Он дернулся, намереваясь выбить у нее оружие, — он знал, что женщины не способны стрелять сразу, без разглагольствований, — но сзади кто-то схватил его за локти. По мычанию и кислой вони Ленин понял, что это санитар Шикльгрубер. От Кобы всегда воняло точно так же.</p><p class="p">— Что вам нужно?! — спросил он у Маргарет.</p><p class="p">— Вы отлично знаете, что нам нужно. Отдайте мне чертежи мотороллы, и мы вас не тронем.</p><p class="p">— Чего-чего чертежи?!</p><p class="p">— Не притворяйтесь! Нам все известно. Или вы не позднее завтрашней ночи отдадите чертежи добровольно, или... пеняйте на себя.</p><p class="p">— Я... я подумаю, — сказал Ленин. — А этот ублюдок, стало быть, работает на вас?</p><p class="p">— Вы не должны так называть его. Это бедный юноша, переживший тяжелую психическую травму: в младенчестве он был разлучен со своим братом-близнецом и до сих пор не может прийти в себя... Так вы поняли? Даю вам на размышление одни сутки. — С этими словами Маргарет отодвинулась от него и, отступая медленно и не сводя с него револьверного дула, растаяла в кустах. Полоумный санитар выпустил его локти и тоже отступил, но не исчез, а остался стоять над ямой, ворча и скаля желтые зубы.</p><p class="p">«Все-таки шпионаж! Заговор! Джон был прав! Он только не допер, что мишенью этого заговора является мой бедный итальяшка! Но ведь... все изобретения Моторолли — вздор, чепуха, они противоречат науке! Одна сумасшедшая охотится за другим сумасшедшим? А что же было в мешке?!» Владимир Ильич быстрыми шагами пошел обратно, влез в свое окно, снял маску и улегся. Но сон не шел к нему. Рано утром он, не выдержав, разбудил соседа и, не дожидаясь, пока тот проморгается (сонного человека легче застать врасплох), спросил:</p><p class="p">— Что такое «моторолла»?</p><p class="p">— Это мое изобретение, — послушно отвечал итальянец.</p><p class="p">— Понятно, что ваше. Что оно делает?</p><p class="p">— Так вы... вы тоже из Них?! — Моторолли сел на постели и с ужасом уставился на Ленина.</p><p class="p">— Нет, нет. — Владимир Ильич похлопал его по плечу. — Я не шпион. Я друг.</p><p class="p">— Докажите!</p><p class="p">— Ведь «Они» — это австрийско-немецкая разведка? Да? Они охотятся за вашим изобретением. А я русский. Россия и Италия — союзники. Я против них, следовательно, за вас.</p><p class="p">Успокоенный этим объяснением, итальянец стал объяснять Ленину суть своего изобретения. Ленин только руками разводил, слушая его. «Что за бред! Но если немцы и вправду хотят получить чертежи — стало быть, что-то в этом есть...» Насколько понял Владимир Ильич, моторолла представляла собой телефонный аппарат, но такой, которому не нужны провода, так что каждый генерал, офицер и даже солдат мог бы повсюду возить его за собой на небольшой тележке. Такая штука, конечно, могла бы очень сильно пригодиться на войне. Но разве она возможна? Хотя... существует же радио! «Кржижановского бы сюда, — беспомощно думал Владимир Ильич, — тот бы разобрался». Больше всего его потрясло то, что моторолла, по словам изобретателя, может извещать своего обладателя о том, что кто-то желает с ним говорить, не противным «др-р-р-р», как обычный телефон, а любой музыкой по желанию владельца!</p><p class="p">— И «Вдоль по Питерской» может играть? И «Боже, царя храни»? — спрашивал он недоверчиво.</p><p class="p">— Все, что пожелаете, — важно отвечал итальянец. — Хоть «Интернационал».</p><p class="p">«Знают, черти», — с гордостью подумал Ленин. Ему льстила популярность любимой компании.</p><p class="p">— Вы должны передать чертеж этой мотороллы нам — русским или, на худой конец, англичанам, — сказал Ленин.</p><p class="p">— Я не хочу, чтобы мои изобретения служили войне, — ответил Моторолли.</p><p class="p">— В таком случае вам следовало бы поменьше болтать о них, — резонно заметил Владимир Ильич. — Но так и быть, сеньор Моторолли, я готов вам помочь спрятать ваши чертежи. Лишь бы они австрийцам не достались.</p><p class="p">— Вы уже мне помогли! — сказал Моторолли и дико захохотал.</p><p class="p">«Он совершенно безумен. Кругом одни психи», — подумал Ленин и в растрепанных чувствах отправился на завтрак. За столом Маргарет Зелле приветливо ему улыбнулась, и он кое-как выдавил фальшивую улыбку ей в ответ. «Здесь становится опасно, — думал он, — надо убираться поскорее». После завтрака он отозвал в сторонку английского лейтенанта и сказал ему, что они должны сегодня же разобраться с кольцом д-ра Гортхауэра. Англичанин несказанно обрадовался этому предложению, но предупредил, что реализовать задуманное будет не так-то легко: он-де уже не раз, используя свой статус сумасшедшего, хватал доктора за руки и просил «посмотреть колечко», но тот отказывал, как отказывают капризному ребенку. Владимир Ильич усмехнулся про себя и запустил пальцы в жилетный кармашек, ощупывая три наперсточка и маленький резной шарик...</p><p class="p">— Доктор, хотите, я покажу вам фокус? — С такими словами на немецком языке, сопровождаемыми бессмысленной, но дружелюбной улыбкой, он снял бумажную шляпу и заступил дорогу д-ру Гортхауэру. Однако тот покачал головой и сказал, что не интересуется фокусами. Ленин, продолжая улыбаться, вынул руку из кармашка и продемонстрировал австрийцу наперсточки и шарик. — Ну тогда сыграйте со мной в нашу национальную русскую игру, доктор, дружище! Ставлю франк, что вы нипочем не угадаете, где шарик!</p><p class="p">— Я не играю в азартные игры, — сухо отвечал тот. — Тем более с чужими больными. Вас, насколько я знаю, курирует мой шеф профессор Плейшнер. Ему и предложите.</p><p class="p">— Пожалуйста, доктор, сыграем! Если вы откажетесь, я буду плакать. — Ленин сморщил лицо и жалобно замигал глазами. «Какой великий артист во мне пропадает! — самодовольно думал он. — Мочалов и Качалов ничто в сравнении со мной!»</p><p class="p">— Ну хорошо, хорошо. — Д-р Гортхауэр досадливо нахмурил красивые брови. — Значит, с вас франк. А ежели я не угадаю?</p><p class="p">— Колечко хочу. — Ленин потупился, как юная девица, и застенчивым жестом показал на руку доктора.</p><p class="p">К его удивлению, австриец согласился. Они присели на лавочку. Владимир Ильич закатал рукава рубашки и начал проворно сучить руками, гоняя шарик и приговаривая «Кручу-верчу, обмануть хочу!» Наконец он остановил мельтешение наперсточков. Шарик находился под левым.</p><p class="p">— Вот, — сказал д-р Гортхауэр и показал на левый наперсток.</p><p class="p">Ленин сделал круглые глаза и приподнял наперсток над поверхностью скамьи, осторожно прижимая шарик к его внутренней поверхности. Иногда лохи угадывали правильно — от наблюдательности или просто случайно, — но, убедившись, что под выбранным наперстком ничего нет, вздыхали и расплачивались. Австрийский доктор, однако, вздыхать не стал, а сказал спокойно:</p><p class="p">— Шарик там. Вы его держите пальцем. — И ловко схватил Ленина за запястье, не давая ему проделать еще какую-нибудь профессиональную манипуляцию.</p><p class="p">Изумленный Владимир Ильич был вынужден признать поражение. Но у него имелись запасные планы, и он решил пустить в ход один из них. Вместо того чтобы расплатиться франком, он сказал д-ру Гортхауэру:</p><p class="p">— Вы страсть какой умный. Вы меня побили, и за это я хочу вам сделать подарок.</p><p class="p">— Какой? — без особого интереса осведомился психиатр.</p><p class="p">— Коньяк. Настоящий французский. — Всякий раз, когда Крупская или Зиновьев навещали Владимира Ильича в больнице, они приносили под подолом или за пазухой бутылку коньяку, и больной заново наполнял плоскую фляжечку, с которой, как и с наперстками, никогда не расставался. </p><p class="p">— Гм...</p><p class="p">Д-р Гортхауэр быстро оглянулся по сторонам (сухой закон в клинике Бургхельцли распространялся не только на больных, но и на персонал) и, убедившись, что свидетелей нет, кивнул согласно. Владимир Ильич тоже повертел головой, осторожно извлек из-за пояса брюк заветную фляжку и передал ее доктору. Затем, обменявшись сдержанными заговорщическими улыбками, они расстались. Ленин улыбался про себя. В коньяке были растворены снотворные таблетки, которые он копил много недель. Оставалось только ждать ночи, о чем он и сказал английскому лейтенанту.</p><p class="p">В течение дня Ленин раз двадцать пытался поговорить с Моторолли и упросить его передать русским чертеж чудесного телефона. Но безумный изобретатель только истерически смеялся и бормотал что-то бессмысленное. «Ну и пропадай, коли так! — с досадой подумал Ленин. — Ей-богу, я сделал все, что мог. Не могу же я отнимать чертеж силой и угрозами, как эти австрийские шпионы. Да я и не знаю, как этот чертеж выглядит. Итальяшка мне подсунет вместо телефона какую-нибудь бесполезную банку-матку».</p><p class="p">Наступила полночь... Моторолли был все еще жив и невредим и спокойно спал на своей кровати. Ленин подумал, что, быть может, угроза Маргарет Зелле была пустым вздором и никто не собирается причинять итальянцу вреда. Ведь в сумасшедшем доме никакие слова нельзя принимать за чистую монету... Он аккуратно, бесшумно оделся и вылез в окно. Англичанин уже ждал его в саду. Они пошли к корпусу, где жил д-р Гортхауэр. Окна доктора были темны. Ленин подсадил Джона, и тот, перевалившись через подоконник, сообщил, что из спальни слышится легкое похрапывание. Тогда Ленин тоже влез внутрь. Несколько секунд они стояли, дожидаясь, пока глаза привыкнут к темноте; потом отворили дверь в спальню.</p><p class="p">Удача! Красавчик доктор, полураздетый, в одном ботинке, лежал навзничь на постели и крепко спал. Рука с кольцом безвольно свешивалась с кровати. Пустая фляжка валялась на полу. Осторожными, бережными движениями Ленин стянул с пальца доктора кольцо; англичанин, приплясывая от нетерпения, потянулся к нему... Но Владимир Ильич отвел свою руку за спину и шепнул — от волнения почему-то по-итальянски:</p><p class="p">— Uno momento...</p><p class="p">Он кинулся из спальни обратно в гостиную (не забыв, впрочем, прихватить свою фляжку); недоумевающий англичанин бежал за ним. Ленин поднес кольцо к раскрытому окну и в бледном свете луны, проглядывающей сквозь рваные тучи, глянул на него... Никакой надписи на внутренней стороне не было. «Значит, волшебное колечко лежит себе, где положено — в Петербурге!» Он подавил вздох — то ли облегчения, то ли разочарования — и отдал кольцо английскому лейтенанту. Тот схватил его трясущимися руками и, не говоря ни слова, перемахнул через подоконник...</p><p class="p">Луна выплыла из-за туч и ярко осветила комнату. Владимир Ильич из праздного любопытства осмотрелся вокруг себя; взгляд его упал на лежащий под столом мешок. Он нагнулся и тронул его: в мешке что-то звякнуло... Он ощупал его весь: бутылки, бутылки, бутылки... Одна из них выпала и откатилась в угол. Шнапс — вот что прятал в саду, вот что носил к доктору в мешках полоумный Шикльгрубер! «И вся тайна-то!» Ленин выбрался через окно наружу и, насвистывая, неторопливо пошел к своему корпусу. Он был спокоен. Но, подходя к окнам своей комнаты, он услышал доносящиеся оттуда звуки: сдавленное мычание, женский голос, шум борьбы... «Убивают моего итальяшку!» Не раздумывая, он перескочил подоконник и ввалился в комнату. Моторолли извивался на кровати, хрипел и бился, пытаясь вырваться из рук санитара Шикльгрубера, который сидел у него на груди и душил подушкой; Маргарет Зелле держала несчастного за ноги... Ленин бросился в гущу схватки; он за шкирку оторвал Шиклырубера от итальянца и швырнул его на пол, но тут раздался выстрел... Тело Моторолли дернулось в конвульсии, вытянулось и застыло. А Маргарет уже направила свой револьвер на Ленина... С минуту она стояла и держала его на прицеле, потом по ее красивому лицу пробежала тень, и она сказала:</p><p class="p">— Убирайтесь вон. Не возвращайтесь до завтрака. Молчите, если хотите жить, и не пытайтесь покинуть клинику: у нас длинные руки.</p><p class="p">Ленин молча пошел к двери. Вслед ему полетели его пиджак и бумажная шляпа... Он понимал, что весь остаток ночи Маргарет Зелле будет заниматься обыском: упрямый итальянец не захотел добровольно отдать свою мотороллу. «Как жалко его! И я дурак! Надо было не клянчить у него чертеж, а хватать его самого в охапку и вместе бежать отсюда! Но что же теперь делать?! У них ведь длинные руки... Кому сказать о них? Профессор Плейшнер уехал в Вену на собрание фрейдистов... Доктор Гортхауэр пьян мертвецки... Остальной персонал — кто их знает, может, тут все шпионы и заговорщики... Надо посоветоваться с Джоном, больше-то не с кем...» Он подошел к двери англичанина, постучался и вошел. Тот расхаживал по комнате с довольным видом и время от времени высоко подпрыгивал, не в силах сдержать свою радость.</p><p class="p">— Где ваше «кольцо всевластия», Джон?</p><p class="p">— Я топить его ватерклозет, — гордо отвечал англичанин. — Теперь Гортхауэр лишился своей силы. Темные разбиты, Мордор побежден!</p><p class="p">Ленин не стал говорить ему, что д-р Гортхауэр — просто безобидный алкоголик, а истинные силы зла вовсе не побеждены, а только что совершили убийство и торжествуют. Он уже пожалел, что пришел к этому безумцу. «Чем он может помочь?» Ленин сел на стул и стал нервно вертеть в руках свою шляпу. Это было единственное, что осталось ему на память от Моторолли... Снаружи шляпа была белая, но внутренняя сторона ее была вся исчерчена карандашом и исписана какими-то пометками. Он машинально разглядывал эти надписи, на которые никогда не обращал внимания, и вдруг ахнул... Средь прочих пометок он прочел слово «motorolla». Он поспешно стал развертывать шляпу и разбирать ее на листы, как капустный кочан; то, без сомнения, были чертежи! Так вот что означали слова итальянца «Вы мне уже помогли», сказанные, когда Владимир Ильич предложил ему помочь спасти и спрятать чертеж! Вот она — чудесная моторолла! А значит — нужно во что бы то ни стало бежать! Ехать к своим, в Ставку! Передать изобретение в русский генштаб! Вот он — подвиг, коего так жаждала душа!</p><p class="p">— Джон, умоляю, перестаньте прыгать! Помогите мне!</p><p class="empty-line"/><p class="p">После завтрака больные и персонал могли наблюдать следующую картину: сумасшедший англичанин и сумасшедший русский, положив на полено длинную доску, по очереди становились на один конец ее, а тот, кто не стоял на доске, разбегался и прыгал на другой конец, заставляя партнера взлетать высоко в воздух. По-видимому, это была какая-то английская или русская народная игра. Они скакали так долго, что всем надоело на них смотреть; и никто не обратил внимания на то, что постепенно игроки перетаскивают свое чудное сооружение все ближе и ближе к высокому железному забору, ограждавшему клинику. А вскоре начал накрапывать дождь, и зрителей вообще не стало...</p><p class="empty-line"/><p class="p">«Уф-ф! — подумал Владимир Ильич, после очередного прыжка наконец оказавшийся по ту сторону ограды. Он благодарно помахал английскому другу и теперь быстрым шагом удалялся от клиники. — Я на свободе, чертеж со мной! Самое страшное позади!»</p><p class="p">— Halt! Hende höh! — грозным голосом произнес кто-то позади него.</p><p class="p">Ленин стремительно обернулся и увидел своего старинного знакомца — Баумана... Тот смотрел на него отнюдь не дружелюбно и в руке держал револьвер.</p><p class="p">— Ох, товарищ Бауман, напугали... — проговорил Ленин, держась за сердце.</p><p class="p">— Сожалею, но я вам больше не товарищ, — отвечал тот. — Идет война; мы оказались по разные стороны фронта. Я патриот своей страны, как и вы. А сейчас я верну вас в клинику, из которой вы убежали.</p><p class="p">— Но почему...</p><p class="p">— Не будем лицемерить, герр Ленин. Я — резидент, а фройляйн Маргарет Зелле — мой агент. Чертеж мотороллы так и не был найден; мы полагаем, что изобретатель передал его вам.</p><p class="p">— Слушайте, товарищ Бауман, или герр Мирбах, или как вас там... — с горьким укором произнес Ленин. — Я спас вам жизнь, а вы... так-то вы платите за добро! Или у немцев так принято?</p><p class="p">Бауман-Мирбах не мог снести этого упрека; он опустил револьвер и стоял молча, не глядя Ленину в глаза. На лице его отражалась сильнейшая душевная борьба. Потом он проворчал сквозь зубы:</p><p class="p">— Хорошо. Я исполню долг благодарности. Идите! С этой минуты мы в расчете.</p><p class="p">— Спасибочки, почтеннейший, — спокойно ответил Ленин и удалился, поклонившись на прощание и не забыв учтивым жестом приподнять драгоценную шляпу.</p><p class="p">— Ишь чего удумал, — шептал он сквозь зубы. — В клинику верну... не товарищ... Кишка у тебя тонкая, психоаналитик! На кого попер? — на наследника русского престола! Нет уж, любезный, не для тебя цвету. Ленин жил, Ленин жив, Ленин будет жить.</p><p class="empty-line"/><p class="p">Тридцатого августа, после долгих мытарств он, снабженный наилучшими фальшивыми документами, тщательно загримированный, в пышных черных усах и бровях, фасон которых был слизан с красивого д-ра Гортхауэра, нелегально прибыл в Могилев, где в то время располагалась Ставка. Риск был огромный, ибо все большевики почему-то считались немецкими шпионами, но что такое опасность по сравнению с пользой, которую могла принести русской армии моторолла! Ленин желал передать чертеж лично в руки сводному дяде — Главковерху Николаю Николаевичу, добросовестному служаке, о котором слышал немало хорошего. Но, приехав в Могилев, он узнал, что неделю тому назад в результате дворцовых интриг Николай Николаевич был отстранен и отправлен на Кавказ, а верховным командующим стал сам император Николай.</p><p class="p">Общаться с братом — подкаблучником, бездарным правителем и столь же бездарным полководцем — у Владимира Ильича не было ни малейшего желания. (Он понимал, впрочем, что никто и не допустил бы его к Николаю.) Несколько дней он болтался среди офицеров и генералов, играя с ними в карты, и в конце концов с помощью взяток, замаскированных под проигрыш, ухитрился попасть на прием к нужному человеку — генерал-квартирмейстеру Николаю Михайловичу Потапову, возглавлявшему Главное управление Генштаба по разведке и контрразведке.</p><p class="p">— Кто вы такой? — спросил его Потапов, невысокий, хмурый, немолодой человек с пронзительным взглядом серых глаз.</p><p class="p">— Патриот, — скромно ответил Владимир Ильич. Но он не удержался, чтобы не прилгнуть чуть-чуть для красоты: — Я в рукопашной схватке отбил у австрийского резидента Мирбаха чертеж одного секретного изобретения.</p><p class="p">Он протянул генералу свою бумажную шляпу. Но тот шляпы не принял, а посмотрел подозрительно и спросил:</p><p class="p">— В рукопашной, говорите? Где это случилось?</p><p class="p">— В Цюрихе.</p><p class="p">— По моим сведениям, резидент Мирбах находится в Вене.</p><p class="p">— Да ведь там у них в Европе все рядом, — сказал Ленин.</p><p class="p">— Это верно, — согласился Потапов и вдруг прибавил: — Вена — гнусный город. Обитель зла.</p><p class="p">«Еще один безумец! — с испугом подумал Ленин. — Ну, если и этот сейчас начнет обзывать Вену Мордором и болтать об эльфах и кольцах всевластья...» Однако он испугался напрасно: Николай Михайлович был вполне здравомыслящий человек. Потапов согласился развернуть шляпу и поглядеть на чертеж, а Ленин на словах объяснил ему, что из себя представляет изобретение итальянца и для чего оно нужно. Потапов хмыкнул вроде бы одобрительно и даже пробормотал, что-де моторолла могла бы полностью решить проблему связи в войсках, но потом снова нахмурился и сказал:</p><p class="p">— Если б вы привезли вашу мотороллу на неделю раньше! С Николаем Николаевичем я легко находил общий язык. Но этот... — он сделал выразительную гримасу.</p><p class="p">— Неужто Николашка... миль пардон, государь император не заинтересуется мотороллой?!</p><p class="p">— Во-первых, он вообще ничем не интересуется, кроме своих семейных делишек и стрельбы по воронью. И, что еще хуже, он шагу не может ступить без одобрения ублюдка Распутина, а тот заявит, что моторолла — бесовское наваждение. Знаю я их. Нет, я, конечно, доложу командующему и сделаю все от меня зависящее...</p><p class="p">Он назначил Ленину повторную аудиенцию через три дня. Владимир Ильич ждал с нетерпением. Но когда он снова пришел к генерал-квартирмейстеру и увидел его угрюмое лицо, сердце у него упало.</p><p class="p">— Николай не захотел воспользоваться чертежами?!</p><p class="p">— Он ими уже воспользовался, — мрачно отвечал Потапов. — Только не так, как вы хотели.</p><p class="p">— Что, неужели...</p><p class="p">— Он сказал, что это все вздор и беспроводного телефона не может быть, потому что его не может быть никогда. Но ему очень понравилась бумага, на которой сделан чертеж. Он порвал его на кусочки и наделал из них пыжей, чтобы стрелять ворон. Бедная моя родина!</p><p class="p">«Бедная, бедная! Лучше б я отдал чертеж англичанам!» Ленин от горя не мог говорить; он молча достал из кармана фляжку и предложил генерал-квартирмейстеру выпить. Они выпили коньяку и долго ругали самодержавие. (Результатом этого разговора стало то, что в семнадцатом Потапов одним из первых царских генералов перешел на службу к большевикам; к сожалению, он попал под влияние Дзержинского, и дальнейшая его деятельность не делает ему чести.) Ленин же, чьи патриотические чувства были оскорблены, вернулся в Цюрих и весь остаток войны провел лежа на диване. Он сделал для своей страны все, что мог. Но родина не оценила его подвига.</p><p class="p">Один раз он собрался с духом и отправился в Бургхельцли, чтобы повидать друга Джона. Но ему сказали, что младший лейтенант уже выписался и убыл на родину. Он спросил о Маргарет Зелле, но и ее уже не было. И санитар Шикльгрубер больше там не служил. Об убийстве Моторолли никто не поминал ни словечком: по-видимому, фон Мирбах постарался замять это дело. Все это было ничуть не странно и вполне естественно. Удивило Ленина лишь одно: оказывается, вскоре после событий той памятной ночи д-р Гортхауэр стал стремительно слабеть здоровьем и терять рассудок, так что теперь находился в клинике уже в качестве пациента; он отказывался от еды и питья, целыми днями лежал, уставя свои черные глаза в потолок, и повторял одну и ту же фразу: «Моя прелесть, я должен вернуть мою прелесть». Да, это было странно, хотя... чего можно было ожидать от человека, который ежедневно литрами глушил шнапс?</p></span>
