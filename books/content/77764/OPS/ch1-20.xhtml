<span><p class="p">— А после пятой, — самозабвенно продолжал Ленин, — неплохо и бабецкого за попецкого! Так сказать, Машку за ляжку! Я не знаю, как вы, товарищи, но я предпочитаю мясистость. Мясистость! В свое время, товарищи, у меня была одна такая, что я, товарищи, просто еле уносил ноги! Особенно, бывало, когда она сверху...</p><p class="p">— Крой угнетателей! — заверещал молодой солдатик.</p><p class="p">— Еще! Еще, Ильич! — гулко требовали балтийцы.</p><p class="p">Ленин принялся рассказывать такое, что курсистки испуганно захихикали и избегали смотреть друг на друга. Остановить его было уже нельзя. Инесса комкала платок. Лицо Крупской было непроницаемо.</p><p class="p">— Грудь! — кричал Ленин. — Первое дело грудь! Я знаю, что сейчас идет дурная мода на худобу. С презрением отвергаем, товарищи! И еще я люблю...</p><p class="p">Он перечислил, что именно он любит, и восторженная толпа подхватила его на руки. Кувыркаясь над толпой, Ленин пытался еще что-то говорить, но рев солдатской массы заглушал его картавый говорок. Женщины с визгом устремились следом.</p><p class="p">— Куда они его тащат? — спросил Богданов.</p><p class="p">— Понятия не имею, — сухо ответил Дзержинский. — Вероятно, ужинать. Пойдемте и мы попьем чайку, товарищи.</p><p class="empty-line"/><p class="p">— Ильич, вы делаете успехи, — сказал Дзержинский. Лицо его было довольно кислое. — Вы — прирожденный трибун...</p><p class="p">— Да, зажигаю помаленьку, — скромно, но гордо ответил Ленин.</p><p class="p">Популярность его росла как снежный ком; ни один митинг, ни одна вечеринка в Петрограде уж без него не обходились. Он был нарасхват; он сорвал голос, охрип, но чувствовал себя счастливым. Среди революционных ораторов ему не было равных: в самом деле, разве мог с ним сравниться, к примеру, Анатоль Луначарский со своей зеленой гвоздичкой и бестолковыми стишками или даже милый Глебушка Кржижановский, всякую речь сводивший на объяснение того, что такое электрический ток? Лишь один достойный соперник был у него — Шурочка Коллонтай; но тут следовало сделать скидку на то, что, выступая перед солдатами и матросами, Владимир Ильич не раздевался, во всяком случае, до такой степени, а извиваться вкруг шеста ему не позволяла комплекция. Ходили еще, правда, средь народа слухи о том, что есть такой Троцкий — дюжий детина с огненным взором, одной левою рукой гнущий подковы и умеющий произносить речи стоя на голове; но Владимир Ильич лишь досадливо пожимал плечами, когда толпа умоляла его продемонстрировать подобные трюки: он не желал соревноваться с химерой.</p><p class="p">Поглощенный успехом, он даже не замечал, что Железный завидует и ревнует, и был настроен по отношению к нему вполне дружелюбно: ему с каждым хотелось поделиться своим счастьем. Он приветливо улыбнулся Дзержинскому и пододвинул к нему плетеную корзиночку с булками, предложив угощаться.</p><p class="p">— Благодарю, — сказал Дзержинский, но булки не взял.</p><p class="p">Они встретились в чайной гостиной Матильды Кшесинской, чей особняк был приспособлен под штаб-квартиру большевицкой партии. Феликса Эдмундовича бесконечно раздражало то обстоятельство, что этой прекрасной и удобной штаб-квартирой они были всецело обязаны Ленину: когда сам Дзержинский явился к своей бывшей агентэссе (Матильда уже года три как не работала на него, отговариваясь занятостью) и потребовал предоставить особняк для совещаний и заседаний, балерина в ответ разразилась тирадой злобных польских ругательств: однако стоило появиться рыжему болвану и, умильно улыбаясь, похлопать ее по плечу и назвать Малечкой и милочкой, как та вмиг растаяла и согласилась, чтобы «Володя и его друзья» немножко пожили в ее доме, взяв, впрочем, с Ленина обещание проследить за тем, чтоб «друзья» не плевали на пол и не тыкали окурки в цветочные горшки; и теперь рыжий вел себя здесь как хозяин,</p><p class="p">— Да вы не стесняйтесь, Эдмундович, кушайте!</p><p class="p">«Ежели плебсу пришлись по душе гастрономические изыскания и пошлые анекдотцы этого болвана — грех не использовать это», — подумал Дзержинский. Он отщипнул от булки маленький кусочек и, кроша его в пальцах, медленно проговорил:</p><p class="p">— Что ж, продолжайте в том же духе. Мы должны взбудоражить общественность, как можно скорее свалить Временное правительство и взять власть в свои руки. Я намерен осуществить переворот и захватить Зимний нынче летом.</p><p class="p">— Так-таки переворот? — спросил Ленин. Он все-таки предпочел бы взойти на трон мирно, да и жена, попавшая под влияние Каменева с Зиновьевым, ему все уши дома прожужжала своими «парламентскими методами ведения борьбы». — Вы полагаете, батенька, что Керенский не согласится взять нас в свое правительство?</p><p class="p">— Только переворот, — твердо ответил Феликс Эдмундович. У него были свои планы относительно того, как поступить с негодяем Керенским.</p><p class="p">— Ну хорошо, а что потом?</p><p class="p">— Вы же знаете нашу Программу. Диктатура пролетариата, всеобщее счастие...</p><p class="p">— И как вы себе представляете всеобщее счастие? — поинтересовался Ленин.</p><p class="p">— Счастие народа в дисциплине, порядке и беспрекословном подчинении, — твердо ответил Дзержинский, — а счастие правителя в том, чтобы этим чаяниям народа соответствовать... Вы согласны со мной?</p><p class="p">Владимир Ильич, которому всеобщее счастие рисовалось в виде огромной, круглосуточно действующей биржи, сверкающих кинозалов, рулетки, фейерверка и бесплатных пряников, почел за лучшее молча киснуть. «Прохвост никогда не проговорится, зачем ему нужна революция, — думал он, — напрасно стараюсь... Ну да ничего, как только мы возьмем Зимний — я заполучу волшебное кольцо, объявлю себя императором и буду делать все, что захочу! Вот этакие булки — ежедневно, и с маслом! М-да... Хорошо, я буду царствовать, а потом? Наследника-то у меня нет. Развестись с Надей — можно, да на ком жениться? Инесса уж тоже не молоденькая. Наложницу взять, конечно, придется... Наследник, наследник... — Он с легкой грустью подумал о племяннике. — Бедный парнишка — ни побегать, ни поиграть...» А ведь именно этому мальчугану он был обязан тем, что знал теперь местонахождение волшебного кольца...</p><p class="p">«Алешке теперь тринадцать лет... А здоровье его, говорят, все так же скверно. И гнида Распутин ни черта не помогал, а только голову дурил Алисе... Как взойду на престол — первым указом велю их из-под ареста выпустить... А куда их девать дальше? Видеть этих дураков при дворе я не желаю. Алиса опять пойдет интриговать... Нет, я их отошлю. Но, конечно, не в Сибирь — чай, родная кровь! — а куда-нибудь в Европу или лучше в Австралию. Да пусть едут куда хотят. А Алешку я бы при себе оставил. Хотя он, конечно, не захочет разлуки с отцом и матерью... Ну да как-нибудь устроимся. Не обижу. Вот только самому бы в тюрьму не угодить!»</p><p class="p">— О чем вы задумались, Ильич? — осведомился Дзержинский с кошачьей вкрадчивостью.</p><p class="p">— О диктатуре пролетариата, — сказал Ленин, моргая простодушно.</p><p class="empty-line"/><p class="subtitle">4</p><p class="p">Июльская попытка переворота с треском провалилась. Виноват в этом был исключительно Дзержинский, который слишком рано приказал выдать солдатам и матросам кокаин; в результате толпы ошалевших и забалдевших людей неорганизованно слонялись по улицам Петрограда и беспорядочно стреляли в воздух; повсюду народ грабил магазины и винные склады. Временное правительство ввело войска с фронта, те тоже захотели кокаину, и началась потасовка.</p><p class="p">Основной неуспех восстания, конечно же, списали на Троцкого. Но в общем все было скверно. Газеты осыпали большевизанов бранью и насмешками. 7 июля был издан правительственный приказ об аресте Ленина и многих его товарищей. Но о том, кто в действительности учинил все это бесстыдство, как обычно, не было упомянуто ни словом: Феликс Эдмундович всегда умел уходить от ответственности.</p><p class="p">— Что, Гриша, пойдем на суд? — храбрился Владимир Ильич. На душе у него было прескверно. Он не думал, что все будет так безобразно... «Может, ну ее к чорту, эту монархию? Я в этой Европе совершенно забыл, что такое Россия. Никакого порядка, и злые все какие-то... Может, в Европе революцийку забабахать? Там бы у меня получилось!» Он с тоской вспомнил о «1-м Интернационале». В России такой фортель, конечно, не прошел бы. Здешние, в отличие от европейцев, ничему не верили — впрочем, и опыт у них был соответствующий...</p><p class="p">— Теперь ты признаешь, что мы с Левой и Анатолем были правы? — торжествующе спросил Зиновьев. (Он вместе с Каменевым и Луначарским — такими же отъявленными трусами — всячески отговаривал своих товарищей от вооруженного выступления.) — А то — сапожник, сапожник...</p><p class="p">— Ну, признаю.</p><p class="p">— То-то же. Теперь ты слушайся меня, — с апломбом заговорил Зиновьев. — Ни в какой суд мы не пойдем. Лично я не желаю оказаться в камере, пойми!</p><p class="p">— Да понимаю, понимаю. Неужто ты думаешь, что кто-то хочет оказаться в камере?</p><p class="p">— От желающих отбою нет, — возразил Зиновьев. — Луначарский, например... Он надеется, что судебный процесс даст ему возможность прочесть принародно пару поэмок. А нам надо скрыться, перейти на нелегалку. Помнишь, ты как-то говорил про шалаш?</p><p class="p">— Какой еще шалаш?!</p><p class="p">— Есть у меня на примете один комфортабельный шалашик на берегу прелестного озера. Хозяин там — некто Емельянов, надежный человек и сдает недорого. Переоденемся пейзанами, будем вдвоем целыми днями стрелять ворон и играть в дурака.</p><p class="p">— Зачем же вдвоем? — живо возразил Владимир Ильич. «Пойдут пересуды, сплетни... И через сто лет непременно найдется какая-нибудь сволочь и напишет какие-нибудь пакости...» — Давай возьмем Надю и Леву.</p><p class="p">— С Левой я разругался: он с Луначарским и прочими дураками в тюрьму собирается. А Надя не даст ни поохотиться, ни поиграть спокойно...</p><p class="p">— Ладно, поедем, — сказал Ленин. Ему и в самом деле не хотелось видеть перед собой полные упрека глаза Крупской.</p><p class="p">И они поспешно принялись за тайные сборы; но накануне отъезда их подкараулил вездесущий Феликс Эдмундович и потребовал, чтобы на отдыхе Владимир Ильич, взяв за основу, разумеется, макиавеллиева «Государя», написал хороший, умный трактат о государстве. Дело в том, что Феликс Эдмундович намеревался немедленно после взошествия на престол издать собрание своих (т.е. преимущественно Крупской) сочинений. И он вручил Ленину толстенную тетрадь в синей обложке... Тот пытался сопротивляться, но Дзержинский с усмешкой поистине дьявольскою осведомился:</p><p class="p">— Вам угодно, господа, чтоб о вашем уединенном пребывании в райском шалашике ходили разговоры?</p><p class="p">Зиновьев скромно промолчал, а Владимир Ильич, насупившись, сказал:</p><p class="p">— Хорошо, почтеннейший. Напишу. Только ежели выйдет не то, что вы хотели, — пеняйте потом на себя...</p><p class="p">В первые дни пребывания в Разливе старые друзья, естественно, про книгу забыли думать: ночами напролет они резались в карты, а днем в крестьянской одежде, с косами на плечах выходили из шалаша гулять или же, удовлетворяя охотничью страсть, стреляли в лесу ворон и зайцев. Из-за этой страсти однажды с Зиновьевым даже случилось происшествие, которое могло бы иметь роковые последствия: бродя с ружьем, Гриша нарвался на лесника, придравшегося к нему за незаконную охоту в казенном лесу. Лесник уже намеревался отправить браконьера в местное лесничество для установления личности, когда Зиновьеву, весьма кстати вспомнившему о Сталине, пришла блестящая мысль притвориться глухонемым: на все вопросы лесника он отвечал мычанием и жестикуляцией, а подоспевший на выручку Емельянов объяснил леснику, что этот немой парень нанят им в косцы; лесник выругался и отпустил их... Короче, было весело. Однако чем ближе был срок возвращения к цивилизации, тем чаще Владимир Ильич вспоминал угрозу Железного. «Придется таки написать этот чортов трактат, — думал он, — но как?! Как это делается? Хоть бы Луначарский был где-нибудь под рукою... Угораздило ж его в тюрьму пойти...»</p><p class="p">— Григорий, что же нам делать? С чего начать?</p><p class="p">— С названия, — почесав в затылке и немного подумав, отвечал Зиновьев, — всякая книжка должна же как-нибудь называться... О чем бишь он велел написать? О государстве? Вот и назовем ее «Государство».</p><p class="p">— Это скучно, — сказал Владимир Ильич. Однако он вынужден был признать, что Гриша, которого все считали самым глупым после Сталина человеком в партии, не так уж и глуп.</p><p class="p">— Тогда «Государство и...» и что-нибудь. Вот как «Война и мир» или «Преступление и наказание». Ну, например, «Государство и балет» или «Государство и кулинария». Или «Государство и эрос».</p><p class="p">— А знаешь что, Гриша? Вот и пиши эту книгу. Даю тебе полный карт-бланш. А я уж потом пройдусь рукой мастера. — И, не дожидаясь возмущенных воплей Зиновьева, Владимир Ильич выскочил из шалаша и ушел в ближайшую деревню. Там были довольно симпатичные девки.</p><p class="p">Воротился он спустя сутки. Ему уже было совестно, что он свалил всю работу на товарища, и, чтобы задобрить Зиновьева, он нес ему в подарок бутыль первоклассного самогона и целый мешок деревенской снеди. Из шалашика не доносилось ни звука; несколько обеспокоенный Владимир Ильич заглянул внутрь и, к своему удивлению, увидал, что Зиновьев, весь перепачканный чернилами, сидит по-турецки на своем лежаке, застеленном кружевным покрывальцем, и что-то безостановочно пишет, пишет... По всему шалашу были раскиданы вырванные из синей тетради листы, покрытые убористыми каракулями. В ответ на робкое приветствие Ленина Зиновьев лишь рассеянно-сухо кивнул и продолжал строчить. «Ну вот и замечательно, — подумал Владимир Ильич, — пускай себе пишет. Глядишь, еще сделается литератором не хуже балды Луначарского». И, ступая на цыпочках, Ленин положил продукты на столик и вышел из шалаша. Он чувствовал себя таким виноватым, что даже хотел почистить Гришкины сапоги, но не нашел их, ибо бережливый Зиновьев всегда клал свои сапоги под подушку, из-за чего, собственно, Каменев и разругался с ним. И тогда Ленин снова ушел в деревню — уже на трое суток.</p><p class="empty-line"/><p class="p">— ...Гриша, что это?! Что ты натворил, болван?!</p><p class="p">— Это книга. Наш трактат, — гордо ответил Зиновьев.</p><p class="p">— Ну что ты пишешь в предисловии?! «Приятней и полезней эротический опыт проделать, чем о нем писать...» — Ленин с досадой отшвырнул синюю тетрадку.</p><p class="p">— А разве это не так?</p><p class="p">— Гм... — Ленин снова взял в руки синюю тетрадку и срывающимся голосом стал читать: «Демократия не тождественна с подчинением сексуального меньшинства сексуальному большинству... Демократия есть признающее подчинение сексуального меньшинства сексуальному большинству государство, т. е. организация для систематического насилия одной части населения над другою... Мы ставим своей конечной целью уничтожение государства, т. е. всякого организованного и систематического насилия, всякого насилия над людьми вообще... Основой полного отмирания государства является такое высокое развитие сексуального коммунизма, при котором исчезает противоположность мужчины и женщины...» Гриша, это не пойдет.</p><p class="p">— Но почему?!</p><p class="p">— Во-первых, чересчур умно. Люди не поймут. А во-вторых... Нет, Гриша, ты уж прости меня, но я под этим не подпишусь. Железный нас обоих велит расстрелять... А накропал-то сколько, батюшки... — Ленин пролистал синюю тетрадь, ужасаясь все больше. — Придется вызывать Надю. Она это живенько отредактирует.</p><p class="p">— Вот так всегда, — повесив голову, сказал Зиновьев, — никто нас не жалеет, никто не хочет защитить наши интересы.</p><p class="p">— Гриша, Гриша, ну чего тебе не хватает?! Чем плохо тебе живется?</p><p class="p">— Нас преследуют в судебном порядке, — плаксиво сказал Зиновьев. — Нам запрещают вступать в брак...</p><p class="p">— Гриша, ты рехнулся! — Ленин схватился за голову. — В брак! Где это слыхано! Да и на кой чорт вам эта обуза?!</p><p class="p">— Из принципа. Вот, например, ежели революционный солдат полюбил революционную белошвейку — они могут пойти и повенчаться. А ежели революционный солдат полюбил революционного матроса — чем они хуже?</p><p class="p">Владимир Ильич, всегда отличавшийся живым воображением, представил себе революционного матроса, которого любит революционный солдат, и ему на миг сделалось дурно. Впрочем, за последние месяцы в Петрограде революционные матросы так всем осточортели своими дебошами, что это, пожалуй, была самая правильная для них участь.</p><p class="p">— Хорошо, Гриша, — сказал он кротко. — Обещаю что-нибудь для вас сделать.</p><p class="p">«Уголовную статью отменю, а уж без брака обойдутся как-нибудь, мне же спасибо скажут. Только болваны могут не ценить своего счастья. Ежели каждый революционный солдат будет обязан жениться на каждом революционном матросе, которого совратил, — то-то визгу подымется! Будь я не просвещенным и конституционным монархом, а каким-нибудь восточным царьком — я бы брак вообще отменил, и да здравствует свободная любовь. Да ведь не поймут. Опережаем мы свое время».</p><p class="p">Вскоре приехала Надежда Константиновна. Она перестирала и перечинила одежду приятелей, накормила их, прибрала в шалашике. Она также вышвырнула из постели Ленина приблудного котенка, а из постели Зиновьева — сапоги. И, наконец, она быстренько, не сходя с места, поправила рукопись. Она вымарала из нее совсем, совсем немножко. И лишь чуть-чуть поправила предисловие с названием.</p><p class="p">Потом зарядили дожди, шалаш раскис, и все трое уехали в Выборг, к чухнам, где Зиновьев и Крупская целыми днями гуляли и пили кофе с молоком, а бедный Владимир Ильич правил книгу. У него появились кое-какие соображения. Писать трактаты оказалось почти так же просто, как кропать статейки в «Правду». «Все-таки в душе я литератор», — думал он.</p></span>
