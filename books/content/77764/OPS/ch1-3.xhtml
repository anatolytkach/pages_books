<span id="id2"><div class="title">
<p class="p1">ГЛАВА 1</p>
</div><p class="subtitle">Лондон, 1903 — съезд РСДРП: как все было на самом деле. Большевизаны и меньшевизаны. А был ли Троцкий? Ужасные тайны Дзержинского.</p><p class="empty-line"/><p class="subtitle">1</p><p class="p">— На минуточку, уважаемый, это я куда попал? </p><p class="p">Спрашивающий был рыж, скуласт, коренаст и всем обликом напоминал гриб-боровик на крепкой ножке; в его широко расставленных карих глазах плясали яркие искорки. С полминуты назад он влетел в полутемный паб, задыхаясь, точно за ним гнались, и с размаху плюхнулся на крайний стул. Было видно, что энергия так и распирает его; он вертелся и даже подпрыгивал на шатком сиденьице. Человек, к которому он обратился — худощавый, благообразный, — ответил ему сухо:</p><p class="p">— Говорите тише, пожалуйста... Здесь проходит съезд российских социал-демократов. Сегодня последнее заседание.</p><p class="p">— А! — удовлетворенно произнес рыжий. Несколько секунд он сидел спокойно. Потом вновь заерзал, фамильярно подтолкнул соседа локтем и спросил, указывая на бледного, надутого господина в сюртуке, только что взявшего слово:</p><p class="p">— А кто этот типчик?</p><p class="p">— Это Плеханов... — рассеянно ответил худощавый. — А, собственно, с кем имею честь? Вы — русский?</p><p class="p">— Да уж не британец, — с усмешкой сказал рыжий и представился, протянув за спинкой стула руку для пожатия: — Ленин. Владимир Ильич. — Рука была хорошая: крепкая и теплая. Худощавый сказал уже дружелюбнее:</p><p class="p">— Очень приятно... Глеб Максимилианович Кржижановский. Осмелюсь спросить, как вы сюда попали? Это закрытое заседание.</p><p class="p">— Вы это серьезно?! — изумился рыжий. Не получив ответа, он продолжал болтать: — Вы правы: в этом шерстяном мешке (паб, расположившийся в прелестном вычурном домике пятнадцатого века, носил имя «Wool Pack») делать решительно нечего: пиво у них препаршивейшее. Но у меня возникли непредвиденные обстоятельства... Там у вас на входе стоит черномазый болван с лотком мандаринов и мычит...</p><p class="p">— Он глухонемой.</p><p class="p">— Да уж я догадался. Потом из дверей высунулся местный бобби и спросил меня, where to и за каким чортом I'm going, а я ему вгорячах по-русски сказал «Туда». Он меня и пропустил.</p><p class="p">— «Туда» — это пароль на сегодня. Вы нечаянно попали в точку.</p><p class="p">— А я, батенька, всегда попадаю в точку... — Ленин вполголоса расхохотался, очень довольный собой. — Слушайте, Максимилианыч, кто такие эти ваши социал-демократы? О чем толк? Сколько ни слушаю этого, в сюртучке, — не понял ни бельмеса.</p><p class="p">— Глеб Валентинович действительно порой изъясняется туманно, — со вздохом признал Кржижановский. Он начал испытывать необъяснимую симпатию к этому рыжему — развязное простодушие его было очень обаятельно — и неожиданно для себя пустился в неуместные откровенности. — Да он, собственно говоря, только номинальный вождь партии... Из уважения к заслугам и все такое... Старая гвардия. А нам, чтобы действовать, нужны новые, свежие силы.</p><p class="p">Ленин понимающе кивнул и на некоторое время замолчал. Дыхание его уже почти успокоилось. Он и в самом деле спасался от погони: супруг красавицы вернулся так не вовремя! Оторвавшись от преследователя, он нырнул в «Мешок шерсти», чтобы промочить горло, отдышаться и обдумать план дальнейших действий, и был крайне удивлен тем, что столики убраны с привычных мест, стулья расставлены рядами, на них сидят незнакомые люди и слушают маловразумительные русские речи. «Но, по крайней мере, наш cocu<a href="ch2.xhtml#id2" class="a">[1]</a> сюда не проникнет, — подумал он. — Можно пересидеть. А эти типы забавны». Он ослабил воротничок и повертел головой, осматриваясь. Он любил новые знакомства. Люди интересовали его. Всегда и везде был шанс встретить человека, с которым можно делать дела. Хорошеньких женщин, правда, вовсе не было; это удручало. Но, как говорят французы, не всегда можно иметь все сразу и со всех сторон.</p><p class="p">— А это кто? — спросил он Кржижановского и ткнул пальцем в угол. — Вон там, в пенсне?</p><p class="p">— Мартов. Один из самых уважаемых людей в партии...</p><p class="p">— Мартов? С этакой синей бородой и пейсами?</p><p class="p">— Ну, Юлий Цедербаум, если хотите. — Кржижановский равнодушно пожал плечами. — Здесь почти у каждого рабочий псевдоним.</p><p class="p">Любознательный Владимир Ильич продолжал свои расспросы, все так же бессистемно показывая пальцем то на одного, то на другого; через пару минут он уже знал, что нахохленная старушенция в первом ряду — Вера Засулич, тощий молодой человек с козлиной бородкой — подающий надежды Петя Красиков, изысканно одетый коротышка с хомячьим личиком — эстет Луначарский; ему были заочно представлены Дан, Аксельрод, Либер и еще прорва разного народу.</p><p class="p">— ...Это Кольцов... — терпеливо перечислял Кржижановский. — То есть Гинзбург...</p><p class="p">— Послушайте, почтеннейший! У вас здесь какой-то кагал.</p><p class="p">— Вы великорусский шовинист? — спросил неприятно удивленный Кржижановский.</p><p class="p">— Ни в коем разе. Я интернационалист. Если хотите, я сам в душе еврей. Я даже считаю, что в наше время всякий порядочный человек должен быть немножечко евреем. Просто любопытно.</p><p class="p">Ленин говорил искренне: он никогда не придавал ни малейшего значения национальности человека, которого намеревался втянуть в очередную коммерческую аферу, или дамы, с которой заводил интрижку. Все люди делились для него на тех, с кем можно было делать дела, и тех, кто дли этого не годился. С евреями было можно, очень можно. Надо только не зевать, ибо всякий еврей мог быть союзником лишь до известного предела. Помимо общих, у них были еще и свои собственные дела, о которых Ленин знал очень мало. Он знал только, что если доходит до них — любые общие интересы летят к чорту. Впрочем, на то и щука в реке, чтобы карась не дремал.</p><p class="p">— С другой стороны, — со вздохом заметил Кржижановский, — нельзя отрицать, что у жи... у евреев имеется опасная склонность к созданию собственных групп и группочек... Вот, например, бундовцы: они недовольны и просят федерации.</p><p class="p">— А! Они всегда чем-нибудь недовольны и чего-нибудь просят, — сказал Ленин: он понятия не имел, кто такие бундовцы, однако же по природной сметливости понял Кржижановского совершенно правильно. — А хоть один русский у вас есть? — поинтересовался он.</p><p class="p">— Сколько угодно. Вот, например...</p><p class="p">Владимир Ильич поглядел в ту сторону, куда указывал его собеседник. Там сидели двое молодых людей ярко выраженного славянского типа: один носил очки и вид имел добродушный, второй был смазлив, вертляв, кудряв и очков не носил. Очкастый внимательно слушал оратора и строчил в блокноте, а вертлявый, радостно облизываясь, безостановочно уплетал пирожки с повидлом.</p><p class="p">— Лева Розенфельд и Гриша Радомысльский...</p><p class="p">— Розенфельд? — не поверил Ленин. — Да он чистый рязанец...</p><p class="p">— Настоящие фамилии этих юношей — Каменев и Зиновьев. Но Гриша, — Кржижановский показал на кудрявого, — решил, что «Радомысльский» звучит изящнее.</p><p class="p">— Звучит идиотски, — не согласился Ленин. — Сразу видно, что фамилия выдуманная. Всякий раз, как мне приходилось... — начал он и осекся.</p><p class="p">— У каждого свой вкус. — Кржижановский снова пожал плечами. — Гриша — сын сапожника, мещанская среда определила его эстетические представления; он и ногти маникюрит... А Лева стал называться Розенфельдом.</p><p class="p">— Зачем?!</p><p class="p">— Возможно, чтобы не выделяться на общем фоне. Они с Гришей неразлучники. Куда один, туда и другой.</p><p class="p">Недоверчиво хмыкнув, Ленин указал на красивого мрачного брюнета с щегольскими усами и бородкой.</p><p class="p">— А это что за дон Базилио?</p><p class="p">— Это доктор Богданов, то бишь Малиновский... — Глеб Максимилианович вдруг наклонился к собеседнику и проговорил шепотом: — Удивительный человек! Намеревается жить вечно.</p><p class="p">— Славное намерение, — оживляясь еще больше, сказал Ленин. Положительно, ему начинало здесь нравиться. «Что за паноптикум! Жить вечно! Должно быть, хочет торговать каким-нибудь патентованным снадобьем. И вид представительный. Можно войти в долю».</p><p class="p">— Могу ли, в свою очередь, осведомиться о роде ваших занятий? — учтиво спросил Кржижановский.</p><p class="p">Он наконец спохватился, что неосторожно разболтал совершенно незнакомому человеку массу секретной информации. Но с конспирацией у социал-демократов в ту пору дело было поставлено еще из рук вон скверно: они были люди интеллигентные, воровские уловки и хитрости им претили. Главное же, новый знакомец располагал к себе столь стремительно, что заподозрить в нем дурные намерения не смог бы и самый угрюмый подпольщик. «Но эти качества как раз и нужны шпиону! — в ужасе подумал Кржижановский. — Что делать? Попросить вывести его из зала? Поздно. Да и непохож. Слишком откровенен для шпика. Тот не стал бы выспрашивать так прямо... Да и какие в Лондоне шпионы? Это не Брюссель. А человек такой приятный, живо всем интересуется... Нам нужны новые люди. И Богданов говорит, что вливание свежей крови оживляет».</p><p class="p">— Да так... Имею небольшой гешефт, — туманно ответил Ленин. Три источника, три составных части его личного бюджета — биржевые спекуляции, карточная игра и посредничество в рискованных сделках — были не таковы, чтобы о них болтать. — Коммерция и отчасти юриспруденция.</p><p class="p">— Понимаю, понимаю, — благодушно сказал Кржижановский. Его симпатия к новому знакомому еще возросла. Он с уважением относился к деловым людям и считал, что в партии их очень недостает. — А я, знаете, интересуюсь электричеством. У меня множество проектов — но, к сожалению, российское правительство...</p><p class="p">— Да уж, с нашими тютями каши не сваришь. Электричество, говорите? Я тоже обожаю электричество. Думаю, это архиперспективно. Электричество и синематограф — вот те силы, что смогут встряхнуть нашу Русь-матушку и поставить ее с ног на голову... то есть на ноги.</p><p class="p">— Вы совершенно правы! — сказал Кржижановский, растаяв окончательно.</p><p class="p">Ораторы меж тем сменяли один другого; Ленин пытался слушать их речи, но толком ничего не мог понять. Устав, Программа... Он признавал, что хорошо написанный Устав — когда, к примеру, речь идет об учреждении товарищества на паях — может иметь принципиальное значение при распределении прибылей; но программа? К чему она? «И чего все-таки они хотят? — думал он. — Царя-батюшку укокошить? Одного уж укокошили... И что толку? В сухом остатке мы имеем то, что имеем: болвана Николашу и сволочь Витте, который так задушил свободное предпринимательство, что пришлось улепетывать из России... (На самом деле Ленин бежал из России, спасаясь от долговой ямы и обманутых кредиторов, но выдумал благовидный предлог и сам в него поверил.) Революция, революция... какая, к чортовой бабушке, революция? Это у нас-то? И неужто эти милые, но пустопорожние болтуны сумеют провернуть такое дельце? Одних взяток сколько потребуется... Да есть ли средь них хоть один практический человек, кроме шарлатана доктора и моего электрического соседа?»</p><p class="p">— Скажите, Максимилианыч... А какого это Троцкого они все чехвостят? Что он натворил? Удрал с кассой?</p><p class="p">— Ах, это... — смутился Кржижановский. — Видите ли, г-н... товарищ Ленин — можно я так буду вас называть?</p><p class="p">— Да ради бога, — сказал Ленин. — Можно просто Ильич. Я к этому привык.</p><p class="p">— Вообще-то рядовым членам партии об этом не известно, но... В действительности никакого Троцкого не существует... Эта личность возникла несколько лет назад из случайной обмолвки. Но потом оказалось, что Троцкий очень полезен. Он, знаете ли, способствует сплочению других членов партии в различных дискуссиях. Ему дают отпор, его ставят на место; потом, иногда у руководителей бывает необходимость запустить в массы для обкатки какую-нибудь идею, которую не совсем прилично озвучить самим... Это — жупел, символ, если хотите...</p><p class="p">— Понимаю. Мальчик для битья.</p><p class="p">— Это вы грубовато выразились... Хотя... Я вижу в вас необыкновенно умного человека. Вы не желаете примкнуть к нашему движению?</p><p class="p">— А вы можете это устроить?</p><p class="p">— Думаю, да... Я пользуюсь некоторым авторитетом у товарищей.</p><p class="p">— Сколько вы за это хотите?</p><p class="p">— Прошу прощения?..</p><p class="p">— Ну, какой процент я должен буду отстегнуть? — доверительно шепнул Ленин.</p><p class="p">— Боюсь, товарищ Ленин, вы не совсем поняли суть нашего движения. Это не коммерческое предприятие.</p><p class="p">— В таком случае зачем мне к нему примыкать?</p><p class="p">— Воля ваша-с, — ответил Кржижановский сухо. Он был обижен.</p><p class="p">Тем временем очередной выступающий, сорвав жиденькие аплодисменты, покинул эстраду, но никто на его место не вышел: сидели перешептываясь и явно ждали чего-то или кого-то.</p><p class="p">— А заправляет этой лавочкою кто? — спросил Ленин Кржижановского. — Директор, председатель или как там у вас называется...</p><p class="p">— Партия — не лавочка... Есть секретариат... Хотя по сути вы, конечно, правы, — сказал честный Глеб Максимилианович: он уже простил Ленину его цинизм. (На Ильича просто невозможно было долго сердиться.) — Секретариат секретариатом, а в действительности бразды правления держит один человек. Его сейчас ждут: он должен выступить. Он порою задерживается. Очень, очень занятой человек. Конспиратор. На днях в очередной раз совершил дерзкий побег с каторги. На нем все держится.</p><p class="p">— Еврей?</p><p class="p">— Ни в коем случае. Вроде бы поляк, как и ваш покорный слуга... Говорят, происходит из очень древнего, аристократического рода. Кажется, он был монахом... Никто в точности не знает. Он весь — сплошная загадка. Кстати, это он придумал, как нам использовать Троцкого... Необыкновенного ума человек.</p><p class="p">Внезапно свет погас, и быстрое ледяное дуновение пронеслось по залу; когда мгновение спустя вновь стало светло, на возвышении, служившем эстрадою, стоял высокий худой человек, одетый в черную крылатку. Он был нервен и гибок, как хищная кошка; аскетически строгое, бледное лицо его с острой русой бородкою было красиво почти женственною красотой, и прежде всего обращали на себя внимание удивительные глаза — прозрачно-зеленые, ледяные, с узким змеиным зрачком. Ленин усмехнулся, но все же не мог не оценить этого театрального появления. «Сразу видно прирожденного вождя, — подумал он. — Ну-тка, ну-тка, послушаем шляхтича...»</p><p class="p">Человек в черном еще с полминуты стоял молча и глядел на зал, словно гипнотизируя его; потом лицо его вдруг сделалось мирным, почти обыденным, и он сказал с интонацией почти будничной:</p><p class="p">— Буду краток. — Тонко вырезанные ноздри его трепетали; тень от ресниц ложилась на скулы; зрачки пульсировали, то сужаясь в иглу, то расширяясь так, что затапливали почти всю нежно-зеленую радужку. («Кокаинист», — безошибочно определил Ленин: в своих скитаниях он навидался всяких оригиналов.) — На повестке вопрос о партийной дисциплине. — Он говорил с легким, но неприятным польским пришепетыванием.</p><p class="p">— Как его имя? — спросил Ленин.</p><p class="p">— Никто не знает его имени, — еле слышным шепотом отозвался Глеб Максимилианович: как и остальные участники съезда, он весь как-то сник при появлении черного человека. — У него тысячи имен. И тысячи лиц.</p><p class="p">— Но как-то вы к нему обращаетесь?</p><p class="p">— Честно говоря, мы стараемся без особой надобности к нему не обращаться... Он позволяет называть себя Феликсом Эдмундовичем. За глаза его зовут Железным.</p><p class="p">— Почему железным? — заинтересовался Ленин. Но Кржижановский не ответил ему и лишь умоляющим взглядом призвал к молчанию. Впрочем, Ленин тотчас и сам догадался о происхождении этого странного имени, ибо оратор говорил следующее:</p><p class="p">— ...итак, о партийной дисциплине. Партийная дисциплина должна быть железная. Железо должно быть закалено в горниле борьбы. Наша жизнь — жизнь солдат, у которых нет отдыха. Некогда думать о себе. Мы в аду. Работа и борьба адская...</p><p class="p">«Обычный пустозвон, — подумал Ленин. — Похоже, и впрямь был монашком — то-то у него через каждое слово геенна огненная...» Он был ужасно разочарован.</p><p class="p">— ...Вся наша работа — одно непрерывное действие, — продолжал пугать собравшихся черный человек. — История выдвинула нас на передовую линию огня, наша воля зовет нас бороться, открытыми глазами смотреть на всю опасность грозного положения и самим быть беспощадными, чтобы растерзать врагов. Для этого дисциплина должна быть железная, подчинение — беспрекословное...</p><p class="p">— Вы призываете к нетерпимости! — выкрикнул кто-то из зала.</p><p class="p">— Партия — не дом терпимости, — отбрил его оратор.</p><p class="p">«Нашел чем гордиться, болван», — подумал Ленин. Разочарование его усилилось. Однако по мере того, как он вполуха слушал Железного, в его крепкой лысеющей голове зашевелились странные, будоражащие, восхитительные мысли... Кой-какие воспоминания детства, о которых он давно думать забыл, вновь ожили; грандиознейшие, небывалые надежды предстали перед ним, баснословные планы брильянтовой россыпью засверкали в мозгу. (В его прошлом крылась удивительная тайна, о которой не знал никто: он не делился ею даже с самыми пылкими из любовниц, не заикался о ней, даже будучи мертвецки пьян, что случалось нередко.) «А что, если... Конечно, все вздор, но... Нет, нет! Бред! Авантюра! — Но это определение лишь подогрело его азарт: без авантюры — финансовой или любовной — он часу прожить не мог. — Да, авантюра, ну и что? Пуркуа, чорт побери, па?! Ставки невелики — а какой банчишко можно сорвать, ах, какой! Дурак же я буду, если упущу такие шансы... Что толку в сомнениях? Надо ввязаться в драчку, а там посмотрим».</p><p class="p">— Я желаю быть членом вашей партийки, — решительно сказал он. — Уж пожалуйста, Максимилианыч, будьте добреньки, рекомендуйте меня вашему железному шефу. Сочтемся.</p><p class="p">Кржижановский обещал, что по окончании заседания сведет Ленина с Железным. Тогда Ленин решил, что нужно узнать побольше о партии, в которую он собрался вступить, и попросил своего любезного Вергилия разъяснить ему — нормальным человеческим языком, без революционной трескотни, — суть этой пресловутой «программы», о которой все толкуют, а заодно и основные тонкости внутрипартийной грызни. Не сказать, чтобы он заботился о благоприятном впечатлении, которое желал произвести на Железного своею осведомленностью, — но не любил и попадать впросак.</p><p class="p">Кржижановский пустился в терпеливые, пространные объяснения, выдававшие в нем учителя по призванию и революционера лишь по русской игре случая, вечно заносившей всех порядочных людей в подполье. Однако уже в самом начале они застряли на программе-«максимум»: туманное и зловещее выражение «диктатура пролетариата» повергло Ленина в ужас. Он не мог понять этого, как ни старался. «Знаю я этот пролетариат... Ему дай волю — чистого ватерклозета в стране не останется. И потом, ежели будет диктатура — стало быть, твердые цены? Чего доброго, биржу вообще прикроют... Нет, это какой-то безумный вздор».</p><p class="p">— Хорошо, хорошо, почтеннейший, — сказал он, понадеявшись, что хоть программа-«минимум» окажется понятнее. — Пойдем далее.</p><p class="p">«Минимум» действительно выглядел не так ужасно. «Свержение царя — ладно, пусть свергают, это и мне на руку... — быстро соображал Владимир Ильич. — Демократическая революция — ну да чорт с ней... Всеобщее равное и прямое избирательное право — чудесно, замечательно... Хотя насчет того, чтоб и бабам было позволено голосовать, — это, конечно, вздор... Восьмичасовой рабочий день — очень правильно. Нельзя все время работать, нужно и повеселиться, отдохнуть. Равноправие наций вплоть до права на самоопределение — что-то заумное... Эдак татары захотят самоопределения — и во что превратится моя Казань? (Ленин учился на юриста в Казанском университете; правда, за неумеренную игру он был отчислен после первого курса, но навсегда сохранил о Казани самые приятные воспоминания.) Что там у них дальше? Уничтожение остатков крепостничества в деревне... Да, крепостничество — это, конечно, нехорошо. Хотя есть в нем и милые стороны. Девки, хождения по ягоды... Жаль, жаль, что я не помещик. Но надо быть реалистом — двадцатый как-никак век. Крепостные театры и синематограф не могут сосуществовать в одном государстве».</p><p class="p">— Все это очень разумно, — сказал он Кржижановскому. — Я целиком и полностью согласен.</p><p class="p">— Теперь перейдем к Уставу, — сказал Кржижановский и радостно потер руки. — Тут самый важный пункт — о членстве. По этому вопросу существуют две позиции. Плеханов с Мартовым формулируют свою так: «Членом РСДРП считается всякий, принимающий ее программу, поддерживающий партию материальными средствами...</p><p class="p">„А говорил, что некоммерческое предприятие, — подумал Ленин. — Чистейшее надувательство, как и везде...“</p><p class="p">— ...и оказывающий ей регулярное личное содействие под руководством одной из ее организаций», — закончил Кржижановский. — А вот иная формулировка: «Членом РСДРП считается всякий, признающий ее программу и поддерживающий партию как материальными средствами, так и личным участием в одной из партийных организаций». Ну что? Какая позиция вам ближе?</p><p class="p">— Не вижу ни малейшей разницы, — буркнул Ленин. — Что в лоб, что по лбу. И те, и эти требуют денег. Зачем же вы мне, батенька, врали про бескорыстие?</p><p class="p">— Нет, Ильич, вы неправы, — горячо возразил Кржижановский, не расслышав упрека. — Одно дело — «личное содействие», и совсем другое — «личное участие». Улавливаете разницу?</p><p class="p">— Ничего не улавливаю. Растолкуйте по-человечески.</p><p class="p">— Но вы же юрист! — изумился Кржижановский. — В первом случае наша партия — расплывчатое, аморфное образование, этакий клуб джентльменов, во втором — строгий орден рыцарей-меченосцев...</p><p class="p">— А, — сказал Ленин. — Тогда, конечно, я за первую. — Он обожал клубы, а рыцарей полагал бесполезными и унылыми болванами.</p><p class="p">— Однако Феликс придерживается второй.</p><p class="p">— Вот как! — сказал Ленин. Он возвел глаза к потолку и поскреб подбородок. Любому дураку было очевидно, что присоединяться всегда следует к той позиции, которую занимает наиболее влиятельное лицо. — Пожалуй, я ошибся. Вторая формулировка, без сомнения, четче.</p><p class="p">— Вы очень быстро все схватываете! — восхищенно сказал Кржижановский. — Некоторым для этого требуются годы.</p><p class="p">— Просто я люблю учиться новому... — рассеянно пробормотал Ленин. — А скажите, батенька, основная масса народу у вас за кого? За Цедербаума или за Железного?</p><p class="p">— В разных вопросах по-разному, — ответил Кржижановский, — но в общем и целом, как видно из голосований, большинство согласно с товарищем Феликсом.</p><p class="p">— Вот и прекрасно. Можете сразу и меня записать к этим большевизанам.</p><p class="p">— Как вы сказали?</p><p class="p">— А как их еще называть? Ведь их больше. А те, другие, — меньшевизаны...</p><p class="p">— Ах, это вы замечательно придумали! — Кржижановский был в восторге. — Мы предложим это название Феликсу Эдмундовичу. Большевизм как течение политической мысли и как политическая партия... Только, пожалуй, большевизаны и меньшевизаны — это не совсем то. Почему-то приходит на ум половой вопрос.</p><p class="p">— А как, кстати, у вас относятся к половому вопросу? — поспешно осведомился Ленин.</p><p class="p">— Да в общем великолепно относятся. Только чтобы без этой, знаете, буржуазности, без собственнических инстинктов...</p><p class="p">Владимир Ильич подумал, что все-таки попал куда нужно. Если и было в половом вопросе что-то ему ненавистное, глубоко враждебное, так это именно буржуазные собственнические инстинкты — как со стороны мужей по отношению к дамам, так и со стороны дам по отношению к нему самому. Несколько повеселев, он сказал:</p><p class="p">— Тогда пусть будут большевисты и меньшевисты. Тут, кажется, половым вопросом не пахнет.</p><p class="p">— Прекрасно, прекрасно! — вскричал Кржижановский. — Скажите, а вы не находите, что «большевики» и «меньшевики» были бы еще элегантнее?</p><p class="p">Ленин великодушно согласился, что да, элегантнее. После этого обоюдная симпатия между ним и Кржижановским еще возросла. А за окнами уже темнело; утомительное заседание, кажется, подходило к концу...</p><p class="p">Когда последний из выступавших завершил свою речь и вернулся на место, Ленин с облегчением подумал, что можно наконец спросить пива, но ошибся: полагалось еще спеть хором. Все встали... «Это, конечно, железный шляхтич придумал. Музычка была довольно бойкая, однако слова... Но мы поднимем гордо и смело знамя борьбы за рабочее дело... Какое рабочее дело? Не видел тут ни одного рабочего... Да и знамени тоже... Чушь, архичушь! За лучший мир, за святую свободу... Ну вот, опять „святую“! Надеюсь, хотя на колени вставать не заставят — пол в этой пивной ужасно грязный...»</p><p class="p">— Вам нравятся слова? — шепнул Кржижановский.</p><p class="p">— Сроду не слыхивал такой архичу...</p><p class="p">— Это я написал.</p><p class="p">— ...десной, грандиозной поэзии, — не моргнув глазом отозвался Ленин.</p><p class="empty-line"/><p class="p">Отзвучали последние слова гимна, и участники съезда начали расходиться, но возможность поговорить с Железным Феликсом представилась далеко не сразу: то один, то другой делегат, подскочив или подкравшись сбоку, с выражением подобострастным и робким задавал ему какие-то вопросы, а некоторые, как заметил наблюдательный Ленин, даже пытались поцеловать магистру руку, каковые попытки тот, надо отдать ему должное, пресекал категорически. Ленину отчаянно хотелось пива, и он уговорил Кржижановского выпить по кружечке. Но пиво, как часто бывает в Англии, оказалось теплое, некрепкое и только усилило жажду. Они вышли из паба; была пыльная жара... Революционеры кучками стояли и беседовали о том о сем. Щуплый рябой грузин все так же торчал у дверей, переминаясь с ноги на ногу, и держал свой лоток. На лице его было тупое страдание. («Бедняга еще и слаб рассудком, — шепнул Кржижановский Ленину, — мы все принимаем в его судьбе живейшее участие».) Из жалости Кржижановский и Ленин взяли у него по мандарину. Мандарины были зеленые и тоже противные, но утоляли жажду все-таки лучше, чем пиво. Глухонемой, бурно жестикулируя, замычал что-то; Кржижановский потрепал его по голове.</p><p class="p">— Хороший Коба, хороший... — проговорил он рассеянно. — О, наконец-то! Товарищ Ильич, скорей, скорей — он, кажется, освободился и уходит...</p><p class="p">И Глеб Максимилианович, ухватив нового товарища под руку, стремительно повлек его представляться вождю. В своей пылкой речи он отозвался о Ленине как о вдумчивом, энергичном человеке, специалисте в области электричества и синематографии, крупном промышленнике и предпринимателе — Владимир Ильич, чей основной и оборотный капиталы вместе взятые никогда еще не превышали пяти тысяч рублей, был весьма польщен, — а также блестящем остроумце, с ходу придумавшем прекрасный термин «большевизм».</p><p class="p">Однако Феликсу Эдмундовичу новый термин не понравился, о чем он заявил с присущим ему убийственным высокомерием, притом обращаясь исключительно к Глебу Максимилиановичу, а Ленина как будто и не замечая вовсе, словно тот был не более чем назойливой мухою. Ему с первого взгляда — а взгляд у него был острей орлиного — сделался неприятен этот вульгарный субъект.</p><p class="p">— Это bon mot; не пройдет и суток, как его будут повторять все, — ничуть не смущаясь, парировал Ленин, сразу ответивший Феликсу Эдмундовичу полной взаимностью: он не терпел попугайской напыщенности и шляхетского высокомерия. — Хотите, побьемся об заклад?</p><p class="p">— Я никогда не заключаю пари, — с легкостью солгал Феликс Эдмундович: он отлично понимал, что новое словечко привьется. «Впрочем, не стоит отказываться от услуг этого простака, — подумал он, — деньги всегда нужны. Достаточно того, что я поставил его на место». И он, обратив на Владимира Ильича свои удивительные зеленые глаза, мгновенно сменил тон и проговорил дружелюбно: — Мы всегда рады новым людям. — Речь его — когда он этого хотел — звучала обволакивающе, как журчание ручейка, с мягкостью почти женской, и даже акцент полностью исчезал. — Уверен, вам не придется пожалеть о том применении, которое мы найдем вашим талантам...</p><p class="p">— И моим капиталам? — усмехнулся Ленин. «Болван сам лезет в сети», — подумал Феликс Эдмундович и сказал:</p><p class="p">— Если такова будет ваша воля... Мы не уповаем на пожертвования. Но и не видим нужды отказываться от них — разумеется, в том лишь случае, когда предложение исходит от чистого сердца...</p><p class="p">«Блеф сработал, — с облегчением подумал Ленин, — однако с этим типом придется нелегко: интриган и сволочь прожженная». Внезапно у него возникло неприятное ощущение, будто кто-то, стоящий за спиной, прислушивается к их разговору; он обернулся. Но позади никого не было, кроме глухонемого с мандаринами. «Показалось», — решил он.</p><p class="p">Далее Феликс Эдмундович, сославшись на занятость, в крайне учтивых выражениях попросил разрешения откланяться и предложил новому партийцу встретиться «как-нибудь», дабы в спокойной обстановке обсудить детали предполагаемого сотрудничества. (Он не назначил даты для аудиенции, ибо намеревался предварительно кое с кем проконсультироваться.)</p><p class="p">Они попрощались за руку. Ленин придавал рукопожатиям большое значение, можно сказать, коллекционировал их: он был убежден, что по ним можно понять характер человека. Но такой руки, как у Железного Феликса, никогда еще ему не встречалось. Она была расслаблена и мягка, но причиняла боль; она была холодна как лед, но от нее оставалось ощущение ожога.</p><p class="empty-line"/><p class="p">Кржижановский тронул Ленина за плечо:</p><p class="p">— Милости прошу послезавтра вечерком ко мне в гостиницу, товарищ Ильич. Соберутся некоторые товарищи...</p><p class="p">— Чтобы еще раз спеть хором?</p><p class="p">— Ну, почему же непременно хором? Вино, закуска... В картишки по маленькой...</p><p class="p">— А! Буду непременно.</p><p class="p">— Я стою в «Бедфорде».</p><p class="p">— До завтра, Максимильяныч!</p><p class="empty-line"/><p class="subtitle">2</p><p class="p">Ночь. Он стоит на мосту, смотрит в черную маслянистую воду. На нем мягкая шляпа и длинное пальто. Он знает: за ним — филер. Он привык к опасности, она его возбуждает; но ему ненавистен этот чужой, желтый, липкий город с его холодной пышностью. Он идет, стуча каблуками по деревянным мостовым, ныряя в подворотни и переулки, кружа и петляя, чтобы замести следы. В одной из подворотен ему слышится странный тонкий звук; он уже избавился от слежки и никуда не торопится, но этот звук заставляет его вздрогнуть всем телом. Он оборачивается и видит у стены темный ком тряпья. Именно оттуда доносится жалобный звук. Это плачет ребенок — не младенец, а ребенок лет десяти, судя по голосу.</p><p class="p">Он возвращается, подходит ближе — теперь сквозь тряпье ясно видны очертания детской фигурки, — нагибается, сдергивает платок, которым закрыто лицо ребенка. Это девочка. Она бледна и худа. Глаза у нее черные, как смородина. Он поднимает ее на руки — она совсем ничего не весит. Тряпки плохо пахнут, он разматывает их, бросает на землю, снимает с себя пальто, закутывает девочку и несет. Она уже перестала плакать.</p><p class="p">В гостиничном номере тепло, топится печь. Он ощупывает босые ноги девочки, они холодны как лед. Он говорит ей, чтобы она не боялась. Но это лишнее: она совсем не боится, не плачет и спокойно позволяет себя раздеть и уложить в постель. Они в русском городе, но говорят не по-русски, и его ничуть не удивляет, что девочка понимает его родной язык. Она говорит ему, что мать заставляет ее заниматься проституцией, а он говорит, что ей больше никогда не нужно будет возвращаться к матери, и рассказывает, как она будет жить в большом светлом доме и играть с другими детьми. Потом, закутанная в одеяло, она спит; он осторожно ложится рядом и обнимает ее одной рукой. Он счастлив; он думает о том, как завтра поведет ее в кухмистерскую, накормит, купит ей пирожных, платьев, живого котенка. Его обволакивает дрема. Он засыпает.</p><p class="p">Просыпается он резко, словно от толчка, и острое отчаяние охватывает его: опять ее украли! Как всегда! В темноте он шарит рукой по постели: постель пуста. Ломая спички, он зажигает свечу, смотрит вокруг себя: в номере он один. От гостьи осталась лишь влага на простынях; понятно, это вода, ведь он вынул из реки утопленницу. Кашляя, он встает, берет полотенце и начинает промокать им влажные пятна. Полотенце все сильней разбухает, становится скользким и уже ничего не впитывает, а кровь безостановочно расползается по простыням. Руки его стали липкими; он подносит их к лицу, не веря своим глазам, смотрит — ладони испачканы кровью, откуда столько крови, он же ей ничего не... В ужасе он хватает подушку, хватает пальто, скатывает трубкой ковер — а стулья падают, больно ушибая его, шкафы хлопают рассохшимися дверцами, и в номере стоит невообразимый грохот, который вот-вот услышат другие постояльцы и вызовут консьержа, — бросает всю эту кучу тряпок на постель и наваливается всем телом сверху, чтобы унять кровотечение, но упругие тряпки выскальзывают из рук. И вот уже дверь трещит и выгибается под ударами, а в щель под нею просачивается струйка темной маслянистой жидкости и дразнит его, словно высунутый язык, и он с криком падает на пол...</p><p class="p">Он сел на постели, бешеными глазами оглядел просторную, чистую спальню: разумеется, он в своей лондонской конспиративной квартире, дважды тайной — от полиции и от «товарищей», коим надлежит считать, будто он живет в дешевом пансионе. Он был весь мокр от липкого пота, сердце бешено колотилось, руки комкали на груди нательную рубаху. С досадой сбросил с ночного столика раскрытую книгу. Он был все еще несколько нетверд в русском языке (окружающие полагали, что он — недоучившийся гимназист — вообще иностранных языков не знает, и он не опровергал этой удобной для него неправды) и много читал вечерами, чтобы пополнить словарный запас, а мракобеса Достоевского выбрал специально, желая лишний раз поупражняться в ненависти и умении обуздывать се, когда необходимо для дела. Что-что, а таиться от других он умел. Если б не сны! Но он и тут подстраховался: за всю свою жизнь не провел ни одной ночи с женщиной, которая могла б услышать его бред... Холод рассудка скрывает пламень сердца. Рим потерял в его лице нового Игнатия Лойолу — тем хуже для Рима! Тем хуже для чужого желтого города и чужой холодной страны, которые ему предстояло завоевать. Он выпил воды — сердцебиение унялось. Взмолился: пусть ОНА — если уж не хочет оставить его в покое — приснится не так.</p><p class="p">...Каникулы, летний полдень, берег речки Усы, вода прозрачна, воздух колышется от зноя, слышен томный звон кузнечиков, солнце — красными пятнами сквозь закрытые веки. Они только что купались, и капли воды еще не обсохли на их загоревших руках и ногах, а ее длинные темные волосы совсем мокрые — она опять окуналась с головой, хотя мать всякий раз бранит ее за это.</p><p class="p">Так жарко, что им не хочется есть, хотя они улизнули из дому еще до завтрака. Утром, пока зной не был так силен, они бродили по лесу с ружьем в надежде подстрелить кролика, но им быстро наскучила эта бесплодная забава. Теперь ружье лежит на траве рядом с другими пожитками: книга, салфетка, надкушенное яблоко. И они лежат друг подле друга, болтая беспечно. Ему двенадцать лет, ей одиннадцать.</p><p class="p">Ей хочется пить, а вставать лень, и она, приподнявшись, перегибается через него и тянется к яблоку. Он хватает ее за руку, толкает, щиплет, щекочет. Она заливается смехом. Это все понарошку. Они устраивают шуточную схватку из-за яблока. Он много сильней ее и быстро оказывается сверху. Ее кожа пахнет солнцем и травой. Тяжкая истома овладевает им, он не хочет продолжать возню и отпускать ее тоже не хочет. Она хохочет и мотает головой, в мокрых тяжелых косах запутались травинки. Глаза у нее черные, как смородина. Весь дрожа, он прикасается сухими губами к ее щеке. Он еще никогда в жизни не испытывал такого счастья.</p><p class="p">Вдруг все рушится: она начинает с бешеной силой извиваться под ним, отталкивает его, вырывается — растрепанная, злая, вся в слезах — и отскакивает от него, и кричит, что он гадкий, гадкий мальчишка и она все расскажет матери. Он в ужасе, раздавлен, поражен — почему она так рассердилась? Он ничего ей не сделал плохого. Она же его самая любимая сестренка и прекрасно об этом знает: он всегда защищал ее перед матерью и старшими сестрами. Он мечтает убежать с нею вдвоем куда-нибудь далеко — в Америку или Африку. Она — самое дорогое, что у него есть.</p><p class="p">А она продолжает кричать и плакать и ругать его самыми скверными словами, словно деревенская девчонка, лицо ее искажено от злобы. Он наконец понимает: это оттого, что он, по ее мнению, как-то нехорошо прижимался к ней. Matka Boska, какой вздор! Он же просто любит ее, просто не может без нее жить. Он никогда не пытался подглядывать за сестрами в купальне, как это делает его старший брат. Она для него — как маленькая мадонна, как ангел.</p><p class="p">Он хочет сказать ей об этом, но не находит нужных слов, ведь он еще ребенок. Да и она ничего не хочет слушать, затыкает уши, топает ногами, визжит. Потом поворачивается и бежит прочь, бросив через плечо, что сейчас же нажалуется. Он страшно напуган. Этого нельзя допустить, ведь тогда их разлучат, не позволят уходить из дому вдвоем на целый день, как раньше. Воображение мгновенно рисует ему ужасные картины: его отсылают в город, отдают в подмастерья, забривают в солдаты, сажают в крепость, ссылают в Сибирь, ее увозят насильно в монастырь. Как успокоить ее? Она убегает. Он в отчаянии. Он уже не соображает, что делает, не помнит, как в его руках оказывается ружье. Оно тяжелое. Дымок вырывается из обоих стволов, отдача толкает его в плечо.</p><p class="p">Дым рассеивается. Он вскакивает на ноги, бежит к ней. Она лежит ничком, голова повернута вбок, ресницы мокрые. На спине ее рубашки расплывается жирное красное пятно. Он падает на колени, непослушными руками пытается перевернуть ее, приподнимает ее голову. Она еще дышит и даже в сознании. Давясь, она пытается что-то сказать. Он склоняется ниже, берет ее руку, шепчет, что все будет хорошо, он сейчас побежит за помощью, умоляет ее чуточку потерпеть. Срывает с себя рубашку, прижимает к ране — кровь не унимается. Зовя на помощь, он кричит что есть силы, охрип от крика, но берег реки пустынен, а усадьба далеко, за лесом. Он силится поднять ее на руки, но она слишком тяжела для него. Нельзя медлить и секунды, но он не может оставить ее здесь одну. Ее губы белые, пульс тянется в нитку — жизнь уходит. Она вдруг произносит почти внятно: «Помоги мне... Фелек, помоги...» Она не проклинает его, она даже не поняла, что случилось. Слезы застилают ему глаза, он вскакивает, сломя голову бежит в усадьбу, воет, спотыкается о корни, падает, расшибается, он весь в крови — ее и своей, — взахлеб лепечет молитвы, путая слова, подымается, бежит, падает снова...</p><p class="p">Когда пожилой садовник — первый, кто попался ему на дороге, — задыхаясь, прибегает вместе с ним обратно и хочет поднять ее — она уже не дышит. Они переворачивают ее на спину. Широко раскрытыми черными глазами она смотрит прямо на него.</p><p class="p">Из усадьбы к ним уже бегут люди. Он видит среди них мать. Поздно! Где они все были раньше, когда они с сестрой молили о помощи! Они все-таки отняли ее, все-таки забрали. Все из-за них с их проклятыми приличиями. Почему они все не умерли тут же, сраженные молнией, почему они дышат и ходят, почему смеют ходить и дышать? Ведь все кончено. Убей нас всех здесь, Господи, убей, ведь все кончено... Он бьет по земле кулаком, обхватывает голову руками, визжит, заходится в истерике, срывает с шеи крестик, топчет его, выкрикивает проклятья — изнеженный, миловидный светловолосый мальчик, больше похожий на девочку...</p><p class="p">И на этот раз он не сумел сдержать крика. Злобно отшвырнул одеяло, встал, зашагал по комнате, как тигр в клетке. Уже светало. Ванда, Ванда! О, Ванда! Не счесть, сколько раз она посещала его за эти годы! Не уходи, останься хоть на несколько минут! Лицо его — худое, узкое, как нож, — болезненно скривилось. Зеленые, как у кошки, глаза сверкнули ненавистью. Как смели они отнять ее у него... А раз так — надо продолжать жить и продолжать мстить. Стать выше владык небесных и земных... Да, нужно идти прямо к цели, не сворачивая, не сгибаясь под ударами судьбы, как если б его сердце было сделано из железа. Холодная страна будет лежать у его ног. Он еще увидит свои статуи в бронзе. Он рассчитается со всеми, огнем и мечом выжжет проклятую заразу. Но детей — детей он спасет.</p><p class="p">Тогда они ему не позволили даже понести кару за свое невольное преступление. Мать и родственники придумали историю о том, как его сестра Ванда сама нечаянно нажала на курок и убила себя. Он считал, что должен замолить грех, уйти из мира, посвятить себя Богу. Дни и ночи проводил в жарких молитвах, долгие часы простаивал на коленях, истязал себя ударами плети. Сердился на мать, братьев и сестер за недостаток религиозного рвения, даже бранил их, пока они не начали над ним смеяться. Его старший брат Казимеж нарочно говорил ему, что не верит в Бога; Феликс был в ужасе и сказал, что пустил бы себе пулю в лоб в ту же секунду, как утратил веру. Но когда к пятнадцати годам выбор его пал на орден иезуитов, им двигала уже не одна только вера: романтическую натуру мальчика привлекало сочетание показного смирения и тайного могущества. Он говорил о своем желании ксендзу и был уверен, что тот поддержит его, но ксендз оказался предателем: сказал матери, что не одобряет его намерения. И все они стали отговаривать ого. Он сделал вид, что подчинился их уговорам. На самом деле он просто понял, что есть иные способы достичь могущества. Не лучше ли быть генералом нового ордена, чем рядовым служителем старого? Во что бы то ни стало он завладеет кольцом, взойдет на престол, что принадлежит ему по праву, и снимет с престола проклятие.</p><p class="p">...Впервые он услыхал о кольце от матери, еще маленьким ребенком. Как все дети, он верил в сказки — поверил и в эту, как верил, что, надев шапку-невидимку, можно в одночасье изрубить всех москалей в капусту. Но, став старше, пришел к выводу, что кольцо действительно существует; существует и проклятие. Логика подсказывала ему, что оно должно существовать, а что должное — то и сущее; разве не так рассуждает настоящий заговорщик, чья мечта рисует планы, а воля претворяет их в жизнь? Он нашел подтверждения этому в старинных семейных документах, которыми никто, кроме него, всерьез не интересовался. Он читал много книг, рассказывавших об истории его прекрасной родины и ее заклятого врага, сопоставлял версии и наконец понял все...</p><p class="p">Много лет назад, когда московский царь Иоанн почувствовал приближение смерти, он, желая уберечь от невзгод любимого отпрыска — двухлетнего Димитрия, — отправил его под охраной в тихий город Углич. На золотой цепочке, что обвивала шейку ребенка, кроме креста, было подвешено кольцо. Он было слишком велико, чтобы надеть его младенцу на палец, и, кроме того, не такая то была вещь, чтобы кому-нибудь носить ее открыто, будь то дитя или взрослый человек.</p><p class="p">Кольцо досталось Иоанну от матери, красавицы Елены Глинской, чей отец на горе потомкам бежал из прекрасной Речи Посполитой в грубую, ненавистную Московию. Никому, кроме родного сына, Елена не должна была рассказывать о том, что кольцо это, подаренное ей русалками из Вислы, имеет волшебную силу: дает оно могущество и власть над людьми, но лишь тому, кто хоть единожды напился воды из Вислы, тому, в чьих жилах течет польская кровь, Елена тайно хранила кольцо и благодаря его силе после смерти мужа стала правительницей Руси. Но слаба, болтлива была молодая женщина, и слишком многие бояре узнали о кольце. Кольцо у нее выкрали, и Елена умерла, отравленная кровожадными Шуйскими, ненавидевшими ее, а потом и всех Глинских погубили проклятые бояре.</p><p class="p">Полжизни Иоанн потратил на то, чтобы отыскать материно кольцо и вновь завладеть им. Специально для розысков создал он орден опричников и безжалостно истреблял бояр, обманом похитивших у него самое дорогое. Нашел он кольцо и стал первым настоящим царем на Руси. Но воды из Вислы не пил он и теперь умирал. Кольцо досталось царевичу Димитрию...</p><p class="p">Говорили, будто Димитрий был заколот ножом по приказанию Годунова, но это, конечно, немыслимо: кольцо охранило мальчика. Вместо него был убит другой ребенок. А царевич, выросший в глуши, ждал своего часа. Долго он скитался по монастырям под именем Григория Отрепьева, прежде чем почувствовал, что пришло время действовать. Дальнейшие события известны. Димитрий напился воды из Вислы и сумел завладеть и русским престолом, и сердцем прекрасной Марины Мнишек.</p><p class="p">Как великолепна была свадьба! (Он смакует с чувственным наслаждением все эти подробности, вычитанные в книгах и давным-давно заученные наизусть, как молитва.) Кресло царское было из одного золота, стол серебряный с позолоченными ножками, покрытый вязанной из золота скатертью; комнату украшала тонкой работы люстра с боевыми часами. Посол Димитрия, Афанасий Власьев, поднес в подарок Марине Мнишек от имени жениха: рубиновое перо, гиацинтовую чашу, золотой корабль, осыпанный драгоценными каменьями, золотого быка, павлина и пеликана, часы с флейтами и трубами, три пуда жемчуга, 640 редких соболей, кипы бархата, парчи, штофа и атласа, сверх того многие подарки ее родственникам, всего на 230 тысяч червонцев. Престол Димитрия был вылит из чистого золота, обвешан кистями алмазными и жемчужными, утвержден внизу на двух серебряных львах и покрыт накрест четырьмя богатыми щитами; над ним блистали золотой шар и золотой орел...</p><p class="p">Димитрий был образован, умен, добр и мягок; такой человек не может править этой безобразной страной, которая жаждет лишь кнута и крови. Шуйский — злой гений Рюриковичей — вновь выкрал у царя кольцо, поднял великую смуту, и Димитрий был убит, а тело его и память его опозорены. Марине с малолетним сыном — законным царем Иоанном Пятым — удалось было бежать; месяцами скиталась она в обществе атаманов, разбойников и убийц, и было время, когда, казалось, все обойдется — трусливые и вероломные московиты присягнули польским королевичам, — но напрасны были все надежды. Вскоре Марину настигли, схватили и вместе с ребенком заточили в темницу. А огромная дикая страна продолжала полыхать смутой: один полуцарь сменял другого, и вот уже никому не известный Михаил Романов на престоле...</p><p class="p">Когда перед казнью Марины посол полуцарский вошел к ней в камеру и стал осыпать ее бранью, страшная усмешка озарила ее лицо, и, подняв руку, прокляла она холодную Московию и ту семью, что обманом взошла на престол.</p><p class="p">«С Михаила началось — Михаилом кончится, — сказала Марина. — О Matka Boska, ниспошли на врагов моих кары, о коих молю я тебя. Пусть южный ветер опалит и иссушит эту страну, не ведая сострадания. Пусть северный ветер выстудит в жилах кровь московитов и лишит их тела силы, не ведая снисхождения. Пусть западный ветер относит прочь дыхание их жизни, и пусть от его дуновений у них искрошатся кости. Пусть восточный ветер помрачит их рассудок, сделает незрячими их глаза, лишит силы их семя, дабы плодились они такими же бессильными и ни на что не годными!</p></span>
