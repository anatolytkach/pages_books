<span><p class="p1">Боря позвонил, и открыл ему мягкий, уютный, округлый, хотя и душноватый с виду человек. Роста он был порядочного, так что круглота ощущалась скорее как массивность, но вел себя так мирно, лениво и уютно, что было очевидно: это не работа, это отдых души. Кем он там работает, что делает в своих таинственных кабинетах, — неясно, да и неважно; сюда он приходил поговорить с умным собеседником, отдохнуть от рутины и выслушать интересную точку зрения. С ним у Бори сразу установился именно тот контакт, в котором заинтересованы обе стороны.</p><p class="p1">Атмосфера беседы по вызову исчезла немедленно. Боря не возражал бы теперь уже не против ежемесячных, но и против еженедельных встреч, однако предлагать такое было бы избыточным рвением. Горелов-второй этого бы не оценил. Боре иногда хотелось предложить: да вы зайдите, что ли, или посидим где-то в Журдоме, — но и это было бы выходом за грань профессиональных отношений, а Горелов ценил в Боре именно сдержанность. Все-таки однажды Боря не удержался и сказал: знаете, а я ведь себя чувствую у вас почти как на венской кушетке, у этого… Знаю, спокойно кивнул Горелов-второй, далее просто Горелов, ибо первый исчез, не оставив по себе памяти. Исчезновение его не оговаривалось, новый просто сказал: в связи с командировкой с вами буду теперь работать я, зовите меня Петром Степанычем, мы все тут, знаете, Петры Степанычи, и вы тоже. Да, знаю, сказал этот Петр Степаныч, вы просто, можно сказать, попали в десятку. Я ведь именно этим и занимался года до двадцать девятого, а потом по разным обстоятельствам понял, что сейчас надо поменять место работы. Расскажите, пожалуйста, попросил Боря, словно это он здесь задавал вопросы. И Горелов с готовностью откликнулся, словно тоже ждал, пока его одиссея станет кому-нибудь интересна.</p><p class="p1">В двадцать девятом году — хотя догадаться можно было чуть ранее, начались регулярные выступления против нашей научной школы. Все-таки она не вполне сочеталась с марксизмом, или, верней, для окончательного сочетания требовалась адаптация, а заниматься этим было некому. И тогда обо всем догадался подлинный глава школы, давно уже преподающий в одном из южных пединститутов: поймите, объявил он на последнем собрании психоаналитического общества, они хотели бы табуировать все, чем пользуются сами, — чтобы никто не подобрал к ним ключа. Запрещается только то, что будет востребовано в узком кругу. Началось с запрета на волшебную сказку — но неужели вы думаете, что собственные их дети будут расти на книгах о двигателях? Высшая правда заключается в том, чтобы верхи ели одно, а низы другое; этого установления не опровергла еще ни одна власть, ибо в противном случае исчезли бы любые стимулы к этой власти стремиться. И, разумеется, им понадобились мы — но, чтобы нами пользоваться, они должны нас запретить. Теперь наш долг — доказать, что мы им необходимы; и это мы доказали очень быстро, потому что расспрашивать, как мы, — он употребил именно этот уютный глагол, — не умеет никто.</p><p class="p1">А для нас — о, для нас наступило золотое время: в полузапрете, и более того — в обстановке непрерывного глумления мы стали беспрепятственно копить материал, который и не снился отцу-основателю. На кушетке рассказывают многое, поисками настоящего стимула — такого, чтобы выкладывали всю подноготную, — занимались во всем мире, и только в России, как всегда, пошли дальше всех. Конечно, многие слухи — вы знаете все эти преувеличения, — чистая клевета; ведь механизм понятен. Люди в приступе первого страха выкладывают такое, что самим потом стыдно, — вот они и выдумывают все эти глупости о пытках. Какие пытки, зачем? Сами рассказывают такое, что иногда, право, совестно слушать; с наслаждением, с опережением, до всякого вопроса сдают всех знакомых и близких родственников, которых втайне ненавидят. А с другой стороны — как не ненавидеть, живя в таких условиях? Сколько тещ, рассказавших всю правду про зятьев: не оценил фильм, выругался, слушая радио… Сколько невесток, свекровей! Незабываемо… Я не говорю уже о коллегах. Потом, конечно, от стыда начинают врать, что выколачивали показания… Да зачем выколачивать? Представьте ковер, который сам по первому требованию выпускает всю пыль…</p><p class="p1">Да вы знаете, сколько писем пишут совершенно добровольно? (Оба Горелова — и первый, и второй, — избегали все-таки слова «донос».) Или это тоже под пытками? Что вы, все так устроено, чтобы каждый по личному желанию выворачивался наизнанку. Я даже думаю иногда, — и Горелов уютно улыбнулся, — что и весь проект затеян нашими, чтобы создать условия, в которых люди добровольно выбалтывались бы до самого черного дна. Заметьте, ведь и я ни на чем не настаиваю. Людям просто не с кем поговорить.</p><p class="p1">И что же, спросил Боря, много интересного вы узнали? Повисла пауза. Я знал одного священника, заговорил Боря как-то суетливо, чтобы заполнить молчание, — спросил его, много ли интересного он услышал на исповедях? Ничего интересного, оказал священник, вот поверите ли — сплошная скука, не на чем глазу отдохнуть. Ну нет, помолчав еще немного, сказал Горелов. Что неинтересно священнику, то клад для психоаналитика. Они не умеют анализировать, и потому для них все это только шум. Священник вообще равнодушен к пастве, она его раздражает, как пациент — обычного врача. Но если есть мотивация… если из каждого случая можно получить новое знание… Нет, нам не скучно. «И что же сенсационного вы узнали обо мне?» — спросил Боря. «Когда-нибудь расскажу, — пообещал Горелов, — но сегодня знаю недостаточно. Кое-какие двери закрыты, вы их оберегаете. Одно могу сказать — вы напрасно чувствуете себя виноватым. Ради этого всё — женщины, измены… Можно даже сказать, что вы грешите нарочно, не ради удовольствия, а только чтобы острей чувствовать вину. Поэтому же вы бываете откровенны со мной. Всё ради одного». — «Зачем же мне это нужно?» — спросил уязвленный Боря. Он хотел, чтобы его слушали, но не желал, чтобы копались у него в душе. Неужели никто не может интересоваться им бескорыстно? «Это нужно вам затем, чтобы оправдать таким образом грядущие катастрофы, которые вы предчувствуете, — назидательно, чтобы не казаться слишком серьезным, пояснил Горелов. — Вы всегда сможете себе сказать: было за что. Таких, как вы, немного. Огромное большинство любит страдать незаслуженно».</p><p class="p1">И Боря кивнул: Горелов попал в точку. Состояние вины было для него естественно — и, пожалуй, необходимо.</p><p class="p1">Это началось давно. Но нельзя было чувствовать себя вечно виноватым, и все чаще он обвинял теперь страну. В самом деле, она неутомимо плодит виноватых, виноватыми легче править, а в России не бывает невинных, все помазаны с детства, с первых шагов, условия таковы, что невозможно не согрешить. Почему? Потому что с точки зрения какого-нибудь из одновременно существующих кодексов обязательно будешь виноват. А сосуществуют все эти кодексы потому, что нет единого. Как говорила непонятная женщина Джейн, с которой у Бори могло получиться, хотя он всегда чувствовал прочный барьер (который он мог бы, допустим, сломать, но тогда она ушла бы от мужа и осталась с ним, а удовольствие явно того не стоило), — эта непонятная Джейн даже теперь, когда уехала и вела практически антиамериканскую пропаганду, говорила: в Америке могут дружить люди разных взглядов, а в России нет. В чем дело? В том, что помимо взглядов у американцев есть нечто общее, и это больше любого разногласия. В России же людей не связывает ничего, кроме разве виноватости. Американцы, которых Боря видел много, объединены тем, что за ними стояла Америка, и это делало их защищенными. Их нельзя было трогать — как послов. Даже в России, где не действовал ни один закон — и даже закон всемирного тяготения действовал прихотливо, — с ними лучше было не связываться. Когда Борис встречал американца, он понимал, что американец неуязвим: его можно ограбить или убить, вот только худо тебе будет. Когда же — в Париже, например, — Боря встречал русского, и не жалкого эмигранта, а гордого советского гражданина, он чувствовал прежде всего эту уязвимость, потому что защищать такого человека никто бы не стал. Наоборот, Родина была бы только рада от него избавиться, у нее и так их слишком много. Чтоб ты лопнуло, проклятое, да зачем ты и родилося.</p><p class="p1">В России нельзя быть хорошим человеком, Боря понял это давно, потому что все коллизии, которые продуцировала Россия, были коллизии увечные, выморочные. Вот почему всякий моральный выбор непременно превращал тебя в подлеца. Если ты сопротивляешься, ты желаешь зла миллионам, которые счастливы. Если не сопротивляешься, ты предатель собственных взглядов. Слово «предатель» вообще становилось самым употребительным. Когда в июле тридцать восьмого не вернулся бывший командующий Балтфлотом, чье имя было теперь под запретом и родной его поселок переименовался обратно, — это было предательство; а если бы он вернулся, это была бы трусость, мерзость, шествие на заклание. И те, кто предполагали заклать, отлично это понимали. Они ненавидели всех, кто сопротивлялся, и презирали всех, кто покорствовал. Не было нормального сценария, вот в чем дело; эта система, изначально кривая, еще до всякого Октября, могла производить только больные ситуации, в которых правильный выбор отсутствовал. Тут мог быть лишь один путь — действовать так, как хорошо для тебя; по крайней мере, это надежный критерий, потому что все прочие менялись поминутно. И Борис успокаивал себя тем, что правых нет, а потому никто не в силах советовать ему; никто не может осуждать его за дружбу с Гореловым; никто не вправе попрекать его Алей. Он принимал решения только за себя, отшвырнув подлый принцип — «Действуй так, чтобы тебя можно было взять за образец». Тут никого нельзя брать за образец, и сама идея образца — глупая, подлая — чужда человеческой природе. Каждый решает в первый и последний раз.</p><p class="p1">Не сказать, чтобы он на этом успокоился, но ему полегчало.</p><p class="subtitle">— 5 —</p><p class="p1">В сентябре тридцать восьмого приехала Алина семья. Это случилось внезапно, Аля сама ни о чем не знала. Представить, что эта отдаленная, почти мифическая семья будет теперь рядом, он долго не мог. У них уже завелся собственный быт, комната на Даниловской одомашнилась, украсилась фотографиями — и Боря радостно замечал, что фотографии отца и матери, единственные, стоят у нее на столе, зато по стенам было пять снимков, где Аля с Борей: и в Крыму, куда ездили на две недели в прошлом году, на виноград, и на работе — оба с комически серьезными лицами за столом, и на набережной, и в парке, где снял их уличный фотограф, долго распинавшийся насчет классической красоты, звал Алю позировать и был вежливо окорочен. А теперь надо было делить ее с непонятно какими, неясно откуда взявшимися людьми, о взглядах и жизни которых он ничего не знал. Мать, по Алиным словам, была поэт, отец работал то журналистом, то в кино, всегда симпатизировал СССР и давно мечтал вернуться; охотней всего Аля говорила о брате, добром, но замученном родителями мальчике. С ней он отводил душу, но она в последние годы перед отъездом бывала дома все реже. «Мы все время ссорились. Мать помнила меня такой, какой я была до чешского интерната. Я всегда страшно ревела, уезжая в интернат, а они никто не хотели понимать. И там я как бы заснула, а проснулась по-настоящему уже только здесь». Боря не мог поверить, что ее, плачущую, могли отправлять в какой-то интернат. «Я была уверена, что мы бы прокормились. Я могла шить, вязать… Там все было невыносимо, и хотя я пробыла там только полгода, но, когда вернулась, они меня не узнавали. Только отец понимал, но ему было не до меня. Он весь был — тут, и очень жаль, что приехал только теперь».</p><p class="p1">Возвращенцы уже были, их становилось все больше; некоторые возвращались через Испанию, словно искупив там вину перед Россией, — Испания стала как бы мостом, по которому перебирались в Москву барселонские дети и французские скифы, как называли себя белогвардейцы, покрасневшие за границей. Отец что-то такое делал для Испании — но не в Испании; там воевал друг семьи. Отец выполнял какие-то поручения, завязывал связи, но в общем, как выходило по Алиным описаниям, был человек без профессии — слишком хороший, чтобы где-то трудиться постоянно. Аля цитировала иногда стихи матери, дала Боре пролистать купленную на развале книжку — он ничего не понял; трудно было представить, что Алина мать будет делать тут. Аля говорила, что в Париже ее ценили, но никто не любил. Очень по-русски, оказал Боря, и Аля почему-то обрадовалась.</p><p class="p1">Им выделили полдома на подмосковной даче, где с весны уже жили три возвращенца, и Боря поморщился — что же, теперь Аля будет проводить с ними все время? Но она его успокоила: там наверняка найдется где ночевать вдвоем, а комната в любом случае останется за ней, не таскаться же каждый день в редакцию на электричке! После упразднения Жургаза их журнал уцелел, да и кто бы на него посягнул? — все рассчитанное на экспорт имело шанс. Под предлогом работы она сможет ночевать в городе, но пока, первое время, им — Аля подчеркнула: им! — обоим надо будет помогать семье, бывать, видеться; и конечно, они его полюбят.</p><p class="p1">И настал день — теплый, один из последних в эту осень, — когда Леня повез их в поселок, где в тридцатом размещалась знаменитая колония-коммуна. Боря делал оттуда огоньковский репортаж со съемок «Путевки в жизнь», и ему там очень не понравилось. Дети выглядели наглыми и гладкими, оператор и актеры снабжали их куревом, а один из колонистов, в наряде на кухне, рассказал Боре, что актив всех давит и жизнь совершенно невыносимая. Это был тяжелый удар по Бориным взглядам. Сам он вслед за пушкинской запиской «О народном воспитании» полагал, что детей надо растить исключительно в лицеях, телемских обителях, где не мешает растленное влияние семьи, — и что Чернышевский был глубоко прав, полагая разрушение патриархальных семей единственной гарантией российской свободы. Но в колонии царила такая несвобода, что в сравнении с нею Телемской обителью была любая, хоть бы и самая растленная семья. Фильм вышел бодрый, такой же наглый и гладкий, как актив, а Боря с тех пор избегал заговаривать о коллективном воспитании. Он не отказался от своей утопии вовсе, но для нее еще не настало время; вообще все, что задумывалось в двадцатых, было рассчитано на еще не родившихся людей, а родившихся делало только хуже.</p><p class="p1">Дачный поселок имел странно унифицированный вид: двадцать бледно-зеленых домиков, одинаковых, недавно выстроенных, с застекленными верандами и отдельно стоящими то ли кухоньками, то ли домиками для прислуги. Переделкинские дачи, где Боре случалось бывать по службе, отличались куда большим разнообразием. Тут же все дышало казенщиной и строилось, видать, для казенных, а не творческих личностей. Аля уже успела встретить семью на вокзале, куда Борю предусмотрительно не взяла, и провести на новом месте вечер и ночь. Вещи пока не прибыли, задержались в Ленинграде, куда мать с младшим сыном приплыли пароходом; отец приехал еще раньше, но, по Алиным словам, сначала подлечивался в больнице, а потом в санатории. Аля с ним виделась, но Боре ничего не говорила. Это несколько насторожило, но он уже понял, что работа отца была не из публичных. О том, что делают скифы за рубежом и кем курируются здесь, он догадывался, но предпочитал не расспрашивать; ясно было, однако, что Аля тут совершенно ни при чем. Из рассказов об их парижской нищете он уяснил, что они если и выполняли поручения, то разовые: серьезным людям создали бы условия. Есть вещи, которые не подделаешь. Он скорее заподозрил бы себя, чем ее; и себя, кстати сказать, ему было в чем заподозрить.</p><p class="p1">На шестой даче от угла — или от поселкового магазина, как отсчитывала Аля, — их уже ждали за столом. Смотрины, хмыкал Боря. Аля относилась к этой встрече очень серьезно: «Пойми, я не смогу разрываться. Если ты им не понравишься, что же, мне придется выбрать тебя, потому что — отлепится от родителей и прилепится к мужу. Но это мне будет мучительно, я и так часто ссорилась с ними. Кроме того, ссоры ведь ничего не решают. Ссоришься, а любишь. Но ты увидишь, все будет как надо».</p><p class="p1">О том вечере у Бори сохранились странные, дробные воспоминания: он почти не помнил, о чем говорили за столом. Больше всех ему понравился младший брат, Георгий, со странной домашней кличкой Шур («Что, он Шура?» — «Нет, он в детстве все шуршал за диваном, там было у него свое царство, нора»). Отец был высок ростом, слишком красив, слишком доброжелателен, больше всех похож на Алю — но невыносимо чем-то придавлен; улыбался искусственно, дрожащей улыбкой, в разговоре цеплялся за что угодно, главным образом за ерунду, только чтобы не высказаться всерьез.</p><p class="p1">Зашел разговор о журнале, о том, как его ждали за границей, ибо он был единственным источником сведений о здешней жизни; особенно хвалили фотографии, и отец принялся расспрашивать Борю о фототехнике, о том, на каком оборудовании лучше всего делать панорамные снимки. Ведь там, вы знаете, этого совсем нет, там в прессе фотография такого качества, что стыдно в руки взять. Боря выказал полное невежество в этом вопросе: он отвечал за тексты, о фотооформлении следовала говорить с бильдом, как называли они оформителя на западный манер. «Да? — удивился отец. — Странно, мне казалось, вы как редактор должны быть универсалом… Скажите, а весь фотопроцесс, вся проявка, печать — это тоже у вас в редакции, или же вы отдаете в лабораторию?» — «Разумеется, лаборатория у нас, она занимает часть второго этажа». — «А где обучались фотографы, кто их готовит?» Все это он выговаривал искательно, имитируя бурный профессиональный интерес, Боря же ничего толком не мог ответить и все ждал, что Аля осадит отца; но Аля молча пила чай и смотрела в сторону. Мать тоже сильно нервничала, стучала пальцами по столу, отламывала мелкие куски хлеба и бросала в рот, явно не чувствуя вкуса. Боря ловко перевел разговор на Алю: мы не нарадуемся, она идеальный специалист, такого французского я не слыхал ни у одного француза… Аля плохо знает французский, сказала вдруг мать. Она знает газетный французский, Рабле она не смогла бы читать. Но нам и не нужен язык Рабле, возразил Боря и ввернул по случаю: универсализм подозрителен, ami de tous — ami de personne. У вас хороший выговор, равнодушно похвалила мать. Иногда Боря ловил ее странный, подозрительный взгляд, словно говоривший: что вы нашли в моей дочери? Зато Шур смотрел на него с обожанием: он, видимо, скучал по мужскому воспитанию, мужскому общению, отец с его неврозом явно не годился в вожатые. Шур старался всячески продемонстрировать осведомленность, взрослость, грубо осадил мать, когда та робко сказала, что пора бы ему укладываться, — причем осадил по-французски: lassez-moi! В семье наблюдалось неблагополучие по всем фронтам: Аля демонстративно брала сторону отца, отец то и дело вставал из-за стола, выходил в сад, возвращался, все много и жадно курили, разговор крутился вокруг внешних поводов…</p><p class="p1">Боря почувствовал необходимость вывести это пустословие на сколько-нибудь серьезный уровень и сказал: мне, вероятно, надо представиться и объясниться. Я будущий муж вашей дочери, простите мою самонадеянность, но мы так решили. Я все уже объяснила, прервала его Аля, уводя от темы. Нет, почему же, вдруг обрадовался отец, зачем же умалчивать, вы можете, если хотите, нам рассказать, как именно вы любите Алю. Ведь не за одни же ее профессиональные качества? Нет, сказал Боря, хотя профессиональные качества очень высоки. Я хочу сказать вам… — он сделал тут значительную паузу — это было чутье скорее журналистское, навык строить беседу, — хочу сказать, что моя жизнь была не совсем безгрешна. Мне, как-ни-как, тридцать семь лет, и я успел уже побыть в браке. Да много, в общем, было. Но говорю вам с полной искренностью, не знаю уж, насколько вы можете мне верить, — что ничего лучшего, чем ваша дочь, ничего более родного, чем ваша дочь, я никогда не видел. Мне тоже нравится моя дочь, сказал отец, но, кажется, ждал услышать нечто иное. Его волновал другой, незаданный вопрос. Но отвечать на этот вопрос Боря не собирался.</p><p class="p1">Отец был явно с примесью той крови, которая должна бы показаться Боре родной, но казалась как раз чужеродной. Есть среди нас, подумал Боря, не только бледные рыцари духа, но и смуглые рыцари наживы. Этот был как будто не из сефардов, но и ашкеназское в нем словно выродилось. Он был бледен, но не героической бледностью злобы, а голубоватой, венозной бледностью слабости. Когда-то, черт его знает, он, может, и годился в бойцы. Аля много рассказывала об его героизме. Но теперь его окончательно съела жена, женщина умная и притом истерическая, помешанная на собственной силе; с такими не то что связываться — разговаривать было нельзя.</p><p class="p1">Вообще обитатели дачи, насколько Боря успел рассмотреть их за десяток ночевок, — Аля привозила его на выходные и довольно бесцеремонно устраивалась с ним в кухонной пристройке — были люди жалкие, но сочувствия не вызывали: ощущался в них задавленный аристократизм, только без особых оснований. Они всё проиграли — сначала здесь, потом там, теперь из милости были возвращены и даже в известном смысле осыпаны благодеяниями. Пока пристроили их в поселке, где вполне можно и зимовать, а в перспективе маячили московские квартиры, вот чуть обустроимся. Перед иностранцами, хотя бы и местного происхождения, привычно лебезили. А с чего? за какие заслуги? Они были не героические бойцы, а банальные мещане, разговоры их были скучны, склоки невыносимы. Склочничали они, впрочем, всё больше от страха, ибо и сами понимали временность и незаслуженность благ. Они вечно ссорились из-за мелочей, из-за соли, поставленной не туда, и, как последние коммунальные скандалисты, припоминали друг другу грехи молодости, переходя, правда, на французский. В их беглом французском Боря половины не понимал. Еще бы, мы-то в Сорбоннах не обучались. Вражда его к ним была классовая.</p><p class="p1">Особенно невыносим был дядя Пузя, чьего настоящего имени никто не упоминал, — словно сошедший со сцены МХАТа комический пошляк, действительно пузатый, в вечных подтяжках. Дядя Пузя постоянно изрекал, то есть философствовал, и в пылу философствования внезапно формулировал. Особенно часто пускался он в рассуждения о том, что главной задачей человека является, в сущности, перевод мира на говно; больше всего он любил щеголять такими формулами за едой. Вероятно, он еще в детстве усвоил себе тон капризного любимца публики, и некому было ему объяснить, что прошло некоторое время, что анфан террибль давно уже не анфан… Жалела его одна Аля, остальные переглядывались и пожимали плечами. Аля, с вечной своей склонностью переплачивать всем, внушала Боре, что дядя Пузя — высокая и чистая душа. Чей он был дядя и кем приходился Селезневым, соседям по даче, — анемичной девочке, ее старому отцу и жирной, капризной матери — Боря выяснять не стал; приехали они все вместе.</p><p class="p1">Мать Али… О, как его раздражала мать Али! Цепкость бывших. Со всеми разговаривала на их языке. Ко всем старалась подольститься; особенно ужасны были ее разговоры с водопроводчиком, с электриком… Это был какой-то Афанасьев или Даль — ее русский язык, который она считала простонародным; выходило и глупо, и льстиво. С Борей она пыталась говорить о журналистике, но Боря раз и навсегда объяснил, что под него подлаживаться не надо: «Я вполне могу поддержать общечеловеческий разговор». Она не обиделась, да ей и было, кажется, совершенно не до него: была сосредоточена на своем. Она словно все ощупывала больной зуб, который страшно было лечить и нельзя выдрать, — занятие увлекательное, спору нет, но совершенно бесплодное. Этим больным зубом было будущее, которого Алина мать не принимала. Сама Аля тоже была будущим, и потому отец ее обожал и побаивался, а мать не могла и не хотела простить: она слишком помнила ее прежнюю. Боря чувствовал, что, оставаясь с Муреттой, он как бы движется против вектора времени, — а уходя к Але, становится солидарен с будущим, то есть встает на сторону естественного хода вещей. И это было так же позорно, как присоединение к большинству.</p><p class="p1">В декабре грянула история с Теруэлем. Это прозвище к нему приклеилось после им же, кажется, выдуманного анекдота: «Теруэль взят». — «А жена?» Конец Теруэля был концом Жургаза, но «Стройке» ничто не угрожало, как и любому экспортному продукту. Хочешь стать незаменимым — стань экспортным. А ведь Боря поначалу рассматривал ату должность как почетную ссылку, и только потом догадался, что ссылка — единственный способ пересидеть все прочие кары: тот, кто успеет пострадать раньше всех, в сравнительно мягкие времена, так и будет числиться уже наказанным, а возможно, исправившимся; еще Еремеев сказал, несколько подвыпив: «Мы закатились в щель, и это комфортная щель». Теруэль же всегда стремился на передовую, суетился, выдумывал, поскольку еще не понял, что пришли другие времена. Боря относился к нему сложно. К нему все относились сложно, по схеме «признавая несомненные заслуги, но». И вообще, заметил Боря, все эти люди, которые исчезали, имели свои «но», за что их непременно следовало арестовать, и только мы, оставшиеся, были совершенны и ни в чем не виноваты. Это сформировался такой подход, его усердно воспитывали в последние пять лет — и воспитали.</p><p class="p1">Так вот, Теруэля несомненно было за что. Он был активист, в самом деле хорошо придумывавший всяческие начинания. Он все время потирал руки — потирал, потирал, а вот и потерял, сказал про него Евсеев, тоже остроумный человек. Теруэлю страшно нравилось организовывать. И в этом не было бы ничего дурного, но во всех этих организованных им делах он непременно должен был быть первым, и именно с таким расчетом создавались все его журналы, книжные серии и международные конгрессы. Отсюда же была неизбежная второсортность этих начинаний, потому что и сам Теруэль был не первый сорт — в сравнении, скажем, с Эренбургом, — а уж все его назначенцы и вовсе мелкотравье. С Испанией у него не сложилось, хотя он рвался туда страстно — понимая, видимо, что на родине его потолок достигнут, да вряд ли и сохранится, а за границей есть шанс, и чем черт не шутит, он возглавит не только движение, но и партию, а там… И плюс, конечно, романтические мечты.</p><p class="p1">С Испанией вообще получилось очень плохо, даром что кампания была громкая, столько надежд, рывков, бросков, весь социалистический интернационал поехал спасать — и не спас. Потому что испанцы меж собой переругались, французы ничего не умели, американцы предпочитали писать репортажи, а летчики мало что могли, потому что войны решаются на земле. Находились люди, говорившие (еще вслух): куда мы полезли? У нас что, свои дела все переделаны? Но умные, вроде Теруэля, понимали, что без экспансии конструкция не устоит, а потому будет искать любой предлог для войны. Предлог и нашли, но сделать из Испании шестнадцатую республику не вышло, пришлось делать из Финляндии два года спустя. Не СССР распространился на Испанию — скорей часть Испании переехала сюда, все эти перепуганные большеглазые дети, которых Москва, Одесса, Свердловск тут же полюбили больше, чем своих, бледных и замызганных. До этого так же принято было любить негрских, как называла их Аля, потому что и в самом деле негрские детки очень хороши; в фильме «Цирк» все интернационально баюкали именно черного ребенка, потому что свой тут же искусал бы их, как сказано в классике, сопливым ртом своим.</p><p class="p1">Теруэля не было жалко именно потому, что все его проекты служили лишь его собственному величию, потому, что романтизм его совмещался с цинизмом, скорее еврейским, чем государственным; потому, что фельетоны его были натужны; потому, что он был помесью Эренбурга с Авербахом, авербургом, как называл его еще один остроумный человек. Остроумных людей становилось все больше, а организаторов все меньше. И когда стало известно про Теруэля, взятого, на этот раз без всяких анекдотов, прямо в ночь после его триумфального доклада в Домжуре, Боря подумал, что это логично. Все теперь было логично и никого не жалко. И Горелову на вопрос о настроениях он так и сказал: давно всем надоел. И Горелов кивнул как-то даже сострадательно.</p><p class="p1">…И, как всегда, оказалось, что Боря все знал. Пакт был неизбежен, органичен, понятен. И это позволяло так спокойно, так высокомерно выслушивать августовские разговоры: не может быть, как же так, что теперь делать?! Если бы рядом оказался Сергеев, тихий честный Сергеев, он подтвердил бы, что в тридцать третьем году, в мае месяце, Боря Гордон, тогда корреспондент «Наших достижений», сказал ему в той открытой манере, которая практиковалась еще в тогдашних разговорах: вот ты увидишь. Я не говорю, — опередил он готовое вспорхнуть возражение, — что это идейно близко. Но это стилистически близко, а стиль решает все, вот ты увидишь. Да ладно, воскликнул Сергеев, ладно, о чем ты!</p><p class="p1">Они разогнали коммунистов, они провозгласили германизацию Востока, и все знают, о чем речь! Спокойно, сказал Борис. Все станет видно очень быстро. Да, собственно, уже и сейчас. Вы все исходите из каких-то теоретических вещей, а нет ничего, что отбрасывалось бы легче теорий. Есть только дух, а дух един. Сказать ли тебе, чьим любимым чтением был старик Гегель? Сергеев не догадался, и слава богу. Но они жгут книги, вскричал он, книги, разве ты не понимаешь?! Разумеется, ответил Боря, но посмотри — я ведь научился все понимать по тону, а не по содержанию. Наши безумно, безумно рады ему. Гитлер — то, что надо. И то, что он разогнал коммунистов… помилуй, кому нужны сейчас те коммунисты? Кому нужен новый интернационал? (Знал кому, но всуе произносить это имя было небезопасно уже года четыре. Бога поминай осторожно, Сатану — еще осторожнее.) Я чувствую их кровную близость, потому что общий враг у них один; нет, не евреи, как ты подумал. Просто евреи всегда стараются оседлать будущее, чуют его первыми. Вот будущее и есть тех двоих единственный враг, потому что в будущем их одинаково нет, — понимаешь? И даже если они сцепятся в какой-то момент — во что я не верю, потому что это будет самоубийством для обоих, — если даже они сцепятся, то с единственной общей целью: положить в этой схватке побольше будущего, убить всех. Так уже было в четырнадцатом. Ведь что тогда случилось? Причин не было никаких, передел мира — внешняя вещь, которая не прекращается никогда. Случилось то, что они все почувствовали: будущее уже здесь. Оно рисует картины в Париже и, что самое обидное, в Бугульме, оно кокаинится, разгоняя мысль до нужной скорости, строит машины, пишет небывалые хроники. И чтобы задушить это будущее, они кинули его в топку. Кое-каких остатков еще хватило, чтобы сделать страну будущего у нас, потому что мы были в этой цепи самое слабое звено и, заметь, использовали первый повод, чтобы выйти из войны. Но у слабого звена свой минус — оно переродилось быстрей, чем что-то успело оформиться. Будущее проклюнулось у нас и попробовало проклюнуться у них — свое они задушили в ноябре восемнадцатого, мы свое душим сейчас. Один тут это понял еще в тридцатом и застрелился. (Про того, кто понял в двадцать третьем, он опять промолчал.)</p><p class="p1">Сергеев перестал улавливать его мысль, довольно нехитрую, впрочем, — и тогда Борис сказал прямо: поверь мне, сказал он, я принадлежу к самой уязвимой нации и все такие вещи чую. Они потому именно и взялись сначала за нас, что мы всё чуем. И сейчас я безупречно чувствую обоих: они — одно. Они помашут кулаками, но в будущем обязательно заключат союз. Я не знаю, против кого (потому что против нас — это само собой, но нас им надолго не хватит: этой печке нужно долгое топливо). Может быть, это будет владычица морей, а может быть, Япония, кто знает; но они найдут врага. Америка — тоже хорошо, вот только она далеко. Там, в сущности, другой мир. Исторические союзники — стопроцентно мы, никто иной. А итальяшки… Бог мой, что такое итальяшки?.. Я просто слышу, это ни с чем не спутаешь, — я знаю эти интонации, у нас долгий опыт толкования священных текстов, мы и газету читаем между строк. И я слышу: они рады. Гитлер тоже социалист, он мужик, он народный оратор, и сколько бы там сегодня ни кричали, что за ним стоит крупный капитал, — мы знаем, что за ним стоит пролетариат. То, что он говорит, и то, как он говорит, рассчитано не на капитал. И голосовал за него самый что ни на есть пролетарий, которому надоела европейская импотенция. Пролетарию желателен стальной кулак. Я не исключаю, что когда-нибудь в дальнейшем мы с ним рассоримся. Но это случится только после того, как вместе с ним, в два стальных кулака, мы всё здесь устроим по своему образцу. Я физически чувствую, — продолжал Боря уже самому себе, возвращаясь домой пешком, чтобы хоть немного остудить голову и лицо, — я физически чувствую, как сужается пространство моей жизни, как мне и всему, что мне дорого, не остается места. Сергеев тогда меня не понял, а надо было прислушаться: есть народы, которых сама история научила заранее трепетать, и есть представители этих народов, которые особо приспособлены к трепетанию. Эти представители — изгои среди изгоев, и среди евреев тоже такие есть — те, кто оторвался от корней. Они ни для кого не стали своими, но перестали быть и частью своего гетто; всё, что они выиграли, — сорванную кожу, невыносимо обостренное чутье. И потому я знаю все, что будет, говорил Боря невидимому Сергееву.</p><p class="p1">У Сергеева, видно, тоже было какое-то чутье, присущее тем, кто отстал от одних и не пристал к другим: он был фотограф, пролетарий репортажа, но наслушался журналистских разговоров и стал слишком умен и восприимчив для своего пролетарского монолита. А в журналистский цех его не брали, туда вообще не берут, а просто либо родишься таким, либо нет. И потому он еще в тридцать пятом что-то почуял, уволился отовсюду и, ни к кому не зайдя проститься, убыл на Дальний Восток. Там нужны были и фотографы, и радиомеханики, и вообще люди с умными руками. И некому было теперь подтвердить, что уже в мае тридцать третьего Боря все понимал.</p><p class="p1">Все понимал, однако, не он один. Ведь пророки есть не только среди жертв, но и среди хищников: вот где чутье, вот где запах кровушки, как любовно выражался Меркушин. В тридцать третьем бесстрашно разговаривал Боря, а теперь Меркушин. Еще два года назад его бы за такие разговоры, донеси кто, — а недостатка в желающих не было, — не просто взяли, а, пожалуй что, и шлепнули бы без долгих разговоров. Но враги теперь были другие, Меркушин это чувствовал и ничего не опасался. Он вел эти разговоры в советском доме, в советской компании, в самой прогрессивной среде. Он был критик и, стало быть, транслировал установку. То есть не боялся, если б кто-то и донес. Некто явился бы с сообщением и услышал в ответ: да что вы тревожитесь, все правильно. Попили нашей кровушки.</p><p class="p1">— Ну, теперь конец, — говорил Меркушин с большим удовольствием. — Теперь быстро к ногтю,</p><p class="p1">— Кого же? — радостно подзуживая, спрашивал хозяин квартиры, драматург Кудряшов, вполне соответствовавший фамилии: у него, как у многих русопятов, были слабые, тонкие, кудрявые белые волосы, их называют еще льняными. Он был из тех, кто называет себя русачками.</p><p class="p1">— Да жидков, жидочков, — без злобы, с добродушием сытого кота пояснял Меркушин, хотя Кудряшов явно знал ответ. — Теперь жидочкам-то и конец, потому что наш берлинский друг ни за что не будет с нами дружить, ежели не станем соответствовать. — Меркушин уже пущал и «ежели», и «доколе», и прочие трели. — Так вышло, что русачкам без немецкой машины никуда. Вот она, немецкая машина, аккурат как при Петре. Косточки русские, инженеры немецкие. Ах, зачем так торопился Николай Васильевич? Ведь он все понимал, и уже сегодня все осуществилось! Что бы подождать годочек…</p><p class="p1">Годочек, русачки, жидочки, кровушка — все было мерзко, ласкательно, как подслащенное дерьмо. О каком Николае Васильевиче шла речь — Борис сначала не понял, погрешив было на Гоголя, тоже большого нелюбителя робкого племени; но Гоголь в прошлом году ничего не публиковал. Какой-то Николай Васильевич, оказывается, еще в тридцать четвертом все верно истолковал и повторял не ко времени, а в институте транспорта, где он служил, нашелся доносчик, понятно из кого. И если бы в тот вечер Борис дал пощечину Меркушину, а то и Кудряшову — за напряженное подобострастие, с которым тот ловил каждое слово, — его совесть, может, была бы спокойней; но возьмите же в расчет и давление воздуха! Еще два года, еще год назад, — но теперь! Теперь начиналось такое, что он забывал, на каком свете засыпал, — потому что просыпался каждый раз на другом. Все портилось стремительно, бесповоротно и так наглядно, как он себе даже не представлял. И самое ужасное, что многие были рады. Удивительно еще было, что радовались не все. Но общий восторг был нескрываем: у газетных стендов Боря видел безмятежные лица. Находились умеренные оптимисты, уверявшие, что мы выигрываем время; их было немного. Большинство только начало обрастать если не жирком, так хоть мясом; вообще все начали радоваться, радость стала хорошим тоном, непременным условием нашести, родности. И вдруг вся эта радость оказалась бы под угрозой, — помилуйте! Постоянно нависающая война, которой пугали отовсюду, все эти песни, пьесы, весь этот «Большой день»… Теперь же и «Большого дня» никакого не было, и автор его был исключен отовсюду, а потом, как положено, пропал, — то ли уехал, как умный Сергеев, то ли по-кроличьи ожидал участи по ночам и дождался… Говорили, что несколько раз он приходил ночевать — к кому же?! — к Добрыгину, которого так долбал пять лет назад! «У вас меня точно не будут искать», — сказал. И ему постелили.</p><p class="empty-line"/><p class="p1">…А в сентябре уже посыпалось всё, разверзлась яма: не бездна, которая бывает звезд полна, а выгребная яма истории. «Наших братьев угнетало панство, с нами рядом мучился народ, изнывало нищее крестьянство, но пришел тридцать девятый год» — нет, такого не выдумал бы и сам Боря, вечный насмешник. Главными врагами были теперь поляки. «Красная звезда» благожелательно пересказывала речи Гитлера, намерение его говорить с Польшей тем же языком, «каким Польша посмела говорить с нами». Словно едва сдерживались и тут наконец, получив разрешение, рванули — с такой жадной радостью принялись наконец его нахваливать, не придерживаясь даже нейтралитета для вида. Присоединение Данцига было встречено восторгом, и ясно было, что это зеленый свет: теперь пойдут кроить Европу, как пожелается. Когда Фрик зачитывал меморандум о Данциге, в рейхстаге, говорят, плакали. Потери немцев в Польше, радостно сообщал ТАСС, были незначительны. 17 сентября Красная армия при дружном ликовании населения вошла в Польшу. Польша называлась теперь Западной Украиной и Западной Белоруссией. Прочая Польша была Германией. Польши, собственно, больше не было. Ждали семнадцать лет — и дождались. «Да если хотите знать, — говорил Серов, — никакой Польши и не было никогда. Фальшак-государство. И если б мы не ждали неизвестно чего, а раньше туда вошли — не было бы всего этого гнойника на границах».</p><p class="p1">Как всегда, Серов придумал это не сам. Это написано было открытым текстом. «Польско-германская война выявила внутреннюю несостоятельность польского государства. В течение десяти дней военных операций Польша потеряла все свои промышленные районы и культурные центры. Варшава как столица Польши не существует больше. Польское государство и его правительство фактически перестали существовать. Тем самым прекратили свое действие договоры, заключенные между СССР и Польшей. Предоставленная самой себе и оставленная без руководства, Польша превратилась в удобное поле для всяких случайностей и неожиданностей, могущих создать угрозу для СССР». Это было даже игриво — всяких случайностей и неожиданностей, без уточнения, разумеется! Приятная случайность, детская неожиданность. Весь тон был глумлив, как у насильника, стоящего над жертвой руки в боки: что ж ты, милочка, за себя не постояла! Вообще документы молотовского наркомата поражали — при Литвинове такого все-таки не было: появилась некая германская, риббентроповская лощеность. Но в сочетании с самым трамвайным хамством выглядела она, как парфюм на немытом теле, как изысканные манеры карманника; при виде этих новых людей из наркомата Боря всегда отчего-то представлял, что при всем своем лоске срать они будут орлом, а сморкаться при помощи пальцев. О Литвинове теперь говорили с презрением: не сознавал момента, пытался сталкивать исполинов. А надо было… Но это теперь они стали такие ушлые. Скажи им кто-нибудь хоть в июле!..</p><p class="p1">Нет, всякое у нас бывало, конечно, и много чего Боря заставил себя забыть; но чтобы у мира на глазах присоединиться к самой черной силе — такого он все-таки не ждал. Прежде можно было поругивать, посмеиваться — но самому себе говорить: все-таки было хуже… все-таки просвещение для всех… все-таки первый в мире опыт… Больше ничего этого не было. Все было брошено в топку, и все сопровождалось полным отказом от приличий. Боря не знал теперь, для чего он нужен, но это бы полбеды. Боря не знал теперь, для чего нужно всё.</p><p class="p1">Да-с, вот так! Внезапно оказалось, что в стране существует народ, и теперь он внятно заявил о себе. То есть народ был всегда, но он был где-то там. Его вели, за него решали. Всегда, и особенно в новом курсе партийной истории, он был сила, воспитанная и вдохновляемая вождями. У него был передовой отряд, количественно малочисленный, и этот отряд тащил за собой остальных. Но тут обнаружилось, что дело не в отряде, что самая-то массовая масса как раз и есть то что надо. Закончилась апология меньшинства, в моду вошло количество. Для начала заговорили о том, что мы самые большие; раньше были передовые, теперь огромные, а это уже другое первенство. Вслед затем оказалось, что главная наша доблесть — воинская, что наше дело — присоединять, что наши предки обильно полили и т. д. Вся земля была наша, просто не вся еще к нам вернулась, Украина и Белоруссия были столь же исторически нашими, как Данциг и Судеты — немецкими; то есть в принципе и они — наши, но пока мы позволяли немцам иметь на них виды. Вдруг стало видно далеко во все концы света, и все эти концы были наши. Передавались стишки, слишком лояльные, чтобы их напечатать: но мы еще дойдем до Ганга, но мы еще умрем в боях, чтоб от Японии до Англии сияла Родина моя. Появились роялисты правее короля. Все дежурные проклятия коричневой чуме были забыты. Боря не думал, что способен так удивляться.</p><p class="p1">Народ желал воссоединяться, не особенно спрашивая у облагодетельствованных западных территорий. Народ целовался. Народ осознал себя главной силой, потому что былые водители его были большей частью истреблены. Народ желал раздуваться вширь. Это был еще один заход на войну, третий и самый успешный, — ни Испания, где проиграли все, ни Япония, от которой отвоевали кусок никому не нужной Монголии, не могли утолить народной жажды. Польша — это было уже кое-что, уже месть; но Польшей и Монголией, конечно, не ограничивались. Англия — вот была первая мишень, Англия, укрывшаяся за проливом. Далее, рука об руку с немецким братом, мы доберемся и до тех, кто отсиживается пока за океаном… и как же они всегда умудрялись вступать в союз с мерзейшими! И только в таком союзе все у них выходило — потому и в Испании не вышло.</p><p class="p1">Народ торжествовал. Не было ничего отвратительнее народа. В сущности, вся жизнь Бори, все его таланты и темперамент уходили на то, чтобы превратить народ в людей, — но теперь обо всем людском можно было забыть. И они, поколение модерна, убитого в Европе, чудом уцелевшего здесь, — подошли к той мясорубке, куда их намеревались сбросить: народ отомстил за все.</p><p class="p1">Ночь на 22 сентября, на воскресенье, Боря провел в городе. Он не стал врать Але — в последнее время никогда не врал, да и не было необходимости, ибо он уже принадлежал ей весь, со всей своей ложью, — и честно сказал, что у жены недомогания, головные боли — последствия травмы, и надо ночевать дома. Между ним и Муреттой давно ничего не было. Муретта преувеличивала свое уродство и вполне могла нравиться, если бы хотела (и хотела, он знал, — шрам и скандал придавали пикантности), но для него после больницы все было кончено. Не было даже сострадания. Она удержала его, но потеряла право на сочувствие.</p><p class="p1">Сон не шел, Боря пробовал сочинять, ничего не выходило, разболелась голова, он долго курил в форточку, думал, так ничего и не надумал. Муретта под утро — не открывая глаз, словно разговаривала во сне, — сказала ласково: «Все равно ты сейчас у нее». Он не стал разубеждать. «Всегда надо делать то, что хочется, — ровно продолжала она, — иначе добра никому не сделаешь, а себе все испортишь». Ну вот, хотел сказать он, ты сделала все, как тебе хотелось. Хотела покончить с собой, но не до конца, удержать мужчину, но не любовь его, а присутствие, — и вот что ты сделала: могилу на двоих. Но он опять смолчал, а потом сморил его тяжелый рассветный сон, в котором он все время помнил, что надо проснуться, очень скоро проснуться. И в то самое время, как он заснул, брали Алю, — словно только его бодрствование и хранило ее.</p></span>
