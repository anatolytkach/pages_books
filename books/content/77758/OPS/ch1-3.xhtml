<span><p class="p1">— Я не знаю, что ты с ней делал, — утомленно выговорил Драганов. — Ты это все будешь объяснять теперь не мне. Но она написала на тебя заявление, что ты, оскорбив тем самым память погибшего друга, полез с поцелуями к его вдове. Ни о чем с ней предварительно не договорившись. — Он неприятно усмехнулся. — Мне по-хорошему следовало бы эту бумагу, конечно, того… Я мог бы ей объяснить, что так не делается, что нечего свою вдовью честь носить как медаль и так далее, тем более что никакая она не вдова и у Тузеева имелась невеста еще в Сталинграде. Прислала мне письмо, между прочим, со стихами героя. Но поскольку Крапивина уже успела растрепать, а товарищ Тузеев пал смертью храбрых, то я обязан дать ход.</p><p class="p1">— Товарищ Драганов! — быстро заговорил Миша. — Это бред какой-то! Я не трогал ее вообще!</p><p class="p1">— Гвирцман, — протянул Драганов. — Ну Гви-ирцман. Ты это будешь рассказывать на факультетском собрании. И если оно решит, что ты никого не трогал, то мы примем соответствующее постановление. Мы постановим, что она сама себя трогала.</p><p class="p1">— Какое факультетское собрание? — вскочил Миша. — Вы понимаете вообще, что говорите? Это теперь каждый, кто кого-то поцеловал, даже не поцеловал вообще…</p><p class="p1">— Сядь ровно, — сказал Драганов, и было в его тоне нечто, от чего Миша погас и сел. — Гвирцман. Ты должен говорить не то и не так. Ты еще не понимаешь, но я тебе сейчас объясню, дважды объяснять не буду. Ты должен кивать и повторять: ужасно виноват, не сдержался, подвергся гибельному очарованию. Надевай же платье ало и не тщись всю грудь закрыть, чтоб, ее увидев мало, и о протчем рассудить. Потому что рассуди ты сам, кто хуже: откровенный развратник или скрытый враг? Товарищ Смирнов, отделавшийся легким испугом, явился на семинар пьяным и в том каялся, плакася горько. Теперь представь, что товарищ Смирнов принялся бы утверждать, что он не был пьян, и тем поставил бы под сомнение объективность всех однокурсников? Которые ясно чувствовали, что от него пахло? Тебе сильно повезло, что ты к ней полез с поцелуями, а не с разговорами. Воспользуйся же этим и делай, как я тебе говорю.</p><p class="p1">Миша весь покраснел, чувствовал, как кровью наливается затылок, как шумит в ушах и как он перестает понимать, на каком он свете. Это было попадание в «Уленшпигеля», в донос инквизиции.</p><p class="p1">— Разврат — это хорошо, простительно. Ну у тебя был порыв, ты понимаешь? — И Драганов поднял на него голубоватые, а может, и зеленоватые, а впрочем, какие угодно глаза. В этих глазах не было сострадания, только утомление. — И если ты поведешь себя правильно, то есть горячо раскаешься и свалишь все на безусловный инстинкт, согласно учению товарища Павлова, то отделаешься, как Смирнов. Если скажешь, что был пьян и плохо соображал, это будет вообще прекрасно. Алкоголик — это уже родной. Ты понял?</p><p class="p1">— Но товарищ Драганов! — Миша не желал ничего понимать. — Я клянусь, что ничего не было, нельзя же признавать, это значит ввести в заблуждение… ведь она про кого угодно так скажет…</p><p class="p1">— Но она сказала про тебя, — уже без всякой снисходительности припечатал Драганов. — И заявление у меня лежит на тебя. И она повторила при свидетелях. Пойми, это совершенно неважно, виноват ты или нет. Когда-нибудь ты это поймешь. Считай, что это входит в обязательные требования. Что когда-нибудь любой должен оказаться виноват и с готовностью принять. Тебе ясно? Ты же не будешь прятаться, когда тебя призовут? Вот считай, что тебя призвали. Каждый должен быть готов убить врага, когда это надо, и прикрыть собой командира, если надо, и заткнуть пробоину своим телом, если надо. И сейчас тебе надо сказать: виноват, я ужасно виноват. Это каждый должен уметь делать, и ты плохой комсомолец, если не умеешь. А приставал ты там, не приставал… Теперь понятно тебе?</p><p class="p1">Мише ничего не было понятно, но он кивнул. Он видел, что почему-то неприятен Драганову и что весь этот разговор его тяготит — потому, вероятно, что Драганов был не сволочь и не получал удовольствия от расправ. В действительности же он был Драганову неприятен именно тем, что не желал сознавать очевидного; что с точки зрения Драганова человек, не желающий признавать себя виноватым, был дезертиром и нарушал собой высокий смысл игры. Эта игра Драганову тоже не очень нравилась, но в ней был смысл или, верней, отсутствие смысла, почти ветхозаветная торжественность. Миша же пошлыми ссылками на свою невиновность вносил в эту ситуацию нежелательную рацею. Ломоносов, главный предмет его занятий, — он-то все понимал и при виде северного сияния не задавал лишних вопросов, а сразу начинал сочинять о Божием величестве. Песчинка как в морских волнах, как мала искра в вечном льде. Вопрос «Но где ж, натура, твой закон?» является в этих обстоятельствах риторическим. Зато смотри, какой у меня левиафан. Почему все виноваты, а ты не виноват? Кто сказал тебе, что ты не виноват? Пожалуй, следовало бы тебе объяснить кое-что. Но Мишу было жалко, и Драганов искренне пытался его вытащить — вопреки собственному настроению и здравому смыслу.</p><p class="p1">— Короче, Гвирцман, — сказал он. — Мое дело — дать тебе разумный совет, а твое дело — послушаться. Пойди подумай. Послезавтра будет собрание, и лучше тебе за это время подготовиться. Если будешь трепаться — пеняй на себя. До свидания.</p><p class="p1">Послезавтра! — о, это была отдельная мука. Если бы завтра, а еще лучше сразу! Были друзья, тогда казалось — настоящие, и Миша мог бы рассказать им, но Драганов рискнул собой, пытаясь его спасти (так это ему казалось), и он не смел подвести секретаря. И что было рассказывать? Что он не приставал к Крапивиной? Смерть чиновника! Пойти к Крапивиной? Но Миша и представить этого не мог. Это было унижение, хуже унижения. И главное — он до конца не верил. Она не могла.</p><p class="p1">Можно было, конечно, поговорить с ней начистоту, пусть бы она не брала назад заявление, черт с ним, посмешище так посмешище. Но она по крайней мере объяснила бы ему, чего хочет. Странно: Миша и тогда еще, накануне собрания, больше беспокоился о том, что думает и чего хочет Валя, и зачем она все это затеяла. Ему и в голову не могло прийти, конечно, что будут какие-то последствия. Даже не пожурят, все выяснится. Ведь он ничего не сделал. Он сам не понимал, что существует уже в больной логике: постоянно оправдывается перед невидимыми милостивыми государями. Милостисдари! Ничего не было! Он, конечно, не выдержал бы и подошел, появись она в институте накануне собрания. Но она не пришла, и Миша кипел в собственном соку. Обсудить ситуацию было не с кем. Никаких объявлений не было. Хотели врасплох, чтобы никто не успел подготовиться. Настало девятое сентября, и к этому дню Миша почти уговорил себя, что все это сон, бред, ничего не будет, в крайнем случае сделают замечание. Он с детства, когда бывали неприятности, словно уплывал от них, прятал голову под крыло, воображал себя в другой стране, в полной недосягаемости.</p><p class="p1">Комсомольское собрание было объявлено после четвертой пары, В ИФЛИ курсы были небольшие, и потому собрания бывали общими для всех возрастов. Но клеймили на них редко — на Мишиной памяти только Соломину, за утрату бдительности (отец проворовался и сел, она не желала отрекаться. Но отец ее в самом деле был скользкий тип, и хоть она не отреклась, что пристойно, но вела себя до разоблачения с откровенным и глупым чванством).</p><p class="p1">Под сборища отведена была пятая поточная аудитория, огромный желтый амфитеатр торжественного античного вида. Здесь читалась новейшая история. Теперь она здесь делалась. Никто не догадывался о поводе. Пересмеивались. Зашли несколько преподавателей, главным образом аспиранты. Миша с отвращением заметил Евсевича — тот, конечно, не мог упустить такого случая поквитаться. Потом он увидел Валю, которой не было на занятиях, — пришла перед самым собранием: она сидела одна на предпоследнем ряду, глядя прямо перед собой с выражением решительным и несчастным. Миша тоже сидел один, а не с Борисом и компанией, как обычно. Но она выглядела такой затравленной, словно обсуждать собирались ее, — да так оно, в сущности, и было.</p><p class="p1">Ее заставили, догадался он, но кому он до такой степени помешал?</p><p class="p1">— Товарищи, — сказал Драганов высоким измывательским голосом, выходя к трибуне. — Я попросил вас собраться, чтобы экстренно отреагировать на жалобу комсомолки Крапивиной. Вдова… подруга нашего студента Николая Тузеева, павшего в бою под Суоярви, подверглась домогательствам в грубой форме со стороны нашего студента, нашего товарища. — Он сделал паузу, чтобы каждый в ужасе успел себя спросить: неужели я? Но нет, и в мыслях не было! — Михаила Гвирцмана.</p><p class="p1">По амфитеатру пронесся вздох, точней, выдох: от Гвирцмана никто не ждал насилия, и, следовательно, ничего серьезного. Миша стыдно заулыбался, покраснел и подавил желание раскланяться. Сойферт ему даже подмигнул. Могло обойтись, могло.</p><p class="p1">— Я не буду просить комсомолку Крапивину поделиться обстоятельствами. Поверьте, они имели место, ситуацию я изучил. Мы заслушаем товарища Гвирцмана, и он лично нам все изложит. Предлагаю высказываться по существу вопроса.</p><p class="p1">— Какое существо? — закричали с мест. — Мы ничего не видели!</p><p class="p1">— Гвирцмана надо поощрить! — крикнул кто-то дурашливым голосом. — Он пренебрегает женщинами, это обидно!</p><p class="p1">— Я хотел бы призвать к серьезности! — пропел Драганов, словно готовясь в любой момент перевести судилище в фарс. — Товарищ Крапивина считает себя оскорбленной!</p><p class="p1">— Выслушать Крапивину! — крикнули несколько голосов.</p><p class="p1">— Товарищи, я не знаю, насколько удобно… Вы готовы высказаться, товарищ Крапивина? — спросил Драганов предупредительно.</p><p class="p1">— Я готова, — сказала Валя и встала. — Позвольте мне с места!</p><p class="p1">— Разумеется, — закивал Драганов, — разумеется.</p><p class="p1">— Третьего числа, — сказала Валя и замолчала. — Сего года, — добавила она. — Мы были у Клары Нечаевой. Там все немного выпили. Сильно не выпивали.</p><p class="p1">По амфитеатру снова прокатился шум одобрения.</p><p class="p1">— Так всегда бывает, когда недостаточно, — крикнул тот же шут.</p><p class="p1">— Но некоторые потеряли контроль, и вот Гвирцман, — сказала Валя и опять помолчала. — Во время танцев. Позволил себе. Нас никогда не связывало ничего. Я вообще ни с кем, ничего не позволяла. Как вы знаете. Но Гвирцман неожиданно. Он ни о чем меня не предупредил.</p><p class="p1">— Что же он так! — крикнула, кажется, Саша Бродская.</p><p class="p1">— И вот, — в час по чайной ложке цедила Валя. — Он попытался поцеловать меня, я уклонилась. Он попытался меня обнимать, я еще уклонилась. Было замечено, обратили внимание. Про меня подумали я не знаю что. Я хотела дать пощечину, но удержалась. Он сам понял. И поскольку я считаю, что это аморально, то мне бы хотелось осудить. Чтобы осудили все.</p><p class="p1">— Какая-то она прямо уклонистка, — шепнул Мише Полетаев, перегнувшись сзади.</p><p class="p1">— Ну, товарищи, вы теперь все слышали и можете высказываться, — предложил Драганов.</p><p class="p1">По-школьному подняв руку и не дожидаясь разрешения, встала Голубева, вся красная, порывистая, с вечным гниловатым запахом изо рта. Миша был уверен, что она собирается его защитить, и ему стало стыдно, что он вспомнил об этом запахе.</p><p class="p1">— Вот я слышу сейчас смешки, — начала Голубева, словно еле сдерживая рыдания. — А ведь, товарищи, мы непонятно над чем смеемся. Это с домостроя идет неуважение к женщине, и все эти разговоры, что если женщина говорит нет, то это значит да. Я вижу, к сожалению, и в нашей среде такие явления. У нас, у которых должен быть, казалось бы, новый быт, на двадцать третьем году революции, у нас самая разнузданная жеребятина. Это не мещанство даже, это люмпенство, товарищи. И то, что так называемый поэт позволяет себе… я лично никак не ожидала. Но если задуматься, товарищи, то я ожидала. Я должна была ожидать, потому что такие проявления я вижу. И я знаю, что многие девушки просто стыдятся заявить. А я считаю, что тут нечего стыдиться!</p><p class="p1">— Долой стыд! — крикнул шут, но никто не засмеялся: дело принимало серьезный оборот.</p><p class="p1">— Разрешите мне, — сказал Круглов, юноша серьезный и действительно круглощекий, похожий на Дельвига — апатичный, но способный на внезапные резкости. — Мне представляется, товарищи, — сказал он, почесываясь, — что мы несколько, э, полезли не в свою сферу. Еще Энгельс предостерегал от вынесения частной жизни на общественное рассмотрение.</p><p class="p1">— Это где же? — спросил кто-то с места. Миша подозревал, что Энгельс ни о чем подобном не предостерегал и даже не думал, ему в голову не могло прийти такое мероприятие на двадцать третьем году диктатуры пролетариата, но у Круглова были ссылки на большинство полезных цитат, а если надо было, он не затруднялся с изобретением нужного высказывания.</p><p class="p1">— В «Происхождении семьи, частной собственности и государства», — отчеканил Круглов. — Там прямо сказано, что вопросы личной жизни не должны рассматриваться в публичных собраниях. Мораль не формулируется большинством голосов. Я там, так сказать, не присутствовал, лампу, так сказать, не держал. Мне кажется, что товарищ Крапивина поступила бы мудро, если бы она лично обсудила ситуацию с Гвирцманом, возможно, даже дала бы ему пощечину, от которой так мягкотело уклонилась, и мы не должны были бы сегодня тратить время на порицание поцелуя, вдобавок, сколько можно понять, несостоявшегося.</p><p class="p1">Круглова любили, кто-то даже зааплодировал. По нему было видно, что он может так себя вести, что ему разрешили, а человека, которому разрешили, всегда видно, даже если он сам себе все позволил. И после этого все могло рассосаться, потому что Драганов — Миша ясно это видел — и сам хотел, чтобы обошлось. Он готовился уже подвести итог, вынести порицание, призвать крепить и все такое. Но тут встал Никитин, и разразилось то, о чем Миша и теперь не мог вспоминать без отвращения.</p><p class="p1">Ждать такого от Никитина было невозможно, чай, не Голубева. Никитин был дерганый, хлипкий, сутулый человек, с влажными руками и нервным тиком. Его никто не любил, но так, как не любят явление значительное, заставляющее себя терпеть. Он что-то писал, что-то вечно неоконченное, но, по слухам, замечательное. Он читал Джойса. Миша почитал однажды Джойса в одном номере «Интернациональной литературы» и понял, что это искусство верхних десяти тысяч, по большому счету — не нужное никому. Никитин всегда говорил глупости, но со значением. Миша был к нему снисходителен. Никитин был как бы кандидат на вылет отовсюду, самый уязвимый и жалкий из всех очников, но именно эта жалкость защищает надежней любой протекции. Его словно брезговали додавить. И потому ждать удара именно от Никитина было немыслимо — кто такой он сам?! — хотя тут же Миша увидел безошибочную логику: Никитин должен был отвлечь внимание от себя, любой ценой сделать крайним другого.</p><p class="p1">И он, большим и указательным пальцами, липкими пальцами, непрерывно поправляя очки, заговорил, что шутка, товарищи, безусловно хорошая вещь, но повод-то, если всмотреться, не такой уж шуточный. Я не беру сейчас женский вопрос, личные дела, всю эту жеребятину. Но есть у нас категория людей, которые всегда как бы в стороне, всегда как бы с усмешечкой. Я слышал лично, несколько раз слышал, как наш товарищ Гвирцман иронизировал над менее, возможно, образованными, менее, вероятно, осведомленными студентами. Что же, Гвирцман жил в Москве, он сын, насколько я знаю, врача, он имел возможности обучаться в прекрасной школе. Но смысл нашего института — в обучении тех, кто знает меньше и подготовлен хуже, а кого и когда подготовил Гвирцман? Кому он предложил помощь? Я слышал только, как он в толпе таких же снисходительных московских выпускников потешался над провинциалами, в том числе над товарищем Тузеевым, которого нет уже с нами. И возможно, — тут Никитин поднял голову и взглянул прямо на Мишу, и это был взгляд торжествующей кобры перед броском, — возможно, стихи товарища Тузеева были действительно не так совершенны. Как у Гвирцмана, скажем, который владеет техникой. Владеет, владеет, что там. Отдадим ему должное. Но сказать ему нечего, потому что жизни он не видел и видеть не хочет. И когда Тузеев, чьи стихи, повторяю, были, да, несовершенны, сделал шаг вперед и вызвался добровольцем, — в одном этом было больше поэзии, чем во всех грамотных и гладких сочинениях Гвирцмана и его покровителей. (Каких покровителей, не понял Миша, что, что он несет? Он Бориса, может быть, имеет в виду?!) Ведь почему Гвирцман позволил себе откровенно свинский, прямо сказать, поступок? Он потому только это себе разрешил, что действительно считает себя выше — выше закона, коллектива, Тузеева, Крапивиной… И вот эти усмешечки, эта отдельность, этот узкий кружок — насколько все это может быть терпимо? Почему кто-то на основании личной удачливости, по праву рождения, рискну сказать, может у нас…</p><p class="p1">И понесло, понесло.</p><p class="p1">Миша какое-то время слушал и пытался понять, потом понял только, что его хотят утопить и что вылезла наконец наружу давняя, тихая неприязнь, которую он все время чувствовал; случалось же ему ощущать взгляды вслед, перешептывания, липкие, как никитинские пальцы. И он не понимал, за что ему все это, а теперь вдруг понял. Пиковая дама означает тайную недоброжелательность. Вот про что была вся эта странная история, такая, в общем, непушкинская, взявшаяся ниоткуда. Ему всегда казалось, что это безделка, а ведь Пушкин всю жизнь чувствовал тайную недоброжелательность. Все на него смотрели с неодобрением, в ожидании, что наконец-то он, звездный мальчик, гуляка праздный, сорвется. Вот что сделала Валя Крапивина: она все это вытащила наружу. Миша мог ее не целовать, мог вообще ничего не делать — они бы придрались к тому, что он плохо завязывает шнурки. Вот это, закончил Никитин, вот это я хотел сказать, и это вовсе уже не шутки.</p><p class="p1">И тогда вылез Гольцов.</p><p class="p1">О, Гольцов. Самое смешное, что Миша понадеялся. Он подумал вдруг, что сложности вроде скрытой неприязни бывают у липких, линялых, шатких, которым надо отводить удар от себя, — а Гольцов-то другой, простой и крепкий, и уж он защитит. Уж он скажет. И Миша попытался ему улыбнуться, но, к счастью, Гольцов смотрел в другую сторону.</p><p class="p1">Он заговорил сразу в своей манере, отсекавшей любые надежды. Ничего человеческого, конечно. Новизна была в том, что они с Никитиным выступали в связке. У них, вероятно, был сговор, и получался в самом деле эффективный двойной удар: один подводил теоретическую базу, другой ударял пролетарским гневом. Непонятно было только, чем им помешал лично Миша — Никитина он не трогал, Гольцова не замечал. Но, видимо, они чуяли, что чем меньше на факультете будет Миши, тем больше будет их. Гольцов рубил просто, по-пролетарски. Я, товарищи, не буду все эти тити-мити, из классиков и всякое (кивок в сторону Круглова). Гольцов был до того нагляден, что явно репетировал, конструировал образ: не могло же такое получиться само, от природы! Самая-то природная природа как раз и есть итог многолетних усилий садовника. Я не буду разводить и подводить, а я так скажу: Никитин совершенно прав. Он совершенно прав, товарищи, в том, что мы имеем тут прямое оскорбление. Не Крапивина оскорблена, товарищи, а мы оскорблены. И я гниль эту чувствовал с самого начала, потому что Гвирцман не в коллективе, и потому что, когда на войну шли, он тоже все это вот хи-хи по углам! И он сейчас, посмотрите, в глаза не смотрит. Он не смотрит сейчас в глаза коллективу и не может ничего сказать! Потому что прямо не умеет говорить, а только все экивоки и хи-хи, и в стихах то же самое. Я, может быть, не шибко культурный — тут он воспарил, и Миша ясно почувствовал наслаждение, почти экстаз, с которым Гольцов накручивал себя, — я из простых, как вон и Крапивина, и мне, товарищи, ее боль понятна. Но с этим барством, понимаете, с этим свысока презрением пора кончать! Это вышло только сейчас наружу, но это было всегда. И вот я даже скажу, пусть некоторые обижаются, пускай, товарищи, не страшно, — я скажу, что чем больше вот эта культурность, весь этот лоск, тем больше там в глубине обычного, товарищи, насильственного хамства! Просто самого что ни на есть хамства. И я предлагаю решительно чистить ряды, потому что мы просмотрели, нам надо самим себе сказать, что мы просмотрели. Да.</p><p class="p1">Гольцов долго еще говорил бы, но тут Миша почувствовал, что ситуация переломилась, что он действительно обречен и виноват в этом только сам. Он слишком долго попускал и не возражал. И когда Гольцов в третий раз зашел на тему лоска и барства, Мишу словно пружина вскинула с места, и он закричал: товарищи, что это такое?! Вы вообще слышите или нет, что он несет?</p><p class="p1">Гольцов в другое время прицепился бы к этой барственной оценке и начал бы рассказывать, что он, конечно, из простых, но это никому не дает права… но он так обалдел от Мишиного вскрика, что упустил инициативу.</p><p class="p1">— Товарищи! — заговорил Миша, сбиваясь и задыхаясь. — Вот меня упрекнули, что я молчу. Давайте я скажу. Я молчу только потому, что непонятно, как возражать на бред, на то, чего не бывает! Мы можем тут сейчас про любого, про всех… про неучастие, про скрытое хамство… что если человек умеет писать в рифму, то это он от высокомерия… Давайте еще скажем, что мы академиев не кончали! Я не понимаю, кем надо быть, чтобы выступать в стенах своего института, и гордиться невежеством, и от имени этого невежества осуждать знание! Но это ладно, это личные проблемы Гольцова, который тут с тайной радостью сводит какие-то непонятные мне счеты. Помолчите, Гольцов, мы вас слушали (тут он точно перешел на мы, кое-чему выучился в институте, помимо античной философии). Я про другое. Я про то, с чего все началось. Валя Крапивина, ты-то что молчишь, пока они тут тебя полощут? Ведь это все о тебе на самом деле. Вот я спрашиваю тебя при всех: зачем, почему ты выдумала все это? Ведь не было ничего. Ведь сейчас, при всех, ты не сможешь мне соврать. Да, я к тебе подошел, я с тобой говорил, мы с тобой танцевали. Не может же комсомольское собрание постановить, чтобы ты ушла в монастырь. Мы с тобой говорили, но скажи при всех: какое насилие? О чем вообще речь? Что мы все тут творим такое? Я ничего не говорю, у меня могут быть недостатки какие угодно, и я, может быть, действительно позволял себе кого-то критиковать, и меня критикуют, и это нормально. Мы здесь не для того, чтобы всех хвалить, особенно тех, кто гордится своей бескультурностью. Но Валя! Что ты молчишь? Скажи ты сейчас, скажи всем!</p><p class="p1">Валя встала, дико осмотрелась, потом подхватила сумку и стремительно выбежала из аудитории. Мише казалось, что ее каблуки стучат невероятно громко. Ее лицо пылало, но она не плакала.</p><p class="p1">— Гвирцман! — заорала Голубева, еще более красная, чем во время собственной речи. — Тебе мало, что ты к ней полез, ты еще здесь ее довел!</p><p class="p1">Половина зала зашумела в том смысле, что позор, довел, а другая — в том смысле, что никто никого не доводил.</p><p class="p1">— После того не значит вследствие того! — выкрикнул тот же шут уже вовсе не к месту.</p><p class="p1">— Товарищи! — запел Драганов, чувствуя, что ситуация вырывается из-под контроля и сваливается в скандал. Он на мгновение сделался серьезен. — Товарищи, тихо. Мы выслушали уже достаточно много. Мне кажется, сказаны были важные, достойные слова. Действительно, Гвирцман себе позволил… и мы действительно не должны… мириться с некоторым, как было сказано, неучастием, некоторым высокомерием… Но давайте не будем снимать ответственность и с себя, товарищи! Вот выступление Владимира Гольцова, талантливого, между прочим, поэта, которого нельзя не поздравить с недавней публикацией его совершенно справедливого письма в «Литературной учебе». И не нужно ему принижать себя, говоря: я, мол, из простых. Деление на простых и сложных осталось в дореволюционной публицистике. Так вот, Владимир, а лично вы как старший товарищ многое ли сделали для того, чтобы ваш товарищ Гвирцман был вовлечен в общественную работу? Вы слушали, как он будто бы хихикал, хотя я вот тоже несколько раз слышал, как вы хихикали, но это же не делает вас врагом. Но почему вы не подошли к нему прямо, а дождались момента, когда мы будем обсуждать Гвирцмана публично? Может быть, тут есть какая-то особенность вашего характера?</p><p class="p1">Он еще некоторое время утихомиривал всех, то ли всерьез, то ли насмехаясь, — но Миша, чьи нервы страшно напряглись и чутье обострилось, ощущал, что в аудитории все было сложно. Витало в ней и некоторое облегчение от того, что акт каннибализма, кажется, не случился, и легкое разочарование от того, что замах был так хорош, а удар оказался вполруки. Оле, оле, мы не увидим казни! — как кричали прокаженные в одной пьесе: у них отнимали последнюю радость. И потому он не ждал спасения от Драганова, хоть и видел, как Драганов старается: он явно заговаривал стихию, которая могла сожрать и его. Так что когда примирительная речь завершилась предложением ограничиться для первого раза строгим выговором, и тогда другого раза не будет, — Миша понимал, что этим не кончится; и, когда встал аспирант Выборнов, все стало понятно. Выборнов бывал на Халхин-Голе, имел сухое желтое лицо, раннюю седину и репутацию хмурого вояки, гвардейской косточки.</p><p class="p1">Он сказал, как Миша и предполагал с самого начала, что для исключения из комсомола, вероятно, пока еще оснований нет. Потому что такое исключение сразу лишило бы человека надежды, а Гвирцман, конечно, не безнадежен. Но, как мы видели из его сумбурного тут выступления, он ничего не понял. И для того, чтобы он понял, ему надо, мне кажется, окунуться в жизнь. Скажу на примере, мне более понятном. Вы знаете, наверное, что я отчасти заслужил свою кличку Сапог. Я связал свою жизнь с армейской темой и знаю, что делает с неподготовленным человеком армия. Я наблюдал, можно сказать, лабораторным образом превращение невоенного и, скажу даже, демонстративно разгильдяйского человека (он так и сказал, этими самыми словами) в настоящего бойца. Ему достаточно несколько раз было побывать в обстановке, приближенной к боевой. И если у нас нет пока возможности поместить Гвирцмана в обстановку боевую, ему имеет смысл на какое-то время окунуться все-таки в жизнь простых, как он выражается, людей. (Миша сроду так не выражался, но тут уж возражать стало бессмысленно.) Я думаю, что собрание поступит наиболее верно, если ограничится действительно выговором, но рекомендует руководству института временно с Гвирцманом расстаться. Через какое-то время, пусть год, пусть, возможно, полгода, он сможет нам доказать, что понял свои ошибки. Или не понял, не осознал. Что ж, тогда могут потребоваться более радикальные средства. Но пока, мне кажется, ему и самому будет неловко смотреть в глаза своим товарищам после сегодняшней, прямо скажем, истерики и недавнего своего проступка.</p><p class="p1">Он это все выговорил не то чтобы четко, а как бы скучно, несколько скрипуче, — эта постоянная скрипучесть странно сочеталась с его напыщенными балладами о пограничниках, любящих своих собак больше жизни, больше сна и пищи; но эта скука и связывалась в общем сознании с будничным геройством, и после него спорить было незачем. И все с мрачным удовлетворением согласились: рекомендовать к исключению. И даже ни малейшей неловкости — потому что хотя Миша и не был ни в чем виноват, а все-таки ясно же, что так для него хорошо. И эта эмоция — трудное решение вопреки нашей человеческой слабости — очень всем польстила; и принято было единогласно.</p><p class="p1">В коридоре Драганов отвел Мишу к третьей поточной аудитории.</p><p class="p1">— Ну гляди, Гвирцман, — сказал он доброжелательно и без тени обычной своей издевки. — Я сделал все, что мог, ты сам видел. Не могу сказать, что ты вел себя неправильно, потому что правильного поведения тут не было. — Он взял его за рукав. — Через полгода вернешься, восстановишься, ты сам все слышал. Остальные тоже поняли. По-моему, расплатился ты скромно. Поработаешь, встанешь на учет, принесешь характеристику с производства, будешь исправившийся. Они тут исправившихся очень любят и больше не трогают. Понял? Как говорил мой дедушка, замечательный, между прочим, историк римского права, когда его обсчитывали по мелочи, — спасибо, Господи, что взял деньгами. Иди.</p><p class="p1">И Миша пошел.</p><p class="p1">По дороге его несколько раз нагоняли и пытались объясниться, и у него хватало твердости все эти объяснения отметать. Хватило у него сил даже встать после почти бессонной ночи, во время которой он чего только не передумал, и даже соблазн самоубийства несколько раз с горьким смехом прогнал, потому что уж очень это было безвкусно, а теперь можно было позволить себе все, кроме безвкусицы: только не это! И, подставив голову под ледяную воду, он пошел с утра в институт, страшно бледный и гордый, — но за сто шагов до цели развернулся и сбежал. Миша знал, что на него будут смотреть и сочувственно, и злорадно, а главное — и сочувствующие, и злорадствующие будут ужасно счастливы, что все это приключилось не с ними; ясно, что с кем-то должно, и он, может быть, действительно отделался испугом, но он занял именно ту нишу, которая пустовала. Если отовсюду пачками вылетали студенты за неверное слово или ошибку в дате, почему ИФЛИ должен был оставаться неприкосновенным? Нет, они нашли у себя пятую спицу и белую ворону, и вычистили поганым железом, каленой метлой.</p><p class="p1">Весь день он шатался по Арбату, заходил к букинистам, просматривал древние подшивки, все это без цели, без смысла. Как всякий человек на переломе, и скажем честно — как человек под ударом, он загадывал поминутно. Открывалось все на какой-то ерунде: доставлена египетская мумия, где ели сонные в тумане (представил, как сонные едят, и нашел в себе силы усмехнуться), в отчаянии бросился на трупъ. Трупъ с твердым знаком был почему-то особенно смешон, словно за ним тянулся хвост земного существования. Люди, заходившие к букинистам, были старорежимные, точно выпавшие из времени, и он теперь был такой же. Выпадать из времени оказалось не страшно, все чувства притупились. Одни глядели на него сочувственно, словно он теперь пополнил ряды прокаженных, а они всегда радуются прибытку, хотя и слегка презирают новичка; другие откровенно насмехались, словно и падение его было ненастоящее, неполное. Конечно, он все это додумывал. Конечно, им не было до него дела.</p><p class="p1">Вечером зашел Полетаев, они вышли побродить и поговорили. Когда он возвращался домой, было чудесное сиреневое небо, листья кружились под фонарями на Чистых прудах, и он подумал: что же, обойдется. Даже и полезен такой опыт изгойства. Одно — надо чем-нибудь себя занять; но, может быть, и полезно иногда постоять пустым, подождать, к чему потянет. Во дворе ему кивнул сосед со второго этажа, шофер Леня. Раньше он работал на ЗИСе и был мастер на все руки. При любых неполадках с водопроводом или еще с чем бежали к нему. Леня этот был улыбчив, всегда спокоен, и встреча с ним тоже показалась Мише хорошим знаком.</p><p class="p1">На третий день после собрания он заставил себя зайти в институт, увидел приказ об отчислении, встретил в коридоре секретаршу, которая сказала, что он должен зайти и получить копию; предстояло еще сняться с комсомольского и воинского учета. Он сделал и это. К счастью, Драганова в комитете не было, учетную карточку выдал ему вполне безличный и безразличный человек. Куда теперь поставиться — надо было решить быстро; слишком долго пребывать в пустоте не мог никто. А хорошо бы пожить неучтенным, чтобы никто не учитывал тебя. Он мог, конечно. Он, конечно, мог. Конечно, можно было бы поговорить в деканате. И, может быть, как-то бы снизошли. Как-никак он был на третьем курсе и на хорошем счету. У него не было ни одного хвоста, его любили на кафедре иностранной литературы, что, пожалуй, тоже служило сигналом. Лучше бы его любили на кафедре народного творчества. Но он ни о чем не стал просить, никого не отлавливал, хотя Евсевич и намекал. Но лучше доскрести до конца, чтоб не осталось никакой грязи, никакого гноя. Он уйдет и вернется через полгода совершенно очистившимся.</p><p class="p1">Дома он все рассказал только через три дня. В самых черных красках расписал Валю, не смог отказать себе в этом, хотя не прятался и от собственной вины. Да, пытался поцеловать, но ничего не было. Послушай, но это какой-то старорежимный суд чести, сказал отец. Можно подумать, что ты бросил ее с ребенком. Прости, старик, возразил ему Миша (это обращение бытовало у них чуть ли не с Мишиного шестого класса), прости, но наша контора вообще довольно старорежимная. И в каком-то смысле это даже правильно. Суд чести, лицей. Я думаю иногда, что хорошо немного побыть вне коллектива. Хорошо, сказал отец. Я рад, что ты рад. Но теперь, конечно, тебе надо куда-то устраиваться. Поспрашиваю, ответил Миша, попробую. Возможно, куда-то литработником. Нет, ты прекрасно понимаешь, что это не то. Я никогда тебе не помогал, продолжил отец, и голос его постепенно набирал гордости, никогда не подталкивал, хотя ты знаешь, что, если бы пошел по медицинской части… были, были возможности. Но теперь уж позволь. Теперь уж, хочешь ты или нет, но самое время тебе поработать санитаром, образования это не требует, а стаж даст. У нас как раз всегда вакансия. В прозекторской? — спросил Миша. Отцу понравилось, что он может шутить. Нет, отчего же в прозекторской. Хотя и туда придется заглядывать, каталку возить — дело такое. Работа неквалифицированная, подсобная, но как раз такая, после которой на женщин даже в твоем возрасте смотреть, пожалуй, не захочется. Словом, в институте сочтут, что ты исправился.</p><p class="p1">Миша терпеть не мог медицину. Он понимал, что это дело благородное, необходимое, куда более важное, чем вся словесность, вместе взятая… хотя еще вопрос, что нужней на смертном одре: камфора, которая все равно ничем уже не поможет, или вспомнившееся напоследок «Прозвенело в померкшем лугу». Но польза ведь не принуждает к любви, любовь как раз избирает себе предмет, далекий от всякой пользы, — как случилось и с Валей Крапивиной, которую он всячески гнал из памяти. Больница была отвратительна своими запахами, и вот чудо — от отца никогда не пахло больницей; там кормили ужасной едой, там умирали. Собственно, лежали там те, за кем не могли устроить домашнего ухода — страшные одиночки, никому не нужная, неряшливая старость. Миша понимал, что все это детские впечатления, оставшиеся от тех дней, когда отец брал его на работу: один раз, чтобы показать коллегам, а другой раз — проконсультироваться насчет миндалин, которые, о радость, решено было не удалять. Все были с ним ласковы, но вид больницы невыносим. Наверное, надо было теперь окунуться туда, это была расплата за высокомерие, за хихиканье. О, за многое. Но как же он этого не хотел. Впрочем, перспектива мыкаться по московским редакциям была еще унизительнее. И Миша согласился на печальную участь санитара (он сразу решил, что «медбрат» ему нравится больше), медбрата, мечтая о том, что судьба, уж верно, воздаст ему сторицей.</p><p class="p1">Отец работал в Склифосовского, а Мишу устроил в Боткинскую. Все врачи друг друга знали и держали круговую поруку. Когда отменяется совесть, остается профессия.</p><p class="subtitle">— 7 —</p><p class="p1">Миша был, скорее, неприятный человек — и знал это. Он не хотел бы писать книгу с таким героем. Хорошо писать о герое, который приятен, о его любви к славной девушке, любви, похожей на дружбу. О его друзьях, не готовых каждую минуту к предательству. О здоровой зависти к живым, а не о болезненной — к мертвым.</p><p class="p1">— Эти мне еврейские маленькие Пушкины, — говорил про Мишу дядя Иван, и Миша сразу понимал, что он и есть маленький еврейский Пушкин, пестовавший это сходство, но где у Пушкина было дворянство и пять веков истории, там у Миши была родительская библиотека, пятьдесят томов издательства Academia. У Пушкина была свобода обращения с материалом, а где Мише было взять эту свободу, когда он и материала не знал? Утешало отчасти то, что материала больше не было, от него остались только эти самые пятьдесят томов Academia. Двадцатый век отменил все, Германия сейчас жгла книги. Материалом была Валя, и Миша не знал, как с ней быть. Валя осталась единственным материалом, который не упразднен. И на ней-то он так ужасно погорел, мальчик, которому не нужно было казаться хорошим, чтобы себя уважать.</p><p class="p1">Миша не хотел казаться хорошим. Этим он отличался от сверстников, не от большинства, а от всех. В сущности, только это и давало ему надежду, что из него получится писатель, не обязательно поэт, но в любом случае пониматель всего этого тонкого устройства. Что устройство есть, он понимал, и оно никогда не казалось ему слишком сложным. Как говорили в школе, когда учили надевать химзащиту, — «нормативы божеские». В жизни тоже были нормативы божеские, можно было разобраться, если отмести некоторые преграды в самом себе. И желание казаться хорошим он почти отмел.</p><p class="p1">Работа санитара предполагала удобный график: понедельник, среда, пятница. И хотя вторников и четвергов, даже вместе с выходными, не хватало, чтобы вытеснить из головы больничные зрелища, четыре дня в неделю он все-таки принадлежал себе. И непонятно еще, что было мучительней, куда было деть это внезапно высвободившееся время: не роман же писать, в самом деле. Все начинающие авторы ждут, что появится у них свободный день — и они тут же возьмутся за роман; но в том и парадокс, что роман можно писать только урывками, когда текст вырывается со страшным напором, а когда у тебя есть время и даже комната — пиши не хочу! — возникает именно не хочу. Неловко было смотреть по утрам на детей, идущих по бульвару в школу номер двадцать (сам он учился на Покровке, и с двадцаткой они враждовали — доходило и до побоищ). Неловко было сидеть за столом перед тетрадью и что-то в ней карябать, пока мать, стараясь двигаться бесшумно, убирала в комнатах. У всех в квартире были дела. Мать иногда занималась с маленькой дочкой соседа Лени, умненькой понятливой девочкой, тихой и всегда удивленной. Она все понимала и всему удивлялась. Мать рассказывала ей те же сказки, что когда-то Мише, — про лесных человечков, про говорящую собаку Мику. Слушать это было невыносимо, грусть и злость душили его. Он убегал и шлялся по центру, и в этих шляниях случались забавные встречи.</p><p class="p1">Он принадлежал теперь к деклассированным элементам, или к лишним людям, или, если хотите, к бывшим. Но в бывших и таилось самое интересное, потому что большинство бодро марширует к финалу, а бывшие умудряются этот финал пересидеть и затеять на руинах что-то новое. Октябрь был теплый, Миша много ходил и не мерз. Сначала проговаривал про себя бесконечные обвинительные или защитительные речи, которых не сказал на собрании — слава Богу, потому что все они могли ухудшить его участь. После начал размышлять — иногда вслух, да и кому было его слушать, например, на Воробьевых горах? — о лишних людях; ему пришло в голову, что в каждом тексте русской литературы есть дуэль сверхчеловека с лишним человеком, Печорина с Грушницким, Базарова с Павлом Петровичем. А все это потому, что участь лишних и новых — одна: ими все пренебрегают. И тогда они, маргинальные люди, устраивают дуэли.</p><p class="p1">В больнице было, пожалуй, даже интересно. Для будущей прозы много чего можно было подсмотреть. В умирающих что-то было, а в мертвых — уже ничего, и это наводило, хочешь не хочешь, на мысль о душе. Были любопытные казусы — лежащая в параличе Соколова, про которую никто толком не знал, понимает она что-то или уже нет, и ее муж, сидевший около нее целыми днями и гладивший ее руку, а иногда читавший вслух. Соколова дышала самостоятельно, но питалась через капельницу. Иногда мужу предлагали отключить ее от питания, но он отказывался. Он был уверен, что она все понимает. Конечно, слишком долго это продолжаться не могло, но Соколова была старая большевичка, и ее пока терпели. Соколов же не был большевик, он был бухгалтер, но бухгалтеры имеют иногда поразительно глубокие чувства.</p><p class="p1">Миша насмотрелся на умирающих, и его презрение к смерти несколько поколебалось. Раньше он думал, что принимать в расчет смерть вообще не стоит, что она не наше дело. Теперь он понимал, что в жизни большинства — скажем, девяти десятых — она вообще была единственным событием, главней рождения, ибо в рождении ничего от нас не зависит. И умирать лучше всего не с гордо поднятой головой, в этом бывает ужасный моветон, а с покорным сознанием неприятной работы, которую надо исполнить. Кичиться совершенно нечем. Достоинство не в том, чтобы гордиться и бодрячествовать, а в том, чтобы сделать все абсолютно естественно. Как ни странно, все толстовские разговоры о правильном умирании простых людей были глупостью умного человека, подгонявшего мир под свои взгляды. Так называемые простые люди умирали хуже всего, в истерике, в озлоблении, в непрерывных капризах, ибо у них не было никаких механизмов защиты от страха. Тише всего умирала низовая интеллигенция, иногда — старики из бывших, сохранившие веру. Легче все-таки было тем, у чьей постели кто-то сидел. Вообще же умирали довольно часто, и Миша понял, что от медицины, в сущности, толку мало — прав был Чехов: ерунда сама пройдет, а прочее неизлечимо. Отец любил повторять эту фразу. Больница нужна была не больному, а родственникам, получавшим право думать, что они сделали всё, что могли.</p><p class="p1">— Дело твое, в общем, очень печальное, — сказал он отцу, не решаясь вымолвить, что это дело обреченное.</p><p class="p1">— Но все остальные еще печальней, — возразил отец. — Я хотя бы имею отношение к самому главному. — И добавил: — Ты теперь, кстати, тоже.</p><p class="p1">— Не уверен, что это главное, — сказал Миша. — Вот если бы существовала профессия, помогающая подготовиться к смерти… Но это, как ты понимаешь, не литература и подавно не богословие.</p><p class="p1">— Химия, — фыркнул отец, и больше они об этом не говорили, но тайно сблизились.</p><p class="p1">Постепенно Миша оттаивал, подползала тоска по сборищам — у Бориса, у Нины, у Сергея. Но он, конечно, накрепко запретил себе туда ходить. Ведь они все предатели. Они предали его легко, без сожаления. И будем честны: в последнее время ему было там, в этом кругу, тесно. Политические разговоры. Попытки искреннего раболепия, без лести, от чистого сердца. Чтение газет между строк, извилистые рассуждения об Англии, о стравливании с Германией, о развороте на Восток. Почему-то о Турции, хотя какая Турция? Тихоголосые писчебумажные девушки, делающие вид, что им интересно. Да Крапивиной спасибо надо сказать, что он выпрыгнул из всего этого. Разве он не дерзил им всем — в тайной надежде, что они его сами выгонят? «Зеленая лампа», любомудры, кружок дозволенной избранности, поиски подлинного марксизма, политинформации Бориса, якобы со знанием тайных пружин. Дикое самодовольство. Ему, конечно, очень нравилась роль скептика. Он вообще теперь стал во многом себе признаваться, находил в этом неведомое прежде наслаждение — все додумывать до конца. Да, ему нравилось, что было куда пойти. Что к его разборам прислушивались. Что ему было кому почитать. Но разве он не догадывался, насколько все это хрупко, насколько все они готовы к сдаче? Себя ли, другого ли — какая разница? Вся эта декабристская пошлость, которую чувствовал один Грибоедов (Пушкин — нет, в Пушкине не было той желчи, он по доброте своей вечно умилялся): чуть надави — пойдут писать друг на друга подробнейшие, верноподданнейшие досье. Миша понимал, что им его не хватает, что они его, вероятно, ждут. Но он, зачумленный, запретил себе. Больше никогда. И хотя знал за собой отходчивость, которую презирал как признак слабости, а не доброты, — прошло две, три недели, а он был тверд: никаких сборищ, никакого Карманицкого переулка.</p><p class="p1">Конечно, все это было очень славно. Все эти сидения в тесном кругу, восхищенные женские взгляды — да, женские, уже не девчоночьи, — слабое вино, тени веток на обоях, одуряющие весенние запахи в форточку, папиросные гильзы со следами помады, и иногда, выглядывая в окно, в фиолетовый вечер с одним из первых апрельских дождей, он чувствовал такую полноту счастья, какой, он знал, не будет уже никогда. Слагаемые этого счастья были просты и даже пошлы: фонари, ветки, кислый рислинг, всякие глупости под гитару, стыдно перечислить; но без целительной дозы этой пошлости не бывает ничего великого. Блажен, кто смолоду. Теперь он своевременно выброшен из всего этого, теперь ему предстоит окунаться в жизнь и взрослеть в одиночестве. Но иногда, перетаскивая тюки зловонного белья или отвозя в прозекторскую очередной труп, он думал: Валя Крапивина, сволочь, мразь, что же ты сделала с моей жизнью.</p><p class="p1">Но потом он представлял на своем месте любого другого из их компании, из так называемой семерки, и понимал ясней ясного: никто бы не выдержал, никто. Все слишком хорошо о себе думали, а он всегда что-то понимал, только у него хватало презрения к себе и остальным. И хотя ему достало ума понимать, что и это красивость, и это тоже самолюбование, даже, может, большее, чем у Бориса, — он себя не одергивал. Он имел теперь право думать о себе лучше, потому что все прочие преимущества были у него отняты.</p><p class="p1">И писать он стал иначе, например так:</p><div class="poem">
<div class="stanza">
<p class="v">У меня теперь много свободного времени.</p>
<p class="v">Делать нечего мне,</p>
<p class="v">Как всему беззаботному нашему племени</p>
<p class="v">В безработной стране.</p>
</div>
