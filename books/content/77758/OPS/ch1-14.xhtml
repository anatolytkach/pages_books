<span><p class="p1">…На даче он застал полный разгром — разворошенные постели, распотрошенные ящики, Алина мать лежала в комнате, муж дежурил около нее с сердечными каплями, недоумевающий Шур ходил по саду, так ничего и не понимая. Один дядя Пузя сидел на веранде перед миской гречневой каши и сосредоточенно, в своей манере, переводил мир в говно. Никогда его любимая фразочка не имела столь буквального, столь зловещего смысла. Он ел размеренно и внимательно, с едва сдерживаемой жадностью, словно понимая, что наедается в последний раз, Он поднял на Борю глаза, моргнул, ничего не сказал и снова углубился в процесс. «Боря, ну что такое, — жалобно повторял Шур, — ну я бы еще понял, если отец, — но почему Аля? Это какое-то уже вовсе черт знает что». Боря машинально повторял, что узнает, что ошибка, что сейчас таких ошибок множество, — всё, что уже привык говорить в таких случаях; но на самом деле он был раздавлен. Не потрясен, а раздавлен. Тут перемешалось все, и главенствовал, о проклятье, именно страх — страх за себя, ибо явно подбирались к нему; да и как ему было не бояться за себя, когда они с Алей давно уже были одно? Но при одной мысли о том, что сейчас, в эти минуты, делается с Алей в том мире, куда ни у кого из них пока не было доступа, — ему хотелось схватиться за голову и выть, и казалось, что только этот вой принесет облегчение. Выорать, вывыть. Но ничего этого было нельзя — он должен был теперь брать на себя ответственность за жизнь этой парализованной семьи; и после первого шока Боря собрался и стал отдавать распоряжения.</p><p class="p1">Сперва привести в порядок комнаты, вызвать врача отцу, которому было гораздо хуже, чем матери, он просто не позволял себе свалиться; и приезд врача отчасти разрядил обстановку — стало ясно, что они по крайней мере не вычеркнуты из списка живущих, им еще положено медицинское обслуживание. Потом разработать порядок действий. Само собой, для начала при ближайшей встрече с Гореловым-вторым — следовало ли уторапливать ее? нет! — поднять вопрос и дать все необходимые свидетельства. Естественно, поговорить с Еремеевым: Боря никогда к нему не обращался, предчувствуя более серьезную необходимость. Он несколько успокоился, начав строить планы: пришла вдруг спокойная уверенность, что Алю он вытащит, ради этого всю жизнь старался и к этому готовился. То есть всю жизнь готовился, что придут? Вероятно — да; и притом не за ним. О мерзость! Оставлять Алину семью было страшно, но надо было ехать в город, да и не мог он больше сидеть на этом пепелище. Когда он сказал, что уедет и вернется, Алина мать схватила его за руку и сжала со звериной силой; он испугался, что поцелует, но нет, просто держала, впиваясь короткими ногтями. Она не говорила ничего, только смотрела. Я сделаю, повторял Боря, я все сделаю. Но что-то он сказал не так, не то, чего она ждала, и она отшвырнула его руку, как вещь.</p><p class="p1">В саду он подозвал Шура. Послушай, сказал ему Боря, ты хотел работы и ответственности — вот тебе теперь и работа, и ответственность. Ты остаешься старшим, отец и мать ничего не могут, но ты человек серьезный. Я буду сейчас нажимать на все педали, кое-что, как ты понимаешь, я могу. Главное сейчас — не навредить. Нужен покой, которого все равно не будет, но нужно хотя бы понимание, что истерикой не поможешь. Постарайся сделать так, чтобы они как можно меньше будоражили людей вокруг. Сейчас не надо шума. Если это ошибка, ошибку придется признавать, и все получится слишком громко. Это никому не нужно. Я уверен, что все выяснится, и завтра, максимум послезавтра она будет дома. Пока — ты сам все понимаешь. И вдруг он увидел, что Шур совершенное дитя, при всем своем телесном обилии, при всей взрослости и росте. «Ты думаешь? — робко спросил он. — Ты допускаешь?» — «Разумеется». — «Но, может быть, это связано просто с… Ты знаешь, Аля же многого не понимала. Она не понимала, например, что пакт о ненападении нужен, что это стратегический выигрыш, ты же знаешь! Она говорила, вот только вчера… вчера мы говорили с ней, но, наверное, она же это не только мне… Для нее и для матери, ты понимаешь, нет хуже зла, чем эти… я сам, кстати, так думаю. Мы просто с тобой еще не обсудили толком…» Шур был политический юноша, для него и теперь на первом плане были мировые судьбы, в которых, чем черт не шутит, и ему назначена была роль. Шур, сказал Боря очень серьезно, мы никогда не знаем, никогда не узнаем, с чем это связано. Гадать не нужно. Нужно действовать, Шур, иди к матери, ты сейчас там нужен. Боря со значением потряс ему холодную мокрую руку и быстро пошел на электричку.</p><p class="p1">Вот здесь его догнал ужас. Он только теперь, оставшись по-настоящему один, хоть и в вечно переполненном поезде, — куда, откуда все они ехали, от кого бежали? — понял, что Али теперь рядом не будет, и это надолго (о том, что навсегда, он и подумать не мог). Он так привык к ее постоянному — ну, почти — ясному и счастливому присутствию, к тому, что его любят и никогда не оставят, что всё, даже кошмар последнего времени, воспринималось еще как переносимое, допустимое. А теперь исчезла защита, под которой он жил. Главная-то защита, понял Боря только сейчас, была не должность и не Горелов, а эта девочка, страшно подумать; не он был ее опорой — она. Пока она была с ним, он был интересен и угоден Богу, а как пропала — так и все пропало, и теперь с ним можно было делать что угодно. И самое страшное было в том, что они ангела, ангела кинули в ад, особенное, неземное существо! Как она морщилась от чужой боли, как ласкала взглядом каждого ребенка, как без малейших сантиментов, без слюнтяйства кидалась на любой зов! Одни опутывают, другие окутывают, и как она окутывала каждый его день, как берегла, как подставляла руку! Что с ней будет завтра, что с ней сейчас, пока он едет? Он словно слышал ее мольбу, она не могла сейчас не думать о нем, не тянуться к нему, не верить, что он найдет какой угодно ход, но сделает все; а что он мог? Лучшее, что сейчас можно было сделать, — быть осужденным вместе с ней, тогда, по крайней мере, он не будет перед ней виноват; но это такое же дезертирство, как смерть. Теперь он нужен живым и должен что-то делать, а что — неясно. Господи, Господи! Он не мог вообразить, что там бывает, что и как там делают; страшней всего обезличивание, превращение в номер. В камере ее наверняка будут мучить, даже если там сидят сплошь невиновные; ведь такие, как она, стократ уязвимы. Она так беспомощна сейчас, она продолжала верить, что все поправимо, она никогда не отчаивалась, даже ребенком, в восемнадцатом году, когда мать ушла и долго не возвращалась! (А поди знай, что это было: действительно бегала за порошком «Нестле» или заговорилась с влюбленным в нее поэтом; ей это было нужно, это был для нее хлеб, кто бы осудил? Ему ли осуждать, сеющему вокруг себя одно горе?) Не отчаивалась никогда, отныне ей это предстояло. Случилось худшее из возможного. Случилось невозможное. Может быть — на дне сознания это все-таки шевелилось, — может быть, ему следовало теперь исчезнуть, залечь на дно, временно перестать существовать? Не сделает ли он хуже своими хлопотами? Но он знал, что это мысль подлая; и знал даже, что страх еще не есть грех. Боятся все. Боря умел и преодолевать себя, когда надо. Теперь он будет грызть их зубами.</p><p class="p1">…О чем он там думал, на даче? Да — немедленно звонить Еремееву. Но как раз немедленно звонить было нельзя: воскресенье. Значит, завтра спокойно поговорить на работе. Боря стал вспоминать, к кому еще можно обратиться; по большому счету не к кому. Не сказать чтобы он не пытался предусмотреть подобные случаи, но только применительно к себе; разные случайности и неожиданности, как говорил Молотов. Но одно дело планировать, а другое — сорваться в яму и осознать, что никто к тебе туда не склонится. Разумеется, Горелов; но до встречи с Гореловым оставалась почти неделя, да и какое отношение мог он иметь к делу Али? Это была теперь огромная служба, государство в государстве; одна рука не знала, что творит другая. Писать заявление можно было, только примерно зная обстоятельства. Он же — барахтался в потемках, и все его двадцать лет в журналистике, все тридцать семь от рождения ничего не стоили. Что делать сегодня? О, они там понимали: воскресенье; у них не бывает выходных, это у всех других выходные. Что делать? Он мог вернуться к Алиной семье, успокаивать, выдумывать фантастические планы — но даже думать об этом было невыносимо. Алина мать была устроена так, что ничего не умела смягчать — расковыривала всякую рану и всякое отчаяние переживала с абсолютной полнотой. Он был там и нужен, и невозможен, и решил пока не ехать. Самое нужное и простое было — напиться.</p><p class="p1">Он, однако, прежде вернулся домой. Входил не без дрожи: могли ждать. Но все было спокойно, жена лежала на диване под целебной маской. Муретта, сказал он, взяли Алю, ты ее знаешь, с нашей работы. Под маской он не увидал реакции: может быть, Муретта злорадно осклабилась. Муретта, повторил он, ты все знаешь. Да, кивнула она. Я попробую позвонить, у меня один клиент вхож в круги. Но никаких гарантий, ты понимаешь… Муретта, просящая за Алю, — это было уже сверх всяких вероятностей. Нельзя было пренебрегать никакими шансами, но здесь… Не надо, сказал он. Но мне это нетрудно, возразила Муретта, что ты; и кроме того, — оставь, ты передо мной ни в чем не виноват. Прежняя, молодая Муретта никогда не сказала бы так. Из-под маски говорил человек сломленный и раздавленный, все утративший, на себя не похожий. Ах, да ведь и сам я на себя не похож, и все мы на себя не похожи. Последние четыре года расплющили всех, да и предпоследние — всех, только меня это тогда не так касалось. Тогда, если можешь, да, сказал он и почувствовал, что сейчас разрыдается.</p><p class="p1">Вечером Муретта ушла по своим делам, скорее всего к мужчине, как уходил он в эти два года, и до четырех утра ее не было. Потом пришла, ничего не объясняя. Боря тоже не спросил. Было страшно неуютно, знобило, все тело чесалось.</p><p class="p1">К десяти, по заведенному порядку, он был в редакции. Прошла планерка, никто не заметил отсутствия Али — тишина, ровная гладь. Он дождался, пока все разойдутся, и подошел к Еремееву.</p><p class="p1">— Да, что? — спросил тот недоброжелательно, догадываясь, видимо, о поводе.</p><p class="p1">— Я насчет… — Боря назвал Алю по фамилии.</p><p class="p1">— Я в курсе.</p><p class="p1">Боря не понял, что это значит.</p><p class="p1">— И что можно предпринять?</p><p class="p1">— Вам, — сказал Еремеев, сильно ударив на первое слово, — вам ничего не надо предпринимать. Теперь все, что надо, будет предпринято.</p><p class="p1">Неясно было, имеет ли он в виду оперативные мероприятия с Алей или свое вмешательство в ее судьбу.</p><p class="p1">— Но я знаю ее довольно близко.</p><p class="p1">— Я в курсе, — повторил Еремеев уже с откровенной брезгливостью.</p><p class="p1">— И я могу подтвердить… вы меня тоже ведь знаете… там ничего нет и быть не могло.</p><p class="p1">— Вы ничего не знаете, — сказал Еремеев, не понижая голоса. Непонятно, на чьи уши он рассчитывал, — в кабинете они были вдвоем, — но, видимо, требовалось отмести всякую мысль о сговоре; говорил он ровно и официально, а просить о неофициальной встрече Боря не мог, он был теперь зачумлен.</p><p class="p1">— Нет, знаю. Есть вещи, люди, в которых сомневаться нельзя.</p><p class="p1">— Она могла погубить вас и всех, и, может быть, погубила. Вы заигрались, Гордон, заигрались сильно. Она подвела под монастырь и меня, и вас. Вы, скорей всего, даже не догадываетесь о масштабе. Я вас пока ни в чем не обвиняю, я сам просмотрел… но никаких разговоров на эту тему вести не буду. Она грешила, ей и каяться. Всё, работайте.</p><p class="p1">И не сказать чтобы Боря был к чему-то подобному не готов: он и не такого насмотрелся. Но теперь-то Аля канула, словно не была, а все на работе, кому она вязала кофточки, подсказывала слова, правила убогие тексты, — словом не обмолвились с ним. Только Леня поджидал его у выхода и предложил подвезти.</p><p class="p1">Некоторое время они оба молчали.</p><p class="p1">— Товарищ Гордон, — начал Леня. — От меня большого толку нет, но если что сказать там, или показать, или подтвердить, то вы можете не сомневаться.</p><p class="p1">Боря сперва подумал худшее — что Леня готов дать на Алю показания, — но через секунду устыдился.</p><p class="p1">— Я все помню, — сказал Леня. — Как она за нас убивалась, с комнатой этой, как ходила везде… Мне никто так не помог никогда. Вы, может, не знаете, — я детдомовский…</p><p class="p1">— Знаю, — соврал Боря, хотя откуда ему было знать?</p><p class="p1">— Ну вот, — Леня кивнул и улыбнулся. — Да, конечно, знаете, вам положено… И вот никто никогда, честное слово. Я ей тогда сказал: Ариадна Сергеевна, если что, вы можете на меня во всем. И я пойду куда надо, напишу что надо, все сделаю. Имейте просто в виду.</p><p class="p1">Еще немного, и Боря заплакал бы. Он заплакал бы, но они приехали. Ему ведь тоже никто никогда. И он посидел еще немного в машине; так они и сидели — двое мужчин, которых никто никогда. Положим, в детстве было всё — и отец, и мать, и приятели; но с тех пор, как он сбежал в Москву, как началась его работа сначала по газетам, потом у Пистрака, с самого брюсовского института, где все друг друга топтали и никто никого не любил, подобно самому мэтру, — с самого этого времени никто не помогал ему, всё сам. И он не нуждался ни в чьем сострадании, отвергал помощь — ведь мы люди модерна, мы бежим от предписанных эмоций. Когда кто-то из друзей умирает, мы испытываем досаду от потери ценного кадра, но и только; когда умираем мы, мы бессмертны в делах; бессмысленно разводить сопли по поводу биологии, кроме биологии ничего нет. Литература есть сумма приемов, любовь есть сумма потребностей, общество есть сумма свободных индивидуумов, все прочее от лукавого, которого тоже нет. Никто не жалел его, никто не заботился о нем, в дружеском кругу принята была насмешливость. Они были новые железные люди. И вот на железных людей случилась проруха, ржавчина, за каких-то три года они превратились в глиняных, и Боря готов был заплакать от сочувствия бывшего детдомовца, журнального шофера, потому что никто, кроме этого шофера и Али, не позаботился о нем за всю его взрослую жизнь. Аля два года создавала вокруг него облако тепла, счастья, надежды, два года абсолютно верила в него, страховала от любых случайностей, предугадывала делания; два года он жил, считая это нормой, а сейчас ледяной, чугунный мир обрушился на него. А о том, что обрушилось на нее, страшно было думать. Вот сейчас наступала вторая ее ночь в застенке, и она была непонятно с кем, непонятно где, в переполненной камере — ведь все они сейчас переполнены, и всегда были переполнены, не было времени, кроме Февраля, чтобы выпускали больше, чем сажали… И он чувствовал, какая страшная беспомощная нота тянется оттуда к нему, как она надеется, как она молит, — и ничего не делал, ничего было нельзя.</p><p class="p1">— Леня, — сказал он, подавив чуть не прорвавшееся рыдание. — Леня, спасибо, я запомню.</p><p class="p1">Что общего было у этого нищего детдомовца с его чистенькой машиной и всегдашней благожелательностью — и Еремеева с его квартирой, ресторанными обедами, полночными сборищами, с его роскошью, словно заглушавшей дневные ужасы? Что объединяло этого тихого шофера — и Еремеева, предавшего при первой возможности? Что общего было у них обоих с Борей, да и что общего было у одного Бори, нынешнего, с другим, каким он был десять лет назад? Ведь он и с самим собой не мог договориться, потому что привык за эти десять лет к тому, к чему привыкать нельзя. Чем можно было теперь объединить их всех, расслоенных, — его, Леню и Еремеева? Нет, война, только война, — хоть какая-то видимость единства; все бросаются от чужого несчастья, как от чахотки, все врут себе и соседу, цельности нет и в камне, и в железе. Да если бы оставался хоть шанс свести в один монолит их всех, начальствующих и прислуживающих, сажающих и сидящих, допрашивающих и лгущих, то этим последним шансом была война, а после нее ничего, медленная смерть.</p><p class="p1">И ночью, когда рядом спала Муретта, а он не мог заснуть, боялся пошевелиться, — на него с новой силой хлынули тоска и ужас, словно в ночи, когда все спали и не мешали своими мыслями, Але удалось пробиться к его сознанию. Это была самая прямая связь. Ей было очень страшно, она пребывала в абсолютной растерянности, ее еще не допросили, как не допрашивали в первое время никогда, маринуя, ожидая, чтобы жертва деморализовалась и настроилась. Она и приказывала, и запрещала себе вспоминать их ночи, потому что нельзя было расслабляться и разнеживаться, но на чем же еще могла она держаться, как не на этих воспоминаниях. И она вспоминала его всего, и тянулась к его руке, надеясь обрести под ней успокоение; и духота чужих испарений наваливалась на нее. Она клялась, что все выдержит, но понимала, что у нее нет сил, она была беззащитней, чем когда-либо, и ничего не могла. Она верила, что вот сейчас, вот в эту ночь он уже бежит обивать пороги, что его неведомые друзья уже включились в борьбу, — а ведь друзей не было, и надеяться было не на кого. Она пробовала молиться. Она не молилась с двенадцати лет, когда они приехали к отцу и он не встретил их, потому что глупо разминулись, — и тогда молитва была услышана, он догнал их у ворот дома. Она умоляла, чтобы все это оказалось случайностью. Ей уже сказали, что случайностей не бывает, и главное — сразу перестать надеяться. Но она не могла не надеяться, не могла не думать о нем и не вкладывать всех своих последних сил в этот бессловесный ночной разговор. И на Борю наплывало такое огромное, влажное, темное облако любви, и надежды, и дикой детской тоски, что он расплакался с облегчением, и после этого не плакал уже никогда. Словно лампочку выключили в нем после этой ночи.</p><p class="p1">…Встреча с Гореловым назначена была на ближайшую пятницу. Боря надеялся, что Горелов заговорит об Але первым и передаст новости, но тот то ли ничего не знал, то ли притворялся.</p><p class="p1">— Ну-ну, — сказал Горелов с обычной своей деловитой ленью, словно интересовался чем-то второстепенным вроде рыбалки. — Что поговаривают?</p><p class="p1">— Так ведь не поговаривают, — очень спокойно ответил Боря. — Сейчас только мы с вами поговариваем, остальные помалкивают.</p><p class="p1">— Ну, давайте мы с вами поговорим, — предложил Горелов. — Вы ведь что-то думаете обо всем этом?</p><p class="p1">Боря опять демонстративно пропустил подачу.</p><p class="p1">— Вы про договор?</p><p class="p1">— Да, да, про договор.</p><p class="p1">— Про договор у меня самого очень мало мыслей, — сказал Боря осторожно. — Собственно, одна мысль — что таким образом предотвращается война.</p><p class="p1">— Ну уж, — недоверчиво сказал Горелов. — Борис Ильич, мы же с вами говорили — у нас тут разговоры честные. Иначе ни мы вам не нужны, ни вы нам.</p><p class="p1">Это был уже прямой намек — видимо, они торговали Алей, и за честность можно было купить сведения о ней. И Боря сначала аккуратно, потом все более увлекаясь начал рассказывать — о том, что без войны ничего не получится, о том, что война сцементирует всех, о последнем шансе, — но Горелову было неинтересно.</p><p class="p1">— Хорошо, — сказал он, — а вот такого вам не приходилось слышать? — И протянул лист серой бумаги с машинописью на обеих сторонах, очень тесной, через интервал.</p><p class="p1">«Как свирепо поучителен тот факт, что германо-советский договор ратифицирован сталинским парламентом как раз в тот день, когда Германия вторглась в пределы Польши! Общие причины войны заложены в непримиримых противоречиях мирового империализма. Однако непосредственным толчком к открытию военных действий явилось заключение советско-германского пакта. В течение предшествовавших месяцев Геббельс, Форстер и другие германские политики настойчиво повторяли, что фюрер назначит скоро „день“ для решительных действий. Сейчас совершенно очевидно, что речь шла о дне, когда Молотов поставит свою подпись под германо-советским пактом. Этого факта уже не вычеркнет из истории никакая сила!</p><p class="p1">Дело совсем не в том, что Кремль чувствует себя ближе к тоталитарным государствам, чем к демократическим. Не этим определяется выбор курса в международных делах. Германо-советский пакт является в полном смысле слова военным союзом, ибо служит целям наступательной империалистской войны. В прошлой войне Германия потерпела поражение прежде всего вследствие недостатка сырья и продовольствия. В этой войне Гитлер уверенно рассчитывает на сырье СССР. Заключению политического пакта не случайно предшествовало заключение торгового договора. Москва далека от мысли денонсировать его. Литвинова сменил Молотов, который не связан ничем, кроме обнаженных интересов правящей касты. Политика Чичерина, т. е. по существу политика Ленина, давно уже объявлена политикой романтизма. Политика Литвинова считалась некоторое время политикой реализма. Политика Сталина-Молотова есть политика обнаженного цинизма.</p><p class="p1">„На едином фронте миролюбивых государств, действительно противостоящих агрессии, Советскому Союзу не может не принадлежать место в передовых рядах“, — говорил Молотов в Верховном Совете три месяца тому назад. Какой зловещей иронией звучат теперь эти слова! Советский Союз занял свое место в заднем ряду тех государств, которые он до последних дней не уставал клеймить в качестве агрессоров.</p><p class="p1">Напомним, что вскоре после мюнхенского соглашения секретарь Коминтерна Димитров огласил — несомненно, по поручению Сталина — точный календарь будущих завоевательных операций Гитлера. Оккупация Польши приходится в этом плане на осень 1939 года. Дальше следует: Югославия, Румыния, Болгария, Франция, Бельгия… Наконец, осенью 1941 года Германия должна открыть наступление против Советского Союза. В основу этого разоблачения положены, несомненно, данные, добытые советской разведкой. Схему никак нельзя, разумеется, понимать буквально: ход событий вносит изменения во все плановые расчеты. Однако первое звено плана — оккупация Польши осенью 1939 года — подтверждается в эти дни. Весьма вероятно, что и намеченный в план двухлетний промежуток между разгромом Польши и походом против Советского Союза окажется весьма близким к действительности. В Кремле не могут не понимать этого. Недаром там десятки раз провозглашали: „мир неразделен“. Если тем не менее Сталин оказывается интендантом Гитлера, то это значит, что правящая каста уже не способна думать о завтрашнем дне. Ее формула есть формула всех гибнущих режимов: „После нас хоть потоп“.</p><p class="p1">Одно из величайших отличий нынешней войны от прошлой — это радио. Благодаря радио народы сейчас в гораздо меньшей степени, чем в прошлую войну, будут зависеть от тоталитарной информации собственных правительств, и гораздо скорее будут заражаться настроениями других стран. В этой области Кремль уже успел потерпеть большое поражение. Коминтерн, важнейшее орудие Кремля для воздействия на общественное мнение других стран, явился на самом деле первой жертвой германо-советского пакта. Судьба Польши еще не решена. Но Коминтерн уже труп. Его покидают с одного конца патриоты, с другого конца интернационалисты. Завтра мы услышим, несомненно, по радио голоса вчерашних коммунистических вождей, которые, в интересах своих правительств, будут на всех языках цивилизованного мира, и в том числе на русском языке, разоблачать измену Кремля.</p><p class="p1">Распад Коминтерна нанесет неисцелимый удар авторитету правящей касты в сознании народных масс самого Советского Союза. Так, политика цинизма, которая должна была, по замыслу, укрепить позиции сталинской олигархии, на самом деле приблизит час ее крушения.</p><p class="p1">Война сметет многое и многих. Хитростями, уловками, подлогами, изменами никому не удастся уклониться от ее грозного суда. Однако наша статья была бы в корне ложно понята, если бы она натолкнула на тот вывод, будто в Советском Союзе сметено будет все то новое, что внесла в жизнь человечества Октябрьская революция. Автор глубоко убежден в противном. Новые формы хозяйства, освободившись от невыносимых оков бюрократии, не только выдержат огненное испытание, но и послужат основой новой культуры, которая, будем надеяться, навсегда покончит с войной».</p><p class="p1">— Такого не говорят? — спросил Горелов.</p><p class="p1">Боря не понимал, как ему действовать. С одной стороны, этот психотерапевт сейчас предъявил ему его собственные мысли, почти все, вплоть до надежд на всеобщую радиофикацию; с другой — этот стиль мог принадлежать только одному человеку, никому иному, и Боря не был бы газетчиком, если бы не опознал его.</p><p class="p1">Было время, когда он боготворил этого человека; Было время трезвого отторжения и даже, пожалуй, разочарования. Было время мстительности, всегда направляемой на бывших кумиров. Но Боря не переставал и тогда вздрагивать от мгновенной точности оценок, интонаций, собственных своих мыслей, которые этот человек высказывал наилучшим способом. Потом пришло понимание, что он всегда был хлестким провинциальным публицистом и никем более, ибо не видел сырой, глубинной сущности всех здешних вещей и до сих пор на что-то надеялся. Этот глубокий уровень был для него закрыт (а для Бори нет, Боря в последние пять лет научился многое видеть). Но на своем, первом, — он, как всегда, угадывал безупречно; просто кровяная местная сырость его отвергла, ему было с ней не сладить, его темперамент воспитан был пустыней, а не болотом.</p><p class="p1">— Нет, — сказал Боря наконец. — Так не говорят. Но думают наверняка. Я вот, честно вам скажу, кое-что из этого подумал.</p><p class="p1">— Правильно, — похвалил Горелов. — Он дело говорит. Просто жаль, что у нас это сказать некому. А так-то ведь сразу было ясно, что исторически нам суждено действовать вместе. И чтобы выбить у врага его оружие… хорошо бы кто-нибудь здесь вслух это объяснил, вы не находите?</p><p class="p1">— То есть я?</p><p class="p1">— Почему именно вы? Но кто-то из ваших подчиненных. Дать статью. Объяснить исторические корни. Показать, что это предопределено, и что национал-социализм — тоже социализм. В любом случае у нас с ним и больше общего, чем между нами и всей остальной Европой. Считайте, что я вам дал конспект.</p><p class="p1">— Погодите, — не понял Боря. — Но ведь после публикации такой статьи…</p><p class="p1">— Ничего не будет автору такой статьи, — равнодушно объяснил Горелов. — Но сейчас она нужна. А потом… мало ли что потом. Сначала мы с ними поделим Европу. Потом, может быть, и все остальное поделим. А потом задавим, потому что нас победить нельзя, у нас больше пространства, чем может пройти враг. Это многократно проверено. Мы непобедимы.</p><p class="p1">— Но иметь их в союзниках…</p><p class="p1">— Тактика, — сказал Горелов. — Сейчас такая тактика. Но вообще-то неужели сразу не было понятно, что классовая близость и тэ дэ. Единственное разногласие — по еврейскому вопросу, но оно сейчас не принципиально. Принципиально сейчас то, что наш общий враг англосакс. Объясните там это или пусть кто-то.</p><p class="p1">Он высказал все главное и, казалось, засыпал прямо за столом. Видно, много работы было у них сейчас.</p><p class="p1">— Я все сделаю, — сказал Боря. — Но я хочу вас попросить. У меня взяли невесту.</p><p class="p1">— Невесту? — Горелов поднял бровь и, кажется, заинтересовался. — Вы разводитесь?</p><p class="p1">— Да. Мы собирались пожениться через месяц. Я вам про нее рассказывал.</p><p class="p1">— Я помню. Возвращенка, да?</p><p class="p1">— Да. Это было неделю назад, я не хотел беспокоить.</p><p class="p1">— Почему, вы звоните в случае чего. Телефон же есть у вас. Все данные ее мне передайте.</p><p class="p1">Боря продиктовал.</p><p class="p1">— Это проверка, я думаю, — сказал Горелов, явно избегая серьезного разговора.</p><p class="p1">— Проверка длилась бы меньше. Это связано, видимо, с ее заграничными делами.</p><p class="p1">— А может, и с заграничными. Ее отец приехал?</p><p class="p1">— Приехала вся семья год назад.</p><p class="p1">— Ну, я думаю, вы ответ получите через ее отца.</p><p class="p1">— А насчет свидания… я хотел попросить свидание…</p><p class="p1">— Свидание может быть после суда, а тут мы не знаем еще, будет ли суд. В любом случае через неделю отец все узнает.</p><p class="p1">Это был тупик. Боря попрощался и вышел под дождь. Вероятно, если бы он знал, какой смысл Горелов вкладывал в свой ответ, он бы ударил его. А может быть, и нет. Скорей всего, нет. Он и забыл, когда в последний раз кого-нибудь бил.</p><p class="p1">Тем не менее ответ действительно пришел, и действительно через отца. Удивительно, каким идиотом был Боря до сих пор: он так и не научился понимать их шутки. Разумеется, через неделю отца взяли, а сразу после этого матери с Шуром приказали выселяться. Это означало, что надо было искать комнату в Москве, регистрировать, перевозить вещи — мать Али была совершенно беспомощна и пребывала в непрерывной тихой истерике. Реальности она не понимала вовсе. То ею овладевала бешеная активность — сейчас же! немедленно! бежать к следователю, искать его где угодно, ее не могут не пустить! Писать на самый верх, объяснять, что чистейшего, лучшего человека, чем муж, она никогда не встречала, что Аля всегда была папиной дочкой, вся в него, и категорически не способна лгать… То она стояла неподвижно, хотя Боря умолял лечь, выспаться, — она, кажется, перестала спать вовсе, — и повторяла: я всегда это знала, вся моя жизнь шла к этому, всё это с самого начала не могло кончиться иначе… Она не принимала и не хотела никаких утешений, у нее словно была задача — сорвать все повязки, превратиться в сплошную открытую рану, все перечувствовать как можно полней и зафиксировать. А для кого фиксировать, для чего? Теперь всем переживаниям была грош цена; теперь каждый день, и в особенности каждую ночь, происходило такое, что говорить о личной трагедии было бессмысленно. Все сорвалось в трагедию мировую, где никакая частная жизнь и тем более никакая литература ничего не значили…</p><p class="p1">Боря нашел комнату. С дачи съезжали два дня, оказалось страшно много вещей, как они все это перевезли оттуда? Ужасен был растерянный Шур, злобно шипевший на мать, виновницу всего, как ему казалось; дважды он попрекнул ее тем, что она привезла его сюда. Они поселились на Покровском бульваре у мерзкой хозяйки, с самого начала понявшей, что над этими прокаженными можно глумиться нагло и безнаказанно. Боря попытался припугнуть, но и Борю она не пожелала слушать, потому что серьезный человек не мог быть связан с такими. Его журналистское удостоверение на хозяйку не действовало, да и ни на кого не действовало — в стране осталось только одно удостоверение, которое впечатляло. Все остальные годились максимум потешить тщеславие.</p><p class="p1">Большая часть Борисовых денег уходила теперь на поддержание обезглавленной семьи, на передачи Але, на скромные даяния Шуру, оказавшемуся вдруг и застенчивым, и деликатным. Он стремительно вырастал из всего и страшно смущался. Рубахи протирались на локтях, штаны были коротки. При этом Шур напряженно следил за политикой и постоянно стремился о ней говорить. Он между строк читал газеты, вел дневник и делал выводы о характере будущих военных действий. Его интересовали мельчайшие государства, он оценивал города по их стратегическому значению, рисовал от нечего делать карты, и постепенно становился создателем многотомного эпоса о грядущей войне. Эпос писался в толстых клеенчатых тетрадях, поражал детализацией и катастрофизмом мышления, свойственным, говорят, представителям гибнущих классов. Там были новейшие виды вооружения, главным образом из нержавеющей стали, но органичны были бы и летающие драконы. Одинокий мальчик, которому не о чем было говорить со сверстниками и с матерью, который из-за мучительной застенчивости не общался с девочками, да и о чем он мог говорить с пролетарскими девочками, — весь уходил в эту выдуманную войну, на которую, разумеется, страшно боялся попасть: он с недосягаемой высоты озирал поля сражений, в каковые были вовлечены уже и вся Юго-Восточная Азия, и Гренландия, и партизанские отряды детей, новые их крестовые походы. В этой войне Россия все теряла и все потом отвоевывала, потому что она-то, в отличие от европейских стран, могла сократиться до одного поселка и с этого поселка начаться. Лучше всех понимал это Александр Первый, отказываясь от мира с Наполеоном. Такой гигантский кусок был непоглощаем. По прогнозам Шура, Россия растекалась на всю Европу, хотя поначалу теряла и Ленинград, и Свердловск.</p><p class="p1">Он был славный мальчик, умевший подшутить над собой, страстно желавший выглядеть взрослым, действительно очень взрослый с виду, но умственно он как бы все время оказывался в коротких штанах и с прорехами на локтях. Любое мировоззрение было ему тесно, поскольку все здешние мировоззрения — по крайней мере легальные — были рассчитаны на дошкольников, а он уже был честным третьеклассником, иногда сомневавшимся, страшно сказать, даже в марксизме. Боря гулял с ним по всем местам, где любили они бродить с Алей, — Аля обожала эти пешие прогулки, бессмысленные, с его точки зрения: ей надо было налюбоваться, и он снисходил — «Что ж, любуйся». У Шура не было этой ее экстатической любви к новой Москве, он скучал по Парижу, Париж знал идеально и рассказывал о нем с памятливостью гида. Чувствовались в нем и попытки полюбить Москву, и все в ней, и даже кино, — но он принимался всерьез разбирать фильм, и фильм не выдерживал даже этой детской критики. Об отце он почти не рассказывал и, кажется, считал его неудачником. Однажды, в порыве откровенности, признался, что, кажется, у них с Алей разные отцы — «Во всяком случае, я никогда не чувствовал к нему… как это сказать? — affection? С матерью могут быть любые склоки, она часто невыносима, но между нами все равно la corde. С отцом никогда этого не было; все чужое, запах чужой». Но больше он к этому разговору не возвращался, потому что дурно говорить о сидельце не принято ни в русской, ни во французской среде.</p><p class="p1">В феврале перестали брать передачи Але, хотя отцу по-прежнему брали; ее отправили на этап, его следствие длилось. В марте пришло от Али первое письмо. И Боря тайно порадовался, что она написала ему первому, до матери, до брата, — хотя тут же явилось ужасное чувство, что от матери и брата толку не было, а на него она могла еще надеяться. И вот странность: он был уверен, что там — как бы ни выглядело это «там», а ему оно представлялось в виде зловонного каменного мешка, — отмирают все прежние чувства, вся мелочь, остается только любовь, и то в самых шкурных проявлениях; но вот поди ж ты, Аля, оказывается, ревновала. «Там» вышла неловкость. Она знакомилась с обитателями камеры — в письме это называлось «новой квартирой» — и представилась как его жена. «Позвольте, но я прекрасно знаю его жену! Она мой врач!» Недоразумение выяснилось, но холодок остался, а ведь там от первого знакомства зависит очень многое. Там людям делать нечего, и они всё примечают друг за другом. Здесь, отозвался ей Боря по вечной привычке с ходу вступать в диалог, прекрасный, быстрый, насыщенный диалог с ней, ни с кем больше не представимый, — здесь тоже всем нечего делать. Они ничего не делают, только боятся или притворяются; настоящего дела давно не осталось, только странные чемпионаты по труду вроде стахановских, не созидательные, а скорей разрушительные. Вот все и следят друг за другом, к чему бы прицепиться. Он часто ловил на себе такой взгляд — особенно стариковский, старушечий: все они хотели сделать ему замечание, торопились первыми. С доносами была примерно та же ситуация. Но к делу.</p><p class="p1">Ей дали шесть лет, то есть фактически оправдали; это уже обнадеживало. Условия, писала она, были сносные; диета, конечно, строжайшая — он все понял, — но в остальном почти как в крымском санатории, ты помнишь? Он помнил этот отдых строгого режима и побег оттуда; о, если бы теперь хоть день!.. Бывает даже кино, продолжала она. Отношение к ней ровное. Она в Котласе. Он знать не знал никакого Котласа. Вообще с географией выходило интересно: география в разговорах начала тридцатых была — Донбасс, Кемерово, Нижний Тагил. Через пять лет — Халхин-Гол, Барселона, опять же Теруэль. А теперь в перешептываниях мелькали Магадан, Норильск, Котлас — так постепенно осваивалась империей мировая карта: стройки, потом войны, потом зоны. Это была карта укреплений, тоже война, неизбежные этапы выживания: сперва занимали пространство жизни строительством, потом атаками, потом вот этим. Но пространство оставалось пустым, чем его ни заполняй.</p><p class="p1">Аля писала еще, что работает швеей, что пригодились давние полудетские навыки, что норму давать не может, но есть прогресс; спрашивала о работе, передавала беспомощные, бесполезные приветы всем, кто так стремительно ее забыл. Боря так выгорел за последние полгода, что из всех чувств остался ему, кажется, только страх — умирающий, в отличие от надежды, последним, — да злоба, мертвая, сухая, вовсе уж не святая злоба; но, когда он дочитал до этих приветов ее прямым, круглым, дисциплинированным почерком, что-то вроде ястребиного клекота вырвалось у него — вот так он теперь плакал.</p><p class="p1">О статье она не писала, но он догадывался — опыт эмиграции был теперь приговором. Он сразу стал хлопотать о поездке. Горелов-второй отвечал уклончиво, правый уклонист; говорил, что о свидании можно просить только через полгода, что Аля никак еще себя не зарекомендовала, что он свяжется, запросит и т. д. Был соблазн — Боря уж подумывал — кого-нибудь крупно сдать и как бы выменять на Алю, но тут стоял барьер, а главное — он понимал, что и этим ничего не решится. Что-то должно было произойти.</p><p class="p1">Кончилась небольшая и бесславная война, бледная тень Халхин-Гола, так и не переросшая опять в большую, которая списала бы все; дружба с Германией продолжалась, и странна была эта дружба. Все в ней дышало ненавистью, причем взаимной; ненависть чувствовалась в тоне переговоров, в непрерывном торге, в гримасах, с которыми Молотов и немцы позировали для совместных снимков. В улыбках было нечто идиотическое, гротескное, явно провоцирующее. Шур плакался о судьбе Парижа и говорил, что, возможно, Петена еще назовут спасителем Франции. Боря с ним не спорил и переводил разговор. Польша перестала существовать, и о ней не сожалели. В конце концов, старик, говорили те немногие, с кем он еще разговаривал, — Мюнхен ведь тоже был, что ж вы теперь обижаетесь? Из Латвии пришел восторженный репортаж о новой, советской жизни. Такой же прислали из Буковины. Боря писал Але дважды в неделю, мог бы и чаще, но письма нечем было бы заполнять — не о прочитанном же говорить с ней? А так была хоть какая-то форма контакта. Он страшно тосковал по ее голосу и телу, стыдился признаться в этом, стыдился спросить себя: осталось ли что-то от этого тела? Аля была крепкой, сильной и притом столь чувствительной к малейшим переменам тона, что невозможно было представить ее в обстановке, где оскорбляло и мучило все. Самое ужасное, что он продолжал ее желать. Новых женщин в его жизни не появлялось, измену Але он почел бы непростительной мерзостью. Любовь перешла в план бесплотный, почти бесполый, идеалистический. В письмах он старался напомнить — словечками, условными знаками — лучшие их минуты, но не знал, утешает этим или растравляет. В конце концов, «Nessun maggior dolore che ricordarsi del tempo felice nella miseria» — это-то он помнил с брюсовских времен, славно вколачивали, — но, с другой стороны, на что еще опираться? Сам он только этой памятью и дышал, и держался, и заставлял себя зарабатывать.</p><p class="p1">В июле Горелов наконец дал понять, что поездка возможна. Боря почти не слышал о таких чудесных вариантах, хотя по закону — о, как приветствовала Аля эту человечность советских законов, как ставила в пример той же Франции, с ее Французской Гвианой! — полагалось ежегодное свидание, а за примерное поведение могли дать и второе. Но не было случая, чтобы кто-то ездил к родственнику, в особенности к невенчанной жене. Вероятно, от бесед с Гореловым действительно был толк, хоть Боря и не называл фамилий; да и что удивительного? Фамилию всякий назовет, а ты поди опиши чужие мысли, тем более свои! Единственный известный ему случай, о котором он узнал случайно, через ленинградских знакомых, был с Ивановой, журналисткой, начинающей драматургиней, так страстно любившей мужа, что ей разрешили свидание; Боря не знал, чем была оплачена эта милость. Возможно, дебютная пьеса Ивановой понравилась на самом верху — речь в ней шла об уральском богатыре, в новом славянском и даже, пожалуй, германском духе, — все эти малахитовые шкатулки были один в один срисованы с гриммовских сказок о гномах и карлах, о драконах, охраняющих яхонты. Возможно, что Иванова купила поездку тем же, чем и он. Наконец, может быть, она была такая красавица, что… Боря поехал в Ленинград, встретился. Она легко согласилась повидаться, что-то чувствуя, — все теперь что-то чувствовали; с виду оказалась хрупка и неказиста, только глаза были хороши, как у всех некрасивых: круглые черные ростовские глаза. В Ростове она занималась примерно тем же, что и он в двадцатых в Москве, и тоже любила двадцатые, а когда они кончились и в Ростове стало тесно, переехала в Ленинград, где еще оставался воздух. Теперь его выкачивали и здесь, словно мстили за эту отсрочку.</p><p class="p1">Они встретились с Ивановой в буфете «Октябрьской», где он остановился. Рядом шумно обедали какие-то полярные летчики. Как он понял, что они полярные летчики? Никак, прозвал так. Боря с Ивановой, напротив, разговаривали тихо, как больные среди здоровых. Оба с первого взгляда поняли, что черная метка на них одна и та же, оба были не из этих лет, и оба покупали выживание не совсем чисто, хоть Боря и не поручился бы, что у нее свой Горелов. Неизвестно еще, что лучше, — Горелов или пьеса в постбогатырском духе, в соответствии с девизом эпохи «Взлезай на печку».</p><p class="p1">Иванова была почти его ровесница, года на три помладше. Она ездила к мужу примерно в те же края. Еще повезло вам, сказала она, закатывают и дальше по нашим-то статьям. Его не покоробило это «наше», хотя раньше он бы отдернулся. Его всегда раздражали попытки несчастных распространить на всех свое несчастье, а теперь он даже умилялся. Наши места, наши статьи… Иванова усмехнулась: представляете, я добиралась туда с цыганским табором. Они ездили навестить своего барона. Баро, поправил Боря. «Ну да, но я привыкла по Ростову — барон. И представляете, они даже там умудрились достать лошадей!» Боря засмеялся истерически, несоответственно поводу, — собеседница глянула на него с испугом, но он не мог остановиться: цыгане в Архангельской области достали лошадей! И вот еще, продолжала Иванова: денег берите побольше, все, что можете. Там деньги многое решают, дерут за любую ерунду, за то, чтобы быстрее привели, чтобы на лишний час оставили, — тарифы на всё. И еще. Тут она помолчала и повторила: да, еще. Вы не удивляйтесь. Я ехала, все понимала, но не могла представить. Мы думаем, что там хоть что-то общее… с ними, с прежними. Хотя бы внешняя оболочка. Этого нет.</p><p class="p1">— Как? — не понял Боря.</p><p class="p1">— Так. Их просто нет. Это другая форма исчезновения, и я подумала даже… Ужасный грех, но я правда подумала: может, и лучше было бы… По крайней мере сразу. Даже если вдруг, когда-нибудь, непостижимым образом они вернутся — это будут совсем не они. Просто не ждите. Те, кто там, — они тоже нуждаются в любви, им нужны посылки, им надо письма… Но просто если вы действительно едете — кажется, она не верила, что кому-то, кроме нее, обломится такая милость, — то не ждите, что вот… Там ничего, ни-че-го. — И в этой жестокости он узнал человека своей закалки, человека двадцатых, из которого никак не удавалось выбить точности и честности. — Постарайтесь как-то заранее. Потому что я не смогла скрыть, и он все прочел по глазам. И так улыбнулся, знаете… так, как мой муж никогда бы не улыбнулся.</p><p class="p1">Боря не поверил, разумеется, но кивнул. Он все хотел спросить, почему ей удалось, а никому вокруг не удавалось, — но не решился.</p><p class="p1">— Мы все уже умерли, — сказала вдруг Иванова и впервые прямо посмотрела на него круглыми черными глазами, в которые он на миг провалился, как в болото. — Все умерли, нас осталось только убить.</p><p class="p1">— Ну, с этим никогда не задерживаются, — сказал Боря беспечно.</p><p class="p1">Иванова ничего не ответила.</p><p class="p1">…Он выехал из Москвы поездом на Воркуту, который плелся необычайно медленно, иногда вставая в чистом поле; глубокой ночью, по-северному светлой и оттого еще более страшной, он сошел на станции, от которой надлежало искать попутную машину, а дальше добираться еще десять километров чем придется. Горелов не снабдил его никаким письмом — да и какое письмо тут было возможно? Сказал только, что «там предупреждены». Никакой машины, понятное дело, не было. Откуда цыгане взяли в этом краю лошадей, Боря представить не мог. Добираться пешком он и не мыслил, поскольку тащил тяжелый чемодан с продуктами, теплыми вещами и зачем-то еще с книгами, Господи, книгами от Алиной матери. «Вы не понимаете, она совершенно не может без книг, она в письме просила словарь итальянского языка!» — разумеется, для общения с надзирателями ей необходим именно итальянский язык; но возражать было нельзя, она пришла провожать и сунула ему в руки пакет с пятью толстыми томами, еле вместившимися потом в чемодан, тот самый, кстати, с которым они тогда… о, tempo felice!..</p></span>
