<span><p class="p1">Но тут, казалось, сама судьба его подтолкнула: режиссер Степанов договорился в «Колизее». Там двадцать девятого декабря предполагалось новогоднее празднество, и на последнем сеансе студия получила концерт. Пение, танцы, стихи со сцены, все это, разумеется, бесплатно, но потом вечеринка в фойе уже для своих. До глубокой ночи, сколько сил хватит. К Новому году готовились по всей Москве так широко и празднично, словно он должен был наконец принести избавление от всех страхов: город украшался, иллюминации было много, как никогда, в школах разрешены были танцы — словом, по угрюмому замечанию угрюмого Севки, «веселились, как в последний раз». Очень может быть, что балы действительно устраивались напоследок: с будущего года предполагалось раздельное обучение — не везде, а в лучших школах, своего рода смольных институтах и пажеских корпусах. «И обязательно чтобы на линейке „Боже, царя храни“», — говорил Горецкий. Вообще все удивительно распустили язык, словно постепенный переход обратно к царизму предполагал и некоторую фронду. Это пролетариату нельзя, говорил Горецкий, а лицеистам можно.</p><p class="p1">Таким знаком судьбы нельзя было пренебречь: Миша жил ровно напротив «Колизея». Оставалось уговорить родителей двадцать девятого декабря отсутствовать подольше, часов эдак до трех. От ночи 29 декабря все чего-то ждали: Орехов, кажется, имел виды на Аню или Надю (не на обеих же), но на ком остановиться — пока не представлял. Горецкому нравились все. У Севы была Люся, и с ней, кажется, давно уже все было, даром что она оставалась в студии единственной школьницей; именно в Люсе было волшебное сочетание робости и наглости. Как большинство ранних дебютанток, она была не слишком хороша: перед красавицами все робеют, а тут что ж робеть, да еще и при явно провоцирующей смелости? Сева был одинок, неприкаян, Люсина любовь была для него спасительна. Остальные не определились, кажется, или Миша попросту не успел вникнуть в сложный клубок притяжений и отталкиваний, образовавшийся в студии за год ее существования, — но все ожидали развязки. Атмосфера несколько истерического веселья уплотнялась по мере приближения празднества с физической, невыносимой осязаемостью. Лия словно решила ничего не предпринимать. Они оба всё понимали и двигались к неотвратимому, и только иногда Миша ловил на себе ее вопросительный, почти жалобный взгляд.</p><p class="p1">К празднику каждый готовил свое: Севка пел «Кирпичики» с новым, оптимистично-индустриальным текстом. Показывали третью сцену из «Города ветров» — монтаж-поверку, где каждый в рифму, а то и с песней рассказывал о родном крае. Родные края у всех выходили почти неотличимы и, кажется, довольно противны, коль скоро об отъезде оттуда сообщали с таким восторгом. Маленький серьезный Сема показывал фокусы. Товарищи, перед вами бутылка с водой. Всем видно? Теперь, товарищи, закройте глаза. Нет-нет, не подглядывайте! Раз… два… ТРИ! Товарищи, она абсолютно пуста! Как это могло получиться? Никакой алхимии, товарищи, одна наука! Студенты подтвердят вам, что точно так же исчезают деньги, можно даже не закрывать глаза. Миша собирался почитать, но еще не решил: ему и хотелось поучаствовать в общем празднестве, и стыдно было вылезать со своей самодеятельностью. Все-таки стихи — серьезное дело, они не могли не прозвучать диссонансом. Лия должна была блистать на вершине пирамиды и собиралась еще спеть, Горецкий вызвался аккомпанировать, и Миша нисколько не ревновал.</p><p class="p1">В магазинах появилось множество ватных вещей — сугробы с наклеенными блестками, деды морозы в небывалом количестве, парики и накладные бороды, жизнь затихла, даже о политике писали все меньше, разве что британцы наступали на итальянцев. Из разговоров в квартире Миша запомнил главным образом, что год был плохой, високосный, и наступающий наверняка будет счастливее. Сам он не мог сказать о сороковом годе ничего однозначного. С одной стороны, год был ужасен, невыносим, с другой — небывало ярок и принес ему великие надежды. Между тем спроси его кто-нибудь, любит ли он Лию, он не смог бы ответить с последней честностью. Лия была слишком хороша, чтобы ее любить. Если совсем прямо, то все, случившееся с ним в 1940 году, было незаслуженно: и ужасное, и прекрасное. Будущий год должен был все это выправить, а точней, вправить, как вывих; и при этой мысли Миша сжимал зубы. Вывих ему однажды, в третьем классе, вправляли.</p><p class="p1">Настало и двадцать девятое; Миша все утро перелистывал последнюю тетрадь и решился прочесть одно, совсем не праздничное. Диссонировать, так до конца. Ему почему-то казалось, что, если он не выступит, — у него не будет на Лию вовсе уж никаких прав. После предпоследнего сеанса — то была «Музыкальная история», натужно-веселая, без единой запоминающейся реплики, в самом деле очень похожая на исполнение арии Ленского пролетарием в натуральном виде, — в фойе расставили стулья в пятнадцать рядов; желающих праздновать было много больше, чем стульев. «Аншлаг, аншлаг!» — потирал руки Орехов.</p><p class="p1">Во время второго танца — это был медленный фокстрот «Домовой», — Лия спросила просто и серьезно:</p><p class="p1">— Миша. Тебе это нужно вообще?</p><p class="p1">— Что? — на всякий случай спросил Миша.</p><p class="p1">— То, для чего ты меня собираешься вести к себе.</p><p class="p1">Миша ничему с ней не удивлялся, да вдобавок выпил.</p><p class="p1">— Нужно, — сказал он так же просто.</p><p class="p1">— У тебя это уже было? — уточнила она.</p><p class="p1">— Было, — соврал Миша.</p><p class="p1">— Понимаешь, — Лия глядела на него очень прямо, — я обычно про всех могу это сказать. А про тебя не могу. Много что могу, а это нет.</p><p class="p1">— Ты, Лийка, цыганка, — сказал Миша, пытаясь свести все на шуточку.</p><p class="p1">— Может быть. Это неважно. Я просто действительно не знаю.</p><p class="p1">— Тогда, может быть, мы пойдем и все узнаем?</p><p class="p1">— Мы пойдем, — сказала она. — Но не сейчас.</p><p class="p1">— А тебе, — спросил он, осмелев, — это совсем не нужно?</p><p class="p1">— Вот я и думаю, — ответила она. — Думаю и пока не понимаю. Но у меня это было.</p><p class="p1">Тут Миша опешил. Ему потребовалась пауза.</p><p class="p1">— И что? — спросил он. — Это было плохо?</p><p class="p1">— Это было очень хорошо. Настолько хорошо, что мне теперь каждый раз трудно решиться.</p><p class="p1">Ого, подумал Миша. Каждый раз.</p><p class="p1">— Сколько же тебе было? — этот вопрос его действительно интересовал.</p><p class="p1">— Мне было шестнадцать лет. И я не жалею.</p><p class="p1">— Лийка, а ты вообще о чем-нибудь жалеешь?</p><p class="p1">— Пока нет. Потому что я сначала понимаю, а потом делаю. Пойдем, возьми мне мороженого.</p><p class="p1">Они протанцевали еще два раза, и Лия была молчалива и странно послушна.</p><p class="p1">Наконец сказала:</p><p class="p1">— Ладно, чему быть, того не миновать. Пошли.</p><p class="p1">— Лийка, если ты не хочешь…</p><p class="p1">— Да теперь уже какая разница. Ты что, боишься меня?</p><p class="p1">— Еще бы не хватало.</p><p class="p1">— Ну тогда пошли, — сказала она решительно. — Видишь, все уже как смотрят. Только и ждут, пока мы пойдем. Еще немного — закричат «Кисло».</p><p class="p1">— Почему не «Горько»?</p><p class="p1">— Потому что не свадьба, — ответила она с тихой яростью. — Веди давай.</p><p class="p1">Дома они долго и яростно боролись на диване в его комнате. То тихо целовались, то он принимался ее штурмовать, а она отчаянно защищалась, словно вообще забыла, почему тут оказалась, словно это у нее был первый раз, а не у пыхтящего Миши. Фонарь светил в окно, Миша проклинал себя и готов был отступиться, но смешно, смешно же, в конце концов! Лийка, бормотал он, ну почему? Она молчала и отворачивалась, потом целовались снова, потом начинался новый штурм, и Миша уже боялся, что, если до дела все-таки дойдет, он будет к этому моменту ни на что не способен. Сначала она еще улыбалась, он шутил, теперь оба молчали, и лицо ее было все угрюмее.</p><p class="p1">— Миша, — сказала Лия вдруг трезвым спокойным голосом. — Давай ничего не будет.</p><p class="p1">Он опешил и замер.</p><p class="p1">— Сейчас не будет, — добавила она. — Потом, может быть. Давай будет потом. Пусть у нас какое-то время будет это на потом.</p><p class="p1">— Ага, — сказал Миша, стараясь выровнять дыхание. — Морковь перед носом осла.</p><p class="p1">— Миша, — сказала Лия и замолчала. Некоторое время они лежали, не шевелясь.</p><p class="p1">— Теперь ты должна сказать, что я очень хороший.</p><p class="p1">— Но ты действительно хороший. Просто я знаю.</p><p class="p1">— Что же ты знаешь?</p><p class="p1">Лия села.</p><p class="p1">— Я действительно иногда знаю, — она словно оправдывалась, и потому он не мог даже рассердиться на нее по-настоящему. — Ты хороший, и я хорошая. У нас может быть когда-то, потом, и будет. Когда ты уже будешь не такой хороший, а я тем более. Но понимаешь… Как это сказать. У тебя есть плохая девочка или должна быть, но думаю, что уже есть. Ты уже знаешь ее. И она плохая. И у вас все будет. Вам будет что делать вместе, понимаешь? А нам пока нечего. У тебя сначала должна быть она.</p><p class="p1">— А у тебя кто?</p><p class="p1">— Может быть, никого. Я не знаю. Но потом будет лучше, правда. Я же не говорю тебе нет. Я же не пошла с Горецким. У меня это было уже, и хватит. Просто потом это может быть так хорошо, что сейчас не надо портить. Может быть, потом… когда мы будем готовы, не знаю… может быть, от нас родится кто-то невероятный.</p><p class="p1">— Но зачатие должно быть непорочным, — сказал Миша слишком зло и покраснел в темноте.</p><p class="p1">— Глупый ты какой, — сказала Лия. Другая девочка погладила бы его по голове и все испортила, но это была Лия, она делала только точные жесты. Сейчас точный жест был — расстегнуть пуговицы у ворота. — Ну хочешь, я сама? Только смотри, ничего не делай и смотри. Вот. Видишь? И нечего бороться, незачем пыхтеть. Я сама. Смотри и запомни. Вот я такая, и я буду твоя. Но потом. Пожалуйста, Мишка, пожалуйста!</p><p class="p1">Это был, конечно, обман — так, по крайней мере, казалось Мише после, — но теперь он купился. Разумеется, она сберегла себя для кого-то другого, может быть, того, с кем все уже и было, — но простой трюк подействовал, и он удовольствовался подачкой. Помажут и покажут, а покушать не дадут. Так думал потом неприятный человек Миша, обозленный неудачей, но в тот самый момент, при свете ртутного уличного фонаря, он смотрел на ее грудь как на святилище, смотрел с благоговением, и жест, каким она распахнула белую рубашку, казался ему жертвенным и трогательным. Она даже чуть подалась вперед, чтобы ему было лучше видно. И, даже в эту минуту ко всему подбирая эпитет, он подумал о млечной белизне — не молочной, а млечной, архаической, библейской.</p><p class="p1">— Хорошо, трогать нельзя, — сказал он тихо и хрипло. — Но хоть поцеловать можно?</p><p class="p1">— Не надо, пожалуйста, — сказала она просительно, но в то же время и гордо, без малейшей мольбы.</p><p class="p1">Он не знал, долго ли смотрел, но в конце концов — конечно, не насытив взгляда, но, как всегда в ее присутствии, почувствовав меру, — сказал грубовато:</p><p class="p1">— Ладно, замерзнешь.</p><p class="p1">И так же естественно, как только что расстегивалась, Лия застегнула рубашку.</p><p class="p1">— Но ты обещаешь? — спросил он совсем уже по-дурацки.</p><p class="p1">— Ничего ты не понял, Мишка, — вздохнула она без всякой театральности. — Что же я могу тебе обещать? Я буду просто очень ждать. Очень хотеть. Видишь, какие вещи я тебе говорю.</p><p class="p1">И она ушла, потребовав, чтобы он ее не провожал.</p><p class="subtitle">— 11 —</p><p class="p1">Засыпая, он думал, что утро следующего дня будет невыносимо. Но проснулся он, как ни странно, с чувством необыкновенной свежести, и подушка пахла волосами Лии, и в конце концов она ему оставила надежду, сколь ни жалким выглядело такое самоутешение. Почему-то он, так ничего и не добившись, чувствовал себя победителем. И если бы добился — наверняка теперь чувствовал бы себя хуже. Победителю вообще плохо: все время надо бояться, не уведут ли победу. А он теперь в нише благородного проигравшего — не побежденного, но именно проигравшего; и победа у него впереди. Так во всем.</p><p class="p1">Между тем конец года готовил ему сюрприз. Он вспомнил, как год назад ставил себе задачу непременно расстаться с невинностью, и что же? У него оставалось два дня, которые уж точно не приблизят его к разрешению этой задачи. Хорошо было в прежние времена: пойдешь к проститутке, и никаких страданий. Впрочем, много рисков иного порядка, и как-то стыдно. Тридцатое был день нерабочий, и он поплелся к Колычеву, хотя всякий раз себя корил за встречи с ним.</p><p class="p1">Колычев, как обычно, ему обрадовался. Ему приятно было видеть у себя на дне свежего человека.</p><p class="p1">Он расспросил Мишу, как все прошло, но в действительности этим не интересовался. Колычев готовился к собственному празднику. На Новый год он был зван к приятелю. Новый год они всегда справляли тридцатого, потому что тридцать первого было скучно. Колычева, как он говорил, раздражала вся эта новая эстетика. Ему больше нравился стиль пятилетней давности, когда никто еще ничего не праздновал и не было ватных дедов морозов.</p><p class="p1">— Они все время празднуют, ты заметил? — говорил он, грассируя. — Все празднуют. Все что-то отмечают. То у них Пушкина застрелили, то Маяковский застрелился. Им плевать, что первого поэта России пристрелил, как собаку, французский педераст, а последний поэт застрелился из боязни сифилиса, как гимназист. Они празднуют, изволят кушать. И заметил ты, что они кушают? Этого приличный человек в рот не взял бы. Они едят краба, морского таракана, едят миногу, морскую пиявку, которая даже не рыба. Она прогрызает рыбу и паразитирует на ней. С нее свисает, болтается, — он показал. — Впрочем, какие праздники, такие и закуски.</p><p class="p1">— А ты куда пойдешь? — спросил Миша, стараясь быть небрежным.</p><p class="p1">Новый год в их семье принято было встречать исключительно дома, но тридцатого можно и в гости, ничего страшного.</p><p class="p1">— А я пойду в один дом, любопытный дом. И тебя могу прихватить, если хочешь.</p><p class="p1">— Ну, это неловко, — сказал Миша, стараясь на этот раз быть скучающим.</p><p class="p1">— Неловко, да, — согласился Колычев. — Но очень смешно. Он, кстати, пристойный человек, метростроевец. Я сочинял им однажды праздничный монтаж к открытию станции метро «Площадь революции». Отлично заработал.</p><p class="p1">Знакомства и занятия Колычева были непредсказуемы. Впрочем, на дне всему выучишься.</p><p class="p1">Миша почему-то страшно не хотел, чтобы все сорвалось. Он прошлялся по праздничному городу до семи, чтобы еще чуть опоздать, и все это время думал о Лии, о том, что есть у них общее — даже слишком много общего, — а потому, возможно, им и не нужно сближаться. Но тогда, думал он, она может сойтись со своей противоположностью, с человеком из самого верха, потому что они тоже любят отнюдь не пролетарок. И это будет вовсе уже невыносимо. Он не знал до сих пор, любит ли ее, но уже ревновал.</p><p class="p1">Между тем начинало темнеть, и Миша подумал, что приспособился наконец к безразмерному свободному времени, которое у него теперь было. Он свободно плавал в нем, а не пережидал. Вообще, когда ты плаваешь в мире, а не относишься к нему как к временному испытанию, можно дождаться ответа, иногда благожелательного. Он не представлял, как вернется в институт, который — теперь это ясно было Мише — выполнял единственную функцию: помещал их всех в аквариум, давал отсрочку от жизни. Возможно, в таком аквариуме можно достигнуть выдающихся результатов — выучить, например, арамейский язык или прочесть хеттский диск; но цена этих достижений незначительна. Ему и в институтские годы приходила иногда странная мысль, что все это понарошку — и рассказы Гриба о Бальзаке, и Дживелегов со своим Средневековьем. Жизнь давно устремилась дальше, обтекая их, и надо было нюхать эту жизнь, в которой были не только колхозы, а и Колычев, и даже эти бессмысленные как будто скитания по зимним улицам. Побыть лишним иногда совсем не лишне. Лучше лишним, чем пристроенным. И к новому дому вблизи Таганки он подошел умиротворенным — не в последнюю очередь потому, должно быть, что и день был такой, как он любил, — мягкий, с обильным снегом.</p><p class="p1">Колычев был уже тут. Метростроевскому начальнику полагалась квартира в две комнаты, без роскоши, но с той же основательностью во всем, какая чувствовалась и в станциях первой ветки.</p><p class="p1">«Ты понимаешь, — тихо объяснял Колычев, — чем нынешний человек глубже в какой-нибудь норе, тем он лучше. Сейчас правильней всего находиться под землей, я живу в подвале, но это еще не совсем правильно. Вот Меркуров находится глубоко, и как-то вся эта атмосфера его не касается…»</p><p class="p1">У Меркуровых все было достойно и просто. Прекрасен был его большеголовый сын, симпатична смиренная дочь, в которой, однако, шипело и пузырилось тайное хулиганство, и в жене его, усталой, но доброжелательной, происхождения, как пояснил Колычев, крестьянского, тоже чувствовалась выносливость и глубокое, ничем не нарушаемое равновесие. А ведь подобрал ее Меркуров во времена, когда она бежала из деревни, бралась за все — в сущности, побиралась. Зато теперь она выстроила ему по-крестьянски ладный быт. Было несколько военных — непонятно, какое отношение они имели к Метрострою, и вид у них был такой, словно они только что прилетели с одного задания и теперь собирались на другое. Впрочем, у всех военных, каких Миша знал, включая подполковника Самохина из больницы, был теперь такой вид. Он думал, что будет случай за столом порасспросить военных, действительно ли уже вот-вот, — но как-то это было не совсем прилично.</p><p class="p1">Все было, как за обычным новогодним столом, но странной дополнительной радостью выглядело то, что праздник еще не сейчас, еще завтра. Меркуров добродушно пояснил, что отмечать все праздники загодя приучился именно в метро, когда накануне открытия станции те, кто ее строил, ехали первым поездом и потом пировали в пустом вестибюле, где завтра будет не протолкнуться.</p><p class="p1">Гостям были подаваемы холодец, вареная картошка, превосходные котлеты в золотистых сухарях. Из напитков была простая главспиртовская водка, потому что Меркуров признался с обычным своим прямодушием, что от вина пьянеет сильней, а водка помогает выводить из организма вредные вещества, образующиеся от подземной работы (ни о каких таких веществах Миша не слышал и решил, что это он так с серьезным видом шутит). Несколько запьянев и становясь, как всегда, многоречивей (но ничуть не глупей), Колычев воробьем наскакивал на военных: ну что там? ну что там?! Война продолжала его волновать и тут. Военные отделывались пословицами и поговорками. Худой мир, сами понимаете. Иногда отвечали чуть более распространенно: да подумайте, кто же отважится напасть? У них был такой прием — Миша откуда-то знал его, хотя с офицерами общался мало: они с таинственным видом, с особой секретностью сообщали что-нибудь общеизвестное, лишь бы отвязались. Ну вот посудите сами, говорили они: какая же может быть война? Я не имею права, сами понимаете, но просто задумайтесь: разве в танках, в авиации кто-то может сегодня иметь над нами серьезное превосходство? И не просто количественно, но я вас заверяю, что командирские навыки и все вот это. Ведь посмотрите, Испания, Финляндия, все это время мы именно соревновались. Весь мир видел. И мы показали такое доминирование в воздухе и на земле, что это, заверяю вас, отдалило всякую возможность.</p><p class="p1">Вот видишь, говорил ему Колычев, когда они вышли курить, они все подтверждают. Ему обязательно нужна война. Он ничего уже не сможет без войны. Если не будет войны, то ему будут смеяться в лицо. Ничто, кроме войны, не сможет все это списать. Поэтому они забегают то с одного, то с другого бока. И теперь я уже точно чувствую, что именно в этом году: у меня, братец, всегда сбывается — как встретишь, так и проведешь. В прошлом году я встречал без Нины, и провел без Нины, и испытал огромное облегчение. Человеку с моими данными нельзя иметь Нину, она выжрет у него все потроха. А в этом году я встречаю с военными, и уж это наверняка, вспомнишь Колычева.</p><p class="p1">Ближе к полуночи затеялась таинственная игра в предсказания. Больше всех радовались меркуровские сын с дочкой, Андрей и Аглая — кто сегодня дает такие имена?! — и Миша был действительно в ударе. Они с Колычевым солировали. Игру эту придумал или вычитал где-то Борис, она была в большом ходу в Карманицком переулке и на прочих институтских сборищах, но там все было по-детски. Правила состояли в том, что испытуемый мысленно задавал три вопроса. Был вариант, что они записывались на бумажке, но только в том случае, когда их можно было огласить. Иногда, случалось, у испытуемого была личная тайна. Вот так-то Миша и получил тайное, но совершенно определенное предсказание насчет того, что в наступающем году у него появится любовница, долговременная подруга. Медиум избирался всякий раз заново. Выделить медиума из числа присутствующих было несложно: ведущий рисовал на клочке бумаги нечто. Присутствующие отгадывали. Разумеется, все друг друга знали, но это не облегчало задачи. Легко было угадать только у Олега, всегда рисовавшего член, иногда крылатый (все знали его страстную мечту об авиации). Тот, кто попал ближе всех к реальности, — точно угадать не удавалось почти никому, — доказал свою сверхчуткость и, отвернувшись от испытуемого (иногда еще завязывали глаза), начинал отвечать. Эта игра прокатывала в любом обществе — будущим интересуются все; лучше были только танцы, но здесь попалось общество нетанцующее, хотя Меркуров и обещал, что скоро нагрянет настоящая молодежь, вот они покажут класс.</p><p class="p1">Ведущим назначили Андрея. Что бы он такое мог изобразить? Миша напрягся. Игра ведь базировалась на известном эксперименте Фройда или кого-то из его учеников, проверявших знаменитого телепата, — и телепат опростоволосился, но не совсем: испытатель нарисовал три квадрата один в другом, а телепат нарисовал просто три квадрата мал мала меньше; мало ли, информация может искажаться, как сигнал, идущий по проводам. Надо было сосредоточиться, самая большая ошибка была — настраиваться на внутренний мир Андрея, воображать ум выпускника, а ведь это совершенно неважно. То, что человек рисует, имеет столь же касательное отношение к его биографии, как и то, что я пишу: еще Гриб им доказывал, что поэт от своего прошлого не зависит и ловит голоса извне. На эту тему Гриб прочитал непонятное и потому запоминающееся: быть может, прежде губ уже родился шепот, и в бездревесности кружилися листы, и те, кому мы посвящаем опыт, до опыта приобрели черты. Какое отношение к этому имеет биография? Мысли носятся в воздухе, улавливать их следует оттуда, а не из личного прошлого. И Миша отчетливо увидел спираль, спиралевидную змею, которую Андрей непонятно почему изображал, отвернувшись к окну, в полумраке, чтобы и по движениям рук ничего нельзя было угадать. Колычев сказал — круг, военные — лошадь, лопата, хорошо, присоединяюсь, пусть будет лошадь; Меркуров предположил мороженое в стаканчике, мать — гитару, Аглая — пистолет. Прочие гости не придумали ничего интересней обычных предметов, стоящих в комнате: лампа, стол, люстра. Спиритом был назначен Миша, потому что Андрей нарисовал торнадо, о котором только что прочел в записках путешественника Стайна: это и впрямь была спираль, но вертикальная, крутящийся вихрь. И ведь подсказывало Мише нечто вроде внутреннего голоса, что спираль стоит вертикально, — но он не послушался. Впрочем, его интуиции и так хватило. Хорошо, его усадили на стул лицом к двери, а сами стали загадывать. Разрешено было задавать три вопроса. Первой спрашивала Аглая, непрерывно хихикая. Какие вопросы о будущем могли быть у пятиклассницы? Миша, однако, изобразил уважительную задумчивость. На первый вопрос после долгого молчания ответил: все-таки да. Аглая засмеялась, но как-то неуверенно. На второй — опять да. Она замолчала. На третий вопрос, посланный ему мысленным усилием, он почти машинально сказал нет, и вдруг она оглушительно зарыдала: у некоторых возбудимых детей, он знал, переход от смеха к слезам был стремителен. О чем она спрашивала? Он потом гадал: ну, а скажи он да — неужели все повернулось бы иначе и через двадцать минут вошли бы другие люди? Но другие люди могли оказаться и похуже.</p><p class="p1">Дальше спрашивал Меркуров, глава семьи. Мне нечего скрывать, сказал он, я могу вслух, но Миша настрого предупредил: если хотите, откроетесь после. Пока же извольте посылать усилием. Меркуров усмехнулся. Что ж, сказал он, первый вопрос. Но не совсем «да» или «нет», а скорее очень или не очень. Возможно, он спрашивал, очень ли плохи его дела или очень ли его любит жена. Миша изо всех сил попытался настроиться на его волну, но выпил все-таки порядочно и видел перед собой сплошное серое поле. Наконец он решительно сказал: нет, не очень. Меркуров хмыкнул — нервно, как ему показалось, — и задал второй, на этот раз только да или нет. Миша почувствовал сквозь легкий морок головокружения — с закрытыми глазами прямо сидеть было трудно, — что вопрос для него важен, что тут не шутки и что спрашивает он о чем-то пугающем. Нет, сказал он, решительно нет. Вот же на! — крякнул Меркуров, стараясь выглядеть огорченным, но в душе, кажется, ликуя. Я-то спрашивал, признался он фальшиво, откроем ли мы второй вестибюль у «Сокола». Выходит, не откроете, вздохнул Миша. Ну, это мы еще посмотрим, отозвался за спиной Меркуров, но без особенной суровости, словно его втайне радовала эта отсрочка. Ну, а третий вопрос? — спросил он, приятно размягченный. А третий и подавно нет, подмывало сказать Мишу, но он ответил сухим «да». Однако, воскликнул Меркуров. Ну, стало быть, надо обследоваться, а то все не решусь. Обязательно, поддакнул Миша.</p><p class="p1">— Ну-ка, а я? — спросил Колычев. Он явно сам желал побыть медиумом, и Миша решил предоставить калеке эту возможность.</p><p class="p1">— А медиум устал, перенапрягся. Нужна пауза. Не хочешь мне поотвечать?</p><p class="p1">— Это можно, — ухмыльнулся Колычев, уселся на Мишино место и потребовал, чтобы ему шерстяным шарфом завязали глаза.</p><p class="p1">— Ну, тогда первый вопрос, — сказал Миша и спросил четко: любит меня Лия?</p><p class="p1">Колычев думал с минуту, вертел головой, приставлял палец к носу и наконец сказал:</p><p class="p1">— Это неважно.</p><p class="p1">— Нечестно, нечестно! — закричали все, и военные тоже.</p><p class="p1">— Но мне является именно такой ответ, — пожал плечами Колычев. — Просто вижу красными буквами в темноте: неважно!</p><p class="p1">— Допустим, — согласился Миша. — Тогда вот еще.</p><p class="p1">Он спрашивал, восстановят ли его в институте.</p><p class="p1">— Да, но нескоро, — сказал Колычев. — Очень нескоро. Еще будет много всего.</p><p class="p1">— И тогда третий, — провозгласил Миша и поинтересовался мысленно, отомстит ли он Вале Крапивиной.</p><p class="p1">— А вот это произойдет немедленно! — четко ответил Колычев, и не прошло минуты, как задребезжал звонок.</p><p class="p1">«Это наши!» — радостно крикнул Меркуров и бодро поднялся встречать. В прихожей мигом стало шумно и даже на слух тесно; вошло человек семь, и Миша сразу услышал голос, который так ненавидел.</p><p class="p1">«А ведь медиум-то — Колычев, а не я», — подумал он, и Валя Крапивина в сером в клетку платье вошла в комнату.</p><p class="subtitle">— 12 —</p><p class="p1">Сессия была невыносима. Все смотрели на Валю как на злодейку. Сами его выгнали, а теперь она была виновата. Она дала им повод побыть мерзавцами, потравить, поулюлюкать, и теперь можно было все переключить на нее. А ведь она сама и заявление бы писать не стала. Хорошо, что Фомину отчислили. Никто не знал, что виновата Фомина, но симметрия была соблюдена. Если отчислили отличника Мишу, то зачем же терпеть тупую Фомину? До третьего курса она брала задницей, угрюмой усидчивостью, так мало вязавшейся с ее нервной натурой. Я нервная, говорила она, но упорная. И вот она все высиживала, выучивала. Но античная эстетика — предмет, где попа не вывезет, хотя бы эту попу и мяли все пролетарии Сокольников.</p><p class="p1">А на Валю, да, смотрели с крайним неодобрением, и она поначалу относила это на счет своей мнительности, ибо сама себя винила; но человек, который себя винит, для остальных еще более уязвим. В общежитие после занятий ехать не хотелось, и она часто просто шлялась где попало, заезжала порой и в глухие окраинные места, в которых ей странным образом было легче — там хоть люди не попадались, кроме одного ужасного случая, который был похож на галлюцинацию. Ей показалось, что она увидела Колю. Живого. Хотя до этого он даже во сне ни разу не привиделся. Она поняла, что эдакими путями недолго и с ума сойти. Сходила в поликлинику, пожаловалась на бессонницу и головную боль. Доктор задавала разные вопросы, не имевшие отношения к голове. Намекнула даже, что надо вести жизнь более активную, в том смысле, конечно, что плавать и бегать, но Вале послышался намек. И то сказать, она уже так долго пребывала в статусе вдовы, так долго никого не подпускала… немудрено было и с ума сойти. Коля хоть и не нравился ей по-настоящему, но он был сильный, здоровый товарищ. Правда, излишне разговорчивый — никто бы не подумал, на него глядя. С виду такой суровый, а все время рассказывал про свое детство, как будто только и ждал повода про него поговорить. Отца он, оказывается, ненавидел. Зачем ей было все это знать? Но после Коли-то не было никого… Конечно, она сделала большую, тяжелую ошибку. За эту ошибку следовало расплатиться.</p><p class="p1">И когда она беспомощно поплыла на экзамене по зарубежной литературе, Турищев, человек железный, чьего одобрения почти никто не слышал (Мишу он, впрочем, ценил, но и то никогда не хвалил вслух), спросил прямо: что же вы, Крапивина, не подготовились? Все от претендентов отбивались? Я поставлю вам, конечно, «посредственно», но, если вздумаете жаловаться, высокочтимая вдова, не пишите по крайней мере, что я вас домогался. Я, в отличие от товарища Симонова, вдовами не интересуюсь. Это сказано было наедине, она пересидела всех, отвечала последней, и потому он себе позволил. При людях бы сдержался, конечно. Но это было уж совсем за краем. Про товарища Симонова она не поняла, а расспрашивать однокурсников постеснялась. Если бы он поставил ей честный неуд, она бы, пожалуй, даже не расстроилась: все-таки уважение. Но этот пос, натянутый вдовий пос был хуже плевка, и он явно сказал то, о чем думали все. Первая мысль Вали была уйти к черту из института. Но, как ни странно, и вторая мысль была та же. И когда она под крупным мокрым снегом, одна, шла на Усачевку, ей вдруг представилось, что и вся история с Мишей была только для того, чтобы свернуть ее с фальшивого пути. Какой она филолог, какой ИФЛИ? Ну, писала сочинения получше других, читала побольше, но это по меркам Тамбова. Языки ей не давались, вообще все это было не ее. Конечно, не в Тамбов теперь возвращаться, но она и в Москве найдет работу, мало ли. И она с таким облегчением, с таким приливом счастья об этом подумала. Да еще по-московски мокрый снег, тяжелый, крупный, так падал, так светили усачевские фонари сквозь облепленные ветки, что на минуту с души свалилась вся тяжесть последних трех месяцев. Конечно, теперь все поймут, что ей ничего не надо, никакого вдовства. И хотя следующим утром она уже передумала, но еще через день, когда вдруг подморозило и строже стал весь пейзаж, и надо было готовиться к истории, а историю она ненавидела и дат не помнила, — ей все стало ясно, как ясны были строгие черно-белые улицы.</p><p class="p1">Почему-то она пошла к Драганову. Может быть, втайне надеясь, что он отговорит, а может быть, именно перед ним хотела оправдаться и сообщить о решении ему первому.</p><p class="p1">— А и очень хорошо, товарищ Крапивина, — сказал он вдруг. — И чудесно. И жизнь посмотрите, и вообще… А я даже так тебе скажу: вот товарищ Симонов поехал на Халхин-Гол, а товарищ Долматовский остался в аспирантуре. Так товарищ Асмус знаешь что сказал? Аспирантура дура, штык молодец.</p><p class="p1">Валя машинально кивнула.</p><p class="p1">— И вообще, если хочешь знать, вот это вот твое решение, — сказал он без обычного своего издевательского распева, — это решение, Крапивина, взрослого человека. Совершенно нечего тебе тут делать, и я очень рад, что к пониманию этого факта мы с тобой пришли практически одновременно. Оформляйся и приступай к созидательному труду, и мое тебе горячее одобрение.</p><p class="p1">Ей нужно было устроиться туда, где дают общежитие, и туда, куда возьмут охотно, сразу. В кадрах, она знала, больше всего нуждался Метрострой. Про это объявляли в метро, висели объявления, заманивали снабжением и особыми условиями для желающих потом поступить в институт. В институте она уже была, спасибо, а вот общежитие — это очень было хорошо. Она не хотела быть проходчицей, шпалоукладчицей, но и какой-нибудь учетчицей ей не улыбалось. А вот если бы машинистом или помощницей машиниста, потому что про эту профессию много писали. Девушки, водившие поезда, были как бы на виду, и ей хотелось оставаться в почете, пусть не за Колю, а уже за собственный труд. Она, конечно, не представляла, как это — быть машинистом такого стремительного состава, который несется в темноту гораздо быстрей обычного поезда. Но пока он несется, машинисту и свет первому становится виден, никто в поезде еще не видит, а он уже. И она отправилась записываться на курсы машинистов, потому что знала, что московский метрополитен — единственный, где женщин принимают на такую работу. Она читала даже про женскую бригаду в метро и думала, что если женщина может управляться с отбойным молотком, а таких примеров много, то как-нибудь управится и с поездом. Ведь в метро вагон не сойдет с рельсов, ему просто некуда.</p><p class="p1">Курсы располагались близ депо новой линии, на станции «Сокол», в странном здании из числа тех, которых никогда не замечаешь: оно было еще дореволюционной постройки, красно-кирпичное, но приобрело теперь бодрый и деловитый вид. В нем было крепко накурено, что служило первым признаком сосредоточенной работы. Крапивина узнала, где тут главный по кадрам, и прошла прямо в кабинет.</p><p class="p1">— Вы к кому, товарищ девушка? — весело спросили ее.</p><p class="p1">— Я по кадрам, — сказала она твердо. — Мне хочется на машиниста… записаться.</p><p class="p1">— На машиниста? — изумился плотный человек в косоворотке, с зачесом через плоскую лысину. — Да куда же вам на машиниста? Мы можем только после техникума да еще после курсов.</p><p class="p1">— Ну, я школу хорошо закончила, — не сробела Крапивина. — Десятилетку. Может, вместо техникума… это…</p><p class="p1">— Присядь, товарищ девушка, — сказал кадровик. — Работа машинистом трудная, не хухры-мухры.</p><p class="p1">— Ну, помощником.</p><p class="p1">— Так ведь и помощником надо сперва техникум. Ты формулу закона Ома можешь записать?</p><p class="p1">Валя помнила, что закон Ома бывает для полной цепи и для участка, и деловито уточнила:</p><p class="p1">— Для полной?</p><p class="p1">— Ну, хоть и для полной, — улыбнулся кадровик, не то радуясь ее познаниям, не то сознавая всю их хилость.</p><p class="p1">Валя решительно записала: I = U/R, но больше ничего не помнила.</p><p class="p1">— Это для участка, — сказал кадровик. — Ну, неважно. А чем вы после школы занимались? Или сразу к нам?</p><p class="p1">Он уже перешел на вы, потому что человек, знающий формулу закона Ома, хотя бы и для участка цепи, заслуживал уважения.</p><p class="p1">Валя собиралась было рассказать, что училась в институте, но хочет хлебнуть жизни, — но тут в отдел кадров решительно вошел мужчина лет сорока, крепкий, крупный и широкий, из тех, которые всегда спешат и вместе с тем никогда не торопятся. В нем чувствовалась начальственность.</p><p class="p1">— Кому ты, Макарыч, уши пудришь? — спросил он с порога, и это тоже было приятно, весело — пудрят ведь мозги.</p><p class="p1">— Девушка вот хочет быть машинистом, — пояснил Макарыч. — Согласна помощником.</p><p class="p1">— Да зачем же машинистом? — спросил ее быстрый. — Ишь, такую красоту под землю прятать. Машинист должен быть некрасивый, чтоб его не видел никто. Это я могу в машинисты или вот Макарыч. — При этом он знал, что вполне симпатичен, и улыбался очень радостно. — А вам зачем же. Мы вам лучше работу найдем. Вы какого происхождения?</p><p class="p1">— Я происхождения крестьянского, — сказала Крапивина, что было, конечно, не совсем так, но дед ее действительно был из крестьян, да и потом, человек из Тамбова не может быть никем иным, это же ясно. Все служащие там все равно имеют отношение к земле.</p><p class="p1">— Так это вообще прекрасно. Вы пойдете, красивая девушка, ко мне секретарем? Человек я основательный, серьезный, всякого легкомыслия себе не позволяю. А то у меня, понимаете, случился прорыв трудового фронта, секретарь мой вздумала рожать, некому чаю вскипятить. Пойдете? Меня зовут Георгий Степаныч.</p><p class="p1">И Крапивина, которая совсем было решила прикоснуться к тяжкому труду и загнать себя под землю, сразу согласилась — потому что она и так уже сделала над собой огромное усилие. Она ушла из института, где ее, может, и не любили, но уважали и побаивались. Она бросила ИФЛИ, знаменитое место. Неужели за такой подвиг ей не полагалось теперь послабление? Ведь работать секретарем в Метрострое не менее почетно, чем всякий низкоквалифицированный труд, и затем ли она заканчивала десятилетку? Так что она зарделась и согласилась, и Георгий Степаныч — между прочим, начальник нового депо, — сказал ей, куда приходить с документами.</p><p class="p1">Крапивина понимала, конечно, чем она ему понравилась. Было в ней такое, что видели не все, а только самые понимающие. Гвирцман вот видел (она его теперь не вспоминала иначе как по фамилии). И ей ясно было, что с Георгием Степанычем что-то будет, но у нее так долго ни с кем не было, что готова она была и с Георгием Степанычем. Работа у них пошла дружная, в меру тяжелая, сравнить хоть бы и с проходческой. Валя и была немного машинистом, потому что вела тяжелый и стремительный поезд — делопроизводство начальника депо; до нее работала, видно, девушка совсем легкомысленная. Она не успела передать дела, потому что рожать ушла чуть не с рабочего места, — но видно было отсутствие основательности. Крапивина была девушка аккуратная, но не это была ее сильная сторона; а сильная та, что умела она улыбнуться, и улыбкой этой передать многие оттенки — от «пожалуйста, вас ожидают» до «сочувствую, но ничем не могу». И в депо все были люди свойские, гораздо приятней, чем в институте, где все время надо было что-то из себя изображать. И общежитие было недалеко от работы, и дом поновей, чем на Усачевке, и, когда ее позвали на странный Новый год к Меркурову, да еще предупредили, что отмечать праздник будут по железнодорожным обычаям, — она радостно пошла, но не думала, конечно, ох, конечно, не думала.</p><p class="p1">Но если бы даже и думала, вот в чем заключается вся непостижимость женской природы, да и всякой вообще природы, — то непременно бы пошла.</p><p class="subtitle">— 13 —</p><p class="p1">— Самолет летит, колеса стерлися, — сказал Миша дурашливо. — А мы не ждали вас, а вы приперлися.</p><p class="p1">Самым чутким — как положено больному — оказался Колычев. Он не только сразу понял, что Миша знаком с новой гостьей, но и то, что он никак не ждал ее встретить, и то, что он этой встречи давно ожидал, и то, что Валя эта, скорей всего, и была та самая, на кого он темно намекал.</p><p class="p1">— Здравствуйте, Миша, очень приятно, — сказала новая гостья, тряхнув мокрыми от снега светло-рыжими волосами. Вид у нее был зазывный, влекущий, наглый: блядский вид, проще говоря, Колычев отлично такие вещи чувствовал, хотя и не любил. Ну, не всегда ведь и любишь то, что чувствуешь. — Вы тоже теперь устроились по метростроевской части?</p><p class="p1">— По части я медицинской, — сказал Миша, — а тут в гостях. А вы каким же образом, Валентина?</p><p class="p1">— А я по метростроевской, Михаил, по самой вот метростроевской. Я в депо на «Соколе», знаешь «Сокол»?</p><p class="p1">Сколько раз представлял себе Миша эту встречу, в каких деталях! Случай предоставился, но к такой ситуации он не был готов, нет. И она была необычайно хороша, много лучше, чем на таком уже давнем — три месяца прошло, а будто сто лет — вечере у Клары Нечаевой. Как будто нарочно для него.</p><p class="p1">Поглядывал на них один Колычев, остальные занимались друг другом, шумно обсуждали какого-то Спирина, гадание было забыто, да и не для таких компаний была эта тонкая игра. Начались танцы, и Миша властно, не спрашивая, повел Валю Крапивину в медленном танце, что умел, то умел, и удивился тому, как легко она ему покорялась. Видно, близость с Лией, хоть и несостоявшаяся, а все же удавшаяся в чем-то, сделала его сразу хозяином положения. Ему теперь нельзя было не покориться.</p><p class="p1">— Ты, Гвирцман, зла на меня не держи, — сказала Валя, не дожидаясь, пока он первым скажет какую-нибудь убийственную гадость. — Я перед тобой сука, сама знаю, а все-таки ты тоже хорош.</p><p class="p1">Она и это сказала очень просто, словно тоже повзрослела, и все их тогдашние отношения были теперь вроде школьного детства.</p><p class="p1">— Из института я ушла, потому что не могла больше.</p><p class="p1">— Сессию провалила? — язвительно сказал Миша.</p><p class="p1">— Нет, — ответила она все так же просто, и в простоте этой было нечто дразнящее, и голову она закидывала так, чтобы ему захотелось поцеловать. Зубами дразня, вспомнилось ему. Это было сказано коряво, но очень верно. — Просто не могла. Считай, что совесть. Но ты же не поверишь.</p><p class="p1">— Конечно, не поверю, — сказал Миша. Он решил, что надо тоже говорить просто, не оттягивая выяснения. Что-то было еще у них интересное впереди, так что на выяснении прочих отношений можно было не заморачиваться. И пахло от нее незнакомыми духами, запах был взрослый. — Какая совесть? Откуда у тебя совесть?</p><p class="p1">— Ну и думай как тебе нравится.</p><p class="p1">— Да мне совсем не нравится, но как же еще думать? Это просто наши там тебя застыдили, они-то всё поняли.</p><p class="p1">— Наши тебя попросили на улицу, и всё, — сказала она презрительно. — Наши… тоже… Какие у тебя наши? Они тебя, небось, забыли давно.</p><p class="p1">— Очень ошибаешься.</p><p class="p1">— Ну и прекрасно. Мне до них теперь никакого дела нету. Им цена копейка. И если хочешь знать, это они тебя погнали, а не я. Я никого не заставляла, вольному воля.</p><p class="p1">— Да уж конечно, вольному воля, — передразнил он. — Ты так все это поставила, что им деваться было некуда.</p><p class="p1">— И сам бы, небось, голосовал как надо? — спросила она и заглянула ему в глаза, да вдобавок еще широко открыла свои — сегодня ярко-зеленые.</p><p class="p1">— Может, и голосовал бы.</p><p class="p1">— Ну так что ж ты недоволен? Сам от себя и получил, и от таких же. Умные все вы там, а кишка тонкая.</p><p class="p1">— Знаешь что, Крапивина? — сказал вдруг Миша, который сам от себя такого не ждал. — Меня теперь уже ниоткуда не выгонят, поняла? И я теперь с тобой сделаю то самое, за что меня выперли. Тогда не сделал, а сейчас сделаю, ясно?</p><p class="p1">— Ой, ой, какие мы страшные, — засмеялась она неприятным смехом, но Миша видел, что это ее несколько напугало, а с другой стороны, сопротивляться не станет. Потому, что очень даже не прочь. Шлюха — она и есть шлюха, и он хотел шлюху, и, в конце концов, солдат и шлюха — два главных героя всего мирового искусства. Рыжая блудница, которую только и запомнил прокуратор Иудеи из всей евангельской истории. И сейчас он сделает с ней то, что и положено делать со шлюхами, если только за них не вступается комсомольское собрание.</p><p class="p1">— Пошли! — сказал он, и дернул ее за руку, и потащил в соседнюю темную комнату. Комнату эту, как он понял, делили Меркуровы-младшие, друг друга, сколько он мог заметить, недолюбливавшие; и эти два созревающих подростка успели ее наполнить, как бы зарядить флюидами своего быстрого нервического созревания.</p><p class="p1">Все-таки Миша был здорово пьян, потому и решителен. Но он помнил, что в любую секунду могут войти, и на всякий случай придвинул стул к двери. Свет зажигать не стал. Да она и не дала бы ему зажечь свет. Тут снова вышла неожиданность, потому что не он на нее набросился, а она — с жадностью, которая сразу его испугала и разочаровала. Сначала расстегнула на нем рубашку, стала хватать за плечи, прижимать ладони к груди, даже щипать, потом полезла рукой страшно сказать куда, и Миша растерялся, не мог даже поцеловать ее толком. Он по запаху понял, что и она была пьяновата, что они с компанией пришли от собственного стола, за которым уже подпили, и запах этот был не то чтобы совсем неприятен, но грубоват, пошловат, смешан с запашком недавно съеденного зельца. Только что, проверяя себя, Миша чувствовал: хочет. Но теперь, когда она с таким голодом на него набрасывалась, явно опытная, явно грубая, — он не очень-то и хотел. Он был готов долго ее штурмовать, как Лию, а тут было совсем иное, даже, пожалуй, унизительное. Это не он ее насиловал, а она его. И струна, минуту назад такая натянутая, словно ослабла, а то и вовсе лопнула. Он подумал, что хорошо бы сейчас подойти к окну, лбом прижаться к стеклу.</p><p class="p1">— Ну ты что? — спросила Валя. — Что ты? Ты мальчик, что ли?</p><p class="p1">Все, что она делала, было грубо и потому не достигало цели. Но Валя не понимала своей ошибки, ей стало вдруг смешно.</p><p class="p1">— Ах-ха-ха, — залилась она пьяным смехом. — Ах-ха-ха, что ж я не поняла-то. Да ничего бы ты мне не сделал, тебе так и надо было сказать, что ты не по этой части…</p><p class="p1">И этот ее смех… Миша встряхнул ее за плечи, а потом ударил, довольно сильно, хоть и ладонью, плашмя, но не по щеке, а по всему хохочущему лицу; ударил так, что у нее кровь из носу потекла. И она удивилась, но как-то радостно удивилась, даже, похоже, начала трезветь. Она смотрела на него в почтительном изумлении, а он вдруг понял, что ему понравилось (в голове мелькнуло: говорят, что мужчина остается девственником, пока не ударит женщину; и в этом смысле он лишился невинности раньше, чем…) И он врезал ей во второй раз, уже по щеке, и она перестала смеяться, а только улыбалась самой мерзкой из своих улыбок, самой блядской. И эта кровища на верхней губе, темная, черная в свете одинокого фонаря за окном. И еще раз. Сука, бормотал он, тварь. И это, кажется, ей тоже нравилось. И струна внезапно натянулась с такой силой, какой он не помнил и в одиноких своих упражнениях, — непонятно, что так подействовало: то ли эти удары по мотающемуся перед ним белому лицу, то ли черная кровь, то ли блядская улыбка, а то ли очень трезвое, твердое осознание, что теперь ему точно конец. Если его выгнали за одно прикосновение губами к воздуху вокруг ее волос, то теперь его расстреляют. Все-таки она погубила его. Сука, повторил он, окончательно пропадая, и стал даже не расстегивать, а рвать на ней одежду, и она помогала ему. Кто-то сунулся было в дверь, но тут же испуганно исчез.</p></span>
