<span><p class="p1">И как-то действительно приладился — повернул ее спиной к себе, она ухватилась руками за решетку, юбку задрала, трусы спустила, быстро переступая ногами, — даже как-то стоптала их вместе с рейтузами, — и он неожиданно легко, словно даже привычно, вошел. Странным образом в голове у него опять вертелись повторяемые машинально чужие слова, и он подивился, насколько они подходят к ситуации: ведь описан в самом деле любовный акт! Вся последовательность: сначала к устам приник, потом грудь, — но главное: водвинул! Он в этом ямбическом ритме и повторял: и угль, пылающий огнем… ха-ха! Водвинул. И это было так отлично, так в этот раз чудесно, что он, казалось, мог длить и длить, пока она не сказала совершенно спокойным голосом: «Кончай скорей, больно, сколько можно».</p><p class="p1">Это его несколько обидело, но мысль о том, что ей больно, странным образом оказалась приятна, причем с чего бы ей больно? — наверняка притворство, а просто она не получает настоящего удовольствия, не испортив удовольствия ему. Так он и подумал, и с особенной силой несколько раз ударил, чтобы ей было побольней, и услышал стон, явно говоривший не о боли, но об удивлении и удовольствии; по крайней мере он так понял, хотя ей и в самом деле было больно, потому, вероятно, что близились красные дни календаря, ждала со дня на день, но нельзя было отказать мальчику, который из-за нее уходил в армию. Ужасно благородно она себя вела, теперь уж окончательно все искупила. Так она думала, но мысли эти не возбуждали, от них не удавалось даже чуть-чуть обрадоваться. И все как-то у них выходило по углам, то на ссаном белье, то на грязной лестнице. Сюда курить бегали. Пока он, радуясь своей мужской победительности, колотился об нее сзади, решетка противно брякала, но он, конечно, не слышал, все они глухари. Ей показалось, что он не успел выскочить сразу, как-то нехорошо дернулся в ней, и хотя время было вроде незалетное, а все-таки рисковать было нельзя. И когда он вырвался наконец, она еще некоторое время стояла к нему спиной — тошно ей было, даже в темноте, к нему поворачиваться.</p><p class="p1">— Ну все, — сказала она ему, — все теперь. Иди теперь, в армию иди.</p><p class="p1">— Да погоди ты так сразу, — сказал он. — Это еще только завтра.</p><p class="p1">Он помнил свою ложь, не попался.</p><p class="p1">— Иди давай, — повторила она, — иди быстро.</p><p class="p1">— Что, и не поцелуешь? — спросил он уже без давешнего самодовольства, робко и даже просительно, пожалуй. Это уже было лучше.</p><p class="p1">— Ну, на тебе, — Валя чмокнула его в подбородок.</p><p class="p1">— Какой ты неотвязчивый, на, вот он, — процитировал Миша.</p><p class="p1">— Давай, давай. Письмо мне напишешь.</p><p class="p1">— Адрес-то скажи.</p><p class="p1">— На депо напиши. Я отсюда, может, съеду, с дурами этими жить-то…</p><p class="p1">Он представил, к кому она съедет, и почувствовал внезапно прежнюю злобу, но теперь сдержался. Все-таки она его проводила, хоть и вот так; все-таки ему кинули предсмертный подарок.</p><p class="p1">— Ну съезжай, — сказал Миша. — Бывай.</p><p class="p1">Он прошел мимо нее, спустился и подумал: действительно успели до восьми.</p><p class="empty-line"/><p class="p1">Родителям надо было все сообщить в упрощенном, щадящем виде: щ-щ-щ… Параны, сказал он бодро за ужином, меня, возможно, призовут в армию, я был в военкомате, объявлен дополнительный набор. Но это еще не точно. Мать застыла, отец принялся ходить — сильное волнение всегда у него так выражалось. Но это не точно, повторил Миша. Послушай, сказал отец, но у тебя негодность в мирное время. Что же, бодро сказал Миша, видимо, оно уже не мирное. Отец захрустел пальцами. Так, сказал он, я это выясню.</p><p class="p1">— Ради бога, ничего не выясняй, — попросил Миша. — Сделаешь хуже.</p><p class="p1">— Но это поперек всякого закона…</p><p class="p1">— Им видней. Я же тебе говорю, ничего еще не понятно.</p><p class="p1">— Когда будет понятно, действовать поздно.</p><p class="p1">— Как ты хочешь действовать, папа? Идти к военкому? Они тогда еще и тебя призовут.</p><p class="p1">— Это мы посмотрим.</p><p class="p1">— Я тебя очень прошу, если ты не хочешь создать мне действительно невыносимую ситуацию, не гони волну.</p><p class="p1">Отец промолчал, но явно не смирился. Надо бы его нейтрализовать, подумал Миша, но с другой стороны — вряд ли он наломает дров за один день.</p><p class="p1">Следующий день прошел в хлопотах: нужно было уволиться, подписать обходной, не зря называемый бегунком, попрощаться с персоналом и с избранными больными. Миша, впрочем, подивился, как мало его души осталось на этой работе, как он ни к кому не привязался: действительно, кажется, черта новых поколений — эмоциональная скудость. Предписано бояться, а он не боится — видимо, слишком оглушен; предписано грустить, прощаясь, — а он забавляется. Надо было, наверное, сходить в конуру Колычева — вряд ли они еще увидятся. Колычев наверняка помрет, пока Миша будет служить; а может, наоборот, — такие вечно умирающие особенно живучи; но тогда помрет Миша, как-то им трудно будет в наступающих временах уцелеть одновременно. Вывезет либо одна, либо другая стратегия: либо прыгать в поток — в который его, вместе со всеми, сейчас тащило, — либо отсидеться в конуре, на полях, в маргиналиях, и далеко не факт, что с белым билетом будет проще. И прощаться, ввиду этой несовместимости, Мише показалось чересчур пафосным, неприлично литературным делом. Вот в студию он сходил бы, но был не вторник, а четверг. Страшно подумать, только позавчера там читал Борис и бормотал Павел. Словно за время их с Валей лестничного соития прошла неделя, а то и месяц: сильно растягивалось время в эти секунды, почему бы? Или просто это каждый раз было слишком серьезным барьером, и все, что до него, отсекалось? Ах, в каком странном мире он оказывался, когда был с ней; жалко, что он мало успел понять, рассмотреть, и в ней опять ничего не рассмотрел, а было бы что вспомнить. Но почему-то он знал, что последнее напутствие надо получать не от Вали, а от Лии. Или даже так: Валя должна дать толчок, как перед прыжком с парашютной вышки. Туда весь их класс водили года три назад, не все смогли, но он смог — включалось что-то такое в минуты роковые. А улыбнуться вслед должна не Валя, улыбка у Вали нехорошая, такой улыбкой хорошо улыбаться, когда тебя берут: оскал, чтоб ты не загордился. Валя выталкивать должна, а провожать Лия. Как я прекрасно устроился, подумал Миша — и позвонил.</p><p class="p1">— Лия, я ухожу завтра в армию, — сказал он, презирая себя отчасти за то, что придает столько значения этому внешнему, в общем, обстоятельству.</p><p class="p1">Она тихо ахнула. И это лучшее, что она могла сделать. Расспрашивать — только растравливать, а сочувствовать… Миша вдруг понял, что это совсем не принято в их кругу. Когда у Сергея умер отец, никто не соболезновал, и сам он гусарил, бодрился. Павел был взрослей и потому высылку семьи — что-то там было такое, Миша не вдавался — воспринял совсем ровно, даже без гусарства; и когда все выяснилось и полгода спустя выправилось, то есть разрешили переехать в город получше, — тоже не радовался. Неприлично было страдать, неприлично жалеть, иначе чего все они стоили?</p><p class="p1">— Ты можешь прийти?</p><p class="p1">— Да, — сказал Миша.</p><p class="p1">— Или тебе надо с родителями побыть? Я пойму.</p><p class="p1">— Нет, зачем? Сейчас, в общем, уже все равно.</p><p class="p1">Он не видел ее лица, но представлял его с ужасной точностью — а вот лица Вали Крапивиной никогда представить не мог, всегда его забывал и удивлялся заново. Он видел, как Лия сейчас кивает, как заправляет прядь за ухо.</p><p class="p1">— Я тебя хочу проводить. Приходи на каток.</p><p class="p1">И он подумал, как это прекрасно — что Валя провожала его на лестнице, а Лия проводит на катке. Прямо как ангел и демон.</p><p class="p1">Наверное, имело бы смысл провести время с родителями. Но о чем говорить, что делать? Что могут они посоветовать? Наверняка ведь будут просить, чтобы он не простужался. Миша совершенно сейчас не думал о том, что ему предстоит делать в армии. Наибольшие трудности, слышал он, были связаны с наматыванием портянок. В последний вечер перед призывом учиться наматывать портянки — это да, это то самое. Котелок он купил еще по дороге домой и припрятал пока в коридоре, чтобы не попался на глаза родителям. Котелок — в этом была окончательность, приговор. Как в той зеленой повестке, что Мише выдали.</p><p class="p1">В зиме уже чувствовалось истончение, издыхание. Да и во всем оно было. Как в той книге, которая то ли снилась ему, то ли кто-то рассказывал во время институтского перекура — где герой уезжает из города, и город за ним схлопывается, и квартира зарастает — не камнем, а чем-то вроде камня, серой каменной ватой, вроде той, которой они затыкали окна в ноябре. И все было завалено той серой ватой, и даже воздух казался насыщенным влагой до ватной, слежалой плотности. Все теснило Мишу отсюда, а по большому счету теснило и раньше, и исключение только добавило отчетливости этому вытеснению. Зима заканчивалась, и вместе с ней и его московская жизнь, и начиналось то, о чем он особенно и не задумывался, потому что изменить все равно ничего не мог.</p><p class="p1">И на катке было как-то пустынно, хотя, казалось бы, канун выходных, — так выглядели самые безнадежные в палатах его больницы, когда ясно, что сделать уже ничего нельзя, и их торжественно оставляли в покое. Он понимал, что надежда в таких случаях только унижает — надежда вообще унизительна. Ему давали попрощаться, на это время убрали всех, только одинокая старушка, с виду совершенная девушка, в синей шерстяной курточке неместного пошива каталась по кругу довольно резво, желая убежать от старости. Лучше всех убегал от старости он — у него теперь, похоже, вовсе ее не будет.</p><p class="p1">Лия пришла через десять минут после него и была молчалива.</p><p class="p1">— Я совсем не знаю, что тебе сказать.</p><p class="p1">— И не говори ничего. Просто так покатаемся.</p><p class="p1">И, стоило ей появиться — каток начал заполняться людьми, словно это они их приманили; но это не мешало, а, наоборот, придавало всему особую торжественность, ведь вдове не мешают пришедшие проститься — они только подчеркивают ее особость. Взявшись за руки, они проехали несколько кругов, и она вдруг сказала:</p><p class="p1">— Когда я уеду, будешь провожать?</p><p class="p1">— А куда ты собралась?</p><p class="p1">— Никуда, в том-то и дело. Но я вижу очень четко, что я уезжаю, а тебя нет. Непорядок.</p><p class="p1">— Я отпрошусь из армии.</p><p class="p1">— Насчет армии, наверное, все действительно очень плохо, — сказала она. — Иначе не брали бы.</p><p class="p1">— Да, странно как-то. В газетах ни слова о призыве. Секретность.</p><p class="p1">— Я в этом ничего не понимаю, но как-то дико, да. Напиши мне сразу же.</p><p class="p1">— Потом издадим. Новая Элоиза.</p><p class="p1">— Мишка, мне теперь ужасно стыдно, — сказала она вдруг. — Мы так мало видимся, а это все я виновата. Наверное, я все придумала, и придумала ерунду. Ты думал, что я взрослая, а я невзрослая. Но если бы ты меня ломал и настаивал, было бы хуже. Я тебе клянусь, что дождусь.</p><p class="p1">— Нет, Шуйский, не клянись, — сказал Миша.</p><p class="p1">— Ну, уж это мое дело, да?</p><p class="p1">Горели фонари, отчего-то не белые, как обычно, а желтые — от влаги, может быть, от сырости, — и играл необычный вальс, очень русский и в то же время явно новый; вальс этот был про то, что так уж тут все устроено. Миша не взялся бы объяснить, но чувствовал в словах и музыке стыдливость, как бы палач покраснел и раскланялся. Да, вот у нас так, зато у нас прекрасные реки, горы, глухая тайга.</p><p class="p1">— Хорошо бы служить где-нибудь далеко. На восточной границе, — сказал он.</p><p class="p1">— Нет, не надо. Письма долго идут, и я не смогу к тебе приехать. Мишка, я хочу, чтобы ты знал: я очень буду тебя ждать.</p><p class="p1">Если бы она сказала, что любит, в этом тоже была бы ужасная фальшь. Но она все говорила правильно.</p><p class="p1">Поцелуй, за этим последовавший, скорее огорчил Мишу, чем окрылил: зачем люди, собственно, целуются? Это способ разузнать побольше, и то, что он разузнал, его не обрадовало. Лия стала целоваться чуть по-другому. Не знаю, как там в любви, а в поцелуях у Миши был большой опыт с девятого класса, и он даже думал иногда в десятом, что лучше бы и не переходить к дальнейшему — так упоительно было целоваться, и так мало для этого требовалось. И он почувствовал, что раньше Лия хотела зайти с ним дальше, а сейчас не хочет; что чуть изменился сам ее запах, хотя духи были те же самые; у нее, наверное, кто-то был, и даже наверняка был, а Миша ей был теперь нужен как отложенный, запасной вариант. Прекрасно иметь такой вариант, особенно хорошо писать о нем стихи. И он подумал с тоской, что до Лии все-таки не дотянул, не дотянулся, и она выбрала другого — конечно, человека попроще, но и понадежней. А его потолок — Валя Крапивина, и она дала ему это понять. Что-то такое, видимо, мелькнуло у него в глазах, потому что Лия вдруг схватила его руку и сжала сильно, больно.</p><p class="p1">— Мишка!</p><p class="p1">— Что?</p><p class="p1">— Ничего. Глупости. Подумала. Но я тебе потом скажу.</p><p class="p1">— Года через два, — сказал Миша.</p><p class="p1">— Нет, гораздо раньше. Я знаю. Иди.</p><p class="p1">И он пошел, думая о том, что, в сущности, и сам вел себя с Лией не слишком красиво. Тоже отложенная, а точней, идеальная возлюбленная: с одной — совокупляться, и то при условии призыва, а с другой — кататься, вот так мечтательно, как старшеклассники в плохих стихах. А кого он любит? Он никого не любит, себя тоже. Ничего, в армии его научат быть проще, вышибут эту лишнюю сложность, и будет он любить суп, только суп. Непременно гороховый. Зато страстно. И он усмехнулся, хотя было ему совершенно не до смеха: очень второсортна, если посмотреть трезво, была его жизнь. Второсортная любовь, второсортный сюжет, и уходит он не героически, как Тузеев, не на войну, а в мирное время, даже вне призыва, как-то совсем мимо рубрик. Надо будет писать очень хорошие стихи, чтобы оправдать такую жизнь.</p><p class="p1">Он шел медленно, но почему-то задыхался, и, когда вошел во двор, увидел соседа, доброго Леню. Леня стоял во дворе непонятно почему: прогуливать дочку поздно, а друзей, которые иногда к нему заглядывали и выходили курить, — некурящий Леня топтался с ними за компанию, — в этот раз рядом не было. Он словно вышел Мише навстречу, как тихий ангел-хранитель, чтобы сказать утешительное слово. Должен же и у плохого человека, вроде Миши, быть ангел-хранитель. Миша все время чувствовал — сквозь все мысли, всю тоску и всю любовь — нарастающую нервную тошноту. Ему все-таки очень не хотелось в армию. Да и почему, собственно, он уж такой плохой человек? С кем сравнивать? Ему очень нужно было, чтобы сейчас кто-то посочувствовал, именно пожалел — так, как не принято было в их, смешно сказать, кругу.</p><p class="p1">— Чего смурной, Миш? — спросил Леня.</p><p class="p1">Он был слегка навеселе, как и надлежит ангелу.</p><p class="p1">— В армию завтра, Леня.</p><p class="p1">— Ладно, Миш, образуется, — сказал Леня и улыбнулся.</p><p class="p1">— Да все образовалось уже. Завтра с котелком.</p><p class="p1">Миша вдруг представил на призыве себя с тросточкой и в котелке и против воли усмехнулся. Леня приписал это своему утешению.</p><p class="p1">— Ну вот видишь, — сказал он. — Нормально все. Образуется, Миш.</p><p class="p1">И почему-то Миша поверил, что образуется, и матери сказал то же самое. Ночью он не спал до трех, а в семь вскочил бодрый, с ясной головой. Начинался новый этап жизни, никаких рефлексий. Отец держался строго, мать хлюпала носом, но, в общем, крепилась — молодцы параны. И погода неожиданно разгулялась, по рассвету было видно, что день предполагается ясный. Баландин сидел в кухне, держась за голову. Он просыпался теперь очень рано и много думал, пытаясь, видимо, вызвать видения, которых насмотрелся под наркозом.</p><p class="p1">Мать собрала Мише в рюкзак всю наличую теплую одежду, включая отцовские ватные штаны для рыбалки, — и сколько Миша ни утверждал, что все отберут, только молча совала ему рюкзак, и чтобы ей не стоять с этой тяжестью, он вынужден был его взять. Впрочем, с рюкзаком идти легче. Он дисциплинирует.</p><p class="p1">Миша дошагал до военкомата быстро — на службу как на праздник. Он ожидал увидеть толпу таких же, как он, но у кабинета знакомого лейтенанта сидело всего человек пять совершенных сосунков, школьников, явившихся на приписку. Миша постучался и вошел без очереди. Лейтенант поднял на него блеклые глаза.</p><p class="p1">— Чего приперся, Гвирцман? — спросил он.</p><p class="p1">— На призыв, вы же вызвали.</p><p class="p1">Это, вероятно, была такая инициация — показать, что ему совсем тут не рады, чтобы не воображал, будто Родина очень уж сильно в нем нуждается.</p><p class="p1">— Кругом арш, — сказал лейтенант. — Отменяется.</p><p class="p1">— То есть? — не понял Миша.</p><p class="p1">— То есть отменяется твой призыв, можешь быть свободен до особого вызова.</p><p class="p1">— Когда? — с просил Миша, не веря своему счастью и желая немедленно добиться определенности. Он уже знал, что в делах с государством надо доскребать до дна, до полной ясности, ибо любые туманности обернутся против него.</p><p class="p1">— Когда надо будет. Сейчас свободен. Явишься по вызову сразу. Кругом.</p><p class="p1">И Миша, так ничего и не понимая, с идиотским своим рюкзаком вышел на крыльцо.</p><p class="p1">И сразу разревелся без всякого повода. То есть слезы просто хлынули из него потоком. Этому не было никакого объяснения, разве что одно, самое стыдное — его внезапно помиловали, и груз, которого он сам не сознавал, рухнул с его плеч. Если бы не рюкзак, за который он был теперь матери до слез благодарен, — он бы улетел, ей-богу. Взлетел бы в небо, почти уже весеннее. И ему было стыдно, и он не понимал: неужели так боялся, неужели отмененный призыв во вполне мирную армию довел его до детских, девчоночьих, стыдных слез? Но ничего слаще этих слез он не мог вспомнить за всю свою жизнь, потому что к нему вернулось нечто уже отнятое, и он не знал, как это нечто назвать: свобода? Это надо было отметить, этим надо было немедленно поделиться, и он тут же пошел, почти побежал к Колычеву, но вспомнил, что надо дать знать родителям о дарованном чуде, — Миша так и не узнал никогда, что это было, по чьему внезапному капризу был объявлен и тут же отменен февральский призыв, и во всех это было военкоматах или только ему так повезло.</p><p class="p1">Позвонить было неоткуда, он увидел аптеку, налетел на старую провизоршу с мольбой: разрешите позвонить! — и был жестоко отшит; только это его немного отрезвило. Он понял, что жизнь продолжается, что она идет по прежним лекалам, что не настало никакого поликратова счастья — потому что если бы эта провизорша на Кировской широко улыбнулась бы ему и сказала: пожалуйста! — это значило бы, что он безнадежно превысил лимит милостей и платить за них придется ужасно, сверх всякой меры. Он благодарно кивнул и побежал домой.</p><p class="p1">Мать смотрела на него как на привидение. Он сбросил рюкзак, вспомнил, что теперь ведь ему заново трудоустраиваться, — мать позвонила отцу, отец позвонил по цепочке, и Миша помчался в больницу, казавшуюся теперь совершенно родной. И лишь к середине дня он заметил, что в больнице все смотрят на него со смутным разочарованием. Всё почти уже было так хорошо, ему уже всё простили, как мертвому, и он был теперь герой, внезапно призванный служить, — но тут оказалось, что никуда он не призван, что вот он, прежний Миша; и даже сам он ощутил легкое недовольство, потому что у Байрона, у лорда, не бывает внезапных помилований и сладких слез по этому поводу. Никто не может его призвать — только он сам себя, — и никто не может отпустить. В общем, после эйфории наступила разрядка, откат, который после шока неизбежен: страшно перебрав по части счастья, Миша опускался теперь на дно и вяло влекся по нему. Но память о счастье была еще свежа, и он боялся, что за ним теперь явятся в непредвиденный момент — на службу, домой среди ночи, в студию… И чтобы не явились, надо было искупить вину: пойти к Колычеву. Миша к нему и отправился после рабочего дня, после той нелюбимой рабочей субботы, на которую в этот раз пришлось его дежурство: отпустили, почему бы не заступить?</p><p class="p1">И, отработав этот счастливый, хоть и томительный день, он доехал до Арбата и постучался к Колычеву, но фанерная дверь была заперта, Колычев, видно, ушел куда-то. Нельзя было допустить, что он умер. Тогда вина осталась бы неискуплена. И Миша подождал на всякий случай, но Колычева не было. Обрушив на него тогда свою тоску, он не мог теперь свалить к его ногам обретенное счастье; и Миша по Бульварному кольцу побрел к себе, удивляясь, какая настала оттепель. Все капало, хлюпало и шуршало. И опять ангел-хранитель входил в подъезд вместе с ним, только на этот раз Леня возвращался с работы. И правильно, нельзя же, чтобы ангелы каждый вечер без дела топтались во дворах.</p><p class="p1">— А правда обошлось, Леня, — сказал Миша, несколько даже лебезя. Но Леня не помнил, что именно обошлось. Он все-таки был вчера под хмельком. Он глянул на Мишу с легким удивлением, но выяснять подробности не стал.</p><p class="p1">— Ну и ладно, — сказал он весело, и только в этот миг Миша понял: действительно обошлось.</p><p class="p1">Дома он вспомнил, что надо бы позвонить Лие. Ему немного жаль было это делать. Романтический образ рушился. Но врать ей он не умел и ближе к одиннадцати позвонил. Незнакомый, холодный женский голос — отец, что ли, женился? — ответствовал, что она будет нескоро, может быть, и не придет сегодня. И это тоже было хорошо; не нужно, чтобы становилось слишком хорошо. Оставалось посвятить во все это Валю. Но уж с Валей точно не надо было торопиться. И он прождал довольно долго — до ужасного дня в середине марта, когда откладывать стало нельзя.</p><p class="subtitle">— 19 —</p><p class="p1">Во вторник он отправился в студию — с тайной надеждой увидеть Лию или, пожалуй, не увидеть; и ее там действительно не было. Вот всё так — поманит и разочарует: мы боимся, чтобы важное не свершилось, и оно в самом деле не свершается. Миша чувствовал себя странно — словно не сгодился в жертву. Это было чувство сложное. Он пытался написать стихи, но выходило кокетливо, не было для них ритма; он записал эти ощущения для будущей прозы. Выходило так, что его должны были перемолоть, но пощадили; и теперь он чувствовал стыдное счастье, но и легкое — тяжелевшее, впрочем, со временем, — разочарование: не сгодился. Даже на это не сгодился. И хотя умом убеждал себя, что нужней в нынешнем своем качестве, что маршировать ему менее свойственно, чем писать и думать, да и нет никакой доблести в маршировке, — он все же чувствовал, что жизнь пойдет теперь мимо главного, стыдным путем самосохранения; даже в трамваях, казалось, глядели на него укоризненно. Он подумал, что почти уже ждет повестки, что встретит ее с облегчением — и краем сознания еще, как бы глазами того самого инопланетянина, увидел, до какой же дикости его довели: ни одной здоровой реакции, сплошь патология. Хорошо, если он такой один, но если все теперь с радостью будут встречать неизбежное? Увольнение, которого так долго ждали и боялись? Или что похуже увольнения? Пожалуй, подумал он, и войну, которую так ждали и которая не случилась, продолжают держать в уме; все-таки ее неизбежность многое списывала, и была своя сладость в том, чтобы жить в ожидании конца концов, отменяющего все нынешние счеты. А если войны не будет, придется как-то существовать опять и отвечать за все, — как приходится сейчас ему. Он подумал вдруг, сколько народу будет разочаровано, если войны не будет. Павел уж точно. Борис — тот, верно, встроится и даже станет пацифистом, и устроит такую борьбу за мир, что мало кто выживет. А сам Миша, пожалуй, станет идеальным хронистом этого как бы времени, времени без лица: ведь он сроду никуда не вписывался, жил под колпаком тайной недоброжелательности. И когда тайная недоброжелательность охватит всех, он будет на месте.</p><p class="p1">Снова пожаловали ифлийцы, на сей раз без Павла; Миша подивился, как много времени прошло, сколь многое и необъяснимое теперь их разделило. Показывали сцену комсомольского собрания, довольно дикую. Сему, то есть его героя, прорабатывали за то, что он рисковал собой, не соблюдал техники безопасности, вообще подставил всю бригаду, неправильно, зато эффективно валя лес или что-то вроде. Проступок его не был прописан тщательно, все силы студии ушли на собрание, на котором разгорелся принципиальный спор: нужна ли трудовая безоглядность или разумная осторожность? Конфликт этот показался Мише настолько высосанным из пальца, что вся пьеса стала напоминать жестокую пародию, но он до поры помалкивал. Студия, кажется, наслаждалась процессом, сцену играли с огнем — но в блестящих глазах студийцев Мише виделась порой злая насмешка; не могли же они все это всерьез! Сема героически оправдывался, говорил, что это не по-русски — рассчитывать силы, и в исполнении маленького Семы это было вдвойне гомерично. Ифлийцы слушали смирно, Борис был неожиданно развязен, заглядывался на красневшую под его взглядами чернявую Наденьку и сказал, что нужна песня, что он эту песню им сочинит, что после этой патетики нужно немного лирики. Замечаний по тексту никто не делал. Тогда не выдержал Миша. После отмененного призыва он чувствовал не только легкое разочарование, но и дополнительную, как бы сказать, легитимность: он был на законных основаниях помилован и мог уже не всегда скрывать простейшие мысли. Он любил, конечно, студию и эти забавные вечера, и по вторникам было куда себя деть, но сейчас это заворачивало настолько не туда, что можно было и вмешаться.</p><p class="p1">— Братцы, — сказал он, — а можно мне на правах пролетария? По-моему, это какой-то ужас.</p><p class="p1">Он знал, что чем решительней и резче выразится, тем больше шансов, что его слова примут за шутку, и обойдется без скандала.</p><p class="p1">— Что именно ужас? — спокойно спросил Орехов.</p><p class="p1">— Всё ужас. — Миша радовался, словно прыгнул с вышки. Они все, конечно, понимали, что он за последнее время отошел от студии, но сейчас интерес к нему и весомость его слов возвращались на глазах. Так он думал.</p><p class="p1">— Ну, значит, все в порядке, — сказал Орехов. Гегель учит, что важно не качество, а цельность.</p><p class="p1">Кто-то робко засмеялся, остальные слушали настороженно.</p><p class="p1">— Есть более конструктивные замечания? — обратился Орехов к прочим, желая заглушить в зародыше неприятный разговор.</p><p class="p1">— Есть! — крикнул Миша. — Я не понимаю, почему вы сами хотите погубить собственный замысел. Ведь тут было кое-что приличное.</p><p class="p1">— Миша, — устало сказал Орехов, а может, профессионально имитировал усталость. — Мы собираемся для профессионального разговора. Вас не было. Вы не видите, как меняется стиль. Мы все дальше отходим от реализма, идем в условность. Новый зритель следит не за тем, как действует Гамлет, а за тем, как актер Н. играет Гамлета. Это просто не ваша эстетика, ну что ж поделаешь. Нам всем придется это пережить.</p><p class="p1">Тут засмеялись уже без стеснения.</p><p class="p1">— Отказ от реализма не означает отказа от логики вещей, — сказал Миша и густо покраснел. Он так давно не занимался теоретическими дискуссиями, что совершенно забыл, как это делается. — Люди строят город, их подвиг достоин всяческого уважения. Мы, по-моему, оскорбляем их, заставляя спорить о глупостях.</p><p class="p1">Это был мощный перехват риторики — Миша выступал в защиту героев, а не против них.</p><p class="p1">— Они не спорят о глупостях, — еще более устало и вяло, словно сам стыдясь очевидных вещей, о которых приходилось говорить, ответил Орехов. — Я допускаю, что, когда наломаешься в тайге, не до рассуждений, только поспать бы. Я это допускаю, а вам, конечно, видней. Вы тут работаете больше всех. — Миша не стал отвечать на эту безобразную шпильку. — Это вообще спектакль не о строителях города. Это актеры размышляют вслух на волнующие их темы, и вопрос о том, что такое героизм, занимает их всерьез. Имеет ли право человек нерасчетливо тратить общее достояние — свою силу и здоровье? Можем ли мы назвать героем того, кто задумывается, а не только того, кто безоглядно жертвует собой? А от жизнеподобия искусство избавилось давно, и логика, о которой вы говорите, — логика у него другая, и поэтому я предлагаю говорить по делу…</p><p class="p1">— Вы предлагаете говорить о частностях, — не унимался Миша. — А я вижу фальшь и экзальтацию, и никакими частными поправками этого не убрать…</p><p class="p1">— Очень хорошо, — сказал Орехов. — Вы высказались. Вы видите фальшь и экзальтацию. Кто-нибудь видит еще что-то, или нам имеет смысл прекратить работу над пьесой?</p><p class="p1">На этот раз смеялись дружнее. Хорошо они тут спелись. Миша не привык к таким афронтам, но заговорил Борис.</p><p class="p1">— Я думал, ребята, сначала промолчать, — признался он не без аффектации. — Но тут высказал недовольство мой товарищ, и я его понимаю. Понимаю в том смысле, что у него-то как раз есть логика. Так сложились обстоятельства, — вы, может быть, не знаете, — что его исключили. Исключили не очень справедливо. Наш кружок, к которому он принадлежал, — кружок чисто поэтический, собираемся и читаем, — никогда его не отторгал, но он решил, что ему лучше теперь жить и работать одному. Я это тоже могу понять. И я понимаю, что если этой позицией увлечься, в ней можно найти источник вдохновения. Это плохой источник, это источник тухлый. Гордыня отвратительна в богаче и смешна в нищем. Короче, напрасно ты это, Миша.</p><p class="p1">— Что напрасно?! — Миша искренне перестал что-либо понимать. — Тебе нравится вот это… обсуждение чрезмерного энтузиазма?</p><p class="p1">— Мне нравятся эти люди, — с нажимом сказал Борис. — У них не все получается. Но если у них что-то не получается, я никогда не скажу, что это ужас.</p><p class="p1">— Ради бога, скажи, что это прелесть.</p><p class="p1">— Это не ужас и не прелесть, это работа. — В интонации Бориса слышалось, что он из раввинов и даже, пожалуй, из талмудистов. — А тебе теперь всегда хочется быть одному против всех, потому что других источников энергии у тебя нет. Я только и говорю, что это тухлый источник.</p><p class="p1">События принимали нехороший оборот и, казалось, воспроизводили то самое собрание.</p><p class="p1">— А тебе нравится быть со всеми против одного, — парировал Миша, которого все это, как ни странно, не пугало, а все больше заводило. — Тебе нравится теплое чувство чужого локтя. Мы это много раз видели, сейчас во всей Европе очень много таких солидарных ребят…</p><p class="p1">Это было слишком, но палка так долго перегибалась в другую сторону, что пора было ее сломать.</p><p class="p1">— Миша, — сказал Сергей, — ты себя в руках-то держи.</p><p class="p1">— А по существу ты можешь что-нибудь сказать?</p><p class="p1">— По существу, Миш, ты исключен из института, и исключен решением большинства. И ты теперь, знаешь, такой герой, как будто тебя убили на зимней войне.</p><p class="p1">— Хуже, — сказал Миша. — Меня убили на Гражданской.</p><p class="p1">— Почему хуже? — спросил Борис.</p><p class="p1">— Потому что Гражданская хуже зимней, — пояснил Миша. — Но я вот так выбрал. Был шанс пойти на зимнюю, но я решил, что можно вообще без войны. А тут выбора никакого. Кого не убили на зимней, те попали на Гражданскую.</p><p class="p1">— Миша, — буркнул Игорь. — Ты себя очень-то героем не считай, ясно? Ты распустил руки, ничего героического не сделал. Тебя выгнали, не совсем справедливо, но это тебя не делает лучше, понимаешь? Это не дает тебе права… — и он осекся, не в силах сформулировать, какое право присвоил себе недостаточно восторженный Миша. Миша мог бы воспользоваться этой щелью в его обороне — точней говоря, в его атаке, — но был уже достаточно опытен, чтобы молчать и ждать, пока оппонент накажет сам себя.</p><p class="p1">— Вообще-то, — по обыкновению лениво сказал Петр, — это как раз дает ему право. Он ничем не лучше, ради бога, но, если кого-то ссадили с поезда, он по крайней мере свободен от общего маршрута. Это же не он сошел, так? Это вы его ссадили. По крайней мере, у него по сравнению с вами на один опыт больше.</p><p class="p1">— Резонно, — сказал Орехов. — Давайте пить чай.</p><p class="p1">— А обсуждать не будем? — спросил Миша, не желая позволить Орехову затоптать спор, становившийся действительно интересным. В последнее время серьезных споров не было, каждый думал о том, как воспримут его слова, и никто не высказывался по сути.</p><p class="p1">— Обсуждать не будем, — кивнул Орехов. — Сцена получилась слишком хорошо, так хорошо, что завела всех и заставила проводить собрание по вопросу о героизме. А у нас не собрание, у нас обсуждение. Миша, если вы чаще будете появляться, у вас будет меньше вопросов. Прошу, товарищи, неформальное общение объявляется открытым.</p><p class="p1">Это было примирение, но Миша не хотел его принимать. Он подошел к Петру.</p><p class="p1">— Спасибо, брат, — сказал он. — Я тебя недооценивал.</p><p class="p1">— Да а что ж, — сказал Петр, ничуть не смущаясь. — Развели тут цензуру, слова сказать нельзя.</p><p class="p1">И Миша некоторое время посидел со всеми, проверяя, не обиделись ли студийцы: нет, не обиделись, его эскапада прошла по разряду безвредного чудачества.</p><p class="p1">— А представь, — вполголоса спросил он Петра, — если бы исключили Борьку. Он бы это принял как приговор эпохи или бился бы об стену, чтобы взяли назад?</p><p class="p1">— Он бы сошел с ума, — сказал Петр. — И это лучшее, что можно сделать. Кстати, советую.</p><p class="p1">И Миша посмеялся, и еще две недели все было нормально. Он дозвонился до Лии, сухо сказал, что призыв отменили, и услышал, что она очень рада. Встретиться она не предложила, а ему не хотелось. У него вдруг вообще пропали все желания, и он стал быстро уставать, и работа выматывала его, а стихи совершенно не шли. Ему даже показалось, что он иссяк и вообще больше ничего не напишет. Две недели прошли в вялом оцепенении, весна запаздывала, сказывались зимняя усталость и тоска. А на второй неделе марта Миша вдруг заметил на себе некую сыпь, которая показалась ему подозрительной, странную сыпь на груди и спине, и его первая мысль, увы, была вполне предсказуема, а вторая — еще предсказуемей. Он просмотрел отцовский медицинский справочник и убедился, что все именно так и есть. В груди у него запрыгало, дыханье прервалось. Он почувствовал, что проваливается в ледяную трясину и зацепиться ему не за что.</p><p class="p1">Можно было, конечно, поговорить с отцом. Но он скорее решился бы выговориться перед первым встречным. Теперь, когда история с призывом обнаружила хрупкость их семейного мира, родители оберегали Мишу, точно он был хрустальный, и сообщить отцу, что любимый сын подцепил сифилис, было равносильно убийству, что там — хуже! Миша знал, а в подтверждение еще и прочел, что начинается всегда с первичной язвы. Всмотревшись, он обнаружил и первичную язву, точней, покраснение, точней, как показалось ему, уплотнение. Прошло ровно столько, сколько было обещано в справочнике, — две недели. Тут же выстроились в послушную логическую цепочку все симптомы: и слабость, и вялость, и практическая безболезненность уплотнения (нервные клетки в месте поражения разрушаются первыми), и главное — чересчур узнаваема была логика судьбы. Эта женщина должна была его погубить, она не сумела сделать это с первой попытки, потому что он выжил, — ну ничего, теперь у нее все получится.</p><p class="p1">Лечиться? — Но это, кажется, не лечится, а главное, из диспансера немедленно сообщают на работу. Даже если он вылечится, клеймо будет на всю жизнь. Была чудовищная несправедливость в том, что первая женщина заразила его страшнейшей из болезней. И все потому, что он не распознал в ней свою погибель: ведь она дважды уже портила ему жизнь — и справилась с третьего наскока! Конечно, она могла заразить его еще на Новый год, но он почему-то думал, что все произошло тогда, на лестнице. Впрочем, инкубационный период бывает долго. Больше подцепить не от кого, оставалась бытовая версия, но для этого нужно было пользоваться чужим полотенцем, а где ему было взять чужое полотенце, у Баландиных?! Он знал теперь одно: он ославит ее на весь мир, хотя бы и погибнет из-за этого сам. Но прежде чем начать действовать, мстить за все, он решил задать ей последний вопрос.</p><p class="p1">Он отправился к Вале. Хорошо запомнил число, шестнадцатого марта.</p><p class="p1">Это был первый солнечный, лазурный, капельный день за весь март. Миша решил подкараулить ее в общежитии. Он все теперь о ней знал, все точки. И в самом деле, он ясно это запомнил, она такой потом и стояла в его памяти — Валя приближалась в обществе двух подруг, громко смеясь. Она была из них самая красивая, самая раскованная и самая наглая. У нее завелась красивая сумка, сумочка, явный подарок начальства. Что ей носить в такой сумочке? Она и косметикой мало пользовалась, почти не мазалась. Но она этой сумочкой болтала, и вид у нее был вызывающий — шла триумфаторша, победительница. Миша отделился от стены, и она увидела его, но словно и не удивилась.</p><p class="p1">— Кавалер к тебе, Валенсия! — закричала та из подруг, что потолще, поуродливей. И это «Валенсия» тоже было отвратительно.</p><p class="p1">— Да уж, кавалер, — ответила Валя неопределенно. — Поговорю тут с ним, догоню.</p><p class="p1">Первые секунд двадцать они молчали.</p><p class="p1">— Ну и где твоя армия? — спросила Валя нагло. Вообще она себя вела так, словно что-то про него знала, что-то, о чем он сам пока не догадывался.</p><p class="p1">— Отпустили, — сказал Миша еще наглее. — Говорят, без тебя обойдутся.</p><p class="p1">— А, — сказала Валя. — Ну и правильно. А я так думаю, что и не было никакой армии. Ты просто, Гвирцман, захотел, а никто тебе не дает, правильно?</p><p class="p1">— Конечно, — сказал Миша, быстро зверея. — Меня другие не устраивают, мне бы с сифачком.</p><p class="p1">Этого она не ожидала и даже отшатнулась.</p><p class="p1">— Чего?!</p><p class="p1">— Того, — шепотом закричал Миша. — Ты заразила меня. Я не знаю, сука, от кого ты набралась, но у меня сыпь по всему телу такая, какую не спутаешь. И остальное все что положено.</p><p class="p1">— Это не от меня, — сказала она тихо. Он мгновенно почувствовал этот переход к обороне.</p><p class="p1">— Не от тебя? Я не ты, у меня так не бывает, чтобы с десятью!</p><p class="p1">— У меня ничего нет, я не знаю, где ты взял…</p><p class="p1">— У меня негде было взять! — Миша не стал, конечно, признаваться, что у него никого не было раньше. — У меня после тебя вообще никого…</p><p class="p1">— Ах ты дрянь! — Валя замахнулась на него, но он перехватил ее руку. — Да ты знаешь что… да ты… я беременна!</p><p class="p1">Теперь отступил он.</p><p class="p1">— Как беременна?</p><p class="p1">— Так! Две недели задержка!</p><p class="p1">Она ведь тогда уже ждала, но вот они не пришли, красные-то дни, и соседка по комнате сказала ей, что время перед месячными — самое опасное. А он тогда дернулся в ней, она почувствовала, и теперь надо было срочно решать, где чиститься. Это уже четыре года как было делом преступным и крайне опасным, и правильно, стране нужны люди, сама виновата, но о том, чтобы оставлять ребенка, да еще и от Гвирцмана, не могло быть речи. Если бы Ганцев — еще туда-сюда, и даже о ребенке от Коли она бы еще подумала, но этот никуда не годился, тем более в мужья. А где найти, к кому обратиться? Валя как была в этом городе чужая, так и оставалась. Думала она и о том, чтобы удавиться, тем более Ганцев был теперь с ней холоден, а Миша — в армии, и она даже плакала ночью. Ужасно холодная была ночь и холодная в окне звезда. Но утром она решила, что назло им всем будет жить и работать и даже, может быть, снова начнет писать, но тут заявилась эта сволочь, живехонький, без всякой армии, наверняка отмазал папаша, и предъявляет ей претензии, и какие! И пока он осмысливал новость, она подскочила и смазала его по физиономии раз и два.</p><p class="p1">Миша не стал реагировать, потому что хватать за руки беременную женщину — вообще последнее дело. И, как любой мужчина — это уж совершенно неистребимо, хоть и неясно почему, — он в первый момент почувствовал прилив гордости: от него забеременели, надо же, как удивительно! Радостно было удостовериться, что он на это способен. Только второй волной накатил ужас: положим, он мог бы ей устроить через отца… но если она такое подняла из-за несостоявшегося поцелуя, можно представить, что будет сейчас!</p><p class="p1">— Я теперь тебя на чистую воду выведу, всю семью твою выведу, и что отец тебя от армии отмазал! — словно прочитала Валя его мысли,</p><p class="p1">И тут случилось невозможное, непростительное. Миша подскочил к ней и толкнул в грудь, а потом, когда она поскользнулась, но не упала, залепил ей хорошую пощечину. Валя этого никак не ожидала и хотела уже вцепиться ему ногтями в лицо, но тут поняла, что, если она это сделает — он, пожалуй, и посильней ее ударит. Они стояли друг против друга и скалились, загнанно дыша, и не решались ничего сделать.</p><p class="p1">— Вешайся теперь, — сказала она. — Конец тебе, Гвирцман, крышка.</p><p class="p1">— Посмотрим еще.</p><p class="p1">— И смотреть нечего. Крышка. Я тебя тогда пожалела, а теперь додавлю.</p><p class="p1">— Я тебя посажу.</p><p class="p1">— Мразь ты.</p><p class="p1">— Сука.</p><p class="p1">Некоторое время они так постояли, а потом Миша сунул руки в карманы и независимо пошел прочь. Вот теперь она точно заявит. Телесных повреждений нет, но она заявит. Пускай заявляет. Он тоже заявит.</p><p class="p1">Он направился к Колычеву, потому что если кто и мог дать ему консультацию насчет венерической болезни, то наверняка он. Колычев, представитель хтонического мира, имел связи во всем московском подполье и уж конечно разбирался в темных, особенно уродливых болезнях. Миша был словно под наркозом, и хотя на него обрушились три по-настоящему тяжелые новости — у него сифилис, от него беременна злобная ведьма, сама его судьба, тайная недоброжелательность, и он только что ударил женщину, — преобладала над всеми чувствами странная гордость: случилось столько всего, что бояться уже нечего.</p><p class="p1">Колычев был дома и удивился Мише.</p><p class="p1">— Слушай, это… — сказал Миша с непривычной развязностью. — Ну ты прости. Я тогда погорячился.</p><p class="p1">— Ты не погорячился, а показал лицо, — сказал Колычев, то ли издеваясь, то ли всерьез. — За это извиняться нечего, оно у тебя такое и не поменяется, даже если тебя еще раз выгнать из института.</p><p class="p1">— Ну прости, — повторил Миша. — Я, в конце концов, не сказал ничего ужасного.</p><p class="p1">— То-то и оно. Если б ты сказал что-нибудь ужасное, было бы о чем говорить. А так — неинтересно.</p><p class="p1">— Зато, — заговорщическим полушепотом сказал Миша, — я скажу тебе ужасное сейчас. У меня сифилис.</p><p class="p1">— Поздравляю, — не меняя интонации, сказал Колычев.</p><p class="p1">Он за эти три недели как будто еще сжался, и если прежде на нем лежала тень смерти, то теперь это была смерть унизительная, нелепая. То есть он был несчастен, а стал жалок — не совсем то же самое.</p><p class="p1">— Я думал, ты дашь совет.</p><p class="p1">Наркоз начал отходить, Миша чувствовал злобу и беспомощность.</p><p class="p1">— Ртутная мазь крест-накрест, — не глядя на него, сказал Колычев. — По четным дням левая рука и правая нога, по нечетным наоборот.</p><p class="p1">— Но это же вчерашний день. И вообще я без специалиста не решаюсь.</p><p class="p1">— Я не специалист. Впрочем, иди-ка сюда.</p><p class="p1">Миша подошел к столу и увидел таблицу с вычислениями и странной схемой, но Колычев быстро захлопнул тетрадь.</p><p class="p1">— Задирай рубашку.</p><p class="p1">Миша покраснел, отвернулся и послушно исполнил требование неспециалиста.</p><p class="p1">— Крапивница, — брезгливо сказал Колычев.</p><p class="p1">— Кра… что?</p><p class="p1">— Нервная сыпь. Ты перенервничал, чего-то испугался или съел лишнее.</p><p class="p1">— О черт, — сказал оторопевший Миша. — Это, вероятно, из-за армии.</p><p class="p1">— Японской?</p><p class="p1">— О черт. Нет, конечно. Нашей. Меня призвали, я хотел тебе сказать, но тебя не было.</p><p class="p1">— Меня действительно не было, — сказал Колычев многозначительно, но Мише было не до того.</p><p class="p1">— И я, наверное, несколько…</p><p class="p1">— Ты идиот и трус, — ровным голосом сказал Колычев, но обижаться на него теперь было нельзя.</p><p class="p1">— Ты знаешь, я ведь и первичную язву, мне кажется, нашел…</p><p class="p1">— Первичную язву ты нашел бы прежде всего. Это такая вещь, которую не перепутаешь. Твердый шанкр величиной с медный пятак.</p><p class="p1">— Я бы показал, но…</p><p class="p1">— Нет уж, увольте.</p><p class="p1">Колычев хрюкнул.</p><p class="p1">— Я должен был увидеть твой конец, — произнес он с пафосом, — иль дать тебе своим полюбоваться.</p><p class="p1">Миша расхохотался.</p><p class="p1">— Нет, нет, конечно… Это все, ты понимаешь, нервы.</p><p class="p1">Он сел на шаткий табурет. Выдержать еще одно внезапное спасение было выше его сил. Судьба катала его по слишком крутой синусоиде.</p><p class="p1">— А в армию почему тебя не взяли? Из-за сифилиса?</p><p class="p1">— А разве с сифилисом не берут?</p><p class="p1">— Нет, конечно. Ты перезаразил бы всю казарму.</p><p class="p1">Мишу начал разбирать нервный смех, неостановимый, как от щекотки.</p><p class="p1">— Слушай, — пытался выговорить он, — слушай, какое счастье! Ведь это… это взаимоисключающие вещи! Если бы сифилис, то никакой армии, а если бы не армия — никакого сифилиса…</p><p class="p1">— Ну ладно, — сказал вдруг Колычев. — Избытки своего облегчения ты будешь изливать где-нибудь в другом месте.</p><p class="p1">Миша такого не ожидал. Ему казалось, страхами последних недель он искупил всю свою тогдашнюю грубость, да не такую уж и грубость.</p><p class="p1">— Костя, хватит, в конце концов, я извинился…</p><p class="p1">— Ты извинился, но тебя не извинили. Давай, счастливец молодой, я занят делом.</p><p class="p1">— Но я потом приду…</p><p class="p1">— Потом ты не придешь. Тебя здесь больше не надо.</p><p class="p1">Миша пожал плечами.</p><p class="p1">— Если что, ты знаешь, где меня искать.</p><p class="p1">— Вот только искать тебя мне и не хватало.</p><p class="p1">Миша не принял этого слишком всерьез, у Колычева и прежде бывали припадки мизантропии, но сейчас он что-то был очень уж суров. Миша вышел из полуподвала с некоторым облегчением. Да ладно, подумал он, сейчас время разрывов, и мне надо, видимо, порвать со всем прежним кругом — и с бывшими друзьями, и с женщинами, и с позднейшими спутниками. Я выхожу на какой-то новый виток или падаю в последнюю бездну, но разрывы суть предвестия новизны и, кажется, роста. Чтобы прыгнуть — вверх или вниз, — надо освободиться. Чувство судьбы, то есть неслучайности, никогда не изменяло ему.</p><p class="p1">Дома, вечером, он небрежно сказал отцу:</p><p class="p1">— Мон пер, у меня, кажется, крапивница.</p><p class="p1">— Покажись, — потребовал отец. — Да, действительно крапивница. Жрешь черт-те что, вот и сыпь.</p><p class="p1">— И что делать?</p><p class="p1">— Ничего. Тяжелые болезни неизлечимы, а легкие проходят сами, — повторил он любимый афоризм, который приписывал Чехову.</p><p class="p1">— Ты уверен, что не сифилис? — спросил Миша, широко улыбаясь.</p><p class="p1">— Чего? — переспросил отец, вытаращив глаза.</p><p class="p1">— Шучу, мон пер.</p><p class="p1">— Сифилис! — сказал отец и поднял палец. — Сифилис заслужить надо! Бодлер, Ницше, теперь ты. При сифилисе, скажу тебе на будущее, сыпь имеет вид звездного неба, и она не красная, а белая.</p><p class="p1">А на следующий день, во время дежурства, Мишу ждал очередной зигзаг. Его вызвали в приемный покой. Он замер. Перед входом, покуривая, прохаживался Драганов.</p><p class="p1">Она донесла, понял Миша, донесла в институт, потому что куда же еще, и теперь они разберу мое дело уже всерьез… хотя как, зачем? Ведь я уже не в их юрисдикции. Но, видимо, она обратилась к единственному знакомому комсомольскому начальнику. Это не может быть ничем, только новой ее жалобой…</p><p class="p1">Но он опять ошибся, потому что не научился еще предугадывать прихотливые узоры своего будущего.</p><p class="p1">— Здравствуй, Гвирцман! — пропел Драганов. — Ну что, я вижу, ты окунаешься в жизнь?</p><p class="p1">— Не без этого, — осторожно согласился Миша</p><p class="p1">— Прекрасно, я рад за тебя и за жизнь. В общем Гвирцман, я полагаю, что ты можешь получить положительную характеристику и к началу апреля возвращаться в альма-матер. Есть признаки, что ты будешь восстановлен, если, конечно, не был тут замечен в прогулах и алкоголизме.</p><p class="p1">— Никак нет, — Миша позволил себе пошутить, но ситуации не понял. — А как вы нашли меня здесь?</p><p class="p1">— Но ведь я знаю, где ты, — Драганов поднял брови. — И все у нас знают.</p><p class="p1">— Но до первого апреля далеко, — сказал Миша, — это розыгрыш? Странно как-то.</p><p class="p1">— Какой же розыгрыш? Не могут милости быть рано никогда, — процитировал Драганов по обыкновению. — Я же тебе и тогда говорил…</p><p class="p1">— Но что-то изменилось?</p></span>
