<span><p class="p1">Как ни странно, Леня утешил его, как куфельный мужик Герасим утешал Ивана Ильича. От Лени исходил покой, все у него было благополучно. Как знать, подумал Крастышевский. Может быть, и вправду так лучше. Лене не нужна война, у него дочка, ему нужен мир любой ценой. Все лучше войны, и если для сохранения Лени и его дочки нужно иногда поцеловаться с дьяволом, то почему бы и нет. С этими мыслями и продолжал обычные свои труды, статьи по театроведению и наброски к общей теории стиля, которую когда-нибудь можно же будет обнародовать; исправить нравы он давно не надеялся, ибо изучить физиологию и привычки всех читателей было невозможно, а потому каждый среагировал бы на проповедь «Веди себя прилично» глубоко личным и не всегда приличным способом, — однако можно было косвенно, аккуратно, чтобы считали только профессионалы, набросать навыки управления хотя бы базовыми инстинктами…</p><p class="p1">Но вся эта работа полетела к черту, когда у него буквально вышибли из-под ног никогда не ощущавшуюся, существовавшую где-то бесконечно далеко, но родную почву. Что-то ужасное начало происходить с Польшей, а почва и Польша звучали для него не только рифмой, но и синонимами.</p><p class="p1">Он никогда там не был. Его отец переехал в Петербург из Лодзи еще в восьмидесятые. У него никогда не было общего для поляков чувства затаенной ненависти к русским и всему русскому, поскольку и польского он не знал, и в национальную польскую идею, как и в любые национальные идеи, всерьез не верил. Какое, помилуйте, национальное государство в двадцатом столетии, когда главной идеей становится проницаемость любых границ, включая физические границы человеческого тела? Бытование Польши в России было идеей, жизнью души в теле; выйди эта душа наружу и оденься плотью — какой тяжеловесной, сырой, какой в худшем смысле российской она бы стала! Так евреи всю жизнь тоскуют по Израилю и тем сохраняют себя, но создай они Израиль в реальности — чем он стал бы? Какой позорный, мучительный шаг назад — возвращение вспять от идеи на скучную, горькую землю! Но Польшу как идею Крастышевский любил, и любой человек с польским именем и фамилией казался ему своим, неопасным; из всех современников он выделял Олешу, написавшего лучше всех и меньше всех. На его фоне Бабель был груб, как одесский базар на фоне Рыночной площади Кракова. Польша, сумевшая чудом отстоять себя в двадцатом, вызывала у него странную гордость. Про себя Крастышевский думал иногда словами «Ешче Польска не згинела».</p><p class="p1">Теперь Россия возвращала Польшу, но как! Более всего это было похоже на любовь мертвеца, возвращение вампира. При жизни он любил, владел, после смерти кусает. Положа руку на сердце — от царской России в Польше был хоть какой-то толк, хоть дружба Пушкина с Мицкевичем, закончившаяся все равно враждою, — но нынешняя Россия набрасывалась на нее уже как стервятник. Да, Польша и сама была далека от идеала — Мюнхен! Тешины! — но то, что творилось теперь, было уж вовсе за гранью. Крастышевский чувствовал, как просыпается в нем нечто более древнее, нежели сознание и подсознание, — и более того: он чувствовал, как эта самая сила начинает двигать им. Жизнь до тридцать девятого была не адом, а чистилищем; ад начался теперь. И боже, что полезло из людей!</p><p class="p1">Между тем ничего необычного из людей не полезло, это было нормальным их состоянием, но Крастышевский, избалованный великими переменами, продолжал ждать от человечества порыва к сверхчеловечеству. Напрасно, напрасно! Застыв на грани сверхчеловечества и почуяв его незнакомый химический запах, человечество стремглав устремилось назад, и вправе ли мы упрекать его за это? Не сам ли он понимал, что большая война неизбежно покажется массе единственным выходом, — ибо иначе она прыгнет в новое состояние, а это новое состояние для масс неприемлемо? Война была простейшим способом затормозить время, вот они его и тормозили; пока еще обходились паллиативами. Вот они съели Польшу, вольный дух Европы; вот надругались над всем, во имя чего стоило жить. И все же это была жизнь, пристойная жизнь; многие были довольны. Кое-кто уже говорил, что полячишки, в сущности, всегда нас ненавидели. Любопытно было посмотреть, как менялся репертуар. Одна Юдина еще отваживалась играть Шопена; зато как ворвался Вагнер! Он был теперь везде — каменная сентиментальность, кровавые слюни, титаническая развесистая конфетница, кильский курортник, пыжащийся перед зеркалом, надувший и ту мыщцý, и эту… Германия была своя, глубоко своя; Германия была родственна худшему, что тут гнездилось. Совместный парад Крастышевского добил. И он знал, кто виноват. Он один знал, кто виноват. Он один был виноват.</p><p class="p1">И с сентября 1939 года он начал внушать другое, совсем другое.</p><p class="subtitle">— 5 —</p><p class="p1">Искусство отличается от жизни тем, что искусство нефункционально. Например, если в книге много персонажей, часть которых тут же исчезает и низачем больше не нужна, — прошел, передал пакет, провалился, — это книгу не портит. Напротив, создается ощущение большого живого пространства. Если в книге на сцене висит ружье, оно ни в коем случае не должно стрелять. Если о персонаже сообщается, что он декоратор, главное — не дать ему писать декорации.</p><p class="p1">В жизни, напротив, все не так, потому что в книге будущее в виде второго тома может не наступить вовсе, а в жизни обязано, деваться некуда. В жизни если кто-то передает пакет, то в нем записка о том, где висит ружье. И оно обязательно выстрелит, как только декоратор убедится, что из-за несчастной любви он не может больше писать декорации. В жизни все неотвратимо подводится к единственной разгадке, к необходимому следствию; в книге случайности бывают, а в жизни — никогда. Поэтому Крастышевский занимался жизнью, а не книгами.</p><p class="p1">Однажды он включил радио, которое вообще-то слушал редко. Но ему нужно было знать, что происходит, хотя он и меньше верил в слово устное, нежели в прочитанное глазами. Итак, он включил радио и услышал в полном смысле нечеловеческую музыку. Когда так говорили про Бетховена, это было ерундой. Бетховен был как раз совсем, слишком человеческий. Теперь Крастышевский слышал то, что сейчас будет, и даже то, что от всего этого останется.</p><p class="p1">Надо заметить — прежде чем перейти к слушанию нечеловеческого, — что Крастышевский вообще не доверял музыке. «Чего хочет от меня эта музыка?» Она никогда не говорит, и под ее влиянием одинаково легко пойти в атаку и убежать, спасая свою ничтожную, драгоценную жизнь. Один слышит «Крейцерову сонату» и думает про ливень стеной, а другой — про половое чувство. От этих ненадежных искусств нельзя ждать конкретного результата, несмотря на всю внешнюю эффектность. Но тут он услышал строгое, точное сообщение, зашифрованное в рыцарском танце из нового балета, балета, где, как сообщалось, судьба веронских любовников будет не такой, как у Шекспира, а лучше. Впрочем, до постановки еще долго, Уланова только репетирует, а пока вот вам, почтенные слушатели — и в уши ему ударило: спасения нет. Что бы Крастышевский ни сделал, бездна подползала сама, и остановить ее не было способа. Это был танец заслуженной казни, столь отчетливый, что его можно было записать словами, — и он кинулся это делать, благо эта музыка звучала в нем теперь дни и ночи. Сначала слова были не те, случайные, но приходящие не случайно: они задавали сумрачный колорит как бы готического леса. Ночь — да — ночь — да — ночь — сосна осина пальма ель сосна осиииина! Ночь туда сюда туда сюда туда сюда отсюда! вон отсюда вон прошу тебя прошу тебя молю тебя! После чего в невыносимом верхнем регистре, после внезапной барабанной отбивки (как тьфу) — крик мольба косьба судьба, гульба пальба труба — нет! Да!</p><p class="p1">Но ведь это все еще и повторялось. Вот тебе — туда тебе — сюда тебе — с размаху, маху, аху, плаху, даааааа — летит туда, куда, туда, куда не надо, куда не надо, да, туда, куда из ада, — и далее, на невообразимых качелях, взлетало значительно выше, чем он мог предположить. Глупы попытки передавать музыку звукоподражаниями, все эти «Сирены», толкотня односложных выдуманных слов, перетекание цветовых эпитетов. Бред, гроб. Верно одно — заделывание пустот первыми приходящими словами, они и есть вернейшие: гроб стоит, где стол был яств, где стол был яств, стоит он! Летит туда, куда лететь тебе не надо! Ночь труба гульба иди туда куда не хочешь! Труп идет туда куда живой ходить не может! Идет туда, идет сюда! (Хряск!) И поверх всего этого бессмысленное — молю тебя! молю тебя! (фоном чего было: ха-ха-ха-ха).</p><p class="p1">Бог, смотри сюда, иди сюда, лови момент, да! Хватай его, хватай меня, бросай туда, да! Жги, топи, топчи, суди, ломай через колено! Больше ничего, лови, лови, губи, не медли! Стон, труба, еда, беда, душа, толпа, могила! Слон, хомяк, жираф, блоха, вольер, расплата, яма! Безум-ный пе-речень ве-щей — раз, два! Вот оно так!</p><p class="p1">И это повторялось. Это не оставляло сомнений, вбивая в мозг:</p><p class="p1">— Раз, два! Жри, жги! Ешь, бей! Режь нас! (Раскачка.) Ночь, весна, распад, расцвет, разлом, разбой, засада! Смерть, любовь, рассвет, закат, вода, труха, гниенье! Желудок тьмы, толпа червей. Ну если так, тогда скорей тогда, скорей тогда, скорей тогда! — и почему-то при этом ему представлялась весенняя вода, черная земля и зеленые, змеиные по ней потоки. Потоки сносили все.</p><p class="p1">Бронза солнце золото вода трава руина! Тело дело молодо старо неизлечимо! Иди сюда, иди сюда! — и толпы, толпы виделись ему, текущие по склонам, сливающиеся в братский ров. Из зубов выдирали золото, дивный закат золотил скаты. Под конец разверзалось четырехсложное Сар-да-на-пал! — и все гасло, только вспыхивало почему-то в мозгу одиннадцать и четырнадцать, а потом вдруг двадцать три, и тогда исчезало уже все.</p><p class="p1">Сочинить такое было нельзя — только услышать.</p><p class="p1">Теперь надо понять, что делать, когда ничего сделать нельзя. Он сам запустил механизм более страшный, чем мог себе представить. Инерция этого механизма была сильней, чем у поезда на полном разгоне, и ни затормозить, ни свернуть. Ему предстояло развернуть весь ход истории, остановить войну, шедшую по наихудшему сценарию: два титана в железном объятии против всего прочего земшара. Он воспользовался заменой Шумяцкого на Дукельского. Шумяцкий был, в сущности, дуб. Дукельский был, в сущности, осина. По этой логике шли все замены, потому что дубов и так было мало — все больше кустарник. Он добился аудиенции у Горохова, считавшегося правой рукой Дукельского; настоял, что отчеты следует теперь подавать не дважды, а четырежды, ежеквартально: интерес к СССР и советскому кино стал в мире огромен. Он обещал включать в отчет переводы наиболее заметных статей. Он прибавил, что нашей публикой станет и вся Германия, ибо сам Геббельс, не кто-нибудь, ставил в пример агитационное советское искусство. Что ж, снисходительно разрешили ему, подавайте. И Крастышевский прыгнул выше головы.</p><p class="p1">Его очередной отчет был полон такой неприкрытой ненависти, такой вражды, что только камень — либо человек, вовсе не умевший читать, — сумел бы прочесть его хладнокровно. Дикая злоба должна была овладеть читателем. Простые, нейтральные слова складывались на уровне звука и ритма в мозаику милитаристского безумства. Вот только поначалу Дукельский не сумел толком прицелиться, и жертвой первых двух отчетов нового периода стала несчастная Финляндия. Он промахнулся чуть-чуть, самую малость, но самая малость на карте грозит обернуться сотнями километров. Финляндия была ни в чем не виновата, война оказалась неудачна. Жертв было множество с обеих сторон, с нашей больше. Крастышевский понимал, что это его вина, но ему уже было не до того. Вины на нем было уже столько, что одного загробного бытия, сколь угодно адского, не хватало на искупление. Теперь надо было исправлять ошибку, за волосы вытаскивать страну из ада, в который он ее вверг.</p><p class="p1">Следить за результатами стало трудней, ибо верховные структуры становились все закрытей, оттуда не просачивалось ни слухов, ни речей. Надо отдать Крастышевскому должное — он умел не только шифровать свое, но и расшифровывать чужое. В нескольких речах на разных уровнях начала наконец проскакивать готовность к столкновению. Ему удалось — больше эту заслугу некому было приписать, серьезно, — сорвать некоторые публикации «современного немецкого искусства»: после того как Япония, Италия и Германия объявили себя единой осью, остановили уже набранные переводы из немецкой поэзии, главным образом народной, но и новейшей, — в «Интернациональной литературе» и «Октябре».</p><p class="p1">Но хуже всего было то, что вместо готовности начать наконец большую войну и тем спасти мир от величайшей мерзости, в речах и статьях читал он страх, ужас.</p><p class="p1">Этому ужасу не было объяснения. Ведь так храбрились, так клялись решить все на чужой территории, ведь незадолго до пакта ставили уже пьесы о том, как немецкий пролетариат сокрушит… и наши летчики помогут… Ведь таким военным духом было проникнуто все — а теперь он вычитывал из гласных (гласные всегда по этой части откровеннее) какой-то жалкий, беспомощный, капитулянтский вой. Они так долго, так сильно готовились к всемирной схватке! — но вместе с двадцатыми годами иссяк пыл. Ничего, ничего больше не было. Крастышевский читал — и физически чувствовал нервную дрожь, которая их там била: они говорили об отказе от оборонной тактики, о новых командирах, о неизбежности войны, — а слышалось ааа, ыыы! И о чем бы ни заходила речь, сквозь всю мнимую уверенность он слышал, чувствовал дрожь. Хотя на поверхности было сплошное «разгромим».</p><p class="p1">Выходило, что они привыкли бить своих, и это понравилось. Они не встретили ни малейшего сопротивления — и теперь панически страшились любого врага. Как всякий многолетний правитель, они расслабились. Как всякий мещанин, состарились. Молодого, цепкого хищника больше не было; герой, прославившийся эксами, то есть в сущности мародерством, — оказался неспособен к открытому бою. Все это время продолжали жрать своих; все это время место дубов занимали осины; все это время они гнили. Не было больше ни великих строек, ни грандиозных планов; кажется, они уже смирились с тем, что станут сырьем для другого хищника, отдадут ему всю свою сырость, всю нефть — и будут смотреть, как он грызет остатки Европы, косясь уже и за океан.</p><p class="p1">Мир, понимал Крастышевский, был страшной ошибкой; он уже и задуман был с ошибкой. Он нуждался теперь в радикальном претворении, и ничто, кроме войны, не могло раскалить горн до нужной температуры. Столько гнилья и плесени обнаружилось и наросло, в том числе в недавних гражданах нового мира, что выжечь все это мог только всемирный огонь; в огне кое-что могло уцелеть, а в болоте перегнило бы все. События мелькали вокруг Крастышевского до головокружения, и все мимо, все вотще… Все сознавали заслуженность Армагеддона. А те, кто должен был начать Армагеддон, медлили, потому что разучились.</p><p class="p1">Крастышевский понимал, что к войне не готовятся, — или готовятся не к той. Тошнота одолевала его, когда он читал газеты. Газеты тоже полны были тошнотой страха. А между тем, если бы мы начали, у нас были бы прекрасные шансы. Нам надо, непременно надо было начать, ибо терпеть уже не было никакой возможности; теперь он смеялся над собой и ненавидел себя. Как смел он разводить этот трусливый пацифизм, когда враг рода человеческого глумился и кривлялся перед ним! Если его страна в нынешнем состоянии и годилась на что, то разве только на взрыв, с которого начнется цепная реакция последней войны. Надо было бросить себя в эту топку, и тогда у мира была бы призрачная надежда; во всяком ином случае мир все равно бы погиб, но перед этим изменился так необратимо, что и вспоминать о проекте не стоило.</p><p class="p1">И Крастышевский стал с ожесточением работать на войну — повествовать о мерзостях Германии, упирать на гнусности коричневого мировоззрения, кодировать свастику в структуре абзацев. Это была работа на износ, почти круглосуточная, и до него доходили уже смутные слухи о том, что он услышан: вроде на каком-то совещании сказали, что пора покончить с оборонительной доктриной… что нельзя ни пяди земли заполучить, если всегда защищаться… Он начал даже регулярно есть, поправляться. Все в нем оборвалось 14 июня, когда он прочел: провокации… слухи… никаких признаков… Это означало только одно: полное разоружение. Это значило, что подготовка, которой невозможно было не видеть, замалчивалась по принципу: чего я не вижу, того нет.</p><p class="p1">Они насмехались над Францией, но втайне желали для себя ее участи. Они всегда хотели быть французами, ведь французам так легко все сходило с рук. Они и теперь хотели сдать всех, кто не понравится новым хозяевам, и устроить себе Виши где-нибудь в Свердловске. От этой мысли у Крастышевского начинала болеть голова и перед глазами появлялись мушки.</p><p class="p1">Узкий и все сужавшийся, смерзавшийся круг людей, с которыми он еще говорил, преисполнился надежды — мерзейшего из качеств. Вот видите, говорили они, вдумчиво кивая. Вот видите, ничего нет. Все это паника. Если когда и начнется, то не сейчас. Да и оцените явные невыгоды — кто же будет начинать летом, когда уже так близко распутица? Само собой, возможны любые провокации, но государственная мудрость — в которой вы же не можете отказать? — именно в том, чтобы четко отличать их; неверный шаг в самом деле может обернуться катастрофой. Но, слава богу, теперь не двадцатый год, и мы умеем как-нибудь…</p><p class="p1">Они все трусили. Наверху трусили сильней всего. Они понимали, что ничего не могут.</p><p class="p1">И тогда он приступил к последней своей работе.</p><p class="p1">Ковентри, Ковентри. Это слово все чаще мучило его. Что-то было в самом его звучании. Крастышевский знал, что в августе прошлого года город почти стерли с лица земли. Почему Ковентри ничему их не научил? Нужно было найти звуковой антоним для Ковентри, но он не находился. Нужные слова вообще словно кто вымел из его мозга. Смог еще подумать «вымел», но само это слово уже почти ничего не значило.</p><p class="p1">Оставался шанс. Крастышевский приготовил за неделю документ, который можно было подать. В субботу, двадцать первого, позвонил Лене. Леня мог как-нибудь отвезти своему начальству. Начальство могло как-нибудь, любой ценой, под предлогом особой срочности… Наверняка у них есть там каналы. Это был текст, призывавший не расслабляться ни на секунду. Это был текст, призывавший начать, ибо было уже ясно, что в противном случае первыми начнут они; и тогда, в сочетании с внезапностью, безумной внезапностью, вся их огневая мощь… вся сила и тяжесть покорившейся им Европы… Если сейчас, немедленно, не прочесть то, что он подготовил, и не избавиться от благодушества, — может произойти нечеловеческое, непредставимое.</p><p class="p1">Был первый ясный день после нескольких жарких, удушливых и дождливых. Травы пошли в бешеный рост. По Москве ходили, кружились, порхали счастливые люди. Крастышевский дрожащей рукой, не попадая в кольца диска, звонил из уличного телефона.</p><p class="p1">— Лени нет, он уехал, — сообщил ему дряблый старушечий голос.</p><p class="p1">— Как нет, как уехал?! — в ужасе вскричал Крастышевский. — Он необходим, его на службу вызывают сейчас же!</p><p class="p1">— Он уехал на выходные, — уже с раздражением повторил старушечий голос. — Его не будет до завтра, до вечера.</p><p class="p1">— Боже мой! — простонал Крастышевский. — Тут минуты дороги, я не спал пять ночей! Умоляю вас, скажите, может быть, можно его как-нибудь найти?</p><p class="p1">— Я говорю вам, что он уехал, — торжествующе проговорил голос, и связь прервалась.</p><p class="p1">Все было кончено. Можно, конечно, искать другие нити, но все они вели в никуда. Сама судьба говорила Крастышевскому, что мир спасти нельзя, что чума начнет первой, и тогда уже никакого другого финала не вырисовывалось. Миру предстояло погибнуть, доказав перед этим полную, безоговорочную заслуженность погибели.</p><p class="p1">И тогда Крастышевский решился выкинуть на стол свой последний козырь.</p><p class="p1">Тут надо объяснение. А впрочем, не надо никакого объяснения. Как всякий человек, долго и целеустремленно над чем-нибудь работавший, он давно понимал, что мир не просто так, что мир не сам собой, что мир есть почерк, и почерк указывает на акт творения. Были не только люди и не только верховный творец, вот что важно помнить, — были медиаторы, посредники вроде Лени. У них был свой язык, остатки которого растворены в древнейших языках земли, например в санскрите. Санскрит Крастышевский знал в тех пределах, в каких понадобилось бы объясниться с первым встреченным носителем языка, если бы существовала та вымечтанная Индия, где говорили бы на санскрите. Этот язык был не выдуман, а спущен с небес. Фонемы имели там собственное значение. И Крастышевский задумал обратиться ко всем медиаторам — к Вестникам, как принято было их называть, в час, когда Вестники слышат. А именно в три часа утра. Разговаривать с Вестниками надлежало на высоком, открытом пространстве. Проникнуть на крышу по пожарной лестнице не составляло труда. Крастышевский стоял над городом, прозрачным и спящим. Начинало светать. Воздух был тесен от запахов и вестников. Вестники стремились к запахам. Редко выпадало им обонять над этим городом что-то столь прекрасное, все больше зловонный пот, пот ужаса и вины. Но теперь они торопились насытиться благовониями жасмина, и черемухи, и уже отцветающей сирени, и только готовящейся к цветению липы. Темно-голубой и даже черно-голубой воздух окружал Крастышевского, и он заговорил.</p><p class="p1">— Ажгуххр! Ахрр! Ахрр!</p><p class="p1">Это были слова призыва к готовности, к полной боевой готовности; к тому, чтобы уничтожить себя, швырнуть себя в бездну. Это были слова отпора. Это были слова, после которых никто не посмел бы предлагать капитуляцию, просить об отсрочке, надеяться. Это были слова самой черной решимости, от которых должны были проснуться мертвые.</p><p class="p1">— Ажгун! Гррахр! Шррруггр!</p><p class="p1">Крастышевский услышал внизу свисток милиционера, и это означало, что надо торопиться.</p><p class="p1">— Гррастр! Трррубр! Андадавр!</p><p class="p1">За ним уже лезли. Крастышевский прижался к трубе. Теперь пусть будет что угодно. Они всё поняли, но и другие всё поняли. Он расслышал, как в воздухе что-то — непонятно что, но несомненное что-то — словно сказало ему: да, да, да.</p></span>
