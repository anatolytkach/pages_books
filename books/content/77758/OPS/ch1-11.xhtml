<p class="p">ЧАСТЬ ВТОРАЯ</p>
</div><p class="subtitle">— 1 —</p><p class="p1">А вот Борису Гордону свободного времени почти не выпадало, потому что у него была ответственная журналистская работа, жена и любовница.</p><p class="p1">Если бы ему привелось описывать себя — терапия, к которой он иногда прибегал, а не писательское тщеславие, конечно, — он бы действовал в этой прозе под пятью разными фамилиями, или можно изысканней: Борис — Ильич — Гордон, Журналист, Команч. Раньше всех был Команч, еще с гомельских гимназических игр, — и, как всегда бывает, он и оказался самым живучим. Команчем он был с Гореловым. Для Муретты только Гордон, для Али — только Борис, Борька: похоже, она наслаждалась самим звучанием имени. Ильич — в ТАССе. Журналист — как положено, в журнале. И всё это были разные люди, и если раньше переключение не требовало усилий, то за три Алиных месяца между Борисом и Гордоном образовалась трещина.</p><p class="p1">Все пятеро оказались разного возраста. С Алей он был старшим — пожалуй, сорокалетним; с Муреттой так и остался двадцатипятилетним плюс-минус три года. Ильичу и Журналисту всегда было тридцать, Ильич чуть младше, еще цепенеющий от внезапной ответственности. Что до Команча… Кажется, у Галена — или у другого ученика Фройда, на них в двадцатые была недолгая мода, Борис в Академии как раз ее застал, — он читал, что при наличии множественных личностей (синдром, впервые описанный на австро-венгерском шпионе) одна судит всех, вызывая на правеж. Вот это был Команч. И если бы кто ему в детстве сказал, что самым настоящим и самым честным окажется именно Команч, собеседник Горелова, — о, как бы Борис удивился! А может, и нет. Он в детстве гораздо меньше удивлялся, будто с самого начала все знал.</p><p class="p1">И Алю, вот странность, он знал уже тогда. Аля была Девочка Напротив, предмет первых воздыханий, волшебное существо, начисто лишенное девчачьего высокомерия; она смотрела на мир благодарно, и его словно подбадривала — ну что же ты? Но Боря так и не решился, а когда осенью, собираясь в третий класс, приехал с дачи, ее уже не было. И теперь она вдруг приехала, прямо из Парижа. Оказывается, она уезжала в Париж. Правда, пятнадцать лет где-то пролежала в хрустальном гробу, не взрослея. Ему было теперь тридцать семь, а ей двадцать два…</p><p class="p1">Но был шестой.</p><p class="p1">Этого Шестого не знал никто, не знал сам Борис, но чуял. Шестой должен был выйти наружу, когда по разным причинам умрут или сдадутся верхние пятеро. Вот когда не станет ни Бориса, ни Гордона, ни даже Команча, — этот Шестой заявит о себе. Думать о нем было стыдно, сознавать его в себе — мучительно. Это был голос рода, той стыдной архаики, о которой нельзя говорить вслух. Борис все делал, чтобы заглушить его: учил языки, читал сложных французов и вычурных немцев в оригинале, бесконечно странствовал, не позволяя себе ни месяца оседлости; о родителях, живущих в провинции, почти не вспоминал, а когда наезжал к ним — радостно отмечал в них черты советскости, поступаясь даже памятью детства. Но Шестой был, и Боря знал, что это последняя опора. До нее могло не дойти, но он чувствовал, что дойдет: этот навык — доверять самым дурным предчувствиям — был воспитан долгим опытом.</p><p class="p1">Имени Шестой не имел.</p><p class="subtitle">— 2 —</p><p class="p1">Главная задача сообразительного человека в мире заключается в том, чтобы понять свое предназначение и следовать ему, говорил Команчу отец, чьи назидания всегда были банальны, но, как выяснялось, спасительны. Увидеть себя со стороны, проследить свой путь с его кривизной и научиться этому следовать, — на это едва ли хватит жизни, но Боря, у которого с детства был опыт самонаблюдения, к двадцати пяти годам об этом догадался. Ему надо было жить на два фронта: любить одну женщину и спать с другой, служить в одном месте и подрабатывать в другом, исповедовать одну веру и тяготеть к безверию. Такая двойственность присуща не всем, но только для него она была воздухом, средой, самым плодотворным состоянием души. И женщина, готовая терпеть эту раздвоенность и даже наслаждаться ею, в конце концов нашлась — даже, пожалуй, раньше, чем он надеялся.</p><p class="p1">Когда ему было около тридцати, в его жизни появилась Муретта, существо небывалого склада. Во всяком случае, в прежних своих скитаниях он не встречал ничего подобного. Это было новое поколение, народившееся через полтора десятилетия после революции. Революцию она застала ребенком, но именно в этом впечатлительном возрасте успела понять, насколько все зыбко, как легко рушится мир и как это, в общем, весело. Тринадцати лет она дружила с беспризорниками и многому у них научилась. Муретта мастерски свистела в два пальца, жонглировала яблоками, могла пройтись на руках. Это были еще самые невинные из ее способностей. Она могла бы и карманы обчистить у трамвайного попутчика — Боря не раз удерживал ее от демонстрации этих навыков. Она была изобретательна и ненасытна в любви — Боря в первое время уставал от этой акробатики, — но умела быть и тихой, и смиренной, и все это без малейшего напряжения, — и переодевалась с той же цирковой легкостью. Ей все шло. Ловкость и сила были совсем не лишними в ее профессии — а Муретта была не больше не меньше — хирург-стоматолог. Он потом процитировал ей из входящей в моду книжки: его любила даже одна женщина, зубной техник, — и она намекнула, что была знакома с одним из соавторов. «Да? — переспросил Боря. — А с этим автором ты не была знакома? „Я имел для души модистку с телом белее известки и мела, а для тела дантистку с удивительно нежной душой“. Двадцать лет пролетело, теперь я большой». Прелесть, сказала она, неужели это ты?</p><p class="p1">Она была в самом деле хорошим врачом, с личной клиентурой, в том числе чиновной. Но все это в первый год головокружительного романа занимало его очень мало, он не мог налюбоваться ее ладностью, гладкостью, смуглостью, ее откровенностью и остроумием, фривольным, даже грязноватым, но в этом и была — ненавистное ему слово — пикантность, а иначе как назовешь? Эта ее кожаная шоферская кепка!.. Машины нет, так хоть кепка. И Боря думал, что вот она, женщина тридцатых годов, новый тип, и советская власть, пожалуй, имеет теперь именно такое лицо. Трудности еще были, и где-то даже голодали, но в целом построилось вот такое: вполне европейское, хотя скорее американское, — прелестное, свежее, очень деятельное, с бодрыми ямочками, с неофитским, хотя и несколько снисходительным, любопытством к мировой культуре, с некоторым даже интересом к античности и воплощением античных же гармоний.</p><p class="p1">В мужском варианте воплощением таких потенций был Дорлиак, разоблаченный, прощенный и безвременно ушедший. Он был антично красив, дориански дендичен, и вместе с тем человек глубоко новый, без аристократического вырождения. И вот Муретта: бешеная смесь кровей, с татарщиной, с польской примесью от отца, умершего в девятнадцатом и осиротившего семью, — с великолепным наследственным вкусом, с этой очаровательной способностью соорудить наряд хоть из полушалка, с шармом деловитости и невесть откуда взявшейся избалованности. Она немного напоминала Халаджеву, но была выше, шире в кости, без капризности, которая все портила. Словом, это было совершенно то, что нужно, и для полноты счастья не хватало только одного: чувства, что, когда он пресытится и начнет с неизбежностью искать нового, потому что по-другому не было еще никогда, а до старости по-прежнему далеко, — она с обычной своей легкостью скажет: прелестно. И найдет себе утешителя, который не помешает весело делиться с Борисом своими похождениями и по-прежнему вместе летом странствовать по Кавказу. О, Кавказ!.. Нет, Кавказ был дик. Вот на Грузию, пожалуй, Муретта походила больше всего: щедрая, веселая, благодатная, без напряжения извлекавшая, как фокусник из рукава, новые и новые чудеса и угощения, — и с такой же легкостью переключавшаяся на любого другого туриста. Когда Боря уезжал, его провожали чуть ли не со слезами, а на следующий день, уверял он себя, уже припоминали с трудом; и это отлично — не надо слишком сильных чувств, не надо ни вызывать их, ни испытывать, это и неприлично, в конце концов.</p><p class="p1">Появились прекрасные люди с короткой памятью. И то сказать, если бы мы всё помнили — и гимназию, и отряды самообороны, и голод, и немцев, и фантастический Петроград восемнадцатого, и невыносимый Петроград двадцать второго, и все, что называлось потом угаром, — как бы мы жили? Искусство легко забывать было главной добродетелью новых любовников. Только женщины не научились легко отпускать, но наконец нашлась и такая.</p><p class="p1">Боря никогда не заговаривал о браке, и предложение сделал в удивительной форме — Муретта потом всем пересказывала.</p><p class="p1">— Муретта, — сказал он (французское прозвище придумал кто-то из прежних поклонников, ныне переведенных в друзья, и оно прижилось), — Муретта, что ты сказала бы, если бы узнала, что я полюбил другую?</p><p class="p1">— Молодец, сказала бы я, правильно сделал, я всегда была для тебя слишком хороша, и ты с твоим носом очень явно проигрывал на моем фоне.</p><p class="p1">Она произнесла это мгновенно, не задумавшись, — потому, вероятно, что репетировала прежде. А может, экспромт, какая разница.</p><p class="p1">— Муретта, — сказал Боря тогда. — Я хочу прожить с тобой то немногое, что мне осталось (шутки на тему своей старости он практиковал регулярно). Но в этом браке — ненавижу это слово, и недаром у поляков это слово отрицательное, — в этом браке я не хотел бы чувствовать себя на привязи.</p><p class="p1">Муретта расхохоталась, и это его слегка уязвило.</p><p class="p1">— Ох, не могу, — выговорила она со слезами на глазах. — Ты делаешь мне — мне! — предложение, оговаривая измены? Ты претендуешь на блюдо от шефа и выгрызаешь себе право иногда погрызть тухлятину с помойки? При этом, заметь, я не давала тебе никаких надежд!</p><p class="p1">— Ну уж и никаких, — сказал он сконфуженно. — У меня есть некоторые основания… как мне казалось…</p><p class="p1">— Да мало ли что тебе казалось! Еще ни один мужчина не смел обратиться ко мне с таким хамством! А между тем кандидатов достаточно, не думаешь же ты, Боря, что свет сошелся на тебе клином?</p><p class="p1">Нет, ответил Боря, этого я честно не думаю. О, горе мое, сказала она. Я никогда не дала бы тебе согласия, если бы ты явился с розами и долго мялся. Я не выношу выражения «просить руки», ведь ты просишь совсем не руки. Да, не удержался Борис, рука есть. Что же, сказала Муретта, в добрый час. Отказать было бы недальновидно, к тому же своя комната!</p><p class="p1">И он долго еще сомневался, не сыграла ли тут роли квартира в доме Жургаза, как раз обещанном к тридцать третьему. Но Муретта не была корыстна, или прятала это так умело, что за такую умелость можно было простить и корысть.</p><p class="p1">И они стали жить вместе, причем брак почти ничего не изменил. Мещанского уюта не было, был конструктивизм, максимум свободного пространства. Никаких цветочков, накидочек. Умела она и готовить, но по большим праздникам. В остальное время он что-то перехватывал на работе. Обновы шила сама, и преотлично… И года через полтора, как Боря и предсказывал, появилась в его жизни бывшая поселянка, а ныне домработница у Черемухина, девушка Татьяна, светловолосая, привязчивая, смиренная; потом была Полина, истеричка, хотя, между прочим, инженер; была актриса Самсонова, женщина высокого полета, чьим запросам он слишком явно не соответствовал, а соответствовал, как выяснилось, Гердман, к тому времени нищий ссыльный, человек без будущего, остряк и, в сущности, пустышка. Так думал уязвленный Боря, скача в пыли на почтовых.</p><p class="p1">Кстати, случившаяся вовремя поездка в орошаемый Туркменистан внушила ему мысль, что в среднеазиатских обычаях, может быть, нет ничего дурного: из множества жен как бы собирается одна, единственная и недосягаемая. Редко сходятся все добродетели в одном человеке, и в Муретте кое-чего не хватало — уязвимости, например. Она слишком была победительна, слишком тверда, ко всему приспособлена, и не было у него шанса ни на легкое высокомерие, ни на жалость, обычную мужскую жалость, которая в спектре эротических наших эмоций играет, между прочим, не последнюю роль.</p><p class="p1">Иногда Борю охватывал страх — а что в старости? Ведь Муретта и в сорок пять будет вечная циркачка в рискованном трико, она не насытится ничем, ей всего будет мало, а он к пятидесяти станет все больше мечтать о покое, об уединенности, об уюте, если угодно. Боря многое о себе знал и многое себе прощал за это. И тогда — как будут они уживаться? Тогда ему нужна будет простая девушка, сельская, лишенная Муреттиного блеска и лоска, но готовая пожалеть, в конце концов, обслужить… Муретта же была слишком непобедима, и каким бы котенком она ни ласкалась к нему иной раз, он не склонен был доверять этой минутной, виртуозно разыгрываемой слабости. Этой гаремной теорией он поделился однажды с Боровиковым, и услышал от него в ответ именно то, что и хотел услышать: а как бы вы хотели в двадцатом веке? Мы люди модерна. Мы двойственные люди, люди-палимпсесты, в нас одно написано поверх другого. И так не только в СССР, а везде. Человек безмерно усложнен — не хотите же вы, чтобы его сексуальный интерес был по-прежнему сосредоточен на одной самке? О да, подумал Боря, значит, все уже озабочены придумыванием себе универсального оправдания. Но про палимпсесты ему понравилось.</p><p class="p1">И все это время Муреттино — первенство? главенство? старшинство? пристойного слова не было — не подвергалось сомнению. Боря, впрочем, не обольщался, как не делился и впечатлениями о заместительницах, и она, отлично его понимая, обходилась без намеков на свои победы. Кое о чем он догадывался, к точному знанию не стремился.</p><p class="p1">Первые годы с Муреттой были очень хороши. Но жизнь менялась, и с ней менялась Муретта. Эти перемены были едва заметны и объяснялись, конечно, возрастом, — ибо и самая железная женщина не переделает собственной биологии. Она, во-первых, несколько отяжелела. Природа ничего не творит зря, природа готовила ее к материнству. Она раздалась, и не то чтобы обабилась, но гибкость и подвижность юности сменились, так оказать, большей основательностью. У нее стала, например, широкая спина. Он заметил это однажды и не сказать чтобы разочаровался, напротив, такая Муретта стала даже более желанной, — но чувствовалось уже, что это не девочка на шаре, а бездна, которая может и засосать. И когда однажды она намекнула, что может быть, со временем, все-таки Боря-маленький оказался бы не такой уж помехой, — он насторожился, а потом подумал: и впрямь. Надо же что-то после себя оставить, кроме вороха желтых вырезок. А поскольку с обычной журналистской мечтой о романе он простился давно, отчего бы не переключиться на деторождение? (С романом была особая история: все-таки, чтобы его писать, надо на чем-то стоять. А для него самоцелью стала именно подвижность в стремительно несущихся водах, легкость смены шкуры, и в тридцать пятом было уже немыслимо то, о чем мечталось в тридцать третьем. Он уже и не помнил себя тогдашнего.)</p><p class="p1">Но это раз. А два — Муретта стала ревнива, и это делало ее и грозней, и уязвимей. И в этом тоже было странное, все усиливающееся сходство со страной. Юная, бодрая, деловая, по-детски жестокая в тридцать втором, уверенная и все еще легкая в тридцать третьем, к тридцать шестому Муретта тяжело ревновала, иногда беспричинно, а иногда исходя из априорного знания о том, что должен же быть кто-нибудь. Так и страна уже всюду видела измену, хотя откуда бы? Нет, стране, как женщине, попросту казалось, что ей должны изменять, — и потому, что она уже не так молода, и потому, что по-прежнему нет обещанного счастья, и потому, наконец, что это просто в людской природе. И, всюду прозревая измену, страна чередовала кнут и пряник, то закидывала благодеяниями, то мучила подозрениями, то ласкалась, то плакала, то скандалила, придравшись к какому-нибудь формализму. Муретта, пожалуй, вела себя еще прилично. Однако и в ее ласках Боря заметил фальшь — она, которой все и всегда угождали, теперь старалась понравиться, и как-то он поймал откровенно заискивающий взгляд; шоферская кепка исчезла, появились длинные платья, однажды она с завистью рассказала о соседском ребенке, с которым играла во дворе, — и Боря готов был согласиться на эту новую стадию их союза. Но тут явилась Аля, и очень быстро все сделалось серьезно.</p><p class="p1">Он сидел в большой, шумной, прокуренной редакции журнала «СССР на стройке», обитавшего тогда при Жургазе, и правил что-то о Татарстане, что-то неуклюжее, но еще честное, с остатками энтузиазма. Из коридора донеслось «Пожалте-пожалте», и Максимов пропустил впереди себя девушку, показавшуюся ему шестнадцатилетней. Как и все, Боря сначала заметил огромные светло-голубые глаза, две голубые фары, как называла она их, насмешничая над собой. И она сразу остановила взгляд на нем, зацепилась за него, как за спасательный круг. Она вошла в комнату быстро и радостно, но видно было, что — растеряна; неясно было, как встретят существо из иного мира, с другим опытом, а тут он, совершенно такой, какого ей было нужно. Так она говорила потом. И еще говорила, что загадала. Удивительна была ее детская манера гадать, загадывать, доверие к приметам, самые старые московские суеверия, сохраненные в европейских странствиях и с новой силой расцветшие тут. Все эти «месяц слева», четные и нечетные ступеньки на лестницах, сложная система ее внутренних сказок, половину которых, он был уверен, она сочиняла для него. Но тогда и вправду загадала: если войду и встречу человеческое лицо, настоящее, нужное мне лицо, — то это как раз и будет он. Иногда Борю точила мысль: вдруг сидел бы не он, и она наткнулась бы на другое лицо, и все было бы с другим? Послушай, мог же я выйти в уборную? О, захохотала она, я тотчас сама захотела бы в уборную, пошла бы в конец коридора, встретила тебя, выходящего, — и тут же расхотела или… или напротив… Но он сидел на месте, правил ненужный Татарстан, и ровно на словах «блестящие глазки грязного, но веселого мальчугана в тюбетейке» вошла Аля, скользнула взглядом по головам, поднявшимся ей навстречу, и уперлась своими фарами в его очки. И такая радостная, такая сияющая улыбка приветствовала его — слава богу, все оказалось правдой, я все нашла! — что предать этого мига он никогда бы не смог. Он помнил о нем всегда.</p><p class="p1">Этот день был довольно суматошный. Ее посвятили в круг новых обязанностей, необременительных и не слишком важных, но она настаивала на том, чтобы ее задействовали — ужасное слово! — как можно плотней, чудовищный оборот. Я очень истосковалась, товарищи, по работе. Иностранцы были частыми гостями в «Стройке», но всё это были настоящие иностранцы, а не вернувшиеся свои, которых тотчас окрестили возвращенцами. И как-то сразу Боря повел ее в буфет, и оказалось, что она голодна — или притворялась? — и следующие два часа они проработали, постоянно переглядываясь (ей тут же дали переводить чудовищный очерк о верблюдах, над которым она то и дело прыскала, — а потом Максимов сказал: хватит, товарищ, ваша работа сегодня в том, чтобы как можно больше видеть и слышать). Тогда началась карусель — две недели бесконечных гуляний но городу, и на Борины частые отлучки смотрели сквозь пальцы, и он уже спрашивал себя: а не назначен ли он в кураторы? (Теперь уже не сомневался, что так.)</p><p class="p1">В первый же вечер она называла имена, которые он привык считать загробными, исчезнувшими: Бердяев меня учил, Бунин мне сказал… Все они где-то были и, оказывается, хотели сюда — как, собственно, и положено теням. Почему же она, такая живая, прилетела к нам из этого теневого мира, словно девочка из его отрочества умерла от скарлатины, чего не было, и вернулась непонятно откуда? Они увиделись именно как потерянные брат с сестрой, и оттого, что они давным-давно были разлучены, не было этого братско-сестринского общего детства, только мешающего. В детстве, Боря помнил, на соседней улице жили брат с сестрой, оба красавцы, по которым вздыхал, кажется, весь город, — близнецы с неуловимым сходством, но очень разные; и он недоумевал — как сами-то они могут жить под одной крышей и ничего такого друг к другу не испытывать? Мешало безгрешное, общее, вонючее детство: соседство на горшках А Аля, хоть и была словно потерявшейся младшей сестрой, но с ней ничего ему не мешало, и когда он при первом прощании ограничился поцелуем в щеку, она посмотрела на него с изумлением, почти с обидой, — и тогда уж он дал себе волю, и прощались они на Даниловской набережной полчаса; и он знал — и она знала, — что в комнату, выделенную ей в большой коммунальной квартире, он может подняться, и Аля не возразит, но в первый день отчего-то было нельзя. Зато уже на второй их вечер, после трехчасового шатания по Парку культуры, где Боря с хозяйской радостью показывал ей все, само собой стало ясно, что он заночует; глупо преступно, оскорбительно было бы не заночевать.</p><p class="p1">И тут шок: как?! Парижская штучка, окруженная там, насколько он знал, всеобщей любовью и поклонением, душа молодежного кружка, где все мечтали о России, корреспондентка двух газет, которую французы то и дело звали замуж, — наконец, ослепительная красавица двадцати двух лет, подрабатывавшая даже и киносъемками, — и вдруг берегла себя именно для него? Это не вмещалось в ум и требовало разъяснений. Неужели действительно лежала в хрустальном гробу или прожила пятнадцать лет в пространстве теней, где телесные контакты не приняты? Кому сказать — не поверят, но сказать было некому. Неизбежные в таких случаях неловкости она преодолела с умом и тактом, терпением и жертвенностью, каких он отроду не видел, и все получилось гармонично и празднично, — но как, как было это себе объяснить? Ну понятно они, Борино поколение, их двадцатые годы, когда главной задачей было познание мира и частным случаем этого познания ранний секс без любви; чувства были сильные, довольно звериные, но ничего и близко похожего на то братство, которое возникало иногда после двадцати, на то чувство общей уязвимости, телесности, бренности, которое приходило на секунду и сменялось потом новым отстранением, иногда почти брезгливым. Здесь же с самого начала было то, чего он не испытывал никогда и всегда тосковал по этому небывалому слиянию. Парижская школа любви заключалась отнюдь не в искусности (искусности он навидался), дело было в полном врожденном понимании, абсолютном проникновении, угадывании желаний за секунду до того, как они осознаются. Это было словно под музыку. Самым сильным и неожиданным чувством было постоянное удивление перед ее чистотой; и прелестней, и мучительней всего была именно эта чистота, которой она достигала большего, чем другие опытностью. Опытность не равна чуткости, в ней слишком видны повторяемые приемы, и то, что нравится одному, не обязательно подойдет другому. Аля обладала иным опытом, которого он не понимал, — опытом души, мгновенно узнающей все по первым приметам. И потому она, не знавшая мужчины в свои почти двадцать три года, не допускала ни единой неловкости, ни малейшей грубости, словно с самого начала все знала о нем — и все-таки с каждой ночью узнавала больше.</p><p class="p1">И постепенно он стал смотреть на себя любящими глазами. Он научился многое себе прощать. Перед Муреттой он тянулся, притворялся, старался соответствовать чуждому, в сущности, образу — этакий легкий, подвижный, бессердечный. А с Алей он был тот же, что с матерью, и этого, как оказалось, ему так не хватало. И Аля никогда не обсуждала с ним Муретту, никакого брака будто и не было — она просто приняла его в свою комнату, в свою жизнь сразу и целиком, и, если ему иногда случалось ночевать дома, — мало ли, срочная работа или необходимость хоть как-то поддержать видимость семьи — не было ни скандалов, ни расспросов. «Я завтра…» — «Конечно». И ни на секунду не мог он ее заподозрить в желании отомстить, да хоть бы, чем черт не шутит, просто расширить горизонты — нельзя же заменить собой весь свет. Он бы страшно обиделся, но понял. Однако эта мысль была совсем уж абстрактной, из разряда циничнейших предположений на все случаи жизни.</p><p class="p1">И он так быстро привык к этому счастью, что перестал отделять ее от себя. И на работе все знали, никто ничего не скрывал; одно, пожалуй, несколько коробило — что при встречах она представляла его мужем; и тут же объявившиеся у нее — откуда только брались? — бесчисленные приятели среди коллег, фотографов и молодых людей, нигде не работавших и притом богатых, смотрели на него иногда странно, словно знали, что никакой он не муж.</p><p class="p1">Вот, кстати, интересно, откуда они набегали?! Он вовсе не претендовал на полный контроль над ее душой и телом, не следил за ней, отчета не спрашивал, да ей и нечего было скрывать. Одного она зацепила сумочкой в трамвае, разговорились; другой с ней перекинулся парой слов, когда вместе рылись у букиниста на Кузнецком (нарыла, кстати, книгу матери, хотела послать туда — но решила, что лучше книга дождется здесь). Третий подкатился в театре, куда Боря не пошел, потому что уже видел эту подделку МХАТа под самого себя.</p><p class="p1">Люди к ней липли, оно и понятно, — она являла собой чистейший случай сияния, сияющих людей не было давно, все улыбались через силу, а она еще и восхищалась тем, от чего давно воротило местного жителя. Вы не понимаете, порывалась объяснить она, там обо всем этом мечтать невозможно, там нищета ходит за стеной, дно близко и притягивает, там я была страшно уязвима (и никто не пытался ей объяснить, что там она уязвима, а здесь — обречена; но ведь и сам он так не формулировал в то время).</p><p class="p1">Все эти знакомцы ее были люди милые, но странные. Откуда, например, у них брались деньги? Кто-то жил в долг, но почему им давали в долг без отдачи? Другие где-то числились, но о работе не говорили, отмахивались. Третьи кормились на сомнительных синекурах, на призрачных должностях, где-то что-то переводили или учили музыке. Боря этого совсем не понимал. Для него профессия была основой жизни, единственной характеристикой, которой можно еще доверять; человек — это то, чем он занят. Года с тридцать пятого он стал замечать, что профессионалы либо разъехались поднимать провинцию, либо попросту исчезли, словно опустились на дно. Всплыли же как раз эти умельцы жить. Похоже, Аля принимала их за советскую богему — была же богема парижская, значит, обязана быть и московская! Ей и в голову не приходило, что они, должно быть, тихонько спекулируют, а может, и подворовывают — откуда-то их знали в лицо и пропускали без звука швейцары тех московских ресторанов, куда Боря, например, строгий и неутомимый работник, носу не казал, потому что не было у него таких средств. «Мы легкие гибнущие цветы», — сказал один из них. В этом было очарование, несколько, впрочем, двусмысленное. Боря не раз хотел с ней серьезно поговорить, но всякий раз смущался.</p><p class="p1">Зато Парк культуры стал для них обоих вторым домом — «Летний сад мой огород». Боря и не думал, что получилось такое отличное место. Ключевое слово там было «свежесть». Там, где купальни, и бумагопрядильни, и широчайшие зеленые сады… Откуда он знал эти стихи? Голова битком набита была цитатами, происхождение их стерлось. Стихи были алогичные, но совершенно точные: вода на булавках, и воздух нежнее лягушиной кожи воздушных шаров. Почему вода на булавках? Потому что так падает дождь в реку, вся река в иголочках. Наверное, имелось в виду другое, но он понимал так. Откуда здесь бумагопрядильня? ближайшая была на Яузе, но как-то все ложилось, лепилось одно к другому, и когда он вспоминал это их первое лето — ему только и помнилось: на Москве-реке есть светоговорильня с гребешками отдыха, культуры и воды… Кто-то прочел, или показал, или действительно в воздухе носилось. Сама же Аля была в то первое лето так ленива, так расслаблена, так волшебна. Рассказывала мало, все время слушала. Он за месяц успел ей рассказать больше, чем Муретте за все годы, да Муретта и не хотела его слушать, слишком была полна собой. И эти короткие, почти белые ночи в Алиной комнате, эти рассветы в три часа утра… Эти лиловые облака на светлом небе, пасмурные утра, постепенно ясневшие, этот сборный запах всего короткого северного цветения, торопившегося уместиться в два месяца… Так все сошлось, что счастливее он никогда не был, и никогда не чувствовал в себе таких сил. И притом не было вечной тревоги — вот, жизнь проходит, что я делаю? Он делал то, что нужно: он был счастлив, а остальное ничего не значит. И оттого, что они так мало спали по ночам, днем их обоих, всегда одновременно, начинала одолевать блаженная сонливость. И все понимали, что между ними, и одобряли тайно. Так казалось ему. Потом он начал припоминать и смешки, и косые взгляды, — но тогда ничего не видел.</p><p class="p1">А между тем были вещи, которые его настораживали. Тревожные сигналы, осторожные звоночки — все это началось уже к осени, и хотя поначалу он гнал эти мысли, но они уже были, куда деться.</p><p class="p1">В ее чистоте было что-то идиотическое, по-другому не назвать. Этот вечер у Еремеева!.. Еремеев собирал нормальных людей, в которых был уверен, и тут Алю понесло — Боря не знал, куда глаза девать! Говорили у Еремеева на том языке, который давно был принят в Жургазе, — никакого, естественно, криминала, но дураки отсеивались. Они понимали тон. А она не почувствовала ничего и принялась страстно, яростно убеждать всех, насколько отстала Европа, как она обречена! Да, сказал Еремеев, еще надеясь увести разговор от опасных границ; да, Шпенглер и все это… При чем тут Шпенглер, почти закричала она, Шпенглер — фашист, ни один интеллектуал сегодня не подаст ему руки! Зачем он громоздит культуру, цивилизацию — и все для простейшего оправдания дикости! Представьте двух слепых, которые спорят об истине, двух слепых собак, которые дерутся за кость, — но истина давно здесь, у вас, у нас! И стала рассказывать им о том, как все они тут счастливы. Еремеев поддержал разговор, горячо соглашался, потом отвел Борю за локоть в кухню и сказал: все-таки, товарищ Фретийон, — под этим прозвищем Боря был известен благодаря прекрасному французскому и соответствующей репутации, — вы все-таки, товарищ Фретийон, смотрите, кого водите в гости, если уж не смотрите, с кем… вы ме компрене. Это было оскорбительно, стыдно, но не бить же. Боря покраснел впервые за долгие годы.</p><p class="p1">Он предполагал ночью устроить Але феерический разнос, но жажда оказалась сильней, а после запал растратился. И только на рассвете он сказал ей с неожиданной для себя серьезностью: а знаешь… может быть, действительно… Нет причины нам искать большого ранга, — и она со всегдашней готовностью подхватила: и по мне, шматина глины… Посмотреть на то, что было ДО, — сказал он, — и начинаешь оправдывать многое. Все-таки в самом деле… поверх голой почвы, сплошных инстинктов, среди заимствований, совершенно на этой почве не прижившихся… не знали рыцарственности, не ведали чести, роль православия, конечно, преувеличена, и чаще оно затемняло, чем просветляло… так что, ты знаешь, очень может быть, что потомки еще позавидуют… Но ведь об этом я и говорила, проворковала она, уже засыпая, уже устраиваясь, уже укладывая голову на его плечо, щекоча волосами, — почему же все они так… я видела, что они страшно разозлились, что они прямо издевались… хотя боялись тебя. А меня бы, конечно, размазали. Ну, видишь ли, сказал он уже скорее себе, чем ей, спящей, — они разозлились не на твои слова, а просто их, может быть, задело, что это все говорит человек из Парижа. По нам-то все проехалось очень серьезно, мы знали чувство своей ненужности, потом быт… потом — ты многого не видела, и когда, знаешь, человек со стороны начинает нам рассказывать, как все прекрасно… хотя кому же и рассказывать? Кому это видно, если не со стороны?..</p><p class="p1">Потом, как всегда бывало, уходя утром, он курил нервно, в животе бурчало, мир был сер, моросило, и он думал со стыдом: все-таки она ничего не понимает. Рядом с ней все выглядело иначе, теперь гипноз кончился: пусть даже она права, но бестактность! Но непонимание, где и что говорить! И себя, и меня погубит. Ведь недоверие внушает вовсе не тот, кто смотрит скептически, поругивает сквозь зубы, — таким никогда ничего не бывает. Еремеев неуязвим, и чем выше в иерархии кстати, тем более там принято это либеральное поругиванье. Им можно, и Еремееву можно, у него отдел. А пылкие, пусть самые искренние похвалы — уже подозрительно: что этот хвалитель прячет, что скрывает? Наверняка ему есть что замаливать. Сказал же один из самых умных людей, встречавшихся Боре: есть особая логика в том, что этот гордый ум теперь сражен, и чем? — женской болезнью, рассеянным склерозом; может быть, советская логика потому и была всесильна, что повторяла мировую, — здесь тоже самое возвышенное подвергалось самому унизительному, дабы никто не заносился. Так вот, сказал же и Боря как-то, занеся статью к пушкинскому юбилею: да, я люблю колхозы, я горжусь колхозами, они лучше мякинной навозной русской деревни. Но я не могу сказать это вслух, потому что меня не так поймут.</p><p class="p1">Удивительное дело, самый жаркий сторонник подозрителен, потому что, наверное, есть зачем лукавить, — а скептика не тронет никто, он ЧЕСТНЫЙ. В их логике надо быть честным. В уме, таланте, даже и доброте всегда подозревается притворство, а плохой — значит подлинный, плохие в безопасности. Но спасут ли плохие, когда придется? Когда по-настоящему припрет, не может не припереть, не ограничится ведь все это Францией… Аля первая под ударом, именно потому, что таких не бывает, не должно бывать. Но как она все-таки вовремя сюда! Там докопались бы до еврейской четвертушки, и поминай как звали. Надо бежать от нее, пока не поздно. Так он думал, особенно когда попадал в собственное жилище, в жургазовский дом, в квартиру, пропитанную запахами и грезами Муретты, и вид спящей жены не раздражал, но успокаивал. Нет, конечно, об уходе из семьи и речи быть не может. Но он знал, что это до вечера. Вечером все опять бросится в глаза: «горшки и бритвы, щетки, папильотки»… И страшно потянет к Але, но может, в этом и есть его назначение — существовать на разрыве? И уют его прежней жизни казался невыносим, но из этого существования на разрыве он ничего не мог извлечь. Тогда, в затхлом уюте, сочинялось изумительно легко. Теперь же он был неправ кругом, и нервы страшно истончились, но чего ради? Ничего, кроме трепета; а трепет — это настройка оркестра, бессмысленная какофония. Для музыки нужна правота. Пожалуй, он даже нравился себе — похудевший, грешный, с тенями под глазами: ты такой романтичненький, сказала Муретта, прямо влюбилась бы. Но эта раздвоенность была бесплодна, вот беда-то.</p><p class="p1">Аля говорила: там нельзя по улице пройти, все пристают. И даже когда она пожаловалась однажды ажану — за мной идет маньяк! — тот сказал: мадемуазель, хорошо понимаю этого маньяка. Ты не представляешь, говорила она, здесь совсем иное здесь я могу пройти по бульвару в короткой юбке, и никто не смажет меня грязным взглядом. Проще всего было промолчать, и Боря промолчал. А между тем надо, конечно, было ответить: моя милая, здесь на тебя не смотрят только потому, что им не до тебя, они придавлены. Там к услугам любого апаша белая булка и бутылка дешевого красного, и поневоле они от безделья возбуждаются на любую красотку, проходящую мимо. А здесь кому какое дело до тебя? Сам я, сказал бы он, в двадцатые годы, которые все чаще называют теперь проклятыми, доходил до такого голода, такой усталости, что мне в двадцать три года было совершенно не до любви…</p><p class="p1">Но он молчал, а Аля заливалась: ты знаешь… нет, ты не знаешь. Ты просто не можешь понять. Для вас Родина — норма, но тот, кто был долго ее лишен… Это хуже, чем человек без тени. Я всегда знала, что я там никто, и никакие мои успехи, никакие публикации не могли меня сделать своей. Ты не замечаешь своего счастья, как воздуха, которым дышишь, а вот астматик знает, что такое воздух. Мы все там были астматики. Когда я въезжала в страну, когда я увидела первых людей на границе, услышала русскую речь в Негорелом… И таможня — какое светлое здание! И мне принесли свежее белье в поезд… И первый раз на Красной площади… Я же помнила ее, по детству, но она была совсем не такая. И Арбат: мне вообще показалось, что это другая улица! Ведь она вся была исхожена, я знала каждый дом, но преобразилось все… Она захлебывалась от счастья, когда они пошли на «Турандот»: ты знаешь, ведь я видела Вахтангова! Он один раз у нас был. Уже больной, весь желтый. Ты знаешь, что он не мог быть на премьере? Он умер, когда мы уехали. И в антракте к нему прибежал Станиславский: победа, победа! А он умер через три дня… И как ее восхищали разговоры в театре: ты слышишь, хватала она его за руку, слышишь? Ведь они говорят о спектакле как критики, а кто они? — наверное, ткачихи! Когда я там рисовала, писала — я не знала, зачем все это. Я думала, вообще теперь все в упадке и никому никогда не будет нужно. А здесь — разве ты не видишь?! И он нехотя соглашался, да и что тут было возразить? Да, искусство, да, ткачихи; правда, не ткачихи поднимаются до искусства, а искусство падает до ткачих, но это, наверное, говорит во мне снобизм, и не мне судить…</p><p class="p1">Или эта история с шофером Леней. Леня и Леня, никто и внимания на него не обращал, хотя он был хороший парень, из тех деловитых, тихих и веселых, от чьего присутствия всем становится легче; и редакционная эмочка всегда была у него в порядке, поскольку начинал он на ЗИСе и знал до гайки, как машина устроена и почему ездит; и сам он был бодр и безотказен. Бывают такие люди, ровные и чистые. Никто и представить не мог, что у Лени проблемы, — но Аля как-то разговорилась с ним: ее отправили на вокзал встречать дружественного журналиста, француза, призванного проехать по следам Андре Жида и написать, где он наврал.</p><p class="p1">Долго ли было ехать от Страстного до Тверской заставы? И однако за это время Аля успела вызнать, что Леня с женой и новорожденной дочкой живет в бараке, что им обещали комнату, но в последний момент туда вселился какой-то — Леня толком и не знал, кто; а дочка у него все время хворала, кричала, соседи возмущались. И Аля ничего ему не обещала, но, размахивая удостоверением, пошла выяснять — и добилась-таки справедливости: оказалось, что комнату на Чистых прудах перехватил ловчила из бывшего Торгсина, ныне гастронома номер два. Она добилась и того, что ловчила был уволен, ибо воспользовался положением, а Леня триумфально въехал в положенное ему жилье и с тех пор подкладывал Але на стол то кулек конфет, то цветы. И не было никакой возможности объяснить ей, что это вторжение в Ленину судьбу — благотворительность ненужная, даже опасная: добьешься справедливости в одном частном случае, а головы полетят на нескольких этажах сразу. Аля никак не могла понять простой вещи: в одном случае из десяти — да, удавалось исправить ошибку, защитить бесправного, наказать взяточника; но взяточника уничтожали, ловчилу размазывали, а еще десятерых невиновных, просто стоявших рядом, исключали отовсюду за попустительство. Важно было не благодеяние, а предлог.</p><p class="p1">Много говорили о деле инженера Осмоловского, которого вытащил Россельс, — но вместо Осмоловского и четырех его подельников, ни в чем не повинных спецов, впоследствии оправданных и поднятых на знамя, загремели председатель суда (с женой), следователь (с женой), двадцать человек свидетелей, вообще ничего не понявших, и редактор районной газеты, тоже не вмешавшийся. Тут если и налаживали чью-то одну судьбу, ломали за это десятка два других; если разжимали челюсти, выпуская одного, — взамен заглатывали сотню. Аля этого не хотела видеть, она утверждала, что так и быть должно, — у всякой ошибки несколько виновников, и все они должны как минимум извиниться! До нее все не доходило, — а Борис начал уже для себя формулировать, пытаясь объяснить и ей, — что у этого чертова колеса, в котором все они теперь крутились, была не причина, а цель, и цель состояла в том, чтобы все крутились в колесе. Предлог же был неважен, как неважен он на Страшном суде, потому что все виноваты. Может быть, все это было правильно. Может, попросту не было другого способа добиться, чтобы хоть кто-нибудь работал. Может, действительно проходили сложный этап во враждебном окружении, а враждебное окружение — такая вещь, что надо изо всех сил давить изнутри, дабы поддерживать давление на границы и сохранять форму, так объяснял один физик, впоследствии сам ставший элементом этого давления, но выпущенный по письму коллег (после чего его место колодника заняли десятеро). Но устанавливать тут справедливость не требовалось — и, однако, все его попытки объяснить эту нехитрую правду оказывались тщетны. Аля вся светилась, рассказывая о вселении Лени на Чистые пруды. Она не могла быть неправа, она, такая хорошая, — но чем она была лучше, тем острей и больней чувствовал Борис ее уязвимость; почему-то ясно было, что она первая стоит под ударом, она, со всей своей туристической, французской советскостью. И сама Аля что-то такое чувствовала, она все чувствовала.</p><p class="p1">Вот однажды… это был уже сентябрь… Он многого не заметил, а ведь буря уже разгулялась по-настоящему, уже косило людей рядом с ним, а он все считал, что ничего нового. По обычному своему эгоизму — черте всеобщей, но в его случае осознанной, — он замечал только то, что угрожало ему, а себя считал неуязвимым — отчасти потому, что работал в правительственном издании, отчасти же благодаря Горелову. И тем не менее воздух, воздух, к которому он всегда был чуток: после горячего лета наступил очень ветреный, сухой, с резкими красками сентябрь. В московских парках как раз тогда появились настурции и бархатцы, и тревожным их запахом, тревожным оранжевым цветом все было помечено. Была долгая ночь, во время которой засыпали урывками, потом одновременно просыпались, прижимались, все время зябли, — и вдруг она закричала во сне протяжным птичьим криком, голосом, какого он никогда у нее не слышал. Он разбудил ее, стал целовать, успокаивать — желания почему-то не было, даже мысль не мелькнула в ту ночь забыться самым простым способом, — и она, все еще бурно дыша, не вполне придя в себя, рассказала, что опять был сон, ужасный, виденный накануне отъезда. Она шла по кладбищу — никогда не боялась кладбищ — сухой осенней ночью, такой, знаешь, когда еще тепло, но в подкладке, в изнанке уже холод, и все было колючее — колючие венки, сухие цветы. Она шла не одна, с ней был спутник, чей уверенный голос она слышала, но не оборачивалась: ей только казалось по голосу, что он смуглый и у него высокие скулы. Вдруг перед ними возник спуск под землю — вроде парижского метро, ты видел? (Он не видел, но представлял.) И мы спустились, и там оказался коридор — длинный, ровный, как в больнице или… (Он про себя договорил за нее: в тюрьме.) И комнаты по бокам, и в комнатах за решетками — люди, в основном старики, старухи… их я много видела в Париже, сидели на солнышке, такие никому не нужные, но и себе уже не нужные, — там ведь очень долго живут, и доживают до того, что вообще себя забывают и ничего не хотят. Вот они сидят по сторонам, и каждый делает какую-то странную, ненужную работу: расплетают старые венки, сортируют цветы, искусственные, складывают в кучки опавшие бумажные лепестки, потом сматывают ленты, иногда раскладывают сухие букеты… И такие все сосредоточенные, такие медлительные — действия, знаешь, как у самых старых и самых больных, все замедленное… Я не чувствовала страха, я просто не понимала, зачем это делается. И потом опять лестница вверх. И когда мы выехали, я спросила у этого спутника, все не поворачиваясь, зачем, что это они делают? И тогда он как-то сделал так, что я обернулась, потому что знала, что он скажет сейчас что-то бесконечно важное; и увидела его желтое ацтекское лицо. Знаешь, бывают такие ацтекские лица? Действительно смуглое, скуластое, знающее что-то такое, что только ацтеки знали… И он мне очень серьезно, значительно сказал: «Разве вы не знаете, ЧТО НЕ ВСЕ ЛЮДИ ВОСКРЕСАЮТ?». А я и взаправду знала, я всегда догадывалась, что и бессмертная душа есть не у всех, и воскреснут действительно не все, но меня поразило, что он тоже это знает, знает, как много я в детстве про это думала. И вдруг его лицо стало расти, расти — я проснулась от страха, такое оно большое и желтое было передо мной, во все небо. Так это было перед отъездом. А нынче я уже знала, что не надо оборачиваться, и просто шла и думала: неужели я тоже могу не воскреснуть и буду сматывать эти проволоки?!</p><p class="p1">Погоди, закричал он шепотом, ты не умрешь, теперь ты не умрешь! Раньше мы были врозь и все могло случиться, а теперь никогда! Но почему-то ему запомнилась и эта ночь, и ее сон, и тревога, страшная тревога во всем, еще и деревья шумно качались. И с этого момента чувство своей неуязвимости стало быстро убывать, и тем мучительней было читать Алины бодрые, бодряческие колонки о том, как былая эмигрантка радостно познает мир. Но и это Борис прощал: душа, вернувшись из загробного мира, радостно набрасывается на любые земные впечатления, любые запахи, будь это даже запах свалки — но живой, земной свалки. Ведь в загробном мире, где зимуют души до встречи, ничем не пахнет.</p><p class="subtitle">— 3 —</p></span>
