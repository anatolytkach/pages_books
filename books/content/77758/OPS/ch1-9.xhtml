<span><p class="p1">— Изменилось, — пропел Драганов. — Что-то изменилось. С Сотином, что за вздор, Аколаст примирился. Скажу тебе кон-фи-ден-циально, — произнес он полушепотом, хотя слушать их здесь было некому, — что товарищ Гольцов оказался несколько не так чист, как полагалось бы при его темпераменте. Он уличен в сокрытии отца-священнослужителя, проще говоря, попа. На собрании ему припомнили многое, и в том числе личный выпад против вас, товарищ Гвирцман. Скажу честно, этот вопрос поднял не я. Когда восстановишься, непременно скажи спасибо Круглову. Он приличный человек, я всегда догадывался.</p><p class="p1">— Но я ведь действительно… — Мише хотелось снять последнюю неясность, снова доскрести до дна. — Я ведь, собственно… Понимаете, получается как-то… Я буду очень рад, конечно. Я признателен, что вы пришли. Но есть некоторая неясность. Ведь от того, что Гольцов скрыл попа, я не перестал как бы приставать к Крапивиной, хотя я и не приставал к ней. Но ведь моя ситуация от этого…</p><p class="p1">— Гвирцман, — прервал его Драганов. — Я понимаю твои чувства. Но дают — бери, а бьют — беги, и боже тебя упаси перепутать. Ты неправильно себя вел, ты это искупил, теперь ты вернешься под сень наук и будешь вести себя правильно. Второго апреля я тебя жду, потому что первого — это будет смешно. Постарайся там за это время подчитать программную литературу, ну и восемнадцатый век, это я у тебя проверю лично.</p><p class="p1">Он широко и фальшиво улыбнулся.</p><p class="p1">— И по-о-омни, — пропел вовсе уж издевательским фальцетом, — что лучше отделаться дешево, а гордыня — большой грех, адью, адью!</p><p class="p1">Что за наглядность, подумал Миша. Поистине Крапивина — моя судьба: не успел я начистить ей рыло, как она перестала преследовать меня!</p><p class="p1">Родителям он сказал о восстановлении только через три дня, когда сам освоился с этой мыслью. Мать ахала, отец молчал и только сопел от счастья. Стыд какой, думал счастливый Миша, стыд, стыд.</p><p class="subtitle">— 20 —</p><p class="p1">Почему-то он ясно понимал — ах, откуда истинные поэты всегда все понимают? — что идет в студию в последний раз, потому что с окончанием больного, странного, а все же значительного периода его жизни должна закончиться и студия. Может, когда-нибудь он туда придет уже как ифлиец. Но вряд ли ему суждено ходить по прежним местам с прежней компанией.</p><p class="p1">На этот раз была оттепель и даже весна — потому что в подкладке воздуха впервые чувствовалось тепло. Обычно весь март проходит еще под знаком холода, всегда готового вернуться: тепло искушает, отрезвление иссушает. Но потом в один день теплеет уже явственно, и по лужам бежит рябь настоящего южного ветра, того ветра, о котором пишутся романтические, фальшивые детские рассказы. Тогда в клочьях облаков горят уже крупные звезды, и кажется, что это клочья парусов несутся. Вот эта рябь на лужах, думал Миша, и есть то, что я вспомню, когда буду умирать. Ведь буду же я когда-нибудь умирать, и мне надо будет вспомнить, что хорошего я видел. И видел я это небо чернильного цвета, цвета синих чернил. Еще бывают такие глаза, но крайне редко. У Лии глаза были карие, цвета заварки, а бывают глаза цвета чернильной ночи, но достаются они иногда, прямо скажем, черт-те кому. И он шел среди летящих парусов, среди уже весенних луж, которые, может, в пару ночей будут еще подмерзать, но хрупко и ненадолго. А так-то всех уже простили, испугали и простили. Все по человеческой своей слабости уже подумали, что это навсегда, а оказалось — три месяца, ерунда какая-то.</p><p class="p1">И он пришел в студию вполне счастливый, и там была Лия, которая ему кивнула, ничуть не удивившись. Про восстановление в институте ей почему-то было уже известно.</p><p class="p1">— Ты откуда знаешь?</p><p class="p1">— Слухом земля полнится. Горецкий сказал, а Горецкому — кто-то из ваших. Я же говорю, Москва сейчас ужасно тесная.</p><p class="p1">— Ну и что ты об этом думаешь?</p><p class="p1">— Если честно, я не очень много об этом думаю, — сказала Лия.</p><p class="p1">— Действительно честно.</p><p class="p1">— Я хочу сказать, глупый Мишка, что ты для меня не этим определяешься.</p><p class="p1">— А чем?</p><p class="p1">— Чем — я пока не поняла. Но в изгойском состоянии ты мне нравишься ничуть не больше, успокойся. Правда, в не-изгойском я тебя пока не видела.</p><p class="p1">Он не видел ее две недели, на ней было новое платье, очень простое, черное, довольно короткое. На ком угодно оно смотрелось бы скромно, а на ней выглядело как парижское. Волосы были особенно медовые, и пахло от нее другими духами, более горькими и свежими. И она, кажется, чуть подкоротила волосы.</p><p class="p1">— Лия, а ты-то как?</p><p class="p1">— Я не очень хорошо. С отцом все плохо.</p><p class="p1">Миша вопросительно показал глазами на потолок и спросил:</p><p class="p1">— Гм?</p><p class="p1">— Нет, с сердцем. Но и там, наверное, тоже. Я не спрашиваю.</p><p class="p1">— Слушай, а вот женский голос подходил, когда я звонил, — это…</p><p class="p1">— Это да. И, может быть, это самое плохое для него.</p><p class="p1">— Она тебя не трогает?</p><p class="p1">— Попробовала бы тронуть. Но и не радует, как ты понимаешь. Я думаю съехать.</p><p class="p1">— К кому?</p><p class="p1">— Я разберусь. К тебе пока рано.</p><p class="p1">И всегда она умудрялась понять раньше и сказать прямей.</p><p class="p1">Они сели рядом на низкие коричневые скамейки, такие обычно стояли в школьных спортзалах. На этот раз показывалась сцена концерта, на котором группа строителей исполняла сатирические частушки, а отрицательный комсомольский вожак негодовал и упрекал их в кощунстве. Начинался тем самым зажим критики. Вожак окончательно утрачивал связь с массами и обнажал свою гнилую сущность. Как бал в балете всегда повод для дивертисмента с французским, русским, африканским танцем — так концерт был не только поводом обострить коллизию (чувствовался уже финал, и действие шло крещендо), но и возможностью показать все музыкальные дарования. Были танцы, лирические песни и баллада о том, как мы поехали в глухую Сибирь, до свиданья, мама, не грусти, строить город сына отпусти. Чувствовалась профессиональная рука Горецкого с его задором на грани дозволенного.</p><p class="p1">Солировал Сева. Его роль окончательно определилась — он был теперь, ясно по всему, Хороший из народа. Роль Хорошего из народа, по Мишиным прикидкам, долженствовала стать главной во всех современных пьесах. Орехов, видимо, набрел на нее интуитивно и собирался писать теперь об этом персонаже до конца дней — своих или его. Хороший из народа, сутулый, негромкий, выносливый, обязан был терпеть вопреки всему ради светлого дела. Он был не из этих неженок, которым всегда хорошо и которые всегда недовольны. Ему доставалось солоней всех, но он как бы просил: еще, еще! Он был становой хребет, плечо, на котором все держалось. Он вынес и эту дорогу железную. Он никогда ничего не требовал, и его ни о чем не спрашивали, а если спрашивали — он делился негромкой, но емкой народной мудростью. Он был тихий. И оказывалось, что именно в него влюблена самая раскрасавица, и именно у него, при всей негромкости, лучшие трудовые показатели, а когда на собрании его спрашивали — ну ты-то, Шишаков, что молчишь? — он обязательно был Шишаков! — он отвечал: да по-моему, все ясно, ребята, надо просто работать. Просто вот работать, и тогда все будет как надо. И все говорили: боже мой, как это мы раньше не понимали!</p><p class="p1">Этот типаж Мишу бесил, как бесил его и Сева с его чистыми глазами, пухлыми губами и непокорными вихрами. Он весь был словно сделан для того, чтобы с него списывали Хорошего из гущи, и в самой его простоте, неброскости и свойскости был самый ужасный, самый неисправимый фальшак. И Миша чувствовал, что этот фальшак добавляет к спектаклю уж что-то совсем неприличное, и не знал, сможет ли сказать об этом вслух. И все-таки понимал, что скажет, потому что Бехтерев писал где-то: наш мозг уже знает обо всех принятых нами решениях, и пока душа колеблется, мозг медленно готовится. Сегодня Миша должен был сказать об этой главной фальши, но ударить по Севе — значило ударить по тому, на чем держалась вся студия. Этим чем-то как раз и была обаятельная, тщательно отработанная фальшь, а Люся стояла на страже этой фальши, потому что в свои семнадцать лет уже замечательно умела заводить глаза и всем телом изображать глубокую оскорбленность. Миша знал, что, пока он этого не скажет — ему нельзя уходить, а как только скажет — нельзя будет оставаться.</p><p class="p1">И, дождавшись обсуждения, он пропустил первые две реплики, потому что первая всегда была комплиментарная, вторая поддерживала ее — да чего, ребята, что мы робеем, по-моему, все здорово! — и только третья должна быть сомневающейся, а то и кощунственной, иначе она попросту не будет услышана. Все шло точно по этой схеме, и Миша, дождавшись паузы, вкрадчиво сказал:</p><p class="p1">— Друзья мои, я наконец понял, для чего мы тут всё это делаем.</p><p class="p1">Он говорил как право имеющий, и это почувствовалось, хотя о восстановлении знали не все. Просто был за ним какой-то новый опыт — может быть, опыт мужчины, ударившего женщину.</p><p class="p1">— Это новый жанр, — продолжал он, всех заинтриговав. — Он к жизни не имеет отношения, и судить его надо по другим законам. И я был глубоко неправ в прошлый раз, простите меня все. Мы делаем нашу советскую оперетту с ее опереточными проблемами, музыкальную комЭдию, и непонятно только, зачем было изначально придавать ей элемент героики. Поднимать проблемы и все вот это. Надо больше, мне кажется, танцевальных номеров на тему производительности труда, и пьесу эту с руками оторвут все коллективы Урала и Сибири. Для Москвы, может быть, она еще недостаточно отшлифована, но вы отшлифуете, верно? — Он уже твердо избегал всякого «мы». — Мне особенно нравится, Сева, как ты показал народного героя. Это наша первая настоящая удача. Потому что в первых сценах был еще какой-то привкус жизни, а теперь мы видим химически чистое вещество. Нас учили не по Гегелю, но у Гегеля сказано: прекрасное есть последовательность. Вот здесь уже такая последовательность, что ножа не всунешь.</p><p class="p1">Он прекрасно понимал, что перешел грань: придираться к Севе было не принято. У Севы умер отец, сидела мать. Сева жил один, то есть с Люсей, и кое-как перебивался с хлеба на квас, зарабатывая в том числе разгрузкой вагонов. Чем-то ему помогали родственники, но он всегда был голоден и плохо одет. В жизни Миши уже был человек, которого принято было не трогать, и за время этого подчеркнутого всеобщего почтения гражданская вдова превратилась в гремучую змею. Так что он не стал щадить Севу, и теперь на него были устремлены негодующие взоры всей женской части студии; мужская глядела в пол.</p><p class="p1">— Это серьезное обвинение, — медленно сказал Орехов, — и хотелось бы знать, чем оно подкреплено. Такие слова естественно было бы слышать от человека, лично построившего хоть одну стену…</p><p class="p1">— О, разумеется, — радостно подхватил Миша, — и вообще, каждый критик, прежде чем критиковать, должен доказать свою способность что-либо сделать. Например, построить стену. Это оказал кто-то из немецких мыслителей, наших союзников. Но ведь то критики, а я — скромный зритель. Уверяю вас, товарищи, что сегодня лично я вот этими руками перетащил несколько тюков грязного белья, одного оперируемого, упавшего с каталки, и два трупа. Достаточно ли этого, чтобы высказываться о вашей оперетте?</p><p class="p1">— Вообще он дело говорит, — сказал маленький Семен. — Дело в том смысле, что хватит бегать за жизнеподобием, и вообще наш зритель вправе посмотреть музыкальную комедию, я тут не вижу ничего такого, почему надо смотреть только «Сказки Венского леса»? Мы имеем право осваивать новый, как это, материал…</p><p class="p1">— Я к этому и веду! — воскликнул Миша. — Ровно ничего унизительного. И я даже думаю, что сами строители таежных городов имеют право на отдыхе посмотреть именно такой спектакль, потому что правду о своей работе они знают и сами. Можно только спросить: а не унизителен ли для них рассказ об этой работе, где не будет ни слова правды вообще? И я отвечу: нет, не унизителен! Много ли правды у Шекспира, переписавшего «Гамлета» с точностью до наоборот? В подлиннике Гамлет был сильная личность, мало колебался, всем отомстил. Нам рассказывали. Иными словами, Сева, твою работу я хочу отметить особенно и прежде всего оценить песню…</p><p class="p1">— Чем тебе не нравится песня? — спросил Сева голосом, не предвещавшим ничего хорошего. Вечным своим чутьем он угадал, что Мишу злит не пьеса. Мы знаем, что противоречия бывают антагонистические и неантагонистические; так вот, тут вылезло антагонистическое, за которое бьют морду.</p><p class="p1">— Очень милая песенка, — быстро сказал Миша, — очень свежая вещь. Я только не до конца понимаю, как ты можешь петь эту песенку, когда у тебя выслана мать.</p><p class="p1">— Н-не трогай мою м-мать, — заикаясь то ли от волнения, то ли просто ради общей грозности, сказал Всеволод. На притворство это было не похоже: он сжал кулаки, и на лбу у него обозначилась ижица.</p><p class="p1">— Я твою мать не трогаю, — спокойно сказал Миша, с некоторых пор постоянно готовый к драке. — Но согласись, странно играть пьесу про город ветров, когда в этом самом городе ветров сидит не чужой тебе человек…</p><p class="p1">— Слушайте! — заорала Нащокина. — Чего ради этот вообще… этот неизвестно откуда… Тебя выгнали уже из института, тебе мало? Ты что вообще здесь делаешь? Пришел тут… у человека беда! И все-таки он дело делает, а не нюни распускает! Ты кто вообще, ты, может быть, враг вообще…</p><p class="p1">— Надя, Надя! — крикнула Лия и тряхнула головой, как всегда в минуту сильной злости. — Ты не на сцене, слышишь?</p><p class="p1">— А мне все равно! — огрызнулась Нащокина. — Я и там, и там не вру!</p><p class="p1">— Севка, спокойно, — проговорил Сема, но в голосе его слышалось скорей подспудное желание подлить масла в огонь. — Держи себя в руках, Севка!</p><p class="p1">Это было актерское, грозное, братское, с некоторой даже старательной дрожью в голосе. Нет уз святее товарищества, и сейчас мы покажем товарищество. Миша мгновенно вспомнил, как товарищеский Сема на новогоднем балу тискал Севину Люсю. Изумительно, как слетались теперь на Мишу именно такие типы, он теперь для них излюбленная мишень.</p><p class="p1">— Да не волнуйся так, Сема, — бледным, бумажным голосом сказал Миша. — Меня теперь гнать не надо, я сам ухожу. За мотор вам кто угодно постучит, хоть Боря. Просто учтите вы все: сейчас такое время интересное… кто остался, очень быстро начинает завидовать тому, кто ушел. Проверенная вещь.</p><p class="p1">И ушел триумфально, по-актерски, — единственная его удача на сцене и единственная роль, для которой он был в действительности рожден. Двигаясь вниз по улице Герцена, он мог бы поклясться, что слышит рукоплескания. Ему рукоплескали шумные ангельские крыла. Ангельскими крылами был полон теплый вечер, переходящий в чернильную ночь. Дома он был необычно ласков с родителями. Ему было бы особенно приятно, если бы тихий ангел-хранитель дежурил внизу, это было бы окончательным подтверждением правоты но Леня, видно, читал дочери сказку или, может, тихо выпивал в каком-нибудь приятном обществе. Мише нравилось представлять, что у ангела все хорошо.</p><p class="p1">Ближе к ночи вдруг позвонила Лия. Он бросился к телефону, словно чувствуя, что это не срочный вызов из отцовской больницы, а именно радостная весть для него. И он покраснел от счастья, услышав ее голос.</p><p class="p1">— Слушай, — сказала она без всякого приветствия. — Я вот думаю. А если бы тебя не восстановили, ты был бы сегодня такой храбрый?</p><p class="p1">— Не знаю, — честно сказал он, ведь у них принята была честность.</p><p class="p1">— Я просто думаю, — повторила она. — Иногда человек храбреет оттого, что ему возвратили платформу. Если так, то это нехорошо. Севка плохо играет и плохо пишет. Но он находится в слабой позиции. Если ты решил его ударить просто потому, что можно, то это совсем нехорошо.</p><p class="p1">— Лия, — сказал Миша, покраснев еще гуще, на этот раз от незаслуженной, хлесткой обиды. — Почему мы оба всегда думаем о людях худшее? Это что, вообще единственное, что у нас есть общего?</p><p class="p1">— Это не самое плохое качество. И пойми, я просто думаю…</p><p class="p1">— Ты можешь сейчас выйти на каток? — спросил он неожиданно для себя.</p><p class="p1">— Нет, не могу.</p><p class="p1">— Это… как бы это… по внутренним причинам или по внешним? — Миша улыбнулся и почувствовал, что губы плохо его слушаются.</p><p class="p1">— Я не очень готова сейчас тебя видеть, — сказала она. — Люся плакала, и хотя Люся — девочка глупая, но никакая пьеса не стоит слезы младенца.</p><p class="p1">— Пойми, не в пьесе дело. Черт, Лийка, неужели даже ты не понимаешь?! Ведь мы знаем этих охраняемых, оберегаемых, я тебе рассказывал, и разве ты не понимаешь, что потом вырастет из Люси?! Люся будет всегда бедная и всегда будет есть людей…</p><p class="p1">— Что там вырастет из Люси, я не знаю и это не мое дело. — Лия помолчала с полминуты, и Миша уже начал думать, что разъединили, но не решался ничего сказать, словно сама эта тишина не открытым еще ультра-ультразвуком транслировала ему нечто главное. — Я просто думаю, что ты присвоил себе право причинять людям боль и думаешь, что ты от этого будешь лучше.</p><p class="p1">— Что ж ты там молчала? — ударил он в ответ.</p><p class="p1">— Там ты был один против всех. И к тому же… Вот понимаешь, Миша, какая ужасная вещь? Ничего нельзя сказать. Сказать, что ты прав, нельзя никак, потому что ты не прав. Сказать про тебя плохо — значит попасть в стаю. У меня чувство, что скоро правды не останется совсем, и я не знаю, что должно случиться, чтобы облетела вся эта шелуха и стало можно говорить. Понимаешь? Потому что ты не прав, Севка не прав, я не права — никто не прав, а так ведь немыслимо.</p><p class="p1">Лия снова замолчала, и он снова не знал, что сказать, только слушал ее молчание, более насыщенное, чем всякая речь.</p><p class="p1">— Но я думала, что из тебя что-то уйдет, а в тебе что-то наросло, — сказала она наконец. — Мне кажется, что это я виновата. Но тогда я побоялась, а теперь поздно.</p><p class="p1">— То есть сейчас и ты меня отталкиваешь? Это знаешь, хуже, чем вся студия…</p><p class="p1">— Я не отталкиваю. Но в тебе какая-то сила, и я не знаю, как быть с этой силой, она недобрая. И не отталкиваю, но нам надо какое-то время ждать. И мне надо разобраться, и тебе. Мы теперь, наверное, долго не увидимся.</p><p class="p1">— Долго — сколько?</p><p class="p1">— Я не знаю. Может быть, до июня. Очень может быть, что я первая передумаю, но ты пока не появляйся. А потом мы оба что-то решим и тогда будем действовать. Пойми, я правда не отталкиваю. Я никогда тебя не оттолкну. Я за тебя, может, отвечаю.</p><p class="p1">— Лийка, — спросил он вдруг. — А как ты сейчас одета? Ну, в смысле, что на тебе?</p><p class="p1">— Все то же самое, — сказала она небрежно. — Я не переодевалась, все думаю. И вообще я пришла недавно, в этот раз поздно разошлись. Все утешали Люсю, Горецкий пел частушки. Этот ваш Борис даже заступался за тебя, говорил, что на семинарах вас приучали к беспощадности.</p><p class="p1">— Жалко, — сказал Миша.</p><p class="p1">— Чего? Что заступался?</p><p class="p1">— Нет, это тоже жалко, но более жалко, что на тебе все то же. Хотя тебе очень идет. Не хочешь ли узнать, что надето на мне?</p><p class="p1">— Нет. Да. Скорее нет, чем да. Но ты обидишься. — Голос у нее стал очень усталый, и это уж точно был наигрыш. — Ну хорошо, что на тебе?</p><p class="p1">— Да практически ничего, — сказал Миша. — Одни лишь только трусы. Прекрасное название было бы для романса. «Одни лишь только трусы».</p><p class="p1">Лия засмеялась коротким равнодушным смешком. Однажды Миша сделал опечатку, перебеляя стихи для «Литературной учебы» в прошлом году, — тогда ничего не взяли, — вышло прекрасное слово «рванодушный», вот это было сейчас как раз про него.</p><p class="p1">— Ну ладно, — сказала Лия и положила трубку. И Миша был в первые несколько минут почти спокоен, но потом с небывалой силой засомневался в себе. Он ведь действительно ощутил себя в своем праве, и нельзя, оскорбительно, возмутительно было думать, что самоуверенность и даже жестокость появилась после восстановления. Нельзя быть, быть нельзя, как писали в каких-то старых письмах! Он не был готов к такому знанию о себе. Он не мог, не смел так от этого зависеть. Он действительно озверел. Он вспомнил, как ударил женщину. Ему стало яснее ясного, что поехать к этой женщине надо немедленно, лучше бы прямо сейчас, на каком-то ночном трамвае, который ходит весенними ночами, но главное — не растерять решимости к утру. Он проворочался еще с полчаса, но потом воспользовался вернейшим снотворным — вообразил Лию, немного потрудился и, удовлетворившись паллиативом, заснул.</p><p class="p1">Наутро его решимость никуда не делась. Он впал в дикую непривязанную тревогу — ту самую, которая томила его после исключения, когда отошел наркоз и обрушился ужас случившегося. Хотя какой там ужас. Он успел привыкнуть к перепадам. Однако мысль о собственном поликратовом счастье тревожила Мишу, и по утрам — как в случаях действительно серьезного беспокойства — сильней, чем с вечера. Надо было немедленно ехать к Вале и умасливать судьбу, с которой он так безжалостно разобрался. Если она беременна, то черт его знает, от кого, но если от него и она сумеет это доказать — как-нибудь ведь это доказывается, рассчитывается, — плакало и восстановление, и работа, и всё. Жизнь сломана. Она могла, конечно, приврать, чтобы его напугать. Но могла и не врать, и страшно подумать, чего она там наворочала, пока он беспечно дразнил студию. О себе надо было думать, а не о студии. И он поехал к ней на работу, не заботясь даже о том, что придется, может быть, объясняться прилюдно. Он знал теперь, что все неприятности надо встречать лицом, грудью.</p><p class="p1">По дороге — стоял изумительно ясный день — он искал добрых примет и не находил. Купил газету. Газета сообщала о премьере «Валькирии». Ну и что же, и правильно. В самое русло. Внешние новости теперь преобладали над внутренними и были не то что интересны, а как-то малопонятны. В Югославии начались уличные волнения и готовился переворот. Это было как бы и хорошо, но как-то и неясно, потому что Югославия присоединилась к тройственному пакту и стала фашистской, но мы держали нейтралитет; теперь вместо Александра установился молодой Петр, посадивший всех, кто подписывал пакт, но это означало союз с Англией, а Англия была нам далеко не друг и даже не единомышленник. Вообще тон был такой, что Гитлер хоть и зло, но понятное и до известной степени близкое, вагнерианского склада, а Англия — совсем чужая и исторически кровно враждебная. Миша ненавидел всю эту логику, дружбу с фашистами полагал тактическим ухищрением, а англичан почитывал и, в общем, терпел, но втайне понимал, до какой степени они чужды советской власти. Миша любил советскую власть, понимая, что только при ней возможны его рост и самое существование, потому что в остальном мире такому, как он, просто неоткуда было бы взяться и уж подавно не выжить в нынешние времена. Советская власть была несовершенна, но где уж выбирать. Самым лучшим для советской власти было бы теперь наблюдать, пока Гитлер и Черчилль сожрут друг друга, а потом на руинах Европы подружиться с Америкой, — но что-то ничего из этого не выходило, все было вязко, как бы зависло, распухало и не прорывалось. До тридцать девятого года и даже во время Финской войны была какая-то ясность, но теперь Миша вовсе не понимал, чего мы хотим, а средиземноморский театр военных действий ничего не говорил его сердцу. Италия сунулась в Грецию и получила по морде. Теперь Германия собиралась вступить в войну с Грецией на стороне Италии, но греки получили английскую военную помощь. Как относиться к Греции, Миша не знал. Там все время кого-то казнили. Греки всегда казались ему примитивней римлян, он читал Гомера с неохотой, а «Энеиду» — с восторгом, и брюсовская корявость в переложениях этой латыни, пропахшей козлиными шкурами и военными шатрами, была ему приятна и тайно родственна. Но теперь Италия настолько отдалилась от Рима, при всем усвоении его атрибутики, а Греция так мало была похожа на Грецию мифов, что странно было читать о сражениях в районе Олимпа. Зевс, должно быть, готовился к эмиграции — хорошая могла бы получиться поэма, вроде «Энеиды» Котляревского, могучая пародия, все хорошее в литературе растет из пародии, но жалко тратить силы на вещь заведомо подпольную. Еще странней было глухое умолчание обо всех внутренних делах. Раньше все время осуждали, разоблачали, проводили митинги с клеймениями и отречениями, но Миша был мал и воспринимал это с детской жестокостью, с абсолютным доверием школьника; теперь ничего такого не было, и от этого, как ни странно, казалось тревожней. Похоже, там зрело что-то совсем ужасное; по еле-еле сквозящим обмолвкам он догадывался, что грядет большой переворот в эстетической политике, что от Европы резко повернут к собственным корням — и что в маргинальных местах типа «Литературного критика», которого он, впрочем, не открывал с октября, идет осторожная разведка: можно было предполагать, что на самом верху тоже есть две партии, условно германская и как бы британская, но от их борьбы, шедшей за красными стенами, долетали вниз только самые глухие отголоски, и, в общем, гадать бессмысленно. Он прочел газету вдоль и поперек, но не нашел внятного сигнала. Напротив рослый мальчик, старшеклассник-переросток, в чересчур коротких штанах с бахромой, читал ту же газету и бросал время от времени взгляды в Мишину сторону. Ему явно хотелось заговорить. Наконец он сказал:</p><p class="p1">— А молодцы англичане в Африке!</p><p class="p1">Миша видел, что этот мальчик еще более одинок и затравлен, чем он сам, что его раздирают страсти, что он постоянно хочет есть из-за своего роста, опережающего возраст, — и, как всегда, побоялся заразиться от чужого несчастья.</p><p class="p1">— Да-да, — сказал Миша якобы рассеянно и встал, как бы готовясь сходить. Мальчик проводил его цепким взглядом. А сходить и вправду было пора, но вот же вам удивительное свойство этих тревожных состояний: когда он сошел с трамвая, было два часа пополудни. И три часа с этого момента он стоял, ходил, ждал — искал знака, что ему непременно стоит идти к Вале. Знака ниоткуда не было. Он пробовал кидать монету, но монета всякий раз давала не тот ответ, которого он желал; он перекидывал, и опять все было не то. Он уже дважды дошел до депо, повернул вспять, его тошнило, а тревога разрасталась. Наконец он припомнил все хорошее, что случилось с ним в последнее время, постарался забыть о предательстве Лии — это было именно предательство, что же еще, — и решительно вошел в депо. Там что-то праздновали, день рождения кого-то из служащих или рождение первенца, он не понял, — так что лестница на второй этаж была украшена флажками. Валя сидела на обычном своем месте и сосредоточенно печатала.</p><p class="p1">— А, — сказала она, подняв глаза. — Пришел.</p><p class="p1">— Разговор, — сказал Миша, задыхаясь. — Поговорить.</p><p class="p1">— Ну пошли, — согласилась она неожиданно легко и, набросив серое пальто, новое, он его не видел, быстро сошла вниз.</p><p class="p1">— Валя, — сказал Миша сразу. — Прости меня.</p><p class="p1">— Прощаю, — сказала она. — Не ходи сюда больше.</p><p class="p1">Решила, значит, оставить ребенка и растить одна.</p><p class="p1">— А у меня нет ничего, — сказал Миша, по-идиотски улыбаясь. — Ни сифилиса, ничего. Все глупость была. Прости меня.</p><p class="p1">— И у меня нет ничего, — сказала Валя так же просто. — Ни беременности, ничего.</p><p class="p1">И сначала он вздохнул с ужасным облегчением, а потом — с тем странным разочарованием, какое всегда посещает мужчин при известии, что обошлось. Возможно, мальчик, выросший из бахромчатых штанов, был добрым знаком: считалось же когда-то хорошей приметой встретить похороны или нищего. Положим, он не подал нищему, но ведь и не оттолкнул его. И как-то все это было странно: война зависла, его не призвали, восстановили, сифилиса нет, беременность рассосалась. Правда, Лию он потерял, Валю наверняка тоже, и ангел больше не показывался — или, верней, вот такие теперь у него были ангелы, как этот страстно искавший диалога мальчик с цепким взглядом.</p><p class="p1">— Правда ничего? — переспросил Миша, улыбаясь еще глупее. И это скотское облегчение на минуту испортило Вале всю радость от того, что действительно обошлось, что ей прибавили денег, что начальник шестого участка Вавилов поведет ее сегодня смотреть «Музыкальную историю», и он был первый человек за много месяцев, который ей действительно нравился: была в нем надежность, но не было быковатости.</p><p class="p1">— Правда ничего, — сказала она. А Миша был такой красивый, очень красивый, как-то странно похорошел за неделю, но теперь все это было поздно и ни к чему.</p><p class="p1">— Прости меня, — сказал он в третий раз.</p><p class="p1">— Да что ты, Гвирцман, ничего ж не было.</p><p class="p1">— Я больше не буду, — сказал он, перестав улыбаться.</p><p class="p1">— Конечно, не будешь. Кто ж тебя подпустит.</p><p class="p1">И так они стояли в нежном мартовском закатном свете, бледно-золотистом, среди окончательно уже наставшего тепла, и рассматривали друг друга, не понимая: что же это такое было и для чего, и почему кончилось как-то ничем. И может ли быть, чтобы кончалось вовсе уж ничем. Он смотрел и замечал, что она все-таки очень хороша, и было досадно, а вместе с тем и легче.</p><p class="p1">И труднообъяснимое разочарование, а вместе с тем и облегчение висело в воздухе, слышалось в шорохе таянья, в капели, в далеком трамвайном звоне. Так, наверное, расставались бы измучившие друг друга анархист и кокаинистка, которые встретились ненадолго в двадцать втором — бац, он уже учитель в школе-коммуне, а она секретарша в иностранном отделе. И непонятно, было ли что-то, и с ними ли было. А главное, непонятно, что же такое случилось. Обещали вроде всемирный переворот, а тоже не вышло. Все то же самое, только труба пониже, дым пожиже и евреев побольше.</p><p class="p1">И такое примирение было в этом разочаровании, такая тихая, кроткая, несколько животная радость от того, что затевалось нечто великое и ужасное, а вот не случилось, — что Миша почувствовал вдруг предательское щипание в носу. На острове Ифалук есть порядка тридцати эмоций, которых не знают обычные люди: например, фаго, смесь нежности и жалости, или кхер — радость, смешанная с яростью; и вот специфические, нигде больше не бывающие эмоции есть, наверное, везде, — скажем, горькая американская радость, описанная у Дос Пассоса и всех остальных, проистекающая от того, что карьеру ты сделал, а душу потерял. А российская весна, бледная, слабая, после ледяной бесчеловечности зимы, обещавшей всем полное расчеловечивание, была ужасным, если вдуматься, сочетанием рабской радости, что опять выжили, и слезливого разочарования от того, что опять ничего не получилось. Ведь даже война была бы выходом из тупика, а теперь — обрушился опять сладкий, родной тупик. Вот все и вернулись на круги, и солнце грело, и Валя мило щурилась, и только далеко, на окраине зрения, бессмысленно убивали друг друга ненужные итальянцы и греки.</p><p class="p1">Так они постояли минут пять, ничего не говоря, а потом Валя протянула ему руку и сказала:</p><p class="p1">— Прощай, товарищ, не поминай лихом.</p><p class="p1">И Миша серьезно эту руку пожал и еще раз сказал:</p><p class="p1">— Прости меня.</p><p class="p1">И Валя повернулась и пошла в депо, а он посмотрел ей вслед и побрел на трамвай, так и этак поворачивая в уме только что выдуманную, неплохую, кажется, строчку. Надо было как можно скорей сочинить остальное, как можно больше выхватить из внезапно приоткрывшегося окна, которое вот-вот должно было затянуться снова, — тем более что и вечер начинал сгущаться, и было странное чувство, что кончается нечто огромное, много большее, чем роман с Валей. Может быть, кончалось и само это жалкое чувство весеннего воскрешения, равноденствия (ах да — он вспомнил! — равноденствие), и подступало нечто гораздо более грозное. Но всё это нервы, он просто слишком много и бессмысленно боялся в последнее время, и ничего страшного теперь быть не могло. Просто некоторое время еще будет болеть душа — замах был на рубль, удар вышел на копейку. Помучили друг друга, и хватит. Может, лучше начать с той девочки из его больницы, больной и странной девочки, чтобы больше никогда не попадаться на этот тип — душа не по телу, слишком глупая, чтобы быть роковой, и потому все время эти томления, эти запросы, эта истерика на половой почве. Он сел в трамвай, сладко думая о том, что свет был этим вечером совсем неземной, словно из параллельной вселенной, где вместо наших чувств другие. Уэллс писал про такую вселенную, которая была за дверью в стене. Но тут над ним навис контролер.</p><p class="p1">Миша показал билет.</p><p class="p1">— И что? — проревел тот. — И что ты мне кажешь?!</p><p class="p1">От него шел дикий запах перегара, он, видно, пил не первый день. И никто не осмеливался возражать ему, но Миша осмелился.</p><p class="p1">— Вы пьяны, — сказал он брезгливо.</p><p class="p1">— И что? — заревел контролер. — Ты думаешь, я пьян, так тебе тут… можно?!</p><p class="p1">В вагоне было человек двадцать, и все они ехали, видимо, с работы, и все молчали, погруженные в полусон. Никто из них не хотел неприятностей.</p><p class="p1">— И что?! — орал контролер. — Сесть! Встать! Ты кто такой?</p><p class="p1">— Я пассажир, — почти прошептал Миша.</p><p class="p1">— Не слышу!</p><p class="p1">— Пассажир, — решительно ответил он.</p><p class="p1">— Ах ты, мразь, — крикнул кондуктор и схватил Мишу за лацканы. Миша попытался его отпихнуть, но тот был явно сильнее. Кондуктор тряхнул Мишу и с силой впечатал его в стекло. Тут встал рослый широкоплечий мужик, с виду классический рабочий, деликатно отцепил кондуктора от Миши и заслонил Мишу квадратным телом.</p><p class="p1">— Сходи давай, — сказал он. — Нечего тебе тут.</p><p class="p1">— Но я по билету… — неуверенно сказал Миша.</p><p class="p1">— Сходи, — тупо повторил квадратный человек. — Нечего тебе тут. Ты видишь, горе у человека. А ты тут весь из себя. Нечего.</p><p class="p1">И Миша спрыгнул на остановке, так ничего и не поняв — наверное, этот кондуктор и весь трамвай тоже были из параллельного мира; бывает не только рай, но и ад. Одно было очевидно: тайная недоброжелательность никуда не делась, и Мише противопоказано было занимать место у окна в трамваях, где ездили кондукторы с нелегкой судьбой.</p><p class="p1">…Он решил не уходить с работы — в конце концов, обязательное посещение всех лекций и семинаров отошло в прошлое, да и не было ничего дурного в том, чтобы продолжать окунаться в жизнь. Драганов улыбнулся ему язвительно и одобрил. А после первой пары пятого апреля, когда Миша восстановился и встал на все учеты, к нему подошел Павел. Миша не ждал от разговора ничего хорошего — ему явно донесли о скандале в студии, — но Павел вдруг сказал ему тихо:</p><p class="p1">— Предлагаю все считать небывшим.</p><p class="p1">— В смысле? — насторожился Миша.</p><p class="p1">— В самом прямом. Такая была формула. Русский царь имел такую власть над реальностью, что если после суда вскрывались новые обстоятельства он писал: суд считать яко небывшим. Такая же история была с одним офицером, который обманом залучил иностранку в церковь. Она хотела венчаться, а это был молебен. Она ничего не понимала в православии и родила ему шестерых детей. Потом оказалось, что он женат. Она бухнулась в ноги кому следует, дошло до царя, и царь начертал: считать молебен венчанием.</p><p class="p1">Миша по-прежнему ничего не понимал.</p><p class="p1">— Ты знаешь, — сказал Павел, — бывает опыт вредный, а бывает просто лишний. Я предлагаю тебе считать все происшедшее излишним. Помнить тебе никто не мешает, но я советую забыть.</p><p class="p1">Вот это было очень Пашино: не «советовал бы», а «советую». Когда на обсуждении мастер, добрый, показной грозности человек, прозванный Селявинским, сказал ему: «На вашем месте я этого не писал бы», — Паша ответил очень естественно, без картинной резкости: «Но ведь вы этого и не пишете».</p><p class="p1">— Очень хорошо, — сказал Миша.</p><p class="p1">— Как в монтаже, — пояснил Павел. — Этот кусок вырезается и идет в срезки. Приходи в Карманицкий в среду. Бориса я предупредил, и он, в общем, согласен.</p><p class="p1">И Миша почитал случившееся яко небывшим до самой середины июня.</p><p class="subtitle">— 21 —</p><p class="p1">За это время многое успело произойти, но это была уже новая, взрослая жизнь. У Миши начался тихий роман с девочкой-сердечницей, лечившейся у них в апреле; она была легкой добычей, одинокая, неизбалованная, но прелестная той прелестью, о которой сказано: чахоточная дева. При малейшем напряжении она задыхалась, но подлечили, рекомендовали даже спорт. Звали ее Соней. Училась она на радиоинженера.</p><p class="p1">Лия не звонила. В Карманицком долго обсуждалась премьера «Города ветров», прошедшая в начале мая с тремя аншлагами и подозрительно быстро изгнанная из клуба в Малом Каретном. Там что-то не понравилось. Борис был на премьере и дежурил в гардеробе — начало мая было холодное. Народищу, говорил Борис, было страсть. Появилась хвалебная рецензия в «Комсомолке» и осторожная статья в «Правде», где говорилось, что актеры, сами пишущие для себя роли, — это коллективный подряд и продолжение идей Горького, но конфликты нежизненны, а песни пахнут кабаре. На втором представлении потеплело, и Борис был уже не нужен; и в этот самый момент, объяснял он, что-то сломалось. Второй спектакль игрался уже без энтузиазма, а с третьего представления даже уходили. Никакого внешнего повода к такому перелому не было. Песню «Расставались под сосной» пели во многих компаниях. Театральный критик Левин, которому не нравилось никогда и ничего, сказал кому-то в кулуарах, что явилось небывалое поколение, и дай бог, чтобы его не выбило европейской войной, потому что к тому идет. Миша не пошел ни на премьеру, ни на следующие показы, хотя Павел и уверял, что Орехов и его команда не держат зла. Впрочем, добавил он, ты ничего не потеряешь. Может, добавил он, войны тоже не будет, потому что и некого особенно выбивать. Павел вообще стал тусклый, словно присыпанный пеплом.</p><p class="p1">Причину раскрыла Лена, когда однажды они с Мишей курили под тихим дождем на ступеньках института. Дождь шуршал в кленах, плескал в лужах, все было серое и бледно-зеленое. Случилась история, Паша присутствовал при составлении какой-то прокламации, ужасная глупость. Ничего не понимающие в реальности физики, люди, работавшие в закрытом институте, с теоретическими, далекими от жизни представлениями, приехали и командировку в Москву, навидались, как снабжаются люди в обычных магазинах, возмутились, написали меморандум, и Паша при этом был. Через неделю взяли всех, но его не тронули. Пошли слухи, которые, скорей всего, распространял как раз истинный доносчик, которого взяли и сразу же отпустили; с Паши какой спрос, он никого не знал в этой компании. Но слух пошел, и было уже не отмыться. Он и не старался отмываться, таскал кличку доносчика с той же гордостью, с какой прежде носил корону первого из молодых поэтов Москвы; к счастью, все быстро встало на места, но он уже не мог быть прежним, потому что поверить в предательство любого оказалось так легко! Выпьем, говорил он теперь в застольях, выпьем за то, чтобы каждый из нас, услышав о другом самое плохое, не поверил хотя бы в первые три минуты. Миша считал, что разбирается в людях, а ведь ничего этого не знал, и о Паше ему никогда не пришло бы в голову такое, — как-то тот был не из тех, о ком распускают вонючие слухи. Теперь Миша стоял под мелким майским дождем и понимал, что ничего не понимает, и еще по-скотски думал о том, что он-то, Миша, еще дешево отделался. Паша, говорила Лена, сказал ей однажды: как бы хорошо теперь на войну, там бы я всем доказал, а теперь ведь никому ничего не докажешь. Миша подумал: что же это за время, когда для доказательства своей порядочности обязательно нужна война, а в мирное время уже никто не верит никому. Но четырнадцатого июня опубликовали ноту о том, что провокациям верить нельзя, а разговоры о войне — вражеская выдумка. И Миша опять почувствовал странное разочарование, словно нарыв назрел и не лопался.</p><p class="p1">А восемнадцатого, сразу же после сессии, их на неделю отправили на Истру, в пионерский лагерь, куда в обязательном порядке ездили все ифлийцы, — своего рода педпрактика, и не зря поговаривали, что преподавать историю на периферии — лучший вариант карьеры для их выпускника. Мише не хотелось развлекать детей, да и Соня со странным упрямством просила остаться, но отказаться нельзя было. Восемнадцатого они уехали, а девятнадцатого к нему домой прибежала Лия.</p><p class="p1">— А вы Цецилия Александровна, — сказала она его матери. — Он про вас рассказывал, я сразу узнала. Миша дома?</p><p class="p1">— Миша уехал на практику, будет через неделю.</p><p class="p1">Цецилия Александровна, которая с самого восстановления сына в институте относилась к нему благоговейно, подумала теперь о нем с особенным уважением: вот ведь какая девушка за ним ходит!</p><p class="p1">— На неделю? — ахнула девушка. Она была уже совсем взрослая, но ахнула очень по-детски и сразу страшно покраснела. — Этого не может быть, этого нельзя!</p><p class="p1">— Но он поехал от института, — с гордостью оказала Цецилия Александровна.</p><p class="p1">— Боже мой, но как? Неужели он не может задержаться на день?</p><p class="p1">— Он скоро будет, — сказала Мишина мать, уже несколько насторожившись: из-за чего же так отчаиваться, неужели беременность? — У них там шефская работа, они вернутся.</p><p class="p1">— Ах, боже мой! Но ведь это значит, что мы никогда больше не увидимся! Мы не увидимся больше, Цецилия Александровна, вы это понимаете?!</p><p class="p1">— Но почему же, ведь он вернется…</p><p class="p1">— Да я-то не вернусь, как же вы не понимаете! — крикнула девушка. — Я уезжаю завтра утром с мужем, и мы никогда не увидимся больше!</p><p class="p1">Ах, с мужем, обидчиво подумала Цецилия Александровна. У тебя уже муж. Ну и катись тогда.</p><p class="p1">— До свидания, — сказала она вежливо. — Что ему передать?</p><p class="p1">— Передайте, что была Лия, но это уже неважно. Передайте, что я очень, очень хотела его видеть, что никто не виноват, но вот так. Боже мой. И я никогда, никогда не увижу его больше, разве что чудо, но чуда не будет. Прощайте, Цецилия Александровна, и пусть он меня простит.</p><p class="p1">Она убежала, и Мишина мать долго еще морщилась, вспоминая эту слишком роковую сцену. Ну в самом деле, что за экзальтация? А Миша узнал об этом визите тогда, когда уже ничего нельзя было изменить. Сам он в это время обживался в деревянном вожатском корпусе лагеря под Истрой и выслушивал рассказы хорошенькой вожатой Марины о том, что рядом тут дачная местность Снегири и знаменитый пляж, куда наезжают из самой Москвы. Еще там есть теннисные корты. «Я не играю», — сказал Миша. «Тогда волейбол», — сказала Марина, не терявшая надежды сыграть с ним в какую-нибудь командную игру.</p><p class="p1">Дети поражали Мишу необыкновенной тупостью, словно природа израсходовала все силы на Мишину блистательную генерацию, а следующим досталась баранья покорность, короткая память, нулевое воображение. Он долго пытался понять, откуда бы это. Допустим, у природы свои нужды, и тогда Мишино поколение растили для великого дела, а этих одинаковых, даже не озлобленных, а просто тупых детей — для жизни в том новом мире, который они построят. Как же ужасен будет этот новый мир, построенный нами, подумал он. И во всей природе, кроткой природе Истры, было нечто тупое, послушное, располагающее к дикости. Поражало только обилие запахов, какого никогда не бывало в городе. Дети тоже были довольно пахучие.</p><p class="p1">Вдобавок всеми овладело грибное помешательство: говорили, что никогда не было таких ранних и обильных грибов, не какие-то жалкие колосовики, а настоящие белые, и даже подосиновики, которых здесь отродясь не бывало; такое грибное изобилие, говорили в окрестных деревнях, бывает только перед большой бедой, и вожатая Марина с упоением пересказывала эти слухи. Грибов Миша не любил, и в самой их сыроватости и приплюснутости виделось ему что-то от деревенской жизни. Пока все ходили по грибы, он пытался сочинять или читал подшивки детских журналов. Детские журналы сплошь были как перед большой бедой — примета вернее всяких грибов. Да и все тут было как перед большой бедой, и самое обидное, что всегда обходилось, устраивалось, чтобы вернуться к этому же состоянию вечной беременности.</p><p class="p1">Отрядные дела были необременительны, и в ближайшую субботу — родительский день, когда воспитательные чтения не предусматривались и ифлийский десант чувствовал себя откровенно лишним, — Миша решил податься на знаменитый пляж. С ним отправился молчаливый и неуклюжий Игнатьев. Прочие остались в лагере: кто-то валялся на койке и сочинял, кто-то отправился по грибы, а кто-то предавался флирту с младшим педсоставом, как называли вожатых, большей частью студенток областного пединститута. Среди них были хорошенькие, но Миша еще не отошел от мартовского испуга и твердо решил избегать промискуитета, тем более что он разогревал нервы и сушил душу.</p><p class="p1">— Тут санаторий рядом, — сказал Игнатьев. — Мне сестра рассказывала. Там и пляж получше, и девочки.</p><p class="p1">Попасть на санаторный пляж можно было только с воды — на суше он был отделен решеткой, хоть и чисто символической; в конце концов, кто хочет, заплывет. И Миша с Игнатьевым заплыли на окультуренный санаторный пляж: повалялись на чистом песке, посидели в тени расписного грибка, напросились в компанию преферансистов, где показали неплохие результаты, — и к двум часам дня Миша почувствовал, что его разморило. Он отполз под соседний грибок и задремал, краем уха продолжая слышать звон мяча и крики волейболистов. Ему снилась игра, несравненно более сложная, чем волейбол, причем играли тяжелыми, словно каменными мячами: никак нельзя было дать им приземлиться. Он не особенно удивился, когда громкий женский голос над ним сказал: никуда не денешься. Открывая глаза, он знал уже, что увидит Валю Крапивину. Не зря с самого утра томился от странного сочетания веселья и досады.</p><p class="p1">Она стояла над ним и смотрела в упор, как солнце, серо-зелеными глазами. Сейчас они были скорей зелеными, чем серыми. Взгляд ее был удивительно спокоен. Он посмотрел на нее, как впервые, и заметил, что она очень хороша, лучше, чем он запомнил. Да он и старался не вспоминать, но все-таки в постели с Соней вспоминал и понимал, что Соня — паллиатив. Ему вспомнилась фраза из анекдота: они меня не любят, они мной дрочат.</p><p class="p1">— Ты откуда здесь? — спросил Миша.</p><p class="p1">— Я-то тут отдыхаю, а ты откуда?</p><p class="p1">Ее поощрили недельной путевкой. На более долгий срок Ганцев отпустить ее не желал, ибо она сделалась незаменима. Любви промеж них больше никакой не было. Зато за начальника участка Вавилова она собиралась замуж. Они и заявление уже подали, оставалось три недели. Зачем давали этот месяц отсрочки — они не понимали: ведь и так все хорошо было, неужто опасались в загсе, что передумают? Везде подстраховка, сказал Вавилов. Он был чем-то похож на Колю Тузеева, наверное, вот этим: в целом он очень преданный, очень наш, но над мелочами шутил. Понятно было, что со временем мелочи перевесят, и он со всей своей прямотой и преданностью станет не наш. И она поймет, останется с ним. Конечно, он был слишком прям и тяжел, и не было в нем никакого особенного таланта. Но сказать, чтобы было вовсе неинтересно, она не могла.</p><p class="p1">— А я в лагере тут, — ответил Миша. — Практика.</p><p class="p1">— Прямо как таскаешься ты за мной, — сказала Валя.</p><p class="p1">— Или ты за мной, — ответил Миша без злобы, скорей заинтересованно.</p><p class="p1">— А я замуж выхожу, — призналась Валя.</p></span>
